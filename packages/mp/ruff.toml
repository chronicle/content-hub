# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    ".idea",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "mock_content_hub",
]

line-length = 120
indent-width = 4

# Assume Python 3.11
target-version = "py311"

[lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`) codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
# Check https://docs.astral.sh/ruff/rules/
select = ["ALL"]

ignore = [
    "missing-trailing-comma", # The formatter enforces consistent use of trailing commas, making the rule redundant
    "incorrect-blank-line-before-class", # incorrect-blank-line-before-class
    "multi-line-summary-second-line", # multi-line-summary-second-line
    "undocumented-public-module", # undocumented-public-module
    "undocumented-public-class", # undocumented-public-class
    "undocumented-public-package", # undocumented-public-package
    "undocumented-magic-method", # undocumented-magic-method
    "undocumented-public-init", # undocumented-public-init
    "float-equality-comparison", # Unreliable floating point equality comparison
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

preview = true

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks, and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

preview = true

[lint.per-file-ignores]
"**/[Tt]ests/**" = [
    "assert",
    "ARG",
    "FBT",
    "magic-value-comparison",
    "suspicious-non-cryptographic-random-usage",
    "D",
    "DOC",
    "no-self-use",
    "compare-to-empty-string",
]
