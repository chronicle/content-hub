name: AzureActiveDirectory_Reset User Password
description: This action change user password to the password specified in the action.
    User will have to change their password on next login. Action expects User to
    change password for as  SecOps User entity in username@domain format or as an
    action input parameter. If the User name is passed to action both as a SecOps
    entity and input parameter - action will be executed on the input parameter.
