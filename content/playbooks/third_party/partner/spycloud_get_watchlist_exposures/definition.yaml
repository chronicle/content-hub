version: 0.0
name: SpyCloud Enterprise - Get Watchlist Exposures
description: This playbook automatically runs on every case ingested by the SpyCloud
  Enterprise connector. It executes the "Get Watchlist Exposures" action to present
  the SpyCloud Watchlist exposures already attached to the case as a single case-wall
  data table, reading the SpyCloud fields the connector flattened onto each alert's
  security events. It does not call the SpyCloud API. Sensitive values such as
  plaintext passwords, cookies, and tokens are never surfaced; only metadata and
  presence indicators are shown.
