name: SpyCloudEnterprise_Get Watchlist Exposures
description: Present the SpyCloud Enterprise Watchlist exposures already attached to
    the current case as a single case-wall data table. The action reads the SpyCloud
    fields the connector flattened onto each alert's security events across every
    alert in the case; it does not call the SpyCloud API or pull exposures that belong
    to other cases. Sensitive values such as plaintext passwords, cookies, and tokens
    are never surfaced; only metadata and presence indicators (for example "Plaintext
    Password Exposed") are shown.
