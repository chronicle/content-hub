  ai_description: >-
    ### General Description

    This action creates an entity insight for target entities based on a provided
    message template. It parses the message template using data found in the entity's
    `additional_properties`.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message | string | Yes | The template string for the insight message. Supports
    placeholders (e.g., `{key_path}`). |

    | Triggered By | string | No | The name of the integration or source triggering
    the insight. Defaults to "Siemplify". |


    ### Flow Description

    1. Retrieve the `Message` template and `Triggered By` parameter.

    2. Iterate through all `target_entities`.

    3. For each entity, parse the `Message` template by replacing placeholders with
    values from the entity's `additional_properties`.

    4. If a message is successfully generated, create an entity insight using `siemplify.add_entity_insight`.

    5. Return the execution result.


    ### Additional Notes

    There are no additional notes.
