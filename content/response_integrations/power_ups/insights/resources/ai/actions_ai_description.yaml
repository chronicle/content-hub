  ai_description: >-
    ### General Description

    The **Create Entity Insight From Multiple JSONs** action is a utility tool that
    parses structured JSON data provided via parameters and formats it into HTML insights
    attached to target entities. It allows analysts to consolidate information from
    multiple sources (up to five distinct JSON inputs) and present them as organized
    tables or text blocks directly on the entity's insight wall.


    ### Flow Description

    1. **Initialization**: The action retrieves the provided JSON strings, field definitions,
    and section titles from the action parameters.

    2. **Data Processing**: It iterates through each target entity in the case.

    3. **Extraction**: For each entity, it attempts to locate matching data within
    the provided JSON strings by comparing the entity identifier.

    4. **Parsing**: It parses the JSON content based on the provided field paths (e.g.,
    `path.to.key`) and applies formatting rules.

    5. **Insight Generation**: It constructs an HTML table for each valid JSON input
    and attaches the resulting insight to the entity using the `add_entity_insight`
    method.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON1 - JSON5 | string | No | The JSON strings to be parsed for the insight.
    |

    | Fields1 - Fields5 | string | No | The fields to extract from the corresponding
    JSON string. Format: `Display:path.to.key`. |

    | Title1 - Title5 | string | No | The title used for the corresponding entity
    section. |

    | Placeholder Separator | string | No | A string used to separate field definitions.
    Default is `,`. |


    ### Additional Notes

    This action does not perform any external API calls or data fetching. It relies
    entirely on the JSON data provided via the action parameters. If no matching data
    is found for an entity in the provided JSONs, the action will indicate that data
    is missing for that specific section.
