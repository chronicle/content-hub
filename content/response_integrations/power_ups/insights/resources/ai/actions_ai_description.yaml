      ip_set: true
      mac_address: true
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: true
      process: true
      service: true
      source_domain: true
      threat_actor: true
      threat_campaign: true
      threat_signature: true
      url: true
      usb: true
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
