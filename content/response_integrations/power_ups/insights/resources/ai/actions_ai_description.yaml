  ai_description: >-
    Creates formatted entity insights by populating a template message with data stored
    in an entity's `additional_properties`. This action is primarily used to surface
    specific enrichment data (previously gathered by other actions) directly onto
    the entity's insight panel for analyst visibility.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message | string | Yes | A template string that uses placeholders in curly braces
    `{}` to reference keys within the entity's `additional_properties`. For example:
    `User {manager_name} approved this access.` |

    | Triggered By | string | No | The name of the integration or source to be associated
    with the created insight. Defaults to 'Siemplify'. |


    ### Additional Notes

    - This action does not fetch new data from external sources; it transforms existing
    internal entity data into a readable insight.

    - If a placeholder key is not found in the entity's properties, the resulting
    message may be empty or incomplete depending on the template logic.


    ### Flow Description

    1. **Parameter Retrieval:** The action retrieves the template `Message` and the
    `Triggered By` source name from the input parameters.

    2. **Entity Iteration:** The action iterates through all entities currently in
    the scope of the alert or case.

    3. **Template Parsing:** For each entity, it uses the `ToolsCommon` library to
    parse the `Message` template, replacing placeholders with corresponding values
    found in the entity's `additional_properties` (enrichment data).

    4. **Insight Creation:** If the message is successfully generated, the action
    calls the SOAR SDK to add an entity insight to the specific entity.

    5. **Execution Summary:** The action tracks which entities received insights and
    returns a success status if at least one insight was created.
