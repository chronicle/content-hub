  ai_description: >-
    ### General Description

    The **Create Entity Insight From Multiple JSONs** action is a utility designed
    to transform raw JSON data into human-readable entity insights. It allows analysts
    to provide up to five JSON strings (typically outputs from previous playbook steps)
    and define specific fields to extract for each entity. The extracted data is then
    formatted into HTML tables and attached directly to the relevant entities as insights,
    facilitating quick review of complex data structures within the Google SecOps
    platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON1 - JSON5 | String | No | The JSON string containing data to be parsed.
    The action expects a list of objects where each object contains an 'Entity' key
    matching the entity identifier and an 'EntityResult' key containing the data.
    |

    | Fields1 - Fields5 | String | No | A string defining which fields to extract
    and how to display them. Format: `DisplayName:path.to.key`. Multiple fields are
    separated by the Placeholder Separator. |

    | Title1 - Title5 | String | No | The title or header used for the specific section
    of the entity insight. |

    | Placeholder Separator | String | No | The character used to separate multiple
    field definitions in the 'Fields' parameters. Default is a comma (`,`). |


    ### Additional Notes

    - The action identifies the correct data for an entity by looking for a key named
    `Entity` within the provided JSON objects and extracts the content of `EntityResult`.

    - If a field path is provided without a display name (e.g., just `path.to.key`),
    the value will be added to the insight as a plain string instead of a table row.

    - This action is a local utility and does not perform any external API calls.


    ### Flow Description

    1. **Initialization**: The action retrieves the JSON strings, field mappings,
    and titles for the data sets from the action parameters.

    2. **Entity Iteration**: The action loops through all entities currently associated
    with the alert or case.

    3. **Data Extraction**: For each entity, it searches the provided JSON arrays
    for an entry where the `Entity` field matches the entity's identifier.

    4. **Field Parsing**: If a match is found, it uses the `Fields` mapping to extract
    specific values from the `EntityResult` object using dot-notation paths and optional
    pipe functions (like `count` or `to_str`).

    5. **Insight Creation**: The extracted values are formatted into an HTML table.
    The action then adds this table as an insight to the entity, using the provided
    `Title` as the trigger context.
