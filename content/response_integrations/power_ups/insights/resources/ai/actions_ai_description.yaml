Create Entity Insight From JSON:
  ai_description: >-
    ### General Description

    Creates an entity insight by parsing a provided JSON string and matching it against
    target entities. This action allows for dynamic generation of insights based on
    structured data passed from previous steps in a playbook.


    ### Flow Description

    1. Parses the provided JSON string from the action parameters.

    2. Iterates through all target entities in the case.

    3. For each entity, searches the JSON data using the specified `Identifier KeyPath`
    to find a matching identifier.

    4. If a match is found, formats the provided `Message` string by replacing placeholders
    with corresponding values from the JSON.

    5. Attaches the formatted message as an insight to the matched entity.


    ### Additional Notes

    This is a utility action used to dynamically generate insights from structured
    JSON data. It does not fetch data from external sources but relies on the data
    provided in the `JSON` parameter.
