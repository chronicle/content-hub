  ai_description: >-
    Creates entity insights by parsing a provided JSON string and mapping it to entities
    within the case. This action allows users to inject custom insights into entities
    based on external data provided in a JSON format.


    ### Flow Description

    1. **Load Input**: The action loads the provided JSON string from the `JSON` parameter.

    2. **Iterate Entities**: It iterates through all target entities in the case.

    3. **Match Entities**: For each entity, it attempts to find a matching record
    in the JSON data using the provided `Identifier KeyPath`.

    4. **Parse Message**: If a match is found, it parses the `Message` template, replacing
    placeholders (e.g., `{key_path|function}`) with the corresponding values from
    the matched JSON data.

    5. **Add Insight**: It adds the generated message as an entity insight to the
    matched entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON | string | Yes | The JSON string containing the data to be used for insights.
    |

    | Identifier KeyPath | string | Yes | The path in the JSON to find the entity
    identifier for matching. |

    | Message | string | Yes | The template string for the insight, supporting placeholders.
    |

    | Triggered By | string | No | The integration name to associate with the insight.
    |


    ### Additional Notes

    - The action does not perform any external API calls; it processes the provided
    JSON input locally.

    - The `Identifier KeyPath` should be provided as a dot-separated path (e.g., `data.user.id`).
