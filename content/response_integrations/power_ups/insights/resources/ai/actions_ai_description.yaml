  ai_description: >-
    ### General Description

    The **Create Entity Insight From JSON** action is a utility designed to generate
    and attach insights to entities within a Google SecOps case using data provided
    in a JSON format. This action allows users to take structured data (e.g., from
    a previous integration step or a file) and map it to specific entities to provide
    analysts with immediate context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON | string | Yes | The JSON string containing the data to be processed. This
    should be a list of objects or a single object containing entity-related information.
    |

    | Identifier KeyPath | string | Yes | The dot-notation path (e.g., `data.id`)
    within the JSON objects used to match against the entity's identifier. |

    | Message | string | Yes | A template string for the insight. Use curly braces
    `{}` to reference keys from the JSON (e.g., `User {name} has role {role}`). Supports
    advanced formatting pipes like `join`, `count`, and `to_str`. |

    | Triggered By | string | No | The name of the integration or source to be displayed
    as the creator of the insight. Defaults to 'Siemplify'. |


    ### Flow Description

    1. **JSON Parsing:** The action parses the provided JSON string into a Python
    object.

    2. **Entity Iteration:** It iterates through all entities currently associated
    with the case.

    3. **Data Matching:** For each entity, it searches the JSON for an entry where
    the value at the `Identifier KeyPath` matches the entity's identifier (case-insensitive).

    4. **Message Formatting:** If a match is found, it extracts the relevant data
    and populates the `Message` template, resolving any placeholders and applying
    formatting functions.

    5. **Insight Creation:** The formatted message is added as an insight to the specific
    entity using the `add_entity_insight` method.


    ### Additional Notes

    - The `Identifier KeyPath` supports nested objects using dot notation.

    - The action will only create insights for entities that have a corresponding
    match in the provided JSON data.
