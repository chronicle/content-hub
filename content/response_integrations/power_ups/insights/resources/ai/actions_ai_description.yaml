"Create Entity Insight From Multiple JSONs":
  ai_description: >-
    ### General Description

    The **Create Entity Insight From Multiple JSONs** action is a utility designed
    to transform raw JSON data into structured, human-readable Entity Insights within
    Google SecOps. It allows analysts to pass up to five different JSON datasets and
    define specific extraction paths to pull relevant information for each entity
    present in the case. This is particularly useful for visualizing data retrieved
    in previous playbook steps that was not automatically formatted into insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON1 - JSON5** | String | No | The raw JSON strings to be parsed. These should
    contain data mapped to entity identifiers. |

    | **Fields1 - Fields5** | String | No | The extraction logic for the corresponding
    JSON. Uses the format `Label:{path.to.key}`. Multiple fields can be separated
    by the Placeholder Separator. |

    | **Title1 - Title5** | String | No | The title used for the specific section
    of the entity insight. |

    | **Placeholder Separator** | String | No | The character used to separate field
    definitions in the 'Fields' parameters (default is `,`). |


    ### Flow Description

    1. **Data Collection:** The action retrieves up to five sets of JSON data, field
    extraction strings, and titles from the action parameters.

    2. **Entity Iteration:** The action iterates through all entities currently associated
    with the SecOps case.

    3. **Data Extraction:** For each entity, the action searches the provided JSON
    strings for a matching `Entity` identifier within the JSON structure.

    4. **Field Parsing:** If a match is found, it parses the specified fields using
    the provided paths, supporting nested JSON structures and basic transformation
    pipes (like `count` or `to_str`).

    5. **Insight Creation:** The extracted data is formatted into an HTML table and
    attached as an Insight to the specific entity, using the provided title as the
    trigger/header.


    ### Additional Notes

    - This action is a data transformation utility and does not interact with external
    APIs.

    - The JSON input is expected to follow a structure where entity identifiers are
    mapped to results (e.g., `[{"Entity": "1.1.1.1", "EntityResult": {...}}]`).
