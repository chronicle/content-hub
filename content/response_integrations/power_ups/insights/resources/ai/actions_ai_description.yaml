Create Entity Insight From JSON:
  ai_description: >-
    Creates an entity insight within Google SecOps by processing a provided JSON string
    and mapping its data to entities in the current case. This action is a utility
    designed to transform raw JSON data (often passed from a previous playbook step)
    into human-readable insights associated with specific entities.


    ### General Description

    The action takes a JSON array, identifies specific objects within that array that
    match entities in the case (based on a configurable identifier path), and then
    formats a message using placeholders to create an insight. This is particularly
    useful for displaying complex data structures or external tool outputs directly
    on the entity's insight panel.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON | string | True | A JSON-formatted string (usually an array of objects)
    containing the data to be processed. |

    | Identifier KeyPath | string | True | The dot-notation path (e.g., `user.email`
    or `id`) within the JSON objects used to match the data to a SecOps entity's identifier.
    |

    | Message | string | True | A template string for the insight. Use curly braces
    `{}` to reference keys from the JSON (e.g., `User {name} has role {role}`). Supports
    pipe functions like `default()`, `count()`, and `join()`. |

    | Triggered By | string | False | The name of the integration or source to be
    displayed as the creator of the insight. Defaults to 'Siemplify'. |


    ### Flow Description

    1. **JSON Parsing**: The action parses the input `JSON` string into a Python list
    of dictionaries.

    2. **Entity Iteration**: It iterates through all `target_entities` available in
    the current scope.

    3. **Data Matching**: For each entity, it searches the JSON list for an object
    where the value at `Identifier KeyPath` matches the entity's identifier (case-insensitive).

    4. **Message Formatting**: If a match is found, the action uses the `Message`
    template and the matched JSON object to resolve placeholders and apply any specified
    pipe functions (e.g., formatting lists or providing default values).

    5. **Insight Creation**: The formatted message is added as an entity insight to
    the specific entity in the Google SecOps case.


    ### Additional Notes

    - The `Identifier KeyPath` supports nested keys using dot notation (e.g., `metadata.system_info.id`).

    - The `Message` parameter supports advanced formatting via pipes, such as `{results|count()}`
    to show the number of items in a list or `{tags|join( )}` to concatenate array
    elements.
