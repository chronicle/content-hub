  ai_description: >-
    ### General Description

    Creates an entity insight from a provided JSON string. The action matches entities
    with data in the JSON using a specified key path and generates a formatted message
    to be added as an insight to the matched entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | JSON | String | Yes | The JSON string that will be used to produce the Entity
    Insight. |

    | Identifier KeyPath | String | Yes | Key path for where to find the entity identifier
    to match the insight with the associated entity. |

    | Message | String | Yes | Formatted string that incorporates entity enrichment.
    For example: 'Hi {AD_name}, please review.' |

    | Triggered By | String | No | What integration should be associated with the
    insight. Defaults to 'Siemplify'. |


    ### Flow Description

    1. Parses the provided JSON string.

    2. Iterates through the target entities.

    3. For each entity, searches the JSON for a matching identifier using the provided
    `Identifier KeyPath`.

    4. If a match is found, formats the `Message` string using data from the matched
    JSON object.

    5. Adds the formatted message as an insight to the entity.
