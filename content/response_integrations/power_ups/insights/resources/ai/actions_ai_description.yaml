  ai_description: >-
    ### General Description

    The **Create Entity Insight From Multiple JSONs** action is a utility designed
    to parse up to five provided JSON strings, extract specific fields, and generate
    formatted entity insights. It matches the data within the JSON strings to the
    target entities based on their identifiers and creates an HTML table insight for
    each matched entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --------- | ---- | --------- | ----------- |

    | JSON1 - JSON5 | String | No | The JSON strings to be parsed for the insight.
    |

    | Title1 - Title5 | String | No | The titles used for the corresponding entity
    sections in the insight. |

    | Fields1 - Fields5 | String | No | The specific fields to be extracted from the
    corresponding JSON strings. |

    | Placeholder Separator | String | No | A string used as a delimiter to separate
    field definitions (default is `,`). |


    ### Additional Notes

    - The `Fields` parameters should be formatted as a string of key-value pairs separated
    by the `Placeholder Separator`. The format is `Display Name:json.path.to.value`
    (e.g., `Count:path1.path2.length, RISK:path3.path4.risk_score`).


    ### Flow Description

    1. **Initialization:** The action reads the provided JSON strings, titles, field
    definitions, and the placeholder separator from the parameters.

    2. **Entity Iteration:** It iterates through all target entities in the case.

    3. **Data Matching:** For each entity, it searches the provided JSON strings for
    a matching entity identifier.

    4. **Field Extraction:** It extracts the specified fields from the matched JSON
    data based on the provided field definitions.

    5. **Insight Creation:** It formats the extracted data into an HTML table and
    attaches it as an insight to the respective entity.
