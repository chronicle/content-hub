"Create Entity Insight From Multiple JSONs":
  ai_description: >-
    ### General Description

    Creates entity insights by parsing and extracting specific fields from multiple
    provided JSON strings. This action allows users to consolidate data from various
    JSON sources into structured HTML tables and attach them as insights to the relevant
    entities within the case.


    ### Flow Description

    1. Retrieves up to seven sets of Title, Fields, and JSON string parameters (as
    defined in the action configuration).

    2. Iterates through all target entities in the case.

    3. For each entity, searches the provided JSON strings for a matching entity identifier.

    4. If a match is found, extracts the specified fields based on the provided key
    paths and placeholder separator.

    5. Formats the extracted data into an HTML table.

    6. Attaches the formatted table as an insight to the entity using the SecOps platform's
    insight creation functionality.


    ### Additional Notes

    - The action expects the provided JSON strings to contain a list of objects, where
    each object has an `Entity` field matching the entity identifier and an `EntityResult`
    field containing the data to be parsed (e.g., `[{"Entity": "1.1.1.1", "EntityResult":
    {"key": "value"}}]`).

    - The `Fields` parameter should be formatted as a string of display names and
    key paths separated by the `Placeholder Separator` (e.g., `Display Name:path.to.key,
    Another Field:path.to.another.key`).
  ai_short_description: >-
    Creates entity insights by parsing and extracting specific fields from multiple
    provided JSON strings, formatting the data into HTML tables, and attaching them
    to the relevant entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
