Create Entity Insight From Enrichment:
  ai_description: >-
    ### General Description

    Creates an entity insight by parsing a formatted message template and replacing
    placeholders with values from the entity's additional properties. This action
    is typically used after an enrichment action to surface specific data points directly
    on the entity's insight tab.


    ### Flow Description

    1. Retrieves the `Message` template and `Triggered By` parameters.

    2. Iterates through all target entities provided to the action.

    3. For each entity, parses the `Message` template and replaces placeholders with
    corresponding values extracted from the entity's `additional_properties`.

    4. If a valid message is generated, attaches an insight to the entity containing
    the formatted text.


    ### Additional Notes

    - Placeholders in the `Message` parameter should match the keys present in the
    entity's `additional_properties` dictionary.

    - The action does not make any external API calls; it solely operates on data
    already present within the SecOps platform.
  ai_short_description: >-
    Creates an entity insight by formatting a message template with data extracted
    from the entity's additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights based on a formatted message template and entity properties.
    reasoning: >-
      The action does not fetch external data or mutate external systems. It mutates
      internal data by creating insights on entities using `siemplify.add_entity_insight`.
      It does not update the entities themselves, modify alert data, or create case
      comments.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
