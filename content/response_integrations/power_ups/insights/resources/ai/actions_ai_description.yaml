  ai_description: >-
    ### General Description

    Creates an entity insight based on existing enrichment data stored in the entity's
    additional properties. The action parses a formatted string provided by the user
    and replaces placeholders with actual values extracted from the entity's properties,
    allowing for customized and dynamic insight generation without making external
    API calls.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Message | String | Yes | A formatted string that incorporates entity enrichment
    data. Placeholders can be used to extract specific fields from the entity's additional
    properties (e.g., `Hi {AD_name}, please review.`). |

    | Triggered By | String | No | Specifies the integration name to be associated
    with the created insight. Defaults to 'Siemplify' if not provided. |


    ### Flow Description

    1. Iterates through all target entities provided in the action's scope.

    2. Parses the provided `Message` parameter, replacing any placeholders with the
    corresponding values found in the entity's `additional_properties` JSON.

    3. If a valid message is successfully generated, it creates a new insight for
    the entity using the parsed message and the specified `Triggered By` value.

    4. Returns a success status and a summary message if at least one insight was
    successfully created.
