      It does not mutate external data (`can_mutate_external_data` is false) or internal
      data (`can_mutate_internal_data` is false). It does not update entities (`can_update_entities`
      is false). It creates insights by calling `siemplify.add_entity_insight` (`can_create_insight`
      is true). It does not modify alert data or create case comments.
