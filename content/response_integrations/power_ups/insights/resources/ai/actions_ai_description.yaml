Create Entity Insight From Enrichment:
  ai_description: >-
    ### General Description

    The **Create Entity Insight From Enrichment** action is a utility designed to
    transform raw enrichment data stored within an entity's `additional_properties`
    into a human-readable insight. It uses a templating system to inject specific
    data points into a formatted message, which is then posted to the entity's insight
    wall in Google SecOps. This allows analysts to see summarized results from previous
    enrichment steps directly on the entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message | String | Yes | A template string containing placeholders in curly
    braces (e.g., `{AD_DisplayName}`). These placeholders must correspond to keys
    found in the entity's `additional_properties`. |

    | Triggered By | String | No | Specifies the integration name to be displayed
    as the source of the insight. Defaults to "Siemplify". |


    ### Flow Description

    1. **Parameter Retrieval:** The action fetches the template `Message` and the
    `Triggered By` source name from the action parameters.

    2. **Entity Iteration:** The action loops through all entities provided in the
    current context (target entities).

    3. **Template Parsing:** For each entity, the action uses the `ToolsCommon` library
    to parse the `Message` string, replacing placeholders with corresponding values
    found in the entity's `additional_properties` dictionary.

    4. **Insight Creation:** If the message is successfully constructed (i.e., placeholders
    are resolved), the action calls the SOAR API to add an entity insight to that
    specific entity.

    5. **Reporting:** The action concludes by providing a summary message listing
    all entities that successfully received an insight.


    ### Additional Notes

    This action is highly dependent on the presence of specific keys within the `additional_properties`
    of the entities. If a placeholder key is missing or the `additional_properties`
    are empty, the message parsing might fail or return an empty string, preventing
    the insight from being created for that specific entity.
  capabilities:
