product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The 'insights' integration is a utility-focused integration designed to enhance
    SOAR playbook capabilities by allowing analysts to create and format entity insights
    directly within the SOAR platform. It does not interact with external security
    products or services. Specifically: it does not perform SIEM, EDR, Network Security,
    or Cloud Security functions as it does not ingest or analyze logs, process trees,
    or cloud configurations. It does not perform Threat Intelligence or Vulnerability
    Management as it does not fetch external reputation data or vulnerability information.
    It does not perform ITSM or IAM functions as it does not manage tickets or user
    identities. It does not perform Collaboration functions as defined, because it
    does not send external notifications (e.g., Slack/Teams) or facilitate human-in-the-loop
    approvals; it only updates the internal case wall. It does not perform Asset Inventory
    as it does not retrieve asset metadata. Consequently, none of the defined product
    categories apply to this integration.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
