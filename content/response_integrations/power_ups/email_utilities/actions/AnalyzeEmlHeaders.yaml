creator: Rob
default_result_value: ''
description: This action accepts a base64-encoded EML or a list of headers, extracts
    and analyses the headers for spoofing indicators, and reports the SPF, DKIM, DMARC,
    and ARC authentication results recorded for the message in its Authentication-Results
    headers.
dynamic_results_metadata:
-   result_example_path: resources/AnalyzeEmlHeaders_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: EmailUtilities
name: Analyze EML Headers
parameters:
-   default_value: ''
    description: Base64 string of an EML file.
    is_mandatory: false
    name: Base64 EML
    type: string
-   default_value: ''
    description: Headers list in a JSON format.
    is_mandatory: false
    name: Header List
    type: string
script_result_name: ScriptResult
