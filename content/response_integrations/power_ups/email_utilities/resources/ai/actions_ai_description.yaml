Parse Case Wall Email:
  ai_description: >-
    Parses EML or MSG email files attached to the Google SecOps case wall to extract
    headers, body content, and nested attachments. This action automates the ingestion
    of email evidence by identifying the original email file, decoding its structure,
    and optionally creating SOAR entities for further investigation.


    ### Flow Description

    1. **Attachment Retrieval:** Searches the case or alert wall for supported email
    files (.eml or .msg), prioritizing the original email attachment.

    2. **Email Parsing:** Decodes the email file to extract metadata (To, From, Subject,
    Date), body text (Plain Text and HTML), and any embedded attachments.

    3. **Entity Creation:** Based on configuration, creates entities for the sender,
    recipients, and subject line. It also performs recursive parsing of nested emails.

    4. **IOC Extraction:** Scans the email body and headers for observed indicators
    (URLs, IPs, Hashes, Emails) and creates corresponding entities in the case.

    5. **Attachment Processing:** Extracts files from the email and saves them back
    to the case wall, while creating FILENAME and FILEHASH entities linked to the
    email subject.

    6. **Data Enrichment:** Updates created entities with additional properties such
    as file hashes, attachment IDs, and source file references.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Entities | Boolean | No | If true, creates User entities for 'To'/'From'
    headers and an Email Subject entity. |

    | Exclude Entities Regex | String | No | A regular expression used to skip the
    creation of specific entities that match the pattern. |

    | Original EML Only | Boolean | No | If true, the action will only extract attachments
    from the top-level EML file, ignoring nested ones. |

    | Create Observed Entities | DDL | No | Specifies which types of indicators (URLs,
    Emails, IPs, Hashes) found in the body should be converted into entities. |

    | Save Attachments to Case Wall | Boolean | No | If true, saves all files extracted
    from the email back to the SOAR case wall as new attachments. |

    | Fang Entities | Boolean | No | If true, automatically 'fangs' defanged indicators
    (e.g., converting `example[.]com` to `example.com`) and decodes URL protection
    services like Proofpoint or Safelinks. |

    | Custom Entity Regexes | Code | No | A JSON object containing custom regular
    expressions to identify and extract specific entity types from the email body
    and subject. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action saves extracted email attachments back to the Google SecOps case
      wall, creates new entities (Users, Email Subjects, URLs, IPs, etc.) within the
      case, and updates entity attributes with metadata such as file hashes and attachment
      IDs.
