Analyze EML Headers:
  ai_description: >-
    Analyzes email headers extracted from either a base64-encoded EML file or a JSON-formatted
    list of headers. The action performs a security-focused analysis to identify potential
    spoofing, misconfigurations, or suspicious routing information.


    ### General Description

    This action serves as a forensic utility for email analysis. It parses the provided
    header data to extract key metadata, including the full list of headers, domains,
    and IP addresses found in the 'Received' chain. It then applies a set of heuristic
    rules to flag anomalies such as mismatched 'From' and 'Return-Path' addresses,
    the presence of BCC headers in received mail, or missing Message-IDs. The results
    are provided as both a structured JSON object and a formatted HTML table for easy
    review within the SOAR interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 EML | String | No | The base64-encoded content of an EML file. If provided,
    the action will decode and parse the headers from this file. |

    | Header List | String | No | A JSON-formatted list of headers (e.g., `[["Header-Name",
    "Value"], ...]`). This is used if the EML file is not available. |


    ### Additional Notes

    * **Input Requirement:** Either 'Base64 EML' or 'Header List' must be configured
    for the action to execute successfully. If both are provided, 'Base64 EML' takes
    precedence.

    * **Heuristic Scoring:** The action assigns scores to various anomalies (e.g.,
    mismatched headers) to help analysts prioritize suspicious emails.


    ### Flow Description

    1. **Input Retrieval:** The action checks for the 'Base64 EML' parameter. If present,
    it decodes the base64 string and parses the email structure to extract headers.
    If absent, it attempts to parse the 'Header List' JSON.

    2. **Header Normalization:** It iterates through the extracted headers, creating
    a dictionary and handling duplicate header keys by appending an index (e.g., `Received_2`).

    3. **Routing Extraction:** It uses regular expressions to extract domains and
    IP addresses from all 'Received' headers to map the email's path.

    4. **Security Analysis:** The action runs a series of checks:
        * Compares 'Return-Path' against 'From' and 'X-Original-Sender'.
        * Compares 'Reply-To' against 'From'.
        * Checks for suspicious headers like 'X-Distribution', 'Bcc', or 'X-UIDL'.
        * Validates the 'Message-ID' for common anomalies.
        * Checks 'X-Authenticated-User' against the 'From' address.
    5. **Output Generation:** It compiles the analysis into a JSON result and generates
    an HTML table containing the security recommendations and the full header list.
