Analyze Headers:
  ai_description: >-
    Analyze Headers is a comprehensive email forensics action that evaluates the authenticity
    and routing path of an email based on its headers. It performs deep validation
    of security protocols and enriches relay information with external threat intelligence.


    ### General Description

    This action takes a JSON object representing email headers and performs a multi-stage
    analysis. It validates core email authentication mechanisms (SPF, DMARC, DKIM,
    and ARC) to detect spoofing or tampering. Additionally, it parses the 'Received'
    headers to reconstruct the email's journey across mail servers (hops). Each identified
    relay server is checked against multiple Real-time Blocklists (RBLs) and enriched
    with geographic location and Whois (RDAP) data to identify suspicious origins
    or infrastructure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Headers JSON | String | Yes | A JSON-formatted string containing the email headers
    to be analyzed. This is typically the output of a previous email parsing step.
    |


    ### Additional Notes

    - This action does not operate on SecOps entities directly; it processes the data
    provided in the `Headers JSON` parameter.

    - The action requires outbound connectivity to perform DNS lookups, RBL checks,
    and access geo-location/Whois APIs.


    ### Flow Description

    1. **Input Parsing:** Extracts the email headers from the provided JSON parameter.

    2. **Authentication Validation:** Uses DNS queries to verify SPF, DMARC, and MX
    records for the sender's domain. It also cryptographically verifies DKIM and ARC
    signatures.

    3. **Hop Analysis:** Parses the 'Received' headers to identify every mail server
    involved in the delivery chain.

    4. **Enrichment:** For each identified IP or hostname in the relay path:
        - Queries RBLs to check for blacklisting.
        - Performs Whois/RDAP lookups to identify the owner/ASN.
        - Retrieves geographic coordinates and city/country information.
    5. **Result Aggregation:** Compiles all authentication results, hop details, and
    enrichment data into a single structured JSON object returned to the platform.
