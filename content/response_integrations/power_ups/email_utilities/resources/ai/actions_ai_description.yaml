  ai_description: >-
    ### General Description

    The "Parse Case Wall Email" action parses an EML or MSG file that has been attached
    to the case wall. It extracts the email's headers, body, and attachments. It can
    optionally create entities from the email's headers (To, From, Subject) and observed
    entities in the email body (URLs, Emails, IPs, Hashes). It can also save extracted
    attachments back to the case wall and update the corresponding FILENAME entities
    with the attachment ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Entities | Boolean | No | When enabled, this will create User entities
    out of the To and From headers and an Email Subject entity out of the Subject
    field. Default is true. |

    | Exclude Entities Regex | String | No | Observed entities that match the supplied
    regex will not be created. |

    | Original EML Only | Boolean | No | Extract attachments from the original EML
    only. Default is true. |

    | Create Observed Entities | Drop-down | No | Create Entities out of the observed
    entities in the email body. Options include All, URLs, Emails, IPs, Hashes, etc.
    Default is All. |

    | Save Attachments to Case Wall | Boolean | No | Save the extracted attachments
    to the case wall. Default is true. |

    | Fang Entities | Boolean | No | When enabled, entities that are defanged (example.com
    => example[.]com) will be converted to fanged entities. Default is true. |

    | Custom Entity Regexes | Code | No | A JSON object that can parse out entities
    from body and subject. Default is { }. |


    ### Flow Description

    1. Retrieves attachments from the case wall and identifies the target EML or MSG
    file.

    2. Parses the email content, extracting headers, body, and attachments.

    3. If configured, creates base entities (To, From, Subject) and observed entities
    (URLs, IPs, Hashes, Emails) from the email content.

    4. If configured, saves extracted attachments to the case wall and updates corresponding
    FILENAME entities with the attachment ID.

    5. Returns the parsed email data and created entities as a JSON result.
