  ai_description: >-
    Analyzes EML headers provided as a base64 string or a JSON list. It extracts domains
    and addresses from the headers and evaluates them for anomalies, such as mismatched
    'Return-Path' and 'From' addresses, missing 'Message-ID', and suspicious 'X-Distribution'
    or 'Bcc' headers. The action outputs a detailed JSON result containing the extracted
    headers, identified domains and addresses, and a list of security recommendations
    based on the analysis.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Base64 EML | string | False | Base64 string of an EML file. |

    | Header List | string | False | Headers list in a JSON format. |


    ### Additional Notes

    Either 'Base64 EML' or 'Header List' must be provided for the action to run. If
    neither is provided, the action will fail.


    ### Flow

    1. Retrieves the EML headers from the provided base64 string or JSON list.

    2. Extracts domains and addresses from the 'Received' headers.

    3. Evaluates the headers against a set of rules to identify anomalies and generate
    recommendations.

    4. Returns the extracted data and recommendations as a JSON result.
