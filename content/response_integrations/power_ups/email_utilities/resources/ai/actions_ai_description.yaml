Analyze Headers:
  ai_description: >-
    ### General Description

    Analyze Headers accepts a JSON object containing a list of Email headers. The
    action validates the SPF, DMARC, ARC, and DKIM records in the email. It also checks
    to see if any of the relay servers are denylisted by querying multiple RBLs and
    enriches them with geo-location and IP whois information.


    ### Flow Description

    1. Extracts the `Headers JSON` parameter provided by the user or playbook.

    2. Parses the JSON object to extract email headers such as From, To, Subject,
    MessageID, and Date.

    3. Parses the `Authentication-Results` header(s) added by the receiving mail
    servers (using `mailsuite`) to report the SPF, DKIM, and DMARC verdicts for this
    specific message - that is, whether the email actually passed authentication,
    rather than what the sender domain's published policy enforces.

    4. Verifies DKIM and ARC signatures.

    5. Parses the routing hops from the `received` headers.

    6. For each hop, checks the IP or domain against DNS blocklists (`pydnsbl`), retrieves
    WHOIS information (`IPWhois`), and fetches geo-location data (`DbIpCity`).

    7. Compiles the analysis into a JSON result and attaches it to the action's output.


    ### Additional Notes

    This action relies on external services for DNS lookups, WHOIS, and IP geolocation.
  ai_short_description: >-
    Analyzes a JSON object of email headers to validate SPF, DMARC, ARC, and DKIM
    records, checks relay servers against RBLs, and enriches them with geo-location
    and WHOIS data.
