Parse Base64 Email:
  ai_description: >-
    Parses EML and MSG email files provided as Base64 strings to extract comprehensive
    metadata, content, and indicators. This action is designed to assist in phishing
    analysis by breaking down complex email structures into machine-readable formats
    for use in playbooks.


    ### Flow Description:

    1. **Input Decoding:** Decodes the provided Base64 string into raw bytes.

    2. **Format Identification:** Determines if the file is an OLE-based MSG file
    or a standard EML file.

    3. **Header Parsing:** Extracts email headers (To, From, Subject, etc.) and processes
    the 'Received' transport chain, respecting the 'Stop Transport' and 'Blacklist'
    configurations.

    4. **Body Extraction:** Retrieves plain text and HTML bodies, then performs extraction
    to identify URLs, Domains, IP addresses, and Email addresses using regex and URI
    extraction tools.

    5. **Attachment Processing:** Identifies and hashes attachments. If attachments
    are themselves emails (nested), it recursively parses them to extract their internal
    content.

    6. **Output Generation:** Consolidates all extracted data into a structured JSON
    object, including 'observed' indicators and 'received' routing information.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | EML/MSG Base64 String | Content | Yes | The Base64 encoded content of the email
    file (EML or MSG) to be parsed. |

    | Stop Transport At Header | String | No | A specific header name (e.g., 'Received')
    where the transport chain parsing should stop. |

    | Blacklisted Headers | String | No | A comma-separated list of headers to be
    excluded from the response. |

    | Use Blacklist As Whitelist | Boolean | No | If set to 'true', the 'Blacklisted
    Headers' parameter acts as an allowlist, and only those headers will be returned.
    |


    ### Additional Notes:

    - This action is a local utility and does not perform external reputation checks
    (e.g., VirusTotal) on the extracted indicators.

    - It handles recursive parsing of attached emails, providing a deep view of the
    email's structure.
