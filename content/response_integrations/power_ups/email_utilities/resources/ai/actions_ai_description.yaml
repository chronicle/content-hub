  ai_description: >-
    ### General Description

    Analyzes a JSON object containing email headers to validate SPF, DMARC, ARC, and
    DKIM records. It also checks relay servers against multiple RBLs (Real-time Blackhole
    Lists) and enriches them with geo-location and IP WHOIS information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Headers JSON | String | Yes | The JSON object that contains the email headers.
    This is the primary input for the analysis. |


    ### Additional Notes

    There are no additional notes for this action.


    ### Flow Description

    1. Parses the provided JSON object containing email headers.

    2. Extracts domains and IPs from the headers.

    3. Validates SPF, DMARC, ARC, and DKIM records using DNS queries.

    4. Checks relay servers against RBLs to see if they are denylisted.

    5. Retrieves geo-location and IP WHOIS information for the relay servers.

    6. Returns the analysis results as a JSON object.
