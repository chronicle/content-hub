Parse EML Base64 Blob:
  ai_description: >-
    Decodes a base64-encoded string and parses it as an EML (Email) file to extract
    structured metadata and content. This action is primarily used to analyze email
    files that are passed as raw data, such as those retrieved from attachments or
    external databases. It extracts standard headers, body content, and recursively
    processes nested EML attachments.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 EML Blob | String | Yes | The base64 encoded string representing the
    content of the EML file to be parsed. |


    ### Flow Description


    1. **Input Retrieval**: The action retrieves the base64-encoded string from the
    `Base64 EML Blob` parameter.

    2. **Decoding**: It decodes the base64 string into a raw UTF-8 string representing
    the EML file content.

    3. **Metadata Extraction**: The action parses the EML headers to extract the sender,
    primary recipients (To), carbon copy recipients (CC), blind carbon copy recipients
    (BCC), subject, and the date of the email.

    4. **Content Extraction**: It extracts the plain text and HTML versions of the
    email body.

    5. **Nested EML Parsing**: The action iterates through the email's multipart components.
    If it identifies a nested EML file (often found as an attachment), it recursively
    extracts the metadata and content for that nested message.

    6. **Result Generation**: All extracted data is compiled into a structured JSON
    object and returned as the action's result.
