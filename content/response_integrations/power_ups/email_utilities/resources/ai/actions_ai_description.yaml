Parse Case Wall Email:
  ai_description: >-
    ### General Description

    Parses an EML or MSG file attached to the case wall. This action extracts headers,
    body content, and attachments from the email file, and can automatically create
    entities and save extracted attachments back to the case wall.


    ### Flow Description

    1. Retrieves attachments from the case wall for the target alerts.

    2. Identifies EML or MSG files among the attachments.

    3. Parses the email content, extracting headers, body, and attachments.

    4. Optionally creates entities (such as users, email subjects, URLs, IPs, domains,
    and hashes) from the parsed email data.

    5. Optionally saves extracted attachments back to the case wall.

    6. Updates existing file entities with attachment IDs if applicable.

    7. Returns a JSON result containing the parsed email data.


    ### Additional Notes

    This action operates entirely within the Google SecOps platform and does not make
    external API calls.
