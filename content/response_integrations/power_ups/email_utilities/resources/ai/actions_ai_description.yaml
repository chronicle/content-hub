    Parses a base64 encoded EML or MSG file and extracts its contents, including headers,
    body, attachments, and observed indicators (URLs, domains, emails, IPs). The parsed
    data is returned as a JSON object in the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | EML/MSG Base64 String | String | Yes | The base64 representation of the EML
    or MSG file to parse. |

    | Stop Transport At Header | String | No | Stop processing the transport at this
    header field. |

    | Blacklisted Headers | String | No | Comma-separated list of headers to exclude
    from the response. |

    | Use Blacklist As Whitelist | Boolean | No | If set to true, only the headers
    listed in `Blacklisted Headers` will be included in the output. |


    ### Additional Notes

    There are no specific conditional parameter requirements for this action.


    ### Flow Description

    1. Decodes the provided base64 string.

    2. Determines if the file is an OLE file (MSG) or standard EML.

    3. Parses the email structure, extracting headers, body, and attachments.

    4. Extracts observed indicators (URLs, domains, emails, IPs) from the email body
    and headers.

    5. Returns the parsed data as a JSON object in the action results.
