Parse Base64 Email:
  ai_description: >-
    ### General Description

    Parses a base64-encoded EML or MSG file and extracts its contents, including headers,
    body, attachments, and observed indicators (URLs, domains, IPs, emails). The extracted
    information is returned as a structured JSON object.


    ### Flow Description

    1. Retrieves the base64-encoded email string and header filtering parameters.

    2. Decodes the base64 string into binary content.

    3. Determines if the content is an MSG (OLE file) or EML format.

    4. Parses the email structure, extracting headers, body text/HTML, and attachments.

    5. Extracts observed indicators (URLs, domains, IPs, emails) and routing information
    from the body and headers.

    6. Returns the parsed email data as a JSON object in the action results.


    ### Additional Notes

    This action operates entirely locally on the provided input string and does not
    make any external API calls or modify any case entities.
