    This action decodes a base64 encoded string and parses it as an EML file to extract
    its metadata, body content, and attachments.


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Base64 EML Blob | True | String | A base64 encoded string representing the EML
    file content to be parsed. |


    ### Action Flow

    1. Retrieves the base64 encoded EML string from the parameters.

    2. Decodes the base64 string into raw EML content.

    3. Parses the EML content to extract metadata such as sender, recipient (to, cc,
    bcc), subject, and date.

    4. Extracts the text and HTML body of the email.

    5. Iterates through the email parts to identify and extract attachments, converting
    them back to base64 blobs.

    6. Returns the parsed email data and attachments as a structured JSON result.
