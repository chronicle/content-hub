Analyze EML Headers:
  ai_description: >-
    ### General Description

    Analyzes an EML file or a list of headers to extract and evaluate email headers
    for suspicious indicators. It checks for anomalies such as mismatched 'Return-Path'
    and 'From' headers, missing 'Message-ID', and the presence of 'Bcc' or 'X-UIDL'
    headers.


    ### Flow Description

    1. Decodes the provided Base64 EML string or parses the JSON header list.

    2. Extracts headers and identifies domains and addresses from 'Received' headers.

    3. Evaluates the headers against generic security recommendations (e.g., matching
    'Return-Path' and 'From', checking for 'Bcc', 'X-UIDL', 'Message-Id').

    4. Processes the 'X-Authenticated-User' header if present.

    5. Parses any 'Authentication-Results' headers (using `mailsuite`) to record
    the SPF, DKIM, DMARC, and ARC verdicts assigned to the message by the receiving
    mail servers, adding pass/fail rows to the recommendations.

    6. Compiles the analysis results, scores, and recommendations into a JSON object
    and an HTML table.

    7. Adds the compiled results to the action's JSON output.


    ### Additional Notes

    The action requires either a Base64 EML string or a JSON list of headers to function
    properly.
  ai_short_description: >-
    Analyzes an EML file or a list of headers to extract and evaluate email headers
    for suspicious indicators.
