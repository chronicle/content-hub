  ai_description: >-
    Adds an entry to the alert scoring database by updating the alert's context properties.
    It calculates the overall alert score based on predefined ratios (e.g., 5 Low
    = 1 Medium) and updates the alert's severity and scoring information accordingly.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Name | String | Yes | The name of the check being performed on the alert. |

    | Description | String | Yes | The description of the check being performed on
    the alert. |

    | Severity | Dropdown | Yes | The severity of the check. Options: Informational,
    Low, Medium, High, Critical. |

    | Category | String | Yes | The category of the check that was performed. |

    | Source | String | No | The part of the alert that the score was derived from
    (e.g., Files, Email, User). |


    ### Flow

    1. Extracts the provided parameters.

    2. Retrieves the current alert scoring information from the alert context properties.

    3. Calculates the new score and severity based on the provided inputs and existing
    scores.

    4. Updates the alert context properties (`ALERT_SCORE_INFO`, `ALERT_SCORE`, `ALERT_SEVERITY`)
    with the new values.

    5. Returns the updated scores as a JSON result.
