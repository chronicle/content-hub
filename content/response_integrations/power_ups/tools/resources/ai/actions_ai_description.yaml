    parameters.

    2. **JSON Parsing**: The provided JSON string is parsed into a Python dictionary
    or list.

    3. **Unflattening Process**: The action iterates through the keys and values,
    splitting the keys based on the provided delimiter (or regex if empty) and reconstructing
    the nested dictionary or list structure.

    4. **Result Output**: The newly unflattened JSON object is added to the action's
    JSON result for use in subsequent playbook steps.
