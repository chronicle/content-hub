Convert Into Simulated Case:
  ai_description: >-
    ### General Description

    Converts an alert's source file content into a simulated case format. It extracts
    the raw case data from the alert's first entity, aligns the data format, and can
    push the result to the platform's simulated cases or save it as a JSON file attachment
    to the case wall.


    ### Flow Description

    1. Verifies that the action is running within an Alert scope, failing if executed
    at the Case level.

    2. Retrieves the `SourceFileContent` from the `additional_properties` of the alert's
    first entity.

    3. Parses the JSON content and modifies event and alert names based on the provided
    parameters.

    4. Aligns the case data format, including converting keys to camelCase and mapping
    enum fields.

    5. If configured, pushes the aligned case data to the platform's simulated cases
    using the internal `import_simulator_custom_case` API.

    6. If configured, attaches the generated JSON data as a file to the case wall
    using `siemplify.result.add_attachment`.

    7. Returns the generated JSON in the action result.


    ### Additional Notes

    This action is designed to work with alerts that have a specific `SourceFileContent`
    property attached to their first entity, typically passed down from a connector.
    It does not support execution at the Case playbook level.
  ai_short_description: >-
    Converts an alert's source file content into a simulated case format, with options
    to push the data to the platform's simulated cases or attach it as a JSON file
    to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
