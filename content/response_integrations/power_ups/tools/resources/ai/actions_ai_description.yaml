    servers. It retrieves reverse DNS (PTR) records for IP addresses and specific
    DNS record types for hostnames, returning the results as a JSON object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

