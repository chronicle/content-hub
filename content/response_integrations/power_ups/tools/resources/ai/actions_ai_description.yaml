  ai_description: >-
    ### General Description

    Removes a specified playbook from a case, deletes its associated result data,
    and re-attaches the playbook to trigger a fresh execution. This is useful for
    resetting and re-running playbooks within a case.


    ### Flow Description

    1. Extracts the target playbook name from the action parameters.

    2. Retrieves the PostgreSQL integration instance details to connect to the Siemplify
    orchestration and system databases.

    3. Executes SQL queries to delete existing workflow instances and action results
    associated with the specified playbook and case.

    4. Calls the SOAR API to re-attach the playbook to the case, setting it to run
    automatically.


