Change Case Name:
  ai_description: "### General Description\nThis action changes the title (name) of\
    \ the current case within Google SecOps. It is primarily used for case management\
    \ and organization, allowing playbooks to dynamically rename cases based on logic\
    \ or specific alert attributes. \n\n### Parameters Description\n| Parameter |\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| New Name\
    \ | String | No | The new title to be assigned to the case. |\n| Only If First\
    \ Alert | Boolean | No | If set to `True`, the action will only rename the case\
    \ if the current alert being processed is the chronologically first alert (based\
    \ on detection time) associated with the case. Defaults to `False`. |\n\n### Additional\
    \ Notes\n- If the `Only If First Alert` condition is not met, the action will\
    \ complete successfully but will not modify the case name.\n- This action interacts\
    \ with the internal Google SecOps API to perform the update.\n\n### Flow Description\n\
    1. **Sort Alerts:** The action retrieves all alerts associated with the current\
    \ case and sorts them by their `detected_time` to identify the chronological order.\n\
    2. **Condition Check:** It evaluates the `Only If First Alert` parameter. If `True`,\
    \ it compares the identifier of the current alert with the identifier of the first\
    \ alert in the sorted list.\n3. **Rename Case:** If the condition is met (or if\
    \ the parameter is `False`), the action calls the `rename_case` utility to update\
    \ the case title using the provided `New Name`.\n4. **Finalize:** The action returns\
    \ a success message indicating whether the title was changed or skipped based\
    \ on the alert order logic."
