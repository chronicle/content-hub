Check Entities Fields In Text:
  ai_description: >-
    This action allows for searching specific fields within each entity in the scope
    (or multiple fields using regex) and comparing them with one or more values provided
    in a text input. The action uses regular expressions to identify fields, extract
    values from those fields, and process the search data. A match is identified if
    the processed value from the entity enrichment matches any of the processed values
    in the search data.


    ### Flow Description:

    1. **Parameter Parsing:** The action parses the `FieldsInput` and `SearchInData`
    JSON strings to determine which entity fields to inspect and what data to search
    against.

    2. **Field Identification:** For each entity in the scope, the action scans its
    `additional_properties`. It identifies fields either by an exact `FieldName` or
    by matching keys against a `RegexForFieldName`.

    3. **Value Extraction:** Once a field is identified, the action retrieves its
    value. If `RegexForFieldValue` is provided, it applies the regex to the value
    to extract specific sub-strings.

    4. **Search Data Preparation:** The action processes the `SearchInData` by applying
    the provided `RegEx` to the `Data` strings to isolate the target search strings.

    5. **Comparison Logic:** The action compares the extracted entity values against
    the prepared search strings. This comparison respects the `IsCaseSensitive` toggle.

    6. **Internal Mutation (Optional):** If a match is found and `ShouldEnrichEntity`
    is configured, the action updates the entity's `additional_properties` by adding
    the specified key with a value of `True`.

    7. **Results Reporting:** The action compiles a detailed JSON result mapping entity
    identifiers to their match results and returns the count of successful matches.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | SearchInData | String (JSON) | Yes | A JSON array of objects: `[{"Data": "...",
    "RegEx": "..."}]`. Defines the text blocks to search in and the regex to apply
    to them. |

    | FieldsInput | String (JSON) | Yes | A JSON array of objects: `[{"FieldName":
    "...", "RegexForFieldName": "...", "RegexForFieldValue": "..."}]`. Defines which
    entity properties to check and how to extract values. |

    | ShouldEnrichEntity | String | No | If provided, this string is used as a key
    in the entity's additional properties. If a match is found, this key is set to
    `True`. |

    | IsCaseSensitive | Boolean | No | If set to `True`, the string comparison between
    entity values and search data will be case-sensitive. Defaults to `False`. |


    ### Additional Notes:

    - This action is primarily a logic and utility tool for cross-referencing entity
    metadata with external text or event data within a playbook.

    - The action relies heavily on the `additional_properties` attribute of entities,
    which is typically populated by previous enrichment actions.
