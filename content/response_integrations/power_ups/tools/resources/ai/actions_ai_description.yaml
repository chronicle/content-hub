    JSON structure and extracts only the relevant data points.

    6. **Insight Enrichment:** The action identifies all insights associated with
    the case. For insights that reference external data blobs, it performs additional
    internal API calls to retrieve, Base64-decode, and parse the content into the
    final JSON structure.

    7. **Final Output:** The aggregated data is returned as a JSON result for use
    in subsequent playbook steps.


