Get Certificate Details:
  ai_description: >-
    ### General Description

    Retrieves and parses the SSL/TLS certificate details for a specified URL. This
    action connects to the target host to extract certificate metadata, such as the
    issuer, common name, expiration dates, and validity status, returning the information
    as a structured JSON object.


    ### Flow Description

    1. Extracts the target URL from the action parameters.

    2. Establishes a socket connection to the specified URL on port 443 using an SSL
    context.

    3. Retrieves the peer certificate in binary form and parses it using the `cryptography.x509`
    library.

    4. Extracts key certificate details including Common Name, Subject Alternative
    Names (SAN), Issuer, expiration dates, and whether the certificate is self-signed
    or expired.

    5. Returns the parsed certificate information as a JSON result to the playbook.


    ### Additional Notes

    This action does not operate on case entities; it strictly uses the provided URL
    parameter to perform the certificate extraction.
