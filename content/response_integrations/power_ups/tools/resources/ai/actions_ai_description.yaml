Lock Playbook:
  ai_description: "### General Description\nThis action is a synchronization utility\
    \ designed to manage the execution flow of playbooks within a case. It pauses\
    \ the current playbook's execution until all playbooks associated with the chronologically\
    \ preceding alert in the same case have successfully completed. This ensures that\
    \ alerts are processed in a strict sequential order based on their creation time,\
    \ preventing race conditions or out-of-order processing logic.\n\n### Parameters\
    \ Description\nThere are no parameters for this action.\n\n### Additional Notes\n\
    - This action is marked as asynchronous (`is_async: true`), allowing it to remain\
    \ in an 'In Progress' state while waiting for previous playbooks to finish without\
    \ consuming active execution slots.\n- If the current alert is the first alert\
    \ in the case, the action completes immediately, allowing the playbook to proceed.\n\
    \n### Flow Description\n1. **Alert Retrieval:** Fetches all alerts associated\
    \ with the current case and sorts them by their creation timestamp.\n2. **Current\
    \ Alert Identification:** Locates the current alert within the sorted list to\
    \ determine its sequence.\n3. **Sequence Check:** \n    - If the current alert\
    \ is the first in the sequence (index 0), the action completes successfully.\n\
    \    - If there is a previous alert, the action identifies its unique identifier.\n\
    4. **Status Verification:** Calls the internal SOAR API to retrieve the status\
    \ of all workflow (playbook) instances associated with the previous alert.\n5.\
    \ **Locking Logic:** \n    - If any playbooks for the previous alert are not in\
    \ a 'Completed' state, the action sets its status to 'In Progress', effectively\
    \ pausing the current playbook.\n    - If all playbooks for the previous alert\
    \ are completed, the action sets its status to 'Completed', releasing the lock\
    \ and allowing the current playbook to continue."
