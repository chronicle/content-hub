Spell Check String:
  ai_description: >-
    The **Spell Check String** action analyzes a provided text string for spelling
    errors. It utilizes a spell-checking library to identify misspelled words, suggest
    corrections, and calculate an overall accuracy score for the input text.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | String | The input text string that will be checked for spelling errors. | String
    | Yes |


    ### Flow Description

    1. **Input Extraction:** The action retrieves the input string from the `String`
    parameter.

    2. **Preprocessing:** It removes punctuation from the string using regular expressions
    and splits the text into individual words.

    3. **Spelling Analysis:** The action identifies misspelled words by comparing
    them against a dictionary using the `spellchecker` library.

    4. **Correction Generation:** For each misspelled word, the action attempts to
    find the most likely correction and builds a 'corrected' version of the original
    string.

    5. **Metrics Calculation:** It calculates the total word count, the number of
    misspelled words, and an accuracy percentage.

    6. **Result Output:** The action returns the accuracy percentage as the main result
    and provides a detailed JSON object containing the original string, corrected
    string, and a list of specific errors found.


    ### Additional Notes

    - If the input string is empty, the action returns an accuracy of 0 and a message
    indicating no input was provided.

    - This action is a local utility and does not communicate with external APIs.
  capabilities:
    can_create_case_comments: false
