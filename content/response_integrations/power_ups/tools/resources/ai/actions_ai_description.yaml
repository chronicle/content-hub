Append to Context Value:
  ai_description: >-
    ### General Description

    Appends a specified value to an existing context property or creates a new context
    property if it does not already exist. This action allows analysts and playbooks
    to dynamically build lists or concatenated strings within the context of an Alert,
    Case, or Global scope.


    ### Flow Description

    1. Extracts the target scope (Alert, Case, or Global), property key, value to
    append, and delimiter from the action parameters.

    2. Retrieves the existing context property based on the specified scope and key.

    3. If the property already exists, appends the new value to the existing value
    using the provided delimiter.

    4. If the property does not exist, creates a new context property with the specified
    key and value.

    5. Saves the updated context property back to the platform.


    ### Additional Notes

