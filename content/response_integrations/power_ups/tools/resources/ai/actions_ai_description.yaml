  ai_description: >-
    ### General Description

    This utility action allows for the comparison of specific entity fields against
    a provided text block using regular expressions. It is designed to identify matches
    between threat intelligence or enrichment data already associated with entities
    and external text data (such as email bodies, logs, or event descriptions). The
    action can optionally tag entities that meet the match criteria with a custom
    property.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | SearchInData | string | True | A JSON array of objects containing the text to
    search in and an optional regex to pre-process that text. Format: `[{"Data": "text",
    "RegEx": "pattern"}]`. |

    | FieldsInput | string | True | A JSON array of objects defining which entity
    fields to extract and compare. Supports direct field names or regex patterns for
    field names and values. Format: `[{"FieldName": "name", "RegexForFieldName": "pattern",
    "RegexForFieldValue": "pattern"}]`. |

    | ShouldEnrichEntity | string | False | If provided, this string will be used
    as a key in the entity's additional properties, set to `True` if a match is found.
    |

    | IsCaseSensitive | boolean | False | Determines if the string comparison between
    the entity field and the search data should be case-sensitive. Default is `false`.
    |


    ### Additional Notes

    - The action primarily interacts with the `additional_properties` attribute of
    entities.

    - If `ShouldEnrichEntity` is configured, the action will perform an internal mutation
    by updating the entity's properties in Google SecOps.


    ### Flow Description

    1. **Initialization**: Parses the input JSON parameters (`FieldsInput` and `SearchInData`)
    and matching configurations.

    2. **Data Extraction**: Iterates through all entities in the current scope. For
    each entity, it extracts values from `additional_properties` based on the provided
    `FieldName` or `RegexForFieldName`. If `RegexForFieldValue` is provided, it further
    filters the extracted value.

    3. **Search Preparation**: Processes the `SearchInData` by applying the specified
    regex to the raw text strings to isolate the relevant content for comparison.

    4. **Comparison**: Performs a substring match check between the extracted entity
    values and the processed search strings, respecting the `IsCaseSensitive` flag.

    5. **Internal Update**: If a match is found and `ShouldEnrichEntity` is set, the
    action adds the specified key to the entity's properties.

    6. **Finalization**: Updates the entities in the system, attaches a detailed JSON
    result of all matches, and returns the count of successfully matched entities.
