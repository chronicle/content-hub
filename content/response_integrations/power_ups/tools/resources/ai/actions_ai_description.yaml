Delay Playbook:
  ai_description: >-
    ### General Description

    Temporarily pauses the execution of a playbook for a specified duration (days,
    hours, minutes, and seconds). This is a utility action used to introduce a wait
    period before subsequent playbook steps are executed.


    ### Flow Description

    1. Retrieves the specified delay duration from the action parameters (Seconds,
    Minutes, Hours, Days).

    2. Calculates the target completion date and time by adding the specified delay
    to the current UTC time.

    3. Evaluates if the current time has reached or surpassed the target date.

    4. If the target date is reached, the action completes successfully.

    5. If the target date is not yet reached, the action suspends itself (running
    asynchronously) and re-evaluates at a later time until the target date is met.


    ### Additional Notes

    This is an asynchronous action that operates entirely within the SOAR platform.
    It does not interact with external systems, fetch data, or manipulate case entities.
  ai_short_description: >-
    Temporarily pauses the execution of a playbook for a specified duration by calculating
