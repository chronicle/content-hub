  ai_description: "### General Description\nThis action pauses the execution of a\
    \ playbook for a specified duration or until a specific time defined by a cron\
    \ expression. It is an asynchronous action that allows for precise control over\
    \ playbook timing, useful for waiting for external processes to complete or scheduling\
    \ tasks for specific windows.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Seconds | string\
    \ | No | The number of seconds to delay the playbook. Default is 0. |\n| Minutes\
    \ | string | No | The number of minutes to delay the playbook. Default is 1. |\n\
    | Hours | string | No | The number of hours to delay the playbook. Default is\
    \ 0. |\n| Days | string | No | The number of days to delay the playbook. Default\
    \ is 0. |\n| Cron Expression | string | No | A standard cron expression (e.g.,\
    \ `0 12 * * *`) used to determine the next execution time. If provided, this parameter\
    \ takes precedence over the relative time parameters (Seconds, Minutes, etc.).\
    \ |\n\n### Additional Notes\n- This action is asynchronous (`is_async: true`).\
    \ It will put the playbook step into an 'In Progress' state until the calculated\
    \ time is reached.\n- If both relative time parameters and a Cron Expression are\
    \ provided, the Cron Expression is prioritized.\n\n### Flow Description\n1. **Initialization**:\
    \ The action retrieves the time parameters or the cron expression from the input.\n\
    2. **Target Calculation**: \n    - If a **Cron Expression** is provided, the action\
    \ calculates the next occurrence of that expression relative to the current time.\n\
    \    - If no cron expression is provided, the action calculates a **Target Date**\
    \ by adding the specified Seconds, Minutes, Hours, and Days to the current UTC\
    \ time.\n3. **Execution Check**: The action compares the current time with the\
    \ calculated target time.\n4. **State Management**:\n    - If the target time\
    \ has **not** been reached, the action returns an `INPROGRESS` state and stores\
    \ the target timestamp in the action's internal state (`additional_data`).\n \
    \   - The SOAR platform will periodically re-invoke the action's `wait` logic.\n\
    \    - Once the current time meets or exceeds the target timestamp, the action\
    \ returns a `COMPLETED` state, allowing the playbook to proceed."
