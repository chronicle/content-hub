Get Context Value:
  ai_description: >-
    ### General Description

    The **Get Context Value** action is a utility designed to retrieve specific data
    points (values) stored within the Google SecOps platform's context. It allows
    playbooks to access variables that were previously saved at different levels of
    granularity: the specific alert, the overall case, or a global system-wide scope.
    This is particularly useful for passing data between different playbook steps
    or maintaining state across multiple alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Scope** | DDL | Yes | Specifies the context level to search. Options are `Alert`
    (current alert context), `Case` (entire case context), or `Global` (system-wide
    context). |

    | **Key** | String | Yes | The unique identifier (name) of the property/value
    you wish to retrieve. |


    ### Flow Description

    1. **Parameter Extraction**: The action identifies the target `Key` and the desired
    `Scope` from the input parameters.

    2. **Context Query**: Depending on the selected `Scope`, the action performs one
    of the following:
        * **Alert**: Calls the internal method to retrieve a property from the current
    alert's context.
        * **Case**: Calls the internal method to retrieve a property from the current
    case's context.
        * **Global**: Queries the global context store using the reserved "GLOBAL"
    identifier.
    3. **Data Sanitization**: If a value is successfully retrieved, the action strips
    any surrounding double quotes to ensure the raw string value is returned to the
    playbook.

    4. **Result Reporting**: The retrieved value is set as the action's result. If
    the key is found, a success message is generated; otherwise, it reports that the
    value was not found for the specified key and scope.


    ### Additional Notes

    * This action is strictly read-only and does not modify any context values or
    external systems.

    * If the key does not exist in the specified scope, the action will return an
    empty result value and a 'Not found' message.
