Extract URL Domain:
  ai_description: >-
    ### General Description

    Extracts the domain or subdomain from URL strings and entity identifiers. It enriches
    the processed entities by adding the extracted domain to their additional properties
    and returns the results in a JSON format. It can also process a manually provided
    list of URLs.


    ### Flow Description

    1. Retrieves the provided URLs, separator, and subdomain extraction preference
    from the action parameters.

    2. If URLs are provided, splits them using the separator and extracts the domain
    or subdomain for each.

    3. Iterates through all target entities in the case.

    4. Extracts the domain or subdomain from each entity's identifier using the `tldextract`
    library.

    5. Enriches successful entities by adding the extracted domain to their `additional_properties`
    under the key `siemplifytools_extracted_domain`.

    6. Updates the enriched entities within the Google SecOps platform.

    7. Returns a JSON object containing the extraction results for both the provided
    URLs and the processed entities.


    ### Additional Notes

    If an entity does not contain a valid domain (e.g., a file hash or an IP address),
    it will be skipped without enrichment. The action performs local string manipulation
    and does not make any external API calls.
