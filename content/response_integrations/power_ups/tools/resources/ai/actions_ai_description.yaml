    within a Google SecOps playbook by setting key-value pairs in a specific context
    scope. This is primarily used to pass information between different steps of a
    playbook or to maintain state across different alerts and cases.\n\n### Parameters
    Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| **Key** | String | Yes | The name of the property/key to be set in
    the context. |\n| **Value** | String | Yes | The value to be assigned to the specified
