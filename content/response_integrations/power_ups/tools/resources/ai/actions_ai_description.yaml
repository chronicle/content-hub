Add Or Update Alert Additional Data:
  ai_description: "### General Description\nThis action allows for the dynamic addition\
    \ or modification of metadata stored within an alert's `additional_data` field\
    \ in Google SecOps. It is designed to facilitate state management and data persistence\
    \ across different stages of a playbook by allowing users to store structured\
    \ JSON or plain text directly on the alert object.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Json Fields | string | Yes | The data to be added or updated. This can be a\
    \ JSON-formatted string (representing a Dictionary or List) or plain text. If\
    \ a JSON dictionary is provided, it updates the existing dictionary; if a list\
    \ is provided, it appends to the existing list; otherwise, it populates a general\
    \ 'data' field. |\n\n### Additional Notes\n- The action maintains a specific internal\
    \ structure within the alert's additional data, categorizing inputs into `list`,\
    \ `dict`, or `data` keys to prevent data loss during updates.\n- If the `Json\
    \ Fields` parameter contains invalid JSON, the action will treat the entire input\
    \ as a raw string.\n\n### Flow Description\n1. **Input Retrieval**: The action\
    \ retrieves the value from the `Json Fields` parameter.\n2. **Data Parsing**:\
    \ It attempts to parse the input string into a JSON object (dictionary or list).\
    \ If parsing fails, the input is treated as a standard string.\n3. **Context Retrieval**:\
    \ The action fetches the current alert's existing `additional_data` from Google\
    \ SecOps.\n4. **Merging Logic**: \n    - If the input is a **list**, it is appended\
    \ to the existing list in the alert data.\n    - If the input is a **dictionary**,\
    \ it updates the existing dictionary in the alert data.\n    - If the input is\
    \ a **string**, it overwrites the 'data' field in the alert data.\n5. **Internal\
    \ Update**: The action calls the Google SecOps API to update the alert's `additional_data`\
    \ with the newly merged structure.\n6. **Result Output**: The final accumulated\
    \ data is returned as a JSON result and the action completes."
  capabilities:
