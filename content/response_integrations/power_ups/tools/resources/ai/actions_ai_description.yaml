  ai_description: >-
    General Description: The **Normalize Entity Enrichment** action is a utility designed
    to standardize the naming of enrichment data stored within an entity's `additional_properties`.
    It allows users to map existing, potentially inconsistent field names (e.g., from
    different threat intelligence providers) to a unified schema within the Google
    SecOps SOAR environment.


    Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Normalization Data | string | Yes | A JSON-formatted string containing a list
    of mapping objects. Each object must include 'entitiy_field_name' (the current
    key in the entity's additional properties) and 'new_name' (the target normalized
    key name). |


    Flow Description:

    1. Input Parsing: The action retrieves the `Normalization Data` parameter and
    parses it from a JSON string into a Python list of dictionaries.

    2. Entity Iteration: The script iterates through all `target_entities` currently
    in the action's scope.

    3. Property Mapping: For each entity, it checks if the specified `entitiy_field_name`
    exists within the entity's `additional_properties` dictionary.

    4. Value Assignment: If the source key is found, its value is copied to a new
    key defined by `new_name`. If the source key is missing, the action initializes
    the `new_name` key with an empty string.

    5. Internal Update: The action collects all processed entities and uses the `update_entities`
    method to commit the changes back to the SOAR case.


    Additional Notes: This action does not delete or replace the original keys; it
    creates new keys with the mapped names, effectively duplicating the data under
    a normalized header. If the `new_name` already exists on the entity, it will be
    overwritten by the value from `entitiy_field_name` if that source field is present.
