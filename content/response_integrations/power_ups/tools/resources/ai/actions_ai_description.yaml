    1. **Initialization:** The action extracts the Case ID, requested fields, and
    the nested key delimiter from the input parameters.

    2. **Validation:** It verifies that the 'Nested Keys Delimiter' is not a comma
    to avoid conflicts with the field list parsing.

    3. **Case Data Retrieval:** The action calls the internal SOAR API to fetch the
    full overview of the case, including metadata and alert cards.

