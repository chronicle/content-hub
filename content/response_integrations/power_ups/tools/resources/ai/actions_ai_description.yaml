Update Case Description:
  ai_description: >-
    Updates the description of the current case in Google SecOps. This action allows
    analysts or automated playbooks to programmatically change the high-level summary
    of a case to reflect new findings or status updates.


    ### Flow Description

    1. **Parameter Retrieval**: The action retrieves the provided 'Case Description'
    string from the input parameters.

    2. **Context Identification**: It identifies the unique identifier (Case ID) of
    the case currently being processed.

    3. **API Execution**: It utilizes the internal SOAR API (`change_case_description`)
    to submit the update request to the Google SecOps platform.

    4. **Completion**: The action concludes by providing a success message confirming
    the new description has been applied.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case Description | String | Yes | The new text that will replace the existing
    description of the case. |


    ### Additional Notes

    - This action modifies internal case metadata and does not interact with external
    third-party integrations.
