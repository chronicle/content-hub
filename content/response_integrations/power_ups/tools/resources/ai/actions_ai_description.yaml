  ai_description: >-
    ### General Description

    This action adds an entry to an internal alert scoring database stored within
    the alert's context properties. It is designed to aggregate multiple security
    checks into a single, weighted alert score and severity level. The scoring logic
    follows a specific ratio: 5 Low = 1 Medium, 3 Medium = 1 High, and 2 High = 1
    Critical. This allows for a granular yet consolidated view of risk within a single
    alert.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Name** | string | Yes | The name of the specific check being performed (e.g.,
    'Malicious URL Check'). |

    | **Description** | string | Yes | A detailed description of the check and its
    findings. |

    | **Severity** | ddl | Yes | The severity of this specific check. Options: Informational,
    Low, Medium, High, Critical. |

    | **Category** | string | Yes | The category used to group related checks (e.g.,
    'Phishing', 'Malware'). |

    | **Source** | string | No | The specific part of the alert the score was derived
    from, such as 'Files', 'Email', or 'User'. |


    ### Flow Description

    1. **Data Retrieval**: The action retrieves existing scoring information from
    the alert's context property `ALERT_SCORE_INFO`.

    2. **Score Processing**: It parses the existing JSON data and appends the new
    score entry to the specified category. If the category does not exist, a new one
    is created.

    3. **Weighted Calculation**: The action recalculates the score for each category
    and the overall alert using a weighted ratio logic (e.g., multiple lower-severity
    findings can escalate the overall alert severity).

    4. **Context Update**: It updates three alert context properties: `ALERT_SCORE_INFO`
    (the full JSON audit trail), `ALERT_SCORE` (the numeric aggregate score), and
    `ALERT_SEVERITY` (the string representation of the aggregate score).

    5. **Result Output**: The action returns the updated scoring structure as a JSON
    result and sets the final action output to the calculated alert severity.


    ### Additional Notes

    This action does not interact with external APIs; it functions entirely within
    the Google SecOps environment to manage alert-level metadata.
