    The **Get Case Data** action retrieves comprehensive information for a specific
    case within Google SecOps and returns it as a structured JSON object. This data
    includes comments, entity information, insights, playbooks, alert details, and
    events. It is primarily used as a utility to gather context for playbook logic
    or to export case details to external systems.


