  ai_description: "### General Description\nThis action synchronizes playbook execution\
    \ by pausing the current playbook until a specified playbook or block, running\
    \ on the same alert, reaches a terminal state. It is primarily used to manage\
    \ dependencies between parallel processes within the same security alert context.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Playbook Name | String | Yes | The exact name\
    \ of the playbook or block that the current execution should wait for. |\n\n###\
    \ Flow Description\n1. **Initialization**: The action retrieves the target playbook\
    \ name from the input parameters.\n2. **Status Retrieval**: It queries the Google\
    \ SecOps API to fetch the status of all workflow instances associated with the\
    \ current alert group.\n3. **Status Evaluation**: \n    * If the target playbook\
    \ is in a terminal state (**Completed**, **Failed**, or **Terminated**), the action\
    \ completes successfully, allowing the current playbook to proceed.\n    * If\
    \ the target playbook is still active (**In Progress**, **Pending in Queue**,\
    \ or **Pending for User**), the action sets its own state to 'In Progress'. Because\
    \ the action is asynchronous, it will periodically re-evaluate until the condition\
    \ is met.\n    * If the target playbook is not found, the action completes to\
    \ avoid a permanent deadlock.\n4. **Completion**: Once the target playbook finishes,\
    \ the 'lock' is released and the current playbook continues its next steps."
