Re-Attach Playbook:
  ai_description: "Re-attaches a specified playbook to a case, effectively resetting\
    \ its execution state and allowing it to run again from the beginning. This action\
    \ is primarily used for troubleshooting or re-triggering automation that may have\
    \ failed or needs to be executed again with updated context.\n\n### Parameters\
    \ Description\n\n| Parameter Name | Type | Mandatory | Description |\n| :--- |\
    \ :--- | :--- | :--- |\n| Playbook Name | playbook_name | Yes | The exact name\
    \ of the playbook that will be removed from the case and then re-attached to trigger\
    \ a fresh execution. |\n\n### Flow Description\n\n1. **Configuration Retrieval:**\
    \ The action identifies and retrieves connection details for the 'PostgreSQL'\
    \ integration instance named 'Siemplify'.\n2. **Database Connection:** It establishes\
    \ connections to two internal databases: `siemplify_orchestration_db` (for workflow\
    \ state) and `siemplify_system_db` (for action results).\n3. **State Identification:**\
    \ The action queries the databases to find all existing instances and results\
    \ associated with the specified playbook name and the current Case ID.\n4. **Cleanup:**\
    \ It executes SQL DELETE commands to remove the identified workflow instances\
    \ and their corresponding action results, clearing the previous execution history\
    \ for that playbook in the context of the case.\n5. **Re-attachment:** Finally,\
    \ it utilizes the SOAR API to programmatically attach the playbook back to the\
    \ case (specifically to the relevant alerts), which triggers the playbook to start\
    \ running again automatically.\n\n### Additional Notes\n\n* This action requires\
    \ the **PostgreSQL** integration to be installed and configured with an instance\
    \ named **Siemplify** pointing to the SOAR's backend database. \n* This action\
    \ does not process entities; it operates at the Case and Playbook management level."
