  ai_description: >-
    This action dynamically adds or updates information within the 'Additional Data'
    field of a Google SecOps alert. It serves as a flexible storage mechanism for
    data collected during a playbook's execution, allowing subsequent actions to access
    this accumulated context. The action supports structured JSON (dictionaries and
    lists) as well as plain text. ### Parameters Description | Parameter | Type |
    Mandatory | Description | | :--- | :--- | :--- | :--- | | Json Fields | string
    | Yes | The data to be added to the alert. This can be a raw string, a JSON-formatted
    dictionary, or a JSON-formatted list. If a dictionary is provided, it is merged
    into the existing 'dict' key. If a list is provided, it is appended to the 'list'
    key. Any other input is stored in the 'data' key. | ### Additional Notes - The
    action automatically initializes a structured schema within the alert's additional
    data if it doesn't exist, containing 'dict', 'list', and 'data' keys. - If the
    input string is not valid JSON, it will be treated as a standard string and stored
    in the 'data' field. ### Flow Description 1. Input Parsing: The action retrieves
    the 'Json Fields' parameter and attempts to parse it as a JSON object (dictionary
    or list). If parsing fails, it treats the input as a raw string. 2. Data Retrieval:
    It fetches the current alert's existing 'additional_data' content. 3. Structure
    Normalization: If the existing data is empty or lacks the standard keys ('dict',
    'list', 'data'), the action initializes them to ensure a consistent data structure.
    4. Data Merging: - If the input is a List, it extends the existing list in the
    alert data. - If the input is a Dictionary, it updates the existing dictionary
    in the alert data with the new key-value pairs. - If the input is a String, it
    overwrites the 'data' field with the new value. 5. Internal Update: The action
    calls the Google SecOps API to update the alert's metadata with the newly merged
    JSON structure. 6. Output: The final accumulated data is returned as a JSON result
    for use in the playbook.
