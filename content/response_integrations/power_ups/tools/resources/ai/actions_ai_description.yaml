Normalize Entity Enrichment:
  ai_description: >-
    ### General Description

    Normalizes entity enrichment data by renaming specific keys within the entity's
    additional properties. This action allows users to map existing enrichment fields
    to new, standardized field names, ensuring consistency across playbook executions.


    ### Flow Description

    1. Retrieves and parses the JSON mapping provided in the `Normalization Data`
    parameter.

    2. Iterates through all target entities associated with the current execution
    scope.

    3. For each entity, iterates through the provided key mappings.

    4. Checks if the original field name (`entitiy_field_name`) exists in the entity's
    `additional_properties`.

    5. If the field exists, copies its value to the new field name (`new_name`). If
    it does not exist, initializes the new field name with an empty string.

    6. Saves the changes by updating the entities within the Google SecOps platform.


    ### Additional Notes

    - This action does not delete the original keys; it only copies their values to
    the new keys.

    - If a target entity lacks a specified original key, the action will still create
    the new key and assign it an empty string to maintain a consistent data structure.
