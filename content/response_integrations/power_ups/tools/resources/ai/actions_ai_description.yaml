Look-A-Like Domains:
  ai_description: >-
    ### General Description

    The **Look-A-Like Domains** action identifies potential typosquatting or phishing
    attempts by comparing domain entities within a case against a list of authorized
    or internal domains configured for the specific environment. It uses the Levenshtein
    distance algorithm to detect subtle variations in domain names that might indicate
    malicious intent.


    ### Parameters Description

    There are no user-configurable parameters for this action.


    ### Flow Description

    1. **Fetch Environment Domains:** The action retrieves a list of internal or authorized
    domains associated with the current environment from the Google SecOps platform
    using internal API calls.

    2. **Entity Filtering:** It identifies all entities of type `DOMAIN` within the
    current case context.

    3. **Similarity Analysis:** For each domain entity, it calculates the edit distance
    against the list of environment domains using the `nltk.edit_distance` method.

    4. **Threshold Evaluation:** If the edit distance is between 1 and 3 (inclusive),
    the domain is considered a 'look-alike'.

    5. **Enrichment and Flagging:** Entities identified as look-alikes are marked
    as suspicious (`is_suspicious = True`) and enriched with the matching domain name
    in their `additional_properties` field.

    6. **Result Reporting:** The action updates the entities in the platform and provides
    a JSON result mapping each entity to its identified look-alike domains.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates domain entities by marking them as suspicious and adding the 'look_a_like_domain'
      property to their metadata.
