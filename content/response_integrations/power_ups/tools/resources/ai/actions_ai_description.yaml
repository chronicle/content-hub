Create Entity Relationships:
  ai_description: >-
    Creates relationships between entities within a Google SecOps case. This action
    allows users to define connections between a set of 'Entity Identifiers' and 'Target
    Entities' already present in the alert. If the specified 'Entity Identifiers'
    do not exist in the system, the action will create them automatically. It supports
    three types of relationships: Source, Destination, and Linked. Additionally, users
    can provide a JSON object to enrich the newly created or linked entities with
    custom attributes.


    ### Flow Description:

    1. **Parameter Extraction:** The action parses the input identifiers, entity types,
    relationship direction (Connect As), and optional enrichment JSON.

    2. **Target Identification:** It scans the current alert to find existing entities
    that match the 'Target Entity Type' and, if provided, the 'Target Entity Identifier(s)'.

    3. **Entity Creation & Linking:** For each provided identifier, the action uses
    the internal SOAR API to create the entity (if missing) and establish the relationship
    to the identified target entities.

    4. **Enrichment:** If an 'Enrichment JSON' is provided, the action reloads the
    case data, identifies the relevant entities, and updates their additional properties
    with the provided key-value pairs.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Identifier(s) | String | Yes | A comma-separated list of entity values
    to create or link. |

    | Entity Identifier(s) Type | Entity Type | Yes | The Siemplify entity type for
    the identifiers provided (e.g., USERUNIQNAME, HOSTNAME). |

    | Connect As | DDL | Yes | Defines the relationship direction: 'Source', 'Destination',
    or 'Linked'. |

    | Target Entity Type | Entity Type | Yes | The type of existing entities in the
    alert to which the new entities should be linked. |

    | Target Entity Identifier(s) | String | No | A comma-separated list of specific
    existing entity values to link to. If empty, links to all entities of the 'Target
    Entity Type'. |

    | Enrichment JSON | String | No | A JSON object containing key/value pairs to
    add as attributes to the entities. |

    | Separator Character | String | No | The character used to split the identifier
    lists. Defaults to a comma. |
