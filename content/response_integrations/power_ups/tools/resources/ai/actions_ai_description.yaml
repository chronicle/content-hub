Unflatten JSON:
  ai_description: >-
    Unflattens a JSON object or a list of JSON objects by converting delimited keys
    into nested structures. This utility action is designed to restore the original
    hierarchy of data that has been flattened (e.g., for CSV export or simplified
    storage) back into its native nested format.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the mandatory `JSON Object`
    string and the optional `Delimiter` from the input parameters.

    2. **JSON Parsing:** The input string is converted into a Python data structure
    (dictionary or list).

    3. **Unflattening Logic:** The action recursively processes the data. For each
    key in a dictionary, it splits the key name into tokens using the provided delimiter.
    If no delimiter is specified, it uses a regular expression to split by any non-alphanumeric
    character (excluding underscores).

    4. **Structure Reconstruction:** It reconstructs the nested hierarchy. If a token
    is identified as a digit, the action creates a list at that level; otherwise,
    it creates a dictionary.

    5. **Result Output:** The final nested JSON structure is attached to the action
    results for use in subsequent playbook steps.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON Object | string | Yes | The flattened JSON string that needs to be converted
    back to a nested format. |

    | Delimiter | string | No | The character used to separate nested keys (e.g.,
    '.', '_'). If left empty, the action separates keys by every value that is not
    a letter, number, or underscore. |


    ### Additional Notes:

    - The action handles both individual JSON objects and lists of objects.

    - If the provided `JSON Object` is not a valid JSON string, the action will return
    a failure status with a specific error message regarding the JSON structure.
