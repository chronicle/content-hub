Normalize Entity Enrichment:
  ai_description: >-
    ### General Description

    Normalizes entity enrichment data by mapping existing fields in an entity's `additional_properties`
    to new, standardized keys. This action is primarily used to maintain data consistency
    across different enrichment sources within a playbook by renaming or aliasing
    internal entity attributes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Normalization Data | String | Yes | A JSON string representing a list of mapping
    objects. Each object must contain `entitiy_field_name` (the source key currently
    in `additional_properties`) and `new_name` (the target key to be created). |


    ### Additional Notes

    * The action expects a valid JSON array of objects as input for the `Normalization
    Data` parameter.

    * If a source field specified in the mapping is not found on an entity, the target
    field will be created with an empty string value (unless the target key already
    exists).

    * This action does not remove the original fields; it creates or updates the new
    keys with the values from the source fields.


    ### Flow Description

    1. **Retrieve Configuration:** The action fetches the `Normalization Data` JSON
    string from the input parameters.

    2. **Parse Mappings:** The JSON string is parsed into a list of source-to-target
    mapping pairs.

    3. **Iterate Entities:** The action iterates through all entities currently in
    the playbook scope (`target_entities`).

    4. **Apply Normalization:** For each entity, it checks the `additional_properties`
    for the presence of the source fields defined in the mappings.

    5. **Update Properties:** If a source field is found, its value is assigned to
    the new field name. If not found, and the new field name doesn't exist, it initializes
    the new field with an empty string.

    6. **Persist Changes:** The action updates the entities within the Google SecOps
    platform to save the modified `additional_properties`.
