    ### General Description


    The **Buffer** action is a utility tool within the Tools integration designed
    to facilitate data handling and flow control within playbooks. Its primary purpose
    is to receive a JSON string and a result value as inputs and 'buffer' them into
    the action's output. This is particularly useful for converting string-based JSON
    data into a structured format that subsequent playbook actions can easily consume,
    or for explicitly setting the result value of a step to control playbook logic
    flow.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON** | String | No | A JSON-formatted string. If provided, the action attempts
    to parse this string and include the resulting object in the action's JSON results.
    |

    | **ResultValue** | String | No | A string value that will be returned as the
    primary result of the action. This is often used for conditional branching in
    playbooks. |


    ### Flow Description


    1. **Parameter Retrieval:** The action starts by retrieving the `JSON` and `ResultValue`
    inputs from the playbook context.

    2. **JSON Parsing:** If the `JSON` parameter is populated, the script attempts
    to deserialize the string into a structured JSON object using `json.loads()`.

    3. **Result Attachment:** If parsing is successful, the structured data is added
    to the action's result JSON using `add_result_json` and `add_json` (under the
    key 'Json'). If parsing fails, an error message is appended to the final output
    message.

    4. **Action Completion:** The action concludes by calling `siemplify.end()` with
    a status message and the provided `ResultValue`.
