Add Alert Scoring Information:
  ai_description: >-
    This action adds an entry to an internal alert scoring database stored within
    the alert's context properties. It calculates a cumulative risk score for the
    alert based on a weighted ratio system: 5 Low severities equal 1 Medium, 3 Mediums
    equal 1 High, and 2 Highs equal 1 Critical. The action updates the alert's overall
    score and severity level based on these calculations.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | The name of the specific check or rule being performed
    on the alert. |

    | Description | string | Yes | A detailed description of the check being performed.
    |

    | Severity | ddl | Yes | The severity assigned to this specific check. Options:
    Informational, Low, Medium, High, Critical. |

    | Category | string | Yes | The category of the check (e.g., 'Malware', 'Phishing').
    Scores are grouped by category. |

    | Source | string | No | Optional. The specific part of the alert the score was
    derived from, such as 'Files', 'Email', or 'User'. |


    ### Flow Description


    1. **Extract Parameters:** The action retrieves the check name, description, category,
    severity, and optional source from the input.

    2. **Retrieve Existing Data:** It fetches the current scoring information (`ALERT_SCORE_INFO`)
    from the alert's context properties. If none exists, it initializes an empty list.

    3. **Update Scoring Information:** It appends the new score entry to the appropriate
    category. If the category doesn't exist, it creates a new one.

    4. **Calculate Scores:** It recalculates the score for each category and the overall
    alert score using the defined ratio logic (e.g., 5 Low = 1 Medium).

    5. **Persist Data:** The action updates the alert context properties: `ALERT_SCORE_INFO`
    (the full JSON list of scores), `ALERT_SCORE` (the numeric risk level), and `ALERT_SEVERITY`
    (the string representation of the risk level).

    6. **Output Results:** It returns a JSON representation of the updated scoring
    structure and sets the action's final result to the new alert severity.
  capabilities:
