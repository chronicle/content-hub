    input parameters.

    2. **Data Retrieval**: It calls the internal Google SecOps API (`get_case_overview_details`)
    to fetch the metadata for the current case.

    3. **SLA Extraction**: The logic extracts the `slaExpirationTime` and `criticalExpirationTime`
    from the case or stage SLA data.

    4. **Formatting**: The Unix timestamps are converted into the specified human-readable
    format.

    5. **Output**: The action returns a JSON object containing both the raw Unix timestamps
    and the formatted strings, and sets the action output message with the formatted
    values.


    ### Additional Notes

    - If no SLA is set for the case, the action will fail with a specific error message
    indicating that the SLA was not set.
