Add Alert Scoring Information:
  ai_description: >-
    ### General Description

    Adds an entry to the internal alert scoring database and recalculates the overall
    alert severity. This action evaluates the provided check details, appends them
    to the alert's existing scoring context, and computes a new severity score based
    on predefined escalation thresholds.


    ### Flow Description

    1. Extracts the check name, description, category, severity, and source from the
    action parameters.

    2. Retrieves the current alert scoring information from the alert's context properties
    (`ALERT_SCORE_INFO`).

    3. Appends the new scoring check to the specified category within the scoring
    data.

    4. Recalculates the overall alert score based on predefined thresholds (e.g.,
    5 Low = 1 Medium, 3 Medium = 1 High, 2 High = 1 Critical).

    5. Updates the alert context properties (`ALERT_SCORE_INFO`, `ALERT_SCORE`, `ALERT_SEVERITY`)
    with the newly computed values.

    6. Returns the updated scoring data as a JSON result.


    ### Additional Notes

    This action operates entirely within the Google SecOps platform and does not interact
    with external APIs. It is used to dynamically adjust an alert's severity based
    on automated checks and findings during a playbook run.
  ai_short_description: >-
    Adds a new scoring entry to an alert and recalculates its overall severity based
    on predefined thresholds, updating the alert's context properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the alert's internal context properties with new scoring information
      and recalculated severity.
    reasoning: >-
      The action does not fetch data from or mutate data in external systems. It mutates
      internal data by setting alert context properties (`ALERT_SCORE_INFO`, `ALERT_SCORE`,
      `ALERT_SEVERITY`) using `siemplify.set_alert_context_property`. It does not
      update entities, create insights, or add case comments.
