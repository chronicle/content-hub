Delay Playbook:
  ai_description: >-
    ### General Description

    The **Delay Playbook** action is a utility tool designed to pause the execution
    of a playbook for a specified duration. It leverages the asynchronous execution
    capabilities of the Google SecOps SOAR platform to wait for a calculated amount
    of time before allowing the workflow to proceed to the next step. This is particularly
    useful for scenarios requiring a cooling-off period, waiting for external processes
    to complete, or throttling automated responses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Seconds** | string | Yes | The number of seconds to add to the delay. Defaults
    to "0". |

    | **Minutes** | string | Yes | The number of minutes to add to the delay. Defaults
    to "1". |

    | **Hours** | string | Yes | The number of hours to add to the delay. Defaults
    to "0". |

    | **Days** | string | Yes | The number of days to add to the delay. Defaults to
    "0". |


    ### Additional Notes

    * This action is **asynchronous**. It does not block the execution engine but
    rather schedules itself to be checked periodically until the time condition is
    met.

    * The total delay time is the sum of all provided parameters (Days + Hours + Minutes
    + Seconds).

    * If all parameters are set to "0", the action will complete immediately.


    ### Flow Description

    1. **Initialization**: The action retrieves the delay values from the input parameters.

    2. **Target Calculation**: It calculates a `target_date` by adding the specified
    days, hours, minutes, and seconds to the current UTC time.

    3. **Immediate Completion Check**: If the calculated `target_date` is in the past
    or equal to the current time, the action completes immediately with a success
    status.

    4. **Asynchronous Wait**: If the `target_date` is in the future, the action enters
    an `IN_PROGRESS` state and stores the target timestamp in the `additional_data`
    field.

    5. **Periodic Re-evaluation**: The SOAR framework periodically invokes the `wait`
    logic. The script parses the stored timestamp and compares it against the current
    UTC time.

    6. **Finalization**: Once the current time meets or exceeds the `target_date`,
    the action transitions to a `COMPLETED` state, allowing the playbook to continue.
