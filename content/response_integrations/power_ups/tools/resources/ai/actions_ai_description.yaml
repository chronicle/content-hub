  ai_description: >-
    ### General Description

    The **Create Entities with Separator** action allows users to dynamically create
    multiple entities and attach them to a specific alert within Google SecOps. It
    takes a delimited string of identifiers, splits them based on a user-defined separator,
    and creates new entities of a specified type. Additionally, it can populate the
    created entities with custom enrichment data provided in JSON format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entities Identifiers | String | Yes | A string containing one or more entity
    identifiers to be created, separated by the defined separator. |

    | Entity Type | Entity Type | Yes | The Google SecOps entity type to assign to
    the new entities (e.g., HOSTNAME, USERNAME, ADDRESS). |

    | Is Internal | Boolean | No | If set to true, the created entities will be marked
    as part of the internal network. Defaults to false. |

    | Entities Separator | String | Yes | The character used to split the 'Entities
    Identifiers' string. Defaults to a comma (','). |

    | Enrichment JSON | Code | No | A JSON object containing key-value pairs to be
    added to the entity's 'additional_properties'. |

    | PrefixForEnrichment | String | No | An optional prefix to be added to the keys
    of the enrichment data before it is attached to the entity. |


    ### Additional Notes

    - If the 'Entity Type' is set to **ADDRESS**, the action will perform a validation
    check to ensure the identifier is a valid IP address before creation.

    - The action checks for existing entities in the alert to avoid creating duplicates.
    If an entity with the same identifier already exists, the creation for that specific
    identifier will be skipped.

    - All identifiers are converted to uppercase during processing.


    ### Flow Description

    1. **Parameter Parsing:** The action retrieves the input identifiers, the separator,
    the target entity type, and any optional enrichment JSON.

    2. **Splitting:** The 'Entities Identifiers' string is split into a list using
    the provided 'Entities Separator'.

    3. **Duplicate Check:** The action fetches all existing entities currently associated
    with the alert and compares their identifiers (case-insensitive) against the new
    list.

    4. **Validation:** If the target type is 'ADDRESS', each identifier is validated
    as a valid IP address using the `ipaddress` library.

    5. **Entity Creation:** For each unique and valid identifier, the action calls
    `add_entity_to_case` to create the entity, setting its type, internal status,
    and populating its 'additional_properties' with the parsed (and optionally prefixed)
    enrichment JSON.

    6. **Reporting:** The action tracks successful creations, enrichments, and failures,
    returning a JSON summary and a status message to the SOAR interface.
