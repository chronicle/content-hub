  ai_description: "### General Description\nAppends a specified string value to an\
    \ existing context property or creates a new context property if the key does\
    \ not already exist. This action is designed to facilitate data accumulation across\
    \ playbook steps by storing values in a structured format using a delimiter. It\
    \ supports three distinct scopes: Alert, Case, and Global.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Scope** | DDL | Yes | Determines the storage scope for the context property.\
    \ Options are 'Alert' (specific to the current alert), 'Case' (shared across the\
    \ entire case), or 'Global' (shared across the environment). Default is 'Alert'.\
    \ |\n| **Key** | String | Yes | The unique identifier/name of the context property\
    \ to be updated or created. |\n| **Value** | String | Yes | The string value to\
    \ append to the existing property or to set as the initial value. |\n| **Delimiter**\
    \ | String | Yes | The character or string used to separate the existing value\
    \ from the new value when appending. Default is a comma (','). |\n\n### Flow Description\n\
    1. **Parameter Extraction:** The action retrieves the Scope, Key, Value, and Delimiter\
    \ from the input configuration.\n2. **Context Retrieval:** Based on the selected\
    \ Scope, the action attempts to fetch the current value of the specified Key from\
    \ the internal Google SecOps context storage.\n3. **Value Processing:** \n   \
    \ * If the key already contains data, the action concatenates the existing value,\
    \ the provided delimiter, and the new value.\n    * If the key is empty or does\
    \ not exist, the action initializes it with the provided value.\n4. **Context\
    \ Update:** The updated string is saved back into the corresponding context scope\
    \ (Alert, Case, or Global).\n5. **Completion:** The action returns a success message\
    \ indicating whether the value was appended to an existing key or a new key was\
    \ created."
