Convert Into Simulated Case:
  ai_description: >-
    ### General Description

    This action converts alert data into a format compatible with the Google SecOps
    Simulator. It specifically retrieves raw alert content stored within an entity's
    additional properties (the `SourceFileContent` attribute), normalizes event-level
    fields such as class IDs and names, and prepares the data for simulation. The
    action can either push the resulting case directly to the SecOps Simulator or
    save it as a downloadable `.case` file on the Case Wall.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Push to Simulated Cases | Boolean | No | If set to `true`, the action will push
    the generated case JSON to the SecOps Simulator using the `import_simulator_custom_case`
    method. Default is `false`. |

    | Save JSON as Case Wall File | Boolean | No | If set to `true`, the action will
    encode the case JSON and attach it as a downloadable `.case` file to the Case
    Wall. Default is `true`. |

    | Override Alert Name | String | No | Allows the user to manually specify a name
    for the generated case, overriding any automated naming logic. |

    | Full path name | Boolean | No | If set to `true`, the action constructs the
    case name using a combination of the `SourceSystemName`, `DeviceProduct`, and
    the original alert name. Default is `false`. |


    ### Additional Notes

    * This action requires the first entity of the current alert to have a property
    named `SourceFileContent` containing the JSON representation of the alert data.
    If this property is missing, the action will log an error and terminate.

    * The action performs internal normalization on the `Events` list within the JSON,
    ensuring `DeviceEventClassId` and `Name` fields are correctly populated in the
    raw data fields.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the configuration for pushing
    to the simulator, saving to the case wall, and naming overrides.

    2. **Data Retrieval:** It accesses the first entity associated with the current
    alert and extracts the JSON string from the `SourceFileContent` additional property.

    3. **Data Normalization:** It iterates through the events in the extracted data,
    mapping `DeviceEventClassId` or `deviceEventClassId` to the raw data fields to
    ensure consistency.

    4. **Naming Logic:** It determines the final name of the case based on the `Full
    path name` or `Override Alert Name` parameters.

    5. **Simulator Integration:** If `Push to Simulated Cases` is enabled, it calls
    the simulator API to import the custom case.

    6. **Case Wall Attachment:** If `Save JSON as Case Wall File` is enabled, it base64-encodes
    the JSON and adds it as an attachment to the case wall.

    7. **Completion:** The action returns the final JSON structure as the script result
    and completes the execution.
