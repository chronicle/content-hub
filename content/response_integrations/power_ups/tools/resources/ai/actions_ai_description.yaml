  ai_description: >-
    Pauses the current playbook execution until all playbooks associated with the
    previous alert in the same case have completed.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. Retrieves all alerts associated with the current case and sorts them by creation
    time.

    2. Identifies the position (index) of the current alert within the sorted list.

    3. If the current alert is the first one, the action completes successfully, allowing
    the playbook to continue.

    4. If it is not the first alert, the action checks the workflow status of the
    playbooks running on the previous alert.

    5. If the previous alert's playbooks are still running, the action returns an
    'In Progress' state, pausing the current playbook.

    6. Once the previous alert's playbooks complete, the action returns a 'Completed'
    state, releasing the lock and allowing the playbook to proceed.
