Update Alert Score:
  ai_description: >-
    ### General Description

    The **Update Alert Score** action is a utility designed to dynamically modify
    the numerical score associated with an alert within the Google SecOps platform.
    This is typically used in playbooks to adjust the perceived risk or priority of
    an alert based on findings from previous steps. It retrieves the current score
    from the alert's context, applies an increment or decrement based on user input,
    and saves the updated value back to the alert context.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Input** | String | Yes | The integer value to increment (e.g., "10") or decrement
    (e.g., "-5") the current alert score by. Defaults to "0". |


    ### Additional Notes

    - This action specifically targets the internal alert context property named `ALERT_SCORE`.

    - If the `ALERT_SCORE` property does not exist in the current context, it defaults
    to 0 before applying the input value.

    - The input is treated as an integer; providing non-numeric strings will cause
    the action to fail.


    ### Flow Description

    1. **Retrieve Current Score:** The action fetches the current value of the `ALERT_SCORE`
    property from the alert's context.

    2. **Parameter Extraction:** It extracts the `Input` value provided in the action
    configuration.

    3. **Calculation:** It converts both the current score and the input value to
    integers and calculates the sum.

    4. **Update Context:** The new calculated score is converted back to a string
    and saved to the `ALERT_SCORE` property in the alert context.

    5. **Completion:** The action ends, returning the new score as the result value
    and providing a status message.
