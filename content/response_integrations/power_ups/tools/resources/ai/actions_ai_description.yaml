Spell Check String:
  ai_description: >-
    ### General Description

    The Spell Check String action evaluates the spelling of a provided input string.
    It calculates the overall spelling accuracy, identifies misspelled words, provides
    suggested corrections, and generates a corrected version of the original text.


    ### Flow Description

    1. Extracts the target string from the action parameters.

    2. Strips punctuation and splits the string into individual words.

    3. Analyzes the words using a spell checking library to identify any misspellings.

    4. Retrieves suggested corrections for each identified misspelled word.

    5. Calculates the spelling accuracy percentage based on the total number of words
    versus misspelled words.

    6. Replaces misspelled words in the original text to produce a corrected string.

    7. Attaches the detailed findings as a JSON result and returns the accuracy percentage
    as the primary output value.


    ### Additional Notes

    This action performs local string manipulation and analysis using a Python spell
    checking library. It does not require external API connectivity or authentication.
