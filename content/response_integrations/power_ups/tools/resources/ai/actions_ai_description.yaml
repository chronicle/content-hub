  ai_description: >-
    ### General Description

    This action pauses the execution of a playbook for a specified duration. It is
    designed to introduce a delay in the workflow, allowing for external processes
    to complete or for a specific amount of time to pass before the next playbook
    step is executed. The action is asynchronous, meaning it will yield execution
    and check back periodically until the target time is reached.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Seconds | string | Yes | 0 | The number of seconds to delay the playbook. |

    | Minutes | string | Yes | 1 | The number of minutes to delay the playbook. |

    | Hours | string | Yes | 0 | The number of hours to delay the playbook. |

    | Days | string | Yes | 0 | The number of days to delay the playbook. |


    ### Additional Notes

    - The total delay time is the sum of all provided time parameters (Days + Hours
    + Minutes + Seconds).

    - If all parameters are set to 0, the action will complete immediately.


    ### Flow Description

    1. **Initialization**: The action retrieves the delay values from the input parameters.

    2. **Target Calculation**: It calculates a target UTC timestamp by adding the
    specified delay (days, hours, minutes, and seconds) to the current UTC time.

    3. **Initial Check**: If the calculated target time is less than or equal to the
    current time, the action completes immediately with a success status.

    4. **Async State**: If the target time is in the future, the action sets its execution
    state to 'In Progress' and stores the target timestamp in the action's persistent
    state (additional_data).

    5. **Polling/Wait Phase**: In subsequent execution cycles (the 'wait' phase),
    the action retrieves the stored target timestamp from the previous run.

    6. **Completion**: The action compares the current time against the stored target
    timestamp. Once the current time meets or exceeds the target, the action transitions
    to the 'Completed' state, allowing the playbook to proceed.
