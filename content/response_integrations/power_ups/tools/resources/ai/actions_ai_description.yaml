  ai_description: >-
    Causes a playbook to wait until another playbook or block, running on the same
    alert, completes its execution. This action is asynchronous and will periodically
    check the status of the specified playbook.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Playbook Name | String | Yes | The name of the playbook or block to wait for.
    |


    ### Flow

    1. Retrieves the workflow instances for the current alert.

    2. Checks the status of the specified playbook.

    3. If the playbook is completed, failed, terminated, or not found, the action
    completes successfully.

    4. If the playbook is still in progress or pending, the action remains in progress
    and will be re-evaluated later.
