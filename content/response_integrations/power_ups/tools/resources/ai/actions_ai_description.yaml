Append to Context Value:
  ai_description: "Appends a specified string value to an existing context property\
    \ or creates a new context property if the key does not exist. This action allows\
    \ for the aggregation of data within the scope of an Alert, a Case, or Globally\
    \ across the environment. It is primarily used for maintaining state or collecting\
    \ multiple values (like a list of IDs or names) during playbook execution.\n\n\
    ### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Scope | ddl | Yes | The level at which the context property\
    \ exists. Options are 'Alert', 'Case', or 'Global'. |\n| Key | string | Yes |\
    \ The unique identifier (name) of the context property to modify or create. |\n\
    | Value | string | Yes | The string value to be appended to the existing property.\
    \ |\n| Delimiter | string | Yes | The character or string used to separate the\
    \ existing value from the new value (e.g., a comma or semicolon). Default is ','.\
    \ |\n\n### Flow Description\n1. **Parameter Extraction:** The action retrieves\
    \ the 'Scope', 'Key', 'Value', and 'Delimiter' from the input parameters.\n2.\
    \ **Context Retrieval:** Based on the selected 'Scope', the action attempts to\
    \ fetch the current value of the context property associated with the provided\
    \ 'Key'.\n3. **Value Concatenation:** \n    * If the property already exists,\
    \ the action appends the new 'Value' to the existing string, separated by the\
    \ 'Delimiter'.\n    * If the property does not exist, the action initializes the\
    \ property with the provided 'Value'.\n4. **Context Update:** The action saves\
    \ the updated (or new) value back to the specified context scope (Alert, Case,\
    \ or Global).\n5. **Completion:** The action returns a success message and the\
    \ final concatenated string as the result."
