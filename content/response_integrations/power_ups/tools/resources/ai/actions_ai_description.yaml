Create Siemplify Task:
  ai_description: "### General Description\nAssigns a new task to a specific user\
    \ or role within the current Google SecOps case. This action is used to manage\
    \ manual workflows, analyst assignments, or follow-up actions directly within\
    \ the platform's case management system.\n\n### Parameters Description\n\n| Parameter\
