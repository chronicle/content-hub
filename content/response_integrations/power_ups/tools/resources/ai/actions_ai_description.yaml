    ### General Description

    Creates new entities and adds them to the current case or alert based on a provided
    delimited string of identifiers and a specified entity type. This action is useful
    for dynamically generating entities from raw text or external data during playbook
    execution.


    ### Flow Description

    1. Retrieves the list of entity identifiers, the target entity type, and the separator
    character from the action parameters.

    2. Splits the identifiers string into individual entity identifiers using the
    provided separator.

    3. Iterates through the extracted identifiers and checks if they already exist
    within the current case's alerts to avoid duplicates.

    4. If an identifier does not exist, it validates the format (e.g., verifying that
    an `ADDRESS` type is a valid IP address).

    5. Adds the new entity to the case using internal SOAR methods, applying optional
    enrichment JSON data, prefixes, and internal/suspicious flags.

    6. Returns a JSON result summarizing the successfully created, enriched, and failed
    entities.


