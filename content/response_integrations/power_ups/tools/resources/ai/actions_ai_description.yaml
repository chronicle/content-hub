  ai_description: >-
    ### General Description

    This action changes the title (name) of a case within Google SecOps. It is primarily
    used for case management and organization, allowing playbooks to dynamically rename
    cases based on specific logic or findings. The action can be configured to execute
    conditionally based on whether the current alert is the first alert in the case.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | New Name | String | No | The new title to be assigned to the case. While marked
    as not mandatory in the configuration, the action logic expects a value to perform
    the rename operation. |

    | Only If First Alert | Boolean | No | If set to `True`, the action will only
    rename the case if it is being executed in the context of the chronologically
    first alert (based on detection time) within that case. Default is `False`. |


    ### Additional Notes

    - If `Only If First Alert` is enabled and the action is triggered by a subsequent
    alert, the case name will remain unchanged.


    ### Flow Description

    1. **Initialization**: The action starts by retrieving the `New Name` and `Only
    If First Alert` parameters.

    2. **Alert Sorting**: It retrieves all alerts associated with the current case
    and sorts them by their `detected_time` to identify the chronological order.

    3. **Condition Check**: If `Only If First Alert` is `True`, the action compares
    the identifier of the current alert with the identifier of the first alert in
    the sorted list.

    4. **Execution**: If the condition is met (or if the condition check is disabled),
    the action calls the internal SOAR API `rename_case` to update the case title.

    5. **Completion**: The action concludes by providing an output message indicating
    whether the name was changed or if it was skipped due to the 'First Alert' constraint.
