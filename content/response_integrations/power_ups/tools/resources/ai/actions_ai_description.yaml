    ### General Description

    Creates relationships between specified entities and existing entities within
    a Google SecOps case. This action can create new entities if they do not already
    exist and link them to target entities based on type or specific identifiers.
    It supports defining the relationship as a Source, Destination, or a general Link.
    Additionally, it can enrich the created or linked entities with custom attributes
    provided via a JSON object. **Note: This action supports Siemplify version 5.6
    or higher.**


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Identifier(s) | String | Yes | A list of entity identifiers to be created
    or used for the relationship. Multiple values should be separated by the 'Separator
    Character'. |

    | Entity Identifier(s) Type | EntityType | Yes | The Siemplify entity type (e.g.,
    HOSTNAME, ADDRESS, USERUNIQNAME) for the identifiers provided in 'Entity Identifier(s)'.
    |

    | Connect As | DDL | Yes | Defines the nature of the relationship. Options are
    'Source' (directional), 'Destination' (directional), or 'Linked' (non-directional).
    |

    | Target Entity Type | EntityType | Yes | The type of existing entities in the
    alert to which the new entities will be linked. |

    | Target Entity Identifier(s) | String | No | A list of specific identifiers for
    existing entities of the 'Target Entity Type'. If left empty, the action will
    link the new entities to all existing entities of the specified 'Target Entity
    Type' found in the alert. |

    | Enrichment JSON | String | No | An optional JSON object containing key-value
    pairs to be added to the 'additional_properties' of the entities involved. |

    | Separator Character | String | No | The character used to separate lists in
    the identifier parameters. Defaults to a comma (`,`). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves all input parameters and parses
    the identifier lists using the specified separator.

    2. **Relationship Configuration:** It determines the relationship direction and
    primary link status based on the 'Connect As' selection.

    3. **Target Identification:** It scans all entities within the current alert to
    find matches for the 'Target Entity Type' and, if provided, the 'Target Entity
    Identifier(s)'.

    4. **Entity Creation and Linking:** For each identifier in the 'Entity Identifier(s)'
    list, it calls the SOAR API to ensure the entity exists and establishes the relationship
    with the identified target entities.

    5. **Enrichment:** If an 'Enrichment JSON' is provided, the action reloads the
    case data, identifies the relevant entities, updates their additional properties,
    and saves the changes back to the system.


    ### Additional Notes

    - **Siemplify Version:** This action is compatible only with Siemplify version
    5.6 and above.

    - **Targeting Logic:** If 'Target Entity Identifier(s)' is not provided, the action
    will attempt to link the new entities to *all* entities of the specified 'Target
    Entity Type' found in the alert.

    - **Execution Delay:** The action includes a 3-second pause before applying enrichment
    to ensure the platform has finished processing the entity creation and linking.
