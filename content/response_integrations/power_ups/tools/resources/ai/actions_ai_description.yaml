Lock Playbook:
  ai_description: >-
    ### General Description

    Pauses the execution of the current playbook until all playbooks associated with
    the previous alert (or all alerts in the case, depending on the execution scope)
    have completed. This ensures sequential processing of alerts within a case to
    prevent race conditions or out-of-order operations.


    ### Flow Description

    1. Determines the current execution scope (Alert or Case).

    2. If running in Alert scope, it identifies the current alert's chronological
    position within the case.

    3. If the current alert is the first one, the action completes immediately and
    allows the playbook to continue.

    4. If it is a subsequent alert, the action queries the internal SOAR API (`get_workflow_instance_card`)
    to check the playbook execution status of the preceding alert.

    5. If running in Case scope, it checks the playbook execution status for all alerts
    within the case.

    6. Returns an 'In Progress' state to pause execution if the required playbooks
    are still running, or completes successfully to release the lock if they are finished.


    ### Additional Notes

    This is an asynchronous action designed to enforce sequential playbook execution
    across multiple alerts within a single case. It relies on internal SOAR API calls
    to monitor workflow statuses.
