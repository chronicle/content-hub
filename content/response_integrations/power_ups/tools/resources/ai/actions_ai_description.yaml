    regex or exact match based on the `FieldsInput` parameter.

    4. Compares the extracted values with the search data provided in the `SearchInData`
    parameter.

    5. If a match is found and the `ShouldEnrichEntity` parameter is provided, enriches
    the entity with the specified key.

    6. Updates the successfully matched entities in the platform and adds a JSON result
    containing the match details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | SearchInData | String | Yes | A JSON that represents the string(s) you want
    to search in. Format: `[{"Data": "", "RegEx": ""}]` |

    | FieldsInput | String | Yes | A JSON that describes what fields should be tested
    for. Format: `[{"RegexForFieldName": "", "FieldName": "Field name to search",
    "RegexForFieldValue": ""}]` |

