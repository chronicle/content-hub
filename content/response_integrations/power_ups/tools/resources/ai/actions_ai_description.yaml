  ai_description: >-
    ### General Description

    The **Spell Check String** action is a utility designed to analyze the spelling
    of a provided text string. It identifies misspelled words, suggests corrections,
    calculates an overall accuracy percentage, and generates a version of the input
    string with all identified errors corrected. This is useful for cleaning up automated
    logs, user-submitted tickets, or alert descriptions before further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **String** | String | Yes | The input text that will be analyzed for spelling
    errors. |


    ### Flow Description

    1. **Input Extraction**: The action retrieves the mandatory `String` parameter
    provided by the user or playbook.

    2. **Preprocessing**: It removes punctuation from the input string using regular
    expressions and splits the text into individual words.

    3. **Spelling Analysis**: Using a spell-checking library, the action identifies
    words that are not recognized in the dictionary.

    4. **Correction Generation**: For every misspelled word, the action attempts to
    find the most likely correction. It then performs a case-sensitive replacement
    of the misspelled word in the original string to create a 'corrected' version.

    5. **Metrics Calculation**: The action calculates the total word count, the number
    of misspelled words, and an accuracy percentage (ratio of correct words to total
    words).

    6. **Output**: The results are returned as a JSON object containing the detailed
    breakdown and a summary message indicating the accuracy percentage.


    ### Additional Notes

    - If the input string is empty, the action returns an accuracy of 0% and a message
    stating 'No input to test.'

    - The action uses word boundaries (`\b`) for replacements to ensure that sub-strings
    within larger words are not accidentally modified.
