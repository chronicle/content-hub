Attach Playbook to Alert:
  ai_description: >-
    Attaches one or more playbooks or blocks to a specific alert within a Google SecOps
    case. This action allows for automated workflow triggering by dynamically linking
    playbooks based on provided names. It supports handling multiple playbooks via
    a comma-separated list and includes logic to prevent or allow duplicate attachments
    based on user configuration.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Playbook Name | String | True | A comma-separated list of playbook names that
    should be attached to the alert. |

    | Allow Duplicates | Boolean | False | If set to `true` (default), the action
    will attach the playbook even if it is already attached to the alert. If `false`,
    it will skip playbooks that are already present. |


    ### Flow Description

    1. **Fetch Existing Workflows:** The action identifies the current alert and retrieves
    a list of all playbooks currently attached to it using the `get_workflow_instance_card`
    API.

    2. **Parse Input:** The `Playbook Name` string is split by commas and cleaned
    of whitespace to create a list of target playbooks.

    3. **Duplicate Check:** If `Allow Duplicates` is disabled, the action compares
    the target list against the already attached playbooks.

    4. **Attachment Execution:** For each valid playbook name, the action calls the
    internal SDK method `attach_workflow_to_case` to link the playbook to the alert.

    5. **Reporting:** The action aggregates the results, providing a summary of successfully
    attached playbooks, skipped duplicates, and any failures (e.g., due to misspellings).
