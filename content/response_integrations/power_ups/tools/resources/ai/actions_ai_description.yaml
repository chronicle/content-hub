Create Entities with Separator:
  ai_description: >-
    ### General Description

    The **Create Entities with Separator** action allows users to dynamically create
    and add multiple entities to a Google SecOps alert. It takes a string of identifiers,
    splits them using a configurable separator, and injects them into the case context.
    This is particularly useful for processing bulk data from logs or external systems
    that need to be represented as formal entities within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entities Identifiers** | String | Yes | A string containing one or more entity
    identifiers (e.g., IP addresses, hostnames) to be added to the alert. |

    | **Entity Type** | EntityType | Yes | The specific Siemplify entity type to assign
    to the created entities (e.g., ADDRESS, HOSTNAME, USERNAME). |

    | **Is Internal** | Boolean | No | If set to `true`, the created entities will
    be marked as internal to the network. Default is `false`. |

    | **Entities Separator** | String | Yes | The character used to split the `Entities
    Identifiers` string. Default is a comma (`,`). |

    | **Enrichment JSON** | Code | No | A JSON object containing additional data to
    be attached to the entities as enrichment. |

    | **PrefixForEnrichment** | String | No | An optional prefix to prepend to the
    keys in the `Enrichment JSON` data. |


    ### Additional Notes

    - If the **Entity Type** is set to `ADDRESS`, the action performs a validation
    check to ensure the identifier is a valid IP address before creation.

    - The action checks for existing entities within the alert to prevent the creation
    of duplicates.

    - If **Enrichment JSON** is provided, the action will populate the `additional_properties`
    of the newly created entities.


    ### Flow Description

    1. **Input Parsing:** The action retrieves the list of identifiers and splits
    them based on the provided **Entities Separator**.

    2. **Enrichment Preparation:** If **Enrichment JSON** is provided, it parses the
    JSON and applies the **PrefixForEnrichment** if specified.

    3. **Duplicate Check:** It retrieves all existing entities currently associated
    with the alert to ensure no duplicate identifiers are processed.

    4. **Validation & Creation:** For each unique identifier:
        - If the type is `ADDRESS`, it validates the IP format.
        - It calls the internal SDK to add the entity to the case with the specified
    metadata (internal status, enrichment data, etc.).
    5. **Reporting:** The action returns a JSON summary of created, enriched, and
    failed entities, and provides a status message to the case wall.
