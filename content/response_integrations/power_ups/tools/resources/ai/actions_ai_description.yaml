Check List Subset:
  ai_description: "Checks if all elements of a 'Subset' list are present within an\
    \ 'Original' list. This utility action is designed for logic branching within\
    \ playbooks, allowing analysts to verify if a specific set of values (e.g., a\
    \ list of detected hashes) is entirely contained within a reference list (e.g.,\
    \ a known allowlist or a previous search result).\n\n### Parameters Description\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Original | String | Yes | The master list to check against. Can be provided\
    \ as a JSON-formatted list (e.g., `[\"a\", \"b\"]`) or a comma-separated string\
    \ (e.g., `a, b`). |\n| Subset | String | Yes | The list of items to verify. Can\
    \ be provided as a JSON-formatted list or a comma-separated string. |\n\n### Flow\
    \ Description\n\n1.  **Parameter Extraction:** The action retrieves the `Original`\
    \ and `Subset` strings from the action parameters.\n2.  **Data Parsing:** It attempts\
    \ to parse each input as a JSON list. If JSON parsing fails, it falls back to\
    \ splitting the string by commas, stripping whitespace, and converting numeric\
    \ strings to integers.\n3.  **Set Comparison:** Both parsed lists are converted\
    \ into Python sets. The action then performs a subset comparison (`subset <= original`).\n\
    4.  **Result Reporting:** \n    *   If the subset condition is met, the action\
    \ returns `true` with a success message.\n    *   If the subset condition is not\
    \ met, the action returns `false` and provides a message listing the specific\
    \ items found in the subset that were missing from the original list."
