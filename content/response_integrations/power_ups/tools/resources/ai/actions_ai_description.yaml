DNS Lookup:
  ai_description: >-
    ### General Description

    The **DNS Lookup** action performs DNS queries against specified DNS servers for
    **Address** (IP) and **Hostname** entities. It allows analysts to retrieve various
    DNS record types to identify domain associations, mail servers, or reverse lookup
    information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **DNS Servers** | String | Yes | A comma-separated list of DNS server IP addresses
    to query (e.g., `8.8.8.8, 1.1.1.1`). |

    | **Data Type** | DDL | Yes | The specific DNS record type to query for Hostname
    entities. Defaults to `ANY`. Supported types include `A`, `AAAA`, `MX`, `TXT`,
    `CNAME`, etc. |


    ### Additional Notes

    - For **Address** entities, the action automatically performs a reverse DNS lookup
    to find **PTR** records.

    - For **Hostname** entities, the action performs a query based on the selected
    **Data Type**.

    - If multiple DNS servers are provided, the action will attempt to query each
    one for every entity.


    ### Flow Description

    1. **Initialization**: Retrieves the list of DNS servers and the target record
    type from the action parameters.

    2. **Entity Processing**: Iterates through the entities in the current context.

    3. **Reverse Lookup (IPs)**: For each `ADDRESS` entity, it attempts to resolve
    the reverse DNS name (PTR record) using the provided DNS servers.

    4. **Forward Lookup (Hostnames)**: For each `HOSTNAME` entity, it constructs a
    DNS query for the specified `Data Type` and sends it to the DNS servers via UDP.

    5. **Result Aggregation**: Collects all successful DNS responses, including the
    record type, response data, and the server that provided the answer.

    6. **Output**: Returns the collected data as a JSON result and completes the action.
