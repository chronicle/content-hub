Add Comment to Entity Log:
  ai_description: >-
    ### General Description

    The **Add Comment to Entity Log** action allows users to programmatically append
    comments to the internal logs of entities within the Google SecOps environment.
    This is primarily used for maintaining an audit trail or providing additional
    context for specific entities during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User** | User | Yes | The username or identifier of the person or system creating
    the comment. |

    | **Comment** | Content | Yes | The actual text content of the comment to be added
    to the entity log. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `User` and `Comment` values
    from the input parameters.

    2. **Entity Iteration**: The action identifies all entities currently in the scope
    of the playbook or manual execution.

    3. **Internal API Call**: For each entity, the action invokes an internal SOAR
    API method (`add_comment_to_entity`) to record the comment against that specific
    entity's log.

    4. **Completion**: The action generates a summary message listing the entities
    that were updated and concludes the execution.


    ### Additional Notes

    This action does not interact with external systems; it only modifies internal
    metadata associated with entities in the SecOps platform.
