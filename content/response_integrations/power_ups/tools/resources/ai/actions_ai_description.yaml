Wait for Playbook to Complete:
  ai_description: "### General Description\nThis action pauses the execution of the\
    \ current playbook until a specified target playbook or block, running within\
    \ the context of the same alert, reaches a terminal state (Completed, Failed,\
    \ or Terminated). It is primarily used for synchronization when multiple playbooks\
    \ are triggered for a single alert and one depends on the results or completion\
    \ of another.\n\n### Parameters Description\n\n| Parameter | Description | Type\
    \ | Mandatory |\n| :--- | :--- | :--- | :--- |\n| Playbook Name | The exact name\
    \ of the playbook or block that this action should wait for. | String | Yes |\n\
    \n### Additional Notes\n- This is an **asynchronous** action. It will periodically\
    \ check the status of the target playbook and remain in an 'In Progress' state\
    \ until the target finishes.\n- If the specified playbook is not found associated\
    \ with the alert, the action will complete immediately to avoid deadlocks.\n\n\
    ### Flow Description\n1. **Retrieve Parameter**: The action identifies the target\
    \ playbook name from the input.\n2. **Fetch Workflow Status**: It queries the\
    \ Google SecOps API to retrieve the status of all workflow instances linked to\
    \ the current alert group.\n3. **Status Evaluation**: \n    - If the target playbook's\
    \ status is `Completed`, `Failed`, or `Terminated`, the action finishes successfully.\n\
    \    - If the target playbook's status is `In Progress`, `Pending in Queue`, or\
    \ `Pending for User`, the action sets its state to `In Progress` to wait for the\
    \ next check cycle.\n    - If the target playbook is not found, the action completes\
    \ with a message indicating it was not found."
