Find First Alert:
  ai_description: "### General Description\nThe **Find First Alert** action is a utility\
    \ designed to identify the chronologically earliest alert within a specific Google\
    \ SecOps case. It compares the current alert being processed by the playbook against\
    \ the entire list of alerts in the case to determine if the current alert is the\
    \ 'root' or first alert. This is particularly useful for logic branching in playbooks\
    \ where certain actions should only be performed once per case (on the first alert).\n\
    \n### Parameters Description\nThere are no parameters for this action.\n\n###\
    \ Flow Description\n1. **Retrieve Alerts**: The action accesses the `alerts` collection\
    \ from the current case context.\n2. **Sort Chronologically**: It sorts all alerts\
    \ in the case based on their `creation_time` attribute in ascending order.\n3.\
    \ **Identify First Alert**: The alert at the first index (index 0) of the sorted\
    \ list is identified as the first alert.\n4. **Comparison**: The action compares\
    \ the unique identifier of the `current_alert` with the identifier of the identified\
    \ first alert.\n5. **Output Result**: \n    * If they match, it returns the identifier\
    \ of the alert and a message stating it is the first alert.\n    * If they do\
    \ not match, it returns the string `\"false\"` and a message stating it is not\
    \ the first alert.\n\n### Additional Notes\nThis action does not interact with\
    \ external APIs or modify any data; it performs internal logic based on existing\
    \ case metadata."
