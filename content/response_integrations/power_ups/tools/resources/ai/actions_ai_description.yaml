    - This action is intended for short-term pauses. If a delay longer than 30 seconds
    is required, the "Delay Playbook V2" action should be used instead.

    - The action validates the input range; if the provided value is outside the 0-30
    second window, the action will fail validation.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Seconds` value from the
    playbook configuration.

    2. **Validation:** It verifies that the input is a valid positive integer and
    does not exceed the 30-second limit defined in the integration constants.

    3. **Execution:** The action calculates a target end time and enters a synchronous
    sleep loop, pausing execution until the specified time has elapsed.

    4. **Output:** Upon completion, the action provides a success message confirming
    the delay duration and the exact timestamp when execution resumed.
