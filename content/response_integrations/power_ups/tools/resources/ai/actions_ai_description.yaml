Get Case Data:
  ai_description: >-
    ### General Description

    The **Get Case Data** action retrieves comprehensive information associated with
    a specific case in Google SecOps and returns it as a structured JSON object. This
    data includes case comments, entity details, insights, playbook execution metadata,
    alert information, and events. It is designed to provide playbooks with a full
    context of a case for logic branching or data passing to external systems.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Case Id** | String | No | The unique identifier of the case to query. If not
    provided, the action defaults to the current case ID. |

    | **Fields to Return** | String | No | A comma-separated list of specific fields
    to include in the output. Supports nested keys (e.g., `alerts.0.name`). If empty,
    all available case data is returned. |

    | **Nested Keys Delimiter** | String | No | The character used to separate levels
    in a nested key path. Defaults to `.`. Note: This cannot be a comma (`,`). |


    ### Additional Notes

    - The action will fail if the `Nested Keys Delimiter` is configured as a comma,
    as this conflicts with the list parsing of the `Fields to Return` parameter.

    - If specific fields are requested but none are found in the case data, the action
    will return a failure status.

    - The action automatically handles the retrieval and decoding of insight content
    blobs stored within the platform.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Case ID, field filters, and delimiter
    settings from the action configuration.

    2. **Case Data Retrieval**: Fetches the full case overview details from the internal
    SOAR API, including expanded tags and alert cards.

    3. **Data Filtering**: If `Fields to Return` is specified, the action traverses
    the case JSON structure to extract only the requested data points.

    4. **Insight Processing**: Retrieves all insights for the case. For insights that
    reference external content blobs, the action performs additional API calls to
    fetch, decode (Base64), and parse the JSON content.

    5. **Result Aggregation**: Combines the filtered case data and processed insights
    into a single JSON object and attaches it to the script results.
