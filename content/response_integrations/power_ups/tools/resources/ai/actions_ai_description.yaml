Extract URL Domain:
  ai_description: >-
    Extracts domain information from entity identifiers and user-provided URL strings.
    This utility action parses strings to identify the registered domain and suffix,
    with an optional toggle to include subdomains. For entities, it enriches the object
    by adding the extracted domain to a specific custom field ('siemplifytools_extracted_domain'),
    facilitating downstream playbooks that require domain-level logic regardless of
    the original entity type (e.g., URL, Hostname, or even Email).


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Separator | String | Yes | The character(s) used to separate multiple URLs in
    the 'URLs' parameter (default is a comma). |

    | URLs | String | No | A list of URLs to process manually, separated by the defined
    'Separator'. |

    | Extract subdomain | Boolean | No | If set to True, the action will include the
    subdomain (e.g., 'sub' in 'sub.example.com') in the result. |


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves the list of URLs (if provided),
    the separator, and the subdomain extraction preference from the action parameters.

    2.  **Manual URL Processing:** If the 'URLs' parameter is populated, the action
    splits the string using the provided separator and extracts domains for each item,
    adding the results to the JSON output.

    3.  **Entity Iteration:** The action iterates through all entities currently in
    the scope of the playbook step.

    4.  **Domain Extraction:** For each entity, it attempts to parse the identifier
    to find a valid domain and suffix using the `tldextract` library logic.

    5.  **Internal Enrichment:** For every entity where a domain is successfully parsed,
    the action updates the entity's `additional_properties` with the key `siemplifytools_extracted_domain`
    containing the result.

    6.  **Finalization:** The action updates the modified entities within Google SecOps,
    attaches a comprehensive JSON result mapping identifiers to their extracted domains
    (or errors), and returns a summary message of the operation.
