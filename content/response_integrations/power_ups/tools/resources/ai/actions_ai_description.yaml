Get Certificate Details:
  ai_description: >-
    ### General Description

    Retrieves and analyzes the SSL/TLS certificate for a specified URL. This action
    connects to the target host over port 443, performs a TLS handshake, and extracts
    detailed certificate metadata including validity dates, issuer information, and
    Subject Alternative Names (SAN). It is primarily used for verifying certificate
    status, checking for expiration, and identifying self-signed certificates during
    investigations.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Url to check | The hostname or URL from which to retrieve the SSL certificate.
    The action will attempt to connect to this host on port 443. | String | Yes |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the target URL from the input
    parameters.

    2. **Connection Establishment:** It creates a network socket and attempts to connect
    to the specified hostname on port 443.

    3. **SSL Handshake:** A default SSL context (requiring at least TLS 1.2) is used
    to wrap the socket and perform a handshake to retrieve the server's certificate
    in binary (DER) format.

    4. **Certificate Parsing:** The `cryptography` library parses the binary certificate
    into a structured object.

    5. **Metadata Extraction:** The action extracts the Common Name (CN), Subject
    Alternative Names (SAN), and Issuer information.

    6. **Validation Logic:** It calculates the number of days until expiration, determines
    if the certificate is currently expired, and checks if it is self-signed (where
    the Subject matches the Issuer).

    7. **Result Output:** The collected data is formatted into a JSON object and returned
    as the action result.
