Search Text:
  ai_description: >-
    ### General Description

    The **Search Text** action is a utility designed to identify specific strings
    or patterns within a provided block of text. It allows users to perform simple
    string matching or complex regular expression searches, making it highly versatile
    for parsing logs, emails, or any other textual data within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Text** | String | Yes | The source text that will be searched. |

    | **Search For** | String | No | The specific literal string to search for within
    the input text. |

    | **Search For Regex** | String | No | A comma-separated list of regular expressions
    to search for. Patterns should be wrapped in double quotes (e.g., "[0-9]+"). |

    | **Case Sensitive** | Boolean | No | If set to `true`, the search will distinguish
    between uppercase and lowercase letters. Default is `false`. |


    ### Additional Notes

    - At least one of the parameters **Search For** or **Search For Regex** must be
    configured for the action to execute successfully.

    - If multiple regexes are provided, the action will return `true` if any of the
    patterns match.

    - The action supports multiline searching for regex patterns.

    - The action strips double quotes from the regex patterns before execution.


    ### Flow Description

    1. **Input Extraction**: The action retrieves the input text, search string, regex
    list, and case sensitivity setting.

    2. **Validation**: It checks if either a search string or a regex pattern has
    been provided. If both are empty, the action fails.

    3. **String Matching**: If a literal search string is provided, the action checks
    for its presence in the text, applying case sensitivity if requested.

    4. **Regex Matching**: If regex patterns are provided, the action iterates through
    each pattern, stripping surrounding quotes and performing a multiline search against
    the input text.

    5. **Result Aggregation**: If any match is found (string or regex), the `match_found`
    result is set to `true`. Detailed match information, including the search pattern
    and the input text, is added to the JSON result.
