    by adding the extracted domain to their additional properties.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | URLs | String | False | One or more URLs to extract the domain from. |

    | Separator | String | True | Separator string to use to separate the URLs provided
    in the `URLs` parameter. Default is `,`. |

