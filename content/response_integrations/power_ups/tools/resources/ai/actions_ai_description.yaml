  ai_description: >-
    ### General Description

    The **Re-Attach Playbook** action is designed to reset and restart a specific
    playbook within a Google SecOps case. It performs a deep reset by manually removing
    the playbook's execution state and result data from the underlying orchestration
    databases before re-attaching the playbook to the case. This is particularly useful
    for troubleshooting failed playbooks or re-running logic after environmental configurations
    have been updated.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Playbook Name | playbook_name | Yes | The exact name of the playbook that will
    be removed from the case and re-attached. Once re-attached, it will trigger a
    new execution. |


    ### Additional Notes

    * **Prerequisite:** This action requires the **PostgreSQL** integration to be
    installed and configured. Specifically, an instance named `Siemplify` must be
    configured in the Shared Environment, pointing to the SOAR's internal orchestration
    and system databases.

    * This action interacts directly with the database layer to ensure all traces
    of the previous playbook run (including action results) are cleared before the
    restart.


    ### Flow Description

    1. **Configuration Retrieval:** The action identifies the PostgreSQL integration
    instance named 'Siemplify' to obtain database credentials (server, username, password).

    2. **Database Connection:** It establishes connections to two internal databases:
    `siemplify_orchestration_db` and `siemplify_system_db`.

    3. **State Identification:** It queries the `WorkflowInstances` table to find
    all active or completed instances of the specified playbook associated with the
    current Case ID.

    4. **Cleanup:** For each found instance, it deletes the workflow record from the
    orchestration database and removes all associated action results from the system
    database.

    5. **Re-attachment:** Finally, it uses the SOAR API to re-attach the playbook
    to the specific alert group within the case, which triggers the playbook to run
    again automatically.
