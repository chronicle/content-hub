Assign Case to User:
  ai_description: >-
    ### General Description

    This action assigns a specific user to a case within Google SecOps. It is primarily
    used for workflow automation to ensure that cases are routed to the correct analyst
    or administrator for investigation.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Additional Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Case Id | The unique identifier of the case to which the user will be assigned.
    | String | Yes | |

    | Assign To | The username or identifier of the user who will be assigned to the
    case. | String | Yes | Default value is '@Admin'. |

    | Alert Id | The unique identifier of the alert associated with the case. | String
    | Yes | |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Case Id`, `Assign To` (target
    user), and `Alert Id` from the input parameters.

    2. **API Interaction**: It calls the internal SOAR API function `assign_case_to_user`
    using the provided identifiers.

    3. **Execution Completion**: The action logs the result of the assignment operation
    and terminates with a success status.


    ### Additional Notes

    This action performs an internal state change within the Google SecOps platform
    and does not interact with external third-party integrations.
