  ai_description: >-
    ### General Description

    Extracts the domain or subdomain from entity identifiers or a provided list of
    URLs. This action is a utility tool that parses strings to identify valid domain
    structures using the `tldextract` library. It can process all entities in the
    current context or a specific list of URLs provided as a parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Separator | string | Yes | The character or string used to split the values
    provided in the `URLs` parameter. Default is a comma (`,`). |

    | URLs | string | No | A list of URLs or strings to process manually. If provided,
    the action will extract domains from these strings in addition to any entities
    in scope. |

    | Extract subdomain | boolean | No | If set to `true`, the action will include
    the subdomain in the result (e.g., `sub.example.com`). If `false`, it only extracts
    the root domain and suffix (e.g., `example.com`). |


    ### Flow Description

    1. **Initialization**: The action retrieves the `URLs`, `Separator`, and `Extract
    subdomain` parameters.

    2. **Parameter Processing**: If the `URLs` parameter is populated, the string
    is split by the `Separator`. Each resulting string is parsed to extract the domain.
    Results are stored in the action's JSON output.

    3. **Entity Processing**: The action iterates through all entities in the current
    scope (`target_entities`).

    4. **Domain Extraction**: For each entity, the identifier is parsed. If a valid
    domain is found, it is added to the entity's `additional_properties` under the
    key `siemplifytools_extracted_domain`.

    5. **Internal Update**: The action updates the entities within Google SecOps to
    persist the new `siemplifytools_extracted_domain` field.

    6. **Final Output**: The action returns a JSON result containing the mapping of
    identifiers to extracted domains and provides a summary message of successful
    and failed extractions.
