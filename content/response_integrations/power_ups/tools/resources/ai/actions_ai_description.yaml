    ### General Description

    The **Set Context Value** action allows users to store information as key-value
    pairs within specific scopes of the Google SecOps platform. This is a utility
    action primarily used for data persistence and sharing information between different
    stages of a playbook or across different playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Key** | string | Yes | The name of the context property to be created or updated.
    |

    | **Value** | string | Yes | The value to be assigned to the specified key. |

    | **Scope** | ddl | Yes | Defines the visibility and lifecycle of the context
    value. Options are: `Alert` (specific to the current alert), `Case` (shared across
    all alerts in the case), or `Global` (accessible across the entire environment).
    |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Key`, `Value`, and `Scope`
    from the input parameters.

    2. **Scope Determination:** The logic checks the selected `Scope` value.

    3. **Context Update:** Depending on the scope, the action calls the relevant SDK
    method:
        - If `Alert`, it updates the property for the specific alert context.
        - If `Case`, it updates the property for the entire case context.
        - If `Global`, it updates a global context property using a predefined identifier.
    4. **Completion:** The action returns a success message indicating the field,
    value, and scope updated.


    ### Additional Notes

    - This action does not interact with external APIs.

    - It is purely an internal state management tool for the SOAR platform.
