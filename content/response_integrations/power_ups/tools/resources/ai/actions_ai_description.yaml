  ai_description: >-
    Performs DNS lookups for IP Address and Hostname entities using specified DNS
    servers. This action allows analysts to retrieve various DNS record types (such
    as A, MX, TXT, or PTR) to verify domain configurations or identify associated
    hostnames for IP addresses.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DNS Servers | String | Yes | A single IP address or a comma-separated list of
    DNS server IP addresses (e.g., '1.1.1.1, 8.8.8.8') to be used for the queries.
    |

    | Data Type | DDL | Yes | The specific DNS record type to query (e.g., A, AAAA,
    MX, TXT, ANY). **Note:** This parameter only applies to Hostname entities; IP
    Address entities always perform a PTR (reverse) lookup. |


    ### Flow Description


    1. **Initialization**: The action parses the provided comma-separated list of
    DNS servers and retrieves the requested DNS record type from the parameters.

    2. **Entity Iteration**: The action iterates through all target entities in the
    current context.

    3. **IP Address Processing**: For each IP Address entity, the action performs
    a reverse DNS lookup (PTR record) against every DNS server in the list.

    4. **Hostname Processing**: For each Hostname entity, the action constructs a
    DNS query for the specified 'Data Type' and sends it to every DNS server in the
    list via UDP.

    5. **Data Collection**: The action captures successful responses, including the
    record type, the returned data, and the specific DNS server that provided the
    response.

    6. **Finalization**: All gathered DNS information is aggregated into a JSON result.
    The action completes with a success status if at least one record was found.
