Attach Playbook to Alert:
  ai_description: >-
    ### General Description

    This action attaches one or more specified playbooks (workflows) to a target alert
    or all alerts within a case in Google SecOps. It allows users to dynamically trigger
    additional automation based on the provided playbook names.


    ### Flow Description

    1. Extracts the list of playbook names and the 'Allow Duplicates' preference from
    the action parameters.

    2. Determines the execution scope to identify whether to process a specific alert
    or all alerts within the current case.

    3. Retrieves the currently attached workflows for each target alert by making
    an internal API call (`get_workflow_instance_card`) to the Google SecOps platform.

    4. Iterates through the provided playbook names and checks if they are already
    attached to the alert.

    5. If duplicates are allowed or the playbook is not yet attached, it attaches
    the playbook to the alert using the internal `attach_workflow_to_case` method.

    6. Compiles and returns a summary message detailing which playbooks were successfully
    attached, skipped as duplicates, or failed to attach.


    ### Additional Notes

    - The action supports execution on both Alert and Case scopes.

    - If 'Allow Duplicates' is set to false, the action will skip attaching playbooks
    that are already running or attached to the target alert.
