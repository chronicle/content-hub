    \ Content | The detailed instructions or content of the task. | Content | Yes\
    \ |\n| SLA (in minutes) | The amount of time (in minutes) the assigned user/role\
    \ has to respond to the task. Default is 480. | String | No |\n| Task Title |\
    \ The title of the task. Supports Siemplify versions 6.0.0.0 and higher. | String\
    \ | No |\n| Due Date | Specific due date for the task in ISO8601 format. | String\
    \ | No |\n\n### Additional Notes\n* Either the **Due Date** or the **SLA (in minutes)**\
    \ parameter must be configured for the action to run. \n* If both **Due Date**\
    \ and **SLA (in minutes)** are provided, the **Due Date** parameter takes priority.\n\
    \n### Flow Description\n1. **Extract Parameters:** Retrieves the assignee, task\
    \ content, SLA, title, and due date from the action configuration.\n2. **Validate\
    \ Inputs:** Ensures that at least one deadline parameter (either Due Date or SLA)\
    \ is provided.\n3. **Compute Deadline:** Calculates the task's expiration time\
    \ in epoch milliseconds. If a Due Date is provided, it is parsed; otherwise, the\
    \ SLA duration is added to the current system time.\n4. **Version Check:** Identifies\
    \ the Google SecOps (Siemplify) system version to determine the correct API method\
    \ for task creation.\n5. **Create Task:** Calls the internal SOAR API to create\
    \ and assign the task within the context of the active case."
