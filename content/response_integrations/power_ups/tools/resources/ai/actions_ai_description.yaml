Delay Playbook V2:
  ai_description: >-
    ### General Description

    Temporarily pauses the execution of a playbook for a specified duration or until
    a specific cron expression is matched.


    ### Flow Description

    1. Retrieves the delay parameters (Seconds, Minutes, Hours, Days) or a Cron Expression.

    2. Calculates the target date and time for the playbook to resume.

    3. If a Cron Expression is provided, it calculates the next matching timestamp.

    4. Checks if the current time has reached or exceeded the target timestamp.

    5. If the target time has not been reached, suspends the playbook execution by
    returning an in-progress state.

    6. Once the target time is reached during subsequent async checks, completes the
    action to allow the playbook to proceed.


    ### Additional Notes

    The action runs asynchronously. The Cron Expression parameter takes priority over
    the manual time parameters (Seconds, Minutes, Hours, Days).
