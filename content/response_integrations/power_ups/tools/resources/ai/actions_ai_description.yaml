Delay Playbook Synchronous:
  ai_description: "Pauses the execution of a playbook synchronously for a specified\
    \ duration of up to 30 seconds. This utility action is designed for short, immediate\
    \ delays within a playbook flow where a brief wait is required before proceeding\
    \ to the next step. It operates by calculating a target end time and entering\
    \ a sleep loop until that time is reached.\n\n### Parameters Description\n\n|\
    \ Parameter | Description | Type | Mandatory | Notes |\n| :--- | :--- | :--- |\
    \ :--- | :--- |\n| Seconds | The number of seconds to pause the playbook execution.\
    \ | String | Yes | Must be a positive integer between 0 and 30. |\n\n### Additional\
    \ Notes\n\n*   **Synchronous Execution:** This action blocks the execution thread\
    \ for the duration of the delay. \n*   **Time Limit:** The maximum allowed delay\
    \ is 30 seconds. For delays longer than 30 seconds, it is recommended to use the\
    \ \"Delay Playbook V2\" action, which handles longer durations more efficiently.\n\
    *   **No Entity Interaction:** This action does not interact with or require any\
    \ entities to function.\n\n### Flow Description\n\n1.  **Parameter Extraction:**\
    \ The action retrieves the `Seconds` value provided by the user.\n2.  **Validation:**\
    \ It validates that the input is a positive number and falls within the supported\
    \ range of 0 to 30 seconds.\n3.  **Target Calculation:** The action calculates\
    \ the exact timestamp when the delay should conclude.\n4.  **Sleep Loop:** It\
    \ enters a loop that pauses execution in small increments (up to 1 second) until\
    \ the current time meets or exceeds the target timestamp.\n5.  **Completion:**\
    \ Once the delay is finished, the action returns a success message indicating\
    \ the configured delay was reached."
