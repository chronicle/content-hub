Delay Playbook V2:
  ai_description: "### General Description\nThe **Delay Playbook V2** action is a\
    \ utility designed to pause the execution of a playbook for a specified duration\
    \ or until a specific time condition is met. It supports both relative time delays\
    \ (seconds, minutes, hours, days) and absolute scheduling using Cron expressions.\
    \ This is an asynchronous action, meaning it will put the playbook into a waiting\
    \ state without consuming active execution resources until the timer expires.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Seconds | string | No | The amount of seconds\
    \ to delay the playbook. Defaults to \"0\". |\n| Minutes | string | No | The amount\
    \ of minutes to delay the playbook. Defaults to \"1\". |\n| Hours | string | No\
    \ | The amount of hours to delay the playbook. Defaults to \"0\". |\n| Days |\
    \ string | No | The amount of days to delay the playbook. Defaults to \"0\". |\n\
    | Cron Expression | string | No | A standard cron expression (e.g., `0 12 * *\
    \ *`). If provided, this takes precedence over the relative time parameters and\
    \ determines the next occurrence when the playbook should resume. |\n\n### Additional\
    \ Notes\n- If the **Cron Expression** is provided, the relative time parameters\
    \ (Seconds, Minutes, etc.) are ignored.\n- If no parameters are provided, the\
    \ action defaults to a 1-minute delay.\n- Because this is an asynchronous action,\
    \ the SOAR platform will periodically re-evaluate the condition until the target\
    \ time is reached.\n\n### Flow Description\n1. **Initialization**: The action\
    \ retrieves the delay parameters or the Cron expression from the input.\n2. **Target\
    \ Calculation**: \n    - If a **Cron Expression** is present, the action calculates\
    \ the next valid timestamp based on the current UTC time.\n    - If relative parameters\
    \ are used, the action calculates a target date by adding the specified seconds,\
    \ minutes, hours, and days to the current UTC time.\n3. **Execution Check**: The\
    \ action compares the calculated target time with the current time.\n4. **State\
    \ Management**: \n    - If the target time has already passed or is reached, the\
    \ action returns a `COMPLETED` status, allowing the playbook to continue.\n  \
    \  - If the target time is in the future, the action returns an `IN_PROGRESS`\
    \ status and stores the target timestamp in the `additional_data` field.\n5. **Async\
    \ Wait**: The SOAR framework's `wait` mechanism periodically triggers the script\
    \ to check if the current time has finally met or exceeded the stored target timestamp."
