Delay Playbook Synchronous:
  ai_description: >-
    ### General Description

    Temporarily pauses the execution of a playbook for a specified number of seconds
    (up to 30 seconds). This action is useful for introducing a synchronous delay
    to wait for short-lived external processes, rate limits, or system updates before
    proceeding to the next step in the playbook.


    ### Flow Description

    1. Extracts the `Seconds` parameter provided by the user.

    2. Validates that the requested delay is a positive integer and falls within the
    allowed range (0 to 30 seconds).

    3. Calculates the target completion time by adding the specified seconds to the
    current time.

    4. Pauses execution using a synchronous sleep loop until the target time is reached.

    5. Returns a success message indicating the delay has completed.


    ### Additional Notes

    For delays longer than 30 seconds, the "Delay Playbook V2" action should be used
    instead to avoid blocking worker threads unnecessarily.
