    ### General Description

    Performs a DNS lookup on IP Address and Hostname entities using specified DNS
    servers. This action queries external DNS servers to resolve forward or reverse
    DNS records and returns the results as structured JSON data.


    ### Flow Description

    1. Retrieves the list of DNS servers and the requested DNS data type (e.g., A,
    MX, TXT) from the action parameters.

    2. Iterates through the target entities provided in the case.

    3. For IP Address entities, performs a reverse DNS (PTR) lookup against the specified
    DNS servers.

    4. For Hostname entities, performs a forward DNS query for the specified record
    type against the specified DNS servers.

    5. Aggregates the DNS responses and attaches them to the action's JSON result.


    ### Additional Notes

    Uses the `dnspython` library to perform UDP DNS queries. If multiple DNS servers
    are provided, it will attempt to query each one sequentially for the target entities.
