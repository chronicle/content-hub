Wait for Playbook to Complete:
  ai_description: >-
    ### General Description

    This action causes the current playbook execution to pause and wait until a specified
    playbook or block, which is running on the same alert or case, completes its execution.


    ### Flow Description

    1. Retrieves the execution scope (Alert or Case) and the target playbook name
    from the parameters.

    2. Makes an internal API call to the SOAR platform to fetch the workflow instance
    status for the specified playbook.

    3. Evaluates the status of the target playbook.

    4. If the target playbook is in progress or pending, the action returns an 'In
    Progress' state, causing the current playbook to wait.

    5. If the target playbook is completed, failed, terminated, or not found, the
    action returns a 'Completed' state, releasing the lock and allowing the current
    playbook to proceed.


    ### Additional Notes

    This action is asynchronous and will periodically re-evaluate the target playbook's
    status until it reaches a terminal state.
