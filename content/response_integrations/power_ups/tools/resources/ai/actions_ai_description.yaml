    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the alert context properties with new scoring and severity information.
    reasoning: >-
      The action does not fetch data from external sources. It mutates internal data
      by updating the alert context properties (`ALERT_SCORE_INFO`, `ALERT_SCORE`,
      `ALERT_SEVERITY`) with newly calculated scoring information. It does not update
      entities, create insights, or add case comments.
  categories:
