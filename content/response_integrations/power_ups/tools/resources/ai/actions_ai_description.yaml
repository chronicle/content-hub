  ai_description: >-
    ### General Description

    The **Get Certificate Details** action retrieves and analyzes the SSL/TLS certificate
    for a specified URL. It provides critical security information such as the certificate's
    validity, issuer, and expiration status, helping analysts verify the trust and
    integrity of a remote host.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Url to check | The hostname or URL from which to retrieve the SSL certificate.
    | String | Yes | Defaults to `expired.badssl.com`. |


    ### Flow Description

    1. **Input Extraction**: Retrieves the target URL from the action parameters.

    2. **Connection**: Establishes a network connection to the target host on port
    443 using a default SSL context (TLS v1.2 minimum).

    3. **Certificate Retrieval**: Fetches the peer certificate in binary (DER) format.

    4. **Parsing**: Uses the `cryptography` library to parse the X.509 certificate.

    5. **Data Extraction**: Extracts the Common Name (CN), Subject Alternative Names
    (SAN), and Issuer information.

    6. **Analysis**: Calculates the number of days until expiration and determines
    if the certificate is expired or self-signed.

    7. **Output**: Returns a structured JSON object containing all extracted and calculated
    certificate details.


    ### Additional Notes

    - This action does not process entities from the Google SecOps environment; it
    operates solely on the provided URL parameter.

    - It uses port 443 by default for the connection.
