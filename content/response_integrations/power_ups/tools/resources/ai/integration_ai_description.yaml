  reasoning: >-
    The 'tools' integration is a utility-focused integration that provides various
    helper actions for playbook orchestration, data manipulation, and internal SOAR
    platform tasks. While it does not fit into categories like SIEM, EDR, Network
    Security, or IAM, it does contain specific actions that perform enrichment on
    external indicators. Specifically, 'DNS Lookup' (for IP/Hostname), 'Get Certificate
    Details' (for URL), and 'Look-A-Like Domains' (for Domain) are enrichment actions
    that provide reputation and contextual information for external indicators, which
    aligns with the 'Threat Intelligence' category definition. Other actions like
    'Get Case Data' and 'Get Context Value' provide internal enrichment, but the 'Threat
    Intelligence' category is the most appropriate fit for the external indicator
    enrichment capabilities present.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
