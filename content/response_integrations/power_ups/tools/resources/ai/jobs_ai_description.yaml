Close Cases Based On Search:
  ai_description: >-
    ### General Description

    This job automates the bulk closure of cases in Google SecOps based on a specific
    search query. It identifies open cases matching the provided search criteria and
    closes them using the specified reason, root cause, and comment. This is useful
    for cleaning up large volumes of cases (e.g., false positives) that meet specific
    criteria.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Search Payload | String | No | The JSON payload used in the 'CaseSearchEverything'
    API call to identify cases to close. |

    | Close Comment | String | Yes | The comment to be added to the closed cases.
    |

    | Close Reason | Integer | Yes | The reason for closing the case (0 = Malicious,
    1 = Not Malicious). |

    | Root Cause | String | Yes | The root cause category for the closed cases (must
    match settings in Case Data). |


    ### Flow Description

    1. Parses the 'Search Payload' parameter and ensures the search is restricted
    to open cases by setting 'isCaseClosed' to 'False'.

    2. Executes a search query using the 'CaseSearchEverything' API to retrieve a
    list of matching case IDs.

    3. If matching cases are found, it proceeds to perform a bulk closure operation.

    4. Closes the identified cases using the provided 'Close Reason', 'Root Cause',
    and 'Close Comment'.

    5. Logs the outcome, including the number of cases successfully closed or a message
    if no cases were found.
Tag Untouched Cases:
  ai_description: >-
    ### General Description

    This job automates case management by identifying "stale" or "untouched" open
    cases. It scans for cases that have not been updated within a specified timeframe
    and applies custom tags to them, facilitating better case prioritization and workflow
    management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | The tags to apply to the identified cases. Multiple tags
    can be provided as a comma-separated list. |

    | Unmodified Time | Integer | Yes | The duration in hours since the last case
    update that triggers the tagging action. |


    ### Flow Description

    1. Calculates the cutoff timestamp based on the current time minus the configured
    `Unmodified Time`.

    2. Queries Google SecOps for all open cases that have not been updated since the
    calculated cutoff time.

    3. If matching cases are found, parses the provided `Tags` parameter into a list.

    4. Iterates through each identified case and applies the specified tags using
    the `add_tag` method.

    5. Logs the outcome, including the number of cases tagged or a message indicating
    no stale cases were found.
