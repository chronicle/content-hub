Pull Connector:
  ai_description: >-
    ### General Description

    The **Pull Connector** job is part of the **GitSync** integration. Its primary
    purpose is to synchronize a specific connector's configuration and logic from
    a remote Git repository to the Google SecOps (Chronicle) SOAR platform. This job
    facilitates version control and automated deployment of connectors, ensuring that
    the SOAR environment stays updated with the latest connector definitions, including
    optional related components like Visual Families and Ontology Mappings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL found
    in the integration instance settings. |

    | Branch | String | No | Optional parameter to override the Git branch found in
    the integration instance settings. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint for Git server verification. |

    | Connector Name | String | Yes | The exact name of the connector to pull from
    the Git repository. |

    | Include Visual Families | Boolean | No | Whether to pull and install the visual
    families associated with the connector's alert types. |

    | Include Mappings | Boolean | No | Whether to pull and install the ontology mappings
    (rules and records) associated with the connector. |


    ### Flow Description

    1. **Initialization**: The job extracts the target connector name and configuration
    overrides (URL, Branch, Fingerprint) from the job parameters.

    2. **Git Connection**: It initializes the `GitSyncManager` to connect to the specified
    Git repository and the SOAR API.

    3. **Fetch Connector**: The job searches the repository for the specified connector
    definition.

    4. **Installation**: If found, the job installs or updates the connector in the
    SOAR platform using the `install_connector` logic, which also handles integration
    dependency checks.

    5. **Dependency Resolution**: If the user opted to include Visual Families or
    Mappings, the job retrieves the mapping data for the connector's integration.

    6. **Visual Family Sync**: If enabled, it identifies visual families referenced
    in the mappings that are not yet installed in the SOAR platform and pulls/installs
    them from Git.

    7. **Mapping Sync**: If enabled, it installs the ontology mapping rules and records
    to ensure incoming alerts are correctly visualized and parsed.
Pull Content:
  ai_description: "### General Description\nThis job is a core component of the GitSync\
    \ integration, designed to synchronize and deploy content from a Git repository\
    \ into a Google SecOps (Chronicle) environment. It enables a CI/CD-like workflow\
    \ for SOAR resources, allowing users to pull playbooks, integrations, connectors,\
    \ jobs, and various system settings (like environments, tags, and SLA records)\
    \ from a version-controlled source. This job is essential for promoting content\
    \ between environments (e.g., from Development to Production) or restoring a system\
    \ configuration from a backup.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Repo URL | String\
    \ | No | Optional override for the Git repository URL defined in the integration\
    \ instance. |\n| Branch | String | No | Optional override for the Git branch to\
    \ pull content from. |\n| Git Server Fingerprint | String | No | Optional override\
    \ for the SSH fingerprint used to verify the Git server. |\n| Integrations | Boolean\
    \ | Yes | If enabled, pulls and installs custom integrations and custom code.\
    \ |\n| Playbooks | Boolean | Yes | If enabled, pulls and installs playbooks and\
    \ blocks, updating them based on name. |\n| Jobs | Boolean | Yes | If enabled,\
    \ pulls and installs job definitions. |\n| Connectors | Boolean | Yes | If enabled,\
    \ pulls and installs connector definitions. |\n| Integration Instances | Boolean\
    \ | Yes | If enabled, pulls and configures integration instances; note that passwords\
    \ may be overwritten. |\n| Visual Families | Boolean | Yes | If enabled, pulls\
    \ and updates ontology visual family definitions. |\n| Mappings | Boolean | Yes\
    \ | If enabled, pulls and updates ontology mapping rules. |\n| Environments |\
    \ Boolean | Yes | If enabled, creates or updates environment records. |\n| Dynamic\
    \ Parameters | Boolean | Yes | If enabled, creates or updates environment-specific\
    \ dynamic parameters. |\n| Logo | Boolean | Yes | If enabled, pulls and applies\
    \ the custom company logo. |\n| Case Tags | Boolean | Yes | If enabled, pulls\
    \ and updates case tag definitions. |\n| Case Stages | Boolean | Yes | If enabled,\
    \ pulls and updates case stage definitions. |\n| Case Title Settings | Boolean\
    \ | Yes | If enabled, pulls and applies case title formatting settings. |\n| Case\
    \ Close Reasons | Boolean | Yes | If enabled, pulls and updates custom case closure\
    \ reasons. |\n| Networks | Boolean | Yes | If enabled, pulls and updates network\
    \ definitions. |\n| Domains | Boolean | Yes | If enabled, pulls and updates domain\
    \ alias definitions. |\n| Custom Lists | Boolean | Yes | If enabled, pulls and\
    \ updates custom tracking lists. |\n| Email Templates | Boolean | Yes | If enabled,\
    \ pulls and updates email template definitions. |\n| Blacklists | Boolean | Yes\
    \ | If enabled, pulls and updates blocklist/denylist records. |\n| SLA Records\
    \ | Boolean | Yes | If enabled, pulls and updates SLA definition records. |\n\
    | Simulated Cases | Boolean | Yes | If enabled, pulls and installs simulated cases\
    \ for testing purposes. |\n\n### Flow Description\n1. **Initialization**: The\
    \ job initializes the Git connection using the provided repository URL, branch,\
    \ and credentials (SSH key or Token).\n2. **Repository Sync**: It clones the repository\
    \ to a temporary directory or pulls the latest changes if the repository was previously\
    \ cloned.\n3. **Feature Selection**: The job checks the boolean parameters to\
    \ determine which types of content (e.g., Playbooks, Integrations, Settings) should\
    \ be processed.\n4. **Resource Processing**: For each enabled category, the job\
    \ reads the corresponding JSON or definition files from the Git repository.\n\
    5. **State Comparison**: It queries the Google SecOps API to identify existing\
    \ resources. It uses an internal validator to match resources by name or unique\
    \ identifiers.\n6. **Deployment (Upsert)**: \n    * **Integrations/Connectors/Jobs**:\
    \ Installs or updates the code and definitions.\n    * **Playbooks**: Uses a specialized\
    \ installer to handle complex logic, including mapping nested blocks and re-assigning\
    \ integration instances based on the target environment's availability.\n    *\
    \ **System Settings**: Updates global configurations like Environments, SLA records,\
    \ and Case Tags.\n7. **Completion**: Logs the results of the synchronization and\
    \ cleans up temporary files."
Pull Custom Family:
  ai_description: >-
    ### General Description

    The **Pull Custom Family** job is part of the **GitSync** integration. Its primary
    purpose is to synchronize a specific Visual Family definition from a remote Git
    repository into the Google SecOps SOAR platform. This job enables teams to maintain
    their ontology configurations (Visual Families) in a version-controlled environment
    and deploy them programmatically to SOAR instances.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL defined
    in the integration instance settings. |

    | Branch | String | No | Optional parameter to override the Git branch defined
    in the integration instance settings. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint used for Git server verification. |

    | Family Name | String | Yes | The exact name of the Visual Family to be retrieved
    from the repository. |


    ### Flow Description

    1. **Parameter Extraction**: The job retrieves the target `Family Name` and any
    optional Git configuration overrides (URL, Branch, Fingerprint) from the job settings.

    2. **Git Connection**: It initializes the `GitSyncManager`, which establishes
    a connection to the Git repository, cloning or pulling the latest changes to a
    temporary directory.

    3. **Content Retrieval**: The job searches the repository's directory structure
    (specifically under `Ontology/VisualFamilies/`) for a JSON definition matching
    the provided `Family Name`.

    4. **Ontology Update**: If the Visual Family is found in the repository, the job
    extracts its raw data and sends a request to the Google SecOps API to create or
    update the Visual Family in the platform's ontology.

    5. **Completion**: The job logs the success or failure of the synchronization
    and terminates the script.
Pull Integration:
  ai_description: >-
    ### General Description

    The **Pull Integration** job is a core component of the **GitSync** integration,
    designed to automate the deployment and synchronization of Google SecOps integrations
    from a Git repository. It allows administrators to maintain 'Integration as Code'
    by pulling specific integration definitions and scripts from a version-controlled
    repository and installing or updating them within the SOAR platform. The job supports
    both custom integrations and commercial integrations that have been extended with
    custom logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Install Whitelist | String | Yes | A comma-separated list of integration identifiers
    (e.g., 'VirusTotal, ServiceNow') to be pulled from the Git repository and installed
    or updated. |

    | Repo URL | String | No | The URL of the Git repository (HTTPS or SSH). If provided,
    this overrides the default repository URL defined in the integration's configuration.
    |

    | Branch | String | No | The specific Git branch to pull content from. If provided,
    this overrides the default branch defined in the integration's configuration.
    |

    | Git Server Fingerprint | String | No | The SSH fingerprint (SHA256 or MD5) used
    to verify the Git server's identity. If provided, this overrides the fingerprint
    defined in the integration's configuration. |


    ### Flow Description

    1. **Initialization**: The job extracts the list of integrations to process from
    the 'Install Whitelist' and retrieves any provided Git configuration overrides
    (URL, Branch, Fingerprint).

    2. **Git Synchronization**: It initializes a connection to the Git repository,
    cloning or pulling the latest changes into a temporary working directory on the
    SOAR runner.

    3. **Content Discovery**: The job iterates through the whitelist, searching the
    repository's `Integrations/` directory for the specified integration folders and
    their corresponding `.def` (definition) files.

    4. **Installation Logic**:
        * **Custom Integrations**: If the integration is marked as custom, the job
    packages the repository files into a ZIP blob and performs a full package import
    via the SOAR API.
        * **Commercial Integrations**: If the integration is commercial, the job ensures
    the base integration is installed (attempting a marketplace installation if missing)
    and then iterates through individual components (Actions, Connectors, Jobs, and
    Managers) to update their scripts and metadata in the IDE.
    5. **Completion**: The job logs the success or failure of each integration pull
    and performs a cleanup of the temporary local repository files.
Pull Jobs:
  ai_description: "### General Description\nThe **Pull Jobs** job is part of the **GitSync**\
    \ integration and is designed to synchronize SOAR Job definitions from a remote\
    \ Git repository to the Google SecOps platform. This enables a 'Configuration\
    \ as Code' workflow, allowing administrators to manage job settings\u2014such\
    \ as execution intervals and input parameters\u2014within a version-controlled\
    \ environment and deploy them automatically to the SOAR instance.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Job Whitelist | String | Yes | A comma-separated list of the\
    \ specific job names to be retrieved and installed from the Git repository. |\n\
    | Repo URL | String | No | Optional override for the Git repository URL. If not\
    \ provided, the URL from the integration instance configuration is used. |\n|\
    \ Branch | String | No | Optional override for the Git branch to pull from. If\
    \ not provided, the branch from the integration instance configuration is used.\
    \ |\n| Git Server Fingerprint | String | No | Optional override for the SSH fingerprint\
    \ (SHA256 or MD5) used to verify the Git server's identity. |\n\n### Flow Description\n\
    1. **Parameter Extraction**: The job parses the `Job Whitelist` to identify which\
    \ jobs need to be synchronized.\n2. **Git Initialization**: It initializes the\
    \ `GitSyncManager`, which establishes a connection to the Git repository using\
    \ the provided credentials (SSH key or Token) and overrides.\n3. **Repository\
    \ Sync**: The job clones or pulls the latest state of the repository to a temporary\
    \ working directory.\n4. **Job Retrieval**: For each job specified in the whitelist,\
    \ the job searches the `Jobs/` directory in the repository for a matching JSON\
    \ definition file.\n5. **Dependency Validation**: It verifies that the integration\
    \ associated with the job is already installed in the SOAR environment.\n6. **ID\
    \ Resolution**: The job queries the SOAR API to resolve the internal `jobDefinitionId`\
    \ (from the IDE) and checks if the job already exists to determine whether to\
    \ perform an update or a new installation.\n7. **Installation**: The job pushes\
    \ the configuration to the SOAR platform, updating the job's settings, parameters,\
    \ and run intervals.\n8. **Completion**: The script logs the success or failure\
    \ of each job pull and terminates."
Pull Mappings:
  ai_description: >-
    ### General Description

    This job is part of the GitSync integration and is designed to synchronize ontology
    mappings from a Git repository to Google SecOps. It allows administrators to manage
    alert mapping rules and visual family associations in a version-controlled environment
    and deploy them automatically to the SOAR platform. The job specifically targets
    mappings associated with a provided 'Source' (integration identifier or vendor).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL configured
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the Git branch used for
    synchronization. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint for Git server verification. |

    | Source | String | Yes | The integration identifier or vendor name. The job pulls
    all mappings related to this source from the repository (e.g., 'VirusTotal').
    |


    ### Flow Description

    1. **Parameter Extraction**: The job retrieves the 'Source' parameter and any
    optional Git configuration overrides.

    2. **Git Initialization**: Initializes the GitSync manager to establish a connection
    with the remote repository and pull the latest changes to a local temporary directory.

    3. **Content Retrieval**: Locates the mapping files within the repository under
    the path `Ontology/Mappings/{Source}/`, specifically looking for record and rule
    JSON files.

    4. **Ontology Update**: Parses the retrieved mapping rules and updates the Google
    SecOps ontology by adding or updating mapping rules for family and system fields.

    5. **Visual Family Association**: Updates the platform's visualization settings
    by linking the specified products and event names to their respective visual families
    as defined in the repository.
Pull Playbook:
  ai_description: >-
    ### General Description

    This job automates the retrieval and installation of specific playbooks and playbook
    blocks from a Git repository into the Google SecOps (Chronicle) SOAR platform.
    It allows teams to maintain version-controlled workflows in Git and selectively
    synchronize them to the SOAR environment, ensuring that automation logic is consistent
    and up to date.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL defined
    in the integration instance settings. |

    | Branch | String | No | Optional parameter to override the Git branch defined
    in the integration instance settings. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint used for Git server verification. |

    | Playbook Whitelist | String | Yes | A comma-separated list of playbook names
    to pull from the repository. |

    | Include Playbook Blocks | Boolean | Yes | If set to True, the job automatically
    identifies and pulls any playbook blocks referenced by the playbooks in the whitelist.
    |


    ### Flow Description

    1. **Initialization**: The job extracts configuration parameters and initializes
    the GitSync manager to establish a connection with the Git repository.

    2. **Playbook Discovery**: It iterates through the provided whitelist and attempts
    to locate the corresponding playbook files within the repository's directory structure.

    3. **Dependency Mapping**: If the "Include Playbook Blocks" flag is enabled, the
    job parses the retrieved playbooks to identify any nested blocks and fetches them
    from the repository as well.

    4. **Workflow Installation**: The job passes the collected playbooks and blocks
    to the installation logic, which handles the creation of new workflows or the
    updating of existing ones.

    5. **ID and Environment Alignment**: During installation, the job automatically
    maps environment names, reconciles internal identifiers with existing local versions,
    and updates the local modification cache to track synchronization state.
Pull Simulated Cases:
  ai_description: >-
    ### General Description

    This job is part of the **GitSync** integration and is designed to automate the
    import of simulated cases from a Git repository into Google SecOps. It allows
    security teams to maintain simulation content (used for testing playbooks or training)
    in a version-controlled environment and synchronize specific cases to the SOAR
    platform on demand or on a schedule.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to pull from the repository (e.g., "Phishing_Simulation, Malware_Test"). |

    | Repo URL | String | No | Optional parameter to override the Git repository URL
    configured in the integration instance. |

    | Branch | String | No | Optional parameter to override the Git branch configured
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint (SHA256 or MD5) for the Git server. |


    ### Flow Description

    1. **Parameter Extraction**: The job parses the `Simulated Cases` string into
    a list of individual case names.

    2. **Manager Initialization**: It initializes the `GitSyncManager`, which handles
    the connection to the Git repository and the Google SecOps API.

    3. **Content Retrieval**: For each specified case name, the job queries the Git
    repository's `SimulatedCases/` directory to retrieve the corresponding `.case`
    file content.

    4. **Platform Import**: The job sends the retrieved case data to the Google SecOps
    API to import or update the simulated case in the platform.

    5. **Logging and Completion**: It logs the success or failure of each individual
    case import and terminates the script once the list is processed.
Push Connectors:
  ai_description: >-
    ### General Description

    The **Push Connectors** job exports specific connector configurations from Google
    SecOps to a Git repository. This job facilitates version control and portability
    of connector settings, allowing users to back up or migrate connector definitions.
    Beyond the connector itself, the job can optionally package associated ontology
    components, such as mapping rules and visual families, ensuring that the entire
    ingestion logic for a specific integration is preserved in the repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git transaction.
    |

    | Connectors | String | Yes | A comma-separated list of connector display names
    to be pushed to the repository. |

    | Branch | String | No | Optional parameter to override the Git branch defined
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint for the Git server. |

    | Repo URL | String | No | Optional parameter to override the repository URL defined
    in the integration instance. |

    | Commit Author | String | No | Optional parameter to override the commit author
    (Format: `Name <email@example.com>`). |

    | Include Visual Families | Boolean | No | If set to `true`, the job will identify
    and export visual families associated with the connector's mappings. |

    | Include Mappings | Boolean | No | If set to `true`, the job will export the
    ontology mapping rules and records associated with the connector's integration.
    |

    | Readme Addon | String | No | Markdown text to append to the end of the README
    file for all connectors pushed during this run. |


    ### Flow Description

    1. **Initialization**: The job initializes the `GitSyncManager`, which clones
    or pulls the latest state of the target Git repository and validates the connection.

    2. **Connector Filtering**: It retrieves all installed connectors from the SOAR
    environment and filters them to match the names provided in the `Connectors` parameter.

    3. **Metadata Update**: If a `Readme Addon` is provided, the job updates the `GitSync.json`
    metadata file to include the additional documentation for the selected connectors.

    4. **Connector Export**: For each matching connector, the job generates the JSON
    definition and a README file, then stages them for the Git commit.

    5. **Ontology Enrichment (Optional)**:
        * If **Include Mappings** is enabled, the job fetches all ontology records
    and mapping rules associated with the connector's parent integration and stages
    them.
        * If **Include Visual Families** is enabled, the job identifies the specific
    visual families used by those mappings and exports their definitions and icons
    (PNG).
    6. **Finalization**: The job performs a Git commit with the provided message and
    author details, then pushes the changes to the remote repository.
Push Content:
  ai_description: "### General Description\nThis job automates the backup and version\
    \ control of Google SecOps (Chronicle) platform content by pushing it to a Git\
    \ repository. It allows administrators to synchronize a wide range of platform\
    \ components\u2014including playbooks, integrations, connectors, and system settings\u2014\
    to a remote repository for configuration management, auditing, and disaster recovery\
    \ purposes. The job supports granular control over which content types are synchronized\
    \ and provides options to override repository configurations and handle sensitive\
    \ data like passwords.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Commit | String | Yes | The\
    \ commit message to be used for the Git operation. |\n| Repo URL | String | No\
    \ | Optional parameter to override the repository URL defined in the integration\
    \ instance. |\n| Branch | String | No | Optional parameter to override the target\
    \ Git branch. |\n| Git Server Fingerprint | String | No | Optional parameter to\
    \ override the SSH fingerprint for server verification. |\n| Commit Author | String\
    \ | No | Optional parameter to override the commit author (Format: `Name <email@example.com>`).\
    \ |\n| Commit Passwords | Boolean | Yes | If set to true, includes passwords in\
    \ the synchronization. **Warning:** Use only for testing; never commit passwords\
    \ to production repositories. |\n| Integrations | Boolean | Yes | Whether to push\
    \ all custom and commercial integrations. |\n| Playbooks | Boolean | Yes | Whether\
    \ to push all playbooks and blocks. |\n| Jobs | Boolean | Yes | Whether to push\
    \ all defined jobs. |\n| Connectors | Boolean | Yes | Whether to push all defined\
    \ connectors. |\n| Integration Instances | Boolean | Yes | Whether to push integration\
    \ instance configurations across all environments. |\n| Visual Families | Boolean\
    \ | Yes | Whether to push custom visual families from the ontology. |\n| Mappings\
    \ | Boolean | Yes | Whether to push ontology mapping rules and records. |\n| Environments\
    \ | Boolean | Yes | Whether to push environment definitions. |\n| Dynamic Parameters\
    \ | Boolean | Yes | Whether to push environment-specific dynamic parameters. |\n\
    | Logo | Boolean | Yes | Whether to push the platform logo settings. |\n| Case\
    \ Tags | Boolean | Yes | Whether to push case tag definitions. |\n| Case Stages\
    \ | Boolean | Yes | Whether to push case stage definitions. |\n| Case Title Settings\
    \ | Boolean | Yes | Whether to push case title formatting settings. |\n| Case\
    \ Close Reasons | Boolean | Yes | Whether to push case close reasons and root\
    \ causes. |\n| Networks | Boolean | Yes | Whether to push network definitions.\
    \ |\n| Domains | Boolean | Yes | Whether to push domain records. |\n| Custom Lists\
    \ | Boolean | Yes | Whether to push custom tracking lists. |\n| Email Templates\
    \ | Boolean | Yes | Whether to push email templates. |\n| Blacklists | Boolean\
    \ | Yes | Whether to push denylist/blocklist records. |\n| SLA Records | Boolean\
    \ | Yes | Whether to push SLA definition records. |\n| Simulated Cases | Boolean\
    \ | Yes | Whether to push simulated cases used for testing. |\n\n### Flow Description\n\
    1. **Initialization**: The job initializes the `GitSyncManager`, which sets up\
    \ a temporary working directory and establishes a connection to the Git repository\
    \ using the provided credentials and configuration overrides.\n2. **Feature Selection**:\
    \ It evaluates the boolean parameters to determine which platform components (features)\
    \ are selected for synchronization.\n3. **Content Extraction**: For each enabled\
    \ feature, the job calls the SecOps API to fetch the relevant data:\n    * **Integrations/Playbooks/Connectors**:\
    \ Exports the packages or definitions and prepares them for Git storage.\n   \
    \ * **Settings**: Retrieves system-wide configurations like Networks, SLA records,\
    \ and Case Tags.\n    * **Integration Instances**: Iterates through environments\
    \ to fetch instance settings, optionally including passwords if the `Commit Passwords`\
    \ flag is enabled.\n4. **Staging**: The extracted content is formatted into JSON\
    \ or appropriate file types and staged in the local Git tree managed by the `GitSyncManager`.\n\
    5. **Commit and Push**: Once all selected content is staged, the job generates\
    \ a root `README.md` summarizing the repository content, performs a Git commit\
    \ with the specified message, and pushes the changes to the remote repository."
Push Custom Family:
  ai_description: >-
    ### General Description

    The **Push Custom Family** job is part of the **GitSync** integration. Its primary
    purpose is to export custom Visual Families (ontology visualization configurations)
    from the Google SecOps platform to a Git repository. This enables version control,
    backup, and the ability to synchronize visualization rules across different environments.
    The job retrieves the full configuration of specified families, including their
    rules and associated icons, and pushes them to the repository along with generated
    documentation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to use when pushing changes to the
    Git repository. |

    | Repo URL | String | No | Optional override for the Git repository URL configured
    in the integration instance. |

    | Branch | String | No | Optional override for the Git branch configured in the
    integration instance. |

    | Git Server Fingerprint | String | No | Optional override for the SSH fingerprint
    of the Git server for verification. |

    | Commit Author | String | No | Optional override for the commit author (e.g.,
    "John Doe <john@example.com>"). |

    | Family Name | String | Yes | A comma-separated list of the names of custom visual
    families to export. |

    | Readme Addon | String | No | Optional Markdown text to append to the README.md
    file of the exported visual families. |


    ### Flow Description

    1. **Initialization**: The job extracts the commit message, the list of visual
    family names to export, and any optional configuration overrides.

    2. **Git Setup**: It initializes the GitSync manager, which clones the remote
    repository or pulls the latest changes into a temporary working directory.

    3. **Data Retrieval**: The job queries the Google SecOps API to fetch all custom
    visual families defined in the system.

    4. **Filtering**: It iterates through the retrieved families and identifies those
    that match the names provided in the `Family Name` parameter.

    5. **Metadata Update**: If a `Readme Addon` is provided, the job updates the GitSync
    metadata file (`GitSync.json`) to include the additional documentation for the
    selected families.

    6. **Staging**: For each matching family, the job retrieves the full data (including
    rules and the base64-encoded image) and stages the corresponding JSON, PNG, and
    README files in the local repository structure.

    7. **Commit and Push**: Finally, the job commits the staged changes with the provided
    commit message and pushes the new commit to the remote Git repository.
Push Integration:
  ai_description: >-
    ### General Description

    The **Push Integration** job automates the synchronization of Google SecOps (Chronicle)
    integrations from the SOAR environment to a remote Git repository. It enables
    version control for both custom and commercial integrations by exporting their
    definitions, scripts, and resources, and then committing them to a specified Git
    branch. This job is essential for maintaining a 'Configuration as Code' workflow,
    allowing teams to track changes, collaborate on integration development, and maintain
    a backup of their SOAR logic in a centralized repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git operation.
    |

    | Push Whitelist | String | Yes | A comma-separated list of integration identifiers
    (e.g., 'VirusTotal, ServiceNow') that should be exported and pushed to the repository.
    |

    | Repo URL | String | No | Optional override for the Git repository URL defined
    in the integration instance settings. |

    | Branch | String | No | Optional override for the target Git branch defined in
    the integration instance settings. |

    | Git Server Fingerprint | String | No | Optional override for the SSH fingerprint
    (SHA256 or MD5) used to verify the Git server's identity. |

    | Commit Author | String | No | Optional override for the commit author. Must
    follow the format: `Name <email@domain.com>`. |

    | Readme Addon | String | No | Optional markdown text to append to the end of
    the generated README.md file for every integration pushed during this execution.
    |


    ### Flow Description

    1. **Initialization**: The job initializes the GitSync manager, which handles
    the local cloning or pulling of the target Git repository and establishes a connection
    to the Google SecOps API.

    2. **Integration Filtering**: It retrieves all available IDE items (integrations)
    from the SOAR environment and filters them against the provided **Push Whitelist**.

    3. **Package Export**: For each integration in the whitelist, the job exports
    the full integration package (including scripts, definitions, and dependencies)
    from the SOAR platform.

    4. **Metadata & Documentation**: If a **Readme Addon** is provided, the job updates
    the `GitSync.json` metadata file. It then generates or updates the `README.md`
    for the integration, incorporating the addon text.

    5. **Staging**: The job prepares the file structure within the local repository
    clone, overwriting the existing integration folders with the newly exported data.

    6. **Commit and Push**: Finally, the job creates a Git commit with the specified
    **Commit** message and author, and pushes the changes to the remote repository
    branch.
Push Job:
  ai_description: >-
    ### General Description

    The **Push Job** is a maintenance utility designed to export specific SOAR job
    configurations and metadata from Google SecOps to a remote Git repository. This
    job facilitates version control and backup of automation logic by synchronizing
    job definitions, including their parameters and run intervals, into a structured
    repository format. It allows users to specify a whitelist of jobs to export and
    provides the ability to append custom documentation to the generated README files.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git operation.
    |

    | Repo URL | String | No | Optional override for the Git repository URL defined
    in the integration instance. |

    | Branch | String | No | Optional override for the target Git branch defined in
    the integration instance. |

    | Git Server Fingerprint | String | No | Optional override for the Git server
    SSH fingerprint (SHA256 or MD5). |

    | Commit Author | String | No | Optional override for the commit author. Must
    follow the format: `Name <email@example.com>`. |

    | Job Whitelist | String | Yes | A comma-separated list of job names to be exported
    to the repository. |

    | Readme Addon | String | No | Markdown text to append to the end of the README
    file for every job pushed during this run. |


    ### Flow Description

    1. **Initialization**: The job initializes the `GitSyncManager`, which establishes
    a connection to the remote Git repository and the SOAR API, applying any provided
    parameter overrides (URL, Branch, Author).

    2. **Job Retrieval**: Fetches all installed jobs from the Google SecOps environment
    via the API.

    3. **Filtering**: Filters the retrieved jobs based on the `Job Whitelist`. It
    automatically excludes internal system jobs (e.g., Monitors) and jobs belonging
    to the `GitSync` integration itself to prevent recursion.

    4. **Content Preparation**: For each whitelisted job, it generates the job definition
    JSON. If a `Readme Addon` is provided, it updates the GitSync metadata to include
    this documentation for the specific job.

    5. **Documentation Generation**: Updates the individual job README files and regenerates
    the repository's root README to reflect the current state of exported jobs.

    6. **Synchronization**: Commits the changes to the local repository clone using
    the provided commit message and pushes the updates to the remote Git server.
Push Mappings:
  ai_description: >-
    ### General Description

    This job exports ontology mappings from Google SecOps to a Git repository. It
    identifies mapping records and rules associated with a specific source, cleanses
    the data (such as removing example event fields), and synchronizes them to the
    repository for version control and configuration management. This ensures that
    mapping logic for specific integrations or products is backed up and can be shared
    across environments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git operation.
    |

    | Repo URL | String | No | Optional parameter to override the repository URL configured
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the Git branch configured
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint used for Git server verification. |

    | Commit Author | String | No | Optional parameter to override the commit author
    (Format: "Name <email>"). |

    | Source | String | Yes | The specific source (e.g., integration or product name)
    whose mappings will be exported. |

    | Readme Addon | String | No | Optional markdown text to append to the end of
    the README.md file for the mappings pushed in this run. |


    ### Flow Description

    1. **Initialization**: The job initializes the GitSync manager using provided
    parameters or integration instance defaults to establish a connection with the
    Git repository.

    2. **Data Retrieval**: It fetches all ontology records from the SOAR platform
    and filters them to find records matching the specified `Source` parameter.

    3. **Rule Processing**: For each matching record, the job retrieves the corresponding
    mapping rules (family and system fields) and filters them to ensure they belong
    to the target source.

    4. **Data Cleansing**: It removes `exampleEventFields` from the records to ensure
    sensitive or unnecessary event data is not exported to the repository.

    5. **Metadata Update**: If a `Readme Addon` is provided, the job updates the GitSync
    metadata file (`GitSync.json`) with the additional markdown content.

    6. **Staging**: The job generates the mapping files (Records JSON, Rules JSON,
    and a README) and stages them in the local repository clone.

    7. **Commit and Push**: Finally, it commits the changes with the specified `Commit`
    message and pushes the updates to the remote Git repository.
Push Playbook:
  ai_description: >-
    ### General Description

    This job automates the export of playbooks and blocks from Google SecOps to a
    Git repository. It facilitates version control and synchronization of automation
    logic by allowing users to selectively push content based on specific names or
    folders. The job ensures that exported playbooks remain portable by updating integration
    instance references and can optionally include all dependent blocks and custom
    documentation addons.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Branch | String | No | Optional branch name to override the default branch configured
    in the integration instance. |

    | Commit | String | Yes | The commit message to be used for the Git push operation.
    |

    | Repo URL | String | No | Optional repository URL to override the default URL
    configured in the integration instance. |

    | Git Server Fingerprint | String | No | Optional SSH fingerprint for Git server
    verification (SHA256 or MD5). |

    | Commit Author | String | No | Optional author details in the format: `Name <email@domain.com>`.
    |

    | Folders Whitelist | String | No | Comma-separated list of playbook categories
    (folders) to include in the export. |

    | Playbook Whitelist | String | No | Comma-separated list of specific playbook
    names to include in the export. |

    | Readme Addon | String | No | Markdown text to append to the end of the README
    file for every playbook pushed during this run. |

    | Include Playbook Blocks | Boolean | Yes | If set to `True`, the job will also
    identify and export all blocks (nested workflows) used within the selected playbooks.
    |


    ### Flow Description

    1. **Initialization**: Extracts job parameters and initializes the `GitSyncManager`
    to establish a connection with the remote repository.

    2. **Content Discovery**: Fetches all playbooks currently installed in the Google
    SecOps environment.

    3. **Filtering**: Iterates through the playbooks and identifies those that match
    the names in the `Playbook Whitelist` or belong to categories in the `Folders
    Whitelist`.

    4. **Processing**: For each matching playbook, it retrieves the full workflow
    definition and updates integration instance display names to ensure the exported
    JSON is descriptive and portable.

    5. **Documentation Enrichment**: If a `Readme Addon` is provided, it updates the
    metadata to ensure the custom markdown is appended to the playbook's documentation.

    6. **Dependency Handling**: If `Include Playbook Blocks` is enabled, the job recursively
    finds and processes all blocks referenced by the selected playbooks.

    7. **Repository Update**: Generates an updated root README for the playbooks directory
    and stages all changes in the local Git tree.

    8. **Commit and Push**: Finalizes the process by committing the changes with the
    provided message and pushing them to the remote Git repository.
Push Simulated Cases:
  ai_description: >-
    ### General Description

    This job exports specific simulated cases from the Google SecOps platform to a
    Git repository. It enables version control and sharing of simulated attack scenarios
    by programmatically pushing selected cases to a centralized repository managed
    via the GitSync integration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The message to be associated with the Git commit. |

    | Repo URL | String | No | Optional URL of the Git repository. If provided, it
    overrides the URL configured in the integration instance. |

    | Branch | String | No | Optional Git branch name. If provided, it overrides the
    branch configured in the integration instance. |

    | Git Server Fingerprint | String | No | Optional SSH fingerprint for Git server
    verification. If provided, it overrides the fingerprint configured in the integration
    instance. |

    | Commit Author | String | No | Optional author details (e.g., "Name <email@example.com>").
    If provided, it overrides the author configured in the integration instance. |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to be exported to the repository. |


    ### Flow Description

    1. **Parameter Extraction**: The job retrieves the commit message and the list
    of simulated case names from the configuration.

    2. **Manager Initialization**: It initializes the `GitSyncManager`, which handles
    the connection to the Git repository and the Google SecOps API.

    3. **Case Retrieval**: The job fetches the list of all custom simulated cases
    currently available in the platform.

    4. **Filtering and Export**: It iterates through the platform's cases, identifying
    those that match the names provided in the parameters. For each match, it exports
    the case data.

    5. **Staging**: The exported case data is staged as a `.case` file within the
    local repository structure.

    6. **Commit and Push**: Finally, the job commits the changes using the provided
    commit message and pushes the new or updated case files to the remote Git repository.
