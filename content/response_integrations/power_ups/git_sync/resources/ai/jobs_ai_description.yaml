Push Playbook:
  ai_description: >-
    ### General Description

    This job exports playbooks and playbook blocks from Google SecOps to a Git repository.
    It allows for granular control over which content is synchronized by using whitelists
    for specific playbooks or entire folders (categories). A key feature of this job
    is its ability to maintain portability; it automatically converts internal integration
    instance identifiers within playbook steps into their corresponding display names,
    ensuring that exported playbooks can be successfully imported into different environments.
    It also handles dependencies by optionally including all blocks referenced by
    the selected playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Branch | String | No | The Git branch to push the content to. If not provided,
    the branch defined in the integration instance is used. |

    | Commit | String | Yes | The commit message to be used for the Git push operation.
    |

    | Repo URL | String | No | The URL of the target Git repository. If not provided,
    the URL defined in the integration instance is used. |

    | Git Server Fingerprint | String | No | The SSH fingerprint of the Git server
    for verification. Overrides the integration instance setting if provided. |

    | Commit Author | String | No | The author of the commit, formatted as `Name <email@example.com>`.
    Overrides the integration instance setting if provided. |

    | Folders Whitelist | String | No | A comma-separated list of playbook categories
    (folders) to export. |

    | Playbook Whitelist | String | No | A comma-separated list of specific playbook
    names to export. |

    | Readme Addon | String | No | Markdown text to be appended to the end of the
    `README.md` file for every playbook exported during this run. |

    | Include Playbook Blocks | Boolean | Yes | If set to `true`, the job will automatically
    identify and export all playbook blocks referenced by the selected playbooks.
    |


    ### Flow Description

    1. **Initialization**: Extracts job parameters and validates that at least one
    whitelist (Folders or Playbooks) has been provided.

    2. **Git Setup**: Initializes the Git manager, clones or pulls the target repository,
    and checks out the specified branch.

    3. **Content Filtering**: Retrieves all playbooks from the SOAR environment and
    filters them based on the `Playbook Whitelist` and `Folders Whitelist` parameters.

    4. **Playbook Processing**: For each matching playbook, the job:
        * Appends the `Readme Addon` to the playbook metadata if specified.
        * Fetches the full playbook definition.
        * Updates step parameters (like `IntegrationInstance`) from internal UUIDs
    to display names to ensure the playbook remains portable across different SOAR
    instances.
        * Stages the playbook JSON and generated README files in the local Git repository
    structure.
    5. **Block Processing**: If `Include Playbook Blocks` is enabled, the job identifies
    all blocks used within the processed playbooks, retrieves their definitions, updates
    their instance names, and stages them for export.

    6. **Finalization**: Generates an updated root README for the Playbooks directory,
    commits all staged changes with the provided commit message, and pushes the updates
    to the remote Git repository.
Push Simulated Cases:
  ai_description: >-
    ### General Description

    This job exports specific simulated cases from the Google SecOps platform to a
    Git repository. It enables version control and sharing of simulated attack scenarios
    by allowing users to select cases by name and push them to a configured Git branch.
    This is particularly useful for maintaining a library of attack simulations across
    different environments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git push operation.
    |

    | Repo URL | String | No | Optional parameter to override the repository URL configured
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the target branch configured
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the SSH
    fingerprint for the Git server. |

    | Commit Author | String | No | Optional parameter to override the commit author
    (e.g., "Name <email@example.com>"). |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to be exported to the repository. |


    ### Flow Description

    1. **Parameter Extraction**: The job retrieves the commit message and the list
    of simulated case names provided by the user.

    2. **Initialization**: It initializes the `GitSyncManager`, which sets up the
    connection to the Git repository and the Google SecOps API.

    3. **Case Retrieval**: The job fetches all available custom simulated cases from
    the Google SecOps platform.

    4. **Filtering and Staging**: It iterates through the platform's cases, matching
    them against the user-provided list. For each match, it exports the case data
    and stages it as a `.case` file in the repository's `SimulatedCases/` directory.

    5. **Commit and Push**: Finally, it performs a Git commit with the specified message
    and pushes the staged files to the remote repository.
