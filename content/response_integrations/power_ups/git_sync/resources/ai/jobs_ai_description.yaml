Pull Connector:
  ai_description: >-
    ### General Description

    This job synchronizes and installs a specific connector from a configured Git
    repository into the Google SecOps SOAR platform. It facilitates the deployment
    of connector definitions, including optional dependencies like visual families
    and mapping rules, to ensure the SOAR environment remains consistent with the
    repository's configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | The URL of the Git repository. |

    | Branch | String | No | The specific branch to pull from. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for Git server verification.
    |

    | Connector Name | String | Yes | The name of the connector to pull and install.
    |

    | Include Visual Families | Boolean | No | Whether to include related visual families
    used by the connector. |

    | Include Mappings | Boolean | No | Whether to include related mapping rules used
    by the connector. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided job parameters and configuration
    to establish a connection to the Git repository.

    2. Retrieves the specified connector definition from the Git repository.

    3. Installs the connector into the SOAR platform.

    4. If `Include Visual Families` is enabled, fetches and installs any missing visual
    families associated with the connector.

    5. If `Include Mappings` is enabled, installs the mapping rules associated with
    the connector.
Pull Content:
  ai_description: >-
    ### General Description

    This job synchronizes various content types from a Git repository into the Google
    SecOps (SOAR) platform. It enables 'Configuration as Code' by allowing users to
    manage integrations, playbooks, jobs, connectors, and other platform settings
    via a version-controlled repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | The URL of the Git repository. |

    | Branch | String | No | The branch to pull content from. |

    | Git Server Fingerprint | String | No | SSH fingerprint for Git server verification.
    |

    | Integrations | Boolean | Yes | Pull all custom integrations. |

    | Playbooks | Boolean | Yes | Pull all playbooks. |

    | Jobs | Boolean | Yes | Pull all jobs. |

    | Connectors | Boolean | Yes | Pull all connectors. |

    | Integration Instances | Boolean | Yes | Pull all integration instances. |

    | Visual Families | Boolean | Yes | Pull all visual families. |

    | Mappings | Boolean | Yes | Pull all mappings. |

    | Environments | Boolean | Yes | Create or update all environments. |

    | Dynamic Parameters | Boolean | Yes | Create or update all environment dynamic
    parameters. |

    | Logo | Boolean | Yes | Pull custom logo. |

    | Case Tags | Boolean | Yes | Pull all case tags. |

    | Case Stages | Boolean | Yes | Pull all case stages. |

    | Case Title Settings | Boolean | Yes | Pull case title settings. |

    | Case Close Reasons | Boolean | Yes | Pull custom case close reasons. |

    | Networks | Boolean | Yes | Pull networks. |

    | Domains | Boolean | Yes | Pull domains. |

    | Custom Lists | Boolean | Yes | Pull custom lists. |

    | Email Templates | Boolean | Yes | Pull email templates. |

    | Blacklists | Boolean | Yes | Pull blocklists. |

    | SLA Records | Boolean | Yes | Pull SLA Records. |

    | Simulated Cases | Boolean | Yes | Pull simulated cases. |


    ### Flow Description

    1. Initializes the `GitSyncManager` to connect to the Git repository and the SOAR
    API.

    2. Extracts the enabled features from the job parameters.

    3. Iterates through each enabled feature:
        - Fetches the corresponding content from the Git repository.
        - Compares the fetched content with the existing configuration in the SOAR
    platform.
        - Performs the necessary API calls to create, update, or import the content
    into the SOAR platform.
    4. Logs the status of each operation and completes the job.
Pull Custom Family:
  ai_description: >-
    ### General Description

    This job imports a specific custom visual family from a configured Git repository
    into the Google SecOps SOAR platform. It ensures that visual family definitions,
    which dictate how entities are visualized and related, are synchronized from version
    control to the SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL found
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch found in the
    integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint found in the integration instance. |

    | Family Name | String | Yes | The name of the visual family to pull from the
    repository. |


    ### Flow Description

    1. Extracts the `Family Name` parameter from the job configuration.

    2. Initializes the `GitSyncManager` to interface with the Git repository.

    3. Attempts to retrieve the specified visual family data from the repository.

    4. If the visual family is found, it adds or updates the definition in the SOAR
    platform.

    5. Logs the success or failure of the import operation.
Pull Integration:
  ai_description: >-
    ### General Description

    The 'Pull Integration' job is a component of the GitSync integration designed
    to synchronize integrations from a version-controlled Git repository to the Google
    SecOps (Chronicle) SOAR environment. It enables automated deployment and updates
    of integrations by pulling them from a specified repository branch and installing
    them into the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Install Whitelist | String | Yes | A comma-separated list of integration names
    to pull from the repository. |

    | Repo URL | String | No | The URL of the Git repository. Overrides the default
    instance setting. |

    | Branch | String | No | The specific branch to pull from. Overrides the default
    instance setting. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server.
    Overrides the default instance setting. |


    ### Flow Description

    1. Extracts the 'Install Whitelist' parameter to determine which integrations
    to synchronize.

    2. Initializes the GitSyncManager with repository configuration (URL, branch,
    credentials).

    3. Iterates through each integration name provided in the whitelist.

    4. Fetches the integration definition from the Git repository.

    5. If the integration exists in the repository, it installs or updates the integration
    in the SOAR environment.

    6. Logs the status of each installation attempt.
Pull Jobs:
  ai_description: >-
    ### General Description

    This job is part of the GitSync integration and is used to synchronize specific
    job definitions from a Git repository into the Google SecOps (Chronicle) SOAR
    environment. It enables automated deployment of job configurations stored in version
    control, ensuring that the SOAR environment remains consistent with the repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job Whitelist | String | Yes | A comma-separated list of job names to pull from
    the repository. |

    | Repo URL | String | No | Optional parameter to override the repository URL found
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch found in the
    integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint found in the integration instance. |


    ### Flow Description

    1. Parses the 'Job Whitelist' parameter to identify the specific jobs to be pulled.

    2. Initializes the GitSyncManager using the integration instance configuration
    (or provided overrides).

    3. Iterates through the list of requested job names.

    4. Fetches the job definition from the connected Git repository.

    5. Installs or updates the job definition within the SOAR environment.

    6. Logs the status of each job pull operation.
Pull Mappings:
  ai_description: >-
    ### General Description

    This job synchronizes ontology mapping rules from a Git repository to the Google
    SecOps SOAR platform. It is part of the `GitSync` integration, ensuring that mapping
    configurations, such as visual families and event mappings, remain consistent
    with the definitions stored in the source control repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL found
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch found in the
    integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint found in the integration instance. |

    | Source | String | Yes | The integration identifier or vendor name. All mappings
    related to this source are pulled from the repository. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided job parameters or the integration
    instance's default configuration.

    2. Fetches the mapping definitions (records and rules) for the specified `Source`
    from the Git repository.

    3. Installs or updates the mapping rules and visual family associations in the
    SOAR platform.
Pull Playbook:
  ai_description: >-
    ### General Description

    The "Pull Playbook" job is a utility within the GitSync integration designed to
    synchronize specific playbooks and their associated blocks from a remote Git repository
    into the Google SecOps SOAR environment. This job allows users to selectively
    pull and install version-controlled automation content, ensuring that the SOAR
    environment remains aligned with the latest definitions stored in Git.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | The URL of the Git repository. Overrides the value
    configured in the integration instance. |

    | Branch | String | No | The specific branch to pull from. Overrides the value
    configured in the integration instance. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server.
    Overrides the value configured in the integration instance. |

    | Playbook Whitelist | String | Yes | A comma-separated list of playbook names
    to be pulled from the repository. |

    | Include Playbook Blocks | Boolean | Yes | If set to True, the job will also
    pull and install any blocks associated with the specified playbooks. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided job parameters or the default
    settings from the GitSync integration instance.

    2. Parses the `Playbook Whitelist` parameter to generate a list of target playbook
    names.

    3. Iterates through the list of target playbooks, fetching each one from the Git
    repository.

    4. If `Include Playbook Blocks` is enabled, the job identifies and fetches all
    blocks associated with the retrieved playbooks.

    5. Aggregates the fetched playbooks and blocks, then executes the installation
    process to update or create them within the SOAR environment.
Pull Simulated Cases:
  ai_description: >-
    ### General Description

    This job imports simulated cases from a Git repository into the Google SecOps
    SOAR platform. It enables users to synchronize specific simulated cases from a
    version-controlled repository, facilitating the testing and validation of security
    workflows and playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to pull from the repository. |

    | Repo URL | String | No | Optional parameter to override the repository URL defined
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch defined in
    the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint defined in the integration instance. |


    ### Flow Description

    1. Parses the 'Simulated Cases' parameter to identify the specific cases to be
    imported.

    2. Initializes the GitSyncManager to establish a connection with the configured
    Git repository.

    3. Iterates through the list of provided case names.

    4. Retrieves the content of each simulated case from the Git repository.

    5. Imports the retrieved case data into the SOAR platform via the API.
Push Connectors:
  ai_description: >-
    ### General Description

    This job exports specific connector configurations, along with their optional
    associated mappings and visual families, from Google SecOps to a configured Git
    repository. It facilitates version control and synchronization of connector definitions,
    ensuring that changes made in the SOAR platform are tracked and stored in a remote
    Git repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push operation. |

    | Connectors | String | Yes | A comma-separated list of connector display names
    to be pushed to the repository. |

    | Branch | String | No | The Git branch to push to (overrides the setting in the
    integration instance). |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    (overrides the setting in the integration instance). |

    | Repo URL | String | No | The repository URL (overrides the setting in the integration
    instance). |

    | Commit Author | String | No | The author name and email for the commit (overrides
    the setting in the integration instance). |

    | Include Visual Families | Boolean | No | Whether to include related visual families
    used by the connector. |

    | Include Mappings | Boolean | No | Whether to include related ontology mappings
    used by the connector. |

    | Readme Addon | String | No | Markdown content to append to the README file of
    the pushed connectors. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided configuration and credentials.

    2. Retrieves the list of installed connectors from the SOAR platform.

    3. Filters the connectors based on the names provided in the `Connectors` parameter.

    4. For each matching connector:
        * Applies the optional `Readme Addon` to the connector's metadata if provided.
        * Pushes the connector definition to the Git repository.
        * If `Include Mappings` is enabled, fetches and pushes associated ontology
    mappings.
        * If `Include Visual Families` is enabled, fetches and pushes associated visual
    families.
    5. Commits all changes to the Git repository with the specified commit message
    and pushes them to the remote server.
Push Content:
  ai_description: >-
    ### General Description

    The "Push Content" job is a utility within the GitSync integration designed to
    synchronize various configuration items from the Google SecOps (SOAR) platform
    to a designated Git repository. This job enables users to maintain version control,
    perform backups, and track changes to platform configurations such as playbooks,
    integrations, and system settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git push operation.
    |

    | Repo URL | String | No | The URL of the Git repository. If provided, it overrides
    the value configured in the integration instance. |

    | Branch | String | No | The target Git branch name. If provided, it overrides
    the value configured in the integration instance. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for Git server verification.
    If provided, it overrides the value configured in the integration instance. |

    | Commit Author | String | No | The author name and email for the commit (e.g.,
    "Name <email@example.com>"). If provided, it overrides the value configured in
    the integration instance. |

    | Commit Passwords | Boolean | Yes | WARNING: If set to true, sensitive password
    data will be committed to the repository. Intended for testing purposes only.
    |

    | Integrations | Boolean | Yes | Flag to enable pushing all integrations. |

    | Playbooks | Boolean | Yes | Flag to enable pushing all playbooks. |

    | Jobs | Boolean | Yes | Flag to enable pushing all defined jobs. |

    | Connectors | Boolean | Yes | Flag to enable pushing all defined connectors.
    |

    | Integration Instances | Boolean | Yes | Flag to enable pushing all integration
    instances. |

    | Visual Families | Boolean | Yes | Flag to enable pushing all visual families.
    |

    | Mappings | Boolean | Yes | Flag to enable pushing all mappings. |

    | Environments | Boolean | Yes | Flag to enable pushing all environments. |

    | Dynamic Parameters | Boolean | Yes | Flag to enable pushing all dynamic parameters.
    |

    | Logo | Boolean | Yes | Flag to enable pushing logo settings. |

    | Case Tags | Boolean | Yes | Flag to enable pushing all case tags. |

    | Case Stages | Boolean | Yes | Flag to enable pushing all case stages. |

    | Case Title Settings | Boolean | Yes | Flag to enable pushing all case title
    settings. |

    | Case Close Reasons | Boolean | Yes | Flag to enable pushing all case close reasons.
    |

    | Networks | Boolean | Yes | Flag to enable pushing all networks. |

    | Domains | Boolean | Yes | Flag to enable pushing all domain records. |

    | Custom Lists | Boolean | Yes | Flag to enable pushing all custom lists. |

    | Email Templates | Boolean | Yes | Flag to enable pushing all email templates.
    |

    | Blacklists | Boolean | Yes | Flag to enable pushing all blocklist records. |

    | SLA Records | Boolean | Yes | Flag to enable pushing all SLA records. |

    | Simulated Cases | Boolean | Yes | Flag to enable pushing all simulated cases.
    |


    ### Flow Description

    1. **Initialization**: The job initializes the `GitSyncManager` using the provided
    job parameters and integration configuration.

    2. **Configuration Extraction**: It extracts the commit message, author details,
    and the boolean flags that determine which content types to synchronize.

    3. **Content Iteration**: The job iterates through the list of available content
    types (e.g., Integrations, Playbooks, Jobs, Connectors, etc.).

    4. **Data Retrieval**: For each enabled content type, the job queries the SOAR
    platform to retrieve the current configuration data.

    5. **Data Preparation**: The retrieved data is processed and formatted into a
    structure suitable for Git storage (e.g., generating JSON definitions and README
    files).

    6. **Repository Update**: The prepared content is written to the local Git repository
    workspace.

    7. **Commit and Push**: Finally, the job commits the changes to the local Git
    repository using the provided commit message and pushes the updates to the remote
    Git branch.
Push Custom Family:
  ai_description: >-
    ### General Description

    This job exports specific custom visual families from the SOAR platform to a configured
    Git repository. It enables users to synchronize visual family definitions (including
    images and metadata) with version control, supporting optional README customization
    for better documentation within the repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push operation. |

    | Family Name | String | Yes | A comma-separated list of visual family names to
    export. |

    | Readme Addon | String | No | Optional markdown content to append to the README
    file of the exported families. |

    | Repo URL | String | No | Overrides the repository URL defined in the integration
    instance. |

    | Branch | String | No | Overrides the branch defined in the integration instance.
    |

    | Git Server Fingerprint | String | No | Overrides the Git server fingerprint
    defined in the integration instance. |

    | Commit Author | String | No | Overrides the commit author defined in the integration
    instance. |


    ### Flow Description

    1. Extracts job parameters, including the commit message, the list of visual families
    to export, and an optional README addon.

    2. Initializes the `GitSyncManager` to handle communication with the SOAR API
    and the Git repository.

    3. Retrieves all custom visual families from the SOAR platform.

    4. Filters the retrieved families to match the provided `Family Name` list.

    5. For each matching family:
        * If a `Readme Addon` is provided, updates the `GitSync.json` metadata file.
        * Pushes the visual family data (JSON and image) to the Git repository.
    6. Commits the changes to the Git repository with the provided commit message
    and pushes them to the remote branch.
Push Integration:
  ai_description: >-
    ### General Description

    This job automates the synchronization of specific Google SecOps (Chronicle) integrations
    to a configured Git repository. It enables users to select a subset of integrations
    to push, apply custom documentation (readme addons), and commit these changes
    to a version control system, ensuring that integration configurations and code
    are versioned and backed up.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git operation.
    |

    | Push Whitelist | String | Yes | A comma-separated list of integration identifiers
    to be pushed to the repository. |

    | Repo URL | String | No | The URL of the Git repository (overrides instance settings).
    |

    | Branch | String | No | The target Git branch (overrides instance settings).
    |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    (overrides instance settings). |

    | Commit Author | String | No | The author name and email for the commit (overrides
    instance settings). |

    | Readme Addon | String | No | Markdown content to append to the README file of
    the pushed integrations. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided configuration and job parameters.

    2. Retrieves the list of available integrations from the SOAR environment.

    3. Filters the integrations based on the provided `Push Whitelist`.

    4. For each integration in the whitelist:
        * Exports the integration package.
        * If a `Readme Addon` is provided, updates the integration's metadata file.
        * Updates the integration files within the local Git repository structure.
    5. Commits the changes to the Git repository with the specified `Commit` message
    and pushes them to the remote server.
Push Job:
  ai_description: >-
    ### General Description

    The 'Push Job' job is a utility within the GitSync integration designed to automate
    the synchronization of Google SecOps (Chronicle) job definitions to a remote Git
    repository. It enables administrators to selectively export specific jobs, manage
    commit metadata, and maintain documentation (READMEs) within the repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push operation. |

    | Job Whitelist | String | Yes | A comma-separated list of job names to be pushed
    to the repository. |

    | Repo URL | String | No | Optional URL to override the repository URL configured
    in the integration instance. |

    | Branch | String | No | Optional branch name to override the branch configured
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional SSH fingerprint to override
    the one configured in the integration instance. |

    | Commit Author | String | No | Optional author name and email to override the
    default commit author. |

    | Readme Addon | String | No | Optional markdown content to append to the README
    file of the pushed jobs. |


    ### Flow Description

    1. Extracts job parameters, including the commit message, the whitelist of jobs
    to push, and optional overrides.

    2. Initializes the GitSyncManager to establish a connection with the target Git
    repository.

    3. Fetches all installed jobs from the SOAR platform.

    4. Filters the retrieved jobs against the provided whitelist and excludes system-ignored
    jobs.

    5. Updates the job definitions in the local Git repository clone.

    6. If a Readme Addon is provided, updates the job's metadata.

    7. Updates the root README file to reflect the current state of the repository.

    8. Commits the changes to the Git repository and pushes them to the remote Git
    server.
Push Mappings:
  ai_description: >-
    ### General Description

    This job exports specific mapping rules from Google SecOps to a configured Git
    repository. It filters mapping records by a specified source, retrieves the associated
    rules, and pushes them to the repository, optionally appending custom markdown
    to the documentation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push. |

    | Source | String | Yes | The source name to filter mapping records. |

    | Repo URL | String | No | Optional override for the Git repository URL. |

    | Branch | String | No | Optional override for the Git branch. |

    | Git Server Fingerprint | String | No | Optional override for the Git server
    SSH fingerprint. |

    | Commit Author | String | No | Optional override for the commit author. |

    | Readme Addon | String | No | Markdown content to append to the generated README
    file. |


    ### Flow Description

    1. Initializes the GitSyncManager using the provided configuration.

    2. Retrieves all ontology records from the system and filters them by the provided
    Source.

    3. For each filtered record, fetches the corresponding mapping rules (family and
    system fields).

    4. Validates and collects rules that match the specified Source.

    5. If a Readme Addon is provided, updates the GitSync metadata file.

    6. Packages the mapping data (records and rules) and pushes it to the Git repository.

    7. Commits the changes to the Git repository using the provided Commit message.
Push Playbook:
  ai_description: >-
    ### General Description

    This job exports selected playbooks and their associated blocks from Google SecOps
    to a configured Git repository. It facilitates version control and synchronization
    of automation content by pushing playbook definitions and documentation to a remote
    Git server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Branch | String | No | The Git branch to push the content to. |

    | Commit | String | Yes | The commit message for the push operation. |

    | Repo URL | String | No | The URL of the Git repository. |

    | Git Server Fingerprint | String | No | SSH fingerprint for Git server verification.
    |

    | Commit Author | String | No | The author name and email for the commit (e.g.,
    Name <email@example.com>). |

    | Folders Whitelist | String | No | Comma-separated list of playbook categories
    (folders) to include. |

    | Playbook Whitelist | String | No | Comma-separated list of specific playbook
    names to include. |

    | Readme Addon | String | No | Markdown content to append to the README file of
    all pushed playbooks. |

    | Include Playbook Blocks | Boolean | Yes | Whether to include blocks involved
    in the playbooks. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided configuration and credentials.

    2. Retrieves the list of installed playbooks from the SOAR platform.

    3. Filters the playbooks based on the provided `Playbook Whitelist` and `Folders
    Whitelist` parameters.

    4. For each matching playbook:
        * Updates the instance names within the playbook steps to ensure consistency.
        * Applies the `Readme Addon` if provided.
        * Pushes the playbook definition to the Git repository.
        * If `Include Playbook Blocks` is enabled, identifies and pushes all blocks
    used within the playbook.
    5. Updates the root README file in the repository to reflect the current content.

    6. Commits the changes to the Git repository with the provided commit message
    and pushes them to the remote server.
Push Simulated Cases:
  ai_description: >-
    ### General Description

    This job exports specific simulated cases from Google SecOps to a configured Git
    repository. It enables version control for simulated cases by pushing their definitions
    to a remote repository, allowing for easier tracking and management of test scenarios.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message to be used for the Git push operation.
    |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to be exported to the repository. |

    | Repo URL | String | No | Optional parameter to override the Git repository URL
    defined in the integration instance. |

    | Branch | String | No | Optional parameter to override the Git branch defined
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint defined in the integration instance. |

    | Commit Author | String | No | Optional parameter to override the commit author
    defined in the integration instance. |


    ### Flow Description

    1. Extracts the job parameters, including the commit message and the list of simulated
    cases to export.

    2. Initializes the `GitSyncManager` to manage the connection to the Git repository
    and the SOAR API.

    3. Fetches all available simulated cases from the SOAR platform.

    4. Filters the fetched cases to identify those specified in the `Simulated Cases`
    parameter.

    5. For each identified case, exports the case data and pushes it to the Git repository.

    6. Commits the changes to the Git repository with the provided commit message
    and pushes them to the remote branch.
