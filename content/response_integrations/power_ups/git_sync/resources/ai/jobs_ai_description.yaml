Pull Connector:
  ai_description: >-
    ### General Description

    This job imports a specific connector from a configured Git repository into the
    Google SecOps SOAR platform. It ensures that the SOAR environment is synchronized
    with version-controlled connector definitions, and optionally, their associated
    visual families and mapping rules, facilitating consistent ingestion configurations
    across environments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL found
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch found in the
    integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint found in the integration instance. |

    | Connector Name | String | Yes | The name of the connector to pull from the repository.
    |

    | Include Visual Families | Boolean | No | Whether to include related visual families
    that the connector uses. |

    | Include Mappings | Boolean | No | Whether to include related mappings that the
    connector uses. |


    ### Flow Description

    1. Initializes the `GitSyncManager` to interface with the Git repository and the
    SOAR API.

    2. Retrieves the specified connector definition from the Git repository.

    3. Installs the connector into the SOAR platform.

    4. If `Include Visual Families` is enabled, identifies and installs any missing
    visual families associated with the connector.

    5. If `Include Mappings` is enabled, installs the mapping rules associated with
    the connector's integration.
Pull Content:
  ai_description: >-
    ### General Description

    This job synchronizes content from a Git repository to the Google SecOps (Chronicle)
    SOAR platform. It enables the automated deployment and update of various system
    components, including integrations, playbooks, jobs, connectors, and configuration
    settings. By pulling content from a version-controlled repository, this job ensures
    that the SOAR environment remains consistent with the defined infrastructure-as-code
    standards.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the repository URL found
    in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch name found
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server fingerprint found in the integration instance. |

    | Integrations | Boolean | Yes | Pull all custom integrations and custom code.
    |

    | Playbooks | Boolean | Yes | Pull all playbooks. Will add or update playbooks
    based on their name. |

    | Jobs | Boolean | Yes | Pull all jobs. |

    | Connectors | Boolean | Yes | Pull all connectors. |

    | Integration Instances | Boolean | Yes | Pull all integration instances. Passwords
    will be overwritten if not uploaded. |

    | Visual Families | Boolean | Yes | Pulls all visual families. |

    | Mappings | Boolean | Yes | Pulls all the mappings. |

    | Environments | Boolean | Yes | Creates or updates all environments. |

    | Dynamic Parameters | Boolean | Yes | Creates or updates all environment dynamic
    parameters. |

    | Logo | Boolean | Yes | Pull custom logo. |

    | Case Tags | Boolean | Yes | Pulls all case tags. |

    | Case Stages | Boolean | Yes | Pulls all case stages. |

    | Case Title Settings | Boolean | Yes | Pulls case title settings. |

    | Case Close Reasons | Boolean | Yes | Pulls custom case close reasons. |

    | Networks | Boolean | Yes | Pull networks. |

    | Domains | Boolean | Yes | Pull domains. |

    | Custom Lists | Boolean | Yes | Pull custom lists. |

    | Email Templates | Boolean | Yes | Pull email templates. |

    | Blacklists | Boolean | Yes | Pull blocklists. |

    | SLA Records | Boolean | Yes | Pull SLA Records. |

    | Simulated Cases | Boolean | Yes | Pull simulated cases. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided job parameters to establish
    a connection with the Git repository.

    2. Extracts the enabled content features from the job configuration to determine
    which components to synchronize.

    3. Iterates through each enabled feature (e.g., Playbooks, Integrations, Jobs,
    etc.).

    4. For each feature, it retrieves the content from the Git repository and performs
    the corresponding API operations (create or update) in the SOAR platform.

    5. Utilizes an `id_validator` to ensure that existing records are correctly identified
    and updated rather than duplicated.

    6. Logs the progress of each synchronization step and completes the job.
Pull Custom Family:
  ai_description: >-
    ### General Description

    This job imports a specific custom visual family definition from a configured
    Git repository into the Google SecOps (Chronicle) SOAR environment. It ensures
    that visual family configurations, which define how entities are visualized and
    related, are synchronized from version control to the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the Git repository URL
    found in the integration instance. |

    | Branch | String | No | Optional parameter to override the Git branch found in
    the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server SSH fingerprint found in the integration instance. |

    | Family Name | String | Yes | The name of the visual family to pull from the
    repository. |


    ### Flow Description

    1. Initialize the `GitSyncManager` using the integration's configuration and job
    parameters.

    2. Extract the `Family Name` from the job parameters.

    3. Query the Git repository for the specified visual family definition.

    4. If the visual family is found, import or update the visual family record in
    the SOAR system.

    5. Log the success or failure of the import operation.
Pull Integration:
  ai_description: >-
    ### General Description

    This job synchronizes and installs specific integrations from a Git repository
    into the Google SecOps SOAR platform. It enables users to maintain version-controlled
    integrations and automate the deployment of updates or new integrations based
    on a defined whitelist.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Install Whitelist | String | Yes | A comma-separated list of integration names
    to pull from the repository. |

    | Repo URL | String | No | The URL of the Git repository. Overrides the value
    configured in the integration instance. |

    | Branch | String | No | The Git branch to use. Overrides the value configured
    in the integration instance. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for Git server verification.
    Overrides the value configured in the integration instance. |


    ### Flow Description

    1. Parses the `Install Whitelist` parameter to identify the target integrations.

    2. Initializes the `GitSyncManager` to establish a connection with the configured
    Git repository.

    3. Iterates through the list of requested integrations.

    4. Fetches the integration definition from the Git repository.

    5. Installs or updates the integration in the SOAR platform.

    6. Logs the status of each installation attempt.
Pull Jobs:
  ai_description: >-
    ### General Description

    This job is part of the `GitSync` integration, designed to synchronize specific
    job configurations from a version-controlled Git repository into the Google SecOps
    (Chronicle) SOAR platform. It enables automated deployment and updates of job
    definitions, ensuring consistency across environments by pulling the latest configurations
    directly from the repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job Whitelist | String | Yes | A comma-separated list of job names to be pulled
    from the Git repository. |

    | Repo URL | String | No | The URL of the Git repository. Overrides the value
    defined in the integration instance. |

    | Branch | String | No | The Git branch to pull from. Overrides the value defined
    in the integration instance. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server.
    Overrides the value defined in the integration instance. |


    ### Flow Description

    1. Parses the `Job Whitelist` parameter to identify the specific jobs to be synchronized.

    2. Initializes the `GitSyncManager` using the current SOAR job context and configuration
    parameters.

    3. Iterates through the list of requested job names.

    4. Fetches the corresponding job definition from the Git repository using the
    `GitContentManager`.

    5. Installs or updates the job definition within the SOAR platform using the `GitSyncManager`.

    6. Logs the status of each operation, providing visibility into the synchronization
    process.
Pull Mappings:
  ai_description: >-
    ### General Description

    This job synchronizes ontology mapping rules from a Git repository to the Google
    SecOps SOAR platform. It ensures that mapping configurations, including rules
    and visual family associations, are kept consistent with the version-controlled
    definitions stored in the repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | Optional parameter to override the Git repository URL
    found in the integration instance. |

    | Branch | String | No | Optional parameter to override the branch name found
    in the integration instance. |

    | Git Server Fingerprint | String | No | Optional parameter to override the Git
    server SSH fingerprint found in the integration instance. |

    | Source | String | Yes | The mapping source identifier (e.g., integration name
    or vendor) to pull from the repository. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided configuration and credentials.

    2. Fetches the mapping definitions (rules and records) for the specified `Source`
    from the Git repository.

    3. Installs or updates the mapping rules and visual family associations in the
    SOAR platform based on the fetched data.
Pull Playbook:
  ai_description: >-
    ### General Description

    The **Pull Playbook** job is a utility within the GitSync integration designed
    to synchronize specific automation workflows from a Git repository to the Google
    SecOps SOAR platform. It enables users to selectively pull and install playbooks
    and their associated blocks, ensuring that automation logic remains consistent
    and up-to-date with the version-controlled repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Repo URL | String | No | The URL of the Git repository. Overrides the instance-level
    setting if provided. |

    | Branch | String | No | The specific Git branch to pull from. Overrides the instance-level
    setting if provided. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server.
    Overrides the instance-level setting if provided. |

    | Playbook Whitelist | String | Yes | A comma-separated list of playbook names
    to be pulled from the repository. |

    | Include Playbook Blocks | Boolean | Yes | If set to True, the job will also
    pull and install any blocks associated with the specified playbooks. |


    ### Flow Description

    1. **Initialization**: The job initializes the `GitSyncManager` using the provided
    job parameters and integration settings.

    2. **Parsing**: It parses the `Playbook Whitelist` parameter to identify the target
    playbooks.

    3. **Fetching**: For each playbook in the whitelist:
        * Retrieves the playbook definition from the Git repository.
        * If `Include Playbook Blocks` is enabled, it recursively identifies and retrieves
    all blocks involved in the playbook.
    4. **Installation**: Once all required playbooks and blocks are collected, the
    job invokes the `GitSyncManager` to install or update these workflows within the
    SOAR platform.
Pull Simulated Cases:
  ai_description: >-
    ### General Description

    This job imports specific simulated cases from a configured Git repository into
    the Google SecOps (SOAR) platform. It enables users to synchronize test or simulation
    data stored in version control directly into the SOAR environment for investigation
    testing or training purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to pull from the repository. |

    | Repo URL | String | No | The URL of the Git repository. Overrides the value
    configured in the integration instance. |

    | Branch | String | No | The Git branch to use. Overrides the value configured
    in the integration instance. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server.
    Overrides the value configured in the integration instance. |


    ### Flow Description

    1. Extracts the list of simulated case names from the job parameters.

    2. Initializes the `GitSyncManager` to establish a connection with the configured
    Git repository.

    3. Iterates through each requested case name provided in the input.

    4. Retrieves the specific case definition from the Git repository using the `GitContentManager`.

    5. Imports the retrieved case definition into the SOAR platform via the API.

    6. Logs the success or failure of each case import operation.
Push Connectors:
  ai_description: >-
    ### General Description

    This job exports specific connector configurations from Google SecOps to a configured
    Git repository. It enables version control for connector definitions, allowing
    users to synchronize their connector settings, including optional associated ontology
    mappings and visual families, to a remote Git branch.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push operation. |

    | Connectors | String | Yes | A comma-separated list of connector display names
    to export. |

    | Branch | String | No | The target Git branch (overrides integration settings).
    |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    (overrides integration settings). |

    | Repo URL | String | No | The URL of the Git repository (overrides integration
    settings). |

    | Commit Author | String | No | The author name and email for the commit (overrides
    integration settings). |

    | Include Visual Families | Boolean | No | Whether to include related visual families
    in the export. |

    | Include Mappings | Boolean | No | Whether to include related ontology mappings
    in the export. |

    | Readme Addon | String | No | Markdown content to append to the connector's README
    file. |


    ### Flow Description

    1. Initializes the GitSyncManager using the provided job parameters and integration
    settings.

    2. Retrieves the list of installed connectors from the SOAR platform.

    3. Filters the connectors based on the provided Connectors parameter.

    4. For each matching connector:
        * Optionally adds a README addon if provided.
        * Pushes the connector definition to the Git repository.
        * If Include Mappings is enabled, fetches and pushes associated ontology mappings.
        * If Include Visual Families is enabled, fetches and pushes associated visual
    families.
    5. Commits the changes to the Git repository with the specified commit message
    and pushes them to the remote branch.
Push Content:
  ai_description: >-
    ### General Description

    This job synchronizes various configuration and content items from the Google
    SecOps (Chronicle) SOAR platform to a Git repository. It serves as a version control
    and backup mechanism for the platform's assets, ensuring that changes to integrations,
    playbooks, jobs, and other settings are tracked and stored in a remote Git repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push. |

    | Repo URL | String | No | Optional override for the Git repository URL. |

    | Branch | String | No | Optional override for the Git branch. |

    | Git Server Fingerprint | String | No | Optional override for the Git server
    fingerprint. |

    | Commit Author | String | No | Optional override for the commit author. |

    | Commit Passwords | Boolean | Yes | If true, commits passwords to the repository
    (use with caution). |

    | Integrations | Boolean | Yes | Push all integrations. |

    | Playbooks | Boolean | Yes | Push all playbooks. |

    | Jobs | Boolean | Yes | Push all defined jobs. |

    | Connectors | Boolean | Yes | Push all defined connectors. |

    | Integration Instances | Boolean | Yes | Push all integration instances. |

    | Visual Families | Boolean | Yes | Push all visual families. |

    | Mappings | Boolean | Yes | Push all mappings. |

    | Environments | Boolean | Yes | Push all environments. |

    | Dynamic Parameters | Boolean | Yes | Push all dynamic parameters. |

    | Logo | Boolean | Yes | Push logo settings. |

    | Case Tags | Boolean | Yes | Push all case tags. |

    | Case Stages | Boolean | Yes | Push Case stages. |

    | Case Title Settings | Boolean | Yes | Push case title settings. |

    | Case Close Reasons | Boolean | Yes | Push all case close reasons. |

    | Networks | Boolean | Yes | Push all networks. |

    | Domains | Boolean | Yes | Push all domain records. |

    | Custom Lists | Boolean | Yes | Push all custom lists. |

    | Email Templates | Boolean | Yes | Push all email templates. |

    | Blacklists | Boolean | Yes | Push all blocklist records. |

    | SLA Records | Boolean | Yes | Push all SLA Records. |

    | Simulated Cases | Boolean | Yes | Push all simulated cases. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided job parameters and credentials.

    2. Iterates through the enabled content types (e.g., Integrations, Playbooks,
    Jobs, Connectors, etc.) as specified by the job parameters.

    3. For each enabled content type, fetches the corresponding data from the SOAR
    platform.

    4. Performs necessary data sanitization, such as removing sensitive information
    or adjusting identifiers for integration instances.

    5. Updates the local Git repository with the fetched and processed content.

    6. Commits the changes to the Git repository using the provided commit message.

    7. Pushes the commit to the remote Git repository.
Push Custom Family:
  ai_description: >-
    ### General Description

    This job exports specific custom visual families from the Google SecOps environment
    to a configured Git repository. It facilitates version control for custom visual
    families, allowing users to push updates to a remote Git branch with optional
    custom readme documentation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git operation. |

    | Family Name | String | Yes | The name(s) of the visual family to push (comma-separated).
    |

    | Repo URL | String | No | Optional override for the Git repository URL. |

    | Branch | String | No | Optional override for the target Git branch. |

    | Git Server Fingerprint | String | No | Optional override for the Git server
    SSH fingerprint. |

    | Commit Author | String | No | Optional override for the commit author (format:
    Name <email>). |

    | Readme Addon | String | No | Markdown content to append to the visual family's
    README.md file. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided integration settings.

    2. Retrieves all custom visual families from the Google SecOps environment.

    3. Filters the retrieved families to match the names provided in the `Family Name`
    parameter.

    4. If a `Readme Addon` is provided, updates the `GitSync.json` metadata file for
    the corresponding visual family.

    5. Pushes the visual family data (JSON definition and image) to the Git repository.

    6. Commits the changes to the Git repository with the specified commit message
    and pushes them to the remote branch.
Push Integration:
  ai_description: >-
    ### General Description

    This job synchronizes selected integrations from the Google SecOps environment
    to a configured Git repository. It enables automated version control for integrations
    by allowing users to specify a whitelist of integrations to push, customize README
    documentation, and commit changes to a designated branch.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push operation. |

    | Push Whitelist | String | Yes | A comma-separated list of integration identifiers
    to push to the repository. |

    | Repo URL | String | No | The URL of the Git repository (overrides instance settings).
    |

    | Branch | String | No | The target Git branch (overrides instance settings).
    |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    (overrides instance settings). |

    | Commit Author | String | No | The author name and email for the commit (overrides
    instance settings). |

    | Readme Addon | String | No | Markdown content to append to the README file of
    the pushed integrations. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided configuration parameters.

    2. Parses the `Push Whitelist` to identify which integrations to process.

    3. Retrieves the list of available integrations from the Google SecOps IDE.

    4. Iterates through the whitelisted integrations:
       - Exports the integration package.
       - Optionally appends the `Readme Addon` to the integration's metadata file
    (`GitSync.json`).
       - Pushes the integration files to the Git repository.
    5. Commits the changes to the Git repository with the provided `Commit` message
    and pushes them to the remote server.
Push Job:
  ai_description: >-
    ### General Description

    This job automates the synchronization of specific Google SecOps (Chronicle) jobs
    to a remote Git repository. It allows users to select specific jobs via a whitelist,
    apply custom documentation (readme addons), and commit these changes to a version-controlled
    repository to maintain a backup or version history of job configurations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message used for the Git push operation.
    |

    | Job Whitelist | String | Yes | A comma-separated list of job names to be pushed
    to the repository. |

    | Repo URL | String | No | The URL of the Git repository (overrides the integration
    instance setting). |

    | Branch | String | No | The target Git branch (overrides the integration instance
    setting). |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    (overrides the integration instance setting). |

    | Commit Author | String | No | The author name and email for the commit (overrides
    the integration instance setting). |

    | Readme Addon | String | No | Markdown content to append to the readme file of
    the pushed jobs. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the current job context to handle Git
    operations and API communication.

    2. Extracts configuration parameters, including the commit message, job whitelist,
    and optional readme addon.

    3. Retrieves all installed jobs from the SOAR platform.

    4. Filters the retrieved jobs against the `Job Whitelist` and a predefined `IGNORED_JOBS`
    list, ensuring jobs belonging to the `GitSync` integration itself are excluded.

    5. For each matching job, optionally updates its metadata with the provided `Readme
    Addon` and pushes the job definition to the Git repository.

    6. Generates a root readme file to reflect the current state of all jobs in the
    repository.

    7. Commits the changes with the provided `Commit` message and pushes them to the
    remote Git repository.
Push Mappings:
  ai_description: "### General Description\nThe \"Push Mappings\" job is a utility\
    \ designed to export mapping configurations\u2014specifically ontology records\
    \ and their associated rules\u2014from the Google SecOps (Chronicle) SOAR platform\
    \ to a version-controlled Git repository. This job facilitates the synchronization\
    \ and backup of mapping definitions, enabling teams to manage their ingestion\
    \ mappings through Git-based workflows.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Commit\
    \ | String | Yes | The commit message for the Git push operation. |\n| Repo URL\
    \ | String | No | Optional override for the Git repository URL. |\n| Branch |\
    \ String | No | Optional override for the Git branch name. |\n| Git Server Fingerprint\
    \ | String | No | Optional override for the Git server SSH fingerprint. |\n| Commit\
    \ Author | String | No | Optional override for the commit author. |\n| Source\
    \ | String | Yes | The source name of the mappings to export. |\n| Readme Addon\
    \ | String | No | Markdown content to append to the generated README file for\
    \ these mappings. |\n\n### Flow Description\n1. Initializes the `GitSyncManager`\
    \ using the job's configuration parameters.\n2. Queries the SOAR platform for\
    \ all ontology records and filters them by the specified `Source` parameter.\n\
    3. Retrieves the associated mapping rules (family and system fields) for the filtered\
    \ records.\n4. Filters the retrieved rules to ensure they match the specified\
    \ `Source`.\n5. If a `Readme Addon` is provided, updates the GitSync metadata\
    \ file with the additional markdown content.\n6. Packages the mapping records\
    \ and rules into a `Mapping` object and pushes them to the Git repository.\n7.\
    \ Commits the changes to the repository using the provided `Commit` message."
Push Playbook:
  ai_description: >-
    ### General Description

    This job exports selected playbooks and their associated blocks from the Google
    SecOps SOAR environment to a configured Git repository. It enables version control
    and synchronization of playbook definitions, ensuring that changes made in the
    SOAR environment are tracked and stored in a remote Git repository.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Branch | String | No | The target Git branch to push changes to. |

    | Commit | String | Yes | The commit message to be used for the push operation.
    |

    | Repo URL | String | No | The URL of the Git repository. |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    for secure connection verification. |

    | Commit Author | String | No | The author name and email for the commit (format:
    Name <email@example.com>). |

    | Folders Whitelist | String | No | A comma-separated list of playbook folders
    to include in the sync. |

    | Playbook Whitelist | String | No | A comma-separated list of specific playbook
    names to include in the sync. |

    | Readme Addon | String | No | Markdown content to append to the README file of
    all playbooks pushed during this run. |

    | Include Playbook Blocks | Boolean | Yes | If true, automatically includes and
    pushes all blocks involved in the selected playbooks. |


    ### Flow Description

    1. Initializes the `GitSyncManager` using the provided configuration parameters
    to establish a connection with the Git repository and the SOAR API.

    2. Retrieves the list of all installed playbooks from the SOAR environment.

    3. Filters the retrieved playbooks based on the provided `Playbook Whitelist`
    and `Folders Whitelist`.

    4. Iterates through the filtered playbooks:
        *   If a `Readme Addon` is provided, it updates the GitSync metadata for the
    playbook.
        *   Updates the instance names within the playbook steps to ensure consistency.
        *   Pushes the playbook definition to the Git repository.
        *   If `Include Playbook Blocks` is enabled, identifies all blocks involved
    in the playbook and pushes them to the repository as well.
    5. Generates and updates the root README file in the repository to reflect the
    current state of the synced content.

    6. Commits the changes to the local Git repository using the provided `Commit`
    message and `Commit Author`.

    7. Pushes the committed changes to the remote Git repository.
Push Simulated Cases:
  ai_description: >-
    ### General Description

    This job exports specific simulated cases from Google SecOps to a configured Git
    repository. It enables version control for simulated cases by synchronizing them
    with a remote Git branch.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commit | String | Yes | The commit message for the Git push. |

    | Repo URL | String | No | The URL of the Git repository (overrides instance setting).
    |

    | Branch | String | No | The target Git branch (overrides instance setting). |

    | Git Server Fingerprint | String | No | The SSH fingerprint for the Git server
    (overrides instance setting). |

    | Commit Author | String | No | The author name and email for the commit (overrides
    instance setting). |

    | Simulated Cases | String | Yes | A comma-separated list of simulated case names
    to export. |


    ### Flow Description

    1. Extracts job parameters, including the commit message and the list of simulated
    cases to export.

    2. Initializes the GitSyncManager to handle Git repository interactions.

    3. Retrieves all available simulated cases from the Google SecOps environment.

    4. Filters the retrieved cases to match the list provided in the Simulated Cases
    parameter.

    5. Exports the data for each matching case and pushes it to the Git repository.

    6. Commits the changes to the Git repository with the provided commit message
    and pushes them to the remote branch.
