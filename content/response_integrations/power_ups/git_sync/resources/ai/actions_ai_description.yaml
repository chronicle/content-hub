Ping:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action is a simple connectivity test (Ping). It does not enrich IOCs or
      assets, update alerts, manage tickets, modify blocklists/allowlists, manage
      identities, contain hosts, search events/emails, execute commands, download/submit
      files, or send messages.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Tests connectivity to the Git repository and the Chronicle SOAR platform using
    the provided credentials and configuration parameters. It verifies the connection
    to the SOAR API and optionally verifies the Git server fingerprint by attempting
    to retrieve the HEAD tree of the repository.


    ### Flow Description

    1. Extracts configuration parameters including repository URL, branch, credentials,
    and SSL verification settings.

    2. Initializes the `GitSyncManager` which establishes connections to both the
    Git repository and the Chronicle SOAR API.

    3. Tests connectivity to the Chronicle SOAR API by fetching the system version.

    4. If a Git server fingerprint is provided, it connects to the Git server and
    verifies the fingerprint by attempting to retrieve the HEAD tree.

    5. Returns a successful result if all connectivity tests pass.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Repo URL | True | String | The URL of the Git repository to connect to. |

    | Branch | True | String | The branch of the Git repository to use. |

    | Git Server Fingerprint | False | String | The SSH fingerprint of the Git server
    for verification (e.g., SHA256:... or MD5:...). |

    | Git Password/Token/SSH Key | True | Password | The password, personal access
    token, or base64-encoded SSH private key for Git authentication. |

    | Git Username | False | String | The username for Git authentication. Default
    is 'None'. |

    | Commit Author | False | String | The author string to use for commits, in the
    format 'Name <email@example.com>'. Default is 'GitSync <gitsync@siemplify.co>'.
    |

    | SOAR Username | False | String | The username for authenticating with the Chronicle
    SOAR API. |

    | SOAR Password | False | Password | The password for authenticating with the
    Chronicle SOAR API. |

    | Siemplify Verify SSL | False | Boolean | Whether to verify the SSL certificate
    of the Chronicle SOAR API. |

    | Git Verify SSL | False | Boolean | Whether to verify the SSL certificate of
    the Git server. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action tests connectivity by making requests to the SOAR API (fetching system
      version) and the Git server (fetching the HEAD tree). It does not mutate any
      external or internal data, update entities, create insights, modify alerts,
      or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping', which explicitly excludes it from being categorized
      as an Enrichment action according to the rules. It does not perform any remediation
      tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not interact with or process any entities. It solely tests system
      connectivity.
