Ping:
  ai_description: >-
    Tests the connectivity and configuration for the GitSync integration. This action
    verifies that the Google SecOps environment can successfully communicate with
    both the internal Chronicle SOAR API and the external Git repository using the
    provided credentials and settings.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves integration configuration parameters including
    Repository URL, Branch, Git credentials, and SOAR API credentials.

    2. **Validation:** Validates the 'Commit Author' format using a regular expression
    to ensure it follows the 'Name <email@example.com>' pattern.

    3. **SOAR Connectivity Test:** Attempts to connect to the Chronicle SOAR API and
    retrieves the system version to verify the 'SOAR Username' and 'SOAR Password'.

    4. **Git Connectivity & Fingerprint Verification:** If a 'Git Server Fingerprint'
    is provided, the action connects to the Git server to verify the host key fingerprint
    (supporting SHA256 and MD5) and ensures the repository is accessible.

    5. **Result Reporting:** Returns 'True' if all connectivity tests pass; otherwise,
    it raises an exception with details about the failure.


    ### Parameters Description:

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters; it relies
    entirely on the Integration Configuration settings. |


    ### Additional Notes:

    - This action is primarily used for troubleshooting and initial setup verification.

    - It supports both SSH (via private keys) and HTTP/HTTPS (via passwords or tokens)
    for Git authentication.

    - Fingerprint verification is optional but recommended for SSH connections to
    prevent Man-in-the-Middle (MitM) attacks.
