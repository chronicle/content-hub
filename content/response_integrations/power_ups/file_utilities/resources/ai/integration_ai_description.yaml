  reasoning: >-
    The 'file_utilities' integration provides a collection of general-purpose file
    manipulation and internal SOAR case management utilities. Its actions include
    archiving, hashing, decoding, and managing local files on the SOAR server, as
    well as interacting with the SOAR case wall (e.g., adding or retrieving attachments).
    It does not perform any security-specific operations such as threat intelligence
    enrichment, network blocking, EDR host containment, identity management, ITSM
    ticketing, or asset inventory management. Consequently, it does not align with
    any of the defined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
