Add Attachment:
  ai_description: >-
    Adds a file attachment to the case wall of the current Google SecOps case. This
    action allows analysts or automated playbooks to upload evidence, reports, or
    logs directly to the case timeline for better documentation and visibility.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the attachment's name, file
    type, Base64-encoded content, description, and favorite status from the input
    parameters.

    2. **Context Identification:** It identifies the current case using the `siemplify.case.identifier`.

    3. **Attachment Construction:** A `CaseWallAttachment` data model is created using
    the provided inputs.

    4. **Internal API Call:** The action invokes the `save_attachment_to_case_wall`
    method to upload the file to the Google SecOps platform.

    5. **Result Processing:** Upon success, the action parses the API response into
    a structured JSON format containing metadata about the new attachment (e.g., attachment
    ID, creation time) and completes the execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | True | The name/filename of the attachment to be displayed on
    the case wall. |

    | IsFavorite | Boolean | False | If set to true, marks the attachment as a 'favorite'
    or important item in the case wall. Defaults to false. |

    | Base64 Blob | String | True | The actual content of the file, encoded in Base64
    format. |

    | Type | String | True | The file extension or type (e.g., .txt, .pdf, .png).
    |

    | Description | String | True | A descriptive note explaining the context or purpose
    of the attachment. |


    ### Additional Notes

    - This action does not interact with external systems; it only modifies data within
    the Google SecOps environment.

    - The attachment is linked to the case level, not a specific alert within the
    case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
