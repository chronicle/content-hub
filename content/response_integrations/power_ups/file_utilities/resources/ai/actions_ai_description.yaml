Get Files as Base64:
  ai_description: >-
    ### General Description

    Converts local files stored on the Google SecOps (Chronicle) server into Base64
    encoded strings. This utility action is primarily used to prepare file data for
    subsequent playbook steps, such as uploading files to sandboxes, sending attachments
    via email, or submitting samples to threat intelligence platforms that require
    Base64 input.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Paths | String | Yes | A comma-delimited list of absolute or relative file
    paths to be processed. The action includes logic to handle filenames that may
    contain commas by verifying path existence. |


    ### Flow Description

    1. **Input Parsing:** The action retrieves the `File Paths` string and splits
    it into a list of potential file locations.

    2. **Path Validation:** It utilizes a helper function to verify which paths exist
    on the local filesystem, correctly identifying files even if their names contain
    commas.

    3. **File Processing:** For each identified file, the action:
        * Extracts the directory path, filename, and extension.
        * Opens the file in binary read mode.
        * Encodes the raw binary content into a Base64 string.
    4. **Data Aggregation:** Metadata (path, name, extension) and the Base64 string
    are stored in a structured format.

    5. **Output:** The action returns a JSON object containing the list of processed
    filenames and their corresponding Base64 data, and provides a summary message
    of the converted files.


    ### Additional Notes

    * This action operates on the local filesystem of the execution environment. Ensure
    that the files intended for conversion have been previously downloaded or placed
    in a reachable directory (e.g., the `/downloads` folder).

    * The action does not interact with SecOps entities directly; it relies entirely
    on the provided file path parameters.
