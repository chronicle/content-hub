Count Files:
  ai_description: >-
    ### General Description

    Counts the number of files in a specified folder path that match a given file
    extension. This action operates on the local file system of the execution environment.


    ### Flow Description

    1. Extracts the `Folder`, `File Extension`, and `Is Recursive` parameters from
    the action configuration.

    2. Constructs the search path by combining the folder path and the file extension
    (defaults to `*.*` if no extension is provided).

    3. Uses the Python `glob` library to search for matching files in the local file
    system, applying recursion if specified.

    4. Calculates the total number of matching files found.

    5. Returns the count as the action's result.


    ### Additional Notes

    This action interacts with the local file system where the script is executed.
    It does not interact with external APIs or services.
