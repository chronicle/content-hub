Add Entity to File:
  ai_description: >-
    Adds the identifier of target entities to a local text file stored on the Google
    SecOps runner. This action is primarily used for maintaining local state, deduplication,
    or sharing data between different playbook executions via the filesystem. It ensures
    that each entity identifier is only added once to the specified file.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filename | string | Yes | The name of the file to write the entities to. The
    file is stored in the `/tmp/` directory on the execution environment. |


    ### Flow Description

    1. **Initialization**: The action retrieves the `Filename` parameter and constructs
    the full file path using a predefined `/tmp/` prefix.

    2. **File Locking**: It utilizes a file-locking mechanism (`EntityFileManager`)
    to ensure thread-safe access, preventing concurrent actions from corrupting the
    file.

    3. **Entity Processing**: The action iterates through all `target_entities` provided
    in the current context.

    4. **Deduplication Check**: For each entity, it checks if the identifier already
    exists within the file's content.

    5. **File Update**: If the identifier is not present, it is appended to the list
    and subsequently written back to the file. If it already exists, the action logs
    the occurrence and marks the final result as `False` (indicating not all entities
    were newly added).

    6. **Completion**: The action releases the file lock and returns a summary of
    added versus existing entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
