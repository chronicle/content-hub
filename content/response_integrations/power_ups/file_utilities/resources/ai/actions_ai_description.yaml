  ai_description: "Saves one or more base64-encoded strings as files on the local\
    \ filesystem of the Google SecOps runner or agent. This action is primarily used\
    \ to convert encoded data\u2014such as email attachments, forensic artifacts,\
    \ or exported logs\u2014into physical files that can be processed by subsequent\
    \ actions in a playbook. It supports batch processing through comma-separated\
    \ input lists.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Base64 Input | String | Yes\
    \ | A comma-separated list of base64-encoded strings to be converted into files.\
    \ |\n| Filename | String | Yes | A comma-separated list of filenames to be used\
    \ for the saved files. The order must match the 'Base64 Input' list. |\n| File\
    \ Extension | String | No | An optional comma-separated list of file extensions\
    \ (e.g., 'txt', '.png') to append to the filenames. If fewer extensions are provided\
    \ than filenames, the last extension in the list is applied to all remaining files.\
    \ |\n\n### Flow Description\n\n1. **Input Parsing:** The action retrieves the\
    \ `Base64 Input`, `Filename`, and `File Extension` parameters, splitting them\
    \ into lists based on comma delimiters.\n2. **Directory Setup:** It identifies\
    \ the appropriate storage path (either a local 'downloads' folder or the agent's\
    \ download directory) and creates the directory if it does not already exist.\n\
    3. **Filename Sanitization:** Each provided filename is sanitized to remove invalid\
    \ characters and spaces, ensuring compatibility with the filesystem.\n4. **Decoding\
    \ and Writing:** For each input pair, the action decodes the base64 string into\
    \ binary data and writes it to the calculated file path, appending the extension\
    \ if provided.\n5. **Result Compilation:** It generates a JSON object containing\
    \ metadata for all successfully saved files, including the original filename,\
    \ the full file path, and the extension.\n6. **Completion:** The action ends by\
    \ returning a success message listing the paths of the saved files."
