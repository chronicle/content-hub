  ai_description: >-
    ### General Description\nThis action adds the identifier of target entities to
    a local file stored on the system. It is primarily used for tracking entities
    across different executions or playbooks. The action ensures that each entity
    identifier is only added once; if an entity already exists in the file, it is
    skipped, and the action's final result value is set to False to indicate that
    not all entities were newly added.\n\n### Parameters Description\n| Parameter
    | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Filename
    | String | Yes | The name of the file (located in /tmp/) where the entity identifiers
    will be stored. |\n\n### Flow Description\n1. **Parameter Extraction:** The action
    retrieves the `Filename` parameter.\n2. **File Access:** It attempts to open and
    lock the specified file in the `/tmp/` directory to prevent concurrent access
    issues.\n3. **Entity Processing:** It iterates through all target entities in
    the current context.\n4. **Duplicate Check:** For each entity, it checks if the
    identifier already exists in the file's content.\n5. **File Update:** If the identifier
    is new, it is added to the list. If it already exists, the action logs the occurrence
    and prepares to return a False result.\n6. **Finalization:** The updated list
    is written back to the file, the lock is released, and the action completes with
    a summary message.\n\n### Additional Notes\n- The file is stored in the `/tmp/`
    directory of the execution environment.\n- The action uses a file-locking mechanism
    to ensure data integrity during concurrent executions.
