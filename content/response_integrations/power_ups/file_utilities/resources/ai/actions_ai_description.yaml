  ai_description: >-
    ### General Description

    This action counts the number of files in a specified local folder path that match
    a given file extension. It utilizes the local file system to perform the search
    and can optionally execute a recursive search through subdirectories. The action
    returns the total count of matching files.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Folder | String | Yes | The folder path from which you would like to count the
    files. |

    | File Extension | String | No | Count the files that include a specific file
    extension (e.g., `*.txt`). If not provided, defaults to `*.*`. |

    | Is Recursive | Boolean | No | If enabled, this will recursively count all files
    in the directory and its subdirectories. |


    ### Additional Notes

    There are no specific conditional dependencies between the parameters. If the
    File Extension is not provided, the action defaults to counting all files (`*.*`).


    ### Flow Description

    1. Extracts the provided folder path, file extension, and recursive flag.

    2. Constructs the full search path by combining the folder and file extension.

    3. Uses the `glob` library to search for matching files in the local file system.

    4. Counts the number of files found and returns the result.
