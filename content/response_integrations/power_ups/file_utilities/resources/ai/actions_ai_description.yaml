Decode Base64:
  ai_description: >-
    ### General Description

    The **Decode Base64** action is a utility designed to transform Base64-encoded
    strings back into human-readable text. It is primarily used within playbooks to
    process data that has been encoded for transport or storage, such as email attachments,
    log snippets, or API responses. The action supports multiple character encodings
    to ensure the resulting string is correctly interpreted.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64 Input** | string | Yes | The Base64 encoded string that needs to be
    decoded. |

    | **Encoding** | ddl | Yes | The character encoding to apply to the decoded bytes.
    Options include `UTF-8` and `ASCII`. |


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the `Base64 Input` string and
    the selected `Encoding` from the user configuration.

    2. **Decoding**: The input string is decoded from Base64 format into raw bytes
    using Python's standard `base64` library.

    3. **String Conversion**: The raw bytes are converted into a string using the
    specified encoding (e.g., UTF-8).

    4. **Result Generation**: The decoded string is packaged into a JSON object (`{"decoded_content":
    "..."}`) and returned as the action's result for use in subsequent playbook steps.


    ### Additional Notes

    - This action does not interact with external APIs or modify any SOAR entities;
    it is a pure data transformation utility.

    - If the input is not a valid Base64 string or the encoding fails, the action
    will return a failure status.
