  ai_description: >-
    ### General Description

    This action appends the identifier of target entities to a specified local file
    on the SOAR server. It ensures uniqueness by checking if the entity identifier
    already exists in the file before adding it. This is useful for maintaining local
    lists of entities for further processing or auditing.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filename | string | Yes | The name of the file to write the entities to. |


    ### Additional Notes

    The action does not require any specific entity types and will process all entities
    provided in the `target_entities` list. The file is created or appended to in
    the `/tmp/` directory on the SOAR server.


    ### Flow Description

    1. Extract the `Filename` parameter from the action configuration.

    2. Initialize the `EntityFileManager` to handle file locking and access, ensuring
    thread-safe operations.

    3. Iterate through the `target_entities` provided in the action.

    4. For each entity, check if its identifier is already present in the file.

    5. If the identifier is not present, append it to the file.

    6. If the identifier is already present, log the occurrence and skip adding it.

    7. Finalize the action with a summary of added entities and the execution status.
