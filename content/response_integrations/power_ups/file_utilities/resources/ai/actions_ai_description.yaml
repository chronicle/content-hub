Extract Zip Files:
  ai_description: "Extracts files from ZIP archives associated with FILENAME entities\
    \ in Google SecOps. This action is designed to handle both standard and password-protected\
    \ ZIP files, offering the ability to provide a list of passwords or attempt a\
    \ brute-force attack using a built-in wordlist. \n\n### Flow Description:\n1.\
    \ **Entity Filtering:** The action identifies `FILENAME` entities within the case\
    \ that possess an `attachment_id` attribute in their additional properties.\n\
    2. **Data Retrieval:** For each valid entity, it retrieves the corresponding ZIP\
    \ file content from the Google SecOps Case Wall.\n3. **Extraction:** It attempts\
    \ to extract the contents of the ZIP archive. If the archive is encrypted, it\
    \ uses the provided passwords (delimited by a user-defined character) or performs\
    \ a brute-force search.\n4. **Internal Mutation (Optional):** \n    * If configured,\
    \ it uploads the extracted files back to the Case Wall as new attachments.\n \
    \   * If configured, it creates new `FILENAME` and `FILEHASH` entities for the\
    \ extracted files, automatically linking them to the parent ZIP file.\n5. **Output:**\
    \ The action returns a JSON result containing metadata (and optionally base64\
    \ data) for all extracted files.\n\n### Parameters Description:\n| Parameter Name\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Include\
    \ Data In JSON Result | boolean | No | If true, the base64 encoded content of\
    \ the extracted files is included in the action's JSON output. Default is false.\
    \ |\n| Create Entities | boolean | No | If true, the action creates new `FILENAME`\
    \ and `FILEHASH` entities for every file found inside the ZIP. Default is true.\
    \ |\n| Zip File Password | string | No | A single password or a list of passwords\
    \ used to attempt extraction of protected ZIPs. |\n| BruteForce Password | boolean\
