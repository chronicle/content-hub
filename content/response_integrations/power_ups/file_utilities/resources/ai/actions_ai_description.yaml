  ai_description: >-
    ### General Description

    The **Count Files** action is a utility designed to calculate the total number
    of files within a specified directory. It allows users to filter results based
    on file extensions and provides the option to perform a recursive search through
    subdirectories. This is particularly useful for monitoring directory growth, verifying
    file transfers, or identifying the presence of specific file types in a filesystem.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Folder | String | Yes | The directory path where the file count should be performed.
    |

    | File Extension | String | No | A glob-style pattern (e.g., `*.txt` or `*.log`)
    used to filter the files. If left empty, the action defaults to `*.*` (counting
    all files). |

    | Is Recursive | Boolean | No | If enabled (`true`), the action will search for
    matching files in the specified folder and all of its subdirectories. Defaults
    to `false`. |


    ### Additional Notes

    - The action uses the standard Python `glob` library for pattern matching.

    - If the provided folder path does not exist or is inaccessible, the action will
    return a count of 0 or fail depending on environment permissions.


    ### Flow Description

    1. **Initialization:** The action extracts the `Folder`, `File Extension`, and
    `Is Recursive` parameters from the input.

    2. **Path Preparation:** If no file extension is provided, it defaults to `*.*`.
    It then constructs a full search path by joining the folder and the extension
    pattern.

    3. **File Search:** The action executes a search using the `glob` module, applying
    the recursion flag if specified.

    4. **Result Calculation:** It determines the length of the list of discovered
    files.

    5. **Execution Completion:** The action returns the total count as the final result
    and completes with a success state.
