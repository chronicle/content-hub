Create Archive:
  ai_description: >-
    ### General Description

    Creates an archive file (such as zip, tar, gztar, bztar, or xztar) from a provided
    list of files or a directory path on the local SOAR server.


    ### Flow Description

    1. Extracts the archive type, base name, and input files or directory from the
    action parameters.

    2. Checks if the destination directory (`/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`)
    exists on the local filesystem, creating it if necessary.

    3. If the input is a directory, it directly creates the archive from the directory
    contents.

    4. If the input is a list of files, it copies them to a temporary directory, creates
    the archive from that directory, and then removes the temporary directory.

    5. Returns the path to the created archive file as the result and adds it to the
    JSON result.


    ### Additional Notes

    The archive is saved locally on the SOAR server. Ensure that the provided file
    paths or directories exist and are accessible by the SOAR execution environment.
