  ai_description: >-
    ### General Description

    The **Decode Base64** action is a utility designed to convert Base64 encoded strings
    back into their original text format. It allows users to specify the character
    encoding (UTF-8 or ASCII) to ensure the resulting string is correctly interpreted.
    This is particularly useful for decoding obfuscated data found in logs, emails,
    or script arguments during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64 Input** | string | Yes | The Base64 encoded string that you want to
    decode. |

    | **Encoding** | ddl | Yes | The character encoding to use for the decoded output.
    Options include **UTF-8** and **ASCII**. |


    ### Flow Description

    1. **Parameter Retrieval**: The action retrieves the `Base64 Input` string and
    the selected `Encoding` from the user configuration.

    2. **Decoding Process**: The input string is decoded from Base64 format into raw
    bytes using Python's standard library.

    3. **String Conversion**: The raw bytes are converted into a string based on the
    provided encoding (UTF-8 or ASCII).

    4. **Result Output**: The decoded string is packaged into a JSON object (`decoded_content`)
    and returned as the action's result. If decoding fails (e.g., due to invalid Base64
    format), the action reports a failure.


    ### Additional Notes

    This action does not interact with external APIs or modify any SOAR entities;
    it performs local data transformation.
