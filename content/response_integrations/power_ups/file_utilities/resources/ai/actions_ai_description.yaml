Create Archive:
  ai_description: >-
    ### General Description

    The **Create Archive** action is a utility designed to package files or directories
    into a single compressed archive file on the Google SecOps server. It supports
    multiple formats including ZIP and various TAR configurations (uncompressed, gzip,
    bzip2, xz). This action is primarily used for organizing forensic evidence, consolidating
    logs, or preparing data for export.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Archive Type** | DDL | Yes | Specifies the compression format. Supported values:
    `zip`, `tar`, `gztar` (gzip), `bztar` (bzip2), `xztar` (xz). |

    | **Archive Base Name** | String | Yes | The name of the archive file to be created,
    excluding the file extension. |

    | **Archive Input** | String | Yes | The source for the archive. This can be a
    single directory path or a comma-separated list of individual file paths. |


    ### Flow Description

    1. **Initialization:** The action extracts the user-provided parameters: archive
    type, base name, and input source.

    2. **Directory Validation:** It checks for the existence of the default destination
    directory (`/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`)
    and creates it if it does not exist.

    3. **Input Handling:**
        - If the input is a directory, the action targets that directory for archiving.
        - If the input is a list of files, it creates a temporary directory, copies
    the specified files into it, and targets that temporary directory.
    4. **Compression:** The action uses the `shutil.make_archive` utility to create
    the archive file in the specified format at the destination path.

    5. **Cleanup:** If a temporary directory was created for individual files, it
    is deleted after the archive is successfully generated.

    6. **Completion:** The action returns the full path of the created archive file
    and updates the action result with success metadata.


    ### Additional Notes

    - This action performs operations on the local filesystem of the Google SecOps
    execution environment.

    - Ensure that the paths provided in 'Archive Input' are accessible by the SecOps
    service account.
  capabilities:
