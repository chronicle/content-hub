  ai_description: >-
    Adds a file attachment to the case wall of the current Google SecOps case. This
    action allows analysts to programmatically upload evidence, logs, or reports directly
    to the case timeline by providing the file content in Base64 format. It supports
    marking attachments as favorites and adding descriptive metadata to the case wall
    entry.


    ### Parameters

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Name | The name of the attachment file. | string | True | This will be the filename
    displayed in the case wall. |

    | IsFavorite | Whether the attachment should be marked as a favorite in the case
    wall. | boolean | False | Defaults to false if not provided. |

    | Base64 Blob | The actual content of the attachment encoded in Base64. | string
    | True | Ensure the string is a valid Base64 representation of the file. |

    | Type | The file extension or type of the attachment (e.g., .txt, .pdf, .png).
    | string | True | Used to identify the file format. |

    | Description | A brief description of the attachment's purpose or content. |
    string | True | This text appears alongside the attachment in the case wall. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the filename, Base64 content,
    file type, description, and favorite status from the input parameters.

    2. **Context Retrieval:** It identifies the current case ID from the active Google
    SecOps environment.

    3. **Attachment Construction:** A `CaseWallAttachment` data model is created using
    the provided inputs.

    4. **Internal API Call:** The action invokes the internal SOAR API (`save_attachment_to_case_wall`)
    to upload the file content and metadata to the case wall.

    5. **Result Processing:** Upon successful upload, the action parses the API response
    to return detailed metadata about the new attachment, including its unique ID
    and creation timestamps.
