Save Base64 to File:
  ai_description: >-
    ### General Description

    Saves one or more base64-encoded strings to local files on the SOAR agent or server.
    It supports processing multiple files simultaneously by accepting comma-separated
    lists for filenames and base64 inputs, and optionally appends file extensions.


    ### Flow Description

    1. Retrieves the base64 strings, filenames, and optional file extensions from
    the action parameters.

    2. Determines the local directory path for saving the files (either on the remote
    agent or local run folder).

    3. Iterates through the provided inputs, decoding each base64 string into binary
    data.

    4. Writes the decoded binary data to the specified file paths on the local disk.

    5. Generates a JSON result containing the details of the saved files (name, path,
    extension) and attaches it to the action result.


    ### Additional Notes

    The action supports comma-separated inputs for bulk processing. Ensure the number
    of filenames matches the number of base64 inputs provided.
