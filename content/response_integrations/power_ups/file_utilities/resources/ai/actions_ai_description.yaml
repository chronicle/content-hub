  ai_description: >-
    The 'Count Files' action performs a local filesystem operation to count the number
    of files within a specified directory that match a given file extension. This
    utility action is useful for verifying the presence or volume of files on the
    SOAR worker node.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the 'Folder' path, 'Is Recursive'
    flag, and 'File Extension' from the action configuration.

    2. **Path Construction**: It constructs the full search path using the provided
    folder and extension (defaulting to '*.*' if no extension is provided).

    3. **File Counting**: It utilizes the `glob` library to identify and count all
    files matching the criteria, optionally traversing subdirectories if 'Is Recursive'
    is enabled.

    4. **Result Reporting**: The action returns the total count of files found as
    the execution result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Folder | string | Yes | The absolute or relative path of the folder to search.
    |

    | File Extension | string | No | The file extension to filter by (e.g., '*.txt').
    Defaults to '*.*'. |

    | Is Recursive | boolean | No | If enabled, the action will recursively count
    files in all subdirectories. Defaults to 'false'. |


    ### Additional Notes

    This action operates strictly on the local filesystem of the SOAR worker node
    and does not interact with external APIs or internal case data.
