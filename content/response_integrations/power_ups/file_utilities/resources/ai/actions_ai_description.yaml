  ai_description: >-
    ### General Description

    This action adds a file attachment to the Google SecOps case wall. It allows users
    to upload files (provided as Base64 encoded strings) directly to the case, facilitating
    evidence management and documentation within the platform.


    ### Flow Description

    1. The action retrieves the provided parameters: Name, Base64 Blob, Type, Description,
    and IsFavorite status.

    2. It constructs a `CaseWallAttachment` object using the provided details and
    the current case identifier.

    3. The action calls the internal SOAR API `save_attachment_to_case_wall` to upload
    the file to the case wall.

    4. Upon success, it returns the attachment metadata as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | The name of the attachment. |

    | Base64 Blob | string | Yes | The attachment's content encoded in Base64. |

    | Type | string | Yes | The file extension or type (e.g., .txt). |

    | Description | string | Yes | A description of the attachment. |

    | IsFavorite | boolean | No | Whether the attachment is marked as a favorite in
    the case wall. Defaults to false. |


    ### Additional Notes

    This action does not interact with external systems and is strictly used for internal
    case management within Google SecOps.
