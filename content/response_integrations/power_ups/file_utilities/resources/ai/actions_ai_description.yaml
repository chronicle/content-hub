Count Files:
  ai_description: >-
    ### General Description


    The **Count Files** action is a utility designed to count the number of files
    within a specified directory on the local filesystem. It allows users to filter
    files by a specific extension and optionally perform a recursive search through
    subdirectories.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Folder** | String | Yes | The absolute or relative folder path from which
    you would like to count the files. |

    | **File Extension** | String | No | The file extension pattern to match (e.g.,
    `*.txt`, `*.log`). If not provided, it defaults to `*.*` (all files). |

    | **Is Recursive** | Boolean | No | If set to `true`, the action will search for
    files in the specified folder and all its subfolders. Default is `false`. |


    ### Flow Description


    1. **Parameter Extraction:** The action retrieves the `Folder`, `File Extension`,
    and `Is Recursive` values from the input.

    2. **Path Construction:** It determines the file extension pattern, defaulting
    to `*.*` if none is provided, and constructs the full search path by joining the
    folder and extension.

    3. **File Discovery:** The action uses the `glob` module to find all matching
    files, applying the recursion flag.

    4. **Counting and Output:** It calculates the total number of matching files and
    returns this count as the action result.


    ### Additional Notes


    There are no entities required for this action. It operates directly on the filesystem
    path provided in the parameters.
