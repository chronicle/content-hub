Extract Archive:
  ai_description: >-
    Extracts one or more archive files (ZIP, TAR, GZTAR, BZTAR, XTAR) to a designated
    directory on the local SOAR server. This utility action is used to unpack compressed
    data for further processing or analysis within a playbook. It returns a structured
    JSON response containing the directory tree and paths of all extracted files.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Archive | String | Yes | The full path of the archive(s) to be extracted. Supports
    comma-separated values for bulk extraction. Example: `/opt/siemplify/siemplify_server/Scripting/FileUtilities/file.zip`
    |


    ### Flow Description


    1. **Input Parsing:** The action retrieves the `Archive` parameter and splits
    it into a list of individual file paths.

    2. **Directory Preparation:** For each archive, it determines a unique output
    directory path within the `/opt/siemplify/siemplify_server/Scripting/FileUtilities/Extract`
    root. It creates the directory if it does not already exist.

    3. **Extraction:** It utilizes the `shutil.unpack_archive` method to extract the
    contents of the archive into the prepared directory.

    4. **Metadata Generation:** The action recursively scans the extracted folder
    to generate a JSON representation of the file hierarchy, including file names,
    extensions, and full paths.

    5. **Result Reporting:** It compiles the extraction results (success/failure)
    and file metadata into a JSON object and ends the action with a summary message.
