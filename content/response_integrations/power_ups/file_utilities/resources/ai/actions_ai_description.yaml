  ai_description: >-
    Extracts one or more archive files to a specific directory on the Google SecOps
    server. This action supports multiple archive formats including ZIP, TAR, GZTAR,
    BZTAR, and XTAR. It processes a comma-separated list of file paths, creates a
    dedicated output directory for each archive, and unpacks the contents. The action
    returns a detailed JSON structure representing the extracted file hierarchy, including
    file names, extensions, and full system paths.


    ### Flow Description

    1. **Parameter Parsing:** The action retrieves the `Archive` parameter and splits
    it into a list of individual file paths.

    2. **Directory Preparation:** For each archive, it determines a destination path
    within the predefined directory `/opt/siemplify/siemplify_server/Scripting/FileUtilities/Extract`.
    It creates the directory if it does not already exist.

    3. **Extraction:** It utilizes the `shutil.unpack_archive` library to extract
    the contents of the archive into the designated folder.

    4. **Metadata Collection:** After extraction, it recursively scans the output
    directory to build a dictionary-based representation of the files and folders
    created.

    5. **Result Reporting:** It compiles a JSON result containing success/failure
    status for each archive, the destination folder path, and a list of all extracted
    files (both as a simple list and with full paths).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Archive | String | Yes | A comma-delimited list of full file system paths to
    the archives that need to be extracted. Example: `/path/to/file1.zip, /path/to/file2.tar.gz`.
    |


    ### Additional Notes

    * This action operates directly on the local filesystem of the execution environment.
    It does not interact with external APIs or SecOps entity models (like IP or Hostname).

    * The extraction destination is hardcoded to a specific subdirectory within the
    Siemplify scripting folder.
