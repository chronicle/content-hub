  ai_description: >-
    ### General Description

    The action adds an attachment to the case wall in Google SecOps using a provided
    Base64 blob. It allows users to programmatically attach files, such as evidence
    or reports, directly to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Name | string | True | The name of the attachment to be displayed in the case
    wall. |

    | IsFavorite | boolean | False | Determines whether the attachment is marked as
    a favorite in the case wall. |

    | Base64 Blob | string | True | The actual content of the attachment encoded in
    Base64 format. |

    | Type | string | True | The file extension or type of the attachment (e.g., .txt,
    .pdf). |

    | Description | string | True | A brief description of the attachment's contents
    or purpose. |


    ### Flow Description

    1. Retrieves the input parameters including the attachment's name, type, description,
    base64 content, and favorite status.

    2. Constructs a `CaseWallAttachment` object using the provided parameters and
    the current case ID.

    3. Calls the internal SOAR API to save the attachment to the case wall.

    4. Parses the response and returns the attachment metadata as a JSON object.
