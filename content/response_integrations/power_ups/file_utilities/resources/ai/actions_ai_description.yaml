Save Base64 to File:
  ai_description: >-
    ### General Description

    The **Save Base64 to File** action is a utility designed to convert base64-encoded
    strings into physical files stored on the Google SecOps (Chronicle) runner's local
    file system (either the Playbook server or a Remote Agent). This action is particularly
    useful for reconstructing file attachments, images, or logs that have been passed
    through a playbook as encoded text. It supports bulk processing via comma-separated
    lists for both inputs and filenames.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64 Input** | String | Yes | A comma-separated list of base64-encoded strings
    to be converted into files. |

    | **Filename** | String | Yes | A comma-separated list of filenames corresponding
    to the base64 inputs. |

    | **File Extension** | String | No | An optional comma-separated list of extensions
    (e.g., 'png', '.txt') to append to the filenames. If fewer extensions are provided
    than filenames, the last extension in the list is applied to all remaining files.
    |


    ### Flow Description

    1. **Input Parsing:** The action retrieves the `Base64 Input`, `Filename`, and
    `File Extension` parameters, splitting them into lists based on comma delimiters.

    2. **Environment Detection:** It determines the appropriate storage path (`downloads`
    folder) based on whether the action is running on a remote agent or the local
    server.

    3. **Directory Preparation:** The action ensures the target directory exists,
    creating it if necessary.

    4. **File Processing:** It iterates through the provided lists, decoding each
    base64 string and writing the resulting binary data to a file with the specified
    name and extension.

    5. **Result Compilation:** Metadata for each created file (name, path, and extension)
    is collected into a JSON result object.

    6. **Completion:** The action ends by returning a success message containing the
    paths of all saved files.
