  ai_description: >-
    ### General Description

    The **Get Files as Base64** action is a utility designed to read local files from
    the system and convert their contents into Base64-encoded strings. This is primarily
    used to prepare binary file data for transmission to external APIs, sandboxes,
    or for inclusion in structured reports where raw binary data is not supported.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Paths** | String | Yes | A comma-delimited list of absolute file paths
    to be processed (e.g., `/tmp/malware.exe, /home/user/evidence.log`). |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `File Paths` parameter and splits
    it into a list of potential file locations.

    2. **Path Resolution**: It executes a custom resolution logic (`get_filenames`)
    to verify the existence of the files on the local filesystem, handling cases where
    filenames might contain commas.

    3. **File Processing**: For each identified file:
        - It extracts metadata including the directory path, filename, and file extension.
        - It opens the file in binary read mode.
        - It encodes the binary content into a Base64 string.
    4. **Data Aggregation**: The action constructs a JSON object containing the list
    of processed filenames and a data array with the metadata and Base64 strings for
    each file.

    5. **Output**: The resulting JSON is added to the action's execution results,
    and the action completes with a success message listing the converted files.


    ### Additional Notes

    - This action operates on the local filesystem of the environment where the Google
    SecOps agent or runner is active.

    - Large files may consume significant memory during the Base64 encoding process.
