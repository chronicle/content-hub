Add Entity to File:
  ai_description: >-
    ### General Description

    Adds the identifier of target entities to a specified local file on the SOAR platform.
    It ensures that each entity identifier is added only once, preventing duplicates.


    ### Flow Description

    1. Extracts the `Filename` parameter to determine the target file.

    2. Constructs the full file path (defaulting to `/tmp/` + filename).

    3. Acquires a file lock to safely read and write to the file, preventing concurrent
    execution issues.

    4. Iterates through the target entities.

    5. Checks if each entity's identifier is already present in the file.

    6. If not present, appends the identifier to the file.

    7. If present, skips the entity and sets the result value to False.


    ### Additional Notes

    The action uses a file lock to handle concurrent executions safely. The file is
    stored locally on the SOAR execution environment (typically in the `/tmp/` directory).
  ai_short_description: >-
    Adds target entity identifiers to a specified local file, ensuring no duplicate
    entries are created.
