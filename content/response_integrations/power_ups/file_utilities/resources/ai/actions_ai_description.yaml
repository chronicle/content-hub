  ai_description: >-
    ### General Description

    Extracts files from a ZIP archive attached to a case. It can extract password-protected
    files using a supplied password list or by attempting a bruteforce attack. The
    action requires the target FILENAME entity to have an `attachment_id` attribute
    to download the file from the Case Wall.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Include Data In JSON Result | Boolean | False | Include the data from the extracted
    files as base64 encoded values in the JSON result of the action. |

    | Create Entities | Boolean | False | Create entities out of the extracted files.
    |

    | Zip File Password | String | False | If the zip file is password protected,
    use this password to extract. |

    | BruteForce Password | Boolean | False | When enabled, the action will attempt
    to brute force any password protected Zip files. |

    | Add to Case Wall | Boolean | False | Add the extracted files to the case wall.
    |

    | Zip Password List Delimiter | String | True | This is character that separates
    multiple passwords in the Zip File Password parameter. |


    ### Flow Description

    1. Iterates over target entities of type FILENAME.

    2. Checks if the entity has an `attachment_id` in its additional properties.

    3. Retrieves the attachment from the Case Wall.

    4. Extracts the zip file contents, optionally using provided passwords or bruteforce.

    5. Optionally adds the extracted files to the Case Wall.

    6. Optionally creates new entities (FILENAME, FILEHASH) from the extracted files
    and links them.

    7. Returns the extracted files metadata (and optionally base64 data) in the JSON
    result.
