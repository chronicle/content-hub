Get Attachment:
  ai_description: >-
    ### General Description\nThe **Get Attachment** action retrieves file attachments
    stored on the Google SecOps Case Wall or Alert Wall. It is primarily used to programmatically
    access files (such as PCAPs, emails, or logs) that have been uploaded to a case,
    converting them into Base64 strings for use in subsequent playbook steps.\n\n###
    Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---
    | :--- | :--- | :--- |\n| **Attachment Scope** | DDL | Yes | Specifies the source
    of the attachments. Options are `Case` (retrieves all attachments in the case)
    or `Alert` (retrieves only attachments associated with the current alert). |\n\n###
    Flow Description\n1. **Parameter Retrieval:** The action identifies the requested
    scope (Case or Alert).\n2. **Metadata Fetching:** It retrieves the metadata for
    all items on the Case Wall.\n3. **Filtering:** The logic filters the wall items
    to identify those of type `4` (File Attachments). If the scope is set to `Alert`,
    it further filters the list to only include files linked to the specific `alertIdentifier`
    of the current alert.\n4. **Content Retrieval:** For each identified attachment,
    the action calls the internal API to download the raw file content using its `evidenceId`.\n5.
    **Encoding:** The binary file content is encoded into a Base64 string.\n6. **Output
    Generation:** The action returns a JSON array containing the original metadata
    appended with the `base64_blob` for each file.\n\n### Additional Notes\n- This
    action does not interact with external systems; it only interacts with the Google
    SecOps internal database.\n- The result is a JSON list of attachment objects.
