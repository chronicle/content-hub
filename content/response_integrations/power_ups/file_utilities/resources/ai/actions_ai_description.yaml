Add Attachment:
  ai_description: >-
    ### General Description

    Adds a file attachment to the Google SecOps case wall using a provided Base64
    encoded string.


    ### Flow Description

    1. Retrieves the attachment details (Name, Type, Base64 Blob, Description, IsFavorite)
    from the action parameters.

    2. Constructs a case wall attachment object.

    3. Makes an API call to the Google SecOps platform to save the attachment to the
    current case wall.

    4. Returns the metadata of the newly created attachment as a JSON result.


    ### Additional Notes

    The attachment size must be within the platform's allowed limits (typically <
    5MB).
