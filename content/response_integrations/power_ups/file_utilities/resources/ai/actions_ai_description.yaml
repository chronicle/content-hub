Create Hash From Base64:
  ai_description: >-
    Generates cryptographic hashes for one or more Base64 encoded strings. This utility
    action is designed to transform data blobs or file contents provided in Base64
    format into standard hash identifiers, which can then be used for reputation lookups
    or file identification. It supports a wide variety of hashing algorithms including
    MD5, SHA1, SHA256, and SHA512.


    ### Flow Description

    1. **Input Parsing:** The action retrieves the Base64 encoded strings and optional
    names from the parameters, splitting them into lists based on the provided separators.

    2. **Decoding:** Each string is decoded from Base64 into its original byte representation.

    3. **Hashing:** The action dynamically selects the specified hashing algorithm
    from the Python `hashlib` library and computes the hex digest of the decoded bytes.

    4. **Result Compilation:** A result object is created for each input, optionally
    including the original Base64 string and the provided name.

    5. **Output:** The final list of hashes and metadata is returned as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 | Content | Yes | One or more Base64 encoded strings to be hashed. Multiple
    strings should be separated by the 'Base64 Separator'. |

    | Hash Algorythm | DDL | Yes | The cryptographic hash function to apply (e.g.,
    sha256, md5, sha1). |

    | Names | String | No | A list of names (e.g., filenames) corresponding to the
    Base64 strings. Must have the same count as the Base64 strings if provided. |

    | Names Separator | String | Yes | The character used to separate the list of
    names (default is a comma). |

    | Include Base64 | Boolean | No | If set to true, the original Base64 input string
    will be included in the output JSON. |

    | Base64 Separator | String | Yes | The character used to separate the input Base64
    strings (default is a comma). |


    ### Additional Notes

    - This action does not interact with external APIs; all computations are performed
    locally using standard libraries.

    - If the 'Names' parameter is used, ensure the number of names matches the number
    of Base64 strings to avoid alignment issues in the output.
