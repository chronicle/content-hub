Extract Zip Files:
  ai_description: >-
    ### General Description

    Extracts files from a ZIP or 7z archive associated with a FILENAME entity. It
    can handle password-protected files using a supplied password list or by attempting
    a bruteforce attack. The action can optionally add the extracted files to the
    case wall, create new entities for them, and include their base64-encoded data
    in the JSON result.


    ### Flow Description

    1. Iterates over target entities and filters for FILENAME entities that contain
    an `attachment_id` in their additional properties.

    2. Downloads the attachment from the case wall using the `attachment_id`.

    3. Determines the archive type (ZIP or 7z) and extracts the contents, optionally
    using provided passwords or a bruteforce wordlist.

    4. If configured, adds the extracted files back to the case wall as new attachments.

    5. If configured, creates new entities (e.g., FILENAME, FILEHASH) for the extracted
    files and links them to the original archive entity.

    6. Returns the extracted file metadata (and optionally base64 encoded content)
    in the action's JSON result.


    ### Additional Notes

    Requires the FILENAME entity to have an `attachment_id` attribute to successfully
    download the file from the Case Wall.
