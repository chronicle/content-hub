  ai_description: >-
    ### General Description

    The **Create Archive** action is a utility designed to package files or directories
    into a compressed archive format directly on the Google SecOps (Chronicle) server.
    It supports multiple archive formats including ZIP and various TAR configurations.
    This action is primarily used for organizing forensic artifacts, preparing logs
    for export, or consolidating multiple files into a single container for subsequent
    processing steps.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Archive Type** | Dropdown | Yes | Specifies the compression format. Supported
    values: `zip`, `tar` (uncompressed), `gztar` (gzip), `bztar` (bzip2), and `xztar`
    (xz). |

    | **Archive Base Name** | String | Yes | The desired name for the resulting archive
    file (do not include the file extension). |

    | **Archive Input** | String | Yes | A comma-separated list of absolute file paths
    or a single directory path to be archived. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the archive format, the base
    name for the output file, and the input paths (files or directory) from the user
    configuration.

    2. **Environment Preparation:** It checks for the existence of the default destination
    directory (`/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`)
    on the server and creates it if it does not exist.

    3. **Input Validation:** The action determines if the provided input is a single
    directory or a list of individual files.

    4. **Archiving Logic:**
        * If a **directory** is provided, it archives the entire directory structure.
        * If a **list of files** is provided, it copies the files to a temporary directory,
    archives that directory, and then cleans up the temporary files.
    5. **Completion:** Upon success, the action returns the full file path of the
    newly created archive and provides a JSON result containing the success status
    and the archive location.


    ### Additional Notes

    * This action operates on the local filesystem of the SOAR server. Ensure that
    the paths provided in **Archive Input** are accessible by the SOAR execution environment.

    * The resulting archive is stored in a specific internal directory: `/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`.
