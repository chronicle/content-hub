  ai_description: >-
    ### General Description

    The **Create Hash From Base64** action is a utility designed to generate cryptographic
    hashes from one or more Base64 encoded strings. This is particularly useful for
    identifying files or data payloads when only the encoded content is available.
    The action supports multiple hashing algorithms and can process a list of strings
    in a single execution.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64** | Content | Yes | One or more Base64 encoded strings to be hashed.
    Multiple strings should be separated by the 'Base64 Separator'. |

    | **Hash Algorythm** | DDL | Yes | The cryptographic hash function to apply (e.g.,
    md5, sha1, sha256, sha512). |

    | **Names** | String | No | An optional list of names (like filenames) to associate
    with each Base64 string. Must match the count of Base64 strings. |

    | **Names Separator** | String | Yes | The character used to separate the list
    of names (default is ','). |

    | **Include Base64** | Boolean | No | If set to 'true', the original Base64 input
    string will be included in the output JSON. |

    | **Base64 Separator** | String | Yes | The character used to separate the input
    Base64 strings (default is ','). |


    ### Flow Description

    1. **Input Parsing:** The action retrieves the Base64 strings and optional names
    from the parameters, splitting them into lists based on the provided separators.

    2. **Decoding:** Each string is decoded from Base64 format into raw bytes using
    the standard base64 library.

    3. **Hashing:** The selected hashing algorithm is dynamically invoked from the
    `hashlib` library and applied to the decoded bytes to produce a hexadecimal digest.

    4. **Result Compilation:** A dictionary is created for each input, containing
    the calculated hash, the algorithm name, and optionally the name and original
    Base64 string.

    5. **Output:** The resulting list of hash objects is returned as a JSON result
    and added to the action's execution context.


    ### Additional Notes

    If the 'Names' parameter is provided, ensure that the number of names matches
    the number of Base64 strings to ensure correct mapping in the output.
