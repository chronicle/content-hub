  ai_description: >-
    ### General Description

    The **Extract Zip Files** action is a utility designed to process ZIP archives
    associated with a case. It identifies `FILENAME` entities that contain an `attachment_id`,
    retrieves the corresponding file from the Google SecOps internal storage, and
    extracts its contents. The action supports password-protected archives through
    either a provided list of passwords or a brute-force mechanism using a predefined
    wordlist. Extracted files can be re-uploaded to the case wall, used to create
    new entities (FILENAME and FILEHASH), and included as base64 data in the action's
    JSON output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Include Data In JSON Result | boolean | No | If set to `true`, the base64 encoded
    content of the extracted files will be included in the `JsonResult` output. Default
    is `false`. |

    | Create Entities | boolean | No | If set to `true`, the action will automatically
    create new `FILENAME` and `FILEHASH` entities for each file found inside the ZIP
    archive. Default is `true`. |

    | Zip File Password | string | No | A string containing one or more passwords
    used to attempt extraction of protected ZIP files. |

    | BruteForce Password | boolean | No | If set to `true`, the action will attempt
    to brute-force the ZIP password using an internal wordlist if the provided passwords
    fail. Default is `false`. |

    | Add to Case Wall | boolean | No | If set to `true`, each extracted file will
    be uploaded back to the case wall as a new attachment. Default is `true`. |

    | Zip Password List Delimiter | string | Yes | The character used to separate
    multiple passwords provided in the `Zip File Password` parameter (e.g., a comma).
    Default is `,`. |


    ### Flow Description

    1.  **Entity Filtering:** The action scans the target entities for those of type
    `FILENAME` that possess an `attachment_id` attribute in their additional properties.

    2.  **Attachment Retrieval:** For each valid entity, the action fetches the binary
    content of the ZIP file from the SOAR platform.

    3.  **Extraction Logic:**
        *   It attempts to open the ZIP file.
        *   If the file is encrypted, it first tries the passwords provided in the
    `Zip File Password` parameter (split by the delimiter).
        *   If still locked and `BruteForce Password` is enabled, it iterates through
    a wordlist to find the correct password.
    4.  **Metadata Calculation:** For every file extracted, the action calculates
    MD5, SHA1, SHA256, and SHA512 hashes, and determines the MIME type.

    5.  **Internal Updates:**
        *   If `Add to Case Wall` is enabled, files are uploaded to the case wall.
        *   If `Create Entities` is enabled, new `FILENAME` and `FILEHASH` entities
    are generated and linked to the parent ZIP file entity.
    6.  **Result Reporting:** The action returns a JSON object mapping the original
    ZIP filename to the list of extracted file metadata.
