  network_security: false
  reasoning: >-
    The integration provides a suite of utility actions for enriching entities within
    the SOAR platform. The 'Whois' action is the primary driver for the 'Threat Intelligence'
    classification, as it performs external lookups (WHOIS, RDAP, Geolocation) for
    indicators like IPs, Domains, and URLs to provide reputation and contextual data.
    Other actions, such as 'Enrich Entity from Explorer Attributes' and 'Enrich Entity
    From Event Field', perform internal enrichment by aggregating data from existing
    events or historical logs, but they do not interact with external systems or perform
    specialized tasks that would qualify them for other categories like SIEM, EDR,
    or Network Security. The integration does not perform ticketing, identity management,
    cloud security, or collaboration tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
