product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration provides a suite of utility actions for enriching entities within
    the SOAR platform. The 'Whois' action performs external lookups for IP and domain
    registration and geolocation data, which qualifies it for the 'Threat Intelligence'
    category as it provides reputation-related context for external indicators. Several
    other actions, such as 'Enrich Entity from Explorer Attributes', 'Enrich Source
    and Destinations', and 'Enrich Entity From Event Field', retrieve internal context
    (from security events or the entity explorer) to populate entity metadata. This
    aligns with the 'Asset Inventory' category, as these actions provide deeper context
    about the assets involved in an investigation. The integration does not perform
    actions related to SIEM (log searching), EDR (host containment), Network Security
    (blocking traffic), Email Security, IAM, Cloud Security, ITSM, Vulnerability Management,
    or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
