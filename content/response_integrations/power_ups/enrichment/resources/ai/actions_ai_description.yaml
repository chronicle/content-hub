Enrich Entity From JSON:
  ai_description: >-
    ### General Description

    Enriches entities within a Google SecOps case by mapping data from a provided
    JSON string to existing entities. This utility action allows for the enrichment
    of entities using static data or data generated in previous playbook steps without
    requiring external API calls. It matches entities based on a configurable identifier
    path within the JSON, flattens the associated data, and updates the entity's additional
    properties (attributes).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment JSON | String | Yes | A JSON-formatted list of objects containing
    the enrichment data. |

    | Identifier KeyPath | String | Yes | The dot-separated (or custom separator)
    path to the field in the JSON that matches the entity's identifier. |

    | Separator | String | Yes | The character used to delimit keys in the Identifier
    KeyPath (default is '.'). |

    | PrefixForEnrichment | String | No | An optional string to prefix to the keys
    of the enriched data fields. |

    | Enrichment JSONPath | String | No | An optional JSONPath expression to extract
    a specific portion of the JSON object for enrichment. |


    ### Flow Description

    1. **Initialization**: The action retrieves the JSON data and configuration parameters
    from the input.

    2. **Parsing**: The `Enrichment JSON` string is parsed into a Python list of dictionaries.

    3. **Entity Iteration**: The action iterates through all entities currently targeted
    in the playbook scope.

    4. **Matching**: For each entity, it searches the provided JSON list for an entry
    where the value at the specified `Identifier KeyPath` matches the entity's identifier.

    5. **Data Extraction**: If a match is found, it extracts the relevant data. If
    `Enrichment JSONPath` is provided, it filters the object using that expression;
    otherwise, it uses the entire JSON object.

    6. **Transformation**: The extracted data is flattened into a single-level dictionary
    to ensure compatibility with entity fields.

    7. **Prefixing**: If a `PrefixForEnrichment` is provided, it is prepended to all
    keys in the flattened dictionary.

    8. **Enrichment**: The entity's `additional_properties` are updated with the processed
    data.

    9. **Completion**: The action updates the entities in the Google SecOps platform
    and returns the total count of successfully enriched entities.


    ### Additional Notes

    - This action does not perform external network requests; it processes data provided
    strictly as an input parameter.

    - The `Identifier KeyPath` supports nested keys using the defined separator (e.g.,
    'user.details.id').
