  ai_description: >-
    ### General Description

    Enriches entities with historical data retrieved from the Entity Explorer. This
    action allows users to pull specific attributes associated with an entity from
    the system's historical data and apply them to the current entity object within
    the SOAR platform.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'Field Name' (a comma-delimited
    list of fields) and the 'Use Field Name as Whitelist' boolean parameter.

    2. **Entity Iteration**: The action iterates through all entities provided in
    the `target_entities` list.

    3. **Data Retrieval**: For each entity, it calls the `get_entity_data` function
    to fetch historical attributes from the Entity Explorer.

    4. **Field Filtering**: It filters the retrieved fields based on the 'Field Name'
    parameter, applying either a whitelist or blacklist logic depending on the 'Use
    Field Name as Whitelist' setting. System fields are automatically excluded.

    5. **Entity Update**: It updates the entity's attributes or `additional_properties`
    with the filtered data.

    6. **Result Reporting**: The action updates the entities in the SOAR platform
    and adds the enrichment results to the action output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field Name | string | No | A comma-delimited string of fields from the Entity
    Explorer to use for enrichment. If null, all available fields are processed. |

    | Use Field Name as Whitelist | boolean | No | When true, 'Field Name' acts as
    a whitelist. When false, it acts as a blacklist. Defaults to true. |


    ### Additional Notes

    This action performs internal updates to entity objects. It does not interact
    with external third-party APIs for data retrieval, relying instead on the internal
    Entity Explorer data.
