  ai_description: >-
    ### General Description

    The Whois action queries WHOIS servers and IP geolocation services to retrieve
    registration and location information for various entity types, including IP Addresses,
    URLs, Email addresses, and Domains. It enriches these entities with metadata such
    as geolocation (city, country, coordinates) and domain registration details (creation
    date, age). Additionally, it supports the creation of linked DOMAIN entities and
    can mark entities as suspicious based on a configurable domain age threshold.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Entities | boolean | false | If set to true, the action will create and
    link new DOMAIN entities to the original URL, Email, or User entities. |

    | Domain Age Threshold | string | false | Domains with an age (in days) less than
    this value will be marked as suspicious. |


    ### Additional Notes

    - The action processes entities based on their type. IP Addresses are processed
    via RDAP and geolocation services, while other types (Domains, URLs, Emails) are
    processed via WHOIS lookups.

    - If 'Create Entities' is enabled, the action may generate new DOMAIN entities
    in the case.


    ### Flow Description

    1. **Initialization**: The action initializes the `SiemplifyAction` and extracts
    configuration parameters ('Create Entities', 'Domain Age Threshold').

    2. **Entity Processing**: The action iterates through all target entities in the
    case.

    3. **IP Enrichment**: If the entity is an 'ADDRESS', it performs an RDAP lookup
    and retrieves geolocation data using the `DbIpCity` service.

    4. **Domain/Other Enrichment**: If the entity is not an 'ADDRESS', it extracts
    the domain and performs a WHOIS lookup. It calculates the domain age in days.

    5. **Entity Creation**: If 'Create Entities' is enabled, it creates a new DOMAIN
    entity linked to the original entity.

    6. **Entity Update**: The action updates the original entities with the retrieved
    WHOIS and geolocation data in their `additional_properties`.

    7. **Suspicious Marking**: If the domain age is below the 'Domain Age Threshold',
    the entity is marked as suspicious.

    8. **Finalization**: The action updates the entities in the SOAR platform and
    adds the full result JSON to the action output.
