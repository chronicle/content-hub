  ai_description: >-
    ### General Description

    Enriches entities by mapping data from a provided JSON input to the entity's `additional_properties`.
    This action is a utility tool that allows users to inject custom data into entities
    based on a JSON structure, facilitating the association of external data with
    entities within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment JSON | string | Yes | The JSON data containing enrichment information.
    Expected to be a list of JSON objects. |

    | Identifier KeyPath | string | Yes | The path to the identifier within the JSON,
    used to match the JSON data with the entity. |

    | Separator | string | Yes | The separator used in the key path (e.g., "."). |

    | PrefixForEnrichment | string | No | A prefix to add to the enriched field names
    in the entity's `additional_properties`. |

    | Enrichment JSONPath | string | No | A JSONPath expression to filter the data
    to be added to the entity. |


    ### Additional Notes

    This action does not perform any external API calls. It relies entirely on the
    provided `Enrichment JSON` parameter to perform the enrichment. It is a utility
    action for mapping data to entities.


    ### Flow Description

    1. The action accepts a JSON string, a key path to identify the entity, and optional
    configuration (separator, prefix, JSONPath).

    2. It iterates through the target entities in the case.

    3. For each entity, it searches the provided JSON for a matching identifier using
    the specified `Identifier KeyPath`.

    4. If a match is found, it extracts the relevant data (optionally using the provided
    `Enrichment JSONPath`).

    5. The extracted data is flattened and added to the entity's `additional_properties`
    (optionally with a prefix).

    6. Finally, the action updates the entities in the SOAR platform with the new
    properties.
