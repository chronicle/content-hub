Enrich Entity With Field:
  ai_description: >-
    ### General Description

    This action allows users to enrich entities within a Google SecOps case by adding
    custom key-value pairs to their additional properties. It is a utility action
    used to attach static or calculated metadata to entities for better context or
    for use in downstream playbook logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields to enrich | String (JSON) | Yes | A JSON-formatted list of objects, where
    each object contains `entity_field_name` and `entity_field_value`. These pairs
    will be added to the entity's additional properties. |


    ### Flow Description

    1. **Parse Input:** The action retrieves the `Fields to enrich` parameter and
    parses the JSON string into a list of field definitions.

    2. **Iterate Entities:** It loops through all entities currently in the action's
    scope (`target_entities`).

    3. **Apply Properties:** For each entity, it iterates through the provided field
    list and assigns the values to the entity's `additional_properties` dictionary.

    4. **Update Platform:** The action calls the `update_entities` method to save
    the changes back to the Google SecOps platform.

    5. **Output Results:** It attaches the enrichment data as a JSON result for each
    processed entity and concludes the execution.


    ### Additional Notes

    - The input must be a valid JSON array of objects. For example: `[{"entity_field_name":
    "Department", "entity_field_value": "Finance"}]`.

    - This action does not communicate with external APIs; it processes data provided
    directly in the parameters.
