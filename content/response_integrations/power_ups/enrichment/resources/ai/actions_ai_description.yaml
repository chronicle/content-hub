  ai_description: >-
    ### General Description

    This action enriches entities within a Google SecOps alert by identifying their
    roles as either a source or a destination. It retrieves detailed alert context
    via the Chronicle SOAR API, parses the security event data to find source and
    destination identifiers, and then updates the corresponding entities' metadata
    with specific flags (`isSource` or `isDest`). This provides analysts with immediate
    visual context regarding the directionality of network traffic or events directly
    on the entity objects.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - The action specifically targets entities associated with the current alert.

    - It uses case-insensitive matching to link alert metadata identifiers to SecOps
    entities.

    - While the action logic is generic, it is primarily intended for IP (ADDRESS)
    and HOSTNAME entities as per the integration's design.


    ### Flow Description

    1. **Fetch Context:** The action calls the Chronicle SOAR API to retrieve the
    full investigator data for the current alert.

    2. **Parse Metadata:** It extracts source and destination identifiers from the
    alert's `securityEventCards` or field groups.

    3. **Match Entities:** It iterates through all entities associated with the alert
    and compares their identifiers with the extracted source/destination lists.

    4. **Update Attributes:** For every match found, it updates the entity's `additional_properties`
    with `isSource: true` or `isDest: true`.

    5. **Commit Changes:** The updated entity objects are sent back to the SecOps
    platform to persist the enrichment.
