Enrich Entities from List with Field:
  ai_description: >-
    ### General Description

    This action enriches a specified list of entities within a case by adding a custom
    field and value to their additional properties. It allows users to dynamically
    update entity metadata based on a provided delimited list of entity identifiers
    and a specified entity type.


    ### Flow Description

    1. Retrieves the list of target entities, entity type, delimiter, enrichment field,
    and enrichment value from the action parameters.

    2. Parses the delimited list of target entities into a list of identifiers.

    3. Iterates through all entities associated with the alerts in the current case.

    4. Matches each case entity against the parsed list of target identifiers and
    the specified entity type.

    5. For each matching entity, adds the specified enrichment field and value to
    its `additional_properties` dictionary.

    6. Updates the modified entities within the Google SecOps platform.


    ### Additional Notes

    This action does not interact with external systems. It only modifies internal
    case data.
  ai_short_description: >-
    Enriches a specified list of entities within a case by adding a custom field and
    value to their additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the additional properties of specified entities within the case.
    reasoning: >-
      The action does not fetch data from external sources or mutate external data.
      It mutates internal data by updating the `additional_properties` of entities
      and calls `siemplify.update_entities`. It does not create insights, modify alert
      data, or create case comments.
