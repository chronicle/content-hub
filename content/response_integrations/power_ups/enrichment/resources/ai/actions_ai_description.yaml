  ai_description: >-
    ### General Description

    The **Whois** action queries WHOIS servers to retrieve registration information
    for various entity types, including IP Addresses, URLs, Emails, and Domains. It
    provides contextual data such as domain age, creation dates, and registrar details.
    Additionally, it performs geolocation lookups for IP addresses and can automatically
    create and link new DOMAIN entities to the case based on extracted data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Create Entities** | boolean | No | If set to `true`, the action will create
    new DOMAIN entities extracted from URLs or Email addresses and link them to the
    original entity. Default is `true`. |

    | **Domain Age Threshold** | string | No | Specifies a threshold in days. If a
    domain's age is less than this value, the entity will be marked as suspicious.
    If set to `0` or left empty, this check is disabled. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the `Create Entities` toggle and the `Domain
    Age Threshold` value from the action parameters.

    2. **Entity Iteration:** Processes each target entity associated with the action.

    3. **IP Enrichment:** For `ADDRESS` entities, the action performs an RDAP lookup
    using the `IPWhois` library and a geolocation lookup via the DB-IP API to retrieve
    city, region, and country data.

    4. **Domain/URL/Email Enrichment:** For other entities, the action extracts the
    registered domain using `tldextract` and performs a WHOIS lookup. It calculates
    the domain's age in days based on the creation date.

    5. **Entity Creation & Linking:** If `Create Entities` is enabled and a domain
    is extracted from a URL or Email, a new `DOMAIN` entity is created in the case
    and linked to the source entity.

    6. **Internal Data Enrichment:** Updates the entities' `additional_properties`
    with the retrieved WHOIS and geolocation data (prefixed with "WHOIS").

    7. **Suspicious Status Evaluation:** Compares the calculated domain age against
    the `Domain Age Threshold`. If the domain is younger than the threshold, the entity
    is marked as suspicious.

    8. **Finalization:** Updates the entities within Google SecOps and returns a JSON
    result containing the full WHOIS and geolocation data.


    ### Additional Notes

    - This action requires outbound network connectivity to WHOIS servers and the
    `api.db-ip.com` endpoint.

    - The `Domain Age Threshold` is treated as an integer during logic execution;
    non-numeric strings may cause the threshold check to be skipped.
