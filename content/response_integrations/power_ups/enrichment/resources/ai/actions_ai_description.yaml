  ai_description: >-
    ### General Description

    Enriches entities by mapping data from a provided JSON input to the entity's `additional_properties`.
    This action is a utility tool that allows users to inject custom data into entities
    based on a JSON structure, facilitating the association of external data with
    entities within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment JSON | string | Yes | The JSON data containing enrichment information.
    Expected to be a list of JSON objects. |

    | Identifier KeyPath | string | Yes | The path to the identifier within the JSON,
    used to match the JSON data with the entity. |

