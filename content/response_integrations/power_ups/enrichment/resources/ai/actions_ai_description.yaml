Enrich Entities from List with Field:
  ai_description: >-
    Enriches a specific list of entities within a Google SecOps case by adding a user-defined
    field and value to their additional properties. This action is useful for bulk-tagging
    or manually adding context to entities that match a specific type and identifier.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List of Entities | string | Yes | A delimited list of entity identifiers (e.g.,
    IP addresses, hostnames) to be enriched. |

    | Entity Type | string | Yes | The specific type of entity to target (e.g., ADDRESS,
    USERUNIQNAME, HOSTNAME). |

    | Entity Delimiter | string | Yes | The character used to separate the identifiers
    in the 'List of Entities' parameter (e.g., a comma or semicolon). |

    | Enrichment Field | string | Yes | The name of the custom field to be added to
    the entity's 'additional_properties'. |

    | Enrichment Value | string | Yes | The value to be assigned to the specified
    'Enrichment Field'. |


    ### Additional Notes

    - This action does not call external APIs; it only processes data provided in
    the parameters and applies it to entities already present in the SecOps case.

    - Matching is case-insensitive for entity identifiers.


    ### Flow Description

    1. **Parameter Parsing**: The action retrieves the list of entities, the target
    entity type, the delimiter, and the key-value pair for enrichment from the input
    parameters.

    2. **List Processing**: It splits the 'List of Entities' string into individual
    identifiers using the provided delimiter and strips whitespace.

    3. **Entity Retrieval**: It fetches all entities associated with the alerts in
    the current case.

    4. **Matching Logic**: It iterates through the target identifiers and searches
    for matching entities in the case that share both the same identifier (case-insensitive)
    and the specified entity type.

    5. **Internal Mutation**: For every matched entity, it adds or updates the specified
    'Enrichment Field' in the entity's `additional_properties` dictionary with the
    'Enrichment Value'.

    6. **Update**: The action commits the changes to the entities within the Google
    SecOps platform and returns the count of successfully enriched entities.
