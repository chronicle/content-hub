  ai_description: >-
    ### General Description

    The "Enrich Entity From JSON" action is a utility designed to extract specific
    fields from a provided JSON string (formatted as a list of JSON objects) and append
    them to the `additional_properties` of the target entities within Google SecOps.
    It does not fetch data from external sources but rather processes the JSON provided
    via its parameters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Enrichment JSON | String | Yes | The JSON string (must be a list of JSON objects)
    from which data will be extracted to enrich the entities. |

    | Identifier KeyPath | String | Yes | The key path used to locate the relevant
    data within the JSON structure. |

    | Separator | String | Yes | The character used to separate keys in the `Identifier
    KeyPath` (default is `.`). |

    | PrefixForEnrichment | String | No | A prefix to prepend to the keys of the extracted
    data before adding them to the entity's properties. |

    | Enrichment JSONPath | String | No | A JSONPath expression to extract specific
    nested structures from the JSON. |


    ### Flow Description

    1. Parses the input `Enrichment JSON` parameter into a Python list.

    2. Iterates over all target entities in the case.

    3. For each entity, it iterates over the provided JSON objects and searches for
    the specified `Identifier KeyPath`.

    4. If the key path is found, it extracts the data (using the `Enrichment JSONPath`
    if provided), flattens the dictionary, and optionally adds the `PrefixForEnrichment`.

    5. Updates the entity's `additional_properties` with the extracted data.

    6. Saves the updated entities back to the case.
