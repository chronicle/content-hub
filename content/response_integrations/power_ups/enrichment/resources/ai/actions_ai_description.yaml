  ai_description: >-
    ### General Description

    Enriches a specific list of entities within the case by adding a custom field
    and value to their additional properties. This action does not fetch data from
    external sources but rather applies user-defined static values to the specified
    entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | List of Entities | String | Yes | A delimited list of entity identifiers to
    be enriched. |

    | Entity Type | String | Yes | The type of the entities provided in the list (e.g.,
    ADDRESS, HOSTNAME). |

    | Entity Delimiter | String | Yes | The character used to separate the entities
    in the 'List of Entities' parameter (e.g., a comma `,`). |

    | Enrichment Field | String | Yes | The name of the property/field to add to the
    matched entities. |

    | Enrichment Value | String | Yes | The value to assign to the newly added enrichment
    field. |


    ### Flow Description

    1. Parses the input parameters to extract the target entity identifiers, type,
    delimiter, and the key-value pair for enrichment.

    2. Retrieves all entities associated with the current case alerts.

    3. Iterates through the case entities and matches them against the provided list
    based on their identifier (case-insensitive) and entity type.

    4. Updates the `additional_properties` dictionary of each matched entity with
    the specified enrichment field and value.

    5. Saves the updated entities back to the case using the `update_entities` method.
