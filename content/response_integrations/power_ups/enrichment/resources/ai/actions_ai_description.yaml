Enrich Entity From JSON:
  ai_description: >-
    ### General Description

    Extracts specific fields from a provided JSON string and appends them to the target
    entities' additional properties. This action allows users to dynamically enrich
    entities using custom JSON data by mapping and extracting specific JSON paths.


    ### Flow Description

    1. Parses the provided JSON string parameter (expected to be a list of JSON objects).

    2. Iterates through all target entities in the case.

    3. For each entity, searches the parsed JSON for a matching key path using the
    specified `Identifier KeyPath`.

    4. If the key path is found, extracts the relevant data using the optional `Enrichment
    JSONPath` or takes the entire JSON object.

    5. Flattens the extracted JSON data into key-value pairs.

    6. Appends the flattened data to the entity's `additional_properties`, optionally
    adding a custom prefix.

    7. Updates the entities within the Google SecOps platform.


    ### Additional Notes

    The action expects the input JSON to be a list of dictionaries. If multiple values
    are found for a key path, it may return a concatenated string or a specific error
    string. Note that the script logic applies the extracted JSON data to the entity
    if the key path exists in the JSON, without explicitly matching the extracted
    value to the entity's identifier.
  ai_short_description: >-
    Extracts fields from a provided JSON string and appends them to the target entities'
    additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
