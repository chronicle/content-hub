    2. Retrieves historical entity data from the Entity Explorer using the SOAR API.

    3. Filters the retrieved fields based on the `Field Name` and `Use Field Name
    as Whitelist` parameters.

    4. Updates the entity properties or additional properties with the filtered fields.

    5. Saves the updated entities back to the case and provides a JSON result with
    the updated fields.
