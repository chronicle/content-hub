Whois:
  ai_description: >-
    ### General Description

    Queries WHOIS servers and IP location services to retrieve registration and geographical
    information for various entities such as IP addresses, URLs, emails, and domains.


    ### Flow Description

    1. Iterates through all target entities provided in the case.

    2. If the entity is an IP address, it queries RDAP via `IPWhois` and fetches geolocation
    data via `DbIpCity` (which makes an API call to `api.db-ip.com` and OpenStreetMap).

    3. For other entity types, it extracts the registered domain and queries WHOIS
    data using `whois_alt`.

    4. Calculates the domain age in days based on the WHOIS creation date.

    5. If the `Create Entities` parameter is enabled, it creates a new DOMAIN entity
    linked to the original entity via the SecOps API.

    6. Updates the original entities with the retrieved WHOIS and geolocation data
    in their additional properties.

    7. Marks entities as suspicious if their domain age is below the configured `Domain
    Age Threshold`.


    ### Additional Notes

    Supports creating linked domain entities and evaluating domain age for risk assessment.
  ai_short_description: >-
    Queries WHOIS servers and IP location services to retrieve registration and geographical
    information for entities, optionally creating linked domain entities and marking
    newly registered domains as suspicious.
