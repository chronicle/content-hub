  ai_description: >-
    ### General Description

    This action enriches specific entities within a case by adding a custom field
    and value to their `additional_properties`. It is a utility action designed to
    update entity metadata based on a provided list of identifiers.


    ### Flow Description

    1. Parses the input `List of Entities` string using the provided `Entity Delimiter`.

    2. Retrieves all entities from the current case alerts.

    3. Matches entities from the input list against the case entities based on identifier
    and the specified `Entity Type`.

    4. Updates the `additional_properties` of the matched entities with the provided
    `Enrichment Field` and `Enrichment Value`.

    5. Updates the entities in the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List of Entities | string | Yes | A delimited list of entity identifiers to
    enrich. |

    | Entity Type | string | Yes | The type of entity to filter for (e.g., "ADDRESS",
    "HOSTNAME"). |

    | Entity Delimiter | string | Yes | The character used to separate entities in
    the list. |

    | Enrichment Field | string | Yes | The key name for the new property. |

    | Enrichment Value | string | Yes | The value to assign to the new property. |


    ### Additional Notes

    This action does not perform external API calls or fetch external data. It is
    strictly an internal utility for modifying entity metadata within the SOAR platform.
