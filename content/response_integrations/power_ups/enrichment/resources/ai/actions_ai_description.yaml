  ai_description: >-
    ### General Description

    The **Enrich Entities from List with Field** action is a utility designed to bulk-update
    entities within a Google SecOps case. It takes a delimited list of entity identifiers
    and a specific entity type, searches for matching entities already present in
    the case, and enriches them by adding or updating a custom field in their `additional_properties`.
    This action is particularly useful for manual tagging or applying context derived
    from external lists to existing case entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List of Entities** | String | Yes | A delimited string containing the identifiers
    (e.g., IP addresses, hostnames) of the entities to be enriched. |

    | **Entity Type** | String | Yes | The type of entities to target (e.g., ADDRESS,
    HOSTNAME, USER). The action will only update entities that match this type. |

    | **Entity Delimiter** | String | Yes | The character used to separate the identifiers
    in the **List of Entities** parameter (default is a comma). |

    | **Enrichment Field** | String | Yes | The name of the field (key) to be added
    to the entity's `additional_properties`. |

    | **Enrichment Value** | String | Yes | The value to be assigned to the specified
    **Enrichment Field**. |


    ### Flow Description

    1. **Parsing**: The action splits the input **List of Entities** into individual
    strings based on the provided **Entity Delimiter**.

    2. **Retrieval**: It retrieves all entities associated with all alerts in the
    current Google SecOps case.

    3. **Matching**: For each identifier in the parsed list, the action iterates through
    the case entities to find a match. A match is confirmed if the entity's identifier
    (case-insensitive) and its type both match the provided parameters.

    4. **Enrichment**: For every matching entity, the action adds or updates the specified
    **Enrichment Field** with the **Enrichment Value** in the entity's `additional_properties`
    dictionary.

    5. **Update**: The action calls the internal SDK to update the modified entities
    within the platform.


    ### Additional Notes

    - This action does not interact with external APIs; it performs internal data
    manipulation within the SOAR environment.

    - If an identifier in the list does not exist in the case or does not match the
    specified type, it is skipped without error.
