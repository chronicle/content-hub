  ai_description: >-
    ### General Description

    This action enriches entities by extracting specific fields from the associated
    security event and updating the entity's additional properties. It allows analysts
    to map event-specific data (e.g., user agents, source ports, or custom metadata)
    directly onto the entities involved in an alert, facilitating better context and
    investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields to enrich | string | Yes | The name of the fields in the event that will
    be used to enrich the entity. Supports a comma-separated list. |


    ### Flow Description

    1. The action retrieves the "Fields to enrich" parameter.

    2. It accesses the first security event associated with the current alert.

    3. It iterates through all target entities provided in the action context.

    4. For each entity, it checks if the specified fields exist in the event's additional
    properties.

    5. If a match is found, it updates the entity's `additional_properties` with the
    corresponding value from the event.

    6. If any entities were updated, the action calls `update_entities` to persist
    the changes in the SOAR platform.

    7. Finally, it returns the enriched data in the action results and completes the
    execution.
