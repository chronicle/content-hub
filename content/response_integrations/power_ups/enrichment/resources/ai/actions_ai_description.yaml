  ai_description: >-
    Enriches entities within Google SecOps using data provided in a JSON format. This
    utility action allows users to map external data (passed as a parameter) to existing
    entities in a case by matching identifiers. It flattens the provided JSON data
    and adds it to the entity's additional properties, optionally applying a prefix
    or filtering the data using JSONPath.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment JSON | String | Yes | A JSON string representing a list of objects
    containing the enrichment data. |

    | Identifier KeyPath | String | Yes | The path to the field in the JSON that contains
    the entity identifier. Supports multiple paths separated by newlines. |

    | Separator | String | Yes | The character used to separate keys in the `Identifier
    KeyPath` (default is `.`). |

    | PrefixForEnrichment | String | No | An optional prefix to prepend to the keys
    added to the entity's additional properties. |

    | Enrichment JSONPath | String | No | An optional JSONPath expression to filter
    or select specific parts of the JSON object for enrichment. |


    ### Additional Notes


    - This action is a utility for manual or automated enrichment using static or
    dynamically generated JSON data within a playbook.

    - It does not interact with external APIs; all data must be provided via the `Enrichment
    JSON` parameter.

    - The action flattens nested JSON structures into a single-level key-value format
    suitable for entity additional properties.


    ### Flow Description


    1. **Parse Input:** The action parses the `Enrichment JSON` string into a list
    of dictionaries.

    2. **Identify Keys:** It processes the `Identifier KeyPath` and `Separator` to
    determine how to locate identifiers within the JSON objects.

    3. **Iterate Entities:** It iterates through all target entities in the current
    SOAR context.

    4. **Match and Extract:** For each entity, it scans the JSON list. If a matching
    identifier is found (based on the provided key path), it proceeds to extract the
    data.

    5. **Apply JSONPath (Optional):** If an `Enrichment JSONPath` is provided, the
    action filters the matching JSON object to extract only the specified data.

    6. **Flatten and Prefix:** The extracted data is flattened into a flat dictionary.
    If a `PrefixForEnrichment` is specified, it is prepended to all keys.

    7. **Update Entities:** The entity's `additional_properties` are updated with
    the processed data, and the entity is marked for update in the platform.

    8. **Finalize:** The action concludes by updating all modified entities and returning
    the total count of enriched entities.
