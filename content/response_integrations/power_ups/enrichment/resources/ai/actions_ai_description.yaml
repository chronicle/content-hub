  ai_description: >-
    ### General Description

    The **Enrich Entity With Field** action is a utility designed to manually or programmatically
    inject custom metadata into entities within a Google SecOps case. It allows users
    to define a list of key-value pairs that are then appended to the `additional_properties`
    attribute of all entities currently in scope. This action is primarily used for
    tagging entities with static information, organizational context, or data derived
    from previous playbook steps that isn't automatically mapped by standard integrations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Fields to enrich** | string | Yes | A JSON-formatted string representing a
    list of objects. Each object must contain `entity_field_name` and `entity_field_value`.
    For example: `[{"entity_field_name": "Title", "entity_field_value": "SalesManager"}]`.
    |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the JSON string from the `Fields to
    enrich` parameter and parses it into a list of dictionaries.

    2. **Entity Iteration**: The script iterates through every entity provided in
    the `target_entities` list of the current context.

    3. **Property Injection**: For each entity, the script loops through the parsed
    fields and adds or updates the corresponding keys in the entity's `additional_properties`
    dictionary.

    4. **Platform Update**: The action calls the `update_entities` method to persist
    these changes within the Google SecOps platform.

    5. **Result Reporting**: The action generates a JSON result for each entity containing
    the applied fields and concludes with a summary message indicating the number
    of entities successfully updated.


    ### Additional Notes

    - This action does not communicate with any external APIs; it only processes data
    provided via parameters.

    - It modifies internal entity data within the SOAR environment by updating the
    `additional_properties` field.

    - Ensure the JSON provided in the parameter is valid to avoid execution errors.
