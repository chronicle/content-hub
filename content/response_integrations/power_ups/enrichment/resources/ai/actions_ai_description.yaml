Enrich Entity From Event Field:
  ai_description: >-
    Enriches target entities by extracting specific field values from the alert's
    first security event and mapping them to the entities' additional properties.
    This utility action allows for the dynamic propagation of event-level metadata
    (such as custom logs or specific telemetry fields) directly onto the entity objects
    within the SOAR platform, making that data available for subsequent playbook steps
    or analyst review.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields to enrich | string | True | A comma-separated list of field names found
    within the security event's additional properties. These values will be copied
    to the target entities. |


    ### Flow Description


    1. **Parameter Parsing:** The action parses the comma-separated string provided
    in the 'Fields to enrich' parameter into a list of field names.

    2. **Event Retrieval:** It accesses the first security event (`security_events[0]`)
    associated with the current alert.

    3. **Data Normalization:** It creates a case-insensitive map of the event's additional
    properties to ensure field matching is robust.

    4. **Entity Iteration:** The action iterates through all entities currently in
    the playbook scope (target entities).

    5. **Field Mapping:** For each entity, it checks if the requested fields exist
    in the event data. If a match is found, the entity's 'additional_properties' attribute
    is updated with the value from the event.

    6. **Internal Update:** The action commits the changes to the entities within
    Google SecOps using the `update_entities` method.

    7. **Result Reporting:** It returns a JSON summary of the enriched fields for
    each affected entity.


    ### Additional Notes


    * This action only processes the **first** security event attached to an alert.
    If an alert contains multiple events with different data, only the first one is
    considered.

    * The field matching is case-insensitive.
