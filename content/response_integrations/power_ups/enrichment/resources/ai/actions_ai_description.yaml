Enrich Entity from Explorer Attributes:
  ai_description: >-
    Enriches entities with historical data retrieved from the Google SecOps Entity
    Explorer. This action allows users to synchronize previously discovered entity
    attributes into the current case context, ensuring that existing knowledge about
    an entity is readily available for analysis.


    ### Flow Description

    1. **Parameter Extraction:** The action identifies which fields to process based
    on the `Field Name` and `Use Field Name as Whitelist` parameters.

    2. **Data Retrieval:** For each target entity, the action calls the internal SOAR
    API to fetch historical records from the Entity Explorer.

    3. **Field Filtering:** The retrieved data is filtered to exclude system-protected
    fields (like 'Environment' or 'IsInternalAsset') and to match the user-defined
    whitelist or denylist.

    4. **Entity Update:** The action maps the retrieved values to the entity's attributes
    or `additional_properties` dictionary.

    5. **Persistence:** The updated entity objects are committed back to the Google
    SecOps platform, and a summary of the changes is provided in the action results.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field Name | string | No | A comma-separated list of specific fields to retrieve
    from the Entity Explorer. If left empty, all available fields will be processed.
    |

    | Use Field Name as Whitelist | boolean | No | If set to `true` (default), only
    the fields listed in 'Field Name' will be added to the entity. If `false`, the
    list acts as a denylist, and all fields *except* those listed will be added. |


    ### Additional Notes

    - This action interacts with internal Google SecOps data stores rather than external
    third-party APIs.

    - System fields are automatically protected and will not be overwritten by this
    action to maintain data integrity.
