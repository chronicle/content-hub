  ai_description: >-
    ### General Description

    Queries WHOIS servers for domain registration information and IP geolocation data.
    This action supports IP Addresses, URLs, Emails, and Domains. It can optionally
    create new DOMAIN entities linked to the target entity and evaluate domain age
    against a threshold to mark entities as suspicious.


    ### Flow Description

    1. Iterates through all target entities in the case.

    2. If the entity is an IP address (`ADDRESS`), it performs an IP WHOIS lookup
    and a geolocation lookup using DbIpCity.

    3. For other entity types, it attempts to extract a registered domain from the
    entity identifier and performs a domain WHOIS lookup.

    4. Calculates the domain's age in days based on its creation date.

    5. If the `Create Entities` parameter is enabled and the extracted domain differs
    from the original entity identifier, it creates a new DOMAIN entity linked to
    the original one.

    6. Enriches the entities with the retrieved WHOIS and geolocation data.

    7. If the domain age is less than the configured `Domain Age Threshold`, it marks
    the entity as suspicious.

    8. Updates the entities in the Google SecOps platform and returns the results
    as JSON.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Entities | boolean | False | If set to true, creates and links new DOMAIN
    entities to the original URL, Email, or User names. Default is true. |

    | Domain Age Threshold | string | False | Domains whose age in days is less than
    the supplied threshold will be marked as suspicious. |
