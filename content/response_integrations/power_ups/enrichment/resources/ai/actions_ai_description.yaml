Enrich Source and Destinations:
  ai_description: >-
    ### General Description

    This action enriches entities within a Google SecOps alert by identifying and
    tagging their roles as either a 'source' or a 'destination' based on the underlying
    alert metadata. It retrieves detailed investigator data from the SOAR API, parses
    the security event cards or field groups to extract source and destination identifiers,
    and then updates the corresponding entities in the case with specific flags.


    ### Parameters Description

    There are no user-configurable parameters for this action. It operates automatically
    based on the context of the current alert.


    ### Additional Notes

    - The action specifically looks for 'ADDRESS' (IP) and 'HOSTNAME' entities, although
    the matching logic is based on the entity identifier string.

    - It uses the `get_investigator_data` utility to fetch the full alert context
    from the SOAR platform.

    - Entity properties are updated with `isSource: true` or `isDest: true` which
    can be used in subsequent playbook logic or for analyst visibility.


    ### Flow Description

    1. **Fetch Alert Data**: The action calls the SOAR API to retrieve comprehensive
    investigator data for the current alert.

    2. **Identify Roles**: It parses the retrieved alert data (checking both `securityEventCards`
    and standard field groups) to compile lists of identifiers designated as sources
    and destinations.

    3. **Match Entities**: The action iterates through all entities associated with
    the current alert.

    4. **Tag Entities**: For each entity, it checks if the identifier matches any
    of the discovered sources or destinations (case-insensitive).

    5. **Update Properties**: If a match is found, the entity's `additional_properties`
    are updated with the respective role flag.

    6. **Commit Changes**: The action performs a bulk update of all modified entities
    back to the Google SecOps case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
