Enrich Source and Destinations:
  ai_description: >-
    ### General Description

    This action enriches Address and Hostname entities by identifying whether they
    act as a source or destination within the context of an alert. It retrieves alert
    data from the Chronicle SOAR API and updates the entities' additional properties
    accordingly.


    ### Flow Description

    1. Determines the execution scope (Alert or Case).

    2. Iterates over the target alerts within the determined scope.

    3. Makes an API call to the Chronicle SOAR API to retrieve investigator data for
    each alert.

    4. Extracts source and destination identifiers from the alert's security event
    cards or fields.

    5. Iterates over the target entities, filtering for Address and Hostname types.

    6. Compares entity identifiers against the extracted sources and destinations.

    7. Updates the `additional_properties` of matching entities with `isSource: "true"`
    or `isDest: "true"`.

    8. Saves the updated entities back to the case.


    ### Additional Notes

    - The action relies on the Chronicle SOAR API to fetch alert details.

    - Only entities of type Address and Hostname are processed.
