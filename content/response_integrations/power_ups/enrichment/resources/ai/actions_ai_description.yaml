Enrich Entity from Explorer Attributes:
  ai_description: >-
    ### General Description

    Enriches entities with historic enrichment data using the Google SecOps Entity
    Explorer. This action retrieves previously recorded fields for each entity and
    applies them to the current entity's properties or additional properties based
    on a specified allowlist or denylist.


    ### Flow Description

    1. Extracts the `Field Name` and `Use Field Name as Whitelist` parameters to determine
    which fields should be included or excluded.

    2. Iterates over all target entities provided in the case.

    3. Makes an internal API call (`get_entity_data`) to the SOAR Entity Explorer
    to fetch historic enrichment data for each entity.

    4. Filters the retrieved fields based on the provided allowlist or denylist configuration.

    5. Updates the entity's properties or `additional_properties` with the filtered
    fields, skipping predefined system fields.

    6. Saves the updated entities back to the platform and outputs the modified fields
    as a JSON result.


    ### Additional Notes

    - Predefined system fields (e.g., `Type`, `Environment`, `IsInternalAsset`) are
    automatically excluded from being overwritten.

    - If `Field Name` is left empty, all available non-system fields from the Entity
    Explorer will be added to the entity.
