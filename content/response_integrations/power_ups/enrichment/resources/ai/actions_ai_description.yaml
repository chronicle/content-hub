  ai_description: >-
    ### General Description

    Enriches entities within a Google SecOps case by retrieving historical attribute
    data from the Entity Explorer. This action allows analysts to automatically populate
    entity properties with previously discovered information, ensuring consistency
    and providing deeper context without manual data entry.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field Name | string | False | A comma-separated list of specific fields to retrieve
    from the Entity Explorer. If left empty, all available fields will be considered
    based on the whitelist/denylist logic. |

    | Use Field Name as Whitelist | boolean | False | Determines how the 'Field Name'
    parameter is applied. If set to `true` (default), only the specified fields are
    enriched. If set to `false`, the specified fields are excluded (denylist), and
    all other available fields are enriched. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the filtering logic (whitelist
    vs. denylist) and the list of target field names from the user input.

    2. **Entity Iteration:** The action iterates through all entities currently associated
    with the case or targeted by the playbook.

    3. **Data Retrieval:** For each entity, it queries the internal Google SecOps
    API (Entity Explorer) to fetch historical data associated with that specific entity
    identifier and type.

    4. **Field Filtering:** The retrieved data is filtered to exclude core system
    fields (e.g., 'Type', 'Environment', 'IsInternalAsset') and then processed according
    to the user-defined whitelist or denylist.

    5. **Entity Update:** The action updates the entity's attributes or populates
    its 'additional_properties' dictionary with the filtered values.

    6. **Persistence:** Finally, the action commits the updated entity objects back
    to the SecOps platform and outputs the results in JSON format.


    ### Additional Notes

    - Core system fields are protected and cannot be overwritten by this action to
    maintain data integrity.

    - If no fields are specified in the 'Field Name' parameter and the whitelist mode
    is active, the action will attempt to enrich the entity with all available historical
    fields found in the explorer.
