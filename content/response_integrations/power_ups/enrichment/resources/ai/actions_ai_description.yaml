Whois:
  ai_description: >-
    ### General Description\nEnriches entities by querying WHOIS and RDAP servers
    for registration information. It supports IP addresses, domains, URLs, and email
    addresses. The action retrieves data such as creation dates, registrar details,
    and geographic location for IPs.\n\n### Parameters Description\n| Parameter |
    Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Create Entities
    | boolean | False | If set to true, the action will create and link new DOMAIN
    entities to URL and Email/User entities. |\n| Domain Age Threshold | string |
    False | Domains whose age (in days) is less than this value will be marked as
    suspicious. Set to 0 to disable. |\n\n### Flow Description\n1. **Parameter Extraction**:
    Retrieves the 'Create Entities' flag and 'Domain Age Threshold'.\n2. **Entity
    Processing**: Iterates through target entities.\n3. **IP Enrichment**: For ADDRESS
    entities, performs an RDAP lookup and fetches geographic data (city, region, country,
    lat/long) from DB-IP.\n4. **Domain/URL/Email Enrichment**: Extracts the registered
    domain and performs a WHOIS lookup to retrieve registration dates and registrar
    info.\n5. **Entity Creation**: If 'Create Entities' is enabled and the input is
    a URL or Email, a new DOMAIN entity is created and linked to the original entity.\n6.
    **Risk Assessment**: Calculates domain age in days. If the age is below the threshold,
    the entity is marked as suspicious.\n7. **Internal Update**: Updates the entities
    in Google SecOps with the retrieved WHOIS/RDAP data in additional properties and
    sets the 'is_enriched' flag.\n\n### Additional Notes\n- This action uses the `whois_alt`
    and `ipwhois` libraries.\n- Geographic lookups for IPs are performed using the
    DB-IP free API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
