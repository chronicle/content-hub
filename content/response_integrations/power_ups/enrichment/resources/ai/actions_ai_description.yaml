  ai_description: >-
    ### General Description

    This action enriches entities by extracting specific field values from the first
    security event associated with the current alert and mapping them to the entity's
    additional properties. It is designed to propagate event-level context (such as
    custom metadata, department info, or specific event tags) directly onto the entities
    involved in the alert, making that data available for subsequent playbook steps
    or analyst review.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields to enrich | String | Yes | A comma-separated list of field names (keys)
    to look for in the security event's additional properties. These values will be
    copied to the entity's additional properties if found. |


    ### Flow Description

    1. **Parameter Parsing**: The action retrieves the comma-separated list of field
    names from the input parameter.

    2. **Event Retrieval**: It accesses the first security event (`security_events[0]`)
    associated with the current alert.

    3. **Entity Iteration**: The action iterates through all target entities in the
    current scope.

    4. **Field Mapping**: For each entity, it performs a case-insensitive check to
    see if the requested fields exist within the event's additional properties.

    5. **Internal Mutation**: If matches are found, the entity's `additional_properties`
    are updated with the values from the event.

    6. **Persistence**: The action calls the internal SDK method to save the updated
    entity attributes back to the Google SecOps platform.

    7. **Result Reporting**: It returns a JSON object containing the enriched fields
    and a count of how many entities were successfully updated.


    ### Additional Notes

    - This action only looks at the **first** security event in the alert. If an alert
    contains multiple events with different data, only the first one is used for enrichment.

    - The field matching is case-insensitive, but the keys are stored in lowercase
    in the resulting entity properties.
