  ai_description: >-
    ### General Description

    Extracts specified fields from the first security event of the current alert and
    adds them to the target entities. This action enriches entities internally by
    leveraging data already present in the alert's events, specifically updating the
    entities' `additional_properties`.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Fields to enrich | String | Yes | A comma-separated list of field names to extract
    from the event's additional properties. These fields will be appended to the entities
    if they exist in the event. |


    ### Flow Description

    1. Retrieves the `Fields to enrich` parameter and parses it into a list of field
    names.

    2. Fetches the first security event associated with the current alert.

    3. Iterates through all target entities in the case.

    4. For each entity, checks if the specified fields exist in the event's additional
    properties (case-insensitive).

    5. If a field exists, it is added to the entity's `additional_properties`.

    6. Updates the modified entities in the Google SecOps platform using `siemplify.update_entities`.

    7. Returns a JSON result containing the enriched fields and completes the execution.
