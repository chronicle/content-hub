Enrich FileName Entity with Path:
  ai_description: >-
    ### General Description

    This action enriches entities by parsing their identifiers as file paths. It extracts
    the directory path, the full file name, and the file extension, then attaches
    this metadata back to the entity. It is designed to handle both Windows-style
    (e.g., `C:\path\to\file.exe`) and Unix-style (e.g., `/path/to/file.sh`) paths
    using regex and standard path manipulation libraries.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    * The action automatically detects the path format (Windows vs. Unix) based on
    the presence of a drive letter (e.g., `C:\`).

    * If an entity identifier cannot be parsed as a valid path, the action will skip
    that entity and log a failure message for it.

    * The extracted data is stored in the entity's `additional_properties` and also
    returned as a JSON result.


    ### Flow Description

    1. **Entity Retrieval**: The action retrieves all target entities from the current
    context.

    2. **Path Parsing**: For each entity, the script checks if the identifier matches
    a Windows path pattern. It then uses the appropriate library (`ntpath` for Windows,
    `os.path` for others) to split the identifier into a directory path and a filename.

    3. **Extension Extraction**: The filename is further processed to extract the
    file extension.

    4. **Internal Mutation**: If parsing is successful, the `file_name`, `file_path`,
    and `file_extension` are added to the entity's `additional_properties`.

    5. **Update and Result**: The action updates the entities within Google SecOps
    and attaches a JSON object containing the parsed details for all processed entities.
