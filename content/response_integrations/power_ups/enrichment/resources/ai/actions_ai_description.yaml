  ai_description: >-
    ### General Description

    This action parses file paths from entity identifiers to extract and enrich the
    entity with specific file metadata, including the directory path, the full filename,
    and the file extension. It is designed to provide better context for entities
    that represent file system locations by breaking down complex path strings into
    structured data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - The action automatically detects whether a path is Windows-style (e.g., starting
    with a drive letter like `C:\`) or Unix-style to ensure accurate parsing.

    - Enrichment only occurs if a directory path is successfully identified within
    the entity's identifier; simple filenames without paths may not be enriched depending
    on the environment context.

    - Extracted data is stored in the entity's `additional_properties` field, making
    it available for downstream playbooks and searches.


    ### Flow Description

    1. **Retrieve Entities**: The action fetches all target entities from the current
    SecOps context.

    2. **Path Parsing**: For each entity, the identifier is analyzed using regex and
    path utilities to determine if it contains a valid file path.

    3. **Metadata Extraction**: If a path is found, the logic splits the identifier
    into the directory path, the filename, and the file extension.

    4. **Internal Enrichment**: The extracted metadata (file_name, file_path, file_extension)
    is added to the entity's `additional_properties` attribute.

    5. **Update and Report**: The action updates the entities within Google SecOps
    and returns a JSON summary of the enriched data for all processed entities.
