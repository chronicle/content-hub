Mark Entity as Suspicious:
  ai_description: >-
    ### General Description

    This action marks all entities within the current scope as suspicious in Google
    SecOps. It is a utility action designed to flag entities for further investigation
    or to influence the logic of subsequent playbook steps based on the entity's suspicious
    status.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | N/A | This action does not require any input parameters. | N/A | N/A |


    ### Additional Notes

    - This action does not interact with any external APIs or services.

    - It applies the 'suspicious' flag to every entity provided in the action's scope,
    regardless of their original state or type.


    ### Flow Description

    1. **Identify Entities**: The action retrieves the list of target entities from
    the current Google SecOps scope.

    2. **Flag Entities**: It iterates through each entity and sets the `is_suspicious`
    attribute to `True`.

    3. **Update Internal State**: The action calls the internal SDK to update the
    entity records within the platform.

    4. **Finalize**: The action concludes by returning a success message and the total
    count of entities that were updated.
