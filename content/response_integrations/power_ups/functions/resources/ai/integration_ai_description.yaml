  reasoning: >-
    The integration 'functions' is a collection of utility actions designed for data
    manipulation, including math, string processing, time conversion, and data parsing
    (JSON/XML). It also includes basic entity metadata updates, such as detecting
    hash types and IP types. These actions do not interact with external security
    systems, fetch threat intelligence, manage assets, or perform security-specific
    operations like containment or ticketing. While some actions perform internal
    enrichment by updating entity properties (e.g., adding hash type or IP type),
    this does not meet the criteria for the defined product categories, which require
    specific outcomes like fetching reputation data (Threat Intelligence) or retrieving
    asset owner/criticality information (Asset Inventory). Therefore, the integration
    does not fit into any of the predefined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
