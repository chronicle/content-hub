  reasoning: >-
    The 'functions' integration is a collection of utility actions designed for data
    manipulation, time calculation, text processing, and format conversion within
    SOAR playbooks. While actions like 'Detect Hash Type' and 'Detect IP Type' update
    entity properties with internal metadata (e.g., hash type or IP version), they
    do not perform external lookups, retrieve reputation data, or provide risk scores.
    Consequently, they do not meet the criteria for the 'Threat Intelligence' category
    or any other security-specific category defined. The integration does not interact
    with SIEM, EDR, Network Security, IAM, Cloud, ITSM, Vulnerability Management,
    Asset Inventory, or Collaboration systems. Therefore, it does not match any of
    the defined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
