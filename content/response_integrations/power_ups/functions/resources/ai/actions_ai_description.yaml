    1. Initialize the `HashID` utility.

    2. If the `Hashes` parameter is provided, iterate through the comma-separated
    list and identify the hash type for each.

    3. Iterate through `target_entities` of type `FILEHASH`.

    4. Identify the hash type for each entity using the `HashID` utility.

    5. Update the entity's `additional_properties` with the detected hash type.

    6. Update the entities in the SOAR platform.

    7. Return the results as a JSON object.
