  ai_description: >-
    ### General Description

    Defangs input text by modifying URLs, IP addresses, and email addresses to prevent
    accidental execution or linking. It replaces "http" with "hxxp", dots with "[.]"
    in IPs, and "@" with "[at]" in emails. This is a utility action that performs
    local string manipulation and returns the safe, defanged text.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Input | String | False | The raw text that needs to be defanged. If left empty,
    the action will simply return an empty string in the results. |


    ### Flow Description

    1. Extracts the `Input` text parameter.

    2. Validates if the input is empty; if so, immediately returns an empty result.

    3. Applies regular expressions to defang HTTP/HTTPS URLs (e.g., replacing 'http'
    with 'hxxp' and '.' with '[.]').

    4. Applies regular expressions to defang IPv4 addresses (e.g., replacing '.' with
    '[.]').

    5. Applies regular expressions to defang email addresses (e.g., replacing '@'
    with '[at]' and '.' with '[.]').

    6. Outputs the defanged text in the JSON results under the `converted_text` key.
