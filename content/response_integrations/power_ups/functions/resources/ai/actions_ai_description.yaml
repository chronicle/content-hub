SanitizeHTML:
  ai_description: >-
    ### General Description

    The **SanitizeHTML** action is a utility designed to clean and sanitize HTML fragments.
    It uses the HTML5 parsing algorithm to ensure that the output is safe and well-formed.
    This is particularly useful for processing potentially malicious or malformed
    HTML content from emails or web logs before displaying it or using it in other
    processes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Input HTML** | String | Yes | The HTML fragment that will be sanitized. |

    | **Tags** | String | No | A comma-separated list of allowed HTML tags. Tags not
    in this list will be escaped or stripped. Default includes common safe tags like
    `a`, `b`, `p`, `div`, etc. |

    | **Attributes** | String | No | A comma-separated list of allowed attributes
    (e.g., `href`, `src`). |

    | **Styles** | String | No | A comma-separated list of allowed CSS properties
    (e.g., `color`, `font-size`) if the `style` attribute is permitted. |

    | **Allow All Attributes** | Boolean | No | If set to `True`, all attributes will
    be allowed for the permitted tags. Default is `False`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input HTML and the configuration
    for allowed tags, attributes, and styles.

    2. **Sanitization Configuration**: Based on the provided parameters, the action
    configures the `bleach` sanitization engine. It handles various combinations of
    allowed tags, attributes, and CSS properties.

    3. **Processing**: The input HTML is parsed and sanitized according to the defined
    rules. Misnested or unclosed tags are corrected.

    4. **Output**: The sanitized HTML string is returned as the action result.


    ### Additional Notes

    - The action code contains logic for `Allow All Tags` and `Allow All Styles`,
    but these parameters are not defined in the standard configuration.

    - If no specific tags or attributes are provided, the action defaults to a safe
    set of standard HTML tags.
