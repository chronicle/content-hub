    1. **Parameter Extraction:** The action retrieves the input JSON string and the
    JSONPath expression from the user-defined parameters.

    2. **JSON Parsing:** The input string is converted into a structured JSON object
    (Python dictionary).

    3. **Expression Execution:** The JSONPath expression is parsed and applied to
    the JSON object to find all matching elements.

    4. **Result Compilation:** All matching values are collected into a list under
    the `matches` key.

    5. **Output Generation:** The resulting matches are returned as a JSON object
    and made available for subsequent playbook steps.


    ### Additional Notes

    - This action does not interact with external APIs or modify any Google SecOps
    entities; it is a pure data transformation utility.

    - If the JSONPath expression finds no matches, the `matches` list in the output
    will be empty.
