  ai_description: >-
    ### General Description

    Identifies the most likely hash algorithm (MD5, SHA-1, SHA-256, or SHA-512) for
    provided hash strings or FILEHASH entities. This utility action helps analysts
    quickly classify unknown hash strings and enriches FILEHASH entities within the
    case with their detected algorithm type.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hashes | String | No | One or more hashes that are comma separated. If provided,
    the action will identify the hash type for these strings in addition to any FILEHASH
    entities in the scope. |


    ### Flow Description

    1. Retrieve the `Hashes` parameter and split it into a list if it exists.

    2. Use the `hashid` library to identify the algorithm for each provided hash string,
    filtering for supported types (MD5, SHA-1, SHA-256, SHA-512).

    3. Iterate through the `target_entities` and filter for those with the type `FILEHASH`.

    4. For each `FILEHASH` entity, identify its algorithm type using its identifier.

    5. Update the entity's `additional_properties` with the detected `HashType`.

    6. Commit the entity updates to the SecOps platform.

    7. Return a JSON result containing the mapping of all processed hashes to their
    detected types.


    ### Additional Notes

    - Supported hash types are MD5, SHA-1, SHA-256, and SHA-512.

    - If a hash type cannot be determined or is not in the supported list, it is marked
    as 'UNDETECTED'.
