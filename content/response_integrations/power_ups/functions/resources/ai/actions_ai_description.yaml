Convert Time Format:
  ai_description: "### General Description\nThe **Convert Time Format** action is\
    \ a utility function designed to transform datetime values from one format to\
    \ another. It allows for flexible parsing of input strings (including Unix timestamps),\
    \ applying time offsets (shifts), and converting the result to a specific timezone.\
    \ This is primarily used within playbooks to normalize time data received from\
    \ various security tools into a consistent format for downstream processing or\
    \ reporting.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| **Input** | string | Yes | The input datetime\
    \ value to be converted. Can be a formatted string or a Unix timestamp (10 or\
    \ 13 digits). If left empty, the current time is used. |\n| **From Format** |\
    \ string | Yes | The `strftime` format of the input string (e.g., `%Y-%m-%d %H:%M:%S`).\
    \ If the input is a numeric timestamp, this may be bypassed by the logic. |\n\
    | **To Format** | string | Yes | The desired output format using [Arrow tokens](https://arrow.readthedocs.io/en/stable/#supported-tokens)\
    \ (e.g., `YYYY/MM/DD HH:mm:ss`). |\n| **Time Delta In Seconds** | string | Yes\
    \ | A numeric value (positive or negative) representing the number of seconds\
    \ to shift the time. Default is \"0\". |\n| **Timezone** | string | No | The target\
    \ timezone for the output (e.g., `UTC`, `US/Eastern`). If omitted, the timezone\
    \ of the parsed input is maintained. |\n\n### Flow Description\n1.  **Parameter\
    \ Extraction:** The action retrieves the input string, source format, target format,\
    \ time delta, and target timezone from the environment.\n2.  **Special Suffix\
    \ Handling:** It checks if the `From Format` ends with \"UTC\" or \"GMT\" and\
    \ adjusts the time delta accordingly if those strings are present in the input.\n\
    3.  **Parsing:** \n    *   If the input is empty, it defaults to the current system\
    \ time.\n    *   If the input is a 10-digit (seconds) or 13-digit (milliseconds)\
    \ number, it parses it as a Unix timestamp.\n    *   Otherwise, it attempts to\
    \ parse the string using the provided `From Format` via the `Arrow` library.\n\
    4.  **Time Shifting:** The parsed time is shifted by the specified `Time Delta\
    \ In Seconds`.\n5.  **Timezone Conversion:** If a `Timezone` is provided, the\
    \ datetime object is converted to that specific zone.\n6.  **Formatting and Output:**\
    \ The final datetime object is formatted according to the `To Format` and returned\
    \ as the action result.\n\n### Additional Notes\n*   This action does not interact\
    \ with external APIs; it is a local processing utility.\n*   The action is robust\
    \ enough to attempt parsing even if the provided `From Format` is slightly mismatched,\
    \ provided the input looks like a standard timestamp."
  capabilities:
