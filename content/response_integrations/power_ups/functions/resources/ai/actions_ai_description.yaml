  ai_description: >-
    The 'Calculate Timestamp' action is a utility tool designed to compute new timestamps
    by applying time offsets (deltas) to a specified baseline time. It supports various
    input sources, including the current time, alert creation time, case creation
    time, or a custom timestamp provided by the user.


    ### Parameters

    | Parameter | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Input Type | DDL | No | Current Time | The baseline time source for the calculation.
    Options: Current Time, Alert Creation Time, Case Creation Time, Custom Timestamp.
    |

    | Custom Timestamp | String | No | "" | The specific date/time string to use if
    'Input Type' is set to 'Custom Timestamp'. |

    | Custom Timestamp Format | String | No | %Y-%m-%dT%H:%M:%S%z | The format of
    the 'Custom Timestamp'. Defaults to epoch if not provided. |

    | Timestamp Delta | String | No | +30M,-30M | A comma-separated list of time offsets
    (e.g., +30M, -1d). Supported units: m (months), d (days), H (hours), M (minutes),
    S (seconds). |

    | Output Timestamp Format | String | No | %Y-%m-%dT%H:%M:%S%z | The desired format
    for the resulting timestamps. Defaults to epoch if not provided. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts and validates all input parameters,
    ensuring that if 'Custom Timestamp' is selected, a valid timestamp and format
    are provided.

    2. **Baseline Determination**: Based on the 'Input Type', the action retrieves
    the starting timestamp from the current system time, the alert's creation time,
    the case's creation time, or the provided custom timestamp.

    3. **Delta Calculation**: The action iterates through the provided 'Timestamp
    Delta' strings, parsing the operator (+/-), value, and unit to shift the baseline
    timestamp accordingly.

    4. **Formatting and Output**: Each calculated timestamp is formatted according
    to the 'Output Timestamp Format' and added to the final JSON result, which is
    then returned to the SOAR platform.
