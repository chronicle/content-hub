  ai_description: >-
    ### General Description

    Creates a Base64-encoded thumbnail of an image. It processes either a direct Base64
    image string or extracts it from a provided JSON object using a specified key
    path, resizes the image to the requested dimensions using the Python Imaging Library
    (PIL), and returns the new Base64 string as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Base64 Image | String | No | The Base64 string of the original image. |

    | Thumbnail Size | String | Yes | The desired dimensions of the thumbnail in pixels,
    formatted as a comma-separated string (e.g., "250,250" for X, Y). |

    | Input JSON | String | No | A JSON string containing image data. If provided,
    the action will process this instead of the `Base64 Image` parameter. |

    | Image Key Path | String | No | The dot-separated key path to locate the Base64
    image string within the `Input JSON`. |


    ### Additional Notes

    Either `Base64 Image` or `Input JSON` (along with `Image Key Path`) must be provided
    for the action to successfully process an image.


    ### Flow Description

    1. Extracts the input parameters.

    2. Checks if `Input JSON` is provided. If so, parses the JSON and extracts the
    Base64 image string using the `Image Key Path`.

    3. If `Input JSON` is not provided, uses the `Base64 Image` parameter directly.

    4. Decodes the Base64 string, resizes the image using the specified `Thumbnail
    Size`, and re-encodes it to Base64.

    5. Outputs the resulting Base64 thumbnail string as a JSON result.
