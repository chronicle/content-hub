    a formatted string or the keyword "now" for the current time. |

    | Input DateTime 1 Format | string | Yes | The strftime format (e.g., %Y-%m-%dT%H:%M:%S%z)
    used to parse Input DateTime 1. |

    | Input DateTime 2 | string | Yes | The second input datetime value. Supports
    either a formatted string or the keyword "now" for the current time. |

    | Input DateTime 2 Format | string | Yes | The strftime format used to parse Input
    DateTime 2. |


    ### Additional Notes:

    - This action is a local utility and does not interact with external APIs or SecOps
    entities.

    - Timezone awareness is handled automatically; if a timestamp lacks timezone info,
    UTC is assumed.
