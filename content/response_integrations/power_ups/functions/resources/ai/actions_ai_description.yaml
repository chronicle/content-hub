    ### Additional Notes

    - This action performs local computation using standard Python libraries (`socket`,
    `struct`) and does not make external API calls.

    - It does not interact with SecOps entities directly; it processes the string
    provided in the input parameter.


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `IP Addresses` string from the
    parameters and splits it into a list, removing any leading or trailing whitespace.

    2. **Conversion**: For each IP address in the list, it uses `socket.inet_aton`
    to convert the string to network bytes and `struct.unpack` to transform those
    bytes into a 32-bit unsigned integer.

    3. **Result Aggregation**: The converted integers are stored in a JSON dictionary
    (mapping the original IP to the integer) and a comma-separated string.

    4. **Output**: The action returns the comma-separated string as the main result
    value and attaches the detailed mapping as a JSON result.
