XMLtoJson:
  ai_description: >-
    The XMLtoJson action is a utility function designed to convert XML-formatted strings
    into JSON objects. This is particularly useful in automation playbooks when interacting
    with legacy systems or APIs that return data in XML format, allowing subsequent
    actions to easily access and manipulate the data using JSON keys.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `xml` string provided by
    the user or a previous playbook step.

    2. **Parsing**: It utilizes the `xmltodict` library to parse the XML string into
    a Python dictionary.

    3. **Result Output**: The resulting dictionary is attached to the action's execution
    results as a JSON object, making it available for downstream playbook tasks.

    4. **Error Handling**: If the XML is malformed or parsing fails, the action catches
    the exception, marks the execution as failed, and provides the error message in
    the output.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | xml | string | Yes | The raw XML string that needs to be converted into JSON
