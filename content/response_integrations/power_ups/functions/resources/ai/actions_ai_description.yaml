  ai_description: >-
    Converts a datetime value from one format to another. This utility action allows
    for parsing input strings or timestamps, applying time offsets (shifts), and converting
    the result into a specific timezone and output format.


    ### Flow Description:

    1. **Parameter Retrieval:** The action extracts the input datetime string, the
    source format, the target format, the time delta (in seconds), and the target
    timezone from the configuration.

    2. **Parsing:** It attempts to parse the input. If the input is numeric, it treats
    it as a Unix timestamp (seconds or milliseconds). If it is a string, it uses the
    provided 'From Format' to interpret the date.

    3. **Time Shifting:** If a 'Time Delta In Seconds' is provided, the action shifts
    the datetime object forward or backward by that amount.

    4. **Timezone Conversion:** If a 'Timezone' is specified, the datetime is converted
    to that specific timezone.

    5. **Formatting:** Finally, the datetime is formatted according to the 'To Format'
    string and returned as the action result.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input | string | True | The input datetime value or timestamp that will be converted.
    If left empty, the current time is used. |

    | From Format | string | True | The datetime format the input string is in (e.g.,
    %Y-%m-%d %H:%M:%S). Supports strftime format. |

    | To Format | string | True | The desired time format of the output. Uses Arrow
    tokens (e.g., YYYY/MM/DD). |

    | Time Delta In Seconds | string | True | Shift parameter to change the output
    time to the future (positive) or past (negative), measured in seconds. |

    | Timezone | string | False | The target timezone for the output (e.g., UTC, US/Eastern).
    |


    ### Additional Notes:

    - If the 'From Format' ends with 'UTC' or 'GMT', the action performs specific
    logic to handle timezone offsets provided within the input string.

    - The action is a local utility and does not interact with external APIs.
