Calculate Timestamp:
  ai_description: >-
    ### General Description\nUse the 'Calculate Timestamp' action to find a new point
    in time by moving forward or backward from a starting time. This utility action
    is useful for playbook logic that requires time-based windows, such as searching
    for logs within a specific range relative to an alert's creation.\n\n### Parameters
    Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| Input Type | DDL | No | The starting point for the calculation. Options:
    Current Time, Alert Creation Time, Case Creation Time, Custom Timestamp. Default
    is Current Time. |\n| Custom Timestamp | String | No | The specific date and time
    value used as the starting point when 'Input Type' is set to 'Custom Timestamp'.
    |\n| Custom Timestamp Format | String | No | The format of the 'Custom Timestamp'.
    If not provided, the action attempts to parse as epoch time. |\n| Timestamp Delta
    | String | No | A comma-separated list of time offsets (e.g., +30M, -1H). Supported
    units: m (months), d (days), H (hours), M (minutes), S (seconds). |\n| Output
    Timestamp Format | String | No | The desired structure for the resulting calculated
    timestamp. Defaults to epoch time. |\n\n### Additional Notes\n- If 'Input Type'
    is set to 'Custom Timestamp', the 'Custom Timestamp' parameter must be provided.\n-
    The 'Timestamp Delta' parameter requires an operator (+ or -) and a unit.\n\n###
    Flow Description\n1. **Parameter Extraction**: The action retrieves the input
    type, custom timestamp details, and the desired time offsets.\n2. **Base Time
    Determination**: It identifies the starting timestamp based on the 'Input Type'
    (e.g., the current system time or the creation time of the alert/case).\n3. **Offset
    Calculation**: It parses the 'Timestamp Delta' string and applies each specified
    offset (addition or subtraction) to the base timestamp using the Arrow library.\n4.
    **Formatting**: The original and all calculated timestamps are formatted according
    to the 'Output Timestamp Format'.\n5. **Result Output**: The action returns a
    JSON object containing the original timestamp and a dictionary of the calculated
    results.
