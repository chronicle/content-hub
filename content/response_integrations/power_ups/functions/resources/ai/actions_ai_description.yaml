String Functions:
  ai_description: >-
    ### General Description

    This action provides a suite of Python-based string manipulation utilities for
    use within playbooks. It allows analysts to transform, format, and validate text
    data without writing custom code. Supported operations include case conversion,
    whitespace trimming, regex-based searching and replacement, base64 encoding/decoding,
    and string splitting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input | string | Yes | The source text string to be processed. |

    | Function | ddl | Yes | The specific operation to perform. Options include: `Lower`,
    `Upper`, `Count`, `Find`, `IsAlpha`, `IsDigit`, `Replace`, `Strip`, `Title`, `Regex
    Replace`, `JSON Serialize`, `Regex`, `Split`, `DecodeBase64`, `EncodeBase64`,
    `RemoveNewLines`. |

    | Param 1 | string | No | The primary argument for the selected function (e.g.,
    the search pattern for `Find`, the regex pattern for `Regex`, or the encoding
    type for `EncodeBase64`). |

    | Param 2 | string | No | The secondary argument for the selected function (e.g.,
    the replacement string for `Replace` or the join delimiter for `Regex`). |


    ### Additional Notes

    - **Placeholders:** For `Replace` and `Regex Replace` functions, the string `_SPACE_`
    can be used in `Param 1` or `Param 2` to represent a literal space character.

    - **Base64 Encoding:** `DecodeBase64` and `EncodeBase64` default to `UTF-8` if
    `Param 1` is not explicitly set to `UTF-8` or `ASCII`.

    - **Split Output:** When using the `Split` function, the resulting list is also
    provided as a JSON result (`JsonResult`) for easier downstream processing.


    ### Flow Description

    1. **Initialization:** The action retrieves the `Input` string and the selected
    `Function` from the parameters.

    2. **Argument Preparation:** It fetches optional `Param 1` and `Param 2` values
    required by specific functions.

    3. **Execution:** The action executes the corresponding Python logic based on
    the `Function` parameter:
        - **Basic Transforms:** Performs `lower()`, `upper()`, `strip()`, or `title()`
    on the input.
        - **Search/Count:** Uses `count()` or `find()` to locate substrings.
        - **Validation:** Checks string properties using `isalpha()` or `isdigit()`.
        - **Replacement:** Performs standard or regex-based replacements, handling
    the `_SPACE_` placeholder.
        - **Encoding/Serialization:** Handles Base64 operations or JSON serialization.
        - **Regex/Split:** Extracts matches using regex or splits the string into
    a list based on a delimiter.
    4. **Completion:** The transformed string is returned as the `ScriptResult`, and
    an informative message is generated for the action output.
