Extract IOCs:
  ai_description: >-
    Extracts Indicators of Compromise (IOCs) including domains, IPv4/IPv6 addresses,
    URLs, and email addresses from a provided input string. This utility action is
    designed to parse unstructured text to identify potential security indicators
    for further analysis or automation.


    ### General Description

    This action takes a raw string as input and applies various extraction techniques
    (regular expressions and specialized libraries) to identify common IOC types.
    It handles URL cleaning, domain derivation from URLs, and IP address validation.
    The results are returned as a structured JSON object containing lists for each
    IOC category.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input String | String | Yes | The raw text content from which the action will
    attempt to extract domains, IPs, URLs, and emails. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Input String` provided
    by the user.

    2. **URL Extraction**: Uses the `urlextract` library to find URLs within the text,
    filtering out invalid formats and standalone IP addresses.

    3. **Domain Extraction**: Processes the discovered URLs to extract the Effective
    Fully Qualified Domain Name (eFLD) using the `tld` library.

    4. **IP Extraction**: Uses regular expressions to find potential IPv4 and IPv6
    addresses, then validates them using the `ipaddress` module to ensure they are
    legitimate network addresses.

    5. **Email Extraction**: Applies a comprehensive regular expression to identify
    email addresses within the string.

    6. **Result Aggregation**: Consolidates all identified indicators into a JSON
    object and generates a human-readable summary message for the action output.


    ### Additional Notes

    - This action does not perform external lookups or reputation checks; it is strictly
    a parsing utility.

    - Internal/Private IP addresses are included in the extraction results by default.
