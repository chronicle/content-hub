Detect IP Type:
  ai_description: >-
    ### General Description

    The **Detect IP Type** action identifies whether a given IP address follows the
    IPv4 or IPv6 protocol. It uses regular expression matching to categorize addresses
    and enriches existing IP Address entities within the Google SecOps environment
    by adding an `IPType` field to their additional properties.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | No | A comma-separated list of IP addresses to be analyzed.
    If provided, these will be processed in addition to any entities in the case.
    |


    ### Flow Description

    1. **Input Retrieval**: The action retrieves the optional `IP Addresses` parameter.

    2. **Manual IP Processing**: If the parameter is provided, it splits the string
    and uses regex to classify each address as `IPV4`, `IPV6`, or `UNDETECTED`.

    3. **Entity Processing**: The action iterates through the `target_entities` in
    the current context, specifically looking for entities of type `ADDRESS`.

    4. **Classification**: For each identified entity, it applies the same regex logic
    to the entity's identifier.

    5. **Internal Enrichment**: It updates the `additional_properties` of the entities
    with the detected `IPType`.

    6. **Result Reporting**: The action compiles all results into a JSON object and
    updates the entities in the SecOps platform.


    ### Additional Notes

    - This action does not perform external lookups; all detection is done locally
    via regex.

    - If an address does not match either IPv4 or IPv6 patterns, it is labeled as
    `UNDETECTED`.
