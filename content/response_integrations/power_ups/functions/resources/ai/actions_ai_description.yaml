IP to Integer:
  ai_description: >-
    ### General Description

    This utility action converts one or more IPv4 addresses into their corresponding
    integer (long) format. It is primarily used for data normalization or when integrating
    with systems that require IP addresses in numerical format rather than dot-decimal
    notation.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | A comma-separated list of IPv4 addresses to be
    converted into integers. |


    ### Flow Description

    1. **Input Retrieval:** The action retrieves the comma-separated string of IP
    addresses from the `IP Addresses` parameter.

    2. **Parsing:** The string is split by commas and stripped of whitespace to create
    a list of individual IP strings.

    3. **Conversion:** For each IP address, the action uses the `socket` and `struct`
    libraries to convert the address into a 32-bit packed binary format and then unpacks
    it as a long integer.

    4. **Result Compilation:** The results are stored in a JSON object (mapping the
    original IP to the integer) and a comma-separated string of the resulting integers.

    5. **Output:** The action returns the JSON result and the string result to the
    Google SecOps platform.


    ### Additional Notes

