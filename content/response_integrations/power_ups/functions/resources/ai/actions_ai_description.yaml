  ai_description: >-
    The 'Calculate Timestamp' action is a utility designed to calculate new timestamps
    by applying time offsets (deltas) to a baseline starting time.


    ### General Description

    This action allows users to determine future or past timestamps based on a specified
    starting point, such as the current time, alert creation time, case creation time,
    or a custom provided timestamp. It processes a list of time deltas and outputs
    the calculated timestamps in a specified format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Input Type | Dropdown | No | The starting point to be used as the baseline time.
    Options include Current Time, Alert Creation Time, Case Creation Time, and Custom
    Timestamp. Defaults to Current Time. |

    | Custom Timestamp | String | No | The specific date and time value to use when
    Input Type is set to Custom Timestamp. Required if Input Type is Custom Timestamp.
    |

    | Custom Timestamp Format | String | No | The format of the Custom Timestamp.
    Defaults to epoch time if not provided. |

    | Timestamp Delta | String | No | A comma-separated list of time offsets (e.g.,
    +30M, -1d). Requires a supported unit (m, d, H, M, S) and an operator (+, -).
    Defaults to '+30M,-30M'. |

    | Output Timestamp Format | String | No | The desired structure for the resulting
    calculated timestamp. Defaults to epoch time. |


    ### Flow Description

    1. **Parameter Extraction and Validation**: The action extracts the input parameters
    and validates the custom timestamp and delta formats.

    2. **Baseline Determination**: It determines the original baseline timestamp based
    on the selected `Input Type`.

    3. **Delta Calculation**: For each provided time delta, the action calculates
    the shifted timestamp (forward or backward in time).

    4. **Formatting and Output**: The original and calculated timestamps are formatted
    according to the `Output Timestamp Format` and returned as a JSON result.
