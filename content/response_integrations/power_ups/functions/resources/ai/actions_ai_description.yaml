  ai_description: "### General Description\nThe **Create Thumbnail** action is a utility\
    \ function designed to generate a resized thumbnail of an image. It accepts image\
    \ data in Base64 format and outputs a new Base64-encoded PNG thumbnail based on\
    \ user-defined dimensions. This action is particularly useful for optimizing image\
    \ display within the SOAR interface or preparing images for external notifications\
    \ where smaller file sizes are required.\n\n### Parameters Description\n| Parameter\
    \ Name | Expected Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| **Base64 Image** | String | No | The raw Base64-encoded string of the image\
    \ to be resized. This is used if `Input JSON` is not provided. |\n| **Thumbnail\
    \ Size** | String | Yes | The desired dimensions for the thumbnail in pixels,\
    \ formatted as 'Width,Height' (e.g., '250,250'). |\n| **Input JSON** | String\
    \ | No | A JSON-formatted string (usually an array of objects) containing image\
    \ data to be processed in bulk. |\n| **Image Key Path** | String | No | If using\
    \ `Input JSON`, this specifies the dot-notation path (e.g., 'data.image_content')\
    \ to the field containing the Base64 image string. |\n\n### Additional Notes\n\
    - Either the **Base64 Image** parameter or the **Input JSON** parameter must be\
    \ provided for the action to have data to process.\n- The action uses the PIL\
    \ (Pillow) library to perform image manipulation.\n- The output is always returned\
    \ as a PNG-formatted Base64 string.\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ The action retrieves the input image data, the target dimensions, and any JSON\
    \ pathing configurations.\n2. **Data Parsing:** \n    - If **Input JSON** is provided,\
    \ the action parses the JSON and iterates through the entries, using the **Image\
    \ Key Path** to locate the Base64 strings.\n    - If **Input JSON** is absent,\
    \ it proceeds with the single string provided in **Base64 Image**.\n3. **Image\
    \ Processing:** For each identified image string, the action decodes the Base64\
    \ data, opens it as an image object, and resizes it to the specified **Thumbnail\
    \ Size**.\n4. **Encoding:** The resized image is saved into a memory buffer as\
    \ a PNG and then re-encoded into a Base64 string.\n5. **Result Delivery:** The\
    \ resulting thumbnail(s) are added to the action's JSON results for use in subsequent\
    \ playbook steps."
