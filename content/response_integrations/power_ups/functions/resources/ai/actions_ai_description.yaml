    ### General Description

    The Time Duration Calculator action calculates the time elapsed or the difference
    between two specified date-time values. It performs local mathematical operations
    on the provided timestamps and outputs the duration broken down into years, days,
    hours, minutes, and seconds. It does not interact with external APIs or modify
    internal case data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

