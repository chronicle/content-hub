Detect Hash Type:
  ai_description: >-
    ### General Description

    Detects the most likely hash type (SHA-256, MD5, SHA-1, or SHA-512) for provided
    hash strings and FILEHASH entities. It enriches the entities with the detected
    hash type in their additional properties and returns the results in JSON format.


    ### Flow Description

    1. Retrieves the comma-separated list of hashes from the `Hashes` parameter.

    2. Analyzes each provided hash string using the `hashid` library to determine
    its type.

    3. Iterates through the target entities, filtering for those with the type `FILEHASH`.

    4. Analyzes the identifier of each matching entity to determine its hash type.

    5. Updates the `additional_properties` of the matching entities with the detected
    `HashType`.

    6. Saves the updated entities back to the platform using `siemplify.update_entities`.

    7. Outputs the combined results as a JSON object.


    ### Additional Notes

    Supported hash types are SHA-256, MD5, SHA-1, and SHA-512. If a hash type cannot
    be determined or is not supported, it is marked as "UNDETECTED".
  ai_short_description: >-
    Detects the most likely hash type (SHA-256, MD5, SHA-1, or SHA-512) for provided
