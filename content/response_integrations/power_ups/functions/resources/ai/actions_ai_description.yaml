    The Extract IOCs action is designed to parse a given text string and extract various
    Indicators of Compromise (IOCs) such as domains, IP addresses (IPv4 and IPv6),
    URLs, and email addresses. It utilizes regular expressions and parsing libraries
    to accurately identify these elements within the text. The extracted IOCs are
    then returned as a structured JSON object, making them available for subsequent
    actions in a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Input String | string | True | The text string from which to extract the IOCs.
    |


    ### Flow Description

    1. Retrieves the `Input String` parameter provided by the user.

    2. Uses the `urlextract` library to find URLs within the string.

    3. Extracts domains from the identified URLs using the `tld` library.

    4. Uses regular expressions to find IPv4 and IPv6 addresses within the string.

    5. Uses regular expressions to find email addresses within the string.

    6. Compiles the extracted URLs, domains, IPs, and emails into a JSON object.

    7. Returns the JSON object as the action's result and outputs a summary message.
