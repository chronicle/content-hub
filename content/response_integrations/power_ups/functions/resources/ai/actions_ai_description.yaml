Calculate Timestamp:
  ai_description: >-
    ### General Description

    Calculates a new timestamp by applying a time offset (delta) to a baseline starting
    time. The baseline can be the current time, alert creation time, case creation
    time, or a custom timestamp provided by the user. This is a utility action used
    to manipulate and format time data within a playbook.


    ### Flow Description

    1. Extracts the baseline time based on the `Input Type` parameter (Current Time,
    Alert Creation Time, Case Creation Time, or Custom Timestamp).

    2. Parses the baseline time, utilizing the `Custom Timestamp` and `Custom Timestamp
    Format` parameters if a custom time was selected.

    3. Iterates through the provided `Timestamp Delta` values (e.g., +30M, -1d).

    4. Calculates the shifted timestamps by applying the specified offsets to the
    baseline time.

    5. Formats the resulting timestamps according to the `Output Timestamp Format`
    (defaulting to epoch time).

    6. Returns the original and calculated timestamps as a JSON result.


    ### Additional Notes

    This is a local utility action that does not interact with external APIs, modify
    case entities, or create insights. It relies on the `arrow` Python library for
    time manipulation.
  ai_short_description: >-
    Calculates a new timestamp by applying a specified time offset (delta) to a baseline
    starting time, such as the current time, alert creation time, or a custom timestamp.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
