String Functions:
  ai_description: >-
    ### General Description

    Performs various basic Pythonic string manipulation functions on a provided input
    string. This utility action allows users to format, search, encode, decode, and
    modify strings directly within the playbook without requiring external services.


    ### Flow Description

    1. Retrieves the mandatory `Input` string and the selected `Function` to execute.

    2. Retrieves optional parameters (`Param 1` and `Param 2`) if required by the
    selected function (e.g., for Replace or Regex operations).

    3. Executes the chosen string operation locally (e.g., Lower, Upper, Replace,
    Regex, Base64 Encode/Decode, Split).

    4. Returns the manipulated string as the action's result. For specific functions
    like 'Split', it also attaches a JSON result containing the split array.

    *Note: No external API calls are made during the execution of this action.*


    ### Additional Notes

    - The action supports a special placeholder `_SPACE_` in `Param 1` and `Param
    2` for replacement functions, which is automatically converted to a standard space
    before the operation is performed.

    - Base64 encoding and decoding default to UTF-8 if an invalid encoding type is
    provided.
