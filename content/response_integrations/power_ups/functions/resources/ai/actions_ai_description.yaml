  ai_description: >-
    Defangs the provided input text by sanitizing URLs, IP addresses, and email addresses
    to prevent accidental interaction. This utility action is useful for preparing
    data for display or logging where active links or resolvable addresses are undesirable.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the `Input` string from the action parameters.

    2. **Empty Check:** If the input is empty, the action terminates early with an
    empty result.

    3. **URL Defanging:** Uses regular expressions to find HTTP/HTTPS URLs, changing
    the protocol to 'hxxp' and escaping dots in the domain (e.g., `http://example.com`
    becomes `hxxp://example[.]com`).

    4. **IP Defanging:** Identifies IPv4 patterns and replaces dots with bracketed
    dots (e.g., `1.1.1.1` becomes `1[.]1[.]1[.]1`).

    5. **Email Defanging:** Locates email addresses, replacing the '@' symbol with
    `[at]` and escaping dots in the domain portion (e.g., `user@example.com` becomes
    `user[at]example[.]com`).

    6. **Result Output:** Returns the modified text in the `converted_text` JSON field.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Input | The raw text string that requires defanging. | String | No |


    ### Additional Notes

    - This action does not interact with external APIs or modify Google SecOps entities.

    - It is a pure text transformation utility designed for data sanitization.
