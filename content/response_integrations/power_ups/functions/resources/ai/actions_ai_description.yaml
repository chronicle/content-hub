    1. **Parameter Extraction**: The action retrieves the input HTML and the configuration
    for allowed tags, attributes, and styles from the action parameters.

    2. **Sanitizer Configuration**: It initializes a CSS sanitizer if specific styles
    are provided and determines the attribute filtering logic based on the `Allow
    All Attributes` flag.

    3. **Sanitization Process**: The action calls the `bleach.clean` method, passing
    the input HTML and the configured allow-lists to perform the transformation.

    4. **Result Output**: The sanitized HTML string is returned as the action's result
    value, and a success message is logged.
