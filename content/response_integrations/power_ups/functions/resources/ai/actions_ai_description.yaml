    string. |


    ### Flow Description

    1. Extracts the two input datetime strings and their respective format parameters.

    2. Parses the inputs into timezone-aware datetime objects. If "now" is provided,
    it uses the current UTC time. If a parsed time is not localized, it corrects it
    to UTC.

    3. Calculates the total duration between the two datetime objects.

    4. Breaks down the duration into specific time units (years, days, hours, minutes,
    seconds).

    5. Returns the calculated duration values as a JSON result and outputs the total
    seconds as the primary script result.
