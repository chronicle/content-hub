  ai_description: >-
    Identifies whether an IP address is in IPv4 or IPv6 format. This action processes
    a list of IP addresses provided as a parameter and also automatically evaluates
    all 'ADDRESS' entities present in the current case. For entities, it enriches
    their profile by adding an 'IPType' field to their additional properties, which
    can be used for downstream logic or filtering in playbooks.


    ### Flow Description:

    1. **Input Parsing**: Retrieves the optional 'IP Addresses' parameter and splits
    it into individual strings if provided.

    2. **Manual Evaluation**: Iterates through the provided IP strings and uses regular
    expressions to determine if they are IPv4, IPv6, or undetected.

    3. **Entity Processing**: Iterates through all entities in the case, filtering
    specifically for those of type 'ADDRESS'.

    4. **Internal Enrichment**: For each identified 'ADDRESS' entity, the action determines
    its IP type and updates the entity's 'additional_properties' with the result.

    5. **Result Aggregation**: Consolidates all findings into a JSON result and updates
    the entities within the Google SecOps platform.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | No | A comma-separated list of IP addresses to be evaluated.
    If left empty, the action will only process existing case entities. |


    ### Additional Notes:

    - This action is a local utility and does not perform any external API calls or
    reputation checks.

    - The 'IPType' field added to entities will contain one of the following values:
    'IPV4', 'IPV6', or 'UNDETECTED'.
