    This utility action is primarily used for data transformation within playbooks,
    allowing analysts to normalize IP data for comparison, database lookups, or mathematical
    operations.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | IP Addresses | A comma-separated list of IPv4 addresses to be converted into
    integers. | String | Yes | Expects standard dot-decimal notation (e.g., '192.168.1.1').
