Convert Time Format:
  ai_description: >-
    ### General Description

    Converts a provided datetime string or timestamp from a specified input format
    into a desired output format using the Arrow library. It also supports shifting
    the time by a specific number of seconds and converting it to a different timezone.


    ### Flow Description

    1. Retrieves the input datetime string, the original format, and the desired output
    format from the action parameters.

    2. Parses the input string based on the provided original format, or automatically
    detects and parses epoch timestamps (10 or 13 digits).

    3. Applies an optional time delta (in seconds) to shift the time into the future
    (positive value) or past (negative value).

    4. Converts the parsed time to a specified timezone, if provided.

    5. Formats the resulting datetime object into the desired output format and returns
    it as the action's result.


    ### Additional Notes

    This is a local utility action and does not interact with any external APIs. It
    relies on the Arrow Python library for datetime manipulation. Ensure the 'To Format'
    parameter uses supported Arrow time format tokens.
