    Sanitizes an HTML fragment by parsing it according to the HTML5 parsing algorithm
    and removing or escaping disallowed tags, attributes, and CSS styles. This action
    uses the `bleach` library to ensure that the output is safe and well-formed, handling
    issues like unclosed or misnested tags. It is primarily used as a utility to clean
    up data before it is displayed in the UI or passed to other systems.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input HTML | string | Yes | The raw HTML fragment that needs to be sanitized.
    |

    | Tags | string | No | A comma-separated list of allowed HTML tags. Tags not in
    this list will be escaped or stripped. Default includes common formatting tags
    like `a`, `b`, `p`, `div`, etc. |

    | Attributes | string | No | A comma-separated list of allowed attributes (e.g.,
    `href`, `src`). |

    | Styles | string | No | A comma-separated list of allowed CSS properties if the
    `style` attribute is permitted (e.g., `color`, `text-align`). |

    | Allow All Attributes | boolean | No | If set to `True`, all attributes will
    be allowed for the permitted tags. Default is `False`. |


    ### Additional Notes

    - This action is a utility function and does not interact with external APIs or
    SecOps entities.

    - If no specific tags, attributes, or styles are provided, the action uses the
    default safe set defined by the underlying library logic.


