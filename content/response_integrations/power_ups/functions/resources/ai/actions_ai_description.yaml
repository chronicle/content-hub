Detect Hash Type:
  ai_description: >-
    ### General Description

    The **Detect Hash Type** action identifies the most likely cryptographic hash
    algorithm for a given set of strings or `FILEHASH` entities. It supports detection
    for **MD5**, **SHA-1**, **SHA-256**, and **SHA-512**. This utility is primarily
    used to normalize data or determine which subsequent enrichment actions are appropriate
    based on the hash format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Hashes** | String | No | A comma-separated list of hash strings to identify.
    If provided, these strings will be processed and included in the output alongside
    any entities in the scope. |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `Hashes` parameter and splits it
    into a list of individual strings.

    2. **Manual Hash Identification**: For each string provided in the parameter,
    the action uses the `hashid` library to determine the most likely algorithm (MD5,
    SHA-1, SHA-256, or SHA-512).

    3. **Entity Processing**: The action iterates through all `FILEHASH` entities
    associated with the current context.

    4. **Entity Identification**: For each `FILEHASH` entity, the action identifies
    the hash type based on the entity's identifier.

    5. **Internal Enrichment**: The detected hash type is added to the entity's `additional_properties`
    attribute.

    6. **Result Compilation**: The action updates the entities within Google SecOps
    and returns a JSON object containing the mapping of all processed hashes to their
    detected types.


    ### Additional Notes

    - If a hash type cannot be determined or does not match the supported types, it
    is labeled as `UNDETECTED`.

    - This action performs local identification using a library and does not make
    external API calls.
