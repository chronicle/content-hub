Detect IP Type:
  ai_description: >-
    ### General Description

    Detects whether provided IP addresses are IPv4 or IPv6. It processes both manually
    provided IP addresses via parameters and target entities of type ADDRESS. The
    action enriches the entities by adding the detected IP type to their additional
    properties and returns a JSON result containing the classifications.


    ### Flow Description

    1. Retrieves the comma-separated list of IP addresses from the action parameters.

    2. Evaluates each provided IP address against IPv4 and IPv6 regular expressions
    to determine its type.

    3. Iterates through the target entities, filtering for those with the type `ADDRESS`.

    4. Evaluates the identifier of each matching entity against the regular expressions.

    5. Updates the `additional_properties` of the matching entities with the detected
    `IPType` (IPV4, IPV6, or UNDETECTED).

    6. Saves the updated entities back to the platform and outputs a JSON result with
    the classifications.


    ### Additional Notes

    This action operates entirely locally using regular expressions and does not make
    any external API calls.
