Defang Text:
  ai_description: >-
    ### General Description

    Defangs input text by modifying URLs, IP addresses, and email addresses to prevent
    accidental execution or clicking.


    ### Flow Description

    1. Extracts the provided input text from the action parameters.

    2. Uses regular expressions to replace 'http' with 'hxxp' and dots with '[.]'
    in URLs.

    3. Replaces dots with '[.]' in IPv4 addresses.

    4. Replaces '@' with '[at]' and dots with '[.]' in email addresses.

    5. Returns the defanged text as a JSON result.


    ### Additional Notes

    This action operates purely locally on the provided string and does not interact
    with any external services or APIs.
