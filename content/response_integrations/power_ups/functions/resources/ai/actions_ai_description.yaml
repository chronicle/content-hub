  ai_description: >-
    ### General Description

    Converts XML formatted data into a JSON object. This utility action is designed
    to transform data structures within a playbook, allowing subsequent actions to
    easily access and manipulate data originally provided in XML format.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | xml | The XML formatted string that needs to be converted to JSON. | String
    | Yes | Expects a valid XML structure. |


    ### Flow Description

    1. **Extract Input:** The action retrieves the XML string from the `xml` input
    parameter.

    2. **Parsing:** It utilizes the `xmltodict` library to parse the XML string into
    a Python dictionary.

    3. **Output Generation:** The resulting dictionary is added to the action's JSON
    results, making it available as a JSON object for the rest of the playbook execution.

    4. **Error Handling:** If the XML is malformed or parsing fails, the action catches
    the exception and returns a failed status.


    ### Additional Notes

    This is a pure data transformation utility and does not interact with any external
    APIs or modify any entities within Google SecOps.
