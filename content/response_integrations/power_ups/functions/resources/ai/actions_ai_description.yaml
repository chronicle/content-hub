Create Thumbnail:
  ai_description: >-
    ### General Description

    The **Create Thumbnail** action is a utility function designed to generate a resized,
    Base64-encoded thumbnail from an existing Base64 image string. This action is
    used to optimize image data for display within the SOAR interface or to reduce
    the size of image payloads before passing them to other systems or playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base64 Image** | String | No | The raw Base64 string of the image to be resized.
    This is used if `Input JSON` is not provided. |

    | **Thumbnail Size** | String | Yes | Comma-separated pixel dimensions (e.g.,
    "250,250") for the output thumbnail. |

    | **Input JSON** | String | No | A JSON-formatted string containing image data.
    If provided, the action can process multiple images defined within the JSON structure.
    |

    | **Image Key Path** | String | No | The dot-separated path (e.g., `data.image_base64`)
    used to locate the image field within the `Input JSON`. |


    ### Additional Notes

    - To execute successfully, the action requires either a direct image string via
    the **Base64 Image** parameter or a valid **Input JSON** accompanied by an **Image
    Key Path**.

    - The action performs all processing locally using the PIL (Pillow) library and
    does not communicate with external APIs.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input image data (either
    as a direct string or within a JSON object), the target dimensions, and the key
    path configuration.

    2. **Data Parsing**: If **Input JSON** is provided, the action parses the JSON
    and uses the **Image Key Path** to extract the Base64 image string(s) from the
    provided data structure.

    3. **Image Processing**: The action decodes the Base64 string into raw bytes and
    utilizes the PIL library to open and resize the image to the specified **Thumbnail
    Size**.

    4. **Encoding**: The resized image is saved in PNG format and re-encoded into
    a Base64 string.

    5. **Output Generation**: The resulting Base64 thumbnail is returned as a JSON
    result, which can be used in subsequent playbook steps.
