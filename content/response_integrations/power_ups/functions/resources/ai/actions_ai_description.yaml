  ai_description: >-
    ### General Description

    The **Extract IOCs** action is a utility designed to parse a provided text string
    and identify various Indicators of Compromise (IOCs). It uses regular expressions
    and specialized libraries to detect and extract domains, IPv4/IPv6 addresses,
    URLs, and email addresses. This is particularly useful for processing unstructured
    data like email bodies, log snippets, or threat reports to identify actionable
    indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input String | String | Yes | The raw text string from which the action will
    attempt to extract IOCs. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Input String` provided
    by the user.

    2. **URL Extraction**: Uses the `URLExtract` library to find valid URLs within
    the text, performing basic cleaning and validation (e.g., ignoring URLs that are
    actually IP addresses).

    3. **Domain Extraction**: For every URL found, the action uses the `tld` library
    to extract the Effective Top-Level Domain (e.g., extracting `google.com` from
    `https://sub.google.com/path`).

    4. **IP Extraction**: Uses regular expressions to find IPv4 and IPv6 patterns,
    then validates them using the `ipaddress` library. It filters out invalid formats.

    5. **Email Extraction**: Uses a comprehensive regular expression to identify email
    addresses.

    6. **Result Compilation**: Aggregates all found indicators into a structured JSON
    object and provides a summary message for the action output.


    ### Additional Notes

    - This action does not interact with external threat intelligence services; it
    performs local parsing of the input string.

    - It does not automatically create entities in the Google SecOps platform; it
    returns the data for use in subsequent playbook steps.
