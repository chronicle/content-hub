Run JSONPath Query:
  ai_description: >-
    ### General Description

    The **Run JSONPath Query** action allows users to execute JSONPath expressions
    against a provided JSON string to extract specific values or subsets of data.
    This is a utility action used for data parsing and transformation within playbooks,
    enabling analysts to isolate relevant information from complex JSON payloads returned
    by other integrations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Json | code | Yes | The raw JSON string that the query will be executed against.
    |

    | JSONPath Expression | string | Yes | The JSONPath syntax used to navigate and
    filter the JSON structure (e.g., `$.store.book[*].author`). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the input JSON string and the
    JSONPath expression from the user-defined parameters.

    2. **JSON Parsing:** The input string is converted into a structured JSON object.

    3. **Expression Parsing:** The JSONPath expression is parsed using the `jsonpath-ng`
    library.

    4. **Query Execution:** The parsed expression is applied to the JSON object to
    find all matching elements.

    5. **Result Compilation:** All matching values are collected into a list and returned
    as a JSON result under the `matches` key.


    ### Additional Notes

    This action is a local utility and does not interact with any external APIs or
    modify any Google SecOps entities or case data.
