Time Duration Calculator:
  ai_description: >-
    ### General Description

    Calculates the elapsed time or difference between two date-time values. This utility
    action is useful for determining the duration of an event, the age of an alert,
    or the time between two specific log entries within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input DateTime 1 | String | Yes | The first input datetime value. Supports strftime
    format or "now" for the current time. |

    | Input DateTime 1 Format | String | Yes | The strftime format (e.g., `%Y-%m-%dT%H:%M:%S%z`)
    used to parse Input DateTime 1. |

    | Input DateTime 2 | String | Yes | The second input datetime value. Supports
    strftime format or "now" for the current time. |

    | Input DateTime 2 Format | String | Yes | The strftime format used to parse Input
    DateTime 2. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the two date-time strings and their respective
    formats from the action parameters.

    2. **Date Parsing**: Converts the input strings into timezone-aware Python datetime
    objects. If "now" is provided, the current UTC time is used. If a string is provided
    without timezone info, it is localized to UTC.

    3. **Duration Calculation**: Calculates the difference between the two datetime
    objects.

    4. **Formatting**: Breaks down the total duration into years, days, hours, minutes,
    and seconds.

    5. **Output Generation**: Returns a JSON object containing the breakdown and a
    human-readable summary string. The action's main result value is set to the total
    number of seconds.


    ### Additional Notes

    - This action does not interact with external APIs or SecOps entities.

    - Ensure the format strings match the input date-time strings exactly to avoid
    parsing errors.
