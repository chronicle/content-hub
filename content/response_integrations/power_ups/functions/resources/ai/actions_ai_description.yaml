  ai_description: >-
    ### General Description

    Detects the most likely hash type (e.g., SHA-256, MD5, SHA-1, SHA-512) for provided
    hashes or `FILEHASH` entities using local computation. The action evaluates the
    format of the hash and updates the entity's properties with the identified type.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Hashes | String | No | One or more comma-separated hashes to identify. If provided,
    the action will evaluate these hashes in addition to any target entities. |


    ### Flow Description

    1. Reads the `Hashes` parameter and splits it into a list of individual hashes.

    2. Iterates over the provided hashes, identifies their type using a local library,
    and appends the result to a list.

    3. Iterates over the target entities, specifically filtering for `FILEHASH` entities.

    4. Identifies the hash type for each `FILEHASH` entity's identifier.

    5. Updates the entity's `additional_properties` with the detected hash type and
    prepares it for an update.

    6. Updates the modified entities within Google SecOps.

    7. Returns a JSON result containing the evaluated hashes and their detected types.


    ### Additional Notes

    Either the `Hashes` parameter must be provided, or the action must be run on `FILEHASH`
    entities for the action to produce meaningful results.
