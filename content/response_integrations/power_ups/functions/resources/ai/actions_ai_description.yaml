  ai_description: "The **Defang Text** action is a utility function designed to sanitize\
    \ potentially malicious text strings. It takes an input string and applies regex-based\
    \ transformations to 'defang' indicators, making them safe for inclusion in reports\
    \ or communications. \n\n### Flow Description\n1. **Extraction**: The action extracts\
    \ the **Input** parameter from the action configuration.\n2. **Validation**: It\
    \ validates that the input is not empty. If empty, it returns an empty string.\n\
    3. **Transformation**: It applies regex transformations to:\n    * Replace `http`/`https`\
    \ with `hxxp`/`hxxps`.\n    * Replace dots in domains and IPv4 addresses with\
    \ `[.]`.\n    * Replace `@` in email addresses with `[at]`.\n4. **Output**: The\
    \ resulting defanged text is returned in the **converted_text** JSON output.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Input | string | false | The raw text string to be defanged.\
    \ If not provided, the action returns an empty string. |\n\n### Additional Notes\n\
    This action is a local utility and does not interact with any external systems\
    \ or internal SOAR entities."
