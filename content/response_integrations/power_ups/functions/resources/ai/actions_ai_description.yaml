SanitizeHTML:
  ai_description: >-
    ### General Description

    Sanitizes a provided HTML fragment by parsing it according to the HTML5 parsing
    algorithm and stripping or escaping disallowed tags, attributes, and styles. This
    action is useful for safely rendering or processing HTML content extracted from
    emails, alerts, or external sources.


    ### Flow Description

    1. Extracts the input HTML fragment and configuration parameters, including allowed
    tags, attributes, and styles.

    2. Evaluates the provided parameters to determine the strictness of the sanitization
    (e.g., allowing all attributes or restricting to specific ones).

    3. Uses the `bleach` Python library to clean the HTML fragment based on the configured
    rules, handling unclosed or misnested tags.

    4. Returns the sanitized HTML string as the action result.


    ### Additional Notes

    This action operates entirely locally within the script environment and does not
    make any external API calls, modify case entities, or interact with external systems.
