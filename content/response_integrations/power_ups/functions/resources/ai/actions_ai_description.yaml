Defang Text:
  ai_description: >-
    ### General Description

    The **Defang Text** action is a utility designed to sanitize potentially malicious
    or active indicators within a text string. It 'defangs' URLs, IP addresses, and
    email addresses by modifying their syntax (e.g., changing `http` to `hxxp` or
    `.` to `[.]`), making them non-clickable and preventing accidental execution or
    navigation by analysts.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Input | The raw text string that needs to be defanged. | String | No | If left
    empty, the action returns an empty result. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Input` string provided
    by the user.

    2. **Empty Check:** If the input is null or empty, the action terminates and returns
    an empty result.

    3. **URL Defanging:** Identifies `http` or `https` links and replaces the protocol
    with `hxxp/hxxps` and escapes dots in the domain name using `[.]`.

    4. **IP Defanging:** Identifies IPv4 addresses and replaces all dots with `[.]`.

    5. **Email Defanging:** Identifies email addresses, replaces the `@` symbol with
    `[at]`, and escapes dots in the domain portion.

    6. **Result Output:** The final defanged string is returned in the `JsonResult`
    under the key `converted_text`.
