  ai_description: >-
    The **Defang Text** action is a utility function designed to sanitize potentially
    malicious text strings. It takes an input string and applies regex-based transformations
    to 'defang' indicators, making them safe for inclusion in reports or communications.
    **Flow:** 1. Extract the **Input** parameter from the action configuration. 2.
    Validate that the input is not empty. 3. Apply regex transformations to replace
    http/https with hxxp/hxxps and dots in domains with [.]. 4. Apply regex transformations
    to replace dots in IPv4 addresses with [.]. 5. Apply regex transformations to
    replace @ in email addresses with [at] and dots in domains with [.]. 6. Return
    the resulting defanged text in the **converted_text** JSON output. **Parameters:**
    **Input** (string, optional): The raw text string to be defanged. **Additional
    Notes:** If the **Input** parameter is not provided, the action returns an empty
    string.
