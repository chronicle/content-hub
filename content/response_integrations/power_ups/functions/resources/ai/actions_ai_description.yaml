  ai_description: >-
    The 'Calculate Timestamp' action is a utility function designed to compute one
    or more new timestamps by applying specific time offsets (deltas) to a designated
    starting point. This is particularly useful for playbooks that need to define
    time windows for searches, set expiration dates, or calculate relative timeframes
    based on alert or case events.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input Type | DDL | No | Defines the baseline time. Options: 'Current Time' (default),
    'Alert Creation Time', 'Case Creation Time', or 'Custom Timestamp'. |

    | Custom Timestamp | String | No | The specific date/time string to use if 'Input
    Type' is set to 'Custom Timestamp'. |

    | Custom Timestamp Format | String | No | The format used to parse the 'Custom
    Timestamp'. Defaults to '%Y-%m-%dT%H:%M:%S%z'. If empty, the action attempts to
    parse as epoch. |

    | Timestamp Delta | String | No | A comma-separated list of offsets (e.g., '+30M',
    '-1d'). Supports months (m), days (d), hours (H), minutes (M), and seconds (S).
    Default is '+30M,-30M'. |

    | Output Timestamp Format | String | No | The desired format for the calculated
    results. Defaults to '%Y-%m-%dT%H:%M:%S%z'. Use 'epoch' for Unix timestamps. |


    ### Additional Notes

    - If 'Input Type' is set to 'Custom Timestamp', the 'Custom Timestamp' parameter
    becomes effectively mandatory for the action to succeed.

    - The action uses the `arrow` library for robust date manipulation and parsing.

    - Multiple deltas can be processed in a single execution, returning a map of results.


    ### Flow Description

    1. **Initialization**: The action extracts and validates the input parameters,
    ensuring formats and deltas match expected patterns (e.g., regex validation for
    deltas).

    2. **Baseline Determination**: It identifies the starting timestamp based on the
    'Input Type'. It retrieves the creation time from the alert or case context if
    requested.

    3. **Offset Calculation**: For each delta provided in the 'Timestamp Delta' list,
    the action applies the mathematical shift (addition or subtraction) to the baseline
    timestamp.

    4. **Formatting**: The original and all calculated timestamps are converted into
    the format specified in 'Output Timestamp Format'.

    5. **Result Delivery**: The final results are returned as a JSON object containing
    the 'original_timestamp' and a dictionary of 'calculated_timestamps'.
