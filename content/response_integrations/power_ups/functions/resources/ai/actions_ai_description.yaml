  ai_description: >-
    ### General Description

    This action converts a datetime string from one format to another. It supports
    time shifting and timezone conversion, providing a flexible utility for normalizing
    time data within SOAR workflows. It is a pure utility function that does not interact
    with external systems or modify internal SOAR data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Input | string | Yes | The input datetime value that will be converted. |

    | From Format | string | Yes | The datetime format the input string is in. |

    | To Format | string | Yes | The desired time format of the output. |

    | Time Delta In Seconds | string | No | Shift parameter that allows to change
    the output actual time to either the future (positive) or past (negative). |

    | Timezone | string | No | Output timezone. |


    ### Additional Notes

    The action uses the `arrow` library for time manipulation. The `Time Delta In
    Seconds` parameter defaults to 0 if not provided. The `Timezone` parameter is
    optional.


    ### Flow Description

    1. Retrieve parameters (`Input`, `From Format`, `To Format`, `Time Delta`, `Timezone`).

    2. Parse the input string (handles timestamps or formatted strings).

    3. Apply time shift (if provided).

    4. Convert to target timezone (if provided).

    5. Format the output string.

    6. Return the result.
