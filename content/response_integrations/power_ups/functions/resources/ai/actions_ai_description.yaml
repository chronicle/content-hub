Time Duration Calculator:
  ai_description: >-
    ### General Description

    The Time Duration Calculator action calculates the elapsed time or difference
    between two specified datetime values. It processes the inputs and returns the
    duration broken down into years, days, hours, minutes, and seconds.


    ### Flow Description

    1. Extracts the two input datetime strings and their respective strftime formats
    from the action parameters.

    2. Parses the inputs into datetime objects. If an input is set to "now", it uses
    the current UTC time.

    3. Checks if the parsed datetime objects are timezone-aware; if not, it localizes
    them to UTC.

    4. Calculates the total duration between the two datetime objects.

    5. Formats the duration into years, days, hours, minutes, and seconds, and outputs
    this data as a JSON result.


    ### Additional Notes

    This action performs local calculations and does not interact with any external
    APIs or services. It does not operate on case entities.
