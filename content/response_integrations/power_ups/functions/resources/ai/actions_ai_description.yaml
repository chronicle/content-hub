    This utility action is designed to help analysts determine the elapsed time between
    events, such as the time between an alert creation and a specific log entry, or
    the age of an account. It supports custom date formats using strftime syntax and
    can dynamically use the current system time.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves two date-time strings and their
    corresponding format strings from the input parameters.

    2. **Date Parsing:** It converts the input strings into Python datetime objects.
    If an input is set to "now", it uses the current UTC time. If a date is not timezone-aware,
    it automatically localizes it to UTC.

    3. **Duration Calculation:** The action calculates the difference between the
    two dates.

    4. **Unit Conversion:** It breaks down the total difference into years, days,
    hours, minutes, and seconds.

    5. **Output Generation:** The action returns a JSON object containing the breakdown
    of the duration and sets the total seconds as the primary result value for use
    in playbooks.


