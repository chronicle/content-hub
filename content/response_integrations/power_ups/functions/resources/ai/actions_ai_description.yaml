  ai_description: >-
    ### General Description

    The **Math Arithmetic** action is a utility function designed to perform basic
    mathematical operations on two provided numerical arguments. It supports addition,
    subtraction, multiplication, division, and modulo operations. This action is typically
    used within playbooks to perform calculations on data extracted from previous
    steps or entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | **Function** | DDL | Yes | Plus | The mathematical operation to perform. Options:
    `Plus`, `Sub`, `Multi`, `Div`, `Mod`. |

    | **Arg 1** | String | Yes | {} | The first numerical argument for the operation.
    |

    | **Arg 2** | String | Yes | {} | The second numerical argument for the operation.
    |


    ### Additional Notes

    - The action attempts to parse the input strings (`Arg 1` and `Arg 2`) into integers
    first, and then into floats if integer parsing fails.

    - If the `Div` (Division) function is used and `Arg 2` is zero, the action will
    fail with a standard Python `ZeroDivisionError`.


    ### Flow Description

    1. **Parameter Retrieval**: The action retrieves the selected mathematical function
    and the two input arguments from the integration parameters.

    2. **Data Parsing**: The input strings are converted into numerical types (int
    or float).

    3. **Calculation**: Based on the selected `Function`, the action performs the
    corresponding arithmetic operation:
        - `Plus`: Adds Arg 1 and Arg 2.
        - `Sub`: Subtracts Arg 2 from Arg 1.
        - `Multi`: Multiplies Arg 1 by Arg 2.
        - `Div`: Divides Arg 1 by Arg 2.
        - `Mod`: Calculates the remainder of Arg 1 divided by Arg 2.
    4. **Output**: The action returns the calculated result as the `ScriptResult`
    and provides a human-readable message summarizing the operation.
