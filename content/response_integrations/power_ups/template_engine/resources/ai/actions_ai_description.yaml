  ai_description: >-
    ### General Description

    Renders a Jinja2 template using a provided JSON input object. This utility action
    allows users to dynamically generate formatted text or HTML outputs based on input
    data, and can optionally include Google SecOps case data (events and entities)
    within the rendering context. It utilizes a custom Jinja environment equipped
    with various formatting filters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | JSON Object | JSON Object | No | The raw JSON object that will be used to render
    the template. This value is available as the variable `input_json` in the Jinja
    template. Default is `{}`. |

    | Jinja | String | No | The Jinja template code to be rendered. If provided, this
    will override the `Template` parameter. Append `|safe` to disable HTML encoding.
    |

    | Template | String | No | The Jinja2 template to be rendered. Can be an HTML
    template from Settings->Environment or added in the content box. |

    | Include Case Data | Boolean | No | When enabled, entity attributes and event
    data are injected into the context and available under the variables `input_json['SiemplifyEvents']`
    and `input_json['SiemplifyEntities']`. Default is `false`. |


    ### Flow Description

    1. Extracts the action parameters and parses the provided `JSON Object`.

    2. If `Include Case Data` is enabled, iterates through the alert's security events
    and target entities to build context dictionaries.

    3. Initializes a Jinja2 environment and loads custom filters (e.g., `json2tbl`,
    `regex_match`, `filter_datetime`).

    4. Selects the template to use, prioritizing the `Jinja` parameter over the `Template`
    parameter.

    5. Renders the template using the parsed JSON and optional case data.

    6. Outputs the rendered string as a JSON result under the key `html_output`.
