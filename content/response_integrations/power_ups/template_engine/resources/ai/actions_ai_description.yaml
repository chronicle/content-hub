Render Template from Array:
  ai_description: >-
    Renders a Jinja2 template for each item in a provided JSON array. This utility
    action is designed to transform lists of data into formatted strings, such as
    HTML tables, comma-separated lists, or custom text blocks, which can then be used
    in emails, reports, or other playbook actions.


    ### Flow Description

    1. **Input Parsing**: The action parses the 'Array input' parameter as a JSON
    object. If the input is a single dictionary instead of a list, it is automatically
    wrapped into a single-element list.

    2. **Environment Setup**: Initializes a Jinja2 environment, loading standard extensions
    and a comprehensive set of custom filters (e.g., `json2tbl`, `regex_match`, `filter_datetime`,
    `epochTimeToHuman`).

    3. **Template Rendering**: Iterates through each item in the array. For each item,
    it renders the provided 'Jinja' template code. The current item is accessible
    within the template using the `row` variable or directly via its keys.

    4. **Aggregation**: Collects all rendered strings into a list and joins them using
    the specified 'join' character.

    5. **Final Formatting**: Prepends the 'prefix' and appends the 'suffix' to the
    joined string to produce the final output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Array input** | content | No | A JSON array (list of objects) typically passed
    from the output of a previous action. Defaults to an empty list. |

    | **Jinja** | code | No | The Jinja2 template string to be applied to each item
    in the array. Use `{{ row.key_name }}` to access data. |

    | **join** | string | No | The character or string used to join the rendered output
    of each array item (e.g., a newline `\n` or a comma `,`). |

    | **prefix** | string | No | A static string to be added at the very beginning
    of the final rendered output. |

    | **suffix** | string | No | A static string to be added at the very end of the
    final rendered output. |


    ### Additional Notes

    - This action includes specialized filters like `json2tbl` which can convert JSON
    data directly into HTML tables, making it highly effective for creating dynamic
    email content.

    - If the 'Array input' is not valid JSON, the action will fail.
