Render Template:
  ai_description: >-
    Renders a Jinja2 template using provided JSON data and optionally current case
    data (entities and events). This utility action is designed to format complex
    data into human-readable HTML or text, which can then be used for reporting, email
    notifications, or case wall logs. It includes a variety of built-in filters for
    data manipulation, such as converting JSON to HTML tables, regex operations, and
    date formatting.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON Object | JSON Object | No | The raw JSON object that will be used as the
    primary data source (`input_json`) for the Jinja template. Defaults to an empty
    object `{}`. |

    | Jinja | Code | No | The Jinja2 template code to be rendered. If provided, this
    value overrides the 'Template' parameter. |

    | Include Case Data | Boolean | No | When enabled (true), the action automatically
    injects the current alert's security events and target entities into the template
    context under `input_json['SiemplifyEvents']` and `input_json['SiemplifyEntities']`.
    |

    | Template | Email Content | No | The Jinja2 template to be rendered. This can
    be a pre-defined HTML template from the environment settings or a custom string.
    |


    ### Additional Notes

    - Either the 'Jinja' or 'Template' parameter should be provided for the action
    to produce a meaningful result. If both are provided, 'Jinja' takes precedence.

    - The action supports custom filters defined in the `JinjaFilters` and `CustomFilters`
    modules, allowing for advanced transformations like `json2tbl`, `regex_replace`,
    and `epochTimeToHuman`.


    ### Flow Description

    1. **Initialization**: The action extracts the input parameters and initializes
    the Jinja2 environment.

    2. **Data Collection**: It retrieves security events and target entities from
    the current Siemplify alert context.

    3. **Context Preparation**: The input JSON string is parsed. If 'Include Case
    Data' is enabled, the collected events and entities are merged into the data context.

    4. **Filter Loading**: Standard and custom Jinja filters are loaded into the environment
    to enable advanced template logic.

    5. **Rendering**: The action renders the template (from 'Jinja' or 'Template')
    using the prepared data context. It supports both single dictionary inputs and
    lists of dictionaries (rendering the template once for each item in the list).

    6. **Output**: The rendered string is saved to the action's JSON results under
    the key `html_output` and returned as the script result.
