  ai_description: >-
    ### General Description

    The "Render Template from Array" action processes a JSON array by applying a specified
    Jinja template to each item within the array. It loops through the list, renders
    the template for each element, and then concatenates the results using a defined
    join character, along with an optional prefix and suffix. This action is useful
    for formatting lists of data into a single, structured string or HTML output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Array input | String | No | A JSON array string, typically the output from a
    previous action. If a single JSON object is provided, it will be treated as a
    single-element array. |

    | Jinja | String | No | The Jinja template code to be rendered for each item in
    the array. |

    | join | String | No | The character or string used to join the rendered items
    together. |

    | prefix | String | No | A string to prepend to the final joined output. |

    | suffix | String | No | A string to append to the final joined output. |


    ### Flow Description

    1. Parses the `Array input` parameter into a JSON object. If it is not a list,
    it converts it into a single-element list.

    2. Initializes a Jinja environment, loading standard and custom Jinja filters.

    3. Iterates over each item in the JSON array.

    4. Renders the provided Jinja template for each item, passing the item as the
    context.

    5. Joins all the rendered strings together using the `join` parameter.

    6. Prepends the `prefix` and appends the `suffix` to the joined string.

    7. Returns the final rendered string as the action's main result and as a JSON
    result under the key `html_output`.
