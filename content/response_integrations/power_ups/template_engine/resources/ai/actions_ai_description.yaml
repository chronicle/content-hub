      does not fetch data from any external API (fetches_data=false) and does not
      mutate any external systems (can_mutate_external_data=false). It mutates internal
      data by creating entity insights using `siemplify.add_entity_insight` (can_mutate_internal_data=true,
      can_create_insight=true). It does not update entity fields, modify alert data,
      or create case comments.
  categories:
