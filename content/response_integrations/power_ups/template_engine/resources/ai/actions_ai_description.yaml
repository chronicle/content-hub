Entity Insight:
  ai_description: >-
    ### General Description

    Renders a Jinja2 template using a provided JSON object and attaches the result
    as an Entity Insight to the target entities. This utility action allows for dynamic
    generation of HTML or text insights based on structured JSON data.


    ### Flow Description

    1. Extracts the target entities, excluding those with an `ALERT` type in their
    additional properties.

    2. Parses the provided JSON object and initializes a Jinja2 environment with custom
    filters.

    3. Iterates through the target entities and matches them with the corresponding
    data in the JSON object using the entity identifier.

    4. Renders the Jinja2 template with the matched data and entity properties.

    5. Attaches the rendered template as an Entity Insight to the entity if the 'Create
    Insight' parameter is enabled, and adds the result to the action's JSON output.


    ### Additional Notes

    The input JSON object must be formatted correctly to match entity identifiers
    (e.g., containing an `Entity` key). Custom Jinja filters are supported and can
    be used within the template.
  ai_short_description: >-
    Renders a Jinja2 template using a provided JSON object and attaches the output
    as an Entity Insight to the target entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action processes an input JSON object and renders a Jinja2 template. It
      does not fetch data from external sources or mutate external data. It creates
      entity insights internally using `siemplify.add_entity_insight`.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
      cve: true
      cve_id: true
      database: true
      deployment: true
      destination_domain: true
      domain: true
      email_message: true
      event: true
      file_hash: true
      file_name: true
      generic: true
      host_name: true
      ip_set: true
      mac_address: true
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: true
      process: true
      service: true
      source_domain: true
      threat_actor: true
      threat_campaign: true
      threat_signature: true
      url: true
      usb: true
      user: true
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` without filtering by `entity.entity_type`,
      meaning it supports all entity types. It filters entities by checking if `entity.additional_properties["Type"]
      != "ALERT"`. It also matches the entity identifier against the provided JSON
      object (`entry["Entity"].lower() == entity.identifier.lower()`).
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      This is a utility action that renders a Jinja2 template and creates an internal
      entity insight. It does not interact with external systems to enrich data, update
      alerts, manage tickets, or perform containment/remediation actions. Therefore,
      it does not match any of the specific outcome categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | JSON Object | String | Yes | The raw JSON object that will be used to render
    the template. |

    | Template | String | Yes | The Jinja2 template to display. Can be a HTML template
    from "Settings->Environment" or added in content box. |

    | Triggered By | String | Yes | The name of the integration that triggered this
    entity insight. |

    | Remove BRs | Boolean | No | Remove all <br> tags from the rendered template.
    |

    | Create Insight | Boolean | No | When enabled, the action will create entity
    insights. Default value of true. |
