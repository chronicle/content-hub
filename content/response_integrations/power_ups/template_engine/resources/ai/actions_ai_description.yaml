Render Template from Array:
  ai_description: >-
    ### General Description

    Renders a Jinja template for each item in a provided JSON array. This action is
    designed to loop through a list of objects, apply a specified Jinja template to
    each item, and join the results into a single formatted string, optionally adding
    a prefix and suffix.


    ### Flow Description

    1. Extracts the input parameters including the JSON array, Jinja template, join
    character, prefix, and suffix.

    2. Parses the `Array input` into a JSON object. If it is not a list, it converts
    it into a single-element list.

    3. Initializes a Jinja environment and loads custom Jinja filters.

    4. Iterates through each item in the JSON array, rendering the Jinja template
    for each item (accessible via the `row` variable in the template).

    5. Joins the rendered outputs using the specified `join` character.

    6. Prepends the `prefix` and appends the `suffix` to the final joined string.

    7. Returns the final rendered string as a JSON result under the key `html_output`.


    ### Additional Notes

    This action is highly useful for formatting lists of data (e.g., from previous
    action outputs) into HTML tables, bulleted lists, or other structured text formats.
    Custom filters are available within the Jinja environment to assist with data
    manipulation.
  ai_short_description: >-
    Loops through a JSON array and applies a Jinja template to each item, joining
    the results into a single formatted string.
