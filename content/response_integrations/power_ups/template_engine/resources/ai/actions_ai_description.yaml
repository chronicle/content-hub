  ai_description: >-
    This action renders a Jinja2 template using a provided JSON object and entity
    data to create entity insights. It is a utility action that allows for dynamic
    generation of insights based on custom templates.


    ### Flow Description

    1. Extracts action parameters: `JSON Object`, `Template`, `Triggered By`, `Remove
    BRs`, and `Create Insight`.

    2. Iterates through the target entities, excluding those with the type "ALERT".

    3. Parses the input `JSON Object`.

    4. Initializes a Jinja2 environment, loading custom filters and helper functions.

    5. Renders the template for each entity using the provided JSON data and the entity's
    properties.

    6. Adds the rendered result as an entity JSON result.

    7. Optionally creates an entity insight in the SOAR platform if `Create Insight`
    is enabled.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON Object | content | Yes | The raw JSON object that will be used to render
    the template. |

    | Template | email_content | No | The Jinja2 template to display. Can be a HTML
    template from "Settings->Environment" or added in content box. |

    | Triggered By | string | Yes | The name of the integration that triggered this
    entity insight. |

    | Remove BRs | boolean | No | Remove all <br> tags from the rendered template.
    Default is false. |

    | Create Insight | boolean | No | When enabled, the action will create entity
    insights. Default is true. |


    ### Additional Notes

    This action is a generic template engine and does not perform any specific external
    system interactions. It is primarily used for internal data formatting and insight
    creation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights and adds entity JSON results within the SOAR platform.
    reasoning: >-
      The action processes input data and entity properties to render a template.
      It does not fetch data from external systems (fetches_data=false) or mutate
      external systems (can_mutate_external_data=false). It performs internal mutations
      by adding entity JSON results and creating entity insights (can_mutate_internal_data=true).
  categories:
    enrichment: true
    reasoning: >-
      The action creates entity insights, which is an allowed internal mutation for
      enrichment actions. It does not fetch data from external systems or mutate external
      data, and it does not perform any prohibited actions.
