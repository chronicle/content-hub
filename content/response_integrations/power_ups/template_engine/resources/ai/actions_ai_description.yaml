  ai_description: >-
    ### General Description

    The **Render Template** action allows users to generate formatted text or HTML
    by applying a Jinja2 template to a JSON data structure. This action is primarily
    used within playbooks to prepare content for notifications (such as emails or
    Slack messages) or to create structured reports from raw event and entity data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON Object** | JSON Object | No | The raw JSON object used as the primary
    data source (`input_json`) for the template. Defaults to `{}`. |

    | **Jinja** | Jinja | No | The Jinja2 template code to be rendered. If provided,
    this overrides the `Template` parameter. |

    | **Include Case Data** | Boolean | No | When enabled, the action automatically
    injects the alert's security events and entities into the template context under
    `input_json['SiemplifyEvents']` and `input_json['SiemplifyEntities']`. |

    | **Template** | email_content | No | An alternative way to provide the Jinja2
    template, often used for selecting pre-defined HTML templates from the environment
    settings. |


    ### Flow Description

    1. **Data Collection**: The action extracts the `JSON Object` input and, if `Include
    Case Data` is enabled, gathers all security events and entities associated with
    the current alert context.

    2. **Environment Setup**: A Jinja2 environment is initialized, loading a comprehensive
    set of filters including `json2tbl` (for converting JSON to HTML tables), regex
    utilities, and date/time formatters.

    3. **Template Selection**: The action determines whether to use the raw `Jinja`
    code or the `Template` parameter (with `Jinja` taking precedence).

    4. **Rendering**: The template is rendered using the provided JSON data. If the
    input JSON is a list, the action iterates through the list and appends the rendered
    results for each entry.

    5. **Output**: The final rendered string is returned as the action's result and
    is also stored in the `JsonResult` as `html_output`.


    ### Additional Notes

    - Either the **Jinja** or **Template** parameter must be configured for the action
    to produce output.

    - Use the `|safe` filter in your Jinja code to disable HTML auto-escaping if you
    are generating HTML content.
