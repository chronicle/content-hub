Entity Insight:
  ai_description: >-
    ### General Description

    The **Entity Insight** action is a powerful utility within the Template Engine
    integration designed to transform raw JSON data into human-readable insights using
    Jinja2 templates. It allows analysts to take complex data structures (typically
    from previous enrichment steps) and format them into structured HTML or text insights
    that are then attached directly to entities within Google SecOps. This action
    is highly customizable, supporting a wide array of custom Jinja filters for data
    manipulation, table generation, and regex operations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON Object** | JSON Object | Yes | The raw JSON data (in EntityResult format)
    that will be used as the context for the Jinja2 template. |

    | **Template** | Template | No | The Jinja2 template used to render the insight.
    This can be an HTML template or plain text. |

    | **Triggered By** | String | Yes | Specifies the name of the integration that
    will be credited as the source of the created entity insight. |

    | **Remove BRs** | Boolean | No | If set to `true`, the action will strip all
    `<br>` tags from the final rendered template. Default is `false`. |

    | **Create Insight** | Boolean | No | Determines whether the action should actually
    create an Entity Insight in the UI. Default is `true`. |


    ### Additional Notes

    - The action automatically excludes entities of type 'ALERT' from processing.

    - It supports advanced Jinja filters such as `json2tbl` (converts JSON to HTML
    tables), `regex_match`, `filter_datetime`, and `dedup_list_of_dicts`.

    - The input JSON is expected to be a list of objects where each object contains
    an "Entity" identifier and an "EntityResult" payload.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the input JSON, the Jinja2 template,
    and configuration flags (Remove BRs, Create Insight).

    2. **Environment Setup:** It initializes a Jinja2 environment and loads a comprehensive
    suite of custom filters for data formatting and transformation.

    3. **Entity Filtering:** The action iterates through the target entities in the
    case, filtering out any entities identified as 'ALERT' types via their additional
    properties.

    4. **Data Mapping:** For each valid entity, the action searches the provided **JSON
    Object** for an entry matching the entity's identifier.

    5. **Template Rendering:** If a match is found, the action combines the entity's
    metadata with the specific JSON result and renders the Jinja2 template.

    6. **Internal Mutation:** The rendered output is attached to the entity as a JSON
    result. If **Create Insight** is enabled, the action also generates a formal Entity
    Insight visible in the Google SecOps case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates entity insights and updates entity JSON results within the
      Google SecOps platform based on the provided template and data.
