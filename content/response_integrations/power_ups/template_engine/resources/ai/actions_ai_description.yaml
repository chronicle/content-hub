Render Template:
  ai_description: >-
    ### General Description

    Renders a Jinja2 template using a provided JSON object and optional case data.
    This action acts as a utility to format data into HTML or text strings based on
    Jinja2 syntax, which can then be used in subsequent actions or playbooks.


    ### Flow Description

    1. Extracts context data (security events and entities) from the current alert
    or case if the 'Include Case Data' parameter is enabled.

    2. Parses the input 'JSON Object' parameter into a Python dictionary or list.

    3. Initializes a Jinja2 environment, loading standard and custom filters.

    4. Renders the template provided in the 'Jinja' or 'Template' parameter using
    the parsed JSON and context data.

    5. Returns the rendered string as a JSON result (`html_output`) for use in subsequent
    playbook steps.


    ### Additional Notes

    The action supports custom Jinja filters and can process both single JSON objects
    and lists of JSON objects. If a list is provided, the template is rendered for
    each item in the list and concatenated.
  ai_short_description: >-
    Renders a Jinja2 template using a provided JSON object and optional case data
    to generate formatted text or HTML.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a utility that renders a Jinja2 template locally. It does not
      fetch data from external sources, mutate external or internal data, update entities,
      create insights, or add case comments.
  entity_usage:
