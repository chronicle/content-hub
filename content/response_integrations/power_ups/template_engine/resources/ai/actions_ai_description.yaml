  ai_description: >-
    ### General Description

    This action uses a Jinja2 template to create Entity Insights from a provided JSON
    object. It processes the input JSON, matches records to the target entities, applies
    custom Jinja filters to format the output, and attaches the rendered template
    as an insight to the corresponding entities within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | JSON Object | JSON Object | Yes | The raw JSON object that will be used to render
    the template. Must be in the format of EntityResult. |

    | Template | String | Yes | The Jinja2 template to display. Can be an HTML template
    or added in the content box. (Note: Marked as optional in settings but enforced
    as mandatory in code). |

    | Triggered By | String | Yes | The name of the integration that triggered this
    entity insight. |

    | Remove BRs | Boolean | No | If enabled, removes all `<br>` tags from the rendered
    template. |

    | Create Insight | Boolean | No | When enabled, the action will create entity
    insights. Defaults to true. |


    ### Flow Description

    1. Extracts the provided JSON object, Jinja2 template, and configuration parameters.

    2. Initializes a Jinja2 environment and loads custom formatting filters.

    3. Iterates through the target entities and builds an internal mapping, excluding
    entities with the type "ALERT" in their additional properties.

    4. Matches the target entities with the corresponding data entries in the provided
    JSON object.

    5. Renders the Jinja2 template for each matched entity using the JSON data.

    6. Creates an Entity Insight for the entity if the 'Create Insight' parameter
    is enabled.
  capabilities:
