  ai_description: >-
    ### General Description

    The **Render Template from Array** action is a utility designed to transform a
    list of data items into a single formatted string using Jinja2 templating. It
    iterates through a provided JSON array, applies a specific template to each element,
    and joins the results together. This is particularly useful for generating HTML
    reports, summaries, or formatted logs from a collection of entities or event data
    within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Array input** | Content | No | A JSON-formatted string representing the array
    of items to process. Usually mapped from the output of a previous action. Defaults
    to an empty list. |

    | **Jinja** | Code | No | The Jinja2 template logic to apply to each item in the
    array. The current item is accessible via the `row` variable. |

    | **join** | String | No | The character or string used to concatenate the rendered
    output of each array item (e.g., a comma, newline, or HTML break). |

    | **prefix** | String | No | A static string to prepend to the very beginning
    of the final concatenated output. |

    | **suffix** | String | No | A static string to append to the very end of the
    final concatenated output. |


    ### Additional Notes

    - If the **Array input** provided is a single JSON object instead of a list, the
    action will automatically treat it as a single-element array.

    - The action supports a wide range of custom Jinja filters (e.g., `json2tbl`,
    `regex_match`, `filter_datetime`) to assist in complex data formatting.


    ### Flow Description

    1. **Initialization**: The action extracts the input parameters and initializes
    the Jinja2 environment, loading standard and custom filters.

    2. **Data Parsing**: The `Array input` string is parsed into a Python list. If
    the input is a dictionary, it is converted into a list containing that dictionary.

    3. **Template Rendering**: The action loops through each item in the list. For
    each item, it renders the provided `Jinja` template, passing the item as the context
    (accessible as `row`).

    4. **Concatenation**: All rendered strings are collected into a list and joined
    into a single string using the `join` parameter.

    5. **Final Formatting**: The `prefix` and `suffix` are added to the joined string.

    6. **Output**: The final string is returned as the action's result value and included
    in the `html_output` field of the JSON result.
