  ai_description: >-
    The **Entity Insight** action is a utility designed to transform raw JSON data
    into human-readable insights for entities within a case. Using the Jinja2 templating
    engine, it allows analysts to create custom visual representations of data retrieved
    by other actions. This is particularly useful for summarizing complex API responses
    into concise tables or summaries directly on the entity's insight tab.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **JSON Object** | Content | Yes | The raw JSON data (in EntityResult format)
    that will be used to populate the template. |

    | **Template** | Email Content | No | The Jinja2 template used to render the insight.
    Can be a predefined HTML template or custom code. |

    | **Triggered By** | String | Yes | The name of the integration or process that
    generated the data, used as the source label for the insight. |

    | **Remove BRs** | Boolean | No | If set to `true`, all `<br>` tags will be stripped
    from the rendered output. Default is `false`. |

    | **Create Insight** | Boolean | No | If set to `true`, the action will generate
    an Entity Insight in the SOAR. Default is `true`. |


    ### Additional Notes

    - The action includes a wide array of custom Jinja filters such as `json2tbl`
    (for converting JSON to HTML tables), `regex_replace`, and `filter_datetime` to
    assist in data formatting.

    - The input JSON must follow a specific structure where each entry contains an
    "Entity" identifier and an "EntityResult" object.

    - Entities identified as type "ALERT" via their additional properties are excluded
    from processing.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the input JSON, Jinja2 template, and configuration
    settings from the action parameters.

    2. **Environment Setup**: Initializes the Jinja2 environment and loads a comprehensive
    set of standard and custom filters for advanced data manipulation.

    3. **Entity Iteration**: Loops through all entities currently associated with
    the case scope.

    4. **Type Filtering**: Skips entities where the `Type` property in `additional_properties`
    is set to "ALERT".

    5. **Data Matching**: For each valid entity, searches the input JSON object for
    an entry matching the entity's identifier.

    6. **Template Rendering**: If a match is found, it merges the entity's metadata
    with the JSON result and renders the Jinja2 template into a final string.

    7. **Insight Creation**: If the `Create Insight` flag is enabled, it creates an
    Entity Insight with the rendered content and attaches the raw result as entity
    JSON for further use.
