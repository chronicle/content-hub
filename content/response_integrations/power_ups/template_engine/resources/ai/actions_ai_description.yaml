  ai_description: >-
    ### General Description

    The Entity Insight action is a utility tool designed to generate formatted entity
    insights using Jinja2 templates. It processes a provided JSON object and renders
    it into a human-readable format, which can then be attached to entities as JSON
    results or displayed as insights within the SOAR platform. This action is highly
    flexible, allowing for custom template definitions to suit various reporting or
    documentation needs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON Object | content | Yes | The raw JSON object containing the data to be
    rendered by the template. |

    | Template | email_content | No | The Jinja2 template string. Can be an HTML template
    or plain text. |

    | Triggered By | string | Yes | The name of the integration that triggered this
    entity insight. |

    | Remove BRs | boolean | No | If true, removes all `<br>` tags from the rendered
    template. Default is false. |

    | Create Insight | boolean | No | If true, creates an entity insight in the SOAR
    platform. Default is true. |


    ### Additional Notes

    This action does not interact with external systems. It is strictly an internal
    utility for data formatting and insight generation. It supports a wide range of
    entity types and uses custom Jinja2 filters for advanced data manipulation.


    ### Flow Description

    1. Extracts action parameters: `JSON Object`, `Template`, `Triggered By`, `Remove
    BRs`, and `Create Insight`.

    2. Iterates through the `target_entities`, excluding any entities with the type
    "ALERT".

    3. Parses the input `JSON Object`.

    4. Initializes a Jinja2 environment, loading standard and custom filters.

    5. Renders the template for each entity using the provided JSON data and the entity's
    properties.

    6. Adds the rendered result as an entity JSON result using `siemplify.result.add_entity_json`.

    7. If `Create Insight` is enabled, creates an entity insight using `siemplify.add_entity_insight`.
