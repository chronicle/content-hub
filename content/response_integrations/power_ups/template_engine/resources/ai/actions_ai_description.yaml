  ai_description: >-
    ### General Description

    This action renders a Jinja2 template for each item in a provided JSON array.
    It is designed for data transformation, allowing users to format complex JSON
    data into custom strings, HTML, or reports using Jinja2 templating syntax. It
    supports custom filters for advanced data manipulation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Array input | String | No | A JSON array string to be processed. Defaults to
    an empty object if not provided. |

    | Jinja | String | No | The Jinja2 template string to be rendered for each item
    in the array. |

    | join | String | No | The separator string used to join the rendered items. Defaults
    to an empty string. |

    | prefix | String | No | A string to prepend to the final output. |

    | suffix | String | No | A string to append to the final output. |


    ### Flow Description

    1. **Parse Input**: The action parses the `Array input` parameter as a JSON object
    or list.

    2. **Environment Setup**: A Jinja2 environment is initialized, and custom filters
    (from `JinjaFilters` and `CustomFilters`) are loaded to enable advanced template
    logic.

    3. **Iteration**: The action iterates through each item in the input array.

    4. **Rendering**: The provided Jinja template is rendered for each item.

    5. **Formatting**: The rendered results are concatenated using the `join` parameter.

    6. **Finalization**: The `prefix` and `suffix` are applied to the final string.

    7. **Output**: The final result is returned in the `html_output` field of the
    action result.
