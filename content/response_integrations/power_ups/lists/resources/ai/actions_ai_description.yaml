  ai_description: >-
    ### General Description

    Searches for specific records within the Google SecOps environment's custom lists.
    This action allows users to filter records by category and search for specific
    strings within the entity identifiers of the list entries. It is primarily used
    to retrieve internal list data for use in subsequent playbook steps. If no parameters
    are provided, the action returns all records from the environment's custom lists.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String to Search | String | No | The string to search for within the 'entityIdentifier'
    field of the list records. If omitted, no string filtering is applied. |

    | Categories | String | No | A comma-separated list of categories to filter the
    custom list records. If omitted, records from all categories are considered. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the 'Categories' and 'String
    to Search' parameters from the input.

    2. **Data Retrieval**: It calls an internal API method (`get_traking_list_records_filtered`)
    to fetch custom list records from the Google SecOps environment.

    3. **Category Filtering**: If the 'Categories' parameter is provided, the action
    filters the retrieved records to include only those matching the specified categories.

    4. **String Filtering**: If the 'String to Search' parameter is provided, the
    action iterates through the records and performs a substring match against the
    'entityIdentifier' field.

    5. **Result Output**: The matching records are formatted as a JSON object and
    added to the action's results. If no records match the criteria, the action reports
    that no matching records were found.


    ### Additional Notes

    This action is a utility for internal data retrieval and does not interact with
    external systems or modify existing entities or alerts within the case.
