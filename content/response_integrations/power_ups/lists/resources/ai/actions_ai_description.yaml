  ai_description: >-
    ### General Description

    Checks if a provided list of strings exists within a specified custom list category
    in Google SecOps. It evaluates each string against the internal custom list and
    returns a JSON result indicating whether each string was found, along with the
    total count of matched items.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `IdentifierList` | String | Yes | A comma-separated list or JSON array of strings
    to check against the custom list. |

    | `Category` | String | Yes | The name of the custom list category to search within.
    |


    ### Flow Description

    1. Retrieves the `Category` and `IdentifierList` parameters from the action configuration.

    2. Parses the `IdentifierList` into a list of individual strings, handling both
    JSON and comma-separated formats.

    3. Iterates through each string and queries the internal SOAR custom list to check
    if it exists in the specified category for the current environment.

    4. Compiles a JSON result mapping each string to a boolean (`True` or `False`)
    indicating its presence in the list.

    5. Outputs the total number of found items and attaches the JSON result to the
    action's execution data.
