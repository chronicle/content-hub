Add String to Custom List:
  ai_description: >-
    ### General Description

    Adds a specified string to a custom list category within Google SecOps.


    ### Flow Description

    1. Retrieves the target custom list category and the string item from the action
    parameters.

    2. Constructs a custom list item object using the provided string and category.

    3. Calls the internal SOAR SDK method `add_entities_to_custom_list` to append
    the item to the specified custom list.


    ### Additional Notes

    This action modifies internal SOAR custom lists and does not interact with external
    systems. It does not operate on alert entities directly, but rather on the explicitly
    provided string parameter.
