  ai_description: >-
    ### General Description

    Adds a specified string to a custom list within Google SecOps. This action is
    used to manage internal lists (such as blocklists, allowlists, or watchlists)
    directly from a playbook or manual action without interacting with external systems.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | ListItem | String | Yes | The string value to be added to the custom list. |

    | Category | String | Yes | The name of the custom list category where the item
    will be added. |


    ### Flow Description

    1. Retrieves the `ListItem` and `Category` parameters provided by the user or
    playbook.

    2. Constructs a custom list item object using the provided string, category, and
    the current environment.

    3. Adds the item to the specified custom list in the Google SecOps platform.

    4. Returns a success message indicating the item was successfully added to the
    category.
