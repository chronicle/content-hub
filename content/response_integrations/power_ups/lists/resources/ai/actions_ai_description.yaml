Search Environment Custom Lists:
  ai_description: >-
    Searches for a specified string within the records of the environment's custom
    lists in Google SecOps. This action allows users to filter results by specific
    categories and search for matches within the entity identifiers of the list records.
    If no parameters are provided, the action returns all available custom list records.


    ### Flow Description:

    1. **Parameter Extraction**: The action retrieves the 'Categories' and 'String
    to Search' parameters from the input.

    2. **Data Retrieval**: It calls the internal SOAR API to fetch custom list records
    filtered by the provided categories and string.

    3. **Category Filtering**: If categories are specified, the action filters the
    retrieved records to include only those belonging to the specified categories.

    4. **String Matching**: If a search string is provided, the action iterates through
    the records and identifies those where the 'entityIdentifier' contains the search
    string.

    5. **Result Output**: The matching records are added to the action's JSON results,
    and a summary message indicating the number of matches found is returned.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String to Search | String | No | The specific string to look for within the
    'entityIdentifier' field of the custom list records. |

    | Categories | String | No | A comma-separated list of categories used to filter
    which custom lists are searched. |


    ### Additional Notes:

    - If both parameters are left empty, the action will attempt to return all records
    from all custom lists in the environment.

    - This action interacts with internal Google SecOps data and does not communicate
    with external third-party services.
