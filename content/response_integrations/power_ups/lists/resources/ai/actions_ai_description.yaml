Add String to Custom List:
  ai_description: >-
    ### General Description

    The **Add String to Custom List** action allows users to programmatically add
    a specific string to a designated Custom List category within Google SecOps. This
    is a utility action used for managing internal lists such as allowlists, blocklists,
    or watchlists directly from a playbook without requiring manual entry in the UI.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **ListItem** | string | Yes | The specific string value to be added to the custom
    list. |

    | **Category** | string | Yes | The name of the custom list category where the
    string should be added (e.g., "WhiteList"). |


    ### Additional Notes

    This action does not operate on entities within the current context; it uses the
    provided string parameter. It modifies internal Google SecOps data (Custom Lists)
    but does not interact with external systems. There are no entity-based filters
    applied.


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the `ListItem` (the string to
    add) and the `Category` (the target list) from the input parameters.

    2. **Object Creation**: It constructs a `CustomList` object using the provided
    string, category, and the current environment context.

    3. **List Update**: It calls the internal SDK method `add_entities_to_custom_list`
    to add the constructed item to the specified custom list in Google SecOps.

    4. **Completion**: The action returns a success message indicating the string
    has been added to the category and terminates with a completed status.
