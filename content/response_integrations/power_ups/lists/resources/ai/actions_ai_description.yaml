Remove String from Custom List:
  ai_description: >-
    ### General Description\n\nThe **Remove String from Custom List** action allows
    users to programmatically delete a specific string entry from an existing Google
    SecOps custom list. This is typically used to manage internal allowlists, blocklists,
    or watchlists by removing indicators that are no longer relevant.\n\n### Parameters
    Description\n\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |
    :--- | :--- |\n| **Category** | String | Yes | The name of the custom list category
    (e.g., \"WhiteList\") from which the item will be removed. |\n| **ListItem** |
    String | Yes | The specific string value to be removed from the custom list. |\n\n###
    Flow Description\n\n1. **Parameter Extraction**: The action retrieves the target
    custom list category and the specific string to be removed from the input parameters.\n2.
    **Object Preparation**: It creates a `CustomList` object containing the string
    and category information.\n3. **Removal Execution**: The action calls the internal
    SDK method `remove_entities_from_custom_list` to perform the deletion within the
    SecOps platform.\n4. **Finalization**: The action returns a success message confirming
    the removal or a failure message if an error occurs.\n\n### Additional Notes\n\n-
    This action operates on internal Google SecOps custom lists and does not affect
    external security controls directly.\n- Ensure the `Category` name matches the
    existing list name exactly.
