Is String In Custom List:
  ai_description: >-
    Checks if a specific set of strings exists within a designated Google SecOps Custom
    List category. This action is primarily used for whitelist or blacklist validation
    by comparing user-provided identifiers against internal lists stored within the
    platform.


    ### Flow Description

    1. **Parse Input:** The action retrieves the `IdentifierList` and `Category` parameters.
    It attempts to parse the `IdentifierList` as a JSON array; if that fails, it treats
    it as a comma-separated string.

    2. **Iterate Identifiers:** For each string in the list, the action creates a
    `CustomList` object associated with the specified category and the current environment.

    3. **Query Custom Lists:** It uses the internal SDK method `any_entity_in_custom_list`
    to check if the identifier exists in the specified category.

    4. **Aggregate Results:** The action tracks which identifiers were found and maintains
    a total count of matches.

    5. **Finalize:** It outputs a JSON mapping of each identifier to its presence
    status (true/false) and returns the total count of found items as the result value.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IdentifierList | string | Yes | A list of strings to compare against the custom
    list. Can be a JSON-formatted list (e.g., `["1.1.1.1", "google.com"]`) or a comma-separated
    string (e.g., `1.1.1.1,google.com`). |

    | Category | string | Yes | The name of the Custom List category to search within
    (e.g., 'WhiteList', 'BlackList'). |


    ### Additional Notes

    - This action does not interact with the entities currently present in the alert;
    it only processes the strings provided in the `IdentifierList` parameter.

    - The search is environment-aware, meaning it only checks lists associated with
    the environment in which the action is running.
