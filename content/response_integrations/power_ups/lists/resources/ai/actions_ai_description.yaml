  ai_description: >-
    ### General Description

    This action adds a specified string to a custom list within the Google SecOps
    SOAR platform. It allows users to dynamically update custom lists, which can be
    used for various purposes such as maintaining watchlists, blocklists, or allowlists.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ListItem | string | Yes | The list item string to add to the custom list. |

    | Category | string | Yes | The category of the custom list to which the item
    will be added. |


    ### Additional Notes

    None.


    ### Flow Description

    1. The action retrieves the `Category` and `ListItem` values from the provided
    action parameters.

    2. It initializes a `CustomList` object using the provided string and category.

    3. The action calls `siemplify.add_entities_to_custom_list` to persist the new
    item into the specified custom list within the SOAR platform.

    4. The action concludes by returning the execution status and an output message
    confirming the addition.
