  ai_description: >-
    ### General Description

    This action checks if a list of provided strings exists within a specified Custom
    List category in the current environment. It is a utility action designed to verify
    the presence of identifiers (e.g., IPs, domains, or file hashes) against predefined
    organizational lists.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IdentifierList | string | Yes | A list of strings (e.g., "1.2.3.4,google.com")
    to check against the custom list. Can be provided as a JSON-formatted string or
    a comma-separated string. |

    | Category | string | Yes | The name of the Custom List category to check against.
    |


    ### Flow Description

    1. **Initialization**: The action initializes the `SiemplifyAction` and retrieves
    the `Category` and `IdentifierList` parameters.

    2. **Parsing**: The `IdentifierList` is parsed into a list of individual strings,
    handling both JSON and comma-separated formats.

    3. **Lookup**: The action iterates through each identifier and queries the internal
    Custom List system using `siemplify.any_entity_in_custom_list` for the specified
    category.

    4. **Result Generation**: A JSON result is constructed mapping each identifier
    to a boolean value (`True` if found, `False` otherwise).

    5. **Output**: The action adds the result JSON to the execution output and returns
    a summary message indicating the number of items found.
