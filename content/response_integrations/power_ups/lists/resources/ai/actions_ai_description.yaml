Is String In Custom List:
  ai_description: >-
    ### General Description

    Checks if a specific list of strings exists within a specified custom list category
    in the Google SecOps platform. This action is useful for verifying whether certain
    indicators, users, or other string values are present in predefined internal lists
    (e.g., allowlists, blocklists, or watchlists).


    ### Flow Description

    1. Retrieves the custom list category and the list of string identifiers from
    the action parameters.

    2. Parses the provided identifier list, handling it either as a JSON array or
    a comma-separated string.

    3. Iterates through each identifier and queries the internal custom list database
    to check for its presence in the specified category for the current environment.

    4. Compiles a JSON result mapping each identifier to a boolean value (`True` if
    found, `False` otherwise).

    5. Returns the total count of found items as the result value and attaches the
    JSON mapping to the action output.


    ### Additional Notes

    This action interacts strictly with internal Google SecOps custom lists and does
    not make external API calls or modify any data.
