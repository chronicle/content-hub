  ai_description: >-
    Searches for specific records within Google SecOps Custom Lists based on a search
    string and/or specific categories. This action is primarily used to retrieve and
    filter internal list data for use in playbooks, such as checking if a value exists
    in a watchlist or global blocklist managed within the SOAR platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String to Search | String | No | The specific string to look for within the
    `entityIdentifier` field of the custom list records. If omitted, all records in
    the specified categories are returned. |

    | Categories | String | No | A comma-separated list of custom list categories
    to search within. If omitted, the action searches across all available custom
    lists. |


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves the `Categories` and `String
    to Search` from the user input.

    2.  **Data Retrieval:** It calls the internal SOAR API to fetch records from the
    custom lists. If categories are provided, it limits the initial fetch to those
    categories.

    3.  **Category Filtering:** If categories were specified, the action filters the
    retrieved records to ensure they match the requested categories.

    4.  **String Matching:** If a search string is provided, the action iterates through
    the records and performs a partial match check against the `entityIdentifier`
    field.

    5.  **Output Generation:** The matching records are formatted into a JSON array
    and attached to the action's results. If no matches are found, the action completes
    with a 'False' result value.


    ### Additional Notes


    *   If both parameters are left empty, the action will attempt to return all records
    from all custom lists.

    *   This action does not interact with entities in the current case scope; it
    operates globally on the platform's custom list data.
