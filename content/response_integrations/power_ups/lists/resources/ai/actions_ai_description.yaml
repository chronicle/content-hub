    Searches for a specified string within the records of Google SecOps custom lists.
    This action retrieves custom list records from the platform and filters them based
    on the provided categories and search string, returning the matching records as
    a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | String to Search | String | False | The specific string to search for within
    the custom list values (`entityIdentifier`). If left empty, the action will not
    filter by string and will return all records that match the category criteria.
    |

    | Categories | String | False | A comma-separated list of custom list categories
    to filter the search. If left empty, records from all categories are evaluated.
    |


    ### Flow Description

    1. Extracts the `Categories` and `String to Search` parameters.

    2. Retrieves custom list records from the internal SOAR platform.

    3. Filters the retrieved records by the specified categories (if provided).

    4. Further filters the records to find matches containing the `String to Search`
    (if provided).

    5. Outputs the matching records as a JSON result.


    ### Additional Notes

    If neither parameter is provided, the action will return all custom list records
    available in the system.
