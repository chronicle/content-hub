  ai_description: >-
    ### General Description

    Searches for records within Google SecOps custom lists based on optional category
    filtering and string matching. This action allows users to query custom lists
    to find specific entries, facilitating the retrieval of threat intelligence or
    other stored data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String to Search | string | No | The string to search for within the `entityIdentifier`
    field of the custom list records. |

    | Categories | string | No | A comma-separated list of categories to filter the
    custom list records by. |


    ### Additional Notes

    If no categories or search strings are provided, the action will return all records
    from the custom lists.


    ### Flow Description

    1. Extracts `Categories` and `String to Search` parameters.

    2. Retrieves custom list records using the `get_traking_list_record` utility.

    3. Filters the retrieved records by the provided categories (if specified).

    4. Filters the remaining records by the `String to Search` (if specified) against
    the `entityIdentifier` field.

    5. Returns the matching records as a JSON result.
