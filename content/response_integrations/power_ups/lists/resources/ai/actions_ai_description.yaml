  ai_description: >-
    ### General Description

    This action checks if a specific set of strings exists within a designated Google
    SecOps Custom List category. It is primarily used for logic branching or validation
    within playbooks, such as checking if an indicator is part of a known whitelist
    or blacklist maintained internally.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IdentifierList | string | True | A list of strings to compare against the custom
    list. This parameter accepts either a JSON-formatted array (e.g., `["1.1.1.1",
    "google.com"]`) or a comma-separated string (e.g., `1.1.1.1,google.com`). |

    | Category | string | True | The name of the Custom List category (e.g., 'WhiteList',
    'BlackList') to search within for the current environment. |


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `Category` and `IdentifierList`
    parameters. It attempts to parse the `IdentifierList` as a JSON array; if that
    fails, it splits the string by commas and strips whitespace from each item.

    2. **Custom List Query**: For each identifier in the list, the action creates
    a `CustomList` object and uses the SOAR SDK method `any_entity_in_custom_list`
    to check if that specific string exists in the specified category for the current
    environment.

    3. **Result Aggregation**: The action builds a JSON object where each identifier
    is a key and the value is a boolean (`true` if found, `false` otherwise). It also
    maintains a counter for the total number of matches found.

    4. **Completion**: The action outputs the total count of matches as the main result
    value and provides the detailed boolean mapping in the JSON result.
