  ai_description: >-
    ### General Description

    This action adds a specific string to a designated custom list category within
    Google SecOps. It is primarily used for managing internal lists, such as allowlists
    or blocklists, by programmatically inserting new entries based on user input or
    playbook logic.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | ListItem | The specific string value that you want to add to the custom list.
    | String | Yes |

    | Category | The name of the custom list category (e.g., 'WhiteList', 'BlackList')
    where the string should be stored. | String | Yes |


    ### Additional Notes

    - This action does not process entities from the case; it operates strictly on
    the provided `ListItem` string parameter.

    - The action uses the current environment context of the SOAR platform when adding
    the item to the list.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Category` and `ListItem`
    values from the input parameters.

    2. **Object Creation**: It creates a `CustomList` data object containing the input
    string, the target category, and the environment identifier.

    3. **Internal Update**: The action calls the internal SDK method `add_entities_to_custom_list`
    to save the new entry into the Google SecOps custom list database.

    4. **Completion**: The action returns a success message indicating the string
    has been added to the specified category.
