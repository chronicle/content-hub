Search Custom Lists:
  ai_description: >-
    ### General Description

    This action searches for a specific string within the records of Google SecOps
    Custom Lists. It allows users to filter the search by specific categories or perform
    a global search across all custom lists. If no search string or categories are
    provided, the action retrieves all available custom list records. The results
    are returned as a JSON object containing the matching records.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | String to Search | String | No | The specific substring to look for within the
    `entityIdentifier` field of the custom list records. If omitted, all records in
    the specified categories (or all categories) are returned. |

    | Categories | String | No | A comma-separated list of custom list categories
    to restrict the search to. If omitted, the action searches across all available
    custom lists. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `String to Search` and `Categories`
    from the input.

    2. **Data Retrieval:** It calls the internal SOAR API to fetch custom list records,
    optionally filtered by the provided categories.

    3. **Category Filtering:** If categories were provided, the action ensures only
    records belonging to those categories are processed.

    4. **String Matching:** If a search string is provided, the action iterates through
    the records and identifies those where the `entityIdentifier` contains the search
    string (case-sensitive).

    5. **Result Compilation:** Matching records are collected into a list.

    6. **Output:** The list of matching records is attached to the action results
    as a JSON object, and the action completes with a summary message indicating the
    number of matches found.


    ### Additional Notes

    - This action interacts with internal Google SecOps data (Custom Lists) and does
    not communicate with external third-party services.

    - If no records match the criteria, the action will complete successfully but
    indicate that no matching records were found.
