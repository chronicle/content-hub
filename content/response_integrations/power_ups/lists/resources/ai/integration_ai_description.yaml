  reasoning: >-
    The integration provides utility actions to manage internal SOAR custom lists
    (adding, removing, searching, and checking for items). These lists are used for
    organizational tracking, but the integration itself does not perform security
    operations like SIEM log analysis, EDR host containment, network blocking, threat
    intelligence enrichment, or ITSM ticket management. It is a platform-level utility
    integration, not a security product integration. Therefore, it does not fit into
    any of the defined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
