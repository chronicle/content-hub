  network_security: false
  reasoning: >-
    The integration provides utility connectors ('Cron Scheduled Connector' and 'Scheduled
    Connector') that generate synthetic alerts and cases within the Google SecOps
    SOAR platform to trigger playbooks or simulate events. These connectors do not
    perform log ingestion, security analysis, threat intelligence enrichment, identity
    management, or any other security-specific function defined in the provided categories.
    They are administrative tools for the SOAR platform and do not align with the
    functional requirements of SIEM, EDR, Network Security, Threat Intelligence, Email
    Security, IAM, Cloud Security, ITSM, Vulnerability Management, Asset Inventory,
    or Collaboration categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
