Cron Scheduled Connector:
  ai_description: >-
    ### General Description

    The Cron Scheduled Connector enables the automated creation of synthetic alerts
    or cases within Google SecOps based on a user-defined cron schedule. This is particularly
    useful for triggering playbooks on a recurring basis, testing automation workflows,
    or simulating periodic events without requiring an external data source.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert fields | String | Yes | The alert fields to include in the case, provided
    in JSON format. |

    | Alert name | String | Yes | The name assigned to the generated alert. |

    | Alert type | String | No | The type/category of the alert. |

    | Cron Expression | String | No | A cron expression defining when the connector
    should trigger the case creation. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event class
    ID. |

    | Product name | String | No | The product name associated with the alert. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process. |


    ### Flow Description

    1. The connector initializes and retrieves the configured parameters.

    2. It evaluates the `Cron Expression` against the current system time.

    3. If the schedule matches, it parses the `Alert fields` JSON string into a dictionary.

    4. It creates a `CaseInfo` object, mapping the provided alert name, type, product
    name, and custom fields to the case structure.

    5. The generated case is returned to the SOAR platform, triggering any associated
    playbooks.
Scheduled Connector:
  ai_description: >-
    ### General Description

    The "Scheduled Connector" is a utility connector for Google SecOps that allows
    users to manually or periodically trigger playbooks by generating synthetic alerts.
    Unlike standard connectors that ingest data from external APIs, this connector
    creates custom cases based on user-defined parameters, enabling the simulation
    of alerts or the triggering of workflows based on specific criteria defined in
    the configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert fields | String (JSON) | Yes | A JSON-formatted string containing the
    key-value pairs to be inserted into the alert extensions. |

    | Alert name | String | Yes | The name assigned to the generated alert. |

    | Alert type | String | No | The category or type associated with the alert. Defaults
    to "Scheduled Alert". |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type. |

    | Product name | String | No | The product name associated with the alert. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process execution. |


    ### Flow Description

    1. The connector initializes and extracts the configured parameters (Alert name,
    type, product, and custom fields).

    2. It parses the `Alert fields` JSON string into a dictionary.

    3. It generates a unique `CaseInfo` object, populating it with the provided alert
    name, type, and product information.

    4. It maps the parsed `Alert fields` into the case extensions.

    5. It creates a corresponding event object and attaches it to the case.

    6. The final case package is returned to the SOAR platform, triggering any associated
    playbooks.
