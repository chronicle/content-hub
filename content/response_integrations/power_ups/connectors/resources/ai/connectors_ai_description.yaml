Cron Scheduled Connector:
  ai_description: >-
    ### General Description

    This connector acts as a scheduler to generate alerts and cases within Google
    SecOps at specific intervals defined by a cron expression. It is highly customizable,
    allowing users to define the alert name, type, product, and arbitrary alert fields
    via JSON configuration. It is useful for testing playbooks, creating heartbeat
    alerts, or simulating periodic events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert fields | String | Yes | JSON formatted fields to include in the alert.
    |

    | Alert name | String | Yes | The name of the alert to be created. |

    | Alert type | String | No | The type of the alert. |

    | Cron Expression | String | No | Cron schedule for case creation. |

    | DeviceProductField | String | Yes | Field name for device product. |

    | EventClassId | String | Yes | Field name for event name. |

    | Product name | String | No | The product name for the alert. |

    | PythonProcessTimeout | String | Yes | Timeout limit in seconds. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters.

    2. It evaluates the provided Cron Expression against the current system time.

    3. If the cron schedule matches, it parses the Alert fields JSON string.

    4. It constructs a CaseInfo object with the specified alert name, type, product,
    and custom fields.

    5. It generates a corresponding event and attaches it to the case.

    6. The case is ingested into the SOAR platform for further processing by playbooks.
Scheduled Connector:
  ai_description: >-
    ### General Description

    This connector acts as a synthetic alert generator for Google SecOps SOAR. It
    allows users to manually define and trigger alerts (cases) based on custom parameters,
    such as product name, alert name, and alert type. It is primarily used to test
    playbooks or trigger specific workflows by injecting custom alert data into the
    SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert fields | String | Yes | The alert fields you would like to insert in a
    JSON format. |

    | Alert name | String | Yes | The Alert name associated with the alert that will
    be created. |

    | Alert type | String | No | The Alert type associated with the alert that will
    be created. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Product name | String | No | The Product name associated with the alert that
    will be created. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running current script. |


    ### Flow Description

    1. The connector initializes the SiemplifyConnectorExecution environment.

    2. It retrieves the user-defined configuration parameters (Product name, Alert
    name, Alert type, and Alert fields).

    3. It parses the Alert fields JSON string into a dictionary.

    4. It constructs a CaseInfo object, populating it with the provided alert details,
    including the alert name, type, and product.

    5. It maps the parsed Alert fields into the case extensions.

    6. It generates a corresponding event and attaches it to the case.

    7. Finally, it returns the constructed case package to the SOAR platform to trigger
    relevant playbooks.
