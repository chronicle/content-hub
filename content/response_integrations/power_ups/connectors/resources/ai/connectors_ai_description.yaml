Cron Scheduled Connector:
  ai_description: >-
    ### General Description

    The **Cron Scheduled Connector** is a utility integration designed to trigger
    playbooks within Google SecOps on a scheduled basis. Unlike traditional connectors
    that fetch data from external security products, this connector generates synthetic
    alerts based on user-defined parameters and a Cron expression. It is primarily
    used for automating recurring tasks, such as health checks, periodic maintenance,
    or scheduled reporting playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert fields | String | Yes | A JSON-formatted string containing the key-value
    pairs to be inserted into the alert's extension fields (e.g., `{"key": "value"}`).
    |

    | Alert name | String | Yes | The display name for the alert that will be created
    in the system. |

    | Alert type | String | No | The specific alert type or rule generator name. Defaults
    to "Scheduled Alert" if not provided. |

    | Cron Expression | String | No | A standard Cron expression (e.g., `*/5 * * *
    *`) that determines the frequency and timing of alert creation. |

    | DeviceProductField | String | Yes | The field name used by the platform to identify
    the device product. |

    | EventClassId | String | Yes | The field name used by the platform to identify
    the event class or sub-type. |

    | Product name | String | No | The product name associated with the generated
    alert. |

    | PythonProcessTimeout | String | Yes | The maximum time (in seconds) allowed
    for the script to execute before being terminated. |


    ### Flow Description

    1. **Parameter Extraction**: The connector retrieves the configured alert metadata
    (name, type, product), the JSON payload for alert fields, and the Cron expression.

    2. **Schedule Validation**: The script uses the `cronex` library to compare the
    current system time against the provided `Cron Expression`.

    3. **Execution Check**: If the current time does not match the Cron schedule,
    the connector logs the status and exits without creating an alert.

    4. **Alert Generation**: If the schedule matches, the connector generates a unique
    UUID for the alert and initializes a `CaseInfo` object.

    5. **Data Mapping**: The JSON data from the `Alert fields` parameter is parsed
    and mapped to the alert's extension fields. The priority is set to Medium (60)
    by default.

    6. **Event Creation**: A dummy event is created and attached to the case to ensure
    compatibility with the Google SecOps data model.

    7. **Ingestion**: The generated case is sent to the platform, where it can trigger
    playbooks based on the defined Alert Name, Type, or Product.
Scheduled Connector:
  ai_description: >-
    ### General Description

    The Scheduled Connector is a utility integration designed to programmatically
    generate alerts and cases within Google SecOps. Unlike traditional connectors
    that fetch data from external security products, this connector creates synthetic
    alerts based on user-defined configuration parameters. It is primarily used to
    trigger specific playbooks on a scheduled basis or to simulate alerts for testing
    and automation orchestration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert fields | String | Yes | A JSON-formatted string representing the key-value
    pairs to be included in the alert extensions (e.g., `{"src": "1.1.1.1"}`). |

    | Alert name | String | Yes | The display name for the created alert. |

    | Alert type | String | No | The category or rule generator for the alert. Defaults
    to "Scheduled Alert" if not provided. |

    | DeviceProductField | String | Yes | Configuration mapping used by the platform
    to identify the device product field. |

    | EventClassId | String | Yes | Configuration mapping used by the platform to
    identify the event class/sub-type. |

    | Product name | String | No | The name of the product associated with the alert.
    |

    | PythonProcessTimeout | String | Yes | The maximum execution time (in seconds)
    allowed for the connector logic. |


    ### Flow Description

    1. **Initialization**: The connector starts execution, typically triggered by
    a predefined schedule in the Google SecOps environment.

    2. **Parameter Extraction**: The script retrieves the alert metadata, including
    the name, product, type, and the JSON string of custom fields.

    3. **Data Parsing**: The `Alert fields` JSON string is parsed into a Python dictionary
    to be mapped as alert extensions.

    4. **Alert Generation**: A unique UUID is generated to serve as the Ticket ID
    and Grouping Identifier. A `CaseInfo` object is then constructed using the provided
    parameters.

    5. **Event Creation**: A single internal event is generated and attached to the
    case to satisfy the SOAR data model requirements.

    6. **Ingestion**: The constructed case is returned to the SOAR platform, where
    it is ingested as a new alert, subsequently triggering any playbooks configured
    to match the specified Product and Alert Name.
