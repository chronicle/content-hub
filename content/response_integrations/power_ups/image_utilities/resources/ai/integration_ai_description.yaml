  reasoning: >-
    The image_utilities integration provides utility functions for file manipulation,
    including OCR, file format conversion, and content rasterization. These actions
    are designed to support playbook workflows by processing data locally on a Remote
    Agent. The integration does not perform security-specific tasks such as log analysis
    (SIEM), host containment (EDR), network traffic blocking (Network Security), IOC
    enrichment (Threat Intelligence), email management (Email Security), identity
    management (IAM), cloud resource management (Cloud Security), ticket management
    (ITSM), vulnerability scanning (Vulnerability Management), asset inventory management
    (Asset Inventory), or collaboration/notification tasks. Therefore, it does not
    align with any of the defined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
