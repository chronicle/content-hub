  reasoning: >-
    The image_utilities integration provides utility functions for file conversion,
    OCR, and content rasterization (screenshots). These actions are designed to support
    forensic analysis and evidence collection within a playbook workflow. They do
    not perform security-specific operations such as threat intelligence enrichment,
    network blocking, identity management, vulnerability scanning, or ITSM ticketing.
    The integration does not interact with security logs (SIEM), host processes (EDR),
    or cloud infrastructure. Consequently, it does not align with any of the defined
    product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
