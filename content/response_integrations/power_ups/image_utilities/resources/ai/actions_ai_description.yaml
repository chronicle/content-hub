Convert File:
  ai_description: >-
    ### General Description

    Converts a specified file between PNG and PDF formats. This action operates locally
    on a Remote Agent, reading a file from a given path and generating a new file
    in the requested format.


    ### Flow Description

    1. Validates that the action is executing on a Remote Agent.

    2. Extracts and validates the input file path, input format, and output format
    parameters.

    3. Verifies that the source file exists on the local file system.

    4. Converts the file from PDF to PNG using `pdf2image` or from PNG to PDF using
    `PIL` (Pillow).

    5. Saves the converted file to a temporary directory on the Remote Agent.

    6. Returns the path to the newly created file in the JSON results.


    ### Additional Notes

    - This action strictly requires a Remote Agent to function correctly.

    - For PDF to PNG conversion, the `pdftoppm` dependency (typically provided by
    the `poppler-utils` package) must be installed on the Remote Agent.
  ai_short_description: >-
    Converts a specified file between PNG and PDF formats on a Remote Agent, returning
    the path to the newly generated file.
  capabilities:
