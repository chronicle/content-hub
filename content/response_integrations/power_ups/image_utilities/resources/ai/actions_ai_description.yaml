OCR Image:
  ai_description: "### General Description\nThe **OCR Image** action performs Optical\
    \ Character Recognition (OCR) on an image to extract text content. This utility\
    \ is designed to process visual data\u2014such as screenshots of logs, error messages,\
    \ or phishing content\u2014and convert it into machine-readable text for use in\
    \ downstream playbook logic.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Base64 Encoded\
    \ Image | String | No | The base64 encoded string of the image file. If provided,\
    \ this parameter takes precedence over the 'File Path'. |\n| File Path | String\
    \ | No | The local file system path to the image file. This is used if no Base64\
    \ string is provided. |\n\n### Additional Notes\n- **Execution Environment:**\
    \ This action **must** be executed on a **Remote Agent**.\n- **System Dependencies:**\
    \ The Remote Agent's environment must have the `tesseract-ocr` package installed\
    \ (e.g., via `apt-get install -y tesseract-ocr`).\n- **Input Logic:** At least\
    \ one of the two parameters ('Base64 Encoded Image' or 'File Path') must be provided\
    \ for the action to run. If both are provided, the Base64 string is processed.\n\
    \n### Flow Description\n1. **Environment Verification:** The action checks if\
    \ it is running on a Remote Agent; if not, it raises an error.\n2. **Parameter\
    \ Extraction:** Retrieves the Base64 string or the file path from the input.\n\
    3. **Input Validation:** Ensures that at least one valid input source is available.\n\
    4. **Image Processing:** \n    - If a Base64 string is provided, it is decoded\
    \ and saved to a temporary file.\n    - If only a file path is provided, the action\
    \ targets that specific path.\n5. **OCR Extraction:** The action uses the Tesseract\
    \ OCR engine (via the `pytesseract` library) to analyze the image and extract\
    \ text.\n6. **Result Delivery:** The extracted text is cleaned (stripped of leading/trailing\
    \ whitespace) and returned as a JSON result."
