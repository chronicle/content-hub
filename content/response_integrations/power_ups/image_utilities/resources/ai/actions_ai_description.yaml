  ai_description: >-
    Converts files between PNG and PDF formats. This action is designed to run on
    a Remote Agent to access local file systems and utilize system-level conversion
    utilities. It supports bidirectional conversion between PNG images and PDF documents.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input File Format | DDL | Yes | The original format of the file to be converted.
    Supported values: PNG, PDF. |

    | Input File Path | String | Yes | The absolute path to the source file located
    on the Remote Agent's filesystem. |

    | Output File Format | DDL | Yes | The target format for the conversion. Supported
    values: PNG, PDF. Must be different from the input format. |


    ### Additional Notes

    - **Remote Agent Required**: This action must be executed on a Remote Agent. It
    will fail if run on a cloud-based environment.

    - **Dependencies**: PDF to PNG conversion requires `poppler-utils` (specifically
    `pdftoppm`) to be installed on the Remote Agent host.

    - **Output Location**: Converted files are stored in the system's temporary directory
    with a timestamped filename.


    ### Flow Description

    1. **Environment Validation**: Checks if the action is running on a Remote Agent.

    2. **Parameter Validation**: Verifies that the input file exists, the formats
    are supported, and that the input and output formats are not identical.

    3. **Path Generation**: Constructs a unique output file path in the temporary
    directory using the original filename and a current timestamp.

    4. **Conversion Logic**:
        - If converting **PDF to PNG**: Uses the `pdf2image` library to extract the
    first page of the PDF and save it as a PNG image.
        - If converting **PNG to PDF**: Uses the `Pillow` (PIL) library to convert
    the image to RGB mode and save it as a PDF document.
    5. **Result Reporting**: Returns the path of the newly created file and the output
    format in the JSON results.
