  ai_description: "Converts vector or complex content such as URLs, HTML, or Email\
    \ bodies into fixed bitmap images (PNG) or PDF documents. This action utilizes\
    \ a headless browser (Playwright) to render the content exactly as it would appear\
    \ to a user, making it ideal for capturing visual evidence of phishing sites,\
    \ formatted emails, or web reports. \n\n### Flow Description:\n1. **Validation**:\
    \ Verifies that the action is running on a Remote Agent and validates input parameters\
    \ (dimensions, timeouts, and formats).\n2. **Initialization**: Launches a headless\
    \ Chromium browser instance via Playwright.\n3. **Content Loading**: Depending\
    \ on the 'Input Type', the browser either navigates to a list of URLs or renders\
    \ provided HTML/Email content.\n4. **Rendering Control**: Waits for the specified\
    \ browser state (e.g., Network Idle) or a specific CSS selector to ensure dynamic\
    \ content is fully loaded.\n5. **Capture**: Generates a PNG screenshot and/or\
    \ a PDF document based on the 'Output Type' and 'Full Screen' settings.\n6. **Export**:\
    \ Saves the resulting files to the local file system and/or attaches them directly\
    \ to the Google SecOps case.\n\n### Parameters Description:\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Input Type | DDL\
    \ | Yes | Specifies the source format: URL, HTML, or Email. |\n| URLs or Body\
    \ | String | Yes | The actual content to process. Can be a comma-separated list\
    \ of URLs or a raw HTML/Email string. |\n| Output Type | DDL | No | The desired\
    \ format of the result: PNG, PDF, or Both. Defaults to PNG. |\n| Export Method\
    \ | DDL | No | Determines where to save the output: Case Attachment, File Path,\
    \ or Both. Defaults to Case Attachment. |\n| Width | String | Yes | The browser\
    \ viewport width in pixels. Defaults to 1920. |\n| Height | String | Yes | The\
    \ browser viewport height in pixels. Defaults to 1080. |\n| Full Screen | Boolean\
    \ | Yes | If true, the action captures the entire scrollable length of the page,\
    \ ignoring the Height parameter. |\n| Timeout | String | No | Maximum time in\
    \ seconds to wait for rendering. Max 120s. |\n| Wait For | DDL | No | The browser\
    \ state to reach before capturing (e.g., NETWORK_IDLE). |\n| Wait for Selector\
    \ | String | No | A CSS selector that must be visible before the capture occurs.\
    \ |\n\n### Additional Notes:\n- This action **requires a Remote Agent** with Playwright\
    \ and Chromium binaries installed to function.\n- If 'Full Screen' is enabled,\
    \ the 'Height' parameter is ignored for the final output."
