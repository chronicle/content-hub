Convert File:
  ai_description: >-
    ### General Description

    The **Convert File** action is a utility designed to transform files between **PNG**
    and **PDF** formats. This action is executed locally on a **Remote Agent**, allowing
    for secure file processing within the customer's environment. It is particularly
    useful for standardizing image formats for reporting, documentation, or further
    forensic analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Input File Format** | DDL | Yes | The original format of the file to be converted.
    Supported values: `PNG`, `PDF`. |

    | **Input File Path** | String | Yes | The absolute path to the source file on
    the Remote Agent's filesystem. |

    | **Output File Format** | DDL | Yes | The desired format after the conversion
    process. Supported values: `PNG`, `PDF`. |


    ### Additional Notes

    - **Remote Agent Required**: This action can only be executed on a Remote Agent.

    - **Format Mismatch**: The `Input File Format` and `Output File Format` must be
    different; otherwise, the action will fail.

    - **Dependencies**: PDF to PNG conversion requires `poppler-utils` (specifically
    the `pdftoppm` utility) to be installed on the Remote Agent. PNG to PDF conversion
    uses the `Pillow` library.

    - **PDF Conversion Scope**: When converting from PDF to PNG, the action currently
    extracts and saves only the first page of the PDF document.


    ### Flow Description

    1. **Environment Validation**: The action first verifies that it is running on
    a Remote Agent.

    2. **Parameter Validation**: It checks if the input file exists at the specified
    path and ensures that the input and output formats are not identical.

    3. **Output Path Generation**: A unique output filename is generated in the system's
    temporary directory, incorporating the original filename and a timestamp.

    4. **File Conversion**:
        - **PDF to PNG**: Uses the `pdf2image` library to render the first page of
    the PDF as a PNG image.
        - **PNG to PDF**: Uses the `Pillow` library to convert the image to RGB mode
    and save it as a PDF file.
    5. **Result Reporting**: Upon success, the action returns the path to the converted
    file and the output format in the JSON results.
