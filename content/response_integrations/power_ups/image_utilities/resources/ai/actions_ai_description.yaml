Rasterize Content:
  ai_description: >-
    ### General Description

    The Rasterize Content action converts vector or complex content, such as URLs,
    HTML, or Email bodies, into a fixed bitmap image format (PNG) or PDF. This action
    requires a Remote Agent to function correctly and utilizes Playwright to render
    the content in a headless Chromium browser.


    ### Flow Description

    1. Extracts and validates action parameters, ensuring the action is executed on
    a Remote Agent.

    2. Prepares the input data based on the selected `Input Type` (URL, HTML, or Email).

    3. Initializes Playwright and launches a headless Chromium browser context.

    4. Navigates to the provided URLs or sets the HTML/Email content within the browser
    page.

    5. Waits for the specified page state (e.g., NETWORK_IDLE) or a specific CSS selector
    to ensure the content is fully loaded.

    6. Captures a screenshot (PNG) and/or generates a PDF of the rendered content
    based on the `Output Type` and dimensions provided.

    7. Exports the generated files by attaching them to the current case or returning
    their file paths, depending on the `Export Method`.


    ### Additional Notes

    - This action requires Playwright and its Chromium dependencies to be installed
    on the Debian-based Remote Agent container.

    - If `Full Screen` is enabled, the `Height` and `Width` parameters are ignored
    for the screenshot, and the viewport is adjusted to the full scroll height of
    the page.
  ai_short_description: >-
    Converts vector or complex content (URLs, HTML, or Email) into a fixed bitmap
    image format (PNG) or PDF using a headless browser, and attaches the resulting
    files to the case or returns their file paths.
