Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity and environment readiness for the **Image\
    \ Utilities** integration. Its primary purpose is to ensure that the Google SecOps\
    \ Remote Agent is correctly configured and that all necessary local dependencies\u2014\
    specifically **Tesseract OCR** and **Playwright (Chromium)**\u2014are installed\
    \ and functional. This action is typically used during initial setup or troubleshooting\
    \ to confirm that the environment can support image processing and web content\
    \ rasterization tasks.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| N/A | N/A | N/A | This action\
    \ does not require any input parameters. |\n\n### Flow Description\n1. **Remote\
    \ Agent Validation**: The action first checks if it is being executed on a Remote\
    \ Agent. If not, it raises a `RemoteAgentRequiredError`.\n2. **Tesseract OCR Verification**:\
    \ It attempts to retrieve the version of the Tesseract OCR engine using the `pytesseract`\
    \ library. If Tesseract is missing, it provides detailed instructions on how to\
    \ install it within the container.\n3. **Playwright/Chromium Verification**: It\
    \ uses the Playwright library to attempt to launch a headless Chromium browser\
    \ instance. If the browser binaries or dependencies are missing, it raises an\
    \ error with specific installation and permission commands for the user to follow.\n\
    \n### Additional Notes\n- This action does not interact with any external APIs;\
    \ it performs local system checks on the Remote Agent container.\n- It is a prerequisite\
    \ for other actions in this integration, such as 'OCR Image' or 'Rasterize Content'."
