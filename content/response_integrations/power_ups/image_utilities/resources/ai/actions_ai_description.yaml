    ### General Description

    Validates the connectivity to the Image Utilities integration and ensures that
    the required dependencies (Tesseract OCR and Playwright) are installed on the
    Remote Agent.


    ### Flow Description

    1. Verifies that the action is being executed on a Remote Agent.

    2. Checks if the Tesseract OCR engine is installed and accessible within the environment.

    3. Checks if Playwright and its required browser binaries are installed and accessible.

    4. Returns a success message if all checks pass, or raises an error with detailed
    installation instructions if any dependency is missing.


    ### Additional Notes

    This action must be executed on a Remote Agent. It does not interact with any
    external APIs but rather validates the local environment of the Remote Agent to
    ensure subsequent actions can run successfully.
