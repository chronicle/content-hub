Rasterize Content:
  ai_description: >-
    ### General Description

    The **Rasterize Content** action converts vector or complex content (URLs, HTML,
    or Email bodies) into fixed bitmap image formats (PNG) or document formats (PDF).
    This action utilizes a headless Chromium browser (via Playwright) to render the
    content exactly as it would appear to a user, making it ideal for capturing visual
    evidence of phishing sites, suspicious emails, or dynamic web pages. **Note:**
    This action requires execution on a **Remote Agent** with the necessary browser
    binaries installed.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | **Input Type** | The type of content to be processed. Options: `URL`, `HTML`,
    `Email`. | DDL | Yes | HTML |

    | **URLs or Body** | The actual content to rasterize. Provide a comma-separated
    list for URLs, or the full body for HTML/Email. | String | Yes | - |

    | **Output Type** | The desired output format. Options: `PNG`, `PDF`, `Both`.
    | DDL | No | PNG |

    | **Export Method** | How to handle the generated files. Options: `Case Attachment`,
    `File Path`, `Both`. | DDL | No | Case Attachment |

    | **Width** | The browser viewport width in pixels. | String | Yes | 1920 |

    | **Height** | The browser viewport height in pixels. | String | Yes | 1080 |

    | **Full Screen** | If true, the action calculates the full scroll height of the
    page and captures the entire content. | Boolean | Yes | False |

    | **Timeout** | Maximum time (seconds) to wait for rendering. Max: 120. | String
    | No | 120 |

    | **Wait For** | The browser state to reach before capturing. Options: `LOAD`,
    `DOM_CONTENT_LOADED`, `NETWORK_IDLE`, `COMMIT`. | DDL | No | NETWORK_IDLE |

    | **Wait for Selector** | A CSS selector to wait for (e.g., `#content-loaded`)
    before capturing. | String | No | - |


    ### Additional Notes

    - **Remote Agent Requirement:** This action will fail if not run on a Remote Agent.
    The agent must have Playwright and Chromium dependencies installed.

    - **Full Screen Logic:** When `Full Screen` is enabled, the `Height` parameter
    is ignored as the action dynamically adjusts the viewport to match the document's
    scroll height.

    - **Exporting:** If `Case Attachment` is selected, files are uploaded to the SOAR
    case and then deleted from the agent's local storage. If `File Path` is selected,
    the local path on the agent is returned in the JSON results.


    ### Flow Description

    1. **Validation:** The action verifies it is running on a Remote Agent and validates
    all input parameters (DDL values, numeric ranges).

    2. **Initialization:** Launches a headless Chromium browser instance using Playwright.

    3. **Content Loading:** Depending on the `Input Type`, the browser either navigates
    to the provided URLs or sets the page content using the provided HTML/Email body.

    4. **Rendering Wait:** The browser waits for the specified `Wait For` state and,
    if provided, the `Wait for Selector` to become visible.

    5. **Capture:** Generates a PNG screenshot and/or a PDF document based on the
    `Output Type`. If `Full Screen` is active, it captures the entire page length.

    6. **Export:** Processes the generated files according to the `Export Method`,
    either attaching them to the case, returning the file paths, or both.
