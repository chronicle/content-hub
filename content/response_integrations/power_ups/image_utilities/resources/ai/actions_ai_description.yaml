OCR Image:
  ai_description: >-
    ### General Description

    Performs optical character recognition (OCR) to extract text from an image file.
    It processes either a base64 encoded image string or a direct file path.


    ### Flow Description

    1. Validates that the action is running on a Remote Agent.

    2. Checks if either a Base64 encoded image or a file path is provided.

    3. If a Base64 string is provided, decodes it and saves it to a temporary file.

    4. Uses the Tesseract OCR engine (`pytesseract`) to extract text from the image
    file.

    5. Returns the extracted text as a JSON result.


    ### Additional Notes

    Requires a Remote Agent with the `tesseract-ocr` package installed. If both parameters
    are provided, the Base64 encoded image takes precedence.
