  ai_description: >-
    Performs optical character recognition (OCR) to extract text from an image file.
    This action requires a Remote Agent with the tesseract-ocr package installed.


    ### Flow Description

    1. Validates that either a Base64 encoded image or a file path is provided.

    2. If a Base64 encoded image is provided, it decodes it and saves it to a temporary
    file.

    3. Uses the Tesseract OCR engine to extract text from the image file.

    4. Returns the extracted text as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Base64 Encoded Image | String | False | The base64 encoded string of the image
    file. |

    | File Path | String | False | The path to the image file. If both "Base64 Encoded
    Image" and "File Path" are provided, "Base64 Encoded Image" is processed. |


    ### Additional Notes

    Either "Base64 Encoded Image" or "File Path" must be configured for the action
    to run. This action must be executed on a Remote Agent.
