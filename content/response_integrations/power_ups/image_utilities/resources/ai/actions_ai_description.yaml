  ai_description: "Converts a specified file between PNG and PDF formats. This action\
    \ processes a local file on the execution environment and outputs the converted\
    \ file to a temporary directory. \n\n### Parameters\n| Parameter | Type | Mandatory\
    \ | Description |\n| --- | --- | --- | --- |\n| Input File Format | DDL | Yes\
    \ | The original format of the file that the action converts (PDF or PNG). |\n\
    | Input File Path | String | Yes | The local path to the file that the action\
    \ converts. |\n| Output File Format | DDL | Yes | The resulting format of the\
    \ file after the conversion process (PDF or PNG). |\n\n### Additional Notes\n\
    * **Remote Agent Required:** This action must be executed on a Remote Agent.\n\
    * **Dependencies:** Converting from PDF to PNG requires `pdftoppm` (part of `poppler-utils`)\
    \ to be installed on the Remote Agent.\n* **Validation:** The Input File Format\
    \ and Output File Format cannot be the same.\n\n### Flow Description\n1. Validates\
    \ the input parameters and ensures the action is running on a Remote Agent.\n\
    2. Verifies that the source file exists at the provided `Input File Path`.\n3.\
    \ Converts the file from the input format to the output format using `pdf2image`\
    \ (for PDF to PNG) or `PIL` (for PNG to PDF).\n4. Saves the converted file to\
    \ a temporary directory with a timestamped filename.\n5. Returns the path to the\
    \ newly created file in the JSON results."
