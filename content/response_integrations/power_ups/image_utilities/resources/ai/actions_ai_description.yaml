    reasoning: >-
      The action renders URLs or HTML content into images or PDFs. This does not match
      any of the predefined action outcome categories such as enriching IOCs/assets,
      updating alerts, creating tickets, blocking IOCs, or downloading specific files
      from a remote host.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The Rasterize Content action converts vector or complex content, such as URLs,
    HTML, or Email bodies, into a fixed, bitmap image format (PNG) or a PDF document.
    This action utilizes a headless browser (Playwright) to render the content and
    capture the output. It requires execution on a Remote Agent.


    ### Flow Description

    1. Validates the input parameters and ensures the action is running on a Remote
    Agent.

    2. Prepares the input data based on the selected `Input Type` (URL, HTML, or Email).

    3. Initializes a Playwright browser context with the specified viewport dimensions.

    4. Navigates to the provided URLs or sets the HTML/Email content in the browser.

    5. Waits for the page to reach the specified state (`Wait For`) or for a specific
    CSS selector to appear (`Wait for Selector`).

    6. Captures a screenshot (PNG) and/or generates a PDF document based on the `Output
    Type`.

    7. Exports the generated files by attaching them to the current case or saving
    them to a local file path, depending on the `Export Method`.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Input Type | Yes | DDL | The type of content to rasterize (URL, HTML, Email).
    |

    | URLs or Body | Yes | String | The input content. If URL, provide a comma-separated
    list. If HTML/Email, provide the full body. |

    | Output Type | No | DDL | The resulting output format (PNG, PDF, Both). Default
    is PNG. |

    | Export Method | No | DDL | The method to output the generated content (Case
    Attachment, File Path, Both). Default is Case Attachment. |

    | Width | Yes | String | The width in pixels for the generated raster content.
    Default is 1920. |

    | Height | Yes | String | The height in pixels for the generated raster content.
    Default is 1080. |

    | Full Screen | Yes | Boolean | If true, renders across the entire browser window
    before rasterizing, ignoring Height and Width. Default is false. |

    | Timeout | No | String | Maximum time in seconds the browser dedicates to rendering
    before rasterization. Default is 120. |

    | Wait For | No | DDL | The specific state the browser must reach before rasterization
    (LOAD, DOM_CONTENT_LOADED, NETWORK_IDLE, COMMIT). Default is NETWORK_IDLE. |

    | Wait for Selector | No | String | A CSS selector to wait for before capturing
    the screenshot. Recommended for dynamically loading pages. |


    ### Additional Notes

    - This action requires a Remote Agent to function correctly.

    - If `Full Screen` is enabled, the `Height` and `Width` parameters will be ignored
    for the screenshot.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Attaches the generated rasterized files (PNG/PDF) to the current case.
    reasoning: >-
      The action fetches data by navigating to URLs or rendering HTML content using
      a headless browser. It does not mutate external data. It mutates internal data
      by attaching the generated files (PNG/PDF) to the current case. It does not
      update entities, create insights, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data but mutates internal data by attaching files to the
      case, which is not in the allowed list of internal mutations for enrichment.
      Furthermore, it generates and saves files, which disqualifies it from being
      an enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
