  ai_description: >-
    The OCR Image action performs optical character recognition (OCR) on an image
    file to extract text. This action requires a Remote Agent with the `tesseract-ocr`
    package installed.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 Encoded Image | string | false | The base64 encoded string of the image
    file. |

    | File Path | string | false | The path to the image file. |


    ### Additional Notes

    Either "Base64 Encoded Image" or "File Path" must be provided. If both are provided,
    "Base64 Encoded Image" takes precedence. This action must be executed on a Remote
    Agent.


    ### Flow Description

    1. Validate that the action is running on a Remote Agent.

    2. Extract and validate the input parameters ("Base64 Encoded Image" or "File
    Path").

    3. If "Base64 Encoded Image" is provided, decode it and save it to a temporary
    file.

    4. If "File Path" is provided, use the file directly.

    5. Execute the Tesseract OCR engine on the image file to extract text.

    6. Return the extracted text in the action results.
