  ai_description: >-
    The **Rasterize Content** action converts vector or complex content (URLs, HTML,
    or Email bodies) into bitmap image formats (PNG or PDF) using a headless browser
    (Playwright). This action is useful for capturing visual evidence of web content
    for forensic analysis or documentation.


    ### Flow Description

    1. **Validation**: The action validates all input parameters and ensures it is
    running on a Remote Agent.

    2. **Preparation**: It prepares the input content based on the selected `Input
    Type` (URL, HTML, or Email).

    3. **Initialization**: It initializes a Playwright browser instance.

    4. **Rendering**: It navigates to the URL or sets the HTML content, waits for
    the specified state (e.g., `NETWORK_IDLE`) or a CSS selector, and renders the
    page.

    5. **Rasterization**: It captures a screenshot (PNG) or generates a PDF based
    on the `Output Type`.

    6. **Export**: It exports the generated files based on the `Export Method` (attaching
    them to the current case or returning the file path).

    7. **Cleanup**: It closes the browser instance.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `Input Type` | DDL | Yes | The type of content to rasterize (URL, HTML, Email).
    |

    | `URLs or Body` | String | Yes | The content to be rasterized (URL list or content
    body). |

    | `Output Type` | DDL | No | The output format (PNG, PDF, Both). Default: PNG.
    |

    | `Export Method` | DDL | No | The method to output the content (Case Attachment,
    File Path, Both). Default: Case Attachment. |

    | `Width` | String | Yes | The width in pixels. Default: 1920. |

    | `Height` | String | Yes | The height in pixels. Default: 1080. |

    | `Full Screen` | Boolean | Yes | If true, renders the entire page. Default: false.
    |

    | `Timeout` | String | No | Max time in seconds for rendering. Default: 120. |

    | `Wait For` | DDL | No | Browser state to wait for (LOAD, DOM_CONTENT_LOADED,
    NETWORK_IDLE, COMMIT). Default: NETWORK_IDLE. |

    | `Wait for Selector` | String | No | CSS selector to wait for before capturing.
    |


    ### Additional Notes

    This action requires a Remote Agent to function, as it relies on Playwright browser
    binaries.
