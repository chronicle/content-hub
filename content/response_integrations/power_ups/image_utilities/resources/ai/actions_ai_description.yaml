  ai_description: >-
    ### General Description

    The Convert File action is a utility that converts files between PNG and PDF formats.
    This action is designed to normalize file types for further analysis or reporting
    within the SOAR platform. It performs the conversion locally on a Remote Agent.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input File Format | DDL | Yes | The original format of the file (PNG or PDF).
    |

    | Input File Path | String | Yes | The path to the file that the action converts.
    |

    | Output File Format | DDL | Yes | The resulting format of the file after the
    conversion process (PNG or PDF). |


    ### Additional Notes

    * This action requires a Remote Agent to function correctly.

    * The input and output file formats cannot be the same.

    * The action relies on `pdf2image` (which requires `pdftoppm` to be installed)
    for PDF to PNG conversion and `PIL` (Pillow) for PNG to PDF conversion.


    ### Flow Description

    1. The action validates that it is running on a Remote Agent.

    2. It extracts the `Input File Path`, `Input File Format`, and `Output File Format`
    parameters.

    3. It verifies the existence of the source file at the provided path.

    4. It validates that the input and output formats are different.

    5. It determines the conversion logic based on the requested output format (PDF
    to PNG or PNG to PDF).

    6. It performs the conversion using the appropriate library (`pdf2image` or `PIL`).

    7. It saves the converted file to a temporary directory and returns the path of
    the new file in the JSON results.
