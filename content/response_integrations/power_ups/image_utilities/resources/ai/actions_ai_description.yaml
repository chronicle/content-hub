  ai_description: >-
    ### General Description

    The **OCR Image** action performs Optical Character Recognition (OCR) to extract
    text from image files. This utility is designed to help analysts process visual
    data such as screenshots or scanned documents directly within their playbooks.
    It requires the Tesseract OCR engine to be installed on a Remote Agent.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base64 Encoded Image | String | No | The base64 encoded string of the image
    file to be processed. |

    | File Path | String | No | The local file system path to the image file on the
    Remote Agent. |


    ### Additional Notes

    * **Requirement:** This action can only be executed on a **Remote Agent**.

    * **Dependency:** The `tesseract-ocr` package must be installed in the Remote
    Agent environment (e.g., `apt-get install -y tesseract-ocr`).

    * **Logic:** Either the 'Base64 Encoded Image' or the 'File Path' must be provided.
    If both are supplied, the action will prioritize the 'Base64 Encoded Image'.


    ### Flow Description

    1. **Environment Validation:** Checks if the action is running on a Remote Agent.

    2. **Parameter Extraction:** Retrieves the Base64 string or the file path from
    the input.

    3. **Input Validation:** Ensures that at least one valid image source is provided.

    4. **Image Processing:** If Base64 is provided, it decodes the data and saves
    it to a temporary file. Otherwise, it uses the provided file path.

    5. **OCR Execution:** Invokes the Tesseract OCR engine via the `pytesseract` library
    to extract text from the image.

    6. **Result Delivery:** Returns the extracted text in the `extracted_text` field
    of the JSON results.
