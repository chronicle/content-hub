product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration 'group_ib_ti' is designed to interface with the Group-IB Threat
    Intelligence platform. Its primary capabilities include enriching case entities
    (IPs, Domains, Hashes) with threat intelligence data such as reputation, malware
    associations, and threat actor information, which directly aligns with the 'Threat
    Intelligence' category. The connectors provided are responsible for ingesting
    threat feeds (IoCs) into the SOAR platform to generate alerts, which is a core
    function of a Threat Intelligence integration. The integration does not perform
    EDR, Network Security, IAM, ITSM, Cloud Security, Vulnerability Management, Asset
    Inventory, or Collaboration tasks. While it ingests data, it does not perform
    the log searching or timeline generation functions defined for the 'SIEM' category,
    so SIEM is marked as false.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
