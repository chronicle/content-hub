  network_security: false
  reasoning: >-
    The integration 'group_ib_ti' is primarily classified as Threat Intelligence because
    it provides multiple enrichment actions (e.g., 'Get-Graph-Info', 'Get-TI-Search-Info')
    that query the Group-IB database to retrieve reputation, malware family names,
    and historical data for indicators like IPs, domains, and hashes. Furthermore,
    the integration qualifies as SIEM because it includes connectors ('TI IoC Hash
    Connector', 'TI IoC IP Connector') that ingest threat feeds and automatically
    create alerts within the Google SecOps platform, enabling proactive monitoring
    and detection of malicious activity. It does not perform actions related to EDR
    (host containment), Network Security (firewall management), Email Security, IAM,
    Cloud Security, ITSM, Vulnerability Management, Asset Inventory, or Collaboration.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
