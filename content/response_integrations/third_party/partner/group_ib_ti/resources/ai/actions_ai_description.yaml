Get-Graph-Info:
  ai_description: >-
    ### General Description

    The **Get-Graph-Info** action retrieves WHOIS and relationship graph information
    for **IP Address** and **Domain** entities from the Group-IB Threat Intelligence
    (TI) platform. This action is designed to provide analysts with infrastructure
    context and potential connections between indicators to aid in threat investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Flow Description

    1. **Entity Identification**: The action iterates through all entities attached
    to the alert/case.

    2. **Type Validation**: It uses an internal validator to identify which entities
    are valid IPs or Domains. Any other entity types (e.g., File Hashes, URLs) are
    ignored.

    3. **API Request**: For each valid IP or Domain, the action sends a GET request
    to the Group-IB TI `utils/graph` endpoint using the entity identifier as a query
    parameter.

    4. **Data Aggregation**: The action collects the API responses, including WHOIS
    data and graph metadata, into a structured JSON object.

    5. **Result Output**: The final aggregated data is attached to the action's JSON
    result for use in playbooks or for manual review by an analyst.


    ### Additional Notes

    - **Rate Limiting**: The action includes a 1-second sleep interval between requests
    to ensure compliance with API rate limits.

    - **Scope**: This action is strictly for enrichment and does not modify any external
    or internal system states beyond providing the retrieved data.
  capabilities:
    can_create_case_comments: false
