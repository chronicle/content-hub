Get-TI-Search-Info:
  ai_description: >-
    ### General Description

    The **Get-TI-Search-Info** action allows analysts to search the Group-IB Threat
    Intelligence (TI) database for comprehensive information regarding specific indicators.
    It supports searching for IP addresses, domains, file hashes, email addresses,
    and bank card numbers. The action identifies which collections in the Group-IB
    TI database contain information about the provided entities and retrieves the
    relevant records, providing deep context from various threat intelligence feeds.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enable mapping parser | Boolean | No | If set to `true`, the action will use
    a predefined mapping parser to structure the retrieved data into a more readable
    format based on the collection type. If `false` (default), the raw JSON items
    from the API are returned. |


    ### Flow Description

    1. **Initialization**: The action initializes the connection to Group-IB TI using
    the provided API credentials and configuration.

    2. **Entity Identification**: It iterates through all target entities in the current
    context and uses a validator to determine their type (e.g., IP, Domain, Hash,
    Email, or Bank Card) based on the format of their identifier.

    3. **Global Search**: For each identified entity, it performs a global search
    across the Group-IB TI platform to find all collections (API paths) that contain
    data for that specific indicator.

    4. **Data Retrieval**: For every collection found, the action queries the database
    to fetch the detailed records associated with the entity using a query formatted
    as `type:value`.

    5. **Parsing and Output**: The retrieved data is either parsed using the mapping
    engine (if enabled) or collected as raw items. The final results are aggregated
    into a single JSON object and attached to the action result.


    ### Additional Notes

    - This action is primarily used for deep enrichment and cross-collection searching
    within the Group-IB ecosystem.

    - A 1-second delay is implemented between API calls to ensure compliance with
    API rate limits.
