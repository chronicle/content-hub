Get-Collection-Info-Async:
  ai_description: "Fetches threat intelligence data from specific Group-IB TI collections.\
    \ This action is designed for bulk data retrieval or periodic updates rather than\
    \ per-entity enrichment. It utilizes sequence update numbers to track progress,\
    \ allowing it to be run on a schedule (e.g., daily) to retrieve only new updates\
    \ since the last execution. The action retrieves data from a wide variety of collections\
    \ including APT threats, malware configurations, compromised accounts, and suspicious\
    \ IP lists.\n\n### Flow Description:\n1. **Initialization**: Initializes the Group-IB\
    \ TI connector and poller using provided API credentials.\n2. **State Retrieval**:\
    \ Attempts to fetch the last successful sequence update number from the internal\
    \ storage (timestamp). \n3. **Start Point Determination**: If no previous state\
    \ is found, it calculates the starting sequence number based on the provided 'Start\
    \ date' (defaulting to 1 day ago if not specified).\n4. **Data Retrieval**: Initiates\
    \ a request to the Group-IB TI API for the chosen 'Collection', limited by the\
    \ 'Portion limit' parameter.\n5. **Data Processing**: Iterates through the retrieved\
    \ data portions. If 'Enable mapping parser' is true, it applies predefined mapping\
    \ logic to structure the data; otherwise, it collects the raw JSON items.\n6.\
    \ **Output**: Aggregates all retrieved items into a single JSON result and completes\
    \ the action.\n\n### Parameters Description:\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| Enable mapping parser | Boolean\
    \ | No | If enabled, the action will parse the raw API response into a structured\
    \ format based on Group-IB's internal mapping keys. Default is false. |\n| Collection\
    \ | DDL | Yes | The specific threat intelligence collection to query (e.g., 'apt/threat',\
    \ 'malware/cnc', 'compromised/account_group'). |\n| Start date | String | No |\
    \ The date (YYYY-MM-DD) to start fetching data from if no previous execution state\
    \ (timestamp) exists. |\n| Portion limit | DDL | Yes | Controls the volume of\
    \ data retrieved by setting the maximum number of portions to fetch in a single\
    \ run. Default is 100. |\n\n### Additional Notes:\n- This action **ignores all\
    \ entities** in the case. It is intended to be used as a data-gathering task within\
    \ a playbook.\n- The action is asynchronous and uses internal state management\
    \ (timestamps) to ensure data continuity across multiple runs."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
