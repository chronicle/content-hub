  ai_description: >-
    Extracts threat intelligence data from the Group-IB TI database based on a chosen
    collection. This action is designed to retrieve fresh updates and can be scheduled
    to run periodically. It does not operate on specific entities but rather downloads
    a feed or collection of data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Enable mapping parser | Boolean | False | Enables or disables the mapping parser
    before returning the JSON output. |

    | Collection | Dropdown | True | The specific threat intelligence collection to
    download (e.g., apt/threat, malware/cnc). |

    | Start date | String | False | The start date to download collection data from,
    in YYYY-MM-DD format. If not provided, it defaults to 1 day back or uses the timestamp
    from the previous execution. |

    | Portion limit | Dropdown | True | Controls the number of received portions from
    the TI Portal API per action run. |


    ### Action Flow

    1. Initializes the Group-IB TI connector and poller.

    2. Determines the sequence update number based on the provided `Start date` or
    the timestamp from the previous execution.

    3. Creates an update generator to fetch the collection data from the Group-IB
    TI API in portions.

    4. Iterates over the fetched portions and parses the data (applying mapping keys
    if `Enable mapping parser` is true).

    5. Aggregates the parsed data and attaches it to the action's JSON result.
