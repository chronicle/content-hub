Get-Collection-Info-Async:
  ai_description: >-
    ### General Description

    Retrieves threat intelligence data from the Group-IB TI database for a specified
    collection. This action is designed to fetch fresh updates from the TI portal
    and return them as a JSON object.


    ### Flow Description

    1. Extracts the action parameters, including the collection name, start date,
    portion limit, and mapping parser flag.

    2. Initializes the Group-IB API poller and retrieves the sequence update number
    based on the start date or a previously fetched timestamp.

    3. Creates an update generator to fetch data portions from the Group-IB API.

    4. Iterates through the data portions, optionally parsing them using mapping keys
    if the mapping parser is enabled.

    5. Aggregates the results and attaches them to the action result as a JSON object.


    ### Additional Notes

    This action does not operate on specific entities. It is designed to run periodically
    to fetch fresh updates from the Group-IB TI database.
  ai_short_description: >-
    Retrieves threat intelligence data from the Group-IB TI database for a specified
    collection and returns the results as a JSON object.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Group-IB TI API using a GET request. It does
      not mutate external data, update internal entities, create insights, modify
      alert data, or create case comments.
