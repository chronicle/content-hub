  ai_description: >-
    ### General Description

    Extracts threat intelligence data from the Group-IB TI database. This action retrieves
    specific collections of threat data (e.g., APT threats, malware, phishing kits)
    based on a sequence update number or a provided start date. It does not operate
    on specific entities.


    ### Flow Description

    1. Initialize the Group-IB connector and poller.

    2. Determine the starting sequence update number, either by fetching the last
    timestamp from storage or using the provided 'Start date'.

    3. Create a data generator to fetch portions of the requested collection from
    the Group-IB TI API.

    4. Iterate through the data portions, optionally applying a mapping parser if
    enabled.

    5. Aggregate the parsed or raw data into a JSON result and add it to the action
    output.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enable mapping parser | boolean | No | If enabled, parses the raw data using
    predefined mapping keys. Defaults to false. |

    | Collection | ddl | Yes | The specific Group-IB TI collection to download (e.g.,
    apt/threat, malware/malware). |

    | Start date | string | No | The date to start downloading collection data from
    (format: YYYY-MM-DD). |

    | Portion limit | ddl | Yes | Controls the number of data portions returned from
    the API. Defaults to 100. |


    ### Additional Notes

    This action is designed for data ingestion and does not interact with specific
    entities in the case. It is intended to be used for periodic synchronization of
    threat intelligence data.
  capabilities:
