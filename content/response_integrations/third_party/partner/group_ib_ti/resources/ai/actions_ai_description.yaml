Get-TI-Search-Info-By-Collection:
  ai_description: "Searches the Group-IB Threat Intelligence (TI) database for information\
    \ related to specific entities within a chosen collection. This action allows\
    \ analysts to query a wide variety of TI data\u2014including threat actors, malware\
    \ configurations, phishing kits, and compromised accounts\u2014directly from Google\
    \ SecOps. It supports 31 distinct collections and provides an optional mapping\
    \ parser to structure the raw API response into a more readable format.\n\n###\
    \ Parameters Description\n\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| Collection | DDL | Yes | Specifies the Group-IB\
    \ TI collection to search (e.g., `apt/threat`, `malware/cnc`, `suspicious_ip/tor_node`).\
    \ |\n| Enable mapping parser | Boolean | No | If set to `true`, the action will\
    \ use predefined mapping keys to parse the raw JSON output into a structured format.\
    \ Default is `false`. |\n| Search tag | String | No | Allows for targeted field\
    \ searches. If provided, the query is formatted as `tag:entity` (e.g., `domain:google.com`).\
    \ If empty, a general search is performed. |\n\n### Flow Description\n\n1. **Initialization**:\
    \ The action initializes the Group-IB TI poller using the integration's API credentials\
    \ and configuration.\n2. **Parameter Extraction**: It retrieves the selected `Collection`,\
    \ the `Search tag`, and the `Enable mapping parser` toggle.\n3. **Entity Processing**:\
    \ The action iterates through all target entities provided in the context.\n4.\
    \ **Query Construction**: For each entity, it constructs a search query. If a\
    \ `Search tag` is specified, it prefixes the entity identifier with the tag; otherwise,\
    \ it uses the raw identifier.\n5. **Data Retrieval**: It queries the Group-IB\
    \ TI API for the specified collection and query string, retrieving up to 3,000\
    \ results.\n6. **Parsing**: If the mapping parser is enabled, the action transforms\
    \ the raw API items into a structured format based on the integration's mapping\
    \ configuration.\n7. **Output**: The aggregated results from all entities are\
    \ added to the action's JSON result and returned to the platform.\n\n### Additional\
    \ Notes\n\n- This action is primarily used for deep-dive threat intelligence lookups\
    \ across Group-IB's extensive database of cybercriminal activity and compromised\
    \ data.\n- The `Collection` parameter is a dropdown list containing 31 specific\
    \ categories of intelligence."
