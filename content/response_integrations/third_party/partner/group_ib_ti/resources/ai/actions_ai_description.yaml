  ai_description: >-
    Retrieves threat intelligence data from specific Group-IB TI collections. This
    action is designed to fetch updates from the TI portal, utilizing a sequence-based
    tracking system (timestamps) to ensure only new data is ingested in subsequent
    runs. It operates independently of SecOps entities, making it suitable for scheduled
    playbooks that sync threat intelligence feeds into the platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enable mapping parser | boolean | No | If enabled, the action will parse the
    raw API response using predefined mapping keys for the collection to provide a
    structured output. |

    | Collection | ddl | Yes | The specific Group-IB TI collection to download (e.g.,
    apt/threat, malware/cnc, compromised/account_group). |

    | Start date | string | No | The date (YYYY-MM-DD) to begin fetching data from
    if no previous checkpoint (timestamp) exists. |

    | Portion limit | ddl | Yes | The maximum number of data portions to retrieve
    from the API in a single execution run. |


    ### Additional Notes

    - This action ignores any input entities and uses the input entity only as a start
    trigger.

    - It uses internal storage via `fetch_timestamp` to track the last retrieved sequence
    number, allowing for incremental updates and preventing duplicate data ingestion.


    ### Flow Description

    1. **Initialization**: The action initializes and extracts user-defined parameters
    including the target collection, portion limits, and parsing preferences.

    2. **Checkpoint Retrieval**: It checks for a stored sequence update number (timestamp)
    from a previous execution to determine the starting point for the fetch.

    3. **Fallback Logic**: If no previous timestamp is found, it calculates a starting
    sequence number based on the provided 'Start date' or defaults to one day ago.

    4. **API Connection**: Establishes a connection to the Group-IB TI API and initializes
    a data generator for the selected collection.

    5. **Data Ingestion**: Fetches data in portions, optionally applying a mapping
    parser to transform raw API items into standardized JSON objects.

    6. **Result Aggregation**: Aggregates all retrieved items into a single JSON result
    and completes the task.
