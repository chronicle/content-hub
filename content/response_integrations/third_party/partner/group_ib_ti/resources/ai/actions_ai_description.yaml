  ai_description: >-
    ### General Description

    Retrieves WHOIS and relationship graph information for IP and Domain entities
    from Group-IB Threat Intelligence. This action helps analysts understand the infrastructure,
    ownership details, and potential connections associated with network indicators
    by querying the Group-IB TI Graph API.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the Group-IB TI poller using the
    integration's configuration (API login, key, and URL).

    2. **Entity Identification**: It identifies all entities associated with the current
    context.

    3. **Filtering**: The action filters the entities, processing only those identified
    as IP addresses or Domains (using an internal validator).

    4. **Data Retrieval**: For each valid entity, it sends a request to the Group-IB
    TI Graph API endpoint (`utils/graph/{type}`) to fetch WHOIS and connectivity data.

    5. **Result Aggregation**: The API responses are collected and formatted into
    a structured JSON result object.

    6. **Completion**: The aggregated JSON is attached to the action output, and the
    action completes with a success status.
