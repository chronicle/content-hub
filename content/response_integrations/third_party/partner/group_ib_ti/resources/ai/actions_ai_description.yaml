Ping:
  ai_description: >-
    Tests the connectivity to the Group-IB Threat Intelligence service. This action
    validates the provided API credentials (API Login, API Key, and API URL) and retrieves
    a list of all data collections accessible under the current subscription. It is
    primarily used for troubleshooting and verifying that the integration is correctly
    configured.


    ### Flow Description:

    1. **Initialization**: The action initializes the Siemplify context and sets the
    script name.

    2. **Configuration Retrieval**: It retrieves the integration's global configuration
    parameters, including the API login, API key, and API URL.

    3. **API Connection**: It initializes the Group-IB TI adapter and poller to establish
    a session with the external service.

    4. **Data Retrieval**: The action sends a GET request to the `user/granted_collections`
    endpoint to verify access.

    5. **Result Processing**: If successful, the list of granted collections is added
    to the action's JSON results. If the request fails, an error message is logged
    and the action status is set to failed.

    6. **Completion**: The action ends by reporting the connectivity status and an
    output message.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes:

    - This action relies on the global integration configuration for authentication.

    - The JSON output provides visibility into which Group-IB TI collections (e.g.,
    `apt/threat`, `malware/cnc`) are available for the configured account.
