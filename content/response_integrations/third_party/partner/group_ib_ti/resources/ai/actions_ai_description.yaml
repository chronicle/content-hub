    5. **Data Retrieval**: It queries the Group-IB TI API for the selected collection
    using the constructed query.

    6. **Result Processing**: The retrieved data is parsed (if the mapping parser
    is enabled) and added to the action's result JSON, which is then returned to the
    SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `Collection` | DDL | Yes | The specific threat intelligence collection to query
    (e.g., `apt/threat`, `malware/malware`). |

    | `Enable mapping parser` | Boolean | No | If set to true, the action uses a mapping
    parser to format the output data. Defaults to false. |

    | `Search tag` | String | No | An optional tag to prefix the search query (e.g.,
    `domain`). If provided, the query format becomes `tag:entity`. |


    ### Additional Notes

    This action does not modify any external systems or internal case data; it is
    strictly an enrichment/search action. It supports a wide variety of entity types,
    which are automatically detected and processed.
