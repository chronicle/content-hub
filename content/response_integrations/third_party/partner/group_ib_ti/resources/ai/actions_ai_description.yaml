  ai_description: >-
    ### General Description

    Tests connectivity to the Group-IB Threat Intelligence API and retrieves a list
    of available data collections based on the user's subscription. This action is
    used to verify that the integration is correctly configured and to identify which
    threat intelligence feeds are accessible to the current account.


    ### Parameters Description

    | Parameter | Description | Expected Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | N/A | This action does not take any input parameters. | N/A | N/A |


    ### Additional Notes

    - This action relies solely on the integration's global configuration parameters
    (API Login, API Key, and API URL).

    - The output includes a JSON object containing the available collections, which
    helps analysts understand the scope of data available for enrichment and automated
    connectors.


    ### Flow Description

    1. **Initialize Connection**: The action retrieves the API Login, API Key, and
    API URL from the integration configuration.

    2. **Request Collections**: It sends a GET request to the Group-IB `user/granted_collections`
    endpoint.

    3. **Process Response**: The action parses the JSON response from the API containing
    the list of authorized collections.

    4. **Finalize**: If successful, it returns a 'Connection Established' message
    and attaches the list of granted collections to the action results. If the request
    fails, it reports the specific error encountered.
