  ai_description: >-
    Searches the Group-IB Threat Intelligence (TI) database for comprehensive information
    regarding various entity types, including Domains, IP Addresses, File Hashes,
    Bank Cards, and Email addresses. This action acts as a global search tool that
    identifies which TI collections contain data about the target entities and then
    retrieves the specific records from those collections.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enable mapping parser | Boolean | No | Determines whether the action should
    parse the retrieved TI data using predefined mapping keys (`true`) or return the
    raw data items (`false`). Default is `false`. |


    ### Flow Description


    1. **Initialize Connection**: Sets up the Group-IB TI poller using the integration's
    API credentials (Login, Key, and URL).

    2. **Entity Processing**: Iterates through all entities associated with the current
    context.

    3. **Type Validation**: For each entity, it uses a validator to determine if the
    identifier corresponds to a supported type (Domain, IP, Hash, Email, or Credit
    Card). It also handles URLs by extracting the host domain or IP.

    4. **Discovery**: Executes a global search for each valid entity to discover which
    specific TI collections (e.g., `apt/threat`, `malware/cnc`, `compromised/bank_card_group`)
    contain relevant information.

    5. **Data Extraction**: For each discovered collection, it queries the Group-IB
    database to retrieve detailed records, applying a limit of 3000 items per collection.

    6. **Formatting**: If the "Enable mapping parser" parameter is enabled, it transforms
    the raw API response into a structured format based on internal mapping configurations.

    7. **Output**: Aggregates all findings into a comprehensive JSON object, organized
    by collection name, and returns it as the action's result.


    ### Additional Notes


    - The action includes built-in rate limiting (1-second sleeps) between API calls
    to ensure stability.

    - This action is primarily used for data gathering; it does not automatically
    update entity attributes or create insights within the platform. The retrieved
    data is intended for use by subsequent playbook steps via the `JsonResult`.
