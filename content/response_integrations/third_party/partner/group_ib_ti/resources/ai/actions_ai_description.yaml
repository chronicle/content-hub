      It does not perform any write operations to external systems (can_mutate_external_data=false).
      It does not modify internal SOAR data, update entities, create insights, or
      add case comments (all mutation flags=false).
  categories:
    enrichment: false
    reasoning: >-
      While the action fetches data, it does not perform enrichment on specific entities
      or alerts. It is a data retrieval action for threat intelligence feeds, not
      an enrichment action as defined by the criteria.
