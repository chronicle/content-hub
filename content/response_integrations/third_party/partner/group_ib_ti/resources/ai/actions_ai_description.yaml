      The action fetches data from the Group-IB TI API (fetches_data=true). It does
      not mutate external data (can_mutate_external_data=false) or internal data (can_mutate_internal_data=false).
      It does not update entities, create insights, modify alert data, or create case
      comments.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data from an external source but does not perform enrichment
      on specific entities or alerts. It is a data retrieval action, not an enrichment
      action.
  entity_usage:
