  ai_description: >-
    ### General Description

    Retrieves WHOIS and graph information for IP addresses and domains using the Group-IB
    Threat Intelligence service. This action provides contextual intelligence to help
    analysts understand the relationships and background of specific indicators.


    ### Flow Description

    1. **Initialization**: The action initializes the Group-IB connector to establish
    a connection with the Threat Intelligence API.

    2. **Entity Gathering**: It retrieves all target entities from the current case.

    3. **Validation**: Each entity is validated to ensure it is either an IP address
    or a domain. Unsupported entity types are skipped.

    4. **Data Retrieval**: For each valid entity, the action queries the Group-IB
    API (`utils/graph/{type}`) to fetch relevant graph information.

    5. **Result Aggregation**: The retrieved data is aggregated into a JSON object.

    6. **Output**: The final JSON result is attached to the action, making it available
    for the playbook and the analyst.


    ### Parameters

    There are no specific input parameters for this action; it relies on the integration's
    configured API credentials and the entities present in the case.
