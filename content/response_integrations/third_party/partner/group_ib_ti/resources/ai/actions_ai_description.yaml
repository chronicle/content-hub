  ai_description: >-
    Searches the Group-IB Threat Intelligence (TI) database for information related
    to specific entities within a chosen collection. This action allows analysts to
    retrieve deep contextual data on indicators such as IPs, Domains, Hashes, URLs,
    Emails, and Credit Cards by querying specialized Group-IB collections (e.g., APT
    threats, malware configs, compromised accounts). It supports optional data mapping
    to transform raw API responses into a structured format and allows for targeted
    searches using specific tags.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Collection | DDL | Yes | The specific Group-IB TI collection to search within
    (e.g., `apt/threat`, `malware/cnc`, `compromised/account_group`). |

    | Enable mapping parser | Boolean | No | If enabled, the action will parse the
    raw API response using predefined mapping keys to provide a more structured output.
    Default is `false`. |

    | Search tag | String | No | Allows for targeted field searches. If provided,
    the query is formatted as `tag:entity` (e.g., `domain:google.com`). If empty,
    a general search is performed. |


    ### Additional Notes

    - The action automatically detects the entity type (IP, Domain, Hash, etc.) from
    the entity identifier to optimize the search query.

    - The `Enable mapping parser` parameter is treated as a string comparison in the
    logic; ensure the boolean value is passed correctly from the playbook.


    ### Flow Description

    1. **Initialization**: Retrieves the user-defined parameters: `Collection`, `Enable
    mapping parser`, and `Search tag`.

    2. **Entity Processing**: Iterates through the target entities in the case and
    uses an internal validator to determine their specific type (e.g., converting
    a URL to its underlying domain or IP).

    3. **Query Construction**: For each valid entity, constructs a search query. If
    a `Search tag` is provided, it prefixes the entity identifier with the tag.

    4. **API Interaction**: Calls the Group-IB TI API using a poller to search the
    specified `Collection` with the constructed query, limited to 3000 results.

    5. **Data Parsing**: Depending on the `Enable mapping parser` setting, either
    parses the results into a structured format or retrieves the raw JSON items.

    6. **Output**: Aggregates all findings and attaches them to the action result
    as a JSON object.
