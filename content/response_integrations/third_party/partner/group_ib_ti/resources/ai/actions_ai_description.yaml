Get-Graph-Info:
  ai_description: >-
    ### General Description

    Retrieves graph and WHOIS information for IP Address, Domain, and URL entities
    using Group-IB TI. The action parses the entity identifiers to determine their
    type and fetches relevant threat intelligence graph data.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Validates and parses each entity's identifier to determine if it is an IPv4
    address, a domain, or a URL (extracting the network location).

    3. Filters out entities that do not resolve to an IP address or domain.

    4. Sends an API request to the Group-IB TI `utils/graph/{type}` endpoint for each
    valid entity to retrieve graph information.

    5. Aggregates the retrieved graph data and attaches it to the action's JSON result.


    ### Additional Notes

    The action relies on the format of the entity identifier rather than its strict
    SecOps entity type to determine if it should be processed.
