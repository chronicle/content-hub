TI IoC Hash Connector:
  ai_description: >-
    ### General Description

    The TI IoC Hash Connector integrates Google SecOps with the Group-IB Threat Intelligence
    (TI) portal. Its primary purpose is to automatically retrieve Indicators of Compromise
    (IoCs), specifically file hashes, from the Group-IB TI platform. By ingesting
    these hashes as alerts, the connector enables security teams to proactively monitor
    for malicious file activity within their environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API key | Password | Yes | API key generated at your Group-IB TI Profile. |

    | API login | Email | Yes | Email address used to access the Group-IB TI Portal.
    |

    | API URL | String | Yes | The URL for the Group-IB TI Portal. |

    | Case name | String | Yes | The name to display for the created case. |

    | Case severity | String | Yes | The severity level for the case (Informative,
    Low, Medium, High, Critical). |

    | Case type | String | Yes | The case type to trigger an action. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name.
    |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | Start date | String | No | Start date for data collection (YYYY-MM-DD). Defaults
    to one day back if not provided. |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates. |


    ### Flow Description

    1. The connector initializes a connection to the Group-IB TI API using the provided
    credentials and configuration.

    2. It retrieves the last processed sequence update number from local storage to
    ensure incremental data ingestion.

    3. If no previous state is found, it uses the configured `Start date` (or defaults
    to one day back) to fetch initial data.

    4. It queries the `ioc/common` collection from the Group-IB TI portal.

    5. The retrieved data is parsed to extract file hashes (`file_ioc__hash`).

    6. For each identified hash, the connector creates an alert in Google SecOps,
    mapping the data to the required alert format.

    7. The connector saves the latest sequence update number to storage to maintain
    state for subsequent runs.
TI IoC IP Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the Group-IB Threat Intelligence (TI) portal to
    retrieve Indicators of Compromise (IoCs), specifically IP addresses. It periodically
    polls the `ioc/common` collection, processes the retrieved data, and creates alerts
    within Google SecOps (Chronicle SOAR) to facilitate proactive threat detection
    and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API login | Email | Yes | Your email address used to access the Group-IB TI
    Portal. |

    | API URL | String | Yes | The URL for the Group-IB TI Portal. |

    | Case name | String | Yes | The name of the case to display in SOAR. |

    | Case severity | String | Yes | The severity level for the created case (e.g.,
    Informative, Low, Medium, High, Critical). |

    | Case type | String | Yes | The case type to trigger an action. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name.
    |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    script execution. |

    | Start date | String | No | The start date (YYYY-MM-DD) to download collection
    data. Defaults to one day back if not provided. |

    | API key | Password | Yes | The API key generated from your Group-IB TI Profile.
    |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates for the API
    connection. |


    ### Flow Description

    1. Initializes the connection to the Group-IB TI portal using the provided credentials
    and API URL.

    2. Retrieves the last processed sequence update number from the SOAR storage to
    ensure incremental data fetching.

    3. If no previous timestamp exists, it uses the configured `Start date` (or defaults
    to one day back) to initialize the sequence update.

    4. Queries the `ioc/common` collection from the Group-IB TI API.

    5. Parses the retrieved data, filtering for valid IP addresses.

    6. Maps the parsed events into the Google SecOps alert format, including metadata
    like severity and type.

    7. Creates and ingests the alerts into the SOAR platform.

    8. Updates the sequence number in the SOAR storage to track the progress for the
    next execution.
