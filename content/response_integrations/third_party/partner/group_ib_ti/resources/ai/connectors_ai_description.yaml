TI IoC Hash Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the Group-IB Threat Intelligence (TI) platform
    to retrieve Indicators of Compromise (IoCs), specifically file hashes. It periodically
    polls the Group-IB TI API for new IoC data, maps the retrieved information into
    alert structures, and creates cases within Google SecOps for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API key | String | Yes | API key, generated at your Group-IB TI Profile. |

    | API login | String | Yes | Your email address used to enter the Group-IB TI
    Portal. |

    | API URL | String | Yes | Group-IB TI Portal URL. |

    | Case name | String | Yes | Case name to display. |

    | Case severity | String | Yes | Case severity (Informative, Low, Medium, High,
    Critical). |

    | Case type | String | Yes | Case type to trigger an Action. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | Start date | String | No | Start date to download collection data (YYYY-MM-DD).
    |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates. |


    ### Flow Description

    1. Initializes the connector and retrieves configuration parameters.

    2. Connects to the Group-IB TI API using the provided credentials.

    3. Determines the starting point for data retrieval (either from storage or the
    provided start date).

    4. Queries the `ioc/common` collection from the Group-IB TI API.

    5. Parses the retrieved data, specifically extracting file hashes.

    6. Maps the extracted IoC data into alert events and aggregates them into a Google
    SecOps alert.

    7. Saves the latest sequence update number to storage for future runs.

    8. Returns the created alerts to the SOAR platform.
TI IoC IP Connector:
  ai_description: >-
    ### General Description

    The TI IoC IP Connector integrates with the Group-IB Threat Intelligence (TI)
    portal to automatically retrieve and ingest Indicators of Compromise (IoCs), specifically
    focusing on IP addresses. By periodically polling the `ioc/common` collection
    from the Group-IB TI API, the connector identifies malicious network activity
    and creates corresponding alerts within Google SecOps (Chronicle) SOAR, enabling
    security teams to respond to threats efficiently.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API login | String | Yes | The email address used to authenticate with the Group-IB
    TI Portal. |

    | API URL | String | Yes | The base URL for the Group-IB TI API. |

    | Case name | String | Yes | The display name for the cases created in the SOAR
    platform. |

    | Case severity | String | Yes | The severity level for the created cases (e.g.,
    Informative, Low, Medium, High, Critical). |

    | Case type | String | Yes | The case type used to trigger subsequent actions.
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event class
    ID. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    script execution. |

    | Start date | String | No | The start date (YYYY-MM-DD) to begin downloading
    collection data. Defaults to one day back if not provided. |

    | API key | String | Yes | The API key generated from your Group-IB TI profile.
    |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates during API communication.
    |


    ### Flow Description

    1. **Initialization**: The connector initializes the `SiemplifyConnectorExecution`
    and retrieves the configured parameters, including API credentials and environment
    settings.

    2. **Authentication & Connection**: It establishes a connection to the Group-IB
    TI API using the provided credentials and base URL.

    3. **Timestamp Management**: The connector checks the local storage for the last
    processed sequence update number. If no timestamp exists, it uses the configured
    `Start date` (or defaults to one day prior) to fetch the initial sequence update
    number from the API.

    4. **Data Retrieval**: It queries the `ioc/common` collection from the Group-IB
    TI API, requesting data starting from the last known sequence update.

    5. **Parsing & Mapping**: The retrieved data is parsed to extract relevant IP
    addresses and associated metadata. Each valid event is mapped into the Google
    SecOps `AlertInfo` format.

    6. **Alert Creation**: The connector aggregates the parsed events into an alert
    instance and ingests it into the SOAR platform.

    7. **State Update**: Upon successful ingestion, the connector saves the latest
    sequence update number to the local storage to ensure that subsequent runs only
    process new, incremental data.
