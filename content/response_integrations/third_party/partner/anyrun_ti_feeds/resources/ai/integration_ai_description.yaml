  reasoning: >-
    The ANY.RUN Threat Intelligence Feeds integration is designed to synchronize threat
    intelligence indicators (IPs, URLs, and Domains) from the ANY.RUN sandbox into
    Google SecOps DataTables. This functionality directly aligns with the Threat Intelligence
    category, as it provides the necessary data to enrich alerts and determine the
    reputation of external indicators. The integration does not perform EDR, Network
    Security, IAM, ITSM, or other operational tasks. While the ingested data may be
    used within a SIEM context to identify malicious activity, the integration itself
    acts as a threat intelligence feed provider rather than a SIEM search or analysis
    tool.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
