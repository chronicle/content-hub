  reasoning: >-
    The integration is designed to synchronize threat intelligence indicators (IPs,
    URLs, and Domains) from the ANY.RUN sandbox into Google SecOps DataTables. Its
    primary purpose is to provide security teams with up-to-date threat data to enhance
    detection and investigation capabilities. This aligns directly with the Threat
    Intelligence category, which focuses on providing indicators and reputation data
    to confirm if an alert is a True Positive. The integration does not perform SIEM
    log searching, EDR host analysis, network blocking, or other operational tasks,
    so it does not qualify for those categories.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
