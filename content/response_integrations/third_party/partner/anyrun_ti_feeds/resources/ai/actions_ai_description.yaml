  ai_description: >-
    Tests connectivity to the ANY.RUN TI Feeds service. This action verifies that
    the provided API credentials and network configuration (including optional proxy
    settings) allow for successful communication with the ANY.RUN API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN TI Feeds API key | String | Yes | The API key used to authenticate with
    the ANY.RUN service. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates during the connection.
    |

    | Enable proxy | Boolean | No | Whether to route the connection through a proxy
    server. |

    | Proxy host | String | No | The hostname or IP address of the proxy server. Required
    if 'Enable proxy' is enabled. |

    | Proxy port | String | No | The port number of the proxy server. Required if
    'Enable proxy' is enabled. |


    ### Flow Description

    1. The action extracts the required configuration parameters, including the API
    key and network settings.

    2. If 'Enable proxy' is selected, the action validates the proxy configuration
    by attempting a connection to the proxy host.

    3. The action initializes the ANY.RUN FeedsConnector using the provided API key
    and SSL verification settings.

    4. It executes a connectivity check (authorization test) against the ANY.RUN service.

    5. The action logs the success or failure of the connection and terminates with
    the appropriate execution state.
  capabilities:
