Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity and authentication with the ANY.RUN TI Feeds service. This
    action validates the provided API key and, if configured, verifies the proxy settings
    to ensure the integration can communicate with the external API.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API key, SSL verification preference,
    and proxy settings from the integration configuration.

    2. **Proxy Verification (Optional):** If proxy usage is enabled, the action attempts
    to establish a connection through the specified proxy host and port.

    3. **Authorization Check:** Uses the ANY.RUN FeedsConnector to verify the validity
    of the API key by calling the authorization endpoint.

    4. **Status Reporting:** Logs the success or failure of the connection attempt
    and terminates the action with the corresponding execution state.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN TI Feeds API key | String | Yes | The API key used to authenticate with
    ANY.RUN TI Feeds. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API endpoint. |

    | Enable proxy | Boolean | No | If enabled, the action will use the configured
    proxy settings. |

    | Proxy host | String | No | The hostname or IP address of the proxy server. Required
    if 'Enable proxy' is true. |

    | Proxy port | String | No | The port of the proxy server. Required if 'Enable
    proxy' is true. |


    ### Additional Notes

    * This action does not process entities and is used solely for health checks and
    configuration validation. Note that while parameters are extracted from the configuration,
    they are essential for the action's execution.
