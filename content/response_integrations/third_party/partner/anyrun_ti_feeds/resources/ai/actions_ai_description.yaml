  ai_description: >-
    ### General Description

    Tests the connectivity and authentication between Google SecOps and the ANY.RUN
    TI Feeds service. This action ensures that the integration is correctly configured
    and can communicate with the external API. It verifies the validity of the API
    key and tests network paths, including optional proxy configurations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN TI Feeds API key | String | Yes | The API key used to authenticate with
    the ANY.RUN TI Feeds service. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the ANY.RUN server. |

    | Enable proxy | Boolean | No | If enabled, the action will use the configured
    proxy settings to connect. |

    | Proxy host | String | No | The host address of the proxy server. This is required
    if 'Enable proxy' is set to true. |

    | Proxy port | String | No | The port of the proxy server. This is required if
    'Enable proxy' is set to true. |


    ### Additional Notes

    This action does not process any entities and is used solely for configuration
    validation. Either the direct connection or the proxy connection must be successful
    for the action to complete with a success status.


    ### Flow Description

    1. **Extract Configuration**: The action retrieves the API key, SSL verification
    preference, and proxy settings from the integration configuration.

    2. **Proxy Validation (Optional)**: If proxying is enabled, the action attempts
    to establish a connection through the specified proxy host and port to verify
    the proxy settings.

    3. **Authentication Check**: The action initializes a connection to the ANY.RUN
    TI Feeds service and performs an authorization check to verify that the provided
    API key is valid.

    4. **Result Reporting**: The action concludes by logging the success or failure
    of the connection attempt and returns the execution state to the SecOps platform.
