Ping:
  ai_description: >-
    ### General Description

    Tests connectivity and verifies authorization with the ANY.RUN TI Feeds service.


    ### Flow Description

    1. Extracts integration configuration parameters, including the API key, SSL verification,
    and proxy settings.

    2. If a proxy is enabled, makes an API call to verify the proxy connection.

    3. Initializes the `FeedsConnector` and makes an API call to the ANY.RUN service
    to check authorization.

    4. Outputs a success message if the connection and authorization are valid, or
    an error message if they fail.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
    It is typically used as a diagnostic tool to ensure the integration is properly
    configured.
  ai_short_description: >-
    Tests connectivity and verifies authorization with the ANY.RUN TI Feeds service
    to ensure the integration is properly configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to check authorization and proxy connectivity,
      but it does not fetch contextual data for alerts/entities (fetches_data=false).
      It does not perform any state-changing operations on external systems (can_mutate_external_data=false)
      or internal systems (can_mutate_internal_data=false). It does not update entities,
      create insights, modify alert data, or create case comments.
