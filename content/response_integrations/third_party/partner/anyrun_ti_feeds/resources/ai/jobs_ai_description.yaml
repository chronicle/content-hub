ANYRUN TI Feeds:
  ai_description: >-
    ### General Description

    This job synchronizes threat intelligence indicators (IPs, URLs, and Domains)
    from the ANY.RUN platform into Google SecOps DataTables. It performs a full refresh
    of these tables by deleting existing records and re-populating them with the latest
    threat intelligence data retrieved from ANY.RUN, based on a configurable time
    depth.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed Fetch Depth | Integer | Yes | The number of days to look back when fetching
    threat intelligence feeds from ANY.RUN. |


    ### Flow Description

    1. Initializes the connection to the ANY.RUN API and the Google SecOps environment.

    2. Iterates through the configured indicator types (IP, URL, and Domain).

    3. For each indicator type:
        * Checks if the corresponding Google SecOps DataTable exists.
        * Deletes the existing DataTable if it is found.
        * Creates a new DataTable with the appropriate schema.
        * Retrieves indicators from ANY.RUN using the specified fetch depth.
        * Bulk loads the retrieved indicators into the newly created DataTable.
