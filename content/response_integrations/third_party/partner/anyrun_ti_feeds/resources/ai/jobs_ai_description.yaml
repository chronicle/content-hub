ANYRUN TI Feeds:
  ai_description: "### General Description\nThis job synchronizes threat intelligence\
    \ feeds from ANY.RUN to Google SecOps DataTables. It automates the retrieval of\
    \ Indicators of Compromise (IOCs)\u2014specifically IPs, URLs, and Domains\u2014\
    and stores them in dedicated DataTables (`anyrun_feed_ip`, `anyrun_feed_url`,\
    \ `anyrun_feed_domain`). This ensures that security analysts have access to up-to-date\
    \ reputation data within the Google SecOps environment for detection and enrichment\
    \ purposes. The job performs a full refresh of the data by recreating the tables\
    \ during each execution to maintain data integrity.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Feed Fetch Depth | String | Yes | Specify the lookback period in days for fetching\
    \ indicators (e.g., 90). |\n| ANYRUN TI Feeds API key | String | Yes | The API\
    \ key used to authenticate with ANY.RUN TI services. |\n| Project ID | String\
    \ | Yes | The Google Cloud Project ID associated with the SecOps instance. |\n\
    | Project location | String | Yes | The regional location of the Google SecOps\
    \ instance. |\n| Instance ID | String | Yes | The specific Instance ID of the\
    \ Google SecOps environment. |\n| Google service account | String | Yes | The\
    \ JSON key of the Google Service Account used for SecOps API authentication. |\n\
    | Verify SSL | Boolean | No | If enabled, the job will verify SSL certificates\
    \ for outgoing requests. |\n| Enable proxy | Boolean | No | If enabled, the job\
    \ will use the configured proxy settings for communication. |\n\n### Flow Description\n\
    1. **Initialization**: The job retrieves configuration settings for both ANY.RUN\
    \ and the Google SecOps API, including authentication credentials and the lookback\
    \ window.\n2. **Cleanup**: For each indicator type (IP, URL, Domain), the job\
    \ checks if a corresponding DataTable already exists in Google SecOps. If it exists,\
    \ the table is deleted to prepare for a fresh data load.\n3. **Schema Creation**:\
    \ New DataTables are created with a predefined schema containing columns for the\
    \ IOC value, confidence level, labels, creation date, and modification date.\n\
    4. **Data Retrieval**: The job connects to the ANY.RUN TAXII/STIX endpoint and\
    \ fetches indicators modified within the specified `Feed Fetch Depth` period.\n\
    5. **Data Transformation**: The raw ANY.RUN indicators are parsed and mapped to\
    \ the Google SecOps DataTable row format.\n6. **Bulk Loading**: The processed\
    \ indicators are uploaded in bulk to the newly created DataTables in Google SecOps."
