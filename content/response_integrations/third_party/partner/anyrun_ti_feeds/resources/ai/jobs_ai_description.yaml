ANYRUN TI Feeds:
  ai_description: >-
    ### General Description

    The ANY.RUN TI Feeds job synchronizes threat intelligence indicators (IPs, URLs,
    and Domains) from the ANY.RUN platform into Google SecOps DataTables. This process
    ensures that security teams have access to up-to-date threat data for detection
    and investigation purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed Fetch Depth | String | Yes | Specify feed fetch depth in days. |


    ### Flow Description

    1. Authenticates with the ANY.RUN API and Google SecOps using provided credentials.

    2. Iterates through the configured indicator categories (IP, URL, Domain).

    3. For each category, checks for the existence of the corresponding DataTable
    in Google SecOps.

    4. Deletes the existing DataTable if it exists to ensure a clean state.

    5. Creates a new DataTable with the appropriate schema.

    6. Fetches indicators from ANY.RUN's TAXII/STIX feed, filtered by the specified
    Feed Fetch Depth.

    7. Bulk uploads the retrieved indicators into the Google SecOps DataTable.
