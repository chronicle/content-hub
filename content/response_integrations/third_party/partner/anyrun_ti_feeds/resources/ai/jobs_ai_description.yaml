ANYRUN TI Feeds:
  ai_description: >-
    ### General Description

    This job synchronizes threat intelligence indicators from ANY.RUN to Google SecOps
    DataTables. It automates the retrieval of IP, URL, and Domain indicators via the
    TAXII/STIX protocol and stores them in dedicated DataTables (`anyrun_feed_ip`,
    `anyrun_feed_url`, `anyrun_feed_domain`). This ensures that security teams have
    access to up-to-date ANY.RUN threat intelligence directly within Google SecOps
    for detection and enrichment purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed Fetch Depth | String | Yes | Specify the number of days back to fetch indicators
    from the ANY.RUN feed. Default is 90 days. |

    | ANYRUN TI Feeds API key | String | Yes | The API key used to authenticate with
    the ANY.RUN TI Feeds service (configured in integration settings). |

    | Project ID | String | Yes | The Google Cloud Project ID for the SecOps instance
    (configured in integration settings). |

    | Project location | String | Yes | The location of the Google Cloud Project (e.g.,
    'us', 'europe') (configured in integration settings). |

    | Instance ID | String | Yes | The specific Google SecOps Instance ID (configured
    in integration settings). |

    | Google service account | String | Yes | The JSON key for the Google Service
    Account used to interact with the SecOps API (configured in integration settings).
    |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates for the connection
    to ANY.RUN (configured in integration settings). |


    ### Flow Description

    1. **Initialization**: The job extracts the necessary configuration parameters,
    including API keys, Google SecOps instance details, and the fetch depth.

    2. **Connection Setup**: Establishes an authorized session with the Google SecOps
    API and a connection to the ANY.RUN TAXII/STIX feed.

    3. **Indicator Processing**: Iterates through the defined indicator types (IP,
    URL, and Domain).

    4. **DataTable Maintenance**: For each indicator type, the job checks if the corresponding
    DataTable exists in Google SecOps. If it does, the job deletes the existing table
    to perform a clean synchronization.

    5. **Schema Creation**: Creates a new DataTable with a structured schema including
    columns for the indicator value, confidence level, labels, creation date, and
    modification date.

    6. **Data Retrieval**: Fetches indicators from the ANY.RUN feed that have been
    modified within the specified `Feed Fetch Depth` period.

    7. **Bulk Upload**: Converts the retrieved indicators into the required format
    and performs a bulk upload into the newly created Google SecOps DataTables.
