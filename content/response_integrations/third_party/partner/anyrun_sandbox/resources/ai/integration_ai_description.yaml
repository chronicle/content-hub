  reasoning: >-
    The ANY.RUN Sandbox integration is primarily designed to provide threat intelligence
    by analyzing suspicious files and URLs in a controlled environment. Its actions
    (File/URL Analysis for Android, Linux, and Windows) allow analysts to submit artifacts
    to receive detailed behavioral reports, identified Indicators of Compromise (IOCs),
    and verdicts. This capability directly supports the 'Threat Intelligence' category,
    as it is used to enrich indicators and confirm if an alert is a True Positive.
    The integration does not perform SIEM log analysis, EDR host containment, network
    gateway blocking, or other functions such as ITSM, IAM, or asset management.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
