  reasoning: >-
    The anyrun_sandbox integration is primarily a Threat Intelligence tool. Its core
    functionality involves submitting files and URLs to an external sandbox environment
    to perform dynamic analysis. The expected outcome of these actions is the retrieval
    of threat intelligence, such as analysis reports, risk scores, and extracted Indicators
    of Compromise (IOCs), which helps analysts confirm if an alert is a True Positive.
    It does not perform SIEM log searching, EDR host containment, network blocking,
    or identity management. Therefore, it aligns strictly with the Threat Intelligence
    category.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
