    sandbox environment. This action allows analysts to submit one or more URLs for
    dynamic analysis, specifying the operating system (Ubuntu or Debian) and the browser
    (Chrome or Firefox). It facilitates deep inspection of web-based threats by providing
    interactive analysis links, detailed HTML reports, and a summary of extracted
    Indicators of Compromise (IOCs).


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Url | The destination URL(s) to be analyzed. Supports comma-separated values.
    Defaults to the entity identifier. | String | Yes |

    | Machine Os | The Linux distribution to use for the analysis. Options: ubuntu,
    debian. | DDL | Yes |

    | Browser | The web browser to use for the analysis. Options: Google Chrome, Mozilla
    Firefox. | DDL | Yes |

    | Timeout In Seconds | The duration for the analysis task (range: 10-660 seconds).
    Default is 120. | String | No |

    | Command line | Optional command-line arguments for the analyzed object. | String
    | No |

    | System's language | The OS locale identifier or country name (e.g., 'en-US').
    | String | No |

    | User Tags | Custom tags for the task (max 8 tags, 16 characters each). | String
    | No |

    | Analysis Privacy Type | Privacy level for the analysis: public, bylink, owner,
    or byteam. | DDL | No |

    | Network Connect | Enables network connectivity during analysis. | Boolean |
    No |

    | Network Fakenet | Enables the FakeNet feature to simulate network services.
    | Boolean | No |

    | Network Tor | Enables routing traffic through the TOR network. | Boolean | No
    |

    | Network Geo | Specifies the TOR geolocation (e.g., US, AU). | String | No |

    | Network Mitm | Enables HTTPS MITM Proxy for traffic decryption. | Boolean |
    No |

    | Network Residential Proxy | Enables the use of a residential proxy. | Boolean
    | No |

    | Network Residential Proxy Geo | Specifies the residential proxy geolocation.
    | String | No |


    ### Additional Notes

