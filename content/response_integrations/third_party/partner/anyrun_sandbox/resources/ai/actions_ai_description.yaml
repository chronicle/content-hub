  ai_description: >-
    Performs Android file analysis using the ANY.RUN Sandbox. This action submits
    a case attachment to the ANY.RUN Android sandbox for automated analysis, retrieves
    the analysis report, and extracts indicators of compromise (IOCs).


    ### Flow Description

    1. Retrieves the attachment from the case.

    2. Submits the file to the ANY.RUN Android sandbox for analysis with specified
    configuration parameters (e.g., timeout, network settings, privacy type).

    3. Adds a comment to the case with a link to the interactive analysis.

    4. Polls the sandbox for the task status.

    5. Retrieves the HTML analysis report and saves it as an attachment to the case
    wall.

    6. Extracts and summarizes suspicious or malicious IOCs found during analysis
    and adds them as a comment to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeout In Seconds | string | No | Select task completion time. Size range:
    10-660 seconds. Default: 240. |

    | Change to valid extension | boolean | No | Automatically change file extension
    to valid. Default: true. |

    | Command line | string | No | Optional command-line arguments for the analyzed
    object. |

    | System's language | string | No | Operation system's language. Default: en-US.
    |

    | User Tags | string | No | Add user tags. Default: secops-alert. |

    | Analysis Privacy Type | ddl | No | Privacy settings. Supports: bylink, byteam,
    public, owner. Default: bylink. |

    | Network Connect | boolean | No | Enable network connection. Default: true. |

    | Network Fakenet | boolean | No | Enable FakeNet feature. Default: false. |

    | Network Tor | boolean | No | Enable TOR using. Default: false. |

    | Network Geo | string | No | TOR geolocation option. Default: fastest. |

    | Network Mitm | boolean | No | Enable HTTPS MITM Proxy using. Default: false.
    |

    | Network Residential Proxy | boolean | No | Residential proxy using. Default:
    false. |

    | Network Residential Proxy Geo | string | No | Residential proxy geolocation
    option. Default: fastest. |


    ### Additional Notes

    This action requires an API key for the ANY.RUN Sandbox to be configured in the
    integration settings. It operates on case attachments and does not require specific
    entity types to be present in the case.
