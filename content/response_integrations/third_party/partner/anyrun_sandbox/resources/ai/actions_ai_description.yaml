  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between the Google SecOps environment and\
    \ the ANY.RUN Sandbox service. Its primary purpose is to ensure that the integration\
    \ is correctly configured, the API key is valid, and network paths (including\
    \ optional proxies) are functional.\n\n### Parameters Description\nThere are no\
    \ action-specific parameters for this action. It relies entirely on the global\
    \ integration configuration parameters:\n* **ANYRUN Sandbox API KEY**: The authentication\
    \ token used to access the ANY.RUN API.\n* **Verify SSL**: Boolean flag to enable\
    \ or disable SSL certificate validation.\n* **Enable proxy**: Boolean flag to\
    \ determine if a proxy should be used for the connection.\n* **Proxy host**: The\
    \ hostname or IP of the proxy server (if enabled).\n* **Proxy port**: The port\
    \ of the proxy server (if enabled).\n\n### Flow Description\n1. **Configuration\
    \ Extraction**: The action retrieves the API key, SSL verification settings, and\
    \ proxy configurations from the integration's global settings.\n2. **Proxy Validation\
    \ (Optional)**: If the 'Enable proxy' setting is active, the action first attempts\
    \ to establish a connection through the specified proxy host and port to ensure\
    \ the network path is open.\n3. **Authorization Check**: The action initializes\
    \ a connection to the ANY.RUN Sandbox service and executes an authorization check\
    \ (`check_authorization`) to validate the provided API key.\n4. **Result Reporting**:\
    \ \n    * If the connection and authorization are successful, the action completes\
    \ with a success status and an informative message.\n    * If a connection error\
    \ or authentication failure occurs, the action catches the exception, logs the\
    \ error, and returns a failed execution state."
