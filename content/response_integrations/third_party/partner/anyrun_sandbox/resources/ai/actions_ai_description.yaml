URL Windows Analysis:
  ai_description: >-
    Performs automated URL analysis using the ANY.RUN interactive sandbox on a Windows
    virtual machine. This action allows security analysts to submit suspicious URLs
    to a controlled environment to observe behavior, network activity, and potential
    threats. It supports various browser configurations and advanced network settings
    like TOR, FakeNet, and residential proxies. The action retrieves a comprehensive
    HTML report, extracts indicators of compromise (IOCs), and provides a final verdict,
    all of which are integrated back into the SecOps case for further investigation.


    ### Flow Description:

    1. **Initialization:** Extracts the API key and SSL verification settings from
    the integration configuration.

    2. **Parameter Extraction:** Retrieves the target URL(s) and analysis parameters
    (browser, timeout, network settings, etc.) from the action input.

    3. **Analysis Submission:** For each provided URL, it initiates a new Windows-based
    sandbox analysis task in ANY.RUN.

    4. **Interactive Link:** Immediately posts a comment to the case wall containing
    a direct link to the live interactive analysis session.

    5. **Status Monitoring:** Polls the ANY.RUN API to monitor the progress of the
    analysis task until completion.

    6. **Report Retrieval:** Downloads the full HTML analysis report and attaches
    it to the case wall as a file.

    7. **IOC Extraction:** Fetches extracted indicators from the analysis. If any
    indicators are identified as suspicious or malicious, it summarizes them in a
    case comment.

    8. **Verdict Reporting:** Retrieves the final analysis verdict (e.g., malicious,
    clean) and posts it as a concluding comment to the case.


    ### Parameters Description:

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Url | The destination URL(s) to analyze. Supports multiple URLs separated by
    commas. Defaults to the entity identifier. | string | Yes |

    | Browser | The web browser to use for the analysis (Microsoft Edge, Google Chrome,
    Mozilla Firefox, or Internet Explorer). | ddl | Yes |

    | Timeout In Seconds | The duration of the analysis task (range: 10-660 seconds).
    Default is 120. | string | No |

    | Command line | Optional command-line arguments to be used during the analysis.
    | string | No |

    | System's language | The operating system's locale or language (e.g., 'en-US').
    | string | No |

    | User Tags | Custom tags to associate with the analysis task (max 8 tags, 16
    characters each). | string | No |

    | Analysis Privacy Type | Privacy level for the analysis (public, bylink, owner,
    or byteam). | ddl | No |

    | Network Connect | Enables or disables network connectivity within the sandbox.
    | boolean | No |

    | Network Fakenet | Enables the FakeNet feature to simulate network services.
    | boolean | No |

    | Network Tor | Enables the use of the TOR network for analysis traffic. | boolean
    | No |

    | Network Geo | Specifies the TOR geolocation (e.g., 'US', 'AU'). | string | No
    |

    | Network Mitm | Enables an HTTPS MITM proxy for traffic inspection. | boolean
    | No |

    | Network Residential Proxy | Enables the use of a residential proxy for the analysis.
    | boolean | No |

    | Network Residential Proxy Geo | Specifies the residential proxy geolocation
    (e.g., 'US', 'AU'). | string | No |


    ### Additional Notes:

    - This action creates a new task in the ANY.RUN platform for every execution,
    which may consume API credits.

    - The HTML report is saved directly to the case wall for forensic review.
