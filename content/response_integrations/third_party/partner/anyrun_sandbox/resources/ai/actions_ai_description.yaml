  ai_description: >-
    ### General Description

    This action performs URL analysis using a Windows VM in the ANY.RUN Sandbox. It
    submits a specified URL for interactive analysis, retrieves the resulting report
    (HTML) and any identified indicators of compromise (IOCs), and updates the case
    with the analysis results, including a link to the interactive report, a summary
    of malicious/suspicious IOCs, and the full analysis report as a case wall attachment.


    ### Flow Description

    1. **Configuration Extraction**: Extracts the ANY.RUN API key, SSL verification
    settings, and proxy configuration.

    2. **Parameter Extraction**: Extracts the target URL(s) and analysis options (browser,
    timeout, network settings, etc.) from the action parameters.

    3. **Analysis Submission**: Iterates through the provided URLs and submits each
    to the ANY.RUN Sandbox for analysis using the `SandboxConnector`.

    4. **Case Commenting**: Adds a comment to the case containing a link to the interactive
    ANY.RUN analysis task.

    5. **Report Retrieval**: Fetches the analysis report in HTML format and saves
    it as a case wall attachment.

    6. **IOC Processing**: Retrieves IOCs from the analysis report and adds a summary
    comment to the case if any suspicious or malicious indicators are found.

    7. **Verdict Logging**: Retrieves and logs the final analysis verdict to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Url | string | Yes | The destination URL(s) to analyze. |

    | Browser | ddl | Yes | The browser to use for analysis (e.g., Microsoft Edge,
    Google Chrome). |

    | Timeout In Seconds | string | No | Task completion time (10-660 seconds). |

    | Command line | string | No | Optional command-line arguments for the analyzed
    object. |

    | System's language | string | No | The operating system's language (e.g., 'en-US').
    |

    | User Tags | string | No | User tags for the task. |

    | Analysis Privacy Type | ddl | No | Privacy settings (e.g., public, bylink).
    |

    | Network Connect | boolean | No | Enable network connection. |

    | Network Fakenet | boolean | No | Enable FakeNet feature. |

    | Network Tor | boolean | No | Enable TOR usage. |

    | Network Geo | string | No | TOR geolocation option. |

    | Network Mitm | boolean | No | Enable HTTPS MITM Proxy. |

    | Network Residential Proxy | boolean | No | Enable residential proxy. |

    | Network Residential Proxy Geo | string | No | Residential proxy geolocation
    option. |


    ### Additional Notes

    - The action does not iterate over `siemplify.target_entities` directly; it extracts
    the URL from the action parameters. If the `Url` parameter is set to `[Entity.Identifier]`,
    it will use the entity identifier as the URL.
