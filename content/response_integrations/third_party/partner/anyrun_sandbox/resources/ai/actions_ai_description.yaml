File Windows Analysis:
  ai_description: "Uploads a file attachment from a Google SecOps case to the ANY.RUN\
    \ sandbox for dynamic analysis within a Windows virtual machine. This action allows\
    \ analysts to execute suspicious files in a controlled environment to observe\
    \ behavior, network activity, and potential threats. It supports extensive configuration\
    \ of the analysis environment, including OS version, bitness, and network routing\
    \ options like Tor or residential proxies. \n\n### Flow Description:\n1. **Attachment\
    \ Retrieval:** The action identifies and retrieves the first available file attachment\
    \ from the current Google SecOps case.\n2. **Sandbox Submission:** The file is\
    \ uploaded to the ANY.RUN sandbox with the specified environment parameters (OS,\
    \ network settings, timeout, etc.).\n3. **Interactive Link:** A comment is added\
    \ to the case providing a direct URL to the live interactive analysis session\
    \ in ANY.RUN.\n4. **Status Monitoring:** The action polls the sandbox for the\
    \ task status until completion.\n5. **Report Retrieval:** Once finished, the action\
    \ downloads the full HTML analysis report and saves it as a new attachment on\
    \ the case wall.\n6. **IOC Extraction:** It fetches identified Indicators of Compromise\
    \ (IOCs) and appends a summary of suspicious or malicious indicators to the case\
    \ comments.\n\n### Parameters Description:\n| Parameter Name | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Environment Version | DDL\
    \ | No | Specifies the Windows OS version (7, 10, or 11). Default is 10. |\n|\
    \ Environment Bitness | DDL | No | Specifies the OS architecture (32 or 64 bit).\
    \ Default is 64. |\n| Environment Type | DDL | No | Selects the environment preset.\
    \ 'development' is only for Win 10 x64; 'complete' is required for others. |\n\
    | File Force Elevation | Boolean | No | If true, executes the file with administrative/elevated\
    \ privileges. |\n| StartFolder | DDL | No | The directory where the file execution\
    \ starts (e.g., temp, desktop, downloads). |\n| Timeout In Seconds | String |\
    \ No | The duration of the analysis task (10-660 seconds). Default is 240. |\n\
    | Change to valid extension | Boolean | No | Automatically corrects the file extension\
    \ to a valid one before execution. |\n| Command line | String | No | Optional\
    \ CLI arguments to pass to the file during execution. |\n| System's language |\
    \ String | No | The locale/language of the guest OS (e.g., 'en-US'). |\n| User\
    \ Tags | String | No | Custom tags to label the task in ANY.RUN. Default is 'secops-alert'.\
    \ |\n| Analysis Privacy Type | DDL | No | Sets visibility of the analysis (public,\
    \ bylink, owner, byteam). |\n| Network Connect | Boolean | No | Enables or disables\
    \ internet access for the sandbox environment. |\n| Network Fakenet | Boolean\
    \ | No | Enables FakeNet to simulate network services and intercept traffic. |\n\
    | Network Tor | Boolean | No | Routes sandbox network traffic through the Tor\
    \ network. |\n| Network Geo | String | No | Specifies the geolocation for Tor\
    \ exit nodes (e.g., 'US', 'AU'). |\n| Network Mitm | Boolean | No | Enables HTTPS\
    \ MITM proxy for SSL/TLS inspection. |\n| Network Residential Proxy | Boolean\
    \ | No | Uses a residential proxy for network traffic. |\n| Network Residential\
    \ Proxy Geo | String | No | Specifies the geolocation for the residential proxy.\
    \ |\n\n### Additional Notes:\n- This action requires at least one attachment to\
    \ be present in the case to function.\n- The 'Environment Type' must be set to\
    \ 'complete' for any OS version other than Windows 10 x64."
