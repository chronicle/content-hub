      an analysis task. It fetches the analysis report and IOCs (fetches data). It
      modifies the internal case by adding comments and saving an attachment to the
      case wall (internal mutation).
  categories:
    enrichment: false
    reasoning: >-
      The action submits a file to an external sandbox, which constitutes an external
      mutation. Therefore, it does not meet the 'External State Preservation' requirement
      for an enrichment action.
