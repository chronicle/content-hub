  ai_description: >-
    ### General Description

    Submits one or more URLs to the ANY.RUN sandbox for automated analysis within
    a Windows virtual machine environment. This action allows security analysts to
    observe the behavior of suspicious links in a controlled environment, providing
    detailed reports on network activity, process execution, and potential indicators
    of compromise (IOCs).


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Url | The destination URL(s) to be analyzed. Multiple URLs can be provided as
    a comma-separated list. | string | Yes | [Entity.Identifier] |

    | Browser | The web browser to use for the analysis (e.g., Microsoft Edge, Google
    Chrome). | ddl | Yes | Microsoft Edge |

    | Timeout In Seconds | The duration for the sandbox task (range: 10-660 seconds).
    | string | No | 120 |

    | Command line | Optional command-line arguments to be used during the analysis.
    | string | No | "" |

    | System's language | The operating system locale/language (e.g., 'en-US'). |
    string | No | en-US |

    | User Tags | Custom tags to associate with the analysis task (max 8 tags, 16
    chars each). | string | No | secops-alert |

    | Analysis Privacy Type | Privacy level for the task (public, bylink, owner, byteam).
    | ddl | No | bylink |

    | Network Connect | Enables or disables network connectivity for the VM. | boolean
    | No | true |

    | Network Fakenet | Enables the FakeNet feature to simulate network services.
    | boolean | No | false |

    | Network Tor | Enables the use of the TOR network for the analysis. | boolean
    | No | false |

    | Network Geo | Specifies the TOR geolocation (e.g., US, AU). | string | No |
    fastest |

    | Network Mitm | Enables HTTPS MITM (Man-In-The-Middle) proxying. | boolean |
    No | false |

    | Network Residential Proxy | Enables the use of a residential proxy. | boolean
    | No | false |

    | Network Residential Proxy Geo | Specifies the residential proxy geolocation.
    | string | No | fastest |


    ### Flow Description

    1. **Initialization:** Retrieves the ANY.RUN API key and SSL verification settings
    from the integration configuration.

    2. **Input Parsing:** Extracts the URL(s) provided in the action parameters.

    3. **Task Creation:** For each URL, it initiates a Windows-based sandbox analysis
    task in ANY.RUN using the specified browser and network configurations.

    4. **Interactive Link:** Immediately posts a comment to the case wall containing
    a direct link to the interactive ANY.RUN task.

    5. **Monitoring:** Polls the ANY.RUN API to monitor the status of the analysis
    task until completion.

    6. **Report Retrieval:** Once finished, it downloads the full analysis report
    in HTML format.

    7. **Internal Mutation (Attachment):** Attaches the HTML report to the Google
    SecOps case wall for forensic review.

    8. **IOC Extraction:** Fetches a list of IOCs identified during the analysis.
    If suspicious or malicious indicators are found, it summarizes them in a case
    comment.

    9. **Final Verdict:** Retrieves the final analysis verdict and posts it as a concluding
    comment on the case.


    ### Additional Notes

    - This action performs external mutations by creating tasks on the ANY.RUN platform.

    - It performs internal mutations by adding multiple comments and file attachments
    to the case wall.
