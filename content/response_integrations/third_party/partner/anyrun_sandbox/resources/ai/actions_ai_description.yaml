  ai_description: >-
    ### General Description

    This action performs a file analysis using the ANY.RUN Windows sandbox. It retrieves
    a file attachment from the current case, submits it to the ANY.RUN sandbox for
    automated analysis with configurable environment settings, and then processes
    the results. The action provides visibility into the file's behavior by adding
    a link to the interactive analysis, saving the full HTML report as a case attachment,
    and summarizing any suspicious or malicious indicators (IOCs) found during the
    analysis as a case comment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Environment Version | ddl | No | OS version for the sandbox environment. Supports
    7, 10, 11. |

    | Environment Bitness | ddl | No | OS bitness for the sandbox environment. Supports
    32, 64. |

    | Environment Type | ddl | No | Environment preset type. Use 'development' for
    Windows 10 x64, otherwise 'complete'. |

    | File Force Elevation | boolean | No | If true, executes the file with elevated
    privileges (for PE files). |

    | StartFolder | ddl | No | The folder where the file will be executed. Supports
    desktop, home, downloads, appdata, temp, windows, root. |

    | Timeout In Seconds | string | No | Task completion time. Range: 10-660 seconds.
    |

    | Change to valid extension | boolean | No | If true, automatically changes the
    file extension to a valid one. |

    | Command line | string | No | Optional command-line arguments for the analyzed
    file. |

    | System's language | string | No | The OS language (e.g., 'en-US'). |

    | User Tags | string | No | User-defined tags for the task. |

    | Analysis Privacy Type | ddl | No | Privacy settings for the analysis. Supports:
    bylink, byteam, public, owner. |

    | Network Connect | boolean | No | If true, enables network connectivity during
    analysis. |

    | Network Fakenet | boolean | No | If true, enables the FakeNet feature. |

    | Network Tor | boolean | No | If true, enables TOR usage. |

    | Network Geo | string | No | TOR geolocation option (e.g., US, AU). |

    | Network Mitm | boolean | No | If true, enables HTTPS MITM proxy. |

    | Network Residential Proxy | boolean | No | If true, enables residential proxy
    usage. |

    | Network Residential Proxy Geo | string | No | Residential proxy geolocation
    option (e.g., US, AU). |


    ### Additional Notes

    - The action requires at least one file attachment to be present in the case to
    execute successfully.

    - The action interacts with the ANY.RUN API to submit files and retrieve reports.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API key and proxy settings from
    the integration configuration.

    2. **Attachment Retrieval**: Fetches the file attachment from the current case.

    3. **File Submission**: Submits the file to the ANY.RUN sandbox using the provided
    environment and network parameters.

    4. **Comment Generation**: Adds a case comment containing a link to the interactive
    analysis on the ANY.RUN platform.

    5. **Status Polling**: Polls the sandbox for the analysis task status until completion.

    6. **Report Processing**: Retrieves the HTML analysis report and saves it as a
    case wall attachment.

    7. **IOC Extraction**: Identifies suspicious or malicious IOCs from the report
    and appends them to the case as a summary comment.

    8. **Verdict Return**: Returns the final analysis verdict to the user.
