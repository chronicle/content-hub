  ai_description: >-
    Submits a file attachment from the case to the ANY.RUN sandbox for analysis using
    an Android Virtual Machine. The action uploads the file, monitors the task status,
    retrieves the analysis report in HTML format, and extracts any suspicious or malicious
    Indicators of Compromise (IOCs).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Timeout In Seconds | String | No | Select task completion time. Size range:
    10-660 seconds. Default is 240. |

    | Change to valid extension | Boolean | No | Automatically change file extension
    to valid. Default is true. |

    | Command line | String | No | Optional command-line arguments for the analyzed
    object. Use an empty string to apply the default behavior. |

    | System's language | String | No | Operation system's language. Use locale identifier
    or country name (Ex: 'en-US' or 'Brazil'). Case-insensitive. Default is en-US.
    |

    | User Tags | String | No | Add user tags. Only characters a-z, A-Z, 0-9, hyphen
    (-), and comma (,) are allowed. Max tag length: 16 characters. Max unique tags
    per task: 8. Default is secops-alert. |

    | Analysis Privacy Type | Dropdown | No | Privacy settings. Supports: public,
    bylink, owner, byteam. Default is bylink. |

    | Network Connect | Boolean | No | Enable network connection. Default is true.
    |

    | Network Fakenet | Boolean | No | Enable FakeNet feature. Default is false. |

    | Network Tor | Boolean | No | Enable TOR using. Default is false. |

    | Network Geo | String | No | TOR geolocation option. Example: US, AU. Default
    is fastest. |

    | Network Mitm | Boolean | No | Enable HTTPS MITM Proxy using. Default is false.
    |

    | Network Residential Proxy | Boolean | No | Residential proxy using. Default
    is false. |

    | Network Residential Proxy Geo | String | No | Residential proxy geolocation
    option. Example: US, AU. Default is fastest. |


    ### Flow Description

    1. Retrieves the first available attachment from the case.

    2. Uploads the attachment to ANY.RUN for Android VM analysis using the specified
    configuration parameters.

    3. Adds a case comment containing a direct link to the interactive analysis session.

    4. Polls the ANY.RUN task status until the analysis is complete.

    5. Retrieves the HTML analysis report and saves it as a case wall attachment.

    6. Retrieves the IOC report, parses it for suspicious or malicious indicators,
    and adds the summary as a case comment.

    7. Retrieves the final analysis verdict and completes the action.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file attachment to the ANY.RUN sandbox to initiate a new Android VM
      analysis task.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds analysis links and IOC summaries as case comments, and saves the HTML analysis
      report as a case wall attachment.
    reasoning: >-
      The action fetches data by retrieving the analysis report, IOCs, and verdict
      from ANY.RUN. It mutates external data by uploading a file and creating a new
      analysis task in the ANY.RUN sandbox. It mutates internal data by adding case
      comments and saving the HTML report as a case wall attachment. It does not update
      entities, create insights, or modify alert data.
  categories:
    enrichment: false
    reasoning: >-
      The action is not an enrichment action because it mutates external data by uploading
      a file to a sandbox (creating a task). It is not a remediation action because
      it does not perform any containment, blocking, or identity revocation.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. Instead,
      it operates on case attachments retrieved via `siemplify.get_attachments()`.
      Therefore, the entity types list is empty and all filter flags are false.
