  ai_description: >-
    ### General Description

    This action performs automated file analysis by submitting case attachments to
    the ANY.RUN sandbox. It allows analysts to execute files in a controlled Linux
    environment to observe behavior, retrieve threat intelligence, and generate detailed
    analysis reports. The action supports various configuration options, including
    OS selection, network settings (e.g., Tor, Proxy), and privacy settings.


    ### Flow Description

    1. **Initialization**: Extracts the ANY.RUN API key and configuration parameters
    (e.g., OS version, network settings).

    2. **Attachment Retrieval**: Fetches the first available attachment from the current
    case.

    3. **Submission**: Submits the attachment to the ANY.RUN sandbox for analysis
    using the specified configuration.

    4. **Monitoring**: Polls the sandbox task status until completion.

    5. **Reporting**: Retrieves the HTML analysis report and any identified Indicators
    of Compromise (IOCs).

    6. **Internal Update**: Saves the HTML report as an attachment to the case wall
    and adds a comment containing the analysis link and a summary of identified IOCs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Env Os | ddl | Yes | The operating system version for the sandbox (e.g., ubuntu,
    debian). |

    | StartFolder | ddl | No | The folder where the file will be placed (e.g., desktop,
    home, downloads, temp). |

    | Run As Root | boolean | No | If true, executes the file with superuser privileges.
    |

    | Timeout In Seconds | string | No | The duration to wait for task completion
    (10-660 seconds). |

    | Change to valid extension | boolean | No | Automatically renames the file to
    a valid extension if necessary. |

    | Command line | string | No | Optional command-line arguments for the file execution.
    |

    | System's language | string | No | The locale identifier for the sandbox OS (e.g.,
    en-US). |

    | User Tags | string | No | Tags to associate with the analysis task. |

    | Analysis Privacy Type | ddl | No | Privacy settings for the analysis (public,
    bylink, owner, byteam). |

    | Network Connect | boolean | No | Enables network connectivity for the sandbox.
    |

    | Network Fakenet | boolean | No | Enables the FakeNet feature. |

    | Network Tor | boolean | No | Enables TOR for network traffic. |

    | Network Geo | string | No | Geolocation for TOR traffic. |

    | Network Mitm | boolean | No | Enables HTTPS MITM Proxy. |

    | Network Residential Proxy | boolean | No | Enables residential proxy usage.
    |

    | Network Residential Proxy Geo | string | No | Geolocation for residential proxy.
    |


    ### Additional Notes

    This action operates on case attachments rather than specific entities. It requires
    a valid ANY.RUN API key configured in the integration settings.
