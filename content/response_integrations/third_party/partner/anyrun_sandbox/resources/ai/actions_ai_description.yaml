  ai_description: >-
    ### General Description

    The **File Linux Analysis** action submits a file attachment from a Google SecOps
    case to the ANY.RUN sandbox for automated and interactive analysis within a Linux
    environment (Ubuntu or Debian). It allows security analysts to safely execute
    suspicious files in a controlled virtual machine to observe behavior, network
    activity, and identify potential threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Env Os** | DDL | Yes | Specifies the Linux distribution for the analysis environment.
    Supports 'ubuntu' and 'debian'. |

    | **StartFolder** | DDL | No | Defines the initial directory where the file will
    be placed in the VM (desktop, home, downloads, temp). |

    | **Run As Root** | Boolean | No | If enabled, the file will be executed with
    superuser (root) privileges. |

    | **Timeout In Seconds** | String | No | Sets the duration for the analysis task.
    Range: 10-660 seconds. Default is 240. |

    | **Change to valid extension** | Boolean | No | If enabled, the sandbox will
    automatically correct the file extension to a valid one before execution. |

    | **Command line** | String | No | Optional command-line arguments to be passed
    to the file during execution. |

    | **System's language** | String | No | Sets the operating system's locale or
    language (e.g., 'en-US' or 'Brazil'). |

    | **User Tags** | String | No | Custom tags to categorize the task in the ANY.RUN
    interface (max 8 tags, 16 chars each). |

    | **Analysis Privacy Type** | DDL | No | Controls the visibility of the analysis
    task (public, bylink, owner, byteam). |

    | **Network Connect** | Boolean | No | Enables or disables network connectivity
    for the analysis VM. |

    | **Network Fakenet** | Boolean | No | Enables the FakeNet feature to simulate
    network services and intercept traffic. |

    | **Network Tor** | Boolean | No | Routes the VM's network traffic through the
    TOR network. |

    | **Network Geo** | String | No | Specifies the TOR exit node geolocation (e.g.,
    'US', 'AU'). |

    | **Network Mitm** | Boolean | No | Enables an HTTPS Man-In-The-Middle proxy for
    inspecting encrypted traffic. |

    | **Network Residential Proxy** | Boolean | No | Uses a residential proxy for
    the VM's network traffic. |

    | **Network Residential Proxy Geo** | String | No | Specifies the geolocation
    for the residential proxy. |


    ### Flow Description

    1. **Attachment Retrieval:** The action identifies and retrieves the first available
    file attachment from the Google SecOps case.

    2. **Task Submission:** The file is uploaded to the ANY.RUN sandbox, and a Linux
    analysis task is initiated using the configured OS and network parameters.

    3. **Interactive Link:** The action immediately adds a comment to the case containing
    a direct link to the live interactive analysis in ANY.RUN.

    4. **Status Polling:** The action monitors the progress of the analysis task until
    completion.

    5. **Report Retrieval:** Once finished, the action downloads the full HTML analysis
    report.

    6. **Case Enrichment:** The HTML report is saved as a new attachment on the case
    wall. Additionally, the action extracts any identified Malicious or Suspicious
    Indicators of Compromise (IOCs) and posts them as a summary comment in the case.


    ### Additional Notes

    - This action requires at least one attachment to be present in the case to function.

    - The action uses the ANY.RUN Linux connector specifically for non-Windows file
    analysis.
