    3. **Interaction:** Adds a comment to the case wall containing a direct link to
    the interactive ANY.RUN task.

    4. **Monitoring:** Polls the ANY.RUN service to monitor the task status until
    completion.

    5. **Reporting:** Downloads the full HTML analysis report and saves it as an attachment
    to the case wall.

    6. **IOC Extraction:** Retrieves extracted indicators from the analysis and posts
    a summary of any suspicious or malicious IOCs as a case comment.

    7. **Verdict:** Fetches the final analysis verdict and posts a concluding status
    comment to the case.
