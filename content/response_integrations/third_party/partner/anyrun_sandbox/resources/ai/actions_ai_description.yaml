File Linux Analysis:
  ai_description: >-
    ### General Description

    Performs automated file analysis in an ANY.RUN Linux sandbox environment. This
    action retrieves the first attachment from a Google SecOps case, uploads it to
    the ANY.RUN platform, and executes it within a specified Linux virtual machine
    (Ubuntu or Debian). It allows for extensive configuration of the sandbox environment,
    including network settings (FakeNet, TOR, MITM proxy), execution privileges, and
    privacy levels. The action monitors the task until completion, then retrieves
    a detailed HTML report and a summary of malicious or suspicious Indicators of
    Compromise (IOCs).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Env Os | ddl | Yes | Version of the Linux OS to use for analysis. Supports 'ubuntu'
    and 'debian'. |

    | StartFolder | ddl | No | The directory where the file execution starts. Supports
    'desktop', 'home', 'downloads', and 'temp'. |

    | Run As Root | boolean | No | If true, executes the file with superuser (root)
    privileges. |

    | Timeout In Seconds | string | No | The duration of the sandbox task. Range:
    10-660 seconds. Default is 240. |

    | Change to valid extension | boolean | No | If true, automatically renames the
    file to have a valid extension before analysis. |

    | Command line | string | No | Optional command-line arguments to pass to the
    analyzed object. |

    | System's language | string | No | The locale or country name for the operating
    system (e.g., 'en-US'). |

    | User Tags | string | No | Custom tags to associate with the ANY.RUN task (max
    8 tags, 16 characters each). |

    | Analysis Privacy Type | ddl | No | Privacy level for the analysis task. Supports
    'public', 'bylink', 'owner', and 'byteam'. |

    | Network Connect | boolean | No | Enables or disables network connectivity for
    the sandbox. |

    | Network Fakenet | boolean | No | Enables the FakeNet feature to simulate network
    services. |

    | Network Tor | boolean | No | Enables the use of the TOR network for sandbox
    traffic. |

    | Network Geo | string | No | Specifies the TOR exit node geolocation (e.g., 'US',
    'AU'). |

    | Network Mitm | boolean | No | Enables an HTTPS MITM Proxy for traffic inspection.
    |

    | Network Residential Proxy | boolean | No | Enables the use of a residential
    proxy for network traffic. |

    | Network Residential Proxy Geo | string | No | Specifies the geolocation for
    the residential proxy. |


    ### Additional Notes

    * **Discrepancy Note:** The YAML configuration defines the parameter as `Env Os`,
    but the underlying Python script attempts to extract a parameter named `Machine
    Os`. Ensure the parameter name in the UI matches the script's expectation or vice
    versa.

    * **Attachment Handling:** This action specifically targets the first attachment
    found in the current case. If no attachments are present, the action will fail.

    * **Internal Mutation:** This action modifies the case by adding comments and
    attaching the final HTML report to the case wall.


    ### Flow Description

    1. **Initialization:** Retrieves the ANY.RUN API key and SSL verification settings
    from the integration configuration.

    2. **Attachment Retrieval:** Fetches all attachments associated with the current
    case and selects the first one for analysis.

    3. **Task Submission:** Uploads the file data to the ANY.RUN Sandbox, configuring
    the Linux environment based on the provided action parameters.

    4. **Interactive Link:** Adds a comment to the case wall containing a direct link
    to the interactive analysis task on the ANY.RUN platform.

    5. **Monitoring:** Polls the ANY.RUN API to track the status of the analysis task
    until it reaches a terminal state.

    6. **Report Retrieval:** Downloads the final analysis report in HTML format and
    attaches it to the case wall.

    7. **IOC Extraction:** Fetches a list of IOCs identified during analysis. If any
    are classified as suspicious or malicious, a summary comment is added to the case.

    8. **Completion:** Ends the action by providing the final analysis verdict (e.g.,
    malicious, suspicious, or clean).
