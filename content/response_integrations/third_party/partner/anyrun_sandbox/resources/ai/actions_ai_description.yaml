    | StartFolder | ddl | No | The folder where the file execution starts (desktop,
    home, downloads, temp, appdata, windows, root). |

    | Timeout In Seconds | string | No | Task completion time range: 10-660 seconds.
    Default is 240. |

    | Change to valid extension | boolean | No | Automatically change file extension
    to a valid one. |

    | Command line | string | No | Optional command-line arguments for the analyzed
    object. |

    | System's language | string | No | Operation system's language (e.g., 'en-US'
    or 'Brazil'). |

    | User Tags | string | No | Custom tags for the task (max 8 tags, max 16 chars
    each). |

    | Analysis Privacy Type | ddl | No | Privacy settings: public, bylink, owner,
    byteam. Default is bylink. |

    | Network Connect | boolean | No | Enable network connection for the sandbox.
    |

    | Network Fakenet | boolean | No | Enable FakeNet feature. |

    | Network Tor | boolean | No | Enable TOR usage. |

    | Network Geo | string | No | TOR geolocation option (e.g., US, AU). |

    | Network Mitm | boolean | No | Enable HTTPS MITM Proxy. |

    | Network Residential Proxy | boolean | No | Enable residential proxy usage. |

    | Network Residential Proxy Geo | string | No | Residential proxy geolocation
    option. |


    ### Additional Notes

    * The action requires at least one attachment to be present in the Google SecOps
    case to function.

    * It automatically polls the sandbox until the analysis is complete or the timeout
    is reached.


    ### Flow Description

    1. **Attachment Retrieval:** Fetches the first available attachment from the Google
    SecOps case.

    2. **Sandbox Submission:** Submits the file to the ANY.RUN Windows sandbox using
    the configured environment (OS version, bitness) and network settings.

    3. **Interactive Link:** Adds a comment to the case with a direct link to the
    interactive analysis task in ANY.RUN.

    4. **Status Polling:** Monitors the task status until the analysis is finished.

    5. **Report Retrieval:** Downloads the HTML analysis report and saves it as an
    attachment to the case wall.

    6. **IOC Extraction:** Retrieves Indicators of Compromise (IOCs) from the report.
    If suspicious or malicious indicators are identified, a summary comment is added
    to the case.

    7. **Verdict:** Ends the action by providing the final analysis verdict.
