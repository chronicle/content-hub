  ai_description: >-
    ### General Description

    Performs automated malware analysis of file attachments using an Android Virtual
    Machine in the ANY.RUN Sandbox. This action allows security analysts to safely
    execute suspicious files in a controlled environment to observe behavior, network
    activity, and identify malicious indicators. It retrieves a file attachment from
    the SecOps case, submits it for analysis with customizable network and privacy
    settings, and returns a comprehensive report including IOCs and a final verdict.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeout In Seconds | string | No | Select task completion time. Range: 10-660
    seconds. Default is 240. |

    | Change to valid extension | boolean | No | Automatically change file extension
    to a valid one if necessary. |

    | Command line | string | No | Optional command-line arguments for the analyzed
    object. |

    | System's language | string | No | Operating system's language (e.g., 'en-US'
    or 'Brazil'). |

    | User Tags | string | No | Add user tags (max 8 tags, 16 characters each). |

    | Analysis Privacy Type | ddl | No | Privacy settings for the task. Supports:
    public, bylink, owner, byteam. |

    | Network Connect | boolean | No | Enable network connection for the VM. |

    | Network Fakenet | boolean | No | Enable FakeNet feature to simulate network
    services. |

    | Network Tor | boolean | No | Enable TOR for network traffic. |

    | Network Geo | string | No | TOR geolocation option (e.g., US, AU). |

    | Network Mitm | boolean | No | Enable HTTPS MITM Proxy for traffic inspection.
    |

    | Network Residential Proxy | boolean | No | Use a residential proxy for the analysis.
    |

    | Network Residential Proxy Geo | string | No | Residential proxy geolocation
    option (e.g., US, AU). |


    ### Flow Description

    1. **Retrieve Attachment:** The action fetches the list of attachments associated
    with the current Google SecOps case and selects the first one.

    2. **Submit to Sandbox:** The file is uploaded to the ANY.RUN Sandbox using the
    Android VM environment, applying all configured network, privacy, and timeout
    parameters.

    3. **Interactive Link:** A comment is added to the case wall providing a direct
    URL to the interactive analysis session in ANY.RUN.

    4. **Monitor Status:** The action polls the ANY.RUN API to monitor the progress
    of the analysis task.

    5. **Retrieve Report:** Once analysis is complete, the action downloads the full
    HTML report.

    6. **Internal Mutation (Case Wall):** The HTML report is saved as a new attachment
    to the case wall for forensic record-keeping.

    7. **Extract IOCs:** The action retrieves identified Indicators of Compromise
    (IOCs) and posts a summary comment to the case if suspicious or malicious indicators
    are found.

    8. **Final Verdict:** The action concludes by providing the final analysis verdict
    (e.g., Malicious, Suspicious, No threats detected).


    ### Additional Notes

    - **Prerequisites:** Requires a valid ANY.RUN Sandbox API Key configured in the
    integration settings.

    - **Error Handling:** If no attachments are found in the case, the action will
    fail with an 'Attachment is not found' message.
