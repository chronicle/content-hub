File Windows Analysis:
  ai_description: >-
    ### General Description

    Submits a file attachment from the case to the ANY.RUN sandbox for dynamic analysis
    in a Windows environment. This action uploads the file, monitors the analysis
    progress, and retrieves the final report, verdict, and extracted Indicators of
    Compromise (IOCs).


    ### Flow Description

    1. Retrieves the first file attachment associated with the current case.

    2. Uploads the file to the ANY.RUN sandbox via the `run_file_analysis` API endpoint
    to initiate a new analysis task with the specified environment parameters.

    3. Adds a case comment containing a direct URL link to the interactive analysis
    session in ANY.RUN.

    4. Polls the ANY.RUN API for the task status until the analysis is completed.

    5. Retrieves the HTML analysis report from the ANY.RUN API and saves it as an
    attachment to the SecOps case wall.

    6. Retrieves extracted IOCs from the analysis report. If suspicious or malicious
    IOCs are found, they are summarized and added as a case comment.

    7. Retrieves the final analysis verdict and completes the action.


    ### Additional Notes

    This action only processes the first attachment found in the case. It requires
    a valid ANY.RUN API key configured in the integration settings. The action allows
    extensive customization of the sandbox environment, including OS version, network
    routing (Tor, Proxy, FakeNet), and execution parameters.
