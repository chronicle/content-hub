Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ANY.RUN Sandbox API to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts integration-level configuration parameters, including the API Key,
    SSL verification settings, and proxy details.

    2. If proxy settings are enabled, it performs a preliminary check to verify proxy
    connectivity.

    3. Initializes the ANY.RUN Sandbox connector and makes an API call to check authorization
    (`check_authorization`).

    4. Returns a successful execution state if the connection and authorization are
    valid, or fails with an error message if an exception occurs.


    ### Additional Notes

    This is a utility action primarily used during the initial setup or troubleshooting
    of the ANY.RUN Sandbox integration to verify network connectivity and credential
    validity. It does not interact with alerts or entities.
