File Android Analysis:
  ai_description: >-
    ### General Description

    The **File Android Analysis** action enables security analysts to perform automated
    file detonation and behavioral analysis using the ANY.RUN Sandbox's Android Virtual
    Machine. The action retrieves a file attachment from a Google SecOps case, uploads
    it to the ANY.RUN platform with highly granular configuration options (such as
    network routing, privacy levels, and environment locales), and retrieves comprehensive
    analysis results including HTML reports and Indicators of Compromise (IOCs).


    ### Flow Description

    1. **Attachment Acquisition**: The action fetches the first available attachment
    from the current Google SecOps case.

    2. **Sandbox Submission**: The file is uploaded to the ANY.RUN Sandbox. The submission
    includes specific Android VM configurations based on the provided parameters like
    network connectivity, Tor usage, and MITM proxy settings.

    3. **Interactive Link Generation**: A comment is added to the case containing
    a direct URL to the live interactive analysis session in ANY.RUN.

    4. **Status Monitoring**: The action polls the sandbox for task completion.

    5. **Report Retrieval & Storage**: Once the analysis is finished, the action downloads
    the full HTML report and saves it as a new attachment on the case wall.

    6. **IOC Extraction**: The action retrieves identified IOCs and posts a summary
    comment to the case, highlighting any indicators flagged as 'Suspicious' or 'Malicious'.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeout In Seconds | String | No | Defines the duration of the analysis task
    (Range: 10-660 seconds). Default is 240. |

    | Change to valid extension | Boolean | No | If enabled, the sandbox will automatically
    correct the file extension to a valid format. |

    | Command line | String | No | Optional command-line arguments to be executed
    with the file. |

    | System's language | String | No | Sets the OS locale/language (e.g., 'en-US'
    or 'Brazil'). |

    | User Tags | String | No | Custom tags for task categorization in ANY.RUN (Max
    8 tags, 16 chars each). |

    | Analysis Privacy Type | DDL | No | Controls visibility: 'public', 'bylink',
    'owner', or 'byteam'. |

    | Network Connect | Boolean | No | Enables or disables internet access for the
    Android VM. |

    | Network Fakenet | Boolean | No | Enables the FakeNet feature to simulate network
    services. |

    | Network Tor | Boolean | No | Routes VM traffic through the Tor network. |

    | Network Geo | String | No | Specifies the geolocation for Tor exit nodes (e.g.,
    'US', 'AU'). |

    | Network Mitm | Boolean | No | Enables HTTPS Man-in-the-Middle proxying for traffic
    inspection. |

    | Network Residential Proxy | Boolean | No | Enables the use of residential proxies
    for the analysis. |

    | Network Residential Proxy Geo | String | No | Specifies the geolocation for
    the residential proxy. |


    ### Additional Notes

    This action is specifically designed for Android-compatible files (e.g., APKs).
    It requires a valid API Key for ANY.RUN to be configured in the integration settings.
    The action will fail if no attachments are found in the case.
  capabilities:
    can_create_case_comments: true
