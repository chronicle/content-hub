Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity between
    the Google SecOps environment and the ANY.RUN Sandbox service. Its primary purpose
    is to ensure that the integration is correctly configured, the API key is valid,
    and the network path (including optional proxies) is open.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the integration's global
    configuration, including the ANY.RUN Sandbox API Key, SSL verification preference,
    and proxy settings.

    2. **Proxy Validation**: If proxy support is enabled in the configuration, the
    action first attempts to validate the connection through the specified proxy host
    and port.

    3. **Authorization Check**: The action initializes a connection to the ANY.RUN
    Sandbox API using the provided credentials and performs a standard authorization
    check to confirm the API key's validity.

    4. **Result Reporting**: Based on the success or failure of the API call, the
    action returns a completion status and an informative message to the user.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not take any input parameters. It uses the
    global integration configuration. |


    ### Additional Notes

    - This action is strictly for connectivity testing and does not process any entities
    or alert data.

    - It relies on the 'ANYRUN Sandbox API KEY', 'Verify SSL', and 'Enable proxy'
    settings defined at the integration level.
