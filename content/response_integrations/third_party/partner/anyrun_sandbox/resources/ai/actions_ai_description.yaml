    - Extracted IOCs with suspicious or malicious reputations are summarized in case
    comments.


    ### Flow Description

    1. **Initialization:** Extracts the API key and SSL configuration from the integration
    settings.

    2. **Submission:** Submits the provided URL(s) to the ANY.RUN API to start a Linux-based
