      to the case.
    reasoning: >-
      The action submits a file to the ANY.RUN sandbox (external mutation), polls
      for status, retrieves the report, and extracts IOCs. It adds comments and attachments
      to the case (internal mutation).
  categories:
    enrichment: false
    reasoning: >-
      The action creates a task in an external system (ANY.RUN), which constitutes
      a mutation of external data. Therefore, it does not meet the criteria for an
      Enrichment action.
