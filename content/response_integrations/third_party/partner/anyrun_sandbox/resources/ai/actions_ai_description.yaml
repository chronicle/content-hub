URL Linux Analysis:
  ai_description: >-
    Submits URLs to the ANY.RUN Linux-based sandbox for automated behavioral analysis.
    This action allows security analysts to execute and observe potentially malicious
    links within a controlled Linux environment (Ubuntu or Debian) using popular browsers
    like Google Chrome or Mozilla Firefox. It provides comprehensive visibility into
    network activity, process execution, and potential threats associated with the
    submitted URL.


    ### Flow Description

    1. **Initialization**: Retrieves the ANY.RUN API key and SSL verification settings
    from the integration configuration.

    2. **Input Processing**: Extracts the target URL(s) from the action parameters,
    supporting comma-separated inputs.

    3. **Task Submission**: For each URL, it initiates a new Linux analysis task in
    the ANY.RUN sandbox using the specified OS, browser, and network configurations
    (e.g., Tor, VPN, MITM proxy).

    4. **Interactive Access**: Immediately posts a case comment containing a direct
    link to the interactive ANY.RUN analysis session.

    5. **Status Monitoring**: Polls the ANY.RUN API to monitor the progress of the
    analysis task until completion.

    6. **Report Retrieval**: Downloads the final HTML analysis report and attaches
    it to the Google SecOps case wall for forensic documentation.

    7. **IOC Extraction**: Retrieves identified Indicators of Compromise (IOCs) from
    the analysis and summarizes suspicious or malicious findings in a case comment.

    8. **Verdict Reporting**: Fetches the final analysis verdict and posts a concluding
    status update to the case.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Url | The destination URL(s) to be analyzed in the sandbox. | String | Yes |
    Supports comma-separated values; defaults to the entity identifier. |

    | Machine Os | The Linux distribution to use for the analysis. | DDL | Yes | Supports
    'ubuntu' and 'debian'. |

    | Browser | The web browser to use for opening the URL. | DDL | Yes | Supports
    'Google Chrome' and 'Mozilla Firefox'. |

    | Timeout In Seconds | The duration of the analysis task. | String | No | Range:
    10-660 seconds. Default: 120. |

    | Command line | Optional command-line arguments for the browser or analyzed object.
    | String | No | |

    | System's language | The locale or language for the operating system. | String
    | No | Example: 'en-US' or 'Brazil'. |

    | User Tags | Custom tags to categorize the task in ANY.RUN. | String | No | Max
    8 unique tags, 16 chars each. |

    | Analysis Privacy Type | Privacy level for the analysis task. | DDL | No | Options:
    public, bylink, owner, byteam. Default: bylink. |

    | Network Connect | Enables or disables network connectivity for the VM. | Boolean
    | No | Default: true. |

    | Network Fakenet | Enables the FakeNet feature to simulate network services.
    | Boolean | No | Default: false. |

    | Network Tor | Routes network traffic through the Tor network. | Boolean | No
    | Default: false. |

    | Network Geo | Specifies the Tor exit node geolocation. | String | No | Default:
    'fastest'. |

