File Android Analysis:
  ai_description: >-
    ### General Description

    Submits a case attachment to the ANY.RUN sandbox for analysis using an Android
    Virtual Machine. It retrieves the analysis report, extracts Indicators of Compromise
    (IOCs), and attaches the HTML report to the case wall.


    ### Flow Description

    1. Retrieves the first attachment from the current case.

    2. Submits the attachment to the ANY.RUN sandbox via the `run_file_analysis` API
    call.

    3. Adds a case comment containing a link to the interactive analysis session.

    4. Polls the ANY.RUN API (`get_task_status`) until the analysis is complete.

    5. Retrieves the HTML analysis report (`get_analysis_report`) and saves it as
    a new attachment on the case wall.

    6. Retrieves the IOC report, parses it for suspicious or malicious indicators,
    and adds a summary as a case comment.

    7. Retrieves the final analysis verdict (`get_analysis_verdict`) and completes
    the action.


    ### Additional Notes

    The action requires an attachment to be present in the case. It does not operate
    on standard entities.
  ai_short_description: >-
    Submits a case attachment to the ANY.RUN sandbox for Android VM analysis, retrieves
    the resulting threat report and IOCs, and attaches the findings to the case wall.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the ANY.RUN sandbox, creating a new analysis task on the external
      service.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds case comments with analysis links and IOC summaries, and saves the HTML
      analysis report as an attachment to the case wall.
    reasoning: >-
      The action fetches data by polling for task status and retrieving analysis reports
      from ANY.RUN. It mutates external data by submitting a file to the ANY.RUN sandbox,
      which creates a new analysis task. It mutates internal data by saving the HTML
      report as a case wall attachment and adding case comments with the analysis
      link and IOC summary. It does not update entities or create insights.
