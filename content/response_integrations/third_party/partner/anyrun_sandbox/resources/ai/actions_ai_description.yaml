    - This action specifically utilizes an Android VM for analysis, making it ideal
    for mobile-specific threats.

    - The action supports multiple URLs by splitting the input string by commas.

    - It automatically handles report generation and attachment to the case wall.


    ### Flow Description

    1. **Initialization**: Extracts the ANY.RUN API key and SSL configuration from
    the integration settings.

    2. **Input Parsing**: Retrieves the target URL(s) from the action parameters.

    3. **Task Creation**: For each URL, it initiates a new Android sandbox analysis
    task in ANY.RUN with the specified network and environment configurations.

    4. **Interactive Link**: Adds a comment to the case containing a direct link to
    the ANY.RUN interactive analysis session.

    5. **Status Monitoring**: Polls the ANY.RUN API to monitor the progress of the
    analysis task until completion.

    6. **Report Retrieval**: Downloads the full HTML analysis report and attaches
    it to the case wall as a base64-encoded file.

    7. **IOC Extraction**: Fetches extracted indicators (IOCs) from the analysis and
    adds a summary comment to the case if any suspicious or malicious indicators are
    identified.

    8. **Final Verdict**: Retrieves the final analysis verdict and posts a concluding
    status comment to the case.
