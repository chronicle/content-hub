    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a connectivity test ('Ping'). It does not perform any of the listed
      functional operations (enrichment, containment, ticket management, etc.).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
