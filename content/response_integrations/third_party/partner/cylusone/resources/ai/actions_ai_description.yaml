Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CylusOne platform. This action verifies that the provided
    integration credentials are valid and that the SecOps platform can successfully
    communicate with the CylusOne API.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, API Key,
    Verify SSL).

    2. Initializes the API manager with the extracted credentials.

    3. Executes a test GET request to the `/rest/v1/assets/by-ip` endpoint using a
    hardcoded test IP address (`10.0.0.5`).

    4. Evaluates the HTTP response status code to determine if authentication and
    network reachability are successful.

    5. Returns a completed status with a success message if connected, or a failed
    status with an error message if the connection or authentication fails.


    ### Additional Notes

    This is a standard utility action used primarily during integration setup and
    troubleshooting. It does not interact with case entities, modify any data, or
    consume action-specific parameters.
  ai_short_description: >-
    Tests connectivity to the CylusOne platform by verifying the provided API credentials
    and network reachability.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
