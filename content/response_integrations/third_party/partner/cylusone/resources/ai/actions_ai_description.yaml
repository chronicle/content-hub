    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a connectivity test (Ping) and does not perform any of the defined
      product category actions (e.g., enrichment, containment, ticket management).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Tests the connectivity to the CylusOne platform. This action validates the provided
    API credentials and ensures the integration can successfully communicate with
    the CylusOne API endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base URL | String | Yes | The base URL of the CylusOne API. |

    | Cylus API Key | String | Yes | The API key used for authentication. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates during API requests.
    |


    ### Flow Description

    1. The action extracts the integration parameters (Base URL, API Key, Verify SSL)
    from the configuration.

    2. It initializes the `ApiManager` with these parameters.

    3. It calls the `test_connectivity` method, which sends a GET request to the CylusOne
    API to verify the connection.

    4. The action returns a success or failure status based on the API response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test (Ping) to the CylusOne platform. It
      does not fetch contextual data for entities, nor does it mutate any external
      or internal systems.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action, which is explicitly excluded from being an enrichment
      action per the instructions.
  entity_usage:
