EnrichAssetInformation:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action queries an external API to retrieve asset metadata (such as MAC addresses
      and other asset properties) associated with an IP address. This aligns perfectly
      with the 'Enrich Asset' expected outcome. It does not perform IOC reputation
      checks, blocklist modifications, or any other listed outcomes.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Enriches IP address entities by retrieving associated asset information from the
    CylusOne platform. This action queries the Cylus API to find asset details linked
    to specific IP addresses and appends the retrieved data to the entity's additional
    properties.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the standard
    integration configuration parameters (Base URL, API Key, Verify SSL).


    ### Action Flow

    1. **Entity Filtering:** Iterates through the target entities in the case and
    filters for entities of type `ADDRESS`.

    2. **Validation:** Validates that the identifier is a properly formatted IPv4
    address.

    3. **Data Fetching:** Queries the CylusOne API (`/rest/v1/assets/by-ip`) to fetch
    asset details for each valid IP address.

    4. **Data Processing:** Parses, flattens, and compacts the returned asset properties
    (including MAC addresses and other metadata).

    5. **Entity Update:** Updates the entity's `additional_properties` with the enriched
    data, marks the entity as enriched (`is_enriched = True`), and saves the updates
    to the SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches asset data from the CylusOne API using a GET request. It
      does not perform any external mutations (no POST/PUT/DELETE). Internally, it
      updates the entities with the fetched data by modifying their additional_properties
      and calling update_entities. It does not create insights, modify alert data,
      or add case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action retrieves data from an external source (CylusOne) to supplement entity
      information. It does not mutate external state and only updates entity attributes
      internally. Therefore, it strictly qualifies as an Enrichment action and does
      not perform any Remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks `if
      entity.entity_type != EntityTypes.ADDRESS:`. This means it targets ADDRESS entities
      and filters them based on their entity_type.
