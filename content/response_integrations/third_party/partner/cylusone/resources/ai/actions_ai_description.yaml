  ai_description: >-
    ### General Description

    Enriches IP Address entities with detailed asset information retrieved from the
    Cylus platform. This action is designed to provide security analysts with contextual
    metadata about network assets, such as MAC addresses, operating system details,
    and custom properties, by querying the Cylus API using the entity's IP address.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    - The action specifically targets entities of type `ADDRESS` (IP addresses).

    - It performs a validation check to ensure the IP address is in a valid IPv4 format
    before making API calls.

    - Enrichment data is prefixed with `Cylus_` to avoid collisions with other data
    sources.

    - List-based fields (like MACs or IPs) are truncated to a maximum of 5 items and
    formatted as comma-separated strings.


    ### Flow Description

    1. **Initialization**: The action initializes the Cylus API manager using the
    integration's base URL and API key.

    2. **Entity Filtering**: It iterates through the target entities in the current
    context, filtering for those of type `ADDRESS`.

    3. **Validation**: For each valid entity, it verifies the IPv4 format of the identifier.

    4. **Data Retrieval**: It performs a GET request to the Cylus `/rest/v1/assets/by-ip`
    endpoint using the IP address.

    5. **Data Processing**: If an asset is found, the action flattens the JSON response,
    cleans property names (converting them to snake_case), and formats list values.

    6. **Internal Mutation**: The processed data is added to the entity's `additional_properties`
    and the `is_enriched` flag is set to true.

    7. **Update**: The action updates the entities within Google SecOps to persist
    the enrichment data.

    8. **Completion**: It returns a summary message indicating which entities were
    successfully enriched and provides the raw data in the JSON result.
