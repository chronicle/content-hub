EnrichAssetInformation:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata (asset information) for an IP address
      and updates the entity. This aligns with the 'Enrich Asset' category. It does
      not provide threat intelligence (reputation/prevalence), so it is not an 'Enrich
      IOC' action.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action enriches IP address entities with asset information retrieved from
    the CylusOne platform. It queries the CylusOne API to obtain detailed asset metadata
    for a given IP address, flattens the retrieved properties, and updates the entity's
    additional properties within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base URL | String | Yes | The base URL of the CylusOne platform. |

    | Cylus API Key | String | Yes | The API key used for authentication with the
    CylusOne platform. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates for the API connection.
    |


    ### Additional Notes

    This action is designed for asset enrichment. It does not perform threat intelligence
    lookups (e.g., reputation scores) and does not modify any external systems. It
    only updates the entity's internal properties within the SOAR platform.


    ### Flow Description

    1. The action iterates through all target entities provided in the case.

    2. It filters for entities of type `ADDRESS` and validates their format.

    3. For each valid IP, it queries the CylusOne API to retrieve associated asset
    details.

    4. The retrieved asset data is flattened and formatted into key-value pairs.

    5. The action updates the entity's `additional_properties` with this new information
    and marks the entity as enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's 'additional_properties' and 'is_enriched' status within
      the SOAR platform.
    reasoning: >-
      The action fetches asset data from an external API (CylusOne) and updates the
      entity's internal properties within the SOAR platform. It does not perform any
      mutations on external systems, nor does it create insights or modify alert data.
  categories:
    enrichment: true
    reasoning: >-
      The action is an enrichment action because it fetches data from an external
      source (CylusOne) and updates internal entity properties without mutating any
      external systems or performing unauthorized internal modifications.
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over the target entities and explicitly filters for entities
      of type 'ADDRESS'. It does not filter by other attributes like creation time,
      modification time, or specific identifiers.
