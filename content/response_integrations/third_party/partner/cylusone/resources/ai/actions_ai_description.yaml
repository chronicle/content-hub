    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Tests the connectivity to the CylusOne platform. This action validates the provided
    API credentials and ensures the integration can successfully communicate with
    the CylusOne API endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base URL | String | Yes | The base URL of the CylusOne API. |

    | Cylus API Key | String | Yes | The API key used for authentication. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates during API requests.
    |


    ### Flow Description

    1. The action extracts the integration parameters (Base URL, API Key, Verify SSL)
    from the configuration.

    2. It initializes the `ApiManager` with these parameters.

    3. It calls the `test_connectivity` method, which sends a GET request to the CylusOne
    API to verify the connection.

    4. The action returns a success or failure status based on the API response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity. It does not modify
      external or internal data, nor does it fetch contextual data on alerts or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action. Per the instructions, 'Actions named Ping must
      not be categorized as enrichment actions.' Additionally, it does not fetch contextual
      data on alerts or entities.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
