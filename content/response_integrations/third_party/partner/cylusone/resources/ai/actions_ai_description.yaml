  ai_description: >-
    ### General Description

    The Ping action is used to test the connectivity and validate the credentials
    between Google SecOps and the Cylus platform.


    ### Flow Description

    1. Extracts the integration configuration parameters (Base URL, API Key, Verify
    SSL).

    2. Initializes the API manager and attempts to make a test GET request to the
    Cylus platform.

    3. Evaluates the HTTP response to determine if the connection is successful and
    credentials are valid.

    4. Returns a successful execution state if connected, or a failed state with an
    error message if the connection or authentication fails.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration-level configuration parameters.
  capabilities:
