EnrichAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities with detailed asset information retrieved from the
    CylusOne platform. This action is designed to provide security analysts with contextual
    metadata about network assets, such as MAC addresses, associated IPs, and custom
    asset properties, directly within the Google SecOps case.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    - The action specifically targets entities of type **ADDRESS** (IP addresses).

    - Enriched data is added to the entity's `additional_properties` with a `Cylus_`
    prefix.

    - The action marks the entity as `is_enriched = True` upon successful data retrieval.


    ### Flow Description

    1. **Initialization**: The action initializes the CylusOne API manager using the
    integration's base URL and API key.

    2. **Entity Filtering**: It iterates through the target entities in the current
    context, filtering for those of type `ADDRESS` and validating that they follow
    a proper IPv4 format.

    3. **Data Retrieval**: For each valid IP address, the action performs a GET request
    to the CylusOne `/rest/v1/assets/by-ip` endpoint.

    4. **Data Processing**: If an asset is found, the action flattens the JSON response,
    formatting list fields (like MACs) and custom properties into a key-value structure.

    5. **Internal Update**: The processed metadata is appended to the entity's additional
    properties, and the entity is updated within the Google SecOps platform.

    6. **Finalization**: The action returns a summary message indicating which entities
    were successfully enriched and which failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with asset information from Cylus and sets
      the 'is_enriched' flag to true.
  categories:
    enrichment: true
