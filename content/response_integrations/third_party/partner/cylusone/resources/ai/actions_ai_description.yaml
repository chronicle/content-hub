    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a single GET request to verify API credentials and network
      connectivity. It does not fetch contextual data for alerts or entities, nor
      does it mutate any external or internal data. It does not update entities, create
