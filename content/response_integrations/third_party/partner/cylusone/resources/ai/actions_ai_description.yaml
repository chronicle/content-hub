EnrichAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities by retrieving associated asset information from the
    CylusOne platform. The action fetches asset details, flattens the returned properties,
    and appends them to the entity's additional properties within Google SecOps.


    ### Flow Description

    1. Iterates through the target entities and filters for those with the `ADDRESS`
    entity type.

    2. Validates that the entity identifier is a properly formatted IPv4 address.

    3. Makes an HTTP GET request to the CylusOne API (`/rest/v1/assets/by-ip`) to
    fetch asset details for each valid IP address.

    4. Parses the API response, extracting and flattening asset properties (including
    MAC addresses and custom properties).

    5. Updates the entity's `additional_properties` with the retrieved data and marks
    the entity as enriched (`is_enriched = True`).

    6. Saves the updated entities back to the platform and returns a JSON result containing
    the enrichment data.


    ### Additional Notes

    - The action strictly requires valid IPv4 addresses; other formats or entity types
    will be skipped and marked as failed.

    - Extracted list fields (like `ips` and `macs`) are formatted as comma-separated
    strings up to a maximum of 5 items.
  ai_short_description: >-
    Enriches IP Address entities by retrieving and appending asset information from
    the CylusOne platform to the entity's additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the CylusOne API. It does
      not mutate external data. It updates internal entities by appending the retrieved
      asset data to the entity's additional properties and calling `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
