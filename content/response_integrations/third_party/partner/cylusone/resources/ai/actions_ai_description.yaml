    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata (asset information) for an IP address
      and updates the entity. This matches the 'Enrich Asset' category. It does not
      perform threat intelligence lookups (reputation/prevalence) in the traditional
      sense of 'Enrich IOC', though it enriches an IP. 'Enrich Asset' is the most
      accurate description.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action enriches IP address entities with asset information retrieved from
    the CylusOne platform. It queries the CylusOne API to obtain detailed asset metadata
    for a given IP address, flattens the retrieved properties, and updates the entity's
    additional properties within the SOAR platform.


    ### Parameters Description

    There are no action-specific parameters. The action relies on global integration
    configuration parameters (Base URL, API Key, and Verify SSL) to establish connectivity
    with the CylusOne platform.


    ### Additional Notes

    This action is designed to be used for asset enrichment. It does not perform threat
    intelligence lookups (e.g., reputation scores) and does not modify any external
    systems.


    ### Flow Description

    1. The action iterates through all target entities provided in the case.

    2. It filters for entities of type `ADDRESS` and validates their format.

    3. For each valid IP, it queries the CylusOne API to retrieve associated asset
    details.

    4. The retrieved asset data is flattened and formatted into key-value pairs.

    5. The action updates the entity's `additional_properties` with this new information
    and marks the entity as enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's additional_properties and sets the is_enriched flag to
      true.
    reasoning: >-
      The action fetches asset data from an external API (CylusOne) and updates the
      internal entity properties within the SOAR platform. It does not modify external
      systems or create insights/comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source and updates internal entity
      properties without modifying external systems. This meets the criteria for an
      enrichment action.
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly checks `entity.entity_type
      == EntityTypes.ADDRESS`.
