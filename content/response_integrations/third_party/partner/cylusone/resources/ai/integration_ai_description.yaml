product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration provides the 'EnrichAssetInformation' action, which retrieves
    asset metadata for IP addresses from the CylusOne Rail OT platform. This directly
    aligns with the 'Asset Inventory' category, which is used to obtain more information
    about internal assets. The integration does not perform threat intelligence lookups
    (as explicitly stated in the action description), log searching, EDR, network
    security, or other functions defined in the remaining categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
