product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration provides an action 'EnrichAssetInformation' which retrieves detailed
    asset metadata for IP addresses from the CylusOne Rail OT Cybersecurity platform.
    This functionality directly aligns with the Asset Inventory category, which is
    defined by the ability to retrieve information about internal assets such as ownership
    and business criticality. The integration does not perform threat intelligence
    lookups (reputation/prevalence), nor does it provide SIEM-like log searching,
    EDR-like host containment, or network security blocking capabilities based on
    the provided actions. Therefore, it is classified solely as Asset Inventory.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
