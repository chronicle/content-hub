Get Object Id:
  ai_description: >-
    ### General Description

    Retrieves object IDs from BloodHound Enterprise based on a provided list of object
    names. This action queries the BloodHound Enterprise API to find the corresponding
    unique identifiers for the specified entities, which can be used in subsequent
    actions.


    ### Flow Description

    1. Extracts the 'Object Names' parameter and splits it into a list of individual
    names.

    2. Initializes the BloodHound Enterprise manager with the provided integration
    credentials.

    3. Iterates through the list of names and makes a GET request to the BloodHound
    Enterprise search API (`/api/v2/search`) for each name.

    4. Collects the retrieved object IDs and associated data from the API responses.

    5. Returns the consolidated results as a JSON object attached to the action's
    execution results.


    ### Additional Notes

    Ensure that the provided object names exactly match or are searchable within the
    BloodHound Enterprise environment to successfully retrieve their IDs.
