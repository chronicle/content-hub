Fetch Assets:
  ai_description: >-
    ### General Description

    Fetches asset information from BloodHound Enterprise based on a provided list
    of object IDs (SIDs or Azure object IDs). The action retrieves primary details
    and related entity counts for the specified objects and returns the consolidated
    data as a JSON result.


    ### Flow Description

    1. Retrieves the list of Object IDs from the action parameters.

    2. Initializes the BloodHound Enterprise API client.

    3. Iterates through the provided Object IDs, processing one per execution cycle
    to prevent timeouts (asynchronous execution).

    4. For each Object ID, makes a GET request to the BloodHound Enterprise API (`/api/v2/search`)
    to search for the object and determine its type.

    5. Makes subsequent GET requests to fetch primary details based on the object
    type (e.g., Directory, Azure, or Base types).

    6. If the object is an Azure type, makes additional GET requests to fetch Azure-specific
    related entity counts.

    7. Consolidates the fetched asset information and adds it to the action's JSON
    result.


    ### Additional Notes

    The action runs asynchronously, processing one Object ID per execution cycle and
    maintaining state between runs using the `additional_data` parameter. It does
    not operate on SOAR entities.
