Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the BloodHound Enterprise server using the provided
    integration credentials.


    ### Flow Description

    1. Extracts integration configuration parameters (Server URL, Token ID, and Token
    Key).

    2. Initializes the BloodHound API client.

    3. Makes a GET request to the `/api/v2/available-domains` endpoint to verify authentication
    and network connectivity.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

    This action does not require any action-specific parameters or entities to run.
    It is primarily used for diagnostic purposes to ensure the integration is configured
    correctly.
