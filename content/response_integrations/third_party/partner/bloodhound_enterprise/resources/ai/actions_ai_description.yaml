Does Path Exists:
  ai_description: >-
    ### General Description

    Checks if an attack path exists between multiple combinations of principals (source
    and destination nodes) in BloodHound Enterprise. It parses a provided JSON string
    containing pairs of principals and queries the BloodHound Enterprise API to determine
    if a shortest path exists between each pair.


    ### Flow Description

    1. Extracts the 'Event Details' parameter containing JSON pairs of 'FromPrincipal'
    and 'ToPrincipal'.

    2. Parses the input string into a list of valid principal pairs.

    3. Iterates through each pair and makes a GET request to the BloodHound Enterprise
    API (`/api/v2/graphs/shortest-path`) to check if a path exists between the start
    and end nodes.

    4. Aggregates the path existence results for all pairs.

    5. Returns a consolidated JSON result and a boolean indicating if all checked
    paths exist.


    ### Additional Notes

    The 'Event Details' parameter must be a valid JSON array or comma-separated JSON
    objects containing 'FromPrincipal' and 'ToPrincipal' keys.
  ai_short_description: >-
    Checks if an attack path exists between multiple combinations of source and destination
    principals in BloodHound Enterprise.
