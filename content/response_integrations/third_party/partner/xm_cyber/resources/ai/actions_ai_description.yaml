Ping:
  ai_description: >-
    ### General Description

    Tests the configuration credentials and connectivity of the XM Cyber integration.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Authentication Type, Base
    URL, API Key).

    2. Initializes the API manager and attempts to authenticate with the XM Cyber
    server.

    3. Makes an API call (POST request) to the authentication endpoint (`/api/auth/`)
    to verify the credentials.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to ensure
    that the provided credentials and network configurations are correct.
