Calculate Risk Score:
  ai_description: >-
    Calculates a comprehensive risk score for an alert by processing XM Cyber-specific
    attributes found within alert events and entities. This action is designed to
    provide a structured JSON output that playbooks can use to filter, prioritize,
    or route alerts based on calculated risk levels. It evaluates multiple security
    factors such as MFA status, administrative privileges, and asset criticality based
    on user-defined weights.


    ### Flow Description:

    1. **Parameter Collection:** Retrieves user-configured risk weights and thresholds
    for various categories (e.g., Critical Assets, MFA status, AD risk levels).

    2. **Event Processing:** Iterates through the security events associated with
    the current alert, extracting XM Cyber labels and calculating individual risk
    scores for assets and users mentioned in the events.

    3. **Entity Processing:** Iterates through the alert's entities (specifically
    Users and Hostnames), checking for XM Cyber enrichment data in their additional
    properties to calculate entity-specific risk scores.

    4. **Aggregation:** Consolidates all calculated scores from events and entities,
    determining the maximum risk levels and aggregating labels.

    5. **Output Generation:** Produces a final JSON object containing the base risk
    score, calculated risk score, and boolean flags for various risk factors, which
    is then attached to the action result.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AD Risk to Domain | DDL | Yes | Weight for Active Directory risk to the domain
    (Disabled, Low, Default, High). |

    | AD Risky Principals | DDL | Yes | Weight for AD risky principals (Disabled,
    Low, Default, High). |

    | AD Admins And DCs | DDL | Yes | Weight for AD Administrators and Domain Controllers
    (Disabled, Low, Default, High). |

    | User without MFA | DDL | Yes | Weight for users identified as not having Multi-Factor
    Authentication (Disabled, Low, Default, High). |

    | Is Critical Asset | DDL | Yes | Weight for entities marked as critical assets
    (Disabled, Low, Default, High). |

    | Predefined Admin | DDL | Yes | Weight for predefined administrative accounts
    (Disabled, Low, Default, High). |

    | Highly Privileged | DDL | Yes | Weight for highly privileged accounts (Disabled,
    Low, Default, High). |

    | Compromise Risk Score | DDL | Yes | Sensitivity level for the compromise risk
    score (Low, Default, High). |

    | Choke Point Score | DDL | Yes | Sensitivity level for the choke point score
    (Low, Default, High). |


    ### Additional Notes:

    - This action does not perform external API calls; it relies on data previously
    populated in the alert or entities (typically by an enrichment action).

    - The final risk score is capped at 100.
