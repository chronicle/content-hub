  ai_description: >-
    Enriches Hostname and User entities using data from the XM Cyber platform. This
    action retrieves detailed metadata, including risk scores, labels, and administrative
    status, to provide better context for security analysts within Google SecOps.


    ### Flow Description

    1. **Entity Identification**: Identifies all `HOSTNAME` and `USER` entities within
    the current alert scope.

    2. **Filtering**: Filters out entities that have already been enriched within
    the last 24 hours (based on the `XMC_last_enriched` property) or are already present
    in the security event data to avoid redundant API calls.

    3. **Data Retrieval**: Queries the XM Cyber API for enrichment data associated
    with the remaining entities.

    4. **Entity Update**: Maps the retrieved XM Cyber attributes (e.g., Choke Point
    Score, Critical Asset status, AD Risk) to the entity's additional properties with
    an `XMC_` prefix and marks the entity as enriched.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - The action relies on the `XMC_last_enriched` property to manage enrichment frequency
    and optimize performance.

    - Only entities of type `HOSTNAME` and `USER` are supported for enrichment.
