  ai_description: >-
    ### General Description

    This action extracts and aggregates XM Cyber enrichment data from security events
    and entities associated with the current Google SecOps alert. It is designed to
    provide a consolidated JSON object containing threat intelligence and asset context
    (such as risk scores and attack techniques) that has been previously attached
    to the alert context. This is primarily a utility action used to format and retrieve
    data for downstream playbook logic or reporting.


    ### Flow Description

    1. **Data Retrieval**: The action fetches all security events from the current
    alert and the list of target entities in the scope.

    2. **Event Processing**: It iterates through security events, looking for specific
    XM Cyber identifiers (Asset Product Object ID or User Product Object ID) within
    the event's additional properties.

    3. **Entity Processing**: It filters target entities to include only Hostnames
    and Users. It then checks for the presence of XM Cyber enrichment markers in their
    metadata.

    4. **Data Extraction**: For each identified XM Cyber entity, it extracts a predefined
    set of parameters, including Choke Point Scores, Compromise Risk Scores, Critical
    Asset status, and associated attack techniques.

    5. **URL Generation**: It constructs a direct deep link to the entity's overview
    page within the XM Cyber web console using the configured Base URL.

    6. **Output**: The aggregated data is returned as a single JSON object mapping
    entity identifiers to their respective XM Cyber attributes.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    * This action does not perform live API calls to XM Cyber to fetch new data; it
    relies on data already present in the alert's security events or entity additional
    properties (typically populated by a previous enrichment action or connector).
