Get Event Data JSON:
  ai_description: >-
    ### General Description

    The **Get Event Data JSON** action is a utility designed to aggregate and format
    XM Cyber enrichment data already present within a Google SecOps alert. It scans
    both the security events associated with the alert and the entities (specifically
    Users and Hostnames) for XM Cyber-specific attributes. The action compiles this
    information into a structured JSON object, making it easier for subsequent playbook
    steps or analysts to access consolidated risk scores, asset criticality, and direct
    links to the XM Cyber management console.


    ### Parameters

    This action does not require any input parameters.


    ### Flow Description

    1. **Data Retrieval**: The action fetches the list of security events and target
    entities from the current alert context.

    2. **Event Parsing**: It iterates through security events, looking for XM Cyber
    product object IDs for assets and users in the event's additional properties.

    3. **Entity Parsing**: It filters target entities for Hostnames and Users, checking
    their additional properties for existing XM Cyber enrichment data (prefixed with
    'XMC').

    4. **Data Consolidation**: For each identified entity, it extracts relevant parameters
    such as 'Compromise Risk Score', 'Is Critical Asset', and 'Attacked By Techniques'.

    5. **URL Generation**: It constructs a direct deep-link URL to the entity's overview
    page in the XM Cyber portal using the configured Base URL from the integration
    settings.

    6. **Output**: The final consolidated mapping of entity IDs to their respective
    XM Cyber attributes is returned as a JSON object.


    ### Additional Notes

    This action does not perform any external API calls; it relies entirely on data
    that has been previously ingested or enriched within the SecOps platform. If no
    XM Cyber-specific data is found in the events or entities, the action will complete
    successfully but return an empty JSON object.
