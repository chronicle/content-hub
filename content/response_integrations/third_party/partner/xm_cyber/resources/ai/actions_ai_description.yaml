  ai_description: >-
    Enriches HOSTNAME and USER entities using XM Cyber's enrichment data.


    ### General Description

    This action retrieves contextual metadata and enrichment data for HOSTNAME and
    USER entities from the XM Cyber platform. It updates the entities within Google
    SecOps with the retrieved information, adding a specific prefix to the new properties.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Filters the target entities to include only HOSTNAME and USER types.

    2. Checks if the entities are already present in the alert's security events or
    have been enriched within the last 24 hours to avoid redundant API calls.

    3. Fetches enrichment data for the filtered entities from the XM Cyber platform.

    4. Updates the entities with the retrieved enrichment data and marks them as enriched.
