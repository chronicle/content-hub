  ai_description: >-
    ### General Description

    This action enriches `HOSTNAME` and `USER` entities by retrieving contextual metadata
    from the XM Cyber platform. It enhances the entity profile within Google SecOps
    by adding relevant security attributes, such as risk scores and labels, which
    helps analysts better understand the threat landscape associated with specific
    assets and users.


    ### Parameters

    There are no explicit parameters defined for this action. It utilizes integration-level
    configuration settings (Base URL, API Key, Authentication Type) to establish a
    connection with the XM Cyber platform.


    ### Flow Description

    1. **Initialization**: The action retrieves integration parameters and initializes
    the API manager.

    2. **Filtering**: It filters the target entities from the alert, keeping only
    `HOSTNAME` and `USER` types. It further refines this list by excluding entities
    that have already been enriched within the last 24 hours.

    3. **Enrichment**: The action queries the XM Cyber API to fetch enrichment data
    for the remaining entities.

    4. **Update**: It processes the API response, updates the `additional_properties`
    of the entities with the retrieved data, and marks them as enriched.

    5. **Finalization**: The action updates the entities in the Google SecOps platform
    and provides a summary of the processed entities.
