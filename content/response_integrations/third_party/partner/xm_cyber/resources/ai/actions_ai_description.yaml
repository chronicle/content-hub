Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches HOSTNAME and USER entities using XM Cyber's enrichment data. This action
    retrieves contextual information about assets and users from the XM Cyber platform
    and updates the entities within the SecOps platform.


    ### Flow Description

    1. Iterates through the target entities and filters them to include only HOSTNAME
    and USER entity types.

    2. Checks if the entities are already present in the alert's security events or
    if they have been enriched within the last 24 hours (using the `XMC_last_enriched`
    additional property).

    3. Makes a GET request to the XM Cyber API (`/api/secopsPublisher/entities`) to
    fetch enrichment data for the filtered entities.

    4. Processes the API response and updates the entities' `additional_properties`
    with the retrieved data.

    5. Marks the successfully processed entities as enriched (`is_enriched = True`)
    and saves the updates to the platform.


    ### Additional Notes

    Entities that have been enriched within the last 24 hours or are already present
    in the event's entities are skipped to avoid redundant API calls.
  ai_short_description: >-
    Enriches HOSTNAME and USER entities with contextual data from the XM Cyber platform.
