  ai_description: >-
    ### General Description

    Calculates a risk score for an alert and its associated entities (User and Hostname)
    based on existing event and entity properties. It generates a structured JSON
    object containing the aggregated risk scores and other properties, which can be
    used by playbooks for filtering alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | AD Risk to Domain | Dropdown | Yes | Select the AD Risk to Domain values to
    be used in the XMCyber Risk Score Calculations. |

    | AD Risky Principals | Dropdown | Yes | Select the AD Risky Principals values
    to be used in the XMCyber Risk Score Calculations. |

    | AD Admins And DCs | Dropdown | Yes | Select the AD Admins And DCs values to
    be used in the XMCyber Risk Score Calculations. |

    | User without MFA | Dropdown | Yes | Select the User without MFA values to be
    used in the XMCyber Risk Score Calculations. |

    | Is Critical Asset | Dropdown | Yes | Select the Is Critical Asset values to
    be used in the XMCyber Risk Score Calculations. |

    | Predefined Admin | Dropdown | Yes | Select the Predefined Admin values to be
    used in the XMCyber Risk Score Calculations. |

    | Highly Privileged | Dropdown | Yes | Select the Highly Privileged values to
    be used in the XMCyber Risk Score Calculations. |

    | Compromise Risk Score | Dropdown | Yes | Select Compromise Risk Score value
    to be used for the XMCyber Risk Score Calculations. |

    | Choke Point Score | Dropdown | Yes | Select Choke Point Score value to be used
    for the XMCyber Risk Score Calculations. |


    ### Additional Notes

    All parameters are mandatory and provide configuration options for XM Cyber enrichment
    fields, allowing you to control and customize risk score calculations.


    ### Flow Description

    1. Retrieves the security events and target entities from the current alert.

    2. Filters entities to include only supported types (User and Hostname).

    3. Iterates over events and entities to extract relevant properties (e.g., base
    risk score, choke point score, compromise risk score).

    4. Calculates the impact and probability scores based on the configured parameters
    and extracted properties.

    5. Computes the final risk score for each entity and aggregates them into a final
    JSON object.

    6. Adds the generated JSON object to the action's results.
