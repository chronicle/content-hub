  ai_description: >-
    ### General Description

    Tests the connectivity and authentication credentials for the XM Cyber integration.
    This action ensures that the Google SecOps platform can successfully communicate
    with the XM Cyber instance using the provided Base URL and API Key or Access Token.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Retrieve Configuration:** Fetches the integration's global configuration
    parameters, including the authentication type (Access Token Based or API Key),
    Base URL, and API Key.

    2. **Initialize API Manager:** Sets up the communication session. If OAuth is
    selected, it initializes the token management flow. If API Key is selected, it
    prepares the request headers.

    3. **Validate Connection:** Performs a test request to the XM Cyber authentication
    endpoint (`/api/auth/`) to verify that the credentials are valid and the server
    is reachable.

    4. **Report Status:** Returns a success message if the connection is established
    or a failure message with error details if the connection fails.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the initial setup
    of the XM Cyber integration.
