  ai_description: >-
    ### General Description

    The `Get Event Data JSON` action processes the security events and target entities
    associated with the current alert to extract XM Cyber specific details. It parses
    the `additional_properties` of both events and entities to build a comprehensive
    JSON object mapping XM Cyber entity IDs to their respective properties and overview
    URLs. This action does not fetch new data from external sources but rather consolidates
    existing enriched data within the SecOps platform.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. The action retrieves the security events and target entities from the current
    alert.

    2. It iterates over the security events, extracting XM Cyber entity data from
    the `additional_properties` field for both users and assets.

    3. It iterates over the target entities (filtered by supported types: USER and
    HOSTNAME), extracting enriched XM Cyber data from their `additional_properties`.

    4. It combines the extracted data into a single JSON object.

    5. The action outputs the resulting JSON object and completes execution.


    ### Additional Notes

    There are no additional notes for this action.
