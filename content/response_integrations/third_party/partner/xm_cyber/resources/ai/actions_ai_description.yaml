Enrich Entities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action retrieves contextual security data from the XM
    Cyber platform for **HOSTNAME** and **USER** entities associated with an alert.
    It enriches these entities with attributes such as risk scores, critical asset
    status, and security labels, providing analysts with immediate visibility into
    the threat landscape surrounding the specific assets or identities.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. **Entity Identification**: The action identifies all entities of type `HOSTNAME`
    and `USER` within the current alert scope.

    2. **Pre-Enrichment Filtering**: It filters the identified entities to skip those
    that:
        - Are already present in the alert's security events (to avoid redundant processing).
        - Have been enriched within the last 24 hours (based on the `XMC_last_enriched`
    property).
    3. **Data Retrieval**: For the remaining entities, the action performs a GET request
    to the XM Cyber API to fetch enrichment data.

    4. **Data Processing**: The response is parsed to extract relevant attributes,
    including labels (prefixed with 'XM Cyber - ') and asset/user-specific details.

    5. **Entity Update**: The action updates the entities' `additional_properties`
    with the fetched data (prefixed with `XMC_`), sets the `is_enriched` flag to `true`,
    and records the `last_enriched` timestamp.


    ### Additional Notes

    - This action is designed to be read-only regarding the XM Cyber platform; it
    does not modify any data in the external system.

    - The 24-hour enrichment cache ensures efficient API usage and prevents unnecessary
    data updates.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data (e.g., risk scores,
      labels) from XM Cyber and sets the 'is_enriched' flag to true.
  categories:
