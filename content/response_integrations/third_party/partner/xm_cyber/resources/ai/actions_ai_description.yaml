  ai_description: >-
    Pushes breach point labels to entities in XM Cyber based on defined criteria.
    This action allows analysts to identify specific entities (users or assets) that
    meet certain criteria and apply a custom label to them within the XM Cyber platform.


    ### Flow

    1. Authenticate with the XM Cyber platform using the configured credentials.

    2. Extract action parameters: `Attribute Name`, `Parameter`, `Operator`, and `Value`.

    3. Validate the provided input parameters.

    4. Iterate through the current alert's security events and target entities.

    5. Filter entities based on the provided criteria (e.g., checking if a specific
    property matches a value).

    6. Push the breach point label to the matching entities in XM Cyber via an API
    request.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attribute Name | string | Yes | The name of the attribute/label to be pushed
    to entities in XM Cyber. |

    | Parameter | ddl | Yes | The entity property to check against the criteria. |

    | Operator | ddl | Yes | The operator used for matching the values (e.g., Equals,
    Contains). |

    | Value | string | Yes | The custom value to compare against the entity parameter
    value. |


    ### Additional Notes

    - The action supports filtering entities based on `USER` and `HOSTNAME` types.

    - If the `Parameter` is set to 'All', the criteria check is bypassed, and data
    is pushed for all supported entities.
