Ping:
  ai_description: "### General Description\nTests the connectivity and authentication\
    \ configuration for the XM Cyber integration. This action ensures that the Google\
    \ SecOps environment can successfully communicate with the XM Cyber API using\
    \ the provided Base URL and credentials (either API Key or OAuth-based).\n\n###\
    \ Parameters Description\nThis action does not have any parameters.\n\n### Additional\
    \ Notes\nThis action is primarily used for initial setup verification and troubleshooting\
    \ connection issues. It does not interact with any entities or modify any data\
    \ within XM Cyber or Google SecOps.\n\n### Flow Description\n1. **Retrieve Configuration:**\
    \ The action extracts the integration's global settings, including the Authentication\
    \ Type (API Key or OAuth), Base URL, and API Key.\n2. **Initialize API Manager:**\
    \ It sets up the communication handler based on the selected authentication method.\n\
    3. **Connectivity Check:** \n    - If using **API Key Authentication**, the action\
    \ performs a POST request to the `/api/auth/` endpoint to verify the validity\
    \ of the API Key.\n    - If using **OAuth Authentication**, the action initializes\
    \ the OAuth manager and client to ensure tokens can be successfully retrieved\
    \ or refreshed.\n4. **Finalize Execution:** If the connection is established without\
    \ errors, the action returns a success status. If any step fails (e.g., invalid\
    \ credentials or network timeout), it captures the error and reports a failure."
