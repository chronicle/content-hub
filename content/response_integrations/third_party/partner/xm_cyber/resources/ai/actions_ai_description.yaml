  ai_description: >-
    ### General Description

    The 'Calculate Risk Score' action computes a normalized risk score for entities
    and alerts based on configurable parameters and existing event or entity properties.
    It aggregates risk factors such as critical asset status, administrative privileges,
    and MFA usage to provide a risk score, which can be used by playbooks for alert
    prioritization and filtering.


    ### Flow Description

    1. **Parameter Collection**: The action extracts configuration parameters (e.g.,
    risk weights for AD roles, MFA status, and critical assets) from the action settings.

    2. **Data Retrieval**: It accesses the current alert's security events and target
    entities (specifically USER and HOSTNAME types).

    3. **Risk Calculation**: For each event and entity, it calculates a risk score
    using predefined mappings and the provided configuration parameters.

    4. **Aggregation**: It aggregates the calculated scores and properties into a
    structured JSON object.

    5. **Result Output**: The final JSON object is added to the action results for
    use by subsequent playbook steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AD Risk to Domain | ddl | Yes | Select the AD Risk to Domain values to be used
    in the XMCyber Risk Score Calculations. |

    | AD Risky Principals | ddl | Yes | Select the AD Risky Principals values to be
    used in the XMCyber Risk Score Calculations. |

    | AD Admins And DCs | ddl | Yes | Select the AD Admins And DCs values to be used
    in the XMCyber Risk Score Calculations. |

    | User without MFA | ddl | Yes | Select the User without MFA values to be used
    in the XMCyber Risk Score Calculations. |

    | Is Critical Asset | ddl | Yes | Select the Is Critical Asset values to be used
    in the XMCyber Risk Score Calculations. |

    | Predefined Admin | ddl | Yes | Select the Predefined Admin values to be used
    in the XMCyber Risk Score Calculations. |

    | Highly Privileged | ddl | Yes | Select the Highly Privileged values to be used
    in the XMCyber Risk Score Calculations. |

    | Compromise Risk Score | ddl | Yes | Select Compromise Risk Score value to be
    used for the XMCyber Risk Score Calculations. |

    | Choke Point Score | ddl | Yes | Select Choke Point Score value to be used for
    the XMCyber Risk Score Calculations. |


    ### Additional Notes

    This action does not perform external API calls or modify any system state. It
    is a utility action designed to perform internal calculations on existing alert
    and entity data to assist in risk-based decision-making within playbooks.
