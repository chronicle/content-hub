  ai_description: >-
    Pushes breach point labels to entities in XM Cyber. It evaluates events and SecOps
    entities against defined criteria and applies the specified attribute label to
    matching entities in the XM Cyber platform.


    ### Parameters Description

    * **Attribute Name** (String, Mandatory): Name of the attribute that must be pushed
    to entities in XM Cyber. Default is `Google_SecOps_BP`.

    * **Parameter** (Drop-down, Mandatory): The parameter of the entity to be checked
    to match the criteria (e.g., All, entityID, Labels, Domain Name).

    * **Operator** (Drop-down, Mandatory): The operator used for matching the values
    (e.g., Equals, Contains, Greater than).

    * **Value** (String, Mandatory): The custom value for matching with the entity
    parameter value.


    ### Flow Description

    1. Fetches and validates the action parameters (Parameter, Operator, Value, Attribute
    Name).

    2. Iterates through security events and target entities (User and Hostname) to
    find entities matching the defined criteria based on their additional properties.

    3. Collects the XM Cyber identifiers for the matching entities.

    4. Makes a POST request to the XM Cyber API to apply the specified breach point
    label to the collected entities.

    5. Returns a success message with the list of updated entities or a failure message
    if no entities matched or an error occurred.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
