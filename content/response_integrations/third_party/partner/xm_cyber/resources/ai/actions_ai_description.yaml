Push Breach Point Data:
  ai_description: >-
    ### General Description

    The **Push Breach Point Data** action is designed to synchronize security context
    between Google SecOps and the XM Cyber platform. It identifies specific entities
    (Users and Hosts) within a SecOps alert or event that meet user-defined criteria
    and applies a custom label (Breach Point attribute) to those entities in the XM
    Cyber inventory. This allows analysts to tag assets involved in a breach or high-risk
    scenario directly from the SOAR, facilitating better visibility and risk management
    within the XM Cyber console.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Attribute Name** | string | Yes | The name of the label or attribute to be
    pushed to the entities in XM Cyber. Defaults to `Google_SecOps_BP`. |

    | **Parameter** | ddl | Yes | The specific field or attribute of the entity/event
    to evaluate against the criteria. Options include `All` (to process all entities),
    `entityID`, `Compromised Risk Score`, `Is Critical Asset`, and various other enriched
    metadata fields. |

    | **Operator** | ddl | Yes | The logical operator used to compare the selected
    **Parameter** with the **Value**. Supports standard comparisons like `Equals`,
    `Contains`, `Greater than`, etc. |

    | **Value** | string | Yes | The target value used for matching against the entity's
    parameter value. |


    ### Flow Description

    1. **Authentication:** The action authenticates with the XM Cyber API using either
    API Key or OAuth-based credentials provided in the integration settings.

    2. **Parameter Extraction:** It retrieves the user-defined criteria, including
    the attribute name to push and the logic for entity selection (Parameter, Operator,
    and Value).

    3. **Entity Identification:** The action scans both the security events associated
    with the alert and the target entities in the SecOps case. It specifically looks
    for `USER` and `HOSTNAME` entity types.

    4. **Criteria Evaluation:** For each identified entity, the action checks if it
    matches the specified criteria. If the **Parameter** is set to `All`, all supported
    entities are selected. Otherwise, it evaluates the entity's properties (including
    enriched XM Cyber data stored in additional properties) against the operator and
    value.

    5. **Data Push:** For all entities that meet the criteria, the action sends a
    POST request to the XM Cyber endpoint `/api/entityInventory/applyImportedLabelsOnEntities`
    to apply the specified **Attribute Name** with a value of `true`.

    6. **Reporting:** The action concludes by providing a summary of the entities
    successfully updated in XM Cyber.


    ### Additional Notes

    - This action requires that entities have been previously enriched or contain
    the `XMC_product_object_id` (for SOAR entities) or `productObjectId` (for event
    principals) to correctly map them to XM Cyber records.

    - If the **Attribute Name** is left blank in the configuration, it defaults to
    `Google_SecOps_BP`.
