Calculate Risk Score:
  ai_description: >-
    ### General Description

    Calculates risk scores for entities and events associated with an alert based
    on XM Cyber enrichment fields. It generates a structured JSON object containing
    the aggregated risk scores and other properties, which can be used by playbooks
    for filtering alerts.


    ### Flow Description

    1. Retrieves security events and target entities from the current alert.

    2. Filters entities to include only supported types (User and Hostname).

    3. Extracts XM Cyber specific properties from the events and entities' additional
    properties.

    4. Calculates risk scores using the provided action parameters (e.g., AD Risk
    to Domain, Is Critical Asset).

    5. Aggregates the calculated scores and properties into a final JSON object.

    6. Adds the generated JSON object to the action results.


    ### Additional Notes

    This action does not make any external API calls; it relies entirely on data already
    present in the alert's events and entities' additional properties.
  ai_short_description: >-
    Calculates risk scores for User and Hostname entities based on XM Cyber enrichment
    fields present in the alert data, outputting a structured JSON object for playbook
    filtering.
