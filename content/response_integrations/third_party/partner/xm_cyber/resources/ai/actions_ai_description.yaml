  ai_description: "Calculates a comprehensive risk score for alerts by processing\
    \ XM Cyber metadata attached to events and entities. This action allows security\
    \ teams to define weights for specific risk factors\u2014such as the absence of\
    \ MFA, administrative privileges, or critical asset status\u2014to generate a\
    \ normalized risk score (0-100). The resulting JSON object can be used in subsequent\
    \ playbook steps for conditional branching and alert prioritization.\n\n### Flow\
    \ Description\n1. **Parameter Extraction**: Retrieves user-defined weights for\
    \ various risk components (e.g., AD Risk, MFA status) from the action parameters.\n\
    2. **Event Processing**: Iterates through the alert's security events to identify\
    \ XM Cyber labels and calculates individual risk scores for each asset or user\
    \ mentioned in the events.\n3. **Entity Processing**: Scans target entities (Users\
    \ and Hostnames) for enriched XM Cyber metadata and calculates risk scores based\
    \ on their specific attributes.\n4. **Aggregation**: Consolidates all individual\
    \ scores by selecting the maximum values for risk, impact, and probability components.\n\
    5. **Label Consolidation**: Aggregates all unique labels found across events and\
    \ entities into a single comma-separated string.\n6. **Output Generation**: Returns\
    \ a structured JSON object containing the final calculated risk score and supporting\
    \ metadata for use in the playbook environment.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | AD Risk to Domain | DDL | Yes | Selects the weight for Active Directory risk\
    \ to domain values in the calculation. |\n| AD Risky Principals | DDL | Yes |\
    \ Selects the weight for AD risky principals in the calculation. |\n| AD Admins\
    \ And DCs | DDL | Yes | Selects the weight for AD administrators and Domain Controllers.\
    \ |\n| User without MFA | DDL | Yes | Selects the weight for users identified\
    \ as not having Multi-Factor Authentication. |\n| Is Critical Asset | DDL | Yes\
    \ | Selects the weight for entities marked as critical assets. |\n| Predefined\
    \ Admin | DDL | Yes | Selects the weight for predefined administrative accounts.\
    \ |\n| Highly Privileged | DDL | Yes | Selects the weight for highly privileged\
    \ accounts or assets. |\n| Compromise Risk Score | DDL | Yes | Selects the multiplier\
    \ level for the compromise risk score component. |\n| Choke Point Score | DDL\
    \ | Yes | Selects the multiplier level for the choke point score component. |\n\
    \n### Additional Notes\n- This action does not perform external API calls; it\
    \ relies on data already present in the alert (e.g., from previous enrichment\
    \ steps).\n- The final risk score is capped at 100."
