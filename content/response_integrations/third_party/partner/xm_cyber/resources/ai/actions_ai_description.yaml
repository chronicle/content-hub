Push Breach Point Data:
  ai_description: >-
    ### General Description

    Pushes a breach point label to entities in XM Cyber based on defined criteria.
    The action evaluates events and SecOps entities against the provided parameter,
    operator, and value, and applies the specified attribute label to the matching
    entities in XM Cyber.


    ### Flow Description

    1. Extracts the action parameters including the attribute name, parameter to check,
    operator, and value.

    2. Validates the provided criteria inputs.

    3. Iterates through the security events and target entities (User and Hostname)
    to find those that match the defined criteria.

    4. Collects the XM Cyber identifiers for the matching entities by checking their
    additional properties.

    5. Makes a POST request to the XM Cyber API (`/api/entityInventory/applyImportedLabelsOnEntities`)
    to apply the breach point label to the collected entities.

    6. Returns a success message with the list of entities that were updated, or a
    failure message if no entities matched or an error occurred.


    ### Additional Notes

    - The action requires entities to have the XM Cyber product object ID stored in
    their additional properties.

    - Supported entity types are User and Hostname.
