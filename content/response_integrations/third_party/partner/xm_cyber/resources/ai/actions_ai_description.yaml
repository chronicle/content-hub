  ai_description: >-
    ### General Description

    This action pushes a specific attribute (label) to entities in the XM Cyber platform.
    It allows users to define criteria based on entity or event properties. If an
    entity matches the criteria, the specified attribute is applied to that entity
    in XM Cyber. This is typically used to mark 'Breach Points' or other security-relevant
    classifications discovered during investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attribute Name | string | Yes | The name of the attribute/label to be pushed
    to XM Cyber (e.g., 'Google_SecOps_BP'). |

    | Parameter | ddl | Yes | The entity or event property to evaluate (e.g., 'Compromised
    Risk Score', 'Is Critical Asset', 'All'). |

    | Operator | ddl | Yes | The comparison operator used to match the value (e.g.,
    'Equals', 'Greater than', 'Contains'). |

    | Value | string | Yes | The value to compare against the selected parameter.
    |


    ### Flow Description

    1. **Authentication**: Connects to XM Cyber using either API Key or OAuth credentials.

    2. **Parameter Extraction**: Retrieves the attribute name, criteria parameter,
    operator, and target value.

    3. **Entity Identification**: Scans both the target entities (Users and Hostnames)
    and the security events associated with the alert.

    4. **Criteria Evaluation**: For each entity, it checks if the specified property
    (from `additional_properties`) matches the user-defined criteria.

    5. **Data Submission**: For all matching entities, it sends a POST request to
    the XM Cyber API to apply the label with a value of `true`.
