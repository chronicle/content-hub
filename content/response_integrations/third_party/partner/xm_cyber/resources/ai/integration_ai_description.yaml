  network_security: false
  reasoning: >-
    The XM Cyber integration provides capabilities to enrich HOSTNAME and USER entities
    with risk scores, criticality, and breach point data from the XM Cyber Continuous
    Exposure Management platform. This aligns with Asset Inventory as it provides
    critical context (risk, criticality) about internal assets. It also aligns with
    Vulnerability Management because XM Cyber's core function is to identify attack
    paths, breach points, and exposure, which is a critical component of modern vulnerability
    management and risk-based prioritization. It does not perform SIEM log ingestion,
    EDR host containment, network blocking, or IAM management.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
