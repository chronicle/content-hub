product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The XM Cyber integration provides Continuous Exposure Management capabilities.
    It qualifies for 'Vulnerability Management' because it identifies attack paths
    and vulnerabilities, helping to determine if an asset is susceptible to an exploit.
    It qualifies for 'Asset Inventory' because it enriches assets with criticality
    findings, helping to identify the business criticality of the device. It qualifies
    for 'Cloud Security' because XM Cyber is a platform that provides exposure management
    and findings for cloud-native resources. It does not qualify for 'Threat Intelligence'
    because the enrichment is focused on entities (assets/users) rather than external
    indicators (IOCs like IP, Hash, URL). It does not qualify for SIEM, EDR, Network
    Security, Email Security, IAM, ITSM, or Collaboration as it does not perform the
    specific actions defined for those categories (e.g., log ingestion, host isolation,
    firewall blocking, etc.).
  siem: false
  threat_intelligence: false
  vulnerability_management: true
