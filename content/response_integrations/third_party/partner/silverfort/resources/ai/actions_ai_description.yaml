List Service Accounts:
  ai_description: >-
    ### General Description

    The **List Service Accounts** action retrieves a paginated list of service accounts
    from the Silverfort platform. This utility action allows analysts to browse or
    audit service accounts, providing visibility into their attributes, risk levels,
    and protection status. It is primarily used for discovery and reporting rather
    than direct incident response on specific entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page Size | String | No | The number of results to return per page (1-100).
    Defaults to 50. |

    | Page Number | String | No | The specific page number to retrieve. Defaults to
    1. |

    | Fields | String | No | A comma-separated list of specific attributes to include
    in the response (e.g., `guid, display_name, risk`). If left empty, all available
    fields are returned. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Page Size`, `Page Number`,
    and `Fields` from the user input.

    2. **Field Validation**: If specific fields are requested, the action validates
    them against the supported Silverfort service account schema (`SA_INDEX_FIELDS`).
    Invalid fields are logged as warnings and ignored.

    3. **API Request**: The action authenticates using the Service Accounts API credentials
    and sends a POST request to the `/v1/public/serviceAccounts/index` endpoint with
    the pagination and field selection criteria.

    4. **Data Processing**: The retrieved service account data is parsed into a structured
    format and stored in the action's JSON results.

    5. **Output**: The action provides a summary message indicating the number of
    accounts found on the requested page.


    ### Additional Notes

    - This action does not operate on specific entities within a case; it is a global
    search/list operation.

    - Supported fields for the `Fields` parameter include: `guid`, `display_name`,
    `sources_count`, `destinations_count`, `number_of_authentications`, `risk`, `predictability`,
    `protected`, `upn`, `dn`, `spn`, `comment`, `owner`, `type`, `domain`, `category`,
    `creation_date`, `highly_privileged`, `interactive_login`, `broadly_used`, `suspected_brute_force`,
    `repetitive_behavior`.
