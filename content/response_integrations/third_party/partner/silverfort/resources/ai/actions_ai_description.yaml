  ai_description: >-
    ### General Description

    This action enables or disables an authentication policy within the Silverfort
    platform. It allows analysts to quickly toggle a policy's active state without
    modifying its underlying configuration, facilitating rapid response to security
    events or policy adjustments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy ID | string | Yes | The unique identifier of the policy to enable or
    disable. |

    | Enable Policy | boolean | Yes | Set to true to enable the policy, or false to
    disable it. |


    ### Flow Description

    1. The action extracts the `Policy ID` and `Enable Policy` parameters from the
    action configuration.

    2. It initializes the Silverfort Policy API client using the provided integration
    credentials.

    3. It sends a POST request to the Silverfort API endpoint `/v1/public/changePolicyState`
    with the specified `policy_id` and `state`.

    4. Upon a successful API response, it returns a success message indicating the
    policy has been enabled or disabled.
