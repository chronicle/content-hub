List Policies:
  ai_description: >-
    Retrieves a comprehensive list of authentication policies from the Silverfort
    platform. This action allows users to fetch policy configurations, including their
    status, authentication types, protocols, and scope (users, groups, sources, and
    destinations). It supports optional field filtering to limit the response to specific
    data points of interest.


    ### Flow Description:

    1. **Parameter Extraction:** The action extracts the `Fields` parameter provided
    by the user.

    2. **Field Validation:** If fields are specified, the action validates them against
    a list of supported policy fields (e.g., `policyName`, `enabled`, `authType`).
    Invalid fields are logged as warnings and ignored.

    3. **API Interaction:** The action authenticates with the Silverfort Policies
    API and sends a request to the policy index endpoint, passing the validated field
    list.

    4. **Result Processing:** The retrieved policy data is formatted into a JSON result
    and the total count of policies is reported in the output message.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields | string | No | A comma-separated list of specific policy fields to include
    in the response. If left empty, all available fields are returned. Supported fields
    include: `enabled`, `policyName`, `authType`, `protocols`, `policyType`, `allUsersAndGroups`,
    `usersAndGroups`, `allDevices`, `sources`, `allDestinations`, `destinations`,
    `action`, `MFAPrompt`, `all`, `bridgeType`. |


    ### Additional Notes:

    - This action does not operate on specific entities (like IPs or Users) but rather
    fetches global configuration data from the Silverfort environment.

    - The action uses the Policies API v2 endpoint.
