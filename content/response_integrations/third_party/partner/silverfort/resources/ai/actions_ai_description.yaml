    1. **Parameter Extraction:** The action extracts the `Policy ID` from the input
    parameters.

    2. **Authentication:** The action initializes a connection to the Silverfort Policies
    API using the configured credentials and generates a JWT token for secure communication.

    3. **API Request:** It sends a GET request to the Silverfort `/v2/public/policies/{policy_id}`
    endpoint to fetch the policy's full configuration.

    4. **Data Processing:** The retrieved policy data is parsed and converted into
    a structured JSON format.

    5. **Output Generation:** The action populates the JSON results with the policy
    details and provides a success message indicating the policy name and ID.


    ### Additional Notes

    - This action does not modify any data within Silverfort; it is a read-only operation.

    - If the provided Policy ID does not exist, the action will return an error message.
