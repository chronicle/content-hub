Update Policy:
  ai_description: >-
    ### General Description

    Updates an existing authentication policy in Silverfort. This action allows for
    comprehensive modification of a policy's configuration, including toggling its
    enabled state and dynamically managing the lists of users, groups, network sources,
    and destinations associated with it. It is primarily used to adjust security controls
    or access permissions for specific entities within the Silverfort environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy ID | String | Yes | The unique identifier of the Silverfort policy to
    be updated. |

    | Enabled | Boolean | No | Determines whether the policy should be active (true)
    or inactive (false). |

    | Add Users and Groups | String | No | A JSON array of user/group objects to add
    to the policy. Format: `[{"identifierType": "upn", "identifier": "user@domain.com",
    "displayName": "User Name", "domain": "domain.com"}]`. |

    | Remove Users and Groups | String | No | A JSON array of user/group objects to
    remove from the policy. Format: `[{"identifierType": "upn", "identifier": "user@domain.com",
    "displayName": "User Name", "domain": "domain.com"}]`. |

    | Add Sources | String | No | A JSON array of source objects to add. Format: `[{"identifierType":
    "ip", "identifier": "10.0.0.1", "displayName": "Server"}]`. |

    | Remove Sources | String | No | A JSON array of source objects to remove. Format:
    `[{"identifierType": "ip", "identifier": "10.0.0.1", "displayName": "Server"}]`.
    |

    | Add Destinations | String | No | A JSON array of destination objects to add.
    Format: `[{"identifierType": "hostname", "identifier": "server.domain.com", "displayName":
    "Server", "domain": "domain.com", "services": ["rdp"]}]`. |

    | Remove Destinations | String | No | A JSON array of destination objects to remove.
    Format: `[{"identifierType": "hostname", "identifier": "server.domain.com", "displayName":
    "Server", "domain": "domain.com", "services": ["rdp"]}]`. |


    ### Additional Notes

    - The action expects JSON-formatted strings for all 'Add' and 'Remove' parameters.
    Ensure the JSON structure matches the examples provided in the parameter descriptions
    to avoid parsing errors.

    - If no optional parameters are provided, the action will attempt to update the
    policy with no changes, which may result in a successful but no-op API call.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory Policy ID and
    all optional configuration parameters from the SOAR environment.

    2. **JSON Parsing:** It parses the provided JSON strings for users, groups, sources,
    and destinations into structured data models (`PolicyIdentifier` and `PolicyDestination`).

    3. **API Client Initialization:** Initializes the Silverfort Policy API client
    using configured credentials.

    4. **Policy Update:** Executes a PATCH request to the Silverfort API endpoint
    `/v2/public/policies/{policy_id}` with the specified modifications.

    5. **Result Reporting:** Captures the API response, updates the action's JSON
    results with the policy status, and provides a success message to the case wall.
