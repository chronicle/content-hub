Ping:
  ai_description: "### General Description\nThe **Ping** action is a utility designed\
    \ to verify the connectivity between Google SecOps and the Silverfort Identity\
    \ Security platform. It validates the integration's configuration by testing the\
    \ reachability of the Silverfort API Root and the validity of the provided credentials.\
    \ Specifically, it checks the connectivity for each configured API module: Risk,\
    \ Service Accounts, and Policies. This ensures that subsequent actions relying\
    \ on these specific modules will function correctly.\n\n### Parameters Description\n\
    There are no user-input parameters for this action. It relies entirely on the\
    \ integration's global configuration settings (API Root, External API Key, and\
    \ module-specific App User IDs/Secrets).\n\n### Additional Notes\n*   The action\
    \ requires at least one set of API credentials (Risk, Service Accounts, or Policies)\
    \ to be configured in the integration settings to perform a meaningful test.\n\
    *   The connectivity test for each module is lightweight: the Risk API performs\
    \ a dummy risk lookup, the Service Accounts API attempts a paginated list request,\
    \ and the Policies API retrieves a list of rule names.\n\n### Flow Description\n\
    1.  **Configuration Retrieval:** The action fetches the global integration parameters,\
    \ including the API Root and authentication keys.\n2.  **Module Identification:**\
    \ It identifies which Silverfort API modules (Risk, Service Accounts, Policies)\
    \ have credentials configured.\n3.  **Connectivity Testing:** For each configured\
    \ module, the action initializes a specific API client and executes a `test_connectivity`\
    \ method.\n4.  **Result Aggregation:** The action tracks which modules succeeded\
    \ and which failed.\n5.  **Final Reporting:** \n    *   If all configured modules\
    \ connect successfully, it returns a success message.\n    *   If some modules\
    \ fail while others succeed, it returns a partial success message detailing the\
    \ status of each.\n    *   If no modules are configured or all configured modules\
    \ fail, it raises an error."
