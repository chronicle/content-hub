    'Resource Name' from the input parameters.

    2. **Validation**: It verifies that at least one of the identifier parameters
    is populated.

    3. **API Client Initialization**: It initializes the Silverfort Risk API client
    using the integration's authentication credentials (API Root and External API
    Key).

    4. **Data Retrieval**: The action performs a GET request to the Silverfort Risk
    API to fetch risk details for the specified entity.

    5. **Result Processing**: The retrieved risk data (score, severity, factors, and
    last update time) is processed and returned as a JSON result for use in subsequent
    playbook steps.
