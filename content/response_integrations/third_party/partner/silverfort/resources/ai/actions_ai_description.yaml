    including the API Root and all provided credentials.

    2. **API Identification**: It determines which Silverfort API modules (Risk, Service
    Accounts, Policies) have credentials configured.

    3. **Connectivity Testing**: For each identified module, it initializes a specific
    client and executes a `test_connectivity` method which performs a low-impact API
    call.

    4. **Result Aggregation**: It collects the status of each test and returns a summary
    message indicating which APIs connected successfully and which failed.
