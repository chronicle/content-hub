Get Policy:
  ai_description: >-
    The **Get Policy** action retrieves comprehensive configuration details for a
    specific authentication policy from the Silverfort platform using its unique Policy
    ID. This action is primarily used to audit policy settings, verify security controls,
    or gather context during an investigation regarding how specific users or resources
    are being authenticated.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Policy ID** | string | Yes | The unique identifier (GUID) of the Silverfort
    policy to retrieve. |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the `Policy ID` provided by the
    user.

    2. **Client Initialization:** It initializes the Silverfort Policy API client
    using the configured integration credentials (API Root, External API Key, and
    Policy App User credentials).

    3. **API Request:** The action sends a GET request to the Silverfort V2 Policies
    API endpoint (`/v2/public/policies/{policy_id}`).

    4. **Data Processing:** Upon a successful response, the action parses the policy
    metadata, including enabled status, authentication types, protocols, sources,
    destinations, and associated actions (e.g., MFA prompts).

    5. **Output:** The complete policy configuration is returned as a JSON object,
    and a success message is displayed in the SOAR interface.


    ### Additional Notes

    * This action requires the **Policies App User ID** and **Policies App User Secret**
    to be configured in the integration settings to access the Policies API.
