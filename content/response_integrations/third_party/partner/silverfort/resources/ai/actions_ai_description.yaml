    - The action requires at least one set of API credentials (Risk, Service Accounts,
    or Policies) to be configured in the integration settings to run.

    - It performs lightweight requests (e.g., listing rules or checking a test entity)
    to verify that authentication tokens can be generated and accepted by the Silverfort
    endpoints.


    ### Flow Description

