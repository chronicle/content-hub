Update SA Policy:
  ai_description: >-
    Updates the protection policy for a specific service account in Silverfort. This
    action allows for granular control over how a service account is protected, including
    enabling/disabling the policy, toggling active blocking for violations, and configuring
    SIEM logging. It also supports defining risk level thresholds, allowed protocols
    (Kerberos, LDAP, NTLM), and managing allowlists for source and destination endpoints.
    Sources and destinations can be added or removed using JSON-formatted arrays of
    objects containing the endpoint key and its type (e.g., IP, hostname).


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the mandatory Service Account GUID and
    optional policy settings (Enabled, Block, Send to SIEM, Risk Level, etc.) from
    the action parameters.

    2. **Validation:** Validates that the provided Risk Level and Protocols match
    the allowed values defined in the Silverfort integration constants.

    3. **Endpoint Parsing:** Parses the JSON strings for adding or removing allowed
    sources and destinations into structured endpoint objects.

    4. **API Execution:** Calls the Silverfort Service Accounts API via a POST request
    to the `/v1/public/serviceAccounts/policy/{guid}` endpoint with the updated configuration.

    5. **Result Handling:** Returns a success message and a JSON object containing
    the GUID and update status if the operation completes successfully.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Account GUID | string | Yes | The unique identifier (GUID) of the service
    account to update. |

    | Enabled | boolean | No | If set, enables or disables the protection policy.
    |

    | Block | boolean | No | If set, enables or disables active blocking for policy
    violations. |

    | Send to SIEM | boolean | No | If set, enables or disables the forwarding of
    policy events to the SIEM. |

    | Risk Level | ddl | No | Sets the risk level threshold for the policy. Options:
    low, medium, high. |

    | Allow All Sources | boolean | No | If true, the policy will allow all source
    endpoints, ignoring the specific allowlist. |

    | Allow All Destinations | boolean | No | If true, the policy will allow all destination
    endpoints, ignoring the specific allowlist. |

    | Protocols | string | No | A comma-separated list of protocols to allow (e.g.,
    'Kerberos, ldap, ntlm'). |

    | Add Allowed Sources | string | No | A JSON array of source objects to add to
    the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`. |

    | Remove Allowed Sources | string | No | A JSON array of source objects to remove
    from the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`. |

    | Add Allowed Destinations | string | No | A JSON array of destination objects
    to add to the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`. |

    | Remove Allowed Destinations | string | No | A JSON array of destination objects
    to remove from the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`.
    |


    ### Additional Notes

    - The action performs a state change in Silverfort and is classified as a mutation
    action.

    - Allowlist parameters (Add/Remove Sources/Destinations) must be valid JSON arrays
    of objects with 'key' and 'key_type' fields.
