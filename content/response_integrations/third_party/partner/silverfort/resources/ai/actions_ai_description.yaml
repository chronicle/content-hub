  ai_description: >-
    ### General Description

    Updates the risk information for a specific user identity within the Silverfort
    platform. This action allows security analysts to manually adjust or programmatically
    set risk levels (e.g., activity risk, malware risk) for a user based on external
    intelligence or observed behavior. By updating the risk score and providing a
    duration for its validity, analysts can influence Silverfort's authentication
    policies and adaptive response logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | string | Yes | The unique identifier (UPN) of the user
    to update (e.g., user@domain.com). |

    | Risk Type | ddl | Yes | The specific category of risk to update. Options include:
    `activity_risk`, `malware_risk`, `data_breach_risk`, or `custom_risk`. |

    | Severity | ddl | Yes | The severity level assigned to the risk. Options include:
    `low`, `medium`, `high`, or `critical`. |

    | Valid For Hours | string | Yes | A positive integer representing how long (in
    hours) this risk indicator should remain active before expiring. |

    | Description | string | Yes | A text description providing context or justification
    for the risk update. |


    ### Additional Notes

    This action performs a state change in the Silverfort console. It requires the
    'Risk API' credentials (App User ID and Secret) to be configured in the integration
    settings. The action validates that 'Valid For Hours' is a positive integer and
    that the provided Risk Type and Severity match Silverfort's supported values.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the User Principal Name, Risk
    Type, Severity, Duration, and Description from the input parameters.

    2. **Validation:** It verifies that the Risk Type and Severity are valid according
    to predefined enums and ensures the duration is a positive integer.

    3. **API Client Initialization:** It initializes the Silverfort Risk API client
    using the configured credentials and JWT authentication.

    4. **Request Execution:** It constructs a `RiskUpdate` object and sends a POST
    request to the `/v1/public/updateEntityRisk` endpoint.

    5. **Result Processing:** Upon success, it returns a JSON object containing the
    updated risk details and confirms the update in the output message.
