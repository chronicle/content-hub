  ai_description: >-
    ### General Description

    Lists service accounts from Silverfort with support for pagination and specific
    field selection. This action allows analysts to retrieve a comprehensive list
    of service accounts and their associated metadata, such as risk scores, protection
    status, and authentication patterns, which is essential for identity-based auditing
    and threat hunting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page Size | String | No | The number of results to retrieve per page (range:
    1-100). Defaults to "50". |

    | Page Number | String | No | The specific page number to retrieve. Defaults to
    "1". |

    | Fields | String | No | A comma-separated list of specific attributes to include
    in the response (e.g., `guid, risk, upn`). If left empty, all available fields
    are returned. |


    ### Additional Notes

    - Supported fields for the `Fields` parameter include: `guid`, `display_name`,
    `sources_count`, `destinations_count`, `number_of_authentications`, `risk`, `predictability`,
    `protected`, `upn`, `dn`, `spn`, `comment`, `owner`, `type`, `domain`, `category`,
    `creation_date`, `highly_privileged`, `interactive_login`, `broadly_used`, `suspected_brute_force`,
    and `repetitive_behavior`.

    - If invalid fields are provided in the `Fields` parameter, the action will log
    a warning and ignore the invalid entries while processing the valid ones.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the `Page Size`, `Page Number`,
    and `Fields` parameters from the input configuration.

    2. **Field Validation:** If the `Fields` parameter is provided, the action splits
    the string and validates each field against the supported Silverfort service account
    attribute list.

    3. **API Interaction:** The action authenticates with the Silverfort Service Accounts
    API and sends a POST request to the `/serviceAccounts/index` endpoint with the
    specified pagination and field filters.

    4. **Data Processing:** The action receives the list of service accounts and converts
    the results into a structured JSON format.

    5. **Output Generation:** The action provides a success message indicating the
    number of accounts retrieved and populates the JSON results for use in playbooks.
