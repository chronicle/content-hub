Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Silverfort API. This action validates that the External
    API Key is working and tests connectivity for each configured API (Risk, Service
    Accounts, Policies) using their respective credentials.


    ### Flow Description

    1. Retrieves the configured integration parameters and identifies which API credentials
    (Risk, Service Accounts, Policies) are provided.

    2. Iterates through each configured API type.

    3. Executes a lightweight API request (e.g., `get_entity_risk`, `list_service_accounts`,
    or `get_rules_names_and_ids`) to verify authentication and connectivity.

    4. Aggregates the results and returns a success, partial success, or failure message
    based on which APIs successfully connected.


    ### Additional Notes

