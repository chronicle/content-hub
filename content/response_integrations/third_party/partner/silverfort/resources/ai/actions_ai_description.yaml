  ai_description: >-
    ### General Description

    The **Get Policy** action retrieves detailed configuration information for a specific
    authentication policy from Silverfort using its unique Policy ID. This action
    is essential for security analysts to understand the logic, scope, and enforcement
    settings of a policy, including the users, groups, source devices, and destination
    resources it affects, as well as the specific security actions (e.g., MFA, Block,
    Allow) it triggers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy ID | String | Yes | The unique identifier of the Silverfort policy to
    be retrieved. |


