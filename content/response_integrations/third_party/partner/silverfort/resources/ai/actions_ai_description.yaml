Get Service Account:
  ai_description: >-
    Retrieves detailed information about a specific service account from Silverfort
    using its unique identifier (GUID). This action is used to gather contextual metadata
    such as risk scores, predictability, protection status, and account attributes
    (UPN, DN, SPN) for a service account. The retrieved data is returned as a JSON
    object for use in subsequent playbook steps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Account GUID | string | Yes | The unique identifier (GUID) of the service
    account to retrieve from Silverfort. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory `Service Account
    GUID` from the input parameters.

    2. **Client Initialization:** It initializes the Silverfort Service Account API
    client using the configured API Root and Service Account-specific JWT credentials.

    3. **Data Retrieval:** The action performs a GET request to the Silverfort API
    endpoint `/v1/public/serviceAccounts/{guid}`.

    4. **Result Processing:** The API response is parsed into a structured `ServiceAccount`
    data model.

    5. **Output:** The service account details are saved to the action's JSON results,
    and a success message is generated including the account's display name or UPN.


    ### Additional Notes

    - This action requires the **Service Accounts App User ID** and **Service Accounts
    App User Secret** to be configured in the integration settings to generate the
    necessary JWT authentication token.

    - If the provided GUID does not exist or the API credentials lack sufficient permissions,
    the action will return an error.
