Change Policy State:
  ai_description: >-
    ### General Description

    Enable or disable an authentication policy in Silverfort. This action provides
    a streamlined way to toggle the active status of a specific policy without altering
    its internal configuration or rules. It is particularly useful for temporary policy
    adjustments during incident response or maintenance windows.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Policy ID | The unique identifier of the Silverfort policy to be modified. |
    String | Yes |

    | Enable Policy | Determines the new state of the policy. Set to `True` to activate
    the policy or `False` to deactivate it. | Boolean | Yes |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Policy ID` and the target
    `Enable Policy` state from the user input.

    2. **Client Initialization**: It initializes the Silverfort Policy API client
    using the configured integration credentials.

    3. **API Request**: The action sends a POST request to the Silverfort `/v1/public/changePolicyState`
    endpoint with the policy ID and the desired state.

    4. **Result Processing**: Upon a successful response from the API, the action
    generates a success message and populates the JSON results with the updated policy
    status.
