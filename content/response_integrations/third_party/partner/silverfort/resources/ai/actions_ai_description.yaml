    API Key' and verifies connectivity for each configured API module (Risk, Service
    Accounts, and Policies) using their respective App User IDs and Secrets provided
    in the integration configuration.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration settings (API Root, External API Key, and
    module-specific credentials).


