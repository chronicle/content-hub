Change Policy State:
  ai_description: >-
    ### General Description

    Enables or disables an authentication policy in Silverfort. This action provides
    a quick way to toggle a policy's active state without modifying its underlying
    configuration.


    ### Flow Description

    1. Extracts the `Policy ID` and `Enable Policy` parameters from the action configuration.

    2. Initiates a POST request to the Silverfort API (`/v1/public/changePolicyState`)
    to update the state of the specified policy.

    3. Returns a success message and populates the JSON results with the policy ID,
    the requested state, and the final status.


    ### Additional Notes

    This action requires the Policies API credentials to be configured in the integration
    settings.
