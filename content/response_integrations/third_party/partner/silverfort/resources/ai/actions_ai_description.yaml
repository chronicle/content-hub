  ai_description: >-
    ### General Description

    Enables or disables an authentication policy in Silverfort. This action provides
    a quick way to toggle a policy's active state without modifying its underlying
    configuration, allowing for rapid response to security requirements or maintenance
    needs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy ID | string | Yes | The unique identifier of the policy to enable or
    disable. |

    | Enable Policy | boolean | Yes | Set to `true` to enable the policy, or `false`
    to disable it. |


    ### Additional Notes

    This action requires the 'Policies App User ID' and 'Policies App User Secret'
    to be configured in the Silverfort integration settings to authenticate with the
    Policies API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Policy ID` and the desired
    `Enable Policy` state from the input parameters.

    2. **Client Initialization**: It initializes the Silverfort Policy API client
    using the integration's authentication credentials.

    3. **API Interaction**: The action sends a POST request to the Silverfort `/v1/public/changePolicyState`
    endpoint with the specified policy ID and state.

    4. **Result Reporting**: The action returns a success message and provides the
    updated policy state in the JSON results.
