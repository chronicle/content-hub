    Retrieves risk information for a specific user or resource from Silverfort. This
    action fetches the current risk score, severity level, and specific risk factors
    associated with the entity to provide security context for investigations. It
    is a read-only action that does not modify the state of the entity in Silverfort.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | The user principal name (e.g., user@domain.com) of the
    user to check. | String | No |

    | Resource Name | The name of the resource (for non-user entities) to check. |
    String | No |


    ### Additional Notes

    Either the **User Principal Name** or the **Resource Name** must be provided for
    the action to run successfully. If both are missing, the action will raise a validation
    error.


