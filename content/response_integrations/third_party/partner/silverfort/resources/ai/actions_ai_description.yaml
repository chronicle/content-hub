Get Entity Risk:
  ai_description: >-
    ### General Description

    Retrieves detailed risk information for a specific user or resource from the Silverfort
    Identity Security platform. This action provides visibility into an entity's security
    posture by returning its current risk score, severity level (e.g., Low, Medium,
    High, Critical), and specific risk factors identified by Silverfort's analysis
    engine.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | String | No | The User Principal Name (UPN) of the user
    to query (e.g., `user@domain.com`). Either this or 'Resource Name' must be provided.
    |

    | Resource Name | String | No | The name of the resource/asset to query. Either
    this or 'User Principal Name' must be provided. |


    ### Additional Notes

    - This action requires the **Risk API** credentials (App User ID and Secret) to
    be configured in the Silverfort integration settings.

    - At least one identifier ('User Principal Name' or 'Resource Name') is required
    for the action to execute successfully. If both are provided, the action will
    query the API using both identifiers.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the 'User Principal Name' and
    'Resource Name' from the user input.

    2. **Validation**: It checks that at least one of the two identifier parameters
    contains a value. If both are empty, the action terminates with an error.

    3. **API Interaction**: The action authenticates with the Silverfort Risk API
    and performs a GET request to fetch the risk profile for the specified entity.

    4. **Result Processing**: The action captures the API response, which includes
    the risk score, severity, and a list of risk factors, and attaches it to the action's
    JSON results.
