  ai_description: >-
    ### General Description

    This action updates the risk information for a specific user within the Silverfort
    platform. By providing a user principal name and specifying the risk type, severity,
    and duration, analysts can proactively adjust the risk profile of an identity
    in Silverfort based on external threat intelligence or security events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | string | Yes | The user principal name (e.g., user@domain.com)
    to update risk for. |

    | Risk Type | ddl | Yes | The type of risk to update (activity_risk, malware_risk,
    data_breach_risk, custom_risk). |

    | Severity | ddl | Yes | The severity level of the risk (low, medium, high, critical).
    |

    | Valid For Hours | string | Yes | How long (in hours) the risk indicator should
    be valid. |

    | Description | string | Yes | Description of the risk indicator. |


    ### Flow Description

    1. **Extraction**: The action extracts the provided parameters (User Principal
    Name, Risk Type, Severity, Valid For Hours, Description) from the SOAR action
    configuration.

    2. **Validation**: The action validates that the Risk Type and Severity are within
