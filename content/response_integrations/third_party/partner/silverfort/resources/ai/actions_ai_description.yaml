Update Entity Risk:
  ai_description: >-
    Updates risk information for a user in Silverfort. This action allows security
    analysts to manually or automatically adjust a user's risk profile based on external
    threat intelligence or specific security events observed in the environment. By
    setting a specific risk type and severity, Silverfort can adjust its authentication
    policies for that user.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the User Principal Name (UPN),
    risk type, severity level, validity duration, and a descriptive reason from the
    input parameters.

    2. **Validation:** It validates that the provided risk type and severity match
    Silverfort's supported enums and ensures the validity duration is a positive integer.

    3. **API Interaction:** The action initializes a connection to the Silverfort
    Risk API and sends a POST request to the `/v1/public/updateEntityRisk` endpoint
    with the specified risk metadata.

    4. **Result Reporting:** Upon a successful API response, the action returns a
    success message and populates the JSON results with the updated risk details.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Principal Name | String | Yes | The user principal name (e.g., user@domain.com)
    for whom the risk information will be updated. |

    | Risk Type | DDL | Yes | The category of risk to update. Options include: `activity_risk`,
    `malware_risk`, `data_breach_risk`, or `custom_risk`. |

    | Severity | DDL | Yes | The severity level of the risk indicator. Options include:
    `low`, `medium`, `high`, or `critical`. |

    | Valid For Hours | String | Yes | The duration (in hours) for which this risk
    indicator should remain active in Silverfort. Must be a positive integer. |

    | Description | String | Yes | A text description providing context or the reason
    for the risk update. |


    ### Additional Notes

    * This action requires the **Risk App User ID** and **Risk App User Secret** to
    be configured in the integration settings to authenticate with the Silverfort
    Risk API.
