  ai_description: >-
    ### General Description

    Updates an authentication policy in Silverfort. This action allows for modifying
    the policy's enabled state and managing the lists of users, groups, sources, and
    destinations associated with the policy. It is primarily used to dynamically adjust
    security controls based on incident response needs, such as enabling a policy
    or adding specific users to a restricted group.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Policy ID | The unique identifier of the policy to update. | string | Yes |

    | Enabled | Determines whether the policy should be enabled (true) or disabled
    (false). | boolean | No |

    | Add Users and Groups | JSON array of users/groups to add to the policy. Format:
    `[{"identifierType": "upn", "identifier": "user@domain.com", "displayName": "User
    Name", "domain": "domain.com"}]` | string | No |

    | Remove Users and Groups | JSON array of users/groups to remove from the policy.
    Format: `[{"identifierType": "upn", "identifier": "user@domain.com", "displayName":
    "User Name", "domain": "domain.com"}]` | string | No |

    | Add Sources | JSON array of sources to add to the policy. Format: `[{"identifierType":
    "ip", "identifier": "10.0.0.1", "displayName": "Server"}]` | string | No |

    | Remove Sources | JSON array of sources to remove from the policy. Format: `[{"identifierType":
    "ip", "identifier": "10.0.0.1", "displayName": "Server"}]` | string | No |

    | Add Destinations | JSON array of destinations to add to the policy. Format:
    `[{"identifierType": "hostname", "identifier": "server.domain.com", "displayName":
    "Server", "domain": "domain.com", "services": ["rdp"]}]` | string | No |

    | Remove Destinations | JSON array of destinations to remove from the policy.
    Format: `[{"identifierType": "hostname", "identifier": "server.domain.com", "displayName":
    "Server", "domain": "domain.com", "services": ["rdp"]}]` | string | No |


    ### Additional Notes

    - The action expects JSON-formatted strings for the 'Add/Remove' parameters. If
    the JSON is malformed, the action will fail with a validation error.

    - At least one update parameter (Enabled, Add/Remove lists) should be provided
    alongside the Policy ID for the action to have an effect.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Policy ID and all optional
    update parameters from the input.

    2. **JSON Parsing**: It parses the JSON strings for users, groups, sources, and
    destinations into internal data models.

    3. **API Interaction**: It initializes the Silverfort Policy API client and sends
    a PATCH request to the `/v2/public/policies/{policy_id}` endpoint with the specified
    changes.

    4. **Result Processing**: Upon a successful API response, it constructs a JSON
    result indicating the policy was updated and returns a success message to the
    SOAR.
