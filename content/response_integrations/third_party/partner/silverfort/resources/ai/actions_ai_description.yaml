  ai_description: >-
    ### General Description

    Updates the protection policy for a specific service account in Silverfort. This
    action allows security teams to programmatically adjust the security posture of
    service accounts by enabling or disabling policies, toggling blocking mode, configuring
    SIEM integration, and managing allowlists for sources, destinations, and protocols.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Account GUID | String | Yes | The unique identifier (GUID) of the service
    account whose policy is being updated. |

    | Enabled | Boolean | No | Toggle to enable or disable the policy. |

    | Block | Boolean | No | Toggle to enable or disable blocking for policy violations.
    |

    | Send to SIEM | Boolean | No | Toggle to enable or disable sending policy violation
    logs to the SIEM. |

    | Risk Level | DDL | No | The risk level threshold for the policy. Supported values:
    `low`, `medium`, `high`. |

    | Allow All Sources | Boolean | No | If set to true, the policy will ignore the
    specific allowed sources list and allow all sources. |

    | Allow All Destinations | Boolean | No | If set to true, the policy will ignore
    the specific allowed destinations list and allow all destinations. |

    | Protocols | String | No | A comma-separated list of protocols to allow (e.g.,
    `Kerberos`, `ldap`, `ntlm`). |

    | Add Allowed Sources | String | No | A JSON array of source objects to add to
    the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`. |

    | Remove Allowed Sources | String | No | A JSON array of source objects to remove
    from the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`. |

    | Add Allowed Destinations | String | No | A JSON array of destination objects
    to add to the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`. |

    | Remove Allowed Destinations | String | No | A JSON array of destination objects
    to remove from the allowlist. Format: `[{"key": "10.0.0.1", "key_type": "ip"}]`.
    |


    ### Additional Notes

    The `Add/Remove Allowed Sources/Destinations` parameters require a specific JSON
    structure. Each object in the array must contain a `key` (the identifier, such
    as an IP or hostname) and a `key_type` (the type of identifier).


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory Service Account
    GUID and all optional policy configuration parameters from the input.

    2. **Validation:** It validates that the provided `Risk Level` and `Protocols`
    match the supported enums in the Silverfort system.

    3. **Endpoint Parsing:** It parses the JSON strings provided for adding or removing
    allowed sources and destinations into structured data models.

    4. **API Interaction:** It sends a POST request to the Silverfort Service Accounts
    API endpoint to apply the specified policy updates for the given GUID.

    5. **Result Handling:** The action returns a success status and the GUID of the
    updated service account.
