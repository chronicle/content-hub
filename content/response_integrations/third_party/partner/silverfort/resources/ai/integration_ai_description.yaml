product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Silverfort integration is an identity security platform that provides capabilities
    to manage and monitor identity-related security. It includes actions to retrieve
    and update risk levels for users and service accounts (e.g., 'Get Entity Risk',
    'Update Entity Risk', 'Update SA Policy'), which directly aligns with the 'IAM
    & Identity Management' category. Furthermore, the integration provides visibility
    into service accounts by retrieving their detailed attributes and configurations
    (e.g., 'Get Service Account', 'List Service Accounts'), which qualifies it for
    the 'Asset Inventory' category as these service accounts are critical internal
    assets. The integration does not perform log analysis (SIEM), host-level process
    inspection (EDR), network traffic blocking (Network Security), or external indicator
    reputation checks (Threat Intelligence).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
