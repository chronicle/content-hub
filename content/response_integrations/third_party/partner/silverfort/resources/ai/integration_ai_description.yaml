  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Silverfort integration is an identity security platform that provides capabilities
    to retrieve risk information for users and service accounts (e.g., 'Get Entity
    Risk', 'Get Service Account') and to manage authentication and service account
    policies (e.g., 'Update Entity Risk', 'Update Policy', 'Update SA Policy'). These
    actions directly align with the IAM & Identity Management category, which involves
    managing user accounts, identity groups, and privilege levels. The integration
    does not perform functions related to SIEM log analysis, EDR host containment,
    network security gateway blocking, or other categories like ITSM or Vulnerability
    Management.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
