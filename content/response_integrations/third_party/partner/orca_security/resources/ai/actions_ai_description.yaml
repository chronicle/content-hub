  ai_description: "### General Description\nUpdates an alert in the Orca Security\
    \ platform. This action allows users to modify the status, snooze state, or verification\
    \ status of a specific alert. It interacts with the Orca Security API to apply\
    \ these changes and subsequently retrieves the updated alert details to provide\
    \ the latest state.\n\n### Parameters\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Alert ID | String | Yes | The unique identifier\
    \ of the alert to be updated. |\n| Verify Alert | Boolean | No | If enabled, initiates\
    \ the verification process for the alert. |\n| Snooze State | DDL | No | Specifies\
    \ the snooze state for the alert (Snooze/Unsnooze). |\n| Snooze Days | String\
    \ | No | Number of days to snooze the alert. Mandatory if 'Snooze State' is set\
    \ to 'Snooze'. Defaults to 1 day. |\n| Status | DDL | No | Specifies the new status\
