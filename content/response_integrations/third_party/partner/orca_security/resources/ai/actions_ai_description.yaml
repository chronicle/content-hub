Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert in Orca Security. The action can initiate the verification process,
    change the snooze state, or update the status of a specific alert. After applying
    the requested changes, it retrieves and returns the updated alert data.


    ### Flow Description

    1. Extracts the provided Alert ID and desired update parameters (Verify Alert,
    Snooze State, Snooze Days, Status).

    2. Validates that at least one update action is requested.

    3. If requested, makes an API call to verify the alert.

    4. If requested, makes an API call to snooze or unsnooze the alert.

    5. If requested, makes an API call to update the alert's status.

    6. Makes an API call to retrieve the updated alert data.

    7. Returns the updated alert data as a JSON result.


    ### Additional Notes

    The action requires at least one of the following parameters to be provided: "Status",
    "Verify Alert", or "Snooze State". If "Snooze State" is set to "Snooze", the "Snooze
    Days" parameter must be provided.
  ai_short_description: >-
    Updates the status, snooze state, or verification state of a specific alert in
    Orca Security and returns the updated alert data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
