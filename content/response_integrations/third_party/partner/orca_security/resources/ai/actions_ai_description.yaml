  ai_description: "Updates an alert in Orca Security. This action allows users to\
    \ modify the status, snooze state, or verification status of a specific alert\
    \ within the Orca Security platform.\n\n### Flow Description\n1. **Initialization**:\
    \ Extracts configuration parameters (API credentials, SSL verification) and action\
    \ parameters (Alert ID, Verify Alert, Snooze State, Snooze Days, Status).\n2.\
    \ **Validation**: Ensures that at least one update operation (Verify, Snooze,\
    \ or Status change) is requested. If 'Snooze' is selected, it validates that 'Snooze\
    \ Days' is provided.\n3. **Execution**: \n    - If 'Verify Alert' is enabled,\
    \ it calls the Orca Security API to verify the alert.\n    - If 'Snooze State'\
    \ is set to 'Snooze', it calls the API to snooze the alert for the specified number\
    \ of days.\n    - If 'Status' is provided, it updates the alert status in Orca\
    \ Security.\n4. **Data Retrieval**: Fetches the updated alert data from Orca Security.\n\
    5. **Output**: Returns the updated alert data as a JSON result.\n\n### Parameters\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Alert ID | String | Yes | The unique identifier of the alert to be updated.\
    \ |\n| Verify Alert | Boolean | No | If enabled, initiates the verification process\
    \ for the alert. |\n| Snooze State | DDL | No | Specifies the snooze state for\
    \ the alert (Snooze/Unsnooze). |\n| Snooze Days | String | No | Number of days\
    \ to snooze the alert. Mandatory if 'Snooze State' is set to 'Snooze'. Defaults\
    \ to 1 day. |\n| Status | DDL | No | Specifies the new status to set for the alert\
    \ (Open, In Progress, Close, Dismiss). |\n\n### Additional Notes\nAt least one\
    \ of the following parameters must be configured for the action to run: 'Status',\
