  ai_description: >-
    ### General Description

    Tests the connectivity to the Orca Security API using the provided configuration
    parameters. This action ensures that the API Root, authentication credentials
    (API Key or Token), and SSL settings are correctly configured and that the Google
    SecOps platform can communicate with the Orca Security environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Orca Security API. |

    | API Key | String | No | The API key for authentication. Used if API Token is
    not provided. |

    | API Token | String | No | The API token for authentication. This is the preferred
    authentication method. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API server. |


    ### Additional Notes

    * Either the **API Key** or the **API Token** must be configured for the integration
    to authenticate successfully.

    * The action performs a small query (fetching one vulnerability) to verify that
    the credentials have the necessary permissions.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, API Key, API Token, and SSL
    verification settings from the integration configuration.

    2. **Manager Initialization**: Initializes the Orca Security API manager with
    the extracted credentials.

    3. **Connectivity Test**: Executes a `test_connectivity` call, which sends a POST
    request to the vulnerability details endpoint with a limit of 1.

    4. **Result Reporting**: If the request is successful, the action completes with
    a success message. If an exception occurs (e.g., authentication failure, network
    timeout), the action fails and reports the error.
