Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Orca Security\
    \ platform. It ensures that the provided configuration parameters\u2014such as\
    \ the API Root, API Key or Token, and SSL settings\u2014are correct and that the\
    \ SecOps environment can successfully communicate with the Orca Security API.\n\
    \n### Parameters Description\nThis action does not require any action-specific\
    \ parameters. It relies entirely on the global integration configuration provided\
    \ on the Marketplace tab:\n\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **API Root** | String | Yes | The base URL of\
    \ the Orca Security API instance. |\n| **API Key** | String | No | The security\
    \ token used for cookie-based authentication (if Token is not provided). |\n|\
    \ **API Token** | String | No | The preferred authentication method using a Bearer-style\
    \ token. |\n| **Verify SSL** | Boolean | No | If enabled, the action will validate\
    \ the SSL certificate of the API endpoint. |\n\n### Additional Notes\n- Either\
    \ the **API Key** or the **API Token** must be configured in the integration settings\
    \ for the action to succeed.\n- This action is typically used during the initial\
    \ setup or for troubleshooting connection issues.\n\n### Flow Description\n1.\
    \ **Initialization**: The action retrieves the global configuration parameters\
    \ (API Root, Key/Token, and SSL settings) from the integration environment.\n\
    2. **Manager Setup**: It initializes the `OrcaSecurityManager` which handles authentication\
    \ (either via cookies for API Keys or headers for API Tokens).\n3. **Connectivity\
    \ Test**: The manager executes a lightweight query (requesting a single vulnerability\
    \ record) to the Orca Security `serving-layer/query` endpoint.\n4. **Validation**:\
    \ The action validates the API response. If the request is successful, it confirms\
    \ connectivity; otherwise, it catches the exception and reports the failure details.\n\
    5. **Completion**: The action ends with a success or failure status and a descriptive\
    \ message for the analyst."
