  ai_description: >-
    ### General Description

    Retrieves comprehensive details for specific assets from Orca Security. This action
    allows analysts to fetch metadata such as asset type, account, category, and state.
    Additionally, it can retrieve associated vulnerability information filtered by
    a minimum severity level, providing a deeper look into the security posture of
    the specified resources.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | String | Yes | A comma-separated list of unique Orca Security asset
    identifiers to retrieve details for. |

    | Return Vulnerabilities Information | Boolean | No | If enabled, the action will
    also fetch and include vulnerability data related to each asset. |

    | Lowest Severity For Vulnerabilities | DDL | Yes | The minimum severity threshold
    (e.g., Critical, High, Medium, Low, Unknown) used to filter the vulnerabilities
    returned. |

    | Max Vulnerabilities To Fetch | String | No | The maximum number of vulnerabilities
    to retrieve per asset (Default: 50, Max: 100). |

    | Create Insight | Boolean | No | If enabled, the action will generate a SOAR
    case insight for each successfully enriched asset. |


    ### Additional Notes

    - The action requires either an API Key or an API Token to be configured in the
    integration settings.

    - The `Max Vulnerabilities To Fetch` parameter must be a positive integer and
    cannot exceed the system limit of 100.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of Asset IDs and configuration
    settings (API roots, credentials).

    2. **Validation:** It validates that the `Max Vulnerabilities To Fetch` is a positive
    integer within the allowed range (1-100).

    3. **Manager Initialization:** Initializes the `OrcaSecurityManager` to handle
    API communication.

    4. **Asset Iteration:** For each provided Asset ID:
        - **Fetch Asset Details:** Queries the Orca Security API for the asset's metadata.
        - **Fetch Vulnerabilities (Optional):** If requested, queries for vulnerabilities
    matching the specified severity and limit.
        - **Data Aggregation:** Combines asset and vulnerability data into a single
    JSON object.
        - **Insight Generation (Optional):** Creates a case insight containing a summary
    of the asset's state and a link to the Orca UI.
    5. **Output Generation:** Adds the aggregated JSON results and a summary data
    table to the SOAR action results.
