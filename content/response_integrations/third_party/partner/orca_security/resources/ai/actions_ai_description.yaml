  ai_description: >-
    ### General Description

    The **Scan Assets** action initiates and monitors security scans for a specified
    list of asset IDs within the Orca Security platform. This action operates asynchronously,
    meaning it triggers the scans and then periodically checks their status until
    they are completed or a timeout occurs. It is designed to provide visibility into
    the security posture of specific cloud assets on demand.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Asset IDs** | String | Yes | A comma-separated list of unique identifiers
    for the assets you wish to scan. |


    ### Flow Description

    1. **Initialization**: The action extracts the provided Asset IDs from the parameters
    and initializes the Orca Security manager using the integration's configuration
    (API Root, API Key/Token).

    2. **Scan Initiation**: During the first run, the action iterates through the
    provided Asset IDs and sends a request to the Orca Security API to start a new
    scan for each asset. It records the resulting scan IDs.

    3. **Status Monitoring**: The action enters an asynchronous state. In subsequent
    runs, it checks the status of each pending scan using the scan IDs obtained in
    the previous step.

    4. **Data Retrieval**: Once a scan reaches the 'done' status, the action retrieves
    the raw scan data from Orca Security.

    5. **Completion**: After all scans are finished, the action aggregates the results,
    adds the raw scan data to the action's JSON results, and provides a summary message
    of successful and failed scans. If the process approaches the global timeout,
    it will exit gracefully with a list of pending assets.


    ### Additional Notes

    * This action is **asynchronous**. Users should ensure that the script timeout
    in the Google SecOps IDE is configured appropriately to allow enough time for
    the scans to complete in the external system.

    * If a scan is already running for a specific asset in Orca Security, the action
    will automatically track that existing scan instead of failing.
