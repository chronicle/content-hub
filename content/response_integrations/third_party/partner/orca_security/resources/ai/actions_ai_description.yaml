  ai_description: >-
    ### General Description

    Adds a comment to a specific alert within the Orca Security platform. This action
    allows analysts to document findings, provide updates, or add context to an existing
    alert directly from Google SecOps. It interacts with the Orca Security API using
    a PUT request to append the specified text to the alert's comment history.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | string | True | The unique identifier of the alert in Orca Security
    to which the comment will be added. |

    | Comment | string | True | The text content of the comment to be added to the
    alert. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration (Root,
    Key/Token) and the action parameters (Alert ID and Comment).

    2. **Manager Initialization**: Initializes the `OrcaSecurityManager` to handle
    authentication and API communication.

    3. **API Interaction**: Calls the `add_alert_comment` method, which sends a PUT
    request to the Orca Security endpoint `/api/alerts/{alert_id}/comment` with the
    comment payload.

    4. **Result Processing**: Captures the API response, converts the created comment
    data into a JSON result, and provides a success message to the analyst.


    ### Additional Notes

    This action does not interact with Google SecOps entities; it operates directly
    on a specific Alert ID provided as an input parameter.
