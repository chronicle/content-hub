  ai_description: >-
    ### General Description

    The **Update Alert** action allows analysts to modify the state of a specific
    alert within the Orca Security platform. It supports updating the alert's status
    (e.g., Open, In Progress, Close, Dismiss), managing its snooze state (Snooze or
    Unsnooze), and initiating the alert verification process. This action is essential
    for synchronizing incident response states between Google SecOps and Orca Security.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in Orca Security
    that needs to be updated. |

    | **Verify Alert** | Boolean | No | If enabled, the action will initiate the verification
    process for the specified alert. |

    | **Snooze State** | DDL | No | Specifies the snooze state for the alert. Options
    include `Snooze` or `Unsnooze`. |

    | **Snooze Days** | String | No | Specifies the duration (in days) for which the
    alert should be snoozed. This is required if **Snooze State** is set to `Snooze`.
    Defaults to 1 day if not provided. |

    | **Status** | DDL | No | The new status to assign to the alert. Options include
    `Open`, `In Progress`, `Close`, and `Dismiss`. |


    ### Additional Notes

    - At least one of the following parameters must be configured for the action to
    execute: **Status**, **Verify Alert**, or **Snooze State**.

    - If **Snooze State** is set to `Unsnooze` and no **Status** is provided, the
    action will automatically set the alert status to `Open`.

    - The action performs a final fetch of the alert data after updates to provide
    the most current state in the results.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Alert ID and the desired
    update parameters (Status, Snooze, Verification).

    2. **Validation:** It ensures that at least one update operation is requested
    and that snooze duration is provided if snoozing.

    3. **Verification Update:** If requested, it calls the Orca Security API to initiate
    the alert verification process.

    4. **Snooze Update:** If a snooze state is specified, it updates the alert's snooze
    settings accordingly.

    5. **Status Update:** If a new status is provided (or implied by an unsnooze action),
    it updates the alert's status in Orca Security.

    6. **Data Retrieval:** The action fetches the latest details for the updated alert.

    7. **Completion:** The updated alert data is returned as a JSON result, and the
    action completes with a success message.
