Scan Assets:
  ai_description: >-
    ### General Description

    Initiates a security scan for specified assets in Orca Security and retrieves
    the scan results. This action is designed to trigger scans on demand and wait
    for their completion to gather the resulting data.


    ### Flow Description

    1. Extracts the provided list of Asset IDs from the action parameters.

    2. Initiates a scan for each asset by making a POST request to the Orca Security
    API (`/api/scan/asset/{asset_id}`).

    3. Operates asynchronously, periodically checking the status of the initiated
    scans by making GET requests to the Orca Security API (`/api/scan/status/{scan_id}`).

    4. Once a scan's status is marked as completed, the action collects the raw scan
    data.

    5. Returns the successful scan results as JSON data and outputs a summary message.


    ### Additional Notes

    This action runs asynchronously. It is recommended to adjust the script timeout
    value in the IDE to accommodate potentially long-running scans.
