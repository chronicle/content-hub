Update Alert:
  ai_description: >-
    Updates the state of an alert in Orca Security. This action allows for modifying
    the alert's status, managing its snooze state, or initiating a verification process.
    It requires a specific Alert ID and at least one modification parameter to be
    configured. After performing the requested updates, the action retrieves and returns
    the updated alert details from Orca Security.


    ### Flow Description

    1. **Parameter Validation**: Checks that at least one update operation (Status,
    Verify Alert, or Snooze State) is requested. If 'Snooze' is selected, it ensures
    'Snooze Days' is provided.

    2. **Verification**: If 'Verify Alert' is enabled, it triggers the verification
    process for the specified alert.

    3. **Snooze Management**: If 'Snooze State' is set to 'Snooze', it snoozes the
    alert for the defined number of days. If set to 'Unsnooze', it prepares to reset
    the status.

    4. **Status Update**: Updates the alert status to the specified value (Open, In
    Progress, Close, or Dismiss). If 'Unsnooze' was selected without a specific status,
    it defaults to 'Open'.

    5. **Data Retrieval**: Fetches the final state of the alert from Orca Security
    to confirm changes and provide the updated data as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert to be updated.
    |

    | Verify Alert | Boolean | No | If enabled, initiates the verification process
    for the alert. |

    | Snooze State | DDL | No | Sets the snooze state. Options: 'Snooze' or 'Unsnooze'.
    |

    | Snooze Days | String | No | Number of days to snooze the alert. Mandatory if
    'Snooze State' is 'Snooze'. Defaults to 1 if not provided. |

    | Status | DDL | No | The new status to assign to the alert. Options: 'Open',
    'In Progress', 'Close', 'Dismiss'. |


    ### Additional Notes

    * At least one of the following parameters must be provided for the action to
    execute: 'Status', 'Verify Alert', or 'Snooze State'.

    * If 'Snooze State' is set to 'Unsnooze' and no 'Status' is provided, the action
    automatically sets the alert status to 'Open'.
