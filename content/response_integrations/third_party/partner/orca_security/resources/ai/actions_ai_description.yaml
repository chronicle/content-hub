  ai_description: >-
    ### General Description

    The **Get Vulnerability Details** action retrieves comprehensive information about
    specific vulnerabilities (CVEs) from Orca Security. It allows analysts to enrich
    a list of CVE IDs with data such as descriptions, fix availability, affected assets,
    and severity levels.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **CVE IDs** | String | Yes | A comma-separated list of CVE identifiers (e.g.,
    CVE-2021-44228) to be enriched. |

    | **Fields To Return** | String | No | A comma-separated list of specific fields
    to include in the output. If left empty, all available fields are returned. |

    | **Output** | DDL | No | Determines the output format. Options are `JSON` (returns
    data in the action result) or `CSV` (creates a file and returns the path). |

    | **Create Insight** | Boolean | No | If enabled (true), the action will generate
    a General Insight in the case for every successfully enriched vulnerability. |

    | **Max Assets To Return** | String | No | The maximum number of assets associated
    with the CVE to retrieve. Default is 50, maximum is 10,000. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the CVE IDs, output preferences,
    and insight configuration from the user input.

    2. **Validation:** It validates that the `Max Assets To Return` is a positive
    integer within the allowed limit (10,000).

    3. **API Interaction:** For each provided CVE ID, the action queries the Orca
    Security API using the `VulnerabilityQueryBuilder` to fetch vulnerability and
    asset data.

    4. **Data Processing:**
        * If `Fields To Return` is specified, the results are filtered to include
    only those keys.
        * The action flattens the data for CSV/Table compatibility.
    5. **Internal Updates:**
        * If `Create Insight` is true, a General Insight is created for the case,
    summarizing the CVE's severity, description, and affected assets.
        * A data table named "Vulnerability Details" is added to the case containing
    the enrichment data.
    6. **Final Output:** The action returns the results in the selected format (JSON
    or CSV path) and provides a summary message of successful and failed enrichments.


    ### Additional Notes

    * This action does not run on entities; it processes the CVE IDs provided in the
    input parameter.

    * The action is classified as non-enrichment because it modifies the case by adding
    a data table, which falls outside the strict "Read-Only/Insight/Comment/Entity
    Update" definition.
