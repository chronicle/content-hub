Get Vulnerability Details:
  ai_description: "Retrieves detailed vulnerability information from Orca Security\
    \ for a specified list of CVE IDs. This action fetches data regarding the vulnerability's\
    \ description, severity, fix availability, and associated affected assets. It\
    \ allows users to filter the returned JSON fields and choose between JSON or CSV\
    \ output formats. Additionally, the action can generate case insights for each\
    \ enriched vulnerability and populates a data table with the findings.\n\n###\
    \ Parameters Description\n\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| CVE IDs | String | Yes | A comma-separated list\
    \ of CVE identifiers (e.g., CVE-2021-44228) to be enriched. |\n| Fields To Return\
    \ | String | No | A comma-separated list of specific fields to include in the\
    \ output. If left empty, all available fields are returned. |\n| Output | DDL\
    \ | No | The format of the action output. Options are 'JSON' (default) or 'CSV'.\
    \ If 'CSV' is selected, a file is created and the path is returned. |\n| Create\
    \ Insight | Boolean | No | If enabled (default), the action creates a detailed\
    \ case insight for every successfully enriched vulnerability. |\n| Max Assets\
    \ To Return | String | No | The maximum number of assets related to the CVE to\
    \ retrieve. Default is 50, with a maximum limit of 10,000. |\n\n### Flow Description\n\
    \n1. **Parameter Validation**: The action validates the `Max Assets To Return`\
    \ parameter to ensure it is a positive integer within the allowed limit (10,000).\n\
    2. **Authentication**: Initializes the Orca Security Manager using the provided\
    \ API credentials (API Key or Token).\n3. **Data Retrieval**: Iterates through\
    \ the provided list of CVE IDs and performs a paginated query to the Orca Security\
    \ API to fetch vulnerability details and related asset information.\n4. **Data\
    \ Processing**: Filters the results based on the `Fields To Return` parameter\
    \ and prepares the data for the requested output format (JSON or CSV).\n5. **Internal\
    \ Mutation**: \n    * If `Create Insight` is true, it generates a formatted HTML\
    \ insight for the case containing the vulnerability's severity, description, and\
    \ affected assets.\n    * Adds a data table named 'Vulnerability Details' to the\
    \ case containing a summary of the enriched CVEs.\n6. **Final Output**: Returns\
    \ the processed data as a JSON result or a file path to a CSV, along with a success/failure\
    \ message for each CVE."
