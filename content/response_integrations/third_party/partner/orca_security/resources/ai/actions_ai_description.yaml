Get Compliance Info:
  ai_description: >-
    ### General Description

    Retrieves compliance information based on selected frameworks from Orca Security.
    This action queries the Orca Security API to fetch compliance scores, passed/failed
    test results, and descriptions for specified frameworks.


    ### Flow Description

    1. Extracts the provided framework names, insight creation preference, and result
    limit.

    2. Initializes the Orca Security API client.

    3. Makes a POST request to the `/api/serving-layer/compliance/frameworks/overview`
    endpoint to retrieve framework details.

    4. If the `Create Insight` parameter is enabled, generates a case insight containing
    the compliance scores and test results.

    5. Outputs the retrieved framework details into a data table and a JSON result.


    ### Additional Notes

    If no framework names are provided, the action will return information about all
    available frameworks up to the specified limit.
