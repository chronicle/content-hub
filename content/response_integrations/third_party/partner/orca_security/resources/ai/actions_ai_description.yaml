Get Compliance Info:
  ai_description: >-
    ### General Description

    Retrieves compliance framework information from Orca Security. This action allows
    security analysts to monitor the compliance posture of their cloud environment
    by fetching details about various frameworks (e.g., CIS, SOC2, NIST). It provides
    a summary of compliance scores, as well as the number of passed and failed tests
    for each framework.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Framework Names | String | No | A comma-separated list of framework names to
    retrieve. If left empty, the action returns information about all selected frameworks
    in Orca Security. |

    | Create Insight | Boolean | Yes | If set to true, the action generates a detailed
    insight on the case wall containing the compliance summary. |

    | Max Frameworks To Return | Integer | No | Specifies the maximum number of frameworks
    to return in the results. Default is 50. |


    ### Additional Notes

    - The action will attempt to find frameworks matching the provided names. If some
    frameworks are not found, they will be listed in the output message.

    - If none of the provided frameworks are found, the action will fail.

    - Although 'Max Frameworks To Return' is defined as a string in the configuration,
    the logic treats it as an integer.


    ### Flow Description

    1. **Initialization**: Extracts API credentials (API Root, Key/Token) and action
    parameters.

    2. **API Request**: Calls the Orca Security `/api/serving-layer/compliance/frameworks/overview`
    endpoint to fetch framework data.

    3. **Filtering**: If specific framework names were provided, the action filters
    the results to match those names.

    4. **Insight Creation**: If 'Create Insight' is enabled, it formats the framework
    scores and test results into an HTML-based case insight.

    5. **Result Output**: Populates a data table named 'Compliance Details' and attaches
    the raw JSON data to the action result.
