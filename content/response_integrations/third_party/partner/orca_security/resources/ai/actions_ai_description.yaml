    a case insight for each successfully enriched vulnerability, detailing the severity,
    description, and affected assets.

    4. **Result Formatting**: Formats the retrieved data based on the `Fields To Return`
    and `Output` parameters (JSON or CSV).

    5. **Output Generation**: Attaches the results to the action's output, creates
    a data table named "Vulnerability Details", and returns a summary message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | CVE IDs | String | Yes | A comma-separated list of CVE identifiers to be enriched.
    |

    | Fields To Return | String | No | A comma-separated list of specific fields to
    return from the flattened JSON object. |

    | Output | Dropdown | No | Specifies the output format. If "JSON" is selected,
    returns a regular JSON result. If "CSV" is selected, creates a file in the action
    execution folder and returns its path. |

    | Create Insight | Boolean | No | If enabled, creates a case insight for every
    enriched vulnerability. |

    | Max Assets To Return | String | No | Specifies the maximum number of assets
    related to the CVE to return. Default is 50, maximum is 10000. |
