Get Asset Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific assets from Orca Security using
    their Asset IDs. It can optionally fetch related vulnerabilities and create case
    insights with the retrieved data.


    ### Flow Description

    1. Parses the provided comma-separated list of Asset IDs from the action parameters.

    2. For each Asset ID, makes an API call to Orca Security to fetch the asset's
    details.

    3. If the `Return Vulnerabilities Information` parameter is enabled, makes an
    additional API call to fetch vulnerabilities related to the asset, filtered by
    the specified lowest severity and limited by the maximum count.

    4. Aggregates the asset data and any retrieved vulnerabilities into JSON and CSV
    formats.

    5. If the `Create Insight` parameter is enabled, creates a case insight in Google
    SecOps for each successfully processed asset.

    6. Returns the aggregated data as JSON results and a data table.


    ### Additional Notes

    The action does not operate on Google SecOps entities directly; it relies entirely
    on the Asset IDs provided as input parameters.
  ai_short_description: >-
    Retrieves detailed information and optionally related vulnerabilities for specific
    assets from Orca Security using their Asset IDs, and can create case insights
    with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights with the retrieved asset details.
    reasoning: >-
      The action fetches data from Orca Security (fetches_data=true). It does not
      mutate external data. It mutates internal data by creating case insights (can_mutate_internal_data=true,
      can_create_insight=true). It does not update entities, modify alert data, or
      create case comments.
