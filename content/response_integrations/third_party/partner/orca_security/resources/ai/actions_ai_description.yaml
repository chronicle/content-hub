Get Vulnerability Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific vulnerabilities (CVEs) from Orca
    Security.


    ### Flow Description

    1. Extracts the list of CVE IDs and other configuration parameters from the action
    inputs.

    2. Initializes the `OrcaSecurityManager` to authenticate and interact with the
    Orca Security API.

    3. Iterates through the provided CVE IDs and queries the Orca Security API for
    vulnerability details.

    4. Formats the retrieved data based on the requested fields and output type (JSON
    or CSV).

    5. Optionally creates a case insight for each successfully enriched vulnerability
    using `siemplify.create_case_insight`.

    6. Returns the results, adds a data table to the case wall, and outputs a summary
    message indicating success or failure for each CVE.


    ### Additional Notes

    The action can return results in either JSON or CSV format and allows limiting
    the number of assets returned per CVE. It does not operate on SOAR entities directly
    but rather on the CVE IDs provided in the action parameters.
