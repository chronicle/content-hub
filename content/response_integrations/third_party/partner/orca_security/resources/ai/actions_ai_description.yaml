  ai_description: >-
    ### General Description

    Retrieves detailed compliance information from Orca Security based on specified
    frameworks. This action helps security teams monitor their compliance posture
    by fetching scores, pass/fail counts, and status for various security frameworks
    (e.g., CIS, NIST, SOC2).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Framework Names | String | No | A comma-separated list of framework names to
    retrieve. If left empty, the action returns information for all selected frameworks
    in Orca. |

    | Create Insight | Boolean | Yes | If set to true, the action generates a case
    insight summarizing the compliance status of the retrieved frameworks. |

    | Max Frameworks To Return | Integer | No | The maximum number of frameworks to
    include in the results. Default is 50. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API configuration and action parameters,
    including framework names and result limits.

    2. **API Request:** Connects to the Orca Security API and queries the compliance
    overview endpoint for each specified framework.

    3. **Data Processing:** Parses the response into structured framework objects
    containing scores and test results.

    4. **Insight Generation:** If enabled, constructs an HTML-formatted insight and
    attaches it to the case.

    5. **Output:** Populates a data table named "Compliance Details" and provides
    the raw JSON results for downstream playbook use.


    ### Additional Notes

    - If specific framework names are provided but none are found in Orca Security,
    the action will fail.

    - This action does not process specific entities from the case; it retrieves organizational-level
    compliance data.
