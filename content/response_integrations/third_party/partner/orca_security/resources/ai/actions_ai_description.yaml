  ai_description: >-
    ### General Description

    This action triggers a security scan for specified assets in Orca Security. It
    is designed to run asynchronously, allowing the action to initiate scans and poll
    for their completion status over multiple runs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | string | Yes | A comma-separated list of asset IDs for which you
    want to initiate a scan. |


    ### Additional Notes

    This action is asynchronous. Please adjust the script timeout value in the Siemplify
    IDE as needed to accommodate the time required for the scans to complete.


    ### Flow Description

    1. The action extracts the `Asset IDs` from the input parameters.

    2. It initializes the `OrcaSecurityManager` to interact with the Orca Security
    API.

    3. If it is the first run, the action calls `start_scan` for each provided asset
    ID and tracks them as pending.

    4. If it is a subsequent run (asynchronous), the action checks the status of the
    pending scans using `get_scan_status`.

    5. Once a scan is completed, the action adds the result JSON to the action output
    and reports the status of all scanned assets.
