Scan Assets:
  ai_description: >-
    ### General Description

    Initiates and monitors security scans for specific assets within the Orca Security
    platform. This action is designed to trigger an on-demand assessment of cloud
    assets and retrieve the resulting security telemetry. It operates asynchronously
    to accommodate the time required for cloud security scans to complete.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the 'Asset IDs' provided by
    the user and converts the comma-separated string into a list.

    2. **Scan Initiation**: For each Asset ID, the action calls the Orca Security
    API to start a scan. If a scan is already running for a particular asset, the
    action captures the existing scan's identifier to monitor it.

    3. **Asynchronous Monitoring**: The action enters an asynchronous loop. It periodically
    polls the Orca Security API to check the status of each pending scan using the
    scan IDs.

    4. **Timeout Management**: The script monitors its own execution time and the
    global action timeout. If a timeout is approaching, it gracefully exits and reports
    the pending assets.

    5. **Result Aggregation**: Once scans reach a 'done' status, the action retrieves
    the raw scan data. Successful results are added to the action's JSON output, and
    a summary message is generated detailing which scans succeeded or failed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | string | Yes | A comma-separated list of unique identifiers for
    the assets in Orca Security that you wish to scan. |


    ### Additional Notes

    * **Async Mode**: This action is marked as asynchronous. Users should ensure the
    script timeout value in the Google SecOps IDE is sufficiently high to allow the
    external scanning process to finish.

    * **State Persistence**: The action uses the `additional_data` parameter internally
    to track the state of pending scans across multiple asynchronous execution cycles.
