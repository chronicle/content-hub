Add Comment To Alert:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alert in Orca Security. This action allows analysts
    to append notes or automated log entries directly to the alert's activity timeline
    within the Orca Security platform.


    ### Flow Description

    1. Extracts the `Alert ID` and `Comment` parameters from the action configuration.

    2. Initiates a PUT request to the Orca Security API (`/api/alerts/{alert_id}/comment`)
    with the provided comment payload.

    3. Retrieves the created comment object and appends it to the action's JSON results.


    ### Additional Notes

    - Ensure the provided Alert ID is valid and accessible with the configured API
    credentials.
  ai_short_description: >-
    Adds a comment to a specific alert in Orca Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific alert in Orca Security.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to the Orca Security API to add a comment
      to an alert, which mutates external data. It does not fetch contextual data,
      update internal entities, or create insights.
