  ai_description: >-
    ### General Description

    Retrieves detailed information about assets from Orca Security. This action fetches
    asset metadata and, optionally, related vulnerability information based on specified
    severity thresholds. It provides visibility into asset risk and configuration,
    optionally generating case insights for the enriched assets.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API credentials, URL)
    and action parameters (Asset IDs, vulnerability settings).

    2. **Asset Retrieval**: Iterates through the provided list of Asset IDs and queries
    the Orca Security API for detailed asset information.

    3. **Vulnerability Enrichment**: If enabled, fetches vulnerability details for
    each asset, filtered by the specified minimum severity and result limit.

    4. **Insight Generation**: If enabled, creates a case insight for each successfully
    enriched asset, containing key asset details and a link to the asset in the Orca
    Security UI.

    5. **Output**: Adds the collected asset and vulnerability data to the action results
    as a JSON object and a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | String | Yes | A comma-separated list of asset IDs to retrieve details
    for. |

    | Return Vulnerabilities Information | Boolean | No | If enabled, the action will
    fetch and include vulnerabilities related to the asset. |

    | Lowest Severity For Vulnerabilities | String | Yes | The minimum severity level
    (e.g., Critical, High, Medium, Low, Unknown) for vulnerabilities to be included.
    |

    | Max Vulnerabilities To Fetch | String | No | The maximum number of vulnerabilities
    to return per asset (Default: 50, Max: 100). |

    | Create Insight | Boolean | No | If enabled, creates a case insight for every
    successfully enriched asset. |


    ### Additional Notes

    - The action does not operate on entities directly from the case; it relies on
    the 'Asset IDs' parameter provided by the user.
