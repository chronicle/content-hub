  ai_description: >-
    ### General Description

    The **Get Asset Details** action retrieves detailed information about specific
    assets from Orca Security. It can optionally fetch related vulnerabilities for
    each asset based on a specified severity threshold and limit. The action outputs
    the retrieved data as JSON and a CSV data table, and can optionally generate case
    insights for each successfully processed asset.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | String | Yes | A comma-separated list of asset IDs for which to
    retrieve details. |

    | Return Vulnerabilities Information | Boolean | No | If enabled, the action will
    also fetch vulnerabilities related to the specified assets. |

    | Lowest Severity For Vulnerabilities | DDL | Yes | The lowest severity threshold
    used to fetch vulnerabilities (e.g., Critical, High, Medium, Low, Unknown). |

    | Max Vulnerabilities To Fetch | String | No | Specifies the maximum number of
    vulnerabilities to return per asset. The default is 50, and the maximum allowed
    is 100. |

    | Create Insight | Boolean | No | If enabled, the action will create a case insight
    for every successfully enriched asset. |


    ### Additional Notes

    * The `Max Vulnerabilities To Fetch` parameter must be a positive integer and
    cannot exceed the maximum limit of 100.


    ### Flow Description

    1. **Parameter Initialization & Validation:** The action extracts the input parameters
    and validates that the `Max Vulnerabilities To Fetch` is a positive integer within
    the allowed limit.

    2. **API Initialization:** Initializes the `OrcaSecurityManager` using the provided
    API credentials.

    3. **Asset Processing:** Iterates through the provided list of `Asset IDs`.

    4. **Data Retrieval:** For each asset ID, fetches the asset details from Orca
    Security.

    5. **Vulnerability Retrieval (Optional):** If `Return Vulnerabilities Information`
    is enabled, fetches the related vulnerabilities for the asset based on the severity
    and limit parameters.

    6. **Insight Creation (Optional):** If `Create Insight` is enabled, generates
    a case insight containing the asset details and a link to the Orca Security UI.

    7. **Result Aggregation:** Compiles the successfully retrieved data into JSON
    and CSV formats, and attaches them to the action's results.
