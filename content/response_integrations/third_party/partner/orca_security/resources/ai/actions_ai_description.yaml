Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Orca Security API using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, API Key, API Token,
    Verify SSL).

    2. Initializes the Orca Security manager.

    3. Sends a POST request to the `vulnerability_details` API endpoint with a limit
    of 1 to verify authentication and connectivity.

    4. Returns a success message if the request succeeds, or an error message if it
    fails.


