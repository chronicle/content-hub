Add Comment To Alert:
  ai_description: >-
    Adds a comment to a specific alert in Orca Security. This action allows analysts
    to append notes or documentation directly to an alert record within the Orca Security
    platform, facilitating better tracking and collaboration on security findings.


    ### Flow Description

    1. **Authentication**: The action initializes the Orca Security Manager using
    the provided API Root and either an API Key or API Token.

    2. **Parameter Extraction**: It retrieves the mandatory 'Alert ID' and 'Comment'
    text from the action parameters.

    3. **API Interaction**: The action sends a PUT request to the Orca Security API
    endpoint (`/api/alerts/{alert_id}/comment`) containing the comment payload.

    4. **Result Processing**: Upon success, the action returns the JSON representation
    of the created comment and confirms the operation in the output message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | True | The unique identifier of the alert in Orca Security
    to which the comment will be added. |

    | Comment | String | True | The text content of the comment to be appended to
    the alert. |


    ### Additional Notes

    - This action performs a state change in the external Orca Security system by
    adding new data to an existing alert record.
  capabilities:
