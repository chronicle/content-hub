  ai_description: >-
    Updates an alert in Orca Security. This action allows users to initiate the verification
    process, snooze or unsnooze the alert, and change its status (e.g., Open, In Progress,
    Close, Dismiss). After applying the requested changes, the action retrieves the
    updated alert data and returns it as a JSON result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert ID | string | Yes | The ID of the alert to update. |

    | Verify Alert | boolean | No | If enabled, initiates the verification process
    for the alert. |

    | Snooze State | string | No | Specify whether to Snooze or Unsnooze the alert.
    |

    | Snooze Days | string | No | Specify how many days the alert needs to be snoozed.
    This parameter is mandatory if 'Snooze State' is set to 'Snooze'. |

    | Status | string | No | Specify the new status to set for the alert (e.g., Open,
    In Progress, Close, Dismiss). |


    ### Additional Notes

    At least one of the following parameters must be provided for the action to run:
    'Status', 'Verify Alert', or 'Snooze State'.


    ### Flow

    1. Validates that at least one update parameter is provided.

    2. If 'Verify Alert' is enabled, initiates the verification process in Orca Security.

    3. If 'Snooze State' is set to 'Snooze', snoozes the alert for the specified number
    of days.

    4. If 'Snooze State' is 'Unsnooze' or a 'Status' is provided, updates the alert
    status accordingly.

