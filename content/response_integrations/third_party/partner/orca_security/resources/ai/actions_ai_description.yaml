Get Asset Details:
  ai_description: >-
    Retrieves detailed information for specific assets from Orca Security. This action
    allows users to fetch comprehensive asset metadata and optionally include related
    vulnerability information filtered by severity. It is designed to provide deep
    visibility into the security posture of cloud assets by pulling data directly
    from the Orca Security platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset IDs | String | Yes | A comma-separated list of unique Orca Security asset
    identifiers to retrieve details for. |

    | Return Vulnerabilities Information | Boolean | No | If enabled (default), the
    action will also fetch vulnerabilities associated with the asset. |

    | Lowest Severity For Vulnerabilities | DDL | Yes | The minimum severity level
    (Critical, High, Medium, Low, Unknown) to include when fetching vulnerabilities.
    |

    | Max Vulnerabilities To Fetch | String | No | The maximum number of vulnerabilities
    to return per asset (Default: 50, Max: 100). |

    | Create Insight | Boolean | No | If enabled (default), creates a Google SecOps
    case insight for each enriched asset. |


    ### Flow Description

    1. **Parameter Validation:** The action validates that the 'Max Vulnerabilities
    To Fetch' is a positive integer and does not exceed the system limit of 100.

    2. **Authentication:** Initializes the Orca Security Manager using the provided
    API/API Token and connection settings.

    3. **Asset Retrieval:** Iterates through the provided list of Asset IDs, making
    a request to Orca Security to fetch the core asset metadata.

    4. **Vulnerability Enrichment:** If requested, it performs a secondary lookup
    for each asset to retrieve vulnerabilities that meet the specified severity threshold.

    5. **Output Generation:** For each successful retrieval, it compiles the data
    into a JSON result, constructs a CSV data table for the case wall, and generates
    a detailed case insight containing a direct link to the asset in the Orca Security
    UI.

    6. **Error Handling:** Tracks successful and failed asset lookups, providing a
    summary message at the end of execution.
  capabilities:
