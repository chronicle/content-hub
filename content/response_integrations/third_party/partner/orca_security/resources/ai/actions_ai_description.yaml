  ai_description: >-
    Adds a comment to a specific alert in the Orca Security platform. This action
    allows analysts to append notes or automated log entries directly to an alert
    within the external system.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | string | Yes | The unique identifier of the alert to which the comment
    should be added. |

    | Comment | string | Yes | The text content of the comment to be added. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API credentials
    (API Root, API Key/Token) and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: The action extracts the `Alert ID` and `Comment`
    provided by the user.

    3. **Manager Initialization**: An `OrcaSecurityManager` instance is initialized
    with the provided credentials.

    4. **API Interaction**: The action calls the `add_alert_comment` method, which
    sends a `PUT` request to the Orca Security API to append the specified comment
    to the target alert.

    5. **Result Handling**: The action returns the result of the operation, including
    the created comment object, and logs the status of the execution.
