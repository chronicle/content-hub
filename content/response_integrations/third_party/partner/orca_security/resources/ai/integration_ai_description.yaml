product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Orca Security integration is a cloud-native security platform. It qualifies
    as Cloud Security because it provides visibility into cloud configurations, workloads,
    and findings across cloud environments (GCP/AWS/Azure). It qualifies as Vulnerability
    Management as it retrieves vulnerability details (CVEs) and compliance framework
    information. It qualifies as Asset Inventory because it fetches detailed asset
    metadata and configuration states. Finally, it qualifies as SIEM because the provided
    connector ingests security alerts from the Orca platform into Google SecOps, enabling
    centralized monitoring and alert management. It does not perform EDR (process-level
    activity), Network Security (blocking at gateway), Email Security, IAM management,
    ITSM, or Collaboration functions.
  siem: true
  threat_intelligence: false
  vulnerability_management: true
