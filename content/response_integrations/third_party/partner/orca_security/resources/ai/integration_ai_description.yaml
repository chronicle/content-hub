product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Orca Security integration is primarily focused on cloud security and compliance,
    as evidenced by its ability to ingest cloud-native alerts via its connector and
    provide visibility into cloud configurations and workloads. Therefore, it is classified
    under 'Cloud Security'. The integration also provides capabilities to retrieve
    detailed asset metadata, which aligns with 'Asset Inventory'. Furthermore, the
    integration offers actions to fetch vulnerability details (CVEs) and compliance
    framework information, and to initiate security scans, which directly supports
    'Vulnerability Management'. It does not meet the criteria for SIEM (not a general
    log aggregator), EDR (not endpoint-focused), Network Security, Email Security,
    IAM, ITSM, or Collaboration.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
