Orca Security - Alerts Connector:
  ai_description: >-
    ### General Description

    The Orca Security - Alerts Connector is designed to ingest security alerts from
    the Orca Security platform into Google SecOps (Chronicle SOAR). It enables security
    teams to centralize their cloud security findings, allowing for automated triage
    and response based on alert severity, category, and score. The connector supports
    filtering, deduplication, and mapping of Orca Security findings into actionable
    SOAR cases.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Orca Security API instance. |

    | API Key | String | No | API Key for authentication (used if Token is not provided).
    |

    | API Token | String | No | API Token for authentication (preferred method). |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the Orca
    Security server. |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the Python process.
    |

    | Category Filter | String | No | Comma-separated list of category names to ingest.
    |

    | Alert Type Filter | String | No | Type of alerts to ingest (e.g., specific AWS/Azure
    findings). |

    | Lowest Severity To Fetch | String | No | Minimum severity level (Compromised,
    Imminent compromise, Hazardous, Informational). |

    | Lowest Orca Score To Fetch | String | No | Minimum Orca Score (1-10) to filter
    alerts. |

    | Max Hours Backwards | Integer | No | Lookback period in hours for the initial
    ingestion. |

    | Max Alerts To Fetch | Integer | No | Maximum number of alerts to process per
    iteration. |

    | Use dynamic list as a blacklist | Boolean | Yes | If enabled, uses dynamic lists
    as a blacklist for filtering. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | String | No | Password for proxy authentication. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters, including
    API credentials, filtering criteria, and timeout settings.

    2. It establishes a secure connection to the Orca Security API using the provided
    credentials and SSL settings.

    3. It queries the Orca Security API for alerts, applying filters such as severity,
    category, alert type, and Orca score.

    4. The connector compares the fetched alerts against a local cache of previously
    processed alert IDs to prevent duplicate case creation.

    5. For each new alert, it maps the data to the Google SecOps case format, including
    environment details and event information.

    6. It checks for overflow conditions and processes the alerts, creating cases
    within the SOAR platform.

    7. Finally, it updates the local state with the latest timestamps and processed
    alert IDs to ensure continuity in the next iteration.
