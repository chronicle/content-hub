Orca Security - Alerts Connector:
  ai_description: >-
    ### General Description

    The Orca Security Alerts Connector fetches security findings and alerts from the
    Orca Security platform and ingests them into Google SecOps as cases. It provides
    comprehensive visibility into cloud risks, including vulnerabilities, misconfigurations,
    and compromised assets, by querying Orca's serving layer API. The connector supports
    advanced filtering by severity, Orca score, and categories to ensure only relevant
    security data is ingested.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The source field name used to retrieve the
    Product Field name. |

    | EventClassId | String | Yes | The source field name used to retrieve the Event
    Field name. |

    | API Root | String | Yes | The API root URL of your Orca Security instance (e.g.,
    https://<instance>.orcasecurity.io). |

    | API Key | Password | No | API Key for authentication. If both Key and Token
    are provided, the Token is used. |

    | API Token | Password | No | API Token for authentication. This is the preferred
    authentication method. |

    | Verify SSL | Boolean | Yes | If enabled, verifies the SSL certificate for the
    connection to the Orca Security server. |

    | Category Filter | String | No | A comma-separated list of category names to
    include during ingestion (case-sensitive). |

    | Alert Type Filter | String | No | Specific alert types to fetch (e.g., aws_s3_bucket_accessible_to_unmonitored_account).
    |

    | Lowest Severity To Fetch | String | No | The minimum severity level to ingest
    (Compromised, Imminent compromise, Hazardous, Informational). |

    | Lowest Orca Score To Fetch | String | No | The minimum Orca Score (1-10) required
    for an alert to be ingested. |

    | Max Hours Backwards | Integer | No | The number of hours to look back for alerts
    during the initial run or as a fallback. |

    | Max Alerts To Fetch | Integer | No | The maximum number of alerts to process
    in a single connector iteration (default: 100). |

    | Use dynamic list as a blacklist | Boolean | Yes | If enabled, the SOAR dynamic
    list will be used to exclude alerts based on their title. |


    ### Flow Description

    1. **Authentication**: The connector initializes a session with Orca Security
    using either an API Token (Header-based) or an API Key (Cookie-based via a login
    request).

    2. **Time Management**: It calculates the fetch window by checking the last successful
    execution timestamp or falling back to the 'Max Hours Backwards' setting.

    3. **Query Construction**: An alert query is built using the `AlertQueryBuilder`,
    incorporating user-defined filters for severity, Orca score, categories, and alert
    types.

    4. **Data Retrieval**: The connector sends a POST request to the Orca Serving
    Layer API to retrieve matching alerts.

    5. **Deduplication & Filtering**: It filters out previously ingested alerts using
    a local ID cache and applies dynamic list logic (whitelist or blacklist) against
    the alert titles.

    6. **Case Mapping**: Each valid alert is transformed into a Google SecOps `AlertInfo`
    object. The raw alert data is attached as an event, and environment/product fields
    are mapped based on configuration.

    7. **Ingestion & State Persistence**: The connector ingests the alerts into the
    SOAR platform, updates the last run timestamp, and saves the IDs of processed
    alerts to prevent duplicates in future cycles.
