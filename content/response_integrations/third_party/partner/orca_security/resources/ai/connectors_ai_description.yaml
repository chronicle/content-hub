Orca Security - Alerts Connector:
  ai_description: >-
    ### General Description

    This connector integrates with Orca Security to ingest security alerts into Google
    SecOps. It enables automated monitoring of security findings by fetching alerts
    from the Orca Security platform, allowing users to apply granular filters such
    as severity, category, alert type, and Orca score to ensure only relevant data
    is ingested. The connector supports authentication via API Key or Token and provides
    options for proxy configuration and environment mapping.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Orca Security instance. |

    | API Key | Password | No | API Key for authentication. Used if API Token is not
    provided. |

    | API Token | Password | No | API Token for authentication. Preferred over API
    Key. |

    | DeviceProductField | String | Yes | The source field name used to retrieve the
    Product Field name. |

    | EventClassId | String | Yes | The source field name used to retrieve the Event
    Field name. |

    | Category Filter | String | No | Comma-separated list of category names to filter
    ingested alerts. |

    | Alert Type Filter | String | No | Specific alert types to ingest (e.g., aws_s3_bucket_accessible_to_unmonitored_account).
    |

    | Lowest Severity To Fetch | String | No | Minimum severity level to fetch (Compromised,
    Imminent compromise, Hazardous, Informational). |

    | Lowest Orca Score To Fetch | String | No | Minimum Orca score (1-10) to filter
    alerts. |

    | Max Hours Backwards | Integer | No | Time range in hours to fetch alerts from
    during the initial run or after expiration. |

    | Max Alerts To Fetch | Integer | No | Maximum number of alerts to process per
    connector iteration. |

    | Use dynamic list as a blacklist | Boolean | Yes | If enabled, uses dynamic lists
    as a blacklist for alert titles. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the Orca
    Security server. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit in seconds for the connector
    script execution. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | Password | No | Password for proxy authentication. |


    ### Flow Description

    1. **Authentication**: Connects to the Orca Security API using the provided API
    Key or Token and verifies the connection.

    2. **Querying**: Fetches alerts from the Orca Security API, applying filters for
    severity, score, category, and alert type as configured.

    3. **Deduplication**: Filters out alerts that have already been processed by checking
    against a local state file of alert IDs.

    4. **Mapping**: Maps the retrieved alert data into the standard Google SecOps
    case format, applying environment and product field mappings.

    5. **Ingestion**: Creates cases in Google SecOps for the filtered, new alerts.

    6. **State Management**: Updates the last success timestamp and saves the list
    of processed alert IDs to ensure subsequent runs only fetch new data.
