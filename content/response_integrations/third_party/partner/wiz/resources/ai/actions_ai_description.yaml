  ai_description: >-
    ### General Description

    The Resolve Issue action updates the status of a specified issue in the Wiz platform
    to 'RESOLVED'. This action is used to manage threat detection issues by providing
    a resolution reason and an optional note, allowing analysts to track and close
    out security findings directly from the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Issue ID | string | Yes | The unique identifier of the issue in Wiz. |

    | Resolution Reason | ddl | No | The reason for the resolution of the issue. Defaults
    to 'Not Malicious Threat'. |

    | Resolution Note | string | No | A note that gives additional context about the
    resolution. |


    ### Additional Notes

    This action is a mutation action and does not fetch data. It requires an `Issue
    ID` to identify the target issue in Wiz. The `Resolution Reason` must be one of
    the predefined values: 'Malicious Threat', 'Not Malicious Threat', 'Security Test
    Threat', 'Planned Action Threat', or 'Inconclusive Threat'.


    ### Flow Description

    1. Extract the `Issue ID`, `Resolution Reason`, and `Resolution Note` from the
    action parameters.

    2. Initialize the Wiz API client using the provided integration configuration.

    3. Execute a GraphQL mutation to update the issue status to 'RESOLVED' in Wiz,
    including the provided reason and note.

    4. Return the result of the mutation and output a success message.
