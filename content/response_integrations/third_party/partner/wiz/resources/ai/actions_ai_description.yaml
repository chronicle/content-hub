Ignore Issue:
  ai_description: >-
    ### General Description

    The Ignore Issue action is used to ignore a specified issue in Wiz. It updates
    the issue's status to REJECTED with a specified resolution reason and note. Note:
    This action only works on Graph Control or Cloud Configuration issues.


    ### Flow Description

    1. Extracts the `Issue ID`, `Resolution Reason`, and `Resolution Note` from the
    action parameters.

    2. Validates the `Resolution Reason` against allowed values (False Positive, Exception,
    Won't Fix).

    3. Initializes the Wiz API client.

    4. Executes a GraphQL mutation (`updateIssue`) via the Wiz API to update the issue
    status to `REJECTED` and appends the resolution reason and note.

    5. Returns the updated issue details as a JSON result.


    ### Additional Notes

    This action only works on Graph Control or Cloud Configuration issues.
