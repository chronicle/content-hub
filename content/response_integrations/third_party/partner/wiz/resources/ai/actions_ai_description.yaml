  ai_description: >-
    ### General Description

    Use the Ignore Issue action to ignore a specified issue in Wiz. This action updates
    the status of the issue to 'REJECTED' in the Wiz platform, effectively ignoring
    it based on the provided resolution reason and note.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Issue ID | string | Yes | The unique identifier of the issue in Wiz. |

    | Resolution Reason | ddl | No | The reason for the resolution of the issue. Options:
    False Positive, Exception, Won't Fix. |

    | Resolution Note | string | Yes | A note that gives additional context for the
    issue resolution. |


    ### Additional Notes

    This action only works on Graph Control or Cloud Configuration issues.


    ### Flow Description

    1. Extract the required parameters (Issue ID, Resolution Reason, Resolution Note)
    from the action configuration.

    2. Validate the provided parameters, ensuring the Resolution Reason is one of
    the allowed values.

    3. Initialize the Wiz API client using the integration configuration.

    4. Call the `ignore_issue` method on the API client, which sends a GraphQL mutation
    to update the issue status to 'REJECTED' in Wiz.

    5. Return the result of the operation.
