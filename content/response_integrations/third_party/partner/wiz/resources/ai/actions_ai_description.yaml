    appending relevant resolution context.


    ### Flow Description

    1. Extracts the `Issue ID`, `Resolution Reason`, and `Resolution Note` from the
    action parameters.

    2. Validates the provided `Resolution Reason` against the supported Wiz resolution
    reasons (e.g., Malicious Threat, Not Malicious Threat).

    3. Makes a POST request to the Wiz GraphQL API executing the `UpdateIssue` mutation
    to change the issue's status to `RESOLVED` and apply the resolution reason and
    note.

    4. Returns the updated issue details as a JSON result and outputs a success message
    to the SecOps platform.


    ### Additional Notes

    This action only works on Threat Detection issues within Wiz. Ensure the provided
    Issue ID corresponds to a valid Threat Detection issue.
