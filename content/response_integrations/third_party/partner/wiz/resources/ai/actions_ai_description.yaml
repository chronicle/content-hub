Get Issue Details:
  ai_description: >-
    ### General Description

    The **Get Issue Details** action retrieves comprehensive information about a specific
    security issue from the Wiz platform using its unique identifier. This action
    is primarily used for investigation and gathering context, providing details such
    as the issue's status, severity, description, affected cloud resources (entity
    snapshot), and associated projects or source rules.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the Wiz issue to retrieve
    or act upon. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Issue ID` from the input
    parameters.

    2. **API Initialization**: It initializes the Wiz API client and authenticates
    using the integration's credentials (Client ID and Client Secret).

    3. **Query Construction**: The action constructs a GraphQL query specifically
    designed to fetch detailed fields for the provided Issue ID, including metadata
    like `createdAt`, `status`, `severity`, and `entitySnapshot` (cloud platform,
    region, etc.).

    4. **Data Retrieval**: It executes a POST request to the Wiz GraphQL endpoint
    with the constructed query.

    5. **Result Processing**: The response is parsed into an Issue data model and
    returned as a JSON result for use in subsequent playbook steps.


    ### Additional Notes

    This action does not operate on SecOps entities (like IPs or Hostnames) automatically;
    it requires the manual or dynamic input of a Wiz-specific Issue ID.
