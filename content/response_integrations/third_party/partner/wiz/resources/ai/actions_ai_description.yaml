  ai_description: >-
    ### General Description

    The Ignore Issue action updates the status of a specific issue in the Wiz platform
    to 'REJECTED'. This allows analysts to suppress or ignore issues that are deemed
    false positives, exceptions, or not requiring action. This action is intended
    for use with Graph Control or Cloud Configuration issues.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Issue ID | string | Yes | The unique identifier of the issue in Wiz. |

    | Resolution Reason | ddl | Yes | The reason for the resolution of the issue.
    Options: False Positive, Exception, Won't Fix. Note: While the configuration may
    list this as optional, the action enforces this parameter. |

    | Resolution Note | string | Yes | A note that gives additional context for the
    issue resolution. |


    ### Additional Notes

    This action only works on Graph Control or Cloud Configuration issues. Although
    the configuration may suggest 'Resolution Reason' is optional, the script enforces
    it as a mandatory parameter.


    ### Flow Description

    1. Extract the required parameters (Issue ID, Resolution Reason, Resolution Note)
    from the action configuration.

    2. Validate the provided parameters, ensuring the Resolution Reason is one of
    the allowed values.

    3. Initialize the Wiz API client using the integration configuration.

    4. Call the `ignore_issue` method on the API client, which sends a GraphQL mutation
    to update the issue status to 'REJECTED' in Wiz.

    5. Return the result of the operation.
