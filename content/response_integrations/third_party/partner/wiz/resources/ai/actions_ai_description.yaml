  ai_description: >-
    ### General Description

    The **Reopen Issue** action allows analysts to change the status of a specific
    issue in Wiz back to 'OPEN'. This is typically used when a previously resolved
    or ignored issue is found to be still active or requires further investigation.
    The action communicates with the Wiz GraphQL API to perform a mutation on the
    issue's state.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Issue ID | The unique identifier of the issue in Wiz to be reopened. | String
    | True | This ID is required to target the specific finding in the Wiz platform.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Issue ID` from the input
    parameters.

    2. **API Initialization**: It initializes the Wiz API client using the provided
    integration credentials (API Root, Client ID, Client Secret).

    3. **Mutation Construction**: The action builds a GraphQL mutation payload specifically
    designed to update the `status` field of the issue to `OPEN`.

    4. **Execution**: The mutation is sent to the Wiz `/graphql` endpoint.

    5. **Result Processing**: Upon success, the action retrieves the updated issue
    object from the response and provides it as a JSON result, confirming the status
    change in the output message.


    ### Additional Notes

    - This action performs a state change in the external Wiz environment.

    - If the provided `Issue ID` does not exist, the action will return an error indicating
    the issue was not found.
