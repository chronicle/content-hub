  ai_description: >-
    ### General Description

    The **Get Issue Details** action retrieves comprehensive metadata for a specific
    issue identified by its unique ID in the Wiz platform. This action is designed
    to provide deep context about a finding, including its current status, severity,
    affected cloud resources, and associated projects, which can be used for automated
    decision-making or reporting within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue ID | String | Yes | The unique identifier of the Wiz issue to retrieve.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Issue ID` provided by the
    user.

    2. **API Initialization**: It initializes the Wiz API client using the integration's
    configuration (API Root, Client ID, Client Secret).

    3. **Data Retrieval**: A GraphQL query is constructed and sent to the Wiz `/graphql`
    endpoint to fetch specific fields including `status`, `severity`, `description`,
    `entitySnapshot` (cloud platform, region, etc.), and `projects`.

    4. **Result Processing**: The retrieved data is parsed into a structured format
    and returned as a JSON result for use in subsequent playbook steps.


    ### Additional Notes

    - This action is a read-only operation and does not modify any data in the Wiz
    platform.

    - If the provided `Issue ID` is invalid or does not exist, the action will raise
    an `IssueNotFoundError`.
