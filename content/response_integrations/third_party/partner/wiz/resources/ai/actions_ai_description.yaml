Ping:
  ai_description: >-
    The Ping action is used to verify the connectivity between Google SecOps and the
    Wiz platform. It ensures that the provided integration parameters (API Root, Client
    ID, and Client Secret) are correct and that the service is reachable.


    ### Flow Description:

    1. **Initialization**: The action initializes the Wiz API client using the provided
    configuration parameters, including the API Root and SSL verification settings.

    2. **Authentication**: It authenticates with the Wiz OAuth2 service using the
    Client ID and Client Secret to obtain a bearer token.

    3. **Connectivity Test**: It executes a minimal GraphQL query to the Wiz `/graphql`
    endpoint, attempting to retrieve the ID of a single issue to confirm API access.

    4. **Validation**: The action validates the HTTP response and GraphQL errors.
    If successful, it returns a confirmation message.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. It relies
    solely on the integration's global configuration. |


    ### Additional Notes:

    - This action is primarily used for troubleshooting and initial setup verification.

    - It does not process any entities or modify any data within Wiz or Google SecOps.
