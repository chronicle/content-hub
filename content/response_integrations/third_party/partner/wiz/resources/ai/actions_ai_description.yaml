  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Wiz platform. It ensures that the provided integration parameters
    (API Root, Client ID, and Client Secret) are correct and that the network path
    to the Wiz API is open.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Authentication**: The action first attempts to authenticate with the Wiz
    OAuth service using the configured Client ID and Client Secret to obtain a bearer
    token.

    2. **API Request**: Once authenticated, it executes a minimal GraphQL query (`query
    { issues(first: 1) { nodes { id } } }`) against the Wiz API endpoint.

    3. **Validation**: The action validates the HTTP response status and the GraphQL
    response body. If the request is successful and no errors are returned, the connection
    is confirmed.

    4. **Outcome**: If successful, a success message is returned; otherwise, an error
    message detailing the failure (e.g., invalid credentials or connection timeout)
    is provided.


    ### Additional Notes

    This action is strictly for connectivity testing and does not process any entities
    or modify any data within Wiz or Google SecOps.
