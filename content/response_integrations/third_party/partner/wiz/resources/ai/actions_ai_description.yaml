Add Comment To Issue:
  ai_description: >-
    Adds a comment (note) to a specific issue in the Wiz platform. This action allows
    analysts to document findings, provide updates, or record automated responses
    directly within the Wiz issue's timeline. It utilizes the Wiz GraphQL API to perform
    a `createIssueNote` mutation, ensuring that the communication is synchronized
    between Google SecOps and the Wiz security posture management console.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory `Issue ID` and
    `Comment` text from the user input.

    2. **API Initialization:** Authenticates with the Wiz platform using OAuth2 client
    credentials to obtain a bearer token.

    3. **Mutation Execution:** Constructs and sends a GraphQL mutation (`createIssueNote`)
    to the Wiz endpoint, targeting the specified issue with the provided comment text.

    4. **Result Processing:** Captures the response from Wiz, which includes the new
    comment's ID and creation timestamp, and returns it as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue ID | String | True | The unique identifier of the issue in Wiz where the
    comment will be added. |

    | Comment | String | True | The actual text content of the comment to be appended
    to the issue. |


    ### Additional Notes

    - This action does not operate on SecOps entities; it requires a direct Issue
    ID, which is typically obtained from a previous 'Get Issue Details' action or
    an alert's external ID field.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment/note to an existing issue in the Wiz platform via a GraphQL
      mutation, changing the state of the issue's activity log.
    fetches_data: true
    internal_data_mutation_explanation: null
