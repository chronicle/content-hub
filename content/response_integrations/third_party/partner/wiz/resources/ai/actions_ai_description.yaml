Reopen Issue:
  ai_description: >-
    ### General Description

    The **Reopen Issue** action allows users to change the status of a specific issue
    in Wiz back to 'OPEN'. This is typically used when an issue was previously resolved
    or ignored but requires further investigation or remediation. The action interacts
    with the Wiz GraphQL API to perform a status update mutation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the issue in Wiz that
    you want to reopen. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory `Issue ID` from
    the input parameters.

    2. **API Initialization**: It initializes the Wiz API client using the integration's
    configuration (API Root, Client ID, Client Secret).

    3. **Mutation Execution**: The action constructs and sends a GraphQL mutation
    to the Wiz API, specifically targeting the `updateIssue` endpoint to set the issue's
    status to 'OPEN'.

    4. **Result Processing**: Upon success, the action retrieves the updated issue
    object from the response and provides it as a JSON result for downstream use in
    the playbook.


    ### Additional Notes

    - This action requires valid API credentials with permissions to modify issue
    statuses in Wiz.

    - If the provided `Issue ID` does not exist, the action will return an error indicating
    the issue was not found.
