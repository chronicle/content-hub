Resolve Issue:
  ai_description: >-
    The **Resolve Issue** action allows users to programmatically resolve a specific
    issue within the Wiz platform. This action is specifically intended for use with
    **Threat Detection** issues. It updates the issue's status to 'RESOLVED' and allows
    the user to provide a specific resolution reason and an optional explanatory note.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory `Issue ID` and
    optional `Resolution Reason` and `Resolution Note` from the input parameters.

    2. **Validation:** It validates that the provided `Resolution Reason` is one of
    the allowed values defined in the Wiz integration constants.

    3. **API Interaction:** The action constructs a GraphQL mutation using the `UpdateIssueMutationBuilder`.
    This mutation targets the specified `Issue ID` and applies a patch to change the
    status to `RESOLVED` and attach the resolution metadata.

    4. **Result Processing:** Upon a successful API call, the action parses the returned
    JSON (representing the updated state of the issue) and provides a success message
    to the user.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the issue in Wiz that
    needs to be resolved. |

    | **Resolution Reason** | DDL | No | The reason for resolving the issue. Defaults
    to 'Not Malicious Threat'. Options include: Malicious Threat, Not Malicious Threat,
    Security Test Threat, Planned Action Threat, Inconclusive Threat. |

    | **Resolution Note** | String | No | An optional text note providing additional
    context or justification for the resolution. |


    ### Additional Notes

    - This action performs a state change in the external Wiz system.

    - If the specified `Issue ID` does not exist, the action will return an error
    indicating the issue was not found.
