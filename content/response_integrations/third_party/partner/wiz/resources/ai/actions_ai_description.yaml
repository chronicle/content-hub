Reopen Issue:
  ai_description: >-
    ### General Description

    The **Reopen Issue** action allows users to change the status of a specific security
    issue in Wiz back to **OPEN**. This is typically used when a previously resolved
    or ignored issue is found to be still relevant or requires further investigation.
    The action interacts with the Wiz GraphQL API to perform a state change on the
    specified issue.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | The unique identifier of the issue in Wiz to be reopened. | String
    | Yes |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Issue ID` provided by the
    user from the action parameters.

    2. **API Initialization**: Establishes an authenticated connection to the Wiz
    API using the configured API Root, Client ID, and Client Secret.

    3. **Mutation Construction**: Builds a GraphQL mutation targeting the `updateIssue`
    endpoint. It creates a patch object that specifically sets the issue's status
    to `OPEN`.

    4. **Execution**: Sends the GraphQL mutation request to the Wiz `/graphql` endpoint.

    5. **Result Processing**: Captures the updated issue data from the API response,
    converts it into a structured JSON format, and returns a success message indicating
    the issue has been reopened.
