Ignore Issue:
  ai_description: >-
    ### General Description

    The **Ignore Issue** action allows users to ignore a specific issue within the
    Wiz platform. This is typically used for issues identified as false positives,
    exceptions, or those that will not be fixed. Note that this action is specifically
    compatible with **Graph Control** or **Cloud Configuration** issues.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the issue in Wiz to be
    ignored. |

    | **Resolution Reason** | DDL | No | The reason for ignoring the issue. Options
    include: `False Positive`, `Exception`, `Won't Fix`. Defaults to `False Positive`.
    |

    | **Resolution Note** | String | Yes | A mandatory note providing additional context
    or justification for ignoring the issue. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Issue ID, Resolution Reason,
    and Resolution Note from the input parameters.

    2. **Validation**: It validates that the provided Resolution Reason matches the
    allowed values (False Positive, Exception, Won't Fix) defined in the integration
    constants.

    3. **API Interaction**: It executes a GraphQL mutation against the Wiz API to
    update the status of the specified issue to `REJECTED`, applying the selected
    resolution reason and the provided note.

    4. **Result Processing**: Upon a successful API response, the action returns the
    updated issue details as a JSON result and outputs a success message to the case
    wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
