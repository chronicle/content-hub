  ai_description: >-
    ### General Description

    The **Add Comment To Issue** action allows users to append a text comment or note
    to a specific security issue within the Wiz platform. This action is primarily
    used to document investigation progress, provide updates, or synchronize analyst
    notes between Google SecOps and Wiz.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the issue in Wiz to which
    the comment will be added. |

    | **Comment** | String | Yes | The text content of the comment to be added to
    the issue. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Issue ID` and the `Comment`
    text from the user-provided parameters.

    2. **API Client Initialization**: It initializes the Wiz API client using the
    integration's configuration (API Root, Client ID, and Client Secret).

    3. **Mutation Execution**: The action constructs a GraphQL mutation (`createIssueNote`)
    and sends a POST request to the Wiz `/graphql` endpoint to create the comment
    thread.

    4. **Result Processing**: Upon a successful response, the action parses the returned
    JSON to extract the details of the newly created comment (ID, timestamp, and text)
    and provides a success message.


    ### Additional Notes

    - This action performs a state-changing mutation in the external Wiz system.

    - If the specified `Issue ID` is invalid or not found, the action will raise an
    `IssueNotFoundError`.
