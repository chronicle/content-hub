  ai_description: >-
    ### General Description

    Ignores a specified issue in Wiz by updating its status to 'REJECTED'. This action
    is specifically designed to work on Graph Control or Cloud Configuration issues
    within Wiz.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Issue ID | String | Yes | The unique identifier of the issue in Wiz. |

    | Resolution Reason | Drop-down | No | The reason for the resolution of the issue.
    Default is 'False Positive'. Available options are 'False Positive', 'Exception',
    and 'Won't Fix'. |

    | Resolution Note | String | Yes | A note that gives additional context for the
    issue resolution. |


    ### Flow Description

    1. Extracts the `Issue ID`, `Resolution Reason`, and `Resolution Note` from the
    action parameters.

    2. Validates the `Resolution Reason` against the allowed values.

    3. Calls the Wiz GraphQL API to execute an `updateIssue` mutation, setting the
    issue status to 'REJECTED' and appending the resolution reason and note.

    4. Returns a success message and the updated issue details as JSON.
