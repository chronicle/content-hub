  ai_description: >-
    Resolves a specified issue in Wiz. This action is specifically designed to work
    with Threat Detection issues by updating their status to 'RESOLVED' in the Wiz
    platform. It allows analysts to provide a resolution reason and an optional note
    to document the closure of the finding.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory `Issue ID` and
    optional `Resolution Reason` and `Resolution Note` from the input parameters.

    2. **Validation:** It validates that the provided `Resolution Reason` matches
    one of the predefined allowed values in Wiz.

    3. **API Interaction:** The action constructs a GraphQL mutation to update the
    issue's status to 'RESOLVED' and includes the resolution metadata.

    4. **Result Processing:** Upon a successful API call, the action returns the updated
    issue object as a JSON result and provides a success message.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue ID | string | Yes | The unique identifier of the issue in Wiz that needs
    to be resolved. |

    | Resolution Reason | ddl | No | The reason for the resolution. Expected values
    include: 'Malicious Threat', 'Not Malicious Threat', 'Security Test Threat', 'Planned
    Action Threat', or 'Inconclusive Threat'. Defaults to 'Not Malicious Threat'.
    |

    | Resolution Note | string | No | An optional note providing additional context
    or details regarding the resolution of the issue. |


    ### Additional Notes

    - This action only supports resolving issues categorized as 'Threat Detection'
    in Wiz.

    - If the specified `Issue ID` is not found, the action will return an error.
