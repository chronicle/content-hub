  ai_description: >-
    ### General Description

    The **List Resource Vulnerability Findings** action retrieves a list of vulnerability
    findings associated with specific resources from the Wiz platform. This action
    allows users to query vulnerability data based on various filters such as severity,
    fix availability, public exploit status, and specific CVE IDs, providing visibility
    into the security posture of cloud resources.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the provided resource names and
    optional filter parameters (Severity, Related Issue Severity, Has Fix, Has Public
    Exploit, CVE IDs, Max Findings).

    2. **API Initialization**: It initializes the Wiz API client using the configured
    integration credentials.

    3. **Data Retrieval**: The action iterates through the provided list of resource
    names and performs a GraphQL query to the Wiz API to fetch vulnerability findings
    for each resource, applying the specified filters.

    4. **Result Aggregation**: The findings are aggregated into a JSON structure,
    and the action returns a success message with the findings or a notification if
    no vulnerabilities were found.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Resource Name** | String | Yes | A comma-separated list of resource names
    to retrieve findings for. |

    | **Severity** | String | No | The technical severity levels of the vulnerability
    findings to return (e.g., All, Critical, High, Medium, Low). |

    | **Related Issue Severity** | String | No | The severity levels of the Wiz Issues
    associated with the vulnerability findings to return. |

    | **Has Fix** | String | No | Filter findings based on whether a fix or patch
    is available (Yes/No/Select One). |

    | **Has Public Exploit** | String | No | Filter findings based on whether a known
    public exploit exists (Yes/No/Select One). |

    | **CVE IDs** | String | No | A comma-separated list of CVE IDs used to filter
    the vulnerability findings. |

    | **Max Findings To Return** | String | No | The maximum number of vulnerability
    findings to return for each resource (Default: 100, Max: 500). |


    ### Additional Notes

    - This action does not modify any data in Wiz or the SOAR platform; it is a read-only
    operation designed for data retrieval and enrichment.
