  ai_description: >-
    ### General Description

    The **Ignore Issue** action allows security analysts to dismiss or ignore specific
    security issues within the Wiz platform. This action is primarily intended for
    managing Graph Control or Cloud Configuration issues that are identified as false
    positives or exceptions. By executing this action, the status of the specified
    issue in Wiz is updated to 'REJECTED', and the provided resolution reason and
    mandatory context note are attached to the record for auditability.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue ID | String | Yes | The unique identifier of the issue in Wiz that needs
    to be ignored. |

    | Resolution Reason | DDL | No | The reason for ignoring the issue. Supported
    values include: 'False Positive', 'Exception', and 'Won't Fix'. If not provided,
    it defaults to 'False Positive'. |

    | Resolution Note | String | Yes | A mandatory note providing additional context
    or justification for why the issue is being ignored. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Issue ID`, `Resolution
    Reason`, and `Resolution Note` from the user input.

    2. **Validation:** It validates the `Resolution Reason` against the allowed values
    defined in the integration constants.

    3. **API Client Initialization:** The action initializes an authenticated Wiz
    API client using the integration's global configuration (API Root, Client ID,
    and Client Secret).

    4. **External Mutation:** The action constructs and sends a GraphQL mutation to
    the Wiz API to update the issue's status to 'REJECTED' and apply the specified
    resolution metadata.

    5. **Result Processing:** The action captures the updated issue details from the
    API response, populates the JSON results, and returns a success message to the
    SOAR platform.


    ### Additional Notes

    - This action only supports Graph Control or Cloud Configuration issues in Wiz.

    - While the 'Resolution Reason' is optional in the UI, the underlying logic ensures
    a default value is applied if the field is left empty.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
