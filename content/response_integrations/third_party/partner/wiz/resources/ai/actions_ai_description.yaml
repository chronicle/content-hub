Add Comment To Issue:
  ai_description: >-
    ### General Description

    Adds a comment to a specified issue in Wiz. This action initiates a state change
    on the external Wiz platform by appending the provided text as a note to the target
    issue's timeline.


    ### Flow Description

    1. Extracts the `Issue ID` and `Comment` parameters from the action configuration.

    2. Initializes the Wiz API client using the provided integration credentials.

    3. Executes a GraphQL mutation (`createIssueNote`) via a POST request to the Wiz
    API to append the comment to the specified issue.

    4. Returns the JSON result containing the created comment details and an output
    message confirming the successful execution.


    ### Additional Notes

    Ensure the provided Issue ID is valid and accessible by the configured Wiz API
    credentials. If the issue is not found, the action will raise an `IssueNotFoundError`.
  ai_short_description: >-
    Adds a comment to a specified issue in the Wiz platform via a GraphQL mutation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specified issue in the external Wiz platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request (GraphQL mutation) to the Wiz API to add
      a comment to an issue. This mutates external data. It does not fetch contextual
      data for enrichment, nor does it update internal entities, alerts, or insights.
