Resolve Issue:
  ai_description: >-
    ### General Description

    The **Resolve Issue** action allows users to programmatically resolve a specific
    issue within the Wiz platform. This action is specifically designed for managing
    **Threat Detection** issues. By providing the unique identifier of an issue, users
    can transition its status to 'RESOLVED' while documenting the reason and providing
    additional context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier of the issue in Wiz that
    needs to be resolved. |

    | **Resolution Reason** | DDL | No | The reason for resolving the issue. Supported
    values include: `Malicious Threat`, `Not Malicious Threat`, `Security Test Threat`,
    `Planned Action Threat`, and `Inconclusive Threat`. Defaults to `Not Malicious
    Threat`. |

    | **Resolution Note** | String | No | An optional note providing further context
    or details regarding the resolution of the issue. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Issue ID`, `Resolution
    Reason`, and `Resolution Note` from the user input.

    2. **Validation:** It validates that the provided `Resolution Reason` matches
    one of the supported values defined in the Wiz integration constants.

    3. **API Interaction:** The action constructs and sends a GraphQL mutation to
    the Wiz API. This mutation updates the issue's status to `RESOLVED` and attaches
    the specified reason and note.

    4. **Result Handling:** Upon success, the action returns the updated issue object
    as JSON and provides a success message. If the issue is not found, it raises an
    `IssueNotFoundError`.


    ### Additional Notes

    - This action performs a state change in the external Wiz system by updating the
    issue status.

    - This action does not operate on SecOps entities (like IPs or Hostnames) but
    rather on a specific Wiz Issue ID provided as a string parameter.
  capabilities:
    can_create_case_comments: false
