Ignore Issue:
  ai_description: >-
    ### General Description

    The **Ignore Issue** action allows analysts to dismiss or ignore specific security
    findings within the Wiz platform. It is specifically designed to handle **Graph
    Control** or **Cloud Configuration** issues. By executing this action, the status
    of the identified issue in Wiz is transitioned to 'REJECTED', effectively removing
    it from the active queue based on the provided justification.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue ID** | String | Yes | The unique identifier (ID) of the issue in Wiz
    that you want to ignore. |

    | **Resolution Reason** | DDL | No | The reason for ignoring the issue. Available
    options are: `False Positive`, `Exception`, or `Won't Fix`. Defaults to `False
    Positive`. |

    | **Resolution Note** | String | Yes | A mandatory text field to provide additional
    context or justification for why this issue is being ignored. |


    ### Additional Notes

    *   **Scope:** This action is restricted to Graph Control and Cloud Configuration
    issues within Wiz.

    *   **State Change:** This is a mutation action that changes the state of data
    in the external Wiz environment.

    *   **Discrepancy Note:** While the `Resolution Reason` is marked as non-mandatory
    in the configuration, the underlying logic applies a default value of 'False Positive'
    if not provided.


    ### Flow Description

    1.  **Parameter Extraction:** The action retrieves the `Issue ID`, `Resolution
    Reason`, and `Resolution Note` from the user input.

    2.  **Validation:** It validates that the `Resolution Reason` matches the allowed
    values defined in the Wiz integration constants.

    3.  **API Initialization:** An authenticated GraphQL API client is initialized
    to communicate with the Wiz instance.

    4.  **Mutation Execution:** The action sends a GraphQL mutation request to Wiz
    to update the specified issue's status to `REJECTED`, attaching the chosen reason
    and the provided note.

    5.  **Result Processing:** Upon success, the action retrieves the updated issue
    details from the API response, populates the JSON results, and confirms the successful
    update in the output message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a specified issue in the Wiz platform to 'REJECTED' and
      applies a resolution reason and note.
    fetches_data: true
    internal_data_mutation_explanation: null
