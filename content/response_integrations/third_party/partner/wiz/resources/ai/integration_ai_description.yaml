product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The Wiz integration is a cloud security platform that provides visibility and
    management of cloud environments. Based on the provided actions, the integration
    allows for the retrieval of issue details ('Get Issue Details') and the management
    of issue lifecycles ('Add Comment To Issue', 'Resolve Issue', 'Ignore Issue',
    'Reopen Issue'). These capabilities align with Cloud Security (managing cloud-native
    findings), Vulnerability Management (Wiz is a vulnerability management platform),
    and ITSM (the actions function as ticket management for security issues). Additionally,
    as a comprehensive cloud security platform, Wiz inherently provides Asset Inventory
    capabilities for cloud resources. The integration does not perform SIEM, EDR,
    Network Security, Threat Intelligence, Email Security, IAM, or Collaboration functions
    based on the provided action set.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
