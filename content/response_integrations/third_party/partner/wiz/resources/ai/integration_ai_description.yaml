product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Wiz integration is a Cloud Security platform (CNAPP) that provides visibility
    into cloud environments. It qualifies for the 'Cloud Security' category as it
    manages cloud-native resources, findings, and configurations. It qualifies for
    'Vulnerability Management' because it identifies and tracks vulnerabilities and
    misconfigurations across cloud assets. It qualifies for 'Asset Inventory' as it
    provides detailed information about cloud assets, including ownership and criticality.
    It does not qualify for 'ITSM' as the 'Issues' managed are security findings rather
    than general IT tickets, nor does it fit 'SIEM', 'EDR', 'Network Security', 'Threat
    Intelligence', 'Email Security', 'IAM', or 'Collaboration' categories based on
    the provided actions.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
