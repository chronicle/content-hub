Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and the Darktrace server. It validates the integration's configuration
    by attempting to authenticate and communicate with the Darktrace API status endpoint.
    This action is essential for ensuring that the API Root, API Token, and API Private
    Token are correctly configured and that the network environment allows communication
    with the Darktrace instance.


    ### Parameters Description

    This action does not have any action-specific parameters. It utilizes the global
    configuration parameters defined at the integration level:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Darktrace API instance. |

    | API Token | String | Yes | The public API token used for authentication. |

    | API Private Token | String | Yes | The private API token used for HMAC signature
    generation. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Darktrace server. |


    ### Flow Description

    1. **Initialization:** The action initializes the Siemplify context and extracts
    the global integration configuration parameters (API Root, Tokens, and SSL settings).

    2. **Manager Setup:** It instantiates the `DarktraceManager` which handles the
    logic for request signing and API communication.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    sends a signed GET request to the `/status` endpoint of the Darktrace API.

    4. **Response Validation:** The manager validates the HTTP response. If the request
    is successful (HTTP 200) and contains no application-level errors, the action
    returns a success status.

    5. **Completion:** The action reports the connection status back to the SOAR platform,
    providing an error message if the connection fails.


    ### Additional Notes

    - This action does not process any entities.

    - As a 'Ping' action, it is excluded from being categorized as an enrichment action
    regardless of its data-fetching behavior.
