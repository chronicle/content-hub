      The action proactively fetches data from an external source (Darktrace) to gather
      supplemental context about entities. It does not mutate external state and only
      performs allowed internal mutations (updating entities and creating insights).
      Therefore, it is an Enrichment action. It does not perform any remediation tasks.
    remediation: false
