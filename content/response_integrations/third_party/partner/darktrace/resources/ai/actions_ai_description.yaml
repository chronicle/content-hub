  ai_description: >-
    Tests the connectivity between Google SecOps and the Darktrace server using the
    provided integration configuration parameters. This action is primarily used to
    verify that the API Root, API Token, and API Private Token are correct and that
    the network path to the Darktrace instance is open.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the integration's global configuration
    parameters, including the API Root, API Token, API Private Token, and SSL verification
    settings.

    2. **Manager Initialization:** Initializes the Darktrace API manager with the
    extracted credentials and settings.

    3. **Connectivity Test:** Executes a GET request to the Darktrace `/status` endpoint
    to verify the validity of the credentials and the reachability of the server.

    4. **Result Reporting:** Returns a success message if the server responds correctly,
    or an error message detailing the failure if the connection cannot be established.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Darktrace API instance. |

    | API Token | String | Yes | The public API token for authentication. |

    | API Private Token | String | Yes | The private API token used for generating
    request signatures. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Darktrace server. Defaults to True. |


    ### Additional Notes:

    * This action does not require any input entities and does not modify any data
    within Darktrace or Google SecOps.

    * It is intended for troubleshooting and initial setup verification.
