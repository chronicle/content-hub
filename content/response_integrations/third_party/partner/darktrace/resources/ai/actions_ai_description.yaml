Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, MAC Address, and URL entities using Darktrace.
    The action retrieves device and endpoint details, and optionally fetches connection
    data related to internal endpoints. It can also generate an insight containing
    the endpoint information.


    ### Flow Description

    1. Iterates over supported entities (IP, Hostname, MAC Address, URL).

    2. For IP entities, fetches device details or endpoint details from the Darktrace
    API.

    3. For Hostname entities, searches for devices by hostname and fetches device
    details using the associated MAC or IP.

    4. For MAC Address entities, fetches device details by MAC address.

    5. For URL entities, extracts the domain and fetches endpoint details.

    6. If `Fetch Connection Data` is enabled, retrieves connection data for the device
    over the specified `Max Hours Backwards`.

    7. Enriches the entity with the retrieved data and adds data tables for interacted
    devices and connection data.

    8. If `Create Endpoint Insight` is enabled, generates an insight for the entity.

    9. Updates the entities in the SecOps platform.


    ### Additional Notes

    The action extracts the domain part out of URL entities before querying Darktrace.
  ai_short_description: >-
    Enriches IP Address, Hostname, MAC Address, and URL entities by retrieving device,
    endpoint, and connection details from Darktrace.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Darktrace API to fetch device, endpoint,
