Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query in Darktrace to retrieve historical events or telemetry
    data based on specified timeframes and limits.


    ### Flow Description

    1. Extracts the search query, timeframe, start time, end time, and result limit
    from the action parameters.

    2. Calculates the exact start and end timestamps based on the provided timeframe,
    optionally using the current alert's start and end times.

    3. Authenticates with the Darktrace API and sends a GET request to the advanced
    search endpoint with the base64 encoded query parameters.

    4. Retrieves the search results and adds them to the action's JSON result.


    ### Additional Notes

    The action does not operate on specific entities but rather performs a global
    search within the Darktrace environment.
