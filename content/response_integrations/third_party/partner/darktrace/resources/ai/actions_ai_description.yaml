  ai_description: >-
    Lists similar devices to the provided endpoint entities in Darktrace.


    ### General Description

    This action queries Darktrace to find devices that are similar to the provided
    endpoint entities (IP, Hostname, or Mac Address). It first locates the specific
    device in Darktrace using the entity's identifier, and then retrieves a list of
    similar devices based on Darktrace's analysis, returning the results as JSON and
    an entity-specific table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Max Devices To Return | Integer | No | Specifies the maximum number of similar
    devices to return per entity. The default value is 50. |


    ### Flow Description

    1. The action iterates over the target entities that match the supported types
    (ADDRESS, HOSTNAME, MacAddress).

    2. For each entity, it queries the Darktrace API to find the corresponding device
    using its identifier.

    3. If the device is found, it fetches a list of similar devices up to the limit
    specified in the `Max Devices To Return` parameter.

    4. The action aggregates the findings, attaching an entity table with the similar
    devices' details and returning the raw data in the JSON result.
