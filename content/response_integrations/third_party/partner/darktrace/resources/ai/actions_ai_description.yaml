  ai_description: >-
    Updates the status of a specific model breach in Darktrace to either 'Acknowledged'
    or 'Unacknowledged'. This action allows analysts to manage the lifecycle of Darktrace
    detections directly from the SOAR platform.


    ### Flow Description

    1. **Fetch Current Status**: The action first retrieves the current state of the
    specified model breach from Darktrace to verify its existence and current acknowledgment
    status.

    2. **Status Comparison**: It compares the requested status with the current status.
    If the breach is already in the desired state, the action completes successfully
    without making further API calls.

    3. **Update Execution**: If a change is required, the action sends a POST request
    to the Darktrace API to either acknowledge or unacknowledge the breach based on
    the input parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Status | DDL | Yes | The target status to set for the model breach. Options
    are 'Acknowledged' or 'Unacknowledged'. |

    | Model Breach ID | String | Yes | The unique identifier of the model breach in
    Darktrace that needs to be updated. |


    ### Additional Notes

    - This action performs a state change in the external Darktrace system.

    - If the provided Model Breach ID is not found in Darktrace, the action will fail
    with a 'Not Found' error.
