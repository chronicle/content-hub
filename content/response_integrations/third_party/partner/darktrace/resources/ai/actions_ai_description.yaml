    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

    | Max Results To Return | String | No | Specify how many results to return. Default:
    50. |
List Endpoint Events:
  ai_description: >-
    ### General Description

    Retrieves the latest events related to specific endpoint entities (IP Address,
    Hostname, MAC Address) from Darktrace.


    ### Flow Description

    1. Extracts action parameters including Event Type, Time Frame, and Max Events
    To Return.

    2. Iterates over the target entities that match the supported types (ADDRESS,
    HOSTNAME, MACADDRESS).

    3. For each entity, queries Darktrace to find the associated device ID using `get_devices`
    or `search_devices_by_hostname` API endpoints.

    4. If a device is found, fetches the specified events for that device using the
    `get_events_for_endpoint` API endpoint within the given time frame.

    5. Aggregates the retrieved events and attaches them to the action result as JSON
    and data tables.


    ### Additional Notes

    Events are returned in the UTC timezone.
