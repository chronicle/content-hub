Enrich Entities:
  ai_description: >-
    Enriches IP Address, Hostname, MacAddress, and URL entities using network visibility
    and threat intelligence data from Darktrace. This action identifies devices and
    endpoints within the Darktrace environment to provide contextual metadata such
    as OS versions, device labels, and location information.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fetch Connection Data | Boolean | No | If enabled, the action retrieves additional
    information about network connections related to internal endpoints. |

    | Max Hours Backwards | String | No | Specifies the lookback window (in hours)
    for fetching connection data. Defaults to 24 hours. |

    | Create Endpoint Insight | Boolean | No | If enabled, the action generates a
    detailed insight on the entity containing Darktrace endpoint information. |


    ### Additional Notes

    - For URL entities, the action automatically extracts the domain or network path
    to perform the lookup.

    - If 'Max Hours Backwards' is set to a value less than 1, the default value of
    24 will be used.


    ### Flow Description

    1. **Filter Entities:** The action identifies supported entities (IP, Hostname,
    MAC, URL) from the current context.

    2. **Query Darktrace:** For each entity, it queries the Darktrace API to find
    matching device records or endpoint details.

    3. **Fetch Connections (Optional):** If 'Fetch Connection Data' is enabled, it
    retrieves historical connection logs for the identified device based on the specified
    timeframe.

    4. **Enrichment:** The action populates the entity's additional properties with
    metadata (e.g., OS, Vendor, ASN, Location) and marks the entity as enriched.

    5. **Internal Updates:** It creates data tables for connection and device interaction
    data and, if configured, generates an entity insight for the analyst.
