  ai_description: >-
    Executes a custom search query in Darktrace to retrieve specific event or telemetry
    data. This action allows analysts to perform advanced hunting or data retrieval
    by providing a raw Darktrace query and defining a specific time window. The results
    are returned as a JSON object containing the hits found in the Darktrace environment.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and user-provided
    parameters, including the search query, timeframe, and result limit.

    2. **Timeframe Calculation**: It determines the start and end timestamps for the
    search. This can be based on predefined relative ranges (e.g., 'Last Hour'), times
    relative to the current alert (e.g., '5 Minutes Around Alert Time'), or a specific
    custom ISO 8601 range.

    3. **Request Preparation**: The search query and timeframe parameters are bundled
    into a JSON payload, which is then Base64 encoded to meet the requirements of
    the Darktrace Advanced Search API.

    4. **API Execution**: A GET request is sent to the Darktrace `advanced_search`
    endpoint using the encoded query.

    5. **Result Processing**: The action parses the API response, converts the hits
    into a structured format, and attaches them to the action results in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | Yes | The specific Darktrace query string to be executed. |

    | Time Frame | ddl | No | Predefined time ranges for the search. Options include
    'Last Hour', 'Last 24 Hours', 'Alert Time Till Now', '30 Minutes Around Alert
    Time', etc. Defaults to 'Last Hour'. |

    | Start Time | string | No | The start time for the search in ISO 8601 format.
    Mandatory only if 'Time Frame' is set to 'Custom'. |

    | End Time | string | No | The end time for the search in ISO 8601 format. If
    'Custom' is selected and this is empty, the current time is used. |

    | Max Results To Return | string | No | Limits the number of search results returned.
    Defaults to 50. |


    ### Additional Notes

    - If 'Custom' is selected for the 'Time Frame', the 'Start Time' parameter must
    be provided, otherwise the action will fail.

    - The action uses the alert's internal start and end times when relative alert-based
    timeframes are selected.
