Add Comment To Model Breach:
  ai_description: >-
    Adds a comment to a specific model breach in Darktrace. This action allows analysts
    to append notes, documentation, or context to an existing Darktrace alert (model
    breach) directly from Google SecOps. It requires the unique identifier of the
    model breach and the text of the comment to be submitted.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the 'Model Breach ID' and the
    'Comment' text from the user input.

    2. **Manager Initialization:** It initializes the Darktrace Manager using the
    provided API credentials (API Root, Token, Private Token) and SSL settings.

    3. **API Interaction:** The action sends a POST request to the Darktrace API endpoint
    `/modelbreaches/{model_breach_id}/comments` with the comment message in the payload.

    4. **Result Handling:** It captures the response from Darktrace. If the breach
    ID is not found, it returns a failure; otherwise, it completes the execution and
    logs the result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Model Breach ID | string | True | The unique identifier of the model breach
    in Darktrace that you want to comment on. |

    | Comment | string | True | The actual text content of the comment to be added
    to the breach record. |


    ### Additional Notes

    - This action performs a state change in the external Darktrace system by adding
    data to its records.
