  ai_description: >-
    Retrieves historical event logs for specific endpoint entities (IP, Hostname,
    or MacAddress) from Darktrace. This action allows analysts to query various event
    types such as connections, unusual connections, and model breaches within a defined
    timeframe. The retrieved data is presented as formatted data tables on the case
    wall and as a raw JSON result for further automation.


    ### Flow Description

    1. **Parameter Validation:** The action validates the provided event types and
    ensures the 'Max Events To Return' is a positive integer. It also calculates the
    start and end timestamps based on the 'Time Frame' selection.

    2. **Device Identification:** For each supported entity, the action queries Darktrace
    to find the corresponding internal Device ID (`did`).

    3. **Event Retrieval:** If a device is found, the action iterates through the
    requested event types and fetches the latest events for that specific device within
    the timeframe.

    4. **Data Presentation:** Successfully retrieved events are converted into CSV-formatted
    data tables and attached to the case. A comprehensive JSON object containing all
    events is also returned.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event Type | String | Yes | A comma-separated list of event types to retrieve
    (e.g., connection, unusualconnection, notice, devicehistory, modelbreach). |

    | Time Frame | DDL | Yes | The time range for the search (e.g., Last Hour, Last
    24 Hours). If 'Custom' is selected, 'Start Time' must be provided. |

    | Start Time | String | No | The start time for the search in ISO 8601 format.
    Mandatory only if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time for the search in ISO 8601 format. Defaults
    to the current time if left empty. |

    | Max Events To Return | String | No | The maximum number of events to return
    per event type. Defaults to 50. |


    ### Additional Notes

    - Events are returned in the UTC timezone.

    - If 'Custom' is selected for 'Time Frame', the 'Start Time' parameter becomes
    effectively mandatory for the action to succeed.
