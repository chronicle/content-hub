List Endpoint Events:
  ai_description: "### General Description\nLists the latest security and network\
    \ events associated with specific endpoints in Darktrace. This action enables\
    \ analysts to retrieve detailed logs for various event categories\u2014including\
    \ connections, unusual activities, and model breaches\u2014across a specified\
    \ time range. By supporting IP Address, Hostname, and MacAddress entities, it\
    \ provides a comprehensive view of endpoint activity, outputting data in both\
    \ structured tables and JSON for analysis.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Event Type\
    \ | String | Yes | A comma-separated list of event types to retrieve. Possible\
    \ values: connection, unusualconnection, newconnection, notice, devicehistory,\
    \ modelbreach. |\n| Time Frame | DDL | Yes | The time window for the search. Options\
    \ include Last Hour, Last 6 Hours, Last 24 Hours, Last Week, Last Month, or Custom.\
    \ |\n| Start Time | String | No | The start time for the search in ISO 8601 format.\
    \ Mandatory if \"Time Frame\" is set to \"Custom\". |\n| End Time | String | No\
    \ | The end time for the search in ISO 8601 format. If omitted with \"Custom\"\
    \ time frame, the current time is used. |\n| Max Events To Return | String | No\
    \ | The maximum number of events to return per event type. Defaults to 50. |\n\
    \n### Additional Notes\n* Events are returned in the UTC timezone.\n* If \"Custom\"\
    \ is selected for \"Time Frame\", \"Start Time\" must be provided.\n* The action\
    \ supports IP, Hostname, and MacAddress entities.\n* The action validates that\
    \ \"Max Events To Return\" is a positive number.\n\n### Flow Description\n1. **Parameter\
    \ Initialization:** Extract configuration (API Root, Tokens) and action parameters\
    \ (Event Types, Time Frame, etc.).\n2. **Validation:** Verify that the provided\
    \ event types are valid and the limit is a non-negative integer.\n3. **Time Range\
    \ Calculation:** Calculate the start and end timestamps based on the selected\
    \ \"Time Frame\". If \"Custom\" is used, parse the \"Start Time\" and \"End Time\"\
    .\n4. **Entity Filtering:** Identify target entities that are of type IP Address,\
    \ Hostname, or MacAddress.\n5. **Device Resolution:** For each entity, query Darktrace\
    \ to find the internal device ID (`did`).\n6. **Event Retrieval:** For each resolved\
    \ device and each requested event type, fetch the events from Darktrace within\
    \ the calculated time range, up to the specified limit.\n7. **Output Generation:**\
    \ Create data tables for each entity's events and compile a final JSON result\
    \ containing all retrieved data."
