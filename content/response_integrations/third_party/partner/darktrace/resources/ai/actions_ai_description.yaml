    is selected, you also need to provide "Start Time". If "Alert Time Till Now" is
    selected, action will use start time of the alert as start time for the search
    and end time will be current time. If "30 Minutes Around Alert Time" is selected,
    action will search the alerts 30 minutes before the alert happened till the 30
    minutes after the alert has happened. Same idea applies to "1 Hour Around Alert
    Time" and "5 Minutes Around Alert Time" |

