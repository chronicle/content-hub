Add Comment To Model Breach:
  ai_description: >-
    ### General Description

    Adds a comment to a specific model breach in Darktrace. This action initiates
    a state change on the external system by appending the provided text to the model
    breach's timeline.


    ### Flow Description

    1. Extracts the `Model Breach ID` and `Comment` from the action parameters.

    2. Initializes the Darktrace API client.

    3. Makes a POST request to the Darktrace API (`/modelbreaches/{model_breach_id}/comments`)
    to append the comment to the specified model breach.

    4. Returns the JSON response from the API and completes the action.


    ### Additional Notes

    None.
