  ai_description: >-
    Executes a custom search query in Darktrace to retrieve historical logs or telemetry
    data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Specify the query that needs to be executed. |

    | Time Frame | Dropdown | No | Specify a time frame for the results. If 'Custom'
    is selected, you also need to provide 'Start Time'. If 'Alert Time Till Now' is
    selected, action will use start time of the alert as start time for the search
    and end time will be current time. If '30 Minutes Around Alert Time' is selected,
    action will search the alerts 30 minutes before the alert happened till the 30
    minutes after the alert has happened. Same idea applies to '1 Hour Around Alert
    Time' and '5 Minutes Around Alert Time'. |

    | Start Time | String | No | Specify the start time for the results. This parameter
    is mandatory if 'Custom' is selected for the 'Time Frame' parameter. Format: ISO
    8601. |

    | End Time | String | No | Specify the end time for the results. Format: ISO 8601.
    If nothing is provided and 'Custom' is selected for the 'Time Frame' parameter
    then this parameter will use current time. |

    | Max Results To Return | String | No | Specify how many results to return. Default:
    50. |


    ### Flow

    1. Extracts the provided query and time frame parameters.

    2. Calculates the start and end times based on the selected time frame and alert
    times.

    3. Executes the custom search query against the Darktrace API.

    4. Returns the search results as a JSON object.
