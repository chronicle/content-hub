List Similar Devices:
  ai_description: >-
    ### General Description

    Retrieves a list of similar devices for a given endpoint from Darktrace.


    ### Flow Description

    1. Extracts the action parameter `Max Devices To Return`.

    2. Iterates over supported entities (IP Address, Hostname, MAC Address).

    3. Queries Darktrace to find the device associated with the entity identifier
    using the `devices` or `devicesearch` API endpoints.

    4. If a device is found, queries the `similardevices` API endpoint to retrieve
    a list of similar devices up to the specified limit.

    5. Attaches the results as an entity table and JSON result for each successful
    entity.


    ### Additional Notes

    Supported entity types are IP Address, Hostname, and MAC Address.
