List Similar Devices:
  ai_description: >-
    ### General Description

    This action identifies and lists devices in Darktrace that are similar to a provided
    endpoint entity (IP Address, Hostname, or MAC Address). It is primarily used for
    asset enrichment and identifying potentially related or similar-behaving devices
    within the network environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Devices To Return | String | No | Specifies the maximum number of similar
    devices to retrieve for each entity. The value must be a positive integer. Default
    is 50. |


    ### Additional Notes

    * The action requires a valid connection to the Darktrace API.

    * The 'Max Devices To Return' parameter must be greater than 0; otherwise, the
    action will fail.

    * The action first resolves the entity to a Darktrace internal device ID (DID)
    before querying for similar devices.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and the
    'Max Devices To Return' parameter.

    2. **Connectivity Test:** It verifies the connection to the Darktrace instance.

    3. **Entity Resolution:** For each supported entity (IP, Hostname, or MAC Address),
    the action queries Darktrace to find the corresponding device and its unique identifier
    (DID).

    4. **Similarity Query:** If a device is found, the action calls the Darktrace
    API to retrieve a list of similar devices based on the resolved DID and the specified
    limit.

    5. **Data Output:** The action populates an entity-level data table with the similar
    devices' details (IP, MAC, OS, Hostname, Type, etc.) and attaches the raw JSON
    results to the action output.
