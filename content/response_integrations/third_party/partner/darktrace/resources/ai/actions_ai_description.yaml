  ai_description: >-
    Enriches IP, Hostname, MAC Address, and URL entities using Darktrace. This action
    retrieves endpoint details, device information, and optionally connection data
    from Darktrace. It updates the entities with the retrieved data, marks them as
    enriched, and can generate insights containing the endpoint details.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Iterates over supported entities (IP, Hostname, MAC Address, URL).

    3. Queries Darktrace for device or endpoint details based on the entity type.

    4. Optionally fetches connection data for the device if configured.

    5. Updates the entity's additional properties, creates data tables, and optionally
    creates an entity insight.

    6. Returns a JSON result with the enriched data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Fetch Connection Data | Boolean | False | If enabled, the action will return
    additional information about connections related to the internal endpoints of
    Darktrace. Default is true. |

    | Max Hours Backwards | Integer | False | Specify how many hours backwards the
    action needs to fetch connection data. Default is 24. |

    | Create Endpoint Insight | Boolean | False | If enabled, the action will create
    an insight containing information about the internal endpoints of Darktrace. Default
    is true. |
