Update Model Breach Status:
  ai_description: >-
    ### General Description

    Updates the status of a specific model breach in Darktrace to either Acknowledged
    or Unacknowledged.


    ### Flow Description

    1. Extracts the `Status` and `Model Breach ID` parameters.

    2. Makes a GET request to the Darktrace API to retrieve the current details and
    status of the specified model breach.

    3. Evaluates if the requested status is already applied to the model breach.

    4. If the status needs to be updated, makes a POST request to the Darktrace API
    (`/modelbreaches/{model_breach_id}/acknowledge` or `/modelbreaches/{model_breach_id}/unacknowledge`)
    to apply the new status.

    5. Returns a success message indicating whether the status was successfully updated
    or was already applied.


    ### Additional Notes

    None.
