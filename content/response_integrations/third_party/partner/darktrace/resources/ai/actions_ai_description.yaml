  ai_description: >-
    Executes a custom search query against the Darktrace platform to retrieve historical
    data or telemetry. This action allows analysts to perform ad-hoc investigations
    by querying Darktrace's advanced search API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the necessary API credentials
    (API Root, Token, Private Token) and action parameters (Query, Time Frame, Start/End
    Time, Max Results).

    2. **Time Calculation**: It determines the search time range. If a specific time
    frame is provided, it calculates the start and end timestamps. If the time frame
    is relative to the alert (e.g., '30 Minutes Around Alert Time'), it uses the current
    alert's start and end times.

    3. **Search Execution**: It constructs a base64-encoded query and executes a GET
    request to the Darktrace `/advancedsearch/api/search/` endpoint.

    4. **Result Output**: The retrieved search results are parsed and added to the
    action's result JSON, making them available for the analyst to review.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The search query to execute in Darktrace. |

    | Time Frame | DDL | No | The time range for the search (e.g., 'Last Hour', 'Last
    24 Hours', 'Custom'). Defaults to 'Last Hour'. |

    | Start Time | String | No | The start time in ISO 8601 format. Mandatory if 'Time
    Frame' is set to 'Custom'. |

    | End Time | String | No | The end time in ISO 8601 format. Defaults to current
    time if not provided. |

    | Max Results To Return | String | No | The maximum number of results to return.
    Defaults to 50. |


    ### Additional Notes

    If 'Custom' is selected for the 'Time Frame' parameter, the 'Start Time' parameter
    must be provided. The action utilizes the current alert's context (start/end time)
    if the selected time frame is relative to the alert.
