Execute Custom Search:
  ai_description: >-
    ### General Description


    The **Execute Custom Search** action allows users to perform advanced, ad-hoc
    queries against the Darktrace platform. It is designed to retrieve specific telemetry,
    event data, or security hits based on a user-defined query string and a specified
    time range. This action is particularly useful for threat hunting or gathering
    additional context during an investigation that isn't covered by standard enrichment
    actions.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | Specify the query that needs to be executed. |

    | **Time Frame** | DDL | No | Specify a time frame for the results. Options include
    predefined ranges (e.g., 'Last Hour', 'Last Week') or 'Custom'. Defaults to 'Last
    Hour'. |

    | **Start Time** | String | No | Specify the start time for the results in ISO
    8601 format. This parameter is mandatory if 'Custom' is selected for the 'Time
    Frame' parameter. |

    | **End Time** | String | No | Specify the end time for the results in ISO 8601
    format. If nothing is provided and 'Custom' is selected, the current time is used.
    |

    | **Max Results To Return** | String | No | Specify how many results to return.
    Default is 50. |


    ### Additional Notes


    *   If **Time Frame** is set to 'Custom', the **Start Time** must be provided;
    otherwise, the action will fail.

    *   The action can use the alert's start and end times when relative time frames
    like '30 Minutes Around Alert Time' are selected, allowing for context-aware searching.


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves the API configuration (API
    Root, Tokens) and the user-provided search parameters.

    2.  **Time Range Calculation:** It determines the precise start and end timestamps
    based on the **Time Frame** selection. It handles relative ranges (like 'Last
    Hour') and alert-relative ranges (like 'Alert Time Till Now') using the alert's
    metadata.

    3.  **Query Encoding:** The search query, timeframe, and limit are formatted into
    a JSON object and then Base64 encoded to construct the URL for the Darktrace Advanced
    Search API.

    4.  **API Execution:** A GET request is sent to the Darktrace endpoint using the
    encoded query string.

    5.  **Result Processing:** The action parses the JSON response from Darktrace,
    extracts the 'hits', and adds them to the action's result JSON for use in the
    SOAR platform.
