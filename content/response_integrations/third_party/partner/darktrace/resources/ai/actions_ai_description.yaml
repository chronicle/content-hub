Update Model Breach Status:
  ai_description: >-
    ### General Description

    Updates the acknowledgment status of a specific model breach within the Darktrace
    platform. This action allows analysts to programmatically mark breaches as either
    'Acknowledged' or 'Unacknowledged' directly from Google SecOps, facilitating incident
    lifecycle management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Status | DDL | Yes | The target status for the model breach. Options are 'Acknowledged'
    (marks the breach as reviewed) or 'Unacknowledged' (reverts the breach to an unreviewed
    state). |

    | Model Breach ID | String | Yes | The unique identifier (pbid) of the Darktrace
    model breach to be updated. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (Root, Tokens) and
    the specific `Model Breach ID` and target `Status` from the action input.

    2. **Status Verification**: Queries the Darktrace API to fetch the current state
    of the specified model breach to ensure it exists and to check its current acknowledgment
    status.

    3. **Redundancy Check**: Compares the current status with the requested status.
    If the breach is already in the desired state, the action completes with an 'Already
    Applied' message to avoid redundant API calls.

    4. **Status Update**: If the statuses differ, the action sends a POST request
    to the appropriate Darktrace endpoint (`/acknowledge` or `/unacknowledge`) to
    update the breach status.

    5. **Completion**: Reports the success or failure of the update operation to the
    Google SecOps case.


    ### Additional Notes

    - This action does not process entities from the case; it operates strictly on
    the `Model Breach ID` provided as a parameter.
