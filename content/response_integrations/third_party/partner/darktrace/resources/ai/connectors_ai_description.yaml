Darktrace - AI Incident Events Connector:
  ai_description: >-
    ### General Description

    The Darktrace - AI Incident Events Connector is designed to ingest AI-driven incident
    events from the Darktrace platform into Google SecOps. It enables security teams
    to monitor and respond to high-fidelity AI-detected threats by automatically creating
    cases within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the connector script.
    |

    | API Root | String | Yes | API root URL of the Darktrace instance. |

    | API Token | String | Yes | Darktrace API token. |

    | API Private Token | Password | Yes | Darktrace API private token. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate for the connection.
    |

    | Lowest AI Incident Score To Fetch | Integer | Yes | Minimum score threshold
    for fetching AI incidents (0-100). |

    | Max Hours Backwards | Integer | No | Hours to look back for the initial fetch
    or fallback. |

    | Max AI Incidents To Fetch | Integer | No | Maximum number of incidents to process
    per iteration. |

    | Use dynamic list as a blocklist | Boolean | Yes | Whether to use a dynamic list
    as a blocklist. |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | Password | No | Proxy password. |


    ### Flow Description

    1. The connector authenticates with the Darktrace API using the provided API Token
    and Private Token.

    2. It determines the time range for data retrieval based on the last successful
    run timestamp or the configured `Max Hours Backwards`.

    3. It queries the Darktrace `/aianalyst/incidentevents` endpoint for AI incidents,
    applying the `Lowest AI Incident Score To Fetch` filter.

    4. Fetched incidents are filtered against `existing_ids` to prevent duplicates
    and checked against the configured whitelist/blacklist.

    5. Valid incidents are mapped to the Google SecOps `AlertInfo` format, including
    environment and severity details.

    6. The connector creates cases in Google SecOps for each processed incident.

    7. Finally, it updates the last success timestamp to ensure subsequent runs only
    fetch new data.
Darktrace - Model Breaches Connector:
  ai_description: >-
    ### General Description

    The Darktrace Model Breaches Connector is designed to fetch model breach alerts
    and their associated connection events from the Darktrace platform. By integrating
    this connector, users can automatically ingest security incidents into Google
    SecOps, allowing for centralized monitoring and automated response to anomalous
    network behavior.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Darktrace API. |

    | API Token | String | Yes | The API token for authentication. |

    | API Private Token | Password | Yes | The private API token for signature generation.
    |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the Darktrace
    server. |

    | Lowest Model Breach Score To Fetch | Integer | No | The minimum score (0-100)
    for breaches to be fetched. |

    | Lowest Priority To Fetch | Integer | No | The minimum priority (1-5) for breaches
    to be fetched. |

    | Max Hours Backwards | Integer | No | The lookback period in hours for the initial
    fetch. |

    | Max Model Breaches To Fetch | Integer | No | The maximum number of breaches
    to process per iteration. |

    | Behaviour Visibility | String | No | Filter breaches by behavior category (Critical,
    Suspicious, Compliance, Informational). |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, the whitelist acts
    as a blacklist. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the connector script.
    |

    | DeviceProductField | String | Yes | Field name to retrieve the product name.
    |

    | EventClassId | String | Yes | Field name to retrieve the event type. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | Password | No | Proxy password. |

    | Padding Time | Integer | No | Padding time in hours for the last success timestamp.
    |


    ### Flow Description

    1. The connector initializes the connection to the Darktrace API using the provided
    credentials and configuration.

    2. It calculates the `last_success_timestamp` based on the configured `Max Hours
    Backwards` and `Padding Time` to determine the starting point for fetching new
    alerts.

    3. It queries the Darktrace API for model breaches, applying filters for score,
    priority, and existing alert IDs to avoid duplicates.

    4. For each fetched breach, the connector retrieves detailed event information.

    5. It applies additional filtering based on the `Behaviour Visibility` and whitelist/blacklist
    settings.

    6. The breach data is mapped into the SOAR alert format, including environment
    and device information.

    7. Finally, the connector saves the state (processed IDs and timestamps) and returns
    the ingested alerts to the SOAR platform for case creation.
