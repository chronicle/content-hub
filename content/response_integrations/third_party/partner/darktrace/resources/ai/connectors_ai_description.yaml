Darktrace - AI Incident Events Connector:
  ai_description: >-
    ### General Description

    The Darktrace - AI Incident Events Connector is designed to ingest AI-driven incident
    events from the Darktrace platform into Google SecOps. By periodically polling
    the Darktrace API, this connector identifies and retrieves high-fidelity AI incidents,
    allowing security teams to centralize their incident response workflows. It supports
    configurable filtering based on incident severity scores and dynamic lists, ensuring
    that only relevant and actionable alerts are ingested.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the Python process.
    |

    | API Root | String | Yes | API root URL of the Darktrace instance. |

    | API Token | String | Yes | Darktrace API token. |

    | API Private Token | String | Yes | Darktrace API private token. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate. |

    | Lowest AI Incident Score To Fetch | Integer | Yes | Minimum score (0-100) for
    AI incidents to fetch. |

    | Max Hours Backwards | Integer | No | Hours to look back for the initial run.
    |

    | Max AI Incidents To Fetch | Integer | No | Maximum number of incidents to process
    per iteration. |

    | Use dynamic list as a blocklist | Boolean | Yes | Whether to use the dynamic
    list as a blocklist. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | String | No | Password for proxy authentication. |


    ### Flow Description

    1. Authenticates with the Darktrace API using the provided API credentials and
    verifies the connection.

    2. Calculates the time range for fetching incidents, starting from the last successful
    run or the configured Max Hours Backwards.

    3. Queries the Darktrace /aianalyst/incidentevents endpoint for incidents matching
    the minimum score threshold.

    4. Filters out previously processed incidents using a stored ID list.

    5. Applies whitelist/blacklist filtering based on incident names.

    6. Maps each incident to a SOAR case, incorporating environment settings and device
    product information.

    7. Saves the current state (last success time and processed IDs) to ensure continuity
    in subsequent runs.

    8. Returns the processed incidents to the SOAR platform for case creation.
Darktrace - Model Breaches Connector:
  ai_description: >-
    ### General Description

    The Darktrace - Model Breaches Connector is designed to integrate Google SecOps
    with Darktrace, enabling the automated ingestion of model breach events. This
    connector periodically polls the Darktrace API to retrieve security model breaches,
    filters them based on user-defined criteria such as severity, score, and behavior
    visibility, and creates corresponding cases within the SOAR platform for further
    investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Darktrace instance. |

    | API Token | String | Yes | The API token for authentication with Darktrace.
    |

    | API Private Token | String | Yes | The private API token used for request signing.
    |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the Darktrace
    server. |

    | DeviceProductField | String | Yes | The source field name used to retrieve the
    Product Field name. |

    | EventClassId | String | Yes | The source field name used to retrieve the Event
    Class ID. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    connector script execution. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, the configured whitelist
    acts as a blacklist. |

    | Lowest Model Breach Score To Fetch | Integer | No | The minimum score (0-100)
    for a model breach to be fetched. |

    | Lowest Priority To Fetch | Integer | No | The minimum priority level (1-5) for
    a model breach to be fetched. |

    | Max Hours Backwards | Integer | No | The number of hours to look back for the
    initial data fetch. |

    | Max Model Breaches To Fetch | Integer | No | The maximum number of breaches
    to process per iteration. |

    | Environment Field Name | String | No | The field name where the environment
    information is stored. |

    | Environment Regex Pattern | String | No | A regex pattern to manipulate the
    environment field value. |

    | Proxy Server Address | String | No | The address of the proxy server, if required.
    |

    | Proxy Username | String | No | The username for proxy authentication. |

    | Proxy Password | String | No | The password for proxy authentication. |

    | Behaviour Visibility | String | No | Comma-separated list of behavior categories
    to ingest (Critical, Suspicious, Compliance, Informational). |

    | Padding Time | Integer | No | Padding time in hours to adjust the fetch window.
    |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Darktrace API using
    the provided API Token and Private Token, generating the necessary request signatures.

    2. **Time Range Calculation**: It determines the fetch window based on the last
    successful run timestamp, the `Max Hours Backwards` parameter, and any configured
    `Padding Time`.

    3. **Data Fetching**: The connector queries the Darktrace `/modelbreaches` endpoint
    to retrieve new breaches, applying filters for score and priority.

    4. **Filtering and Enrichment**: It filters breaches against the whitelist/blacklist
    and retrieves detailed event data for each breach using the `/details` endpoint.

    5. **Mapping and Ingestion**: The retrieved data is mapped to the SOAR `AlertInfo`
    format, applying environment mapping and behavior visibility filters. Validated
    alerts are then ingested as cases into Google SecOps.

    6. **State Management**: Upon successful processing, the connector saves the IDs
    of processed breaches and updates the last success timestamp to ensure subsequent
    iterations only fetch new data.
