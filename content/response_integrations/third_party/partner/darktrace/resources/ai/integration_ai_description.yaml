product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Darktrace integration is primarily an NDR (Network Detection and Response)
    platform that provides visibility into network traffic and endpoint behavior.
    It qualifies for the SIEM category because its connectors ingest AI-driven incident
    events and model breaches into the SOAR platform, and its actions (e.g., 'Execute
    Custom Search', 'List Endpoint Events') allow for historical log and telemetry
    analysis. It qualifies for Network Security because it monitors network traffic
    and provides connection data essential for network security investigations. It
    qualifies for Threat Intelligence as the 'Enrich Entities' action provides contextual
    data (reputation, device details) for IPs, URLs, and Hostnames, serving as an
    enrichment step to confirm if an alert is a True Positive. It qualifies for Asset
    Inventory because the 'Enrich Entities' action retrieves device metadata (device
    type, OS, network data) for internal assets. It does not qualify for EDR (no process-level
    analysis), Email Security (no email management), Cloud Security (no cloud resource
    configuration), ITSM (no ticketing), Vulnerability Management (no patch checking),
    or Collaboration (no notification/approval actions).
  siem: true
  threat_intelligence: true
  vulnerability_management: false
