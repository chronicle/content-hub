product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Darktrace integration provides comprehensive visibility into network and endpoint
    activity. The connectors ingest AI-driven incident events and model breaches,
    which aligns with SIEM capabilities for centralized monitoring and alert ingestion.
    The integration supports EDR and Network Security categories by providing actions
    to list endpoint events, retrieve connection data, and search for unusual network
    behavior, which are critical for investigating host-based and network-based threats.
    Additionally, the integration supports Asset Inventory by allowing analysts to
    enrich entity profiles with device details and identify similar devices. It also
    provides Threat Intelligence capabilities by enriching entities with contextual
    data to confirm alert validity. It does not provide specific actions for Email
    Security, IAM, ITSM, Vulnerability Management, or Collaboration.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
