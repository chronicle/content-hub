  ai_description: >-
    ### General Description

    This action verifies connectivity to the Jamf Pro and Jamf Protect APIs. It is
    used to ensure that the integration is correctly configured and that the provided
    credentials have the necessary permissions to communicate with the Jamf services.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Jamf Pro API Root | String | Yes | The base URL for the Jamf Pro API. |

    | Jamf Pro Client API ID | String | Yes | The Client API ID for Jamf Pro authentication.
    |

    | Jamf Pro Client API Secret | String | Yes | The Client API Secret for Jamf Pro
    authentication. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates for API requests.
    Defaults to True. |

    | Jamf Protect API Root | String | No | The base URL for the Jamf Protect API.
    Required if testing Jamf Protect connectivity. |

    | Jamf Protect Client API ID | String | No | The Client API ID for Jamf Protect
    authentication. Required if testing Jamf Protect connectivity. |

    | Jamf Protect Client API Secret | String | No | The Client API Secret for Jamf
    Protect authentication. Required if testing Jamf Protect connectivity. |


    ### Additional Notes

    - If Jamf Protect parameters are provided, the action will attempt to verify connectivity
    to both Jamf Pro and Jamf Protect. If only Jamf Pro parameters are provided, it
    will only verify Jamf Pro connectivity.


    ### Flow Description

