Get Mobile Device Inventory:
  ai_description: >-
    ### General Description

    Retrieves mobile device inventory from Jamf Pro using the v2 API. This action
    allows for granular data retrieval by supporting pagination, sorting, and filtering
    based on specific device attributes like serial number, UDID, or username. It
    is primarily used for asset discovery and gathering detailed hardware, software,
    and security configuration data for mobile devices managed within Jamf Pro.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page | String | No | The page number to retrieve (starts at 0). |

    | Page Size | String | No | The number of records to return per page (default
    100). |

    | Filter | DDL | Yes | The attribute to filter by (serialNumber, udid, username,
    emailAddress). |

    | Filter Value | String | Yes | The specific value to search for in the selected
    filter field. |

    | Section | DDL | No | Specifies which data sections to include (e.g., HARDWARE,
    SECURITY, APPLICATIONS). Defaults to ALL. |

    | Sort | Multi-choice | No | Defines the sorting order for the results (e.g.,
    displayName:asc). Supports over 200 sorting options. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Jamf Pro API using provided
    client credentials to obtain a bearer token.

    2. **Parameter Processing**: Validates pagination integers and constructs the
    filter query string (e.g., `username=="value"`).

    3. **Section Selection**: Determines which inventory sections to request; if a
    filter is used, the corresponding section is automatically included to ensure
    the filter works.

    4. **Data Retrieval**: Sends a GET request to the `/api/v2/mobile-devices/detail`
    endpoint with the constructed query parameters.

    5. **Result Handling**: Cleans the returned JSON data to ensure compatibility
    and outputs the inventory records to the action results.


    ### Additional Notes

    This action does not run on entities within the SOAR case; it performs a direct
    search against the Jamf Pro inventory based on the provided filter parameters.
