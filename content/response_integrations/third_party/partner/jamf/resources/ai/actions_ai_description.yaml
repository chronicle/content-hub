  ai_description: >-
    Updates an existing prevent list in Jamf Protect to block specific indicators
    such as file hashes, Team IDs, or Signing IDs. This action retrieves the current
    state of a named prevent list, validates that the provided indicators match the
    list's required format (e.g., SHA-1/SHA-256 for hashes), and appends the new data
    and tags to the existing list. It ensures that the prevent type of an existing
    list is not changed, as this is not supported by the Jamf Protect API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Prevent List Name | string | Yes | The name of the existing prevent list in
    Jamf Protect that you want to update. |

    | Prevent List Description | string | No | An optional updated description for
    the prevent list. If left empty, the existing description is preserved. |

    | Prevent Type | ddl | Yes | The category of indicators the list contains. Options
    include: File Hash, Signing Information - Team ID, Signing Information - Code
    Directory Hash, or Signing Information - Signing ID. This must match the existing
    list's type. |

    | Prevent List Data | string | Yes | A comma-separated list of identifiers (e.g.,
    hashes or IDs) to be added to the prevent list. |

    | Prevent List Tags | string | No | A comma-separated list of tags to be associated
    with the prevent list. New tags are merged with existing ones. |


    ### Additional Notes

    - The action will fail if the specified 'Prevent List Name' does not exist in
    Jamf Protect.

    - The 'Prevent Type' cannot be changed for an existing list; the action will raise
    an error if the input type differs from the remote list type.

    - At least one tag must exist for the list (either provided in the parameters
    or already present on the remote list).


    ### Flow Description

    1. **Fetch Existing Lists:** Retrieves all prevent lists from Jamf Protect to
    find a match for the provided name.

    2. **Type Validation:** Verifies that the input 'Prevent Type' matches the type
    of the existing list found in Jamf Protect.

    3. **Data Parsing:** Parses the comma-separated strings for indicators and tags
    into clean lists.

    4. **Format Validation:** Validates the format of the new indicators based on
    the 'Prevent Type' (e.g., checking for valid Apple Team ID structure or hash lengths).

    5. **Merge Data:** Combines and deduplicates the new indicators and tags with
    the existing data from the remote list.

    6. **Update Mutation:** Executes a GraphQL mutation to update the prevent list
    in Jamf Protect with the merged data.
