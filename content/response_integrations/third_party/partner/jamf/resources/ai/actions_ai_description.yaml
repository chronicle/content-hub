Wipe Managed Device:
  ai_description: "Remotely erases or wipes a managed computer using the Jamf Pro\
    \ `ERASE_DEVICE` MDM command. This action is specifically designed for macOS computers\
    \ and allows for granular control over the wipe process, including obliteration\
    \ behavior and 'Return to Service' configurations. \n\n### Flow Description:\n\
    1. **Authentication:** Initializes a connection to the Jamf Pro API using provided\
    \ credentials.\n2. **Management ID Retrieval:** Fetches the device's `managementId`\
    \ using the provided `Computer ID` to ensure the command is routed correctly.\n\
    3. **Command Construction:** Builds the `ERASE_DEVICE` MDM command payload, incorporating\
    \ the PIN, obliteration behavior, and optional Return to Service profiles (MDM\
    \ and WiFi).\n4. **Execution:** Sends the POST request to the Jamf Pro MDM commands\
    \ endpoint to initiate the wipe.\n5. **Reporting:** Returns the initiation status\
    \ and command details as a JSON result.\n\n### Parameters Description:\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Computer\
    \ ID | String | Yes | The unique identifier of the computer in Jamf Pro to be\
    \ erased. |\n| PIN | String | Yes | A 6-digit PIN required for the erase command\
    \ on certain hardware. |\n| Obliteration Behavior | DDL | Yes | Specifies how\
    \ the device should be obliterated (Default, DoNotObliterate, ObliterateWithWarning,\
    \ Always). |\n| Return to Service | Boolean | Yes | If enabled, the device will\
    \ attempt to re-enroll automatically after the wipe. |\n| MDM Profile Data | String\
    \ | No | Base64-encoded MDM profile data required if 'Return to Service' is enabled.\
    \ |\n| WiFi Profile Data | String | No | Base64-encoded WiFi profile data required\
    \ if 'Return to Service' is enabled to provide network connectivity. |\n\n###\
    \ Additional Notes:\n* This action is intended for computers only; use the 'Wipe\
    \ Mobile Device' action for iOS/iPadOS devices.\n* If 'Return to Service' is enabled,\
    \ at least one profile (MDM or WiFi) should typically be provided to ensure the\
    \ device can reconnect and re-enroll."
