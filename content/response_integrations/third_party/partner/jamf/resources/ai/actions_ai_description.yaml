Wipe Mobile Device:
  ai_description: >-
    ### General Description

    Remotely erases or wipes a managed mobile device using the Jamf Pro ERASE_DEVICE
    MDM command.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Initializes the JamfManager to authenticate with the Jamf Pro API.

    3. Sends an `ERASE_DEVICE` MDM command to the specified mobile device ID via the
    Jamf Pro API, applying any provided options such as preserving the data plan,
    disallowing proximity setup, or returning to service.

    4. Returns the command execution status and details as a JSON result.


    ### Additional Notes

    This action permanently deletes data on the target mobile device. Ensure the correct
    Mobile Device ID is provided.
