Remote Lock Mobile Device:
  ai_description: >-
    ### General Description

    Remotely lock a managed mobile device using Jamf Pro MDM commands. This action
    is used to secure a device by locking its screen, preventing unauthorized access.
    It allows for an optional custom message and phone number to be displayed on the
    locked screen.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mobile Device ID | String | Yes | The unique identifier of the mobile device
    in Jamf Pro. |

    | Message | String | No | A custom message to display on the device's lock screen.
    |

    | Phone Number | String | No | A contact phone number to display on the device's
    lock screen. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Jamf Pro API using the
    provided credentials.

    2. **Device Lookup**: It retrieves the detailed information for the specified
    `Mobile Device ID` to obtain the necessary `managementId` required for MDM commands.

    3. **Command Execution**: It sends a `DEVICE_LOCK` MDM command to the Jamf Pro
    server for the target device.

    4. **Result Processing**: The action captures the response from Jamf Pro and outputs
    the command initiation status and details as a JSON result.


    ### Additional Notes

    This action requires the Jamf Pro API user to have sufficient permissions to send
    MDM commands and view mobile device inventory.
