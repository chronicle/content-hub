Remote Lock Managed Device:
  ai_description: >-
    Remotely locks a managed computer using Jamf Pro MDM commands. This action is
    specifically designed for computer objects within Jamf. It triggers a device lock
    screen that prevents user access until a specific PIN is entered. The action also
    allows for a custom message and a contact phone number to be displayed on the
    lock screen. Note that this action requires the computer's management ID, which
    it retrieves automatically using the provided Computer ID.


    ### Flow Description:

    1. **Authentication**: Connects to the Jamf Pro API using provided credentials
    to obtain an access token.

    2. **Management ID Retrieval**: Fetches detailed inventory information for the
    specified Computer ID to extract the required `managementId`.

    3. **Command Execution**: Sends a `DEVICE_LOCK` MDM command to the Jamf Pro API
    targeting the retrieved management ID.

    4. **Result Processing**: Captures the API response and provides a summary of
    the command initiation status.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Computer ID | String | Yes | The unique identifier of the computer in Jamf Pro
    that you wish to lock. |

    | PIN | String | Yes | A 6-digit numeric code required to unlock the device. Although
    marked as optional in some configurations, the underlying logic requires a valid
    6-digit PIN for the command to succeed. |

    | Message | String | No | An optional custom message to display on the device's
    lock screen (e.g., "This device has been locked by Security"). |

    | Phone Number | String | No | An optional phone number to display on the lock
    screen for the user to contact support. |


    ### Additional Notes:

    - This action is intended for computers; for mobile devices (iOS/iPadOS), use
    the "Remote Lock Mobile Device" action.

    - The PIN must be exactly 6 digits.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
