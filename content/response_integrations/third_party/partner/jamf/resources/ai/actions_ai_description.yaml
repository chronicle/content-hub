  ai_description: >-
    Remotely erases or wipes a managed computer using the Jamf Pro `ERASE_DEVICE`
    MDM command. This action is specifically designed for macOS computers managed
    via Jamf Pro. It retrieves the device's management ID and then issues a command
    to perform a factory reset or secure wipe based on the provided obliteration behavior.
    It also supports 'Return to Service' configurations, allowing the device to automatically
    re-enroll or connect to Wi-Fi after the wipe process is complete.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves Jamf Pro connection details and action
    parameters including Computer ID, PIN, and obliteration settings.

    2. **Manager Initialization:** Initializes the JamfManager and authenticates with
    the Jamf Pro API to obtain a bearer token.

    3. **Management ID Retrieval:** Calls the Jamf Pro API to fetch detailed inventory
    for the specified Computer ID to extract its `managementId`.

    4. **Command Execution:** Sends a POST request to the Jamf Pro MDM commands endpoint
    with the `ERASE_DEVICE` command type and specified parameters (PIN, obliteration
    behavior, and Return to Service profiles).

    5. **Result Reporting:** Returns a JSON object containing the API response from
    Jamf and the details of the command initiated.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Computer ID | string | Yes | The unique identifier of the computer in Jamf Pro
    to be wiped. |

    | PIN | string | Yes | A 6-digit PIN required for the erase command. Note: While
    marked mandatory in configuration, the logic handles empty strings if the device
    doesn't require one. |

    | Obliteration Behavior | ddl | Yes | Determines how the device is wiped. Options:
    Default, DoNotObliterate, ObliterateWithWarning, Always. |

    | Return to Service | boolean | Yes | If enabled, the device will attempt to return
    to a managed state after wiping. |

    | MDM Profile Data | string | No | Base64-encoded MDM profile data used for Return
    to Service. |

    | WiFi Profile Data | string | No | Base64-encoded WiFi profile data used for
    Return to Service. |


    ### Additional Notes:

    - **Return to Service Requirements:** If 'Return to Service' is enabled, at least
    one of 'MDM Profile Data' or 'WiFi Profile Data' must be provided; otherwise,
    the action will fail with a parameter error.

    - **Device Compatibility:** This action uses the Jamf Pro computer inventory endpoints
    and is intended for computers. For mobile devices (iOS/iPadOS), use the 'Wipe
    Mobile Device' action.
