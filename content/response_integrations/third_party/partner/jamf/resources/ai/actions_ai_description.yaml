Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity and authentication configuration between\
    \ Google SecOps and the Jamf Pro and Jamf Protect platforms. It ensures that the\
    \ provided API credentials (Client ID and Secret) are valid and that the network\
    \ path to the specified API roots is open.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Jamf Pro\
    \ API Root | String | Yes | The base URL of the Jamf Pro server (e.g., `https://yourserver.jamfcloud.com`).\
    \ |\n| Jamf Pro Client API ID | String | Yes | The Client ID used for OAuth2 authentication\
    \ with Jamf Pro. |\n| Jamf Pro Client API Secret | String | Yes | The Client Secret\
    \ used for OAuth2 authentication with Jamf Pro. |\n| Verify SSL | Boolean | No\
    \ | If enabled, the action will verify the SSL certificate of the Jamf servers.\
    \ Defaults to `True`. |\n| Jamf Protect API Root | String | No | The base URL\
    \ of the Jamf Protect server. |\n| Jamf Protect Client API ID | String | No |\
    \ The Client ID used for authentication with Jamf Protect. |\n| Jamf Protect Client\
    \ API Secret | String | No | The Client Secret used for authentication with Jamf\
    \ Protect. |\n\n### Flow Description\n1. **Parameter Extraction:** The action\
    \ retrieves the Jamf Pro configuration (Root, ID, Secret, SSL) and optional Jamf\
    \ Protect configuration from the integration settings.\n2. **Jamf Pro Connectivity\
    \ Test:** \n    * Initializes the `JamfManager`.\n    * Attempts to obtain an\
    \ OAuth access token using the provided Client ID and Secret.\n    * Performs\
    \ a GET request to the `/api/v1/jamf-pro-version` endpoint to confirm the API\
    \ is responsive.\n3. **Jamf Protect Connectivity Test (Optional):** \n    * If\
    \ all Jamf Protect parameters (Root, ID, Secret) are provided, the action initializes\
    \ the `JamfProtectManager`.\n    * Attempts to obtain an access token from the\
    \ Jamf Protect authentication endpoint.\n4. **Result Reporting:** If the connection\
    \ tests are successful, the action completes with a success message. If any step\
    \ fails (e.g., authentication error, timeout), it returns a failure status with\
    \ the error details.\n\n### Additional Notes\n* Jamf Protect connectivity is only\
    \ tested if all three related parameters are configured. If any are missing, the\
    \ Protect test is skipped.\n* This action does not process any entities and is\
    \ strictly for system health checks."
