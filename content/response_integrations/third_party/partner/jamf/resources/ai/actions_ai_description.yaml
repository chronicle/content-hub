Assign to Group:
  ai_description: >-
    ### General Description

    Assigns computers to a specific computer group in Jamf Pro. This action allows
    administrators to add computers to a group using various identifiers such as computer
    IDs, computer names, or serial numbers.


    ### Flow Description

    1. Extracts the target Group ID and lists of computer identifiers (IDs, names,
    or serial numbers) from the action parameters.

    2. Validates that at least one type of computer identifier is provided.

    3. Constructs an XML payload containing the computers to be added.

    4. Makes a PUT request to the Jamf Pro API (`/JSSResource/computergroups/id/{id}`)
    to update the computer group.

    5. Returns a summary message and attaches the API response as a JSON result.


    ### Additional Notes

    Supports bulk operations with comma-separated lists of identifiers. Note that
    computer names are not required to be unique in Jamf; the API will act on the
    first matching record found. Using Computer IDs or Serial Numbers is recommended
    for reliable identification.
  ai_short_description: >-
    Assigns computers to a specific computer group in Jamf Pro using computer IDs,
    names, or serial numbers.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a computer group in Jamf Pro by adding the specified computers to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Jamf Pro API to update a computer group
      by adding computers to it, which mutates external data. It does not fetch contextual
      data, update internal entities, create insights, or modify alert data.
