  ai_description: >-
    ### General Description

    The **Get Device Group Membership** action retrieves the list of computers belonging
    to a specific computer group in Jamf Pro. It is designed to provide visibility
    into the composition of both Static and Smart computer groups, returning details
    such as the total member count and basic information for each device in the group.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | Yes | The unique identifier of the computer group in Jamf
    Pro for which membership information is requested. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Jamf Pro API using the
    configured Client ID and Client Secret to obtain a bearer token.

    2. **API Request**: It performs a GET request to the Jamf Classic API endpoint
    (`/JSSResource/computergroups/id/{id}`) using the provided Group ID.

    3. **Data Extraction**: The action parses the response to extract the list of
    member computers and calculates the total number of members.

    4. **Result Processing**: The retrieved membership data is formatted into a JSON
    object and attached to the action results. If no group is found, the action reports
    that no membership data was available.


    ### Additional Notes

    This action does not operate on SecOps entities (like Hostnames or IPs). It is
    a standalone lookup action that requires a specific Jamf Group ID to function.
    It is classified as an enrichment action because it retrieves data without modifying
    the state of Jamf Pro or the SecOps case.
