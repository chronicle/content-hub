Wipe Mobile Device:
  ai_description: >-
    ### General Description

    Remotely erase or wipe a managed mobile device using the Jamf Pro `ERASE_DEVICE`
    MDM command. This containment action is designed to secure lost or compromised
    devices by performing a full factory reset. It supports advanced configuration
    options such as preserving eSIM data plans and enabling "Return to Service," which
    allows a device to automatically re-enroll in MDM after being wiped, provided
    the necessary profile data is supplied.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mobile Device ID | string | Yes | The ID of the mobile device to erase. |

    | Preserve Data Plan | boolean | No | Whether to preserve the data plan on a mobile
    device with eSIM functionality (iOS 11+). |

    | Disallow Proximity Setup | boolean | No | Whether to disable Proximity Setup
    on the next reboot and skip the pane in Setup Assistant (iOS 11+). |

    | Return to Service | boolean | Yes | Whether to enable return to service after
    erase (requires MDM profile data). |

    | MDM Profile Data | string | No | Base64-encoded MDM profile data for return
    to service. |

    | WiFi Profile Data | string | No | Base64-encoded WiFi profile data for return
    to service. |

    | Bootstrap Token | string | No | Base64 encoded bootstrap token for the device.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Jamf Pro API configuration
    and the specific mobile device ID and wipe options from the input parameters.

    2. **Authentication**: It authenticates with the Jamf Pro API using the provided
    Client ID and Secret to obtain a bearer token.

    3. **Device Context Retrieval**: It fetches the detailed inventory information
    for the specified mobile device to retrieve its `managementId`, which is required
    for MDM commands.

    4. **Command Execution**: It constructs and sends an `ERASE_DEVICE` MDM command
    to the Jamf Pro API, including optional settings like data plan preservation and
    "Return to Service" profiles.

    5. **Result Reporting**: The action captures the response from Jamf Pro and reports
    the command initiation status and details back to the SecOps platform.


    ### Additional Notes

    - The "Return to Service" feature requires MDM profile data to be effective.

    - Prior to iOS 14, the "Disallow Proximity Setup" option should not be used with
    any other option.
