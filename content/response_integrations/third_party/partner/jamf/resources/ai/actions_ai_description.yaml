Get Device Group Membership:
  ai_description: >-
    ### General Description

    Retrieves the membership information for a specific computer group from Jamf Pro.
    This action fetches detailed data about all member devices within a group, supporting
    both static and smart computer groups. It provides the total count of members
    and the full membership data structure, which is useful for identifying devices
    subject to specific policies or configurations.


    ### Parameters Description

    | Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | Yes | The unique identifier of the computer group in Jamf
    Pro to retrieve membership for. |


    ### Flow Description

    1. **Initialization**: The action initializes the Jamf Pro API manager using the
    integration's configuration parameters, including the API Root, Client ID, and
    Client Secret.

    2. **Parameter Extraction**: The `Group ID` is extracted from the action input
    parameters.

    3. **API Request**: The action sends a GET request to the Jamf Pro Classic API
    endpoint (`/JSSResource/computergroups/id/{id}`) to fetch membership details.

    4. **Data Processing**: It parses the API response to extract the list of member
    computers and calculates the total member count.

    5. **Result Output**: The membership data and count are added to the action's
    JSON results, and a success message is returned to the SOAR platform.


    ### Additional Notes

    This action does not operate on specific entities within the Google SecOps case;
    it retrieves group-level data based on the provided ID. There are no parameters
    that are conditionally mandatory.
