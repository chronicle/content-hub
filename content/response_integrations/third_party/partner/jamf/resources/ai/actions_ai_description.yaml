Assign to Group:
  ai_description: >-
    Adds computers to a specific computer group in Jamf Pro using various identifiers
    such as computer IDs, names, or serial numbers. This action is primarily used
    for asset management and organizing devices for policy application or security
    workflows.


    ### General Description

    This action allows an analyst to programmatically assign one or more computers
    to a Jamf Pro computer group. It supports bulk operations by accepting comma-separated
    lists of identifiers. Because computer names are not unique in Jamf Pro, the action
    provides warnings and recommends using Computer IDs or Serial Numbers for precise
    targeting.


    ### Flow Description

    1. **Initialization:** Connects to the Jamf Pro API using provided credentials
    and validates the session token.

    2. **Parameter Validation:** Checks that a Group ID is provided and that at least
    one computer identifier (IDs, Names, or Serial Numbers) is present.

    3. **Data Parsing:** Splits the comma-separated input strings into clean lists
    of identifiers.

    4. **API Request:** Constructs an XML payload for the Jamf Classic API and performs
    a PUT request to the computer group endpoint (`/JSSResource/computergroups/id/{id}`).

    5. **Response Handling:** Parses the XML response to extract the group name and
    confirm the number of computers successfully added.

    6. **Output:** Returns a summary message and a JSON object containing the operation
    results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | Yes | The unique numeric ID of the computer group to modify.
    |

    | Computer IDs | String | No | A comma-separated list of Jamf computer IDs (e.g.,
    "10,11,12"). |

    | Computer Names | String | No | A comma-separated list of computer names. Note:
    The API acts on the first matching record found if names are duplicated. |

    | Computer Serial Numbers | String | No | A comma-separated list of computer serial
    numbers (e.g., "C02LW5EEF8JC"). |


    ### Additional Notes

    - **Requirement:** At least one of the following parameters must be configured
    for the action to run: 'Computer IDs', 'Computer Names', or 'Computer Serial Numbers'.

    - **Reliability:** It is highly recommended to use 'Computer IDs' or 'Computer
    Serial Numbers' to avoid ambiguity caused by non-unique computer names.
