    2. Initializes the `JamfManager` and tests connectivity to the Jamf Pro API by
    fetching the server version.

    3. If Jamf Protect parameters are provided, initializes the `JamfProtectManager`
    and tests connectivity to the Jamf Protect GraphQL API.

