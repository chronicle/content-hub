    parameters, including the Computer ID, Extension Attribute Name, and the new values.

    2. **Attribute Discovery:** Fetches the complete list of available computer extension
    attributes from Jamf Pro to resolve the provided attribute name into its corresponding
    internal Definition ID.

    3. **Value Parsing:** Processes the provided 'Values' string, splitting it into
    a list if multiple comma-separated values are provided.

    4. **External Update:** Executes a PATCH request to the Jamf Pro API for the specified
    computer, updating the targeted extension attribute with the new values.

    5. **Result Processing:** Captures the API response, extracts basic computer details
    (Name, Serial, Platform) for the output message, and attaches the full raw response
    as a JSON result.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Computer ID | String | Yes | The unique identifier of the computer in Jamf Pro
    that needs to be updated. |

    | Extension Attribute Name | String | Yes | The display name of the extension
    attribute to update (e.g., 'Department', 'Asset Tag'). |

    | Values | String | Yes | A comma-separated list of values to set for the extension
    attribute. Multiple values are supported for attributes that allow them. |


    ### Additional Notes:

