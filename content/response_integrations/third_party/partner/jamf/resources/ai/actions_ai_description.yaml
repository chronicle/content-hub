  ai_description: >-
    ### General Description

    Retrieves paginated computer inventory records from Jamf Pro. This action allows
    users to query the Jamf Pro API for computer details, supporting pagination, sorting,
    filtering, and specific section selection to optimize data retrieval.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API root, credentials)
    and action parameters (Page, Page Size, Filter, Filter Value, Section, Sort).

    2. **Validation**: Validates input parameters, ensuring page numbers and sizes
    are valid integers.

    3. **Query Construction**: Builds the API query string based on the provided filter
    field, filter value, and sorting criteria. It also determines the necessary API
    sections to request based on the filter field if not explicitly provided.

    4. **Data Retrieval**: Initializes the `JamfManager` and executes the `get_computer_inventory`
    method to fetch data from the Jamf Pro API.

    5. **Result Processing**: Processes the API response, calculates pagination information,
    and adds the retrieved inventory data to the action result JSON for display in
    the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page | string | No | Page number to retrieve (default 0). |

    | Page Size | string | No | Number of records per page (default 100). |

    | Filter | ddl | Yes | Filter criteria field (e.g., general.name, hardware.serialNumber).
    |

    | Filter Value | string | Yes | The value to filter by for the selected Filter
    field. |

    | Section | MULTI_CHOICE_PARAMETER | No | Sections to include in the response
    (e.g., GENERAL, HARDWARE, SECURITY). Defaults to ALL. |

    | Sort | MULTI_CHOICE_PARAMETER | No | Sort criteria (e.g., general.name:asc).
    |


    ### Additional Notes

    - The action requires both `Filter` and `Filter Value` to be provided to apply
    filtering. If only one is provided, the filter is skipped.

    - The action automatically adds required sections based on the filter field if
    not explicitly requested.
