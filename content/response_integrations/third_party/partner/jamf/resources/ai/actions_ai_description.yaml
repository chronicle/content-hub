  ai_description: >-
    ### General Description

    This action assigns one or more computers to a specific computer group within
    Jamf Pro. It allows administrators to manage group memberships by providing computer
    identifiers such as IDs, names, or serial numbers. This is useful for grouping
    devices for policy application, scoping, or containment workflows.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Jamf Pro API credentials
    and configuration from the integration settings.

    2. **Parameter Extraction**: It extracts the `Group ID` and the lists of computer
    identifiers (`Computer IDs`, `Computer Names`, `Computer Serial Numbers`) from
    the action parameters.

    3. **Validation**: The action validates that at least one computer identifier
    is provided.

    4. **Parsing**: It parses the comma-separated strings into lists of identifiers.

    5. **Execution**: It initializes the `JamfManager` and performs a PUT request
    to the Jamf Pro API to add the specified computers to the target group.

    6. **Result Reporting**: The action returns the result of the operation, including
    the number of computers processed and the group name, to the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | Yes | The ID of the computer group to modify. |

    | Computer IDs | string | No | Comma-separated list of computer IDs to add. |

    | Computer Names | string | No | Comma-separated list of computer names to add.
    |

    | Computer Serial Numbers | string | No | Comma-separated list of computer serial
    numbers to add. |


    ### Additional Notes

    At least one of the following parameters must be provided for the action to execute:
    `Computer IDs`, `Computer Names`, or `Computer Serial Numbers`.
