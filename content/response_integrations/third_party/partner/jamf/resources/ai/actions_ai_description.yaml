  ai_description: >-
    ### General Description

    Verifies connectivity to the Jamf Pro and Jamf Protect APIs. This action ensures
    that the SOAR platform can successfully authenticate and communicate with the
    configured Jamf instances using the provided credentials. It is primarily used
    for troubleshooting and initial setup validation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Jamf Pro API Root | String | Yes | The base URL of the Jamf Pro server (e.g.,
    https://yourserver.jamfcloud.com). |

    | Jamf Pro Client API ID | String | Yes | The Client ID used for Jamf Pro API
    authentication. |

    | Jamf Pro Client API Secret | String | Yes | The Client Secret used for Jamf
    Pro API authentication. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Jamf servers. Defaults to True. |

    | Jamf Protect API Root | String | No | The base URL of the Jamf Protect server.
    |

    | Jamf Protect Client API ID | String | No | The Client ID used for Jamf Protect
    API authentication. |

    | Jamf Protect Client API Secret | String | No | The Client Secret used for Jamf
    Protect API authentication. |


    ### Additional Notes

    - Jamf Pro connectivity is always tested as it is the primary component of the
    integration.

    - Jamf Protect connectivity is optional and will only be tested if all three Protect-related
    parameters (API Root, Client ID, and Client Secret) are provided.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves Jamf Pro and optional Jamf Protect configuration
    parameters from the integration settings.

    2. **Jamf Pro Validation:** Initializes the Jamf Pro manager, requests an OAuth
    access token, and calls the version endpoint to verify the connection.

    3. **Optional Jamf Protect Validation:** If Jamf Protect credentials are provided,
    it initializes the Jamf Protect manager and attempts to retrieve an authentication
    token.

    4. **Result Reporting:** Returns a success message if the connection tests pass,
    or a failure message with error details if any step fails.
