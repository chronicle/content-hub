Update Protect Prevent List:
  ai_description: >-
    Updates an existing prevent list in Jamf Protect to include additional indicators
    such as file hashes, Team IDs, or signing identifiers. This action is primarily
    used for containment by expanding the scope of blocked items on managed macOS
    devices.


    ### Flow Description

    1. **Authentication**: Initializes the Jamf Protect Manager and obtains a GraphQL
    access token.

    2. **List Retrieval**: Fetches all existing prevent lists from Jamf Protect to
    locate the target list by name.

    3. **Validation**: Verifies that the target list exists and that the provided
    'Prevent Type' matches the existing list's configuration (the type cannot be changed
    during an update).

    4. **Data Merging**: Parses the new indicators and tags from comma-separated strings,
    then merges and deduplicates them with the existing data in the list.

    5. **Indicator Validation**: Validates the format of the new indicators (e.g.,
    checking for valid SHA-1/SHA-256 hashes or Apple Team IDs) based on the prevent
    type.

    6. **External Update**: Executes a GraphQL mutation to update the prevent list
    in Jamf Protect with the merged data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Prevent List Name | String | Yes | The exact name of the existing prevent list
    to be updated. |

    | Prevent List Description | String | No | An optional updated description for
    the prevent list. If left empty, the existing description is preserved. |

    | Prevent Type | DDL | Yes | The category of indicators being added (e.g., File
    Hash, Team ID). This must match the type of the existing list. |

    | Prevent List Data | String | Yes | A comma-separated list of identifiers (hashes,
    IDs) to add to the prevent list. |

    | Prevent List Tags | String | No | A comma-separated list of tags to associate
    with the prevent list. |


    ### Additional Notes

    - This action performs a 'merge' operation; it does not overwrite existing indicators
    but appends new ones to the list.

    - The 'Prevent Type' is strictly enforced; if you attempt to update a 'File Hash'
    list using 'Team ID' data, the action will fail.
