  ai_description: >-
    Assigns computers to a specific computer group in Jamf Pro.


    ### General Description

    This action adds computers to a computer group using various identifiers: computer
    IDs, computer names, or serial numbers. It supports bulk operations by accepting
    comma-separated lists of identifiers. At least one type of identifier must be
    provided for the action to execute successfully.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Group ID | String | Yes | The ID of the computer group to modify. |

    | Computer IDs | String | No | Comma-separated list of computer IDs to add (e.g.,
    "123,456,789"). |

    | Computer Names | String | No | Comma-separated list of computer names to add
    (e.g., "MacBook-1,MacBook-2"). Note: Computer names are not required to be unique
    in Jamf; the API will act on the first matching record found. |

    | Computer Serial Numbers | String | No | Comma-separated list of computer serial
    numbers to add (e.g., "ABC123,DEF456"). |


    ### Additional Notes

    At least one of the following parameters must be provided: Computer IDs, Computer
    Names, or Computer Serial Numbers. If none are provided, the action will fail.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Validates that at least one computer identifier (ID, Name, or Serial Number)
    has been provided.

    3. Parses the comma-separated lists of identifiers into individual items.

    4. Initializes the JamfManager to interact with the Jamf Pro API.

    5. Sends a request to the Jamf Pro API to assign the specified computers to the
    target group.

    6. Processes the API response and outputs a success message along with the JSON
    result.
