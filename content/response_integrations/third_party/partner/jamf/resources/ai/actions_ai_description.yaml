  ai_description: >-
    ### General Description

    Retrieves paginated computer inventory records from Jamf Pro. This action allows
    analysts to perform comprehensive searches for managed computers using various
    filters such as name, serial number, UDID, username, or email. It supports detailed
    data retrieval by allowing the selection of specific inventory sections (e.g.,
    Hardware, Security, Operating System, Applications) and provides sorting capabilities
    to organize the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page | String | No | The page number to retrieve. Defaults to 0. |

    | Page Size | String | No | The number of records to return per page. Defaults
    to 100. |

    | Filter | DDL | Yes | The field to filter the inventory by. Options include `general.name`,
    `hardware.serialNumber`, `udid`, `userAndLocation.username`, and `userAndLocation.email`.
    |

    | Filter Value | String | Yes | The specific value to search for based on the
    selected Filter field. |

    | Section | Multi-choice | No | Specific inventory sections to include in the
    response (e.g., HARDWARE, SECURITY, APPLICATIONS). Selecting specific sections
    can optimize data retrieval. Defaults to ALL. |

    | Sort | Multi-choice | No | Criteria to sort the results, including field name
    and direction (asc/desc). |


    ### Additional Notes

    - If a `Filter` is provided but the `Filter Value` is empty (or vice versa), the
    action will skip the filtering logic and return results based on pagination and
    sorting only.

    - The action automatically ensures that the section corresponding to the `Filter`
    field is included in the API request to ensure the filter can be processed correctly
    by Jamf Pro.


    ### Flow Description

    1. **Initialization**: Extracts the Jamf Pro API configuration (Root URL, Client
    ID, Secret) and the action parameters.

    2. **Validation**: Converts and validates pagination parameters (`Page`, `Page
    Size`) to ensure they are valid integers.

    3. **Criteria Processing**: Processes the `Sort` criteria and constructs the `Filter`
    string in the Jamf Pro API format (e.g., `field=="value"`).

    4. **Section Selection**: Determines which inventory sections to request. If specific
    sections are requested, it ensures the section required for the active filter
    is also included.

    5. **API Execution**: Initializes the Jamf Manager and calls the `get_computer_inventory`
    endpoint with the processed parameters.

    6. **Result Handling**: Captures the inventory data, calculates pagination metadata
    (e.g., if more pages are available), and outputs the results as a JSON object
    for use in the SOAR platform.
