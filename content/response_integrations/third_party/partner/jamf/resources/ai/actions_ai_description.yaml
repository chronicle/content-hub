  ai_description: >-
    Remotely erase or wipe a managed mobile device using the Jamf Pro ERASE_DEVICE
    MDM command. This action is used for containment and data protection by completely
    wiping a device's data. It supports advanced options such as preserving data plans
    for eSIM devices, disabling proximity setup on reboot, and configuring 'Return
    to Service' settings to automate re-enrollment after the wipe.


    ### Flow Description:

    1. **Authentication**: The action authenticates with the Jamf Pro API using the
    provided Client ID and Secret to obtain an OAuth access token.

    2. **Device Identification**: It retrieves the specific management ID for the
    provided Mobile Device ID, which is required to issue MDM commands.

    3. **Command Construction**: The action constructs an ERASE_DEVICE MDM command
    payload, incorporating parameters for data plan preservation, proximity setup
    restrictions, and Return to Service configurations (including MDM/WiFi profiles
    and bootstrap tokens).

    4. **Execution**: The command is sent to the Jamf Pro MDM server via a POST request.

    5. **Reporting**: The action returns the command status and execution details
    as a JSON result.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mobile Device ID | String | Yes | The unique identifier of the mobile device
    in Jamf Pro to be erased. |

    | Preserve Data Plan | Boolean | No | If true, preserves the data plan on devices
    with eSIM functionality (iOS 11+). Default is false. |

    | Disallow Proximity Setup | Boolean | No | If true, disables Proximity Setup
    on the next reboot and skips the pane in Setup Assistant (iOS 11+). Default is
    false. |

    | Return to Service | Boolean | Yes | Whether to enable the 'Return to Service'
    feature, which allows the device to automatically re-enroll after being erased.
    Default is true. |

    | MDM Profile Data | String | No | Base64-encoded MDM profile data required for
    Return to Service. |

    | WiFi Profile Data | String | No | Base64-encoded WiFi profile data required
    for Return to Service. |

    | Bootstrap Token | String | No | Base64-encoded bootstrap token for the device,
    used for Return to Service. |


    ### Additional Notes:

    - The 'Return to Service' feature requires valid MDM and/or WiFi profile data
    to function correctly. If enabled without providing profile data, the action may
    fail or the device may not re-enroll automatically.
