Update Extension Attribute:
  ai_description: >-
    ### General Description

    Updates a single extension attribute for a specific computer managed in Jamf Pro.
    This action allows analysts to modify custom metadata, such as department, tags,
    or location, directly within the Jamf Pro inventory.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Computer ID | String | Yes | The unique identifier of the computer in Jamf Pro.
    |

    | Extension Attribute Name | String | Yes | The name of the extension attribute
    to be updated. |

    | Values | String | Yes | A comma-separated list of values to assign to the attribute.
    |


    ### Flow Description

    1. **Attribute Resolution**: The action fetches all available computer extension
    attributes from Jamf Pro to map the provided name to its internal definition ID.

    2. **Validation**: It verifies that the specified attribute name exists in the
    Jamf Pro environment.

    3. **API Update**: It constructs a PATCH request containing the new values and
    sends it to the Jamf Pro computer inventory endpoint.

    4. **Result Processing**: The action captures the API response, providing details
    about the updated computer and the values set.


    ### Additional Notes

    - This action performs a case-insensitive search for the attribute name.

    - Multiple values are supported for attributes that allow them.
