Get Computer Inventory:
  ai_description: >-
    Retrieves paginated computer inventory records from Jamf Pro. This action allows
    for comprehensive searching and filtering of managed computers based on specific
    criteria such as name, serial number, UDID, username, or email. It supports advanced
    sorting and allows users to specify which data sections (e.g., Hardware, Security,
    Applications) should be included in the results to optimize performance.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Page | String | No | The page number to retrieve (starts at 0). |

    | Page Size | String | No | The number of records to return per page (default
    is 100, maximum is 2000). |

    | Filter | DDL | Yes | The field to use for filtering results (e.g., `general.name`,
    `hardware.serialNumber`, `udid`). |

    | Filter Value | String | Yes | The specific value to search for in the selected
    filter field. |

    | Section | Multi-Choice | No | Specific data sections to include in the response
    (e.g., `HARDWARE`, `SECURITY`, `APPLICATIONS`). Defaults to `ALL`. |

    | Sort | Multi-Choice | No | Criteria for sorting the results, including field
    name and direction (e.g., `general.name:asc`). |


    ### Flow Description


    1. **Initialization**: The action extracts the Jamf Pro API configuration and
    user-provided parameters.

    2. **Validation**: It validates that `Page` and `Page Size` are valid integers
    and within acceptable ranges.

    3. **Request Construction**: It builds a filter string in the Jamf Pro API format
    (e.g., `field=="value"`) and processes the sort and section selections.

    4. **Section Optimization**: If a filter is applied to a specific field (like
    UDID), the action automatically ensures the corresponding data section (like `HARDWARE`)
    is included in the request if not already specified.

    5. **API Execution**: It performs a GET request to the Jamf Pro `/api/v1/computers-inventory`
    endpoint with the constructed query parameters.

    6. **Data Processing**: The retrieved inventory data is cleaned to ensure valid
    JSON formatting and to handle special characters that might cause parsing issues.

    7. **Output**: The action returns the inventory results as a JSON object and provides
    a summary message including the total count of records found.


    ### Additional Notes


    - If `Section` is set to `ALL`, the action retrieves all available data points
    for the computers, which may impact performance for large datasets.

    - The action is read-only and does not modify any data within Jamf Pro.
