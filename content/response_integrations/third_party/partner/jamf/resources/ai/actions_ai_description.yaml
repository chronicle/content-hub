    ### General Description

    Retrieves paginated computer inventory records from Jamf Pro. This action supports
    comprehensive filtering, sorting, and section selection to optimize data retrieval
    and find specific assets within the Jamf Pro environment.


    ### Flow Description

    1. Extracts action parameters including pagination details, sorting criteria,
    filter field, filter value, and requested sections.

    2. Validates and formats the parameters for the Jamf Pro API request.

    3. Automatically determines required sections based on the provided filter field
    if not explicitly requested.

    4. Initializes the JamfManager and authenticates with the Jamf Pro API.

