  ai_description: >-
    ### General Description

    Adds computers to a specific computer group in Jamf Pro using various identifiers.
    This action is primarily used for containment, policy enforcement, or organizational
    tasks by grouping devices together within the Jamf management console.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Group ID | The unique identifier (ID) of the computer group in Jamf Pro that
    you want to modify. | String | Yes |

    | Computer IDs | A comma-separated list of Jamf computer IDs to add to the group
    (e.g., "123, 456"). | String | No |

    | Computer Names | A comma-separated list of computer names to add to the group.
    Note: Names may not be unique in Jamf. | String | No |

    | Computer Serial Numbers | A comma-separated list of computer serial numbers
    to add to the group. | String | No |


    ### Additional Notes

    - **Requirement:** At least one of the following parameters must be provided for
    the action to execute: `Computer IDs`, `Computer Names`, or `Computer Serial Numbers`.

    - **Reliability:** It is recommended to use `Computer IDs` or `Computer Serial
    Numbers` for reliable identification, as computer names are not required to be
    unique in Jamf Pro.

    - **API Usage:** This action interacts with the Jamf Pro Classic API using XML-formatted
    PUT requests.


    ### Flow Description

    1. **Initialization:** The action initializes the Jamf Pro API manager using the
    provided API Root, Client ID, and Client Secret.

    2. **Parameter Validation:** It checks if at least one computer identifier (ID,
    Name, or Serial Number) has been provided. If all are empty, the action fails.

    3. **Data Parsing:** Comma-separated strings for IDs, Names, and Serial Numbers
    are parsed into individual lists, stripping whitespace.

    4. **API Request Construction:** The action constructs an XML payload containing
    the `<computer_additions>` block with the specified identifiers.

    5. **Execution:** A PUT request is sent to the Jamf Pro Classic API endpoint `/JSSResource/computergroups/id/{id}`.

    6. **Result Processing:** The action parses the XML response from Jamf, extracts
    the group name (if available), and returns a JSON summary of the processed computers
    and the operation status.
