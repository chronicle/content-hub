  ai_description: >-
    ### General Description

    The **Get Mobile Device Inventory** action retrieves detailed inventory information
    for mobile devices managed within Jamf Pro. It utilizes the Jamf Pro v2 API to
    fetch data, supporting advanced features such as pagination, multi-field sorting,
    and specific data section selection (e.g., Hardware, Security, Applications).
    This action is primarily used for asset discovery and gathering contextual metadata
    about mobile endpoints during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Page** | String | No | The page number to retrieve for paginated results.
    Defaults to 0. |

    | **Page Size** | String | No | The number of records to return per page (Max
    2000). Defaults to 100. |

    | **Filter** | DDL | Yes | The field used to filter the inventory search. Options
    include `serialNumber`, `udid`, `username`, and `emailAddress`. |

    | **Filter Value** | String | Yes | The specific value to search for in the selected
    filter field. |

    | **Section** | DDL | No | Specifies which data sections to include in the response
    (e.g., `HARDWARE`, `SECURITY`, `NETWORK`). Selecting specific sections optimizes
    data retrieval. Defaults to `ALL`. |

    | **Sort** | Multi-Choice | No | Defines the sorting order of the results using
    `field:direction` pairs (e.g., `displayName:asc`). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration details (API Root,
    Credentials) and user-provided parameters (Filter, Pagination, Sorting).

    2. **Validation:** It validates that `Page` and `Page Size` are valid integers
    and within acceptable ranges.

    3. **Query Construction:** Processes the `Sort` criteria into an API-compatible
    string and constructs a filter query string based on the `Filter` and `Filter
    Value` parameters. It also automatically ensures that the required data section
    for the chosen filter field is included in the request.

    4. **API Interaction:** Authenticates with Jamf Pro and sends a GET request to
    the `/api/v2/mobile-devices/detail` endpoint with the constructed query parameters.

    5. **Data Processing:** Cleans the returned JSON data to ensure compatibility
    and handles any API errors or empty result sets.

    6. **Output:** Returns the inventory data as a JSON result in the SOAR platform.


    ### Additional Notes

    * This action does not run on SecOps entities; it performs a direct search based
    on the provided parameters.

    * If no devices match the criteria, the action will complete successfully but
    indicate that no results were found.
