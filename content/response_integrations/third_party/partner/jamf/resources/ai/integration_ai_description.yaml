product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Jamf integration provides comprehensive management and security capabilities
    for macOS and iOS/iPadOS devices. It qualifies for 'Asset Inventory' because it
    includes multiple actions (e.g., 'Get Computer Inventory', 'Get Device Information',
    'Get Mobile Device Inventory') to retrieve detailed hardware, software, and user
    metadata for managed devices. It qualifies for 'EDR' because it provides containment
    capabilities (e.g., 'Remote Lock Managed Device', 'Remote Lock Mobile Device',
    'Wipe Managed Device', 'Wipe Mobile Device') which allow security analysts to
    isolate or remediate compromised endpoints. It qualifies for 'Threat Intelligence'
    because the 'Update Protect Prevent List' action allows security teams to manage
    blocklists by adding indicators (hashes, domains, IPs) to Jamf Protect. It does
    not fit 'SIEM' (no log ingestion), 'Network Security' (it is an endpoint tool,
    not a network gateway), 'Email Security', 'IAM', 'Cloud Security', 'ITSM', or
    'Collaboration'.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
