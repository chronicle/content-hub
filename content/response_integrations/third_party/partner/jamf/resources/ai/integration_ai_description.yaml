product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Jamf integration provides comprehensive device management and endpoint security
    capabilities. It qualifies for 'Asset Inventory' because it includes multiple
    actions (e.g., 'Get Computer Inventory', 'Get Mobile Device Inventory', 'Get Device
    Information') to retrieve detailed asset metadata. It qualifies for 'EDR' because
    it provides endpoint security features, including containment actions like 'Remote
    Lock' and 'Wipe' for both computers and mobile devices, which aligns with EDR
    containment capabilities. It qualifies for 'Network Security' because the 'Update
    Protect Prevent List' action allows for the blocking of malicious indicators (hashes,
    domains, IPs), which aligns with the category's goal of blocking malicious traffic/indicators.
    It does not fit 'SIEM' (no log searching), 'IAM' (no user account management),
    or other categories like 'ITSM' or 'Vulnerability Management'.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
