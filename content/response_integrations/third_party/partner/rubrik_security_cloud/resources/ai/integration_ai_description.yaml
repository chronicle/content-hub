product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Rubrik Security Cloud integration provides capabilities for threat hunting
    and event searching, which aligns with the SIEM category (specifically for IOC
    scanning and event retrieval). It also provides capabilities for retrieving metadata
    and context about Rubrik objects (clusters, snapshots, sensitive data hits), which
    aligns with the Asset Inventory category. It does not perform EDR, Network Security,
    Email Security, IAM, Cloud Security (infrastructure), ITSM, Vulnerability Management,
    or Collaboration functions.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
