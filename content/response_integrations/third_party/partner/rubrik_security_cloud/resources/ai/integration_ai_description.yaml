product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Rubrik Security Cloud integration is designed to manage and secure data protection
    environments, which are integral to cloud-native security architectures. The integration
    provides actions to retrieve configuration states (CDM Cluster Connection State,
    Location) and security findings (Sonar Sensitive Hits, File Contexts), which directly
    aligns with the Cloud Security category's objective of returning resource configuration
    states and findings. While the integration includes threat hunting capabilities
    (IOC Scans), it does not provide reputation services for external indicators,
    nor does it function as a general-purpose SIEM or IT asset inventory system. Therefore,
    it is classified under Cloud Security.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
