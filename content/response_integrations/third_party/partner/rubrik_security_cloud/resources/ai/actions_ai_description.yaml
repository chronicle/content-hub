  ai_description: "### General Description\nRetrieves a list of snapshots for a specific\
    \ object from Rubrik Security Cloud (RSC). This action allows analysts to query\
    \ the backup history of a workload, providing visibility into available recovery\
    \ points. It supports filtering by date range and snapshot type, as well as pagination\
    \ for large result sets.\n\n### Parameters Description\n\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Object ID** |\
    \ String | Yes | The unique identifier (FID) of the object for which snapshots\
    \ are to be searched. |\n| **Limit** | String | No | The maximum number of snapshots\
    \ to retrieve in the response. The value must be between 1 and 1000. Default is\
    \ 50. |\n| **Next Page Token** | String | No | The cursor used to retrieve the\
    \ next set of results if more snapshots are available. |\n| **Sort Order** | DDL\
    \ | No | Specifies the chronological order of the results based on creation time.\
    \ Options: `Asc` (default), `Desc`. |\n| **Start Date** | String | No | Filters\
    \ snapshots created on or after this date. Supported formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`.\
    \ |\n| **End Date** | String | No | Filters snapshots created on or before this\
    \ date. Supported formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |\n| **Snapshot\
    \ Type** | String | No | A comma-separated list of snapshot types to filter the\
