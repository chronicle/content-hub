  ai_description: >-
    ### General Description

    This action initiates an advanced Indicator of Compromise (IOC) scan on specified
    Rubrik objects within the Rubrik Security Cloud platform. It allows for highly
    configurable threat hunting by supporting various IOC types, date ranges, file
    size filters, and path inclusions/exclusions. The action triggers a bulk threat
    hunt mutation and returns the results, which are then displayed in the SOAR interface
    as a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object ID | string | Yes | Comma-separated list of object IDs to scan. |

    | IOC Type | ddl | No | Type of IOC to search for (e.g., PATH_OR_FILENAME, HASH,
    YARA_RULE). |

    | IOC Value | string | No | Specific IOC value to search for. |

    | Scan Name | string | No | Custom name for the scan (auto-generated if not provided).
    |

    | Advanced IOC | string | No | JSON encoded Indicators Of Compromise to scan.
    |

    | Start Date | string | No | Start date for snapshot range (ISO format). |

    | End Date | string | No | End date for snapshot range (ISO format). |

    | Max Snapshots Per Object | string | No | Maximum snapshots to scan per object.
    |

    | Max Matches Per Snapshot | string | No | Maximum matches to return per snapshot.
    |

    | Min File Size | string | No | Minimum file size in bytes to scan. |

    | Max File Size | string | No | Maximum file size in bytes to scan. |

    | Paths To Include | string | No | Comma-separated paths to include in scan. |

    | Paths To Exclude | string | No | Comma-separated paths to exclude from scan.
    |

    | Paths To Exempt | string | No | Comma-separated paths to exempt from exclusion.
    |


    ### Additional Notes

    Either the 'Advanced IOC' parameter must be configured, or the combination of
    'IOC Type' and 'IOC Value' must be provided for the action to run. If neither
    is provided, the action will fail.


    ### Flow Description

    1. **Configuration Initialization**: Retrieves integration parameters (Service
    Account JSON, SSL verification) from the SOAR configuration.

    2. **Parameter Extraction**: Extracts all action parameters from the user input.

    3. **Validation**: Validates parameters, including object IDs, integers, JSON
    structures, and date formats.

    4. **Client Initialization**: Initializes the Rubrik Security Cloud client using
    the provided credentials.

    5. **Execution**: Executes the `start_advance_ioc_scan` mutation to trigger the
    threat hunt on the Rubrik platform.

    6. **Result Processing**: Processes the response, generates a data table with
    the hunt details, and adds it to the SOAR action result.
