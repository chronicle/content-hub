Get CDM Cluster Connection State:
  ai_description: >-
    Retrieves the connection state of a specific Cloud Data Management (CDM) cluster
    from Rubrik Security Cloud. This action is used to monitor the health and connectivity
    status of Rubrik clusters, providing details on whether the cluster and its individual
    nodes are currently connected to the Rubrik Security Cloud platform.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Cluster ID | The unique identifier of the CDM cluster to query. | String | Yes
    |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the mandatory `Cluster ID` from the action
    input.

    2. **API Initialization:** Sets up the Rubrik API manager using the integration's
    service account credentials.

    3. **Data Retrieval:** Executes a GraphQL query to fetch the `connectedState`
    for the specified cluster and its associated nodes.

    4. **Data Processing:** Parses the API response into a structured data model.

    5. **Result Output:** Returns the full JSON response and generates a data table
    titled 'CDM Cluster Connection State' containing the connection status for each
    node.
