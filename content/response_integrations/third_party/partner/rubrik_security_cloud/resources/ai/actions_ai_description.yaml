  ai_description: >-
    Initiates a Turbo IOC (Indicator of Compromise) scan across Rubrik infrastructure.
    Turbo scans are optimized for speed and can scan multiple IOCs across clusters
    with configurable time ranges and snapshot limits.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IOC | String | Yes | Value of the indicator to scan for. Supports comma separated
    values. |

    | Scan Name | String | No | Name of the new turbo threat hunt scan. |

    | Cluster ID | String | No | ID of the cluster on which to perform a scan. Supports
    comma separated values. |

    | Start Time | String | No | Filter the snapshots from the provided date. Format
    supported: yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ. |

    | End Time | String | No | Filter the snapshots until the provided date. Format
    supported: yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ. |

    | Max Snapshots Per Object | String | No | Maximum number of snapshots to scan
    per object. |


    ### Flow Description

    1. Extracts and validates the input parameters, including dates and integer limits.

    2. Initializes the Rubrik Security Cloud client.

    3. Executes a GraphQL mutation (`startTurboThreatHunt`) to start the Turbo IOC
    scan on the external platform.

    4. Returns the Hunt ID and adds it to a data table in the action results.
