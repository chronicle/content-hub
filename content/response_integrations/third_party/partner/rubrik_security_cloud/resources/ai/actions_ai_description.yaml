Get Sonar Sensitive Hits:
  ai_description: >-
    ### General Description

    Retrieves sensitive data hits detected by Rubrik Sonar for a specific object within
    a configurable lookback period from Rubrik Security Cloud.


    ### Flow Description

    1. Extracts the `Object Name` and `Lookback Days` parameters.

    2. Calculates the search date based on the lookback period.

    3. Makes a GraphQL API call to Rubrik Security Cloud to retrieve the list of Sonar
    policy objects for the calculated date.

    4. Filters the retrieved objects to find the one matching the provided `Object
    Name`.

    5. Makes a second GraphQL API call to retrieve detailed sensitive hits information
    for the matched object.

    6. Formats the retrieved data and adds it to the action's JSON result and a data
    table.


    ### Additional Notes

    Sonar is Rubrik's data classification and sensitive data discovery engine.
