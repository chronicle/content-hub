List Events:
  ai_description: >-
    Retrieves a list of events and activities from Rubrik Security Cloud (RSC) based
    on various filtering criteria. This action allows analysts to search through historical
    and real-time system events, such as backup successes, failures, anomalies, and
    storage activities. It supports pagination and sorting to manage large datasets.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Activity Status | String | No | Filter events by status (e.g., "Failure", "Success",
    "Running"). Supports comma-separated values. |

    | Activity Type | String | No | Filter events by type (e.g., "Backup", "Anomaly",
    "Sync"). Supports comma-separated values. |

    | Severity | String | No | Filter events by severity level (e.g., "Critical",
    "Warning", "Info"). Supports comma-separated values. |

    | Object Name | String | No | Filter events associated with a specific object
    name. |

    | Object Type | String | No | Filter events by object type (e.g., "VmwareVm",
    "WindowsFileset"). Supports comma-separated values. |

    | Cluster ID | String | No | Filter events by specific Rubrik Cluster IDs. Supports
    comma-separated values. |

    | Start Date | String | No | The start date for the event range. Supported formats:
    `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | End Date | String | No | The end date for the event range. Supported formats:
    `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | Sort By | DDL | No | Field to sort results by (e.g., Last Updated, Severity,
    Start Time). Default is Last Updated. |

    | Sort Order | DDL | No | The order of sorting: "Asc" or "Desc". Default is Desc.
    |

    | Limit | String | No | Maximum number of results to retrieve (Max: 1000). Default
    is 50. |

    | Next Page Token | String | No | Cursor token used to retrieve the next page
    of results. |


    ### Additional Notes

    - If both **Start Date** and **End Date** are provided, the Start Date must be
    chronologically before the End Date.

    - The action returns a maximum of 20 records in the visible data table for performance,
    while the full result set is available in the JSON output.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts all filtering, sorting, and pagination
    parameters provided by the user.

    2. **Validation:** It validates the integer format for the 'Limit' and ensures
    that 'Start Date' and 'End Date' follow the required ISO or date formats.

    3. **API Interaction:** It initializes the Rubrik API Manager and executes a GraphQL
    query (`activitySeriesConnection`) against the Rubrik Security Cloud endpoint
    with the specified filters.

    4. **Data Processing:** The retrieved events are parsed into a data model. The
    full response is attached as a JSON result, and a summary table containing key
    event details (Event ID, Object Name, Severity, Start Time) is added to the case.
