  ai_description: >-
    Starts a new advanced threat hunt (IOC scan) in Rubrik Security Cloud across specified
    objects. This action allows for granular scanning by supporting various indicator
    types (Hashes, File Paths, or YARA rules) and filtering criteria such as date
    ranges, file sizes, and path inclusions/exclusions. It initiates a bulk threat
    hunt process and returns the unique identifiers for the created hunts.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the target Object IDs, IOC details (either
    via individual type/value or a JSON-encoded advanced IOC object), and various
    scan filters (dates, file sizes, paths).

    2. **Validation:** Validates that Object IDs are provided, dates are in the correct
    ISO format, and integer parameters (like file sizes or snapshot limits) are valid.
    It also ensures that the start date precedes the end date.

    3. **API Initialization:** Authenticates with Rubrik Security Cloud using the
    provided Service Account JSON and initializes the GraphQL API manager.

    4. **Scan Initiation:** Executes a GraphQL mutation (`startBulkThreatHunt`) to
    trigger the scan on the Rubrik platform.

    5. **Result Processing:** Captures the hunt IDs and statuses from the response,
    adds the raw JSON to the action results, and populates a data table in the SOAR
    case for the analyst to track the progress.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object ID** | String | Yes | Comma-separated list of Rubrik object IDs (e.g.,
    VM FIDs) to perform the scan on. |

    | **IOC Type** | DDL | No | The type of indicator to scan for. Options: `INDICATOR_OF_COMPROMISE_TYPE_PATH_OR_FILENAME`,
    `INDICATOR_OF_COMPROMISE_TYPE_HASH`, `INDICATOR_OF_COMPROMISE_TYPE_YARA_RULE`.
    |

    | **IOC Value** | String | No | The specific value of the indicator (e.g., a file
    hash or path). Required if `IOC Type` is used. |

    | **Advanced IOC** | String | No | A JSON-encoded string containing multiple IOCs.
    Keys should be the IOC type and values should be lists of indicator values. |

    | **Scan Name** | String | No | A custom name for the threat hunt. If not provided,
    a name is auto-generated using the current timestamp. |

    | **Start Date** | String | No | Filter snapshots from this date (Format: `yyyy-mm-dd`
    or `yyyy-mm-ddTHH:MM:SSZ`). |

    | **End Date** | String | No | Filter snapshots until this date (Format: `yyyy-mm-dd`
    or `yyyy-mm-ddTHH:MM:SSZ`). |

    | **Max Snapshots Per Object** | String | No | Maximum number of snapshots to
    scan for each target object. |

    | **Max Matches Per Snapshot** | String | No | The scan for a snapshot terminates
    once this number of matches is reached. |

    | **Min File Size** | String | No | Minimum file size in bytes to include in the
    scan. |

    | **Max File Size** | String | No | Maximum file size in bytes to include in the
    scan. |

    | **Paths To Include** | String | No | Comma-separated list of file paths to include
    in the scan. |

    | **Paths To Exclude** | String | No | Comma-separated list of file paths to exclude
    from the scan. |

    | **Paths To Exempt** | String | No | Comma-separated list of paths to exempt
    from the exclusion list. |


    ### Additional Notes

    * **IOC Configuration:** You must provide either the `Advanced IOC` JSON parameter
    OR both the `IOC Type` and `IOC Value` parameters for the action to execute successfully.

    * **Date Filtering:** If both `Start Date` and `End Date` are provided, the action
    validates that the start date is earlier than the end date.
