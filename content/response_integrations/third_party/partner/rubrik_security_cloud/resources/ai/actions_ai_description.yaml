Get CDM Cluster Location:
  ai_description: >-
    Retrieves the geographical location information for a specific Rubrik Cloud Data
    Management (CDM) cluster. This action queries the Rubrik Security Cloud API to
    find the physical address or location details associated with the nodes of a cluster
    identified by its unique ID.


    ### Flow Description:

    1. **Parameter Extraction:** The action extracts the mandatory `Cluster ID` from
    the input parameters.

    2. **Authentication:** It initializes the Rubrik API Manager using service account
    credentials to establish a secure connection.

    3. **Data Retrieval:** It executes a GraphQL query (`CDM_CLUSTER_LOCATION_QUERY`)
    to fetch the `geoLocation` and `address` data for the specified cluster.

    4. **Data Processing:** The response is parsed to extract location details for
    all nodes within the cluster.

    5. **Output Generation:** The action populates the execution results with a raw
    JSON response and creates a formatted data table named 'CDM Cluster Location'
    containing the Cluster ID and its corresponding address.


    ### Parameters Description:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Cluster ID | String | Yes | The unique identifier of the CDM cluster for which
    you want to retrieve location information. |


    ### Additional Notes:

    - This action does not run on SOAR entities; it requires a specific Cluster ID
    as a manual or playbook-provided input.

    - The results include a data table limited to the first 20 records for display
    purposes.
