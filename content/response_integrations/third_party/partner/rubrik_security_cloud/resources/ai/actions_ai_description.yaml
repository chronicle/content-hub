    per object. |

    | Min File Size | String | No | Minimum size of the file in bytes that will be
    included in the scan. |

    | Max File Size | String | No | Maximum size of the file in bytes that will be
    included in the scan. |

    | Paths To Include | String | No | Paths to include in the scan. Supports comma
    separated values. |
