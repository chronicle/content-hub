IOC Scan Results:
  ai_description: >-
    ### General Description

    Retrieves the results of an IOC (Indicator of Compromise) scan or threat hunt
    from Rubrik Security Cloud using a specific Hunt ID. This action fetches detailed
    information about the scan status, matches found, and metrics.


    ### Flow Description

    1. Extracts the `Hunt ID` parameter provided by the user or playbook.

    2. Initializes the Rubrik Security Cloud API client.

    3. Executes a GraphQL POST request (`THREAT_HUNT_DETAILS_V2_QUERY`) to retrieve
    the threat hunt details and metrics from Rubrik.

    4. Parses the response to extract scan status, IOC details, object metrics, and
    scan metrics.

    5. Outputs the raw JSON results and constructs a data table with the scan details.

    6. Evaluates the scan status and returns an `IN_PROGRESS` execution state if the
    hunt is still running, or `COMPLETED` if finished.


    ### Additional Notes

    This action supports asynchronous execution and will return an `IN_PROGRESS` status
    if the threat hunt is still pending or actively running in Rubrik Security Cloud.
