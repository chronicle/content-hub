  ai_description: >-
    ### General Description

    The **List Events** action retrieves a list of events and activities from Rubrik
    Security Cloud. It supports extensive filtering capabilities, allowing users to
    narrow down events based on activity status, type, severity, object details, cluster
    IDs, and specific date ranges. The action also supports pagination and sorting
    to manage large sets of results efficiently.


    ### Parameters Description

    | Parameter | Mandatory | Expected Type | Description |

    |-----------|-----------|---------------|-------------|

    | Activity Status | No | String | Comma-separated list of activity statuses to
    filter (e.g., "Failure", "Running", "Success"). |

    | Activity Type | No | String | Comma-separated list of activity types to filter
    (e.g., "Sync", "Backup"). |

    | Severity | No | String | Comma-separated list of severities to filter (e.g.,
    "Critical", "Warning"). |

    | Object Name | No | String | Name of the object to filter events for. |

    | Object Type | No | String | Comma-separated list of object types to filter (e.g.,
    "VmwareVm"). |

    | Cluster ID | No | String | Comma-separated list of cluster IDs to filter. |

    | Start Date | No | String | The start date to fetch events from (Format: yyyy-mm-dd
    or yyyy-mm-ddTHH:MM:SSZ). |

    | End Date | No | String | The end date to fetch events until (Format: yyyy-mm-dd
    or yyyy-mm-ddTHH:MM:SSZ). |

    | Sort By | No | String | Field to use for sorting the response (e.g., "Last Updated",
    "Severity"). |

    | Sort Order | No | String | Order to sort the data in ("Asc" or "Desc"). |

    | Limit | No | Integer | Maximum number of results to retrieve (default is 50,
    max is 1000). |

    | Next Page Token | No | String | Cursor token for pagination to retrieve the
    next set of results. |


    ### Flow Description

    1. **Initialization:** Establishes a connection to the Rubrik Security Cloud using
    the provided service account credentials.

    2. **Parameter Validation:** Extracts and validates the input parameters, ensuring
    dates are in the correct format and limits are within allowed bounds.

    3. **Data Retrieval:** Executes a GraphQL query against the Rubrik API to fetch
    events matching the specified filters and pagination settings.

    4. **Result Processing:** Parses the API response, calculates pagination details,
    and formats the events into a structured JSON object and a concise data table.

    5. **Output Generation:** Returns the retrieved events to the SOAR platform, providing
    a summary message and the next page token if more results are available.
