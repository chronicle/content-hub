  ai_description: >-
    Starts a new Turbo Threat Hunt scan in Rubrik Security Cloud to search for specific
    Indicators of Compromise (IOCs). This action is optimized for speed and allows
    for scanning multiple IOCs across specific clusters or the entire infrastructure
    within a defined time range and snapshot limit.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC | String | Yes | A comma-separated list of indicator values (e.g., MD5,
    SHA1, or SHA256 hashes) to scan for. |

    | Scan Name | String | No | A custom name for the new turbo threat hunt scan.
    If not provided, a name is automatically generated using the format 'Google-SecOps-YYYY-MM-DD-HH:MM:SS'.
    |

    | Cluster ID | String | No | A comma-separated list of cluster IDs on which to
    perform the scan. If left empty, the scan may target all available clusters. |

    | Start Time | String | No | Filters the snapshots from the provided date. Supported
    formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`, or `yyyy-mm-ddTHH:MM:SS.fffZ`.
    |

    | End Time | String | No | Filters the snapshots until the provided date. Supported
    formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`, or `yyyy-mm-ddTHH:MM:SS.fffZ`.
    |

    | Max Snapshots Per Object | String | No | The maximum number of snapshots to
    scan per object. Must be a positive integer. |


    ### Additional Notes

    - If both `Start Time` and `End Time` are provided, the `Start Time` must be chronologically
    before the `End Time`.

    - The action returns a unique `Hunt ID` which can be used to track the progress
    and results of the scan in subsequent actions.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the IOC list, scan name, cluster
    IDs, time filters, and snapshot limits from the input.

    2. **Validation:** It validates that the IOC list is not empty, ensures dates
    are in the correct format, and checks that the snapshot limit is a valid positive
    integer.

    3. **API Initialization:** Connects to the Rubrik Security Cloud API using the
    provided service account credentials.

    4. **Scan Initiation:** Executes a GraphQL mutation to start the Turbo Threat
    Hunt with the specified configuration.

    5. **Result Processing:** Captures the `huntId` from the API response, adds the
    full JSON response to the action results, and creates a data table in the SOAR
    case containing the Hunt ID.
