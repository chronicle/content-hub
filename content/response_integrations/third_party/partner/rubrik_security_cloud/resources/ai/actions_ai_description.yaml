  ai_description: >-
    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik objects
    within Rubrik Security Cloud.


    ### Parameters Description

    * **Object ID** (Mandatory, String): Comma-separated list of object IDs of the
    system on which to perform the scan.

    * **IOC Type** (Optional, String): The type of the indicator to scan for (e.g.,
    Hash, Path/Filename, YARA Rule).

    * **IOC Value** (Optional, String): Specific value of the indicator to scan for.

    * **Scan Name** (Optional, String): Custom name for the new advanced threat hunt
    scan. If not provided, a default name with the current date and time will be generated.

    * **Advanced IOC** (Optional, String): JSON encoded Indicators of Compromise to
    scan. JSON keys signify the type of IOC and the corresponding list of values are
    the values of the IOCs.

    * **Start Date** (Optional, String): Filter the snapshots from the provided date
    (Format: yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ).

    * **End Date** (Optional, String): Filter the snapshots until the provided date
    (Format: yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ).

    * **Max Snapshots Per Object** (Optional, String): Maximum number of snapshots
    to scan per object.

    * **Max Matches Per Snapshot** (Optional, String): Snapshot terminates once this
    number of matches have been detected.

    * **Min File Size** (Optional, String): Minimum size of the file in bytes that
    will be included in the scan.

    * **Max File Size** (Optional, String): Maximum size of the file in bytes that
    will be included in the scan.

    * **Paths To Include** (Optional, String): Paths to include in the scan. Supports
    comma-separated values.

    * **Paths To Exclude** (Optional, String): Paths to exclude from the scan. Supports
    comma-separated values.

    * **Paths To Exempt** (Optional, String): Paths to exempt from exclusion. Supports
    comma-separated values.


    ### Additional Notes

    * Either the **Advanced IOC** parameter or the combination of **IOC Type** and
    **IOC Value** parameters must be configured for the action to run successfully.

    * If both **Start Date** and **End Date** are provided, the Start Date must be
    before the End Date.


    ### Flow Description

    1. Extracts and validates the provided parameters, including dates, integers,
    and JSON structures.

    2. Initializes the Rubrik Security Cloud API manager using the provided service
    account credentials.

    3. Executes a GraphQL mutation to start the advanced IOC scan (bulk threat hunt)
    with the specified configuration.

    4. Retrieves the created hunt details and populates a data table with the scan
    results.

    5. Returns the JSON response and a success message.
