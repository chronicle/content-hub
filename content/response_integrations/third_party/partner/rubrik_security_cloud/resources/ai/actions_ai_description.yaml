  ai_description: >-
    ### General Description

    The **Get CDM Cluster Location** action retrieves the geographical location (physical
    address) of a specific Rubrik CDM (Cloud Data Management) cluster. This action
    is used to identify where the physical hardware or cloud instance of a cluster
    is located, which is essential for data residency verification, compliance auditing,
    and infrastructure management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Cluster ID | String | Yes | The unique identifier of the CDM cluster for which
    you want to retrieve the location information. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the mandatory `Cluster ID` from
    the user input.

    2. **Authentication**: It establishes a secure connection to the Rubrik Security
    Cloud using service account credentials and OAuth token management.

    3. **API Query**: The action executes a GraphQL query (`CDM_CLUSTER_LOCATION_QUERY`)
    against the Rubrik API, filtering by the provided `Cluster ID` to retrieve `geoLocation`
    data.

    4. **Data Processing**: It parses the response to extract the physical address
    for each node associated with the cluster.

    5. **Output Generation**: The results are formatted into a data table named "CDM
    Cluster Location" and the full raw response is attached as a JSON result for use
    in subsequent playbook steps.


    ### Additional Notes

    - This action does not operate on SecOps entities (like IPs or Hostnames); it
    requires a specific Rubrik Cluster ID as a parameter.

    - If the provided Cluster ID is invalid or not found, the action will return a
    failure status.
