  ai_description: >-
    ### General Description

    The **Get CDM Cluster Connection State** action retrieves the current connection
    status of a specific Cloud Data Management (CDM) cluster within Rubrik Security
    Cloud (RSC). This action is useful for monitoring the health and availability
    of backup infrastructure components by checking the connectivity status of all
    nodes within a cluster.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Cluster ID** | String | Yes | The unique identifier of the CDM cluster for
    which the connection state is being requested. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory `Cluster ID` from
    the input parameters.

    2. **Authentication**: It initializes the Rubrik API manager using the provided
    service account credentials and handles OAuth token management (including automatic
    refresh if expired).

    3. **Data Retrieval**: A GraphQL query is sent to Rubrik Security Cloud to fetch
    the `connectedState` for all nodes associated with the specified cluster ID.

    4. **Data Processing**: The raw GraphQL response is parsed, and node connection
    states are extracted and structured using a dedicated data model.

    5. **Result Generation**: The action populates a data table named "CDM Cluster
    Connection State" containing the Cluster ID and Connection State for each node.
    It also attaches the full JSON response to the action results for further analysis.


    ### Additional Notes

    - This action does not run on entities; it requires a specific Cluster ID as input.

    - The data table is limited to the first 20 records (nodes) found to ensure performance
    and readability.
