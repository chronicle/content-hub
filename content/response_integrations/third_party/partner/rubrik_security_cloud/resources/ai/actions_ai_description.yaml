List Sonar File Contexts:
  ai_description: >-
    ### General Description

    Retrieves file contexts and sensitive data findings detected by Rubrik Sonar for
    a specific object snapshot. This action allows analysts to inspect files, folders,
    or file shares for sensitive information hits, providing visibility into data
    risks within backups. It supports extensive filtering by file name, path, and
    user ID, as well as pagination and sorting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object ID** | string | Yes | The unique identifier (Snappable ID) of the object
    in Rubrik. |

    | **Snapshot ID** | string | Yes | The unique identifier of the specific snapshot
    to analyze. |

    | **File Name** | string | No | Filter results by a specific file name or search
    text. |

    | **File Path** | string | No | Filter results by a standard file path. |

    | **User ID** | string | No | Filter results by a specific User ID (SID). |

    | **Include Whitelisted Results** | ddl | No | Boolean (True/False) indicating
    whether to include results that have been whitelisted. |

    | **Limit** | string | No | Maximum number of results to retrieve (Default: 50,
    Max: 1000). |

    | **Next Page Token** | string | No | The cursor token used to retrieve the next
    page of results. |

    | **Sort By** | ddl | No | Field to sort the response by (e.g., HITS, NAME, LAST_MODIFIED).
    |

    | **Sort Order** | ddl | No | The order to sort the data (Asc or Desc). Default
    is Desc. |


    ### Additional Notes

    - The action returns a detailed data table named "Sonar File Contexts" containing
    file metadata, size, sensitive hit counts, and access times.

    - Results are limited to the first 20 records in the UI data table for performance,
    while the full result is available in the JSON output.


    ### Flow Description

    1. **Parameter Validation**: The action extracts and validates the mandatory `Object
    ID` and `Snapshot ID`, and ensures the `Limit` is a valid integer.

    2. **Authentication**: Initializes the Rubrik API client using OAuth credentials
    stored in the integration configuration.

    3. **API Request**: Executes a GraphQL query (`SONAR_FILE_CONTEXTS_QUERY`) against
    Rubrik Security Cloud, applying the provided filters and sorting parameters.

    4. **Data Processing**: Parses the GraphQL response using the `SonarFileContextsDatamodel`
    to extract file-level details and sensitive hit metrics.

    5. **Output Generation**: Adds the raw JSON response to the action results and
    constructs a CSV-formatted data table for display in the Google SecOps case wall.
