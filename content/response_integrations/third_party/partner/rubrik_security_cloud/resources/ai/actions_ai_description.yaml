Advanced IOC Scan:
  ai_description: >-
    Starts an advanced Indicator of Compromise (IOC) scan, also known as a Threat
    Hunt, on specified Rubrik objects. This action allows security teams to search
    for malicious files, hashes, or patterns across backup snapshots within Rubrik
    Security Cloud. It supports complex filtering including file size limits, path
    inclusions/exclusions, and specific snapshot time ranges.


    ### Flow Description

    1. **Parameter Validation:** The action validates the mandatory `Object ID` and
    optional parameters like `Start Date`, `End Date`, and integer-based filters (file
    sizes, snapshot limits).

    2. **IOC Configuration:** It processes the IOC criteria provided either via the
    `IOC Type` and `IOC Value` parameters or through a complex JSON object in the
    `Advanced IOC` parameter.

    3. **API Interaction:** It sends a GraphQL mutation (`startBulkThreatHunt`) to
    Rubrik Security Cloud to initiate the scanning process.

    4. **Result Processing:** The action retrieves the unique IDs for the newly created
    threat hunts and displays them in a data table within the SecOps case for tracking.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object ID** | String | Yes | Comma-separated list of Rubrik Object IDs (e.g.,
    virtual machines, file sets) to perform the scan on. |

    | **IOC Type** | DDL | No | The category of indicator to search for: `PATH_OR_FILENAME`,
    `HASH`, or `YARA_RULE`. |

    | **IOC Value** | String | No | The specific value (e.g., file hash or path pattern)
    to search for. Required if `Advanced IOC` is not used. |

    | **Advanced IOC** | String | No | A JSON-encoded string containing multiple indicators
    of compromise. If provided, it overrides `IOC Type` and `IOC Value`. |

    | **Scan Name** | String | No | A custom name for the threat hunt. If omitted,
    a name is auto-generated using the current timestamp. |

    | **Start Date** | String | No | Filters snapshots to scan starting from this
    date (Format: `yyyy-mm-dd` or ISO 8601). |

    | **End Date** | String | No | Filters snapshots to scan until this date (Format:
    `yyyy-mm-dd` or ISO 8601). |

    | **Max Snapshots Per Object** | String | No | Limits the number of snapshots
    scanned for each specified object. |

    | **Max Matches Per Snapshot** | String | No | Terminates the scan for a snapshot
    once this number of matches is reached. |

    | **Min File Size** | String | No | Minimum file size in bytes to include in the
    scan. |

    | **Max File Size** | String | No | Maximum file size in bytes to include in the
    scan. |

    | **Paths To Include** | String | No | Comma-separated list of file paths to explicitly
    include in the scan. |

    | **Paths To Exclude** | String | No | Comma-separated list of file paths to ignore
    during the scan. |

    | **Paths To Exempt** | String | No | Comma-separated list of paths to exempt
    from the exclusion list. |


    ### Additional Notes

    - Either the combination of `IOC Type` and `IOC Value` OR the `Advanced IOC` parameter
    must be configured for the action to run successfully.

    - The action returns a list of Hunt IDs which can be used in subsequent actions
    to check the status or results of the scan.
  capabilities:
