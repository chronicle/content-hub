  ai_description: >-
    ### General Description

    Retrieves the results of an IOC (Indicator of Compromise) scan or threat hunt
    from Rubrik Security Cloud. This action is designed to fetch detailed metrics
    and status information for a specific hunt identified by its ID. It supports asynchronous
    execution, allowing it to monitor the progress of a hunt that is still running.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hunt ID | String | Yes | The unique identifier of the threat hunt or IOC scan
    to retrieve results for. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Hunt ID` from the input
    parameters and validates that it is a non-empty string.

    2. **Client Initialization**: It initializes the Rubrik Security Cloud API manager
    using the provided service account credentials and handles OAuth token management.

    3. **Data Retrieval**: A GraphQL query is sent to Rubrik to fetch `threatHuntDetailV2`
    and `threatHuntObjectMetrics` for the specified ID.

    4. **Data Processing**: The raw JSON response is processed and formatted into
    a structured data model (`IOCScanResultsDatamodel`).

    5. **Output Generation**:
        *   The full JSON response is added to the action results for further processing.
        *   A data table named "IOC Scan Results" is created, containing key metrics
    such as Hunt Name, Type, Status, IOC Details, Object Metrics, and Scan Metrics.
    6. **Status Handling**: The action checks the current status of the hunt. If the
    status is `PENDING` or `IN_PROGRESS`, the action returns an `IN_PROGRESS` state
    to allow the SOAR platform to poll for completion.


    ### Additional Notes

    This action is typically used as a follow-up to the "Turbo IOC Scan" or "Advanced
    IOC Scan" actions to retrieve the final findings and metrics once the scan has
    processed the target snapshots.
