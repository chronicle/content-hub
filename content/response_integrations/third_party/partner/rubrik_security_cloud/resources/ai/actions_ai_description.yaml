  ai_description: >-
    ### General Description

    Retrieves file contexts detected by Rubrik Sonar for a specific object snapshot
    from Rubrik Security Cloud. This action allows analysts to identify sensitive
    data findings within files, folders, or file shares, providing detailed metadata
    such as file size, hit counts, access types, and modification times. It supports
    various filtering options including file name, path, and user ID to narrow down
    results.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object ID | string | Yes | The unique identifier of the object (Snappable ID)
    to retrieve file contexts for. |

    | Snapshot ID | string | Yes | The unique identifier of the snapshot associated
    with the object. |

    | File Name | string | No | Filter results by a specific file, folder, or file
    share name. |

    | File Path | string | No | Filter results by a standard file path. |

    | User ID | string | No | Filter results by a specific user ID. |

    | Include Whitelisted Results | ddl | No | Indicates whether to include results
    that have been whitelisted. Options: True, False. |

    | Limit | string | No | Maximum number of file contexts to retrieve in the response
    (default is 50). |

    | Next Page Token | string | No | The cursor token used to retrieve the next set
    of paginated results. |

    | Sort By | ddl | No | Field used to sort the response (e.g., HITS, NAME, LAST_MODIFIED).
    |

    | Sort Order | ddl | No | Specifies the order to sort the data (Asc or Desc).
    Default is Desc. |


    ### Flow Description

    1. **Parameter Validation**: Validates that the mandatory `Object ID` and `Snapshot
    ID` are provided and that the `Limit` is a valid integer.

    2. **API Initialization**: Initializes the Rubrik Security Cloud API manager using
    the provided service account credentials.

    3. **Data Retrieval**: Executes a GraphQL query to fetch Sonar file context data
    from Rubrik, applying any provided filters such as file name, path, or user ID.

    4. **Result Processing**: Parses the API response into a structured data model
    and adds the raw JSON result to the action output.

    5. **Output Generation**: Generates a data table named "Sonar File Contexts" containing
    key file metadata and provides a status message summarizing the number of records
    retrieved.


    ### Additional Notes

    - The action hardcodes the timezone to 'UTC' for the query.

    - The data table displayed in the SOAR interface is limited to the first 20 records
    for performance and readability.
