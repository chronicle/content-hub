Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between the Google SecOps SOAR server and\
    \ the Rubrik Security Cloud instance. It ensures that the provided credentials\
    \ (Service Account JSON) are valid and that the network path to the Rubrik GraphQL\
    \ API is open. This action is typically used during the initial setup of the integration\
    \ or for troubleshooting communication issues.\n\n### Parameters Description\n\
    There are no parameters for this action.\n\n### Additional Notes\nThis action\
    \ relies on the integration-level configuration parameters: `Service Account JSON`\
    \ and `Verify SSL`. If the Service Account JSON is missing the `client_id` or\
    \ `access_token_uri`, the action will fail during initialization.\n\n### Flow\
    \ Description\n1. **Initialization**: The action initializes the Siemplify SDK\
    \ and retrieves the global integration configuration parameters.\n2. **API Manager\
    \ Setup**: It instantiates the `APIManager`, which automatically handles OAuth\
    \ token management, including fetching cached tokens from encrypted storage or\
    \ generating a new token if necessary.\n3. **Connectivity Test**: The action calls\
    \ the `test_connectivity` method, which executes a simple GraphQL query (`deploymentVersion`)\
    \ against the Rubrik Security Cloud API.\n4. **Result Handling**: \n    * If the\
    \ query succeeds, the action returns a success message and sets the connectivity\
    \ result to `True`.\n    * If an exception occurs (e.g., authentication failure,\
    \ network timeout, or server error), the action catches the error, logs the details,\
    \ and returns a failure message with the connectivity result set to `False`."
