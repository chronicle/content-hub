  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between the Google
    SecOps SOAR platform and the Rubrik Security Cloud instance. It ensures that the
    provided credentials (Service Account JSON) are valid and that the SOAR server
    can successfully communicate with the Rubrik GraphQL API.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is primarily used during the initial setup of the integration or for
    troubleshooting communication issues. It utilizes OAuth 2.0 for authentication,
    managing token generation and storage internally.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Service Account JSON` and
    `Verify SSL` settings from the integration configuration.

    2. **API Manager Initialization**: It initializes the `APIManager`, which handles
    the OAuth token lifecycle (checking for existing tokens in encrypted storage or
    generating a new one).

    3. **Connectivity Test**: The action executes a simple GraphQL query (`deploymentVersion`)
    against the Rubrik Security Cloud endpoint.

    4. **Result Reporting**: If the query succeeds, it returns a success message and
    a `True` result value. If any step fails (authentication, network error, or API
    error), it captures the exception and reports a failure.
