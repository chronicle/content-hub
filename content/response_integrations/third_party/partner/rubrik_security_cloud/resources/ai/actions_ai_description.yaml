    | End Date | String | No | The end date to get snapshots until. Supported formats:
    yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ. |

    | Snapshot Type | String | No | Comma-separated list of snapshot types to filter
    snapshots. |

    | Limit | String | No | Number of results to retrieve in the response. Maximum
    size allowed is 1000. Default is 50. |

    | Next Page Token | String | No | The next page cursor to retrieve the next set
    of results. |

    | Sort Order | Dropdown | No | Specify the order to sort the data in (Asc, Desc).
    Default is Asc. |


    ### Additional Notes

    - If both `Start Date` and `End Date` are provided, the `Start Date` must be before
    the `End Date`.


