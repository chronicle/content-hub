IOC Scan Results:
  ai_description: >-
    ### General Description

    The **IOC Scan Results** action retrieves detailed information, metrics, and status
    for a specific Turbo or Advanced Threat Hunt (IOC Scan) from Rubrik Security Cloud.
    It is designed to provide analysts with visibility into the progress and findings
    of a hunt, including scanned objects, affected snapshots, and specific IOC matches.
    This action supports asynchronous execution, meaning it can poll the status of
    a hunt until it reaches a terminal state (Succeeded or Failed).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hunt ID | String | Yes | The unique identifier of the threat hunt/IOC scan.
    This ID is typically generated when starting a Turbo or Advanced IOC scan. |


    ### Flow Description

    1. **Initialization**: The action initializes the Rubrik Security Cloud API client
    using the provided service account credentials and validates the mandatory `Hunt
    ID` parameter.

    2. **Data Retrieval**: It executes a GraphQL query to fetch both the threat hunt
    details (status, start/end times, IOC configuration) and the object metrics (total
    scanned, affected, and unaffected objects).

    3. **Result Processing**: The raw JSON response is attached to the action results
    for full visibility.

    4. **Data Visualization**: A data table titled "IOC Scan Results" is created,
    summarizing key metrics such as Hunt Name, Type, Status, IOC Details, Object Metrics
    (Scanned/Affected), and Scan Metrics (Matched Snapshots/Unique Matches).

    5. **Async Handling**: The action checks the current status of the hunt. If the
    status is `PENDING` or `IN_PROGRESS`, the action returns an `IN_PROGRESS` state
    to the SOAR platform, allowing for subsequent polling. If the hunt is finished,
    it returns a `COMPLETED` state.


    ### Additional Notes

    - This action does not initiate a new scan; it only retrieves results for an existing
    `Hunt ID`.

    - If the `Hunt ID` is not found, the action will fail with an informative error
    message.
