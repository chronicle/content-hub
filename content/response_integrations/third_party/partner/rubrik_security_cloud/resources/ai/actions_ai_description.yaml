  ai_description: >-
    Retrieves sensitive data classification hits for a specific Rubrik object (such
    as a virtual machine, database, or file set) from Rubrik Security Cloud. This
    action utilizes Rubrik Sonar, a data classification engine, to identify sensitive
    data violations within a specified lookback period. It is useful for identifying
    data exposure or compliance risks associated with specific backup objects.


    ### Flow Description:

    1. **Parameter Validation:** Validates the mandatory 'Object Name' and the optional
    'Lookback Days' (defaulting to 7 days if not provided).

    2. **Date Calculation:** Determines the target search date by subtracting the
    lookback days from the current time.

    3. **Object Discovery:** Queries the Rubrik Security Cloud GraphQL API to find
    the internal identifiers (snappableFid and snapshotFid) for the object matching
    the provided name on the calculated date.

    4. **Data Retrieval:** Executes a detailed GraphQL query to fetch sensitive hit
    metrics, including analyzer groups, specific analyzer names, and total hit counts
    for the identified object snapshot.

    5. **Output Generation:** Formats the retrieved data into a structured data table
    ('Sonar Sensitive Hits') and provides the full raw JSON response for further processing.


    ### Parameters Description:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Name | String | True | The exact name of the Rubrik object (e.g., a VM
    or Volume Group) to check for sensitive data hits. |

    | Lookback Days | String | False | The number of days in the past to look for
    scan results. Defaults to '7'. Must be a non-negative integer. |


    ### Additional Notes:

    - This action does not run on SecOps entities; it performs a search based on the
    provided 'Object Name' string.

    - If no object is found matching the name or if no snapshots exist for that object
    on the target date, the action will fail with an informative error message.
