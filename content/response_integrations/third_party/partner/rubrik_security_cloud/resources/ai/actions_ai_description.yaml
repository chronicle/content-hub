Turbo IOC Scan:
  ai_description: >-
    Initiates a Turbo IOC (Indicator of Compromise) scan across Rubrik infrastructure.
    This action is optimized for speed and allows for scanning multiple indicators
    across clusters with configurable time ranges and snapshot limits. It triggers
    a state-changing operation in Rubrik Security Cloud by starting a new threat hunt
    process.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    |-----------|------|-----------|-------------|

    | IOC | String | Yes | Comma-separated list of indicator values (e.g., file hashes)
    to scan for. |

    | Scan Name | String | No | Custom name for the new turbo threat hunt scan. If
    not provided, a name is automatically generated using the current date and time.
    |

    | Cluster ID | String | No | Comma-separated list of cluster IDs on which to perform
    the scan. If empty, the scan may apply to all available clusters. |

    | Start Time | String | No | Filter snapshots from this date. Supported formats:
    yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ. |

    | End Time | String | No | Filter snapshots until this date. Supported formats:
    yyyy-mm-dd, yyyy-mm-ddTHH:MM:SSZ. |

    | Max Snapshots Per Object | String | No | Maximum number of snapshots to scan
    per object. Must be a positive integer. |


    ### Additional Notes

    - The action validates that the 'Start Time' is chronologically before the 'End
    Time'.

    - The 'IOC' parameter specifically supports hash values (MD5, SHA1, SHA256) which
    are mapped to 'IOC_HASH' in the Rubrik GraphQL API.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves and trims all input parameters from the
    SOAR environment.

    2. **Validation**: Validates date formats, ensures 'Start Time' is before 'End
    Time', and confirms 'Max Snapshots Per Object' is a valid positive integer.

    3. **Scan Preparation**: Generates a default scan name if none was provided and
    converts comma-separated strings (IOCs and Cluster IDs) into lists.

    4. **API Interaction**: Authenticates with Rubrik Security Cloud and executes
    a GraphQL mutation (`startTurboThreatHunt`) to initiate the scan.

    5. **Result Processing**: Captures the resulting 'Hunt ID' from the API response.

    6. **Output**: Adds the raw JSON response to the action results and creates a
    data table displaying the 'Turbo Threat Hunt ID'.
  capabilities:
    can_create_case_comments: false
