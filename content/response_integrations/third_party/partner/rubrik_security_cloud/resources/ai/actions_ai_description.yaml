List Object Snapshots:
  ai_description: >-
    Retrieves a list of snapshots for a specific object from Rubrik Security Cloud
    (RSC). This action allows analysts to identify available backup points for a given
    resource, which is essential for data recovery, forensic investigations, or point-in-time
    analysis. It supports advanced filtering by date ranges and snapshot types, as
    well as pagination for large result sets.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object ID** | String | Yes | The unique identifier (FID) of the Rubrik object
    to retrieve snapshots for. |

    | **Start Date** | String | No | The beginning of the time range to filter snapshots.
    Supported formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | **End Date** | String | No | The end of the time range to filter snapshots.
    Supported formats: `yyyy-mm-dd`, `yyyy-mm-ddTHH:MM:SSZ`. |

    | **Snapshot Type** | String | No | A comma-separated list of snapshot types (e.g.,
    `OnDemand`, `Scheduled`) to filter the results. |

    | **Limit** | String | No | The maximum number of snapshots to retrieve in a single
    request. Default is 50; maximum is 1000. |

    | **Next Page Token** | String | No | A cursor used to retrieve the next page
    of results if more snapshots are available. |

    | **Sort Order** | DDL | No | Specifies whether to sort the snapshots in ascending
    (`Asc`) or descending (`Desc`) order based on creation time. Default is `Asc`.
    |


    ### Additional Notes

    - If both **Start Date** and **End Date** are provided, the **Start Date** must
    be chronologically before the **End Date**.

    - The action outputs a data table named "Object Snapshots" containing the Snapshot
    ID, Creation Date, Cluster Name, and SLA Domain Name for each result.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the mandatory `Object ID` and
    optional filters/pagination parameters from the input.

    2. **Validation:** It validates that the `Object ID` is provided, the `Limit`
    is a valid integer within bounds, and that any provided dates follow the supported
    ISO formats.

    3. **API Initialization:** It initializes the Rubrik API Manager using the provided
    Service Account credentials and handles OAuth token management.

    4. **Data Retrieval:** It executes a GraphQL query (`OBJECT_SNAPSHOTS_QUERY`)
    against the Rubrik Security Cloud endpoint to fetch the snapshot metadata.

    5. **Result Processing:** The raw JSON response is attached to the action results.
    The snapshot data is then parsed into a structured format.

    6. **Output Generation:** A data table is created for the SOAR interface, and
    a summary message is generated indicating the number of snapshots found and providing
    a pagination token if more results exist.
