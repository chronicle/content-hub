Get Sonar Sensitive Hits:
  ai_description: >-
    Retrieves sensitive data hits detected by Rubrik Sonar for a specific object within
    Rubrik Security Cloud. Rubrik Sonar is a data classification and sensitive data
    discovery engine that identifies sensitive information (like PII or PCI) within
    backups. This action allows analysts to identify which data classification policies
    were triggered and the volume of sensitive hits found on a specific resource.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the 'Object Name' and 'Lookback
    Days' from the input parameters.

    2. **Validation:** It validates that the 'Object Name' is provided and that 'Lookback
    Days' is a non-negative integer.

    3. **Date Calculation:** It calculates a search date by subtracting the lookback
    days from the current date.

    4. **Object Discovery:** It queries the Rubrik API to list all policy objects
    for the calculated date and filters the results to find the specific object matching
    the provided name.

    5. **Detail Retrieval:** Once the object is identified, it performs a second query
    to fetch detailed sensitive hit information, including analyzer names and hit
    counts.

    6. **Output Generation:** The results are formatted into a JSON object and a data
    table (limited to the top 20 records) for display in the SOAR interface.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Name | String | Yes | The exact name of the Rubrik object (e.g., a virtual
    machine or file share) to check for sensitive hits. |

    | Lookback Days | String | No | The number of days in the past to look for scan
    results. Defaults to 7 days. |


    ### Additional Notes:

    - This action does not run on SOAR entities; it requires the manual input of an
    'Object Name'.

    - The action uses GraphQL queries to interact with the Rubrik Security Cloud API.
