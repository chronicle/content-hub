Advanced IOC Scan:
  ai_description: >-
    ### General Description

    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik Security
    Cloud objects. It supports various scan configurations including IOC types, date
    ranges, file size filters, and path inclusions/exclusions.


    ### Flow Description

    1. Extracts and validates action parameters including Object ID, IOC details,
    and scan configurations.

    2. Initializes the Rubrik Security Cloud API client.

    3. Executes a GraphQL mutation (`startBulkThreatHunt`) to start the advanced IOC
    scan on the specified objects.

    4. Parses the response to extract the created threat hunt details.

    5. Returns the results as a JSON object and populates a data table with the scan
    details.


    ### Additional Notes

    Requires valid Rubrik Security Cloud service account credentials. At least one
    of the following is required: the 'Advanced IOC' parameter, or the combination
    of 'IOC Type' and 'IOC Value' parameters.
  ai_short_description: >-
    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik Security
    Cloud objects.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
