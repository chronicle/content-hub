  ai_description: >-
    The 'List Events' action retrieves a filtered list of events and activities from
    Rubrik Security Cloud (RSC). It allows analysts to query the RSC audit and activity
    logs to identify specific system behaviors, job statuses, or security-related
    events. The action supports extensive filtering by activity status, type, severity,
    object details, and time ranges. Results are returned as a raw JSON object and
    formatted into a data table for easy review within the SOAR case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sort By** | DDL | No | Specifies the field to use for sorting the response
    (e.g., Last Updated, Severity, Start Time). |

    | **Sort Order** | DDL | No | Specifies the order to sort the data (Ascending
    or Descending). |

    | **Limit** | String | No | The maximum number of results to retrieve (Default:
    50, Max: 1000). |

    | **Next Page Token** | String | No | The cursor token used to retrieve the next
    set of paginated results. |

    | **Activity Status** | String | No | Comma-separated list of statuses to filter
    by (e.g., 'Failure', 'Success', 'Running'). |

    | **Activity Type** | String | No | Comma-separated list of activity types to
    filter by (e.g., 'Backup', 'Anomaly', 'Storage'). |

    | **Severity** | String | No | Comma-separated list of severity levels (e.g.,
    'Critical', 'Warning', 'Info'). |

    | **Object Name** | String | No | Filters events based on the name of the object
    involved. |

    | **Object Type** | String | No | Comma-separated list of object types (e.g.,
    'VmwareVm', 'WindowsFileset'). |

    | **Cluster ID** | String | No | Comma-separated list of Rubrik Cluster IDs to
    filter the events. |

    | **Start Date** | String | No | The start date for the event range (Format: yyyy-mm-dd
    or ISO 8601). |

    | **End Date** | String | No | The end date for the event range (Format: yyyy-mm-dd
    or ISO 8601). |


    ### Additional Notes

    - If both **Start Date** and **End Date** are provided, the Start Date must be
    chronologically before the End Date.

    - The action uses GraphQL to communicate with Rubrik Security Cloud.

    - A maximum of 20 records are displayed in the SOAR data table to maintain performance,
    while the full result set is available in the JSON output.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts all filtering, sorting, and pagination
    parameters provided by the user.

    2. **Validation:** It validates that the 'Limit' is a positive integer and that
    the provided dates match supported formats (YYYY-MM-DD or ISO).

    3. **API Initialization:** Initializes the Rubrik APIManager using the provided
    Service Account credentials and handles OAuth token generation/refresh.

    4. **Data Retrieval:** Executes a GraphQL query (`activitySeriesConnection`) against
    the Rubrik Security Cloud endpoint with the specified filters.

    5. **Result Processing:** Parses the GraphQL response, extracts the event edges
    and pagination info, and converts the data into a structured format.

    6. **Output Generation:** Adds the full response to the action's JSON results
    and populates a data table named 'Events' in the SOAR case wall.
