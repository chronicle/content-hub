    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new advanced threat hunt scan job in Rubrik Security Cloud.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request (GraphQL mutation `startBulkThreatHunt`) to
      Rubrik Security Cloud to initiate a new threat hunt scan. This changes the state
      of the external system by creating a new scan job. It does not mutate internal
      SecOps data, update entities, create insights, or add case comments.
