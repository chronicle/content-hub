    format and the limit is within allowed bounds.

    2. Initializes the Rubrik Security Cloud API client.

    3. Executes a GraphQL query to retrieve the snapshots for the specified `Object
    ID`, applying any provided filters, limits, and sorting.

    4. Parses the response and returns the snapshot details as a JSON result.

    5. Creates a data table displaying up to 20 snapshot records for quick review.
