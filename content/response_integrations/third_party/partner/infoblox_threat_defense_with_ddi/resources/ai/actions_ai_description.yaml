  ai_description: >-
    Creates a new custom list in Infoblox Threat Defense for use in security policies.
    This action allows users to define a list of indicators (IP addresses or domains)
    along with metadata such as confidence levels, threat levels, and tags. The action
    validates the format of the provided indicators before submission and outputs
    the details of the created list into a data table on the case wall.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | True | The unique name of the Custom List to be created. |

    | Type | string | True | The type of Custom List (default is 'custom_list'). |

    | Items | string | False | Comma-separated list of indicators (IPv4, IPv6, or
    domains) to include in the list. |

    | Description | string | False | A brief description of the Custom List's purpose.
    |

    | Confidence Level | ddl | False | The confidence level for the list (High, Medium,
    Low). Default is High. |

    | Threat Level | ddl | False | The threat level for the list (High, Medium, Low,
    Info). Default is Low. |

    | Tags | string | False | A JSON object string representing tags to categorize
    the list (e.g., '{"key": "value"}'). |


    ### Additional Notes

    - The 'Items' parameter must contain valid IPv4, IPv6, or domain name formats;
    otherwise, the action will fail validation.

    - The 'Tags' parameter must be a valid JSON object string.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    and action parameters provided by the user.

    2. **Validation:** It validates that mandatory fields are present, checks that
    the 'Items' string contains valid network indicators, and ensures 'Tags' is a
    valid JSON object.

    3. **API Request:** It constructs a payload and sends a POST request to the Infoblox
    API endpoint `/api/atcfw/v1/named_lists` to create the resource.

    4. **Result Processing:** Upon success, the action parses the API response, adds
    the raw JSON to the action results, and generates a data table named 'Custom List
    Details' for the case wall.
