  ai_description: >-
    ### General Description

    Retrieves the contents and metadata of custom lists from Infoblox Threat Defense.
    This action allows users to fetch a specific list by its unique ID or search for
    multiple lists using names, types, or tag-based filters. The retrieved data includes
    list identifiers, names, descriptions, threat levels, and item counts. Results
    are presented in both a structured data table for quick review and a raw JSON
    format for downstream automation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Custom List ID | String | No | The unique identifier of the custom list to retrieve.
    If provided, other filters like Name and Tags are ignored. |

    | Name | String | No | The name of the custom list to search for. This parameter
    is used in conjunction with 'Type'. |

    | Type | String | No | The type of the custom list (default: 'custom_list'). Required
    when searching by Name. |

    | Tag Filter | String | No | Filter security policies or lists by specific tags
    using the format: `'tag_name'='tag_value'`. |

    | Tag Sort Filter | String | No | Sort the retrieved custom lists based on specific
    tags (e.g., 'Test1'). |

    | Offset | String | No | Specify the starting point for pagination (default: '0').
    |

    | Limit | String | No | Specify the maximum number of results to return (default:
    '100'). |


    ### Additional Notes

    - **Priority Logic**: If 'Custom List ID' is provided, the action fetches that
    specific list. If 'Name' and 'Type' are both provided, the action searches for
    lists matching those criteria. Otherwise, it uses the 'Tag Filter' and 'Tag Sort
    Filter'.

    - **Table Constraints**: The 'Custom List Details' table displays a maximum of
    20 records, even if the 'Limit' parameter is set higher. The full set of results
    is always available in the JSON output.


    ### Flow Description

    1. **Parameter Initialization**: Extracts configuration (API Root, API Key) and
    action parameters (ID, Name, Filters, Pagination).

    2. **Input Validation**: Validates that 'Offset', 'Limit', and 'Custom List ID'
    (if provided) are valid non-negative integers.

    3. **API Request Construction**: Determines the correct Infoblox endpoint based
    on the provided parameters, prioritizing specific IDs over general filters.

    4. **Data Retrieval**: Executes a GET request to the Infoblox Threat Defense API
    to fetch the list data.

    5. **Data Modeling**: Maps the raw API response to internal `CustomList` data
    models to extract key fields like Threat Level and Item Count.

    6. **Output Generation**: Produces a CSV-formatted data table for the UI and attaches
    the complete JSON response to the action result.
