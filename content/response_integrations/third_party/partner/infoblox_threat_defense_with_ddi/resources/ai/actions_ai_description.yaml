  ai_description: >-
    ### General Description

    Creates a new security policy in Infoblox Threat Defense. This action allows for
    the programmatic creation of security policies, enabling automated management
    of DNS security rules, network lists, and device group associations. It is useful
    for establishing baseline security postures or dynamically creating policies during
    incident response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The unique name for the new security policy. |

    | Description | String | No | A brief explanation of the policy's purpose. |

    | Rules | String | No | A JSON array of rule objects, each containing fields like
    action, type, and data. |

    | Network Lists | String | No | Comma-separated IDs of network lists to associate
    with this policy. |

    | DFPS | String | No | Comma-separated IDs of DNS Forwarding Proxies to associate
    with this policy. |

    | Roaming Device Groups | String | No | Comma-separated IDs of Roaming Device
    Groups to associate with this policy. |

    | Block DNS Rebinding | Boolean | No | Specify whether to block DNS rebinding
    attacks. Defaults to false. |

    | Safe Search | Boolean | No | Specify whether to enable safe search filtering.
    Defaults to false. |

    | Tags | String | No | A JSON object containing tags used to categorize and organize
    the Security Policy. |

    | Additional Parameters | String | No | A JSON object containing advanced parameters
    such as precedence, doh_enabled, or ecs. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    (API Root, API Key) and all user-provided action parameters.

    2. **Validation:** Validates that the 'Policy Name' is non-empty and ensures that
    'Rules', 'Tags', and 'Additional Parameters' are valid JSON strings if provided.

    3. **Payload Construction:** Constructs a structured JSON payload for the Infoblox
    API. It parses comma-separated strings for network lists and device groups into
    integer lists and validates that 'Additional Parameters' only contains supported
    keys.

    4. **API Execution:** Sends a POST request to the Infoblox `/api/atcfw/v1/security_policies`
    endpoint via the APIManager.

    5. **Result Processing:** Upon success, the action returns the full API response
    as a JSON result and populates a data table named 'Security Policy Details' with
    the ID, name, and description of the newly created policy.


    ### Additional Notes

    - The `Rules` parameter must be formatted as a JSON array of objects.

    - Supported keys for `Additional Parameters` include: `precedence`, `access_codes`,
    `doh_enabled`, `doh_fqdn`, `ecs`, `onprem_resolve`, `dfp_services`, `net_address_dfps`,
    `user_groups`, and `default_redirect_name`.
