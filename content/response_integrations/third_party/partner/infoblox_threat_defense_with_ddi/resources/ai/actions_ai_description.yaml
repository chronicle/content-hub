DNS Record Lookup:
  ai_description: >-
    ### General Description

    Performs a DNS record query in Infoblox Threat Defense to retrieve associated
    IPs, domains, or other DNS record details based on specified filters. This action
    allows analysts to search the Infoblox database for specific DNS configurations
    without needing to pivot to the external console.


    ### Flow Description

    1. Extracts the provided filtering parameters (DNS Record Filter, Tag Filter,
    Offset, Limit, Order By).

    2. Makes a GET request to the Infoblox API (`/api/ddi/v1/dns/record`) to fetch
    matching DNS records.

    3. Parses the returned records and constructs a data table containing up to the
    maximum allowed records.

    4. Returns the raw JSON response and the formatted data table to the SecOps platform.


    ### Additional Notes

    This action does not operate on SecOps entities directly; it relies entirely on
    the provided input parameters to query the Infoblox database.
