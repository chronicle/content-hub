"Initiate Indicator Intel Lookup With Dossier":
  ai_description: >-
    ### General Description

    Initiates an indicator investigation using the Infoblox Dossier service. This
    action allows analysts to perform deep-dive lookups on various indicator types
    (IP, Host, URL, Email, or Hash) to retrieve threat intelligence and contextual
    data. It supports both synchronous execution (waiting for the full report) and
    asynchronous execution (returning a Job ID for later retrieval).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Indicator Type | DDL | Yes | The category of the indicator being searched. Supported
    values: IP, Host, URL, Email, Hash. |

    | Indicator Value | String | Yes | The specific value (e.g., an IP address or
    domain name) to investigate. |

    | Source | String | No | A comma-separated list of specific threat intelligence
    sources to query within Dossier. |

    | Wait for Results | Boolean | No | Determines the execution mode. If `True`,
    the action waits for the full report. If `False`, it returns a Job ID and status
    immediately. |


    ### Additional Notes

    - This action is parameter-driven and does not automatically iterate over entities
    from the case wall. It requires manual input or mapped values for the 'Indicator
    Value' parameter.

    - When `Wait for Results` is set to `False`, the returned Job ID can be used in
    the 'Get Indicator Intel Lookup Result' action once processing is complete.

    - The action displays up to 20 records in the results table.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the indicator type, value, and execution
    preferences from the user input.

    2. **API Request:** Sends a GET request to the Infoblox Dossier API endpoint corresponding
    to the indicator type.

    3. **Execution Mode Handling:**
        - **Synchronous:** If 'Wait for Results' is enabled, the action pauses until
    the dossier report is ready, then parses the results into a CSV table using the
    `DossierWaitResult` model.
        - **Asynchronous:** If 'Wait for Results' is disabled, the action captures
    the `job_id` and `status` from the initial response and presents them in a CSV
    table using the `DossierJobResult` model.
    4. **Data Presentation:** Formats the retrieved data into a CSV table and attaches
    the raw JSON response to the action results for further use in the playbook.
