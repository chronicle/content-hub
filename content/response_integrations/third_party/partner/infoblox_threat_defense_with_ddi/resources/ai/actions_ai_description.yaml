Update Security Policy:
  ai_description: "Modifies an existing security policy's configurations or linked\
    \ lists in Infoblox Threat Defense. This action allows for comprehensive updates\
    \ to policy metadata, network associations, security rules, and advanced settings.\
    \ It first retrieves the current state of the policy to ensure that only the specified\
    \ fields are updated while preserving others. \n\n### Flow Description:\n1. **Validation:**\
    \ Validates that the provided `Security Policy ID` is a positive integer.\n2.\
    \ **Data Retrieval:** Fetches the existing configuration of the specified security\
    \ policy from Infoblox to serve as a baseline.\n3. **Payload Construction:** Merges\
    \ the user-provided parameters with the existing policy data. If a parameter is\
    \ provided as `empty`, the corresponding field is cleared; if a parameter is omitted,\
    \ the existing value is retained.\n4. **Update Execution:** Sends a PUT request\
    \ to the Infoblox API to apply the changes to the security policy.\n5. **Output\
    \ Generation:** Returns the full JSON response of the updated policy and populates\
    \ a data table with key policy details.\n\n### Parameters Description:\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Security\
    \ Policy ID | String | Yes | The unique identifier of the security policy to update.\
    \ |\n| Policy Name | String | No | The updated name for the security policy. |\n\
    | Description | String | No | The updated description. Use the keyword `empty`\
    \ to remove the existing description. |\n| Network Lists | String | No | Comma-separated\
    \ IDs of network lists to associate with this policy. Use `empty` to remove all\
    \ associations. |\n| DFPS | String | No | Comma-separated Default Forwarding Policies\
    \ (DFPs) to update. Use `empty` to remove all DFPs. |\n| Roaming Device Groups\
    \ | String | No | Comma-separated IDs of Roaming Device Groups to associate. Use\
    \ `empty` to remove all groups. |\n| Rules | String | No | A JSON array of rule\
    \ objects (action, type, data, etc.). Use `empty` to remove all rules. |\n| Safe\
    \ Search | DDL | No | Specify whether to enable (`True`) or disable (`False`)\
    \ safe search filtering. |\n| Block DNS Rebinding | DDL | No | Specify whether\
    \ to enable (`True`) or disable (`False`) protection against DNS rebinding attacks.\
    \ |\n| Tags | String | No | A JSON object containing tags to categorize the policy.\
    \ |\n| Additional Parameters | String | No | A JSON object for advanced settings\
    \ such as `precedence`, `doh_enabled`, `ecs`, or `access_codes`. |\n\n### Additional\
    \ Notes:\n- The action uses a 'merge' logic: only parameters explicitly defined\
    \ by the user (or set to `empty`) will change the existing policy configuration.\n\
    - The `Rules`, `Tags`, and `Additional Parameters` fields must be valid JSON strings."
