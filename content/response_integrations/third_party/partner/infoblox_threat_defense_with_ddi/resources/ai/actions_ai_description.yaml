    3. **Payload Construction**: It parses the input parameters, including converting
    comma-separated lists to integer lists and parsing JSON strings for rules, tags,
    and additional parameters.

    4. **API Execution**: It sends a POST request to the Infoblox API to create the
    security policy.

    5. **Result Handling**: Upon success, it adds the resulting JSON and a data table
    containing the policy details to the SOAR action results.
