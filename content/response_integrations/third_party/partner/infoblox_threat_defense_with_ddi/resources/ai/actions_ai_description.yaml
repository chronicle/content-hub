Create Custom List:
  ai_description: >-
    Creates a new custom list in Infoblox Threat Defense for use in security policies.
    This action allows users to define a list of indicators (IPv4, IPv6, or domains)
    along with metadata such as threat level, confidence level, and tags. The created
    list can then be referenced in security policies to manage traffic filtering.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name of the Custom List to create. |

    | Type | String | Yes | The type of Custom List (default: 'custom_list'). |

    | Items | String | No | Comma-separated indicators (IPs or domains) to include
    in the list. |

    | Description | String | No | A brief description of the list's purpose. |

    | Confidence Level | DDL | No | Confidence level for the list (High, Medium, Low).
    |

    | Threat Level | DDL | No | Threat level for the list (High, Medium, Low, Info).
    |

    | Tags | String | No | A JSON object string representing tags for categorization.
    |


    ### Additional Notes

    - The 'Tags' parameter must be a valid JSON object string (e.g., '{"key": "value"}').

    - The 'Items' parameter is validated to ensure all entries are valid IPv4, IPv6,
    or domain formats.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the list name, type, items, and metadata
    from the action input.

    2. **Validation:** Validates that the name and type are provided and that any
    items provided follow valid IP or domain formats.

    3. **Payload Construction:** Builds the request body, including optional fields
    like description and tags (parsed from JSON).

    4. **API Interaction:** Sends a POST request to the Infoblox `/api/atcfw/v1/named_lists`
    endpoint.

    5. **Result Processing:** Returns the API response as JSON and populates a data
    table with the new list's details.
