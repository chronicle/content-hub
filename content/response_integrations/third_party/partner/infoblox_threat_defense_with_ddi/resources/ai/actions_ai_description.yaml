    ### General Description\nRetrieves detailed IP address information from Infoblox
    DDI based on user-defined filters, state, and scope. This action is primarily
    used for searching the IPAM (IP Address Management) database to find records matching
    specific criteria such as IP address, usage state, or associated tags. It returns
    a comprehensive list of matching records, including hostnames, hardware addresses,
    and protocols.\n\n### Parameters Description\n| Parameter | Type | Mandatory |
