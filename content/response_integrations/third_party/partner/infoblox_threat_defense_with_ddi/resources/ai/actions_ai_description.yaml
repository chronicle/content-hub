  ai_description: "### General Description\nThe **Get Indicator Intel Lookup Result**\
    \ action retrieves the results of a Dossier lookup job previously initiated in\
    \ Infoblox Threat Defense. This action is designed to fetch comprehensive threat\
    \ intelligence for indicators such as IP addresses, URLs, Hostnames, Email addresses,\
    \ and File Hashes using a specific Job ID. It is typically used in automated workflows\
    \ to poll for results after an asynchronous investigation has been started.\n\n\
    ### Parameters Description\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| **Job ID** | string | Yes | The unique identifier\
    \ of the Dossier lookup job for which results are being requested. This ID is\
    \ obtained from the 'Initiate Indicator Intel Lookup With Dossier' action. |\n\
    \n### Flow Description\n1. **Parameter Extraction:** The action extracts the `Job\
    \ ID` from the input parameters and validates that it is a non-empty string.\n\
    2. **API Interaction:** It connects to the Infoblox API and performs a GET request\
    \ to the Dossier results endpoint using the provided Job ID.\n3. **Data Parsing:**\
    \ The action processes the API response, converting the raw data into a structured\
    \ format. It specifically extracts fields like the intelligence source, status,\
    \ and timestamp.\n4. **Result Reporting:** \n    *   The full JSON response from\
    \ the API is attached to the action results.\n    *   A data table named \"Dossier\
    \ Lookup Results\" is generated, displaying up to 20 records for quick analyst\
    \ review.\n5. **Finalization:** The action completes with a success message indicating\
    \ the number of dossier results retrieved for the given Job ID.\n\n### Additional\
    \ Notes\nThis action does not interact with SecOps entities directly; it operates\
    \ solely based on the provided `Job ID`. If the Job ID does not exist or the API\
    \ returns an error, the action will fail with a descriptive error message."
