  ai_description: >-
    ### General Description

    This action creates a new security policy within the Infoblox Threat Defense system.
    It allows users to define policy attributes such as name, description, rules,
    associated network lists, DNS Forwarding Proxies (DFPs), roaming device groups,
    and various security settings like DNS rebinding protection and safe search. The
