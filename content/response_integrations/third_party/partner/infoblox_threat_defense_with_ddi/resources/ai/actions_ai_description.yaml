DHCP Lease Lookup:
  ai_description: >-
    ### General Description

    This action retrieves DHCP lease information from Infoblox based on specific filter
    criteria provided by the user. It is primarily used to identify the hardware (MAC
    address), hostname, and state of a lease associated with a particular IP address
    or other network identifiers. The results are returned as a raw JSON object and
    a formatted data table within the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DHCP Lease Filter | string | No | A logical expression used to filter DHCP leases.
    For example: `address == "192.168.1.10"` or `hostname == "workstation-01"`. |

    | Offset | string | No | The starting point for pagination. Defaults to "0". |

    | Limit | string | No | The maximum number of lease records to return. Defaults
    to "100". |

    | Order By | string | No | A comma-separated list of fields to sort the results
    by (e.g., `address asc`). |


    ### Additional Notes

    - This action does not automatically process entities from the current alert or
    case. It relies entirely on the `DHCP Lease Filter` parameter to define the search
    scope.

    - The data table displayed in the UI is limited to the first 20 records for readability,
    while the full result set is available in the JSON output.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the filter, offset, limit, and
    sorting parameters from the user input.

    2. **Validation:** It validates that the `Offset` and `Limit` parameters are valid
    non-negative integers.

    3. **API Interaction:** It sends a GET request to the Infoblox DDI API endpoint
    `/api/ddi/v1/dhcp/lease` with the specified filters and pagination settings.

    4. **Data Processing:** The raw API response is captured. If records are found,
    they are mapped to a internal data model.

    5. **Output Generation:** The action attaches the full JSON response to the script
    results and constructs a CSV-formatted data table named "DHCP Leases" for the
    analyst view.
