DNS Record Lookup:
  ai_description: >-
    ### General Description\nPerforms a DNS record query within Infoblox Threat Defense
    and DDI to retrieve associated IP addresses or domains. This action allows users
    to search for specific DNS records using flexible filtering criteria, including
    record types, zone names, and tags. It supports pagination and custom sorting
    to manage large result sets. The retrieved data is presented as a JSON object
    and a formatted data table for analyst review.\n\n### Flow Description\n1. **Parameter
    Initialization:** Retrieves and validates input parameters including DNS filters,
    tag filters, pagination offsets, and limits.\n2. **API Request:** Executes a GET
    request to the Infoblox DDI API endpoint for DNS records.\n3. **Data Processing:**
    Parses the API response into structured DNS record models.\n4. **Output Generation:**
    Populates the action results with the raw JSON response and creates a 'DNS Records'
    data table in the SecOps case.\n\n### Parameters Description\n| Parameter | Type
    | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| DNS Record Filter
    | String | No | Logical expression to filter DNS records (e.g., `type=='PTR'`).
    |\n| Tag Filter | String | No | Logical expression to filter records by assigned
    tags. |\n| Offset | String | No | The starting index for pagination (defaults
    to 0). |\n| Limit | String | No | The maximum number of records to return (defaults
    to 100). |\n| Order By | String | No | Comma-separated fields to sort results
    (e.g., `name desc`). |\n\n### Additional Notes\nThis action does not run on specific
    entities but rather performs a global search based on the provided parameters.
