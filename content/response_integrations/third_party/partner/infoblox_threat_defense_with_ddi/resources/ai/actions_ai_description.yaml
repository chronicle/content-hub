Get SOC Insights Events:
  ai_description: >-
    ### General Description

    The **Get SOC Insights Events** action retrieves a detailed list of security events
    associated with a specific SOC Insight ID from Infoblox Threat Defense. This action
    allows security analysts to investigate the underlying telemetry, DNS queries,
    and policy actions that contributed to a specific threat detection or insight,
    providing granular visibility into the observed malicious activity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Insight ID** | String | Yes | The unique identifier of the SOC insight to
    query. |

    | **Device IP** | String | No | Filters the results to events involving a specific
    device IP address. |

    | **Query** | String | No | Filters events by a specific DNS query string (e.g.,
    a malicious domain). |

    | **Query Type** | String | No | Filters events by DNS record types (e.g., A,
    TXT, MX). |

    | **Source** | String | No | Filters events by the threat intelligence source
    or feed (e.g., DFP). |

    | **Indicator** | String | No | Filters events by a specific threat indicator
    such as a domain, IP, or hash. |

    | **Threat Level** | DDL | No | Filters events by severity level. Options: All,
    Info, Low, Medium, High. |

    | **Confidence Level** | DDL | No | Filters events by confidence level. Options:
    All, Low, Medium, High. |

    | **Limit** | String | No | The maximum number of events to return. Defaults to
    100. |

    | **From** | String | No | Start time for the event search in YYYY-MM-DDTHH:mm:ss.SSS
    format. |

    | **To** | String | No | End time for the event search in YYYY-MM-DDTHH:mm:ss.SSS
    format. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory Insight ID and
    optional filter criteria (IP, Query, Source, Time range, etc.) from the user input.

    2. **Validation:** It validates that the Insight ID is non-empty and that the
    Limit parameter is a valid positive integer.

    3. **API Request:** The action sends a GET request to the Infoblox SOC Insights
    API endpoint for events, applying all provided filter parameters.

    4. **Data Processing:** The retrieved events are parsed into a structured format,
    capturing details such as Device Name, Action taken, Security Policy triggered,
    and Threat Family.

    5. **Output Generation:** A data table named 'SOC Insight Events' is created (showing
    up to 20 records for readability), and the full raw JSON response is attached
    to the action results for further analysis.


    ### Additional Notes

    - If the 'Threat Level' or 'Confidence Level' is set to 'All', the filter is ignored
    to return all available levels.

    - The action will return a success status even if no events are found, provided
    the Insight ID is valid.
