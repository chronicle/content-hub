  ai_description: >-
    ### General Description

    Performs a DNS record query in Infoblox Threat Defense with DDI to retrieve associated
    IP addresses or domains based on user-defined filter criteria. This action is
    useful for broad searches across the DNS infrastructure, allowing analysts to
    find records matching specific types, zones, or tags without needing to target
    a specific entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DNS Record Filter | String | No | Filter DNS records by specific criteria using
    logical expressions (e.g., `type=="PTR"` and `absolute_zone_name == "Test"`).
    |

    | Tag Filter | String | No | Filter DNS records by specific tags using logical
    expressions (e.g., `'nios/federation_enabled'==true`). |

    | Offset | String | No | Specify the offset from where to start pagination. Defaults
    to "0". |

    | Limit | String | No | Specify the maximum number of results to return. Defaults
    to "100". |

    | Order By | String | No | Comma-separated JSON fields to sort the results. Supports
    `asc` or `desc` for direction and dot notation for nested fields. |


    ### Additional Notes

    - This action does not process specific SecOps entities; it is a global lookup
    action based on the provided filter parameters.

    - The action limits the number of records displayed in the UI data table to a
    predefined maximum (20) to ensure readability, while the full result set is available
    in the JSON output.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the integration configuration
    and extracts the user-provided filters, pagination, and sorting parameters.

    2. **Validation**: The `Offset` and `Limit` parameters are validated to ensure
    they are valid, non-negative integers.

    3. **API Request**: The action calls the Infoblox API manager to perform a GET
    request against the DNS record endpoint (`/api/ddi/v1/dns/record`) using the constructed
    query parameters.

    4. **Data Processing**: The raw API response is parsed, and the DNS records are
    mapped to the `DNSRecord` data model.

    5. **Output Generation**: The action populates a data table named "DNS Records"
    with the formatted results and attaches the complete raw JSON response to the
    action results.
