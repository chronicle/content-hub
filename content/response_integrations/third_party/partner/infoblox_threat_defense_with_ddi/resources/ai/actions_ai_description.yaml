  ai_description: >-
    ### General Description

    Creates a new custom list within the Infoblox Threat Defense platform. This action
    allows users to define a new list by specifying its name, type, and optional attributes
    such as description, confidence level, threat level, and tags. The action interacts
    with the Infoblox API to provision the list and returns the created list details
    in the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | The name of the Custom List to create. |

    | Type | string | Yes | The type of Custom List to create (default: 'custom_list').
    |

    | Items | string | No | Comma-separated items to include in the Custom List. |

    | Description | string | No | A description for the Custom List. |

    | Confidence Level | ddl | No | The confidence level for this list (Options: High,
    Medium, Low; default: 'High'). |

    | Threat Level | ddl | No | The threat level for this list (Options: High, Medium,
    Low, Info; default: 'Low'). |

    | Tags | string | No | Tags to categorize and organize the Custom List. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the required configuration (API
    root, key, SSL verification) and action-specific parameters.

    2. **Input Validation**: Validates that the 'Name' and 'Type' parameters are provided
    and that any provided items are valid indicators.

    3. **Payload Construction**: Builds the JSON payload containing the list details,
    including optional fields like description, confidence level, threat level, and
    tags.

    4. **API Interaction**: Sends a POST request to the Infoblox API endpoint (`/api/atcfw/v1/named_lists`)
    to create the custom list.

    5. **Result Reporting**: Adds the API response as a JSON result and generates
    a data table summarizing the created custom list details in the action output.
