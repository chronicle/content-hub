  ai_description: >-
    ### General Description

    This action creates a new security policy within the Infoblox Threat Defense system.
    It allows users to define policy attributes such as name, description, rules,
    associated network lists, DNS Forwarding Proxies (DFPs), roaming device groups,
    and various security settings like DNS rebinding protection and safe search. The
    action constructs a payload based on the provided parameters and sends a POST
    request to the Infoblox API to provision the new policy.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | string | Yes | The name of the security policy to create. |

    | Description | string | No | A description for the security policy. |

    | Rules | string | No | A JSON array of objects defining security rules (action,
    type, data, policy_name, redirect_name). |

    | Network Lists | string | No | Comma-separated IDs of network lists to associate
    with the policy. |

    | DFPS | string | No | Comma-separated IDs of DNS Forwarding Proxies to associate
    with the policy. |

    | Roaming Device Groups | string | No | Comma-separated IDs of Roaming Device
    Groups to associate with the policy. |

    | Block DNS Rebinding | boolean | No | Whether to block DNS rebinding attacks
    (default: false). |

    | Safe Search | boolean | No | Whether to enable safe search filtering (default:
    false). |

    | Tags | string | No | JSON object containing tags to categorize the policy. |

    | Additional Parameters | string | No | JSON object for additional settings (e.g.,
    precedence, access_codes, doh_enabled). |


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API root,
    key, SSL verification) and action parameters.

    2. **Validation**: It validates that the mandatory `Policy Name` is provided.

    3. **Payload Construction**: It parses the input parameters, including converting
    comma-separated lists to integer lists and parsing JSON strings for rules, tags,
    and additional parameters.

    4. **API Execution**: It sends a POST request to the Infoblox API to create the
    security policy.

    5. **Result Handling**: Upon success, it adds the resulting JSON and a data table
    containing the policy details to the SOAR action results.
