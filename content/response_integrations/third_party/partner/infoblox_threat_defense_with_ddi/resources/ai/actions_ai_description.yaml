  ai_description: >-
    ### General Description

    The **Get Network List** action retrieves the contents and metadata of network
    lists from Infoblox Threat Defense. It allows users to fetch a specific list by
    its unique identifier or search for multiple lists using logical filter expressions.
    This action is primarily used for auditing existing network configurations or
    verifying the contents of CIDR/IP blocks managed within the Infoblox environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Network List ID** | String | No | The unique identifier of the network list
    to retrieve. If provided, the action fetches only this specific list and ignores
    the filter parameter. |

    | **Security Network Filter** | String | No | A logical expression string (e.g.,
    `name == 'net_list1'`) used to filter the returned network lists based on specific
    criteria. |

    | **Offset** | String | No | The pagination offset indicating where to start the
    results. Default is "0". |

    | **Limit** | String | No | The maximum number of results to return in a single
    request. Default is "100". |


    ### Flow Description

    1. **Parameter Initialization**: The action extracts the API configuration (Root,
    Key, SSL) and the user-provided parameters including the Network List ID, filter,
    offset, and limit.

    2. **Validation**: It validates that the `Network List ID` (if provided), `Offset`,
    and `Limit` are valid non-negative integers.

    3. **API Request**: It sends a GET request to the Infoblox `/api/atcfw/v1/network_lists`
    endpoint. If a specific `Network List ID` is provided, it appends the ID to the
    URL to target that specific resource.

    4. **Data Processing**: The retrieved JSON data is added to the action's result
    JSON.

    5. **Output Generation**: If results are found, the action creates a data table
    in the SOAR case displaying the Network List ID, Name, Description, and Security
    Policy ID for up to 20 records.


    ### Additional Notes

    - If the **Network List ID** is provided, the **Security Network Filter** is ignored
    by the Infoblox API.

    - The action supports pagination through the **Offset** and **Limit** parameters
    to handle large sets of network lists.
