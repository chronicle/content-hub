  ai_description: >-
    Updates an existing network list in Infoblox Threat Defense with a new name, items,
    or description. This action allows for granular updates to network lists used
    for security policies. If optional parameters like Name, Items, or Description
    are not provided, the action fetches the current configuration from Infoblox and
    preserves the existing values. The action also supports clearing the description
    field using a specific keyword.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the Network List ID (mandatory)
    and optional fields (Name, Items, Description) from the user input.

    2. **Validation:** Validates that the Network List ID is a positive integer.

    3. **Data Retrieval:** Fetches the current state of the specified network list
    from the Infoblox API to ensure that any fields not being updated retain their
    current values.

    4. **Payload Construction:** Merges the new inputs with the existing data. If
    the 'Description' parameter is set to 'empty', the field is cleared.

    5. **External Update:** Sends a PUT request to the Infoblox API to update the
    network list.

    6. **Output Generation:** Returns the updated network list details as a JSON object
    and populates a data table named 'Network List Details' in the SecOps platform.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Network List ID | string | True | The unique identifier of the network list
    to be updated. Must be a positive integer. |

    | Name | string | False | The new name for the network list. If omitted, the current
    name is kept. |

    | Items | string | False | A comma-separated list of items (e.g., IP addresses
    or CIDRs) to include in the network list. If omitted, current items are kept.
    |

    | Description | string | False | A new description for the network list. Use the
    keyword `empty` to remove the existing description. If omitted, the current description
    is kept. |


    ### Additional Notes:

    - This action performs a 'Read-Modify-Write' pattern by fetching current data
    before updating to prevent accidental data loss of non-specified fields.
