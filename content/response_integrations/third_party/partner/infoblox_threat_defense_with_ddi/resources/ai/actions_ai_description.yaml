Indicator Threat Lookup With TIDE:
  ai_description: >-
    ### General Description

    Looks up threat intelligence details for specific indicators or criteria using
    Infoblox TIDE (Threat Intelligence Data Exchange). This action allows analysts
    to query the TIDE database for reputation data, threat levels, and classifications
    associated with IP addresses, hostnames, URLs, email addresses, or file hashes.
    It supports filtering by domain, top-level domain (TLD), threat class, and target,
    providing a comprehensive view of known threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Indicator Type | ddl | No | Specify the type of indicator to search for (Host,
    IP, URL, Email, Hash, All). Default is 'All'. |

    | Indicator Value | string | No | Specify the indicator value(s) based on the
    indicator type you want to search for. |

    | Domain | string | No | Specify the comma-separated domain(s) to search for.
    |

    | Top-Level Domain | string | No | Specify the comma-separated top-level domain(s)
    to search for. |

    | Threat Class | string | No | Specify the comma-separated threat class(es) to
    search for. |

    | Target | string | No | Specify the comma-separated target(s) to search for.
    |

    | Expiration | string | No | Period of time after which data is no longer considered
    active (ISO8601 format). |

    | Limit | string | No | Specify the maximum number of results to return. Default
    is 1000. |


    ### Additional Notes

    - If 'Indicator Type' is set to a specific value (e.g., IP), the 'Indicator Value'
    parameter should be populated to perform a targeted lookup.

    - The action returns a maximum of 20 records in the UI data table for readability,
    while the full results are available in the JSON output.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and user-provided
    search parameters, including indicator details and filtering criteria.

    2. **Validation:** It validates the 'Limit' parameter to ensure it is a valid
    positive integer.

    3. **API Request:** It constructs a GET request to the Infoblox TIDE threats endpoint
    (`/tide/api/data/threats`) using the provided filters.

    4. **Data Processing:** The action parses the API response, iterating through
    the identified threats and mapping them to a structured data model.

    5. **Output Generation:** It attaches the complete raw JSON response to the action
    results and constructs a data table summarizing the key threat details (Indicator,
    Type, Threat Level, Class, etc.).

    6. **Completion:** The action concludes by reporting the number of threat records
    found or indicating if no data was retrieved.
