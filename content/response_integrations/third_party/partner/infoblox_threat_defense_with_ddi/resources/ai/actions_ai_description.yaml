Create Custom List:
  ai_description: >-
    ### General Description

    Creates a new custom list for use in security policies within Infoblox Threat
    Defense with DDI.


    ### Flow Description

    1. Extracts the provided action parameters including the list name, type, items,
    description, confidence level, threat level, and tags.

    2. Validates the required parameters and ensures that any provided items match
    valid indicator formats (IPv4, IPv6, or domain).

    3. Constructs a JSON payload with the provided details.

    4. Initiates a POST request to the Infoblox API (`/api/atcfw/v1/named_lists`)
    to create the custom list.

    5. Returns the created custom list details as a JSON result and populates a data
    table with the list information.


    ### Additional Notes

    None
