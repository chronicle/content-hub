    Tag Sort Filter, Offset, and Limit.

    2. Validates the integer parameters (Offset, Limit, and Custom List ID).

    3. Makes a GET request to the Infoblox API to retrieve the custom list(s) matching
    the provided criteria.

    4. Parses the API response and constructs a data table containing the custom list
    details.

    5. Returns the retrieved data as a JSON object and displays it in a table view.


