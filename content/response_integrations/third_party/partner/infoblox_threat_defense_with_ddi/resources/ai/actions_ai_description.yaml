Update Custom List Items:
  ai_description: "Updates the items within an existing Infoblox Custom List. This\
    \ action allows users to either add or remove specific indicators\u2014such as\
    \ IPv4 addresses, IPv6 addresses, or domain names\u2014from a designated list\
    \ identified by its ID. It performs data validation on the provided items to ensure\
    \ they conform to standard networking formats before communicating with the Infoblox\
    \ API via a PATCH request.\n\n### Flow Description:\n1. **Parameter Extraction:**\
    \ Retrieves the Custom List ID, the desired action (Add or Remove), and the comma-separated\
    \ string of items from the action parameters.\n2. **Validation:** Validates that\
    \ the Custom List ID is a positive integer and parses the items string into a\
    \ list. Each item is checked against regex patterns for valid IPv4, IPv6, or domain\
    \ name formats.\n3. **API Interaction:** Sends a PATCH request to the Infoblox\
    \ endpoint `/api/atcfw/v1/named_lists/{custom_list_id}/items` with a payload containing\
    \ the items to be inserted or deleted.\n4. **Result Processing:** Analyzes the\
    \ API response to determine the number of items successfully added, removed, or\
    \ updated, and provides a summary message to the user.\n\n### Parameters Description:\n\
    | Parameter Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Custom List ID | String | Yes | The unique numerical identifier of the\
    \ Infoblox Custom List to be modified. |\n| Action | DDL | Yes | Specifies whether\
    \ to 'Add' or 'Remove' the provided items from the list. |\n| Items | String |\
    \ Yes | A comma-separated list of indicators (IPs or Domains) to be processed.\
    \ |\n\n### Additional Notes:\n- This action does not run on SOAR entities; it\
    \ processes data provided directly through the 'Items' parameter.\n- If no items\
    \ are successfully modified, the action will return a message indicating no changes\
    \ were made."
