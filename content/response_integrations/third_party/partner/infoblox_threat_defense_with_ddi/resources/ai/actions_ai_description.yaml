  ai_description: >-
    ### General Description

    Creates a new network list in Infoblox Threat Defense. Network lists are used
    to define specific sets of IP addresses or CIDR blocks where security policies
    should be applied. This action allows for the programmatic creation of these containers
    to streamline security policy management.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Name | The unique name for the network list being created. | String | Yes |

    | Items | A comma-separated list of items (e.g., IPv4 addresses, IPv6 addresses,
    or CIDR blocks) to be included in the network list. | String | Yes |

    | Description | A brief explanation or context for the network list. | String
    | No |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Name`, `Items`, and `Description`
    from the user input.

    2. **Validation:** It validates that the `Name` and `Items` strings are not empty
    and converts the `Items` string into a list format.

    3. **API Interaction:** The action uses the `APIManager` to send a POST request
    to the Infoblox `/api/atcfw/v1/network_lists` endpoint with the provided details.

    4. **Data Processing:** Upon a successful response, the action parses the returned
    data into a `NetworkList` object.

    5. **Output Generation:** The action populates a data table named "Network List
    Details" with the ID, Name, and Description of the new list and provides the full
    raw JSON response for further use in playbooks.
