Get Network List:
  ai_description: >-
    ### General Description

    The **Get Network List** action retrieves the contents and metadata of network
    lists from the Infoblox Threat Defense platform. This action allows analysts to
    fetch specific network lists by their unique ID or to search through available
    lists using logical filter expressions. It is useful for auditing network configurations
    or dynamically retrieving list details for use in security playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Network List ID | String | No | The unique identifier of a specific network
    list. If provided, the action fetches this specific list directly, ignoring other
    filters. |

    | Security Network Filter | String | No | A logical expression string (e.g., `name
    == 'net_list1'`) used to filter the collection of network lists returned by the
    API. |

    | Offset | String | No | The pagination offset specifying the starting point of
    the results. Defaults to "0". |

    | Limit | String | No | The maximum number of network lists to return in the response.
    Defaults to "100". |


    ### Additional Notes

    - The action validates that the `Network List ID`, `Offset`, and `Limit` are valid
    non-negative integers before execution.

    - Results are presented in a structured data table (limited to the first 20 records
    for display) and the full raw response is attached as a JSON result.


    ### Flow Description

    1. **Parameter Initialization**: The action extracts integration configuration
    (API Root, API Key) and user-provided parameters.

    2. **Validation**: It validates that the pagination parameters and the Network
    List ID (if provided) are correctly formatted integers.

    3. **API Request**: The action performs a GET request to the Infoblox `/api/atcfw/v1/network_lists`
