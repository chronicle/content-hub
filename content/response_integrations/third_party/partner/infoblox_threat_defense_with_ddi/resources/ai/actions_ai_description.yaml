Update Security Policy:
  ai_description: >-
    ### General Description

    Modifies an existing security policy's configurations or linked lists in Infoblox
    Threat Defense. This action allows users to update various settings of a security
    policy, such as its name, description, associated network lists, rules, and tags.


    ### Flow Description

    1. Extracts the provided Security Policy ID and other optional configuration parameters
    (e.g., Policy Name, Description, Rules, Tags).

    2. Makes a GET request to the Infoblox API to fetch the existing security policy
    details. This ensures that current values are retained for any fields not explicitly
    provided in the action inputs.

    3. Constructs a JSON payload merging the existing data with the newly provided
    updates.

    4. Makes a PUT request to the Infoblox API to update the security policy with
    the new payload.

    5. Returns the updated policy details as a JSON result and populates a data table
    in the SecOps platform.


    ### Additional Notes

