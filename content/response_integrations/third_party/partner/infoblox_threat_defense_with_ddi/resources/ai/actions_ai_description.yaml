Get Custom List:
  ai_description: >-
    ### General Description

    The **Get Custom List** action retrieves the contents and metadata of custom lists
    from Infoblox Threat Defense. This action allows analysts to audit existing lists,
    verify configurations such as threat levels and confidence scores, or discover
    list IDs for use in other automation tasks. It supports fetching a specific list
    by its unique ID or searching for lists based on name, type, and tags.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Custom List ID** | String | No | The unique identifier of the specific custom
    list to retrieve. If provided, this takes precedence over other filters. |

    | **Name** | String | No | The name of the custom list to search for. This parameter
    is used in conjunction with the **Type** parameter. |

    | **Type** | String | No | The type of the custom list (e.g., 'custom_list').
    Defaults to 'custom_list'. |

    | **Tag Filter** | String | No | Filter security policies or lists by specific
    tags using the format `'tag_name'='tag_value'`. |

    | **Tag Sort Filter** | String | No | Sort the retrieved custom lists based on
    specific tags (e.g., 'Test1'). |

    | **Offset** | String | No | The starting point for pagination (default is '0').
    |

    | **Limit** | String | No | The maximum number of results to return (default is
    '100'). |


    ### Additional Notes

    - If **Custom List ID** is provided, the action fetches that specific list directly,
    ignoring other filters.

    - If both **Name** and **Type** are provided, the action performs a targeted search
    for a list matching those criteria.

    - If no specific identifiers are provided, the action returns a paginated list
    of all available custom lists, optionally filtered by tags.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the API configuration and user-provided
    search parameters from the environment.

    2. **Validation:** Integer-based parameters such as `Offset`, `Limit`, and `Custom
    List ID` are validated to ensure they are non-negative integers.

    3. **API Request:** The action constructs a GET request to the Infoblox API. The
    endpoint varies based on whether a specific ID, a name/type pair, or general filters
    are provided.

    4. **Data Processing:** The raw API response is parsed using the `CustomList`
    data model to extract key fields like ID, Name, Description, Confidence Level,
    and Threat Level.

    5. **Output Generation:** The action populates a data table titled 'Custom List
    Details' with the processed information and attaches the full raw JSON response
    to the action results.
