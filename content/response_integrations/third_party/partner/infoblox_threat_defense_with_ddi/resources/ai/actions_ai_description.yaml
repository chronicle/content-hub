Get SOC Insights Assets:
  ai_description: >-
    Retrieves a list of assets associated with a specific SOC Insight ID from Infoblox
    Threat Defense. This action allows analysts to identify which devices or users
    were involved in a particular security insight, providing critical context for
    investigation. The results can be filtered by IP address, MAC address, operating
    system version, or associated user, and the output is presented both as a raw
    JSON and a formatted data table within the case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Insight ID | String | Yes | The unique identifier of the Infoblox SOC Insight
    to query assets for. |

    | Asset IP | String | No | Filter the results to only include assets matching
    this IP address. |

    | MAC Address | String | No | Filter the results to only include assets matching
    this MAC address. |

    | OS Version | String | No | Filter the results to only include assets running
    this specific operating system version. |

    | User | String | No | Filter the results to only include assets associated with
    this specific username. |

    | Limit | String | No | The maximum number of asset records to return (default
    is 100). |

    | From | String | No | Filter for assets changed after this timestamp (Format:
    YYYY-MM-DDTHH:mm:ss.SSS). |

    | To | String | No | Filter for assets changed before this timestamp (Format:
    YYYY-MM-DDTHH:mm:ss.SSS). |


    ### Additional Notes

    - This action does not run on entities; it requires a specific Insight ID as input.

    - The data table displayed in the UI is limited to the first 20 records for readability,
    while the full results are available in the JSON output.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Insight ID and optional
    filters (IP, MAC, OS, User, Time range, and Limit) from the user input.

    2. **Validation:** It validates that the Insight ID is provided and that the Limit
    is a valid positive integer.

    3. **API Request:** It sends a GET request to the Infoblox API endpoint for the
    specified Insight's assets, applying the provided filters as query parameters.

    4. **Data Processing:** The response is parsed, and asset data is mapped to a
    structured data model.

    5. **Output Generation:** The action adds the full API response as a JSON result
    and constructs a CSV-formatted data table named 'Assets' containing key details
    like IP, MAC, OS, and User for the retrieved assets.
