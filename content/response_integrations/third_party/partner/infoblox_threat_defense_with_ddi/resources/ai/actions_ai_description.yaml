  ai_description: >-
    Retrieves DHCP lease information from Infoblox Threat Defense based on specified
    filter criteria.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | DHCP Lease Filter | String | False | Filter criteria for the DHCP leases (e.g.,
    address == "127.0.0.1" and hostname == "ubuntu"). |

    | Offset | String | False | Specify the offset from where to start pagination.
    Defaults to 0. |

    | Limit | String | False | Specify the maximum number of results to return. Defaults
    to 100. |

    | Order By | String | False | Comma-separated JSON fields to sort the results.
    Use asc or desc for sort direction. Supports dot notation for nested fields. |


    ### Flow Description

    1. Initializes the action and extracts the provided configuration and action parameters.

    2. Validates the `Offset` and `Limit` parameters to ensure they are valid integers.

    3. Calls the Infoblox API (`GET /api/ddi/v1/dhcp/lease`) to retrieve DHCP lease
    records matching the specified filter.

    4. Adds the raw JSON response to the action results.

    5. Constructs a CSV table of the retrieved leases (up to a maximum limit of 20)
    and attaches it to the case.

    6. Returns a success message with the count of retrieved records, or an error
    message if the operation fails.
