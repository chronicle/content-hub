Update Custom List:
  ai_description: >-
    ### General Description

    Updates the metadata of an existing custom list in Infoblox Threat Defense. This
    action allows users to modify the name, description, confidence level, threat
    level, and tags associated with a specific custom list identified by its ID. It
    ensures data consistency by fetching the current state of the list and only updating
    the fields provided by the user.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Custom List ID** | String | Yes | The unique ID of the custom list to update.
    Must be a positive integer. |

    | **Name** | String | No | The new name for the custom list. If not provided,
    the existing name is preserved. |

    | **Description** | String | No | The new description for the custom list. Use
    the keyword `empty` to remove the existing description. |

    | **Confidence Level** | DDL | No | The new confidence level (High, Medium, Low).
    If not provided, the existing level is preserved. |

    | **Threat Level** | DDL | No | The new threat level (High, Medium, Low, Info).
    If not provided, the existing level is preserved. |

    | **Tags** | String | No | A JSON object string representing tags to categorize
    the list. Use the keyword `empty` to remove all existing tags. |


    ### Additional Notes

    - The action performs a 'read-before-write' operation: it fetches the existing
    list configuration first to inherit values for any parameters that are not explicitly
    provided in the action configuration.

    - The `Custom List ID` must be a valid positive integer greater than zero.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Custom List ID and optional metadata
    fields (Name, Description, Levels, Tags) from the action input.

    2. **Validation**: Validates that the `Custom List ID` is a valid positive integer.

    3. **State Retrieval**: Calls the Infoblox API to fetch the current configuration
    of the specified custom list.

    4. **Payload Construction**: Merges the user-provided updates with the existing
    list data. If a parameter is missing, the existing value is used; if the keyword
    `empty` is used, the field is cleared.

    5. **API Update**: Sends a `PUT` request to the Infoblox `/api/atcfw/v1/named_lists/{id}`
    endpoint with the constructed payload.

    6. **Result Processing**: Parses the API response, adds the full JSON result to
    the action output, and generates a 'Custom List Details' data table for the analyst.
