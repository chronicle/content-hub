Create Network List:
  ai_description: >-
    ### General Description

    Creates a new network list in Infoblox Threat Defense. Network lists are used
    to group IP addresses or CIDR blocks, which can then be referenced in security
    policies to define where specific security rules should be applied.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name for the network list to be created. |

    | Items | String | Yes | A comma-separated list of IP addresses or CIDR blocks
    to include in the network list. |

    | Description | String | No | A descriptive text providing more context about
    the network list. |


    ### Additional Notes

    This action does not operate on SecOps entities. It uses the provided input parameters
    to create a resource directly in the Infoblox platform. If the network list name
    already exists, the action will fail.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Name`, `Items`, and `Description`
    from the user input.

    2. **Validation**: It ensures that the mandatory `Name` and `Items` fields are
    populated and converts the comma-separated `Items` string into a list format.

    3. **API Interaction**: The action sends a POST request to the Infoblox API endpoint
    `/api/atcfw/v1/network_lists` with the provided details.

    4. **Result Processing**: Upon success, it parses the response into a `NetworkList`
    data model, adds the raw JSON to the action results, and creates a data table
    named 'Network List Details' containing the ID, Name, and Security Policy ID of
    the new list.
