Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the Infoblox Threat Defense with DDI platform. It ensures that the
    provided API Root and API Key are valid and that the network path is open.


    ### Parameters Description

    There are no input parameters for this action. It relies solely on the integration's
    global configuration settings (API Root, API Key, and Verify SSL).


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connection issues. It performs a read-only request to the Infoblox
    account endpoint.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the global integration parameters.

    2. **Connectivity Test**: It calls the `test_connectivity` method in the APIManager,
    which sends a GET request to the `/api/authn/v1/account` endpoint.

    3. **Validation**: The action validates the API response. If the status code is
    successful, it confirms connectivity.

    4. **Completion**: The action ends by returning a success or failure message along
    with a boolean result indicating the connection status.
