Create Security Policy:
  ai_description: >-
    Creates a new security policy in Infoblox Threat Defense. This action allows for
    the comprehensive definition of security policies, including rules, network list
    associations, DNS Forwarding Proxy (DFP) assignments, and roaming device group
    configurations. It also supports enabling security features such as DNS rebinding
    protection and safe search filtering.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the policy name, description,
    rules, network lists, DFPs, roaming device groups, and other configuration settings
    from the input parameters.

    2. **Validation:** It validates that the mandatory 'Policy Name' is provided and
    ensures that complex parameters like 'Rules', 'Tags', and 'Additional Parameters'
    are valid JSON strings.

    3. **Payload Construction:** A JSON payload is constructed, converting comma-separated
    lists into integer arrays and parsing JSON strings into objects.

    4. **API Interaction:** The action sends a POST request to the Infoblox API to
    create the security policy.

    5. **Result Processing:** Upon success, the action returns the raw JSON response
    and populates a data table with the new policy's ID, name, description, and default
    action.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | True | The unique name for the new security policy. |

    | Description | String | False | A brief description of the security policy's
    purpose. |

    | Rules | String | False | A JSON array of rule objects defining actions (e.g.,
    block, allow) and criteria. |

    | Network Lists | String | False | Comma-separated IDs of network lists to associate
    with the policy. |

    | DFPS | String | False | Comma-separated IDs of DNS Forwarding Proxies to associate
    with the policy. |

    | Roaming Device Groups | String | False | Comma-separated IDs of roaming device
    groups to associate with the policy. |

    | Block DNS Rebinding | Boolean | False | If true, enables protection against
    DNS rebinding attacks. Default is false. |

    | Safe Search | Boolean | False | If true, enables safe search filtering for the
    policy. Default is false. |

    | Tags | String | False | A JSON object containing key-value pairs for categorizing
    the policy. |

    | Additional Parameters | String | False | A JSON object for advanced fields like
    precedence, access_codes, or doh_enabled. |


    ### Additional Notes:

    - The 'Rules' parameter must be a valid JSON array of objects.

    - The 'Tags' and 'Additional Parameters' must be valid JSON objects.

    - Network Lists, DFPS, and Roaming Device Groups should be provided as comma-separated
    numeric IDs.
