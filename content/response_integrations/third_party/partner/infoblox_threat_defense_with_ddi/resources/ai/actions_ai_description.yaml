  ai_description: >-
    Creates a new custom list in Infoblox Threat Defense for use in security policies.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the required parameters and the format of the provided items (IPv4,
    IPv6, or domain).

    3. Constructs the payload with the provided details.

    4. Sends a POST request to the Infoblox API to create the custom list.

    5. Returns the result as a JSON object and a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Name | String | Yes | Specify the name of the Custom List to create. |

    | Type | String | Yes | Specify the type of Custom List to create. Default is
    'custom_list'. |

    | Items | String | No | Specify comma-separated items (IPv4, IPv6, or domains)
    to include in the Custom List. |

    | Description | String | No | Description of Custom List. |

    | Confidence Level | Dropdown | No | Specify the confidence level for this list
    (High, Medium, Low). Default is 'High'. |

    | Threat Level | Dropdown | No | Specify the threat level for this list (High,
    Medium, Low, Info). Default is 'Low'. |

    | Tags | String | No | Add tags to categorize and organize the Custom List. Must
    be a valid JSON object string. |
