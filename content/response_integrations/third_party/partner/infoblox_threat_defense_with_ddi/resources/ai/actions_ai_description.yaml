  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and the Infoblox Threat\
    \ Defense with DDI platform. It ensures that the integration's configuration parameters\u2014\
    specifically the API Root and API Key\u2014are correct and that the network path\
    \ is open. This action is typically used during initial setup or troubleshooting\
    \ to confirm that the SOAR can successfully authenticate and communicate with\
    \ the Infoblox API.\n\n### Parameters Description\nThere are no input parameters\
    \ for this action. It relies entirely on the integration's global configuration\
    \ settings (API Root, API Key, and Verify SSL).\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify SDK and retrieves the global integration\
    \ configuration (API Root, API Key, and SSL verification settings).\n2. **Manager\
    \ Setup**: An instance of the `APIManager` is created using the retrieved credentials.\n\
    3. **Connectivity Test**: The action calls the `test_connectivity` method, which\
    \ performs a `GET` request to the Infoblox authentication endpoint (`/api/authn/v1/account`).\n\
    4. **Result Handling**: \n    * If the request is successful (HTTP 200), the action\
    \ returns a success message and sets the result value to `True`.\n    * If an\
    \ exception occurs (e.g., authentication failure, timeout, or connection error),\
    \ the action logs the error, returns a failure message, and sets the execution\
    \ state to `FAILED`.\n\n### Additional Notes\n* This action does not process any\
    \ entities or modify any data within Infoblox or Google SecOps.\n* As per standard\
    \ SOAR practices, actions named 'Ping' are excluded from being categorized as\
    \ enrichment actions."
