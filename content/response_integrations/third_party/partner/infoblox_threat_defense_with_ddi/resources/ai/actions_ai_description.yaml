  ai_description: >-
    ### General Description

    The **Update Custom List Items** action allows users to modify the contents of
    an existing Custom List within Infoblox Threat Defense. It supports adding or
    removing multiple indicators, such as IPv4 addresses, IPv6 addresses, and domain
    names, in a single execution. This is primarily a management action used to maintain
    lists that are often referenced by security policies for blocking or allowing
    traffic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Custom List ID** | String | Yes | The unique identifier of the Custom List
    to be updated. Although provided as a string, it must represent a positive integer.
    |

    | **Action** | DDL | Yes | The operation to perform on the list. Options are `Add`
    (to insert new items) or `Remove` (to delete existing items). |

    | **Items** | String | Yes | A comma-separated list of indicators (IPv4, IPv6,
    or domains) to be processed. |


    ### Flow Description

    1. **Parameter Extraction and Validation:** The action retrieves the Custom List
    ID, the desired action (Add/Remove), and the list of items. It validates that
    the ID is a positive integer and that the items provided are valid IPv4/IPv6 addresses
    or domain names.

    2. **API Request Construction:** Based on the selected action, the script constructs
    a `PATCH` request body containing either `inserted_items_described` or `deleted_items_described`.

    3. **External Interaction:** The action sends the `PATCH` request to the Infoblox
    API endpoint: `/api/atcfw/v1/named_lists/{custom_list_id}/items`.

    4. **Response Processing:** The action parses the API response to identify how
    many items were successfully added, removed, or updated. It then outputs a summary
    message and the raw JSON response.


    ### Additional Notes

    - **Entity Usage:** This action does not process SecOps entities (like IP or Domain
    objects in the case). It operates strictly on the strings provided in the **Items**
    parameter.

    - **Validation Constraints:** The `Custom List ID` must be greater than zero.
    If the `Items` parameter results in an empty list after parsing, the action will
    fail.
