  ai_description: >-
    ### General Description

    Updates an existing security policy in Infoblox Threat Defense. This action allows
    for the modification of policy names, descriptions, network lists, forwarding
    policies (DFPS), roaming device groups, security rules, and advanced settings
    like safe search or DNS rebinding protection. It ensures data consistency by fetching
    the current policy state before applying updates, merging the new parameters with
    existing configurations.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Security Policy ID | String | Yes | The unique identifier of the security policy
    to update. |

    | Policy Name | String | No | The updated name for the security policy. |

    | Description | String | No | An updated description for the policy. Use the keyword
    `empty` to remove the existing description. |

    | Network Lists | String | No | Comma-separated IDs of network lists to associate
    with this policy. Use the keyword `empty` to remove all network lists. |

    | DFPS | String | No | Comma-separated IDs of Default Forwarding Policies to update.
    Use the keyword `empty` to remove all DFPS. |

    | Roaming Device Groups | String | No | Comma-separated IDs of Roaming Device
    Groups to associate with this policy. Use the keyword `empty` to remove all groups.
    |

    | Rules | String | No | A JSON list of security rule objects (action, type, data,
    etc.). Use the keyword `empty` to remove all rules. |

    | Safe Search | DDL | No | Specify whether to enable (`True`) or disable (`False`)
    safe search filtering. |

    | Block DNS Rebinding | DDL | No | Specify whether to block (`True`) or allow
    (`False`) DNS rebinding attacks. |

    | Tags | String | No | A JSON object containing tags to categorize the policy.
    |

    | Additional Parameters | String | No | A JSON object containing advanced parameters
    such as `precedence`, `access_codes`, `doh_enabled`, or `doh_fqdn`. |


    ### Additional Notes

    - The action uses a "fetch-then-update" logic: it retrieves the existing policy
    data first to ensure that fields not specified in the action parameters are preserved
    rather than overwritten with null values.

    - The keyword `empty` is specifically handled for `Description`, `Network Lists`,
    `DFPS`, `Roaming Device Groups`, and `Rules` to allow clearing those configurations.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the mandatory `Security Policy
    ID` and all optional update parameters.

    2. **Validation:** Validates that the `Security Policy ID` is a positive integer.

    3. **Data Retrieval:** Fetches the current configuration of the specified security
    policy from the Infoblox API.

    4. **Payload Construction:** Merges the provided updates with the existing policy
    data. If a parameter is not provided, the existing value is kept. If `empty` is
    provided, the field is cleared.

    5. **API Update:** Sends a PUT request to the Infoblox endpoint to update the
    security policy with the new payload.

    6. **Output:** Returns the updated policy details as a JSON result and populates
    a data table named "Security Policy Details" for the analyst.
