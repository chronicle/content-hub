Update Network List:
  ai_description: >-
    Updates an existing network list in Infoblox Threat Defense with a new name, items,
    or description. This action is useful for managing network boundaries or lists
    used in security policies. ### Flow Description: 1. **Parameter Extraction:**
    Retrieves the Network List ID, Name, Items, and Description from the action parameters.
    2. **Validation:** Validates that the Network List ID is a positive integer. 3.
    **Data Retrieval:** Fetches the current configuration of the specified network
    list to allow for partial updates. 4. **Payload Construction:** Merges the provided
    parameters with existing data. If a parameter is not provided, the existing value
    is retained. The keyword 'empty' can be used to clear the description. 5. **API
    Update:** Executes a PUT request to the Infoblox API to apply the changes. 6.
    **Output Generation:** Returns the updated network list details as a JSON result
    and populates a data table. ### Parameters Description: | Parameter | Type | Mandatory
    | Description | | :--- | :--- | :--- | :--- | | Network List ID | String | Yes
    | The unique ID of the network list to update. | | Name | String | No | The new
    name for the network list. | | Items | String | No | Comma-separated items (e.g.,
    IP addresses) to include in the list. | | Description | String | No | The new
    description. Use the keyword 'empty' to remove the existing description. | ###
    Additional Notes: - If optional parameters (Name, Items, Description) are left
    blank, the action will preserve the current values stored in Infoblox.
