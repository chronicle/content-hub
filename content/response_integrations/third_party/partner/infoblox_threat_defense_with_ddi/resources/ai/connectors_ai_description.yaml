Infoblox - DNS Security Events Connector:
  ai_description: >-
    ### General Description

    The **Infoblox - DNS Security Events Connector** retrieves DNS security events
    from the Infoblox Threat Defense platform and ingests them as alerts into Google
    SecOps. This connector allows security teams to monitor and respond to malicious
    DNS activity, such as domain lookups associated with malware, phishing, or data
    exfiltration, by centralizing Infoblox telemetry within the SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Infoblox CSP API (e.g., `https://csp.infoblox.com/`).
    |

    | API Key | Password | Yes | A unique identifier used to authenticate and authorize
    access to the Infoblox API. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | EventClassId | String | Yes | The field name used to determine the event name/sub-type
    (default: `tclass`). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product (default: `Infoblox Threat Defense with DDI`). |

    | Feed Name | String | No | Filter by comma-separated threat feed or custom list
    names. |

    | Limit | String | No | Specify the maximum number of alerts to create per iteration
    (default: `100`). |

    | Max Hours Backwards | String | No | Number of hours to look back for alerts
    during the first connector iteration (default: `24`). |

    | Network | String | No | Filter by comma-separated network names, on-premises
    hosts, or endpoints. |

    | Policy Action | String | No | Filter by comma-separated actions performed (e.g.,
    `Log`, `Block`, `Redirect`). |

    | Policy Name | String | No | Filter by comma-separated security policy names.
    |

    | Queried name | String | No | Filter by comma-separated queried domain names.
    |

    | Threat Class | String | No | Filter by comma-separated threat categories (e.g.,
    `Malware`, `MalwareDownload`). |

    | Threat Family | String | No | Filter by comma-separated threat families (e.g.,
    `Log4Shell`, `OPENRESOLVER`). |

    | Threat Indicator | String | No | Filter by comma-separated threat indicators
    (domains or IPs). |

    | Threat Level | String | No | Filter by threat severity level (`LOW`, `MEDIUM`,
    `HIGH`, `CRITICAL`). |

    | Verify SSL | Boolean | No | If enabled, the connector will verify the SSL certificate
    of the API endpoint. |


    ### Flow Description

    1. **Authentication**: The connector establishes a session with the Infoblox Cloud
    Services Portal (CSP) using the provided API Key.

    2. **Time Range Calculation**: It determines the starting timestamp by checking
    the last successful execution time. If no previous state exists, it uses the "Max
    Hours Backwards" parameter.

    3. **Data Retrieval**: The connector queries the Infoblox `/api/dnsdata/v2/dns_event`
    endpoint, applying all configured filters such as Threat Level, Policy Name, and
    Feed Name.

    4. **Pagination**: It paginates through the API results until the specified "Limit"
    is reached or all new events are fetched.

    5. **Deduplication**: For each event, a unique composite ID is generated based
    on the event time, queried name, device, and feed name to ensure no duplicate
    alerts are created.

    6. **Alert Mapping**: The raw DNS event data is mapped to the Google SecOps AlertInfo
    model. This includes mapping Infoblox severity levels to SOAR priorities and populating
    event extensions with the full JSON payload.

    7. **Ingestion**: The processed alerts are sent to Google SecOps, and the connector
    saves the timestamp of the latest event to ensure the next run starts from where
    it left off.
Infoblox - SOC Insights Connector:
  ai_description: >-
    ### General Description

    This connector retrieves SOC Insights from the Infoblox Threat Defense with DDI
    platform and ingests them as alerts into Google SecOps. It allows security teams
    to centralize high-fidelity security insights generated by Infoblox's DNS security
    analytics and threat intelligence for automated investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Infoblox API (e.g., https://csp.infoblox.com/).
    |

    | API Key | Password | Yes | A unique identifier used to authenticate and authorize
    access to the Infoblox API. |

    | Verify SSL | Boolean | Yes | Enable or disable SSL certificate verification
    for API requests. |

    | Status | String | No | Filter Insights by their current status (e.g., ACTIVE,
    CLOSED). |

    | Threat Type | String | No | Filter Insights by the specific type of threat detected.
    |

    | Priority | String | No | Filter Insights by priority level (INFO, LOW, MEDIUM,
    HIGH, CRITICAL). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the SOAR alert (Default: Infoblox Threat Defense with DDI). |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type (Default: tclass). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    connector execution process. |


    ### Flow Description

    1. **Authentication**: The connector establishes a connection to the Infoblox
    API using the provided API Key and API Root.

    2. **Deduplication**: It retrieves the list of previously processed Insight IDs
    from the system to ensure only new data is ingested.

    3. **Data Retrieval**: The connector queries the Infoblox `/api/v1/insights` endpoint,
    applying filters for Status, Threat Type, and Priority if configured.

    4. **Validation**: Input parameters like Status and Priority are validated against
    allowed values (e.g., Active/Closed) before the request is made.

    5. **Alert Transformation**: Each retrieved SOC Insight is mapped to a Google
    SecOps AlertInfo object. This includes mapping the threat severity (e.g., CRITICAL
    to 100), setting the environment, and populating extensions with the full raw
    JSON data.

    6. **Safety Checks**: During processing, the connector monitors for script timeouts
    and case overflow limits to ensure system stability.

    7. **Ingestion**: Validated alerts are returned to the system, and the processed
    Insight IDs are saved to prevent future duplication.
