Infoblox - DNS Security Events Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the Infoblox Threat Defense with DDI platform to
    ingest DNS security events into Google SecOps SOAR. It enables security teams
    to monitor DNS-related threats, such as malware or unauthorized domain queries,
    by fetching events based on configurable filters like threat level, policy, or
    network.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | API Key | Password | Yes | A unique identifier used to authenticate and authorize
    access to the API. |

    | API Root | String | Yes | The base URL of the API, used as the entry point for
    all API requests. |

    | Feed Name | String | No | Filter by comma-separated threat feed or custom list
    name. |

    | Limit | String | No | Specify the maximum number of alerts to create. |

    | Max Hours Backwards | String | No | Number of hours before the first connector
    iteration to retrieve alerts from for the first time. |

    | Network | String | No | Filter by comma-separated network name, on-premises
    host, endpoint, or DFP name. |

    | Policy Action | String | No | Filter by comma-separated action performed (Log,
    Block, Default, Redirect). |

    | Policy Name | String | No | Filter by comma-separated security policy names.
    |

    | Queried name | String | No | Filter by comma-separated queried domain names.
    |

    | Threat Class | String | No | Filter by comma-separated threat category (e.g.,
    Malware). |

    | Threat Family | String | No | Filter by comma-separated threat family (e.g.,
    Log4Shell). |

    | Threat Indicator | String | No | Filter by comma-separated threat indicators
    (domains, IPs). |

    | Threat Level | String | No | Filter by threat severity level (LOW, MEDIUM, HIGH).
    |

    | Verify SSL | Boolean | No | Verify SSL certificate. |


    ### Flow Description

    1. Connects to the Infoblox API using the provided API Key and Root URL.

    2. Calculates the time range for fetching events based on the last successful
    run or the configured `Max Hours Backwards`.

    3. Queries the Infoblox DNS Security Events endpoint, applying optional filters
    (e.g., Threat Level, Policy Name, Network).

    4. Filters out already processed events using stored IDs to prevent duplicates.

    5. Maps each retrieved DNS event to a SOAR `AlertInfo` object, including relevant
    extensions and event data.

    6. Ingests the mapped alerts into the SOAR platform and updates the last success
    timestamp for the next iteration.
Infoblox - SOC Insights Connector:
  ai_description: >-
    ### General Description

    This connector retrieves SOC Insights from the Infoblox platform and creates alerts
    in Google SecOps SOAR. It enables security teams to monitor and investigate threats
    detected by Infoblox Threat Defense with DDI, facilitating automated response
    workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | API Root | String | Yes | The base URL of the Infoblox API. |

    | API Key | Password | Yes | The API key for authentication. |

    | Verify SSL | Boolean | Yes | Enable/disable SSL certificate verification. |

    | Status | String | No | Filter Insights by status (e.g., ACTIVE, CLOSED). |

    | Threat Type | String | No | Filter Insights by threat type. |

    | Priority | String | No | Filter Insights by priority (INFO, LOW, MEDIUM, HIGH,
    CRITICAL). |


    ### Flow Description

    1. Connects to the Infoblox API using the provided credentials and base URL.

    2. Validates input filters (Status, Priority) against allowed values.

    3. Reads existing insight IDs from the local state to ensure deduplication.

    4. Queries the Infoblox API for SOC Insights, applying optional filters.

    5. Iterates through the retrieved insights, converting each into a standardized
    AlertInfo object.

    6. Checks for case overflow and skips alerts if necessary.

    7. Returns the processed alerts to the SOAR platform for case creation.

    8. Updates the local state with the newly processed insight IDs.
