Infoblox - DNS Security Events Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the Infoblox Threat Defense with DDI platform to
    retrieve DNS security events. It enables security teams to monitor DNS-related
    threats, such as malware or unauthorized domain queries, by ingesting these events
    as alerts into Google SecOps SOAR for further investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | Integer | Yes | Timeout limit (in seconds) for the Python
    process. |

    | EventClassId | String | Yes | Field name used to determine the event name (sub-type).
    |

    | DeviceProductField | String | Yes | Field name used to determine the device
    product. |

    | API Key | String | Yes | Unique identifier for API authentication. |

    | API Root | String | Yes | Base URL of the Infoblox API. |

    | Feed Name | String | No | Filter by comma-separated threat feed or custom list
    name. |

    | Limit | String | No | Maximum number of alerts to create. |

    | Max Hours Backwards | String | No | Hours to look back for the first connector
    iteration. |

    | Network | String | No | Filter by comma-separated network name, host, or DFP.
    |

    | Policy Action | String | No | Filter by comma-separated action (Log, Block,
    etc.). |

    | Policy Name | String | No | Filter by comma-separated security policy names.
    |

    | Queried name | String | No | Filter by comma-separated queried domain names.
    |

    | Threat Class | String | No | Filter by comma-separated threat category. |

    | Threat Family | String | No | Filter by comma-separated threat family. |

    | Threat Indicator | String | No | Filter by comma-separated threat indicators.
    |

    | Threat Level | String | No | Filter by threat severity level (LOW, MEDIUM, HIGH).
    |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters, including
    API credentials and filtering criteria.

    2. It calculates the time range for data retrieval based on the last successful
    run or the configured "Max Hours Backwards" setting.

    3. It queries the Infoblox DNS Security Events API, applying any specified filters
    (e.g., threat level, policy action, queried domain).

    4. Retrieved events are processed and converted into standardized AlertInfo objects,
    mapping event data to SOAR alert fields.

    5. The connector checks for overflow and deduplicates events based on timestamps.

    6. Finally, it saves the latest event timestamp for the next polling cycle and
    returns the generated alerts to the SOAR platform.
Infoblox - SOC Insights Connector:
  ai_description: >-
    ### General Description

    The Infoblox - SOC Insights Connector is designed to integrate the Infoblox Cloud
    platform with Google SecOps SOAR. It periodically retrieves Security Operations
    Center (SOC) insights, which represent potential security threats or anomalies
    detected by Infoblox. These insights are then converted into actionable alerts
    within the SOAR platform, enabling security teams to investigate, enrich, and
    respond to threats efficiently.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    python process running current script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | API Root | String | Yes | The base URL of the API, used as the entry point for
    all API requests. |

    | API Key | String | Yes | A unique identifier used to authenticate and authorize
    access to the API. |

    | Verify SSL | Boolean | Yes | Enable/disable SSL certificate verification for
    API requests. |

    | Status | String | No | Filter Insights by their current status (e.g., ACTIVE,
    CLOSED). |

    | Threat Type | String | No | Filter Insights by the type of threat detected.
    |

    | Priority | String | No | Filter Insights by priority level (INFO, LOW, MEDIUM,
    HIGH, CRITICAL). |


    ### Flow Description

    1. The connector initializes and extracts configuration parameters, including
    API credentials and filtering criteria.

    2. It validates the provided Status and Priority filters against allowed values.

    3. It reads previously processed insight IDs from the local storage to ensure
    deduplication and prevent duplicate alert creation.

    4. The connector queries the Infoblox API to fetch new SOC Insights, applying
    the specified filters (Status, Threat Type, Priority).

    5. For each retrieved insight, the connector:
        * Checks if the process is approaching the configured timeout.
        * Determines the environment context.
        * Converts the raw insight data into a standardized AlertInfo object.
        * Checks for case overflow to avoid creating excessive alerts.
    6. Valid alerts are added to the ingestion queue.

    7. Finally, the connector updates the local storage with the new insight IDs and
    returns the collected alerts to the SOAR platform for further processing.
