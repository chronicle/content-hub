  network_security: true
  reasoning: >-
    The Infoblox Threat Defense with DDI integration provides comprehensive network
    visibility and security control. It qualifies as a SIEM integration because its
    connectors ingest DNS security events and SOC insights, which are used to monitor
    and identify suspicious activity. It is a Network Security integration as it allows
    for the management of network lists and security policies to control network traffic
    and block malicious domains or IPs. It functions as a Threat Intelligence integration
    by providing multiple actions to enrich indicators (IPs, domains, etc.) with reputation
    and threat data via TIDE and Dossier. Finally, it serves as an Asset Inventory
    integration by offering lookup actions (DHCP, Host, IP) to retrieve contextual
    metadata for internal assets.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
