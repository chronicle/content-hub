product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Infoblox Threat Defense with DDI integration provides comprehensive network
    security and visibility capabilities. It qualifies as a SIEM integration because
    its connectors ingest DNS security events and SOC insights, and it provides actions
    to search network telemetry (DHCP/DNS records), which aligns with SIEM log and
    activity monitoring. It is a Network Security integration as it allows for the
    management of network lists and security policies to block or filter traffic at
    the DNS/network level. It is a Threat Intelligence integration due to its multiple
    actions for indicator reputation lookups (TIDE and Dossier). Finally, it is an
    Asset Inventory integration because it provides IPAM-based host and IP lookup
    actions to retrieve contextual information about internal assets. It does not
    support EDR, Email Security, IAM, Cloud Security, ITSM, Vulnerability Management,
    or Collaboration.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
