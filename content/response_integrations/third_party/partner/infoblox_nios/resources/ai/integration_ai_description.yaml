product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The infoblox_nios integration provides capabilities for managing DNS Firewall
    protections (RPZs) and retrieving IPAM/DHCP/Host information. It qualifies for
    'Network Security' because it allows security teams to define RPZ rules that block
    or redirect malicious DNS traffic at the gateway level. It also qualifies for
    'Asset Inventory' because it provides actions like 'IP Lookup', 'List Host Info',
    and 'DHCP Lease Lookup', which retrieve contextual metadata about network assets
    (IP, MAC, Hostname, etc.). It does not qualify for 'Threat Intelligence' because
    it does not provide reputation scores or malware family data, nor does it qualify
    for other categories like SIEM, EDR, or ITSM as it does not perform log analysis,
    process-level inspection, or ticket management.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
