product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Infoblox NIOS integration provides capabilities that span two primary categories:
    Network Security and Asset Inventory. For Network Security, the integration allows
    security teams to manage DNS Firewall (RPZ) rules, enabling them to block or redirect
    traffic to malicious domains or IPs, which is a core network security function.
    For Asset Inventory, the integration provides actions such as 'DHCP Lease Lookup',
    'IP Lookup', and 'List Host Info', which allow analysts to retrieve contextual
    metadata (IP, MAC, Hostname, etc.) about internal network assets. It does not
    perform SIEM log analysis, EDR process-level monitoring, threat intelligence reputation
    lookups, or other functions like IAM, ITSM, or email security.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
