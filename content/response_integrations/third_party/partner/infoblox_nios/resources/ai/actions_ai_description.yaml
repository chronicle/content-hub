    the action configuration.

    3. **Validation**: The action validates that the mandatory strings are not empty
    and that the `Additional Parameters` (if provided) is a valid JSON object.

    4. **Rule Creation**: It calls the Infoblox API to create the RPZ TXT rule (`record:rpz:txt`).
