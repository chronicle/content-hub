Update RPZ CNAME Rule:
  ai_description: >-
    ### General Description

    Updates an existing Response Policy Zone (RPZ) CNAME rule in Infoblox NIOS to
    modify DNS behavior. This action allows users to change the rule type, substitute
    name, or other configurations of an existing DNS rule.


    ### Flow Description

    1. Extracts the provided action parameters including Reference ID, Name, RP Zone,
    Rule Type, and any additional parameters.

    2. Validates the required parameters and parses the additional parameters as a
    JSON object.

    3. Makes a PUT request to the Infoblox API (`/wapi/v2.13.1/{reference_id}`) to
    update the specified RPZ CNAME rule with the new configuration.

    4. Returns the updated rule details as a JSON result and attaches a formatted
    data table to the action results.


