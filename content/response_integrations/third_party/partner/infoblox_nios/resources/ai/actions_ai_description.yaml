Create Response Policy Zone:
  ai_description: >-
    Creates a new Response Policy Zone (RPZ) in Infoblox NIOS to define custom DNS
    responses. This action allows administrators to programmatically set up DNS zones
    that can be used for security policies, such as redirecting or blocking specific
    DNS queries. It supports various policy types (GIVEN, NODATA, NXDOMAIN, PASSTHRU,
    SUBSTITUTE) and allows for detailed configuration including severity levels, zone
    types, and FireEye rule mappings.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the FQDN, policy settings, severity, and
    optional JSON configurations (FireEye mappings and additional parameters) from
    the action input.

    2. **Validation:** Ensures the FQDN is provided and validates that 'Additional
    Parameters' and 'Fireeye Rule Mapping' are valid JSON objects.

    3. **API Interaction:** Sends a POST request to the Infoblox WAPI `/zone_rp` endpoint
    with the configured zone details.

    4. **Result Processing:** If successful, it parses the returned zone metadata,
    creates a 'RP Zone' data table for the UI, and returns the full JSON response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | FQDN | string | Yes | The Fully Qualified Domain Name of the DNS zone to be
    created. |

    | Substitute Name | string | No | The alternative name of the redirect target
    if using a substitute response policy. |

    | Comment | string | No | A descriptive comment for the zone. |

    | RPZ Policy | ddl | No | The override policy (e.g., GIVEN, NXDOMAIN, PASSTHRU).
    Default is GIVEN. |

    | RPZ Severity | ddl | No | The severity level assigned to the zone (e.g., CRITICAL,
    MAJOR). Default is MAJOR. |

    | RPZ Type | ddl | No | The type of RPZ (FEED, FIREEYE, or LOCAL). Default is
    LOCAL. |

    | Fireeye Rule Mapping | string | No | A JSON object defining rules to map FireEye
    alerts to this zone. |

    | Additional Parameters | string | No | A JSON object containing any other supported
    Infoblox WAPI parameters for zone creation. |


    ### Additional Notes

    - This action does not run on entities; it is a management action that requires
    manual input of the FQDN.

    - The 'Additional Parameters' field allows for advanced configuration not explicitly
    covered by the standard action fields.
