    | Additional Parameters | string | No | A JSON object containing any extra parameters\
    \ supported by the Infoblox API for RPZ rules. |\n\n### Additional Notes:\n* The\
    \ 'Substitute (Domain name)' rule type is only applicable when the 'Object Type'\
    \ is 'Domain Name'.\n* If the 'Name' provided does not end with the 'RP Zone'\
    \ name, the action automatically appends the zone name to ensure a valid FQDN."
