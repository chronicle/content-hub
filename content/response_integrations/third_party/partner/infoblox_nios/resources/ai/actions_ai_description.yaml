List Network Info:
  ai_description: >-
    Lists defined IPv4/IPv6 networks and subnets in Infoblox NIOS IPAM. This action
    allows users to retrieve a list of network objects filtered by CIDR notation or
    extended attributes. It is primarily used for network discovery and verifying
    subnet configurations within the IPAM environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Network | String | No | The network address in CIDR notation (e.g., "192.168.1.0/24")
    to filter the results. |

    | Limit | String | No | Maximum number of objects to be returned. Defaults to
    100 if not specified. |

    | Extended Attributes | String | No | Comma-separated key/value pairs used to
    filter results by Infoblox extended attributes (e.g., "Site=New York,Owner=IT").
    |


    ### Flow Description


    1. **Parameter Extraction**: The action retrieves the 'Network', 'Limit', and
    'Extended Attributes' from the input parameters.

    2. **Validation**: It validates that the 'Limit' is a positive integer and that
    the 'Network' (if provided) follows valid CIDR notation for IPv4 or IPv6.

    3. **API Interaction**: The action connects to the Infoblox NIOS WAPI and performs
    a GET request to the `/network` endpoint, applying the provided filters and handling
    pagination to respect the 'Limit'.

    4. **Data Processing**: The retrieved network data is processed using the internal
    Network data model to extract fields such as Network View, Container, Comment,
    and Utilization.

    5. **Output Generation**: The action attaches the complete JSON response to the
    case and generates a 'Networks' data table displaying the first 20 results for
    quick analyst review.
