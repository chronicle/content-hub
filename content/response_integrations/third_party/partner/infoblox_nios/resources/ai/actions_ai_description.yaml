Ping:
  ai_description: "Tests the connectivity to the Infoblox NIOS server to ensure that\
    \ the integration can successfully communicate with the API. This action uses\
    \ the provided integration configuration parameters (API Root, Username, and Password)\
    \ to perform a basic authentication check and network reachability test against\
    \ the Infoblox WAPI.\n\n### Flow Description\n1. **Configuration Retrieval**:\
    \ The action starts by extracting the global integration parameters, including\
    \ the API Root URL, Username, and Password.\n2. **Manager Initialization**: It\
    \ initializes the `APIManager` which handles the HTTP session and authentication.\n\
    3. **Connectivity Check**: The manager executes a `GET` request to the Infoblox\
    \ WAPI schema endpoint (`/?_schema`). This serves as a lightweight way to verify\
    \ that the credentials are valid and the server is reachable.\n4. **Outcome Reporting**:\
    \ \n    * If the request is successful, the action returns a success message and\
    \ a result value of `True`.\n    * If an exception occurs (e.g., authentication\
    \ failure, timeout, or DNS error), the action logs the error and returns a failure\
    \ message with a result value of `False`.\n\n### Parameters Description\n| Parameter\
    \ Name | Description | Type | Mandatory |\n| :--- | :--- | :--- | :--- |\n| N/A\
    \ | This action does not take any input parameters. It relies solely on the integration's\
    \ configuration settings. | N/A | N/A |\n\n### Additional Notes\n* This action\
    \ is typically used during the initial setup of the integration or for troubleshooting\
    \ communication issues between Google SecOps and the Infoblox environment."
