    name and object type. This action retrieves the configuration details of the specified
    RPZ rule and returns them for further analysis or processing.


    ### Flow Description

    1. Extracts the provided parameters including `Object Type`, `Rule Name`, `Output
    Fields`, and `Limit`.

    2. Validates the `Limit` parameter to ensure it is a valid positive integer.

    3. Makes a GET request to the Infoblox API to search for the RPZ rule matching
    the specified object type and rule name.

    4. Retrieves the results, formats them, and attaches them to the action's JSON
    result.

    5. Constructs a data table displaying up to the maximum allowed records for quick
    viewing.


