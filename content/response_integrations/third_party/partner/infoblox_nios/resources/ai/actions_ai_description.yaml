  ai_description: >-
    ### General Description

    Adds an SRV (Service) record override in a Response Policy Zone (RPZ) within Infoblox
    NIOS. This action is used to manage service-based DNS lookups, allowing administrators
    to define how specific services are resolved or redirected within a managed zone.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the SRV rule to be created. |

    | Priority | String | Yes | The priority of the SRV record. Must be a non-negative
    integer (0-65535). |

    | RP Zone | String | Yes | The name of the Response Policy Zone where the record
    will reside. |

    | Port | String | Yes | The port of the service. Must be a non-negative integer
    (0-65535). |

    | Target | String | Yes | The target host associated with the SRV record. |

    | Weight | String | Yes | The weight of the SRV record. Must be a non-negative
    integer (0-65535). |

    | Comment | String | No | An optional comment for the rule. |

    | Additional Parameters | String | No | A JSON object containing additional Infoblox
    WAPI parameters for the record creation. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the RP Zone, Name, Priority,
    Port, Weight, Target, and optional Comment/Additional Parameters from the input.

    2. **Validation:** It validates that mandatory strings are non-empty and that
    Priority, Port, and Weight are valid non-negative integers within the range of
    0 to 65535.

    3. **API Interaction:** It initializes the Infoblox API Manager and sends a POST
    request to the `record:rpz:srv` endpoint to create the rule.

    4. **Result Processing:** Upon success, the action adds the created rule's details
    to a data table and returns the full JSON response to the SOAR.


    ### Additional Notes

    - The Priority, Port, and Weight parameters are accepted as strings but must represent
    valid integers.

    - If 'Additional Parameters' is provided, it must be a valid JSON object.
