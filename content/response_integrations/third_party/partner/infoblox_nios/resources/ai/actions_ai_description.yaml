  ai_description: >-
    The **IP Lookup** action retrieves detailed IP Address Management (IPAM) information
    from Infoblox NIOS for a specific IP address, a network, or a range of IP addresses.
    It allows analysts to query the Infoblox database to identify the status, MAC
    address, associated names, and extended attributes of network assets. The action
    supports both IPv4 and IPv6 lookups and provides results in both a structured
    data table and raw JSON format.


    ### Flow Description

    1.  **Parameter Validation**: The action ensures that exactly one search criteria
    is provided: either an `IP Address`, a `Network` (CIDR), or an IP range (`From
    IP` and `To IP`). It also validates the format of the provided IP/Network strings.

    2.  **API Connection**: Initializes a connection to the Infoblox NIOS WAPI using
    the provided integration credentials.

    3.  **Data Retrieval**: Executes a GET request to the appropriate Infoblox endpoint
    (`ipv4address` or `ipv6address`) with the specified filters (Status, Extended
    Attributes) and pagination limits.

    4.  **Data Processing**: Parses the API response, converting raw data into `IPLookup`
    models which include fields like MAC Address, Usage, and Conflict status.

    5.  **Output Generation**: Populates a Google SecOps data table with the first
    20 records and attaches the full result set as a JSON object to the action output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Address** | String | No | The specific IP address to retrieve information
    for. Cannot be used with Network or Range parameters. |

    | **Network** | String | No | The network in FQDN/CIDR format (e.g., 192.168.1.0/24).
    Cannot be used with IP or Range parameters. |

    | **From IP** | String | No | The start of an IP range. Must be used with 'To
    IP'. |

    | **To IP** | String | No | The end of an IP range. Must be used with 'From IP'.
    |

    | **Status** | DDL | No | Filters results by device status: All, Active, Used,
    or Unused. Default is 'All'. |

    | **Limit** | String | No | Maximum number of objects to return from the API.
    Default is 100. |

    | **Extended Attributes** | String | No | Comma-separated key/value pairs to filter
    by Infoblox extended attributes (e.g., 'Site=New York'). |


    ### Additional Notes

    *   **Mutual Exclusivity**: You must provide exactly one of the following: `IP
    Address`, `Network`, or the pair of `From IP` and `To IP`. Providing more than
    one set or none at all will result in an execution failure.

    *   **Table Limits**: While the action can fetch many records based on the `Limit`
    parameter, only the first 20 records are displayed in the UI data table for performance
    reasons.
