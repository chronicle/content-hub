List Host Info:
  ai_description: >-
    Retrieves host records from Infoblox NIOS based on specific search criteria such
    as hostname, IPv4/IPv6 addresses, or extended attributes. This action is primarily
    used for searching and listing existing host information within the Infoblox environment
    without modifying any records.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the search criteria from the
    user inputs, including 'Name', 'IPv4 Address', 'IPv6 Address', 'Extended Attributes',
    and a 'Limit' for the number of results.

    2. **Validation:** It validates that the provided IP addresses are in the correct
    format and that the 'Limit' is a positive integer.

    3. **API Query:** It performs a GET request to the Infoblox WAPI `/record:host`
    endpoint, applying the filters provided in the parameters.

    4. **Pagination:** If the number of results exceeds the page size, the action
    handles pagination to retrieve records up to the specified limit.

    5. **Output Generation:** The retrieved host data is returned as a JSON object.
    Additionally, a summary table ('Hosts') is created in the Google SecOps case,
    displaying key details like Reference ID, Name, View, Zone, and associated IP
    addresses for the first 20 records.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | No | The hostname to search for in Infoblox host records. |

    | IPv4 Address | String | No | The IPv4 address associated with the host record.
    |

    | IPv6 Address | String | No | The IPv6 address associated with the host record.
    |

    | Extended Attributes | String | No | Comma-separated key/value pairs used to
    filter hosts by custom metadata (e.g., "Site=New York,Dept=IT"). |

    | Limit | String | No | The maximum number of host records to return. Defaults
    to 100. |


    ### Additional Notes:

    * This action does not iterate over entities in the Google SecOps case; it relies
    entirely on the provided input parameters.

    * If no search criteria (Name, IPv4, IPv6, or Extended Attributes) are provided,
    the action will return all host records up to the specified limit.
