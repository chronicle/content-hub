Create RPZ AAAA Rule:
  ai_description: >-
    Creates an RPZ (Response Policy Zone) AAAA rule in Infoblox NIOS. This action
    allows for DNS redirection or blocking by mapping a domain name or an IPv6 address
    to a substitute IPv6 address. It is primarily used to implement security policies
    at the DNS level, such as sinkholing malicious domains or redirecting traffic
    from known bad IPv6 addresses.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the object type (Domain Name
    or IP Address), the rule name, the target RP Zone, and the substitute IPv6 address
    from the input parameters.

    2. **Validation:** It validates that the required strings are non-empty and that
    the provided IPv6 address follows the correct format.

    3. **API Interaction:** Based on the 'Object Type', it determines the specific
    Infoblox WAPI endpoint (either `record:rpz:aaaa` or `record:rpz:aaaa:ipaddress`)
    and sends a POST request to create the record.

    4. **Result Processing:** Upon success, the action retrieves the created record's
    details, formats them into a data table, and provides the raw JSON response.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object Type** | DDL | Yes | Determines if the rule targets a 'Domain Name'
    or an 'IP Address'. |

    | **Name** | String | Yes | The FQDN or identifier for the rule. |

    | **RP Zone** | String | Yes | The name of the Response Policy Zone where the
    rule will be created. |

    | **IPv6 Address** | String | Yes | The substitute IPv6 address used for redirection
    or blocking. |

    | **Comment** | String | No | An optional descriptive comment for the rule. |

    | **Additional Parameters** | String | No | A JSON string containing extra key-value
    pairs for advanced Infoblox record configuration. |


    ### Additional Notes:

    - The 'Name' parameter is automatically suffixed with the 'RP Zone' name if it
    doesn't already end with it to ensure the FQDN is correctly formed for Infoblox.
