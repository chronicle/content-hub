DHCP Lease Lookup:
  ai_description: >-
    ### General Description

    The **DHCP Lease Lookup** action retrieves detailed DHCP lease information from
    Infoblox NIOS. It allows security analysts to search for lease records using various
    identifiers such as IP addresses, MAC addresses (Hardware), hostnames, or usernames.
    This action is essential for forensic investigations to identify which device
    or user was assigned a specific IP address at a given point in time.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Address** | String | No | The IPv4 or IPv6 address to search for in the
    lease database. |

    | **Hardware** | String | No | The MAC address for IPv4 leases. Supports regex
    or exact search. |

    | **Hostname** | String | No | The hostname sent via DHCP option 12. Supports
    regex or exact search. |

    | **IPv6 DUID** | String | No | The IPv6 DUID identifier for IPv6 leases. Supports
    regex or exact search. |

    | **Protocol** | DDL | No | Filters results by protocol: `Both`, `IPv4`, or `IPv6`.
    Default is `Both`. |

    | **Fingerprint** | String | No | The DHCP client fingerprint; supports case-insensitive
    or regex search. |

    | **Username** | String | No | The user associated with the lease request; supports
    case-insensitive or regex search. |

    | **Limit** | String | No | The maximum number of lease objects to return. Default
    is 100. |


    ### Additional Notes

    - This action does not automatically process entities from the case. It relies
    on the provided search parameters.

    - Results are output as a JSON object and a summary data table (displaying up
    to 20 records) on the case wall.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves search filters (IP, MAC, Hostname,
    etc.) and the result limit from the user input.

    2. **Validation:** It validates the `Limit` parameter to ensure it is a positive
    integer and checks the format of the `IP Address` if provided.

    3. **API Request:** It executes a GET request to the Infoblox NIOS WAPI `/lease`
    endpoint, applying the specified filters as query parameters.

    4. **Data Processing:** The action parses the returned lease records into a structured
    format using the `DHCPLeaseLookup` data model.

    5. **Output Generation:** It populates the action's JSON result with the full
    dataset and generates a data table for the case wall to provide immediate visibility
    into the findings.
