    | Name | string | Yes | The name of the rule to be created. |

    | RP Zone | string | Yes | The Response Policy Zone to assign the rule to. |

    | IPv4 Address | string | Yes | The IPv4 address to be used as the substitute
    in the rule. |

    | Comment | string | No | An optional comment for the rule. |

    | Additional Parameters | string | No | A JSON object containing additional parameters
    for creating the response policy zone. |


