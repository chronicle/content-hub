Create RPZ CNAME Rule:
  ai_description: >-
    Adds a CNAME rule to an existing Response Policy Zone (RPZ) in Infoblox NIOS.
    This action allows administrators to override DNS behavior for specific domains
    or IP addresses, enabling capabilities such as blocking resolution, passing traffic
    through, or redirecting to a substitute domain. It supports different object types
    including Domain Names, IP Addresses, and Client IP Addresses.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The rule name in a FQDN format. |

    | RP Zone | String | Yes | The target Response Policy Zone to which the rule will
    be added. |

    | Rule Type | DDL | Yes | The behavior of the rule. Options: `Passthru`, `Block
    (No such domain)`, `Substitute (Domain name)`, `Block (No data)`. |

    | Object Type | DDL | Yes | The type of object the rule targets. Options: `Domain
    Name`, `IP Address`, `Client IP Address`. |

    | Substitute Name | String | No | The domain name to use as a substitute. This
    is required if the 'Rule Type' is set to 'Substitute (Domain name)'. |

    | View | String | No | The DNS view in which the records are located. Defaults
    to 'default'. |

    | Comment | String | No | A descriptive comment for the rule. |

    | Additional Parameters | String | No | A JSON object containing any additional
    parameters for the Infoblox API request. |


    ### Flow Description


    1. **Parameter Extraction:** The action retrieves all input parameters, including
    the rule name, zone, type, and object target.

    2. **Validation:** It validates that mandatory fields like 'Name' and 'RP Zone'
    are provided and ensures 'Additional Parameters' is a valid JSON object.

    3. **Endpoint Selection:** Based on the 'Object Type' (Domain, IP, or Client IP),
    the action selects the corresponding Infoblox WAPI endpoint.

    4. **Logic Mapping:** The action maps the 'Rule Type' to the specific 'canonical'
    value required by Infoblox (e.g., '*' for 'Block (No data)', 'rpz-passthru' for
    'Passthru' on Client IPs).

    5. **API Execution:** A POST request is sent to the Infoblox NIOS server to create
    the rule.

    6. **Result Processing:** The action parses the API response, creates a data table
    with the new rule's details, and returns the execution status.


    ### Additional Notes


    - **Conditional Requirement:** If the 'Rule Type' is set to 'Substitute (Domain
    name)', the 'Substitute Name' parameter must be provided.

    - **Compatibility:** The 'Substitute (Domain name)' rule type is only applicable
    when the 'Object Type' is 'Domain Name'. It cannot be used with IP Address or
    Client IP Address object types.
