  ai_description: >-
    ### General Description

    Creates an RPZ (Response Policy Zone) A rule in Infoblox NIOS. This action maps
    a domain name or an IPv4 address to a substitute IPv4 address, enabling DNS redirection
    or blocking capabilities within the Infoblox environment.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration parameters (API
    credentials) and action-specific inputs (Object Type, Name, RP Zone, IPv4 Address,
    etc.).

    2. **Validation**: Validates the provided inputs, including the required string
    formats and the validity of the IPv4 address.

    3. **API Interaction**: Initializes the Infoblox API manager and sends a POST
    request to create the specified RPZ A rule.

    4. **Result Processing**: Adds the API response as a JSON result and constructs
    a data table containing the rule details for the action output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Type | ddl | Yes | The type of object for which to create the record.
    Options: 'IP Address', 'Domain Name'. |

    | Name | string | Yes | The name of the rule to be created. |

    | RP Zone | string | Yes | The Response Policy Zone to assign the rule to. |

    | IPv4 Address | string | Yes | The IPv4 address to be used as the substitute
    in the rule. |

    | Comment | string | No | An optional comment for the rule. |

    | Additional Parameters | string | No | A JSON object containing additional parameters
    for creating the response policy zone. |


    ### Additional Notes

    This action performs a direct mutation on the Infoblox NIOS system. Ensure that
    the provided credentials have the necessary permissions to create RPZ rules.
