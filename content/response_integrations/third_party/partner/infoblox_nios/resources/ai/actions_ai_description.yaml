Create RPZ PTR Rule:
  ai_description: >-
    Adds a reverse DNS lookup override in a Response Policy Zone (RPZ) for an IP address
    within Infoblox NIOS. This action allows administrators to define how specific
    IP addresses should be resolved in reverse DNS lookups within a security policy
    context.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the target RP Zone, PTR DName, and optional
    fields like Name, Comment, and IP addresses from the action input.

    2. **Validation:** Ensures mandatory strings are present, validates the format
    of IPv4 and IPv6 addresses, and parses any provided JSON for additional parameters.

    3. **API Interaction:** Executes a POST request to the Infoblox WAPI `record:rpz:ptr`
    endpoint to create the new rule.

    4. **Result Processing:** Captures the API response, formats the created rule
    data into a structured table, and returns the JSON result to the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **PTR DName** | String | Yes | The domain name of the RPZ substitute rule object
    of the PTR record. |

    | **RP Zone** | String | Yes | The specific Response Policy Zone to which the
    rule will be assigned. |

    | **Name** | String | No | The name of the RPZ Substitute rule object. |

    | **Comment** | String | No | A descriptive comment for the rule. |

    | **IPv4 Address** | String | No | The IPv4 address associated with the substitute
    rule. |

    | **IPv6 Address** | String | No | The IPv6 address associated with the substitute
    rule. |

    | **Additional Parameters** | String | No | A JSON object containing extra parameters
    supported by the Infoblox WAPI for RPZ PTR records. |


    ### Additional Notes

    * At least one of 'Name', 'IPv4 Address', or 'IPv6 Address' must be provided for
