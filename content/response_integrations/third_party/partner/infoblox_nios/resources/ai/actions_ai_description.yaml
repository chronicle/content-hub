  ai_description: >-
    ### General Description

    Adds a NAPTR (Naming Authority Pointer) override rule in a Response Policy Zone
    (RPZ) within Infoblox NIOS. This action allows for the control of DNS-based service
    discovery by defining how specific domain names should be processed and replaced.
    It is useful for redirecting or modifying DNS responses for service discovery
    queries within a managed environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | Specify the name of the rule. |

    | RP Zone | String | Yes | The zone to assign the rule to. |

    | Order | String | Yes | Order parameter in NAPTR record defines the sequence
    of rule application when multiple rules exist. |

    | Preference | String | Yes | The preference of the Substitute (NAPTR Record)
    Rule record. |

    | Replacement | String | Yes | Substitute rule object `replacement` field of the
    NAPTR record. For non-terminal NAPTR records, this field specifies the next domain
    name to look up. |

    | Comment | String | No | Comment for this rule. |

    | Additional Parameters | String | No | JSON object containing additional parameters
    to create response policy zone. |


    ### Flow Description

    1. **Extract and Validate Parameters**: The action retrieves the Name, RP Zone,
    Order, Preference, Replacement, Comment, and Additional Parameters. It ensures
    that mandatory string fields are not empty.

    2. **Integer Validation**: The 'Order' and 'Preference' values are validated to
    ensure they are non-negative integers within the range of 0 to 65535.

    3. **JSON Parsing**: If 'Additional Parameters' are provided, they are parsed
    from a JSON string into a dictionary.

    4. **API Execution**: The action uses the Infoblox API Manager to send a POST
    request to the `/record:rpz:naptr` endpoint with the specified rule details.

    5. **Result Processing**: Upon success, the action adds the raw JSON response
    and a formatted data table to the case and returns a success message.


    ### Additional Notes

    - The 'Order' and 'Preference' parameters are mandatory and must be valid integers
    between 0 and 65535.

    - The 'Additional Parameters' field allows for advanced configuration by providing
    a JSON object with extra Infoblox WAPI fields.
