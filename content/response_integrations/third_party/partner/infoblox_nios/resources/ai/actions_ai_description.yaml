Create RPZ MX Rule:
  ai_description: >-
    Adds a mail exchange (MX) override rule to a Response Policy Zone (RPZ) in Infoblox
    NIOS. This action allows administrators to define custom mail routing for specific
    domains within a security policy zone, typically used for redirecting or managing
    mail traffic for policy enforcement.


    ### Flow Description

    1. **Parameter Initialization:** The action retrieves integration credentials
    (API Root, Username, Password) and extracts user-provided parameters including
    the target RP Zone, the rule name, the mail exchanger address, and the preference
    value.

    2. **Validation:** It validates that mandatory fields (Name, RP Zone, Mail Exchanger,
    Preference) are provided and that the Preference is a valid integer within the
    allowed range (0-65535).

    3. **API Interaction:** The action sends a POST request to the Infoblox WAPI endpoint
    `/record:rpz:mx` with the rule details and any optional additional parameters
    provided in JSON format.

    4. **Output Generation:** Upon success, it returns the raw JSON of the created
    record and displays a formatted data table containing the Reference ID, Name,
    Mail Exchanger, and Preference of the new rule.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the rule (e.g., the domain name to override).
    |

    | RP Zone | String | Yes | The specific Response Policy Zone where the rule will
    be created. |

    | Mail Exchanger | String | Yes | The hostname of the mail server that will handle
    mail for this rule. |

    | Preference | String | Yes | The priority of the mail exchanger (lower values
    have higher priority). Must be an integer between 0 and 65535. |

    | Comment | String | No | An optional descriptive comment for the rule. |

    | Additional Parameters | String | No | A JSON object string containing extra
    Infoblox WAPI parameters for the record creation. |
