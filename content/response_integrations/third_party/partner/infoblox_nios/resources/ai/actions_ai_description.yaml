    \ string | Yes | The rule name in FQDN format. |\n| RP Zone | string | Yes | The\
    \ Response Policy Zone to which the rule will be assigned. |\n| Rule Type | ddl\
    \ | Yes | The action to take: 'Passthru', 'Block (No such domain)', 'Substitute\
    \ (Domain name)', or 'Block (No data)'. |\n| Object Type | ddl | Yes | The type\
    \ of object the rule applies to: 'Domain Name', 'IP Address', or 'Client IP Address'.\
    \ |\n| Substitute Name | string | No | The domain name to substitute. Required\
    \ only if 'Rule Type' is set to 'Substitute (Domain name)'. |\n| View | string\
