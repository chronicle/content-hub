Create Host Record:
  ai_description: >-
    ### General Description

    Creates a new host record in Infoblox NIOS with associated IPv4 and IPv6 addresses.
    When configured, it also creates corresponding A/AAAA and PTR DNS records. This
    action is useful for IP Address Management (IPAM) and DNS inventory management.


    ### Flow Description

    1. Extracts action parameters including the host name, IP addresses, view, aliases,
    and DNS configuration flags.

    2. Validates the provided parameters, ensuring the IP address objects and additional
    parameters are properly formatted JSON.

    3. Makes a POST request to the Infoblox API (`/wapi/v2.13.1/record:host`) to create
    the host record with the specified attributes.

    4. Returns the created host record details as a JSON result and populates a data
    table with the host information.


    ### Additional Notes

    Ensure that the provided host name is in FQDN format and belongs to an existing
    DNS zone. The IP address parameters must be provided as valid JSON arrays of objects.
  ai_short_description: >-
    Creates a new host record in Infoblox NIOS with associated IP addresses and optional
    DNS records.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new host record with associated IP addresses and optional DNS records
      in Infoblox.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Infoblox API to create a new host record,
      which mutates external data. It does not fetch data for enrichment, nor does
      it mutate internal SecOps data, update entities, or create insights.
