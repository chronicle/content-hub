Update RPZ CNAME Rule:
  ai_description: >-
    Updates an existing Response Policy Zone (RPZ) CNAME rule in Infoblox NIOS to
    modify DNS behavior. This action allows for the modification of rule types, names,
    and associated zones, enabling dynamic control over DNS filtering and redirection.


    ### Flow Description

    1. **Parameter Validation:** The action validates that the mandatory parameters
    'Reference ID', 'RP Zone', and 'Name' are provided and non-empty.

    2. **Logic Determination:** It determines the 'canonical' value for the DNS rule
    based on the selected 'Rule Type' (e.g., setting it to '*' for 'Block (No data)'
    or 'rpz-passthru' for 'Passthru').

    3. **API Interaction:** It executes a PUT request to the Infoblox WAPI using the
    provided 'Reference ID' to update the rule configuration.

    4. **Output Generation:** Upon success, it retrieves the updated rule details,
    formats them into a data table ('RPZ CNAME Rule'), and provides the raw JSON response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Reference ID | String | Yes | The unique reference ID of the existing RPZ rule
    to be updated. |

    | Rule Type | DDL | Yes | The behavior of the rule. Options: Passthru, Block (No
    such Domain), Block (No data), Substitute (Domain name). |

    | Name | String | Yes | The rule name in FQDN format. |

    | RP Zone | String | Yes | The Response Policy Zone to which the rule is assigned.
    |

    | Comment | String | No | An optional comment or description for the rule. |

    | Substitute Name | String | No | The domain name to substitute. Required only
    if 'Rule Type' is set to 'Substitute (Domain name)'. |

    | View | String | No | The DNS view where the record is located. Defaults to 'default'.
    |

    | Additional Parameters | String | No | A JSON object containing any additional
    Infoblox API parameters for rule modification. |


    ### Additional Notes

    - If 'Rule Type' is 'Substitute (Domain name)', the 'Substitute Name' parameter
    must be provided.

    - The action will fail if the 'Reference ID' does not exist or if the 'Substitute
    (Domain name)' type is applied to IP-based RPZ rules.
