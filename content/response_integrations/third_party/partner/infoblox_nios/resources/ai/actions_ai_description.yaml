    request to the `record:rpz:srv` endpoint to create the rule in the specified zone.

    4. **Result Processing:** If the rule is created successfully, the action returns
    the raw JSON response and populates a data table with the rule's details (Reference
    ID, Name, Target, Port, Priority, Weight, etc.).


