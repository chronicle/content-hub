  ai_description: >-
    Updates an existing Response Policy Zone (RPZ) CNAME rule in Infoblox NIOS to
    modify DNS response behavior. This action allows analysts to change the policy
    of a specific DNS rule, such as switching between blocking, passing through, or
    substituting domain names. It interacts with the Infoblox WAPI using a PUT request
    to apply changes to the rule identified by its Reference ID.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the Reference ID, Rule Type,
    Name, RP Zone, and other optional parameters from the user input.

    2. **Validation:** It validates that mandatory fields (Reference ID, Name, RP
    Zone) are provided and that 'Additional Parameters' is a valid JSON object. It
    also ensures that a 'Substitute Name' is provided if the 'Substitute (Domain name)'
    rule type is selected.

    3. **Canonical Mapping:** Based on the selected 'Rule Type', the action determines
    the correct 'canonical' value (e.g., '*' for Block No Data, 'rpz-passthru' for
    Passthru, or the provided Substitute Name).

    4. **API Execution:** It calls the Infoblox API via a PUT request to update the
    specific rule record.

    5. **Output Generation:** Upon success, the action returns the updated rule details
    in a JSON format and populates a data table for the analyst.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Reference ID | String | Yes | The unique reference ID of the existing RPZ rule
    to be updated. |

    | Rule Type | DDL | Yes | The desired DNS behavior: Passthru, Block (No such Domain),
    Block (No data), or Substitute (Domain name). |

    | Name | String | Yes | The rule name in FQDN format. |

    | RP Zone | String | Yes | The Response Policy Zone to which the rule belongs.
    |

    | Comment | String | No | An optional comment to associate with the rule. |

    | Substitute Name | String | No | The domain name to substitute. **Mandatory**
    if Rule Type is 'Substitute (Domain name)'. |

    | View | String | No | The DNS view where the record is located. Defaults to 'default'.
    |

    | Additional Parameters | String | No | A JSON object containing any extra parameters
    supported by the Infoblox WAPI for RPZ rules. |


    ### Additional Notes:

    - The 'Substitute (Domain name)' rule type is only applicable to standard CNAME
    rules and cannot be used if the Reference ID points to an IP Address or Client
    IP Address object type.

    - If the 'Rule Type' is 'Passthru' and the reference ID indicates a client IP
    address, the canonical value is automatically set to 'rpz-passthru'.
