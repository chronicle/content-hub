  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between the Google SecOps environment and the\
    \ Infoblox NIOS server. It ensures that the provided integration configuration\
    \ parameters (API Root, Username, and Password) are correct and that the Infoblox\
    \ API is reachable.\n\n### Parameters Description\nThere are no action-specific\
    \ parameters for this action. It relies entirely on the integration's global configuration\
    \ settings.\n\n### Additional Notes\n* This action performs a simple `GET` request\
    \ to the Infoblox WAPI schema endpoint (`/?_schema`) to validate the connection.\n\
    * It does not interact with or modify any DNS records, DHCP leases, or network\
    \ configurations.\n\n### Flow Description\n1. **Parameter Extraction:** The action\
    \ retrieves the global integration configuration, including the API Root, Username,\
    \ and Password.\n2. **Manager Initialization:** An instance of the `APIManager`\
    \ is initialized using the extracted credentials.\n3. **Connectivity Test:** The\
    \ action calls the `test_connectivity` method, which executes a `GET` request\
    \ to the Infoblox API schema endpoint.\n4. **Result Handling:** \n    * If the\
    \ request is successful, the action returns a success message and sets the result\
    \ value to `True`.\n    * If the request fails (e.g., due to network issues or\
    \ invalid credentials), the action catches the exception, logs the error, and\
    \ returns a failure message with the result value set to `False`."
