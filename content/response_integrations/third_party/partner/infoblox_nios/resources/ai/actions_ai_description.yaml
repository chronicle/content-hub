IP Lookup:
  ai_description: >-
    Retrieves IP Address Management (IPAM) information from Infoblox NIOS for a specific
    IP address, network, or IP range. This action allows analysts to query the Infoblox
    database to identify the status, MAC address, and associated metadata of network
    resources. It supports filtering by device status and extended attributes, providing
    a comprehensive view of IP allocation and usage within the environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | string | No | The specific IP address to look up (e.g., "192.168.1.1").
    |

    | Network | string | No | The network to search in FQDN/CIDR format (e.g., "192.168.1.0/24").
    |

    | From IP | string | No | The start of an IP range for the search. Must be used
    with 'To IP'. |

    | To IP | string | No | The end of an IP range for the search. Must be used with
    'From IP'. |

    | Status | ddl | No | Filter results by device status. Options: All, Active, Used,
    Unused. Default is 'All'. |

    | Limit | string | No | Maximum number of objects to return. Default is 100. |

    | Extended Attributes | string | No | Comma-separated key/value filter for extended
    attributes (e.g., "Site=New York"). |


    ### Additional Notes


    * **Search Criteria**: At least one of the following must be provided: 'IP Address',
    'Network', or both 'From IP' and 'To IP'.

    * **Exclusivity**: Only one search method (Single IP, Network, or Range) can be
    used per action execution.

    * **IP Versions**: The action automatically handles both IPv4 and IPv6 addresses
    based on the input format.


    ### Flow Description


    1. **Parameter Extraction**: Retrieves configuration settings and action parameters
    from the SOAR environment.

    2. **Input Validation**: Ensures that exactly one valid search criteria is provided
    and validates the format of IP and network strings.

    3. **API Connection**: Initializes the Infoblox API manager using the provided
    credentials and API root.

    4. **Data Retrieval**: Executes a paginated GET request to the Infoblox WAPI endpoints
    (`/ipv4address` or `/ipv6address`) based on the input.

    5. **Data Processing**: Maps the raw API response to a structured data model,
    extracting key fields such as MAC address, status, and usage.

    6. **Output Generation**: Populates the action results with the full JSON response
    and creates a CSV-formatted data table for the case wall.
