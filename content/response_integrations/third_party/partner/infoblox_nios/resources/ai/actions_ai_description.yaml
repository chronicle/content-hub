Search RPZ Rule:
  ai_description: >-
    ### General Description

    Searches for specific Response Policy Zone (RPZ) rules within Infoblox NIOS. This
    action allows users to query for various RPZ record types (like A, CNAME, MX,
    etc.) by their name. It retrieves detailed configuration data, which is then presented
    as a JSON result and a formatted data table within the SOAR case for analyst review.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Type | DDL | Yes | The Infoblox object type to search for (e.g., record:rpz:a,
    record:rpz:cname). |

    | Rule Name | String | No | The full name of the rule (e.g., name.domain.com).
    |

    | Output Fields | String | No | Comma-separated fields to include in the response.
    'name' and 'view' are included by default. |

    | Limit | String | No | Maximum number of objects to return. Defaults to 100.
    |


    ### Additional Notes

    - This action does not process entities from the case; it relies entirely on the
    provided input parameters.

    - If 'Output Fields' are provided, the action automatically includes 'name' and
    'view' in the results.

    - The data table displays up to 20 records.


    ### Flow Description

    1. Initialize the Infoblox API manager with provided credentials.

    2. Validate the 'Limit' parameter to ensure it is a positive integer.

    3. Construct the API request using the specified 'Object Type' and 'Rule Name'.

    4. Execute a paginated GET request to the Infoblox WAPI.

    5. Process the returned rules and generate a data table for the first 20 records.

    6. Output the full results in JSON format.
