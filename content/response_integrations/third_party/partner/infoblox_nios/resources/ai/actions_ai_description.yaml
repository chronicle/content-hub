Create Host Record:
  ai_description: >-
    Adds a host record to Infoblox NIOS with associated IPv4 and IPv6 addresses. This
    action is primarily used for IPAM (IP Address Management) and DNS inventory management.
    When the 'Configure for DNS' parameter is enabled, the action automatically creates
    the corresponding A, AAAA, and PTR DNS records in the specified DNS view.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the host name (FQDN), IP address
    arrays, DNS view, and other optional configurations like aliases and extended
    attributes from the action parameters.

    2. **Validation:** It validates that the host name is provided and that the IP
    address objects (IPv4/IPv6) are in the correct JSON format.

    3. **API Interaction:** It sends a POST request to the Infoblox NIOS WAPI `/record:host`
    endpoint to create the host record.

    4. **Result Processing:** Upon success, it returns the created record's details
    in JSON format and populates a data table named 'Hosts' in the Google SecOps case.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The FQDN of the host (e.g., `server1.auth.threat.zone`).
    It must belong to an existing DNS zone. |

    | IPv4 Addresses | String | No | A JSON array of IPv4 objects, e.g., `[{"ipv4addr":"192.168.1.100","mac":"00:11:22:33:44:55","configure_for_dhcp":true}]`.
    |

    | IPv6 Addresses | String | No | A JSON array of IPv6 objects, e.g., `[{"ipv6addr":"2001:db8::1"}]`.
    |

    | View | String | No | The DNS view in which the record resides (default is 'default').
    |

    | Comment | String | No | Additional information or notes about this host record.
    |

    | Aliases | String | No | Comma-separated list of DNS aliases (CNAMEs) for this
    host. |

    | Configure for DNS | Boolean | No | When true (default), the host record includes
    associated DNS records. |

    | Extended Attributes | String | No | Comma-separated key/value formatted filter
    for extended attributes (e.g., `Site=New York`). |

    | Additional Parameters | String | No | A JSON object containing additional parameters
    supported by the Infoblox API (e.g., `{"use_ttl":true}`). |


    ### Additional Notes:

    - The 'Name' parameter must be a valid FQDN.

    - IP address parameters must be formatted as valid JSON arrays of objects as required
    by the Infoblox WAPI.
