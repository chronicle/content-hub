Create RPZ NAPTR Rule:
  ai_description: >-
    Creates a NAPTR (Naming Authority Pointer) rule within a Response Policy Zone
    (RPZ) in Infoblox NIOS. This action allows for the control of DNS-based service
    discovery by defining how specific domain names should be rewritten or redirected.
    It is primarily used for advanced DNS traffic management and policy enforcement.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the rule name, target RP Zone, order, preference,
    replacement domain, and optional comments or additional JSON parameters.

    2. **Validation:** Ensures that mandatory fields (Name, RP Zone, Replacement)
    are provided. It specifically validates that 'Order' and 'Preference' are integers
    between 0 and 65535.

    3. **Data Preparation:** Formats the rule name to ensure it is correctly associated
    with the specified RP Zone and parses any provided 'Additional Parameters' from
    a JSON string.

    4. **API Interaction:** Executes a POST request to the Infoblox NIOS WAPI (`/record:rpz:naptr`)
    to create the new rule.

    5. **Result Processing:** If successful, it adds the raw API response to the action
    results and generates a data table summarizing the created NAPTR rule details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the NAPTR rule. The action automatically appends
    the RP Zone name if not already present. |

    | RP Zone | String | Yes | The specific Response Policy Zone where the rule will
    be created. |

    | Order | String | Yes | An integer (0-65535) defining the sequence in which NAPTR
    records are processed. |

    | Preference | String | Yes | An integer (0-65535) defining the priority of the
    rule when multiple records have the same order. |

    | Replacement | String | Yes | The replacement domain name used for the substitution
    logic in the NAPTR record. |

    | Comment | String | No | A descriptive comment for the rule record in Infoblox.
    |

    | Additional Parameters | String | No | A JSON-formatted string containing any
    additional supported Infoblox WAPI fields for the NAPTR record. |


    ### Additional Notes

    - The 'Order' and 'Preference' parameters must be valid integers; otherwise, the
    action will fail during the validation stage.

    - 'Additional Parameters' must be a valid JSON object (e.g., `{"extattrs": {"Site":
    {"value": "New York"}}}`).
