Create RPZ A Rule:
  ai_description: >-
    Creates an RPZ (Response Policy Zone) Substitute rule in Infoblox NIOS. This action
    allows administrators to map a specific domain name (A record) or an IPv4 address
    to a substitute IPv4 address. This is primarily used for DNS redirection, sinkholing,
    or blocking malicious traffic at the DNS level.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the object type (Domain or IP),
    the rule name, the target RP Zone, and the substitute IPv4 address from the input
    parameters.

    2. **Validation:** It validates that the rule name and RP Zone are non-empty strings
    and ensures the provided IPv4 address is in a valid format.

    3. **Endpoint Selection:** Based on the 'Object Type' parameter, the action selects
    the appropriate Infoblox WAPI endpoint (either `record:rpz:a` for domains or `record:rpz:a:ipaddress`
    for IP addresses).

    4. **Rule Creation:** It sends a POST request to the Infoblox API to create the
    new rule, including any optional comments or additional JSON parameters provided
    by the user.

    5. **Output Generation:** Upon success, the action returns the raw JSON of the
    created record and populates a data table named 'RPZ A Rule' with the rule's details.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Type | DDL | Yes | Determines the type of record to create. Options are
    'Domain Name' or 'IP Address'. |

    | Name | String | Yes | The domain name or IP address that the rule will apply
    to. |

    | RP Zone | String | Yes | The name of the Response Policy Zone where the rule
    will be created. |

    | IPv4 Address | String | Yes | The substitute IPv4 address that the DNS query
    will be redirected to. |

    | Comment | String | No | An optional description or note for the rule. |

    | Additional Parameters | String | No | A JSON object string containing extra
    Infoblox-specific parameters for the record creation. |


    ### Additional Notes

    - The 'Name' parameter is automatically formatted to include the 'RP Zone' suffix
    if it is not already present, ensuring compatibility with Infoblox naming conventions.
