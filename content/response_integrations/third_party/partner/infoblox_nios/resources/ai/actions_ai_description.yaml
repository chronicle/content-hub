  ai_description: >-
    Adds a mail exchange (MX) override rule to a Response Policy Zone (RPZ) in Infoblox
    NIOS. This action allows administrators to define custom mail routing logic within
    a specific DNS zone by creating an MX record. It supports standard MX parameters
    like preference and mail exchanger host, along with optional comments and advanced
    JSON-based parameters for the Infoblox WAPI.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves integration credentials and
    action parameters including the rule name, target RP zone, mail exchanger, and
    preference.

    2. **Validation:** It validates that mandatory fields are non-empty, ensures the
    'Preference' is a valid integer, and checks that 'Additional Parameters' is a
    valid JSON object.

    3. **API Interaction:** It constructs a POST request to the Infoblox NIOS WAPI
    (`/record:rpz:mx`) to create the rule.

    4. **Result Processing:** Upon success, it formats the created rule's data into
    a JSON result and a CSV-formatted data table for display in the SOAR interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the rule to be created. |

    | RP Zone | String | Yes | The Response Policy Zone where the rule will be assigned.
    |

    | Mail Exchanger | String | Yes | Specify the mail exchanger host for the rule.
    |

    | Preference | String | Yes | The preference value for the MX rule (must be a
    non-negative integer). |

    | Comment | String | No | An optional descriptive comment for the rule. |

    | Additional Parameters | String | No | A JSON object containing additional parameters
    to be passed to the Infoblox API. |


    ### Additional Notes

    - The action automatically appends the RP Zone name to the Rule Name if it is
    not already present to ensure a fully qualified domain name (FQDN) format.
