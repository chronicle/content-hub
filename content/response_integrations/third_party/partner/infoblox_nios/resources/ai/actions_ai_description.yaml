  ai_description: >-
    ### General Description

    Adds a host record to Infoblox with associated IP addresses. When `Configure for
    DNS` is enabled, it also creates corresponding A/AAAA and PTR DNS records. This
    action is useful for IPAM and DNS inventory management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Name | String | Yes | The name of the host in FQDN format `{name}.{auth_zone}`
    (e.g. server1.auth.threat.zone). It must belong to an existing DNS zone. |

    | IPv4 Addresses | String | No | Array of IPv4 address objects in the following
    format. (e.g. `[{"ipv4addr":"192.168.1.100","mac":"00:11:22:33:44:55","configure_for_dhcp":true},...]`
    ). |

    | IPv6 Addresses | String | No | Array of IPv6 address objects in the following
    format. (e.g. `[{"ipv6addr":"2001:db8::1"},{"ipv6addr":"2001:db8::2"}]`) |

    | View | String | No | The DNS view in which the record resides (e.g., "default").
    |

    | Comment | String | No | Additional information or notes about this host record.
    |

    | Aliases | String | No | Comma-separated list of DNS aliases (CNAMEs) for this
    host (e.g., "alias1.auth zone,alias2.auth zone"). |

    | Configure for DNS | Boolean | No | When false, the host record doesn't have
    associated DNS records. Default is true. |

    | Extended Attributes | String | No | Comma-separated key/value formatted filter
    for extended attributes, e.g. "Site=New York,OtherProp=MyValue" |

    | Additional Parameters | String | No | Comma-separated key/value formatted string
    for additional parameters supported by the API (e.g., "use_ttl=true,network_view=default").
    |


    ### Flow Description

    1. Extracts the configuration and action parameters.

    2. Validates the provided `Name`, `IPv4 Addresses`, `IPv6 Addresses`, and `Additional
    Parameters`.

    3. Initiates a POST request to the Infoblox API to create the host record with
    the specified details.

    4. If successful, adds the created host record details to the action's JSON result
    and creates a data table named "Hosts".

    5. Returns a success or failure message based on the API response.
