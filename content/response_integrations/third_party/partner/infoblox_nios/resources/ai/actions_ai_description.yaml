  ai_description: >-
    ### General Description

    Creates an RPZ AAAA rule in Infoblox NIOS. This action allows for mapping a domain
    name or an IPv6 address to a substitute IPv6 address within a specific Response
    Policy Zone (RPZ). This is commonly used for DNS-based redirection or blocking
    of malicious traffic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Object Type | String | Yes | The type of the object for which to create the
    record. Options: 'Domain Name', 'IP Address'. |

    | Name | String | Yes | The name of the rule (e.g., the domain name or IP address
    to be redirected). |

    | RP Zone | String | Yes | The name of the Response Policy Zone where the rule
    will be created. |

    | IPv6 Address | String | Yes | The substitute IPv6 address that the target will
    be redirected to. |

    | Comment | String | No | An optional comment to associate with the rule. |

    | Additional Parameters | String | No | A JSON string containing any additional
    Infoblox WAPI parameters for the record creation. |


    ### Additional Notes

    - The action performs validation to ensure the provided IPv6 Address is in a valid
    format.

    - Depending on the 'Object Type' selected, the action creates either a 'record:rpz:aaaa'
    or a 'record:rpz:aaaa:ipaddress' in Infoblox.


    ### Flow Description

    1. **Initialization:** The action extracts the integration configuration and the
    user-provided parameters.

    2. **Validation:** It verifies that the Name, RP Zone, and IPv6 Address are provided
    and that the IPv6 address is valid.

    3. **API Preparation:** It determines the appropriate Infoblox WAPI endpoint and
    record type based on the 'Object Type' parameter.

    4. **Execution:** It sends a POST request to the Infoblox NIOS API to create the
    new RPZ AAAA rule.

    5. **Output:** Upon successful creation, it adds the raw API response to the action
    results and generates a data table for the analyst.
