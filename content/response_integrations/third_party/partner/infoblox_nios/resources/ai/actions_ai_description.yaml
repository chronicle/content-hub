  ai_description: >-
    Creates a new host record in Infoblox NIOS. This action allows users to define
    a host name, associate IPv4/IPv6 addresses, configure DNS settings, and add metadata
    such as comments, aliases, and extended attributes. It performs a POST request
    to the Infoblox API to provision the record and returns the created host details.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | The FQDN of the host (e.g., server1.auth.threat.zone).
    |

    | IPv4 Addresses | string | No | JSON array of IPv4 address objects. |

    | IPv6 Addresses | string | No | JSON array of IPv6 address objects. |

    | View | string | No | The DNS view (default: "default"). |

    | Comment | string | No | Additional notes about the host record. |

    | Aliases | string | No | Comma-separated list of DNS aliases (CNAMEs). |

    | Configure for DNS | boolean | No | Whether to create associated DNS records
    (default: true). |

    | Extended Attributes | string | No | Comma-separated key/value pairs for extended
    attributes. |

    | Additional Parameters | string | No | Comma-separated key/value pairs for additional
    API parameters. |


    ### Flow Description

    1. The action extracts configuration parameters (API root, credentials) and action-specific
    inputs.

    2. It validates the provided inputs (e.g., required strings, IP address objects,
    additional parameters).

    3. It initializes the `APIManager` to communicate with the Infoblox NIOS API.

    4. It executes a POST request to create the host record with the specified attributes.

    5. Upon success, it adds the created host record details to the action results
    as a JSON object and a data table.

    6. If an error occurs, it logs the exception and fails the action execution.
