  ai_description: >-
    ### General Description

    The **Create Host Record** action adds a new host record to the Infoblox NIOS
    system. This action is used for IP Address Management (IPAM) and DNS inventory,
    allowing users to define a host with its associated IPv4 and IPv6 addresses. If
    configured, the action can also automatically generate corresponding DNS records
    such as A, AAAA, and PTR records.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the host name, IP address lists,
    DNS view, and optional metadata including comments, aliases, and extended attributes.

    2. **Validation:** It ensures the host name is provided and validates that the
    IP address objects and additional parameters are in the correct JSON format.

    3. **API Interaction:** It initializes the Infoblox API manager and executes a
    POST request to the `/record:host` endpoint to create the record.

    4. **Output:** Upon successful creation, the action returns the full details of
    the new host record as a JSON result and displays a summary table in the SOAR
    interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The FQDN of the host (e.g., server1.example.com). It must
    belong to an existing DNS zone. |

    | IPv4 Addresses | String | No | A JSON array of IPv4 objects (e.g., [{"ipv4addr":"192.168.1.100","mac":"00:11:22:33:44:55","configure_for_dhcp":true}]).
    |

    | IPv6 Addresses | String | No | A JSON array of IPv6 objects (e.g., [{"ipv6addr":"2001:db8::1"}]).
    |

    | View | String | No | The DNS view in which the record resides (default: "default").
    |

    | Comment | String | No | Additional information or notes about this host record.
    |

    | Aliases | String | No | Comma-separated list of DNS aliases (CNAMEs) for this
    host. |

    | Configure for DNS | Boolean | No | When true, creates associated DNS records
    (A/AAAA/PTR). Default is true. |

    | Extended Attributes | String | No | Comma-separated key/value formatted string
    for extended attributes (e.g., "Site=New York"). |

    | Additional Parameters | String | No | JSON object for additional parameters
    supported by the Infoblox API. |


    ### Additional Notes

    - The **Name** parameter is mandatory despite being marked as optional in the
    parameter extraction logic, as it is explicitly validated as a required string
    before the API call.

    - The **IPv4 Addresses** and **IPv6 Addresses** parameters must be valid JSON
    arrays of objects.
