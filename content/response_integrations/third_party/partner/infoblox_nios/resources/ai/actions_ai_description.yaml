  ai_description: >-
    Creates a Response Policy Zone (RPZ) Substitute rule in Infoblox NIOS. This action
    allows administrators to map a specific domain name (A record) or an IPv4 address
    to a substitute IPv4 address. This is primarily used for DNS redirection, sinkholing,
    or blocking access to specific network resources by overriding standard DNS resolution.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the object type, rule name,
    target RP zone, substitute IPv4 address, and optional comments or additional JSON
    parameters.

    2. **Validation:** It validates that the rule name and RP zone are provided, and
    ensures the substitute IPv4 address is a valid IPv4 format.

    3. **Record Type Determination:** Based on the 'Object Type' parameter, the action
    determines whether to create a standard RPZ A rule (`record:rpz:a`) for domains
    or an IP-based RPZ A rule (`record:rpz:a:ipaddress`).

    4. **API Execution:** It constructs the rule name (appending the zone if not already
    present) and sends a POST request to the Infoblox WAPI to create the record.

    5. **Result Processing:** Upon success, it returns the raw JSON response and creates
    a data table in the SOAR case wall summarizing the new rule's details.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Object Type** | DDL | Yes | Determines the record category. Options are 'Domain
    Name' (standard A record) or 'IP Address' (IP-based rule). |

    | **Name** | String | Yes | The name/FQDN of the rule to be created. |

    | **RP Zone** | String | Yes | The specific Response Policy Zone where the rule
    will be assigned. |

    | **IPv4 Address** | String | Yes | The substitute IPv4 address that the DNS query
    will resolve to. |

    | **Comment** | String | No | An optional descriptive comment for the rule. |

    | **Additional Parameters** | String | No | A JSON object string containing extra
    parameters supported by the Infoblox WAPI for RPZ rules. |


    ### Additional Notes:

    - The action automatically formats the rule name by appending the RP Zone if the
    provided name does not already end with it.

    - If 'Additional Parameters' is provided, it must be a valid JSON object string.
