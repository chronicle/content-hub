Take Snapshot:
  ai_description: >-
    Triggers the creation of a volume snapshot using the NetApp Ransomware Resilience
    Service (RRS). This action is used to create a point-in-time recovery point for
    a specific storage volume, which is a critical step in ransomware mitigation and
    data protection strategies. It requires specific identifiers for the volume, agent,
    and storage system to execute the request via the NetApp BlueXP API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory 'Volume ID', 'Agent
    ID', and 'System ID' from the input parameters.

    2. **Authentication**: It initializes the API Manager, which handles OAuth token
    generation and management using encrypted storage.

    3. **API Request**: A POST request is sent to the NetApp RRS endpoint (`storage/take-snapshot`)
    with the provided volume and system identifiers.

    4. **Result Processing**: The action captures the API response (containing snapshot
    or job details), adds it to the JSON results, and reports the execution status
    (Completed or Failed) to the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Volume ID | String | Yes | The unique identifier of the storage volume to be
    snapshotted. |

    | Agent ID | String | Yes | The console agent ID associated with the NetApp environment.
    |

    | System ID | String | Yes | The unique identifier of the storage system where
    the volume resides. |


    ### Additional Notes

    - This action does not process or iterate over SOAR entities (e.g., IP, Hostname).
    It relies entirely on the provided string parameters.

    - The action performs a state-changing operation in the external NetApp environment.
