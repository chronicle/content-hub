  ai_description: >-
    ### General Description

    Checks the status of a previously triggered asynchronous job in the NetApp Ransomware
    Resilience Service (RRS). This action queries the RRS API using the provided job
    and agent identifiers to retrieve the current execution status and returns the
    details as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Source | String | Yes | The source identifier (e.g., rps-agent) associated with
    the job. |

    | Agent ID | String | Yes | The Console Agent ID where the job is running. |

    | Job ID | String | Yes | The unique identifier of the job for which the status
    is being fetched. |


    ### Flow Description

    1. Extracts the `Source`, `Agent ID`, and `Job ID` parameters from the action
    configuration.

    2. Authenticates with the NetApp RRS API using OAuth2 credentials.

    3. Constructs and sends a GET request to the RRS job status API endpoint.

    4. Retrieves the job status data and appends it to the action's JSON result.

    5. Completes the action, outputting a success or failure message based on the
    API response.
