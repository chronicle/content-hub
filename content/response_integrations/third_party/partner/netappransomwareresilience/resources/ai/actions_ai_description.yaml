  ai_description: >-
    ### General Description

    The **Enrich Storage** action retrieves detailed volume and storage information
    for a specific agent and system from the NetApp Ransomware Resilience Service
    (RRS). This action is used to gather contextual metadata about storage assets,
    which is essential for assessing the scope and impact of potential ransomware
    incidents.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Agent ID** | string | Yes | The unique identifier for the Console Agent. |

    | **System ID** | string | Yes | The unique identifier for the Storage System.
    |


    ### Flow Description

    1. **Authentication**: The action initializes the API Manager, which handles OAuth2
    authentication with the NetApp BlueXP platform, ensuring a valid access token
    is available.

    2. **Parameter Extraction**: The action extracts the mandatory `Agent ID` and
    `System ID` from the user-provided input.

    3. **Data Retrieval**: It performs a GET request to the RRS enrichment endpoint
    (`enrich/storage`) using the provided identifiers as query parameters.

    4. **Result Processing**: The API response, containing storage metadata, is parsed
    and attached to the action's output as a JSON result.

    5. **Completion**: The action concludes by providing a success message and the
    retrieved data to the SOAR platform.


    ### Additional Notes

    This action does not operate on SOAR entities (like IPs or Hostnames) directly;
    instead, it requires specific IDs provided as parameters to query the NetApp backend.
