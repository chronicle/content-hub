Volume Offline:
  ai_description: >-
    ### General Description

    The **Volume Offline** action is designed to programmatically take a storage volume
    offline within the NetApp Ransomware Resilience Service (RRS). This action serves
    as a critical response capability, allowing security teams to quickly isolate
    storage resources that may be compromised or under threat during a ransomware
    attack, thereby preventing further data encryption or exfiltration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Volume ID** | String | Yes | The unique identifier of the storage volume that
    needs to be taken offline. |

    | **Agent ID** | String | Yes | The identifier for the BlueXP Console Agent associated
    with the storage system. |

    | **System ID** | String | Yes | The identifier for the specific storage system
    where the volume resides. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Volume ID`, `Agent ID`,
    and `System ID` from the action parameters.

    2. **API Initialization**: It initializes the `ApiManager`, which handles OAuth2
    authentication and session management with the NetApp BlueXP platform.

    3. **API Request**: A POST request is sent to the NetApp RRS endpoint (`storage/take-volume-offline`)
    containing the volume, agent, and system identifiers in the JSON payload.

    4. **Result Processing**: The action captures the API response, which includes
    the status of the operation, and returns it as a JSON result to the Google SecOps
    platform. It then reports a success or failure message based on the API's response.


    ### Additional Notes

    - This action performs a state-changing operation on external storage infrastructure.
    It should be used with caution as taking a volume offline will disrupt access
    to the data stored on it.

    - Ensure that the provided IDs are accurate to avoid impacting the wrong storage
    resources.
