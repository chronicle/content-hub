Enrich IP Address:
  ai_description: >-
    Enriches a specific IP address with threat intelligence data from the NetApp Ransomware
    Resilience Service (RRS). This action allows analysts to retrieve contextual security
    information about an IP to assist in investigation and response.


    ### Flow Description:

    1. **Authentication**: Initializes the API manager and ensures a valid OAuth token
    is available for the NetApp RRS API.

    2. **Parameter Extraction**: Retrieves the mandatory 'IP Address' parameter provided
    by the user or playbook.

    3. **Data Retrieval**: Executes a POST request to the RRS enrichment endpoint
    (`enrich/ip-address`) with the target IP.

    4. **Result Processing**: Captures the API response and attaches it as a JSON
    result to the action output for use in downstream tasks.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | String | Yes | The specific IP address to be enriched with threat
    intelligence. |


    ### Additional Notes:

    This action does not automatically process entities from the SOAR case; it requires
    the IP address to be passed explicitly as a parameter.
