  ai_description: >-
    ### General Description

    Enriches a specific IP address using the NetApp Ransomware Resilience Service
    (RRS). This action retrieves threat intelligence data associated with the provided
    IP address to assist in security analysis and incident response. It interacts
    with the NetApp BlueXP API to fetch contextual information about the indicator.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | String | Yes | The IP address that needs to be enriched with threat
    intelligence data. |


    ### Flow Description

    1. **Initialization**: The action initializes the `ApiManager`, which handles
    OAuth token management and session setup.

    2. **Parameter Extraction**: The target IP address is extracted from the action's
    input parameters.

    3. **API Interaction**: The action sends a POST request to the NetApp RRS `enrich/ip-address`
    endpoint containing the IP address.

    4. **Result Processing**: The retrieved enrichment data is attached to the action's
    JSON results.

    5. **Completion**: The action concludes by providing a success message and the
    enrichment data to the SOAR platform.


    ### Additional Notes

    This action does not automatically iterate over entities in the SOAR case. It
    relies on the `IP Address` parameter provided during execution. If the API call
    fails, the action will return a failed status with the corresponding error message.
