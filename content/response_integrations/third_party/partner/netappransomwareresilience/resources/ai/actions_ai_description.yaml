    This action takes a storage volume offline using the NetApp Ransomware Resilience
    Service (RRS). It is designed to be used as a containment or remediation step
    to prevent further data access or potential ransomware spread on a specific storage
    volume.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Volume ID`, `Agent ID`,
    and `System ID` from the provided action parameters.

    2. **Authentication**: The `ApiManager` initializes and ensures a valid OAuth
    token is available, refreshing it if necessary using the configured credentials.

    3. **API Execution**: The action sends a POST request to the NetApp RRS API endpoint
    (`storage/take-volume-offline`) with the provided identifiers.

    4. **Result Reporting**: The API response is captured and added to the action's
    result JSON, and the action terminates with a success or failure status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Volume ID | string | Yes | The unique identifier of the storage volume to take
    offline. |

    | Agent ID | string | Yes | The identifier of the console agent managing the storage
    system. |

    | System ID | string | Yes | The identifier of the storage system. |


    ### Additional Notes

    This action performs a state-changing operation on an external system. Ensure
    that the provided credentials have the necessary permissions to modify storage
    volume states.
