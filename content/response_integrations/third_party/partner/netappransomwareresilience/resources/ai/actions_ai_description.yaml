  ai_description: >-
    ### General Description

    The **Check Job Status** action is a utility designed to monitor the progress
    and outcome of asynchronous operations within the NetApp Ransomware Resilience
    Service (RRS). It queries the NetApp BlueXP API to retrieve the current state
    of a specific job, enabling playbooks to track long-running tasks such as snapshot
    creation or volume management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Source | String | Yes | The source identifier for the request, typically 'rps-agent'.
    |

    | Agent ID | String | Yes | The unique identifier for the Console Agent associated
    with the job. |

    | Job ID | String | Yes | The unique identifier of the asynchronous job whose
    status is being queried. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Source`, `Agent ID`, and
    `Job ID` from the user-provided input parameters.

    2. **API Interaction**: It uses the `ApiManager` to authenticate via OAuth2 and
    perform a GET request to the RRS job status endpoint.

    3. **Data Retrieval**: The action fetches the JSON response containing the job's
    current status (e.g., Pending, Running, Completed, Failed) and associated metadata.

    4. **Result Reporting**: The retrieved job status is attached to the action as
    a JSON result, and the action completes with a success status if the API call
    is successful.


    ### Additional Notes

    This action does not process or enrich SOAR entities. It is strictly a utility
    for tracking background tasks initiated by other actions in the NetApp Ransomware
    Resilience integration.
