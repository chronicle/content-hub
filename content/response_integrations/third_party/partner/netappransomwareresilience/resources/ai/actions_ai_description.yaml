Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and authentication configuration between Google SecOps and the NetApp Ransomware
    Resilience Service (RRS). Its primary purpose is to ensure that the integration
    can successfully communicate with the external API using the provided credentials.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. **Initialization**: The action initializes the `ApiManager`, which retrieves
    the integration's configuration parameters (Client ID, Client Secret, and Account
    ID).

    2. **Authentication Attempt**: The `ApiManager` checks for a valid OAuth token
    in encrypted storage. If the token is missing or expired, it attempts to generate
    a new one by making a POST request to the NetApp Auth0 endpoint.

    3. **Connectivity Validation**: The action verifies if a valid token is obtained,
    effectively testing the reachability of the RRS service and the validity of the
    credentials.

    4. **Result Reporting**: The action returns a success message if the connection
    is established or a failure message with error details if the authentication or
    connection fails.


    ### Additional Notes

    This action is a standard connectivity test and does not perform any data enrichment,
    entity modification, or external state changes.
