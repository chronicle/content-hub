Enrich Storage:
  ai_description: >-
    ### General Description

    Retrieves detailed volume and storage information for a specific agent and system
    from the NetApp Ransomware Resilience Service (RRS). This action is used to gather
    technical metadata about storage resources to assist in security analysis and
    resilience verification. It provides visibility into the state and configuration
    of storage assets managed by NetApp.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Agent ID | String | Yes | The unique identifier for the Console Agent. |

    | System ID | String | Yes | The unique identifier for the Storage System. |


    ### Flow Description

    1. **Initialization**: Sets up the API manager and authenticates with the NetApp
    RRS using the integration's configured credentials (Client ID, Client Secret,
    and Account ID).

    2. **Parameter Extraction**: Retrieves the `Agent ID` and `System ID` from the
    action input parameters.

    3. **Data Retrieval**: Executes a GET request to the RRS `enrich/storage` endpoint
    using the provided IDs as query parameters.

    4. **Result Processing**: Captures the JSON response containing storage enrichment
    data.

    5. **Completion**: Attaches the raw JSON results to the action output and marks
    the execution as successful.


    ### Additional Notes

    This action does not operate on standard SOAR entities (such as IP addresses or
    Hostnames). It requires specific NetApp-specific identifiers provided as manual
    inputs or mapped from previous playbook steps. There are no internal mutations
    (like insights or entity updates) performed by this action.
