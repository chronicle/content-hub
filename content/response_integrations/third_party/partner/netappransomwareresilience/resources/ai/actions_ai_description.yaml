    ### General Description

    Unblocks a user previously blocked by NetApp Ransomware Resilience. This action
    serves as a remediation step to restore access for a user or specific client IPs.


    ### Flow Description

    1. Extracts the `User ID` and `User IPs` parameters from the action configuration.

    2. Makes a POST request to the NetApp Ransomware Resilience API (`users/unblock-user`)
    to unblock the specified user and/or IPs.

    3. Returns the API response as a JSON result and outputs a success or failure
    message to the SOAR platform.


    ### Additional Notes

    This action does not operate on SOAR entities but relies entirely on the provided
    action parameters.
  ai_short_description: >-
    Unblocks a user previously blocked by NetApp Ransomware Resilience to restore
    their access.
