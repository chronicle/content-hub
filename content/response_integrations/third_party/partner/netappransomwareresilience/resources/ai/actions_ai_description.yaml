Check Job Status:
  ai_description: >-
    ### General Description

    Checks the status of a previously triggered asynchronous job within the NetApp
    Ransomware Resilience Service (RRS). This action is typically used in playbooks
    to poll for the completion of long-running tasks like snapshot creation or volume
    management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Source | string | Yes | The source identifier of the request (e.g., 'rps-agent').
    |

    | Agent ID | string | Yes | The Console Agent ID associated with the job. |

    | Job ID | string | Yes | The unique identifier for the job whose status is being
    queried. |


    ### Flow Description

    1. **Initialization**: Sets up the API manager and handles OAuth authentication.

    2. **Parameter Extraction**: Retrieves the Source, Agent ID, and Job ID from the
    action inputs.

    3. **API Request**: Executes a GET request to the RRS job status endpoint using
    the provided identifiers.

    4. **Result Processing**: Captures the API response and returns it as a JSON object
    to the SOAR platform, indicating whether the job is still in progress, completed,
    or failed.


    ### Additional Notes

    This action does not operate on entities and requires specific IDs generated by
    previous actions in the workflow.
