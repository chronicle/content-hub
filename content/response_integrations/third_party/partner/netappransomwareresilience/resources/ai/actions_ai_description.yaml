Block User:
  ai_description: >-
    ### General Description

    Blocks a specific user from accessing resources protected by NetApp Ransomware
    Resilience. This action initiates a state change on the external NetApp service
    to prevent the specified user or client IPs from accessing protected storage resources.


    ### Flow Description

    1. Extracts the `User ID`, `User IPs`, and `Duration` parameters from the action
    configuration.

    2. Formats the provided comma-separated IPs into a list.

    3. Makes a POST request to the NetApp Ransomware Resilience API (`users/block-user`
    endpoint) with the user details and block duration.

    4. Retrieves the API response and attaches it to the action's JSON result.

    5. Returns a successful execution status along with a summary message.


    ### Additional Notes

    Client IPs are required for blocking NFS access but are optional for CIFS. The
    block duration can be set to permanent or a specific number of hours.
  ai_short_description: >-
    Blocks a user from accessing resources protected by NetApp Ransomware Resilience.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Blocks a user and/or specific client IPs from accessing resources protected
      by NetApp Ransomware Resilience.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the NetApp Ransomware Resilience API to
      block a user, which mutates external data. It does not fetch contextual enrichment
      data, nor does it update internal SOAR entities, alerts, insights, or case comments.
  entity_usage:
