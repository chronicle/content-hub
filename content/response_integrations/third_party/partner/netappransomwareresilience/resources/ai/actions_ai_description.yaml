    \ BlueXP API to initiate the snapshot process for a specific volume identified\
    \ by its ID, system ID, and agent ID.\n\n### Parameters Description\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Volume\
    \ ID | string | Yes | The unique identifier of the storage volume for which the\
    \ snapshot will be created. |\n| Agent ID | string | Yes | The identifier of the\
    \ Console agent responsible for managing the storage system. |\n| System ID |\
    \ string | Yes | The unique identifier of the Storage System where the volume\
