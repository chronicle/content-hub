  ai_description: >-
    ### General Description

    The **Volume Offline** action allows analysts to programmatically take a specific
    storage volume offline via the NetApp Ransomware Resilience Service (RRS). This
    action is primarily used as a containment strategy during active ransomware incidents
    to prevent further data encryption or unauthorized access by isolating the affected
    storage resource.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Volume ID** | String | Yes | The unique identifier of the storage volume that
    needs to be taken offline. |

    | **Agent ID** | String | Yes | The identifier for the Console Agent associated
    with the storage system. |

    | **System ID** | String | Yes | The identifier for the specific storage system
    where the volume resides. |


    ### Additional Notes

    - This action performs a state-changing operation on the external NetApp storage
    system.

    - All three parameters are required to uniquely identify the target volume within
    the NetApp BlueXP architecture.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Volume ID`, `Agent ID`,
    and `System ID` from the input parameters.

    2. **Authentication**: The integration's API Manager handles OAuth2 authentication
    with NetApp BlueXP to obtain a valid bearer token.

    3. **API Execution**: A POST request is dispatched to the RRS `storage/take-volume-offline`
    endpoint with the provided identifiers.

    4. **Result Processing**: The action captures the API response, determines the
    execution status (Completed or Failed), and attaches the raw JSON response to
    the action results in Google SecOps.
