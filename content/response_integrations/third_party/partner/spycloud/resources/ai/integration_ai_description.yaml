product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The SpyCloud integration is primarily categorized as Threat Intelligence because
    its core functionality involves enriching entities (IPs, Domains, Usernames/Emails)
    with breach data to determine if they have been compromised, which serves as a
    critical step in verifying the reputation of indicators. It is also categorized
    as IAM & Identity Management because the integration specifically targets account
    takeover prevention and the remediation of exposed passwords, allowing security
    teams to identify and address compromised user identities. It does not perform
    SIEM log analysis, EDR host containment, network security blocking, or ITSM ticket
    management.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
