  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud API to ensure the integration is configured
    correctly. This action validates the connection parameters by sending a request
    to the SpyCloud server.


    ### Flow Description

    1. The action extracts the required configuration parameters: API Root, API Key,
    and Verify SSL.

    2. It initializes the SpyCloudManager with these parameters.

    3. It executes a connectivity test by sending a GET request to the SpyCloud ping
    endpoint.

    4. If the request is successful, it returns a success message; otherwise, it returns
    a failure message with the error details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | API Root | String | Yes | The base URL for the SpyCloud API. |

    | API Key | String | Yes | The authentication key for the SpyCloud API. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate for the connection.
    |


    ### Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    system modifications.
