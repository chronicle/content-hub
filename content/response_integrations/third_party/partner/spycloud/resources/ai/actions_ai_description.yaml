  ai_description: >-
    Retrieves breach information from SpyCloud for specific entities including IP
    Addresses, Usernames, Email Addresses, and Domains. This action checks if the
    provided entities have been involved in known data breaches within a specified
    timeframe and enriches the entities with the findings.


    ### Flow Description:

    1. **Initialization**: The action initializes the SpyCloud manager using the provided
    API credentials and configuration.

    2. **Timeframe Calculation**: It determines the search window based on the 'Time
    Frame' parameter. If 'Custom' is selected, it validates and uses the 'Start Time'
    and 'End Time' parameters.

    3. **Catalog Resolution**: If a 'Catalog Filter' is provided, the action fetches
    available catalogs from SpyCloud to find the corresponding ID for targeted searching.

    4. **Entity Processing**: The action iterates through supported entities (IP,
    User, URL):
        * It determines the appropriate breach type (ips, emails, usernames, or domains).
        * It extracts the relevant identifier (e.g., stripping the domain from a URL).
        * It queries the SpyCloud API for breach records associated with that identifier
    and catalog.
    5. **Enrichment and Results**: For entities with found breaches, it updates the
    entity's additional properties with enrichment data, marks the entity as enriched,
    and compiles the raw breach data into a JSON result for the SOAR platform.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Catalog Filter | string | No | Specify the name of the category/catalog in which
    you want to search for breaches. |

    | Time Frame | ddl | Yes | Predefined time range for the search (Last Week, Last
    Month, Last Year, or Custom). |

    | Start Time | string | No | Mandatory if 'Time Frame' is set to 'Custom'. Format:
    ISO 8601. |

    | End Time | string | No | Optional end time for 'Custom' searches. Defaults to
    current time if not provided. Format: ISO 8601. |

    | Max Breaches To Return | string | No | The maximum number of breach records
    to retrieve per entity. Default is 1, maximum is 1000. |


    ### Additional Notes:

    * **Entity Mapping**: Username entities are automatically checked against an email
    regex; if they match, they are treated as 'emails' breach types, otherwise as
    'usernames'.

    * **URL Handling**: For URL entities, the action automatically extracts the domain
    part to perform the search.
