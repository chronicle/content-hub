  ai_description: >-
    ### General Description

    This action retrieves a list of available breach catalogs from the SpyCloud platform.
    It allows users to filter catalogs based on specific criteria and time frames,
    providing visibility into available breach data sources.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Logic | ddl | No | Specifies the filter logic to apply (Equal or Contains).
    |

    | Filter Value | string | No | The value to use for filtering. "Equal" matches
    the title, while "Contains" searches all values. |

    | Time Frame | ddl | Yes | The time range for the search (Last Week, Last Month,
    Last Year, or Custom). |

    | Start Time | string | No | The start time for the search in ISO 8601 format.
    Mandatory if "Custom" is selected for Time Frame. |

    | End Time | string | No | The end time for the search in ISO 8601 format. Defaults
    to current time if not provided when "Custom" is selected. |

    | Max Catalogs To Return | string | No | The maximum number of catalogs to return.
    Default is 50. |


    ### Additional Notes

    - If "Custom" is selected for the "Time Frame" parameter, the "Start Time" parameter
    must be provided.

    - The action performs local filtering if "Equal" logic is selected.


    ### Flow Description

    1. Extract configuration parameters (API Root, API Key, Verify SSL) and action
    parameters.

    2. Calculate the start and end timestamps based on the selected "Time Frame" and
    provided start/end time strings.

    3. Initialize the SpyCloudManager and query the SpyCloud API for catalogs using
    the calculated time range and filter value.

    4. Apply local filtering to the results if "Equal" logic is specified.

    5. Truncate the results list to the specified "Max Catalogs To Return" limit.

    6. Output the results as a JSON object and a formatted data table for the user.
