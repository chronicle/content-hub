List Catalogs:
  ai_description: >-
    ### General Description

    Retrieves a list of available breach catalogs from SpyCloud based on specified
    filtering criteria and timeframes. This action allows analysts to discover which
    data breach catalogs are available for querying within a given period.


    ### Flow Description

    1. Extracts action parameters including filter logic, filter value, timeframe,
    and limits.

    2. Calculates the start and end timestamps based on the provided timeframe (e.g.,
    Last Week, Last Month, Custom).

    3. Makes a GET request to the SpyCloud API (`/enterprise-v1/breach/catalog`) to
    fetch the available catalogs.

    4. Applies additional client-side filtering if the "Equal" logic is selected to
    match the exact catalog title.

    5. Limits the results to the specified maximum number of catalogs.

    6. Returns the catalogs as JSON results and constructs a data table named "Available
    Catalogs" for the case wall.


    ### Additional Notes

    The action supports pagination internally to fetch all relevant catalogs before
    applying the limit. If "Custom" is selected for the Time Frame, the "Start Time"
    parameter becomes mandatory.
  ai_short_description: >-
    Retrieves a list of available breach catalogs from SpyCloud based on specified
    filtering criteria and timeframes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the SpyCloud API using a GET request. It does not
      mutate external data, mutate internal data, update entities, create insights,
      modify alert data, or create case comments.
  entity_usage:
