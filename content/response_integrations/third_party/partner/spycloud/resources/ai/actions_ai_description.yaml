  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud server using the provided integration configuration
    parameters. This action ensures that the API Root and API Key are valid and that
    the SecOps platform can successfully communicate with the SpyCloud API.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies on the
    integration-level configuration parameters (API Root, API Key, Verify SSL).


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the SpyCloud manager with the provided credentials.

    3. Sends a test GET request to the SpyCloud API to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error message and fails the action.
