      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
