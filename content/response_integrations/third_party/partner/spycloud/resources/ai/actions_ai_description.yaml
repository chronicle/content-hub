      The action retrieves threat intelligence and breach information for indicators
      (IPs, Domains, Emails, Usernames) from SpyCloud. This aligns with the 'Enrich
      IOC' expected outcome. It does not modify external systems, update alerts, or
      perform any containment or remediation actions.
    remove_ioc_from_allowlist: false
