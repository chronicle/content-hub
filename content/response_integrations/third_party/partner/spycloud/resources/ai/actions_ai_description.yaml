  ai_description: >-
    Retrieves breach information for entities (IPs, Users/Emails, Domains) from SpyCloud.
    This action enriches entities with threat intelligence regarding known breaches,
    helping analysts identify compromised assets.


    ### Flow Description

    1. **Configuration & Parameter Extraction**: The action retrieves API credentials
    and action-specific parameters (Time Frame, Catalog Filter, etc.).

    2. **Entity Filtering**: It filters the provided target entities to include only
    supported types: IP Address, User/Email, and URL (Domain).

    3. **Breach Querying**: For each valid entity, it determines the appropriate breach
    type (IPs, Emails, Usernames, or Domains) and queries the SpyCloud API for breach
    records within the specified time frame.

    4. **Enrichment**: If breaches are found, the action updates the entity's `additional_properties`
    with the breach data and marks the entity as enriched.

    5. **Result Reporting**: The action updates the entities in the SOAR platform
    and returns the breach details as a JSON result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Catalog Filter | String | No | Specify the name of the category in which you
    want to search for breaches. |

    | Time Frame | DDL | Yes | Specify a time frame for the search (Last Week, Last
    Month, Last Year, Custom). |

    | Start Time | String | No | Start time for the search. Mandatory if "Custom"
    is selected for "Time Frame". Format: ISO 8601. |

    | End Time | String | No | End time for the search. Format: ISO 8601. If not provided
    for "Custom", defaults to current time. |

    | Max Breaches To Return | String | No | Specify how many breaches to return per
    entity. Default: 1. Maximum: 1000. |


    ### Additional Notes

    - If "Custom" is selected for the "Time Frame" parameter, the "Start Time" parameter
    must be provided.
