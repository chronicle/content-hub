Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the SpyCloud service. It ensures that the
    provided API Root, API Key, and SSL settings are correct and that the SpyCloud
    API is reachable and responding to requests. This action is typically used during
    the initial setup of the integration or for troubleshooting communication issues.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any runtime parameters. It utilizes
    the configuration parameters defined at the integration level (API Root, API Key,
    and Verify SSL). |


    ### Additional Notes

    - This action performs a simple GET request to the `/enterprise-v1/breach/catalog/1`
    endpoint to validate the credentials and network path.

    - As per standard SOAR practices, Ping actions are used for health checks and
    do not process entities or modify case data.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration's configuration
    settings, including the API Root URL, the API Key, and the SSL verification flag.

    2. **Manager Initialization:** It initializes the `SpyCloudManager` with the retrieved
    configuration.

    3. **Connectivity Test:** The manager executes the `test_connectivity` method,
    which sends a GET request to the SpyCloud API.

    4. **Response Validation:** The action checks the HTTP response status. If the
    request is successful (2xx status code), the connection is considered valid.

    5. **Final Status:** The action reports a success message to the Siemplify workbench
    if the connection is established, or an error message detailing the failure if
    the request fails.
