    | Filter Logic | Dropdown | No | Specify what filter logic should be applied.
    |

    | Filter Value | String | No | Specify what value should be used in the filter.
    If "Equal" is selected, action will try to find the exact match among results
    and if "Contains" is selected, action will try to find results that contain that
    substring. "Equal" works with "title" parameter, while "Contains" works with all
    values in response. If nothing is provided in this parameter, the filter will
    not be applied. |

    | Time Frame | Dropdown | Yes | Specify a time frame for the search. If "Custom"
    is selected, you also need to provide "Start Time". |

    | Start Time | String | No | Specify the start time for the search. This parameter
    is mandatory, if "Custom" is selected for the "Time Frame" parameter. Format:
    ISO 8601 |

    | End Time | String | No | Specify the end time for the search. Format: ISO 8601.
    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

    | Max Catalogs To Return | String | No | Specify how many catalogs to return.
    Default: 50. |
List Entity Breaches:
  ai_description: >-
    ### General Description

    Retrieves information about breaches related to specific entities (IP Address,
    Username, Email Address, Domain) using SpyCloud. It enriches the entities with
    breach status and returns detailed breach data as JSON results.


    ### Flow Description

    1. Extracts action parameters including Catalog Filter, Time Frame, and Max Breaches
    To Return.

    2. Filters target entities to include only supported types (IP Address, User,
    URL).

    3. If a Catalog Filter is provided, fetches available catalogs from SpyCloud via
    a GET request to `/enterprise-v1/breach/catalog` and resolves the catalog ID.

    4. Iterates over the filtered entities, determining the appropriate breach type
    (ips, emails, usernames, or domains) based on the entity type.

    5. Fetches breach data for each entity from SpyCloud via a GET request to `/enterprise-v1/breach/data/{breach_type}/{breach_identifier}`.

    6. Enriches the entity with a `was_breached` flag and sets its `is_enriched` status
    to True if breaches are found.

    7. Updates the enriched entities in the SecOps platform and attaches the breach
    details as JSON results.


    ### Additional Notes

    The action strips the domain part from URL entities before querying SpyCloud.
    User entities are checked against an email regex to determine if they should be
    queried as emails or usernames.
  ai_short_description: >-
    Retrieves information about breaches related to IP Address, User, and URL entities
    from SpyCloud, enriching the entities with breach status and returning detailed
    breach data as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to SpyCloud to fetch catalogs and breach data
      (fetches_data=true). It does not mutate external data or internal SecOps data.
      It updates entities with enrichment data and sets is_enriched to true (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
