    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where SUPPORTED_ENTITY_TYPES includes ADDRESS, USER,
      and URL. Therefore, it targets these specific entity types and filters by entity_type.
  outcome_categories:
    add_alert_comment: false
