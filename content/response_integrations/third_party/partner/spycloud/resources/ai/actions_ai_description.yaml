  ai_description: >-
    Lists available catalogs in SpyCloud based on specified filtering criteria.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the limit and time frame parameters.

    3. Calls the SpyCloud API to retrieve catalogs within the specified time frame.

    4. Applies the filter logic (Equal or Contains) to the retrieved catalogs if a
    filter value is provided.

    5. Returns the matching catalogs as a JSON object and attaches a data table to
    the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Logic | Dropdown | No | Specify what filter logic should be applied (Equal,
    Contains). |

    | Filter Value | String | No | Specify what value should be used in the filter.
    If "Equal" is selected, action will try to find the exact match among results
    and if "Contains" is selected, action will try to find results that contain that
    substring. "Equal" works with "title" parameter, while "Contains" works with all
    values in response. If nothing is provided in this parameter, the filter will
    not be applied. |

    | Time Frame | Dropdown | Yes | Specify a time frame for the search. If "Custom"
    is selected, you also need to provide "Start Time". |

    | Start Time | String | No | Specify the start time for the search. This parameter
    is mandatory if "Custom" is selected for the "Time Frame" parameter. Format: ISO
    8601. |

    | End Time | String | No | Specify the end time for the search. Format: ISO 8601.
    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

    | Max Catalogs To Return | Integer | No | Specify how many catalogs to return.
    Default: 50. |
