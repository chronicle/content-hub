  ai_description: >-
    ### General Description

    The **List Entity Breaches** action integrates with SpyCloud to retrieve information
    about breaches related to specific entities. It supports IP Addresses, Usernames,
    Email Addresses, and Domains. The action fetches breach data based on specified
    time frames and catalog filters, enriching the entities with the findings and
    returning the detailed breach information as JSON results.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves configuration and action parameters, including
    time frames and catalog filters.

    2. **Time Frame Calculation**: Determines the start and end timestamps for the
    breach search based on the provided parameters.

    3. **Catalog Retrieval**: If a catalog filter is specified, fetches the available
    catalogs from SpyCloud and identifies the matching catalog ID.

    4. **Entity Processing**: Iterates over the supported target entities (ADDRESS,
    USERUNIQNAME, DestinationURL).

    5. **Breach Type Determination**: Identifies the appropriate breach type (ips,
    emails, usernames, domains) based on the entity type and format.

    6. **Breach Retrieval**: Queries the SpyCloud API for breaches associated with
    the entity's identifier.

    7. **Entity Enrichment**: If breaches are found, updates the entity's additional
    properties with the breach data, marks the entity as enriched, and stores the
    full breach details in the JSON results.

    8. **Result Compilation**: Outputs a summary message detailing which entities
    were successfully processed and which had no breach information found.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Catalog Filter | String | No | Specify the name of the category in which you
    want to search for breaches. |

    | Time Frame | Dropdown | Yes | Specify a time frame for the search (e.g., Last
    Week, Last Month, Last Year, Custom). If "Custom" is selected, the "Start Time"
    parameter becomes mandatory. |

    | Start Time | String | No | Specify the start time for the search in ISO 8601
    format. Mandatory if "Custom" is selected for the "Time Frame" parameter. |

    | End Time | String | No | Specify the end time for the search in ISO 8601 format.
    If not provided and "Custom" is selected for "Time Frame", the current time is
    used. |

    | Max Breaches To Return | Integer | No | Specify how many breaches to return
    per entity. Default is 1. Maximum is 1000. |


    ### Additional Notes

    - The "Start Time" parameter is technically optional in the configuration but
    becomes mandatory during execution if the "Time Frame" parameter is set to "Custom".

    - The action strips the domain part from URL entities to search for domain breaches.

    - User entities are automatically classified as either email addresses or usernames
    based on a regex validation.
