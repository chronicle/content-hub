    reasoning: >-
      The action fetches breach data for IP, URL, and User entities. Fetching threat
      intelligence and breach data for IPs and URLs aligns with 'Enrich IOC'. Fetching
      breach data for Users aligns with 'Enrich Asset'. It does not mutate external
