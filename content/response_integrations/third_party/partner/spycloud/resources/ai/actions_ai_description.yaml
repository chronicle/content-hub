Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud server using the provided integration configuration
    parameters. This action ensures that the API credentials and network settings
    are correctly configured to communicate with the SpyCloud API.


    ### Flow Description

    1. Extracts integration configuration parameters including API Root, API Key,
    and Verify SSL.

    2. Initializes the SpyCloud API client.

    3. Sends an HTTP GET request to the SpyCloud ping endpoint (`/enterprise-v1/breach/catalog/1`)
    to verify connectivity.

    4. Evaluates the HTTP response and returns a success message if the connection
    is established, or a failure message if an error occurs.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    SpyCloud integration to verify that the platform can successfully authenticate
    and communicate with the external service.
