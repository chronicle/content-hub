List Catalogs:
  ai_description: >-
    Lists available breach catalogs from SpyCloud based on specified timeframes and
    filters. This action allows analysts to discover which data sources (catalogs)
    are available in the SpyCloud database for a given period, facilitating further
    investigation into specific breaches.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves API credentials and action parameters including
    filter logic, time range, and result limits.

    2. **Timeframe Calculation:** Converts the selected 'Time Frame' (e.g., Last Week,
    Last Month, Last Year, or Custom) into specific start and end dates using utility
    functions.

    3. **API Request:** Sends a paginated GET request to the SpyCloud `/enterprise-v1/breach/catalog`
    endpoint via the SpyCloudManager.

    4. **Filtering:** Applies local filtering to the results if 'Equal' logic is selected,
    matching the 'Filter Value' against catalog titles. If 'Contains' is selected,
    the API-level query parameter handles the search.

    5. **Data Processing:** Slices the result list based on the 'Max Catalogs To Return'
    parameter to ensure the output stays within the requested limit.

    6. **Output Generation:** Populates a data table named 'Available Catalogs' and
    provides the raw JSON results for downstream playbook use.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | DDL | No | Determines how the 'Filter Value' is applied. 'Equal'
    performs a strict title match in the script, while 'Contains' relies on the API's
    query parameter. |

    | Filter Value | String | No | The string to search for within the catalogs. If
    'Equal' is used, it matches the title; otherwise, it acts as a general query.
    |

    | Time Frame | DDL | Yes | The temporal scope of the search (Last Week, Last Month,
    Last Year, or Custom). |

    | Start Time | String | No | Mandatory if 'Time Frame' is set to 'Custom'. Expects
    ISO 8601 format. |

    | End Time | String | No | ISO 8601 format. Defaults to the current time if 'Custom'
    is selected and this field is left empty. |

    | Max Catalogs To Return | String | No | Limits the number of catalog records
    returned. Default is 50. |


    ### Additional Notes:

    - If 'Custom' is selected for 'Time Frame', the 'Start Time' parameter must be
    provided or the action will fail.

    - The 'Equal' filter logic is case-sensitive and specifically targets the 'title'
    field of the catalog objects returned by the API.
