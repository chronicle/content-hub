List Entity Breaches:
  ai_description: >-
    Enriches entities by checking for associated data breaches in the SpyCloud database.
    This action supports IP Addresses, Usernames, Email Addresses, and Domains, providing
    detailed information about where and when an entity's data may have been compromised.


    ### Flow Description

    1. **Initialization**: Establishes a connection to the SpyCloud API using the
    provided credentials and validates the 'Max Breaches To Return' parameter.

    2. **Time Window Calculation**: Determines the start and end timestamps for the
    search based on the 'Time Frame' selection (Last Week, Last Month, Last Year,
    or Custom).

    3. **Catalog Resolution**: If a 'Catalog Filter' is provided, the action fetches
    available catalogs from SpyCloud to identify the specific ID for the requested
    category.

    4. **Entity Processing**: Iterates through supported entities (IP, User, URL)
    and maps them to SpyCloud breach types (ips, emails, usernames, domains).

    5. **Data Retrieval**: Queries the SpyCloud API for breach records matching the
    entity identifier, applying the catalog filter and result limit.

    6. **Internal Update**: For entities with found breaches, it updates the entity's
    additional properties with a 'was_breached' flag, marks the entity as enriched,
    and attaches the full breach details as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Catalog Filter | string | No | Specify the name of the category/source in which
    you want to search for breaches. |

    | Time Frame | ddl | Yes | Specify a time frame for the search. Options: Last
    Week, Last Month, Last Year, Custom. |

    | Start Time | string | No | Mandatory if 'Custom' is selected for 'Time Frame'.
    Format: ISO 8601. |

    | End Time | string | No | Optional for 'Custom' Time Frame. If empty, defaults
    to the current time. Format: ISO 8601. |

    | Max Breaches To Return | string | No | Limits the number of breach records returned
    per entity. Default is 1; Maximum is 1000. |


    ### Additional Notes

    - If 'Custom' is selected for 'Time Frame', the 'Start Time' parameter must be
    provided, or the action will fail.

    - For URL entities, the action automatically extracts the domain part to perform
    the search.
