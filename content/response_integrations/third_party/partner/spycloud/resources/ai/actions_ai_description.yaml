  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the SpyCloud service.\
    \ It ensures that the provided API credentials and network configurations (such\
    \ as the API Root and SSL settings) are valid and that the SpyCloud API is reachable.\n\
    \n### Parameters Description\n| Parameter Name | Expected Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| **API Root** | String | Yes | The base URL\
    \ for the SpyCloud API instance. |\n| **API Key** | String | Yes | The API key\
    \ used for authentication with SpyCloud. |\n| **Verify SSL** | Boolean | Yes |\
    \ If enabled, the action will verify the SSL certificate of the SpyCloud server.\
    \ |\n\n### Flow Description\n1. **Parameter Extraction:** The action retrieves\
    \ the `API Root`, `API Key`, and `Verify SSL` settings from the integration configuration.\n\
    2. **Manager Initialization:** It initializes the `SpyCloudManager` with the extracted\
    \ credentials.\n3. **Connectivity Test:** The manager executes a `GET` request\
    \ to a specific SpyCloud endpoint (`/enterprise-v1/breach/catalog/1`) to test\
    \ the connection.\n4. **Result Handling:** \n    * If the request is successful,\
    \ the action completes with a success message.\n    * If an error occurs (e.g.,\
    \ authentication failure, network timeout), the action fails and provides the\
    \ error details.\n\n### Additional Notes\n* This action does not process or require\
    \ any entities.\n* It is strictly used for configuration validation and does not\
    \ perform any data enrichment or mutation."
