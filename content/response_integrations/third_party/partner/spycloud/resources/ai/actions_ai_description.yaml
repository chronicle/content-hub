  ai_description: >-
    ### General Description

    This action retrieves a list of available data catalogs from SpyCloud based on
    specified timeframes and filtering criteria. It is primarily used to identify
    which breach catalogs are available for further investigation or entity enrichment
    within a specific period.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | DDL | No | Determines how the 'Filter Value' is applied. Options
    are 'Equal' (exact match on title) or 'Contains' (substring match across all fields).
    Default is 'Equal'. |

    | Filter Value | String | No | The string to search for. If 'Equal' is selected,
    it matches the catalog title. If 'Contains' is selected, it searches all response
    fields. |

    | Time Frame | DDL | Yes | The period to search for catalogs. Options: 'Last Week',
    'Last Month', 'Last Year', or 'Custom'. |

    | Start Time | String | No | Mandatory if 'Time Frame' is set to 'Custom'. Specifies
    the beginning of the search range in ISO 8601 format. |

    | End Time | String | No | Specifies the end of the search range in ISO 8601 format.
    If 'Custom' is selected and this is empty, the current time is used. |

    | Max Catalogs To Return | String | No | Limits the number of catalog records
    returned. Default is 50. |


    ### Additional Notes

    - If 'Custom' is selected for 'Time Frame', the 'Start Time' parameter must be
    provided, otherwise the action will fail.

    - The action supports pagination and will automatically fetch all results from
    the SpyCloud API before applying local filters and limits.


    ### Flow Description

    1. **Initialization**: The action initializes the SpyCloud manager using the provided
    API credentials and configuration.

    2. **Timeframe Calculation**: It parses the 'Time Frame' and optional 'Start/End
    Time' parameters to determine the search window.

    3. **Data Retrieval**: It performs a paginated GET request to the SpyCloud `/enterprise-v1/breach/catalog`
    endpoint.

    4. **Filtering**: If a 'Filter Value' is provided, the action filters the retrieved
    list based on the 'Filter Logic' (Equal or Contains).

    5. **Limiting**: The result set is truncated based on the 'Max Catalogs To Return'
    parameter.

    6. **Output**: The final list of catalogs is added to the action results as a
    JSON object and displayed in a data table named 'Available Catalogs'.
