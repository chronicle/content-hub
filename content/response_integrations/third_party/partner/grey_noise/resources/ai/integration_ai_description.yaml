product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration is primarily focused on providing threat intelligence and vulnerability
    context. The 'Threat Intelligence' category is applicable because the integration
    provides extensive enrichment for IP addresses (reputation, classification, actor
    information, and historical timelines) via actions like 'IP Lookup' and 'Quick
    IP Lookup'. The 'Vulnerability Management' category is applicable because the
    'Get CVE Details' action retrieves critical vulnerability data, including CVSS
    and EPSS scores, which helps analysts assess the exploitability of vulnerabilities.
    The integration does not fit the 'SIEM' category because, while it generates alerts
    via a connector, it does so based on external threat intelligence data rather
    than querying internal logs or assets. It does not perform EDR, Network Security
    (blocking), Email Security, IAM, Cloud Security, ITSM, Asset Inventory, or Collaboration
    functions.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
