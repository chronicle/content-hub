product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The GreyNoise integration is primarily a Threat Intelligence tool. Its core actions,
    including 'IP Lookup', 'Quick IP Lookup', and 'IP Timeline Lookup', provide reputation,
    risk scores, and historical activity data for IP addresses, which directly aligns
    with the Threat Intelligence category definition. Additionally, the 'Get CVE Details'
    action retrieves vulnerability data such as CVSS and EPSS scores, which aligns
    with the Vulnerability Management category by helping analysts determine the exploitability
    of a vulnerability. The integration does not perform SIEM functions (as it does
    not analyze internal logs), EDR, Network Security, Email Security, IAM, Cloud
    Security, ITSM, Asset Inventory, or Collaboration tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
