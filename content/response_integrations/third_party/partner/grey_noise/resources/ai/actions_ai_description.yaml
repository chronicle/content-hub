IP Timeline Lookup:
  ai_description: >-
    Retrieves the historical activity timeline for IP Address entities from GreyNoise,
    providing visibility into how an indicator's behavior has changed over time. This
    action allows analysts to track shifts in classification, associated tags, destination
    ports, and other metadata with configurable time granularity.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field | DDL | No | Specifies the attribute to aggregate data by. Options include
    classification, destination_port, http_path, http_user_agent, source_asn, source_org,
    source_rdns, and tag_ids. Default is 'classification'. |

    | Granularity | String | No | Defines the time bucket size for the timeline. Supports
    hours (e.g., '1h' to '24h') or days (e.g., '1d' to '90d'). Default is '1d'. |

    | Days | String | No | The total lookback period in days (1 to 90). Default is
    '30'. |


    ### Flow Description


    1. **Initialization**: Extracts the GreyNoise API key from the integration configuration
    and validates the 'Days' parameter to ensure it is a positive integer.

    2. **Entity Identification**: Filters the target entities to identify all IP Address
    (ADDRESS) objects.

    3. **Data Retrieval**: For each identified IP, the action queries the GreyNoise
    Timeline API using the specified field, granularity, and lookback period.

    4. **Tag Enrichment**: If the 'Field' parameter is set to 'tag_ids', the action
    performs secondary API calls to fetch descriptive metadata (name, intention, category)
    for each tag ID found in the timeline.

    5. **Internal Mutation**: Updates the entity's additional properties with the
    timeline metadata and raw results. It also sets the 'is_enriched' flag to true.

    6. **Insight Generation**: Constructs a detailed HTML insight containing a visual
    summary of the activity timeline, including overview statistics and a breakdown
    of events.

    7. **Finalization**: Updates the entities within Google SecOps and returns a JSON
    result containing the full timeline data for each processed IP.
  capabilities:
