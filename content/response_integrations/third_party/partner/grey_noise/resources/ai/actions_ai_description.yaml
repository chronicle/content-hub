Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the GreyNoise API. Its primary purpose is to validate
    that the provided API key is correct, active, and has not expired, ensuring that
    subsequent enrichment or search actions can proceed without authentication issues.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    - This action is typically used during the initial setup of the GreyNoise integration
    or for troubleshooting connection issues.

    - It checks for API key expiration for Enterprise-tier keys and logs a warning
    if the key is no longer valid.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify SDK and retrieves
    the GreyNoise API key from the integration configuration.

    2. **API Connection**: It establishes a session with the GreyNoise API using the
    provided credentials.

    3. **Connectivity Test**: It executes a `test_connection` call to the GreyNoise
    service.

    4. **Validation**: The action parses the response to confirm the API tier (Community
    vs. Enterprise) and checks the expiration date for Enterprise keys.

    5. **Error Handling**: If a rate limit is reached or a request fails, the action
    captures the specific error and marks the execution as failed.

    6. **Completion**: Returns a success message and a boolean result indicating whether
    the connection was successful.
