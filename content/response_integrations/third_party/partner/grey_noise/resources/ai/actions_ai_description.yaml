Get CVE Details:
  ai_description: >-
    ### General Description

    Enriches CVE entities using GreyNoise intelligence. This action retrieves detailed
    threat intelligence for Common Vulnerabilities and Exposures (CVEs), including
    CVSS scores, EPSS scores, and active exploitation data, to provide analysts with
    immediate context regarding vulnerability severity and active threats.


    ### Flow Description

    1. Filters the case's target entities to identify those with the type `CVE`.

    2. Iterates through the identified CVE entities and validates their identifier
    format (e.g., `CVE-YYYY-NNNN`).

    3. Makes an API call to the GreyNoise service (`cve_lookup`) for each valid CVE
    to fetch vulnerability details, timeline, and exploitation activity.

    4. Updates the entity's `additional_properties` with the retrieved enrichment
    data and marks the entity as enriched (`is_enriched = True`).

    5. Generates an HTML insight containing the threat assessment and exploitation
    intelligence, and attaches it to the entity.

    6. Saves the updated entities back to the case.


    ### Additional Notes

    This action relies on the GreyNoise API key configured at the integration level.
    Entities with invalid CVE formats or those that encounter API request failures
    will be skipped and logged as failed, while the action continues processing the
    remaining entities.
  ai_short_description: >-
    Enriches CVE entities with GreyNoise intelligence, including CVSS scores, EPSS
    scores, and active threat data, updating the entities and attaching the results
    as insights.
