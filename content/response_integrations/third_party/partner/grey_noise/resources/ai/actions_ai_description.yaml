  ai_description: >-
    Performs a lightweight IP classification lookup using GreyNoise to retrieve trust
    level, internet scanner status, and business service status.


    ### General Description

    This action queries the GreyNoise API to quickly classify IP address entities.
    It determines whether an IP is a known business service or an internet scanner,
    and retrieves its trust level and classification (e.g., malicious, suspicious,
    benign). The action then enriches the entities with this intelligence, updates
    their suspicious status, and generates a visual insight for analysts.


    ### Parameters Description

    This action does not require any specific input parameters to be configured on
    the action level. It relies on the GreyNoise API key configured at the integration
    level.


    ### Flow Description

    1. Extracts all `ADDRESS` (IP) entities from the current case.

    2. Sends a bulk quick lookup request to the GreyNoise API for the extracted IP
    addresses.

    3. Parses the response to identify noise data, business service intelligence,
    and internet scanner intelligence.

    4. For each successfully found IP, updates the entity's additional properties
    with the enrichment data and sets its `is_suspicious` flag if the classification
    warrants it.

    5. Generates and attaches an HTML insight to the enriched entities.

    6. Returns a JSON result containing the raw lookup data for all processed IPs.
