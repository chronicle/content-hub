  ai_description: >-
    ### General Description

    Executes custom GreyNoise Query Language (GNQL) queries to search GreyNoise threat
    intelligence data. This action supports automatic pagination to retrieve large
    datasets based on the provided query and configuration parameters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | GNQL Query | string | Yes | The GreyNoise Query Language query string to execute.
    |

    | Max Results | string | No | Number of results to return per request (max 5000).
    Defaults to 1000. |

    | Quick | boolean | No | If true, the response will only include the IP address
    and the classification or trust level. Defaults to false. |

    | Exclude Raw | boolean | No | Whether to exclude raw scan data from the response.
    Defaults to true. |


    ### Flow Description

    1. Extracts action parameters (GNQL Query, Max Results, Quick, Exclude Raw).

    2. Initializes the `APIManager` with the configured API key.

    3. Executes the GNQL query using the `APIManager`, handling pagination automatically
    until the `Max Results` limit is reached or no more data is available.

    4. Collects all retrieved data into a list.

    5. Returns the collected data as a JSON result in the action output.


    ### Additional Notes

    None.
