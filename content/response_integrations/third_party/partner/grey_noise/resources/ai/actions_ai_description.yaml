  ai_description: >-
    Retrieves the historical activity timeline for IP Address entities from GreyNoise,
    providing visibility into how an IP's behavior and classification have changed
    over time. This action allows analysts to visualize trends in scanning activity,
    port usage, or tag associations.


    ### Flow Description:

    1. **Parameter Initialization:** Extracts the 'Days', 'Field', and 'Granularity'
    parameters from the action configuration and validates that 'Days' is a positive
    integer.

    2. **Entity Filtering:** Identifies all IP Address entities within the current
    context.

    3. **External Lookup:** For each IP, it queries the GreyNoise Timeline API using
    the specified field (e.g., classification, tag_ids) and time range.

    4. **Metadata Enrichment:** If the 'Field' is set to 'tag_ids', the action performs
    additional lookups to fetch descriptive metadata for each tag identified in the
    timeline.

    5. **Internal Updates:** Enriches the SOAR entities with the retrieved timeline
    data and marks them as enriched.

    6. **Insight Generation:** Creates a detailed HTML insight for each entity, featuring
    a formatted timeline overview and links to the GreyNoise Visualizer.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field | DDL | No | The specific attribute to track over time. Options include:
    destination_port, http_path, http_user_agent, source_asn, source_org, source_rdns,
    tag_ids, or classification (default). |

    | Granularity | String | No | The time bucket size for the timeline. Supports
    hours (e.g., 1h to 24h) or days (e.g., 1d to 90d). Default is '1d'. |

    | Days | String | No | The total lookback period in days. Must be a positive integer.
    Default is '30'. |


    ### Additional Notes:

    - This action is primarily used for historical context and trend analysis rather
    than real-time reputation checks.

    - If 'tag_ids' is selected as the field, the action will automatically fetch tag
    names and descriptions to provide more context in the insights.
