  ai_description: >-
    Tests the connectivity to the GreyNoise API and validates the provided API key.
    This action is primarily used to ensure that the integration is correctly configured
    and that the SOAR platform can communicate with GreyNoise services. It checks
    the validity of the API key and, for enterprise-tier keys, verifies that the key
    has not expired.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (GN API Key).


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the GreyNoise API key from the integration's configuration settings.

    2. **Connectivity Test**: It uses the GreyNoise API Manager to call the `test_connection`
    endpoint of the GreyNoise API.

    3. **Expiration Check**: If the connection is successful and the API key is not
    a 'community' tier key, the action parses the expiration date from the response
    and compares it against the current date to ensure the key is still valid.

    4. **Result Handling**: The action captures any exceptions (such as rate limits
    or request failures) and returns a success or failure message to the SOAR platform
    along with the execution status.
