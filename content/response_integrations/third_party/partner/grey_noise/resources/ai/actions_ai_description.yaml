IP Timeline Lookup:
  ai_description: >-
    ### General Description

    Retrieves the activity timeline for IP address entities from GreyNoise, showing
    changes over time with configurable granularity. This action helps analysts understand
    the historical behavior, classification, and associated tags of an IP address
    over a specified period.


    ### Flow Description

    1. Extracts the action parameters: `Days`, `Field`, and `Granularity`.

    2. Filters the target entities to include only IP addresses (`ADDRESS`).

    3. Iterates over each IP address and makes an API request to GreyNoise to fetch
    the activity timeline.

    4. If the `Field` parameter is set to `tag_ids`, the action makes additional API
    requests to GreyNoise to fetch metadata for each tag ID found in the timeline.

    5. If timeline data is found, the action enriches the entity's additional properties
    with the timeline metadata and results.

    6. Generates an HTML insight displaying the timeline overview and activity, and
    attaches it to the entity.

    7. Updates the enriched entities in the platform and returns the timeline data
    as JSON results.


    ### Additional Notes

    - The `Days` parameter must be a positive integer.

    - The `Granularity` parameter accepts hours (e.g., `1h`) or days (e.g., `1d`).
  ai_short_description: >-
    Retrieves the activity timeline for IP address entities from GreyNoise, showing
