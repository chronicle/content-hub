Quick IP Lookup:
  ai_description: >-
    Performs a lightweight IP classification lookup using GreyNoise to determine trust
    levels, internet scanner status, and business service status for IP Address entities.
    This action is designed for high-speed enrichment of multiple IPs simultaneously.


    ### Parameters

    There are no user-configurable parameters for this action beyond the global integration
    API key.


    ### Flow Description

    1. **Entity Identification:** The action identifies all `ADDRESS` (IP) entities
    within the current scope.

    2. **Batch Lookup:** It sends a batch request to the GreyNoise Quick Lookup API
    for all identified IP addresses.

    3. **Data Processing:** For each IP found in the GreyNoise dataset, the action:
        *   Updates the entity's `additional_properties` with GreyNoise metadata (e.g.,
    `GN_is_business_service`, `GN_is_internet_scanner`, `GN_trust_level`, `GN_classification`).
        *   Sets the entity's `is_enriched` status to `true`.
        *   Updates the entity's `is_suspicious` status if the GreyNoise classification
    is 'suspicious' or 'malicious'.
    4. **Insight Generation:** Creates a detailed HTML insight for each enriched entity,
    providing a visual summary of the IP's intelligence (Business Service vs. Internet
    Scanner status).

    5. **Finalization:** Updates the entities in the Google SecOps platform and returns
    a summary message along with the raw JSON results for all processed IPs.


    ### Additional Notes

    *   This action uses the GreyNoise 'Quick' endpoint, which is optimized for speed
    and batch processing but provides less detail than a full IP lookup.

    *   If no IP entities are found, the action completes gracefully with an informative
    message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
