IP Lookup:
  ai_description: "Enriches IP Address entities with comprehensive threat intelligence\
    \ from GreyNoise, including classification (benign, suspicious, malicious), actor\
    \ attribution, associated tags, CVEs, and business service intelligence. The action\
    \ automatically detects the API tier (Community vs. Enterprise) to optimize data\
    \ retrieval, using batch lookups for Enterprise keys. It updates the entity's\
    \ suspicious status based on GreyNoise classification and generates a detailed\
    \ HTML insight for the case wall.\n\n### Flow Description:\n1. **Identify Entities:**\
    \ Filters the target entities to identify all IP Address (ADDRESS) entities.\n\
    2. **Tier Detection:** Checks the provided GreyNoise API key to determine if it\
    \ belongs to the Community or Enterprise tier.\n3. **Data Retrieval:** \n    *\
    \ For **Enterprise** keys: Performs a batch lookup for all identified IPs to maximize\
    \ efficiency.\n    * For **Community** keys: Performs individual lookups for each\
    \ IP.\n4. **Entity Enrichment:** For each IP found in the GreyNoise dataset, it\
    \ updates the entity's `additional_properties` with metadata (e.g., country, organization,\
    \ tags) and marks the entity as enriched.\n5. **Risk Assessment:** Sets the entity's\
    \ `is_suspicious` flag to true if GreyNoise classifies the IP as 'suspicious'\
    \ or 'malicious'.\n6. **Insight Generation:** Creates a formatted HTML insight\
    \ for each successfully processed entity, providing a visual summary of the intelligence.\n\
    \n### Parameters Description:\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| GN API Key | String | Yes | The API key\
    \ used to authenticate with GreyNoise services. This is configured at the integration\
    \ level. |\n\n### Additional Notes:\n* This action is read-only regarding external\
    \ systems and is classified as an enrichment action.\n* Community tier users will\
    \ receive a limited set of data compared to Enterprise users."
