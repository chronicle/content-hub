  ai_description: "### General Description\nThis action enriches CVE (Common Vulnerabilities\
    \ and Exposures) entities by retrieving threat intelligence from the GreyNoise\
    \ API. It fetches critical vulnerability data, including CVSS scores, EPSS scores,\
    \ and active threat activity, to provide analysts with context regarding the exploitability\
    \ and prevalence of the vulnerability. The action updates the entity's properties\
    \ within the SOAR platform and generates a detailed HTML insight for quick reference.\n\
    \n### Flow Description\n1. **Initialization**: The action initializes the GreyNoise\
    \ API manager using the configured API key.\n2. **Entity Retrieval**: It identifies\
    \ all CVE-type entities associated with the current case.\n3. **Validation**:\
    \ For each CVE entity, the action validates the identifier format (CVE-YYYY-NNNN).\n\
    4. **Data Fetching**: It queries the GreyNoise API to retrieve detailed vulnerability\
    \ information.\n5. **Enrichment**: \n    * Updates the entity's `additional_properties`\
    \ with retrieved data (e.g., `GN_CVSS_Score`, `GN_EPSS_Score`, `GN_Exploit_Found`).\n\
    \    * Marks the entity as enriched.\n6. **Insight Generation**: Creates an HTML-formatted\
    \ insight containing the vulnerability assessment and adds it to the entity.\n\
    7. **Finalization**: Updates the entities in the SOAR platform and adds the raw\
    \ result data to the action output.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| GN API\
    \ Key | String | Yes | The API key used to authenticate with the GreyNoise service.\
    \ |\n\n### Additional Notes\n* The action requires at least one CVE entity to\
    \ be present in the case to execute successfully.\n* If no data is found for a\
    \ specific CVE in the GreyNoise dataset, the entity will not be enriched, and\
    \ the action will log the event."
