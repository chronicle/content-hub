  ai_description: >-
    Enriches CVE entities using GreyNoise intelligence to provide deep context on
    vulnerabilities and active exploitation. This action retrieves critical data points
    including CVSS scores, EPSS (Exploit Prediction Scoring System) scores, CISA KEV
    (Known Exploited Vulnerabilities) status, and real-time threat activity counts.
    It helps analysts prioritize vulnerabilities by identifying which ones are being
    actively exploited in the wild.


    ### Parameters Description

    There are no specific action parameters for this action. It automatically processes
    all CVE entities present in the current context using the integration's global
    API key.


    ### Flow Description

    1. **Entity Identification**: The action scans the current case for entities of
    type CVE.

    2. **Format Validation**: Each CVE identifier is validated against the standard
    format (CVE-YYYY-NNNN).

    3. **GreyNoise Lookup**: For each valid CVE, the action queries the GreyNoise
    API to retrieve vulnerability details and exploitation intelligence.

    4. **Data Enrichment**: The retrieved data (CVSS, EPSS, description, etc.) is
    mapped to entity attributes prefixed with `GN_`.

    5. **Insight Generation**: A detailed HTML insight is generated for each CVE,
    featuring color-coded severity levels, exploit availability badges, and active
    threat IP counts.

    6. **Internal Update**: The action updates the CVE entities in Google SecOps with
    the new enrichment data and attaches the generated insights to the case wall.
