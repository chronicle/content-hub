  ai_description: >-
    Performs a lightweight IP classification lookup using the GreyNoise service to
    identify internet scanners and business services. This action is designed for
    high-speed enrichment of IP Address entities, providing immediate context on whether
    an IP is known for 'noise' (mass scanning) or belongs to a trusted business service.


    ### Flow Description

    1. **Entity Extraction:** Identifies all IP Address entities within the current
    alert or case context.

    2. **GreyNoise Query:** Executes a bulk 'quick lookup' request to the GreyNoise
    API for all identified IP addresses.

    3. **Data Processing:** Iterates through the API responses to determine if GreyNoise
    has data ('noise') for each IP.

    4. **Entity Enrichment:** For IPs found in the dataset, it updates the entity's
    additional properties with trust levels and classifications.

    5. **Risk Assessment:** Automatically marks entities as suspicious if GreyNoise
    classifies them as 'malicious' or 'suspicious'.

    6. **Insight Generation:** Creates and attaches a formatted HTML insight to each
    enriched entity, providing a visual summary of the intelligence.

    7. **Result Reporting:** Returns a comprehensive JSON object containing the lookup
    results for all processed entities.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the global integration configuration (API Key). |


    ### Additional Notes

    * This action specifically targets `ADDRESS` entities.

    * It uses the GreyNoise 'quick' endpoint, which is optimized for performance and
    provides a subset of the full IP context (classification and trust level).
