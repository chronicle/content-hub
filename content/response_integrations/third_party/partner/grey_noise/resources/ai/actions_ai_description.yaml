  ai_description: >-
    ### General Description

    This action retrieves the activity timeline for IP addresses from the GreyNoise
    platform. It provides visibility into how an IP address's classification or other
    fields have changed over a specified period, helping analysts understand the historical
    behavior of an indicator.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Days`, `Field`, and `Granularity`
    parameters from the configuration.

    2. **Validation**: It validates that the `Days` parameter is a positive integer.

    3. **Entity Retrieval**: It identifies all `ADDRESS` type entities within the
    current case.

    4. **API Interaction**: For each IP entity, it queries the GreyNoise API to fetch
    the activity timeline based on the provided parameters.

    5. **Enrichment**: It updates the entity's `additional_properties` with the retrieved
    timeline data (e.g., first seen, timeline field).

    6. **Insight Generation**: It generates an HTML insight containing the timeline
    data and attaches it to the entity.

    7. **Entity Update**: It updates the entities in the case with the new enrichment
    data and marks them as enriched.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field | ddl | No | The field over which to show the activity breakdown (e.g.,
    classification, destination_port). Default is 'classification'. |

    | Granularity | string | No | The granularity of activity date ranges. Can be
    in hours (e.g., 'Xh') or days (e.g., 'Xd'). Default is '1d'. |

    | Days | string | No | The number of days to show data for. Default is '30'. |


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any blocking
    or external system modifications.
