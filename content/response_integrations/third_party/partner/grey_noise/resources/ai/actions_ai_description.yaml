Get CVE Details:
  ai_description: >-
    ### General Description

    Enriches CVE entities using GreyNoise intelligence to provide deep context on
    vulnerabilities. This action retrieves critical data points including CVSS scores,
    EPSS (Exploit Prediction Scoring System) scores, exploit availability, and real-world
    exploitation activity observed by GreyNoise sensors. The retrieved information
    is used to update the entity's attributes and generate a comprehensive HTML insight
    for analysts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the integration configuration. |


    ### Additional Notes

    - The action validates that CVE identifiers follow the standard 'CVE-YYYY-NNNN'
    format.

    - Requires a valid GreyNoise API key configured in the integration settings.

    - Only processes entities of type CVE.


    ### Flow Description

    1. **Entity Identification**: Retrieves all CVE entities from the current case
    context.

    2. **Format Validation**: Validates each CVE identifier against the standard format
    (e.g., CVE-2024-12345).

    3. **GreyNoise Lookup**: Queries the GreyNoise API for each valid CVE to retrieve
    vulnerability and exploitation intelligence.

    4. **Entity Enrichment**: Updates the CVE entity's additional properties with
    data such as CVSS score, EPSS score, and exploit status.

    5. **Insight Generation**: Generates and attaches a detailed HTML insight to the
    entity, visualizing threat assessments and active exploitation activity.

    6. **Finalization**: Updates the entities in the platform and returns a summary
    of the enrichment process.
