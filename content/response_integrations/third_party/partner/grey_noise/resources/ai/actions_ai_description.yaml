IP Lookup:
  ai_description: >-
    ### General Description

    Performs comprehensive IP enrichment using GreyNoise to retrieve classification,
    actor, tags, CVEs, and business service intelligence.


    ### Flow Description

    1. Retrieves IP Address entities from the target entities.

    2. Checks if the configured GreyNoise API key belongs to the Community or Enterprise
    tier.

    3. If using the Community tier, iterates through each IP entity and makes individual
    API calls (`greynoise_manager.ip`) to fetch intelligence.

    4. If using the Enterprise tier, extracts all IP addresses and makes a single
    batch API call (`greynoise_manager.ip_multi`) to fetch intelligence.

    5. Processes the response for each IP, updating the entity's additional properties,
    `is_enriched` status, and `is_suspicious` flag based on the classification.

    6. Generates an HTML insight for each successfully enriched IP and attaches it
    to the entity.

    7. Updates the entities in the platform.

    8. Returns a summary message and JSON results containing the raw enrichment data.


    ### Additional Notes

    The action behaves differently based on the API key tier (Community vs. Enterprise).
    The Community tier performs individual lookups, while the Enterprise tier performs
    batch lookups.
