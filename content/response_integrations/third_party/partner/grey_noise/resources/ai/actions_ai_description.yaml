Execute GNQL Query:
  ai_description: >-
    Executes custom GNQL (GreyNoise Query Language) queries to search the GreyNoise
    threat intelligence database. This action allows users to perform complex searches
    for IP addresses based on various attributes like tags, classifications, or last
    seen dates. It supports automatic pagination to retrieve large datasets up to
    a specified limit and provides options to control the verbosity of the returned
    data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | GNQL Query | String | Yes | The GreyNoise Query Language query string to execute
    (e.g., 'last_seen:1d'). |

    | Max Results | String | No | The maximum number of results to return across all
    paginated requests. Default is 1000. |

    | Quick | Boolean | No | If set to true, the response will only include the IP
    address and the classification or trust level, reducing payload size. |

    | Exclude Raw | Boolean | No | Whether to exclude raw scan data from the response
    to simplify the output. Default is true. |


    ### Flow Description

    1. **Initialization:** Extracts the GNQL query, result limits, and display preferences
    from the action parameters.

    2. **Validation:** Validates that the 'Max Results' parameter is a positive integer.

    3. **API Connection:** Establishes a connection to the GreyNoise API using the
    configured API key.

    4. **Paginated Execution:** Enters a loop to execute the GNQL query. It uses scroll
    tokens provided by the GreyNoise API to fetch subsequent pages of data.

    5. **Data Aggregation:** Appends results from each page to a master list until
    the 'Max Results' limit is reached or the API indicates no more data is available.

    6. **Finalization:** Returns the aggregated list of results as a JSON object and
    provides a summary message indicating the total number of records fetched.
