  ai_description: >-
    Executes a custom GreyNoise Query Language (GNQL) query to search GreyNoise threat
    intelligence data. The action retrieves matching IP records and telemetry, supporting
    automatic pagination to fetch large datasets up to a specified limit.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | GNQL Query | String | Yes | The GreyNoise Query Language query string to execute.
    |

    | Max Results | String | No | Maximum number of results to return (max 5000).
    Defaults to 1000. |

    | Quick | Boolean | No | If true, the response will only include the IP address
    and the classification or trust level. Defaults to false. |

    | Exclude Raw | Boolean | No | Whether to exclude raw scan data from the response.
    Defaults to true. |


    ### Flow

    1. Initializes the GreyNoise API client using the provided integration parameters.

    2. Validates the input parameters, ensuring `Max Results` is a valid integer.

    3. Executes the GNQL query against the GreyNoise API, automatically handling pagination
    to collect results until the `Max Results` limit is reached or all available data
    is fetched.

    4. Returns the fetched records as a JSON object in the action's results.
