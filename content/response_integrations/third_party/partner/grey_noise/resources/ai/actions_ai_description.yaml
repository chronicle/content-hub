  ai_description: >-
    Executes custom GreyNoise Query Language (GNQL) queries to search GreyNoise threat
    intelligence data. This action allows users to perform complex searches across
    the GreyNoise dataset, retrieving information about IP addresses, classifications,
    and scanning behavior. It supports pagination to handle large result sets and
    provides options to simplify the output or exclude raw data for performance.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the GNQL query, maximum results
    limit, and output preferences (Quick mode and Exclude Raw).

    2. **Validation:** Validates that the 'Max Results' parameter is a positive integer.

    3. **API Interaction:** Connects to the GreyNoise API and executes the query.

    4. **Pagination:** If the result set exceeds the page size, the action automatically
    uses scroll tokens to fetch subsequent pages until the 'Max Results' limit is
    reached or all data is retrieved.

    5. **Result Aggregation:** Collects all fetched records and returns them as a
    JSON object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | GNQL Query | String | Yes | The GreyNoise Query Language query string to execute
    (e.g., 'last_seen:1d'). |

    | Max Results | String | No | The maximum number of records to return. Default
    is 1000. |

    | Quick | Boolean | No | If set to true, the response will only include the IP
    address and the classification or trust level. |

    | Exclude Raw | Boolean | No | If set to true, raw scan data will be excluded
    from the response to reduce payload size. |


    ### Additional Notes

    - This action does not operate on specific entities within the SecOps case; it
    performs a global search based on the provided query string.
