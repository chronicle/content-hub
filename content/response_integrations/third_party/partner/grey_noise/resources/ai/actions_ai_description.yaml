  ai_description: >-
    ### General Description

    The Get CVE Details action enriches CVE entities using GreyNoise intelligence.
    It retrieves critical vulnerability information, including CVSS scores, EPSS scores,
    and active threat data, to provide deeper context on the vulnerability's exploitation
    status.


    ### Parameters Description

    This action does not require any specific action-level parameters. It relies on
    the GreyNoise API key configured at the integration level.


    ### Flow Description

    1. Retrieves the API key from the integration configuration.

    2. Filters the target entities to identify those of type `CVE`.

    3. For each CVE entity, validates the identifier format (e.g., CVE-YYYY-NNNN).

    4. Queries the GreyNoise API to fetch detailed vulnerability and exploitation
    data.

    5. Updates the entity's additional properties with the retrieved intelligence
    and marks the entity as enriched.

    6. Generates an HTML insight containing the threat assessment and exploitation
    intelligence, and attaches it to the entity.

    7. Returns the execution status and the raw data as JSON results.


    ### Additional Notes

    If no CVE entities are found in the target entities, the action will complete
    successfully without performing any API calls.
