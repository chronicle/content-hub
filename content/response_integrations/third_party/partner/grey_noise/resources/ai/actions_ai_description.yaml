Execute GNQL Query:
  ai_description: >-
    ### General Description

    Executes custom GreyNoise Query Language (GNQL) queries to search GreyNoise threat
    intelligence data. It supports pagination to retrieve large sets of results based
    on the provided query criteria, returning the matching IP addresses and their
    classifications.


    ### Flow Description

    1. Validates the provided parameters, including the maximum number of results
    to fetch.

    2. Initiates a GET request to the GreyNoise API to execute the specified GNQL
    query.

    3. Paginates through the API responses using scroll tokens until the maximum result
    limit is reached or all available data is fetched.

    4. Aggregates the fetched records and attaches them to the action's JSON result.


    ### Additional Notes

    The action can be configured to return quick results (only IP and classification)
    or exclude raw scan data to optimize performance and response size.
  ai_short_description: >-
    Executes custom GNQL queries to search GreyNoise threat intelligence data and
    returns the matching IP addresses and their classifications as a JSON result.
