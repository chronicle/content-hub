Generate Alert from GreyNoise GNQL:
  ai_description: >-
    ### General Description

    This connector retrieves threat intelligence data from GreyNoise using GreyNoise
    Query Language (GNQL) and generates security alerts in Google SecOps. It allows
    security teams to monitor for specific IP behaviors, classifications (malicious,
    suspicious, benign), or actors seen across the internet. Each unique IP matching
    the query criteria is ingested as an alert, providing enriched context such as
    actor names, associated CVEs, and VPN/TOR status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | GN API Key | Password | Yes | The API key used to authenticate with GreyNoise
    services. |

    | Query | String | Yes | The GNQL query to execute (e.g., `last_seen:1d`). If
    left empty, it defaults to `last_seen:1d`. |

    | Max Results | Integer | No | The maximum number of results to fetch in a single
    execution. Default is 100. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the SOAR. Default is 'GreyNoise'. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    python process running the script. Default is 1200. |


    ### Flow Description

    1. **Initialization**: The connector initializes the GreyNoise API client using
    the provided API Key and retrieves previously processed event IDs from the local
    state to prevent duplicate alerts.

    2. **Query Execution**: It executes the configured GNQL query against the GreyNoise
    API to find matching IP indicators.

    3. **Pagination & Fetching**: The connector iterates through the results, supporting
    pagination via scroll tokens until the `Max Results` limit is reached or all available
    data is fetched.

    4. **Deduplication**: Each result is checked against the list of already processed
    event IDs (a unique combination of IP and timestamp).

    5. **Alert Mapping**: Matching IP records are transformed into SOAR Alert objects.
    Severity is dynamically assigned based on GreyNoise classification: 'Malicious'
    maps to High, 'Suspicious' to Medium, and 'Benign' or 'Unknown' to Low.

    6. **Ingestion**: The connector performs an overflow check and then ingests the
    unique alerts into the system.

    7. **State Persistence**: Processed IDs are saved back to the system to ensure
    they are skipped in subsequent runs.
