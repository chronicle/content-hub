Generate Alert from GreyNoise GNQL:
  ai_description: >-
    ### General Description

    This connector integrates with GreyNoise to automatically fetch threat intelligence
    data based on GNQL (GreyNoise Query Language) queries. It identifies malicious,
    suspicious, benign, or unknown IP addresses and generates corresponding security
    alerts within Google SecOps SOAR, enabling proactive threat monitoring and automated
    incident response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | GN API Key | Password | Yes | The API key used to authenticate with the GreyNoise
    service. |

    | Max Results | Integer | No | The maximum number of results to fetch in a single
    execution. |

    | Query | String | Yes | The GNQL query string used to filter the data to be fetched.
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the generated alert. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the script. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters, including
    the API key and the GNQL query.

    2. It reads existing event IDs from the system to perform deduplication and prevent
    redundant alert creation.

    3. It connects to the GreyNoise API and executes the specified GNQL query to retrieve
    relevant IP intelligence data.

    4. For each retrieved event, the connector maps the data to a standard SOAR AlertInfo
    object, including severity, timestamps, and environment details.

    5. It filters out duplicate events and checks for system overflow limits.

    6. Valid alerts are ingested into Google SecOps SOAR as new cases.

    7. Finally, the connector updates the stored event IDs to ensure future runs only
    process new data.
