Generate Alert from GreyNoise GNQL:
  ai_description: >-
    ### General Description

    The "Generate Alert from GreyNoise GNQL" connector enables automated ingestion
    of threat intelligence from GreyNoise into Google SecOps SOAR. By executing custom
    GNQL (GreyNoise Query Language) queries, the connector identifies malicious, suspicious,
    benign, or unknown IP addresses and automatically generates security alerts/cases
    for each match. This allows security teams to proactively monitor for noise and
    threats observed globally.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | GN API Key | String | Yes | Your GreyNoise API key. |

    | Max Results | Integer | No | The maximum number of results to fetch per run.
    |

    | Query | String | Yes | The GNQL query to execute (e.g., `last_seen:1d`). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process. |


    ### Flow Description

    1. The connector initializes and reads the provided configuration parameters and
    existing event IDs for deduplication.

    2. It connects to the GreyNoise API using the provided API key.

    3. It executes the configured GNQL query to fetch relevant IP intelligence data.

    4. The connector iterates through the retrieved events, checking for timeouts
    and duplicates.

    5. Each valid event is converted into a SOAR `AlertInfo` object, mapping GreyNoise
    data to the case format.

    6. The connector saves the updated list of event IDs to prevent future duplicates.

    7. Finally, it returns the generated alerts to the Google SecOps SOAR platform
    for further investigation.
