  reasoning: >-
    The cyware_intel_exchange integration is a Threat Intelligence Platform (TIP)
    connector. Its primary capability is to enrich security alerts by retrieving threat
    intelligence data (reputation, scores, tags) for indicators (IPs, Hashes, Domains)
    using the 'Get IOC Details' action, which directly aligns with the Threat Intelligence
    category. The integration also provides operational capabilities to manage threat
    intelligence within the Cyware platform, such as adding/removing indicators from
    allowlists, managing tags, creating intelligence records, and creating tasks for
    indicators. It does not perform SIEM log analysis, EDR host containment, network
    security blocking, email management, IAM operations, cloud resource management,
    vulnerability scanning, asset inventory lookups, or collaboration/notification
    tasks. While it creates 'tasks', these are specific to the Cyware platform and
    do not constitute an ITSM ticketing workflow.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
