  network_security: false
  reasoning: >-
    The Cyware Intel Exchange integration is a Threat Intelligence Platform (TIP)
    connector. Its primary capabilities involve enriching security entities (IOCs)
    with threat intelligence data such as reputation, TLP, and tags, as well as managing
    threat intelligence records (creating intel, adding notes, managing tags, and
    allowlisting). It does not perform SIEM log analysis, EDR host containment, network
    security blocking, email management, IAM, cloud security, vulnerability management,
    or general ITSM ticketing. While it has an action to 'Create Task for IOCs', this
    is specific to the Cyware platform for intel management rather than general ITSM
    ticketing. Therefore, it is classified solely under Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
