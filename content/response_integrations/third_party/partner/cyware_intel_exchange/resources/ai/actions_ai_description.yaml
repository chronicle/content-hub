    the Cyware Intel Exchange platform. This action allows users to filter the results
    by indicator type and creation time. The retrieved data is presented as a data
    table in the action results.


    ### Flow Description

    1. The action extracts the configuration parameters (Base URL, Access ID, Secret
    Key) and action parameters (IOC Type, Created From).

    2. It initializes the Cyware API manager.

    3. It performs a GET request to the Cyware Intel Exchange API to fetch the allowed
    IOCs, applying any specified filters.

    4. The retrieved IOCs are processed and formatted into a CSV-style data table.

    5. The action adds the data table to the result and returns the full JSON response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Type | ddl | No | Filter the results by a specific indicator type (e.g.,
    domain-name, ipv4-addr). Select 'All' to retrieve all types. |

    | Created From | string | No | Filter records based on the creation time in epoch
    format (seconds). |


    ### Additional Notes

    - If no filters are provided, the action retrieves all allowed IOCs up to the
    default page size limits.

    - The action outputs a data table named 'Allowed IOCs' containing the ID, Type,
    and Value of the retrieved indicators.
