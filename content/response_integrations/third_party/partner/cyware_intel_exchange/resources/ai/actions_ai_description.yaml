  ai_description: >-
    ### General Description

    Adds a note to an existing threat data object (IOC) in Cyware Intel Exchange.
    This action allows analysts to append contextual information, analysis results,
    or metadata to indicators stored in the CTIX platform. It supports both plain
    text and JSON-formatted notes. The action automatically resolves SecOps entities
    to their corresponding Cyware internal IDs before attaching the note.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note Type | String | Yes | The category or type of the note (e.g., 'threatdata').
    This helps organize notes within the Cyware platform. |

    | Note | String | Yes | The actual content of the note to be added to the indicator.
    |

    | Is the Note in Json format | Boolean | No | If set to true, the action validates
    that the 'Note' parameter contains a valid JSON string before submission. Default
    is false. |


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (API credentials) and
    action parameters (Note, Note Type, JSON flag).

    2. **Entity Identification**: Collects all target entities from the current SecOps
    context.

    3. **Bulk Lookup**: Sends the entity identifiers to the Cyware CTIX bulk lookup
    endpoint to retrieve the internal indicator IDs required for the note-adding API.

    4. **Note Submission**: Iterates through the valid indicators found in Cyware
    and sends a POST request to the `/ingestion/notes/` endpoint for each, attaching
    the specified note content.

    5. **Validation**: If the note is marked as JSON, the script parses and re-serializes
    it to ensure it is valid JSON before the API call.

    6. **Reporting**: Aggregates the responses from Cyware, including the unique IDs
    of the created notes, and outputs a summary of successes and failures.


    ### Additional Notes

    * **Entity Matching**: Only entities that already exist as indicators in Cyware
    Intel Exchange will be processed; others are skipped.

    * **JSON Validation**: If 'Is the Note in Json format' is enabled but the input
    is not valid JSON, the action will terminate with a failure status.
