  ai_description: >-
    Creates a new intelligence record in Cyware Intel Exchange for each provided entity.
    This action allows analysts to contribute threat intelligence to their Cyware
    CTIX instance directly from a case, supporting various indicator types and metadata
    such as TLP, confidence scores, and tags.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration parameters (Base
    URL, Credentials) and action parameters (Title, TLP, Confidence, Tags, Expiry,
    Description, and IOC Type).

    2. **Input Validation:** It validates that the Title and Description do not exceed
    character limits and ensures that numerical values like Confidence and Expiry
    are within valid ranges.

    3. **Intel Submission:** For each target entity in the case, the action constructs
    a payload and sends a POST request to the Cyware Quick Intel API to create a STIX-based
    intelligence record.

    4. **Status Polling:** After submission, the action retrieves a Task ID and enters
    a polling loop, checking the status of the intel creation process at regular intervals
    until it reaches a success or failure state.

    5. **Result Aggregation:** The action collects the API responses for all processed
    entities and returns them as a JSON result, providing a summary of successful
    and failed submissions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | string | True | The title for the intel record (max 100 characters).
    Defaults to the Alert Name. |

    | IOC Type | ddl | True | The STIX-compatible indicator type (e.g., ipv4-addr,
    domain-name, file). |

    | TLP | ddl | False | The Traffic Light Protocol level (RED, CLEAR, AMBER, AMBER_STRICT,
    NONE, GREEN). |

    | Metadata Confidence Score | string | False | A source confidence score between
    0 and 100. |

    | Tags | string | False | Comma-separated list of tags to associate with the intel.
    |

    | Deprecates After | string | False | Expiration time for the indicator in days
    (max 1000). Defaults to 180. |

    | Description | string | False | A detailed description for the intel record (max
    1000 characters). |


    ### Additional Notes

    - This action processes all target entities attached to the case using the single
    'IOC Type' selected in the parameters. Ensure that the entities in the scope match
    the selected type.

    - The action includes a built-in polling mechanism that waits for Cyware to process
    the 'Quick Intel' task before completing.
