  ai_description: >-
    Retrieves a list of allowed (whitelisted) Indicators of Compromise (IOCs) from
    Cyware CTIX.


    ### General Description

    This action connects to Cyware CTIX to fetch a list of IOCs that have been marked
    as allowed or whitelisted. It allows filtering the results by a specific IOC type
    and a creation timestamp. The retrieved indicators are then displayed in a data
    table within the case, and the raw data is attached as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IOC Type | Dropdown | No | The type of indicator to filter the results by (e.g.,
    ipv4-addr, domain-name, url). Select 'All' to retrieve all types. Default is 'All'.
    |

    | Created From | String | No | An epoch timestamp (in seconds) to filter records
    created after this specific time (e.g., 1767160932). |


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Validates the 'Created From' parameter if provided.

    3. Initiates a GET request to the Cyware CTIX API to fetch the allowed indicators
    based on the provided filters.

    4. Parses the response and constructs a data table with the retrieved IOCs (up
    to a maximum limit).

    5. Attaches the raw JSON response to the action results and completes the execution.
