Add Note to IOCs:
  ai_description: >-
    ### General Description

    Adds a note to existing threat data objects (indicators) in Cyware Intel Exchange
    based on the entities attached to the case. This action allows analysts to append
    contextual information or findings directly to indicators within the threat intelligence
    platform.


    ### Flow Description

    1. Retrieves all target entities attached to the current case.

    2. Performs a bulk lookup in Cyware Intel Exchange to resolve the entity identifiers
    to their corresponding internal indicator IDs.

    3. Iterates through the successfully resolved indicators and sends a POST request
    to add the specified note (in plain text or JSON format).

    4. Collects the responses and outputs a JSON result containing the status and
    note IDs for each processed indicator.


    ### Additional Notes

    - Indicators that are not found in Cyware Intel Exchange will be skipped.

    - If the note is provided in JSON format, the 'Is the Note in Json format' parameter
    must be set to true to ensure proper parsing and submission.
