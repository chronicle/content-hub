  ai_description: >-
    ### General Description

    This action adds indicators of compromise (IOCs) to the allowed list (whitelist)
    within the Cyware Intel Exchange platform. It allows analysts to mark specific
    indicators as trusted, preventing future security alerts or false positives for
    these items.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Type | ddl | Yes | The type of indicator (e.g., ipv4-addr, domain-name).
    |

    | Reason | string | Yes | The reason for adding the indicators to the allowed
    list. |


    ### Additional Notes

    If no entities are found in the case, the action completes without performing
    any API calls.


    ### Flow Description

    1. Retrieve integration configuration (Base URL, credentials).

    2. Extract action parameters (`IOC Type`, `Reason`).

    3. Retrieve target entities from the case.

    4. If entities are present, send a request to the Cyware API to add these indicators
    to the allowed list.

    5. Process the API response to identify newly added, existing, or invalid indicators.

    6. Log the results and update the action result with the API response.
