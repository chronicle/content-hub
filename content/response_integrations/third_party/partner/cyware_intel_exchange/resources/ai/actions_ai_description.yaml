  ai_description: >-
    ### General Description

    Adds the specified IOCs (entities) to the allowed list (whitelist) in Cyware Intel
    Exchange. This action takes all target entities attached to the case and submits
    them to Cyware CTIX to be marked as allowed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IOC Type | Dropdown | Yes | The type of indicator to be added to the allowed
    list (e.g., ipv4-addr, domain-name, url, file). |

    | Reason | String | Yes | The reason for adding the indicators to the allowed
    list. |


    ### Flow Description

    1. Retrieves the integration parameters and action parameters (`IOC Type`, `Reason`).

    2. Extracts the identifiers of all target entities attached to the case.

    3. Makes a POST request to Cyware CTIX to add the extracted indicators to the
    allowed list.

    4. Returns the results including the number of newly created, already existing,
    and invalid indicators.
