Manage Tags in IOCs:
  ai_description: >-
    ### General Description

    The **Manage Tags in IOCs** action allows analysts to programmatically add or
    remove tags from Indicators of Compromise (IOCs) within the Cyware Intel Exchange
    platform. This action is essential for maintaining organized threat intelligence
    by labeling indicators based on campaigns, threat actors, or internal tracking
    requirements.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tag names to be applied or removed
    (e.g., "malware-family", "apt-28"). |

    | Operation Type | DDL | Yes | Determines the action to perform. Options are **Add
    Tag** (associates tags with IOCs) or **Remove Tag** (disassociates tags from IOCs).
    |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of tags and the desired
    operation type from the user input.

    2. **Entity Identification:** It collects the identifiers of all target entities
    currently attached to the case.

    3. **Tag Resolution:** The action queries Cyware Intel Exchange to fetch all existing
    tags and maps the provided tag names to their corresponding internal IDs.

    4. **IOC Lookup:** It resolves the SOAR entity identifiers to specific IOC object
    IDs within the Cyware platform.

    5. **Tag Management Logic:**
        *   **Add Tag:** If any specified tags do not exist in Cyware, the action
    automatically creates them. It then performs a bulk operation to associate the
    tag IDs with the identified IOCs.
        *   **Remove Tag:** The action performs a bulk operation to remove the association
    between the specified tag IDs and the identified IOCs.
    6. **Result Reporting:** The action provides a summary of the number of tags successfully
    managed and lists any invalid IOCs or tags that were skipped.


    ### Additional Notes

    * **Automatic Tag Creation:** During the "Add Tag" operation, if a tag name provided
    in the input does not exist in Cyware, the action will attempt to create it before
    proceeding.

    * **Validation:** The action validates entities against the Cyware database; entities
    not found in Cyware as IOCs will be reported as invalid and skipped.
