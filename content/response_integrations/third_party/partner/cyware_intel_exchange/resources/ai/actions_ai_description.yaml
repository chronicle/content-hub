Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity to the Cyware Intel Exchange server by sending
    a ping request. It is used to verify that the integration is configured correctly
    and can successfully communicate with the external service.


    ### Flow Description

    1. The action initializes the connection using the provided integration configuration
    parameters.

    2. A GET request is made to the `/ping/` endpoint of the Cyware API.

    3. If the request is successful, the action returns a success message and a true
    result.

    4. If the request fails, the action catches the exception, logs the error, and
    returns a failure status.


