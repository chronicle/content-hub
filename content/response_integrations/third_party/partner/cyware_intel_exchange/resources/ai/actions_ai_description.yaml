    ### General Description

    This action adds a note to an existing threat data object (IOC) within the Cyware
    Intel Exchange platform. It allows analysts to attach contextual information or
    metadata to indicators, facilitating better threat intelligence management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

