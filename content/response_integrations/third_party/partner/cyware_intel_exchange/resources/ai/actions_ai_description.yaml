Create Task for IOCs:
  ai_description: >-
    **General Description**

    Creates a task for threat data objects (IOCs) in Cyware Intel Exchange. This action
    retrieves the target entities from the case, looks up their corresponding indicator
    IDs in Cyware, and generates a task for each valid indicator with the specified
    priority, status, and deadline.


    **Flow Description**

    1. Extracts the action parameters including Text, Priority, Status, Deadline,
    and Assignee Email ID.

    2. Validates the text length (maximum 2000 characters) and calculates the deadline
    in epoch time.

    3. If an Assignee Email ID is provided, queries the Cyware API to retrieve the
    corresponding user ID.

    4. Extracts all target entities from the case and performs a bulk lookup in Cyware
    to fetch their indicator IDs.

    5. Iterates over the valid indicators and makes a POST request to the Cyware API
    to create a task for each.

    6. Collects the task creation responses and returns them as JSON results, along
    with a summary message detailing successful and failed task creations.


    **Additional Notes**

    - The action runs on all target entities attached to the case.

    - Indicators that are not found in Cyware Intel Exchange will be skipped.
