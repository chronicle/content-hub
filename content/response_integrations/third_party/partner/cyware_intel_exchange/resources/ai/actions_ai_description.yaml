Get IOC Details:
  ai_description: >-
    ### General Description

    This action performs a lookup for threat data objects (IOCs) in Cyware Intel Exchange
    and retrieves their details, such as basic details, enriched data, and relations.
    It then enriches the corresponding entities within the Google SecOps platform
    with the retrieved threat intelligence.


    ### Flow Description

    1. Retrieves the target entities from the case.

    2. Extracts the action parameters to determine if enrichment data, relation data,
    or specific fields should be included in the results.

    3. Makes a POST request to the Cyware Intel Exchange bulk lookup API to fetch
    details for the provided IOCs.

    4. Parses the response and constructs a data table with the retrieved IOC details.

    5. Enriches the matching entities with the retrieved data and updates them in
    the platform.

    6. Returns the raw JSON response.


    ### Additional Notes

    The action processes all target entities regardless of their type. It filters
    the entities by checking if their identifier is present in the retrieved IOC results
    before updating them.
