Create Intel in Cyware Intel Exchange:
  ai_description: >-
    ### General Description

    This action creates a new intelligence record in Cyware Intel Exchange (CTIX)
    for the target entities associated with the case.


    ### Flow Description

    1. Extracts the target entities from the case.

    2. Validates the input parameters such as Title, Description, and Metadata Confidence
    Score.

    3. Iterates over the extracted entities and prepares a JSON payload for each indicator.

    4. Makes a POST request to the Cyware CTIX API to create the intelligence record.

    5. Polls the Cyware CTIX API to check the status of the quick intel creation task
    until it completes or times out.

    6. Returns the creation and status responses as JSON results.


    ### Additional Notes

    The action requires an IOC Type to be specified, which will be applied to all
    processed entities. Ensure that the provided entities match the selected IOC Type.
