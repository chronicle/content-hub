  ai_description: >-
    Creates tasks for IOC entities in Cyware Intel Exchange. This action facilitates
    workflow management by allowing users to generate tasks with specific descriptions,
    priorities, and deadlines associated with threat indicators. It supports assigning
    tasks to specific users via email and handles bulk processing of entities.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves task details including text, priority,
    status, deadline, and an optional assignee email.

    2. **Deadline Calculation:** Validates the deadline (1-365 days) and calculates
    the target epoch timestamp.

    3. **User Resolution:** If an assignee email is provided, the action fetches the
    corresponding User ID from Cyware.

    4. **IOC Lookup:** Performs a bulk lookup to map the identifiers of the target
    entities to their internal Cyware indicator IDs.

    5. **Task Creation:** Iterates through the valid indicators and sends a POST request
    to Cyware to create a task for each, including the specified metadata.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Text | string | Yes | The description of the task to be performed. Limited to
    2000 characters. |

    | Priority | ddl | Yes | The priority level of the task. Options: high, medium,
    low. |

    | Status | ddl | Yes | The initial status of the task. Options: not_started, in_progress,
    completed. |

    | Deadline | string | Yes | The deadline for the task in days from the current
    time. Must be between 1 and 365. |

    | Assignee Email ID | string | No | The email address of a valid Cyware user to
    assign the task to. If not provided, the task remains unassigned. |


    ### Additional Notes

    - The action will fail if an 'Assignee Email ID' is provided but the user cannot
    be found in Cyware Intel Exchange.

    - Only entities that are successfully resolved to existing indicators in Cyware
    will have tasks created for them; others will be skipped.
