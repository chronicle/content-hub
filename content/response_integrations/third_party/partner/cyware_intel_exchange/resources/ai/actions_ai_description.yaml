  ai_description: >-
    ### General Description

    This action adds a note to an existing threat data object (IOC) within the Cyware
    Intel Exchange platform. It allows analysts to attach contextual information or
    metadata to indicators, facilitating better threat intelligence management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note Type | string | Yes | The category or type of the note (e.g., 'threatdata').
    |

    | Note | string | Yes | The content of the note to be added. |

    | Is the Note in Json format | boolean | No | Set to true if the provided note
    content is in JSON format. |


    ### Flow Description

    1. Extract parameters: `Note`, `Note Type`, and `Is the Note in Json format`.

    2. Retrieve target entities from the current case.

    3. Perform a bulk lookup in Cyware Intel Exchange to resolve entity identifiers
    to internal object IDs.

    4. For each successfully resolved indicator, send a POST request to add the specified
    note.

    5. Return the execution status and details of the operation.
