  ai_description: >-
    Creates a new intelligence record in Cyware Intel Exchange for each target entity.
    The action extracts the entity identifiers and submits them as indicators to CTIX
    using the specified IOC Type, Title, TLP, Confidence Score, Tags, and Expiration.
    It then polls the system to verify the successful creation of the intelligence
    report.


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Title | Yes | String | Pass a title for the intel within 100 characters. |

    | TLP | No | Dropdown | Pass the TLP value for the intel. |

    | Metadata Confidence Score | No | String | Pass a Source Confidence Score for
    the intel between 0 and 100. |

    | Tags | No | String | Pass Comma Separated Tag names to add to the intel. |

    | Deprecates After | No | String | Provide the expiration time of the indicator
    in Days. Maximum value is 1000 days. |

    | Description | No | String | Pass a description for the intel within 1000 characters.
    |

    | IOC Type | Yes | Dropdown | Pass the type of indicator. |


    ### Flow

    1. Retrieves integration parameters and target entities.

    2. Validates input parameters (e.g., description length, title length, confidence
    score).

    3. Iterates over each entity and prepares the metadata payload.

    4. Submits a POST request to create the intel in CTIX.

    5. Polls the quick intel status endpoint to confirm successful processing.

    6. Returns the creation and status responses as JSON results.
