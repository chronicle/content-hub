  ai_description: >-
    Retrieves a list of Indicators of Compromise (IOCs) that are marked as allowed
    (whitelisted) within the Cyware Intel Exchange (CTIX) platform. This action allows
    analysts to audit or verify the current allowlist based on specific criteria such
    as indicator type or creation time.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the 'IOC Type' and 'Created
    From' parameters from the user input.

    2. **Validation:** It validates the 'Created From' parameter to ensure it is a
    valid epoch timestamp (integer).

    3. **API Interaction:** It connects to the Cyware CTIX API and queries the allowed
    indicators endpoint, automatically handling pagination to aggregate all matching
    results.

    4. **Data Processing:** The raw API response is parsed into internal data models.
    If results are found, it prepares a summary for a data table.

    5. **Output Generation:** It populates a data table named 'Allowed IOCs' in the
    Google SecOps case (limited to the first 10 records for visibility) and provides
    the full result set in JSON format.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Type | DDL | No | Filters the retrieved indicators by a specific type (e.g.,
    'domain-name', 'ipv4-addr'). Defaults to 'All'. |

    | Created From | String | No | An epoch timestamp in seconds. If provided, the
    action only retrieves indicators created after this time. |


    ### Additional Notes:

    - This action does not require or process entities from the Google SecOps case;
    it performs a global search within the Cyware platform.

    - The data table displayed in the UI is capped at 10 records to maintain performance,
    but the full list is available in the JSON result.
