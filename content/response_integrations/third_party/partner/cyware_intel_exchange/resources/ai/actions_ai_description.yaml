Manage Tags in IOCs:
  ai_description: >-
    ### General Description

    Manages tags for Indicator of Compromise (IOC) entities within Cyware Intel Exchange.
    This action allows users to either add or remove specified tags from the target
    entities. If a tag to be added does not currently exist in Cyware, the action
    will automatically create it before applying it to the IOCs.


    ### Flow Description

    1. Extracts the target entities from the case to use as IOC values.

    2. Retrieves the list of available tags from Cyware Intel Exchange via the `/ingestion/tags/`
    API endpoint to resolve tag IDs.

    3. Looks up the provided IOC values in Cyware via the `/ingestion/openapi/bulk-lookup/indicator/`
    API endpoint to resolve their corresponding object IDs.

    4. If the operation is 'Add Tag', it creates any missing tags in Cyware via a
    POST request to `/ingestion/tags/`, then sends a POST request to `/ingestion/threat-data/bulk-action/add_tag/`
    to add the tags to the resolved IOCs.

    5. If the operation is 'Remove Tag', it sends a POST request to `/ingestion/threat-data/bulk-action/remove_tag/`
    to remove the specified tags from the resolved IOCs.

    6. Returns a JSON result containing the response from Cyware.


    ### Additional Notes

    - Target entities that are not found in Cyware Intel Exchange will be skipped.

    - When removing tags, any tags that do not exist in Cyware will be ignored.
