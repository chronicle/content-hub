Add IOCs to Allowed list:
  ai_description: >-
    ### General Description

    Marks indicators (IOCs) as allowed (whitelisted) in Cyware Intel Exchange (CTIX).
    This action is used to prevent specific indicators from being flagged as threats
    or to manage false positives by adding them to the global allowed list within
    the Cyware platform. It processes all entities present in the current case and
    submits them in bulk to the external system.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC Type** | DDL | Yes | Specifies the STIX-compatible type of the indicator
    (e.g., `ipv4-addr`, `domain-name`, `file`). This must match the type of the entities
    being processed. |

    | **Reason** | String | Yes | Provides a justification or context for why these
    indicators are being added to the allowed list. Default is 'Allow IOCs from Google
    Secops'. |


    ### Additional Notes

    - This action performs a state change in the external Cyware CTIX system.

    - If no entities are found in the case, the action will complete successfully
    without making an API call.

    - The action returns a summary of the operation, including the count of newly
    created entries, entries that already existed, and any invalid entries.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `IOC Type` and `Reason`
    from the user input and the integration configuration (Base URL, Access ID, Secret
    Key).

    2. **Entity Collection:** It gathers the identifiers of all entities currently
    associated with the SecOps case.

    3. **API Interaction:** The action sends a POST request to the Cyware `allowed_indicators`
    endpoint with the list of entity identifiers, the specified IOC type, and the
    provided reason.

    4. **Response Processing:** It parses the API response to determine the status
    of each indicator (New, Already Exists, or Invalid).

    5. **Result Reporting:** The action outputs a summary message to the case wall
    and attaches the full JSON response as a script result.
