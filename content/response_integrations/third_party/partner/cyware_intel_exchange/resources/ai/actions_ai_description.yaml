Create Intel in Cyware Intel Exchange:
  ai_description: >-
    ### General Description

    The **Create Intel in Cyware Intel Exchange** action allows users to create new
    intelligence records (indicators) within the Cyware Intel Exchange (CTIX) platform
    based on entities present in a Google SecOps case. It supports various indicator
    types and allows for the inclusion of metadata such as TLP, confidence scores,
    and tags. This action is primarily used to share or store threat intelligence
    discovered during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Title** | String | Yes | The title for the intelligence record (max 100 characters).
    Defaults to the Alert Name. |

    | **IOC Type** | DDL | Yes | The STIX-compliant type of the indicator (e.g., `ipv4-addr`,
    `domain-name`, `file`, `SHA-256`). |

    | **TLP** | DDL | No | The Traffic Light Protocol level (RED, CLEAR, AMBER, AMBER_STRICT,
    NONE, GREEN). Defaults to `NONE`. |

    | **Metadata Confidence Score** | String | No | A source confidence score between
    0 and 100. |

    | **Tags** | String | No | Comma-separated list of tags to associate with the
    intel. |

    | **Deprecates After** | String | No | Expiration time in days (1 to 1000). Defaults
    to 180. |

    | **Description** | String | No | A detailed description for the intel (max 1000
    characters). |


    ### Flow Description

    1. **Initialization**: The action retrieves integration parameters (Base URL,
    Access ID, Secret Key) and the list of target entities from the current context.

    2. **Validation**: It validates the lengths of the Title and Description, and
    ensures the Confidence Score and Deprecation period are within valid integer ranges.

    3. **Intel Creation**: For each entity identifier, the action constructs a 'Quick
    Intel' payload and sends a POST request to the Cyware API endpoint `/conversion/quick-intel/create-stix/`.

    4. **Status Polling**: After submission, the action enters a polling loop, checking
    the status of the creation task using the returned Task ID via GET requests to
    `/conversion/quick-intel/receive-report/` until it reaches a success or failure
    state (or times out after 24 attempts).

    5. **Result Reporting**: The action aggregates the results, including the creation
    responses and final statuses, and outputs them as a JSON result for the analyst.


    ### Additional Notes

    - This action processes all entities in the context regardless of their type;
    the user must specify the correct `IOC Type` that applies to the entities being
    submitted.

    - If no entities are found in the context, the action completes with a message
    indicating no processing occurred.
