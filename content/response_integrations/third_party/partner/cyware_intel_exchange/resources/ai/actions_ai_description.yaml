Create Task for IOCs:
  ai_description: >-
    ### General Description

    This action creates tasks within the Cyware Intel Exchange platform for specific
    Indicator of Compromise (IOC) entities present in a Google SecOps case. It allows
    analysts to automate the assignment of investigative or remediation work related
    to threat intelligence by linking tasks directly to indicators in the Cyware environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Text | String | Yes | The description or instructions for the task. Limited
    to a maximum of 2000 characters. |

    | Priority | DDL | Yes | The urgency level of the task. Options include: high,
    medium, low. |

    | Status | DDL | Yes | The initial state of the task. Options include: not_started,
    in_progress, completed. |

    | Deadline | String | Yes | The number of days from the current time until the
    task is due. Must be an integer between 1 and 365. |

    | Assignee Email ID | String | No | The email address of the Cyware user to whom
    the task should be assigned. If not provided, the task will be created as unassigned.
    |


    ### Additional Notes

    - The action performs a bulk lookup to resolve entity identifiers to internal
    Cyware object IDs before task creation. Tasks are only created for IOCs that already
    exist in Cyware Intel Exchange.

    - If an `Assignee Email ID` is provided but the user cannot be found in Cyware,
    the action will fail to ensure tasks are not assigned to non-existent users.

    - The deadline is calculated as an epoch timestamp based on the number of days
    provided from the moment of execution.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the task description, priority, status,
    deadline, and optional assignee email from the action configuration.

    2. **Entity Retrieval:** Collects all target entities from the current case context.

    3. **Validation:** Validates that the task text does not exceed character limits
    and that the deadline is a valid integer within the allowed range (1-365 days).

    4. **User Resolution:** If an assignee email is provided, the action queries the
    Cyware API to retrieve the corresponding internal User ID.

    5. **IOC Lookup:** Executes a bulk lookup against Cyware Intel Exchange to map
    the SecOps entity identifiers to internal Cyware indicator IDs.

    6. **Task Creation:** Iterates through the valid indicators and sends a POST request
    to Cyware to create a task for each, including the description, priority, status,
    and calculated deadline.

    7. **Result Reporting:** Returns a JSON result containing the details of the created
    tasks and provides a summary message of successful and failed operations.
