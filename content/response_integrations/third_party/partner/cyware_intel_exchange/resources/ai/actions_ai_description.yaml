  ai_description: >-
    ### General Description

    This action creates a task for a threat data object (IOC) in the Cyware Intel
    Exchange platform. It allows users to define task details, assign them to specific
    users, and set deadlines.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Text | string | Yes | The description of the task to be performed (Max 2000
    characters). |

    | Priority | ddl | Yes | The priority of the task (high, medium, low). |

    | Status | ddl | Yes | The status of the task (not_started, in_progress, completed).
    |

    | Deadline | string | Yes | The deadline of the task in days (Max 365 days). |

    | Assignee Email ID | string | No | The email ID of a valid user to assign the
    task. If not provided, the task is created without an assignee. |


    ### Flow Description

    1. **Initialization**: The action extracts the provided parameters and retrieves
    the target entities from the case.

    2. **Validation**: It validates the `Text` length and the `Deadline` integer value.

    3. **Authentication**: It initializes the Cyware API manager using the integration
    configuration.

    4. **User Lookup**: If an `Assignee Email ID` is provided, it retrieves the corresponding
    user ID from Cyware.

    5. **IOC Lookup**: It performs a bulk lookup to map the provided entity identifiers
    to their corresponding indicator IDs in Cyware.

    6. **Task Creation**: For each valid indicator, it creates a task in Cyware with
    the specified parameters (text, priority, status, deadline, and optional assignee).

    7. **Result Reporting**: It compiles the results of the task creation process
    and returns them as a JSON result, updating the action status accordingly.
