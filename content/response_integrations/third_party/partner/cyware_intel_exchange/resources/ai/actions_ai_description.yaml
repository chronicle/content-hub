Remove IOCs from Allowed list:
  ai_description: >-
    Removes indicators (IOCs) from the allowed list (un-whitelists them) in Cyware
    Intel Exchange. This action is used to revert the 'allowed' status of specific
    entities, ensuring they are no longer excluded from security monitoring or correlation
    logic within the Cyware platform.


    ### Flow Description:

    1. **Parameter Initialization:** Retrieves integration credentials (Base URL,
    Access ID, Secret Key) and identifies all target entities associated with the
    current context.

    2. **Indicator Lookup:** Performs a bulk lookup against Cyware Intel Exchange
    to map the provided entity identifiers to their corresponding internal Cyware
    Indicator IDs.

    3. **Validation:** Filters the list to identify which indicators exist in the
    external system; entities not found in Cyware are logged and skipped.

    4. **Removal Process:** Executes a bulk API request to the Cyware 'un_whitelist'
    endpoint using the gathered Indicator IDs.

    5. **Result Reporting:** Returns the API response, including success messages
    and counts of removed indicators, to the Google SecOps platform.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any action-specific parameters;
    it operates directly on the entities present in the case scope. |


    ### Additional Notes:

    * This action requires the indicators to already exist in Cyware Intel Exchange
    to be successfully removed from the allowlist. If an indicator is not found during
    the lookup phase, it will be ignored.
