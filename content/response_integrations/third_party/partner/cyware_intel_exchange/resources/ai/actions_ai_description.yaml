Mark IOCs False Positive:
  ai_description: >-
    Marks multiple Indicator of Compromise (IOC) entities as false positives within
    the Cyware Intel Exchange (CTIX) platform. This action is used to tune threat
    intelligence by identifying indicators that are no longer considered threats or
    were incorrectly flagged.


    ### Flow Description

    1. **Entity Retrieval**: The action identifies all target entities associated
    with the current Google SecOps case.

    2. **ID Resolution**: It performs a bulk lookup against Cyware Intel Exchange
    to map the entity identifiers (e.g., IP addresses, domains, hashes) to their corresponding
    internal Cyware Object IDs.

    3. **Validation**: The action filters out any entities that do not exist in the
    Cyware platform, logging them as skipped.

    4. **Status Update**: For all valid indicators found, it sends a bulk request
    to the Cyware API to update their status to 'False Positive'.

    5. **Result Reporting**: The action returns the API response, including a success
    message and the count of updated indicators.


    ### Parameters Description

    There are no specific action parameters for this resource; it operates directly
    on the entities present in the case scope.


    ### Additional Notes

    * This action requires valid Cyware API credentials (Access ID and Secret Key)
    configured in the integration settings.

    * Only entities that already exist in the Cyware Intel Exchange database can be
    marked as false positives.
