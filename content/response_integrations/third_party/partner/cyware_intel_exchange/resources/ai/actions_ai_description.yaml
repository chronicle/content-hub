    ### General Description

    Removes Indicators of Compromise (IOCs) from the Cyware Intel Exchange allowed
    list (un-whitelisting). This action identifies the internal Cyware IDs for the
    provided entities and performs a bulk un-whitelist operation to restore standard
    monitoring for these indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | No parameters are required for this action. |


    ### Additional Notes

    - This action performs a bulk operation on all target entities.

    - Only indicators that already exist in Cyware Intel Exchange can be removed from
    the allowed list.

    - Indicators not found in Cyware will be skipped without failing the action.


    ### Flow Description

    1. **Initialization**: Retrieve integration settings and target entities.

    2. **ID Resolution**: Perform a bulk lookup in Cyware to find internal IDs for
    the entities.

    3. **Filtering**: Identify valid indicators and skip those not found in the system.

    4. **Execution**: Send a POST request to the Cyware bulk un-whitelist endpoint.

    5. **Completion**: Return the API response and set the action status.
