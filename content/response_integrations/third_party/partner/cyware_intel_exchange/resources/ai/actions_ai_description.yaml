  ai_description: >-
    Retrieves detailed threat intelligence for entities from Cyware Intel Exchange
    (CTIX). This action performs a bulk lookup for indicators, fetching metadata such
    as analyst scores, confidence scores, TLP levels, and whitelist status. It enriches
    the entities within Google SecOps by updating their additional properties and
    marking them as enriched, while also providing a summary table of the findings.


    ### Flow Description

    1. **Parameter Initialization**: Extracts action parameters including 'Enrichment
    Data', 'Relation Data', and specific 'Fields' to retrieve.

    2. **Entity Collection**: Gathers all target entities from the current context
    to use their identifiers for the lookup.

    3. **API Request**: Executes a bulk lookup request to the Cyware CTIX API using
    the collected entity identifiers.

    4. **Data Processing**: Parses the API response into structured data models, creating
    a CSV-formatted data table for the case wall.

    5. **Entity Enrichment**: Iterates through the results and updates the corresponding
    SecOps entities with enrichment attributes (e.g., Cyware_analyst_score, Cyware_tlp)
    and sets the 'is_enriched' flag to true.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment Data | boolean | No | If set to true, the action will request and
    include extended enrichment metadata from CTIX in the results. |

    | Relation Data | boolean | No | If set to true, the action will retrieve information
    about related threat objects. |

    | Fields | string | No | A comma-separated list of specific fields (e.g., 'name,id,tlp')
    to include in the API response. If left empty, default fields are returned. |


    ### Additional Notes

    - This action is primarily used for IOC enrichment and does not modify any data
    within the Cyware platform.

    - The action processes all entity types attached to the case without specific
    type filtering.
