Add IOCs to Allowed list:
  ai_description: >-
    ### General Description

    Adds specified entities to the allowed list (whitelist) in Cyware CTIX. This action
    marks the indicators as known good to prevent future security alerts or false
    positives.


    ### Flow Description

    1. Extracts the `IOC Type` and `Reason` parameters from the action configuration.

    2. Retrieves all target entities attached to the case.

    3. Makes a POST request to the Cyware CTIX API (`/conversion/allowed_indicators/`)
    to add the entity identifiers to the allowed list with the specified reason and
    type.

    4. Returns a summary of the processed indicators, including how many were newly
    created, already existed, or were invalid.


    ### Additional Notes

    - The action will complete successfully without making any API calls if no entities
    are found in the case.
  ai_short_description: >-
    Adds target entities to the allowed list (whitelist) in Cyware CTIX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the provided entity identifiers to the allowed list (whitelist) in Cyware
      CTIX.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making a POST request to Cyware CTIX to
      add indicators to an allowed list. It does not fetch additional contextual data,
      mutate internal SecOps data, update entities, or create insights.
