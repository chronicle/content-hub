    retrieves the target entities from the case, looks up their corresponding indicator
    IDs in Cyware, and creates a task for each valid indicator with the specified
    description, priority, status, deadline, and optional assignee.


    ### Flow Description

    1. Retrieves integration parameters and action parameters (Text, Priority, Status,
    Deadline, Assignee Email ID).

    2. Validates the deadline and calculates the epoch time.

    3. If an assignee email is provided, retrieves the user ID from Cyware.

    4. Performs a bulk lookup to find the indicator IDs for the provided entities.

    5. Iterates through the valid indicators and creates a task for each in Cyware.

    6. Returns the task details as JSON results and outputs a summary message.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Text | String | Yes | The description of the task to be performed (Max limit
    - 2000 characters). |

    | Priority | Dropdown | Yes | The priority of the task (high, medium, low). |

    | Status | Dropdown | Yes | The status of the task (not_started, in_progress,
    completed). |

    | Deadline | String | Yes | The deadline of the task in days (Maximum value is
    365 days). |

    | Assignee Email ID | String | No | The Email ID of a valid user to assign the
    task. If not provided, it will create an unassigned task. |
