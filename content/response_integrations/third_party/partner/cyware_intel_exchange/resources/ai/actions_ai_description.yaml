Add Note to IOCs:
  ai_description: >-
    ### General Description

    Adds a note to an existing threat data object (indicator) in Cyware Intel Exchange.
    This action allows analysts to append context, findings, or metadata to specific
    IOCs directly from Google SecOps. It supports both plain text and JSON-formatted
    notes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note Type | String | True | The type or category of the note (e.g., 'threatdata').
    |

    | Note | String | True | The actual content or description of the note to be added.
    |

    | Is the Note in Json format | Boolean | False | If set to true, the action validates
    that the 'Note' parameter is a valid JSON string before sending it to Cyware.
    Default is false. |


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the integration configuration
    (Base URL, Credentials) and the action parameters (Note, Note Type, JSON flag).

    2. **Entity Identification**: It identifies all target entities attached to the
    case.

    3. **Bulk Lookup**: The action performs a bulk lookup against the Cyware Intel
    Exchange API to map the entity identifiers (IOC values) to their corresponding
    internal Cyware IDs.

    4. **Validation**: It identifies which indicators exist in Cyware and which are
    missing. Missing indicators are skipped.

    5. **Note Creation**: For each valid indicator found, the action sends a POST
    request to the Cyware API to create a new note record associated with that indicator's
    ID.

    6. **Result Aggregation**: The action collects the responses from the API, including
    the new Note IDs, and returns a summary of successful and failed operations.


    ### Additional Notes

    If 'Is the Note in Json format' is enabled but the 'Note' content is not valid
    JSON, the action will fail with a specific error message.
