Get Allowed IOCs:
  ai_description: >-
    ### General Description

    This action retrieves Indicators of Compromise (IOCs) that are marked as allowed
    (whitelisted) from Cyware Intel Exchange (CTIX).


    ### Flow Description

    1. Extracts the `IOC Type` and `Created From` parameters from the action configuration.

    2. Validates the `Created From` parameter to ensure it is a valid epoch timestamp.

    3. Initiates a GET request to the Cyware CTIX API to fetch the allowed IOCs, applying
    the specified filters.

    4. Parses the API response to extract the allowed IOC records.

    5. Constructs a data table with the retrieved IOCs and attaches the raw JSON response
    to the action results.


    ### Additional Notes

    - The action can return a maximum of 10 records in the data table, but the full
    list of retrieved IOCs is available in the JSON result.

    - If no IOCs match the criteria, the action will complete successfully with a
    message indicating no allowed IOCs were found.
