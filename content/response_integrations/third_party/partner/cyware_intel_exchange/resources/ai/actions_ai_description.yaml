  ai_description: >-
    Manages tags for IOCs in Cyware Intel Exchange. This action allows users to add
    or remove specified tags from the target entities within the Cyware platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Tags | String | Yes | Tag names to add or remove on each IOC. Supports comma-separated
    values (e.g., "test-1", "test-2"). |

    | Operation Type | Dropdown | Yes | Select the operation type: "Add Tag" or "Remove
    Tag". |


    ### Flow

    1. Retrieves the target entities from the case.

    2. Fetches existing tag IDs from Cyware Intel Exchange based on the provided tag
    names.

    3. Looks up the corresponding IOC IDs in Cyware for the target entities.

    4. If the operation is "Add Tag", it creates any missing tags in Cyware and then
    adds the tags to the resolved IOCs.

    5. If the operation is "Remove Tag", it removes the specified tags from the resolved
    IOCs.

    6. Returns a JSON result containing the response from the Cyware API.
