  ai_description: >-
    ### General Description

    This action manages tags for Indicators of Compromise (IOCs) within the Cyware
    Intel Exchange platform. It allows analysts to either add or remove specific tags
    from a set of IOCs identified in the SOAR case. If adding tags, the action automatically
    creates any tags that do not already exist in the Cyware platform before applying
    them to the IOCs.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | string | Yes | A comma-separated list of tag names to add or remove (e.g.,
    "malware, phishing"). |

    | Operation Type | ddl | Yes | The operation to perform: "Add Tag" or "Remove
    Tag". |


    ### Additional Notes

    This action performs bulk operations on IOCs found in the Cyware Intel Exchange.
    It does not modify the SOAR case entities themselves, but rather updates the metadata
    of the corresponding indicators in the external Cyware platform.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (Base URL, Access ID,
    Secret Key) and action parameters.

    2. **Entity Retrieval**: Retrieves all target entities (IOCs) from the current
    SOAR case.

    3. **Tag Resolution**: Fetches existing tags from Cyware Intel Exchange to map
    tag names to their respective IDs.

    4. **Operation Execution**:
        * **If "Add Tag"**: Looks up IOC IDs for the provided entities. If any tags
    are missing in Cyware, it creates them. Finally, it performs a bulk update to
    add the tags to the identified IOCs.
        * **If "Remove Tag"**: Looks up IOC IDs for the provided entities and performs
    a bulk update to remove the specified tags from the identified IOCs.
    5. **Result Reporting**: Returns the operation status and details via the script
    result JSON.
