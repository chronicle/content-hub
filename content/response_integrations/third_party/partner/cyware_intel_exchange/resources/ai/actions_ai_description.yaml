  ai_description: >-
    Manages tags for Indicators of Compromise (IOCs) within Cyware Intel Exchange.
    This action allows users to either add or remove specific tags from entities identified
    in a case. If the 'Add Tag' operation is selected and a specified tag does not
    exist in Cyware, the action will automatically create the tag before associating
    it with the IOC. The action performs a lookup to resolve entity identifiers to
    their corresponding Cyware object IDs before applying the tag changes.


    ### Flow Description

    1. **Parameter Initialization**: Retrieves integration configuration (Base URL,
    credentials) and action parameters (Tags, Operation Type).

    2. **Entity Retrieval**: Collects all target entities from the current case context.

    3. **Tag Resolution**: Fetches the list of all available tags from Cyware Intel
    Exchange to map the provided tag names to their internal IDs.

    4. **IOC Lookup**: Resolves the identifiers of the target entities to their internal
    Cyware object IDs.

    5. **Tag Management (Add)**: If the operation is 'Add Tag', it identifies missing
    tags, creates them in Cyware, and then performs a bulk update to add all valid
    tag IDs to the identified IOCs.

    6. **Tag Management (Remove)**: If the operation is 'Remove Tag', it performs
    a bulk update to remove the specified tag IDs from the identified IOCs.

    7. **Result Reporting**: Returns a JSON result containing the API response and
    provides a summary message of the tags added or removed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tag names to be added or removed
    (e.g., "test-1", "test-2"). |

    | Operation Type | DDL | Yes | Determines whether to 'Add Tag' or 'Remove Tag'.
    If 'Add Tag' is chosen, missing tags will be created automatically. |


    ### Additional Notes

    - This action requires the entities to already exist as indicators in Cyware Intel
    Exchange to be successfully tagged.

    - If an entity is not found in Cyware, it will be skipped, and the action will
    report the invalid IOCs in the output message.
