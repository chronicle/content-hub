Get Allowed IOCs:
  ai_description: >-
    Retrieves a list of allowed (whitelisted) Indicators of Compromise (IOCs) from
    the Cyware Intel Exchange (CTIX) platform. This action allows analysts to audit
    or verify which indicators are currently bypassed by security logic based on their
    type or creation time.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `IOC Type` and `Created
    From` filter parameters from the user input.

    2. **Validation:** It validates the `Created From` parameter to ensure it is a
    valid non-negative integer representing an epoch timestamp.

    3. **API Query:** It connects to the Cyware CTIX API and performs a paginated
    search for indicators marked as 'allowed'.

    4. **Data Processing:** The raw API response is parsed into structured data models.
    If results are found, it prepares a summary for a data table.

    5. **Output Generation:** It populates a data table named 'Allowed IOCs' in the
    Google SecOps case (limited to the first 10 records for visibility) and attaches
    the full JSON result for further automated processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC Type** | DDL | No | Filters the results by a specific indicator type (e.g.,
    `domain-name`, `ipv4-addr`). Selecting 'All' retrieves all types. |

    | **Created From** | String | No | An epoch timestamp in seconds (e.g., `1767160932`).
    If provided, the action only retrieves IOCs created after this time. |


    ### Additional Notes

    - This action does not run on specific entities within the case; it performs a
    global search against the Cyware allowlist.

    - The data table displayed in the UI is capped at 10 records to prevent performance
    issues, but the full list is available in the JSON result.
