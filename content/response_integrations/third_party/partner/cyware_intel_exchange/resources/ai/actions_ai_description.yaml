  ai_description: >-
    ### General Description

    This action creates a new intelligence record in the Cyware Intel Exchange (CTIX)
    platform. It processes target entities from the case, prepares a payload with
    specified metadata (such as TLP, confidence, tags, and description), and submits
    it to the Cyware API. The action also polls the status of the creation task to
    ensure the intelligence record is successfully processed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | string | Yes | The title for the intelligence record (max 100 characters).
    Defaults to the alert name. |

    | TLP | ddl | No | The Traffic Light Protocol (TLP) value for the intel. Options:
    RED, CLEAR, AMBER, AMBER_STRICT, NONE, GREEN. Defaults to NONE. |

    | Metadata Confidence Score | string | No | A source confidence score for the
    intel (0-100). |

    | Tags | string | No | Comma-separated tag names to add to the intel. |

    | Deprecates After | string | No | The expiration time of the indicator in days
    (max 1000 days). Defaults to 180. |

    | Description | string | No | A description for the intel (max 1000 characters).
    |

    | IOC Type | ddl | Yes | The type of indicator (e.g., ipv4-addr, domain-name,
    file, etc.). Defaults to ipv4-addr. |


    ### Additional Notes

    - The action validates that the `Title` does not exceed 100 characters and the
    `Description` does not exceed 1000 characters.

    - The `Metadata Confidence Score` and `Deprecates After` parameters are validated
    as integers.

    - If no entities are found in the case, the action completes without performing
    any operations.


    ### Flow Description

    1. **Initialization**: Retrieves integration parameters (Base URL, Access ID,
    Secret Key) and target entities from the case.

    2. **Validation**: Validates input parameters (Title, Description, Confidence
    Score, Deprecates After).

    3. **Processing**: Iterates through each target entity.

    4. **Payload Preparation**: Constructs the intelligence creation payload, including
    metadata (TLP, tags, confidence, description) and the indicator value.

    5. **Creation**: Sends a POST request to the Cyware CTIX API (`/conversion/quick-intel/create-stix/`)
    to create the intel.

    6. **Status Polling**: If a task ID is returned, the action polls the status endpoint
    (`/conversion/quick-intel/receive-report/`) until the report status is marked
    as successful or failed, or until the maximum number of attempts is reached.

    7. **Result Reporting**: Aggregates the results for all processed indicators and
    adds them to the action result.
