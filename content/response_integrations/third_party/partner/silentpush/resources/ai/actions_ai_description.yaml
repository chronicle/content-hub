    Passive DNS (PADNS) records for a specific DNS record name and type. This action
    is useful for uncovering infrastructure associated with a given DNS record, aiding
    in threat intelligence and infrastructure mapping.


    ### Flow Description

    1. **Extract Parameters**: The action extracts the integration configuration and
    action parameters, including the mandatory `Qname` and optional filters like `Qtype`,
    `Netmask`, and date ranges.

    2. **API Request**: It calls the Silent Push API's reverse PADNS lookup endpoint
    with the provided parameters.

    3. **Error Handling**: The action checks the API response for errors and raises
    an exception if any are found.

    4. **Return Results**: If records are found, they are returned as a JSON result
    and the action completes successfully. If no records are found, the action fails.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Qtype | String | False | The DNS record type to query (e.g., ns). Defaults to
    'ns'. |

    | Qname | String | True | The DNS record name to lookup (e.g., vida.ns.cloudflare.com).
    |

    | Netmask | String | False | The netmask to filter the lookup results. |

    | Subdomains | String | False | Flag to include subdomains in the lookup results.
    |

    | Regex | String | False | Regular expression to filter the DNS records. |

    | Match | String | False | Type of match for the query (e.g., exact, partial).
    |

    | First Seen After | String | False | Filter results to include only records first
    seen after this date. |

    | First Seen Before | String | False | Filter results to include only records
    first seen before this date. |

    | Last Seen After | String | False | Filter results to include only records last
    seen after this date. |

    | Last Seen Before | String | False | Filter results to include only records last
    seen before this date. |

    | As Of | String | False | Date or time to get the DNS records as of a specific
    point in time. |

    | Sort | String | False | Sort the results by the specified field (e.g., date,
    score). |

    | Output Format | String | False | The format in which the results should be returned
    (e.g., JSON, XML). |

    | Prefer | String | False | Preference for specific DNS servers or sources. |

    | With Metadata | String | False | Flag to include metadata in the DNS records.
    |

    | Max Wait | String | False | Maximum number of seconds to wait for results before
    timing out. |

    | Skip | String | False | Number of results to skip for pagination purposes. |

    | Limit | String | False | Maximum number of results to return. |


    ### Additional Notes

