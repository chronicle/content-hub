    \ data collected from domain scanning using the Silent Push platform. It allows\
    \ analysts to query specific domains for their certificate history and details,\
    \ providing valuable context for infrastructure analysis and threat hunting. The\
    \ action supports various filters such as date ranges, certificate issuers, and\
    \ regular expressions to narrow down the results.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Domain | string | True | The specific domain to query for certificate data.\
    \ |\n| Domain Regex | string | False | A regular expression used to filter the\
    \ domains in the certificate results. |\n| Certificate Issuer | string | False\
    \ | Filters the results to only include certificates issued by a specific authority.\
    \ |\n| Date Min | string | False | Filters for certificates issued on or after\
    \ this date (e.g., YYYY-MM-DD). |\n| Date Max | string | False | Filters for certificates\
    \ issued on or before this date (e.g., YYYY-MM-DD). |\n| Prefer | string | False\
    \ | Determines the API behavior for long-running queries: whether to wait for\
    \ results or return a `job_id` immediately. |\n| Max Wait | string | False | The\
    \ number of seconds (0 to 25) to wait for results before the API returns a `job_id`.\
    \ |\n| With Metadata | string | False | If set to true, the response will include\
    \ a metadata object containing result counts and job identifiers. |\n| Skip |\
    \ string | False | The number of initial results to skip (used for pagination).\
    \ |\n| Limit | string | False | The maximum number of certificate records to return\
    \ in the response. |\n\n### Additional Notes\n- If the query is complex or the\
    \ system requires more time, the action may return a `job_id` and status instead\
    \ of immediate certificate data. In such cases, the `Get Job Status` action should\
    \ be used to retrieve the final results.\n- The action returns data in a structured\
    \ JSON format (`JsonResult`) for use in subsequent playbook logic.\n\n### Flow\
    \ Description\n1. **Configuration Extraction:** The action retrieves the Silent\
