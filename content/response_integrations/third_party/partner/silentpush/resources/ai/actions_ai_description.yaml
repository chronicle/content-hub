    explanations of how the data calculations (like risk scores) were derived. Default
    is `false`. |

    | **Scan Data** | Boolean | No | If set to `true`, the action will include additional
    scan data. This is only applicable when the resource type is `ipv4`. Default is
    `false`. |


    ### Flow Description

    1. **Initialization**: The action initializes the Silent Push manager using the
    provided server URL and API key from the integration configuration.

    2. **Parameter Extraction**: It retrieves the resource type, the indicator value,
    and the optional flags for explanations and scan data from the action parameters.

    3. **Validation**: If the resource is an IP address, it validates the format against
    the specified type (IPv4 or IPv6) using internal validation logic.

    4. **Data Retrieval**: It sends a GET request to the Silent Push enrichment endpoint
    (`explore/enrich/{resource}/{value}`) with the specified query parameters.

    5. **Output**: The retrieved enrichment data is returned as a JSON object. If
    no data is found, the action fails with an error message.


    ### Additional Notes

    - This action is a standalone enrichment tool that operates on a single input
    value provided via parameters rather than automatically iterating through all
    entities in the current scope.

    - The **Scan Data** parameter is specifically intended for use with the `ipv4`
    resource type and may be ignored or return no additional data for other resource
    types.
