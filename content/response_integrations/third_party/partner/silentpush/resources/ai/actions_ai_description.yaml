List IP Information:
  ai_description: >-
    ### General Description\nRetrieves comprehensive network information for a provided
    list of IPv4 and IPv6 addresses using the Silent Push platform. Its primary purpose
    is to map IP addresses to their corresponding Autonomous System Numbers (ASN)
    and associated metadata in bulk.\n\n### Parameters Description\n| Parameter |
    Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Ips** | String
    | Yes | A comma-separated list of IP addresses (IPv4 or IPv6) to be queried. For
    example: `142.251.188.102, 8.8.8.8`. |\n\n### Additional Notes\n- The action supports
    a maximum of 100 IP addresses per execution.\n- It handles both IPv4 and IPv6
    addresses by categorizing them before making the API requests.\n- This action
    returns data as a JSON result for use in subsequent playbook steps and does not
    automatically enrich entities in the SecOps environment.\n\n### Flow Description\n1.
    **Configuration Extraction**: Retrieves the Silent Push server URL and API key
    from the integration settings.\n2. **Input Parsing**: Extracts the `Ips` string
    parameter and converts it into a list.\n3. **Validation & Categorization**: Validates
    each IP address and separates them into IPv4 and IPv6 lists.\n4. **Bulk Retrieval**:
    Executes POST requests to the Silent Push `explore/bulk/ip2asn` endpoints for
    the identified IPv4 and IPv6 addresses.\n5. **Data Aggregation**: Collects the
    `ip2asn` response data into a single results list.\n6. **Completion**: Returns
    the comprehensive IP information as the action's result.
