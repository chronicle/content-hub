Get ASN Reputation:
  ai_description: >-
    Retrieves the reputation history for a specific Autonomous System Number (ASN)
    from Silent Push. This action provides insights into historical reputation scores,
    associated AS names, and dates of reputation changes. It allows users to request
    detailed explanations for the reputation scores and limit the number of historical
    records returned.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the mandatory `ASN` and optional
    `Explain` and `Limit` parameters from the input.

    2. **API Request:** It initializes the Silent Push manager and calls the ASN reputation
    endpoint to fetch historical data for the specified ASN.

    3. **Data Processing:** The response is parsed to extract reputation history,
    which is then sorted by date in descending order.

    4. **Formatting:** If the `Explain` parameter is enabled, the action includes
    the reputation calculation details in the output table.

    5. **Output:** The formatted data is attached as a JSON result to the action,
    and the execution status is updated based on whether data was found.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ASN | string | Yes | The Autonomous System Number (ASN) to lookup (e.g., '12345').
    |

    | Explain | boolean | No | If set to true, the action retrieves and displays the
    information used to calculate the reputation score. |

    | Limit | string | No | The maximum number of reputation history records to retrieve
    from the API. |


    ### Additional Notes

    - This action is parameter-driven and does not automatically iterate over or enrich
    entities present in the Google SecOps case, although it may be executed within
    a case context.
