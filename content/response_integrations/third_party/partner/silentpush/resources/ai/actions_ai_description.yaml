Get Data Exports:
  ai_description: >-
    ### General Description

    The **Get Data Exports** action retrieves exported feed data from the Silent Push
    platform. It is designed to download specific data sets, such as indicator lists
    or threat intelligence feeds, that have been prepared for export within the Silent
    Push organization. The action fetches the raw content of the file specified by
    a Feed URL and returns it as the action result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed URL | String | Yes | The unique identifier or filename of the feed to be
    exported (e.g., `9b38bd50-ea46-4280-8739-9b71fc3a9291_indicators.csv`). This value
    is appended to the Silent Push export endpoint to locate the file. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push Server URL
    and API Key from the integration's global configuration.

    2. **Parameter Retrieval**: The `Feed URL` provided by the user is extracted for
    the request.

    3. **API Interaction**: The action initializes the Silent Push Manager and executes
    a GET request to the export endpoint: `{Server_URL}/app/v1/export/organization-exports/{Feed_URL}`.

    4. **Response Validation**: The script checks the HTTP status code. If the request
    is successful (200 OK), it proceeds to process the file content.

    5. **Output Generation**: The raw content of the exported file is captured and
    returned as the primary output of the action. If the request fails, an error message
