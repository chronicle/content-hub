  ai_description: "Retrieves comprehensive enrichment information for a specific resource,\
    \ such as a domain, IPv4, or IPv6 address, using the Silent Push platform. This\
    \ action allows analysts to gather deep contextual data, including reputation\
    \ and infrastructure details, to support threat investigation and incident response.\n\
    \n### Flow Description\n1. **Configuration Extraction:** The action retrieves\
    \ the Silent Push server URL and API key from the integration's global configuration.\n\
    2. **Parameter Parsing:** It extracts the target resource type (domain, ipv4,\
    \ or ipv6), the specific value to enrich, and optional flags for data explanation\
    \ and scan data inclusion.\n3. **Validation:** The action validates that the provided\
    \ resource type is supported and performs IP version validation if the resource\
    \ is an IP address.\n4. **API Interaction:** It executes a GET request to the\
    \ Silent Push enrichment endpoint (`explore/enrich/{resource}/{value}`) with the\
    \ specified query parameters.\n5. **Result Handling:** The retrieved enrichment\
    \ data is processed and added to the action's JSON results. If no data is found\
    \ or the API request fails, the action terminates with a failure status.\n\n###\
    \ Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---\
    \ | :--- | :--- | :--- |\n| Resource | string | Yes | The type of resource for\
    \ which information needs to be retrieved. Supported values are `domain`, `ipv4`,\
    \ and `ipv6`. |\n| Value | string | Yes | The specific identifier (e.g., domain\
