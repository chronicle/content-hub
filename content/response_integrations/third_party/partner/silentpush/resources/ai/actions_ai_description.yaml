    \ record associations for a given query name (`Qname`) and record type (`Qtype`),\
    \ allowing analysts to identify infrastructure linked to specific domains or IP\
    \ addresses. This provides valuable threat intelligence and context for investigations.\n\
    \n### Flow Description\n1. **Configuration Extraction**: The action retrieves\
    \ the Silent Push API key and server URL from the integration configuration.\n\
    2. **Parameter Extraction**: It extracts the required `Qname` and `Qtype`, along\
    \ with optional filtering parameters (e.g., `Netmask`, `Regex`, `Date` filters,\
    \ `Limit`).\n3. **API Request**: The action sends a GET request to the Silent\
    \ Push `explore/padns/lookup/answer` endpoint with the specified parameters.\n\
    4. **Response Handling**: \n   - If records are found, the action returns the\
    \ data and marks the execution as completed.\n   - If no records are found or\
    \ an API error occurs, the action logs the failure and terminates.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Qtype | string | No | DNS record type (e.g., 'ns', 'a', 'mx').\
    \ Defaults to 'ns'. |\n| Qname | string | Yes | The DNS record name to lookup.\
    \ |\n| Netmask | string | No | The netmask to filter the lookup results. |\n|\
    \ Subdomains | string | No | Flag to include subdomains in the lookup results.\
    \ |\n| Regex | string | No | Regular expression to filter the DNS records. |\n\
    | Match | string | No | Type of match for the query (e.g., exact, partial). |\n\
    | First Seen After | string | No | Filter results to include only records first\
    \ seen after this date. |\n| First Seen Before | string | No | Filter results\
    \ to include only records first seen before this date. |\n| Last Seen After |\
    \ string | No | Filter results to include only records last seen after this date.\
    \ |\n| Last Seen Before | string | No | Filter results to include only records\
    \ last seen before this date. |\n| As Of | string | No | Date or time to get the\
    \ DNS records as of a specific point in time. |\n| Sort | string | No | Sort the\
    \ results by the specified field (e.g., date, score). |\n| Output Format | string\
    \ | No | The format in which the results should be returned (e.g., JSON, XML).\
    \ |\n| Prefer | string | No | Preference for specific DNS servers or sources.\
    \ |\n| With Metadata | string | No | Flag to include metadata in the DNS records.\
    \ |\n| Max Wait | string | No | Maximum number of seconds to wait for results\
    \ before timing out. |\n| Skip | string | No | Number of results to skip for pagination\
    \ purposes. |\n| Limit | string | No | Maximum number of results to return. |"
