  ai_description: >-
    ### General Description

    Retrieves historical reputation data for a specific Autonomous System Number (ASN)
    using the Silent Push platform. This action provides insights into the threat
    landscape associated with an ASN, including reputation scores and historical changes.
    It is primarily used for threat intelligence and risk assessment of network infrastructure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **ASN** | string | Yes | The Autonomous System Number (ASN) to lookup (e.g.,
    '12345'). |

    | **Explain** | boolean | No | If set to `true`, the action retrieves additional
    information explaining how the reputation score was calculated. Defaults to `false`.
    |

    | **Limit** | string | No | Specifies the maximum number of historical reputation
    records to retrieve. |


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Retrieval:** Extracts the target `ASN`, the `Explain` flag, and
    the `Limit` value from the action inputs.

    3. **API Interaction:** Calls the Silent Push Manager's `get_asn_reputation` method,
    which performs a GET request to the ASN reputation history endpoint.

    4. **Data Processing:** Extracts the reputation data from the raw API response
    and sorts the history entries by date in descending order.

    5. **Table Preparation:** Formats the sorted data into a structured list, including
    the ASN, reputation score, AS name, and date. If the `Explain` parameter is enabled,
    it also includes the explanation field.

    6. **Result Output:** Adds the processed data to the action's JSON results and
    completes the execution with a success message.


    ### Additional Notes

    While the action metadata description mentions IPv4, the technical implementation
    and parameters specifically target Autonomous System Numbers (ASNs).
