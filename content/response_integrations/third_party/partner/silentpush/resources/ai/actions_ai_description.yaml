Add Indicators Tags:
  ai_description: >-
    ### General Description

    The **Add Indicators Tags** action allows users to update or add tags to a specific
    indicator (such as a domain or IP address) within an existing Silent Push feed.
    This is useful for organizing threat intelligence data and labeling indicators
    based on specific campaigns, threat actors, or internal tracking requirements.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed UUID | string | Yes | The unique identifier (UUID) of the Silent Push feed
    where the indicator is located. |

    | Indicator Name | string | Yes | The specific name of the indicator (e.g., 'example.com')
    to be tagged. |

    | Tags | string | Yes | A string containing the tags to be associated with the
    indicator. |


