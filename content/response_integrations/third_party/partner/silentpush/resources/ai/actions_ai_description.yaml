Get job status:
  ai_description: >-
    ### General Description

    This action retrieves the status of a running job or the results from a completed
    job within the Silent Push platform. It is primarily used to monitor the progress
    of asynchronous tasks (such as deep scans or bulk lookups) and fetch the final
    data once the processing is finished.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | String | Yes | The unique identifier of the job returned by previous
    Silent Push actions. |

    | Max Wait | String | No | The number of seconds to wait for results (0-25 seconds).
    If not provided, it defaults to 20 seconds. |

    | Status Only | Boolean | No | If enabled, the action returns the job status even
    if the job is already complete. |

    | Force Metadata On | Boolean | No | Always includes query metadata in the response,
    regardless of the original request settings. |

    | Force Metadata Off | Boolean | No | Never includes query metadata in the response,
    regardless of the original request settings. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the Silent Push Server URL
    and API Key from the integration settings.

    2. **Parameter Extraction**: It retrieves the mandatory Job ID and optional parameters
    like Max Wait and metadata flags.

    3. **API Request**: The action calls the Silent Push API via a GET request to
    the `explore/job/{job_id}` endpoint, passing the specified parameters.

    4. **Result Processing**: It parses the JSON response to determine the job's current
    state and retrieves the associated data if the job is finished.

    5. **Output**: The action returns the job status and results to the Google SecOps
    environment.


    ### Additional Notes

    - This action does not process or filter entities from the case; it operates globally
    based on the provided Job ID.

    - The `Max Wait` parameter is strictly validated to be between 0 and 25 seconds.
