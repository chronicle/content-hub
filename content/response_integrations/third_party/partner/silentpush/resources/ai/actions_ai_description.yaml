  ai_description: >-
    ### General Description

    The **Get Enrichment Data** action retrieves comprehensive threat intelligence
    and enrichment information for a specific resource, such as a domain, IPv4 address,
    or IPv6 address, from the Silent Push platform. This action provides deep visibility
    into the reputation, infrastructure, and metadata associated with an indicator,
    supporting analysts in threat analysis and investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Resource** | String | Yes | The type of resource to enrich. Supported values:
    `domain`, `ipv4`, `ipv6`. Default is `ipv4`. |

