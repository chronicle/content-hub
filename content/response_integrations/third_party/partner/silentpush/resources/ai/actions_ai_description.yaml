    from which to fetch indicators. |

    | **Page No** | String | No | The specific page number of results to retrieve
    from the feed. Defaults to "1". |

    | **Page Size** | String | No | The number of indicator records to return per
    page. Defaults to "10000". |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push server URL
    and API key from the integration's global configuration.

    2. **Parameter Parsing**: It extracts the `Feed UUID`, `Page No`, and `Page Size`
    from the action's input parameters, applying default values for pagination if
    they are not provided.

    3. **API Interaction**: The action initializes the `SilentPushManager` and calls
    the `get_future_attack_indicators` method, which performs a GET request to the
    Silent Push `/api/v2/iocs/threat-ranking/` endpoint using the provided Feed UUID
    and pagination criteria.

    4. **Data Processing**: The response is parsed to extract the list of indicators.
    If the response is empty or no indicators are found, the action logs an error
    and terminates with a failure status.

    5. **Result Reporting**: The retrieved indicators are added to the action's JSON
    results (`ScriptResult`) for use in subsequent playbook steps. The action then
    concludes with a success message containing the indicator data.


    ### Additional Notes

    - This action is a global fetch operation and does not target or filter specific
    entities within the Google SecOps case.

    - The action name contains a typographical error ("Indicatiors") which is preserved
    from the integration metadata.
