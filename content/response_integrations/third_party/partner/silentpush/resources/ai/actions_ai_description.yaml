  ai_description: "### General Description\nThe **Density Lookup** action queries\
    \ the Silent Push platform to retrieve granular density information for various\
    \ DNS and IP parameters. This data helps analysts understand the prevalence and\
    \ associations of specific infrastructure components, such as Name Servers (NS),\
    \ Mail Exchange (MX) servers, IP addresses, and Autonomous System Numbers (ASNs).\
    \ It is primarily used for infrastructure analysis and identifying commonalities\
    \ across different network assets.\n\n### Parameters Description\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Qtype**\
    \ | string | Yes | The type of density lookup to perform. Supported types include\
    \ `nssrv`, `mxsrv`, `nshash`, `mxhash`, `ipv4`, `ipv6`, `asn`, and `chv`. |\n\
    | **Query** | string | Yes | The specific value (e.g., a domain name, IP address,\
    \ or server hostname) to query for density information. |\n| **Scope** | string\
    \ | No | Defines the match level or scope for the lookup to filter results. |\n\
    \n### Additional Notes\n- This action requires a valid API Key and Server URL\
    \ configured in the Silent Push integration settings.\n- If the query returns\
    \ no records, the action will result in a failure status with an error message\
    \ indicating that no density records were found.\n\n### Flow Description\n1. **Initialization:**\
    \ The action extracts the integration configuration (Server URL and API Key) and\
    \ the action parameters (`Qtype`, `Query`, and `Scope`).\n2. **API Request:**\
    \ It initializes the `SilentPushManager` and executes a GET request to the Silent\
    \ Push density lookup endpoint using the provided parameters.\n3. **Data Validation:**\
    \ The action parses the response and checks for the presence of records in the\
    \ `response.records` field.\n4. **Execution Outcome:** \n    - If records are\
    \ found, the action completes successfully and returns the data in a JSON format.\n\
    \    - If no records are found or an API error occurs, the action fails and logs\
    \ the corresponding error message."
