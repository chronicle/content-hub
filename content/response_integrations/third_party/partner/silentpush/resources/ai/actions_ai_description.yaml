Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    the Google SecOps platform and the Silent Push API. It ensures that the provided
    configuration parameters, such as the Server URL and API Key, are valid and that
    the network path to the Silent Push service is open.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (Silent Push Server and API Key).


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'Silent Push Server'
    and 'API Key' from the integration settings.

    2. **Manager Initialization**: It initializes the `SilentPushManager` with the
    extracted credentials.

    3. **Connection Test**: The action calls the `test_connection` method, which internally
    executes a sample domain search (limited to 1 result) to validate the API key's
    permissions and the server's responsiveness.

    4. **Result Reporting**: If the API call succeeds, it returns a success message.
    If the call fails (e.g., due to invalid credentials or network issues), it catches
    the exception and reports a failure state with the error details.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting purposes. It does not process any entities or modify any data.
