  ai_description: >-
    ### General Description

    Adds tags to a specific indicator within a Silent Push feed. This action allows
    analysts to categorize and organize threat indicators directly on the Silent Push
    platform by updating their associated metadata. It is primarily used for threat
    intelligence management and feed curation.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed UUID | string | Yes | The unique identifier (UUID) of the target feed in
    Silent Push. |

    | Indicator Name | string | Yes | The name of the indicator (e.g., a domain or
    IP address) that will receive the new tags. |

    | Tags | string | Yes | The specific tags to be added to the indicator. Multiple
    tags should be provided as a single string (the format depends on the Silent Push
    API requirements, typically comma-separated). |


    ### Additional Notes

    This action does not process Google SecOps entities. It relies entirely on the
    provided parameters to identify the feed and the indicator. The action uses a
    `PUT` request to update the external system state.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Extraction:** Collects the `Feed UUID`, `Indicator Name`, and `Tags`
    from the action input.

    3. **API Initialization:** Initializes the `SilentPushManager` with the provided
    credentials.

    4. **External Mutation:** Executes a `PUT` request to the Silent Push endpoint:
    `/api/v1/feeds/{feed_uuid}/indicators/{indicator_name}/update-tags/` with the
    provided tags in the payload.

    5. **Result Handling:** Validates the API response. If successful, it completes
    the action; otherwise, it logs an error and fails the execution.
