Add Feed:
  ai_description: >-
    ### General Description

    The **Add Feed** action allows users to create and register a new threat intelligence
    feed within the Silent Push platform. This action is primarily used for administrative
    and management purposes, enabling the organization of indicators into structured
    feeds with specific metadata such as categories, vendors, and tags.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Name** | string | Yes | The unique name assigned to the new feed. |

    | **Type** | string | Yes | The classification or type of the feed (e.g., 'domain',
    'ip'). |

    | **Category** | string | No | The functional category the feed belongs to. |

    | **Vendor** | string | No | The provider or vendor associated with the feed data.
    |

    | **Feed Description** | string | No | A descriptive summary of the feed's purpose.
    Note: The configuration metadata suggests this may be used for a screenshot URL
    in some contexts. |

    | **Tags** | string | No | A comma-separated list of tags to be associated with
    the feed for easier filtering and management. |


    ### Additional Notes

    - This action does not operate on specific entities (like IPs or Domains) from
    the SecOps case; instead, it uses the provided parameters to create a global resource
    in Silent Push.

    - The `Tags` parameter should be provided as a comma-separated string (e.g., `malware,phishing,critical`).


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push Server URL
    and API Key from the integration settings.

    2. **Parameter Retrieval**: It extracts the feed details (Name, Type, Category,
    Vendor, Description, and Tags) provided by the user.

    3. **API Interaction**: The action initializes the `SilentPushManager` and sends
    a POST request to the `/api/v1/feeds/` endpoint with the constructed payload.

    4. **Tag Processing**: If tags are provided, they are split into a list before
    being sent in the request body.

    5. **Result Handling**: The action captures the API response. If successful, it
    returns the feed details; otherwise, it logs an error and marks the action as
    failed.
