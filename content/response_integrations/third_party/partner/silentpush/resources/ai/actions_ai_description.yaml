Live URL Scan:
  ai_description: >-
    ### General Description

    The **Live URL Scan** action performs an on-demand scan of a specific URL using
    the Silent Push platform to retrieve hosting metadata. This action is designed
    to provide analysts with immediate technical context about a URL, such as its
    hosting infrastructure, without requiring manual investigation. It allows for
    simulation of different platforms, operating systems, browsers, and geographic
    regions to see how the URL behaves under various conditions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The specific URL to be scanned. Defaults to 'https://silentpush.com'.
    |

    | Platform | String | No | The device platform to simulate for the scan. Allowed
    values: 'Desktop', 'Mobile', 'Crawler'. |

    | Os | String | No | The operating system to simulate. Allowed values: 'Windows',
    'Linux', 'MacOS', 'iOS', 'Android'. |

    | Browser | String | No | The browser to simulate. Allowed values: 'Firefox',
    'Chrome', 'Edge', 'Safari'. |

    | Region | String | No | The geographic region from which the scan should originate.
    Allowed values: 'US', 'EU', 'AS', 'TOR'. |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the target URL and optional simulation
    parameters (Platform, OS, Browser, and Region) from the user input.

    2. **Validation:** It validates the optional parameters against a predefined list
    of supported values (e.g., checking if the provided 'Platform' is one of 'Desktop',
    'Mobile', or 'Crawler'). If validation fails, the action terminates with an error.

    3. **API Execution:** The action initializes the Silent Push Manager and executes
    a GET request to the `scanondemand` endpoint with the provided parameters.

    4. **Data Parsing:** It extracts the scan results and hosting metadata from the
    API response.

    5. **Output Generation:** The retrieved scan data is formatted and added to the
    action's JSON results. If no scan data is found, the action reports a failure;
    otherwise, it completes successfully.


    ### Additional Notes

    - This action is strictly a retrieval (GET) operation and does not modify any
    data on the Silent Push platform or within the scanned URL's environment.

    - While the code iterates over target entities, it does not use them to drive
    the scan logic; the scan is driven entirely by the 'URL' parameter.
