  ai_description: >-
    ### General Description

    This action retrieves historical reputation data for a specific Autonomous System
    Number (ASN) from the Silent Push platform. It provides analysts with insights
    into the reputation history of an ASN, which can be used to assess the risk associated
    with network infrastructure.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction**: It extracts the `ASN` (mandatory), `Explain` (optional),
    and `Limit` (optional) parameters provided by the user.

    3. **Data Retrieval**: The action initializes the `SilentPushManager` and performs
    an API request to fetch the ASN reputation history.

    4. **Data Processing**: The raw response is parsed, and the reputation entries
    are sorted by date in descending order.

    5. **Result Generation**: The processed data is formatted into a table and added
    to the action's result JSON for display in the SecOps platform.


