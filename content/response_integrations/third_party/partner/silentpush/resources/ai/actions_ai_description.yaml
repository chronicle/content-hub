    1. **Configuration Extraction:** Retrieves the Silent Push server URL and API
    Key from the integration settings.

    2. **Parameter Retrieval:** Extracts the Feed UUID, Indicator Name, and Tags provided
    by the user.

    3. **API Interaction:** Initializes the `SilentPushManager` and executes a `PUT`
    request to the Silent Push API endpoint: `/api/v1/feeds/{feed_uuid}/indicators/{indicator_name}/update-tags/`.

    4. **Result Handling:** If the API call is successful, the action completes with
    a success message. If the indicator or feed is not found, or if the API returns
    an error, the action fails and logs the error details.
