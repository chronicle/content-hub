Get Future Attack Indicatiors:
  ai_description: >-
    The 'Get Future Attack Indicators' action retrieves a list of indicators associated
    with potential future attacks from the Silent Push platform. It uses a specific
    Feed UUID to query the threat-ranking API, allowing analysts to proactively identify
    emerging threats. The action supports pagination through page number and page
    size parameters to handle large datasets. The retrieved indicators are returned
    as a JSON object for further analysis or use in subsequent playbook steps.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Parsing**: It extracts the mandatory 'Feed UUID' and optional pagination
    parameters ('Page No' and 'Page Size') from the action input.

    3. **API Interaction**: The action initializes the Silent Push Manager and performs
    a GET request to the `/api/v2/iocs/threat-ranking/` endpoint, passing the Feed
    UUID and pagination details as query parameters.

    4. **Data Processing**: It parses the API response to extract the list of indicators.
    If no indicators are found, the action terminates with a failure status.

    5. **Result Output**: The list of indicators is added to the action's JSON results,
    and the action completes successfully.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description | Expected Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Feed UUID | string | True | The unique identifier for the specific threat feed
    to fetch indicators from. | A valid UUID string (e.g., '99da9b6a-146b-4a4d-9929-5fd5c6e2c257').
    |

    | Page No | string | False | The specific page number of results to retrieve.
    Defaults to '1' if not provided. | An integer string (e.g., '2'). |

    | Page Size | string | False | The maximum number of indicators to return per
    page. Defaults to '10000'. | An integer string (e.g., '500'). |


    ### Additional Notes

    - This action does not process or enrich specific entities within the case; it
    fetches global feed data based on the provided UUID.

