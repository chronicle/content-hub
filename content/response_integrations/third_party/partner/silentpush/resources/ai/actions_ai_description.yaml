Live URL Scan:
  ai_description: >-
    ### General Description

    This action performs a live scan of a specific URL using the Silent Push platform
    to retrieve hosting metadata and scan results. It allows users to simulate different
    scanning environments by specifying the platform, operating system, browser, and
    geographic region. The results provide insights into the infrastructure and hosting
    details of the target URL.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The specific URL to be scanned by Silent Push. |

    | Platform | String | No | The device type to simulate for the scan. Supported
    values: `Desktop`, `Mobile`, `Crawler`. |

    | Os | String | No | The operating system to simulate for the scan. Supported
    values: `Windows`, `Linux`, `MacOS`, `iOS`, `Android`. |

    | Browser | String | No | The web browser to simulate for the scan. Supported
    values: `Firefox`, `Chrome`, `Edge`, `Safari`. |

    | Region | String | No | The geographic region from which the scan should originate.
    Supported values: `US`, `EU`, `AS`, `TOR`. |


    ### Additional Notes

    - The action includes a validation step for all optional parameters (`Platform`,
    `Os`, `Browser`, `Region`). If any of these parameters are provided with values
    outside the supported list, the action will fail with a validation error before
    contacting the Silent Push API.

    - This action does not automatically update entities or create insights; it returns
    the raw scan data in the action's JSON results for use in subsequent playbook
    steps.


    ### Flow Description

    1. **Initialization**: The action retrieves the Silent Push Server URL and API
    Key from the integration configuration.

    2. **Parameter Extraction**: It extracts the target `URL` and the optional environment
    parameters from the action input.

    3. **Validation**: The action validates the `Platform`, `Os`, `Browser`, and `Region`
    parameters against allowed values to ensure API compatibility.

    4. **API Execution**: It calls the Silent Push `live_url_scan` endpoint (GET request)
    with the specified parameters.

    5. **Result Processing**: The action parses the hosting metadata and scan results
    from the API response.

    6. **Output**: The formatted scan results and the target URL are added to the
    action's JSON result, and the execution state is set to completed.
