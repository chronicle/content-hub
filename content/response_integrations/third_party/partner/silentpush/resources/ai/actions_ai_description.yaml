Screenshot URL:
  ai_description: "Generates a screenshot of a specified URL using the Silent Push\
    \ platform's on-demand scan capabilities. This action is primarily used to visually\
    \ verify the content of a suspicious or malicious URL without requiring the analyst\
    \ to visit the site directly. \n\n### Flow Description:\n1. **Configuration Extraction:**\
    \ Retrieves the Silent Push Server URL and API Key from the integration settings.\n\
    2. **Parameter Retrieval:** Extracts the target URL provided by the user.\n3.\
    \ **Screenshot Request:** Calls the Silent Push API (`explore/tools/scanondemand`)\
    \ to initiate a live scan and generate a screenshot.\n4. **URL Validation:** Parses\
    \ the returned screenshot URL and performs a GET request to ensure the image is\
    \ accessible and the server returns a successful HTTP 200 status.\n5. **Result\
    \ Processing:** Returns the final screenshot URL as a JSON result for use in subsequent\
    \ playbook steps.\n\n### Parameters Description:\n| Parameter Name | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| URL | string | Yes | The specific\
    \ URL for which to generate a screenshot. Defaults to a VirusTotal domain lookup\
    \ if not specified. |\n\n### Additional Notes:\n- This action does not automatically\
    \ attach the image to the case wall; it provides the URL to the generated image.\n\
    - While the script iterates over target entities, it does not use them for the\
    \ logic; the operation is entirely driven by the `URL` input parameter."
