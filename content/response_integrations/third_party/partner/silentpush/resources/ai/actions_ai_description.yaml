  ai_description: >-
    ### General Description

    The **Get job status** action retrieves the current status or the final results
    of an asynchronous job previously initiated within the Silent Push platform. This
    utility is essential for workflows involving long-running processes, such as bulk
    domain lookups or complex scans, allowing playbooks to poll for completion and
    ingest the resulting data once available.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | string | Yes | The unique identifier of the job to check, typically
    returned by other Silent Push actions. |

    | **Max Wait** | string | No | The number of seconds the action should wait for
    the job to complete before returning the current status (valid range: 0-25 seconds).
    Defaults to 20 seconds if not specified. |

    | **Status Only** | boolean | No | If enabled, the action will return only the
    job's status metadata, even if the job has already finished and results are available.
    |

    | **Force Metadata On** | boolean | No | When enabled, the response will always
    include query metadata, regardless of the settings used when the job was originally
    created. |

    | **Force Metadata Off** | boolean | No | When enabled, the response will never
    include query metadata, regardless of the settings used when the job was originally
    created. |


    ### Additional Notes

    - This action is primarily a utility for job orchestration and does not directly
    enrich entities or modify case data within Google SecOps.

    - The `Max Wait` parameter is capped at 25 seconds by the Silent Push API logic.


    ### Flow Description

    1. **Initialization**: Extracts the integration configuration (API Key and Server
    URL) and the user-provided action parameters.

    2. **Validation**: Converts the `Max Wait` parameter to an integer and ensures
    it falls within the default range (defaulting to 20 if empty).

    3. **API Request**: Sends a GET request to the Silent Push `explore/job/{job_id}`
    endpoint with the specified query parameters.

    4. **Response Handling**: Parses the job status and results from the API response.

    5. **Completion**: Returns the job data as the action output. If no job status
    is found for the provided ID, the action fails.
