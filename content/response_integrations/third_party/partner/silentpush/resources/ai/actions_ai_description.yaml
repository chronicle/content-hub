    1. **Configuration Extraction**: Retrieves the Silent Push Server URL and API
    Key from the integration's global configuration.

    2. **Parameter Extraction**: Collects the target Nameserver, the Explain flag,
    and the Limit value from the action's input parameters.

    3. **API Interaction**: Initializes the Silent Push Manager and calls the `get_nameserver_reputation`
    endpoint to fetch historical data.

    4. **Data Transformation**: Iterates through the retrieved reputation history
    items and converts integer-based date values (formatted as YYYYMMDD) into standard
    ISO format strings for better readability.

    5. **Result Finalization**: If valid reputation data is found, the action completes
    successfully. If no data is returned or an error occurs during the API call, the
    action terminates with a failure status.


    ### Additional Notes

    This action does not automatically update entities or create insights within the
    Google SecOps case. It returns the retrieved data as a JSON result for use in
    subsequent playbook logic.
