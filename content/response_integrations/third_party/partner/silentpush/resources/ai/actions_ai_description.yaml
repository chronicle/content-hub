search domains:
  ai_description: >-
    ### General Description

    The **search domains** action allows users to query the Silent Push platform for
    domain records using a wide array of filters. It is primarily used for threat
    hunting and infrastructure analysis, enabling users to find domains based on patterns,
    registration details, or network characteristics.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | String | No | Name or wildcard pattern of domain names to search for.
    |

    | Domain Regex | String | No | A valid RE2 regex pattern to match domains. Overrides
    the 'Domain' argument. |

    | Name Server | String | No | Name server name or wildcard pattern used by domains.
    |

    | Asnum | String | No | Autonomous System (AS) number to filter domains. |

    | Asname | String | No | Search for AS numbers where the AS Name begins with this
    value. |

    | Min IP Diversity | String | No | Minimum IP diversity limit to filter domains.
    |

    | Registrar | String | No | Name or partial name of the domain registrar. |

    | Min ASN Diversity | String | No | Minimum ASN diversity limit to filter domains.
    |

    | Certificate Issuer | String | No | Filter domains by SSL certificate issuer
    (supports wildcards). |

    | Whois Date After | String | No | Filter domains with a WHOIS creation date after
    YYYY-MM-DD. |

    | Skip | String | No | Number of results to skip for pagination. |

    | Limit | String | No | Number of results to return. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the search criteria from the
    user input, including domain patterns, regex, and various infrastructure filters
    (ASN, Registrar, etc.).

    2. **API Interaction:** It connects to the Silent Push API via the `SilentPushManager`
    and executes a GET request to the `explore/domain/search` endpoint with the specified
    filters.

    3. **Result Processing:** The action parses the response, extracting the list
    of domain records.

    4. **Completion:** It returns the found records (or a "not found" message) to
    the Google SecOps platform.


    ### Additional Notes

    * This action does not automatically process entities present in the case; it
    relies entirely on the provided input parameters.

    * Either `Domain` or `Domain Regex` is typically used as the primary search key.
