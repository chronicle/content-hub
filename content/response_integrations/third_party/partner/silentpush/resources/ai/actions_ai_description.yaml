Search Scan Data:
  ai_description: >-
    ### General Description

    The **Search Scan Data** action allows users to query Silent Push's extensive
    scan data repositories using the **SPQL (Silent Push Query Language)**. This action
    is designed to retrieve raw scan records, including infrastructure details and
    metadata, based on complex search criteria defined by the user. It is a powerful
    tool for threat hunting and infrastructure analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The SPQL query string used to search the scan data
    (e.g., `tld=cool`). |

    | **Fields** | String | No | Specifies which fields should be returned in the
    response. Note: The current implementation treats this as a boolean flag to enable
    field filtering. |

    | **sort** | String | No | Defines the sorting criteria for the returned scan
    records. |

    | **Skip** | String | No | The number of records to skip in the result set, used
    for pagination. |

    | **Limit** | String | No | The maximum number of records to return in a single
    request. |

    | **With Metadata** | Boolean | No | Whether to include search metadata in the
    API response. Defaults to `true`. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push Server URL
    and API Key from the integration's global configuration.

    2. **Parameter Retrieval**: It extracts the SPQL query and optional search modifiers
    (Limit, Skip, Sort, etc.) provided by the user.

    3. **API Request**: The action initializes the `SilentPushManager` and executes
    a POST request to the `explore/scandata/search/raw` endpoint with the query and
    parameters.

    4. **Response Handling**: It parses the JSON response to extract the `scandata_raw`
    records. If no records are found, the action returns a failure status.

    5. **Execution Completion**: The retrieved scan data is returned as a JSON result,
    and the action completes successfully if data is found.


    ### Additional Notes

    This action is a data retrieval utility. While it iterates over entities in the
    current scope for logging purposes, it does not use entity data to perform the
    search, nor does it automatically update entity attributes or create insights
    within the case.
