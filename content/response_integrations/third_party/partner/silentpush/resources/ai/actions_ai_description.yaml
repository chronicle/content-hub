Forward Padns Lookup:
  ai_description: >-
    ### General Description

    This action performs a forward Passive DNS (PADNS) lookup using the Silent Push
    platform. It allows analysts to retrieve historical DNS records associated with
    a specific domain name (`Qname`) and record type (`Qtype`). The action is designed
    for deep infrastructure analysis, providing visibility into how a domain's DNS
    records have changed over time. It supports extensive filtering capabilities,
    including time-based constraints, network masks, and regular expressions, making
    it a powerful tool for threat hunting and identifying malicious infrastructure
    patterns.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qname** | string | Yes | The DNS record name (domain) to lookup. |

    | **Qtype** | string | No | The DNS record type to query (e.g., 'ns', 'a', 'mx',
    'txt'). Defaults to 'ns'. |

    | **Netmask** | string | No | Filter results by a specific network mask. |

    | **subdomain** | string | No | Flag to include subdomains in the lookup results.
    |

    | **Regex** | string | No | A regular expression to filter the returned DNS records.
    |

    | **Match** | string | No | The type of match for the query (e.g., 'exact', 'partial').
    |

    | **First Seen After** | string | No | Filter records first observed after this
    date (ISO 8601 format). |

    | **First Seen Before** | string | No | Filter records first observed before this
    date (ISO 8601 format). |

    | **Last Seen After** | string | No | Filter records last observed after this
    date (ISO 8601 format). |

    | **Last Seen Before** | string | No | Filter records last observed before this
    date (ISO 8601 format). |

    | **As Of** | string | No | Retrieve DNS records as they appeared at a specific
    point in time. |

    | **Sort** | string | No | Field to sort the results by (e.g., 'date', 'score').
    |

    | **Output Format** | string | No | The desired format for the results (e.g.,
    'JSON', 'XML'). |

    | **Prefer** | string | No | Preference for specific DNS servers or data sources.
    |

    | **With Metadata** | string | No | Boolean flag to include additional metadata
    in the records. |

    | **Max Wait** | string | No | Maximum seconds to wait for the API response (0-25
    seconds). |

    | **Skip** | string | No | Number of results to skip for pagination. |

    | **Limit** | string | No | Maximum number of results to return. |


    ### Flow Description

    1. **Initialization:** The action extracts the Silent Push server URL and API
    key from the integration configuration.

    2. **Parameter Collection:** It retrieves the mandatory `Qname` and all optional
    filtering parameters provided by the user.

    3. **API Execution:** The action calls the Silent Push `forward_padns_lookup`
    method, which executes a GET request to the `explore/padns/lookup/query` endpoint.

    4. **Error Handling:** The script validates the API response. If the API returns
    an error or if no records are found for the specified query, the action terminates
    with a failure status.

    5. **Output:** Upon a successful lookup, the retrieved DNS records are returned
    as a JSON object in the `JsonResult` field, and the action completes successfully.


    ### Additional Notes

    * **Parameter Discrepancy:** Note that while the configuration defines the parameter
    as `subdomain`, the underlying Python logic attempts to extract it as `Subdomains`.
    Ensure the parameter name in the UI matches the expected input in the script for
    correct functionality.

    * **Entity Interaction:** Although the script iterates through target entities
    at the end of the execution, it does not use them to drive the lookup logic; the
    query is strictly based on the `Qname` parameter.
