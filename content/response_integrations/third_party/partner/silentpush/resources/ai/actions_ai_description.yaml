  ai_description: >-
    ### General Description

    This action performs a forward Passive DNS (PADNS) lookup using the Silent Push
    API. It allows analysts to retrieve historical DNS records (such as A, AAAA, MX,
    NS, etc.) for a specific domain name. The action supports extensive filtering
    capabilities, including date ranges (first/last seen), regular expressions, and
    network masks, making it a powerful tool for infrastructure analysis and threat
    hunting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Qname | string | Yes | The DNS record name (domain) to lookup. |

    | Qtype | string | No | The DNS record type to query (e.g., 'ns', 'a', 'mx').
    Defaults to 'ns'. |

    | Netmask | string | No | Filter results by a specific netmask. |

    | subdomain | string | No | Flag to include subdomains in the lookup results.
    |

    | Regex | string | No | A regular expression to filter the returned DNS records.
    |

    | Match | string | No | Specifies the type of match for the query (e.g., 'exact',
    'partial'). |

    | First Seen After | string | No | Filter records first observed after this date
    (YYYY-MM-DD). |

    | First Seen Before | string | No | Filter records first observed before this
    date (YYYY-MM-DD). |

    | Last Seen After | string | No | Filter records last observed after this date
    (YYYY-MM-DD). |

    | Last Seen Before | string | No | Filter records last observed before this date
    (YYYY-MM-DD). |

    | As Of | string | No | Retrieve DNS records as they appeared at a specific point
    in time. |

    | Sort | string | No | Field by which to sort the results (e.g., 'date', 'score').
    |

    | Output Format | string | No | The desired format for the returned results (e.g.,
    JSON, XML). |

    | Prefer | string | No | Preference for specific DNS servers or sources. |

    | With Metadata | string | No | Boolean flag to include additional metadata in
    the records. |

    | Max Wait | string | No | Maximum seconds to wait for the API response (0-25).
    |

    | Skip | string | No | Number of results to skip for pagination. |

    | Limit | string | No | Maximum number of results to return. |


    ### Additional Notes

    *   **Entity Usage:** Although the script contains logic to iterate over target
    entities, it does not currently use them as inputs for the lookup. The action
    relies entirely on the `Qname` parameter provided by the user.

    *   **Pagination:** Use the `Skip` and `Limit` parameters to manage large result
    sets.


    ### Flow Description

    1.  **Initialization:** The action initializes the Silent Push manager using the
    configured Server URL and API Key.

    2.  **Parameter Extraction:** It retrieves the mandatory `Qname` and all optional
    filtering/pagination parameters from the action configuration.

    3.  **API Request:** A GET request is dispatched to the Silent Push PADNS lookup
    endpoint (`explore/padns/lookup/query/{qtype}/{qname}`) with the specified filters.

    4.  **Error Handling:** The script checks the API response for errors or empty
    record sets. If no records are found, the action fails with a descriptive message.

    5.  **Completion:** Upon success, the action returns the retrieved DNS records
    and sets the execution state to completed.
