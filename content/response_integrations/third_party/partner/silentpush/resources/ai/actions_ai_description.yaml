Reverse Padns Lookup:
  ai_description: >-
    ### General Description

    The **Reverse Padns Lookup** action performs a reverse Passive DNS (PDNS) query
    against the Silent Push platform. It identifies DNS records (such as NS, MX, or
    A records) that point to a specific record name or value. This capability is essential
    for security analysts to map out an adversary's infrastructure, identify shared
    hosting environments, and track DNS configuration changes over time.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qtype** | string | No | The DNS record type to search for (e.g., 'ns', 'mx',
    'a'). Defaults to 'ns'. |

    | **Qname** | string | Yes | The specific DNS record value to perform the reverse
    lookup for (e.g., a nameserver domain like `vida.ns.cloudflare.com`). |

    | **Netmask** | string | No | Filters results by a specific network mask. |

    | **subdomain** | string | No | If provided, includes subdomains in the search
    results. |

    | **Regex** | string | No | A regular expression to filter the returned DNS records.
    |

    | **Match** | string | No | Specifies the match type (e.g., 'exact' or 'partial').
    |

    | **First Seen After/Before** | string | No | Filters records based on when they
    were first observed by the Silent Push sensors. |

    | **Last Seen After/Before** | string | No | Filters records based on when they
    were last observed. |

    | **As Of** | string | No | Retrieves DNS records as they appeared at a specific
    point in time. |

    | **Sort** | string | No | Specifies the field to sort results by (e.g., date).
    |

    | **Output Format** | string | No | The desired format for the results (e.g.,
    JSON). |

    | **Prefer** | string | No | Preference for specific DNS sources or servers. |

    | **With Metadata** | string | No | Includes additional metadata in the response
    if set. |

    | **Max Wait** | string | No | Maximum time in seconds to wait for the API response.
    |

    | **Skip/Limit** | string | No | Pagination parameters to control the number of
    results returned. |


    ### Additional Notes

    - This is a 'Global' action and does not automatically process entities from the
    case scope. The `Qname` must be provided manually or mapped from an entity identifier
    in a playbook.

    - Although the script contains a loop over target entities, it only prints their
    identifiers for logging purposes and does not use them for the API query or update
    them in the system.


    ### Flow Description

    1. **Initialization:** Extracts the Silent Push Server URL and API Key from the
    integration configuration.

    2. **Parameter Extraction:** Retrieves the mandatory `Qname` and various optional
    filtering and pagination parameters from the action input.

    3. **API Request:** Executes a GET request to the Silent Push `explore/padns/lookup/answer`
    endpoint using the provided `Qtype` and `Qname`.

    4. **Response Validation:** Checks the API response for errors. If records are
    found, they are extracted from the response payload.

    5. **Completion:** Returns the found DNS records as a JSON result and completes
    the action. If no records are found or an error occurs, the action terminates
    with a failure status.
