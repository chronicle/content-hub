Density Lookup:
  ai_description: >-
    ### General Description

    The **Density Lookup** action queries the Silent Push platform for granular DNS
    and IP density information. It allows security analysts to investigate the prevalence
    and relationships of specific infrastructure components, such as Name Servers
    (NS), Mail Exchange (MX) servers, IP addresses, and Autonomous System Numbers
    (ASNs). This data is critical for identifying related malicious infrastructure
    or common patterns across different domains and IPs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qtype** | string | Yes | The type of density query to perform. Supported options
    include `nssrv`, `mxsrv`, `nshash`, `mxhash`, `ipv4`, `ipv6`, `asn`, and `chv`.
    |

    | **Query** | string | Yes | The specific value to be queried (e.g., a domain
    name, IP address, or ASN). |

    | **Scope** | string | No | Optional parameter to define the match level or scope
    for the lookup. |


    ### Additional Notes

    This action is a standalone lookup tool. While the code contains a loop that references
    target entities, it does not use entity data to drive the query logic, nor does
    it update entity attributes or create insights. The results are returned as a
    JSON object in the action output.


    ### Flow Description

    1. **Initialization**: The action retrieves the Silent Push Server URL and API
    Key from the integration's configuration parameters.

    2. **Input Extraction**: It parses the `Qtype`, `Query`, and `Scope` parameters
    provided by the user in the action configuration.

    3. **API Request**: The action executes a GET request to the Silent Push `explore/padns/lookup/density`
    endpoint using the provided query type and value.

    4. **Response Validation**: It checks the API response for density records. If
    no records are found, the action logs an error and terminates with a failure status.

    5. **Output**: If records are retrieved successfully, the action returns the data
    as a JSON result and completes the execution.
