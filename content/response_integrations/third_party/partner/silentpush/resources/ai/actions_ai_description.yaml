  ai_description: >-
    ### General Description

    This action adds a new feed to the Silent Push platform. It interacts with the
    Silent Push API to create a feed based on the provided parameters, such as name,
    type, category, vendor, description, and tags.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | string | Yes | Name of the feed. |

    | Type | string | Yes | Feed Type. |

    | Category | string | No | Feed Category. |

    | Vendor | string | No | Vendor. |

    | Feed Description | string | No | URL for the screenshot. |

    | Tags | string | No | Tags that should be attached with the feed. |


    ### Additional Notes

    This action does not perform any operations on entities. It is a configuration/management
    action that interacts with the Silent Push API.


    ### Flow Description

    1. Extract the integration configuration (Server URL, API Key).

    2. Extract the action parameters (Name, Type, Category, Vendor, Feed Description,
    Tags).

    3. Initialize the `SilentPushManager` with the extracted configuration.

    4. Call the `add_feed` method, which sends a POST request to the Silent Push API
    to create the new feed.

    5. Handle the API response, log the outcome, and end the action with the appropriate
    status.
