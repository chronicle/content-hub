List Domain Infratags:
  ai_description: >-
    ### General Description

    Retrieves infrastructure tags (infratags) for multiple domains using the Silent
    Push API. This action allows analysts to identify the underlying infrastructure,
    hosting providers, and technology stacks associated with a list of domains. It
    supports both live data and historical passive DNS (padns) data, with an optional
    clustering feature to group related infrastructure components.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | String | Yes | A comma-separated list of domains to retrieve infrastructure
    tags for. |

    | Mode | String | No | The lookup mode to use. Options are "live" (default) or
    "padns". |

    | Match | String | No | Specifies how to handle self-hosted infrastructure. Defaults
    to "self". |

    | As Of | String | No | A timestamp used to retrieve infratags from historical
    padns data (between first_seen and last_seen). |

    | Cluster | Boolean | No | If set to true, the action will return clustered results
    for the infrastructure tags. |

    | Origin UID | String | No | A unique identifier for the request origin. |

    | Use Get | Boolean | No | A legacy parameter; the underlying logic currently
    utilizes POST requests for bulk processing. |


    ### Additional Notes

    - This action performs a bulk lookup. Even if multiple domains are provided in
    the `Domain` parameter, they are processed in a single API call.

    - Although the script iterates through `target_entities` at the end of the execution,
    it does so only for logging purposes; the actual lookup is driven entirely by
    the `Domain` input parameter.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Parsing:** Extracts the list of domains from the input string and
    captures optional settings like Mode, Match, and Clustering.

    3. **API Interaction:** Calls the Silent Push `explore/bulk/domain/infratags`
    endpoint using a POST request containing the domain list and configuration flags.

    4. **Response Validation:** Verifies that the API response matches the requested
    lookup mode.

    5. **Data Processing:** Extracts infratags and, if requested, formats the tag
    clusters into a readable structure.

    6. **Result Reporting:** Adds the retrieved data to the action's JSON results
    and provides a summary message to the case wall.
