  ai_description: >-
    Searches for domains using the Silent Push API based on various optional filters
    such as domain name, regex, name server, ASN, and risk score.


    ### Parameters Description

    * **Domain**: (String, Optional) Name or wildcard pattern of domain names to search
    for.

    * **Domain Regex**: (String, Optional) A valid RE2 regex pattern to match domains.
    Overrides the domain argument.

    * **Name Server**: (String, Optional) Name server name or wildcard pattern of
    the name server used by domains.

    * **Asnum**: (String, Optional) Autonomous System (AS) number to filter domains.

    * **Asname**: (String, Optional) Search for all AS numbers where the AS Name begins
    with the specified value.

    * **Min IP Diversity**: (String, Optional) Minimum IP diversity limit to filter
    domains.

    * **Registrar**: (String, Optional) Name or partial name of the registrar used
    to register domains.

    * **Min ASN Diversity**: (String, Optional) Minimum ASN diversity limit to filter
    domains.

    * **Certificate Issuer**: (String, Optional) Filter domains that had SSL certificates
    issued by the specified certificate issuer. Wildcards supported.

    * **Whois Date After**: (String, Optional) Filter domains with a WHOIS creation
    date after this date (YYYY-MM-DD).

    * **Skip**: (String, Optional) Number of results to skip in the search query.

    * **Limit**: (String, Optional) Number of results to return. Defaults to the SilentPush
    API's behavior.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Connects to the Silent Push API.

    3. Executes a search query for domains using the provided filters.

    4. Returns the matching domain records as a JSON result.
