Get Domain Certificates:
  ai_description: "### General Description\nThe **Get Domain Certificates** action\
    \ retrieves SSL/TLS certificate information for a specified domain using the Silent\
    \ Push platform. This action is designed to gather certificate data collected\
    \ from domain scanning, providing visibility into the security infrastructure\
    \ of a target domain.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **Domain** | String | Yes\
    \ | The specific domain to query for certificate data. Defaults to 'silentpush.com'.\
    \ |\n| **Domain Regex** | String | No | A regular expression used to filter the\
    \ domains in the results. |\n| **Certificate Issuer** | String | No | Filters\
    \ the results to only include certificates issued by a specific authority. |\n\
    | **Date Min** | String | No | Filters for certificates issued on or after this\
    \ date. |\n| **Date Max** | String | No | Filters for certificates issued on or\
    \ before this date. |\n| **Prefer** | String | No | Specifies whether to wait\
    \ for results (synchronous) or return a `job_id` immediately (asynchronous). |\n\
    | **Max Wait** | String | No | The number of seconds (0 to 25) to wait for results\
    \ before returning a `job_id`. |\n| **With Metadata** | String | No | If set to\
    \ true, includes a metadata object in the response containing total results and\
    \ job IDs. |\n| **Skip** | String | No | The number of results to skip for pagination\
    \ purposes. |\n| **Limit** | String | No | The maximum number of results to return\
    \ in the response. |\n\n### Additional Notes\n- This action is parameter-driven\
    \ and uses the 'Domain' input as the primary identifier for the query rather than\
    \ automatically iterating over entities in the alert scope.\n- If the query is\
    \ long-running and exceeds the `Max Wait` time, the action will return a `job_id`\
    \ which can be tracked using a separate status-checking action.\n\n### Flow Description\n\
    1. **Initialization**: Extracts the Silent Push server URL and API key from the\
    \ integration configuration.\n2. **Parameter Extraction**: Retrieves the target\
    \ domain and all optional filtering/pagination parameters from the action input.\n\
    3. **API Request**: Sends a GET request to the Silent Push `explore/domain/certificates`\
    \ endpoint with the specified domain and filters.\n4. **Response Processing**:\
    \ \n    - If the response indicates a background job is running, it returns the\
    \ job details.\n    - If certificate data is returned immediately, it parses the\
    \ list of certificates and associated metadata.\n5. **Completion**: Returns the\
    \ retrieved certificate data to the Google SecOps platform and sets the execution\
    \ status to completed or failed based on the API response."
