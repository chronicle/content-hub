  ai_description: >-
    ### General Description

    The **Add Feed** action allows users to create a new feed within the Silent Push
    platform. This is a management action used to define new sources or categories
    of threat intelligence data by providing metadata such as name, type, and tags.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Name** | string | Yes | The unique name for the new feed. |

    | **Type** | string | Yes | The classification type of the feed (e.g., 'domain',
    'ip'). |

    | **Category** | string | No | The category the feed belongs to. |

    | **Vendor** | string | No | The provider or vendor of the feed data. |

    | **Feed Description** | string | No | A detailed description of the feed's purpose
    or content. |

    | **Tags** | string | No | A comma-separated list of tags to associate with the
    feed. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Silent Push server URL and
    API key from the integration configuration, along with the feed details from the
    action parameters.

    2. **Manager Initialization:** Initializes the `SilentPushManager` to handle API
    communication.

    3. **API Request:** Executes a POST request to the Silent Push `/api/v1/feeds/`
    endpoint with the provided feed metadata.

    4. **Result Handling:** Processes the API response. If successful, it returns
    the feed details; otherwise, it reports a failure.


    ### Additional Notes

    - The `Tags` parameter should be provided as a comma-separated string (e.g., 'malware,phishing').

    - This action does not interact with or modify SecOps entities directly, although
    it may log entity identifiers present in the context for debugging purposes.
