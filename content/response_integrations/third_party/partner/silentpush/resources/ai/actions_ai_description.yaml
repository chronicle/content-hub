  ai_description: >-
    Performs a forward Passive DNS (PADNS) lookup using the Silent Push API to retrieve
    DNS record information. This action is useful for gathering threat intelligence
    and infrastructure context regarding specific DNS records.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction**: It extracts the required `Qname` (DNS record name)
    and optional filtering parameters (e.g., `Qtype`, `Netmask`, `Regex`, `Limit`)
    from the action settings.

    3. **API Request**: The action calls the Silent Push API to perform a forward
    PADNS lookup using the provided parameters.

    4. **Response Handling**: It validates the API response. If records are found,
    it returns the data; otherwise, it logs an error and fails the execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Qname | string | Yes | The DNS record name to lookup. |

    | Qtype | string | No | DNS record type (e.g., ns, a, mx). Defaults to 'ns'. |

    | Netmask | string | No | The netmask to filter the lookup results. |

    | Subdomains | string | No | Flag to include subdomains in the lookup results.
    |

    | Regex | string | No | Regular expression to filter the DNS records. |

    | Match | string | No | Type of match for the query (e.g., exact, partial). |

    | First Seen After | string | No | Filter results to include only records first
    seen after this date. |

    | First Seen Before | string | No | Filter results to include only records first
    seen before this date. |

    | Last Seen After | string | No | Filter results to include only records last
    seen after this date. |

    | Last Seen Before | string | No | Filter results to include only records last
    seen before this date. |

    | As Of | string | No | Date or time to get the DNS records as of a specific point
    in time. |

    | Sort | string | No | Sort the results by the specified field (e.g., date, score).
    |

    | Output Format | string | No | The format in which the results should be returned
    (e.g., JSON, XML). |

    | Prefer | string | No | Preference for specific DNS servers or sources. |

    | With Metadata | string | No | Flag to include metadata in the DNS records. |

    | Max Wait | string | No | Maximum number of seconds to wait for results before
    timing out. |

    | Skip | string | No | Number of results to skip for pagination purposes. |

    | Limit | string | No | Maximum number of results to return. |
