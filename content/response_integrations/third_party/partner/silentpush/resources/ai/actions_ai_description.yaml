List Domain Infratags:
  ai_description: >-
    Retrieves infrastructure tags (infratags) for one or more domains using the Silent
    Push platform. This action allows analysts to identify the underlying infrastructure,
    hosting providers, and technology stacks associated with specific domains. It
    supports bulk lookups and optional clustering of results to identify related infrastructure
    patterns.


    ### Flow Description

    1. **Input Parsing:** Extracts a comma-separated list of domains from the 'Domain'
    parameter and other optional configuration settings like 'Mode' and 'Cluster'.

    2. **API Interaction:** Sends a POST request to the Silent Push 'explore/bulk/domain/infratags'
    endpoint with the specified domains and filtering criteria.

    3. **Data Processing:** Receives infrastructure tags and, if requested, tag clusters
    from the external service.

    4. **Result Output:** Formats the retrieved infratags and clusters into a JSON
    result for use in subsequent playbook steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | Yes | A comma-separated list of domains to retrieve infrastructure
    tags for (e.g., 'example.com, test.org'). |

    | Mode | string | No | The lookup mode to use. Options are 'live' (current data)
    or 'padns' (historical passive DNS data). Defaults to 'live'. |

    | Cluster | boolean | No | If set to 'true', the action will return clustered
    infrastructure data, grouping related tags together. |

    | Match | string | No | Specifies how to handle self-hosted infrastructure. Defaults
    to 'self'. |

    | As Of | string | No | A timestamp used to build infratags from historical padns
    data (between first_seen and last_seen). |

    | Origin UID | string | No | A unique identifier for the origin of the request,
    used for tracking or specific API permissions. |

    | Use Get | boolean | No | Internal flag to determine request method, though the
    implementation primarily uses POST for bulk data. |


    ### Additional Notes

    - This action is primarily driven by the 'Domain' input parameter rather than
    the entities present in the SecOps case.

    - If 'Cluster' is enabled, the output will include a 'Domain Tag Clusters' section
    providing a higher-level view of the infrastructure relationships.
