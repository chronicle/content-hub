Get job status:
  ai_description: >-
    ### General Description

    The **Get job status** action is a utility task designed to track the progress
    or retrieve the final output of asynchronous jobs initiated within the Silent
    Push platform. It is primarily used to poll for results after launching long-running
    queries or scans, allowing the playbook to wait for data before proceeding to
    analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | string | Yes | The unique identifier of the job returned by previous
    Silent Push actions. |

    | Max Wait | string | No | The number of seconds (0-25) the action should wait
    for the job to complete before returning the current status. Defaults to 20 seconds
    if not specified. |

    | Status Only | boolean | No | If set to `true`, the action returns only the job's
    status (e.g., 'complete', 'running') even if the results are available. |

    | Force Metadata On | boolean | No | Ensures that query metadata is included in
    the response, regardless of the original request settings. |

    | Force Metadata Off | boolean | No | Ensures that query metadata is excluded
    from the response. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Job ID` and optional configuration
    flags (Max Wait, Status Only, Metadata toggles) from the input parameters.

    2. **API Request:** It performs a GET request to the Silent Push `explore/job/{job_id}`
    endpoint using the provided credentials and parameters.

    3. **Status Validation:** The action checks the API response to ensure a valid
    job status was found for the provided ID.

    4. **Result Delivery:** The raw JSON response, containing either the job's current
    status or the full result set, is returned to the Google SecOps platform.


    ### Additional Notes

    - This action does not process or enrich entities; it operates solely based on
    the `Job ID` provided.

    - The `Max Wait` parameter is capped at 25 seconds by the Silent Push API logic.
