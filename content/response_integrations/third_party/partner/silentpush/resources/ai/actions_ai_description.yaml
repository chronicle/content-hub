Add Feed:
  ai_description: >-
    ### General Description

    Adds a new feed to the Silent Push platform.


    ### Flow Description

    1. Extracts the action parameters: Name, Type, Category, Vendor, Feed Description,
    and Tags.

    2. Initializes the `SilentPushManager` with the integration configuration.

    3. Calls the `add_feed` method, which makes a POST request to the `/api/v1/feeds/`
    endpoint to create the new feed.

    4. Returns the result of the operation.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds a new feed to the Silent Push platform.
