  ai_description: >-
    ### General Description

    The **Get Future Attack Indicatiors** action retrieves threat intelligence indicators
    from the Silent Push platform based on a specific Feed UUID. This action is designed
    to gather proactive intelligence about potential future attacks by fetching ranked
    indicators associated with a designated threat feed. It is primarily used for
    threat hunting and situational awareness by providing a list of indicators that
    have been identified as part of emerging threat campaigns.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

