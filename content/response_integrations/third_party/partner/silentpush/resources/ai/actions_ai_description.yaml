Get Domain Certificates:
  ai_description: "### General Description\nThis action retrieves SSL certificate\
    \ data collected from domain scanning using the Silent Push platform. It allows\
    \ analysts to query a specific domain and receive a list of associated certificates,\
    \ including details about the issuer and validity dates. The action supports filtering\
    \ by regular expressions, specific issuers, and date ranges, and can handle both\
    \ immediate results and long-running asynchronous jobs.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Domain | string | Yes | The specific domain to query for certificate data (e.g.,\
    \ silentpush.com). |\n| Domain Regex | string | No | A regular expression to filter\
    \ the returned domains within the certificate data. |\n| Certificate Issuer |\
    \ string | No | Filter the results to only include certificates issued by a specific\
    \ authority. |\n| Date Min | string | No | Filter for certificates issued on or\
    \ after this date (YYYY-MM-DD). |\n| Date Max | string | No | Filter for certificates\
    \ issued on or before this date (YYYY-MM-DD). |\n| Prefer | string | No | Determines\
    \ whether to wait for results for longer-running queries or return a `job_id`\
    \ immediately. |\n| Max Wait | string | No | The number of seconds (0-25) to wait\
    \ for results before the API returns a `job_id`. |\n| With Metadata | string |\
    \ No | If set to true, includes a metadata object in the response containing result\
    \ counts and job IDs. |\n| Skip | string | No | The number of results to skip\
    \ for pagination purposes. |\n| Limit | string | No | The maximum number of certificate\
    \ results to return. |\n\n### Additional Notes\n- This action does not automatically\
    \ process entities from the Google SecOps context; it relies on the manually provided\
    \ `Domain` parameter.\n- If the query takes longer than the `Max Wait` time, the\
    \ action will return job details which can be used with a 'Get Job Status' action.\n\
    \n### Flow Description\n1. **Configuration Extraction:** The action retrieves\
    \ the Silent Push server URL and API key from the integration settings.\n2. **Parameter\
    \ Parsing:** It extracts the target domain and all optional filters (regex, issuer,\
    \ dates, pagination) from the action input.\n3. **API Request:** The action sends\
    \ a GET request to the Silent Push `explore/domain/certificates/{domain}` endpoint\
    \ with the specified filters.\n4. **Response Handling:** \n    - If the API returns\
    \ a `job_status`, the action completes and provides the job details for asynchronous\
    \ tracking.\n    - If certificates are returned immediately, the action parses\
    \ the list and associated metadata.\n5. **Completion:** The action outputs the\
    \ certificate data to the action message and sets the execution status to completed."
