Forward Padns Lookup:
  ai_description: >-
    ### General Description

    The **Forward Padns Lookup** action performs a forward Passive DNS (PADNS) lookup
    using the Silent Push threat intelligence platform. It allows analysts to retrieve
    historical DNS records for a specific domain name, providing visibility into infrastructure
    changes, historical IP associations, and DNS configurations over time.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qname** | String | Yes | The DNS record name (domain) to lookup. |

    | **Qtype** | String | No | The DNS record type to query (e.g., 'ns', 'a', 'mx',
    'txt'). Defaults to 'ns'. |

    | **Netmask** | String | No | Filter results by a specific netmask. |

    | **subdomain** | String | No | Flag to include subdomains in the lookup results.
    |

    | **Regex** | String | No | A regular expression to filter the DNS records. |

    | **Match** | String | No | The type of match for the query (e.g., exact, partial).
    |

    | **First Seen After** | String | No | Filter records first seen after this date.
    |

    | **First Seen Before** | String | No | Filter records first seen before this
    date. |

    | **Last Seen After** | String | No | Filter records last seen after this date.
    |

    | **Last Seen Before** | String | No | Filter records last seen before this date.
    |

    | **As Of** | String | No | Retrieve DNS records as they appeared at a specific
    point in time. |

    | **Sort** | String | No | Field to sort the results by. |

    | **Output Format** | String | No | The desired format for the returned results.
    |

    | **Prefer** | String | No | Preference for specific DNS servers or sources. |

    | **With Metadata** | String | No | Whether to include metadata in the records.
    |

    | **Max Wait** | String | No | Maximum seconds to wait for the API response. |

    | **Skip** | String | No | Number of results to skip for pagination. |

    | **Limit** | String | No | Maximum number of results to return. |


    ### Additional Notes

    - This action is parameter-driven and does not automatically iterate over entities
    in the current scope. The domain to be queried must be explicitly provided via
    the **Qname** parameter.

    - The action logic extracts the **Subdomains** parameter from the UI, which corresponds
    to the **subdomain** field in the configuration.


    ### Flow Description

    1. **Initialization**: The action extracts the Silent Push server URL and API
    key from the integration configuration.

    2. **Parameter Extraction**: It retrieves the mandatory **Qname** and various
    optional filtering parameters (like **Qtype**, **Netmask**, and time filters)
    from the action input.

    3. **API Request**: It initiates a GET request to the Silent Push PADNS lookup
    endpoint (`explore/padns/lookup/query`) using the provided criteria.

    4. **Response Handling**: The action parses the JSON response, checking for API-level
    errors or empty record sets. If no records are found, the action is marked as
    failed.

    5. **Completion**: If records are retrieved, the action completes successfully,
    returning a summary of the found DNS records in the output message.
