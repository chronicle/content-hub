    values (e.g., ensuring the OS is one of the supported types like Windows or Linux).

    4. **API Interaction:** Sends a GET request to the Silent Push `scanondemand`
    endpoint with the specified URL and profile settings.

    5. **Data Processing:** Parses the API response to extract the `scan` metadata.

    6. **Output Generation:** Formats the scan results into a JSON object and completes
    the action, providing a summary message of the scan outcome.
