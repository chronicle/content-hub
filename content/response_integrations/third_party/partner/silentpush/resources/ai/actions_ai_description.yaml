Screenshot URL:
  ai_description: >-
    ### General Description

    The **Screenshot URL** action generates a visual capture of a specified URL using
    the Silent Push platform. This tool enables security teams to safely preview the
    content of potentially malicious or suspicious websites without direct interaction,
    providing a safe way to perform visual inspections during investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The target URL to be screenshotted. Must include the protocol
    (e.g., https://). |


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction:** The target URL is retrieved from the action's input
    parameters.

    3. **Screenshot Generation:** The action calls the Silent Push API's `scanondemand`
    endpoint to initiate a screenshot capture of the provided URL.

    4. **URL Parsing:** The action extracts the resulting screenshot image URL from
    the API response and validates its format.

    5. **Image Verification:** An HTTP GET request is performed against the screenshot
    URL to verify that the image was successfully created and is accessible.

    6. **Result Reporting:** The action outputs the original URL and the generated
    screenshot URL as a JSON result for use in the SOAR platform.


    ### Additional Notes

    - This action does not interact with or modify any entities within the Google
    SecOps case; it operates solely on the provided URL parameter.

    - The generated screenshot is hosted externally by Silent Push at the returned
    URL.
