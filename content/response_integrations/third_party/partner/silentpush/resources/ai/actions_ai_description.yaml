search domains:
  ai_description: >-
    ### General Description

    The **search domains** action allows users to query the Silent Push platform for
    domains matching specific criteria. It is a flexible search tool that supports
    wildcards, regex patterns, and various infrastructure filters such as Name Servers,
    ASNs, and Registrars. This action is primarily used for threat hunting and infrastructure
    analysis by identifying domains associated with specific network attributes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | No | Name or wildcard pattern of domain names to search for.
    |

    | Domain Regex | string | No | A valid RE2 regex pattern to match domains. If
    provided, this overrides the 'Domain' argument. |

    | Name Server | string | No | Name server name or wildcard pattern of the name
    server used by domains. |

    | Asnum | string | No | Autonomous System (AS) number to filter domains. |

    | Asname | string | No | Search for all AS numbers where the AS Name begins with
    the specified value. |

    | Min IP Diversity | string | No | Minimum IP diversity limit to filter domains.
    |

    | Registrar | string | No | Name or partial name of the registrar used to register
    domains. |

    | Min ASN Diversity | string | No | Minimum ASN diversity limit to filter domains.
    |

    | Certificate Issuer | string | No | Filter domains that had SSL certificates
    issued by the specified certificate issuer. Wildcards are supported. |

    | Whois Date After | string | No | Filter domains with a WHOIS creation date after
    this date (format: YYYY-MM-DD). |

    | Skip | string | No | Number of results to skip in the search query for pagination.
    |

    | Limit | string | No | Number of results to return. Defaults to the SilentPush
    API's default behavior. |


    ### Additional Notes

    - The action returns a JSON result containing the list of matching domain records
    found in the Silent Push database.

    - Although the underlying Python code attempts to extract parameters like `Start
    Date`, `End Date`, `Risk Score Min`, and `Risk Score Max`, these are not currently
    defined in the action's metadata and may not be available in the UI unless the
    integration is customized.

    - This action does not automatically process or enrich entities currently present
    in the Google SecOps case; it functions as a standalone search utility.


    ### Flow Description

    1. **Initialization**: The action initializes the Silent Push manager using the
    server URL and API key provided in the integration configuration.

    2. **Parameter Extraction**: It retrieves the search filters and pagination settings
    (Skip/Limit) from the action parameters.

    3. **API Request**: The action executes a GET request to the Silent Push `explore/domain/search`
    endpoint, passing all provided filters as query parameters.

    4. **Data Processing**: It parses the API response to extract domain records.
    If no records are found, it prepares a message indicating no results were returned.

    5. **Completion**: The action returns the raw JSON records to the SecOps platform
    and completes the execution successfully.
