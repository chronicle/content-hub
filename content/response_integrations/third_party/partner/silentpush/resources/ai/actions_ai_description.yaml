  ai_description: >-
    Searches Silent Push scan data repositories using SPQL (Silent Push Query Language)
    queries. This action allows analysts to perform complex searches across raw scan
    data to identify infrastructure patterns, historical changes, or specific attributes
    associated with malicious activity. The action returns raw scan data records based
    on the provided query and filtering parameters.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | True | The SPQL query string used to search the scan data (e.g.,
    'tld=cool'). |

    | Fields | string | False | A comma-separated list of specific fields to return
    in the response. |

    | sort | string | False | Criteria used to sort the results. |

    | Skip | string | False | The number of records to skip in the response (useful
    for pagination). |

    | Limit | string | False | The maximum number of results to return. |

    | With Metadata | boolean | False | Whether to include metadata in the response.
    Defaults to true. |


    ### Flow Description


    1.  **Configuration Extraction:** Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2.  **Parameter Parsing:** Extracts the SPQL query and optional filtering parameters
    (Fields, Limit, Skip, Sort, Metadata) from the action input.

    3.  **API Interaction:** Initializes the Silent Push Manager and executes a POST
    request to the `explore/scandata/search/raw` endpoint.

    4.  **Data Processing:** Parses the JSON response to extract the `scandata_raw`
    records.

    5.  **Result Handling:** If records are found, it returns them as a JSON result
    and completes the action. If no records are found or an error occurs, the action
    is marked as failed.
