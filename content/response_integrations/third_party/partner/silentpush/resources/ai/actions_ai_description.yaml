    | Asname | string | No | Search for all AS numbers where the AS Name begins with
    the specified value. |

    | Min IP Diversity | string | No | Minimum IP diversity limit to filter domains.
    |

    | Registrar | string | No | Name or partial name of the registrar used to register
    domains. |

    | Min ASN Diversity | string | No | Minimum ASN diversity limit to filter domains.
    |

    | Certificate Issuer | string | No | Filter domains that had SSL certificates
    issued by the specified certificate issuer. |

    | Whois Date After | string | No | Filter domains with a WHOIS creation date after
    this date (YYYY-MM-DD). |

    | Skip | string | No | Number of results to skip in the search query. |

    | Limit | string | No | Number of results to return. |

    | Start Date | string | No | Start date for domain search (YYYY-MM-DD). |

    | End Date | string | No | End date for domain search (YYYY-MM-DD). |

    | Risk Score Min | string | No | Minimum risk score filter. |

    | Risk Score Max | string | No | Maximum risk score filter. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction**: It extracts all provided search filters from the
    action parameters.

    3. **Initialization**: The `SilentPushManager` is initialized with the retrieved
    credentials.

    4. **Execution**: The action calls the `search_domains` method of the manager,
    passing all filters to the Silent Push API.

    5. **Result Processing**: The action processes the API response. If records are
    found, they are returned in the output message; otherwise, a 'No domains found'
    message is returned.
