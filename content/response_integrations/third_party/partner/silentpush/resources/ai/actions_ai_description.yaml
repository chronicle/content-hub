Get Subnet Reputation:
  ai_description: >-
    Retrieves the reputation history for a specific IPv4 subnet using the Silent Push
    API. This action allows analysts to understand the historical threat context of
    a network range by fetching reputation scores and optional detailed explanations
    for those scores. The results are returned as a JSON object containing the history
    entries.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction:** It extracts the target 'Subnet' and optional 'Explain'
    and 'Limit' parameters from the action input.

    3. **API Interaction:** A GET request is sent to the Silent Push 'explore/ipreputation/history/subnet'
    endpoint for the specified subnet.

    4. **Data Parsing:** The action parses the 'subnet_reputation_history' from the
    API response.

    5. **Completion:** The retrieved history is returned as the action result, or
    the action fails if no history is found.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subnet | string | Yes | The IPv4 subnet (e.g., 192.168.0.0/16) for which reputation
    information needs to be retrieved. |

    | Explain | string | No | If provided, the API returns detailed information used
    to calculate the reputation score. |

    | Limit | string | No | Maximum number of reputation history entries to retrieve
    from the service. |


    ### Additional Notes

    - This action does not automatically process entities from the SecOps case; it
    relies on the manually provided 'Subnet' parameter.

    - If the API returns no reputation history for the provided subnet, the action
    will result in a failure state.
