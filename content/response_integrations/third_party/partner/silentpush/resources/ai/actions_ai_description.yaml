List Domain Information:
  ai_description: >-
    Retrieves detailed information for multiple domains from Silent Push, including
    infrastructure data, risk scores, and WHOIS records. This action allows for bulk
    querying of domains provided as a comma-separated list. Users can optionally include
    Silent Push risk scores (with explanations) and live WHOIS information to gain
    deeper context on the reputation and ownership of the specified domains.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domains | string | Yes | Comma-separated list of domains to query (e.g., "example.com,test.org").
    |

    | Fetch Risk Score | boolean | No | If set to true, the action retrieves Silent
    Push risk scores and detailed explanations for each domain. Defaults to false.
    |

    | Fetch Whois Info | boolean | No | If set to true, the action retrieves live
    WHOIS information for each domain. Defaults to false. |


    ### Flow Description


    1. **Configuration Extraction**: Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Input Parsing**: Extracts the 'Domains' parameter and splits the comma-separated
    string into a list of individual domains.

    3. **Bulk Domain Lookup**: Calls the Silent Push API to fetch general infrastructure
    and metadata for the provided domains.

    4. **Risk Assessment (Optional)**: If 'Fetch Risk Score' is enabled, the action
    makes a secondary request to retrieve risk scores and their corresponding explanations.

    5. **WHOIS Retrieval (Optional)**: If 'Fetch Whois Info' is enabled, the action
    performs individual WHOIS lookups for each domain in the list.

    6. **Data Aggregation**: Consolidates the retrieved information into a unified
    data structure.

    7. **Output Generation**: Formats the results into a Markdown summary for the
    case wall and a detailed JSON object for use in subsequent playbook steps.
