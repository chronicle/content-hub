  ai_description: >-
    ### General Description

    This action performs a forward Passive DNS (PADNS) lookup using the Silent Push
    API. It retrieves DNS records associated with a specific DNS name and record type,
    allowing for extensive filtering based on dates, regex, and other criteria.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | --- | --- | --- | --- | --- |

    | Qtype | string | False | ns | DNS record type. |

    | Qname | string | True | silentpush.com | The DNS record name to lookup. |

    | Netmask | string | False | "" | The netmask to filter the lookup results. |

    | subdomain | string | False | "" | Flag to include subdomains in the lookup results.
    |

    | Regex | string | False | "" | Regular expression to filter the DNS records.
    |

    | Match | string | False | "" | Type of match for the query (e.g., exact, partial).
    |

    | First Seen After | string | False | "" | Filter results to include only records
    first seen after this date. |

    | First Seen Before | string | False | "" | Filter results to include only records
    first seen before this date. |

    | Last Seen After | string | False | "" | Filter results to include only records
    last seen after this date. |

    | Last Seen Before | string | False | "" | Filter results to include only records
    last seen before this date. |

    | As Of | string | False | "" | Date or time to get the DNS records as of a specific
    point in time. |

    | Sort | string | False | "" | Sort the results by the specified field (e.g.,
    date, score). |

    | Output Format | string | False | "" | The format in which the results should
    be returned (e.g., JSON, XML). |

    | Prefer | string | False | "" | Preference for specific DNS servers or sources.
    |

    | With Metadata | string | False | "" | Flag to include metadata in the DNS records.
    |

    | Max Wait | string | False | "" | Maximum number of seconds to wait for results
    before timing out. |

    | Skip | string | False | "" | Number of results to skip for pagination purposes.
    |

    | Limit | string | False | "" | Maximum number of results to return. |


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Initializes the `SilentPushManager` with the provided API credentials.

    3. Calls the `forward_padns_lookup` method, passing the `Qname`, `Qtype`, and
    any optional filtering parameters.

    4. Checks the API response for errors and extracts the returned DNS records.

    5. Returns the records as the action's output message and marks the execution
    as completed.
