Density Lookup:
  ai_description: >-
    Queries granular DNS and IP parameters from Silent Push to retrieve density information.
    This action allows analysts to look up specific infrastructure components such
    as Name Servers (NS), Mail Servers (MX), IP addresses, and ASNs to understand
    their prevalence and associations within the Silent Push dataset.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the query type (`Qtype`), the
    query value (`Query`), and the optional `Scope` from the input parameters.

    2. **API Interaction:** It initializes the Silent Push manager and performs a
    GET request to the density lookup endpoint using the provided parameters.

    3. **Data Validation:** The action checks the response for density records. If
    no records are found, the action fails with an informative message.

    4. **Result Processing:** If records are found, they are returned as a JSON result
    for use in subsequent playbook steps.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Qtype | String | Yes | The type of density lookup to perform. Supported values
    include `nssrv`, `mxsrv`, `nshash`, `mxhash`, `ipv4`, `ipv6`, `asn`, and `chv`.
    |

    | Query | String | Yes | The specific value (e.g., domain, IP, or ASN) to query
    for density information. |

    | Scope | String | No | The match level or scope to apply to the query results.
    |


    ### Additional Notes:

    - This action does not automatically process entities from the SecOps case; it
    relies entirely on the provided `Query` parameter.

    - The results are provided in the `JsonResult` output.
