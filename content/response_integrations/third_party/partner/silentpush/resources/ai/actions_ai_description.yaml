  ai_description: >-
    Searches for domains within the Silent Push platform using a variety of optional
    filters such as domain names, regex patterns, name servers, and ASN details. This
    action is primarily used for threat hunting and gathering a list of domains that
    match specific infrastructure or registration characteristics. It retrieves a
    list of records containing domain metadata from the Silent Push 'explore' API.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the Silent Push server URL, API key, and
    all search filters provided by the user (e.g., Domain, Regex, ASN, Registrar).

    2. **Manager Initialization:** Initializes the `SilentPushManager` to handle API
    communication using the provided credentials.

    3. **API Request:** Sends a GET request to the `explore/domain/search` endpoint
    with the specified query parameters and filters.

    4. **Result Processing:** Parses the JSON response to extract domain records.
    If records are found, they are returned as a JSON result; otherwise, a 'no domains
    found' message is generated.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | No | Name or wildcard pattern of domain names to search for.
    |

    | Domain Regex | string | No | A valid RE2 regex pattern to match domains. Overrides
    the 'Domain' argument. |

    | Name Server | string | No | Name server name or wildcard pattern of the name
    server used by domains. |

    | Asnum | string | No | Autonomous System (AS) number to filter domains. |

    | Asname | string | No | Search for all AS numbers where the AS Name begins with
    the specified value. |

    | Min IP Diversity | string | No | Minimum IP diversity limit to filter domains.
    |

    | Registrar | string | No | Name or partial name of the registrar used to register
    domains. |

    | Min ASN Diversity | string | No | Minimum ASN diversity limit to filter domains.
    |

    | Certificate Issuer | string | No | Filter domains that had SSL certificates
    issued by the specified certificate issuer. Wildcards supported. |

    | Whois Date After | string | No | Filter domains with a WHOIS creation date after
    this date (YYYY-MM-DD). |

    | Skip | string | No | Number of results to skip in the search query for pagination.
    |

    | Limit | string | No | Number of results to return. Defaults to the SilentPush
    API's behavior. |


    ### Additional Notes:

    - The action logic also supports 'Start Date', 'End Date', and 'Risk Score' range
    parameters if they are passed through the integration, though they may not be
    visible in all UI configurations.

    - This action does not automatically update entities or create insights in the
    SecOps case; it returns the raw search results for use in subsequent playbook
    steps.
