Run Threat check:
  ai_description: >-
    ### General Description

    The **Run Threat check** action allows users to query the Silent Push API to perform
    a threat analysis on a specific indicator, such as an IP address or a domain.
    This action is designed to retrieve reputation data and threat intelligence from
    specified data sources within the Silent Push platform, helping security analysts
    determine the risk level of a given asset.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Data** | String | Yes | The name of the data source to query (e.g., 'iofa').
    |

    | **Query** | String | Yes | The specific value to check for threats, such as
    an IP address or domain name. |

    | **Type** | String | Yes | The type of the value being queried (e.g., 'ip', 'domain').
    |

    | **User Identifier** | String | Yes | A unique identifier for the user making
    the request, used for tracking and auditing purposes. |


    ### Additional Notes

    - This action is parameter-driven and does not automatically process entities
    from the SOAR scope unless their values are explicitly passed into the **Query**
    parameter.

    - The action requires a valid API Key and Server URL to be configured in the Silent
    Push integration settings.

    - Although the code attempts to extract 'Feed UUID' and 'ASN', these are not defined
    as input parameters in the current configuration and will default to null.


    ### Flow Description

    1. **Initialization:** The action extracts the integration configuration (Server
    URL and API Key) and the user-provided action parameters.

    2. **API Request:** It initializes the Silent Push manager and sends a GET request
    to the threat check endpoint (`https://api.threatcheck.silentpush.com/v1/`) using
    the provided query, type, and data source.

    3. **Response Handling:** The action receives the threat intelligence data from
    Silent Push. If no data is found or an error occurs, it logs the failure and terminates
    the action.

    4. **Completion:** Upon a successful query, the action returns the threat check
    results as a JSON object and provides a summary message to the SOAR platform.
