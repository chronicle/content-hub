    \ into the historical reputation of an ASN, which can be used to assess the risk\
    \ associated with network infrastructure. The action allows users to specify the\
    \ ASN, limit the number of history records retrieved, and optionally include an\
    \ explanation of how the reputation score was calculated.\n\n### Flow Description:\n\
    1. **Configuration Extraction:** The action retrieves the Silent Push Server URL\
    \ and API Key from the integration settings.\n2. **Parameter Processing:** It\
    \ extracts the mandatory 'ASN' parameter and optional 'Explain' and 'Limit' parameters.\
    \ The 'Explain' boolean is converted to a numeric flag (0 or 1) for the API request.\n\
    3. **API Interaction:** The action initializes the Silent Push Manager and calls\
    \ the `get_asn_takedown_reputation` method, which performs a GET request to the\
    \ `explore/takedownreputation/asn/{asn}` endpoint.\n4. **Data Validation:** It\
    \ checks if the response contains takedown reputation history. If no data is found,\
    \ the action fails with an error message.\n5. **Result Output:** If successful,\
    \ the reputation data is returned as a JSON result mapped to the ASN identifier.\n\
    \n### Parameters Description:\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| ASN | string | True | The Autonomous System Number\
    \ (ASN) to lookup (e.g., \"211298\"). |\n| Explain | boolean | False | If set\
    \ to true, the API returns the information used to calculate the reputation score.\
    \ Defaults to true. |\n| Limit | string | False | The maximum number of reputation\
    \ history records to retrieve from the service. |\n\n### Additional Notes:\n*\
    \ This action does not automatically iterate over entities in the case; it relies\
    \ on the 'ASN' parameter provided in the action configuration. \n* While the script\
    \ contains a loop that prints entity identifiers, it does not use them to perform\
    \ the lookup or update their properties."
