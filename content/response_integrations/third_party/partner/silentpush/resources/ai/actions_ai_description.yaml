  ai_description: >-
    ### General Description

    The **Reverse Padns Lookup** action performs a reverse Passive DNS (pDNS) query
    using the Silent Push platform. It allows security analysts to identify DNS records
    (such as NS or MX records) that point to a specific domain or record name. This
    capability is essential for infrastructure mapping, identifying shared infrastructure
    between malicious actors, and uncovering related assets during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Qname** | String | Yes | The DNS record name to lookup (e.g., a nameserver
    like `ns1.example.com` or a mail server). |

    | **Qtype** | String | No | The DNS record type to filter the results by (e.g.,
    `ns`, `mx`). Defaults to `ns`. |

    | **Netmask** | String | No | A network mask to filter the lookup results. |

    | **subdomain** | String | No | A flag to include subdomains in the lookup results.
    |

    | **Regex** | String | No | A regular expression used to filter the returned DNS
    records. |

    | **Match** | String | No | The type of match for the query (e.g., `exact`, `partial`).
    |

    | **First Seen After** | String | No | Filter results to include only records
    first observed after this date. |

    | **First Seen Before** | String | No | Filter results to include only records
    first observed before this date. |

    | **Last Seen After** | String | No | Filter results to include only records last
    observed after this date. |

    | **Last Seen Before** | String | No | Filter results to include only records
    last observed before this date. |

    | **As Of** | String | No | Retrieve DNS records as they appeared at a specific
    point in time. |

    | **Sort** | String | No | Sort the results by a specified field (e.g., `date`,
    `score`). |

    | **Output Format** | String | No | The format in which results should be returned
    (e.g., `JSON`, `XML`). |

    | **Prefer** | String | No | Preference for specific DNS servers or sources. |

    | **With Metadata** | String | No | Flag to include additional metadata in the
    DNS records. |

    | **Max Wait** | String | No | Maximum number of seconds to wait for results before
    timing out. |

    | **Skip** | String | No | Number of results to skip for pagination purposes.
    |

    | **Limit** | String | No | Maximum number of results to return. |


    ### Flow Description

    1. **Initialization**: The action initializes the Silent Push manager using the
    provided Server URL and API Key from the integration configuration.

    2. **Parameter Extraction**: It extracts the mandatory `Qname` and all optional
    filtering/pagination parameters from the action input.

    3. **API Request**: The action sends a GET request to the Silent Push `explore/padns/lookup/answer`
    endpoint, passing the `Qtype`, `Qname`, and all provided filters.

    4. **Response Validation**: It checks the API response for errors. If the API
    returns an error or no records are found, the action logs the failure and terminates.

    5. **Output**: If records are found, they are formatted into an output message
    and the action completes successfully.


    ### Additional Notes

    - This is a **Global Action** and does not automatically iterate over entities
    in the SecOps case. It relies entirely on the `Qname` parameter provided in the
    input.

    - There is a minor discrepancy between the YAML parameter name (`subdomain`) and
    the Python script's extraction logic (`Subdomains`); ensure the parameter is correctly
    mapped in the environment.
