Get ASNs for Domain:
  ai_description: >-
    ### General Description

    This action retrieves Autonomous System Numbers (ASNs) associated with a specific
    domain using the Silent Push platform. It is designed to identify the network
    infrastructure that has hosted the domain and its subdomains within the last 30
    days, providing critical context for network-based threat intelligence and investigations.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | Yes | The domain name to search ASNs for. The action retrieves
    ASNs associated with 'A' records for the specified domain and its subdomains in
    the last 30 days. Default value is 'silentpush.com'. |


    ### Flow Description

    1. **Initialization**: The action connects to the Silent Push API using the configured
    Server URL and API Key.

    2. **Parameter Extraction**: It retrieves the target domain from the action input
    parameters.

    3. **API Request**: The action performs a GET request to the Silent Push `explore/padns/lookup/domain/asns/{domain}`
    endpoint.

    4. **Data Extraction**: It parses the JSON response to extract the list of ASN
    records associated with the domain.

    5. **Result Reporting**: If records are found, they are returned in the action's
    JSON result and displayed in the output message. If no records are found or an
    error occurs, the action reports a failure.


    ### Additional Notes

    This action is parameter-driven and does not automatically process entities from
    the case scope. To enrich specific domain entities, the entity identifier should
    be mapped to the 'Domain' parameter in a playbook.
