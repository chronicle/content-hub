Add Feed Tags:
  ai_description: >-
    ### General Description

    This action adds tags to a specific feed within the Silent Push platform. It allows
    users to organize and categorize threat intelligence feeds by appending metadata
    in the form of tags. This is a management action that modifies the state of feeds
    in the external Silent Push system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Feed UUID** | String | No | The unique identifier (UUID) of the feed in Silent
    Push that you want to update. |

    | **Tags** | String | No | A comma-separated list of tags to be added to the specified
    feed. |


    ### Additional Notes

    - While the parameters are marked as not mandatory in the configuration, the action
    logic requires a valid `Feed UUID` to identify the target feed and `Tags` to perform
    the update. If the API returns an error due to missing data, the action will fail.

    - The action iterates through target entities in the environment but does not
    use them for the tagging logic; it relies entirely on the provided action parameters.


    ### Flow Description

    1. **Initialization**: The action initializes the `SilentPushManager` using the
    provided Server URL and API Key from the integration configuration.

    2. **Parameter Extraction**: It retrieves the `Feed UUID` and the string of `Tags`
    from the action input.

    3. **API Interaction**: The action calls the `add_feed_tags` method in the manager,
    which sends a POST request to the Silent Push API endpoint: `/api/v1/feeds/{feed_uuid}/tags/`.

    4. **Processing**: The tags string is split into a list and sent as the JSON payload.

    5. **Completion**: If the API call is successful, the action completes with a
    success message containing the Feed UUID and the API response. If the API returns
    an error or no data is found, the action fails.
