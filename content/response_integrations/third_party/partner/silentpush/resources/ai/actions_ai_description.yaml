Add Feed:
  ai_description: >-
    ### General Description

    Adds a new feed to the Silent Push platform. This action allows users to programmatically
    define and create threat intelligence feeds by providing metadata such as name,
    type, category, and vendor. It is primarily used for organizing and managing custom
    intelligence sources within the Silent Push ecosystem.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Name** | String | Yes | The unique name for the new feed. |

    | **Type** | String | Yes | The classification or type of the feed. |

    | **Category** | String | No | The category the feed belongs to. |

    | **Vendor** | String | No | The vendor providing the feed data. |

    | **Feed Description** | String | No | A descriptive summary of the feed's content.
    |

    | **Tags** | String | No | A comma-separated list of tags to associate with the
    feed. |


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Parsing:** Collects the feed details (Name, Type, Category, etc.)
    from the action inputs.

    3. **API Interaction:** Initializes the Silent Push Manager and sends a POST request
    to the `/api/v1/feeds/` endpoint with the provided metadata.

    4. **Result Handling:** Processes the API response. If successful, it returns
    the feed details; otherwise, it reports an execution failure.


    ### Additional Notes

    - The **Tags** parameter should be provided as a comma-separated string (e.g.,
    "malware,phishing"), which the action automatically parses into a list for the
    API request.

    - While the metadata description for **Feed Description** mentions a "URL for
    the screenshot," the parameter logic treats it as a standard text description
    for the feed.
