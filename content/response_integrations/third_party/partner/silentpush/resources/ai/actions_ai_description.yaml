Add Indicators:
  ai_description: >-
    ### General Description

    This action adds a list of indicators to a specific feed within the Silent Push
    platform. It is primarily used for threat intelligence management, allowing users
    to programmatically update their custom feeds with new domains, IP addresses,
    or other indicator types. The action performs a state-changing operation on the
    external Silent Push system by submitting a POST request to the feed's indicators
    endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed UUID | string | No | The unique identifier (UUID) of the target feed in
    Silent Push. If not provided, the default value `f8f4b201-801c-4355-a5fa-33fd5abc84c9`
    is used. |

    | Indicators | string | No | A comma-separated string of indicators (e.g., "example.com,
    1.2.3.4") to be added to the feed. If not provided, the default value `qa.com`
    is used. |


    ### Additional Notes

    * This action does not automatically process entities from the Google SecOps case.
    Instead, it relies on the `Indicators` parameter. To add entities from a case,
    they must be mapped to the `Indicators` parameter in the playbook.

    * The script contains a reference to an `ASN` parameter in its error handling
    logic, but this parameter is not defined in the action configuration and cannot
    be supplied by the user.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Silent Push Server URL
    and API Key from the integration settings.

    2. **Parameter Retrieval**: It extracts the `Feed UUID` and the `Indicators` string
    from the action inputs.

    3. **Manager Initialization**: A `SilentPushManager` instance is created to handle
    communication with the Silent Push API.

    4. **Data Processing**: The comma-separated `Indicators` string is split into
    a list of individual indicator values.

    5. **External API Call**: The action sends a POST request to the Silent Push API
    endpoint (`/api/v1/feeds/{feed_uuid}/indicators/`) containing the list of indicators.

    6. **Result Handling**: The action captures the API response. If the request is
    successful, it returns the response data; otherwise, it logs an error and fails
    the action.
