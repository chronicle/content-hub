Add Indicators Tags:
  ai_description: >-
    ### General Description

    This action adds or updates tags for a specific indicator within a Silent Push
    feed. It allows users to organize and categorize threat indicators by associating
    them with descriptive tags in the Silent Push platform.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed UUID | string | Yes | The unique identifier (UUID) of the Silent Push feed
    containing the indicator. |

    | Indicator Name | string | Yes | The specific indicator (e.g., a domain name
    or IP address) that you want to tag. |

    | Tags | string | Yes | A string representing the tags to be added to the indicator.
    Multiple tags should be handled according to the Silent Push API requirements
    (typically comma-separated or as a single string). |


    ### Additional Notes

    - This action performs an external mutation by updating the state of indicators
    within the Silent Push platform using a `PUT` request.

    - Although the script references `target_entities`, it does not use them to drive
    the logic; the action is entirely dependent on the provided manual parameters.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Extraction**: Retrieves the `Feed UUID`, `Indicator Name`, and
    `Tags` from the action input.

    3. **Manager Initialization**: Initializes the `SilentPushManager` with the provided
    server URL and credentials.

    4. **API Execution**: Calls the `add_indicators_tags` method in the manager, which
    sends a `PUT` request to the Silent Push endpoint: `/api/v1/feeds/{feed_uuid}/indicators/{indicator_name}/update-tags/`.

    5. **Result Handling**: Evaluates the API response. If successful, it returns
    a completion status; otherwise, it logs an error and fails the action.
