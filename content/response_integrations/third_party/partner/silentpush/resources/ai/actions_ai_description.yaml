Run Threat check:
  ai_description: >-
    Runs a threat check against the Silent Push Threat Check API to evaluate the risk
    associated with a specific indicator, such as an IP address or a domain. This
    action queries a specified data source within Silent Push and returns threat intelligence
    data based on the provided query value.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Data | string | Yes | The name of the Silent Push data source to query (e.g.,
    'iofa'). |

    | Query | string | Yes | The specific value to check for threats, such as an IP
    address or a domain name. |

    | Type | string | Yes | The category of the query value (e.g., 'ip', 'domain').
    |

    | User Identifier | string | Yes | A unique identifier for the user or system
    making the request, used for tracking and attribution. |


    ### Flow Description


    1. **Configuration Extraction:** The action retrieves the Silent Push Server URL
    and API Key from the integration configuration.

    2. **Parameter Retrieval:** It extracts the mandatory action parameters: Data
    source, Query value, Type, and User Identifier.

    3. **API Interaction:** The action initializes the Silent Push Manager and performs
    a GET request to the Threat Check API endpoint (`https://api.threatcheck.silentpush.com/v1/`)
    using the provided parameters.

    4. **Result Processing:** The action receives the threat check data from Silent
    Push. If no data is found or an error occurs, the action fails with a descriptive
    message.

    5. **Completion:** The retrieved threat data is returned as a JSON result, and
    the action completes successfully.
