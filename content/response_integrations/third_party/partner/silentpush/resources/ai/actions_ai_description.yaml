Reverse Padns Lookup:
  ai_description: >-
    ### General Description

    The **Reverse Padns Lookup** action performs a reverse Passive DNS (PADNS) query
    using the Silent Push platform. It allows analysts to retrieve historical DNS
    records associated with a specific value, such as a nameserver or IP address,
    across various DNS record types (e.g., NS, A, MX). This action is primarily used
    for infrastructure mapping and identifying related domains or assets during an
    investigation.


    ### Parameters Description

    | Name | Type | Description | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Qtype | string | The DNS record type to query (e.g., ns, a, mx). | false | ns
    |

    | Qname | string | The DNS record name or value to perform the reverse lookup
    for. | true | vida.ns.cloudflare.com |

    | Netmask | string | Optional netmask to filter the lookup results. | false |
    "" |

    | subdomain | string | Flag to include subdomains in the lookup results. | false
    | "" |

    | Regex | string | A regular expression to filter the returned DNS records. |
    false | "" |

    | Match | string | The type of match for the query (e.g., exact, partial). | false
    | "" |

    | First Seen After | string | Filter results to include only records first seen
    after this date (YYYY-MM-DD). | false | "" |

    | First Seen Before | string | Filter results to include only records first seen
    before this date (YYYY-MM-DD). | false | "" |

    | Last Seen After | string | Filter results to include only records last seen
    after this date (YYYY-MM-DD). | false | "" |

    | Last Seen Before | string | Filter results to include only records last seen
    before this date (YYYY-MM-DD). | false | "" |

    | As Of | string | Retrieve DNS records as they appeared at a specific point in
    time. | false | "" |

    | Sort | string | Field by which to sort the results (e.g., date, score). | false
    | "" |

    | Output Format | string | The format for the returned results (e.g., JSON, XML).
    | false | "" |

    | Prefer | string | Preference for specific DNS servers or data sources. | false
    | "" |

    | With Metadata | string | Boolean flag to include additional metadata in the
    records. | false | "" |

    | Max Wait | string | Maximum seconds to wait for the API response (0-25). | false
    | "" |

    | Skip | string | Number of results to skip for pagination. | false | "" |

    | Limit | string | Maximum number of results to return. | false | "" |


    ### Additional Notes

    - This action is parameter-driven and does not automatically iterate over entities
    in the SecOps case. The `Qname` must be provided manually or mapped from a previous
    step.

    - The `Max Wait` parameter is constrained by the API to a value between 0 and
    25 seconds.


    ### Flow Description

    1. **Initialization**: The action extracts the Silent Push server URL and API
    key from the integration configuration.

    2. **Parameter Extraction**: It retrieves all user-provided parameters, ensuring
    the mandatory `Qname` is present.

    3. **API Request**: The action calls the Silent Push `reverse_padns_lookup` endpoint
    using a GET request, passing the `Qtype`, `Qname`, and all optional filters.

    4. **Data Validation**: It checks the API response for errors or empty record
    sets. If the API returns an error or no records are found, the action is marked
    as failed.

    5. **Result Output**: If successful, the retrieved DNS records are returned as
    a JSON result for use in subsequent playbook steps.
