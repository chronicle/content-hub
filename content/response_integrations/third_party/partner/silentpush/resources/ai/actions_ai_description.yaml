Get ASN Reputation:
  ai_description: >-
    ### General Description

    Retrieves historical reputation data for a specific Autonomous System Number (ASN)
    using the Silent Push platform. This action allows security analysts to understand
    the reputation trends and risk factors associated with an ASN over time, helping
    to identify potentially malicious infrastructure providers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **ASN** | String | Yes | The Autonomous System Number (e.g., '12345') to perform
    the reputation lookup for. |

    | **Explain** | Boolean | No | If set to `True`, the action retrieves the underlying
    information and logic used to calculate the reputation score. |

    | **Limit** | String | No | Specifies the maximum number of historical reputation
    records to retrieve. |


    ### Additional Notes

    - The action returns a sorted list of reputation entries, with the most recent
    data appearing first.

    - While the action iterates over target entities in the environment, it primarily
    relies on the manually provided `ASN` parameter for its core logic.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Parsing**: Extracts the target `ASN`, the `Explain` flag, and the
    `Limit` value from the action inputs.

    3. **API Interaction**: Calls the Silent Push `explore/ipreputation/history/asn/{asn}`
    endpoint via a GET request.

    4. **Data Processing**: Extracts the reputation history from the response, sorts
    the records by date in descending order, and prepares a formatted table.

    5. **Result Delivery**: Outputs the processed reputation data as a JSON object
    and completes the execution.
