Search Scan Data:
  ai_description: >-
    Searches Silent Push scan data repositories using SPQL (Silent Push Query Language)
    queries. This action allows analysts to perform complex searches across Silent
    Push's raw scan data to identify infrastructure patterns, certificates, or other
    technical attributes. The results are returned as a JSON object containing the
    raw scan records.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | Yes | The SPQL query string used to filter scan data (e.g.,
    `tld=cool`). |

    | Fields | string | No | Specific fields to return in the response. |

    | sort | string | No | Sorting criteria for the results. |

    | Skip | string | No | Number of records to skip in the response (pagination).
    |

    | Limit | string | No | Maximum number of results to return. |

    | With Metadata | boolean | No | Whether to include metadata in the response.
    Defaults to true. |


    ### Additional Notes

    - This action does not run on specific entities; it performs a global search based
    on the provided SPQL query.

    - The action uses a POST request to the `explore/scandata/search/raw` endpoint.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Silent Push Server URL and API
    Key from the integration settings.

    2. **Parameter Parsing:** Extracts the SPQL query and optional filters (Fields,
    Limit, Skip, etc.) from the action parameters.

    3. **API Interaction:** Initializes the Silent Push Manager and sends a POST request
    to the scan data search endpoint with the query and filters.

    4. **Data Processing:** Parses the API response to extract the `scandata_raw`
    records.

    5. **Result Finalization:** Returns the found records to the Google SecOps platform
    or fails if no records are found or an error occurs.
