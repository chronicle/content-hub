Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the **Silent Push** platform. Its primary purpose is
    to validate that the integration's configuration parameters, specifically the
    API Key and Server URL, are correct and that the network path to the Silent Push
    API is open.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Silent Push Server | String | Yes | The base URL of the Silent Push platform,
    retrieved from the integration configuration. |

    | API Key | String | Yes | The API key used for authentication with Silent Push
    services, retrieved from the integration configuration. |


    ### Additional Notes

    * This action does not process any entities and does not require any input parameters
    beyond the initial integration configuration.

    * It is typically used during the initial setup or for troubleshooting connection
    issues.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify environment and retrieves
    the global configuration parameters (Server URL and API Key).

    2. **Credential Validation**: It checks if the required credentials are provided;
    if missing, the action fails immediately.

    3. **Connection Attempt**: It instantiates the `SilentPushManager` and calls the
    `test_connection` method.

    4. **API Interaction**: The `test_connection` method performs a sample, low-impact
    GET request (searching for a single domain) to the Silent Push API.

    5. **Final Status**: If the API call succeeds, the action returns a success message.
    If an exception occurs (e.g., 401 Unauthorized or connection timeout), it captures
    the error and reports a failure.
