  reasoning: >-
    The Silent Push integration is a threat intelligence platform that provides proactive
    threat detection and enrichment capabilities. Its primary functions include retrieving
    reputation data, DNS records, ASN information, and infrastructure tags for indicators
    such as IPs, domains, and ASNs. These capabilities directly align with the 'Threat
    Intelligence' category, as the integration is used to enrich indicators and provide
    context for security investigations. It does not perform SIEM log analysis, EDR
    host-level actions, network security blocking at the gateway, or other operational
    tasks like ITSM ticketing or IAM management. Therefore, it is classified solely
    under Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
