  network_security: false
  reasoning: >-
    The Silent Push integration is a dedicated threat intelligence platform. Its primary
    functionality across almost all actions (e.g., Density Lookup, Forward/Reverse
    Padns Lookup, ASN/IP/Domain Reputation, Live URL Scan, Threat Check) is to provide
    enrichment, reputation, and contextual data for external indicators such as IP
    addresses, domains, ASNs, and URLs. It does not perform internal log analysis
    (SIEM), host-level containment (EDR), network gateway blocking (Network Security),
    or identity management. Therefore, it is classified exclusively under Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
