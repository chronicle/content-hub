  network_security: false
  reasoning: >-
    The Stairwell integration is designed to provide threat intelligence and malware
    analysis. Its primary actions (Enrich Hash, Enrich IP, and Enrich Hostname) are
    focused on retrieving reputation data, verdicts, and metadata for external indicators
    (IOCs). This aligns directly with the 'Threat Intelligence' category, which is
    used for enriching indicators to determine their risk and confirm if an alert
    is a True Positive. The integration does not perform SIEM log analysis, EDR host
    containment, network blocking, identity management, or ITSM ticketing. While it
    enriches hostnames, it does so for threat intelligence purposes rather than asset
    inventory management.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
