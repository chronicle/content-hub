  reasoning: "The Stairwell integration is primarily designed to provide threat intelligence\
    \ and malware analysis. Its core actions\u2014Enrich Hash, Enrich IP, and Enrich\
    \ Hostname\u2014are dedicated to enriching indicators of compromise (IOCs) and\
    \ hostnames with reputation data, verdicts, and malicious probability scores.\
    \ This aligns directly with the 'Threat Intelligence' category, which is used\
    \ for the first step of enrichment for external indicators to determine their\
    \ reputation. The integration does not perform SIEM log searching, EDR host containment,\
    \ network blocking, or ITSM ticketing. While it enriches hostnames, it provides\
    \ threat intelligence and malware analysis rather than asset inventory data (such\
    \ as owner, department, or business criticality), so it does not qualify for the\
    \ 'Asset Inventory' category."
