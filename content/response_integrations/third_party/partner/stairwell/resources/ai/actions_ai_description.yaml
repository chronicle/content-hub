  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Stairwell API. It ensures that the provided credentials (API Key, Organization
    ID, etc.) and the API Root URL are correct and that the service is reachable.
    This is typically used as a health check during the initial setup or troubleshooting
    of the Stairwell integration.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API instance. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | The specific Organization ID associated with
    the Stairwell account. |

    | User ID | String | No | The specific User ID associated with the Stairwell account.
    |


    ### Additional Notes

    - This action does not process any entities from the SecOps case. It uses a hardcoded
    dummy hostname (`www.google.com`) to perform a test lookup against the Stairwell
    enrichment endpoint.

    - If the action fails, it usually indicates an issue with the network configuration,
    invalid API keys, or an incorrect API Root URL.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the integration configuration
    parameters, including the API Root, API Key, and optional IDs.

    2. **Manager Setup**: It initializes the `StairwellManager` with the provided
    configuration.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    attempts to fetch enrichment data for a dummy hostname (`www.google.com`) via
    a GET request to the Stairwell API.

    4. **Result Handling**: If the API responds successfully, the action returns a
    success status and a "Connection Established" message. If an exception occurs
    (e.g., HTTP error, timeout), it catches the error and reports a failure.
