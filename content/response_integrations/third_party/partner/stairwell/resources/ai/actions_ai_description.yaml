    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, sets suspicious status, adds entity insights, and
      adds data tables to the case.
    reasoning: >-
      The action fetches threat intelligence data from the Stairwell API (GET). It
      updates internal entity properties, sets the suspicious flag, and creates insights
      within the SOAR platform. It does not modify external systems.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data (Enrichment) and does not mutate external systems. It
      performs allowed internal mutations (updating entities, creating insights).
      It is not a Ping or download action.
