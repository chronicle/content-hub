Enrich IP:
  ai_description: "Enriches IP Address entities with threat intelligence data from\
    \ Stairwell. This action retrieves reputation metadata, including verdicts and\
    \ opinions, to provide security context for identified IP addresses. It evaluates\
    \ the risk level based on Stairwell's analysis, updates the entity's suspicious\
    \ status within Google SecOps, and generates detailed insights and data tables\
    \ for the case wall.\n\n### Parameters\n| Parameter Name | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The\
    \ base URL of the Stairwell API instance. |\n| API Key | String | Yes | The API\
    \ key used for authentication with Stairwell. |\n| Organization ID | String |\
    \ No | The specific Organization ID to include in the request headers for multi-tenant\
    \ environments. |\n| User ID | String | No | The specific User ID to include in\
    \ the request headers if required by the API configuration. |\n\n### Additional\
    \ Notes\n- This action specifically targets entities of type `ADDRESS`.\n- An\
    \ entity is marked as suspicious if the Stairwell verdict is 'MALICIOUS'.\n- Enrichment\
    \ data is prefixed with 'SW' in the entity's additional properties.\n\n### Flow\
    \ Description\n1. **Initialization**: The action initializes the Stairwell manager\
    \ using the provided API Root, API Key, and optional Organization/User IDs.\n\
    2. **Entity Filtering**: It identifies all IP Address entities (`ADDRESS`) within\
    \ the current alert context.\n3. **Data Retrieval**: For each identified IP, the\
    \ action performs a GET request to the Stairwell enrichment endpoint to fetch\
    \ reputation data.\n4. **Internal Updates**: \n    - Updates the entity's additional\
    \ properties with the enrichment results.\n    - Sets the `is_enriched` flag to\
    \ true.\n    - Evaluates the verdict; if 'MALICIOUS', the entity is marked as\
    \ suspicious.\n5. **Reporting**: \n    - Generates an entity insight containing\
    \ the verdict if the IP is suspicious.\n    - Adds a detailed data table to the\
    \ case wall for each processed IP.\n    - Appends the raw JSON results to the\
    \ action output.\n6. **Finalization**: Updates the entities in the platform and\
    \ returns a success message listing the enriched IPs."
