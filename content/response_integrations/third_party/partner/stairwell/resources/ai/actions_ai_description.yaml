  ai_description: >-
    Enriches IP address entities with threat intelligence data from Stairwell.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the integration
    configuration parameters (API Root, API Key, Organization ID, User ID).


    ### Flow

    1. Initializes the Stairwell API client using the integration configuration.

    2. Iterates over all target entities of type `ADDRESS`.

    3. Fetches threat intelligence data for each IP address from the Stairwell API.

    4. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    5. Evaluates if the IP is suspicious based on the returned verdict. If suspicious,
    creates an entity insight.

    6. Attaches a data table and JSON results to the action's results.

    7. Updates the entities in the SecOps platform.
