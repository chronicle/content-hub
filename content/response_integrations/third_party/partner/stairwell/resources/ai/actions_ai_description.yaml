Enrich Hash:
  ai_description: "Enriches File Hash entities with threat intelligence data from\
    \ Stairwell. This action retrieves comprehensive file metadata, including hash\
    \ variants (MD5, SHA1, SHA256), file size, entropy, MIME type, and signature information.\
    \ It also fetches Stairwell-specific intelligence such as 'MalEval' malicious\
    \ probability scores, AI-generated summaries, and sighting prevalence. The action\
    \ evaluates the file's risk level based on Stairwell's verdicts; if a file is\
    \ determined to be suspicious or malicious, it updates the entity's status in\
    \ Google SecOps and generates a detailed insight for the analyst.\n\n### Parameters\n\
    | Parameter Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| API Root | String | Yes | The base URL for the Stairwell API instance.\
    \ |\n| API Key | String | Yes | The API key used for authentication with Stairwell.\
    \ |\n| Organization ID | String | No | The specific Stairwell Organization ID\
    \ to contextually scope the request. |\n| User ID | String | No | The specific\
    \ Stairwell User ID to associate with the request. |\n\n### Additional Notes\n\
    - The action specifically targets `FILEHASH` entities.\n- It uses the `OriginalIdentifier`\
    \ of the entity if available to ensure accurate lookups in Stairwell.\n- Enrichment\
    \ data is prefixed with 'SW' (Stairwell) when added to entity additional properties.\n\
    \n### Flow Description\n1. **Initialization**: Extracts API configuration (Root,\
    \ Key, Org ID, User ID) and initializes the Stairwell manager.\n2. **Entity Filtering**:\
    \ Identifies all `FILEHASH` entities within the current context.\n3. **Data Retrieval**:\
    \ For each hash, it queries the Stairwell `/object_event` endpoint to fetch the\
    \ file report.\n4. **Risk Assessment**: Analyzes the report's verdict and malicious\
    \ probability scores to determine if the file is suspicious.\n5. **Internal Updates**:\
    \ \n    - Updates the entity's additional properties with the fetched metadata.\n\
    \    - Marks the entity as 'enriched'.\n    - Sets the 'is_suspicious' flag based\
    \ on the assessment.\n6. **Insight & Reporting**: \n    - If suspicious, creates\
    \ a detailed entity insight containing probability scores and detection labels.\n\
    \    - Adds a data table to the case wall containing a summary of the file report.\n\
    \    - Attaches the full raw JSON response to the action results.\n7. **Finalization**:\
    \ Updates all processed entities in the Google SecOps platform and provides a\
    \ summary message of successful and failed enrichments."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties with enrichment data, modifies
      the 'is_suspicious' and 'is_enriched' flags of entities, creates entity insights,
      and adds data tables to the case wall.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
      - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
