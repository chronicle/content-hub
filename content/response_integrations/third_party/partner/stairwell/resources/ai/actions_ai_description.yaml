  ai_description: >-
    ### General Description

    This action tests the connectivity between the Google SecOps SOAR platform and
    the Stairwell API. It verifies that the provided API credentials and configuration
    settings are valid by attempting to reach a test endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API. |

    | API Key | String | Yes | The API key used for authentication with the Stairwell
    service. |

    | Organization ID | String | No | The Organization ID to include in the API request
    headers. |

    | User ID | String | No | The User ID to include in the API request headers. |


    ### Flow Description

    1. The action initializes the `StairwellManager` using the provided configuration
    parameters (API Root, API Key, Organization ID, User ID).

    2. It executes a connectivity test by calling `manager.test_connectivity()`, which
    performs a GET request to a dummy endpoint on the Stairwell API.

    3. If the request is successful, the action completes with a success status and
    an output message indicating that the connection was established.

    4. If an error occurs (e.g., invalid credentials, network issues), the action
    catches the exception, logs the error, and fails the execution.
