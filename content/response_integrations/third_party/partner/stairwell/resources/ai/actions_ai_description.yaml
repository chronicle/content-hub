Enrich Hostname:
  ai_description: >-
    Enriches Hostname entities with threat intelligence data from Stairwell. This
    action retrieves comprehensive metadata including verdicts, opinions, comments,
    and DNS records (A, AAAA, MX) for specified hostnames. It evaluates the security
    posture of the entity, updates its attributes within the platform, and provides
    detailed visual reports through data tables and insights.


    ### Flow Description

    1. **Initialization**: Connects to the Stairwell API using the provided API Root,
    API Key, and optional Organization/User IDs.

    2. **Entity Filtering**: Identifies all Hostname entities within the current alert
    context.

    3. **Data Retrieval**: For each hostname, it queries the Stairwell enrichment
    endpoint to fetch the latest threat intelligence report.

    4. **Entity Enrichment**: Updates the entity's additional properties with the
    retrieved data and marks the entity as enriched.

    5. **Risk Assessment**: Checks the Stairwell verdict; if the hostname is classified
    as 'MALICIOUS', the entity is marked as suspicious.

    6. **Insight Generation**: Creates an entity insight for malicious hostnames to
    highlight the threat to analysts.

    7. **Reporting**: Generates a data table for the case wall containing a summary
    of the host's records and attaches the full raw JSON response to the action results.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Stairwell API instance. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | Optional identifier for the specific Stairwell
    organization. |

    | User ID | String | No | Optional identifier for the specific Stairwell user.
    |


    ### Additional Notes

    * This action is strictly read-only regarding the Stairwell platform and does
    not modify any external data.

    * It uses the 'OriginalIdentifier' property of the entity if available to ensure
    accurate lookups.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, sets the suspicious flag based
      on Stairwell verdicts, creates entity insights, and adds data tables to the
      case wall.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
      - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
