  ai_description: >-
    ### General Description

    Enriches IP Address entities with threat intelligence data from Stairwell. This
    action retrieves detailed reports including verdicts, opinions, and comments for
    each IP address found in the case context. It helps analysts quickly identify
    malicious infrastructure by providing contextual metadata and automated risk assessments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | The specific Organization ID to include in the
    request headers for multi-tenant environments. |

    | User ID | String | No | The specific User ID to include in the request headers
    if required by the API configuration. |


    ### Flow Description

    1. **Initialization**: Extracts API credentials and configuration parameters from
    the integration settings.

    2. **Entity Identification**: Filters the target entities to identify all `ADDRESS`
    (IP) types.

    3. **Data Retrieval**: For each identified IP, the action queries the Stairwell
    API to fetch the latest enrichment report.

    4. **Enrichment**: Updates the entity's additional properties with the retrieved
    data and marks the entity as enriched.

    5. **Risk Assessment**: Evaluates the verdict from Stairwell; if the verdict is
    'MALICIOUS', the entity is marked as suspicious in Google SecOps.

    6. **Insight Generation**: Creates an HTML-formatted entity insight for suspicious
    IPs, highlighting the malicious verdict.

    7. **Result Reporting**: Generates a data table for each IP containing the report
    summary and attaches the full raw JSON response to the action results.

    8. **Finalization**: Updates all successfully processed entities within the platform
    and returns a summary message.


    ### Additional Notes

    - This action is classified as an enrichment type and does not modify any data
    in the external Stairwell system.

    - If an IP is not found in Stairwell, the action will log an error for that specific
    entity but continue processing others.
