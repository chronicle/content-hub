Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities with threat intelligence data from Stairwell. This
    action retrieves detailed file analysis, including malicious probability, detection
    labels, and file metadata, to provide context and evaluate the risk of the hash.


    ### Flow Description

    1. Filters the target entities to include only File Hash entities.

    2. Iterates over the filtered entities and makes a GET request to the Stairwell
    API (`/labs/appapi/enrichment/v1/object_event/{file_hash}`) to retrieve threat
    intelligence data.

    3. Updates the entity's additional properties with the retrieved enrichment data
    and marks the entity as enriched.

    4. Evaluates the entity's suspiciousness based on the returned verdict and malicious
    probability.

    5. If the entity is deemed suspicious, creates an insight with the analysis results.

    6. Updates the entities in the Google SecOps platform and attaches the results
    as JSON and data tables.


    ### Additional Notes

    This action relies on integration-level configuration parameters (such as API
    Key and API Root) to authenticate with Stairwell.
  ai_short_description: >-
    Enriches File Hash entities with threat intelligence data from Stairwell, updating
    entity properties and generating insights for suspicious findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Stairwell API to fetch file hash data
      (fetches_data=true). It does not mutate external data or internal data outside
      of standard entity updates. It updates entities with the retrieved data (can_update_entities=true)
      and creates insights if the entity is deemed suspicious (can_create_insight=true).
  entity_usage:
