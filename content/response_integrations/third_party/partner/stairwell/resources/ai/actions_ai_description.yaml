  ai_description: >-
    Enriches File Hash entities using Stairwell. This action retrieves threat intelligence
    data, including malicious probability, detection labels, and file metadata, to
    provide context on potential threats.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Organization ID, User
    ID).

    2. Filters target entities to process only FILEHASH entities.

    3. Iterates over the suitable entities and queries the Stairwell API for file
    reports.

    4. Updates the entity's additional properties with the enrichment data and marks
    it as enriched.

    5. Evaluates the file's malicious probability; if suspicious, updates the entity's
    suspicious status and generates an insight.

    6. Attaches a data table and JSON results to the action output.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | API Root | Yes | String | The base URL of the Stairwell API. |

    | API Key | Yes | String | The API key for authentication with Stairwell. |

    | Organization ID | No | String | The Organization ID to include in the request
    headers. |

    | User ID | No | String | The User ID to include in the request headers. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches file hash data from the Stairwell API using a GET request.
      It does not mutate any external data. Internally, it updates entity properties,
      sets the suspicious flag, and creates insights, which are standard enrichment
      outputs and do not count as internal data mutation in this context.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Stairwell) to enrich entities.
      It does not mutate external state and only performs allowed internal state changes
      (updating entities and creating insights). Therefore, it is classified as an
      enrichment action.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using the
      condition `entity.entity_type == EntityTypes.FILEHASH`. Therefore, it targets
      FILEHASH entities and filters strictly by entity_type.
