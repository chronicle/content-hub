  ai_description: >-
    ### General Description

    The **Enrich Hostname** action retrieves comprehensive threat intelligence and
    reputation data for Hostname entities from the Stairwell platform. It provides
    analysts with visibility into host verdicts, community opinions, and DNS records
    (A, AAAA, MX) to assist in incident investigation and triage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API instance. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | Optional identifier for the specific Stairwell
    organization context. |

    | User ID | String | No | Optional identifier for the specific Stairwell user
    context. |


    ### Flow Description

    1. **Initialization:** The action extracts configuration parameters (API Root,
    API Key, Org ID, User ID) and initializes the Stairwell API manager.

    2. **Entity Filtering:** It identifies all `HOSTNAME` entities within the current
    alert context.

    3. **Data Retrieval:** For each hostname, it queries the Stairwell enrichment
    API to fetch the host's detailed report, including opinions and DNS records.

    4. **Entity Enrichment:**
        *   Updates the entity's additional properties with the retrieved data (prefixed
    with 'SW').
        *   Marks the entity as enriched in the SOAR platform.
        *   Evaluates the host's verdict; if the verdict is "MALICIOUS", the entity
    is marked as suspicious.
    5. **Insight Generation:** If a host is deemed suspicious, a formatted HTML insight
    is added to the entity for quick analyst review.

    6. **Reporting:**
        *   Constructs a data table for each host containing DNS records and community
    opinions.
        *   Appends raw JSON results to the action output for downstream processing.
    7. **Finalization:** Updates the entities in the SOAR platform and provides a
    summary message of successful and failed enrichments.


    ### Additional Notes

    - This action is strictly read-only regarding the Stairwell platform and does
    not modify any external data.

    - It specifically targets `HOSTNAME` entities and will skip other entity types.
