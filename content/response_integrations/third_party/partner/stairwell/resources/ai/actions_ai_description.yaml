Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stairwell API to ensure the integration is configured
    correctly and can communicate with the service.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, Organization
    ID, User ID).

    2. Initializes the Stairwell API manager.

    3. Executes a test connectivity method, which makes a test API call to the Stairwell
    API using a dummy hostname.

    4. Returns a successful result if the connection is established, or fails if an
    error occurs.


    ### Additional Notes

    This action is typically used for diagnostic purposes to verify credentials and
    network access. It does not process alerts or entities.
