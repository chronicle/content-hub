  ai_description: "### General Description\nEnriches file hash entities using the\
    \ Stairwell platform. This action retrieves comprehensive threat intelligence,\
    \ including file metadata, prevalence, and malicious probability scores, to assist\
    \ analysts in evaluating the risk associated with specific file hashes.\n\n###\
    \ Flow Description\n1. **Initialization**: Extracts configuration parameters (API\
    \ Root, API Key, Organization ID, and User ID) required for authentication and\
    \ API communication.\n2. **Filtering**: Identifies and filters target entities\
    \ within the case to process only those of type `FILEHASH`.\n3. **Enrichment**:\
    \ For each valid file hash, the action queries the Stairwell API to retrieve detailed\
    \ file intelligence.\n4. **Data Processing**: \n    - Updates the entity's `additional_properties`\
    \ with the retrieved enrichment data.\n    - Sets the `is_enriched` flag to true.\n\
    \    - Evaluates the file's suspicious status based on the retrieved verdict and\
    \ malicious probability.\n5. **Reporting**: \n    - If the file is deemed suspicious,\
    \ it generates an entity insight.\n    - Adds a data table containing the enrichment\
    \ results to the case.\n    - Updates the entities within the SOAR platform.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL for the\
    \ Stairwell API. |\n| API Key | String | Yes | The API key used for authentication\
    \ with the Stairwell service. |\n| Organization ID | String | No | The Organization\
    \ ID to include in the API request headers. |\n| User ID | String | No | The User\
    \ ID to include in the API request headers. |\n\n### Additional Notes\n- This\
    \ action is strictly for enrichment and does not perform any modifications on\
    \ external systems. \n- It only processes entities of type `FILEHASH`."
  capabilities:
