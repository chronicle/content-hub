Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stairwell API to ensure that the integration is correctly
    configured and the service is reachable. This action validates the provided API
    Root, API Key, and optional Organization/User IDs by performing a test request
    to the enrichment endpoint using a dummy hostname.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Stairwell API instance. |

    | API Key | String | Yes | The API key used for authentication with Stairwell.
    |

    | Organization ID | String | No | The specific Organization ID to be included
    in the request headers. |

    | User ID | String | No | The specific User ID to be included in the request headers.
    |


    ### Additional Notes

    This action does not process any entities from the SOAR case. It uses a hardcoded
    dummy hostname ('www.google.com') to verify the API connection. Although the integration
    metadata might classify this as an enrichment type, per architectural guidelines,
    Ping actions are categorized separately from functional enrichment actions.


    ### Flow Description

    1. **Parameter Initialization**: Retrieves the API Root, API Key, Organization
    ID, and User ID from the integration configuration.

    2. **Manager Setup**: Initializes the Stairwell Manager with the provided credentials
    and connection settings.

    3. **Connectivity Test**: Executes the `test_connectivity` method, which triggers
    a GET request to the Stairwell enrichment endpoint for a dummy hostname.

    4. **Response Validation**: Checks the HTTP response status. If the request is
    successful, it confirms the connection; otherwise, it captures the error.

    5. **Execution Completion**: Returns a success status and a 'Connection Established'
    message if the test passes, or a failure status with the error details if it fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
