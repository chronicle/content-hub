  ai_description: "Enriches File Hash entities using threat intelligence data from\
    \ Stairwell. This action retrieves comprehensive metadata about a file, including\
    \ its size, entropy, various hash formats (MD5, SHA1, SHA256, Imphash, TLSH),\
    \ and maliciousness verdicts. It evaluates the risk level based on Stairwell's\
    \ 'Maleval' malicious probability and specific 'MALICIOUS' verdicts. The action\
    \ updates the entity's attributes, marks it as suspicious if applicable, and generates\
    \ detailed insights and data tables for analyst review.\n\n### Parameters Description\n\
    \n| Parameter Name | Type | Mandatory | Description |\n| :--- | :--- | :--- |\
    \ :--- |\n| API Root | String | Yes | The base URL of the Stairwell API instance.\
    \ |\n| API Key | String | Yes | The API key used for authentication with Stairwell.\
    \ |\n| Organization ID | String | No | The specific Stairwell Organization ID\
    \ to context the request. |\n| User ID | String | No | The specific Stairwell\
    \ User ID to context the request. |\n\n### Flow Description\n\n1.  **Initialization**:\
    \ Extracts the Stairwell API configuration (Root, Key, Org ID, User ID) and identifies\
    \ all File Hash entities in the current context.\n2.  **Data Retrieval**: For\
    \ each File Hash entity, the action queries the Stairwell Enrichment API to fetch\
    \ the object event report.\n3.  **Data Parsing**: The raw JSON response is parsed\
    \ into a structured File data model, extracting metadata like file magic, mime\
    \ type, and sightings.\n4.  **Enrichment & Risk Assessment**: \n    *   Updates\
    \ the entity's additional properties with the retrieved metadata.\n    *   Determines\
    \ if the file is suspicious by checking for a 'MALICIOUS' verdict or a high 'Maleval'\
    \ malicious probability.\n5.  **Internal Updates**: \n    *   If suspicious, creates\
    \ an Entity Insight containing the malicious probability, detection labels, and\
    \ first-seen date.\n    *   Adds a detailed CSV-formatted data table to the case\
    \ wall for each enriched hash.\n    *   Updates the entities within Google SecOps\
    \ to reflect the new enrichment data and suspicious status.\n6.  **Completion**:\
    \ Returns a summary message of successfully enriched hashes and provides the full\
    \ raw data in JSON format."
