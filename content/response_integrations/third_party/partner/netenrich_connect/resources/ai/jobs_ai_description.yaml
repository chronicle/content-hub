Sync ActOn Updates To Case:
  ai_description: >-
    ### General Description

    This job synchronizes case information from Resolution Intelligence Cloud (RIC)
    to Google SecOps (SOAR). It acts as a bridge to ensure that case details, such
    as descriptions, titles, priorities, assignees, and statuses, remain consistent
    across both platforms. Additionally, it handles the synchronization of comments,
    attachments, and entities, while updating custom entity properties with relevant
    scoring evidence and alert data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | CREATE | JSON String | No | Payload containing data for creating a new case.
    |

    | UPDATE | JSON String | No | Payload containing data for updating an existing
    case. |

    | COMMENT | JSON String | No | Payload containing data for adding a comment to
    a case. |


    ### Flow Description

    1. Parses the incoming payload to determine the action type (CREATE, UPDATE, or
    COMMENT).

    2. Retrieves or creates the corresponding case in Google SecOps based on the provided
    ticket ID.

    3. If the action is a COMMENT, it adds the comment and any attachments to the
    case and exits.

    4. For CREATE or UPDATE actions, it synchronizes case metadata including description,
    title, priority, assignee, stage, and status.

    5. Updates custom entity properties with scoring evidence, alert data, and service
    information.

    6. Synchronizes new entities into the case.

    7. If a new case is created, it posts a confirmation message back to the Resolution
    Intelligence Cloud inbound webhook.
Sync Case Updates To ActOn:
  ai_description: >-
    ### General Description

    This job synchronizes case updates from Google SecOps SOAR to the Netenrich Resolution
    Intelligence Cloud (ActOn). It periodically monitors case wall activities, processes
    relevant comments and attachments, and pushes these updates to the external platform
    via a webhook to ensure data consistency between the two systems.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | RI Inbound Webhook URL | String | Yes | The URL endpoint for the Resolution
    Intelligence Cloud inbound webhook. |

    | Token | String | Yes | The authentication token required for the webhook. |

    | Environment | String | Yes | The specific environment name to filter cases for
    synchronization. |


    ### Flow Description

    1. Retrieves the `last_sync_time` from the job context.

    2. Queries Google SecOps for cases updated since the last sync interval.

    3. Filters cases based on the configured environment.

    4. For each case, fetches wall activities and filters for relevant updates (e.g.,
    manual comments, assignee changes).

    5. Transforms case data and activities into the required payload format, including
    attachments and tags.

    6. Sends the payload to the Resolution Intelligence Cloud via the configured webhook.

    7. Updates the `last_sync_time` in the job context for the next run.
