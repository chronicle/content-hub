Sync ActOn Updates To Case:
  ai_description: "### General Description\nThis job synchronizes 'ActOn' updates\
    \ from the Resolution Intelligence Cloud (Netenrich) to Google SecOps cases. It\
    \ ensures that case details\u2014including descriptions, titles, priorities, assignees,\
    \ statuses, and stages\u2014remain consistent between the external system and\
    \ the SOAR platform. Additionally, it manages comments, attachments, and entity\
    \ synchronization to maintain a unified view of the investigation.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| N/A | N/A | N/A | This job does not have specific job-level\
    \ parameters. It relies on integration-level configurations (e.g., RI Inbound\
    \ Webhook URL, Token) defined in the NetenrichConnect integration settings. |\n\
    \n### Flow Description\n1. **Input Parsing**: Receives and parses the input payload\
    \ (CREATE, UPDATE, or COMMENT events).\n2. **Case Management**: Retrieves an existing\
    \ SOAR case or creates a new one based on the provided ticket information.\n3.\
    \ **Metadata Synchronization**: Updates case attributes such as description, title,\
    \ priority, assignee, status, and stage to match the external system.\n4. **Communication\
    \ & Attachments**: Adds comments and processes attachments from the external system\
    \ to the SOAR case.\n5. **Entity Updates**: Updates custom entity properties (e.g.,\
    \ scoring evidence, alerts, services) and synchronizes entities between the external\
    \ system and the SOAR case.\n6. **Feedback Loop**: If a new case is created, it\
    \ posts confirmation messages back to the external system via a configured webhook."
Sync Case Updates To ActOn:
  ai_description: >-
    ### General Description

    This job synchronizes case updates from Google SecOps SOAR to the Netenrich Resolution
    Intelligence Cloud (ActOn). It periodically monitors case wall activities, status
    changes, and assignee updates, ensuring that the external platform remains synchronized
    with the latest investigation progress in SOAR.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | RI Inbound Webhook URL | String | Yes | The endpoint URL for the Resolution
    Intelligence Cloud inbound webhook. |

    | Token | String | Yes | The authentication token required for the webhook request.
    |

    | Environment | String | Yes | The specific SOAR environment to filter cases for
    synchronization. |


    ### Flow Description

    1. Retrieves the `last_sync_time` from the job context to determine the time range
    for updates.

    2. Queries Google SecOps for cases modified since the last sync time.

    3. Filters the retrieved cases to include only those matching the configured environment.

    4. For each case, fetches wall activities and filters for relevant updates, such
    as comments, attachments, or assignee changes.

    5. Transforms the case data, including status, tags, and posts, into the format
    required by the Resolution Intelligence Cloud.

    6. Sends the processed case updates to the external system via the configured
    inbound webhook.

    7. Updates the `last_sync_time` in the job context to the current timestamp for
    the next execution.
