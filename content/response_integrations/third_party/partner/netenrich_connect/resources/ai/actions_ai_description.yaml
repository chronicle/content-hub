  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Resolution Intelligence Cloud
    by sending a request to the configured inbound webhook URL. This action is used
    to verify that the integration parameters are correct and the external service
    is reachable.


    ### Parameters Description

    There are no action parameters for this action. It relies entirely on the integration's
    configuration parameters.


    ### Additional Notes

    * The action utilizes the following configuration parameters: 'RI Inbound Webhook
    URL', 'Token', and 'Verify SSL'.

    * The action considers a response status code of 200 or 400 as a successful connectivity
    test.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the 'RI Inbound Webhook URL',
    'Token', and 'Verify SSL' settings from the integration configuration.

    2. **URL Construction**: It constructs the target URL by replacing the `{token}`
    placeholder in the webhook URL with the actual token provided in the configuration.

    3. **Connectivity Test**: It executes a POST request to the constructed URL with
    an empty JSON body.

    4. **Result Evaluation**: The action checks the HTTP status code of the response.
    If the code is 200 or 400, it concludes that the API is reachable and ends successfully.
    If the request fails or returns a different status code, it captures the error
    or status code and ends with a failure message.
