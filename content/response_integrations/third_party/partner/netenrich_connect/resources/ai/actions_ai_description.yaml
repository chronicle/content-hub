Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Resolution Intelligence Cloud API by sending a ping
    request to the configured webhook URL.


    ### Flow Description

    1. Retrieves the webhook URL, token, and SSL verification settings from the integration
    configuration.

    2. Constructs the target URL by injecting the token into the webhook URL.

    3. Executes an HTTP POST request with an empty JSON payload to the target URL.

    4. Evaluates the HTTP response status code (treating 200 and 400 as successful
    reachability) and outputs the result.


    ### Additional Notes

    This action is used strictly as a health check to ensure the integration is correctly
    configured and can communicate with the external service. It does not require
    any action-specific parameters or entities to run.
  ai_short_description: >-
    Verifies connectivity to the Resolution Intelligence Cloud API by sending a ping
    request to the configured webhook URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action sends a POST request with an empty payload to verify connectivity
      (ping). It does not fetch contextual data for alerts/entities, mutate external
      data (it just pings), mutate internal data, update entities, create insights,
      modify alert data, or create case comments.
