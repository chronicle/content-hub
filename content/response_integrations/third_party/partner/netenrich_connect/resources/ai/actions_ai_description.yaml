  ai_description: >-
    ### General Description

    Verifies connectivity to the Resolution Intelligence Cloud API by sending a POST
    request to the configured webhook URL. This action is used to ensure the integration
    is properly configured and the API endpoint is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | RI Inbound Webhook URL | String | Yes | The webhook URL for the Resolution Intelligence
    Cloud API. |

    | Token | String | Yes | The authentication token to be injected into the webhook
    URL. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates during the request.
    Defaults to True. |


    ### Additional Notes

    The action requires the `RI Inbound Webhook URL` and `Token` parameters to be
    configured for the request to be constructed and sent successfully.


    ### Flow Description

    1. Extract configuration parameters: `RI Inbound Webhook URL`, `Token`, and `Verify
    SSL`.

    2. Construct the target URL by replacing the `{token}` placeholder in the webhook
    URL with the provided token.

    3. Execute a POST request to the constructed URL.

    4. Evaluate the HTTP response status code.

    5. If the status code is 200 or 400, the action concludes as successful. Otherwise,
    it reports a failure.
