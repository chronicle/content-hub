  ai_description: >-
    ### General Description

    Tests connectivity to the Resolution Intelligence Cloud (NetenrichConnect) by
    sending a ping request to the configured webhook URL. This action is used to verify
    that the integration is correctly configured and can communicate with the external
    service.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies entirely
    on the integration's global configuration parameters:

    * **RI Inbound Webhook URL**: The endpoint URL to send the ping request to.

    * **Token**: The authentication token used in the webhook URL.

    * **Verify SSL**: Boolean flag to determine if SSL certificate validation should
    be enforced.


    ### Flow Description

    1. Extracts the webhook URL, token, and SSL verification settings from the integration
    configuration.

    2. Constructs the final URL by injecting the token and sends an HTTP POST request
    with an empty JSON payload.

    3. Evaluates the HTTP response status code.

    4. Returns a successful result if the status code is 200 or 400, otherwise returns
    a failure and outputs the error details.
