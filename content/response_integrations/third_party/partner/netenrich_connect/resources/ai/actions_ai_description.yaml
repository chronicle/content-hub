Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a connectivity test designed to verify the communication
    between Google SecOps and the **Resolution Intelligence Cloud**. It ensures that
    the integration is correctly configured and that the external API endpoint is
    reachable using the provided credentials.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies on the following
    integration configuration parameters:


    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | RI Inbound Webhook URL | String | Yes | The target URL for the inbound webhook.
    It must contain a `{token}` placeholder. |

    | Token | String | Yes | The API token used for authentication, which replaces
    the placeholder in the URL. |

    | Verify SSL | Boolean | No | Determines whether to validate the SSL certificate
    of the target server. Defaults to `True`. |


    ### Additional Notes

    - The action considers HTTP status codes `200` (OK) and `400` (Bad Request) as
    successful indicators of reachability.

    - If the `RI Inbound Webhook URL` is missing from the configuration, the action
    will fail immediately.


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the Webhook URL, Token, and
    SSL verification settings from the integration configuration.

    2. **URL Construction:** It replaces the `{token}` placeholder in the Webhook
    URL with the actual Token value.

    3. **Connectivity Check:** It sends an empty HTTP POST request to the constructed
    URL.

    4. **Response Validation:** It evaluates the HTTP response status code. If the
    code is 200 or 400, the connection is deemed successful.

    5. **Result Reporting:** The action concludes with a success message if reachable,
    or logs the error/status code and fails if unreachable.
