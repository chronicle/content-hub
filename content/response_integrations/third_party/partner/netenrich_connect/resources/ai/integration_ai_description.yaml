product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The netenrich_connect integration is primarily designed to synchronize case data,
    comments, attachments, and status updates between the Netenrich Resolution Intelligence
    Cloud and Google SecOps (SOAR). Its core functionality revolves around maintaining
    consistency in case management and ticket lifecycle across platforms. This aligns
    directly with the ITSM category, which focuses on documenting investigations and
    managing tasks. The integration does not perform SIEM log analysis, EDR host containment,
    threat intelligence enrichment, or other specialized security domain functions
    like cloud security or identity management. Therefore, it is classified as ITSM.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
