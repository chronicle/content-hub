  ai_description: >-
    Enriches entities by scanning them using the Houdin.io platform. This action processes
    specific entity types (Public IP, Domain, File Hash, URL, and Destination URL)
    by launching a scan via the Houdin.io API and polling for the results. Once the
    analysis is complete, it updates the entity's `additional_properties` with a threat
    score, AI analysis summary, and the sources used for the scan.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | scanOn | multi_choice_parameter | No | An optional array of scanners (e.g.,
    vt, urlscan, alienvault, abuseipdb, triage, mesmer, servicenow) to be used by
    Houdin for the scan. |


    ### Flow Description

    1. **Initialization**: The action initializes the HoudinManager using the provided
    API Key.

    2. **Filtering**: It iterates through the target entities, filtering for compatible
    types: Public IP (via `isIPExternal` check), Domain, File Hash, URL, and Destination
    URL.

    3. **Scan Launch**: For each compatible entity, it triggers a scan via the Houdin.io
    API (`/scan/launch`).

    4. **Polling**: It polls the Houdin.io API (`/scan/result`) for each scan ID until
    results are retrieved.

    5. **Enrichment**: It parses the scan results, specifically extracting the global
    score and summary from the 'mesmer' analysis.

    6. **Update**: It updates the `additional_properties` of the successful entities
    with the retrieved threat intelligence and adds the full result JSON to the action
    output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the `additional_properties` of the processed entities with threat scores
      and analysis summaries.
    reasoning: >-
      The action fetches threat intelligence data from Houdin.io by launching scans
      and polling results. It updates the entity's `additional_properties` with the
      retrieved data. It does not modify external systems or alert data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data (enrichment) and only performs allowed internal mutations
      (updating entities). It does not mutate external systems.
  entity_usage:
    entity_types:
    - ADDRESS
    - DOMAIN
    - FILEHASH
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters by specific types
      (`ADDRESS`, `DOMAIN`, `FILEHASH`, `DestinationURL`). It also performs a check
      on the identifier of `ADDRESS` entities to ensure they are external, but this
      is not a filter on the `is_internal` attribute.
