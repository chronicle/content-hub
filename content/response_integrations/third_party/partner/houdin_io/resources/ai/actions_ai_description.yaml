  ai_description: >-
    ### General Description

    This action enriches entities by scanning them using the Houdin.io platform. It
    retrieves threat intelligence, including threat scores, AI analysis summaries,
    and analysis sources, and updates the entity's `additional_properties` within
    the SOAR platform. This helps analysts quickly assess the risk associated with
    various indicators.


    ### Flow Description

    1. **Initialization**: The action initializes the `HoudinManager` using the provided
    API Key.

    2. **Filtering**: It iterates through the target entities, filtering for compatible
    types: Public IP (via `isIPExternal` check), Domain, File Hash, URL, and Destination
    URL.

    3. **Scan Launch**: For each compatible entity, it triggers a scan via the Houdin.io
    API (`/scan/launch`).

    4. **Polling**: It polls the Houdin.io API (`/scan/result`) for each scan ID until
    results are retrieved.

    5. **Enrichment**: It parses the scan results, specifically extracting the global
    score and summary from the 'mesmer' analysis.

    6. **Update**: It updates the `additional_properties` of the successful entities
    with the retrieved threat intelligence and adds the full result JSON to the action
    output.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | scanOn | multi_choice_parameter | No | An optional array of scanners (e.g.,
    vt, urlscan, alienvault, abuseipdb, triage, mesmer, servicenow) to be used by
    Houdin for the scan. |


    ### Additional Notes

    - The action is asynchronous; ensure the script timeout value in the Google SecOps
    IDE is adjusted if necessary to accommodate the polling duration.

    - Compatible entity types are: Public IPv4/IPv6, URL, Domain, MD5, SHA1, SHA256.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of entities with threat intelligence data
      (threat score, AI analysis, sources).
    reasoning: >-
      The action fetches threat intelligence data from the Houdin.io API (fetches_data=true).
      It does not perform any actions that change the state of external systems (can_mutate_external_data=false).
      It modifies internal SOAR data by updating entity `additional_properties` (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alert data, or
      create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action is designed to fetch contextual threat intelligence for entities
      and update them within the SOAR platform. It does not mutate external systems,
      nor does it perform prohibited internal mutations. It fits the definition of
      an Enrichment action.
  entity_usage:
    entity_types:
    - ADDRESS
    - DOMAIN
    - FILEHASH
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly filters for
      specific entity types: URL, ADDRESS (with an internal check), DOMAIN, FILEHASH,
      and DestinationURL. It uses these types to determine which entities to scan.
