  ai_description: >-
    ### General Description

    Enriches entities by performing scans on Houdin.io to retrieve threat intelligence
    and AI-driven analysis. The action supports multiple entity types including Public
    IP addresses, URLs, Domains, and File Hashes. It allows users to specify which
    scanners (e.g., VirusTotal, URLScan, AbuseIPDB, Triage) should be utilized for
    the enrichment process. Results, including threat scores and AI-generated summaries,
    are appended to the entities as additional properties, providing analysts with
    immediate context within the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | scanOn | Multi-choice | No | (Optional) An array of scanners you want Houdin
    to use. Supported options include: vt, urlscan, alienvault, abuseipdb, triage,
    mesmer, and servicenow. If not provided, Houdin uses its default scanner set.
    |


    ### Additional Notes

    - The action is asynchronous and involves polling the Houdin.io API for results
    after the initial scan request.

    - It specifically filters for Public IP addresses (global) and will skip internal/private
    IP addresses.

    - Compatible artifact types for scanning include: Public IPv4/IPv6, URL, Domain,
    MD5, SHA1, and SHA256 hashes.


    ### Flow Description

    1. **Filter Entities:** The action iterates through target entities and identifies
    compatible types: URL, Domain, FileHash, DestinationURL, or Public IP addresses
    (verified via global scope check).

    2. **Launch Scans:** For each compatible entity, it initiates a scan request to
    the Houdin.io API using the `launch_scan` method, passing the optional scanner
    list.

    3. **Poll Results:** The action polls the Houdin.io API for each generated scan
    ID until the analysis is complete or the maximum retry limit is reached.

    4. **Extract Intelligence:** It parses the returned scan results to extract the
    'Mesmer' global threat score, AI analysis summary, and the list of sources used
    for the scan.

    5. **Enrich Entities:** The action updates the `additional_properties` of the
    successful entities with the retrieved threat intelligence (e.g., `Houdin-io_Threat_Score`,
    `Houdin-io_AI_Analysis`).

    6. **Finalize:** It updates the entities in the case, adds a detailed JSON result
    for each entity, and returns a summary message of the processed indicators.
