    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The "Scan Artifact" action initiates a security scan on a specified artifact (such
    as an IP, URL, Domain, or File Hash) using the Houdin.io platform. It retrieves
    the scan results and provides them as the action output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | artifact | string | Yes | The artifact to scan (e.g., IPv4, IPv6, URL, Domain,
    MD5, SHA1, SHA256). |

    | scanOn | multi_choice_parameter | No | An optional array of scanners to use
    (e.g., vt, urlscan, alienvault, abuseipdb, triage, mesmer, servicenow). |


    ### Flow Description

    1. The action extracts the `artifact` and `scanOn` parameters.

    2. It calls the Houdin.io API to launch a scan for the provided artifact.

    3. It polls the Houdin.io API for the scan results until the scan is completed.

    4. The final scan result is added to the action output.


    ### Additional Notes

    This action is asynchronous. The script timeout value in the Google SecOps IDE
    should be adjusted if necessary to accommodate the scan duration.
