Enrich Entities:
  ai_description: >-
    ### General Description

    Scan compatible entities on Houdin.io, and add enrichment results for each one.
    Compatible types are: Public IPv4/IPv6, URL, Domain, MD5, SHA1, SHA256.


    ### Flow Description

    1. Extracts the API key and initializes the HoudinManager.

    2. Extracts the `scanOn` parameter to determine which scanners to use.

    3. Iterates over the target entities and filters them by compatible types (URL,
    external Address, Domain, FileHash).

    4. Launches a scan for each compatible entity by making a POST request to the
    Houdin.io API (`/api/v1/scan/launch`).

    5. Polls the Houdin.io API (`/api/v1/scan/result`) to retrieve the scan results
    for all launched scans.

    6. Extracts the threat score, AI analysis, and analysis sources from the results.

    7. Updates the entities' `additional_properties` with the extracted data.

    8. Calls `siemplify.update_entities` to save the enriched entities back to the
    case.

    9. Attaches the raw JSON results to the action's output.


    ### Additional Notes

    - The action runs asynchronously, so the script timeout value in the Google SecOps
    IDE might need adjustment as needed.
  ai_short_description: >-
    Scans compatible entities (IPs, URLs, Domains, Hashes) on Houdin.io and enriches
    them with threat scores and AI analysis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by polling scan results from Houdin.io. It does not
      mutate external data in a state-changing manner (like blocking an IP), but rather
      requests an analysis. It updates internal entities with the retrieved data using
      `siemplify.update_entities`. It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
