Enrich Entities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action enriches compatible entities (Public IPv4/IPv6,
    URL, Domain, and File Hashes) by scanning them on the Houdin.io platform. It retrieves
    comprehensive threat intelligence, including threat scores and AI-driven analysis
    summaries, and updates the entity attributes within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **scanOn** | multi_choice_parameter | No | An array of scanners you want Houdin
    to use. Supported options include: `vt`, `urlscan`, `alienvault`, `abuseipdb`,
    `triage`, `mesmer`, and `servicenow`. |


    ### Additional Notes

    - This action is **asynchronous**; ensure the script timeout in the Google SecOps
    IDE is adjusted if necessary to accommodate polling times.

    - **IP Filtering:** Only global (public) IP addresses are processed. Internal
    or private IP addresses are automatically skipped.

    - **File Hashes:** Compatible hash types include MD5, SHA1, and SHA256.

    - **Configuration:** Requires a valid API Key to be configured in the Houdin-io
    integration settings.


    ### Flow Description

    1. **Identify Compatible Entities:** The action filters the target entities for
    supported types: Public IPs, URLs, Domains, and File Hashes.

    2. **Launch Scans:** For each compatible entity, the action sends a POST request
    to Houdin.io to initiate a scan, optionally specifying the scanners to be used.

    3. **Poll for Results:** The action polls the Houdin.io API using the returned
    scan IDs until the analysis is complete.

    4. **Extract Intelligence:** It retrieves the threat score (from the Mesmer engine),
    an AI-generated analysis summary, and the list of analysis sources.

    5. **Enrich Entities:** The action updates the `additional_properties` of the
    entities in Google SecOps with the retrieved data and provides a detailed JSON
    result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      The action initiates a new scan job on the Houdin.io platform by sending a POST
      request with the entity identifier.
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the 'additional_properties' of entities in Google SecOps
      with threat scores, AI analysis summaries, and analysis sources.
