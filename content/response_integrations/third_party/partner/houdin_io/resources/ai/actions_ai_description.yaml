Scan Artifact:
  ai_description: >-
    ### General Description

    The **Scan Artifact** action allows users to submit a specific artifact (such
    as an IP address, URL, Domain, or File Hash) to the Houdin.io platform for comprehensive
    security analysis. It supports a variety of third-party scanners and returns the
    aggregated results directly into the Google SecOps platform. This action is asynchronous,
    meaning it initiates a scan and then polls for the results until the analysis
    is complete.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **artifact** | String | Yes | The specific indicator to be scanned. Supported
    formats include Public IPv4/IPv6, URL, Domain, MD5, SHA1, and SHA256. |

    | **scanOn** | Multi-choice | No | A list of specific scanners to be utilized
    by Houdin.io. Options include `vt` (VirusTotal), `urlscan`, `alienvault`, `abuseipdb`,
    `triage`, `mesmer`, and `servicenow`. If left empty, default scanners are used.
    |


    ### Flow Description

    1. **Initialization**: The action extracts the API Key from the integration configuration
    and the artifact/scanner details from the action parameters.

    2. **Scan Launch**: It sends a POST request to the Houdin.io API to initiate a
    scan for the provided artifact.

    3. **Polling**: Because the action is asynchronous, it enters a polling loop,
    periodically checking the status of the scan using the unique Scan ID received
    during the launch phase.

    4. **Data Retrieval**: Once the scan status indicates completion, the action retrieves
    the full JSON report of the findings.

    5. **Output**: The final results are attached to the action execution as a JSON
    result and a specific 'HoudinResult' object for use in downstream playbook logic.


    ### Additional Notes

    - This action is marked as **async**. Users should ensure that the script timeout
    in the Google SecOps IDE is configured to allow enough time for external scanners
    to complete their analysis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Houdin.io API to 'launch' a new scan
      job, which creates a new record/task on the external platform.
