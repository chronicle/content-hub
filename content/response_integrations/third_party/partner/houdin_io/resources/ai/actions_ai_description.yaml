  ai_description: >-
    ### General Description

    Tests the connectivity to the Houdin.io API. This action is used to verify that
    the integration is configured correctly and can successfully communicate with
    the Houdin.io platform.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration's configuration parameters (such as API Key and Verify SSL).


    ### Flow Description

    1. Initializes the action and extracts the integration configuration parameters
    (API Key, Verify SSL).

    2. Instantiates the HoudinManager and sends a ping request to the Houdin.io API.

    3. Evaluates the HTTP response.

    4. Returns a success message and a 'true' result if the connection is established,
    or an error message and a 'false' result if the connection fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only sends a ping request to the Houdin.io API to test connectivity.
      It does not fetch contextual data for alerts or entities, nor does it mutate
      any external data. It does not interact with internal SecOps data such as entities,
      insights, alerts, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      According to Rule 0.1, actions named 'Ping' must not be categorized as enrichment
      actions. Furthermore, it does not fetch data or perform any remediation tasks.
    remediation: false
  entity_usage:
