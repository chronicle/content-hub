Ping:
  ai_description: >-
    The Ping action is a utility designed to verify the connectivity between Google
    SecOps and the Houdin.io API. It ensures that the provided API Key is valid and
    that the network path to the service is open. This action is typically used during
    the initial setup of the integration or for troubleshooting communication issues.


    ### Flow Description:

    1. **Initialization**: The action retrieves the 'API Key' and 'Verify SSL' settings
    from the integration's global configuration.

    2. **Manager Setup**: It initializes the `HoudinManager` with these credentials.

    3. **Connectivity Test**: It calls the `test_connectivity` method, which sends
    a POST request to the Houdin.io `/ping` endpoint.

    4. **Validation**: The action checks the HTTP response status. If it receives
    a 200 OK, the connection is confirmed.

    5. **Completion**: The action returns a boolean 'true' on success or 'false' if
    an exception or authentication error occurs.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | No Action Parameters | N/A | N/A | This action does not take any input parameters;
    it relies solely on the integration's configuration (API Key and Verify SSL).
    |


    ### Additional Notes:

    * This action is strictly for health checks and does not process any entities
    or alert data.

    * It uses a POST request for the ping endpoint as required by the Houdin.io API
    specification.
