  ai_description: >-
    ### General Description

    Launches a scan on the Houdin.io platform for a specific artifact and retrieves
    the analysis results. This action supports multiple artifact types, including
    IP addresses (IPv4/IPv6), URLs, domains, and file hashes (MD5, SHA1, SHA256).
    It operates by initiating a scan job and then polling the Houdin API until the
    results are available.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | artifact | string | Yes | The specific artifact to be scanned. Supported types:
    IPv4, IPv6, URL, Domain, MD5, SHA1, SHA256. |

    | scanOn | multi_choice_parameter | No | A list of specific scanners to be utilized
    by Houdin (e.g., vt, urlscan, alienvault, abuseipdb, triage, mesmer, servicenow).
    |


    ### Flow Description

    1. **Setup**: The action extracts the API Key from the integration configuration
    and initializes the Houdin communication manager.

    2. **Input Processing**: It retrieves the `artifact` and the optional `scanOn`
    list of scanners from the action parameters.

    3. **Scan Initiation**: The action sends a POST request to the Houdin API to launch
    a new scan for the provided artifact.

    4. **Polling**: Because the scan takes time, the action enters a polling phase,
    repeatedly checking the status of the scan ID via GET requests until the analysis
    is finished.

    5. **Completion**: Once the scan is complete, the full result set is retrieved
    and attached to the action's output as a JSON result.


    ### Additional Notes

    This action is executed asynchronously. Users should ensure that the script timeout
    value in the Google SecOps IDE is set high enough to accommodate the time required
    for external scanners to complete their analysis.
