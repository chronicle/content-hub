  ai_description: >-
    ### General Description

    Enriches compatible entities (Public IPv4/IPv6, URL, Domain, MD5, SHA1, SHA256)
    using Houdin.io. The action launches a scan for each compatible entity, polls
    for the results, and retrieves threat intelligence including a threat score, AI
    analysis, and analysis sources. It then updates the entities' additional properties
    with the retrieved data.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | scanOn | False | String (Multi-choice) | An array of scanners you want Houdin
    to use (e.g., vt, urlscan, alienvault, abuseipdb, triage, mesmer, servicenow).
    If left empty, default scanners are used. |


    ### Flow Description

    1. Extracts the API key and initializes the HoudinManager.

    2. Iterates over the target entities and filters for compatible types (URL, external
    ADDRESS, DOMAIN, FILEHASH, DestinationURL).

    3. Launches a scan on Houdin.io for each compatible entity.

    4. Polls Houdin.io to retrieve the scan results for all launched scans.

    5. Updates the entities' additional properties with the retrieved threat score,
    AI analysis, and analysis sources.

    6. Returns the results as JSON and updates the entities in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches scan results from Houdin.io (fetches_data=true). It does
      not mutate external data, as it only submits IOCs for analysis (can_mutate_external_data=false).
      It updates entity additional properties (can_update_entities=true) but does
      not create insights, modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data to enrich entities and does not mutate external state
      or unauthorized internal state. Therefore, it is classified as an Enrichment
      action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - DOMAIN
    - FILEHASH
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type` for URL, ADDRESS, DOMAIN, FILEHASH, and DestinationURL.
      It also checks if ADDRESS entities are external using `isIPExternal(entity.identifier)`,
      which means it filters by identifier.
