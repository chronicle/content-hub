Scan Artifact:
  ai_description: >-
    ### General Description

    Launches a Houdin scan on a specified artifact (such as an IP address, URL, Domain,
    or Hash) and retrieves the scan results. The action initiates the scan on the
    Houdin platform and polls for its completion to return the final analysis.


    ### Flow Description

    1. Extracts the `artifact` and optional `scanOn` (scanners list) parameters from
    the action configuration.

    2. Makes a POST request to the Houdin API (`/api/v1/scan/launch`) to initiate
    a new scan job for the provided artifact.

    3. Polls the Houdin API (`/api/v1/scan/result`) using a GET request until the
    scan completes or the maximum number of retries is reached.

    4. Retrieves the final scan results and attaches them to the action's JSON result.


    ### Additional Notes

    - Supported artifact types include IPv4, IPv6, URL, Domain, MD5, SHA1, and SHA256.

    - Although the action is marked as async in the configuration, the script implements
    a synchronous polling mechanism with a sleep interval.
  ai_short_description: >-
    Launches a Houdin scan on a specified artifact and retrieves the analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new scan job on the Houdin platform for the specified artifact.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by polling for scan results (fetches_data=true). It
      mutates external data by making a POST request to launch a new scan job on the
      Houdin platform (can_mutate_external_data=true). It does not mutate internal
      data, update entities, create insights, modify alerts, or create case comments.
