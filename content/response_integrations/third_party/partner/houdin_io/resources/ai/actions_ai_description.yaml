    reasoning: >-
      The action does not reference or iterate over `siemplify.target_entities`. It
      performs a global connectivity check independent of any specific entities.
Scan Artifact:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action submits an artifact (like a URL or hash) to an analysis engine (Houdin)
      to be scanned and returns the behavior/threat report. This aligns with the 'Submit
      File' outcome, which covers submitting samples to analysis engines. It does
      not directly update SecOps entities, so it is not 'Enrich IOC'.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: true
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Launches a scan on a specified artifact (such as an IP address, URL, domain, or
    file hash) using the Houdin.io platform and retrieves the scan results. The action
    initiates the scan asynchronously and polls the Houdin API until the analysis
    is complete, returning the final threat report.


    ### Flow Description

    1. Extracts the `artifact` and optional `scanOn` parameters from the action configuration.

    2. Initiates a new scan job on the Houdin platform via a POST request.

    3. Polls the Houdin API at regular intervals to check the status of the scan.

    4. Once completed, retrieves the final scan report and attaches it to the action's
    JSON results.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | artifact | Yes | String | The artifact to scan on the Houdin.io platform. Supported
    types include IPv4, IPv6, URL, Domain, MD5, SHA1, and SHA256. |

    | scanOn | No | Multi-choice | An array of specific scanners to use (e.g., vt,
    urlscan, alienvault, abuseipdb). If left empty, Houdin will use its default routing
    or all applicable scanners. |


    ### Additional Notes

    This action runs asynchronously. It is recommended to adjust the script timeout
    value in the Google SecOps IDE to accommodate potentially long-running scans.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new scan job/task on the external Houdin platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to launch a scan job on the Houdin platform,
      which mutates external state by creating a task. It then polls for the results,
      fetching data. It does not modify internal SecOps data, update entities, or
      create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a scan job on an external platform (mutating external state),
      so it does not qualify as a strictly read-only Enrichment action. It does not
      perform any containment or remediation tasks, so it is not a Remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over `siemplify.target_entities`. It operates solely
      on the `artifact` string provided as an input parameter.
