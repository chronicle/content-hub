Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Houdin.io API to ensure the integration is configured
    correctly and can communicate with the service.


    ### Flow Description

    1. Extracts the API Key and SSL verification settings from the integration configuration.

    2. Makes a POST request to the Houdin.io `/ping` API endpoint to verify connectivity.

    3. Evaluates the response and returns a success message if the connection is established,
    or an error message if the connection fails.


    ### Additional Notes

    This action does not require any specific parameters and does not operate on entities.
    It is primarily used for diagnostic and setup verification purposes.
