    get_alert_information: false
    reasoning: >-
      The action submits an artifact to the Houdin.io platform for analysis, which
      aligns with the 'Submit File' category. It subsequently retrieves the scan results,
      including reputation and threat intelligence, which aligns with the 'Enrich
      IOC' category. It does not modify internal SecOps data or perform other containment
      actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: true
