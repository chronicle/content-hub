    get_alert_information: false
    reasoning: >-
      The action submits an artifact to the Houdin.io platform for analysis (matching
      'Submit File') and retrieves the resulting threat intelligence (matching 'Enrich
      IOC').
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: true
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The "Scan Artifact" action initiates a security scan on a specified artifact (such
    as an IP, URL, Domain, or File Hash) using the Houdin.io platform. It retrieves
    the scan results and provides them as the action output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | artifact | string | Yes | The artifact to scan (e.g., IPv4, IPv6, URL, Domain,
    MD5, SHA1, SHA256). |

    | scanOn | multi_choice_parameter | No | An optional array of scanners to use
    (e.g., vt, urlscan, alienvault, abuseipdb, triage, mesmer, servicenow). |


    ### Flow Description

    1. The action extracts the `artifact` and `scanOn` parameters.

    2. It calls the Houdin.io API to launch a scan for the provided artifact.

    3. It polls the Houdin.io API for the scan results until the scan is completed.

    4. The final scan result is added to the action output.


    ### Additional Notes

    This action is asynchronous. The script timeout value in the Google SecOps IDE
    should be adjusted if necessary to accommodate the scan duration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a scan on the Houdin.io platform via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action initiates a scan on an external platform (Houdin.io) via a POST request,
      which constitutes an external mutation. It then polls for and retrieves the
      scan results (fetches data). It does not modify internal SOAR data (case/alert
      data) or update entities.
  categories:
    enrichment: false
    reasoning: >-
      The action performs a POST request to launch a scan, which is an external mutation.
      Therefore, it does not meet the 'External State Preservation' requirement for
      an Enrichment Action.
  entity_usage:
