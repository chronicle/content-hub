    get_alert_information: false
    reasoning: >-
      The action retrieves threat intelligence (threat score, AI analysis) for indicators
      (IPs, Domains, Hashes, URLs) from Houdin.io. This matches the 'Enrich IOC' expected
      outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
