  reasoning: >-
    The houdin_io integration is designed to provide automated AI-driven cyber threat
    analysis. Its primary actions, 'Enrich Entities' and 'Scan Artifact', focus on
    processing external indicators (IPs, Domains, Hashes, URLs) to retrieve threat
    intelligence, including risk scores and analysis summaries. This functionality
    aligns perfectly with the 'Threat Intelligence' category, which is defined by
    the ability to enrich external indicators to determine their reputation and confirm
    if an alert is a True Positive. The integration does not perform functions related
    to SIEM log analysis, EDR host containment, network security gateway blocking,
    email management, IAM identity control, cloud resource management, ITSM ticketing,
    vulnerability scanning, asset inventory management, or collaboration/notification
    workflows.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
