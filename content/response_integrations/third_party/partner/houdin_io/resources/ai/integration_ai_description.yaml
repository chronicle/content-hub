  reasoning: >-
    The houdin_io integration is designed to provide automated AI-driven threat analysis
    for security indicators. Its primary actions, 'Enrich Entities' and 'Scan Artifact',
    focus on retrieving reputation scores, AI analysis summaries, and threat intelligence
    for external indicators such as IP addresses, domains, URLs, and file hashes.
    This functionality aligns directly with the Threat Intelligence category, which
    is defined by the enrichment of external indicators to determine their risk and
    reputation. The integration does not perform SIEM log analysis, EDR host-level
    operations, network gateway blocking, email security management, IAM operations,
    cloud resource management, ITSM ticketing, vulnerability management, asset inventory
    tracking, or collaboration/notification tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
