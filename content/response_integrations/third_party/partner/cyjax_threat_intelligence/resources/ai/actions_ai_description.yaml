  ai_description: "### General Description\nThis action tests the connectivity between\
    \ the Google SecOps SOAR platform and the Cyjax API. It validates the provided\
    \ integration configuration (API Token and SSL verification settings) to ensure\
    \ the SOAR platform can successfully communicate with the Cyjax service.\n\n###\
    \ Parameters Description\nThere are no action-specific parameters. The action\
    \ utilizes the integration configuration parameters defined in the Cyjax integration\
    \ settings:\n\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| API Token | String | Yes | The authentication token used to\
    \ access the Cyjax API. |\n| Verify SSL | Boolean | No | Whether to verify SSL\
    \ certificates when making API requests. Defaults to False. |\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the `SiemplifyAction` and retrieves\
    \ the integration configuration (API Token and Verify SSL) using `get_integration_params`.\n\
    2. **Manager Instantiation**: An `APIManager` instance is created using the retrieved\
    \ credentials.\n3. **Connectivity Test**: The action calls the `ping()` method,\
    \ which performs a GET request to the Cyjax API endpoint (`/indicator-of-compromise`).\n\
    4. **Result Handling**: \n    - If the API returns a successful response, the\
    \ action logs the success and sets the execution result to True.\n    - If an\
    \ exception occurs (e.g., unauthorized access, network error), the action logs\
    \ the error and sets the execution result to False.\n5. **Completion**: The action\
    \ terminates, reporting the connectivity status."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Cyjax API to verify connectivity. It
      does not modify any external systems, update internal entities, or create insights.
      It is a utility action for connectivity testing.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test ('Ping'). Per the instructions, actions named
