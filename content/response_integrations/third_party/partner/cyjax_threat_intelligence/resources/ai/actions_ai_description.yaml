Domain monitor:
  ai_description: >-
    ### General Description

    Retrieves information from the Cyjax Domain Monitor feature, which tracks brands
    against newly registered global domains and certificate transparency logs (CTL).
    This action allows analysts to search for potential malicious domains matching
    specific keywords within a given timeframe.


    ### Flow Description

    1. Extracts the `Query`, `Since`, and `Until` parameters provided by the user.

    2. Validates the date parameters to ensure they are in the correct ISO8601 format
    and that the start date does not exceed the end date.

    3. Makes a paginated GET request to the Cyjax API (`/domain-monitor/potential-malicious-domain`)
    to fetch the domain monitor results.

    4. Parses the returned data, formats it into a CSV structure, and attaches it
    as a data table to the action results.

    5. Returns the raw JSON response as part of the action's JSON results.


    ### Additional Notes

    The action automatically handles API pagination but enforces a hard limit of 1,000
    records to prevent memory and performance issues. If the limit is reached or a
    partial error occurs during pagination, the action will output a warning message
    indicating that the results may be incomplete.
  ai_short_description: >-
    Retrieves information from the Cyjax Domain Monitor feature to track brands against
    newly registered global domains and certificate transparency logs based on a specific
    query and timeframe.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Cyjax API using a GET request. It does not
      perform any state-changing operations (POST/PUT/DELETE) on external systems.
      Internally, it only attaches a data table and JSON results to the action output,
      but does not update entities, create insights, modify alerts, or add case comments.
