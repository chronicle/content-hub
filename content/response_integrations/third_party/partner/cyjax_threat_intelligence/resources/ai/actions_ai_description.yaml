  ai_description: >-
    ### General Description

    Enriches Indicators of Compromise (IOCs) using Cyjax threat intelligence. This
    action retrieves contextual threat intelligence data, including GeoIP, ASN, and
    sightings information, for the entities attached to the case.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the entities
    provided in the case and the global integration configuration (API Token and Verify
    SSL).


    ### Flow Description

    1. Retrieves all target entities attached to the case.

    2. Initializes the Cyjax API client using the integration parameters.

    3. Iterates over the entities and queries the Cyjax API (`/indicator-of-compromise/enrichment`)
    for each entity's identifier.

    4. Clears any old Cyjax enrichment data from the entities.

    5. Updates the entities with the newly retrieved enrichment data (GeoIP, ASN,
    sightings) and marks them as enriched (`is_enriched = True`).

    6. Outputs the results as a JSON object and attaches a data table to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities with enrichment data (GeoIP, ASN, sightings) and sets the
      is_enriched flag to True.
    reasoning: >-
      The action fetches data from the Cyjax API using GET requests (fetches_data=True).
      It does not make any POST/PUT/DELETE requests to external systems, so it does
      not mutate external data (can_mutate_external_data=False). It modifies internal
      data by updating the entities with the retrieved enrichment data and setting
      their is_enriched flag (can_mutate_internal_data=True, can_update_entities=True).
      It does not create insights, modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Cyjax) to gather supplemental
      context about entities. It does not mutate any external state. Its internal
      mutations are restricted to updating entity fields, which is an allowed internal
      mutation for enrichment actions. Therefore, it is classified as an Enrichment
      action. It does not perform any remediation tasks such as blocking IPs or disabling
      identities, so it is not a Remediation action.
    remediation: false
