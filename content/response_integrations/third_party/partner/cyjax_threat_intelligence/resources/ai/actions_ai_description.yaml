    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates a data table named "Domain Monitor Results" within the Google
      SecOps case to display the retrieved domain monitoring records.
