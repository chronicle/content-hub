Domain monitor:
  ai_description: >-
    ### General Description

    The **Domain Monitor** action retrieves information from the Cyjax Domain Monitor
    feature. This feature is designed to track specific brands against newly registered
    global domains and Certificate Transparency Logs (CTL) to identify potential brand
    impersonation or malicious domain registrations. The action allows users to search
    for specific domain strings and filter results by a time range.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | No | A query string used to search for a specific domain
    or a partial domain match. |

    | **Since** | String | No | The start date and time for the search in ISO8601
    format (e.g., `2026-02-09T15:01:39Z`). |

    | **Until** | String | No | The end date and time for the search in ISO8601 format
    (e.g., `2026-02-09T15:01:39Z`). |


    ### Additional Notes

    - The action performs automatic pagination and can retrieve up to a maximum of
    1000 records from the Cyjax API.

    - If the `Since` date is configured to be later than the `Until` date, the action
    will fail with a validation error.

    - Results are presented both as a data table for quick review and as a raw JSON
    object for downstream playbook processing.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API token and SSL verification
    settings from the integration configuration, followed by the `Query`, `Since`,
    and `Until` action parameters.

    2. **Validation:** It validates that the provided dates are in the correct ISO8601
    format and ensures the start date is not after the end date.

    3. **API Interaction:** The action initializes the Cyjax API client and calls
    the Domain Monitor endpoint. It handles pagination automatically to fetch all
    available results up to the 1000-record limit.

    4. **Data Processing:** Retrieved records are parsed into a structured data model.
    If results are found, they are formatted into a CSV-style list for the data table.

    5. **Output Generation:** The action populates a data table named "Domain Monitor
    Results" in the Google SecOps case wall and attaches the full result set as a
    JSON object. It then concludes with a status message indicating the number of
    records found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
