Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity between Google SecOps SOAR and the Cyjax instance
    by making an authenticated API call. It validates the provided asset configuration
    parameters and verifies that the credentials have the necessary permissions.


    ### Flow Description

    1. Retrieves the integration-level configuration parameters (API Token and Verify
    SSL).

    2. Initializes the Cyjax API manager with the provided credentials.

    3. Makes a GET request to the Cyjax API to verify connectivity and authentication.

    4. Returns a successful result if the connection is established, or fails the
    action if an error occurs.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Cyjax service.
