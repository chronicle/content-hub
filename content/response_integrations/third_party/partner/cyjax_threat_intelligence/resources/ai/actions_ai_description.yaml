  ai_description: >-
    ### General Description

    The "List Data Breaches" action retrieves a list of data breaches from Cyjax based
    on search queries. It fetches breach information including ID, email, source,
    breach name, data classes, and discovery date, and outputs the results as a data
    table and JSON.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | No | A query string to search for an email address or part
    of it. Used to filter the data breaches. |

    | Since | String | No | The start date time in ISO8601 format (e.g., 2026-02-09T15:01:39Z).
    Used to filter breaches discovered after this date. |

    | Until | String | No | The end date time in ISO8601 format (e.g., 2026-02-09T15:01:39Z).
    Used to filter breaches discovered before this date. |


    ### Additional Notes

    - The `Since` date cannot be greater than the `Until` date. If both are provided,
    they must form a valid time range.

    - The action automatically handles pagination and retrieves up to a maximum of
    1000 records.


    ### Flow Description

    1. Extracts and validates the action parameters (`Query`, `Since`, `Until`).

    2. Initializes the Cyjax API client using the provided integration credentials.

    3. Queries the Cyjax API for data breaches using the provided parameters, handling
    pagination automatically up to 1000 records.

    4. Formats the retrieved data and adds it to the action result as a data table
    ("Data Breach Results") and JSON.

    5. Returns a success or failure status based on the API response.
