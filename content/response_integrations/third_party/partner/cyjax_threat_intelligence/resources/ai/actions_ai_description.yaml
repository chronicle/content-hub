  ai_description: "### General Description\nThe **Enrich IOCs** action retrieves threat\
    \ intelligence data for Indicators of Compromise (IOCs) using the Cyjax API. It\
    \ fetches contextual information such as GeoIP, ASN, and sighting details for\
    \ various entity types (e.g., Domain, Email, Hostname, FileHash, IP, URL, CVE).\
    \ The action updates the entity's profile within the SOAR platform with this enrichment\
    \ data, marks the entity as enriched, and provides a summary table of the results.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| API Token | String | Yes | The API token used for authentication\
    \ with the Cyjax service. |\n| Verify SSL | Boolean | No | If enabled, verifies\
    \ the SSL certificate for API requests. Defaults to False. |\n\n### Flow Description\n\
    1. **Initialization**: The action retrieves the integration configuration (API\
    \ Token, Verify SSL) and initializes the Cyjax API client.\n2. **Entity Retrieval**:\
    \ It retrieves all target entities associated with the current case.\n3. **Enrichment**:\
    \ For each entity, the action performs a GET request to the Cyjax `/indicator-of-compromise/enrichment`\
    \ endpoint.\n4. **Data Processing**: \n    - If enrichment data is found, it parses\
    \ the response (GeoIP, ASN, Sightings).\n    - It removes any existing Cyjax-specific\
    \ enrichment data from the entity.\n    - It updates the entity's `additional_properties`\
    \ with the new enrichment data and sets `is_enriched` to True.\n5. **Update**:\
    \ The action updates the enriched entities in the SOAR platform.\n6. **Reporting**:\
    \ It adds a data table containing the enrichment results to the action output\
    \ and returns a status message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity `additional_properties` with enrichment data and sets `is_enriched`
      to True.
    reasoning: >-
      The action fetches threat intelligence data from the Cyjax API (GET requests)
      and updates the entities within the SOAR platform with the retrieved enrichment
      data. It does not mutate external systems, modify alert data, or create insights/comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Cyjax) and updates internal
      entity attributes. It does not mutate external systems or perform forbidden
      internal mutations. It is a valid enrichment action.
