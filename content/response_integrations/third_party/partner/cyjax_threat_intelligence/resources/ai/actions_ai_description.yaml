  ai_description: >-
    ### General Description

    This action retrieves a list of data breaches from the Cyjax platform based on
    optional search criteria. It allows users to filter results by a query string
    and a specific date range, providing visibility into compromised credentials.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | string | No | A query string to search for an email address or part
    of it. |

    | Since | string | No | The start date time in ISO8601 format (e.g., 2026-02-09T15:01:39Z).
    |

    | Until | string | No | The end date time in ISO8601 format (e.g., 2026-02-09T15:01:39Z).
    |


    ### Additional Notes

    The action automatically handles pagination up to a limit of 1000 records. If
    the limit is reached, a note is added to the output message.


    ### Flow Description

    1. Extracts configuration parameters (Query, Since, Until).

    2. Validates the provided date range.

    3. Initializes the Cyjax API client.

    4. Queries the Cyjax API for data breaches, handling pagination automatically.

    5. Processes the retrieved data into a structured format.

    6. Displays the results in a data table within the case and returns the raw JSON
    output.
