  ai_description: >-
    Retrieves information from the Cyjax Domain Monitor feature, which tracks brands
    against newly registered global domains and Certificate Transparency Logs (CTL).
    This action allows users to search for specific domain patterns or monitor registrations
    within a specific timeframe. The results provide visibility into potentially malicious
    or brand-infringing domains.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | No | A query string to search for a domain or part of it. |

    | Since | String | No | The start date time in ISO8601 format (e.g., 2026-02-09T15:01:39Z).
    |

    | Until | String | No | The end date time in ISO8601 format (e.g., 2026-02-09T15:01:39Z).
    |


    ### Additional Notes

    - The action retrieves a maximum of 1000 records due to API pagination limits.

    - If no results are found, the action completes successfully with an informative
    message.

    - Dates must be provided in the YYYY-MM-DDTHH:MM:SSZ format.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the `Query`, `Since`, and `Until` parameters
    from the action configuration.

    2. **Validation:** Validates that the provided dates are in the correct ISO8601
    format and that the `Since` date is not after the `Until` date.

    3. **API Request:** Initializes the Cyjax API client and performs a paginated
    search against the Domain Monitor endpoint.

    4. **Data Processing:** Parses the raw API response into structured domain monitor
    results, limiting the output to the first 1000 records.

    5. **Output Generation:** Populates a data table named "Domain Monitor Results"
    and attaches the full JSON response to the action results.
