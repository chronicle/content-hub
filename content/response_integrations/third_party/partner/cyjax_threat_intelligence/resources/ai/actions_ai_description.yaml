  ai_description: >-
    ### General Description

    This action retrieves information for the Domain Monitor feature in Cyjax. It
    tracks brands against newly registered global domains and certificate transparency
    logs (CTL) by querying the Cyjax API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | No | A query string to search for a domain or part of it. |

    | Since | String | No | The start date time in ISO8601 format. Ex: 2026-02-09T15:01:39Z.
    |

    | Until | String | No | The end date time in ISO8601 format. Ex: 2026-02-09T15:01:39Z.
    |


    ### Additional Notes

    - The action automatically paginates through the API results, retrieving up to
    a maximum of 1000 records.

    - If the 'Since' date is provided, it must not be greater than the 'Until' date.


    ### Flow Description

    1. Extracts and validates the action parameters, ensuring correct date formats.

    2. Initializes the Cyjax API client with the provided integration credentials.

    3. Queries the Cyjax Domain Monitor endpoint using the provided parameters.

    4. Paginates through the results to fetch up to 1000 records.

    5. Formats the retrieved data into a CSV data table and attaches it to the action
    results.

    6. Returns the raw JSON results and completes the action execution.
