List Data Breaches:
  ai_description: "### General Description\nThe **List Data Breaches** action retrieves\
    \ a list of email addresses and associated metadata that have been identified\
    \ in data breaches, using the Cyjax Threat Intelligence platform. It allows analysts\
    \ to search for specific email addresses or patterns and filter results by a specific\
    \ time range. The action provides visibility into leaked credentials, including\
    \ the source of the breach, the specific data classes exposed (e.g., passwords,\
    \ usernames), and the discovery date.\n\n### Parameters Description\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Query**\
    \ | string | No | A query string to search for a specific email address or a partial\
    \ string. If omitted, the action retrieves general breach data based on time filters.\
    \ |\n| **Since** | string | No | The start date and time for the search in ISO8601\
    \ format (e.g., `2026-02-09T15:01:39Z`). |\n| **Until** | string | No | The end\
    \ date and time for the search in ISO8601 format (e.g., `2026-02-09T15:01:39Z`).\
    \ |\n\n### Additional Notes\n- The action implements automatic pagination and\
    \ will retrieve up to a maximum of 1,000 records from the Cyjax API.\n- If the\
    \ `Since` date is configured to be later than the `Until` date, the action will\
    \ fail with a validation error.\n- Results are presented both as a formatted data\
    \ table for quick review and as a raw JSON object for downstream playbook processing.\n\
    \n### Flow Description\n1. **Parameter Extraction:** The action retrieves the\
    \ `Query`, `Since`, and `Until` parameters provided by the user.\n2. **Validation:**\
    \ It validates that the provided dates are in the correct ISO8601 format and ensures\
    \ the start date is not after the end date.\n3. **API Interaction:** The action\
    \ initializes the Cyjax API client and performs a GET request to the data leak\
    \ credentials endpoint.\n4. **Pagination:** It automatically iterates through\
    \ result pages until all matching records are found or the 1,000-record limit\
    \ is reached.\n5. **Data Processing:** The raw API response is parsed into structured\
    \ data models.\n6. **Output Generation:** \n    - A data table named \"Data Breach\
    \ Results\" is added to the case, containing columns for ID, Email, Source, Breach\
    \ Name, Data Classes, and Discovery Date.\n    - The full result set is attached\
    \ as a JSON object to the action's output."
