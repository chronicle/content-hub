Enrich IOCs:
  ai_description: >-
    Enriches Indicators of Compromise (IOCs) using Cyjax threat intelligence. This
    action retrieves detailed contextual information for various indicator types,
    including sightings from monitored sources, GeoIP data, and ASN details. It automatically
    processes entities within the case, updates their properties with the retrieved
    intelligence, and provides a summary table for quick analysis.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require manual parameters; it automatically
    processes all supported entities attached to the case. |


    ### Additional Notes

    - Supported IOC types include: Domain, Email, Hostname, FileHash (MD5, SHA1, SHA256),
    IPv4, IPv6, URL, and CVE.

    - The action clears any existing Cyjax-prefixed enrichment data on the entity
    before applying new results to ensure data freshness.


    ### Flow Description

    1. **Entity Retrieval**: The action identifies all target entities associated
    with the current case.

    2. **API Interaction**: For each entity, the action queries the Cyjax API's enrichment
    endpoint using the entity's identifier.

    3. **Data Cleaning**: Existing enrichment properties (prefixed with 'Cyjax_')
    on the entity are reset to ensure no stale data remains.

    4. **Enrichment**: The action parses the API response to extract GeoIP (city,
    country), ASN (organization, number), and sighting information.

    5. **Internal Update**: Entity attributes are updated with the new intelligence,
    and the entity is marked as 'enriched'.

    6. **Reporting**: A data table named 'Enriched IOCs' is added to the case, and
    a JSON result containing the raw data is attached.
