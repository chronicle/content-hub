  ai_description: "Lists all email addresses and associated data breach records collected\
    \ by Cyjax. This action allows users to search for specific email addresses or\
    \ patterns within the Cyjax data leak database and filter results by a specific\
    \ time range. It retrieves detailed information about each breach, including the\
    \ breach name, source, discovery date, and the types of data classes (e.g., passwords,\
    \ usernames) that were compromised.\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ The action retrieves the `Query`, `Since`, and `Until` parameters from the user\
    \ input.\n2. **Validation:** It validates that the provided dates are in the correct\
    \ ISO8601 format (`YYYY-MM-DDTHH:MM:SSZ`) and ensures the `Since` date is not\
    \ later than the `Until` date.\n3. **API Initialization:** Initializes the Cyjax\
    \ API manager using the configured API token.\n4. **Data Retrieval:** Executes\
    \ a paginated GET request to the Cyjax `/data-leak/credentials` endpoint. It automatically\
    \ handles pagination to fetch up to 1,000 records.\n5. **Output Generation:**\
    \ \n    *   Converts the raw API response into a structured data table named 'Data\
    \ Breach Results'.\n    *   Attaches the full raw data as a JSON result for further\
    \ processing in the playbook.\n    *   Provides a status message indicating the\
    \ number of records found and any pagination limits reached.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Query | String | False | A search string used to find an email\
    \ address or a partial match within the breach database. |\n| Since | String |\
    \ False | The start date and time for the search in ISO8601 format (e.g., 2026-02-09T15:01:39Z).\
    \ |\n| Until | String | False | The end date and time for the search in ISO8601\
    \ format (e.g., 2026-02-09T15:01:39Z). |\n\n### Additional Notes\n*   **Pagination\
    \ Limit:** The action is hardcoded to retrieve a maximum of 1,000 records to prevent\
    \ performance issues. If the limit is reached, a note is added to the output message.\n\
    *   **Date Format:** Both `Since` and `Until` must strictly follow the `YYYY-MM-DDTHH:MM:SSZ`\
    \ format."
