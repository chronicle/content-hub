Enrich IOCs:
  ai_description: >-
    ### General Description

    Enriches Indicators of Compromise (IOCs) using Cyjax threat intelligence. This
    action retrieves threat intelligence data, including GeoIP, ASN, and sightings
    information, for the provided entities and updates them within the case.


    ### Flow Description

    1. Retrieves target entities attached to the case.

    2. Initializes the Cyjax API client using integration-level credentials.

    3. Iterates through the entities and makes a GET request to the Cyjax `/indicator-of-compromise/enrichment`
    API endpoint for each entity identifier.

    4. Parses the API response to extract enrichment data such as GeoIP, ASN, and
    sightings.

    5. Removes any previously existing Cyjax enrichment data from the entity's additional
    properties to ensure data freshness.

    6. Updates the entity's additional properties with the newly fetched enrichment
    data and marks the entity as enriched (`is_enriched = True`).

    7. Saves the updated entities back to the Google SecOps platform.

    8. Outputs the enrichment results as a JSON object and a data table.


    ### Additional Notes

    The action processes all target entities attached to the case without explicit
    type filtering in the code, though it is primarily designed for standard IOC types
    like Domain, Email, IP, and Hashes.
  ai_short_description: >-
    Enriches Indicators of Compromise (IOCs) by retrieving threat intelligence data
    such as GeoIP, ASN, and sightings from Cyjax, and updates the entities in the
    case with this information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
