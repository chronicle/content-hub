    reasoning: >-
      The action queries the Cyjax API to retrieve threat intelligence, GeoIP, ASN,
      and sightings for indicators of compromise. This directly aligns with the 'Enrich
      IOC' expected outcome. It does not modify alerts, create tickets, block/allow
      IOCs, or perform any endpoint/identity remediation.
    remove_ioc_from_allowlist: false
