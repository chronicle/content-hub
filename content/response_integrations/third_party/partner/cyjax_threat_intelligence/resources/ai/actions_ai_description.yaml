List Data Breaches:
  ai_description: >-
    ### General Description

    This action queries the Cyjax Threat Intelligence platform to list data breaches
    and collected email addresses based on specified search criteria. It retrieves
    detailed breach information, including the breach ID, name, associated data classes,
    and discovery dates.


    ### Flow Description

    1. Extracts the `Query`, `Since`, and `Until` parameters provided by the user.

    2. Validates the date formats and ensures the `Since` date is not greater than
    the `Until` date.

    3. Initializes the Cyjax API client and sends a GET request to the `/data-leak/credentials`
    endpoint with the provided parameters.

    4. Automatically paginates through the API results to retrieve up to 1000 records.

    5. Formats the retrieved data breach records into a CSV table and attaches it
    to the action results, along with the raw JSON output.


    ### Additional Notes

    - The action automatically handles pagination but is hard-capped at retrieving
    a maximum of 1000 records per execution.

    - If the API rate limit is reached or a server error occurs during pagination,
    the action will return the records fetched up to that point and include a partial
    error note in the output message.
  ai_short_description: >-
    Queries the Cyjax Threat Intelligence platform to retrieve a list of data breaches
    and associated email addresses based on search criteria, returning the results
    as a data table and JSON.
