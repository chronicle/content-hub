  ai_description: >-
    ### General Description

    Enriches Indicators of Compromise (IOCs) using the Cyjax threat intelligence platform.
    This action retrieves comprehensive contextual data for various indicator types,
    including sightings from monitored sources, GeoIP location information, and Autonomous
    System Number (ASN) details. It is designed to provide analysts with immediate
    visibility into the prevalence and origin of a threat actor's infrastructure.


    ### Parameters Description

    This action does not require any manual input parameters. It automatically processes
    all supported entities currently attached to the case.


    ### Flow Description

    1. **Entity Retrieval**: The action identifies all target entities associated
    with the current Google SecOps case.

    2. **API Interaction**: For each entity, the action performs a GET request to
    the Cyjax API's enrichment endpoint using the entity's identifier.

    3. **Data Cleaning**: Before applying new data, the action clears any existing
    Cyjax-specific enrichment properties (prefixed with `Cyjax_`) from the entity
    to ensure data freshness.

    4. **Entity Enrichment**: The action updates the entity's additional properties
    with retrieved intelligence, including `Cyjax_Last_Seen`, `Cyjax_Sightings_Count`,
    GeoIP details (Country, City), and ASN organization/number.

    5. **Internal State Update**: The action marks the entities as enriched and updates
    them within the Google SecOps platform.

    6. **Reporting**: Finally, it generates a detailed CSV data table named "Enriched
    IOCs" and attaches the raw JSON results to the case for further analysis.


    ### Additional Notes

    Supported IOC types include Domain, Email, Hostname, FileHash (MD5, SHA1, SHA256),
    IPv4, IPv6, URL, and CVE. If an IOC is not found in the Cyjax database, the action
    will report it as 'not found' in the output message without failing the entire
    execution.
