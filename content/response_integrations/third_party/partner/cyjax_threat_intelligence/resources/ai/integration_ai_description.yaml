  reasoning: >-
    The Cyjax Threat Intelligence integration is primarily a Threat Intelligence platform.
    Its core functionality, specifically the 'Enrich IOCs' action, provides external
    context (GeoIP, ASN, sightings) for indicators of compromise, which is the definition
    of Threat Intelligence enrichment. The 'Domain monitor' and 'List Data Breaches'
    actions allow users to search external threat databases for exposure, which is
    a common capability of Threat Intelligence services. It does not interact with
    internal logs (SIEM), host-level processes (EDR), network gateways (Network Security),
    or perform identity/asset management, ticketing, or collaboration tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
