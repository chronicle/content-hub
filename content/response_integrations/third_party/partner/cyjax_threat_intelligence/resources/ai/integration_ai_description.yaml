  reasoning: >-
    The integration is primarily focused on providing threat intelligence capabilities.
    The 'Enrich IOCs' action directly aligns with the 'Threat Intelligence' category
    by fetching reputation data, sightings, and contextual information for various
    indicators (IPs, Hashes, Domains, URLs). The 'Domain monitor' and 'List Data Breaches'
    actions provide additional intelligence gathering capabilities, which further
    support this classification. The integration does not perform SIEM log analysis,
    EDR host-level investigation, network blocking, identity management, or ITSM ticketing
    functions. Therefore, it is classified exclusively under Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
