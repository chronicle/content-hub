name: Remediate Messages
description: Take automated remediation action on email messages identified as threats.
    Returns an Activity Log ID that can be passed to Get Activity Status to verify
    the operation completed successfully.
integration_identifier: AbnormalSecurity
parameters:
-   name: Action
    default_value: delete
    type: string
    description: 'Remediation action to take. Valid values: delete, move_to_inbox,
        submit_to_d360.'
    is_mandatory: true
-   name: Source
    default_value: abnormal
    type: string
    description: 'Source of the messages. Valid values: abnormal, quarantine.'
    is_mandatory: true
-   name: Messages JSON
    default_value: '[Event.event_extracted_event.abx_body.abx_message_id_str]'
    type: string
    description: 'Either a single message ID (auto-fills from the current message via
        the string message-ID field abx_message_id_str — never the numeric abx_message_id,
        which loses precision) or a JSON array of message objects (typically the output
        of Search Messages). Each object should include: tenant_id (int), raw_message_id,
        mailbox_name, native_user_id, subject, sender, received_time (ISO 8601). Example:
        [{"tenant_id": 123, "raw_message_id": "AAMkAGI2THVSAAA=", "mailbox_name": "user@company.com",
        "native_user_id": "user@company.com", "subject": "Phishing", "sender": "attacker@bad.com",
        "received_time": "2025-01-15T10:30:00Z"}]'
    is_mandatory: true
-   name: Remediation Reason
    default_value: false_negative
    type: string
    description: 'Reason for remediation. Valid values: false_negative, unsolicited,
        other, groups_remediation, quarantine_release. Note: quarantine_release requires
        source=quarantine; groups_remediation is only valid with action=delete.'
    is_mandatory: true
-   name: Tenant IDs
    default_value: ''
    type: string
    description: Comma-separated list of tenant IDs to scope remediation. Leave empty
        to apply to all authorized tenants.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/RemediateMessages_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
