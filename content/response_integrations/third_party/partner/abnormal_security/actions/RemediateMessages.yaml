name: Remediate Messages
description: Take automated remediation action on email messages identified as threats.
    Returns an Activity Log ID that can be passed to Get Activity Status to verify
    the operation completed successfully.
integration_identifier: AbnormalSecurity
parameters:
-   name: Action
    default_value: delete
    type: string
    description: 'Remediation action to take. Valid values: delete, move_to_inbox,
        submit_to_d360, reclassify.'
    is_mandatory: true
-   name: Messages
    default_value: ''
    type: string
    description: Comma-separated list of message IDs to remediate.
    is_mandatory: true
-   name: Remediation Reason
    default_value: false_negative
    type: string
    description: 'Reason for remediation. Valid values: false_negative, false_positive,
        manual_remediation.'
    is_mandatory: true
-   name: Tenant IDs
    default_value: ''
    type: string
    description: Comma-separated list of tenant IDs. Leave empty to apply to all tenants.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/RemediateMessages_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
