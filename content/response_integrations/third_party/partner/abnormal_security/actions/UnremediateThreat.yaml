name: Unremediate Threat
description: Reverse a remediation on an Abnormal Security threat. Convenience action for `Post Threat Action` with action=unremediate hard-coded.
integration_identifier: AbnormalSecurity
parameters:
-   name: Threat ID
    default_value: '[Alert.AlertIdentifier]'
    type: string
    description: The unique identifier of the threat. Defaults to the alert's identifier
        when running from a case ingested by the Abnormal Security connector.
    is_mandatory: true
-   name: Message IDs
    default_value: ''
    type: string
    description: Comma-separated list of specific message IDs to act on within the
        threat. Leave empty to act on all messages.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/UnremediateThreat_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
