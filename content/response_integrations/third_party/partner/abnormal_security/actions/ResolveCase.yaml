name: Resolve Case
description: Acknowledge an Abnormal Security case as resolved. Convenience action for `Post Case Action` with action=acknowledge_resolved hard-coded.
integration_identifier: AbnormalSecurity
parameters:
-   name: Case ID
    default_value: '[Alert.AlertIdentifier]'
    type: string
    description: The unique identifier of the case. Defaults to the alert's identifier
        when running from a case ingested by the Abnormal Security connector.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/ResolveCase_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
