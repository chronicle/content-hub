name: Post Case Action
description: Update the status of an Abnormal Security case. Use 'action_required'
    to flag a case for attention, 'acknowledge' to mark it as reviewed, or 'close'
    to close the case.
integration_identifier: AbnormalSecurity
entity_types:
- THREATCAMPAIGN
parameters:
-   name: Case ID
    default_value: '[Event.event_extracted_event.abx_body.case_id]'
    type: string
    description: The unique identifier of the case to act on. When the action is run with scope on a ThreatCampaign entity, this resolves to the entity's identifier (the Abnormal case_id).
    is_mandatory: true
-   name: Action
    default_value: action_required
    type: string
    description: 'Action to take on the case. Valid values: action_required, acknowledge_resolved,
        acknowledge_in_progress, acknowledge_not_an_attack.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/PostCaseAction_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
