name: Get Case Analysis
description: Retrieve the detailed analysis for an Abnormal Security case, including
    findings, attack signals, and supporting evidence beyond what Get Case returns.
integration_identifier: AbnormalSecurity
entity_types:
- THREATCAMPAIGN
parameters:
-   name: Case ID
    default_value: '[Event.event_extracted_event.abx_body.case_id]'
    type: string
    description: The unique identifier of the case to act on. When the action is run with scope on a ThreatCampaign entity, this resolves to the entity's identifier (the Abnormal case_id).
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/GetCaseAnalysis_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
