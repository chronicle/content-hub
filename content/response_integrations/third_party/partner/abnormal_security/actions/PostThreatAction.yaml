name: Post Threat Action
description: Take a remediation action on an Abnormal Security threat. Use 'remediate'
    to remediate detected messages, or 'unremediate' to reverse a remediation.
integration_identifier: AbnormalSecurity
parameters:
-   name: Threat ID
    default_value: '[Alert.AlertIdentifier]'
    type: string
    description: The unique identifier of the threat to act on. Defaults to the alert's
        identifier when running from a case ingested by the Abnormal Security connector.
    is_mandatory: true
-   name: Action
    default_value: remediate
    type: string
    description: 'Action to take on the threat. Valid values: remediate, unremediate.'
    is_mandatory: true
-   name: Message IDs
    default_value: ''
    type: string
    description: Comma-separated list of specific message IDs to act on within the
        threat. Leave empty to act on all messages.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/PostThreatAction_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
