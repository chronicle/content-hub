name: Get Threat Links
description: Retrieve the list of URLs/links observed in the messages of an Abnormal
    Security threat. Useful for enriching investigations with the URLs the attacker
    used.
integration_identifier: AbnormalSecurity
parameters:
-   name: Threat ID
    default_value: '[Alert.AlertIdentifier]'
    type: string
    description: The unique identifier of the threat. Defaults to the alert's identifier
        when running from a case ingested by the Abnormal Security connector.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/GetThreatLinks_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
