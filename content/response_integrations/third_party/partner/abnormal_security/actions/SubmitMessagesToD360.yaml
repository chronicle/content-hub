name: Submit Messages To D360
description: Submit messages to Abnormal's Detection 360 service for re-analysis. Convenience action for `Remediate Messages` with action=submit_to_d360 hard-coded.
integration_identifier: AbnormalSecurity
parameters:
-   name: Source
    default_value: abnormal
    type: string
    description: 'Source mailbox for the messages. Valid values: abnormal, quarantine.'
    is_mandatory: true
-   name: Messages JSON
    default_value: '[Event.event_extracted_event.abx_body.abx_message_id_str]'
    type: string
    description: Either a JSON array of message objects (typically the output of Search
        Messages) or a single message ID. When run on the current message, the string
        message ID auto-fills from the event. Always use the string message-ID field
        (abx_message_id_str) — the numeric abx_message_id loses precision in transit.
    is_mandatory: true
-   name: Remediation Reason
    default_value: false_negative
    type: string
    description: 'Reason for remediation. Valid values: false_negative, unsolicited,
        other, groups_remediation, quarantine_release.'
    is_mandatory: true
-   name: Tenant IDs
    default_value: ''
    type: string
    description: Optional comma-separated tenant IDs.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/SubmitMessagesToD360_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
