Get Activity Status:
  ai_description: >-
    ### General Description

    Checks the status of a remediation operation in Abnormal Security using an Activity
    Log ID. This action is designed to be polled until the remediation reaches a terminal
    state (success, partial_success, or error), providing visibility into asynchronous
    message remediation tasks.


    ### Flow Description

    1. Extracts the `Activity Log ID` and optional `Tenant IDs` from the action parameters.

    2. Makes an HTTP GET request to the Abnormal Security API (`/v1/search/activities/{activity_log_id}/status`)
    to retrieve the current status of the specified remediation activity.

    3. Evaluates whether the returned status is a terminal state (e.g., success, partial_success,
    error) or if it is still pending/in progress.

    4. Outputs the full response as a JSON result and completes the action execution.


    ### Additional Notes

    The action returns a successful execution state if the activity is completed successfully
    or is still in progress. This behavior allows the action to be used effectively
    within a SOAR playbook polling loop until a terminal state is reached.
  ai_short_description: >-
    Checks the status of a remediation operation in Abnormal Security using an Activity
    Log ID, returning the current state of the activity.
  capabilities:
