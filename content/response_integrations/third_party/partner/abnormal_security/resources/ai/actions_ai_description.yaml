Delete Messages:
  ai_description: >-
    ### General Description

    Deletes specified email messages from recipient mailboxes using Abnormal Security.
    This action serves as a convenience wrapper for the Remediate Messages action
    with the delete operation hard-coded, making it easier to discover and use in
    playbooks.


    ### Flow Description

    1. Extracts the provided JSON array of message objects, source, remediation reason,
    and optional tenant IDs.

    2. Parses and validates the input messages JSON to ensure all required fields
    are present.

    3. Initiates a POST request to the Abnormal Security API (`/v1/search/remediate`)
    with the action set to `delete` to remove the specified messages.

    4. Returns the activity log ID and appends the API response to the action's JSON
    results.


    ### Additional Notes

    The `Messages JSON` parameter must contain full message objects (typically obtained
    from the JSON result of a prior Search Messages action). Each object must include
    `tenant_id`, `raw_message_id`, `mailbox_name`, `native_user_id`, `subject`, `sender`,
    and `received_time`. A single message ID is insufficient for this action.
  ai_short_description: >-
    Deletes specified email messages from recipient mailboxes via the Abnormal Security
    API based on a provided JSON array of message objects.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes specified email messages from recipient mailboxes via the Abnormal Security
      API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Abnormal Security API to delete emails,
      which mutates external data. It does not fetch contextual data, update internal
      entities, create insights, modify alert data, or create case comments.
  entity_usage:
