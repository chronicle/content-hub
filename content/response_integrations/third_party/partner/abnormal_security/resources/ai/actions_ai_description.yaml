  ai_description: >-
    ### General Description

    Retrieves full details of a specific Abnormal Security case by its ID, including
    case status, severity, affected employees, and analysis summary.


    ### Flow Description

    1. Extracts the `Case ID` parameter.

    2. Initializes the Abnormal Security API manager.

    3. Makes a GET request to the `/v1/cases/{case_id}` endpoint to fetch the case
    details.

    4. Returns the retrieved case details as a JSON result.


    ### Additional Notes

    Cases are a distinct resource from threats and do not appear in the SIEM threat-log
    event body. The case ID must be entered directly or chained from a prior List
    Cases or Get Case step.
