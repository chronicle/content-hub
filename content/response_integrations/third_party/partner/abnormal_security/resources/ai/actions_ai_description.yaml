  ai_description: >-
    ### General Description

    Checks the status of a remediation operation in Abnormal Security using an Activity
    Log ID. This action is typically used to poll the status of a previously executed
    remediation action until it reaches a terminal state (success, partial_success,
    or error).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Activity Log ID | String | Yes | Numeric Activity Log ID returned by the Remediate
    Messages action. |

    | Tenant IDs | String | Yes | Comma-separated list of tenant IDs to query for
    remediation status. |


    ### Flow Description

    1. Extracts the Activity Log ID and Tenant IDs from the action parameters.

    2. Initializes the Abnormal Security API manager.

    3. Sends a GET request to the Abnormal Security API to retrieve the status of
    the specified activity.

    4. Evaluates whether the returned status is in a terminal state.

    5. Outputs the status and attaches the raw JSON response to the action results.


    ### Additional Notes

    - The action will return a successful result if the activity status is `success`
    or `partial_success`. If the status is `error`, it will fail. If the status is
    not terminal, it will return a successful result but indicate that the activity
    is still in progress.
