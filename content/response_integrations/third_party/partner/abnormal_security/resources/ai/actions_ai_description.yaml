  ai_description: >-
    ### General Description

    The **Search Messages** action searches for email messages across the organization
    based on threat indicators such as time range, sender email, or subject using
    the Abnormal Security API. The results are stored as a JSON result and can be
    passed to other actions, such as Remediate Messages, for automated response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Start Time | String | Yes | Search start time in ISO 8601 format (e.g., 2025-01-01T00:00:00Z).
    |

    | End Time | String | Yes | Search end time in ISO 8601 format (e.g., 2025-01-02T00:00:00Z).
    |

    | Sender Email | String | No | Filter results to messages from this sender email
    address. |

    | Subject | String | No | Filter results to messages containing this subject.
    |

    | Tenant IDs | String | No | Comma-separated list of tenant IDs to scope the search.
    Leave empty to search across all tenants. |


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Initializes the `AbnormalManager` to interact with the Abnormal Security API.

    3. Executes a search query using the provided time range, sender email, subject,
    and tenant IDs.

    4. Retrieves the matching messages and attaches the response to the action's JSON
    result.

    5. Outputs a summary message indicating the number of messages found.
