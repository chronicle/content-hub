  ai_description: >-
    Takes automated remediation actions on email messages identified as threats in
    Abnormal Security.


    ### General Description

    This action submits a request to Abnormal Security to remediate specific email
    messages. It can perform actions such as deleting messages, moving them to the
    inbox, or submitting them to d360. The action interacts with the Abnormal Security
    API and returns an Activity Log ID, which can be used subsequently to track the
    completion status of the remediation operation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Action | String | Yes | Remediation action to take. Valid values: `delete`,
    `move_to_inbox`, `submit_to_d360`. |

    | Source | String | Yes | Source of the messages. Valid values: `abnormal`, `quarantine`.
    |

    | Messages JSON | String | Yes | JSON array of message objects to remediate. Each
    object must include: `tenant_id` (int), `raw_message_id`, `mailbox_name`, `native_user_id`,
    `subject`, `sender`, `received_time` (ISO 8601). |

    | Remediation Reason | String | Yes | Reason for remediation. Valid values: `false_negative`,
    `unsolicited`, `other`, `groups_remediation`, `quarantine_release`. |

    | Tenant IDs | String | No | Comma-separated list of tenant IDs to scope remediation.
    Leave empty to apply to all authorized tenants. |


    ### Additional Notes

    * `quarantine_release` as a Remediation Reason requires the Source to be set to
    `quarantine`.

    * `groups_remediation` as a Remediation Reason is only valid when the Action is
    set to `delete`.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Parses and validates the `Messages JSON` parameter to ensure it is a valid
    JSON array.

    3. Submits a POST request to the Abnormal Security API (`/v1/search/remediate`)
    with the specified messages and remediation details.

    4. Retrieves the `activity_log_id` from the response.

    5. Outputs a success message with the Activity Log ID and attaches the raw API
    response to the action's JSON results.
