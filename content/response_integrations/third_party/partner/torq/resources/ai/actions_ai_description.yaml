  ai_description: >-
    Invokes a Torq workflow via a Webhook to create a case or incident. This action
    transmits the current alert payload, including entity details and metadata, to
    Torq. If API credentials or a Bearer token are configured, the action will poll
    the Torq Public API to retrieve the final execution status and output of the triggered
    workflow.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Deduplication Key | string | No | An optional idempotency key used by Torq to
    prevent duplicate case creation. |

    | Correlation Key | string | No | An optional key used for grouping related cases
    or incidents within Torq. |

    | Poll Max Seconds | string | No | The maximum duration (in seconds) to poll the
    Torq API for the workflow's final result. Default is 60. |

    | Poll Interval Seconds | string | No | The interval (in seconds) between consecutive
    polling requests to the Torq API. Default is 3. |


    ### Additional Notes


    * The action requires a 'Torq URL' and 'Webhook Secret' to be configured in the
    integration settings.

    * To enable polling for the final execution result, 'Client ID' and 'Client Secret'
    (or a 'Bearer Token override') must also be provided in the integration configuration.


    ### Flow Description


    1. **Data Collection**: The action gathers context from the current Google SecOps
    case and alert, including entity identifiers, severity, and additional properties.

    2. **Webhook Invocation**: It sends a POST request containing the alert data to
    the specified Torq Webhook URL, authenticated via the 'secret' header.

    3. **Execution Tracking**: Upon a successful webhook trigger, the action extracts
    the execution ID from the response body or headers.

    4. **Polling (Optional)**: If API credentials are available, the action enters
    a polling loop, querying the Torq Public API for the workflow's completion status
    (e.g., SUCCESS, FAILED).

    5. **Result Reporting**: The final execution output and status are captured and
    returned as a JSON result within the SecOps platform.
