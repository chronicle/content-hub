  ai_description: >-
    The Ping action sends a ping request to a Torq workflow via a Webhook and optionally
    polls the Torq Public API for the execution result. This is typically used to
    verify connectivity and trigger a basic test workflow in Torq.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Poll Max Seconds | String | No | Maximum seconds to poll the execution for a
    result. Default is 60. |

    | Poll Interval Seconds | String | No | Seconds between poll requests. Default
    is 3. |


    ### Action Flow

    1. **Initialization**: The action initializes the Torq manager with the provided
    integration configuration (URL, secret, credentials).

    2. **Payload Construction**: It builds a JSON payload containing the source, action
    label ('ping'), and minimal case context.

    3. **Webhook Execution**: It sends a POST request to the configured Torq webhook
    URL to trigger the workflow.

    4. **Polling**: If configured, it polls the Torq Public API to retrieve the final
    execution status and output of the triggered workflow.

    5. **Result Output**: The action outputs the execution details, status code, and
    any final output as a JSON result.
