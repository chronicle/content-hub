  ai_description: >-
    ### General Description

    The **Run a Workflow** action allows users to trigger a generic workflow in **Torq**
    by sending a POST request to a pre-configured webhook. This action is highly flexible,
    allowing users to pass custom JSON input and optionally include the full context
    of the current Google SecOps alert. If Torq API credentials (Client ID and Secret)
    are configured, the action will also poll the Torq Public API to retrieve the
    final execution status and any output data generated by the workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Workflow Input** | String (JSON) | Yes | A JSON object containing the data
    to be passed into the Torq workflow. Must be a valid JSON string. |

    | **Include Alert Payload** | Boolean | No | If set to `True`, the action will
    include the current alert's metadata (identifier, name, severity, etc.) and a
    list of associated entities in the request payload under the `alert` key. |

    | **Poll Max Seconds** | String | No | The maximum amount of time (in seconds)
    the action should wait for the workflow to complete. Default is 60 seconds. |

    | **Poll Interval Seconds** | String | No | The frequency (in seconds) at which
    the action checks the Torq API for the workflow's status. Default is 3 seconds.
    |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches integration settings (Webhook
    URL, Secret, Region) and action parameters.

    2. **Payload Construction**: It builds a JSON payload including the `Workflow
    Input`. If `Include Alert Payload` is enabled, it serializes the current alert
    and its entities into the payload.

    3. **Webhook Invocation**: The action sends an authenticated POST request to the
    Torq webhook URL.

    4. **Execution Polling (Optional)**: If the webhook response contains an execution
    ID and API credentials are available, the action enters a polling loop. It queries
    the Torq Public API until the workflow reaches a terminal state (e.g., SUCCESS,
    FAILED) or the timeout is reached.

    5. **Result Processing**: The final execution status, headers, and output data
    are captured and attached to the action's result in Google SecOps.


    ### Additional Notes

    - To enable polling for workflow results, the integration must be configured with
    a **Client ID** and **Client Secret**.

    - The action uses a "best-effort" approach to collect alert data, ensuring that
    even if some fields are missing, the workflow trigger still proceeds.
