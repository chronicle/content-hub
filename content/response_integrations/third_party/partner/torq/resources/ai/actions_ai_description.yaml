Create a Case:
  ai_description: >-
    The 'Create a Case' action triggers a workflow in Torq by sending a webhook request
    containing the current Google SecOps alert and case context. This action is primarily
    used to escalate alerts into Torq for further orchestration and response. It packages
    alert metadata, including entity details and additional properties, into a JSON
    payload. If Torq API credentials or a Bearer token are provided, the action will
    also poll the Torq Public API to retrieve the final execution status and output
    of the triggered workflow, providing visibility into the automated response directly
    within the SecOps action results.


    ### Flow Description

    1. **Context Collection:** The action gathers metadata from the current SecOps
    case (ID, name, environment) and the specific alert (identifier, severity, product,
    entities, and raw data).

    2. **Payload Preparation:** It constructs a JSON payload containing the source
    ('Google SecOps'), the action type ('create_case'), and the collected context/alert
    data, along with optional deduplication and correlation keys.

    3. **Webhook Invocation:** A POST request is sent to the configured Torq Webhook
    URL, authenticated via a 'secret' header.

    4. **Execution Polling (Optional):** If an execution ID is returned by the webhook
    and API credentials are available, the action enters a polling loop. It periodically
    checks the Torq Public API for the workflow's completion.

    5. **Result Reporting:** The action returns the full request/response details,
    the execution ID, and the final workflow output (if polled) to the SecOps platform.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Deduplication Key | String | No | An optional key used by Torq to prevent duplicate
    cases or incidents from being created for the same event. |

    | Correlation Key | String | No | An optional key used to group related cases
    or incidents within the Torq platform. |

    | Poll Max Seconds | String | No | The maximum duration (in seconds) the action
    will wait and poll the Torq API for the workflow to complete. Default is 60. |

    | Poll Interval Seconds | String | No | The time interval (in seconds) between
    consecutive polling requests to the Torq API. Default is 3. |


    ### Additional Notes

    - To enable polling for the final workflow output, you must configure the Torq
    integration with either a Client ID/Secret or a Bearer Token (Override).

    - The action uses a 'secret' header for webhook authentication as required by
    Torq's webhook trigger configuration.
