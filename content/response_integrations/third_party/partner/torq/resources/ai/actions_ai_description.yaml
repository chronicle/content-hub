Ping:
  ai_description: >-
    ### General Description

    Sends a ping request to a Torq workflow via a webhook and optionally polls the
    Torq Public API for the execution result. This action is used to test connectivity
    or trigger a generic workflow in Torq, returning the execution details back to
    Google SecOps.


    ### Flow Description

    1. Retrieves the action parameters for polling configuration (max seconds and
    interval).

    2. Constructs a JSON payload containing the source, action label (`ping`), and
    current case context (case ID, case name, environment).

    3. Makes a POST request to the configured Torq webhook URL to trigger the workflow.

    4. If an execution ID is returned, optionally polls the Torq Public API using
    a GET request to retrieve the final execution status and output.

    5. Attaches the execution results, status codes, and output as a JSON result to
    the action.


    ### Additional Notes

    This action relies on the integration-level configuration for the webhook URL
    and secret. Polling behavior can be adjusted or disabled depending on the provided
    action parameters.
  ai_short_description: >-
    Sends a ping payload to trigger a Torq workflow via webhook and optionally polls
    for the execution result.
