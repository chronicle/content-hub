  ai_description: >-
    Sends a ping request to a Torq workflow via a Webhook and optionally polls the
    Torq Public API for the execution result. This action is primarily used to verify
    connectivity or trigger a simple automated workflow in Torq from Google SecOps.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches integration settings including
    the Webhook URL, Secret, and API credentials (Client ID/Secret).

    2. **Payload Construction:** It builds a JSON payload containing the source ('Google
    SecOps'), the action name ('ping'), and minimal case context (Case ID, Case Name,
    and Environment).

    3. **Webhook Trigger:** It sends a POST request to the Torq Webhook URL using
    the 'secret' header for authentication.

    4. **Execution Polling:** If the Webhook response contains an execution ID, the
    action enters a polling loop. It queries the Torq Public API at the specified
    interval until the workflow reaches a terminal state (e.g., SUCCESS, FAILED) or
    the maximum polling time is reached.

    5. **Result Processing:** The final execution status and any output data from
    the Torq workflow are captured and returned as a JSON result.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Poll Max Seconds | string | No | The maximum number of seconds to poll the Torq
    API for the workflow execution result. Defaults to 60. |

    | Poll Interval Seconds | string | No | The number of seconds to wait between
    each poll request to the Torq API. Defaults to 3. |


    ### Additional Notes

    * This action requires a valid Webhook URL and Secret configured in the Torq integration
    settings.

    * If API credentials (Client ID and Client Secret) are provided, the action will
    attempt to poll for the execution result; otherwise, it will only perform the
    initial Webhook trigger.
