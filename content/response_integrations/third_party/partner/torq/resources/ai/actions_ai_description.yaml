Run a Workflow:
  ai_description: >-
    ### General Description

    Triggers a Torq workflow by sending a POST request to a specified Torq webhook.
    The action passes a JSON 'Workflow Input' object and can optionally include the
    current alert payload. If Torq API credentials are provided, it can also poll
    the Torq Public API for the final execution output.


    ### Flow Description

    1. Retrieves integration configuration and action parameters.

    2. Gathers minimal case and environment context, and optionally extracts the current
    alert payload.

    3. Constructs a JSON payload containing the workflow input, context, and alert
    data.

    4. Sends a POST request to the Torq webhook URL to initiate the workflow execution.

    5. If an execution ID is returned and polling is configured, polls the Torq Public
    API to retrieve the final execution status and output.

    6. Attaches the execution results and output to the action's JSON result.


    ### Additional Notes

    Polling requires valid Torq API credentials or a bearer token override in the
    integration configuration.
