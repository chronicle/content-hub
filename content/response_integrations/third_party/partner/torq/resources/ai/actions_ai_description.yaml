  ai_description: >-
    Creates a case in Torq by invoking a Torq workflow via a Webhook. It sends the
    current Google SecOps alert payload (including context and entities) and optional
    deduplication or correlation keys. If Torq API credentials are provided, it also
    polls the Torq Public API to retrieve the final execution output.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Deduplication Key | String | No | An idempotency key used for case creation
    to prevent duplicates. |

    | Correlation Key | String | No | A key used for grouping cases or incidents together.
    |

    | Poll Max Seconds | String | No | The maximum number of seconds to poll the Torq
    API for the execution result. Defaults to 60. |

    | Poll Interval Seconds | String | No | The number of seconds to wait between
    poll requests. Defaults to 3. |


    ### Action Flow

    1. Reads integration and action parameters.

    2. Extracts the current case and alert details, including associated entities.

    3. Constructs a JSON payload containing the alert data, context, and keys.

    4. Sends a POST request to the configured Torq Webhook URL to trigger the workflow.

    5. If configured, polls the Torq Public API using a GET request to fetch the final
    execution status and output.

    6. Returns the execution results and output to the Google SecOps result pane.
