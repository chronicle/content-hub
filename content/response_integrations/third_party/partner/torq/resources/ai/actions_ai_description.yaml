  ai_description: >-
    ### General Description

    Triggers a workflow in Torq by sending a JSON payload to a configured webhook.
    This action allows for custom automation by passing arbitrary JSON data and optionally
    including the current alert's context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Workflow Input | string | Yes | JSON object to pass into the Torq workflow.
    |

    | Include Alert Payload | boolean | No | If true, include the current alert payload
    under 'alert'. |

    | Poll Max Seconds | string | No | Maximum seconds to poll the execution. |

    | Poll Interval Seconds | string | No | Seconds between poll requests. |


    ### Additional Notes

    The action performs a POST request to trigger the workflow and then polls the
    Torq Public API for the result. Ensure the Torq webhook URL and secret are correctly
    configured in the integration settings.


    ### Flow Description

    1. Reads integration configuration (URL, secret, etc.) and action parameters.

    2. Constructs a payload containing the provided `Workflow Input` and optionally
    the current alert's context.

    3. Sends a POST request to the Torq webhook URL.

    4. Polls the Torq Public API for the execution status until completion or timeout.

    5. Returns the execution result in the action output.
