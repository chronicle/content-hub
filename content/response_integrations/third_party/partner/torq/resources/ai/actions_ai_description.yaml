  ai_description: >-
    Sends a ping to a Torq workflow via Webhook and optionally polls the Torq Public
    API for the execution result. This action allows users to trigger automated workflows
    in Torq and monitor their completion status directly from Google SecOps.


    ### Flow Description

    1. **Configuration Initialization**: The action reads the integration configuration
    (URL, secret, region, etc.) from the server.

    2. **Payload Construction**: It constructs a JSON payload containing the source,
    action label, and minimal context (case ID and name).

    3. **Webhook Trigger**: It sends a POST request to the configured Torq webhook
    URL to initiate the workflow.

    4. **Polling**: If an execution ID is returned, the action polls the Torq Public
    API for the execution status until it reaches a terminal state or the maximum
    polling time is exceeded.

    5. **Result Output**: The final execution result, including status and output,
    is added to the action result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Poll Max Seconds | string | false | Maximum seconds to poll the execution. Defaults
    to "60". |

    | Poll Interval Seconds | string | false | Seconds between poll requests. Defaults
    to "3". |


    ### Additional Notes

    This action does not operate on specific entities and does not require any entity
    selection to run.
