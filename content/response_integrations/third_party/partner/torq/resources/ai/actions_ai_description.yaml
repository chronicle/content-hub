Run a Workflow:
  ai_description: >-
    ### General Description

    Triggers a Torq workflow by sending a POST request to a specified Torq webhook
    URL. This action allows users to pass custom JSON data and optionally include
    the full payload of the current alert to provide context to the Torq workflow.
    If Torq API credentials (Client ID and Secret) are provided, the action will poll
    the Torq Public API to retrieve the final execution status and output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Workflow Input | String (JSON) | Yes | A JSON object containing the data to
    be passed to the Torq workflow. |

    | Include Alert Payload | Boolean | No | If true, the action includes the current
    alert's metadata and associated entities in the request. |

    | Poll Max Seconds | String | No | The maximum duration (in seconds) to poll the
    Torq API for the workflow's completion. Default is 60. |

    | Poll Interval Seconds | String | No | The time interval (in seconds) between
    consecutive polling requests. Default is 3. |


    ### Additional Notes

    - The integration requires a 'Torq URL' and 'Webhook Secret' to function.

    - Polling for results requires 'Client ID' and 'Client Secret' to be configured
    in the integration settings to generate an OAuth token.

    - The 'Workflow Input' must be a valid JSON object string.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches Torq instance settings and
    OAuth credentials.

    2. **Payload Construction**: It builds a JSON payload containing the workflow
    input and optionally the current alert data.

    3. **Workflow Trigger**: It sends an authenticated POST request to the Torq webhook.

    4. **Execution Polling**: If an execution ID is returned and API credentials exist,
    the action polls the Torq Public API until completion or timeout.

    5. **Result Processing**: The final execution status and output are captured and
    returned to Google SecOps.
