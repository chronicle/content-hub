  ai_description: >-
    Creates a case in Torq by triggering a workflow via a webhook. This action sends
    the current alert payload, including entity information, to a configured Torq
    webhook URL. It supports optional deduplication and correlation keys to manage
    case creation and grouping. If configured, the action polls the Torq Public API
    to retrieve the final execution output of the workflow.


    ### Flow Description

    1. Reads integration configuration (URL, Secret, etc.) and action parameters.

    2. Collects alert context, including case ID, alert details, and associated entities.

    3. Constructs a JSON payload containing the alert data and optional keys.

    4. Sends a POST request to the Torq Webhook URL.

    5. Optionally polls the Torq Public API for the execution status and output if
    configured.

    6. Adds the execution result to the Google SecOps action result pane.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Deduplication Key | string | No | Optional idempotency key for case creation.
    |

    | Correlation Key | string | No | Optional correlation key for grouping cases/incidents.
    |

    | Poll Max Seconds | string | No | Maximum seconds to poll the execution (default:
    60). |

    | Poll Interval Seconds | string | No | Seconds between poll requests (default:
    3). |


    ### Additional Notes

    - The action requires a valid Torq URL and Webhook Secret to be configured in
    the integration instance settings.

    - The action uses asynchronous polling to retrieve the final execution output
    from Torq.
