  ai_description: >-
    ### General Description

    Triggers a generic Torq workflow by posting a JSON payload to a Torq webhook.
    The action can optionally include the current alert payload in the request and,
    if Torq API credentials are provided, will poll the Torq Public API to retrieve
    the final execution output and status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Workflow Input | String | Yes | A JSON object string to pass into the Torq workflow
    as input data. |

    | Include Alert Payload | Boolean | No | If set to true, includes the current
    alert payload (including its entities and metadata) under the 'alert' key in the
    Torq request. |

    | Poll Max Seconds | String | No | The maximum time in seconds to poll the Torq
    API for the execution result. Defaults to 60. |

    | Poll Interval Seconds | String | No | The time in seconds to wait between poll
    requests to the Torq API. Defaults to 3. |


    ### Flow Description

    1. **Initialization:** Reads integration configurations (URL, secrets, credentials)
    and action parameters.

    2. **Context Collection:** Gathers minimal case context (case ID, name, environment)
    and optionally serializes the current alert payload.

    3. **Workflow Trigger:** Constructs a JSON payload containing the context, workflow
    input, and alert data, then sends a POST request to the Torq webhook to initiate
    the workflow.

    4. **Execution Polling:** If an execution ID is returned and polling is configured,
    repeatedly queries the Torq Public API until the workflow completes or the timeout
    is reached.

    5. **Result Output:** Appends the final execution status, output, and any errors
    to the Google SecOps action results.
