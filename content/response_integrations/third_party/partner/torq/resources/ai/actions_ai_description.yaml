Create a Case:
  ai_description: >-
    ### General Description

    Creates a case in Torq by invoking a specific Torq workflow via a Webhook POST
    request. The action packages the current Google SecOps alert payload, including
    its context and associated entities, and sends it to the Torq platform to initiate
    the case creation process.


    ### Flow Description

    1. Reads the action parameters, including optional deduplication and correlation
    keys.

    2. Collects the current case and alert context from Google SecOps, including basic
    alert details and a subset of entity information.

    3. Constructs a JSON payload containing the alert details, context, and keys.

    4. Makes a POST request to the configured Torq Webhook URL to trigger the `create_case`
    workflow.

    5. If configured, polls the Torq Public API to retrieve the final execution status
    and output of the workflow.

    6. Returns the execution results and attaches the response data to the action's
    JSON results.


    ### Additional Notes

    This action requires a valid Torq Webhook URL and Secret configured at the integration
    level. Polling for the final execution output requires Torq API credentials (Client
    ID/Secret) or a Bearer token override to authenticate with the Torq Public API.
  ai_short_description: >-
    Creates a case in Torq by triggering a workflow via a Webhook POST request, passing
    the current alert payload and optionally polling for the execution results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a Torq workflow via Webhook to create a case in the Torq platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to a Torq webhook to trigger a workflow, which
      mutates external data (initiates a case creation process in Torq). It does not
      fetch contextual enrichment data (it only polls for its own execution status).
      It does not mutate internal data, update entities, create insights, or add case
      comments.
