Ping:
  ai_description: >-
    ### General Description

    The **Ping** action triggers a specific workflow in Torq via a Webhook and optionally
    polls the Torq Public API to retrieve the final execution results. This action
    is primarily used to verify connectivity between Google SecOps and Torq, or to
    initiate automated logic within Torq that requires context from the current SecOps
    case (such as Case ID and Environment).


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Poll Max Seconds | string | No | 60 | The maximum duration (in seconds) the
    action will wait and poll the Torq API for the workflow execution to reach a terminal
    state. |

    | Poll Interval Seconds | string | No | 3 | The time interval (in seconds) between
    consecutive polling requests to the Torq API. |


    ### Additional Notes

    - This action requires the **Torq URL** and **Webhook Secret** to be configured
    in the integration settings.

    - To enable polling for execution results, the **Client ID**, **Client Secret**,
    and **Region** (or a **Bearer Token Override**) must be provided in the integration
    configuration to authenticate against the Torq Public API.

    - If no execution ID is returned by the initial webhook call, polling is skipped.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches integration settings (URLs,
    secrets, region) and action parameters (polling limits).

    2. **Payload Construction:** It builds a JSON payload containing the source ("Google
    SecOps"), the action name ("ping"), and metadata from the current case (Case ID,
    Case Name, and Environment).

    3. **Webhook Trigger:** A POST request is sent to the configured Torq Webhook
    URL using the `secret` header for authentication.

    4. **Execution Identification:** The action parses the webhook response to extract
    an `execution_id` or `run_id`.

    5. **Polling (Optional):** If an execution ID is found and API credentials are
    available, the action enters a polling loop, querying the Torq Public API (`GET
    /executions/{id}`) until the workflow succeeds, fails, or the timeout is reached.

    6. **Result Processing:** The final execution status, headers, and output data
    are captured and attached to the action results in Google SecOps.
