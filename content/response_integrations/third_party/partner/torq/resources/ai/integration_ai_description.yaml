product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The Torq integration provides capabilities to trigger external workflows and create
    cases within the Torq platform. The 'Create a Case' action specifically fulfills
    the ITSM category requirement by allowing users to document investigations and
    initiate case management processes. The other actions ('Ping', 'Run a Workflow')
    are general-purpose automation triggers that do not map to specific security domains
    like EDR, SIEM, or Threat Intelligence. Therefore, the integration is classified
    under ITSM.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
