product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: true
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The Torq integration provides capabilities to create cases and run workflows within
    the Torq platform. Creating cases aligns with the ITSM category, as it facilitates
    documenting investigations and tracking tasks. Running workflows is a core orchestration
    capability that often involves collaboration, such as triggering automated responses
    or human-in-the-loop processes, which fits the Collaboration category. The integration
    does not perform functions related to SIEM, EDR, Network Security, Threat Intelligence,
    Email Security, IAM, Cloud Security, Vulnerability Management, or Asset Inventory.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
