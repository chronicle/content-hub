[project]
name = "RecordedFutureIntelligence"
version = "14.0"
description = "Recorded Future's unique technology collects and analyzes vast amounts of data to deliver relevant cyber threat insights in real-time. For support please contact support@recordedfuture.com"
requires-python = ">=3.11,<3.12"
dependencies = [
    "antlr4-python3-runtime",
    "environmentcommon",
    "hatching-triage",
    "markdown-strings",
    "psengine~=2.8.0",
    "requests>=2.32.3",
    "setuptools>=79.0.0",
    "tipcommon",
    "wheel>=0.45.1",
]

[dependency-groups]
dev = [
    "environmentcommon",
    "pytest-json-report>=1.5.0",
    "pytest>=8.3.5",
    "soar-sdk",
]

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.3.6-py3-none-any.whl" }
antlr4-python3-runtime = { path = "../../../../../packages/external_whls/antlr4_python3_runtime-4.9.3-py3-none-any.whl" }
hatching-triage = { path = "../../../../../packages/external_whls/hatching_triage-0.2.0-py3-none-any.whl" }
markdown-strings = { path = "../../../../../packages/external_whls/markdown_strings-3.4.0-py2.py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true
