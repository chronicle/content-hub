  reasoning: >-
    The integration 'recorded_future_intelligence' provides extensive threat intelligence
    enrichment capabilities, including actions to enrich various IOC types (IP, Hash,
    URL, CVE, Hostname) and retrieve malware intelligence. This directly aligns with
    the Threat Intelligence category. Additionally, the integration includes multiple
    connectors (Classic Alerts, Playbook Alerts, Playbook Alerts Tracking) that ingest
    security alerts from Recorded Future into Google SecOps, which is a core function
    of a SIEM integration. The integration does not provide EDR, Network Security,
    Email Security, IAM, Cloud Security, ITSM, Vulnerability Management, Asset Inventory,
    or Collaboration capabilities as defined in the provided criteria.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
