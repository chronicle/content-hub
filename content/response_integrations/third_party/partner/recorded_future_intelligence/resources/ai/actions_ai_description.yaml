  ai_description: >-
    Publishes an analyst note to Recorded Future. The note includes the specified
    title, text, topic, and a list of entity identifiers collected from the case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Note Title | string | Yes | Specify the title for the note. |

    | Note Text | string | Yes | Specify the text content for the note. |

    | Topic | string | No | Specify the relevant note topic from the predefined list
    (e.g., Actor Profile, Indicator, Malware/Tool Profile). |


    ### Flow

    1. Extracts the action parameters.

    2. Collects the identifiers of all target entities in the case.

    3. Appends the collected entity identifiers to the note text.

    4. Initializes the Recorded Future Analyst Note Manager.

    5. Publishes the analyst note to Recorded Future.

    6. Returns the published note data as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Publishes an analyst note with the specified title, text, and topic to Recorded
      Future.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action publishes an analyst note to Recorded Future using the AnalystNoteMgr.publish
      method, which mutates external data. It does not fetch data, update internal
      entities, create insights, or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by publishing a note to Recorded Future, so
      it cannot be classified as Enrichment. It does not perform any remediation actions
      like blocking IPs or disabling users, so it is not Remediation.
    remediation: false
