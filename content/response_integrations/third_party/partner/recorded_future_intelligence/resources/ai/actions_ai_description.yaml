Add Analyst Note:
  ai_description: >-
    Adds an analyst note to the Recorded Future platform. This action allows users
    to publish structured intelligence notes directly from Google SecOps. It automatically
    collects the identifiers of all entities currently in the action's scope and appends
    them to the note text to provide context within Recorded Future. Users can specify
    a title, the main body of the note, and an optional topic to categorize the intelligence
    (e.g., Malware/Tool Profile, Actor Profile).


    ### Parameters


    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Note Title | string | True | Note Title | The title of the analyst note to be
    created in Recorded Future. |

    | Note Text | string | True | Note Text | The main content/body of the note. The
    action will automatically append a list of entities from the case to this text.
    |

    | Topic | ddl | False | None | The category or topic for the note. Options include
    'Actor Profile', 'Malware/Tool Profile', 'YARA Rule', etc. |


    ### Additional Notes

    - This action does not modify any data within Google SecOps; it only creates a
    new record in the external Recorded Future platform.

    - The list of entities appended to the note includes all entities passed to the
    action, regardless of their type.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the note title, text, and selected topic
    from the action parameters.

    2. **Entity Collection:** Iterates through all entities in the current scope and
    compiles a list of their identifiers.

    3. **Text Preparation:** Appends the compiled list of entity identifiers to the
    user-provided note text for better context.

    4. **External API Call:** Uses the Recorded Future API to publish the note with
    the specified title, combined text, and topic.

    5. **Completion:** Returns the unique ID of the newly created note in Recorded
    Future.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new Analyst Note record in the Recorded Future platform containing
      the provided intelligence and a list of associated entities.
    fetches_data: false
