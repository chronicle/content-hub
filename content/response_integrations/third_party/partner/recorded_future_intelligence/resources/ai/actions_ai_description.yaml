Update Playbook Alert:
  ai_description: >-
    Updates a playbook alert in Recorded Future with new metadata such as status,
    priority, or assignee. This action allows analysts to synchronize the state of
    a Recorded Future alert with the investigation progress in Google SecOps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Playbook Alert ID | string | Yes | The unique identifier of the playbook alert
    to be updated. |

    | Playbook Alert Category | string | Yes | The category of the playbook alert
    (e.g., domain_abuse, cyber_vulnerability). |

    | Assign To | string | No | The user hash (uhash) of the Recorded Future user
    to whom the alert should be assigned. |

    | Log Entry | string | No | A comment or note to be added to the alert's activity
    log during the update. |

    | Status | ddl | No | The new status for the alert. Options: New, In Progress,
    Dismissed, Resolved. |

    | Priority | ddl | No | The new priority level for the alert. Options: High, Moderate,
    Informational. |

    | Reopen Strategy | ddl | No | Defines the strategy for reopening the alert. Options:
    Never, Significant Updates. |


    ### Additional Notes

    - At least one of the optional parameters (Assign To, Log Entry, Status, Priority,
    or Reopen Strategy) must be provided for the action to execute successfully.

    - The action first fetches the current state of the alert from Recorded Future
    before applying the requested changes.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Alert ID, Category, and update fields
    from the action input.

    2. **Validation:** Checks that at least one update field is populated to avoid
    redundant API calls.

    3. **Manager Initialization:** Establishes a connection to the Recorded Future
    API using the provided credentials.

    4. **External Update:** Calls the Recorded Future API to modify the specified
    playbook alert attributes.

    5. **Result Processing:** Returns the raw JSON response of the updated alert and
    provides a success message to the analyst.
