Detonate File:
  ai_description: >-
    Submits a file to the Recorded Future Sandbox for automated analysis and detonation.
    This action is asynchronous, meaning it initiates the upload and then periodically
    checks the status of the analysis until a report is ready or a timeout occurs.
    Once the analysis is complete, the action retrieves the report details and generates
    a comprehensive insight within the Google SecOps case.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | string | Yes | The full path to the file that needs to be analyzed.
    |

    | File Source | ddl | Yes | Specifies where the action should retrieve the file
    from. Options are 'GCP Bucket' (retrieves via Google Cloud Storage) or 'Local
    File System' (retrieves from the local path). |

    | Profile | string | No | The specific Recorded Future Sandbox profile to use
    for the analysis. |

    | Password | string | No | The password required to extract the file if it is
    a password-protected archive. |


    ### Flow Description


    1.  **File Retrieval:** The action retrieves the file content based on the provided
    `File Path` and `File Source` (either from a GCP Bucket or the local filesystem).

    2.  **Submission:** The file is uploaded to the Recorded Future Sandbox API using
    the provided `Profile` and `Password` (if applicable).

    3.  **Status Polling:** Because the action is asynchronous, it enters an 'In Progress'
    state and periodically queries the Sandbox API to check if the analysis is 'reported'
    (finished).

    4.  **Report Retrieval:** Once the analysis is complete, the action fetches the
    overview report, which includes scores, signatures, and IOCs.

    5.  **Insight Generation:** The action processes the report data and creates a
    detailed HTML insight in the Google SecOps case, providing visibility into the
    detonation results.


    ### Additional Notes


    *   This action requires a valid Recorded Future Sandbox API key and URL configured
    in the integration settings.

    *   The action will time out if the analysis takes longer than the configured
    execution deadline.
  capabilities:
