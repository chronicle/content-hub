    internal_data_mutation_explanation: >-
      Updates entity properties, sets suspicious status, and creates case insights.
    reasoning: >-
      The action fetches threat intelligence data from the Recorded Future API (fetches_data=true).
      It can optionally submit detection data back to Recorded Future Collective Insights,
      which mutates data in an external system (can_mutate_external_data=true). Internally,
      it updates entity properties, sets their suspicious status, and creates case
      insights (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not modify alert data or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      Although the primary purpose of the action is to fetch enrichment data, it has
      the capability to submit detection data back to Recorded Future Collective Insights.
      This violates the strict read-only requirement for the Enrichment category (can_mutate_external_data=true).
      It does not perform any remediation tasks such as blocking IPs or disabling
      users, so it is not a Remediation action.
    remediation: false
  entity_usage:
    entity_types:
    - CVE
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
