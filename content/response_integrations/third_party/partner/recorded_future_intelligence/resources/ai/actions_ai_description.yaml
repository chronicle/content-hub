  ai_description: >-
    Enriches IP Address entities using Recorded Future Intelligence to provide comprehensive
    threat context. The action retrieves risk scores, evidence details, and geographical
    location data for each IP. It evaluates the risk score against a user-defined
    threshold to automatically mark entities as suspicious and generate detailed case
    insights. Additionally, it can contribute detection data back to Recorded Future's
    Collective Insights platform.


    ### Parameters

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | 25 | The minimum malicious risk score
    (0-99) required to mark an IP as suspicious. Scores below 5 are 'No Malicious
    content', 5-24 are 'Unusual', 25-64 are 'Suspicious', 65-89 are 'Malicious', and
    90-99 are 'Very Malicious'. |

    | Include Links | Boolean | No | False | If enabled, the action retrieves information
    about related entity links from Recorded Future. |

    | Enable Collective Insights | Boolean | No | True | If enabled, the action contributes
    detection information back to Recorded Future's Collective Insights API. |


    ### Additional Notes

    - The action updates the entity's 'is_suspicious' and 'is_enriched' flags based
    on the results and the provided threshold.

    - Collective Insights submissions are automatically excluded if the alert's reporting
    vendor matches the integration's default vendor to avoid redundant reporting.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves API configuration (URL, Key, SSL settings)
    and action parameters (Threshold, Links, Collective Insights).

    2. **Entity Filtering**: Identifies and processes only 'ADDRESS' (IP) entities
    from the target entities list.

    3. **Intelligence Retrieval**: For each IP, it queries the Recorded Future API
    to fetch risk scores, location data (ASN, Country, City, Org), and evidence details.

    4. **External Mutation (Optional)**: If 'Enable Collective Insights' is active,
    it submits the detection context to Recorded Future.

    5. **Risk Evaluation**: Compares the retrieved risk score against the 'Risk Score
    Threshold'. If the score exceeds the threshold, the entity is marked as suspicious.

    6. **Internal Data Enrichment**: Updates the entity's additional properties with
    enrichment data, adds data tables to the case wall (Overview, Risk Rules, Links),
    and creates a detailed Case Insight if the entity is deemed risky.

    7. **Finalization**: Updates the entities within the SecOps platform and returns
    a JSON result of the enrichment data.
