Enrich IOC:
  ai_description: >-
    Enriches IOC entities (IP Address, Domain, Hostname, File Hash, URL, and CVE)
    using Recorded Future intelligence. This action retrieves risk scores, evidence
    details, and optional related links. It automatically updates entity attributes,
    marks entities as suspicious based on a configurable threshold, and generates
    detailed insights for analysts.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | Represents the minimum malicious risk
    score (0-100) for each entity to be marked as suspicious. |

    | Include Links | Boolean | No | If enabled, the action will retrieve information
    about related entity links from Recorded Future. |

    | Enable Collective Insights | Boolean | No | If enabled, the action will contribute
    detection telemetry back to Recorded Future's Collective Insights API. |


    ### Flow Description


    1. **Initialization**: Extracts integration configuration (API Key, URL) and action
    parameters.

    2. **Entity Filtering**: Identifies supported entities in the current context,
    including IP Addresses, Domains, Hostnames, File Hashes, URLs, and CVEs.

    3. **Intelligence Retrieval**: For each supported entity, queries the Recorded
    Future API to fetch enrichment data, risk scores, and evidence details.

    4. **Collective Insights Submission**: If 'Enable Collective Insights' is active
    and the alert is from an external vendor, submits detection telemetry (IOC value,
    type, and alert context) to Recorded Future.

    5. **Data Population**: Updates entity properties with the fetched intelligence
    and adds data tables (Overview, Risk Rules, and Links) to the case.

    6. **Risk Assessment**: Compares the entity's risk score against the 'Risk Score
    Threshold'.

    7. **Insight Generation**: If the threshold is exceeded, marks the entity as suspicious
    and generates a detailed case insight containing risk details and location data
    (for IPs).

    8. **Completion**: Updates the entities within Google SecOps and provides a summary
    of the enrichment results.


    ### Additional Notes


    Collective Insights submissions are automatically excluded for alerts where the
    reporting vendor is 'Recorded Future' to avoid redundant data submission.
