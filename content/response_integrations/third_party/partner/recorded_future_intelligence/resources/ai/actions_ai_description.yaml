Detonate File:
  ai_description: >-
    ### General Description

    Submits a file to the Recorded Future Sandbox for analysis and retrieves the detonation
    report.


    ### Flow Description

    1. Extracts the file from the specified source (GCP Bucket or Local File System).

    2. Submits the file to the Recorded Future Sandbox via the Hatching Triage API.

    3. Periodically checks the status of the submission as an asynchronous action.

    4. Once the analysis is completed, retrieves the overview report.

    5. Generates a case insight with the detonation results and adds the report to
    the action's JSON result.


    ### Additional Notes

    The action runs asynchronously to wait for the sandbox analysis to complete.
