Add Analyst Note:
  ai_description: >-
    ### General Description

    Publishes an Analyst Note to Recorded Future containing information about the
    target entities.


    ### Flow Description

    1. Extracts the action parameters (Note Title, Note Text, Topic).

    2. Iterates over all target entities in the case and collects their identifiers.

    3. Appends the collected entity identifiers to the Note Text.

    4. Makes an API call to Recorded Future (`AnalystNoteMgr.publish`) to publish
    the Analyst Note.

    5. Returns the published note details as JSON.


    ### Additional Notes

    The action does not filter entities by type; it collects all target entities in
    the case.
  ai_short_description: >-
    Publishes a new Analyst Note to Recorded Future containing the identifiers of
    the target entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Publishes a new Analyst Note to Recorded Future.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to Recorded Future (`AnalystNoteMgr.publish`) to
      publish a new Analyst Note, which mutates external data. It does not fetch data,
      update internal entities, or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
