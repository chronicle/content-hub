  ai_description: "### General Description\nThis action enriches CVE (Common Vulnerabilities\
    \ and Exposures) entities by querying the Recorded Future Intelligence platform.\
    \ It retrieves comprehensive threat intelligence, including risk scores, evidence\
    \ details, and optional links. The action evaluates the CVE's risk against a user-defined\
    \ threshold to determine if it should be marked as suspicious, subsequently updating\
    \ the entity's profile and generating a case insight if the threshold is exceeded.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Risk Score Threshold | string | Yes | The minimum\
    \ malicious risk score (0-99) for a CVE to be marked as suspicious. |\n| Include\
    \ Links | boolean | No | If enabled, the action retrieves additional links related\
    \ to the CVE. |\n| Enable Collective Insights | boolean | No | If enabled, contributes\
    \ detection data back to Recorded Future. |\n\n### Additional Notes\n- The action\
    \ requires a valid Recorded Future API configuration.\n- Collective Insights submission\
    \ is conditional based on both the action parameter and global configuration settings.\n\
    \n### Flow Description\n1. **Initialization**: Extracts configuration parameters\
    \ (API URL, API Key) and action-specific parameters (Threshold, Include Links,\
    \ Collective Insights).\n2. **Processing**: Iterates through the provided CVE\
    \ entities.\n3. **Enrichment**: Queries the Recorded Future API for each CVE to\
    \ retrieve risk data and intelligence.\n4. **Evaluation**: Compares the retrieved\
    \ risk score against the configured threshold.\n5. **Internal Update**: \n   \
    \ - Updates the entity's `additional_properties` with enrichment data.\n    -\
    \ Sets the entity's `is_enriched` status to true.\n    - If the score exceeds\
    \ the threshold, marks the entity as `is_suspicious` and creates a case insight.\n\
    6. **Finalization**: Updates the entities in the SecOps platform and returns the\
    \ results."
