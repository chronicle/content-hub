  ai_description: >-
    ### General Description

    This action adds entities to a specified Recorded Future list. It allows users
    to manage lists by adding individual entities (specified by ID or Name/Type) or
    by defaulting to the target entities present in the current Google SecOps case.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | :--- | :--- | :--- | :--- |

    | List ID | Yes | String | The ID of the Recorded Future list to which entities
    will be added. |

    | Entity ID | No | String | The ID of the specific entity to add. |

    | Entity Name | No | String | The name of the entity to add. |

    | Entity Type | No | String | The type of the entity to add. |


    *Note: Either `Entity ID` or the combination of `Entity Name` and `Entity Type`
    must be provided to add a specific entity. If neither is provided, the action
    defaults to using all target entities from the current case.*


    ### Flow Description

    1. Extract configuration parameters (API Key, SSL verification) and action parameters
    (List ID, Entity ID, Entity Name, Entity Type).

    2. Determine the list of entities to add: if `Entity ID` is provided, use it;
    if `Entity Name` and `Entity Type` are provided, use them; otherwise, map the
    case's target entities to the Recorded Future format.

    3. Initialize the Recorded Future `EntityListMgr` using the provided configuration.

    4. Fetch the specified list using the `List ID`.

    5. Perform a bulk add operation to add the determined entities to the fetched
    list.

    6. Return the result of the operation as a JSON object, including counts of added,
    unchanged, and failed entities.
