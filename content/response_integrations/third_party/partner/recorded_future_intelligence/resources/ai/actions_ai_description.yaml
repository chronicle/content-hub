  ai_description: >-
    ### General Description

    This action enriches File Hash entities by querying the Recorded Future intelligence
    platform. It retrieves threat intelligence, including risk scores, triggered risk
    rules, and associated links. Based on the configured risk threshold, the action
    updates the entity's suspicious status and generates a case insight if the hash
    is deemed risky.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | string | Yes | The minimum malicious risk score (0-89)
    for a Hash to be marked as suspicious. Default is 25. |

    | Include Links | boolean | No | If enabled, the action retrieves additional links
    related to the hash. Default is false. |

    | Enable Collective Insights | boolean | No | If enabled, contributes detection
    data back to Recorded Future. Default is true. |


    ### Flow Description

    1. **Initialization**: Extracts API configuration (URL, Key, SSL verification)
    and action parameters (Threshold, Include Links, Collective Insights).

    2. **Entity Processing**: Iterates through the `target_entities` provided in the
    case, filtering specifically for `FILEHASH` entities.

    3. **Intelligence Retrieval**: Queries the Recorded Future API for each valid
    hash to obtain risk scores, evidence details, and optional links.

    4. **Data Enrichment**: Updates the entity's `additional_properties` with the
    retrieved intelligence data and sets the `is_enriched` flag.

    5. **Risk Assessment**: Compares the retrieved risk score against the `Risk Score
    Threshold`. If the score exceeds the threshold, the entity is marked as `is_suspicious`.

    6. **Insight Generation**: If the hash is marked as suspicious, a case insight
    is created containing the risk details and evidence.

    7. **Result Reporting**: Adds data tables (Overview, Risk Rules, Links) to the
    action results and updates the entities in the SOAR platform.
