Search Hash Malware Intelligence:
  ai_description: >-
    ### General Description

    Queries Recorded Future to retrieve malware intelligence and sandbox reports for
    SHA256 file hashes. This action fetches historical sandbox analysis data for hashes
    that have already been reported, providing threat intelligence such as risk scores,
    triggered signatures, and network flows.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH` where the identifier
    length is exactly 64 characters (indicating a SHA256 hash).

    3. For each matching hash, makes an API request to the Recorded Future Malware
    Intelligence service to fetch sandbox reports within the specified `Start Date`
    and `End Date`.

    4. Optionally filters the results to only include samples submitted by the user's
    enterprise if `My Enterprise` is enabled.

    5. Generates a case insight for each processed hash, detailing the sandbox analysis,
    scores, tags, signatures, and network flows.

    6. Attaches the raw report data as JSON results to the action output.


    ### Additional Notes

    - The action strictly requires SHA256 hashes; MD5 or SHA1 hashes will be ignored
    due to the identifier length filter.

    - If no reports are found for a hash within the specified timeframe, the action
    will still succeed but indicate that no data was found in the insight.
