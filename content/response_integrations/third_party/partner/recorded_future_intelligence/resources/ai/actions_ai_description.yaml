Add List Entities:
  ai_description: >-
    ### General Description

    Adds specified entities or case target entities to a Recorded Future list. This
    action allows users to dynamically update Recorded Future lists with indicators
    from Google SecOps.


    ### Flow Description

    1. Extracts the `List ID` and optional entity parameters (`Entity ID`, `Entity
    Name`, `Entity Type`).

    2. Determines the target entities: if specific entity parameters are provided,
    they are used; otherwise, the action defaults to processing the target entities
    from the case.

    3. Initializes the Recorded Future API client.

    4. Makes an API call to fetch the specified list from Recorded Future.

    5. Makes an API call to perform a bulk add operation, appending the entities to
    the list.

    6. Returns the results as a JSON object and updates the output message with the
    number of added or unchanged entities.


    ### Additional Notes

    When falling back to case target entities, the action automatically maps supported
    SecOps entity types (IP Address, Domain, Hostname, URL, File Hash, and Email Message)
    to their corresponding Recorded Future formats. Entities that do not match these
    types are ignored unless explicitly provided via the action parameters.
  ai_short_description: >-
    Adds specified entities or case target entities to a Recorded Future list.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entities to a specified Recorded Future list.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by adding entities to a Recorded Future list
      via the `bulk_add` API call. It does not fetch contextual enrichment data, mutate
      internal SecOps data, update entities, or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: true
      email_message: true
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action processes `siemplify.target_entities` if no specific entity parameters
      are provided. It passes these entities to `map_secops_entities_to_rf`, which
      filters them by checking if `entity.entity_type` is in `ENTITY_PREFIX_TYPE_MAP_LIST_OPS`
      (ADDRESS, DOMAIN, HOSTNAME, URL, FILEHASH, EMAILMESSAGE).
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action adds entities to a generic Recorded Future list. While this list
      could potentially be used as a blocklist or allowlist depending on the user's
      Recorded Future configuration, the action itself is a generic list management
      operation and does not inherently enforce a block or allow outcome on a security
      control. Therefore, it does not strictly match any of the predefined outcome
      categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
