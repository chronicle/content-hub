Update Alert:
  ai_description: >-
    Updates an existing alert in the Recorded Future Intelligence platform. This action
    allows analysts to modify the status, assignee, and associated notes of a specific
    alert identified by its ID. It is primarily used to synchronize the state of an
    investigation between Google SecOps and Recorded Future.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the Alert ID, the new Status,
    the Assignee (optional), and any Note (optional) from the user input.

    2. **Input Validation:** It verifies that at least one update field (Status, Assign
    To, or Note) has been provided. If the Status is set to 'None' and no assignee
    or note is provided, the action will fail to prevent empty updates.

    3. **API Interaction:** The action initializes the Recorded Future Manager and
    sends a request to the Recorded Future API to update the specified alert record.

    4. **Result Processing:** Upon success, the action returns a JSON confirmation
    of the update and provides an output message to the analyst.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | string | Yes | The unique identifier of the alert in Recorded Future
    that needs to be updated. |

    | Status | ddl | Yes | The new status to assign to the alert. Options include:
    None, New, Pending, Dismissed, Resolved, Flag for Tuning. Selecting 'None' means
    the status will not be changed. |

    | Assign To | string | No | The identifier of the user to whom the alert should
    be assigned. This can be an ID, username, user hash, or email address. |

    | Note | string | No | A text note or comment to be appended to the alert in Recorded
    Future. |


    ### Additional Notes:

    * **Validation Logic:** While the 'Status' parameter is mandatory, selecting 'None'
    is treated as a null operation for that field. In such cases, either 'Assign To'
    or 'Note' must be populated for the action to execute successfully.
