Enrich Hash:
  ai_description: >-
    Enriches File Hash entities using Recorded Future's threat intelligence platform.
    This action retrieves comprehensive intelligence including risk scores, evidence
    details, and intelligence card links. It evaluates the risk score against a user-defined
    threshold to automatically mark entities as suspicious within Google SecOps. Additionally,
    it can contribute detection data back to Recorded Future via the Collective Insights
    feature.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | string | Yes | The minimum malicious risk score (0-89)
    required to mark a Hash as suspicious. |

    | Include Links | boolean | No | If enabled, retrieves information about related
    entity links. |

    | Enable Collective Insights | boolean | No | If enabled, contributes detection
    data back to Recorded Future's community intelligence. |


    ### Additional Notes

    - The 'Enable Collective Insights' feature only triggers if both the action parameter
    and the global integration configuration are enabled, and the alert vendor is
    not 'Recorded Future'.

    - Risk bands: Unusual (5-24), Suspicious (25-64), Malicious (65-89).


    ### Flow Description

    1. **Initialization**: Extracts API configuration and action parameters (Threshold,
    Links, Collective Insights).

    2. **Entity Filtering**: Identifies all File Hash entities within the current
    context.

    3. **Data Retrieval**: For each hash, queries Recorded Future for its risk profile
    and intelligence data.

    4. **External Contribution**: If Collective Insights is enabled, submits the detection
    event to Recorded Future.

    5. **Internal Enrichment**: Updates the entity's additional properties with Recorded
    Future metadata and adds data tables for risk rules and overview details.

    6. **Risk Assessment**: Compares the retrieved risk score to the 'Risk Score Threshold'.
    If exceeded, the entity is marked as suspicious.

    7. **Insight Generation**: Creates a detailed Case Insight containing the risk
    breakdown and a link to the Recorded Future portal.

    8. **Completion**: Updates the entities in the case and returns the final execution
    status.
