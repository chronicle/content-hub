  ai_description: >-
    Enriches Indicators of Compromise (IOCs) using Recorded Future Intelligence. This
    action retrieves comprehensive threat intelligence for multiple entity types,
    including IP addresses, domains, hostnames, file hashes, URLs, and CVEs. It evaluates
    the risk score of each entity against a user-defined threshold to determine if
    the entity should be marked as suspicious within the platform. Additionally, the
    action can contribute detection data back to Recorded Future via the Collective
    Insights feature.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the API configuration (URL, Key, SSL) and
    action parameters (Risk Score Threshold, Include Links, Enable Collective Insights).

    2. **Entity Filtering:** Iterates through the target entities in the case and
    filters for supported types: IP Address, Domain, Hostname, File Hash, URL, and
    CVE.

    3. **Intelligence Retrieval:** For each supported entity, it queries Recorded
    Future to fetch risk scores, evidence details, and optional related links.

    4. **Collective Insights Submission:** If enabled, the action submits the detection
    context (case title, timestamp, and IOC) to Recorded Future's Collective Insights
    API.

    5. **Risk Evaluation:** Compares the retrieved risk score against the 'Risk Score
    Threshold'. If the score exceeds the threshold, the entity is marked as suspicious.

    6. **Internal Enrichment:** Updates the entity's additional properties with threat
    data, adds data tables for risk rules and overview, and creates a detailed Case
    Insight containing the intelligence report.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | string | Yes | The minimum malicious risk score (0-100)
    required to mark an entity as suspicious. Default is 25. |

    | Include Links | boolean | No | If enabled, the action retrieves and displays
    information about related entity links in a data table. |

    | Enable Collective Insights | boolean | No | If enabled, the action contributes
    detection metadata back to Recorded Future. This is only active if the global
    integration setting is also enabled and the alert vendor is not Recorded Future.
    |


    ### Additional Notes:

    - The action performs an external mutation when 'Enable Collective Insights' is
    active by sending detection data to Recorded Future.

    - Entity suspicious status and enrichment fields are updated only for entities
