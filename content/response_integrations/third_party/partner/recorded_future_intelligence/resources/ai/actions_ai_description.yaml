    This action queries Recorded Future to retrieve threat intelligence for Host and
    Domain entities. It enriches the entities with risk scores, risk strings, and
    other relevant intelligence data. If the retrieved risk score exceeds the configured
    threshold, the action marks the entity as suspicious and generates a case insight
    with the detailed risk evidence.


