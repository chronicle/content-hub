  ai_description: >-
    ### General Description

    Submits a file to the Recorded Future Sandbox for detonation and analysis. This
    action allows analysts to upload files from either a Google Cloud Storage (GCP)
    bucket or the local file system to the Recorded Future Sandbox, enabling automated
    malware analysis and threat intelligence gathering.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | string | Yes | The path to the file to be analyzed. |

    | File Source | ddl | Yes | The source of the file. Options: 'GCP Bucket', 'Local
    File System'. |

    | Profile | string | No | The Sandbox profile to use for analysis. |

    | Password | string | No | Password for the archive sample, if applicable. |


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API URL, API Key) and
    action inputs.

    2. **File Retrieval**: Retrieves the file from the specified source (GCP Bucket
    or Local File System).

    3. **Submission**: Submits the file to the Recorded Future Sandbox for detonation.

    4. **Asynchronous Polling**: Since the action is asynchronous, it polls the sandbox
    for the analysis status.

    5. **Result Processing**: Once the analysis is complete, it retrieves the sandbox
    report, generates case insights containing the analysis details, and returns the
    final result.
