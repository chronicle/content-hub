Search Hash Malware Intelligence:
  ai_description: >-
    Queries Recorded Future's Malware Intelligence to retrieve sandbox analysis reports
    for SHA256 file hashes. This action allows analysts to look up historical sandbox
    detonations and technical indicators associated with a specific hash without needing
    to re-detonate the file.


    ### General Description

    The action iterates through file hash entities in the current context and queries
    the Recorded Future API for existing sandbox reports. It supports filtering by
    date range and can be restricted to only search for samples submitted by the user's
    enterprise. The results include risk scores, malware signatures, and network flow
    data, which are then presented as a Case Insight for quick review.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | My Enterprise | boolean | No | false | If set to true, the action will only
    return reports for samples submitted by your organization. |

    | Start Date | string | No | -30d | The starting point for the search lookback.
    Supports relative formats (e.g., '-1d', '-30d') or specific dates (YYYY-MM-DD).
    |

    | End Date | string | No | None | The end point for the search lookback. If left
    empty, it defaults to the current time. |


    ### Additional Notes

    * This action specifically targets **SHA256** hashes. The logic explicitly filters
    for hash identifiers with a length of 64 characters.

    * If no report is found for a hash within the specified timeframe, the action
    will still complete successfully but will indicate that no data was found in the
    insight.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and user-provided
    parameters (Enterprise filter and date range).

    2. **Entity Filtering:** It identifies `FILEHASH` entities from the target list,
    specifically looking for SHA256 strings.

    3. **API Query:** For each valid hash, it calls the Recorded Future Malware Intelligence
    API to fetch sandbox reports.

    4. **Data Transformation:** The raw API response is parsed into a structured data
    model containing analysis summaries, signatures, and network telemetry.

    5. **Insight Generation:** A detailed HTML insight is created and attached to
    the entity in the Google SecOps case, providing immediate visibility into the
    malware's behavior.

