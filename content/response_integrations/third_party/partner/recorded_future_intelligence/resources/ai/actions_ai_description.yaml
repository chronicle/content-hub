  ai_description: "### General Description\nThe Ping action is a diagnostic tool used\
    \ to verify the connectivity between Google SecOps and the Recorded Future API.\
    \ It ensures that the provided API URL and API Key are valid and that the network\
    \ configuration allows for successful communication with the service.\n\n### Parameters\
