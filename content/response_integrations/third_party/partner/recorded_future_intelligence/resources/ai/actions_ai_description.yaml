  ai_description: >-
    ### General Description

    This action queries the Recorded Future API to retrieve malware intelligence reports
    for specific file hash entities. It allows users to search for sandbox reports
    associated with a hash, optionally filtering by enterprise-specific submissions
    and a defined date range. The action provides valuable context for threat hunting
    and incident response by surfacing sandbox analysis results directly within the
    case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | My Enterprise | boolean | No | Specify if the sample hash should be searched
    in your enterprise submissions only. Defaults to false. |

    | Start Date | string | No | Specify the starting date to lookback. Accept format
    like 2026-01-23 or -1d. Defaults to -30d. |

    | End Date | string | No | Specify the ending date to lookback. Accept format
    like 2026-01-23 or -1d. None means today. |


    ### Flow Description

    1. The action extracts configuration parameters (API URL, API Key, SSL verification)
    and action parameters (My Enterprise, Start Date, End Date).

    2. It iterates through the target entities, filtering for those with the type
    `FILEHASH` and an identifier length of 64 characters.

    3. For each valid hash, it calls the Recorded Future API to fetch sandbox reports.

    4. If reports are found, it generates a detailed HTML insight containing the sandbox
    analysis, including scores, tags, file extensions, signatures, and network flows,
    and attaches it to the case.

    5. The action adds the raw JSON results of the API call to the action output.
