Enrich IP:
  ai_description: >-
    Enriches IP Address entities using Recorded Future threat intelligence. This action
    retrieves comprehensive data including risk scores, evidence details, location
    information (ASN, country, city), and organizational context. It evaluates the
    risk score against a user-defined threshold to determine if the entity should
    be marked as suspicious within Google SecOps. Additionally, it can contribute
    detection telemetry back to Recorded Future via the Collective Insights feature.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | The minimum malicious risk score (0-99)
    required to mark an IP as suspicious. Below 5 is 'No Malicious Content', 5-24
    is 'Unusual', 25-64 is 'Suspicious', 65-89 is 'Malicious', and 90-99 is 'Very
    Malicious'. |

    | Include Links | Boolean | No | If enabled, the action retrieves and displays
    information about related entity links in a separate data table. |

    | Enable Collective Insights | Boolean | No | If enabled, the action contributes
    detection telemetry (IOC value, type, and incident metadata) back to Recorded
    Future. |


    ### Additional Notes

    - **Collective Insights Logic**: Submission to Collective Insights only occurs
    if the feature is enabled both globally in the integration configuration and specifically
    for this action. Furthermore, submissions are automatically skipped if the alert's
    reporting vendor is 'Recorded Future' to prevent redundant reporting.

    - **Risk Scoring**: If Recorded Future returns no score for an entity, a default
    score of 0 is used for threshold comparison.


    ### Flow Description

    1. **Initialization**: Extracts API credentials from the configuration and user-defined
    parameters (Threshold, Links, Collective Insights).

    2. **Entity Filtering**: Identifies all IP Address entities present in the current
    alert or case context.

    3. **Intelligence Retrieval**: Queries Recorded Future for each IP to obtain its
    risk score, evidence details, location data, and optional links.

    4. **External Contribution**: If Collective Insights is enabled and the alert
    source is external, the action submits the detection metadata to Recorded Future.

    5. **Risk Evaluation**: Compares the retrieved risk score against the 'Risk Score
    Threshold'. If the score exceeds the threshold, the entity is marked as suspicious.

    6. **Internal Enrichment**: Updates the entity's additional properties with Recorded
    Future metadata, sets the 'is_enriched' flag, and creates a detailed Case Insight
    containing risk evidence and location details.

    7. **Reporting**: Adds data tables for the overview report, triggered risk rules,
    and links to the action results, while also providing a direct link to the Recorded
    Future Intel Card.
