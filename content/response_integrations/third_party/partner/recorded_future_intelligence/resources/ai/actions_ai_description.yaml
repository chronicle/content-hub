    \ (API URL, API Key, and SSL verification settings).\n2. **Manager Setup**: It\
    \ instantiates the `RecordedFutureManager` using the provided credentials.\n3.\
    \ **Connectivity Test**: The action calls the `test_connectivity` method, which\
    \ attempts to perform a basic enrichment lookup for the IP address `8.8.8.8`.\n\
