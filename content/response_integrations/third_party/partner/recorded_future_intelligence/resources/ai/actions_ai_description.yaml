  ai_description: >-
    Queries Recorded Future to retrieve existing malware intelligence and sandbox
    analysis reports for file hash entities. This action specifically targets SHA256
    hashes and searches for reports previously generated within the Recorded Future
    Sandbox environment. It allows users to filter results to their own enterprise
    submissions and define a specific lookback period. For every hash found, the action
    generates a detailed Case Insight containing analysis summaries, risk scores,
    detected signatures (including TTPs), and network flow data.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the API configuration and user-provided
    parameters, including the enterprise filter and date range.

    2. **Entity Filtering:** It identifies all `FILEHASH` entities within the current
    context, specifically validating that they are SHA256 (64 characters).

    3. **Intelligence Retrieval:** For each valid hash, it queries the Recorded Future
    Malware Intelligence API for sandbox reports matching the criteria.

    4. **Insight Generation:** If reports are found, the action parses the technical
    details (signatures, network flows, scores) and creates a formatted HTML Case
    Insight for the entity.

    5. **Result Output:** The action returns a JSON object containing the raw report
    data and updates the action status based on whether reports were successfully
    retrieved.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | My Enterprise | boolean | No | If set to `true`, the search is restricted to
    samples submitted by your organization's Recorded Future account. Defaults to
    `false`. |

    | Start Date | string | No | The start date for the report search lookback. Supports
    relative formats like `-30d` or absolute dates like `YYYY-MM-DD`. Defaults to
    `-30d`. |

    | End Date | string | No | The end date for the report search lookback. Supports
    relative or absolute formats. If left empty, it defaults to the current date.
    |
