  ai_description: >-
    ### General Description

    Enriches IP Address entities using Recorded Future. This action retrieves threat
    intelligence including risk scores, triggered rules, and location data. It evaluates
    the risk based on a specified threshold, updates the entity's suspicious status,
    and generates an insight with the analysis results.


