  ai_description: >-
    ### General Description

    This action creates an analyst note within the Recorded Future platform. It aggregates
    the identifiers of all entities currently present in the case and appends them
    to the provided note text, ensuring that the analyst note is contextually linked
    to the relevant entities. This facilitates better documentation and threat intelligence
    sharing within the Recorded Future ecosystem.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note Title | string | Yes | The title for the analyst note. |

    | Note Text | string | Yes | The main content/body of the analyst note. |

    | Topic | ddl | No | The specific topic or category for the note (e.g., Actor
    Profile, Malware/Tool Profile). |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Note Title`, `Note Text`,
    and `Topic` from the action parameters.

    2. **Entity Collection**: It iterates through all `target_entities` provided in
    the case and collects their identifiers.

    3. **Text Preparation**: The collected entity identifiers are appended to the
    `Note Text` to provide context.

    4. **API Interaction**: The action initializes the `RecordedFutureManager` and
    calls the `get_analyst_notes` method to create the note in the Recorded Future
    platform.

    5. **Result**: The action returns the `note_id` of the created note and completes
    the execution.
