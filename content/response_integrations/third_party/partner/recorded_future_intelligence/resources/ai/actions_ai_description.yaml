  ai_description: >-
    ### General Description

    The **Add Analyst Note** action allows analysts to publish a custom note directly
    to the Recorded Future platform. This is useful for documenting findings, sharing
    intelligence, or tagging specific indicators within the Recorded Future ecosystem.
    The action automatically collects the identifiers of all entities present in the
    current Google SecOps case and appends them to the note text, ensuring that the
    context of the investigation is preserved in the external record.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Note Title** | String | Yes | The title of the analyst note to be created
    in Recorded Future. |

    | **Note Text** | String | Yes | The main content or body of the note. The action
    will automatically append a list of case entities to this text. |

    | **Topic** | DDL | No | An optional category for the note, such as 'Malware/Tool
    Profile', 'Actor Profile', or 'Indicator'. Defaults to 'None'. |


    ### Additional Notes

    - This action does not modify any data within Google SecOps; it only creates a
    record in the external Recorded Future system.

    - The resulting `note_id` from Recorded Future is returned as the action's output.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API credentials from the
    integration configuration and the note details (Title, Text, Topic) from the action
    parameters.

    2. **Entity Collection**: It iterates through all entities associated with the
    current case and compiles their identifiers into a formatted string.

    3. **Text Augmentation**: The list of collected entity identifiers is appended
    to the user-provided `Note Text` to provide context for the note in Recorded Future.

    4. **External API Call**: The action uses the Recorded Future Manager to send
    a request to the Recorded Future API to publish the note with the specified title,
    augmented text, and topic.

    5. **Result Handling**: Upon success, the action returns the unique ID of the
    created note (`note_id`) and completes the execution.
