    the risk threshold and link inclusion settings.

    2. **Entity Processing**: Filters the target entities to identify Hostnames and
    Domains.

    3. **Intelligence Retrieval**: Queries the Recorded Future API for each identified
    entity to fetch risk scores and evidence.

    4. **External Mutation (Optional)**: If 'Enable Collective Insights' is enabled,
    the action submits detection data to Recorded Future.

    5. **Risk Evaluation**: Compares the retrieved risk score against the 'Risk Score
    Threshold'.

    6. **Internal Enrichment**: Updates the entity's additional properties, sets the
    'is_suspicious' flag if the threshold is met, and populates data tables with the
    report summary and risk rules.

    7. **Insight Generation**: Creates a detailed case insight for entities deemed
    risky, providing context on why the entity was flagged.


    ### Additional Notes

    - The action supports both `HOSTNAME` and `DOMAIN` entity types.

    - Collective Insights submission is skipped if the alert's reporting vendor is
    'Recorded Future' to avoid circular reporting.
