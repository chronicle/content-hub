    1. Extracts configuration parameters (API URL, API Key, SSL verification, Collective
    Insights global setting) and action parameters.

    2. Determines if Collective Insights should be enabled based on the action settings
    and alert context.

    3. Initializes the Recorded Future manager.

    4. Iterates through the target entities, filtering for `HOSTNAME` and `DOMAIN`
    types.

    5. For each valid entity, fetches threat intelligence from Recorded Future.

    6. Adds data tables to the action results containing the report, triggered risk
    rules, and links (if enabled).

    7. If the risk score exceeds the threshold, marks the entity as suspicious and
    creates a case insight.

    8. Updates the entity with enrichment data and marks it as enriched.

    9. Adds the final JSON result and ends the action.
