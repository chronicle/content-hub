Enrich IOCs Bulk:
  ai_description: >-
    ### General Description

    Enriches multiple Indicator of Compromise (IOC) entities in bulk using the Recorded
    Future SOAR API. This action retrieves comprehensive threat intelligence, including
    risk scores and evidence, for IP addresses, domains, hostnames, file hashes, URLs,
    and CVEs. It also allows for contributing detection data back to Recorded Future
    via the Collective Insights feature.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enable Collective Insights | Boolean | No | If enabled, the action will contribute
    detection data (IOCs and alert context) back to Recorded Future's Collective Insights
    platform. This is only performed if the alert vendor is not Recorded Future. |


    ### Additional Notes

    - This action is designed for bulk processing and returns data in a structured
    JSON format.

    - Collective Insights submission is subject to both global integration settings
    and the specific action parameter.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves API credentials and the 'Enable Collective
    Insights' setting.

    2. **Entity Identification:** Filters the case's target entities to find supported
    types: Hostname, CVE, Filehash, Address, URL, and Domain.

    3. **Bulk Request Preparation:** Groups the identified entities by type to prepare
    a single bulk request for the Recorded Future SOAR API.

    4. **Intelligence Retrieval:** Executes the bulk lookup to fetch risk scores and
    threat data.

    5. **Collective Insights Submission:** If enabled and applicable, submits the
    detection context to Recorded Future.

    6. **Result Output:** Returns the enriched data as a JSON result for use in subsequent
    playbook steps.
