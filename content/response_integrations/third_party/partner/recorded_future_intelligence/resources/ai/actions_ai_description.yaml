  ai_description: >-
    ### General Description

    Queries Recorded Future to retrieve threat intelligence and risk scores for CVE
    entities. The action evaluates the risk score against a configured threshold to
    determine if the CVE is suspicious, updates the entity with the enrichment data,
    and generates a case insight. It can also optionally contribute detection data
    back to Recorded Future Collective Insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Risk Score Threshold | String | Yes | Represents the minimum malicious risk
    score (0-99) for a CVE to be marked malicious. |

    | Include Links | Boolean | No | If enabled, the action will retrieve and include
    information about links associated with the CVE. |

    | Enable Collective Insights | Boolean | No | If enabled, contributes detections
    back to Recorded Future. |


    ### Flow Description

    1. Iterates over the target entities and filters for `CVE` entity types.

    2. Queries the Recorded Future API to fetch threat intelligence and risk scores
    for each CVE.

    3. If `Enable Collective Insights` is true, submits the detection data back to
    Recorded Future.

    4. Evaluates the retrieved risk score against the `Risk Score Threshold`. If the
    score exceeds the threshold, marks the entity as suspicious.

    5. Updates the entity's properties with the enrichment data and creates a case
    insight with the analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
