Enrich Host:
  ai_description: >-
    ### General Description

    Enriches Hostname and Domain entities using Recorded Future intelligence. This
    action retrieves comprehensive threat intelligence, including risk scores, triggered
    risk rules, and evidence details. It helps analysts identify malicious hosts by
    comparing risk scores against a configurable threshold and provides direct links
    to the Recorded Future portal for deeper investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | 25 | Represents the minimum malicious
    risk score (0-99) for a Host to be marked malicious. |

    | Include Links | Boolean | No | False | If enabled, the action will retrieve
    information about links from Recorded Future. |

    | Enable Collective Insights | Boolean | No | True | If enabled, contributes detection
    data back to Recorded Future's Collective Insights API. |


    ### Additional Notes

    * Collective Insights are only submitted if the alert's reporting vendor is not
    'Recorded Future'.

    * The action supports both Hostname and Domain entity types.


    ### Flow Description

    1. **Initialize Connection**: Establishes a connection to Recorded Future using
    the provided API URL and Key.

    2. **Filter Entities**: Identifies target entities of type Hostname or Domain
    for processing.

    3. **Query Intelligence**: For each entity, queries Recorded Future for enrichment
    data, including risk scores and evidence details.

    4. **Submit Collective Insights**: If enabled and applicable, submits detection
    telemetry to Recorded Future.

    5. **Evaluate Risk**: Compares the retrieved risk score against the user-defined
    'Risk Score Threshold'.

    6. **Update Internal Data**: Updates the entity's suspicious status, adds enrichment
    properties, and creates case insights with detailed risk evidence.

    7. **Generate Results**: Adds data tables for overview, risk rules, and links
    to the case wall, and provides a direct link to the Recorded Future portal.
