  ai_description: >-
    Adds SecOps entities to a specified list in Recorded Future.


    ### Parameters Description

    * **List ID** (Mandatory): The ID of the list in Recorded Future to add entities
    to.

    * **Entity ID** (Optional): The ID of a specific entity to add.

    * **Entity Name** (Optional): The name of the entity to add.

    * **Entity Type** (Optional): The type of the entity to add.


    ### Additional Notes

    If the `Entity ID` parameter is provided, the action will only add that specific
    entity. Alternatively, if both `Entity Name` and `Entity Type` are provided, it
    will use those. If none of these optional parameters are provided, the action
    defaults to processing the target entities from the SecOps case.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Determines the target entities to add based on the provided parameters or defaults
    to the case's target entities.

    3. Initializes the Recorded Future API client.

    4. Fetches the specified list from Recorded Future using the provided `List ID`.

    5. Performs a bulk add operation to insert the entities into the list.

    6. Returns a summary of the added, unchanged, and failed entities, and completes
    the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entities to a specified list in Recorded Future.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action adds entities to a Recorded Future list using the `bulk_add` method.
      It mutates external data by modifying the list in Recorded Future. It does not
      fetch contextual data for enrichment, nor does it mutate internal SecOps data
      such as updating entities or creating insights.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding entities to a list in Recorded Future,
      so it cannot be classified as an enrichment action. It does not perform remediation
      tasks such as blocking IPs or disabling users, so it is not a remediation action.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - DOMAIN
    - HOSTNAME
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action processes `siemplify.target_entities` and maps them using the `map_secops_entities_to_rf`
