    action retrieves comprehensive threat intelligence, including risk scores, triggered
    risk rules, and related links. It evaluates the risk based on a user-defined threshold,
    updates the entity's suspicious status within Google SecOps, and generates detailed
    case insights and data tables for analyst review. Additionally, it can optionally
