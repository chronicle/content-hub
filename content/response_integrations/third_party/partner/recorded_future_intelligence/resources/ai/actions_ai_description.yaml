    reasoning: >-
      The action publishes an analyst note to a Threat Intelligence platform (Recorded
      Future). This does not align with adding an alert comment in SecOps, creating
      a ticket in an ITSM, or any other predefined action outcome category.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
