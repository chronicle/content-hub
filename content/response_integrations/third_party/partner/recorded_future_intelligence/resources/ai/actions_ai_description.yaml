Create Auto YARA Rule:
  ai_description: >-
    ### General Description

    Creates a new Auto YARA rule in Recorded Future based on provided file hashes
    and/or a query. This action initiates a job in the Recorded Future platform to
    generate a YARA rule, waits for its completion, and retrieves the generated rule
    data.


    ### Flow Description

    1. Iterates through the target entities and extracts those with the type File
    Hash.

    2. Initializes the Recorded Future `AutoYaraMgr` client.

    3. Makes an API call to Recorded Future to create a new Auto YARA rule job, passing
    the extracted hashes, the provided job name, and an optional query.

    4. Makes a subsequent API call to fetch the job result, waiting until the job
    has finished processing.

    5. Returns the generated YARA rule data as a JSON result.


    ### Additional Notes

    This action requires valid Recorded Future API credentials. The execution time
    may vary depending on how long the Auto YARA job takes to complete on the Recorded
    Future side.
