  ai_description: >-
    ### General Description

    Submits URL entities to the Recorded Future Sandbox for detonation and behavioral
    analysis. This action is designed to provide deep visibility into the nature of
    a URL by executing it in a controlled environment and observing its activities,
    such as network connections, file modifications, and signature matches. It is
    an asynchronous action that handles the submission and then polls the sandbox
    until the analysis is complete.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Profile | String | No | Specifies the Sandbox profile to be used for the detonation.
    If not provided, the default sandbox profile will be used. |


    ### Flow Description

    1. **Entity Extraction**: The action identifies all URL entities within the current
    case scope.

    2. **Submission**: It submits each identified URL to the Recorded Future Sandbox
    API using the provided (or default) profile.

    3. **Asynchronous Polling**: Since detonation takes time, the action enters an
    'In Progress' state. It periodically checks the status of the submitted samples.

    4. **Report Retrieval**: Once the sandbox marks a sample as 'reported', the action
    fetches the full overview report, including risk scores and behavioral signatures.

    5. **Case Enrichment**: The action generates detailed case insights for each URL,
    providing a summary of the detonation results (score, scan time, target details,
    and IOCs).

    6. **Finalization**: Once all URLs are processed, it outputs the results as a
    JSON object and populates a data table in the case wall.


    ### Additional Notes

    - **Asynchronous Execution**: This action will remain in an 'In Progress' state
    until the sandbox analysis is finished or a timeout occurs.

    - **Timeout Management**: If the analysis takes longer than the configured SOAR
    timeout, the action will report a timeout error listing the pending URLs.
