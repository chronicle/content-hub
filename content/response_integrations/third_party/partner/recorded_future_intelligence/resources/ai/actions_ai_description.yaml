  ai_description: >-
    Submits a file to the Recorded Future Sandbox for detonation and analysis. The
    action retrieves the file from a specified source and uploads it to the sandbox.
    It then periodically checks the submission status until the analysis is complete,
    retrieving the behavior report and threat score. Finally, it generates a case
    insight with the detonation details and returns the results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Path | String | Yes | Specify the file path or identifier to retrieve the
    file. |

    | File Source | Dropdown | Yes | Destination to pull files from. By default, the
    action attempts to pull the file from Google Cloud storage bucket. Saving an attachment
    to the local file system is a fallback option. |

    | Profile | String | No | Specify the Sandbox profile to use for detonation. |

    | Password | String | No | Password for the archive sample if it is encrypted.
    |


    ### Flow

    1. Retrieves the file from the specified source (GCP Bucket or Local File System).

    2. Submits the file to the Recorded Future Sandbox for analysis.

    3. Polls the sandbox for the analysis status.

    4. Retrieves the overview report once the analysis is complete.

    5. Creates a case insight with the detonation results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
