      Creates a case insight with the sandbox analysis results.
    reasoning: >-
      The action fetches data by retrieving the analysis report from the sandbox.
      It mutates external data by uploading a file to the Recorded Future Sandbox.
      It mutates internal data by creating a case insight with the analysis results.
      It does not update entities, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by submitting a file to a sandbox, so it cannot
      be classified as Enrichment. It does not perform any remediation tasks such
      as blocking IPs or disabling users, so it is not a Remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
