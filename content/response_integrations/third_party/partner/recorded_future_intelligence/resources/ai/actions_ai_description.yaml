Detonate URL:
  ai_description: >-
    Submits URL entities to the Recorded Future Sandbox for automated analysis and
    detonation. This is an asynchronous action that initiates a scan and then polls
    for the results. Once the analysis is complete, it retrieves a detailed report
    including risk scores, signatures, and associated IOCs.


    ### Flow Description

    1. **Extraction:** Identifies URL entities from the target entities in the current
    context.

    2. **Submission:** Submits the identified URLs to the Recorded Future Sandbox
    API, optionally using a specified Sandbox profile.

    3. **Polling:** Periodically checks the status of the submitted samples until
    they reach a 'reported' or 'failed' state.

    4. **Retrieval:** Fetches the overview report for all successfully analyzed URLs.

    5. **Enrichment:** Generates detailed HTML insights for each analyzed URL, including
    summary scores, scan metadata, and detected signatures/IOCs.

    6. **Finalization:** Populates the action results with JSON data and a summary
    table of the findings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Profile | String | No | Specifies the Sandbox profile to be used for the detonation
    (e.g., specific OS or browser environment). |


    ### Additional Notes

    * This action is **asynchronous**; it will remain in an 'In Progress' state while
    waiting for the Sandbox to complete the analysis.

    * If the action approaches the global timeout, it will report the pending URLs
    in the output message.
