Enrich CVE:
  ai_description: >-
    Enriches CVE (Common Vulnerabilities and Exposures) entities using Recorded Future's
    threat intelligence. This action retrieves comprehensive vulnerability data, including
    risk scores, evidence details, and intelligence card links. It evaluates the CVE
    against a user-defined risk threshold to automatically mark entities as suspicious
    within Google SecOps. Additionally, it can contribute detection telemetry back
    to Recorded Future via the Collective Insights feature.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves API credentials from the integration configuration
    and action parameters including the Risk Score Threshold, Link inclusion preference,
    and Collective Insights toggle.

    2. **Entity Filtering:** Identifies and processes only CVE entities present in
    the current context.

    3. **Intelligence Retrieval:** Queries Recorded Future for the risk score, evidence
    details, and (optionally) related entity links for each CVE.

    4. **External Contribution:** If 'Enable Collective Insights' is active and the
    alert did not originate from Recorded Future, it submits detection metadata to
    Recorded Future's telemetry API.

    5. **Internal Enrichment:** Updates the entity's additional properties with Recorded
    Future metadata and sets the 'is_enriched' flag.

    6. **Risk Assessment:** Compares the retrieved risk score against the 'Risk Score
    Threshold'. If exceeded, the entity is marked as suspicious.

    7. **Insight & Reporting:** Generates a detailed Case Insight containing risk
    evidence and populates data tables with overview and link information.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | Yes | The minimum malicious risk score (0-99)
    required to mark a CVE as suspicious. Default is 25. |

    | Include Links | Boolean | No | If enabled, the action retrieves and displays
    related entity links from Recorded Future. |

    | Enable Collective Insights | Boolean | No | If enabled, the action shares detection
    telemetry back to Recorded Future to improve global threat intelligence. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      If the 'Enable Collective Insights' parameter is enabled, the action performs
      a POST request to Recorded Future's Collective Insights API to contribute detection
      telemetry.
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (is_suspicious, is_enriched, additional_properties)
      and creates case insights based on the retrieved threat intelligence.
