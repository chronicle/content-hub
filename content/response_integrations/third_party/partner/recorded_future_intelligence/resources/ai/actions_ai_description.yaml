  ai_description: >-
    Updates a playbook alert in Recorded Future with new metadata such as status,
    priority, assignee, and comments. This action allows analysts to synchronize the
    state of an alert between Google SecOps and Recorded Future.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the mandatory Playbook Alert
    ID and Category, along with optional update parameters (Status, Priority, Assignee,
    Log Entry, and Reopen Strategy).

    2. **Validation:** It verifies that at least one optional update parameter has
    been provided; otherwise, the action fails to prevent redundant API calls.

    3. **External Interaction:** The action uses the Recorded Future Manager to fetch
    the current state of the alert and then submits an update request to the Recorded
    Future API.

    4. **Result Processing:** The updated alert details are returned as a JSON result,
    and a success message is displayed in the action output.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Playbook Alert ID | String | Yes | The unique identifier of the playbook alert
    to be updated. |

    | Playbook Alert Category | String | Yes | The category of the playbook alert
    (e.g., domain_abuse, cyber_vulnerability). |

    | Assign To | String | No | The user uhash to whom the alert should be assigned
    in Recorded Future. |

    | Log Entry | String | No | A comment or note to be added to the alert's activity
    log during the update. |

    | Status | DDL | No | The new status for the alert (New, In Progress, Dismissed,
    Resolved). |

    | Priority | DDL | No | The new priority level for the alert (High, Moderate,
    Informational). |

    | Reopen Strategy | DDL | No | Defines the strategy for reopening the alert (Never,
    Significant Updates). |


    ### Additional Notes:

    At least one of the following parameters must be configured for the action to
    run: 'Assign To', 'Log Entry', 'Status', 'Priority', or 'Reopen Strategy'.
