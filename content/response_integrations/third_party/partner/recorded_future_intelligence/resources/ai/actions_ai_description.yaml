  ai_description: >-
    Updates an existing alert in Recorded Future by modifying its status, assignee,
    or adding a note. This action allows analysts to synchronize the state of an alert
    between Google SecOps and the Recorded Future platform.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the Recorded Future API credentials
    and the specific alert details (ID, Status, Assignee, and Note) from the action
    parameters.

    2. **Validation:** It verifies that at least one of the optional parameters (Assign
    To, Note, or Status) is provided to perform an update.

    3. **API Interaction:** The action uses the `RecordedFutureManager` to send a
    request to the Recorded Future API, targeting the specified Alert ID with the
    new values.

    4. **Result Processing:** Upon a successful API call, the action returns a JSON
    result confirming the update and provides an output message to the SecOps case
    wall.


    ### Parameters Description:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert in Recorded Future
    that needs to be updated. |

    | Assign To | String | No | The identifier (ID, username, hash, or email) of the
    user to whom the alert should be assigned. |

    | Note | String | No | A text note to be added or updated on the alert in Recorded
    Future. |

    | Status | DDL | Yes | The new status to set for the alert. Options include: New,
    Pending, Dismissed, Resolved, Flag for Tuning. |


    ### Additional Notes:

    * Although 'Status' is marked as mandatory in the configuration, the underlying
    logic requires that at least one of 'Status', 'Assign To', or 'Note' contains
    a value for the action to execute successfully.
