  ai_description: >-
    Enriches CVE entities using Recorded Future Intelligence. This action retrieves
    comprehensive threat intelligence for vulnerabilities, including risk scores,
    evidence details, and links to intelligence cards. It evaluates the risk based
    on a user-defined threshold to mark entities as suspicious and contributes detection
    data back to Recorded Future if Collective Insights is enabled.


    ### Parameters Description


    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | String | True | 25 | Represents the minimum malicious
    risk score (0-99) for a CVE to be marked suspicious. Levels: Very Critical (90-99),
    Critical (80-89), High (65-79), Medium (25-64), Low (5-24), None (0). |

    | Include Links | Boolean | False | False | If enabled, the action retrieves information
    about related links for the CVE. |

    | Enable Collective Insights | Boolean | False | True | If enabled, the action
    contributes detection telemetry back to Recorded Future's Collective Insights
    platform. |


    ### Additional Notes

    - Collective Insights are only submitted if the global integration setting is
    enabled and the alert reporting vendor is not Recorded Future.

    - The action updates the entity's suspicious status and adds enrichment data to
    its additional properties.


    ### Flow Description

    1. **Initialization:** Extracts API credentials from the integration configuration
    and user parameters (Threshold, Links, Collective Insights) from the action settings.

    2. **Entity Filtering:** Identifies and processes only CVE entities present in
    the current context.

    3. **Data Retrieval:** Queries the Recorded Future API for each CVE to fetch risk
    scores, evidence details, and intelligence card URLs.

    4. **External Mutation:** If 'Enable Collective Insights' is active, it submits
    detection data to Recorded Future.

    5. **Risk Evaluation:** Compares the retrieved risk score against the 'Risk Score
    Threshold'. If exceeded, the entity is marked as suspicious.

    6. **Internal Updates:** Updates the entity's properties in Google SecOps, creates
    detailed case insights, and adds data tables for risk rules and links.
