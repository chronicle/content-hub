  ai_description: >-
    Submits a file to the Recorded Future Sandbox (Triage) for detonation and behavioral
    analysis. This action is designed to handle file samples asynchronously, allowing
    the sandbox to complete its analysis before retrieving the results. It supports
    fetching files from either a local file system or a Google Cloud Platform (GCP)
    bucket. Once the analysis is complete, the action retrieves a comprehensive report,
    including threat scores, signatures, and network flows, and attaches this information
    as a case insight within Google SecOps.


    ### Flow Description

    1. **File Retrieval**: The action identifies the file source (GCP Bucket or Local
    File System) and retrieves the file content using the provided path.

    2. **Submission**: The file is uploaded to the Recorded Future Sandbox API along
    with optional parameters like a specific analysis profile or an archive password.

    3. **Polling**: As an asynchronous action, it enters an 'In Progress' state, periodically
    checking the status of the submission until the sandbox reports that the analysis
    is finished.

    4. **Report Generation**: Upon completion, the action fetches the overview report
    from the sandbox.

    5. **Enrichment & Insights**: The action processes the report data to create a
    detailed HTML insight in the SecOps case, providing visibility into the file's
    behavior and risk score.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | string | Yes | The specific path or identifier of the file to be
    detonated. |

    | File Source | ddl | Yes | Defines where to pull the file from. Options are 'GCP
    Bucket' (default) or 'Local File System'. |

    | Profile | string | No | The specific Recorded Future Sandbox profile to use
    for the analysis. |

    | Password | string | No | The password required to extract the file if it is
    a protected archive. |


    ### Additional Notes

    - This action is asynchronous and may require multiple execution cycles depending
    on the sandbox analysis time.

    - If the action times out, it will list the pending files that were still being
    processed.
