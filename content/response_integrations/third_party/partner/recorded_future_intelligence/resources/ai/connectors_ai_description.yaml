"Recorded Future - Classic Alerts Connector":
  ai_description: >-
    ### General Description

    This connector integrates with Recorded Future to ingest **Classic Alerts** into
    Google SecOps. It allows security teams to monitor and automate the response to
    external threat intelligence alerts generated by Recorded Future's intelligence
    rules. The connector supports advanced filtering by alert status, rule names (via
    allowlist/denylist), and severity, while also ingesting AI-generated insights
    to provide analysts with immediate context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The source field name used to retrieve the
    Product Field name (default: `device_product`). |

    | EventClassId | String | Yes | The source field name used to retrieve the Event
    Field name (default: `rule_name`). |

    | Environment Field Name | String | No | The name of the field where the environment
    name is stored. |

    | Environment Regex Pattern | String | No | A regex pattern to manipulate the
    value found in the Environment Field Name. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit in seconds for the python
    process (default: `180`). |

    | API URL | String | Yes | API Root of the Recorded Future instance (default:
    `https://api.recordedfuture.com`). |

    | API Key | Password | Yes | Your Recorded Future API Key. |

    | Fetch Max Hours Backwards | Integer | No | The number of hours back from which
    to fetch events if no previous timestamp exists. |

    | Alert Statuses | String | No | Comma-separated list of statuses to fetch (e.g.,
    `New, Pending, Resolved, Dismissed`). |

    | Max Alerts To Fetch | Integer | No | Maximum number of alerts to process per
    iteration (default: `100`). |

    | Severity | String | Yes | The severity assigned to created alerts (Low, Medium,
    High, Critical). |

    | Use whitelist as a blacklist | Boolean | No | If enabled, the connector's whitelist
    will act as a denylist for rule names. |

    | Enable Overflow | Boolean | No | If enabled, uses deduplication logic to prevent
    alert flooding. |

    | Extract all Entities | Boolean | No | If enabled, extracts all entities from
    alert events; otherwise, only the primary entity is extracted. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate of the
    Recorded Future server. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username for authentication. |

    | Proxy Password | Password | No | The proxy password for authentication. |


    ### Flow Description

    1. **Initialization**: Connects to the Recorded Future API using the provided
    API Key and URL, validating SSL and proxy settings if configured.

    2. **Time Range Determination**: Calculates the starting point for the fetch based
    on the last successful execution timestamp or the "Fetch Max Hours Backwards"
    parameter.

    3. **Alert Discovery**: Queries Recorded Future for alert IDs that match the specified
    "Alert Statuses" and (optionally) specific rule IDs defined in the whitelist.

    4. **Data Retrieval**: Fetches full alert details in bulk, including metadata,
    associated entities, and AI-generated insights (AI Insights).

    5. **Filtering**: Applies whitelist/denylist logic against the Recorded Future
    `rule_name` to determine which alerts should be processed.

    6. **Mapping & Enrichment**: Transforms the raw Recorded Future data into the
    Google SecOps AlertInfo model. This includes mapping severity, assigning environments
    via regex, and attaching AI insights to the event data.

    7. **Deduplication**: Checks if "Enable Overflow" is active to skip alerts that
    meet deduplication criteria.

    8. **Ingestion**: Creates cases in Google SecOps for each processed alert and
    updates the internal state with the latest processed alert IDs and timestamps.
"Recorded Future - Playbook Alerts Connector":
  ai_description: >-
    ### General Description

    The Recorded Future - Playbook Alerts Connector ingests high-fidelity "Playbook
    Alerts" from the Recorded Future Intelligence platform into Google SecOps. This
    connector allows security teams to automate the monitoring of specific threat
    categories, such as domain abuse, code repository leakages, and third-party risks,
    by transforming these intelligence alerts into actionable cases within the SOAR
    environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The source field name used to retrieve the
    Product Field name (default: device_product). |

    | EventClassId | String | Yes | The source field name used to retrieve the Event
    Field name (default: category). |

    | Environment Field Name | String | No | The name of the field where the environment
    name is stored. |

    | Environment Regex Pattern | String | No | A regex pattern used to extract or
    manipulate the environment name from the environment field. |

    | PythonProcessTimeout | Integer | Yes | The maximum time (in seconds) allowed
    for the connector script to run. |

    | API URL | String | Yes | The base URL for the Recorded Future API instance.
    |

    | API Key | Password | Yes | The API Key used for authentication with Recorded
    Future. |

    | Fetch Max Hours Backwards | Integer | No | The lookback window (in hours) for
    fetching alerts during the first run or after a gap. |

    | Playbook Alert Categories | String | No | Comma-separated list of categories
    to fetch (e.g., domain_abuse, cyber_vulnerability). |

    | Playbook Alert Statuses | String | No | Comma-separated list of alert statuses
    to fetch (e.g., New, InProgress). |

    | Playbook Alert Priorities | String | No | Comma-separated list of alert priorities
    to fetch (e.g., High, Moderate). |

    | Max Alerts To Fetch | Integer | No | The maximum number of alerts to process
    in a single connector iteration. |

    | Severity | String | No | An optional override to set a fixed severity (Low,
    Medium, High, Critical) for all ingested alerts. |

    | Enable Overflow | Boolean | No | If enabled, uses the Google SecOps overflow
    mechanism to deduplicate similar alerts. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate of the
    Recorded Future server. |

    | Proxy Server Address | String | No | The address of the proxy server if one
    is required. |

    | Proxy Username | String | No | The username for proxy authentication. |

    | Proxy Password | Password | No | The password for proxy authentication. |


    ### Flow Description

    1. **Initialization**: The connector establishes a connection to the Recorded
    Future API using the provided credentials and configuration.

    2. **Time Window Calculation**: It determines the starting point for the fetch
    by checking the last successful execution timestamp or falling back to the "Fetch
    Max Hours Backwards" setting.

    3. **Data Retrieval**: The connector queries Recorded Future for Playbook Alerts,
    applying filters for specific categories, statuses, and priorities defined in
    the parameters.

    4. **Deduplication**: It compares fetched alert IDs against a local cache of previously
    processed IDs to ensure no duplicate cases are created.

    5. **Transformation**: Each unique alert is mapped to the Google SecOps AlertInfo
    data model. This includes mapping environment details, calculating severity (or
    applying overrides), and formatting the raw intelligence data into events.

    6. **Overflow Check**: If enabled, the connector checks if the alert matches overflow
    criteria to prevent system saturation from repetitive alerts.

    7. **Ingestion**: Validated alerts are sent to the Google SecOps platform to be
    created as cases. The connector then updates its state by saving the new timestamp
    and processed IDs.
"Recorded Future - Playbook Alerts Tracking Connector":
  ai_description: "### General Description\nThe **Recorded Future - Playbook Alerts\
    \ Tracking Connector** is designed to monitor and ingest updates for existing\
    \ Playbook Alerts from Recorded Future into Google SecOps. Unlike standard connectors\
    \ that fetch new alerts, this tracking connector specifically identifies modifications\
    \ to existing alerts\u2014such as status changes, priority escalations, or the\
    \ addition of new evidence\u2014and creates new cases in Google SecOps based on\
    \ these triggers. This ensures that significant developments in ongoing Recorded\
    \ Future investigations are captured as actionable events within the SOAR platform.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| DeviceProductField | String | Yes | The source\
    \ field name used to retrieve the Product Field name (default: device_product).\
    \ |\n| EventClassId | String | Yes | The source field name used to retrieve the\
    \ Event Field name (default: category). |\n| Environment Field Name | String |\
    \ No | The field name where the environment name is stored. |\n| Environment Regex\
    \ Pattern | String | No | A regex pattern to manipulate the environment field\
    \ value. |\n| PythonProcessTimeout | Integer | Yes | Timeout limit in seconds\
    \ for the python process. |\n| API URL | String | Yes | The API Root of the Recorded\
    \ Future instance (default: https://api.recordedfuture.com). |\n| API Key | Password\
    \ | Yes | Your Recorded Future API Key. |\n| Search Max Hours Backwards | Integer\
    \ | No | The number of hours to look back for Playbook Alert updates since the\
    \ last run. |\n| Playbook Alert Categories | String | No | Comma-separated list\
    \ of categories to fetch (e.g., domain_abuse, cyber_vulnerability). |\n| Playbook\
    \ Alert Statuses | String | No | Comma-separated list of statuses to fetch (e.g.,\
    \ New, InProgress, Resolved). |\n| Playbook Alert Priorities | String | No | Comma-separated\
    \ list of priorities to fetch (e.g., Informational, Moderate, High). |\n| Playbook\
    \ Alert Reopened | Boolean | No | If true, creates a new case when a Playbook\
    \ Alert is reopened. |\n| Priority Increased | Boolean | No | If true, creates\
    \ a new case when a Playbook Alert's priority is increased. |\n| New Assessment\
    \ Added | Boolean | No | If true, creates a new case when a new assessment is\
    \ added to the alert. |\n| Entity Added | Boolean | No | If true, creates a new\
    \ case when new entities are added to the alert. |\n| Max Alerts To Fetch | Integer\
    \ | No | Maximum number of alerts to process per connector iteration. |\n| Severity\
    \ | String | Yes | The default severity (Low, Medium, High, Critical) assigned\
    \ to created alerts. |\n| Enable Overflow | Boolean | No | If enabled, uses Google\
    \ SecOps overflow logic to deduplicate similar alerts. |\n| Verify SSL | Boolean\
    \ | No | If enabled, verifies the SSL certificate for the Recorded Future server.\
    \ |\n\n### Flow Description\n1. **Initialization**: The connector establishes\
    \ a connection to the Recorded Future API using the provided API Key and URL.\n\
    2. **Time Range Calculation**: It determines the search window by checking the\
    \ last successful execution time or falling back to the \"Search Max Hours Backwards\"\
    \ parameter.\n3. **Alert Retrieval**: It queries Recorded Future for Playbook\
    \ Alerts that have been updated within the time window, filtered by the configured\
    \ categories, statuses, and priorities.\n4. **Update Analysis**: For each retrieved\
    \ alert, the connector inspects the `panel_log_v2` (audit logs) to identify specific\
    \ changes that occurred within the search timeframe.\n5. **Trigger Evaluation**:\
    \ The connector checks if the identified changes match the enabled tracking triggers:\
    \ Reopened, Priority Increased, New Assessment Added, or Entity Added.\n6. **Case\
    \ Creation**: If a valid update trigger is detected, the connector maps the Playbook\
    \ Alert data into a Google SecOps alert format, applying environment and severity\
    \ settings.\n7. **Deduplication**: If \"Enable Overflow\" is active, the connector\
    \ checks for similar existing alerts to prevent redundant case creation.\n8. **Ingestion**:\
    \ The final alert objects are sent to Google SecOps to be created as new cases\
    \ for analyst review."
