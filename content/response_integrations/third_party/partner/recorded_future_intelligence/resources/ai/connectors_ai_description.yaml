"Recorded Future - Classic Alerts Connector":
  ai_description: >-
    ### General Description

    This connector integrates with Recorded Future to fetch "Classic" security alerts
    and ingest them into Google SecOps (SOAR) as cases. It enables automated monitoring
    of threat intelligence alerts, supporting advanced filtering, deduplication (overflow),
    and environment mapping to ensure relevant alerts are prioritized and actionable
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API URL | String | Yes | API Root of the Recorded Future instance. |

    | API Key | Password | Yes | API Key from Recorded Future. |

    | Severity | String | Yes | Severity assigned to created alerts (Low, Medium,
    High, Critical). |

    | DeviceProductField | String | Yes | Source field name for the Product Field.
    |

    | EventClassId | String | Yes | Source field name for the Event Field. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process.
    |

    | Fetch Max Hours Backwards | Integer | No | Amount of hours to fetch events from.
    |

    | Alert Statuses | String | No | Comma-separated statuses (e.g., New, Pending).
    |

    | Max Alerts To Fetch | Integer | No | Max alerts per iteration. |

    | Use whitelist as a blacklist | Boolean | No | If enabled, whitelist acts as
    a denylist. |

    | Enable Overflow | Boolean | No | If enabled, uses Google 'overflow' to deduplicate
    alerts. |

    | Extract all Entities | Boolean | No | If enabled, extracts all entities from
    events. |

    | Verify SSL | Boolean | No | Verify SSL certificate. |

    | Environment Field Name | String | No | Field name where environment is stored.
    |

    | Environment Regex Pattern | String | No | Regex to manipulate environment field.
    |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | Password | No | Proxy password. |


    ### Flow Description

    1. Connects to the Recorded Future API using the provided credentials.

    2. Reads previously processed alert IDs to ensure deduplication across iterations.

    3. Queries Recorded Future for alerts based on the configured time range, status,
    and severity.

    4. Filters alerts based on the configured whitelist/blacklist (rule names).

    5. Processes each alert:
        * Maps the alert to the Google SecOps `AlertInfo` format.
        * Applies environment mapping if configured.
        * Checks for alert overflow (deduplication) if enabled.
    6. Ingests processed alerts into Google SecOps as cases.

    7. Updates the state (timestamps and processed IDs) for subsequent runs.
"Recorded Future - Playbook Alerts Connector":
  ai_description: >-
    ### General Description

    The Recorded Future - Playbook Alerts Connector is designed to ingest security
    alerts from the Recorded Future platform into Google SecOps. It enables automated
    monitoring of various threat intelligence categories, such as domain abuse, cyber
    vulnerabilities, and third-party risks, allowing security analysts to respond
    to threats efficiently. The connector periodically polls the Recorded Future API,
    filters alerts based on user-defined criteria, and creates cases within the SOAR
    platform for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API URL | String | Yes | API Root of the Recorded Future instance. |

    | API Key | Password | Yes | API Key from Recorded Future. |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process
    running the script. |

    | Fetch Max Hours Backwards | Integer | No | Amount of hours from where to fetch
    events. |

    | Playbook Alert Categories | String | No | Comma-separated list of alert categories
    to fetch. |

    | Playbook Alert Statuses | String | No | Comma-separated list of alert statuses
    to fetch. |

    | Playbook Alert Priorities | String | No | Comma-separated list of alert priorities
    to fetch. |

    | Max Alerts To Fetch | Integer | No | Maximum number of alerts to process per
    iteration. |

    | Severity | String | No | Override severity for created alerts (Low, Medium,
    High, Critical). |

    | Enable Overflow | Boolean | No | If enabled, uses Google 'overflow' to deduplicate
    similar alerts. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate for the
    Recorded Future server. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | Password | No | Password for proxy authentication. |


    ### Flow Description

    1. The connector initializes and connects to the Recorded Future API using the
    provided credentials.

    2. It reads existing alert IDs from the system to ensure that only new alerts
    are processed, preventing duplicates.

    3. It queries the Recorded Future API for Playbook Alerts, applying filters for
    categories, statuses, priorities, and the specified time range.

    4. For each fetched alert, the connector checks for script timeouts and applies
    deduplication logic if 'Enable Overflow' is enabled.

    5. Valid alerts are mapped to the Google SecOps case format, including environment
    mapping based on configured fields and regex patterns.

    6. The processed alerts are ingested into the SOAR platform as new cases.

    7. Finally, the connector saves the current timestamp and updated list of alert
    IDs to ensure subsequent iterations continue from the correct point.
"Recorded Future - Playbook Alerts Tracking Connector":
  ai_description: "### General Description\nThis connector integrates with Recorded\
    \ Future to track and ingest Playbook Alert updates into Google SecOps. It monitors\
    \ for specific changes in alerts\u2014such as status updates, priority increases,\
    \ new assessments, or added entities\u2014and automatically creates or updates\
    \ cases within the SOAR platform based on these events.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | API URL | String | Yes | API Root of the Recorded Future instance. |\n| API\
    \ Key | Password | Yes | API Key from Recorded Future. |\n| DeviceProductField\
    \ | String | Yes | Source field name for the Product Field name. |\n| EventClassId\
    \ | String | Yes | Source field name for the Event Field name. |\n| PythonProcessTimeout\
    \ | Integer | Yes | Timeout limit for the python process. |\n| Severity | String\
    \ | Yes | Severity assigned to created cases (Low, Medium, High, Critical). |\n\
    | Search Max Hours Backwards | Integer | No | Hours to look back for updates.\
    \ |\n| Playbook Alert Categories | String | No | Comma-separated categories to\
    \ fetch. |\n| Playbook Alert Statuses | String | No | Comma-separated statuses\
    \ to fetch. |\n| Playbook Alert Priorities | String | No | Comma-separated priorities\
    \ to fetch. |\n| Playbook Alert Reopened | Boolean | No | Create case if alert\
    \ is reopened. |\n| Priority Increased | Boolean | No | Create case if priority\
    \ increases. |\n| New Assessment Added | Boolean | No | Create case if new assessment\
    \ is added. |\n| Entity Added | Boolean | No | Create case if entities are added.\
    \ |\n| Max Alerts To Fetch | Integer | No | Max alerts per iteration. |\n| Enable\
    \ Overflow | Boolean | No | Use overflow to deduplicate alerts. |\n| Verify SSL\
    \ | Boolean | No | Verify SSL certificate. |\n| Environment Field Name | String\
    \ | No | Field name for environment. |\n| Environment Regex Pattern | String |\
    \ No | Regex for environment field. |\n| Proxy Server Address | String | No |\
    \ Proxy server address. |\n| Proxy Username | String | No | Proxy username. |\n\
    | Proxy Password | Password | No | Proxy password. |\n\n### Flow Description\n\
    1. Authenticate with the Recorded Future API using the provided credentials.\n\
    2. Retrieve Playbook Alerts based on configured filters (categories, statuses,\
    \ priorities) and the specified time window.\n3. Analyze alert logs to detect\
    \ specific changes (reopened, priority increase, new assessment, entity added).\n\
    4. Filter alerts based on the enabled change criteria.\n5. Map valid alerts to\
    \ SOAR cases, applying environment settings and deduplication if overflow is enabled.\n\
    6. Ingest the resulting cases into Google SecOps."
