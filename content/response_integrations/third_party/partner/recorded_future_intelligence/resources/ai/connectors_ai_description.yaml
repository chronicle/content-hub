"Recorded Future - Classic Alerts Connector":
  ai_description: >-
    ### General Description

    The Recorded Future - Classic Alerts Connector fetches "Classic Alerts" from the
    Recorded Future API and ingests them into Google SecOps as cases. This integration
    allows security teams to automate the monitoring of threat intelligence alerts
    generated by Recorded Future's correlation rules, providing enriched event data,
    AI-driven insights, and direct links to the Recorded Future portal for further
    investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The source field name used to retrieve the
    Product Field name (default: device_product). |

    | EventClassId | String | Yes | The source field name used to retrieve the Event
    Field name (default: rule_name). |

    | Environment Field Name | String | No | The field name where the environment
    name is stored. |

    | Environment Regex Pattern | String | No | A regex pattern to extract or manipulate
    the environment name from the environment field. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit in seconds for the
    connector's execution (default: 180). |

    | API URL | String | Yes | The root URL of the Recorded Future API instance. |

    | API Key | Password | Yes | The API Key used to authenticate with Recorded Future.
    |

    | Fetch Max Hours Backwards | Integer | No | The number of hours to look back
    for alerts during the first run or if no checkpoint exists. |

    | Alert Statuses | String | No | Comma-separated list of alert statuses to fetch
    (e.g., New, Pending, Resolved, Dismissed). |

    | Max Alerts To Fetch | Integer | No | The maximum number of alerts to process
    in a single connector iteration. |

    | Severity | String | Yes | The severity level (Low, Medium, High, Critical) to
    assign to the created SecOps alerts. |

    | Use whitelist as a blacklist | Boolean | No | If enabled, the provided whitelist
    will be treated as a denylist to exclude specific rules. |

    | Enable Overflow | Boolean | No | If enabled, uses deduplication logic to prevent
    redundant alerts from creating multiple cases. |

    | Extract all Entities | Boolean | No | If enabled, extracts all entities found
    in the alert events; otherwise, only primary entities are extracted. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate of the
    Recorded Future server. |

    | Proxy Server Address | String | No | The address of the proxy server if one
    is required. |

    | Proxy Username | String | No | The username for proxy authentication. |

    | Proxy Password | Password | No | The password for proxy authentication. |


    ### Flow Description

    1. **Authentication**: The connector establishes a connection to the Recorded
    Future API using the provided API Key and URL.

    2. **Timeframe Calculation**: It determines the starting point for the fetch based
    on the last successful execution timestamp or the "Fetch Max Hours Backwards"
    parameter.

    3. **Alert Retrieval**: The connector queries Recorded Future for alerts matching
    the configured statuses (e.g., "New") and applies filtering based on the whitelist/denylist
    of rule names.

    4. **Deduplication**: It checks the retrieved alert IDs against a local database
    of previously processed IDs to ensure no duplicate cases are created.

    5. **Data Enrichment**: For each valid alert, the connector extracts event data,
    including AI-generated insights and metadata such as the alert URL and rule generator.

    6. **Case Creation**: The connector maps the Recorded Future alert data to the
    Google SecOps AlertInfo model, applies environment logic, and checks for overflow/deduplication
    before ingesting the case into the system.

    7. **Checkpointing**: Upon successful processing, the connector saves the timestamp
    of the most recent alert and updates the list of processed IDs for the next cycle.
"Recorded Future - Playbook Alerts Connector":
  ai_description: >-
    ### General Description

    The Recorded Future - Playbook Alerts Connector fetches high-fidelity threat intelligence
    alerts from the Recorded Future platform and ingests them into Google SecOps as
    cases. It specifically targets 'Playbook Alerts,' which are categorized intelligence
    findings such as domain abuse, code repository leakages, cyber vulnerabilities,
    and third-party risks. This integration enables security teams to automate the
    response to external threat intelligence by providing structured alert data directly
    within the SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API URL | String | Yes | The API Root of the Recorded Future instance (e.g.,
    https://api.recordedfuture.com). |

    | API Key | Password | Yes | The API Key used to authenticate with Recorded Future.
    |

    | Playbook Alert Categories | String | No | Comma-separated list of categories
    to fetch (e.g., domain_abuse, cyber_vulnerability, code_repo_leakage). |

    | Playbook Alert Statuses | String | No | Comma-separated list of statuses to
    fetch (e.g., New, InProgress, Resolved). |

    | Playbook Alert Priorities | String | No | Comma-separated list of priorities
    to fetch (e.g., Informational, Moderate, High). |

    | Fetch Max Hours Backwards | Integer | No | The number of hours back from the
    current time to start fetching alerts. |

    | Max Alerts To Fetch | Integer | No | The maximum number of alerts to process
    in a single connector iteration. |

    | Severity | String | No | An optional override for the alert severity (Low, Medium,
    High, Critical). |

    | Enable Overflow | Boolean | No | If enabled, uses Google SecOps overflow logic
    to deduplicate similar alerts. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate for the
    connection to the Recorded Future server. |

    | Environment Field Name | String | No | The field name used to determine the
    environment for the ingested alerts. |


    ### Flow Description

    1. **Initialization**: The connector validates the API credentials and configuration
    parameters, including category and status filters.

    2. **State Retrieval**: It identifies the starting point for the fetch by checking
    the last successful execution timestamp and retrieves a list of previously processed
    alert IDs to avoid duplication.

    3. **API Query**: The connector sends a request to the Recorded Future Playbook
    Alerts API, filtering by the configured categories, statuses, priorities, and
    the time window defined by the 'Fetch Max Hours Backwards' parameter.

    4. **Alert Transformation**: For each retrieved alert, the connector maps the
    Recorded Future data model to the Google SecOps `AlertInfo` format. This includes
    setting the environment, priority, and rule generator fields.

    5. **Deduplication & Overflow**: If 'Enable Overflow' is active, the connector
    checks the SOAR platform's overflow mechanism to skip alerts that are considered
    duplicates based on defined logic.

    6. **Case Creation**: Validated and transformed alerts are ingested into Google
    SecOps to create actionable cases.

    7. **Checkpointing**: Upon successful completion, the connector saves the current
    timestamp and the list of processed alert IDs to ensure the next iteration starts
    from the correct point.
"Recorded Future - Playbook Alerts Tracking Connector":
  ai_description: "### General Description\nThe Recorded Future Playbook Alerts Tracking\
    \ connector monitors and ingests updates to existing Playbook Alerts from the\
    \ Recorded Future platform. Unlike standard alert connectors that fetch only new\
    \ records, this tracking connector identifies significant changes in existing\
    \ alerts\u2014such as status changes, priority escalations, or new evidence\u2014\
    and creates new cases in Google SecOps based on specific user-defined triggers.\
    \ This ensures that security teams are alerted to evolving threats and intelligence\
    \ updates throughout the lifecycle of an alert.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | DeviceProductField | String | Yes | The source field name used to retrieve the\
    \ Product Field name (default: device_product). |\n| EventClassId | String | Yes\
    \ | The source field name used to retrieve the Event Field name (default: category).\
    \ |\n| Environment Field Name | String | No | The field name where the environment\
    \ name is stored for multi-tenant environments. |\n| Environment Regex Pattern\
    \ | String | No | A regex pattern to extract or manipulate the environment name\
    \ from the environment field. |\n| PythonProcessTimeout | Integer | Yes | The\
    \ timeout limit in seconds for the connector's execution process. |\n| API URL\
    \ | String | Yes | The API Root of the Recorded Future instance (default: https://api.recordedfuture.com).\
    \ |\n| API Key | Password | Yes | The API Key used to authenticate with Recorded\
    \ Future. |\n| Search Max Hours Backwards | Integer | No | The number of hours\
    \ to look back for updates during the first run or if no checkpoint exists. |\n\
    | Playbook Alert Categories | String | No | Comma-separated list of categories\
    \ to fetch (e.g., domain_abuse, cyber_vulnerability, third_party_risk). |\n| Playbook\
    \ Alert Statuses | String | No | Comma-separated list of statuses to fetch (New,\
    \ InProgress, Resolved, Dismissed). |\n| Playbook Alert Priorities | String |\
    \ No | Comma-separated list of priorities to fetch (Informational, Moderate, High).\
    \ |\n| Playbook Alert Reopened | Boolean | No | If enabled, creates a new case\
    \ when a previously closed Playbook Alert is reopened. |\n| Priority Increased\
    \ | Boolean | No | If enabled, creates a new case when the priority of a Playbook\
    \ Alert is increased. |\n| New Assessment Added | Boolean | No | If enabled, creates\
    \ a new case when a new assessment is added to a Playbook Alert. |\n| Entity Added\
    \ | Boolean | No | If enabled, creates a new case when new entities are added\
    \ to a Playbook Alert. |\n| Max Alerts To Fetch | Integer | No | The maximum number\
    \ of alerts to process in a single connector iteration. |\n| Severity | String\
    \ | Yes | The severity level (Low, Medium, High, Critical) to assign to the created\
    \ Google SecOps cases. |\n| Enable Overflow | Boolean | No | If enabled, uses\
    \ Google SecOps overflow logic to deduplicate similar alerts. |\n| Verify SSL\
    \ | Boolean | No | If enabled, verifies the SSL certificate for the connection\
    \ to Recorded Future. |\n\n### Flow Description\n1. **Authentication**: The connector\
    \ establishes a connection to the Recorded Future API using the provided API Key\
    \ and URL.\n2. **Time Window Determination**: It calculates the search window\
    \ by checking the last successful execution timestamp or falling back to the \"\
    Search Max Hours Backwards\" setting.\n3. **Alert Retrieval**: The connector queries\
    \ Recorded Future for Playbook Alerts that have been updated within the search\
    \ window, applying filters for Category, Status, and Priority.\n4. **Update Analysis**:\
    \ For each retrieved alert, the connector analyzes the internal change logs (`panel_log_v2`)\
    \ to identify the specific nature of the update.\n5. **Trigger Filtering**: It\
    \ evaluates the updates against the enabled tracking triggers: Reopened, Priority\
    \ Increased, New Assessment Added, or Entity Added. If no enabled trigger is matched,\
    \ the update is skipped.\n6. **Case Mapping**: Alerts meeting the trigger criteria\
    \ are mapped to the Google SecOps `AlertInfo` data model, including relevant event\
    \ details and environment context.\n7. **Ingestion**: The connector ingests the\
    \ processed updates as new cases into Google SecOps and updates the execution\
    \ checkpoint."
