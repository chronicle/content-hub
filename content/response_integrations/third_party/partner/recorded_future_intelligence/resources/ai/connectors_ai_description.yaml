"Recorded Future - Classic Alerts Connector":
  ai_description: >-
    ### General Description

    The Recorded Future - Classic Alerts Connector is designed to fetch security alerts
    from the Recorded Future platform and ingest them into Google SecOps. It enables
    security teams to monitor for threats identified by Recorded Future, map them
    to Google SecOps cases, and apply custom filtering and severity mapping to prioritize
    relevant security events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API URL | String | Yes | API Root of the Recorded Future instance. |

    | API Key | String | Yes | API Key from Recorded Future. |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process.
    |

    | Severity | String | Yes | Severity assigned to created alerts (Low, Medium,
    High, Critical). |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field. |

    | Fetch Max Hours Backwards | Integer | No | Amount of hours to fetch events from.
    |

    | Alert Statuses | String | No | Comma-separated list of alert statuses to fetch.
    |

    | Max Alerts To Fetch | Integer | No | Maximum number of alerts to process per
    iteration. |

    | Use whitelist as a blacklist | Boolean | No | If enabled, the allowlist acts
    as a denylist. |

    | Enable Overflow | Boolean | No | If enabled, uses Google overflow to deduplicate
    similar alerts. |

    | Extract all Entities | Boolean | No | If enabled, extracts all entities from
    the alert events. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | String | No | Proxy password. |


    ### Flow Description

    1. Connects to the Recorded Future API using the provided URL and API Key.

    2. Retrieves existing alert IDs to ensure deduplication.

    3. Fetches new alerts based on the configured time frame, status, and rule filters.

    4. Filters alerts using the configured allowlist/denylist.

    5. Maps alerts to the Google SecOps case format, including entity extraction and
    environment tagging.

    6. Deduplicates alerts if overflow is enabled.

    7. Creates cases in Google SecOps for the processed alerts.

    8. Updates the last success timestamp and processed alert IDs for the next iteration.
"Recorded Future - Playbook Alerts Connector":
  ai_description: "### General Description\nThe Recorded Future - Playbook Alerts\
    \ Connector is designed to ingest security alerts from the Recorded Future platform\
    \ into Google SecOps. It enables security teams to monitor various threat intelligence\
    \ categories\u2014such as domain abuse, cyber vulnerabilities, and malware reports\u2014\
    directly within their SOAR environment. By automating the retrieval and case creation\
    \ process, this connector ensures timely visibility into critical threat intelligence.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API URL | String | Yes | API Root of the Recorded\
    \ Future instance. |\n| API Key | String | Yes | API Key from Recorded Future.\
    \ |\n| DeviceProductField | String | Yes | Enter the source field name in order\
    \ to retrieve the Product Field name. |\n| EventClassId | String | Yes | Enter\
    \ the source field name in order to retrieve the Event Field name. |\n| PythonProcessTimeout\
    \ | Integer | Yes | Timeout limit for the python process running the current script.\
    \ |\n| Fetch Max Hours Backwards | Integer | No | Amount of hours from where to\
    \ fetch events. |\n| Playbook Alert Categories | String | No | Comma-separated\
    \ list of Playbook Alert Categories to fetch. |\n| Playbook Alert Statuses | String\
    \ | No | Comma-separated list of Playbook Alert Statuses to fetch. |\n| Playbook\
    \ Alert Priorities | String | No | Comma-separated list of Playbook Alert Priorities\
    \ to fetch. |\n| Max Alerts To Fetch | Integer | No | How many alerts to process\
    \ per one connector iteration. |\n| Severity | String | No | Override severity\
    \ for alerts created by this connector (Low, Medium, High, Critical). |\n| Enable\
    \ Overflow | Boolean | No | If enabled, uses Google 'overflow' to deduplicate\
    \ similar alerts. |\n| Verify SSL | Boolean | No | If enabled, verify the SSL\
    \ certificate for the connection to the Recorded Future server. |\n| Environment\
    \ Field Name | String | No | Field name where the environment name is stored.\
    \ |\n| Environment Regex Pattern | String | No | Regex pattern to manipulate the\
    \ environment field value. |\n| Proxy Server Address | String | No | The address\
    \ of the proxy server to use. |\n| Proxy Username | String | No | The proxy username\
    \ to authenticate with. |\n| Proxy Password | String | No | The proxy password\
    \ to authenticate with. |\n\n### Flow Description\n1. Connects to the Recorded\
    \ Future API using the provided URL and API Key.\n2. Reads previously processed\
    \ alert IDs to ensure deduplication.\n3. Calculates the time range based on the\
    \ 'Fetch Max Hours Backwards' parameter.\n4. Queries the Recorded Future API for\
    \ new Playbook Alerts, applying filters for categories, statuses, and priorities.\n\
    5. Iterates through the fetched alerts, applying environment mapping and checking\
    \ for overflow to prevent duplicate case creation.\n6. Maps each valid alert into\
    \ the Google SecOps case format.\n7. Updates the internal tracking of processed\
    \ alert IDs and saves the timestamp for the next iteration."
"Recorded Future - Playbook Alerts Tracking Connector":
  ai_description: "### General Description\nThis connector integrates with Recorded\
    \ Future to fetch Playbook Alerts. It monitors for specific updates to these alerts\u2014\
    such as status changes, priority increases, new assessments, or added entities\u2014\
    and automatically creates or updates cases in Google SecOps based on these events.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| DeviceProductField | String | Yes | Source field\
    \ name to retrieve the Product Field name. |\n| EventClassId | String | Yes |\
    \ Source field name to retrieve the Event Field name. |\n| Environment Field Name\
    \ | String | No | Field name where the environment name is stored. |\n| Environment\
    \ Regex Pattern | String | No | Regex pattern to manipulate the environment field.\
    \ |\n| PythonProcessTimeout | Integer | Yes | Timeout limit for the python process.\
    \ |\n| API URL | String | Yes | API Root of the Recorded Future instance. |\n\
    | API Key | String | Yes | API Key from Recorded Future. |\n| Search Max Hours\
    \ Backwards | Integer | No | Hours to fetch Playbook Alerts since last updated.\
    \ |\n| Playbook Alert Categories | String | No | Comma-separated list of categories\
    \ to fetch. |\n| Playbook Alert Statuses | String | No | Comma-separated list\
    \ of statuses to fetch. |\n| Playbook Alert Priorities | String | No | Comma-separated\
    \ list of priorities to fetch. |\n| Playbook Alert Reopened | Boolean | No | Create\
    \ a new case when a Playbook Alert is Reopened. |\n| Priority Increased | Boolean\
    \ | No | Create a new case when a Playbook Alert priority increases. |\n| New\
    \ Assessment Added | Boolean | No | Create a new case when a new assessment is\
    \ added. |\n| Entity Added | Boolean | No | Create a new case when entities are\
    \ added. |\n| Max Alerts To Fetch | Integer | No | Max alerts to process per iteration.\
    \ |\n| Severity | String | Yes | Severity assigned to created cases (Low, Medium,\
    \ High, Critical). |\n| Enable Overflow | Boolean | No | Use Google overflow to\
    \ deduplicate similar alerts. |\n| Verify SSL | Boolean | No | Verify SSL certificate\
    \ for the connection. |\n| Proxy Server Address | String | No | Address of the\
    \ proxy server. |\n| Proxy Username | String | No | Proxy username. |\n| Proxy\
    \ Password | String | No | Proxy password. |\n\n### Flow Description\n1. Connects\
    \ to the Recorded Future API using the provided API URL and Key.\n2. Retrieves\
    \ existing alert IDs to ensure only new or updated alerts are processed.\n3. Fetches\
    \ Playbook Alerts from Recorded Future based on configured categories, statuses,\
    \ priorities, and the specified time window.\n4. Filters alerts based on specific\
    \ update criteria (e.g., \"Playbook Alert Reopened\", \"Priority Increased\",\
    \ \"New Assessment Added\", \"Entity Added\").\n5. Maps valid alerts to the Google\
    \ SecOps case format.\n6. Creates cases in Google SecOps for the filtered alerts,\
    \ optionally handling deduplication via the overflow mechanism.\n7. Updates the\
    \ internal state with processed alert IDs and timestamps for the next iteration."
