creator: admin
description: Search for technically validated relationships between threat intelligence entities in the Recorded Future Intelligence Cloud.
dynamic_results_metadata:
-   result_example_path: resources/SearchLinks_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: RecordedFutureIntelligence
name: Search Links
parameters:
-   description: One or more Recorded Future entity IDs to look up links for.
    is_mandatory: false
    name: Entities
    type: string
-   description: If the action should filter the search on the Target Entities.
    is_mandatory: false
    name: Filter on Target Entities
    type: boolean
-   description: Filter results to these link section IDs.
    is_mandatory: false
    name: Sections
    type: string
-   description: Restrict linked entities to these entity types (e.g. "type:IpAddress").
    is_mandatory: false
    name: Entity Types
    type: string
-   description: Limit to source type(s) - "technical", "insikt", or both if argument omitted.
    is_mandatory: false
    name: Sources
    type: string
-   description: Technical-link timeframe (e.g. "-30d", default "-30d", max "-90d").
    is_mandatory: false
    name: Timeframe
    type: string
-   description: Restrict technical links to these event types (e.g. "type:MalwareAnalysis").
    is_mandatory: false
    name: Events
    type: string
-   description: Only return technical links that connect to these entities.
    is_mandatory: false
    name: Connected Entities
    type: string
-   default_value: medium
    description: Result-volume scope - "small", "medium" (default), or "large".
    is_mandatory: false
    name: Search Scope
    optional_values:
    - small
    - medium
    - large
    type: ddl
-   description: Max linked entities returned per entity type (>= 1 <= 1,000,000,000).
    is_mandatory: false
    name: Max Entity Results
    type: string
script_result_name: is_success