creator: admin
description: Identity - Search credential data for a set of domains.
dynamic_results_metadata:
-   result_example_path: resources/SearchCredentials_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: RecordedFutureIntelligence
name: Search Credentials
parameters:
-   description: One or more domains to be queried.
    is_mandatory: false
    name: Domains
    type: string
-   description: If the action should filter the search on the Target Entities.
    is_mandatory: false
    name: Filter on Target Entities
    type: boolean
-   description: Domain type filter - 'Email', 'Authorization', or both.
    is_mandatory: false
    name: Domain Types
    type: string
-   description: First date when these credentials were received and indexed by Recorded Future.
    is_mandatory: false
    name: First Downloaded GTE
    type: string
-   description: Latest date when these credentials were received and indexed by Recorded Future.
    is_mandatory: false
    name: Latest Downloaded GTE
    type: string
-   description: Date when the infostealer malware exfiltrated data from the victim device.
    is_mandatory: false
    name: Exfiltration Date GTE
    type: string
-   description: Password properties.
    is_mandatory: false
    name: Properties
    type: string
-   description: The name of a breach.
    is_mandatory: false
    name: Breach Name
    type: string
-   description: The date of a breach.
    is_mandatory: false
    name: Breach Date
    type: string
-   description: The name of a database dump.
    is_mandatory: false
    name: Dump Name
    type: string
-   description: The date of a database dump.
    is_mandatory: false
    name: Dump Date
    type: string
-   description: Username properties. Only valid value is 'Email'.
    is_mandatory: false
    name: Username Properties
    type: string
-   description: Authorization technologies to filter by.
    is_mandatory: false
    name: Authorization Technologies
    type: string
-   description: Authorization protocols to filter by.
    is_mandatory: false
    name: Authorization Protocols
    type: string
-   description: Known infostealer malware families.
    is_mandatory: false
    name: Malware Families
    type: string
-   description: An organization ID if utilizing a multi-org setup.
    is_mandatory: false
    name: Organization ID
    type: string
-   description: The maximum number of credential records returned.
    is_mandatory: false
    name: Max Results
    type: string
script_result_name: is_success