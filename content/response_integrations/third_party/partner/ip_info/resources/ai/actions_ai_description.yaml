  ai_description: >-
    ### General Description

    Enriches IP Address entities by fetching detailed IP information from the IPInfo
    service. This action retrieves contextual data for the specified IP addresses,
    updates the entities within the SecOps platform with the new information, and
    attaches a data table to each successfully processed entity.


    ### Parameters Description

    This action does not require any specific input parameters. It relies entirely
    on the integration's configuration settings (such as API Root, Token, and Verify
    SSL) and the entities present in the case.


    ### Flow Description

    1. **Entity Filtering:** The action filters the case's target entities to include
    only those of type `ADDRESS`.

    2. **Data Retrieval:** It iterates over the filtered IP entities and sends a GET
    request to the IPInfo API for each IP address.

    3. **Entity Update:** For each successful response, the action updates the entity's
    `additional_properties` with the retrieved information and marks the entity as
    enriched (`is_enriched = True`).

    4. **Table Creation:** Attaches a data table to the entity containing the flattened
    IP information.

    5. **Result Generation:** Returns a JSON result containing the fetched data for
    all successfully processed entities and updates the entities in the SecOps platform.
