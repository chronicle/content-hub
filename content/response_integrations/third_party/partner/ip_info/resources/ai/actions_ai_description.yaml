Get IP Information:
  ai_description: "Enriches IP Address entities using the IPInfo service. This action\
    \ retrieves detailed contextual information for IP addresses, including geographic\
    \ location (city, region, country), ASN details, and company information. \n\n\
    ### Flow Description\n1. **Entity Filtering:** The action identifies all entities\
    \ of type `ADDRESS` within the current context.\n2. **Data Retrieval:** For each\
    \ identified IP address, it queries the IPInfo API using the configured API Root\
    \ and Token.\n3. **Data Processing:** The retrieved JSON data is flattened and\
    \ prefixed with 'IPInfo'.\n4. **Internal Updates:** The flattened data is added\
    \ to the entity's 'additional_properties', the entity is marked as 'enriched',\
    \ and an entity-specific data table is created.\n5. **Finalization:** The action\
    \ updates the entities within Google SecOps and provides a summary of the enriched\
    \ IPs and any errors encountered.\n\n### Parameters Description\n| Parameter Name\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| None |\
    \ N/A | N/A | This action does not have any input parameters. It relies on the\
    \ integration's configuration (API Root, Token, Verify SSL). |\n\n### Additional\
    \ Notes\n- This action is strictly for enrichment and does not modify any external\
    \ data.\n- It specifically targets entities of type `ADDRESS`."
