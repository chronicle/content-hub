  ai_description: >-
    ### General Description

    Tests the connectivity to the IPInfo API to ensure the provided credentials and
    configuration are valid. This is a standard Ping action used to verify that the
    integration is set up correctly.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters (API Root, Token, Verify SSL).


    ### Flow Description

    1. Retrieves the integration configuration (API Root, Token, Verify SSL) from
    the SecOps platform.

    2. Initializes the IPInfo API client.

    3. Sends a test GET request to the IPInfo API using a hardcoded test IP address
    (8.8.8.8).

    4. Validates the HTTP response to confirm successful authentication and connectivity.

    5. Returns a success message if the connection is established.
