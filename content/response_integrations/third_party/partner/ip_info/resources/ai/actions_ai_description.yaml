Get Domain Information:
  ai_description: >-
    ### General Description

    Fetches domain information for Hostname entities using the IPInfo service. This
    action retrieves metadata associated with a domain, such as registration details
    and other contextual information, to assist in security investigations.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action specifically targets Hostname entities and uses the `get_domain` utility
    to ensure the identifier is in the correct format before querying the API.


    ### Flow Description

    1. **Identify Entities**: The action identifies all Hostname entities within the
    current alert context.

    2. **Extract Domain**: For each entity, it extracts the domain name from the identifier.

    3. **API Query**: It sends a GET request to the IPInfo API's `/domains` endpoint
    for each domain.

    4. **Data Processing**: The retrieved JSON data is flattened and prefixed with
    'IPInfo'.

    5. **Enrichment**: The action updates the entity's additional properties with
    the domain data and marks the entity as enriched.

    6. **Visualization**: A data table containing the domain information is added
    to the entity in the Google SecOps interface.

    7. **Final Update**: The action updates the entities in the system and returns
    a summary of the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with domain information and sets the 'is_enriched'
      flag to true.
  categories:
