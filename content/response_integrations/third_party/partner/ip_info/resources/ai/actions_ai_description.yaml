  ai_description: "### General Description\nEnriches Hostname entities by fetching\
    \ detailed domain information from the IPInfo service. This action extracts the\
    \ domain from a hostname, retrieves associated metadata from the IPInfo API, and\
    \ populates the entity's additional properties and case data tables with the results.\n\
    \n### Parameters Description\nThere are no parameters for this action.\n\n###\
    \ Additional Notes\nThis action specifically targets Hostname entities. It uses\
    \ a helper utility to ensure that even if a full URL or complex hostname is provided,\
    \ only the base domain is queried against the IPInfo API.\n\n### Flow Description\n\
    1. **Initialization**: Connects to the IPInfo API using the configured API Root\
    \ and Token.\n2. **Entity Filtering**: Identifies all Hostname entities within\
    \ the current scope.\n3. **Domain Extraction**: For each Hostname, it extracts\
    \ the base domain name.\n4. **Data Retrieval**: Queries the IPInfo `/domains`\
    \ endpoint for information related to the extracted domain.\n5. **Internal Enrichment**:\
    \ \n    *   Updates the entity's `additional_properties` with flattened domain\
    \ data.\n    *   Marks the entity as enriched.\n    *   Adds a data table to the\
    \ entity in the Google SecOps UI containing the domain details.\n6. **Finalization**:\
    \ Updates all processed entities in the system and returns a summary of the fetched\
    \ information."
