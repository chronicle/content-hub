  ai_description: >-
    ### General Description

    This action fetches domain information from the IPInfo service for provided Hostname
    entities. It retrieves reputation and metadata for the domain, updates the entity's
    profile with this information, and provides a detailed table in the action results.


    ### Flow Description

    1. **Initialization**: The action initializes the `IPInfoManager` using the provided
    API Root, Token, and SSL verification settings.

    2. **Filtering**: It filters the `target_entities` to process only those with
    the `HOSTNAME` type.

    3. **Data Retrieval**: For each valid hostname, it queries the IPInfo API to retrieve
    domain information.

    4. **Enrichment**: The retrieved data is flattened and added to the entity's `additional_properties`
    with an `IPInfo` prefix. The entity is marked as enriched (`is_enriched = True`).

    5. **Result Reporting**: An entity table containing the domain information is
    added to the action results, and the updated entities are saved back to the SOAR
    platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the IPInfo API. |

    | Token | String | Yes | The API token used for authentication with the IPInfo
    service. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates for the API connection.
    Defaults to false. |


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any external
    mutations or containment actions.
