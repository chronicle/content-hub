Get Domain Information:
  ai_description: >-
    ### General Description

    Fetches domain information for Hostname entities using the IPInfo API. This action
    retrieves contextual data about the domain associated with the hostname and enriches
    the entity within the Google SecOps platform.


    ### Flow Description

    1. Filters the target entities to include only those of type Hostname.

    2. Iterates through the filtered entities and extracts the domain name from the
    hostname identifier.

    3. Makes an HTTP GET request to the IPInfo API (`/domains/{domain_name}`) to retrieve
    domain information.

    4. If data is successfully retrieved, it updates the entity's `additional_properties`
    with the flattened domain information, marks the entity as enriched (`is_enriched
    = True`), and attaches a CSV table of the data to the entity.

    5. Updates the modified entities in the platform and returns the raw domain information
    as a JSON result.


    ### Additional Notes

    This action only processes Hostname entities. Any other entity types provided
    in the scope will be ignored.
  ai_short_description: >-
    Fetches domain information for Hostname entities using the IPInfo API and enriches
    the entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the IPInfo API to fetch domain information,
      meaning it fetches data. It does not perform any state-changing operations on
      external systems (no POST/PUT/DELETE). It updates internal entities by modifying
      their additional properties and calling `siemplify.update_entities`. It does
      not create insights, modify alert data, or create case comments.
