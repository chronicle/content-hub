  ai_description: "### General Description\nEnriches IP Address entities using the\
    \ IPInfo service. This action retrieves detailed contextual information for IP\
    \ addresses, including geolocation (city, region, country), ASN (Autonomous System\
    \ Number), and organizational details. The retrieved data is used to update the\
    \ entity's profile within Google SecOps, providing analysts with immediate visibility\
    \ into the origin and ownership of the IP.\n\n### Parameters Description\nThere\
    \ are no specific action parameters for this action. It relies on the global integration\
    \ configuration (API Root, Token, and Verify SSL).\n\n### Additional Notes\n*\
    \ This action only processes entities of type **ADDRESS**.\n* It updates the entity's\
    \ `additional_properties` with a prefix of `IPInfo` to avoid field collisions.\n\
    * It marks the entity as `enriched` upon successful data retrieval.\n\n### Flow\
    \ Description\n1. **Entity Filtering**: The action identifies all entities in\
    \ the current context that are of type `ADDRESS`.\n2. **API Interaction**: For\
    \ each identified IP address, the action calls the IPInfo API to fetch its metadata.\n\
    3. **Data Processing**: The JSON response from IPInfo is flattened and prefixed\
    \ with `IPInfo`.\n4. **Internal Updates**: \n    * The flattened data is added\
    \ to the entity's `additional_properties`.\n    * A data table containing the\
    \ IP information is attached to the entity.\n    * The entity is marked as enriched.\n\
    5. **Finalization**: The action updates all modified entities in the platform\
    \ and returns a consolidated JSON result containing the raw data for all processed\
    \ IPs."
  capabilities:
