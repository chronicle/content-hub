  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the IPInfo service. It ensures that the provided API token is valid and that
    the API root URL is accessible by performing a test request to the external service.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration configuration,
    including the API Root, Token, and SSL verification settings from the integration
    settings.

    2. **Manager Initialization**: An instance of the `IPInfoManager` is created using
    the retrieved configuration.

    3. **Connectivity Test**: The action calls the `ping` method, which performs a
    GET request to the IPInfo API using a hardcoded test IP address (`8.8.8.8`).

    4. **Response Validation**: The response is validated for HTTP errors and specific
    error messages in the content to confirm the API token's validity.

    5. **Result Reporting**: If the request is successful, the action ends with a
    'Connection Established' message and returns `True` as the script result.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the initial setup
    or ongoing health of the IPInfo integration. It does not process any entities
    from the current case.
