Ping:
  ai_description: >-
    ### General Description

    This action verifies the connectivity and authentication credentials for the IPInfo
    integration by checking the validity of the API token.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Token, Verify
    SSL).

    2. Initializes the IPInfo API client.

    3. Executes a GET request to the IPInfo API using a predefined test IP address
    (8.8.8.8).

    4. Validates the HTTP response to confirm successful authentication and connectivity.

    5. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used during integration setup or troubleshooting to ensure
    that the provided credentials are correct and the external service is reachable.
  ai_short_description: >-
    Verifies the connectivity and authentication credentials for the IPInfo integration
    by making a test request to the API.
