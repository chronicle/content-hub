    reasoning: >-
      The action makes GET or POST requests to the IPInfo API to fetch IP data (fetches_data=true).
      It does not mutate external data (can_mutate_external_data=false). It updates
      internal entities by calling `siemplify.update_entities` (can_update_entities=true)
