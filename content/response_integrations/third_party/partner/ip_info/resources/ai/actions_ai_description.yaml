  ai_description: >-
    ### General Description

    This action retrieves detailed information for IP address entities using the IPInfo
    service. It fetches contextual data such as geolocation, ISP, and other relevant
    metadata to assist analysts in investigating potential threats. The action updates
    the entity's profile within the SOAR platform with the retrieved information.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | API Root | String | Yes | The base URL for the IPInfo API. |

    | Token | String | Yes | The API token used for authentication with the IPInfo
    service. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates when connecting
    to the API. Defaults to false. |


    ### Flow Description

    1. Initialize the IPInfo manager using the provided API Root, Token, and SSL verification
    settings.

    2. Filter the target entities to identify those of type 'ADDRESS'.

    3. For each identified IP address, query the IPInfo API to retrieve associated
    information.

    4. If data is successfully retrieved, update the entity's 'additional_properties'
    with the fetched data (prefixed with 'IPInfo') and mark the entity as enriched.

    5. Add the retrieved information to the action results as a table and a JSON object.

    6. Update the entities in the SOAR platform with the new properties.

    7. End the action with a summary message indicating the success or failure of
    the operations.
