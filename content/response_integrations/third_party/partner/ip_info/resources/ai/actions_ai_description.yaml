Get IP Information:
  ai_description: >-
    ### General Description

    Fetches detailed IP information (such as ASN, geo-location, and domain data) for
    IP address entities using the IPInfo service. The action supports both legacy
    per-IP queries and batch queries depending on the selected dataset bundle, enriching
    the entities with the retrieved data.


    ### Flow Description

    1. Extracts target entities from the case that are of type `ADDRESS`.

    2. Checks the selected `IPinfo Bundle` parameter to determine the query method.

    3. If the bundle is set to 'Legacy', the action iterates through the entities
    and makes individual GET requests to the IPInfo API (`/ip_address`) for each IP.

    4. If a batch bundle (Lite, Core, Plus, Max) is selected, the action chunks the
    IPs and makes POST requests to the IPInfo batch API (`/batch`).

    5. Normalizes the response data to ensure a consistent JSON schema.

    6. Updates the entities' `additional_properties` with the fetched data and sets
    their `is_enriched` flag to True.

    7. Attaches the results as JSON and adds entity tables to the case.


    ### Additional Notes

    This action only performs read operations against the IPInfo API and does not
    mutate any external data. It updates internal entity properties within Google
    SecOps.
  ai_short_description: >-
    Fetches detailed IP information for IP address entities using the IPInfo service
    and enriches the entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
