Ping:
  ai_description: >-
    ### General Description

    Validates the connectivity and API token for the IPInfo integration. This action
    performs a test request to the IPInfo API using a hardcoded IP address (8.8.8.8)
    to ensure that the service is reachable and the provided credentials (API Root
    and Token) are valid.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This is a standard connectivity check action used to verify that the integration
    configuration is correct.


    ### Flow Description

    1. **Retrieve Configuration**: Fetches the API Root, Token, and SSL verification
    settings from the integration configuration.

    2. **Initialize Manager**: Instantiates the IPInfoManager with the provided credentials.

    3. **Execute Ping**: Calls the `ping` method, which sends a GET request to the
    IPInfo API for the test IP '8.8.8.8'.

    4. **Validate Response**: Checks the HTTP response status and ensures no error
    messages are present in the content.

    5. **Finalize**: Returns a success message 'Connection Established.' if the request
    is successful.
