  ai_description: >-
    ### General Description

    This action fetches domain information for HOSTNAME entities using the IPInfo
    API. It retrieves details about the domain and enriches the entity's additional
    properties with the fetched data.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Initializes the IPInfo integration with the provided API Root, Token, and SSL
    verification settings.

    2. Filters the target entities to include only those of type `HOSTNAME`.

    3. Iterates through the filtered entities and queries the IPInfo API for domain
    information.

    4. If domain information is successfully retrieved, it updates the entity's additional
    properties with the flattened data, marks the entity as enriched, and creates
    an entity table with the results.

    5. Updates the enriched entities within the Google SecOps platform.

    6. Outputs a JSON result containing the fetched domain information for all successful
    entities.
