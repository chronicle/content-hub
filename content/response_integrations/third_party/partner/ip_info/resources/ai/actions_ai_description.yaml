  ai_description: >-
    ### General Description

    This action verifies the connectivity and validity of the API token for the IPInfo
    integration. It performs a test request to the configured API root to ensure the
    integration is properly authenticated and reachable.


    ### Parameters Description

    There are no input parameters for this action. The action relies on the integration
    configuration (API Root, Token, Verify SSL) defined in the integration settings.


    ### Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Retrieve the integration configuration (API Root, Token, Verify SSL) from the
    IPInfo provider settings.

    3. Instantiate the `IPInfoManager` with the retrieved configuration.

    4. Execute the `ping()` method, which performs a GET request to the API root using
    a test IP address ("8.8.8.8").

    5. Validate the response to ensure the API token is valid and the service is reachable.

    6. Terminate the action with a success message.
