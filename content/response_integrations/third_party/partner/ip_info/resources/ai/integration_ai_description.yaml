  network_security: false
  reasoning: >-
    The ip_info integration is primarily designed to enrich external indicators such
    as IP addresses and domains with contextual metadata like geolocation, ISP information,
    and reputation data. The actions 'Get IP Information' and 'Get Domain Information'
    directly support the Threat Intelligence category, which is defined as the first
    step of enrichment for external indicators to confirm if an alert is a True Positive.
    The integration does not perform log searching (SIEM), host containment (EDR),
    network blocking (Network Security), or other operational tasks such as ITSM,
    IAM, or asset inventory management.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
