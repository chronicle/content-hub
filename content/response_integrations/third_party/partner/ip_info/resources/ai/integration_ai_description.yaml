  reasoning: >-
    The integration provides enrichment for external indicators, specifically IP addresses
    and domains, by retrieving geolocation, ISP, and metadata. This aligns directly
    with the 'Threat Intelligence' category, which is defined as the first step of
    enrichment for external indicators (IP, Hash, URL) to determine reputation and
    context. The integration does not perform any SIEM log searching, EDR host-level
    actions, network security blocking, ITSM ticket management, or internal asset
    inventory management. Therefore, it is strictly classified under Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
