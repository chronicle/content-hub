name: Get IP Information
description: Fetch IP information for address.
integration_identifier: IPInfo
parameters:
  - name: IPinfo Bundle
    default_value: Legacy
    type: ddl
    optional_values:
      - Legacy
      - Lite
      - Core
      - Plus
      - Max
    description:
      "IPInfo dataset bundle to query. Legacy keeps the existing per-IP API
      behaviour using the configured API Root. Lite/Core/Plus/Max use the IPInfo batch
      endpoint and return their respective response shapes; the tier is gated by the
      token."
    is_mandatory: true
dynamic_results_metadata:
  - result_example_path: resources/GetIPInformation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
