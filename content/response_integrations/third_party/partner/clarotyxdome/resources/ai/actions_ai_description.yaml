    update_alert: true
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action enriches a Google SecOps alert by retrieving detailed information
    from a Claroty xDome alert. It fetches specific alert metadata, including MITRE
    ATT&CK tactics and techniques, and updates the current Google SecOps alert's properties
    and security results to provide better context for analysts.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Claroty xDome API host
    and authentication token from the integration configuration.

    2. **Parameter Extraction**: The action extracts the `clarotyAlertId` parameter
    provided by the user.

    3. **Data Retrieval**: The action performs a POST request to the Claroty xDome
    API (`/api/v1/alerts/`) to fetch the alert details matching the provided ID.

    4. **Alert Enrichment**: If the alert is found, the action updates the current
    Google SecOps alert's `additional_properties` with the retrieved Claroty alert
    data.

    5. **MITRE Mapping**: The action maps MITRE ATT&CK tactics and techniques (ICS
    or Enterprise) from the Claroty alert to the Google SecOps alert's `security_result`
    field.

    6. **Result Reporting**: The retrieved alert data is added to the action result
    JSON, and a status message is returned.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `clarotyAlertId` | string | Yes | The unique alert ID from Claroty xDome to
    be retrieved and used for enrichment. |


    ### Additional Notes

    This action does not require any specific entity types to run, as it operates
    on the current alert context.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the current Google SecOps alert's additional_properties and security_result
      fields with data retrieved from Claroty xDome.
    reasoning: >-
      The action fetches alert data from Claroty xDome (fetches_data=true). It does
      not mutate external systems (can_mutate_external_data=false). It modifies the
      current Google SecOps alert's properties and security results (can_mutate_internal_data=true,
      can_modify_alert_data=true). It does not update entities, create insights, or
      create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data (enrichment) but it also modifies the alert's properties
      and security results. According to the strict definition, an enrichment action
      must not modify internal data except for specific exceptions (comments, insights,
      entity attributes). Since this action modifies the alert's properties, it does
      not meet the strict criteria for an enrichment action.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over `target_entities` or use entity-specific identifiers.
      It operates on the current alert context.
