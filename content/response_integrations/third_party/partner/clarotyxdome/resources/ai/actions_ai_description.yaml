    2. Validates the entity identifier using regex to ensure it is a properly formatted
    IP or MAC address.

    3. Queries the Claroty xDome API (`/api/v1/devices/`) to fetch device information
    matching the identifier.

    4. If a device is found, queries the Claroty xDome API (`/api/v1/device_vulnerability_relations/`)
