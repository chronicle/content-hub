EnrichAlerts:
  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific Claroty xDome alert using its unique
    ID and enriches the current Google SecOps alert with the retrieved data, including
    MITRE ATT&CK tactics and techniques.


    ### Flow Description

    1. Extracts the Claroty alert ID from the action parameters.

    2. Makes an HTTP POST request to the Claroty xDome API (`/api/v1/alerts/`) to
    query and fetch the alert details.

    3. Parses the response to extract relevant fields such as alert name, status,
    description, and MITRE technique IDs/names.

    4. Appends the retrieved data to the current Google SecOps alert's `additional_properties`.

    5. Updates the alert's security results with the extracted MITRE tactic and technique
    information.

    6. Returns the raw alert data as a JSON result.


    ### Additional Notes

    The action relies on the presence of a valid Claroty alert ID. Although the API
    call uses a POST method, it functions strictly as a search/query operation and
    does not mutate data within Claroty xDome.
  ai_short_description: >-
    Retrieves detailed information for a specific Claroty xDome alert and enriches
    the current Google SecOps alert with the retrieved data, including MITRE ATT&CK
    tactics and techniques.
