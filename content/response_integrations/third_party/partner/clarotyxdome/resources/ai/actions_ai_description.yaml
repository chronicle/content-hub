    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity `additional_properties` and `is_enriched` status within the SOAR
      platform.
    reasoning: >-
      The action fetches device and vulnerability data from Claroty xDome via API
      calls. It updates the SOAR entity's `additional_properties` and marks the entity
      as enriched. It does not modify external system state or create insights/comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Claroty xDome) and updates
      internal SOAR entities without modifying external systems. This fits the definition
      of an enrichment action.
  entity_usage:
