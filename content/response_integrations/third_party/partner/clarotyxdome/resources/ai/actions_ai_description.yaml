EnrichXDomeAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP and MAC address entities by querying the Claroty xDome API for asset
    information and associated vulnerabilities. This action retrieves contextual device
    details such as manufacturer, device type, and risk score, and appends this data
    to the entities within the SecOps platform.


    ### Flow Description

    1. Iterates through the target entities, filtering specifically for IP Address
    and MAC Address entity types.

    2. Validates the entity identifier format using regular expressions to ensure
    it is a valid IP or MAC address.

    3. Makes a POST request to the Claroty xDome `/api/v1/devices/` endpoint to search
    for the device matching the identifier.

    4. If a matching device is found, makes a subsequent POST request to the `/api/v1/device_vulnerability_relations/`
    endpoint to fetch associated vulnerabilities using the device's UID.

    5. Summarizes the retrieved device information and top vulnerabilities.

    6. Updates the entity's `additional_properties` with the enriched data and marks
    the entity as enriched (`is_enriched = True`).

    7. Returns a JSON result containing the enrichment data for all successfully processed
    entities.


    ### Additional Notes

    Only supports IP and MAC address entities. Entities that do not match the expected
    format or are not found in the Claroty xDome instance will be skipped and reported
    as failed in the action results.
  ai_short_description: >-
    Enriches IP and MAC address entities by querying Claroty xDome for asset details
    and associated vulnerabilities, updating the entities with the retrieved context.
