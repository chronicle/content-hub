  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities with detailed asset metadata and
    vulnerability information retrieved from Claroty xDome. This action helps analysts
    understand the context of a device, including its category, manufacturer, risk
    score, and known vulnerabilities, by querying the Claroty xDome API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | xdomeHost | playbook_name | Yes | The base URL for the Claroty xDome instance
    (e.g., `https://example.xdome.claroty.com`). |

    | xdomeApiToken | playbook_name | Yes | The API token used for authenticating
    requests to the Claroty xDome instance. |


    ### Additional Notes

    - The action specifically targets `ADDRESS` (IP) and `MacAddress` entity types.

    - It uses regex to distinguish between IPv4, IPv6, and MAC addresses to apply
    the correct search filter in the Claroty API.

    - If multiple devices are found for a single identifier, only the first result
    is used for enrichment.


    ### Flow Description

    1. **Validation**: The action iterates through the target entities and filters
    for supported types (`ADDRESS` or `MacAddress`). It further validates the identifier
    format using regex.

    2. **Device Lookup**: For each valid entity, it performs a search in Claroty xDome
    to find matching devices based on the IP or MAC address.

    3. **Vulnerability Retrieval**: If a device is found, the action retrieves a list
    of associated vulnerabilities using the device's unique identifier (UID).

    4. **Data Processing**: It compiles a set of enrichment fields, including device
    category, risk score, and a summary of the top 5 vulnerabilities.

    5. **Entity Update**: The compiled data is added to the entity's `additional_properties`
    (prefixed with `Claroty_`), and the entity is marked as enriched within Google
    SecOps.
