  ai_description: >-
    ### General Description

    This action enriches entities (such as IP addresses, MAC addresses, or device
    UIDs) with vulnerability information retrieved from the Claroty xDome platform.
    It identifies the corresponding device in xDome and fetches associated vulnerability
    data, including CVE IDs, risk scores, and remediation recommendations, updating
    the entity's profile within the SOAR platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | xdomeHost | string | Yes | Base URL for the Claroty xDome instance. |

    | xdomeApiToken | string | Yes | API token for authenticating to the Claroty xDome
    API. |

    | Verify SSL | string | No | Enable to validate SSL certificates for xDome API
    connections. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `xdomeHost`, `xdomeApiToken`,
    and `Verify SSL` settings.

    2. **Entity Iteration**: The action iterates through all provided target entities.

    3. **Device Identification**: For each entity, it checks if the identifier is
    a UID. If not, it attempts to resolve the entity (IP or MAC) to a device UID using
    the Claroty xDome API.

    4. **Vulnerability Retrieval**: Once a device UID is obtained, the action queries
    the Claroty xDome API for all vulnerabilities associated with that device.

    5. **Entity Enrichment**: The retrieved vulnerability data (including counts,
    scores, and descriptions) is added to the entity's `additional_properties`.

    6. **Update**: The action updates the enriched entities in the SOAR platform and
    adds the results to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with vulnerability data and sets the enriched
      status.
    reasoning: >-
      The action fetches vulnerability data from an external API (Claroty xDome) and
      updates the internal SOAR entities with this information. It does not modify
      the state of the external Claroty xDome system (no POST/PUT/DELETE that changes
      external data). It performs internal mutations by updating entity properties.
  categories:
    enrichment: true
    reasoning: >-
      The action is an enrichment action because it fetches data from an external
      source (Claroty xDome) and updates internal entity data without modifying any
      external system state.
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over all target entities. It attempts to resolve identifiers
      (IP, MAC, UID) to devices. It does not filter the input list by type, so it
      supports all entity types, though it specifically processes ADDRESS, MacAddress,
      and generic identifiers.
