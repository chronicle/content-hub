    reasoning: >-
      The action retrieves device metadata and vulnerability information for IP and
      MAC addresses, which qualifies as both 'Enrich Asset' (device metadata) and
      'Enrich IOC' (IP/MAC reputation/vulnerability).
    remove_ioc_from_allowlist: false
