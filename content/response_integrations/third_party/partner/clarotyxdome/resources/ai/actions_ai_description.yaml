Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the Claroty xDome platform. It ensures that the provided API host and
    token are valid and that the network path is open.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **xdomeHost** | String | Yes | The base URL or Host address of the Claroty xDome
    instance. |

    | **xdomeApiToken** | String | Yes | The API token used for authentication with
    the Claroty xDome API. |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the host. Defaults to false if not specified. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the host URL, API token, and
    SSL verification settings from the integration configuration.

    2. **Connectivity Test**: It performs a POST request to the `/api/v1/alerts/`
    endpoint. The request includes a minimal payload (limit of 1) to test if the API
    responds correctly to the provided credentials.

    3. **Validation**: If the API returns a successful status code, the action completes
    with a success message. If an exception occurs (e.g., connection error, authentication
    failure), it logs the error and reports a failure.


    ### Additional Notes

    This action does not process any entities and is strictly used for configuration
    validation. There are no input parameters required at the action level; it relies
    on the integration's configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
