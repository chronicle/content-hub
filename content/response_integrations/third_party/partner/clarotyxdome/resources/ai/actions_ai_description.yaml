  ai_description: >-
    ### General Description

    The **EnrichAlerts** action retrieves comprehensive details for a specific alert
    from Claroty xDome and maps that information onto the current Google SecOps alert.
    This enrichment process includes populating additional properties with Claroty-specific
    metadata and updating the alert's security results with MITRE ATT&CK tactics and
    techniques (supporting both ICS and Enterprise frameworks).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `clarotyAlertId` | String | Yes | The unique identifier of the alert within
    the Claroty xDome platform. |


    ### Flow Description

    1. **Authentication**: The action retrieves the Claroty xDome host and API token
    from the integration configuration.

    2. **Data Retrieval**: It sends a POST request to the Claroty API to fetch details
    for the alert specified by the `clarotyAlertId` parameter.

    3. **Property Mapping**: If the alert is found, the action iterates through the
    Claroty alert fields (such as alert name, type, class, and status) and adds them
    to the Google SecOps alert's `additional_properties` with a `Claroty_` prefix.

    4. **MITRE Enrichment**: The action extracts MITRE technique names and IDs (checking
    both Enterprise and ICS fields) and updates the `security_result` field of the
    alert with the corresponding tactic and technique information.


    ### Additional Notes

    This action specifically targets the alert object itself rather than individual
    entities. It is designed to provide context to the analyst by bringing external
    alert metadata directly into the SecOps case management interface.
