  ai_description: >-
    ### General Description

    Adds vulnerability information from Claroty xDome to entities within Google SecOps.
    The action queries the xDome API to find devices matching the entity identifiers
    (such as IP, MAC, or UID) and retrieves any associated vulnerabilities. It then
    enriches the entities with this vulnerability data, updating their internal properties.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | xdomeHost | String | Yes | Base URL for the Claroty xDome instance. |

    | xdomeApiToken | String | Yes | API token for authenticating to Claroty xDome.
    |

    | Verify SSL | Boolean | No | Enable to validate SSL certificates for xDome API
    connections. Default is true. |


    ### Flow Description

    1. The action iterates through the target entities provided in the case.

    2. It evaluates each entity's identifier to determine if it is a UID, IP address,
    or MAC address.

    3. If the identifier is an IP or MAC, it queries the xDome API to resolve it to
    a specific device UID.

    4. Using the device UID, it queries the xDome API to fetch all associated vulnerabilities.

    5. It enriches the entity's `additional_properties` with the vulnerability data,
    count, and an `is_vulnerable` flag, and marks the entity as enriched.

    6. Finally, it updates the entities in Google SecOps and outputs a JSON result
    containing the vulnerability details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the target entities' additional properties with vulnerability data and
      sets their is_enriched flag to True.
    reasoning: >-
      The action fetches data from the Claroty xDome API using POST requests designed
      for searching/filtering devices and vulnerabilities. It does not mutate any
      external data. Internally, it updates the entities with the fetched vulnerability
      data by modifying their additional properties and calling `siemplify.update_entities`.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches supplemental context (vulnerabilities) about entities from
      an external source (Claroty xDome). It does not mutate external state and only
      performs allowed internal mutations (updating entities). Therefore, it is classified
      as an Enrichment action. It does not perform any remediation tasks.
    remediation: false
