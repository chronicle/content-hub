EnrichXDomeAssetInformation:
  ai_description: >-
    Enriches IP Address and MAC Address entities with asset information from Claroty
    xDome. This action retrieves detailed device metadata, including device category,
    type, manufacturer, and risk scores. It also fetches associated vulnerability
    data to provide a comprehensive security posture for the identified asset.


    ### Flow Description

    1. **Entity Validation**: The action iterates through target entities, filtering
    for IP Addresses and MAC Addresses. It uses regex to ensure the identifiers are
    valid formats.

    2. **Device Lookup**: For each valid entity, it queries the Claroty xDome `/api/v1/devices/`
    endpoint to find matching active (non-retired) devices.

    3. **Vulnerability Retrieval**: If a device is found, the action performs a secondary
    query to `/api/v1/device_vulnerability_relations/` using the device's unique identifier
    (UID) to fetch known vulnerabilities.

    4. **Data Processing**: It summarizes the top 5 vulnerabilities and compiles asset
    metadata (e.g., site name, risk score, firmware version) into a compact format.

    5. **Enrichment**: The action updates the entity's additional properties in Google
    SecOps and marks the entity as enriched.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | xdomeHost | String | True | The base URL for the Claroty xDome instance (e.g.,
    https://example.xdome.claroty.com). |

    | xdomeApiToken | String | True | The API token used for authenticating requests
    to the Claroty xDome API. |


    ### Additional Notes

    - The action supports both IPv4 and IPv6 addresses.

    - MAC addresses are normalized to uppercase before querying the external system.

    - Only the first matching device found in xDome is used for enrichment if multiple
    matches exist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with asset details and vulnerability information
      retrieved from Claroty xDome.
