  ai_description: "### General Description\nEnriches entities with vulnerability information\
    \ retrieved from Claroty xDome. This action identifies devices within the xDome\
    \ platform using their IP address, MAC address, or a unique identifier (UID) and\
    \ fetches associated vulnerability data, including CVE IDs, risk scores, and remediation\
    \ recommendations. The retrieved data is then appended to the entity's additional\
    \ properties in Google SecOps.\n\n### Parameters Description\n| Parameter | Description\
    \ | Type | Mandatory |\n| :--- | :--- | :--- | :--- |\n| xdomeHost | The base\
    \ URL for the Claroty xDome instance (e.g., https://example.xdome.claroty.com).\
    \ | String | Yes |\n| xdomeApiToken | The API token used for authenticating requests\
    \ to the Claroty xDome API. | String | Yes |\n| Verify SSL | If enabled, the action\
    \ will validate the SSL certificate of the xDome API endpoint. | Boolean | No\
    \ |\n\n### Flow Description\n1. **Configuration Extraction**: Retrieves the xDome\
    \ host, API token, and SSL verification settings from the integration configuration.\n\
    2. **Entity Iteration**: Processes each target entity provided in the current\
    \ context.\n3. **Device Identification**: \n    * Checks if the entity identifier\
    \ is a UID (32-40 character hex string).\n    * If not a UID, it attempts to match\
    \ the identifier against IP (v4/v6) or MAC address patterns.\n    * Performs a\
    \ search in xDome to find the corresponding device record.\n4. **Vulnerability\
    \ Retrieval**: For each identified device, it queries the xDome API to fetch all\
    \ related vulnerability records, including details like severity, EPSS scores,\
    \ and descriptions.\n5. **Internal Enrichment**: \n    * Updates the entity's\
    \ `additional_properties` with the vulnerability list, total count, and a `is_vulnerable`\
    \ flag.\n    * Sets the entity's `is_enriched` status to `True`.\n6. **Entity\
    \ Update**: Commits the enriched data back to the Google SecOps platform.\n7.\
    \ **Final Reporting**: Provides a summary message indicating which entities were\
    \ successfully enriched and which failed.\n\n### Additional Notes\n- The action\
    \ uses a timeout of 5 seconds for API requests.\n- It limits the device search\
    \ to the first 5 matches and vulnerability retrieval to the first 100 records\
    \ per device."
