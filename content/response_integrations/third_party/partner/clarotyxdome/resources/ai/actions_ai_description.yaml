AddVulnerabilities:
  ai_description: >-
    Enriches entities with vulnerability information retrieved from Claroty xDome.
    The action identifies devices by their IP address, MAC address, or xDome Unique
    Identifier (UID) and queries the xDome API to retrieve associated security vulnerabilities.
    It fetches detailed data including CVE IDs, vulnerability names, risk scores,
    and descriptions. The gathered information is then appended to the entity's additional
    properties in Google SecOps, and the entity is marked as enriched.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | xdomeHost | String | Yes | The base URL for the Claroty xDome instance (e.g.,
    `https://example.xdome.claroty.com`). |

    | xdomeApiToken | String | Yes | The API token used for authenticating requests
    to the xDome API. |

    | Verify SSL | Boolean | No | If enabled, the action will validate SSL certificates
    for the API connection. Defaults to true. |


    ### Flow Description


    1. **Configuration Extraction:** The action retrieves the xDome host, API token,
    and SSL verification settings from the integration configuration.

    2. **Entity Identification:** It iterates through the target entities and determines
    if the identifier is a UID, an IP address (v4/v6), or a MAC address using regular
    expressions.

    3. **Device Resolution:** For IP or MAC identifiers, the action queries the xDome
    `/api/v1/devices/` endpoint to find the corresponding device UID.

    4. **Vulnerability Retrieval:** Using the device UID, the action queries the `/api/v1/device_vulnerability_relations/`
    endpoint to fetch all related vulnerability records.

    5. **Data Enrichment:** The retrieved vulnerability details (count, list of CVEs,
    risk scores) are mapped to the entity's `additional_properties` and the `is_enriched`
    flag is set to true.

    6. **Internal Update:** The action updates the entities within the Google SecOps
    platform and returns a JSON result containing the enrichment data for each processed
    entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with vulnerability data and sets the enrichment
      status flag.
  categories:
