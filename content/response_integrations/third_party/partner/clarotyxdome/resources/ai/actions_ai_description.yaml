  ai_description: >-
    ### General Description

    Tests the connectivity to the Claroty xDome platform using the provided configuration
    parameters. This action ensures that the Google SecOps environment can successfully
    authenticate and communicate with the Claroty xDome API by attempting to retrieve
    a single alert record.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | xdomeHost | String | Yes | The base URL of the Claroty xDome instance (e.g.,
    https://api.xdome.claroty.com). |

    | xdomeApiToken | String | Yes | The API token used for Bearer authentication.
    |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the xDome host. Defaults to False if not specified. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the integration's configuration
    parameters, including the host URL, API token, and SSL verification preference.

    2. **API Request**: It constructs a POST request to the `/api/v1/alerts/` endpoint.
    The request includes a JSON payload designed to fetch only one alert (`limit:
    1`) to minimize data transfer while verifying access.

    3. **Validation**: The action checks the response status. If the request is successful
    (HTTP 2xx), it confirms connectivity.

    4. **Error Handling**: If the request fails due to network issues, invalid credentials,
    or server errors, the exception is caught, logged, and a failure status is returned.


    ### Additional Notes

    This action does not have specific action-level parameters; it relies entirely
    on the integration's global configuration settings.
