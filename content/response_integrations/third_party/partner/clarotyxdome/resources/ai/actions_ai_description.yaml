  ai_description: >-
    ### General Description

    This action enriches asset information by querying the Claroty xDome platform.
    It retrieves detailed device metadata and vulnerability information for entities
    identified as IP or MAC addresses. The action updates the entity's profile within
    the SOAR platform with the retrieved data, providing analysts with context regarding
    the device's category, manufacturer, risk score, and associated vulnerabilities.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `xdomeHost` and `xdomeApiToken`
    from the integration configuration.

    2. **Entity Filtering**: It iterates through the target entities, processing only
    those with the type `ADDRESS` or `MACADDRESS`.

    3. **Device Query**: For each valid entity, it performs a POST request to the
    Claroty xDome API (`/api/v1/devices/`) to fetch device details based on the IP
    or MAC address.

    4. **Vulnerability Query**: If a device is found, it performs a second POST request
    to the Claroty xDome API (`/api/v1/device_vulnerability_relations/`) to retrieve
    associated vulnerabilities using the device's unique identifier (UID).

    5. **Data Enrichment**: The retrieved device and vulnerability data are compacted
    and added to the entity's `additional_properties`.

    6. **Entity Update**: The action updates the entities in the SOAR platform and
    marks them as enriched.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `xdomeHost` | string | Yes | Base URL for the Claroty xDome instance. |

    | `xdomeApiToken` | string | Yes | API token for authenticating to the Claroty
    xDome instance. |


    ### Additional Notes

    - The action only processes entities of type `ADDRESS` or `MACADDRESS`.

    - If no matching device is found in Claroty xDome, the entity is not enriched.
