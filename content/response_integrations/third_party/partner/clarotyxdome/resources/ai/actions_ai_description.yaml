EnrichAlerts:
  ai_description: >-
    Enriches a Google SecOps alert with detailed metadata from a Claroty xDome alert.
    This action uses a specific Claroty Alert ID to fetch comprehensive information,
    including alert classification, timing, and MITRE ATT&CK mapping. The retrieved
    data is then mapped to the current alert's additional properties and security
    result fields to provide analysts with better context.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | clarotyAlertId | String | Yes | The unique alert ID from Claroty xDome used
    to fetch details. |


    ### Flow Description

    1. **Configuration Retrieval:** Extracts the Claroty xDome host and API token
    from the integration settings.

    2. **Parameter Extraction:** Retrieves the mandatory `clarotyAlertId` provided
    by the user.

    3. **External API Query:** Sends a POST request to the Claroty xDome `/api/v1/alerts/`
    endpoint, filtering by the specific alert ID.

    4. **Data Mapping:** If an alert is found, the script iterates through predefined
    Claroty fields (e.g., `alert_type_name`, `category`, `description`) and adds them
    to the Google SecOps alert's `additional_properties` with a `Claroty_` prefix.

    5. **MITRE Enrichment:** Extracts MITRE ATT&CK Enterprise or ICS tactics and techniques
    from the Claroty data and updates the alert's `security_result` fields (tactic,
    tactic_id, technique, technique_id).

    6. **Result Reporting:** Returns the raw JSON of the fetched alert and updates
    the action status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action modifies the current alert's 'additional_properties' by adding Claroty
      metadata and updates the 'security_result' field with MITRE ATT&CK information.
