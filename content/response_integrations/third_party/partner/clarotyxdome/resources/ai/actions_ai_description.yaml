    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` without applying any `entity_type`
      filters, meaning it technically runs on all entity types. However, it does filter
      the entities by their identifier format, checking if the identifier matches
      a UID, IP address, or MAC address regex before proceeding with the API calls.
