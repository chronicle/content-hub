  ai_description: >-
    ### General Description

    Enriches a Google SecOps alert by fetching additional details for a specific Claroty
    xDome alert ID. The action retrieves information such as status, description,
    and MITRE ATT&CK techniques from Claroty xDome, and appends this data to the current
    SecOps alert's additional properties and security results.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | clarotyAlertId | String | Yes | The unique identifier of the alert in Claroty
    xDome to fetch details for. |


    ### Flow Description

    1. Extracts the `clarotyAlertId` from the action parameters.

    2. Sends a query request to the Claroty xDome API to fetch the specific alert's
    details.

    3. Parses the response to extract relevant fields, including MITRE tactics and
    techniques.

    4. Updates the current SecOps alert (`siemplify.current_alert`) by injecting the
    retrieved data into its additional properties and security results.

    5. Returns the fetched alert data as a JSON result and completes the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
