    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata (device category, manufacturer, risk
      score, vulnerabilities) for assets (IPs/MACs). This aligns with the 'Enrich
      Asset' category. It does not perform IOC reputation lookups (Enrich IOC), nor
      does it perform containment or ticketing operations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
