    update_ticket: false
  ai_description: >-
    ### General Description

    This action enriches asset information by querying the Claroty xDome platform.
    It retrieves detailed device metadata and vulnerability information for entities
    identified as IP or MAC addresses. The action updates the entity's profile within
    the SOAR platform with the retrieved data, providing analysts with context regarding
    the device's category, manufacturer, risk score, and associated vulnerabilities.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `xdomeHost` and `xdomeApiToken`
    from the integration configuration.

    2. **Entity Filtering**: It iterates through the target entities, processing only
    those with the type `ADDRESS` or `MACADDRESS`.

    3. **Device Query**: For each valid entity, it performs a POST request to the
    Claroty xDome API (`/api/v1/devices/`) to fetch device details based on the IP
    or MAC address.

    4. **Vulnerability Query**: If a device is found, it performs a second POST request
    to the Claroty xDome API (`/api/v1/device_vulnerability_relations/`) to retrieve
    associated vulnerabilities using the device's unique identifier (UID).

    5. **Data Enrichment**: The retrieved device and vulnerability data are compacted
    and added to the entity's `additional_properties`.

    6. **Entity Update**: The action updates the entities in the SOAR platform and
    marks them as enriched.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `xdomeHost` | string | Yes | Base URL for the Claroty xDome instance. |

    | `xdomeApiToken` | string | Yes | API token for authenticating to the Claroty
    xDome instance. |


    ### Additional Notes

    - The action only processes entities of type `ADDRESS` or `MACADDRESS`.

    - If no matching device is found in Claroty xDome, the entity is not enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity `additional_properties` and sets the `is_enriched` flag to true.
    reasoning: >-
      The action fetches device and vulnerability data from an external system (Claroty
      xDome) via API calls. It updates the entity's `additional_properties` within
      the SOAR platform, which constitutes an internal mutation, but does not modify
      external system state, create insights, or add case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Claroty xDome) to enrich entities.
      It does not mutate external systems. It modifies internal entity data (which
      is an allowed internal mutation for enrichment actions). Therefore, it is classified
      as an enrichment action.
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly checks if
      the entity type is `EntityTypes.ADDRESS` or `EntityTypes.MACADDRESS`. It processes
      these specific types and filters out others.
