AddVulnerabilities:
  ai_description: >-
    ### General Description

    Retrieves vulnerability information for entities from Claroty xDome.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Evaluates the entity identifier to determine if it is a device UID. If not,
    makes an API call to Claroty xDome (`/api/v1/devices/`) to resolve the identifier
    (IP or MAC address) to a device UID.

    3. Makes a subsequent API call to Claroty xDome (`/api/v1/device_vulnerability_relations/`)
    to fetch vulnerabilities associated with the resolved device UID.

    4. Updates the entity's additional properties with the retrieved vulnerability
    data, marks the entity as enriched, and updates the entity in the SecOps platform.

    5. Returns the vulnerability data as a JSON result.


    ### Additional Notes

    This action updates internal entities with vulnerability data but does not mutate
    external data.
  ai_short_description: >-
    Retrieves and appends vulnerability information from Claroty xDome to target entities
    based on their IP, MAC address, or device UID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Claroty xDome via POST requests to retrieve device
      and vulnerability information. It does not mutate external data. It updates
      internal entities by calling `siemplify.update_entities` to append the vulnerability
      data to the entities' additional properties. It does not create insights, modify
      alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
