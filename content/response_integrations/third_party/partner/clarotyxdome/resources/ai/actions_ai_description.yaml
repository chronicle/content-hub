    get_alert_information: true
    reasoning: >-
      The action fetches alert details from Claroty xDome (Get Alert Information)
      and updates the current Google SecOps alert with these details (Update Alert).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
