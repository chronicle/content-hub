    Enriches IP and MAC address entities by querying Claroty xDome for asset details
    and associated vulnerabilities. The action retrieves device information such as
    manufacturer, device category, risk score, and known vulnerabilities, and appends
    this data to the entity's properties within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

