    internal_data_mutation_explanation: >-
      Updates the current SecOps alert's additional properties and security results
      with MITRE information and other details retrieved from Claroty xDome.
    reasoning: >-
      The action fetches alert details from the Claroty xDome API (fetches_data=true).
      It uses a POST request strictly for querying/filtering, so it does not mutate
      external data (can_mutate_external_data=false). It modifies the current SOAR
      alert by adding additional properties and MITRE information (can_mutate_internal_data=true,
      can_modify_alert_data=true). It does not interact with entities, create insights,
      or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data but mutates internal alert data (modifying `siemplify.current_alert`).
      According to the strict enrichment rules, modifying alert data is not in the
      allowed list of internal mutations (which only permits insights, entity updates,
      and case comments), so it is not classified as Enrichment. It does not perform
      any containment, blocking, or identity-based mitigation, so it is not Remediation.
    remediation: false
  entity_usage:
