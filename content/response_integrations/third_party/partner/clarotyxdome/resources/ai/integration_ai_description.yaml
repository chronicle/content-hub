product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The clarotyxdome integration is primarily focused on providing contextual enrichment
    for assets and alerts within the SOAR platform using data from the Claroty xDome
    OT/IoT security platform. It qualifies for 'Vulnerability Management' because
    it retrieves specific vulnerability data, including CVE IDs and risk scores, to
    help assess asset susceptibility. It qualifies for 'Asset Inventory' because it
    fetches detailed device metadata (manufacturer, category, etc.) for internal assets.
    It qualifies for 'Threat Intelligence' as it provides risk scores and vulnerability
    context for indicators (IPs/MACs), which serves as an enrichment step to confirm
    the nature of an alert. It does not qualify for SIEM, EDR, Network Security, Email
    Security, IAM, Cloud Security, ITSM, or Collaboration as it lacks the specific
    capabilities (e.g., log searching, host isolation, firewall blocking, ticket creation,
    or identity management) defined for those categories.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
