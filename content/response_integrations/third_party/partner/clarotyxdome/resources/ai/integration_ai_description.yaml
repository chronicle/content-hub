  itsm: false
  network_security: false
  reasoning: >-
    The clarotyxdome integration is designed to enrich Google SecOps alerts and entities
    with data from the Claroty xDome platform. The actions 'AddVulnerabilities' and
    'EnrichXDomeAssetInformation' specifically retrieve device metadata (such as manufacturer
    and category) and vulnerability data (including CVEs and risk scores) for assets
    identified by IP or MAC addresses. This functionality directly aligns with the
    'Vulnerability Management' category, as it helps analysts determine if an asset
    is susceptible to specific exploits, and the 'Asset Inventory' category, as it
    provides critical context about internal assets. The integration does not perform
    SIEM log ingestion, EDR process-level analysis, network security blocking, threat
    intelligence reputation lookups for IOCs, email security, IAM management, cloud
    security, ITSM ticketing, or collaboration tasks.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
