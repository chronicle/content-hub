Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specific tag from a SOCRadar alarm using a toggle-based API.


    ### Flow Description

    1. Extracts the `Alarm ID` and `Tag` from the action parameters.

    2. Fetches the current details of the specified alarm from the SOCRadar API to
    check the existing tags.

    3. If the specified tag is present, sends a POST request to the SOCRadar API (`alarm/tag`
    endpoint) to toggle and remove the tag.

    4. Returns the result JSON and outputs a success message indicating the tag was
    removed.


    ### Additional Notes

    The SOCRadar API uses a toggle mechanism for tags. To ensure idempotency, the
    action first verifies the tag's presence on the alarm before attempting to remove
    it.
