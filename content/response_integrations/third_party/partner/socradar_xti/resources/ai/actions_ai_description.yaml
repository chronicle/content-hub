Change Alarm Status:
  ai_description: >-
    ### General Description

    Changes the status of a specific alarm in SOCRadar. This action allows analysts
    to update the lifecycle state of a SOCRadar alarm (e.g., OPEN, RESOLVED, FALSE_POSITIVE)
    directly from the SOAR platform, optionally adding comments and updating related
    findings.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the Alarm
    ID and the new Status.

    2. Initializes the `SOCRadarManager` to handle API communications.

    3. Evaluates if the 'Update Related Findings' flag is set and ensures an email
    is provided, as required by the API.

    4. Calls the `change_status` method, which sends a POST request to the SOCRadar
    `alarms/status/change` API endpoint to update the alarm.

    5. Returns the API response as a JSON result and completes the action with a success
    or failure message.


    ### Additional Notes

    Valid statuses include OPEN (0), INVESTIGATING (1), RESOLVED (2), PENDING_INFO
    (4), LEGAL_REVIEW (5), VENDOR_ASSESSMENT (6), FALSE_POSITIVE (9), DUPLICATE (10),
    PROCESSED_INTERNALLY (11), MITIGATED (12), and NOT_APPLICABLE (13). If 'Update
    Related Findings' is enabled but no email is provided, the action will automatically
    disable the related findings update to prevent API errors.
  ai_short_description: >-
    Changes the status of a specific alarm in SOCRadar.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
