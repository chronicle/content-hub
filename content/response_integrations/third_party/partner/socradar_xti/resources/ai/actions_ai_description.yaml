Add Tag:
  ai_description: >-
    ### General Description

    This action adds a specified tag to an existing alarm in SOCRadar.


    ### Flow Description

    1. Retrieves the `Alarm ID` and `Tag` parameters from the action configuration.

    2. Initializes the SOCRadar API client with the provided integration credentials.

    3. Fetches the current details of the specified alarm via a GET request to check
    existing tags.

    4. If the tag is not already present, makes a POST request to the SOCRadar API
    to add the tag to the alarm.

    5. Returns the execution status and JSON results to the SecOps platform.


    ### Additional Notes

    The action is idempotent; it will check if the tag already exists on the alarm
    before attempting to add it, preventing duplicate tag errors.
