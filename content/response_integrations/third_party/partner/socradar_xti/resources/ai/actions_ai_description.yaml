Rapid Reputation:
  ai_description: >-
    ### General Description

    Performs a quick reputation lookup for a specified entity (IP, hostname, URL,
    or hash) using the SOCRadar Rapid Reputation API. It retrieves the risk score,
    severity, whitelisting status, and threat intelligence sources associated with
    the entity.


    ### Flow Description

    1. Extracts the `Entity Value` and `Entity Type` from the action parameters.

    2. Validates the entity type against supported types (ip, hostname, url, hash).

    3. Makes a GET request to the SOCRadar Rapid Reputation API (`/threatfeed/rapid/reputation`)
    to fetch reputation data.

    4. Calculates a severity label based on the returned risk score.

    5. Appends the enriched data to the action's JSON results.


    ### Additional Notes

    Requires the Rapid Reputation API Key to be configured in the integration settings.
