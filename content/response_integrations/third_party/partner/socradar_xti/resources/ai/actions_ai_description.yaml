Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alarm in the SOCRadar platform. This action allows
    analysts to append notes or automated log entries to the activity timeline of
    a SOCRadar alarm.


    ### Flow Description

    1. Extracts the `Alarm ID`, `Comment`, and `User Email` from the action parameters.

    2. Initializes the SOCRadar API client with the provided integration credentials.

    3. Makes a POST request to the SOCRadar API (`alarm/add/comment/v2`) to append
    the comment to the specified alarm.

    4. Returns the JSON response from the API and completes the action.


    ### Additional Notes

    If the `User Email` parameter is provided, the comment will be associated with
    that specific user in SOCRadar.
  ai_short_description: >-
    Adds a comment to a specific alarm in the SOCRadar platform.
