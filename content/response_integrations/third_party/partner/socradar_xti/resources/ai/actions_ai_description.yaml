    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the SOCRadar API to change the status
      of an alarm, which mutates external data. It does not fetch additional context
      data, mutate internal SecOps data, update entities, or create insights.
