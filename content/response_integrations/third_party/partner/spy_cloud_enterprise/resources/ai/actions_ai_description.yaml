Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud Enterprise API. This action performs a lightweight
    authenticated request to the breach catalog endpoint to verify that the provided
    integration credentials and network settings are correct.


    ### Flow Description

    1. Extracts the API Key, API Root, and Verify SSL settings from the integration
    configuration.

    2. Initializes the SpyCloud SDK with the extracted parameters.

    3. Makes an authenticated GET request to the SpyCloud breach catalog endpoint
    (`/enterprise-v2/breach/catalog/1`) to verify connectivity.

    4. Returns a success or failure status along with a JSON result containing the
    connection details.


    ### Additional Notes

    This action is intended for manual connectivity validation and does not fetch
    breach, Watchlist, or Compass records.
  ai_short_description: >-
    Tests connectivity to the SpyCloud Enterprise API by performing a lightweight
    authenticated request to the breach catalog endpoint.
