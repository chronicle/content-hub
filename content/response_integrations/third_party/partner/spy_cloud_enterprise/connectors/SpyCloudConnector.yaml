name: SpyCloudConnector
parameters:
-   name: API Root
    default_value: https://api.spycloud.io
    type: string
    description: The API root of the SpyCloud instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: temp
    type: password
    description: SpyCloud API key used for authentication
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: Enable SSL certificate verification for API requests.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Enable Compass
    default_value: 'false'
    type: boolean
    description: Enable Compass endpoint ingestion
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: SEVERITIES
    default_value: 20, 25, 30
    type: string
    description: Comma separated list of severities.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Include Plaintext Secrets
    default_value: 'false'
    type: boolean
    description: WARNING - when enabled, plaintext passwords and other sensitive breach
        fields (cookies, tokens, financial identifiers) are persisted onto case events
        and shown in the Get Watchlist Exposures table. These secrets are then stored
        permanently in SecOps/Chronicle case data, appear in exports and backups, and
        are visible to anyone with case-read access. Leave disabled unless you have
        explicit sign-off to retain plaintext secrets in the SIEM.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: DeviceProductField
    default_value: SpyCloud
    type: string
    description: ''
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: ''
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '30'
    type: string
    description: ''
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
description: ''
integration: SpyCloudEnterprise
documentation_link: https://canva.link/koimctgtyy5u7a5
rules: []
is_connector_rules_supported: false
creator: ad378bcf-9119-4260-9daa-98ba26ece318
