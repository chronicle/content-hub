[project]
name = "SpyCloudEnterprise"
version = "3.0"
description = "SpyCloud Enterprise ingests breach and malware exposure records from SpyCloud as Google SecOps alerts to accelerate account takeover and identity threat response. Support: integrations@spycloud.com"
requires-python = ">=3.11,<3.12"
dependencies = [
    "environmentcommon",
    "requests==2.32.5",
    "tipcommon",
]

[tool.uv.sources]
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.3.9-py3-none-any.whl" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.3.9-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "environmentcommon",
    "integration-testing",
    "pytest>=9.0.2",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
    "tipcommon",
]
