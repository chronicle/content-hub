identifier: SpyCloudEnterprise
name: SpyCloud Enterprise
parameters:
-   name: SPYCLOUD_API_KEY
    type: password
    description: SpyCloud API key used for authentication.
    is_mandatory: true
    integration_identifier: SpyCloudEnterprise
-   name: ENABLE_COMPASS
    default_value: 'false'
    type: boolean
    description: Enable SpyCloud Compass endpoint ingestion.
    is_mandatory: false
    integration_identifier: SpyCloudEnterprise
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: Enable SSL certificate verification for API requests.
    is_mandatory: false
    integration_identifier: SpyCloudEnterprise
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/spycloud
categories:
- Threat Intelligence
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
is_available_for_community: false
