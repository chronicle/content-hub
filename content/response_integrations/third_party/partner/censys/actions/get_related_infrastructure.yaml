name: Get Related Infrastructure
description: This action retrieves related infrastructure by searching for hosts and
    services that match a specific field-value pair. It enables discovery of related
    assets by identifying infrastructure that shares common attributes (e.g., all
    hosts with a specific port open, services using a particular protocol, or assets
    with specific certificates). This is similar to the CensEye functionality available
    in the Platform web UI, but allows you to define specific fields of interest rather
    than the default fields leveraged by the tool in the UI. The action uses the Censys
    Search Query API to fetch detailed host/service records and returns comprehensive
    information about matching infrastructure.
integration_identifier: Censys
parameters:
-   name: Field
    default_value: ' '
    type: string
    description: 'The field name to search in Censys data.

        Examples: host.services.port - Search by port number etc'
    is_mandatory: true
-   name: Value
    default_value: ' '
    type: string
    description: 'The value to search for in the specified field.

        Examples: 443'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_related_infrastructure_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
script_result_name: ScriptResult
