product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Censys integration is primarily a Threat Intelligence and Vulnerability Management
    tool. It provides enrichment for external indicators (IPs, Domains, Certificates)
    by retrieving comprehensive intelligence such as services, ports, and vulnerabilities,
    which directly supports the 'Threat Intelligence' category for confirming True
    Positives and the 'Vulnerability Management' category by identifying potential
    exposures and vulnerabilities on internet-facing assets. It does not perform SIEM
    log ingestion, EDR host containment, network blocking, cloud configuration management,
    ITSM ticketing, internal asset inventory management, or collaboration tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
