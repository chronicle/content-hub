product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Censys integration is primarily classified as Threat Intelligence because
    its core functionality involves enriching external indicators (IPs, Domains, and
    Certificates) with contextual data such as services, protocols, and reputation,
    which helps analysts confirm if an alert is a True Positive. It also qualifies
    for Vulnerability Management because the enrichment actions for IPs and Web Properties
    explicitly retrieve vulnerability data (CVEs) associated with those assets, allowing
    analysts to assess the susceptibility of the target to specific exploits. It does
    not qualify for SIEM (no log aggregation), EDR (no host-level process analysis),
    Network Security (no firewall/WAF log retrieval or blocking), Email Security,
    IAM, Cloud Security (no native cloud configuration management), ITSM, Asset Inventory
    (no internal asset management data), or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
