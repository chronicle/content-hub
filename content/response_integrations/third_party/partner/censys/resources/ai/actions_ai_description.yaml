Enrich Certificates:
  ai_description: >-
    Enriches FILEHASH entities with comprehensive SSL/TLS certificate intelligence
    using the Censys Platform API. The action identifies certificates by their SHA-256
    fingerprint and retrieves detailed metadata including issuer information, subject
    details, validity periods, and self-signed status.


    ### Flow Description:

    1. **Entity Collection:** Identifies all FILEHASH entities within the current
    scope.

    2. **Validation:** Validates that the entity identifiers are formatted as 64-character
    hexadecimal strings (SHA-256 fingerprints).

    3. **API Interaction:** Performs a batch request to the Censys `/v3/global/asset/certificate`
    endpoint to retrieve certificate data.

    4. **Data Processing:** For each matching certificate found, it parses the API
    response into a structured data model.

    5. **Internal Update:** Clears any existing Censys-specific enrichment data on
    the entity, updates the entity's additional properties with the new certificate
    metadata, and marks the entity as enriched.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any action-specific parameters;
    it relies on the integration's global configuration (API Key, Organization ID).
    |


    ### Additional Notes:

    * This action specifically targets FILEHASH entities. If an entity identifier
    is not a valid SHA-256 hash, it will be skipped and reported as invalid.

    * The action performs internal state changes by updating entity attributes and
    clearing previous enrichment keys to ensure data freshness.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with certificate metadata (issuer, subject,
      validity) and sets the 'is_enriched' flag to true. It also clears previous Censys
      enrichment data for the entity to prevent stale data.
