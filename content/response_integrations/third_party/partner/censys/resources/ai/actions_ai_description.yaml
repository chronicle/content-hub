Enrich IPs:
  ai_description: >-
    Enriches IP Address entities using the Censys Platform API to provide comprehensive
    intelligence about internet-facing infrastructure. This action retrieves detailed
    data including active services, open ports, protocols, SSL/TLS certificates, known
    vulnerabilities, and geographic location data. It supports historical lookups
    via a timestamp parameter, allowing analysts to view the state of a host at a
    specific point in time.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | At Time | String | No | An RFC3339 formatted timestamp (e.g., '2024-01-15T00:00:00Z')
    used to retrieve historical host data from a specific point in time. |


    ### Additional Notes

    - This action specifically targets entities of type `ADDRESS` (IP addresses).

    - If the `At Time` parameter is provided, it must follow the RFC3339 format; otherwise,
    the action will fail validation.

    - The action automatically clears previous Censys IP enrichment data on the entity
    before applying new results to ensure data freshness.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the optional `At Time` parameter
    and validates its format if provided.

    2. **Entity Filtering:** It identifies all `ADDRESS` entities within the current
    scope and validates that they are correctly formatted IP addresses.

    3. **API Interaction:** A batch request is sent to the Censys `/v3/global/asset/host`
    endpoint to fetch intelligence for all valid IP addresses.

    4. **Data Mapping:** For each successful response, the action parses the host
    data (ASN, location, services, vulnerabilities) using a structured data model.

    5. **Internal Update:** The action clears old enrichment keys, updates the entity's
    additional properties with the new intelligence, and marks the entity as enriched.

    6. **Completion:** The action updates the entities in the Google SecOps platform
    and returns a summary message of the enrichment results.
