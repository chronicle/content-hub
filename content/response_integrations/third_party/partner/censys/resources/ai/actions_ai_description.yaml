  ai_description: >-
    Retrieves the historical event data for a specific host (IP address) from the
    Censys platform. This action allows users to track infrastructure changes, service
    modifications, and scan history over a defined time range.


    ### Flow Description

    1. Extracts the `Host ID`, `Start Time`, and `End Time` parameters from the action
    configuration.

    2. Validates the `Host ID` as a valid IP address and ensures `Start Time` and
    `End Time` are valid RFC3339 timestamps.

    3. Initializes the `APIManager` to interact with the Censys API.

    4. Performs a GET request to the Censys `/v3/global/asset/host/{host_id}/timeline`
    endpoint, utilizing time-based pagination to retrieve the full history.

    5. Handles potential partial data scenarios if pagination is interrupted, logging
    warnings and collecting available data.

    6. Adds the raw JSON response to the action results and constructs a data table
    of events for display in the UI.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Host ID | string | Yes | The IP address of the host to retrieve history for.
    |

    | Start Time | string | Yes | The start of the timeline (RFC3339 format). Must
    be earlier than the End Time. |

    | End Time | string | Yes | The end of the timeline (RFC3339 format). Must be
    earlier than the current time. |


    ### Additional Notes

    - The action enforces a maximum record threshold and will display a warning if
    results are truncated or if further exploration is required on the Censys platform.
