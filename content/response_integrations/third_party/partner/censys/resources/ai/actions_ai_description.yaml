Enrich Web Properties:
  ai_description: >-
    ### General Description

    Enriches web properties (domains and IP addresses) using the Censys Platform API.
    This action retrieves detailed intelligence about web-facing assets, including
    HTTP/HTTPS services, certificates, technologies, and security configurations.


    ### Flow Description

    1. Retrieves integration parameters and action parameters (Port, At Time).

    2. Filters and validates target entities, specifically targeting Address and Domain
    entity types.

    3. Validates and parses the provided ports and the optional RFC3339 timestamp.

    4. Constructs web property IDs by combining valid entity identifiers with the
    specified ports.

    5. Makes an API call to the Censys Platform to fetch enrichment data for the constructed
    web property IDs.

    6. Parses the API response to extract relevant web property information, including
    endpoints, software, vulnerabilities, and certificates.

    7. Updates the target entities with the retrieved enrichment data, appending it
    to their additional properties, and marks them as enriched.

    8. Returns a JSON result containing the detailed enrichment data for each processed
    web property.


    ### Additional Notes

    The action requires a comma-separated list of ports to associate with the domain
    or hostname. The enrichment data is added to the entity's additional properties
    with a prefix indicating the specific port (e.g., `Censys_443_web_hostname`).
