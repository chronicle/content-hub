Get Related Infrastructure Job Status:
  ai_description: >-
    ### General Description

    Retrieves the current status of a CensEye job by its ID from Censys. This action
    is designed to support asynchronous execution, allowing playbooks to poll the
    job status until it reaches a completed or failed state.


    ### Flow Description

    1. Extracts the provided `Job ID` parameter.

    2. Makes a GET request to the Censys API (`/v3/threat-hunting/censeye/jobs/{job_id}`)
    to fetch the current status of the specified job.

    3. Evaluates the returned job state.

    4. If the job is completed or failed, it returns the final status and results.
    If the job is still running, it returns an `IN_PROGRESS` execution state to trigger
    a subsequent poll.


    ### Additional Notes

    - This action is typically used in conjunction with the 'Create Related Infrastructure
    Job' action.

    - The action outputs the raw JSON response from Censys containing the job status
    details.
  ai_short_description: >-
    Retrieves the current status of a CensEye job by its ID from Censys, supporting
    asynchronous polling until the job completes.
