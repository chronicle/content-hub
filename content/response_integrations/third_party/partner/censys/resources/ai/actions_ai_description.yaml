  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity and authentication
    between the Google SecOps SOAR platform and the Censys API. It ensures that the
    integration is correctly configured with a valid API Key and Organization ID,
    and that the server can reach the Censys platform over the network.


    ### Parameters Description

    This action does not require any input parameters. It relies entirely on the global
    integration configuration (API Key, Organization ID, and Verify SSL).


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | No parameters are used for this action. |


    ### Additional Notes

    - This action is primarily used for health checks and initial configuration validation.

    - It performs a read-only GET request to the Censys account/organization endpoint.

    - Per system rules, Ping actions are not classified as enrichment actions.


    ### Flow Description

    1. **Initialization**: The action starts by initializing the Siemplify context
    and logging the execution start.

    2. **Configuration Retrieval**: It extracts the global integration settings: `API
    Key`, `Organization ID`, and `Verify SSL`.

    3. **API Client Setup**: An instance of the `APIManager` is created using the
    retrieved credentials.

    4. **Connectivity Check**: The action calls the `test_connectivity` method, which
    executes a GET request to the Censys API endpoint `/v3/accounts/organizations/{organization_id}`.

    5. **Execution Completion**:
        - If the API call is successful, the action ends with a "Successfully connected"
    message and a `True` result.
        - If an error occurs (e.g., 401 Unauthorized or connection timeout), the action
    catches the exception, logs the error details, and ends with a failure message
    and a `False` result.
