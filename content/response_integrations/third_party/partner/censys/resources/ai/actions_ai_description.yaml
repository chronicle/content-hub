  ai_description: >-
    ### General Description

    This action enriches FILEHASH entities (specifically SSL/TLS certificate fingerprints)
    using the Censys Platform API. It retrieves comprehensive certificate intelligence,
    including issuer, subject, validity periods, and Subject Alternative Names (SANs),
    and updates the entity's profile within the SOAR platform.


    ### Flow Description

    1. **Initialization**: The action retrieves integration parameters (API Key, Organization
    ID, Verify SSL) and initializes the Censys API manager.

    2. **Entity Extraction**: It identifies all FILEHASH entities in the current scope.

    3. **Validation**: It filters the entities to ensure the certificate IDs (SHA-256
    fingerprints) are in the correct 64-character hexadecimal format.

    4. **API Interaction**: It performs a batch request to the Censys API to fetch
    enrichment data for the valid certificate IDs.

    5. **Data Processing**: For each successfully retrieved certificate, it parses
    the response, removes any existing enrichment data, and updates the entity's `additional_properties`
    with the new intelligence.

    6. **Entity Update**: It updates the entities in the SOAR platform and marks them
    as enriched.

    7. **Result Reporting**: It returns a summary message and the raw JSON results
    of the enrichment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used to authenticate with the Censys platform.
    |

    | Organization Id | String | Yes | The Organization ID associated with the Censys
    account. |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates when making
    API requests. |


    ### Additional Notes

    This action specifically targets FILEHASH entities. If no valid FILEHASH entities
    are found, the action will terminate without making API calls.
