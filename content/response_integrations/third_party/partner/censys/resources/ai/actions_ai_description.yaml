Initiate Rescan:
  ai_description: >-
    Initiates a live rescan for a known host service or web origin in Censys. This
    action allows analysts to trigger an immediate update of Censys's data for a specific
    target (IP/Port or Hostname/Port) rather than waiting for the next scheduled crawl.
    The action returns a unique Scan ID which can be used with the 'Get Rescan Status'
    action to monitor the progress and results of the scan.


    ### Flow Description:

    1. **Parameter Validation**: Validates that the 'Port' is a valid integer (1-65535)
    and ensures that if the 'IOC Type' is 'Service', a 'Protocol' is provided and
    the 'IOC Value' is a valid IP address.

    2. **API Request Construction**: Builds a JSON payload for the Censys API. For
    'Service' targets, it includes IP, port, protocol, and transport protocol. For
    'Web Origin' targets, it includes hostname and port.

    3. **External Interaction**: Sends a POST request to the Censys `/v3/global/scans/rescan`
    endpoint.

    4. **Result Processing**: Extracts the `tracked_scan_id`, task count, and creation
    time from the response and provides them as action results.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Type | DDL | Yes | Specifies the target type: 'Service' (for IP-based targets)
    or 'Web Origin' (for hostname-based targets). |

    | IOC Value | String | Yes | The IP address (for Service) or domain name (for
    Web Origin) to be rescanned. |

    | Port | String | Yes | The port associated with the target. Must be between 1
    and 65535. Default is 443. |

    | Protocol | String | No | The service protocol (e.g., http, ssh). This is **mandatory**
    if 'IOC Type' is set to 'Service'. |

    | Transport Protocol | DDL | No | The transport layer protocol (TCP, UDP, etc.).
    Used when 'IOC Type' is 'Service'. Defaults to 'Unknown'. |


    ### Additional Notes:

    - This action does not run on SOAR entities automatically; it requires manual
    input or mapping of entity identifiers to the 'IOC Value' parameter.

    - The rescan process may take several minutes to complete in the Censys platform.
