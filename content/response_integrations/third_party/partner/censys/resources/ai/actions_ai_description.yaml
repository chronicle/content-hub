    Enriches FILEHASH entities representing SSL/TLS certificates using the Censys
    Platform API. It retrieves detailed certificate intelligence including issuer,
    subject, validity periods, and SANs.


    ### Parameters

    There are no configuration parameters for this action.


    ### Action Flow

    1. Retrieves FILEHASH entities from the current case.

    2. Validates the entity identifiers to ensure they are valid 64-character SHA-256
    fingerprints.

    3. Calls the Censys API to fetch comprehensive certificate data for the valid
    fingerprints.

    4. Clears any previous Censys certificate enrichment data from the entities.

    5. Updates the entities with the newly retrieved enrichment data and marks them
    as enriched.

