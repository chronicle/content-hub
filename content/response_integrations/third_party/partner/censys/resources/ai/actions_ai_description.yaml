Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between the Google SecOps SOAR environment and\
    \ the Censys platform. Its primary purpose is to ensure that the integration's\
    \ configuration parameters\u2014specifically the API Key and Organization ID\u2014\
    are correct and that the SOAR server can successfully communicate with the Censys\
    \ API endpoints.\n\n### Parameters Description\nThis action does not require any\
    \ input parameters. It relies entirely on the global integration configuration\
    \ (API Key, Organization ID, and Verify SSL).\n\n### Additional Notes\n- This\
    \ action is typically used during the initial setup of the Censys integration\
    \ or for troubleshooting communication issues.\n- It performs a simple GET request\
    \ to the Censys account/organization endpoint to validate credentials.\n\n###\
    \ Flow Description\n1. **Parameter Retrieval:** The action extracts the global\
    \ integration settings, including the API Key, Organization ID, and SSL verification\
    \ preference.\n2. **Manager Initialization:** It initializes the `APIManager`\
    \ with the retrieved credentials.\n3. **Connectivity Test:** The action calls\
    \ the `test_connectivity` method, which executes a GET request to the Censys API\
    \ (`/v3/accounts/organizations/{organization_id}`).\n4. **Result Handling:** \n\
    \    - If the request is successful, it returns a success message and sets the\
    \ connectivity result to `True`.\n    - If an exception occurs (e.g., authentication\
    \ failure, network timeout), it captures the error, logs it, and returns a failure\
    \ message with the connectivity result set to `False`."
