  ai_description: >-
    ### General Description

    Enriches IP Address and Domain entities with comprehensive web property intelligence
    using the Censys Platform API. This action retrieves detailed data about web-facing
    assets, including HTTP/HTTPS service details, SSL/TLS certificates, software technologies,
    and security configurations. It allows analysts to investigate specific ports
    and even view historical data for a specific point in time.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Port | String | True | 80, 443 | A comma-separated list of port numbers (e.g.,
    "80, 443, 8080") to investigate for each entity. |

    | At Time | String | False | None | An RFC3339 formatted timestamp (e.g., "2024-01-15T00:00:00Z")
    to retrieve historical web property data from a specific point in time. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Port` and `At Time` parameters
    and validates their format (e.g., ensuring ports are within the 1-65535 range
    and the timestamp is valid RFC3339).

    2. **Entity Identification:** It identifies all `ADDRESS` (IP) and `DOMAIN` entities
    in the current scope.

    3. **Identifier Generation:** For every valid entity and every specified port,
    it constructs a unique web property identifier in the format `hostname:port`.

    4. **API Interaction:** The action sends a POST request to the Censys Platform
    API (`/v3/global/asset/webproperty`) with the list of identifiers and the optional
    timestamp.

    5. **Data Parsing:** It processes the API response, matching returned resources
    back to the original entities and ports. It uses a specialized data model to extract
    fields like software vendors, certificate fingerprints, and threat names.

    6. **Internal Mutation:** For each match, it clears any existing Censys enrichment
    data for that specific port on the entity and then updates the entity's `additional_properties`
    with the new intelligence.

    7. **Finalization:** The action marks the entities as enriched, updates them within
    Google SecOps, and provides a summary message of the results.


    ### Additional Notes

    - This action specifically targets `ADDRESS` and `DOMAIN` entity types. Other
    types will be ignored.

    - Enrichment data is prefixed with `Censys_{port}_` to allow for multiple port
    enrichments on a single entity without data collisions.
