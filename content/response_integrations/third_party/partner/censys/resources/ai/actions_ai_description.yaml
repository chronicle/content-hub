  ai_description: >-
    ### General Description

    This action retrieves the historical event timeline for a specific host (IP address)
    from Censys. It allows security analysts to track infrastructure changes over
    time, identifying when specific services were added, removed, or modified. This
    is particularly useful for forensic investigations, tracking threat actor infrastructure
    evolution, or auditing asset changes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Host ID | String | Yes | The IP address of the host to retrieve history for.
    |

    | Start Time | String | Yes | The start time of the host timeline. Must be a valid
    RFC3339 string (e.g., 2025-01-01T00:00:00Z). This represents the beginning of
    the historical window. |

    | End Time | String | Yes | The end time of the host timeline. Must be a valid
    RFC3339 string (e.g., 2025-01-02T00:00:00Z). This represents the end of the historical
    window and must be later than the Start Time. |


    ### Additional Notes

    - The action implements time-based pagination, fetching up to 1000 records or
    10 pages of data.

    - If the API returns more than 1000 records, a warning is provided, and the analyst
    is directed to the Censys platform for full exploration.

    - The action handles partial data collection; if an error occurs during pagination,
    it will return the events collected up to that point with a warning.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the `Host ID`, `Start Time`, and `End Time`
    from the action configuration.

    2. **Validation**: Validates that the `Host ID` is a properly formatted IP address
    and that both timestamps adhere to the RFC3339 standard.

    3. **API Initialization**: Sets up the Censys API manager using the provided API
    Key and Organization ID.

    4. **Data Retrieval**: Executes a paginated GET request to the Censys host timeline
    endpoint. It reverses the user-provided chronological times to match the API's
    reverse-chronological requirements.

    5. **Data Processing**: Iterates through the retrieved events, parsing resource
    details (like service ports, protocols, DNS names, or ASN changes) using the `HostHistoryEventModel`.

    6. **Output Generation**: Populates a data table named "Host History Events" with
    the parsed data and attaches the full raw response as a JSON result to the case.
