Enrich IPs:
  ai_description: >-
    ### General Description

    This action retrieves comprehensive information about multiple IP address entities
    using the Censys Platform API. It provides detailed intelligence about internet-facing
    infrastructure, including services, ports, protocols, certificates, vulnerabilities,
    and location data, to help security teams understand their attack surface exposure.


    ### Flow Description

    1. Retrieves the `At Time` parameter.

    2. Filters the target entities to identify valid IP addresses (ADDRESS entity
    type).

    3. Validates the `At Time` parameter if provided to ensure it is in RFC3339 format.

    4. Makes a POST request to the Censys API (`/v3/global/asset/host`) to fetch host
    intelligence data for the valid IPs.

    5. Iterates over the IP entities and matches the API response data to each entity.

    6. Removes any old Censys IP enrichment data from the entity.

    7. Updates the entity's `additional_properties` with the new enrichment data and
    sets `is_enriched` to True.

    8. Updates the entities in the Google SecOps platform and attaches the JSON results
    to the action.


    ### Additional Notes

    The action skips invalid IP addresses and logs them. If no valid IP addresses
    are found, the action fails.
