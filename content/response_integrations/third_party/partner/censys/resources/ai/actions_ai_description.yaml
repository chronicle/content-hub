    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new CensEye job in the Censys platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Censys API to create a new CensEye job.
      It does not fetch contextual data directly, nor does it update internal entities,
      create insights, or modify alert data.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a job on an external system (mutating external data), which
      disqualifies it from being an Enrichment action. It does not perform any remediation
      tasks such as blocking IPs or disabling identities.
    remediation: false
  entity_usage:
