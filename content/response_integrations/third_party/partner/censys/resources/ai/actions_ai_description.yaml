  ai_description: >-
    ### General Description

    Initiates a live rescan for a known host service or web origin on the Censys platform.
    This action allows analysts to trigger an immediate update of Censys's data for
    a specific endpoint (IP or domain) and port. The action returns a unique scan
    ID which can be used to track the progress and results of the scan.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Type | DDL | Yes | Determines the type of target to scan. Options are 'Service'
    (for IP-based targets) or 'Web Origin' (for domain-based targets). |

    | IOC Value | String | Yes | The specific IP address or domain name to be rescanned.
    |

    | Port | String | Yes | The port number associated with the service or web origin
    (valid range: 1 to 65535). Defaults to 443. |

    | Protocol | String | No | The application-level protocol (e.g., 'http', 'ssh').
    This is **mandatory** if the 'IOC Type' is set to 'Service'. |

    | Transport Protocol | DDL | No | The transport layer protocol. Options include
    'Unknown', 'TCP', 'UDP', 'ICMP', or 'QUIC'. |


    ### Additional Notes

    - If 'IOC Type' is set to 'Service', the 'IOC Value' must be a valid IP address
    and the 'Protocol' parameter must be provided.

    - The scan may take several minutes to complete in the external Censys system.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the target details (Type, Value,
    Port, Protocol) from the user input.

    2. **Validation:** It validates that the port is within the legal range and ensures
    that if a 'Service' scan is requested, an IP address and protocol are provided.

    3. **API Request:** The action sends a POST request to the Censys `/v3/global/scans/rescan`
    endpoint with the target configuration.

    4. **Result Processing:** It captures the `tracked_scan_id` and task information
    from the Censys response.

    5. **Output:** The action returns the scan ID and creation time to the SOAR case
    and provides the full JSON response for further automation steps.
