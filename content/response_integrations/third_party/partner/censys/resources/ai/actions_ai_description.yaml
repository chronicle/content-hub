    reasoning: >-
      The action fetches certificate intelligence from Censys and updates the entity's
      internal properties within the SOAR platform. It does not modify external systems.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Censys) and updates internal
      entity properties. It does not mutate external systems or perform restricted
      internal actions, thus qualifying as an enrichment action.
