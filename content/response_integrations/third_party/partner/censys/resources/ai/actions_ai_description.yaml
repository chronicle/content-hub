  ai_description: >-
    Initiates a CensEye job to discover related infrastructure for a specified target
    (Host, Web Property, or Certificate). This action triggers an asynchronous job
    in the Censys platform and returns a job ID, which can be used to monitor the
    job's status and retrieve results later.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Target Type | String | Yes | The type of asset to analyze. Options: Host, Web
    Property, Certificate. |

    | Target Value | String | Yes | The actual value to analyze. For Host: IP address
    (e.g., "14.84.5.68"). For Web Property: domain:port (e.g., "example.com:443").
    For Certificate: SHA-256 fingerprint (64 hex characters). |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Target Type` and `Target
    Value` from the user input.

    2. **Validation**: The action validates the `Target Value` based on the selected
    `Target Type` (e.g., IP format for Host, domain:port format for Web Property,
    or 64-character hex string for Certificate).

    3. **Job Creation**: The action calls the Censys API to create a new related infrastructure
    job.

    4. **Result Reporting**: The action returns the job ID, state, and creation time
    in the result JSON and logs the outcome.
