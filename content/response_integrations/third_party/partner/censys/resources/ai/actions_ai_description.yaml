  ai_description: >-
    ### General Description

    Initiates a live rescan for a known host service or web origin on the Censys platform.
    This action triggers an on-demand scan of a specific IP/domain and port to validate
    infrastructure and track changes. The scan may take several minutes to complete,
    and the action returns a scan ID that can be used to monitor the scan's status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Type | ddl | Yes | The type of IOC to rescan (Service or Web Origin). |

    | IOC Value | string | Yes | The IP address or domain name to initiate a rescan
    for. |

    | Port | string | Yes | The port associated with the IP or domain (1-65535). |

    | Protocol | string | No | The service protocol (Required for Service IOC Type).
    |

    | Transport Protocol | ddl | No | The transport protocol (Unknown, TCP, UDP, ICMP,
    QUIC) (Required for Service IOC Type). |


    ### Flow Description

    1. The action extracts the configuration parameters (API Key, Organization ID,
    Verify SSL) and the action-specific parameters (IOC Type, IOC Value, Port, Protocol,
    Transport Protocol).

    2. It validates the provided parameters, ensuring the port is within the valid
    range and that required fields for the selected IOC Type are present.

    3. It initializes the Censys API Manager.

    4. It sends a POST request to the Censys API (`/v3/global/scans/rescan`) to initiate
    the rescan.

    5. It captures the response, which includes a `tracked_scan_id`.

    6. It adds the full JSON response to the action results and returns a status message
    containing the scan ID and creation time if available.
