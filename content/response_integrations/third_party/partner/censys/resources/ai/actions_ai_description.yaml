  ai_description: >-
    ### General Description

    The **Get Rescan Status** action retrieves the current status of a scan from Censys
    using its unique Scan ID. This action is designed to be used asynchronously, allowing
    the SOAR platform to monitor the progress of a scan (such as one started by the
    'Initiate Rescan' action) until it reaches a terminal state (Completed or Failed).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan ID | string | Yes | The unique identifier of the tracked scan. This ID
    is typically obtained from the output of a previous rescan initiation action.
    |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the `Scan ID` provided by the
    user or a previous playbook step.

    2. **API Request:** It sends a GET request to the Censys API (`/v3/global/scans/{scan_id}`)
    to fetch the current metadata of the scan.

    3. **Status Evaluation:** The action checks the `completed` field in the API response:
        * If the field is missing, the scan is considered still running, and the action
    returns an `IN_PROGRESS` status.
        * If the field is `True`, the scan is finished, and the action returns `COMPLETED`.
        * If the field is `False`, the scan is marked as `FAILED`.
    4. **Result Reporting:** The full JSON response from Censys is attached to the
    action results for further use in the playbook.


    ### Additional Notes

    This action is intended for use in playbooks that require waiting for external
    scan results before proceeding with enrichment or analysis.
