  ai_description: >-
    Retrieves the event history for a host (IP address) from Censys. This action allows
    users to view historical scan data, track infrastructure changes over time, and
    identify when services were added, removed, or modified.


    ### Flow Description

    1. Extracts and validates the `Host ID` (IP address), `Start Time`, and `End Time`
    parameters.

    2. Initializes the Censys API manager and authenticates using the provided credentials.

    3. Calls the Censys API to retrieve the host's event history within the specified
    time range, handling pagination automatically.

    4. Parses the retrieved events and constructs a data table with the historical
    records.

    5. Returns the full event history as a JSON result and a summary in a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Host ID | String | Yes | The IP address of a host to retrieve history for. |

    | Start Time | String | Yes | Start time of the host timeline. Must be a valid
    RFC3339 string (e.g., 2025-01-01T00:00:00Z). It should be less than the end time.
    |

    | End Time | String | Yes | End time of the host timeline. Must be a valid RFC3339
    string (e.g., 2025-01-02T00:00:00Z). It should be less than the current time.
    |
