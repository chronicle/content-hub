Get Host History:
  ai_description: >-
    Retrieves the event history for a specific host (IP address) from Censys. This
    action allows analysts to view historical scan data, track infrastructure changes
    over time, and identify when services were added, removed, or modified. It performs
    time-based pagination to collect up to 1,000 records within the specified RFC3339
    time range.


    ### Flow Description:

    1. **Validation**: Validates that the 'Host ID' is a valid IP address and that
    'Start Time' and 'End Time' are in the correct RFC3339 format.

    2. **API Request**: Initiates a GET request to the Censys Host Timeline API endpoint.

    3. **Pagination**: Automatically handles pagination to retrieve multiple pages
    of history, respecting a maximum threshold of 1,000 records or 10 API calls.

    4. **Data Processing**: Parses the raw event data (e.g., service scans, DNS resolutions,
    location updates) into a structured format.

    5. **Output**: Generates a data table for the SOAR interface and provides the
    full raw results in JSON format.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Host ID | String | Yes | The IP address of the host to query. |

    | Start Time | String | Yes | The beginning of the timeline range. Must be a valid
    RFC3339 string (e.g., 2025-01-01T00:00:00Z). |

    | End Time | String | Yes | The end of the timeline range. Must be a valid RFC3339
    string (e.g., 2025-01-02T00:00:00Z). |


    ### Additional Notes:

    - The action enforces a chronological check where 'Start Time' must be earlier
    than 'End Time'.

    - If the API returns more than 1,000 records, the action will truncate the results
    and provide a link to the Censys platform for further exploration.
