Enrich Certificates:
  ai_description: >-
    ### General Description

    This action retrieves comprehensive information about SSL/TLS certificates using
    the Censys Platform API. It enriches FILEHASH entities (representing certificate
    SHA-256 fingerprints) with detailed certificate intelligence, including issuer,
    subject, validity periods, SANs (Subject Alternative Names), and associated hosts.


    ### Flow Description

    1. Extracts integration configuration parameters (API Key, Organization ID, Verify
    SSL).

    2. Filters the target entities to identify those of type FILEHASH.

    3. Validates the entity identifiers to ensure they are valid SHA-256 fingerprints
    (64 hexadecimal characters).

    4. Makes a POST request to the Censys API (`/v3/global/asset/certificate`) to
    fetch enrichment data for the valid certificate IDs.

    5. Parses the API response to extract certificate details such as subject, issuer,
    validity period, and signature information.

    6. Clears any previous certificate enrichment data from the entities and updates
    them with the newly retrieved information.

    7. Marks the successfully processed entities as enriched and saves the updates
    to the SecOps platform.

    8. Returns a summary message and JSON results containing the raw certificate data.


    ### Additional Notes

    - The action specifically targets FILEHASH entities. The entity identifier must
    be a valid SHA-256 hash representing the certificate fingerprint.

    - Invalid certificate IDs are skipped and reported in the output message.
  ai_short_description: >-
    Enriches FILEHASH entities representing SSL/TLS certificates with comprehensive
    intelligence from the Censys Platform API, including issuer, subject, and validity
    periods.
