  ai_description: >-
    Enriches IP Address entities using the Censys Platform API. This action retrieves
    comprehensive intelligence about internet-facing infrastructure, including active
    services, open ports, protocols, SSL/TLS certificates, known vulnerabilities,
    and geographic location data. It helps security teams understand the attack surface
    exposure of specific IP addresses.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves integration configuration (API Key, Org
    ID) and the optional 'At Time' action parameter.

    2. **Entity Identification:** Filters the current context for IP Address (ADDRESS)
    entities.

    3. **Validation:** Validates the format of the identified IP addresses and the
    provided RFC3339 timestamp.

    4. **API Interaction:** Performs a batch request to the Censys `/v3/global/asset/host`
    endpoint to fetch host intelligence.

    5. **Data Processing:** Parses the API response using a dedicated data model to
    extract relevant enrichment fields.

    6. **Internal Update:** Clears previous Censys enrichment data, updates the entity's
    additional properties with new intelligence, and marks the entity as enriched.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | At Time | String | No | An RFC3339 formatted timestamp (e.g., 2024-01-15T00:00:00Z)
    used to retrieve historical host data from a specific point in time. |


    ### Additional Notes:

    - This action performs batch processing for efficiency but updates each entity
    individually within the SOAR platform.

    - If an IP is not found in the Censys database, the action will report it as 'not
    found' in the output message but will continue processing other entities.
