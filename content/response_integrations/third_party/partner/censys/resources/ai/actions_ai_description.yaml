Get Host History:
  ai_description: >-
    ### General Description

    Retrieves the event history for a specified host (IP address) from Censys. This
    action allows users to view historical scan data, track infrastructure changes
    over time, and identify when services were added, removed, or modified.


    ### Flow Description

    1. Extracts the `Host ID`, `Start Time`, and `End Time` parameters.

    2. Validates the provided IP address and RFC3339 timestamps.

    3. Makes a GET request to the Censys API (`/v3/global/asset/host/{host_id}/timeline`)
    to retrieve the host's event history within the specified time range.

    4. Handles pagination to fetch up to a maximum number of records.

    5. Formats the retrieved events into a data table and adds the raw response to
    the action's JSON result.


    ### Additional Notes

    The action handles partial data collection if pagination fails midway and provides
    a warning in the output message.
