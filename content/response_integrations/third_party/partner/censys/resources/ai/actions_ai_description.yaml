Enrich Web Properties:
  ai_description: >-
    Enriches IP Address (ADDRESS) and Domain (DOMAIN) entities with comprehensive
    web property intelligence using the Censys Platform API. This action retrieves
    detailed information about web-facing assets, including HTTP/HTTPS service details,
    SSL/TLS certificates, identified software/technologies, and associated security
    threats or vulnerabilities. Enrichment data is added to the entity's additional
    properties using port-specific prefixes (e.g., Censys_80_...) to allow for multiple
    port enrichments on a single entity.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the 'Port' (comma-separated list) and the
    optional 'At Time' (RFC3339 timestamp for historical data) from the action parameters.

    2. **Entity Identification:** Filters the target entities to identify valid ADDRESS
    (IP) and DOMAIN (Hostname) objects.

    3. **Validation:** Validates the format of IP addresses, domain names, and port
    numbers (1-65535). It also ensures the 'At Time' parameter follows the RFC3339
    standard if provided.

    4. **API Request Construction:** Combines each valid entity identifier with each
    specified port to create unique web property IDs (e.g., 'example.com:443') and
    sends a bulk enrichment request to the Censys API.

    5. **Data Parsing:** Processes the API response using a specialized data model
    to extract software vendors, products, versions, certificate fingerprints, subject/issuer
    details, and threat names.

    6. **Internal Update:** Clears existing Censys enrichment for the specific ports
    being processed, updates the entity's additional properties with the new data,
    and marks the entity as enriched.

    7. **Result Reporting:** Updates the entities in the SOAR platform and provides
    a detailed JSON result for each processed web property.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Port | String | True | 80, 443 | A comma-separated list of ports associated
    with the domain or hostname to be queried (e.g., "80, 443, 8080"). |

    | At Time | String | False | None | An RFC3339 formatted timestamp (e.g., "2024-01-15T00:00:00Z")
    used to retrieve historical data for the web property at a specific point in time.
    |


    ### Additional Notes

    * The action uses port-prefixed keys in the entity's additional properties (e.g.,
    `Censys_443_web_cert_issuer`) to prevent data collisions when multiple ports are
    enriched for the same host.

    * If an entity is invalid or no data is found for a specific host/port combination,
    the action will log the skip and continue processing other entities.
