Get Rescan Status:
  ai_description: >-
    Retrieves the current status of a scan by its ID from Censys. This action is primarily
    used to monitor the progress of previously initiated rescans and determine when
    results are available for further processing. It supports asynchronous execution,
    allowing the SOAR platform to poll for completion.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan ID | String | Yes | The unique identifier of the tracked scan, typically
    obtained from the output of an 'Initiate Rescan' action. |


    ### Flow Description


    1.  **Parameter Extraction:** The action extracts the `Scan ID` from the input
    parameters and validates that it is a non-empty string.

    2.  **API Initialization:** Initializes the Censys API Manager using the integration's
    API Key and Organization ID.

    3.  **Status Retrieval:** Makes a GET request to the Censys API (`/v3/global/scans/{scan_id}`)
    to fetch the current state of the scan.

    4.  **Result Processing:** Adds the raw API response to the action results as
    a JSON object.

    5.  **State Determination:** Analyzes the response to determine the execution
    state:
        *   If the 'completed' field is missing, the action returns an `IN_PROGRESS`
    state.
        *   If 'completed' is `True`, the action returns a `COMPLETED` state.
        *   If 'completed' is `False`, the action returns a `FAILED` state.
    6.  **Finalization:** Ends the action with a descriptive output message and the
    calculated execution status.
