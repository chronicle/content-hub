  ai_description: >-
    Enriches IP Address entities using the Censys Platform API. This action retrieves
    comprehensive intelligence about internet-facing infrastructure, including services,
    ports, protocols, certificates, vulnerabilities, and location data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | At Time | String | False | RFC3339 Timestamp to view all requested hosts at
    a specific point in time. Ensure that you suffix the date with T00:00:00Z or a
    specific time. |


    ### Action Flow

    1. Extracts IP Address entities from the current case.

    2. Validates the IP addresses and filters out any invalid formats.

    3. Calls the Censys API to fetch host enrichment data for the valid IPs in a batch
    request.

    4. Removes any old Censys IP enrichment data from the entities to prevent stale
    data.

    5. Updates the entities' additional properties with the newly fetched intelligence
    and marks them as enriched.

    6. Returns a summary message and attaches the raw JSON results to the action.
