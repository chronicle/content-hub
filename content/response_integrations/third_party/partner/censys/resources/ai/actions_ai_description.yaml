  ai_description: >-
    ### General Description

    Enriches `FILEHASH` entities with comprehensive SSL/TLS certificate intelligence
    using the Censys Platform API. This action treats the entity identifier as a certificate's
    SHA-256 fingerprint and retrieves detailed metadata including issuer information,
    subject details, validity periods, and self-signed status. The retrieved data
    is mapped to the entity's additional properties, providing analysts with immediate
    context regarding the certificate's legitimacy and configuration.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the integration's
    global configuration (API Key and Organization ID) and the entities present in
    the current scope.


    ### Flow Description

    1. **Entity Extraction:** Identifies all `FILEHASH` entities within the current
    SOAR scope.

    2. **Validation:** Validates that each entity identifier follows the required
    format for a certificate fingerprint (exactly 64 hexadecimal characters).

    3. **API Interaction:** Performs a batch POST request to the Censys `/v3/global/asset/certificate`
    endpoint using the validated fingerprints.

    4. **Data Processing:** For each matching result, it parses the certificate's
    subject DN, issuer DN, common name, validity start/end dates, and signature details.

    5. **Internal Update:** Clears any existing Censys enrichment data on the entity,
    updates the entity's additional properties with the new metadata, and marks the
    entity as enriched in the SOAR platform.


    ### Additional Notes

    - This action specifically targets `FILEHASH` entities because Censys identifies
    certificates by their SHA-256 hash.

    - If an entity identifier is not a valid 64-character hex string, it is skipped
    and reported as invalid in the output message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates FILEHASH entity attributes with certificate metadata (issuer, subject,
      validity) and sets the enrichment status to true.
