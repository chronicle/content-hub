Create Related Infrastructure Job:
  ai_description: >-
    ### General Description

    This action initiates a CensEye job to discover related infrastructure for a given
    target (host, web property, or certificate) using the Censys API. The job runs
    asynchronously and returns a job ID that can be used to monitor status and retrieve
    results.


    ### Flow Description

    1. Extracts the target type and target value from the action parameters.

    2. Validates the target value format based on the selected target type (e.g.,
    IP address for Host, domain:port for Web Property, SHA-256 for Certificate).

    3. Makes a POST request to the Censys API to create a new CensEye job.

    4. Retrieves the job ID, state, and creation time from the API response.

    5. Attaches the raw API response as a JSON result and outputs the job details.


    ### Additional Notes

    This action does not return the actual related infrastructure data. It only creates
    the job. Use the returned Job ID with the corresponding status and results actions
    to retrieve the final data.
  ai_short_description: >-
    Initiates an asynchronous CensEye job on the Censys platform to discover related
    infrastructure for a specified target.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new CensEye job on the Censys platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Censys API to create a new CensEye job,
      which mutates external data. It does not fetch contextual data, mutate internal
