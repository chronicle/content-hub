  ai_description: >-
    Enriches web property entities (IP Addresses and Domains) using the Censys Platform
    API. This action retrieves comprehensive intelligence about web-facing assets,
    including HTTP/HTTPS services, certificates, technologies, and security configurations,
    by querying combinations of hostnames and ports.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Port | String | Yes | Comma-separated ports associated with the domain or hostname
    (e.g., "80, 443"). Determines which services to query. |

    | At Time | String | No | RFC3339 Timestamp to view historical data for the requested
    hosts at a specific point in time. Must be suffixed with T00:00:00Z or a specific
    time. |


    ### Action Flow

    1. Retrieves target entities of type ADDRESS and DOMAIN from the case.

    2. Validates the entities and the provided ports.

    3. Constructs web property IDs by combining entity identifiers and ports (e.g.,
    `example.com:443`).

    4. Queries the Censys API for web property data (optionally at a specific historical
    time).

    5. Parses the response to extract endpoints, software, labels, threats, vulnerabilities,
    and certificate details.

    6. Updates the entities' additional properties with the enriched data and marks
    them as enriched.

    7. Returns a JSON result containing the detailed web property information.
