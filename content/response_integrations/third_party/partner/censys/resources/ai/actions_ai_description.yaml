  ai_description: >-
    Initiates a live rescan for a known host service at a specific IP and port or
    hostname and port using Censys. The action triggers a scan job on the Censys platform
    and returns a scan ID that can be used to monitor the scan's status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IOC Type | string (ddl) | Yes | Initiate a rescan for a known IP or domain.
    Valid values: Service, Web Origin. |

    | IOC Value | string | Yes | IP address or domain name to initiate a rescan. |

    | Port | string | Yes | Port associated with IP or domain. Valid range is 1 to
    65535. Default is 443. |

    | Protocol | string | No | Name of service protocol. Required if IOC Type is Service.
    |

    | Transport Protocol | string (ddl) | No | Transport Protocol of service. Required
    if IOC Type is Service. Valid values: Unknown, TCP, UDP, ICMP, QUIC. |


    ### Flow

    1. Validates the provided parameters, including port range and required fields
    based on IOC Type.

    2. Calls the Censys API to initiate a rescan for the specified target.

    3. Retrieves the scan ID and task information from the API response.

    4. Adds the raw API response as a JSON result to the action.

    5. Returns a success message with the scan ID or an error message if the initiation
    fails.
