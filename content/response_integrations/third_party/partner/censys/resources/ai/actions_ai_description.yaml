  ai_description: >-
    Initiates a CensEye job to discover related infrastructure for a given target
    (host, web property, or certificate) using the Censys API. The action runs asynchronously
    and returns a job ID that can be used to monitor status and retrieve results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Target Type | string | Yes | The type of asset to analyze for related infrastructure.
    Valid values: Host, Web Property, Certificate. |

    | Target Value | string | Yes | The actual value to analyze. For Host: IP address.
    For Web Property: domain:port. For Certificate: SHA-256 fingerprint. |


    ### Flow

    1. Extracts and validates the Target Type and Target Value parameters.

    2. Initiates a POST request to the Censys API to create a CensEye job.

    3. Retrieves the job ID, state, and creation time from the response.

    4. Returns the job details as JSON and outputs a success message with the job
    ID.
