[project]
name = "Censys"
version = "1.0"
description = "Strengthen your security posture by integrating Censys with Google SecOps SOAR. This integration enables automated threat intelligence workflows, faster incident investigation through rich contextual insights from your Censys environment."
requires-python = ">=3.11"
dependencies = [ "environmentcommon", "requests>=2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "integration-testing", "pytest>=8.4.1", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../../packages/tipcommon/whls/TIPCommon-2.2.22-py2.py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../../packages/integration_testing_whls/integration_testing-2.2.22-py3-none-any.whl"

[tool.coverage.run]
omit = [
    "tests/*",
    "*/tests/*",
    "*/__pycache__/*",
    "*/.venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
]
