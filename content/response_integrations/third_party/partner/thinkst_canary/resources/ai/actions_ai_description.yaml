    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the `/ping` endpoint of the
      Canary Console to verify connectivity. It does not mutate any external data,
      nor does it mutate internal data such as entities, insights, alerts, or case
      comments.
  categories:
