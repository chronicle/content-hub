Acknowledge Console Alert:
  ai_description: >-
    ### General Description

    Acknowledges an alert on the Thinkst Canary console. This action updates the status
    of the corresponding incident in the external Canary system to indicate it has
    been acknowledged.


    ### Flow Description

    1. Retrieves the `AlertId` from the `additional_properties` of the first security
    event associated with the current alert in Google SecOps.

    2. Initiates a POST request to the Thinkst Canary API (`/incident/acknowledge`)
    using the extracted incident ID.

    3. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action requires the `AlertId` to be present in the security event's additional
    properties. This ID is typically populated automatically when the alert is initially
    ingested by the Thinkst Canary connector.
  ai_short_description: >-
    Acknowledges an alert on the Thinkst Canary console by extracting the incident
    ID from the current alert and sending an acknowledgment request to the external
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Acknowledges an incident on the Thinkst Canary Console by sending a POST request
      to the API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Thinkst Canary API to acknowledge
      an incident, which mutates external data. It does not fetch additional contextual
      data, mutate internal SecOps data, update entities, create insights, modify
      alert data, or create case comments.
