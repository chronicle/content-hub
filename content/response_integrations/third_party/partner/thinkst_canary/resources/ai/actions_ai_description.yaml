Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Thinkst Canary Console by testing the configured
    API key and console hash. This action ensures that the integration is properly
    authenticated and can communicate with the external service.


    ### Flow Description

    1. Extracts the API key, console hash, and SSL verification settings from the
    integration configuration.

    2. Validates that the API key and console hash are provided and not set to default
    placeholder values.

    3. Initializes the `ThinkstActionManager` and makes a GET request to the `/ping`
    endpoint of the Canary Console API.

    4. Evaluates the response and returns a successful execution state if the connection
    is established, or a failure state if it cannot connect.


    ### Additional Notes

    This action is primarily used as a health check or test to validate the integration's
    configuration settings. It does not interact with alerts or entities.
  ai_short_description: >-
    Verifies connectivity to the Thinkst Canary Console by testing the configured
    API key and console hash against the `/ping` endpoint.
