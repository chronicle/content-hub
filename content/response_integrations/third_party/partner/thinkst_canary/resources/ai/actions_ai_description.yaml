Acknowledge Console Alert:
  ai_description: >-
    ### General Description

    The **Acknowledge Console Alert** action is designed to change the status of a
    specific incident to 'acknowledged' within the Thinkst Canary console. This action
    is typically used as a response step in a playbook to synchronize the state of
    an alert between Google SecOps and the Canary management environment, ensuring
    that analysts do not need to manually acknowledge the same alert in multiple consoles.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any direct input parameters.
    It relies on the context of the current alert and the integration's global configuration
    (API Key and Console Hash). |


    ### Additional Notes

    - **Prerequisites:** This action requires that the alert in Google SecOps was
    originally ingested via the Thinkst Canary connector, as it relies on the `AlertId`
    being present in the `additional_properties` of the alert's security events.

    - **Configuration:** The action uses the global 'API Key' and 'Console Hash' defined
    in the Thinkst integration settings.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the API Key, Console Hash,
    and SSL verification settings from the integration configuration.

    2. **Incident Identification:** It accesses the `security_events` of the current
    alert in Google SecOps and extracts the `AlertId` from the `additional_properties`
    of the first event.

    3. **API Request:** The action constructs a POST request to the Thinkst Canary
    API endpoint `/incident/acknowledge`, passing the `AlertId` as the `incident`
    parameter.

    4. **Outcome Validation:** It checks the API response. If the response indicates
    success, the action completes successfully; otherwise, it fails with an error
    message explaining the issue (e.g., missing AlertId or API error).
