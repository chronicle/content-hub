  ai_description: >-
    ### General Description

    The **Acknowledge Console Alert** action is designed to mark a specific incident
    as acknowledged on the Thinkst Canary Console. This action is primarily used to
    synchronize alert statuses between Google SecOps and the Canary platform, ensuring
    that once an analyst has addressed an alert in the SOAR, the corresponding event
    is updated in the source system to prevent duplicate effort.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes

    This action relies on metadata (specifically the `AlertId`) that must be present
    in the `additional_properties` of the security events associated with the alert.
    This metadata is typically populated by the Thinkst Canary connector during the
    ingestion process. If the `AlertId` is missing, the action will fail.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the integration's global
    settings, including the API Key and Console Hash.

    2. **Metadata Extraction:** It accesses the `security_events` of the current alert
    in Google SecOps and extracts the `AlertId` from the first event's `additional_properties`.

    3. **External API Call:** It executes a POST request to the Thinkst Canary API
    endpoint `/incident/acknowledge` using the extracted `AlertId` as the identifier.

    4. **Execution Finalization:** The action concludes by reporting whether the acknowledgment
    was successful based on the response from the Canary Console.
