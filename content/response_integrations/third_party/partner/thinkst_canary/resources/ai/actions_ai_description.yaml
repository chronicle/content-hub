  ai_description: >-
    Verifies the connection to the Thinkst Canary Console by calling the `/ping` endpoint.


    ### Flow Description

    1. Extracts the API Key, Console Hash, and Verify SSL parameters from the integration
    configuration.

    2. Validates that the API Key and Console Hash are provided and not set to default
    placeholder values.

    3. Initializes the `ThinkstActionManager` and calls the `ping` method to test
    the connection.

    4. Returns a success message and a `True` result if the connection is established,
    or a failure message and `False` otherwise.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters (API Key, Console Hash, Verify SSL).
  capabilities:
