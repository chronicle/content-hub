  ai_description: >-
    ### General Description

    The Acknowledge Console Alert action is used to mark an incident as acknowledged
    on the Thinkst Canary Console. This action helps synchronize the state of an incident
    between the Canary Console and the SOAR platform, ensuring that acknowledged alerts
    are tracked appropriately in the external system.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the required `API Key`,
    `Console Hash`, and `Verify SSL` settings from the integration configuration.

    2. **Validation**: It verifies that the `API Key` and `Console Hash` are not set
    to their default values. If they are, the action fails.

    3. **Incident Identification**: The action accesses the `current_alert` object
    in the SOAR platform to retrieve the `AlertId` from the `security_events` property.

    4. **Acknowledgment**: It sends a POST request to the Canary Console API (`/incident/acknowledge`)
    using the retrieved `AlertId` to acknowledge the incident.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used to authenticate with the Canary Console.
    |

    | Console Hash | String | Yes | The unique hash/domain identifier for the Canary
    Console. |

    | Verify SSL | Boolean | No | Determines whether to verify SSL certificates when
    making API requests. |


    ### Additional Notes

    - This action requires that the alert was originally ingested by the Thinkst Canary
    Connector, as it relies on the `AlertId` being present in the `additional_properties`
    of the alert's security events.
