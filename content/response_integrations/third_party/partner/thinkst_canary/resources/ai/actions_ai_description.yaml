  ai_description: >-
    Verifies connectivity to the Thinkst Canary Console by testing the provided API
    Key and Console Hash against the `/ping` endpoint. This action is primarily used
    to ensure that the integration is correctly configured and can communicate with
    the external service.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the 'API Key', 'Console Hash', and 'Verify
    SSL' settings from the integration configuration.

    2. **Validation:** Checks if the API Key and Console Hash have been changed from
    their default placeholder values.

    3. **Connectivity Test:** Initializes the Thinkst Manager and sends a GET request
    to the `/ping` endpoint of the Canary Console.

    4. **Result Handling:** Evaluates the response from the console. If the response
    indicates success, the action completes successfully; otherwise, it reports a
    failure.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes (Config) | The authentication token used to access the
    Thinkst Canary API. |

    | Console Hash | String | Yes (Config) | The unique identifier/subdomain for your
    Canary Console (e.g., the 'mycompany' part of 'mycompany.canary.tools'). |

    | Verify SSL | Boolean | No (Config) | Determines whether to verify the SSL certificate
    of the Canary Console. |


    ### Additional Notes

    * This action does not process any entities and is used solely for configuration
    validation.
