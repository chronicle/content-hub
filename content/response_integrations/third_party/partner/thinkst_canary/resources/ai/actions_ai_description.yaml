    reasoning: >-
      The action simply tests the connection to the Thinkst Canary Console. It does
      not enrich IOCs/assets, update alerts, create tickets, block/allow IOCs, or
      perform any other outcome defined in the categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
