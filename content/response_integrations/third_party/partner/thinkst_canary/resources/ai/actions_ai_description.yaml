  ai_description: >-
    Acknowledges an alert on the Thinkst Canary console. The action retrieves the
    incident ID from the current alert's security events and sends a POST request
    to the Canary console API to mark the incident as acknowledged.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | API Key | String | Yes | The API key for authenticating with the Canary console.
    |

    | Console Hash | String | Yes | The domain name hash of the Canary console (the
    part before canary.tools). |

    | Verify SSL | Boolean | No | Whether to verify the SSL certificate during the
    API request. |


    ### Flow

    1. Extracts the API Key, Console Hash, and Verify SSL configuration parameters.

    2. Retrieves the incident ID from the `AlertId` property of the current alert's
    security events.

    3. Sends a POST request to the Canary console API to acknowledge the incident.

    4. Returns the execution status and a success or failure message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Acknowledges an incident on the Thinkst Canary console by sending a POST request
      to the API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action sends a POST request to the Thinkst Canary console to acknowledge
      an incident, which mutates external data. It does not fetch data, update entities,
      create insights, modify internal alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by acknowledging an alert on the Canary console,
      so it is not an enrichment action. It does not perform identity, host, network,
      or email-based remediation, so it is not a remediation action.
    remediation: false
  entity_usage:
