Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a connectivity utility designed to verify the communication
    between Google SecOps and the Thinkst Canary Console. It validates that the provided
    API Key and Console Hash are correct and that the network path is open. This action
    is typically used during initial setup or troubleshooting to ensure the integration
    is properly configured.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters:

    * **API Key**: The authentication token for the Canary Console.

    * **Console Hash**: The unique identifier/subdomain for your Canary Console.

    * **Verify SSL**: Determines whether to validate the SSL certificate of the console.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Key, Console Hash,
    and SSL verification settings from the integration configuration.

    2. **Validation**: It checks if the API Key and Console Hash are provided and
    are not the default placeholder values.

    3. **Manager Initialization**: Initializes the `ThinkstActionManager` with the
    connection details.

    4. **API Call**: Executes a GET request to the `/api/v1/ping` endpoint of the
    Canary Console.

    5. **Result Evaluation**: If the API returns a success result, the action completes
    successfully; otherwise, it reports a failure.


    ### Additional Notes

    This action does not process any entities and does not modify any data within
    Google SecOps or the Thinkst Canary environment.
