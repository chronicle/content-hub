  ai_description: >-
    ### General Description

    Verifies connectivity to the Thinkst Canary Console by validating the provided
    API credentials and console hash. This action ensures that the integration is
    correctly configured and can communicate with the external service.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used to authenticate with the Canary Console.
    |

    | Console Hash | String | Yes | The unique domain hash for the Canary Console
    (e.g., 'example' in 'example.canary.tools'). |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates when connecting
    to the console. |


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment or system mutations.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'API Key', 'Console
    Hash', and 'Verify SSL' settings from the integration configuration.

    2. **Validation**: It checks if the 'API Key' and 'Console Hash' are provided
    and not set to their default placeholder values. If missing, the action fails.

    3. **Connectivity Check**: It initializes the `ThinkstActionManager` and sends
    a GET request to the `/ping` endpoint of the Canary Console API.

    4. **Result**: Based on the API response, it determines if the connection was
    successful and terminates the action with the appropriate status and message.
