  network_security: true
  reasoning: >-
    The Thinkst Canary integration is a deception technology platform that monitors
    for unauthorized access to honeypots. The primary function of the connector is
    to ingest security alerts (honeypot triggers) into the SOAR platform. These alerts
    are typically network-based, such as unauthorized port scans or access attempts,
    which aligns with the Network Security category. The integration does not perform
    log aggregation (SIEM), host-level process analysis (EDR), or other functions
    like IAM, ITSM, or vulnerability management. Therefore, it is categorized under
    Network Security.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
