Thinkst - Alert Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the Thinkst Canary Console to ingest security incidents.
    It periodically polls the Canary Console API for new, unacknowledged incidents,
    transforms them into standardized SOAR alerts, and creates cases within Google
    SecOps. This allows security teams to centralize and respond to alerts generated
    by Canary tokens and honeypots.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key for your Canary Console. |

    | Console Hash | String | Yes | The unique hash for your console (the part before
    .canary.tools). |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates when connecting
    to the console. |

    | Ignore Informative | Boolean | No | If enabled, prevents the creation of cases
    for incidents classified as 'informative'. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process running the script. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |


    ### Flow Description

    1. The connector initializes a connection to the Thinkst Canary Console using
    the provided API Key and Console Hash.

    2. It retrieves the last processed incident ID and timestamp from the SOAR connector
    context to ensure only new incidents are fetched.

    3. It queries the Canary Console API (/api/v1/incidents/unacknowledged) for new
    incidents, handling pagination via cursors.

    4. Incidents are filtered based on the 'Ignore Informative' configuration.

    5. The raw incident data is mapped and transformed into SOAR AlertInfo objects,
    including priority assignment, timestamp conversion, and event parsing.

    6. The connector updates the SOAR connector context with the latest incident ID
    and timestamp to maintain state for the next execution.

    7. The processed alerts are returned to the SOAR platform for case creation.
