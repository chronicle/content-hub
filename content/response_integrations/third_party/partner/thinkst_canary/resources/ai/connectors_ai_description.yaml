Thinkst - Alert Connector:
  ai_description: >-
    ### General Description

    The Thinkst Alert Connector integrates with the Thinkst Canary Console to retrieve
    security incidents. It periodically polls the Canary API for new, unacknowledged
    incidents, transforms them into standardized SOAR alerts, and ingests them into
    Google SecOps. This allows security teams to monitor and respond to honeypot triggers
    and other Canary-detected events directly within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | Password | Yes | The API key for your Thinkst Canary console. |

    | Console Hash | String | Yes | The unique hash for your console (the part before
    .canary.tools). |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates when connecting
    to the console. |

    | Ignore Informative | Boolean | No | If enabled, prevents the creation of cases
    for informative incidents. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |


    ### Flow Description

    1. **Initialization**: The connector initializes using the provided API Key and
    Console Hash to establish a secure connection to the Thinkst Canary API.

    2. **Data Fetching**: It queries the `/incidents/unacknowledged` endpoint, handling
    pagination to retrieve all new incidents since the last successful run (tracked
    via context properties).

    3. **Filtering**: If the "Ignore Informative" option is enabled, the connector
    filters out incidents classified as informative (e.g., system configuration changes).

    4. **Transformation**: Each incident is mapped to a SOAR `AlertInfo` object. This
    includes normalizing timestamps, mapping incident types to priorities, and flattening
    event data into a format compatible with Google SecOps.

    5. **Ingestion**: The processed alerts are returned to the SOAR platform for case
    creation.

    6. **State Management**: Upon successful ingestion, the connector updates its
    context with the latest incident ID and timestamp to ensure subsequent runs only
    fetch new data.
