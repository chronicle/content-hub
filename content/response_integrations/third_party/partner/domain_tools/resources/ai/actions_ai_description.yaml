    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds data tables to the case.
    reasoning: >-
      The action fetches RDAP data from the DomainTools API. It updates the entity's
      `additional_properties` and adds data tables to the case. It does not mutate
      external systems. It performs internal mutations by updating entities and adding
      result tables.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (DomainTools) and updates internal
      entities without mutating external systems. This fits the definition of an Enrichment
      action.
  entity_usage:
