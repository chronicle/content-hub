Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DomainTools API to ensure that the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Username, API Token, Verify
    SSL).

    2. Initializes the DomainToolsManager, which makes an API call to the DomainTools
    account information endpoint to verify credentials.

    3. Evaluates whether the connection was successfully established.

    4. Returns a success or failure message based on the connection status.


    ### Additional Notes

    This action does not process any entities or alerts. It is solely used for verifying
    credentials and network connectivity.
