Investigate Domain:
  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and URL entities using DomainTools Iris Investigate.
    This action provides deep visibility into domain ownership, registration history,
    and risk profiles. It retrieves a wide array of data points including overall
    risk scores, proximity risk, malware/phishing/spam scores, registrant information,
    hosting details (IPs, MX servers, SSL certificates), and tracking codes (Google
    Analytics, Adsense, etc.).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | String | No | A specific domain to investigate. If provided, the action
    will process this domain instead of the entities present in the case. |


    ### Flow Description

    1. **Initialization**: Retrieves API credentials (Username and API Token) from
    the integration configuration.

    2. **Entity Identification**: Determines the domains to investigate. If the 'Domain'
    parameter is provided, it takes precedence. Otherwise, it extracts domains from
    all supported entities (URL, Hostname, Domain) in the current case.

    3. **API Interaction**: Sends the domains to the DomainTools Iris Investigate
    endpoint. The action handles batching (up to 100 domains per call) to optimize
    API usage.

    4. **Data Parsing**: Processes the API response, extracting risk analytics, identity
    details, registration dates, and hosting infrastructure.

    5. **Enrichment**: Updates the SecOps entities with the retrieved data, adding
    them as additional properties prefixed with 'DT'.

    6. **Reporting**: Generates detailed CSV tables for each entity and a comprehensive
    summary table for the entire case.


    ### Additional Notes

    - The action automatically extracts the root domain from URLs or email-like strings.

    - Entities are marked as 'enriched' upon successful data retrieval.
