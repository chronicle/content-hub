  ai_description: >-
    ### General Description

    The **Get WhoIs History** action enriches domain-related entities (Domain, Hostname,
    and URL) with historical Whois information retrieved from DomainTools. This action
    provides visibility into past registration details, registrar changes, and ownership
    history, which is essential for identifying domain aging, ownership shifts, or
    infrastructure patterns used by adversaries.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | String | No | A specific domain to query. If provided, the action will
    focus solely on this value and ignore other entities in the case context. |


    ### Additional Notes

    - The action supports **DOMAIN**, **HOSTNAME**, and **DestinationURL** entity
    types.

    - If the `Domain` parameter is left empty, the action automatically processes
    all supported entities within the current case context.

    - Enrichment results are added to the entity's additional properties (prefixed
    with `DT`) and presented in both entity-specific tables and a consolidated case-wide
    data table.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials (Username and API Token) from
    the integration configuration and initializes the DomainTools manager.

    2. **Entity Identification**: Determines the target domains by either using the
    provided `Domain` parameter or filtering the case's entities for supported types
    (URL, Hostname, Domain).

    3. **Data Retrieval**: For each identified domain, the action queries the DomainTools
    API to fetch its Whois history records.

    4. **Data Processing**: Parses the retrieved historical data, including registration
    dates, registrar names, and registrant information.

    5. **Internal Enrichment**:
        - Updates the entity's **additional_properties** with flattened Whois data.
        - Adds a detailed **entity table** containing the history for each specific
    domain.
        - Creates a global **data table** named "DomainTools Whois History" to summarize
    all enriched entities in the case.
    6. **Completion**: Updates the entities in Google SecOps and returns a summary
    message of the enrichment results.
