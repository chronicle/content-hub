Investigate Domain:
  ai_description: >-
    ### General Description

    Enriches external domain entities with DomainTools Iris Investigate threat intelligence
    data. This action retrieves comprehensive domain information, including risk scores,
    identity, registration, and hosting details, to provide context for security investigations.


    ### Flow Description

    1. Extracts the `Domain` parameter if provided. If not, it iterates over target
    entities of type URL, HOSTNAME, and DOMAIN.

    2. Extracts the domain string from the entity identifier or the provided parameter.

    3. Chunks the domains into groups of 100 to optimize API calls.

    4. Makes a request to the DomainTools Iris Investigate API to fetch threat intelligence
    data for the domains.

    5. Parses the response and updates the entity's `additional_properties` with the
    retrieved data.

    6. Marks the entity as enriched and updates it in the platform.

    7. Generates JSON results and CSV data tables summarizing the investigation.


    ### Additional Notes

    If the `Domain` parameter is provided, the action will only process that specific
    domain and ignore the target entities.
