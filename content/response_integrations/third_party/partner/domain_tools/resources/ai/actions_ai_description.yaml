  ai_description: >-
    ### General Description

    Tests connectivity to the DomainTools API. This action validates the provided
    credentials by attempting to retrieve account information from the DomainTools
    service. It returns a success message if the connection is established or a failure
    message if the connection fails.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Username | String | Yes | The DomainTools API username. |

    | ApiToken | String | Yes | The DomainTools API key. |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates for API requests.
    |


    ### Additional Notes

    This action is a connectivity test and does not process any entities.


    ### Flow Description

    1. Initialize the Siemplify action.

    2. Retrieve configuration parameters (Username, ApiToken, Verify SSL).

    3. Initialize the DomainToolsManager, which triggers an API call to fetch account
    information.

    4. Return a status message indicating whether the connection was successful.
