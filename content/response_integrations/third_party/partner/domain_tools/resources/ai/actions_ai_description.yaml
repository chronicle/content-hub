Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the DomainTools API. It ensures that the provided credentials (Username and
    API Token) are valid and that the environment can successfully communicate with
    the DomainTools service.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    DomainTools integration to confirm that the API is reachable and the license is
    active. It does not process any entities.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Username, API Token,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `DomainToolsManager`, which
    triggers an internal call to the DomainTools `account_information` endpoint to
    verify the license.

    3. **Connectivity Check**: If the API call succeeds and the manager is successfully
    instantiated, the action confirms the connection.

    4. **Final Output**: The action ends with a message indicating whether the connection
    was established or failed.
