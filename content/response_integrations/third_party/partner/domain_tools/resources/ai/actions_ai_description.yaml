  ai_description: >-
    ### General Description

    Tests the connectivity to the DomainTools API using the provided credentials (Username
    and API Token). This action ensures that the integration is correctly configured
    and that the Google SecOps environment can reach the DomainTools service. It verifies
    the validity of the credentials by attempting to retrieve account and license
    information from the external service.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | N/A | This action does not have any input parameters. | N/A | N/A |


    ### Additional Notes

    This action relies on the integration's global configuration (Username, API Token,
    and Verify SSL) to establish a connection. It performs a call to the DomainTools
    `account_information` endpoint during the initialization of the manager class.


    ### Flow Description

    1. **Retrieve Configuration**: The action fetches the integration settings, including
    the Username, API Token, and SSL verification preference.

    2. **Initialize Manager**: It instantiates the `DomainToolsManager`. During this
    process, the manager automatically calls the DomainTools API's account information
    endpoint to verify credentials and retrieve available product licenses.

    3. **Verify Connection**: If the API responds successfully, the action concludes
    with a 'Connection Established' message. If an exception is raised during the
    API call or initialization, the connection is considered failed.
