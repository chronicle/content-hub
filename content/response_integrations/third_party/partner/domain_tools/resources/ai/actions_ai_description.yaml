  ai_description: "### General Description\nEnriches Domain, Hostname, and URL entities\
    \ with parsed RDAP (Registration Data Access Protocol) information from DomainTools.\
    \ This action retrieves detailed registration data, including registrar details,\
    \ contact information, creation/expiration dates, and nameservers. The retrieved\
    \ data is used to enrich the entity's additional properties and generate informative\
    \ data tables within the case.\n\n### Parameters Description\n| Parameter | Expected\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Domain |\
    \ string | False | A specific domain to get the parsed RDAP result for. If provided,\
    \ the action will run only on this domain, ignoring other entities in the case\
    \ context. |\n\n### Flow Description\n1. **Initialization**: Extracts configuration\
    \ parameters (Username, API Token, Verify SSL) and the optional 'Domain' action\
    \ parameter.\n2. **Entity Identification**: If a specific 'Domain' parameter is\
    \ provided, it creates a temporary domain entity. Otherwise, it identifies all\
    \ supported entities (URL, Hostname, Domain) within the current case context.\n\
    3. **Domain Extraction**: For each target entity, it extracts the base domain\
    \ name from the identifier (e.g., extracting from a URL or email).\n4. **Data\
    \ Retrieval**: Queries the DomainTools API using the `get_parsed_domain_rdap`\
    \ method to fetch registration data.\n5. **Internal Mutation**: \n    * Flattens\
    \ the RDAP data and adds it to the entity's `additional_properties` with a 'DT'\
    \ prefix.\n    * Generates an entity-specific table containing the RDAP details.\n\
    \    * Appends summary data to a global case data table named 'DomainTools Parsed\
    \ Domain RDAP'.\n6. **Completion**: Updates the enriched entities in Google SecOps\
    \ and returns the results as JSON.\n\n### Additional Notes\n* If the 'Domain'\
    \ parameter is used, the action logic bypasses the standard entity iteration and\
    \ focuses solely on the provided string.\n* The action handles cases where no\
    \ RDAP record is found by logging the status and providing a placeholder result."
