  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and URL entities using DomainTools Iris Investigate.
    This action retrieves comprehensive threat intelligence, including overall risk
    scores, proximity risk, threat profiles (malware, phishing, spam), registration
    dates, and hosting details. It helps analysts quickly assess the reputation and
    history of a domain by providing both summary tables and detailed entity attributes.


    ### Parameters Description

    | Parameter | Default Value | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Domain | "" | string | False | A specific domain to investigate. If provided,
    the action will focus on this domain instead of the case entities. |


    ### Flow Description

    1. **Initialization**: Extract integration configuration parameters (Username,
    API Token, SSL settings) and identify target entities (URL, Hostname, Domain).

    2. **Target Selection**: If the 'Domain' parameter is provided, it creates a temporary
    domain entity for investigation. Otherwise, it extracts domains from all supported
    entities in the case.

    3. **API Interaction**: Queries the DomainTools Iris Investigate API for the identified
    domains. The action supports batching up to 100 domains per call to optimize performance.

    4. **Data Parsing**: Processes the API response into structured data models, extracting
    risk scores, identity information, registration dates, and hosting details.

    5. **Internal Updates**: Updates the entities in Google SecOps with the retrieved
    intelligence data (prefixed with 'DT') and sets the 'is_enriched' flag to true.

    6. **Output Generation**: Generates entity-specific tables and a comprehensive
    summary data table for the case wall, along with JSON results for downstream automation.
