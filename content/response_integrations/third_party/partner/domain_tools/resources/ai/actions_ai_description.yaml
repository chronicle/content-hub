  ai_description: >-
    ### General Description

    Enriches domain, hostname, and URL entities using DomainTools Iris Investigate.
    This action retrieves comprehensive threat intelligence, including risk scores,
    threat profiles, and hosting information, to assist in the investigation of suspicious
    domains.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the DomainTools API credentials (Username,
    API Token) and SSL verification settings.

    2. **Entity Identification**: Identifies target entities (Domain, Hostname, URL)
    from the case or uses the provided 'Domain' parameter if specified.

    3. **Data Retrieval**: Queries the DomainTools Iris Investigate API for threat
    intelligence data, processing entities in chunks of up to 100.

    4. **Data Parsing**: Parses the API response into a structured model containing
    analytics, identity, registration, and hosting details.

    5. **Entity Enrichment**: Updates the entity's `additional_properties` with the
    retrieved data and marks the entity as enriched.

    6. **Result Reporting**: Adds a CSV table of the investigation results to the
    entity and a summary table to the action results, then updates the entities in
    the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | false | The domain to investigate. If not provided, the action
    will attempt to enrich all supported entities (Domain, Hostname, URL) found in
    the case. |


    ### Additional Notes

    If the 'Domain' parameter is provided, the action will prioritize investigating
    that specific domain. Otherwise, it will iterate through all valid entities of
    type Domain, Hostname, or URL present in the case.
