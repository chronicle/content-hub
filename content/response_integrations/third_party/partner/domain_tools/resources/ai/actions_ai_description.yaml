Get WhoIs History:
  ai_description: >-
    ### General Description

    The **Get WhoIs History** action enriches Domain, Hostname, and URL entities with
    historical Whois registration data retrieved from DomainTools. It provides a chronological
    view of changes to a domain's registrar, registration dates, and registrant information,
    which is vital for tracking ownership changes and identifying potentially malicious
    infrastructure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Domain** | String | No | A specific domain to query. If provided, the action
    will process this domain instead of the entities in the case. |


    ### Flow Description

    1. **Initialization**: Retrieves API credentials (Username and API Key) from the
    integration configuration.

    2. **Target Identification**: Determines the domains to process. It prioritizes
    the manual `Domain` parameter; if empty, it identifies all `URL`, `HOSTNAME`,
    and `DOMAIN` entities within the current SecOps case.

    3. **Data Retrieval**: For each identified domain, it queries the DomainTools
    API to fetch its Whois history records.

    4. **Entity Enrichment**: Flattens the retrieved Whois data and appends it to
    the entity's `additional_properties` with a `DT` prefix.

    5. **Reporting**:
        * Creates an **Entity Table** for each processed entity showing its specific
    Whois history.
        * Generates a global **Data Table** named "DomainTools Whois History" summarizing
    the history for all enriched entities.
        * Updates the entities in the SecOps platform to reflect the new metadata.

    ### Additional Notes

    * If the `Domain` parameter is used, the action creates a temporary domain entity
    for the scope of the execution.

    * The action handles cases where no history is found by logging the status and
    continuing to the next entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Whois history data and adds data tables
      to the case.
  categories:
    enrichment: true
  entity_usage:
