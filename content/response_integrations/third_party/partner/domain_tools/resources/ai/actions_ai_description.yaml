Get Domain Rdap:
  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and URL entities with parsed Domain RDAP data from
    DomainTools. This action retrieves detailed registration data, contacts, and statuses
    for the specified domains to provide additional context for investigations.


    ### Flow Description

    1. The action checks if a specific `Domain` parameter is provided. If so, it creates
    a temporary domain entity to process; otherwise, it retrieves target entities
    from the case that match the supported types (Domain, Hostname, URL).

    2. For each entity, it extracts the domain string and makes an API request to
    DomainTools to fetch the parsed domain RDAP data.

    3. If RDAP data is found, the action flattens the JSON response and appends it
    to the entity's `additional_properties` with a 'DT' prefix.

    4. It generates entity-specific CSV tables and a summary data table containing
    the parsed RDAP information.

    5. Finally, the action updates the enriched entities in the platform and attaches
    the raw JSON results to the action output.


    ### Additional Notes

    - The action requires a valid DomainTools API key and username with access to
    the `parsed-domain-rdap` product license.

    - If the `Domain` parameter is used, the action will ignore the case's target
    entities and only process the provided domain.
  ai_short_description: >-
    Enriches Domain, Hostname, and URL entities with parsed Domain RDAP data from
    DomainTools.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the DomainTools API to fetch parsed domain
      RDAP data (fetches_data=true). It does not mutate external data or internal
      SecOps data. It updates the entities with the fetched data using `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
