  ai_description: >-
    Enriches external domain entities with DomainTools threat intelligence data by
    retrieving parsed domain RDAP results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Domain | string | False | The domain to get the parsed domain RDAP result. If
    provided, the action will run on this specific domain instead of the target entities.
    |


    ### Flow

    1. Retrieves configuration parameters (Username, ApiToken, Verify SSL).

    2. Checks if a specific `Domain` parameter is provided. If so, creates a dummy
    domain entity. Otherwise, filters target entities for URL, HOSTNAME, and DOMAIN
    types.

    3. Iterates over the target entities, extracting the domain from the identifier.

    4. Calls the DomainTools API to get parsed domain RDAP data.

    5. If data is found, adds an entity table with the flattened RDAP data and appends
    the data to the entity's additional properties.

    6. Updates the enriched entities in Google SecOps.

    7. Adds a JSON result and a summary data table for all enriched entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities' additional properties with the retrieved RDAP data.
    reasoning: >-
      The action fetches parsed domain RDAP data from the DomainTools API (fetches_data=true).
      It does not mutate any external data (can_mutate_external_data=false). It updates
      the entities with the retrieved data (can_update_entities=true, can_mutate_internal_data=true).
      It does not create insights, modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data and only updates entities internally, which is an allowed
      internal mutation for enrichment actions. Therefore, it is an enrichment action.
      It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - DestinationURL
    - HOSTNAME
    - DOMAIN
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action processes target entities if the 'Domain' parameter is not provided.
      It filters the entities by checking if their entity_type is in SUPPORTED_ENTITY_TYPES
      (URL, HOSTNAME, DOMAIN).
