  ai_description: >-
    Enriches domain, hostname, and URL entities with WhoIs history data from DomainTools.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Domain | String | False | The domain to get the whois history result. If not
    provided, the action will run on the supported target entities in the case. |


    ### Flow

    1. Retrieves configuration parameters (Username, ApiToken, Verify SSL) to initialize
    the DomainTools manager.

    2. Checks if the `Domain` parameter is provided. If so, it creates a temporary
    domain entity to process. Otherwise, it filters the case's target entities for
    supported types (URL, HOSTNAME, DOMAIN).

    3. Iterates over the target entities and extracts the domain from the entity identifier.

    4. Calls the DomainTools API to fetch the WhoIs history for each extracted domain.

    5. If WhoIs history is found, it flattens the data and adds it to the entity's
    additional properties with a 'DT' prefix.

    6. Creates an entity-specific table with the flattened WhoIs data and appends
    the results to a summary data table.

    7. Updates the enriched entities in Google SecOps and attaches the JSON results
    to the action.
