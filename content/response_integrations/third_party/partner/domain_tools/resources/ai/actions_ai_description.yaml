  ai_description: >-
    Enriches domain, hostname, or URL entities with RDAP (Registration Data Access
    Protocol) information from DomainTools. This action retrieves threat intelligence
    and registration details for the specified domain, hostname, or URL, and updates
    the entity's properties with the retrieved data.


    ### Flow

    1. Extracts configuration parameters (Username, API Token, Verify SSL) from the
    integration settings.

    2. Identifies target entities from the case (DOMAIN, HOSTNAME, URL) or uses the
    provided `Domain` parameter if specified.

    3. Queries the DomainTools API for parsed RDAP data for each target entity.

    4. Updates the entity's `additional_properties` with the retrieved RDAP data.

    5. Generates a summary table and JSON results for the case to provide visibility
    into the enrichment results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | false | The domain to get the parsed domain RDAP result. If
    not provided, the action runs on all supported entities in the case. |


    ### Additional Notes

    If the `Domain` parameter is provided, the action will run only for that specific
    domain. If it is not provided, the action will iterate over all supported entities
    (DOMAIN, HOSTNAME, URL) present in the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity properties and adds data tables/JSON results to the
      case.
    reasoning: >-
      The action fetches RDAP data from DomainTools (fetches_data=true). It updates
      entity properties (can_update_entities=true) and adds data tables/JSON results
      to the case (can_mutate_internal_data=true). It does not modify external systems.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (DomainTools) and updates internal
      entities without modifying external systems, which qualifies it as an enrichment
      action.
  entity_usage:
    entity_types:
    - DOMAIN
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them based on
      `SUPPORTED_ENTITY_TYPES` (DOMAIN, HOSTNAME, URL). It also supports an optional
      `Domain` parameter to run on a specific domain.
