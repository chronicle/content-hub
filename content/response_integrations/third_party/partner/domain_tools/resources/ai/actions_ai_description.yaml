  ai_description: >-
    ### General Description

    Enriches domain, hostname, or URL entities with RDAP (Registration Data Access
    Protocol) information from DomainTools. This action retrieves threat intelligence
    and registration details for the specified entity, updates the entity's properties
    with the retrieved data, and provides visibility into the enrichment results via
    data tables and JSON output.


    ### Flow

    1. Extracts configuration parameters (Username, API Token, Verify SSL) from the
    integration settings.

    2. Identifies target entities from the case (DOMAIN, HOSTNAME, URL) or uses the
    provided `Domain` parameter if specified.

    3. Queries the DomainTools API for parsed RDAP data for each target entity.

    4. Updates the entity's `additional_properties` with the retrieved RDAP data.

    5. Generates a summary table and JSON results for the case to provide visibility
    into the enrichment results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain | string | false | The domain to get the parsed domain RDAP result. If
    not provided, the action runs on all supported entities in the case. |


    ### Additional Notes

    If the `Domain` parameter is provided, the action will run only for that specific
    domain. If it is not provided, the action will iterate over all supported entities
    (DOMAIN, HOSTNAME, URL) present in the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
