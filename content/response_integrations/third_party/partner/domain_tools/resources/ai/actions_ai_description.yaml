Get WhoIs History:
  ai_description: >-
    ### General Description

    Enriches external domain, URL, and hostname entities with Whois History threat
    intelligence data from DomainTools. This action retrieves historical registration
    records and updates the entities with the findings, providing analysts with a
    timeline of domain ownership and status changes.


    ### Flow Description

    1. Determines the target domains either from the `Domain` action parameter or
    by filtering the case's target entities for URL, Hostname, and Domain types.

    2. Iterates over the target domains and makes an API request to DomainTools to
    fetch the Whois History.

    3. Parses the historical Whois records, including registrar, creation dates, expiration
    dates, and registrant details.

    4. Updates the entities' `additional_properties` with the flattened Whois history
    data.

    5. Attaches the results as JSON and creates a CSV data table summarizing the Whois
    history for the case wall.


    ### Additional Notes

    If the `Domain` parameter is explicitly provided, the action will ignore the case's
    target entities and only execute the enrichment on the specified domain.
