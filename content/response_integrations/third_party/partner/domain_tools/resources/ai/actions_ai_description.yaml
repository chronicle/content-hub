Get Domain Rdap:
  ai_description: >-
    ### General Description

    Enriches external domain entities with DomainTools threat intelligence data. This
    action retrieves RDAP (Registration Data Access Protocol) information, including
    registrar details, registration dates, and contact information, providing context
    for domain-based investigations.


    ### Parameters Description

    | Parameter | Default Value | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Domain | | string | false | The domain to get the parsed domain RDAP result.
    If provided, the action runs on this domain instead of case entities. |


    ### Additional Notes

    - This action requires a valid DomainTools license for the 'parsed-domain-rdap'
    product.

    - Entities are updated with flattened RDAP data in their additional properties.

    - The action extracts the base domain from URLs and Hostnames.


    ### Flow Description

    1. **Configuration**: Retrieves API credentials and SSL settings.

    2. **Targeting**: Checks if a specific domain is provided via the 'Domain' parameter.
    If not, it identifies all URL, Hostname, and Domain entities in the case.

    3. **Extraction**: Extracts the root domain from the identifiers.

    4. **API Query**: Requests RDAP data for each domain from the DomainTools API.

    5. **Parsing**: Processes the raw API response into a structured format.

    6. **Enrichment**: Updates entity properties with the prefix 'DT', adds an entity-specific
    table, and creates a global summary table for the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with RDAP information and adds data tables
      to the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
