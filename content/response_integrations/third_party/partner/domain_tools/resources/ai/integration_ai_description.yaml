  reasoning: >-
    The DomainTools integration is a dedicated threat intelligence provider. Its primary
    actions, such as 'Get Domain Rdap', 'Get WhoIs History', and 'Investigate Domain',
    are specifically designed to enrich domain, hostname, and URL entities with risk
    scores, registration data, and historical context. This aligns perfectly with
    the 'Threat Intelligence' category, which focuses on the enrichment of external
    indicators to determine reputation and confirm alerts. The integration does not
    perform SIEM log analysis, EDR host containment, network security blocking, email
    management, IAM operations, cloud security, ITSM ticketing, vulnerability management,
    asset inventory, or collaboration tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
