    types.

    4. For each matching entity, looks up the corresponding violation UID from the
    mapping.

    5. Sends a POST request to the Group-IB DRP API (`violation/change-approve`) with
    `approve: False` to reject the violation.

    6. Aggregates the results (rejected, failed, unmapped) and outputs a summary message.


