  ai_description: "### General Description\nVerifies connectivity to the Group-IB\
    \ DRP API. This action acts as a \"Ping\" to ensure that the integration's configured\
    \ credentials and network settings are valid and can successfully communicate\
    \ with the external service.\n\n### Parameters Description\nThis action does not\
    \ require any action-specific parameters. It relies entirely on the integration's\
    \ global configuration parameters (API login, API key, API URL, and Verify SSL).\n\
    \n### Flow Description\n1. **Initialization:** The action initializes and retrieves\
    \ the integration's global configuration parameters.\n2. **Connection Test:**\
    \ It constructs a poller and issues a low-cost GET request to the `violation/list`\
    \ endpoint.\n3. **Result Evaluation:** \n   - If the request succeeds, the action\
    \ completes successfully and outputs a confirmation message.\n   - If the request\
    \ fails, the action catches the exception, logs the error, and fails the execution.\n\
    \n### Additional Notes\nThis is a utility action primarily used during the initial\
    \ setup or troubleshooting of the Group-IB DRP integration to validate connectivity."
