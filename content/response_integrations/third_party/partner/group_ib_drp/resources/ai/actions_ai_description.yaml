  ai_description: >-
    ### General Description

    Approves Digital Risk Protection (DRP) violation URLs in Group-IB that match the
    target DestinationURL entities of the action.


    ### Flow Description

    1. Gathers target entities of type `DestinationURL`.

    2. Parses the alert's security events to build a mapping of URLs to violation
    UIDs.

    3. Iterates over the `DestinationURL` entities and checks for a matching violation
    UID.

    4. Sends a POST request to the Group-IB DRP API to approve the violation for each
    matched entity.

    5. Aggregates the results (approved, failed, unmapped) and outputs a summary message.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    The action will only process entities of type `DestinationURL`. If an entity does
    not have a corresponding violation UID in the alert's security events, it will
    be skipped and marked as unmapped.
