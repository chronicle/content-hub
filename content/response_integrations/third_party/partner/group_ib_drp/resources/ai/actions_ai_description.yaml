  ai_description: >-
    ### General Description

    Verifies connectivity to the Group-IB DRP API.


    ### Flow Description

    1. Initializes the Siemplify action.

    2. Retrieves the integration configuration parameters.

    3. Sends a GET request to the `violation/list` endpoint of the Group-IB DRP API.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is used to test the integration configuration and ensure the API is
    reachable.
