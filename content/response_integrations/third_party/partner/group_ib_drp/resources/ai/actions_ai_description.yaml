URL-Approve:
  ai_description: >-
    ### General Description

    Approves Digital Risk Protection (DRP) violation URLs in Group-IB that match the
    target entities of the action.


    ### Flow Description

    1. Gathers target entities from the action.

    2. Parses the current alert's security events to build a mapping of violation
    URLs to violation UIDs.

    3. Iterates over the target entities, filtering for `DestinationURL` types.

    4. For each matching entity, retrieves the corresponding violation UID from the
    mapping.

    5. Sends a POST request to the Group-IB DRP API (`violation/change-approve`) to
    approve the violation.

    6. Aggregates the results (approved, failed, unmapped) and outputs a summary message.


    ### Additional Notes

    Failures of individual entities do not abort the action. The action exits with
    a failed state only if at least one entity could not be approved.
