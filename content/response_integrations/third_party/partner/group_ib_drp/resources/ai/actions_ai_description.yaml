Get Violation Details:
  ai_description: >-
    ### General Description

    Retrieves detailed Digital Risk Protection (DRP) violation information for URL
    entities from Group-IB. This action enriches URL entities by fetching their associated
    violation metadata, such as brand, status, risk scores, and detection dates, and
    attaches this information as case insights.


    ### Flow Description

    1. Extracts violation UIDs from the current alert's security events, building
    a mapping of URLs to their corresponding UIDs.

    2. Iterates through the provided target entities, strictly filtering for `DestinationURL`
    (URL) entity types.

    3. Looks up the violation UID for each URL entity using the previously built map.

    4. Makes an API call (`search_feed_by_id`) to the Group-IB DRP service to fetch
    the comprehensive violation details.

    5. Creates a case insight for each successfully fetched entity, displaying key
    details like status, type, brand, and risk scores.

    6. Aggregates all fetched violation records and attaches them to the action's
    result as a JSON object.


    ### Additional Notes

    The action relies on the alert's security events containing `violation_url` and
    `violation_uid` in their additional properties to successfully map entities to
    Group-IB records. If an API error occurs during the fetch process, the action
    will end in a failed state.
  ai_short_description: >-
    Retrieves detailed Digital Risk Protection (DRP) violation information from Group-IB
    for URL entities and attaches the findings as case insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Group-IB API using `poller.search_feed_by_id`.
      It does not mutate external data. Internally, it does not update entities or
      modify alert data, but it does create case insights using `siemplify.create_case_insight`.
  entity_usage:
