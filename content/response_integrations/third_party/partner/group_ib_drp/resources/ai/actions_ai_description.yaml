  ai_description: >-
    Rejects DRP violation URLs that match the target entities of the action.


    ### General Description

    This action walks the alert's security events to build a URL to violation-UID
    map, then iterates over the action's target entities. For every `DestinationURL`
    entity with a known UID, it submits a reject request to the Group-IB DRP API and
    records the outcome (rejected, failed, or unmapped) per entity. Failures of individual
    entities do not abort the action; they are aggregated into the final output message.


    ### Flow Description

    1. Gathers target entities from the case.

    2. Parses the alert's security events to map URLs to violation UIDs.

    3. Iterates over `DestinationURL` entities.

    4. Submits a POST request to the Group-IB DRP API to reject the violation for
    each mapped entity.

    5. Aggregates the results and outputs a summary message.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    The action will fail only if at least one entity could not be rejected.
