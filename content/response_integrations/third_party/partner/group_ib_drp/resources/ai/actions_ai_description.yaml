  ai_description: >-
    Fetches Group-IB DRP violation details for DestinationURL entities.


    ### General Description

    This action retrieves detailed information about Digital Risk Protection (DRP)
    violations associated with `DestinationURL` entities from Group-IB. It extracts
    violation UIDs from the alert's security events, queries the Group-IB API for
    each UID, and generates case insights containing the violation details such as
    status, scores, and dates.


    ### Flow Description

    1. The action builds a mapping of URLs to violation UIDs by extracting data from
    the current alert's security events.

    2. It iterates over the target entities, filtering specifically for `DestinationURL`
    entities.

    3. For each matching entity, it retrieves the corresponding violation UID from
    the previously built mapping.

    4. It queries the Group-IB DRP API using the violation UID to fetch detailed violation
    information.

    5. It creates a case insight for each successfully fetched entity, displaying
    the violation details.

    6. Finally, it aggregates all fetched violation details into a JSON list and attaches
    it to the action result.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    The action relies on the presence of `violation_url` and `violation_uid` in the
    additional properties of the alert's security events to successfully map and fetch
    the violation details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights with the fetched violation details.
    reasoning: >-
      The action fetches violation details from the Group-IB DRP API using `search_feed_by_id`.
      It does not mutate any external data. Internally, it creates case insights using
      `siemplify.create_case_insight` but does not update entities, modify alert data,
      or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Group-IB DRP) to provide additional
      context (violation details) for DestinationURL entities. It does not mutate
      external data and only performs allowed internal mutations (creating insights).
      Therefore, it is an enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
