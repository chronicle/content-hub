  ai_description: >-
    ### General Description

    The ANYRUN TI Lookup action performs threat intelligence lookups using the ANY.RUN
    API. It retrieves intelligence reports for specified entities or a raw query,
    evaluates the threat level (e.g., Suspicious, Malicious), and attaches the JSON
    summary report to the case wall. It also adds case comments containing the lookup
    URLs and a summary of the verdicts.


    ### Flow Description

    1. Extracts the configuration and action parameters, including the API token,
    lookup depth, and query or entity details.

    2. If a `Query` is provided, it performs a threat intelligence lookup using the
    raw query.

    3. If no `Query` is provided, it iterates over the provided `Identifiers` and
    `Types`.

    4. For each supported entity type, it queries the ANY.RUN API for intelligence
    data.

    5. Adds a case comment with a direct URL to the ANY.RUN lookup.

    6. Saves the retrieved JSON summary report as an attachment to the case wall.

    7. Compiles a final summary of all lookups and their verdicts, adding it as a
    case comment.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Lookup Depth | Yes | String | Specify the number of days from the current date
    for which you want to lookup. Default is 90. |

    | Query | No | String | Raw query with necessary filters. Supports condition concatenation
    with AND, OR, NOT and Parentheses (). |

    | Identifiers | Yes* | String | The target case entity identifiers. Default is
    `[Entity.Identifier]`. |

    | Types | Yes* | String | The target case entity types. Default is `[Entity.Type]`.
    |


    ### Additional Notes

    * Either the `Query` parameter must be provided, or both `Identifiers` and `Types`
    must be specified for the action to run successfully. If `Query` is provided,
    `Identifiers` and `Types` are ignored.
