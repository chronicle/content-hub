    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves threat intelligence (verdict, summary) for indicators,
      matching 'Enrich IOC'. It also adds comments to the case, matching 'Add Alert
      Comment'. It does not perform any other listed actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
