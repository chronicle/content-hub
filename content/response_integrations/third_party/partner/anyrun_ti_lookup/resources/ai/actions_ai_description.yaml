  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity and authentication
    status between the Google SecOps environment and the **ANY.RUN TI Lookup** service.
    It ensures that the integration is correctly configured and can successfully communicate
    with the external API.


    ### Parameters Description

    This action does not have any instance-specific parameters. It relies on the following
    **Integration Configuration** parameters:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN TI Lookup API KEY | String | Yes | The API key required to authenticate
    requests to ANY.RUN. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the ANY.RUN API. |

    | Enable proxy | Boolean | No | If enabled, the action will route traffic through
    the configured proxy. |

    | Proxy host | String | No | The hostname or IP address of the proxy server (required
    if proxy is enabled). |

    | Proxy port | String | No | The port number of the proxy server (required if
    proxy is enabled). |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API key and network
    settings (SSL, Proxy) from the integration configuration.

    2. **Proxy Validation (Optional)**: If proxying is enabled, the action attempts
    to establish a connection through the specified proxy host and port using the
    `check_proxy` method.

    3. **Authorization Check**: The action initializes a connection to the ANY.RUN
    service and performs an authorization check via the `check_authorization` method
    to validate the API key.

    4. **Result Reporting**: The action logs the outcome (Success or Failure) and
    terminates with the appropriate execution state (`COMPLETED` or `FAILED`).


    ### Additional Notes

    - This action is primarily used for troubleshooting and initial setup verification.

    - It does not process or enrich any entities.
