Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the ANY.RUN TI Lookup service.
    This action validates the provided API key and network configuration (including
    proxy settings) to ensure that subsequent enrichment actions can communicate with
    the ANY.RUN API successfully.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ANYRUN TI Lookup API KEY | String | Yes | The API key used to authenticate with
    the ANY.RUN TI Lookup service. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the ANY.RUN server. |

    | Enable proxy | Boolean | No | If enabled, the action will use the configured
    proxy to connect to the service. |

    | Proxy host | String | No | The hostname or IP address of the proxy server. Required
    if 'Enable proxy' is true. |

    | Proxy port | String | No | The port of the proxy server. Required if 'Enable
    proxy' is true. |


    ### Additional Notes

    This is a utility action used for troubleshooting and initial setup. It does not
    process entities or modify any data within the SOAR or the external service. If
    'Enable proxy' is set to true, both 'Proxy host' and 'Proxy port' must be provided.


    ### Flow Description

    1. Extract configuration parameters including the API Key, SSL verification preference,
    and proxy settings.

    2. If proxying is enabled, validate the proxy connection using the provided host
    and port.

    3. Initialize the ANY.RUN connector and perform an authorization check against
    the ANY.RUN TI Lookup API.

    4. Return a success message if the connection is established and authorized, otherwise
    return a failure message with the error details.
