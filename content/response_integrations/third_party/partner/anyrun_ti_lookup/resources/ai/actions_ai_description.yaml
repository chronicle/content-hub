    reasoning: >-
      The action is a connectivity test (Ping) for the ANY.RUN TI Lookup service.
      It does not perform any enrichment, containment, or ticket management. It does
      not match any of the defined product categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
