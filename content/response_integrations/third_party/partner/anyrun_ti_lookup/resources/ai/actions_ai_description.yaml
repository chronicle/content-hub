ANYRUN TI Lookup:
  ai_description: >-
    ### General Description

    The ANYRUN TI Lookup action queries the ANY.RUN Threat Intelligence service to
    retrieve intelligence reports and verdicts for specified entities or a raw query.
    It evaluates the threat level of the provided indicators and attaches the detailed
    JSON summary of the intelligence report to the case wall, along with a summary
    comment.


    ### Flow Description

    1. Extracts the `Lookup Depth`, `Query`, `Identifiers`, and `Types` from the action
    parameters.

    2. If a `Query` is provided, it executes a lookup against the ANY.RUN API using
    the raw query.

    3. If no query is provided, it iterates through the provided entity types and
    identifiers.

    4. For supported entity types (Address, IP Set, URL, Domain, Process, File Hash),
    it makes an API call (`connector.get_intelligence`) to the ANY.RUN service to
    fetch threat intelligence.

    5. Attaches the raw JSON summary of the intelligence report to the case wall as
    a file.

    6. Adds a comment to the case containing the lookup URL and a summary of the verdicts
    (e.g., Suspicious, Malicious) for all processed entities.


    ### Additional Notes

    The action requires an ANY.RUN TI Lookup API key configured in the integration
    settings. If an unsupported entity type is passed, it will be skipped and logged
    as unsupported.
  ai_short_description: >-
    Queries the ANY.RUN Threat Intelligence service to retrieve intelligence reports
    and verdicts for specified entities or a raw query, attaching the results and
    summaries to the case wall.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments and JSON report attachments to the case wall.
    reasoning: >-
      The action fetches threat intelligence data from the ANY.RUN API (fetches_data=true).
      It does not mutate external systems (can_mutate_external_data=false). It mutates
      internal data by adding comments and attachments to the case wall (can_mutate_internal_data=true,
      can_create_case_comments=true). It does not update entities or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: true
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: true
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: true
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action receives entity identifiers and types via parameters (typically populated
      by placeholders). It iterates over these and processes them if their type is
      supported in the `Config.ENTITIES` mapping (address, ipset, destinationurl,
      domain, process, filehash). Therefore, it targets Address, IP Set, URL, Domain,
      Process, and File Hash entities, effectively filtering by entity type.
  outcome_categories:
    add_alert_comment: true
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves threat intelligence and verdicts for indicators (IPs, domains,
      hashes, etc.) from ANY.RUN, matching the 'Enrich IOC' category. It also adds
      a summary comment to the case, matching the 'Add Alert Comment' category. It
      does not modify external systems or perform other actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Lookup Depth | String | Yes | Specify the number of days from the current date
    for which you want to lookup. |

    | Query | String | No | Raw query with necessary filters. Supports condition concatenation
    with AND, OR, NOT and Parentheses (). |

    | Identifiers | String | Yes | The target case entity identifiers. |

    | Types | String | Yes | The target case entity types. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ANY.RUN TI Lookup service.


    ### Flow Description

    1. Extracts integration configuration parameters including the API key, proxy
    settings, and SSL verification preferences.

    2. Initializes the `LookupConnector` to establish a connection.

    3. Makes an API call to the ANY.RUN service to verify authorization credentials.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the ANY.RUN API.
  ai_short_description: >-
