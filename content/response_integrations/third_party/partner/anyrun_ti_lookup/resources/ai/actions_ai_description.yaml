  ai_description: "### General Description\nPerforms threat intelligence lookups using\
    \ the ANY.RUN TI Lookup service. This action allows analysts to retrieve detailed\
    \ threat reports, reputation scores, and analysis links for various entity types\
    \ including IP addresses, domains, URLs, file hashes, and processes. It can process\
    \ specific entities or execute raw queries to gather intelligence from the ANY.RUN\
    \ platform.\n\n### Parameters Description\n| Parameter | Description | Type |\
    \ Mandatory | Notes |\n| :--- | :--- | :--- | :--- | :--- |\n| Lookup Depth |\
    \ Specifies the number of days from the current date for which you want to lookup\
    \ intelligence data. | String | Yes | Default is 90 days. |\n| Query | A raw query\
    \ string with necessary filters. Supports condition concatenation with AND, OR,\
    \ NOT, and parentheses. | String | No | If provided, the action performs a lookup\
    \ based on this query instead of individual entities. |\n| Identifiers | The target\
    \ case entity identifiers to be looked up. | String | Yes | Usually mapped to\
    \ `[Entity.Identifier]`. |\n| Types | The target case entity types corresponding\
    \ to the identifiers. | String | Yes | Usually mapped to `[Entity.Type]`. |\n\n\
    ### Flow Description\n1. **Initialization**: Extracts the API key, SSL verification\
    \ settings, and lookup depth from the integration configuration and action parameters.\n\
    2. **Query Execution**: \n    * If a **Query** parameter is provided, the action\
    \ executes a raw search against the ANY.RUN TI Lookup API.\n    * If no query\
    \ is provided, the action iterates through the provided **Identifiers** and **Types**.\n\
    3. **Intelligence Retrieval**: For each supported entity (IP, IPSet, Domain, URL,\
    \ Process, FileHash), the action calls the ANY.RUN API to fetch intelligence data.\n\
    4. **Internal Updates**:\n    * Adds a comment to the case containing a direct\
    \ hyperlink to the ANY.RUN analysis page for the entity.\n    * Saves the full\
    \ JSON report as an attachment to the case wall for forensic review.\n5. **Result\
    \ Summarization**: Calculates a text-based verdict (Malicious, Suspicious, Unknown)\
    \ based on the threat level returned by ANY.RUN and posts a final summary comment\
    \ to the case wall.\n\n### Additional Notes\n- Supported entity types are: `address`,\
    \ `ipset`, `destinationurl`, `domain`, `process`, and `filehash`.\n- The action\
    \ requires a valid ANY.RUN TI Lookup API Key configured in the integration settings."
