    reasoning: >-
      The action fetches threat intelligence data from ANY.RUN for various IOC types
      (IP, Domain, URL, Hash, Process), which aligns with 'Enrich IOC'. It also adds
      a summary comment to the case, aligning with 'Add Alert Comment'.
