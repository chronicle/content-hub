    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    General Description: This action tests the connectivity between the Google SecOps
    environment and the ANY.RUN TI Lookup service. It validates the provided API key
    and, if configured, the proxy settings to ensure the integration is properly set
    up and reachable. Parameters: | Parameter | Type | Mandatory | Description | |
    --- | --- | --- | --- | | ANYRUN TI Lookup API KEY | String | Yes | The API key
    used to authenticate with the ANY.RUN service. | | Verify SSL | Boolean | No |
    Whether to verify SSL certificates during the connection. | | Enable proxy | Boolean
    | No | Whether to route the connection through a proxy. | | Proxy host | String
    | No | The hostname or IP address of the proxy server. Required if 'Enable proxy'
    is true. | | Proxy port | String | No | The port number of the proxy server. Required
    if 'Enable proxy' is true. | Additional Notes: Either the proxy configuration
    (Proxy host and Proxy port) must be provided if 'Enable proxy' is set to true,
    or the action will fail. Flow Description: 1. Initialize the Siemplify action.
    2. Extract the configuration parameters (API key, SSL verification, proxy settings).
    3. If 'Enable proxy' is enabled, validate the proxy host and port, then test connectivity
    through the proxy. 4. If 'Enable proxy' is disabled, test connectivity directly
    to the ANY.RUN service using the provided API key. 5. Log the success or failure
    of the connectivity test and terminate the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test (Ping) to the ANY.RUN service. It does
      not fetch contextual data, mutate external or internal data, or interact with
      entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is a Ping action, which is explicitly excluded from being an enrichment
      action per the instructions. It does not fetch contextual data.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
