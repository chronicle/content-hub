    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test to the ANY.RUN service. It does not
      fetch data for entities, mutate external systems, or modify internal SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action, which is explicitly excluded from being an enrichment
      action per the instructions. It does not fetch data or perform any enrichment
      tasks.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
