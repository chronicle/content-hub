    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a connectivity test ('Ping') and does not perform any functional
      operations like enrichment, containment, or ticketing. Therefore, it does not
      match any of the defined product categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    General Description: This action tests the connectivity between the Google SecOps
    environment and the ANY.RUN TI Lookup service. It validates the provided API key
    and, if configured, the proxy settings to ensure the integration is properly set
    up and reachable.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | ANYRUN TI Lookup API KEY | String | Yes | The API key used to authenticate with
    the ANY.RUN service. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates during the connection.
    |

    | Enable proxy | Boolean | No | Whether to route the connection through a proxy.
    |

    | Proxy host | String | No | The hostname or IP address of the proxy server. Required
    if 'Enable proxy' is true. |

    | Proxy port | String | No | The port number of the proxy server. Required if
    'Enable proxy' is true. |


    ### Additional Notes

    Either the proxy configuration (Proxy host and Proxy port) must be provided if
    'Enable proxy' is set to true, or the action will fail.


    ### Flow Description

    1. Initialize the Siemplify action.

    2. Extract the configuration parameters (API key, SSL verification, proxy settings).

    3. If 'Enable proxy' is enabled, validate the proxy host and port, then test connectivity
    through the proxy.

    4. If 'Enable proxy' is disabled, test connectivity directly to the ANY.RUN service
    using the provided API key.

    5. Log the success or failure of the connectivity test and terminate the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
