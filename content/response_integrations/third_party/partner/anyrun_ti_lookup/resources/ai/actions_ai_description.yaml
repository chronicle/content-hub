ANYRUN TI Lookup:
  ai_description: >-
    Performs threat intelligence lookups on ANY.RUN for specific entities or raw queries.
    This action retrieves threat levels and detailed intelligence reports, providing
    analysts with context on potentially malicious indicators. It supports lookups
    for IP addresses, domains, URLs, processes, and file hashes. The action attaches
    a full JSON summary of the intelligence report to the case wall and adds comments
    with direct lookup links and a summary of the findings.


    ### Parameters

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Lookup Depth | Specify the number of days from the current date for which you
    want to lookup. | string | Yes | 90 |

    | Query | Raw query with necessary filters. Supports condition concatenation with
    AND, OR, NOT and Parentheses (). | string | No |  |

    | Identifiers | The target case entity identifiers. | string | Yes | [Entity.Identifier]
    |

    | Types | The target case entity types. | string | Yes | [Entity.Type] |


    ### Additional Notes

    * If the **Query** parameter is provided, the action will perform a raw query
    lookup and ignore the **Identifiers** and **Types** parameters.

    * Supported entity types include: ADDRESS, IPSET, DestinationURL, DOMAIN, PROCESS,
    and FILEHASH.

    * The action requires an ANY.RUN TI Lookup API KEY to be configured in the integration
    settings.


    ### Flow Description

    1. **Initialization:** Extract action parameters (Lookup Depth, Query, Identifiers,
    Types) and integration configuration (API Key, Verify SSL, Proxy settings).

    2. **Query Execution:** If a raw **Query** is provided, the action performs a
    single lookup using that query.

    3. **Entity Processing:** If no raw query is provided, the action iterates through
    the provided **Identifiers** and **Types**.

    4. **Type Validation:** For each entity, it checks if the type is supported (Address,
    IPSet, DestinationURL, Domain, Process, FileHash).

    5. **Intelligence Retrieval:** For each valid entity or query, it calls the ANY.RUN
    API to fetch threat intelligence data based on the specified **Lookup Depth**.

    6. **Internal Updates:** For each successful lookup, it adds a comment to the
    case with a direct link to the ANY.RUN analysis and attaches the full JSON report
    to the case wall.

    7. **Final Summary:** Once all lookups are complete, it adds a final summary comment
    to the case listing the type, value, and verdict (Malicious, Suspicious, Unknown,
    or No info) for each item processed.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments to the case containing lookup URLs and a summary of results. It
      also saves the full JSON intelligence report as an attachment to the case wall.
  categories:
