  ai_description: >-
    Performs threat intelligence lookups against the ANY.RUN service for specified
    entities or raw queries. This action retrieves intelligence data, such as threat
    levels and summaries, and provides visibility into potential threats.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters including 'Lookup Depth',
    'Query', 'Identifiers', and 'Types'.

    2. **Query Processing**: If a raw 'Query' is provided, the action performs a direct
    lookup against the ANY.RUN service.

    3. **Entity Processing**: If no raw query is provided, the action parses the 'Identifiers'
    and 'Types' parameters. It iterates through the provided entities, mapping them
    to supported types (IP, Domain, URL, Hash, Process).

    4. **Data Retrieval**: For each valid entity or query, the action connects to
    the ANY.RUN service to fetch intelligence data.

    5. **Reporting**: The action adds a summary comment to the case and saves the
    full JSON report as an attachment to the case wall.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Lookup Depth | string | Yes | Specify the number of days from the current date
    for which you want to lookup. |

    | Query | string | No | Raw query with necessary filters. Supports condition concatenation
    with AND, OR, NOT and Parentheses (). |

    | Identifiers | string | Yes | The target case entity identifiers. |

    | Types | string | Yes | The target case entity types. |


    ### Additional Notes

    Either a 'Query' or a combination of 'Identifiers' and 'Types' must be provided
    for the action to execute successfully.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a summary comment to the case and saves the full JSON report as an attachment
      to the case wall.
    reasoning: >-
      The action fetches intelligence data from an external service (ANY.RUN) via
      the LookupConnector. It does not mutate external systems. It mutates internal
      data by adding a case comment and saving an attachment to the case wall. It
      does not update entities or create insights.
  categories:
    enrichment: true
    reasoning: >-
      The action is classified as an enrichment action because its primary purpose
      is to fetch threat intelligence data. It does not mutate external systems. While
      it modifies internal data, it only adds case comments and attachments, which
      are acceptable internal mutations for enrichment actions.
  entity_usage:
    entity_types:
    - ADDRESS
    - IPSET
    - DestinationURL
    - DOMAIN
    - PROCESS
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over provided entity identifiers and types, mapping them
      to ANY.RUN supported types. It does not apply specific filters like 'is_internal'
      or 'is_suspicious' to the entities.
