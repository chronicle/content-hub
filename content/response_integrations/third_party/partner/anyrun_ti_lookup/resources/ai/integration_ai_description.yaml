  network_security: false
  reasoning: >-
    The anyrun_ti_lookup integration is designed specifically to enrich Indicators
    of Compromise (IOCs) such as IP addresses, domains, URLs, and file hashes by querying
    the ANY.RUN threat intelligence service. This aligns perfectly with the Threat
    Intelligence category, as it provides risk scores, threat context, and verdict
    data to help analysts confirm if an alert is a True Positive. The integration
    does not perform SIEM log analysis, EDR host-level actions, network security blocking,
    email management, IAM operations, cloud security monitoring, ITSM ticket management,
    vulnerability scanning, asset inventory lookups, or collaboration/human-in-the-loop
    workflows.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
