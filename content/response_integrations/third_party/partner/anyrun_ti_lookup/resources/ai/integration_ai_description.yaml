product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The anyrun_ti_lookup integration is designed to perform threat intelligence lookups
    for various indicators of compromise (IOCs) such as IP addresses, domains, URLs,
    and file hashes. The primary action, 'ANYRUN TI Lookup', retrieves external threat
    context, risk scores, and intelligence data from the ANY.RUN service to assist
    in investigations. This aligns perfectly with the Threat Intelligence category,
    which focuses on enriching external indicators to determine reputation and confirm
    if an alert is a True Positive. The integration does not perform log searching
    (SIEM), host containment (EDR), network blocking (Network Security), identity
    management (IAM), or other functions like ITSM or Asset Inventory. Therefore,
    only the Threat Intelligence category is applicable.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
