  reasoning: >-
    The integration 'doppel_vision' is a threat intelligence platform that provides
    real-time threat intelligence and alert management capabilities. The actions 'Get
    Alert' and 'Get Alerts' allow users to retrieve alert information, which serves
    as enrichment for entities (e.g., URLs) to determine their reputation or status,
    directly aligning with the 'Threat Intelligence' category. The actions 'Create
    Alert', 'Create Abuse Alert', and 'Update Alert' are used for reporting and managing
    abuse alerts within the DoppelVision system, which is a core threat intelligence
    function. Although some actions are flagged as 'create_ticket' in the metadata,
    they are used for reporting abuse rather than for ITSM-specific tasks like assigning
    tickets to internal teams. The integration does not perform functions related
    to SIEM (log ingestion), EDR (host-level activity), Network Security (gateway
    blocking), Email Security (inbox management), IAM, Cloud Security, Vulnerability
    Management, Asset Inventory, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
