  reasoning: >-
    The integration 'doppel_vision' connects the DoppelVision threat intelligence
    platform with Google SecOps. Its primary functionality involves retrieving, creating,
    and updating threat alerts and abuse reports. This aligns directly with the Threat
    Intelligence category, as it provides external threat data and allows for the
    management of threat-related records. It does not perform SIEM log analysis, EDR
    host-level actions, network security blocking, email inbox management, IAM operations,
    cloud resource management, ITSM ticketing, vulnerability scanning, asset inventory
    management, or collaboration/notification tasks.
  siem: false
