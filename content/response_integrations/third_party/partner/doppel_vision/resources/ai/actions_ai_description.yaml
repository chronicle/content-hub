  ai_description: >-
    ### General Description

    Creates an abuse alert in the DoppelVision system for a specified entity (e.g.,
    URL). This action automates the reporting process by sending a request to the
    DoppelVision API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity | string | Yes | The entity (e.g., URL) for which to create the abuse
    alert. |


    ### Additional Notes

    This action requires valid API credentials (API Key, User API Key, and Organization
    Code) to be configured in the DoppelVision integration settings. The action will
    fail if the provided entity is invalid or protected in the DoppelVision system.


    ### Flow Description

    1. Extracts the required API credentials (API Key, User API Key, Organization
    Code) from the integration configuration.

    2. Extracts the target `Entity` from the action parameters.

    3. Initializes the `DoppelManager` with the provided credentials.

    4. Sends a POST request to the DoppelVision API (`/alert/abuse`) to create an
    abuse alert for the specified entity.

    5. Stores the API response in the action result JSON.

    6. Completes the action with a success or failure status based on the API response.
