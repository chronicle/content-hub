  ai_description: >-
    ### General Description

    The **Get Alerts** action retrieves a list of alerts from the Doppel platform
    based on specified filtering criteria. This action allows analysts to query the
    Doppel tenant for alerts, supporting various filters such as search keys, product
    categories, creation dates, sorting preferences, and queue states. The retrieved
    alerts are returned as a JSON object in the action results for further analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Search Key | string | No | A search term to filter alerts by URL or other identifiers.
    |

    | Product | ddl | No | The product category to filter by (e.g., domains, social_media,
    mobile_apps, ecommerce, crypto, emails, paid_adds). |

    | Created Before | string | No | Filter alerts created before this date (format:
    'YYYY-MM-DDTHH:MM:SS'). |

    | Created After | string | No | Filter alerts created after this date (format:
    'YYYY-MM-DDTHH:MM:SS'). |

    | Sort Type | ddl | No | The field to sort the reports by. Defaults to 'date_sourced'.
    Options: 'date_sourced', 'date_last_actioned'. |

    | Sort Order | ddl | No | The order to sort the reports by. Defaults to 'desc'.
    Options: 'asc', 'desc'. |

    | Page | string | No | Page number for pagination. Defaults to 0. |

    | Queue State | ddl | No | Filter alerts by their current queue status (e.g.,
    doppel_review, actioned, needs_confirmation, taken_down, monitoring, archived).
    |

    | Tags | string | No | A comma-separated list of tags to filter alerts. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API credentials
    (API Key, User API Key, Organization Code) from the DoppelVision integration configuration.

    2. **Parameter Parsing**: It extracts the optional action parameters provided
    by the user and constructs a `filters` dictionary, removing any empty or null
    values.

    3. **Data Retrieval**: The action instantiates the `DoppelManager` and calls the
    `get_alerts` method, passing the constructed filters to the Doppel API.

    4. **Result Handling**: If alerts are successfully retrieved, the action stores
    the JSON response in the action result using `siemplify.result.add_result_json`
    and logs the total count. If no alerts are found or an error occurs, the action
    fails gracefully with an appropriate error message.
