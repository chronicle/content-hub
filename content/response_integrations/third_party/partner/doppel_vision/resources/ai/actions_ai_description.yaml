  ai_description: >-
    ### General Description

    Updates the queue state and entity state of a specific alert in the Doppel platform.
    This action modifies the status of an external alert by sending a PUT request
    to the Doppel API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert_ID | String | No | Unique identity for the specific alert in the Doppel
    tenant. |

    | Entity | String | No | The entity associated with the alert (usually a URL).
    |

    | Queue_State | Dropdown | Yes | The new queue state value for the alert. Valid
    options include: `doppel_review`, `needs_confirmation`, `monitoring`, `taken_down`,
    `actioned`, `archived`. |

    | Entity_State | Dropdown | Yes | The new entity state for the alert. Valid options
    include: `active`, `down`, `parked`. |


    ### Additional Notes

    Either the `Alert_ID` or the `Entity` parameter must be configured for the action
    to run successfully. If both are provided, or if neither is provided, the action
    will fail validation and halt execution.


    ### Flow Description

    1. Extracts the provided configuration credentials and action parameters.

    2. Validates the inputs to ensure exactly one of `Alert_ID` or `Entity` is provided.

    3. Initiates a PUT request to the Doppel API to update the specified alert with
    the new `Queue_State` and `Entity_State`.

    4. Retrieves the updated alert details and attaches them to the action's JSON
    result.

    5. Completes the action and outputs a success or failure message based on the
    API response.
