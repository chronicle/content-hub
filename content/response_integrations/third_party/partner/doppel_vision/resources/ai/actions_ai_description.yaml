Create Abuse Alert:
  ai_description: >-
    ### General Description

    Creates an abuse alert for a specified entity within the Doppel system.


    ### Flow Description

    1. Extracts the target entity string from the action parameters.

    2. Makes a POST request to the Doppel API (`/alert/abuse`) to create the abuse
    alert.

    3. Retrieves the response and attaches the created alert details to the action's
    JSON result.


    ### Additional Notes

    The action will fail if the provided entity value is invalid or protected (e.g.,
    google.com) in Doppel's system.
  ai_short_description: >-
    Creates an abuse alert for a specified entity in the Doppel system and returns
    the alert details.
  capabilities:
