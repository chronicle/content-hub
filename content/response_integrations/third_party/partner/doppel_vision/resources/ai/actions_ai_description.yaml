  ai_description: >-
    ### General Description

    The **Update Alert** action allows users to modify the status and state of an
    existing alert within the DoppelVision platform. It specifically targets the `Queue_State`
    (e.g., moving an alert to 'actioned' or 'archived') and the `Entity_State` (e.g.,
    marking a URL as 'active', 'down', or 'parked'). This action is primarily used
    to synchronize remediation or review progress from Google SecOps back to the DoppelVision
    source system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert_ID** | String | No | The unique identifier for the specific alert in
    the Doppel tenant. |

    | **Entity** | String | No | The entity (usually a URL) associated with the alert.
    |

    | **Queue_State** | DDL | Yes | The target queue state for the alert. Supported
    values: `doppel_review`, `needs_confirmation`, `monitoring`, `taken_down`, `actioned`,
    `archived`. |

    | **Entity_State** | DDL | Yes | The target state of the entity. Supported values:
    `active`, `down`, `parked`. |


    ### Additional Notes

    - **Validation Logic**: The action requires exactly one identifier to be provided.
    You must provide **either** the `Alert_ID` or the `Entity` parameter. Providing
    both or neither will result in a validation error and action failure.

    - This action performs an external state change (PUT request) in the DoppelVision
    API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the integration configuration
    (API Key, User API Key, Organization Code) and the action parameters (`Alert_ID`,
    `Entity`, `Queue_State`, `Entity_State`).

    2. **Input Validation**: It verifies that either `Alert_ID` or `Entity` is provided,
    ensuring they are not both present or both missing.

    3. **API Interaction**: It calls the DoppelVision API's update endpoint using
    a PUT request, passing the selected identifier and the new state values.

    4. **Result Processing**: Upon a successful response, the action stores the updated
    alert details in the JSON results and completes with a success message. If the
    update fails or returns an empty response, the action terminates with a failure
    status.
