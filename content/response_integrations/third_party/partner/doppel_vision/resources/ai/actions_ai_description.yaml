Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Doppel API and validates the configured credentials.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Key, User API Key, Organization
    Code).

    2. Initializes the DoppelManager with the extracted credentials.

    3. Makes a GET request to the `/alerts` endpoint of the Doppel API to verify connectivity.

    4. Returns a successful result if the connection is established and credentials
    are valid, otherwise returns a failure.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to ensure
    that the provided credentials are correct and the API is reachable.
