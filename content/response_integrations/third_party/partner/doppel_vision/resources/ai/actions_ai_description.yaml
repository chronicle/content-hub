    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert_ID | String | No | Unique identity for each specific alert in the Doppel
    tenant. Either this parameter or 'Entity' must be provided. |

    | Entity | String | No | Entity associated with the alert. Either this parameter
    or 'Alert_ID' must be provided. |

    | Queue_State | Dropdown | Yes | Queue state value to apply to the alert. Valid
    values: "doppel_review", "needs_confirmation", "monitoring", "taken_down", "actioned",
    "archived". |

    | Entity_State | Dropdown | Yes | Entity state to apply to the alert. Valid values:
    "active", "down", "parked". |
