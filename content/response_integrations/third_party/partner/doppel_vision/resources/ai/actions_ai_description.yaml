  ai_description: >-
    Retrieves detailed information about a specific alert from the DoppelVision platform.
    The action allows users to fetch alert data using either a specific Alert ID or
    an entity identifier (such as a URL). It is primarily used to gather context about
    existing alerts within the Doppel ecosystem and returns the raw JSON data for
    use in subsequent playbook steps.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Entity | The entity identifier (e.g., a URL) associated with the alert. | String
    | No | Either 'Entity' or 'Alert_ID' must be provided, but not both. |

    | Alert_ID | The unique identifier of the alert in the Doppel tenant. | String
    | No | Either 'Entity' or 'Alert_ID' must be provided, but not both. |


    ### Additional Notes

    - This action does not process entities from the Google SecOps case; it relies
    strictly on the provided input parameters.

    - The action will fail if both parameters are provided or if both are omitted.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API credentials from the
    integration configuration and the 'Entity' or 'Alert_ID' from the action parameters.

    2. **Validation:** It checks that exactly one of the two search parameters ('Entity'
    or 'Alert_ID') is populated.

    3. **API Request:** It calls the DoppelVision API's GET endpoint for alerts using
    the provided identifier.

    4. **Result Processing:** If an alert is found, the full JSON response is added
    to the action's results. If no alert is found or the API returns an error, the
    action fails.
