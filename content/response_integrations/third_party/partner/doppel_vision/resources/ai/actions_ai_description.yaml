Get Alerts:
  ai_description: >-
    ### General Description

    The **Get Alerts** action retrieves a list of alerts from the DoppelVision platform.
    It allows users to query the Doppel tenant for specific security incidents or
    reports based on a wide range of filters such as product category, creation time,
    queue status, and tags. This action is primarily used for searching and auditing
    alerts within the Doppel ecosystem.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Search Key | String | No | Filters alerts by a specific key, currently supporting
    search by URL. |

    | Product | DDL | No | Filters by product category (e.g., domains, social_media,
    mobile_apps, ecommerce, crypto, emails, paid_adds). |

    | Created Before | String | No | Filters alerts created before a specific ISO
    8601 timestamp (e.g., '2024-01-05T13:45:30'). |

    | Created After | String | No | Filters alerts created after a specific ISO 8601
    timestamp (e.g., '2024-01-05T13:45:30'). |

    | Sort Type | DDL | No | Field to sort results by ('date_sourced' or 'date_last_actioned').
    Defaults to 'date_sourced'. |

    | Sort Order | DDL | No | Order of sorting ('asc' or 'desc'). Defaults to 'desc'.
    |

    | Page | String | No | Page number for paginated results; defaults to 0. |

    | Queue State | DDL | No | Filters alerts by their current queue status (e.g.,
    'doppel_review', 'actioned', 'taken_down'). |

    | Tags | String | No | A comma-separated list of tags to filter the alerts. |


    ### Additional Notes

    - This action does not operate on specific entities within the SOAR case; it performs
    a global search against the DoppelVision API.

    - Timestamps for 'Created Before' and 'Created After' should follow the format
    'YYYY-MM-DDTHH:MM:SS'.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves API credentials (API Key, User API
    Key, and Organization Code) from the integration settings.

    2. **Parameter Parsing:** Collects optional filter parameters provided by the
    user, including time ranges, categories, and sorting preferences. It also parses
    the 'Tags' string into a list.

    3. **API Request:** Executes a GET request to the DoppelVision `/alerts` endpoint
    using the constructed filter set via the DoppelManager.

    4. **Result Processing:** If alerts are found, they are returned as a JSON object
    and stored in the action's execution results. If no alerts match the criteria
    or an empty response is received, the action reports a failure.
