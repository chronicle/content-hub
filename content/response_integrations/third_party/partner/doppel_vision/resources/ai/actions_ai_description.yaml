  ai_description: >-
    Fetches a list of alerts from the Doppel tenant based on specified filter criteria.
    This action retrieves alert data from the external system and stores it in the
    action's JSON result for further use in the playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Search Key | String | No | Currently only supports search by URL. |

    | Product | Drop-down | No | Product category the report belongs to (e.g., domains,
    social_media, mobile_apps). |

    | Created Before | String | No | Filter alerts created before this date (e.g.,
    '2024-01-05T13:45:30'). |

    | Created After | String | No | Filter alerts created after this date (e.g., '2024-01-05T13:45:30').
    |

    | Sort Type | Drop-down | No | The field to sort the reports by. Defaults to date_sourced.
    |

    | Sort Order | Drop-down | No | The order to sort the reports by. Defaults to
    desc. |

    | Page | String | No | Page number for pagination; defaults to 0. |

    | Queue State | Drop-down | No | Filter alerts by their queue status (e.g., doppel_review,
    actioned). |

    | Tags | String | No | Comma-separated list of tags to filter alerts. |


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Builds a filter dictionary, removing any empty or unconfigured parameters.

    3. Calls the Doppel API to fetch alerts matching the provided filters.

    4. Returns the retrieved alerts as a JSON object in the action results.
