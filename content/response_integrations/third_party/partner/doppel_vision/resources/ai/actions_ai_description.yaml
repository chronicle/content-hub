Create Alert:
  ai_description: "### General Description\nThe **Create Alert** action allows users\
    \ to programmatically generate a new alert within the DoppelVision platform for\
    \ a specific entity, such as a URL or domain. This action is primarily used to\
    \ escalate or flag specific indicators for monitoring or protection within the\
    \ Doppel ecosystem. It requires a direct input of the entity and returns the full\
    \ API response upon successful creation.\n\n### Parameters Description\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Entity**\
    \ | String | Yes | The specific entity (e.g., a URL) for which the alert will\
    \ be created in DoppelVision. |\n\n### Flow Description\n\n1. **Credential Retrieval:**\
    \ The action extracts the API Key, User API Key, and Organization Code from the\
    \ integration's configuration settings.\n2. **Input Extraction:** The action retrieves\
    \ the target entity string from the action parameters.\n3. **API Interaction:**\
    \ The action uses the `DoppelManager` to send a POST request to the DoppelVision\
    \ `/alert` endpoint with the entity identifier.\n4. **Response Handling:** \n\
    \    * If the alert is created successfully, the action captures the JSON response\
    \ and attaches it to the execution results.\n    * If the creation fails (e.g.,\
    \ due to an invalid entity or a protected resource), the action logs the error\
    \ and marks the execution as failed.\n\n### Additional Notes\n\n* This action\
    \ does not iterate over SecOps entities automatically; it operates strictly on\
    \ the value provided in the **Entity** parameter."
