    1. Extracts the `Entity` and `Alert_ID` parameters provided by the user.

    2. Validates that exactly one of the parameters is provided (mutually exclusive).

    3. Makes an HTTP GET request to the Doppel API (`/v1/alert`) to fetch the alert
    details based on the provided parameter.

    4. If successful, stores the retrieved alert data in the action's JSON result.


    ### Additional Notes

