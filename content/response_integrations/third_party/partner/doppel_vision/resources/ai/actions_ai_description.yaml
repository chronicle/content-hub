  ai_description: >-
    ### General Description

    This action creates an abuse alert for a specified entity in the Doppel system.
    It is used to report potentially malicious or abusive entities (such as URLs or
    domains) to Doppel's abuse box. The action will fail if the provided entity value
    is invalid or protected within Doppel's system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Entity | String | Yes | The entity (e.g., URL or domain) for which to create
    the abuse alert. This value is sent to Doppel to be flagged. |


    ### Flow Description

    1. Extracts the necessary configuration parameters (API Key, User API Key, Organization
    Code) and the mandatory `Entity` action parameter.

    2. Initializes the `DoppelManager` to handle API communication.

    3. Sends a POST request to the Doppel API (`/alert/abuse`) with the provided entity
    to create the abuse alert.

    4. If successful, stores the returned abuse alert details in the action's JSON
    result.

    5. Completes the action and outputs a success or failure message based on the
    API response.


    ### Additional Notes

    There are no additional notes for this action.
