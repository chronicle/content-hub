  ai_description: >-
    ### General Description

    This action fetches alerts from the Doppel Vision platform based on specified
    filtering criteria. It is designed to retrieve a list of alerts for review or
    further processing within Google SecOps. The action interacts with the Doppel
    API's `/alerts` endpoint using a GET request, making it a read-only operation
    relative to the external system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Search Key | string | No | Filters alerts by a specific key, currently supporting
    search by URL. |

    | Product | ddl | No | Filters alerts by product category (e.g., domains, social_media,
    mobile_apps, ecommerce, crypto, emails, paid_adds). |

    | Created Before | string | No | Filters alerts created before a specific timestamp
    (ISO 8601 format, e.g., '2024-01-05T13:45:30'). |

    | Created After | string | No | Filters alerts created after a specific timestamp
    (ISO 8601 format, e.g., '2024-01-05T13:45:30'). |

    | Sort Type | ddl | No | The field to sort the results by. Options include 'date_sourced'
    (default) or 'date_last_actioned'. |

    | Sort Order | ddl | No | The order of sorting. Options are 'asc' or 'desc' (default).
    |

    | Page | string | No | Page number for pagination; defaults to 0. |

    | Queue State | ddl | No | Filters alerts by their current queue status (e.g.,
    doppel_review, actioned, needs_confirmation, taken_down, monitoring, archived).
    |

    | Tags | string | No | A comma-separated list of tags to filter the alerts. |


    ### Additional Notes

    - This action does not require any input entities to run; it fetches data globally
    for the configured tenant.

    - All parameters are optional. If no parameters are provided, the action fetches
    the most recent alerts based on default API behavior.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the API Key, User API Key,
    and Organization Code from the integration settings.

    2. **Parameter Parsing:** It extracts optional filters such as `Search Key`, `Product`,
    `Queue State`, and date ranges from the action input.

    3. **Filter Construction:** A filter dictionary is built, removing any null values
    and splitting the `Tags` string into a list.

    4. **API Interaction:** The `DoppelManager` is initialized and calls the `get_alerts`
    method, which performs a GET request to the Doppel API.

    5. **Result Processing:** The retrieved list of alerts is added to the action's
    JSON results. If no alerts are found, the action fails with an informative message.
