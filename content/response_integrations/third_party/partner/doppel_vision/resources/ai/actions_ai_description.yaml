Get Alert:
  ai_description: >-
    ### General Description

    The **Get Alert** action retrieves detailed information about a specific alert
    from the DoppelVision platform. It allows users to look up alert data using either
    a unique Alert ID or an entity identifier (such as a URL). This action is primarily
    used to gather context and metadata for investigation purposes within the SOAR
    environment.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Entity** | The entity identifier (e.g., a URL) associated with the alert you
    wish to retrieve. | String | No | Either this or `Alert_ID` must be provided.
    |

    | **Alert_ID** | The unique identifier of the alert on the Doppel Tenant. | String
    | No | Either this or `Entity` must be provided. |


    ### Additional Notes

    - **Validation Logic:** The action will fail if both `Entity` and `Alert_ID` are
    provided simultaneously, or if neither is provided. Exactly one of these parameters
    must be configured for the action to execute successfully.

    - **Output:** The retrieved alert details are returned as a JSON object and stored
    in the `JsonResult` field.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the API configuration (API Key,
    User API Key, Org Code) and the action parameters (`Entity`, `Alert_ID`).

    2. **Validation:** It checks that exactly one of the two search parameters is
    present.

    3. **API Interaction:** The `DoppelManager` sends a GET request to the Doppel
    API endpoint (`/alert`) with the specified identifier.

    4. **Result Processing:** If an alert is found, the data is added to the action's
    JSON results.

    5. **Completion:** The action completes with a success message if data is retrieved,
    or fails if the alert is not found or an API error occurs.
