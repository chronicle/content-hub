Create Abuse Alert:
  ai_description: >-
    Creates an abuse alert for a specific entity within the DoppelVision platform.
    This action is used to report suspicious values, such as URLs, to the Doppel abuse
    box for further investigation. It requires a specific entity value as input and
    returns the details of the created alert. Note that the action will fail if the
    provided entity is invalid or belongs to a protected domain list within Doppel's
    system.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the API credentials (API Key, User API
    Key, Org Code) and the target entity from the action parameters.

    2. **Manager Initialization:** Initializes the DoppelManager to handle communication
    with the Doppel API.

    3. **API Request:** Executes a POST request to the `/alert/abuse` endpoint with
    the provided entity.

    4. **Result Processing:** Captures the API response, stores it as JSON results,
    and completes the action with a success or failure status.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity | String | Yes | The specific value (e.g., a URL) to be reported and
    alerted on in the Doppel abuse box. |


    ### Additional Notes:

    * This action does not process entities from the current SecOps context; it relies
    solely on the 'Entity' parameter input.
