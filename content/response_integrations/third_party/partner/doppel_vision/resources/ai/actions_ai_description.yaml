  ai_description: >-
    ### General Description

    Creates an abuse alert for a specified entity within the Doppel system. This action
    is primarily used to report suspicious entities, such as URLs, to the Doppel abuse
    box for investigation. It will fail if the provided entity is invalid or belongs
    to a protected list (e.g., well-known domains like google.com).


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Entity | The specific entity (e.g., a URL) that should be reported to the Doppel
    abuse box. | string | Yes | https://dummyabuseurl.com |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the necessary API credentials
    (API Key, User API Key, Organization Code) from the integration configuration
    and the target entity from the action parameters.

    2. **Manager Initialization**: Initializes the `DoppelManager` with the provided
    credentials to facilitate communication with the Doppel API.

    3. **API Interaction**: Executes a POST request to the `/alert/abuse` endpoint
    of the Doppel API, passing the entity identifier.

    4. **Result Processing**: If the API call is successful, the resulting alert data
    is stored in the action's JSON results. If the call fails or the entity is protected/invalid,
    an exception is raised and the action is marked as failed.

    5. **Completion**: Logs the execution status and returns the final output message
    to the Google SecOps platform.
