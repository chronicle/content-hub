Update Alert:
  ai_description: "Updates an alert's status and entity state within the DoppelVision\
    \ platform. This action allows analysts to transition alerts through different\
    \ queue states and update the operational status of the associated entity. The\
    \ target alert is identified using either a unique Alert ID or the Entity URL.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Alert_ID | String | No | Unique identity for each specific\
    \ alert in the Doppel tenant. |\n| Entity | String | No | The URL or identifier\
    \ of the entity associated with the alert. |\n| Queue_State | DDL | Yes | The\
    \ target queue state for the alert. Options include: \"doppel_review\", \"needs_confirmation\"\
    , \"monitoring\", \"taken_down\", \"actioned\", \"archived\". |\n| Entity_State\
    \ | DDL | Yes | The target state for the entity. Options include: \"active\",\
    \ \"down\", \"parked\". |\n\n### Additional Notes\n* Either the **Alert_ID** or\
    \ the **Entity** parameter must be provided for the action to run. \n* If both\
    \ **Alert_ID** and **Entity** are provided simultaneously, the action will fail\
    \ with a validation error.\n\n### Flow Description\n1. **Extract Parameters:**\
    \ The action retrieves the API configuration (API Key, User API Key, Org Code)\
    \ and the action-specific parameters (Alert_ID, Entity, Queue_State, Entity_State).\n\
    2. **Validation:** It checks that exactly one identifier (either Alert_ID or Entity)\
    \ is provided.\n3. **API Interaction:** It calls the DoppelManager's `update_alert`\
    \ method, which sends a PUT request to the DoppelVision API with the specified\
    \ states.\n4. **Result Processing:** If the update is successful, the updated\
    \ alert details are added to the action's JSON results. If the API returns an\
    \ error or an empty response, the action fails."
