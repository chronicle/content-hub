  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the DoppelVision platform. It validates the provided configuration parameters,
    such as the API Key, User API Key, and Organization Code, by attempting a basic
    API request to the Doppel service to ensure the integration is correctly configured.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration settings (API Key, User API Key, and Organization Code).


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Key, User API Key,
    and Organization Code from the integration's shared configuration.

    2. **Manager Initialization**: An instance of the DoppelManager is created using
    the extracted credentials.

    3. **Connectivity Test**: The action executes a connection test by performing
    a GET request to the Doppel `/alerts` endpoint.

    4. **Result Reporting**: If the API responds with a success status, the action
    ends with a 'Connection successful' message. If the request fails or the credentials
    are invalid, it returns a failure message.


    ### Additional Notes

    This action is strictly for connectivity testing and does not interact with entities
    or modify any data within Google SecOps or DoppelVision.
