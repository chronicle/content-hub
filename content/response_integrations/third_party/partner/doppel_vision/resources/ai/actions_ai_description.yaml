Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the DoppelVision\
    \ platform. Its primary purpose is to validate that the provided integration credentials\
    \ (API Key, User API Key, and Organization Code) are correct and that the DoppelVision\
    \ API endpoint is reachable.\n\n### Parameters Description\nThis action does not\
    \ require any input parameters. It relies entirely on the configuration parameters\
    \ defined at the integration level.\n\n### Flow Description\n1. **Configuration\
    \ Extraction:** The action retrieves the `API Key`, `User API Key`, and `Organization\
    \ Code` from the DoppelVision integration settings.\n2. **Manager Initialization:**\
    \ It initializes the `DoppelManager` using the extracted credentials.\n3. **Connectivity\
    \ Test:** The action calls the `connection_test` method, which performs a `GET`\
    \ request to the `/alerts` endpoint of the DoppelVision API.\n4. **Result Reporting:**\
    \ \n    * If the API responds successfully (HTTP 200), the action ends with a\
    \ success message.\n    * If the request fails or returns an error (e.g., 401\
    \ Unauthorized), the action reports a connection failure.\n\n### Additional Notes\n\
    This action is intended for use during the initial setup or troubleshooting of\
    \ the DoppelVision integration to ensure the communication channel is functional."
