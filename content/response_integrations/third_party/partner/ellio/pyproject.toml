[project]
name = "ELLIO"
version = "1.0"
description = "Enrich IPs with ELLIO threat intelligence, recommend a case priority by classification, push malicious IPs to ELLIO Blocklist Automation, and classify IPs against ELLIO Common Business Services (cloud/CDN/SaaS). Contact: secops@ellio.tech"
requires-python = ">=3.11,<3.12"
dependencies = [
    "requests>=2.32.4",
    "tipcommon",
    "environmentcommon",
]

[dependency-groups]
dev = [
    "integration-testing",
    "pytest-json-report>=1.5.0",
    "pytest>=8.3.5",
    "soar-sdk",
]

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.4.1-py3-none-any.whl" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.4.1-py3-none-any.whl" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true
