Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities with ELLIO threat-intelligence context. This action
    retrieves classification, detection tags, exploited CVEs, fingerprints, ports,
    rDNS, country, and first/last seen data from the ELLIO CTI API. It updates the
    entity's suspicious status based on the verdict, appends the data to the entity's
    additional properties, and generates an insight card with the analysis results.


    ### Flow Description

    1. Extracts target IP addresses from the case's IP Address entities and the optional
    `IP Addresses` parameter, filtering out private, reserved, and internal addresses.

    2. Makes a GET request to the ELLIO CTI API (`/v1/cti/extended_lookup/{ip}`) for
    each valid IP address to retrieve threat intelligence context.

    3. Evaluates the classification verdict; if malicious or promiscuous, marks the
    entity as suspicious.

    4. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Generates an ELLIO threat-intelligence insight card for the entity if the `Create
    Insight` parameter is enabled.

    6. Returns a JSON result containing the enrichment data and a recommended case
    priority.


    ### Additional Notes

    The action only recommends a case priority (e.g., High for malicious IPs) via
    the script result `recommended_priority` and does not change the case priority
    itself.
