Ping:
  ai_description: >-
    ### General Description

    Validates connectivity to the ELLIO API.


    ### Flow Description

    1. Initializes the ELLIO manager using the integration-level configuration (API
    Root, API Key, and Verify SSL).

    2. Executes a GET request to the ELLIO API (`/v1/cti/lookup/192.0.2.1`) to verify
    authentication and network connectivity.

    3. Outputs a success message if the API responds correctly, otherwise fails the
    action with an error message.


    ### Additional Notes

    This action does not require any action-specific parameters and is typically used
    during integration setup to ensure the provided credentials and network settings
    are valid.
