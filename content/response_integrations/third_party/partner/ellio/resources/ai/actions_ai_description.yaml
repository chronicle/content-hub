    Inbound Connection \| ellio=malicious". |

    | Expires In Days | String | No | Number of days after which the blocklist rule
    expires. Set to 0 for a permanent rule. |

    | Conflict Resolution | String | No | How to resolve a conflict with an existing
    rule for the same IP/CIDR. extend = extend the existing rule; override = replace
    it; skip = leave it; fail = error. |
CBS Lookup:
  ai_description: >-
    ### General Description

    Enriches IP Address entities by classifying them against ELLIO Common Business
    Services (CBS) to identify cloud, CDN, SaaS, ISP, security, or crawler providers.
    This helps analysts separate legitimate provider infrastructure from attacker-controlled
    hosts to reduce false positives. Matched IPs are enriched with provider details,
    service types, regions, and CIDR blocks.


    ### Flow Description

    1. Collects target IP addresses from the action parameters and the case's IP Address
    entities, explicitly filtering out internal, private, reserved, and loopback addresses.

    2. Makes a GET request to the ELLIO API (`/v1/cbs/lookup`) for each valid public
    IP to retrieve CBS classification data.

    3. If a match is found, enriches the entity's additional properties with the provider,
    type, service, region, CBS IDs, and matched CIDR.

    4. Marks the entity as enriched and, if configured, creates an insight card displaying
    the CBS hierarchy and alert flow context.

    5. Updates the entities within the SecOps platform and returns the JSON results.


    ### Additional Notes

    Only public (external) IPs are checked by this action. Private, reserved, loopback,
    and SOAR-internal addresses are automatically skipped.
  ai_short_description: >-
    Enriches IP Address entities by querying the ELLIO API to determine if they belong
    to known Common Business Services (such as cloud providers, CDNs, or SaaS), adding
    contextual properties and insight cards to matched entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the ELLIO API to fetch CBS data for IP addresses
      (fetches_data=true). It does not mutate external data. It updates internal entities
      with the fetched data (can_update_entities=true) and creates insight cards (can_create_insight=true).
