Add IP to Blocklist:
  ai_description: >-
    ### General Description

    Adds IP addresses to the ELLIO Blocklist Automation ruleset. This action pushes
    confirmed-malicious IPs to enforcement points to block traffic. It processes both
    IP Address entities from the case and manually provided IPs, ensuring that only
    public, globally-routable IPs are pushed while skipping private or internal addresses.


    ### Flow Description

    1. Extracts configuration and action parameters, including the target IPs and
    rule settings.

    2. Collects target IPs from the action parameters and the case's IP Address entities,
    explicitly filtering out internal or non-public IPs.

    3. Iterates over the collected IPs and makes a POST request to the ELLIO API (`/v1/edl/ip-rulesets/{ruleset_id}/rules`)
    to add each IP to the blocklist.

    4. Returns a JSON result containing the status of each IP (added, failed, or skipped)
    and completes the action execution.


    ### Additional Notes

    Requires a read-write ELLIO API key and a configured Blocklist Ruleset ID. Private,
    reserved, loopback, and link-local addresses are automatically skipped to prevent
    self-inflicted outages.
  ai_short_description: >-
    Pushes IP addresses to the ELLIO Blocklist Automation ruleset to block traffic
    at enforcement points.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified IP addresses to the ELLIO Blocklist Automation ruleset.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the ELLIO API to add IP addresses to a
      blocklist ruleset, which mutates external data. It does not fetch enrichment
      data, update internal entities, or create insights.
