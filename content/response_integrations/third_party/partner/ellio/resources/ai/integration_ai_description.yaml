product_categories:
    reasoning: >-
        ELLIO is an IP threat-intelligence provider. The integration enriches IP
        entities with ELLIO's verdict (malicious / promiscuous / unknown / benign),
        detection tags, exploited CVEs and network fingerprints (threat intelligence);
        pushes malicious IPs to an ELLIO Blocklist Automation (EDL) ruleset used as a
        network block control (network security); and classifies IPs against ELLIO
        Common Business Services (known cloud / CDN / SaaS ranges).
    siem: false
    edr: false
    network_security: true
    threat_intelligence: true
    email_security: false
    iam_and_identity_management: false
    cloud_security: false
    itsm: false
    vulnerability_management: false
    asset_inventory: false
    collaboration: false
