creator: ELLIO
name: Add IP to Blocklist
integration_identifier: ELLIO
description: >
  Pushes IP addresses to ELLIO Blocklist Automation so they are distributed to your
  enforcement points and blocked - the response action for confirmed-malicious IPs.
  Input: the case's IP Address entities plus optional comma-separated IPs, with an
  optional rule name, conflict-resolution mode and expiry. Only public, globally-routable
  IPs are pushed; private, reserved, loopback and link-local addresses are skipped and
  reported. Output: reports which IPs were added, which failed (with the reason) and
  which were skipped. Requires a read-write ELLIO API key and the Blocklist Ruleset ID.
  Supported entities: IP Address.
default_result_value: ''
dynamic_results_metadata:
- result_example_path: resources/AddIpToBlocklist_JsonResult_example.json
  result_name: JsonResult
  show_result: true
parameters:
- name: IP Addresses
  default_value: ''
  type: string
  description: 'Comma-separated IPs to add to the blocklist in addition to IP Address entities. Example: 27.43.204.10'
  is_mandatory: false
- name: Rule Name
  default_value: ''
  type: string
  description: 'Optional override for the rule name. If empty, the rule is auto-named as parsable key=value pairs, e.g. "secops_case=4711 | alert=Suspicious Inbound Connection | ellio=malicious".'
  is_mandatory: false
- name: Expires In Days
  default_value: '14'
  type: string
  description: Number of days after which the blocklist rule expires. Set to 0 for a permanent rule.
  is_mandatory: false
- name: Conflict Resolution
  default_value: extend
  type: ddl
  optional_values:
  - extend
  - override
  - skip
  - fail
  description: How to resolve a conflict with an existing rule for the same IP/CIDR. extend = extend the existing rule; override = replace it; skip = leave it; fail = error.
  is_mandatory: false
script_result_name: is_success
