creator: ELLIO
name: CBS Lookup
integration_identifier: ELLIO
description: >
  Tells you whether an IP Address is part of a known Common Business Service - a
  cloud, CDN, SaaS, ISP, security or crawler provider (for example AWS, Azure, a CDN,
  or a scanner such as Censys). Use it in triage to separate legitimate provider
  infrastructure from attacker-controlled hosts and cut false positives. Input: the
  IP Address entities on the case plus optional comma-separated IPs; only public
  (external) IPs are checked - private, reserved, loopback and SOAR-internal
  addresses are always skipped. Output: each matched IP is enriched with its
  provider, type, service, region, CBS ids and matched CIDR, and gets an insight card
  (provider(s), matched CIDR, label tree); the action result reports whether any IP
  matched. Supported entities: IP Address.
default_result_value: ''
dynamic_results_metadata:
- result_example_path: resources/CbsLookup_JsonResult_example.json
  result_name: JsonResult
  show_result: true
parameters:
- name: IP Addresses
  default_value: ''
  type: string
  description: 'Comma-separated IPs to look up in addition to IP Address entities. Example: 13.107.42.14, 66.132.172.141'
  is_mandatory: false
- name: Create Insight
  default_value: true
  type: boolean
  description: If enabled, add a Common Business Services insight card to the entity for each match.
  is_mandatory: false
script_result_name: is_success
