creator: ELLIO
default_result_value: 'None'
description: >
  Adds ELLIO threat-intelligence context to IP Address entities so analysts can tell
  malicious, scanner and benign IPs apart on the case and prioritise accordingly.
  Input: the case's IP Address entities plus optional comma-separated IPs; only public
  (external) IPs are looked up - private, reserved and internal addresses are skipped.
  Output: each IP is enriched with its classification, detection tags,
  exploited CVEs, MuonFP/JA3/JA4 fingerprints, ports, rDNS, country and first/last
  seen, gets an insight card, and malicious/promiscuous IPs are marked suspicious; the
  action returns a recommended case priority of High for a malicious IP (for a playbook
  to apply) and never changes the case priority itself. Supported entities: IP Address.
dynamic_results_metadata:
-   result_example_path: resources/EnrichIp_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: ELLIO
name: Enrich IP
parameters:
-   default_value: ''
    description: 'Optional comma-separated IPs to enrich in addition to IP Address entities. Example: 27.43.204.10, 66.132.172.141'
    is_mandatory: false
    name: IP Addresses
    type: string
-   default_value: true
    description: If enabled (default), add an ELLIO threat-intelligence insight card to the case for each enriched IP.
    is_mandatory: false
    name: Create Insight
    type: boolean
script_result_name: recommended_priority
