identifier: ELLIO
name: ELLIO
parameters:
- name: API Root
  default_value: https://api.ellio.tech
  type: string
  description: ELLIO API root URL (CTI lookup and Blocklist Automation).
  is_mandatory: true
  integration_identifier: ELLIO
- name: API Key
  type: password
  description: Single ELLIO API key, used for all ELLIO features - CTI lookup, Blocklist Automation, and CBS classification.
  is_mandatory: true
  integration_identifier: ELLIO
- name: Blocklist Ruleset ID
  type: string
  description: ELLIO Blocklist Automation (EDL) ruleset ID used by Add IP to Blocklist.
  is_mandatory: false
  integration_identifier: ELLIO
- name: Verify SSL
  default_value: true
  type: boolean
  description: If enabled, verify the SSL certificate of the ELLIO API server.
  is_mandatory: false
  integration_identifier: ELLIO
categories:
- Security
- Threat Intelligence
svg_logo_path: resources/logo.svg
image_path: resources/image.png
documentation_link: https://docs.ellio.tech/threat-intel/integrations/google-secops/soar
