  ai_description: >-
    ### General Description

    Checks the reputation of IP address entities using AbuseIPDB. This action retrieves
    threat intelligence including abuse confidence score, country code, domain, and
    usage type. It evaluates risk based on thresholds, updates the entity's suspicious
    status, and generates an insight with the analysis results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Exclude Internal Addresses | boolean | False | If true, excludes any address
    entities that you've marked as internal, saving your API allowance on wasted IP
    checks against your own infrastructure. |

    | Suspicious Threshold | string | True | An abuse confidence score equal to, or
    above this threshold will mark the entity as suspicious. Set to 0 to disable.
    |

    | Create Insight | boolean | False | Create an insight for each IP. |

    | Max Age in Days | string | True | Max report age to check. |


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Filters target entities to include only ADDRESS entities, optionally excluding
    internal ones based on the `Exclude Internal Addresses` parameter.

    3. Iterates over the filtered entities and queries AbuseIPDB for each IP.

    4. Enriches the entity with additional properties from the AbuseIPDB report.

    5. Marks the entity as suspicious if the abuse confidence score meets or exceeds
    the `Suspicious Threshold`.

    6. Optionally creates an insight for the entity if `Create Insight` is true.

    7. Updates the entities in Google SecOps and adds the JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
