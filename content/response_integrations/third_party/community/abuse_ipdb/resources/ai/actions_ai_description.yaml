  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the AbuseIPDB API. It ensures that the provided
    API key is valid and that the network configuration allows for successful communication
    with the external service.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used to authenticate requests to AbuseIPDB.
    This is retrieved from the integration configuration. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the AbuseIPDB API. Defaults to `False`. |


    ### Additional Notes

    * This action does not process any entities from the case. It uses a hardcoded
    dummy IP address (`1.1.1.1`) to perform a test lookup.

    * If the API key is invalid, the action will return a failed status with a specific
    error message regarding forbidden access.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the integration configuration parameters (API Key and SSL verification setting).

    2. **Manager Setup**: An instance of the `AbuseIPDBManager` is created using the
    provided credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the AbuseIPDB 'check' endpoint for the IP `1.1.1.1`.

    4. **Validation**: The response is validated for HTTP errors and specific status
    codes (e.g., 403 for invalid keys).

    5. **Completion**: If the request is successful, the action returns a "Connection
    Established" message. If an error occurs, it logs the exception and returns a
    failure status.
