Check IP Reputation:
  ai_description: >-
    ### General Description

    Checks the reputation of IP address entities using AbuseIPDB. It retrieves threat
    intelligence data such as abuse confidence score, country code, ISP, and usage
    type to evaluate the risk of the IP address.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Filters target entities to include only IP addresses (and optionally excludes
    internal addresses).

    3. Iterates through the filtered entities and makes a GET request to the AbuseIPDB
    API (`/api/v2/check`) for each IP address.

    4. Evaluates the returned abuse confidence score against the configured suspicious
    threshold, marking the entity as suspicious if the threshold is met or exceeded.

    5. Enriches the entity's additional properties with the retrieved data.

    6. Optionally creates an insight for the entity containing the reputation details.

    7. Updates the entities in the Google SecOps platform and attaches the JSON results.


    ### Additional Notes

    The action can be configured to skip internal IP addresses to save API quota.
  ai_short_description: >-
    Checks the reputation of IP address entities using AbuseIPDB to retrieve threat
    intelligence, update entity properties, and optionally create insights based on
    abuse confidence scores.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the AbuseIPDB API to fetch IP reputation data.
      It does not mutate external data but updates internal entities and creates insights
      based on the retrieved data.
