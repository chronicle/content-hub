      and creates case insights.
    reasoning: >-
      The action fetches data from an external API (AbuseIPDB) to enrich IP entities.
      It does not mutate external data (only performs GET requests). It mutates internal
      data by updating entity properties (is_enriched, is_suspicious, additional_properties)
      and creating insights. It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action is designed to fetch reputation data for IP addresses and update
      the entity profile within the SOAR platform. It does not mutate external systems,
      and the internal mutations (updating entities, creating insights) are permitted
      under the enrichment criteria.
  entity_usage:
