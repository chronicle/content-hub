    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Exclude Internal Addresses | Boolean | No | If true, excludes any address entities
    that you've marked as internal, saving your API allowance on wasted IP checks
    against your own infrastructure. |

    | Suspicious Threshold | String | Yes | An abuse confidence score equal to, or
    above this threshold will mark the entity as supicious. Set to 0 to disable. |

    | Create Insight | Boolean | No | Create an insight for each IP |

    | Max Age in Days | String | Yes | Max report age to check |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AbuseIPDB service to verify that the integration is
    configured correctly.


    ### Flow Description

    1. Extracts the API key and SSL verification settings from the integration configuration.

    2. Initializes the AbuseIPDB manager.

    3. Executes a test API call (GET request to the `/api/v2/check` endpoint) using
    a dummy IP address (1.1.1.1) to verify authentication and reachability.

    4. Evaluates the response and returns a success status if the connection is established,
    or an error if the API key is invalid or the service is unreachable.


    ### Additional Notes

    This action does not process any case entities or modify any data. It is strictly
    used for health checks and configuration validation.
  ai_short_description: >-
    Tests connectivity to the AbuseIPDB service to ensure the integration is configured
    correctly with a valid API key.
