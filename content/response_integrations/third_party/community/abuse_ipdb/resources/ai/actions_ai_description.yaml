    reasoning: >-
      The action fetches reputation data (abuse confidence score, ISP, domain, etc.)
      for IP addresses from AbuseIPDB. This directly aligns with the 'Enrich IOC'
      expected outcome. It does not mutate external state, so it is not a blocklist
      or containment action.
