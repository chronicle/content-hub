  ai_description: "### General Description\nEnriches IP Address entities by retrieving\
    \ reputation data from AbuseIPDB. This action checks if an IP address has been\
    \ reported for malicious activity, providing details such as the abuse confidence\
    \ score, country, ISP, and domain. It helps analysts quickly identify potentially\
    \ harmful network actors and automatically flags suspicious entities based on\
    \ configurable thresholds.\n\n### Parameters Description\n| Parameter Name | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Exclude Internal\
    \ Addresses | boolean | No | If set to `true`, the action will skip any IP entities\
    \ marked as internal in the environment, preserving API quota. |\n| Suspicious\
    \ Threshold | string | Yes | An integer value (0-100). If the Abuse Confidence\
    \ Score returned by AbuseIPDB is equal to or higher than this value, the entity\
    \ is marked as suspicious in Google SecOps. Set to 0 to disable this behavior.\
    \ |\n| Create Insight | boolean | No | If set to `true`, a detailed HTML insight\
    \ will be created for each processed IP entity, summarizing the reputation report.\
    \ |\n| Max Age in Days | string | Yes | Defines the time window (in days) for\
    \ which AbuseIPDB should search for reports. Only reports within this age limit\
    \ contribute to the score. |\n\n### Additional Notes\n- The action specifically\
    \ targets entities of type `ADDRESS`.\n- If an IP is not found in the AbuseIPDB\
    \ database, it will be noted in the action output but will not result in a failure.\n\
    \n### Flow Description\n1. **Initialization**: Extracts the API key and configuration\
    \ settings, then validates the `Max Age in Days` parameter.\n2. **Entity Filtering**:\
    \ Identifies all `ADDRESS` entities in the current scope. If `Exclude Internal\
    \ Addresses` is enabled, it filters out entities where `is_internal` is true.\n\
    3. **API Request**: For each valid entity, it performs a GET request to the AbuseIPDB\
    \ `/check` endpoint using the entity's identifier and the specified `Max Age`.\n\
    4. **Data Mapping**: \n    - Appends the raw report data to the entity's additional\
    \ properties with the prefix `AbuseIPDB_`.\n    - Compares the `abuseConfidenceScore`\
    \ against the `Suspicious Threshold` to potentially update the entity's suspicious\
    \ status.\n5. **Insight Generation**: If enabled, constructs an HTML summary of\
    \ the IP's reputation (score, ISP, domain, etc.) and attaches it as an entity\
    \ insight.\n6. **Finalization**: Updates the entities in the Google SecOps platform\
    \ and returns a summary of successful, failed, or missing IPs."
