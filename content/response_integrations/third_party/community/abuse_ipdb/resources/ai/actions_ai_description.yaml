    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and suspicious status, and creates insights.
    reasoning: >-
      The action fetches data from AbuseIPDB using a GET request, so fetches_data
      is true. It does not mutate any external data, so can_mutate_external_data is
      false. It mutates internal data by updating entities with enrichment data and
      creating insights, so can_mutate_internal_data, can_update_entities, and can_create_insight
      are true. It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (AbuseIPDB), does not mutate
      external data, and only mutates internal data by updating entities and creating
      insights. This perfectly matches the criteria for an Enrichment action. It does
      not perform any remediation tasks.
    remediation: false
  entity_usage:
