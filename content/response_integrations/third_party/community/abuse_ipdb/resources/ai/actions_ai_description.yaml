Check IP Reputation:
  ai_description: >-
    Enriches IP Address entities by retrieving reputation data from AbuseIPDB. This
    action checks if an IP address has been reported for malicious activity, providing
    details such as the abuse confidence score, ISP, domain, and country. It allows
    for filtering out internal addresses to conserve API quota and can automatically
    mark entities as suspicious based on a configurable threshold.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Exclude Internal Addresses | boolean | No | If set to true, the action will
    skip any address entities marked as internal in Google SecOps. Default is true.
    |

    | Suspicious Threshold | string | Yes | An abuse confidence score (0-100) equal
    to or above this value will mark the entity as suspicious. Set to 0 to disable
    this logic. |

    | Create Insight | boolean | No | If true, creates a detailed insight on the entity's
    case wall containing the reputation report summary. Default is true. |

    | Max Age in Days | string | Yes | Specifies the timeframe (in days) for the reputation
    report (e.g., check reports from the last 90 days). |


    ### Additional Notes

    - The action specifically targets `ADDRESS` entities.

    - Data retrieved from AbuseIPDB is mapped to the entity's additional properties
    with the prefix `AbuseIPDB_`.


    ### Flow Description

    1. **Filter Entities:** Identifies all `ADDRESS` entities in the current scope.
    If `Exclude Internal Addresses` is enabled, it filters out entities where `is_internal`
    is true.

    2. **API Request:** For each valid IP, it queries the AbuseIPDB API using the
    provided API key and the `Max Age in Days` parameter.

    3. **Data Mapping:** Parses the API response and populates the entity's additional
    properties (e.g., `AbuseIPDB_isp`, `AbuseIPDB_abuseConfidenceScore`).

    4. **Suspicious Evaluation:** Compares the retrieved `abuseConfidenceScore` against
    the `Suspicious Threshold`. If the score meets or exceeds the threshold, the entity
    is marked as suspicious.

    5. **Insight Creation:** If `Create Insight` is enabled, a formatted HTML insight
    is added to the entity in the SecOps case.

    6. **Update Entities:** Updates the entities in the Google SecOps platform with
    the new enrichment data and status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
