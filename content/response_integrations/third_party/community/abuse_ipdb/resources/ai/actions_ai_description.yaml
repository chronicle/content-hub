    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      == EntityTypes.ADDRESS`. If the `Exclude Internal Addresses` parameter is true,
      it also filters by `not entity.is_internal`. Therefore, it targets ADDRESS entities
      and filters by entity_type and is_internal.
