  ai_description: >-
    ### General Description

    This action enriches IP Address entities by querying the AbuseIPDB service to
    retrieve reputation data, such as confidence scores, ISP information, and report
    history. It helps analysts quickly identify potentially malicious IP addresses
    within their environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Exclude Internal Addresses | Boolean | No | If true, skips internal IP addresses
    to save API quota. |

    | Suspicious Threshold | String | Yes | The confidence score threshold (0-100)
    above which an IP is marked as suspicious. Set to 0 to disable. |

    | Create Insight | Boolean | No | If true, generates a case insight with the retrieved
    IP reputation details. |

    | Max Age in Days | String | Yes | The maximum age of reports to consider when
    checking the IP reputation. |


    ### Flow Description

    1. **Initialization**: The action initializes the AbuseIPDB manager using the
    provided API key.

    2. **Filtering**: It filters the target entities to include only ADDRESS types.
    If the 'Exclude Internal Addresses' parameter is set to true, it further filters
    out entities marked as internal.

    3. **Enrichment**: For each valid IP entity, the action queries the AbuseIPDB
    API for reputation data.

    4. **Data Processing**: If data is retrieved, it updates the entity's additional
    properties with the AbuseIPDB report details.

    5. **Risk Assessment**: If the abuse confidence score meets or exceeds the configured
    'Suspicious Threshold', the entity is marked as suspicious.

    6. **Insight Creation**: If 'Create Insight' is enabled, the action generates
    a case insight containing the reputation summary.

    7. **Update**: Finally, the action updates the entities in the SOAR platform with
    the new enrichment data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
