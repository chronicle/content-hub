Ping:
  ai_description: >-
    ### General Description

    The Ping action is a utility designed to verify the connectivity between Google
    SecOps and the AbuseIPDB API. It ensures that the provided API key is valid and
    that the network path to the service is open. This is typically used during the
    initial setup or troubleshooting of the integration.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies solely on
    the integration's global configuration parameters:


    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used to authenticate requests to AbuseIPDB.
    |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the AbuseIPDB API endpoint. Defaults to False. |


    ### Additional Notes

    *   The action performs a test lookup for a dummy IP address (1.1.1.1) to validate
    the API response.

    *   If the API key is invalid, the action will return a failure state with a specific
    error message regarding forbidden access.


    ### Flow Description

    1.  **Initialization**: The action retrieves the global configuration (API Key
    and SSL verification settings).

    2.  **Connectivity Test**: The action calls the AbuseIPDB manager to perform a
    `test_connectivity` operation.

    3.  **API Request**: The manager executes a GET request to the AbuseIPDB 'check'
    endpoint using a hardcoded dummy IP (1.1.1.1).

    4.  **Validation**: The response is checked for HTTP errors (e.g., 403 Forbidden
    for invalid keys or 204 for rate limits).

    5.  **Outcome**: If the request is successful, the action returns 'true'. If an
    exception occurs or the key is invalid, it returns 'false' and logs the error.
