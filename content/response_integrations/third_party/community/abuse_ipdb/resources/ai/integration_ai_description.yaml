  network_security: false
  reasoning: >-
    The abuse_ipdb integration is designed to query the AbuseIPDB service to retrieve
    reputation data for IP addresses. Its primary action, 'Check IP Reputation', performs
    enrichment on IP entities by fetching risk scores and report history, which directly
    aligns with the 'Threat Intelligence' category definition of using external indicators
    to determine reputation. The integration does not perform SIEM log analysis, EDR
    host containment, network security gateway blocking, email security, IAM management,
    cloud security operations, ITSM ticketing, vulnerability management, asset inventory
    tracking, or collaboration/notification tasks.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
