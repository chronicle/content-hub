product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The abuse_ipdb integration is designed to query the AbuseIPDB API to retrieve
    reputation data for IP addresses. The primary action, 'Check IP Reputation', directly
    aligns with the Threat Intelligence category, as it provides risk scores and historical
    report data to help analysts confirm if an indicator is malicious. It does not
    perform log analysis (SIEM), host-level interaction (EDR), network gateway enforcement
    (Network Security), or any other functions related to the remaining categories.
    Therefore, it is classified solely as Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
