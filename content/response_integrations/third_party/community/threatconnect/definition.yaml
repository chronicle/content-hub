identifier: ThreatConnect
name: Threat Connect
parameters:
    -   name: API Root
        default_value: https://partners.threatconnect.com/api
        type: string
        description: The base URL of the ThreatConnect API instance.
        is_mandatory: true
        integration_identifier: ThreatConnect
    -   name: API Access ID
        type: string
        description: The Unique Access ID generated from the ThreatConnect platform.
        is_mandatory: true
        integration_identifier: ThreatConnect
    -   name: API Secret Key
        type: password
        description: The Secret Key associated with the Access ID.
        is_mandatory: true
        integration_identifier: ThreatConnect
    -   name: Verify SSL
        default_value: true
        type: boolean
        description: If selected, the integration validates the SSL certificate when connecting to the server. Selected by default.
        is_mandatory: false
        integration_identifier: ThreatConnect
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/threatconnect
categories:
    - Threat Intelligence
    - Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
