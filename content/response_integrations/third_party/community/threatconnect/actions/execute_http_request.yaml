creator: admin
description: Use the Execute HTTP Request action to construct and execute a customized HTTP API request against a target URL.
dynamic_results_metadata:
  - result_example_path: resources/execute_http_request_JsonResult_example.json
    result_name: JsonResult
    show_result: true
integration_identifier: ThreatConnect
is_async: true
name: Execute HTTP Request
script_result_name: is_success

parameters:
  - name: Method
    type: ddl
    is_mandatory: true
    default_value: GET
    optional_values:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - HEAD
      - OPTIONS
    description: The HTTP method (verb) used for the request.
  - name: URL Path
    type: string
    is_mandatory: true
    default_value: "https://"
    description: The API endpoint where the request executes.
  - name: URL Params
    type: string
    is_mandatory: false
    description: Query parameters for the URL, provided as a JSON object.
  - name: Headers
    type: string
    is_mandatory: false
    description: Headers for the HTTP request, specified as a JSON object.
  - name: Cookie
    type: string
    is_mandatory: false
    description: Cookies constructed into the HTTP Cookie header, specified as a JSON object.
  - name: Body Payload
    type: string
    is_mandatory: false
    description: The content payload for the HTTP request.
  - name: Expected Response Values
    type: string
    is_mandatory: false
    description: JSON object defining the required successful state. Triggers async mode.
  - name: Follow Redirects
    type: boolean
    is_mandatory: false
    default_value: true
    description: If selected, automatically follows HTTP redirect responses.
  - name: Fail on HTTP Error
    type: boolean
    is_mandatory: false
    default_value: true
    description: If selected, explicitly fails the step on 4xx or 5xx status codes.
  - name: Base64 Output
    type: boolean
    is_mandatory: false
    default_value: false
    description: If selected, converts the entire HTTP response body to a Base64 encoded string.
  - name: Fields To Return
    type: string
    is_mandatory: true
    default_value: response_data, redirects, response_code, response_cookies, response_headers, apparent_encoding
    description: Comma-separated list of fields to return in the output.
  - name: Request Timeout
    type: string
    is_mandatory: true
    default_value: "120"
    description: The maximum time, in seconds, the action waits for the server to send data.
  - name: Save To Case Wall
    type: boolean
    is_mandatory: false
    default_value: false
    description: If selected, saves the file and attaches it to the case wall as a ZIP.
  - name: Password Protect Zip
    type: boolean
    is_mandatory: false
    default_value: true
    description: If enabled, action will add an "infected" password to the zip created with "Save To Case Wall" parameter. Use this, when you are dealing with suspicious files.
