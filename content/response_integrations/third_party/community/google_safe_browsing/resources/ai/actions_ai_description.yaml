  ai_description: >-
    ### General Description

    Tests connectivity to the Google Safe Browsing service to ensure the integration
    is configured correctly.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Initializes the Safe Browsing manager.

    3. Performs a lookup on a hardcoded test URL (`http://malware.testing.google.test/testing/malware/`)
    to verify connectivity.

    4. Returns a success message if the connection is established and the lookup succeeds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
