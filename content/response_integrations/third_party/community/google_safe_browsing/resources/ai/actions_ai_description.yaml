    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action tests connectivity to the Google Safe Browsing service. It verifies
    that the integration is correctly configured and can communicate with the external
    API by performing a test URL lookup.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used to authenticate with the Google Safe
    Browsing service. |


    ### Flow Description

    1. Extract the Api Key from the integration configuration.

    2. Initialize the SafeBrowsing client using the provided key.

    3. Execute a test URL lookup against a known test URL.

    4. Return a success message if the connection is established.
  capabilities:
