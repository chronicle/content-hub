    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves threat intelligence (malicious status) for a specific URL
      (an indicator), which matches the 'Enrich IOC' expected outcome. It does not
      perform any other product-specific actions such as updating alerts, containing
      hosts, or modifying blocklists.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Checks if a specific URL is safe for browsing using the Google Safe Browsing integration.
    This action retrieves threat intelligence to determine if the provided URL is
    classified as malicious.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --------- | ---- | --------- | ----------- |

    | Url | String | Yes | The URL you would like to check in Google Safe Browsing.
    |


    ### Flow Description

    1. Extracts the API key from the integration configuration and the target URL
    from the action parameters.

    2. Queries the Google Safe Browsing API to look up the specified URL.

    3. Parses the response to determine the malicious status of the URL.

    4. Attaches the raw response as a JSON result and completes the action, outputting
    whether the URL was found to be malicious.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Google Safe Browsing using the `lookup_urls` method.
      It does not perform any POST/PUT/DELETE requests to mutate external data. Internally,
      it only adds a JSON result to the action output and does not update entities,
      create insights, modify alerts, or add case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action proactively fetches data (URL reputation) from an external source
      without mutating any external or internal state. This strictly aligns with the
      criteria for an Enrichment action. It does not perform any containment, blocking,
      or identity-based remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. It
      operates solely on a single URL provided as an action parameter. Therefore,
      the entity types list is empty and no entity filtering is applied.
