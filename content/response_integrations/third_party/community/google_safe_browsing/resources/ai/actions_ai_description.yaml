Lookup:
  ai_description: >-
    ### General Description

    Checks if a specific URL is safe for browsing using the Google Safe Browsing API.
    This action retrieves threat intelligence to determine if the provided URL is
    flagged as malicious.


    ### Flow Description

    1. Extracts the target URL from the action parameters.

    2. Makes an API call to Google Safe Browsing (via the `pysafebrowsing` library)
    to look up the URL's reputation.

    3. Evaluates the API response to determine if the URL is classified as malicious.

    4. Attaches the raw lookup response to the action as a JSON result.

    5. Completes the action by returning a boolean value indicating the malicious
    status, along with a descriptive summary message.


    ### Additional Notes

    This action does not automatically iterate over case entities. It strictly operates
    on the URL explicitly provided in the action parameters.
  ai_short_description: >-
    Checks if a specific URL is safe for browsing by querying the Google Safe Browsing
    API and returning its malicious status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to Google Safe Browsing to fetch reputation data
      for a URL (fetches_data=true). It does not mutate external data, mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: false
