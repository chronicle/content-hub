Lookup:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action queries the Google Safe Browsing API to determine if a URL is malicious,
      returning threat intelligence (malicious status, threat type). This aligns with
      the 'Enrich IOC' category. It does not perform any other actions like ticket
      creation, containment, or alert modification.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action checks if a specific URL is safe for browsing by querying the Google
    Safe Browsing API. It retrieves the malicious status of the URL, including platform
    and threat information, and provides the result for further analysis.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Url | string | Yes | The URL you would like to check in Google Safe Browsing.
    |


    ### Flow

    1. Extract the API key from the configuration and the URL from the action parameters.

    2. Initialize the SafeBrowsing manager with the provided API key.

    3. Query the Google Safe Browsing API for the provided URL.

    4. Add the raw JSON result to the action output.

    5. Terminate the action with a status message indicating if the URL was found
    malicious or not.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Google Safe Browsing API to retrieve
      reputation data for a URL. It does not modify any external systems (no POST/PUT/DELETE),
      nor does it modify any internal SOAR data (entities, insights, or comments).
  categories:
    enrichment: false
    reasoning: >-
      While the action fetches data (reputation for a URL), it does not operate on
      SOAR entities (it takes a raw URL parameter). Therefore, it does not meet the
      criteria for an Enrichment Action, which requires gathering context about alerts
      or entities.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or utilize the `target_entities` list. It processes
      a raw URL string provided as a parameter.
