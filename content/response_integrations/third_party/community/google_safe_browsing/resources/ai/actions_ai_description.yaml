Lookup:
  ai_description: >-
    ### General Description

    The **Lookup** action allows users to check a specific URL against the Google
    Safe Browsing database to determine if it is considered safe or malicious. This
    is a utility action that performs a real-time reputation check based on a provided
    input parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Url | String | Yes | The specific URL to be checked in Google Safe Browsing.
    Defaults to a malware testing URL if not provided. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Key from the integration's
    configuration settings.

    2. **Parameter Extraction**: The action extracts the target URL from the action
    parameters.

    3. **API Interaction**: It initializes the `SafeBrowsing` manager and performs
    a lookup for the specified URL.

    4. **Result Processing**: The raw API response is captured and added to the action's
    JSON results.

    5. **Completion**: The action evaluates the 'malicious' flag in the response and
    terminates with a message indicating whether the URL was found to be malicious
    or safe.


    ### Additional Notes

    This action does not iterate over entities within a Google SecOps case. It operates
    strictly on the URL provided in the 'Url' parameter. If you wish to check entities,
    you must map the entity identifier to this parameter in a playbook.
