  ai_description: >-
    This action checks if a specific URL is safe for browsing by querying the Google
    Safe Browsing API. It retrieves the malicious status of the URL and provides the
    result for further analysis. ### Parameters | Parameter | Type | Mandatory | Description
    | | --- | --- | --- | --- | | Url | string | Yes | The URL you would like to check
    in Google Safe Browsing. | ### Flow 1. Extract API key from configuration and
    URL from action parameters. 2. Initialize the SafeBrowsing manager. 3. Query the
    Google Safe Browsing API for the provided URL. 4. Add the raw JSON result to the
    action output. 5. Terminate the action with a status message indicating if the
    URL was found malicious. ### Additional Notes This action does not operate on
    entities and does not modify any internal or external data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a lookup against the Google Safe Browsing API to determine
      if a URL is malicious. It fetches data (fetches_data=true) but does not mutate
      external systems (can_mutate_external_data=false) or internal SOAR data (can_mutate_internal_data=false).
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data from an external source (Google Safe Browsing) but does
      not operate on SOAR entities or update internal case data. Therefore, it does
      not meet the criteria for an Enrichment Action as defined, which requires gathering
      context about alerts or entities.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over target_entities or use entity-specific identifiers.
      It extracts a URL from the action parameters and performs a lookup. Therefore,
      it does not run on entities.
