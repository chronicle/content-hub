      The action is a connectivity test ('Ping') and does not perform any of the defined
      operational tasks such as enriching IOCs, updating tickets, or blocking hosts.
      Therefore, it does not match any of the specified product categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
