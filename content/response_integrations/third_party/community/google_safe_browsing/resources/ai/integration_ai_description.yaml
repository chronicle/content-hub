product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration provides a 'Lookup' action that queries the Google Safe Browsing
    API to determine the reputation of a URL. This aligns directly with the 'Threat
    Intelligence' category, which is used for enriching external indicators (like
    URLs) to determine their reputation and confirm if an alert is a True Positive.
    It does not perform SIEM log searching, EDR host containment, network gateway
    blocking (it only checks reputation, it does not manage firewall/WAF rules), email
    management, identity management, cloud resource management, ITSM ticketing, vulnerability
    scanning, asset inventory management, or collaboration/notification tasks. Therefore,
    only 'threat_intelligence' is true.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
