product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The Airtable integration provides capabilities to ingest external data into the
    SOAR platform as security cases (via the Airtable Connector) and to manage records
    in an external database (via Add, Update, Delete, and Search actions). The 'Enrich
    Entities From Table' action allows for the enrichment of internal assets with
    contextual data from Airtable, which directly aligns with the 'Asset Inventory'
    category. Furthermore, Airtable is commonly used for task management and project
    planning, and the ability to create and update records in this system aligns with
    the 'ITSM' category. The integration does not perform log analysis or IOC reputation
    checks, so it does not qualify as 'SIEM' or 'Threat Intelligence'.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
