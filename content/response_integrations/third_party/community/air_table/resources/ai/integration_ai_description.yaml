product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The Airtable integration provides generic database operations (Create, Update,
    Delete, Search) and a connector for ingesting records into the SOAR platform.
    The 'Enrich Entities From Table' action is explicitly designed to enrich both
    IOCs and Assets with contextual data from an Airtable database, satisfying the
    criteria for Threat Intelligence and Asset Inventory categories. Additionally,
    the integration is used for task management and CRM, and the connector allows
    for the ingestion of records to create cases or alerts, which aligns with the
    ITSM category for documenting investigations and tracking tasks. It does not perform
    functions related to SIEM, EDR, Network Security, Email Security, IAM, Cloud Security,
    Vulnerability Management, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
