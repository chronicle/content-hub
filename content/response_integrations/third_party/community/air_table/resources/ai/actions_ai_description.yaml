Search:
  ai_description: >-
    ### General Description

    The **Search** action allows users to query an Airtable base for specific records.
    It searches a designated column (field) for a specific value within a chosen table.
    This is useful for retrieving structured data stored in Airtable to provide context
    during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | string | Yes | The unique identifier for the Airtable base (found
    in the API URL). |

    | **Table name** | string | Yes | The name of the table within the base to search.
    |

    | **Field name** | string | Yes | The name of the column/field to perform the
    search on. |

    | **Field value** | string | Yes | The specific value to look for in the defined
    field. |

    | **Max records** | string | No | The maximum number of records to return (default
    is 100). |


    ### Flow Description

    1. **Initialization**: The action retrieves the API key from the integration configuration
    and the search parameters from the action input.

    2. **Connection**: It establishes a connection to the specified Airtable base
    and table using the Airtable SDK.

    3. **Execution**: It performs a search query using the provided field name and
    value, respecting the maximum records limit.

    4. **Output**: The results are returned as a JSON object, and a summary message
    indicates how many records were matched.


    ### Additional Notes

    - This action is read-only and does not modify any data in Airtable.

    - It does not automatically process entities from the SecOps case; all search
    criteria must be provided via parameters.
