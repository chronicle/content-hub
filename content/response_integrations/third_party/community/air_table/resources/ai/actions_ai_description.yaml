  ai_description: >-
    ### General Description

    Adds or updates records in an Airtable base and table based on a provided JSON
    payload. The action searches for existing records using a specified field and
    either updates them if they exist or inserts new records if they do not.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Base id | String | Yes | The ID of the Airtable base to interact with. |

    | Table name | String | Yes | The name of the table within the specified Airtable
    base. |

    | Field name | String | Yes | The name of the field used to search for existing
    records. This determines whether the action will update an existing record or
    insert a new one. |

    | Json fields | String | Yes | A JSON-formatted string containing a list of records
    (dictionaries) to be added or updated. |


    ### Flow Description

    1. Initializes the Airtable client using the provided Base ID, Table Name, and
    API key.

    2. Parses the `Json fields` parameter into a list of dictionaries.

    3. Iterates through each item in the parsed JSON list.

    4. Searches Airtable for existing records where the value of `Field name` matches
    the corresponding value in the current JSON item.

    5. If matching records are found, updates each of them with the data from the
    JSON item.

    6. If no matching records are found, inserts the JSON item as a new record.

    7. Returns a summary message detailing the total number of records inserted and
    updated.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Inserts new records or updates existing records in an external Airtable base
      and table.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action interacts with the Airtable API to search for, insert, and update
      records. It does not fetch contextual data for SecOps entities or alerts. It
      mutates external data by inserting or updating records in Airtable. It does
      not mutate internal SecOps data, update entities, create insights, modify alerts,
      or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data (Airtable records), so it cannot be classified
      as an Enrichment action. It does not perform any identity, host, network, or
      email-based remediation, so it is not a Remediation action.
    remediation: false
  entity_usage:
