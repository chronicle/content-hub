  ai_description: >-
    Deletes all records from a specified table within an Airtable base. This action
    is useful for clearing out temporary data or resetting a table's state. It first
    retrieves all existing record IDs from the target table and then performs a batch
    deletion to remove them.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves the Airtable API key from the integration
    settings and the Base ID and Table Name from the action parameters.

    2. **Record Retrieval:** Connects to the specified Airtable base and table to
    fetch all existing records.

    3. **ID Collection:** Extracts the unique record IDs for every record found in
    the table.

    4. **Batch Deletion:** Executes a batch delete operation using the collected IDs
    to remove all records from the table.

    5. **Completion:** Returns a success message indicating the total number of records
    deleted.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base Id | String | True | The unique identifier for the Airtable base (database).
    This can be found in the URL of the Airtable API documentation page for that base.
    |

    | Table name | String | True | The name of the specific table within the base
    from which all records will be deleted. |


    ### Additional Notes:

    - This action performs a destructive operation. Once records are deleted via the
    API, they cannot be easily recovered unless a backup exists within Airtable.

    - The action handles API rate limits by setting a specific limit on the Airtable
    client before performing the batch delete.
