Delete All Records:
  ai_description: >-
    ### General Description

    The **Delete All Records** action is designed to purge all data from a specific
    table within an Airtable base. This is a destructive action used for data cleanup
    or resetting a table's state. It works by first retrieving all record identifiers
    from the target table and then executing a batch deletion process.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Base Id** | The unique identifier for the Airtable base (database). This can
    be found in the Airtable API documentation URL for the specific base. | String
    | Yes | Required to locate the correct database. |

    | **Table name** | The name of the table within the specified base where all records
    should be deleted. | String | Yes | Required to target the specific data set.
    |


    ### Additional Notes

    - **Destructive Action**: This action permanently removes all records from the
    specified table. Use with caution.

    - **API Limits**: The action adjusts the Airtable API limit internally to handle
    batch deletions efficiently.

    - **No Entities**: This action does not run on specific SOAR entities; it operates
    globally on the specified Airtable table.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Airtable API key from
    the integration configuration and the Base ID and Table Name from the action parameters.

    2. **Data Retrieval**: It connects to the specified Airtable table and fetches
    all existing records to collect their unique record IDs.

    3. **Batch Deletion**: The action uses the collected IDs to perform a batch delete
    operation, effectively clearing the table.

    4. **Reporting**: Finally, it calculates the total number of deleted records and
    returns a success message to the Google SecOps platform.
