    5. **Completion**: It returns a summary message indicating the number of records
    successfully deleted.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Field value | string | Yes | The value of a specific field in a table to match
    for deletion. |

    | Field name | string | Yes | The name of the field (column) in the table to search.
    |

    | Table name | string | Yes | The name of the table within the base. |

    | Base id | string | Yes | The ID of the Airtable base where the data is stored.
    |

    | Max records | string | Yes | The maximum number of records (rows) that will
    be affected by the action. |


    ### Additional Notes

    This action performs a destructive operation (deletion) on external data. Ensure
    that the `Field name` and `Field value` are correctly specified to avoid accidental
    data loss.
