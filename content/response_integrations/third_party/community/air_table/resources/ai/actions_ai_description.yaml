  ai_description: >-
    ### General Description

    The **Create** action allows users to programmatically insert new records into
    a specific table within an Airtable base. It is designed to handle bulk creation
    by accepting a JSON array of objects, where each object represents a new row to
    be added. This action is useful for logging SOAR activities, tracking incidents
    in a database, or synchronizing data with external Airtable-based workflows.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | string | Yes | The unique identifier for the Airtable base (database).
    This can be found in the URL of the Airtable API documentation page for that specific
    base. |

    | **Table name** | string | Yes | The name of the table within the specified base
    where the records should be inserted. |

    | **Json fields** | content | Yes | A JSON-formatted array of objects. Each object
    contains key-value pairs where the key is the field (column) name and the value
    is the data to be inserted into that field. Supports multiple records in one execution.
    |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Airtable API key from
    the integration configuration.

    2. **Parameter Parsing**: It extracts the Base ID, Table Name, and the JSON string
    containing the record data from the action parameters.

    3. **Data Processing**: The JSON string is parsed into a Python list of dictionaries.

    4. **External Interaction**: For each dictionary (record) in the list, the action
    calls the Airtable API to insert the data into the specified table.

    5. **Result Compilation**: The action collects the unique IDs and field data returned
    by Airtable for each successfully created record.

    6. **Final Output**: The action returns a JSON summary of the created records
    and ends with a success message indicating the total count of records added.


    ### Additional Notes

    - Ensure that the field names in the **Json fields** parameter exactly match the
    column names in your Airtable table (case-sensitive).

    - The action will fail if the JSON provided is not a valid list of objects or
    if the API key lacks the necessary permissions for the specified base.
