Delete:
  ai_description: >-
    ### General Description

    The **Delete** action allows users to remove specific records from an Airtable
    table based on a search match. It identifies records by comparing a provided value
    against a specific field (column) and deletes all matching records up to a defined
    limit. This is useful for automated data cleanup or removing specific entries
    from a tracking base during incident response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | string | Yes | The unique identifier for the Airtable base (database).
    This can be found in the URL of the Airtable API documentation for that base.
    |

    | **Table name** | string | Yes | The name of the specific table within the base
    where the records are stored. |

    | **Field name** | string | Yes | The name of the column/field to search within
    to find records for deletion. |

    | **Field value** | string | Yes | The specific value to match in the 'Field name'
    column. Any record containing this value in the specified field will be targeted.
    |

    | **Max records** | string | Yes | The maximum number of matching records to delete
    in a single execution. Defaults to 100 if not specified or invalid. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the API key from the integration
    settings and the Base ID, Table Name, and search criteria from the action parameters.

    2. **Search Phase**: It performs a search in the specified Airtable table for
    records where the 'Field name' matches the 'Field value'.

    3. **Deletion Phase**: The action iterates through the list of found records (limited
    by the 'Max records' parameter) and sends a delete request for each unique record
    ID.

    4. **Finalization**: The action calculates the total number of deleted records
    and returns a success message to the SecOps platform.


    ### Additional Notes

    - **Data Loss Warning**: This action performs a permanent deletion of data in
    the external Airtable system. Ensure that the search criteria (Field name and
    Field value) are precise to avoid unintended data loss.

    - **Rate Limiting**: Large values for 'Max records' may be subject to Airtable
    API rate limits.
  capabilities:
