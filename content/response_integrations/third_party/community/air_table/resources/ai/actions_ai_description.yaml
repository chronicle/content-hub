Delete All Records:
  ai_description: >-
    ### General Description

    Deletes all records within a specified table in an Airtable base. This action
    connects to the Airtable API, retrieves all existing records for the given table,
    and performs a batch deletion operation to remove them entirely.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves the `Base Id` and `Table name` from the action parameters.

    3. Initializes the Airtable client and makes an API call (`get_all`) to fetch
    all existing records in the specified table.

    4. Extracts the record IDs from the fetched results.

    5. Makes an API call (`batch_delete`) to delete all identified records from the
    table.

    6. Returns a success message with the total count of deleted records.


    ### Additional Notes

    This action permanently modifies external data by deleting records from the specified
    Airtable base. Ensure that the correct Base ID and Table Name are provided to
    prevent accidental data loss.
