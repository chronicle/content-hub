  ai_description: >-
    ### General Description

    The **Delete** action allows users to remove records from a specific Airtable
    table based on a matching field value. It performs a search to identify records
    where a designated column (field) matches a provided value and subsequently deletes
    those records, up to a user-defined limit.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | string | Yes | The unique identifier for the Airtable base (database).
    Found in the API documentation URL for the base. |

    | **Table name** | string | Yes | The name of the specific table within the base
    where the deletion should occur. |

    | **Field name** | string | Yes | The name of the column (field) to search for
    matching values. |

    | **Field value** | string | Yes | The specific value to look for in the designated
    field. Records containing this value will be targeted for deletion. |

    | **Max records** | string | Yes | The maximum number of records that the action
    will delete in a single execution. Default is 100. |


    ### Flow Description

    1. **Initialization**: The action extracts the API key from the integration configuration
    and the base ID, table name, field name, field value, and max records from the
    action parameters.

    2. **Search**: It connects to the Airtable API and searches the specified table
    for records where the `Field name` matches the `Field value`, limiting the results
    to the `Max records` count.

    3. **Deletion**: The action iterates through the list of records returned by the
    search and issues a delete request for each record ID.

    4. **Completion**: It calculates the total number of deleted records and returns
    a success message to the Google SecOps platform.


    ### Additional Notes

    * This action does not operate on SecOps entities; it relies entirely on the provided
    parameters to identify data in Airtable.

    * The action performs a destructive operation (deletion) on external data.
