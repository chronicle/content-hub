  ai_description: >-
    ### General Description

    The **AddOrUpdate** action allows users to synchronize data with an Airtable table
    by either inserting new records or updating existing ones. It processes a list
    of data objects provided in JSON format and uses a specific field as a unique
    identifier to determine whether a record already exists in the target Airtable
    base and table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | String | Yes | The unique identifier for the Airtable base where
    the data will be managed. |

    | **Table name** | String | Yes | The name of the specific table within the Airtable
    base. |

    | **Field name** | String | Yes | The name of the field used to search for existing
    records. This acts as the 'key' for the upsert logic. |

    | **Json fields** | String | Yes | A JSON-formatted string representing a list
    of dictionaries. Each dictionary contains the field-value pairs to be inserted
    or updated. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Airtable API key from the integration
    configuration and extracts the base ID, table name, search field, and the JSON
    data from the action parameters.

    2. **Data Parsing**: The `Json fields` string is parsed into a Python list of
    dictionaries.

    3. **Search and Upsert Logic**: For each item in the provided list:
        * The action searches the specified Airtable table for records where the `Field
    name` matches the value provided in the current item.
        * **Update**: If one or more matching records are found, the action updates
    those specific records with the data provided in the item.
        * **Insert**: If no matching records are found, the action creates a new record
    in the table using the data provided in the item.
    4. **Completion**: The action calculates the total number of inserted and updated
    records and returns a summary message to the Google SecOps platform.


    ### Additional Notes

    * This action does not operate on SecOps entities (like IPs or Hostnames) directly;
    it processes raw data provided via the `Json fields` parameter.

    * Ensure the `Json fields` parameter is a valid JSON array of objects, and that
    the `Field name` exists within those objects.
