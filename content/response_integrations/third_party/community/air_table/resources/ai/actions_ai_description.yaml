Create:
  ai_description: >-
    The 'Create' action allows users to programmatically add new records to a specific
    table within an Airtable base. It is designed to handle bulk creation by accepting
    a JSON-formatted list of records. This action is useful for logging SOAR activities,
    tracking incident metadata, or synchronizing data between Google SecOps and Airtable.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Airtable API key from
    the integration configuration and the Base ID, Table Name, and JSON fields from
    the action parameters.

    2. **Data Parsing:** It parses the provided 'Json fields' string into a list of
    Python dictionaries, where each dictionary represents a single record to be created.

    3. **Record Insertion:** The action iterates through the list of records and uses
    the Airtable SDK to insert each one into the specified table.

    4. **Result Compilation:** It collects the unique IDs and field data of the successfully
    created records.

    5. **Finalization:** The action outputs the created records as a JSON result and
    provides a summary message indicating the total number of records added.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base id | string | True | The unique identifier for the Airtable base (database).
    This can be found in the Airtable API documentation URL for that specific base.
    |

    | Table name | string | True | The name of the table within the base where the
    records should be inserted. |

    | Json fields | content | True | A JSON-formatted array of objects. Each object
    represents a row to be created, with keys matching the Airtable field names and
    values representing the data for those fields. |


    ### Additional Notes

    - This action does not interact with Google SecOps entities; it operates purely
    on the data provided in the 'Json fields' parameter.

    - Ensure that the field names in the JSON input exactly match the column names
    in the target Airtable table to avoid insertion errors.
