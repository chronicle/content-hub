  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the AirTable service. It ensures that the provided credentials (API Key, Base
    ID, and Table Name) are valid and that the environment can successfully communicate
    with the AirTable API.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    configuration settings.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Api key`, `Base id`,
    and `Table name` from the AirTable integration configuration.

    2. **Client Initialization**: It initializes the AirTable client using the extracted
    credentials.

    3. **Connectivity Test**: The action attempts to fetch a single record (`maxRecords=1`)
    from the specified table to confirm read access.

    4. **Completion**: If the request is successful, the action concludes with a success
    message indicating that AirTable is connected.
