Get All Records:
  ai_description: >-
    ### General Description

    The **Get All Records** action retrieves a collection of records from a specified
    table within an Airtable base. It is designed to fetch bulk data, allowing users
    to limit the number of returned records and apply sorting based on a specific
    column and direction. This action is primarily used for data retrieval and synchronization
    tasks where external Airtable data needs to be brought into the Google SecOps
    environment for analysis or reporting.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base Id** | string | Yes | The unique identifier for the Airtable base (database).
    This can be found in the Airtable API documentation for the specific base. |

    | **Table name** | string | Yes | The name of the table within the specified base
    from which to retrieve records. |

    | **Max Records** | string | Yes | The maximum number of rows/records to be retrieved
    in a single execution. |

    | **Sort by** | string | No | The name of the column (field) to use for sorting
    the results. If left empty, no specific sorting is applied. |

    | **Sort Direction** | ddl | Yes | Specifies the order of the sorted records.
    Options are `Descending` or `Ascending`. Defaults to `Descending`. |


    ### Additional Notes

    - This action does not operate on specific entities within a case; it performs
    a global fetch based on the provided parameters.

    - The results are returned as a JSON array containing the record objects from
    Airtable.


    ### Flow Description

    1.  **Configuration Extraction:** The action retrieves the Airtable API key from
    the integration configuration.

    2.  **Parameter Parsing:** It extracts the Base ID, Table Name, record limit,
    and sorting preferences from the action parameters.

    3.  **Client Initialization:** An Airtable client is initialized using the provided
    Base ID, Table Name, and API Key.

    4.  **Data Retrieval:** The action calls the Airtable API to fetch records. If
    a 'Sort by' column is provided, it applies the specified sorting logic; otherwise,
    it fetches records up to the 'Max Records' limit.

    5.  **Result Processing:** The retrieved records are counted and formatted into
    JSON.

    6.  **Output:** The action attaches the raw JSON results to the action output
    and provides a summary message indicating the number of records successfully fetched.
