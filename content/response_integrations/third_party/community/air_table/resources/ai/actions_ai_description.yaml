  ai_description: >-
    ### General Description

    This action synchronizes data with an Airtable database by adding new records
    or updating existing ones based on a specified field identifier. It allows for
    automated data management within Airtable directly from the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters (API key, Base ID, Table Name, Field Name,
    JSON fields).

    2. Parses the JSON fields input string into a list of dictionaries.

    3. Iterates through each record in the list.

    4. Searches for existing records in the specified Airtable table using the provided
    Field name as a key.

    5. If a record is found, it updates the existing record with the new data.

    6. If no record is found, it inserts a new record into the table.

    7. Returns a summary of the total records inserted and updated.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base id | string | Yes | The ID of the Airtable base. |

    | Table name | string | Yes | The name of the table within the base. |

    | Field name | string | Yes | The field name used to identify existing records
    for update. |

    | Json fields | string | Yes | A JSON string representing the records to be added
    or updated. |


    ### Additional Notes

    This action does not operate on SecOps entities and is used for external database
    synchronization.
