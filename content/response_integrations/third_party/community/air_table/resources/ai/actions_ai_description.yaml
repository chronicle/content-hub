Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the AirTable service. It ensures that the provided credentials
    (API Key, Base ID, and Table Name) are valid and that the network path to the
    AirTable API is open.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the AirTable integration
    or for troubleshooting connectivity issues. It performs a read-only operation
    by attempting to fetch a single record from the configured table.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the `Api key`, `Base id`,
    and `Table name` from the integration's configuration settings.

    2. **Client Initialization:** It initializes the AirTable client using the extracted
    credentials.

    3. **Connectivity Test:** The action executes a request to fetch a maximum of
    one record (`maxRecords=1`) from the specified AirTable base and table.

    4. **Result Reporting:** If the request is successful, the action concludes with
    a success message indicating that AirTable is connected.
