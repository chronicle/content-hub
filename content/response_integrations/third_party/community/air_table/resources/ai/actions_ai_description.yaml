  ai_description: >-
    ### General Description

    Creates new records in a specific Airtable base and table. This action allows
    users to push structured data into Airtable by providing the base ID, table name,
    and a JSON array of fields to be inserted.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base id | string | Yes | The ID of the Airtable base. This can be found in the
    URL of the API page of the base. |

    | Table name | string | Yes | The name of the table within the base. |

    | Json fields | content | Yes | A JSON array of objects representing the rows
    to be created. |


    ### Additional Notes

    The action requires the 'Api key' to be configured in the integration settings.
    The 'Json fields' parameter must be a valid JSON array of objects.


    ### Flow Description

    1. Extract configuration parameters (API Key, Base ID, Table Name, JSON fields).

    2. Initialize the Airtable client.

    3. Parse the provided JSON fields string into a list of records.

    4. Iterate through the records and insert them into the specified Airtable table.

    5. Return the result of the insertion (IDs and fields) to the SOAR platform.
