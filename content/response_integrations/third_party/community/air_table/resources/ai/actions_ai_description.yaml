AddOrUpdate:
  ai_description: "### General Description\nThe **AddOrUpdate** action allows users\
    \ to synchronize data with an Airtable table by either inserting new records or\
    \ updating existing ones. It acts as an 'upsert' operation, ensuring that the\
    \ target table reflects the provided data without creating duplicates based on\
    \ a specific identifier field.\n\n### Parameters Description\n| Parameter | Description\
    \ | Type | Mandatory | \n| :--- | :--- | :--- | :--- |\n| **Base id** | The unique\
    \ identifier for the Airtable base where the table resides. | string | Yes |\n\
    | **Table name** | The name of the specific table within the Airtable base to\
    \ perform operations on. | string | Yes |\n| **Field name** | The name of the\
    \ field used to check for existing records (e.g., 'Email' or 'ID'). This field\
    \ is used in the search query. | string | Yes |\n| **Json fields** | A JSON-formatted\
    \ string (list of objects) containing the data to be added or updated. Each object\
    \ should contain the keys corresponding to Airtable columns. | string | Yes |\n\
    \n### Additional Notes\n- The action expects the `Json fields` parameter to be\
    \ a valid JSON array of objects. \n- The `Field name` provided must exist in the\
    \ Airtable table and should ideally contain unique values for the search logic\
    \ to work correctly.\n\n### Flow Description\n1. **Initialization**: The action\
    \ retrieves the Airtable API key from the integration configuration and extracts\
    \ the Base ID, Table Name, Field Name, and JSON data from the parameters.\n2.\
    \ **Data Parsing**: The `Json fields` string is parsed into a Python list of dictionaries.\n\
    3. **Search and Upsert Logic**: For each item in the provided list:\n    - The\
    \ action searches the Airtable table for records where the specified `Field name`\
    \ matches the value in the current item.\n    - **Update**: If one or more matching\
    \ records are found, the action updates those records with the data provided in\
    \ the item.\n    - **Insert**: If no matching records are found, the action inserts\
    \ a new record into the table.\n4. **Completion**: The action calculates the total\
    \ number of inserted and updated records and returns a summary message to the\
    \ Google SecOps platform."
  capabilities:
