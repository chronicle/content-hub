Ping:
  ai_description: >-
    ### General Description

    Tests the connection to the AirTable product to ensure the integration is configured
    correctly and can successfully communicate with the AirTable API.


    ### Flow Description

    1. Extracts the API key, Base ID, and Table Name from the integration-level configuration.

    2. Initializes the AirTable client using the provided credentials.

    3. Makes a lightweight API call (`get_all` with `maxRecords=1`) to verify connectivity
    and authentication.

    4. Returns a success message to the platform if the connection is successfully
    established.


    ### Additional Notes

    This is a utility action typically used during integration setup or troubleshooting.
    It does not process entities, mutate external data, or affect case data.
