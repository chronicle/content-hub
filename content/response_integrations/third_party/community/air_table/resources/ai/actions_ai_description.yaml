Update:
  ai_description: >-
    ### General Description

    Updates specific fields in an Airtable table based on a search query. This action
    searches for records matching a specific field value and applies a JSON-formatted
    set of field updates to all matching records.


    ### Flow Description

    1. Initializes the Airtable client using the provided Base ID, Table Name, and
    API key.

    2. Searches the specified table for records where the given `Field name` matches
    the `Field value`, up to the `Max records` limit.

    3. Iterates through the search results and updates each matching record with the
    provided `Json fields` via an API call to Airtable.

    4. Returns the total number of successfully updated records to the SecOps platform.


    ### Additional Notes

    The `Json fields` parameter must be provided in a valid JSON format representing
    the columns and their new values.
