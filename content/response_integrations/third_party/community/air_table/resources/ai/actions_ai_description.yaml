    |

    | Field name | Yes | String | The name of the specific field (column) in the table
    to search against. |

    | Field value | Yes | String | The value to search for within the specified field.
    |

    | Max records | No | String | The maximum number of records (rows) to return.
    Defaults to 100. |


    ### Additional Notes

    If the `Max records` parameter is not a valid integer, the action will default
    to returning a maximum of 5 records.
