Enrich Entities From Table:
  ai_description: >-
    ### General Description

    Enriches entities by searching for specific fields within an AirTable database
    table. This action queries AirTable using either the entity's identifier or a
    specified enrichment field, retrieves the matching record, flattens the data,
    and appends it to the entity's additional properties with a customizable prefix.


    ### Flow Description

    1. Initializes the AirTable client using the provided Base ID, Table Name, and
    API key.

    2. Iterates through the target entities in the case.

    3. Determines the search value for each entity, using either a specified entity
    field from its additional properties or its default identifier.

    4. Makes an API call (`airtable.search`) to search the specified AirTable column
    for the entity's value.

    5. If a match is found, retrieves the first record, flattens the JSON structure,
    and applies the configured enrichment prefix.

    6. Updates the entity's additional properties with the retrieved data.

    7. Returns the results as a JSON object and updates the entities in the SecOps
    platform.


    ### Additional Notes

    If the initial search yields no results, the action automatically retries the
    search using a lowercase version of the search value. Errors for individual entities
    (such as missing fields) are captured and returned in the JSON output.
  ai_short_description: >-
    Enriches entities by searching for matching records in an AirTable database and
    appending the retrieved data to the entities' additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
