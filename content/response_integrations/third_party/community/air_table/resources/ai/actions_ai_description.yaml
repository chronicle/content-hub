AddOrUpdate:
  ai_description: >-
    ### General Description

    Adds new records or updates existing records in a specified Airtable base and
    table. The action searches for existing records based on a specified field name
    and value. If a match is found, it updates the existing record; otherwise, it
    inserts a new record.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves the Base ID, Table Name, Field Name, and JSON fields from the action
    parameters.

    3. Parses the provided JSON fields into a list of dictionaries.

    4. Iterates through each item in the parsed JSON.

    5. Makes an API call to search Airtable for an existing record matching the specified
    field name and value.

    6. If a matching record is found, makes an API call to update the record with
    the new data.

    7. If no matching record is found, makes an API call to insert a new record.

    8. Returns a summary message detailing the number of inserted and updated records.


    ### Additional Notes

    The `Json fields` parameter should be a valid JSON string representing a list
    of dictionaries, where each dictionary contains the fields to be added or updated.
  ai_short_description: >-
    Adds new records or updates existing records in a specified Airtable base and
    table based on a matching field.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Inserts new records or updates existing records in an external Airtable database.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes API calls to Airtable to search, insert, and update records.
      Because it modifies data in an external system (Airtable), `can_mutate_external_data`
      is true. It does not fetch data for SecOps enrichment, nor does it mutate internal
      SecOps data, update entities, create insights, modify alerts, or create case
      comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
