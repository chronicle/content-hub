Update:
  ai_description: >-
    ### General Description

    The **Update** action allows users to modify existing records within an Airtable
    table. It functions by searching for records that match a specific criteria (field
    name and value) and then applying updates to those records based on a provided
    JSON object. This is useful for synchronizing data between Google SecOps and Airtable
    or for updating status fields in a tracking table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base id** | string | Yes | The unique identifier for the Airtable base. |

    | **Table name** | string | Yes | The name of the specific table to update. |

    | **Field name** | string | Yes | The column name used to filter which records
    should be updated. |

    | **Field value** | string | Yes | The value to look for in the specified `Field
    name`. |

    | **Json fields** | content | Yes | A JSON string representing the fields and
    their new values (e.g., `{"Status": "Resolved"}`). |

    | **Max records** | string | Yes | Limits the number of records that will be updated
    in a single execution. |


    ### Flow Description

    1. **Initialization**: Retrieves the API key from the integration configuration
    and parameters from the action input.

    2. **Validation**: Parses the `Json fields` parameter into a dictionary and converts
    `Max records` to an integer.

    3. **Search**: Queries the specified Airtable base and table for records where
    the `Field name` matches the `Field value`.

    4. **Update**: Iterates through the retrieved records (up to the `Max records`
    limit) and updates each one with the data provided in `Json fields`.

    5. **Completion**: Returns a success message indicating the total number of records
    updated.


    ### Additional Notes

    - Ensure the `Json fields` parameter is a valid JSON string.

    - The action will only update records that are found during the search phase.
