  ai_description: >-
    ### General Description

    Enriches entities by searching for their identifiers or specific properties in
    an Airtable database. This action retrieves structured data from a specified Airtable
    base and table, then updates the entity's additional properties with the retrieved
    information, allowing analysts to correlate case data with external Airtable records.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Airtable API key, Base
    ID, Table Name, Field Name, and optional parameters (Entity Field, Max Records,
    Enrichment Prefix) from the integration settings.

    2. **Entity Iteration**: The action iterates through all target entities provided
    in the case.

    3. **Search Value Determination**: For each entity, it determines the search value.
    If an `Entity Field` is specified, it attempts to retrieve that property from
    the entity's `additional_properties`. If not specified or if the property is missing,
    it defaults to the entity's `identifier`.

    4. **Airtable Query**: It performs a search against the specified Airtable table
    using the determined search value.

    5. **Data Enrichment**: If a match is found, the action flattens the retrieved
    record, applies the configured `Enrichment Prefix` to the keys, and updates the
    entity's `additional_properties`.

    6. **Entity Update**: Finally, the action updates the enriched entities within
    the SOAR platform and returns the count of successful and failed enrichments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Base id | string | Yes | The ID of the Airtable base where the data is stored.
    |

    | Table name | string | Yes | The name of the specific table within the Airtable
    base. |

    | Field name | string | Yes | The column name in the Airtable table to search
    against. |

    | Entity Field | string | No | The entity property to use for the search. If left
    empty, the entity's identifier is used. |

    | Max records | string | No | The maximum number of records to retrieve from Airtable.
    Defaults to 100. |

    | Enrichment Prefix | string | No | A prefix to prepend to the keys of the added
    enrichment fields. Defaults to 'AT_'. |


    ### Additional Notes

    - The action does not filter entities by type; it attempts to process all entities
    provided in the target list.

    - If the `Entity Field` parameter is provided but the property does not exist
    on the entity, the enrichment for that specific entity will fail.
  capabilities:
