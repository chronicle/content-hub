  ai_description: >-
    ### General Description

    The "Enrich Entities From Table" action searches for specific fields in an Airtable
    table based on entity identifiers or specific entity fields, and enriches the
    entities with the retrieved data. It flattens the retrieved JSON data and appends
    it to the entity's additional properties.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Base id | String | Yes | Base is a database in Airtable in which you store data.
    The base ID can be found in the URL of the API page of the base. |

    | Table name | String | Yes | A table stores similar (structured) data, and each
    base can have multiple tables. This parameter indicates the name of the table
    within the base. |

    | Field name | String | Yes | The name of a specific field (column) in the table
    to search against. |

    | Entity Field | String | No | Entity field to be used for AirTable search (Can
    be Identifier or any other enrichment field). Default is the entity's Identifier.
    |

    | Max records | String | No | The maximum records (rows) that will be affected
    by the action. Defaults to 100 in configuration, but the script defaults to 5
    if parsing fails. |

    | Enrichment Prefix | String | No | Prefix to use for entity enrichment keys added
    to the entity's additional properties. Defaults to `AT_`. |


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves the action parameters including Base ID, Table Name, Field Name,
    and Max Records.

    3. Initializes the Airtable client.

    4. Iterates over the target entities in the case.

    5. For each entity, determines the search value (either the entity's identifier
    or a specific field from its additional properties).

    6. Searches the Airtable table for the determined value.

    7. If a match is found, flattens the resulting JSON record and adds it to the
    entity's additional properties using the specified prefix.

    8. Updates the successfully enriched entities in Google SecOps.

    9. Returns a JSON result containing the matched records and any errors encountered
    during the process.
