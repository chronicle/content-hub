Enrich Entities From Table:
  ai_description: >-
    Enriches entities by searching for matching records within a specified Airtable
    table. This action allows users to map external data stored in Airtable (such
    as asset owners, threat intelligence, or contact information) directly onto SecOps
    entities. It searches a specific column in Airtable using either the entity's
    identifier or a custom property as the search key. When a match is found, the
    record's fields are flattened, prefixed, and added to the entity's additional
    properties.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment Prefix | string | No | A prefix (default: 'AT_') added to the keys
    of the data retrieved from Airtable before adding them to the entity. |

    | Max records | string | No | The maximum number of records to retrieve from Airtable
    for the search query (default: 100). |

    | Base id | string | Yes | The unique identifier for the Airtable Base (database).
    |

    | Table name | string | Yes | The name of the table within the Airtable Base to
    search. |

    | Field name | string | Yes | The name of the column (field) in Airtable to match
    against the entity value. |

    | Entity Field | string | No | The specific entity property to use for the search.
    If left blank, the action uses the Entity Identifier. |


    ### Flow Description


    1.  **Initialization:** Retrieves Airtable API credentials and action parameters
    (Base ID, Table Name, Field Name, etc.).

    2.  **Entity Processing:** Iterates through all target entities in the current
    context.

    3.  **Search Key Determination:** For each entity, identifies the search value.
    It uses the value from the property specified in 'Entity Field' if provided; otherwise,
    it defaults to the entity's identifier.

    4.  **Airtable Query:** Executes a search in the specified Airtable table where
    the 'Field name' matches the search key. It performs a case-sensitive search first,
    followed by a case-insensitive search if no results are found.

    5.  **Data Transformation:** If a record is found, the action takes the first
    result, flattens any nested JSON structures, and applies the configured 'Enrichment
    Prefix' to the keys.

    6.  **Internal Mutation:** Updates the entity's 'additional_properties' with the
    processed Airtable data.

    7.  **Finalization:** Updates all successful entities in the SecOps platform and
    outputs a summary message along with raw JSON results for the enriched entities
    and any errors encountered.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of entities with data retrieved from Airtable
      records.
