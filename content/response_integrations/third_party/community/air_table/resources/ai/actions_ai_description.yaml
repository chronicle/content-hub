  ai_description: >-
    ### General Description

    The **Get All Records** action retrieves a list of records from a specified table
    within an Airtable base. This action is designed to fetch structured data from
    Airtable, allowing users to pull reference information, lookup tables, or logs
    into a Google SecOps playbook. It supports limiting the number of records returned
    and sorting the results based on a specific column.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Base Id** | String | Yes | The unique identifier for the Airtable base (database).
    This can be found in the URL of the Airtable API documentation page for that base.
    |

    | **Table name** | String | Yes | The name of the specific table within the base
    from which to retrieve records. |

    | **Max Records** | String | Yes | The maximum number of rows/records to fetch
    from the table. |

    | **Sort by** | String | No | The name of the column (field) you wish to sort
    the records by. |

    | **Sort Direction** | DDL | Yes | The order in which to sort the records: 'Ascending'
    or 'Descending'. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Airtable API key from the integration
    configuration and the specific base and table details from the action parameters.

    2. **Sorting Logic**: It evaluates the 'Sort Direction' and 'Sort by' parameters
    to construct the appropriate sorting criteria for the Airtable API request.

    3. **Data Retrieval**: The action calls the Airtable API's `get_all` method, applying
    the record limit and sorting parameters.

    4. **Output**: The fetched records are converted to a JSON string and added to
    the action's results. The action concludes by reporting the total number of records
    successfully retrieved.


    ### Additional Notes

    - This action does not target specific entities (such as IP addresses or Hostnames)
    but instead performs a global fetch from the specified Airtable table.

    - If the **Sort by** parameter is left empty, the action will retrieve records
    in the default order provided by the Airtable API.
