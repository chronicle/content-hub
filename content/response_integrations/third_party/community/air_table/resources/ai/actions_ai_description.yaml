    a search criterion. This action allows for bulk updates of records that match
    a specific field value, enabling automated data management within Airtable bases.\n\n###
    Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---
    | :--- | :--- | :--- |\n| Base id | String | Yes | The ID of the Airtable base
    (found in the API URL). |\n| Table name | String | Yes | The name of the table
    within the base. |\n| Field name | String | Yes | The name of the field (column)
    to search for matching records. |\n| Field value | String | Yes | The value to
    match in the specified 'Field name'. |\n| Json fields | Content | Yes | A JSON
    dictionary of field names and their new values to be updated (e.g., `{\"Status\":
    \"Closed\"}`). |\n| Max records | String | Yes | The maximum number of records
    to be updated in a single execution. |\n\n### Flow Description\n1. **Search**:
    The action searches the specified Airtable table for records where the 'Field
    name' matches the 'Field value'.\n2. **Limit**: It retrieves up to the number
    of records specified in 'Max records'.\n3. **Update**: For each record found,
    it applies the updates defined in the 'Json fields' parameter using the Airtable
    record ID.\n4. **Report**: Returns the total count of successfully updated records
    as the action result.\n\n### Additional Notes\nEnsure the 'Json fields' parameter
    is a valid JSON string. If 'Max records' is not a valid integer, the action defaults
    to a limit of 5 records.
