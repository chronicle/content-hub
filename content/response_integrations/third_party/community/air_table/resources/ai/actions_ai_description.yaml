    ### General Description

    The **Search** action allows users to query a specific table within an Airtable
    base to find records that match a particular field value. It is a read-only operation
    designed to retrieve structured data from Airtable for use in playbooks or investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Field value** | String | Yes | The specific value you are looking for within
    the designated field. |

    | **Field name** | String | Yes | The name of the column (field) in the Airtable
    table where the search should be performed. |

    | **Table name** | String | Yes | The name of the table within the Airtable base
    that contains the data. |

    | **Base id** | String | Yes | The unique identifier for the Airtable base (found
    in the API documentation or URL). |

    | **Max records** | String | No | The maximum number of records to return. Defaults
    to 100 if not specified. |


    ### Additional Notes

    - This action does not process SOAR entities; it operates strictly based on the
    provided parameters.

    - The search is performed using the Airtable API's search functionality, which
    typically looks for exact matches or specific patterns depending on the field
    type.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Airtable API key from
    the integration configuration.

    2. **Parameter Parsing**: It extracts the Base ID, Table Name, Field Name, Field
    Value, and the maximum number of records to return from the action input.

    3. **Client Initialization**: An Airtable client is initialized using the provided
    Base ID and Table Name.

    4. **Execution**: The action calls the Airtable `search` method, passing the field
    name and value to filter the records.

    5. **Result Processing**: The retrieved records are counted and formatted into
    a JSON structure.

    6. **Output**: The action returns the JSON results to the SOAR platform and provides
    a summary message indicating how many records were successfully matched.
