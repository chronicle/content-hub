Get All Records:
  ai_description: >-
    ### General Description

    Retrieves all records from a specified table within an Airtable base. This action
    allows users to fetch data, optionally sorting it by a specific column and limiting
    the number of returned records.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves action parameters including Base ID, Table name, Max Records, Sort
    by, and Sort Direction.

    3. Initializes the Airtable client with the provided credentials and base details.

    4. Determines the sorting direction (ascending or descending).

    5. Makes an API call (`airtable.get_all`) to fetch the records from the specified
    table, applying the sorting and limit parameters if provided.

    6. Adds the retrieved records to the action's JSON result.

    7. Completes the action and outputs a message indicating the number of records
    fetched.


    ### Additional Notes

    - The action relies on the `airtable` Python library to interact with the Airtable
    API.

    - The results are returned as a JSON array containing the fetched records.
  ai_short_description: >-
    Retrieves all records from a specified table within an Airtable base, with optional
    sorting and record limits.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
