  ai_description: >-
    ### General Description

    Creates new records in a specified Airtable base and table. This action allows
    users to insert multiple rows of structured data into an Airtable database by
    providing the fields and values in a JSON format.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Base id | String | Yes | The ID of the Airtable base where the data will be
    stored. The base ID can typically be found in the URL of the API page of the base.
    |

    | Table name | String | Yes | The name of the table within the specified base
    where the records will be inserted. |

    | Json fields | Content (JSON) | Yes | A JSON-formatted string containing an array
    of objects. Each object represents a row to be created, with keys as field names
    and values as the corresponding cell data. |


    ### Flow Description

    1. Initializes the Airtable client using the provided API key, Base ID, and Table
    name.

    2. Parses the `Json fields` parameter into a list of row objects.

    3. Iterates through the list of rows, executing an insert operation for each row
    into the specified Airtable table.

    4. Collects the IDs and resulting fields of the newly created records.

    5. Outputs a JSON result containing the created records and completes the action
    with a summary message indicating the number of records added.
