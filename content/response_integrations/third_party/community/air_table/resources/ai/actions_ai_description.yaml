Create:
  ai_description: >-
    ### General Description

    Creates new records in a specific AirTable table. This action takes a JSON array
    of row data and inserts them into the designated AirTable base and table.


    ### Flow Description

    1. Extracts the AirTable API key from the integration configuration.

    2. Retrieves the Base ID, Table Name, and JSON fields from the action parameters.

    3. Parses the provided JSON fields into a list of dictionaries representing the
    rows to be inserted.

    4. Iterates through the parsed rows and makes an API call (`airtable.insert`)
    to insert each record into the specified AirTable table.

    5. Collects the IDs and fields of the newly created records.

    6. Returns the results as a JSON object and outputs a summary message indicating
    the number of records successfully added.


    ### Additional Notes

    This action supports the creation of multiple rows simultaneously. The `Json fields`
    parameter must be formatted as a valid JSON array of objects, where each object
    represents a row and its keys represent the column names.
