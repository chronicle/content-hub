  ai_description: >-
    This action synchronizes data with an Airtable database by adding new records
    or updating existing ones based on a specified field identifier. Flow: 1. Extracts
    configuration parameters (API key, Base ID, Table Name, Field Name, JSON fields).
    2. Parses the Json fields input string into a list of dictionaries. 3. Iterates
    through each record in the list. 4. Searches for existing records in the specified
    Airtable table using the provided Field name as a key. 5. If a record is found,
    it updates the existing record with the new data. 6. If no record is found, it
    inserts a new record into the table. 7. Returns a summary of the total records
    inserted and updated. Parameters: Base id (string, mandatory): The ID of the Airtable
    base. Table name (string, mandatory): The name of the table within the base. Field
    name (string, mandatory): The field name used to identify existing records for
    update. Json fields (string, mandatory): A JSON string representing the records
    to be added or updated.
