  ai_description: >-
    Enriches entities by searching for matching records in a specified Airtable table.
    This action allows users to map SOAR entities to custom data stored in Airtable
    (such as asset inventories, user directories, or threat intelligence lists) and
    pull that data back into the entity's additional properties.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Airtable API key, Base ID, Table Name,
    and search parameters from the action configuration.

    2. **Search Value Determination:** For each target entity, the action determines
    the search value. By default, it uses the entity's identifier, but it can be configured
    to use a specific value from the entity's existing additional properties via the
    'Entity Field' parameter.

    3. **Airtable Query:** Executes a search in the specified Airtable table, looking
    for records where the 'Field name' column matches the search value. It performs
    a case-sensitive search first, followed by a case-insensitive search if no results
    are found.

    4. **Data Processing:** If a record is found, the action flattens the Airtable
    record (handling nested dictionaries and lists) and applies the specified 'Enrichment
    Prefix'.

    5. **Entity Update:** Updates the entity's additional properties with the retrieved
    data and saves the changes within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Enrichment Prefix | string | No | A prefix (default: 'AT_') added to the keys
    of the data retrieved from Airtable before adding them to the entity properties.
    |

    | Max records | string | No | The maximum number of records to retrieve from Airtable
    (default: 100). Note: The action currently processes only the first record found.
    |

    | Base id | string | Yes | The unique identifier for the Airtable base (database).
    Found in the Airtable API documentation URL. |

    | Table name | string | Yes | The name of the specific table within the base to
    search. |

    | Field name | string | Yes | The name of the column in the Airtable table to
    match against the entity value. |

    | Entity Field | string | No | The specific entity property to use for the search.
    If left blank, the entity's Identifier is used. |


    ### Additional Notes

    - The action is designed to handle complex Airtable data structures by flattening
    them into a key-value format suitable for entity properties.

    - If multiple records are found in Airtable, the action currently only utilizes
    the first record returned.
