AirTable Connector:
  ai_description: "### General Description\nThe AirTable Connector enables Google\
    \ SecOps to ingest records from specific AirTable bases and tables. It allows\
    \ security teams to monitor AirTable data\u2014such as asset lists, indicator\
    \ feeds, or manual logs\u2014and automatically convert them into cases and alerts\
    \ for orchestration and response.\n\n### Parameters Description\n| Parameter |\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Api key |\
    \ Password | Yes | Your API Key found in your account overview under API. |\n\
    | Base id | String | Yes | The database ID found in the URL of the base's API\
    \ page. |\n| Table name | String | Yes | The name of the table within the base\
    \ to ingest from. |\n| Alert type | String | Yes | Determines the Alert type/Rule\
    \ Generator for the ingested cases. |\n| DeviceProductField | String | Yes | The\
    \ field name used to determine the device product. |\n| EventClassId | String\
    \ | Yes | The field name used to determine the event name (sub-type). |\n| Max\
    \ records | String | Yes | The maximum number of rows to fetch (default 300).\
    \ |\n| PythonProcessTimeout | String | Yes | Timeout limit in seconds for the\
    \ script execution. |\n| Alert name field | String | No | Column name to use for\
    \ the Alert name. |\n| Alert name prefix | String | No | Prefix to add to the\
    \ alert name. |\n| Field name | String | No | The column name to filter records\
    \ by. |\n| Field value | String | No | The value(s) (comma-separated) to search\
    \ for in the Field name column. |\n\n### Flow Description\n1. Establishes a connection\
    \ to the AirTable API using the provided API Key, Base ID, and Table Name.\n2.\
    \ Determines the retrieval strategy: if 'Field name' and 'Field value' are provided,\
    \ it performs a targeted search; otherwise, it retrieves all records up to the\
    \ 'Max records' limit.\n3. Iterates through the retrieved records and maps all\
    \ AirTable fields to case extensions.\n4. Generates a unique CaseInfo object for\
    \ each record, assigning a unique ticket ID and source grouping identifier.\n\
    5. Configures the case name using the 'Alert name field' and optional 'Alert name\
    \ prefix'.\n6. Sets the alert priority to Medium (60) and assigns the 'Alert type'\
    \ as the rule generator.\n7. Packages the records as cases and ingests them into\
    \ Google SecOps."
