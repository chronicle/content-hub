AirTable Connector:
  ai_description: "### General Description\nThe AirTable Connector enables the ingestion\
    \ of records from Airtable tables into Google SecOps as alerts and cases. This\
    \ integration allows security teams to treat Airtable as a data source for tracking\
    \ incidents, assets, or logs, facilitating automated response workflows based\
    \ on spreadsheet-style data.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Api key | Password\
    \ | Yes | Your Airtable API Key, found in your account overview. |\n| Base id\
    \ | String | Yes | The unique ID for the Airtable base (database), found in the\
    \ API documentation URL for that base. |\n| Table name | String | Yes | The name\
    \ of the specific table within the base to fetch records from. |\n| Alert type\
    \ | String | Yes | Determines the Alert Type (Rule Generator) for the ingested\
    \ cases. |\n| Max records | String | Yes | The maximum number of rows to fetch\
    \ from the table per execution. |\n| Alert name field | String | No | The Airtable\
    \ column name used to populate the Alert name. |\n| Alert name prefix | String\
    \ | No | A string to prepend to the Alert name for better identification. |\n\
    | Field name | String | No | The column name to use for filtering records. |\n\
    | Field value | String | No | The specific value(s) to search for in the 'Field\
    \ name' column (supports comma-separated values). |\n| DeviceProductField | String\
    \ | Yes | The field name used to determine the device product (defaults to 'AirTable'\
    \ in logic). |\n| EventClassId | String | Yes | The field name used to determine\
    \ the event name or sub-type. |\n| PythonProcessTimeout | String | Yes | The timeout\
    \ limit (in seconds) for the connector execution. |\n\n### Flow Description\n\
    1. **Authentication**: Connects to the Airtable API using the provided API Key\
    \ and targets the specified Base ID.\n2. **Data Retrieval**: \n    * If a `Field\
    \ name` and `Field value` are provided, the connector searches for records where\
    \ that column matches the specified values (handling comma-separated lists).\n\
    \    * If no filter is provided, it fetches all available records from the specified\
    \ `Table name` up to the `Max records` limit.\n3. **Mapping**: Iterates through\
    \ each retrieved record and maps Airtable columns to Google SecOps case extensions.\
    \ Spaces in column names are replaced with underscores.\n4. **Case Creation**:\
    \ Generates a `CaseInfo` object for each record, setting the alert name based\
    \ on the `Alert name field` and applying the `Alert type`.\n5. **Ingestion**:\
    \ Packages the cases and events, then sends them to the Google SecOps platform\
    \ for processing."
