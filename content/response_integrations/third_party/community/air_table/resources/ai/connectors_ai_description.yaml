AirTable Connector:
  ai_description: >-
    ### General Description

    The Airtable Connector enables the ingestion of records from an Airtable database
    into Google SecOps. It allows security teams to monitor data stored in Airtable
    tables and automatically convert these records into actionable cases or alerts
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert name field | String | No | The Airtable column name used to determine
    the Alert name. |

    | Alert name prefix | String | No | A prefix to prepend to the generated alert
    name. |

    | Alert type | String | Yes | The Airtable column name used to determine the Alert
    type. |

    | Api key | String | Yes | The API key for authenticating with Airtable. |

    | Base id | String | Yes | The ID of the Airtable Base containing the data. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Field name | String | No | The specific field name to filter records by. |

    | Field value | String | No | The value to search for within the specified field
    name. |

    | Max records | Integer | Yes | The maximum number of records to fetch from the
    table. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process. |

    | Table name | String | Yes | The name of the table within the Airtable Base to
    ingest from. |


    ### Flow Description

    1. The connector initializes and extracts configuration parameters, including
    API credentials and table identifiers.

    2. It establishes a connection to the specified Airtable Base and Table.

    3. It retrieves records from the table, optionally filtering by a specific field
    and value if provided.

    4. For each retrieved record, the connector maps the Airtable fields to SOAR case
    extensions.

    5. It generates a case with a unique identifier, setting the priority, start/end
    times, and alert details based on the record data.

    6. The processed cases are returned to the SOAR platform for further investigation
    and response.
