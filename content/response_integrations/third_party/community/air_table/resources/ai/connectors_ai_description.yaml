AirTable Connector:
  ai_description: >-
    ### General Description

    The Airtable Connector facilitates the ingestion of records from a specified Airtable
    base and table into Google SecOps. It transforms Airtable records into security
    cases, enabling users to monitor and respond to data stored in Airtable within
    the SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert name field | String | No | Airtable column name to use for the alert name.
    |

    | Alert name prefix | String | No | Prefix to prepend to the alert name. |

    | Alert type | String | Yes | The alert type/rule generator name. |

    | Api key | Password | Yes | Airtable API key. |

    | Base id | String | Yes | The ID of the Airtable base. |

    | DeviceProductField | String | Yes | Field name used to determine the device
    product. |

    | EventClassId | String | Yes | Field name used to determine the event name. |

    | Field name | String | No | Airtable field name to filter by. |

    | Field value | String | No | Value to search for in the specified field. |

    | Max records | String | Yes | Maximum number of records to fetch. |

    | PythonProcessTimeout | String | Yes | Timeout limit for the script execution.
    |

    | Table name | String | Yes | The name of the table within the base. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters, including
    authentication credentials and target Airtable details.

    2. It establishes a connection to the Airtable API using the provided API key,
    Base ID, and Table Name.

    3. If a specific `Field name` and `Field value` are provided, the connector queries
    the table for matching records; otherwise, it fetches all records up to the configured
    `Max records` limit.

    4. For each retrieved record, the connector maps the Airtable fields to case extensions
    and generates a new security case.

    5. The generated cases, including relevant event data, are packaged and ingested
    into the Google SecOps platform for further analysis.
