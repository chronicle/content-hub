title: Signal Sciences - List Sites
type: html
scope: alert
action_identifier: List Sites
description: This widget shows the list of sites
data_definition:
    html_height: 400
    safe_rendering: false
    widget_definition_scope: both
    type: html
condition_group:
    conditions:
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: '[]'
        match_type: not_equal
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: ''
        match_type: is_not_empty
    logical_operator: and
default_size: half_width
