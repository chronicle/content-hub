  network_security: true
  reasoning: >-
    The Signal Sciences integration is a Web Application Firewall (WAF) management
    tool. Its primary capabilities involve managing IP allow and block lists, which
    directly aligns with the Network Security category, as it allows the agent to
    block or permit malicious IPs at the gateway. It does not perform SIEM log analysis,
    EDR host-level investigation, threat intelligence enrichment (it does not provide
    reputation scores), or any other functions related to IAM, ITSM, or cloud resource
    management.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
