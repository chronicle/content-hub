  reasoning: >-
    The Signal Sciences integration is a Web Application Firewall (WAF) tool. Its
    primary capabilities involve managing IP allow and block lists, which directly
    aligns with the 'Network Security' category. Specifically, the actions allow for
    blocking malicious IPs or allowing legitimate traffic at the gateway level, matching
    the expected outcome of network security integrations. It does not perform SIEM
    log analysis, EDR host-level investigation, threat intelligence enrichment, or
    other functions like ITSM, IAM, or vulnerability management.
