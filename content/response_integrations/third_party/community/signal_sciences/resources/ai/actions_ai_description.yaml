  ai_description: >-
    The **Add IP to Block List** action enables security analysts to block specific
    IP addresses within a designated site in the Signal Sciences platform. This action
    helps mitigate threats by preventing malicious traffic from interacting with protected
    resources.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Site Name`, `IP Address`
    (optional), and `Note` (mandatory) from the action configuration.

    2. **Target Identification**: It aggregates IP addresses from the `IP Address`
    parameter and any `ADDRESS` type entities present in the current case.

    3. **Pre-check**: It fetches the existing block list for the specified site to
    identify if any target IPs are already blocked, preventing redundant API calls.

    4. **Execution**: For each new IP address, it performs a PUT request to the Signal
    Sciences API to add the IP to the block list with the provided justification note.

    5. **Result Reporting**: It compiles the results, indicating which IPs were successfully
    added and which failed, and updates the action output message accordingly.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | string | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | string | No | A comma-separated list of IP addresses to add to
    the Signal Sciences block list. If not provided, the action will attempt to use
    IP entities from the case. |

    | Note | string | Yes | The descriptive note or justification associated with
    the blocked IP address. |


    ### Additional Notes

    - The action requires either the `IP Address` parameter to be populated or `ADDRESS`
    type entities to be present in the case for it to perform any blocking operations.
    If neither is provided, the action will terminate without performing any changes.
