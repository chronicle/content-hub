    ### General Description

    The **List Sites** action retrieves a list of all sites available within the configured
    corporation in Signal Sciences.


    ### Flow Description

    1. Extracts the `Max Sites To Return` parameter.

    2. Validates the parameter to ensure it is a valid integer.

    3. Makes a GET request to the Signal Sciences API (`/corps/{corp_name}/sites`)
    to fetch the list of sites, handling pagination automatically.

    4. Parses the response and constructs a data table containing the site details
    (Name, Display Name, Created, Agent Level).

    5. Returns the JSON results, the data table, and a success message.


