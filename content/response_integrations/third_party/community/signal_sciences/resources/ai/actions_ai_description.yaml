Add IP to Allow List:
  ai_description: >-
    Adds one or more IP addresses to the Signal Sciences Allow List for a specific
    site. This action allows analysts to proactively permit traffic from specific
    sources by updating the Signal Sciences configuration. It processes IP addresses
    provided directly as parameters as well as IP Address entities present in the
    current SOAR context.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the 'Site Name', 'IP Address' (optional
    list), and 'Note' (mandatory justification) from the action input.

    2. **Target Identification:** Collects IP addresses from the 'IP Address' parameter
    and identifies all 'ADDRESS' entities within the case.

    3. **Pre-check:** Fetches the existing allow list for the specified site from
    Signal Sciences to identify IPs that are already listed.

    4. **Validation and Execution:** Validates the format of each target IP. For IPs
    not already on the list, it performs a PUT request to the Signal Sciences API
    to add them, including the provided note.

    5. **Finalization:** Consolidates the results, reporting which IPs were successfully
    added, which already existed, and which failed (due to invalid format or API errors).


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard where the IP will be allowed. |

    | IP Address | String | No | A comma-separated list of IP addresses to add. If
    left empty, the action will only process IP Address entities from the case. |

    | Note | String | Yes | A descriptive note or justification for allowing the IP.
    This is a required field by the Signal Sciences API. |


    ### Additional Notes

    - The action deduplicates IP addresses found in both the parameters and the entities.

    - If an IP address is already present in the Signal Sciences allow list, the action
    treats it as a success but does not attempt to re-add it.
