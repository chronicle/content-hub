    The **Remove IP from Allow List** action removes specified IP addresses from the
    allow list of a designated site within the Signal Sciences platform. This action
    helps maintain security posture by ensuring that only authorized IPs remain on
    the allow list.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Site Name` and an optional
    comma-separated list of `IP Address` values from the action parameters.

    2. **Entity Collection**: It collects IP addresses from the provided `IP Address`
    parameter and identifies any `ADDRESS` entities present in the current SOAR case.

    3. **Data Retrieval**: It fetches the current allow list for the specified site
    from Signal Sciences to identify the unique `item_id` associated with each target
    IP.

    4. **Removal**: For each identified IP, the action performs a DELETE request to
    remove the corresponding entry from the Signal Sciences allow list.

    5. **Finalization**: The action reports the success or failure of the removal
    process for each IP address.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | string | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | string | No | A comma-separated list of IP addresses to remove
    from the Signal Sciences allow list. If not provided, the action will process
    `ADDRESS` entities from the case. |


    ### Additional Notes

    - The action requires either the `IP Address` parameter to be populated or `ADDRESS`
    entities to be present in the case for it to perform any removal operations. If
    neither is provided, the action will terminate with a message indicating no IPs
    were found.
