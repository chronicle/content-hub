Remove IP from Allow List:
  ai_description: >-
    ### General Description

    The **Remove IP from Allow List** action is used to remove specific IP addresses
    from the allow list of a designated site within Signal Sciences. This action is
    useful for revoking previously granted access or trust for specific network indicators.
    It can process IP addresses provided directly as parameters or automatically identify
    and process IP Address entities within the SOAR case context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. This determines which site's allow list will be modified.
    |

    | IP Address | String | No | A comma-separated list of IP addresses to remove.
    If this parameter is left empty, the action will attempt to use all IP Address
    entities found in the current context. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Site Name` and the optional
    `IP Address` list from the input parameters.

    2. **Target Identification:** It identifies target IP addresses by combining those
    provided in the `IP Address` parameter with any `ADDRESS` entities found in the
    case context. The list is then deduplicated.

    3. **Allow List Retrieval:** The action fetches the current allow list for the
    specified site from the Signal Sciences API to find the internal IDs associated
    with the target IPs.

    4. **Validation and Matching:** For each target IP, the action validates the IP
    format. It then searches the retrieved allow list for entries where the source
    matches the target IP.

    5. **Removal Execution:** For every matching entry found, the action sends a DELETE
    request to Signal Sciences to remove that specific item from the allow list.

    6. **Finalization:** The action summarizes the results, listing which IPs were
    successfully removed and which encountered errors.


    ### Additional Notes

    - If an IP address is not found in the allow list, the action treats it as a success
    (as the desired state of the IP not being on the list is met).

    - Either the `IP Address` parameter must be populated, or the case must contain
    `ADDRESS` entities for the action to have targets to process.
