  ai_description: >-
    ### General Description

    This action adds one or more IP addresses to the Allow List for a specific site
    within the Signal Sciences platform. It ensures that traffic from these IP addresses
    is permitted by updating the site's security configuration. The action supports
    both manual input of IP addresses and the processing of IP entities attached to
    the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | string | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | string | No | A comma-separated list of IP addresses to add to
    the Signal Sciences allow list. If not provided, the action will attempt to process
    IP entities from the case. |

    | Note | string | Yes | A descriptive note or justification for adding the IP
    address to the allow list. This is required by the Signal Sciences API. |


    ### Additional Notes

    - The action will attempt to process IP addresses provided in the 'IP Address'
    parameter. If no IPs are provided via the parameter, it will fall back to processing
    any 'ADDRESS' type entities associated with the current case.

    - The action validates that the provided strings are valid IPv4 or IPv6 addresses
    before attempting to add them.

    - If an IP address already exists in the allow list for the specified site, the
    action will skip the addition for that IP.


    ### Flow Description

    1. **Extraction**: The action extracts the 'Site Name', 'IP Address', and 'Note'
    parameters.

    2. **Collection**: It collects target IP addresses from the 'IP Address' parameter
    and any 'ADDRESS' entities found in the case.

    3. **Validation**: Each collected IP is validated to ensure it is a correct IP
    format.

    4. **Check Existing**: The action fetches the current allow list for the specified
    site to avoid duplicate entries.

    5. **Execution**: For each unique, valid IP not already in the allow list, the
    action sends a PUT request to the Signal Sciences API to add the IP with the provided
    note.

    6. **Reporting**: The action constructs a result summary detailing which IPs were
    successfully added and which failed.
