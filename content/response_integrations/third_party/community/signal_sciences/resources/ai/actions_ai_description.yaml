  ai_description: "### General Description\nThe **Remove IP from Block List** action\
    \ is used to remove specific IP addresses from the block list of a designated\
    \ site within Signal Sciences. This action is typically used in response to false\
    \ positives or when a previously blocked IP is deemed safe, restoring its ability\
    \ to interact with the protected site.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Site Name\
    \ | string | True | The API name of the site as defined in the Signal Sciences\
    \ dashboard. |\n| IP Address | string | False | A comma-separated list of IP addresses\
    \ to remove from the Signal Sciences block list. If provided, these will be processed\
    \ alongside any IP entities found in the scope. |\n\n### Additional Notes\n- The\
    \ action processes both IP addresses provided in the `IP Address` parameter and\
    \ any `ADDRESS` entities present in the current context.\n- If an IP address is\
    \ not found in the block list, the action treats it as a success (as the desired\
    \ state\u2014not being blocked\u2014is already met).\n- The action validates that\
    \ the provided strings are valid IPv4 or IPv6 addresses before attempting removal.\n\
    \n### Flow Description\n1. **Parameter Extraction:** The action retrieves the\
    \ `Site Name` and the optional `IP Address` list from the input parameters.\n\
    2. **Entity Identification:** It identifies all `ADDRESS` entities in the current\
    \ SOAR context.\n3. **Target Consolidation:** It combines the IPs from the parameters\
    \ and the entities into a single, deduplicated list of target IPs.\n4. **Block\
    \ List Retrieval:** The action fetches the current block list for the specified\
    \ site from Signal Sciences to identify the internal IDs associated with the target\
    \ IPs.\n5. **Removal Execution:** For each target IP, the action searches for\
    \ a matching entry in the retrieved block list. If found, it sends a request to\
    \ Signal Sciences to delete that specific block list item.\n6. **Finalization:**\
    \ The action reports which IPs were successfully removed (or were already absent)\
    \ and which ones failed (e.g., due to invalid format or API errors)."
