List Sites:
  ai_description: >-
    Retrieves a list of all sites associated with the configured corporation in Signal
    Sciences. This action is useful for discovering available site names and their
    metadata, such as display names and agent levels, which are often required as
    inputs for other Signal Sciences actions. It supports automatic pagination to
    ensure all requested records are retrieved.


    ### Parameters


    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Max Sites To Return | string | No | 50 | The maximum number of sites to return.
    Setting this value to 0 or leaving it empty returns all available sites. |


    ### Additional Notes

    - This action does not require any input entities and runs at the corporation
    level.

    - The results are presented both as a JSON object and as a formatted data table
    named 'Signal Sciences Sites'.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the 'Max Sites To Return' parameter
    and validates that it is a valid integer.

    2. **API Interaction:** It calls the Signal Sciences API to fetch site information
    for the configured corporation.

    3. **Pagination:** The action handles pagination automatically, continuing to
    fetch pages until the specified limit is reached or all sites are retrieved.

    4. **Data Processing:** The raw API response is transformed into structured 'Site'
    objects.

    5. **Output Generation:** The action populates the JSON results, creates a data
    table for the case wall, and generates a success message listing the names of
    the retrieved sites.
