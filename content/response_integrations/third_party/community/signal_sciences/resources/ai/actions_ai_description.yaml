  ai_description: "### General Description\nThe **List Sites** action retrieves a\
    \ list of all sites available within the configured corporation in Signal Sciences.\
    \ This action is primarily used for discovery purposes, allowing users to identify\
    \ the specific site names required as inputs for other Signal Sciences actions,\
    \ such as blocking or allowing IP addresses.\n\n### Parameters Description\n|\
    \ Parameter Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Max Sites To Return | String | No | The maximum number of sites to return\
    \ in the results. If set to 0 or left empty, the action will attempt to retrieve\
    \ all available sites. The default value is 50. |\n\n### Flow Description\n1.\
    \ **Parameter Extraction and Validation**: The action extracts the `Max Sites\
    \ To Return` parameter and validates that it is a valid integer. If the parameter\
    \ is missing or empty, it defaults to 0 (returning all sites).\n2. **API Interaction**:\
    \ The action calls the Signal Sciences API to fetch site information. It uses\
    \ internal pagination logic to ensure that the requested number of records (or\
    \ all records) are retrieved correctly from the corporation's account.\n3. **Data\
    \ Transformation**: The raw API response is processed into structured `Site` data\
    \ models. \n4. **Result Generation**: \n    *   **JSON Results**: The action populates\
    \ the JSON results with the raw data for each site found.\n    *   **Data Table**:\
    \ A table named \"Signal Sciences Sites\" is created, displaying the API Name,\
    \ Display Name, Creation Date, and Agent Level for each site.\n    *   **Output\
    \ Message**: A summary message is generated listing the names of all successfully\
    \ fetched sites.\n\n### Additional Notes\n- This action does not operate on specific\
    \ entities (like IPs or Hostnames) and instead fetches global configuration data\
    \ for the corporation.\n- If no sites are found, the action will return a successful\
    \ status with a message indicating that no sites were found."
