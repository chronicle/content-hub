Remove IP from Block List:
  ai_description: >-
    Removes specific IP addresses from the Signal Sciences block list (blacklist)
    for a designated site. The action identifies target IPs from both the 'IP Address'
    input parameter and any IP Address entities present in the current context. It
    first retrieves the existing block list for the specified site to find the internal
    IDs associated with the target IPs and then issues deletion requests to remove
    them.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the mandatory 'Site Name' and the optional
    'IP Address' list from the action configuration.

    2. **Entity Identification:** Collects IP addresses from the 'IP Address' parameter
    and identifies all 'ADDRESS' entities in the scope.

    3. **Data Retrieval:** Fetches the current block list for the specified site from
    Signal Sciences to map IP addresses to their unique item IDs.

    4. **Validation:** Validates that each target IP is a correctly formatted IPv4
    or IPv6 address.

    5. **Removal Logic:** For each valid target IP, the action searches the retrieved
    block list. If a match is found, it calls the Signal Sciences API to delete that
    specific entry.

    6. **Finalization:** Summarizes the results, listing which IPs were successfully
    removed and which failed (due to invalid format or API errors).


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | string | True | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | string | False | A comma-separated list of IP addresses to remove.
    If not provided, the action will only process IP Address entities. |


    ### Additional Notes

    - If an IP address is already absent from the block list, the action treats it
    as a success.

    - The action requires the 'Site Name' to be the API-specific name, not necessarily
    the display name.
