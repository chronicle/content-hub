      The action fetches the current allow list from Signal Sciences (fetches_data=true)
      to check for existing IPs. It then iterates through the target IPs and makes
      a PUT request to add them to the allow list, which mutates external data (can_mutate_external_data=true).
      It does not update entities, create insights, or add case comments in Google
      SecOps (can_mutate_internal_data=false).
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding IPs to an allow list, so it cannot
      be classified as Enrichment. It does not perform identity, host, or network-based
      blocking/remediation (it allows rather than blocks), so it is not classified
      as Remediation.
    remediation: false
