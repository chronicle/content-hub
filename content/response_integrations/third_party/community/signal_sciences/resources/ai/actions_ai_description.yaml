    Sciences. This action initiates a state change on the external system to re-enable
    standard security monitoring and blocking for the specified IP addresses.


    ### Flow Description

    1. Extracts the target site name and IP addresses from the action parameters.

    2. Retrieves additional IP addresses from the target entities if they are of type
    ADDRESS.

    3. Fetches the current allow list for the specified site using the Signal Sciences
    API (GET request).

    4. Iterates through the combined list of IP addresses, validating their format
    (IPv4 or IPv6).

    5. For each valid IP, checks if it exists in the retrieved allow list.

    6. If a match is found, sends a DELETE request to the Signal Sciences API to remove
    the IP from the allow list.

    7. Returns a summary of successfully removed and failed IP addresses.


