  ai_description: >-
    ### General Description

    Adds IP addresses to the Signal Sciences allow list for a specific site. This
    action allows users to provide IP addresses either through a comma-separated parameter
    or by automatically processing IP entities present in the current SecOps case.
    It validates the IP format and checks for existing entries to avoid duplicates
    before performing the update.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | String | No | A comma-separated list of IP addresses to add. If
    provided, these are processed in addition to any IP entities found in the case.
    |

    | Note | String | Yes | The descriptive note or justification associated with
    the allowed IP address. This is required by the Signal Sciences API. |


    ### Additional Notes

    - The action will skip IP addresses that are already present in the site's allow
    list.

    - Both IPv4 and IPv6 addresses are supported and validated before processing.

    - If no IPs are provided via parameters and no IP entities are found in the case,
    the action will terminate with a message.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'Site Name', 'IP Address' list, and
    'Note' from the action configuration.

    2. **Entity Collection**: Identifies target IP addresses from the 'IP Address'
    parameter and filters the case's target entities for those of type ADDRESS.

    3. **Deduplication and Validation**: Combines all identified IPs, removes duplicates,
    and validates that each string is a valid IP address.

    4. **Pre-check**: Fetches the current allow list for the specified site from Signal
    Sciences to identify IPs that are already allowed.

    5. **External Mutation**: For each valid IP not already on the list, sends a PUT
    request to the Signal Sciences API to add the IP with the provided note.

    6. **Finalization**: Aggregates the results, providing a summary of successfully
    added IPs and any that failed or were skipped.
