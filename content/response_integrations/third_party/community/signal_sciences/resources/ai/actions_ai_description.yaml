  ai_description: >-
    ### General Description

    Use the **Add IP to Block List** action to add specific IP addresses to the block
    list of a designated site in Signal Sciences. This action helps in mitigating
    threats by blocking malicious traffic at the WAF level.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | String | No | A comma-separated list of IP addresses to add. If
    empty, the action uses ADDRESS entities from the case. |

    | Note | String | Yes | The descriptive note or justification for blocking the
    IP. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Site Name, IP Address list,
    and Note.

    2. **IP Collection:** It identifies target IPs from the input parameter and the
    case's ADDRESS entities, then deduplicates them.

    3. **Validation:** Each IP is checked for valid IPv4/IPv6 format.

    4. **Pre-check:** The action fetches the existing block list for the site to avoid
    redundant API calls.

    5. **Execution:** It adds new IPs to the Signal Sciences block list using the
    provided note.

    6. **Finalization:** Success and failure statuses are reported for each IP.


    ### Additional Notes

    Either the 'IP Address' parameter must be populated, or the case must contain
    ADDRESS entities for the action to have targets to process.
