Add IP to Allow List:
  ai_description: >-
    ### General Description

    Adds specified IP addresses to the Allow List for a specific site in Signal Sciences.
    This action modifies the external system's configuration to ensure the provided
    IP addresses are trusted and allowed to access the site.


    ### Flow Description

    1. Extracts the `Site Name`, `Note`, and optional `IP Address` parameters.

    2. Collects target IP addresses from the provided parameter (comma-separated)
    and any matching Address entities in the case.

    3. Retrieves the current allowlist for the specified site from Signal Sciences
    via a GET request to check for existing entries.

    4. Iterates through the target IPs, validating their format (IPv4 or IPv6).

    5. If an IP is not already in the allowlist, it makes a PUT request to the Signal
    Sciences API (`/corps/{corp_name}/sites/{site_name}/whitelist`) to add the IP.

    6. Returns a JSON result summarizing the successfully added and failed IP addresses.


    ### Additional Notes

    The action automatically skips invalid IP addresses and IPs that are already present
    in the allowlist. It supports both IPv4 and IPv6 formats.
  ai_short_description: >-
    Adds specified IP addresses (provided via parameters or Address entities) to the
    Allow List for a specific site in Signal Sciences.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specified IP addresses to the allowlist for a specific site in Signal Sciences.
    fetches_data: false
