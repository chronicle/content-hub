Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps platform and the Signal Sciences API. It ensures that the integration
    is correctly configured and that the service is reachable using the provided credentials.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration parameters (API Root, Email, API Token, and Corporation
    Name) to establish a connection.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting communication issues. It does not process any entities or modify
    any data.


    ### Flow Description

    1. **Initialize Client**: The action initializes the Signal Sciences API manager
    using the integration's configuration settings (API Root, Email, API Token, Corporation
    Name, and SSL verification settings).

    2. **Test Connectivity**: It performs a GET request to the Signal Sciences Corporation
    endpoint (`/corps/{corp_name}`) to validate the credentials and the corporation
    name.

    3. **Validate Response**:
       - If the API returns a successful response (HTTP 200), the action completes
    with a success message indicating connectivity.
       - If an exception occurs (e.g., network error, 401 Unauthorized, 404 Not Found),
    the action catches the error, logs the reason, and returns a failure status.
