  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Signal Sciences platform. It ensures that the provided credentials (Email,
    API Token) and configuration (API Root, Corporation Name) are correct and that
    the network allows communication with the Signal Sciences API.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | No | The base URL of the Signal Sciences API. Defaults to
    `https://dashboard.signalsciences.net`. |

    | Email | String | Yes | The email address associated with the Signal Sciences
    API user. |

    | API Token | String | Yes | The API token for authentication. |

    | Corporation Name | String | Yes | The name of the corporation in Signal Sciences.
    |

    | Verify SSL | Boolean | No | Whether to verify the SSL certificate of the API
    server. Defaults to `True`. |


    ### Flow Description

    1. **Initialize Client**: The action initializes the Signal Sciences API client
    using the integration's configuration parameters.

    2. **Test Connectivity**: It executes a `GET` request to the `/corps/{corp_name}`
    endpoint to verify that the API token and corporation name are valid.

    3. **Evaluate Result**: If the request returns a successful status code, the action
    reports a successful connection. If an exception occurs (e.g., 401 Unauthorized
    or connection timeout), it captures the error and marks the action as failed.


    ### Additional Notes

    This action does not process any entities or modify any data. It is strictly for
    diagnostic purposes to ensure the integration is configured correctly.
