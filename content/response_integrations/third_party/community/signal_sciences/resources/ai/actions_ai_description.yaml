Add IP to Block List:
  ai_description: >-
    ### General Description

    Use the **Add IP to Block List** action to add specific IP addresses to the block
    list of a designated site in Signal Sciences. This action helps in preventing
    malicious traffic by updating the security controls on the specified site.


    ### Flow Description

    1. Extracts the site name, note, and any manually provided IP addresses from the
    action parameters.

    2. Retrieves IP addresses from the target entities that match the `ADDRESS` entity
    type.

    3. Fetches the current block list for the specified site from the Signal Sciences
    API via a GET request.

    4. Iterates through the collected IP addresses, validating their format (IPv4
    or IPv6).

    5. Checks if each IP address is already present in the block list.

    6. If not present, makes a PUT request to the Signal Sciences API to add the IP
    address to the block list with the provided note.

    7. Returns a JSON result containing the successfully added and failed IP addresses.


    ### Additional Notes

    - Supported Entities: IP Address.

    - If an IP address is already present in the block list, the action will skip
    adding it again but will mark it as successful in the final output.
