  ai_description: >-
    ### General Description

    The **Remove IP from Allow List** action is designed to remove specific IP addresses
    from the allow list (whitelist) of a designated site within the Signal Sciences
    platform. This action is useful for revoking trusted status from IPs that are
    no longer considered safe or were added temporarily. It can process IPs provided
    directly as a parameter or identified as entities within the Google SecOps environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | string | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. This determines which site's allow list will be modified.
    |

    | IP Address | string | No | A comma-separated list of IP addresses to remove.
    If this parameter is provided, the action will process these IPs in addition to
    any IP Address entities found in the context. |


    ### Additional Notes

    - The action first retrieves the current allow list for the specified site to
    find the internal IDs associated with the target IP addresses.

    - If an IP address is not found in the allow list, the action treats it as successfully
    removed (since the desired state is achieved).

    - The action validates that the provided strings are valid IPv4 or IPv6 addresses
    before attempting removal.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Site Name` and the optional
    `IP Address` list from the input parameters.

    2. **Entity Collection:** It identifies all `ADDRESS` entities within the current
    alert context.

    3. **Consolidation:** It combines the IPs from the parameters and the entities
    into a single, deduplicated list of target IPs.

    4. **Allow List Retrieval:** The action calls the Signal Sciences API to fetch
    the existing allow list for the specified site.

    5. **Validation and Matching:** For each target IP, the action validates the format
    and searches for a matching entry in the retrieved allow list.

    6. **Removal:** If a match is found, the action sends a DELETE request to Signal
    Sciences using the specific item ID to remove the IP from the list.

    7. **Finalization:** The action reports the success or failure of the removal
    process for each IP and sets the final execution status.
