  ai_description: >-
    ### General Description

    Adds specific IP addresses to the block list of a designated site in Signal Sciences.
    This action modifies the external system's state to prevent network traffic from
    the specified IPs, acting as a remediation step.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | String | No | A comma-separated list of IP addresses to add to
    the Signal Sciences block list. |

    | Note | String | Yes | The descriptive note or justification associated with
    the blocked IP address. This field is mandatory for the Signal Sciences API. |


    ### Additional Notes

    The action can process IPs provided manually via the `IP Address` parameter as
    well as automatically extracting `ADDRESS` entities from the case. If an IP is
    already present in the block list, the action will skip adding it again to prevent
    duplication errors.


    ### Flow Description

    1. Extracts the site name, note, and any manually provided IP addresses from the
    action parameters.

    2. Collects `ADDRESS` entities from the case and combines them with the manually
    provided IPs, removing any duplicates.

    3. Retrieves the current block list for the specified site from Signal Sciences
    to check for existing entries.

    4. Iterates through the target IPs, validating that each is a proper IPv4 or IPv6
    address.

    5. Adds valid, non-duplicate IPs to the Signal Sciences block list via a PUT request.

    6. Returns a JSON result summarizing the successfully added and failed IPs.
