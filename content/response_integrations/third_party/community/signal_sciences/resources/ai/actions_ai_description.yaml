Add IP to Block List:
  ai_description: >-
    ### General Description

    The **Add IP to Block List** action allows security analysts to programmatically
    add IP addresses to the block list of a specific site within Signal Sciences.
    This action is used for containment and remediation by preventing traffic from
    known malicious or suspicious IP addresses. It supports both manual input via
    parameters and automatic processing of IP Address entities present in the Google
    SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard where the IP will be blocked. |

    | IP Address | String | No | A comma-separated list of IP addresses to add. If
    left empty, the action will only process IP Address entities from the case. |

    | Note | String | Yes | A mandatory descriptive note or justification for blocking
    the IP address, which is required by the Signal Sciences API. |


    ### Additional Notes

    - The action performs a de-duplication check: if an IP address is already present
    in the site's block list, it will not attempt to add it again but will report
    it as a success.

    - Both IPv4 and IPv6 addresses are supported and validated before submission.

    - If no IPs are provided via parameters and no IP entities are found in the case,
    the action will fail with an informative message.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Site Name`, `IP Address`
    list, and the mandatory `Note` from the input.

    2. **Target Identification:** It identifies target IP addresses by combining those
    provided in the `IP Address` parameter with any `ADDRESS` entities found in the
    current case context.

    3. **Pre-check:** It fetches the current block list for the specified site from
    Signal Sciences to identify IPs that are already blocked.

    4. **Validation and Execution:** For each unique target IP, the action validates
    the IP format. If valid and not already blocked, it sends a request to the Signal
    Sciences API to add the IP to the block list using the provided note.

    5. **Result Compilation:** The action tracks successful additions and failures,
    providing a summary message and a detailed JSON result containing the status of
    each processed IP.
