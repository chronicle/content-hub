  ai_description: >-
    Removes specific IP addresses from the allow list of a designated site in Signal
    Sciences. This action initiates a state change on the external platform to re-enable
    standard security monitoring and blocking for the specified IP addresses.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | String | No | A comma-separated list of IP addresses to remove
    from the Signal Sciences allow list. |


    ### Additional Notes

    The action can process IP addresses provided via the `IP Address` parameter, as
    well as ADDRESS entities attached to the case. At least one IP address must be
    provided either via the parameter or as a target entity for the action to execute
    successfully.


    ### Flow Description

    1. Extracts the `Site Name` and `IP Address` parameters.

    2. Collects target IP addresses from the parameter and any attached ADDRESS entities.

    3. Fetches the current allow list for the specified site from Signal Sciences
    to map IP addresses to their respective item IDs.

    4. Iterates through the target IPs, validating their format (IPv4 or IPv6).

    5. Checks if each IP exists in the fetched allow list.

    6. If found, sends a DELETE request to remove the IP from the allow list.

    7. Returns a success or failure message based on the execution results.
