  ai_description: >-
    Adds specified IP addresses to the Allow List for a specific site in Signal Sciences.
    The action interacts with the Signal Sciences API to update the site's whitelist,
    preventing the IPs from being blocked.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Site Name | String | Yes | The API name of the site as defined in the Signal
    Sciences dashboard. |

    | IP Address | String | No | A comma-separated list of IP addresses to add to
    the Signal Sciences allow list. |

    | Note | String | Yes | The descriptive note or justification associated with
    the allowed IP address. This field is mandatory for the Signal Sciences API. |


    ### Additional Notes

    The action can process IP addresses provided via the `IP Address` parameter as
    well as ADDRESS entities attached to the case. If an IP address is already present
    in the site's allow list, the action will skip adding it again and mark it as
    successful.


    ### Flow Description

    1. Extracts the `Site Name`, `IP Address`, and `Note` parameters.

    2. Collects target IP addresses from the `IP Address` parameter and any ADDRESS
    entities in the case.

    3. Retrieves the current allow list for the specified site from Signal Sciences
    to check for existing IPs.

    4. Iterates through the target IPs, validating their format (IPv4/IPv6).

    5. Adds valid, non-existing IPs to the Signal Sciences allow list via a PUT request
    to the API.

    6. Returns a JSON result summarizing the successfully added and failed IP addresses.
