identifier: SignalSciences
name: SignalSciences
parameters:
- name: API Root
  type: string
  description: The API root URL for Signal Sciences.
  default_value: 'https://dashboard.signalsciences.net'
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Email
  type: string
  description: Email address associated with the Signal Sciences account.
  is_mandatory: true
  integration_identifier: SignalSciences
- name: API Token
  type: password
  description: API token for authentication.
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Corporation Name
  type: string
  description: The name of the corporation context in Signal Sciences.
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Verify SSL
  type: boolean
  default_value: true
  description: If checked, validates the SSL certificate.
  is_mandatory: true
  integration_identifier: SignalSciences
categories:
- Security
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/SampleIntegration
