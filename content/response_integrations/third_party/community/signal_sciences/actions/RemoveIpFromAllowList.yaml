identifier: SignalSciences_RemoveIpFromAllowList
name: Remove IP from Allow List
description: Remove IP addresses from the Signal Sciences allow list for a site.
script_file_name: RemoveIpFromAllowList.py
is_simulatable: false
script_run_environment: default
enabled: true
integration_identifier: SignalSciences
parameters:
- name: Site Name
  type: string
  description: The name of the site.
  is_mandatory: true
  integration_identifier: SignalSciences
- name: IP Address
  type: string
