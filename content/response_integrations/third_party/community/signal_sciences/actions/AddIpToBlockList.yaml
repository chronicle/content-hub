script_file_name: AddIpToBlockList.py
is_simulatable: false
script_run_environment: default
enabled: true
integration_identifier: SignalSciences
parameters:
- name: Site Name
  type: string
  description: The name of the site.
  is_mandatory: true
  integration_identifier: SignalSciences
- name: Note
  type: string
  description: A note justifying the action.
  is_mandatory: true
  integration_identifier: SignalSciences
- name: IP Address
  type: string
  description: CSV list of IP addresses to add.
  is_mandatory: false
  integration_identifier: SignalSciences
  
dynamic_results_metadata:
- name: success_ips
  type: list
- name: failed_ips
  type: list

script_result_name: Success
