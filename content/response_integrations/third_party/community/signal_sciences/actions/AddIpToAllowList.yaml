identifier: SignalSciences_AddIpToAllowList
name: Add IP to Allow List
description: Adds an IP address to the Allow List for a specific Site.
script_file_name: AddIpToAllowList.py
is_simulatable: false
script_run_environment: default
enabled: true
integration_identifier: SignalSciences
dynamic_results_metadata:
- result_example_path: resources/add_ip_to_allow_list_json_example.json
  result_name: JsonResult
  show_result: true
script_result_name: is_success
creator: Siemplify
parameters:
- name: Site Name
  type: string
  description: "The API name of the site as defined in the Signal Sciences dashboard."
  is_mandatory: true
- name: IP Address
  type: string
  value: ""
  description: "Comma-separated list of IP Addresses to add to the allow list."
  is_mandatory: false
- name: Note
  type: string
  description: "A note associated with the allowed IP. This field is mandatory for the Signal Sciences API."
  is_mandatory: true
