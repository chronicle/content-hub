Ping:
  ai_description: >-
    Tests the connectivity between Google SecOps and the Flashpoint API to ensure
    that the provided credentials and network configurations are valid. This action
    performs a sample search query to verify that the API is reachable and responding
    as expected.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | None | This action does not require any input parameters. | N/A | N/A | N/A
    |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Key from the integration's
    shared configuration.

    2. **Manager Initialization**: Initializes the Flashpoint API manager with the
    provided credentials.

    3. **Connectivity Test**: Executes a GET request to the Flashpoint search endpoint
    using a predefined query.

    4. **Response Validation**: Checks if the API returns a valid JSON response.

    5. **Finalization**: Reports a successful connection or failure based on the API
    response.
