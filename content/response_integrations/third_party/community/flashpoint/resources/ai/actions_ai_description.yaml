  ai_description: >-
    ### General Description

    Enriches indicator entities using the Flashpoint threat intelligence platform.
    This action retrieves threat intelligence data for provided entities, updates
    their properties with enriched information, and flags them as suspicious if applicable.


    ### Flow Description

    1. Iterate through the `target_entities` provided to the action.

    2. For each entity, query the Flashpoint API (`/indicators/attribute`) using the
    entity's identifier.

    3. If a report is returned:
        - Flatten the report data and prefix keys with "FlashPoint".
        - Update the entity's `additional_properties` with the enriched data.
        - Set the entity's `is_enriched` flag to true.
        - Mark the entity as `is_suspicious`.
        - Add an entity insight to the SOAR case summarizing the enrichment.
        - Store the report in the action results.
    4. If no report is found, track the entity as not found.

    5. Return the final results and output message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Limit | string | false | The maximum number of result objects to return. Defaults
    to "100". |


    ### Additional Notes

    This action performs read-only operations on the Flashpoint API and updates internal
    SOAR entity data. It does not perform any external mutations.
