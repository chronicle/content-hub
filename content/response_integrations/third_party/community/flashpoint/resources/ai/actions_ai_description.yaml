  ai_description: >-
    ### General Description

    Executes a custom search query against the Flashpoint platform to retrieve intelligence
    data. This action allows analysts to perform flexible searches using Flashpoint's
    query language, applying filters for tags, date ranges, and sorting preferences.
    The results are returned as a JSON object for further processing within the playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | Yes | The search query content using Flashpoint syntax (e.g.,
    `+basetypes:+indicator`). |

    | Results count limit | string | No | The maximum number of results to retrieve.
    Defaults to 100. |

    | Sort By | string | No | Specifies the fields and order for sorting results (e.g.,
    `posted_at:desc,title:asc`). |

    | Tags | string | No | A comma-separated list of tags to filter the search results
    (e.g., `+tag_1, +tag_2`). |

    | Date Range | string | No | The timeframe for the search query (e.g., `[now-1y
    TO now]`). |


    ### Additional Notes

    This action does not operate on specific entities within the case; instead, it
    performs a global search based on the provided query parameters. The results are
    provided in the `JsonResult` output.


    ### Flow Description

    1. **Configuration Retrieval:** Fetches the Flashpoint API Key from the integration
    settings.

    2. **Parameter Extraction:** Collects the query string, result limit, date range,
    sorting criteria, and tags from the action input.

    3. **API Interaction:** Initializes the Flashpoint Manager and executes the search
    query against the Flashpoint API.

    4. **Result Processing:** Receives the query response and attaches the raw data
    to the action's JSON results.

    5. **Completion:** Ends the action with a success message and a boolean status.
