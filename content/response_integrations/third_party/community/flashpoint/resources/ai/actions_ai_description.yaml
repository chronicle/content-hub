  ai_description: "### General Description\nThe **IOC Enrichment** action retrieves\
    \ threat intelligence for indicator entities from the Flashpoint platform. It\
    \ queries the Flashpoint API to find matching indicator attributes, providing\
    \ context such as associated tags, technical details, and historical sightings.\
    \ This action is primarily used to determine the risk level of an indicator and\
    \ to populate the SOAR environment with external threat data.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| **Limit** | String | No | The maximum number of result objects\
    \ to return from Flashpoint for each entity. Defaults to \"100\". |\n\n### Flow\
    \ Description\n1. **Initialization**: The action initializes the Flashpoint manager\
    \ using the provided API Key.\n2. **Entity Iteration**: The script iterates through\
    \ all target entities provided in the context.\n3. **API Query**: For each entity,\
    \ it performs a GET request to the Flashpoint `/indicators/attribute` endpoint\
    \ using the entity's identifier as the query.\n4. **Data Processing**: \n    *\
    \ If a report is found, the action flattens the JSON data and prepends the \"\
    FlashPoint\" prefix to the keys.\n    * It updates the entity's `additional_properties`\
    \ with the enriched data.\n    * It marks the entity as `is_enriched` and `is_suspicious`.\n\
    5. **Insight Generation**: An entity insight is created for every successfully\
    \ enriched entity, highlighting that it was marked as suspicious by Flashpoint.\n\
    6. **Finalization**: The action attaches the full JSON report to the entity and\
    \ the script results, then concludes with a summary of found and not-found entities.\n\
    \n### Additional Notes\n* This action automatically marks any entity found in\
    \ the Flashpoint database as **suspicious** within the Google SecOps platform.\n\
    * If an entity is not found in Flashpoint, it is tracked and reported in the final\
    \ output message."
