  ai_description: >-
    Executes a custom query against the Flashpoint API to retrieve indicators (events
    or attributes) based on user-defined criteria. This action allows analysts to
    search for specific threat intelligence data by applying filters such as date
    ranges, search tags, and custom query strings.


    ### Flow Description

    1. The action extracts configuration parameters (API Key) and action-specific
    parameters (Limit, Dates, Tags, Query, Sort, Entity Types, and Indicator Type).

    2. It initializes the FlashpointManager to establish a connection to the Flashpoint
    API.

    3. It executes the `indicators_custom_query` method, which performs a GET request
    to the Flashpoint API endpoint based on the provided indicator type.

    4. If the query is successful, the results are returned as a JSON object in the
    action result. If no results are found or an error occurs, the action handles
    the response accordingly.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sort By Time | ddl | No | Presents the data in a descending or ascending order.
    |

    | Entity Types | string | No | Entity types to retrieve data for (comma separated).
    |

    | Limit | string | No | The maximum number of result objects to return. |

    | Start Date | string | No | Retrieves values created after the specified date
    (e.g., 2020-02-26T14:49:07Z). |

    | End Date | string | No | Retrieves values created before the specified date
    (e.g., 2020-11-25T14:49:07Z). |

    | Search Tags | string | No | Search for a specific keyword (comma separated).
    |

    | Query | string | No | Custom query to retrieve data for. |

    | Indicator Type | ddl | Yes | The type of indicator to query: simple, event,
    or attribute. |
