Run Query:
  ai_description: >-
    ### General Description

    The **Run Query** action executes custom search queries against the Flashpoint
    platform to retrieve threat intelligence, forum posts, or indicators. It allows
    analysts to perform broad searches across Flashpoint's datasets using specific
    query syntax, filtering by tags, date ranges, and sorting preferences. The results
    are returned as a raw JSON object, providing flexible data retrieval for complex
    investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The search query content using Flashpoint syntax
    (e.g., `+basetypes:+indicator`). |

    | **Results count limit** | String | No | The maximum number of results to return.
    Defaults to 100. |

    | **Sort By** | String | No | Specifies the fields and order for sorting results
    (e.g., `posted_at:desc,title:asc`). |

    | **Tags** | String | No | A comma-separated list of tags to filter the search
    results (e.g., `+tag_1, +tag_2`). |

    | **Date Range** | String | No | The timeframe for the search (e.g., `[now-1y
    TO now]`). |


    ### Additional Notes

    This action does not process specific entities from the Google SecOps case; it
    is a standalone search utility. The output is provided as a JSON result for use
    in subsequent playbook steps.


    ### Flow Description

    1. **Initialization:** The action initializes the Flashpoint manager using the
    provided API Key from the integration configuration.

    2. **Parameter Extraction:** It retrieves the query string, result limit, date
    range, sorting criteria, and tags from the action parameters.

    3. **API Execution:** The action calls the Flashpoint API to execute the custom
    query with the specified filters.

    4. **Data Capture:** The raw JSON response from Flashpoint is captured.

    5. **Completion:** The action attaches the JSON results to the execution context
    and finishes with a success message.
