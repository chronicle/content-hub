  ai_description: >-
    ### General Description

    The **Custom Query** action allows users to execute arbitrary search queries against
    the Flashpoint API. It provides flexibility by allowing the user to specify both
    the API endpoint path and the JSON-formatted query body. This is useful for advanced
    searches that are not covered by standard enrichment actions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query Content** | Code | Yes | A JSON-formatted string representing the body
    of the search request. It typically includes fields like `query`, `limit`, `start_date`,
    and `search_tags`. |

    | **New Query URL** | String | Yes | The API endpoint path to be appended to the
    base Flashpoint API URL (e.g., `/all/search`). |


    ### Additional Notes

    - This action uses a POST request to the Flashpoint API to accommodate complex
    query structures.

    - The results are returned as a raw JSON object in the action's results.


    ### Flow Description

    1. **Extract Configuration:** Retrieves the Flashpoint API Key from the integration
    settings.

    2. **Extract Parameters:** Retrieves the user-provided query JSON and the target
    URL path.

    3. **Execute Request:** Sends a POST request to the Flashpoint API with the provided
    JSON payload.

    4. **Process Results:** Captures the JSON response from Flashpoint and attaches
    it to the action's output.
