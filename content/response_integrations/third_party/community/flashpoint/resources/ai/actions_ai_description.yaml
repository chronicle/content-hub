  ai_description: >-
    Executes a custom query against the Flashpoint platform to retrieve threat intelligence
    or data based on user-defined parameters. This action allows analysts to perform
    broad searches across Flashpoint's data sets, such as blog posts or indicators,
    using specific query strings, date ranges, and filtering tags.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Query`, `Results count limit`,
    `Date Range`, `Sort By`, and `Tags` parameters provided by the user.

    2. **Initialization**: It initializes the `FlashpointManager` using the API key
    configured in the integration settings.

    3. **Query Execution**: It calls the Flashpoint API to execute the custom query
    with the provided filters and constraints.

    4. **Result Handling**: The raw JSON response from the Flashpoint API is added
    to the action results for the analyst to review.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | Yes | The search query content (e.g., `+basetypes:+indicator`).
    |

    | Results count limit | string | No | The maximum number of results to return.
    Defaults to 100 if not specified. |

    | Sort By | string | No | The fields to sort by (e.g., `posted_at:desc,title:asc`).
    |

    | Tags | string | No | A comma-separated list of tags for filtering results. |

    | Date Range | string | No | The date range to filter the data (e.g., `[now-1y
    TO now]`). |


    ### Additional Notes

    This action is a generic search tool and does not operate on specific entities.
    It returns raw data from the Flashpoint platform.
