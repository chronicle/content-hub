  ai_description: >-
    Enriches indicator entities using Flashpoint threat intelligence. The action queries
    the Flashpoint API for each target entity to retrieve associated attributes and
    threat data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Limit | string | False | The maximum number of result objects to return from
    Flashpoint. Defaults to 100. |


    ### Flow

    1. Iterates through all target entities in the case.

    2. Queries the Flashpoint API for indicator enrichment data using the entity's
    identifier.

    3. If data is found, attaches the raw JSON report to the entity.

    4. Flattens the report data, adds a 'FlashPoint' prefix, and updates the entity's
    additional properties.

    5. Marks the entity as enriched and suspicious.

    6. Creates an insight for the entity indicating it was marked as suspicious by
    Flashpoint.

    7. Returns a summary message of entities that were not found.
