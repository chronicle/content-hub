  ai_description: >-
    Executes a custom query in Flashpoint to retrieve threat intelligence data, such
    as blog posts or indicators, based on specified search criteria.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | The query content to search for (e.g., `+basetypes:+indicator`).
    This dictates the core search criteria for the action. |

    | Results count limit | String | No | The maximum number of results to return.
    Default is 100. This limits the size of the returned JSON payload. |

    | Sort By | String | No | Fields to sort the results by (e.g., `posted_at:desc,title:asc`).
    This affects the order of the returned data. |

    | Tags | String | No | A comma-separated list of tags for filtering the results.
    This narrows down the search to specific tagged content. |

    | Date Range | String | No | The date range to present the data (e.g., `[now-1y
    TO now]`). This restricts the search to a specific timeframe. |


    ### Flow Description

    1. Extracts the query parameters and configuration settings.

    2. Initializes the FlashpointManager with the provided API key.

    3. Sends the custom query to the Flashpoint API with the specified limits, sorting,
    tags, and date range.

    4. Returns the query results as a JSON object attached to the action's result.
