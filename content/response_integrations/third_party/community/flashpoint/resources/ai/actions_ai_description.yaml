  ai_description: >-
    Executes a custom query in Flashpoint to retrieve specific indicators (events
    and attributes) based on provided search criteria.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Sort By Time | Dropdown | No | Presents the data in a descending or ascending
    order. |

    | Entity Types | String | No | Entity types to retrieve data for (comma separated).
    For example: url,domain,ip-src. |

    | Limit | String | No | The maximum number of result objects to return. |

    | Start Date | String | No | Retrieves values created after the specified date.
    For example: 2020-02-26T14:49:07Z. |

    | End Date | String | No | Retrieves values created before the specified date.
    For example: 2020-11-25T14:49:07Z. |

    | Search Tags | String | No | Search for a specific keyword (comma separated).
    For example: malware,ransomware. |

    | Query | String | No | Custom query to retrieve data for. |

    | Indicator Type | Dropdown | Yes | Simple-simplified list of indicators of compromise,
    Attribute- indicators of compromise (IOCs), Event- groupings of different indicators
    of compromise. |


    ### Flow Description

    1. Extracts the query parameters from the action configuration.

    2. Initializes the Flashpoint API client.

    3. Sends a GET request to the Flashpoint indicators endpoint with the specified
    parameters.

    4. Returns the retrieved indicators as a JSON result attached to the action.
