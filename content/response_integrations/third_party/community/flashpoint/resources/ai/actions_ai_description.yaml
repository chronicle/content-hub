    Tests the connectivity between Google SecOps and the Flashpoint API. This action
    validates the provided API key by performing a sample search query for forum data
    related to carding and exploits. It ensures that the integration can successfully
    communicate with the Flashpoint service.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Initialize Manager**: The action initializes the Flashpoint API manager using
    the configured API key.

    2. **Test Connectivity**: It executes a GET request to the Flashpoint search endpoint
    with a predefined query to verify the API key and network access.

    3. **Validate Response**: The action checks if the API returns a valid JSON response
    and handles potential errors.

    4. **Report Result**: Returns a success message if the connection is established,
    or a failure message if the connection fails.
