Indicators Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint API to retrieve specific indicators,
    events, or attributes. This action allows for granular searching using keywords,
    tags, date ranges, and specific indicator types (simple, event, or attribute).
    It is designed to fetch threat intelligence data based on user-defined criteria
    rather than enriching specific entities within a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Indicator Type | ddl | Yes | Defines the scope of the search: 'simple' (simplified
    list), 'event' (groupings of IOCs), or 'attribute' (individual IOCs). |

    | Query | string | No | The specific search query string to execute against the
    Flashpoint database. |

    | Search Tags | string | No | Comma-separated keywords (e.g., malware, ransomware)
    to filter the results. |

    | Limit | string | No | The maximum number of result objects to return (default
    is 10). |

    | Start Date | string | No | Retrieves values created after this specified date
    (e.g., 2020-02-26T14:49:07Z). |

    | End Date | string | No | Retrieves values created before this specified date
    (e.g., 2020-02-25T14:49:07Z). |

    | Entity Types | string | No | Comma-separated MISP-style entity types to retrieve
    data for (e.g., url, domain, ip-src). |

    | Sort By Time | ddl | No | Presents the data in 'Ascending' or 'Descending' order
    based on the timestamp. |


    ### Additional Notes

    The 'Indicator Type' parameter is critical as it determines the specific API endpoint
    used for the query. While most parameters are optional, providing a 'Query' or
    'Search Tags' is recommended to narrow down results effectively.


    ### Flow Description

    1. **Configuration Retrieval**: Extracts the API Key from the integration settings.

    2. **Parameter Extraction**: Collects all user-provided search filters, including
    the mandatory Indicator Type.

    3. **Manager Initialization**: Initializes the Flashpoint Manager with the provided
    credentials.

    4. **API Execution**: Sends a GET request to the Flashpoint Indicators API endpoint
    corresponding to the selected Indicator Type, applying all provided filters as
    query parameters.

    5. **Result Processing**: If data is found, it is formatted and added to the action's
    JSON results for use in subsequent playbook steps.
