Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom search query against the Flashpoint API. This action provides
    the flexibility to perform advanced searches by allowing users to specify both
    the query parameters in JSON format and the specific API endpoint path. It is
    primarily used to retrieve tailored threat intelligence data, such as forum posts,
    carding information, or exploit discussions, directly into the Google SecOps platform.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Query Content | A JSON-formatted string containing the search parameters. |
    Code | Yes | Expected to contain keys like `query`, `limit`, `start_date`, `end_date`,
    `search_tags`, and `sort_timestamp`. |

    | New Query URL | The specific API endpoint path to target. | String | Yes | This
    path is appended to the base Flashpoint API URL (e.g., `/all/search` or `/indicators/attribute`).
    |


    ### Additional Notes

    - The action uses a POST request to send the query parameters to the Flashpoint
    API.

    - The results are returned as a raw JSON object and attached to the action's execution
    results.


    ### Flow Description

    1. **Initialization**: Extracts the Flashpoint API Key from the integration configuration.

    2. **Parameter Extraction**: Retrieves the `Query Content` (JSON string) and the
    `New Query URL` from the action input.

    3. **API Request**: Uses the `FlashpointManager` to send a POST request to the
    constructed URL (Base API + New Query URL) with the parsed JSON query parameters.

    4. **Result Processing**: Receives the JSON response from Flashpoint.

    5. **Output**: Adds the raw JSON response to the action results and completes
    the execution with a success message.
