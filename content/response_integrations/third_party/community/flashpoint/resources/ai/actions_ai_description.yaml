IOC_Enrichment:
  ai_description: >-
    ### General Description

    Enriches entities using Flashpoint threat intelligence. This action retrieves
    detailed attribute information for indicators, updates the entity's properties
    with the retrieved data, and flags the entity as suspicious if enrichment data
    is found.


    ### Flow Description

    1. Iterates through all target entities provided in the case.

    2. Makes a GET request to the Flashpoint API (`/indicators/attribute`) to fetch
    enrichment data for each entity's identifier.

    3. If data is found, flattens the JSON response and appends it to the entity's
    `additional_properties` with a "FlashPoint" prefix.

    4. Marks the entity as enriched (`is_enriched = True`) and suspicious (`is_suspicious
    = True`).

    5. Generates an insight for the entity indicating it was marked as suspicious
    by Flashpoint.

    6. Attaches the raw JSON report to the entity and the overall action results.


    ### Additional Notes

    The action processes all entity types without filtering. If an entity is not found
    in Flashpoint, it is skipped and logged in the final output message.
  ai_short_description: >-
    Enriches entities by retrieving threat intelligence attributes from Flashpoint,
    updating entity properties, and generating insights for suspicious indicators.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, sets is_enriched and is_suspicious flags,
      and adds insights to the entities.
    reasoning: >-
      The action makes a GET request to the Flashpoint API to fetch enrichment data
      (fetches_data=true). It does not mutate external data (can_mutate_external_data=false).
      It mutates internal data by updating entity properties, setting the is_enriched
      and is_suspicious flags, and adding insights (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true). It does not modify alert
      data or create case comments.
  entity_usage:
