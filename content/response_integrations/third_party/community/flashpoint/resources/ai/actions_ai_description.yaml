IOC_Enrichment:
  ai_description: "Enriches entities using Flashpoint's indicator attribute intelligence.\
    \ This action queries the Flashpoint API to retrieve threat intelligence and contextual\
    \ data for various indicators. It automatically updates the entity's profile within\
    \ Google SecOps with the retrieved information, marks the entity as enriched and\
    \ suspicious, and generates an insight for the analyst.\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the Flashpoint manager using the\
    \ provided API key from the integration configuration.\n2. **Parameter Extraction**:\
    \ It retrieves the 'Limit' parameter to determine the maximum number of results\
    \ to fetch for each entity.\n3. **Entity Iteration**: The action iterates through\
    \ all target entities provided in the context.\n4. **External Query**: For each\
    \ entity, it calls the Flashpoint `/indicators/attribute` endpoint using the entity's\
    \ identifier.\n5. **Data Processing**: If a report is found, the action flattens\
    \ the JSON response and adds a 'FlashPoint' prefix to the keys.\n6. **Internal\
    \ Mutation**: \n    *   Updates the entity's `additional_properties` with the\
    \ flattened data.\n    *   Sets the entity's `is_enriched` status to `True`.\n\
    \    *   Sets the entity's `is_suspicious` status to `True`.\n    *   Creates\
    \ an entity insight titled 'Flashpoint - [identifier] marked as suspicious'.\n\
    7. **Completion**: Aggregates the results and provides a summary message of which\
    \ entities were enriched or not found.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Default | Description |\n| :--- | :--- | :--- | :--- |\
    \ :--- |\n| Limit | string | No | 100 | The maximum number of result objects to\
    \ return from the Flashpoint API for each entity. |\n\n### Additional Notes\n\
    *   This action automatically marks any entity found in Flashpoint as 'suspicious'\
    \ regardless of the specific score or content of the report.\n*   The action processes\
    \ all entity types without specific filtering, making it a versatile enrichment\
    \ tool for any indicator supported by Flashpoint."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data, marks entities as
      enriched and suspicious, and creates entity insights.
