  ai_description: >-
    ### General Description

    The **Indicators Custom Query** action allows users to perform advanced searches
    against the Flashpoint indicator database. It retrieves specific events or attributes
    based on a variety of filtering criteria such as keywords, tags, and date ranges.
    This action is primarily used for threat hunting and gathering intelligence on
    specific indicators of compromise (IOCs) stored within Flashpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Indicator Type** | DDL | Yes | Determines the scope of the search. Options
    include 'simple' (simplified list), 'event' (groupings of IOCs), or 'attribute'
    (specific IOCs). |

    | **Query** | String | No | The specific search string or custom query to execute.
    |

    | **Search Tags** | String | No | A comma-separated list of tags to filter results
    (e.g., 'malware, ransomware'). |

    | **Entity Types** | String | No | A comma-separated list of Flashpoint-specific
    entity types to retrieve (e.g., 'url, domain, ip-src'). |

    | **Start Date** | String | No | Filters for indicators created after this ISO
    8601 timestamp (e.g., '2020-02-26T14:49:07Z'). |

    | **End Date** | String | No | Filters for indicators created before this ISO
    8601 timestamp. |

    | **Limit** | String | No | The maximum number of result objects to return. Default
    is 10. |

    | **Sort By Time** | DDL | No | Specifies whether to return results in 'Ascending'
    or 'Descending' chronological order. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Flashpoint API Key from
    the integration settings and all user-provided search parameters.

    2. **Manager Initialization:** An instance of the Flashpoint Manager is created
    to handle API communication.

    3. **API Request:** The action constructs a GET request to the Flashpoint `/indicators/{type}`
    endpoint, passing the query parameters, filters, and sorting preferences.

    4. **Result Processing:** If the API returns data, the results are formatted as
    a JSON object and attached to the action output. If no data is found, the action
    reports a failure to find entities.


    ### Additional Notes

    This action does not process entities currently present in the Google SecOps case;
    it is a standalone search utility that returns data based on the provided parameters.
