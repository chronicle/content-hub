  ai_description: >-
    ### General Description

    The "Flashpoint - Custom Query" action executes a custom search query against
    the Flashpoint API to retrieve specific threat intelligence data. It allows users
    to define the exact API endpoint path and the JSON payload for the query, providing
    flexibility to interact with various search capabilities within Flashpoint.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query Content | Code (JSON) | Yes | The JSON payload containing the query parameters
    (e.g., query string, limit, start/end dates, search tags). This defines the criteria
    for the search. |

    | New Query URL | String | Yes | The specific API endpoint path to send the query
    to (e.g., `/all/search`). This determines which Flashpoint API service will process
    the query. |


    ### Flow Description

    1. The action initializes the Flashpoint manager using the provided API key.

    2. It extracts the `Query Content` and `New Query URL` parameters.

    3. It constructs the full API URL by appending the `New Query URL` to the base
    API root.

    4. It sends a POST request with the parsed `Query Content` JSON payload to the
    constructed Flashpoint API URL.

    5. The action retrieves the query results and attaches them as a JSON object to
    the action's result.


    ### Additional Notes

    - The action uses a POST request to submit the query payload, but it is intended
    for search and retrieval operations rather than data mutation.
