Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint API using a provided JSON payload
    and endpoint URL. This action allows users to perform advanced searches and retrieve
    threat intelligence data directly from Flashpoint.


    ### Flow Description

    1. Extracts the query content (JSON) and target URL path from the action parameters.

    2. Initializes the Flashpoint API client.

    3. Sends a POST request to the specified Flashpoint API endpoint with the provided
    JSON payload.

    4. Retrieves the JSON response from the API and attaches it to the action's JSON
    result.


    ### Additional Notes

    The action is primarily intended for complex search queries like `/all/search`.
    Ensure the `Query Content` parameter is a valid JSON string.
  ai_short_description: >-
    Executes a custom query against the Flashpoint API using a provided JSON payload
    and endpoint URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by sending a POST request to a Flashpoint API endpoint
      (typically a search endpoint like `/all/search`). Although it uses the POST
      method, its purpose is to submit a complex query payload rather than mutate
      external state. It does not mutate internal data, update entities, create insights,
      or add case comments.
