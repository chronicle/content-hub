  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint API. This action allows users to
    send a JSON-formatted query body to a specified API endpoint to retrieve threat
    intelligence or search results. The results are returned as a JSON object and
    added to the action's output.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query Content | code | Yes | The JSON-formatted content of the query to search.
    |

    | New Query URL | string | Yes | The API endpoint path to which the query will
    be sent (e.g., /all/search). |


    ### Flow Description

    1. The action extracts the API Key from the integration configuration.

    2. It extracts the 'Query Content' and 'New Query URL' parameters provided by
    the user.

    3. It initializes the FlashpointManager with the API Key.

    4. It executes a POST request to the specified API endpoint using the provided
    query content.

    5. The retrieved results are added to the action's output as a JSON object.
