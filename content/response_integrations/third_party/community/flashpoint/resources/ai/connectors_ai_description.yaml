"Flashpoint - Compromised Credential Connector":
  ai_description: >-
    ### General Description

    The Flashpoint Compromised Credential Connector integrates with the Flashpoint
    API to monitor and ingest alerts related to compromised credentials. It specifically
    tracks "credential-sighting" events, which occur when employee credentials (such
    as emails and passwords) are discovered in external data sources like the deep
    or dark web. This connector enables security teams to proactively respond to potential
    account takeovers by automatically creating cases in Google SecOps for every detected
    sighting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | Password | Yes | The API key used to authenticate with the Flashpoint
    v4 API. |

    | DeviceProductField | String | Yes | The field name in the source data used to
    determine the device product (defaults to 'Flashpoint'). |

    | EventClassId | String | No | The field name used to determine the event name
    or sub-type. |

    | Limit | Integer | Yes | The maximum number of events to retrieve per execution
    cycle. |

    | Max Days Back | Integer | No | The maximum number of days to look back for data
    during the first run or if no previous timestamp exists. |

    | Proxy Server Address | String | No | The address of the proxy server to use
    for network communication. |

    | Proxy Username | String | No | The username for proxy authentication. |

    | Proxy Password | Password | No | The password for proxy authentication. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the script. |


    ### Flow Description

    1. **Timestamp Retrieval**: The connector fetches the last saved timestamp from
    the SOAR database. If no timestamp is found, it uses the "Max Days Back" parameter
    to define the starting point.

    2. **API Query**: It connects to the Flashpoint `/all/search` endpoint using a
    Bearer token. It specifically queries for `basetypes:(credential-sighting)` within
    the time range from the last timestamp to the current time.

    3. **Data Processing**: The connector retrieves a list of hits (up to the configured
    Limit) and flattens the nested JSON structure of each alert for easier mapping.

    4. **Case Creation**: Each sighting is mapped to a Google SecOps `CaseInfo` object.
    The priority is set to 60 (Medium), and the event name is hardcoded as "Credential
    Sighting".

    5. **Overflow Validation**: Before ingestion, the connector checks if the alert
    matches overflow criteria to prevent redundant case creation.

    6. **Ingestion and State Management**: Valid cases are ingested into the platform,
    and the timestamp of the most recent alert is saved to ensure the next run starts
    from where the current one ended.
