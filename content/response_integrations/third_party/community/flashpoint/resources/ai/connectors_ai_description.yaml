"Flashpoint - Compromised Credential Connector":
  ai_description: >-
    ### General Description

    The Flashpoint - Compromised Credential Connector integrates with the Flashpoint
    intelligence platform to monitor and ingest compromised credential sightings.
    It periodically queries the Flashpoint API for new credential-related alerts and
    automatically creates cases within Google SecOps, enabling security teams to respond
    to potential account takeovers or credential leaks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | Password | Yes | The API Key used to authenticate with the Flashpoint
    service. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the case. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | Limit | Integer | Yes | The maximum number of events to retrieve per execution.
    |

    | Max Days Back | Integer | No | The maximum number of days to look back when
    fetching data. |

    | Proxy Password | Password | No | The proxy password to authenticate with. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username to authenticate with. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the script. |


    ### Flow Description

    1. The connector initializes a connection to the Flashpoint API using the provided
    API Key and optional proxy settings.

    2. It calculates the time range for data retrieval based on the last successful
    fetch timestamp or the configured "Max Days Back" parameter.

    3. It queries the Flashpoint API for "credential-sighting" events that occurred
    within the calculated time window.

    4. For each retrieved alert, the connector flattens the data structure and maps
    it to a Google SecOps case format.

    5. It checks for alert overflow to prevent duplicate case creation.

    6. Valid cases are ingested into the SOAR platform, and the latest timestamp is
    saved to ensure subsequent runs only fetch new data.
