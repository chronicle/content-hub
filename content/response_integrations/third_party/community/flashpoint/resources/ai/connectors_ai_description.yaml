"Flashpoint - Compromised Credential Connector":
  ai_description: >-
    ### General Description

    The Flashpoint - Compromised Credential Connector integrates with the Flashpoint
    platform to monitor for compromised employee credentials. It periodically fetches
    "Credential Sighting" alerts from Flashpoint and ingests them into Google SecOps
    as cases, enabling security teams to respond to potential credential leaks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key for authenticating with Flashpoint. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | Limit | Integer | Yes | The maximum number of events to retrieve per iteration.
    |

    | Max Days Back | Integer | No | The maximum number of days to look back when
    retrieving data. |

    | Proxy Password | String | No | The password for proxy authentication. |

    | Proxy Server Address | String | No | The address of the proxy server. |

    | Proxy Username | String | No | The username for proxy authentication. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters, including
    the API key and proxy settings.

    2. It calculates the time range for fetching alerts based on the last successful
    run timestamp and the "Max Days Back" configuration.

    3. It queries the Flashpoint API (`/all/search`) for "credential-sighting" alerts
    within the calculated time window.

    4. For each retrieved alert, it flattens the JSON data and maps it to a Google
    SecOps `CaseInfo` object.

    5. It validates the alert against overflow rules to prevent duplicate or excessive
    case creation.

    6. Valid cases are ingested into the SOAR platform, and the last successful fetch
    timestamp is updated for the next iteration.
