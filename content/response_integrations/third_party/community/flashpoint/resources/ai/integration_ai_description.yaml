product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Flashpoint integration is primarily focused on providing risk intelligence
    and threat data. The 'IOC_Enrichment' action allows users to enrich indicators
    with threat intelligence, which is the core function of the Threat Intelligence
    category. The connector ingests compromised credential sightings, which provides
    alerts but does not perform log analysis or search internal logs, thus it does
    not meet the criteria for SIEM. It does not perform host containment (EDR), network
    blocking (Network Security), email management (Email Security), identity management
    (IAM & Identity Management), cloud resource management (Cloud Security), ticket
    creation (ITSM), vulnerability scanning (Vulnerability Management), or asset inventory
    management (Asset Inventory). Therefore, it is classified solely under Threat
    Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
