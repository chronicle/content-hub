product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Flashpoint integration is primarily classified under Threat Intelligence because
    it provides robust capabilities to enrich indicators (IPs, Hashes, etc.) with
    risk scores and threat data, and allows for custom queries against the Flashpoint
    platform. It is also classified under SIEM because it includes a 'Compromised
    Credential Connector' that monitors for and ingests alerts regarding compromised
    employee credentials into the SOAR platform, which helps identify suspicious activity
    related to users. It does not qualify for EDR (no host/process management), Network
    Security (no gateway blocking), Email Security (no email management), IAM Management
    (no account suspension/password reset actions), Cloud Security, ITSM, Vulnerability
    Management, Asset Inventory, or Collaboration.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
