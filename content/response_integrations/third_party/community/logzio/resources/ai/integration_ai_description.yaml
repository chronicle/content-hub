  network_security: false
  reasoning: >-
    The Logz.io integration is primarily a SIEM integration. The 'LOGZIO fetch-security-events'
    connector is designed to ingest security events and alerts from Logz.io into Google
    SecOps, which is a core SIEM function. Additionally, the actions 'logzio-search-logs'
    and 'logzio-get-logs-by-event-id' provide the capability to search and retrieve
    historical logs and event details, allowing analysts to investigate activity and
    identify sources of suspicious behavior. It does not provide EDR, Network Security,
    IAM, or other specialized security management capabilities.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
