product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Logz.io integration is primarily designed to ingest security events and alerts
    from the Logz.io platform into Google SecOps. This functionality aligns directly
    with the SIEM category, as it enables the SOAR platform to monitor security rules
    triggered in Logz.io, create cases, and provide visibility into security incidents.
    It does not perform EDR, Network Security, Threat Intelligence, Email Security,
    IAM, Cloud Security (specifically for resource configuration), ITSM, Vulnerability
    Management, Asset Inventory, or Collaboration functions.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
