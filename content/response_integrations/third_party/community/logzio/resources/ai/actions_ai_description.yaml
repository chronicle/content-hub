    ### General Description

    Parses a raw JSON string (originally intended for Logz.io logs) and extracts specific
    fields to convert the data into a standardized JSON format compatible with Google
    SecOps playbooks. This is a utility action that does not interact with external
    APIs or SecOps entities directly, but rather transforms input data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | `fields_to_search` | String | Yes | A comma-separated list of fields to search
    for within the provided JSON. |

    | `raw_json` | String | Yes | The raw data in JSON format that needs to be parsed
    and searched. |


    ### Flow Description

    1. Extracts the `raw_json` and `fields_to_search` parameters provided by the user
    or previous playbook steps.

    2. Parses the raw JSON string into a structured Python dictionary.

    3. Iterates through the `results` array in the JSON object, searching for the
    specified fields.

    4. Constructs a new JSON output containing the found fields, mapping them to `entityType`
    and `entityIdentifier` keys.

    5. Returns the newly formatted JSON as the action's result and completes successfully
    if at least one field was found.
