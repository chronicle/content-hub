Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to test and validate the connectivity between
    Google SecOps and the Logz.io platform. It verifies the validity of both the Security
    and Operations API tokens by making a request to the Logz.io `whoami` endpoint.
    This ensures that the integration is correctly configured and that the provided
    credentials have the necessary permissions to interact with the Logz.io API.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **logzio_security_token** | String | Yes | The API token associated with your
    Logz.io Security account. |

    | **logzio_operations_token** | String | Yes | The API token associated with your
    Logz.io Operations account. |

    | **logzio_region** | String | No | The geographic region where your Logz.io account
    is hosted (e.g., 'us', 'eu', 'uk'). Defaults to 'us' if left empty. |

    | **logzio_custom_endpoint** | String | No | A custom URL for the Logz.io API.
    If provided, this overrides the region-based URL construction. |


    ### Additional Notes

    - This action does not process any entities from the case; it relies entirely
    on the integration's configuration parameters.

    - The action performs a `GET` request to the `v1/account-management/whoami` endpoint
    for both tokens provided.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Security token, Operations
    token, region, and optional custom endpoint from the integration configuration.

    2. **Token Validation:** It performs a basic check to ensure the tokens are non-empty
    strings.

    3. **Endpoint Construction:** It determines the correct API URL based on the provided
    region or custom endpoint.

    4. **Connectivity Test:** It sends a `GET` request to the Logz.io API for the
    Security token and then for the Operations token.

    5. **Response Verification:** If both requests return a `200 OK` status code,
    the action logs the account names and completes successfully. If any request fails,
    the action reports a failure.
