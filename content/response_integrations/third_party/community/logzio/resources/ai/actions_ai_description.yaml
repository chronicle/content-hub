  ai_description: >-
    Parses raw JSON log data to extract specific fields and format them into a standardized
    JSON structure. This utility is designed to normalize data from Logz.io logs for
    playbook consumption.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | fields_to_search | string | Yes | Comma separated list of fields to search within
    the JSON. |

    | raw_json | string | Yes | Raw data in JSON format that is to be searched. |


    ### Flow description

    1. Retrieve `fields_to_search` and `raw_json` from action parameters.

    2. Parse the `raw_json` string into a JSON object.

    3. Iterate through the results array within the parsed JSON.

    4. For each item, check if the specified fields exist.

    5. If a field exists, create a mapping where the field name is the `entityType`
    and the field value is the `entityIdentifier`.

    6. Collect these mappings into an output structure.

    7. If any mappings are found, add the resulting JSON to the action output using
    `add_result_json`.

    8. Complete the action with a success status if results were found, or failure
    otherwise.
