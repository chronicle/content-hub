Ping:
  ai_description: >-
    ### General Description

    Pings Logz.io to test and validate connectivity to both the security and operations
    accounts. This action ensures that the provided API tokens are valid and that
    the Logz.io API is reachable.


    ### Flow Description

    1. Extracts the Logz.io security token, operations token, region, and custom endpoint
    from the integration configuration.

    2. Validates that the provided tokens are non-empty strings.

    3. Constructs the API endpoint URL based on the region or custom endpoint.

    4. Sends an HTTP GET request to the Logz.io `v1/account-management/whoami` API
    endpoint using the operations token.

    5. Sends a second HTTP GET request to the same endpoint using the security token.

    6. Evaluates the HTTP response status codes; if both return 200 OK, the action
    completes successfully.


    ### Additional Notes

    This is a utility action primarily used to verify integration connectivity and
    credentials. It does not require any action-specific parameters or entities to
    run.
  ai_short_description: >-
    Pings Logz.io to test and validate connectivity to both the security and operations
    accounts by verifying the provided API tokens against the Logz.io API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Logz.io API to validate connectivity and
      fetch account information. It does not mutate external data, mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
