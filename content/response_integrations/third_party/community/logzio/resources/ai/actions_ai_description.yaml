logzio-search-logs:
  ai_description: >-
    Searches logs in a Logz.io operations account using Lucene syntax. This action
    allows users to retrieve historical log data within a specified time range and
    limit the number of results returned. The retrieved logs are provided as a JSON
    object for further analysis within the playbook.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | query | string | No | A search query written in valid Lucene syntax. Defaults
    to '*' (all logs) if not provided. |

    | size | string | No | Number of log results per query. Limited to a maximum of
    1000 logs. |

    | from_time | string | Yes | Earliest time to search. Supports Unix timestamps,
    relative time (e.g., '5 minutes ago'), or specific date formats. |

    | to_time | string | No | Latest time to search. If left empty, the search extends
    to the current time. |


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Logz.io API token, region, and
    optional custom endpoint from the integration settings.

    2. **Parameter Validation:** Validates the 'size' parameter to ensure it falls
    within the 1-1000 range and parses the 'from_time' and 'to_time' into Unix timestamps
    using the `dateparser` library.

    3. **Request Construction:** Builds a JSON request body containing the Lucene
    query, size limit, and time range filters.

    4. **API Interaction:** Sends a POST request to the Logz.io Search API endpoint.

    5. **Data Processing:** Parses the API response, extracts the log source data
    from the hits, and attaches the results to the action output as a JSON object.


    ### Additional Notes

    - The action uses a POST request to the `/v1/search` endpoint, but this is strictly
    for querying data and does not modify any external state.

    - If no logs match the query, the action completes successfully with an informative
    message.
