  ai_description: >-
    ### General Description

    The **Logz.io Search Logs** action allows users to query and retrieve logs from
    their Logz.io operations account. It utilizes the Logz.io Search API (v1) to perform
    Lucene-based searches within a specified time range. This action is primarily
    used for log investigation and gathering telemetry data related to security incidents.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **query** | A search query written in valid Lucene syntax. If not provided,
    it defaults to a wildcard (`*`) to match all logs. | String | No |

    | **size** | The number of log results to return per query. The value must be
    between 1 and 1000. If invalid or empty, it defaults to 1000. | String | No |

    | **from_time** | The earliest time to search. It accepts various formats including
    Unix timestamps, relative time (e.g., "5 minutes ago"), or specific date strings.
    | String | Yes |

    | **to_time** | The latest time to search. Similar to `from_time`, it accepts
    multiple date formats. If left empty, the search extends to the current time.
    | String | No |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Logz.io API token, region,
    and optional custom endpoint from the integration settings.

    2. **Parameter Validation:** It extracts the search query, result size, and time
    range parameters. The `size` is validated to ensure it stays within the 1-1000
    range.

    3. **Time Parsing:** The `from_time` and `to_time` strings are parsed into Unix
    millisecond timestamps using the `dateparser` library to ensure compatibility
    with the Logz.io API.

    4. **Request Construction:** An Elasticsearch-compatible JSON request body is
    created, incorporating the Lucene query and the timestamp range filter.

    5. **API Execution:** A POST request is sent to the Logz.io Search API endpoint
    (determined by the region or custom endpoint).

    6. **Data Processing:** The action parses the API response, extracts the raw log
    data (`_source` field) from the hits, and formats them into a JSON result.

    7. **Completion:** The retrieved logs are attached to the action's output, and
    a summary message indicating the number of logs found is returned.


    ### Additional Notes

    - The action is limited to a maximum of 1000 logs per execution.

    - If the API token is missing or invalid, the action will fail.

    - The `from_time` parameter is mandatory to define the search window.
