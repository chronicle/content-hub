logzio-get-logs-by-event-id:
  ai_description: >-
    Fetches the logs that triggered a specific security event in Logz.io and returns
    them as a paginated JSON list. This action is used to investigate the underlying
    data of a security alert by retrieving the raw logs associated with a unique event
    identifier.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Logz.io API token, region, and
    optional custom endpoint from the integration settings.

    2. **Endpoint Construction:** Determines the correct API URL based on the provided
    region or custom endpoint.

    3. **Initial Fetch:** Executes a POST request to the Logz.io search API using
    the provided `alert_event_id` to retrieve the first page of logs.

    4. **Pagination Handling:** If the total number of logs exceeds the initial page
    size, the action uses a thread pool to concurrently fetch all remaining pages.

    5. **Data Aggregation:** Combines all retrieved logs into a single JSON structure.

    6. **Insight Creation:** Generates case insights within Google SecOps containing
    the log data for immediate analyst visibility.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | alert_event_id | String | Yes | The unique GUID of the security event in the
    Logz.io security account that you want to investigate. |

    | page_size | String | No | Controls the number of results per page. Valid inputs
    are 1 to 1000. Defaults to 25. |


    ### Additional Notes

    - The action automatically handles pagination to ensure all logs associated with
    the event ID are retrieved, up to the limits of the Logz.io API.

    - If more than 3 logs are returned, they are grouped into a single insight; otherwise,
    individual insights are created for each log.
