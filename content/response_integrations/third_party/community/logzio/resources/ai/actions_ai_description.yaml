  ai_description: >-
    ### General Description

    Fetches the logs that triggered a specific security event in Logz.io. The action
    retrieves the logs as a paginated list in JSON format, aggregates them, and attaches
    them to the case as insights for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | `alert_event_id` | String | Yes | Unique GUID of the security event in your
    Logz.io security account. This is the ID of the event you want to investigate.
    |

    | `page_size` | String | No | Controls the number of results per page. Valid inputs
    are 1 to 1000. Defaults to 25. |


    ### Flow Description

    1. Extracts the Logz.io API token and region from the integration configuration.

    2. Constructs the API endpoint and request body using the provided `alert_event_id`
    and `page_size`.

    3. Sends a request to the Logz.io search API to retrieve the initial page of logs.

    4. If there are more logs available than the initial page size, concurrently fetches
    the remaining pages of logs using a thread pool.

    5. Aggregates all retrieved logs, adds them to the action's JSON result, and creates
    case insights containing the log data.
