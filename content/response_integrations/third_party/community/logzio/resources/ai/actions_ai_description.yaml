  ai_description: >-
    Validates connectivity to Logz.io by testing provided security and operations
    tokens. This action ensures that the configured API tokens are valid and that
    the integration can successfully communicate with the Logz.io API. ### Parameters
    | Parameter | Type | Mandatory | Description | | :--- | :--- | :--- | :--- | |
    logzio_security_token | String | Yes | The security token for Logz.io. | | logzio_operations_token
    | String | Yes | The operations token for Logz.io. | | logzio_region | String
    | No | The region for the Logz.io account (defaults to US). | | logzio_custom_endpoint
    | String | No | A custom API endpoint URL if required. | ### Flow 1. Extract configuration
    parameters (tokens, region, custom endpoint). 2. Validate that tokens are provided
    and are strings. 3. Construct the API endpoint URL based on the region or custom
    endpoint. 4. Send a GET request to the Logz.io whoami endpoint using the provided
    tokens. 5. Verify the response status code (200) and log the account name. 6.
    Return success or failure status.
