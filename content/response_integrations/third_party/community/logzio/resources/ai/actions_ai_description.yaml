    update_ticket: false
  ai_description: >-
    ### General Description

    Searches logs in a Logz.io operations account using a specified Lucene query and
    time range. This action retrieves historical logs or telemetry data matching the
    search parameters and returns them as a structured JSON result for further analysis
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | `query` | String | False | A search query written in valid Lucene syntax. Defaults
    to a wildcard (`*`) if not provided to return all logs within the timeframe. |

    | `size` | String | False | The maximum number of log results to return per query.
    Limited to 1000 logs. If left empty or invalid, it defaults to 1000. |

    | `from_time` | String | True | The earliest time to search. Accepts Unix timestamps,
    relative time strings, or specific date formats supported by the dateparser library
    (e.g., `%Y-%m-%dT%H:%M:%S.%f`). |

    | `to_time` | String | False | The latest time to search. Leave this empty if
    you used a relative time for the `from_time` parameter. |


    ### Flow Description

    1. **Parameter Extraction & Validation:** Extracts configuration and action parameters,
    validating the `size` limit and parsing the `from_time` and `to_time` inputs into
    Unix timestamps.

    2. **Request Construction:** Builds a JSON request body containing the Lucene
    query and the specified time range filters.

    3. **API Execution:** Sends a POST request to the Logz.io search API endpoint
    (`v1/search`) using the provided API token.

    4. **Result Processing:** Parses the API response to extract the matching logs
    from the `hits` array.

    5. **Output Generation:** Returns the retrieved logs as a JSON object in the action's
    results and completes the execution.
