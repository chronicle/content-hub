logzio-get-logs-by-event-id:
  ai_description: >-
    ### General Description

    Fetches the logs that triggered a specific security event from Logz.io. The action
    retrieves the logs as a paginated list, aggregates them, and attaches them to
    the case as insights and JSON results.


    ### Flow Description

    1. Extracts the Logz.io API token and region from the integration configuration.

    2. Retrieves the `alert_event_id` and `page_size` from the action parameters.

    3. Constructs the Logz.io API endpoint URL for searching logs.

    4. Sends a POST request to the Logz.io API (`v2/security/rules/events/logs/search`)
    to retrieve the first page of logs associated with the event ID.

    5. If multiple pages of results exist, concurrently fetches the remaining pages
    using a thread pool.

    6. Aggregates all retrieved logs and attaches them to the action result as a JSON
    object.

    7. Creates case insights in Google SecOps containing the retrieved log data.


    ### Additional Notes

    The action uses concurrent requests to fetch multiple pages of logs efficiently.
    The maximum page size is 1000.
  ai_short_description: >-
    Fetches the logs that triggered a specific security event from Logz.io and attaches
    them to the case as insights.
