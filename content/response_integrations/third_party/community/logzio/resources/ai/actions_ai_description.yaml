logzio-search-logs:
  ai_description: >-
    ### General Description

    Searches logs in a Logz.io operations account using a specified Lucene query and
    time filters. The action retrieves the matching logs from the Logz.io platform
    and outputs them as a structured JSON result for further use in the playbook.


    ### Flow Description

    1. Extracts the Logz.io API token, region, and custom endpoint from the integration
    configuration.

    2. Extracts the action parameters including the search `query`, `size`, `from_time`,
    and `to_time`.

    3. Parses and converts the provided time filters into Unix timestamps.

    4. Constructs a JSON request body containing the Lucene query and the specified
    time range.

    5. Makes an HTTP POST request to the Logz.io Search API (`/v1/search`) to fetch
    the logs.

    6. Parses the API response and appends the retrieved logs to the action's JSON
    result.


    ### Additional Notes

    - The maximum number of logs that can be returned per query is limited to 1000.

    - If no search query is needed, a wildcard (`*`) should be used.
