    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Pings Logz.io to test and validate connectivity to both the security and operations
    accounts. It verifies the provided API tokens by making a GET request to the Logz.io
    'whoami' endpoint to ensure the integration is configured correctly.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters, specifically the Logz.io Security
    Token, Operations Token, Region, and Custom Endpoint.


    ### Flow Description

    1. Extracts the Logz.io security token, operations token, region, and custom endpoint
    from the integration configuration.

    2. Validates that both tokens are provided and are valid strings.

    3. Sends a GET request to the Logz.io API 'whoami' endpoint using the operations
    token to verify connectivity.

    4. Sends a GET request to the Logz.io API 'whoami' endpoint using the security
    token to verify connectivity.

    5. Returns a successful execution state if both requests return a 200 OK status
    code, otherwise fails and returns an error.
