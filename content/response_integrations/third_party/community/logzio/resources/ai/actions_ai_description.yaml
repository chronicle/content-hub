json-adapter:
  ai_description: >-
    ### General Description

    The **json-adapter** action is a utility designed to transform raw JSON log data
    from Logz.io into a standardized format compatible with Google SecOps (Chronicle)
    playbooks. It specifically looks for a 'results' array within the input JSON and
    extracts specified fields, mapping them to a consistent structure of 'entityType'
    and 'entityIdentifier'. This allows downstream playbook actions to easily consume
    data that might otherwise have varying schemas.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **fields_to_search** | String | Yes | A comma-separated list of keys (fields)
    to look for within each object in the JSON 'results' array. |

    | **raw_json** | String | Yes | The raw JSON string containing the data to be
    processed. The script expects a top-level 'results' key containing a list of objects.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `fields_to_search` and `raw_json`
    strings from the action parameters.

    2. **Data Parsing**: It parses the `raw_json` into a Python dictionary and splits
    the `fields_to_search` into a list of individual field names.

    3. **Search Logic**: The script iterates through every object found in the `results`
    list of the input JSON.

    4. **Field Mapping**: For each object, it checks if any of the requested fields
    exist. If a field is found, it creates a new dictionary mapping the field name
    to `entityType` and the field's value to `entityIdentifier`.

    5. **Result Aggregation**: All identified mappings are collected into a final
    output list.

    6. **Output Generation**: If at least one field was successfully found and mapped,
    the action returns the formatted JSON and completes successfully. If no fields
    are found, the action is marked as failed.


    ### Additional Notes

    - This action is strictly a data transformation utility and does not interact
    with external APIs or modify SecOps entities directly.

    - The input JSON must contain a key named `results` which holds an array of objects
    for the script to process correctly.
