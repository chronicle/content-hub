    output. Additionally, it creates case insights for the retrieved logs.


    ### Flow

    1. Extracts the `alert_event_id` and `page_size` from the action parameters.

    2. Constructs the API request body with the event ID and pagination settings.

    3. Sends a POST request to the Logz.io API to retrieve logs.

    4. Handles pagination by fetching subsequent pages if necessary.

    5. Adds the retrieved logs as a JSON result to the action output.

    6. Creates case insights for the retrieved logs.


