  ai_description: >-
    Fetches the logs that triggered a specific security event from Logz.io. This action
    allows analysts to retrieve the raw log data associated with an alert for deeper
    investigation. It supports pagination to handle large volumes of logs and automatically
    creates case insights in Google SecOps to display the retrieved information.


    ### Flow Description:

    1. **Configuration Retrieval:** The action starts by extracting the Logz.io API
    token, region, and optional custom endpoint from the integration settings.

    2. **API Endpoint Determination:** It constructs the appropriate Logz.io API URL
    based on the provided region or custom endpoint.

    3. **Initial Data Fetch:** It sends a POST request to the Logz.io security search
    API using the mandatory `alert_event_id` to retrieve the first page of logs.

    4. **Pagination Handling:** If the total number of logs exceeds the initial page
    size, the action uses a thread pool to concurrently fetch all remaining pages
    of logs.

    5. **Data Processing:** The collected logs are aggregated into a single JSON structure.

    6. **Insight Creation:** The action iterates through the logs and creates case
    insights within the Google SecOps platform to provide immediate visibility into
    the event data.

    7. **Result Reporting:** Finally, it attaches the full JSON result to the action
    and completes the execution.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | alert_event_id | String | Yes | The unique GUID of the security event in Logz.io
    that you want to investigate. |

    | page_size | String | No | Controls the number of results per page. Valid inputs
    are 1 to 1000. Defaults to 25. |


    ### Additional Notes:

    - This action does not operate on entities (IPs, Hosts, etc.) but rather on a
    specific Event ID provided as a parameter.

    - The action uses multi-threading to speed up the retrieval of logs when multiple
    pages are present.
