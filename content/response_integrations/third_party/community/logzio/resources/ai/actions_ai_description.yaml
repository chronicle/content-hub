  ai_description: >-
    Searches for logs in your Logz.io operations account based on a provided query
    and time range. \n\n### Flow Description \n1. The action extracts configuration
    parameters (Logz.io API token, region, and optional custom endpoint) and action
    parameters (query, size, from_time, and to_time). \n2. It constructs a Lucene-based
    search query and prepares the request body. \n3. It sends a POST request to the
    Logz.io search API. \n4. It parses the response and returns the log results as
    a JSON object to the SOAR platform. \n\n### Parameters Description \n| Parameter
    | Type | Mandatory | Description | \n| :--- | :--- | :--- | :--- | \n| query |
    string | No | A search query written in valid Lucene syntax. Default is `*`. |
    \n| size | string | No | Number of log results per query. Limited to 1000 logs.
    | \n| from_time | string | Yes | Earliest time to search. Accepts Unix timestamps,
    relative time, or format `%Y-%m-%dT%H:%M:%S.%f`. | \n| to_time | string | No |
    Latest time to search. | \n\n### Additional Notes \nIf no size is provided, the
    action defaults to 1000 logs. The `from_time` parameter is mandatory for the search
    to execute.
