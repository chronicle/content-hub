json-adapter:
  ai_description: >-
    ### General Description

    Converts raw JSON logs (specifically designed for Logz.io logs) into a standardized
    JSON format compatible with Google SecOps playbooks. It extracts specific fields
    from the provided JSON and maps them to entity types and identifiers, allowing
    subsequent playbook actions to easily consume the parsed data.


    ### Flow Description

    1. Extracts the `raw_json` and `fields_to_search` parameters provided by the user
    or previous playbook steps.

    2. Parses the raw JSON string into a structured Python dictionary.

    3. Iterates through the `results` array within the parsed JSON object.

    4. Searches for the specified fields within each result item.

    5. If a requested field is found, it maps the field name to `entityType` and its
    value to `entityIdentifier`, appending it to an output list.

    6. Returns the mapped results as a JSON object to the playbook via `siemplify.result.add_result_json`.


    ### Additional Notes

    This is a local utility action and does not make any external API calls. The action
    will return a failed execution state if none of the requested fields are found
    in the provided JSON.
