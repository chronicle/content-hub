  ai_description: >-
    ### General Description

    The **json-adapter** action is a utility designed to transform raw log data from
    Logz.io into a standardized JSON format compatible with Google SecOps playbooks.
    It specifically targets JSON structures containing a 'results' array and extracts
    user-defined fields, mapping them to a generic entity-like structure consisting
    of `entityType` and `entityIdentifier`. This allows downstream playbook actions
    to easily consume specific data points from complex log objects.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **fields_to_search** | String | Yes | A comma-separated list of keys (fields)
    to look for within each log entry in the provided JSON. |

    | **raw_json** | String | Yes | The raw JSON string containing the logs to be
    processed. The action expects a top-level 'results' key containing a list of objects.
    |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `fields_to_search` and `raw_json`
    from the input parameters.

    2. **Data Parsing:** The `raw_json` string is parsed into a JSON object, and the
    `fields_to_search` string is split into a list of individual field names.

    3. **Log Iteration:** The action iterates through each log entry found in the
    `results` array of the input JSON.

    4. **Field Extraction:** For each log entry, the action checks if any of the specified
    search fields exist as keys.

    5. **Standardization:** If a field is found, its key and value are mapped to a
    new object: `{"entityType": <field_name>, "entityIdentifier": <field_value>}`.

    6. **Result Compilation:** All mapped objects are collected into a final results
    list.

    7. **Output Generation:** If matches are found, the action returns the standardized
    JSON and completes successfully. If no fields are found, the action fails.


    ### Additional Notes

    - This action does not interact with external APIs; it performs local data transformation
    on the provided input.

    - The action will only succeed (EXECUTION_STATE_COMPLETED) if at least one of
    the requested fields is found in the provided JSON.
