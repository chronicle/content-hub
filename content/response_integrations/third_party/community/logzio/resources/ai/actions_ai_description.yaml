  ai_description: >-
    ### General Description

    Searches for logs in your Logz.io operations account based on a provided query
    and time range.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | query | string | No | A search query written in valid Lucene syntax. Default
    is `*`. |

    | size | string | No | Number of log results per query. Limited to 1000 logs.
    |

    | from_time | string | Yes | Earliest time to search. Accepts Unix timestamps,
    relative time, or format `%Y-%m-%dT%H:%M:%S.%f`. |

    | to_time | string | No | Latest time to search. |


    ### Flow Description

    1. The action extracts configuration parameters (Logz.io API token, region, and
    optional custom endpoint) and action parameters (query, size, from_time, and to_time).

    2. It constructs a Lucene-based search query and prepares the request body.

    3. It sends a POST request to the Logz.io search API.

    4. It parses the response and returns the log results as a JSON object to the
    SOAR platform.


    ### Additional Notes

    If no size is provided, the action defaults to 1000 logs. The `from_time` parameter
    is mandatory for the search to execute.
