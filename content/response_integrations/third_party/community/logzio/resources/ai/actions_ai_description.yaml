  ai_description: >-
    ### General Description


    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Logz.io platform. It validates the provided API tokens for both Security
    and Operations accounts by making a request to the Logz.io `whoami` endpoint.
    This action is primarily used during the initial setup or for troubleshooting
    to ensure that the integration can successfully communicate with the Logz.io API.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `logzio_security_token` | String | Yes | The API token for the Logz.io Security
    account. This is an integration configuration parameter. |

    | `logzio_operations_token` | String | Yes | The API token for the Logz.io Operations
    account. This is an integration configuration parameter. |

    | `logzio_region` | String | No | The region where the Logz.io account is hosted
    (e.g., 'us', 'eu'). Defaults to 'us' if not provided. This is an integration configuration
    parameter. |

    | `logzio_custom_endpoint` | String | No | A custom URL for the Logz.io API, if
    applicable. This is an integration configuration parameter. |


    ### Flow Description


    1. **Configuration Extraction**: The action retrieves the security token, operations
    token, region, and optional custom endpoint from the integration's configuration
    settings.

    2. **Token Validation**: It performs a basic check to ensure the tokens are non-empty
    strings and properly formatted.

    3. **Connectivity Test**: It constructs the API URL (handling specific regions
    or custom endpoints) and sends a GET request to the `v1/account-management/whoami`
    endpoint for both the Security and Operations tokens.

    4. **Response Verification**: The action checks if the API returns a 200 OK status
    code. If successful, it logs the associated account name to confirm authentication
    and connectivity.


    ### Additional Notes


    This action does not process any entities and does not modify any data. It is
    strictly a connectivity test. There are no action-specific parameters; it relies
    entirely on the integration's configuration.
