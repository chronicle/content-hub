LOGZIO fetch-security-events:
  ai_description: >-
    ### General Description

    The Logz.io Fetch Security Events connector enables the ingestion of security
    events from a Logz.io account into Google SecOps. It allows security teams to
    monitor and respond to security rules triggered within Logz.io by converting these
    events into actionable cases within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | from_date | String | Yes | Earliest time to search. Accepts Unix timestamps,
    relative time, or "%Y-%m-%dT%H:%M:%S.%f". |

    | logzio_custom_endpoint | String | No | Optional custom URL for the Logz.io API;
    overrides logzio_region. |

    | logzio_region | String | No | 2-letter region code for your Logz.io account.
    |

    | logzio_token | Password | Yes | API token for your Logz.io security account.
    |

    | page_size | Integer | No | Controls the number of results per page (1-1000).
    |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | search_term | String | No | Filter for a matching string in the rule name. |

    | severities | String | No | Comma-delimited list of security rules severities
    (e.g., "INFO", "LOW", "MEDIUM", "HIGH", "SEVERE"). |


    ### Flow Description

    1. Initializes the connector and extracts configuration parameters, including
    the API token and region.

    2. Determines the API endpoint based on the provided region or custom URL.

    3. Calculates the time range for the query, using either the last saved timestamp
    or the user-provided `from_date`.

    4. Queries the Logz.io Security Rules API (`v2/security/rules/events/search`)
    with the specified filters (search term, severities, pagination).

    5. Iterates through all available pages of results to collect all relevant security
    events.

    6. Maps each Logz.io event to the Google SecOps alert format, including severity
    mapping and event details.

    7. Updates the internal timestamp to ensure subsequent runs fetch only new events.

    8. Returns the collected alerts to the SOAR platform for case creation.
