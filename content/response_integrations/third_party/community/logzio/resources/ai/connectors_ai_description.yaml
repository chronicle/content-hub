LOGZIO fetch-security-events:
  ai_description: >-
    ### General Description

    The Logz.io Fetch Security Events connector integrates with the Logz.io Cloud
    SIEM to automatically ingest security rule events into Google SecOps. It allows
    security teams to centralize their monitoring by converting Logz.io security alerts
    into actionable cases, ensuring that triggered rules are investigated within the
    SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product (default: `device_product`). |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type (default: `event_name`). |

    | from_date | String | Yes | The earliest time to search for events during the
    first run. Supports Unix timestamps, relative time (e.g., '1 day ago'), or ISO
    8601 format. |

    | logzio_custom_endpoint | String | No | Optional custom URL for the Logz.io API.
    If provided, it overrides the `logzio_region` parameter. |

    | logzio_region | String | No | The 2-letter region code for your Logz.io account
    (e.g., 'us', 'eu', 'uk'). Defaults to 'us' if left empty. |

    | logzio_token | Password | Yes | The API token for your Logz.io security account
    used for authentication. |

    | page_size | Integer | No | The number of results to retrieve per API call. Valid
    range is 1 to 1000 (default: 25). |

    | PythonProcessTimeout | String | Yes | The timeout limit in seconds for the connector's
    execution process. |

    | search_term | String | No | A filter string to match against the security rule
    names. |

    | severities | String | No | A comma-delimited list of severities to fetch (e.g.,
    "HIGH, SEVERE"). Supported values: INFO, LOW, MEDIUM, HIGH, SEVERE. |


    ### Flow Description

    1. **Endpoint Resolution**: The connector determines the Logz.io API endpoint
    using the provided region or custom endpoint URL.

    2. **Time Window Calculation**: It identifies the start time for the search. On
    the first run, it uses the `from_date` parameter; on subsequent runs, it uses
    the timestamp of the last ingested event plus a 100ms offset. The end time is
    set to 3 minutes prior to the current time to ensure data consistency.

    3. **Event Querying**: A POST request is sent to the Logz.io Security Events Search
    API with filters for time range, search terms, and severities.

    4. **Concurrent Pagination**: If the search results span multiple pages, the connector
    utilizes a thread pool to fetch all pages concurrently, optimizing data retrieval
    speed.

    5. **Data Transformation**: Each Logz.io event is mapped to a Google SecOps Alert
    object. This includes mapping Logz.io severities to platform priorities and extracting
    metadata such as rule descriptions, tags, and group-by fields.

    6. **Timestamp Persistence**: The connector tracks the latest event timestamp
    and saves it to the system state to prevent duplicate ingestion in future cycles.

    7. **Case Ingestion**: The compiled list of alerts is returned to Google SecOps
    for case creation and further orchestration.
