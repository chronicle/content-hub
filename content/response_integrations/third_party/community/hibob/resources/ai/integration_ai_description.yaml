product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Hibob integration is an HR management platform that provides context and lifecycle
    management for user identities. It qualifies for 'IAM & Identity Management' because
    it includes actions like 'Revoke Access' and 'Send Invitation', which allow the
    agent to manage user account states (suspending or enabling access). It also qualifies
    for 'Asset Inventory' because it provides 'Enrich Entities' and 'Search User'
    actions, which retrieve detailed HR metadata (department, role, status) for user
    entities, helping analysts understand the context of internal assets. It does
    not qualify for other categories like SIEM, EDR, Network Security, or Threat Intelligence
    as it does not interact with logs, host processes, network traffic, or external
    threat indicators.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
