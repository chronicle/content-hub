product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Hibob integration is an HR management system that provides identity-related
    information and management capabilities. It is classified under 'IAM & Identity
    Management' because it includes actions to search for users, revoke access (suspend
    accounts), and send invitations (enable accounts), which directly align with the
    requirement to manage user identities and account statuses. It is not classified
    under 'Asset Inventory' because the definition of that category focuses on hardware/software
    assets and devices managed by IT, whereas Hibob is an HR system. Other categories
    (SIEM, EDR, Network Security, Threat Intelligence, Email Security, Cloud Security,
    ITSM, Vulnerability Management, Collaboration) are not applicable as the integration
    does not perform the specific functions defined for those categories (e.g., log
    analysis, host containment, firewall management, ticket creation, etc.).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
