  ai_description: >-
    ### General Description

    The **Revoke Access** action is designed to disable a specific employee's access
    to the Hibob platform using their email address. This action is primarily used
    for offboarding or security containment to ensure a user can no longer authenticate
    or access company resources within Hibob.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | The email address of the employee whose access needs to be
    revoked in Hibob. | String | Yes |


    ### Additional Notes

    This action does not process entities from the Google SecOps case; it relies entirely
    on the provided email parameter. It performs a state-changing operation in Hibob
    by 'uninviting' the user.


    ### Flow Description

    1. **Retrieve Employee Details:** The action calls the Hibob API to find the employee's
    internal ID and current status based on the provided email address.

    2. **Validate Existence:** If the employee is not found in Hibob, the action returns
    a failure status.

    3. **Check Current Status:** The action checks if the employee's status is already
    'uninvited'. If so, it concludes that the revocation was already performed.

    4. **Execute Revocation:** If the employee is active, the action sends a POST
    request to the Hibob `/uninvite` endpoint to revoke their access.

    5. **Report Result:** The action returns a JSON result indicating whether the
    user existed and if the revocation was successfully completed.
