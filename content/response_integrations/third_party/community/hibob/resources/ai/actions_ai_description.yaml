  ai_description: >-
    Disables a specific employee's access in Hibob based on their email address. The
    action checks if the employee exists and their current invitation status before
    attempting to revoke access.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Employee's Email | String | Yes | The email address of the employee whose access
    to Hibob needs to be revoked. |


    ### Action Flow

    1. Extracts the employee's email from the action parameters.

    2. Fetches the employee's details from Hibob to verify their existence and current
    status.

    3. If the employee does not exist or is already uninvited, the action skips revocation
    and returns a relevant message.

    4. If the employee is active, sends a request to Hibob to revoke their access
    (uninvite).

    5. Returns the execution results and status in a JSON object.
