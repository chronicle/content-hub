  ai_description: >-
    ### General Description

    The **Upload User Image** action allows analysts to update or set a profile picture
    for a specific employee within the Hibob HR platform. By providing the employee's
    email and a direct URL to an image, the action automatically resolves the internal
    Hibob employee identifier and performs the update.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | String | Yes | The email address of the employee whose profile
    image you want to update. |

    | Url Image | String | Yes | The public URL of the image to be uploaded as the
    employee's avatar. |


    ### Flow Description

    1. **Retrieve Employee ID**: The action first queries the Hibob API using the
    provided email address to fetch the employee's unique internal identifier.

    2. **Validation**: It checks if the user exists in the Hibob system. If not, the
    action terminates with a failure message.

    3. **Upload Image**: Using the retrieved employee ID, the action sends a PUT request
    to the Hibob avatars endpoint, passing the provided image URL in the request body.

    4. **Final Status**: The action returns a success message if the image is updated
    or an error message if the upload fails (e.g., 404 error from the API).


    ### Additional Notes

    This action requires a valid API Token with permissions to read employee data
    and update avatars in Hibob.
