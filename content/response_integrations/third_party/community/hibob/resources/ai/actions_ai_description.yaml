Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches USER entities with properties from Hibob. It retrieves user details from
    the Hibob platform and appends them to the entity's additional properties within
    Google SecOps.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `USER`.

    3. Makes a GET request to the Hibob API (`/v1/people/{employee_identifier}`) to
    fetch user details.

    4. Flattens the retrieved JSON data and prefixes keys with "Hibob".

    5. Updates the entity's `additional_properties` with the flattened data and marks
    the entity as enriched (`is_enriched = True`).

    6. Saves the updated entities back to the platform using `siemplify.update_entities`
    and returns the raw data as a JSON result.


    ### Additional Notes

    The action expects the entity identifier to match the employee's ID or email in
    Hibob.
  ai_short_description: >-
    Enriches USER entities by retrieving employee details from Hibob and appending
    the flattened data to the entity's additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional_properties of the USER entities with data retrieved from
      Hibob and sets is_enriched to True.
    reasoning: >-
      The action fetches data by making a GET request to the Hibob API to retrieve
      user details. It does not mutate external data. It mutates internal data by
      updating the entity's additional properties and calling `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
