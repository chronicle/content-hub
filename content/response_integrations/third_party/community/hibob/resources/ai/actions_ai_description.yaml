Get User Image:
  ai_description: >-
    ### General Description

    Retrieves the profile image of a specific employee from Hibob using their email
    address. The action fetches the employee's details to obtain their unique identifier,
    then retrieves the image, returning it in both URL and Base64 encoded formats
    within a JSON result.


    ### Flow Description

    1. Extracts the `Employee's Email` from the action parameters.

    2. Makes a GET request to the Hibob API (`/v1/people/{email}`) to retrieve the
    employee's details and unique ID.

    3. If the employee is found, makes a subsequent GET request to the Hibob API (`/v1/avatars/{id}`)
    to fetch the user's profile image.

    4. Converts the retrieved image into a Base64 string.

    5. Returns the image URL and Base64 string as a JSON result.


    ### Additional Notes

    If the user is not found or does not have an image associated with their profile,
    the action returns a JSON result indicating the absence of the image (`exists:
    False` or `imageBase64: None`).
