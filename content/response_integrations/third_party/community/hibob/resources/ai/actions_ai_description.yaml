  ai_description: >-
    ### General Description

    Enriches User entities using Hibob. This action retrieves user details from Hibob
    based on the entity identifier, flattens the data, and appends it to the entity's
    additional properties within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Get User Image | Boolean | No | A parameter extracted in the code but not actively
    used in the main flow. |


    ### Flow Description

    1. Initializes the Hibob integration and extracts configuration.

    2. Iterates over the target entities and filters for User entities.

    3. Fetches user details from the Hibob API using the entity identifier.

    4. Flattens the retrieved user data and adds a 'Hibob' prefix to the keys.

    5. Updates the entity's additional properties with the flattened data and marks
    the entity as enriched.

    6. Updates the entities in Google SecOps and returns a JSON result containing
    the user information.
