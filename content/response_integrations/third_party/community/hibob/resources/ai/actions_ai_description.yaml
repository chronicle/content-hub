Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Hibob API to ensure that the integration is configured
    correctly with valid credentials.


    ### Flow Description

    1. Retrieves the integration configuration, including the API Token.

    2. Initializes the `HibobManager` with the provided credentials.

    3. Calls the `test_connectivity` method, which makes an HTTP GET request to the
    `/api/user` endpoint on the Hibob API.

    4. Evaluates the HTTP response status code to determine if the connection was
    successful.

    5. Returns a boolean value and an output message indicating success or failure.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Hibob integration to verify network reachability and authentication validity.
