    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's `additional_properties` and `is_enriched` flag within the
      SecOps platform.
    reasoning: >-
      The action fetches user profile data from the Hibob API (fetches_data=true).
      It does not perform any write operations on the external Hibob system (can_mutate_external_data=false).
      It updates the entity's `additional_properties` and `is_enriched` flag within
      the SecOps platform (can_mutate_internal_data=true, can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
  categories:
