Enrich Entities:
  ai_description: >-
    Enriches USER entities with detailed profile information from the Hibob HRIS platform.
    This action retrieves comprehensive employee data, flattens the hierarchical structure,
    and maps it directly to the entity's additional properties within Google SecOps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Get User Image | Boolean | No | If enabled, the action logic is prepared to
    handle user avatar retrieval (though the primary flow focuses on profile metadata).
    |


    ### Flow Description

    1. **Initialization**: Retrieves the Hibob API token from the integration configuration
    and initializes the Hibob Manager.

    2. **Entity Filtering**: Iterates through the target entities and identifies those
    of type `USER`.

    3. **Data Retrieval**: For each identified user, it queries the Hibob API (`/v1/people/{identifier}`)
    using the entity's identifier (email or ID).

    4. **Data Transformation**: Flattens the resulting JSON response to ensure all
    nested attributes are accessible and prefixes all keys with 'Hibob' for clear
    attribution.

    5. **Internal Update**: Updates the entity's `additional_properties` with the
    flattened data and sets the `is_enriched` flag to true.

    6. **Finalization**: Commits the updated entity profiles to the case and returns
    a full JSON result of the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with flattened Hibob user metadata and
      sets the 'is_enriched' flag on processed entities.
  categories:
