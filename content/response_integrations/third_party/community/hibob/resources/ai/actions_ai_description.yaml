Revoke Access:
  ai_description: >-
    ### General Description

    Revokes an employee's access to Hibob based on their email address. This action
    interacts with the Hibob API to check the user's current status and uninvites
    them, effectively disabling their access to the platform.


    ### Flow Description

    1. Extracts the target employee's email address from the action parameters.

    2. Makes a GET request to the Hibob API (`/v1/people/{email}`) to retrieve the
    employee's current details and invitation state.

    3. Evaluates the employee's existence and state. If the employee does not exist
    or is already marked as 'uninvited', the action halts and returns a failure status.

    4. If the employee is active, makes a POST request to the Hibob API (`/v1/employees/{id}/uninvite`)
    to revoke their access.

    5. Returns a JSON result containing the execution status, including whether the
    user existed and if the revocation was successfully performed.


    ### Additional Notes

    The action will fail gracefully (return False) if the provided email does not
    correspond to an existing employee in Hibob or if the employee's access has already
    been revoked.
  ai_short_description: >-
    Revokes an employee's access to Hibob by uninviting them based on their email
    address.
