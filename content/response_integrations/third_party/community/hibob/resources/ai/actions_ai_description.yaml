Upload User Image:
  ai_description: >-
    ### General Description

    Uploads an image to a specific employee's profile in Hibob using a provided image
    URL. This action modifies the user's avatar in the external HR system.


    ### Flow Description

    1. Extracts the target employee's email and the image URL from the action parameters.

    2. Makes a GET request to the Hibob API (`/v1/people/{email}`) to retrieve the
    employee's internal ID.

    3. If the employee exists, makes a PUT request to the Hibob API (`/v1/avatars/{id}`)
    to upload and set the new user image.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    The action requires a valid image URL and an existing employee email in Hibob
    to succeed. It does not operate on SecOps entities.
