  ai_description: >-
    ### General Description

    The **Enrich Entities** action retrieves detailed employee information from the
    Hibob HR platform for User entities within a case. It is designed to provide security
    analysts with organizational context, such as department, role, and manager details,
    by mapping Hibob user attributes directly to the entity's properties in Google
    SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Get User Image | Boolean | No | If enabled, the action logic is prepared to
    handle user avatar retrieval, though the primary flow focuses on metadata enrichment.
    |


    ### Flow Description

    1. **Initialization**: The action initializes the Hibob manager using the provided
    API Token and base URL.

    2. **Entity Filtering**: It iterates through all target entities in the current
    context, specifically filtering for those of type **USER**.

    3. **Data Retrieval**: For each User entity, the action queries the Hibob API
    (`/v1/people/{identifier}`) using the entity's identifier (typically an email
    or employee ID).

    4. **Data Transformation**: The retrieved JSON response is flattened into a single-level
    dictionary to ensure compatibility with entity attributes.

    5. **Namespace Prefixing**: A "Hibob" prefix is added to all retrieved keys to
    prevent data collisions and clearly identify the source of the enrichment.

    6. **Internal Update**: The entity's `additional_properties` are updated with
    the new metadata, and the entity is marked as `is_enriched`.

    7. **Finalization**: The action updates the entities within Google SecOps and
    outputs a summary message of the enriched users along with the raw JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with flattened Hibob user metadata and
      sets the 'is_enriched' flag to true.
