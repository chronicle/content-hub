Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity between the Google SecOps
    platform and the Hibob service. It ensures that the provided API credentials (API
    Token) are valid and that the Hibob API endpoint is reachable. This is typically
    used as a health check for the integration.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the integration configuration, specifically the API Token.

    2. **Manager Setup**: An instance of the HibobManager is created using the hardcoded
    API root (`https://api.hibob.com`) and the retrieved API Token.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the `/api/user` endpoint.

    4. **Validation**: The manager checks for successful HTTP status codes. It specifically
    handles 401 (Unauthorized) and 404 (Not Found) errors to provide descriptive exceptions.

    5. **Output**: If the request is successful and returns valid JSON, the action
    concludes with a 'Connected successfully' message. Otherwise, it reports a connection
    failure.
