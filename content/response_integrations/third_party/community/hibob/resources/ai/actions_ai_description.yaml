  ai_description: >-
    ### General Description

    Sends an invitation to a new or previously disabled employee in the Hibob system,
    allowing them to log in and access the platform.


    ### Flow Description

    1. Extracts the employee's email and welcome wizard name from the action parameters.

    2. Calls the Hibob API to retrieve the employee's details and verify their existence
    in the system.

    3. Checks the employee's current invitation status. If they are already in an
    'invited' state, the action stops and reports this status.

    4. If not invited, fetches all available welcome wizards from the Hibob API to
    find the ID matching the provided wizard name.

    5. Sends a POST request to the Hibob API to dispatch the invitation to the employee
    using the resolved wizard ID.

    6. Returns a JSON result containing the execution status, wizard name, and wizard
    ID.


    ### Additional Notes

    The action requires the exact, case-sensitive name of the welcome wizard as configured
    in Hibob (Settings -> Flows).
