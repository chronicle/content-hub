  ai_description: >-
    ### General Description

    This action enriches User entities within the Google SecOps platform by retrieving
    detailed profile information from the Hibob HR system. It fetches user data based
    on the entity identifier, flattens the nested JSON response, and updates the entity's
    `additional_properties` with the retrieved information. This provides analysts
    with immediate access to HR-related context (e.g., department, role, status) directly
    within the entity profile.


    ### Flow Description

    1. **Initialization**: The action initializes the `HibobManager` using the API
    root and token provided in the integration configuration.

    2. **Iteration**: It iterates through all `target_entities` associated with the
    alert.

    3. **Filtering**: It filters for entities of type `USER`.

    4. **Data Retrieval**: For each valid user entity, it calls the Hibob API to fetch
    user details using the entity identifier.

    5. **Data Processing**: If data is found, it flattens the nested dictionary structure
    and adds a 'Hibob' prefix to all keys to ensure clarity.

    6. **Internal Update**: It updates the entity's `additional_properties` with the
    flattened data, sets the `is_enriched` flag to `True`, and updates the entity
    in the SecOps platform.

    7. **Result Reporting**: Finally, it adds the raw user data to the action result
    JSON and returns a summary of enriched entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Get User Image | Boolean | No | A flag indicating whether to attempt to retrieve
    the user's profile image. Note: While extracted, this parameter is not utilized
    in the core enrichment logic of the current script version. |


    ### Additional Notes

    This action performs read-only operations on the external Hibob system (GET requests)
    and only modifies internal entity data within the SecOps platform.
  capabilities:
