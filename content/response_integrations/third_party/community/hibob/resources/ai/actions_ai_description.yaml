Send Invitation:
  ai_description: >-
    Sends a login invitation to an employee in the Hibob system. This action is primarily
    used to invite new employees to log in for the first time or to re-invite users
    who were previously disabled. It validates the employee's existence and current
    invitation status before proceeding.


    ### Flow Description:

    1. **Retrieve Employee Details:** The action fetches the employee's profile from
    Hibob using the provided email address to obtain their unique internal ID and
    current invitation state.

    2. **Status Validation:** It checks if the employee is already in an 'invited'
    state. If so, the action stops to prevent redundant invitations.

    3. **Wizard Identification:** If the employee is eligible for an invitation, the
    action retrieves a list of all available onboarding wizards (flows) from Hibob.

    4. **Match Wizard:** It searches the list for a wizard matching the 'Welcome Wizard
    Name' parameter to find the corresponding Wizard ID.

    5. **Send Invitation:** Finally, it executes a POST request to the Hibob API to
    send the invitation using the identified Employee ID and Wizard ID.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | string | True | The email address of the employee to whom
    the invitation will be sent. |

    | Welcome Wizard Name | string | True | The exact name of the onboarding wizard/flow
    configured in Hibob (e.g., "Welcome!"). This field is case-sensitive. |


    ### Additional Notes:

    - This action does not run on SecOps entities; it uses the email address provided
    in the action parameters.

    - The 'Welcome Wizard Name' must match exactly as defined in Hibob (Settings ->
    Flows).
  capabilities:
