Upload User Image:
  ai_description: >-
    ### General Description

    This action allows for the programmatic updating of an employee's profile picture
    in the Hibob HR platform. It takes an employee's email address and a URL pointing
    to an image, resolves the email to a Hibob internal employee ID, and then updates
    the user's avatar.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | string | Yes | The email address of the employee whose image
    you want to update. This is used to look up the employee's internal ID. |

    | Url Image | string | Yes | The direct URL of the image to be set as the employee's
    new profile picture. |


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the Hibob API token and root
    URL from the integration settings.

    2. **Employee Lookup:** It calls the Hibob API to fetch the details of the employee
    associated with the provided email address.

    3. **ID Extraction:** If the employee is found, the action extracts their unique
    internal identifier (ID).

    4. **Image Upload:** The action sends a PUT request to the Hibob avatar endpoint
    for that specific employee ID, providing the new image URL.

    5. **Result Handling:** The action checks the response from Hibob. If the upload
    is successful, it returns a success message; otherwise, it reports a failure (e.g.,
    if the user was not found or the upload failed).


    ### Additional Notes

    - This action requires a valid API token with permissions to read employee data
    and update avatars.

    - The image URL must be accessible by the Hibob service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a PUT request to the Hibob '/v1/avatars/{employee_identifier}'
      endpoint to update the profile image of a specific employee.
