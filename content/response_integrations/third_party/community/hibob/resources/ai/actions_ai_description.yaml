  ai_description: >-
    ### General Description

    The **Get User Image** action retrieves the profile image of a specific employee
    from Hibob. It fetches the image as a base64 encoded string and its corresponding
    URL, returning the data as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Employee's Email | String | Yes | The email address of the employee whose image
    you want to retrieve. *(Note: The original parameter description mentions 'upload
    a photo', but this action is designed to fetch/download the photo.)* |


    ### Flow Description

    1. Extracts the `Employee's Email` from the action parameters.

    2. Queries the Hibob API to retrieve the employee's details and extract their
    unique employee ID.

    3. If the employee is found, queries the Hibob API again using the employee ID
    to fetch the user's image.

    4. Converts the retrieved image to a base64 string.

    5. Outputs the base64 string, image URL, and existence status as a JSON result.
