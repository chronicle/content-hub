  ai_description: >-
    ### General Description


    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Hibob platform. It ensures that the provided API credentials and the network
    path to the Hibob API are functional.


    ### Parameters Description


    There are no parameters for this action.


    ### Additional Notes


    This action is primarily used for troubleshooting and initial setup verification.


    ### Flow Description


    1. **Configuration Retrieval**: The action retrieves the API Token from the integration
    settings.

    2. **Manager Initialization**: An instance of the Hibob Manager is created using
    the API root and token.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the `/api/user` endpoint.

    4. **Response Validation**: The action checks for successful HTTP status codes
    and valid JSON responses.

    5. **Final Output**: Returns a success message if the connection is established,
    or an error message if it fails.
