    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional properties of the target entities with the fetched user
      data.
    reasoning: >-
      The action fetches user details from the Hibob API (fetches_data=true). It does
      not mutate any external data (can_mutate_external_data=false). It mutates internal
      data by updating the entities with the fetched data (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alert data, or
      create case comments.
  categories:
