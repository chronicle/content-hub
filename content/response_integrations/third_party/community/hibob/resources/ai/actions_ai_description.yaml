Get User Image:
  ai_description: >-
    Retrieves the profile image for a specific employee from the Hibob platform. The
    action uses an email address to identify the user, fetches their unique employee
    ID, and then retrieves the associated avatar data. The resulting image is processed
    and returned as a Base64-encoded string and a raw URL string within the JSON results.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | string | True | The email address of the employee whose profile
    photo you want to retrieve. |


    ### Flow Description


    1. **Identify User:** The action calls the Hibob API to retrieve employee details
    based on the provided email address to obtain the internal employee ID.

    2. **Fetch Image:** Using the employee ID, the action makes a request to the Hibob
    avatar endpoint to retrieve the binary image content.

    3. **Process Data:** The binary image data is encoded into a Base64 string for
    easy use in downstream tasks or UI components.

    4. **Output Results:** The action populates a JSON result containing the Base64
    string, the image URL/content, and a boolean indicating if the user exists.
