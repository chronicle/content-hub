Revoke Access:
  ai_description: >-
    ### General Description

    The **Revoke Access** action disables a specific employee's access to the Hibob
    platform using their email address. This action is primarily used for offboarding
    or responding to security incidents by ensuring a user can no longer authenticate
    to the Hibob HRIS system.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | The email address of the employee whose access you want to
    revoke in Hibob. | String | Yes |


    ### Flow Description

    1. **Retrieve User Details:** The action calls the Hibob API to fetch the employee's
    internal identifier and current invitation state based on the provided email address.

    2. **Validate Existence:** If the employee is not found in Hibob, the action returns
    a message stating the user does not exist.

    3. **Check Current Status:** The action checks if the employee's status is already
    set to 'uninvited'. If so, it concludes that access was already revoked.

    4. **Execute Revocation:** If the employee is active, the action sends a POST
    request to the Hibob `/uninvite` endpoint to revoke the user's access.

    5. **Report Result:** The action returns a JSON result indicating whether the
    user existed and if the revocation was successfully performed.


    ### Additional Notes

    This action operates independently of Google SecOps entities and relies entirely
    on the manually provided email parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action sends a POST request to the Hibob API's uninvite endpoint, which
      changes the employee's account state to 'uninvited', effectively disabling their
      access to the platform.
