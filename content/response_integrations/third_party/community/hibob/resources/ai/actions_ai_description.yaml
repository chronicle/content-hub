  ai_description: >-
    ### General Description

    The **Get User Image** action retrieves the profile image (avatar) for a specific
    employee from the Hibob platform using their email address. This action is useful
    for enriching user profiles within a security context or for identity verification
    processes. It returns the image in both Base64 encoded format and as a decoded
    string.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | String | True | The email address of the employee whose photo
    you want to retrieve. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the provided employee email
    from the input parameters.

    2. **User Identification**: It queries the Hibob API to find the employee's internal
    unique identifier associated with the provided email address.

    3. **Image Retrieval**: Using the internal identifier, it fetches the employee's
    avatar data from the Hibob avatar endpoint.

    4. **Data Processing**: The binary image content is encoded into a Base64 string
    for easy transport and display.

    5. **Result Output**: The action returns a JSON object containing the Base64 string
    and the decoded content, along with status flags indicating if the user and image
    exist.


    ### Additional Notes

    - If the user is not found or does not have an image associated with their profile,
    the action will return a failure status with a descriptive message.
