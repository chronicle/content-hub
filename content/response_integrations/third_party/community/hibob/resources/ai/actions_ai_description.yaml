  ai_description: >-
    ### General Description

    Sends an invitation to a new employee to log into the Hibob system for the first
    time or reinvites a user after they were disabled. This action interacts with
    the Hibob API to manage employee onboarding and access.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Employee's Email | String | Yes | The email of the employee that you want to
    send the invitation to in order to start using the Hibob system. |

    | Welcome Wizard Name | String | Yes | The wizard name found in Hibob (Settings
    -> Flows), for example: "Welcome!". This parameter is case-sensitive. |


    ### Flow Description

    1. Extracts the provided employee email and welcome wizard name parameters.

    2. Fetches the employee details from Hibob using the provided email.

    3. Checks if the employee exists and verifies their current invitation status.

    4. If the employee exists and is not already invited, fetches the list of available
    welcome wizards from Hibob.

    5. Matches the provided wizard name to retrieve its corresponding wizard ID.

    6. Sends the invitation to the employee using the matched wizard ID via a POST
    request to the Hibob API.

    7. Returns a JSON result indicating whether the employee exists and if the invitation
    was sent successfully.
