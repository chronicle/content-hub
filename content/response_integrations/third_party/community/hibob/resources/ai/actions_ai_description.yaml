  ai_description: >-
    Searches for a specific user's details in Hibob using their email address. This
    action is primarily used to verify the existence of an employee and retrieve their
    profile information from the Hibob HRIS platform. It retrieves a comprehensive
    JSON object containing the user's data if a match is found.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the 'Employee's Email' from
    the user-provided parameters.

    2. **API Request:** It initializes the Hibob Manager and performs a GET request
    to the Hibob API endpoint `/v1/people/{email}`.

    3. **Data Processing:** The action checks the API response. If the user exists
    (HTTP 200), it captures the user's profile details.

    4. **Result Reporting:** The retrieved data is added to the action's JSON results,
    and the action completes with a success message. If the user is not found (HTTP
    404), it returns a failure message.


    ### Parameters Description:

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Employee's Email | The email address of the employee to search for in Hibob.
    | String | Yes | Default value is 'email@gmail.com'. |


    ### Additional Notes:

    This action operates independently of the entities present in the Google SecOps
    case. It relies strictly on the email address provided in the 'Employee's Email'
    parameter.
