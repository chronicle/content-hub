  ai_description: >-
    ### General Description

    This action sends an invitation to a new or existing employee in the Hibob HR
    system. It is primarily used to invite users to log in for the first time or to
    re-invite users who were previously disabled or whose invitation state is not
    currently active. The action identifies the user by their email address and applies
    a specific onboarding 'Welcome Wizard' flow as defined in the Hibob settings.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Employee's Email | The email address of the employee to be invited. | String
    | True | Used to look up the employee's unique ID in Hibob. |

    | Welcome Wizard Name | The name of the onboarding wizard flow (e.g., 'Welcome!').
    | String | True | This value is case-sensitive and must match the name configured
    in Hibob (Settings -> Flows). |


    ### Additional Notes

    - The action first verifies if the employee exists in Hibob before attempting
    to send an invitation.

    - If the employee is already in an 'invited' state, the action will terminate
    without sending a duplicate invitation to avoid spamming the user.

    - The 'Welcome Wizard Name' must exactly match the name in Hibob for the corresponding
    ID to be correctly resolved.


    ### Flow Description

    1. **Fetch Employee Details:** The action calls the Hibob API to retrieve the
    employee's unique identifier and current invitation state based on the provided
    email.

    2. **Validate State:** It checks if the employee exists and if they have already
    been invited.

    3. **Retrieve Wizards:** If the employee is eligible for an invitation, the action
    fetches a list of all available onboarding wizards from Hibob.

    4. **Resolve Wizard ID:** It searches the list of wizards to find the ID corresponding
    to the provided 'Welcome Wizard Name'.

    5. **Send Invitation:** The action performs a POST request to Hibob to trigger
    the invitation for the employee using the identified wizard ID.
