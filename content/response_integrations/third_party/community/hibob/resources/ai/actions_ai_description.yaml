  ai_description: >-
    ### General Description

    This action retrieves the profile image for a specific employee from the Hibob
    HR platform. It fetches the image as both a URL and a base64-encoded string, allowing
    analysts to view user avatars directly within the SOAR platform.


    ### Flow Description

    1. **Extract Parameters**: The action retrieves the `Employee's Email` provided
    by the user.

    2. **Fetch User Details**: It queries the Hibob API to resolve the email address
    to a unique employee identifier.

    3. **Fetch Image**: Using the employee identifier, it requests the user's avatar
    image from the Hibob API.

    4. **Process Data**: If the image is found, it converts the binary content into
    a base64 string.

    5. **Return Results**: The action outputs the image URL and base64 string as a
    JSON result for the analyst.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Employee's Email | string | Yes | The email address of the employee whose profile
    image is to be retrieved. |


    ### Additional Notes

    This action is read-only and does not modify any data within the SOAR platform
    or the external Hibob system.
