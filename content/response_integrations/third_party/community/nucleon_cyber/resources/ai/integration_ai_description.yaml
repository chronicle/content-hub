  reasoning: >-
    The integration 'nucleon_cyber' provides threat intelligence feeds via its 'GetIPs'
    action, which retrieves active threat intelligence data from the Nucleon Cyber
    API. This functionality aligns directly with the 'Threat Intelligence' category,
    as the platform is designed to provide intelligence feeds to help identify adversaries
    and threats. The integration does not perform functions related to SIEM (log searching),
    EDR (host-level activity), Network Security (firewall/WAF management), Email Security,
    IAM, Cloud Security, ITSM, Vulnerability Management, Asset Inventory, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
