  reasoning: >-
    The Nucleon Cyber integration is primarily designed to provide high-quality threat
    intelligence feeds to secure environments against APTs and professional hacking
    groups. The 'GetIPs' action retrieves active threat intelligence data from the
    Nucleon Cyber API, which directly aligns with the Threat Intelligence category's
    purpose of providing enrichment data (such as risk scores or threat indicators)
    to confirm if an alert is a True Positive. The integration does not perform actions
    related to SIEM log searching, EDR host management, network security blocking,
    email management, identity management, cloud resource configuration, ITSM ticketing,
    vulnerability scanning, asset inventory management, or collaboration/notification
    workflows.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
