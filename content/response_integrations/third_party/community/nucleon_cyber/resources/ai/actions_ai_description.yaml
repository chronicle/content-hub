  ai_description: >-
    ### General Description

    Verifies connectivity to the NucleonCyber API. This action performs a test request
    to the active threats endpoint to ensure that the provided credentials (Username,
    Password) and client identifiers (Client Name, Client ID) are valid and that the
    service is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | limit | string | Yes | Specifies the number of API results to request during
    the connectivity test to verify data retrieval capabilities. |


    ### Additional Notes

    This is a standard connectivity test (Ping) action and does not process or enrich
    specific entities within a case.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the integration's global configuration
    parameters, including Username, Password, Client Name, and Client ID.

    2. **Parameter Extraction**: Retrieves the `limit` action parameter.

    3. **API Request**: Executes a POST request to the NucleonCyber `activethreats`
    endpoint using basic authentication and the client identifiers in the request
    body.

    4. **Validation**: Checks the HTTP response status. If the status code is not
    200, it raises an exception indicating bad credentials or a connection error.

    5. **Completion**: Ends the action with a success message if the connection is
    established.
