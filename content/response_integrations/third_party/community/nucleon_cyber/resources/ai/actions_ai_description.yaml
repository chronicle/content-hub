GetIPs:
  ai_description: >-
    ### General Description

    The **GetIPs** action retrieves active threat intelligence data from the Nucleon
    Cyber Active Threats API. It is designed to fetch a list of recently collected
    cyber intelligence data points, typically used for feed ingestion or broad threat
    hunting within a playbook. The action returns the raw intelligence data in a structured
    JSON format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **limit** | string | Yes | Specifies the maximum number of threat intelligence
    records to retrieve from the API. Defaults to '10'. |


    ### Additional Notes

    * This action does not process specific entities from the Google SecOps case;
    instead, it fetches a global feed of active threats based on the provided credentials
    and limit.

    * The action requires valid integration-level configuration for `Username`, `Password`,
    `client name`, and `client id` to authenticate successfully.


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the necessary API credentials
    (Username, Password, Client Name, Client ID) from the integration settings and
    the `limit` parameter from the action input.

    2. **API Request:** It performs a POST request to the Nucleon Cyber `activethreats`
    endpoint, passing the client identifiers and the result limit in the request body.

    3. **Authentication & Validation:** The script validates the response status code
    and checks for specific error strings (e.g., 'ApiKey authenticate failed') to
    ensure the connection was successful.

    4. **Data Extraction:** It parses the JSON response to extract the `data` section
    containing the threat intelligence.

    5. **Output Generation:** The retrieved data is added to the action's JSON results
    and context details, making it available for subsequent playbook steps.
