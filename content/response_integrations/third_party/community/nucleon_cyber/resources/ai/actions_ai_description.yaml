    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves a general feed of active threats (IPs) from a threat intelligence
      provider. It does not enrich a specific IOC or asset provided by the alert,
      nor does it perform any remediation, ticketing, or email operations. Therefore,
      it does not match any of the specific expected outcomes defined in the categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Retrieves a list of active threat IP addresses from the Nucleon Cyber Active Threats
    API. This action fetches a feed of recently collected cyber intelligence data
    and attaches it to the playbook context as a JSON object for use in subsequent
    playbook steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | limit | String | Yes | Specifies the maximum number of API results to return.
    Default value is "10". |


    ### Flow Description

    1. Extracts integration configuration parameters (Username, Password, client name,
    client id) and the action parameter (`limit`).

    2. Makes an authenticated POST request to the Nucleon Cyber Active Threats API
    endpoint to retrieve the threat feed.

    3. Validates the API response and extracts the threat data payload.

    4. Attaches the retrieved data as a JSON result to the action and playbook context
    for further use.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to the Nucleon Cyber API to retrieve a
      feed of active threats. Although it uses a POST method, it is strictly fetching
      data based on the payload parameters and does not mutate external state. It
      does not modify internal Google SecOps data such as entities, alerts, or case
      comments; it only outputs the fetched data as a JSON result to the playbook.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Nucleon Cyber API) and does
      not mutate any external or internal state. It passes all the criteria in the
      enrichment pseudocode, acting as a data retrieval task.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not reference `siemplify.target_entities` or perform any entity-specific
      operations. It simply fetches a general feed of threat data.
