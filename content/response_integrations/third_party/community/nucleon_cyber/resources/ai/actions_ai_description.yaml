  ai_description: >-
    ### General Description

    Retrieves a list of active cyber threats from the Nucleon Cyber Active Threats
    API. This action provides a JSON object containing intelligence data which can
    be used for further analysis or correlation within a playbook.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | limit | string | Yes | The maximum number of threat records to retrieve from
    the API. Default is 10. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary credentials
    (Username, Password) and client identifiers (Client Name, Client ID) from the
    integration configuration.

    2. **Parameter Retrieval**: It fetches the `limit` parameter to determine how
    many threat records to request.

    3. **API Interaction**: A POST request is sent to the Nucleon Cyber `activethreats`
    endpoint with the provided credentials and parameters.

    4. **Error Handling**: The action checks for a successful HTTP 200 response and
    validates that the API key/credentials are correct.

    5. **Data Processing**: It extracts the threat data from the response JSON.

    6. **Output Generation**: The retrieved data is added to the action's JSON results,
    making it available for subsequent steps in the SOAR workflow.
