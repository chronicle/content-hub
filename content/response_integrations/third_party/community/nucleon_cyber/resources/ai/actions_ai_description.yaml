GetIPs:
  ai_description: >-
    ### General Description

    Retrieves recent cyber intelligence data from the Nucleon Cyber Active Threats
    API. This action fetches a feed of active threats and returns them as a structured
    JSON object for use in playbooks.


    ### Flow Description

    1. Extracts the `limit` parameter to determine the maximum number of results to
    retrieve.

    2. Makes an HTTP POST request to the Nucleon Cyber Active Threats API (`https://api.nucleoncyber.com/feed/activethreats`)
    using the provided credentials and limit.

    3. Validates the API response and extracts the threat data.

    4. Outputs the retrieved data as a JSON result for use in subsequent playbook
    steps.


    ### Additional Notes

    Ensure that the integration is properly configured with valid credentials (Username,
    Password, client name, and client id) to successfully authenticate with the API.
  ai_short_description: >-
    Retrieves recent cyber intelligence data from the Nucleon Cyber Active Threats
    API and returns it as a JSON object.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to the Nucleon Cyber API to fetch a feed
      of active threats (fetches_data=true). Although it uses a POST request, it is
      retrieving data rather than mutating external state (can_mutate_external_data=false).
      It does not update entities, create insights, modify alerts, or create case
      comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
