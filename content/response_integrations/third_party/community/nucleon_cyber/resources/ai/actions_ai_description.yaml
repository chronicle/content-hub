  ai_description: >-
    ### General Description\nThis action retrieves active threat intelligence data
    from the Nucleon Cyber API. It is designed to fetch a feed of cyber intelligence,
    which can then be used in subsequent playbook steps for analysis or automated
    response.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description
    |\n| :--- | :--- | :--- | :--- |\n| limit | string | Yes | Specifies the maximum
    number of threat intelligence records to retrieve from the API. The default value
    is '10'. |\n\n### Flow Description\n1. The action extracts the necessary integration
    configuration parameters, including 'Username', 'Password', 'client name', and
    'client id', as well as the 'limit' parameter.\n2. It initiates a POST request
    to the Nucleon Cyber Active Threats API endpoint ('https://api.nucleoncyber.com/feed/activethreats')
    using the provided credentials and parameters.\n3. The action validates the API
    response status. If the status is not 200, it raises an authentication error.\n4.
    It parses the JSON response to extract the 'data' section.\n5. The retrieved threat
    intelligence data is added to the action results using 'siemplify.result.add_result_json'
    and 'siemplify.result.add_json' for use in the playbook.\n6. The action concludes
    with a success message.
