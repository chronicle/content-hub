  ai_description: >-
    ### General Description\nThis action retrieves active threat intelligence data
    from the Nucleon Cyber API. It is designed to fetch a feed of cyber intelligence,
    which can then be used in subsequent playbook steps for analysis or automated
    response.\n\n### Parameters Description\n* **limit** (string, mandatory): Specifies
    the maximum number of threat intelligence records to retrieve from the API. The
    default value is '10'.\n\n### Flow Description\n1. The action extracts the necessary
    integration configuration parameters, including 'Username', 'Password', 'client
    name', and 'client id', as well as the 'limit' parameter.\n2. It initiates a POST
    request to the Nucleon Cyber Active Threats API endpoint ('https://api.nucleoncyber.com/feed/activethreats')
    using the provided credentials and parameters.\n3. The action validates the API
    response status. If the status is not 200, it raises an authentication error.\n4.
    It parses the JSON response to extract the 'data' section.\n5. The retrieved threat
    intelligence data is added to the action results using 'siemplify.result.add_result_json'
    and 'siemplify.result.add_json' for use in the playbook.\n6. The action concludes
    with a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to an external API to fetch threat intelligence
      data. It does not mutate external systems, nor does it modify internal SOAR
      data (entities, insights, or case comments). It is a data retrieval action.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data from an external source (Nucleon Cyber API) but does
      not perform enrichment on specific entities or alerts. It is a global data retrieval
      action, not an enrichment action as defined by the SOAR SDK guidelines.
  entity_usage:
