  ai_description: >-
    ### General Description

    The Ping action is used to test connectivity to the NucleonCyber API. It verifies
    that the provided credentials and configuration parameters are valid by making
    a test request to the active threats feed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | limit | String | Yes | Limit API results. |


    ### Flow Description

    1. Extracts configuration parameters (Username, Password, client name, client
    id) and the action parameter (limit).

    2. Sends a POST request to the NucleonCyber active threats API endpoint.

    3. Evaluates the response status code to confirm successful authentication.

    4. Returns a success message if the connection is established, otherwise raises
    an exception.
