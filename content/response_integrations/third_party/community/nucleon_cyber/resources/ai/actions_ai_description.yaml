Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the NucleonCyber API. It serves as a diagnostic tool to ensure that the provided
    credentials (Username, Password) and configuration parameters (Client Name, Client
    ID) are valid and that the external service is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **limit** | String | Yes | Specifies the number of API results to request during
    the connectivity test. Defaults to "5". |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the integration's global
    settings, including the Username, Password, Client Name, and Client ID.

    2. **Parameter Extraction**: The action retrieves the `limit` parameter from the
    action input.

    3. **API Request**: It performs a POST request to the NucleonCyber `activethreats`
    endpoint (`https://api.nucleoncyber.com/feed/activethreats`) using Basic Authentication.

    4. **Validation**: The action checks the HTTP response status code. If the status
    code is 200, it confirms a successful connection.

    5. **Outcome**: If the connection is successful, the action returns a success
    message. If the credentials or connection fail (non-200 status), an exception
    is raised.


    ### Additional Notes

    * This action does not process any entities and is strictly used for integration
    health checks.
