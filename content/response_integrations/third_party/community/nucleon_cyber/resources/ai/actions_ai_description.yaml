  ai_description: >-
    General Description: This action verifies connectivity to the NucleonCyber API
    by sending a POST request to the `activethreats` endpoint. It validates the provided
    credentials and configuration parameters.


    Parameters description:

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | limit | string | Yes | Specifies the limit for API results. |


    Additional notes: None.


    Flow description:

    1. Extracts configuration parameters (Username, Password, client name, client
    id) and the action parameter `limit`.

    2. Sends a POST request to the NucleonCyber API endpoint (`https://api.nucleoncyber.com/feed/activethreats`)
    using the provided credentials and parameters.

    3. Validates the response status code to ensure the connection is successful.

    4. Terminates the action with a success message if the connection is established.
