    get_alert_information: false
    reasoning: >-
      The action retrieves a feed of active threat intelligence data from an external
      API. It does not match any of the specific categories like 'Enrich IOC', 'Enrich
      Asset', 'Search Events', or 'Get Alert Information' as it is a general-purpose
      data retrieval action for a threat feed.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
