  ai_description: >-
    ### General Description

    Adds a new user with specified details to Vanilla Forums. This action creates
    a new account in the external system, handling potential username duplications
    by appending specified special characters if allowed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | First Name | String | Yes | The new user's first name. |

    | Last Name | String | Yes | The new user's last name. |

    | Email | String | Yes | The new user's email address. |

    | Role ID | String | Yes | The ID of the role to assign to the new user. |

    | Password | Password | Yes | Password for the new user. Must be at least 6 characters
    and include both letters and digits. |

    | Override Name Duplicity | Boolean | No | If true, allows creating the user even
    if the username already exists (provided the email is different) by appending
    special characters. |

    | Additional Identifiers | String | No | A comma-separated list of characters
    (e.g., `_,~,-`) used to replace the gap between the first and last name if the
    username already exists. |

    | Photo URL | String | No | The URL of the new user's profile picture. |

    | Email Confirmed | Boolean | No | Set to true if the email address of the new
    user is already confirmed. |


    ### Flow Description

    1. **Validation**: Validates that the provided password meets the required standard
    (at least 6 characters, containing both letters and digits).

    2. **Duplicity Check**: Searches Vanilla Forums to check if the requested username
    (First Name + Last Name) already exists.

    3. **Username Resolution**: If the username exists and `Override Name Duplicity`
    is enabled, iterates through the `Additional Identifiers` to find an available
    unique username.

    4. **User Creation**: Sends a POST request to the Vanilla Forums API to create
    the new user with the resolved username and provided details.

    5. **Output Generation**: Returns the newly created user's details as a JSON result.
