  ai_description: >-
    ### General Description

    The **Get User Details** action retrieves comprehensive profile information for
    a specific user from Vanilla Forums using their unique User ID. This action is
    designed to fetch metadata such as usernames, email addresses, roles, and ranks,
    providing context for investigations involving forum participants.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | User ID | The unique identifier of the user whose details you want to fetch.
    | String | Yes | 0 |


    ### Flow Description

    1. **Initialization:** The action initializes the Siemplify environment and retrieves
    the Vanilla Forums API token and Base URL from the integration configuration.

    2. **Parameter Extraction:** It extracts the `User ID` provided by the user.

    3. **API Interaction:** The action calls the `get_user_details` method in the
    `VanillaManager`, which executes a GET request to the `/v2/users/{user_id}` endpoint.

    4. **Result Handling:** If successful, the full JSON response from Vanilla Forums
    is attached to the action results. If the user is not found or an error occurs,
    the action reports a failure.


    ### Additional Notes

    - This action does not process SecOps entities; it relies entirely on the manually
    provided `User ID` parameter.
