  ai_description: >-
    ### General Description

    Adds a new user to Vanilla Forums with comprehensive profile details including
    name, email, role, and password. This action is useful for automated user provisioning
    or onboarding processes within a community management workflow. It includes built-in
    logic to handle username collisions by appending or replacing characters based
    on user-defined separators.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First Name | string | Yes | The first name of the new user. |

    | Last Name | string | Yes | The last name of the new user. |

    | Email | string | Yes | The email address for the new account. |

    | Role ID | string | Yes | The numeric ID of the role to be assigned to the user
    (e.g., '8'). |

    | Password | password | Yes | The password for the new user. Must be at least
    6 characters long and contain both letters and digits. |

    | Override Name Duplicity | boolean | No | If set to 'True', the action will attempt
    to create the user even if the username already exists by using alternative identifiers.
    Default is 'False'. |

    | Additional Identifiers | string | No | A comma-separated list of characters
    (e.g., '_,~,-') used to replace the space between first and last names if the
    primary username is taken. |

    | Email Confirmed | boolean | No | Whether the user's email address is marked
    as confirmed upon creation. Default is 'True'. |

    | Photo URL | string | No | The URL for the new user's profile picture. |


    ### Additional Notes

    - The action performs a validation check on the password complexity before attempting
    to communicate with the Vanilla Forums API.

    - If `Override Name Duplicity` is enabled and all provided `Additional Identifiers`
    result in existing usernames, the action will fail.


    ### Flow Description

    1. **Validation**: Validates that the provided password meets the complexity requirements
    (minimum 6 characters, includes letters and digits).

    2. **Username Check**: Checks if a user with the combined 'First Name' and 'Last
    Name' already exists in Vanilla Forums.

    3. **Collision Handling**: If the name exists and `Override Name Duplicity` is
    enabled, the action iterates through the `Additional Identifiers` to find a unique
    username variation.

    4. **User Creation**: Sends a POST request to the Vanilla Forums API to create
    the user account with the specified attributes.

    5. **Result Processing**: Returns the created user's details, including the assigned
    email and password, as a JSON result.
