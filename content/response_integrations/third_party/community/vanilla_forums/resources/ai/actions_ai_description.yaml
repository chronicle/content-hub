Update Rank:
  ai_description: >-
    ### General Description

    The **Update Rank** action allows analysts to programmatically change the rank
    of a specific user within the Vanilla Forums platform. This is typically used
    for administrative tasks or as part of a response workflow where a user's permissions
    or status needs to be adjusted based on their activity or security profile.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Rank ID | The unique identifier of the rank you wish to assign to the user.
    | String | Yes | 2 |

    | User ID | The unique identifier of the user whose rank you want to modify. |
    String | Yes | 0 |


    ### Additional Notes

    This action does not run on SecOps entities (like IP or Hostname). Instead, it
    requires specific User and Rank IDs provided as manual inputs or mapped from previous
    playbook steps. It performs a direct state change in the Vanilla Forums environment.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Rank ID` and `User ID`
    from the input parameters.

    2. **API Initialization:** It initializes the Vanilla Forums manager using the
    integration's API Token and Base URL.

    3. **External Request:** The action sends a `PUT` request to the Vanilla Forums
    API endpoint `/v2/users/{user_id}/rank` with the new `rankID` in the payload.

    4. **Result Processing:** If the request is successful, the action returns a success
    message and the JSON response from the API. If it fails, it captures the error
    and reports a failure state.
