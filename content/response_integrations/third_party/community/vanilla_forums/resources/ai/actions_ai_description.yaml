Get User Details:
  ai_description: "### General Description\nThe **Get User Details** action retrieves\
    \ comprehensive information about a specific user from Vanilla Forums using their\
    \ unique User ID. This action is designed to fetch metadata such as the user's\
    \ name, email, roles, rank, and profile information, providing administrative\
    \ context for investigations or auditing purposes.\n\n### Parameters Description\n\
    | Parameter | Description | Type | Mandatory | Notes |\n| :--- | :--- | :--- |\
    \ :--- | :--- |\n| **User ID** | The unique identifier of the user whose details\
    \ are to be retrieved. | String | Yes | Default value is \"0\". |\n\n### Flow\
    \ Description\n1. **Initialization**: The action initializes the connection to\
    \ Vanilla Forums using the API Token and Base URL from the integration configuration.\n\
    2. **Parameter Extraction**: The `User ID` is extracted from the action parameters\
    \ and trimmed of whitespace.\n3. **API Request**: The action calls the `get_user_details`\
    \ method in the `VanillaManager`, which executes a GET request to the `/v2/users/{user_id}`\
    \ endpoint.\n4. **Response Handling**: \n    - If successful, the user's JSON\
    \ data is captured.\n    - If the user is not found or the request fails, an error\
    \ is logged and the action status is set to failed.\n5. **Output**: The retrieved\
    \ JSON data is added to the action's results, and the action completes with a\
    \ descriptive message.\n\n### Additional Notes\n- This action does not interact\
    \ with Google SecOps entities (e.g., it does not iterate over `target_entities`).\
    \ It operates strictly based on the provided `User ID` parameter.\n- There are\
    \ no parameters that are conditionally mandatory; only the `User ID` is required."
