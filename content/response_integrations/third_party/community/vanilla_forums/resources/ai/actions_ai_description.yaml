Update Badge:
  ai_description: >-
    Awards a specific badge to a user within the Vanilla Forums platform. This action
    uses the Vanilla Forums API to associate a badge ID with a user ID, effectively
    updating the user's profile with the new achievement. It is primarily used for
    community management and engagement automation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | string | True | The unique identifier of the user who will receive
    the badge. |

    | Badge ID | string | True | The unique identifier of the badge to be awarded
    to the user. |


    ### Flow Description

    1. **Initialization**: The action initializes the Vanilla Forums manager using
    the API Token and Base URL provided in the integration configuration.

    2. **Parameter Extraction**: It retrieves the 'User ID' and 'Badge ID' from the
    action input parameters.

    3. **API Execution**: The action calls the `give_user_badge` method in the manager,
    which sends a POST request to the Vanilla Forums endpoint `/v2/badges/{badge_id}/users`
    with the user's ID in the payload.

    4. **Result Handling**: If the request is successful, it returns the badge assignment
    details as a JSON result and completes the action. If the request fails, it captures
    the error and marks the action as failed.
