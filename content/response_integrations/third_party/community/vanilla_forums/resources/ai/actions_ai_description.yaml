Search User By Email and Name:
  ai_description: >-
    ### General Description

    This action searches for a user within the Vanilla Forums platform using both
    an email address and a username. It is designed to verify the existence of a user
    account and retrieve associated details if the email search is successful. The
    action returns boolean indicators for the existence of the email and username
    independently, providing a clear picture of whether the provided identifiers are
    registered in the system.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description | Expected Value |

    | :--- | :--- | :--- | :--- | :--- |

    | User Email | string | Yes | The email address of the user to search for. | A
    valid email string (e.g., `user@example.com`). |

    | User Name | string | Yes | The full name or username of the user to search for.
    | A string representing the user's display name or username. |


    ### Additional Notes

    - The action performs two separate lookups: one by email and one by username.

    - If the email is found, the full user details (as returned by the Vanilla Forums
    API) are included in the `UserDetails` field of the result JSON.

    - The action will succeed (result value `True`) if either the email OR the username
    is found in the system.


    ### Flow Description

    1. **Initialization**: The action extracts the integration configuration (API
    Token and URL) and the user-provided parameters (`User Email` and `User Name`).

    2. **Email Search**: The action calls the `search_user_by_email` method, which
    iterates through the `/v2/users` endpoint (handling pagination) to find a match
    for the provided email.

    3. **Username Search**: The action calls the `search_user_by_name` method, which
    queries the `/v2/users/by-names` endpoint to check for the existence of the provided
    username.

    4. **Data Aggregation**: The results from both searches are compiled into a JSON
    object. This includes boolean flags for `Email` and `UserName` existence.

    5. **Completion**: The action sets the final output message based on the search
    results and returns the aggregated JSON data to the Google SecOps platform.
