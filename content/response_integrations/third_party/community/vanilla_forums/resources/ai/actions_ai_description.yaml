Add User:
  ai_description: >-
    Adds a new user to Vanilla Forums with comprehensive profile details including
    name, email, role, and password. The action includes logic to handle username
    collisions by attempting to use alternative separators (e.g., underscores or hyphens)
    if the primary name is already taken and duplicity is allowed. It validates password
    complexity requirements before attempting creation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First Name | string | True | The first name of the new user. |

    | Last Name | string | True | The last name of the new user. |

    | Email | string | True | The email address for the new account. |

    | Password | password | True | The account password. Must be at least 6 characters
    and contain both letters and digits. |

    | Role ID | string | True | The numeric ID of the role to assign to the user (e.g.,
    '8'). |

    | Override Name Duplicity | boolean | False | If 'True', allows creating a user
    even if the username exists (provided the email is different). |

    | Additional Identifiers | string | False | A comma-separated list of characters
    (e.g., '_,~,-') to use as separators between first and last names if the default
    space is taken. |

    | Email Confirmed | boolean | False | Whether the user's email address is pre-confirmed.
    Default is 'true'. |

    | Photo URL | string | False | URL for the user's profile picture. |


    ### Flow Description

    1. **Validation:** Validates that the provided password meets the complexity requirements
    (minimum 6 characters, contains letters and digits).

    2. **Availability Check:** Searches Vanilla Forums for the proposed username (First
    Name + Space + Last Name).

    3. **Collision Handling:** If the name exists and 'Override Name Duplicity' is
    enabled, the action iterates through the 'Additional Identifiers' to find an available
    username variant (e.g., First_Last).

    4. **User Creation:** Sends a POST request to the Vanilla Forums API to create
    the user account with the specified attributes.

    5. **Result Reporting:** Returns the created user's details, including the assigned
    email and password, as a JSON result.
