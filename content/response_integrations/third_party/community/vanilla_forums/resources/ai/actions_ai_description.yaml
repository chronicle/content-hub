  ai_description: >-
    Fetches analytics for specific leaderboards from Vanilla Forums within a defined
    date range. This action allows analysts to retrieve performance and activity data
    (such as top posters or discussion starters) for community management or auditing
    purposes. It queries the Vanilla Forums API for each specified leaderboard and
    returns the aggregated data as a JSON result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Leaderboards | string | Yes | A comma-separated list of leaderboard identifiers
    to query (e.g., 'top-posters, top-discussion-starters'). |

    | To | string | Yes | The end date of the analytics timeframe in YYYY-MM-DD format.
    |

    | Amount Limit | string | Yes | The maximum number of rows/records to return for
    each individual leaderboard. |

    | From | string | Yes | The start date of the analytics timeframe in YYYY-MM-DD
    format. |


    ### Flow Description

    1. **Initialization**: The action initializes the Vanilla Forums manager using
    the provided API Token and Base URL from the integration configuration.

    2. **Parameter Parsing**: It extracts the list of leaderboards, the date range
    (From/To), and the result limit from the action parameters.

    3. **Data Retrieval**: The action iterates through each requested leaderboard
    and calls the Vanilla Forums API to fetch the corresponding analytics data for
    the specified timeframe.

    4. **Result Aggregation**: The retrieved data for each board is collected into
    a structured JSON list.

    5. **Completion**: The action outputs the aggregated JSON results and a summary
    message indicating which leaderboards were successfully processed.
