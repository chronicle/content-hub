    and include both letters and digits. |
Generate Password:
  ai_description: >-
    ### General Description

    Generates a random password string that complies with Vanilla Forums' password
    requirements. The generated password consists of at least one uppercase letter,
    one lowercase letter, and a sequence of digits to match the requested length.


    ### Flow Description

    1. Extracts the desired password length from the action parameters.

    2. Validates that the requested length is at least 6 characters.

    3. Generates a random string locally containing one uppercase letter, one lowercase
    letter, and the remaining characters as digits.

    4. Returns the generated password as the action's result value.


    ### Additional Notes

    This action performs local string generation and does not make any external API
    calls to Vanilla Forums.
