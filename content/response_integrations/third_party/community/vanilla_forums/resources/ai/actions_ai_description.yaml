Add User:
  ai_description: >-
    ### General Description

    Adds a new user with specified details to Vanilla Forums. This action allows for
    the creation of a new user account and includes logic to handle username duplications
    if configured to do so.


    ### Flow Description

    1. Validates the provided password to ensure it meets the minimum complexity requirements
    (at least 6 characters, including both letters and digits).

    2. Searches Vanilla Forums for an existing user with the provided first and last
    name via a GET request to the `/v2/users/by-names` endpoint.

    3. If a duplicate name is found and the `Override Name Duplicity` parameter is
    enabled, the action iterates through the `Additional Identifiers` to generate
    a unique username.

    4. Creates the new user in Vanilla Forums via a POST request to the `/v2/users`
    endpoint.

    5. Returns the newly created user's details as a JSON result.


    ### Additional Notes

    If a username already exists and all provided additional identifiers are exhausted
    (or if duplicity override is disabled), the action will fail and return an error.
  ai_short_description: >-
    Adds a new user with specified details to Vanilla Forums, handling potential username
    duplications if configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user account in Vanilla Forums.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Vanilla Forums API to create a new user
      account, which mutates external data. It does not fetch contextual data for
      alerts/entities, nor does it mutate internal SecOps data, update entities, or
      create insights.
