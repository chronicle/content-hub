  ai_description: >-
    ### General Description

    This action adds a new user to the VanillaForums platform. It validates the provided
    password complexity, checks for existing users with the same name to avoid duplicates
    (optionally appending special characters if needed), and registers the new user
    with the specified role and details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First Name | string | Yes | New user's first name. |

    | Last Name | string | Yes | New user's last name. |

    | Email | string | Yes | New user's email address. |

    | Role ID | string | Yes | The ID of the role to assign to the user. |

    | Password | password | Yes | Password for the new user. Must be at least 6 characters
    and include both letters and digits. |

    | Override Name Duplicity | boolean | No | If true, allows creating a user even
    if another user with the same name exists (by appending special characters). |

    | Additional Identifiers | string | No | Characters to use as separators if the
    username already exists. |

    | Photo URL | string | No | URL of the new user's picture. |

    | Email Confirmed | boolean | No | Whether the email address is confirmed. |


    ### Additional Notes

    This action requires valid API credentials (API Token and URL) configured for
    the VanillaForums integration. The action will fail if the password does not meet
    the complexity requirements or if a unique username cannot be generated when name
    duplicity is not allowed.


    ### Flow Description

    1. Extracts integration configuration and action parameters.

    2. Validates the password complexity.

    3. Searches for an existing user in VanillaForums using the provided first and
    last name.

    4. If the user exists and name duplicity is allowed, attempts to find a unique
    username by appending characters from the 'Additional Identifiers' list.

    5. Registers the new user in VanillaForums via a POST request.

    6. Returns the user details in the result JSON.
