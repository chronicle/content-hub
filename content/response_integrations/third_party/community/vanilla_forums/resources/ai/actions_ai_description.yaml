  ai_description: >-
    ### General Description

    The **Search User By Email and Name** action is designed to verify the existence
    of a user within the VanillaForums platform. It performs two independent searches:
    one based on a provided email address and another based on a username. This action
    is primarily used to validate user accounts or retrieve specific user details
    during investigations or administrative workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User Email** | String | Yes | The email address of the user to search for.
    The search is performed case-insensitively. |

    | **User Name** | String | Yes | The full name or username of the user to search
    for in the platform. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `User Email` and `User Name`
    from the input parameters, applying basic cleaning (stripping whitespace and converting
    the email to lowercase).

    2. **Email Search**: It queries the VanillaForums API's `/v2/users` endpoint.
    Since this endpoint returns a list, the action iterates through pages of users
    to find an exact match for the provided email.

    3. **Name Search**: It queries the `/v2/users/by-names` endpoint to check for
    the existence of the provided username.

    4. **Result Consolidation**: The action evaluates if a user was found via either
    the email or the name search. If found by email, the full user details are captured.

    5. **Output**: The action returns a boolean result indicating if any match was
    found, along with a JSON object containing the search status for both identifiers
    and the user details if available.


    ### Additional Notes

    - This action does not interact with Google SecOps entities; it relies entirely
    on the string values provided in the parameters.

    - The `UserDetails` field in the JSON output is only populated if a match is found
    during the email search phase.
