Get a Leaderboard Analytics:
  ai_description: >-
    ### General Description

    Fetches analytics for specified leaderboards within a given date range from Vanilla
    Forums. This action retrieves statistical data for community engagement and returns
    it as a structured JSON object.


    ### Flow Description

    1. Extracts the action parameters, including the comma-separated list of leaderboards,
    the amount limit, and the start and end dates.

    2. Iterates through the provided list of leaderboards.

    3. For each leaderboard, makes an HTTP GET request to the Vanilla Forums API (`/v2/analytics/leaderboard`)
    to fetch the analytics data for the specified time frame and limit.

    4. Aggregates the fetched data for all requested leaderboards and attaches it
    to the action's JSON result.


    ### Additional Notes

    Ensure that the date parameters are provided in the correct `{yyyy}-{mm}-{dd}`
    format to avoid API errors.
