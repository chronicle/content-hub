Update User Role:
  ai_description: >-
    ### General Description

    Updates the role of a specific user within the Vanilla Forums platform. This action
    allows administrators to programmatically reassign user permissions by providing
    the unique User ID and the target Role ID. It is primarily used for identity management
    and access control workflows.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Additional Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | RoleID | The unique identifier of the role to be assigned to the user. | String
    | Yes | This should be the numeric or string ID as defined in Vanilla Forums.
    |

    | UserID | The unique identifier of the user whose role is being changed. | String
    | Yes | The target user's ID. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `UserID` and `RoleID` from
    the input parameters.

    2. **API Initialization**: It initializes the `VanillaManager` using the integration's
    API Token and Base URL.

    3. **Role Update**: The action calls the `give_user_role` method, which sends
    a `PATCH` request to the Vanilla Forums `/v2/users/{userID}` endpoint with the
    new `roleID` in the payload.

    4. **Response Handling**: The action parses the API response. If the role is successfully
    updated, it returns the updated user details as a JSON result. If the role ID
    is invalid or the user is not found, it raises an error.

    5. **Completion**: The action concludes by reporting the success or failure of
    the operation to the SOAR case wall.
