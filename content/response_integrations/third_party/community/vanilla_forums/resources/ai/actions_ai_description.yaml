  ai_description: >-
    Generates a random password string that adheres to Vanilla Forums' complexity
    requirements. The action creates a password consisting of at least one uppercase
    letter, one lowercase letter, and a sequence of digits to reach the specified
    length.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the desired password length from the action
    parameters.

    2. **Validation:** Checks if the requested length is at least 6 characters; if
    not, the action fails.

    3. **Password Generation:** Uses a local utility to construct a string with one
    uppercase letter, one lowercase letter, and the remaining characters as digits.

    4. **Output:** Returns the generated password string as the script result.


    ### Parameters Description:

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Length | String | No | The total number of characters for the generated password.
    Must be at least 6. Defaults to 6 if not specified. |


    ### Additional Notes:

    * This action does not interact with any external APIs; it performs local string
    generation logic.

    * The generated password is provided as the raw result of the action for use in
    subsequent playbook steps (e.g., creating a user).
