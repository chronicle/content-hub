Generate Password:
  ai_description: >-
    ### General Description

    Generates a random password that complies with Vanilla Forums' password requirements.
    The generated password consists of at least one uppercase letter, one lowercase
    letter, and the remainder as digits, ensuring a minimum complexity level for user
    accounts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Length | String | No | The desired length of the generated password. Must be
    an integer of at least 6. Defaults to 6 if not specified. |


    ### Additional Notes

    - The action performs local string generation logic and does not communicate with
    the Vanilla Forums API to generate the password.

    - If a length less than 6 is provided, the action will fail with an error message.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Length` parameter from
    the input and converts it to an integer.

    2. **Validation**: It checks if the length is at least 6 characters. If not, it
    raises an exception.

    3. **Password Generation**: The `VanillaManager` generates a password string by:
        - Selecting one random uppercase letter.
        - Selecting one random lowercase letter.
        - Selecting random digits for the remaining length (Length - 2).
    4. **Completion**: The generated password is returned as the action's result value
    and the execution state is set to completed.
