Get a Leaderboard Analytics:
  ai_description: >-
    ### General Description

    The **Get a Leaderboard Analytics** action retrieves statistical data for specified
    leaderboards from a Vanilla Forums instance. It allows analysts to gather engagement
    metrics (such as top posters or discussion starters) within a specific timeframe
    to understand community activity or identify influential users.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Leaderboards** | String | Yes | A comma-separated list of leaderboard names
    to query (e.g., `top-posters, top-discussion-starters`). |

    | **From** | String | Yes | The start date for the analytics report in `YYYY-MM-DD`
    format. |

    | **To** | String | Yes | The end date for the analytics report in `YYYY-MM-DD`
    format. |

    | **Amount Limit** | String | Yes | The maximum number of records to return for
    each requested leaderboard. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of leaderboards, the
    date range (From/To), and the result limit from the user input.

    2. **Input Processing:** The `Leaderboards` string is split into a list of individual
    board identifiers.

    3. **Data Retrieval:** For each leaderboard in the list, the action calls the
    Vanilla Forums API (`/v2/analytics/leaderboard`) to fetch the corresponding analytics
    data.

    4. **Result Aggregation:** The retrieved data for all boards is compiled into
    a single JSON structure.

    5. **Output:** The action provides the aggregated JSON results and a status message
    indicating success or failure for each board.


    ### Additional Notes

    - Ensure the date format strictly follows `YYYY-MM-DD` to avoid API errors.

    - The `Amount Limit` should be provided as a string representing a numeric value.
