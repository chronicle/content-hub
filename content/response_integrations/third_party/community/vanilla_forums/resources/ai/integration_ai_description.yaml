  reasoning: >-
    The vanilla_forums integration provides administrative actions to manage users
    within the VanillaForums platform, including Add User, Update Rank, and Update
    User Role. These actions allow for the creation of users and the modification
    of user privileges and roles, which aligns with the IAM & Identity Management
    category. The integration does not perform SIEM, EDR, Network Security, Threat
    Intelligence, Email Security, Cloud Security, ITSM, Vulnerability Management,
    Asset Inventory, or Collaboration functions as defined in the provided criteria.
    While the integration includes search and retrieval actions, these do not map
    to the specific definitions of the other categories (e.g., they are not for IT
    assets or IOCs).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
