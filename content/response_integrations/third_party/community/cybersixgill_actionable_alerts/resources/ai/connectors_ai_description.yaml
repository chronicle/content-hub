Cybersixgill Actionable Alerts:
  ai_description: >-
    ### General Description

    The Cybersixgill Actionable Alerts connector integrates Google SecOps with the
    Cybersixgill threat intelligence platform. It periodically polls for actionable
    alerts, allowing security teams to ingest high-fidelity threat intelligence directly
    into the SOAR platform. The connector retrieves detailed threat data, including
    CVE information, CVSS scores, and remediation recommendations, enabling automated
    response and investigation workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alerts Limit | Integer | Yes | The maximum number of alerts to fetch in a single
    execution. |

    | Client Id | String | Yes | The Client ID for authenticating with the Cybersixgill
    API. |

    | Client Secret | String | Yes | The Client Secret for authenticating with the
    Cybersixgill API. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Organization id | String | No | The specific Organization ID to filter alerts
    (if applicable). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process. |

    | Threat Level | String | No | Filter alerts by a specific threat level (e.g.,
    imminent). |

    | Threat Type | String | No | Filter alerts by specific threat types (comma-separated).
    |


    ### Flow Description

    1. **Authentication**: Initializes the `SixgillActionableAlertClient` using the
    provided Client ID and Client Secret.

    2. **Time Range Calculation**: Determines the time window for fetching alerts
    based on the last successful execution timestamp (or defaults to 30 days back
    on the first run).

    3. **Data Retrieval**: Queries the Cybersixgill API for actionable alerts, applying
    filters for `Threat Level`, `Threat Type`, and `Alerts Limit`.

    4. **Alert Processing**: Iterates through the retrieved alerts, mapping them to
    the SOAR `AlertInfo` format.

    5. **Enrichment**: Fetches detailed event data for each alert, including CVE details,
    CVSS scores, threat attributes, and remediation recommendations.

    6. **Ingestion**: Packages the processed alerts and sends them to the SOAR platform
    for case creation.

    7. **State Management**: Updates the connector's last execution timestamp to ensure
    subsequent runs only fetch new alerts.
