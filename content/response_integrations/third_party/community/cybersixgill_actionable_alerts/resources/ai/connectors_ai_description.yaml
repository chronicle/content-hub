Cybersixgill Actionable Alerts:
  ai_description: >-
    ### General Description

    This connector integrates with Cybersixgill to fetch actionable threat intelligence
    alerts. It retrieves alerts based on configured filters (threat level, threat
    type) and ingests them into Google SecOps as cases, providing detailed context
    including CVE information, threat assessments, and associated assets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alerts Limit | Integer | Yes | The maximum number of alerts to fetch in a single
    execution. |

    | Client Id | Password | Yes | The Client ID for Cybersixgill API authentication.
    |

    | Client Secret | Password | Yes | The Client Secret for Cybersixgill API authentication.
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Organization id | String | No | The specific Organization ID to filter alerts.
    |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |

    | Threat Level | String | No | Filter alerts by threat level (e.g., imminent).
    |

    | Threat Type | String | No | Filter alerts by threat type (comma-separated).
    |


    ### Flow Description

    1. Authenticates with the Cybersixgill API using the provided Client ID and Client
    Secret.

    2. Calculates the time range for fetching alerts based on the last run timestamp
    or a default lookback period.

    3. Queries the Cybersixgill API for actionable alerts, applying filters for threat
    level, threat type, and organization ID if provided.

    4. For each retrieved alert, fetches detailed information, including threat assessments,
    recommendations, and associated CVE data.

    5. Maps the alert data into the Google SecOps AlertInfo format, including raw
    JSON, portal URLs, and sub-alert details.

    6. Updates the connector timestamp to the latest alert creation time and returns
    the processed alerts to the SOAR platform.
