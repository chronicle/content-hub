  network_security: false
  reasoning: >-
    The Cybersixgill Actionable Alerts integration is primarily a Threat Intelligence
    feed. It monitors the deep, dark, and surface web for threats related to specific
    assets (IPs, domains, vulnerabilities, VIPs) and ingests these as actionable alerts
    into the SOAR platform. This directly aligns with the Threat Intelligence category,
    as it provides risk scores, threat attributes, and historical data to confirm
    alerts. Additionally, the integration retrieves detailed CVE information, CVSS
    scores, and remediation recommendations, which aligns with the Vulnerability Management
    category by helping users understand the severity and exploitability of threats.
    It does not function as a SIEM (it does not query internal logs), EDR (it does
    not interact with host processes), or Network Security tool (it does not manage
    gateway blocking), nor does it perform the other listed functions.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
