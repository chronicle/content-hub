Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity and authentication configuration between\
    \ Google SecOps and the Cybersixgill platform. It ensures that the provided credentials\
    \ (Client ID and Client Secret) are valid and that the environment can successfully\
    \ communicate with the Cybersixgill API.\n\n### Parameters Description\n| Parameter\
    \ Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Client\
    \ Id | password | Yes | The unique client identifier provided by Cybersixgill\
    \ for API access. |\n| Client Secret | password | Yes | The secret key associated\
    \ with the Client ID used for authentication. |\n\n### Flow Description\n1. **Parameter\
    \ Extraction:** The action retrieves the `Client Id` and `Client Secret` from\
    \ the integration configuration.\n2. **Client Initialization:** It initializes\
    \ the `SixgillEnrichManager` using the extracted credentials.\n3. **Authentication\
    \ Check:** The manager attempts to create a Cybersixgill client and perform a\
    \ handshake by requesting an access token via the `get_access_token` method.\n\
    4. **Result Reporting:** \n    * If the token is successfully retrieved, the action\
    \ returns a success status and a confirmation message.\n    * If the authentication\
    \ fails or a connection error occurs, the action catches the exception and returns\
    \ a failure status with the error details.\n\n### Additional Notes\n* This action\
    \ does not process any entities and is strictly used for configuration validation.\n\
    * As a 'Ping' type action, it is excluded from enrichment classifications regardless\
    \ of its data-fetching behavior."
