  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill API by validating the provided credentials.
    This action ensures that the integration is correctly configured and can communicate
    with the external service.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | password | Yes | The client ID used for authentication with the
    Cybersixgill service. |

    | Client Secret | password | Yes | The client secret used for authentication with
    the Cybersixgill service. |


    ### Flow Description

    1. The action retrieves the `Client Id` and `Client Secret` from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` using these credentials.

    3. It attempts to authenticate with the Cybersixgill API by requesting an access
    token.

    4. The action returns a success or failure status based on the authentication
    attempt.
