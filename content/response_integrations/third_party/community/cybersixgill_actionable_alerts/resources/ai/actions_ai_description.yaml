  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Cybersixgill platform. It validates that the provided credentials (Client
    ID and Client Secret) are correct and that the environment can successfully communicate
    with the Cybersixgill API by attempting to retrieve an authentication token.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Client Id** | Password | Yes | The unique identifier for the Cybersixgill
    API client used for authentication. |

    | **Client Secret** | Password | Yes | The secret key associated with the Cybersixgill
    API client used for authentication. |


    ### Flow Description

    1. **Credential Extraction**: The action retrieves the `Client Id` and `Client
    Secret` from the integration configuration parameters.

    2. **Client Initialization**: It initializes the Cybersixgill communication manager
    using the provided credentials.

    3. **Authentication Test**: The action attempts to retrieve an OAuth2 access token
    from the Cybersixgill API.

    4. **Result Reporting**: If the token is successfully retrieved, the action returns
    a success status and a confirmation message. If an error occurs (e.g., invalid
    credentials or network timeout), it reports a failure with the specific error
    details.


    ### Additional Notes

    This action does not process any entities, fetch contextual data, or modify any
    internal or external records. It is strictly a diagnostic tool for connectivity
    testing.
