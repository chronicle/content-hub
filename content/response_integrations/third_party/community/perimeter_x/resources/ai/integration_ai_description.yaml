product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The integration provides a connector to ingest security alerts from PerimeterX
    Code Defender via Slack. PerimeterX Code Defender is a web application security
    solution that detects client-side attacks. By ingesting these alerts into the
    SOAR platform, the integration enables security teams to respond to web-based
    attacks, which aligns with the 'Network Security' category definition of verifying
    if a web-based attack was blocked or detected. The integration does not perform
    host-level analysis (EDR), identity management (IAM), or ticketing (ITSM), nor
    does it provide enrichment or log searching capabilities (SIEM/Threat Intelligence).
    Therefore, it is classified under Network Security.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
