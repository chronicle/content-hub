  network_security: true
  reasoning: >-
    The integration consists of a connector that ingests alerts from PerimeterX Code
    Defender, a web application security tool, via Slack. These alerts relate to web-based
    attacks, which aligns with the Network Security category's focus on verifying
    if web-based attacks were blocked. The integration does not perform SIEM log searching,
    EDR host analysis, threat intelligence enrichment, or other functions defined
    in the other categories. While it is an alert ingestion tool, it does not meet
    the specific criteria for SIEM (log searching/correlation) or other categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
