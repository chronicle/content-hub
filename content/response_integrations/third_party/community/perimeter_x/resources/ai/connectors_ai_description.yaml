Slack Connector For Code Defender:
  ai_description: >-
    ### General Description

    The Slack Connector For Code Defender integrates Google SecOps with Slack to ingest
    security alerts generated by PerimeterX Code Defender. It monitors a designated
    Slack channel where PerimeterX posts incident notifications, automatically converting
    these messages into structured cases for security orchestration and response.
    This connector is ideal for teams using Slack as a centralized notification hub
    for their PerimeterX security events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Slack Channel | String | Yes | The name of the Slack channel to monitor for
    alerts (e.g., 'cd_alerts'). Do not include the '#' prefix. |

    | Slack API Key | Password | Yes | The OAuth API Key used to authenticate with
    the Slack API. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the connector script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type within the SOAR. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product (e.g., PerimeterXCodeDefender). |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Slack API using the
    provided API Key.

    2. **Channel Identification**: It searches for the internal Slack Channel ID corresponding
    to the configured channel name.

    3. **Message Retrieval**: The connector fetches recent message history from the
    channel, utilizing a stored timestamp to ensure only new messages since the last
    execution are processed.

    4. **Alert Filtering**: It filters the message stream specifically for messages
    containing the title "Code Defender has detected a new incident" within the attachments.

    5. **Data Extraction**: For each matching message, the connector parses the attachment
    fields to extract critical alert metadata, including Risk Level (Severity), Host
    Domain, Script details, and deep links to the PerimeterX console.

    6. **Mapping and Ingestion**: The extracted data is mapped to the Google SecOps
    AlertInfo model, where Risk Levels are translated into system priorities. The
    alerts are then ingested as cases.

    7. **Checkpointing**: The timestamp of the most recent processed message is saved
    to prevent duplicate ingestion in subsequent runs.
