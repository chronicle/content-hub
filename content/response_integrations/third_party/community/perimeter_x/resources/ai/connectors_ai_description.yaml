Slack Connector For Code Defender:
  ai_description: >-
    ### General Description\nThe PerimeterX Code Defender Connector integrates Google
    SecOps with Slack to ingest security alerts generated by PerimeterX Code Defender.
    It monitors a designated Slack channel for specific incident notifications, parses
    the message content, and creates corresponding alerts within the SOAR platform
    for further investigation and response.\n\n### Parameters Description\n| Parameter
    | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Slack Channel
    | String | Yes | The name of the Slack channel to monitor (without the "#" prefix).
    |\n| Slack API Key | Password | Yes | The API key used to authenticate with the
    Slack API. |\n| PythonProcessTimeout | String | Yes | The timeout limit (in seconds)
    for the Python process execution. |\n| EventClassId | String | Yes | The field
    name used to determine the event name (sub-type). |\n| DeviceProductField | String
    | Yes | The field name used to determine the device product. |\n\n### Flow Description\n1.
    The connector initializes by connecting to the Slack API using the provided API
    key.\n2. It resolves the configured Slack channel name to a channel ID.\n3. It
    fetches message history from the channel, starting from the last successful execution
    timestamp to ensure only new alerts are processed.\n4. It filters messages to
    identify those specifically related to "Code Defender" incidents.\n5. For each
    identified incident, it parses the message attachments to extract relevant data
    such as severity, affected script, domain, and deep links.\n6. It maps the extracted
    data into a standardized `AlertInfo` format and ingests the alerts into the SOAR
    platform.\n7. Finally, it updates the last run timestamp to ensure subsequent
    runs continue from the correct point in time.
