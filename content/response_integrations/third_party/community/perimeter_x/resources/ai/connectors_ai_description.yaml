Slack Connector For Code Defender:
  ai_description: >-
    ### General Description

    This connector integrates with Slack to ingest PerimeterX Code Defender alerts.
    It monitors a specific Slack channel for incident notifications, parses the message
    content, and creates corresponding cases within Google SecOps for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Slack Channel | String | Yes | The name of the Slack channel to monitor (e.g.,
    "cd_alerts"). Do not include the "#" prefix. |

    | Slack API Key | Password | Yes | The API key used to authenticate with the Slack
    API. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process running the connector script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |


    ### Flow Description

    1. The connector initializes by connecting to the Slack API using the provided
    API Key.

    2. It retrieves the channel ID corresponding to the configured Slack channel name.

    3. It fetches the conversation history from the Slack channel, starting from the
    last successful execution timestamp.

    4. The connector filters the retrieved messages to identify those specifically
    related to PerimeterX Code Defender incidents (matching the title "Code Defender
    has detected a new incident").

    5. For each identified incident, it parses the message attachments to extract
    relevant details such as severity, script name, host domain, and deep links.

    6. The extracted data is mapped into AlertInfo objects, which are then ingested
    as cases into Google SecOps.

    7. The connector updates the last run timestamp to ensure that only new alerts
    are processed in future iterations.
