  ai_description: "The Ping action verifies connectivity to the Slack API by performing\
    \ an authentication test. It is used to ensure that the integration is correctly\
    \ configured and can communicate with the Slack workspace. \n\n### Parameters\n\
    | Parameter | Type | Mandatory | Description |\n| --- | --- | --- | --- |\n| Slack\
    \ API Key | String | Yes | The API key used to authenticate with the Slack workspace.\
    \ |\n| Slack Channel | String | Yes | The name of the Slack channel to verify\
    \ connectivity against. |\n\n### Flow\n1. Extract the configuration parameters\
    \ (Slack API Key and Slack Channel) from the integration settings.\n2. Initialize\
    \ the PerimeterXManager with the provided credentials and connector type.\n3.\
    \ Execute the auth() method, which sends a POST request to the Slack auth.test\
    \ endpoint to validate the API key.\n4. If the authentication is successful, return\
    \ a success message; otherwise, return an error message indicating the failure.\n\
    5. Terminate the action with the appropriate execution status (Completed or Failed)."
