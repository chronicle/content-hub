  ai_description: >-
    ### General Description\nThe **Ping** action is a diagnostic tool designed to
    verify the connectivity between Google SecOps and the Slack API using the configured
    PerimeterX integration credentials. It ensures that the provided API key is valid
    and that the system can successfully communicate with Slack's authentication endpoints.\n\n###
    Parameters Description\n\n| Parameter | Type | Mandatory | Description |\n| :---
    | :--- | :--- | :--- |\n| Slack API Key | String | Yes | The API token used to
    authenticate with Slack. This is a configuration-level parameter. |\n| Slack Channel
    | String | Yes | The Slack channel name used for the integration. This is a configuration-level
    parameter. |\n\n### Additional Notes\n* This action does not require any runtime
    parameters; it uses the values defined in the integration configuration.\n* This
    action does not process or interact with any entities or alerts.\n* As a 'Ping'
    action, it is excluded from being categorized as an enrichment action.\n\n###
    Flow Description\n1. **Parameter Extraction**: The action retrieves the `Slack
    API Key` and `Slack Channel` from the integration's configuration settings.\n2.
    **Manager Initialization**: It initializes the `PerimeterXManager` with the retrieved
    Slack credentials.\n3. **Authentication Check**: The action calls the Slack `auth.test`
    API endpoint to validate the token.\n4. **Result Evaluation**: If the API returns
    a successful response (`ok: true`), the action reports a successful connection.\n5.
    **Error Handling**: If the API call fails or returns an error, the action captures
    the exception and reports a failure state.
