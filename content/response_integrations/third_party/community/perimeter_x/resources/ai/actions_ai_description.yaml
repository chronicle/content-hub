Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Slack API using the configured PerimeterX integration
    settings.


    ### Flow Description

    1. Extracts the Slack API Key and Slack Channel from the integration configuration.

    2. Initializes the PerimeterXManager.

    3. Makes a POST request to the `https://slack.com/api/auth.test` endpoint to verify
    the provided credentials.

    4. Returns a successful result if the authentication is valid, or an error if
    it fails.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the Slack API.
  ai_short_description: >-
    Tests connectivity to the Slack API using the configured PerimeterX integration
    settings to ensure valid authentication.
  capabilities:
