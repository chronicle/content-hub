  ai_description: >-
    The Ping action verifies connectivity to the Slack API by performing an authentication
    test. It is used to ensure that the integration is correctly configured and can
    communicate with the Slack workspace. ### Parameters | Parameter | Type | Mandatory
    | Description | | --- | --- | --- | --- | | Slack API Key | String | Yes | The
    API key used to authenticate with the Slack workspace. | | Slack Channel | String
    | Yes | The name of the Slack channel to verify connectivity against. | ### Flow
    1. Extract the configuration parameters (Slack API Key and Slack Channel) from
    the integration settings. 2. Initialize the PerimeterXManager with the provided
    credentials and connector type. 3. Execute the auth() method, which sends a POST
    request to the Slack auth.test endpoint to validate the API key. 4. If the authentication
    is successful, return a success message; otherwise, return an error message indicating
    the failure. 5. Terminate the action with the appropriate execution status (Completed
    or Failed).
