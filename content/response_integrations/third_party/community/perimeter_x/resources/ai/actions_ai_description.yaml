  ai_description: >-
    The Ping action is used to test connectivity to Slack using the configured PerimeterX
    connector parameters. It verifies the provided Slack API Key by making an authentication
    test request to the Slack API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Slack API Key | String | Yes | The API key used to authenticate with Slack.
    |

    | Slack Channel | String | Yes | The Slack channel to connect to. |


    ### Flow

    1. Extracts the Slack API Key and Slack Channel from the integration configuration.

    2. Initializes the PerimeterXManager with the provided credentials.

    3. Calls the `auth` method which sends a POST request to the Slack `auth.test`
    endpoint.

    4. Returns a successful result if the authentication is valid, otherwise returns
    a failure.
