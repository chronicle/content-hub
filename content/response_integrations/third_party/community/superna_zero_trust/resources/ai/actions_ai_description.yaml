Superna Zero Trust User Lockout:
  ai_description: >-
    This action locks out a suspected user from all Superna protected NAS storage.
    It interacts with the Superna Eyeglass API to resolve user permissions and apply
    a 'deny read' permission to SMB shares, effectively preventing the user from accessing
    data on the NAS.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | String | Yes | The username to be locked out. Expected format is
    `domain\username` or `user@domain`. |


    ### Flow Description

    1. **Initialization**: Retrieves the API token, Eyeglass IP, and SSL verification
    settings from the integration configuration.

    2. **Input Processing**: Extracts the `UserName` parameter and URL-encodes it
    to ensure it is safe for the API call.

    3. **API Request**: Constructs the lockout API URL and sends a POST request to
    the Superna Eyeglass server.

    4. **Outcome**: Processes the server's response. If successful, the user is locked
    out; otherwise, an error is reported based on the HTTP status or connection result.
