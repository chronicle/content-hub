  ai_description: "### General Description\nThe **Ping** action is designed to verify\
    \ the connectivity and health of the Superna Eyeglass Zero Trust API. It performs\
    \ a simple health check by sending a GET request to the configured Eyeglass IP\
    \ address. This is primarily used during setup or troubleshooting to ensure that\
    \ the Google SecOps environment can successfully communicate with the Superna\
    \ Zero Trust management interface.\n\n### Parameters Description\nThere are no\
    \ action-specific parameters for this action. It relies entirely on the integration's\
    \ global configuration settings:\n* **api_token**: The API key used for authentication.\n\
    * **eyeglass_ip**: The IP address or hostname of the Superna Eyeglass server.\n\
    * **Verify SSL**: A boolean flag indicating whether to verify the SSL certificate\
    \ of the server.\n\n### Additional Notes\n* This action does not process any entities.\n\
    * As per standard SOAR conventions, 'Ping' actions are used for connectivity testing\
    \ and are not classified as enrichment.\n\n### Flow Description\n1. **Configuration\
    \ Retrieval**: The action extracts the `api_token`, `eyeglass_ip`, and `Verify\
    \ SSL` settings from the integration configuration.\n2. **URL Construction**:\
    \ It constructs the full API endpoint URL using the provided IP and the hardcoded\
    \ path `/sera/v1/healthcheck`.\n3. **API Request**: It executes an authenticated\
    \ HTTP GET request to the health check endpoint with a 30-second timeout.\n4.\
    \ **Response Handling**: \n    * If the request is successful (HTTP 200), it logs\
    \ the response and marks the action as completed.\n    * If a timeout, connection\
    \ error, or HTTP error occurs, it catches the exception, logs the error details,\
    \ and marks the action as failed."
