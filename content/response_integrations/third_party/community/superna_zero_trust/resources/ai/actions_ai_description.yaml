  ai_description: >-
    ### General Description

    This action locks out a specified user from Superna protected NAS storage by interacting
    with the Eyeglass Zero Trust API. It applies a deny read permission to SMB shares
    for the target user, effectively restricting their access to the storage environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | string | Yes | The user to be locked out of NAS storage in format
    domain\username or user@domain name. |


    ### Additional Notes

    Requires valid `api_token` and `eyeglass_ip` configured in the integration settings.
    This action performs a state change on the external Superna Eyeglass system.


    ### Flow Description

    1. Extracts configuration parameters (API token, Eyeglass IP, SSL verification
    setting).

    2. Extracts the `UserName` parameter from the action input.

    3. Constructs the API endpoint URL by appending the URL-encoded username to the
    base path.

    4. Sends a POST request to the Superna Eyeglass API to initiate the user lockout.

    5. Logs the outcome and terminates the action with the appropriate status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Locks out a user from Superna protected NAS storage by applying a deny read
