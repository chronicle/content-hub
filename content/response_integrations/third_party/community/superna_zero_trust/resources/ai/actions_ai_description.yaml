  ai_description: >-
    ### General Description

    Unlocks a user that was previously locked out from all Superna protected NAS storage.
    This action sends a POST request to the Superna Zero Trust API to restore the
    user's access.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | UserName | String | Yes | The name of the user to unlock, formatted as `domain\username`
    or `username@domain`. This parameter dictates which user account will have its
    access restored. |


    ### Flow Description

    1. Extracts integration configuration parameters including the API token, Eyeglass
    IP, and SSL verification settings.

    2. Retrieves the `UserName` action parameter and URL-encodes it for safe API transmission.

    3. Constructs the API endpoint URL (`/sera/v2/ransomware/unlock/{user}`) for unlocking
    the user.

    4. Sends a POST request to the Superna Zero Trust API to execute the unlock operation.

    5. Evaluates the HTTP response and updates the action execution state, returning
    the API response text as the result.
