  ai_description: "### General Description\nThe `Ping` action is designed to test\
    \ the connectivity and authentication between Google SecOps and the Superna Zero\
    \ Trust platform. It performs a basic health check by sending a GET request to\
    \ the `/sera/v1/healthcheck` endpoint to ensure the integration is configured\
    \ correctly and the service is reachable.\n\n### Parameters Description\nThere\
    \ are no action-specific parameters for this action. It relies entirely on the\
    \ integration-level configuration parameters (such as `api_token`, `eyeglass_ip`,\
    \ and `Verify SSL`).\n\n### Flow Description\n1. **Configuration Extraction:**\
    \ Retrieves the `api_token`, `eyeglass_ip`, and `Verify SSL` settings from the\
    \ Superna Zero Trust integration configuration.\n2. **Request Construction:**\
    \ Builds the target URL using the provided Eyeglass IP and the health check API\
    \ route.\n3. **API Execution:** Sends a GET request to the health check endpoint\
    \ with the appropriate headers.\n4. **Response Handling:** \n   - If the request\
    \ is successful, the action completes and outputs a success message along with\
    \ the response text.\n   - If the request fails due to a timeout, connection error,\
    \ or HTTP error, the action catches the exception, logs the error, and fails gracefully\
    \ with a descriptive output message.\n\n### Additional Notes\nSince there are\
    \ no parameters, simply executing the action will test the integration's connectivity\
    \ based on the configured instance settings."
