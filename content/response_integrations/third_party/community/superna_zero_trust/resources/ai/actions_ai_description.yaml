  ai_description: >-
    ### General Description

    This action locks out a suspected user from all Superna-protected NAS storage.
    It interacts with the Superna Eyeglass Zero Trust API to resolve user permissions
    and apply a 'deny read' permission to SMB shares, effectively isolating the user
    from sensitive data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | String | Yes | The identifier of the user to be locked out. Expected
    format is `domain\username` or `user@domain`. |


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the integration configuration,
    including the Eyeglass IP, API token, and SSL verification settings.

    2. **Input Processing**: It extracts the `UserName` from the action parameters
    and URL-encodes it to ensure it is safe for use in an API request.

    3. **API Request Construction**: The action builds the specific API endpoint for
    user lockout using the provided Eyeglass IP and the encoded username.

    4. **Execution**: A POST request is sent to the Superna Eyeglass server. The action
    includes the API key in the headers for authentication.

    5. **Response Handling**: The action captures the response from the server, handling
    potential timeouts, connection errors, or HTTP errors, and reports the final status
    back to Google SecOps.


    ### Additional Notes

    This action performs a state change in an external system (Superna Eyeglass) and
    does not process entities from the current alert context; it relies solely on
    the provided `UserName` parameter.
