  ai_description: >-
    ### General Description

    This action performs a health check on the Superna Zero Trust system by sending
    a GET request to the `/sera/v1/healthcheck` endpoint. It verifies connectivity
    to the Eyeglass instance.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `api_token` | String | Yes | The API token used for authentication with the
    Superna Zero Trust API. |

    | `eyeglass_ip` | String | Yes | The IP address or hostname of the Eyeglass instance.
    |

    | `Verify SSL` | Boolean | No | Determines whether to verify SSL certificates
    during the API request. Defaults to `False`. |


    ### Flow Description

    1. Extract configuration parameters (`api_token`, `eyeglass_ip`, `Verify SSL`).

    2. Construct the API URL using the provided IP and the health check route (`/sera/v1/healthcheck`).

    3. Send a GET request to the constructed URL with the API token in the headers.

    4. Handle potential exceptions (Timeout, ConnectionError, HTTPError, RequestException).

    5. Return the execution status and response text using `siemplify.end`.
