Superna Zero Trust User Lockout:
  ai_description: >-
    ### General Description

    This action locks out a suspected user from all Superna-protected NAS storage.
    It resolves user permissions to data and applies a deny read permission to SMB
    shares, effectively revoking the user's access to the protected resources.


    ### Flow Description

    1. Extracts the target `UserName` from the action parameters.

    2. URL-encodes the provided username to ensure safe API transmission.

    3. Constructs the API endpoint URL using the configured Eyeglass IP.

    4. Executes an HTTP POST request to the Superna Zero Trust API (`/sera/v2/ransomware/lockout/{user}`)
    to initiate the user lockout.

    5. Returns the API response text as the action result and updates the execution
    status based on the HTTP response.


    ### Additional Notes

    Ensure the username is provided in the correct format: `domain\username` or `user@domain
    name`.
  ai_short_description: >-
    Locks out a specified user from all Superna-protected NAS storage by applying
    deny read permissions to SMB shares via the Superna Zero Trust API.
  capabilities:
    can_create_case_comments: false
