  ai_description: >-
    ### General Description

    Unlocks a user account that was previously locked out from Superna protected NAS
    storage. This action is primarily used to restore access for users who were restricted
    due to security policies, such as automated ransomware protection triggers. It
    communicates with the Superna Eyeglass API to perform the unlock operation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | String | Yes | The identifier of the user to unlock. The expected
    format is either `domain\username` or `username@domain`. This value is URL-encoded
    before being sent to the API. |


    ### Flow Description

    1. **Initialization**: The action retrieves the necessary configuration parameters,
    including the API token, Eyeglass IP address, and SSL verification settings.

    2. **Parameter Extraction**: It extracts the `UserName` provided by the user or
    playbook.

    3. **Data Preparation**: The username is URL-encoded to ensure it is correctly
    handled in the API request path.

    4. **API Request**: A POST request is constructed and sent to the Superna Eyeglass
    endpoint: `https://{eyeglass_ip}/sera/v2/ransomware/unlock/{user}`.

    5. **Response Handling**: The action evaluates the API response. If successful,
    it completes the execution; otherwise, it handles timeouts, connection errors,
    or HTTP errors and reports the failure.


    ### Additional Notes

    - This action requires the `api_token` and `eyeglass_ip` to be correctly configured
    in the integration settings.

    - The action does not process entities from the case; it relies solely on the
    provided `UserName` parameter.
