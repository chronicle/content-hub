  ai_description: >-
    ### General Description

    The **Superna Snapshot Critical NAS Data** action triggers a 'Cyber Snapshot'
    for critical NAS (Network Attached Storage) data paths using the Superna Eyeglass
    Zero Trust API. This action is designed to interact with the ransomware protection
    module of Superna Eyeglass to identify and secure critical data paths, providing
    a point-in-time snapshot for recovery or security analysis.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the **SupernaZeroTrust** integration configuration:


    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | api_token | String | Yes | The API key used to authenticate with the Superna
    Eyeglass server. |

    | eyeglass_ip | String | Yes | The IP address or hostname of the Superna Eyeglass
    instance. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Eyeglass server. Defaults to False. |


    ### Additional Notes

    - This action is executed asynchronously.

    - It performs a POST request to the `/sera/v2/ransomware/criticalpaths` endpoint,
    which typically triggers a state change or a snapshot process in the external
    system.

    - This action does not process or require any SecOps entities (IPs, Hosts, etc.)
    to run.


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the API token, Eyeglass IP,
    and SSL verification settings from the integration's global configuration.

    2. **Endpoint Construction:** It constructs the target API URL using the provided
    Eyeglass IP and the ransomware critical paths route.

    3. **API Execution:** It sends a POST request to the Superna Eyeglass server,
    including the API key in the headers.

    4. **Response Handling:** The action monitors the request for success, timeouts,
    or connection errors.

    5. **Completion:** The raw response text from the Superna API is returned as the
    action's result value, and the execution status is set to completed or failed
    based on the HTTP response.
