    ### General Description

    Triggers a snapshot of critical NAS data using the Superna Zero Trust API. This
    action initiates a snapshot process on the target NAS system to ensure data integrity
    and security.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `api_token` | String | Yes | The API key for authentication with the Superna
