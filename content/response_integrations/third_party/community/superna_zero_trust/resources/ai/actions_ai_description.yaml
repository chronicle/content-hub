Superna Zero Trust User Un Lock:
  ai_description: >-
    Unlocks a user account in Superna Zero Trust that was previously locked out from
    protected NAS storage. This action communicates with the Superna Eyeglass API
    to restore access for a specific user identifier.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API token, Eyeglass IP, and SSL verification
    settings from the integration configuration.

    2. **Input Processing:** Extracts the `UserName` from the action parameters and
    URL-encodes it to ensure safe transmission in the API path.

    3. **API Request:** Constructs a POST request to the `/sera/v2/ransomware/unlock/`
    endpoint on the target Superna Eyeglass server.

    4. **Response Handling:** Processes the server response, handling potential timeouts,
    connection errors, or HTTP failures, and returns the result to the SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | String | Yes | The identifier of the user to unlock. Expected format
    is `domain\username` or `username@domain`. |


    ### Additional Notes

    - This action requires a valid API token and the IP address of the Superna Eyeglass
    management console to be configured in the integration settings.
