  ai_description: >-
    Locks out a suspected user from all Superna protected NAS storage. This action
    resolves user permissions to data and applies a deny read permission to SMB shares
    by interacting with the Superna Eyeglass API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | UserName | String | Yes | The user to be locked out of NAS storage. Expected
    format is `domain\username` or `user@domain name`. |


    ### Action Flow

    1. Extracts the `UserName` parameter and integration configurations (API token,
    Eyeglass IP).

    2. URL-encodes the username and constructs the API endpoint URL.

    3. Sends a POST request to the Superna Eyeglass API to initiate the user lockout.

    4. Returns the API response text as the result value and updates the action status.
