Ping:
  ai_description: >-
    ### General Description

    Pings the Superna Zero Trust API to verify connectivity and perform a health check.
    This action ensures that the integration is properly configured and can communicate
    with the external service.


    ### Flow Description

    1. Extracts integration configuration parameters including the API token, Eyeglass
    IP, and SSL verification settings.

    2. Constructs the API endpoint URL for the health check (`/sera/v1/healthcheck`).

    3. Executes an HTTP GET request to the constructed URL.

    4. Returns the response text and updates the execution state based on the success
    or failure of the request (e.g., Completed, Timed Out, Failed).


    ### Additional Notes

    This action is primarily used to test the connection to the Superna Zero Trust
    service and does not require any action-specific parameters. It does not interact
    with or modify any case entities.
  ai_short_description: >-
    Pings the Superna Zero Trust API to verify connectivity and perform a health check.
