  ai_description: >-
    ### General Description

    Triggers a snapshot of critical NAS data using the Superna Zero Trust API. This
    action initiates a snapshot process on the target NAS system to ensure data integrity
    and security.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `api_token` | String | Yes | The API key for authentication with the Superna
    Zero Trust API. |

    | `eyeglass_ip` | String | Yes | The IP address of the Eyeglass instance. |

    | `Verify SSL` | Boolean | No | Whether to verify SSL certificates (default: False).
    |


    ### Flow Description

    1. Extracts configuration parameters (`api_token`, `eyeglass_ip`, `Verify SSL`)
    from the integration settings.

    2. Constructs the API request URL and headers.

    3. Sends a POST request to the Superna Zero Trust API endpoint (`/sera/v2/ransomware/criticalpaths`)
    to initiate the snapshot process.

    4. Handles potential errors (timeout, connection, HTTP errors).

    5. Returns the API response as the action result.


    ### Additional Notes

    The action does not require any entities to run.
