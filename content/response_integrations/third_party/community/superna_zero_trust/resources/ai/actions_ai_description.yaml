Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity and health of the Superna
    Eyeglass Zero Trust API. It performs a simple GET request to the health check
    endpoint of the configured Eyeglass server to ensure that the integration can
    successfully communicate with the external service using the provided credentials.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | api_token | String | Yes | The API key used to authenticate requests to the
    Superna Eyeglass server. This is retrieved from the integration configuration.
    |

    | eyeglass_ip | String | Yes | The IP address or hostname of the Superna Eyeglass
    server. This is retrieved from the integration configuration. |

    | Verify SSL | Boolean | No | Determines whether to verify the SSL certificate
    of the Eyeglass server. Defaults to `False`. |


    ### Additional Notes

    - This action is primarily used for troubleshooting and initial setup verification.

    - It does not process any entities from the SOAR case.

    - As per standard conventions, actions named 'Ping' are not classified as enrichment
    actions.


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the `api_token`, `eyeglass_ip`,
    and `Verify SSL` settings from the integration configuration.

    2. **URL Construction:** It constructs the full API endpoint URL using the `eyeglass_ip`
    and the hardcoded path `/sera/v1/healthcheck`.

    3. **Request Execution:** A GET request is sent to the constructed URL with the
    `api_key` included in the headers.

    4. **Error Handling:** The script handles various network and HTTP exceptions,
    including timeouts and connection failures.

    5. **Result Reporting:** The action logs the API response and terminates with
    a status of `COMPLETED`, `FAILED`, or `TIMEDOUT` based on the outcome of the request.
