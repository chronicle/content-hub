  ai_description: >-
    ### General Description

    This action unlocks a user account that was previously locked out from Superna
    protected NAS storage using the Superna Eyeglass Zero Trust API. It performs a
    POST request to the external system to restore access for the specified user.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | UserName | string | Yes | The name of the user to unlock, in the format `domain\username`
    or `username@domain`. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API token, Eyeglass IP address,
    and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: Retrieves the `UserName` parameter provided by the
    user.

    3. **API Request Construction**: Builds the API endpoint URL using the Eyeglass
    IP and the user identifier.

    4. **Execution**: Sends a POST request to the Superna Eyeglass API to unlock the
    user.

    5. **Result Handling**: Processes the API response and terminates the action with
    a success or failure status.
