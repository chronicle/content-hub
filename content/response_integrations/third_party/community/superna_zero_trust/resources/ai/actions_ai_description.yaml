Superna Snapshot Critical NAS Data:
  ai_description: >-
    ### General Description

    Initiates a snapshot of critical NAS data using the Superna Zero Trust API. This
    action triggers a protective mechanism on the external storage system to secure
    critical paths against ransomware or other threats.


    ### Flow Description

    1. Retrieves integration-level configuration parameters, including the API token,
    Eyeglass IP, and SSL verification settings.

    2. Constructs the API endpoint URL for the ransomware critical paths snapshot
    (`/sera/v2/ransomware/criticalpaths`).

    3. Sends an HTTP POST request to the Superna Zero Trust API to trigger the snapshot
    process.

    4. Evaluates the HTTP response and returns the response text as the result value,
    marking the execution as completed, failed, or timed out accordingly.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration. It operates globally and does not process
    or filter any specific SecOps entities.
