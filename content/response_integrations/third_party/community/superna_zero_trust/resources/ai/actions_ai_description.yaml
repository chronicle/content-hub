Superna Snapshot Critical NAS Data:
  ai_description: >-
    Triggers a Cyber Snapshot of critical NAS (Network Attached Storage) data using
    the Superna Eyeglass Zero Trust API. This action is designed to provide ransomware
    protection by initiating snapshots of critical data paths defined within the Superna
    environment. It communicates with the Superna Eyeglass server via a POST request
    to the ransomware critical paths endpoint.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | api_token | String | Yes | The API token used for authentication with the Superna
    Eyeglass server. This is retrieved from the integration configuration. |

    | eyeglass_ip | String | Yes | The IP address or hostname of the Superna Eyeglass
    server. This is retrieved from the integration configuration. |

    | Verify SSL | Boolean | No | Whether to verify the SSL certificate of the Superna
    Eyeglass server. Defaults to False. This is retrieved from the integration configuration.
    |


    ### Additional Notes

    - This action does not take any direct input parameters; instead, it relies entirely
    on the global integration configuration for connection details.

    - The action is marked as asynchronous in the metadata, although the provided
    script follows a synchronous execution flow.


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the `api_token`, `eyeglass_ip`,
    and `Verify SSL` settings from the SupernaZeroTrust integration configuration.

    2. **Endpoint Construction:** It constructs the full API URL using the provided
    Eyeglass IP and the specific ransomware critical paths route (`/sera/v2/ransomware/criticalpaths`).

    3. **API Request:** It sends a POST request to the Superna Eyeglass server with
    the required authentication headers.

    4. **Response Handling:** The action processes the server's response. If successful,
    it returns the response text. It includes comprehensive error handling for timeouts,
    connection issues, and HTTP errors.

    5. **Completion:** The action terminates by providing the execution status and
    the raw API response to the Google SecOps platform.
