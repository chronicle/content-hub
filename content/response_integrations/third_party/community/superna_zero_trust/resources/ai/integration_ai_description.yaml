product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The integration provides automation for Superna Zero Trust, focusing on NAS storage
    security. The 'Superna Zero Trust User Lockout' action allows for the suspension
    of user access to NAS storage by applying deny read permissions to SMB shares,
    which directly aligns with the 'IAM & Identity Management' category's goal of
    managing identity and suspending accounts. The 'Superna Snapshot Critical NAS
    Data' action performs a data protection task (snapshotting), and the 'Ping' action
    performs a health check; neither of these actions fits into the provided categories
    (SIEM, EDR, Network Security, etc.). Therefore, the integration is classified
    under IAM & Identity Management.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
