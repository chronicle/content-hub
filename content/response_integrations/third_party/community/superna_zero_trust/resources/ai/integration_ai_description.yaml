  network_security: false
  reasoning: >-
    The 'superna_zero_trust' integration provides capabilities to manage user access
    to NAS storage systems and perform data protection tasks. Specifically, the actions
    'Superna Zero Trust User Lockout' and 'Superna Zero Trust User Un Lock' allow
    for the suspension and restoration of user access, which aligns with the 'IAM
    & Identity Management' category. While the integration also performs operational
    tasks like triggering NAS snapshots, it does not fit into other categories such
    as SIEM, EDR, Network Security, or Cloud Security as it does not perform log analysis,
    host-level process monitoring, firewall management, or cloud configuration auditing.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
