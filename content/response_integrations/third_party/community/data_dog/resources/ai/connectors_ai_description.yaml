DataDog Connector:
  ai_description: >-
    ### General Description

    The DataDog Connector enables the ingestion of events and alerts from DataDog
    into Google SecOps. It allows security teams to monitor and respond to infrastructure
    and application alerts directly within the SOAR platform, facilitating centralized
    incident management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | Your DataDog API key. |

    | APP Key | String | Yes | Your DataDog Application key. |

    | Base URL | String | Yes | The base URL for the DataDog API (default: https://api.datadoghq.com).
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product (default: device_product). |

    | EventClassId | String | Yes | The field name used to determine the event name
    (default: event_name). |

    | Max Days Back | Integer | Yes | The maximum number of days to look back for
    events (default: 7). |

    | Priority | String | No | The priority of events to retrieve (e.g., 'low', 'normal',
    'all'). |

    | PythonProcessTimeout | String | Yes | The timeout limit in seconds for the Python
    process (default: 30). |

    | Sources | String | Yes | The sources to retrieve events from (e.g., 'alert').
    |

    | Tags | String | No | A comma-separated list of tags to filter monitors by scope
    (default: 'monitor'). |

    | Unaggregated | Boolean | No | If true, retrieves the full list of events; if
    false, retrieves an aggregated list (default: true). |


    ### Flow Description

    1. Initializes the DataDog client using the provided API and APP keys.

    2. Determines the start time for fetching events based on the last saved timestamp
    or the configured 'Max Days Back' value.

    3. Queries the DataDog API for events matching the configured sources, tags, and
    priority.

    4. Iterates through the retrieved events:
        * If an event contains children, each child is processed as a separate alert.
        * If an event has no children, the parent event is processed as an alert.
    5. Maps event data (e.g., monitor name, metric, timestamp) to the Google SecOps
    alert format.

    6. Ingests the processed alerts into the SOAR platform and updates the last saved
    timestamp to the latest event time.
