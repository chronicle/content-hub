DataDog Connector:
  ai_description: >-
    ### General Description

    The DataDog Connector is designed to ingest events from DataDog into Google SecOps.
    It allows security teams to monitor DataDog-generated incidents, such as monitor
    triggers, by fetching event data based on configurable filters like tags, priority,
    and source types.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | Password | Yes | The API Key used to authenticate with the DataDog
    API. |

    | APP Key | Password | Yes | The Application Key used to authenticate with the
    DataDog API. |

    | Base URL | String | Yes | The base URL for the DataDog API (default: https://api.datadoghq.com).
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Max Days Back | Integer | Yes | The maximum number of days to look back when
    fetching events. |

    | Priority | String | No | The priority of events to retrieve (e.g., 'low', 'normal',
    'all'). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |

    | Sources | String | Yes | The sources to retrieve events from (e.g., 'alert').
    |

    | Tags | String | No | A comma-separated list of tags to filter the list of monitors.
    |

    | Unaggregated | Boolean | No | If true, retrieves the full list of events; if
    false, retrieves an aggregated list. |


    ### Flow Description

    1. **Initialization**: Connects to the DataDog API using the provided API and
    Application keys.

    2. **Time Range Calculation**: Determines the time range for fetching events based
    on the last successful run's timestamp or the configured `Max Days Back`.

    3. **Event Retrieval**: Queries the DataDog API (`/api/v1/events`) for events
    matching the specified sources, tags, priority, and aggregation settings.

    4. **Filtering**: Iterates through the retrieved events, filtering for those with
    "error" or "warning" alert types.

    5. **Data Processing**: For each relevant event, fetches full details, maps the
    data (including tags, metrics, and URLs) into a standardized `AlertInfo` format,
    and identifies child events if present.

    6. **Ingestion**: Creates and ingests the processed alerts into the Google SecOps
    platform.

    7. **State Management**: Updates the last saved timestamp to ensure subsequent
    runs only fetch new events.
