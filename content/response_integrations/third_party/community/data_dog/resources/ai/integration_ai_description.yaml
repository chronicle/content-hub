product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Datadog integration is primarily a monitoring and observability platform that
    provides Cloud SIEM capabilities. The connector ingests alerts and events into
    the SOAR platform, which is a core SIEM function. Several actions (Get Events,
    Get Logs, Get Event Details) allow for searching and investigating historical
    activity, further supporting the SIEM classification. Additionally, the integration
    provides visibility into cloud-native resources (Kubernetes pods, AWS RDS) through
    actions like 'Get Pod Metric' and 'Get RDS Metric', which aligns with Cloud Security
    and Asset Inventory categories by providing performance and health context for
    these assets. It does not perform EDR, Network Security, Threat Intelligence,
    Email Security, IAM, ITSM, or Collaboration functions.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
