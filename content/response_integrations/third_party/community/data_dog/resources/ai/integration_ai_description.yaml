product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Datadog integration is primarily an observability and monitoring platform.
    It qualifies for the SIEM category because the connector ingests events and alerts
    from Datadog into the SOAR platform, and several actions (Get Events, Get Logs,
    Get Metric Timeseries Points) allow analysts to search and retrieve historical
    log and telemetry data for investigation. It also qualifies for the Cloud Security
    category, as Datadog is a cloud-native monitoring tool, and specific actions like
    'Get Pod Metric' (for Kubernetes) and 'Get RDS Metric' (for AWS) provide visibility
    into the performance and state of cloud-native resources. It does not meet the
    criteria for EDR (no host containment or deep process-level response), Network
    Security (no firewall/WAF interaction), Threat Intelligence (no reputation data),
    IAM, ITSM, Vulnerability Management, or Collaboration.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
