Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DataDog API using the provided integration credentials.
    This action ensures that the API Key and APP Key are valid and that the SecOps
    platform can successfully communicate with DataDog.


    ### Flow Description

    1. Extracts the API Key and APP Key from the DataDog integration configuration.

    2. Initializes the DataDog API client.

    3. Makes a GET request to the DataDog validation endpoint (`/api/v1/validate`).

    4. Evaluates the response to determine if the credentials are valid.

    5. Returns a success message if the connection is established, or a failure message
    otherwise.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    DataDog integration to verify network connectivity and authentication.
