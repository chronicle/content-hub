  ai_description: >-
    ### General Description

    Retrieves Kubernetes logs from DataDog for specified namespaces within a defined
    time range. This action allows analysts to query historical log data directly
    from DataDog to assist in investigations involving containerized environments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Start Time | string | True | The start time from which you want to retrieve
    the logs (e.g., '2020-02-02T02:02:02Z'). |

    | End Time | string | True | The end time until which you want to retrieve the
    logs (e.g., '2020-02-02T02:02:02Z'). |

    | Namespace | string | True | A comma-separated list of Kubernetes namespaces
    to fetch logs for (e.g., 'name_space1, name_space2'). |


    ### Additional Notes

    - The action uses the DataDog Logs API (`/api/v1/logs-queries/list`) via a POST
    request to perform the query.

    - Multiple namespaces can be queried in a single execution by providing them as
    a comma-separated list.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Key and APP Key from the integration
    configuration.

    2. **Parameter Parsing**: Extracts the Start Time, End Time, and Namespace list
    from the action parameters. The Namespace string is split into a list of individual
    namespaces.

    3. **Log Retrieval**: Iterates through each provided namespace and calls the DataDog
    API to fetch logs matching the `kube_namespace` and the specified time window.

    4. **Result Aggregation**: Collects the logs for each namespace where data is
    found and organizes them into a structured JSON result.

    5. **Finalization**: Returns the aggregated log data as a JSON result and provides
    a status message indicating which namespaces were successfully queried.
