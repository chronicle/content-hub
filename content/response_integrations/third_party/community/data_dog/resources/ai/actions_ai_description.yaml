Get Beautiful Metric:
  ai_description: >-
    Analyzes a provided set of metric timeseries points from DataDog to generate statistical
    summaries. This action does not fetch data directly from the DataDog API; instead,
    it processes a JSON-formatted series object provided as an input parameter. It
    calculates the sum, average, minimum, and maximum values for the metric data points
    within the specified time range and returns these statistics along with metadata
    such as the unit and aggregation method.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the DataDog API/APP keys from the integration
    configuration and the `Series` JSON object from the action parameters.

    2. **Data Parsing:** Parses the `Series` input to extract the `pointlist` (the
    actual metric values), `start` time, and `end` time.

    3. **Statistical Calculation:** Iterates through the `pointlist` to compute the
    sum, average, minimum, and maximum of the raw metric values.

    4. **Result Construction:** Packages the calculated statistics, the original timeseries
    points, and metadata (unit, aggregation, expression) into a structured JSON result.

    5. **Completion:** Ends the action by providing the JSON result to the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Series | code | True | A JSON string representing the DataDog metric series.
    It must contain a `pointlist` key (a list of [timestamp, value] pairs) and metadata
    like `start`, `end`, `unit`, and `aggr`. |


    ### Additional Notes

    * This action is primarily a utility for data transformation and analysis of metrics
    already retrieved by other actions or processes.

    * If the `Series` parameter is missing the `pointlist` key, the action will log
    an error and return an empty result.
