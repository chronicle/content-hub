  ai_description: >-
    ### General Description

    The **Get Metric Snapshot Graph** action retrieves a metric snapshot graph from
    Datadog based on a specified metric query and time range. It returns the snapshot
    URL and the raw JSON data, allowing analysts to view visual representations of
    metrics directly from the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | The metric query which you want to get the snapshot graph
    of. For example: `avg:aws.rds.cpuutilization{cloud_env:production}by{dbinstanceidentifier}`.
    |

    | Start Time | String | Yes | The start time of the metric snapshot graph in Unixtime.
    |

    | End Time | String | Yes | The end time of the metric snapshot graph in Unixtime.
    |


    ### Flow Description

    1. **Initialization:** Extracts the Datadog API Key and APP Key from the integration
    configuration.

    2. **Parameter Extraction:** Retrieves the `Query`, `Start Time`, and `End Time`
    parameters provided by the user.

    3. **API Request:** Calls the Datadog API (`/api/v1/graph/snapshot`) to fetch
    the graph snapshot for the specified query and time range.

    4. **Result Processing:** If the snapshot is successfully retrieved, it adds the
    snapshot URL as a link to the action results and attaches the raw JSON data.

    5. **Completion:** Returns a success or failure message based on whether the snapshot
    was fetched.
