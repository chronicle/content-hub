Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between the Google SecOps platform and the DataDog\
    \ service. It ensures that the provided API Key and Application Key (APP Key)\
    \ are valid and that the DataDog API is reachable from the environment.\n\n###\
    \ Parameters Description\nThere are no input parameters for this action. It relies\
    \ entirely on the integration's global configuration (API Key and APP Key).\n\n\
    ### Flow Description\n1. **Configuration Extraction**: The action retrieves the\
    \ `API Key` and `APP Key` from the DataDog integration settings.\n2. **Manager\
    \ Initialization**: It initializes the `DataDogManager` with the extracted credentials.\n\
    3. **Connectivity Test**: The action calls the `test_connectivity` method, which\
    \ sends a GET request to the DataDog validation endpoint (`/api/v1/validate`).\n\
    4. **Result Evaluation**: \n    * If the API returns a valid response, the action\
    \ concludes with a success message: \"Connected successfully\".\n    * If the\
    \ API returns an invalid response or an error occurs, the action concludes with\
    \ a failure message: \"The Connection failed\".\n\n### Additional Notes\nThis\
    \ action does not process any entities and is strictly used for system health\
    \ and configuration validation."
