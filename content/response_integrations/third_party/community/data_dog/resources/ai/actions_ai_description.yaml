  ai_description: >-
    Analyzes a provided JSON string containing Datadog metric timeseries points and
    calculates statistical values such as sum, average, minimum, and maximum.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Series | String (JSON) | Yes | A JSON-formatted string containing the timeseries
    points to analyze. It must include a `pointlist` array. |


    ### Flow

    1. Parses the input `Series` parameter as JSON.

    2. Extracts the `pointlist`, `start`, and `end` times.

    3. Iterates through the timeseries points to extract raw metric values.

    4. Calculates the sum, average, minimum, and maximum of the metric values.

    5. Returns the calculated statistics and original timeseries data as a JSON result.
