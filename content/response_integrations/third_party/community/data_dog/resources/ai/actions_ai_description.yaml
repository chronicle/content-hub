Get Pod Metric:
  ai_description: >-
    Retrieves performance metrics and process information for Kubernetes Pods from
    DataDog. This action fetches CPU utilization, memory usage percentages, and a
    list of active processes associated with specific Pod names within a defined time
    range. The data is retrieved via DataDog's timeseries and processes APIs and returned
    as a structured JSON object.


    ### Flow Description

    1. **Authentication**: Initializes the DataDog manager using the provided API
    and APP keys from the integration configuration.

    2. **Parameter Extraction**: Retrieves the list of Pod names, start time, and
    end time from the action parameters.

    3. **Metric Retrieval**: For each Pod provided in the comma-separated list:
        * Queries the DataDog Timeseries API for average CPU system total metrics
    (`kubernetes.cpu.system.total`).
        * Queries the DataDog Timeseries API for average memory usage percentage metrics
    (`kubernetes.memory.usage_pct`).
        * Queries the DataDog Processes API for all processes tagged with the specific
    `pod_name`.
    4. **Data Aggregation**: Consolidates the CPU, memory, and process data into a
    single JSON result mapped by Pod name.

    5. **Output**: Returns the aggregated JSON data and provides a status message
    indicating which metrics were successfully fetched.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Pod Name | string | Yes | A comma-separated list of Kubernetes Pod names (or
    namespaces as per the UI description) to retrieve metrics for. |

    | Start Time | string | Yes | The start time of the metric window in Unix timestamp
    format (e.g., 1507040000). |

    | End Time | string | Yes | The end time of the metric window in Unix timestamp
    format (e.g., 1610557457). |


    ### Additional Notes

    * The action does not interact with SecOps entities; it relies entirely on the
    string input provided in the 'Pod Name' parameter.

    * The time range must be provided in Unix timestamp format for the DataDog API
    to process the query correctly.
