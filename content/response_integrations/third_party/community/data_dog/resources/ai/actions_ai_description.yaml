Get Logs:
  ai_description: >-
    ### General Description

    Retrieves logs from DataDog for specified Kubernetes namespaces within a given
    time range. This action queries the DataDog API to fetch historical log data and
    returns the results in JSON format for further analysis.


    ### Flow Description

    1. Extracts the `Namespace`, `Start Time`, and `End Time` parameters provided
    by the user.

    2. Parses the `Namespace` parameter into a list to support querying multiple namespaces
    in a single execution.

    3. Iterates over each provided namespace and constructs a query (`kube_namespace:<namespace>`).

    4. Makes an API call (POST to `/api/v1/logs-queries/list`) to DataDog to fetch
    the logs matching the query and the specified time range.

    5. Aggregates the retrieved logs into a JSON object.

    6. Returns the aggregated JSON result and an output message indicating whether
    logs were successfully found for each namespace.


    ### Additional Notes

    Ensure that the provided start and end times are in a format accepted by the DataDog
    API (e.g., ISO 8601). Although the API call uses a POST method, it functions purely
    as a search/query operation and does not modify any data in DataDog.
  ai_short_description: >-
    Retrieves logs from DataDog for specified Kubernetes namespaces within a given
    time range and returns them as a JSON result.
