Get Logs:
  ai_description: >-
    ### General Description

    Retrieves Kubernetes logs from DataDog for specific namespaces within a defined
    time range. This action is useful for forensic investigations or monitoring specific
    application environments by pulling log data directly into the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Namespace | String | Yes | Comma-separated list of Kubernetes namespaces to
    fetch logs for. |

    | Start Time | String | Yes | The start time (ISO-8601) for the log search. |

    | End Time | String | Yes | The end time (ISO-8601) for the log search. |


    ### Flow Description

    1. The action retrieves the DataDog API and App keys from the integration configuration.

    2. It extracts the Namespace, Start Time, and End Time from the action parameters.

    3. The Namespace string is split into a list of individual namespaces.

    4. For each namespace, the action calls the DataDog API to retrieve logs matching
    the kube_namespace query within the specified time window.

    5. Successfully retrieved logs are aggregated into a JSON result.

    6. The action completes, providing the logs as a JSON output and a summary message.


    ### Additional Notes

    This action does not process SOAR entities; it relies entirely on the provided
    Namespace parameter.
