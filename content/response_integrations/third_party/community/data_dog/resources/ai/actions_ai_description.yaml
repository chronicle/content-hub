  ai_description: >-
    Processes a provided timeseries metric dataset to calculate statistical summaries.
    This action takes a JSON-formatted series object as input, extracts the raw metric
    values, and computes the sum, average, minimum, and maximum values. The resulting
    statistical analysis is returned as a JSON object for further use in the playbook.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Series | code | Yes | The timeseries points you want to analyze, provided as
    a JSON object. |


    ### Flow Description

    1. The action extracts the 'Series' parameter, which is expected to be a JSON
    string containing a 'pointlist' of metric values.

    2. It parses the JSON input and validates the presence of the 'pointlist'.

    3. It iterates through the 'pointlist' to extract raw metric values.

    4. It calculates the sum, average, minimum, and maximum of these values.

    5. It constructs a result JSON containing the calculated statistics, the unit,
    aggregation type, and the original timeseries data.

    6. The final result is added to the action output.
