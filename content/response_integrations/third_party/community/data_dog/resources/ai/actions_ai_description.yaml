  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the DataDog platform. Its primary purpose is to ensure that
    the provided API Key and Application Key are valid and that the network path to
    the DataDog API is open. This action is typically used during the initial setup
    of the integration or for troubleshooting authentication issues.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (API Key and APP Key).


    ### Additional Notes

    - This action does not process any entities.

    - It performs a read-only validation check against the DataDog `/api/v1/validate`
    endpoint.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the `API Key` and `APP Key`
    from the DataDog integration settings.

    2. **Manager Initialization:** It initializes the `DataDogManager` using the extracted
    credentials.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    sends a GET request to the DataDog validation endpoint.

    4. **Response Validation:** It checks the API response for a `valid: true` status.

    5. **Final Output:** The action returns a success message if the connection is
    established or a failure message if the credentials or connection are invalid.
