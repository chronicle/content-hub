  ai_description: >-
    ### General Description

    This action analyzes DataDog metric timeseries points provided as a JSON input.
    It processes a list of data points to calculate statistical summaries, including
    the sum, average, minimum, and maximum values within a specified time range. This
    is primarily a utility action used to interpret raw metric data fetched in previous
    playbook steps.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Series** | A JSON-formatted string containing the timeseries points and metadata
    (e.g., `pointlist`, `start`, `end`, `unit`, `aggr`). | Code | Yes | The action
    expects a specific structure containing a `pointlist` key which is a list of [timestamp,
    value] pairs. |


    ### Flow Description

    1. **Initialization**: The action extracts the DataDog integration configuration
    (API Key, APP Key) and the `Series` input parameter.

    2. **Parsing**: The `Series` parameter is parsed from a JSON string into a dictionary.

    3. **Validation**: The script checks for the presence of the `pointlist` key within
    the input data.

    4. **Calculation**: If valid, the script iterates through the `pointlist`, extracting
    raw metric values to calculate:
        *   **Sum**: Total of all metric values.
        *   **Average**: Mean of the metric values.
        *   **Minimum**: The lowest value in the set.
        *   **Maximum**: The highest value in the set.
    5. **Output**: The calculated statistics, along with original metadata (unit,
    aggregation type, time range, and expression), are packaged into a JSON result
    and returned to the SOAR platform.


    ### Additional Notes

    * This action does not perform any external API calls to DataDog; it processes
    data already provided in the `Series` parameter.

    * If the `Series` parameter is missing the `pointlist` key, the action will log
    an error and return an empty result.
