  ai_description: >-
    ### General Description

    The **Get Events** action retrieves event logs from DataDog within a specified
    time range. It allows analysts to filter events by source, priority, and tags,
    providing visibility into system activities, monitors, and alerts directly within
    the Google SecOps platform. This action is primarily used for log retrieval and
    historical analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sources** | String | Yes | The sources to retrieve the events from. For example,
    to see events from a triggered monitor, use 'alert'. |

    | **Start Time** | String | Yes | The start time of the events in Unix timestamp
    format (e.g., 1400000470). |

    | **End Time** | String | Yes | The end time of the events in Unix timestamp format
    (e.g., 1610557457). |

    | **Priority** | DDL | No | The priority of the events to retrieve. Options include
    `all`, `normal`, or `low`. Default is `all`. |

    | **Tags** | String | No | A comma-separated list of tags to filter the events
    by scope (e.g., 'monitor'). |

    | **Unaggregated** | Boolean | No | If set to `True`, the action retrieves the
    full list of events. If `False`, it retrieves an aggregated list. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the DataDog API Key and APP
    Key from the integration settings.

    2. **Parameter Extraction**: It collects the search criteria, including the time
    window (Start/End Time), sources, and optional filters like priority and tags.

    3. **API Interaction**: The action calls the DataDog API's events endpoint (`/api/v1/events`)
    using a GET request with the specified query parameters.

    4. **Result Handling**: The retrieved event data is processed and added to the
    action's JSON results. If events are found, the action completes successfully;
    otherwise, it reports that no events were fetched.


    ### Additional Notes

    - Ensure that the `Start Time` and `End Time` are provided as valid Unix timestamps
    in seconds.

    - This action does not target specific entities but rather performs a global search
    within the DataDog environment based on the provided parameters.
