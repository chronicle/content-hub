    This action fetches CPU utilization, freeable memory, and free storage space metrics
    within a defined time range. It processes a comma-separated list of database identifiers
    and returns the aggregated time-series data in a structured JSON format.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Datadog API and APP keys from the integration
    configuration, along with the Database Instance Identifiers, Start Time, and End
    Time from the action parameters.

    2. **Identifier Parsing:** Splits the provided comma-separated string of database
    identifiers into a list for individual processing.

    3. **Metric Retrieval:** For each database identifier, the action makes three
    distinct API calls to Datadog to fetch:
        * CPU Utilization (`aws.rds.cpuutilization`)
        * Freeable Memory (`aws.rds.freeable_memory`)
        * Free Storage Space (`aws.rds.free_storage_space`)
    4. **Data Aggregation:** Collects the successful metric responses into a results
    object, distinguishing between found and not-found identifiers.

    5. **Output Generation:** Adds the aggregated metrics to the action's JSON result
    and provides a summary message to the user.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database Instance Identifier | string | True | A comma-separated list of AWS
    RDS database instance identifiers (e.g., `db-1, db-2`) to query. |

    | Start Time | string | True | The start time for the metric query in Unix timestamp
    format (e.g., `1507040000`). |

    | End Time | string | True | The end time for the metric query in Unix timestamp
    format (e.g., `1610557457`). |


    ### Additional Notes

    * The action requires valid Datadog API and APP keys configured at the integration
    level.

    * Metrics are retrieved using the `avg` aggregator grouped by `dbinstanceidentifier`.
