  ai_description: >-
    ### General Description

    The `Get RDS Metric` action retrieves AWS RDS metrics (CPU, memory, and free storage)
    for a given Database instance identifier from Datadog. It allows analysts to monitor
    the performance and health of specific database instances over a defined time
    period directly within the SOAR platform.


    ### Flow Description

    1. The action extracts the provided parameters: `Database Instance Identifier`,
    `Start Time`, and `End Time`.

    2. It splits the `Database Instance Identifier` parameter into a list if multiple
    comma-separated identifiers are provided.

    3. For each database identifier, it makes API calls to Datadog to fetch CPU utilization,
    freeable memory, and free storage space metrics.

    4. The action aggregates the successfully fetched metrics into a JSON object.

    5. Finally, it outputs the aggregated metrics as a JSON result and completes the
    action execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Database Instance Identifier | String | Yes | The identifier of the database
    instance to get metrics for. Multiple identifiers can be provided as a comma-separated
    list. |

    | Start Time | String | Yes | The start time of the RDS metric in Unixtime. Determines
    the beginning of the time range for the metrics query. |

    | End Time | String | Yes | The end time of the RDS metric in Unixtime. Determines
    the end of the time range for the metrics query. |


    ### Additional Notes

    - The action requires valid Datadog API and APP keys configured in the integration
    settings.

    - If metrics for a specific database identifier cannot be found, the action will
    log the failure and continue processing the remaining identifiers.
