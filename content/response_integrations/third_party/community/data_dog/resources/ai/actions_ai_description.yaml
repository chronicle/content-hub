Get Pod Metric:
  ai_description: >-
    ### General Description

    Retrieves CPU, memory, and process metrics for specified Kubernetes pods from
    DataDog. This action fetches telemetry data over a defined timeframe to assist
    in monitoring and troubleshooting pod performance.


    ### Flow Description

    1. Extracts the `Pod Name`, `Start Time`, and `End Time` parameters provided by
    the user.

    2. Parses the `Pod Name` parameter into a list if multiple comma-separated pods
    are provided.

    3. Iterates through each pod name and makes a GET request to the DataDog API to
    fetch CPU metrics (`avg:kubernetes.cpu.system.total`).

    4. Makes a GET request to the DataDog API to fetch memory metrics (`avg:kubernetes.memory.usage_pct`).

    5. Makes a GET request to the DataDog API to retrieve running processes associated
    with the pod using tags.

    6. Aggregates the retrieved CPU, memory, and process data into a comprehensive
    JSON object.

    7. Attaches the aggregated metrics to the action's JSON result.


    ### Additional Notes

    The `Start Time` and `End Time` parameters must be provided in Unix timestamp
    format.
