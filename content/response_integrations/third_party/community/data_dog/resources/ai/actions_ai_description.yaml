    | Tags | string | No | A comma-separated list of tags that will filter the list
    of monitors by scope. Default is 'monitor'. |

    | Unaggregated | boolean | No | True to retrieve the full list of events; False
    to retrieve an aggregated list. Default is 'true'. |


    ### Flow Description

    1. **Initialization**: The action extracts the necessary configuration (API Key,
    APP Key) and action parameters (Sources, Start Time, End Time, etc.) from the
    SecOps environment.

    2. **Data Retrieval**: It initializes the `DataDogManager` and calls the `get_datadog_events`
    method, which performs a GET request to the Datadog API (`/api/v1/events`) with
    the provided filters.

    3. **Result Processing**: The retrieved events are printed to the logs and added
    to the action's result JSON.

    4. **Completion**: The action concludes by logging the success or failure of the
    retrieval and setting the final output message.
