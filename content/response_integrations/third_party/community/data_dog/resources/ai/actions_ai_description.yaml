Get RDS Metric:
  ai_description: >-
    ### General Description

    The **Get RDS Metric** action retrieves performance metrics for Amazon RDS (Relational
    Database Service) instances from Datadog. It specifically fetches data regarding
    CPU utilization, freeable memory, and free storage space for a given set of database
    instance identifiers within a specified time range. This action is useful for
    monitoring database health and resource consumption during incident investigation
    or performance auditing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database Instance Identifier | String | Yes | A comma-separated list of AWS
    RDS database instance identifiers (e.g., `db-instance-1, db-instance-2`) to query
    metrics for. |

    | Start Time | String | Yes | The start of the time window for the metrics in
    Unix timestamp format (e.g., `1507040000`). |

    | End Time | String | Yes | The end of the time window for the metrics in Unix
    timestamp format (e.g., `1610557457`). |


    ### Flow Description

    1. **Initialization**: The action extracts the Datadog API and APP keys from the
    integration configuration and retrieves the database identifiers and time range
    from the action parameters.

    2. **Input Parsing**: The comma-separated string of database identifiers is split
    into a list for individual processing.

    3. **Metric Retrieval**: For each database identifier, the action makes three
    separate API calls to Datadog to retrieve:
        * **CPU Utilization**: Average CPU usage percentage.
        * **Freeable Memory**: The amount of available RAM.
        * **Free Storage Space**: The amount of available disk space.
    4. **Data Aggregation**: The retrieved metrics are validated (checking for an
    "ok" status and existing data series) and aggregated into a structured dictionary.

    5. **Result Reporting**: The action identifies which database identifiers were
    successfully queried and which were not. The final results are attached as a JSON
    object to the action execution, and the action completes with a success message
    if at least one metric was found.


    ### Additional Notes

    * The action uses the Datadog `/api/v1/query` endpoint to perform time-series
    queries.

    * If a specific metric (e.g., CPU) is missing for an identifier but others (e.g.,
    Memory) are present, the action will still report success for that identifier.
