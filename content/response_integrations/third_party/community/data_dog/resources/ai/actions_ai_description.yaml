  ai_description: >-
    ### General Description

    The **Get Pod Metric** action retrieves performance telemetry and process information
    for specific Kubernetes Pods from DataDog. It is designed to provide visibility
    into the resource consumption (CPU and Memory) and the active processes running
    within a pod over a specified time range. This data is useful for troubleshooting
    performance issues or investigating suspicious activity within a containerized
    environment.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Additional Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **Pod Name** | The name of the Pod(s) to query. Supports a comma-separated list
    of names. | String | Yes | The code uses this as a tag filter (`pod_name:<value>`).
    |

    | **Start Time** | The start time of the metric query in Unix timestamp format.
    | String | Yes | Example: `1507040000` |

    | **End Time** | The end time of the metric query in Unix timestamp format. |
    String | Yes | Example: `1610557457` |


    ### Flow Description

    1.  **Initialization**: Extracts the DataDog API and APP keys from the integration
    configuration.

    2.  **Parameter Extraction**: Retrieves the list of Pod names, start time, and
    end time from the action parameters.

    3.  **Data Retrieval**: For each Pod name provided:
        *   Queries the DataDog Timeseries API for average CPU system total usage
    (`kubernetes.cpu.system.total`).
        *   Queries the DataDog Timeseries API for average memory usage percentage
    (`kubernetes.memory.usage_pct`).
        *   Queries the DataDog Processes API to list all processes associated with
    the `pod_name` tag.
    4.  **Result Aggregation**: Consolidates the CPU, Memory, and Process data into
    a structured JSON object.

    5.  **Output**: Returns the aggregated JSON data and provides a status message
    indicating which metrics were successfully retrieved.
