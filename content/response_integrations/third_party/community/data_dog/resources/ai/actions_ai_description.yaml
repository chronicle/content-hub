  ai_description: >-
    ### General Description

    This action processes a timeseries metric dataset provided as a JSON input to
    calculate statistical summaries. It extracts raw metric values from the input
    series, computes the sum, average, minimum, and maximum values, and returns these
    statistics as a JSON object for use in subsequent playbook steps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Series | code | Yes | The timeseries points to analyze, provided as a JSON object
    containing a 'pointlist'. |


    ### Additional Notes

    This action is a utility script that performs local data processing. Although
    it imports a `DataDogManager` class, it does not perform any external API calls
    or interact with the Datadog service during execution. It operates entirely on
    the input provided in the 'Series' parameter.


    ### Flow Description

    1. The action extracts the 'Series' parameter, which is expected to be a JSON
    string containing a 'pointlist' of metric values.

    2. It parses the JSON input and validates the presence of the 'pointlist'.

    3. It iterates through the 'pointlist' to extract raw metric values.

    4. It calculates the sum, average, minimum, and maximum of these values.

    5. It constructs a result JSON containing the calculated statistics, the unit,
    aggregation type, and the original timeseries data.

    6. The final result is added to the action output using `siemplify.result.add_result_json`.
