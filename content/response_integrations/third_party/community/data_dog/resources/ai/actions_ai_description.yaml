Get Metric Timeseries Points:
  ai_description: >-
    Retrieves metric timeseries points from DataDog based on a specific query and
    time range. This action allows users to fetch historical performance data or telemetry
    for analysis within Google SecOps.


    ### General Description

    This action interacts with the DataDog API to retrieve timeseries data points
    for a provided metric query. It is primarily used for monitoring, troubleshooting,
    and incident investigation by pulling specific metric trends over a defined period.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | string | Yes | The DataDog metric query to execute (e.g., `avg:system.cpu.idle{host:host0}`).
    |

    | Start Time | string | Yes | The start time of the timeseries points in Unix
    timestamp format (e.g., `1400000470`). |

    | End Time | string | Yes | The end time of the timeseries points in Unix timestamp
    format (e.g., `1610557457`). |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the DataDog API Key and APP Key from
    the integration settings.

    2. **Parameter Parsing**: Extracts the user-provided metric query, start time,
    and end time.

    3. **API Request**: Executes a GET request to the DataDog `/api/v1/query` endpoint
    with the specified parameters.

    4. **Validation**: Checks if the API response status is 'ok' and if any data series
    were returned.

    5. **Result Processing**: Logs the outcome and attaches the raw timeseries data
    to the action's JSON results for use in subsequent playbook steps.
