Get Events:
  ai_description: >-
    Retrieves event data from DataDog based on specific search criteria. This action
    allows analysts to query the DataDog Events API to fetch logs and event details
    within a specified time range, filtered by sources, tags, and priority levels.
    The results are returned as a JSON object for further analysis within the SOAR
    platform.


    ### Flow Description:

    1. **Authentication**: Extracts the API Key and APP Key from the integration configuration
    to authenticate with the DataDog API.

    2. **Parameter Extraction**: Retrieves user-defined parameters including the event
    sources, start/end times (in Unix format), priority filters, tags, and aggregation
    preferences.

    3. **API Request**: Initializes the DataDog manager and executes a GET request
    to the `/api/v1/events` endpoint with the provided filters.

    4. **Result Processing**: Captures the returned event list. If events are found,
    they are added to the action's JSON results and the action completes successfully.
    If no events match the criteria, it reports a successful execution with an empty
    result set.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sources | String | Yes | The specific sources to retrieve events from (e.g.,
    'alert', 'monitor'). |

    | Start Time | String | Yes | The start of the time range for event retrieval
    in Unixtime format. |

    | End Time | String | Yes | The end of the time range for event retrieval in Unixtime
    format. |

    | Priority | DDL | No | Filters events by priority level. Options include 'all',
    'normal', or 'low'. Default is 'all'. |

    | Tags | String | No | A comma-separated list of tags to filter the events (e.g.,
    'env:prod'). |

    | Unaggregated | Boolean | No | If set to 'true', retrieves the full list of events.
    If 'false', retrieves an aggregated list. |


    ### Additional Notes:

    - This action does not operate on specific entities within the case; it performs
    a global search based on the provided time and filter parameters.

    - Ensure that the Start Time and End Time are provided in valid Unix timestamp
    format (seconds).
