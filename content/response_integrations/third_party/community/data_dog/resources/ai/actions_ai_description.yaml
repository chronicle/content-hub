    instance identifiers.

    3. **Metric Fetching**: For each identifier, it calls the `DataDogManager` to
    fetch CPU utilization, memory usage, and free storage space metrics from Datadog
    using the specified time range.

    4. **Result Aggregation**: Successfully fetched metrics are aggregated into a
    JSON object.

    5. **Output**: The action adds the aggregated JSON result to the SOAR action results
    and terminates with a success status and a summary message.
