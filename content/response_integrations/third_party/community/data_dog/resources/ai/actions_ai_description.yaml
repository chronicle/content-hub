Get Beautiful Metric:
  ai_description: >-
    ### General Description

    Analyzes a provided JSON string containing DataDog metric timeseries points to
    calculate and return statistical summaries. This action processes the raw data
    points to determine the sum, average, minimum, and maximum values without making
    additional API calls.


    ### Flow Description

    1. Extracts the `Series` parameter, which contains the timeseries data in JSON
    format.

    2. Parses the JSON to extract the `pointlist`, `start`, `end`, `unit`, `aggr`,
    and `expression` values.

    3. Iterates through the timeseries points to calculate the sum, average, minimum,
    and maximum values from the raw metric data.

    4. Constructs a comprehensive JSON result containing the calculated statistics
    and original metadata.

    5. Attaches the resulting JSON to the action's output.


    ### Additional Notes

    Although the action initializes the DataDog manager using integration configurations,
    it does not make any external API calls during its execution. It relies entirely
    on the data provided in the `Series` parameter.
  ai_short_description: >-
    Analyzes a provided JSON string of DataDog metric timeseries points to calculate
    and return statistical summaries such as sum, average, minimum, and maximum values.
  capabilities:
    can_create_case_comments: false
