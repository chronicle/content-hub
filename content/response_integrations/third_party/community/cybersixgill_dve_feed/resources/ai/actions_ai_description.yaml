  ai_description: >-
    ### General Description

    Verifies connectivity to the Cybersixgill service by authenticating with the provided
    credentials. This action ensures that the integration is correctly configured
    and can communicate with the Cybersixgill API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The client ID for Cybersixgill authentication. |

    | Client Secret | String | Yes | The client secret for Cybersixgill authentication.
    |


    ### Flow Description

    1. Extract Client Id and Client Secret from the integration configuration.

    2. Initialize the SixgillEnrichManager with these credentials.

    3. Attempt to create a SixgillBaseClient and retrieve an access token to validate
    the connection.

    4. Return the connection status to the SOAR platform.
