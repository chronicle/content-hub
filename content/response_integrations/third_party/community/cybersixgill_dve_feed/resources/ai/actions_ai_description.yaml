Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the Cybersixgill API. Its primary purpose
    is to validate that the configured credentials (Client ID and Client Secret) are
    correct and that the Cybersixgill service is accessible from the environment.


    ### Parameters Description

    There are no user-input parameters for this action. It relies entirely on the
    integration's global configuration settings.


    ### Additional Notes

    This action is a standard connectivity check and does not process any entities
    or modify any data within Google SecOps or Cybersixgill.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `Client Id` and `Client
    Secret` from the Cybersixgill integration settings.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` using
    the extracted credentials.

    3. **Authentication Check**: The manager attempts to establish a connection by
    requesting an access token from the Cybersixgill API using the `SixgillBaseClient`.

    4. **Execution Completion**: If the access token is successfully retrieved, the
    action returns a success status and message. If the connection fails, it raises
    a `SixgillManagerError`.
