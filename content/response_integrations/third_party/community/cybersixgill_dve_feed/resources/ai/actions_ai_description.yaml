Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Cybersixgill DVE Feed API using the provided integration
    credentials.


    ### Flow Description

    1. Extracts the Client ID and Client Secret from the integration configuration.

    2. Initializes the Cybersixgill client.

    3. Makes an API call to retrieve an access token (`get_access_token`) to verify
    authentication.

    4. Returns a success message and status if the connection is successfully established.


    ### Additional Notes

    This is a standard Ping action used primarily during integration setup to verify
    that the provided credentials and network configurations are correct.
  ai_short_description: >-
    Tests the connectivity to the Cybersixgill DVE Feed API by attempting to authenticate
    and retrieve an access token.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
