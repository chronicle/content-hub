  ai_description: >-
    Tests connectivity to the Cybersixgill DVE Feed integration.


    ### General Description

    This action verifies that the provided credentials (Client ID and Client Secret)
    are valid by attempting to authenticate and retrieve an access token from the
    Cybersixgill API.


    ### Parameters Description

    This action does not require any parameters.


    ### Flow Description

    1. Extracts the Client ID and Client Secret from the integration configuration.

    2. Initializes the Cybersixgill client.

    3. Attempts to retrieve an access token to verify connectivity.

    4. Returns a success message if the connection is established successfully.
