  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Cybersixgill platform. Its primary purpose is to validate
    that the configured credentials (Client ID and Client Secret) are correct and
    that the system can successfully authenticate with the Cybersixgill API.


    ### Parameters Description

    There are no input parameters for this action. It uses the global integration
    configuration for authentication.


    ### Flow Description

    1. **Credential Retrieval**: The action extracts the `Client Id` and `Client Secret`
    from the integration's configuration parameters.

    2. **Client Initialization**: It initializes the Cybersixgill manager and base
    client using the provided credentials.

    3. **Connectivity Test**: The action attempts to retrieve an access token from
    the Cybersixgill API via the `get_access_token` method.

    4. **Status Reporting**: If the token is successfully retrieved, the action returns
    a success message and a boolean `True` result. If the authentication fails or
    a network error occurs, an exception is raised.


    ### Additional Notes

    This action does not interact with any entities or modify any internal or external
    data. It is used exclusively for testing the integration setup.
