Cybersixgill - DVE Connector:
  ai_description: >-
    ### General Description

    The Cybersixgill DVE Connector integrates Google SecOps with the Cybersixgill
    Dynamic Vulnerability Exploit (DVE) Feed. This connector allows security teams
    to ingest real-time intelligence regarding vulnerabilities (CVEs) and their likelihood
    of exploitation. By leveraging Cybersixgill's unique DVE score, which is based
    on threat actor intent and dark web activity, users can prioritize remediation
    efforts for the most critical risks directly within the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the current script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type) for the ingested data. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product for the ingested data. |

    | Client Secret | Password | Yes | The Secret Key used for authenticating with
    the Cybersixgill API. |

    | Client Id | String | Yes | The Client ID used for authenticating with the Cybersixgill
    API. |

    | Alerts Limit | Integer | Yes | The maximum number of vulnerability alerts to
    be ingested into the platform per execution cycle. |


    ### Flow Description

    1. **Authentication**: The connector establishes a connection with the Cybersixgill
    API using the provided Client ID and Client Secret.

    2. **Data Fetching**: It requests a bundle of vulnerability intelligence from
    the Cybersixgill DVE Feed stream, limited by the 'Alerts Limit' parameter.

    3. **Filtering**: The script filters the raw response to identify valid indicator
    objects (CVEs) for processing.

    4. **Alert Mapping**: For each identified vulnerability, the connector creates
    a Google SecOps alert. It maps the CVE ID as the alert name and sets a default
    priority of Medium (60).

    5. **Event Enrichment**: Detailed metadata is extracted for each vulnerability,
    including current and highest DVE scores, NVD CVSS scores (v2.0 and v3.1), severity
    levels, and publication dates.

    6. **Ingestion**: The mapped alerts and enriched events are returned to Google
    SecOps for case creation.

    7. **Commitment**: The connector commits the processed indicators to the Cybersixgill
    client to ensure that the same data is not ingested multiple times in future runs.
