Cybersixgill - DVE Connector:
  ai_description: >-
    ### General Description

    The Cybersixgill - DVE Connector integrates Google SecOps (SOAR) with the Cybersixgill
    Dynamic Vulnerability Exploit (DVE) feed. It retrieves real-time vulnerability
    intelligence, specifically focusing on DVE scores, which predict the immediate
    risk of a vulnerability being exploited based on threat actor intent. This connector
    ingests these vulnerability alerts into the SOAR platform, allowing security teams
    to prioritize remediation efforts based on actual threat context rather than just
    CVSS scores.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Client Secret | String | Yes | The secret key for authenticating with the Cybersixgill
    API. |

    | Client Id | String | Yes | The client ID for authenticating with the Cybersixgill
    API. |

    | Alerts Limit | Integer | Yes | The maximum number of alerts to be ingested into
    the platform per run. |


    ### Flow Description

    1. The connector initializes the SixgillFeedClient using the provided Client Id
    and Client Secret.

    2. It connects to the Cybersixgill DVE feed stream to fetch the latest vulnerability
    bundles.

    3. The retrieved data is filtered to extract valid indicators.

    4. Each record is processed and mapped into a SOAR AlertInfo object, including
    critical metadata such as DVE scores, CVSS scores, NVD links, and exploit status.

    5. The mapped alerts are ingested into the SOAR platform as cases/alerts.

    6. Finally, the connector commits the processed indicators to the Cybersixgill
    feed to mark them as handled.
