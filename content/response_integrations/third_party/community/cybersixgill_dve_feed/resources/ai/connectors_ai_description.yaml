Cybersixgill - DVE Connector:
  ai_description: >-
    ### General Description

    The Cybersixgill DVE Connector integrates with the Cybersixgill Dynamic Vulnerability
    Exploit (DVE) feed to ingest vulnerability-related threat intelligence into Google
    SecOps. It focuses on CVEs, providing real-time context on threat actor intent
    and the probability of exploitation. This allows security teams to prioritize
    vulnerabilities based on dynamic risk scores and dark web intelligence rather
    than static severity metrics.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for authenticating with the Cybersixgill
    API. |

    | Client Secret | Password | Yes | The Secret Key for authenticating with the
    Cybersixgill API. |

    | Alerts Limit | Integer | Yes | The maximum number of vulnerability alerts to
    ingest in a single execution cycle. |

    | EventClassId | String | Yes | The field name used to determine the event name/sub-type.
    Default is 'Cybersixgill DVE Feed'. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. Default is 'Cybersixgill DVE Feed'. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the current script. |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Cybersixgill API using
    the provided Client ID and Client Secret.

    2. **Data Retrieval**: It establishes a connection to the Cybersixgill DVE Feed
    stream using a dedicated channel ID.

    3. **Fetching Indicators**: The connector fetches a bundle of vulnerability indicators
    (CVEs) from the feed, limited by the 'Alerts Limit' parameter.

    4. **Filtering**: The script filters the retrieved objects to ensure only valid
    indicators are processed for alert creation.

    5. **Mapping**: Each vulnerability record is mapped to a Google SecOps Alert.
    This includes enriching the alert with specific DVE metadata such as current scores,
    highest historical scores, exploitation status, and NVD (National Vulnerability
    Database) details like CVSS v2/v3 scores and vectors.

    6. **Ingestion**: The mapped alerts and their associated events are ingested into
    the platform to create cases.

    7. **Checkpointing**: The connector commits the processed indicators back to the
    Cybersixgill API to ensure that the same data is not re-ingested in future runs.
