Cybersixgill - DVE Connector:
  ai_description: >-
    ### General Description

    The Cybersixgill DVE Connector integrates with the Cybersixgill Dynamic Vulnerability
    Exploit (DVE) feed to ingest vulnerability intelligence into Google SecOps. It
    retrieves real-time data regarding CVEs, including DVE scores, exploitability
    status, and NVD details, allowing security teams to track and prioritize vulnerabilities
    based on actual threat actor intent and exploit probability.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Client Secret | Password | Yes | The secret key for Cybersixgill API authentication.
    |

    | Client Id | String | Yes | The client ID for Cybersixgill API authentication.
    |

    | Alerts Limit | Integer | Yes | The maximum number of alerts to be ingested into
    the platform per run. |


    ### Flow Description

    1. The connector initializes the connection to the Cybersixgill API using the
    provided Client ID and Client Secret.

    2. It queries the DVE feed stream to retrieve a bundle of vulnerability records.

    3. The retrieved records are filtered to identify valid indicators.

    4. For each indicator, the connector maps the data into a structured alert format,
    including critical fields like DVE scores, CVSS metrics, and NVD publication details.

    5. The connector commits the processed indicators to the Cybersixgill feed to
    acknowledge receipt.

    6. Finally, the aggregated alerts are ingested into Google SecOps for further
    analysis and response.
