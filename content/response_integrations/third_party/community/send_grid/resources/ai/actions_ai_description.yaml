    reasoning: >-
      The action is a simple connectivity test (Ping) to verify API credentials and
      permissions. It does not enrich IOCs or assets, update alerts, create tickets,
      block/allow IOCs, manage identities, contain hosts, search/download files, or
      send/search emails. Therefore, it does not match any of the defined action outcome
      categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
