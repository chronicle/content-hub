  ai_description: "### General Description\nThis action sends an email message through\
    \ the SendGrid API. It is primarily used for automated notifications, reporting,\
    \ or communication within a security orchestration workflow. The action allows\
    \ for full customization of the sender, recipient, subject, and HTML content.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Email From | string | Yes | The email address\
    \ that will appear as the sender. |\n| Email To | string | Yes | The recipient's\
    \ email address. |\n| Subject | string | Yes | The subject line of the email.\
    \ |\n| Content | email_content | Yes | The HTML body content of the email. Supports\
    \ dynamic placeholders and HTML formatting. |\n| Return Message Status | boolean\
    \ | No | If set to `true`, the action will return the SendGrid API response status\
    \ code and recipient details in the execution results. Default is `false`. |\n\
    \n### Additional Notes\nThis action does not process entities from the SecOps\
    \ environment; it relies entirely on the provided input parameters to define the\
    \ email's destination and content.\n\n### Flow Description\n1. **Initialization**:\
    \ The action loads the SendGrid API token from the integration configuration and\
    \ retrieves the email parameters (From, To, Subject, Content).\n2. **Message Construction**:\
    \ A SendGrid Mail object is created using the provided sender, recipient, subject,\
    \ and HTML content.\n3. **API Interaction**: The action initializes the SendGrid\
    \ API client and attempts to send the message.\n4. **Result Handling**: \n   \
    \ * If successful, it logs the success.\n    * If `Return Message Status` is enabled,\
    \ it captures the API status code and metadata into a JSON result.\n    * If the\
    \ API call fails, an error is logged and the action returns a failure status."
