    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Tests connectivity to the SendGrid API by verifying the provided API token and
    checking for the required permissions.


    ### Flow Description

    1. Retrieves the API token from the SendGrid integration configuration.

    2. Makes a GET request to the SendGrid `/v3/scopes` endpoint.

    3. Parses the response to check if the `mail.send` permission is present in the
    returned scopes.

    4. Returns a success message if the connection is successful and the permission
    is found, otherwise returns an error message.


    ### Parameters Description

    There are no parameters for this action.
