Ping:
  ai_description: "### General Description\nThe **Ping** action is a connectivity\
    \ test designed to verify the integration between Google SecOps and the SendGrid\
    \ service. Its primary purpose is to ensure that the provided API Token is valid\
    \ and possesses the necessary permissions to perform core functions, specifically\
    \ sending emails.\n\n### Parameters Description\nThere are no parameters for this\
    \ action. It relies solely on the integration's global configuration (API Token).\n\
    \n### Additional Notes\nThis action specifically checks for the `mail.send` scope\
    \ in the SendGrid account permissions. If the token is valid but lacks this specific\
    \ scope, the action will return a failure status, as the integration would be\
    \ unable to perform its primary email-sending tasks.\n\n### Flow Description\n\
    1. **Configuration Retrieval:** The action retrieves the `API Token` from the\
    \ SendGrid integration settings.\n2. **API Request:** It performs an HTTPS GET\
    \ request to the SendGrid `/v3/scopes` endpoint using the provided token for authentication.\n\
    3. **Response Parsing:** The action decodes the JSON response from SendGrid to\
    \ extract the list of authorized scopes.\n4. **Permission Validation:** It uses\
    \ a regular expression to search for the `mail.send` string within the retrieved\
    \ scopes.\n5. **Result Reporting:** \n    * If `mail.send` is found, it returns\
    \ a success message and sets the result to `True`.\n    * If the scope is missing\
    \ or the API call fails, it returns an error message and sets the result to `False`."
  capabilities:
