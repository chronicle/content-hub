  ai_description: >-
    ### General Description

    This action tests the connectivity to the SendGrid API by verifying the provided
    API token's permissions. This ensures that the integration is correctly configured
    and authorized to perform operations.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Retrieve the API token from the SendGrid integration configuration.

    2. Establish an HTTPS connection to the SendGrid API endpoint (api.sendgrid.com).

    3. Perform a GET request to the /v3/scopes endpoint to verify the token's permissions.

    4. Parse the response to check for the mail.send scope.

    5. Return a success status if the connection is established and the required scope
    is present, or an error message otherwise.
