  ai_description: >-
    ### General Description

    Sends an email message using the SendGrid API. This action allows users to dispatch
    notifications or reports to specified recipients.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Return Message Status | boolean | No | If set to true, the action saves the
    response status code and recipient list as a JSON result. |

    | Subject | string | Yes | The subject line of the email. |

    | Email To | string | Yes | The recipient's email address. |

    | Email From | string | Yes | The sender's email address. |

    | Content | email_content | Yes | The HTML content of the email. |


    ### Additional Notes

    This action does not require any entities to run.


    ### Flow Description

    1. Initializes the SendGrid API client using the configured API token.

    2. Constructs the email message using the provided sender, recipient, subject,
    and content.

    3. Sends the email via the SendGrid API.

    4. If 'Return Message Status' is enabled, saves the response status code and recipient
    information as a JSON result in the action output.

    5. Logs the operation status and returns the execution result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: Sends an email via the SendGrid API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action sends an email via the SendGrid API, which is an external system
      mutation. It does not fetch data, update entities, or create insights.
  categories:
