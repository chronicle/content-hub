    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action uses the SendGrid API to send an email message based on the provided
      parameters. This directly aligns with the 'Send Email' category. It does not
      perform any other operations such as enriching data, updating alerts, or modifying
      identities.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: true
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    The "Send Email" action uses the SendGrid integration to dispatch an outbound
    email message to specified recipients. It allows users to configure the sender,
    recipient, subject, and HTML content of the email.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Email From | String | Yes | The email address from which the message will be
    sent. |

    | Email To | String | Yes | The recipient's email address. |

    | Subject | String | Yes | The subject line of the email. |

    | Content | Email Content | Yes | The HTML or plain text content of the email
    body. |

    | Return Message Status | Boolean | No | If enabled, the action will return the
    HTTP response status code from SendGrid as a JSON result. |


    ### Flow Description

    1. The action initializes the SendGrid API client using the configured API token.

    2. It constructs an email message object using the provided From, To, Subject,
    and Content parameters.

    3. It sends the email via the SendGrid API.

    4. If the "Return Message Status" parameter is set to true, it saves the response
    status code, date, and recipients as a JSON result.

    5. The action completes and returns a success or failure status based on the API
    response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an outbound email message via the SendGrid API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action sends an email using the SendGrid API, which is an external operation
      that changes state (sends a message). It does not fetch data for enrichment,
      nor does it mutate internal SecOps data such as entities, insights, or case
      comments.
  categories:
    enrichment: false
    reasoning: >-
      The action sends an email, which mutates external state and does not fetch data.
      Therefore, it is not an enrichment action. It also does not perform any remediation
      tasks such as blocking IPs, disabling identities, or quarantining emails, so
      it is not a remediation action.
    remediation: false
