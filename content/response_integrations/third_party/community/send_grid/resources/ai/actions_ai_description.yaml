Send Email:
  ai_description: >-
    Sends an email message using the SendGrid API. This action allows users to dispatch
    formatted HTML emails to specific recipients by providing sender details, subject
    lines, and message content. It is primarily used for notifications, reporting,
    or communication within automated playbooks.


    ### Flow Description

    1. **Initialization**: The action initializes the SendGrid API client using the
    provided API Token from the integration configuration.

    2. **Message Construction**: It constructs a mail object containing the sender's
    email, recipient's email, subject, and HTML content derived from the action parameters.

    3. **API Request**: The action sends the email request to the SendGrid service.

    4. **Result Handling**: If the 'Return Message Status' parameter is enabled, the
    action captures the API response status code and timestamp, attaching them as
    a JSON result to the action execution.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email From | string | Yes | The email address that will appear in the 'From'
    field of the sent email. |

    | Email To | string | Yes | The recipient's email address. |

    | Subject | string | Yes | The subject line of the email. |

    | Content | email_content | Yes | The HTML-formatted body of the email message.
    |

    | Return Message Status | boolean | No | If set to 'true', the action will return
    the SendGrid API response status code and delivery metadata in the JSON results.
    Default is 'false'. |


    ### Additional Notes

    - This action does not operate on specific SecOps entities; it uses the provided
    parameter values to execute the mail delivery.

    - No retry logic is implemented within this specific action; failures in the API
    call will result in an execution failure state.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
