Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cyble Vision API and validates the provided API key.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Key, Base URL, etc.).

    2. Initializes the CybleManager.

    3. Makes a GET request to the `/secops/alerts/services` endpoint to verify connectivity
    and authentication.

    4. Returns a success message if connected, or an error message if authentication
    or connectivity fails.


