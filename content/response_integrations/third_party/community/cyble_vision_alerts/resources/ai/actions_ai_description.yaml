    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a specific alert in Cyble Vision.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the 'Status' and 'LastSyncAt' custom fields on the SecOps alert and
      adds a comment to the case.
    reasoning: >-
      The action makes a PUT request to the Cyble API to update the alert status (can_mutate_external_data=true).
      It also updates the local alert's custom fields (can_modify_alert_data=true)
      and adds a comment to the case wall (can_create_case_comments=true). It does
      not fetch data for enrichment or update entities.
