UpdateAlertSeverity:
  ai_description: >-
    ### General Description

    Updates the severity of a specific alert in Cyble Vision and synchronizes the
    change to the local SecOps alert.


    ### Flow Description

    1. Extracts the `Cyble Alert ID` and `Cyble Service` from the action parameters.
    If not provided, it attempts to retrieve them from the current alert's additional
    properties.

    2. Validates the provided `New Severity` value, normalizing integer inputs to
    their corresponding string representations if necessary.

    3. Makes a PUT request to the Cyble Vision API (`/secops/alerts`) to update the
    alert's severity in the external system.

    4. Updates the local SecOps alert's additional data with the new severity and
    the current synchronization timestamp.

    5. Adds a comment to the SecOps case to log the successful update.


    ### Additional Notes

    Accepts both string (e.g., 'CRITICAL', 'HIGH') and integer (e.g., '-1', '2') severity
    values to support seamless playbook mappings without requiring string conversion
    blocks.
