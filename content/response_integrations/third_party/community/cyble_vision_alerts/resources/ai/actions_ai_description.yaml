    external_data_mutation_explanation: >-
      Updates the severity of a specific alert in Cyble Vision.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the local alert's additional data with the new severity and sync time,
      and adds a comment to the case.
    reasoning: >-
