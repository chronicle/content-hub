GetAlerts:
  ai_description: >-
    ### General Description

    Fetches Cyble Vision alerts for specified services within a given time window.
    This action is useful for analyst-triggered ad-hoc pulls (e.g., retrieving the
    latest phishing alerts for a domain) or as a playbook enrichment step to gather
    recent alerts without waiting for the regular job cycle.


    ### Flow Description

    1. Extracts the action parameters including the target services, time window (hours
    back), maximum results, and statuses.

    2. Parses and validates the requested services and statuses against known Cyble
    Vision values.

    3. Calculates the time window based on the `Hours Back` parameter.

    4. Makes a POST request to the Cyble Vision API (`/secops/alerts`) to fetch alerts
    matching the specified criteria.

    5. Maps the fetched raw Cyble alerts into a standardized SecOps alert format.

    6. Constructs a JSON output containing the fetched alerts and their details, and
    attaches it to the action's result.


    ### Additional Notes

    If unknown service names are provided, the action will log a warning but still
    attempt to fetch alerts for them. The action handles pagination automatically
    up to the specified `Max Results` limit.
  ai_short_description: >-
    Fetches Cyble Vision alerts for specified services within a given time window
    and returns them as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches alert data from the Cyble Vision API (fetches_data=true).
      It does not perform any state-changing operations on external systems, nor does
      it mutate internal SecOps data such as entities, insights, or case comments.
