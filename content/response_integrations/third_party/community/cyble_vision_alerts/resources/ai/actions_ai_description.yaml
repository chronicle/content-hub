GetServicesList:
  ai_description: >-
    ### General Description

    Retrieves a list of all active Cyble Vision threat intelligence services. This
    action is primarily used as a utility to validate connector configurations, dynamically
    populate service filter inputs in playbooks, or troubleshoot which services are
    authorized for the configured API key.


    ### Flow Description

    1. Initializes the Cyble API client using the integration-level configuration
    parameters.

    2. Makes an HTTP GET request to the Cyble Vision `/secops/alerts/services` endpoint
    to fetch the available services.

    3. Filters the response to include only services that support alerts (`allowAlerts`
    is true).

    4. Formats the retrieved services into a structured JSON object containing the
    total count and service details (name, display name, and alert support status).

    5. Attaches the formatted JSON object to the action's result data.


    ### Additional Notes

    This action does not interact with or modify any alerts, cases, or entities within
    Google SecOps.
