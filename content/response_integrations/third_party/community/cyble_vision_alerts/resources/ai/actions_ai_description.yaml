UpdateAlertStatus:
  ai_description: >-
    ### General Description

    Updates the status of a Cyble Vision alert in the Cyble platform and synchronizes
    the change to the local SecOps alert. This action is typically used when an analyst
    closes or triages a case, ensuring the upstream Cyble alert reflects the latest
    status.


    ### Flow Description

    1. Extracts the `Cyble Alert ID`, `Cyble Service`, and `New Status` from the action
    parameters. If the ID or Service are not provided, it attempts to auto-populate
    them from the current alert's custom fields.

    2. Validates the inputs to ensure the provided status is a valid Cyble status.

    3. Builds the update payload and makes a PUT request to the Cyble API (`/secops/alerts`)
    to update the alert status externally.

    4. On a successful API response, updates the `Status` and `LastSyncAt` custom
    fields on the local SecOps alert to maintain synchronization.

    5. Adds an audit comment to the SecOps case wall detailing the successful update.


    ### Additional Notes

    If the API call fails (e.g., due to authentication issues, validation errors,
    or the alert not being found), the action raises an exception and fails explicitly,
    allowing playbooks to route to an error branch.
  ai_short_description: >-
    Updates the status of a Cyble Vision alert in the Cyble platform and synchronizes
    the change to the local SecOps alert's custom fields and case wall.
  capabilities:
    can_create_case_comments: true
