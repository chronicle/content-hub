identifier: CybleVisionAlerts
name: Cyble Vision Alerts
parameters:
-   name: API Key
    default_value: null
    type: password
    description: Cyble Vision API Bearer token. Obtain from your Cyble portal under
        Settings > API Keys.
    is_mandatory: true
    integration_identifier: CybleVisionAlerts
-   name: Base URL
    default_value: https://bifrost.cyble.ai/engine/api/v1/y/tpi
    type: string
    description: 'Cyble TPI base URL. Default: https://bifrost.cyble.ai/engine/api/v1/y/tpi'
    is_mandatory: true
    integration_identifier: CybleVisionAlerts
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: Verify SSL certificates. Disable only in isolated test environments.
    is_mandatory: false
    integration_identifier: CybleVisionAlerts
-   name: Request Timeout In Seconds
    default_value: '30'
    type: integer
    description: HTTP request timeout in seconds. Increase for slow networks.
    is_mandatory: false
    integration_identifier: CybleVisionAlerts
documentation_link: https://docs.cyble.com/
categories:
- Threat Intelligence
svg_logo_path: resources/logo.svg
image_path: resources/image.png
