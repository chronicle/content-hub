name: UpdateAlertStatus
description: Update the status of a Cyble Vision alert.
integration_identifier: CybleVisionAlerts
parameters:
-   name: Cyble Alert ID
    default_value: ''
    type: string
    description: Cyble alert UUID. Auto-populated from CybleAlertId field if left
        empty.
    is_mandatory: false
-   name: Cyble Service
    default_value: ''
    type: string
    description: Cyble service name. Auto-populated from CybleService field if left
        empty.
    is_mandatory: false
-   name: New Status
    default_value: VIEWED
    type: ddl
    optional_values:
    - UNREVIEWED
    - VIEWED
    - UNDER_REVIEW
    - CONFIRMED_INCIDENT
    - INFORMATIONAL
    - RESOLVED
    description: 'New status: UNREVIEWED, VIEWED, CONFIRMED_INCIDENT, UNDER_REVIEW,
        INFORMATIONAL, RESOLVED.'
    is_mandatory: true
dynamic_results_metadata: []
default_result_value: ''
creator: admin
