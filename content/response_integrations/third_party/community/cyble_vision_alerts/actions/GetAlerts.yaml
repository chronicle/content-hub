name: GetAlerts
description: Fetch Cyble Vision alerts for specified services within a time window.
integration_identifier: CybleVisionAlerts
parameters:
-   name: Services
    default_value: github
    type: string
    description: Comma-separated list of Cyble service names.
    is_mandatory: true
-   name: Hours Back
    default_value: '24'
    type: string
    description: How many hours back to fetch alerts.
    is_mandatory: false
-   name: Max Results
    default_value: '50'
    type: string
    description: Maximum number of alerts to return.
    is_mandatory: false
-   name: Statuses
    default_value: ''
    type: string
    description: Comma-separated alert statuses to filter. Leave empty for all active
        statuses.
    is_mandatory: false
dynamic_results_metadata: []
default_result_value: ''
creator: admin
