name: UpdateAlertSeverity
description: Update the severity of a Cyble Vision alert.
integration_identifier: CybleVisionAlerts
parameters:
-   name: Cyble Alert ID
    default_value: ''
    type: string
    description: Cyble alert UUID. Auto-populated from CybleAlertId field if left
        empty.
    is_mandatory: false
-   name: Cyble Service
    default_value: ''
    type: string
    description: Cyble service name. Auto-populated from CybleService field if left
        empty.
    is_mandatory: false
-   name: New Severity
    default_value: MEDIUM
    type: ddl
    optional_values:
    - CRITICAL
    - HIGH
    - MEDIUM
    - LOW
    description: 'New severity: CRITICAL, HIGH, MEDIUM, LOW.'
    is_mandatory: true
dynamic_results_metadata: []
default_result_value: ''
creator: admin
