name: SyncAlertsJob
parameters:
-   name: API Key
    type: password
    description: Cyble Vision API Bearer token.
    is_mandatory: true
-   name: Base URL
    default_value: https://bifrost.cyble.ai/engine/api/v1/y/tpi
    type: string
    description: Cyble TPI base URL.
    is_mandatory: true
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: Verify SSL certificates.
    is_mandatory: false
-   name: Request Timeout In Seconds
    default_value: '30'
    type: integer
    description: HTTP request timeout in seconds.
    is_mandatory: false
-   name: Max Alerts Per Service Per Cycle
    default_value: '500'
    type: integer
    description: Maximum alerts to fetch per service per job run.
    is_mandatory: false
-   name: Services Filter
    default_value: ''
    type: string
    description: Restrict sync to these services. Leave empty to sync all active services.
    is_mandatory: false
-   name: Hours Back
    default_value: '24'
    type: integer
    description: How far back to fetch on the very first run (before cursor is set).
    is_mandatory: false
description: 'Scheduled job to sync Cyble Vision alerts into Google SecOps SOAR. Runs
    on a configurable interval (recommended: every 15 minutes).'
documentation_link: null
integration: CybleVisionAlerts
creator: admin
