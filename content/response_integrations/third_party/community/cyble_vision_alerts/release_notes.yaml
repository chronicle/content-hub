- description: NEW! Cyble Vision Alerts Integration. Bidirectional integration with
    the Cyble Vision threat intelligence platform — ingests alerts across all configured
    Cyble services as Google SecOps cases and synchronises status/severity changes
    back to Cyble. Includes a connector for case ingestion, a sync job for case refresh,
    and five actions (Ping, Get Services List, Get Alerts, Update Alert Status, Update
    Alert Severity).
