-   description: Cap long-text custom-field values at 1,024 chars to match Google
        SecOps Free Text limit. Prevents potential first-observation auto-registration
        rejection on alerts with verbose llm_explanation, ai_summary, or content fields.
    version: 1.1
    item_name: Cyble Vision Alerts
    item_type: Integration
    new: false
    regressive: false
    deprecated: false
    removed: false
-   description: 'Aligned the connector parameter schema with Google SecOps content-hub
        conventions. Added the three mandatory SOAR-runtime parameters: DeviceProductField,
        EventClassId and PythonProcessTimeout (default 600s). Added optional advanced
        parameters Environment Field Name and Environment Regex Pattern. Fixed Verify
        SSL default from boolean true to string "true". This resolves connector save
        failures (errorCode 2000) caused by missing standard infrastructure parameters
        that the SOAR backend expects every connector to declare.'
    version: 1.2
    item_name: Cyble Vision Alerts Connector
    item_type: Connector
    new: false
    regressive: false
    deprecated: false
    removed: false
-   description: 'Cursor correctness fix. Per-service cursor now advances to max(created_at)
        of alerts successfully processed in the run, not to ''now''. Alert fetch ordering
        switched from descending to ascending by created_at. Together these eliminate
        the data-loss window when a service produces more than Max Alerts Per Service
        Per Cycle (default 500) in one fetch interval: the next cycle resumes from
        the boundary timestamp and naturally catches up. Dedup via Cyble alert UUID
        absorbs the one-alert boundary re-fetch each cycle. Resolves missing-yesterday-vulnerability-alerts
        class of bugs.'
    version: 1.3
    item_name: Cyble Vision Alerts Connector
    item_type: Connector
    new: false
    regressive: false
    deprecated: false
    removed: false
