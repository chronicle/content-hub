name: Cyble Vision Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: Cyble Vision Alerts
    type: string
    description: The field name used to determine the device product. Standard SOAR
        runtime parameter.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: EventClassId
    default_value: cyble_alert
    type: string
    description: The field name used to determine the event class id (sub-type). Standard
        SOAR runtime parameter.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: '600'
    type: string
    description: The timeout limit (in seconds) for the python process running the
        current script. Standard SOAR runtime parameter. Default 600s accommodates
        polling of all 49 Cyble services with pagination.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: Cyble Vision API Bearer token. Obtain from your Cyble portal under
        Settings > API Keys.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Base URL
    default_value: https://bifrost.cyble.ai/engine/api/v1/y/tpi
    type: string
    description: Cyble TPI base URL.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: Verify SSL certificates. Disable only in isolated test environments.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Request Timeout In Seconds
    default_value: 30
    type: integer
    description: HTTP request timeout in seconds. Increase for slow networks.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Hours Back
    default_value: 24
    type: integer
    description: On the very first run (no cursor stored yet), fetch alerts from this
        many hours back. Subsequent runs use the persisted cursor.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts Per Service Per Cycle
    default_value: 500
    type: integer
    description: Maximum alerts to fetch per service per cycle. Prevents runaway runs
        when a service has a sudden burst.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Services Filter
    default_value: ''
    type: string
    description: Optional comma-separated allowlist of Cyble services to poll (e.g.
        'phishing,leaked_credentials,ransomware_updates'). Leave empty to poll all
        services returned by the Cyble API.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the 'Environment Field
        Name' field. Default is .* to catch all and return the value unchanged.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Polls Cyble Vision for new alerts across all 49 services on a schedule
    and creates SecOps cases. Cursors are persisted per-service so each cycle only
    fetches new/updated alerts.
integration: CybleVisionAlerts
documentation_link: https://docs.cyble.com/
rules: []
is_connector_rules_supported: false
creator: admin
