[project]
name = "CybleVisionAlerts"
version = "2.0"
description = "Bidirectional integration between Cyble Vision threat intelligence platform and Google SecOps SOAR. Ingests alerts from 49 Cyble services and synchronises status/severity changes back to Cyble."
requires-python = ">=3.11,<3.12"
dependencies = [
    "requests==2.33.1",
    "urllib3==2.6.3",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.2.7-py3-none-any.whl" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.2.7-py2.py3-none-any.whl" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl" }

[dependency-groups]
dev = [
    "environmentcommon",
    "integration-testing",
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
    "tipcommon",
]
