Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Imgbb service by attempting to upload a hardcoded sample
    image. This action verifies that the provided API key is valid and that the SecOps
    platform can successfully communicate with the Imgbb API.


    ### Flow Description

    1. Retrieves the Imgbb API key from the integration configuration.

    2. Constructs the Imgbb upload API endpoint URL.

    3. Sends an HTTP POST request to the Imgbb API containing a hardcoded base64 image
    payload.

    4. Evaluates the HTTP response to confirm successful connectivity and returns
    a success message.


    ### Additional Notes

    This action is primarily used as a ping or health-check mechanism to ensure the
    integration is configured correctly. It does not process case data or interact
    with entities.
  ai_short_description: >-
    Tests connectivity to the Imgbb service by sending an HTTP POST request with a
    sample image payload to verify the API key and network access.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a hardcoded test image to the Imgbb service to verify connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to the Imgbb API to upload a test image,
      which mutates external data (creates an image record on the external service).
      It does not fetch contextual data, update internal entities, create insights,
      modify alerts, or create case comments.
