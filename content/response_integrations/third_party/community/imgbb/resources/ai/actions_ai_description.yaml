Upload Image From File Path:
  ai_description: >-
    ### General Description

    Uploads an image from a specified local file path to the Imgbb service and retrieves
    the resulting hosted image URL.


    ### Flow Description

    1. Extracts the local file path provided in the action parameters.

    2. Reads the image file from the local directory and converts it into a base64
    encoded string.

    3. Sends an HTTP POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    containing the base64 image data.

    4. Parses the API response to extract the newly created image's URL.

    5. Attaches the image URL as a link and a JSON result to the action's output.


    ### Additional Notes

    Requires a valid Imgbb API key configured in the integration settings. The action
    will fail if the file path is invalid or the file cannot be read.
