  ai_description: >-
    ### General Description

    This action uploads an image to the Imgbb hosting service using a base64 encoded
    string. It is designed to facilitate the external hosting of image-based evidence
    (such as screenshots or captured visual data) and retrieve a publicly accessible
    URL for use in reports or further automation steps.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Additional Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Image in base64 | The base64 encoded string of the image you would like to upload
    to Imgbb. | string | True | Ensure the string is a valid base64 representation
    of an image file. |


    ### Additional Notes

    - The action hardcodes an expiration of 600 seconds (10 minutes) for the uploaded
    image via the API URL.

    - The action provides the resulting URL as both a clickable link in the SOAR interface
    and a structured JSON result.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the API Key and SSL verification
    settings from the Imgbb integration configuration.

    2. **Parameter Extraction**: It retrieves the base64 image string provided by
    the user.

    3. **External API Interaction**: A POST request is sent to the Imgbb API (`https://api.imgbb.com/1/upload`)
    containing the image data.

    4. **Response Processing**: The action parses the JSON response from Imgbb to
    extract the `url` of the uploaded image.

    5. **Result Output**: If successful, it adds the image URL as a link to the action
    results and populates the JSON result object. If it fails, it captures the error
    message from the API.
