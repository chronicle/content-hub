  ai_description: >-
    ### General Description

    Uploads an image from a specified local file path to the Imgbb image hosting service
    and retrieves the resulting public image URL.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Image File Path | String | Yes | The local file path of the image you would
    like to upload to Imgbb. This file will be read and converted to base64 before
    uploading. |


    ### Flow Description

    1. Extracts the `Image File Path` parameter provided by the user.

    2. Reads the image file from the local directory and converts its content into
    a base64 encoded string.

    3. Sends a POST request to the Imgbb API containing the base64 image data.

    4. Parses the API response to extract the newly created public URL for the uploaded
    image.

    5. Attaches the image URL as a link and outputs the details as a JSON result in
    the action.
