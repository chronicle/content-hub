  ai_description: >-
    ### General Description

    Uploads a base64-encoded image to the Imgbb image hosting service and retrieves
    the generated image URL. This action is useful for converting raw image data into
    a shareable link.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Image in base64 | String | Yes | The base64 representation of the image you
    want to upload to Imgbb. This data is sent in the body of the request. |


    ### Flow Description

    1. Extracts the base64 image string from the action parameters.

    2. Sends a POST request to the Imgbb API to upload the image data.

    3. Parses the API response to extract the newly created image URL.

    4. Attaches the image URL as a link and outputs the details as a JSON result in
    the action.


    ### Additional Notes

    This action does not operate on any SecOps entities.
