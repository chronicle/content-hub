    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action uploads a base64-encoded image to the Imgbb service. It is designed
    to take an image string, send it to the Imgbb API, and retrieve the resulting
    image URL for use within the SOAR platform.


    ### Flow Description

    1. The action extracts the `Image in base64` parameter provided by the user.

    2. It constructs a POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    with the base64 image data.

    3. The API response is parsed to retrieve the uploaded image URL.

    4. If the upload is successful, the action adds the image URL as a link to the
    action result and returns a success message.

    5. If the upload fails, the action returns an error message and sets the result
    to failure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image in base64 | string | Yes | The base64-encoded string of the image to be
    uploaded to Imgbb. |


    ### Additional Notes

    - This action requires an API key to be configured in the Imgbb integration settings.

    - The action does not interact with any specific entities; it operates on the
    provided base64 string.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: Uploads an image to the Imgbb service.
