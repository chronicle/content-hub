Upload Image From Base64:
  ai_description: >-
    ### General Description

    This action uploads a base64-encoded image to the Imgbb hosting service. It is
    primarily used to convert local image data into a publicly or semi-publicly accessible
    URL, which can then be used in subsequent workflow steps such as sending emails,
    updating tickets, or adding comments with visual evidence.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image in base64 | String | Yes | The base64-encoded string representing the
    image file you wish to upload to Imgbb. |


    ### Additional Notes

    * The action automatically sets an expiration for the uploaded image (defaulted
    in the code to 600 seconds/10 minutes via the API URL).

    * The resulting URL is provided both as a clickable link in the action results
    and within the JSON output.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the API Key and SSL verification
    settings from the Imgbb integration configuration.

    2. **Parameter Extraction:** It extracts the base64 image string provided by the
    user.

    3. **External API Call:** It performs a POST request to the Imgbb API (`/1/upload`)
    containing the image data.

    4. **Response Processing:** The action parses the JSON response from Imgbb to
    retrieve the unique URL of the uploaded image.

    5. **Result Reporting:** It adds the image URL as a link to the action results,
    populates the JSON result object, and concludes the action with a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads image data to the Imgbb service, creating a new hosted image resource
      on their servers.
    fetches_data: false
    internal_data_mutation_explanation: null
