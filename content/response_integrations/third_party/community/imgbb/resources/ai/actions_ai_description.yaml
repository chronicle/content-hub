Upload Image From File Path:
  ai_description: >-
    ### General Description

    The **Upload Image From File Path** action allows users to upload a local image
    file from the Google SecOps environment to the Imgbb hosting service. This action
    is primarily used to convert local image files (such as screenshots or forensic
    captures) into publicly or internally accessible URLs for easier sharing and documentation
    within a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image File Path | String | Yes | The full local directory path to the image
    file that needs to be uploaded. |


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the API Key and SSL verification
    settings from the Imgbb integration configuration.

    2. **File Reading:** It opens the file specified in the `Image File Path` parameter
    in binary mode.

    3. **Encoding:** The binary content of the image is encoded into a Base64 string
    to meet the requirements of the Imgbb API.

    4. **API Request:** The action sends a POST request to the Imgbb upload endpoint
    (`https://api.imgbb.com/1/upload`) with the Base64 image data. Note: The request
    includes a hardcoded expiration of 600 seconds (10 minutes).

    5. **Response Handling:** It parses the JSON response from Imgbb to extract the
    generated image URL.

    6. **Result Reporting:** The action adds the image URL to the JSON results and
    creates a clickable link in the SOAR interface for the analyst.


    ### Additional Notes

    - This action does not interact with or filter SecOps entities (IPs, Hostnames,
    etc.).

    - The uploaded image is temporary and will expire after 10 minutes based on the
    API call parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
