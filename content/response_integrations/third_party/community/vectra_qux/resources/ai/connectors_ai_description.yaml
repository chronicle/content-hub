Vectra QUX - Entities Connector:
  ai_description: >-
    ### General Description

    The Vectra QUX - Entities Connector integrates the Vectra QUX platform with Google
    SecOps. It periodically fetches entities (such as Hosts or Accounts) and their
    associated detections from the Vectra QUX API. These entities are mapped into
    alerts, and their corresponding detections are ingested as alert events, enabling
    security teams to monitor and respond to threats identified by Vectra within the
    SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the API, used as the entry point for
    all API requests. |

    | API Token | String | Yes | A unique identifier used to authenticate and authorize
    access to the API. |

    | Certainty Score GTE | Integer | No | Filters for certainty scores greater than
    or equal to the provided value. |

    | Detection Category | String | No | The category of detection to filter results
    (e.g., Command & Control, Botnet Activity). |

    | Detection Type | String | No | The type of detection to filter results. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Entity Type | String | Yes | Type of the Entity (Account, Host). |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Limit | Integer | No | Number of entities to fetch. |

    | Max Hours Backwards | Integer | No | Number of hours before the first connector
    iteration to retrieve alerts from. |

    | Partial Tag | String | No | A partial tag to match and filter results. |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | Query | String | No | A query string used to specify conditions for filtering
    results. |

    | Specific Tag | String | No | A specific tag to filter results. |

    | Threat Score GTE | Integer | No | Filters for threat scores greater than or
    equal to the provided value. |

    | Verify SSL | Boolean | No | Verify SSL certificate. |


    ### Flow Description

    1. The connector initializes by reading configuration parameters and validating
    input values.

    2. It retrieves the last successful execution time to determine the time range
    for fetching new data.

    3. It queries the Vectra QUX API for entities (Hosts or Accounts) based on the
    provided filters (e.g., threat score, certainty score, tags).

    4. For each retrieved entity, the connector fetches associated detections.

    5. It maps the entity data to an alert structure and the detections to alert events.

    6. The connector checks for duplicates and processes the alerts, creating cases
    in Google SecOps.

    7. Finally, it saves the current timestamp to track progress for the next iteration.
