Vectra QUX - Entities Connector:
  ai_description: >-
    ### General Description

    The Vectra QUX - Entities Connector integrates Google SecOps (SOAR) with the Vectra
    QUX platform. It is designed to periodically retrieve security entities, such
    as Hosts or Accounts, and their associated detections. By mapping these entities
    to alerts and their detections to events, the connector enables security teams
    to monitor, investigate, and respond to threats identified by Vectra directly
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Vectra QUX API. |

    | API Token | Password | Yes | Authentication token for the Vectra QUX API. |

    | Certainty Score GTE | Integer | No | Filters entities with a certainty score
    greater than or equal to this value. |

    | Detection Category | String | No | Filters results by detection category (e.g.,
    Command & Control, Botnet Activity). |

    | Detection Type | String | No | Filters results by specific detection type. |

    | DeviceProductField | String | Yes | Field name used to determine the device
    product. |

    | Entity Type | String | Yes | The type of entity to fetch (e.g., Host, Account).
    |

    | EventClassId | String | Yes | Field name used to determine the event name. |

    | Limit | Integer | No | Maximum number of entities to fetch per iteration. |

    | Max Hours Backwards | Integer | No | Number of hours to look back for initial
    data retrieval. |

    | Partial Tag | String | No | Partial tag to filter results. |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the script
    execution. |

    | Query | String | No | Custom query string for advanced filtering. |

    | Specific Tag | String | No | Specific tag to filter results. |

    | Threat Score GTE | Integer | No | Filters entities with a threat score greater
    than or equal to this value. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates for API requests.
    |


    ### Flow Description

    1. **Initialization**: The connector initializes the connection to the Vectra
    QUX API using the provided API Root and Token.

    2. **Validation**: Input parameters are validated to ensure correct entity types
    and score formats.

    3. **Data Retrieval**: The connector queries the Vectra QUX API for entities (Hosts
    or Accounts) based on the configured filters (e.g., threat score, certainty, tags,
    and time range).

    4. **Deduplication**: It checks against previously processed alert IDs to avoid
    creating duplicate cases.

    5. **Processing**: For each retrieved entity, the connector fetches associated
    detections.

    6. **Mapping**: Each entity is mapped to a SOAR alert, and its detections are
    mapped as alert events.

    7. **Ingestion**: The processed alerts are ingested into Google SecOps as cases
    for further investigation.

    8. **Cleanup**: Timestamps and processed IDs are saved to maintain state for the
    next iteration.
