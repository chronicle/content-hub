Vectra QUX - Entities Connector:
  ai_description: "### General Description\nThe Vectra QUX - Entities Connector integrates\
    \ with the Vectra QUX platform to retrieve security entities (Hosts or Accounts)\
    \ and their associated detections. It transforms each Vectra entity into a Google\
    \ SecOps alert, while the specific detections linked to that entity are ingested\
    \ as individual events within the alert. This approach provides a consolidated\
    \ view of the threat landscape for specific network assets or user accounts.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL of the\
    \ Vectra QUX API (e.g., https://<address>:<port>). |\n| API Token | Password |\
    \ Yes | The unique identifier used to authenticate and authorize access to the\
    \ Vectra API. |\n| Entity Type | String | Yes | The type of entity to retrieve.\
    \ Supported values: 'Host' or 'Account'. Default is 'Host'. |\n| DeviceProductField\
    \ | String | Yes | The field name used to determine the device product in the\
    \ alert metadata. Default: 'Vectra QUX'. |\n| EventClassId | String | Yes | The\
    \ field name used to determine the event name/sub-type. Default: 'detection_type'.\
    \ |\n| PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for\
    \ the python process running the script. |\n| Threat Score GTE | Integer | No\
    \ | Filters for entities with a threat score greater than or equal to this value.\
    \ |\n| Certainty Score GTE | Integer | No | Filters for entities with a certainty\
    \ score greater than or equal to this value. |\n| Detection Category | String\
    \ | No | Filters results by category (e.g., Command & Control, Botnet Activity,\
    \ Reconnaissance, Lateral Movement, Exfiltration, Info). |\n| Detection Type |\
    \ String | No | Filters results by a specific Vectra detection type. |\n| Limit\
    \ | Integer | No | Maximum number of entities to fetch in a single execution cycle.\
    \ |\n| Max Hours Backwards | Integer | No | The number of hours to look back for\
    \ entities during the first connector iteration. |\n| Query | String | No | A\
    \ custom query string used to specify advanced conditions for filtering results.\
    \ |\n| Specific Tag | String | No | Filters results by a specific tag assigned\
    \ in Vectra. |\n| Partial Tag | String | No | Filters results by a partial tag\
    \ match. |\n| Verify SSL | Boolean | No | If enabled, the connector will verify\
    \ the SSL certificate of the Vectra API endpoint. |\n\n### Flow Description\n\
    1. **Authentication & Initialization**: The connector establishes a session with\
    \ the Vectra QUX API using the provided API Token and Root URL.\n2. **Timeframe\
    \ Determination**: It calculates the retrieval window based on the last successful\
    \ execution timestamp or the `Max Hours Backwards` parameter for initial runs.\n\
    3. **Entity Discovery**: The connector queries the Vectra `/api/v2.5/search/{entity_type}s`\
    \ endpoint, applying filters for threat/certainty scores, categories, tags, and\
    \ custom queries. It specifically targets entities in an 'active' state.\n4. **Detection\
    \ Retrieval**: For every entity found, the connector performs a secondary lookup\
    \ to fetch all associated 'active' detections for that specific Host or Account\
    \ ID.\n5. **Alert Mapping**: \n    *   The **Entity** metadata (ID, name, severity,\
    \ threat score) is mapped to the primary Alert object.\n    *   The **Detections**\
    \ are mapped as individual Events within that alert.\n    *   The `source_grouping_identifier`\
    \ is constructed as `{entity_type}#{entity_id}` to ensure that updates to the\
    \ same entity are grouped into the same case in Google SecOps.\n6. **Ingestion\
    \ & State Management**: The connector ingests the alerts into the SOAR platform\
    \ and saves the latest entity IDs and timestamps to ensure only new or updated\
    \ data is processed in the next cycle."
