Vectra QUX - Clear Empty Cases Job:
  ai_description: "### General Description\nThe **Vectra QUX - Clear Empty Cases Job**\
    \ is a maintenance utility designed to reduce noise and redundancy within Google\
    \ SecOps. It identifies and closes cases or individual alerts that contain duplicate\
    \ security events already being tracked in other open cases. By analyzing the\
    \ unique detection IDs provided by Vectra QUX, the job ensures that analysts are\
    \ not investigating the same underlying threat across multiple tickets, effectively\
    \ streamlining the incident response workflow.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Max Hours Backwards | String | No | The maximum number of hours to look back\
    \ for open cases. Setting this to '0' will cause the job to process all open cases\
    \ regardless of their creation time. Default is '24'. |\n| Environments | String\
    \ | Yes | A comma-separated list of environments to include in the cleanup process.\
    \ Only cases within these environments will be processed. Default is 'Default\
    \ Environment'. |\n| Products | String | Yes | A comma-separated list of product\
    \ names to filter alerts. The job only evaluates alerts where the 'DeviceProduct'\
    \ matches these values. Default is 'Vectra QUX'. |\n\n### Flow Description\n1.\
    \  **Initialization**: The job retrieves the configuration parameters and calculates\
    \ the time range for processing based on the last successful execution and the\
    \ `Max Hours Backwards` setting.\n2.  **Case Fetching**: It queries the SOAR platform\
    \ for all cases currently in an \"OPEN\" status that fall within the specified\
    \ time window.\n3.  **Filtering and Extraction**: For each retrieved case, the\
    \ job verifies if it belongs to the allowed `Environments` and `Products`. It\
    \ then extracts the unique detection (event) IDs from the alerts associated with\
    \ those cases.\n4.  **Duplicate Analysis**: The job builds a map of event IDs\
    \ to identify overlaps between different cases and alerts. It determines if an\
    \ alert's events are entirely contained within other active cases.\n5.  **Case\
    \ and Alert Closure**: \n    *   If an entire case consists of alerts that are\
    \ duplicates of events in other cases, the job closes the case with the root cause:\
    \ \"Similar case already under investigation\".\n    *   If only specific alerts\
    \ within a case are redundant, those individual alerts are closed with the root\
    \ cause: \"Similar alert already under investigation\".\n6.  **Timestamp Update**:\
    \ Finally, the job saves the current execution timestamp to the internal database\
    \ to serve as the starting point for the next scheduled run."
