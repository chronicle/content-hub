Vectra QUX - Clear Empty Cases Job:
  ai_description: >-
    ### General Description

    This job maintains case hygiene in Google SecOps (Chronicle) SOAR by identifying
    and closing empty or duplicate cases and alerts originating from the Vectra QUX
    integration. It reduces noise by automatically closing cases that contain redundant
    or empty alert data based on specified environment and product filters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | Integer | No | Maximum hours to fetch open cases with
    alerts starting after the given time (defaults to 24 hours, '0' for all open cases).
    |

    | Environments | String | Yes | Comma-separated list of environments to filter
    cases (Default: 'Default Environment'). |

    | Products | String | Yes | Comma-separated list of product names to filter cases
    (Default: 'Vectra QUX'). |


    ### Flow Description

    1. Initializes job parameters and retrieves the last successful run timestamp
    from the job context.

    2. Fetches all open cases from SOAR based on the provided time range and filters.

    3. Iterates through each open case to retrieve associated entities and detections.

    4. Filters detections based on the specified Environments and Products.

    5. Analyzes the collected cases and alerts to identify duplicates or empty cases.

    6. Closes identified duplicate or empty cases/alerts in SOAR.

    7. Updates the job's last success timestamp in the database.
