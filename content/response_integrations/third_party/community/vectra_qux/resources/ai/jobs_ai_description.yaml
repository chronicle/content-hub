Vectra QUX - Clear Empty Cases Job:
  ai_description: >-
    ### General Description

    This job automates the maintenance of the Google SecOps (Chronicle) SOAR case
    queue by identifying and closing empty or duplicate cases originating from the
    Vectra QUX integration. It helps reduce investigation noise by analyzing open
    cases, filtering them based on specific environments and product names, and automatically
    closing cases that contain redundant or identical alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | String | No | The maximum number of hours to look back
    for open cases. Defaults to 24 hours. Set to '0' to process all open cases. |

    | Environments | String | Yes | A comma-separated list of environments to filter
    cases by. Defaults to 'Default Environment'. |

    | Products | String | Yes | A comma-separated list of product field names to filter
    alerts by. Defaults to 'Vectra QUX'. |


    ### Flow Description

    1. Extracts and validates the job configuration parameters (Max Hours Backwards,
    Environments, and Products).

    2. Calculates the start time for the job based on the last successful execution
    timestamp to ensure incremental processing.

    3. Fetches all open cases from the SOAR platform that match the specified time
    range.

    4. Iterates through each open case to retrieve associated entities and their corresponding
    detections.

    5. Filters the retrieved detections to include only those matching the provided
    environment and product name criteria.

    6. Analyzes the filtered cases to identify identical alerts or cases that are
    effectively empty.

    7. Closes redundant cases or removes duplicate alerts from cases as identified
    by the analysis logic.

    8. Updates the job's last success timestamp in the database to track progress
    for the next execution.
