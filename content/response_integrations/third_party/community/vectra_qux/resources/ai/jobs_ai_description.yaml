Vectra QUX - Clear Empty Cases Job:
  ai_description: "### General Description\nThis job performs automated maintenance\
    \ on Google SecOps cases generated by the Vectra QUX integration. Its primary\
    \ purpose is to reduce analyst fatigue by identifying and closing redundant or\
    \ \"empty\" cases and alerts. It analyzes open cases within specified environments\
    \ and products, comparing the underlying detection IDs (event IDs) across alerts.\
    \ If an alert's detections are entirely covered by other active alerts or cases,\
    \ the job programmatically closes the redundant alert or the entire case, ensuring\
    \ that investigators focus only on unique security incidents.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Max Hours Backwards | String | No | The maximum number of hours\
    \ to look back for open cases. Setting this to '0' will cause the job to process\
    \ all open cases regardless of their creation time. Default is 24. |\n| Environments\
    \ | String | Yes | A comma-separated list of environments to include in the cleanup\
    \ process. Default is 'Default Environment'. |\n| Products | String | Yes | A\
    \ comma-separated list of product names (DeviceProduct field) used to filter the\
    \ alerts within the cases. Default is 'Vectra QUX'. |\n\n### Flow Description\n\
    1. **Initialization**: Retrieves the job configuration, including the lookback\
    \ window, target environments, and product names.\n2. **Time Range Calculation**:\
    \ Determines the starting timestamp for the search by comparing the `Max Hours\
    \ Backwards` parameter against the last successful execution time stored in the\
    \ job's context.\n3. **Case Retrieval**: Queries the SOAR platform to fetch IDs\
    \ of all cases currently in \"OPEN\" status that fall within the calculated time\
    \ range.\n4. **Data Extraction**: For each retrieved case, the job fetches the\
    \ full case details and filters alerts based on the provided `Environments` and\
    \ `Products` parameters.\n5. **Detection Mapping**: Extracts unique detection\
    \ IDs (event IDs) from the security events associated with each valid alert and\
    \ maps them to their respective cases.\n6. **Redundancy Analysis**: Compares alerts\
    \ across all processed cases. An alert is flagged as redundant if all of its associated\
    \ detection IDs are already present in other active alerts or cases.\n7. **Automated\
    \ Closure**: \n    * Closes individual alerts identified as duplicates with the\
    \ reason: \"Similar alert already under investigation\".\n    * Closes entire\
    \ cases if all alerts within them are found to be redundant with the reason: \"\
    Similar case already under investigation\".\n8. **State Persistence**: Saves the\
    \ current timestamp as the last successful run time to the internal database for\
    \ use in the next execution cycle."
