Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) in Vectra QUX.


    ### Flow Description

    1. Extracts the provided `Note`, `Entity ID`, and `Entity Type` parameters.

    2. Validates the `Entity ID` to ensure it is a valid integer.

    3. Makes a POST request to the Vectra QUX API to append the note to the specified
    entity.

    4. Returns the created note details in a JSON format and as a data table.


    ### Additional Notes

    None.
