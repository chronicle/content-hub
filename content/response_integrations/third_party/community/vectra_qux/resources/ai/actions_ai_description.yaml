Resolve Assignment:
  ai_description: >-
    Resolves a specific assignment in Vectra QUX using a provided assignment ID and
    outcome ID. This action allows analysts to close out tasks by specifying whether
    the activity was benign, malicious, or a false positive. It also supports adding
    notes, applying triage rules, and associating specific detection IDs with the
    resolution. The action performs a state change in the Vectra QUX platform and
    returns the updated assignment details.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Assignment ID | String | Yes | The unique identifier of the assignment to be
    resolved. Must be a valid integer. |

    | Outcome ID | String | Yes | The ID representing the resolution outcome. Common
    values: 1 (Benign True Positive), 2 (Malicious True Positive), 3 (False Positive).
    Custom outcomes are also supported. |

    | Note Title | String | No | An optional note or comment to be attached to the
    assignment resolution. |

    | Triage As | String | No | An optional triage rule to apply when resolving the
    assignment. |

    | Detection IDs | String | No | A comma-separated list of integer detection IDs
    to associate with this resolution. **Note:** This parameter is mandatory if 'Triage
    As' is provided. |


    ### Additional Notes

    - The action validates that 'Assignment ID' and 'Outcome ID' are valid integers.

    - If 'Triage As' is configured, at least one 'Detection ID' must be provided,
    or the action will fail.

    - The 'Triage As' parameter must be at least 4 characters long and cannot contain
    special characters like `!@#$%^&*()`.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Assignment ID, Outcome ID,
    and optional parameters (Note, Triage, Detections) from the input.

    2. **Validation:** It validates that the IDs are integers and checks the conditional
    requirement between 'Triage As' and 'Detection IDs'.

    3. **API Interaction:** It sends a PUT request to the Vectra QUX API endpoint
    `/assignments/{assignment_id}/resolve` with the resolution payload.

    4. **Data Processing:** The response from Vectra is parsed into an Assignment
    object.

    5. **Output Generation:** The action provides a JSON result of the API response
    and creates a data table named 'Resolved Assignment' containing the key details
    of the resolved task.
