    | Order By | ddl | No | The field used to sort the results (e.g., threat score,
    certainty score, timestamp, or ID). |

    | Fields | multi_choice | No | A list of specific account attributes to include
    in the response (e.g., name, state, tags, privilege_level). |

    | Name | string | No | Filter accounts by a specific name. |

