List Assignments:
  ai_description: "The 'List Assignments' action retrieves a list of assignments from\
    \ the Vectra QUX platform based on user-defined filtering criteria. It allows\
    \ analysts to query assignments associated with specific accounts, hosts, assignees,\
    \ or resolution outcomes. The action supports filtering by resolution status (resolved\
    \ or unresolved) and creation time. The results are presented both as a structured\
    \ data table for quick review and a raw JSON object for downstream automation\
    \ logic.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Accounts IDs | String | No | A comma-separated\
    \ list of account IDs to filter the assignments. |\n| Hosts IDs | String | No\
    \ | A comma-separated list of host IDs to filter the assignments. |\n| Assignees\
    \ IDs | String | No | A comma-separated list of assignee (user) IDs to filter\
    \ the assignments. |\n| Resolution IDs | String | No | A comma-separated list\
    \ of outcome/resolution IDs to filter the assignments. |\n| Resolved | DDL | No\
    \ | Filters assignments by their resolution status. Options: 'None' (no filter),\
    \ 'True' (only resolved), 'False' (only unresolved). |\n| Created After | String\
    \ | No | Filters assignments created after a specific timestamp. Supports relative\
    \ formats (e.g., '2 days') or absolute ISO 8601 timestamps. |\n| Limit | String\
    \ | No | Specifies the maximum number of assignment records to retrieve. Defaults\
    \ to the system limit if not provided. |\n\n### Additional Notes\n- This action\
    \ does not require entities to be present in the current scope; it operates entirely\
    \ based on the provided input parameters.\n- All ID-based parameters (Accounts,\
    \ Hosts, Assignees, Resolutions) are validated to ensure they are integers.\n\n\
    ### Flow Description\n1. **Parameter Extraction:** The action retrieves the API\
    \ configuration (Root, Token, SSL) and the user-provided filter parameters.\n\
    2. **Validation:** It validates the 'Limit' parameter and converts comma-separated\
    \ ID strings into lists of integers.\n3. **Query Construction:** A query mapping\
    \ is built using the provided filters (e.g., `resolved`, `created_after`, `hosts`,\
    \ `accounts`).\n4. **API Interaction:** The action calls the Vectra QUX API's\
    \ assignment endpoint using a paginated GET request to fetch the records up to\
    \ the specified limit.\n5. **Data Processing:** The retrieved assignment objects\
    \ are parsed and formatted.\n6. **Output Generation:** \n    - A data table named\
    \ 'Assignment Details' is created containing key fields like Assignment ID, Assigned\
    \ User, and Entity Type.\n    - The full raw response is attached as a JSON result\
    \ for further processing."
