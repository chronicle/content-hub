Add Note:
  ai_description: >-
    Adds a note to a specific entity (Account, Host, or Detection) within the Vectra
    platform. This action allows analysts to append contextual information or findings
    directly to Vectra entities from within Google SecOps.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the API configuration (Root,
    Token, SSL) and action parameters (Note content, Entity ID, and Entity Type).

    2. **Validation:** It validates that the provided `Entity ID` is a valid integer.

    3. **API Interaction:** It sends a POST request to the Vectra API endpoint corresponding
    to the selected `Entity Type` (Accounts, Hosts, or Detections) and the specific
    `Entity ID` to create the note.

    4. **Result Processing:** Upon success, it retrieves the created note's metadata
    (ID, creation date, creator) and presents it in a data table and JSON format within
    the SOAR case.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | String | Yes | The text content of the note to be added to the Vectra
    entity. |

    | Entity ID | String | Yes | The unique numerical identifier of the entity in
    Vectra. |

    | Entity Type | DDL | Yes | The category of the entity in Vectra. Supported values:
    `Account`, `Host`, `Detection`. |


    ### Additional Notes:

    * This action performs an external state change by creating a new record (a note)
    in the Vectra system.

    * It does not process Google SecOps entities automatically; it requires a specific
    ID to be passed as a parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
