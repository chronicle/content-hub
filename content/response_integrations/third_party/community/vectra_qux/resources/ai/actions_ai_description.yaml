  ai_description: >-
    Adds tags to specified entities (Account, Host, or Detection) within the VectraQUX
    platform. This action retrieves the current tags for the provided entity IDs,
    merges them with the new tags, and updates the entity metadata in the external
    system.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, API Token,
    SSL verification) and action parameters (Tags, Entity IDs, Entity Type).

    2. **Parsing**: Processes the comma-separated strings for Tags and Entity IDs
    into lists, removing duplicates.

    3. **Iteration**: Loops through each provided Entity ID.

    4. **Fetch**: Retrieves the existing tags for the current entity from the VectraQUX
    platform.

    5. **Update**: Merges the existing tags with the new tags and performs a PATCH
    request to update the entity's tags in VectraQUX.

    6. **Reporting**: Logs the success or failure of each update and generates a result
    table and JSON output for the SOAR action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tags to be added to the entities.
    |

    | Entity IDs | String | Yes | A comma-separated list of Entity IDs to which the
    tags will be added. |

    | Entity Type | DDL | Yes | The type of entity (Account, Host, or Detection) to
    update. |


    ### Additional Notes

    This action performs a mutation on the external VectraQUX platform. It does not
    modify internal SOAR case data, but it does output results to the action's result
    object.
