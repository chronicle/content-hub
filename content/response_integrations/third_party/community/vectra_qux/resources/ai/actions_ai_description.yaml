Describe Assignment:
  ai_description: >-
    ### General Description

    The **Describe Assignment** action retrieves comprehensive details for a specific
    assignment within the Vectra QUX platform using its unique ID. This action allows
    analysts to programmatically fetch metadata about how a detection or entity has
    been assigned, including the assigned user, the resolution outcome, and any associated
    notes. It is an informational action used to track the lifecycle and ownership
    of security tasks in Vectra QUX.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Assignment ID | The unique identifier of the assignment to retrieve. | String
    | Yes | Must be a valid numeric string representing a non-negative integer. |


    ### Additional Notes

    - This action does not process SOAR entities (e.g., IP, Hostname) from the case
    scope; it relies entirely on the provided `Assignment ID` parameter.

    - If the assignment ID does not exist, the action will return a 'not found' error.


    ### Flow Description

    1. **Input Validation**: The action extracts the `Assignment ID` from the input
    parameters and validates that it is a valid integer.

    2. **API Request**: It initializes the `VectraQUXManager` and sends a GET request
    to the assignments endpoint (`/api/v2.5/assignments/{assignment_id}`).

    3. **Data Parsing**: The manager parses the JSON response into an internal `Assignment`
    data model, extracting fields such as `assigned_to`, `resolved_by`, and `outcome`.

    4. **Result Output**: The action attaches the full JSON response to the script
    results and generates a formatted data table (CSV) containing a summary of the
    assignment details for display in the SOAR interface.
