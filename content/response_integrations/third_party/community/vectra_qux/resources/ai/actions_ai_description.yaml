    it currently has an active assignment.

    4.  **Assignment Identification:** If an assignment is found, the action extracts
    the specific 'Assignment ID'.

    5.  **Deletion:** Executes a DELETE request to the Vectra assignments endpoint
    using the identified 'Assignment ID'.

    6.  **Outcome Reporting:** Returns a success message if the assignment is deleted,
    or a failure message if the entity had no assignment or the ID was not found.
