Search Hosts:
  ai_description: >-
    ### General Description

    Searches for hosts in Vectra based on various query parameters such as tags, state,
    threat score, certainty score, and privilege level.


    ### Flow Description

    1. Extracts action parameters including Limit, Tags, Last Source, Order, Fields,
    Name, State, Threat GTE, Certainty GTE, Last Detection Timestamp GTE/LTE, Is Targeting
    Key Asset, Privilege Level GTE, Privilege Category, Active Traffic, Order By,
    and Note Modified Timestamp GTE.

    2. Validates and formats the input parameters.

    3. Makes a GET request to the Vectra API (`/api/v2.5/hosts`) to search for hosts
    matching the criteria.

    4. Processes the returned host records and formats them.

    5. Returns the results as a JSON object and a data table.


    ### Additional Notes

