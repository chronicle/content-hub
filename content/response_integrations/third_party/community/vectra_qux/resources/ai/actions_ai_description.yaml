  ai_description: >-
    ### General Description

    Assigns a specific entity (either a Host or an Account) to a user within the Vectra
    platform. This action is primarily used for workflow management, allowing analysts
    to programmatically set ownership or responsibility for specific detected entities
    to a particular user ID in Vectra.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | string | Yes | The unique numeric identifier of the entity in Vectra
    that you want to assign. |

    | Entity Type | ddl | Yes | Specifies the type of the entity being assigned. Options
    are 'Account' or 'Host'. |

    | User ID | string | Yes | The unique numeric identifier of the Vectra user to
    whom the entity will be assigned. |


    ### Additional Notes

    - Both the **Entity ID** and **User ID** must be valid numeric strings, as the
    action performs an integer validation check before proceeding.

    - This action creates a new assignment record in Vectra via a POST request.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration (Root,
    Token, SSL) and the action parameters (User ID, Entity ID, Entity Type).

    2. **Validation**: It validates that the provided `Entity ID` and `User ID` are
    valid integers.

    3. **API Interaction**: It initializes the VectraQUX manager and calls the `assign_entity`
    method, which sends a POST request to the Vectra `/assignments` endpoint with
    the user and entity details.

    4. **Result Processing**: Upon success, it retrieves the assignment details (including
    the new Assignment ID) and outputs them into a data table and a raw JSON result
    for the SOAR platform.
