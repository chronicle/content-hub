  ai_description: "### General Description\nThe **List Assignments** action retrieves\
    \ a list of assignments from the VectraQUX platform based on specified filter\
    \ criteria. This action is useful for auditing or reviewing the status of assignments\
    \ within the VectraQUX environment, allowing analysts to filter by accounts, hosts,\
    \ assignees, resolution status, and creation time.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Accounts IDs | string | No | Comma-separated account IDs to filter out accounts.\
    \ |\n| Hosts IDs | string | No | Comma-separated host IDs to filter out accounts.\
    \ |\n| Assignees IDs | string | No | Comma-separated assignment IDs to filter\
    \ out accounts. |\n| Resolution IDs | string | No | Comma-separated outcome IDs\
    \ to filter out accounts. |\n| Resolved | ddl | No | Filter by resolved status\
    \ (True/False). |\n| Created After | string | No | Filter by created after the\
    \ timestamp. Supported formats: 2 minutes, 2 hours, 2 days, 2 weeks, 2 months,\
    \ 2 years, yyyy-mm-dd, yyyy-mm-ddTHH: MM:SSZ. |\n| Limit | string | No | Specify\
    \ the limit for fetching the records. |\n\n### Additional Notes\nThere are no\
    \ additional dependencies or requirements for this action. All parameters are\
    \ optional.\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the `SiemplifyAction` and extracts configuration parameters (API Root, API Token,\
    \ Verify SSL) and action parameters.\n2. **Validation**: It validates the provided\
    \ parameters, such as the `Limit` and various ID fields, ensuring they are in\
    \ the correct format.\n3. **Manager Setup**: It initializes the `VectraQUXManager`\
    \ with the provided credentials to establish a connection to the VectraQUX API.\n\
    4. **Data Retrieval**: It queries the VectraQUX API for assignments using the\
    \ provided filters (Accounts, Hosts, Assignees, Resolution, Resolved status, Created\
    \ After).\n5. **Result Processing**: \n    - If assignments are found, it constructs\
    \ a data table titled \"Assignment Details\" and adds it to the action results.\n\
    \    - It adds the raw assignment data as a JSON result.\n6. **Completion**: The\
    \ action finishes by logging the status and returning the output message."
