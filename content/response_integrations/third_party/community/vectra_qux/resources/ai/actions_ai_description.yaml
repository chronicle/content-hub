Remove Group:
  ai_description: >-
    Removes specific members from a Vectra QUX group based on a provided Group ID.
    This action interacts with the Vectra QUX API to modify group membership by removing
    a comma-separated list of members (which can be IPs, hostnames, account UIDs,
    or domains depending on the group's type). It provides a detailed HTML summary
    of the group's state after the removal operation and returns the raw JSON response.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | Yes | The unique integer identifier of the Vectra group
    from which members will be removed. |

    | Members | String | Yes | A comma-separated list of member identifiers to be
    removed from the group. |


    ### Flow Description

    1. **Validation**: The action validates that the provided `Group ID` is a valid
    non-zero integer.

    2. **Member Processing**: The `Members` string is parsed into a unique list of
    identifiers.

    3. **Pre-check**: The action fetches the current membership list of the group
    to verify existence and current state.

    4. **API Interaction**: A PATCH request is sent to the Vectra QUX API with the
    `membership_action` set to `remove` for the specified members.

    5. **Result Analysis**: The action compares the requested removal list against
    the updated group membership to determine which members were successfully removed
    and which were not found or could not be removed.

    6. **Output Generation**: An HTML table is rendered showing the updated group
    properties and membership, and the full JSON response is attached to the action
    results.
