Assign Group:
  ai_description: >-
    ### General Description

    Adds members to a specific group ID in VectraQUX.


    ### Flow Description

    1. Extracts the `Group ID` and `Members` parameters from the action configuration.

    2. Validates the provided `Group ID` to ensure it is a valid integer.

    3. Makes a PATCH request to the VectraQUX API to append the specified members
    to the group.

    4. Compares the successfully assigned members with the requested members to determine
    if any failed to be added.

    5. Renders the updated group details as an HTML table and attaches it to the action
    results.

    6. Returns the updated group object as a JSON result.


    ### Additional Notes

    The action appends members to the group and does not overwrite existing members.
    The members can be of various types (e.g., host, IP, account, domain) depending
    on the group's configuration.
