  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) within the VectraQUX
    platform. This action allows analysts to append contextual information or updates
    directly to an entity record in the external system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | string | Yes | The text content of the note to be added. |

    | Entity ID | string | Yes | The unique identifier of the entity in VectraQUX.
    |

    | Entity Type | ddl | Yes | The category of the entity. Options: Account, Host,
    Detection. |


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Token, Verify SSL)
    and action parameters (Note, Entity ID, Entity Type).

    2. The VectraQUX manager is initialized with the provided credentials.

    3. The Entity ID is validated to ensure it is an integer.

    4. A POST request is sent to the VectraQUX API endpoint `/{entity_type}s/{entity_id}/notes`
    to create the note.

    5. The response is processed and added to the action results as a data table and
    JSON object.
