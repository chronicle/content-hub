    integers.

    3. **Execution**: It initializes the `VectraQUXManager` and sends a POST request
    to the Vectra API to create the assignment between the specified entity and the
    user.

    4. **Result Handling**: Upon success, it adds the assignment details to the action
    results as a data table and a JSON object containing the raw assignment data.


    ### Additional Notes

    - Both `Entity ID` and `User ID` must be provided as valid integer strings for
    the action to succeed.

