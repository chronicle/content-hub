Search Hosts:
  ai_description: >-
    Searches for and lists hosts in Vectra QUX based on a wide range of query parameters.
    This action allows analysts to filter hosts by name, state, threat and certainty
    scores, tags, privilege levels, and activity timestamps. It retrieves detailed
    host metadata, cleans up API versioning from URLs in the response, and presents
    the results in both a raw JSON format and a structured data table within the SOAR
    case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Limit | string | No | The maximum number of host records to fetch. Must be greater
    than 0. |

    | Tags | string | No | Filter hosts based on specific tags. |

    | Last Source | string | No | Filter hosts based on their last reported source.
    |

    | Order | ddl | No | Specifies the sort order: 'Ascending' or 'Descending'. |

    | Fields | multi_choice_parameter | No | A list of specific fields to include
    in the response (e.g., id, name, ip, threat). |

    | Name | string | No | Filter hosts by their name. |

    | State | ddl | No | Filter hosts by their current state: 'Active' or 'Inactive'.
    |

    | Threat GTE | string | No | Filter hosts with a threat score greater than or
    equal to the provided value. |

    | Certainty GTE | string | No | Filter hosts with a certainty score greater than
    or equal to the provided value. |

    | Last Detection Timestamp GTE | string | No | Filter hosts with a last detection
    timestamp greater than or equal to the provided value. |

    | Last Detection Timestamp LTE | string | No | Filter hosts with a last detection
    timestamp less than or equal to the provided value. |

    |  Is Targeting Key Asset | ddl | No | Filter hosts based on whether they are
    targeting key assets ('True' or 'False'). |

    |  Privilege Level GTE | string | No | Filter hosts with a privilege level greater
    than or equal to the provided value. |

    | Privilege Category | ddl | No | Filter hosts by privilege category: 'Low', 'Medium',
    or 'High'. |

    | Active Traffic | ddl | No | Filter hosts that have shown active traffic within
    the last two hours ('True' or 'False'). |

    | Order By | ddl | No | The field to sort the results by (e.g., t_score, c_score,
    last_detection_timestamp). |

    | Note Modified Timestamp GTE | string | No | Filter hosts based on when their
    notes were last modified. |


    ### Additional Notes


    - The `Limit` parameter must be a positive integer string; if set to "0", the
    action will fail.

    - Parameters like `Threat GTE`, `Certainty GTE`, and `Privilege Level GTE` are
    validated as integers.

    - Categorical parameters such as `State`, `Privilege Category`, and `Active Traffic`
    are processed in lowercase.

    - If `Order` is set to 'Descending', the `Order By` field is prefixed with a minus
    sign for the API request.


    ### Flow Description


    1. **Parameter Initialization:** Extracts configuration settings (API Root, Token)
    and all 17 action parameters.

    2. **Validation:** Validates that `Limit` is greater than 0 and ensures integer-based
    parameters are correctly formatted.

    3. **API Query:** Constructs a GET request to the Vectra QUX hosts endpoint, applying
    all provided filters and pagination logic.

    4. **Data Processing:** Iterates through the retrieved hosts, removing API version
    strings from internal URLs and extracting mandatory fields for display.

    5. **Output Generation:** Adds the full host details as a JSON result and creates
    a formatted data table titled 'List Of Hosts' in the SOAR interface.
