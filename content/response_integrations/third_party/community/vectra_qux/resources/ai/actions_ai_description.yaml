  ai_description: "### General Description\nThe **Assign Group** action allows users\
    \ to add multiple members to a specific group within the Vectra platform. This\
    \ action is designed to manage group memberships by appending new identifiers\
    \ (such as Hosts, Accounts, IPs, or Domains) to an existing group identified by\
    \ its ID. It is particularly useful for organizing entities for policy enforcement\
    \ or investigative tracking.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Group ID** |\
    \ String | Yes | The unique numeric identifier of the group in Vectra to which\
    \ members will be assigned. |\n| **Members** | String | Yes | A comma-separated\
    \ list of member identifiers (e.g., IP addresses, hostnames, or account UIDs)\
    \ to be added to the group. |\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ The action retrieves the `Group ID` and the `Members` string from the input\
    \ parameters.\n2. **Validation:** The `Group ID` is validated to ensure it is\
    \ a valid positive integer. The `Members` string is processed into a unique list\
    \ of identifiers.\n3. **API Interaction:** The action calls the Vectra API using\
    \ a `PATCH` request to the group's endpoint. It uses the `membership_action=append`\
    \ parameter to ensure new members are added without removing existing ones.\n\
    4. **Verification:** After the update, the action compares the requested members\
    \ against the actual membership list returned by the API to determine which members\
    \ were successfully assigned and which were not.\n5. **Output Generation:** \n\
    \    * If no members were assigned, the action returns a failure status.\n   \
    \ * If some or all members were assigned, it generates an HTML table displaying\
    \ the updated group details (ID, Name, Type, Description, and Members) and provides\
    \ the full raw JSON response."
