  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific entity (Account or Host) from
    the Vectra QUX platform. This action fetches entity metadata, including threat
    scores, tags, and detection sets, and presents the information in a structured
    format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    |---|---|---|---|

    | Entity ID | string | Yes | Unique identifier for the Account or Host. |

    | Entity Type | ddl | Yes | Type of entity to describe (Account or Host). |


    ### Additional Notes

    The action requires both `Entity ID` and `Entity Type` to be provided to successfully
    query the Vectra QUX API. If the entity is not found, the action will fail.


    ### Flow Description

    1. Initialize `SiemplifyAction`.

    2. Extract configuration parameters (API Root, Token, SSL).

    3. Extract action parameters (Entity ID, Entity Type).

    4. Validate Entity ID.

    5. Call `VectraQUXManager.describe_entity` to fetch data from the Vectra API.

    6. Add the retrieved entity details to the action result as a data table and JSON.
