Search Accounts:
  ai_description: >-
    ### General Description

    This action searches for and retrieves account information from Vectra QUX based
    on a wide range of user-defined query parameters. It is primarily used for threat
    hunting and investigation to identify accounts that meet specific criteria such
    as high threat scores, specific privilege levels, or recent detection activity.
    The action returns detailed JSON data for each account and provides a summary
    data table within the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Order | DDL | No | Determines the sort direction of the results. Options: 'Ascending'
    or 'Descending'. |

    | Limit | String | No | The maximum number of account records to retrieve. |

    | Order By | DDL | No | The field used to sort the results. Options: 't_score'
    (Threat Score), 'c_score' (Certainty Score), 'last_detection_timestamp', or 'id'.
    |

    | Fields | Multi-choice | No | A selection of specific account attributes to include
    in the response (e.g., id, name, state, threat, certainty). |

    | Name | String | No | Filters accounts by their name. |

    | State | DDL | No | Filters accounts based on their current state. Options: 'Active'
    or 'Inactive'. |

    | Threat GTE | String | No | Filters for accounts with a threat score greater
    than or equal to this value. |

    | Certainty GTE | String | No | Filters for accounts with a certainty score greater
    than or equal to this value. |

    | Last Detection Timestamp GTE | String | No | Filters for accounts with a last
    detection timestamp greater than or equal to this ISO-formatted date. |

    | Last Detection Timestamp LTE | String | No | Filters for accounts with a last
    detection timestamp less than or equal to this ISO-formatted date. |

    | Tags | String | No | Filters accounts based on a comma-separated list of tags.
    |

    | Note Modified Timestamp GTE | String | No | Filters for accounts where notes
    were modified after this timestamp. |

    | Privilege Level | String | No | Filters accounts by a specific numeric privilege
    level. |

    | Privilege Category | DDL | No | Filters accounts by privilege category. Options:
    'Low', 'Medium', or 'High'. |


    ### Additional Notes

    - The action performs pagination automatically to fetch the number of records
    specified in the 'Limit' parameter.

    - If 'Descending' is selected in the 'Order' parameter, the action prepends a
    '-' to the 'Order By' field in the API request.

    - The action cleans up API versioning strings (e.g., /api/v2.5) from returned
    URLs for better readability.


    ### Flow Description

    1. **Initialization:** The action extracts the integration configuration (API
    Root, Token) and all user-provided search parameters.

    2. **Validation:** It validates numeric inputs such as 'Limit', 'Threat GTE',
    'Certainty GTE', and 'Privilege Level' to ensure they are valid integers.

    3. **API Query:** The action constructs a GET request to the Vectra QUX `/accounts`
    endpoint, applying the filters, sorting, and field selections provided by the
    user.

