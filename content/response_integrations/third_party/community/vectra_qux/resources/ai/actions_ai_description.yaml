Update Assignment:
  ai_description: >-
    ### General Description

    The **Update Assignment** action is used to modify the assigned user for an existing
    assignment associated with a specific entity (either a Host or an Account) within
    the Vectra AI platform. This action is essential for reassigning investigations
    or ownership of security entities to different analysts or teams.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier of the entity (Host or Account)
    in Vectra AI whose assignment needs to be updated. |

    | Entity Type | DDL | Yes | The category of the entity. Supported values are 'Account'
    and 'Host'. |

    | User ID | String | Yes | The unique identifier of the user to whom the entity
    assignment will be updated. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration (API Root,
    Token, SSL verification) and the specific Entity ID, Entity Type, and User ID
    from the input parameters.

    2. **Validation**: It validates that the provided Entity ID and User ID are valid
    integer strings.

    3. **Entity Retrieval**: It fetches the current details of the specified entity
    from Vectra AI to check for an existing assignment.

    4. **Assignment Verification**: The action checks if the entity currently has
    an assignment. If no assignment is found, the action fails, as it is designed
    only to update existing assignments.

    5. **Update Execution**: If an assignment exists, the action performs a PUT request
    to the Vectra AI API to update the assignment with the new User ID.

    6. **Output Generation**: Upon success, the action returns the raw JSON response
    and creates a data table titled 'Updated Assignment' containing the updated assignment
    details.


    ### Additional Notes

    - This action requires an existing assignment to be present on the entity. To
    create a new assignment for an unassigned entity, use the 'Assign Entity' action.

    - Both Entity ID and User ID must be numeric strings.
