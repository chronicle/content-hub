Unmark Detection Fixed:
  ai_description: >-
    Unmarks specific detections as fixed in the Vectra QUX platform. This action is
    used to revert the status of detections that were previously marked as resolved
    or fixed, effectively reopening them for further investigation or workflow processing.
    It accepts a list of detection IDs and performs a bulk update via a PATCH request
    to the Vectra API.


    ### Flow Description:

    1. **Parameter Extraction**: The action retrieves the 'Detection IDs' from the
    input parameters.

    2. **Validation**: It splits the comma-separated string of IDs and validates that
    each ID is a valid integer.

    3. **API Interaction**: It calls the Vectra QUX Manager to send a PATCH request
    to the detections endpoint, setting the 'mark_as_fixed' attribute to 'False' for
    the provided IDs.

    4. **Result Handling**: The raw JSON response from the Vectra API is attached
    to the action results, and the action completes with a success or failure status
    based on the API's response.


    ### Parameters Description:

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection IDs | String | Yes | A comma-separated list of numeric IDs representing
    the detections to be unmarked as fixed. |


    ### Additional Notes:

    - This action does not run on entities; it operates solely based on the provided
    Detection IDs.

    - If any ID in the list is invalid or not found, the action may fail depending
    on the API's error handling logic.
