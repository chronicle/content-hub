  ai_description: >-
    Adds a new outcome (resolution category) to the Vectra AI platform. Outcomes are
    used during the assignment resolution process to categorize detections or entities
    (e.g., as a true positive or false positive). This action allows administrators
    to dynamically expand the available resolution options within the Vectra environment.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'Title' and 'Category' from the action
    input.

    2. **API Interaction**: Sends a POST request to the Vectra API (`/api/v2.5/assignment_outcomes`)
    with the provided details.

    3. **Result Processing**: Captures the newly created outcome's metadata, including
    its unique ID and system status.

    4. **Output Generation**: Populates a data table and JSON result with the outcome
    details for the analyst.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The unique name/title for the new outcome. |

    | Category | DDL | Yes | The classification category for the outcome. Supported
    values: `malicious_true_positive`, `benign_true_positive`, `false_positive`. |


    ### Additional Notes

    - This action does not run on entities; it is a management action that modifies
    the configuration of the Vectra AI platform.
