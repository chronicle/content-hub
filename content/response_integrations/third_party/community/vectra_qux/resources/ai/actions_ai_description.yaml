Assign Group:
  ai_description: >-
    Assigns members to a specific group in Vectra QUX. This action allows users to
    add multiple members to an existing group by providing the Group ID and a comma-separated
    list of member identifiers. The action uses an 'append' logic, meaning existing
    members are preserved while new ones are added. It validates the Group ID and
    processes the member list before making a PATCH request to the Vectra API. After
    the update, the action verifies which members were successfully assigned and provides
    a detailed HTML summary of the group's current state.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the Group ID and the list of members from
    the action parameters.

    2. **Validation:** Validates that the Group ID is a positive integer and splits
    the members string into a list.

    3. **API Interaction:** Calls the Vectra QUX API using a PATCH request to append
    the specified members to the group.

    4. **Verification:** Compares the requested members against the updated group
    membership returned by the API to identify any failed assignments.

    5. **Output Generation:** Renders an HTML table showing the group's properties
    (ID, Name, Type, Description, and Members) and attaches the raw JSON response.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | True | The unique numerical identifier of the group in Vectra
    QUX. |

    | Members | string | True | A comma-separated list of members to assign to the
    group. The member identifiers (e.g., IP, hostname, account UID) must match the
    group's defined type. |


    ### Additional Notes:

    - The action will fail if the Group ID does not exist or if none of the provided
    members are valid for the group's type.

    - If some members are successfully added while others fail (e.g., due to invalid
    format or non-existence), the action will complete with a partial success message.
  capabilities:
