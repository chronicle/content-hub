Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for a specific entity's assignment in VectraQUX.


    ### Flow Description

    1. Validates the provided `Entity ID` and `User ID` parameters.

    2. Makes a GET request to VectraQUX to retrieve the entity details and extract
    its associated assignment ID.

    3. If an assignment exists, makes a PUT request to VectraQUX to update the assignment
    with the new `User ID`.

    4. Returns the updated assignment details as a JSON result and a data table.


    ### Additional Notes

    If the specified entity does not have an existing assignment, the action will
    fail.
