    | **Entity ID** | string | Yes | The unique numerical identifier of the entity
    in Vectra QUX. |

    | **Entity Type** | ddl | Yes | The type of entity, can be either 'Account' or
    'Host'. |


    ### Flow Description

    1. **Input Validation**: Validates that the provided Entity ID is a valid integer.

    2. **Entity Retrieval**: Fetches the entity's details from Vectra QUX to identify
    all associated detection IDs.

    3. **Status Update**: Sends a PATCH request to the Vectra QUX API to mark all
    identified detections as 'fixed'.

    4. **Result Reporting**: Returns the API response confirming the update.


    ### Additional Notes

