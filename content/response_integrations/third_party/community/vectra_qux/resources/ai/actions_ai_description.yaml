Remove Tags:
  ai_description: >-
    Removes specific tags from a Vectra QUX entity, such as an Account, Host, or Detection,
    based on a provided Entity ID. The action first retrieves the current tags associated
    with the entity, identifies which of the user-specified tags are present, and
    then submits an update to the Vectra QUX API to remove them.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | string | Yes | A comma-separated list of tags to be removed from the
    entity. |

    | Entity ID | string | Yes | The unique identifier of the entity in Vectra QUX.
    |

    | Entity Type | ddl | Yes | The type of entity to target. Options are 'Account',
    'Host', or 'Detection'. |


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves the API configuration and the
    user-provided parameters: Tags, Entity ID, and Entity Type.

    2.  **Tag Processing:** The input string of tags is split into a list, and whitespace
    is trimmed.

    3.  **Data Retrieval:** The action calls the Vectra QUX API to fetch the current
    tags for the specified entity.

    4.  **Validation:** It checks if the entity exists. If not, an error is raised.

    5.  **Tag Comparison:** The action compares the user-provided tags with the existing
    tags. It identifies which tags can be successfully removed and which do not exist
    on the entity.

    6.  **Update Execution:** If at least one tag is found for removal, the action
    sends a PATCH request to Vectra QUX with the updated (reduced) tag list.

    7.  **Result Reporting:** The action outputs a summary of the operation, including
    a JSON result and a data table showing the updated status of the entity's tags.
