Search Detections:
  ai_description: >-
    Searches for and retrieves detections from the Vectra QUX platform based on a
    wide range of filtering criteria. This action allows analysts to query security
    detections using parameters such as source IP, host ID, threat and certainty scores,
    detection types, and categories. It supports pagination through a limit parameter
    and allows for custom ordering and field selection. The retrieved detections are
    presented in a structured data table and a full JSON result for further analysis.


    ### Flow Description:

    1. **Parameter Extraction:** The action begins by extracting configuration details
    (API Root, Token) and all 15 optional search parameters from the environment and
    action input.

    2. **Validation:** It validates numeric inputs such as 'Limit', 'Threat GTE',
    and 'Certainty GTE' to ensure they are valid integers.

    3. **API Interaction:** The action initializes the VectraQUXManager and performs
    a GET request to the detections endpoint, applying the specified filters as query
    parameters.

    4. **Data Processing:** If detections are found, the action iterates through the
    results to normalize URLs (removing API version prefixes) and extracts a subset
    of mandatory fields (ID, type, category, timestamps, state) for the summary table.

    5. **Output Generation:** The processed data is added to the action's execution
    results as a JSON object and a formatted data table titled 'List Of Detections'.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Last Timestamp GTE | String | No | Filters detections with a last seen timestamp
    greater than or equal to the provided value. |

    | Host ID | String | No | Filters detections associated with a specific Vectra
    Host ID. |

    | Tags | String | No | Filters detections by a comma-separated list of tags. |

    | Is Targeting Key Asset | DDL | No | Filters detections based on whether they
    target a key asset (True/False). |

    | Note Modified Timestamp GTE | String | No | Filters detections where the associated
    note was modified after the given timestamp. |

    | Order | DDL | No | Specifies the sort order: 'Ascending' or 'Descending'. |

    | Limit | String | No | The maximum number of detection records to retrieve. |

    | Order By | DDL | No | The field used to sort results (e.g., last_timestamp,
    t_score, c_score). |

    | Fields | Multi-Choice | No | Specifies which data fields to include in the response
    (e.g., src_ip, state, threat). |

    | State | DDL | No | Filters detections by their current state: 'Active', 'Inactive',
    or 'Fixed'. |

    | Detection Type | String | No | Filters by the specific type of detection (e.g.,
    'Hidden HTTP Tunnel'). |

    | Detection Category | DDL | No | Filters by detection category (e.g., 'Command
    and Control', 'Exfiltration'). |

    | Src IP | String | No | Filters detections originating from a specific source
    IP address. |

    | Threat GTE | String | No | Filters detections with a threat score greater than
    or equal to the provided value. |

    | Certainty GTE | String | No | Filters detections with a certainty score greater
    than or equal to the provided value. |


    ### Additional Notes:

    - If no detections match the criteria, the action completes successfully with
    an informative message.

    - The 'Fields' parameter is processed as a JSON-encoded list of strings.

    - The 'Order' parameter works in conjunction with 'Order By'; selecting 'Descending'
    prepends a minus sign to the sort field in the API request.
