  ai_description: >-
    ### General Description

    Reverts the 'fixed' status of specific detections in Vectra AI. This action allows
    analysts to unmark detections that were previously flagged as resolved or fixed,
    effectively reopening them for further investigation or monitoring within the
    Vectra platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection IDs | String | Yes | A comma-separated list of Vectra detection IDs
    (e.g., "123, 456") that should be unmarked as fixed. |


    ### Additional Notes

    - The action validates that all provided IDs are valid integers before sending
    the request to Vectra AI.

    - If any ID in the list is invalid or does not exist, the action may fail or return
    an error message from the Vectra API.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the `Detection IDs` string from the action
    parameters.

    2. **Validation**: Splits the input string by commas and validates that each individual
    ID is a valid integer.

    3. **API Interaction**: Connects to the Vectra AI API and sends a `PATCH` request
    to the detections endpoint.

    4. **Status Update**: The request payload explicitly sets the `mark_as_fixed`
    attribute to `False` for the specified list of detection IDs.

    5. **Result Reporting**: Captures the API response and adds it to the action's
    JSON results for the analyst to review.
