    3. **API Request**: Connects to the Vectra QUX API and sends a GET request to
    the PCAP download endpoint for the specified detection.

    4. **File Processing**: Receives the binary file content and extracts the filename
    from the response headers.

    5. **Attachment**: Encodes the file content to base64 and attaches it to the Siemplify
    action result.

    6. **Completion**: Ends the action, providing a success message with the filename
    or an error message if the process fails.
