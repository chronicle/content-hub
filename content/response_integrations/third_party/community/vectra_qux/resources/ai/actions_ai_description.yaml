  ai_description: >-
    Adds tags to specific entities (Accounts, Hosts, or Detections) in the Vectra
    AI platform. This action allows users to provide a comma-separated list of tags
    and a comma-separated list of entity IDs. It first retrieves the existing tags
    for each entity to ensure no duplicates are created, then updates the entity with
    the combined list of tags. The results, including the status of each update, are
    presented in a data table.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | string | True | List of the Tags which user wants to add to the account,
    host or detection. |

    | Entity IDs | string | True | List of the Entity IDs in which user wants to add
    Tags. |

    | Entity Type | ddl | True | The type of the entity in which tags will be added.
    Supported values: Account, Host, Detection. |


    ### Flow Description


    1. **Parameter Extraction:** Retrieves the API configuration and action parameters,
    including the tags to add, the target entity IDs, and the entity type (Account,
    Host, or Detection).

    2. **Tag Processing:** Splits the provided tags string into a unique list and
    removes whitespace.

    3. **Entity Processing:** Splits the provided entity IDs string into a unique
    list of validated integers.

    4. **Tag Retrieval:** For each entity ID, the action fetches the current tags
    from Vectra AI via a GET request.

    5. **Tag Merging:** Combines the existing tags with the new tags, ensuring uniqueness.

    6. **External Update:** Sends a PATCH request to Vectra AI to update the entity's
    tags with the merged list.

    7. **Result Compilation:** Tracks successes and failures for each ID, adding a
    summary data table and JSON result to the action output.
