    and 'Certainty GTE' to ensure they are valid integers.

    3. **API Query:** Constructs a paginated GET request to the Vectra QUX `/hosts`
    endpoint, applying the filters as query parameters.

    4. **Data Sanitization:** Processes the retrieved host list to clean up internal
    API versioning strings from URLs and detection sets for better readability.

    5. **Output:** Returns the full host details as a JSON object and generates a
    summary data table containing key attributes like ID, Name, IP, and Threat Score.
