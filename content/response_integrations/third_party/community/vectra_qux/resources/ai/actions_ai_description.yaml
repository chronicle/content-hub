Remove Note:
  ai_description: >-
    ### General Description

    The **Remove Note** action allows users to delete a specific note associated with
    an entity in the Vectra platform. This action supports three types of entities:
    Accounts, Hosts, and Detections. It is primarily used for managing and cleaning
    up documentation or analyst notes within the Vectra environment directly from
    Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity ID** | String | Yes | The unique identifier of the entity (Account,
    Host, or Detection) from which the note should be removed. |

    | **Note ID** | String | Yes | The unique identifier of the specific note to be
    deleted. |

    | **Entity Type** | DDL | Yes | The type of entity the note is attached to. Supported
    values are: `Account`, `Host`, and `Detection`. |


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra manager using the provided
    API Root and Token.

    2. **Parameter Extraction**: It extracts the `Entity ID`, `Note ID`, and `Entity
    Type` from the action parameters.

    3. **Validation**: The action validates that both the `Entity ID` and `Note ID`
    are valid integer values before proceeding.

    4. **API Execution**: It calls the Vectra API using a `DELETE` request to the
    specific endpoint constructed from the entity type and IDs.

    5. **Completion**: Upon a successful response from the API, the action returns
    a success message confirming the deletion of the note. If the note or entity does
    not exist, or if the user lacks permissions, it handles the exception and reports
    the failure.


    ### Additional Notes

    - This action performs a permanent state change in the external Vectra system
    by deleting data.

    - The action does not process entities from the Google SecOps case context; it
    relies entirely on the provided input parameters.
