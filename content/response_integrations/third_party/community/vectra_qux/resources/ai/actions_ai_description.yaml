  ai_description: >-
    ### General Description

    The **Describe Detection** action retrieves detailed information for a specific
    detection from the Vectra AI platform using its unique Detection ID. It provides
    analysts with granular visibility into a threat, including its type, category,
    current state, and the source entity (host or account) involved.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the detection to be described.
    This value must be a valid integer. |


    ### Additional Notes

    - This action does not process entities from the SOAR case; it operates solely
    based on the provided `Detection ID` parameter.

    - The results are presented both as a formatted data table and as a raw JSON object
    for further downstream processing.


    ### Flow Description

    1. **Input Validation**: The action first validates that the `Detection ID` provided
    is a valid non-negative integer.

    2. **API Interaction**: It initializes the VectraQUX manager and performs a GET
    request to the `/detections/{detection_id}` endpoint.

    3. **Data Parsing**: The raw API response is transformed into a structured Detection
    object, which includes cleaning up internal API versioning from URLs.

    4. **Result Generation**:
        - A data table titled "Describe Detection" is created containing key fields:
    ID, Detection Type, State, Category, Source Entity ID, and Source Entity Name.
        - The full raw JSON payload is added to the action results.
