  ai_description: >-
    Updates the assigned user for a specific entity (Host or Account) in Vectra QUX.
    This action is used to change the ownership or responsibility of an entity within
    the Vectra platform by modifying its existing assignment. It first retrieves the
    entity's current details to identify the active assignment ID and then performs
    a PUT request to update the 'assign_to_user_id' field. This is particularly useful
    for workflow orchestration where an analyst or automated process needs to reassign
    a resource for investigation.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique integer identifier of the entity (Host
    or Account) in Vectra QUX. |

    | Entity Type | DDL | Yes | The category of the entity to update. Supported values
    are 'Account' and 'Host'. |

    | User ID | String | Yes | The unique integer identifier of the Vectra user to
    whom the entity should be reassigned. |


    ### Additional Notes


    * **Prerequisite:** The target entity must already have an existing assignment
    in Vectra QUX. If no assignment is found, the action will fail with an informative
    message.

    * **Validation:** Both 'Entity ID' and 'User ID' must be valid numeric strings
    that can be converted to integers.

    * **Output:** The action provides a data table named 'Updated Assignment' containing
    the new assignment details and the full JSON response from the Vectra API.


    ### Flow Description


    1. **Parameter Extraction:** Retrieves the API configuration and the action parameters
    (Entity ID, Entity Type, and User ID).

    2. **Input Validation:** Validates that the provided Entity ID and User ID are
    valid non-negative integers.

    3. **Entity Lookup:** Calls the Vectra API to describe the specified entity and
    check for an existing assignment.

    4. **Assignment Identification:** Extracts the 'assignment_id' from the entity's
    current assignment metadata.

    5. **External Update:** Executes a PUT request to the Vectra assignments endpoint
    to update the assigned user to the new User ID.

    6. **Result Reporting:** Adds the updated assignment details to a data table and
    the raw response to the JSON results, then completes the action with a success
    message.
