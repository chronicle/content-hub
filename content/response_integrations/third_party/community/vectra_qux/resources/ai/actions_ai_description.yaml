    ### General Description

    The **List Outcomes** action retrieves a comprehensive list of all assignment
    outcomes configured in the Vectra QUX platform. This utility action is primarily
    used to discover valid outcome titles and IDs, which are required for subsequent
    workflow steps such as resolving assignments or triaging detections. It provides
    visibility into both built-in and user-defined outcomes.


