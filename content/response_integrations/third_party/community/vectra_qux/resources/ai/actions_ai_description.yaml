List Users:
  ai_description: >-
    The **List Users** action retrieves a list of user accounts from the Vectra QUX
    platform based on specified filtering criteria. It allows analysts to search for
    users by their role, account type, authentication profile, or username, and can
    filter based on the last login timestamp. This action is primarily used for administrative
    auditing, identifying specific user accounts, or verifying user permissions within
    the Vectra environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Role | String | No | Filter users by their assigned role in Vectra (e.g., 'admin',
    'readonly'). |

    | Authentication Profile | String | No | Filter users by their authentication
    profile name. |

    | Last Login GTE | String | No | Filter users whose last login timestamp is greater
    than or equal to this value. |

    | User Name | String | No | Filter by a specific username. |

    | Account Type | String | No | Filter by the type of account (e.g., 'local', 'ldap').
    |

    | Limit | String | No | The maximum number of user records to retrieve. Defaults
    to the system limit if not specified. |


    ### Flow Description


    1. **Parameter Extraction:** The action retrieves the API configuration (Root,
    Token) and the optional filter parameters provided by the user.

    2. **Validation:** It validates the `Limit` parameter to ensure it is a valid
    non-negative integer.

    3. **API Request:** It initializes the VectraQUX manager and performs a GET request
    to the `/users` endpoint, applying the provided filters (Role, Username, etc.)
    as query parameters.

    4. **Pagination:** The action handles pagination automatically to retrieve results
    up to the specified limit.

    5. **Output Generation:**
        *   If users are found, it constructs a CSV-formatted data table containing
    key user details: ID, Username, Role, Account Type, and Last Login.
        *   It attaches the full raw JSON response to the action results for further
    processing.
        *   If no users match the criteria, it returns a message stating that no users
    were found.

    ### Additional Notes


    * There are no mandatory action parameters; if none are provided, the action will
    return a list of all users up to the default or specified limit.
