    The **Search Detections** action allows users to query and retrieve a list of
    detections from the Vectra QUX platform based on a wide array of filtering criteria.
    It is primarily used for threat hunting, investigation, and reporting by fetching
    detailed metadata about security events, such as detection types, categories,
    threat scores, and associated host or IP information.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Last Timestamp GTE | String | No | Filters detections with a last seen timestamp
    greater than or equal to the provided value. |

    | Host ID | String | No | Filters detections associated with a specific Vectra
    Host ID. |

    | Tags | String | No | Filters detections by a comma-separated list of tags. |

    | Is Targeting Key Asset | DDL | No | Filters detections based on whether they
    target a key asset (True/False). |

    | Note Modified Timestamp GTE | String | No | Filters detections where the associated
    note was modified after the given timestamp. |

    | Order | DDL | No | Specifies the sort order: 'Ascending' or 'Descending'. |

    | Limit | String | No | The maximum number of detection records to retrieve. |

    | Order By | DDL | No | The field used to sort results (e.g., last_timestamp,
    t_score, c_score). |

    | Fields | Multi-Choice | No | A list of specific fields to include in the response
    (e.g., id, category, src_ip). |

    | State | DDL | No | Filters detections by their current state: 'Active', 'Inactive',
    or 'Fixed'. |

    | Detection Type | String | No | Filters by the specific type of detection (e.g.,
    'Suspicious HTTP Service'). |

    | Detection Category | DDL | No | Filters by the broad category (e.g., 'Lateral
    Movement', 'Exfiltration'). |

    | Src IP | String | No | Filters detections originating from a specific source
    IP address. |

    | Threat GTE | String | No | Filters detections with a threat score greater than
    or equal to this value. |

    | Certainty GTE | String | No | Filters detections with a certainty score greater
    than or equal to this value. |


