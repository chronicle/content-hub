Mark Detection Fixed:
  ai_description: >-
    ### General Description

    Marks specific detections as fixed in the Vectra platform. This action is used
    to programmatically update the status of security detections, indicating that
    the identified threats or activities have been addressed or resolved by an analyst.
    It allows for bulk updates by providing a list of detection identifiers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection IDs | string | Yes | A comma-separated list of numeric IDs representing
    the detections in Vectra that should be marked as fixed. Each ID must be a valid
    integer. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Detection IDs` string from
    the input parameters.

    2. **Validation**: The comma-separated string is split into individual IDs. Each
    ID is stripped of whitespace and validated to ensure it is a valid integer.

    3. **API Interaction**: The action uses the `VectraQUXManager` to send a `PATCH`
    request to the Vectra detections endpoint (`/api/v2.5/detections`).

    4. **State Mutation**: The request payload specifies the list of detection IDs
    and sets the `mark_as_fixed` attribute to `True`.

    5. **Result Handling**: The raw JSON response from the Vectra API is added to
    the action results, and the action completes with a success message if the update
    was accepted.


    ### Additional Notes

    - This action does not run on SecOps entities; it relies entirely on the IDs provided
    in the `Detection IDs` parameter.

    - If any provided ID is not a valid integer, the action will fail with an `InvalidIntegerException`.
