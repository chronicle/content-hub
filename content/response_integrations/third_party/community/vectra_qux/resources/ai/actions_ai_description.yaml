  ai_description: >-
    Adds a note to a specific entity (Account, Host, or Detection) in the Vectra QUX
    platform. This action allows analysts to document findings, provide context, or
    record automated observations directly within the Vectra interface from Google
    SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | String | Yes | The text content of the note to be added to the entity.
    |

    | Entity ID | String | Yes | The unique numerical ID of the entity in Vectra.
    |

    | Entity Type | DDL | Yes | The category of the entity. Supported values are:
    `Account`, `Host`, and `Detection`. |


    ### Additional Notes


    The `Entity ID` must be a valid integer. The action will fail if the ID does not
    exist or if the user does not have sufficient permissions in Vectra QUX to add
    notes to the specified entity type.


    ### Flow Description


    1. **Parameter Extraction:** The action retrieves the API connection settings
    (API Root, Token, SSL verification) and the user-provided parameters: Note, Entity
    ID, and Entity Type.

    2. **Validation:** It validates that the `Entity ID` provided is a valid integer.

    3. **API Interaction:** It initializes the VectraQUX manager and sends a POST
    request to the Vectra API endpoint corresponding to the specified entity type
    and ID (e.g., `/api/v2.5/hosts/{id}/notes`).

    4. **Result Processing:** It captures the API response, which contains the details
    of the newly created note object, and outputs it to the action's data table and
    JSON result for analyst review.
