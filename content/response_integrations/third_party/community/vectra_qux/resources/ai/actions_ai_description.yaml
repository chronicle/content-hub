    (API Root, Token, SSL settings) and the optional `Limit` parameter.

    2. **Validation**: The `Limit` parameter is validated to ensure it is a valid
    integer greater than or equal to zero.

    3. **Data Retrieval**: The action performs a paginated GET request to the Vectra
    QUX `/assignment_outcomes` endpoint using the `VectraQUXManager`.

    4. **Output Generation**:
