List Groups:
  ai_description: >-
    ### General Description

    The **List Groups** action retrieves a list of groups from the Vectra QUX platform
    based on a variety of user-defined query parameters. It allows analysts to search
    for specific groups by host names, account names, domains, IP addresses, importance
    levels, and modification metadata. This action is primarily used for auditing
    group memberships or identifying specific group configurations within the Vectra
    environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Host Names | String | No | A comma-separated list of host names to filter the
    groups. |

    | Account Names | String | No | A comma-separated list of account names to filter
    the groups. |

    | Domains | String | No | A comma-separated list of domains to filter the groups.
    |

    | Host Ids | String | No | A comma-separated list of host IDs to filter the groups.
    |

    | Importance | DDL | No | Filters groups by their importance level (e.g., low,
    medium, high, never_prioritize). |

    | IPs | String | No | A comma-separated list of IP addresses to filter the groups.
    |

    | Last Modified Timestamp GTE | String | No | Filters groups modified on or after
    this specific timestamp. |

    | Last Modified By | String | No | Filters groups based on the username of the
    person who last modified them. |

    | Name | String | No | Filters groups by their specific name. |

    | Type | DDL | No | Filters groups by their type (e.g., host, account, ip, domain).
    |

    | Limit | String | No | Specifies the maximum number of records to fetch from
    the API. |

    | Description | String | No | Performs a case-insensitive match against the group's
    description field. |


    ### Additional Notes

    - This action does not process Google SecOps entities automatically; it relies
    entirely on the provided input parameters.

    - If no parameters are provided, the action will attempt to list all groups up
    to the specified limit.

    - The 'Limit' parameter defaults to a system-defined maximum if not specified.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the integration configuration
    (API Root, Token) and all optional search filters provided by the user.

    2. **Input Sanitization**: Comma-separated strings for hosts, accounts, domains,
    and IPs are split into lists and stripped of whitespace.

    3. **Validation**: The 'Limit' parameter is validated to ensure it is a positive
    integer.

    4. **API Request**: The action initializes the VectraQUX manager and performs
    a paginated GET request to the `/groups` endpoint, applying the filters as query
    parameters.

    5. **Data Parsing**: The raw JSON response is parsed into structured Group objects.

    6. **Output Generation**: If groups are found, the action populates a data table
    named 'List Of Groups' in the SOAR case and attaches the full JSON result for
    further analysis.
