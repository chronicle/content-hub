  ai_description: "### General Description\nThe **Ping** action is a utility designed\
    \ to verify the connectivity between the Google SecOps (Chronicle) server and\
    \ the Vectra platform. It ensures that the provided configuration parameters,\
    \ such as the API Root and API Token, are correct and that the network path is\
    \ open.\n\n### Parameters Description\n| Parameter Name | Description | Type |\
    \ Mandatory | Notes |\n| :--- | :--- | :--- | :--- | :--- |\n| API Root | The\
    \ base URL of the Vectra platform API. | String | Yes | Configured at the integration\
    \ level. |\n| API Token | The authentication token used to authorize requests\
    \ to the Vectra API. | String | Yes | Configured at the integration level. |\n\
    | Verify SSL | Specifies whether to verify the SSL certificate of the Vectra server.\
    \ | Boolean | Yes | Default is True. |\n\n### Additional Notes\n- This action\
    \ does not process any entities.\n- It is primarily used for troubleshooting and\
    \ initial setup verification.\n- According to standard classification, Ping actions\
    \ are not considered enrichment actions.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify SDK and retrieves the integration configuration\
    \ parameters (API Root, API Token, and Verify SSL).\n2. **Manager Setup**: It\
    \ instantiates the `VectraQUXManager` using the retrieved configuration.\n3. **Connectivity\
    \ Test**: The manager executes the `test_connectivity` method, which performs\
    \ a simple `GET` request to the Vectra hosts endpoint (`/api/v2.5/hosts`).\n4.\
    \ **Result Handling**: \n    - If the request is successful, the action returns\
    \ a success message and a boolean result of `True`.\n    - If an exception occurs\
    \ (e.g., authentication failure, timeout, or invalid URL), the action catches\
    \ the error, logs the details, and returns a failure message with a boolean result\
    \ of `False`."
