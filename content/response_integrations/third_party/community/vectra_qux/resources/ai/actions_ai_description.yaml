    ### General Description

    Searches for and retrieves host details from Vectra QUX based on a wide variety
    of filtering criteria. This action allows security analysts to perform discovery
    and asset management by querying the Vectra platform for hosts that match specific
    security postures, such as high threat scores, specific tags, or active network
    traffic. The results provide comprehensive metadata for each host, including IP
    addresses, severity levels, and detection summaries.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Limit | String | No | The maximum number of host records to return. Defaults
    to the system limit if not specified. |

    | Tags | String | No | Filter hosts based on specific tags assigned in Vectra.
    |

    | Last Source | String | No | Filter hosts based on the last source identifier.
    |

    | Order | DDL | No | Specifies whether to sort results in 'Ascending' or 'Descending'
    order. |

    | Fields | Multi-select | No | A list of specific host fields to include in the
    response (e.g., id, name, ip, threat). |

    | Name | String | No | Filter hosts by their display name. |

    | State | DDL | No | Filter hosts by their current state: 'Active' or 'Inactive'.
    |

    | Threat GTE | String | No | Filter for hosts with a threat score greater than
    or equal to this value. |

    | Certainty GTE | String | No | Filter for hosts with a certainty score greater
    than or equal to this value. |

    | Last Detection Timestamp GTE | String | No | Filter for hosts with a last detection
    timestamp greater than or equal to this value. |

    | Last Detection Timestamp LTE | String | No | Filter for hosts with a last detection
    timestamp less than or equal to this value. |

    | Is Targeting Key Asset | DDL | No | Filter hosts based on whether they are targeting
    key assets (True/False). |

    | Privilege Level GTE | String | No | Filter for hosts with a privilege level
    greater than or equal to this value. |

    | Privilege Category | DDL | No | Filter by privilege category: 'Low', 'Medium',
    or 'High'. |

    | Active Traffic | DDL | No | Filter for hosts that have shown active traffic
    within the last two hours (True/False). |

    | Order By | DDL | No | The field used to sort the results (e.g., t_score, c_score,
    last_detection_timestamp). |

    | Note Modified Timestamp GTE | String | No | Filter based on when the host's
    notes were last modified. |


    ### Additional Notes

    - This action is read-only and does not modify any data within Vectra QUX.

    - If no hosts match the provided criteria, the action will complete successfully
    with a message indicating no results were found.

    - Timestamps should be provided in a format recognized by the Vectra API (typically
    ISO 8601).


