Add Outcome:
  ai_description: >-
    ### General Description

    Adds a new outcome with a specified title and category to VectraQUX. This action
    allows users to create custom outcomes that can later be assigned to alerts or
    cases within the Vectra platform.


    ### Flow Description

    1. Extracts the `Title` and `Category` parameters provided by the user.

    2. Initializes the VectraQUX API client using the provided integration configuration.

    3. Makes a POST request to the VectraQUX API to create the new outcome.

    4. Retrieves the newly created outcome details and populates them into a data
    table and JSON result.

    5. Returns a success message with the new outcome ID.


    ### Additional Notes

    Ensure that the provided title is unique within the VectraQUX platform to avoid
    conflicts.
