Add Outcome:
  ai_description: >-
    Adds a new assignment outcome to Vectra QUX. Outcomes are used to categorize the
    results of assignments, such as when resolving a detection or entity assignment.
    This action allows users to define custom outcome titles mapped to standard categories
    like 'malicious_true_positive', 'benign_true_positive', or 'false_positive'.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the 'Title' and 'Category' from the action
    input and API credentials from the integration configuration.

    2. **API Interaction:** Sends a POST request to the Vectra QUX `/assignment_outcomes`
    endpoint with the provided title and category.

    3. **Result Processing:** Captures the created outcome's ID and metadata from
    the response.

    4. **Output Generation:** Populates a data table and JSON result with the new
    outcome information for use in subsequent playbook steps.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The unique title for the new outcome. |

    | Category | DDL | Yes | The category classification. Expected values: `malicious_true_positive`,
    `benign_true_positive`, or `false_positive`. |


    ### Additional Notes:

    - This action does not process or require any entities from the SOAR case.
