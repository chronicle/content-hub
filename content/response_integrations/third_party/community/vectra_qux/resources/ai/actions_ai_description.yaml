List Entity Detections:
  ai_description: >-
    Retrieves a list of detections associated with a specific entity ID (Host or Account)
    from the Vectra QUX platform. This action allows analysts to query historical
    or active security detections for a known entity identifier, providing visibility
    into the threat activity linked to that specific asset. It supports filtering
    by the state of the detection (Active, Inactive, or Fixed) and allows for limiting
    the number of returned records.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and action
    parameters, including the `Entity ID`, `Entity Type`, `Limit`, and `State`.

    2. **Validation:** It validates that the `Entity ID` and `Limit` are valid integer
    values.

    3. **API Interaction:** The action uses the `VectraQUXManager` to perform a GET
    request to the Vectra search detections endpoint, using a query string that filters
    by the source entity's ID and the specified detection state.

    4. **Data Processing:** The retrieved detections are parsed into structured objects.
    If detections are found, they are converted into a JSON result and a CSV-formatted
    data table.

    5. **Output:** The action completes by providing a summary message and attaching
    the detection data to the case for analyst review.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier for the Account or Host within
    the Vectra platform. |

    | Entity Type | DDL | Yes | Specifies whether the provided ID refers to an 'Account'
    or a 'Host'. |

    | Limit | String | No | The maximum number of detection records to fetch. If not
    provided, the system default is used. |

    | State | DDL | Yes | Filters detections based on their current status: 'Active',
    'Inactive', or 'Fixed'. |


    ### Additional Notes

    - This action does not automatically iterate over entities in the current Google
    SecOps case; it requires a specific `Entity ID` to be provided as an input parameter.
