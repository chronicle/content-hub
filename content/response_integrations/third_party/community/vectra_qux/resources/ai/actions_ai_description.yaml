Add Tags:
  ai_description: >-
    ### General Description

    Adds one or more tags to specific entities (Accounts, Hosts, or Detections) within
    the Vectra platform. This action allows for bulk tagging by providing a comma-separated
    list of Entity IDs. It ensures data integrity by first fetching existing tags
    for each entity and merging them with the new tags to prevent duplicates before
    performing a partial update (PATCH) on the external system.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Tags | A comma-separated list of tags to be added to the specified entities.
    | String | Yes |

    | Entity IDs | A comma-separated list of internal Vectra IDs for the entities
    to be updated. | String | Yes |

    | Entity Type | The category of the entities being tagged. Supported values are
    'Account', 'Host', and 'Detection'. | DDL | Yes |


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra manager using the provided
    API Root and Token.

    2. **Input Processing**: It parses the `Tags` and `Entity IDs` parameters, splitting
    them by commas and removing any duplicates or whitespace.

    3. **Validation**: Validates that the provided `Entity IDs` are valid integers.

    4. **Tag Enrichment Loop**: For each Entity ID:
        - It retrieves the current list of tags from the Vectra API.
        - It merges the existing tags with the new tags provided in the input.
        - It sends a PATCH request to Vectra to update the entity with the new combined
    tag list. 5. **Result Compilation**: Tracks successes and failures for each ID.

    6. **Output**: Generates a summary data table and a detailed JSON result showing
    the status and final tag list for each processed entity.


    ### Additional Notes

    This action does not run on SOAR entities automatically; it requires the user
    to provide specific Vectra internal IDs as input parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the metadata of entities (Accounts, Hosts, or Detections) in the Vectra
      platform by adding new tags via a PATCH request.
    fetches_data: true
    internal_data_mutation_explanation: null
