    Removes the analyst assignment for a specific entity (Account or Host) within
    the Vectra AI platform. This action is used to clear the ownership or investigation
    status of an entity by deleting its current assignment record. It first verifies
    the existence of an assignment for the provided Entity ID before attempting the
    deletion.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique numerical identifier of the entity in
    Vectra AI whose assignment should be removed. |

    | Entity Type | DDL | Yes | The category of the entity. Must be either 'Account'
    or 'Host'. |


