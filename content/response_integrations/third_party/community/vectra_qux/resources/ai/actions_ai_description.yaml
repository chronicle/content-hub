  ai_description: >-
    ### General Description

    Updates the assigned user for a specific entity (Account or Host) in the Vectra
    QUX system. This action retrieves the current entity details to identify the existing
    assignment and then updates it by assigning the specified User ID. It returns
    the update result and adds a data table to the action results.


    ### Flow Description

    1. Validates input parameters (Entity ID, User ID).

    2. Retrieves current entity details from Vectra QUX to identify the existing assignment.

    3. Updates the assignment by assigning the specified User ID to the entity.

    4. Returns the update result and adds a data table to the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | string | Yes | The ID of the entity to update. |

    | Entity Type | ddl | Yes | The type of entity (Account or Host). |

    | User ID | string | Yes | The ID of the user to assign. |


    ### Additional Notes

    - The action requires valid API credentials for the Vectra QUX integration.
