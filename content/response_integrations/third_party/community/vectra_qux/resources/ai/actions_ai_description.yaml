Assign Entity:
  ai_description: >-
    Assigns a specific entity (Host or Account) to a user within the Vectra QUX platform.
    This action is primarily used to establish ownership or accountability for a detected
    threat or asset during an investigation. It creates a formal assignment record
    in Vectra, which can then be tracked or resolved. The action requires the internal
    Vectra IDs for both the user and the entity.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the API configuration and action parameters,
    including the User ID, Entity ID, and Entity Type (Host or Account).

    2. **Validation:** Validates that the provided User ID and Entity ID are valid
    integers.

    3. **API Interaction:** Sends a POST request to the Vectra QUX `/api/v2.5/assignments`
    endpoint to create the assignment.

    4. **Result Processing:** Parses the response into an Assignment object, adds
    a summary data table to the case, and provides the raw JSON response for further
    automation steps.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique internal identifier of the entity in Vectra
    QUX. |

    | Entity Type | DDL | Yes | Specifies whether the entity is a 'Host' or an 'Account'.
    |

    | User ID | String | Yes | The unique internal identifier of the Vectra user to
    whom the entity will be assigned. |


    ### Additional Notes:

    - This action does not run on SOAR entities automatically; it requires specific
    ID values provided as input parameters.

    - The 'Entity Type' parameter is case-insensitive in the logic but provided as
    a dropdown for ease of use.
