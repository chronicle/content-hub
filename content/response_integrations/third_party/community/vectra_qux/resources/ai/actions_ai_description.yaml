Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to a list of entity IDs (Account, Host, or Detection) in VectraQUX.


    ### Flow Description

    1. Extracts the list of tags and entity IDs from the action parameters.

    2. Iterates through each provided entity ID.

    3. Makes a GET request to the VectraQUX API to fetch the existing tags for the
    entity.

    4. Merges the new tags with the existing tags, ensuring no duplicates.

    5. Makes a PATCH request to the VectraQUX API to update the entity with the combined
    list of tags.

    6. Returns a summary table and JSON result containing the status of the tag updates.


    ### Additional Notes

    The action requires valid entity IDs and the corresponding entity type. If an
    entity is not found, it will be logged as a failure and the action will continue
    processing the remaining IDs.
