Describe Detection:
  ai_description: "### General Description\nThe **Describe Detection** action retrieves\
    \ comprehensive details for a specific detection from the Vectra QUX platform\
    \ using its unique identifier. This action is designed to provide analysts with\
    \ the full context, current state, and metadata associated with a security event,\
    \ facilitating deep-dive investigations within the Google SecOps environment.\n\
    \n### Parameters Description\n\n| Parameter | Description | Type | Mandatory |\
    \ Default Value |\n| :--- | :--- | :--- | :--- | :--- |\n| Detection ID | The\
    \ unique identifier of the detection to be retrieved. The action validates that\
    \ this input is a valid non-negative integer. | String | Yes | 0 |\n\n### Flow\
    \ Description\n1. **Parameter Extraction:** The action retrieves the `Detection\
    \ ID` from the user input and the API configuration (Root, Token, and SSL verification)\
    \ from the integration settings.\n2. **Validation:** It performs a validation\
    \ check to ensure the `Detection ID` is a valid integer. If the ID is invalid\
    \ or negative, the action fails with an error message.\n3. **API Request:** The\
    \ action initializes the `VectraQUXManager` and executes a GET request to the\
    \ Vectra QUX API endpoint `/api/v2.5/detections/{detection_id}`.\n4. **Data Parsing:**\
    \ The raw JSON response from the API is parsed into a structured `Detection` object\
    \ using the `VectraQUXParser`.\n5. **Result Output:** \n    - A data table titled\
    \ \"Describe Detection\" is created, containing key fields such as ID, Detection\
    \ Type, State, Category, and Source Entity information.\n    - The full raw JSON\
    \ data of the detection is added to the action's result JSON for use in subsequent\
    \ playbook steps.\n\n### Additional Notes\n- **Error Handling:** The action explicitly\
    \ handles cases where the detection is not found (404 error), providing a user-friendly\
    \ message to verify the ID.\n- **Entity Interaction:** This action does not process\
