Ping:
  ai_description: "The Ping action is a diagnostic utility designed to verify the\
    \ connectivity between the Google SecOps (Chronicle) environment and the Vectra\
    \ platform. It ensures that the integration's configuration parameters, such as\
    \ the API Root and API Token, are correct and that the network path is open.\n\
    \n### Parameters Description\n\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL of\
    \ the Vectra API instance (e.g., https://vectra-brain.example.com). |\n| API Token\
    \ | String | Yes | The authentication token used to authorize requests to the\
    \ Vectra API. |\n| Verify SSL | Boolean | Yes | Determines whether the action\
    \ should verify the SSL certificate of the Vectra server. Default is True. |\n\
    \n### Flow Description\n\n1.  **Initialization**: The action initializes the Siemplify\
    \ context and logs the start of the connectivity test.\n2.  **Configuration Extraction**:\
    \ It retrieves the integration's global configuration parameters, including the\
    \ API Root, API Token, and SSL verification setting.\n3.  **Manager Setup**: An\
    \ instance of the `VectraQUXManager` is created using the extracted credentials.\n\
    4.  **Connectivity Test**: The manager executes the `test_connectivity` method,\
    \ which performs a simple `GET` request to the Vectra `/api/v2.5/hosts` endpoint\
    \ to confirm the API is responsive and the token is valid.\n5.  **Result Handling**:\
    \ \n    *   If the request succeeds, the action returns a success message and\
    \ a boolean `True` result.\n    *   If the request fails (e.g., due to network\
    \ issues, invalid credentials, or SSL errors), an exception is caught, an error\
    \ message is logged, and the action returns `False` with a failure status."
