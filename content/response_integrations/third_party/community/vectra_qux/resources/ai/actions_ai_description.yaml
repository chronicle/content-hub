  ai_description: >-
    ### General Description

    This action assigns a specific entity (Host or Account) to a user within the Vectra
    QUX platform. It facilitates the management of entity assignments by linking a
    target entity to a designated user ID, enabling better tracking and ownership
    of security entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | string | Yes | The unique identifier of the entity (Account or Host)
    to be assigned. |

