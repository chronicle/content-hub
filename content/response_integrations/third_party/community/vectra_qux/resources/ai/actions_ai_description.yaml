    the action automatically prefixes the field with a minus sign for the API request.

    - The action cleans up URLs in the returned data by removing API versioning prefixes
    (e.g., `/api/v2.5`) to provide cleaner links for analysts.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration settings (API
    Root, Token) and all user-provided filter parameters.

    2. **Validation**: It validates numeric inputs like 'Limit', 'Threat GTE', and
    'Certainty GTE' to ensure they are valid integers.

    3. **API Request**: The action calls the Vectra QUX API's detections endpoint
    using a GET request, applying the constructed query parameters and pagination
    logic.

    4. **Data Processing**: If detections are found, the action iterates through the
    results to normalize URLs and extract key fields for display.

    5. **Output Generation**: The full raw data is attached as a JSON result, and
    a summary table titled 'List Of Detections' is added to the case wall for quick
    review.
