product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Vectra QUX integration is primarily a threat detection and response tool for
    hybrid and multi-cloud environments. The 'Vectra QUX - Entities Connector' ingests
    entities (Hosts/Accounts) and detections into the SOAR environment as alerts and
    events, which is a core SIEM function. The integration provides visibility into
    cloud-native resources, fitting the Cloud Security category. Additionally, actions
    like 'Describe Entity' and 'Search Hosts' allow analysts to retrieve detailed
    information about internal assets, which aligns with the Asset Inventory category.
    The integration does not perform EDR containment, network blocking, external threat
    intelligence enrichment, email security, IAM system management (of the identity
    itself), ITSM ticketing, vulnerability management, or collaboration/notification
    tasks.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
