Enrich Actor:
  ai_description: >-
    ### General Description

    Enriches Threat Actor entities using Cybersixgill Darkfeed. This action retrieves
    comprehensive threat intelligence regarding a threat actor's activity, including
    shared IOCs, targeted areas, and techniques used. It updates the entity's properties
    with the retrieved data, marks it as suspicious, and generates detailed case insights.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `THREATACTOR`.

    3. Makes an API call to Cybersixgill to fetch threat intelligence data for each
    Threat Actor identifier.

    4. Updates the entity's `additional_properties` with the retrieved intelligence
    and sets its `is_enriched` and `is_suspicious` flags to true.

    5. Creates a case insight and attaches an entity table containing the enrichment
    results to the case.


    ### Additional Notes

    This action relies on the Cybersixgill Darkfeed integration configuration for
    authentication. Ensure that the integration is properly configured with valid
    credentials.
  ai_short_description: >-
    Enriches Threat Actor entities using Cybersixgill Darkfeed to retrieve threat
    intelligence, update entity properties, and generate case insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Cybersixgill API (fetches_data=true). It does
      not perform any state-changing operations on external systems (can_mutate_external_data=false).
      Internally, it updates entity properties via `siemplify.update_entities` (can_update_entities=true)
      and creates case insights via `siemplify.create_case_insight` (can_create_insight=true).
      It does not modify alert data or create case comments.
