    identifies domains associated with compromised sites or those listed for sale
    on the dark web. It retrieves comprehensive threat intelligence, including actor
    details, post titles, severity, and confidence scores. The action updates entity
    attributes, marks entities as suspicious when matches are found, and generates
    detailed case insights and data tables for analyst review.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | None | This action does not have any input parameters. | N/A | N/A |


    ### Additional Notes

    - This action specifically targets Hostname entities to perform domain-based enrichment.

    - It automatically marks entities as suspicious if threat intelligence is found
    in the Cybersixgill database.


    ### Flow Description

    1. **Credential Retrieval**: Extracts the Client ID and Client Secret from the
    integration configuration.

    2. **Entity Filtering**: Identifies Hostname entities within the current context.

    3. **External Lookup**: Queries the Cybersixgill Darkfeed API for each domain
    to check for dark web presence or compromise.

    4. **Internal Enrichment**: Updates the entity's additional properties with Sixgill
    metadata and marks the entity as suspicious and enriched.

    5. **Reporting**: Generates a case insight, adds a data table to the entity, and
    provides external links (e.g., to the Sixgill Portal or VirusTotal) for further
    investigation.
