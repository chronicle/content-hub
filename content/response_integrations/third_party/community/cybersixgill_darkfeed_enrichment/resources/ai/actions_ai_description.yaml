    *   **Internal Updates:** This action automatically marks enriched entities as
    'Suspicious' and 'Enriched' within the Google SecOps platform if data is found.

    *   **External Links:** The action generates links to the Cybersixgill Portal,
    VirusTotal, and MITRE ATT&CK documentation where applicable.


