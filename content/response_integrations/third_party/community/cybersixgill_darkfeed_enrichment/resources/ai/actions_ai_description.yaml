  ai_description: "### General Description\nEnriches Threat Actor entities using Cybersixgill\
    \ Darkfeed intelligence. This action retrieves a comprehensive profile of a threat\
    \ actor's activity within underground forums and dark web sources over the last\
    \ 90 days. It identifies shared Indicators of Compromise (IOCs), areas of activity,\
    \ preferred targets, and techniques used by the actor. The retrieved data is used\
    \ to update entity attributes, add detailed properties, and generate insights\
    \ and data tables within the case for better analyst visibility.\n\n### Parameters\
    \ Description\n| Parameter Name | Expected Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This action does not have\
    \ any specific input parameters. It relies on the integration's configuration\
    \ (Client ID and Client Secret) and the entities present in the case. |\n\n###\
    \ Additional Notes\n- This action specifically targets entities of type `THREATACTOR`.\n\
    - It automatically marks enriched entities as 'Suspicious' and 'Enriched' within\
    \ the Google SecOps platform.\n- The action provides deep links to the Cybersixgill\
    \ portal for each identified post or activity.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Cybersixgill manager using the integration's Client\
    \ ID and Client Secret.\n2. **Entity Identification**: It identifies all `THREATACTOR`\
    \ entities within the current alert or case context.\n3. **Data Retrieval**: For\
    \ each identified actor, the action queries the Cybersixgill API to fetch intelligence\
    \ data, focusing on activity from the last 90 days.\n4. **Data Processing**: The\
    \ results are parsed to extract key information, including post titles, source\
    \ feeds, severity, confidence scores, and external references like MITRE ATT&CK\
    \ tactics/techniques or VirusTotal scores.\n5. **Internal Mutation (Enrichment)**:\
    \ \n    - Updates the entity's `additional_properties` with the retrieved Sixgill\
    \ metadata.\n    - Sets the entity's `is_enriched` and `is_suspicious` flags to\
    \ true.\n6. **Reporting**: \n    - Generates a detailed Case Insight containing\
    \ the actor's activity summary.\n    - Adds a Data Table to the entity with structured\
    \ information about the findings.\n    - Adds external links to the entity for\
    \ direct access to the Cybersixgill portal."
  capabilities:
