Enrich Actor:
  ai_description: >-
    Enriches Threat Actor entities using Cybersixgill Darkfeed intelligence to provide
    a comprehensive view of their underground activity. The action retrieves IOCs
    shared by the actor in the last 90 days, identifies their areas of activity, choice
    of targets, and techniques used. It updates the entity's metadata within Google
    SecOps, marks it as suspicious, and generates detailed insights including links
    to the Cybersixgill portal, VirusTotal, and MITRE ATT&CK frameworks.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves the Client ID and Client Secret from
    the integration configuration.

    2. **Entity Filtering:** Identifies and processes only Threat Actor entities from
    the current context.

    3. **Data Retrieval:** Queries the Cybersixgill API to fetch enrichment data specific
    to the threat actor's identifier.

    4. **Entity Enrichment:** Updates the entity's internal state by setting `is_enriched`
    and `is_suspicious` to true, and populates `additional_properties` with detailed
    intelligence (e.g., feed name, source, post titles, confidence, and severity).

    5. **Insight Generation:** Creates a case insight containing a summary of the
    actor's activity and adds data tables for structured visualization.

    6. **Link Association:** Adds external links to the entity for direct access to
    the Cybersixgill portal and related threat intelligence sources.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The API Client ID used to authenticate with Cybersixgill
    services. |

    | Client Secret | String | Yes | The API Client Secret used to authenticate with
    Cybersixgill services. |


    ### Additional Notes:

    This action specifically targets the `THREATACTOR` entity type. While the underlying
    processor supports other types, this specific implementation is scoped to actors
    to provide deep underground context.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (is_enriched, is_suspicious, additional_properties),
      creates case insights, adds entity tables, and associates external links with
      entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
      - THREATACTOR
