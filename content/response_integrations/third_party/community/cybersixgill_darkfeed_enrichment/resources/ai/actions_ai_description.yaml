    Enriches IP Address entities using Cybersixgill Darkfeed threat intelligence.
    This action retrieves detailed context regarding indicators of compromise (IOCs),
    including associations with C&C servers, botnets, DDoS attacks, proxy anonymization,
    and compromised RDP addresses. It provides reputation data, confidence scores,
    and severity levels to help analysts assess the risk of specific IP addresses.


