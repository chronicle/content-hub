Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using Cybersixgill Darkfeed threat intelligence.
    This action identifies if an IP is associated with malicious activities such as
    Command and Control (C&C) servers, botnets, DDoS attacks, or compromised RDP addresses.
    It retrieves detailed metadata including feed names, actors, confidence scores,
    and severity levels. The action automatically marks the entity as suspicious and
    enriched in Google SecOps, adds a detailed case insight, attaches a data table
    with the findings, and provides direct links to the Cybersixgill portal and external
    references like VirusTotal or MITRE ATT&CK.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    It relies on the integration's configuration for authentication. |


    ### Additional Notes

    - The action uses the **Client Id** and **Client Secret** configured at the integration
    level for authentication.

    - Entities found in the Cybersixgill Darkfeed are automatically marked as **Suspicious**
    and **Enriched**.

    - The action specifically targets **IP Address** entities.


    ### Flow Description

    1. **Authentication**: The action retrieves the Client ID and Client Secret from
    the integration configuration to authenticate with the Cybersixgill API.

    2. **Entity Filtering**: It identifies all IP Address entities within the current
    context.

    3. **Data Retrieval**: For each IP, it queries the Cybersixgill Darkfeed to find
    matching threat indicators.

    4. **Entity Enrichment**: If data is found, the entity is marked as 'Suspicious'
    and 'Enriched'. Additional properties (e.g., Sixgill Feedname, Actor, Confidence)
    are added to the entity's metadata.

    5. **Insight Generation**: A comprehensive case insight is created, summarizing
    the threat intelligence.

    6. **Result Visualization**: A data table is attached to the entity for easy review,
    and external links (e.g., to the Cybersixgill Portal or VirusTotal) are added
    to the entity's links section.
