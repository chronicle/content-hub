  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    the Google SecOps platform and the Cybersixgill Darkfeed Enrichment service. Its
    primary purpose is to ensure that the integration is correctly configured and
    that the provided API credentials (Client ID and Client Secret) are valid and
    authorized to make requests.


    ### Parameters Description

    There are no user-configurable parameters for this action. It relies solely on
    the integration's global configuration settings.


    ### Additional Notes

    - This action performs a live API call to Cybersixgill using a hardcoded test
    indicator (IP: `8.8.8.8`) to confirm end-to-end communication.

    - It is recommended to run this action during the initial setup of the integration
    or when troubleshooting authentication errors.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Client Id` and `Client
    Secret` from the integration's configuration.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` and the
    `SixgillActionResultProcessor` using the extracted credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    attempts to create a Cybersixgill client and perform a sample enrichment request
    for the IP address `8.8.8.8`.

    4. **Result Reporting**: Based on the success or failure of the API call, the
    action returns a completion status and a descriptive message to the SOAR interface.
