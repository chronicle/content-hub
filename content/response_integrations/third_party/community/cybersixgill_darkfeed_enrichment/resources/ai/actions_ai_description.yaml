    \ including associated IOCs, areas of activity, target preferences, and techniques\
    \ used by the actor over the last 90 days. \n\n### Flow Description\n1. The action\
    \ initializes the Sixgill client using the provided credentials.\n2. It iterates\
    \ through the target entities, specifically filtering for `THREATACTOR` types.\n\
