    1.  **Credential Retrieval:** Extracts the Client ID and Client Secret from the
    integration configuration.

    2.  **Entity Filtering:** Identifies all IP Address entities within the current
    alert scope.

    3.  **Data Retrieval:** Queries the Cybersixgill Darkfeed API for each identified
    IP address to fetch enrichment data.

    4.  **Entity Enrichment:** Updates the entity's additional properties with metadata
    such as feed name, source, actor, confidence, and severity. It also sets the entity's
    status to 'Suspicious' and 'Enriched'.

    5.  **Insight Generation:** Creates a detailed Case Insight for each enriched
    entity, summarizing the threat intelligence found.

    6.  **UI Enhancement:** Adds data tables to the entity view and provides direct
    links to external analysis tools (VirusTotal, MITRE) and the Cybersixgill portal.
