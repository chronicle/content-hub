Enrich Domain:
  ai_description: >-
    Enriches Domain (Hostname) entities using Cybersixgill Darkfeed threat intelligence.
    This action identifies if a domain is associated with compromised sites or is
    being sold on the dark web. It retrieves detailed metadata including feed names,
    actors, post titles, and external references to VirusTotal and MITRE ATT&CK. The
    action updates the entity's suspicious status, adds enrichment attributes, and
    generates detailed case insights and data tables for analyst review.


    ### Flow Description:

    1. **Credential Extraction:** Retrieves the Client ID and Client Secret from the
    integration configuration.

    2. **Entity Filtering:** Identifies all Hostname entities within the current context.

    3. **Intelligence Retrieval:** Queries the Cybersixgill API for each domain to
    find matches in dark web feeds.

    4. **Entity Enrichment:** Updates the entity's internal state (marking it as enriched
    and suspicious) and populates additional properties with Sixgill metadata.

    5. **Insight Generation:** Creates a detailed case insight containing a summary
    of the threat intelligence and adds a data table to the entity for structured
    viewing.

    6. **External Linking:** Adds links to the Cybersixgill portal and other external
    references (like VirusTotal) to the entity.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The API Client ID used to authenticate with Cybersixgill
    services. |

    | Client Secret | String | Yes | The API Client Secret used to authenticate with
    Cybersixgill services. |


    ### Additional Notes:

    This action specifically targets Hostname entities. While the underlying processor
    supports other types, this specific action script restricts processing to Hostnames.
  capabilities:
