Ping:
  ai_description: >-
    The Ping action is designed to verify the connectivity between the Google SecOps
    platform and the Cybersixgill Darkfeed Enrichment service. It ensures that the
    provided API credentials (Client ID and Client Secret) are valid and that the
    network path to the service is open.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the 'Client Id' and 'Client
    Secret' from the integration's configuration settings.

    2. **Manager Initialization:** It initializes the `SixgillEnrichManager` and `SixgillActionResultProcessor`
    using the extracted credentials.

    3. **Connectivity Test:** The action executes the `test_connectivity` method,
    which attempts to perform a sample IOC enrichment request for a hardcoded IP address
    (8.8.8.8) to confirm the API is responsive.

    4. **Result Reporting:** Based on the success or failure of the API call, the
    action returns a completion status and a descriptive message to the SOAR workbench.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters (Client Id and Client Secret).
