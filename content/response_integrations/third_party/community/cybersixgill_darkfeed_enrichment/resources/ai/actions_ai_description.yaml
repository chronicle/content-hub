    \ API. |\n| Client Secret | String | Yes | The Client Secret for authenticating\
    \ with the Sixgill API. |\n\n### Additional Notes\nThis action is specifically\
    \ designed to process `THREATACTOR` entities. While the underlying processor supports\
    \ other entity types, this specific action implementation restricts processing\
    \ to `THREATACTOR` only."
