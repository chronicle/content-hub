  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The cybersixgill_darkfeed_enrichment integration is designed to provide threat
    intelligence context for various indicators of compromise (IOCs). Its primary
    actions (Enrich Actor, Enrich Domain, Enrich Hash, Enrich IP, Enrich URL) all
    focus on fetching external threat data (reputation, actor details, MITRE mappings)
    and updating internal SOAR entities with this information. It does not perform
    SIEM log analysis, EDR host containment, network security blocking, email management,
    IAM operations, cloud resource management, ITSM ticketing, vulnerability scanning,
    asset inventory lookups, or collaboration/notification tasks. Therefore, it is
    exclusively classified under the Threat Intelligence category.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
