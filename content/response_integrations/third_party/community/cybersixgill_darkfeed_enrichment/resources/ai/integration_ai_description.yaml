  reasoning: >-
    The cybersixgill_darkfeed_enrichment integration is exclusively focused on enriching
    various Indicator of Compromise (IOC) types, including IP addresses, file hashes,
    URLs, domains, and threat actors, with threat intelligence data from the Cybersixgill
    Darkfeed platform. This functionality directly aligns with the Threat Intelligence
    category, as it provides reputation, malware family information, and threat context
    to help analysts confirm if an alert is a True Positive. The integration does
    not perform log searching (SIEM), host containment (EDR), network blocking (Network
    Security), email management (Email Security), identity management (IAM), cloud
    resource management (Cloud Security), ticketing (ITSM), vulnerability scanning
    (Vulnerability Management), asset inventory lookups (Asset Inventory), or collaboration/approval
    workflows (Collaboration).
  siem: false
  threat_intelligence: true
  vulnerability_management: false
