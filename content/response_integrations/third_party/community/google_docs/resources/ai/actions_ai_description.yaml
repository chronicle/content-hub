  ai_description: >-
    ### General Description

    Removes specific content ranges from a Google Document. This action interacts
    with the Google Docs API to execute a batch update that deletes text or elements
    based on provided start and end indices.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Document Id | String | Yes | The unique identifier of the Google Document, typically
    found in its URL (e.g., `https://docs.google.com/document/d/{YourDocumentId}/`).
    |

    | Json | Code (JSON) | Yes | A JSON-formatted string specifying the content ranges
    to remove. It must contain an `items` array where each object has a `start_index`
    and `end_index` indicating the offset of the element's beginning and end. |


