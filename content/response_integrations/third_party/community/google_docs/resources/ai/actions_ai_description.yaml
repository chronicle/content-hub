Remove Content:
  ai_description: >-
    ### General Description

    The **Remove Content** action allows users to programmatically delete specific
    sections of text or elements within a Google Document. By providing the document's
    unique ID and a JSON-formatted list of character offsets (start and end indices),
    the action executes a batch update to modify the document's body. This is particularly
    useful for automated redaction, cleaning up template placeholders, or removing
    sensitive information from shared documents.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Document Id** | String | Yes | The unique identifier of the Google Document,
    found in the URL (e.g., `https://docs.google.com/document/d/{DocumentId}/`). |

    | **Json** | Code | Yes | A JSON object containing an array of items. Each item
    must specify a `start_index` and `end_index` representing the character range
    to be removed. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google service account
    credentials from the integration settings.

    2. **Parameter Parsing:** It extracts the `Document Id` and the `Json` payload
    containing the deletion ranges.

    3. **Request Construction:** The action iterates through the provided JSON items
    and builds a list of `deleteContentRange` requests compatible with the Google
    Docs API.

    4. **API Execution:** It initializes the `GoogleDocsManager` and sends a `batchUpdate`
    request to the Google Docs service.

    5. **Result Handling:** The response from the Google API (detailing the update
    status) is attached to the action results, and the action completes with a success
    message.


    ### Additional Notes

    - The `start_index` and `end_index` are zero-based offsets based on the UTF-16
    code units of the document's body content.

    - Ensure the service account has sufficient permissions (Editor access) to modify
    the target document.
