Replace Content:
  ai_description: >-
    ### General Description

    The **Replace Content** action allows users to programmatically search and replace
    text within a specific Google Document. It is designed to handle multiple replacement
    pairs in a single execution by processing a JSON-formatted input. This is particularly
    useful for automating document templating, updating reports, or sanitizing sensitive
    information across Google Docs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Document Id** | string | True | The unique identifier of the Google Document.
    This can be extracted from the document's URL (e.g., `https://docs.google.com/document/d/{DocumentId}/`).
    |

    | **Json** | code | True | A JSON object containing an array of replacement items.
    Each item must include `text_to_search`, `text_to_replace`, and `match_case` (a
    string "true" or "false"). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Google Docs credentials
    from the integration configuration and the Document ID and JSON payload from the
    action parameters.

    2. **JSON Parsing:** The provided JSON string is parsed to extract the list of
    search and replace instructions.

    3. **Request Construction:** For each item in the input list, the action constructs
    a `replaceAllText` request compatible with the Google Docs API, specifying the
    search string, the replacement string, and whether to match the case.

    4. **API Execution:** The action uses the `GoogleDocsManager` to send a `batchUpdate`
    request to the Google Docs API for the specified Document ID.

    5. **Result Handling:** The API response (detailing the results of the batch update)
    is attached to the action's JSON results, and the action completes with a success
    message.


    ### Additional Notes

    - The `Json` parameter must follow a specific schema: `{"items": [{"text_to_search":
    "...", "text_to_replace": "...", "match_case": "true/false"}]}`.

    - This action requires a service account with appropriate permissions (specifically
    `https://www.googleapis.com/auth/drive.file`) to modify the target document.
