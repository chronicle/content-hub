  ai_description: >-
    ### General Description

    Creates a new Google Document and manages sharing permissions for specified users.
    This action is useful for automating the creation of incident reports, investigation
    notes, or collaborative documents directly from a SOAR playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | string | Yes | The title of the document to be created. Defaults to
    'New Document'. |

    | Role | ddl | Yes | The permission level granted to the specified emails. Options
    are 'owner' (full control), 'writer' (can edit/comment), or 'reader' (view only).
    |

    | Emails | string | Yes | A semicolon-separated list of email addresses (e.g.,
    'user1@example.com;user2@example.com') that will be granted the specified role
    on the document. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the document title, the desired
    user role, and the list of email addresses from the input parameters.

    2. **Document Creation:** It interacts with the Google Docs API to create a new,
    empty document with the provided title.

    3. **Permission Assignment:** It iterates through the provided list of email addresses
    and uses the Google Drive API to grant each user the specified access role (Owner,
    Writer, or Reader).

    4. **Metadata Retrieval:** After creation and sharing, it fetches the complete
    metadata for the new file from Google Drive.

    5. **Result Reporting:** The action returns the document metadata as a JSON result
    and provides the Document ID as the final script output.


    ### Additional Notes

    This action requires a valid Service Account JSON with appropriate Google Drive
    and Google Docs scopes configured in the integration settings.
