  ai_description: >-
    ### General Description

    The **Replace Content** action allows users to programmatically search for and
    replace specific text strings within a Google Document. It is designed for automated
    document updates, such as updating templates, reports, or logs stored in Google
    Docs. The action uses the Google Docs API `batchUpdate` method to perform multiple
    replacements in a single execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Document Id** | string | True | The unique identifier of the Google Document,
    found in the URL (e.g., `https://docs.google.com/document/d/{DocumentId}/`). |

    | **Json** | code | True | A JSON-formatted string containing an array of replacement
    items. Each item must include `text_to_search`, `text_to_replace`, and `match_case`
    (boolean string). |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google Docs service
    account credentials from the integration settings.

    2. **Parameter Parsing:** It extracts the target `Document Id` and the `Json`
    payload containing the search-and-replace logic.

    3. **Request Construction:** The action iterates through the provided JSON items
    and constructs a list of `replaceAllText` requests compatible with the Google
    Docs API.

    4. **API Execution:** It initializes the `GoogleDocsManager` and sends a `batchUpdate`
    request to the Google Docs service.

    5. **Result Handling:** The action returns the API response as a JSON object and
    concludes by outputting the Document ID as the primary result value.


    ### Additional Notes

    The `Json` parameter must follow a specific structure: `{"items": [{"text_to_search":
    "...", "text_to_replace": "...", "match_case": "true"}]}`. Failure to provide
    valid JSON will result in an error.
