  ai_description: >-
    ### General Description

    This action removes specific content ranges from a Google Doc. It utilizes the
    Google Docs API to perform a batch update, deleting text or elements defined by
    start and end indices provided in the input configuration.


    ### Flow Description

    1. The action extracts the `Document Id` and `Json` parameters from the configuration.

    2. It parses the `Json` parameter to retrieve a list of items, where each item
    contains `start_index` and `end_index` values.

    3. It constructs a list of `deleteContentRange` requests based on the parsed indices.

    4. The action initializes the `GoogleDocsManager` and executes the batch update
    request against the specified Google Doc.

    5. Finally, it returns the result of the operation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | Yes | The unique identifier of the Google Doc, found
    in the document URL. |

    | Json | code | Yes | A JSON object containing a list of items, where each item
    specifies the `start_index` and `end_index` of the content to be removed. |


    ### Additional Notes

    This action performs a destructive mutation on an external Google Doc. Ensure
    the provided indices are correct to avoid unintended data loss.
