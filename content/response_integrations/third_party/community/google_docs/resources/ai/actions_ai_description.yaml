  ai_description: >-
    ### General Description

    Removes specific content ranges from a Google Document. This action is useful
    for automated document redaction or cleaning up specific sections of a document
    based on character offsets (indices).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | Yes | The unique identifier of the Google Document, found
    in the document's URL (e.g., `https://docs.google.com/document/d/{DocumentId}/`).
    |

    | Json | code | Yes | A JSON object containing an array of items to remove. Each
    item must specify a `start_index` and an `end_index`. Example: `{"items": [{"start_index":
    1, "end_index": 10}]}`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Google Docs credentials
    from the integration configuration and the `Document Id` and `Json` payload from
    the action parameters.

    2. **JSON Parsing**: The `Json` string is parsed into a Python dictionary to extract
    the list of content ranges (items) to be deleted.

    3. **Request Construction**: For each item in the list, the action constructs
    a `deleteContentRange` request object containing the specified `startIndex` and
    `endIndex`.

    4. **API Execution**: The action uses the `GoogleDocsManager` to send a `batchUpdate`
    request to the Google Docs API with the compiled list of deletion requests.

    5. **Result Handling**: The response from the Google Docs API is captured and
    added to the action's JSON results, and the action completes with a success message.


    ### Additional Notes

    - The `start_index` and `end_index` are zero-based offsets from the beginning
    of the document body.

    - Ensure that the indices provided are valid and do not overlap in a way that
    causes API errors.
