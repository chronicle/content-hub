    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new document in Google Docs and modifies its sharing permissions via
      the Google Drive API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action creates a new document and assigns permissions in Google Docs, which
      mutates external data. It does not fetch contextual data for entities or alerts,
      nor does it mutate internal SecOps data such as entities, insights, or case
      comments.
  categories:
