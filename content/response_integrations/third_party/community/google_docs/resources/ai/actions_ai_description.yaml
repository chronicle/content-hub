  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Google Docs/Drive API. It ensures that the provided service
    account credentials are valid and that the environment has the necessary network
    permissions to reach Google's services.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Credentials Json | String | Yes | The JSON content of the Google Service Account
    key used for authentication. This is typically extracted from the integration
    configuration. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the `Credentials Json` from
    the integration settings.

    2. **Service Initialization:** It initializes the Google Drive and Google Docs
    API clients using the provided service account info and the required OAuth scopes.

    3. **Connectivity Test:** The action executes a `list` request to the Google Drive
    API (specifically looking for image/jpeg mime types as a lightweight check) to
    confirm the API is responsive.

    4. **Result Reporting:** If the API call is successful, the action terminates
    with a success status and a "Connected successfully" message. If any step fails
    (e.g., invalid JSON, authentication error, network timeout), the action will report
    a failure.


    ### Additional Notes

    - This action does not process any entities.

    - It is strictly used for configuration validation and troubleshooting.
