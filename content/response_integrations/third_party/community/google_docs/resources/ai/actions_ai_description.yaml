Create Document:
  ai_description: >-
    ### General Description

    Creates a new Google Document and assigns specific sharing permissions to a list
    of provided email addresses.


    ### Flow Description

    1. Extracts the document title, role, and target email addresses from the action
    parameters.

    2. Makes an API call to Google Docs (`docs.v1.documents.create`) to create a new
    document with the specified title.

    3. Iterates through the provided email addresses and makes API calls to Google
    Drive (`drive.v3.permissions.create`) to assign the specified role (owner, writer,
    or reader) to each user.

    4. Retrieves the newly created document's metadata via an API call to Google Drive
    (`drive.v3.files.get`).

    5. Returns the document metadata as a JSON result and outputs the document ID
    to the environment.


    ### Additional Notes

    The action requires valid Google service account credentials with the `https://www.googleapis.com/auth/drive.file`
    scope. Notifications are not sent to the users when permissions are added.
  ai_short_description: >-
    Creates a new Google Document and assigns specified sharing permissions to a list
    of email addresses.
