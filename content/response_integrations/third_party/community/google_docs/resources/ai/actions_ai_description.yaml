Create Content:
  ai_description: >-
    ### General Description

    The **Create Content** action allows users to programmatically insert text into
    an existing Google Document. It is designed to automate the documentation process
    by placing specific strings of text at designated character offsets (indices)
    within the document body. This is particularly useful for appending automated
    report summaries, logs, or status updates to a centralized document.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Document Id** | String | True | The unique identifier of the Google Document,
    found in the URL (e.g., `https://docs.google.com/document/d/{DocumentId}/`). |

    | **Json** | Code | True | A JSON-formatted string containing an array of items.
    Each item must include an `index` (integer) representing the character position
    and `text` (string) representing the content to insert. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the service account credentials
    from the integration settings.

    2. **Parameter Parsing:** It extracts the target `Document Id` and the `Json`
    payload containing the content updates.

    3. **Request Construction:** The action parses the input JSON and iterates through
    the items to build a list of `insertText` requests compatible with the Google
    Docs API.

    4. **API Execution:** It utilizes the `GoogleDocsManager` to send a `batchUpdate`
    request to the Google Docs service.

    5. **Result Handling:** The response from the Google Docs API (confirming the
    updates) is attached as a JSON result in the SOAR platform, and the action completes
    with a success message.


    ### Additional Notes

    - The `index` parameter in the JSON input is zero-based. Ensure the index exists
    within the document's current character range to avoid API errors.

    - This action requires the `https://www.googleapis.com/auth/drive.file` scope
    to be authorized for the service account.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
