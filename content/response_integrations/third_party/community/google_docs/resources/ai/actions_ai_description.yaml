  ai_description: >-
    ### General Description

    Creates a new document in Google Docs and assigns specific sharing permissions
    to provided email addresses. This action interacts with both the Google Docs API
    to generate the document and the Google Drive API to apply the requested access
    controls.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Title | String | Yes | The title of the document you would like to create. |

    | Role | Drop-down | Yes | The permission level to grant to the specified emails.
    Options include 'owner' (allows any changes), 'reader' (allows viewing only),
    and 'writer' (allows leaving comments/editing). |

    | Emails | String | Yes | A semicolon-separated list of email addresses to share
    the document with. |


    ### Additional Notes

    There are no optional parameters; all parameters must be configured for the action
    to execute successfully. The action suppresses email notifications to the users
    when permissions are granted.


    ### Flow Description

    1. Extracts the document title, role, and target email addresses from the action
    parameters.

    2. Authenticates with the Google Docs and Drive APIs using the provided service
    account credentials.

    3. Creates a new document with the specified title via the Google Docs API.

    4. Iterates through the provided email addresses and assigns the specified role
    (permissions) to each user for the newly created document via the Google Drive
    API.

    5. Retrieves the metadata of the created document and attaches it to the action's
    JSON result.

    6. Completes the action and returns the new document's ID.
  capabilities:
