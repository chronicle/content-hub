Replace Content:
  ai_description: >-
    ### General Description

    Replaces specific text within a Google Docs document using a provided JSON configuration.
    It interacts with the Google Docs API to perform batch updates, searching for
    specified text strings and replacing them with new values.


    ### Flow Description

    1. Extracts the Document ID and the JSON configuration containing the text replacement
    rules from the action parameters.

    2. Parses the JSON to extract the text to search, the replacement text, and case-matching
    preferences.

    3. Constructs a batch update request containing `replaceAllText` commands for
    the Google Docs API.

    4. Executes the request via the Google Docs API to replace the text in the specified
    document.

    5. Returns the API response as a JSON result to the SecOps platform.


    ### Additional Notes

    The JSON parameter must follow a specific structure containing an `items` array
    with `text_to_search`, `text_to_replace`, and `match_case` keys.
