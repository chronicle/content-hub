  ai_description: >-
    ### General Description

    This action updates a Google Document by inserting text at specified locations.
    It leverages the Google Docs API to perform batch updates on a document identified
    by its ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | Yes | The unique identifier of the Google Document to
    be updated. This can be found in the document's URL. |

    | Json | code | Yes | A JSON-formatted string containing the items to insert.
    Each item must specify the `index` (offset) and `text` to be inserted. |


    ### Flow Description

    1. The action extracts the `Document Id` and the `Json` content payload from the
    action parameters.

    2. The `Json` parameter is parsed to extract the list of items, each containing
    an `index` and `text`.

    3. A batch update request is constructed for each item.

    4. The `GoogleDocsManager` executes the batch update request against the specified
    Google Document.

    5. The result of the operation is added to the action results.


    ### Additional Notes

    This action performs a direct mutation on an external Google Document. It does
    not interact with any SOAR entities or internal case data.
