  ai_description: >-
    ### General Description

    This action creates a new Google Document and configures sharing permissions for
    specified users. It leverages the Google Drive and Google Docs APIs to generate
    a document with a custom title and assign specific access roles (Owner, Writer,
    or Reader) to a list of email addresses.


    ### Flow Description

    1. **Extraction**: The action extracts the `Title`, `Role`, and `Emails` parameters
    from the action configuration.

    2. **Initialization**: It initializes the `GoogleDocsManager` using the provided
    credentials to authenticate with Google Drive and Docs services.

    3. **Creation**: It creates a new document via the Google Docs API.

    4. **Permission Assignment**: It iterates through the provided email addresses
    and applies the specified permission role to the newly created document using
    the Google Drive API.

    5. **Result**: It retrieves the metadata of the created file and returns it as
    the action result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | string | Yes | The title of the document to be created. |

    | Role | ddl | Yes | The permission level to assign: "owner", "writer", or "reader".
    |

    | Emails | string | Yes | A semicolon-separated list of email addresses to share
    the document with. |


    ### Additional Notes

    There are no additional notes.
