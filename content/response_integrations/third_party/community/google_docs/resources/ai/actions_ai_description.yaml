  ai_description: >-
    ### General Description

    Creates new text content within a specific Google Document. The action interacts
    with the Google Docs API to insert text at specified index locations within the
    document's body.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Document Id | String | Yes | The unique identifier of the Google Document, typically
    found in its URL (e.g., `https://docs.google.com/document/d/{YourDocumentId}/`).
    |

    | Json | Code/String | Yes | A JSON-formatted string specifying the text to insert
    and the exact index locations within the document. Expected format includes an
    `items` array with `index` and `text` key-value pairs. |


    ### Flow Description

    1. Extracts the `Document Id` and the `Json` payload containing the text and index
    locations.

    2. Parses the JSON to construct a batch update request (`insertText`) for the
    Google Docs API.

    3. Executes the request to insert the text into the specified document.

    4. Returns the API response as a JSON result and completes the action.
