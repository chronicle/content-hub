Remove Content:
  ai_description: >-
    ### General Description

    Removes specific content ranges from a Google Docs document using the Google Docs
    API. This action allows automated deletion of text or elements by specifying their
    start and end indices within the document.


    ### Flow Description

    1. Extracts the `Document Id` and the `Json` payload containing the start and
    end indices of the content to be removed.

    2. Parses the JSON payload to construct a list of `deleteContentRange` requests.

    3. Authenticates with the Google Docs API using the provided service account credentials.

    4. Executes a `batchUpdate` API call to the Google Docs API to delete the specified
    content ranges from the document.

    5. Returns the API response as a JSON result and completes the action.


    ### Additional Notes

    The `Json` parameter must be formatted correctly as a JSON object containing an
    `items` array, where each item specifies a `start_index` and `end_index` (e.g.,
    `{"items": [{"start_index": 1, "end_index": 2}]}`).
