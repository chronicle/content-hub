  ai_description: >-
    ### General Description

    This action modifies the content of a Google Doc by replacing specific text strings
    based on a provided JSON configuration. It leverages the Google Docs API to perform
    batch updates on a target document, allowing for automated document editing within
    a SOAR workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | Yes | The unique identifier of the Google Doc to be modified.
    This can be found in the document's URL. |

    | Json | code | Yes | A JSON object containing a list of replacement items. Each
    item must include `text_to_search` (the string to find), `text_to_replace` (the
    new string), and `match_case` (a boolean string indicating if the search should
    be case-sensitive). |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Document Id` and the `Json`
    configuration string from the action parameters.

    2. **JSON Parsing**: The `Json` string is parsed into a list of replacement items.

    3. **Request Construction**: For each item, a `replaceAllText` request is constructed,
    incorporating the search text, replacement text, and case-sensitivity settings.

    4. **Execution**: The action initializes the `GoogleDocsManager` and executes
    a batch update request against the specified Google Doc.

    5. **Result**: The result of the batch update is added to the action output, and
    the action concludes with a success message.
