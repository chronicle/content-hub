Ping:
  ai_description: >-
    ### General Description


    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Google Docs and Google Drive APIs. It ensures that the provided service
    account credentials are valid and that the integration has the necessary permissions
    to communicate with the Google Cloud environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any input parameters. It relies
    on the 'Credentials Json' provided in the integration configuration. |


    ### Flow Description


    1. **Credential Extraction**: The action retrieves the service account JSON from
    the integration's global configuration.

    2. **Service Initialization**: It initializes the Google Docs and Google Drive
    API clients using the provided credentials and the required scopes.

    3. **Connectivity Test**: It executes a lightweight 'list' request to the Google
    Drive API to verify that the connection is active and authorized.

    4. **Result Reporting**: If the API call is successful, the action concludes with
    a success message. If any step fails (e.g., invalid JSON or authentication error),
    an exception is raised.


    ### Additional Notes


    This action is strictly for diagnostic purposes and does not perform any data
    enrichment or modification in either Google SecOps or the Google Docs environment.
