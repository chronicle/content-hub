    batch updates on a target document, allowing for automated document editing within
    a SOAR workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | Yes | The unique identifier of the Google Doc to be modified.
    This can be found in the document's URL. |

    | Json | code | Yes | A JSON object containing a list of replacement items. Each
