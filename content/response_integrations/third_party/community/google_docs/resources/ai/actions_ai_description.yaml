Create Content:
  ai_description: >-
    ### General Description

    Creates new content in a specific Google Docs document by inserting text at specified
    indices. This action interacts with the Google Docs API to perform a batch update,
    modifying the external document based on the provided JSON payload.


    ### Flow Description

    1. Extracts the `Document Id` and the `Json` payload containing the text and target
    indices.

    2. Parses the JSON payload to construct a list of `insertText` requests.

    3. Authenticates with the Google Docs API using the integration's service account
    credentials.

    4. Executes a `batchUpdate` API call to the Google Docs API to insert the text
    into the specified document.

    5. Returns the API response as a JSON result and completes the action.


    ### Additional Notes

    The `Json` parameter must follow a specific structure containing an `items` array,
    where each item includes an `index` (integer) and `text` (string) to indicate
    where the content should be inserted.
  ai_short_description: >-
    Creates new content in a specific Google Docs document by inserting text at specified
    indices using the Google Docs API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a Google Docs document by inserting new text content via the Google
      Docs API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch contextual data for alerts or entities. It mutates
      external data by calling the Google Docs API (`batchUpdate`) to insert text
      into a document. It does not mutate internal SecOps data, update entities, create
      insights, modify alert data, or create case comments.
