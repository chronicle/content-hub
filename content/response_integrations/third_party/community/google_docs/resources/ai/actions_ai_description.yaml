  ai_description: >-
    ### General Description

    Creates and inserts text content into a specific Google Document. This action
    allows users to programmatically update a document by providing a list of text
    strings and their corresponding insertion indices. It is useful for automated
    reporting, logging, or document generation within a workflow.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document Id | string | True | The unique identifier of the Google Document,
    which can be found in the document's URL (e.g., https://docs.google.com/document/d/{DocumentId}/).
    |

    | Json | code | True | A JSON-formatted string containing an array of items to
    insert. Each item must include an `index` (the character offset where the text
    should be inserted) and the `text` to be inserted. |


    ### Additional Notes

    The `Json` parameter must follow a specific structure: `{"items": [{"index": 1,
    "text": "example"}]}`. The indices refer to the character offsets in the document;
    ensure that the indices provided are valid for the target document's current length
    to avoid errors.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google Docs service
    account credentials from the integration configuration.

    2. **Parameter Parsing:** It extracts the `Document Id` and the `Json` payload
    containing the content to be inserted.

    3. **Request Construction:** The action parses the JSON input and iterates through
    the items to build a list of `insertText` requests compatible with the Google
    Docs `batchUpdate` API.

    4. **API Execution:** It initializes the `GoogleDocsManager` and executes the
    batch update request against the specified document.

    5. **Result Handling:** The action captures the API response, adds it to the result
    JSON, and concludes with a success message.
