  ai_description: >-
    ### General Description\nThis action creates a new Google Document and configures
    sharing permissions for specified users. It leverages the Google Drive and Google
    Docs APIs to generate a document with a custom title and assign specific access
    roles (Owner, Writer, or Reader) to a list of email addresses.\n\n### Flow Description\n1.
    **Extraction**: The action extracts the `Title`, `Role`, and `Emails` parameters
    from the action configuration.\n2. **Initialization**: It initializes the `GoogleDocsManager`
    using the provided credentials to authenticate with Google Drive and Docs services.\n3.
    **Creation**: It creates a new document via the Google Docs API.\n4. **Permission
    Assignment**: It iterates through the provided email addresses and applies the
    specified permission role to the newly created document using the Google Drive
    API.\n5. **Result**: It retrieves the metadata of the created file and returns
    it as the action result.\n\n### Parameters Description\n| Parameter | Type | Mandatory
    | Description |\n| :--- | :--- | :--- | :--- |\n| Title | string | Yes | The title
    of the document to be created. |\n| Role | ddl | Yes | The permission level to
    assign: "owner", "writer", or "reader". |\n| Emails | string | Yes | A semicolon-separated
    list of email addresses to share the document with. |\n\n### Additional Notes\nThere
    are no additional notes.
