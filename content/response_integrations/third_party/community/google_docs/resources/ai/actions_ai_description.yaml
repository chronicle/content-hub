Create Document:
  ai_description: >-
    ### General Description

    Creates a new Google Document and manages its initial sharing permissions. This
    action is useful for automated reporting, incident documentation, or collaborative
    evidence gathering during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | string | Yes | The document title of the document you would like to
    create. Default is 'New Document'. |

    | Role | ddl | Yes | The permission level to grant to the specified emails. Options:
    'owner' (full control), 'writer' (can comment/edit), 'reader' (view only). |

    | Emails | string | Yes | Semicolon-separated list of email addresses (e.g., 'user1@company.com;user2@company.com')
    to grant access to the document. |


    ### Additional Notes

    - The action requires a valid Service Account JSON with 'https://www.googleapis.com/auth/drive.file'
    scope configured in the integration settings.

    - Notifications are not sent to the users when permissions are added.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the document title, the desired access
    role, and the list of email addresses from the action input.

    2. **Document Creation**: Uses the Google Docs API to create a new, empty document
    with the specified title.

    3. **Permission Assignment**: Parses the semicolon-separated email list and iterates
    through each email, using the Google Drive API to create user-specific permissions
    based on the selected role.

    4. **Metadata Retrieval**: Fetches the complete metadata of the newly created
    file from Google Drive.

    5. **Result Reporting**: Returns the document metadata (including the Document
    ID) to the SOAR platform and sets the Document ID as the action's result value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
