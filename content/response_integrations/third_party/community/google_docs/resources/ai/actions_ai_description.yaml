    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Document Id | String | Yes | The unique identifier of the Google Document, which
    can be found in its URL. |

    | Json | Code (JSON) | Yes | A JSON-formatted string containing an array of `items`.
