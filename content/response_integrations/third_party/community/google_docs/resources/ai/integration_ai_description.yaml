  network_security: false
  reasoning: >-
    The google_docs integration provides actions to create, update, remove, and replace
    content within Google Documents. These capabilities are focused on document management
    and do not perform security-specific functions. The integration does not interact
    with logs (SIEM), host processes (EDR), network traffic (Network Security), threat
    intelligence enrichment, email management, identity management, cloud infrastructure
    security (GCP/AWS/Azure resources), ticketing (ITSM), vulnerability management,
    asset inventory, or collaborative alerting/approval workflows. Therefore, it does
    not align with any of the defined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
