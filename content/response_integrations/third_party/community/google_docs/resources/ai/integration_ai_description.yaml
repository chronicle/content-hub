  reasoning: >-
    The 'google_docs' integration provides functionality to create, update, remove,
    and replace content within Google Documents. These actions are general-purpose
    document management tasks and do not align with any of the defined security-focused
    product categories. The integration does not perform SIEM log analysis, EDR host
    containment, threat intelligence enrichment, network security blocking, email
    management, identity management, cloud resource monitoring, ITSM ticketing, vulnerability
    assessment, asset inventory management, or collaboration/notification tasks. Therefore,
    all product category flags are set to false.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
