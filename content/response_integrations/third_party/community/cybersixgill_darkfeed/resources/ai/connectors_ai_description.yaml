Cybersixgill - Darkfeed Connector:
  ai_description: "### General Description\nThe Cybersixgill Darkfeed Connector integrates\
    \ Google SecOps with the Cybersixgill Darkfeed service to provide automated, real-time\
    \ threat intelligence. It fetches malicious indicators of compromise (IOCs)\u2014\
    including domains, URLs, file hashes, and IP addresses\u2014directly from the\
    \ deep and dark web. By ingesting these indicators as alerts, the connector enables\
    \ security teams to proactively identify and block threats targeting their organization.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| PythonProcessTimeout | String | Yes | The timeout\
    \ limit (in seconds) for the python process running the connector script. |\n\
    | EventClassId | String | Yes | The field name used to determine the event name\
    \ (sub-type). |\n| DeviceProductField | String | Yes | The field name used to\
    \ determine the device product. |\n| Client Secret | String | Yes | The secret\
    \ key for authenticating with the Cybersixgill API. |\n| Client Id | String |\
    \ Yes | The client ID for authenticating with the Cybersixgill API. |\n| Alerts\
    \ Limit | Integer | Yes | The maximum number of alerts to be ingested into the\
    \ platform per run. |\n\n### Flow Description\n1. The connector initializes the\
    \ connection to the Cybersixgill Darkfeed API using the provided Client ID and\
    \ Client Secret.\n2. It queries the Darkfeed service to retrieve a bundle of threat\
    \ intelligence records.\n3. The retrieved records are filtered to ensure only\
    \ valid indicators are processed.\n4. For each indicator, the connector parses\
    \ the data to extract specific IOC types (e.g., MD5, SHA-1, SHA-256, URL, Domain,\
    \ IP) and enriches the alert with external references, such as VirusTotal reputation\
    \ scores and MITRE ATT&CK tactics.\n5. The connector maps the processed data into\
    \ the Google SecOps alert format, including relevant metadata such as severity,\
    \ confidence, and actor information.\n6. Finally, the connector commits the processed\
    \ indicators to the Cybersixgill service and ingests the generated alerts into\
    \ the SOAR platform for further investigation and response."
