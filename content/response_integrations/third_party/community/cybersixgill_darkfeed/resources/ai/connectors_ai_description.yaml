Cybersixgill - Darkfeed Connector:
  ai_description: >-
    ### General Description

    The Cybersixgill Darkfeed Connector integrates Google SecOps SOAR with the Cybersixgill
    Darkfeed service. It automatically ingests real-time threat intelligence, specifically
    malicious indicators of compromise (IOCs) such as domains, URLs, file hashes,
    and IP addresses. By fetching these indicators, the connector enables organizations
    to preemptively identify and block threats identified on the deep and dark web.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Client Secret | Password | Yes | The secret key for Cybersixgill API authentication.
    |

    | Client Id | String | Yes | The Client ID for Cybersixgill API authentication.
    |

    | Alerts Limit | Integer | Yes | The maximum number of alerts to be ingested into
    the platform per run. |


    ### Flow Description

    1. The connector initializes the connection to the Cybersixgill Darkfeed API using
    the provided Client ID and Client Secret.

    2. It queries the Darkfeed stream to retrieve a bundle of threat intelligence
    records.

    3. The retrieved records are filtered to ensure only valid indicators are processed
    and that revoked items are ignored.

    4. For each valid indicator, the connector parses the pattern data using regex
    to extract specific IOC types (File Hashes, URLs, Domains, IP addresses).

    5. It maps the indicator data into a standardized SOAR Alert format, including
    metadata such as threat actor, confidence score, severity, and MITRE ATT&CK mapping.

    6. The processed alerts are ingested into the SOAR platform, and the connector
    commits the indicators to the Cybersixgill client.
