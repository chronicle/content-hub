Cybersixgill - Darkfeed Connector:
  ai_description: >-
    ### General Description

    The Cybersixgill Darkfeed connector integrates with Cybersixgill's automated threat
    intelligence platform to ingest malicious Indicators of Compromise (IOCs) sourced
    from the deep and dark web. It provides real-time, actionable data including domains,
    URLs, hashes, and IP addresses, enabling security teams to preemptively identify
    and block threats within the Google SecOps environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the current script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Client Secret | Password | Yes | The Secret Key used for authentication with
    Cybersixgill. |

    | Client Id | String | Yes | The Client ID used for authentication with Cybersixgill.
    |

    | Alerts Limit | Integer | Yes | The maximum number of alerts to be ingested into
    the platform per execution cycle. |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Cybersixgill API using
    the provided Client ID and Client Secret.

    2. **Data Retrieval**: It queries the Cybersixgill Darkfeed stream for a batch
    of indicators, limited by the "Alerts Limit" parameter.

    3. **Filtering**: The connector filters the retrieved objects to ensure they are
    valid indicators and have not been revoked.

    4. **Parsing**: For each indicator, the connector parses the STIX pattern to extract
    specific IOC types such as MD5, SHA-1, SHA-256 hashes, URLs, domains, and IPv4
    addresses.

    5. **Enrichment**: It enriches the event data with additional context, including
    VirusTotal positive rates and MITRE ATT&CK tactics/descriptions where available.

    6. **Case Creation**: Each indicator is mapped to a Google SecOps Alert and Event,
    then ingested into the system.

    7. **Checkpointing**: The connector commits the processed indicators back to the
    Cybersixgill client to ensure subsequent runs fetch only new data.
