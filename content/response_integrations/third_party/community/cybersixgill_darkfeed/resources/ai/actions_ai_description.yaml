  ai_description: "Tests connectivity to the Cybersixgill service by validating the\
    \ provided API credentials. \n\n### Parameters\n| Parameter | Type | Mandatory\
    \ | Description |\n| --- | --- | --- | --- |\n| Client Id | String | Yes | The\
    \ Client ID for Cybersixgill authentication. |\n| Client Secret | String | Yes\
    \ | The Client Secret for Cybersixgill authentication. |\n\n### Flow Description\n\
    1. Extract the `Client Id` and `Client Secret` from the integration configuration.\n\
    2. Initialize the `SixgillEnrichManager` with the provided credentials.\n3. Attempt\
    \ to authenticate with the Cybersixgill API to retrieve an access token.\n4. Return\
    \ the connection status and a success/failure message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check (Ping) to verify API credentials. It
      does not fetch data for entities, mutate external systems, or modify internal
      SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping', which is explicitly excluded from being an enrichment
      action per the provided guidelines.
