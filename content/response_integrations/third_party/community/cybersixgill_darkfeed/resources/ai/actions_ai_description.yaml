Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Cybersixgill Darkfeed service. It serves as a diagnostic tool to ensure
    that the integration's configuration parameters, specifically the Client ID and
    Client Secret, are correct and that the SecOps environment can successfully authenticate
    with the Cybersixgill API.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Client Id` and `Client
    Secret` from the integration's global configuration.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` using
    the extracted credentials.

    3. **Authentication Check**: The manager attempts to create a Sixgill client and
    perform a handshake by requesting an access token from the Cybersixgill API.

    4. **Execution Completion**: If the access token is successfully retrieved, the
    action returns a success message and a boolean `True` result. If the authentication
    fails or a network error occurs, the action raises an error and reports the failure.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    As per standard SOAR practices, this action is used to validate the health of
    the integration connector and does not process any entities or modify any data.
