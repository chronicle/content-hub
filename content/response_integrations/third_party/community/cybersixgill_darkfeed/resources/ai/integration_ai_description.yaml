  reasoning: >-
    The Cybersixgill Darkfeed integration is primarily a Threat Intelligence provider.
    Its core function, as described in the connector description, is to fetch malicious
    indicators of compromise (IOCs) such as domains, URLs, file hashes, and IP addresses
    from the deep and dark web and ingest them as alerts into the SOAR platform. It
    does not perform SIEM log searching, EDR host-level analysis, network gateway
    blocking, or other operational tasks directly. Therefore, it fits exclusively
    into the Threat Intelligence category.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
