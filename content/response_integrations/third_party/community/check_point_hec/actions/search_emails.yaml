creator: admin
description: Search for emails.
dynamic_results_metadata: []
integration_identifier: CheckPointHEC
name: Search Emails
parameters:
-   default_value: ''
    description: 'Start date to get emails in ISO 8601 format. The arguments `date_last` and `date_from` with 
    `date_to` are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: true
    name: Date From
    type: string
-   default_value: ''
    description: 'End date to get emails in ISO 8601 format. The arguments `date_last` and `date_from` with 
    `date_to` are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Date To
    type: string
-   default_value: ''
    description: SaaS application to retrieve emails from.
    is_mandatory: true
    name: SaaS
    optional_values:
    - Microsoft Exchange
    - Gmail
    type: ddl
-   default_value: ''
    description: Email precedence.
    is_mandatory: false
    name: Direction
    optional_values:
    - Internal
    - Incoming
    - Outgoing
    type: ddl
-   default_value: ''
    description: 'Emails with subject containing the given value. The arguments `subject_contains` and `subject_match` 
    are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Subject Contains
    type: string
-   default_value: ''
    description: 'Emails with subject matching the given value. The arguments `subject_contains` and `subject_match` 
    are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Subject Match
    type: string
-   default_value: ''
    description: 'Emails with sender email containing the given value. The arguments `sender_contains` and 
    `sender_match` are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Sender Contains
    type: string
-   default_value: ''
    description: 'Emails with sender email matching the given value. The arguments `sender_contains` and `sender_match` 
    are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Sender Match
    type: string
-   default_value: ''
    description: Emails with sender domain matching the given value.
    is_mandatory: false
    name: Domain
    type: string
-   default_value: ''
    description: Detection by Check Point.
    is_mandatory: false
    name: CP Detection
    optional_values:
    - Phishing
    - Suspected Phishing
    - Malware
    - Suspected Malware
    - Spam
    - Clean
    - DLP
    - Malicious URL Click
    - Malicious URL
    type: multi_choice_parameter
-   default_value: ''
    description: Detection by Microsoft.
    is_mandatory: false
    name: MS Detection
    optional_values:
    - Malware
    - High Confidence Phishing
    - Phishing
    - High Confidence Spam
    - Spam
    - Bulk
    - Clean
    type: multi_choice_parameter
-   default_value: OR
    description: Detection operator.
    is_mandatory: false
    name: Detection Op
    optional_values:
    - OR
    - AND
    type: ddl
-   default_value: ''
    description: Sender server ip.
    is_mandatory: false
    name: Server IP
    type: string
-   default_value: ''
    description: 'Emails with recipients containing the given value. The arguments `recipients_contains` and 
    `recipients_match` are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Recipients Contains
    type: string
-   default_value: ''
    description: 'Emails with recipients matching the given value. The arguments `recipients_contains` and 
    `recipients_match` are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Recipients Match
    type: string
-   default_value: ''
    description: Emails with links in body matching the given value.
    is_mandatory: false
    name: Links
    type: string
-   default_value: ''
    description: Get specific email by message id.
    is_mandatory: false
    name: Message ID
    type: string
-   default_value: ''
    description: Quarantine authored by Check Point.
    is_mandatory: false
    name: CP Quarantined State
    optional_values:
    - Quarantined (Any source)
    - Not Quarantined
    - Quarantined by Check Point
    - Quarantined by CP Analyst
    - Quarantined by Admin
    type: ddl
-   default_value: ''
    description: Quarantine authored by Microsoft.
    is_mandatory: false
    name: MS Quarantined State
    optional_values:
    - Quarantined
    - Not Quarantined
    - Not Quarantined Delivered to Inbox
    - Not Quarantined Delivered to Junk
    type: ddl
-   default_value: OR
    description: Quarantine state operator.
    is_mandatory: false
    name: Quarantined State Op
    optional_values:
    - OR
    - AND
    type: ddl
-   default_value: ''
    description: 'Emails with sender name containing the given value. The arguments `name_contains` and `name_match` 
    are mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Name Contains
    type: string
-   default_value: ''
    description: 'Emails with sender name matching the given value. The arguments `name_contains` and `name_match` are 
    mutually exclusive and cannot be specified together in the same request.'
    is_mandatory: false
    name: Name Match
    type: string
-   default_value: ''
    description: Sender client IP.
    is_mandatory: false
    name: Client IP
    type: string
-   default_value: ''
    description: Attachment MD5 checksum.
    is_mandatory: false
    name: Attachment MD5
    type: string
script_result_name: is_success
