creator: admin
description: Retrieve specific email scan with positive threats.
dynamic_results_metadata: []
integration_identifier: CheckPointHEC
name: Scan Info
parameters:
-   default_value: ''
    description: Entities list, separated by comma.
    is_mandatory: true
    name: Entities
    type: string
-   default_value: ''
    description: New classification.
    is_mandatory: true
    name: Classification
    type: ddl
    optional_values:
    - Clean Email
    - Spam
    - Phishing
    - Legit Marketing Email
-   default_value: ''
    description: Confidence level.
    is_mandatory: true
    name: Confident
    type: ddl
    optional_values:
    - Not so sure
    - Medium Confidence
    - High Confidence
script_result_name: is_success
