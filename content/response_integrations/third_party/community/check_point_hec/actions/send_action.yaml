creator: admin
description: Use Send Action to quarantine, restore or decline restore requests for emails.
dynamic_results_metadata: []
integration_identifier: CheckPointHEC
name: Send Action
parameters:
-   default_value: ''
    description: One or multiple Email ids to apply action over. Use comma to separate multiple IDs.
    is_mandatory: true
    name: Entities
    type: string
-   default_value: ''
    description: SaaS application to apply action over.
    is_mandatory: true
    name: SaaS
    type: ddl
    optional_values:
    - Microsoft Exchange
    - Gmail
-   default_value: ''
    description: Action to perform.
    is_mandatory: true
    name: Action
    type: ddl
    optional_values:
    - quarantine
    - restore
    - decline_restore_request
-   default_value: ''
    description: Reason to decline restore request.
    is_mandatory: false
    name: Restore Decline Reason
    type: string
script_result_name: is_success
