creator: admin
description: Retrieve security events.
dynamic_results_metadata: []
integration_identifier: CheckPointHEC
name: Get Events
parameters:
-   default_value: ''
    description: Start date in ISO 8601 format.
    is_mandatory: true
    name: Start Date
    type: string
-   default_value: ''
    description: End date in ISO 8601 format, now by default.
    is_mandatory: false
    name: End Date
    type: string
-   default_value: ''
    description: SaaS application to retrieve events from.
    is_mandatory: false
    name: SaaS Apps
    optional_values:
    - Microsoft Exchange
    - Gmail
    type: multi_choice_parameter
-   default_value: ''
    description: Event states to be retrieved.
    is_mandatory: false
    name: States
    optional_values:
    - New
    - Remediated
    - Detected
    - Exception
    - Dismissed
    type: multi_choice_parameter
-   default_value: ''
    description: Severity levels to be retrieved.
    is_mandatory: false
    name: Severities
    optional_values:
    - Critical
    - High
    - Medium
    - Low
    - Very Low
    type: multi_choice_parameter
-   default_value: ''
    description: Threat types to be retrieved.
    is_mandatory: false
    name: Threat Types
    optional_values:
    - DLP
    - Malware
    - Phishing
    - Anomaly
    - Suspicious Phishing
    - Suspicious Malware
    - Shadow IT
    - Alert
    - Spam
    - Malicious URL
    - Malicious URL Click
    type: multi_choice_parameter
-   default_value: '1000'
    description: Limit number of events to be retrieved.
    is_mandatory: false
    name: Limit
    type: string
script_result_name: is_success
