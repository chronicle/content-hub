identifier: CheckPointHEC
name: Check Point HEC
parameters:
    -   name: Host
        type: string
        description: Smart API Server Host, this can be different for the same region depending on the type of credentials used to authenticate.
        is_mandatory: false
        integration_identifier: CheckPointHEC
    -   name: Client ID
        type: password
        description: Client Identifier, together with Client Secret used for authentication.
        is_mandatory: false
        integration_identifier: CheckPointHEC
    -   name: Client Secret
        type: password
        description: Client Secret, together with Client Identifier used for authentication.
        is_mandatory: false
        integration_identifier: CheckPointHEC
    -   name: Verify SSL
        default_value: true
        type: boolean
        description: If selected, the integration validates the SSL certificate when connecting to Smart API Service. Selected by default.
        is_mandatory: false
        integration_identifier: CheckPointHEC
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/CheckPointHEC
categories: []
svg_logo_path: resources/checkpoint-logo.svg
image_path: resources/checkpoint-image.png
