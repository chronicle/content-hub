Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill DVE Enrichment service.


    ### Flow Description

    1. Extracts the Client ID and Client Secret from the integration configuration.

    2. Initializes the Cybersixgill manager.

    3. Makes an API call to retrieve an access token to verify connectivity.

    4. Returns a success or failure message based on the connection result.


    ### Additional Notes

    This is a utility action used to ensure the integration is configured correctly
    and can communicate with the Cybersixgill API.
  ai_short_description: >-
