  ai_description: "Enriches CVE entities with Cybersixgill\u2019s Dynamic Vulnerability\
    \ Exploit (DVE) Score and associated threat intelligence. This action retrieves\
    \ deep and dark web context for vulnerabilities, including trending status, exploit\
    \ probability, and NVD metadata. The gathered intelligence is used to update entity\
    \ attributes, create detailed case insights, and generate data tables for analyst\
    \ review.\n\n### Flow Description:\n1. **Credential Extraction:** Retrieves the\
    \ Cybersixgill Client ID and Client Secret from the integration configuration.\n\
    2. **Entity Filtering:** Identifies CVE entities within the current case scope.\n\
    3. **External Enrichment:** Queries the Cybersixgill API for each CVE to fetch\
    \ DVE scores and vulnerability context.\n4. **Internal Data Update:** Updates\
    \ the SecOps entities with enriched properties (prefixed with 'Cybersixgill')\
    \ and marks them as enriched.\n5. **Insight & Table Generation:** Creates a case\
    \ insight summarizing the vulnerability risk and adds a detailed data table containing\
    \ CVSS scores, NVD links, and exploitability metrics.\n\n### Parameters Description:\n\
    | Parameter Name | Expected Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| None | N/A | N/A | This action does not have any specific input\
    \ parameters; it operates on the CVE entities present in the case. |\n\n### Additional\
    \ Notes:\n- This action specifically targets entities of type `CVE`.\n- The enrichment\
    \ includes both Cybersixgill proprietary scores (DVE) and standard NVD data."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with Cybersixgill DVE data, sets the 'is_enriched'
      flag on entities, and creates case insights and entity tables.
