  ai_description: >-
    ### General Description

    This action enriches CVE (Common Vulnerabilities and Exposures) entities using
    the Cybersixgill Dynamic Vulnerability Exploit (DVE) intelligence service. It
    retrieves comprehensive vulnerability data, including DVE scores, exploitability
    probabilities, and NVD details, to assist analysts in prioritizing remediation
    efforts. The action updates the entity's profile within the SOAR platform and
    provides detailed insights and data tables for the analyst.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for authenticating with the Cybersixgill
    API. |

    | Client Secret | String | Yes | The Client Secret for authenticating with the
    Cybersixgill API. |


    ### Flow Description

    1. **Authentication**: The action retrieves the configured `Client Id` and `Client
    Secret` to authenticate with the Cybersixgill API.

    2. **Entity Processing**: It iterates through the provided `CVE` entities in the
    case.

    3. **Data Retrieval**: For each CVE entity, it queries the Cybersixgill API to
    fetch the latest DVE intelligence.

    4. **Entity Update**: It updates the entity's `additional_properties` with the
    retrieved data and marks the entity as enriched.

    5. **Insight Generation**: It generates a case insight and an entity table containing
    the vulnerability details and adds them to the SOAR case.


    ### Additional Notes

    This action is strictly an enrichment action and does not perform any external
    system mutations. It requires valid Cybersixgill credentials to function.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, creates case insights, and adds entity
      tables within the SOAR case.
    reasoning: >-
      The action fetches data from the Cybersixgill API (fetches_data=true). It does
      not mutate external systems (can_mutate_external_data=false). It performs internal
      mutations by updating entity properties, creating case insights, and adding
      entity tables (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action is an enrichment action because it fetches external threat intelligence
      (DVE scores) for CVE entities, does not mutate external systems, and only performs
      allowed internal mutations (updating entities and creating insights).
  entity_usage:
