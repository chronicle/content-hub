  ai_description: >-
    ### General Description

    Enriches CVE entities using Cybersixgill's Dynamic Vulnerability Exploit (DVE)
    Score. This action retrieves threat intelligence, dynamic attributes, and POC
    exploit details to provide deeper visibility into vulnerabilities, helping to
    accurately understand their real impact.


    ### Parameters Description

    This action does not require any specific action-level parameters. It relies on
    the integration's configured credentials (Client Id and Client Secret) to authenticate
    with the Cybersixgill API.


    ### Flow Description

    1. Initializes the Cybersixgill client using the integration's configured credentials.

    2. Iterates through the target entities and filters for entities of type `CVE`.

    3. Queries the Cybersixgill API to retrieve DVE enrichment data for each valid
    CVE identifier.

    4. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    5. Generates case insights and data tables containing the enrichment results.

    6. Attaches the raw JSON results to the action for further use.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional properties of CVE entities and creates case insights.
    reasoning: >-
      The action fetches vulnerability enrichment data from the Cybersixgill API.
      It does not mutate any external data. Internally, it updates the target entities
      with the fetched data and creates case insights and data tables.
  categories:
    enrichment: true
    reasoning: >-
      The action's primary purpose is to fetch supplemental context (DVE scores and
      threat intel) about CVE entities. It does not modify external state and only
      performs allowed internal mutations (updating entities and creating insights).
      Therefore, it is classified as an Enrichment action.
    remediation: false
  entity_usage:
    entity_types:
    - CVE
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks if
      `entity.entity_type == EntityTypes.CVE`. It only processes entities that match
      this type.
