Enrich CVE:
  ai_description: "Enriches CVE entities using Cybersixgill's Dynamic Vulnerability\
    \ Exploit (DVE) Score and threat intelligence. This action retrieves deep and\
    \ dark web context for vulnerabilities, including exploit probability, trending\
    \ status, and NVD metadata. It enhances the security analyst's ability to prioritize\
    \ vulnerabilities by providing real-time risk scores and technical details directly\
    \ within the case.\n\n### Flow Description:\n1. **Credential Retrieval:** Extracts\
    \ the Cybersixgill Client ID and Client Secret from the integration configuration.\n\
    2. **Entity Filtering:** Iterates through the target entities in the current context,\
    \ specifically identifying those of type `CVE`.\n3. **External Query:** For each\
    \ CVE, it queries the Cybersixgill API to fetch the DVE score and associated STIX-based\
    \ threat intelligence.\n4. **Internal Enrichment:** \n    * Updates the entity's\
    \ additional properties with Cybersixgill-prefixed attributes.\n    * Marks the\
    \ entity as enriched within the SOAR platform.\n5. **Reporting:** \n    * Generates\
    \ a detailed Case Insight containing descriptions, scores, and NVD links.\n  \
    \  * Adds a structured data table to the entity for quick reference of CVSS scores\
    \ and exploitability metrics.\n    * Attaches the raw JSON response to the action\
    \ results.\n\n### Parameters Description:\n| Parameter Name | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This action\
    \ does not require any runtime parameters; it uses the integration's global configuration\
    \ and the entities present in the case. |\n\n### Additional Notes:\n* This action\
    \ specifically targets `CVE` entity types. Other entity types will be logged as\
    \ invalid and skipped.\n* The enrichment includes both Cybersixgill proprietary\
    \ scores (DVE) and standard NVD (National Vulnerability Database) data."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity properties, sets the 'is_enriched' flag, and creates
      case insights and data tables within the SOAR platform.
  categories:
    enrichment: true
  entity_usage:
