Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Cybersixgill's Dynamic Vulnerability Exploit (DVE)
    Score and threat intelligence. This action retrieves dynamic attributes such as
    trending data, POC exploit details, and CVSS scores to help prioritize critical
    vulnerabilities.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Filters entities to process only those of type `CVE`.

    3. Makes an API call to Cybersixgill to fetch DVE enrichment data for each CVE
    identifier.

    4. Updates the entity's additional properties with the retrieved threat intelligence
    and marks it as enriched.

    5. Generates a case insight and an entity table containing the vulnerability details
    and scores.

    6. Attaches the raw JSON results to the action's output.


    ### Additional Notes

    Requires Cybersixgill Client ID and Client Secret configured at the integration
    level.
  ai_short_description: >-
    Enriches CVE entities with Cybersixgill's Dynamic Vulnerability Exploit (DVE)
    Score and threat intelligence to provide deeper visibility into vulnerability
    impact.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to Cybersixgill API to fetch CVE enrichment data.
      It does not mutate external data but updates internal entities with additional
      properties and creates case insights.
