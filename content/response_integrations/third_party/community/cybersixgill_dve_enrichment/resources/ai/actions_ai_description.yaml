    reasoning: >-
      The action fetches threat intelligence and vulnerability scores for CVE entities,
      which aligns with the 'Enrich IOC' expected outcome (returning reputation, prevalence,
      and threat intelligence for an indicator). It does not perform any remediation,
      ticketing, or email operations.
    remove_ioc_from_allowlist: false
