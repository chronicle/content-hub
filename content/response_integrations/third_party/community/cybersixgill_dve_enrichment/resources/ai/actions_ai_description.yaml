Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the Cybersixgill API. Its primary purpose
    is to ensure that the integration's configuration parameters, specifically the
    Client ID and Client Secret, are valid and that the environment can successfully
    establish a network connection to the Cybersixgill service.


    ### Parameters Description

    This action does not require any input parameters. It utilizes the global integration
    configuration to perform the connectivity test.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `Client Id` and `Client
    Secret` from the integration's configuration settings.

    2. **Manager Initialization**: It initializes the `SixgillEnrichManager` using
    the extracted credentials.

    3. **Connectivity Verification**: The manager attempts to authenticate with the
    Cybersixgill API by requesting an access token. This step validates both the credentials
    and the network reachability.

    4. **Execution Completion**: The action concludes by returning a success message
    and a boolean `True` if the connection is established, or a failure message and
    `False` if an error occurs during the authentication process.


    ### Additional Notes

    As a standard connectivity test, this action does not interact with entities,
    fetch contextual threat intelligence, or modify any data within Google SecOps
    or Cybersixgill.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
