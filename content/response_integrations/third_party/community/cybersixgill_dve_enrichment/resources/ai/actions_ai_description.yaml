Enrich CVE:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves threat intelligence (DVE scores, exploitability) for CVE
      entities, which aligns with the 'Enrich IOC' category as it provides context
      for a vulnerability indicator.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Enriches CVE entities using the Cybersixgill Dynamic Vulnerability Exploit (DVE)
    intelligence service. This action retrieves comprehensive vulnerability data,
    including DVE scores, exploitability probabilities, and NVD details, to help analysts
    prioritize remediation efforts.


    ### Flow

    1. The action retrieves the configured Cybersixgill `Client Id` and `Client Secret`.

    2. It iterates through the provided `CVE` entities.

    3. For each entity, it queries the Cybersixgill API to fetch the latest DVE intelligence.

    4. It updates the entity's `additional_properties` with the retrieved data and
    marks the entity as enriched.

    5. It generates a case insight and an entity table containing the vulnerability
    details and adds them to the SOAR case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for authenticating with the Cybersixgill
    API. |

    | Client Secret | String | Yes | The Client Secret for authenticating with the
    Cybersixgill API. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties and adds insights/tables to the case.
    reasoning: >-
      The action fetches external threat intelligence (DVE scores) for CVE entities.
      It updates the entity's internal properties and creates case insights and tables.
      It does not perform any external mutations.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Cybersixgill) and performs
      allowed internal mutations (updating entities, creating insights). It does not
      mutate external systems. Therefore, it is classified as an enrichment action.
  entity_usage:
    entity_types:
    - CVE
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly filters
      for entities where `entity.entity_type == EntityTypes.CVE`.
Ping:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a connectivity test ('Ping') used to verify authentication credentials
      with the Cybersixgill API. It does not perform any enrichment, containment,
      or other operational tasks defined in the product categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General description

    Tests connectivity to the Cybersixgill API. This action validates the provided
    Client ID and Client Secret by attempting to retrieve an access token from the
    Cybersixgill service. It returns a success or failure status based on the ability
    to authenticate.


    ### Parameters description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Client Id | String | Yes | The Client ID for authentication with the Cybersixgill
    API. |

    | Client Secret | String | Yes | The Client Secret for authentication with the
    Cybersixgill API. |


    ### Additional notes

    None.


    ### Flow description

    1. Extract Client ID and Client Secret from configuration.

    2. Initialize the SixgillEnrichManager.

    3. Call test_connectivity().

    4. Attempt to retrieve an access token using the provided credentials.

    5. Return success or failure status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by attempting to authenticate with the
      Cybersixgill API. It does not fetch contextual data, mutate external or internal
      data, or interact with entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping', which is explicitly excluded from being an enrichment
      action. It does not fetch contextual data about entities or alerts, nor does
      it mutate any systems.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not interact with any entities. It is a standalone connectivity
      test.
