  ai_description: >-
    ### General Description

    The Ping action is a diagnostic utility designed to verify the connectivity between
    the Google SecOps platform and the Cybersixgill API. It ensures that the provided
    credentials (Client ID and Client Secret) are valid and that the network path
    to the Cybersixgill service is open. This action is typically used during the
    initial setup of the integration or for troubleshooting purposes.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not process any entities or modify any data within the SOAR or
    the external Cybersixgill environment. It strictly performs an authentication
    check.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the 'Client Id' and 'Client
    Secret' from the integration's global configuration.

    2. **Manager Initialization:** It initializes the `SixgillEnrichManager` using
    the extracted credentials.

    3. **Connectivity Test:** The manager attempts to authenticate with the Cybersixgill
    service by requesting an access token via the `SixgillBaseClient`.

    4. **Result Reporting:** Based on whether the token retrieval was successful,
    the action returns a completion status (Success/Failed) and a descriptive message
    to the user interface.
