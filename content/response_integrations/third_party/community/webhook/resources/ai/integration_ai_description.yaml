  reasoning: >-
    The Webhook integration provides generic utility functions for creating, deleting,
    and polling webhook endpoints. It does not perform security-specific operations
    such as log analysis (SIEM), host containment (EDR), threat intelligence enrichment,
    identity management, vulnerability scanning, or ITSM ticketing. While it can be
    used to receive data, it does not inherently fulfill the specialized requirements
    of any of the defined security product categories.
