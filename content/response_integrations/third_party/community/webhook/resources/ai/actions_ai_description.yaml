    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not process or iterate over `siemplify.target_entities`. It
      operates solely on the provided Token ID parameter to fetch webhook requests.
      Therefore, the entity types list is empty.
