Get Webhook Response:
  ai_description: >-
    The 'Get Webhook Response' action is an asynchronous task designed to retrieve
    request data sent to a specific Webhook URL associated with a provided Token ID.
    It allows analysts to monitor incoming HTTP requests to a webhook endpoint, which
    is often used for receiving callbacks or manual interactions from external users.
    The action supports two modes of operation: waiting for a predefined duration
    (TimeFrame) or waiting until at least one request is detected (AwaitClick). It
    automatically filters out automated requests from Slackbots to ensure data relevance.


    ### Flow Description:

    1. **Initialization**: The action extracts the base URL from the integration configuration
    and retrieves user-provided parameters including the Token ID, retrieval preference
    (All vs. Latest), and the pending condition logic.

    2. **Condition Evaluation**:
        * **TimeFrame Mode**: If the action is in its first run, it calculates the
    expiration time. In subsequent runs, it checks if the specified timeframe has
    elapsed. If the time has passed, it proceeds to fetch the data; otherwise, it
    remains in an 'In Progress' state.
        * **AwaitClick Mode**: The action immediately attempts to fetch requests.
    If requests are found, it completes. If no requests are found, it remains 'In
    Progress' to check again in the next cycle.
    3. **Data Retrieval**: The action calls the Webhook API to fetch request logs
    for the specific Token ID.

    4. **Data Processing**: It filters the results to exclude requests generated by
    Slack user agents and, if configured, restricts the output to only the most recent
    request.

    5. **Finalization**: The retrieved data is attached as a JSON result, and the
    action completes with a summary message.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Pending Condition | DDL | Yes | Determines the wait logic. 'TimeFrame' waits
    for a set duration before fetching. 'AwaitClick' waits until the first request
    is received. |

    | TimeFrame | String | Yes | The number of minutes to wait before the action stops
    listening and returns the collected data. Only relevant if 'Pending Condition'
    is set to 'TimeFrame'. |

    | Responses To Retrieve | DDL | Yes | Specifies whether to return 'All' requests
    captured during the window or only the 'Latest' single request. |

    | Token ID | String | Yes | The unique identifier of the webhook token to monitor
    for incoming requests. |


    ### Additional Notes:

    * This action is **Asynchronous**, meaning it will run repeatedly in the background
    until the specified condition (time or data arrival) is met.

    * The action is designed to work with the Webhook integration's token system where
    URLs follow the pattern `{Base URL}/{Token ID}`.
