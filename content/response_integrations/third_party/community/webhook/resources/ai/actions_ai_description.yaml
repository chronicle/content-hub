  ai_description: >-
    Creates a new webhook token on the configured Webhook service. This action allows
    users to generate a unique webhook URL that, when accessed, returns specified
    content and content type.


    ### Flow Description

    1. Initialize the action and retrieve the base URL from the integration configuration.

    2. Extract the required parameters: 'Default Content', 'Default Content Type',
    and the optional 'Timeout'.

    3. Invoke the `WebhookManager` to send a POST request to the webhook service to
    generate a new token with the provided configuration.

    4. Construct the full webhook URL using the returned UUID and the base URL.

    5. Add the resulting JSON (containing the token details and URL) to the action
    output and terminate the action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Default Content | string | Yes | Content to be presented upon the webhook URL
    click, if successful. |

    | Default Content Type | string | Yes | Type of content to be presented upon the
    new webhook URL click (e.g., text/html). |

    | Timeout | string | No | Amount of seconds to wait before returning the response
    (intended for testing timeouts). Max is 10. |
  capabilities:
