Create Token:
  ai_description: >-
    ### General Description

    Creates a new webhook token using the Webhook integration. This action generates
    a unique webhook URL that can be used to receive incoming HTTP requests. It allows
    customization of the default content, content type, and response timeout presented
    when the webhook URL is accessed.


    ### Flow Description

    1. Extracts the base URL from the integration configuration.

    2. Retrieves the action parameters: Default Content, Default Content Type, and
    Timeout.

    3. Makes a POST request to the external webhook service's `/token` endpoint to
    generate a new token with the specified attributes.

    4. Constructs the full webhook URL and appends it to the JSON result.

    5. Returns the generated token details and webhook URL as a JSON result to the
    SecOps platform.


    ### Additional Notes

    The timeout parameter is primarily intended for testing timeouts and has a maximum
    value of 10 seconds.
  ai_short_description: >-
    Creates a new webhook token and generates a unique webhook URL, allowing customization
    of the default response content and timeout.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new webhook token on the external webhook service.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to an external webhook service to create a new
      token (mutates external data). It does not fetch contextual data for entities,
      nor does it mutate internal SecOps data, update entities, or create insights.
