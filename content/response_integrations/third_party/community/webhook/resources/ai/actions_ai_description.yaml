  ai_description: >-
    Fetches webhook request data for a specific token ID. The action initializes a
    WebhookManager and retrieves requests based on the provided token ID. It supports
    two waiting conditions: 'TimeFrame' (waits for a specified duration) and 'AwaitClick'
    (polls until a request is found). It filters out Slackbot requests and returns
    the data as a JSON result. Parameters: 1. Pending Condition (ddl, mandatory):
    Determines the waiting logic (TimeFrame or AwaitClick). 2. TimeFrame (string,
    mandatory): Minutes to wait if TimeFrame is selected. 3. Responses To Retrieve
    (ddl, mandatory): Whether to retrieve 'All' or 'Latest' requests. 4. Token ID
    (string, mandatory): The identifier for the webhook token.
