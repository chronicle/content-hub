Get Webhook Response:
  ai_description: >-
    ### General Description

    Retrieves request data for a specific webhook token ID from the configured webhook
    service.


    ### Flow Description

    1. Extracts the Token ID, Responses To Retrieve, TimeFrame, and Pending Condition
    parameters.

    2. Evaluates the Pending Condition. If set to 'TimeFrame', the action waits asynchronously
    for the specified duration before making an API call. If set to 'AwaitClick',
    it continuously polls until a request is detected.

    3. Makes a GET request to the webhook service endpoint (`/token/{token_id}/requests`)
    to fetch the request data.

    4. Filters out automated Slackbot requests and optionally limits the results to
    only the latest request based on the 'Responses To Retrieve' parameter.

    5. Returns the fetched request data as a JSON result.


    ### Additional Notes

    The action runs asynchronously, allowing it to wait for a specified timeframe
    or until a click/request occurs without blocking the execution thread.
  ai_short_description: >-
    Retrieves request data for a specific webhook token ID, optionally waiting for
    a specified timeframe or until a request is received.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
