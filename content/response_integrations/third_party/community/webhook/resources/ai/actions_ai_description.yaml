    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The `Get Webhook Response` action fetches data of requests made to a specific
    webhook URL (constructed using the Base URL and a Token ID). It can operate asynchronously,
    either waiting for a specified timeframe before fetching the requests or waiting
    until at least one request (a "click") is detected.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Pending Condition | Dropdown | Yes | Choose the custom timeout condition. `TimeFrame`
    waits for a specific duration before ending the script. `AwaitClick` waits for
    the first request before ending the script. |

    | TimeFrame | String | Yes | Minutes to wait for requests for the URL before ending
    the action. Relevant only if `TimeFrame` is chosen as the Pending Condition. |

    | Responses To Retrieve | Dropdown | Yes | Choose `All` to retrieve all responses
    data, or `Latest` to retrieve only the latest responses data. |

    | Token ID | String | Yes | The ID of the token to read requests for. |


    ### Additional Notes

    - The `TimeFrame` parameter is only actively used in the logic if the `Pending
    Condition` is set to `TimeFrame`.

    - The action filters out auto-generated requests from Slackbot automatically.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Evaluates the `Pending Condition`.

    3. If `TimeFrame` is selected, the action calculates the duration and runs asynchronously
    until the timeframe has elapsed, after which it fetches the requests.

    4. If `AwaitClick` is selected, the action fetches requests and completes if at
    least one request is found; otherwise, it continues to wait asynchronously.

    5. Returns the fetched requests as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to retrieve webhook requests
      (fetches_data=true). It does not perform any POST/PUT/DELETE requests to mutate
      external data (can_mutate_external_data=false). It also does not modify any
      internal SecOps data such as entities, insights, or case comments (can_mutate_internal_data=false).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source without mutating any external
      or internal state. Therefore, it qualifies as an enrichment action. It does
      not perform any remediation tasks.
    remediation: false
  entity_usage:
