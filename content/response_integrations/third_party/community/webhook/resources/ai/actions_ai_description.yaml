  ai_description: >-
    The 'Get Webhook Response' action is designed to retrieve data from requests sent
    to a specific webhook URL, formatted as `{Base URL}/{Token ID}`. This action is
    asynchronous and can be configured to wait for data based on two distinct conditions:
    a fixed timeframe or until the first request is detected. It is primarily used
    to capture external callbacks or manual interactions (like a user clicking a link)
    and bring that data back into the SOAR platform for analysis.


    ### Flow Description

    1. **Parameter Initialization:** The action retrieves the `Token ID`, `Responses
    To Retrieve` (All or Latest), `TimeFrame`, and `Pending Condition` from the input
    parameters.

    2. **Condition Handling:**
        * **TimeFrame Mode:** The action calculates the start time. If the current
    execution is within the specified `TimeFrame` (in minutes), it sets the status
    to 'In Progress' and waits. Once the timeframe expires, it performs a single fetch
    of the webhook requests.
        * **AwaitClick Mode:** The action immediately checks for any requests associated
    with the `Token ID`. If at least one request is found, it completes. If no requests
    are found, it sets the status to 'In Progress' to check again in the next iteration.
    3. **Data Retrieval:** The action calls the Webhook API to fetch request data.
    It automatically filters out requests generated by Slackbots (based on the User-Agent).

    4. **Result Processing:** Depending on the `Responses To Retrieve` parameter,
    it returns either the full list of requests or only the most recent one. The data
    is then attached to the action results as a JSON object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Pending Condition | DDL | Yes | Determines the wait logic. `TimeFrame` waits
    for a set duration before fetching; `AwaitClick` waits until at least one request
    is received. |

    | TimeFrame | String | Yes | The number of minutes to wait before fetching data
    when `Pending Condition` is set to `TimeFrame`. |

    | Responses To Retrieve | DDL | Yes | Determines the scope of data returned. `All`
    retrieves all captured requests; `Latest` retrieves only the most recent request.
    |

    | Token ID | String | Yes | The unique identifier for the webhook token to monitor.
    |


    ### Additional Notes

    * This action does not process SOAR entities; it operates strictly based on the
    provided `Token ID` parameter.

    * The action is asynchronous (`is_async: true`), meaning it will yield execution
    and resume until the specified condition is met or a system timeout occurs.
