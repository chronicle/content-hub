Delete Token:
  ai_description: >-
    Deletes a specific Webhook token using its unique identifier. This action communicates
    with the Webhook service to remove the token, which results in the associated
    webhook URL becoming inaccessible. It is primarily used for cleaning up temporary
    webhooks or revoking access to specific endpoints.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the 'Token ID' from the input
    parameters.

    2. **Manager Initialization:** It initializes the WebhookManager using the base
    URL provided in the integration configuration.

    3. **External Request:** The action calls the `delete_token` method, which sends
    an HTTP DELETE request to the external service's token endpoint.

    4. **Result Handling:** If the request is successful, it returns a completion
    status and a success message. If the request fails, it captures the error and
    reports a failure.


    ### Parameters Description:

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Token ID | The unique identifier of the webhook token that needs to be deleted.
    | String | Yes | This ID is used to construct the specific API endpoint for deletion.
    |


    ### Additional Notes:

    - This action does not process or interact with SOAR entities (IPs, Hostnames,
    etc.).

    - Successful execution results in a permanent state change in the external Webhook
    service.
