  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the Webhook service. Its primary purpose
    is to ensure that the integration configuration (specifically the base URL) is
    correct and that the external service is reachable and responding to requests.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action relies on the 'URL' parameter provided in the integration's global
    configuration. It does not interact with any entities or alert data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'URL' setting from the
    Webhook integration configuration.

    2. **Manager Initialization**: It initializes the `WebhookManager` with the provided
    base URL.

    3. **Connectivity Test**: The action executes the `test_connectivity` method,
    which performs an HTTP GET request to the base URL.

    4. **Execution Outcome**: If the request is successful (no exceptions raised),
    the action returns a success message. If the request fails, it captures the error
    and returns a failure state.
