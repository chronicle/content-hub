    reasoning: >-
      The action retrieves webhook requests based on a token ID. It does not enrich
      specific IOCs or assets, nor does it interact with alerts, tickets, blocklists,
      identities, hosts, emails, or files in a way that matches the defined product
      categories. Therefore, none of the action outcomes categories apply.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
