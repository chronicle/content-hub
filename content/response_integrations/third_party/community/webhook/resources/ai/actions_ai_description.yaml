  ai_description: >-
    Tests connectivity to the Webhook integration by sending a GET request to the
    configured base URL. This action verifies that the integration is reachable and
    properly configured.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The base URL of the Webhook service to test connectivity
    against. |


    ### Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Retrieve the `URL` configuration parameter from the integration settings.

    3. Instantiate the `WebhookManager` with the provided base URL.

    4. Execute the `test_connectivity` method, which performs a GET request to the
    base URL to verify the service is reachable.

    5. Return the connectivity status (success or failure) and an appropriate message.
