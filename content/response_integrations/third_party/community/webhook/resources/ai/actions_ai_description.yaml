  ai_description: >-
    ### General Description

    Creates a new webhook token on the Webhook service. This action generates a unique
    URL that can be used to receive incoming HTTP requests, which is useful for testing
    integrations or setting up temporary callback endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Default Content | string | Yes | The content that will be displayed or returned
    in the response body when the generated webhook URL is accessed. |

    | Default Content Type | string | Yes | The MIME type of the content (e.g., `text/html`
    or `application/json`) to be returned by the webhook URL. |

    | Timeout | string | No | The number of seconds (max 10) the service should wait
    before returning a response to a request sent to the webhook URL. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the 'Default Content', 'Default
    Content Type', and 'Timeout' values from the input parameters.

    2. **Manager Initialization**: It initializes the WebhookManager using the base
    URL from the integration configuration.

    3. **Token Creation**: The action calls the `create_token` method, which sends
    a POST request to the external service's `/token` endpoint with the specified
    payload.

    4. **URL Generation**: Upon receiving a successful response containing a UUID,
    the action constructs the full webhook URL.

    5. **Output**: The action returns the generated URL and the full JSON response
    from the service to the SOAR platform.


    ### Additional Notes

    - The 'Timeout' parameter is intended for testing timeout behaviors and is capped
    at 10 seconds.

    - The generated webhook URL is unique to the created token.
