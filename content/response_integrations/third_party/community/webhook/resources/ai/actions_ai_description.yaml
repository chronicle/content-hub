  ai_description: >-
    ### General description

    Deletes a specific webhook token from the Webhook service using the provided Token
    ID. This action interacts with the external Webhook API to remove the token, rendering
    the associated URL inaccessible.


    ### Parameters description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Token ID | string | Yes | The unique identifier of the webhook token to be deleted.
    |


    ### Additional notes

    None.


    ### Flow description

    1. Extract the `Token ID` parameter from the action configuration.

    2. Initialize the `WebhookManager` with the configured base URL.

    3. Send a DELETE request to the external Webhook service to remove the specified
    token.

    4. Return the deletion status and update the action result.
