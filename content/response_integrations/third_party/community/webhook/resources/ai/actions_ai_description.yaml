  ai_description: "Creates a new webhook token on the configured Webhook service.\
    \ This action allows users to generate a unique webhook URL that, when accessed,\
    \ returns specified content and content type. \n\n### Flow Description\n1. Initialize\
    \ the action and retrieve the base URL from the integration configuration.\n2.\
    \ Extract the required parameters: 'Default Content', 'Default Content Type',\
    \ and the optional 'Timeout'.\n3. Invoke the `WebhookManager` to send a POST request\
    \ to the webhook service to generate a new token with the provided configuration.\n\
    4. Construct the full webhook URL using the returned UUID and the base URL.\n\
    5. Add the resulting JSON (containing the token details and URL) to the action\
    \ output and terminate the action.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Default\
    \ Content | string | Yes | Content to be presented upon the webhook URL click,\
    \ if successful. |\n| Default Content Type | string | Yes | Type of content to\
    \ be presented upon the new webhook URL click (e.g., text/html). |\n| Timeout\
    \ | string | No | Amount of seconds to wait before returning the response (intended\
    \ for testing timeouts). Max is 10. |"
  capabilities:
