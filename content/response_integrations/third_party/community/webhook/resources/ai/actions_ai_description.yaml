Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Webhook service. This action verifies that the integration
    is properly configured and can successfully communicate with the target URL.


    ### Flow Description

    1. Retrieves the base URL from the integration configuration.

    2. Makes an HTTP GET request to the base URL via the `test_connectivity` method.

    3. Evaluates the HTTP response status code.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies solely
    on the integration-level configuration.
