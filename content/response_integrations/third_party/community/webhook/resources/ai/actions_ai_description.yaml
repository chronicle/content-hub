Delete Token:
  ai_description: >-
    ### General Description

    Deletes a specific Webhook token using its token ID. This action interacts with
    the external Webhook service to remove the token, rendering the associated webhook
    URL permanently inaccessible.


    ### Flow Description

    1. Extracts the `Token ID` parameter provided in the action configuration.

    2. Initializes the WebhookManager using the integration's configured base URL.

    3. Makes an HTTP DELETE request to the Webhook service API (`/token/{token_id}`)
    to delete the specified token.

    4. Returns the execution status and an output message indicating whether the deletion
    was successful.


    ### Additional Notes

    Ensure the provided token ID is correct, as this action is irreversible and will
    immediately invalidate any integrations or services relying on the associated
    webhook URL.
  ai_short_description: >-
    Deletes a specific Webhook token by its token ID, rendering the associated webhook
    URL inaccessible.
