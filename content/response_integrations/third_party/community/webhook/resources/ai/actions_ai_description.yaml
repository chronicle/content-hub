  ai_description: >-
    ### General Description

    Deletes a Webhook token using its unique identifier. This action interacts with
    the Webhook service to remove the specified token, effectively disabling the associated
    webhook URL and preventing any further requests from being received or processed
    through it.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Token ID | The unique identifier of the token to be deleted. | String | Yes
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Token ID` provided by the
    user.

    2. **Manager Initialization**: Initializes the Webhook manager using the configured
    base URL.

    3. **External Request**: Executes a DELETE request to the external Webhook service
    endpoint corresponding to the provided token ID.

    4. **Result Handling**: Captures the response status from the external service
    and updates the action result to indicate whether the deletion was successful.


    ### Additional Notes

    There are no entities involved in this action; it operates solely based on the
    provided `Token ID` parameter.
