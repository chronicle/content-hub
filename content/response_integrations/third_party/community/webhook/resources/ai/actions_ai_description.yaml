Create Token:
  ai_description: >-
    ### General Description

    The **Create Token** action generates a new webhook token within the Webhook integration.
    This action is primarily used to set up a unique URL that can receive incoming
    HTTP requests. When the generated URL is accessed, the service will respond with
    the user-defined content and content type. This is highly useful for testing external
    callbacks, orchestrating multi-step automation flows that require external triggers,
    or verifying connectivity.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Default Content** | string | True | The specific content or message that will
    be displayed/returned when the generated webhook URL is visited or called. |

    | **Default Content Type** | string | True | The MIME type of the content (e.g.,
    `text/html`, `application/json`) to be returned by the webhook URL. |

    | **Timeout** | string | False | The number of seconds (0-10) the service should
    wait before returning a response when the webhook is triggered. Used for testing
    timeout scenarios. |


    ### Additional Notes

    - This action does not operate on specific SecOps entities; it is a utility action
    that interacts with the Webhook service to create infrastructure for the case.

    - The action returns a `webhookURL` which is the concatenation of the integration's
    base URL and the newly created token's UUID.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Default Content`, `Default
    Content Type`, and `Timeout` from the user input.

    2. **Manager Initialization:** It initializes the `WebhookManager` using the base
    URL configured in the integration settings.

    3. **Token Creation:** The action sends a POST request to the `/token` endpoint
    of the Webhook service with the provided parameters.

    4. **URL Construction:** Upon a successful response, it extracts the `uuid` and
    constructs the full `webhookURL`.

    5. **Result Reporting:** The action outputs the full JSON response from the service
    and provides the created URL in the output message.
  capabilities:
