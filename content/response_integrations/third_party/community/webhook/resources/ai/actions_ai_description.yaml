    update_ticket: false
  ai_description: >-
    Fetches webhook request data for a specific token ID. The action initializes a
    WebhookManager and retrieves requests based on the provided token ID. It supports
    two waiting conditions: 'TimeFrame' (waits for a specified duration) and 'AwaitClick'
    (polls until a request is found). It filters out Slackbot requests and returns
    the data as a JSON result.


    ### Parameters


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Pending Condition | ddl | Yes | Determines the waiting logic (TimeFrame or AwaitClick).
    |

    | TimeFrame | string | Yes | Minutes to wait if TimeFrame is selected. |

    | Responses To Retrieve | ddl | Yes | Whether to retrieve 'All' or 'Latest' requests.
    |

    | Token ID | string | Yes | The identifier for the webhook token. |


    ### Flow Description


    1. Initialize `WebhookManager` with the base URL.

    2. Extract parameters (`Token ID`, `Responses To Retrieve`, `TimeFrame`, `Pending
    Condition`).

    3. If `TimeFrame` mode:
        * If it's the first run, record the start time.
        * If not the first run, retrieve the start time and timeframe from `additional_data`.
        * Calculate the elapsed time.
        * If the elapsed time is less than the configured `TimeFrame`, set the status
    to `IN_PROGRESS` and wait.
        * If the elapsed time is greater than or equal to the `TimeFrame`, call `webhookManager.get_requests`.
    4. If `AwaitClick` mode:
        * Call `webhookManager.get_requests`.
        * If no requests are found, set the status to `IN_PROGRESS` and wait.
        * If requests are found, set the status to `COMPLETED`.
    5. Filter out Slackbot requests from the retrieved data.

    6. Add the result JSON to the action output.

    7. End the action with the appropriate status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from an external webhook service using GET requests.
      It does not mutate external systems, nor does it update internal SOAR entities,
      insights, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data from an external source, but it does not enrich entities
      or alerts in the context of the SOAR platform (it does not update entities,
      create insights, or add comments). Therefore, it does not meet the criteria
      for an enrichment action.
  entity_usage:
