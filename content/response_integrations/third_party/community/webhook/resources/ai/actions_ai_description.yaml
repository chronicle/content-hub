Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the Webhook service. It ensures that the configured
    URL is reachable and that the integration can successfully communicate with the
    target endpoint.


    ### Parameters Description

    There are no user-input parameters for this action. It relies solely on the integration's
    global configuration settings (specifically the 'URL' parameter).


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting communication issues. It does not interact with any entities or
    modify any data.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the `URL` parameter from the
    integration's global configuration.

    2. **Manager Initialization**: It initializes the `WebhookManager` with the retrieved
    base URL.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a standard HTTP GET request to the base URL.

    4. **Result Reporting**: If the request returns a successful status code (2xx),
    the action reports a successful connection. If an exception occurs or the status
    code indicates an error, the action fails and provides the error details.
