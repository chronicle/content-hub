  ai_description: >-
    Creates a new webhook token on the configured webhook service. This action generates
    a unique webhook URL that can be used to receive incoming HTTP requests, returning
    a specified default content and content type upon access.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Default Content | String | Yes | The content to be presented when the webhook
    URL is accessed. |

    | Default Content Type | String | Yes | The MIME type of the default content (e.g.,
    text/html). |

    | Timeout | String | No | The number of seconds to wait before returning the response
    (useful for testing timeouts, max 10). |


    ### Flow Description

    1. Extracts the configuration and action parameters.

    2. Initializes the WebhookManager with the base URL.

    3. Sends a POST request to the webhook service to create a new token with the
    specified content, content type, and timeout.

    4. Constructs the final webhook URL and adds the result to the action's JSON output.
