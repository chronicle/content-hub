  ai_description: >-
    ### General Description

    The 'Gather Remote Agent Datapoints' action is a diagnostic tool designed to collect
    comprehensive system and log information from a remote agent machine. It executes
    a series of local shell commands to gather data such as system load, environment
    variables, file information, and agent logs. This information is then logged to
    the SOAR logger for troubleshooting and support purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IntegrationName | string | Yes | The name of the integration for which to analyze
    logs. |

    | ConnectorName | string | No | The name of the connector to filter logs. |


    ### Additional Notes

    This action does not interact with external APIs or modify any internal SOAR data.
    It is strictly a diagnostic tool that reads local system information and logs
    it to the SOAR logger.


    ### Flow Description

    1. **Extract Parameters**: The action extracts the `IntegrationName` and `ConnectorName`
    parameters from the configuration.

    2. **Initialize Collectors**: It initializes several collector classes (`RALogsCollector`,
    `AgentLoadInfoCollector`, `CollectFileInformation`, `CollectAgentLogs`) to prepare
    for data gathering.

    3. **Execute Commands**: The action runs local shell commands (e.g., `cat`, `lscpu`,
    `uptime`, `free`, `env`, `ls`, `date`) on the agent machine to collect diagnostic
    data.

    4. **Log Information**: The collected data is logged to the `siemplify.LOGGER`
    for analyst review.

    5. **Complete**: The action returns a completed status.
