  ai_description: >-
    Gathers diagnostic information and logs from a Google SecOps Remote Agent to assist
    in troubleshooting integration or connector issues. This action collects a wide
    range of telemetry, including agent status, system resource utilization (CPU,
    memory, uptime), file system structure, and recent error logs from both the core
    agent and specific integration components.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the target `IntegrationName` and optional
    `ConnectorName` from the action configuration.

    2. **Agent Status Collection:** Reads and parses the `agent_status.json` file
    to identify installed versions and general agent health.

    3. **System Load Analysis:** Executes system commands (`lscpu`, `uptime`, `free`)
    to capture the current performance state of the host machine.

    4. **File Metadata Retrieval:** Lists files within the agent's installation directory
    to verify deployment structure.

    5. **Log Parsing:** Scans `/var/log/SiemplifyAgent/agent.log` and specific connector
    log files for recent error patterns, filtering out sensitive information like
    tokens or keys.

    6. **Diagnostic Logging:** Outputs all gathered data to the action's execution
    logs for analyst review.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IntegrationName | String | Yes | The name of the integration for which diagnostic
    data is being collected. |

    | ConnectorName | String | No | The specific name of the connector to analyze
    for errors. |


    ### Additional Notes:

    - This action is primarily a support and debugging tool. It does not modify the
    state of the agent or the external systems it monitors.

    - Sensitive data such as IP addresses, MAC addresses, and environment tokens are
    automatically truncated or filtered from the logs.
