  ai_description: >-
    Gathers diagnostic datapoints and logs from the local SOAR agent host. This action
    executes system commands and reads local log files to collect performance metrics,
    environment variables, and error logs for troubleshooting purposes. The collected
    information is outputted directly to the action's logs.


    ### Flow Description

    1. **Agent Information Collection:** Reads the local agent status JSON file and
    retrieves the current system date/time.

    2. **Load Information Collection:** Executes system commands (e.g., `lscpu`, `uptime`,
    `free`) to gather CPU, memory, and environment variable details.

    3. **File Information Collection:** Lists the contents of the agent's working
    directory.

    4. **Log Collection:** Parses the main agent log and specific connector runner
    logs to extract recent error messages.

    5. **Output:** Writes all collected diagnostic data to the action's execution
    logs.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IntegrationName | String | Yes | The name of the integration for which you want
    to analyze logs. |

    | ConnectorName | String | No | The name of the specific connector to analyze
    logs for. |
