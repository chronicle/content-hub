Gather Remote Agent Datapoints:
  ai_description: >-
    ### General Description

    Gathers diagnostic datapoints, system load information, and error logs from the
    remote SOAR agent where the action is executed.


    ### Flow Description

    1. Extracts the integration and connector names from the action parameters.

    2. Collects agent information by reading and parsing the local `agent_status.json`
    file.

    3. Collects agent load information by executing local system commands (`lscpu`,
    `uptime`, `free`, and `env`).

    4. Collects file information from the agent's working directory using the `ls`
    command.

    5. Parses and collects error logs from the agent's main log file and specific
    connector runner log files based on the provided parameters.

    6. Outputs all the collected diagnostic information directly to the action's execution
    logs.


    ### Additional Notes

    This action is intended for troubleshooting and support purposes. It runs local
    commands on the SOAR agent to gather system and log data and does not interact
    with external APIs or target entities.
  ai_short_description: >-
    Gathers diagnostic datapoints, system load information, and error logs from the
    remote SOAR agent for troubleshooting purposes.
