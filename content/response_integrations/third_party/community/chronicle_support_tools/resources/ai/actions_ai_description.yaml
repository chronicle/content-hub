Gather Remote Agent Datapoints:
  ai_description: >-
    ### General Description


    Gathers comprehensive diagnostic data and remote agent datapoints for troubleshooting
    purposes. This action collects system-level performance metrics, agent status
    configurations, environment variables, and parses local log files for errors related
    to specific integrations and connectors. It is primarily used by support teams
    to identify issues within the Google SecOps Remote Agent environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IntegrationName | string | Yes | The name of the integration for which you want
    to analyze agent data. |

    | ConnectorName | string | No | The name of the specific connector to retrieve
    logs for. |


    ### Flow Description


    1. **Configuration Extraction**: The action retrieves the `IntegrationName` and
    `ConnectorName` from the input parameters.

    2. **Agent Status Retrieval**: It reads the `agent_status.json` file to collect
    information about installed integrations, their versions, and the current SSL
    version.

    3. **System Load Collection**: It executes system commands to gather CPU info
    (`lscpu`), system uptime, and memory usage (`free -h`).

    4. **Environment and File Audit**: It collects environment variables (filtering
    out sensitive data like keys and tokens) and lists the contents of the agent's
    directory.

    5. **Log Analysis**: It parses the main agent log and specific connector logs
    (if a connector name is provided) to identify and capture the most recent error
    messages.

    6. **Logging**: All collected diagnostic information is written to the action's
    execution log for analysis.


    ### Additional Notes


    This action is intended for debugging and support scenarios. It does not modify
    any system settings or case data; it only performs read-only diagnostic operations
    on the host where the Remote Agent is installed.
