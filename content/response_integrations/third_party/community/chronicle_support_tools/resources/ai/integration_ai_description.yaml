  reasoning: >-
    The integration 'chronicle_support_tools' consists of a single action, 'Gather
    Remote Agent Datapoints,' which is strictly a diagnostic utility used to collect
    system logs and performance metrics from the SOAR agent machine itself. It does
    not interact with external security products, perform threat intelligence lookups,
    manage identities, or handle security alerts. Consequently, it does not align
    with any of the defined product categories (SIEM, EDR, Network Security, Threat
    Intelligence, Email Security, IAM, Cloud Security, ITSM, Vulnerability Management,
    Asset Inventory, or Collaboration).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
