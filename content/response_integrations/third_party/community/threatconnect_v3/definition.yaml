identifier: ThreatConnectV3
name: Threat Connect V3
parameters:
    -   name: API Access ID
        type: string
        description: The Unique Access ID generated from the ThreatConnect platform.
        is_mandatory: true
        integration_identifier: ThreatConnectV3
    -   name: API Secret Key
        type: password
        description: The Secret Key associated with the Access ID.
        is_mandatory: true
        integration_identifier: ThreatConnectV3
    -   name: API Default Org
        type: string
        description: The default organization name to access threat intelligence.
        is_mandatory: true
        integration_identifier: ThreatConnectV3
    -   name: API Root
        default_value: https://sandbox.threatconnect.com/api
        type: string
        description: The base URL of the ThreatConnect API instance.
        is_mandatory: true
        integration_identifier: ThreatConnectV3
    -   name: Verify SSL
        default_value: true
        type: boolean
        description: If selected, the integration validates the SSL certificate when connecting to the server. Selected by default.
        is_mandatory: false
        integration_identifier: ThreatConnectV3
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/threatconnect
categories:
    - Threat Intelligence
    - Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
