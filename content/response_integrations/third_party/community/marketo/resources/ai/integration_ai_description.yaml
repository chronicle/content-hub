product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Marketo integration provides capabilities to retrieve lead information and
    associate it with user entities within the SOAR platform. Specifically, the actions
    'Get Lead By Email Param' and 'Get Lead By Entity Email' are designed to fetch
    contextual metadata (first name, last name, lead ID) for user entities, which
    aligns with the 'Asset Inventory' category definition of retrieving more information
    about an internal asset (in this case, a user). The integration does not perform
    SIEM, EDR, Network Security, Threat Intelligence, Email Security, IAM, Cloud Security,
    ITSM, Vulnerability Management, or Collaboration functions. While it interacts
    with user data, it does not manage identity lifecycles (IAM) or provide security
    reputation scores (Threat Intelligence).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
