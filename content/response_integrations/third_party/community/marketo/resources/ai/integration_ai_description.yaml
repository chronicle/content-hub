  reasoning: >-
    The Marketo integration is a marketing automation platform designed for managing
    leads and marketing campaigns. Its primary actions include creating leads, retrieving
    lead information, and triggering marketing campaigns. These capabilities do not
    align with the provided security-focused product categories. It does not perform
    security log analysis (SIEM), host-level investigation (EDR), network traffic
    control (Network Security), threat reputation enrichment (Threat Intelligence),
    email security management (Email Security), identity lifecycle management (IAM),
    cloud infrastructure management (Cloud Security), ticketing (ITSM), vulnerability
    assessment (Vulnerability Management), or internal IT asset inventory management.
    While the integration retrieves 'lead' information, this is marketing data rather
    than security-relevant asset data. Consequently, it does not fit into any of the
    defined categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
