Create lead:
  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using provided user details. This action is used
    to programmatically register a new contact within the Marketo marketing automation
    platform by providing their email, name, and country information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the new lead you want to create.
    This is used as the primary lookup field. |

    | First Name | String | Yes | The first name of the new lead. |

    | Last Name | String | Yes | The last name of the new lead. |

    | Country | String | Yes | The country of the new lead. |


    ### Additional Notes

    This action uses the `createOnly` method, meaning it will attempt to create a
    new record and will not update an existing one if the email already exists in
    Marketo. The action requires valid Marketo API credentials (Client ID, Client
    Secret, and Munchkin ID) to be configured in the integration settings.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Marketo API credentials
    from the integration configuration and the lead details (Email, First Name, Last
    Name, Country) from the action parameters.

    2. **Client Initialization**: Initializes the MarketoClient using the provided
    Munchkin ID and credentials.

    3. **Data Preparation**: Formats the input data into a structure compatible with
    the Marketo API.

    4. **API Execution**: Calls the Marketo API's `create_update_leads` method with
    the `createOnly` action flag.

    5. **Response Handling**: Parses the API response to check for success or specific
    error reasons.

    6. **Finalization**: Returns a success message with the new Lead ID or a failure
    message with error details to the Google SecOps platform.
