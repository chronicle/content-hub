  ai_description: >-
    ### General Description

    This action creates a new lead in the Marketo platform using the provided user
    details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | string | Yes | The email address of the new lead. |

    | First Name | string | Yes | The first name of the new lead. |

    | Last Name | string | Yes | The last name of the new lead. |

    | Country | string | Yes | The country of the new lead. |


    ### Flow Description

    1. Extract integration configuration parameters (Client Id, Client Secret, Munchkin
    Id).

    2. Extract action parameters (Email, First Name, Last Name, Country).

    3. Initialize the `MarketoClient`.

    4. Execute the `create_update_leads` method with `action='createOnly'` to create
    the lead in Marketo.

    5. Process the response and add the result JSON to the action output.


    ### Additional Notes

    There are no additional notes for this action.
