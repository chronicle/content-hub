  ai_description: >-
    ### General Description

    Retrieves lead data from Marketo based on user entities with valid email addresses.
    This action fetches contextual information such as first name, last name, and
    lead ID from Marketo and enriches the corresponding entities in Google SecOps.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Initializes the Marketo client using the integration's configured credentials.

    2. Iterates through the target entities provided in the case.

    3. Validates if the entity type is `USER` and if its identifier matches a valid
    email address format.

    4. Queries the Marketo API to fetch lead details using the email address as a
    filter.

    5. If a lead is found, extracts the first name, last name, email, and lead ID.

    6. Enriches the entity by updating its additional properties with the extracted
    lead data and marking it as enriched.

    7. Updates the enriched entities in Google SecOps and returns a JSON result containing
    the enriched data and the total count of leads found.
