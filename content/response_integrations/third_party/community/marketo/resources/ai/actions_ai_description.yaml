Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the **Marketo** instance. It ensures that the provided credentials (Client
    Id, Client Secret, and Munchkin Id) are valid and that the system can successfully
    communicate with the Marketo API.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters.


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting phase
    to confirm that the integration is correctly configured.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Client Id`, `Client
    Secret`, and `Munchkin Id` from the integration settings.

    2. **Client Initialization**: It initializes the `MarketoClient` using the retrieved
    credentials.

    3. **Connectivity Test**: It attempts to fetch a lead with the ID `1` using the
    `get_lead_by_id` method. This serves as a lightweight request to validate the
    API connection.

    4. **Result Reporting**: If the request is successful, the action completes with
    a success status. If an exception occurs, it indicates a connectivity or authentication
    failure.
