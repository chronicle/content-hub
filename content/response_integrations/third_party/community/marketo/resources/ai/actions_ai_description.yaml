Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Marketo instance by authenticating and making a basic
    API request. This action is used to verify that the integration is configured
    correctly and can successfully communicate with the Marketo service.


    ### Flow Description

    1. Extracts integration configuration parameters (Client ID, Client Secret, Munchkin
    ID).

    2. Initializes the Marketo client using the provided credentials.

    3. Executes a test API call (`get_lead_by_id` with ID 1) to verify authentication
    and connectivity.

    4. Returns a success message if the API call completes without errors.


    ### Additional Notes

    This is a standard ping action used solely to verify integration health. It does
    not process entities, fetch contextual data for a case, or mutate any external
    or internal data.
