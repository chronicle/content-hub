  ai_description: >-
    ### General Description

    The **Request Campaign** action allows users to trigger a specific marketing campaign
    for a designated lead within the Marketo platform. This action is primarily used
    to automate marketing workflows or responses based on security events or identified
    user behavior.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Campaign Id | string | Yes | The unique identifier of the Marketo campaign to
    be triggered. The action converts this to an integer internally. |

    | Lead Id | string | Yes | The unique identifier of the lead (user/contact) for
    whom the campaign should be requested. The action converts this to an integer
    internally. |

    | Tokens Json | string | No | A JSON-formatted string containing key-value pairs
    representing tokens to be passed to the campaign. Keys are processed to ensure
    lowercase values unless they contain the word 'password'. |


    ### Flow Description

    1. **Initialization**: The action retrieves Marketo integration credentials (Client
    ID, Client Secret, Munchkin ID) and the specific action parameters (Campaign ID,
    Lead ID, and Tokens JSON).

    2. **Token Processing**: If provided, the `Tokens Json` is parsed. The logic iterates
    through the keys and converts values to lowercase, except for values associated
    with keys containing 'password' to preserve credential integrity.

    3. **API Connection**: A connection is established with the Marketo API using
    the `MarketoClient` and the provided credentials.

    4. **Execution**: The action calls the `request_campaign` method on the Marketo
    client, passing the Campaign ID, the Lead ID (as a list), and the processed tokens.

    5. **Completion**: If the API call is successful, the action returns a success
    message and a boolean result of `True`. If an error occurs, it logs the exception
    and returns a failure status.
