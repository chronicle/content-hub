Get Lead By Entity Email:
  ai_description: >-
    ### General Description

    Retrieves lead data from Marketo for User entities that have a valid email address
    as their identifier. It fetches contextual details such as first name, last name,
    email, and lead ID to enrich the entity within the SecOps platform.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Validates if the entity identifier matches a standard email format and checks
    if the entity type is `USER`.

    3. Makes an API call to Marketo (`get_multiple_leads_by_filter_type`) using the
    validated email address as the filter.

    4. If a lead is found, extracts the lead's first name, last name, email, and Marketo
    Lead ID.

    5. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    6. Returns a JSON result containing the enriched entities and the total count
    of leads found.


    ### Additional Notes

    Only `USER` entities with valid email identifiers are processed. Other entity
    types or entities with invalid email formats are skipped and will not be enriched.
  ai_short_description: >-
    Retrieves lead information from Marketo for User entities with valid email addresses
    and enriches the entities with the fetched details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the target entities' additional properties with lead information retrieved
      from Marketo.
    reasoning: >-
      The action fetches data from Marketo via the 'get_multiple_leads_by_filter_type'
      API method (fetches_data=true). It does not mutate external data in Marketo.
