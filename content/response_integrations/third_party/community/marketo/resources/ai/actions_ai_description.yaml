  ai_description: >-
    ### General Description

    The **Create lead** action allows users to create a new lead record within the
    Marketo platform. This is typically used to synchronize user information or register
    new contacts discovered during an investigation into marketing or CRM workflows.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves integration credentials (Client
    Id, Client Secret, Munchkin Id) and action-specific parameters (Email, First Name,
    Last Name, Country).

    2. **API Connection:** It initializes the Marketo Client using the provided credentials.

    3. **Lead Creation:** The action sends a request to Marketo to create a lead using
    the `createOnly` method, ensuring that it only creates a new record and does not
    update existing ones based on the email address.

    4. **Response Handling:** It parses the API response. If the creation is successful,
    it returns the lead ID. If it fails (e.g., lead already exists or invalid data),
    it captures the error reasons.

    5. **Finalization:** The action reports the execution status and provides the
    raw JSON response from Marketo.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the new lead. Used as the primary
    lookup field. |

    | First Name | String | Yes | The first name of the new lead. |

    | Last Name | String | Yes | The last name of the new lead. |

    | Country | String | Yes | The country associated with the new lead. |


    ### Additional Notes

    * This action does not process SOAR entities; it relies entirely on the provided
    input parameters.
