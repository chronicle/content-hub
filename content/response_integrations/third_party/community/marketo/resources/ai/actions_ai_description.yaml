    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Marketo lead information (first name,
      last name, email, lead ID) and sets the is_enriched flag to true.
