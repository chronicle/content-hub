  ai_description: >-
    ### General Description

    The **Get Lead By Entity Email** action enriches User entities within Google SecOps
    by retrieving corresponding lead information from Marketo. It uses the entity's
    identifier (email address) to query the Marketo database and returns key details
    such as the Lead ID, first name, and last name.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the integration's
    global configuration (Client ID, Client Secret, and Munchkin ID).


    ### Flow Description

    1. **Initialization**: The action initializes the Marketo client using the provided
    integration credentials.

    2. **Entity Filtering**: It iterates through the target entities, selecting only
    those of type `USER` that possess a valid email format (verified via regex).

    3. **Data Retrieval**: For each valid entity, the action queries Marketo using
    the `get_multiple_leads_by_filter_type` method with the email as the filter.

    4. **Enrichment**: If a matching lead is found, the action extracts the Lead ID,
    first name, last name, and email.

    5. **Internal Update**: The extracted data is added to the entity's `additional_properties`,
    the `is_enriched` flag is set to `true`, and the entity is updated within the
    SOAR platform.

    6. **Results**: A JSON result containing the enrichment details for all processed
    entities and the total count of leads found is attached to the action output.


    ### Additional Notes

    - Entities that do not match the email regex or are not of type `USER` are skipped
    with a log message.
