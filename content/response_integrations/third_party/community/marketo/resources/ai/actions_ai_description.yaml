Get Lead By Email Param:
  ai_description: "### General Description\nThe **Get Lead By Email Param** action\
    \ retrieves detailed lead information from Marketo for a specific email address\
    \ provided as an input parameter. This action is designed to fetch marketing-related\
    \ context about a user, such as their Lead ID and other profile attributes stored\
    \ in Marketo, without requiring the email to be an existing entity in the Google\
    \ SecOps case.\n\n### Parameters Description\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| Email | String | Yes | The email\
    \ address of the user you want to retrieve details for. The value is converted\
    \ to lowercase before the search. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action extracts Marketo API credentials (Client ID, Client Secret, and Munchkin\
    \ ID) from the integration configuration.\n2. **Input Processing**: The action\
    \ retrieves the `Email` parameter and converts it to lowercase to ensure consistency\
    \ with Marketo's search requirements.\n3. **API Interaction**: The action uses\
    \ the Marketo REST API client to execute a search (`get_multiple_leads_by_filter_type`)\
    \ using the email as the filter.\n4. **Result Evaluation**: \n    * If lead data\
    \ is returned, the action identifies the Lead ID and constructs a success message.\n\
    \    * If no data is found, the action reports that the user does not exist in\
    \ Marketo.\n5. **Output**: The action attaches the raw lead details as a JSON\
    \ result and terminates with a summary message and a boolean status indicating\
    \ if the lead was found.\n\n### Additional Notes\nThis action operates independently\
    \ of the entities present in the SecOps case. It relies strictly on the provided\
    \ `Email` parameter."
