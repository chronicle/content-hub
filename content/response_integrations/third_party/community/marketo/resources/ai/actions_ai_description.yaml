  ai_description: >-
    ### General Description

    This action retrieves lead information from Marketo for a specified email address.
    It is designed to fetch contextual metadata about a user or lead, which can be
    used for further investigation or enrichment within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | string | true | The email address of the user you want to get the details
    for. |


    ### Additional Notes

    This action requires valid Marketo API credentials (Client ID, Client Secret,
    and Munchkin ID) to be configured in the integration settings. The action does
    not modify any external or internal data; it only retrieves information and adds
    it to the action result.


    ### Flow Description

    1. Extract configuration parameters (Client ID, Client Secret, Munchkin ID) from
    the integration settings.

    2. Extract the `Email` parameter provided by the user.

    3. Initialize the `MarketoClient` using the extracted credentials.

    4. Query Marketo for leads matching the provided email address using the `get_multiple_leads_by_filter_type`
    method.

    5. If a lead is found, return the lead ID and set the action result to true; otherwise,
    report that the user does not exist and set the result to false.

    6. Add the raw lead details to the action result JSON for further use in the playbook.
