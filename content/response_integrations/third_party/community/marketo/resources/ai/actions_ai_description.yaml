  ai_description: >-
    ### General Description

    This action triggers a marketing campaign for a specific lead in the Marketo platform.
    It allows users to pass custom tokens to the campaign, enabling automated marketing
    workflows directly from the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Lead Id | string | Yes | The ID of the lead to be added to the campaign. |

    | Campaign Id | string | Yes | The ID of the campaign to trigger. |

    | Tokens Json | string | No | A JSON string containing tokens for the campaign.
    |


    ### Additional Notes

    The `Tokens Json` parameter is optional. If provided, it must be a valid JSON
    string.


    ### Flow Description

    1. Extract configuration parameters (Client ID, Client Secret, Munchkin ID) from
    the integration settings.

    2. Extract action parameters (Campaign Id, Lead Id, Tokens) from the action input.

    3. Parse the `Tokens Json` string into a dictionary.

    4. Initialize the Marketo client using the provided configuration.

    5. Execute the `request_campaign` method in Marketo with the provided Campaign
    ID, Lead ID, and tokens.

    6. Log the execution status and end the action with a success or failure message.
