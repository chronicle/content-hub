  ai_description: >-
    ### General Description

    This action retrieves lead information from Marketo for entities identified as
    users with valid email addresses. It queries the Marketo API using the email address,
    retrieves details such as first name, last name, and lead ID, and updates the
    entity's additional properties within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client Id | String | Yes | The Client ID for Marketo API authentication. |

    | Client Secret | String | Yes | The Client Secret for Marketo API authentication.
    |

    | Munchkin Id | String | Yes | The Munchkin ID for Marketo API authentication.
    |


    ### Additional Notes

    This action requires valid Marketo API credentials. It only processes entities
    of type 'USER' that have a valid email address as their identifier.


    ### Flow Description

    1. Initialize the Marketo client using the provided configuration parameters (Client
    ID, Client Secret, Munchkin ID).

    2. Iterate through the target entities in the SOAR case.

    3. Validate that the entity is of type 'USER' and that its identifier is a valid
    email address.

    4. Query the Marketo API for lead details using the email address.

    5. If a lead is found, update the entity's `additional_properties` with the retrieved
    data (first name, last name, email, lead ID) and mark the entity as enriched.

    6. Update the enriched entities in the SOAR platform.

    7. Add the result as a JSON object containing the enriched entities and the total
    count of leads found.
