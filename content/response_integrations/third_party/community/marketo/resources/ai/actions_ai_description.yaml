  ai_description: >-
    ### General Description

    Triggers a specific campaign for a designated lead in Marketo. This action interacts
    with the Marketo API to execute a campaign request, allowing users to pass specific
    tokens to customize the campaign execution.


    ### Parameters Description

    | Parameter Name | Mandatory | Expected Type | Description |

    | --- | --- | --- | --- |

    | Campaign Id | Yes | Integer | The unique identifier of the Marketo campaign
    to be requested. |

    | Lead Id | Yes | Integer | The unique identifier of the Marketo lead to be included
    in the campaign. |

    | Tokens Json | No | String (JSON) | A JSON-formatted string containing tokens
    to be passed to the campaign. The action automatically parses this JSON and lowercases
    values unless the key contains the word 'password'. |


    ### Flow Description

    1. Extracts the necessary integration credentials and action parameters (`Campaign
    Id`, `Lead Id`, `Tokens Json`).

    2. Parses the `Tokens Json` string into a dictionary, adjusting values as needed
    (lowercasing non-password values).

    3. Authenticates with the Marketo API using the provided credentials.

    4. Executes the `request_campaign` method via the Marketo API for the specified
    campaign and lead.

    5. Returns a success message if the campaign was requested successfully, or fails
    the action with an error message if the API call encounters an issue.
