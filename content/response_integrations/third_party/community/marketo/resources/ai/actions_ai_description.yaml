  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using the provided user details. This action interacts
    with the Marketo API to generate a new lead record and returns the resulting lead
    ID or an error message if the creation fails.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Email | String | Yes | The email address of the new lead you want to create.
    |

    | First Name | String | Yes | The first name of the new lead you want to create.
    |

    | Last Name | String | Yes | The last name of the new lead you want to create.
    |

    | Country | String | Yes | The country of the new lead you want to create. |


    ### Flow Description

    1. Extracts integration configuration and action parameters (Email, First Name,
    Last Name, Country).

    2. Constructs the input data payload with the provided user details.

    3. Calls the Marketo API to create the lead using the `createOnly` action.

    4. Evaluates the API response to determine success or failure.

    5. Outputs the result message, including the new lead ID if successful, and attaches
    the JSON response to the action results.
