  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Marketo platform. It ensures that the provided credentials (Client ID,
    Client Secret, and Munchkin ID) are valid and that the environment can successfully
    communicate with the Marketo API.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Client Id`, `Client
    Secret`, and `Munchkin Id` from the Marketo integration settings.

    2. **Client Initialization**: It initializes the `MarketoClient` using the extracted
    credentials.

    3. **Connectivity Test**: The action attempts to execute a `get_lead_by_id` request
    for a lead with ID `1`. This serves as a functional test to confirm API access
    and permissions.

    4. **Execution Result**: If the API call is successful, the action terminates
    with a success status. If an exception occurs during the process, it is raised,
    indicating a connectivity or configuration issue.


    ### Additional Notes

    * This action does not process any entities from the case.

    * It is strictly used for health checks and troubleshooting integration setup.
