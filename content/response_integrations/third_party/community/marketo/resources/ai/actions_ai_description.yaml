Request Campaign:
  ai_description: >-
    Triggers a specific Marketo campaign for a designated lead. This action allows
    security or marketing automation workflows to programmatically initiate campaigns
    within Marketo by providing the Campaign ID and Lead ID. It also supports passing
    custom tokens via a JSON string to personalize the campaign execution.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves Marketo configuration credentials
    (Client ID, Secret, Munchkin ID) and action parameters (Campaign ID, Lead ID,
    and optional Tokens JSON).

    2. **Token Processing:** If provided, the Tokens JSON is parsed and processed
    to ensure keys are formatted correctly (lowercase, unless they contain sensitive
    strings like 'password').

    3. **API Execution:** The action initializes the Marketo client and executes the
    `request_campaign` method using the provided IDs and tokens.

    4. **Result Reporting:** The action returns a success message if the campaign
    was triggered successfully or an error message if the request failed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Campaign Id | string | Yes | The unique identifier of the Marketo campaign to
    be triggered. The value is treated as an integer. |

    | Lead Id | string | Yes | The unique identifier of the Marketo lead for whom
    the campaign is triggered. The value is treated as an integer. |

    | Tokens Json | string | No | A JSON-formatted string containing key-value pairs
    of tokens to be used in the campaign. |


    ### Additional Notes

    This action does not process entities from the Google SecOps case; it relies entirely
    on the provided input parameters.
