Create lead:
  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using the provided user details such as email, first
    name, last name, and country. This action initiates a state change in the external
    Marketo platform by generating a new lead record.


    ### Flow Description

    1. Extracts the provided action parameters: Email, First Name, Last Name, and
    Country.

    2. Constructs a data payload containing the lead's information.

    3. Initializes the Marketo API client and executes a `create_update_leads` API
    call with the `createOnly` action to Marketo.

    4. Evaluates the API response to determine if the lead was successfully created
    or if an error occurred.

    5. Outputs a success or failure message and attaches the raw Marketo response
    as a JSON result to the action.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It relies entirely on
    the explicit values provided in the action parameters to create the lead.
  ai_short_description: >-
    Creates a new lead in Marketo using the provided user details such as email, name,
    and country.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new lead record in the external Marketo platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST/execute request to the Marketo API to create a new lead,
      which mutates external data. It does not fetch contextual data for enrichment,
      nor does it mutate internal SecOps data, update entities, create insights, modify
      alerts, or create case comments.
