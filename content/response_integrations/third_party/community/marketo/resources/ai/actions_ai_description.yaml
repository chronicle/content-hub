    1. Extracts the target email address from the action parameters.

    2. Initializes the Marketo client using the integration credentials.

    3. Makes an API call (`get_multiple_leads_by_filter_type`) to Marketo to fetch
    lead details matching the provided email.

    4. Evaluates the response to determine if the lead exists.

    5. Returns the lead details as a JSON result and outputs a success or failure
    message.


