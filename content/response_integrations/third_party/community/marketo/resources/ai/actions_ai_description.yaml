Request Campaign:
  ai_description: >-
    ### General Description

    Triggers a specific Marketo campaign for a designated lead using provided tokens.
    This action initiates a state change in the Marketo platform by requesting a campaign
    execution.


    ### Flow Description

    1. Extracts the `Campaign Id`, `Lead Id`, and `Tokens Json` from the action parameters.

    2. Parses the `Tokens Json` string into a dictionary and converts its values to
    lowercase (excluding any keys containing 'password').

    3. Initializes the Marketo API client using the integration configuration credentials.

    4. Executes an API call (`request_campaign`) to Marketo to trigger the specified
    campaign for the given lead ID with the parsed tokens.

    5. Returns a success message and completes the action if the campaign is requested
    successfully.


    ### Additional Notes

    Ensure that the `Tokens Json` parameter is a valid JSON string, as it will be
    parsed during execution.
