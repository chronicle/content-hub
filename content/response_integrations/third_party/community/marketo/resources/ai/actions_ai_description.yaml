Get Lead By Entity Email:
  ai_description: >-
    ### General Description

    The **Get Lead By Entity Email** action enriches USER entities by retrieving corresponding
    lead information from the Marketo platform. It uses the entity's identifier (email
    address) to query Marketo's database for associated metadata such as names and
    lead IDs.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (Client Id, Client Secret, and Munchkin Id) to authenticate
    with the Marketo API.


    ### Flow Description

    1. **Authentication**: The action initializes the Marketo client using the provided
    integration credentials (Client Id, Client Secret, and Munchkin Id).

    2. **Entity Filtering**: It iterates through the target entities, selecting only
    those of type `USER`.

    3. **Email Validation**: For each USER entity, it performs a regex check to ensure
    the identifier is a valid email address format.

    4. **Data Retrieval**: It queries Marketo for lead details using the validated
    email address as a filter.

    5. **Enrichment**: If a lead is found, the action extracts the first name, last
    name, email, and lead ID from the Marketo response.

    6. **Internal Update**: The action updates the entity's `additional_properties`
    with the retrieved data (prefixed with 'Marketo_') and marks the entity as enriched
    (`is_enriched = True`).

    7. **Output**: Finally, it provides a JSON result containing the enrichment details
    for all processed entities and the total count of leads found.


    ### Additional Notes

    Entities that do not match the email regex or are not of type `USER` are skipped
    with a log message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
