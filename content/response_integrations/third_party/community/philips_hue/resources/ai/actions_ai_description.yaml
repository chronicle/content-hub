Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between the Google
    SecOps platform and the Philips HUE Bridge. It serves as a diagnostic tool to
    ensure that the integration's configuration parameters, such as the Bridge IP
    and Authorized Username, are correct and that the bridge is reachable over the
    network.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters:

    * **Bridge IP**: The IP address of the Philips HUE bridge.

    * **Authorized Username**: The username used to authorize access to the bridge's
    API.


    ### Flow Description

    1. **Initialization**: The action initializes the `PhilipsManager` using the `Bridge
    IP` and `Authorized Username` retrieved from the integration configuration.

    2. **Connectivity Test**: It calls the `test_connectivity` method, which performs
    a synchronous GET request to the base API endpoint of the Philips HUE Bridge.

    3. **Validation**: The action checks if the request was successful (HTTP status
    code 200).

    4. **Result Reporting**: If the connection is successful, it returns a success
    message and sets the script result to `True`. If an error occurs during the request,
    it captures the exception and reports a failure.


    ### Additional Notes

    This action does not interact with any entities and is strictly used for health
    checks of the integration connection.
