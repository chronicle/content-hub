  ai_description: >-
    Tests connectivity to the Philips HUE Bridge.


    ### General Description

    This action verifies that the Google SecOps platform can successfully communicate
    with the Philips HUE Bridge using the provided integration configuration credentials.
    It acts as a standard Ping test to ensure the API endpoint is reachable and authorized.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies entirely
    on the integration-level configuration parameters (`Bridge IP` and `Authorized
    Username`).


    ### Flow Description

    1. Extracts the `Bridge IP` and `Authorized Username` from the integration configuration.

    2. Initiates a GET request to the Philips HUE Bridge API to test reachability
    and authorization.

    3. Evaluates the HTTP response and returns a success message if the connection
    is established, or an error message if it fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a simple GET request to the Philips HUE Bridge API to verify
      connectivity. It does not fetch contextual data for alerts or entities, nor
      does it mutate any external or internal data. It does not interact with entities,
      insights, alerts, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping' and serves only to test connectivity. According to
      Rule 0.1, Ping actions are explicitly excluded from being categorized as enrichment.
      It also does not perform any containment, blocking, or identity revocation,
      so it is not a remediation action.
    remediation: false
  entity_usage:
