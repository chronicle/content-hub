    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action interacts with an IoT device (Philips HUE light) to turn it off.
      This does not align with any of the standard security product categories such
      as enriching IOCs/assets, updating alerts/tickets, blocking IOCs, containing
      hosts, or managing emails/identities.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Turns off a specific Philips HUE light by its ID.


    ### Flow Description

    1. Extracts the integration configuration parameters (Bridge IP, Authorized Username)
    and the action parameter (Light ID).

    2. Checks if the specified light ID exists on the Philips HUE bridge.

    3. If the light exists, checks its reachability.

    4. If reachable, sends a request to turn off the light.

    5. Returns the execution status and adds the light state details to the JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Light ID | string | True | ID of the light you want to turn off. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Turns off a specific Philips HUE light by sending a PUT request to the bridge
      API.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data to check if the light exists and is reachable. It mutates
      external data by sending a PUT request to turn off the light. It does not mutate
      internal data, update entities, create insights, modify alert data, or create
      case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data (turns off a light), so it is not an enrichment
      action. It does not perform identity, host, network, or email-based remediation,
      so it is not a remediation action.
    remediation: false
