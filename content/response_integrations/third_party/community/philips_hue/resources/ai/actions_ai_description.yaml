  ai_description: >-
    ### General Description

    This action turns off a specific Philips HUE light by its unique identifier. It
    interacts with a Philips HUE bridge to verify the light's existence and reachability
    before sending a command to change its power state to 'off'.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Light ID | string | Yes | The identifier of the light to be turned off. |


    ### Flow Description

    1. **Initialization**: The action extracts the required configuration parameters
    (Bridge IP, Authorized Username) and the 'Light ID' action parameter.

    2. **Verification**: It initializes the `PhilipsManager` and performs a search
    to verify that the provided 'Light ID' exists on the bridge.

    3. **Reachability Check**: If the light exists, it checks if the light is currently
    reachable from the bridge.

    4. **Execution**: If the light is reachable, it sends a PUT request to the bridge
    to set the light's state to 'off'.

    5. **Result**: The action returns the result of the operation, indicating success
    or failure based on the bridge's response.
