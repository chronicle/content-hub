  ai_description: >-
    ### General Description

    This action controls a Philips Hue light by adjusting its power state, color,
    and alert effects via the Philips Hue Bridge API. It allows analysts to trigger
    visual indicators on physical hardware, which can be useful for physical security
    alerting or status signaling.


    ### Flow Description

    1. **Initialization**: The action extracts the Philips Hue Bridge IP and authorized
    username from the integration configuration.

    2. **Parameter Retrieval**: It retrieves the `Light ID`, `Color`, and `Alert effect`
    from the action parameters.

    3. **Validation**: It performs a GET request to the Philips Hue Bridge to verify
    that the specified `Light ID` exists.

    4. **Execution**: If the light exists, it performs a PUT request to the Bridge
    API to update the light's state (power, color, and effect).

    5. **Result**: The action returns the status of the operation, indicating success
    or failure based on the API response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Light ID | string | Yes | The unique identifier of the Philips Hue light to
    control. |

    | Color | ddl | Yes | The color to set the light to (Options: Red, Orange, Yellow,
    Green, Blue, Purple, Pink). |

    | Alert effect | ddl | Yes | The visual effect to apply (Options: None, Flicker-Once,
    Flicker-Loop). |


    ### Additional Notes

    This action requires a valid Philips Hue Bridge IP and an authorized username
    configured in the integration settings to communicate with the device.
