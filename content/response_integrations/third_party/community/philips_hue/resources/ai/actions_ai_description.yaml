Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with the Philips HUE Bridge.


    ### Flow Description

    1. Extracts the integration configuration parameters (Bridge IP and Authorized
    Username).

    2. Initializes the PhilipsManager.

    3. Makes a GET request to the Philips HUE Bridge API to verify connectivity.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Philips HUE Bridge.
