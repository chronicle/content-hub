Turn On Light and Color:
  ai_description: >-
    ### General Description

    Turns on a specific Philips HUE light by its ID, applying a chosen color and alert
    effect. This action interacts with the Philips HUE bridge to control IoT lighting
    devices.


    ### Flow Description

    1. Extracts the `Light ID`, `Color`, and `Alert effect` parameters from the action
    configuration.

    2. Verifies if the specified light ID exists on the Philips HUE bridge by making
    a GET request to the `/lights/` API endpoint.

    3. Checks the reachability of the light by making a GET request to the `/lights/{light_id}`
    API endpoint.

    4. If the light is reachable, sends a PUT request to the `/lights/{light_id}/state`
    API endpoint to turn on the light and apply the specified color (hue) and alert
    effect.

    5. Returns the execution status and JSON results containing the light's state
    details.


    ### Additional Notes

    The action requires the bridge IP and authorized username to be configured in
    the integration settings.
