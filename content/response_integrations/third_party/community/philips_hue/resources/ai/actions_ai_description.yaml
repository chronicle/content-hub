  ai_description: >-
    Turns off a specific Philips Hue light bulb using its unique identifier. This
    action interacts with the Philips Hue Bridge API to verify the light's existence
    and reachability before sending a command to update its state to 'off'.\n\n###
    Flow Description:\n1. **Parameter Extraction:** Retrieves the Bridge IP and Authorized
    Username from the integration configuration and the Light ID from the action parameters.\n2.
    **Existence Check:** Queries the bridge to ensure the provided Light ID exists.\n3.
    **Reachability Check:** Verifies if the light is currently reachable by the bridge.\n4.
    **State Update:** Sends a PUT request to the bridge to set the light's 'on' state
    to false.\n5. **Result Reporting:** Returns the status of the operation and the
    details of the light's state.\n\n### Parameters Description:\n| Parameter | Type
    | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Light ID | String
    | Yes | The unique identifier of the light bulb you wish to turn off. |\n\n###
    Additional Notes:\n- This action does not process SecOps entities; it operates
    directly on the provided Light ID parameter.
