  ai_description: >-
    ### General Description

    Turns on a specific Philips Hue light bulb and applies a selected color and alert
    effect. This action is used to provide physical visual indicators (e.g., turning
    a light red during a high-severity incident) by interacting with the Philips Hue
    Bridge API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Light ID | string | Yes | The unique identifier of the light bulb you want to
    control. |

    | Color | ddl | Yes | The color to apply to the light. Options include Red, Orange,
    Yellow, Green, Blue, Purple, and Pink. |

    | Alert effect | ddl | Yes | The visual effect to trigger. 'None' just turns the
    light on; 'Flicker-Once' performs a single alert cycle; 'Flicker-Loop' performs
    alert cycles for 15 seconds. |


    ### Flow Description

    1. **Initialization**: Extracts the Bridge IP and Username from the integration
    configuration, and the Light ID, Color, and Alert effect from the action parameters.

    2. **Validation**: Checks if the provided Light ID exists on the Philips Hue Bridge.

    3. **Reachability Check**: Verifies if the specific light bulb is currently reachable
    by the bridge.

    4. **Execution**: Sends a PUT request to the bridge to turn the light on, set
    the hue (based on the chosen color), and apply the selected alert effect.

    5. **Reporting**: Returns a success message if the light was successfully updated,
    or an error message if the light was unreachable or the ID was invalid.


    ### Additional Notes

    This action does not run on entities; it requires a specific Light ID to be provided
    manually as a parameter.
