Turn Off Light:
  ai_description: >-
    ### General Description

    Turns off a specific Philips HUE light using its Light ID. This action interacts
    with the Philips HUE bridge to change the physical state of the targeted light
    bulb to 'off'.


    ### Flow Description

    1. Extracts the `Light ID` parameter provided by the user.

    2. Verifies if the specified light ID exists on the Philips HUE bridge by making
    a GET request to the `/lights/` API endpoint.

    3. Checks if the light is reachable by the bridge.

    4. If the light exists and is reachable, makes a PUT request to the `/lights/{light_id}/state`
    endpoint with the payload `{"on": false}` to turn off the light.

    5. Returns the execution status, an output message, and a JSON result containing
    the light's state details.


    ### Additional Notes

    - The action will fail if the specified Light ID does not exist under the configured
    bridge or if the light is unreachable.

    - Ensure the integration is properly configured with the correct Bridge IP and
    Authorized Username.
  ai_short_description: >-
    Turns off a specific Philips HUE light by its Light ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a PUT request to the Philips HUE bridge to change the state of the specified
      light to 'off'.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making GET requests to check if the light ID exists
      and is reachable. It mutates external data by making a PUT request to the Philips
      HUE bridge to turn the light off. It does not mutate internal SecOps data, update
