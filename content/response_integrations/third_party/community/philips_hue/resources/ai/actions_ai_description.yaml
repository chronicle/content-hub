  ai_description: >-
    ### General Description

    This action tests the connectivity to a Philips HUE Bridge by performing a GET
    request to the bridge's API. It is a diagnostic tool used to verify that the SOAR
    platform can communicate with the external device.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bridge IP | String | Yes | The IP address of the Philips HUE bridge. |

    | Authorized Username | String | Yes | The username to authorize access to the
    product's attributes. |


    ### Additional Notes

    This action is a connectivity test (Ping) and does not perform any data enrichment
    or state changes on the bridge or within the SOAR platform.


    ### Flow Description

    1. Extract the `Bridge IP` and `Authorized Username` from the integration configuration.

    2. Initialize the `PhilipsManager` with the provided credentials.

    3. Execute the `test_connectivity` method, which sends a GET request to the bridge.

    4. Return the connection status and an output message indicating success or failure.
