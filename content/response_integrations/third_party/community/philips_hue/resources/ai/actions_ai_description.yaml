Turn On Light and Color:
  ai_description: >-
    ### General Description

    Turns on a specific Philips Hue light bulb and configures its color and visual
    alert effect. This action is designed to provide physical notifications or status
    indicators within a workspace by interacting with a Philips Hue Bridge.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Light ID | string | Yes | The unique identifier of the light bulb to be controlled.
    |

    | Color | ddl | Yes | The color to apply to the light. Supported values: Red,
    Orange, Yellow, Green, Blue, Purple, Pink. |

    | Alert effect | ddl | Yes | The visual effect to trigger. 'None' turns the light
    on normally. 'Flicker-Once' flashes the light once. 'Flicker-Loop' flashes the
    light for 15 seconds. |


    ### Flow Description

    1. **Initialization**: Retrieves the Bridge IP and Authorized Username from the
    integration configuration.

    2. **Validation**: Checks the Philips Hue Bridge to ensure the provided Light
    ID exists.

    3. **Reachability Check**: Verifies if the specific light bulb is currently reachable
    by the Bridge.

    4. **Execution**: Sends a PUT request to the Bridge API to turn the light on,
    set the specific hue corresponding to the chosen color, and apply the selected
    alert effect.

    5. **Reporting**: Returns the result of the operation, including reachability
    status and API response details.


    ### Additional Notes

    - This action requires the Philips Hue Bridge to be accessible from the Google
    SecOps environment.

    - If the light bulb is powered off at the switch or out of range, the action will
    fail and report that the light is unreachable.
  capabilities:
    can_create_case_comments: false
