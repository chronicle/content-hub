Turn Off Light:
  ai_description: >-
    ### General Description

    The **Turn Off Light** action allows users to programmatically turn off a specific
    Philips HUE light bulb connected to a Philips HUE Bridge. This action is designed
    to interact with the Philips HUE API to change the physical state of a device
    based on its unique identifier.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Light ID** | String | Yes | The unique identifier of the light bulb you wish
    to turn off. This ID can be found by listing lights via the bridge API. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Bridge IP and Authorized
    Username from the integration's global configuration.

    2. **ID Verification**: It queries the Philips HUE Bridge to verify that the provided
    `Light ID` exists within the bridge's registry.

    3. **Reachability Check**: It performs a check to ensure the specific light bulb
    is currently reachable (powered and within range) by the bridge.

    4. **State Mutation**: If the light is valid and reachable, the action sends a
    PUT request to the bridge's state endpoint for that specific light, setting the
    `on` parameter to `false`.

    5. **Result Reporting**: The action provides an output message indicating success
    or failure and returns the raw JSON response from the bridge API.


    ### Additional Notes

    - This action requires a pre-configured and authorized username on the Philips
    HUE Bridge.

    - If the light is physically powered off at a wall switch, the action will identify
    it as 'unreachable' and fail to change the state.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
