product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Docker Hub integration provides administrative capabilities, specifically
    the ability to invite users to teams within an organization. This functionality
    falls under the 'IAM & Identity Management' category, as it involves managing
    user access and group memberships. While the definition for IAM & Identity Management
    emphasizes responding to suspicious behavior, the core capability of managing
    identity (provisioning and access control) is present. The integration does not
    perform SIEM, EDR, Network Security, Threat Intelligence, Email Security, Cloud
    Security (as defined by GCP/AWS/Azure), ITSM, Vulnerability Management, Asset
    Inventory, or Collaboration functions.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
