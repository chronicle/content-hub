product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Docker Hub integration provides administrative capabilities, specifically
    the ability to invite users to teams and perform connectivity tests. It does not
    perform security-focused operations such as log analysis (SIEM), host investigation
    (EDR), network traffic blocking (Network Security), threat intelligence enrichment,
    email security management, security-focused identity remediation (e.g., suspending
    accounts or resetting passwords), cloud infrastructure security monitoring, ticketing
    (ITSM), vulnerability management, asset inventory tracking, or collaboration/notification.
    As the actions are purely administrative and do not address the security-specific
    outcomes defined for these categories, none of the categories are applicable.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
