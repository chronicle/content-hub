Invite User:
  ai_description: >-
    ### General Description

    Invites a user to a specific team within a given organization in Docker Hub. This
    action triggers an invitation workflow in the Docker Hub platform to add a new
    member to a team.


    ### Flow Description

    1. Initializes the Docker Hub client using the provided integration credentials.

    2. Retrieves the `Organization`, `Team`, and `Email` parameters provided to the
    action.

    3. Makes a POST request to the Docker Hub API (`orgs/{org}/groups/{team}/members`)
    to send an invitation to the specified email address.

    4. Returns a success message and completes the action if the API call is successful.


    ### Additional Notes

    Ensure that the provided credentials have the necessary administrative privileges
    within the specified Docker Hub organization to invite new users.
  ai_short_description: >-
    Invites a user to a specific team within a given organization in Docker Hub.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an invitation to a user to join a specific team within a Docker Hub organization.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Docker Hub API to send a team invitation,
      which mutates external data by creating a pending membership record. It does
      not fetch data for enrichment, nor does it mutate internal SecOps data, update
      entities, or create insights.
