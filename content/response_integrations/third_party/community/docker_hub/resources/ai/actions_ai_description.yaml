Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Docker Hub API to ensure that the integration is configured
    correctly and can successfully authenticate. Although the action description in
    the configuration mentions inviting a user, the underlying code strictly performs
    a connectivity check.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Username and Password).

    2. Initializes the Docker Hub client and authenticates with the provided credentials.

    3. Calls the `_catalog` API endpoint to verify connectivity and authentication.

    4. Returns a successful execution state if the connection is established (ignoring
    404 errors which may occur on certain API versions if authentication was otherwise
    successful).


    ### Additional Notes

    This action is typically used as a Ping or Test Connectivity action to validate
    integration settings. It does not require any action-specific parameters.
  ai_short_description: >-
    Tests connectivity to the Docker Hub API to verify integration configuration and
    authentication.
