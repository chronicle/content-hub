  ai_description: >-
    ### General Description

    Invites a user to a specific team within a Docker Hub organization using their
    email address. This action facilitates access management by programmatically sending
    membership invitations to external users, allowing them to join collaborative
    environments in Docker Hub.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Organization | String | Yes | The name of the Docker Hub organization where
    the invitation will be sent. |

    | Team | String | Yes | The specific team within the organization that the user
    is being invited to join. |

    | Email | String | Yes | The email address of the user who will receive the invitation.
    |


    ### Additional Notes

    This action does not run on SOAR entities; it relies entirely on the provided
    input parameters. It requires valid Docker Hub administrator or owner credentials
    to perform the invitation.


    ### Flow Description

    1. **Authentication**: The action authenticates with Docker Hub using the provided
    username and password to obtain a JWT token.

    2. **Parameter Retrieval**: It extracts the target Organization, Team, and Email
    from the action parameters.

    3. **Invitation Request**: It sends a POST request to the Docker Hub API endpoint
    (`/orgs/{org}/groups/{team}/members/`) with the user's email.

    4. **Completion**: The action returns a success message if the invitation is successfully
    dispatched or an error message if the request fails.
