    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Docker Hub API to send an invitation,
      which mutates data in the external system. It does not fetch data for enrichment,
      nor does it mutate internal SecOps data like entities, insights, or case comments.
  categories:
