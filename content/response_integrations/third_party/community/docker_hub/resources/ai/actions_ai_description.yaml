  ai_description: >-
    Invites a user to a specific team in a given organization in Docker Hub. This
    action automates the process of adding a user to a team by sending an invitation
    request to the Docker Hub API.


    ### Flow

    1. Retrieves configuration (credentials) and parameters (Organization, Team, Email).

    2. Initializes the Docker Hub client with the provided credentials.

    3. Sends an invitation request to the specified organization and team using the
    provided email address.

    4. Logs the outcome and ends the action.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Team | string | Yes | The name of the team within the organization. |

    | Organization | string | Yes | The name of the organization. |

    | Email | string | Yes | The email address of the user to invite. |
