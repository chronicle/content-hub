Invite User:
  ai_description: >-
    Invites a user to a specific team within a Docker Hub organization using their
    email address. This action facilitates access management by programmatically adding
    members to organizational groups.


    ### Flow Description:

    1. **Authentication**: Initializes the Docker Hub manager using the provided username
    and password from the integration configuration.

    2. **Parameter Retrieval**: Extracts the target Organization, Team, and user Email
    from the action parameters.

    3. **Invitation Request**: Sends a POST request to the Docker Hub API endpoint
    for the specified organization and team, including the user's email in the payload.

    4. **Completion**: Returns a success message if the invitation is successfully
    sent or logs the error if the request fails.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Team | String | Yes | The name of the team within the Docker Hub organization
    to which the user will be invited. |

    | Organization | String | Yes | The name of the Docker Hub organization that owns
    the team. |

    | Email | String | Yes | The email address of the user to be invited. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a POST request to Docker Hub to create a new user invitation for a specific
      team and organization, which changes the state of the organization's membership
      list.
    fetches_data: false
    internal_data_mutation_explanation: null
