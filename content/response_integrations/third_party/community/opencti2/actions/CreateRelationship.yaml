name: Create Relationship
description: Create a SDO relationship in OpenCTI between two entities
integration_identifier: OpenCTI2
parameters:
-   name: Relationship Type
    type: string
    description: Specify relationship type
    is_mandatory: false
    default_value: related-to
-   name: Source Entity Id
    type: string
    description: Specify source entity id
    is_mandatory: true
-   name: Target Entity Id
    type: string
    description: Specify target entity id
    is_mandatory: true
-   name: Description
    type: string
    description: Specify relationship description
    is_mandatory: false
    default_value: null
-   name: First Seen
    type: string
    description: Specify first seen date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Last Seen
    type: string
    description: Specify last seen date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the relationship
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateRelationship_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
