name: Create Attack Pattern
description: Create an attack pattern in OpenCTI
integration_identifier: OpenCTI2
parameters:
-   name: Name
    type: string
    description: Specify attack pattern name
    is_mandatory: true
-   name: Description
    type: string
    description: Specify attack pattern description
    is_mandatory: false
    default_value: null
-   name: External Id
    type: string
    description: Specify MITRE ATT&CK external id
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the attack pattern
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateAttackPattern_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
