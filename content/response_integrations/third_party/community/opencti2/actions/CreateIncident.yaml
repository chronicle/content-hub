name: Create Incident
description: Create an incident in OpenCTI
integration_identifier: OpenCTI2
parameters:
-   name: Name
    type: string
    description: Specify the name of the incident
    is_mandatory: true
-   name: Description
    type: string
    description: Specify the description of the incident
    is_mandatory: false
    default_value: null
-   name: Created At
    type: string
    description: Specify the creation date of the incident
    is_mandatory: false
    default_value: null
-   name: Severity
    type: string
    description: Specify the severity of the incident
    is_mandatory: false
    default_value: null
-   name: Type
    type: string
    description: Specify the type of the incident
    is_mandatory: false
    default_value: alert
-   name: Labels
    type: string
    description: Specify labels to apply, comma-separated (e.g. label1, label2)'
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify the marking of the incident
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateIncident_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
