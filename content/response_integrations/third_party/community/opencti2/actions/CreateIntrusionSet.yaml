name: Create Intrusion Set
description: Create an intrusion set in OpenCTI
integration_identifier: OpenCTI2
parameters:
-   name: Name
    type: string
    description: Specify intrusion set name
    is_mandatory: true
-   name: Description
    type: string
    description: Specify intrusion set description
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the intrusion set
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateIntrusionSet_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
