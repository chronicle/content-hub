name: Create Threat Actor Group
description: Create a threat actor group in OpenCTI
integration_identifier: OpenCTI2
parameters:
-   name: Name
    type: string
    description: Specify threat actor group name
    is_mandatory: true
-   name: Description
    type: string
    description: Specify threat actor group description
    is_mandatory: false
    default_value: null
-   name: Threat Actor Types
    type: string
    description: Specify threat actor types as comma-separated values
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the threat actor group
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateThreatActorGroup_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
