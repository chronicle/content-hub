name: Add Object to Container
description: Add an object to an existing container in OpenCTI
integration_identifier: OpenCTI2
parameters:
-   name: Container Type
    type: ddl
    optional_values:
        - Report
        - Incident Response Case
        - Request for Takedown
        - Request for Information
        - Grouping
    description: Type of container where the object will be added
    is_mandatory: true
    default_value: Report
-   name: Container Id
    type: string
    description: Identifier of the target container
    is_mandatory: true
-   name: Object Id
    type: string
    description: Identifier of the object to add
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/AddObjectToContainer_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
