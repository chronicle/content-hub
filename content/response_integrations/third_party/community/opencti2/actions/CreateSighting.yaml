name: Create Sighting
description: Create a sighting in OpenCTI
integration_identifier: OpenCTI2
parameters:
-   name: From Object Id
    type: string
    description: Specify source object id
    is_mandatory: true
-   name: To Object Id
    type: string
    description: Specify target object id
    is_mandatory: true
-   name: Description
    type: string
    description: Specify sighting description
    is_mandatory: false
    default_value: null
-   name: First Seen
    type: string
    description: Specify first seen date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Last Seen
    type: string
    description: Specify last seen date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the sighting
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateSighting_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
