product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration 'Luminar IOCs and Leaked Credentials' is primarily designed to
    ingest threat intelligence data, specifically Indicators of Compromise (IOCs)
    and leaked credential records, into the SOAR platform. This aligns directly with
    the Threat Intelligence category, as the primary purpose is to provide intelligence
    for security investigations and alert creation. It does not perform EDR, Network
    Security, Cloud Security, or Vulnerability Management functions. While it processes
    leaked credentials, it does not provide the capability to manage identities (e.g.,
    password resets, account suspension), so IAM & Identity Management is false. It
    does not interact with email systems, so Email Security is false. The job functionality
    is limited to internal case maintenance (closing expired cases) and does not constitute
    an ITSM integration. Therefore, only the Threat Intelligence category is applicable.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
