product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The 'Luminar IOCs and Leaked Credentials' integration is primarily designed to
    ingest threat intelligence data, specifically Indicators of Compromise (IOCs)
    and leaked credential incidents, into the SOAR platform. This aligns directly
    with the 'Threat Intelligence' category, as it provides external indicators to
    help determine reputation and confirm alerts. The integration does not perform
    EDR, Network Security, Cloud Security, Vulnerability Management, or Asset Inventory
    functions. While it handles leaked credentials, it does not perform IAM management
    actions (such as resetting passwords or suspending accounts), nor does it function
    as a SIEM (it does not search logs or provide activity timelines). It does not
    perform ITSM or Collaboration tasks. Therefore, it is classified solely under
    Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
