  ai_description: >-
    ### General description: The Ping action verifies connectivity between the Google
    SecOps platform and the Luminar API by attempting to authenticate using the provided
    credentials. ### Parameters description: **Luminar API Client ID** (String, Mandatory):
    The client ID for Luminar API authentication. **Luminar API Client Secret** (String,
    Mandatory): The client secret for Luminar API authentication. **Luminar API Account
    ID** (String, Mandatory): The account ID used to construct the API request URL.
    **Luminar Base URL** (String, Mandatory): The base URL for the Luminar API. ###
    Additional notes: All parameters are mandatory for the action to successfully
    test connectivity. ### Flow description: 1. The action extracts the configuration
    parameters (Client ID, Client Secret, Account ID, Base URL). 2. It initializes
    the LuminarManager with these credentials. 3. It executes the test_connectivity
    method, which sends a POST request to the Luminar API token endpoint. 4. The action
    validates the response status code (200 OK indicates success, while 400-404 indicate
    failure). 5. It logs the result and terminates the action with the appropriate
    status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by sending a POST request to an authentication
      endpoint. It does not retrieve contextual data about entities or alerts, nor
      does it modify any external or internal system state. Therefore, it does not
      fetch data, mutate external data, or mutate internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action designed to test connectivity. According to the
      provided instructions, 'Actions named Ping must not be categorized as enrichment
      actions.' Furthermore, it does not fetch contextual data, so it fails the primary
      purpose criteria for enrichment.
