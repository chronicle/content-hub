  ai_description: >-
    Tests connectivity to the Luminar API using the configured integration credentials.


    ### Flow Description

    1. Extracts integration configuration parameters (Client ID, Client Secret, Account
    ID, Base URL).

    2. Sends an authentication request to the Luminar API to retrieve an access token.

    3. Evaluates the HTTP response to determine if the connection is successful.

    4. Returns the connection status and an output message.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the integration's configuration parameters.
  capabilities:
