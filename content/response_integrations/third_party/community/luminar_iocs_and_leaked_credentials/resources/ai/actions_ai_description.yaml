  ai_description: >-
    The Ping action tests the connectivity between the Google SecOps platform and
    the Luminar API. General description: This action verifies that the provided API
    credentials and configuration are valid by attempting to authenticate with the
    Luminar API. Parameters description: Luminar API Client ID (String, Mandatory):
    The client ID for Luminar API authentication. Luminar API Client Secret (String,
    Mandatory): The client secret for Luminar API authentication. Luminar API Account
    ID (String, Mandatory): The account ID used to construct the API request URL.
    Luminar Base URL (String, Mandatory): The base URL for the Luminar API. Additional
    notes: All parameters are mandatory for the action to successfully test connectivity.
    Flow description: 1. The action extracts the configuration parameters (Client
    ID, Client Secret, Account ID, Base URL). 2. It initializes the LuminarManager
    with these credentials. 3. It executes the test_connectivity method, which sends
    a POST request to the Luminar API token endpoint. 4. The action validates the
    response status code (200 OK indicates success, while 400-404 indicate failure).
    5. It logs the result and terminates the action with the appropriate status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by sending a POST request to an external
      API to validate credentials. It does not fetch contextual data for entities
      or alerts (fetches_data=false). It does not change the state of any external
      system (can_mutate_external_data=false) or internal system (can_mutate_internal_data=false).
      It does not update entities, create insights, modify alert data, or create case
      comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action designed solely for connectivity testing. According
      to the provided rules, 'Ping' actions are not enrichment actions. It does not
      fetch data, nor does it mutate any systems.
  entity_usage:
