Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Luminar API using the configured credentials. This action
    verifies that the integration is properly set up and can successfully authenticate
    with the external service.


    ### Flow Description

    1. Extracts integration configuration parameters including Client ID, Client Secret,
    Account ID, and Base URL.

    2. Makes a POST request to the Luminar API token endpoint (`/externalApi/realm/{account_id}/token`)
    to request an access token.

    3. Evaluates the HTTP response status code to determine if the authentication
    was successful.

    4. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This is a utility action typically used to verify integration setup and does not
    perform any operational security tasks or data enrichment.
  ai_short_description: >-
    Tests connectivity to the Luminar API using the configured credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to fetch an access token to verify credentials,
      but it does not fetch contextual data for alerts/entities, nor does it mutate
      external data in a state-changing manner (like creating records). It does not
      update internal entities, create insights, modify alerts, or create case comments.
