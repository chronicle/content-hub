Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and the **Luminar\
    \ IOCs and Leaked Credentials** platform. Its primary purpose is to validate that\
    \ the integration's configuration parameters\u2014specifically the API Client\
    \ ID, Client Secret, Account ID, and Base URL\u2014are correct and that the external\
    \ service is reachable.\n\n### Parameters Description\nThere are no action-specific\
    \ parameters for this action. It utilizes the global integration configuration\
    \ settings.\n\n### Additional Notes\n* This action does not process entities or\
    \ modify any data within Google SecOps or the Luminar platform.\n* It is strictly\
    \ used for testing the authentication handshake and network connectivity.\n\n\
    ### Flow Description\n1. **Configuration Retrieval:** The action extracts the\
    \ `Luminar API Client ID`, `Luminar API Client Secret`, `Luminar API Account ID`,\
    \ and `Luminar Base URL` from the integration's configuration settings.\n2. **Manager\
    \ Initialization:** It initializes the `LuminarManager` using the extracted credentials\
    \ and URL.\n3. **Connectivity Test:** The action calls the `test_connectivity`\
    \ method, which sends a POST request to the Luminar authentication endpoint (`/externalApi/realm/{account_id}/token`)\
    \ to request an OAuth2 access token.\n4. **Response Evaluation:** The action evaluates\
    \ the HTTP response. A successful response (200 OK) confirms valid credentials\
    \ and connectivity, while error codes (e.g., 401, 403) indicate authentication\
    \ or configuration issues.\n5. **Execution Completion:** The action terminates\
    \ by reporting the connection status and a descriptive message to the SOAR platform."
