"Luminar IOCs and Leaked Credentials  Connector":
  ai_description: >-
    ### General Description

    The Luminar IOCs and Leaked Credentials connector integrates with the Cognyte
    Luminar platform to ingest threat intelligence data. It retrieves Indicators of
    Compromise (IOCs) and leaked credential incidents, maps them into the Google SecOps
    (Siemplify) alert format, and creates cases for security analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Luminar API Account ID | String | Yes | The Luminar API Account ID. |

    | Luminar API Client ID | String | Yes | The Luminar API Client ID. |

    | Luminar API Client Secret | String | Yes | The Luminar API Client Secret. |

    | Luminar Base URL | String | Yes | The base URL for the Luminar API. |

    | Proxy Password | String | No | Proxy server password (Advanced). |

    | Proxy Port | Integer | No | Proxy server port (Advanced). |

    | Proxy Server Address | String | No | Proxy server address (Advanced). |

    | Proxy Username | String | No | Proxy server username (Advanced). |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the Python
    process. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates (Advanced). |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Luminar API using
    the provided Account ID, Client ID, and Client Secret to obtain an access token.

    2. **Data Fetching**: It queries the `/externalApi/stix` endpoint to retrieve
    threat intelligence objects (malware, incidents, relationships) using pagination.

    3. **Processing**: The connector parses STIX objects to identify relationships
    between malware and indicators or incidents and leaked credentials. It enriches
    the data by mapping indicator types (e.g., IP, Hash, Domain) and extracting relevant
    details.

    4. **Alert Creation**: It aggregates processed indicators and leaked credentials
    into `AlertInfo` objects, assigning them appropriate metadata such as device vendor,
    product, and priority.

    5. **Ingestion**: The generated alerts are returned to the SOAR platform for further
    investigation and response.
