"Luminar IOCs and Leaked Credentials  Connector":
  ai_description: >-
    ### General Description

    The Luminar IOCs and Leaked Credentials connector integrates with the Luminar
    platform to ingest threat intelligence data. It periodically fetches Indicators
    of Compromise (IOCs) and leaked credential incidents, maps them to the SOAR data
    model, and creates actionable alerts within the Google SecOps platform. This enables
    security teams to proactively monitor for malicious activity and compromised accounts
    identified by Luminar.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Luminar API Account ID | Password | Yes | The Luminar API Account ID. |

    | Luminar API Client ID | Password | Yes | The Luminar API Client ID. |

    | Luminar API Client Secret | Password | Yes | The Luminar API Client Secret.
    |

    | Luminar Base URL | String | Yes | The base URL for the Luminar API. |

    | Proxy Password | Password | No | Proxy server password. |

    | Proxy Port | Integer | No | Proxy server port. |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy server username. |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the script
    execution. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates. |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Luminar API using
    the provided Client ID, Client Secret, and Account ID to obtain an access token.

    2. **Data Fetching**: It queries the `/externalApi/stix` endpoint to retrieve
    threat intelligence objects, utilizing pagination to handle large datasets.

    3. **Data Processing**: The connector parses the STIX objects, identifying relationships
    between malware/incidents and their associated indicators.

    4. **Enrichment & Mapping**: It maps STIX patterns (e.g., file hashes, IP addresses,
    domains) to internal indicator types and enriches the data with relevant metadata.

    5. **Alert Creation**: The processed data is grouped and sliced into manageable
    chunks (up to 500 items per alert) and converted into SOAR `AlertInfo` objects.

    6. **Ingestion**: The generated alerts are returned to the SOAR platform for further
    investigation and response.
