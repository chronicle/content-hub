Luminar IOC and Leaked Credentials Job:
  ai_description: >-
    ### General Description

    This job performs automated maintenance for cases generated by the Luminar integration
    within Google SecOps. It identifies open cases titled "Luminar IOCs" and evaluates
    whether the indicators associated with those cases have reached their expiration
    date. If an indicator is found to be expired, the job automatically assigns the
    case to the configured user and closes it with a maintenance reason, ensuring
    the case queue remains relevant and free of outdated intelligence.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Siemplify Username | String | Yes | The username used to authenticate with the
    Google SecOps internal API to perform case search, assignment, and closure. |

    | Siemplify Password | Password | Yes | The password for the specified Siemplify
    Username. |


    ### Flow Description

    1. **Authentication**: The job authenticates against the Google SecOps API using
    the provided credentials to retrieve a bearer token for subsequent requests.

    2. **Case Search**: It searches for all currently open cases that match the specific
    title "Luminar IOCs".

    3. **Detail Retrieval**: For each matching case, the job fetches the full case
    details to access specific alert fields.

    4. **Expiration Check**: It extracts the expiration date from the security event
    card fields within the case data.

    5. **Date Comparison**: The job compares the extracted expiration date against
    the current system time.

    6. **Case Assignment**: If the expiration date is in the past, the job performs
    a bulk assignment of the case to the provided username.

    7. **Case Closure**: Finally, the job executes a bulk close action on the expired
    cases, marking them with the reason "Maintenance" and the comment "Expired IOCs".
