Luminar IOC and Leaked Credentials Job:
  ai_description: >-
    ### General Description

    This job performs automated maintenance on SOAR cases labeled 'Luminar IOCs'.
    It identifies cases that have passed their expiration date and automatically closes
    them to ensure the case management system remains up-to-date and free of stale
    investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Siemplify Username | String | Yes | The username used to authenticate with the
    SOAR API. |

    | Siemplify Password | String | Yes | The password used to authenticate with the
    SOAR API. |


    ### Flow Description

    1. Authenticates with the SOAR API using the provided credentials to obtain a
    bearer token.

    2. Searches for all open cases with the title 'Luminar IOCs'.

    3. Iterates through each retrieved case and fetches its full details.

    4. Parses the expiration date from the case's security event card fields.

    5. If the expiration date is in the past, the job assigns the case to the authenticated
    user and closes it with the reason 'Maintenance' and a comment 'Expired IOCs'.
