Luminar IOC and Leaked Credentials Job:
  ai_description: >-
    ### General Description

    This job automates the maintenance of "Luminar IOCs" cases within Google SecOps.
    It identifies cases that have expired based on their security event card data
    and automatically closes them to keep the case management system clean.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Siemplify Username | String | Yes | The username used to authenticate with the
    SOAR API. |

    | Siemplify Password | Password | Yes | The password used to authenticate with
    the SOAR API. |


    ### Flow Description

    1. Authenticates with the SOAR API using the provided credentials to obtain a
    bearer token.

    2. Queries the SOAR platform for all open cases titled "Luminar IOCs".

    3. Iterates through each retrieved case to fetch its full details.

    4. Parses the expiration date from the case's security event card.

    5. If the expiration date has passed, the job assigns the case to the configured
    user and closes it with the reason "Maintenance" and root cause "Other".
