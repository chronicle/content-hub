Luminar IOC and Leaked Credentials Job:
  ai_description: >-
    ### General Description

    This job performs automated maintenance for cases generated by the Luminar IOCs
    and Leaked Credentials integration. It identifies open cases related to Luminar
    indicators and checks their expiration status. If an indicator is found to be
    expired based on its metadata, the job automatically assigns the case to a designated
    user and closes it with a maintenance reason, ensuring the case queue remains
    relevant and up-to-date.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Siemplify Username | String | Yes | The username used to authenticate with the
    Google SecOps API and the user to whom expired cases will be assigned before closure.
    |

    | Siemplify Password | Password | Yes | The password for the specified Siemplify
    Username to facilitate API authentication. |


    ### Flow Description

    1. **Authentication**: Logs into the Google SecOps (Siemplify) API using the provided
    username and password to retrieve a bearer token for subsequent requests.

    2. **Case Search**: Queries the system for all open cases that contain the title
    "Luminar IOCs".

    3. **Detail Retrieval**: For each matching case, the job fetches the full case
    details to access specific alert fields.

    4. **Expiration Check**: Extracts the expiration date from the security event
    cards within the case and compares it against the current system time.

    5. **Case Assignment**: If the expiration date has passed, the job performs a
    bulk assignment of the case to the configured Siemplify Username.

    6. **Case Closure**: Executes a bulk close operation on the expired cases, marking
    them with a "Maintenance" reason and a comment indicating the IOCs have expired.
