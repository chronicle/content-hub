"Sample Integration - Simple Connector Example":
  ai_description: >-
    ### General Description

    This connector integrates with the `api.vatcomply.com` service to fetch currency
    exchange rates and ingest them as alerts into Google SecOps. It provides flexible
    configuration for how rates are processed, allowing users to create individual
    alerts per currency or combined alerts, and supports filtering via dynamic lists.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name for the Product Field.
    |

    | EventClassId | String | Yes | Source field name for the Event Field. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the python
    process. |

    | API Root | String | Yes | API Root for the integration service. |

    | Password Field | Password | No | API password field (showcase purpose). |

    | Currencies To Fetch | String | No | Comma-separated list of currencies to fetch.
    |

    | Create Alert Per Exchange Rate | Boolean | No | If enabled, creates a separate
    alert per exchange rate. |

    | Alert Severity | String | No | Severity level (Critical, High, Medium, Low,
    Informational). |

    | Add Attachment | Boolean | No | If enabled, adds a JSON object attachment to
    the alert. |

    | Max Days Backwards | Integer | Yes | Amount of days to fetch alerts from (Max:
    30). |

    | Max Alerts To Fetch | String | Yes | Number of alerts/dates to process per iteration.
    |

    | Use dynamic list as blocklist | Boolean | Yes | If enabled, uses the dynamic
    list as a blocklist. |

    | Disable Overflow | Boolean | No | If enabled, ignores the overflow mechanism.
    |

    | Verify SSL | Boolean | Yes | If enabled, verifies the SSL certificate. |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | Password | No | Proxy password. |


    ### Flow Description

    1. **Initialization**: The connector initializes the API client using the provided
    API root, SSL settings, and authentication parameters.

    2. **Context Retrieval**: It reads existing alert IDs from the SOAR platform to
    ensure only new data is processed.

    3. **Data Fetching**: It queries `api.vatcomply.com` for exchange rates for the
    configured currencies, starting from the last successful execution time.

    4. **Alert Creation**: It maps the retrieved exchange rates into `AlertInfo` objects.
    Depending on the configuration, it creates either a single alert per currency
    or a combined alert containing all rates.

    5. **Filtering**: It filters the generated alerts against the SOAR whitelist/blocklist
    (using the dynamic list) and checks for overflow conditions.

    6. **Ingestion**: Valid alerts are ingested into Google SecOps.

    7. **State Management**: The connector updates the last success time and saves
    the processed alert IDs to the context for future iterations.
