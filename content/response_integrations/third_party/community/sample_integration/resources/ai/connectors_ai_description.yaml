"Sample Integration - Simple Connector Example":
  ai_description: >-
    ### General Description

    This connector integrates with the `api.vatcomply.com` service to fetch currency
    exchange rates. It processes these rates and creates alerts within Google SecOps,
    allowing users to monitor financial data or exchange rate fluctuations as security
    events. The connector supports flexible configuration for filtering, alert creation,
    and proxy settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name for the Product Field.
    |

    | EventClassId | String | Yes | Source field name for the Event Field. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the script.
    |

    | API Root | String | Yes | API Root URL for the service. |

    | Password Field | Password | No | API password (for showcase). |

    | Currencies To Fetch | String | No | Comma-separated list of currencies to fetch.
    |

    | Create Alert Per Exchange Rate | Boolean | No | If enabled, creates a separate
    alert per exchange rate. |

    | Alert Severity | String | No | Severity level for created alerts. |

    | Add Attachment | Boolean | No | If enabled, attaches JSON data to the alert.
    |

    | Max Days Backwards | Integer | Yes | Number of days to fetch alerts from. |

    | Max Alerts To Fetch | String | Yes | Maximum number of alerts to process per
    iteration. |

    | Use dynamic list as blocklist | Boolean | Yes | If enabled, uses the dynamic
    list as a blocklist. |

    | Disable Overflow | Boolean | No | If enabled, ignores the overflow mechanism.
    |

    | Verify SSL | Boolean | Yes | If enabled, verifies the SSL certificate. |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | Password | No | Proxy password. |


    ### Flow Description

    1. Initializes the API client using the provided API Root and authentication parameters.

    2. Reads existing alert IDs from the SOAR context to prevent duplicate processing.

    3. Fetches exchange rate data from `api.vatcomply.com` for the configured currencies.

    4. Transforms the fetched data into `AlertInfo` objects, optionally creating separate
    alerts for each currency or a combined alert.

    5. Filters alerts based on the whitelist/blocklist configuration and checks for
    overflow.

    6. Stores the processed alert IDs in the SOAR context and updates the last success
    time.
