"Sample Integration - Simple Connector Example":
  ai_description: "### General Description\nThis connector integrates with the `api.vatcomply.com`\
    \ service to fetch currency exchange rate data and ingest it as alerts into Google\
    \ SecOps. It serves as a comprehensive example of a SOAR connector, demonstrating\
    \ core capabilities such as historical data fetching, dynamic filtering via whitelists/blocklists,\
    \ environment mapping, and attachment management. The connector allows security\
    \ teams to monitor financial data or use exchange rates as a trigger for automated\
    \ workflows.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| DeviceProductField | String | Yes | The\
    \ source field name used to retrieve the Product Field name for the alert metadata.\
    \ |\n| EventClassId | String | Yes | The source field name used to retrieve the\
    \ Event Field name for the alert metadata. |\n| Environment Field Name | String\
    \ | No | The name of the field where the environment name is stored. Defaults\
    \ to the default environment if not found. |\n| Environment Regex Pattern | String\
    \ | No | A regex pattern applied to the Environment Field Name to manipulate or\
    \ extract the environment value. |\n| PythonProcessTimeout | String | Yes | The\
    \ timeout limit in seconds for the Python process running the connector script.\
    \ |\n| API Root | String | Yes | The base URL for the vatcomply API (default:\
    \ `https://api.vatcomply.com`). |\n| Password Field | Password | No | An example\
    \ password field for authentication (not strictly required by the public vatcomply\
    \ API). |\n| Currencies To Fetch | String | No | A comma-separated list of currency\
    \ codes (e.g., USD, EUR) to retrieve exchange rates for. |\n| Create Alert Per\
    \ Exchange Rate | Boolean | No | If enabled, the connector creates a separate\
    \ alert for every currency pair. If disabled, it creates one combined alert per\
    \ date. |\n| Alert Severity | String | No | The severity assigned to the ingested\
    \ alerts (Critical, High, Medium, Low, Informational). |\n| Add Attachment | Boolean\
    \ | No | If enabled, the raw JSON exchange rate data is added as an attachment\
    \ to the alert. |\n| Max Days Backwards | Integer | Yes | The maximum number of\
    \ days to look back for historical data (Limit: 1-30 days). |\n| Max Alerts To\
    \ Fetch | String | Yes | Dictates how many alerts (dates) are processed in a single\
    \ connector iteration. |\n| Use dynamic list as blocklist | Boolean | Yes | If\
    \ enabled, the connector's dynamic list (whitelist) will function as a blocklist.\
    \ |\n| Disable Overflow | Boolean | No | If enabled, the connector will bypass\
    \ the standard SOAR overflow protection mechanism. |\n| Verify SSL | Boolean |\
    \ Yes | Whether to verify the SSL certificate for the connection to the API server.\
    \ |\n| Proxy Server Address | String | No | The address of the proxy server to\
    \ use for outgoing requests. |\n| Proxy Username | String | No | The username\
    \ for proxy authentication. |\n| Proxy Password | Password | No | The password\
    \ for proxy authentication. |\n\n### Flow Description\n1. **Initialization**:\
    \ The connector establishes a session with the `api.vatcomply.com` service using\
    \ the provided API Root and SSL configurations.\n2. **Context Loading**: It retrieves\
    \ the timestamp of the last successful execution and a list of previously processed\
    \ alert IDs from the SOAR database to prevent duplicate ingestion.\n3. **Data\
    \ Retrieval**: The connector requests exchange rate data for the configured currencies,\
    \ starting from the last success time up to the current date (limited by the 'Max\
    \ Days Backwards' parameter).\n4. **Alert Construction**: \n    * If 'Create Alert\
    \ Per Exchange Rate' is active, it generates individual `AlertInfo` objects for\
    \ every currency rate found.\n    * Otherwise, it aggregates all rates for a specific\
    \ date into a single `AlertInfo` object.\n5. **Filtering and Validation**: \n\
    \    * **Dynamic List Filter**: It checks the currency against the connector's\
    \ whitelist/blocklist.\n    * **Deduplication**: It filters out any alerts whose\
    \ IDs already exist in the processed IDs cache.\n    * **Overflow Check**: It\
    \ verifies if the alert should be suppressed based on overflow settings.\n6. **Enrichment**:\
    \ If 'Add Attachment' is enabled, the connector converts the raw API response\
    \ into a JSON file and attaches it to the alert.\n7. **Ingestion**: The finalized\
    \ alerts are sent to the Google SecOps platform for case creation.\n8. **Checkpointing**:\
    \ The connector updates the 'Last Success Time' and saves the new set of processed\
    \ alert IDs to ensure the next run starts from the correct point."
