  reasoning: >-
    The integration is an educational sample designed to demonstrate common design
    patterns (actions, connectors, and jobs) within the SOAR platform. Its primary
    functions include fetching exchange rate data from an external API (api.vatcomply.com),
    performing basic case management (closing cases, adding comments), and ingesting
    alerts into the SOAR platform. It does not perform security-specific operations
    such as threat intelligence enrichment, host containment, identity management,
    vulnerability scanning, or network security operations. Therefore, it does not
    align with any of the defined security-focused product categories.
  siem: false
