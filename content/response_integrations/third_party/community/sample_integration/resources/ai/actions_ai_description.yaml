  ai_description: >-
    ### General Description

    The "Enrich Entity Action Example" is a sample integration action designed to
    demonstrate how to process and enrich entities within Google SecOps. Instead of
    querying an external threat intelligence service, it generates mock enrichment
    data (a UNIX timestamp and an "enriched" flag) locally. It then updates the targeted
    entities and creates data tables (insights) to display the results on the case
    wall.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Entity Type | Yes | Dropdown | Defines which entities from the alert's scope
    should be processed. Options include "All Entities", "IP", "Hash", and "User".
    This dictates the filtering applied to the target entities before the mock enrichment
    is performed. |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts and validates the `Entity Type`
    parameter.

    2. **Entity Filtering:** It determines the appropriate entity types to filter
    from the alert's scope based on the parameter selection.

    3. **Mock Enrichment:** It iterates over the filtered entities and generates mock
    enrichment data (current UNIX timestamp) for each.

    4. **Internal Mutation:** It updates the entity with the mock enrichment data
    and creates a data table (insight) to display the results.

    5. **Completion:** It returns a success message listing the enriched entities,
    or a failure message if no eligible entities were found.
