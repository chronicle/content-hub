  ai_description: >-
    This is an asynchronous action that monitors specified cases until they are assigned
    a particular tag. It is designed to pause execution flow until the required condition
    (a specific tag on a case) is met. Parameters: Case IDs (string, optional): A
    comma-separated list of case IDs to monitor. If not provided, the action defaults
    to the current case ID. Case Tag To Wait For (string, mandatory): The specific
    tag the action is waiting to see on the cases. Flow: 1. Extracts the Case IDs
    and Case Tag To Wait For parameters. 2. On the first run, it retrieves the details
    for each specified case. 3. It checks if the cases have the required tag. 4. If
    cases are missing the tag, it enters a waiting state (IN_PROGRESS) and stores
    the state of processed/waiting cases. 5. On subsequent runs, it re-checks the
    cases that were previously missing the tag. 6. Once all specified cases have the
    required tag, the action completes successfully. Additional Notes: This is an
    asynchronous action. It will continue to run until the timeout is reached or all
    specified cases have the required tag.
  capabilities:
