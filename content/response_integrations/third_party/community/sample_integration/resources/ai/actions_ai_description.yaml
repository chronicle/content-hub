Simple Action Example:
  ai_description: >-
    ### General Description\nThis action retrieves currency exchange rate data from
    the external service `api.vatcomply.com`. It allows users to specify multiple
    currencies and a time range (up to 7 days) to fetch historical or current rates.
    The results are presented as Data Tables, Links, and a JSON attachment within
    the Google SecOps case. This action does not interact with or process any entities.\n\n###
    Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---
    | :--- | :--- | :--- |\n| Currencies String | String | No | A comma-separated
    list of currency codes (e.g., USD, EUR) to process. |\n| Currencies DDL | DDL
    | No | A dropdown menu to select a single currency code. |\n| Time Frame | DDL
    | No | Defines the period for the data: 'Today', 'Last 7 Days', or 'Custom'. |\n|
    Start Time | String | No* | The start date in ISO 8601 format. Mandatory if 'Time
    Frame' is set to 'Custom'. |\n| End Time | String | No | The end date in ISO 8601
    format. Defaults to current time if omitted. |\n| Return JSON Result | Boolean
    | Yes | If enabled, the action will output the raw data in the JSON result field.
    |\n\n### Additional Notes\n- Either 'Currencies String' or 'Currencies DDL' must
    be provided for the action to execute.\n- The maximum allowed duration between
    'Start Time' and 'End Time' is 7 days. If a larger range is provided, the action
    automatically truncates the end date to 7 days after the start date.\n- This action
    is purely informational regarding external systems and does not modify any external
    system state.\n\n### Flow Description\n1. **Parameter Extraction:** The action
    retrieves all user-provided inputs, including currency lists and time configurations.\n2.
    **Validation:** It ensures at least one currency is specified and validates the
    time range logic, enforcing the 7-day maximum delta.\n3. **Data Retrieval:** The
    action performs a GET request to the `api.vatcomply.com` service to fetch exchange
    rates for the specified currencies and dates.\n4. **Internal Data Creation:**
    Generates Data Tables for each currency and date, creates Links pointing to the
    specific API endpoint for each rate, and saves the full result as a JSON attachment
    added to the current case.\n5. **Output:** Returns a success message summarizing
    the processed currencies and time range.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
