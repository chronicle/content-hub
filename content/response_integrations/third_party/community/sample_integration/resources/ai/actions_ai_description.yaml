  ai_description: >-
    ### General Description

    This action fetches historical exchange rate data from the `api.vatcomply.com`
    service based on user-provided currencies and time frames. It processes the requested
    data, generates data tables and links for the case, and saves the results as a
    JSON attachment to the current case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Currencies String | string | No | A comma-separated list of currencies to process.
    |

    | Currencies DDL | ddl | No | A dropdown selection for a currency. Either this
    or 'Currencies String' must be provided. |

    | Time Frame | ddl | No | The time range for the results (Today, Last 7 Days,
    Custom). |

    | Start Time | string | No | The start date in ISO 8601 format. Mandatory if 'Time
    Frame' is set to 'Custom'. |

    | End Time | string | No | The end date in ISO 8601 format. If not provided when
    'Time Frame' is 'Custom', it defaults to the current time. |

    | Return JSON Result | boolean | Yes | If enabled, the action returns the results
    as a JSON object. |


    ### Additional Notes

    - If 'Time Frame' is set to 'Custom', 'Start Time' is mandatory. The delta between
    'Start Time' and 'End Time' cannot exceed 7 days; if it does, the action automatically
    adjusts the 'End Time' to be exactly 7 days after the 'Start Time'.

    - At least one of 'Currencies String' or 'Currencies DDL' must be provided.


    ### Flow Description

    1. **Extraction**: Extracts all action parameters from the configuration.

    2. **Validation**: Validates the currency and time frame parameters, ensuring
    required fields are present and constraints (like the 7-day limit) are met.

    3. **Data Retrieval**: Calls the `api_client.get_rates` method to fetch exchange
    rate data from the external API.

    4. **Processing**: Creates data tables and links based on the retrieved exchange
    rates.

    5. **Attachment**: Saves the JSON results as a file and adds it as an attachment
    to the current case.

    6. **Completion**: Returns a success message summarizing the processed currencies
    and the time range.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a JSON file as an attachment to the current case.
    reasoning: >-
      The action fetches data from an external API (api.vatcomply.com). It does not
      mutate external data. It mutates internal data by adding an attachment to the
      case. It does not update entities, create insights, or modify alert data.
  categories:
    enrichment: false
    reasoning: >-
      The action fetches data, but it performs an internal mutation (adding an attachment)
      that is not in the allowed list for enrichment actions (Add Case Comments, Create
      Case Insights, Update Entity fields). Therefore, it is not an enrichment action.
