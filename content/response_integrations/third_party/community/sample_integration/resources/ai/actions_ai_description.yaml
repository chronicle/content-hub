    service. |


    ### Additional notes

    This action is a connectivity test and does not perform any data enrichment or
    modification.


    ### Flow description

    1. The action initializes the API client using the provided configuration parameters
    (API Root, Password, Verify SSL).

    2. It establishes an authenticated session with the API service.

    3. The action calls the `test_connectivity` method on the API client to verify
    the connection.

    4. If the connection is successful, it returns a success message; otherwise, it
    returns an error message.
