    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches case details from the internal SOAR platform to check for
      the presence of a specific tag. It does not mutate any external systems, nor
      does it modify any internal SOAR data (like case tags or status). It does not
      update entities, create insights, or add comments.
  categories:
