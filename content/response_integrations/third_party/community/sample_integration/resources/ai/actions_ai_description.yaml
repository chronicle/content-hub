Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the external API Service. It ensures that the integration's
    configuration parameters, such as the API Root, Password, and SSL verification
    settings, are correct and that the service is reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration.


    ### Flow Description

    1. **Initialization**: The action initializes the API client using the global
    integration settings (API Root, Password, and Verify SSL).

    2. **Connectivity Test**: It executes a test request (typically a GET request
    to a lightweight endpoint like `/rates`) to the configured API Service.

    3. **Validation**: If the request is successful, the action returns a success
    message. If the request fails due to network issues, incorrect credentials, or
    SSL errors, it returns an error message.


    ### Additional Notes

    - This action is primarily used during the initial setup or troubleshooting of
    the integration to confirm that the environment can communicate with the target
    API.
