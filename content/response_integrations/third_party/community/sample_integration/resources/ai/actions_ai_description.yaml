  ai_description: >-
    ### General Description

    Fetches currency exchange rates from the api.vatcomply.com service based on provided
    parameters. This action retrieves daily exchange rates for specified currencies
    over a given time frame and outputs the data as case wall tables, links, and optionally
    a JSON attachment. It does not operate on Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Currencies String | String | No | Comma-separated list of currencies that need
    to be processed (e.g., 'USD, EUR'). |

    | Currencies DDL | DDL | No | Dropdown list to select a currency. The action will
    check both this and 'Currencies String' to determine what to process. |

    | Time Frame | DDL | No | Time frame for the results ('Today', 'Last 7 Days',
    'Custom'). |

    | Start Time | String | No | Start time for the results in ISO 8601 format. Mandatory
    if 'Custom' is selected in 'Time Frame'. |

    | End Time | String | No | End time for the results in ISO 8601 format. If left
    blank while 'Custom' is selected, it defaults to the current time. |

    | Return JSON Result | Boolean | Yes | If enabled, the action will return the
    raw JSON result and attach it to the case. |


    ### Additional Notes

    * Either `Currencies String` or `Currencies DDL` must be provided for the action
    to run successfully.

    * The delta between `Start Time` and `End Time` cannot be greater than 7 days.
    If it is, the action will automatically adjust the `End Time` to be exactly 7
    days after the `Start Time`.


    ### Flow Description

    1. Extracts and validates the provided currency and time frame parameters.

    2. Calculates the exact start and end dates based on the selected time frame.

    3. Makes a GET request to the external API to fetch exchange rates for the specified
    currencies and date range.

    4. Iterates through the retrieved data to construct data tables and case wall
    links.

    5. If requested, saves the raw JSON response as a temporary file and attaches
    it to the current case.
