  ai_description: "### General Description\nThis asynchronous action monitors specified\
    \ Google SecOps cases for the presence of a specific tag. It operates iteratively,\
    \ checking case details until the required tag is found on all specified cases\
    \ or the action reaches its timeout limit. This is useful for workflows that require\
    \ synchronization or waiting for a specific state change (tagging) in a case before\
    \ proceeding.\n\n### Parameters\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| `Case IDs` | string | No | A comma-separated\
    \ list of case IDs to monitor. If not provided, the action defaults to the current\
    \ case ID. |\n| `Case Tag To Wait For` | string | Yes | The specific case tag\
    \ that the action will wait for. |\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ The action retrieves the `Case IDs` and the `Case Tag To Wait For` from the\
    \ action configuration.\n2. **Case Data Retrieval**: In each iteration, the action\
    \ fetches the details of the specified cases using the `get_case_overview_details`\
    \ function.\n3. **Tag Verification**: It checks if the specified tag exists in\
    \ the tags list of each case.\n4. **Status Management**: \n   - If a case has\
    \ the required tag, it is marked as \"done\".\n   - If not all cases have the\
    \ tag, the action sets its execution state to `IN_PROGRESS` and stores the progress\
    \ (which cases are done and which are still waiting) in the `additional_data`\
    \ parameter for the next iteration.\n5. **Completion**: Once all specified cases\
    \ have the required tag, the action completes successfully. If the timeout is\
    \ reached, it raises a `TimeoutError`."
