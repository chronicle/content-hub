    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action's sole purpose is to wait asynchronously for a specific tag to be
      applied to a case within Google SecOps. It does not enrich IOCs/assets, mutate
      alerts, interact with external ticketing systems, modify blocklists/allowlists,
      or perform any other operations that match the defined outcome categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
