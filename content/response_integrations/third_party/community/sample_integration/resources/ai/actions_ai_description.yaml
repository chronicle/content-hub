Async Action Example:
  ai_description: >-
    ### General Description

    This asynchronous action monitors specified cases in Google SecOps and waits until
    they are assigned a specific tag. It is designed to pause a playbook's execution
    until a manual or automated tagging event occurs on the target cases.


    ### Flow Description

    1. Extracts the provided `Case IDs` or defaults to the current case ID if none
    are provided.

    2. Retrieves the case overview details for each case using the internal SecOps
    API (`get_case_overview_details`).

    3. Checks if the specified tag (`Case Tag To Wait For`) is present in the case's
    tags.

    4. If all cases have the required tag, the action completes successfully.

    5. If any cases are missing the tag, the action suspends itself and waits for
    the next asynchronous iteration to check again, continuing until the timeout is
    reached.


    ### Additional Notes

    This action is asynchronous and will consume execution time until the condition
    is met or the timeout threshold is reached.
  ai_short_description: >-
    This asynchronous action monitors specified cases in Google SecOps and pauses
    playbook execution until a specific tag is added to all target cases.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action reads internal case data using `get_case_overview_details` to check
      for tags, but it does not fetch external contextual data (`fetches_data`=false).
      It does not mutate any external systems (`can_mutate_external_data`=false) or
      internal systems (`can_mutate_internal_data`=false). It does not update entities,
      create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
