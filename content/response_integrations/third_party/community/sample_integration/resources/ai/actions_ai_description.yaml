  ai_description: "This is an asynchronous action that monitors specific Google SecOps\
    \ cases until they are assigned a designated tag. It is designed to pause execution\
    \ and wait for a specific condition (a case tag) to be met on one or more cases.\n\
    \n### Flow Description\n1. **Parameter Extraction**: The action extracts the `Case\
    \ IDs` (a comma-separated list of cases to monitor) and the `Case Tag To Wait\
    \ For` (the tag to look for). If no `Case IDs` are provided, it defaults to the\
    \ current case ID.\n2. **Case Data Retrieval**: In each iteration, the action\
    \ fetches the details of the specified cases using the `get_case_overview_details`\
    \ function.\n3. **Tag Verification**: It checks if the specified tag exists in\
    \ the tags list of each case.\n4. **Status Management**: \n   - If a case has\
    \ the required tag, it is marked as \"done\".\n   - If not all cases have the\
    \ tag, the action sets its execution state to `IN_PROGRESS` and stores the progress\
    \ (which cases are done and which are still waiting) in the `additional_data`\
    \ parameter for the next iteration.\n5. **Completion**: Once all specified cases\
    \ have the required tag, the action completes successfully.\n\n### Parameters\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | `Case IDs` | string | No | A comma-separated list of case IDs to monitor. If\
    \ not provided, the action defaults to the current case ID. |\n| `Case Tag To\
    \ Wait For` | string | Yes | The specific case tag that the action will wait for.\
    \ |\n\n### Additional Notes\nThis action is asynchronous and will continue to\
    \ run in iterations until all specified cases have the required tag or the action\
    \ reaches its timeout limit. It does not perform any external mutations or modifications\
    \ to the cases themselves."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
