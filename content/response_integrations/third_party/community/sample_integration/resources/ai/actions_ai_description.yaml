Enrich Entity Action Example:
  ai_description: >-
    ### General Description

    The **Enrich Entity Action Example** is a sample enrichment action designed to
    demonstrate how to process and augment entities within Google SecOps. It targets
    specific entity types (IP, Hash, User, or all) and adds simulated enrichment data,
    including a timestamp and a status flag, to the entity's context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity Type** | DDL | Yes | Specifies which entities from the alert scope
    should be processed. Options include 'All Entities', 'IP', 'Hash', and 'User'.
    |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the 'Entity Type' selection
    from the user input.

    2. **Entity Filtering:** It filters the available entities in the alert scope
    based on the selected type (e.g., mapping 'IP' to 'ADDRESS' entities).

    3. **Enrichment Generation:** For each matching entity, it generates a JSON object
    containing a 'true' enrichment status and a current Unix timestamp.

    4. **Internal Mutation:** It applies a prefix ('SampleIntegration_') to the enrichment
    data, updates the entity's fields, and attaches a CSV-formatted Data Table to
    the entity.

    5. **Finalization:** The action reports the list of successfully enriched entities
    in the output message.


    ### Additional Notes

    This action is intended as a template for developers. It does not communicate
    with an external API but demonstrates the standard workflow for internal data
    enrichment and entity updates.
