  ai_description: >-
    ### General Description

    Enriches entities by adding a static 'enriched' flag and a timestamp to the entity's
    data within the SOAR platform. This action allows users to select specific entity
    types (IP, Hash, User) or all entities to process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Entity Type | DDL | Yes | Defines what entities from the scope of the alert
    should be processed. Options: All Entities, IP, Hash, User. |


    ### Flow Description

    1. Extract the 'Entity Type' parameter.

    2. Validate the parameter.

    3. Iterate through the target entities matching the selected type.

    4. Generate a static enrichment dictionary.

    5. Update the entity with this data and add a data table.
