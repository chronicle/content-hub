    | Case IDs | String | No | Comma-separated list of cases that needs to be handled.
    If nothing is provided, action will use the case id from which the action was
    executed. |

    | Case Tag To Wait For | String | Yes | Action will wait until a case will have
    the provided tag. |
Enrich Entity Action Example:
  ai_description: >-
    ### General Description

    Enriches specified entities within Google SecOps. This action processes entities
    based on the selected entity type parameter and appends a timestamp and an enrichment
    flag to their data. It serves as a sample action to demonstrate entity enrichment
    and does not make external API calls.


    ### Flow Description

    1. Extracts and validates the `Entity Type` parameter.

    2. Filters the target entities in the alert scope based on the selected entity
    type.

    3. Iterates over the eligible entities and generates enrichment data containing
    a timestamp and an `enriched` status.

    4. Updates the entities with the generated enrichment data and creates a data
    table for each processed entity.

    5. Returns a success message detailing the enriched entities or a failure message
    if no eligible entities were found.


    ### Additional Notes

    This is a sample action demonstrating entity enrichment and does not interact
    with any external services or APIs.
  ai_short_description: >-
    Enriches specified entities by appending a timestamp and an enrichment flag to
    their data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action generates a local timestamp and enrichment flag without fetching
      data from external sources (`fetches_data` is false). It does not mutate external
      data. It updates internal entities with the enrichment data and creates data
      tables which are used by the base `EnrichAction` to create insights.
