  ai_description: >-
    ### General Description

    This action demonstrates how to enrich entities within Google SecOps. It processes
    entities based on the selected "Entity Type" parameter and adds enrichment data
    (timestamp and status) to the entity. This action is a sample implementation and
    does not perform actual external API calls.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Type | ddl | Yes | Defines the category of entities to process. Options:
    "All Entities", "IP", "Hash", "User". |


    ### Flow Description

    1. Extract the "Entity Type" parameter.

    2. Validate the parameter against supported entity types.

    3. Iterate through the target entities that match the selected type.

    4. For each entity, generate enrichment data (a dictionary with a timestamp).

    5. Update the entity with the enrichment data and add a data table to the action
    results.

    6. Finalize the action with a success message listing the enriched entities.
