Simple Action Example:
  ai_description: >-
    ### General Description

    Fetches historical or current exchange rate data from the vatcomply.com API based
    on specified currencies and time frames. The action retrieves the data and formats
    it into data tables and case wall links for analyst review.


    ### Flow Description

    1. Validates and extracts the provided currency and time frame parameters.

    2. Makes an HTTP GET request to the vatcomply.com API to retrieve exchange rates
    for the specified dates and currencies.

    3. Formats the retrieved data into data tables and case wall links.

    4. Optionally attaches the raw JSON response to the current case.


    ### Additional Notes

    This action does not operate on Google SecOps entities and relies entirely on
    the provided input parameters.
  ai_short_description: >-
    Fetches historical or current exchange rate data from the vatcomply.com API based
