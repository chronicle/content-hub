  ai_description: >-
    ### General Description

    The Async Action Example is a utility action designed to pause the execution flow
    until a specified tag is added to one or more cases. It periodically checks the
    case details and completes successfully once all specified cases have the required
    tag, or fails if the asynchronous timeout is reached.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Case IDs | String | No | A comma-separated list of case IDs to monitor. If not
    provided, it defaults to the current case ID from which the action was executed.
    |

    | Case Tag To Wait For | String | Yes | The specific tag that the action will
    wait for to be attached to the cases. |


    ### Flow Description

    1. Extracts and validates the provided parameters, defaulting to the current case
    ID if none are provided.

    2. Fetches the case details for the specified case IDs using the internal SOAR
    API.

    3. Checks if the required tag is present in the case tags for each case.

    4. If all cases have the tag, the action completes successfully.

    5. If some cases are missing the tag, the action suspends itself and waits for
    the next iteration, continuing this process until the timeout is reached.


    ### Additional Notes

    This action is asynchronous and will consume execution time until the condition
    is met or the timeout threshold is reached. Ensure the timeout settings in the
    IDE are configured appropriately for the expected wait time.
