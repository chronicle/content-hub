Async Action Example:
  ai_description: >-
    ### General Description

    The **Async Action Example** is a flow-control utility designed to synchronize
    playbook execution based on the status of Google SecOps cases. It allows a playbook
    to pause and wait until a specific tag is applied to one or more cases. This is
    particularly useful for manual review steps or cross-case dependencies where an
    automated process must wait for an analyst's signal (via a tag) before proceeding.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Case IDs** | String | No | A comma-separated list of Case IDs to monitor.
    If left empty, the action defaults to monitoring the current case where the action
    is running. |

    | **Case Tag To Wait For** | String | Yes | The specific tag string the action
    is looking for. The action will remain 'In Progress' until all specified cases
    have this tag. |


    ### Additional Notes

    - This is an **Asynchronous** action, meaning it runs in cycles until the condition
    is met or it times out.

    - It does not modify any data; it is strictly a monitoring/polling utility.

    - If no Case IDs are provided, the action automatically targets the case ID from
    which it was executed.


    ### Flow Description

    1. **Initialization**: The action retrieves the list of Case IDs and the target
    tag from the input parameters.

    2. **Data Retrieval**: For each Case ID, the action performs an internal API call
    to fetch the case's overview details, including its current tags.

    3. **Tag Validation**: The action checks if the 'Case Tag To Wait For' exists
    in the list of tags for each case.

    4. **State Management**: If all monitored cases possess the required tag, the
    action completes successfully. If any cases are still missing the tag, the action
    saves its current progress and enters an 'In Progress' state to be re-evaluated
    in the next polling cycle.

    5. **Timeout**: If the action exceeds the defined timeout period before all tags
    are found, it will fail with a timeout error.
