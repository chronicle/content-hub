Simple Job Example:
  ai_description: >-
    ### General Description

    This job automates case management tasks in Google SecOps based on specific case
    tags. It performs two primary functions: closing cases tagged as "Closed" and
    enriching cases tagged as "Currency" by adding the latest exchange rate as a comment.
    The job maintains a persistent context to track processed cases and prevent duplicate
    comments within the same day.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the API service. |

    | Password Field | Password | No | An example field for API authentication. |

    | Verify SSL | Boolean | Yes | If enabled, validates the SSL certificate when
    connecting to the API. |


    ### Flow Description

    1. Initializes the API client using the provided configuration parameters.

    2. Loads the job context to retrieve the state of previously processed cases and
    the current date.

    3. Queries Google SecOps for open cases tagged with either "Closed" or "Currency".

    4. Iterates through the retrieved cases:
        * If the case is tagged "Closed", it closes the case in Google SecOps.
        * If the case is tagged "Currency" and has not been commented on today, it
    fetches the current exchange rate from the API and adds it as a comment to the
    case.
    5. Updates the job context with the IDs of newly commented cases and saves the
    context for future runs.
