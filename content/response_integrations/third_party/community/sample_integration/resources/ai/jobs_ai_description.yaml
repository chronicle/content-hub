Simple Job Example:
  ai_description: >-
    ### General Description

    This job automates case management and enrichment within Google SecOps based on
    specific case tags. It monitors open cases and performs actions such as closing
    cases or adding enrichment comments based on the presence of "Closed" or "Currency"
    tags. The job maintains a persistent context to avoid redundant operations on
    the same case within a single day.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the external exchange rate API service.
    |

    | Password Field | String | No | A placeholder field for API authentication credentials.
    |

    | Verify SSL | Boolean | Yes | Determines whether to validate the SSL certificate
    when connecting to the API service. |


    ### Flow Description

    1. Initializes the API client using the provided configuration parameters.

    2. Loads the job context to identify cases already processed for the current date.

    3. Queries Google SecOps for open cases tagged with either "Closed" or "Currency".

    4. Iterates through the retrieved cases:
        * If a case is tagged "Closed", it closes the case in SOAR.
        * If a case is tagged "Currency" and has not been commented on today, it fetches
    the latest exchange rate from the external API and adds it as a comment to the
    case.
    5. Updates the job context with the IDs of cases that received a comment.

    6. Saves the updated context to ensure state persistence for future job runs.
