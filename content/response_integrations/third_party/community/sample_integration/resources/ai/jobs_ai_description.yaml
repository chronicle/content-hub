Simple Job Example:
  ai_description: >-
    ### General Description

    This job automates case management and enrichment by monitoring open cases for
    specific tags. It performs two primary functions: closing cases tagged as "Closed"
    and enriching cases tagged as "Currency" with current exchange rate data retrieved
    from an external API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the external API service. |

    | Password Field | Password | No | API password field for authentication purposes.
    |

    | Verify SSL | Boolean | Yes | Whether to validate SSL certificates when connecting
    to the API. |


    ### Flow Description

    1. Initializes the API client using the provided configuration parameters.

    2. Loads the job context to track processed cases and the current date.

    3. Queries SOAR for open cases tagged with either "Closed" or "Currency".

    4. Iterates through the retrieved cases:
        * If a case is tagged "Closed", it closes the case in SOAR.
        * If a case is tagged "Currency" and has not been commented on today, it fetches
    the EUR exchange rate from the external API and adds a comment to the case.
    5. Updates the job context with the IDs of cases that received a comment.

    6. Saves the updated context to ensure state persistence across job runs.
