Pull reports:
  ai_description: >-
    ### General Description

    This connector integrates with Beyond Security's **beSECURE**, a Vulnerability
    Assessment and Management solution. It automatically pulls vulnerability scan
    reports and ingests them into Google SecOps as alerts and events. The connector
    identifies vulnerable hosts, assesses their risk levels, and provides detailed
    information about the vulnerabilities found during network scans.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The base URL of the beSECURE instance (e.g., `https://besecure.company.com`).
    |

    | API Key | Password | Yes | The API Key used to authenticate requests to the
    beSECURE API. |

    | Check Every X Minutes | String | Yes | The time interval (in minutes) to look
    back for completed scans. |

    | Verify SSL Certificate? | Boolean | No | If set to true, the connector will
    verify the SSL certificate of the beSECURE server. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the ingested data. |

    | EventClassId | String | No | The field name used to determine the event name
    or sub-type. |

    | PythonProcessTimeout | String | Yes | The maximum time (in seconds) allowed
    for the connector script to run. |


    ### Flow Description

    1. **Connection**: The connector establishes a connection to the beSECURE API
    using the provided URL and API Key.

    2. **Scan Discovery**: It queries for network scans that have finished within
    the specified lookback window (defined by the 'Check Every X Minutes' parameter).

    3. **Deduplication**: The connector maintains a local state file (`previous_scans.json`)
    to track processed scan IDs and scan numbers, ensuring that the same report is
    not ingested multiple times.

    4. **Report Retrieval**: For each new scan identified, the connector fetches the
    full vulnerability report in JSON format.

    5. **Vulnerability Filtering**: It parses the report and filters for vulnerable
    hosts that have a `RiskFactor` of 1 or higher.

    6. **Alert Mapping**: Each vulnerability is mapped to a Google SecOps alert. The
    priority is determined by the `RiskFactor` (1 maps to Low, 4 to Medium, and 8
    to High).

    7. **Event Creation**: Detailed event data is generated for each vulnerability,
    including the Host ID, Destination Address, Port, Protocol, and the specific Test
    Category/ID.

    8. **Ingestion**: The mapped alerts and events are packaged and sent to Google
    SecOps for case creation and alert creation.
