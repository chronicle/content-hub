  ai_description: >-
    ### General Description

    The beSECURE Connector integrates with the Beyond Security beSECURE vulnerability
    assessment platform to ingest vulnerability scan data into Google SecOps. It periodically
    polls the beSECURE API for completed scans, retrieves detailed vulnerability reports,
    and converts them into actionable alerts within the SOAR platform. This allows
    security teams to monitor and respond to vulnerabilities identified by beSECURE
    directly within their incident response workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Verify SSL Ceritifcate? | Boolean | No | Whether to verify the SSL certificate
    of the beSECURE server. |

    | Check Every X Minutes | String | Yes | The interval in minutes to check for
    new scans. |

    | URL | String | Yes | The base URL of the beSECURE instance. |

    | API Key | Password | Yes | The API key for authenticating with the beSECURE
    API. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |


    ### Flow Description

    1. The connector initializes and connects to the beSECURE API using the provided
    URL and API Key.

    2. It queries the API for network scans that have completed within the configured
    "Check Every X Minutes" window.

    3. It maintains a local `previous_scans.json` file to track processed scan IDs
    and avoid duplicate ingestion.

    4. For each new scan, it fetches the detailed vulnerability report in JSON format.

    5. It iterates through the vulnerable hosts, filtering for vulnerabilities with
    a `RiskFactor` of 1 or higher.

    6. Valid vulnerabilities are mapped to `AlertInfo` objects, including relevant
    details like `VulnID`, `RiskFactor`, and `ScanDate`.

    7. The connector creates events for each vulnerability and returns the aggregated
    alerts to the SOAR platform for case creation.
