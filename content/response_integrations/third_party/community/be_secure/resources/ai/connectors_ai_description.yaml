Pull reports:
  ai_description: >-
    ### General Description

    The beSECURE connector integrates Google SecOps with Beyond Security's beSECURE
    Vulnerability Assessment and Management solution. It automatically retrieves vulnerability
    scan results for networks and hosts, converting identified vulnerabilities into
    actionable alerts. This allows security teams to monitor scan progress and respond
    to newly discovered vulnerabilities directly within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Verify SSL Ceritifcate? | Boolean | No | If set to true, the connector will
    verify the SSL certificate of the beSECURE server. |

    | Check Every X Minutes | String | Yes | The lookback window (in minutes) to check
    for completed scans during each execution. |

    | URL | String | Yes | The base URL of the beSECURE instance (e.g., `https://besecure.yourdomain.com`).
    |

    | API Key | Password | Yes | The API key required to authenticate with the beSECURE
    JSON API. |

    | DeviceProductField | String | Yes | The field name used to identify the device
    product in the ingested events (default: beSECURE Pull Reports). |

    | EventClassId | String | No | The field name used to determine the event name
    or sub-type. |

    | PythonProcessTimeout | String | Yes | The maximum execution time allowed for
    the connector script in seconds. |


    ### Flow Description

    1. **Initialization**: The connector extracts configuration parameters and cleans
    the API key of any non-alphanumeric characters.

    2. **Scan Discovery**: It queries the beSECURE API (`returnnetworks` action) to
    identify scans that have finished within the specified rotation time.

    3. **Deduplication**: The connector maintains a local state file (`previous_scans.json`)
    to track processed scan IDs and scan numbers, ensuring that duplicate alerts are
    not created for the same scan results.

    4. **Report Retrieval**: For each new scan identified, the connector fetches the
    detailed vulnerability report in JSON format using the `getreport` action.

    5. **Vulnerability Parsing**: It iterates through the `VulnerableHosts` list.
    It filters out vulnerabilities with a `RiskFactor` of 0 (informational) to focus
    on actionable security risks.

    6. **Alert Creation**: For each valid vulnerability, it creates a Google SecOps
    alert. The alert priority is dynamically mapped based on the beSECURE `RiskFactor`
    (8 = High, 4 = Medium, 1 = Low).

    7. **Event Mapping**: Detailed host information, including HostID, Port, Service,
    and TestID, is mapped into the event structure associated with the alert.

    8. **Ingestion**: The final set of alerts and events is returned to Google SecOps
    for case creation and further investigation.
