  ai_description: >-
    ### General Description

    The beSECURE connector integrates the beSECURE Vulnerability Assessment and Management
    solution with Google SecOps. It periodically polls the beSECURE API to retrieve
    completed vulnerability scans. By analyzing these reports, the connector identifies
    vulnerable hosts and generates corresponding alerts within the SOAR platform,
    enabling security teams to prioritize and remediate vulnerabilities effectively.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Verify SSL Ceritifcate? | Boolean | No | Determines whether to verify the SSL
    certificate of the beSECURE server. |

    | Check Every X Minutes | Integer | Yes | The frequency (in minutes) at which
    the connector checks for new scan reports. |

    | URL | String | Yes | The base URL of the beSECURE instance. |

    | API Key | String | Yes | The API key used for authentication with the beSECURE
    API. |

    | DeviceProductField | String | Yes | The field name used to identify the device
    product in the SOAR platform. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    Python process running the connector script. |


    ### Flow Description

    1. The connector initializes and retrieves configuration parameters, including
    the API key and beSECURE instance URL.

    2. It queries the beSECURE API for scans that have finished within the configured
    Check Every X Minutes interval.

    3. For each identified scan, the connector fetches detailed vulnerability data
    in JSON format.

    4. It checks a local previous_scans.json file to ensure that only new, unprocessed
    scan results are analyzed.

    5. The connector iterates through the vulnerable hosts found in the report, filtering
    them based on their RiskFactor.

    6. For each valid vulnerability, it creates an AlertInfo object, mapping relevant
    data (e.g., HostID, Port, Service, RiskFactor) to the SOAR alert format.

    7. The generated alerts are ingested into the SOAR platform, and the previous_scans.json
    file is updated to track the processed scans.
