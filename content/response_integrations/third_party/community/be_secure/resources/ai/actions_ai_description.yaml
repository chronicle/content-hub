  ai_description: >-
    ### General Description

    This action verifies connectivity to the beSECURE integration by performing a
    GET request to the `/json.cgi` endpoint. It ensures that the integration is properly
    configured and reachable.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used for authentication with the beSECURE
    service. |

    | URL | String | Yes | The base URL of the beSECURE instance. |

    | Verify SSL Ceritifcate? | Boolean | Yes | A flag indicating whether to verify
    the SSL certificate during the connection. |


    ### Flow Description

    1. Retrieve the integration configuration, including the API Key, URL, and SSL
    verification setting.

    2. Construct a GET request to the configured URL with specific parameters (`primary="admin"`,
    `secondary="networks"`, `action="returnnetworks"`, etc.).

    3. Execute the request to check connectivity.

    4. Validate the response; if an "error" key is present, the action is marked as
    failed.

    5. Terminate the action with a success or failure status.
