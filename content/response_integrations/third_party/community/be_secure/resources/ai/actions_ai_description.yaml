  ai_description: >-
    ### General Description

    Tests connectivity to the beSECURE platform. This action verifies the provided
    integration configuration (API credentials and URL) by attempting to fetch a list
    of networks scanned in the last minute. It is primarily used as a health check
    to ensure the integration is properly configured and can communicate with the
    beSECURE API.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters (API Key, URL, and Verify SSL
    Certificate).


    ### Flow Description

    1. **Retrieve Configuration:** Extracts the API Key, URL, and SSL verification
    settings from the beSECURE integration configuration.

    2. **Sanitize Input:** Cleans the API key of any non-alphanumeric characters.

    3. **Execute API Request:** Sends a GET request to the beSECURE API (`/json.cgi`)
    with parameters to return networks scanned within the last minute.

    4. **Evaluate Response:** Checks the API response for errors. If an error is found,
    the action fails and outputs the error details. If successful, the action completes
    with a success message.
