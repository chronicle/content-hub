  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between the Google
    SecOps (Chronicle) environment and the **beSECURE** server. It ensures that the
    provided URL and API Key are valid and that the network path is open by attempting
    to retrieve a list of networks from the beSECURE API.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (URL, API Key, and SSL verification settings).


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the integration's global settings,
    including the API Key, Server URL, and SSL verification preference.

    2. **Data Sanitization:** The API Key is cleaned of non-alphanumeric characters,
    and the URL is formatted to ensure it includes the correct protocol (HTTPS/HTTP).

    3. **Connectivity Test:** The action performs a GET request to the beSECURE `/json.cgi`
    endpoint using the `returnnetworks` action parameter to test the credentials and
    connectivity.

    4. **Validation:** The script checks the JSON response for any error keys returned
    by the beSECURE API.

    5. **Result Reporting:** If the request is successful and no errors are found,
    the action completes with a success status. If an error is detected or the request
    fails, it reports a failure.
