Ping:
  ai_description: >-
    ### General Description

    Checks connectivity to the beSECURE server by attempting to retrieve a list of
    networks via the API. This action is typically used to verify that the integration
    is configured correctly and can successfully communicate with the beSECURE instance.


    ### Flow Description

    1. Retrieves the integration configuration parameters (URL, API Key, and SSL verification
    settings).

    2. Sends an HTTP GET request to the beSECURE API (`/json.cgi`) with the action
    set to `returnnetworks`.

    3. Evaluates the API response to check for any errors.

    4. Returns a successful execution status if connectivity is established and no
    errors are found; otherwise, it fails and outputs the error details.


    ### Additional Notes

    This is a utility action primarily used for testing and validating the integration's
    connection to the beSECURE platform. It does not process entities or modify any
    case data.
  ai_short_description: >-
    Checks connectivity to the beSECURE server by attempting to retrieve a list of
    networks via the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
