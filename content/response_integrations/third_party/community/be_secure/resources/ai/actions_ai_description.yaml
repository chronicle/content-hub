Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity and authentication
    between Google SecOps and the beSECURE (Beyond Security) platform. It performs
    a test API call to retrieve network information, ensuring that the provided URL
    and API Key are valid and that the network path is open.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration (URL, API Key, and SSL verification settings).


    ### Additional Notes

    - This action is primarily used for troubleshooting and initial setup validation.

    - It specifically attempts to call the `returnnetworks` action on the beSECURE
    API.

    - The API Key is automatically sanitized to remove non-alphanumeric characters
    (except hyphens) before the request is made.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration's global settings,
    including the API Key, Base URL, and SSL verification preference.

    2. **URL Formatting**: It ensures the URL is prefixed with the correct protocol
    (HTTP/HTTPS).

    3. **API Key Sanitization**: It cleans the API Key using a regular expression
    to ensure only valid characters are sent.

    4. **Connectivity Test**: It executes a GET request to the beSECURE `/json.cgi`
    endpoint with hardcoded parameters (`primary="admin"`, `secondary="networks"`,
    `action="returnnetworks"`) to simulate a data retrieval task.

    5. **Validation**: The action checks the JSON response for an "error" key. If
    an error is found or the request fails, the action reports a failure. Otherwise,
    it returns a successful execution state.
