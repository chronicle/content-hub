  ai_description: "This action verifies connectivity to the beSECURE integration by\
    \ performing a GET request to the `/json.cgi` endpoint. \n\n### Parameters\n|\
    \ Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | API Key | String | Yes | The API key used for authentication with the beSECURE\
    \ service. |\n| URL | String | Yes | The base URL of the beSECURE instance. |\n\
    | Verify SSL Ceritifcate? | Boolean | Yes | A flag indicating whether to verify\
    \ the SSL certificate during the connection. |\n\n### Flow Description\n1. Retrieve\
    \ the integration configuration, including the API Key, URL, and SSL verification\
    \ setting.\n2. Construct a GET request to the configured URL with specific parameters\
    \ (`primary=\"admin\"`, `secondary=\"networks\"`, `action=\"returnnetworks\"`,\
    \ etc.).\n3. Execute the request to check connectivity.\n4. Validate the response;\
    \ if an \"error\" key is present, the action is marked as failed.\n5. Terminate\
    \ the action with a success or failure status."
