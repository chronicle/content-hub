product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration 'be_secure' is explicitly described as a Vulnerability Assessment
    and Management solution. Its primary connector, 'Pull reports', retrieves vulnerability
    scan data from the beSECURE API and generates alerts for vulnerable hosts. This
    aligns directly with the Vulnerability Management category, which focuses on identifying
    susceptible assets and providing vulnerability information. The integration does
    not perform functions related to SIEM (log analysis), EDR (host process control),
    Network Security (gateway blocking), Threat Intelligence (indicator enrichment),
    Email Security, IAM, Cloud Security, ITSM, Asset Inventory (CMDB management),
    or Collaboration.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
