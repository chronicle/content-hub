Get AI Job by name:
  ai_description: >-
    Retrieves detailed information about a specific AI job from the Arcanna.ai platform
    using its name. This action is primarily used as a utility to fetch job metadata,
    such as job IDs or configuration details, which can then be used in subsequent
    workflow steps.


    ### Flow Description:

    1. **Configuration Retrieval:** The action starts by extracting the Arcanna URL,
    API Key, and SSL verification settings from the integration's global configuration.

    2. **Parameter Extraction:** It retrieves the mandatory 'Job name' provided by
    the user.

    3. **API Request:** The action initializes the Arcanna client and sends a request
    to the `/api/v1/jobs/get_by_name` endpoint to search for the specified job.

    4. **Result Handling:** If the job is found, the full JSON response containing
    the job's details is added to the action's results. If the request fails, an error
    is logged and the action is marked as failed.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job name | String | Yes | The specific name of the AI job in Arcanna for which
    you want to retrieve details. |


    ### Additional Notes:

    - This action does not process or filter SecOps entities (like IPs or Hostnames);
    it is a management utility for the Arcanna.ai integration.
