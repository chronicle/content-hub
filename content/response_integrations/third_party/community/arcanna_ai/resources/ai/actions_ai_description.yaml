    This action allows analysts or automated workflows to dynamically adjust the severity
    of an alert based on external logic or decision-making tools like ArcannaAI.


    ### Flow Description:

    1. **Identifier Retrieval:** The action first retrieves the unique identifier
    for the current alert.

    2. **Parameter Validation:** It validates that the provided `Priority` parameter
    matches one of the allowed values: Informative, Low, Medium, High, or Critical.

    3. **Version Check:** It verifies that the Google SecOps (Siemplify) environment
    version is 5.6 or higher, as earlier versions do not support this API endpoint.

    4. **Internal API Call:** It executes a POST request to the internal SOAR API
    (`/external/v1/sdk/UpdateAlertPriority`) with the case ID, alert identifier, and
    the new priority value.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Priority | String | Yes | The new priority level to assign to the alert. Must
    be one of: `Informative`, `Low`, `Medium`, `High`, or `Critical`. |


    ### Additional Notes:

    - This action interacts with the internal Google SecOps API rather than an external
    ArcannaAI endpoint to perform the update.

    - If the alert identifier is missing or the version is unsupported, the action
    will terminate with a failure message.
