    parameters.

    3. **Client Initialization**: Initializes the `ArcannaClient` with the provided
    credentials and connection settings.

    4. **API Request**: Executes a GET request to the `/api/v1/jobs/{job_id}/labels`
    endpoint to fetch the decision set.

    5. **Result Processing**: Adds the retrieved JSON response to the action results
    and completes the execution.
