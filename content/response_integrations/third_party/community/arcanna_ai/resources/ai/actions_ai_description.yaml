  ai_description: >-
    ### General Description

    The **Export full event** action retrieves the complete raw or processed data
    for a specific event from Arcanna.ai. By providing a Job ID and an Event ID, analysts
    can fetch the full context of an event that has been processed by the Arcanna
    AI engine, which is essential for deep-dive forensic analysis or manual verification
    of AI decisions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | String | Yes | The unique identifier of the Arcanna job where the
    event is stored. Note: The action internally treats this as an integer. |

    | **Event ID** | String | Yes | The unique identifier of the specific event to
    be retrieved from the specified job. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the Arcanna URL, API Key,
    and SSL verification settings from the integration's global configuration.

    2. **Input Validation**: The action retrieves the mandatory `Job ID` and `Event
    ID` from the action parameters provided in the playbook or by the user.

    3. **API Request**: The action initializes the Arcanna client and executes an
    HTTP GET request to the export endpoint: `/api/v1/events/{job_id}/{event_id}/export`.

    4. **Data Output**: The full JSON response containing the event details is captured
    and added to the action's result JSON, making it available for subsequent playbook
    steps.


    ### Additional Notes

    - This action does not process or filter entities from the SecOps case; it relies
    entirely on the provided ID parameters.

    - The action is read-only regarding the external Arcanna.ai system.
