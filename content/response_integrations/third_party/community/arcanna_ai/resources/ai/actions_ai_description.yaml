    | :--- | :--- | :--- | :--- |

    | Job name | String | Yes | The unique name of the Arcanna.ai job for which the
    decision set (labels) should be retrieved. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Arcanna URL, API Key, and SSL verification
    settings from the integration configuration.

    2. **Parameter Extraction**: Retrieves the target 'Job name' from the action parameters.

    3. **API Interaction**: Initializes the Arcanna client and performs a POST request
    to the `/api/v1/jobs/get_by_name/labels` endpoint with the job name to fetch the
    associated labels.

    4. **Result Processing**: Captures the JSON response containing the decision set
    and attaches it to the action's execution results using `add_result_json`.

    5. **Completion**: Finalizes the action with a success or failure status based
    on the API response.


    ### Additional Notes

    - This action does not operate on SOAR entities; it is a utility action for job
    metadata retrieval.

