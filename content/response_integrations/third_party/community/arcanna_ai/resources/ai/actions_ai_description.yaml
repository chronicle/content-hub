Get Arcanna decision:
  ai_description: "### General Description\nRetrieves an AI-driven decision from Arcanna.ai\
    \ for a specific event. This action is used to poll the Arcanna API to obtain\
    \ the inference result (decision) associated with a previously submitted event.\
    \ It is particularly useful in automated workflows where a decision from an AI\
    \ model is required to determine the next steps in an investigation.\n\n### Parameters\
    \ Description\n| Parameter | Description | Type | Mandatory | \n| :--- | :---\
    \ | :--- | :--- |\n| Job Id | The unique identifier of the Arcanna Job associated\
    \ with the event. | string | Yes |\n| Event Id | The unique identifier of the\
    \ specific event for which the decision is being requested. | string | Yes |\n\
    | Retry count | The maximum number of times the action will poll the Arcanna API\
    \ if the decision is still pending. | string | Yes |\n| Seconds per retry | The\
    \ duration (in seconds) to wait between each polling attempt. | string | Yes |\n\
    \n### Additional Notes\n- The action uses a polling mechanism because AI inference\
    \ may not be instantaneous. \n- If the `Retry count` is exhausted and the decision\
    \ is still pending, the action will return a failure state.\n- This action does\
    \ not process SecOps entities; it relies entirely on the provided Job and Event\
    \ IDs.\n\n### Flow Description\n1. **Initialization**: Extracts the Arcanna URL\
    \ and API Key from the integration configuration and the Job/Event IDs from the\
    \ action parameters.\n2. **Retry Loop**: Enters a loop based on the `Retry count`\
    \ and `Seconds per retry` settings.\n3. **API Request**: Calls the Arcanna `get_event_status`\
    \ endpoint for the specified Job and Event.\n4. **Status Evaluation**:\n    -\
    \ If the status is **OK**: The decision data is retrieved, added to the action\
    \ results, and the process completes successfully.\n    - If the status is **pending_inference**:\
    \ The script logs that the decision is pending, waits for the specified interval,\
    \ and retries.\n    - If the status is **ERROR**: The action logs the error and\
    \ terminates with a failure state.\n5. **Timeout**: If the loop finishes without\
    \ receiving an 'OK' or 'ERROR' status, the action fails due to a timeout."
