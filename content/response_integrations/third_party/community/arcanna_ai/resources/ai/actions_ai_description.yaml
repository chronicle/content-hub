    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Job ID | The unique identifier for the Arcanna AI job for which the decision
    set should be fetched. | String | Yes | This value is converted to an integer
    internally. |


    ### Additional Notes

