Send JSON Document to Arcanna:
  ai_description: >-
    Sends a JSON document to Arcanna.ai for ingestion and analysis. This action allows
    users to provide a raw JSON payload, specify a Job ID, and optionally define a
    unique identifier from within the JSON structure to be used as the event ID in
    Arcanna. This is useful for integrating custom data sources or specific event
    logs into the Arcanna AI workflow.


    ### Flow Description

    1. **JSON Parsing:** The action parses the provided 'JSON Document' string into
    a JSON object.

    2. **ID Extraction (Optional):** If 'Use document ID as ID in Arcanna' is enabled,
    the action uses the 'Identifier field' (supporting dot notation) to extract a
    specific value from the JSON to serve as the event's unique ID.

    3. **API Interaction:** The action sends a POST request to the Arcanna API's events
    endpoint, including the Job ID and the raw JSON body.

    4. **Result Handling:** The response from Arcanna is captured and added to the
    action's execution results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | string | Yes | The specific Arcanna.ai Job ID that will process the
    ingested document. |

    | Identifier field | string | No | The path (e.g., 'id' or 'metadata.uuid') to
    the field in the JSON document that should be used as the unique identifier. |

    | Use document ID as ID in Arcanna | boolean | Yes | If true, the value found
    in the 'Identifier field' is used as the ID in Arcanna. If false, Arcanna generates
    a new ID. |

    | JSON Document | code | Yes | The actual JSON data to be sent to Arcanna. |


    ### Additional Notes

    * The root of the JSON document must be an object, not a list.
