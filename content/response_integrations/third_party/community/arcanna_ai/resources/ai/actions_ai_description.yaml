    ### General Description

    Retrieves the decision set (available labels) for a specific AI job in Arcanna.ai
    based on the job's name. This action allows users to programmatically identify
    the possible classification outcomes configured for a particular job, which is
    essential for downstream logic that processes AI decisions.


    ### Parameters Description


