Export full event:
  ai_description: >-
    ### General Description

    The **Export full event** action retrieves the complete data associated with a
    specific event from a designated Arcanna.ai job. This is primarily used for deep-dive
    analysis or forensic review of events processed by the Arcanna.ai engine, allowing
    analysts to see the full raw and processed context of a decision.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | string | Yes | The unique identifier of the Arcanna job where the
    event is located. The action converts this to an integer internally. |

    | **Event ID** | string | Yes | The unique identifier of the specific event to
    be exported. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Arcanna URL, API Key,
    and SSL verification settings from the integration configuration.

    2. **Parameter Retrieval:** It extracts the `Job ID` and `Event ID` provided by
    the user.

    3. **API Interaction:** The action initializes the `ArcannaClient` and performs
    a GET request to the `/api/v1/events/{job_id}/{event_id}/export` endpoint.

    4. **Data Processing:** The full event data returned by the API is captured as
    a JSON object.

    5. **Result Output:** The retrieved JSON is attached to the action results for
    use in subsequent playbook steps or for analyst review.


    ### Additional Notes

    - This action does not operate on SOAR entities; it requires specific IDs as input
    parameters.

    - The output is provided as a raw JSON result (`JsonResult`).
