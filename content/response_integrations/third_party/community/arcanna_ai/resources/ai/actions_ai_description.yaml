Send Analyst Feedback to Arcanna:
  ai_description: >-
    ### General Description

    The **Send Analyst Feedback to Arcanna** action allows an analyst to submit feedback
    or labels for a specific event processed by Arcanna.ai. This feedback is used
    by the Arcanna platform to refine its AI models and improve future decision-making
    accuracy.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Event Id** | String | Yes | The unique identifier of the event in Arcanna
    for which feedback is being provided. |

    | **Username** | User | Yes | The name or identifier of the analyst providing
    the feedback. |

    | **Job Id** | String | Yes | The unique identifier of the Arcanna job associated
    with the event. |

    | **Analyst Feedback** | String | Yes | The specific feedback or label (e.g.,
    'True Positive', 'False Positive') to be assigned to the event. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Arcanna API credentials
    (URL, API Key) from the integration configuration and the specific event details
    (Event ID, Job ID, Username, Feedback) from the action parameters.

    2. **Client Initialization**: An Arcanna API client is initialized with the provided
    connection details and SSL verification settings.

    3. **Feedback Submission**: The action performs a `PUT` request to the Arcanna
    endpoint (`/api/v1/events/{job_id}/{event_id}/feedback`) containing the analyst's
    username and the feedback string.

    4. **Result Processing**: The response from the Arcanna API is captured and attached
    to the action's execution results as a JSON object for further use in the playbook.


    ### Additional Notes

    This action does not operate on SecOps entities; it requires specific IDs provided
    as parameters. It is primarily used for model training and feedback loops within
    the Arcanna.ai ecosystem.
