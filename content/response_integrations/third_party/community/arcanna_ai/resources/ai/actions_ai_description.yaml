  ai_description: >-
    Sends the current active alert from a Google SecOps case to Arcanna.ai for automated
    analysis. This action identifies the specific alert context within a case, extracts
    the raw alert payload, and ingests it into a specified Arcanna Job. It allows
    for custom mapping of alert identifiers to ensure consistency between systems.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the Arcanna URL, API Key, and SSL settings
    from the integration configuration, along with the Job ID and identifier settings
    from the action parameters.

    2. **Case Context Retrieval:** Fetches the full case details and identifies the
    `current_alert` being processed.

    3. **Alert Matching:** Iterates through the case's `cyber_alerts` to find the
    one matching the current alert's identifier.

    4. **Identifier Mapping:** If configured, extracts a specific value from the alert
    payload (using the provided JSON path) to serve as the event ID in Arcanna.

    5. **Data Ingestion:** Sends the raw alert JSON to the Arcanna API via a POST
    request to the specified Job ID.

    6. **Result Handling:** Captures the Arcanna response and attaches it to the action
    results.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | string | Yes | The unique identifier of the Job in Arcanna.ai that
    will process the ingested alert. |

    | Alert identifier field | string | No | The JSON path (e.g., "identifier" or
    "metadata.id") within the alert payload used to extract a custom ID. Defaults
    to "identifier". |

    | Use Alert ID as ID in Arcanna | boolean | Yes | If set to `True`, the action
    uses the value from the 'Alert identifier field' as the ID in Arcanna. If `False`,
    Arcanna generates a new unique ID. |


    ### Additional Notes:

    - This action operates on the alert level within a case context and does not process
    individual entities (IPs, Hosts, etc.).

    - Ensure the 'Alert identifier field' correctly matches the structure of your
    incoming Google SecOps alerts if you choose to use existing IDs.
