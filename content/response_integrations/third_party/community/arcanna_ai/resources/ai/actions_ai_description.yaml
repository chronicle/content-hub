Export full event:
  ai_description: >-
    ### General Description

    Exports a full event from Arcanna.ai based on the provided Job ID and Event ID.
    This action retrieves the complete details of a specific event processed by an
    Arcanna job.


    ### Flow Description

    1. Extracts the `Job ID` and `Event ID` parameters provided by the user.

    2. Initializes the Arcanna API client with the integration credentials.

    3. Makes a GET request to the Arcanna API (`/api/v1/events/{job_id}/{event_id}/export`)
    to fetch the event data.

    4. Attaches the retrieved event data to the action's JSON result.


    ### Additional Notes

    This action does not operate on entities and relies strictly on the provided Job
    ID and Event ID to fetch the data.
