Send event to Arcanna:
  ai_description: >-
    ### General Description

    The **Send event to Arcanna** action exports security event data from Google SecOps
    to the Arcanna.ai platform. This allows for external AI-assisted analysis, triage,
    and decision-making. The action can be configured to send either the entire case
    context or specific alert details to a designated Arcanna job.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job ID** | String | Yes | The specific Job ID in Arcanna.ai that will process
    the incoming event. |

    | **Username** | User | Yes | The username of the analyst or system account performing
    the action, used for auditing within Arcanna. |

    | **Event ID mapping field** | String | No | A dot-notation path (e.g., `alert.id`
    or `external_id`) used to extract a specific value from the case/alert to serve
    as the reference ID in Arcanna. |

    | **Send individual alerts from case** | Boolean | No | If set to `true`, the
    action only sends the current alert context. If `false` (default), the entire
    case object is sent. |


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (URL, API Key) and
    action parameters (Job ID, Username, Mapping Field).

    2. **Data Retrieval**: Fetches the full case details from the Google SecOps platform.

    3. **Payload Construction**:
        - If `Send individual alerts from case` is true: Filters the case's alerts
    to find the one matching the current alert identifier.
        - If false: Prepares the entire case object, including target entities, as
    the payload.
    4. **ID Mapping**: If an `Event ID mapping field` is provided, it parses the JSON
    structure of the case or alert to find the specified reference ID.

    5. **API Interaction**: Sends a POST request to the Arcanna.ai `/api/v1/events/`
    endpoint with the constructed payload and Job ID.

    6. **Completion**: Captures the Arcanna response and attaches it as a JSON result
    to the action.


    ### Additional Notes

    - This action does not modify any data within Google SecOps; it is strictly an
    outbound data integration.

    - Ensure the `Job ID` exists in your Arcanna.ai instance before running the action.
