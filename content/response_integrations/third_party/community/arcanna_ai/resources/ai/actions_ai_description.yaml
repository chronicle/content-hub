Send Active Alert from Case to Arcanna:
  ai_description: >-
    Sends the currently active alert from a Google SecOps case to Arcanna.ai for AI-assisted
    analysis. This action retrieves the full alert payload from the case context and
    transmits it to a specific Arcanna job. It allows for mapping a specific field
    from the alert to serve as the unique identifier within the Arcanna platform.


    ### Flow Description

    1. **Configuration Retrieval:** Extracts the Arcanna API key, base URL, and SSL
    settings from the integration configuration.

    2. **Parameter Extraction:** Retrieves the target Arcanna Job ID and identifier
    mapping settings from the action parameters.

    3. **Case Context Fetching:** Accesses the full case data and identifies the specific
    alert currently being processed in the playbook.

    4. **Alert Matching:** Iterates through the case's cyber alerts to find the payload
    matching the current alert's identifier.

    5. **Data Transmission:** Sends the raw alert payload to the Arcanna API via a
    POST request, optionally including a custom event ID if configured.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | string | Yes | The specific Job ID in Arcanna.ai that should receive
    and process the alert data. |

    | Alert identifier field | string | No | The JSON path within the alert payload
    (e.g., "identifier") to be used as the unique ID in Arcanna. Defaults to "identifier".
    |

    | Use Alert ID as ID in Arcanna | boolean | Yes | If set to True, the action will
    use the value found in the 'Alert identifier field' as the event ID in Arcanna.
    If False, Arcanna generates a new unique ID. |


    ### Additional Notes

    - This action operates at the Alert level within a Case. It specifically targets
    the 'current alert' context of the playbook execution.

    - The 'Job ID' is expected to be a numeric string that the script converts to
    an integer.
