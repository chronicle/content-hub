Trigger AI Model training:
  ai_description: >-
    ### General Description

    Triggers the training process for a specific AI model associated with a Job ID
    in the Arcanna.ai platform. This action is typically used to initiate model updates
    or retraining cycles based on collected feedback or new datasets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | string | Yes | The unique identifier for the Arcanna job where the
    AI model training will be triggered. |

    | Username | user | Yes | The username of the analyst or system account triggering
    the training, used for audit logging within Arcanna.ai. |


    ### Additional Notes

    This action does not operate on SecOps entities (IPs, Hosts, etc.). It is a direct
    API command to the Arcanna.ai management interface. Ensure the Job ID provided
    exists and is accessible by the configured API key.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Arcanna URL, API Key, and SSL settings
    from the integration configuration, and the Job ID and Username from the action
    parameters.

    2. **Client Initialization:** Establishes a connection to the Arcanna.ai API using
    the provided credentials.

    3. **Trigger Training:** Executes a POST request to the Arcanna training endpoint
    (`/api/v1/jobs/{job_id}/train`) including the username for auditing.

    4. **Result Processing:** Captures the API response, which typically includes
    the status of the training request, and attaches it to the action's JSON results.
