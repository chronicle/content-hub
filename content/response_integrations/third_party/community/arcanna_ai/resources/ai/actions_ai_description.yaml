  ai_description: >-
    Retrieves the AI decision for a specific event from Arcanna.ai by polling the
    service until a result is available or the retry limit is reached.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Job Id | string | Yes | The ID of the Arcanna job. |

    | Event Id | string | Yes | The ID of the event to check the decision for. |

    | Retry count | string | Yes | How many times the request should be retried if
    the decision is still pending. |

    | Seconds per retry | string | Yes | How many seconds to wait between retry attempts.
    |


    ### Flow

    1. Initializes the Arcanna client using the integration configuration.

    2. Polls the Arcanna API for the event status using the provided Job ID and Event
    ID.

    3. If the status is `pending_inference`, waits and retries based on the configured
    retry count and interval.

    4. If the status is `OK`, returns the decision as a JSON result.

    5. If the status is `ERROR` or the retry limit is reached without a decision,
    the action fails.
