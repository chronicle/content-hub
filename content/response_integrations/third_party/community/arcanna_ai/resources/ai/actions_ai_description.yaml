  ai_description: >-
    ### General Description

    Retrieves an AI-driven decision for a specific event from the Arcanna.ai platform.
    This action is typically used to poll for the results of an inference job after
    an event has been submitted for analysis. It supports a configurable retry mechanism
    to account for the time required by the AI engine to process the data and generate
    a decision.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Job Id** | string | Yes | The unique identifier of the Arcanna job associated
    with the event. |

    | **Event Id** | string | Yes | The unique identifier of the specific event for
    which the decision is being requested. |

    | **Retry count** | string | Yes | The maximum number of times the action will
    poll the Arcanna API if the decision is still pending. Default is 20. |

    | **Seconds per retry** | string | Yes | The duration (in seconds) to wait between
    each polling attempt. Default is 5. |


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (URL, API Key, SSL settings)
    and action parameters (Job ID, Event ID, Retry settings).

    2. **Polling Loop**: Enters a loop that executes up to the specified `Retry count`
    plus one.

    3. **API Request**: Calls the Arcanna API to retrieve the current status of the
    event using the provided Job and Event IDs.

    4. **Status Evaluation**:
        * If the status is `pending_inference`, the action logs the status, waits
    for the specified `Seconds per retry`, and continues to the next iteration.
        * If the status is `OK`, the action retrieves the decision data, adds it to
    the JSON results, and terminates successfully.
        * If the status is `ERROR`, the action logs the error response and terminates
    with a failure state.
    5. **Timeout Handling**: If the retry limit is reached without receiving a final
    decision, the action terminates with a failure message suggesting an increase
    in the retry window.


    ### Additional Notes

    * This action does not operate on SecOps entities; it requires specific IDs provided
    as input parameters.

    * The total wait time is approximately `Retry count` * `Seconds per retry`.
