    | :--- | :--- | :--- | :--- |

    | Job ID | string | Yes | The unique identifier of the Arcanna.ai job that will
    process the ingested case data. |

    | Case identifier field | string | No | The field within the Google SecOps case
    object (e.g., "identifier") to be used as the ID in Arcanna.ai. Defaults to "identifier".
