  ai_description: >-
    ### General Description

    This action retrieves the decision status for a specific Arcanna AI job and event.
    It polls the Arcanna API until a final decision is available or the retry limit
    is reached. This action is useful for automating the retrieval of AI-driven analysis
    results for specific events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Job Id | string | Yes | The ID of the Arcanna job to query. |

    | Event Id | string | Yes | The ID of the event to check. |

    | Retry count | string | Yes | Number of times to retry the request if the status
    is 'pending_inference'. |

    | Seconds per retry | string | Yes | Time in seconds to wait between retry attempts.
    |


    ### Flow Description

    1. Extracts configuration parameters (URL, API Key, SSL verification) and action
    parameters (Job ID, Event ID, Retry count, Seconds per retry).

    2. Initializes the ArcannaClient with the provided credentials.

    3. Enters a retry loop to poll the Arcanna API for the event status using the
    'get_event_status' method.

    4. If the status is 'pending_inference', the action waits for the configured duration
    and retries.

    5. If the status is 'OK', the action adds the response JSON to the result and
    completes successfully.

    6. If the status is 'ERROR' or the retry limit is reached, the action fails.


    ### Additional Notes

    This action performs a GET request to the Arcanna API and does not modify any
    external systems or internal SOAR data. It is designed to be used as a utility
    to fetch decision data.
