  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the Arcanna.ai instance. It serves as a diagnostic tool to ensure that
    the provided API credentials and URL are correct and that the Arcanna.ai service
    is reachable and healthy.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration (URL, API Key, and SSL Verification settings).


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the integration's base URL,
    API Key, and SSL verification settings from the environment configuration.

    2. **Client Initialization**: An `ArcannaClient` is initialized using the retrieved
    credentials.

    3. **Health Check**: The action performs a GET request to the `/api/v1/health`
    endpoint of the Arcanna.ai API.

    4. **Result Processing**: The response from the health endpoint is captured and
    added to the action's JSON results.

    5. **Completion**: The action concludes with a success status if the API responds
    correctly, or a failure status if an exception occurs (e.g., connection timeout,
    invalid credentials).


    ### Additional Notes

    * This action is strictly for connectivity testing and does not process any case
    data or entities.

    * According to standard SOAR practices, Ping actions are excluded from being categorized
    as enrichment actions.
