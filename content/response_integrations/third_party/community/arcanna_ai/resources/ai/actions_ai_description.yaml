Send Case to Arcanna:
  ai_description: >-
    ### General Description

    The **Send Case to Arcanna** action exports the complete data of a Google SecOps
    case, including its associated entities, to the Arcanna.ai platform. This integration
    allows for external AI-driven analysis and decision-making by submitting case
    details to a specific Arcanna job.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | String | Yes | The unique identifier of the Arcanna job that will receive
    and process the case data. |

    | Case identifier field | String | No | The JSON path in the case object (e.g.,
    `identifier`) to be used as the event ID in Arcanna. |

    | Use case ID as ID in Arcanna | Boolean | No | If set to `True`, the action uses
    the value from the 'Case identifier field' as the ID in Arcanna. If `False`, Arcanna
    generates a new unique ID. |


    ### Flow Description

    1. **Initialization**: The action initializes the Arcanna API client using the
    provided URL and API Key from the integration configuration.

    2. **Data Retrieval**: It fetches the full case object and the list of entities
    currently in the context.

    3. **Payload Construction**: The case data is prepared as the primary payload,
    with the entity list appended to it.

    4. **ID Mapping**: If configured, it extracts a specific field from the case to
    serve as the external event ID.

    5. **Submission**: The action sends the payload to Arcanna.ai via a POST request
    associated with the specified Job ID.

    6. **Result Handling**: The API response from Arcanna is returned and added to
    the action's JSON results.


    ### Additional Notes

    * This action performs an external mutation by creating a new record (event) in
    the Arcanna.ai system.

    * Note: The script contains a technical quirk where it attempts to extract the
    'Api Key' from the 'SSL Verification' configuration block for SSL verification
    settings.
