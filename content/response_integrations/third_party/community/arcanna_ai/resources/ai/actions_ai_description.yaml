    2. Initializes the ArcannaClient with the provided credentials.

    3. Enters a retry loop to poll the Arcanna API for the event status using the
    'get_event_status' method.

    4. If the status is 'pending_inference', the action waits for the configured duration
    and retries.

    5. If the status is 'OK', the action adds the response JSON to the result and
    completes successfully.

    6. If the status is 'ERROR' or the retry limit is reached, the action fails.


    Additional notes:

