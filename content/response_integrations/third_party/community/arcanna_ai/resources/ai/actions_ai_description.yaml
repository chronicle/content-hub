Update alert priority:
  ai_description: >-
    Updates the priority level of the current alert within Google SecOps. This action
    allows analysts or automated workflows to dynamically adjust alert severity based
    on logic or external decision-making tools (like Arcanna.ai). It validates the
    input against a set of allowed priority levels and ensures the platform version
    supports the update operation.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the 'Priority' value from the action parameters.

    2. **Validation:** Checks if the provided priority is one of the allowed values:
    'Informative', 'Low', 'Medium', 'High', or 'Critical'.

    3. **Version Check:** Verifies that the Google SecOps (Siemplify) version is 5.6
    or higher, as earlier versions do not support this SDK method.

    4. **Internal API Call:** Constructs a request to the internal SOAR SDK endpoint
    (`/external/v1/sdk/UpdateAlertPriority`) containing the Case ID, Alert Identifier,
    Alert Name, and the new Priority.

    5. **Execution:** Executes a POST request to update the alert state within the
    platform.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Priority | String | Yes | The new priority level to assign to the alert. Must
    be one of: 'Informative', 'Low', 'Medium', 'High', 'Critical'. |


    ### Additional Notes:

    - This action modifies internal platform metadata (Alert Priority) rather than
    external system data.

    - It requires the action to be running within the context of an active alert.
