Get Arcanna decision:
  ai_description: >-
    ### General Description

    Retrieves the AI decision or status for a specific event from Arcanna.ai. This
    action polls the Arcanna API to get the inference result for a given event associated
    with a specific job.


    ### Flow Description

    1. Extracts the Job ID, Event ID, and retry configuration parameters.

    2. Initializes the Arcanna API client.

    3. Enters a retry loop, polling the Arcanna API for the event status.

    4. If the status is 'pending_inference', it waits for the configured duration
    and retries.

    5. If the status is 'OK', it retrieves the decision and adds it to the action's
    JSON result.

    6. If the status is 'ERROR' or the retry limit is reached without a decision,
    the action fails.


    ### Additional Notes

    The action uses a configurable retry mechanism to wait for the AI model to finish
    inference. Ensure the retry count and seconds per retry are configured appropriately
    based on the expected inference time.
  ai_short_description: >-
    Retrieves the AI decision for a specific event from Arcanna.ai, utilizing a retry
    mechanism to wait for pending inferences.
