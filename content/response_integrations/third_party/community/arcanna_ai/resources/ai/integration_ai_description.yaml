  reasoning: >-
    The Arcanna.ai integration is a decision intelligence platform designed to augment
    Security Operations Center (SOC) analysts by using AI models to predict decisions
    and automate complex tasks. Its primary functions involve sending case and alert
    data to the Arcanna platform for AI processing, retrieving AI-generated decisions,
    and triggering model training. It also includes a utility action to update alert
    priority within the SOAR platform. The integration does not perform log searching,
    IOC enrichment, host containment, network blocking, email management, identity
    management, cloud resource management, ticketing, vulnerability scanning, asset
    inventory, or collaboration/messaging. As it acts as an AI layer on top of existing
    security tools rather than fulfilling the core functions of the defined categories,
    it does not align with any of the provided product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
