product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Arcanna.ai integration is a decision intelligence platform designed to augment
    SOC analysts by providing AI-driven decisions on alerts and cases. It does not
    perform log analysis or IOC correlation (SIEM), host-level investigation (EDR),
    network traffic blocking (Network Security), indicator reputation enrichment (Threat
    Intelligence), email management (Email Security), identity management (IAM), cloud
    resource management (Cloud Security), ticketing (ITSM), vulnerability management
    (Vulnerability Management), asset inventory management (Asset Inventory), or collaboration/notification
    (Collaboration). While the integration includes an action to update alert priority
    within the SOAR platform, this is an internal utility action and does not align
    with the specific functional categories provided. Consequently, none of the product
    categories are applicable.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
