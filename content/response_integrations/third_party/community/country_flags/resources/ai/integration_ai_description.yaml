  reasoning: >-
    The 'country_flags' integration provides a utility to retrieve country flag images
    based on country codes. It does not perform functions related to SIEM (log analysis),
    EDR (host investigation), Network Security (traffic blocking/analysis), Threat
    Intelligence (reputation/malware analysis), Email Security (phishing/inbox management),
    IAM (identity management), Cloud Security (cloud resource management), ITSM (ticketing),
    Vulnerability Management (patch/CVE analysis), or Collaboration (human-in-the-loop/notifications).
    While the 'Get Country Flag' action is tagged as 'enrich_asset' in the action
    metadata, this refers to adding visual context to an entity, which does not align
    with the 'Asset Inventory' category definition requiring the retrieval of asset
    ownership, department, business criticality, or IT management status. Therefore,
    the integration does not fit into any of the defined product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
