Get Country Flag:
  ai_description: >-
    ### General Description

    The **Get Country Flag** action retrieves a country's flag image in Base64 format.
    It is designed to provide visual context for geographic data by converting 2-digit
    ISO country codes (e.g., 'US', 'FR') into encoded image strings. The action can
    process country codes provided manually as a parameter or dynamically extracted
    from the `additional_properties` of entities within a case. It utilizes an external
    service (`countryflags.io`) to fetch flags and maintains a local cache file (`flags.json`)
    to optimize performance and reduce redundant API calls.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Country Code Two Digit** | String | No | A manual 2-digit ISO country code
    (e.g., 'us', 'gb') to fetch a flag for. |

    | **Country Code From Entity Field** | String | No | A comma-separated list of
    field names to look for in the `additional_properties` of entities. If found,
    the value of that field is used as the country code. |


    ### Additional Notes

    - If neither parameter is provided, the action will not perform any lookups.

    - The action maintains a local cache file named `flags.json` in the execution
    folder to store previously fetched flags.

    - The results are returned as a JSON object mapping the identifier (entity or
    country code) to the Base64 string.


    ### Flow Description

    1. **Initialization**: The action initializes and attempts to load the `flags.json`
    cache file from the local execution environment.

    2. **Parameter Retrieval**: It retrieves the manual `Country Code Two Digit` and
    the list of entity fields to check from `Country Code From Entity Field`.

    3. **Entity Processing**: For each entity in the case, the action checks if any
    of the specified fields exist in the entity's `additional_properties`. If a country
    code is found, it proceeds to fetch the flag.

    4. **Flag Retrieval**: For each identified country code (from entities or manual
    input), the action checks the local cache. If the flag is missing, it performs
    a GET request to `https://www.countryflags.io/`, encodes the resulting image to
    Base64, and updates the cache.

    5. **Cache Update**: If new flags were fetched, the action overwrites the local
    `flags.json` file with the updated data.

    6. **Output**: The action attaches the Base64 flag data to the action's JSON results
    and completes the execution.
