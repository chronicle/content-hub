Get Country Flag:
  ai_description: >-
    ### General Description

    Retrieves the national flag of a specified country as a base64-encoded string.
    It can fetch flags based on a direct country code input or by extracting country
    codes from the additional properties of target entities.


    ### Flow Description

    1. Reads a local cache file (`flags.json`) to check for previously fetched flags.

    2. Iterates through target entities to extract country codes from specified fields
    in their `additional_properties`.

    3. If a country code is found and not cached, makes an HTTP GET request to `countryflags.io`
    to download the flag image.

    4. Converts the downloaded image to a base64-encoded string.

    5. Processes any directly provided country code parameter in the same manner.

    6. Aggregates the base64 strings into a JSON result object.

    7. Updates the local cache file with any newly fetched flags.


    ### Additional Notes

    The action relies on the external service `countryflags.io` for fetching new flags.
    It uses local file caching to optimize repeated requests.
  ai_short_description: >-
    Retrieves a country's flag as a base64-encoded string by querying countryflags.io,
    using either a directly provided country code or extracting it from the additional
    properties of target entities.
  capabilities:
