Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Country Flags service by attempting to retrieve the
    flag for a hardcoded country code ('us'). This action is primarily used to verify
    that the integration is correctly configured and can reach the external API.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This is a standard 'Ping' action. It utilizes a local cache file (`flags.json`)
    to store retrieved flag data in base64 format to optimize subsequent requests.
    It does not process any entities from the case.


    ### Flow Description

    1. **Initialize Action**: Sets up the Siemplify action context and identifies
    the script as 'GetCountryFlag'.

    2. **Load Cache**: Attempts to read the `flags.json` file from the execution folder
    to retrieve previously cached flags. If the file is missing or invalid, it initializes
    an empty cache.

    3. **Connectivity Test**: Uses a hardcoded country code ('us') to check for a
    flag.

    4. **External Request**: If the flag for 'us' is not in the cache, it performs
    a GET request to the Country Flags API (https://www.countryflags.io/us/flat/64.png).

    5. **Finalize**: Returns a success status if the flag data is retrieved or found
    in the cache; otherwise, it terminates with a failure state.
