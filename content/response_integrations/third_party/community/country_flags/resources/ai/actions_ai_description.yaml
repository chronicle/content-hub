Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with the Country Flags product by attempting to retrieve the
    flag for a hardcoded country code ("us").


    ### Flow Description

    1. Attempts to read a local cache file (`flags.json`) containing previously fetched
    flags.

    2. Checks if the flag for the United States ("us") is present in the cache.

    3. If not found, makes an HTTP GET request to the Country Flags API (`https://www.countryflags.io/us/flat/64.png`)
    to fetch the flag image.

    4. Base64 encodes the retrieved image and updates the cache data in memory.

    5. Returns a successful execution state if the flag is successfully retrieved.


    ### Additional Notes

    This action is primarily used as a ping/connectivity test for the Country Flags
    integration. It does not take any parameters and uses a hardcoded country code
    for the test.
