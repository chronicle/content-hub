    reasoning: >-
      The action makes an HTTP GET request to 'countryflags.io' to fetch flag images,
      meaning it fetches data. It does not perform any state-changing operations (POST/PUT/DELETE)
      on external systems. Internally, it only adds a JSON result to the action execution;
      it does not call methods to update entities, create insights, modify alert data,
      or create case comments.
