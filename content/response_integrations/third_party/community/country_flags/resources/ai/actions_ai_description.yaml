  ai_description: >-
    ### General Description

    This action retrieves a country flag image (in base64 format) from `countryflags.io`
    or a local cache file. It is designed to enrich entities with visual context by
    extracting a country code from an entity's additional properties or using a provided
    country code parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Country Code Two Digit | string | No | The 2-digit country code (e.g., "us")
    to fetch the flag for. |

    | Country Code From Entity Field | string | No | The name of the field in the
    entity's additional properties that contains the country code. If provided, the
    action will extract the code from the entity and fetch the corresponding flag.
    |


    ### Additional Notes

    Either the `Country Code Two Digit` parameter or the `Country Code From Entity
    Field` parameter should be configured for the action to perform its task. If both
    are provided, the action will process both.


    ### Flow Description

    1. **Initialization**: The action initializes by attempting to load a local cache
    file (`flags.json`) containing previously fetched flags.

    2. **Entity Processing**: If `Country Code From Entity Field` is provided, the
    action iterates through all target entities. For each entity, it checks the specified
    field in `additional_properties` to extract the country code.

    3. **Flag Retrieval**: For each identified country code (either from the parameter
    or the entity), the action checks the local cache. If the flag is not in the cache,
    it performs an HTTP GET request to `countryflags.io` to download the flag image.

    4. **Caching**: The downloaded flag is base64-encoded and stored in the local
    cache.

    5. **Result Generation**: The action adds the base64-encoded flag data to the
    result JSON.

    6. **Cache Update**: If any new flags were fetched, the action updates the local
    cache file.
