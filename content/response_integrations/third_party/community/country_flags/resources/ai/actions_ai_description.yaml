  ai_description: >-
    ### General Description

    The **Get Country Flag** action retrieves a base64-encoded string representing
    a country's flag image from an external service. It is designed to provide visual
    context for entities or specific country codes within a playbook. The action supports
    extracting country codes from entity properties or via direct manual input and
    utilizes a local caching mechanism to minimize external API calls.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Country Code Two Digit | String | No | A specific 2-digit ISO country code (e.g.,
    'us', 'uk') to fetch the flag for. |

    | Country Code From Entity Field | String | No | A comma-separated list of field
    names to look for in the `additional_properties` of the target entities. The action
    will extract the country code from the first matching field found. |


    ### Additional Notes

    - At least one of the parameters should be provided for the action to return meaningful
    data.

    - The action returns the base64 data in the `JsonResult` but does not update the
    entity attributes or create insights automatically.


    ### Flow Description

    1. **Cache Loading**: The action attempts to read a local `flags.json` file from
    the execution environment to retrieve previously cached flag data.

    2. **Entity Analysis**: If `Country Code From Entity Field` is specified, the
    action iterates through all target entities and checks their `additional_properties`
    for the provided keys to find a country code.

    3. **Manual Input**: If `Country Code Two Digit` is provided, the action adds
    this code to the processing queue.

    4. **External Retrieval**: For each unique country code found (and not present
    in the cache), the action sends a GET request to `countryflags.io` to fetch the
    flag image.

    5. **Base64 Encoding**: The fetched image content is converted into a base64-encoded
    string.

    6. **Result Mapping**: The base64 strings are mapped to their respective entity
    identifiers or country codes in the final JSON output.

    7. **Cache Persistence**: If new flags were fetched, the local cache file is updated
    with the new data for future executions.
