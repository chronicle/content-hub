  ai_description: >-
    Fetches a country's flag image from countryflags.io based on a country code and
    returns it as a base64 encoded string.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Country Code Two Digit | String | No | The 2-digit country code (e.g., 'us')
    to fetch the flag for. |

    | Country Code From Entity Field | String | No | A comma-separated list of entity
    additional property fields to extract the country code from. |


    ### Additional Notes

    Either `Country Code Two Digit` or `Country Code From Entity Field` should be
    provided to fetch flags.


    ### Flow

    1. Reads a local cache file to check for previously fetched flags.

    2. Iterates over target entities and extracts country codes from the specified
    additional properties fields.

    3. Fetches the flag image from countryflags.io for any new country codes and encodes
    it in base64.

    4. Processes the explicitly provided country code parameter.

    5. Returns the base64 encoded flags in the action's JSON result and updates the
    local cache.
