List My Tasks:
  ai_description: >-
    ### General Description

    Lists all tasks associated with a specific user within a designated Asana workspace.
    This action allows analysts to retrieve task details, including names, due dates,
    and permalinks, filtered by their completion status. It is primarily used for
    visibility into user workloads or tracking project-related tasks during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User's Email | String | Yes | The email address of the Asana user whose tasks
    you want to retrieve. |

    | Workspace Name | String | Yes | The case-sensitive name of the Asana workspace
    to search within. |

    | Completed Status | Boolean | No | If set to `true`, the action retrieves only
    tasks marked as completed. If `false` (default), it retrieves only incomplete
    tasks. |


    ### Additional Notes

    This action does not run on entities; it relies entirely on the provided input
    parameters to query the Asana API. It performs multiple sequential API calls to
    resolve human-readable names (Email, Workspace Name) into Asana Global Identifiers
    (GIDs) before fetching task data.


    ### Flow Description

    1. **Authentication**: Initializes the Asana manager using the configured Personal
    Access Token and Base URL.

    2. **User Resolution**: Calls the Asana API to retrieve the unique `GID` for the
    user based on the provided `User's Email`.

    3. **Workspace Resolution**: Retrieves all workspaces for the authenticated user
    and matches the `Workspace Name` to find the corresponding `Workspace GID`.

    4. **Task List Retrieval**: Fetches the specific `User Task List ID` associated
    with the identified User and Workspace.

    5. **Task Fetching**: Retrieves the list of tasks from the user's task list.

    6. **Detail Enrichment & Filtering**: For each task found, the action fetches
    full task details to check the `completed` attribute against the `Completed Status`
    parameter.

    7. **Output Generation**: Adds the filtered task details to the JSON result and
    generates clickable permalinks for each task in the Google SecOps UI.
