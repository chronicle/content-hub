  ai_description: >-
    Updates an existing task in Asana by modifying its assignee, due date, or description.
    The action first resolves the provided assignee email to a unique Asana user ID
    and then submits a PUT request to the Asana API to apply the changes to the specified
    task.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Asana API Token and Base URL from
    the integration settings.

    2. **Parameter Extraction:** Collects the Task ID, Assignee email, Due Date, and
    Description from the action input.

    3. **User Resolution:** Calls the Asana API to convert the provided Assignee email
    into a Global Identifier (GID).

    4. **Task Update:** Executes a PUT request to the Asana `/tasks/{task_id}` endpoint
    with the updated metadata.

    5. **Result Processing:** Returns the updated task object as a JSON result and
    provides a success message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task ID | string | True | The unique identifier of the task, found in the Asana
    URL. |

    | Due Date | string | False | The new deadline for the task in YYYY-MM-DD format.
    |

    | Description | string | False | The updated notes or description for the task.
    |

    | Assignee | string | False | The email address of the user to whom the task should
    be re-assigned. Note: This is case-sensitive. |


    ### Additional Notes

    - This action does not process SecOps entities; it operates strictly based on
    the provided parameters.

    - If the Assignee email is provided, the action will attempt to resolve it to
    a GID before updating the task.
