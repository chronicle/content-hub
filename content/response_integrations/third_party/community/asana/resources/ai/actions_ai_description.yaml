  ai_description: >-
    ### General Description

    Adds a user to a specific Asana workspace. This action facilitates user management
    by programmatically adding a user to a designated workspace within the Asana platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Workspace Name | string | Yes | The name of the workspace to which you want
    to add the user. Note: It is case sensitive! |

    | User's Email | string | Yes | The email address of the user you want to add.
    |


    ### Additional Notes

    - The action requires a valid Asana API token and base URL configured in the integration
    settings.

    - The workspace name is case-sensitive.


    ### Flow Description

    1. Extracts configuration parameters (Token, Base URL) and action parameters (Workspace
    Name, User's Email).

    2. Initializes the Asana manager with the provided credentials.

    3. Retrieves the workspace ID by searching for the provided workspace name.

    4. Sends a POST request to add the specified user to the identified workspace.

    5. Returns the operation result and adds the JSON result to the action.
