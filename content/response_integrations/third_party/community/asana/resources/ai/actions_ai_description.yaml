Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Asana instance. It ensures that the provided API Token and
    Base URL are correct and that the service is reachable.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the 'Token' and 'Base URL'
    from the integration's configuration settings.

    2. **Manager Initialization**: It initializes the `AsanaManager` with the retrieved
    credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the Asana `/users/me` endpoint.

    4. **Result Handling**: If the API returns a successful response, the action concludes
    with a success message. If the request fails or returns an error, it reports a
    connection failure.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (Token and Base URL).
