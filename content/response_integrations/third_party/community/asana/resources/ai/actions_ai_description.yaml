Add User To Workspace:
  ai_description: >-
    This action adds a user to a specific Asana workspace using their email address.
    It first resolves the workspace name to a workspace ID and then performs a POST
    request to the Asana API to associate the user with that workspace.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the 'Workspace Name' and 'User's
    Email' from the action parameters.

    2. **Workspace ID Retrieval:** It calls the Asana API to list all workspaces and
    searches for the one matching the provided name to obtain its unique identifier
    (GID).

    3. **User Addition:** It sends a POST request to the Asana endpoint `/workspaces/{workspace_id}/addUser`,
    passing the user's email in the request body.

    4. **Result Processing:** The action captures the API response, adds it as a JSON
    result to the SOAR case, and provides a success or failure message based on the
    response data.


    ### Parameters Description:

    | Parameter Name | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | Workspace Name | The name of the Asana workspace to which the user will be added.
    Note: This is case-sensitive. | String | Yes | Your Workspace Name |

    | User's Email | The email address of the user to be added to the workspace. |
    String | Yes | email@gmail.com |


    ### Additional Notes:

    - This action does not process entities from the SOAR case; it relies entirely
    on the provided input parameters.

    - The workspace name must match exactly (including case) as it appears in Asana.
  capabilities:
