  ai_description: >-
    Updates an existing task in Asana with new details such as assignee, due date,
    and description.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Task ID | string | Yes | The ID of the task to update. Can be found in the Asana
    task URL. |

    | Due Date | string | No | The new due date for the task, formatted as YYYY-MM-DD.
    |

    | Description | string | No | The new description or notes for the task. |

    | Assignee | string | No | The email address of the user to whom the task should
    be re-assigned. Note: This is case-sensitive. |


    ### Flow

    1. Extracts the provided parameters, including the Task ID and any optional fields
    to update.

    2. Retrieves the internal Asana user ID for the provided Assignee email address.

    3. Sends a request to Asana to update the specified task with the new assignee,
    due date, and description.

    4. Returns the updated task information as a JSON result and completes the action.
