    the task's unique identifier.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task ID | string | Yes | The unique identifier of the task to update. Can be
    found in the Asana task URL. |

    | Due Date | string | No | The new due date for the task in YYYY-MM-DD format.
    |

    | Description | string | No | The new description for the task. |

    | Assignee | string | No | The email address of the user to whom the task should
    be re-assigned. |


    ### Additional Notes

    - The `Assignee` parameter is case-sensitive.

    - The action requires a valid Personal Access Token (PAT) configured in the integration
    settings.


    ### Flow Description

    1. The action extracts the required configuration parameters (Token, Base URL)
    and action parameters (Task ID, Assignee, Due Date, Description).

    2. An `AsanaManager` instance is initialized to handle communication with the
    Asana API.

    3. If an assignee email is provided, the action resolves the email to a user ID
    using the Asana API.

    4. The action performs a `PUT` request to the Asana API to update the specified
    task with the provided details (assignee, due date, and description).

    5. The updated task information is returned as a JSON result, and the action concludes
    with a success message.
