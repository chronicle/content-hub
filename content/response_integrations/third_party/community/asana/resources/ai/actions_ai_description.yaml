    Retrieves a list of tasks associated with a specific user in an Asana workspace.
    The action allows filtering the tasks based on their completion status and returns
    the task details along with direct links to the tasks.


    ### Flow Description

    1. Extracts the user's email, workspace name, and completed status filter from
    the action parameters.

    2. Queries the Asana API to retrieve the user ID based on the provided email.

    3. Queries the Asana API to retrieve the workspace ID based on the provided workspace
    name.

    4. Fetches the user's task list ID using the retrieved user and workspace IDs
    via the Asana API.

    5. Retrieves all tasks from the user's task list.

    6. Iterates through the tasks, fetching detailed information for each via the
    Asana API.

    7. Filters the tasks based on the provided completed status.

    8. Returns the filtered tasks as a JSON result and attaches links to the tasks
    in the action results.


