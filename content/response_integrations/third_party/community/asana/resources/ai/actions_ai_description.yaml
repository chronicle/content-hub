    ### General Description

    Retrieves a list of tasks associated with a specific project in Asana. This action
    allows users to fetch task details and optionally filter them based on whether
    they have been completed.


    ### Flow Description

    1. Initializes the Asana manager using the provided API token and base URL.

    2. Makes a GET request to the Asana API to fetch the project ID corresponding
    to the provided `Project Name`.

    3. Makes a GET request to retrieve all tasks associated with the identified project
    ID.

    4. Iterates through the retrieved tasks and makes a GET request for each task
    to fetch its full details.

    5. Filters the tasks based on the `Completed Status` parameter.

    6. Compiles the matching tasks into a JSON result and attaches direct URLs to
    the tasks as links in the SecOps platform.


