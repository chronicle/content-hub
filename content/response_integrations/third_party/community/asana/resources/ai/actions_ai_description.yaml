  ai_description: >-
    ### General Description

    The **List My Tasks** action retrieves all tasks associated with a specific user
    within a designated Asana workspace. This action is useful for tracking user productivity,
    auditing task assignments, or gathering context on a user's current workload during
    a security investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User's Email | string | True | The email address of the Asana user whose tasks
    you want to retrieve. |

    | Workspace Name | string | True | The exact name of the Asana workspace (case-sensitive).
    |

    | Completed Status | boolean | False | If set to `true`, the action will only
    return tasks that have been marked as completed. If `false` (default), it returns
    incomplete tasks. |


    ### Additional Notes

    - The `Workspace Name` parameter is case-sensitive and must match the name in
    Asana exactly.

    - The action provides direct URLs to the tasks in the SOAR interface for quick
    access.

    - If no tasks are found for the user, the action will complete with a "False"
    result.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the user's email, workspace
    name, and completion status filter from the input parameters.

    2. **User Identification:** It queries the Asana API to find the unique `gid`
    (Global ID) for the user based on the provided email.

    3. **Workspace Identification:** It fetches all workspaces available to the authenticated
    token and matches the provided `Workspace Name` to find the corresponding `workspace_id`.

    4. **Task List Retrieval:** It identifies the specific "User Task List" ID for
    that user within the identified workspace.

    5. **Task Fetching:** The action retrieves the list of tasks from the user's task
    list.

    6. **Detail Enrichment & Filtering:** For each task, it fetches full details (including
    completion status and due dates) and filters them based on the `Completed Status`
    parameter.

    7. **Result Compilation:** It compiles the task names, details, and permalinks
    into a JSON result and adds clickable links to the SOAR action output.
