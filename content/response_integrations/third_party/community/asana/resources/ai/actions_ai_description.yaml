Update Task:
  ai_description: >-
    Updates an existing task in Asana with new details such as the assignee, due date,
    and description. The action first resolves the provided assignee email to a unique
    Asana user ID and then submits a PUT request to the Asana API to modify the specified
    task.


    ### Flow Description:

    1. **Credential Retrieval:** Extracts the Asana API Token and Base URL from the
    integration configuration.

    2. **Parameter Extraction:** Retrieves the Task ID, Assignee email, Due Date,
    and Description from the action parameters.

    3. **User Resolution:** Calls the Asana API to convert the provided assignee email
    into a GID (Global Identifier).

    4. **Task Update:** Executes a PUT request to the Asana `/tasks/{task_id}` endpoint
    with the updated fields.

    5. **Result Processing:** Returns the updated task metadata as a JSON result and
    provides a success message.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task ID | string | True | The unique identifier of the task, found in the Asana
    URL. |

    | Due Date | string | False | The new deadline for the task in YYYY-MM-DD format.
    |

    | Description | string | False | The updated notes or description for the task.
    |

    | Assignee | string | False | The email address of the user to whom the task should
    be re-assigned. Note: This is case-sensitive. |


    ### Additional Notes:

    - If the Assignee parameter is provided, the action will attempt to resolve the
    email to a user ID. If the email is not found, the action may fail depending on
    the API response.

    - This action modifies data in an external system (Asana).
