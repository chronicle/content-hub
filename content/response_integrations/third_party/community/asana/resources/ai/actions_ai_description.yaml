Create Task:
  ai_description: >-
    Creates a new task within a specified Asana project. This action allows users
    to programmatically generate tasks, assign them to specific users, and set due
    dates and descriptions directly from Google SecOps.


    ### Flow Description:

    1. **Project Identification:** The action retrieves the unique identifier (GID)
    for the project using the provided 'Project Name'.

    2. **User Identification (Optional):** If an 'Assignee' is specified, the action
    fetches the corresponding user's GID based on their email or identifier.

    3. **Task Creation:** A POST request is sent to Asana to create the task with
    the provided subject, description, assignee, and due date.

    4. **Result Handling:** Upon success, the action provides a direct permalink to
    the new Asana task and attaches the full JSON response.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task Subject | string | true | The title/subject of the new Asana task. |

    | Assignee | string | false | The email or identifier of the user to assign the
    task to (case-sensitive). |

    | Due Date | string | false | The deadline for the task in YYYY-MM-DD format.
    |

    | Description | string | true | Detailed notes or description for the task. |

    | Project Name | string | true | The exact name of the Asana project where the
    task will be created. |


    ### Additional Notes:

    - The 'Project Name' and 'Assignee' fields are case-sensitive.

    - If the project name is not found, the action will fail to retrieve a project
    ID and the task creation will not proceed.
