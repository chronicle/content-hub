    1. Extracts configuration and action parameters.

    2. Retrieves the project ID from Asana using the provided Project Name.

    3. If an Assignee is provided, retrieves the user ID from Asana.

    4. Creates the task in Asana with the provided details.

    5. Adds a link to the created task and the JSON result to the action.


    ### Additional Notes

    There are no additional notes for this action.
