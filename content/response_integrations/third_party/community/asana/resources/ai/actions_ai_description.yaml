Get Task:
  ai_description: >-
    ### General Description

    Retrieves the details of a specific task from Asana using its Task ID. This action
    fetches the task's metadata, such as its name, due date, and permalink, and attaches
    it to the action's results.


    ### Flow Description

    1. Extracts the `Task ID` parameter provided by the user.

    2. Initializes the Asana API client using the configured Personal Access Token
    and Base URL.

    3. Makes a GET request to the Asana API (`/tasks/{task_id}`) to retrieve the task
    details.

    4. If the task is found, adds a direct link to the task in the SecOps platform
    and attaches the full task details as a JSON result.

    5. Returns a success or failure message based on whether the task data was retrieved.


    ### Additional Notes

    The task ID can be found in the Asana URL: `https://app.asana.com/0/{your_project_ID}/{your_task_ID}`.
    Note that the script's success message may incorrectly state the task was "updated",
    but this action only performs a read operation.
  ai_short_description: >-
    Retrieves the details of a specific task from Asana using its Task ID.
