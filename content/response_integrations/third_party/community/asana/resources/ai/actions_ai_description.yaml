  ai_description: >-
    ### General Description

    Adds a user to a specific Asana workspace using their email address. This action
    is designed to manage workspace membership by programmatically inviting or adding
    users to an organization's workspace environment.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Workspace Name | string | Yes | The name of the Asana workspace to which the
    user will be added. Note: This parameter is case-sensitive. |

    | User's Email | string | Yes | The email address of the user to be added to the
    specified workspace. |


    ### Additional Notes

    This action does not operate on SecOps entities. It relies entirely on the provided
    action parameters to identify the target workspace and the user. Ensure the 'Workspace
    Name' matches exactly as it appears in Asana.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Asana API Token and Base URL from
    the integration settings.

    2. **Parameter Extraction**: Retrieves the target 'Workspace Name' and the 'User's
    Email' from the action inputs.

    3. **Workspace Identification**: Queries the Asana API to list all workspaces
    and identifies the unique Workspace GID (Global ID) corresponding to the provided
    name.

    4. **User Addition**: Executes a POST request to the Asana workspace's `addUser`
    endpoint, passing the user's email address.

    5. **Result Processing**: Evaluates the API response to confirm if the user was
    successfully added and outputs the resulting JSON data to the action results.
