Add User To Workspace:
  ai_description: >-
    ### General Description

    Adds a specified user to a designated workspace within Asana. This action modifies
    the external system state by granting the user access to the workspace.


    ### Flow Description

    1. Extracts the target workspace name and user email from the action parameters.

    2. Queries the Asana API (GET `/workspaces`) to resolve the workspace name to
    its corresponding workspace ID.

    3. Executes an API call (POST `/workspaces/{workspace_id}/addUser`) to add the
    user to the resolved workspace.

    4. Returns the added user's details as a JSON result and outputs a success or
    failure message.


    ### Additional Notes

    - The workspace name parameter is case-sensitive.
  ai_short_description: >-
    Adds a specified user to a designated workspace within Asana.
