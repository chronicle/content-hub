  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Asana instance. It ensures that the provided Personal Access
    Token (PAT) and Base URL are correct and that the network path to the Asana API
    is open. This action is typically used during the initial setup of the integration
    or for troubleshooting communication issues.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Token` and `Base URL`
    from the integration's configuration settings.

    2. **Manager Initialization**: It initializes the `AsanaManager` with the extracted
    credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a `GET` request to the `/users/me` endpoint of the Asana API.

    4. **Result Evaluation**: If the API returns a successful response (HTTP 200)
    and valid JSON, the action concludes with a success message. Otherwise, it returns
    a failure.


    ### Parameters Description

    There are no specific action parameters for this action. It relies entirely on
    the global integration configuration (Token and Base URL).


    ### Additional Notes

    * This action does not process any entities.

    * It is a read-only operation that does not modify any data in Asana or Google
    SecOps.
