  ai_description: >-
    ### General Description

    The "List My Tasks" action retrieves all tasks associated with a specific user
    in Asana. It fetches task details based on the user's email and workspace name,
    and can optionally filter the results to show only completed tasks. The action
    outputs the retrieved tasks as a JSON result and provides direct links to the
    tasks in the action results.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | User's Email | String | Yes | The email of the user you would like to retrieve
    tasks for in Asana. This is used to find the user's ID. |

    | Workspace Name | String | Yes | The workspace name (case sensitive). This is
    used to find the workspace ID. |

    | Completed Status | Boolean | No | Marking the checkbox (true) will retrieve
    only the tasks that were completed by the user. If false, it retrieves incomplete
    tasks. |


    ### Flow Description

    1. Extracts the configuration parameters (Token, Base URL) and action parameters
    (User's Email, Workspace Name, Completed Status).

    2. Initializes the `AsanaManager` to interact with the Asana API.

    3. Retrieves the user ID from Asana using the provided `User's Email`.

    4. Retrieves the workspace ID from Asana using the provided `Workspace Name`.

    5. Fetches the user's tasks list ID using the retrieved user ID and workspace
    ID.

    6. Retrieves all tasks from the user's tasks list.

    7. Iterates through each task, fetching its detailed information.

    8. Filters the tasks based on the `Completed Status` parameter.

    9. Adds the filtered tasks to the JSON result and appends direct links to the
    tasks in the action's output.

    10. Returns a success message if tasks were found, or a failure message if no
    tasks were associated with the user.
