Remove User From Workspace:
  ai_description: >-
    Removes a specific user from an Asana workspace using their email address. This
    action first resolves the workspace name to a unique workspace ID and then performs
    a removal operation via the Asana API.


    ### Flow Description:

    1. **Configuration Retrieval**: Extracts the Asana API token and base URL from
    the integration settings.

    2. **Parameter Extraction**: Retrieves the target workspace name and the email
    address of the user to be removed from the action parameters.

    3. **Workspace Resolution**: Calls the Asana API to list all workspaces and identifies
    the specific `workspace_id` matching the provided name (case-sensitive).

    4. **User Removal**: Sends a POST request to the Asana `/workspaces/{workspace_id}/removeUser`
    endpoint with the user's email.

    5. **Result Handling**: Validates the API response to confirm if the user was
    successfully removed and provides a status message to the Google SecOps case.


    ### Parameters Description:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Workspace Name | String | Yes | The exact name of the Asana workspace from which
    the user should be removed. Note: This is case-sensitive. |

    | User's Email | String | Yes | The email address of the Asana user to be removed
    from the workspace. |


    ### Additional Notes:

    - This action does not run on entities; it uses the provided email address parameter
    directly.

    - If the workspace name is not found or the API call fails, the action will return
    a failure status.
