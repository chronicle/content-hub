Create Task:
  ai_description: >-
    ### General Description

    Creates a new task in a specific Asana project.


    ### Flow Description

    1. Extracts the provided parameters including project name, task subject, description,
    assignee, and due date.

    2. Retrieves the project ID from Asana using the provided project name via a GET
    request.

    3. If an assignee is provided, retrieves the user ID from Asana via a GET request.

    4. Creates the task in Asana using a POST request with the gathered details.

    5. Returns the created task details as a JSON result and adds a link to the task
    in the action results.


    ### Additional Notes

    The project name and assignee email are case-sensitive.
