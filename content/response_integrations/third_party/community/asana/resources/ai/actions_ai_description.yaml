List Project Tasks:
  ai_description: >-
    Lists all tasks associated with a specific project in Asana. This action allows
    users to retrieve task details, including names and due dates, and provides direct
    links to the tasks within the Asana platform. It supports filtering tasks based
    on their completion status.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Project Name | String | Yes | The name of the project from which you would like
    to fetch all the tasks. |

    | Completed Status | Boolean | No | If set to true, the action retrieves only
    tasks that are marked as completed. If false, it retrieves only incomplete tasks.
    |


    ### Flow Description


    1.  **Authentication**: The action retrieves the API token and base URL from the
    integration configuration.

    2.  **Project Identification**: It calls the Asana API to find the unique ID associated
    with the provided 'Project Name'.

    3.  **Task Retrieval**: It fetches a list of all tasks belonging to the identified
    project.

    4.  **Detail Enrichment**: For each task found, the action performs a follow-up
    request to get full task details (e.g., completion status, due date, permalink).

    5.  **Filtering**: The action filters the detailed task list based on the 'Completed
    Status' parameter.

    6.  **Output Generation**: It populates the action results with a JSON object
    containing task details and adds clickable links for each task to the SOAR interface.


    ### Additional Notes


    *   This action does not run on entities; it operates based on the provided project
    name parameter.

    *   The 'Completed Status' parameter is a boolean toggle; ensure it is set correctly
    to see the desired subset of tasks.
