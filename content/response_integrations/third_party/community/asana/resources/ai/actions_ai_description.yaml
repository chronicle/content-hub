  ai_description: >-
    Creates a new task in Asana within a specified project. This action allows users
    to programmatically generate tasks, assign them to specific users, and set due
    dates and descriptions directly from Google SecOps.


    ### Flow Description

    1. **Retrieve Project ID**: The action first searches for the internal Asana GID
    (Global ID) associated with the provided 'Project Name'.

    2. **Retrieve Assignee ID (Optional)**: If an 'Assignee' email is provided, the
    action fetches the corresponding user's GID from Asana.

    3. **Create Task**: The action sends a POST request to Asana to create the task
    with the specified subject, description, project association, and optional assignee/due
    date.

    4. **Output Results**: Upon success, the action provides a direct link to the
    created task in the Asana UI and returns the full task object as JSON.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task Subject | string | True | The title/subject of the new task. |

    | Assignee | string | False | The email address of the user to whom the task will
    be assigned. Note: This is case-sensitive. |

    | Due Date | string | False | The deadline for the task in YYYY-MM-DD format.
    |

    | Description | string | True | Detailed notes or description for the task. |

    | Project Name | string | True | The name of the Asana project where the task
    should be created. Note: This is case-sensitive. |


    ### Additional Notes

    - The action requires a valid Personal Access Token (PAT) and Base URL configured
    in the Asana integration settings.

    - If the project name or assignee email cannot be found, the action will fail.
