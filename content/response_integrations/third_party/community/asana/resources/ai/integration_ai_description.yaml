product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: true
  network_security: false
  reasoning: >-
    The Asana integration is primarily used for task and project management, which
    aligns with the ITSM category as it allows for the creation and updating of tasks
    (tickets) to document investigations and assign work. Additionally, the integration
    provides capabilities to manage user memberships within workspaces (Add/Remove
    User), which falls under the IAM & Identity Management category. It does not perform
    security-specific functions like SIEM log analysis, EDR host containment, network
    security blocking, threat intelligence enrichment, email security, cloud security,
    vulnerability management, or asset inventory. While it is a collaboration tool,
    it does not fit the specific SOAR definition of 'Collaboration' (which focuses
    on real-time communication and human-in-the-loop approval via platforms like Slack
    or Teams), so that category is marked false.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
