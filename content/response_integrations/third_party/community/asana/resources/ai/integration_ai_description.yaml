product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: true
  network_security: false
  reasoning: >-
    The Asana integration provides capabilities for task management and user access
    control. It qualifies for 'IAM & Identity Management' because it includes actions
    like 'Add User To Workspace' and 'Remove User From Workspace', which allow for
    the management of user access and membership within the platform. It qualifies
    for 'ITSM' because it includes actions like 'Create Task' and 'Update Task', which
    are functionally equivalent to creating and updating tickets or assigning tasks
    to teams for investigation and remediation. It does not qualify for 'Collaboration'
    as defined in the context, which focuses on real-time communication platforms
    like Slack/Teams for SOC notifications and human-in-the-loop approvals, whereas
    Asana is a project/task management tool. It does not match other categories such
    as SIEM, EDR, Network Security, Threat Intelligence, Email Security, Cloud Security,
    Vulnerability Management, or Asset Inventory, as it does not interact with security
    logs, endpoints, network infrastructure, threat feeds, email systems, cloud resources,
    or vulnerability scanners.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
