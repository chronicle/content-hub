  reasoning: >-
    The Azure DevOps integration provides capabilities for CI/CD pipeline management
    (triggering builds) and workflow orchestration (connectivity checks, waiting for
    resources). The provided actions ('Ping', 'Trigger Azure Build', 'Wait Until Web
    Resource Is Up') are focused on automation and orchestration rather than security-specific
    functions. It does not perform threat enrichment, incident response, identity
    management, or security-focused asset/vulnerability management. While Azure DevOps
    can be used for project management (which could overlap with ITSM), the specific
    actions provided in this integration do not include ticket creation or management
    capabilities. Therefore, the integration does not align with any of the defined
    security product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
