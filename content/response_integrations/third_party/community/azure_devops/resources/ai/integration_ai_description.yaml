  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The azure_devops integration is designed for CI/CD pipeline management, specifically
    enabling users to trigger builds and monitor their status. Reviewing the provided
    actions (Ping, Trigger Azure Build, Wait Until Web Resource Is Up), none of them
    align with the security-focused categories defined in the schema. It does not
    perform SIEM, EDR, Network Security, or Threat Intelligence functions. It does
    not manage email, identity, or cloud infrastructure security configurations. While
    Azure DevOps includes project management features that could theoretically overlap
    with ITSM, the specific actions provided do not include ticket creation or task
    assignment capabilities. It does not function as an asset inventory tool or a
    collaboration platform for SOC workflows. Therefore, none of the defined product
    categories are applicable.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
