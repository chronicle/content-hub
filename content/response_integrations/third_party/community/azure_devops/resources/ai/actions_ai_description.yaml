  ai_description: >-
    ### General Description

    Tests connectivity to the Azure DevOps integration by attempting to retrieve the
    first page of projects.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration-level configuration parameters (Personal Access Token, Organization,
    Base URL).


    ### Flow Description

    1. Extracts the integration configuration parameters (Personal Access Token, Organization,
    Base URL).

    2. Initializes a connection to Azure DevOps using basic authentication.

    3. Attempts to fetch the first page of projects using the core client to verify
    connectivity.

    4. Returns a success message if the connection and request succeed, or an error
    message if it fails.
