  ai_description: >-
    ### General Description

    This action asynchronously checks if a specified web resource is accessible and
    responding. It acts as a polling mechanism, waiting until the target URL returns
    a successful HTTP response before completing the execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --------- | ---- | --------- | ----------- |

    | URL | String | Yes | The URL of the web resource to check. |


    ### Flow Description

    1. Extracts the provided `URL` parameter.

    2. Sends an HTTP GET request to the specified URL with a 5-second timeout.

    3. Evaluates the HTTP response.

    4. If the response is successful (HTTP OK), the action completes successfully.

    5. If the response fails or times out, the action returns an 'In Progress' state,
    allowing the SOAR platform to retry the action later (asynchronous polling).


    ### Additional Notes

    There are no additional notes for this action.
