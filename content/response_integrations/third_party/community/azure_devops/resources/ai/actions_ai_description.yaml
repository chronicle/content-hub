  ai_description: >-
    ### General Description

    Triggers an Azure DevOps pipeline build and monitors its status asynchronously.
    This action allows users to initiate automated workflows in Azure DevOps by providing
    a build definition ID and associated variables.


    ### Flow Description

    1. Extracts configuration parameters (Project, Organization, Token, Base URL)
    and action parameters (Build Definition ID, Build Variables).

    2. Sends a POST request to the Azure DevOps API to initiate the build.

    3. Returns the triggered build ID.

    4. Asynchronously polls the Azure DevOps API (via `query_job`) to check the build
    status until completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Build Definition Id | string | Yes | The build definition ID of the pipeline
    you want to trigger. |

    | Build Variables | code | Yes | The variables to pass for the given pipeline.
    |


    ### Additional Notes

    This action is asynchronous and will continue to run until the build is completed
    or failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: Triggers a new build in Azure DevOps.
