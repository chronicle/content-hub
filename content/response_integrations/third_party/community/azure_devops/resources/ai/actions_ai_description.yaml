Trigger Azure Build:
  ai_description: >-
    ### General Description

    Triggers a new build pipeline in Azure DevOps for a specified build definition
    ID and variables. The action initiates the build and asynchronously monitors its
    progress until completion.


    ### Flow Description

    1. Extracts the provided build definition ID and build variables from the action
    parameters.

    2. Makes a POST request to the Azure DevOps API (`_apis/build/builds`) to trigger
    the build pipeline.

    3. Asynchronously polls the Azure DevOps API via a GET request (`_apis/build/builds/{build_id}`)
    to check the status of the triggered build.

    4. Returns the build ID, status, and result upon completion or failure.


    ### Additional Notes

    This action runs asynchronously. It will continue to poll the Azure DevOps API
    until the build finishes (e.g., succeeded, failed, canceled) and will output the
    final status and result.
  ai_short_description: >-
    Triggers a new build pipeline in Azure DevOps using a specified build definition
    ID and variables, and asynchronously monitors its execution status.
