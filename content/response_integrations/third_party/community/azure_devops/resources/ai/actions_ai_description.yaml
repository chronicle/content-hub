Wait Until Web Resource Is Up:
  ai_description: >-
    ### General Description

    Checks the availability of a specified web resource by sending an HTTP GET request
    to the provided URL. This action operates asynchronously, meaning it will pause
    playbook execution and continue to poll the resource until it returns a successful
    response indicating the service is up.


    ### Flow Description

    1. Extracts the target URL from the action parameters.

    2. Sends an HTTP GET request to the specified URL with a 5-second timeout.

    3. Evaluates the HTTP response status code.

    4. If the response is successful (HTTP OK), the action completes successfully.

    5. If the response is unsuccessful or times out, the action returns an in-progress
    state, prompting the SOAR platform to retry the execution later.


    ### Additional Notes

    This is an asynchronous action designed to pause playbook execution until a specific
    web service or endpoint becomes available. It does not process entities.
  ai_short_description: >-
    Checks the availability of a specified web resource by sending an HTTP GET request
