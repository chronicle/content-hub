Ping:
  ai_description: >-
    ### General Description\nTests the connectivity between Google SecOps and the
    Azure DevOps instance. This action verifies that the provided credentials and
    configuration are valid by attempting to retrieve a list of projects from the
    specified organization.\n\n### Parameters Description\nThere are no action parameters
    for this action. It relies on the integration's configuration parameters (Personal
    Access Token, Organization, and Base URL).\n\n### Flow Description\n1. **Parameter
    Extraction**: Retrieves the Personal Access Token, Organization name, and Base
    URL from the integration configuration.\n2. **Authentication**: Initializes a
    basic authentication object using the Personal Access Token.\n3. **Connection
    Establishment**: Creates a connection to the Azure DevOps service using the provided
    Base URL and Organization.\n4. **Connectivity Test**: Calls the `get_projects`
    method from the core client to verify that the connection is functional and the
    credentials have sufficient permissions.\n5. **Result Reporting**: Returns a success
    status if the projects are retrieved successfully; otherwise, it reports a connection
    failure with the error details.\n\n### Additional Notes\nThis action does not
    interact with or process any entities within the case.
