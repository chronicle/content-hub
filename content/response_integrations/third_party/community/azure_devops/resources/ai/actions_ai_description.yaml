    update_identity: false
    update_ticket: false
  ai_description: >-
    This action polls a specified URL to check if a web resource is available (HTTP
    200 OK). It is designed to be used in asynchronous workflows where the system
    needs to wait for a service or endpoint to become reachable.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | URL | string | Yes | The URL of the web resource to check. |


    ### Flow Description

    1. Extract the `URL` parameter.

    2. Perform an HTTP GET request to the provided URL.

    3. Check if the response status is successful (HTTP 200-299).

    4. If successful, return `True` and set the execution state to `COMPLETED`.

    5. If unsuccessful, return `False` and set the execution state to `INPROGRESS`
    (triggering a retry/wait).


    ### Additional Notes

    This is an orchestration utility action used for workflow control. It does not
    perform enrichment or modify any system state.
