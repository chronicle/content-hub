Wait Until Web Resource Is Up:
  ai_description: "### General Description\nThis action monitors the availability\
    \ of a specific web resource by its URL. It functions as an asynchronous task,\
    \ meaning it will repeatedly check the status of the provided URL until it returns\
    \ a successful HTTP response (status code less than 400). This is typically used\
    \ in playbooks to ensure a service, API, or endpoint is fully operational before\
    \ proceeding to subsequent automation steps.\n\n### Parameters Description\n|\
    \ Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | URL | String | Yes | The full URL of the web resource to monitor (e.g., `https://dev.azure.com/organization`).\
    \ |\n\n### Flow Description\n1. **Parameter Extraction**: The action retrieves\
    \ the target `URL` from the input parameters.\n2. **Connectivity Check**: It performs\
    \ an HTTP GET request to the specified URL with a 5-second timeout.\n3. **Status\
    \ Evaluation**: The action evaluates the response. If the HTTP status code is\
    \ successful (less than 400), the resource is considered 'up'.\n4. **Execution\
    \ State Management**: \n    * If the resource is 'up', the action state is set\
    \ to `COMPLETED`.\n    * If the resource is 'down' or the request fails, the action\
    \ state is set to `IN_PROGRESS`. In an asynchronous context, this triggers the\
    \ SOAR platform to retry the action after a delay.\n\n### Additional Notes\nThis\
    \ action is a utility for flow control and does not modify any data within Azure\
    \ DevOps or the Google SecOps platform. It relies on basic HTTP reachability."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
