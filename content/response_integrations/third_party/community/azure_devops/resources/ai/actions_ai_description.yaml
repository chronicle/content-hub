  ai_description: >-
    ### General Description

    Triggers a specific build pipeline in Azure DevOps using a Build Definition ID
    and optional variables. This action is asynchronous, meaning it initiates the
    build and then periodically polls Azure DevOps to monitor the progress until the
    build completes, fails, or is canceled.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Build Definition Id | String | Yes | The unique identifier of the build definition
    (pipeline) you want to trigger. |

    | Build Variables | Code (JSON) | Yes | A JSON-formatted string containing the
    variables to be passed to the pipeline execution. |


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (Organization, Project,
    Personal Access Token, and Base URL) and action parameters.

    2. **Trigger Build**: Sends a POST request to the Azure DevOps Build API to queue
    a new build for the specified definition ID with the provided variables.

    3. **Capture Build ID**: Extracts the unique ID of the newly created build from
    the API response.

    4. **Status Polling (Async)**: Enters a polling phase where it sends GET requests
    to the Azure DevOps API to check the current status (`status`) and outcome (`result`)
    of the build.

    5. **Completion**: The action finishes with a 'Completed' status if the build
    succeeds or partially succeeds, and 'Failed' if the build fails or is canceled.


    ### Additional Notes

    - This action requires a Personal Access Token (PAT) with sufficient permissions
    to trigger and view builds in the specified Azure DevOps project.

    - The `Build Variables` parameter must be a valid JSON string.
