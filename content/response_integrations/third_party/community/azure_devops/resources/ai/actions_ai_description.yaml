  ai_description: >-
    ### General Description

    This action tests the connectivity between the SOAR platform and the Azure DevOps
    integration. It verifies that the provided credentials and configuration settings
    are valid by attempting to retrieve the list of projects from the Azure DevOps
    instance.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Personal Access Token | String | Yes | The personal access token used for authentication
    with Azure DevOps. |

    | Organization | String | Yes | The name of the Azure DevOps organization. |

    | Base URL | String | Yes | The base URL for the Azure DevOps instance. |


    ### Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    modification of external or internal systems.


    ### Flow Description

    1. Extract the configuration parameters (Personal Access Token, Organization,
    Base URL).

    2. Initialize the Azure DevOps connection using the provided credentials.

    3. Attempt to retrieve the list of projects using the core client.

    4. Return a success or failure message based on the outcome of the connection
    attempt.
