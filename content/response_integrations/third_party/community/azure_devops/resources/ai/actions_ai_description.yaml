    reasoning: >-
      The action triggers an external build process in Azure DevOps and monitors its
      status. It does not perform enrichment, containment, or ticketing operations.
      It is an automation/orchestration action. Therefore, it does not match any of
      the provided categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Triggers an Azure DevOps pipeline build and monitors its status asynchronously.
    This action allows users to initiate automated workflows in Azure DevOps by providing
    a build definition ID and associated variables.


    ### Flow Description

    1. Extracts configuration parameters (Project, Organization, Token, Base URL)
    and action parameters (Build Definition ID, Build Variables).

    2. Sends a POST request to the Azure DevOps API to initiate the build.

    3. Returns the triggered build ID.

    4. Asynchronously polls the Azure DevOps API (via `query_job`) to check the build
    status until completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Build Definition Id | string | Yes | The build definition ID of the pipeline
    you want to trigger. |

    | Build Variables | code | Yes | The variables to pass for the given pipeline.
    |


    ### Additional Notes

    This action is asynchronous and will continue to run until the build is completed
    or failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new build pipeline in Azure DevOps.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action triggers an external build (POST) and polls for status (GET). It
      does not modify internal SOAR entities or case data.
