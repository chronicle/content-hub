Trigger Azure Build:
  ai_description: >-
    ### General Description

    Triggers an Azure DevOps pipeline (build) for a specified definition ID and monitors
    its progress until completion. This action is useful for automating CI/CD workflows,
    such as deploying infrastructure or running automated tests as part of an incident
    response playbook.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Build Definition Id | string | Yes | The unique identifier (ID) of the build
    definition/pipeline you want to trigger in Azure DevOps. |

    | Build Variables | code | Yes | A JSON-formatted string containing the variables
    to pass to the pipeline (e.g., `{"ENV": "production"}`). |


    ### Flow Description

    1. **Initialization**: The action retrieves integration configuration (Organization,
    Project, PAT, Base URL) and action parameters.

    2. **Trigger Build**: It sends a POST request to the Azure DevOps Builds API to
    initiate a new build for the provided `Build Definition Id` using the specified
    `Build Variables`.

    3. **Async Monitoring**: The action captures the `build_id` from the response
    and enters an asynchronous state (`IN_PROGRESS`).

    4. **Status Polling**: The `query_job` function periodically polls the Azure DevOps
    API using the `build_id` to check the current status and result of the build.

    5. **Completion**: The action finishes with a `COMPLETED` status if the build
    succeeds or partially succeeds, and a `FAILED` status if the build fails or is
    canceled.


    ### Additional Notes

    This action is asynchronous and will wait for the external build process to finish
    before returning a final result to the Google SecOps playbook.
