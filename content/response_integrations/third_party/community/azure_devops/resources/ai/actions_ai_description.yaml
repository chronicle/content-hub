  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps platform and a specific Azure DevOps instance. It ensures that the
    provided credentials (Personal Access Token) and configuration (Organization and
    Base URL) are valid and that the network path is open.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration parameters:

    * **Personal Access Token**: The token used for authentication.

    * **Organization**: The Azure DevOps organization name.

    * **Base URL**: The base URL of the Azure DevOps instance.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connection issues. It does not process any entities or modify
    any data.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Personal Access Token`,
    `Organization`, and `Base URL` from the integration configuration.

    2. **Authentication**: It initializes a basic authentication object using the
    provided token.

    3. **Connection Initialization**: It establishes a connection to the Azure DevOps
    API using the constructed organization URL.

    4. **Connectivity Test**: The action attempts to fetch a list of projects using
    the `get_projects` method from the Azure DevOps Core Client to verify API access.

    5. **Result Reporting**: If the request is successful, it reports a successful
    connection. If an exception occurs, it captures the error and reports a connection
    failure.
