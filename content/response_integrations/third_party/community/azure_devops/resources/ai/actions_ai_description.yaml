  ai_description: >-
    ### General Description

    Triggers a new pipeline build in Azure DevOps using a specified build definition
    ID and variables. The action runs asynchronously, periodically checking the status
    of the triggered build until it completes or fails.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Build Definition Id | String | Yes | The ID of the pipeline build definition
    to trigger. |

    | Build Variables | Code | Yes | A JSON string containing the variables to pass
    to the pipeline. |


    ### Flow Description

    1. Extracts the integration and action parameters.

    2. Sends a POST request to the Azure DevOps API to trigger the build.

    3. Periodically polls the Azure DevOps API to check the status of the build.

    4. Completes the action when the build finishes, returning the final status and
    result.
