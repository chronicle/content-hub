  ai_description: >-
    Wait Until Web Resource Is Up is a utility action designed to monitor the availability
    of a specific URL. It functions as an asynchronous polling mechanism that repeatedly
    checks the status of a web resource until it becomes accessible.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the target URL from the input
    parameters.

    2. **Connectivity Check:** It performs an HTTP GET request to the specified URL
    with a 5-second timeout.

    3. **Status Evaluation:** The action checks if the HTTP response indicates success
    (status code < 400).

    4. **Execution State Management:**
        * If the resource is accessible, the action state is set to `COMPLETED`.
        * If the resource is inaccessible or the request fails, the action state is
    set to `IN_PROGRESS`, allowing the SOAR platform to retry the check after a delay.

    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The full web address (e.g., https://example.com) of the
    resource to monitor. |


    ### Additional Notes:

    This action is typically used in playbooks to ensure a service or endpoint is
    fully operational before proceeding to subsequent steps that depend on that resource.
