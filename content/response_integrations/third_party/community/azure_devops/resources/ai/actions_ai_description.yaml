Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Azure DevOps platform to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (Personal Access Token,
    Organization, and Base URL).

    2. Initializes a connection to the Azure DevOps API using Basic Authentication.

    3. Makes an API call (`get_projects`) to retrieve the first page of projects as
    a test of connectivity.

    4. Returns a success message if the API call completes without errors, or a failure
    message if an exception occurs.


    ### Additional Notes

    This action is strictly used for verifying the connection to Azure DevOps and
    does not process any entities or return contextual data to the case.
  ai_short_description: >-
    Tests connectivity to the Azure DevOps platform by attempting to authenticate
    and retrieve a list of projects.
