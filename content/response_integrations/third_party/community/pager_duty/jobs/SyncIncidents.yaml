name: Sync Incidents
parameters:
    -   name: api_key
        type: password
        description: The API key for the PagerDuty instance.
        is_mandatory: true
    -   name: Max Hours Backwards
        type: integer
        default_value: 24
        description: The number of hours prior to the current time to synchronize incidents during the first job iteration.
        is_mandatory: true
    -   name: Verify SSL
        type: boolean
        default_value: true
        description: If selected, the integration validates the SSL certificate when connecting to the PagerDuty server.
        is_mandatory: true
    -   name: From Email
        type: string
        description: The email address associated with the PagerDuty account. This parameter is required to synchronize notes and status changes.
        is_mandatory: false
    -   name: Environment Name
        type: string
        default_value: Default Environment
        description: The name of the environment from which to synchronize cases.
        is_mandatory: true


description: |
    This job synchronizes Google SecOps Alerts and PagerDuty tickets. It ensures that status is synchronized bi-directionally between both systems. For the job to identify the correct information, the Google SecOps case must have the "Pagerduty Ticket" tag. If the Ticket didn’t originate from "Pagerduty", you will need to add an "Ticket_ID" context value to the Ticket for the job to be able to find the correct information. In addition to status, this job now synchronizes comments bi-directionally between both systems. To prevent loops, comments are prefixed with “SecOps:” or “PagerDuty:”. For playbook-created cases, the job looks for the “TICKET_ID” context value at the Case level.
integration: PagerDuty
creator: Admin
