name: Sync Incidents
parameters:
    -   name: api_key
        type: password
        description: The API key for the PagerDuty instance.
        is_mandatory: true
    -   name: Max Hours Backwards
        type: integer
        default_value: 24
        description: The number of hours prior to the current time to synchronize incidents during the first job iteration.
        is_mandatory: true
    -   name: Verify SSL
        type: boolean
        default_value: true
        description: If selected, the integration validates the SSL certificate when connecting to the PagerDuty server.
        is_mandatory: true
    -   name: From Email
        type: string
        description: The email address associated with the PagerDuty account. This parameter is required to synchronize notes and status changes.
        is_mandatory: true
    -   name: Environment Name
        type: string
        default_value: Default Environment
        description: The name of the environment from which to synchronize cases.
        is_mandatory: true


description: |
    This job synchronizes Google SecOps alerts and PagerDuty Tickets. It ensures that comments and statuses sync bi-directionally between both systems. Note: This job requires the 'Pagerduty Ticket' tag on the SecOps case. If the ticket wasn’t created using the PagerDuty connector, you must add a 'TICKET_ID' context value (or 'TICKET_ID' at the Case level for playbook-generated cases). To prevent synchronization loops, all mirrored comments are prefixed with 'SecOps:' or 'PagerDuty:'
integration: PagerDuty
creator: Admin
