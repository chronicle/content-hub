name: Sync Incidents
parameters:
    -   name: api_key
        type: password
        description: PagerDuty API Key
        is_mandatory: true
    -   name: Max Hours Backwards
        type: integer
        default_value: 24
        description: Max hours backwards to sync incidents on first run.
        is_mandatory: false
    -   name: Verify SSL
        type: boolean
        default_value: true
        description: Verify SSL
        is_mandatory: false
    -   name: From Email
        type: string
        description: PagerDuty From Email (Required for notes and status changes)
        is_mandatory: false
    -   name: Environment Name
        type: string
        default_value: Default Environment
        description: Environment name to sync cases from.
        is_mandatory: false


description: |
    This job synchronizes Google SecOps Alerts and PagerDuty Incidents. It ensures that status and comments are synchronized bi-directionally between both systems. For the job to identify the correct information, the Google SecOps case must have the "Pagerduty Ticket" tag. If the ticket didn’t originate from "Pagerduty Connector", you will need to add a "TICKET_ID" context value to the case for the job to be able to find the correct information.
integration: PagerDuty
creator: Admin
