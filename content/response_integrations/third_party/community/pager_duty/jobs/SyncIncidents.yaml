name: Sync Incidents
parameters:
    -   name: api_key
        type: password
        description: PagerDuty API Key
        is_mandatory: true
    -   name: max_hours_backwards
        type: integer
        default_value: 24
        description: Max hours backwards to sync incidents on first run.
        is_mandatory: false
    -   name: environment_name
        type: string
        default_value: Default Environment
        description: Environment name to sync cases from.
        is_mandatory: false
    -   name: verify_ssl
        type: boolean
        default_value: true
        description: Verify SSL
        is_mandatory: false
    -   name: from_email
        type: string
        description: PagerDuty From Email (Required for notes and status changes)
        is_mandatory: false

description: |
    This job synchronizes Google SecOps Alerts and PagerDuty Incidents . It ensures that status is synchronized bi-directionally between both systems. For the job to identify the correct information, the Google SecOps case must have the "Pagerduty Alert" tag. If the alert didn’t originate from "Pagerduty Connector", you will need to add an "Alert_ID" context value to the alert for the job to be able to find the correct information.
integration: PagerDuty
creator: Admin
