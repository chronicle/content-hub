name: Sync Incidents
parameters:
    -   name: api_key
        type: password
        description: PagerDuty API Key
        is_mandatory: true
    -   name: max_hours_backwards
        type: integer
        default_value: 24
        description: Max hours backwards to sync incidents on first run.
        is_mandatory: false
    -   name: environment_name
        type: string
        default_value: Default
        description: Environment name to sync cases from.
        is_mandatory: false
description: Sync status between PagerDuty and SecOps.
integration: PagerDuty
creator: Admin
