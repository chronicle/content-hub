PagerDutyConnector:
  ai_description: >-
    ### General Description

    The PagerDuty connector facilitates the ingestion of incidents from the PagerDuty
    platform into Google SecOps. It allows security teams to centralize incident management
    by pulling active PagerDuty incidents and converting them into actionable alerts
    within the SOAR environment. Additionally, the connector supports an automated
    acknowledgment feature to synchronize incident states between both platforms.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | apiKey | String | Yes | The API Key used to authenticate with the PagerDuty
    API. |

    | acknowledge | Boolean | No | If enabled, the connector will automatically acknowledge
    the incident in PagerDuty upon successful ingestion. Requires an API key with
    write permissions. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product for the ingested alert (default: device_product). |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type (default: event_name). |

    | PythonProcessTimeout | String | Yes | The maximum time in seconds allowed for
    the connector script to execute. |


    ### Flow Description

    1. **Authentication**: The connector establishes a session with the PagerDuty
    API using the provided API Key.

    2. **Incident Retrieval**: It queries the PagerDuty `/incidents` endpoint to fetch
    a list of current incidents.

    3. **Severity Mapping**: The connector maps PagerDuty urgency levels to Google
    SecOps severity values (e.g., 'high' maps to 100, 'low' maps to -1).

    4. **Alert Construction**: For each incident, the connector creates an `AlertInfo`
    object, populating it with the incident title, creation time, and flattened event
    data.

    5. **State Synchronization**: If the `acknowledge` parameter is set to true, the
    connector sends a request to PagerDuty to update the incident status to 'acknowledged'
    for each processed alert.

    6. **Ingestion**: The finalized list of alerts is returned to the system for case
    creation and further orchestration.
