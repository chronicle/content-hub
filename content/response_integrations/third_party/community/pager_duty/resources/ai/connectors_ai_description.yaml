PagerDutyConnector:
  ai_description: >-
    ### General Description

    The PagerDutyConnector integrates Google SecOps with PagerDuty to streamline incident
    management. It periodically polls the PagerDuty API to retrieve active incidents
    and ingests them into Google SecOps as alerts. This allows security teams to centralize
    incident monitoring and response. Additionally, the connector supports an optional
    feature to automatically acknowledge incidents in PagerDuty once they have been
    successfully ingested into the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | acknowledge | Boolean | No | If enabled, the connector will acknowledge the
    incident in PagerDuty after ingestion. |

    | apiKey | String | Yes | The API Key used to authenticate with the PagerDuty
    API. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the script. |


    ### Flow Description

    1. The connector initializes the PagerDutyManager using the provided API key.

    2. It queries the PagerDuty API to fetch a list of current incidents.

    3. For each retrieved incident, it maps the PagerDuty urgency level to a corresponding
    Google SecOps severity level.

    4. It constructs an AlertInfo object, populating it with incident details such
    as ID, title, start time, and raw event data.

    5. If the acknowledge parameter is enabled, the connector sends an acknowledgment
    request back to PagerDuty for the processed incident.

    6. Finally, the collected alerts are returned to the Google SecOps platform for
    case creation and further investigation.
