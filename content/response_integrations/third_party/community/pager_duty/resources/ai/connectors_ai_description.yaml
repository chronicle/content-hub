PagerDutyConnector:
  ai_description: >-
    ### General Description

    The PagerDuty connector integrates with the PagerDuty API to fetch incidents and
    ingest them as alerts into Google SecOps. It supports optional automatic acknowledgment
    of incidents within PagerDuty upon successful ingestion into the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | acknowledge | Boolean | No | If enabled, acknowledges the incident in PagerDuty
    after ingestion. Note: The API key must have permissions to modify incidents.
    |

    | apiKey | String | Yes | The API key used to authenticate with the PagerDuty
    API. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |


    ### Flow Description

    1. The connector initializes the PagerDuty manager using the provided API key.

    2. It queries the PagerDuty API to retrieve a list of active incidents.

    3. For each retrieved incident, it maps the PagerDuty urgency level to the corresponding
    SOAR severity.

    4. It constructs a SOAR alert object containing incident details, including title,
    ID, and creation time.

    5. If the `acknowledge` parameter is enabled, the connector sends an acknowledgment
    request back to PagerDuty for the processed incident.

    6. Finally, the connector returns the list of processed alerts to the SOAR platform
    for case creation.
