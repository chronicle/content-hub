  ai_description: >-
    Retrieves a filtered list of incidents from PagerDuty based on specified criteria.
    This action allows analysts to search for incidents using parameters such as status,
    urgency, assigned users, teams, and specific time ranges. It is primarily used
    to gather context about existing PagerDuty incidents or to find specific alerts
    for further investigation.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves configuration details (API Key)
    and user-provided filter parameters from the environment.

    2. **Parameter Parsing:** It processes multi-choice parameters (like Urgencies,
    Statuses, and IDs), handling them as lists or JSON-formatted strings to ensure
    compatibility with the API request.

    3. **Filter Construction:** A query dictionary is built, mapping the provided
    filters to the expected PagerDuty API query parameters (e.g., `statuses[]`, `urgencies[]`,
    `since`, `until`).

    4. **API Interaction:** The action calls the PagerDuty API's `/incidents` endpoint
    using a GET request with the constructed query string.

    5. **Result Processing:** The retrieved list of incidents is returned as a JSON
    object, and the action completes with a success message if incidents are found.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Email** | String | Yes | The email address of the user making the request.
    Required for PagerDuty API headers. |

    | **Urgencies** | Multi-choice | No | Filter incidents by urgency level (e.g.,
    'low', 'high'). |

    | **Incidents_Statuses** | Multi-choice | No | Filter incidents by their current
    state (e.g., 'triggered', 'acknowledged', 'resolved'). |

    | **User_IDS** | String | No | Filter incidents assigned to specific user IDs
    (can be a comma-separated list or JSON array). |

    | **Team_IDS** | String | No | Filter incidents associated with specific team
    IDs. |

    | **Service_IDS** | String | No | Filter incidents associated with specific service
    IDs. |

    | **Incident_Key** | String | No | Filter by the unique incident key. |

    | **Since** | String | No | Start date for the search (format: YYYY-MM-DD). |

    | **Until** | String | No | End date for the search (format: YYYY-MM-DD). |

    | **Data_Range** | String | No | A predefined date range for the search. |

    | **sort_by** | Multi-choice | No | Determines the field to sort by and the order
    (asc/desc). |

    | **Additional_Data** | Multi-choice | No | Specifies additional incident details
    to include in the response (e.g., 'users', 'services'). |


    ### Additional Notes:

    - The `Since` and `Until` parameters should follow the `YYYY-MM-DD` format. The
    maximum range for the search is typically 6 months.

    - This action does not require any entities to be present in the SecOps case to
    run.
