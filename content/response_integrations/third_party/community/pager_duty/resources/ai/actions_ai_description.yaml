  ai_description: >-
    Creates a new incident in PagerDuty using the provided details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Title | String | Yes | The title of the incident. |

    | Email | String | Yes | The email address of the user creating the incident.
    |

    | Urgency | String | Yes | The urgency of the incident (e.g., high). |

    | Details | String | Yes | The detailed description of the incident. |


    ### Additional Notes

    The action also uses the `Services` parameter from the integration configuration
    to determine which service the incident should be associated with.


    ### Flow Description

    1. Initializes the PagerDuty manager with the API token.

    2. Retrieves the input parameters (Title, Email, Urgency, Details) and the Service
    ID from the integration configuration.

    3. Calls the PagerDuty API to create a new incident.

    4. Returns the created incident details as a JSON result.
