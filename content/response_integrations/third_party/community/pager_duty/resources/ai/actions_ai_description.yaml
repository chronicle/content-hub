Run Response Play:
  ai_description: >-
    Runs a specified PagerDuty Response Play on a given incident. Response plays are
    pre-configured packages of actions in PagerDuty that can be manually or automatically
    triggered to streamline incident response, such as notifying specific stakeholders
    or adding responders. Note: This action is marked as deprecated.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the user's email, the Response Play ID,
    and the Incident ID from the action parameters.

    2. **Manager Initialization:** Initializes the PagerDuty API manager using the
    provided API key.

    3. **Execution:** Sends a POST request to the PagerDuty API endpoint `/response_plays/{response_plays_id}/run`
    with the incident reference in the payload.

    4. **Result Handling:** Captures the API response and reports the success or failure
    of the play execution to the Google SecOps case wall.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the PagerDuty user performing the
    action. This is used for the 'From' header required by PagerDuty's API. |

    | Response ID | String | Yes | The unique identifier of the Response Play to be
    executed. |

    | Incident_ID | String | Yes | The unique identifier of the PagerDuty incident
    on which the response play will be run. |


    ### Additional Notes:

    - This action is deprecated and may be replaced by newer workflow capabilities.

    - The action requires a valid API key with permissions to execute response plays.
