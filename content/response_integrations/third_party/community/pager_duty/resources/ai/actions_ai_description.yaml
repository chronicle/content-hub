Create Incident:
  ai_description: >-
    ### General Description

    This action creates a new incident in PagerDuty using the provided details. It
    is typically used to escalate security alerts from Google SecOps to an on-call
    rotation or incident management workflow in PagerDuty.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Details | A detailed description of the incident, providing context for the
    responder. | String | Yes |

    | Title | A short, descriptive title for the PagerDuty incident. | String | Yes
    |

    | Email | The email address of the user creating the incident. This is used in
    the 'From' header required by the PagerDuty API. | String | Yes |

    | Urgency | The urgency level of the incident (e.g., 'high' or 'low'). | String
    | Yes |


    ### Additional Notes

    * This action requires the 'Services' ID to be configured in the PagerDuty integration
    settings, as it determines which service the incident will be associated with.

    * The action does not run on specific entities; it uses the provided parameters
    to generate the external record.


    ### Flow Description

    1. **Initialization**: The action initializes the PagerDuty manager using the
    API token and service configuration from the integration settings.

    2. **Parameter Extraction**: It retrieves the Title, Email, Urgency, and Details
    from the action parameters.

    3. **API Request**: The action sends a POST request to the PagerDuty `/incidents`
    endpoint with the constructed payload.

    4. **Result Processing**: If successful, the full JSON response of the created
    incident is returned and added to the action results.
