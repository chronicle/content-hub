  ai_description: >-
    ### General Description

    The **Get Incident By ID** action retrieves detailed information about a specific
    incident from PagerDuty using its unique incident key. This action is primarily
    used to fetch external context regarding a PagerDuty incident and bring it into
    the Google SecOps environment for further analysis or automated decision-making
    within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Key | string | Yes | The unique identifier (key) of the PagerDuty incident
    to be retrieved. |

    | Email | string | Yes | The email address of the PagerDuty user making the request.
    This is required for the 'From' header in the PagerDuty API request. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Incident Key` and `Email`
    from the input parameters and retrieves the API token from the integration configuration.

    2. **Manager Initialization**: It initializes the PagerDuty manager with the provided
    API token.

    3. **Data Retrieval**: The action sends a GET request to the PagerDuty incidents
    endpoint to fetch incident data.

    4. **Filtering**: It iterates through the retrieved incidents to find the specific
    record where the `incident_key` matches the provided input.

    5. **Result Output**: If a match is found, the incident details are added to the
    action's JSON results. The action then concludes with a success message and a
    boolean result indicating whether the incident was found.


    ### Additional Notes

    - This action does not operate on SecOps entities (like IPs or Hostnames); it
    relies entirely on the provided `Incident Key` parameter.

    - The `Email` parameter is mandatory because PagerDuty's API requires the 'From'
    header to identify the user performing the action.
