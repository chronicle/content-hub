Get User By Email:
  ai_description: >-
    ### General Description

    Retrieves detailed user information from PagerDuty based on a provided email address.
    This action queries the PagerDuty API to find a specific user and returns their
    profile details as a JSON result.


    ### Flow Description

    1. Initializes the PagerDuty integration and retrieves the API token from the
    configuration.

    2. Extracts the target `Email` from the action parameters.

    3. Makes a GET request to the PagerDuty API (`/users` endpoint) using the provided
    email as a query parameter.

    4. Parses the API response to find the exact user match for the provided email
    address.

    5. If found, adds the user details to the action's JSON result and completes successfully.

    6. If no user is found, the action catches the resulting exception, fails gracefully,
    and outputs a message indicating the user does not exist.


    ### Additional Notes

    The action relies strictly on the provided email parameter and does not automatically
    process case entities.
