Get User By Email:
  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific PagerDuty user based on their email
    address. This action is useful for identifying user roles, contact information,
    and account status within PagerDuty during an incident response workflow.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Email | The email address of the PagerDuty user to retrieve information for.
    | string | Yes | Default value is 'test@example.com'. |


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the `Email` parameter provided
    by the user.

    2. **API Query**: It calls the PagerDuty `/users` API endpoint using the email
    as a query parameter.

    3. **Data Filtering**: The action iterates through the returned list of users
    to find an exact match for the provided email address.

    4. **Result Output**: If a match is found, the user's full profile (JSON) is added
    to the action results. If no user is found, the action fails with an informative
    message.


    ### Additional Notes

    This action does not automatically process entities from the SecOps case; it relies
    solely on the manual input provided in the `Email` parameter.
