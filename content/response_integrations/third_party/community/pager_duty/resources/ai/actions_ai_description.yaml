    in the 'From' header for API authentication and auditing. Default is 'test@example.com'.
    |

    | Response ID | string | Yes | The unique identifier of the Response Play to be
    executed. Default is 'test'. |

    | Incident_ID | string | Yes | The unique identifier of the PagerDuty incident
    on which the play will be run. Default is 'Default'. |


    ### Flow Description

    1. **Initialization:** The action extracts the user email, Response Play ID, and
    Incident ID from the input parameters.

    2. **API Request:** It constructs and sends a POST request to the PagerDuty API
    endpoint `/response_plays/{response_play_id}/run`.

    3. **Execution:** The request includes the incident reference in the payload and
    the user's email in the headers.

    4. **Completion:** The action captures the API response, adds it to the JSON results,
    and reports the success or failure of the operation.


    ### Additional Notes

    - This action is deprecated and may be removed in future versions.

    - It does not interact with SOAR entities directly; all identifiers must be provided
    as parameters.
