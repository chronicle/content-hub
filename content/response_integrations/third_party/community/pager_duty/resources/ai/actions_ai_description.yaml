Snooze Incident:
  ai_description: >-
    ### General Description

    Snoozes a specific incident in PagerDuty and retrieves the updated incident information.
    This action initiates a state change on the external PagerDuty platform to temporarily
    pause notifications for the specified incident.


    ### Flow Description

    1. Extracts the `Email` and `IncidentID` parameters provided in the action configuration.

    2. Initializes the PagerDuty API client with the provided API key.

    3. Makes a POST request to the PagerDuty API (`/incidents/{incident_id}/snooze`)
    to snooze the incident.

    4. Retrieves the updated incident details from the API response and attaches them
    to the action's JSON result.


    ### Additional Notes

    - The snooze duration is hardcoded to 3600 seconds (1 hour) within the integration's
    manager logic.

    - The `Email` parameter is required as it is passed in the `From` header to identify
    the user performing the action in PagerDuty.
