Snooze Incident:
  ai_description: >-
    ### General Description

    Snoozes a specific PagerDuty incident for a duration of one hour. This action
    changes the state of the incident in PagerDuty, preventing further notifications
    for the specified period and returning the updated incident details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | string | Yes | The email address of the PagerDuty user performing the
    action. This is required for the 'From' header in PagerDuty API requests. |

    | IncidentID | string | Yes | The unique identifier of the PagerDuty incident
    to be snoozed. |


    ### Flow Description

    1. **Initialization**: The action initializes the PagerDuty manager using the
    API key from the integration configuration.

    2. **Parameter Extraction**: It retrieves the mandatory `Email` and `IncidentID`
    from the action parameters.

    3. **API Execution**: It calls the PagerDuty API's snooze endpoint (`POST /incidents/{incident_id}/snooze`)
    with a hardcoded duration of 3600 seconds (1 hour).

    4. **Output**: Upon success, the action returns the updated incident JSON data
    and completes the execution. If an HTTP error occurs, it captures the error details
    and marks the action as failed.


    ### Additional Notes

    The snooze duration is currently hardcoded to 3600 seconds (1 hour) within the
    integration's manager logic.
