List All OnCall:
  ai_description: >-
    ### General Description

    Retrieves a list of all current on-call shifts from PagerDuty. This action provides
    visibility into which users are currently assigned to on-call schedules across
    various services and escalation policies. It is primarily used to identify the
    correct personnel to contact or escalate to during an incident response process.


    ### Flow Description

    1. **Authentication**: The action initializes the PagerDuty manager using the
    API key provided in the integration configuration.

    2. **API Request**: It executes a GET request to the PagerDuty `/oncalls` endpoint
    to retrieve the current on-call status.

    3. **Data Extraction**: The action parses the API response and extracts the list
    of on-call entries.

    4. **Result Output**: The retrieved list is added to the action's JSON results,
    and the action completes with a success message.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. |


    ### Additional Notes

    This action does not interact with or filter based on entities within the Google
    SecOps case. It returns a global list of on-call assignments for the PagerDuty
    account.
