Get Incident By ID:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific PagerDuty incident using its unique
    Incident Key. This action is useful for fetching the current status, urgency,
    and metadata of an incident directly from PagerDuty to assist in automated workflows
    or manual investigations within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Key | string | Yes | The unique identifier (Incident Key) of the PagerDuty
    incident to retrieve. |

    | Email | string | Yes | The email address of the user performing the action.
    This is required by the PagerDuty API for the 'From' header to track who is making
    the request. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Incident Key` and the requester's
    `Email` from the input parameters.

    2. **Manager Initialization**: Initializes the PagerDuty API manager using the
    configured API token.

    3. **API Request**: Sends a GET request to the PagerDuty `/incidents` endpoint,
    including the user's email in the 'From' header.

    4. **Data Filtering**: Iterates through the returned incidents to find the one
    that matches the provided `Incident Key`.

    5. **Result Processing**: If found, the incident details are added to the action's
    JSON results. If not found, an appropriate message is returned.


    ### Additional Notes

    This action does not run on entities; it relies entirely on the provided `Incident
    Key` parameter to identify the target record.
