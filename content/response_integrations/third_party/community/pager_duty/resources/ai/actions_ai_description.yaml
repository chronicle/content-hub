    1. Extracts the `Incident Key` and `Email` parameters provided by the user.

    2. Initializes the PagerDuty API client with the integration credentials and the
    provided email.

    3. Makes a GET request to the PagerDuty `/incidents` API endpoint to fetch incidents.

