    for a given incident. Response Plays are predefined sets of actions that can be
    executed to manage incidents efficiently, such as notifying specific teams or
    updating incident statuses. This action is currently marked as deprecated.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

