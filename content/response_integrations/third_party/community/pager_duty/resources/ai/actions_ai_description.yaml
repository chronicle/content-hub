  ai_description: >-
    ### General Description

    This action creates a new incident in PagerDuty using the provided details, title,
    email, and urgency level. It interacts with the PagerDuty API to generate a new
    incident record based on the parameters supplied by the user.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Details | string | Yes | The description or body of the incident. |

    | Title | string | Yes | The title of the incident. |

    | Email | string | Yes | The email address of the user creating the incident (used
    for the 'From' header). |

    | Urgency | string | Yes | The urgency level of the incident. |


    ### Additional Notes

    This action requires a valid PagerDuty API token and a configured Service ID in
    the integration settings to function correctly.


    ### Flow Description

    1. Initialize the `PagerDutyManager` with the API token retrieved from the integration
    configuration.

    2. Extract the required parameters (Title, Email, Urgency, Details) and the Service
    ID from the configuration.

    3. Execute the `create_incident` method, which sends a POST request to the PagerDuty
    `/incidents` endpoint.

    4. Add the resulting incident data to the action result.

    5. Terminate the action with a success or failure status based on the API response.
