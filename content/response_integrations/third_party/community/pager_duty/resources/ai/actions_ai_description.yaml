Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in PagerDuty using the provided details, title, email,
    and urgency. This action allows analysts to programmatically escalate issues and
    trigger PagerDuty workflows directly from the SOAR platform.


    ### Flow Description

    1. Retrieves action parameters including Title, Email, Urgency, and Details.

    2. Initializes the PagerDuty API client using the configured API token and Service
    ID.

    3. Makes a POST request to the PagerDuty `/incidents` API endpoint to create a
    new incident.

    4. Returns the created incident data as a JSON result and completes the action.


    ### Additional Notes

    Requires a valid PagerDuty API key and Service ID configured in the integration
    settings. The email provided must correspond to a valid user in PagerDuty.
  ai_short_description: >-
    Creates a new incident in PagerDuty with the specified title, details, urgency,
    and user email.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in PagerDuty.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the PagerDuty API to create a new incident.
      It mutates external data by creating this record but does not fetch context
      data, update internal entities, or create insights.
