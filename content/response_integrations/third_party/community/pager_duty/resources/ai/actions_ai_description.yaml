Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps platform and the PagerDuty API. It ensures that the provided API
    key is valid and that the network path to PagerDuty's services is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. It relies
    on the integration's configuration (API Key). |


    ### Additional Notes

    - This action is primarily used for troubleshooting and initial setup validation.

    - It does not interact with any SecOps entities or modify any data.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `api_key` from the PagerDuty
    integration settings.

    2. **Client Initialization**: A connection session is established using the PagerDuty
    Manager.

    3. **Connectivity Test**: The action performs a GET request to the `/abilities`
    endpoint of the PagerDuty API.

    4. **Validation**: The action checks the response status; a successful response
    confirms connectivity.
