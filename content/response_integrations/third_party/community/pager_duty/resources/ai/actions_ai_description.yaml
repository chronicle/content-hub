  ai_description: >-
    ### General Description

    Creates a new incident in PagerDuty using specified parameters. This action allows
    analysts to programmatically trigger PagerDuty incidents directly from Google
    SecOps, ensuring that the right teams are notified with the necessary context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Details | string | Yes | A detailed description of the incident, providing context
    for the responder (e.g., 'A disk is getting full on this machine'). |

    | Title | string | Yes | A short, descriptive title for the incident (e.g., 'The
    server is on fire'). |

    | Email | string | Yes | The email address of the PagerDuty user creating the
    incident. This is used for the 'From' header in the API request. |

    | Urgency | string | Yes | The urgency level of the incident. Common values include
    'high' or 'low'. |


    ### Additional Notes

    * This action requires a 'Services' ID to be configured in the integration settings,
    as PagerDuty incidents must be associated with a specific service.

    * The action does not process entities; it creates a global incident based on
    the provided parameters.


    ### Flow Description

    1. **Initialization**: The action initializes the PagerDuty manager using the
    API token and retrieves the 'Services' ID from the integration configuration.

    2. **Parameter Extraction**: It extracts the Title, Email, Urgency, and Details
    from the action parameters.

    3. **API Request**: It sends a POST request to the PagerDuty `/incidents` endpoint
    with the incident payload, including the 'From' header required by PagerDuty for
    user attribution.

    4. **Result Handling**: If successful, the action returns the full JSON response
    of the created incident and sets the execution state to completed.
