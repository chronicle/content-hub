Filtered Incident List:
  ai_description: >-
    ### General Description

    This action retrieves a filtered list of incidents from PagerDuty based on a wide
    variety of criteria. It allows analysts to search for specific incidents by status,
    urgency, assigned users, teams, services, and time ranges. The results are returned
    as a JSON object, making it ideal for automated reporting, incident auditing,
    or as a precursor to bulk incident management within a playbook.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Email | The email address of the user making the request. This is often required
    by PagerDuty for auditing purposes. | String | Yes |

    | Additional_Data | Specifies additional details to include in the response, such
    as 'users', 'services', 'assignees', or 'teams'. | Multi-choice | No |

    | sort_by | Determines the field to sort by (e.g., incident_number, created_at)
    and the order (asc, desc). | Multi-choice | No |

    | Urgencies | Filters incidents by their urgency level (low or high). | Multi-choice
    | No |

    | User_IDS | Filters incidents assigned to specific User IDs. Multiple IDs can
    be provided. | String | No |

    | Team_IDS | Filters incidents assigned to specific Team IDs. Multiple IDs can
    be provided. | String | No |

    | Incident_Key | Filters for a specific incident using its unique Incident Key.
    | String | No |

    | Incidents_Statuses | Filters incidents by their current state: triggered, acknowledged,
    or resolved. | Multi-choice | No |

    | Data_Range | Filters incidents based on a predefined data range string. | String
    | No |

    | Since | The start date for the search range in YYYY-MM-DD format. Maximum range
    is 6 months. | String | No |

    | Until | The end date for the search range in YYYY-MM-DD format. | String | No
    |

    | Service_IDS | Filters incidents associated with specific Service IDs. | String
    | No |


    ### Additional Notes

    - The action handles multi-choice parameters by parsing them as JSON lists if
    they are formatted as such.

    - The `Since` parameter is restricted to a maximum lookback of 6 months by the
    PagerDuty API.

    - While the `Email` parameter is mandatory in the configuration, the underlying
    logic for this specific search action primarily relies on the API Token for authentication.


    ### Flow Description

    1. **Initialization**: The action initializes the PagerDuty manager using the
    integration's API key.

    2. **Parameter Extraction**: It extracts all filter parameters from the environment,
    including mandatory fields like Email and optional filters like Statuses and IDs.

    3. **Data Parsing**: The script processes multi-choice and list-based parameters,
    ensuring they are correctly formatted for the API request and removing any empty
    values.

    4. **API Request**: It constructs a query dictionary and executes a GET request
    to the PagerDuty `/incidents` endpoint with the specified filters.

    5. **Result Processing**: The action captures the list of incidents and attaches
    them to the action's JSON result, completing the execution with a success message
    if data is found.
