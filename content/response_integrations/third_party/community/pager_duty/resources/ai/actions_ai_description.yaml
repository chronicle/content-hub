  ai_description: >-
    ### General Description

    The **Filtered Incident List** action retrieves a list of incidents from PagerDuty
    based on various search criteria. It connects to the PagerDuty API and fetches
    incidents matching the provided parameters, returning the results as a JSON object.
    This action is useful for querying historical or active incidents based on specific
    filters such as urgency, status, or associated teams.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Additional_Data | Multi-Choice | No | Additional details to include in the response
    (e.g., users, services, priorities). |

    | sort_by | Multi-Choice | No | Determines the sorting field and order (e.g.,
    incident_number, created_at, asc, desc). |

    | Urgencies | Multi-Choice | No | Filters incidents by urgency level (low, high).
    |

    | User_IDS | String | No | Filters incidents by specific User IDs. Can be a JSON-formatted
    list. |

    | Team_IDS | String | No | Filters incidents by specific Team IDs. Can be a JSON-formatted
    list. |

    | Incident_Key | String | No | Filters incidents by a specific Incident Key. |

    | Incidents_Statuses | Multi-Choice | No | Filters incidents by their current
    status (triggered, acknowledged, resolved). |

    | Data_Range | String | No | Specifies a predefined date range for the search.
    |

    | Until | String | No | The end date for the search in YYYY-MM-DD format. |

    | Since | String | No | The start date for the search in YYYY-MM-DD format. Maximum
    range is 6 months. |

    | Email | String | Yes | The email address associated with the request. |

    | Service_IDS | String | No | Filters incidents by specific Service IDs. Can be
    a JSON-formatted list. |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts all filter parameters provided
    in the configuration.

    2. **Parameter Parsing:** It parses JSON-formatted string lists for parameters
    like Urgencies, Service IDs, Team IDs, User IDs, and Statuses.

    3. **Filter Construction:** A dictionary of valid filters is constructed, removing
    any empty or falsy values to ensure only active filters are applied.

    4. **API Request:** The action calls the PagerDuty API (`/incidents` endpoint)
    using the constructed filters to retrieve matching incidents.

    5. **Result Output:** The retrieved incidents are returned as a JSON object and
    attached to the action's results.
