  ai_description: "### General Description\nThis action enriches IP Address entities\
    \ by retrieving threat intelligence from Pulsedive. It fetches reputation data,\
    \ risk factors, and comments (if requested) for the specified IP addresses. The\
    \ action evaluates the risk level of the IP against a user-defined threshold and\
    \ updates the entity's suspicious status, adds enrichment properties, and generates\
    \ insights within the Google SecOps platform.\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: The action retrieves configuration parameters (API Root, API Key,\
    \ SSL verification) and action-specific parameters (Threshold, Retrieve Comments,\
    \ etc.).\n2. **Entity Filtering**: It filters the target entities to process only\
    \ those of type `ADDRESS`.\n3. **Data Retrieval**: For each valid entity, it queries\
    \ the Pulsedive API to fetch indicator data, including risk levels and comments.\n\
    4. **Risk Evaluation**: It compares the retrieved risk score against the configured\
    \ `Threshold`. If the risk meets or exceeds the threshold, the entity is marked\
    \ as suspicious.\n5. **Enrichment & Insight Creation**: \n   - Updates the entity's\
    \ `additional_properties` with the retrieved threat data.\n   - Optionally constructs\
    \ a data table of comments and adds it to the case.\n   - Creates an entity insight\
    \ summarizing the risk and threat details.\n6. **SOAR Update**: Updates the enriched\
    \ entities in the SOAR platform and adds a final JSON result containing the processed\
    \ data.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Threshold | ddl | Yes | The risk level threshold\
    \ (verylow, low, medium, high, critical) used to determine if an entity should\
    \ be marked as suspicious. |\n| Retrieve Comments | boolean | No | If enabled,\
    \ the action will retrieve and display comments associated with the entity. |\n\
    | Only Suspicious Entity Insight | boolean | No | If enabled, the action will\
    \ only create an entity insight if the entity is determined to be suspicious based\
    \ on the threshold. |\n| Max Comments To Return | string | No | Specifies the\
    \ maximum number of comments to retrieve for the entity. |\n\n### Additional Notes\n\
    - The action requires a valid Pulsedive API key and connectivity to the Pulsedive\
    \ API endpoint.\n- If no entities of type `ADDRESS` are found, the action will\
    \ not perform any enrichment."
  capabilities:
