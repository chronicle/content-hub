  ai_description: >-
    Retrieves detailed information about a specific threat from Pulsedive using its
    Threat Name or Threat ID. The action fetches threat intelligence, risk summaries,
    news, and comments associated with the threat. It can optionally create a case
    insight with the retrieved details and split the indicator counts by risk.


    ### Flow

    1. Validates the provided parameters (Threat Name or Threat ID).

    2. Calls the Pulsedive API to retrieve threat details.

    3. If requested, retrieves comments and news associated with the threat.

    4. Adds the retrieved comments as a data table to the action results.

    5. Optionally creates a case insight with the threat details.

    6. Returns the threat data as a JSON result.


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Threat Name | No | String | The name of the threat to retrieve. Either Threat
    Name or Threat ID must be provided. |

    | Threat ID | No | String | The ID of the threat to retrieve. Either Threat Name
    or Threat ID must be provided. |

    | Retrieve Comments | No | Boolean | If true, retrieves comments associated with
    the threat and adds them as a data table. |

    | Split Risk | No | Boolean | If true, splits out the indicator counts by risk
    level. |

    | Create Insight | No | Boolean | If true, creates a case insight with the threat
    details. |
