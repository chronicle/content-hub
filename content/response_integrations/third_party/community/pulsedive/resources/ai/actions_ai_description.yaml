  ai_description: >-
    ### General Description

    The **Get Threat Details** action retrieves comprehensive threat intelligence
    from Pulsedive using either a threat name or a specific threat ID. It provides
    detailed context including risk levels, categories, wiki summaries, related news,
    and user comments. This information helps analysts understand the nature and severity
    of a specific threat actor or campaign.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threat Name** | String | No | The name of the threat to retrieve information
    for (e.g., "Zeus"). |

    | **Threat ID** | String | No | The unique Pulsedive ID for the threat. |

    | **Retrieve Comments** | Boolean | No | If set to `True`, retrieves user comments
    associated with the threat. Default is `True`. |

    | **Split Risk** | Boolean | No | If set to `True`, breaks down indicator counts
    by risk level. Default is `True`. |

    | **Create Insight** | Boolean | No | If set to `True`, creates a detailed case
    insight in Google SecOps. Default is `False`. |


    ### Additional Notes

    - Either **Threat Name** or **Threat ID** should be provided for the action to
    function correctly.

    - The action adds a data table to the case wall containing threat comments if
    they are retrieved.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and user-provided
    parameters (Threat Name, ID, and display options).

    2. **Pulsedive Query:** It calls the Pulsedive API to fetch threat data based
    on the provided identifier.

    3. **Data Processing:** The action parses the response, extracting risk summaries,
    wiki information, and news.

    4. **Comment Retrieval:** If enabled, it fetches and formats user comments into
    a CSV-style table.

    5. **Internal Mutation:**
        - Adds a data table to the case wall for comments.
        - If **Create Insight** is enabled, it generates a formatted insight with
    the threat's risk summary and news.
    6. **Output:** Returns the full threat data as a JSON object and completes the
    action.
