    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The `Scan Indicator` action submits indicators to Pulsedive for either active
    or passive scanning and retrieves the resulting threat intelligence report. It
    evaluates the risk of the indicator based on a configured threshold, enriches
    the entity with the scan data, and generates an insight. It can also retrieve
    comments associated with the indicator and add them to the case wall as a data
    table.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Only Suspicious Entity Insight | No | Boolean | If enabled, the action will
    only create an insight for entities that are deemed suspicious based on the threshold.
    |

    | Scan Type | Yes | Drop-down | Specifies whether to perform a 'Passive' or 'Active'
    scan. Passive scans fetch data without reaching out directly to the indicator,
    while active scans are more noisy. |

    | Max Comments To Return | No | String | Specifies the maximum number of comments
    to retrieve from Pulsedive. Default is 50. |

    | Threshold | Yes | Drop-down | Specifies the risk threshold (e.g., verylow, low,
    medium, high, critical) at which the entity should be marked as suspicious in
    Google SecOps. |

    | Retrieve Comments | No | Boolean | If enabled, the action will retrieve comments
    about the entity from Pulsedive. |


    ### Flow Description

    1. Iterates through all target entities in the case.

    2. Submits each entity's identifier to Pulsedive for analysis using the specified
    `Scan Type`.

    3. Periodically checks the status of the scan tasks until they are completed.

    4. Retrieves the scan report and optional comments for each completed scan.

    5. Evaluates the risk score against the configured `Threshold` to determine if
    the entity is suspicious.

    6. Enriches the entity with the scan data, creates an insight (conditionally based
    on `Only Suspicious Entity Insight`), and adds comments to the case wall as a
    data table.

    7. Updates the entities in Google SecOps and returns a JSON result containing
    the scan details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Submits the indicator to Pulsedive via a POST request to initiate an active
      or passive scan, creating a scan task on the external platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (suspicious status, enrichment data), creates entity
      insights, and adds data tables to the case wall.
    reasoning: >-
      The action fetches data by retrieving the scan report and comments from Pulsedive
      (fetches_data=true). It mutates external data by submitting the indicator to
      Pulsedive via a POST request to initiate a scan, which creates a scan task on
      the platform (can_mutate_external_data=true). It mutates internal data by updating
      entity attributes, creating entity insights, and adding data tables to the case
      wall (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not modify alert data or create case comments (can_modify_alert_data=false,
      can_create_case_comments=false).
  categories:
    enrichment: false
    reasoning: >-
      The action fetches threat intelligence data, but it also initiates a scan on
      the external Pulsedive platform, which creates a scan task (mutating external
      state). According to the strict Read-Only rule for external systems, this disqualifies
      it from being an Enrichment action (enrichment=false). It does not perform any
      remediation tasks (remediation=false).
    remediation: false
