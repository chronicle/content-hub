  ai_description: "Enriches IP Address entities using Pulsedive threat intelligence.\
    \ This action retrieves comprehensive data about an IP, including its risk level,\
    \ risk factors, and community comments. It evaluates the risk against a user-defined\
    \ threshold to automatically mark entities as suspicious within Google SecOps.\n\
    \n### Flow Description\n1. **Filter Entities:** Identifies all IP Address entities\
    \ (ADDRESS) within the current context.\n2. **Fetch Intelligence:** For each IP,\
    \ it queries the Pulsedive API to retrieve indicator details, risk scores, and\
    \ optionally, community comments.\n3. **Risk Evaluation:** Compares the retrieved\
    \ Pulsedive risk level (e.g., 'high', 'critical') against the user-provided 'Threshold'\
    \ parameter.\n4. **Internal Enrichment:** \n    * Updates the entity's additional\
    \ properties with Pulsedive metadata (prefixed with 'PD').\n    * Marks the entity\
    \ as 'suspicious' if the risk meets or exceeds the threshold.\n    * Marks the\
    \ entity as 'enriched'.\n5. **Reporting:** \n    * Generates an Entity Insight\
    \ containing a formatted HTML report of the risk factors and indicator details.\n\
    \    * If enabled, creates a Data Table on the case wall containing community\
    \ comments.\n6. **Finalize:** Updates the entities in the SecOps platform and\
    \ returns a JSON result summarizing the findings.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Threshold** | DDL | Yes | The minimum risk level (verylow, low, medium, high,\
    \ critical) required for the action to mark an entity as suspicious. |\n| **Retrieve\
    \ Comments** | Boolean | No | If true, the action fetches and displays community\
    \ comments from Pulsedive. Default is true. |\n| **Only Suspicious Entity Insight**\
    \ | Boolean | No | If true, insights will only be created for entities that meet\
    \ the risk threshold. Default is false. |\n| **Max Comments To Return** | String\
    \ | No | Limits the number of comments retrieved and displayed in the data table.\
    \ Default is 50. |\n\n### Additional Notes\n* The action uses a mapping system\
    \ to convert Pulsedive's string-based risk levels into numerical scores for comparison\
    \ against the user-defined threshold.\n* Enrichment data is added to entities\
    \ with the prefix 'PD' to distinguish Pulsedive data from other sources."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
