    ### General Description

    Retrieves detailed threat information from Pulsedive based on a provided Threat
    Name or Threat ID. This action fetches threat intelligence, risk summaries, and
    related news, and can optionally retrieve user comments associated with the threat.


    ### Flow Description

    1. Extracts the `Threat Name` or `Threat ID` from the action parameters.

    2. Makes a GET request to the Pulsedive API (`/api/info.php`) to fetch threat
    details.

    3. Optionally retrieves comments and splits risk counts based on parameter configurations.

    4. Parses the response and constructs a JSON result containing the threat data.

    5. Optionally creates a case insight with the threat details and adds a data table
    for comments to the case wall.


    ### Additional Notes

    Either `Threat Name` or `Threat ID` must be provided for the action to execute
    successfully.
