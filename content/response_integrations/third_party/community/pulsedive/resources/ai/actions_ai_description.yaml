  ai_description: >-
    ### General Description

    Enriches URL entities using threat intelligence from Pulsedive. This action retrieves
    comprehensive indicator data, including risk levels, risk factors, and user comments.
    It evaluates the risk of each URL against a user-defined threshold to determine
    if the entity should be marked as suspicious within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Comments To Return | String | No | Specifies the maximum number of comments
    to retrieve from Pulsedive for each entity. Default is 50. |

    | Threshold | DDL | Yes | Defines the risk level at which an entity is marked
    as suspicious. Options include: `verylow`, `low`, `medium`, `high`, and `critical`.
    |

    | Retrieve Comments | Boolean | No | If enabled, the action fetches community
    comments associated with the URL. Default is `true`. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, entity insights
    will only be created for URLs that meet or exceed the specified risk threshold.
    Default is `false`. |


    ### Additional Notes

    - The action maps Pulsedive risk levels to numerical scores for comparison: `unknown`
    (-1), `none` (0), `low` (1), `medium` (2), `high` (3), and `critical` (4).

    - Enrichment data is prefixed with `PD` in the entity's additional properties.


    ### Flow Description

    1. **Filter Entities:** Identifies all URL entities within the current context.

    2. **Fetch Intelligence:** For each URL, queries the Pulsedive API to retrieve
    indicator details, risk scores, and comments.

    3. **Risk Evaluation:** Compares the retrieved risk level against the configured
    `Threshold` parameter.

    4. **Internal Mutation:** If the threshold is met, marks the entity as suspicious
    (`is_suspicious = True`).

    5. **Enrichment:** Updates the entity's additional properties with Pulsedive metadata
    and sets the `is_enriched` flag.

    6. **Reporting:** Adds a data table to the case wall for retrieved comments and
    generates an entity insight based on the analysis results and user preferences.
  capabilities:
