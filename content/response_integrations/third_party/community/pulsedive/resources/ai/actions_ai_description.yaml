  ai_description: >-
    Enriches IP Address entities using threat intelligence from Pulsedive. It retrieves
    risk levels, threat factors, and optionally comments associated with the IP to
    provide context and evaluate risk.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Dropdown | Yes | Specify the threshold where the entity should be
    marked as malicious or suspicious. |

    | Retrieve Comments | Boolean | No | If enabled, the action will retrieve comments
    about the entity from Pulsedive. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, the action will
    only create an insight for entities that meet or exceed the specified risk threshold.
    |

    | Max Comments To Return | String | No | Specify the maximum number of comments
    to return if 'Retrieve Comments' is enabled. |


    ### Action Flow

    1. Filters the target entities to include only IP Addresses (`ADDRESS`).

    2. Iterates through each IP and fetches indicator data from the Pulsedive API.

    3. Evaluates the retrieved risk score against the configured `Threshold` to determine
    if the IP is suspicious.

    4. Enriches the entity's additional properties with the retrieved threat data.

    5. Optionally adds a data table with comments to the case wall if comments were
    retrieved.

    6. Creates an entity insight with the threat details (conditionally based on the
    'Only Suspicious Entity Insight' parameter).

    7. Updates the enriched entities in the Google SecOps platform.
  capabilities:
