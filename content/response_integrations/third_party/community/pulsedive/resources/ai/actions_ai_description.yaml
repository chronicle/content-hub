Scan Indicator:
  ai_description: >-
    Performs a scan on indicators (IPs, Domains, URLs, Hashes) using Pulsedive to
    retrieve threat intelligence, risk scores, and community comments. This is an
    asynchronous action that initiates a scan task, polls for completion, and then
    enriches the entities within Google SecOps based on the results.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan Type | DDL | Yes | Choose between 'Passive' (retrieves existing data without
    direct interaction) or 'Active' (performs a live, more intrusive scan). |

    | Threshold | DDL | Yes | Specifies the risk level (verylow, low, medium, high,
    critical) at which an entity should be marked as suspicious in Google SecOps.
    |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, the action will
    only generate an entity insight if the indicator's risk level meets or exceeds
    the specified 'Threshold'. |

    | Retrieve Comments | Boolean | No | If enabled, the action will fetch community
    comments associated with the indicator from Pulsedive. |

    | Max Comments To Return | String | No | Defines the maximum number of comments
    to retrieve and display in the case wall data table. Default is 50. |


    ### Flow Description


    1. **Submission**: The action submits the target entities to Pulsedive's analysis
    engine via a POST request, specifying the desired scan type (Active or Passive).

    2. **Polling**: As an asynchronous operation, the action periodically checks the
    status of the submitted scan IDs until Pulsedive marks them as 'done'.

    3. **Data Retrieval**: Once completed, the action fetches the full indicator report,
    including the risk level, risk factors, and community comments.

    4. **Risk Evaluation**: It compares the indicator's risk level against the user-defined
    'Threshold'. If the risk is equal to or higher than the threshold, the entity
    is marked as suspicious (`is_suspicious = True`).

    5. **Enrichment**: The action updates the entity's additional properties with
    Pulsedive metadata and sets the 'is_enriched' flag.

    6. **Reporting**: It generates entity insights (optionally filtered) and populates
    data tables with community comments for analyst review.


    ### Additional Notes


    * This action is asynchronous and its execution time depends on Pulsedive's processing
    speed and the chosen scan type.

    * The 'Threshold' parameter uses a mapping where 'verylow' corresponds to Pulsedive's
    'none' risk score.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Initiates a scan request on the Pulsedive platform via a POST request to the
      analysis endpoint, which creates a new analysis task.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious status, adds enrichment data to entity properties,
      creates entity insights, and adds data tables for comments to the case wall.
