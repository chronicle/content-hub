Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the Pulsedive API. It ensures that the
    provided configuration parameters, such as the API Root and API Key, are valid
    and that the network path is open.


    ### Parameters Description

    There are no runtime parameters for this action. It relies entirely on the integration's
    global configuration (API Root, API Key, and Verify SSL).


    ### Additional Notes

    - This action is typically used during the initial setup of the Pulsedive integration
    or for troubleshooting connection issues.

    - It performs a test search request to the Pulsedive API to confirm that the credentials
    have the necessary permissions to interact with the service.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the global configuration parameters (API Root, API Key, and SSL verification settings).

    2. **Manager Setup**: It instantiates the `PulsediveManager` using the retrieved
    configuration.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a GET request to the Pulsedive search endpoint with a set of test parameters.

    4. **Validation**: If the API responds with a successful status code, the action
    confirms connectivity. If an exception occurs (e.g., 401 Unauthorized, 404 Not
    Found, or network timeout), the action captures the error.

    5. **Completion**: The action terminates, returning a success message if the connection
    was established or a failure message with error details if it was not.
