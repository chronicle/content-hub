Scan Indicator:
  ai_description: >-
    ### General Description

    Submits indicators to Pulsedive for active or passive scanning and retrieves the
    analysis results to enrich the entities. This action evaluates the risk of the
    indicators based on a specified threshold and updates their suspicious status
    accordingly.


    ### Flow Description

    1. Iterates through all target entities.

    2. Submits each entity's identifier to Pulsedive for scanning using the specified
    scan type (Active or Passive) via the `/api/analyze.php` endpoint.

    3. Periodically checks the status of the scan until it is completed.

    4. Retrieves the scan results, including risk scores and optional comments.

    5. Evaluates the risk score against the provided threshold to determine if the
    entity should be marked as suspicious.

    6. Enriches the entity with the scan data, creates an insight, and optionally
    adds a data table with comments to the case wall.


    ### Additional Notes

    This action runs asynchronously.
