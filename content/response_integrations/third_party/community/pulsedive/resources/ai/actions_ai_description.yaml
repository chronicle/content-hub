Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using threat intelligence from Pulsedive. This action retrieves
    comprehensive indicator data, including risk levels, risk factors, and community
    comments, to provide security analysts with actionable context. It evaluates the
    URL's risk against a user-defined threshold and can automatically mark entities
    as suspicious within the platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Max Comments To Return | String | No | Specifies the maximum number of Pulsedive
    comments to retrieve and display (Default: 50). |

    | Threshold | DDL | Yes | The risk level (verylow, low, medium, high, critical)
    at which the entity should be labeled as suspicious. |

    | Retrieve Comments | Boolean | No | If enabled, the action fetches community
    comments associated with the URL. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, insights will only
    be generated for entities that meet or exceed the risk threshold. |


    ### Flow Description

    1. **Initialization**: The action initializes the Pulsedive manager using the
    provided API root and key.

    2. **Entity Filtering**: It identifies all URL entities within the current alert
    context.

    3. **Data Retrieval**: For each URL, it queries the Pulsedive API to fetch indicator
    details, risk scores, and (optionally) comments.

    4. **Risk Evaluation**: The URL's risk level is compared against the user-defined
    threshold. If the risk is equal to or higher than the threshold, the entity is
    marked as suspicious.

    5. **Enrichment**: Entity attributes are updated with Pulsedive metadata (prefixed
    with 'PD'), and the entity is marked as enriched.

    6. **Case Wall Reporting**: If comments are retrieved, they are formatted into
    a data table and added to the case wall.

    7. **Insight Generation**: A detailed HTML insight is created for the entity,
    summarizing the risk level and specific risk factors identified by Pulsedive.

    8. **Finalization**: The action updates the entities in Google SecOps and returns
    a summary of successful and failed enrichments.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious status, populates enrichment fields, adds data tables
      to the case wall for comments, and creates entity insights.
  categories:
