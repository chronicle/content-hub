Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Pulsedive. This action retrieves threat intelligence,
    risk levels, and user comments associated with the URL to provide context for
    security investigations.


    ### Flow Description

    1. Filters the target entities to include only URL entities.

    2. Iterates over the filtered entities and makes a GET request to the Pulsedive
    API (`/api/info.php`) to fetch indicator data and comments.

    3. Evaluates the retrieved risk score against the provided `Threshold` parameter.
    If the risk is equal to or higher than the threshold, the entity is marked as
    suspicious.

    4. Enriches the entity's additional properties with the retrieved threat intelligence
    data.

    5. Creates a case wall data table containing any retrieved comments if applicable.

    6. Generates an insight for the entity, which can be configured to only trigger
    for suspicious entities.

    7. Updates the enriched entities within the Google SecOps platform.


