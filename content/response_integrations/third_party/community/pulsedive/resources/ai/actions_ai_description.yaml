    get_alert_information: false
    reasoning: >-
      The action submits an indicator to Pulsedive for scanning and retrieves the
      resulting threat intelligence, risk score, and comments. This aligns with the
      'Enrich IOC' category, as it returns reputation and threat intelligence for
      the indicator. It does not perform any containment, ticketing, or messaging
      operations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
