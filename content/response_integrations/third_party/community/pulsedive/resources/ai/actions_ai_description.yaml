  ai_description: >-
    ### General Description

    Performs a scan on an indicator (e.g., IP, URL, Hash) using the Pulsedive platform
    to retrieve threat intelligence, risk assessments, and associated comments. This
    action automates the submission of indicators for analysis, polls for completion,
    and enriches the entity within Google SecOps with the gathered intelligence.


    ### Flow Description

    1. **Submission**: The action submits the target indicators to Pulsedive for analysis
    using either a 'Passive' or 'Active' scan type.

    2. **Polling**: The action periodically checks the status of the scan reports
    until they are completed.

    3. **Retrieval**: Once completed, it fetches the detailed scan data, including
    risk scores, risk factors, and comments.

    4. **Enrichment**: It updates the entity's `additional_properties` with the retrieved
    data, marks the entity as suspicious if it meets the configured risk threshold,
    and generates an entity insight.

    5. **Reporting**: It adds a data table containing comments to the case and returns
    a JSON result containing the full scan details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Scan Type** | ddl | Yes | Determines the scan method: 'Passive' (no direct
    reach-out) or 'Active' (more noisy). |

    | **Threshold** | ddl | Yes | The risk level (verylow, low, medium, high, critical)
    at which an entity is marked as suspicious. |

    | **Only Suspicious Entity Insight** | boolean | No | If enabled, creates insights
    only for entities identified as suspicious. |

    | **Retrieve Comments** | boolean | No | If enabled, fetches and includes comments
    associated with the indicator. |

    | **Max Comments To Return** | string | No | Specifies the maximum number of comments
    to retrieve. |


    ### Additional Notes

    - This action is designed for indicator enrichment and does not perform any external
    blocking or containment operations.

    - The action supports asynchronous execution, allowing it to wait for scan results
    without blocking the entire workflow.
