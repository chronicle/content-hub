  ai_description: >-
    Performs a security scan on indicators using Pulsedive to retrieve comprehensive
    threat intelligence. This action is asynchronous and supports both Passive (metadata
    lookup) and Active (direct probing) scan types. It evaluates the risk level of
    each entity against a user-defined threshold, marking entities as suspicious if
    they meet or exceed the limit. The action enriches entities with Pulsedive-specific
    properties, generates detailed HTML insights, and creates data tables for community
    comments.


    ### Flow Description:

    1. **Submission**: The action iterates through all target entities and submits
    them to Pulsedive for analysis based on the selected `Scan Type` (Passive or Active).

    2. **Polling**: As an asynchronous action, it periodically checks the status of
    the scan using the queue ID (QID) until the report is marked as 'done'.

    3. **Data Retrieval**: Once the scan is complete, the action fetches the full
    report, including risk scores, risk factors, and community comments.

    4. **Risk Evaluation**: The retrieved risk level is compared against the user-provided
    `Threshold`. If the risk is equal to or higher than the threshold, the entity's
    suspicious status is updated in the SOAR.

    5. **Enrichment & Insights**: The action updates the entity's additional properties
    with Pulsedive metadata, creates an HTML insight for the analyst, and adds a data
    table containing community comments to the case wall.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, insights will only
    be created for entities that meet or exceed the risk threshold. Default is false.
    |

    | Scan Type | DDL | Yes | Choose between 'Passive' (fetch existing data without
    direct contact) or 'Active' (perform a live, more intrusive scan). |

    | Max Comments To Return | String | No | The maximum number of community comments
    to retrieve for the indicator. Default is 50. |

    | Threshold | DDL | Yes | The risk level (verylow, low, medium, high, critical)
    required to mark an entity as suspicious. |

    | Retrieve Comments | Boolean | No | If enabled, community comments from Pulsedive
    will be retrieved and displayed in a data table. Default is true. |


    ### Additional Notes:

    - The action uses the `OriginalIdentifier` property of the entity if available,
    otherwise it uses the standard identifier.

    - Risk scores are mapped internally to numerical values (0-4) to facilitate threshold
    comparison.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
