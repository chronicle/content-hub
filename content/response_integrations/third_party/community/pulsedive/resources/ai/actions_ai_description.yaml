Enrich IP:
  ai_description: "Enriches IP Address entities using threat intelligence from Pulsedive.\
    \ This action retrieves detailed indicator data, including risk levels, risk factors,\
    \ and community comments, to provide context for security alerts.\n\n### Flow\
    \ Description\n1. **Filter Entities:** Identifies all IP Address (ADDRESS) entities\
    \ within the current context.\n2. **Fetch Intelligence:** For each IP, it queries\
    \ the Pulsedive API to retrieve reputation data, risk scores, and optionally,\
    \ community comments.\n3. **Risk Evaluation:** Compares the retrieved risk level\
    \ against the user-defined 'Threshold'. If the risk meets or exceeds the threshold,\
    \ the entity is marked as suspicious in Google SecOps.\n4. **Internal Enrichment:**\
    \ Updates the entity's additional properties with Pulsedive metadata and sets\
    \ the 'is_enriched' flag.\n5. **Insight & Reporting:** \n    * Creates an entity\
    \ insight containing a summary of the risk analysis.\n    * If comments are retrieved,\
    \ it constructs a data table on the case wall for analyst review.\n6. **Final\
    \ Update:** Commits all entity changes (suspicious status and enrichment properties)\
    \ back to the SecOps platform.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Threshold | DDL\
    \ | Yes | The risk level (verylow, low, medium, high, critical) at which an entity\
    \ should be marked as suspicious. Default is 'medium'. |\n| Retrieve Comments\
    \ | Boolean | No | If enabled, the action fetches community comments associated\
    \ with the IP from Pulsedive. Default is true. |\n| Only Suspicious Entity Insight\
    \ | Boolean | No | If enabled, insights will only be created for entities that\
    \ meet the risk threshold. Default is false. |\n| Max Comments To Return | String\
    \ | No | Specifies the maximum number of comments to retrieve and display in the\
    \ data table. Default is 50. |\n\n### Additional Notes\n* The action uses a mapping\
    \ system to translate Pulsedive's risk strings into numerical scores for comparison\
    \ against the user-provided threshold.\n* Data tables are added to the case wall\
    \ for each entity that has associated comments, provided 'Retrieve Comments' is\
    \ enabled."
  capabilities:
    can_create_case_comments: true
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with enrichment data, marks entities as
      suspicious based on risk thresholds, creates entity insights, and adds data
      tables containing comments to the case wall.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
