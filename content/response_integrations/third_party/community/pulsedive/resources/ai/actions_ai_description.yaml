  ai_description: >-
    ### General Description

    Enriches URL entities using Pulsedive. This action retrieves threat intelligence,
    risk scores, and comments for the specified URLs. It evaluates the risk based
    on a configured threshold, updates the entity's suspicious status, enriches the
    entity with additional properties, and generates an insight with the analysis
    results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Max Comments To Return | String | No | Specify how many comments to return.
    Default is 50. |

    | Threshold | Drop-down | Yes | Specify the threshold where the entity should
    be marked as malicious or suspicious. Options: verylow, low, medium, high, critical.
    Default is medium. |

    | Retrieve Comments | Boolean | No | If enabled, the action will retrieve comments
    about the entity. Default is true. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, the action will
    only create an insight for suspicious entities. Default is false. |


    ### Flow Description

    1. Iterates over target entities and filters for URL entities.

    2. For each URL, fetches indicator data from Pulsedive, optionally retrieving
    comments based on the `Retrieve Comments` parameter.

    3. Evaluates the risk score against the provided `Threshold`. If the risk is equal
    to or higher than the threshold, marks the entity as suspicious.

    4. Enriches the entity with the retrieved data.

    5. Creates a case wall data table for comments if any are found.

    6. Creates an entity insight based on the `Only Suspicious Entity Insight` parameter.

    7. Updates the entities in Google SecOps and returns a JSON result.
