Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using threat intelligence data from Pulsedive. This
    action retrieves risk scores, threat data, and user comments associated with the
    IP address, evaluates the risk against a specified threshold, and updates the
    entity's properties and suspicious status accordingly.


    ### Flow Description

    1. Filters the target entities to identify those of type `ADDRESS` (IP addresses).

    2. Iterates over each suitable entity and makes a GET request to the Pulsedive
    API (`/api/info.php`) to fetch indicator data and optionally retrieve comments.

    3. Evaluates the retrieved risk score against the provided `Threshold` parameter.
    If the risk meets or exceeds the threshold, the entity is marked as suspicious.

    4. Enriches the entity's `additional_properties` with the retrieved threat intelligence
    data.

    5. If comments are retrieved, creates a case wall data table displaying the comments
    for the entity.

    6. Generates an insight for the entity containing risk factors and threat details,
    depending on the `Only Suspicious Entity Insight` parameter.

    7. Updates the enriched entities within the Google SecOps platform and outputs
    the raw data as a JSON result.


    ### Additional Notes

    - The action will only process entities of type `ADDRESS`.

    - The `Max Comments To Return` parameter is only applicable if `Retrieve Comments`
    is enabled.
  ai_short_description: >-
    Enriches IP Address entities by retrieving threat intelligence, risk scores, and
    comments from Pulsedive, updating the entities and generating insights based on
    configurable risk thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Pulsedive API using a GET request. It does
      not mutate external data. Internally, it updates entities with enrichment data
      and creates insights, but does not create case comments or modify alert data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
