      change their state (can_mutate_external_data=false). It updates internal entities
      with enrichment data and creates entity insights (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true). It does not modify alert
      data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data, and its internal mutations are limited to updating
      entities and creating insights. Therefore, it qualifies as an Enrichment action.
      It does not perform any remediation tasks.
    remediation: false
  entity_usage:
