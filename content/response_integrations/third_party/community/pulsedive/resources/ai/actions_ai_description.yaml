Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Pulsedive server to ensure that the provided integration
    connection parameters are correct.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the Pulsedive API manager.

    3. Makes a test API call (GET request to `/api/search.php`) to verify connectivity.

    4. Returns a successful result if the connection is established, otherwise returns
    a failure.


    ### Additional Notes

    This action is typically used for diagnostic purposes to verify integration setup
    and does not interact with case entities or modify any data.
