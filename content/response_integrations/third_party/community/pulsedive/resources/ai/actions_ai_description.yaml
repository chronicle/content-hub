Get Threat Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive threat intelligence from Pulsedive based on a specific
    threat name or threat ID. This action provides detailed context including risk
    summaries, associated news, and user comments, helping analysts understand the
    nature and severity of a known threat actor or campaign.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat Name | String | No | The name of the threat to retrieve information for
    (e.g., 'Zeus'). |

    | Threat ID | String | No | The unique Pulsedive ID for the threat. |

    | Retrieve Comments | Boolean | No | If set to true, retrieves and displays user
    comments associated with the threat. Default is true. |

    | Split Risk | Boolean | No | If set to true, categorizes the associated indicator
    counts by their risk levels. Default is true. |

    | Create Insight | Boolean | No | If set to true, generates a detailed Siemplify
    Insight within the case containing the threat's risk summary and news. Default
    is false. |


    ### Flow Description

    1. **Parameter Initialization:** The action extracts API credentials from the
    integration configuration and retrieves the user-provided threat identifiers and
    display options.

    2. **Data Retrieval:** It queries the Pulsedive API using either the provided
    `Threat Name` or `Threat ID` to fetch the threat's metadata, risk summary, and
    news.

    3. **Comment Processing:** If `Retrieve Comments` is enabled, the action fetches
    associated comments and formats them into a data table for the case wall.

    4. **Insight Generation:** If `Create Insight` is enabled, the action constructs
    a formatted HTML insight containing the threat's category, risk summary (counts
    of indicators by risk level), wiki summary, and recent news links.

    5. **Result Output:** The action returns the full threat data as a JSON object
    and provides a success message if the threat details were successfully found.


    ### Additional Notes

    Either the **Threat Name** or the **Threat ID** must be provided for the action
    to successfully locate threat data. If neither is provided, the action will fail.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
