  reasoning: >-
    The Pulsedive integration is a dedicated Threat Intelligence platform. Its primary
    function is to provide enrichment for indicators of compromise (IOCs) such as
    IP addresses, URLs, and file hashes. The actions 'Enrich IP', 'Enrich URL', 'Get
    Threat Details', and 'Scan Indicator' all focus on retrieving reputation data,
    risk scores, and threat intelligence from the Pulsedive platform to help analysts
    confirm if an alert is a True Positive. It does not perform SIEM log searching,
    EDR host containment, network blocking, ITSM ticketing, or other operational tasks.
    Therefore, it strictly falls under the 'Threat Intelligence' category.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
