  network_security: false
  reasoning: >-
    The Pulsedive integration is a dedicated Threat Intelligence platform. Its primary
    actions, such as 'Enrich IP', 'Enrich URL', 'Get Threat Details', and 'Scan Indicator',
    are designed to retrieve reputation, risk scores, and threat intelligence data
    for various indicators (IPs, URLs, Hashes). It does not perform log analysis (SIEM),
    host containment (EDR), network blocking (Network Security), identity management
    (IAM), or ticket management (ITSM). Consequently, it aligns exclusively with the
    'Threat Intelligence' category.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
