Sheet Connector:
  ai_description: >-
    ### General Description

    The Sheet Connector allows Google SecOps to ingest data directly from Google Sheets.
    It treats each row in a specified worksheet as a potential security event, converting
    them into alerts and cases. This is particularly useful for ingesting manually
    maintained watchlists, tracking logs, or simple automation triggers stored in
    a spreadsheet format.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert Name Column Index | Integer | Yes | The zero-based index of the column
    to be used as the Alert Name. |

    | Credentials Json | String | Yes | The JSON content of a Google Service Account
    key with access to the sheet. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the SOAR. |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type. |

    | Filter Alert Column Index | Integer | No | The index of a column used to filter
    which rows should be ingested. |

    | Filter Alert Column Value | String | No | The specific value required in the
    filter column for a row to be processed. |

    | Product | String | Yes | The product name assigned to the ingested alerts. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    connector execution. |

    | Sheet Id | String | Yes | The unique ID of the Google Sheet (found in the URL).
    |

    | Worksheet Name | String | Yes | The name of the specific tab/worksheet to pull
    data from (e.g., Sheet1). |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Google Sheets API
    using the provided Service Account JSON credentials.

    2. **Sheet Access**: It opens the spreadsheet identified by the Sheet Id and selects
    the specified Worksheet Name.

    3. **Data Retrieval**: The connector fetches all values from the worksheet, identifying
    the first row as the header for field mapping.

    4. **Filtering**: For each row (starting from the second row), it checks if a
    filter is configured. If the value in the Filter Alert Column Index does not match
    the Filter Alert Column Value, the row is skipped.

    5. **Alert Creation**: For valid rows, it generates a unique Alert ID and sets
    the Alert Name based on the configured column index.

    6. **Event Mapping**: Each cell in the row is mapped to an event field using the
    header names retrieved in step 3.

    7. **Ingestion**: The constructed alerts, containing the row data as events, are
    returned to Google SecOps for case creation.
