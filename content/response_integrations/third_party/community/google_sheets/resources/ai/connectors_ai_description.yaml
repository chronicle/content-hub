Sheet Connector:
  ai_description: >-
    ### General Description

    The Google Sheet Connector allows users to ingest data from Google Sheets into
    Google SecOps as security alerts. It provides a flexible way to transform spreadsheet
    rows into actionable alerts, supporting filtering and custom naming conventions
    based on column data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert Name Column Index | Integer | Yes | The column index to use for the alert
    name. |

    | Credentials Json | String | Yes | The JSON service account credentials for Google
    Sheets API access. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Filter Alert Column Index | Integer | No | The column index to use for filtering
    alerts. |

    | Filter Alert Column Value | String | No | The value to match in the filter column.
    |

    | Product | String | Yes | The product name associated with the alerts. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    script execution. |

    | Sheet Id | String | Yes | The unique identifier of the Google Sheet. |

    | Worksheet Name | String | Yes | The name of the specific worksheet to read.
    |


    ### Flow Description

    1. Authenticates with the Google Sheets API using the provided service account
    credentials.

    2. Opens the target Google Sheet using the provided Sheet ID and selects the specified
    worksheet.

    3. Fetches all data rows from the worksheet.

    4. Iterates through each row, applying optional filtering logic if a filter column
    index and value are provided.

    5. Constructs an alert object for each valid row, mapping row data to event fields
    and setting the alert name based on the configured column index.

    6. Returns the generated alerts to the SOAR platform for processing and case creation.
