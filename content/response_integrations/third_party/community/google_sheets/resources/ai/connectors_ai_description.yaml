Sheet Connector:
  ai_description: >-
    ### General Description

    This connector integrates with Google Sheets to ingest data rows as alerts into
    Google SecOps. It allows security teams to automate the ingestion of manual logs,
    tracking spreadsheets, or any tabular data stored in Google Drive, converting
    each row into a structured alert for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Credentials Json | String | Yes | Service account credentials in JSON format
    used for Google API authentication. |

    | Sheet Id | String | Yes | The unique identifier of the Google Spreadsheet (found
    in the URL). |

    | Worksheet Name | String | Yes | The name of the specific tab/worksheet to pull
    data from (e.g., 'Sheet1'). |

    | Alert Name Column Index | Integer | Yes | The 0-based index of the column to
    use for the Alert Name. Set to -1 to use the Product name instead. |

    | Product | String | Yes | The product name to assign to the ingested alerts and
    events. |

    | Filter Alert Column Index | Integer | No | The 0-based index of the column used
    to filter rows for ingestion. |

    | Filter Alert Column Value | String | No | The specific value to match in the
    filter column; only matching rows will be ingested. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the SOAR mapping. |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    connector execution. |


    ### Flow Description

    1. **Authentication**: Connects to the Google Sheets API using the provided Service
    Account JSON credentials.

    2. **Resource Access**: Opens the spreadsheet using the 'Sheet Id' and selects
    the specified 'Worksheet Name'.

    3. **Data Retrieval**: Reads the first row to establish headers and then fetches
    all subsequent data rows.

    4. **Filtering**: If filtering parameters are provided, the connector checks the
    value at the specified column index for each row, skipping rows that do not match.

    5. **Alert Creation**: For each valid row, a unique Alert object is created. The
    alert name is derived from the configured column index.

    6. **Event Mapping**: Maps every cell in the row to an event dictionary, using
    the worksheet headers as keys.

    7. **Ingestion**: Packages the alerts and events, then sends them to Google SecOps
    for case creation.
