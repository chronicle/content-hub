Sheet Connector:
  ai_description: >-
    ### General Description

    This connector integrates with Google Sheets to ingest data as alerts into Google
    SecOps (SOAR). It allows users to treat rows in a spreadsheet as security events
    or alerts, enabling automation workflows based on spreadsheet-based data sources.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert Name Column Index | Integer | Yes | The column index to use for the alert
    name. |

    | Credentials Json | String | Yes | The JSON string containing Google Service
    Account credentials. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Filter Alert Column Index | Integer | No | The column index to use for filtering
    rows. |

    | Filter Alert Column Value | String | No | The value to filter by in the specified
    column. |

    | Product | String | Yes | The product name associated with the alerts. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | Sheet Id | String | Yes | The unique identifier of the Google Sheet. |

    | Worksheet Name | String | Yes | The name of the specific worksheet to pull data
    from. |


    ### Flow Description

    1. Authenticates with Google Sheets using the provided service account JSON credentials.

    2. Opens the specified Google Sheet by ID and selects the target worksheet.

    3. Retrieves all rows from the worksheet.

    4. Iterates through the rows, applying optional filtering based on a specific
    column index and value if configured.

    5. Maps each row to an AlertInfo object, using the configured column index to
    determine the alert name.

    6. Constructs events from the row data, mapping headers to event fields.

    7. Returns the generated alerts to the SOAR platform for processing.
