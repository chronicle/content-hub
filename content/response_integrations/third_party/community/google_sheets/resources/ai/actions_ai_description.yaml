Delete Rows:
  ai_description: >-
    ### General Description

    Deletes a specified range of rows from a Google Sheets worksheet. This action
    is useful for cleaning up logs, removing processed data, or managing spreadsheet-based
    databases directly from a SOAR workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | string | Yes | The unique identifier of the spreadsheet, found in
    the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`. |

    | Worksheet Name | string | No | The name of the specific tab/worksheet. Defaults
    to the first sheet (Sheet1) if not provided. Note: This is case-sensitive. |

    | From Row | string | Yes | The starting row number for the deletion range (inclusive).
    |

    | To Row | string | Yes | The ending row number for the deletion range (inclusive).
    |


    ### Additional Notes

    - The action requires valid Google Service Account credentials with appropriate
    permissions (Spreadsheets and Drive scopes) configured in the integration settings.

    - Row numbers are 1-indexed.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the Google Service Account credentials
    from the integration configuration.

    2. **Parameter Parsing:** Extracts the Sheet ID, Worksheet Name, and the row range
    (From/To) from the action input.

    3. **Authentication:** Initializes a connection to the Google Sheets API using
    the provided credentials.

    4. **Worksheet Selection:** Opens the spreadsheet by ID and selects the specified
    worksheet (or the first one by default).

    5. **Execution:** Executes the row deletion command for the specified range.

    6. **Completion:** Returns a success message if the rows are deleted or an error
    message if the operation fails.
