Get Row:
  ai_description: >-
    ### General Description

    The **Get Row** action retrieves all values from a specific row within a Google
    Sheets spreadsheet. This is useful for fetching contextual data, configuration
    settings, or lookup information stored in a spreadsheet format. The action returns
    the row data as a JSON array of values.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the spreadsheet's URL (e.g., `https://docs.google.com/spreadsheets/d/<Sheet-Id>/edit`).
    |

    | **Worksheet Name** | String | No | The name of the specific worksheet (tab)
    to retrieve the row from. If not provided, the action defaults to the first worksheet
    (`sheet1`). |

    | **Row Number** | String | Yes | The one-based index of the row to retrieve (e.g.,
    '1' for the first row). |


    ### Additional Notes

    - The action uses service account credentials configured in the integration settings
    to access the Google Sheets API.

    - The row number is one-based, meaning the first row is 1, the second is 2, and
    so on.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Sheets using
    the provided service account credentials.

    2. **Spreadsheet Access**: It opens the spreadsheet identified by the **Sheet
    Id**.

    3. **Worksheet Selection**: If a **Worksheet Name** is provided, it selects that
    specific tab; otherwise, it defaults to the first tab in the spreadsheet.

    4. **Data Retrieval**: The action fetches all values for the specified **Row Number**
    using the `row_values` method.

    5. **Output**: The retrieved values are added to the action's JSON results and
    the execution completes successfully.
