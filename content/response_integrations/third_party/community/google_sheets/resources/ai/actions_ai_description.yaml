  ai_description: >-
    ### General Description

    This action allows users to manage data within a Google Spreadsheet by either
    updating existing rows or adding new ones. It searches for a specific value within
    a designated column; if a match is found, the action updates the corresponding
    row within a specified column range. If no match is found, the data is appended
    as a new row at the end of the sheet. This is particularly useful for maintaining
    dynamic lists, logs, or tracking statuses in a centralized spreadsheet.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Column Number | string | Yes | The index of the column (e.g., "1") where the
    action will search for the value specified by the 'Field Name'. |

    | Start Column | string | Yes | The starting column letter (e.g., "A") for the
    range to be updated or added. |

    | End Column | string | Yes | The ending column letter (e.g., "C") for the range
    to be updated or added. |

    | Field Name | string | Yes | The key within the provided JSON object whose value
    will be used as the search term in the spreadsheet. |

    | Json | code | Yes | A JSON array of objects representing the rows to be processed.
    Each object should contain the keys to be mapped to the spreadsheet columns. |

    | Sheet Id | string | Yes | The unique identifier of the Google Spreadsheet, found
    in the URL. |

    | Worksheet Name | string | No | The name of the specific tab/worksheet to use.
    Defaults to the first sheet if not provided. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Google Sheets API using
    the provided service account credentials.

    2. **Initialization**: It opens the spreadsheet using the `Sheet Id` and selects
    the target worksheet.

    3. **Data Parsing**: The input `Json` string is parsed into a list of row objects.

    4. **Search and Process**: For each row object in the list:
        * It extracts the value associated with the `Field Name` key.
        * It searches the specified `Column Number` in the worksheet for this value.
        * **Update**: If the value is found, the action calculates the target range
    (using `Start Column`, `End Column`, and the found row index) and updates the
    cells with the values from the JSON object.
        * **Append**: If the value is not found, the action appends the values from
    the JSON object as a new row at the bottom of the worksheet.
    5. **Completion**: The action returns the total count of rows that were successfully
    added or updated.


    ### Additional Notes

    * The `Json` parameter must be a valid JSON array of objects.

    * Ensure the service account has the necessary permissions (Editor access) to
    the target spreadsheet.
