Add Row:
  ai_description: >-
    ### General Description

    The **Add Row** action allows users to programmatically append or insert a new
    row of data into a specific Google Sheets spreadsheet. This is useful for logging
    alert data, tracking incident response progress, or maintaining external audit
    trails directly from a Google SecOps playbook.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the URL: `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`. |

    | **Worksheet Name** | String | No | The name of the specific tab (worksheet)
    within the spreadsheet. Defaults to the first sheet (usually "Sheet1") if not
    provided. Note: This is case-sensitive. |

    | **Row Index** | String | No | The one-based index where the row should be inserted.
    If omitted, the row is typically appended or inserted at the default position
    defined by the API (usually the top). |

    | **Values** | String | Yes | A comma-separated list of values to be placed in
    the cells of the new row (e.g., "Value1,Value2,Value3"). |


    ### Additional Notes

    - The action requires valid Service Account credentials (JSON format) configured
    in the integration settings to authenticate with the Google Sheets API.

    - The `Row Index` must be a valid integer string if provided.


    ### Flow Description

    1. **Initialization**: The action extracts the Google Sheets credentials from
    the integration configuration and the user-provided parameters (Sheet ID, Worksheet
    Name, Row Index, and Values).

    2. **Data Parsing**: The comma-separated `Values` string is split into a list
    of individual cell values.

    3. **Connection**: The action uses the `GoogleSheetFactory` to authenticate and
    open the spreadsheet identified by the `Sheet Id`.

    4. **Worksheet Selection**: It selects the worksheet by name if provided; otherwise,
    it defaults to the first worksheet in the file.

    5. **Row Insertion**: The action calls the Google Sheets API to insert the row
    at the specified `Row Index`. If no index is provided, it inserts the row at the
    default position.

    6. **Completion**: The action returns a success status if the row is added successfully,
    or a failure status if an error occurs (e.g., invalid Sheet ID or permissions
    issues).
