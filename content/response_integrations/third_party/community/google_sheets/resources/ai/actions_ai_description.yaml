Get Range:
  ai_description: >-
    Retrieves values from a specified range within a Google Sheets spreadsheet. This
    action is designed to fetch data such as lookup tables, reference lists, or configuration
    data stored in a spreadsheet for use within a playbook logic flow.


    ### Flow Description:

    1. **Authentication**: Initializes the Google Sheets API client using the provided
    service account credentials from the integration configuration.

    2. **Spreadsheet Access**: Connects to the specific spreadsheet using the provided
    `Sheet Id`.

    3. **Worksheet Selection**: Selects the target worksheet (tab). If a `Worksheet
    Name` is provided, it selects that specific tab; otherwise, it defaults to the
    first worksheet in the file.

    4. **Data Extraction**: Retrieves the values from the cells defined by the `Range`
    parameter using A1 notation.

    5. **Result Processing**: Returns the fetched data as a JSON object and completes
    the action with a success message.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | String | Yes | The unique identifier of the spreadsheet, found in
    the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`. |

    | Worksheet Name | String | No | The name of the worksheet tab. Note that this
    is case-sensitive. If left blank, the action defaults to the first tab. |

    | Range | String | Yes | The cell range to extract using A1 notation (e.g., "A1:C10"
    or "Sheet1!A1:B5"). |


    ### Additional Notes:

    - This action is read-only and does not modify the contents of the Google Sheet.

    - Ensure the service account associated with the credentials has at least 'Viewer'
    access to the spreadsheet.
