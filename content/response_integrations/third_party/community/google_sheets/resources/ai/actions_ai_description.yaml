  ai_description: >-
    ### General Description

    Creates a new Google Spreadsheet and optionally shares it with specified email
    addresses. This action is useful for automating the creation of reports, tracking
    logs, or collaborative documents directly from a SOAR workflow.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Sheet Name | The name of the new spreadsheet to be created. | String | Yes |
    This will be the title of the file in Google Drive. |

    | Share with emails | A semicolon-separated list of email addresses (e.g., `user1@example.com;user2@example.com`)
    to grant access to the sheet. | String | No | If provided, each user will be granted
    'writer' permissions. |


    ### Additional Notes

    - The action requires valid Google Service Account credentials with the necessary
    scopes for Google Sheets and Google Drive.

    - Users shared via the 'Share with emails' parameter are granted 'writer' (editor)
    access by default.


    ### Flow Description

    1. **Authentication**: Initializes a connection to the Google Sheets API using
    the provided Service Account credentials.

    2. **Spreadsheet Creation**: Creates a new spreadsheet in the service account's
    Google Drive with the name specified in the 'Sheet Name' parameter.

    3. **Permission Management**: If the 'Share with emails' parameter is populated,
    the action parses the list and iterates through each email address.

    4. **Sharing**: For each email, it updates the spreadsheet's permissions to grant
    'writer' access to that specific user.

    5. **Completion**: Returns the unique ID of the newly created spreadsheet and
    completes the execution.
