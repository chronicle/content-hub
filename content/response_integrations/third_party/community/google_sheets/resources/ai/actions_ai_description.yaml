    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Row Number** | String | Yes | A comma-separated list of row indices (e.g.,
    "1,2,5") that you want to update in the sheet. |

    | **Values** | Content | Yes | A comma-separated list of values (e.g., "Value1,Value2")
    to be placed in the columns of the specified rows. The first value goes to Column
    A, the second to Column B, and so on. |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`. |

    | **Worksheet Name** | String | No | The name of the specific tab (worksheet)
    to update. If left blank, the action defaults to the first worksheet (Sheet1).
    |


    ### Additional Notes

    - The action uses service account credentials configured in the integration settings
    to authenticate with the Google Sheets API.

    - Ensure the service account has 'Editor' permissions on the target spreadsheet.

    - Column updates always start from Column 1 (Column A).


    ### Flow Description

    1. **Initialization**: The action extracts the Google Sheets credentials from
    the integration configuration and the row/value details from the action parameters.

    2. **Connection**: It establishes a connection to the Google Sheets API using
    the provided service account JSON.

    3. **Targeting**: It opens the spreadsheet identified by the `Sheet Id` and selects
    the specified `Worksheet Name` (or the first sheet by default).

    4. **Execution**: It iterates through each provided row number. For every row,
    it iterates through the list of values and updates the corresponding cells (Row
    X, Column 1; Row X, Column 2, etc.).

    5. **Completion**: If all updates are successful, the action returns a success
    message; otherwise, it catches and reports the specific error encountered.
