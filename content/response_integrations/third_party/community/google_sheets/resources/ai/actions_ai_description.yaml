  ai_description: >-
    ### General Description

    This action adds a new row of data to a specified Google Sheet. It is useful for
    logging information, tracking incident response progress, or exporting data from
    Google SecOps to a spreadsheet for external reporting.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | String | Yes | The unique identifier of the spreadsheet, found in
    the URL: `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`. |

    | Worksheet Name | String | No | The name of the specific tab (worksheet) within
    the spreadsheet. Defaults to the first sheet if not provided. Note: This is case-sensitive.
    |

    | Row Index | String | No | The one-based index where the row should be inserted.
    If not provided, the row is typically appended or inserted at a default position
    defined by the API. |

    | Values | String | Yes | A comma-separated list of values to be inserted into
    the new row (e.g., "value1,value2,value3"). |


    ### Additional Notes

    - The `Values` parameter must be a comma-separated string. Each comma-separated
    element will occupy one cell in the new row.

    - Ensure the service account associated with the provided credentials has 'Editor'
    access to the target spreadsheet.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google Sheets service
    account credentials from the integration configuration.

    2. **Parameter Parsing:** It extracts the `Sheet Id`, `Worksheet Name`, `Row Index`,
    and the `Values` string from the action input.

    3. **Data Preparation:** The `Values` string is split by commas into a list of
    individual cell values.

    4. **Authentication & Connection:** The action initializes a Google Sheets client
    and opens the spreadsheet using the provided `Sheet Id`.

    5. **Worksheet Selection:** It selects the specified worksheet by name or defaults
    to the first worksheet if no name is provided.

    6. **Row Insertion:** The action inserts the prepared values into the worksheet
    at the specified `Row Index` (or uses the default insertion logic if no index
    is provided).

    7. **Completion:** The action returns a success status if the row is added successfully.
