  ai_description: >-
    ### General Description

    The **Get All** action retrieves all rows and columns from a specified worksheet
    within a Google Spreadsheet. It converts the spreadsheet data into a list of JSON
    objects, where each object represents a row and the keys correspond to the column
    headers. This action is primarily used for ingesting reference data, lookup tables,
    or logs stored in Google Sheets into a Google SecOps workflow for further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the URL: `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`. |

    | **Worksheet Name** | String | No | The name of the specific tab (worksheet)
    to retrieve data from. If not provided, the action defaults to the first worksheet
    in the spreadsheet. Note: This value is case-sensitive. |


    ### Flow Description

    1. **Initialization**: Extracts the service account credentials from the integration
    configuration and the Sheet ID and Worksheet Name from the action parameters.

    2. **Connection**: Authenticates with the Google Sheets API using the provided
    service account credentials.

    3. **Access**: Opens the spreadsheet using the provided `Sheet Id`.

    4. **Selection**: Targets the worksheet specified by the `Worksheet Name` parameter.
    If the parameter is empty, it defaults to the first sheet in the workbook.

    5. **Data Retrieval**: Fetches all records from the selected worksheet, converting
    them into a list of dictionaries.

    6. **Output**: Returns the retrieved data as a JSON result and completes the execution.


    ### Additional Notes

    - This action does not interact with or filter entities within the Google SecOps
    environment.

    - Ensure the service account associated with the provided Credentials JSON has
    at least "Viewer" permissions on the target spreadsheet.
