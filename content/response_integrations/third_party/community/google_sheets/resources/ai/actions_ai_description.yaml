  ai_description: >-
    ### General Description

    The "Add Permission" action is designed to grant specific access rights (Owner,
    Writer, or Reader) to one or multiple users for a designated Google Sheet. It
    interacts with the Google Sheets API to update the document's sharing settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Sheet Id | String | Yes | The unique identifier of the Google Sheet, which can
    be extracted from the sheet's URL. |

    | Role | Dropdown | Yes | The level of access to grant. Options are "Owner" (full
    control), "Writer" (can edit and comment), and "Reader" (view only). |

    | Emails | String | Yes | A semicolon-separated list of email addresses to which
    the permissions will be granted. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Sheet Id`, `Role`, and
    `Emails` from the action configuration.

    2. **Client Initialization**: It authenticates and initializes the Google Sheets
    client using the provided service account credentials.

    3. **Permission Update**: The action calls the Google Sheets API to insert the
    specified role permissions for the provided email addresses on the target sheet.

    4. **Result Handling**: It returns a success message if the permissions are granted,
    or a failure message if an error occurs during the API call.
