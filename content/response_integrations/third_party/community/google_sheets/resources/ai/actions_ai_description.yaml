  ai_description: >-
    ### General Description

    The **Add or Update Rows** action connects to Google Sheets to add or update rows
    based on a given column name and JSON input. If the specified value is found in
    the sheet, the action updates the existing row; otherwise, it appends a new row.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Column Number | String | Yes | The column number by which the action will look
    for the value of the given Field Name in the JSON. |

    | Start Column | String | Yes | The starting column letter/number from which values
    will be updated or added. |

    | End Column | String | Yes | The ending column letter/number until which values
    will be updated or added. |

    | Field Name | String | Yes | The field name in the given JSON used to search
    for its value in a row by its column number. |

    | Json | Code | Yes | The JSON values to add or update. Each item in the JSON
    array represents one row. Note: each value needs to be unique. |

    | Sheet Id | String | Yes | The ID of the Google Sheet, which can be found in
    the sheet's URL. |

    | Worksheet Name | String | No | The name of the specific worksheet (tab). Defaults
    to "Sheet1" if not provided. Case sensitive. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the provided parameters, including
    the Google Sheets credentials, sheet ID, and JSON data.

    2. **Authentication**: Authenticates with the Google Sheets API using the provided
    credentials.

    3. **Data Parsing**: Parses the input JSON string into a list of dictionaries
    representing the rows to process.

    4. **Row Processing**: Iterates through each row in the parsed JSON:
       - Searches for the specified field value in the designated column.
       - If the value is found, updates the corresponding row within the specified
    start and end columns.
       - If the value is not found, appends a new row to the sheet with the provided
    values.
    5. **Result Compilation**: Collects the updated ranges and returns the total count
    of rows added or updated.
