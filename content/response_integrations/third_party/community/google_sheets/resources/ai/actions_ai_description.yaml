  ai_description: >-
    This action adds permissions to a specific Google Sheet for one or more users.
    It allows administrators or automated workflows to grant 'Owner', 'Writer', or
    'Reader' access levels to users identified by their email addresses. The action
    interacts with the Google Sheets and Google Drive APIs via a service account to
    update the spreadsheet's access control list.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Google Sheets credentials
    from the integration configuration and the 'Sheet Id', 'Role', and 'Emails' from
    the action parameters.

    2. **Client Initialization:** It initializes a Google Sheets client using the
    provided service account credentials and required OAuth scopes.

    3. **Permission Insertion:** The action processes the semicolon-separated list
    of emails and calls the Google API to grant the specified role (Owner, Writer,
    or Reader) to each user for the target spreadsheet.

    4. **Completion:** The action returns a success message if the permissions are
    granted or a failure message if an error occurs during the API call.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | string | True | The unique identifier of the spreadsheet, found in
    the URL (e.g., `https://docs.google.com/spreadsheets/d/{SheetId}/edit`). |

    | Role | ddl | True | The access level to grant: 'Owner' (full control), 'Writer'
    (can edit/comment), or 'Reader' (view only). |

    | Emails | string | True | A semicolon-separated list of email addresses for the
    users receiving the permissions (e.g., `user1@example.com;user2@example.com`).
    |
