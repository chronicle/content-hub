Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity and authentication
    between Google SecOps and the Google Sheets API. It ensures that the provided
    service account credentials have the necessary permissions to perform basic operations,
    such as creating and deleting spreadsheets.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters (specifically the 'Credentials Json').


    ### Additional Notes

    * This action requires the 'Credentials Json' to be correctly configured in the
    Google Sheets integration settings.

    * The action performs a 'smoke test' by creating a temporary file and then removing
    it. This confirms that the service account has both write and delete permissions
    in the target environment.


    ### Flow Description

    1. **Credential Extraction**: The action retrieves the 'Credentials Json' from
    the integration's configuration.

    2. **Client Initialization**: It initializes a Google Sheets client using the
    provided service account information and the required OAuth scopes (Spreadsheets
    and Drive).

    3. **Connectivity Test (Create)**: The action attempts to create a new spreadsheet
    with a unique name (e.g., 'Test-' followed by a random UUID).

    4. **Cleanup (Delete)**: Immediately after creation, the action attempts to delete
    the temporary spreadsheet using its ID.

    5. **Result Reporting**: If both the creation and deletion are successful, the
    action returns a 'Connected successfully' message. If any step fails, it captures
    the error and reports a failure.
