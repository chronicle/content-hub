Search Rows:
  ai_description: >-
    ### General Description

    The **Search Rows** action enables users to locate specific rows within a Google
    Sheet by searching for a value in a designated column. This action is primarily
    used for data retrieval and lookups, allowing playbooks to query spreadsheets
    for contextual information such as asset owners, contact details, or allowlisted
    indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, which
    can be extracted from the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`.
    |

    | **Worksheet Name** | String | No | The name of the specific tab (worksheet)
    to search. If left blank, the action defaults to the first sheet (Sheet1). Note:
    This is case-sensitive. |

    | **Column Number** | String | Yes | The numerical index of the column to search
    within (e.g., '1' for column A). |

    | **Search value** | String | Yes | The specific text or value to search for within
    the specified column. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Sheets using
    the provided Service Account credentials.

    2. **Worksheet Selection**: It opens the spreadsheet via the `Sheet Id` and selects
    the target worksheet based on the `Worksheet Name` parameter.

    3. **Search Execution**: The action performs a global search for the `Search value`
    across the entire worksheet.

    4. **Column Filtering**: It iterates through the search results and filters for
    matches that specifically occur within the provided `Column Number`.

    5. **Data Extraction**: For every valid match, the action retrieves the row number
    and the full list of values for that row.

    6. **Result Reporting**: The action returns the total count of found rows, the
    list of row numbers, and the content of the matching rows as JSON output.


    ### Additional Notes

    - If the search value is not found in the specified column, the action will return
    a failure status.

    - This action does not modify the spreadsheet; it is strictly read-only.
