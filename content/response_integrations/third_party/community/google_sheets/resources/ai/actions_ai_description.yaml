    2. Authenticate with Google Sheets using the configured credentials.

    3. Open the target spreadsheet using the provided Sheet Id.

    4. Select the specified worksheet (or default to "Sheet1").

    5. Insert the provided comma-separated values as a new row at the specified index
    (or default position).
