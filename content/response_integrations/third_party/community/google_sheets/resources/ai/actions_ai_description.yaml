Add  Permission:
  ai_description: >-
    ### General Description

    The **Add Permission** action allows analysts to programmatically grant access
    to a specific Google Spreadsheet. It supports adding multiple users at once and
    assigning specific roles such as Owner, Writer, or Reader. This is useful for
    sharing reports, logs, or investigation trackers stored in Google Sheets with
    relevant stakeholders.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the URL (e.g., `https://docs.google.com/spreadsheets/d/{SheetId}/edit`). |

    | **Role** | DDL | Yes | The access level to grant: `Owner` (full control), `Writer`
    (can edit/comment), or `Reader` (view only). |

    | **Emails** | String | Yes | A semicolon-separated list of email addresses (e.g.,
    `user1@example.com;user2@example.com`) to receive the permissions. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the service account credentials from
    the integration settings.

    2. **Parameter Parsing**: Extracts the target Sheet ID, the desired role, and
    the list of email addresses from the action input.

    3. **Client Initialization**: Authenticates with Google APIs using the provided
    credentials.

    4. **Permission Insertion**: Executes the request to add the specified users to
    the spreadsheet's access control list with the chosen role.

    5. **Completion**: Reports the success or failure of the operation to the SOAR
    case.


    ### Additional Notes

    - Ensure the service account used in the integration has sufficient permissions
    to manage the target spreadsheet (e.g., it should be an Owner or have Editor access
    if adding others).
