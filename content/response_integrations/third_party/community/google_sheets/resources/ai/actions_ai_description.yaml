Add or Update Rows:
  ai_description: >-
    ### General Description

    This action adds or updates rows in a specified Google Sheet based on a provided
    JSON array of values. It searches for a specific field value in a designated column;
    if the value is found, it updates the existing row within a specified column range,
    and if it is not found, it appends a new row to the sheet.


    ### Flow Description

    1. Extracts the Google Sheets credentials and action parameters including Sheet
    ID, Worksheet Name, Column Number, Field Name, Start Column, End Column, and the
    JSON data.

    2. Authenticates with the Google Sheets API using the provided credentials.

    3. Parses the input JSON string into a list of row dictionaries.

    4. Iterates through each row in the parsed JSON data.

    5. For each row, makes an API call to search the specified worksheet for the value
    corresponding to the given Field Name.

    6. If the value is found in the specified Column Number, it makes an API call
    to update the row within the range defined by Start Column and End Column.

    7. If the value is not found, it makes an API call to append a new row to the
    worksheet with the provided values.

    8. Returns a summary message indicating the total number of rows updated or added.


    ### Additional Notes

    The JSON input should be an array of objects where each object represents a row
    to be added or updated. Ensure that the values used for searching are unique to
    prevent unintended overwrites.
  ai_short_description: >-
    Adds or updates rows in a Google Sheet based on a provided JSON array, searching
    by a specific column and appending new rows if the value is not found.
