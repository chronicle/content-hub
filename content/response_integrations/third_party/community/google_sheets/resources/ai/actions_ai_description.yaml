Add or Update Rows:
  ai_description: >-
    ### General Description

    Adds or updates rows in a Google Spreadsheet based on a search key. This action
    allows for dynamic data management within a spreadsheet, enabling users to either
    update existing records if a match is found or append new records if no match
    exists.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Column Number | String | Yes | The column index (e.g., '1') used to search for
    the value of the 'Field Name'. |

    | Start Column | String | Yes | The starting column for the update or add operation.
    |

    | End Column | String | Yes | The ending column for the update or add operation.
    |

    | Field Name | String | Yes | The key in the input JSON whose value is used for
    searching in the spreadsheet. |

    | Json | Code | Yes | A JSON array of objects representing the rows to be added
    or updated. |

    | Sheet Id | String | Yes | The unique identifier of the Google Spreadsheet, found
    in the URL. |

    | Worksheet Name | String | No | The name of the specific worksheet tab. Defaults
    to 'Sheet1' if not provided. |


    ### Flow Description

    1. The action authenticates with the Google Sheets API using the provided credentials.

    2. It opens the spreadsheet identified by the 'Sheet Id' and selects the specified
    worksheet.

    3. It parses the 'Json' input into a list of row data.

    4. For each row, it searches the specified 'Column Number' for the value associated
    with the 'Field Name'.

    5. If a match is found, it updates the existing row within the range defined by
    'Start Column' and 'End Column'.

    6. If no match is found, it appends the row data as a new entry at the end of
    the worksheet.

    7. The action concludes by reporting the number of rows processed and the updated
    ranges.


    ### Additional Notes

    - The 'Json' parameter must be a valid JSON array of objects.

    - Column indices are 1-based (e.g., '1' for column A).

    - The action requires appropriate permissions for the service account on the target
    spreadsheet.
