  ai_description: >-
    ### General Description

    Updates specific rows in a Google Sheets spreadsheet with a provided set of values.
    This action is designed to modify existing data within a spreadsheet, making it
    useful for maintaining external logs, tracking incident progress, or updating
    shared records directly from a SOAR playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Row Number | String | Yes | A comma-separated list of row indices to be updated
    (e.g., "1, 5, 10"). |

    | Values | Content | Yes | A comma-separated list of values to be written into
    the cells of the specified rows. The values are applied sequentially starting
    from the first column (Column A). |

    | Sheet Id | String | Yes | The unique ID of the spreadsheet, which can be extracted
    from the spreadsheet's URL. |

    | Worksheet Name | String | No | The name of the specific tab (worksheet) within
    the spreadsheet. If not provided, the action defaults to the first worksheet.
    |


    ### Flow Description

    1. **Initialization**: The action retrieves the service account credentials from
    the integration configuration and the target spreadsheet details from the action
    parameters.

    2. **Connection**: It establishes a connection to the Google Sheets API using
    the `gspread` library.

    3. **Worksheet Selection**: The action opens the spreadsheet by its ID and selects
    the specified worksheet (or the first one by default).

    4. **Data Processing**: It parses the comma-separated strings for row numbers
    and values.

    5. **Cell Updates**: For every row number provided, the action iterates through
    the list of values and updates the corresponding cells in that row, starting from
    column 1.

    6. **Completion**: Returns a success message once all specified cells have been
    updated.


    ### Additional Notes

    - The service account used in the configuration must have "Editor" permissions
    on the target Google Sheet.

    - The action updates cells sequentially; for example, if three values are provided,
    they will populate columns A, B, and C of the target rows.
