Import CSV:
  ai_description: >-
    ### General Description

    The **Import CSV** action allows users to upload the contents of a local CSV file
    directly into a Google Spreadsheet. This action is primarily used for reporting
    or data synchronization tasks. **Warning:** This action is destructive to the
    target spreadsheet; it replaces all content in the first worksheet with the CSV
    data and deletes all other worksheets within that spreadsheet.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Sheet Id | The unique identifier for the Google Spreadsheet, found in the URL
    (e.g., `https://docs.google.com/spreadsheets/d/{SheetId}/edit`). | String | Yes
    | The service account must have editor access to this sheet. |

    | CSV Path | The local file system path where the CSV file to be imported is located.
    | String | Yes | Ensure the SOAR runner has read permissions for this path. |


    ### Additional Notes

    - This action uses the `gspread` library to perform a bulk import of CSV data.

    - Because this action deletes other worksheets and overwrites the first one, it
    should be used with caution on spreadsheets containing existing important data.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google Service Account
    credentials from the integration settings and the `Sheet Id` and `CSV Path` from
    the action parameters.

    2. **File Access:** The script reads the raw text content of the CSV file located
    at the provided `CSV Path`.

    3. **Authentication:** A connection is established with the Google Sheets API
    using the provided service account credentials.

    4. **Data Import:** The action calls the Google Sheets API to import the CSV content
    into the specified spreadsheet. This process automatically clears the first worksheet,
    populates it with the new data, and removes any additional worksheets in the file.
