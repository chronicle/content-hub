Add  Permission:
  ai_description: >-
    ### General Description

    Adds specific access permissions (Owner, Reader, or Writer) to a Google Sheet
    for one or more users. This action modifies the sharing settings of the specified
    document in Google Workspace.


    ### Flow Description

    1. Extracts the Google Sheets service account credentials from the integration
    configuration.

    2. Retrieves the target `Sheet Id`, desired `Role`, and target `Emails` from the
    action parameters.

    3. Initializes the Google Sheets client using the provided credentials.

    4. Makes an API call to the Google Drive/Sheets API (`insert_permission`) to grant
    the specified role to the provided email addresses.

    5. Returns a success message if the permissions are granted successfully, or a
    failure message if an error occurs.


    ### Additional Notes

    - Multiple emails can be provided by separating them with a semicolon (`;`).

    - The `Sheet Id` can be extracted directly from the Google Sheet URL.
  ai_short_description: >-
    Grants specified access permissions (Owner, Reader, or Writer) to a Google Sheet
    for one or more users via the Google Sheets API.
