Get All:
  ai_description: >-
    ### General Description

    The **Get All** action retrieves all data records from a specified Google Sheets
    worksheet. It allows users to ingest tabular data from a spreadsheet into a Google
    SecOps playbook for further analysis, lookups, or automation logic. The action
    returns the data as a JSON array of objects, where each object represents a row
    with keys corresponding to the column headers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Id | String | Yes | The unique identifier of the spreadsheet, found in
    the URL (e.g., `https://docs.google.com/spreadsheets/d/{Sheet-Id}/edit`). |

    | Worksheet Name | String | No | The name of the specific tab (worksheet) to retrieve
    data from. If left blank, the action defaults to the first worksheet in the spreadsheet
    (usually "Sheet1"). Note: This value is case-sensitive. |


    ### Additional Notes

    - The action requires a valid **Credentials Json** to be configured in the integration
    settings.

    - The service account associated with the credentials must have at least "Viewer"
    permissions on the target spreadsheet.

    - If the worksheet name provided does not exist, the action will fail.


    ### Flow Description

    1. **Configuration Retrieval:** The action extracts the service account credentials
    from the integration configuration.

    2. **Parameter Extraction:** It retrieves the `Sheet Id` and the optional `Worksheet
    Name` from the action parameters.

    3. **API Connection:** Initializes a connection to the Google Sheets API using
    the `gspread` library.

    4. **Spreadsheet Access:** Opens the spreadsheet using the provided `Sheet Id`.

    5. **Worksheet Selection:** Selects the worksheet specified by the user or defaults
    to the first worksheet if no name is provided.

    6. **Data Fetching:** Executes a request to retrieve all records from the worksheet.

    7. **Result Output:** Adds the retrieved records to the action's JSON result and
    completes the execution with a success message.
