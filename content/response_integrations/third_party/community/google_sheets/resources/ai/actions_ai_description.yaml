Delete Sheet:
  ai_description: >-
    ### General Description

    Deletes a specific Google Sheet using the Google Sheets API. This action initiates
    a state change on the external Google Drive/Sheets service to permanently remove
    the specified spreadsheet.


    ### Flow Description

    1. Extracts the Google Sheets credentials from the integration configuration.

    2. Retrieves the target `Sheet Id` from the action parameters.

    3. Authenticates and initializes the Google Sheets client using the provided credentials.

    4. Makes an API call to Google Sheets (`del_spreadsheet`) to delete the specified
    spreadsheet.

    5. Returns a success message if the deletion is successful, or a failure message
    if an error occurs.


    ### Additional Notes

    This action permanently deletes the specified spreadsheet. Ensure the provided
    `Sheet Id` is correct to avoid unintended data loss.
  ai_short_description: >-
    Deletes a specific Google Sheet using the provided Sheet ID via the Google Sheets
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a specific spreadsheet in Google Sheets/Drive via the Google API.
    fetches_data: false
    internal_data_mutation_explanation: null
