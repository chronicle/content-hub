Create Sheet:
  ai_description: >-
    ### General Description

    This action creates a new Google Spreadsheet within the connected Google Sheets
    account. It allows users to specify a name for the new sheet and optionally share
    it with a list of email addresses, granting them 'writer' permissions. This is
    useful for automated reporting, data collection, or collaborative incident tracking.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sheet Name | string | Yes | The name of the new spreadsheet to be created. |

    | Share with emails | string | No | A semicolon-separated list of email addresses
    (e.g., `user1@example.com;user2@example.com`) to grant 'writer' access to the
    newly created sheet. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Google service account
    credentials from the integration configuration.

    2. **Parameter Parsing**: It extracts the desired sheet name and the optional
    list of emails to share the sheet with.

    3. **Client Initialization**: A Google Sheets client is initialized using the
    provided service account credentials.

    4. **Spreadsheet Creation**: The action calls the Google Sheets API to create
    a new spreadsheet with the specified name.

    5. **Permission Management**: If email addresses were provided, the action iterates
    through each email and updates the spreadsheet's permissions to grant 'writer'
    (editor) access to those users.

    6. **Completion**: The action returns the unique ID of the newly created spreadsheet
    and a success message.


    ### Additional Notes

    - The service account used must have sufficient permissions to create files in
    Google Drive and manage sharing permissions.

    - If the sharing step fails for any specific email, the entire action may report
    a failure depending on the exception handling, though the sheet itself might have
    already been created.
