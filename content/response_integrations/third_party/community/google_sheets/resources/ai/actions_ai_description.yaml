Search Row:
  ai_description: >-
    ### General Description

    The **Search Row** action allows users to find a specific row within a Google
    Spreadsheet based on a search value. It is primarily used to retrieve data associated
    with a specific identifier or record stored in a sheet, returning the entire row's
    content as a JSON object and the row index as the result value.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | String | Yes | The unique identifier of the spreadsheet, found
    in the URL: `https://docs.google.com/spreadsheets/d/{SheetId}/edit`. |

    | **Worksheet Name** | String | No | The name of the specific tab/worksheet to
    search. Defaults to the first sheet (Sheet1) if not provided. Note: This is case-sensitive.
    |

    | **Column Number** | String | Yes | The column index (starting from 1) where
    the search should be performed. |

    | **Search value** | String | Yes | The specific string or value to look for within
    the specified column. |


    ### Additional Notes

    - The action uses the `gspread` library to interact with the Google Sheets API.

    - If the value is not found, the action will return a failure status.

    - The action returns the full content of the row where the first match is found.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Sheets using
    provided Service Account credentials.

    2. **Spreadsheet Access**: It opens the spreadsheet using the `Sheet Id` and selects
    the target worksheet (either by name or the default first sheet).

    3. **Search Execution**: It performs a search for the `Search value` within the
    worksheet.

    4. **Data Retrieval**: If a match is found, it retrieves the values for the entire
    row containing that cell.

    5. **Output**: The row data is added to the action's JSON results, and the row
    number is returned as the main output value.
