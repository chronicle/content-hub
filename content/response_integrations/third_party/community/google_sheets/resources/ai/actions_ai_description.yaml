  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity and authorization between
    Google SecOps and the Google Sheets API. It ensures that the provided service
    account credentials are valid and have the appropriate permissions to perform
    file operations within the Google Drive and Sheets environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Credentials Json | String | Yes | (Configuration Parameter) The JSON content
    of the Google Service Account key used for authentication. |


    ### Flow Description

    1. **Authentication**: The action retrieves the service account credentials from
    the integration's configuration settings.

    2. **Client Initialization**: It initializes a Google Sheets client using the
    `gspread` library with the required OAuth2 scopes for Spreadsheets and Drive.

    3. **Validation Operation**: To test end-to-end functionality, the action attempts
    to create a new spreadsheet with a unique name (prefixed with 'Test-' and a UUID).

    4. **Cleanup**: Immediately after a successful creation, the action attempts to
    delete the temporary spreadsheet to ensure no residual data is left in the user's
    Google Drive.

    5. **Result Reporting**: If all steps succeed, the action completes with a 'Connected
    successfully' message. If any step fails (e.g., due to invalid credentials or
    insufficient API permissions), the action fails and returns the specific error
    message.


    ### Additional Notes

    This action is a diagnostic tool used to confirm that the integration is correctly
    configured and that the Google Cloud Project has the necessary APIs enabled.
