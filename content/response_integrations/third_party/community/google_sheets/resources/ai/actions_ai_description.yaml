Delete Sheet:
  ai_description: >-
    ### General Description

    The **Delete Sheet** action allows users to permanently remove a specific Google
    Spreadsheet from their Google Drive/Sheets environment using its unique Spreadsheet
    ID. This action is useful for cleaning up temporary reports, removing sensitive
    data after processing, or managing automated spreadsheet lifecycles within a SOAR
    workflow.


    ### Parameters Description

    | Parameter | Description | Expected Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **Sheet Id** | The unique identifier for the spreadsheet. This can be found
    in the URL of the sheet: `https://docs.google.com/spreadsheets/d/{Sheet_Id}/edit`.
    | String | Yes |


    ### Additional Notes

    *   **Irreversible Action:** Deleting a sheet is a destructive operation. Ensure
    the correct ID is provided, as the action does not typically move the file to
    the 'Trash' but performs a direct deletion via the API.

    *   **Permissions:** The service account used in the integration configuration
    must have sufficient permissions (Editor/Owner) to delete the target spreadsheet.


    ### Flow Description

    1.  **Initialization:** The action retrieves the Google Sheets credentials from
    the integration configuration and the target **Sheet Id** from the action parameters.

    2.  **Authentication:** It initializes a connection to the Google Sheets API using
    the provided service account credentials.

    3.  **Execution:** The action calls the `del_spreadsheet` method on the Google
    Sheets client, passing the provided **Sheet Id**.

    4.  **Completion:** If the deletion is successful, the action returns a success
    message. If an error occurs (e.g., invalid ID, insufficient permissions), the
    action fails and provides the error details.
