    1. Extracts the Google service account credentials from the integration configuration.

    2. Parses the input parameters, splitting the `Values` string into a list of individual
    cell values.

    3. Authenticates with the Google Sheets API and opens the specified spreadsheet
    using the `Sheet Id`.

    4. Selects the target worksheet by name or defaults to the first sheet.

    5. Inserts the new row at the specified `Row Index` or appends it if no index
    is provided.

    6. Returns a success or failure status based on the API response.
