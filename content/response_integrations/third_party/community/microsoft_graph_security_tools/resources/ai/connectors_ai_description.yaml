MS SecureScore Alert:
  ai_description: "### General Description\nThe MS SecureScore Alert connector monitors\
    \ the Microsoft Secure Score for an Azure tenant via the Microsoft Graph API.\
    \ It is designed to proactively alert security teams when the organization's security\
    \ posture\u2014represented by the Secure Score\u2014falls below a user-defined\
    \ threshold. This helps in identifying security regressions, configuration drifts,\
    \ or a decrease in compliance across Microsoft 365 services.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Threshold | Integer | No | The Secure Score value limit. An\
    \ alert is triggered if the current score drops below this value. |\n| Tenant\
    \ ID | String | Yes | The Azure Active Directory Tenant ID. |\n| Secret ID | Password\
    \ | Yes | The Client Secret for the Azure App Registration. |\n| Client ID | String\
    \ | Yes | The Client ID for the Azure App Registration. |\n| Default Priority\
    \ | Integer | Yes | The priority assigned to the created alert (-1 to 100). |\n\
    | Certificate Path | String | No | Local path to a PFX certificate for authentication\
    \ if not using a Client Secret. |\n| Certificate Password | Password | No | Password\
    \ for the provided certificate file. |\n| EventClassId | String | Yes | The field\
    \ name used to determine the event name (sub-type) in the SOAR. |\n| DeviceProductField\
    \ | String | Yes | The field name used to determine the device product in the\
    \ SOAR. |\n| PythonProcessTimeout | String | Yes | The timeout limit (in seconds)\
    \ for the python process running the script. |\n\n### Flow Description\n1. **Authentication**:\
    \ The connector authenticates with the Microsoft Graph API using the provided\
    \ Client ID and either a Client Secret or a Certificate.\n2. **Data Retrieval**:\
    \ It calls the Microsoft Graph `secureScores` endpoint to fetch the most recent\
    \ security score data for the tenant.\n3. **Threshold Comparison**: The connector\
    \ compares the `currentScore` from the retrieved data against the configured `Threshold`\
    \ parameter.\n4. **Alert Generation**: If the current score is lower than the\
    \ threshold, the connector initiates the alert creation process.\n5. **Event Mapping**:\
    \ It extracts specific metrics such as active user counts, enabled services, and\
    \ comparative averages (Industry, Total Seats, and Tenant averages) and maps them\
    \ into a SOAR event.\n6. **Ingestion**: The alert, containing the detailed score\
    \ breakdown, is ingested into Google SecOps for further analysis."
MS365 MFA Alert:
  ai_description: "### General Description\nThe MS365 MFA Alert connector monitors\
    \ Microsoft 365 environments for Multi-Factor Authentication (MFA) compliance\
    \ and security posture. By integrating with the Microsoft Graph API, it identifies\
    \ users who lack MFA registration or possess self-service reset capabilities that\
    \ may violate organizational security policies. This connector helps security\
    \ teams proactively identify and remediate identity-based risks.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Tenant ID | String | Yes | The Azure AD Tenant ID associated\
    \ with the Microsoft 365 environment. |\n| Client ID | String | Yes | The Application\
    \ (client) ID of the Azure app registration used for authentication. |\n| Secret\
    \ ID | Password | Yes | The Client Secret for the Azure app registration (required\
    \ if not using certificates). |\n| Certificate Path | String | No | The local\
    \ file path to a PFX certificate if using certificate-based authentication. |\n\
    | Certificate Password | Password | No | The password required to access the PFX\
    \ certificate file. |\n| MFA Registration Alert | Boolean | No | If enabled (true),\
    \ the connector generates alerts for users who are not registered for MFA. |\n\
    | Self Service Reset Alert | Boolean | No | If enabled (true), the connector generates\
    \ alerts for users who have the ability to perform self-service password or MFA\
    \ resets. |\n| Exclude Guests | Boolean | No | If enabled (true), the connector\
    \ will ignore external/guest users (identified by '#EXT#' in their UPN). |\n|\
    \ EventClassId | String | Yes | The field name used to determine the event sub-type\
    \ in the SOAR (default: 'MFA Alert'). |\n| DeviceProductField | String | Yes |\
    \ The field name used to determine the device product (default: 'Microsoft 365').\
    \ |\n| PythonProcessTimeout | String | Yes | The timeout limit in seconds for\
    \ the execution of the connector script. |\n\n### Flow Description\n1. **Authentication**:\
    \ The connector establishes a session with the Microsoft Graph API using either\
    \ the provided Client Secret or a PFX certificate.\n2. **Data Retrieval**: It\
    \ queries the `reports/credentialUserRegistrationDetails` endpoint to fetch the\
    \ current MFA registration status and capabilities for all users in the tenant.\n\
    3. **Filtering**: \n    * It excludes guest users if the 'Exclude Guests' parameter\
    \ is set to true.\n    * It checks the user's Principal Name against the SOAR's\
    \ internal allowlist to skip authorized exceptions (e.g., legacy service accounts).\n\
    4. **Alert Evaluation**: The connector evaluates each user based on the 'MFA Registration\
    \ Alert' and 'Self Service Reset Alert' logic. If a user is not registered for\
    \ MFA or is capable of self-service resets (and the corresponding parameter is\
    \ enabled), an alert is triggered.\n5. **Case Creation**: For every non-compliant\
    \ user identified, the connector creates a SOAR alert containing user metadata\
    \ such as Display Name, UPN, and specific registration flags.\n6. **Ingestion**:\
    \ The generated alerts are packaged and sent to the SOAR platform for analyst\
    \ review."
