MS SecureScore Alert:
  ai_description: >-
    ### General Description

    This connector monitors the Microsoft 365 Secure Score via the Microsoft Graph
    Security API. It allows security teams to define a threshold; if the organization's
    Secure Score falls below this value, the connector automatically generates an
    alert within Google SecOps, enabling proactive remediation of security posture
    degradation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | No | The Secure Score threshold. An alert is raised if
    the score drops below this value. |

    | Tenant ID | String | Yes | The Azure Tenant ID. |

    | Secret ID | Password | Yes | The Azure Secret ID. |

    | Client ID | String | Yes | The Azure Client ID. |

    | Certificate Path | String | No | Path to the certificate file on the Siemplify
    server (if using certificate-based authentication). |

    | Certificate Password | Password | No | Password for the certificate file. |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the Python
    process. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Default Priority | Integer | Yes | The default priority for the alert (-1 to
    100). |


    ### Flow Description

    1. Authenticates with the Microsoft Graph Security API using the provided Client
    ID and Secret (or Certificate).

    2. Retrieves the current Secure Score from the Microsoft 365 environment.

    3. Compares the current score against the user-defined Threshold.

    4. If the score is below the threshold, it constructs an alert containing relevant
    metrics, including active user counts, enabled services, and comparative industry/tenant
    averages.

    5. Ingests the generated alert into the Google SecOps platform for further investigation.
MS365 MFA Alert:
  ai_description: >-
    ### General Description

    The MS365 MFA Alert connector monitors Microsoft 365 user MFA registration status.
    It retrieves credential registration details from the Microsoft Graph API and
    generates alerts in Google SecOps for users who are not registered for MFA or
    have self-service password reset capabilities enabled, helping security teams
    identify potential account vulnerabilities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tenant ID | String | Yes | Tenant ID from Azure. |

    | Secret ID | Password | Yes | Secret ID from Azure. |

    | Client ID | String | Yes | Client ID from Azure. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Self Service Reset Alert | Boolean | No | Create alert when a user has the ability
    to self-service reset their password/MFA. |

    | MFA Registration Alert | Boolean | No | Create alert when a user is not registered
    for MFA. |

    | Exclude Guests | Boolean | No | Exclude guests/external users from alerts (emails
    containing #EXT#). |

    | Certificate Path | String | No | Path to the certificate on the Siemplify server
    for certificate-based authentication. |

    | Certificate Password | Password | No | Password for the certificate file, if
    applicable. |


    ### Flow Description

    1. Authenticates with the Microsoft Graph API using the provided Client ID/Secret
    or Certificate credentials.

    2. Retrieves user MFA registration statistics from the `credentialUserRegistrationDetails`
    endpoint.

    3. Iterates through the retrieved user data, applying filters to exclude guests
    if configured.

    4. Checks each user against the system allowlist.

    5. Evaluates if the user meets the criteria for an alert (e.g., not registered
    for MFA or has self-service reset enabled).

    6. Creates and ingests an alert into Google SecOps for each user matching the
    criteria.
