  reasoning: >-
    The integration provides capabilities across Email Security, IAM & Identity Management,
    Cloud Security, and SIEM. It includes multiple actions for managing email messages
    and attachments (e.g., Delete Message, Get Message, List Messages), which directly
    supports Email Security investigations and remediation. The integration monitors
    identity-related security posture, such as MFA registration and self-service password
    reset capabilities, aligning with IAM & Identity Management. It interacts with
    Microsoft 365/Azure via the Microsoft Graph API to monitor cloud-native security
    configurations like Secure Score, fitting the Cloud Security category. Finally,
    the connectors ingest security alerts into the platform based on these findings,
    which fulfills the SIEM category for monitoring and alerting.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
