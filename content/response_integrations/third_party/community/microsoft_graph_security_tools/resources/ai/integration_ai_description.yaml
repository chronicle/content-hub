product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: true
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The integration provides significant capabilities for managing and monitoring
    Microsoft 365 environments. It is classified under 'Email Security' because it
    includes multiple actions (Delete Attachment, Delete Message, Get Message, List
    Attachments, List Mail Rules, List Messages) for inspecting and managing email
    content. It is classified under 'IAM & Identity Management' due to the 'Get User
    MFA' action and the 'MS365 MFA Alert' connector, which monitor and report on user
    MFA registration and identity security settings. It is classified under 'Cloud
    Security' because the 'MS SecureScore Alert' connector monitors the Microsoft
    Secure Score, a cloud-native security posture metric for Microsoft 365/Azure.
    It does not meet the criteria for SIEM (no log timeline/IOC correlation), EDR
    (no host process analysis), Network Security (no gateway blocking), Threat Intelligence
    (no reputation enrichment), ITSM, Vulnerability Management, Asset Inventory, or
    Collaboration.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
