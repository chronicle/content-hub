  ai_description: >-
    ### General Description

    Deletes a specific attachment from a user's mailbox using Microsoft Graph Security.
    This action initiates a state change on the external mail server by removing the
    specified attachment from an email message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | User ID | String | Yes | The email address or userPrincipalName of the user
    whose mailbox contains the attachment. |

    | Message ID | String | Yes | The ID of the message containing the attachment
    to be deleted. |

    | Attachment ID | String | Yes | The ID of the specific attachment to delete.
    |


    ### Flow Description

    1. Extracts the necessary configuration and action parameters (User ID, Message
    ID, Attachment ID).

    2. Establishes a connection to Microsoft Graph Security using the provided credentials.

    3. Sends a DELETE request to the Microsoft Graph API to remove the specified attachment
    from the message.

    4. Returns the status of the deletion request and adds the result to the action's
    JSON output.
