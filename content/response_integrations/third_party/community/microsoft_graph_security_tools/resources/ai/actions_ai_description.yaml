  ai_description: >-
    ### General Description

    This action retrieves Multi-Factor Authentication (MFA) registration statistics
    for a specified user email address from Microsoft Graph. It can also process email-like
    entities found within the current case to provide a comprehensive view of MFA
    status across multiple users.


    ### Flow Description

    1. Extracts configuration parameters (Client ID, Secret ID, Tenant ID, etc.) and
    action parameters (User Email, Create Insight).

    2. Initializes the Microsoft Graph Security manager to authenticate and connect
    to the Microsoft Graph API.

    3. Retrieves MFA registration statistics for the provided `User Email`.

    4. If `Create Insight` is enabled, it generates a case insight containing the
    MFA statistics for the provided email.

    5. Iterates through all `target_entities` in the case, identifying those that
    appear to be email addresses (containing an '@' symbol).

    6. Retrieves MFA statistics for each identified email entity.

    7. If `Create Insight` is enabled, it generates a case insight for each identified
    email entity.

    8. Aggregates all retrieved MFA statistics and returns them as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Email | string | Yes | The email address to search for (userPrincipalName).
    Valid target entities (emails) will also be checked. |

    | Create Insight | boolean | No | If true, creates a case insight for each email
    checked with MFA stats. |


    ### Additional Notes

    The action filters entities by checking if the identifier contains an '@' symbol.
