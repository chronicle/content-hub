  ai_description: >-
    ### General Description

    Lists email messages from a specific user's Microsoft 365 mailbox using the Microsoft
    Graph API. This action allows analysts to retrieve a collection of messages based
    on specific criteria, which is essential for investigating phishing attempts,
    data exfiltration, or verifying user communications. It supports OData query parameters
    for advanced filtering and field selection to optimize the data returned.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | String | Yes | The email address or userPrincipalName of the target
    user whose mailbox will be queried. |

    | Select Filter | String | No | A comma-separated list of specific fields to return
    for each message (e.g., `sender,subject,receivedDateTime`). This helps reduce
    the payload size. |

    | Query Parameters | String | No | Standard Microsoft Graph OData query parameters.
    Should begin with '$'. For example: `$filter=subject eq 'test'` or `$top=10`.
    |


    ### Flow Description

    1. **Initialization**: The action extracts the integration's connection details
    (Client ID, Secret, Tenant ID) and the user-provided parameters (User ID, Select
    Filter, Query Parameters).

    2. **Authentication**: It establishes a connection to Microsoft Graph using the
    provided credentials (either client secret or certificate-based authentication).

    3. **Request Construction**: The action constructs the API request URL targeting
    the `/users/{user_id}/messages` endpoint, appending the `$select` and other OData
    query parameters if provided.

    4. **Data Retrieval**: It executes a GET request to the Microsoft Graph API to
    fetch the list of messages.

    5. **Result Processing**: The retrieved message data is returned as a JSON object
    and the action execution state is set to completed.


    ### Additional Notes

    - Ensure the Azure App Registration has the necessary permissions (e.g., `Mail.Read`
    or `Mail.Read.All`) to access user mailboxes.

    - The `Query Parameters` must follow the Microsoft Graph OData syntax to avoid
    API errors.
