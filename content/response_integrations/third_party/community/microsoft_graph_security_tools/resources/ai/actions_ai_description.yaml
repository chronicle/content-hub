  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) registration and status details for
    users from Microsoft Graph. This action is designed to provide visibility into
    a user's security posture by identifying whether they have registered for MFA,
    if it is enabled, and which authentication methods are configured. It processes
    a specific email address provided as a parameter and also automatically scans
    all entities in the case that appear to be email addresses.


    ### Flow Description

    1. **Authentication**: Connects to the Microsoft Graph API using the provided
    Client ID, Secret ID (or Certificate), and Tenant ID.

    2. **Parameter Processing**: Fetches MFA statistics for the primary user email
    specified in the `User Email` action parameter.

    3. **Entity Processing**: Iterates through all entities associated with the current
    case. It identifies entities whose identifiers contain an "@" symbol (treating
    them as potential user principal names).

    4. **Data Retrieval**: For each identified user (from parameters and entities),
    it queries the Microsoft Graph beta reports endpoint to retrieve credential registration
    details.

    5. **Insight Generation**: If the `Create Insight` parameter is enabled, the action
    generates a detailed case insight for each user, summarizing their MFA registration
    status, capabilities, and methods.

    6. **Output**: Returns a comprehensive JSON array containing the MFA statistics
    for all processed users.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Email | string | True | The primary userPrincipalName (email) to search
    for. This user's data will always be the first entry in the results. |

    | Create Insight | boolean | False | If set to `true`, the action will create
    a detailed insight in the Google SecOps case for every user successfully queried.
    Defaults to `false`. |


    ### Additional Notes

    - The action uses the Microsoft Graph Beta API endpoint (`/beta/reports/credentialUserRegistrationDetails`)
    to fetch detailed MFA statistics.

    - The JSON result will always return the data for the `User Email` input at index
    zero, followed by any data found for matching entities.
