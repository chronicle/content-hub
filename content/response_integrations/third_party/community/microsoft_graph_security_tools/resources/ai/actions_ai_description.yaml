List Messages:
  ai_description: >-
    ### General Description

    Lists messages in a specified user's mailbox using Microsoft Graph Security. This
    action allows analysts to retrieve email data, optionally applying specific query
    parameters and field selections to narrow down the results.


    ### Flow Description

    1. Extracts the `User ID`, `Select Filter`, and `Query Parameters` from the action
    inputs.

    2. Initializes the Microsoft Graph Security client using the configured integration
    credentials.

    3. Makes a GET request to the Microsoft Graph API (`https://graph.microsoft.com/v1.0/users/{username}/messages`)
    to retrieve the user's messages, appending any specified filters or query parameters
    to the URL.

    4. Returns the retrieved messages as a JSON result attached to the action execution.


    ### Additional Notes

    The query parameters should follow Microsoft Graph API syntax (e.g., `$filter=subject
    eq 'test'`). The select filter can be used to limit the payload size by only returning
    specific fields (e.g., `sender,subject`).
