    ID** | String | Yes | The unique identifier of the email message containing the
    attachment. |\n| **Attachment ID** | String | Yes | The unique identifier of the
    specific attachment to be deleted. |\n\n### Flow Description\n1. **Authentication**:
    The action connects to Microsoft Graph using the configured Client ID, Tenant
    ID, and either a Client Secret or a Certificate.\n2. **Parameter Extraction**:
    It retrieves the `User ID`, `Message ID`, and `Attachment ID` from the action
    input parameters.\n3. **API Execution**: It sends a `DELETE` request to the Microsoft
    Graph endpoint for the specific attachment: `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`.\n4.
    **Result Handling**: The action evaluates the response. A `204 No Content` status
    indicates a successful deletion. The result is logged and returned as a JSON object.\n\n###
    Additional Notes\n- This action performs a permanent deletion of the attachment.\n-
    The integration must have the `Mail.ReadWrite` permission granted in the Azure
    portal for this action to function correctly.
