  ai_description: >-
    ### General Description

    Verifies the connectivity between Google SecOps and the Microsoft Graph Security
    API. This action validates the integration's configuration by attempting to authenticate
    and retrieve an OAuth2 access token using the provided credentials (Client ID,
    Secret ID, or Certificate and Tenant ID).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any input parameters. It relies
    solely on the integration's configuration settings. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the integration's global
    configuration parameters, including the Client ID, Secret ID, Tenant ID, and certificate
    details.

    2. **Manager Initialization**: It instantiates the `MicrosoftGraphSecurityManager`
    using the extracted configuration.

    3. **Authentication Check**: Upon initialization, the manager attempts to perform
    an OAuth2 handshake with the Microsoft identity platform to acquire an access
    token.

    4. **Execution Outcome**: If the authentication is successful, the action returns
    a success status and a 'Connection Established' message. If the authentication
    fails or a network error occurs, the action catches the exception and returns
    a failure status with the error details.


