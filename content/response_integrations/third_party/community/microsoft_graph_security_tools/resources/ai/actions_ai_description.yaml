Delete Message:
  ai_description: >-
    Deletes a specific email message from one or more Microsoft 365 mailboxes using
    the Microsoft Graph API. This action is primarily used for remediation, such as
    removing malicious emails (phishing) identified during an investigation. It supports
    targeting multiple users simultaneously via a comma-separated list of email addresses.


    ### Flow Description:

    1. **Authentication**: The action establishes a connection to the Microsoft Graph
    API using the provided Client ID, Tenant ID, and either a Client Secret or a Certificate.

    2. **Parameter Extraction**: It retrieves the 'Message ID' and 'User ID' from
    the action parameters. The 'User ID' can be a single email or a CSV list of emails.

    3. **Execution**: The action iterates through the provided user identifiers and
    sends a DELETE request to the Microsoft Graph endpoint for the specified message.

    4. **Result Reporting**: It captures the HTTP response status (expecting 204 No
    Content for success) and returns a summary of the operation's outcome to the Google
    SecOps case.


    ### Parameters Description:

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Message ID | The unique identifier of the message to be deleted. | String |
    Yes | This ID is typically retrieved from a previous 'List Messages' or 'Search'
    action. |

    | User ID | The email address or userPrincipalName of the mailbox owner. | String
    | Yes | Supports a CSV input (e.g., user1@domain.com,user2@domain.com) to delete
    the same message ID from multiple mailboxes. |


    ### Additional Notes:

    - This action performs a permanent deletion (or moves to 'Deleted Items' depending
    on API behavior/mailbox settings) and cannot be undone via this integration.

    - If a CSV list is provided for 'User ID', the action will attempt to delete the
    message from every mailbox in the list.
