Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Microsoft Graph Security API. This action verifies that
    the integration is configured correctly by attempting to authenticate and generate
    an access token using the provided credentials.


    ### Flow Description

    1. Extracts the integration configuration parameters (Client ID, Secret ID, Tenant
    ID, Certificate Path, and Certificate Password).

    2. Initializes the `MicrosoftGraphSecurityManager`, which makes an API call to
    Microsoft to request an OAuth2 access token.

    3. If the token is successfully retrieved, the action completes and returns a
    success message indicating the connection is established.

    4. If the authentication fails, the action catches the exception and returns a
    failure status with the error details.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    integration to ensure that the provided credentials are valid and have the necessary
    permissions to communicate with the Microsoft Graph Security API.
