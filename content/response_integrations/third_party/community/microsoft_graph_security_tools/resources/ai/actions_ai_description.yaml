  ai_description: >-
    ### General Description\nDeletes a specific attachment from a user's mailbox using
    the Microsoft Graph API. This action is primarily used as a remediation step to
    remove malicious or unauthorized files from an email message after they have been
    identified.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description
    |\n| :--- | :--- | :--- | :--- |\n| **User ID** | String | Yes | The email address
