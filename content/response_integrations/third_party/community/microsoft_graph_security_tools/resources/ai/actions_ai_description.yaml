List Attachments:
  ai_description: >-
    ### General Description

    Retrieves a list of attachment objects associated with a specific email message
    using the Microsoft Graph API. This action allows analysts to view metadata for
    all files attached to a message, such as file names, sizes, and content types,
    which is essential for phishing investigations and forensic analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | String | Yes | The userPrincipalName (email) or unique ID of the user
    whose mailbox is being accessed. |

    | Message ID | String | No | The unique identifier of the message from which to
    retrieve the attachment list. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Microsoft Graph
    using the provided Client ID, Tenant ID, and either a Client Secret or a Certificate.

    2. **Parameter Extraction**: It extracts the target User ID and Message ID from
    the action parameters.

    3. **API Call**: It performs a GET request to the Microsoft Graph endpoint: `/users/{user_id}/messages/{message_id}/attachments`.

    4. **Data Output**: The retrieved list of attachment metadata is added to the
    action's JSON results for use in playbooks.


    ### Additional Notes

    While the 'Message ID' is marked as not mandatory in the configuration, it is
    required by the underlying API endpoint to successfully locate the message. If
    omitted, the action may fail during the API request phase.
