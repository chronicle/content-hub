Get User MFA:
  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) statistics for a specified user email
    and any valid email entities from Microsoft Graph Security. This action helps
    analysts understand the MFA registration and capability status of users involved
    in a case.


    ### Flow Description

    1. Initializes a connection to the Microsoft Graph Security API using the provided
    integration credentials.

    2. Fetches the MFA statistics for the specific user email provided in the action
    parameters via a GET request to the Microsoft Graph API.

    3. If the `Create Insight` parameter is enabled, generates a case insight containing
    the MFA details for the provided user email.

    4. Iterates through all target entities associated with the case.

    5. For each entity, checks if its identifier contains an `@` symbol (indicating
    an email address format).

    6. If it does, fetches the MFA statistics for that entity's identifier from Microsoft
    Graph Security.

    7. If the `Create Insight` parameter is enabled, generates a case insight for
    each successfully queried entity.

    8. Aggregates all retrieved MFA statistics and attaches them to the action's JSON
    result.


    ### Additional Notes

    The JSON result will always return the data for the explicitly provided `User
    Email` parameter at index zero, followed by the results for any processed entities.
  ai_short_description: >-
    Retrieves Multi-Factor Authentication (MFA) statistics for a specified user email
    and any valid email entities from Microsoft Graph Security, optionally creating
    case insights with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
