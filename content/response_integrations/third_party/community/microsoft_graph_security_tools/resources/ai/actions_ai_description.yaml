Delete Attachment:
  ai_description: >-
    ### General Description

    Deletes a specific attachment from an email message within a user's Microsoft
    365 mailbox using the Microsoft Graph Security API. This action is useful for
    removing malicious or unwanted files from a user's inbox without deleting the
    entire email message.


    ### Flow Description

    1. Extracts the `User ID`, `Message ID`, and `Attachment ID` from the action parameters.

    2. Initializes the Microsoft Graph Security Manager using the provided integration
    credentials.

    3. Makes an HTTP DELETE request to the Microsoft Graph API endpoint (`/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`)
    to remove the specified attachment.

    4. Evaluates the HTTP response status code (expecting 204 No Content for success).

    5. Returns the status of the deletion request and attaches the response data as
    a JSON result to the action output.


    ### Additional Notes

    This action requires the exact Message ID and Attachment ID, which typically need
    to be retrieved via a prior "Search Email" or "List Attachments" action. Ensure
    the integration has the appropriate Microsoft Graph API permissions (e.g., `Mail.ReadWrite`)
    to perform deletions.
  ai_short_description: >-
    Deletes a specific attachment from an email message in a user's Microsoft 365
    mailbox using the Microsoft Graph API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
