  ai_description: >-
    ### General Description

    The **Get Message** action retrieves the full details of a specific email message
    from a user's Microsoft 365 inbox using the Microsoft Graph API. This action is
    primarily used for forensic investigation or automated response flows where the
    content or metadata of a specific email (identified by its unique ID) needs to
    be analyzed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | string | Yes | The `userPrincipalName` (typically the email address)
    of the user whose mailbox is being accessed. |

    | **Message ID** | string | Yes | The unique identifier of the specific email
    message to retrieve. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Microsoft Graph
    API using the integration's Client ID, Secret, and Tenant ID.

    2. **Parameter Extraction**: It extracts the target **User ID** and **Message
    ID** from the action parameters.

    3. **API Retrieval**: The action performs a GET request to the Microsoft Graph
    endpoint: `https://graph.microsoft.com/v1.0/users/{User ID}/messages/{Message
    ID}`.

    4. **Data Processing**: The retrieved JSON data, containing message properties
    such as subject, body, sender, and timestamps, is processed.

    5. **Output**: The action returns the message details as a JSON result and completes
    with a success status.


    ### Additional Notes

    - This action is read-only and does not modify the state of the email or the mailbox.

    - Ensure the registered Azure AD application has the `Mail.Read` or `Mail.ReadWrite`
    permissions.
