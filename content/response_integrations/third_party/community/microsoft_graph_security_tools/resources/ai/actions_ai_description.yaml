List Mail Rules:
  ai_description: >-
    ### General Description

    The **List Mail Rules** action retrieves all message rules (inbox rules) defined
    for a specific user's inbox using the Microsoft Graph API. This action is a critical
    tool for security analysts investigating Business Email Compromise (BEC) or account
    takeover incidents, as it allows for the identification of suspicious rules that
    may be automatically forwarding, hiding, or deleting incoming correspondence.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | String | Yes | The `userPrincipalName` or email address of the
    target user whose inbox rules are to be retrieved. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Microsoft Graph
    API using the integration's Client ID, Tenant ID, and either a Client Secret or
    Certificate.

    2. **Input Retrieval**: The action extracts the target `User ID` from the provided
    action parameters.

    3. **API Invocation**: It executes a GET request to the Microsoft Graph endpoint:
    `/v1.0/users/{User ID}/mailFolders/inbox/messageRules`.

    4. **Result Processing**: The action captures the list of `messageRule` objects
    returned by the API.

    5. **Completion**: The retrieved rules are added to the action's JSON results,
    and the action concludes with a success status.


    ### Additional Notes

    - This action does not automatically iterate over entities in the SecOps case;
    the target user must be explicitly provided via the **User ID** parameter.

    - The output includes detailed rule configurations, including conditions (e.g.,
    from specific senders) and actions (e.g., move to folder, delete, or forward).
