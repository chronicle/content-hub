    Graph API. This action is useful for removing malicious or sensitive attachments
    from user mailboxes.


    ### Flow Description

    1. Extracts configuration parameters (Client ID, Secret ID, Tenant ID, Certificate
    details) and action parameters (User ID, Message ID, Attachment ID).

    2. Initializes the `MicrosoftGraphSecurityManager` to authenticate with the Microsoft
    Graph API.

    3. Executes a DELETE request to the Microsoft Graph API endpoint for the specified
    attachment.

    4. Returns the status and output message of the deletion request.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | string | Yes | The email address or user principal name of the user
    whose mailbox contains the message. |

    | Message ID | string | Yes | The unique identifier of the email message. |

    | Attachment ID | string | Yes | The unique identifier of the attachment to be
    deleted. |


    ### Additional Notes

    This action performs a destructive operation on external data (Microsoft 365).
    Ensure the provided IDs are correct before execution.
