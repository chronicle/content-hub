Delete Attachment:
  ai_description: >-
    Deletes a specific attachment from a user's email message within a Microsoft 365
    mailbox using the Microsoft Graph API. This action is primarily used for remediation
    purposes, such as removing malicious files from an inbox after they have been
    identified. It requires the specific identifiers for the user, the message, and
    the attachment itself.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | User ID | The userPrincipalName (typically the email address) of the mailbox
    owner. | String | Yes |

    | Message ID | The unique identifier of the email message containing the attachment.
    | String | Yes |

    | Attachment ID | The unique identifier of the specific attachment to be deleted.
    | String | Yes |


    ### Flow Description

    1. **Authentication**: The action authenticates with Microsoft Graph using the
    provided Integration parameters (Client ID, Secret/Certificate, and Tenant ID).

    2. **Parameter Extraction**: It retrieves the User ID, Message ID, and Attachment
    ID from the action input.

    3. **API Request**: It sends an HTTP DELETE request to the Microsoft Graph endpoint:
    `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`.

    4. **Result Processing**: The action checks the response status code. An HTTP
    204 status indicates a successful deletion. The result is then logged and returned
    to the SOAR platform.


    ### Additional Notes

    - This action performs a permanent deletion of the attachment from the message.
    It does not move it to a deleted items folder.

    - Ensure the application permissions in Azure AD are correctly configured to allow
    `Mail.ReadWrite` for the target mailboxes.
