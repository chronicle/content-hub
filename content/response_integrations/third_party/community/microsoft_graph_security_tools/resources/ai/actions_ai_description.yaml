  ai_description: >-
    ### General Description

    The **Get User MFA** action retrieves Multi-Factor Authentication (MFA) statistics
    for a specified user email and any valid email entities from Microsoft Graph Security.
    It connects to the Microsoft Graph API to fetch credential user registration details
    and can optionally create case insights with the retrieved data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | User Email | String | Yes | The user's email address (userPrincipalName) to
    search for. Valid target entities (emails) will also be checked. |

    | Create Insight | Boolean | No | If enabled, creates a case insight for each
    email checked with its corresponding MFA stats. |


    ### Flow Description

    1. Establishes a connection to Microsoft Graph Security using the provided integration
    credentials.

    2. Retrieves MFA statistics for the user specified in the `User Email` parameter.

    3. If the `Create Insight` parameter is enabled, generates a case insight containing
    the user's MFA details.

    4. Iterates over all target entities in the case, checking if their identifier
    contains an "@" symbol (indicating an email address).

    5. For each valid entity, retrieves its MFA statistics and optionally creates
    a case insight.

    6. Returns the collected MFA statistics as a JSON result, with the primary `User
    Email` input at index zero.
