Get Message:
  ai_description: >-
    ### General Description

    The **Get Message** action retrieves the full details and metadata of a specific
    email message from a user's Microsoft 365 inbox using the Microsoft Graph API.
    This action is primarily used for forensic investigation, allowing security analysts
    to inspect the content, headers, and properties of a specific email identified
    in an alert.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User ID** | String | Yes | The email address or `userPrincipalName` of the
    user whose mailbox is being accessed. |

    | **Message ID** | String | Yes | The unique identifier (ID) of the specific email
    message to be retrieved. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the Microsoft Graph
    API using the configured Client ID, Tenant ID, and either a Client Secret or Certificate.

    2. **Parameter Retrieval**: The action extracts the target `User ID` and `Message
    ID` from the user input.

    3. **Data Retrieval**: It executes a GET request to the Microsoft Graph endpoint:
    `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}`.

    4. **Output**: The retrieved message data is returned as a JSON object and attached
    to the action results in Google SecOps.


    ### Additional Notes

    - This action is read-only and does not change the state of the email (e.g., it
    does not mark the email as read).

    - The integration must have the appropriate API permissions (such as `Mail.Read`
    or `Mail.ReadWrite`) configured in the Azure portal.
