  ai_description: >-
    ### General Description

    This action performs a connectivity test (Ping) to the Microsoft Graph Security
    API. It validates the provided credentials by attempting to generate an access
    token, ensuring that the integration is correctly configured and able to communicate
    with the Microsoft Graph Security service.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client ID | String | Yes | The Application ID for the Microsoft Graph Security
    integration. |

    | Secret ID | String | Yes | The application secret for the Microsoft Graph Security
    integration. |

    | Tenant ID | String | Yes | The domain name from the Azure portal. |

    | Certificate Path | String | No | Path to the certificate on the Siemplify server
    if using certificate-based authentication. |

    | Certificate Password | String | No | Password for the certificate if it is password-protected.
    |


    ### Additional Notes

    Either Client Secret or Certificate authentication must be configured for the
    action to run. This action does not perform any data retrieval or modification
    operations.


    ### Flow Description

    1. The action extracts the required configuration parameters (Client ID, Secret
    ID, Tenant ID, Certificate Path, and Certificate Password).

    2. It initializes the `MicrosoftGraphSecurityManager` using the provided credentials.

    3. The manager attempts to authenticate with the Microsoft Graph Security API.

    4. If authentication is successful, the action returns a success message and a
    result value of "true".

    5. If an exception occurs during initialization or authentication, the action
    returns a failure message and a result value of "false".
