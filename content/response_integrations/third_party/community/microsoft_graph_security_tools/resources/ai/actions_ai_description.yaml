Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the Microsoft Graph Security API. It ensures that
    the provided integration credentials (Client ID, Secret, Tenant ID, or Certificate)
    are valid and that the environment can successfully authenticate and communicate
    with the external service.


    ### Parameters Description

    This action does not require any input parameters. It relies entirely on the global
    integration configuration settings.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the authentication details
    (Client ID, Secret ID, Tenant ID, Certificate Path, and Certificate Password)
    from the integration's configuration.

    2. **Manager Initialization:** It initializes the `MicrosoftGraphSecurityManager`
    using the extracted credentials.

    3. **Authentication Attempt:** During initialization, the manager attempts to
    request an OAuth2 access token from the Microsoft identity platform (`login.microsoftonline.com`).

    4. **Validation:** If the token is successfully retrieved, the connection is validated.

    5. **Result Reporting:** The action returns a success status if the connection
    is established or a failure status with an error message if authentication fails
    or a network error occurs.


    ### Additional Notes

    * This action is typically used during the initial setup of the integration or
    for troubleshooting connectivity issues.
