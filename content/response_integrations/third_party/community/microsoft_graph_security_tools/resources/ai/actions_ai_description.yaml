List Messages:
  ai_description: >-
    ### General Description

    This action retrieves a list of email messages from a specific user's mailbox
    using the Microsoft Graph API. It allows for granular searching and filtering
    of messages based on OData query parameters and specific field selection. This
    is primarily used for investigative purposes to identify suspicious emails or
    audit mailbox activity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | string | Yes | The userPrincipalName (email address) or unique ID
    of the user whose mailbox will be queried. |

    | Select Filter | string | No | A comma-separated list of specific message properties
    to return (e.g., 'subject,sender,receivedDateTime'). If left empty, default fields
    are returned. |

    | Query Parameters | string | No | Standard Microsoft Graph OData query parameters
    used to filter or sort results. Must begin with '$' (e.g., '$filter=subject eq
    'Urgent''). |


    ### Additional Notes

    - The action uses the Microsoft Graph `/users/{id}/messages` endpoint.

    - Ensure the integration has the necessary 'Mail.Read' or 'Mail.ReadWrite' permissions
    in Azure AD.


    ### Flow Description

    1. **Authentication**: The action establishes a connection to Microsoft Graph
    using the configured Client ID, Secret, and Tenant ID.

    2. **Parameter Extraction**: It retrieves the target User ID and optional filters
    from the action parameters.

    3. **Query Construction**: The action builds the API request URL, appending the
    `$select` filter and any provided OData query parameters.

    4. **Data Retrieval**: A GET request is sent to the Microsoft Graph API to fetch
    the message data.

    5. **Result Processing**: The retrieved list of messages is formatted and attached
    to the action's JSON results for use in subsequent playbook steps.
