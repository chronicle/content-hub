Get User MFA:
  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) registration and status details for
    users from Microsoft Graph. This action helps analysts determine if a user is
    properly enrolled in MFA, which authentication methods they have configured, and
    whether they are capable of performing MFA challenges. It processes both a manually
    provided email address and any email-like entities found within the case context.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Insight | boolean | No | If set to `true`, the action will generate a
    detailed Case Insight for every user successfully queried, summarizing their MFA
    status. |

    | User Email | string | Yes | The specific User Principal Name (UPN) or email
    address to search for. This user will always be the first entry in the results.
    |


    ### Flow Description

    1. **Authentication**: Connects to the Microsoft Graph API using the integration's
    Client ID, Tenant ID, and either a Client Secret or Certificate.

    2. **Manual User Query**: Fetches MFA statistics for the email address provided
    in the `User Email` parameter via the `credentialUserRegistrationDetails` endpoint.

    3. **Initial Insight**: If `Create Insight` is enabled, it creates a case insight
    for the manually provided user.

    4. **Entity Processing**: Iterates through all entities in the current SOAR case.

    5. **Identifier Filtering**: For each entity, it checks if the identifier contains
    an `@` symbol (treating it as a potential email/UPN).

    6. **Contextual Enrichment**: For every matching entity, it retrieves the corresponding
    MFA statistics from Microsoft Graph.

    7. **Contextual Insights**: If `Create Insight` is enabled, it generates insights
    for each discovered entity.

    8. **Final Output**: Aggregates all retrieved MFA records into a JSON array and
    returns a success status.


    ### Additional Notes

    The JSON result will always return the data for the `User Email` input at index
    zero, followed by any data found for entities in the case.
