  ai_description: >-
    ### General Description

    Lists the messages in a specified user's mailbox using Microsoft Graph Security.
    This action retrieves email messages based on optional query parameters and filters,
    returning the results as a JSON object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | User ID | string | Yes | User ID/userPrincipalName (email) of the mailbox to
    list messages from. |

    | Select Filter | string | No | CSV list of fields to return, e.g., sender, subject.
    This limits the data returned for each message. |

    | Query Parameters | string | No | Should begin with '$' - See MS Graph docs for
    query-parameters. E.g., $filter=subject eq 'test'. This filters the messages retrieved
    based on specific criteria. |


