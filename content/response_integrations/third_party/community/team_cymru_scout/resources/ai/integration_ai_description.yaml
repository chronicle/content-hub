  reasoning: >-
    The Team Cymru Scout integration provides threat intelligence data, including
    reputation, tags, historical telemetry, PDNS, WHOIS, and X509 information for
    IP addresses and domains. Threat Intelligence: The integration is a primary source
    of enrichment for external indicators (IPs, domains), providing reputation, risk
    scores, and historical context, which directly matches the Threat Intelligence
    category. SIEM: The integration provides access to historical telemetry and netflow
    data, enabling analysts to investigate if an IOC has been seen globally and identify
    the source of suspicious activity, aligning with the SIEM category. Other Categories:
    The integration does not perform EDR (no host/process-level activity), Network
    Security (no firewall/WAF log retrieval or blocking), Email Security, IAM, Cloud
    Security, ITSM, Vulnerability Management, Asset Inventory, or Collaboration, as
    it focuses exclusively on external threat intelligence and historical telemetry
    retrieval.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
