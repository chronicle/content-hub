  reasoning: >-
    The team_cymru_scout integration is designed to provide threat intelligence data,
    including domain, IP, network communications, and netflow information. Its primary
    actions, such as 'Enrich IPs', 'Get IP Details', 'Get Whois Info', and 'Get PDNS
    Info', are focused on enriching external indicators (IPs) with reputation, historical
    telemetry, and contextual data. This aligns directly with the 'Threat Intelligence'
    category, which is used for the enrichment of external indicators to determine
    their reputation and confirm if an alert is a True Positive. The integration does
    not perform SIEM log analysis, EDR host containment, network security enforcement
    (blocking), email security, IAM management, cloud security, ITSM ticketing, vulnerability
    management, asset inventory, or collaboration tasks. Therefore, it is classified
    solely under 'Threat Intelligence'.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
