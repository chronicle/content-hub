    ### General Description

    The **Get Fingerprints Info** action retrieves detailed fingerprinting data for
    a list of IP addresses from the Team Cymru Scout platform. This information helps
    analysts identify the types of services, protocols, and unique signatures associated
    with an IP, providing deep visibility into the nature of the traffic or the host's
    identity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to investigate. |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    in a single execution. |

    | **Start Date** | String | No | The beginning of the search window (YYYY-MM-DD).
