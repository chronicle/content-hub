Extract Tags:
  ai_description: "Extracts and searches for specific threat tags associated with\
    \ a provided IP address and its communicating peers using the Team Cymru Scout\
    \ intelligence platform. This action is designed to identify if an IP or its network\
    \ neighbors are linked to known malicious activities like phishing or malware\
    \ based on a user-defined list of tags.\n\n### Flow Description:\n1. **Parameter\
    \ Extraction:** Retrieves the target 'IP Address' and the 'Tags to Search' (comma-separated)\
    \ from the action parameters.\n2. **Validation:** Validates the format of the\
    \ provided IP address to ensure it is a valid IPv4 or IPv6 string.\n3. **Data\
    \ Retrieval:** Calls the Team Cymru Scout API (`get_ip_details`) to fetch comprehensive\
    \ metadata, including tags for the target IP and a list of its communicating peers\
    \ with their respective tags.\n4. **Tag Processing:** Aggregates all tags found\
    \ for the primary IP and its peers into a searchable structure.\n5. **Matching\
    \ Logic:** Performs an intersection between the tags retrieved from the API and\
    \ the tags provided by the user.\n6. **Result Reporting:** \n    * If matches\
    \ are found, it identifies which IPs (primary or peers) triggered the match and\
    \ returns the specific matching tags.\n    * Generates a JSON result containing\
    \ the matching IPs and their full tag sets.\n    * Always produces an 'Account\
    \ Usage' data table showing remaining API query limits.\n\n### Parameters Description:\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | IP Address | String | True | The specific IP address to investigate for associated\
    \ tags. |\n| Tags to Search | String | True | A comma-separated list of tags to\
    \ look for (e.g., 'malware, phishing, botnet'). |\n\n### Additional Notes:\n*\
    \ This action does not automatically process entities from the SOAR case; it relies\
    \ strictly on the 'IP Address' string parameter provided in the input.\n* The\
    \ search includes 'peers', which are other IP addresses that have communicated\
    \ with the target IP according to Team Cymru's telemetry."
