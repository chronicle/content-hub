    | **End Date** | String | No | The end of the search window (YYYY-MM-DD). Defaults
    to today. |

    | **Days** | String | No | An integer representing a relative offset in days from
    the current time. If provided, this takes priority over Start/End dates. |

    | **Size** | String | No | The maximum number of fingerprint records to return
    per IP (Max: 1000). |


    ### Flow Description

    1. **Parameter Extraction:** The action parses the input IP addresses and configuration
    settings (Limit, Dates, Size).

    2. **Validation:** It validates the format of the IP addresses and ensures the
    date ranges or 'Days' offset are within the allowed limits (e.g., Start Date within
    90 days).

    3. **API Interaction:** For each valid IP (up to the defined Limit), the action
    performs a GET request to the Team Cymru Scout `/ip/{ip}/details` endpoint, specifically
    requesting the 'fingerprints' section.

    4. **Data Processing:** The retrieved JSON data is parsed to extract fingerprint
    signatures, ports, protocols, and observation timestamps.

    5. **Output Generation:** The action populates a "Fingerprints" data table and
    an "Account Usage" table in the Google SecOps case and attaches the raw JSON response
    for further analysis.


    ### Additional Notes

    - If the **Days** parameter is provided, it will override the **Start Date** and
    **End Date** parameters.

    - The action supports both IPv4 and IPv6 addresses.
