  ai_description: >-
    Retrieves the current account usage metrics from the Team Cymru Scout API.


    ### General Description

    This action connects to the Team Cymru Scout API to fetch the current account
    usage details, such as used queries, remaining queries, and query limits. It provides
    visibility into the API consumption directly within the SecOps platform.


    ### Flow Description

    1. Retrieves integration parameters for authentication.

    2. Calls the Team Cymru Scout API to fetch account usage metrics.

    3. Parses the response and generates a data table with the usage details.

    4. Returns the raw JSON response and the data table to the case.


    ### Parameters Description

    This action does not require any parameters.


    ### Additional Notes

    None.
