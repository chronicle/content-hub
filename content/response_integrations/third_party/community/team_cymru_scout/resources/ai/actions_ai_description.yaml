List IP Summary:
  ai_description: "### General Description\nThe **List IP Summary** action retrieves\
    \ comprehensive summary information for a specified list of IP addresses from\
    \ the Team Cymru Scout platform. It is designed for bulk lookups, allowing analysts\
    \ to gather threat intelligence, geographic data, and autonomous system (AS) information\
    \ for multiple indicators in a single execution. The action includes built-in\
    \ validation to handle duplicate or malformed IP addresses and allows for a processing\
    \ limit to manage API quota usage.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **IP Addresses**\
    \ | string | Yes | A comma-separated list of IP addresses (e.g., \"1.1.1.1, 8.8.8.8\"\
    ) to be queried for summary information. |\n| **Limit** | string | Yes | The maximum\
    \ number of valid IP addresses to process from the provided list. Defaults to\
    \ 10. Must be a positive integer. |\n\n### Flow Description\n1.  **Input Parsing:**\
    \ The action extracts the comma-separated string of IP addresses and the processing\
    \ limit from the user input.\n2.  **Validation:** It validates each IP address\
    \ format, identifies duplicates, and filters out invalid entries. If the number\
    \ of valid IPs exceeds the specified limit, the excess IPs are skipped.\n3.  **API\
    \ Execution:** The action batches the valid IP addresses (up to 10 per batch)\
    \ and performs GET requests to the Team Cymru Scout `/ip/foundation` endpoint.\n\
    4.  **Data Aggregation:** It aggregates the responses from all batches, including\
    \ summary details, insights, and API usage statistics.\n5.  **Output Generation:**\
    \ \n    *   Adds the raw summary data as a JSON result.\n    *   Generates a \"\
    Summary Information for IPs\" data table containing IP, Country Code, ASN, and\
    \ Insight Ratings.\n    *   Generates an \"Insights\" data table detailing specific\
    \ threat observations.\n    *   Generates an \"Account Usage\" table showing remaining\
    \ API query limits.\n\n### Additional Notes\n*   This action does not run on existing\
