Account Usage:
  ai_description: >-
    ### General Description

    The **Account Usage** action retrieves real-time metrics regarding the API consumption
    for the Team Cymru Scout integration. It provides visibility into the number of
    queries used, the remaining quota, and the overall query limits for both the standard
    Scout API and the Foundation API. This is primarily a utility action used by administrators
    or analysts to monitor license usage and ensure API availability for automated
    playbooks.


    ### Parameters Description

    This action does not require any input parameters.


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | No parameters are required for this action. |


    ### Additional Notes

    - The action performs a read-only GET request to the `/usage` endpoint.

    - Results are displayed in a structured data table within the Google SecOps case
    wall.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify environment and retrieves
    the integration's authentication configuration (either API Key or Username/Password).

    2. **API Connection**: It establishes a session with the Team Cymru Scout API
    manager, applying SSL verification settings as configured.

    3. **Data Retrieval**: The action executes a GET request to the account usage
    endpoint to fetch current metric data.

    4. **Response Handling**: If the request is successful, the raw JSON response
    is attached to the action results.

    5. **Table Rendering**: The action parses the response into a human-readable format
    and renders a data table titled "Account Usage" containing specific fields like
    `Used Queries`, `Remaining Queries`, and `Query Limit`.
