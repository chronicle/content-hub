Advanced Query:
  ai_description: >-
    The Advanced Query action executes a search using the Team Cymru Scout query language
    to retrieve comprehensive summary information about network indicators. This action
    is primarily used for threat hunting and deep-dive investigations by allowing
    analysts to query the Scout platform for specific communication patterns, IP behaviors,
    and historical metadata.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory 'Query' string
    and optional filters including 'Start Date', 'End Date', 'Days', and 'Size'.

    2. **Validation:** It validates the date formats (YYYY-MM-DD) and ensures the
    requested time range does not exceed platform limits (e.g., 90-day lookback, 30-day
    window).

    3. **API Interaction:** Sends a GET request to the Team Cymru Scout `/search`
    endpoint with the constructed query and parameters.

    4. **Data Processing:** Parses the returned JSON which includes IP summaries,
    passive DNS (PDNS) records, open ports, top peers, service counts, fingerprints,
    and X.509 certificates.

    5. **Output Generation:** Populates multiple data tables in the Google SecOps
    case and attaches the full raw JSON response for further analysis. It also provides
    a table detailing current API account usage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | A simple or advanced query using Scout query language
    (e.g., `comms.ip="1.1.1.1"`). |

    | Start Date | String | No | The latest date for results (YYYY-MM-DD). Defaults
    to 29 days prior to today if not provided. |

    | End Date | String | No | The earliest date for results (YYYY-MM-DD). Defaults
    to today's date. |

    | Days | String | No | Relative offset in days from current time. If provided,
    this takes priority over Start/End dates. |

    | Size | String | No | The number of records to return (Maximum 5000). |


    ### Additional Notes

    - This action does not run on specific entities within the case; it relies entirely
    on the user-provided 'Query' parameter.

    - The 'Days' parameter overrides specific date ranges if both are provided.
