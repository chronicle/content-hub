Enrich IPs:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the Team Cymru Scout platform. This action
    retrieves threat intelligence and reputation data for the IPs to provide additional
    context and evaluate their risk level.


    ### Flow Description

    1. Iterates over the target entities and filters them to include only IP Addresses.

    2. Checks each entity's `additional_properties` to determine if it has already
    been enriched within the last 24 hours, skipping those that have.

    3. Makes a GET request to the Team Cymru Scout API (`/ip/foundation`) to fetch
    summary information for the pending IP addresses.

    4. Evaluates the returned rating for each IP; if the rating is 'malicious' or
    'suspicious', the entity's `is_suspicious` flag is set to True.

    5. Updates the entity's `additional_properties` with the retrieved enrichment
    data and sets its `is_enriched` flag to True.

    6. Saves the updated entities back to the platform and attaches the summary data
    as a JSON result.


    ### Additional Notes

    To optimize API usage and execution time, the action automatically skips entities
    that have a `TCS_last_enriched` timestamp within the last 24 hours.
  ai_short_description: >-
    Enriches IP Address entities by retrieving threat intelligence and reputation
    data from the Team Cymru Scout platform, updating the entities' properties and
    suspicious status based on the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the target entities' suspicious status, enriched flag, and additional
      properties with the retrieved threat intelligence.
    reasoning: >-
      The action fetches data from the Team Cymru Scout API (fetches_data=true). It
      does not mutate external data. It mutates internal data by updating the target
      entities with the fetched enrichment data, setting their suspicious status,
      and adding properties (can_mutate_internal_data=true, can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
