Get Whois Info:
  ai_description: >-
    The 'Get Whois Info' action retrieves detailed Whois information for a provided
    list of IP addresses from the Team Cymru Scout platform. This action is primarily
    used for gathering administrative and network context, such as ASN, AS Name, BGP
    information, and organizational details (Net Name, Org Name, contact emails) for
    specific indicators. It supports both IPv4 and IPv6 addresses and allows for time-based
    filtering of the results.


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the comma-separated list of IP
    addresses, processing limits, and optional time filters (Start Date, End Date,
    Days, and Size) from the user input.

    2. **Validation:** It validates the format of the IP addresses and ensures that
    date parameters are correctly formatted (YYYY-MM-DD) and within allowed ranges
    (e.g., start date not older than 90 days).

    3. **API Interaction:** For each valid IP address (up to the defined limit), the
    action performs a GET request to the Team Cymru Scout API's IP details endpoint,
    specifically requesting the 'whois' section.

    4. **Data Processing:** The action parses the JSON response, extracting key Whois
    fields like ASN, BGP ASN, and organizational contact information.

    5. **Output Generation:** It generates a data table titled 'Whois' containing
    the extracted details and another table for 'Account Usage' to track API consumption.
    The full raw response is also attached as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch Whois information for. |

    | Limit | String | Yes | The maximum number of valid IP addresses to process in
    a single execution (default is 10). |

    | Start Date | String | No | The latest date for results in YYYY-MM-DD format
    (UTC). Defaults to 29 days prior to today if not provided. |

    | End Date | String | No | The earliest date for results in YYYY-MM-DD format
    (UTC). Defaults to today's date if not provided. |

    | Days | String | No | Relative offset in days from the current time. If provided,
    this takes priority over Start/End dates. |

    | Size | String | No | The number of records to return in the search results (maximum
    1000). |


    ### Additional Notes

    - If the 'Days' parameter is provided, it will override any values provided in
    'Start Date' and 'End Date'.

    - The action performs validation to skip duplicate or malformed IP addresses and
    will report these in the output message.
