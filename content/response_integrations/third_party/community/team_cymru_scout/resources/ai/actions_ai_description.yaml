Account Usage:
  ai_description: >-
    ### General Description

    Fetches the current account usage metrics from the Team Cymru Scout API. This
    action is used to monitor the remaining and used queries for the configured account.


    ### Flow Description

    1. Retrieves authentication credentials from the integration configuration.

    2. Makes a GET request to the Team Cymru Scout API to fetch account usage details.

    3. Appends the raw API response to the action's JSON result.

    4. Generates a data table displaying the account usage metrics (e.g., Used Queries,
    Remaining Queries, Query Limit).


    ### Additional Notes

    This is a utility action that does not interact with alerts or entities.
