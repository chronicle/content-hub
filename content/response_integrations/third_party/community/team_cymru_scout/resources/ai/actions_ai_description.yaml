  ai_description: >-
    Enriches IP Address entities using the Team Cymru Scout platform. This action
    retrieves threat intelligence and summary information for the provided IP addresses
    and updates the entities within Google SecOps.


    ### Flow Description

    1. Collects all IP Address entities from the target entities.

    2. Checks if each entity has already been enriched in the last 24 hours to avoid
    redundant API calls.

    3. Fetches IP summary data from Team Cymru Scout for the valid entities in batches.

    4. Updates the entities with the retrieved data, setting the suspicious flag if
    the rating is malicious or suspicious, and adding the data to the entity's additional
    properties with a 'TCS' prefix.

    5. Returns the summary data as a JSON result.


    ### Parameters Description

    This action does not require any input parameters.
