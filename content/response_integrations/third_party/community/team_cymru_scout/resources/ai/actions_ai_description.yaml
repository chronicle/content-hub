Extract Tags:
  ai_description: >-
    ### General Description

    Extracts tags from a specified IP address and its peers using Team Cymru Scout,
    and checks if any of the provided search tags are associated with them. This action
    is useful for identifying if an IP or its communicating peers are associated with
    specific threat categories (e.g., malware, phishing).


    ### Flow Description

    1. Extracts the `IP Address` and `Tags to Search` from the action parameters.

    2. Validates the format of the provided IP address.

    3. Makes an API call to the Team Cymru Scout 'Get IP Details' endpoint to retrieve
    comprehensive information about the IP and its peers.

    4. Parses the API response to extract tags associated with the main IP and its
    communicating peers.

    5. Compares the extracted tags against the provided list of tags to search.

    6. Returns a JSON result containing the IPs that matched the search tags and their
    associated tags, along with a summary message.


    ### Additional Notes

    This action does not run on SecOps entities but rather takes a direct IP address
    string as input.
