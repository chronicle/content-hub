  ai_description: >-
    ### General Description

    Retrieves detailed communication information for specified IP addresses from Team
    Cymru Scout. This action allows security analysts to investigate network traffic
    patterns by identifying peers, protocols, and event counts associated with an
    IP. It is particularly useful for understanding the communication profile of a
    suspicious indicator, including its top services and autonomous system (AS) associations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch detailed communication information for. |

    | Limit | String | Yes | The maximum number of valid IP addresses to be allowed
    for processing in a single execution (Default: 10). |

    | Start Date | String | No | The latest date for results, formatted as YYYY-MM-DD
    in UTC. If not provided, defaults to 29 days prior to today. |

    | End Date | String | No | The earliest date for results, formatted as YYYY-MM-DD
    in UTC. If not provided, defaults to today's date. |

    | Days | String | No | Relative offset in days (integer) from the current time
    in UTC. Note: This parameter takes priority over Start Date and End Date if all
    three are provided. |

    | Size | String | No | The size, in records, of the search results (Maximum allowed
    size is 1000). |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the target IP addresses, processing
    limits, and time-based filters (Start Date, End Date, Days, Size) from the input
    parameters.

    2. **Validation**: It validates the format of the provided IP addresses and ensures
    that date parameters are logically consistent (e.g., start date is not after the
    end date and is within the 90-day historical limit).

    3. **API Manager Initialization**: Initializes the connection to Team Cymru Scout
    using the configured authentication method (API Key or Username/Password).

    4. **Data Retrieval**: Iterates through the validated IP addresses (up to the
    specified limit) and performs GET requests to the Team Cymru Scout API to retrieve
    'comms' (communications) section data.

    5. **Result Aggregation**: Processes the API responses to aggregate communication
    details, including peer IPs, protocols, country codes, and AS names.

    6. **Output Generation**: Generates a 'Peers' data table for the case wall, adds
    the raw JSON response to the action results, and creates an 'Account Usage' table
    to track API quota consumption.


    ### Additional Notes

    - The action performs strictly read-only operations against the Team Cymru Scout
    API.

    - If the 'Days' parameter is provided, it will override any values provided in
    'Start Date' or 'End Date'.
