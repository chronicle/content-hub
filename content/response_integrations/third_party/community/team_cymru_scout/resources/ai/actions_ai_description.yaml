  ai_description: "### General Description\nEnriches IP Address entities using the\
    \ Team Cymru Scout platform. This action retrieves reputation data, tags, and\
    \ ASN information to provide context for network-based indicators. It includes\
    \ a built-in caching mechanism that checks if an entity has been enriched within\
    \ the last 24 hours to optimize API usage and prevent redundant calls.\n\n###\
    \ Parameters Description\nThere are no user-configurable parameters for this action.\
    \ It automatically processes all IP Address entities present in the current context.\n\
    \n### Additional Notes\n- The action applies a 'TCS' prefix to all enriched data\
    \ fields added to the entity's additional properties.\n- Entities are marked as\
    \ 'Suspicious' in Google SecOps if the Team Cymru Scout rating is 'malicious'\
    \ or 'suspicious'.\n\n### Flow Description\n1. **Entity Identification**: The\
    \ action identifies all `ADDRESS` entities within the target scope.\n2. **Cache\
    \ Check**: For each IP, it checks the `TCS_last_enriched` property. If the entity\
    \ was enriched less than 24 hours ago, it skips the API call for that specific\
    \ entity.\n3. **Data Retrieval**: It batches the remaining IP addresses and queries\
    \ the Team Cymru Scout foundation API to retrieve summary information.\n4. **Data\
    \ Processing**: The action parses the API response, extracting the overall rating,\
    \ tags, and ASN details.\n5. **Internal Mutation**: \n    - Updates the `is_suspicious`\
    \ flag based on the threat rating.\n    - Populates `additional_properties` with\
    \ the enrichment data (prefixed with 'TCS').\n    - Sets the `is_enriched` flag\
    \ to true.\n6. **Finalization**: Updates the entities in Google SecOps and provides\
    \ a summary JSON of the retrieved data."
