Ping:
  ai_description: "### General Description\nThe **Ping** action is designed to verify\
    \ the connectivity and authentication configuration between Google SecOps and\
    \ the Team Cymru Scout platform. It serves as a diagnostic tool to ensure that\
    \ the provided credentials (either API Key or Username/Password) and network settings\
    \ (like SSL verification) are correct and that the Team Cymru Scout API is reachable.\n\
    \n### Parameters Description\nThis action does not require any input parameters.\n\
    \n### Flow Description\n1. **Configuration Retrieval**: The action fetches the\
    \ integration's global configuration parameters, including the authentication\
    \ type, credentials, and SSL verification settings.\n2. **API Initialization**:\
    \ An internal API manager is initialized using the retrieved settings to handle\
    \ communication with the Team Cymru Scout service.\n3. **Connectivity Test**:\
    \ The action performs a GET request to the `/usage` endpoint of the Team Cymru\
    \ Scout API. This endpoint is used to check the current API usage and effectively\
    \ validates the provided credentials.\n4. **Result Processing**: \n    * If the\
    \ API call is successful (HTTP 200), the action completes with a success status\
    \ and a message confirming the connection.\n    * If the API call fails (e.g.,\
    \ due to invalid credentials or network issues), the action logs the error and\
    \ completes with a failure status, providing the error details in the output message.\n\
    \n### Additional Notes\n* This action is typically used during the initial setup\
    \ of the integration or for troubleshooting connectivity issues.\n* It does not\
    \ process any entities or modify any data within Google SecOps or Team Cymru Scout."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
