  ai_description: >-
    ### General Description

    The **Advanced Query** action executes a search using the Team Cymru Scout query
    language to retrieve comprehensive summary information from the platform. It allows
    analysts to perform complex searches across historical telemetry and threat intelligence
    data, returning detailed results including PDNS information, open ports, peer
    communications, and digital certificates.


    ### Parameters Description

    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | A simple or advanced query following the Scout query
    language (e.g., `comms.ip="1.1.1.1"`). |

    | Start Date | String | No | The beginning of the date range for results, formatted
    as `YYYY-MM-DD` in UTC. Defaults to 29 days prior to the current date. |

    | End Date | String | No | The end of the date range for results, formatted as
    `YYYY-MM-DD` in UTC. Defaults to the current date. |

    | Days | String | No | A relative offset in days from the current time. If provided,
    this integer value takes priority over the `Start Date` and `End Date`. |

    | Size | String | No | The maximum number of records to return in the search results.
    The maximum allowed value is 5000. |


    ### Additional Notes

    - The `Days` parameter is an integer offset that overrides specific date range
    parameters if both are provided.

    - The action enforces a maximum result size of 5000 records to ensure performance.

    - All dates must be provided in the `YYYY-MM-DD` format and are processed in UTC
    time.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Scout query, date ranges,
    relative day offset, and result size from the input parameters.

    2. **Validation:** It validates the date formats and ensures the start date is
    not after the end date. It also checks that the requested size does not exceed
    the platform limit.

    3. **API Execution:** The action sends a GET request to the `/search` endpoint
    of the Team Cymru Scout API with the constructed query and filters.

    4. **Data Processing:** Upon receiving a successful response, the action parses
    the JSON data to extract IP summaries, PDNS records, open ports, peer communications,
    service counts, fingerprints, and X.509 certificates.

    5. **Output Generation:** The action generates multiple data tables for each category
    of information and attaches the raw JSON response to the action results.

    6. **Usage Tracking:** It creates an 'Account Usage' table to inform the user
    of their remaining query quota.
