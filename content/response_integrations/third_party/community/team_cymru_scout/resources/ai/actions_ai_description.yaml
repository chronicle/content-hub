    from the action configuration.

    2. Validates the IP addresses and parameters, filtering out invalid or duplicate
    entries.

    3. Makes a GET request to the Team Cymru Scout API (`/ip/{ip}/details`) for each
    valid IP address up to the specified limit to fetch communications data.

    4. Aggregates the retrieved communications data and generates data tables for
    the results.

    5. Returns the aggregated data as a JSON result and outputs a summary message.


