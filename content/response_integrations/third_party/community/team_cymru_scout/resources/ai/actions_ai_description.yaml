Advanced Query:
  ai_description: >-
    ### General Description

    Executes an advanced query using the Scout query language in the Team Cymru Scout
    platform to retrieve summary information and telemetry data. This action allows
    analysts to search for specific network communications, IP details, and other
    threat intelligence data based on custom criteria.


    ### Flow Description

    1. Extracts the advanced query string and optional filtering parameters (Start
    Date, End Date, Days, Size).

    2. Validates the provided date formats and size limits.

    3. Makes an HTTP GET request to the Team Cymru Scout `/search` API endpoint with
    the constructed query and parameters.

    4. Retrieves the search results, which may include IP summaries, PDNS information,
    open ports, top peers, service counts, fingerprints, and certificates.

    5. Formats the retrieved data into multiple case wall data tables and attaches
    the raw JSON response to the action results.


    ### Additional Notes

    - The maximum allowed size for the search results is 5000 records.

    - If the `Days` parameter is provided, it takes priority over `Start Date` and
    `End Date`.
