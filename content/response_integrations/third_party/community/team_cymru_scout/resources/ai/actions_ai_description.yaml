  ai_description: >-
    The 'Extract Tags' action queries the Team Cymru Scout API to retrieve details
    for a specified IP address and its communicating peers. It then extracts the tags
    associated with these IPs and checks if any of the user-provided tags match the
    extracted tags.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | IP Address | String | Yes | The IP address whose tags and peers' tags need to
    be extracted. |

    | Tags to Search | String | Yes | A comma-separated list of tags to search for
    within the tags associated with the IP address and its peers. |


    ### Action Flow

    1. Extracts and validates the `IP Address` and `Tags to Search` parameters.

    2. Calls the Team Cymru Scout API to retrieve details for the specified IP address.

    3. Processes the API response to extract tags for the queried IP and its communicating
    peers.

    4. Compares the extracted tags against the provided `Tags to Search`.

    5. Returns a JSON result containing the IPs that matched the specified tags and
    adds an Account Usage data table.
