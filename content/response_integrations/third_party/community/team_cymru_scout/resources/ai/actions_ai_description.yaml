    ### General Description

    Retrieves detailed threat intelligence for specific IP addresses from Team Cymru
    Scout. This action provides comprehensive metadata including WHOIS information,
    Passive DNS (PDNS) records, network peers, open ports, SSL/X509 certificates,
    and fingerprints. It is designed to help security analysts understand the context,
    ownership, and historical behavior of IP addresses involved in security incidents.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | A comma-separated list of IPv4 or IPv6 addresses to investigate.
