Get Communications Info:
  ai_description: "### General Description\nThe **Get Communications Info** action\
    \ retrieves detailed network communication metadata for a list of provided IP\
    \ addresses from the Team Cymru Scout platform. It focuses on identifying 'peers'\u2014\
    other IP addresses that the target IP has interacted with\u2014along with protocol\
    \ details, service ports, and geographic/ASN context for both sides of the communication.\
    \ This action is primarily used for threat intelligence and network forensics\
    \ to understand the communication patterns of suspicious indicators.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| **IP Addresses** | String | Yes | A comma-separated list of\
    \ IPv4 or IPv6 addresses to investigate. |\n| **Limit** | String | Yes | The maximum\
    \ number of valid IP addresses from the input list to process (default is 10).\
    \ |\n| **Start Date** | String | No | The latest date for results, formatted YYYY-MM-DD\
    \ in UTC. If not provided, defaults to 29 days prior to today. |\n| **End Date**\
    \ | String | No | The earliest date for results, formatted YYYY-MM-DD in UTC.\
    \ If not provided, defaults to today's date. |\n| **Days** | String | No | Relative\
    \ offset in days (integer) from current time in UTC. **Note:** This takes priority\
    \ over Start Date and End Date if all three are provided. |\n| **Size** | String\
    \ | No | The number of records to return per IP (maximum 1000). |\n\n### Flow\
    \ Description\n1. **Validation**: The action parses the input IP list, removing\
    \ duplicates and identifying invalid formats. It also validates date formats and\
    \ ensures 'Days' and 'Size' are valid integers.\n2. **API Request**: For each\
    \ valid IP (up to the specified limit), the action queries the Team Cymru Scout\
    \ `/ip/{ip}/details` endpoint, specifically requesting the 'comms' (communications)\
    \ section.\n3. **Data Processing**: The response is parsed to extract peer information,\
    \ including protocol text, client/server IPs, country codes, top services, and\
    \ AS names for both the target and the peer.\n4. **Output Generation**:\n    *\
    \   A raw JSON result containing the full API response for all processed IPs is\
    \ attached.\n    *   A **Peers** data table is created, listing detailed interaction\
    \ metrics such as First/Last seen, Event counts, and service ports.\n    *   An\
    \ **Account Usage** table is generated to show remaining API query quotas for\
    \ the integration.\n\n### Additional Notes\n*   This action does not automatically\
    \ process entities from the SOAR case; it relies strictly on the manual input\
    \ provided in the **IP Addresses** parameter.\n*   The **Days** parameter, if\
    \ provided, overrides any specific **Start Date** or **End Date** configurations."
