  ai_description: >-
    ### General Description

    The **Extract Tags** action retrieves and analyzes tags associated with a specific
    IP address and its communicating peers using the Team Cymru Scout threat intelligence
    platform. It allows analysts to provide a list of specific tags (e.g., 'malware',
    'phishing') and checks if the target IP or any of its peers are associated with
    those tags. This is useful for identifying related infrastructure or confirming
    the nature of a suspicious IP based on community-sourced or proprietary tagging.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | IP Address | The specific IP address for which tags and peer tags will be extracted.
    | String | Yes |

    | Tags to Search | A comma-separated list of tags to look for within the results
    (e.g., 'malware, phishing, botnet'). | String | Yes |


    ### Flow Description

    1. **Parameter Extraction:** The action extracts the target IP address and the
    search tags from the input parameters.

    2. **Validation:** It validates the format of the provided IP address to ensure
    it is a valid IPv4 or IPv6 address.

    3. **API Interaction:** The action calls the Team Cymru Scout 'Get IP Details'
    endpoint to fetch metadata, including tags for the target IP and its known communicating
    peers.

    4. **Data Processing:** It parses the API response to create a mapping of IP addresses
    to their respective tags.

    5. **Tag Matching:** The action performs an intersection between the tags found
    in the API response and the tags provided in the 'Tags to Search' parameter.

    6. **Result Generation:** It identifies which IPs (target or peers) matched the
    search criteria, adds the detailed results to the action's JSON output, and renders
    an 'Account Usage' table to track API consumption.


    ### Additional Notes

    This action does not run on SecOps entities automatically; it requires the IP
    address to be passed as a manual parameter. It is primarily used for deep-dive
    enrichment and correlation of network peers.
