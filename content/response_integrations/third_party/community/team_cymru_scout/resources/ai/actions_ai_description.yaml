  ai_description: >-
    ### General Description

    The Account Usage action retrieves the current account usage metrics for the Team
    Cymru Scout API. This action provides visibility into the API's query limits,
    used queries, and remaining queries, allowing administrators to monitor their
    subscription usage directly from the SOAR platform.


    ### Parameters Description

    There are no parameters required for this action. It utilizes the integration
    configuration settings (Authentication Type, API Key, Username, Password, Verify
    SSL) to authenticate and communicate with the Team Cymru Scout service.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the integration
    configuration parameters.

    2. An `ApiManager` instance is created using the retrieved credentials.

    3. The action calls the `/usage` endpoint of the Team Cymru Scout API.

    4. If the API call is successful, the raw JSON response is added to the action
    results.

    5. The usage data is transformed into a readable table format and rendered in
    the action output.

    6. If an error occurs during the API call, the action logs the error and fails
    the execution.
