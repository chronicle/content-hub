Get IP Details:
  ai_description: >-
    ### General Description

    The **Get IP Details** action is designed to retrieve detailed threat intelligence
    and contextual information for specified IP addresses using the Team Cymru Scout
    API. It fetches comprehensive data including summary insights, passive DNS (PDNS),
    communicating peers, open ports, fingerprints, and certificates associated with
    the IPs.


    ### Flow Description

    1. Extracts the provided action parameters, including the comma-separated list
    of IP Addresses, Limit, and optional time-bounding parameters (Start Date, End
    Date, Days, Size).

    2. Validates the input IP addresses, filtering out invalid or duplicate entries.

    3. Validates the optional time parameters to ensure they fall within acceptable
    ranges.

    4. Iterates through the valid IP addresses (up to the specified limit) and makes
    a GET request to the Team Cymru Scout API (`/ip/{ip}/details`) for each IP.

    5. Aggregates the retrieved information and API usage statistics.

    6. Outputs the aggregated data as a JSON result and generates multiple data tables
    (Summary Information, Insights, Top PDNS, Top Peers, Top Open Ports, Top Fingerprints,
    Top Certificates, and Account Usage) for analyst review.


    ### Additional Notes

    - The action will skip invalid or duplicate IP addresses and log a warning message.

    - If the number of valid IPs exceeds the specified `Limit`, the extra IPs will
    be skipped.

