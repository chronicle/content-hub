  ai_description: >-
    Enriches IP Address entities using the Team Cymru Scout platform. This action
    retrieves threat intelligence, including reputation ratings and tags, for specified
    IP addresses. It evaluates the risk of the IP and updates the entity's status
    within the SOAR platform.


    ### Flow Description

    1. **Identify Entities**: The action retrieves all IP Address entities from the
    current case.

    2. **Filter**: It checks if the entity has already been enriched in the last 24
    hours using the `TCS_last_enriched` property. If so, it skips the entity.

    3. **Fetch Data**: It queries the Team Cymru Scout API to retrieve summary information
    for the valid IP addresses.

    4. **Update Entities**: For each IP, it updates the entity's `is_suspicious` status
    based on the rating (malicious/suspicious) and adds enrichment data (tags, rating,
    last enriched timestamp) to the entity's `additional_properties`.

    5. **Finalize**: It updates the entities in the SOAR platform and adds the API
    result to the action output.


    ### Parameters

    There are no input parameters for this action. It operates on the `target_entities`
    provided in the case context.
