Enrich IPs:
  ai_description: >-
    ### General Description

    The **Enrich IPs** action retrieves threat intelligence for IP Address entities
    from the Team Cymru Scout platform. It provides critical context such as reputation
    ratings (e.g., malicious, suspicious) and associated tags to help analysts evaluate
    the risk of network indicators. To optimize performance and API usage, the action
    includes a built-in caching mechanism that skips entities enriched within the
    last 24 hours.


    ### Flow Description

    1. **Entity Identification:** The action scans the current context for all `ADDRESS`
    entities.

    2. **Redundancy Check:** For each identified IP, the action checks the `TCS_last_enriched`
    field in the entity's `additional_properties`. If the timestamp indicates the
    entity was enriched within the last 24 hours, it is skipped.

    3. **Data Retrieval:** The action fetches IP summary data from the Team Cymru
    Scout API for all eligible entities using batch processing.

    4. **Entity Enrichment:**
        * **Suspicious Status:** The `is_suspicious` flag is set to `True` if the
    Team Cymru Scout rating is 'malicious' or 'suspicious'.
        * **Metadata Update:** The entity's `additional_properties` are updated with
    the rating, tags, and a new `TCS_last_enriched` timestamp.
        * **Enrichment Flag:** The entity is marked as `is_enriched = True`.
    5. **Platform Update:** The action updates the entities within Google SecOps and
    returns a JSON summary of the enrichment results.


    ### Parameters Description

    | Parameter Name | Usage | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | N/A | This action does not have any input parameters. It processes
    all IP Address entities in the scope using global integration settings. |


    ### Additional Notes

    * **Caching:** The 24-hour enrichment cache is stored locally on the entity object
    within Google SecOps.

    * **Batching:** The action processes IPs in batches of 10 to ensure efficient
    API communication.
  capabilities:
