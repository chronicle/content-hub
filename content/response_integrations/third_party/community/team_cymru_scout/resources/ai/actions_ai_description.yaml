  ai_description: >-
    ### General Description

    The **Account Usage** action retrieves and displays the current API consumption
    metrics for the Team Cymru Scout integration. It provides visibility into query
    limits and remaining balances for both standard and foundation API services, helping
    analysts monitor quota usage and prevent service interruptions.


    ### Parameters

    This action does not require any input parameters.


    ### Flow Description

    1. **Authentication**: The action establishes a connection with the Team Cymru
    Scout API using the configured credentials (API Key or Username/Password).

    2. **Data Retrieval**: It sends a GET request to the `/usage` endpoint to fetch
    real-time account statistics.

    3. **Data Processing**: The response is parsed to extract metrics such as used
    queries, remaining queries, and query limits for both the primary and foundation
    APIs.

    4. **Output Generation**: The action populates a JSON result with the raw response
    and renders a formatted data table named 'Account Usage' in the Google SecOps
    UI for easy review.


    ### Additional Notes

    This is a utility action and does not process or enrich specific entities within
    a case.
