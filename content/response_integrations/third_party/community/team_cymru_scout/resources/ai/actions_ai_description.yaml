  ai_description: >-
    ### General Description

    This action extracts tags from a specified IP address and its associated peers
    using the Team Cymru Scout API. It allows analysts to search for specific tags
    within the IP's context to identify potential threats or relevant indicators.
    The action retrieves detailed IP information, processes the tags, and returns
    a list of IPs that match the specified search criteria.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | string | Yes | The IP address whose tags and peer tags need to
    be extracted. |

    | Tags to Search | string | Yes | A comma-separated string of tags to search for
    within the tags associated with the IP and its peers. |


    ### Flow Description

    1. **Input Validation**: Validates the provided IP address format.

    2. **Data Retrieval**: Queries the Team Cymru Scout API to fetch details for the
    provided IP address.

    3. **Processing**: Parses the API response to extract tags for the target IP and
    its peers.

    4. **Matching**: Compares the extracted tags against the user-provided 'Tags to
    Search' list.

    5. **Output**: Returns a JSON result containing the matching IPs and their associated
    tags, and renders a data table showing API usage statistics.


    ### Additional Notes

    This action does not operate on `target_entities` and is not classified as an
    enrichment action.
