Get Fingerprints Info:
  ai_description: >-
    Retrieves detailed fingerprint information for specified IP addresses from Team
    Cymru Scout. This action is used to gather technical metadata about network indicators,
    including fingerprint types, signatures, and observation timelines (first and
    last seen). It supports both IPv4 and IPv6 addresses and allows for time-based
    filtering and result size limits.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Addresses | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch fingerprint information for. |

    | Limit | String | Yes | The maximum number of valid IP addresses to process in
    a single execution. Default is 10. |

    | Start Date | String | No | The latest date for results in YYYY-MM-DD format
    (UTC). Defaults to 29 days prior to today if not provided. |

    | End Date | String | No | The earliest date for results in YYYY-MM-DD format
    (UTC). Defaults to the current date if not provided. |

    | Days | String | No | Relative offset in days from the current time. If provided,
    this takes priority over Start Date and End Date. |

    | Size | String | No | The number of records to return per search (maximum 1000).
    |


    ### Additional Notes

    - The action performs validation on all input IP addresses, skipping duplicates
    and invalid formats.

    - If the number of valid IPs exceeds the 'Limit' parameter, the additional IPs
    are skipped.

    - The 'Days' parameter, if used, overrides any specific date range provided.


    ### Flow Description

    1. **Initialization**: Retrieves integration credentials (API Key or Username/Password)
    and validates the 'Limit' and 'IP Addresses' parameters.

    2. **Validation**: Parses the input IP list, identifying valid, invalid, and duplicate
    addresses. It also validates date formats and ranges.

    3. **API Interaction**: For each valid IP (up to the limit), it calls the Team
    Cymru Scout API (`/ip/{ip}/details`) with the specified filters (dates, size,
    and section set to 'fingerprints').

    4. **Data Processing**: Aggregates the API responses, including raw JSON data
    and usage statistics.

    5. **Output Generation**: Creates a 'Fingerprints' data table containing details
    like Type, Signature, and Event Count for each IP. It also generates an 'Account
    Usage' table to track API quota consumption.

    6. **Completion**: Returns the aggregated JSON result and a summary message indicating
    the number of successfully processed IPs.
