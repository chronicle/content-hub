Get PDNS Info:
  ai_description: >-
    ### General Description

    The **Get PDNS Info** action retrieves detailed Passive DNS (PDNS) information
    for a specified list of IP addresses from Team Cymru Scout. This action is designed
    to provide analysts with historical domain resolution data, including event counts
    and first/last seen timestamps, which is essential for identifying malicious infrastructure,
    tracking domain-to-IP relationships, and uncovering related threat activity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to fetch PDNS information for. |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    from the input list. This helps manage API quota and performance. |

    | **Start Date** | String | No | The latest date for results in UTC, formatted
    as YYYY-MM-DD. If not provided, it defaults to 29 days prior to the current date.
    |

    | **End Date** | String | No | The earliest date for results in UTC, formatted
    as YYYY-MM-DD. If not provided, it defaults to the current date. |

    | **Days** | String | No | An integer representing a relative offset in days from
    the current time. If provided, this value takes priority over the Start and End
    dates. |

    | **Size** | String | No | The number of records to return in the search results
    (Maximum allowed is 1000). |


    ### Flow Description

    1. **Initialization:** The action initializes the Team Cymru Scout API manager
    and extracts the user-provided parameters.

    2. **Validation:** It validates the format of the provided IP addresses, ensuring
    they are valid IPv4 or IPv6 strings. It also validates the date formats and the
    result size constraints.

    3. **API Request:** For each valid IP address (up to the specified limit), the
    action performs a GET request to the Team Cymru Scout `/ip/{ip}/details` endpoint,
    specifically requesting the 'pdns' section.

    4. **Data Processing:** The action parses the API response, extracting domain
    names, event counts, and visibility windows (first/last seen).

    5. **Output:** The action generates a JSON result containing the raw PDNS data
    and renders two data tables: one for the detailed PDNS information and another
    for the integration's Account Usage statistics.


    ### Additional Notes

    - This action does not automatically iterate over entities in the Google SecOps
    case; it processes only the IP addresses provided in the **IP Addresses** parameter.

    - The **Days** parameter is the most efficient way to define a search window and
    will override specific date parameters if both are supplied.
