  ai_description: >-
    Executes an advanced query using the Scout query language in Team Cymru Scout
    to fetch summary information. The action retrieves telemetry data including PDNS,
    open ports, top peers, service counts, fingerprints, and certificates based on
    the provided query.


    ### Parameters Description

    * **Query**: A simple or advanced query as described by the Scout query language
    in the Team Cymru Scout platform. (Mandatory, String)

    * **Start Date**: The latest date for results, formatted YYYY-MM-DD in UTC time.
    If not provided, the default value will be 29 days prior to today, in UTC. (Optional,
    String)

    * **End Date**: The earliest date for results, formatted YYYY-MM-DD in UTC time.
    If not provided, the default value will be today's date in UTC. (Optional, String)

    * **Days**: Relative offset in days (integer) from current time in UTC. Note:
    this will take priority over start_date and end_date if all three are passed.
    (Optional, String)

    * **Size**: Size, in records, of the search results. Note: The maximum allowed
    size is 5000. (Optional, String)


    ### Flow Description

    1. Extracts the query and optional time/size parameters from the action configuration.

    2. Validates the provided dates, days, and size parameters.

    3. Initiates a search request to the Team Cymru Scout API using the provided query.

    4. Parses the API response to extract summary information, PDNS, open ports, top
    peers, service counts, fingerprints, and certificates.

    5. Generates and attaches data tables for each category of information and returns
    the raw JSON response.
