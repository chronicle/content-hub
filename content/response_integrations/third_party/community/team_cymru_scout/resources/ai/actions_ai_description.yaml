  ai_description: >-
    ### General Description

    This action retrieves comprehensive threat intelligence and network telemetry
    for a list of provided IP addresses from Team Cymru Scout. It is designed to provide
    analysts with deep visibility into an IP's history and behavior, including WHOIS
    records, Passive DNS (PDNS) data, open ports, SSL/TLS certificates, and communication
    peers. The action processes multiple IPs simultaneously (up to a configurable
    limit) and presents the findings in structured data tables for easy analysis within
    the SOAR interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Addresses** | String | Yes | A comma-separated list of IPv4 or IPv6 addresses
    to investigate. |

    | **Limit** | String | Yes | The maximum number of valid IP addresses to process
    in a single execution (default is 10). |

    | **Start Date** | String | No | The start of the search window in YYYY-MM-DD
    format (UTC). Defaults to 29 days ago if not provided. |

    | **End Date** | String | No | The end of the search window in YYYY-MM-DD format
    (UTC). Defaults to the current date if not provided. |

    | **Days** | String | No | A relative offset in days from the current time. If
    provided, this takes priority over Start/End dates. |

    | **Size** | String | No | The maximum number of records to return for specific
    search results (max 1000). |


    ### Flow Description

    1. **Input Validation:** The action parses the comma-separated list of IP addresses,
    removes duplicates, and validates the format (IPv4/IPv6). It also validates date
    formats and the 'Days'/'Size' integers.

    2. **API Authentication:** Connects to the Team Cymru Scout API using either an
    API Key or Username/Password credentials.

    3. **Data Retrieval:** For each valid IP address (up to the specified limit),
    the action performs a GET request to the `/ip/{ip}/details` endpoint, applying
    the date and size filters.

    4. **Result Aggregation:** The raw JSON response for each IP is collected. The
    action also calculates API usage statistics (remaining queries).

    5. **Table Generation:** The action transforms the complex JSON response into
    several human-readable data tables:
        * **Summary Information:** High-level overview including Country Code, WHOIS
    data, and overall insight ratings.
        * **Insights:** Specific threat indicators or behavioral observations.
        * **Top PDNS:** Recent Passive DNS resolutions.
        * **Top Peers:** Significant network communication partners.
        * **Top Open Ports:** Services identified on the host.
        * **Top Fingerprints & Certificates:** Cryptographic and service-level identification
    data.
    6. **Final Output:** The action returns a success status if at least one IP was
    successfully queried, providing the full JSON result and the generated tables
    to the case wall.


    ### Additional Notes

    - If the number of valid IPs exceeds the **Limit** parameter, the extra IPs are
    skipped and a warning is logged.

    - The **Days** parameter, if provided, will override any values in **Start Date**
    or **End Date**.
