  reasoning: >-
    The Telegram integration is primarily used as a communication channel for the
    SOC. It provides multiple actions to send messages, documents, photos, and polls
    to Telegram, which facilitates notifying stakeholders of critical findings and
    enables 'Human-in-the-Loop' workflows (e.g., waiting for poll results). This aligns
    directly with the Collaboration category. The connector ingests messages as alerts
    into the SOAR platform; while this is an ingestion capability, it does not meet
    the specific criteria for SIEM (searching logs/assets/IOCs), EDR, or other categories.
    The administrative actions, such as 'Set User Permissions' and 'Set Default Chat
    Permissions', are specific to managing Telegram chat settings and do not constitute
    enterprise IAM or other security management categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
