Telegram Connector:
  ai_description: >-
    ### General Description

    The Telegram Connector enables the ingestion of messages from Telegram channels
    and supergroups into Google SecOps. It allows security teams to monitor Telegram
    activity by treating messages as alerts within the SOAR platform. Note: The bot
    must be a member of the group or an admin of the channel to access messages. This
    connector cannot run concurrently with an active Telegram Webhook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | String | Yes | The API token for your Telegram bot. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the connector. |


    ### Flow Description

    1. Initializes the `TelegramManager` using the provided API Token.

    2. Retrieves the last processed `update_id` from the connector's persistent storage
    to ensure only new messages are fetched.

    3. Queries the Telegram API (`getUpdates`) for new messages starting from the
    offset of the last processed ID.

    4. Iterates through the retrieved updates, distinguishing between standard messages
    (private/group) and channel posts.

    5. Maps each message into a standardized event format, including timestamps and
    metadata.

    6. Creates an `AlertInfo` object for each event and adds it to the SOAR case queue.

    7. Updates the persistent storage with the latest `update_id` upon successful
    processing.
