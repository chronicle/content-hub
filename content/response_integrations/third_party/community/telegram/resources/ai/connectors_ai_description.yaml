Telegram Connector:
  ai_description: "### General Description\nThe Telegram Connector enables the ingestion\
    \ of messages from Telegram channels, groups, and private chats into Google SecOps.\
    \ By leveraging the Telegram Bot API, this connector monitors for new messages\
    \ and transforms them into actionable alerts within the SOAR platform. \n\n**Important\
    \ Considerations:**\n* For channel monitoring, the bot must be an administrator.\n\
    * For group monitoring, the bot must have access to messages.\n* This connector\
    \ cannot operate simultaneously with an active Telegram Webhook. If a webhook\
    \ is active, it must be disabled using the Telegram API `setWebhook` method before\
    \ running this connector.\n\n### Parameters Description\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| API Token | Password\
    \ | Yes | The Telegram Bot API token used to authenticate and communicate with\
    \ the Telegram API. |\n| DeviceProductField | String | Yes | The field name used\
    \ to determine the device product in the ingested event. |\n| EventClassId | String\
    \ | Yes | The field name used to determine the event name (sub-type) in the ingested\
    \ event. |\n| PythonProcessTimeout | String | Yes | The timeout limit (in seconds)\
    \ for the Python process running the connector script. |\n\n### Flow Description\n\
    1. **Initialization**: The connector initializes the `TelegramManager` using the\
    \ provided API Token.\n2. **State Retrieval**: It retrieves the `last_saved_update_id`\
    \ from the connector context to ensure only new messages are processed.\n3. **Data\
    \ Fetching**: It queries the Telegram API (`getUpdates`) starting from the next\
    \ message ID (`last_saved_update_id + 1`).\n4. **Processing**: \n    * Iterates\
    \ through the retrieved updates.\n    * Identifies the message type (`message`\
    \ for private/group or `channel_post` for channels).\n    * Flattens the message\
    \ data and maps it to a standard event format.\n5. **Alert Creation**: Each processed\
    \ event is converted into a SOAR `AlertInfo` object with defined start/end times\
    \ and priority.\n6. **Persistence**: After processing, the latest `update_id`\
    \ is saved back to the connector context to prevent duplicate processing in future\
    \ runs.\n7. **Output**: The collected alerts are returned to the SOAR platform\
    \ for case creation."
