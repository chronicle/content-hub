  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific Telegram chat using its unique
    identifier or username. This action is useful for gathering metadata about groups,
    channels, or private chats, such as the chat title, type, and the invite link
    if available.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier or username for the target Telegram
    chat (e.g., a numeric ID or '@username'). |


    ### Flow Description

    1. **Initialization**: The action initializes the Telegram Manager using the API
    Token provided in the integration configuration.

    2. **Parameter Extraction**: It retrieves the 'Chat ID' from the action parameters.

    3. **API Interaction**: The action calls the Telegram API's `getChat` endpoint
    to fetch the details of the specified chat.

    4. **Data Processing**: It extracts the `invite_link` from the API response to
    provide a direct link to the chat.

    5. **Output**: The action returns the full chat details as a JSON object and adds
    the invite link to the action results in the Google SecOps interface.


    ### Additional Notes

    This action does not operate on entities; it requires a specific Chat ID to be
    provided manually or via a playbook property. It is a read-only operation and
    does not modify any data within Telegram.
