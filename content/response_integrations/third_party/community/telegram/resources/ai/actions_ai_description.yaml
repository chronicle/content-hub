Get Chat Details:
  ai_description: >-
    ### General Description

    Retrieves the details of a specific chat from Telegram using the provided Chat
    ID. This action fetches information about the chat and extracts its invite link
    for easy access.


    ### Flow Description

    1. Extracts the `Chat ID` parameter provided by the user.

    2. Initializes the Telegram API client using the configured Bot API Token.

    3. Makes a GET request to the Telegram API (`getChat` endpoint) to fetch the details
    of the specified chat.

    4. Extracts the `invite_link` from the API response and attaches it as a link
    to the action's results.

    5. Returns the complete chat details as a JSON object in the action results.


    ### Additional Notes

    The action will fail if the provided Chat ID is invalid or if the bot does not
    have sufficient permissions to access the chat details.
