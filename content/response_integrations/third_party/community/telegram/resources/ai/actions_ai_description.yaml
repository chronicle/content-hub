    ### General Description

    Retrieves messages from a specific Telegram chat using the Telegram bot API.


    ### Flow Description

    1. Extracts the provided parameters, including the starting message ID and the
    types of messages to retrieve.

    2. Calls the Telegram API (`getUpdates` endpoint) to fetch the messages based
    on the provided offset and allowed update types.

