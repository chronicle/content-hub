Send Location:
  ai_description: >-
    Sends a specific geographic location to a designated Telegram chat using a bot.
    This action is primarily used for notification or coordination purposes, allowing
    a SOAR playbook to share coordinates directly into a Telegram conversation.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Telegram Bot API Token from
    the integration configuration and the Chat ID, Latitude, and Longitude from the
    action parameters.

    2. **Manager Initialization:** It initializes the `TelegramManager` with the provided
    API token to facilitate communication with the Telegram Bot API.

    3. **API Interaction:** The action calls the `sendLocation` method, which sends
    a GET request to the Telegram API endpoint with the specified coordinates and
    target chat identifier.

    4. **Result Handling:** The response from Telegram (containing details of the
    sent message) is captured and added to the action's JSON results. The action then
    terminates with a success or failure message based on the API response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier or username for the target chat
    (e.g., a user ID or a group chat ID). |

    | Latitude | String | Yes | The latitude coordinate of the location to be sent
    (e.g., 30.0123213). |

    | Longitude | String | Yes | The longitude coordinate of the location to be sent
    (e.g., 30.456468). |


    ### Additional Notes

    * This action does not process SecOps entities; it relies entirely on the provided
    input parameters.

    * The Telegram Bot must have the necessary permissions to send messages to the
    specified Chat ID.
