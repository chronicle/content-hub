Set Default Chat Permissions:
  ai_description: "Sets default chat permissions for all new members in a specified\
    \ Telegram group or supergroup. This action allows administrators to define the\
    \ baseline capabilities for new participants, such as their ability to send messages,\
    \ polls, invite others, or modify chat settings. \n\n### Parameters\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Chat ID\
    \ | string | Yes | The unique identifier or username of the target chat where\
    \ permissions will be applied. |\n| Can Send Messages | boolean | No | If true,\
    \ allows users to send text messages, contacts, and locations. Default is true.\
    \ |\n| Can Send Polls | boolean | No | If true, allows users to send polls. Default\
    \ is true. |\n| Can Invite Users | boolean | No | If true, allows users to invite\
    \ new members to the chat. Default is true. |\n| Can Pin Messages | boolean |\
    \ No | If true, allows users to pin messages. Note: This cannot be applied in\
    \ supergroups. Default is true. |\n| Can Edit Info | boolean | No | If true, allows\
    \ users to edit chat titles, photos, and other settings. Note: This cannot be\
    \ applied in supergroups. Default is true. |\n\n### Additional Notes\n- The Telegram\
    \ bot must be an administrator in the target group or supergroup.\n- The bot must\
    \ specifically have the `can_restrict_members` administrative permission for this\
    \ action to succeed.\n\n### Flow Description\n1. **Initialization**: The action\
    \ retrieves the Telegram API Token from the integration configuration and extracts\
