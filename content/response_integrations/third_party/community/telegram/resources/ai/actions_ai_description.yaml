  ai_description: >-
    ### General Description

    This action waits for poll results from a Telegram bot. It polls the Telegram
    API for updates, filters for a specific poll ID, and checks if the votes for any
    option meet a defined threshold. This action is designed to be run asynchronously,
    allowing it to wait for poll results over a specified timeframe.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Scan back Limit | string | Yes | Top amount of polls' answers to be scanned.
    |

    | Waiting Timeframe | string | Yes | Time in minutes to wait for votes. |

    | Answer Votes Threshold | string | Yes | Number of votes required to stop waiting.
    |

    | Poll ID | string | Yes | The ID of the poll to fetch answers for. |


    ### Flow Description

    1. Initialize parameters (Poll ID, Threshold, Timeframe, Limit).

    2. Check if it's the first run or a subsequent run (using `additional_data` for
    state).

    3. Fetch updates from Telegram using `TelegramManager`.

    4. Filter updates for the specific `Poll ID`.

    5. Check if any option in the poll meets the `Answer Votes Threshold`.

    6. If threshold met, complete the action.

    7. If threshold not met but timeframe reached, complete the action (with failure/timeout
    status).

    8. If threshold not met and timeframe not reached, continue waiting (return `EXECUTION_STATE_INPROGRESS`).


    ### Additional Notes

    This action is designed to be run asynchronously. It maintains state across runs
    using the `additional_data` parameter to track the start time and the last processed
    update ID.
