  ai_description: >-
    ### General Description

    This action retrieves the configuration details of the configured Telegram bot.
    It is primarily used to verify the connectivity and validity of the Telegram API
    token provided in the integration settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | String | Yes | The API token used to authenticate with the Telegram
    Bot API. |


    ### Flow Description

    1. The action initializes the `TelegramManager` using the provided API token.

    2. It executes a `GET` request to the Telegram API's `/getMe` endpoint.

    3. The response, containing the bot's details, is captured and returned as a JSON
    result.

    4. The action concludes by logging the status and returning the result to the
    SOAR platform.


    ### Additional Notes

    This action is a utility operation and does not perform any modifications to external
    systems or internal SOAR data. It does not operate on entities.
