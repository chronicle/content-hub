Wait for poll results:
  ai_description: >-
    ### General Description

    This action monitors a specific Telegram poll and retrieves its results once certain
    conditions are met. It is an asynchronous action that periodically checks for
    updates from the Telegram bot until either a specified vote threshold is reached
    for any poll option or a maximum waiting timeframe expires. This is primarily
    used in automated workflows to pause execution until a user or group provides
    feedback via a Telegram poll.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | **Poll ID** | The unique identifier of the Telegram poll to monitor for answers.
    | String | Yes |

    | **Answer Votes Threshold** | The number of votes required for any single poll
    option to satisfy the condition and stop the waiting process. | String | Yes |

    | **Waiting Timeframe** | The maximum duration (in minutes) the action will wait
    for the threshold to be met. If this time passes, the action completes with the
    current results. | String | Yes |

    | **Scan back Limit** | The maximum number of recent Telegram updates to retrieve
    and scan when searching for the poll's status. | String | Yes |


    ### Additional Notes

    - This action is **asynchronous**. If the threshold is not met and the timeframe
    has not expired, the action will enter an 'In Progress' state and resume in the
    next execution cycle.

    - The action uses the `getUpdates` Telegram API method, specifically filtering
    for 'poll' update types.


    ### Flow Description

    1. **Initialization**: The action retrieves the Telegram API Token from the integration
    configuration and extracts the Poll ID, Vote Threshold, Timeframe, and Scan Limit
    from the action parameters.

    2. **State Recovery**: If this is a subsequent run (async), it recovers the start
    time and the last processed update ID from the previous execution's state.

    3. **Data Retrieval**: It calls the Telegram API to fetch recent updates based
    on the **Scan back Limit** and the last known update offset.

    4. **Filtering**: The action filters the retrieved updates to find those matching
    the specified **Poll ID**.

    5. **Threshold Evaluation**: It checks the current vote counts for all options
    in the identified poll. If any option's `voter_count` is greater than or equal
    to the **Answer Votes Threshold**, the action marks itself as completed.

    6. **Timeframe Check**: If the threshold is not met, it calculates the elapsed
    time. If the elapsed time exceeds the **Waiting Timeframe**, the action completes.

    7. **Asynchronous Wait**: If neither the threshold nor the timeframe has been
    reached, the action saves its current state (start time, timeframe, and last update
    ID) and sets its status to 'In Progress' to be re-executed later.

    8. **Result Reporting**: Upon completion or during the wait, the action provides
    the current poll answers and raw update data in the JSON results.
