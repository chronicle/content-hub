  ai_description: >-
    ### General Description

    The **Send Photo** action allows a Google SecOps bot to send an image to a specific
    Telegram chat or channel. This is useful for automated notifications that require
    visual context, such as screenshots of dashboards, security alerts, or forensic
    evidence. The action requires a direct URL to the image and the target Chat ID.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Chat ID** | String | Yes | The unique identifier for the target Telegram chat
    or channel where the photo will be sent. |

    | **Photo URL** | String | Yes | The HTTP/HTTPS URL of the photo to be sent. The
    URL must point directly to an image file and should end with a valid extension
    (e.g., .png, .jpeg, .jpg). |


    ### Additional Notes

    - The Telegram Bot must have the necessary permissions to post in the specified
    Chat ID.

    - The image must be accessible via the provided URL by the Telegram servers.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the Telegram Bot API Token
    from the integration configuration.

    2. **Parameter Extraction:** It extracts the target `Chat ID` and the `Photo URL`
    from the action input.

    3. **API Interaction:** The action initializes the `TelegramManager` and calls
    the `send_photo` method, which sends a request to the Telegram Bot API endpoint
    `/sendPhoto`.

    4. **Result Processing:** If successful, the action returns the metadata of the
    sent message as a JSON result. If the request fails (e.g., invalid Chat ID or
    inaccessible URL), the action reports a failure state.
