    API Token.

    3. **API Interaction**: Calls the Telegram `sendLocation` endpoint with the specified
    chat ID and coordinates.

    4. **Result Processing**: Captures the API response, attaches it as a JSON result
    to the action, and reports a success or failure message based on the outcome of
    the network request.
