  ai_description: >-
    ### General Description

    The **Ping** action is designed to test and verify the connectivity between the
    Google SecOps platform and the Telegram API. Its primary purpose is to ensure
    that the integration is correctly configured and that the provided Bot API Token
    is valid and authorized to communicate with Telegram's servers.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration (specifically the 'API Token').


    ### Additional Notes

    - This action does not interact with any entities (IPs, Users, etc.).

    - It is a read-only operation that checks the status of the bot account.

    - Per standard SOAR practices, Ping actions are used for health checks and are
    not classified as enrichment.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the 'API Token' from the Telegram
    integration settings.

    2. **Manager Initialization**: It initializes the Telegram communication manager
    with the provided token.

    3. **API Request**: The action executes a GET request to the Telegram `/getMe`
    endpoint.

    4. **Validation**: It checks the response from Telegram to confirm the bot is
    active and the token is valid.

    5. **Final Status**: The action returns a success message if the connection is
    established, or a failure message if the API call fails or returns an error.
