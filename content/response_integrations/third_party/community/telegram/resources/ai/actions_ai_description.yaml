Get Bot Details:
  ai_description: >-
    ### General Description

    Retrieves the configuration and details of the Telegram bot associated with the
    provided API token.


    ### Flow Description

    1. Extracts the Telegram API token from the integration configuration.

    2. Initializes the `TelegramManager` to handle API communications.

    3. Makes a GET request to the Telegram API (`/getMe` endpoint) to fetch the bot's
    details.

    4. Returns the retrieved bot details as a JSON object and attaches it to the action's
    results.


    ### Additional Notes

    This action is useful for verifying the bot's identity, capabilities, and ensuring
    successful connectivity to the Telegram API.
