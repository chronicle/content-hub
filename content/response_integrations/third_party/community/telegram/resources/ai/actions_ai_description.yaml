  ai_description: >-
    ### General Description

    The **Wait for poll results** action is an asynchronous utility designed to monitor
    a specific Telegram poll and retrieve its results. It is typically used in workflows
    where a decision or input is required from a user via a Telegram poll. The action
    continues to poll the Telegram API until either a specific vote threshold is reached
    for any of the poll options or a pre-defined waiting timeframe expires.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Poll ID** | String | Yes | The unique identifier of the poll to fetch answers
    for. |

    | **Answer Votes Threshold** | String | Yes | The number of votes an answer must
    receive for the action to stop waiting and return a successful result. |

    | **Waiting Timeframe** | String | Yes | The maximum amount of time (in minutes)
    to wait for votes before the action stops, even if the threshold wasn't met. |

    | **Scan back Limit** | String | Yes | The maximum number of poll answers/updates
    to scan in the Telegram history (specifically for polls sent by the bot). |


    ### Flow Description

    1. **Initialization**: The action retrieves the Telegram API token from the integration
    configuration and extracts the user-defined parameters (Poll ID, Threshold, Timeframe,
    and Scan Limit).

    2. **State Management**: On the first run, it initializes the start time. On subsequent
    runs (asynchronous retries), it retrieves the previous state (start time, timeframe,
    and last scanned update ID) from the action's internal `additional_data` parameter.

    3. **Data Retrieval**: It calls the Telegram `getUpdates` API to fetch recent
    activity, specifically looking for poll-related updates.

    4. **Filtering**: The action filters the retrieved updates to find matches for
    the specific **Poll ID** provided in the parameters.

    5. **Threshold Evaluation**: It checks the `voter_count` for each option in the
    poll. If any option meets or exceeds the **Answer Votes Threshold**, the action
    completes successfully.

    6. **Timeout Check**: If the threshold is not met, it calculates the elapsed time.
    If the **Waiting Timeframe** has been reached, the action completes, returning
    the current state of the poll even if the threshold wasn't met.

    7. **Iteration**: If neither the threshold nor the timeout is met, the action
    sets its state to `IN_PROGRESS` and schedules a retry, passing the current state
    forward to the next execution cycle.


    ### Additional Notes

    - This action is asynchronous and will run multiple times until a concluding condition
    is met.

    - The **Scan back Limit** helps optimize performance by limiting how far back
    in the update history the bot looks for the specific poll.
