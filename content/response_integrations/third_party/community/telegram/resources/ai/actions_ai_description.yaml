Get Bot Details:
  ai_description: >-
    Retrieves the configuration details and metadata of the Telegram bot associated
    with the provided API token. This action is primarily used to verify the bot's
    identity and status within the Telegram platform.


    ### Flow Description:

    1. **Configuration Retrieval:** The action extracts the 'API Token' from the Telegram
    integration's global configuration.

    2. **Manager Initialization:** It initializes the Telegram Manager using the retrieved
    token.

    3. **API Interaction:** The action calls the Telegram API's `/getMe` endpoint
    to fetch the bot's details.

    4. **Result Processing:** The retrieved JSON data, containing information such
    as the bot's ID, name, and username, is attached to the action's execution results.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any action-specific parameters.
    It relies on the global integration configuration for the API Token. |


    ### Additional Notes:

    - This action is a diagnostic or utility task used to confirm that the bot is
    correctly configured and reachable.
