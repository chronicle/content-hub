Send Document:
  ai_description: >-
    ### General Description

    Sends a document to a specified Telegram chat or channel using a provided URL.
    This action is useful for automated reporting or sharing files (such as logs,
    evidence, or summaries) directly to a Telegram-based communication channel during
    an incident response workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Document URL | string | Yes | The web URL of the document to be sent. Telegram
    will download the file from this URL and send it to the chat. |

    | Chat ID | string | Yes | The unique identifier for the target chat, group, or
    channel where the document should be sent. |


    ### Additional Notes

    - This action requires a valid Telegram Bot API Token to be configured in the
    integration settings.

    - The document is sent via the Telegram Bot API's `sendDocument` method.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Telegram Bot API Token from
    the integration configuration and the 'Chat ID' and 'Document URL' from the action
    parameters.

    2. **Manager Initialization**: It initializes the `TelegramManager` using the
    provided API token.

    3. **API Execution**: The action calls the `send_doc` method, which sends a request
    to the Telegram API to deliver the document from the specified URL to the target
    chat.

    4. **Result Handling**: If the API call is successful, the action returns a success
    status and includes the JSON response from Telegram in the results. If it fails,
    an error message is captured and the action is marked as failed.
