  ai_description: >-
    Adds or revokes user permissions in a Telegram supergroup or a channel. This action
    allows a bot (which must be an administrator with appropriate rights) to manage
    specific administrative and member privileges for a target user. It can be used
    to promote users to admin roles or restrict their capabilities within a chat.


    ### Flow Description

    1. **Initialization**: The action initializes the Telegram Manager using the provided
    API Token.

    2. **Parameter Extraction**: It retrieves the target `Chat ID`, `User ID`, and
    various boolean permission flags from the action parameters.

    3. **API Interaction**: The action calls the Telegram `promoteChatMember` API
    endpoint, passing the permission flags to update the user's status.

    4. **Result Processing**: It captures the API response, determines if the operation
    was successful, and outputs the resulting JSON data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User ID | string | Yes | The unique identifier of the user whose permissions
    are being modified. |

    | Chat ID | string | Yes | The unique identifier or username of the target supergroup
    or channel. |

    | Can Pin Messages | boolean | No | If true, the user can pin messages (relevant
    for supergroups only). |

    | Can Promote Members | boolean | No | If true, the user can add new administrators
    or revoke existing ones. |

    | Can Restrict Members | boolean | No | If true, the user can restrict, ban, or
    unban chat members. |

    | Can Post Messages | boolean | No | If true, the user can post messages (relevant
    for channels only). |

    | Can Edit The Info | boolean | No | If true, the user can edit chat title, photo,
    and other settings. |

    | Is Anonymous | boolean | No | If true, the user's presence in the chat is hidden.
    |

    | Can Invite Users | boolean | No | If true, the user can invite new users to
    the chat. |

    | Can Delete Messages | boolean | No | If true, the user can delete messages of
    other users. |

    | Can Edit Messages | boolean | No | If true, the user can edit messages of other
    users. |


    ### Additional Notes

    - The bot must be an administrator in the target chat for this action to work.

    - The bot must have the specific administrative permissions it is trying to grant
    or revoke from others.
