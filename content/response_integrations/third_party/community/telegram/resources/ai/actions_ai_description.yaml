  ai_description: >-
    Waits for and retrieves answers to a specific Telegram poll. It runs asynchronously,
    periodically checking the poll's results until a specified vote threshold is met
    or a waiting timeframe expires.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Scan back Limit | String | Yes | Top amount of poll answers to be scanned. (Only
    for polls sent by this bot). |

    | Waiting Timeframe | String | Yes | The amount of time (in minutes) to wait for
    votes. After this timeframe, the action will stop even if the threshold wasn't
    met. |

    | Answer Votes Threshold | String | Yes | The number of votes required for an
    option to stop waiting. After an option gets this many votes, the action will
    complete successfully. |

    | Poll ID | String | Yes | The ID of the poll to fetch answers for. |


    ### Flow Description

    1. Initializes the Telegram manager with the bot API token.

    2. Calculates the timeframe and start time based on whether it is the first run
    or a subsequent asynchronous run.

    3. Fetches updates from Telegram using the provided limit and offset.

    4. Filters the updates to find the specific poll ID.

    5. Checks if any option in the poll has reached the vote threshold.

    6. If the threshold is met, completes the action successfully.

    7. If the threshold is not met and the timeframe has not expired, suspends the
    action to wait further.

    8. If the timeframe expires without meeting the threshold, completes the action
    with a failure status.

    9. Outputs the raw poll results as JSON.
