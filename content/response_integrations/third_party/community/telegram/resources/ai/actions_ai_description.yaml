  ai_description: >-
    ### General Description

    Retrieves messages and updates from a Telegram chat where the bot is a member.
    This action interacts with the Telegram Bot API's `getUpdates` endpoint to pull
    communication data, which can then be used for further analysis or ingestion within
    the SOAR platform. It allows for filtering by message type and starting from a
    specific message ID (offset).


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Last Message ID | string | No | The ID of the last message from which the action
    will start pulling all subsequent messages. This corresponds to the 'offset' parameter
    in the Telegram API. |

    | Message Types | content | No | A list of the message/update types to retrieve
    (e.g., `['message', 'channel_post', 'poll_answer']`). If empty, all types are
    retrieved. |


    ### Flow Description

    1. **Initialization**: The action initializes the Telegram Manager using the provided
    API Token from the integration configuration.

    2. **Parameter Extraction**: It extracts the `Last Message ID` (used as an offset)
    and the `Message Types` (allowed updates) from the action parameters.

    3. **API Interaction**: The action calls the Telegram `getUpdates` method via
    a GET request to fetch the latest messages based on the provided filters.

    4. **Result Processing**: The retrieved messages are returned as a JSON object
    and stored in the action's execution results.


    ### Additional Notes

    - The bot must be a member of the chat/channel to retrieve its messages.

    - This action does not target specific entities and operates as a general data
    retrieval task.
