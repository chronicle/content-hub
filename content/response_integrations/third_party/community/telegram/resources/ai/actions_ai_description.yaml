  ai_description: >-
    ### General Description

    Sends a document via a provided URL to a specified Telegram chat. This action
    allows automated delivery of files or reports directly into a Telegram conversation.


    ### Flow Description

    1. Extracts the `Chat ID` and `Document URL` from the action parameters.

    2. Initializes the Telegram API client using the integration's Bot API token.

    3. Makes an HTTP request to the Telegram `sendDocument` API endpoint to deliver
    the document to the target chat.

    4. Captures the API response and attaches the sent document details as a JSON
    result to the action.


    ### Additional Notes

    The provided document URL must be publicly accessible so that the Telegram API
    can fetch and process the file.
