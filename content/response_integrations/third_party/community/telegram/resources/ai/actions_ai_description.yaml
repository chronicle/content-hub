Send Message:
  ai_description: >-
    ### General Description

    The **Send Message** action allows a configured Telegram bot to send a text message
    to a specific chat. This is primarily used for automated notifications, alerting
    analysts, or communicating status updates to a Telegram group or individual user
    directly from a Google SecOps playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Chat ID** | String | Yes | The unique identifier for the Telegram chat (group,
    channel, or private) where the message should be sent. |

    | **Message** | String | Yes | The actual text content of the message to be delivered
    by the bot. |


    ### Flow Description

    1. **Initialization**: The action retrieves the bot's API Token from the integration
    configuration and the target Chat ID and Message content from the action parameters.

    2. **API Connection**: It initializes the Telegram Manager and prepares a request
    to the Telegram Bot API's `sendMessage` endpoint.

    3. **Execution**: The bot sends the message to the specified chat via an HTTP
    request.

    4. **Result Handling**: The action captures the JSON response from Telegram (containing
    message details) and reports a success or failure status back to the SOAR platform.


    ### Additional Notes

    - This action does not process or iterate over SecOps entities; it relies entirely
    on the provided parameters.

    - Ensure the bot has the necessary permissions to post in the target chat ID.
