  ai_description: >-
    ### General Description

    Sets the default chat permissions for all new members in a specified Telegram
    chat or group. This action allows administrators to define the baseline capabilities
    for new participants, such as their ability to send messages, polls, invite other
    users, or modify chat information. It is primarily used for group management and
    automated moderation within Telegram communities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier for the target chat or group
    where permissions will be applied. |

    | Can Send Messages | Boolean | No | Determines if new members are allowed to
    send text messages, contacts, and locations. Default is true. |

    | Can Edit Info | Boolean | No | Determines if new members can edit the chat title,
    photo, and other settings. Note: This cannot be applied in supergroups. Default
    is true. |

    | Can Invite Users | Boolean | No | Determines if new members can invite other
    users to the chat. Default is true. |

    | Can Pin Messages | Boolean | No | Determines if new members are allowed to pin
    messages. Note: This cannot be applied in supergroups. Default is true. |

    | Can Send Polls | Boolean | No | Determines if new members are allowed to send
    polls. Default is true. |


    ### Additional Notes

    * The bot must be an administrator in the target group or supergroup for this
    action to function.

    * The bot must specifically have the `can_restrict_members` administrative permission.

    * Certain permissions (like 'Can Edit Info' and 'Can Pin Messages') are restricted
    by Telegram and cannot be applied to supergroups via this specific method.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the Telegram Bot API Token
    from the integration settings.

    2. **Parameter Extraction:** It extracts the target Chat ID and the specific permission
    flags (Send Messages, Edit Info, Invite Users, Pin Messages, Send Polls) provided
    by the user.

    3. **API Interaction:** The action initializes the Telegram Manager and calls
    the `setChatPermissions` endpoint on the Telegram API with the specified parameters.

    4. **Result Processing:** If the API call is successful, the action returns a
    success message and the raw JSON response from Telegram. If the call fails (e.g.,
    due to insufficient bot permissions or an invalid Chat ID), it returns an error
    message and marks the action as failed.
