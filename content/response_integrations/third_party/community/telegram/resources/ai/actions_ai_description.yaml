Send Poll:
  ai_description: >-
    ### General Description

    Sends a poll with pre-defined answer options to a specific Telegram chat or channel
    using a Telegram Bot. This action is useful for gathering feedback or making collaborative
    decisions within a chat environment directly from a SOAR playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Chat ID | String | Yes | The unique identifier for the target chat or the username
    of the target channel (e.g., @channelusername). Note: Non-anonymous polls cannot
    be sent to channel chats. |

    | Question | String | Yes | The question text to be sent in the poll. |

    | Options | Content (Array) | Yes | A JSON array of strings representing the answer
    options (e.g., ["Yes", "No"]). Telegram typically requires between 2 and 10 options.
    |

    | Is Anonymous | Boolean | No | Determines if the poll results will be anonymous.
    If set to false, users' identities will be visible to the bot and other users.
    Default is false. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Telegram Bot API Token
    from the integration settings.

    2. **Parameter Extraction**: It extracts the target Chat ID, the question text,
    the list of options, and the anonymity preference from the action parameters.

    3. **API Interaction**: The action calls the Telegram `sendPoll` API endpoint
    via the `TelegramManager`.

    4. **Result Processing**: If successful, the action returns the metadata of the
