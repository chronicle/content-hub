Get Messages:
  ai_description: >-
    ### General Description

    The **Get Messages** action retrieves updates and messages from a specific Telegram
    chat where the bot is a member. It utilizes the Telegram Bot API's `getUpdates`
    method to pull incoming data, allowing analysts to monitor chat activity, channel
    posts, or poll results directly within Google SecOps.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Last Message ID | The ID of the last message (offset) from which the action
    will start pulling messages. This helps in controlling the starting point of the
    data retrieval. | String | No |

    | Message Types | A list of update types to retrieve (e.g., `['channel_post',
    'poll_answer']`). If left empty, all supported update types are returned. | Content
    | No |


    ### Flow Description

    1. **Initialization**: The action extracts the Telegram API Token from the integration
    configuration.

    2. **Parameter Extraction**: It retrieves the `Last Message ID` (used as an offset)
    and the `Message Types` (allowed updates) from the action input.

    3. **API Interaction**: The action initializes the `TelegramManager` and calls
    the `get_messages` method, which sends a GET request to the Telegram Bot API's
    `/getUpdates` endpoint.

    4. **Data Processing**: The retrieved JSON response containing the messages is
    captured.

    5. **Output**: The action attaches the raw message data to the action's JSON results
    for further processing or inspection in the SOAR platform.


    ### Additional Notes

    - The bot must be a member of the chat or channel to successfully retrieve messages.

    - This action does not target specific entities but rather fetches global updates
    for the configured bot.
