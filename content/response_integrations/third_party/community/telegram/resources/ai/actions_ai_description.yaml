    ### General Description

    This action retrieves the configuration details of the configured Telegram bot.
    It is primarily used to verify the connectivity and validity of the Telegram API
    token provided in the integration settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | String | Yes | The API token used to authenticate with the Telegram
    Bot API. |


