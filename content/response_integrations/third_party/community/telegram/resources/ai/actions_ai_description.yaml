Get Chat Details:
  ai_description: >-
    ### General Description

    The **Get Chat Details** action retrieves comprehensive metadata for a specific
    Telegram chat using its unique identifier or username. This action is primarily
    used to gather context about a communication channel, such as its title, type
    (private, group, supergroup, or channel), and invite link. It is a utility action
    that helps analysts verify the existence and properties of a chat involved in
    an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Chat ID** | String | Yes | The unique identifier or username (e.g., '@username')
    of the target Telegram chat. |


    ### Flow Description

    1. **Initialization:** The action retrieves the Telegram Bot API Token from the
    integration's configuration settings.

    2. **Parameter Extraction:** The `Chat ID` provided by the user is extracted.

    3. **API Request:** The action utilizes the `TelegramManager` to call the Telegram
    `getChat` API endpoint with the specified ID.

    4. **Data Extraction:** Upon a successful response, the action extracts the chat's
    invite link (if available).

    5. **Output Generation:** The action adds the invite link to the SOAR result interface
    and attaches the full JSON response containing all chat details for use in downstream
    playbook logic.


    ### Additional Notes

    - This action does not operate on SecOps entities; it requires a manually provided
    `Chat ID`.

    - The bot must be a member of the chat or have sufficient permissions to retrieve
    its details.
