  ai_description: >-
    ### General Description

    This action updates the default chat permissions for a specified Telegram group
    or supergroup. It allows administrators to configure restrictions for new members,
    such as the ability to send messages, edit chat information, invite users, pin
    messages, or send polls. The action interacts with the Telegram Bot API to apply
    these settings.


    ### Parameters Description

    - Chat ID (string, mandatory): The unique identifier for the Telegram chat (group
    or supergroup) to be configured.

    - Can Send Messages (boolean, optional): If true, allows users to send text messages.
    Default is true.

    - Can Edit Info (boolean, optional): If true, allows users to edit the chat title,
    photo, and other settings. Default is true. Note: Cannot be applied in supergroups.

    - Can Invite Users (boolean, optional): If true, allows users to invite new members
    to the chat. Default is true.

    - Can Pin Messages (boolean, optional): If true, allows users to pin messages.
    Default is true. Note: Cannot be applied in supergroups.

    - Can Send Polls (boolean, optional): If true, allows users to send polls. Default
    is true.


    ### Flow Description

    1. The action extracts the required configuration (API Token) and the action parameters
    (Chat ID and permission settings).

    2. It initializes the TelegramManager with the provided API Token.

    3. It calls the set_default_chat_permissions method, which sends a request to
    the Telegram API endpoint setChatPermissions with the specified configuration.

    4. The action returns a success or failure status, along with the JSON response
    from the Telegram API, and terminates the execution.


    ### Additional Notes

    - The bot must be an administrator in the target group or supergroup and must
    have the can_restrict_members permission for this action to succeed.

    - Some permissions (e.g., Can Edit Info, Can Pin Messages) may have limitations
    depending on the chat type (e.g., supergroups).
