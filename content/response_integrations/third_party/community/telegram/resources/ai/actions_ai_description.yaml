Set User Permissions:
  ai_description: "### General Description\nUpdates or revokes specific administrative\
    \ permissions for a user within a Telegram supergroup or channel. This action\
    \ allows for granular control over user capabilities such as pinning messages,\
    \ deleting content, or inviting new members. For this action to succeed, the configured\
    \ Telegram bot must already be an administrator in the target chat with the necessary\
    \ rights to promote or demote other members.\n\n### Parameters Description\n|\
    \ Parameter Name | Description | Type | Mandatory | \n| :--- | :--- | :--- | :---\
    \ |\n| Chat ID | The unique identifier or username of the target Telegram chat.\
    \ | String | Yes |\n| User ID | The unique identifier of the user whose permissions\
    \ are being modified. | String | Yes |\n| Is Anonymous | If set to true, the user's\
    \ presence in the chat is hidden. | Boolean | No |\n| Can Edit The Info | Allows\
    \ the user to change the chat title, photo, and other settings. | Boolean | No\
    \ |\n| Can Post Messages | Allows the user to post messages (relevant for channels).\
    \ | Boolean | No |\n| Can Edit Messages | Allows the user to edit messages sent\
    \ by others (relevant for channels). | Boolean | No |\n| Can Delete Messages |\
    \ Allows the user to delete messages sent by others. | Boolean | No |\n| Can Invite\
    \ Users | Allows the user to invite new users to the chat. | Boolean | No |\n\
    | Can Restrict Members | Allows the user to restrict, ban, or unban chat members.\
    \ | Boolean | No |\n| Can Promote Members | Allows the user to add or revoke permissions\
    \ for other administrators. | Boolean | No |\n| Can Pin Messages | Allows the\
    \ user to pin messages (relevant for supergroups). | Boolean | No |\n\n### Additional\
    \ Notes\nThis action uses the Telegram `promoteChatMember` API endpoint. While\
    \ the manager uses a GET request, the operation results in a state change on the\
    \ Telegram platform. If a permission parameter is not provided, it defaults to\
    \ the value specified in the integration settings (usually 'true' in the provided\
    \ YAML).\n\n### Flow Description\n1. **Initialization**: Retrieves the Telegram\
    \ API Token from the integration configuration.\n2. **Parameter Extraction**:\
    \ Collects the mandatory Chat ID and User ID, along with all optional permission\
    \ boolean flags from the action input.\n3. **API Execution**: Calls the `set_user_permissions`\
    \ method in the Telegram Manager, which sends a request to the `promoteChatMember`\
    \ endpoint with the specified permission set.\n4. **Result Processing**: Captures\
    \ the API response. If successful, it returns a confirmation message and the raw\
    \ JSON result; otherwise, it reports a failure with the error details."
