Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Telegram Bot API. Its primary purpose is to ensure
    that the integration is correctly configured and that the provided API Token is
    valid and authorized to communicate with Telegram's servers.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. It uses the
    'API Token' defined in the integration configuration. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'API Token' from the
    Telegram integration's shared configuration.

    2. **Connectivity Check**: It initializes the Telegram Manager and executes a
    GET request to the `getMe` endpoint of the Telegram Bot API.

    3. **Response Evaluation**: The action parses the API response to check the `ok`
    status field.

    4. **Execution Outcome**: If the API returns a successful response, the action
    completes with a success message. If the request fails or the token is invalid,
    it reports a connection failure.


    ### Additional Notes

    This is a standard health-check action and does not interact with or modify any
    entities or alert data within the SOAR platform.
