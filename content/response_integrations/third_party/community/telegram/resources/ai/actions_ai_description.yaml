Wait for poll results:
  ai_description: >-
    ### General Description

    Waits for and retrieves the answers to a specific Telegram poll. This action operates
    asynchronously, periodically checking the poll's status until a specified vote
    threshold is met or a custom timeframe expires.


    ### Flow Description

    1. Initializes the Telegram API client using the provided bot token.

    2. Calculates the waiting timeframe and tracks the execution duration.

    3. Fetches recent updates from Telegram via an API call, specifically filtering
    for poll updates.

    4. Isolates the results for the provided Poll ID.

    5. Evaluates if any of the poll options have reached the configured vote threshold.

    6. If the threshold is met, the action completes successfully and returns the
    poll answers.

    7. If the threshold is not met and the timeframe has not expired, the action suspends
    itself (In Progress) and will re-run later.

    8. If the timeframe expires without meeting the threshold, the action completes
    and indicates the threshold was not met.

    9. Outputs the raw poll results and specific answers as JSON data.


    ### Additional Notes

    This is an asynchronous action that will run multiple times until the condition
    is met or the timeout is reached.
