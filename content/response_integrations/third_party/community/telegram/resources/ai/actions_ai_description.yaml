    ### General Description

    This action tests the connectivity between the Google SecOps SOAR platform and
    the Telegram API. It verifies that the provided API Token is valid and that the
    SOAR platform can successfully communicate with the Telegram service.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | String | Yes | The Telegram Bot API token used to authenticate requests
    to the Telegram service. |


    ### Additional Notes

    This action is a connectivity test and does not perform any functional operations
    on entities or alerts.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and extracts the `API Token` from
    the integration configuration.

    2. It initializes the `TelegramManager` using the provided token.

    3. The action calls the `test_connectivity` method, which performs a `GET` request
    to the Telegram API's `getMe` endpoint.

    4. If the API returns a successful response (`ok: true`), the action completes
    with a success status.

    5. If the connection fails or the API returns an error, the action completes with
    a failure status.
