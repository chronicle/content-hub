product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The bitdefender_gravity_zone integration provides comprehensive endpoint management
    capabilities, including host isolation ('Isolate Endpoint'), restoration ('Restore
    Isolated Endpoint'), and remote scanning ('Create Scan Task'), which directly
    align with the EDR category. Additionally, the integration offers robust asset
    visibility through actions like 'Get Endpoints List' and 'Get Network Inventory
    Items', which fulfill the requirements for the Asset Inventory category. The integration
    does not provide SIEM log analysis, network gateway security, threat intelligence
    enrichment (reputation scoring), email security (phishing management), IAM, ITSM,
    Vulnerability Management, or Collaboration features.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
