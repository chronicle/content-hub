product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Bitdefender GravityZone integration provides capabilities primarily focused
    on endpoint management and asset visibility. It qualifies for the EDR category
    because it allows for host containment (Isolate/Restore Isolated Endpoint), remote
    scan execution (Create Scan Task), and retrieval of detailed endpoint information.
    It also qualifies for the Asset Inventory category as it provides multiple actions
    to search and list network inventory and endpoints (Get Endpoints List, Get Network
    Inventory Items). It does not qualify for Threat Intelligence as it lacks reputation
    enrichment capabilities (it only manages blocklists). It does not qualify for
    SIEM, Network Security, Email Security, IAM, Cloud Security, ITSM, Vulnerability
    Management, or Collaboration as it does not fulfill the specific operational requirements
    defined for those categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
