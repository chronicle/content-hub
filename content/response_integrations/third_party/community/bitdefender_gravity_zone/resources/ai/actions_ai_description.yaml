  ai_description: >-
    Initiates a scan task on specified endpoints or containers within Bitdefender
    GravityZone. This action allows users to trigger various types of scans, including
    Quick, Full, Memory, and Custom scans, to identify potential threats on target
    systems.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves the API Key, Access URL, and SSL verification
    settings from the integration configuration.

    2. **Parameter Parsing:** Extracts the target IDs, scan type, and optional custom
    scan settings (depth and paths) from the action parameters.

    3. **API Connection:** Establishes a connection to the Bitdefender GravityZone
    Control Center using the provided credentials.

    4. **Task Creation:** Maps the user-provided scan settings to the Bitdefender
    API format and sends a request to create the scan task for the specified targets.

    5. **Result Reporting:** Returns a success or failure status based on whether
    the task was successfully created in the external system.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Target IDs | string | Yes | A comma-separated list of the IDs of the targets
    to scan. These IDs can represent endpoints or containers. |

    | Scan Type | ddl | Yes | The type of scan to perform. Options include: Quick,
    Full, Memory, or Custom. |

    | Task Name | string | No | The name to assign to the task. If not provided, the
    system generates a name automatically. |

    | Custom Scan - Depth | ddl | No | The scan profile depth (Aggressive, Normal,
    Permissive). This is only utilized when the 'Scan Type' is set to 'Custom'. |

    | Custom Scan - Paths | string | No | A comma-separated list of target paths to
    be scanned. This is only utilized when the 'Scan Type' is set to 'Custom'. |


    ### Additional Notes:

    * **Note on Description:** While the internal metadata description mentions isolation,
    the actual logic and parameters of this action are strictly for creating scan
    tasks.

    * **Custom Scans:** When selecting 'Custom' as the Scan Type, ensure that 'Custom
    Scan - Depth' and 'Custom Scan - Paths' are configured to define the scope of
    the scan.
