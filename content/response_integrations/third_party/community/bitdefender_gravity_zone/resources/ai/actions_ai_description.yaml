  ai_description: >-
    Retrieves a list of endpoints from the Bitdefender GravityZone platform based
    on specified filtering criteria. This action allows users to query the network
    inventory to identify managed, unmanaged, or all endpoints, with optional filtering
    by various attributes such as security agent status, server roles, and specific
    identifiers.


    ### Flow Description

    1. The action extracts integration configuration parameters (API Key, Access URL,
    SSL verification) and action-specific filters.

    2. It initializes a connection to the Bitdefender GravityZone Control Center using
    the provided credentials.

    3. It constructs a request with the specified filters (e.g., Parent ID, Endpoint
    type, SSID, MAC addresses, Name, and various role-based flags).

    4. The action executes the `getEndpointsList` API call to retrieve the filtered
    list of endpoints.

    5. The retrieved endpoint data is returned as a JSON result in the action output.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Endpoints | ddl | Yes | Select whether to return only managed endpoints, unmanaged
    endpoints, or all endpoints. |

    | Parent ID | string | No | The ID of the target company or group. If not specified,
    returns endpoints under Computers and Groups. |

    | Filter - SSID | string | No | The SSID (Active Directory SID) used to filter
    endpoints. |

    | Filter - MAC Addresses | string | No | Comma-separated list of MAC addresses
    used to filter endpoints. |

    | Filter - Name | string | No | A string for filtering items by name (minimum
    3 characters). |

    | Filter - Depth - All Items Recursively | boolean | No | If true, filters all
    endpoints recursively within the Network Inventory. |

    | Filter - Security Servers | boolean | No | If true, filters all Security Servers.
    |

    | Filter - Managed Relays | boolean | No | If true, filters all endpoints with
    the Relay role. |

