    GravityZone Control Center using the configured API Key and Access URL.

    2. **Parameter Extraction**: It retrieves the `Parent ID` from the action parameters.

    3. **API Request**: It executes a JSON-RPC request using the `getCustomGroupsList`
    method to the Bitdefender Network API endpoint.

    4. **Data Processing**: The action validates the response from the manager and
    extracts the list of group items.

    5. **Output**: The retrieved group data is added to the action's JSON results
    for use in subsequent playbook logic.


    ### Additional Notes

    - This action does not operate on specific entities (like IPs or Hostnames) but
    rather retrieves global organizational data.

    - If no `Parent ID` is provided, the action defaults to the root level of the
    group hierarchy.
