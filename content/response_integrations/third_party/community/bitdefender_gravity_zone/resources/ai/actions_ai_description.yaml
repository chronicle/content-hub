Quarantine - Restore Items:
  ai_description: >-
    Restores items from the Bitdefender GravityZone quarantine. This action creates
    a task in the Bitdefender Control Center to move quarantined files back to their
    original location or a specified alternative path. It supports both 'Computers'
    and 'Exchange' services and allows for the optional creation of policy exclusions
    to prevent the restored files from being flagged in future scans.


    ### Flow Description

    1. **Authentication**: Connects to the Bitdefender GravityZone API using the configured
    API Key and Access URL.

    2. **Parameter Extraction**: Retrieves the list of Quarantine Item IDs, the target
    service type, the optional restoration path, and the exclusion preference.

    3. **Task Creation**: Sends a request to the Bitdefender API to initiate a `createRestoreQuarantineItemTask`
    for the specified IDs.

    4. **Execution**: The external system processes the restoration task asynchronously.

    5. **Completion**: Returns a success or failure status based on whether the task
    creation request was accepted by Bitdefender.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Quarantine Item IDs | string | Yes | A comma-separated list of unique identifiers
    for the items to be restored from quarantine. Maximum of 100 items per request.
    |

    | Service | ddl | Yes | Specifies the Bitdefender service context. Options are
    'Computers' (for endpoints/VMs) or 'Exchange' (for mail security). |

    | Location to Restore | string | No | The absolute file system path where the
    items should be restored. If left empty, the items are restored to their original
    location. |

    | Add Exclusion in Policy | boolean | No | If set to true, the restored files
    will be added to a policy exclusion list to prevent them from being quarantined
    again in future scans. |


    ### Additional Notes

    - This action does not run on SecOps entities; it requires manual input of Quarantine
    Item IDs, which are typically retrieved from a previous 'Quarantine - List Items'
    action or external logs.

    - Exclusions created via the 'Add Exclusion in Policy' parameter do not apply
    to items assigned the 'Default Policy'.
