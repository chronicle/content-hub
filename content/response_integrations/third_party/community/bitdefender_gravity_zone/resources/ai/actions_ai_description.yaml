Get Endpoints List:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of endpoints from the Bitdefender GravityZone Control
    Center. This action allows analysts to query the network inventory and filter
    results based on management status, specific roles (like Relays or Exchange servers),
    and identifiers such as MAC addresses or SSIDs. It is primarily used for asset
    discovery and visibility within the Bitdefender environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Endpoints** | DDL | Yes | Determines whether to return 'All', 'Managed', or
    'Unmanaged' endpoints. |

    | **Parent ID** | String | No | The ID of the target company or group to narrow
    the search scope. |

    | **Filter - SSID** | String | No | Filters endpoints by their Active Directory
    Security Identifier (SID). |

    | **Filter - Depth - All Items Recursively** | Boolean | No | If true, searches
    all endpoints recursively within the company's network inventory. |

    | **Filter - Security Servers** | Boolean | No | Filters the list to include only
    Security Servers. |

    | **Filter - Managed Relays** | Boolean | No | Filters the list to include only
    endpoints with the Relay role. |

    | **Filter - Managed Exchange Servers** | Boolean | No | Filters the list to include
    only protected Exchange servers. |

    | **Filter - Managed with BEST** | Boolean | No | Filters for endpoints that have
    the Bitdefender Endpoint Security Tools (BEST) agent installed. |

    | **Filter - Name** | String | No | Filters items by name. Requires a minimum
    of three characters. |

    | **Filter - MAC Addresses** | String | No | A comma-separated list of MAC addresses
    to filter the endpoints. |


    ### Additional Notes

    - The **Filter - Name** parameter requires at least 3 characters to be processed
    by the Bitdefender API; otherwise, the action will raise an error.

    - This action does not operate on specific SOAR entities but rather performs a
    global query against the Bitdefender inventory.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Key, URL) and action
    parameters (filters).

    2. **Connection**: Establishes a session with the Bitdefender GravityZone API
    using Basic Authentication.

    3. **Request Construction**: Builds a JSON-RPC request for the `getEndpointsList`
    method, applying all provided filters.

    4. **Data Retrieval**: Executes the request. If the results span multiple pages,
    the action automatically iterates through all pages to collect the full list of
    endpoints.

    5. **Output**: Returns the aggregated list of endpoints as a JSON object and completes
    the execution.
