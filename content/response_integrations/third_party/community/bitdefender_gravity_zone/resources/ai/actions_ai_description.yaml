  ai_description: >-
    ### General Description

    This action adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone
    blocklist. It allows security analysts to proactively block malicious files across
    the environment managed by Bitdefender GravityZone.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hash List | string | Yes | A comma-separated list of SHA256 or MD5 hashes to
    be added to the blocklist. |

    | Source Info | string | Yes | A description or reason for adding the hashes to
    the blocklist. |


    ### Additional Notes

    - The action does not support file types other than SHA256 or MD5. If unsupported
    hashes are provided, the action will raise an error.

    - This action does not operate on entities; it accepts a raw string of hashes
    as input.


    ### Flow Description

    1. The action extracts the required configuration (API Key, Access URL, SSL verification)
    and action parameters (Hash List, Source Info).

    2. It initializes the `BitdefenderGravityZoneManager` to establish a connection
    with the Bitdefender GravityZone Control Center.

    3. The provided comma-separated hash list is parsed and categorized into SHA256
    and MD5 lists.

    4. The action sends a POST request to the Bitdefender API to add the categorized
    hashes to the blocklist, including the provided source information.

    5. The result of the operation is returned and logged.
