    ### General Description

    This action restores quarantined items in Bitdefender GravityZone. It interacts
    with the Bitdefender API to move files from quarantine back to their original
    or specified location on the target endpoint, optionally adding an exclusion to
    the policy to prevent future detection.


    ### Flow Description

    1. Connects to the Bitdefender GravityZone Control Center using the provided API
    key and URL.

    2. Extracts the action parameters: `Quarantine Item IDs`, `Service`, `Add Exclusion
    in Policy`, and `Location to Restore`.

    3. Invokes the `quarantine_item_restore` method, which sends a `POST` request
    to the Bitdefender API to initiate the restoration task for the specified items.

    4. Returns the operation status (success or failure) to the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Quarantine Item IDs | string | Yes | Comma-separated list of quarantine item
    IDs. The maximum number of items that can be removed once is 100. |

    | Service | ddl | Yes | The service type. Allowed values are: "Computers" (for
    Computers and Virtual Machines) or "Exchange" (for Security for Exchange). |

    | Add Exclusion in Policy | boolean | No | If set to true, excludes the files
    to be restored from future scans. Exclusions do not apply to items with the Default
    Policy assigned. |

    | Location to Restore | string | No | The absolute path to the folder where the
