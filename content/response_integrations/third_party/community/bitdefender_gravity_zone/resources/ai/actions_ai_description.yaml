    users to search for and list endpoints, virtual machines, and groups within the
    network hierarchy using a wide range of filters. It is primarily used for asset
    discovery and gathering metadata about the managed environment.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves integration credentials (API
    Key, Access URL) and action-specific filters (Name, MAC, SSID, Parent ID, etc.).

    2. **Manager Initialization:** Initializes the Bitdefender GravityZone Manager
    to handle API communication.

    3. **API Request:** Executes the `getNetworkInventoryItems` method via the Bitdefender
    JSON-RPC API, applying all configured filters.

    4. **Result Processing:** The retrieved list of inventory items is returned as
    a JSON object and the action completes successfully.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter - Name | String | No | Filters items by name. Supports partial matching
    (min 3 chars). Use '*' for suffix matching. |

    | Filter - MAC Addresses | String | No | Comma-separated list of MAC addresses
    to filter endpoints. |

    | Filter - SSID | String | No | Active Directory SID used to filter endpoints.
    |

    | Filter - Depth - All Items Recursively | Boolean | No | If true, searches all
    endpoints recursively within the network inventory. Default is false. |

    | Filter - Security Servers | Boolean | No | If true, filters for Security Servers.
    Default is false. |

    | Filter - Managed Relays | Boolean | No | If true, filters for endpoints with
    the Relay role. Default is false. |

    | Filter - Managed Exchange Servers | Boolean | No | If true, filters for protected
    Exchange servers. Default is false. |

    | Filter - Managed with BEST | Boolean | No | If true, filters for endpoints with
    the Bitdefender Endpoint Security Tools agent. Default is false. |

    | Filter - Virtual Machines | Boolean | No | If true, filters for virtual machines.
    Default is false. |

    | Filter - Computers | Boolean | No | If true, filters for physical computers.
    Default is false. |

    | Filter - EC2 Instances | Boolean | No | If true, filters for Amazon EC2 Instances.
    Default is false. |

    | Filter - Groups | Boolean | No | If true, filters for custom groups of endpoints.
