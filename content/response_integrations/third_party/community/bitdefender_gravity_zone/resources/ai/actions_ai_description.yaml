Get Network Inventory Items:
  ai_description: >-
    Retrieves a list of network inventory items from Bitdefender GravityZone. This
    action allows users to query the Bitdefender environment for various asset types,
    including computers, virtual machines, Amazon EC2 instances, and security servers.
    It supports complex filtering by name (partial match), MAC addresses, and SSIDs.
    The results are returned as a JSON array, providing detailed metadata about the
    discovered assets.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter - Name | String | No | Filters items by name. Requires a minimum of 3
    characters. Supports partial matching and wildcards (*). |

    | Filter - MAC Addresses | String | No | Comma-separated list of MAC addresses
    to filter endpoints. |

    | Filter - SSID | String | No | The Active Directory SID of the endpoint used
    for filtering. |

    | Filter - Depth - All Items Recursively | Boolean | No | If set to true, filters
    all endpoints recursively within the Network Inventory. Default is false. |

    | Filter - Security Servers | Boolean | No | If set to true, filters for Security
    Servers. Default is false. |

    | Filter - Managed Relays | Boolean | No | If set to true, filters for endpoints
    with the Relay role. Default is false. |

    | Filter - Managed Exchange Servers | Boolean | No | If set to true, filters for
    protected Exchange servers. Default is false. |

    | Filter - Managed with BEST | Boolean | No | If set to true, filters for endpoints
    with the BEST security agent installed. Default is false. |

    | Filter - Virtual Machines | Boolean | No | If set to true, filters for virtual
    machines. Default is false. |

    | Filter - Computers | Boolean | No | If set to true, filters for physical computers.
    Default is false. |

    | Filter - EC2 Instances | Boolean | No | If set to true, filters for Amazon EC2
    instances. Default is false. |

    | Filter - Groups | Boolean | No | If set to true, filters for custom groups of
    endpoints. Default is false. |

    | Parent ID | String | No | The ID of the container for which the network items
    will be returned. |


    ### Additional Notes

    - The 'Filter - Name' parameter must be at least 3 characters long if provided;
    otherwise, the action will fail.

    - Some filters may be ignored by the Bitdefender API if the corresponding license
    is not active in the target environment.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the API Key, Access URL, and SSL verification
    settings from the integration configuration.

    2. **Parameter Parsing:** Extracts all 13 optional filter parameters and the Parent
    ID from the action input.

    3. **Manager Initialization:** Initializes the Bitdefender GravityZone Manager
    using the provided credentials.

    4. **API Request:** Executes a paginated POST request to the Bitdefender JSON-RPC
    endpoint (`getNetworkInventoryItems`) with the constructed filter object.

    5. **Data Aggregation:** The manager handles pagination automatically, collecting
    all matching inventory items into a single list.

    6. **Result Output:** Adds the retrieved inventory data to the action's JSON result
    and completes the execution.
