Blocklist - List Items:
  ai_description: >-
    ### General Description

    This action retrieves a comprehensive list of all file hashes (such as MD5 and
    SHA256) currently stored in the Bitdefender GravityZone blocklist. It is primarily
    used for auditing existing security controls, verifying blocked indicators, or
    synchronizing threat intelligence across multiple security platforms. The action
    interacts with the Bitdefender GravityZone Incidents API and handles pagination
    automatically to ensure the entire blocklist is captured.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Use JSON Filter | String | No | A flag or configuration string used to determine
    if the results should be filtered using JSON logic. Note: The current implementation
    fetches the full list. |

    | Filter | String | No | Specific criteria used to filter the blocklist items
    retrieved from the server. |

    | Parent ID | String | No | The unique identifier of a parent group or container
    to narrow down the scope of the blocklist. |

    | Endpoints | String | No | Specifies the endpoint scope (e.g., 'Managed', 'Unmanaged')
    to consider when listing blocklist items. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Bitdefender
    GravityZone Control Center using the provided API Key and Access URL.

    2. **Request Initiation**: It calls the `getBlocklistItems` method via a POST
    request to the Incidents API endpoint.

    3. **Pagination Handling**: The action checks for multiple pages of results. If
    more than one page exists, it iteratively fetches all subsequent pages to compile
    a complete list of hashes.

    4. **Data Output**: The final compiled list of blocklist objects is returned as
    a JSON result and made available for subsequent playbook steps.


    ### Additional Notes

    * This action does not require or process specific entities from the SOAR case;
    it performs a global retrieval of the blocklist configuration.

    * Although parameters like 'Filter' and 'Parent ID' are extracted, the underlying
    manager method for listing blocklist items currently requests the full set of
    items from the API.
