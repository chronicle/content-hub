    Control Center using the configured API Key and Access URL.

    2. **Request**: It sends a JSON-RPC request using the `getHourlyUsageForAmazonEC2Instances`
    method, passing the `Target Month` as a parameter.

    3. **Processing**: The action receives the hourly usage data from the external
    system.

    4. **Output**: The retrieved data is added to the action's JSON results, making
    it available for subsequent playbook tasks.


    ### Additional Notes

    - This action does not require or process any SecOps entities (IPs, Hostnames,
    etc.); it performs a global lookup based on the provided month parameter.
