Blocklist - Add Hashes:
  ai_description: >-
    ### General Description

    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
    This action initiates a state change on the external system to prevent execution
    or access related to the specified malicious hashes.


    ### Flow Description

    1. Extracts the provided comma-separated list of hashes and the source information
    description.

    2. Connects to the Bitdefender GravityZone Control Center API.

    3. Categorizes the provided hashes into SHA256 and MD5 formats.

    4. Makes POST requests to the `addToBlocklist` API endpoint to add the categorized
    hashes to the blocklist.

    5. Returns a JSON result containing the successfully added hashes and any hashes
    that failed due to unsupported formats.


    ### Additional Notes

    The action separates SHA256 and MD5 hashes and submits them in separate API requests,
    as required by the Bitdefender API. Any hash that is not recognized as a valid
    SHA256 or MD5 format will not be submitted and will be returned in the failed
    hashes list.
  ai_short_description: >-
    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
