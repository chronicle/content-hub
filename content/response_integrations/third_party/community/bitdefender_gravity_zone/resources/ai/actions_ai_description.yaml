Blocklist - Add Hashes:
  ai_description: >-
    Adds one or more file hashes to the Bitdefender GravityZone blocklist. This action
    allows security teams to proactively block malicious files across their managed
    endpoints by providing a list of MD5 or SHA256 hashes. The action validates the
    hash format, categorizes them by type, and submits them to the GravityZone Control
    Center with associated source information for context.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hash List | string | True | A comma-separated list of SHA256 or MD5 hashes to
    be added to the blocklist. |

    | Source Info | string | True | A description or context for the hashes (e.g.,
    'Determined to be malicious' or 'IOC from threat report'). |


    ### Flow Description


    1.  **Initialization**: Connects to the Bitdefender GravityZone Control Center
    using the provided API Key and Access URL.

    2.  **Parsing**: Splits the provided 'Hash List' string into individual hash values.

    3.  **Validation and Categorization**: Iterates through the hashes, using regex
    to identify whether each is an MD5 or SHA256 hash. Any unsupported hash formats
    will cause the action to fail.

    4.  **Submission**: Sends separate API requests to the Bitdefender GravityZone
    'addToBlocklist' endpoint for the collected SHA256 hashes and MD5 hashes.

    5.  **Completion**: Returns a JSON result containing the lists of successfully
    processed hashes categorized by type.
