  ai_description: >-
    ### General Description

    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
    This action helps in preventing the execution or presence of known malicious files
    across the managed endpoints.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | --- | --- | --- | --- |

    | Hash List | A comma-separated list of SHA256 or MD5 hashes to be added to the
    blocklist. | String | Yes |

    | Source Info | A description or reason for blocking the hashes. | String | Yes
    |


    ### Flow Description

    1. Extracts the provided hash list and source info from the action parameters.

    2. Validates and categorizes the provided hashes into MD5 and SHA256 formats.

    3. Sends a request to the Bitdefender GravityZone API to add the categorized hashes
    to the blocklist.

    4. Returns the status of the operation, including which hashes were successfully
    processed and which failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified SHA256 or MD5 hashes to the Bitdefender GravityZone blocklist.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action takes a list of hashes from the input parameters and makes a POST
      request to the Bitdefender GravityZone API to add them to the blocklist. It
      does not fetch data, nor does it mutate internal SecOps data like entities or
      insights.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding hashes to a blocklist, so it cannot
      be an enrichment action. Since it blocks IOCs (hashes), it qualifies as a remediation
      action.
    remediation: true
  entity_usage:
