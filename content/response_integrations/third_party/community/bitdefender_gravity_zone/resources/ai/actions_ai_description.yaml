  ai_description: >-
    ### General Description

    Sets or updates a label for a specific endpoint within the Bitdefender GravityZone
    environment. This action allows security analysts to tag endpoints with custom
    metadata (up to 64 characters) for better categorization, tracking, or policy
    application. Providing an empty string as the label will reset any previously
    assigned label for that endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Endpoint ID | String | Yes | The unique identifier of the endpoint in Bitdefender
    GravityZone for which the label will be set. |

    | Label | String | Yes | The string representing the label to be applied. Maximum
    length is 64 characters. Use an empty string to clear an existing label. |


    ### Additional Notes

    - This action interacts with the Bitdefender GravityZone JSON-RPC API using the
    `setEndpointLabel` method.

    - The action requires a valid 'Access URL' and 'API Key' configured in the integration
    settings.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the 'Endpoint ID' and 'Label'
    from the user input and the integration's connection details (API Key, Access
    URL, SSL verification) from the configuration.

    2. **Connection Initialization**: It establishes a connection to the Bitdefender
    GravityZone Control Center via the `BitdefenderGravityZoneManager`.

    3. **API Execution**: The action sends a POST request to the Bitdefender Network
    API endpoint with the `setEndpointLabel` method, passing the target `endpointId`
    and the desired `label`.

    4. **Result Processing**: The action evaluates the API response. If the operation
    is successful, it returns a 'success' status; otherwise, it logs the error and
    returns a 'failed' status.
