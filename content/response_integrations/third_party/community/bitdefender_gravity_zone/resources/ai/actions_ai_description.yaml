    | :--- | :--- | :--- | :--- |

    | Endpoints | ddl | Yes | Select whether to return only managed endpoints, unmanaged
    endpoints, or all endpoints. |

    | Parent ID | string | No | The ID of the target company or group. If not specified,
    returns endpoints under Computers and Groups. |

    | Filter - SSID | string | No | The SSID (Active Directory SID) used to filter
    endpoints. |

    | Filter - MAC Addresses | string | No | Comma-separated list of MAC addresses
    used to filter endpoints. |

