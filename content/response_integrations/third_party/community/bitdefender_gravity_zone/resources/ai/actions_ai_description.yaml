  ai_description: >-
    ### General Description

    The **Create Scan Task by MAC Address** action allows analysts to trigger on-demand
    malware scans on specific endpoints within the Bitdefender GravityZone environment
    using their MAC addresses. This action is primarily used for immediate forensic
    investigation or remediation when specific hosts are suspected of being compromised.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **MAC Addresses** | String | Yes | A comma-separated list of MAC addresses for
    the target endpoints. A maximum of 100 addresses can be processed in a single
    request. |

    | **Scan Type** | DDL | Yes | Specifies the type of scan to perform. Available
    options: `Quick`, `Full`, `Memory`, or `Custom`. |

    | **Task Name** | String | No | A custom name for the scan task. If omitted, Bitdefender
    will generate a name automatically. |

    | **Custom Scan - Depth** | DDL | No | Defines the thoroughness of the scan. Options:
    `Aggressive`, `Normal`, `Permissive`. This is only utilized when **Scan Type**
    is set to `Custom`. |

    | **Custom Scan - Paths** | String | No | A comma-separated list of specific file
    system paths to scan. This is only utilized when **Scan Type** is set to `Custom`.
    |


    ### Additional Notes

    - The action validates that no more than 100 MAC addresses are submitted at once
    to comply with Bitdefender API limits.

    - The endpoints must be 'Managed' within GravityZone for the scan task to be successfully
    created.


    ### Flow Description

    1. **Authentication**: The action authenticates with the Bitdefender GravityZone
    Control Center using the configured API Key and Access URL.

    2. **Input Parsing**: It extracts the list of MAC addresses and the desired scan
    configuration (type, depth, and paths).

    3. **Validation**: The action checks if the number of MAC addresses exceeds the
    limit of 100.

    4. **API Mapping**: Human-readable scan types and depths are converted into the
    specific integer codes required by the Bitdefender JSON-RPC API.

    5. **Task Execution**: The action sends a `createScanTaskByMac` request to the
    Bitdefender Network API.

    6. **Result Reporting**: The action concludes with a success or failure message
    based on the response from the Bitdefender platform.
