Quarantine - Restore Exchange Items:
  ai_description: >-
    Restores quarantined items on Microsoft Exchange Servers via Bitdefender GravityZone.
    This action initiates a task in the GravityZone Control Center to move specific
    items from the quarantine back to their original location in the user's mailbox.
    It requires Exchange credentials and the specific IDs of the items to be restored.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Quarantine Item IDs | string | Yes | A comma-separated list of the unique identifiers
    for the items to be restored from quarantine (maximum 100 items). |

    | Username | string | Yes | The username of the Microsoft Exchange user, including
    the domain name (e.g., domain\user). |

    | Password | password | Yes | The password associated with the provided Exchange
    username. |

    | Email | string | No | The email address of the Exchange user. This is required
    if the email address differs from the username. |

    | EWS URL | string | No | The Exchange Web Services (EWS) URL. Use this if Exchange
    Autodiscovery is not functioning or available. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Bitdefender API key,
    Access URL, and SSL verification settings from the integration configuration.

    2. **Parameter Retrieval:** It extracts the mandatory item IDs, Exchange credentials,
    and optional connection details (Email, EWS URL) from the action input.

    3. **Manager Initialization:** Initializes the Bitdefender GravityZone Manager
    to handle API communication.

    4. **Task Creation:** Calls the `createRestoreQuarantineExchangeItemTask` API
    endpoint, passing the item IDs and Exchange authentication details.

    5. **Result Handling:** Reports whether the restoration task was successfully
    created in the Bitdefender Control Center.
