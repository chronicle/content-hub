Create Scan Task by MAC Address:
  ai_description: >-
    Generates a scan task for managed endpoints in Bitdefender GravityZone identified
    by their MAC addresses. This action allows security administrators to remotely
    trigger various types of scans (Quick, Full, Memory, or Custom) on specific devices
    to identify potential threats. It supports scanning up to 100 MAC addresses in
    a single execution and allows for detailed configuration when performing custom
    scans, including scan depth and specific file paths.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | MAC Addresses | String | Yes | A comma-separated list of MAC addresses for the
    endpoints to be scanned. Maximum of 100 addresses allowed. |

    | Scan Type | DDL | Yes | The type of scan to perform. Options: Quick, Full, Memory,
    Custom. |

    | Task Name | String | No | A custom name for the scan task. If omitted, Bitdefender
    will automatically generate a name. |

    | Custom Scan - Depth | DDL | No | The scanning intensity. Options: Aggressive,
    Normal, Permissive. Only applicable if 'Scan Type' is set to 'Custom'. |

    | Custom Scan - Paths | String | No | A comma-separated list of target file paths
    to be scanned. Only applicable if 'Scan Type' is set to 'Custom'. |


    ### Flow Description


    1. **Configuration Extraction:** Retrieves the Bitdefender API Key, Access URL,
    and SSL verification settings from the integration configuration.

    2. **Parameter Parsing:** Extracts the target MAC addresses, scan type, task name,
    and custom scan settings from the action input.

    3. **Manager Initialization:** Establishes a connection to the Bitdefender GravityZone
    Control Center using the provided credentials.

    4. **Validation:** Checks if the number of MAC addresses provided exceeds the
    limit of 100.

    5. **Task Creation:** Sends a JSON-RPC request to the Bitdefender API (method:
    `createScanTaskByMac`) with the mapped scan parameters and target identifiers.

    6. **Result Handling:** Reports whether the scan task was successfully created
    in the external system.
