    external_data_mutation_explanation: >-
      Adds the specified file hashes to the Bitdefender GravityZone blocklist.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Bitdefender GravityZone API to add
