    | Filter - Managed with BEST | Boolean | False | Boolean to filter all endpoints
    with the security agent installed on them. |

    | Filter - Name | String | False | A string for filtering the items by name. Minimum
    required string length is three characters. |

    | Filter - MAC Addresses | String | False | Comma-separated list of MAC addresses
