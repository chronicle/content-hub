  ai_description: >-
    Retrieves a comprehensive list of endpoints from Bitdefender GravityZone based
    on specified filtering criteria. This action allows analysts to search for endpoints
    by name, MAC address, SSID, or management status (Managed, Unmanaged, or All).
    It also supports filtering by specific roles such as Security Servers, Managed
    Relays, and Managed Exchange Servers. The action handles pagination automatically
    to ensure all matching results are returned and provides the data in a structured
    JSON format for further processing.


    ### Flow Description:

    1. **Authentication**: Connects to the Bitdefender GravityZone Control Center
    using the provided API Key and Access URL.

    2. **Parameter Extraction**: Retrieves filtering parameters including Parent ID,
    endpoint management status, and specific attribute filters (Name, MAC, SSID).

    3. **API Request**: Executes the `getEndpointsList` method against the Bitdefender
    Network API.

    4. **Pagination Handling**: Iterates through all available pages of results if
    the response exceeds the single-page limit.

    5. **Output**: Returns the aggregated list of endpoints as a JSON result and completes
    the execution.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Endpoints** | DDL | Yes | Determines whether to return 'All', 'Managed', or
    'Unmanaged' endpoints. |

    | **Parent ID** | String | No | The ID of the target company or group to narrow
    the search scope. |

    | **Filter - Name** | String | No | Filters items by name. Requires a minimum
    of three characters. |

    | **Filter - MAC Addresses** | String | No | A comma-separated list of MAC addresses
    to filter the endpoints. |

    | **Filter - SSID** | String | No | The Active Directory SID of the endpoint used
    for filtering. |

    | **Filter - Managed with BEST** | Boolean | No | If true, filters for endpoints
    with the Bitdefender Endpoint Security Tools (BEST) agent installed. |

    | **Filter - Managed Exchange Servers** | Boolean | No | If true, filters for
    protected Exchange servers. |

    | **Filter - Managed Relays** | Boolean | No | If true, filters for endpoints
    with the Relay role. |

    | **Filter - Security Servers** | Boolean | No | If true, filters for Security
    Servers. |

    | **Filter - Depth - All Items Recursively** | Boolean | No | If true, performs
    a recursive search within the Network Inventory. |


    ### Additional Notes:

    - The **Filter - Name** parameter must contain at least 3 characters if provided;
    otherwise, the action will return an error.

    - This action does not operate on specific SOAR entities but rather performs a
    global search/list operation within the Bitdefender environment.
