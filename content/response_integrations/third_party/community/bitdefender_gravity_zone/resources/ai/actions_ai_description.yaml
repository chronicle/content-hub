Quarantine - Get Items List:
  ai_description: >-
    ### General Description

    The **Quarantine - Get Items List** action retrieves a comprehensive list of items
    currently held in quarantine within the Bitdefender GravityZone environment. This
    includes both malicious files found on endpoints and suspicious Microsoft Exchange
    objects. The action allows for granular filtering to locate specific threats or
    items across the network or on a per-endpoint basis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Service** | DDL | Yes | Specifies the service to query: `Computers` (for files
    on VMs/workstations) or `Exchange` (for mail objects). |

    | **Filter - Threat Name** | String | No | Filters results by the name of the
    detected threat. Supports partial matching. |

    | **Filter - Start Date** | String | No | Filters for items quarantined after
    this date (ISO 8601 format). |

    | **Filter - End Date** | String | No | Filters for items quarantined before this
    date (ISO 8601 format). |

    | **Filter - File Path** | String | No | Filters by the file's location. Supports
    partial matching and wildcards (e.g., `C:\temp` or `*myfile.exe`). Only for `Computers`
    service. |

    | **Filter - IP Address** | String | No | Filters by the IP address of the source
    endpoint. Supports partial matching. Only for `Computers` service. |

    | **Filter - Action Status** | DDL | No | Filters by the current status of the
    item (e.g., `Saved`, `Pending Save`). |

    | **Endpoint ID** | String | No | Restricts the search to a specific computer
    ID. If omitted, the action searches the entire network. |


    ### Flow Description

    1. **Authentication**: Connects to the Bitdefender GravityZone Control Center
    using the provided API Key and Access URL.

    2. **Parameter Extraction**: Retrieves user-defined filters and service selection
    from the action parameters.

    3. **API Request**: Executes a paginated request to the `getQuarantineItemsList`
    endpoint, targeting the specific service sub-path (e.g., `/computers` or `/exchange`).

    4. **Data Aggregation**: Iterates through all available pages of results to ensure
    a complete list of quarantined items is collected.

    5. **Output**: Returns the aggregated list of items as a JSON object for use in
    subsequent playbook steps.


    ### Additional Notes

    - Partial matching is supported for Threat Name, File Path, and IP Address.

    - The `Exchange` service filters require a valid license for Security for Exchange.
