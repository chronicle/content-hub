Get Custom Groups List:
  ai_description: >-
    ### General Description

    The **Get Custom Groups List** action retrieves a list of child groups associated
    with a specific parent group within Bitdefender GravityZone. This utility is designed
    to help analysts navigate the organizational structure of managed endpoints. If
    no `Parent ID` is provided, the action defaults to returning the root-level groups,
    specifically 'Computers and Groups' and 'Deleted'.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Parent ID** | String | No | The unique identifier of the parent group for
    which child groups should be listed. If left empty, the action retrieves the top-level
    groups. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Bitdefender GravityZone
    Control Center using the provided API Key and Access URL.

    2. **Request**: Executes the `getCustomGroupsList` JSON-RPC method via a POST
    request to the Network API endpoint.

    3. **Processing**: Passes the `Parent ID` (if provided) to filter the results
    to a specific branch of the group tree.

    4. **Output**: Returns the resulting list of groups and their metadata in a JSON
    format for use in subsequent playbook steps.


    ### Additional Notes

    - This action does not operate on specific SOAR entities; it is a utility for
    querying the Bitdefender environment structure.
