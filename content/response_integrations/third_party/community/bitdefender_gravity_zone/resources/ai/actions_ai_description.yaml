  ai_description: >-
    Adds one or more file hashes to the Bitdefender GravityZone Blocklist to prevent
    execution or interaction within the protected environment. This action supports
    both MD5 and SHA256 hash formats. It parses a comma-separated list of hashes provided
    by the user, categorizes them by type, and submits them to the Bitdefender Control
    Center with associated source information for context.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves the API Key, Access URL, and SSL verification
    settings from the integration configuration.

    2. **Parameter Retrieval:** Extracts the 'Hash List' (comma-separated string)
    and 'Source Info' from the action parameters.

    3. **Connection Initialization:** Establishes a connection to the Bitdefender
    GravityZone Control Center using the provided credentials.

    4. **Hash Categorization:** Splits the input string into individual hashes and
    uses regular expressions to distinguish between MD5 and SHA256 formats.

    5. **API Submission:** Performs separate API calls to the Bitdefender 'addToBlocklist'
    endpoint for each hash type (MD5 and SHA256) found in the list.

    6. **Result Handling:** Returns a JSON summary of the hashes successfully processed
    and categorized.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hash List | String | Yes | A comma-separated list of file hashes to be blocked.
    Supports MD5 (32 chars) and SHA256 (64 chars). |

    | Source Info | String | Yes | A descriptive string providing context or a reason
    for why these hashes are being added to the blocklist (e.g., 'Determined to be
    malicious'). |


    ### Additional Notes:

    - If a hash is provided that does not match the MD5 or SHA256 format, the action
    will raise an error and fail to process the list.

    - This action does not automatically iterate over entities in the current case;
    it relies strictly on the manual input provided in the 'Hash List' parameter.
