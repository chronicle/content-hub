    \ entirely on the global integration configuration:\n* **API Key**: The credential\
    \ used to authenticate with Bitdefender GravityZone.\n* **Access URL**: The base\
    \ URL for the Bitdefender GravityZone API instance.\n* **Verify SSL**: A boolean\
    \ flag determining whether to validate the SSL certificate of the target server.\n\
    \n### Flow Description\n1. **Initialization**: The action initializes the SOAR\
    \ SDK and retrieves the global integration settings (API Key, Access URL, and\
    \ SSL verification preference).\n2. **Manager Setup**: It instantiates the `BitdefenderGravityZoneManager`\
    \ using the provided credentials.\n3. **Connectivity Test**: The action calls\
    \ the `getApiKeyDetails` method via the manager. This triggers a POST request\
    \ to the `GENERAL_URL` endpoint of the Bitdefender API.\n4. **Validation**: The\
    \ script checks if the API response is successful and contains valid key details.\
