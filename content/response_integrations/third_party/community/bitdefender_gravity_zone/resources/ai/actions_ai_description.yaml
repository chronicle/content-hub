Isolate Endpoint:
  ai_description: >-
    ### General Description

    The **Isolate Endpoint** action is designed to programmatically isolate a specific
    host within the Bitdefender GravityZone environment. By creating an isolation
    task, the action effectively severs the network connectivity of a compromised
    or suspicious endpoint, preventing lateral movement or data exfiltration while
    still allowing communication with the GravityZone management console for remediation.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Endpoint ID | The unique identifier of the endpoint in Bitdefender GravityZone
    that needs to be isolated. | String | Yes |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Bitdefender
    GravityZone Control Center using the configured API Key and Access URL.

    2. **Parameter Extraction**: It retrieves the `Endpoint ID` provided by the user
    or playbook.

    3. **Task Creation**: The action calls the `createIsolateEndpointTask` method
    via the Bitdefender JSON-RPC API.

    4. **Execution Status**: It evaluates the API response to determine if the isolation
    task was successfully created.

    5. **Completion**: The action concludes by reporting a success or failure status
    to the Google SecOps workbench.


    ### Additional Notes

    This action requires the Bitdefender GravityZone incident response module to be
    active for the target endpoint. It does not automatically update the entity status
    within Google SecOps; it only triggers the external isolation task.
