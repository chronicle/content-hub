Quarantine - Remove Items:
  ai_description: >-
    Removes items from the Bitdefender GravityZone quarantine by creating a removal
    task in the Control Center. This action allows analysts to permanently delete
    quarantined items associated with either endpoint computers/virtual machines or
    the Security for Exchange service.


    ### Flow Description:

    1. **Authentication:** Connects to the Bitdefender GravityZone API using the configured
    API Key and Access URL.

    2. **Parameter Extraction:** Retrieves the target service type (Computers or Exchange)
    and the list of Quarantine Item IDs from the action parameters.

    3. **Task Initiation:** Sends a JSON-RPC request to the Bitdefender API using
    the `createRemoveQuarantineItemTask` method, passing the list of IDs to the service-specific
    endpoint.

    4. **Result Handling:** Processes the API response to determine if the task creation
    was successful and terminates the action with a corresponding status message.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service | DDL | Yes | Determines the service context for the removal. Options
    are 'Computers' (for endpoints and VMs) or 'Exchange' (for mail security). |

    | Quarantine Item IDs | String | Yes | A comma-separated list of unique identifiers
    for the quarantine items to be removed. A maximum of 100 items can be processed
    in a single request. |


    ### Additional Notes:

    * This action triggers a background task in Bitdefender GravityZone. The actual
    removal of items happens asynchronously on the target endpoints or mail servers.

    * Removing items from quarantine is a permanent action and cannot be reversed
    through this integration.
