Quarantine - Add File:
  ai_description: >-
    ### General Description

    Creates a new task in Bitdefender GravityZone to add a specific file to quarantine
    on one or more target endpoints. This action is primarily used for remediation
    and incident response to isolate potentially malicious files found on disk across
    managed endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | string | True | The absolute file path on disk to be quarantined.
    This can be at most 4096 characters and must follow the format suitable for the
    target's operating system (e.g., C:\Users\Public\malicious.exe). |

    | Endpoint IDs | string | True | A comma-separated list of the target endpoint
    IDs where the quarantine task should be executed. Max 100 targets per action.
    |


    ### Flow Description

    1. **Connection**: The action establishes a connection to the Bitdefender GravityZone
    Control Center using the configured API Key and Access URL.

    2. **Parameter Extraction**: It retrieves the target file path and the list of
    endpoint IDs from the action parameters.

    3. **Task Creation**: It calls the Bitdefender API (`createAddFileToQuarantineTask`)
    to initiate a quarantine operation for the specified file path on the provided
    list of endpoints.

    4. **Execution Status**: The action monitors the API response and marks the execution
    as completed with a success or failure message based on whether the task was successfully
    created in the Bitdefender console.


    ### Additional Notes

    Only endpoints that have the EDR Sensor module active are considered valid targets
    for this action. If an endpoint does not meet this requirement, the task creation
    for that specific ID may fail or be ignored by the Bitdefender platform.
