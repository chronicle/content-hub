  ai_description: >-
    ### General Description

    This action creates a scan task on the Bitdefender GravityZone platform for specified
    endpoints or containers. It allows users to trigger different types of scans (Quick,
    Full, Memory, or Custom) and configure custom scan settings such as depth and
    paths.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary integration
    configuration parameters, including the API Key, Access URL, and SSL verification
    settings.

    2. **Parameter Extraction**: The action extracts the specific scan parameters
    provided by the user, including the target IDs, scan type, task name, and optional
    custom scan settings (depth and paths).

    3. **Manager Initialization**: The `BitdefenderGravityZoneManager` is initialized
    with the provided credentials.

    4. **Task Execution**: The action calls the `task_create_scan` method, which sends
    a POST request to the Bitdefender GravityZone API to initiate the scan task.

    5. **Result Handling**: The action logs the outcome of the request and terminates
    with a success or failure status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Target IDs | string | Yes | A comma-separated list of the IDs of the targets
    (endpoints or containers) to scan. |

    | Scan Type | ddl | Yes | The type of scan to perform. Options: Quick, Full, Memory,
    Custom. |

    | Task Name | string | No | The name of the task. If not provided, it will be
    automatically generated. |

    | Custom Scan - Depth | ddl | No | The scan profile (Aggressive, Normal, Permissive).
    Only used when Scan Type is 'Custom'. |

    | Custom Scan - Paths | string | No | A comma-separated list of target paths to
    be scanned. Only used when Scan Type is 'Custom'. |


    ### Additional Notes

    - The parameters 'Custom Scan - Depth' and 'Custom Scan - Paths' are only utilized
    when the 'Scan Type' is set to 'Custom'.
