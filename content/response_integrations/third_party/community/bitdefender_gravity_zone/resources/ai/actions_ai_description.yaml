  ai_description: >-
    Creates a scan task for specified endpoints or containers in Bitdefender GravityZone.


    ### General Description

    This action initiates a scan task (Quick, Full, Memory, or Custom) on one or more
    target endpoints or containers identified by their IDs in Bitdefender GravityZone.
    It interacts with the Bitdefender GravityZone Control Center API to submit the
    task.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Target IDs | String | Yes | A comma-separated list of target IDs to scan. The
    target ID can designate an endpoint or a container. |

    | Scan Type | Dropdown | Yes | The type of scan to perform. Available options
    are: Quick, Full, Memory, Custom. |

    | Task Name | String | No | The name of the task. If not provided, the name will
    be automatically generated by Bitdefender. |

    | Custom Scan - Depth | Dropdown | No | The scan profile. Available options: Aggressive,
    Normal, Permissive. This parameter is only used when the Scan Type is set to Custom.
    |

    | Custom Scan - Paths | String | No | A comma-separated list of target paths to
    be scanned. This parameter is only used when the Scan Type is set to Custom. |


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Connects to the Bitdefender GravityZone Control Center API.

    3. Submits a request to create a scan task with the specified target IDs, scan
    type, and custom settings if applicable.

    4. Returns a success message if the task is created successfully, or fails otherwise.
