Create Scan Task:
  ai_description: >-
    ### General Description

    This action creates and initiates a scan task in Bitdefender GravityZone for specified
    target IDs. It allows security teams to remotely trigger various types of scans
    (Quick, Full, Memory, or Custom) on endpoints or containers to identify potential
    threats. For custom scans, users can further define the scan depth and specific
    file paths to be analyzed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Target IDs | String | Yes | A comma-separated list of IDs representing the endpoints
    or containers to be scanned. |

    | Scan Type | DDL | Yes | The type of scan to perform. Options include: Quick,
    Full, Memory, or Custom. |

    | Task Name | String | No | An optional name for the scan task. If not provided,
    Bitdefender will automatically generate a name. |

    | Custom Scan - Depth | DDL | No | Specifies the scan intensity for 'Custom' scan
    types. Options: Aggressive, Normal, or Permissive. Defaults to Normal. |

    | Custom Scan - Paths | String | No | A comma-separated list of target paths to
    be scanned. This is only utilized when the Scan Type is set to 'Custom'. |


    ### Additional Notes

    *   **Discrepancy Note:** While the metadata description in the configuration
    file mentions isolating endpoints, the actual implementation logic and API calls
    are strictly for creating scan tasks.

    *   **Custom Scan Logic:** The 'Custom Scan - Depth' and 'Custom Scan - Paths'
    parameters are only processed by the Bitdefender API when the 'Scan Type' is set
    to 'Custom'.


    ### Flow Description

    1.  **Configuration Extraction:** Retrieves the API Key, Access URL, and SSL verification
    settings from the integration configuration.

    2.  **Parameter Extraction:** Collects the target IDs, scan type, task name, and
    custom scan settings from the action inputs.

    3.  **Manager Initialization:** Initializes the Bitdefender GravityZone Manager
    using the provided credentials.

    4.  **Task Creation:** Sends a POST request to the Bitdefender API's `createScanTask`
    method with the mapped scan parameters and target IDs.

    5.  **Result Handling:** Evaluates the API response and ends the action with a
    success or failure status based on whether the task was successfully created in
    the external system.
