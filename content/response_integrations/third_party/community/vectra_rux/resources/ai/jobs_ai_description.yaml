Vectra RUX - Clear Empty Cases Job:
  ai_description: >-
    ### General Description

    This job automates the maintenance of the investigation queue by identifying and
    closing empty or duplicate cases originating from the Vectra RUX integration.
    It helps reduce noise by automatically resolving cases that contain redundant
    alerts or are deemed non-malicious based on cross-case analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | String | No | The time window (in hours) to look back
    for open cases. Use '0' to fetch all open cases. Default is 24. |

    | Environments | String | Yes | A comma-separated list of environments to process.
    |

    | Products | String | Yes | A comma-separated list of product field names to process.
    |


    ### Flow Description

    1. Initialize job parameters and retrieve the last successful run timestamp from
    the job context.

    2. Fetch all open cases from the SOAR platform, optionally filtered by the specified
    time window.

    3. For each case, retrieve associated entities and their corresponding detections.

    4. Filter the detections based on the provided `Environments` and `Products` parameters.

    5. Analyze the collected alerts to identify identical or duplicate events across
    different cases.

    6. Automatically close cases or remove specific alerts identified as duplicates.

    7. Save the current execution timestamp to the job context for the next run.
