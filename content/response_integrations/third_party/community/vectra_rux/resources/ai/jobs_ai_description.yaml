Vectra RUX - Clear Empty Cases Job:
  ai_description: "### General Description\nThis job performs maintenance on Google\
    \ SecOps cases generated by the Vectra RUX integration. Its primary purpose is\
    \ to reduce SOC noise by identifying and closing redundant or duplicate cases\
    \ and alerts. The job analyzes open cases to determine if the underlying detections\
    \ (events) are already being investigated in other active cases. If a case or\
    \ alert is found to be a complete duplicate of another, it is automatically closed\
    \ with a specific root cause, ensuring analysts focus only on unique security\
    \ incidents.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Max Hours Backwards | String | No | The\
    \ maximum number of hours to look back for open cases to process. Default is '24'.\
    \ Set to '0' to fetch and process all open cases regardless of their creation\
    \ time. |\n| Environments | String | Yes | A comma-separated list of environments\
    \ to include in the cleanup process. Default is 'Default Environment'. |\n| Products\
    \ | String | Yes | A comma-separated list of product names used to filter relevant\
    \ alerts within the cases. Default is 'Vectra RUX'. |\n\n### Flow Description\n\
    1. **Initialization**: The job retrieves the configuration parameters and determines\
    \ the starting timestamp for the search based on the \"Max Hours Backwards\" setting\
    \ and the last successful execution time stored in the database.\n2. **Case Retrieval**:\
    \ It queries Google SecOps for all open cases that match the specified time range\
    \ and environment filters.\n3. **Alert Analysis**: For each retrieved case, the\
    \ job fetches associated alerts and filters them by the specified product names.\
    \ It then extracts the unique detection (event) IDs from these alerts.\n4. **Redundancy\
    \ Check**: The job builds a map of detections across all processed cases. It identifies\
    \ alerts or entire cases where all associated detection IDs are already present\
    \ in other active investigations.\n5. **Cleanup**: \n    * If an entire case is\
    \ found to be redundant (all its alerts are duplicates), the job closes the case\
    \ with the reason \"Similar case already under investigation\".\n    * If only\
    \ specific alerts within a case are redundant, it closes those individual alerts\
    \ with the reason \"Similar alert already under investigation\".\n6. **Finalization**:\
    \ The job saves the current execution timestamp to the scoped job context to serve\
    \ as the baseline for the next run."
