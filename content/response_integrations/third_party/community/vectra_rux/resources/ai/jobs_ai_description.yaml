Vectra RUX - Clear Empty Cases Job:
  ai_description: >-
    ### General Description

    This job automates the maintenance of investigation queues by identifying and
    clearing empty or duplicate cases within the SOAR platform. It analyzes open cases,
    their associated entities, and detections to detect redundant alerts, ensuring
    that analysts focus on unique and actionable threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | Integer | No | Maximum backwards hours to fetch open cases
    (Default: 24; '0' to fetch all open cases). |

    | Environments | String | Yes | Comma-separated list of environments to process
    (Default: 'Default Environment'). |

    | Products | String | Yes | Comma-separated list of product names to filter by
    (Default: 'Vectra RUX'). |


    ### Flow Description

    1. Extracts configuration parameters and retrieves the last successful run timestamp
    from the job context.

    2. Fetches all open cases from the SOAR platform, optionally filtered by the specified
    time range.

    3. Iterates through each case to retrieve associated entities and their corresponding
    detections.

    4. Compares alerts and detections across cases to identify identical or redundant
    entries.

    5. Closes redundant cases or removes duplicate alerts based on the identified
    findings.

    6. Updates the job context with the current timestamp to track the next execution
    window.
