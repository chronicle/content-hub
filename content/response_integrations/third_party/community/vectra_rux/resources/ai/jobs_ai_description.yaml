Vectra RUX - Clear Empty Cases Job:
  ai_description: >-
    ### General Description

    This job performs maintenance on Google SecOps cases generated by the Vectra RUX
    integration. It identifies and closes redundant cases and alerts that contain
    duplicate detection data already present in other open investigations. By analyzing
    the underlying event IDs within alerts, the job ensures that analysts are not
    working on multiple cases for the same underlying security events, effectively
    deduplicating the workload and reducing noise.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | String | No | The maximum number of hours to look back
    for open cases. Default is 24. Set to '0' to process all open cases regardless
    of age. |

    | Environments | String | Yes | Comma-separated list of environments to include
    in the cleanup process (e.g., 'Default Environment'). |

    | Products | String | Yes | Comma-separated list of product names to filter alerts
    (e.g., 'Vectra RUX'). Only alerts from these products are evaluated for deduplication.
    |


    ### Flow Description

    1. Retrieves configuration parameters for the time range, target environments,
    and product names.

    2. Calculates the starting timestamp for the search based on the 'Max Hours Backwards'
    parameter or the timestamp of the last successful run.

    3. Queries the SOAR platform for all cases currently in 'OPEN' status that fall
    within the calculated time window.

    4. Filters the retrieved cases to include only those matching the specified environments
    and containing alerts from the target products.

    5. Extracts and maps unique detection/event IDs from the alerts within the filtered
    cases.

    6. Identifies redundant alerts where all associated event IDs are already present
    in other active alerts or cases.

    7. Closes redundant cases or individual alerts using a predefined root cause indicating
    that a similar case is already under investigation.

    8. Updates the job's internal execution timestamp to mark the successful completion
    of the run.
