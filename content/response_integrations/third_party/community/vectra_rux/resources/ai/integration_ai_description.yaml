product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: true
  itsm: true
  network_security: true
  reasoning: >-
    The Vectra RUX integration is a cloud-native threat detection platform that ingests
    entities and detections, providing visibility into suspicious activity across
    cloud, data center, and network environments. It qualifies as a SIEM because its
    connector ingests entities and detections for monitoring. It qualifies as EDR
    because it manages hosts and retrieves detection details for them. It qualifies
    as Network Security because it consolidates network data and detects threats within
    the network. It qualifies as Threat Intelligence because it provides threat scores
    and certainty scores for detections. It qualifies as IAM & Identity Management
    because it manages accounts, group memberships, and user assignments. It qualifies
    as Cloud Security because it is a cloud-native threat detection platform. It qualifies
    as ITSM because it includes assignment management and resolution actions. It qualifies
    as Asset Inventory because it lists and describes assets like hosts and accounts.
    It does not qualify for Email Security, Vulnerability Management, or Collaboration
    as it lacks specific actions for those domains.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
