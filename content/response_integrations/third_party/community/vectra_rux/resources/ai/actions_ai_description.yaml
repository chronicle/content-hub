Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specified entity (Account, Host, or Detection) in Vectra RUX.


    ### Flow Description

    1. Initializes the Vectra RUX manager with the provided API credentials.

    2. Validates the provided `Entity ID` to ensure it is a valid integer.

    3. Makes a POST request to the Vectra RUX API to add the specified note to the
    target entity.

    4. Returns the created note details in a data table and as a JSON result.


    ### Additional Notes

    The `Entity ID` parameter must be a valid integer corresponding to an existing
    entity in Vectra RUX.
