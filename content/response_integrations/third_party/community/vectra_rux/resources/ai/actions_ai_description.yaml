    \ on specified query parameters. This action allows analysts to retrieve a filtered\
    \ list of assignments, providing visibility into how detections, hosts, or accounts\
    \ are being handled within the Vectra platform. The results are presented as a\
    \ data table for quick review and a full JSON object for further automated processing.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Accounts IDs | string | No | Comma-separated\
    \ list of account IDs to filter the assignments. |\n| Assignees IDs | string |\
    \ No | Comma-separated list of user IDs (assignees) to filter the assignments.\
    \ |\n| Resolution IDs | string | No | Comma-separated list of outcome/resolution\
    \ IDs to filter the assignments. |\n| Resolved | ddl | No | Filter assignments\
    \ by their resolution status. Options: None, True, False. |\n| Created After |\
    \ string | No | Filter assignments created after a specific timestamp. Supports\
    \ relative formats (e.g., '2 days') or absolute ISO formats. |\n| Limit | string\
    \ | No | The maximum number of assignment records to retrieve. |\n| Hosts IDs\
    \ | string | No | Comma-separated list of host IDs to filter the assignments.\
    \ |\n\n### Flow Description\n1. **Initialization**: The action initializes the\
    \ Vectra RUX manager using the provided API credentials (API Root, Client ID,\
    \ and Client Secret).\n2. **Parameter Extraction**: It extracts all optional filters,\
    \ including Account IDs, Host IDs, Assignee IDs, and Resolution IDs, converting\
    \ comma-separated strings into lists of integers.\n3. **Query Construction**:\
    \ A query parameter mapping is built based on the provided inputs, including the\
