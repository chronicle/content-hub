  ai_description: >-
    Lists detections from the Vectra AI platform based on a wide variety of filtering
    criteria. This action allows analysts to query for specific security events (detections)
    associated with hosts or accounts, or to perform broader searches across the environment.
    It retrieves detailed metadata for each detection, including threat and certainty
    scores, timestamps, and detection types.


    ### General Description

    This action interacts with the Vectra RUX API to retrieve a list of detections.
    It supports extensive filtering, including by entity ID, detection category, threat/certainty
    thresholds, and time ranges. The results are presented as a summary data table
    in the SOAR interface and as a full JSON object for downstream playbook logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection Category | DDL | No | Filters detections by category (e.g., Exfiltration,
    Lateral Movement, Reconnaissance). |

    | Threat GTE | String | No | Filters detections with a threat score greater than
    or equal to the provided value. |

    | Certainty GTE | String | No | Filters detections with a certainty score greater
    than or equal to the provided value. |

    | Last Timestamp GTE | String | No | Filters detections with a last seen timestamp
    greater than or equal to the provided value. |

    | Last Timestamp LTE | String | No | Filters detections with a last seen timestamp
    less than or equal to the provided value. |

    | Tags | String | No | Comma-separated list of tags to filter detections. |

    | Entity Type | DDL | No | The type of entity to filter by (Host or Account).
    |

    | Entity ID | String | No | The specific ID of the entity to retrieve detections
    for. |

    | Is Targeting Key Asset | DDL | No | Filters detections based on whether they
    target a key asset (True/False). |

    | Note Modified Timestamp GTE | String | No | Filters detections where notes were
    modified after the specified timestamp. |

    | Limit | String | No | The maximum number of detection records to retrieve. |

    | Order | DDL | No | Specifies the sort order (Ascending or Descending). |

    | Order By | DDL | No | Specifies the field to sort by (last_timestamp, threat_score,
    certainty_score). |

    | State | DDL | No | Filters detections by their current state (Active, Inactive,
    Fixed). |

    | Detection Type | String | No | Filters by a specific detection type string.
    |


    ### Additional Notes

    - The action automatically handles API versioning by stripping version strings
    from returned URLs to ensure compatibility with the platform's UI.

    - If no detections match the provided filters, the action will complete successfully
    with an informative message.


    ### Flow Description

    1. **Authentication:** Connects to the Vectra API using the configured Client
    ID and Client Secret to obtain an access token.

    2. **Parameter Validation:** Validates numeric inputs like 'Limit', 'Threat GTE',
    and 'Certainty GTE' to ensure they are valid integers.

    3. **API Query:** Constructs a GET request to the `/detections` endpoint, applying
    all provided filter parameters.

    4. **Data Processing:** Iterates through the retrieved detections, cleaning up
    URL fields and extracting key fields for the summary table.

    5. **Output Generation:** Adds a formatted data table to the case wall and attaches
    the full raw JSON response to the action results.
