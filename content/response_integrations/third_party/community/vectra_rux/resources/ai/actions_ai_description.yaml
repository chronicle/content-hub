  ai_description: >-
    Adds a note to a specific entity (Account, Host, or Detection) within the Vectra
    platform. This action allows analysts to document findings or provide context
    directly on the Vectra resource from within Google SecOps, ensuring that information
    is synchronized between the two platforms.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the note content, target entity ID, and
    entity type from the action parameters.

    2. **Validation**: Validates that the provided Entity ID is a valid integer.

    3. **API Interaction**: Executes a POST request to the Vectra API's notes endpoint
    for the specified entity.

    4. **Result Processing**: Captures the API response (the created note object)
    and presents it in a data table and JSON format for the analyst.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | String | Yes | The text content of the note to be added to the Vectra
    entity. |

    | Entity ID | String | Yes | The unique numeric identifier of the entity in Vectra.
    |

    | Entity Type | DDL | Yes | The type of entity to which the note will be added.
    Options: Account, Host, or Detection. |


    ### Additional Notes

    - The Entity ID must be a numeric value corresponding to an existing resource
    in the Vectra environment.

    - This action performs a state change in the external Vectra system by creating
    a new note record.
