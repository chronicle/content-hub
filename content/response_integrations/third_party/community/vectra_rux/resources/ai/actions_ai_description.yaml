  ai_description: >-
    ### General Description

    Adds members to a specific group in Vectra AI. This action allows analysts to
    manage group memberships dynamically by appending a list of members (such as hosts,
    IPs, or accounts) to an existing group identified by its ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | True | The unique identifier of the group in Vectra AI.
    This value must be a positive integer. |

    | Members | String | True | A comma-separated list of members to be added to the
    group. The type of member (e.g., hostname, IP, account UID) should correspond
    to the group's defined type. |


    ### Additional Notes

    - The action uses the 'append' membership action, ensuring that existing group
    members are preserved and not overwritten.

    - The action provides a detailed HTML view of the group's properties and membership
    status after the update.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Group ID` and `Members`
    list from the input parameters.

    2. **Validation**: It validates that the `Group ID` is a valid integer and processes
    the `Members` string into a list of unique, stripped strings.

    3. **Authentication**: Connects to the Vectra AI API using the provided credentials
    (API Root, Client ID, and Client Secret).

    4. **Group Update**: Sends a PATCH request to the Vectra API to add the new members
    to the specified group using the `append` membership action.

    5. **Verification**: Compares the requested members against the updated group
    membership returned by the API to identify any members that could not be assigned.

    6. **Output Generation**: Returns the updated group details in JSON format and
    renders an HTML table for the case wall showing the group's current state.
