Download PCAP:
  ai_description: >-
    ### General Description

    Downloads a PCAP (Packet Capture) file associated with a specific detection ID
    from the Vectra RUX platform. This action is designed to facilitate deep-dive
    forensic analysis by providing the raw network traffic data related to a security
    detection. The retrieved file is automatically attached to the action result within
    Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the Vectra detection
    for which the PCAP file should be downloaded. Although provided as a string, the
    value must represent a valid integer. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Detection ID` from the
    action parameters.

    2. **Validation**: It validates that the `Detection ID` is a valid integer using
    internal utility functions.

    3. **API Interaction**: The action uses the `VectraRUXManager` to send a GET request
    to the Vectra RUX API endpoint specifically for PCAP downloads (`/detections/{detection_id}/pcap`).

    4. **File Retrieval**: Upon a successful response (HTTP 200), the action extracts
    the filename from the `Content-Disposition` header and retrieves the binary content
    of the PCAP file.

    5. **Local Storage & Attachment**: The file is temporarily saved to the local
    execution environment and then encoded in Base64 to be added as an attachment
    to the Siemplify action result.

    6. **Completion**: The action concludes by providing a success message containing
    the filename and the associated detection ID.


    ### Additional Notes

    - This action does not process or filter entities from the case; it operates solely
    based on the provided `Detection ID` parameter.

    - If the file is not found or the API returns an error, the action will fail with
    a descriptive error message.
