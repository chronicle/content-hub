List Entities:
  ai_description: >-
    Lists entities (Hosts or Accounts) from the Vectra RUX platform based on specified
    query parameters. This action allows analysts to search for and retrieve detailed
    metadata about assets within the Vectra environment using various filters such
    as entity name, state, urgency scores, and tags. It is particularly useful for
    threat hunting, asset discovery, or gathering context on a group of related entities.
    The action retrieves data via a paginated GET request and presents the results
    in both a structured data table for the SOAR UI and a full JSON response for downstream
    processing.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Type | DDL | Yes | Specifies the type of entities to retrieve. Valid
    values are "Host" or "Account". |

    | Order By | DDL | No | Sorts the results by a specific field such as `urgency_score`,
    `last_detection_timestamp`, `name`, or `last_modified_timestamp`. |

    | Fields | Multi-choice | No | Allows selection of specific fields to include
    in the response (e.g., `id`, `name`, `ip`, `severity`). |

    | Name | String | No | Filters entities by their display name. |

    | State | DDL | No | Filters entities by their current state: "Active" or "Inactive".
    |

    | Last Detection Timestamp GTE | String | No | Filters for entities with a last
    detection timestamp greater than or equal to the provided value. |

    | Last Detection Timestamp LTE | String | No | Filters for entities with a last
    detection timestamp less than or equal to the provided value. |

    | Tags | String | No | Filters entities by associated tags (provide as a comma-separated
    list). |

    | Note Modified Timestamp GTE | String | No | Filters for entities where notes
    were modified after the provided timestamp. |

    | Prioritized | DDL | No | Filters entities based on whether they are marked as
    prioritized ("True" or "False"). |

    | Limit | String | No | The maximum number of entities to retrieve. |

    | Order | DDL | No | Specifies the sort order: "Ascending" or "Descending". |


    ### Additional Notes

    - The `Limit` parameter is validated to ensure it is a positive integer. If not
    provided, the system defaults to a predefined maximum.

    - If `Order` is set to "Descending", the `Order By` field is automatically prefixed
    with a minus sign (`-`) for the API request.

    - The action automatically cleans up URLs in the response by removing the API
    version substring for better readability.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves configuration (API Root, Credentials) and
    action parameters (filters, sorting, limit).

    2. **Validation:** Validates the `Limit` parameter and formats the `Order By`
    field based on the selected `Order`.

    3. **Manager Initialization:** Initializes the VectraRUXManager and authenticates
    with the platform.

    4. **API Request:** Executes a paginated GET request to the Vectra `entities`
    endpoint using the constructed query parameters.

    5. **Data Processing:** Iterates through the retrieved entities, cleans up URL
    fields, and extracts mandatory fields (ID, Type, Name, Severity, etc.) for the
    UI table.

    6. **Output Generation:** Adds a CSV-formatted data table to the action results
    and attaches the full raw JSON response.
