  ai_description: >-
    ### General Description

    The **Download PCAP** action retrieves a Packet Capture (PCAP) file associated
    with a specific detection ID from the Vectra RUX platform. This action is designed
    to facilitate forensic investigations by providing analysts with the raw network
    traffic data that triggered a specific security detection.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the Vectra detection
    for which the PCAP file should be downloaded. The value must be a valid integer.
    |


    ### Flow Description

    1. **Initialization:** The action initializes the Vectra RUX manager using the
    provided API credentials and root URL.

    2. **Validation:** The provided `Detection ID` is validated to ensure it is a
    valid integer.

    3. **Data Retrieval:** The action makes a GET request to the Vectra RUX API to
    download the PCAP file content associated with the detection.

    4. **File Handling:** The action extracts the filename from the API response headers
    and saves the file content.

    5. **Attachment:** The downloaded PCAP file is encoded and added as an attachment
    to the action result in Google SecOps, making it available for download by the
    analyst.


    ### Additional Notes

    - This action does not process entities from the case; it relies solely on the
    `Detection ID` parameter.

    - If the PCAP file is not available for the specified detection, the action will
    return a failure status.
