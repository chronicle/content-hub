Add Tags:
  ai_description: >-
    ### General Description

    The **Add Tags** action allows users to append one or more tags to specific entities
    in the Vectra AI platform. It supports tagging for Accounts, Hosts, and Detections.
    By providing a list of IDs and the desired tags, the action ensures that the new
    tags are integrated with existing ones, maintaining the entity's historical context
    while adding new metadata.


    ### Parameters Description

    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tags to add to the entities.
    |

    | Entity IDs | String | Yes | A comma-separated list of the internal Vectra IDs
    for the target entities. |

    | Entity Type | DDL | Yes | The type of entity to tag. Options are: Account, Host,
    or Detection. |


    ### Flow Description

    1. **Initialization**: The action starts by extracting the necessary configuration
    and action parameters.

    2. **Data Preparation**: It splits the `Tags` and `Entity IDs` strings into lists
    and validates that the IDs are integers.

    3. **Processing Loop**: It iterates through each provided Entity ID.

    4. **Context Retrieval**: For each ID, it performs a GET request to Vectra to
    retrieve the current tags.

    5. **Logic Execution**: It merges the existing tags with the new ones to create
    a unique, updated list.

    6. **State Change**: It performs a PATCH request to Vectra to update the entity
    with the new tag list.

    7. **Output Generation**: It records the outcome for each ID and produces a summary
    data table and a detailed JSON result.


    ### Additional Notes

    The action is designed to be additive, meaning it will not remove existing tags
    from the entities. It also handles partial failures, allowing the action to complete
    even if some entity IDs are invalid or not found.
