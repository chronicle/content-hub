Mark Detection Fixed:
  ai_description: >-
    ### General Description

    Marks one or more detections as 'fixed' in the Vectra AI platform. This action
    is used to programmatically update the status of detections, indicating that the
    underlying security issue has been addressed or resolved within the Vectra environment.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (API Root, Client
    ID, and Client Secret) and the 'Detection IDs' provided by the user.

    2. **Validation**: Parses the comma-separated string of IDs and validates that
    each ID is a valid integer using internal utility managers.

    3. **API Interaction**: Initializes the VectraRUXManager and sends a PATCH request
    to the Vectra detections endpoint with the list of IDs and the `mark_as_fixed`
    parameter set to `True`.

    4. **Result Processing**: Captures the API response and attaches it as a JSON
    result to the action execution, providing feedback on the success of the operation.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Detection IDs | A comma-separated list of numeric IDs representing the detections
    to be marked as fixed. | String | Yes | Each ID must be a valid integer. |


    ### Additional Notes

    This action performs a bulk update on the external Vectra system. It does not
    interact with or modify entities within the Google SecOps case directly, nor does
    it create insights or comments.
