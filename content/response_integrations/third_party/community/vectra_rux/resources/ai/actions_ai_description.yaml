    3. **Entity Lookup:** It calls the Vectra API to describe the entity and extract
    the list of detection IDs associated with it.

    4. **Detection Retrieval:** If detections are found, it fetches the detailed information
    for each detection ID, applying the 'State' filter and 'Limit'.

    5. **Output Generation:** The results are processed into a JSON object and a data
    table, which are then attached to the action results in Google SecOps.
