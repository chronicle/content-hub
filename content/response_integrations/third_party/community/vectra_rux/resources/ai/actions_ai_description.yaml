    \ RUX. Although provided as a string, the value must represent a valid integer.\
    \ |\n| **Entity Type** | DDL | Yes | The category of the entity to describe. Supported\
    \ values are `Account` and `Host`. |\n\n### Flow Description\n1. **Initialization**:\
