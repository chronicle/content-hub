  ai_description: >-
    ### General Description

    Assigns a specific entity (Account or Host) to a given user ID in Vectra RUX.
    This action creates a new assignment record in the external system to track which
    user is responsible for the specified entity.


    ### Flow Description

    1. Extracts the `Entity ID`, `Entity Type`, and `User ID` from the action parameters.

    2. Validates that the provided `Entity ID` and `User ID` are valid integers.

    3. Makes a POST request to the Vectra RUX API (`/api/v3.4/assignments`) to create
    a new assignment linking the entity to the user.

    4. Retrieves the newly created assignment details and outputs them as a JSON result
    and a data table.


    ### Additional Notes

    Ensure that the provided User ID and Entity ID exist in Vectra RUX before executing
    this action.
