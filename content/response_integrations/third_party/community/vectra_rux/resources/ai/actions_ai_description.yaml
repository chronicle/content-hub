Describe Assignment:
  ai_description: >-
    ### General Description

    The **Describe Assignment** action retrieves detailed information for a specific
    assignment within the Vectra RUX platform using its unique Assignment ID. This
    action is designed to provide analysts with programmatic access to the metadata,
    participants, and status of investigative assignments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Assignment ID** | String | Yes | The unique identifier of the assignment to
    retrieve. The value must be a valid integer. |


    ### Flow Description

    1. **Input Validation**: The action validates that the provided `Assignment ID`
    is a valid integer.

    2. **Authentication**: Establishes a session with the Vectra RUX API using the
    configured Client ID and Secret.

    3. **Data Retrieval**: Executes a GET request to the assignments endpoint for
    the specified ID.

    4. **Result Processing**:
       - The raw JSON response from the API is added to the action results.
       - A data table is generated containing key assignment details such as Assigned
    User, Resolved By, and Outcome.
    5. **Completion**: Returns a success message if the assignment is found, or a
    failure message if the ID is invalid or not found.


    ### Additional Notes

    - This action does not operate on SecOps entities; it requires a direct ID input
    via the action parameters.
