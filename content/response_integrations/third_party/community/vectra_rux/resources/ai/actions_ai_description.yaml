    by its ID. This action first retrieves the current tags associated with the entity,
    identifies which of the requested tags are present, and then updates the entity's
    tag list on the Vectra platform by removing those tags. It provides a summary
    of the operation, including which tags were successfully removed and which were
    not found.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the target tags (comma-separated), the
    Entity ID, and the Entity Type (Account, Host, or Detection) from the action parameters.

    2. **Data Retrieval:** Calls the Vectra API to fetch the current list of tags
    associated with the specified entity ID and type.

    3. **Tag Comparison:** Compares the provided tags against the existing tags. It
    identifies tags that can be removed and those that do not exist on the entity.

    4. **External Mutation:** If valid tags for removal are found, it constructs a
    new tag list (excluding the removed tags) and sends a PATCH request to the Vectra
    platform to update the entity.

    5. **Output Generation:** Adds a JSON result and a data table to the SOAR case
    detailing the update status, the entity ID, and the final tag list.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | string | Yes | A comma-separated list of tags to be removed from the
    entity. |

    | Entity ID | string | Yes | The unique identifier of the entity in Vectra from
    which tags will be removed. |

    | Entity Type | ddl | Yes | The category of the entity. Supported values: Account,
    Host, Detection. |


    ### Additional Notes

    - This action does not process entities from the SOAR entity list; it operates
    strictly on the ID provided in the 'Entity ID' parameter.

    - If none of the specified tags exist on the entity, the action will fail with
    a 'TagsUpdateFailException'.
