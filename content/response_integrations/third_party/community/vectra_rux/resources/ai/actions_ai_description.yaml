    ### General Description

    Updates the assigned user for a specific assignment associated with a given entity
    in Vectra RUX.


    ### Flow Description

    1. Validates the provided Entity ID and User ID.

    2. Retrieves the specific entity information from Vectra RUX to extract the associated
    assignment ID.

    3. Makes an API call to update the assignment with the new User ID.

    4. Returns the updated assignment details as a JSON result and a data table.


