  ai_description: >-
    Adds specified tags to given entity IDs (Account, Host, or Detection) in Vectra
    RUX.


    ### Parameters Description

    * **Tags** (Mandatory, String): List of the Tags which the user wants to add to
    the account, host, or detection. Multiple tags can be provided as a comma-separated
    string.

    * **Entity IDs** (Mandatory, String): List of the Entity IDs to which the user
    wants to add Tags. Multiple IDs can be provided as a comma-separated string.

    * **Entity Type** (Mandatory, Dropdown): The type of the entity to which tags
    will be added. Expected values are 'Account', 'Host', or 'Detection'.


    ### Flow Description

    1. Extracts and validates the provided tags and entity IDs from the action parameters.

    2. Iterates through each provided entity ID.

    3. Fetches the existing tags for the entity from Vectra RUX to ensure no tags
    are overwritten.

    4. Merges the new tags with the existing ones, removing any duplicates.

    5. Sends a request to Vectra RUX to update the entity with the combined list of
    tags.

    6. Returns a summary table and a JSON result detailing the operation status (success
    or failure) for each entity ID.
