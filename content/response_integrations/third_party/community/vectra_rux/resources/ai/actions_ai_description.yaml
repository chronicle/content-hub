Describe Detection:
  ai_description: >-
    Retrieves comprehensive details for a specific detection from Vectra AI using
    its unique ID. This action is designed to provide analysts with deep-dive context
    into a specific security event identified by the Vectra platform, including its
    state, category, threat level, and associated entity information.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Detection ID` from the
    input parameters.

    2. **Validation**: It validates that the provided `Detection ID` is a valid integer
    format.

    3. **API Interaction**: It authenticates with the Vectra AI platform and performs
    a GET request to the `/api/v3.4/detections/{detection_id}` endpoint.

    4. **Data Parsing**: The response is parsed into a structured Detection data model,
    which includes metadata like detection type, category, and source entity details.

    5. **Output Generation**: The action generates a data table for the case wall
    and attaches the full raw JSON response to the action results for further inspection.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the detection to retrieve
    from Vectra AI. |


    ### Additional Notes

    - This action is a utility/search action and does not automatically iterate over
    entities in the SOAR case scope. It requires a specific ID provided as a parameter.
