  ai_description: >-
    Adds tags to specific entities in the Vectra RUX platform. This action allows
    users to append one or more tags to Accounts, Hosts, or Detections by providing
    their unique Vectra IDs. The action first retrieves the existing tags for each
    specified entity to ensure that existing data is preserved and only new, unique
    tags are added. It then performs a PATCH request to update the entity's tag list
    in the external system.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tags to be added to the specified
    entities. |

    | Entity IDs | String | Yes | A comma-separated list of the unique Vectra identifiers
    for the entities to be tagged. |

    | Entity Type | DDL | Yes | The category of the entity being tagged. Options include:
    `Account`, `Host`, or `Detection`. |


    ### Additional Notes

    - This action does not process Google SecOps entities automatically; it requires
    explicit Vectra IDs as input parameters.

    - The action ensures that duplicate tags are not created by merging the new tags
    with the existing ones retrieved from the API.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of tags, entity IDs,
    and the entity type from the user input.

    2. **Validation:** It validates that the provided Entity IDs are integers and
    cleans the tag strings.

    3. **Tag Retrieval:** For each entity ID, the action calls the Vectra API to fetch
    the current list of tags.

    4. **Merging:** It combines the existing tags with the new tags, removing any
    duplicates.

    5. **External Update:** The action sends a PATCH request to Vectra RUX to update
    the entity with the new combined tag list.

    6. **Reporting:** It generates a data table and a JSON result summarizing the
    success or failure of the tag update for each ID.
