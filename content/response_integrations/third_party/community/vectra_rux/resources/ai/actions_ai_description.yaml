  ai_description: >-
    Assigns a Vectra RUX entity (Host or Account) to a specific user. This action
    creates an assignment record within the Vectra platform, facilitating ownership
    and accountability for investigation or remediation tasks. It validates that the
    provided IDs are integers before making the API request and returns the details
    of the created assignment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | string | Yes | The unique identifier of the Host or Account in Vectra
    RUX that will be assigned. |

    | Entity Type | ddl | Yes | Specifies whether the Entity ID refers to an 'Account'
    or a 'Host'. |

    | User ID | string | Yes | The unique identifier of the Vectra RUX user to whom
    the assignment will be made. |


    ### Flow Description

    1. **Initialization**: Extracts the API configuration and the action parameters
    (User ID, Entity ID, and Entity Type).

    2. **Validation**: Validates that the `Entity ID` and `User ID` are valid positive
    integers.

    3. **API Interaction**: Initializes the VectraRUXManager and calls the `assign_entity`
    method, which sends a POST request to the Vectra RUX assignments endpoint.

    4. **Result Processing**: Parses the API response into an Assignment object.

    5. **Output**: Adds a data table containing the assignment details and the raw
    JSON response to the action results in Google SecOps.
