Add Note:
  ai_description: >-
    ### General Description

    The **Add Note** action allows analysts to attach a text-based note to a specific
    entity within the Vectra AI platform. This action supports adding notes to three
    types of entities: **Accounts**, **Hosts**, and **Detections**. It is primarily
    used to document investigation findings, provide context for other analysts, or
    maintain an audit trail directly within the Vectra console from Google SecOps.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Note | The textual content of the note to be added to the specified entity.
    | String | Yes |

    | Entity ID | The unique numerical identifier of the entity in Vectra AI where
    the note will be attached. | String | Yes |

    | Entity Type | The category of the target entity. Supported values are 'Account',
    'Host', and 'Detection'. | DDL | Yes |


    ### Additional Notes

    *   The **Entity ID** must be a valid integer. The action will perform a validation
    check and fail if a non-integer value is provided.

    *   The **Entity Type** parameter is case-insensitive in the logic but should
    be selected from the provided dropdown list (Account, Host, Detection).


    ### Flow Description

    1.  **Initialization**: The action extracts the integration configuration (API
    Root, Client ID, Client Secret) and the action parameters (Note, Entity ID, Entity
    Type).

    2.  **Validation**: The provided `Entity ID` is validated to ensure it is a proper
    integer.

    3.  **Authentication**: The action authenticates with the Vectra AI API using
    the provided credentials to obtain a bearer token.

    4.  **API Execution**: A POST request is sent to the Vectra API endpoint `/entities/{entity_id}/notes`,
    passing the `Entity Type` as a query parameter and the `Note` content in the request
    body.

    5.  **Result Processing**: Upon a successful response, the action parses the metadata
    of the newly created note (ID, creation date, creator).

    6.  **Output**: The action populates a data table with the note's details and
    provides the raw JSON response for downstream use in the playbook.
  capabilities:
