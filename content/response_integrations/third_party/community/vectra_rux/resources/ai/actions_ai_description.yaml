Resolve Assignment:
  ai_description: >-
    ### General Description

    Resolves a Vectra AI assignment using a specified outcome. This action is used
    to close out workflow items in Vectra AI, allowing for the categorization of the
    resolution (e.g., as a true or false positive) and the inclusion of supporting
    evidence such as notes and detection IDs.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Outcome ID | String | Yes | The outcome for resolving the assignment. Common
    values: 1 (Benign True Positive), 2 (Malicious True Positive), 3 (False Positive).
    Custom outcomes are also supported. |

    | Assignment ID | String | Yes | The unique identifier of the assignment to be
    resolved. |

    | Note Title | String | No | A note or title to be added to the assignment resolution.
    |

    | Triage As | String | No | The triage rule to apply when resolving the assignment.
    |

    | Detection IDs | String | No | A comma-separated list of integer detection IDs
    to associate with the resolution. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves API credentials and action parameters (`Assignment
    ID`, `Outcome ID`, `Note Title`, `Triage As`, `Detection IDs`).

    2. **Validation:** Validates that `Assignment ID` and `Outcome ID` are integers.
    If `Detection IDs` are provided, they are also validated as integers.

