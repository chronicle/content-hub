List Detections:
  ai_description: >-
    ### General Description

    The **List Detections** action retrieves a list of security detections from the
    Vectra RUX platform based on a wide array of filtering criteria. It is designed
    to provide analysts with visibility into specific threats associated with hosts
    or accounts, allowing for deep-dive investigations into detection categories,
    threat levels, and temporal data. The action outputs a structured data table for
    quick review within the SOAR case and provides the full raw JSON response for
    further automated processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection Category | DDL | No | Filters results by the Vectra detection category
    (e.g., Exfiltration, Lateral Movement, Reconnaissance). |

    | Threat GTE | String | No | Filters detections with a threat score greater than
    or equal to this value. |

    | Certainty GTE | String | No | Filters detections with a certainty score greater
    than or equal to this value. |

    | Last Timestamp GTE | String | No | Filters detections occurring on or after
    this timestamp. |

    | Last Timestamp LTE | String | No | Filters detections occurring on or before
    this timestamp. |

    | Tags | String | No | A comma-separated list of tags to filter the detections.
    |

    | Entity Type | DDL | No | Specifies the type of entity to filter by (Host or
    Account). |

    | Entity ID | String | No | The unique identifier of the entity in Vectra to retrieve
    detections for. |

    | Is Targeting Key Asset | DDL | No | Filters detections based on whether they
    target a designated key asset (True/False). |

    | Note Modified Timestamp GTE | String | No | Filters detections where the associated
    notes were modified after this timestamp. |

    | Limit | String | No | The maximum number of detection records to retrieve. |

    | Order | DDL | No | Specifies the sort order (Ascending or Descending). |

    | Order By | DDL | No | The field used for sorting (last_timestamp, threat_score,
    or certainty_score). |

    | State | DDL | No | Filters detections by their current state (Active, Inactive,
    or Fixed). |

    | Detection Type | String | No | Filters by the specific name or type of detection.
    |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration details (API Root,
    Credentials) and all user-provided filter parameters.

    2. **Validation:** It validates numeric inputs such as `Threat GTE`, `Certainty
    GTE`, and `Limit` to ensure they are valid integers.

    3. **API Request:** The action initializes the VectraRUX manager, authenticates,
    and sends a GET request to the detections endpoint using the constructed query
    parameters.

    4. **Data Processing:** For each retrieved detection, the action cleans up internal
    API versioning strings from URLs to ensure they are user-friendly.

    5. **Output Generation:** It extracts key fields (ID, Type, Category, Timestamps,
    State) to create a 'List Of Detections' data table and attaches the complete JSON
    payload to the action results.


    ### Additional Notes

    - This action does not run on SOAR entities automatically; it relies on the `Entity
    ID` and `Entity Type` parameters provided in the action configuration.

    - If no detections match the provided filters, the action will complete successfully
    with an informative message.
