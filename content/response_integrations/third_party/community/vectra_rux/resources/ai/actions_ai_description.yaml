Unmark Detection Fixed:
  ai_description: >-
    ### General Description

    Unmarks specific detections as fixed in the Vectra AI platform. This action is
    used to revert the status of detections that were previously marked as resolved
    or fixed, allowing them to be re-evaluated or monitored again within the Vectra
    interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection IDs | String | Yes | A comma-separated list of numeric IDs representing
    the detections to be unmarked as fixed. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the `Detection IDs` string from the action
    input.

    2. **Validation**: Splits the comma-separated string into individual IDs and validates
    that each ID is a valid integer.

    3. **API Interaction**: Initializes the `VectraRUXManager` and sends a `PATCH`
    request to the Vectra AI detections endpoint. The request payload sets the `mark_as_fixed`
    attribute to `False` for the provided list of detection IDs.

    4. **Result Processing**: Captures the API response and attaches it to the action
    results as a JSON object for further use in the playbook.


    ### Additional Notes

    - This action performs a state change in the external Vectra AI system.

    - Ensure that the provided IDs correspond to existing detections in the target
    Vectra environment.
