  ai_description: >-
    ### General Description

    Updates the assigned user for a specific assignment associated with a Host or
    Account in Vectra AI. This action is used to reassign ownership of a detection
    or entity investigation within the Vectra platform by modifying the 'assign_to_user_id'
    field of an existing assignment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity ID | String | Yes | The unique identifier of the Host or Account in Vectra
    AI. |

    | Entity Type | DDL | Yes | The type of entity to update. Options are 'Account'
    or 'Host'. |

    | User ID | String | Yes | The unique identifier of the user to whom the assignment
    will be reassigned. |


    ### Additional Notes

    The action first retrieves the entity's current information to identify the active
    `assignment_id`. If the entity does not have an active assignment, the action
    will fail with an 'ItemNotFound' error.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Entity ID, Entity Type, and User ID
    from the action inputs.

    2. **Validation**: Validates that the Entity ID and User ID are provided as valid
    integer strings.

    3. **Fetch Assignment ID**: Calls the Vectra API to retrieve the specific entity's
    metadata and extracts the ID of the current assignment.

    4. **Update Assignment**: Sends a PUT request to the Vectra assignments endpoint
    to update the assigned user to the provided User ID.

    5. **Result Processing**: Adds the raw API response to the action results and
    creates a data table named 'Updated Assignment' containing the assignment ID,
    the new user ID, and the entity details.
