    IDs` are not empty.

    4. **API Interaction:** Calls the Vectra AI API via a `PUT` request to resolve
    the assignment.

    5. **Result Processing:** Captures the API response, creates a data table named
    'Resolved Assignment', and attaches the raw JSON result.


    ### Additional Notes

    * If the `Triage As` parameter is configured, the `Detection IDs` parameter must
    also be provided; otherwise, the action will fail.

    * The `Assignment ID` and `Outcome ID` must be valid integer values.
