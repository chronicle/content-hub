Assign Entity:
  ai_description: >-
    ### General Description\nThe **Assign Entity** action allows security analysts
    to assign a specific entity, such as a **Host** or an **Account**, to a designated
    user within the Vectra RUX platform. This action is primarily used for workflow
    management and incident response orchestration, ensuring that specific assets
    are tracked and managed by the appropriate personnel directly from the Google
    SecOps environment.\n\n### Parameters Description\n| Parameter | Type | Mandatory
    | Description |\n| :--- | :--- | :--- | :--- |\n| **Entity ID** | String | Yes
    | The unique numerical identifier of the entity (Host or Account) in Vectra RUX
    to be assigned. |\n| **Entity Type** | DDL | Yes | The category of the entity
    being assigned. Supported values are `Account` and `Host`. |\n| **User ID** |
    String | Yes | The unique numerical identifier of the Vectra RUX user to whom
    the entity will be assigned. |\n\n### Flow Description\n1. **Input Extraction**:
    The action retrieves the `Entity ID`, `Entity Type`, and `User ID` from the provided
    parameters.\n2. **Validation**: It validates that the `Entity ID` and `User ID`
    are valid non-negative integers, which is a requirement for the Vectra RUX API.\n3.
    **API Interaction**: The action initializes the Vectra RUX manager and sends a
    `POST` request to the `/assignments` endpoint. It dynamically maps the `Entity
    ID` to either `assign_host_id` or `assign_account_id` based on the selected `Entity
    Type`.\n4. **Result Processing**: Upon a successful assignment, the action parses
    the response into an Assignment object.\n5. **Output Generation**: The action
    adds a data table to the case wall containing the new Assignment ID, the User
    ID, and the Entity ID, and provides the raw JSON response for downstream playbook
    logic.\n\n### Additional Notes\n* This action does not automatically iterate over
    entities in the SOAR context; it requires the specific IDs to be manually provided
    or mapped from previous playbook steps.
