List Groups:
  ai_description: >-
    ### General Description

    Retrieves a list of groups from Vectra RUX based on specified query parameters.
    This action allows analysts to search for and list groups by name, type, importance,
    and associated members such as hosts, accounts, IPs, or domains.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Last Modified Timestamp GTE | String | No | Filter groups modified on or after
    this timestamp (e.g., 2023-10-27T12:00). |

    | Last Modified By | String | No | Filter by the username of the person who modified
    the group. |

    | Name | String | No | Filter by the specific name of the group. |

    | Type | DDL | No | Filter by the type of group: account, ip, domain, or host.
    |

    | Limit | String | No | The maximum number of group records to return. |

    | Account Names | String | No | Comma-separated list of account names to filter
    group membership. |

    | Domains | String | No | Comma-separated list of domains to filter group membership.
    |

    | Host Ids | String | No | Comma-separated list of host IDs to filter group membership.
    |

    | Host Names | String | No | Comma-separated list of host names to filter group
    membership. |

    | Importance | DDL | No | Filter by the importance level: low, medium, high, or
    never_prioritize. |

    | IPs | String | No | Comma-separated list of IP addresses to filter group membership.
    |

    | Description | String | No | Filter by the group's description (case-insensitive
    match). |


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra RUX manager using the
    provided API credentials.

    2. **Parameter Processing**: It extracts all optional filters and validates the
    'Limit' parameter to ensure it is a valid integer.

    3. **API Retrieval**: The action performs a paginated GET request to the Vectra
    RUX `/groups` endpoint, applying the specified filters.

    4. **Result Formatting**: If groups are found, they are formatted into a data
    table titled 'List Of Groups' and the full raw data is returned as a JSON result.

    5. **Completion**: The action concludes by reporting the number of groups successfully
    retrieved.


    ### Additional Notes

    - If no groups match the provided filters, the action will complete successfully
    with a message stating no groups were found.

    - The 'Limit' parameter defaults to a system-defined maximum if not specified.
