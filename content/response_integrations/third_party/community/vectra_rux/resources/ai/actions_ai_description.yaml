List Users:
  ai_description: >-
    ### General Description

    The **List Users** action retrieves a list of users from the Vectra RUX platform
    based on specified filtering criteria. It allows analysts to search for users
    by their role, email address, or a minimum last login timestamp. The results are
    presented as a data table and a raw JSON object within the Google SecOps environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Role** | String | No | Filters the user list to only include users with the
    specified role. |

    | **Email** | String | No | Filters the user list to only include the user with
    the specified email address. |

    | **Last Login GTE** | String | No | Filters users whose last login timestamp
    is greater than or equal to the provided value (Format: YYYY-MM-DDTHH:MM). |

    | **Limit** | String | No | Specifies the maximum number of user records to retrieve.
    If not provided, a default limit is applied. |


    ### Additional Notes

    - This action does not require any entities to be present in the context.

    - The `Limit` parameter must be a positive integer if provided.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the configuration (API Root,
    Credentials) and action parameters (Role, Email, Last Login GTE, Limit).

    2. **Validation:** The `Limit` parameter is validated to ensure it is a valid
    integer.

    3. **API Interaction:** The action connects to the Vectra RUX API and performs
    a paginated GET request to the `/users` endpoint using the provided filters.

    4. **Data Processing:** The retrieved user objects are parsed into a structured
    format.

