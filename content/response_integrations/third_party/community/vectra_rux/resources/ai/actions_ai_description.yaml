Update Assignment:
  ai_description: >-
    ### General Description

    The **Update Assignment** action is designed to change the assigned user for a
    specific assignment associated with a Host or Account entity within the Vectra
    RUX platform. This action is primarily used for workflow management, allowing
    analysts to programmatically reassign investigations or tasks to different users
    based on their User ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity ID** | string | Yes | The unique identifier of the entity (Host or
    Account) whose assignment needs to be updated. |

    | **Entity Type** | ddl | Yes | The type of the entity. Expected values are 'Account'
    or 'Host'. |

    | **User ID** | string | Yes | The unique identifier of the user to whom the assignment
    will be reassigned. |


    ### Flow Description

    1.  **Validation**: The action first validates that the provided `Entity ID` and
    `User ID` are valid integers.

    2.  **Entity Lookup**: It performs a GET request to the Vectra API to retrieve
    information about the specified entity (Host or Account).

    3.  **Assignment Identification**: From the entity details, the action extracts
    the current `assignment_id`. If no assignment is found for the entity, the action
    fails with an 'Item Not Found' error.

    4.  **Update Request**: The action sends a PUT request to the Vectra assignments
    endpoint, updating the `assign_to_user_id` field with the new `User ID`.

    5.  **Output**: Upon success, the action returns the updated assignment details
    in a JSON format and populates a data table named 'Updated Assignment' with the
    change details.


    ### Additional Notes

    This action performs a state change in the external Vectra RUX system by modifying
    the ownership of an assignment. It does not interact with Google SecOps entities
    directly from the case context but rather uses the provided parameters to identify
    the target resource.
