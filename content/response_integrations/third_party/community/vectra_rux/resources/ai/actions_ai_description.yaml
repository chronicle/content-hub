Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to given entity IDs (Account, Host, or Detection) in Vectra
    RUX.


    ### Flow Description

    1. Extracts the provided tags, entity IDs, and entity type from the action parameters.

    2. Iterates through each provided entity ID.

    3. Makes a GET request to the Vectra RUX API to fetch the existing tags for the
    entity.

    4. Appends the new tags to the existing tags, ensuring no duplicates.

    5. Makes a PATCH request to the Vectra RUX API to update the entity with the combined
    list of tags.

    6. Returns the status of the tag updates in a JSON result and data table.


    ### Additional Notes

    None.
