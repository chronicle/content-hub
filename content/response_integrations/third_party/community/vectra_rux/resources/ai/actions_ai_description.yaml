  ai_description: >-
    ### General Description

    Retrieves comprehensive details for a specific assignment within Vectra RUX using
    its unique identifier. This action allows analysts to view metadata associated
    with an assignment, including the assigned user, the resolver, the outcome, and
    associated entity IDs (Host or Account). It is primarily used to audit or verify
    the status of tasks within the Vectra platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Assignment ID | String | Yes | The unique numerical identifier of the assignment
    to retrieve. The value is validated as a non-negative integer before processing.
    |


    ### Flow Description

    1. **Parameter Initialization**: The action extracts the `Assignment ID` from
    the user input and validates that it is a valid integer.

    2. **Authentication**: The action initializes the `VectraRUXManager`, which handles
    OAuth2 token generation and session management.

    3. **Data Retrieval**: A GET request is sent to the Vectra RUX API endpoint `/api/v3.4/assignments/{assignment_id}`.

    4. **Data Parsing**: The response is parsed into an `Assignment` data model, which
    extracts key fields such as `Assigned User`, `Outcome Title`, and `Entity ID`.

    5. **Output Generation**: The action returns the full raw JSON response and constructs
    a data table named 'Describe Assignment' containing the flattened assignment details.


    ### Additional Notes

    This action does not process entities from the Google SecOps case; it operates
    strictly based on the provided `Assignment ID` parameter. If the ID is not found,
    the action will return a failure status.
