  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) within the VectraRUX
    platform. This action allows analysts to append contextual information or investigation
    notes directly to an entity in the external system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Note | string | Yes | The text content of the note to be added to the entity.
    |

    | Entity ID | string | Yes | The unique identifier of the entity in VectraRUX.
    |

    | Entity Type | ddl | Yes | The type of the entity. Supported values: Account,
    Host, Detection. |


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret) and
    action parameters (Note, Entity ID, Entity Type).

    2. Validates the provided Entity ID.

    3. Sends a POST request to the VectraRUX API endpoint (`/entities/{entity_id}/notes`)
    to create the note.

    4. Adds the API response to the action result as a data table and JSON for reporting
    purposes.
