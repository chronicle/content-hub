Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between the Google SecOps (Chronicle) environment\
    \ and the Vectra RUX platform. Its primary purpose is to ensure that the integration's\
    \ configuration parameters (API Root, Client ID, and Client Secret) are correct\
    \ and that the network path to the Vectra API is open. This action is typically\
    \ used during the initial setup of the integration or for troubleshooting communication\
    \ issues.\n\n### Parameters Description\nThis action does not require any input\
    \ parameters at the action level. It relies entirely on the integration's global\
    \ configuration settings:\n\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL of the\
    \ Vectra RUX API instance. |\n| Client ID | String | Yes | The unique identifier\
    \ for the API client used for authentication. |\n| Client Secret | Password |\
    \ Yes | The secret key associated with the Client ID for secure authentication.\
    \ |\n\n### Flow Description\n1.  **Initialization**: The action starts by initializing\
    \ the Siemplify SDK and retrieving the global configuration parameters (API Root,\
    \ Client ID, and Client Secret).\n2.  **Manager Setup**: It instantiates the `VectraRUXManager`.\
    \ During instantiation, the manager attempts to generate an OAuth2 access token\
    \ by sending a POST request to the `oauth2/token` endpoint.\n3.  **Connectivity\
    \ Test**: The action calls the `test_connectivity` method. This method validates\
    \ the stored tokens or attempts to re-authenticate if the credentials have changed.\n\
    4.  **Result Reporting**: \n    *   If the authentication and connection are successful,\
    \ the action returns a success message: \"Successfully connected to the VectraRUX\
    \ server\".\n    *   If an error occurs (e.g., invalid credentials, network timeout,\
    \ or API error), the action catches the exception, logs the error details, and\
    \ returns a failure message.\n\n### Additional Notes\n*   **Authentication Mechanism**:\
    \ The action uses OAuth2 Client Credentials flow. It manages token persistence\
    \ internally using a local JSON file to avoid redundant authentication requests.\n\
    *   **Error Handling**: The action includes robust error handling to distinguish\
    \ between authentication failures (401/403) and server-side issues (500+)."
