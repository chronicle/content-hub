    1. **Parameter Extraction:** Retrieves API credentials and action parameters (Group
    ID and Members).

    2. **Validation:** Validates that the Group ID is a positive integer and processes
    the comma-separated Members string into a list.

    3. **Pre-check:** Fetches the current group members from Vectra AI to verify the
    group's existence and current state.

    4. **Mutation:** Executes a PATCH request to the Vectra API endpoint for the specified
    group with the `membership_action` set to `remove`.

    5. **Analysis:** Compares the requested removals against the updated group state
    returned by the API to determine successful and failed removals.

    6. **Output Generation:** Renders an HTML table of the updated group details and
    returns the full group object as a JSON result.
