    Removes specific tags from a Vectra AI entity, such as an Account, Host, or Detection.
    The action first retrieves the current tags associated with the specified Entity
    ID to verify existence, then filters out the tags provided by the user, and finally
    updates the entity in Vectra AI with the modified tag list.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the API configuration and action parameters,
    including the comma-separated list of tags to remove, the target Entity ID, and
    the Entity Type (Account, Host, or Detection).

    2. **Tag Retrieval:** Calls the Vectra AI API to fetch the current list of tags
    for the specified entity.

    3. **Tag Comparison:** Compares the user-provided tags against the existing tags.
    It identifies which tags can be successfully removed and which do not exist on
    the entity.

    4. **External Update:** If at least one tag is found for removal, it sends a PATCH
    request to Vectra AI to update the entity's tag list.

    5. **Result Reporting:** Generates a data table and JSON result summarizing the
    status of the removal operation, including which tags were removed and which were
    not found.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Tags | String | Yes | A comma-separated list of tags to be removed from the
    entity. |

    | Entity ID | String | Yes | The unique identifier of the entity in Vectra AI
    from which tags will be removed. |

    | Entity Type | DDL | Yes | The category of the entity. Supported values are 'Account',
    'Host', or 'Detection'. |


    ### Additional Notes:

    - If none of the specified tags exist on the target entity, the action will fail
    with a 'TagsUpdateFailException'.

