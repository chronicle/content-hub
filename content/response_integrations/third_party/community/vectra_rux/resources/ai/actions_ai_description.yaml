  ai_description: >-
    ### General Description

    Resolves a specific assignment in Vectra AI using its unique assignment ID and
    a designated outcome ID. This action allows analysts to close out tasks within
    the Vectra platform directly from Google SecOps, providing options to add notes,
    apply triage rules, and associate specific detections with the resolution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Assignment ID | String | Yes | The unique integer ID of the assignment to be
    resolved. |

    | Outcome ID | String | Yes | The integer ID representing the resolution outcome
    (e.g., 1 for Benign True Positive, 2 for Malicious True Positive, 3 for False
    Positive). Custom IDs are also supported. |

    | Note Title | String | No | A descriptive note or title to be attached to the
    resolution record in Vectra. |

    | Triage As | String | No | A triage rule string to apply to the resolution. Must
    be at least 4 characters long and contain no special characters. |

    | Detection IDs | String | No | A comma-separated list of integer detection IDs
    to be associated with the triage rule. |


    ### Additional Notes

    - **Dependency:** If the 'Triage As' parameter is provided, at least one 'Detection
    ID' must also be provided for the action to succeed.

    - **Validation:** The action performs strict validation on 'Assignment ID' and
    'Outcome ID' to ensure they are valid non-negative integers.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Assignment ID, Outcome ID,
    and optional metadata (Note, Triage, Detections) from the input.

    2. **Validation Logic:** It validates that IDs are integers and checks that 'Triage
    As' meets the character requirements. It also enforces the requirement that 'Detection
    IDs' must be present if 'Triage As' is used.

    3. **External API Call:** The action sends a `PUT` request to the Vectra RUX API
    endpoint `/assignments/{assignment_id}/resolve` with the resolution payload.

    4. **Data Processing:** Upon a successful API response, the action parses the
    updated assignment details.

    5. **Output Generation:** The action produces a JSON result containing the full
    API response and creates a data table named 'Resolved Assignment' for the case
    wall.
