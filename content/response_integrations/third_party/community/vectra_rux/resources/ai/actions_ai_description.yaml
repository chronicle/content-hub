Assign Group:
  ai_description: >-
    ### General Description Add members to a specific group in Vectra RUX. This action
    allows analysts to manage group memberships by appending a list of identifiers
    (such as IPs, hostnames, or account UIDs) to an existing group ID. ### Parameters
    Description | Parameter | Type | Mandatory | Description | | :--- | :--- | :---
    | :--- | | Group ID | String | Yes | The unique ID of the Vectra group to which
    members will be added. | | Members | String | Yes | A comma-separated list of
    member identifiers (e.g., hostnames, IPs, or account UIDs) to be assigned to the
    group. | ### Flow Description 1. Extracts the Group ID and the list of members
    from the action parameters. 2. Validates that the Group ID is a valid integer.
    3. Processes the members string into a list of unique, stripped identifiers. 4.
    Executes a PATCH request to the Vectra RUX API to append the provided members
    to the specified group. 5. Compares the requested members against the updated
    group state returned by the API to identify any members that were not successfully
    assigned. 6. Generates an HTML table and a JSON object containing the updated
    group details and membership status. ### Additional Notes This action uses the
    'append' membership action, meaning existing members are preserved. The type of
    identifier required in the 'Members' parameter depends on the group's type (e.g.,
    IP for IP groups, UID for account groups).
