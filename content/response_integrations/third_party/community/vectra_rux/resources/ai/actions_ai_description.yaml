  ai_description: >-
    ### General Description

    Adds tags to specified entities (Account, Host, or Detection) in the Vectra RUX
    platform. This action retrieves existing tags for the provided entity IDs, merges
    them with the new tags, and updates the entity's tag list in the external system
    via a PATCH request. The action logs the status of each update and provides a
    summary table of the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | string | Yes | Comma-separated list of tags to add to the account, host,
    or detection. |

    | Entity IDs | string | Yes | Comma-separated list of the Entity IDs to which
    the user wants to add tags. |

    | Entity Type | ddl | Yes | The type of the entity to which tags will be added
    (Options: Account, Host, Detection). |


    ### Flow Description

    1. Extracts configuration (API credentials) and action parameters (Tags, Entity
    IDs, Entity Type).

    2. Validates and parses the input IDs and tags, removing duplicates.

    3. Iterates through each provided Entity ID.

    4. Fetches existing tags for the entity from the Vectra RUX API.

    5. Merges the existing tags with the new tags.

    6. Updates the entity's tags in Vectra RUX via a PATCH request.

    7. Logs the status of each update and generates a result table in the SOAR case.


    ### Additional Notes

    The action requires valid API credentials for the Vectra RUX integration to be
    configured.
