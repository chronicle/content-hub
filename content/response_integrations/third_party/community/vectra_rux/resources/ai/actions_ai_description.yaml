    ### Flow Description

    1. Extracts the `Group ID` and `Members` from the action parameters.

    2. Validates the `Group ID` to ensure it is a valid integer.

    3. Makes a `PATCH` request to the Vectra API (`/api/v3.4/groups/{group_id}`) to
    append the provided members to the target group.

    4. Evaluates the API response to determine which members were successfully assigned
    and which were not.

    5. Generates an HTML table displaying the updated group details and attaches the
    raw group data as a JSON result.


