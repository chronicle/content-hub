Mark Entity Fixed:
  ai_description: >-
    ### General Description

    The **Mark Entity Fixed** action is used to programmatically resolve all security
    detections associated with a specific entity (either a Host or an Account) within
    the Vectra RUX platform. By providing the unique Entity ID and specifying its
    type, the action identifies all linked detections and updates their status to
    'fixed,' effectively clearing them from the active queue in Vectra.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity ID** | String | Yes | The unique numerical identifier of the entity
    in Vectra whose detections should be marked as fixed. |

    | **Entity Type** | DDL | Yes | The type of entity being targeted. Options are
    `Account` or `Host`. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Entity ID` and `Entity
    Type` from the user input.

    2. **Entity Validation:** The `Entity ID` is validated to ensure it is a proper
    integer.

    3. **Detection Retrieval:** The action calls the Vectra API to describe the entity,
    which returns a list of all `detection_ids` currently associated with that entity.

    4. **State Update:** If detections are found, the action sends a PATCH request
    to Vectra's detections endpoint to mark all identified IDs as 'fixed'.

    5. **Result Reporting:** The action returns the API response from Vectra and provides
    a summary message of the operation's success.


    ### Additional Notes

    - This action performs a state change in the external Vectra system.

    - If no detections are found for the provided Entity ID, the action will complete
    successfully but will report that no detections were found.
