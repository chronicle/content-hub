Vectra RUX - Entities Connector:
  ai_description: >-
    ### General Description

    The Vectra RUX - Entities Connector is designed to integrate the Vectra RUX platform
    with Google SecOps (SOAR). It periodically retrieves security entities (such as
    Hosts or Accounts) and their associated detections from Vectra RUX, mapping them
    into structured alerts and events within the SOAR platform for further investigation
    and response. This connector ensures that security teams can monitor and act upon
    high-priority entities identified by Vectra RUX.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Vectra RUX API. |

    | Client ID | String | Yes | Unique identifier for API authentication. |

    | Client Secret | Password | Yes | Confidential key for API authentication. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Entity Type | String | Yes | The type of entity to fetch (Account or Host).
    |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Limit | Integer | No | Maximum number of entities to fetch per iteration. |

    | Max Hours Backwards | Integer | No | Time window (in hours) to look back for
    new entities. |

    | Prioritized | Boolean | No | If enabled, only fetches entities with a priority
    score above the threshold. |

    | PythonProcessTimeout | String | Yes | Timeout limit (in seconds) for the connector
    script. |

    | Specific Tag | String | No | A specific tag used to filter the retrieved entities.
    |


    ### Flow Description

    1. The connector initializes and authenticates with the Vectra RUX API using the
    provided credentials.

    2. It calculates the start time based on the `Max Hours Backwards` parameter to
    determine the data retrieval window.

    3. It queries the Vectra RUX API to list entities (Hosts or Accounts) based on
    the configured filters (e.g., entity type, priority, tags).

    4. For each retrieved entity, the connector fetches associated active detections.

    5. It maps each entity to a SOAR alert and its associated detections to alert
    events, including relevant metadata and assignments.

    6. The connector checks for duplicates and overflow conditions before ingesting
    the alerts into the SOAR platform.

    7. Finally, it updates the internal state (timestamps and processed IDs) to ensure
    subsequent iterations only fetch new data.
