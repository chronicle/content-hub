Vectra RUX - Entities Connector:
  ai_description: >-
    ### General Description

    The Vectra RUX - Entities Connector integrates with the Vectra RUX platform to
    ingest security entities (Hosts or Accounts) and their associated detections.
    It transforms this data into alerts within Google SecOps, enabling security teams
    to monitor and respond to threats identified by Vectra. The connector supports
    filtering by priority and tags, ensuring that only relevant security data is ingested
    into the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Vectra RUX API. |

    | Client ID | String | Yes | Unique identifier for API authentication. |

    | Client Secret | String | Yes | Confidential key for API authentication. |

    | DeviceProductField | String | Yes | Field name used to determine the device
    product. |

    | Entity Type | String | Yes | The type of entity to fetch (Account or Host).
    |

    | EventClassId | String | Yes | Field name used to determine the event name (sub-type).
    |

    | Limit | Integer | No | Maximum number of entities to fetch per iteration. |

    | Max Hours Backwards | Integer | No | Number of hours to look back for the initial
    data fetch. |

    | Prioritized | Boolean | No | If enabled, only fetches entities with a priority
    score above the threshold. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit (in seconds) for the script
    execution. |

    | Specific Tag | String | No | A specific tag used to filter the retrieved entities.
    |


    ### Flow Description

    1. Authenticates with the Vectra RUX API using the provided Client ID and Client
    Secret.

    2. Determines the start time for data retrieval based on the `Max Hours Backwards`
    parameter and the last successful execution time.

    3. Queries the Vectra RUX API for entities (Hosts or Accounts) matching the configured
    filters (e.g., priority, tags).

    4. For each retrieved entity, fetches associated active detections and assignment
    details.

    5. Maps the entity and its detections into a standardized alert format compatible
    with Google SecOps.

    6. Filters out duplicate alerts and checks for overflow conditions.

    7. Ingests the processed alerts into the SOAR platform as cases.

    8. Updates the connector state with the latest timestamps and processed alert
    IDs to ensure continuity in subsequent runs.
