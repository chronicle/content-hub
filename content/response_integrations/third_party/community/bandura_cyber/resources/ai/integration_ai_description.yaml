product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Bandura Cyber integration provides capabilities to manage allowlists and blocklists
    for IP addresses and domains. These actions directly align with the 'Network Security'
    category, which involves blocking malicious IPs/URLs at the gateway. The integration
    does not perform enrichment (fetching reputation scores or risk data), nor does
    it interact with EDR, SIEM, or other categories. Therefore, it is classified solely
    under Network Security.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
