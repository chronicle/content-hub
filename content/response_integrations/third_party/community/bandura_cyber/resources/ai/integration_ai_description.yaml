product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Bandura Cyber integration provides capabilities to manage allow and block
    lists for IP addresses and domains. This functionality directly aligns with the
    Network Security category, which includes the ability to block malicious IPs and
    URLs at the gateway. The integration does not perform SIEM log analysis, EDR host-level
    investigation, or standard Threat Intelligence enrichment (such as reputation
    lookups). It also does not interact with email, IAM, cloud, ITSM, or asset inventory
    systems. Therefore, it is classified primarily under Network Security.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
