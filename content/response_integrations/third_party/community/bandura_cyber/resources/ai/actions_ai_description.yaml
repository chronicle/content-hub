Add Domain to Denied Lists:
  ai_description: >-
    Adds URL entities to a specified Domain Denied List in Bandura Cyber. This action
    extracts the domain (network location) from the URL entity and registers it in
    the external Bandura Cyber system to block or monitor traffic. It supports optional
    descriptions and expiration dates for the entries.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The name of the Denied List where the domain will
    be added. Note: This value is case-sensitive. |

    | Description | string | No | A descriptive note to associate with the domain
    entry in the denied list. |

    | Expiration Date | string | No | The date and time when the domain should be
    automatically removed from the list (e.g., 2020-01-01T12:00:00.000+00:00). |


    ### Flow Description

    1. **Authentication**: Connects to the Bandura Cyber API using provided credentials
    (Username, Password, API Root).

    2. **Entity Filtering**: Identifies all URL entities within the current SecOps
    context.

    3. **Domain Extraction**: For each URL, it parses the string to extract the 'netloc'
    (the domain portion).

    4. **List Resolution**: Queries the Bandura Cyber system to find the unique identifier
    (UUID) for the denied list specified in the 'List Name' parameter.

    5. **External Update**: Sends a POST request to Bandura Cyber to add the extracted
    domain to the identified denied list, including the description and expiration
    date if provided.

    6. **Reporting**: Returns a JSON result of the operation and updates the action
    output message with the list of successfully added domains.
