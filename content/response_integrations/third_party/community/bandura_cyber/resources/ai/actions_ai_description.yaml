    ### General Description

    Retrieves information about Allowed IPv4 Lists from the Bandura Cyber GMC platform.
    This action allows users to fetch metadata for all configured allowed lists or
    filter for a specific list by name. The retrieved data includes list UUIDs, names,
    descriptions, and status, which are then presented as a data table and a file
    attachment within the case.


