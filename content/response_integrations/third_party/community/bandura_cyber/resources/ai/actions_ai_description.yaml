  ai_description: >-
    ### General Description

    The **Add Domain to Allowed Lists** action adds URL entities to a specified Domain
    Allowed List in Bandura Cyber. It extracts the domain from the target URL entities
    and registers them in the allowed list to ensure they are treated as known good
    indicators, preventing them from being blocked by security controls.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | List Name | String | Yes | The name of the Allowed List to add the entity to.
    Note that the list name is case-sensitive. |

    | Description | String | No | An optional description to associate with the allowed
    list entity. |

    | Expiration Date | String | No | The date and time when the entity should be
    automatically removed from the list. Expected format: `2020-01-01T12:00:00.000+00:00`.
    |


    ### Flow Description

    1. Initializes the Bandura Cyber integration using the provided API credentials.

    2. Filters the target entities to process only URL entities.

    3. Iterates through the filtered URL entities and extracts the domain portion
    using URL parsing.

    4. Retrieves the internal UUID of the specified allowed list from Bandura Cyber.

    5. Sends a request to Bandura Cyber to add the extracted domain to the allowed
    list.

    6. Collects the results and outputs a JSON object containing the details of the
    added domains, along with a summary message.
