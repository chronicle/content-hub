Add IP to Denied Lists:
  ai_description: >-
    Adds IP Address entities to a specified Denied List in Bandura Cyber. This action
    is used to block or restrict network traffic from specific IP addresses by including
    them in managed security lists. The action allows for specifying the network mask,
    an entry description, and an optional expiration date for the block.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The name of the Denied List where the IP will be
    added. Note: This value is case-sensitive. |

    | Description | string | No | A descriptive note to associate with the IP entry
    in the denied list. |

    | Maskbit | string | No | Defines the range of IP addresses (CIDR mask) to add.
    Defaults to '32' for a single host. |

    | Expiration Date | string | No | The date and time when the entity should be
    automatically removed from the list (e.g., 2020-01-01T12:00:00.000+00:00). |


    ### Flow Description

    1. **Initialization**: The action retrieves the Bandura Cyber connection details
    and the user-provided parameters (List Name, Maskbit, etc.).

    2. **List Identification**: It queries the Bandura Cyber API to find the unique
    identifier (UUID) for the Denied List matching the provided 'List Name'.

    3. **Entity Processing**: It iterates through all IP Address entities associated
    with the current alert/case.

    4. **External Mutation**: For each IP entity, it sends a POST request to the Bandura
    Cyber API to add the IP address to the identified Denied List with the specified
    configuration.

    5. **Reporting**: The action collects the API responses and provides a summary
    of which entities were successfully added to the list.
