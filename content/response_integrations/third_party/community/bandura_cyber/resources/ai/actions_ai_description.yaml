    ability to communicate with the external service by performing an authentication
    request and subsequently terminating the session.


    ### Flow Description

    1. Extracts configuration parameters: **API Root**, **Username**, **Password**,
    and **Verify SSL**.

    2. Initializes the `BanduraCyberManager` which performs an authentication request
    (POST) to the Bandura Cyber API to retrieve an access token.

    3. Performs a logout request (POST) to terminate the session.

    4. Checks if the access token was successfully retrieved to determine the connection
    status.

    5. Returns a success or failure message to the SOAR platform.


