Add Domain to Allowed Lists:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified Domain Allowed List in Bandura Cyber. This action
    extracts the domain from the URL entity and registers it in the allowed list to
    prevent it from being blocked by security policies.


    ### Flow Description

    1. Extracts the action parameters including the target List Name, Description,
    and Expiration Date.

    2. Initializes the Bandura Cyber API client.

    3. Filters the target entities to process only those of type URL.

    4. For each URL entity, parses the domain (netloc) from the URL.

    5. Makes an API call to Bandura Cyber to retrieve the UUID of the specified allowed
    list.

    6. Makes a POST API call to Bandura Cyber to add the parsed domain to the allowed
    list.

    7. Collects the results and outputs a JSON result containing the added domains.


    ### Additional Notes

    - The List Name parameter is case-sensitive.

    - The Expiration Date must follow the format: `2020-01-01T12:00:00.000+00:00`.
  ai_short_description: >-
    Adds URL entities to a specified Domain Allowed List in Bandura Cyber by extracting
    the domain from the URL and registering it in the target list.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a domain extracted from a URL entity to a specified allowed list in Bandura
      Cyber.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making a POST request to add a domain to
      an allowed list in Bandura Cyber. It does not fetch data for enrichment, nor
      does it mutate internal data, update entities, or create insights.
