  ai_description: >-
    ### General Description

    Adds IP address entities to a specified IPv4 Allowed List in Bandura Cyber. This
    action is typically used to mark known good IP addresses to prevent them from
    being blocked or generating false positive alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | List Name | String | Yes | Name of the Allowed List to add the entity to. (Case
    Sensitive) |

    | Description | String | No | A description to associate with the entity in the
    Allowed List. |

    | Maskbit | String/Integer | No | Defines the subnet mask (range of IP addresses)
    to add to the list. Default is 32. |

    | Expiration Date | String | No | The date and time when the entity should be
    automatically removed from the list. Example Format: 2020-01-01T12:00:00.000+00:00
    |


    ### Flow Description

    1. Initializes the Bandura Cyber manager with the provided credentials.

    2. Filters the target entities to include only those of type `ADDRESS` (IP addresses).

    3. For each valid IP address, retrieves the UUID of the specified Allowed List
    from Bandura Cyber.

    4. Sends a POST request to add the IP address (along with maskbit, description,
    and expiration date) to the Allowed List.

    5. Collects the results and outputs a summary message indicating which entities
    were successfully added.
