Add Domain to Allowed Lists:
  ai_description: >-
    Adds a domain extracted from a URL entity to a specified Allowed List in Bandura
    Cyber. This action is used to whitelist domains, ensuring they are not blocked
    by Bandura's security policies.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The name of the Allowed List in Bandura Cyber where
    the domain should be added. This value is case-sensitive. |

    | Description | string | No | A descriptive note to associate with the allowed
    domain entry. |

    | Expiration Date | string | No | The date and time when the domain should be
    automatically removed from the list (e.g., 2020-01-01T12:00:00.000+00:00). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the target list name, description,
    and expiration date from the user input.

    2. **Entity Filtering:** It identifies all URL entities within the current alert
    scope.

    3. **Domain Extraction:** For each URL entity, the action parses the URL to extract
    the domain (netloc).

    4. **List Identification:** It queries Bandura Cyber to find the unique identifier
    (UUID) of the Allowed List matching the provided 'List Name'.

    5. **External Mutation:** The action sends a POST request to Bandura Cyber to
    add the extracted domain to the identified Allowed List, including the optional
    description and expiration date.

    6. **Result Reporting:** The action returns a JSON result containing the details
    of the added entries and updates the action output message.
