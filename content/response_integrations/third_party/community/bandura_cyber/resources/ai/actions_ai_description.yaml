Add IP to Allowed Lists:
  ai_description: >-
    Adds IP Address entities to a specific IPv4 Allowed List in Bandura Cyber. This
    action allows analysts to whitelist specific IP addresses to prevent them from
    being blocked by Bandura security controls. It supports defining a network mask
    (maskbit), an optional description for the entry, and an expiration date for temporary
    whitelisting.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The exact name (case-sensitive) of the Allowed List
    in Bandura Cyber where the IP should be added. |

    | Description | string | No | A descriptive note to associate with the IP entry
    in the allowed list. |

    | Maskbit | string | No | The CIDR mask bit for the IP range (e.g., '32' for a
    single host). Defaults to '32'. |

    | Expiration Date | string | No | The date and time when the IP should be automatically
    removed from the list (Format: YYYY-MM-DDTHH:MM:SS.SSS+00:00). |


    ### Flow Description

    1. **Authentication**: The action authenticates with Bandura Cyber using the provided
    credentials to obtain an access token.

    2. **List Identification**: It searches for the specified 'List Name' to retrieve
    its unique identifier (UUID).

    3. **Entity Processing**: For each IP Address entity in the current context, it
    sends a request to Bandura Cyber to add the IP to the identified list.

    4. **Configuration**: The request includes the IP address, the specified maskbit,
    the description, and the expiration date if provided.

    5. **Result Reporting**: The action collects the response for each entity and
    provides a summary of which IPs were successfully added to the allowed list.
