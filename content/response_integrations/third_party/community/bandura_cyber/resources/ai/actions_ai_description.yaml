    | List Name | string | Yes | The name of the Allowed List to which the entity
    should be added. This is case-sensitive. |

    | Description | string | No | A description for the allowed list entity. |

    | Maskbit | integer | No | The range of IP addresses to add (default is 32). |

    | Expiration Date | string | No | The date and time when the entity should be
    removed from the list (e.g., 2020-01-01T12:00:00.000+00:00). |
