  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Bandura Cyber GMC (Global
    Management Center) API. This action verifies that the integration can successfully
    authenticate using the provided configuration credentials and reach the specified
    API endpoint.


    ### Parameters Description

    This action does not have any action-specific parameters. It utilizes the following
    integration configuration parameters:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Bandura Cyber API. |

    | Username | String | Yes | The username used for authentication. |

    | Password | String | Yes | The password used for authentication. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API server. |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the API Root, Username, Password, and
    SSL verification settings from the integration's global configuration.

    2. **Authentication Attempt**: Initializes the `BanduraCyberManager`, which automatically
    attempts to log in to the Bandura Cyber API via a POST request to the `/auth/login`
    endpoint to obtain an access token.

    3. **Session Termination**: Immediately calls the `logout` method to close the
    session created during the connectivity test via a POST request to the `/auth/logout`
    endpoint.

    4. **Connectivity Validation**: Evaluates whether an access token was successfully
    obtained during the login process.

    5. **Status Reporting**: Outputs a 'Connection Established' message if successful,
    or 'Connection Failed' if the authentication or network request failed.


    ### Additional Notes

    This is a health-check action and does not interact with any entities or modify
    any data within the SOAR or the external system.
