  ai_description: >-
    ### General Description

    The **Add IP to Allowed Lists** action allows analysts to add IP Address entities
    to a specific IPv4 Allowed List within the Bandura Cyber platform. This action
    is primarily used for allowlisting known-good or trusted IP addresses to prevent
    them from being blocked by security policies. It supports defining the network
    range via maskbits and setting an expiration date for the entry.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List Name** | String | Yes | The case-sensitive name of the Allowed List in
    Bandura Cyber where the IP should be added. |

    | **Description** | String | No | A descriptive note to associate with the IP
    entry in the allowed list. |

    | **Maskbit** | Integer | No | The CIDR mask bit defining the IP range. Defaults
    to 32 (single IP). |

    | **Expiration Date** | String | No | The date and time when the IP should be
    automatically removed from the list. Expected format: `YYYY-MM-DDTHH:MM:SS.SSS+00:00`.
    |


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration (API
    Root, credentials) and the user-provided parameters (List Name, Maskbit, etc.).

    2. **Entity Filtering**: It identifies all `ADDRESS` (IP) entities within the
    current alert scope.

    3. **List Resolution**: For each entity, the action queries Bandura Cyber to find
    the unique identifier (UUID) of the Allowed List matching the provided **List
    Name**.

    4. **Addition**: It sends a POST request to the Bandura Cyber API to add the IP
    address, along with the specified mask, description, and expiration date, to the
    target list.

    5. **Reporting**: The action collects the API responses and provides a summary
    of which entities were successfully added.


    ### Additional Notes

    * The **List Name** parameter is strictly case-sensitive. If the name does not
    match exactly what is configured in Bandura Cyber, the action will fail to find
    the list UUID and will not add the entity.

    * If no **Maskbit** is provided, the action defaults to `32`, targeting only the
    specific IP address of the entity.
