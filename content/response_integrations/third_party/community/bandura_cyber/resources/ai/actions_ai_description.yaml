Add Domain to Denied Lists:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified Domain Denied List in Bandura Cyber. This action
    initiates a state change on the external system to prevent network traffic to
    or from the specified domains.


    ### Flow Description

    1. Extracts configuration and action parameters (List Name, Description, Expiration
    Date).

    2. Initializes the Bandura Cyber API manager.

    3. Filters the target entities to include only URL entities.

    4. For each URL entity, parses the domain from the URL and retrieves the UUID
    of the specified denied list via a GET request to the Bandura Cyber API.

    5. Makes a POST request to the Bandura Cyber API to add the parsed domain to the
    denied list.

    6. Returns a JSON result containing the details of the added domains and outputs
    a summary message.


    ### Additional Notes

    The 'List Name' parameter is case-sensitive and must exactly match an existing
    denied list in Bandura Cyber.
