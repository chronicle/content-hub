  ai_description: >-
    ### General Description

    Adds URL entities to a specified Domain Allowed List in Bandura Cyber. This action
    extracts the domain from the URL and adds it to the target list, allowing for
    optional descriptions and expiration dates for the entry.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | String | Yes | The case-sensitive name of the Allowed List where
    the domain will be added. |

    | Description | String | No | A description or note to associate with the allowed
    list entry. |

    | Expiration Date | String | No | The date and time when the entity should be
    automatically removed from the list (Format: YYYY-MM-DDTHH:MM:SS.mmm+00:00). |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API configuration and action parameters
    (List Name, Description, Expiration Date).

    2. **Entity Filtering:** Identifies URL entities from the target entities list.

    3. **Domain Extraction:** For each URL, the domain (netloc) is extracted using
    URL parsing.

    4. **List Identification:** Queries Bandura Cyber to find the unique identifier
    (UUID) for the specified list name.

    5. **Addition:** Sends a POST request to Bandura Cyber to add the domain to the
    identified allowed list.


    ### Additional Notes

    The action specifically targets URL entities and will parse them to extract the
    domain name before submission. If no URL entities are found, the action will complete
    without adding any entries.
