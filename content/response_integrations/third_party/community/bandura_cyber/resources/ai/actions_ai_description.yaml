    reasoning: >-
      The action mutates external data by adding domains to an allowed list, so it
      cannot be an Enrichment action. It does not perform identity, host, network,
      or email-based blocking/containment, so it does not fit the strict criteria
      for a Remediation action.
    remediation: false
  entity_usage:
