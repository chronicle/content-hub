Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Bandura Cyber platform. This action verifies that the
    integration is configured correctly and can successfully communicate with the
    Bandura Cyber API.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Bandura Cyber manager, which attempts to authenticate and retrieve
    an access token via a POST request to the `/auth/login` API endpoint.

    3. Logs out of the session via a POST request to the `/auth/logout` API endpoint.

    4. Evaluates if the access token was successfully retrieved to determine the connectivity
    status.

    5. Returns a success message if the connection is established, or a failure message
    otherwise.


    ### Additional Notes

    This is a utility action primarily used during the initial setup or troubleshooting
    of the Bandura Cyber integration to ensure valid credentials and network access.
