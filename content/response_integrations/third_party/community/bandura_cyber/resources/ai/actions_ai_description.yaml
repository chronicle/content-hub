  ai_description: >-
    ### General Description

    This action adds a domain to a specified Allowed List within the Bandura Cyber
    platform. It processes URL entities, extracts the domain component, and performs
    an API request to update the external allowlist configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The name of the Allowed List to which the domain
    should be added. This value is case-sensitive. |

    | Description | string | No | A description for the entry being added to the list.
    |

    | Expiration Date | string | No | The date and time when the entity should be
    removed from the list. Format: 2020-01-01T12:00:00.000+00:00. |


    ### Flow Description

    1. **Initialization**: The action initializes the Bandura Cyber Manager using
    the provided API credentials.

    2. **Entity Filtering**: It iterates through the `target_entities` and filters
    for those with the `URL` entity type.

    3. **Domain Extraction**: For each valid entity, it extracts the domain (netloc)
    from the URL.

    4. **API Interaction**: It retrieves the list UUID from Bandura Cyber and then
    sends a POST request to add the domain to the specified Allowed List.

    5. **Result Output**: The action adds the result of the operation to the JSON
    output and terminates with a success message.
