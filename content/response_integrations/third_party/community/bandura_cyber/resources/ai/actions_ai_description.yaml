  ai_description: "### General Description\nThe **Get Allowed Domain Lists** action\
    \ retrieves information about domain lists configured in the Bandura Cyber 'Allowed'\
    \ category. This action is used to audit current configurations or verify if specific\
    \ domains are part of an existing allowlist. It provides the data in multiple\
    \ formats, including a raw JSON result, a formatted data table, and a text attachment\
    \ for forensic or reporting purposes.\n\n### Parameters Description\n| Parameter\
    \ | Description | Type | Mandatory |\n| :--- | :--- | :--- | :--- |\n| List Name\
    \ | The specific name of the allowed domain list to retrieve. If left empty, the\
    \ action retrieves all available allowed domain lists. Note: This parameter is\
    \ case-sensitive. | String | No |\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ The action retrieves the integration credentials (API Root, Username, Password)\
    \ and the optional `List Name` parameter.\n2. **Authentication:** It establishes\
    \ a session with the Bandura Cyber API using the provided credentials.\n3. **Data\
    \ Retrieval:** The action calls the Bandura Cyber API to fetch allowed domain\
    \ lists. If a `List Name` was provided, it filters the API response to return\
    \ only the matching list.\n4. **Session Termination:** The action logs out of\
    \ the Bandura Cyber session to ensure security.\n5. **Output Generation:** \n\
    \    * It attaches the full JSON response as a file named `allowed_domain_lists.txt`.\n\
    \    * It creates a data table named `Bandura Allowed Domain Lists` within the\
    \ case.\n    * It populates the JSON result for use in playbooks.\n\n### Additional\
    \ Notes\n* If no lists are found (either globally or matching the provided name),\
    \ the action will complete with a 'False' result value.\n* This action does not\
    \ require or process specific entities from the case; it operates based on the\
    \ provided parameter or fetches global configuration data."
