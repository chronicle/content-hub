  ai_description: >-
    Adds a URL entity's domain to a specified Denied List in Bandura Cyber.


    ### General Description

    This action extracts the domain from URL entities and adds them to a specified
    Denied List in Bandura Cyber, effectively blocking access to or from those domains.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | List Name | String | Yes | Name of the Denied List to add the entity to. (The
    List Name is Case Sensitive) |

    | Description | String | No | Denied List Entity Description. |

    | Expiration Date | String | No | Date you would like this entity to be removed
    from the list. Example Format: 2020-01-01T12:00:00.000+00:00 |


    ### Flow Description

    1. Initializes the Bandura Cyber manager with the provided API credentials.

    2. Filters the target entities to include only those of type URL.

    3. Iterates over the filtered entities, parsing the URL to extract the domain
    (netloc).

    4. Calls the Bandura Cyber API to add the extracted domain to the specified Denied
    List.

    5. Collects the results and outputs a summary message along with a JSON result
    containing the added domains.
