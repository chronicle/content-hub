    collection of Allowed IPv4 Lists.

    3. **Filtering**: If a `List Name` is provided, the action filters the returned
    data to find the specific list matching that name.

    4. **Output Generation**: Formats the retrieved list data into a JSON result,
    a CSV-formatted data table, and a text attachment for the case wall.

    5. **Cleanup**: Terminates the session by logging out of the Bandura Cyber manager.


    ### Additional Notes

    This action does not process or require any entities from the Google SecOps case;
    it operates as a global data retrieval utility.
