Ping:
  ai_description: >-
    Tests connectivity to the Bandura Cyber platform. This action validates the integration
    configuration by attempting to authenticate with the provided credentials and
    then logging out. It ensures that the API Root, Username, and Password are correct
    and that the network connection is functional.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration parameters,
    including API Root, Username, Password, and SSL verification settings.

    2. **Authentication**: It instantiates the `BanduraCyberManager`, which automatically
    attempts to log in to the Bandura Cyber API to obtain an access token via a POST
    request.

    3. **Session Termination**: The action calls the `logout` method to close the
    session immediately after testing the connection.

    4. **Result Validation**: It checks if an access token was successfully generated.
    If so, it reports a successful connection; otherwise, it reports a failure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Bandura Cyber API instance. |

    | Username | String | Yes | The username used for API authentication. |

    | Password | String | Yes | The password used for API authentication. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API endpoint. Defaults to False. |


    ### Additional Notes

    * This action does not process any entities and is purely for diagnostic purposes.
