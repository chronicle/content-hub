  ai_description: >-
    ### General Description

    Adds IP Address entities to a specified Denied List in Bandura Cyber. This action
    is used to enforce security policies by blocking traffic from specific indicators.
    It allows for granular control by specifying CIDR maskbits and expiration dates
    for the entries.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | string | Yes | The exact name of the Denied List in Bandura Cyber
    where the IP will be added. Note: This is case-sensitive. |

    | Description | string | No | A descriptive note to associate with the entry in
    the denied list. |

    | Maskbit | integer | No | Defines the CIDR range for the IP address. Defaults
    to 32 (single host). |

    | Expiration Date | string | No | The date and time when the IP should be automatically
    removed from the list. Expected format: `YYYY-MM-DDTHH:MM:SS.SSS+00:00`. |


    ### Additional Notes

    The action first performs a lookup to find the internal UUID of the list provided
    in the 'List Name' parameter before attempting to add the entity. If the list
    name does not exist, the action will fail for that entity.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and connection settings from
    the integration configuration.

    2. **Parameter Extraction**: Collects the target list name, description, maskbit,
    and expiration date from the action inputs.

    3. **Entity Filtering**: Identifies all `ADDRESS` (IP) entities within the current
    scope.

    4. **List Lookup**: For each entity, the action queries the Bandura Cyber API
    to find the unique identifier (UUID) of the specified Denied List.

    5. **Entity Addition**: Sends a POST request to the Bandura Cyber API to add the
    IP address to the identified Denied List with the provided metadata.

    6. **Result Processing**: Aggregates the API responses and provides a summary
    of which entities were successfully added.
