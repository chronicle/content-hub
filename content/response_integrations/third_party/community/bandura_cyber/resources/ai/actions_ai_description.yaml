  ai_description: >-
    ### General Description

    Adds URL entities to a specified Denied List in Bandura Cyber. This action extracts
    the domain (netloc) from the provided URL entities and performs a state-changing
    operation on the Bandura Cyber platform to block future traffic associated with
    those domains. It allows for setting an optional description and an expiration
    date for the block entry.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | String | Yes | The name of the Denied List where the domain will
    be added. Note: This value is case-sensitive. |

    | Description | String | No | A descriptive note to associate with the entry in
    the denied list for administrative tracking. |

    | Expiration Date | String | No | The date and time when the domain should be
    automatically removed from the list. Expected format: 2020-01-01T12:00:00.000+00:00.
    |


    ### Flow Description

    1. **Initialization**: Retrieves API credentials (API Root, Username, Password)
    and action parameters (List Name, Description, Expiration Date).

    2. **Entity Filtering**: Identifies and collects all URL entities from the target
    entities list.

    3. **Domain Extraction**: For each URL entity, it extracts the network location
    (domain) using URL parsing logic.

    4. **List Identification**: Queries the Bandura Cyber API to retrieve the unique
    identifier (UUID) for the Denied List specified by the 'List Name' parameter.

    5. **External Mutation**: Executes a POST request to the Bandura Cyber API to
    add the extracted domain to the identified Denied List, including the provided
    description and expiration date.

    6. **Reporting**: Aggregates the API responses and provides a summary message
    to the SOAR platform indicating which entities were successfully added.


    ### Additional Notes

    - The action specifically targets the domain portion of a URL. If a full URL is
    provided, only the domain will be blocked.

    - The 'List Name' must match exactly (including case) with an existing list in
    Bandura Cyber for the action to succeed.
