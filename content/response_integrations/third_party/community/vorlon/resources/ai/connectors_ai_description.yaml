Vorlon Connector:
  ai_description: >-
    ### General Description

    The Vorlon Connector enables the ingestion of security alerts from the Vorlon
    platform into Google SecOps. It provides visibility into service-to-service interactions,
    secret usage, and potential security risks by fetching detailed alert data and
    converting it into actionable cases within the SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of your Vorlon instance (e.g., `https://<domain_name>.vorlon.io`).
    |

    | Client ID | String | Yes | The Client ID used for OAuth2 authentication with
    the Vorlon API. |

    | Client Secret | Password | Yes | The Client Secret used for OAuth2 authentication
    with the Vorlon API. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product in the ingested events. Default is 'Vorlon'. |

    | EventClassId | String | Yes | The field name used to determine the event name
    or sub-type. Default is 'type'. |

    | Max Days Backwards | String | No | The number of days to look back for alerts
    during the first run or if no timestamp is found. Default is 1 day. |

    | Max Incidents per Fetch | String | Yes | The maximum number of alerts to retrieve
    in a single execution cycle. |

    | Open Alerts Only | Boolean | No | If enabled, the connector only fetches alerts
    with an 'open' status. Otherwise, it fetches open, dismissed, and resolved alerts.
    |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    connector's Python process. |


    ### Flow Description

    1. **Authentication**: The connector uses the Client ID and Client Secret to request
    an OAuth2 access token from the Vorlon `/rest/v1/token` endpoint.

    2. **Timestamp Calculation**: It identifies the starting point for the fetch by
    checking the last saved timestamp. If unavailable, it uses the 'Max Days Backwards'
    parameter.

    3. **Alert Fetching**: The connector queries the Vorlon `/rest/v1/alerts` endpoint,
    applying filters for the start time, alert status (based on 'Open Alerts Only'),
    and the fetch limit.

    4. **Pagination**: If more alerts are available than the 'Max Incidents per Fetch'
    limit, the connector iterates through pages to collect the requested number of
    alerts.

    5. **Event Mapping**: Each fetched alert is parsed to extract metadata, including
    requesting/responding service details, secret types, and severity levels.

    6. **Case Ingestion**: The parsed alerts are transformed into Google SecOps `CaseInfo`
    objects and sent to the system for processing.

    7. **Checkpointing**: The connector saves the timestamp of the most recent alert
    to ensure that the next execution only retrieves new data.
