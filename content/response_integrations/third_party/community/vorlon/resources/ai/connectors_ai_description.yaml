Vorlon Connector:
  ai_description: >-
    ### General Description

    The Vorlon Connector enables the ingestion of security alerts from the Vorlon
    platform into Google SecOps. It facilitates automated monitoring by periodically
    querying the Vorlon API for new alerts, mapping them to standardized case formats,
    and creating incidents within the SOAR environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Vorlon API (e.g., https://<domain_name>.vorlon.io).
    |

    | Client ID | String | Yes | The Client ID used for authentication. |

    | Client Secret | Password | Yes | The Client Secret used for authentication.
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Max Days Backwards | String | No | The number of days to look back when fetching
    incidents (default is 1). |

    | Max Incidents per Fetch | String | Yes | The maximum number of incidents to
    retrieve in a single fetch. |

    | Open Alerts Only | Boolean | No | If enabled, fetches only alerts with an "open"
    status; otherwise, fetches all statuses. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |


    ### Flow Description

    1. **Authentication**: The connector authenticates with the Vorlon API using the
    provided Client ID and Client Secret to obtain an access token.

    2. **Initialization**: It retrieves configuration parameters and determines the
    time range for fetching alerts based on the last successful execution timestamp
    or the `Max Days Backwards` setting.

    3. **Data Fetching**: It queries the Vorlon `/rest/v1/alerts` endpoint, applying
    filters for status (if configured) and time range.

    4. **Case Creation**: For each retrieved alert, the connector creates a corresponding
    event and maps it into a `CaseInfo` object, including details like start/end times,
    severity, and service information.

    5. **Ingestion**: The mapped cases are returned to the SOAR platform for processing,
    and the latest timestamp is saved to ensure subsequent fetches start from the
    correct point.
