product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Vorlon integration is designed to detect, investigate, and respond to third-party
    application risks, secrets management, and service connections. 1. SIEM: The connector
    ingests alerts into Google SecOps, and the actions allow for searching and retrieving
    alert and connection telemetry, which aligns with SIEM capabilities for monitoring
    and investigation. 2. Cloud Security: The integration focuses on third-party application
    risks and secrets management, which are core components of Cloud/SaaS security
    posture management. 3. Asset Inventory: The integration provides continuous discovery
    and monitoring of third-party applications and services, effectively maintaining
    an inventory of these assets. It does not fit EDR (no host-level process activity),
    Network Security (not a firewall/WAF), Threat Intelligence (no IOC reputation),
    Email Security, IAM, ITSM, Vulnerability Management, or Collaboration categories.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
