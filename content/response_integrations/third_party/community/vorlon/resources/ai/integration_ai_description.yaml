product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Vorlon integration is primarily focused on the discovery, monitoring, and
    risk profiling of third-party applications and data in motion. The connector facilitates
    the ingestion of security alerts into the SOAR platform, which aligns with SIEM
    capabilities for alert ingestion and visibility into activity. Furthermore, the
    focus on third-party application risk and monitoring of cloud-based services aligns
    with Cloud Security (specifically SaaS security). It does not perform EDR, Network
    Security (blocking/firewall), Threat Intelligence (reputation), Email Security,
    IAM, ITSM, Vulnerability Management, or Collaboration functions. It is not classified
    as Asset Inventory as it focuses on third-party applications rather than internal
    IT-managed devices.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
