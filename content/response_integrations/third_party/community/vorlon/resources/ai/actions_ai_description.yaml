  ai_description: >-
    Retrieves a list of alerts from the Vorlon server based on specified filtering
    criteria. This action allows users to filter alerts by requesting or responding
    services, specific alert IDs, time ranges (From/To), alert status, and result
    limits. The retrieved alert data is returned as a JSON result for further analysis
    within the SOAR platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Requesting Service | string | No | Requesting service id(s) to include, specified
    as a comma separated list of ids. |

    | Responding Service | string | No | Responding service id(s) to include, specified
    as a comma separated list of ids. |

    | Alert IDs | string | No | The list of alert ids to retrieve, specified as a
    comma separated list of ids. |

    | From | string | No | Filter by start time in the format "YYYY-MM-DDTHH:MM:SS".
    |

    | To | string | No | Filter by end time in the format "YYYY-MM-DDTHH:MM:SS". |

    | Alert Status | ddl | No | The list of alert statuses to retrieve (open, dismissed,
    resolved). Default is 'open'. |

    | Limit | string | No | Filter by limit. Default is '100'. |


    ### Flow Description

    1. The action initializes the VorlonManager using the provided API credentials.

    2. It extracts the user-provided filter parameters (services, IDs, time range,
    status, limit).

    3. It calls the `get_alerts` method on the VorlonManager, which performs a GET
    request to the `/rest/v1/alerts` endpoint.

    4. The retrieved alert data is added to the action result using `siemplify.result.add_result_json`.

    5. The action completes with a success or failure message based on the API response.
