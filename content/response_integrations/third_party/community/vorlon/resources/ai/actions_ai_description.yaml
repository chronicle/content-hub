  ai_description: >-
    Retrieves a connection summary for a specified service ID from the Vorlon platform.
    It fetches telemetry data regarding observed or detected connections within a
    given timeframe and outputs the results as a JSON object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Service ID | String | Yes | The service name or app name to get the connections
    summary for. |

    | Instance ID | String | No | Filters the summary by a specific instance ID of
    the service. |

    | From | String | No | The start time for the filter in "YYYY-MM-DDTHH:MM:SS"
    format (e.g., 1970-1-1T00:00:00). |

    | To | String | No | The end time for the filter in "YYYY-MM-DDTHH:MM:SS" format.
    |

    | Type | Dropdown | No | The type of connection to filter by. Options are 'observed'
    or 'detected'. Default is 'observed'. |

    | Secret IDs | String | No | A comma-separated list of secret IDs to filter the
    connections. |


    ### Flow Description

    1. Extracts the provided parameters, including the mandatory Service ID and any
    optional filters.

    2. Initializes the Vorlon API client using the integration's configured credentials.

    3. Sends a GET request to the Vorlon API (`/rest/v1/connections/summary/{service}`)
    to retrieve the connection summary based on the provided filters.

    4. Returns the fetched summary as a JSON result to the SOAR platform.
