    time range (From/To), connection type, and Secret IDs.

    2. Initializes the Vorlon API client using the integration configuration credentials.

    3. Makes a GET request to the Vorlon API (`/rest/v1/connections/summary/{service}`)
    to fetch the connection summary for the specified service.

    4. Attaches the retrieved connection summary to the action's JSON result.

    5. Returns a success or failure status based on the API response.


