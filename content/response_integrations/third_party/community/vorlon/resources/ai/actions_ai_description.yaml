Get Connection Summary:
  ai_description: >-
    Retrieves a summary of network connections for a specific service from the Vorlon
    platform. This action allows analysts to query connection data based on service
    identifiers, time ranges, and connection types (observed or detected). The retrieved
    data is returned as a JSON object for use in subsequent playbook steps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service ID | string | Yes | The unique identifier for the service (typically
    the service or app name) to retrieve the connection summary for. |

    | Instance ID | string | No | If provided, filters the results by a specific instance
    ID of the service. |

    | From | string | No | Filters results by a start time in 'YYYY-MM-DDTHH:MM:SS'
    format (e.g., 2023-10-01T12:00:00). |

    | To | string | No | Filters results by an end time in 'YYYY-MM-DDTHH:MM:SS' format
    (e.g., 2023-10-01T13:00:00). |

    | Type | ddl | No | The type of connection to retrieve. Options are 'observed'
    (default) or 'detected'. |

    | Secret IDs | string | No | A comma-separated list of secret IDs to filter the
    connection summary. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (Root
    URL, Client ID, Client Secret) and the user-provided action parameters.

    2. **Manager Initialization:** Initializes the VorlonManager, which handles authentication
    and token management.

    3. **Data Transformation:** Converts the 'From' and 'To' timestamp strings into
    epoch format and cleans the 'Secret IDs' string by removing unnecessary spaces.

    4. **API Request:** Executes a GET request to the Vorlon API endpoint `/rest/v1/connections/summary/{service_id}`
    with the specified filters.

    5. **Result Processing:** Validates the response and attaches the connection summary
    data to the action's JSON result.


    ### Additional Notes

    - The 'Service ID' is a path parameter in the API request and is strictly required
    for the action to execute.

    - Time parameters must follow the exact format 'YYYY-MM-DDTHH:MM:SS' or the action
    will fail during the conversion process.
