Get All Services:
  ai_description: >-
    ### General Description

    The **Get All Services** action retrieves a comprehensive list of all detected
    and observed services from the Vorlon server. This action is primarily used for
    inventory discovery and visibility into the services monitored by the Vorlon platform.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration's global configuration (API Root, Client ID, and Client Secret) to
    authenticate and communicate with the Vorlon API.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify environment and retrieves
    the necessary configuration parameters for the Vorlon integration.

    2. **Authentication**: It establishes a session with the Vorlon server using the
    provided credentials to obtain an OAuth2 access token.

    3. **Data Retrieval**: The action calls the `get_all_services` method in the Vorlon
    Manager, which executes a GET request to the `/rest/v1/services` endpoint.

    4. **Result Processing**: The retrieved JSON list of services is attached to the
    action's results, and the action completes with a success message.


    ### Additional Notes

    This action does not operate on specific entities within a case; it performs a
    global fetch of service data from the external system.
