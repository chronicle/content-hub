  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps (Chronicle) environment and the **Vorlon** instance. It ensures
    that the provided credentials (Client ID and Client Secret) are valid and that
    the API Root URL is reachable. This action is typically used during the initial
    setup of the integration or for troubleshooting communication issues.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. It relies
    solely on the integration's configuration settings (API Root, Client ID, and Client
    Secret). |


    ### Additional Notes

    - This action does not process any entities.

    - It performs an authentication handshake followed by a basic GET request to the
    services endpoint to confirm end-to-end connectivity.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `API Root`, `Client
    ID`, and `Client Secret` from the integration's configuration.

    2. **Manager Initialization**: It initializes the `VorlonManager`, which automatically
    attempts to fetch an OAuth2 access token using the provided credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    sends a GET request to the `/rest/v1/services` endpoint of the Vorlon API.

    4. **Result Reporting**: If the request is successful, the action completes with
    a success message. If any step fails (e.g., authentication error or network timeout),
    it catches the exception and reports a failure.
