  ai_description: >-
    ### General Description

    This action retrieves a summary of network connections associated with a specific
    service from the Vorlon platform. It allows analysts to fetch aggregated connection
    data by providing a Service ID and applying optional filters such as Instance
    ID, time range, connection type (observed or detected), and specific secret IDs.
    The results are returned as a JSON object for further analysis within the SOAR
    platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service ID | String | Yes | The unique identifier for the service (typically
    the service name or app name) for which to retrieve the connection summary. |

    | Instance ID | String | No | If provided, filters the connection summary by a
    specific instance ID of the service. |

    | From | String | No | If provided, filters the summary by a start time in the
    format `YYYY-MM-DDTHH:MM:SS` (e.g., 2023-10-27T10:00:00). |

    | To | String | No | If provided, filters the summary by an end time in the format
    `YYYY-MM-DDTHH:MM:SS` (e.g., 2023-10-27T11:00:00). |

    | Type | DDL | No | The type of connection to summarize. Options are `observed`
    (default) or `detected`. |

    | Secret IDs | String | No | A comma-separated list of secret IDs to filter the
    connection summary. |


    ### Flow Description

    1. **Initialization**: The action extracts the Vorlon integration configuration
    (API Root, Client ID, Client Secret) and the user-provided action parameters.

    2. **Manager Setup**: A `VorlonManager` instance is initialized to handle communication
    with the Vorlon API.

    3. **Time Processing**: If the `From` or `To` parameters are provided, the action
    validates the string format and converts them into epoch timestamps required by
    the API.

    4. **API Execution**: The action calls the Vorlon API's connection summary endpoint
    using the specified Service ID and optional query parameters (secrets, instance,
    time range, type).

    5. **Result Handling**: The retrieved connection summary is added to the action's
    JSON results. If the fetch is successful, the action completes with a success
    message; otherwise, it reports a failure.


    ### Additional Notes

    - The `Service ID` is a mandatory parameter and must be provided for the action
    to run.

    - Time filters must strictly follow the `YYYY-MM-DDTHH:MM:SS` format to avoid
    execution errors.
