  ai_description: >-
    ### General Description

    The **Update Alert** action allows users to modify the properties of an existing
    alert within the Vorlon platform. This action is primarily used to change the
    status of an alert (e.g., dismissing it) or to apply updates to linked alerts
    by providing a structured JSON payload.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert Object | String | Yes | A JSON-formatted string containing the update
    details. It must include the `alert_id` and the specific fields to be updated,
    such as `new_status` or `apply_to_linked_alerts`. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (API Root,
    Client ID, Client Secret) and the `Alert Object` input string.

    2. **JSON Validation:** The action attempts to parse the `Alert Object` string
    into a JSON object. If the string is not valid JSON, the action fails.

    3. **API Interaction:** The action calls the Vorlon Manager's `update_alert` method,
    which sends a `PUT` request to the `/rest/v1/alerts/update` endpoint with the
    validated JSON payload.

    4. **Result Processing:** The response from the Vorlon server, containing the
    updated alert's data, is added to the action's JSON results for use in subsequent
    playbook steps.


    ### Additional Notes

    - This action does not run on specific SecOps entities; it operates based on the
    `alert_id` provided within the `Alert Object` parameter.
