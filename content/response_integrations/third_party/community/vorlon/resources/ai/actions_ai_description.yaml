Get Secrets:
  ai_description: >-
    ### General Description

    The **Get Secrets** action retrieves detailed information about secrets stored
    within the Vorlon platform. It allows users to query for specific secrets by their
    unique identifiers or to list all secrets associated with a particular service.
    This action is primarily used for gathering metadata and configuration details
    about managed secrets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Service ID** | String | No | The unique identifier for a service (typically
    the service name). When provided, the action fetches all secrets linked to this
    specific service. |

    | **Secret IDs** | String | No | A comma-separated list of specific secret identifiers
    to retrieve. |


    ### Additional Notes

    - **Mutual Exclusivity:** The action requires exactly one of the two parameters
    to be configured. Providing both the `Service ID` and `Secret IDs`, or leaving
    both empty, will result in an execution failure.

    - This action does not process or filter SOAR entities; it operates as a standalone
    data retrieval utility.


    ### Flow Description

    1. **Authentication:** The action initializes the Vorlon manager and authenticates
    with the API using the configured Client ID and Client Secret to obtain a bearer
    token.

    2. **Input Validation:** The logic verifies that either `Secret IDs` or `Service
    ID` is provided, ensuring they are not used simultaneously.

    3. **API Request:** A GET request is dispatched to the `/rest/v1/secrets` endpoint,
    passing the selected identifier as a query parameter.

    4. **Result Processing:** The JSON response containing the secret details is captured
    and attached to the action's execution results.
