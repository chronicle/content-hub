  ai_description: >-
    ### General Description

    Retrieves alerts linked to a specific Alert ID from the Vorlon platform. Linked
    alerts are defined as those sharing the same secret ID and alert group. This action
    is useful for identifying related security incidents and understanding the scope
    of a potential threat by aggregating related telemetry.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert for which linked
    alerts should be retrieved. |

    | Alert Status | DDL | No | Filters the results by alert status. Supported values:
    `open`, `dismissed`, `resolved`. |

    | Page | String | No | The page number for paginated results. |

    | Limit | String | No | The maximum number of alerts to return. Default is 100.
    |


    ### Flow Description

    1. **Authentication**: Connects to the Vorlon API using the configured API Root,
    Client ID, and Client Secret to obtain a bearer token.

    2. **Parameter Extraction**: Retrieves the mandatory Alert ID and optional filters
    (Status, Page, Limit) from the action input.

    3. **Data Retrieval**: Executes a GET request to the Vorlon endpoint (`/rest/v1/alerts/linked/{id}`)
    to fetch alerts linked to the provided ID.

    4. **Output**: Returns the list of linked alerts as a JSON result for use in subsequent
    playbook steps.


    ### Additional Notes

    This action does not operate on SecOps entities; it requires a specific Alert
    ID as input. If no linked alerts are found, the action will return a failure status.
