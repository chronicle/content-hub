  ai_description: >-
    ### General Description

    The **Get Alerts** action retrieves a list of alerts from the Vorlon server based
    on user-defined filters. It allows analysts to query the external system for specific
    alerts using identifiers, service associations, time ranges, and status. The results
    are returned as a JSON object for use in playbooks.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration details (API Root,
    Client ID, Client Secret) and action parameters including service IDs, alert IDs,
    time filters, and status.

    2. **Manager Initialization**: It initializes the `VorlonManager` which handles
    authentication and session management with the Vorlon API.

    3. **Data Retrieval**: The action calls the `get_alerts` method, which constructs
    a GET request to the `/rest/v1/alerts` endpoint. It processes time strings into
    epoch timestamps and cleans comma-separated strings for the query.

    4. **Result Output**: The fetched alerts are added to the action's JSON results,
    and the action completes with a success message.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Requesting Service | String | No | A comma-separated list of service IDs that
    initiated the alerts. |

    | Responding Service | String | No | A comma-separated list of service IDs that
    responded to the alerts. |

    | Alert IDs | String | No | A comma-separated list of specific alert IDs to retrieve.
    |

    | From | String | No | Filter alerts from this time (Format: `YYYY-MM-DDTHH:MM:SS`).
    |

    | To | String | No | Filter alerts up to this time (Format: `YYYY-MM-DDTHH:MM:SS`).
    |

    | Alert Status | DDL | No | Filter by alert status: `open` (default), `dismissed`,
    or `resolved`. |

    | Limit | String | No | The maximum number of alerts to return. Default is 100.
    |


    ### Additional Notes

    - The `From` and `To` parameters must strictly follow the `YYYY-MM-DDTHH:MM:SS`
    format (e.g., 2023-10-27T10:00:00) to be correctly parsed into epoch timestamps.

    - If no filters are provided, the action defaults to fetching the most recent
    'open' alerts.
