Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert in the Vorlon platform using a provided JSON payload. This action
    allows users to modify alert properties such as status or linked alerts directly
    within the external Vorlon system.


    ### Flow Description

    1. Extracts the `Alert Object` parameter, which contains the JSON payload for
    the update.

    2. Initializes the Vorlon API client using the provided integration credentials.

    3. Parses the `Alert Object` string into a JSON object.

    4. Sends a PUT request to the Vorlon API (`/rest/v1/alerts/update`) with the parsed
    JSON payload to update the specified alert.

    5. Retrieves the updated alert details from the API response and attaches them
    to the action's JSON result.


    ### Additional Notes

    The `Alert Object` parameter must be a valid JSON string. It typically requires
    fields such as `alert_id`, `apply_to_linked_alerts`, and `new_status` to successfully
    process the update on the Vorlon server.
