  ai_description: >-
    Retrieves a list of all detected and observed services from the Vorlon platform.


    ### General Description

    This action connects to the Vorlon API to fetch a comprehensive list of all services
    that have been detected and observed within the environment. The retrieved data
    is returned as a JSON object for use in subsequent playbook steps.


    ### Flow Description

    1. Extracts the necessary authentication credentials and API root URL from the
    integration configuration.

    2. Initializes the Vorlon API client and authenticates using client credentials.

    3. Sends a GET request to the Vorlon API to retrieve all services.

    4. Attaches the retrieved services as a JSON result to the action's output.

    5. Completes the action execution and returns a success or failure status.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not run on specific entities or alerts. It performs a global
    query to retrieve all available services from the Vorlon platform.
