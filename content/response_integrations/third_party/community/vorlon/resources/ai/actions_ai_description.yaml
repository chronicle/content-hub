  ai_description: >-
    ### General Description

    This action retrieves connection logs for a specific service from the Vorlon server.
    It allows analysts to query historical telemetry data regarding how services are
    interacting, filtered by time ranges, specific instances, or secret identifiers.
    The results are returned as a JSON object for further analysis within the SOAR
    platform.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | :--- | :--- | :--- | :--- |

    | Service ID | Yes | String | The unique identifier (typically the service or
    app name) for which to retrieve connection data. |

    | Instance ID | No | String | Filters the results to a specific instance of the
    service. |

    | From | No | String | Filters connections starting from this time. Expected format:
    "YYYY-MM-DDTHH:MM:SS" (e.g., 1970-01-01T00:00:00). |

    | To | No | String | Filters connections up to this time. Expected format: "YYYY-MM-DDTHH:MM:SS"
    (e.g., 1970-01-01T00:00:00). |

    | Secret IDs | No | String | A comma-separated list of secret IDs to filter the
    connection results. |

    | Limit | No | String | The maximum number of connection records to return. Defaults
    to 100 if not specified. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the API configuration (Root URL,
    Client ID, Client Secret) and the user-provided action parameters (Service ID,
    Instance ID, Time range, Secret IDs, and Limit).

    2. **Manager Initialization**: It initializes the `VorlonManager` to handle authentication
    and API communication.

    3. **Data Retrieval**: The action calls the `get_connections` method, which performs
    a GET request to the Vorlon API endpoint `/rest/v1/connections/{service_id}` with
    the specified filters.

    4. **Result Processing**: The retrieved connection data is attached to the action's
    execution context as a JSON result.

    5. **Completion**: The action terminates with a success message indicating that
    connections were successfully fetched, or an error message if the request failed.


    ### Additional Notes

    - The `From` and `To` parameters must strictly follow the `YYYY-MM-DDTHH:MM:SS`
    format to be correctly converted to epoch time by the integration logic.

    - If the API returns an empty response for a valid service ID, the action will
    raise an exception.
