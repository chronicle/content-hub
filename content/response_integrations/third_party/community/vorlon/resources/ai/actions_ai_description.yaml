Get Connections:
  ai_description: >-
    Retrieves connection records for a specified service from the Vorlon platform.
    This action allows analysts to query historical connection data, filtered by instance,
    time range, and associated secrets, to understand service interactions and potential
    security implications.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service ID | string | Yes | The unique identifier or name of the service (e.g.,
    app name) to retrieve connections for. |

    | Instance ID | string | No | If provided, filters the results by the specific
    instance ID of the service. |

    | From | string | No | Filters connections starting from this time. Expected format:
    "YYYY-MM-DDTHH:MM:SS" (e.g., 1970-01-01T00:00:00). |

    | To | string | No | Filters connections up to this time. Expected format: "YYYY-MM-DDTHH:MM:SS"
    (e.g., 1970-01-01T00:00:00). |

    | Secret IDs | string | No | A comma-separated list of secret IDs to filter the
    connection results. |

    | Limit | string | No | The maximum number of connection records to return. Default
    value is 100. |


    ### Flow Description

    1. **Authentication:** The action initializes the Vorlon manager using the provided
    API Root, Client ID, and Client Secret to obtain an access token.

    2. **Parameter Processing:** It extracts the Service ID and optional filters (Instance
    ID, Secret IDs, Limit). It also validates and converts the 'From' and 'To' date
    strings into epoch timestamps.

    3. **Data Retrieval:** The action performs a GET request to the Vorlon API endpoint
    specific to the provided Service ID, applying the defined filters as query parameters.

    4. **Result Handling:** The retrieved connection data is added to the action's
    JSON results, and the execution is marked as completed with a success message.
