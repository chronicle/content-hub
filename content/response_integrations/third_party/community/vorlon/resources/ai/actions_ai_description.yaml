  ai_description: >-
    ### General Description

    Retrieves alerts from the Vorlon platform based on specified filters such as requesting
    service, responding service, alert IDs, time range, and status. The action returns
    the fetched alerts as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Requesting Service | String | No | Requesting service id(s) to include, specified
    as a comma-separated list of ids. |

    | Responding Service | String | No | Defines responding service id(s) to include,
    specified as a comma-separated list of ids. |

    | Alert IDs | String | No | Defines the list of alert ids to retrieve, specified
    as a comma-separated list of ids. |

    | From | String | No | If provided, filter by from time in the format "YYYY-MM-DDTHH:MM:SS"
    e.g. 1970-1-1T00:00:00. |

    | To | String | No | If provided, filter by to time in the format "YYYY-MM-DDTHH:MM:SS"
    e.g. 1970-1-1T00:00:00. |

    | Alert Status | Drop-down | No | Defines the list of alert statuses to retrieve.
    Default is 'open'. |

    | Limit | String | No | If provided, filter by limit. Default is 100. |


    ### Flow Description

    1. Extracts the provided parameters and configuration.

    2. Authenticates with the Vorlon API using the provided credentials.

    3. Sends a GET request to fetch alerts matching the provided filters.

    4. Returns the retrieved alerts as a JSON result.
