Get Alerts:
  ai_description: >-
    Retrieves a list of alerts from the Vorlon platform based on specified filtering
    criteria. This action allows analysts to query for alerts by requesting or responding
    service IDs, specific alert IDs, time ranges, and alert statuses. The results
    are returned as a JSON object for further processing within the playbook.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Requesting Service | String | No | A comma-separated list of service IDs that
    initiated the request associated with the alert. |

    | Responding Service | String | No | A comma-separated list of service IDs that
    responded to the request associated with the alert. |

    | Alert IDs | String | No | A comma-separated list of specific Vorlon alert IDs
    to retrieve. |

    | From | String | No | The start time for the alert search in 'YYYY-MM-DDTHH:MM:SS'
    format (e.g., 2023-10-01T12:00:00). |

    | To | String | No | The end time for the alert search in 'YYYY-MM-DDTHH:MM:SS'
    format. |

    | Alert Status | DDL | No | Filters alerts by their current status. Options: 'open',
    'dismissed', 'resolved'. Default is 'open'. |

    | Limit | String | No | The maximum number of alerts to return. Default is 100.
    |


    ### Additional Notes

    - This action does not run on entities; it is a standalone search action.

    - Time parameters must follow the strict ISO-like format 'YYYY-MM-DDTHH:MM:SS'
    to be correctly converted to epoch time for the API request.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration settings (API
    Root, Credentials) and user-provided filter parameters.

    2. **Manager Initialization:** A VorlonManager instance is created to handle authentication
    and API communication.

    3. **Data Transformation:** Comma-separated strings for services and IDs are cleaned
    of whitespace. Date strings are converted into Unix epoch timestamps.

    4. **API Request:** The action performs a GET request to the Vorlon `/rest/v1/alerts`
    endpoint with the constructed query parameters.

    5. **Result Processing:** The retrieved alerts are added to the action's JSON
    results, and the execution status is updated based on the success of the API call.
