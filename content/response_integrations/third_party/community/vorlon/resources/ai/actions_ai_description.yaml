Get Alerts:
  ai_description: >-
    ### General Description

    Retrieves alerts from the Vorlon platform based on specified filtering criteria
    such as requesting service, responding service, alert IDs, time range, and status.
    The fetched alerts are returned as a JSON result for further use within the SecOps
    platform.


    ### Flow Description

    1. Extracts action parameters including Requesting Service, Responding Service,
    Alert IDs, From, To, Alert Status, and Limit.

    2. Initializes the Vorlon API client with the provided integration credentials.

    3. Makes a GET request to the Vorlon API (`/rest/v1/alerts`) to fetch alerts matching
    the provided filters.

    4. Returns the retrieved alerts as a JSON result in the SecOps platform.


    ### Additional Notes

    Time parameters (From, To) should be provided in the format "YYYY-MM-DDTHH:MM:SS"
    (e.g., 1970-1-1T00:00:00).
  ai_short_description: >-
    Retrieves alerts from the Vorlon platform based on specified filtering criteria
    and returns them as a JSON result.
  capabilities:
    can_create_case_comments: false
