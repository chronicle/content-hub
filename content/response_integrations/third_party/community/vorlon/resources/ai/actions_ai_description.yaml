Update Alert:
  ai_description: >-
    Updates an alert's details or status within the Vorlon platform. This action allows
    for programmatic modification of alert attributes by submitting a JSON-formatted
    update request to the Vorlon API.


    ### General Description

    This action interacts with the Vorlon REST API to update existing alerts. It is
    primarily used to change alert statuses (e.g., dismissing an alert) or to apply
    updates across linked alerts. The action requires a raw JSON string representing
    the update payload, providing flexibility for various update scenarios supported
    by the Vorlon platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert Object | String | Yes | A JSON-formatted string containing the update
    details. It typically requires an `alert_id` and the fields to be updated, such
    as `new_status` or `apply_to_linked_alerts`. |


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the API Root, Client ID, and
    Client Secret from the integration settings.

    2. **Parameter Extraction:** The `Alert Object` string is retrieved from the action
    input.

    3. **Manager Initialization:** A `VorlonManager` instance is created, which handles
    authentication and token management.

    4. **JSON Validation:** The action attempts to parse the `Alert Object` string
    into a JSON object to ensure it is valid before transmission.

    5. **API Execution:** The manager sends a `PUT` request to the `/rest/v1/alerts/update`
    endpoint with the provided JSON payload.

    6. **Result Processing:** The response from the Vorlon server is captured and
    added to the action's JSON results for use in subsequent playbook steps.
