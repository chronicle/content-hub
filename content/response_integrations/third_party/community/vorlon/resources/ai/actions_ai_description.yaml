Get Linked Alerts:
  ai_description: >-
    ### General Description

    The **Get Linked Alerts** action retrieves a list of alerts from the Vorlon platform
    that are logically linked to a specific Alert ID. Alerts are considered linked
    if they share the same secret ID and belong to the same alert group. This action
    is primarily used for incident investigation to identify related security events
    and understand the broader scope of a potential threat.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | string | Yes | The unique identifier of the alert for which linked
    alerts should be retrieved. |

    | **Alert Status** | ddl | No | Filters the results by the status of the linked
    alerts. Options include: `open`, `dismissed`, `resolved`. |

    | **Page** | string | No | The page number to retrieve for paginated results.
    |

    | **Limit** | string | No | The maximum number of linked alerts to return. Defaults
    to 100 if not specified. |


    ### Flow Description

    1.  **Parameter Extraction:** The action retrieves the API configuration (Root
    URL, Client ID, Client Secret) and the user-provided parameters (Alert ID, Status,
    Page, Limit).

    2.  **Manager Initialization:** A `VorlonManager` instance is created to handle
    authentication and communication with the Vorlon API.

    3.  **Data Retrieval:** The action calls the `get_linked_alerts` method, which
    sends a GET request to the Vorlon server's linked alerts endpoint using the provided
    Alert ID and filters.

    4.  **Result Processing:** The retrieved list of linked alerts is attached to
    the action's execution results as a JSON object.

    5.  **Completion:** The action concludes with a success message if data is retrieved
    or an error message if the request fails or no linked alerts are found.


    ### Additional Notes

    *   This action does not process entities from the SOAR case; it relies entirely
    on the provided **Alert ID** parameter.

    *   If no linked alerts are found, the action will return a failure status with
    a descriptive message.
