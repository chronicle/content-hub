  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the **Vorlon**\
    \ platform. It validates that the integration's configuration parameters\u2014\
    specifically the API Root, Client ID, and Client Secret\u2014are correct and that\
    \ the Vorlon API is reachable and responding to requests.\n\n### Parameters Description\n\
    This action does not have any input parameters. It utilizes the global integration\
    \ configuration settings:\n\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL of the\
    \ Vorlon API instance. |\n| Client ID | String | Yes | The unique identifier used\
    \ for OAuth2 authentication. |\n| Client Secret | String | Yes | The secret key\
    \ used for OAuth2 authentication. |\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ The action retrieves the API Root, Client ID, and Client Secret from the integration's\
    \ configuration.\n2. **Manager Initialization**: It initializes the `VorlonManager`.\
    \ During initialization, the manager performs an authentication handshake by sending\
    \ a POST request to the token endpoint to obtain a Bearer token.\n3. **Connectivity\
    \ Check**: The action executes the `test_connectivity` method, which performs\
