product_categories:
  asset_inventory: true
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The integration provides management capabilities for AWS EC2 instances, which
    are cloud-native resources, fitting the 'Cloud Security' category. It allows for
    the modification of Security Group ingress and egress rules, which functions as
    a network-level control, fitting the 'Network Security' category. Additionally,
    the 'Find Instance' action allows for the retrieval of detailed information about
    EC2 instances, aligning with 'Asset Inventory' capabilities. It does not provide
    EDR (process-level activity), SIEM (log analysis), or other listed categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
