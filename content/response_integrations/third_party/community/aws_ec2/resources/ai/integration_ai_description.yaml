  network_security: true
  reasoning: >-
    The AWS EC2 integration provides capabilities that span multiple security domains.
    It is primarily a Cloud Security tool, as it manages EC2 instances (Create, Delete,
    Start, Stop, Find, Tag). It functions as a Network Security tool by allowing the
    modification of Security Group ingress and egress rules, which act as cloud-native
    firewalls. It supports EDR-like containment functionality by allowing the user
    to stop or terminate instances, effectively isolating them from the network. Finally,
    it acts as an Asset Inventory tool by providing the ability to search for and
    retrieve details about EC2 instances.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
