    * **Access Key ID**: The AWS access key used for authentication.\n* **Secret Access\
    \ Key**: The AWS secret key used for authentication.\n* **Default Region**: The\
    \ AWS region to which the connectivity test is directed.\n\n### Flow Description\n\
