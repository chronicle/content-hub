Revoke Security Group ingress:
  ai_description: >-
    ### General Description

    The **Revoke Security Group ingress** action removes specific inbound (ingress)
    IP permissions from an existing AWS EC2 Security Group within a Virtual Private
    Cloud (VPC). This action is primarily used for containment and security hardening
    by programmatically withdrawing previously granted network access rules.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Group ID** | String | No | The unique identifier of the AWS Security Group
    (e.g., `sg-1a2b3c4d`) from which you want to revoke inbound permissions. |

    | **IP Permissions** | Code (JSON) | No | A JSON-formatted string defining the
    specific IP rules to be removed. It includes fields like `FromPort`, `ToPort`,
    `IpProtocol`, and `IpRanges`. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves AWS credentials (Access
    Key ID, Secret Access Key) and the default region from the integration settings.

    2. **Parameter Parsing:** It extracts the target Security Group ID and the IP
    permissions JSON string. The JSON string is converted into a Python dictionary
    for processing.

    3. **AWS Interaction:** The action uses the `EC2Manager` (via the Boto3 SDK) to
    call the `revoke_security_group_ingress` API on the specified AWS account and
    region.

    4. **Result Handling:** If the revocation is successful, the action returns the
    raw response from AWS as a JSON result and sets the action status to success.
    If an error occurs (e.g., invalid permissions or group ID), it logs the error
    and returns a failure status.


    ### Additional Notes

    * **Mandatory Fields:** While the metadata marks parameters as not mandatory,
    the action logic requires both a valid `Group ID` and correctly formatted `IP
    Permissions` JSON to execute successfully. If these are missing or malformed,
    the action will fail.

    * **JSON Format:** The `IP Permissions` parameter must strictly follow the AWS
    Boto3 structure for `IpPermissions` objects.
