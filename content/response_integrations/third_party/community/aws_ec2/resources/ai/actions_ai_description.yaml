  ai_description: >-
    ### General Description

    The Authorize Security Group Ingress action modifies an AWS EC2 security group
    by adding or updating inbound IP permissions. This action allows users to programmatically
    define network access rules (e.g., opening specific ports for specific IP ranges)
    directly within the AWS environment, facilitating automated infrastructure management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | No | The ID of the security group (e.g., sg-1a2b3c4d) to
    which the inbound IP permissions will be added. |

    | IP Permissions | code | No | A JSON-formatted string defining the ingress rules.
    Example: `{"FromPort": 80, "IpProtocol": "tcp", "IpRanges": [{"CidrIp": "1.1.1.1/16"}],
    "ToPort": 80}`. |


    ### Additional Notes

    While the parameters are marked as not mandatory in the configuration, they are
    required for the action to function correctly. The `IP Permissions` parameter
    must be a valid JSON string that conforms to the AWS EC2 `IpPermissions` structure.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary AWS credentials
    (Access Key ID, Secret Access Key) and the default region from the integration
    configuration.

    2. **Parameter Extraction**: It extracts the `Group ID` and the `IP Permissions`
    (provided as a JSON string) from the action parameters.

    3. **Initialization**: An `EC2Manager` instance is initialized using the extracted
    credentials to interface with the AWS EC2 API.

    4. **Execution**: The action calls the `authorize_security_group_ingress` method,
    which applies the specified ingress rules to the target security group.

    5. **Result Handling**: The action logs the outcome and returns the API response
    as a JSON result to the SOAR platform.
