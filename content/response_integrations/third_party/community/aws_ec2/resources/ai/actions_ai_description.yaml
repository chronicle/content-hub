Create Instance:
  ai_description: >-
    Creates new Amazon EC2 instances based on a specified Amazon Machine Image (AMI).
    This action allows for the automated provisioning of virtual servers in the AWS
    environment, supporting configurations for instance types, counts, and security
    group assignments. It operates asynchronously, meaning it will poll the AWS API
    until the requested instances transition from a 'pending' state to a 'running'
    state before completing.


    ### Flow Description:

    1. **Initialization:** The action retrieves AWS connection details (Access Key,
    Secret Key, Region) from the integration configuration and instance specifications
    (AMI ID, Type, Counts, Security Groups) from the action parameters.

    2. **Instance Creation (First Run):** It calls the AWS EC2 service to run new
    instances. If the instances are immediately 'running', it collects their details.
    If they are 'pending', it stores their IDs and enters an 'In Progress' state.

    3. **Status Polling (Subsequent Runs):** In follow-up executions, the action checks
    the current state of the pending instances using the 'describe_instances' method.

    4. **Completion:** Once all requested instances have reached the 'running' state,
    the action returns the full JSON metadata for the created resources and marks
    the execution as completed.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image ID | string | No | The AMI ID used to create the new instance (e.g., ami-12345).
    Defaults to a placeholder if not provided. |

    | Instance Type | string | No | The hardware specification for the instance (e.g.,
    m1.small). Defaults to m1.small if not provided. |

    | Max Count | string | Yes | The maximum number of instances to create. |

    | Min Count | string | Yes | The minimum number of instances to create. |

    | Security Group ID | string | No | A comma-separated list of Security Group IDs
    to assign to the instances (e.g., sg-12345, sg-6789). |


    ### Additional Notes:

    - This action does not process SecOps entities; it relies entirely on user-provided
    parameters.

    - The action will remain in an 'In Progress' state until AWS reports that all
    instances are fully running.
