  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    the Google SecOps platform and the Amazon Web Services (AWS) EC2 environment.
    It ensures that the provided credentials (Access Key ID and Secret Access Key)
    are valid and that the platform can successfully communicate with the AWS API
    within the specified region.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration parameters:

    * **Access Key ID**: The AWS access key used for authentication.

    * **Secret Access Key**: The AWS secret key used for authentication.

    * **Default Region**: The AWS region to which the connection is tested.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the AWS credentials and
    region settings from the integration's configuration.

    2. **Manager Initialization**: An instance of the `EC2Manager` is created using
    the retrieved credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes the AWS `describe_regions` API call.

    4. **Result Evaluation**: If the API call returns a valid response, the action
    concludes with a success status. If the call fails (e.g., due to invalid credentials
    or network issues), it returns a failure status.


    ### Additional Notes

    This action does not process any entities and is strictly used for system health
    checks and configuration validation.
