Authorize Security Group Egress:
  ai_description: >-
    Adds or updates outbound (egress) IP permissions for a specific AWS VPC Security
    Group. This action allows administrators to programmatically define network traffic
    rules that permit traffic leaving a security group based on protocol, port range,
    and destination IP ranges (CIDR blocks).


    ### Flow Description:

    1. **Credential Extraction:** Retrieves AWS Access Key, Secret Key, and Default
    Region from the integration configuration.

    2. **Parameter Parsing:** Extracts the target Security Group ID and the IP permissions
    defined in a JSON format.

    3. **Data Transformation:** Converts the IP permissions JSON string into a Python
    list of dictionaries required by the AWS SDK.

    4. **AWS API Interaction:** Calls the `authorize_security_group_egress` method
    via the Boto3 EC2 client to apply the rules to the specified security group.

    5. **Result Handling:** Logs the outcome and attaches the raw AWS response to
    the action results in Google SecOps.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | Yes | The unique identifier (e.g., sg-1a2b3c4d) of the security
    group where outbound rules will be added. |

    | IP Permissions | code | Yes | A JSON-formatted string defining the egress rules.
    It must include `IpProtocol`, and optionally `FromPort`, `ToPort`, and `IpRanges`
    (with `CidrIp`). |


    ### Additional Notes:

    - This action specifically targets **egress** (outbound) rules. For inbound rules,
    use the 'Authorize Security Group Ingress' action.

    - The `IP Permissions` parameter must be a valid JSON array or object representing
    the rule structure expected by the AWS EC2 API.
