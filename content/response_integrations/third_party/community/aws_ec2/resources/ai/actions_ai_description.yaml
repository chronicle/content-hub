Find Instance:
  ai_description: >-
    ### General Description

    Fetches detailed information about specific Amazon EC2 instances or all instances
    based on provided IDs and filters. This action interacts with the AWS EC2 API
    to retrieve configuration, status, and metadata for the requested cloud resources.


    ### Flow Description

    1. Extracts the AWS credentials and action parameters, including `Instance Ids`,
    `Filters`, and `Max Results`.

    2. Initializes the `EC2Manager` to establish a connection with the AWS EC2 service.

    3. Parses the provided JSON filters into a dictionary format.

    4. If specific `Instance Ids` are provided, the action iterates through the list
    and makes a `describe_instances` API call for each instance.

    5. If no `Instance Ids` are provided, the action makes a single `describe_instances`
    API call using the provided filters to retrieve matching instances.

    6. Aggregates the retrieved instance details and attaches them to the action's
    JSON result.

    7. Returns a success message indicating which instances were successfully fetched.


    ### Additional Notes

    If neither instance IDs nor filters are specified, the output will include information
    for all instances in the region, limited by the `Max Results` parameter (which
    defaults to AWS limits if not strictly bounded, though the parameter suggests
    5 to 1000).
