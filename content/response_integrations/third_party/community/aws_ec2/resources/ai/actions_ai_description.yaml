  ai_description: >-
    ### General Description

    This action adds or updates outbound (egress) IP permissions for a specific AWS
    EC2 Security Group within a VPC. It allows administrators to programmatically
    define network traffic rules, specifying protocols, port ranges, and destination
    IP ranges (CIDR) that are permitted to leave the security group.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | Yes | The unique identifier of the AWS Security Group (e.g.,
    `sg-1a2b3c4d`) where the outbound rules will be applied. |

    | IP Permissions | code | Yes | A JSON-formatted string defining the egress rules.
    It must include fields like `IpProtocol`, `FromPort`, `ToPort`, and `IpRanges`
    (containing `CidrIp`). |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves AWS credentials (Access
    Key ID, Secret Access Key) and the default region from the integration settings.

    2. **Parameter Parsing:** It extracts the target Security Group ID and the IP
    Permissions JSON string from the action inputs.

    3. **Data Transformation:** The IP Permissions JSON string is parsed into a Python
    dictionary and wrapped in a list to meet the AWS SDK (boto3) requirements.

    4. **AWS Interaction:** The action uses the `EC2Manager` to call the AWS `authorize_security_group_egress`
    API, which applies the specified rules to the security group.

    5. **Result Handling:** If successful, the AWS response metadata is attached as
    a JSON result to the action, and a success message is returned. If an error occurs,
    it is logged and the action fails.


    ### Additional Notes

    - This action performs a state change in AWS by modifying security group configurations.

    - The `IP Permissions` parameter must be a valid JSON object representing the
    rule structure expected by the AWS EC2 API.
