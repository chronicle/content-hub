Authorize Security Group Ingress:
  ai_description: >-
    Adds or updates inbound (ingress) IP permissions for a specific AWS EC2 security
    group within a VPC. This action allows administrators to programmatically define
    firewall rules, specifying protocols, port ranges, and source IP ranges (CIDR).
    It interacts directly with the AWS EC2 service to apply these changes.


    ### Flow Description:

    1. **Credential Retrieval:** Extracts AWS Access Key, Secret Key, and Default
    Region from the integration configuration.

    2. **Parameter Extraction:** Retrieves the target Security Group ID and the IP
    permissions defined in JSON format from the action parameters.

    3. **Data Parsing:** Converts the IP permissions JSON string into a structured
    dictionary for the AWS SDK.

    4. **AWS API Call:** Executes the `authorize_security_group_ingress` command via
    the Boto3 library to update the security group rules.

    5. **Result Processing:** Captures the AWS response, logs the outcome, and returns
    the result JSON to the Google SecOps platform.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | No | The unique identifier of the security group (e.g.,
    sg-1a2b3c4d) to which the rules will be added. |

    | IP Permissions | Code | No | A JSON-formatted string defining the ingress rules,
    including `IpProtocol`, `FromPort`, `ToPort`, and `IpRanges`. |


    ### Additional Notes:

    * This action performs a state change in the AWS environment by modifying network
    security policies. While parameters are marked as not mandatory in the configuration,
    they are logically required for the action to perform a meaningful update.
