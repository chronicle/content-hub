  ai_description: >-
    ### General Description

    Adds or updates outbound IP permissions for a specific security group in an AWS
    VPC. This action interacts with the AWS EC2 API to modify security group egress
    rules, allowing or restricting network traffic based on the provided configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | Yes | The ID of the security group to modify (e.g., sg-1a2b3c4d).
    |

    | IP Permissions | code | Yes | JSON-formatted string defining the egress rules
    (e.g., `{"FromPort": 80, "IpProtocol": "tcp", "IpRanges": [{"CidrIp": "1.1.1.1/16"}],
    "ToPort": 80}`). |


    ### Additional Notes

    This action performs a direct mutation on the AWS EC2 infrastructure. Ensure that
    the provided AWS credentials have the necessary permissions to modify security
    group rules. This action does not operate on SOAR entities.


    ### Flow Description

    1. Extracts AWS credentials and action parameters (`Group ID`, `IP Permissions`).

    2. Parses the `IP Permissions` JSON string into a dictionary.

    3. Initializes the `EC2Manager` with the provided AWS credentials.

    4. Executes the `authorize_security_group_egress` method to apply the new egress
    rules to the specified security group.

    5. Logs the operation status and adds the result JSON to the action output.
