  ai_description: >-
    ### General Description

    The 'Create Tags' action allows users to add or overwrite tags for specific AWS
    EC2 resources (such as instances, volumes, or security groups). This action is
    useful for organizing resources, managing costs, or triggering automation based
    on resource metadata within an AWS environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Resources ID | String | Yes | A comma-separated list of AWS resource IDs (e.g.,
    i-1234567890abcdef0) that you want to tag. |

    | Tags | Code | Yes | A JSON-formatted string representing the tags to be created.
    The expected format is a JSON object with a 'tags' key containing a list of Key-Value
    pairs, for example: `{"tags": [{"Key": "Environment", "Value": "Production"}]}`.
    |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves AWS credentials (Access
    Key ID, Secret Access Key) and the default region from the integration settings.

    2. **Parameter Parsing**: It extracts the list of resource IDs and the JSON string
    of tags from the action parameters. The tags are converted from a JSON string
    into a Python list of dictionaries.

    3. **Resource Iteration**: The action splits the comma-separated resource IDs
    and iterates through each one.

    4. **AWS API Call**: For each resource, it calls the AWS EC2 `create_tags` API
    via the `EC2Manager` to apply the specified tags.

    5. **Result Collection**: The action tracks which resources were successfully
    tagged and which encountered errors.

    6. **Finalization**: It outputs a summary message indicating success or failure
    for the provided resource IDs and returns a boolean result value.
