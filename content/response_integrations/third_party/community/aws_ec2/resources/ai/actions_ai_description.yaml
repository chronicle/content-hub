Authorize Security Group Egress:
  ai_description: >-
    ### General Description

    This action adds or updates outbound IP permissions (egress rules) for a specific
    security group within an AWS Virtual Private Cloud (VPC). It allows security teams
    to programmatically modify network access controls directly from the SOAR platform.


    ### Flow Description

    1. Retrieves the target Security Group ID and the desired IP permissions (formatted
    as JSON) from the action parameters.

    2. Establishes a connection to AWS EC2 using the provided integration credentials.

    3. Executes the `authorize_security_group_egress` API call to apply the new outbound
    rules to the specified security group.

    4. Captures the API response and attaches it to the action's JSON results.

    5. Returns a success or failure message based on the API call's outcome.


    ### Additional Notes

    Ensure that the 'IP Permissions' parameter strictly follows the JSON structure
    expected by the AWS boto3 EC2 client.
  ai_short_description: >-
    Adds or updates outbound IP permissions (egress rules) for a specific security
    group in an AWS VPC.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
