    ### General Description

    This action terminates specified AWS EC2 instances. It is designed to perform
    a destructive remediation action on cloud infrastructure by invoking the AWS EC2
    `terminate_instances` API. The action processes a list of instance IDs provided
    by the user, attempts to delete them, and reports the final status of each instance
    (e.g., 'shutting-down' or 'terminated').


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | String | Yes | A comma-separated list of AWS EC2 instance IDs
    to be deleted (e.g., `i-1234567890abcdef0, i-0987654321fedcba0`). |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary AWS credentials
    (Access Key ID, Secret Access Key) and the default region from the integration
    configuration.

    2. **Parameter Parsing**: The `Instance Ids` parameter is extracted and split
    into a list of individual instance IDs.

    3. **Manager Initialization**: An `EC2Manager` object is instantiated using the
    provided credentials to interface with the AWS SDK (boto3).

    4. **Execution**: The action iterates through the list of instance IDs and calls
    the `delete_instance` method for each.

    5. **Status Verification**: For each request, the action checks the returned instance
    state. If the state is 'shutting-down' or 'terminated', it logs the success; otherwise,
    it captures and logs any errors encountered.

    6. **Result Reporting**: The action compiles the results into a JSON object, logs
    the outcome, and returns the total count of successfully deleted instances.
