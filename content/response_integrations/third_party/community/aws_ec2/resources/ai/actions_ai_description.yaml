    inbound rules to the specified security group.

    4. Attaches the API response to the action's JSON results.

    5. Returns a success or failure message based on the API call's outcome.


    ### Additional Notes

    The `IP Permissions` parameter must be provided in a valid JSON format that matches
    the AWS boto3 specification for `IpPermissions` (e.g., specifying `FromPort`,
    `ToPort`, `IpProtocol`, and `IpRanges`).
