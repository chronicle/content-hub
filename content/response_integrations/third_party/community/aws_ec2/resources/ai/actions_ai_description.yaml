Revoke Security Group Egress:
  ai_description: >-
    Revokes outbound (egress) IP permissions from a specific AWS EC2 Security Group
    within a VPC. This action is used to tighten security posture by removing existing
    rules that allow traffic to leave the network based on specific protocols, ports,
    and CIDR ranges. It interacts directly with the AWS EC2 API to modify the security
    group configuration.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves AWS credentials (Access Key ID, Secret
    Access Key) and the default region from the integration settings.

    2. **Parameter Parsing:** Extracts the target Security Group ID and the IP permissions
    JSON string from the action parameters.

    3. **Data Transformation:** Converts the IP permissions JSON string into a structured
    dictionary required by the AWS SDK (Boto3).

    4. **AWS API Interaction:** Executes the `revoke_security_group_egress` command
    via the EC2 Manager to remove the specified rules.

    5. **Result Reporting:** Logs the outcome, provides the raw JSON response from
    AWS, and sets the action status to success or failure.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | No | The unique identifier of the security group (e.g.,
    `sg-1a2b3c4d`) from which permissions will be revoked. While marked as not mandatory
    in metadata, it is required for the API call to succeed. |

    | IP Permissions | Code | No | A JSON-formatted string defining the rules to revoke.
    Must include `IpProtocol`, `FromPort`, `ToPort`, and `IpRanges` (with `CidrIp`).
