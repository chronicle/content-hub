  ai_description: >-
    ### General Description

    Starts one or more specified AWS EC2 instances. This action is used to transition
    instances from a stopped state to a running state within an AWS environment, which
    is useful for automated remediation or forensic workflows.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | The instance IDs which you want to start (comma separated). For
    example: `i-1234567890abcdef0, i-0987654321fedcba0`. | String | Yes |


    ### Flow Description

    1. **Configuration Extraction**: Retrieves AWS Access Key ID, Secret Access Key,
    and Default Region from the integration settings.

    2. **Parameter Parsing**: Extracts the `Instance Ids` string and converts it into
    a list of individual identifiers.

    3. **Instance Initialization**: For each provided ID, the action attempts to start
    the instance using the AWS EC2 API.

    4. **State Verification**: Checks the current state of the instance. If the state
    is `pending` or `running`, the operation is considered successful for that instance.

    5. **Result Aggregation**: Tracks the number of successfully started instances
    and compiles detailed JSON metadata for each.

    6. **Completion**: Returns the total count of started instances and updates the
    action status to `IN_PROGRESS` if any instances are still in a pending state,
    or `COMPLETED` otherwise.


    ### Additional Notes

    This action is asynchronous. If an instance is in a `pending` state, the action
    will signal that it is still in progress.
