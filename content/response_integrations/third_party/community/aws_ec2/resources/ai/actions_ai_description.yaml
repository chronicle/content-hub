  ai_description: >-
    Stops one or more specified AWS EC2 instances. This action interacts with the
    AWS EC2 service to transition instances from a running state to a stopped state.
    It supports stopping multiple instances simultaneously via a comma-separated list
    and provides an option to force the shutdown. The action is asynchronous, meaning
    it can monitor the transition state (stopping vs. stopped) and report progress.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | String | Yes | A comma-separated list of AWS EC2 instance identifiers
    (e.g., i-1234567890abcdef0, i-0987654321fedcba0) to be stopped. |

    | Force Instance To Stop | Boolean | No | If set to 'true', forces the instance
    to stop without processing file system caches or metadata. Default is 'false'.
    |


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials (Access Key ID, Secret Access
    Key, and Default Region) from the integration configuration.

    2. **Parameter Extraction**: Parses the 'Instance Ids' string into a list and
    retrieves the 'Force Instance To Stop' boolean flag.

    3. **Execution**: Iterates through each provided Instance ID and calls the AWS
    EC2 API to initiate the stop command.

    4. **State Monitoring**: Checks the current state of each instance returned by
    the API. If an instance is in the 'stopping' state, the action marks itself as
    'In Progress' to allow for asynchronous completion. If the state is 'stopped',
    it is marked as successful.

    5. **Result Reporting**: Aggregates the results, providing a count of stopped
    instances as the main result value and detailed JSON metadata for each instance's
    state transition.
