  ai_description: >-
    Creates new AWS EC2 instances based on a specified Amazon Machine Image (AMI).
    This action allows for the automated provisioning of virtual infrastructure by
    defining the image ID, instance type, and the number of instances to be created.
    It supports asynchronous execution, meaning it will poll the AWS environment until
    the instances transition from a 'pending' state to a 'running' state, ensuring
    the instances are fully operational before completing the action.


    ### Flow Description:

    1. **Initialization**: Extracts AWS credentials (Access Key, Secret Key, Region)
    and action parameters (AMI ID, Instance Type, Counts, and Security Groups).

    2. **Instance Creation**: In the first run, it calls the AWS EC2 API to launch
    the requested number of instances.

    3. **Status Check**: If instances are in a 'pending' state, the action saves the
    instance IDs and enters an 'In Progress' state.

    4. **Polling**: In subsequent runs, it describes the specific instances to check
    their current state.

    5. **Completion**: Once all instances reach the 'running' state, it retrieves
    the full metadata for each instance and completes the execution.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image ID | String | No | The ID of the AMI to use for creating the instance
    (e.g., ami-12345). |

    | Instance Type | String | No | The hardware specification for the instance (e.g.,
    m1.small). |

    | Max Count | Integer | Yes | The maximum number of instances to create. |

    | Min Count | Integer | Yes | The minimum number of instances to create. |

    | Security Group ID | String | No | A comma-separated list of Security Group IDs
    to associate with the instances. |


    ### Additional Notes:

    - This action is asynchronous and will continue to run until the instances are
    in a 'running' state or an error occurs.

    - If no Instance Type is provided, it defaults to 'm1.small' within the manager
    logic.
