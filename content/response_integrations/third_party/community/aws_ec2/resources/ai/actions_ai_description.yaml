  ai_description: >-
    Creates a new Amazon EC2 instance from a specified Amazon Machine Image (AMI).
    The action interacts with the AWS API to provision the instance and monitors its
    state asynchronously until it is successfully running.


    ### Parameters Description

    * **Image ID** (String, Optional): The AMI ID to use for the new instance (e.g.,
    ami-12345).

    * **Instance Type** (String, Optional): The hardware configuration of the host
    computer (e.g., m1.small). Defaults to m1.small if not provided.

    * **Max Count** (Integer, Mandatory): The maximum number of instances to create.

    * **Min Count** (Integer, Mandatory): The minimum number of instances to create.

    * **Security Group ID** (String, Optional): A comma-separated list of security
    group IDs to assign to the instance.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initiates the creation of the EC2 instance(s) using the AWS API (`run_instances`).

    3. Checks the state of the newly created instances. If they are 'pending', the
    action suspends and retries asynchronously.

    4. Once the instances reach the 'running' state, the action completes and outputs
    the instance details as a JSON result.


    ### Additional Notes

    The action runs asynchronously, meaning it will periodically check the status
    of the instances until they are fully provisioned.
