Create Tags:
  ai_description: >-
    Creates or overwrites tags for specified AWS EC2 resources, such as instances,
    volumes, or security groups. This action allows for the organization and categorization
    of AWS assets directly from Google SecOps by applying key-value pairs to the target
    resource identifiers.


    ### Flow Description:

    1. **Configuration Extraction:** Retrieves AWS credentials (Access Key ID, Secret
    Access Key) and the default region from the integration settings.

    2. **Parameter Parsing:** Extracts the list of Resource IDs (comma-separated)
    and the JSON-formatted tags from the action parameters.

    3. **Tag Preparation:** Converts the provided tags JSON into a list of tag objects
    compatible with the AWS SDK.

    4. **Execution:** Iterates through each provided Resource ID and calls the AWS
    EC2 `create_tags` API to apply the specified tags.

    5. **Result Reporting:** Tracks which resources were successfully tagged and which
    failed, providing a detailed JSON result and an output message for the analyst.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Resources ID | string | Yes | A comma-separated list of AWS resource identifiers
    (e.g., i-1234567890abcdef0) that you want to tag. |

    | Tags | code | Yes | A JSON object containing the tags to be created. Expected
    format: `{"tags": [{"Key": "key1", "Value": "value1"}]}`. Note that keys are case-sensitive.
    |


    ### Additional Notes:

    - This action uses the Boto3 `create_tags` method. If a tag with the same key
    already exists on a resource, its value will be overwritten.

    - Each resource can have a maximum of 50 tags.
