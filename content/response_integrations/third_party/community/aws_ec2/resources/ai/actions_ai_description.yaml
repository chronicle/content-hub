  ai_description: >-
    ### General Description

    Adds or updates inbound (ingress) IP permissions for a specific Amazon EC2 Security
    Group within a VPC. This action allows administrators to programmatically define
    firewall rules, specifying protocols, ports, and CIDR ranges that are permitted
    to access resources associated with the security group.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | string | No | The unique identifier of the security group (e.g.,
    sg-1a2b3c4d) where the inbound permissions will be applied. While marked as not
    mandatory in configuration, the AWS API requires this to identify the target group.
    |

    | IP Permissions | code | No | A JSON-formatted string defining the ingress rules.
    It includes fields like `FromPort`, `ToPort`, `IpProtocol`, and `IpRanges` (e.g.,
    `{"FromPort": 80, "IpProtocol": "tcp", "IpRanges": [{"CidrIp": "1.1.1.1/16"}],
    "ToPort": 80}`). |


    ### Additional Notes

    - This action performs a state-changing operation in AWS by modifying network
    access control lists.

    - The action expects the `IP Permissions` parameter to be a valid JSON string
    representing a single rule or a set of rules as defined by the Boto3 EC2 client
    documentation.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves AWS credentials (Access Key ID, Secret
    Access Key) and the default region from the integration settings.

    2. **Parameter Parsing:** Extracts the `Group ID` and the `IP Permissions` JSON
    string from the action parameters. The JSON string is converted into a Python
    dictionary.

    3. **Manager Initialization:** Initializes the `EC2Manager` using the provided
    AWS credentials and region.

    4. **API Execution:** Calls the AWS EC2 service to authorize the specified ingress
    rules for the target security group.

    5. **Result Handling:** Logs the success or failure of the operation, attaches
    the raw AWS response as a JSON result to the action, and terminates with a status
    message.
