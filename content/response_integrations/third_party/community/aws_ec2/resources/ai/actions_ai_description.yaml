Delete Instance:
  ai_description: >-
    ### General Description

    Deletes (terminates) specific EC2 instances in AWS based on provided instance
    IDs. This action initiates a state change on the external AWS infrastructure to
    permanently shut down and remove the specified virtual machines.


    ### Flow Description

    1. Extracts the provided `Instance Ids` from the action parameters.

    2. Initializes the AWS EC2 client using the integration credentials.

    3. Iterates through the list of instance IDs and calls the AWS EC2 API (`terminate_instances`)
    to delete each instance.

    4. Evaluates the returned state of each instance to verify if it is 'shutting-down'
    or 'terminated'.

    5. Outputs the count of successfully deleted instances and provides the detailed
    AWS response as a JSON result.


    ### Additional Notes

    Deleted instances may remain visible in the AWS console for approximately one
    hour after being terminated. If an instance is in the 'shutting-down' state during
    execution, the action will return an 'In Progress' status.
