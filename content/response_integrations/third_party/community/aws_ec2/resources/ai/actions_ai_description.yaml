      Adds or updates outbound IP permissions (egress rules) for a specific security
      group in AWS EC2.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API request to AWS EC2 (`authorize_security_group_egress`)
      to modify the configuration of a security group. This changes the state of an
      external system, so `can_mutate_external_data` is true. It does not fetch contextual
      data, update internal entities, create insights, or modify alert data.
