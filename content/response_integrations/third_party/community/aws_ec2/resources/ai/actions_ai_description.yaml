Start Instance:
  ai_description: >-
    ### General Description

    Starts one or more specified AWS EC2 instances. This action is used to programmatically
    resume instances that are currently in a stopped state. It provides real-time
    feedback on the transition state (pending/running) and returns the count of successfully
    started instances.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | The instance IDs which you want to start (comma separated). For
    example: instance_id1, instance_id2. | String | Yes |


    ### Additional Notes

    - This action is asynchronous. If an instance is in a 'pending' state, the action
    will return an 'In Progress' status to allow for state transition.

    - The result value represents the total count of instances successfully moved
    to a 'running' state during the execution.


    ### Flow Description

    1. Extract configuration parameters (Access Key, Secret Key, Region).

    2. Extract the 'Instance Ids' action parameter and split it into a list.

    3. Initialize the EC2Manager.

    4. Iterate through each Instance ID and attempt to start it using the AWS SDK.

    5. Evaluate the response: if the state is 'pending', mark the action as 'In Progress';
    if 'running', mark as success.

    6. Aggregate results, including a count of started instances and detailed JSON
    output.
