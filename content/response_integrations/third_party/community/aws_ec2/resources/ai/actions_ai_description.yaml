Stop Instance:
  ai_description: >-
    Stops one or more specified Amazon EC2 instances. This action interacts with the
    AWS EC2 service to transition instances from a running state to a stopped state.
    It supports stopping multiple instances simultaneously via a comma-separated list
    and provides an option to force the shutdown.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | String | Yes | Comma-separated list of AWS EC2 instance IDs to
    be stopped (e.g., i-0123456789abcdef0). |

    | Force Instance To Stop | Boolean | No | If set to true, the instance is forced
    to stop without waiting for file system caches or metadata to be processed. Default
    is false. |


    ### Flow Description

    1. **Credential Retrieval**: Extracts AWS Access Key, Secret Key, and Region from
    the integration configuration.

    2. **Input Parsing**: Parses the provided string of Instance IDs into a list.

    3. **API Execution**: Iterates through the list and calls the AWS `stop_instances`
    API for each identifier.

    4. **State Verification**: Checks the current state of each instance returned
    by the API.

    5. **Status Handling**: If instances are in the 'stopping' state, the action sets
    its status to 'In Progress' for asynchronous tracking. If 'stopped', it marks
    them as successful.

    6. **Result Reporting**: Returns the total count of stopped instances and detailed
    JSON response data for each successful operation.
