Delete Instance:
  ai_description: >-
    ### General Description

    The **Delete Instance** action terminates one or more specified Amazon EC2 instances
    within a designated AWS region. This is a destructive operation that permanently
    removes the instances from the AWS environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Instance Ids** | String | Yes | A comma-separated list of AWS EC2 instance
    identifiers (e.g., `i-1234567890abcdef0, i-0fedcba9876543210`) to be deleted.
    |


    ### Additional Notes

    - Terminated instances remain visible in the AWS console for approximately one
    hour after deletion.

    - The action returns the total count of instances successfully moved to a 'terminated'
    or 'shutting-down' state.

    - This action is marked as asynchronous and can track the progress of the termination
    process.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves AWS credentials (Access Key ID, Secret
    Access Key) and the default region from the integration settings.

    2. **Parameter Parsing:** Extracts the `Instance Ids` string and splits it into
    a list of individual identifiers, stripping any extra whitespace.

    3. **AWS Interaction:** For each instance ID, the action calls the AWS EC2 `terminate_instances`
    API via the `EC2Manager`.

    4. **State Verification:** Evaluates the `CurrentState` returned by the AWS API
    for each instance:
       - If the state is `terminated`, it is logged as a success.
       - If the state is `shutting-down`, the action status is set to `IN_PROGRESS`
    to reflect the ongoing transition.
       - If the instance is in a state that cannot be deleted, an exception is raised
    for that specific instance.
    5. **Result Reporting:** Aggregates the results, provides a summary message to
    the case wall, and returns the count of deleted instances along with detailed
    JSON data for each processed instance.
