  ai_description: >-
    ### General Description

    The **Delete Instance** action terminates specific Amazon EC2 instances within
    an AWS environment. This is a destructive remediation action that permanently
    deletes the specified instances, making them inaccessible. Note that terminated
    instances remain visible in the AWS console for approximately one hour after the
    deletion process begins.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Instance Ids | String (Content) | Yes | A comma-separated list of EC2 instance
    IDs to be deleted (e.g., `i-1234567890abcdef0, i-0987654321fedcba0`). |


    ### Additional Notes

    - This action is asynchronous; if instances are in the "shutting-down" state,
    the action will report as in-progress until the process completes.

    - The result value of the action is the total count of successfully deleted instances.

    - Detailed JSON results for each instance are provided in the action output.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves AWS credentials (Access Key ID, Secret
    Access Key) and the target region from the integration settings.

    2. **Input Parsing:** Splits the provided `Instance Ids` string into a list of
    individual identifiers and strips any whitespace.

    3. **Termination Execution:** Iterates through the list and calls the AWS EC2
    `terminate_instances` API for each ID via the EC2 Manager.

    4. **State Verification:** Monitors the response for each instance to verify if
    the current state is `terminated` or `shutting-down`.

    5. **Result Aggregation:** Collects success/failure details for each instance,
    updates the action log, and returns the count of deleted instances along with
    a detailed JSON report.
