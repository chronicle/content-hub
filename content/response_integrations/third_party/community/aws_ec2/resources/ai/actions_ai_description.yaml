  ai_description: >-
    ### General Description

    The **Find Instance** action retrieves detailed information about specific Amazon
    EC2 instances or a collection of instances based on provided criteria. It is primarily
    used for asset discovery and situational awareness within an AWS environment.
    If no specific instance IDs or filters are provided, the action can return information
    for all instances (subject to the maximum results limit).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Instance Ids** | String | No | A comma-separated list of AWS Instance IDs
    to fetch (e.g., `i-1234567890abcdef0`). If provided, the action focuses on these
    specific resources. |

    | **Filters** | Content (JSON) | No | A JSON-formatted string defining filters
    to narrow down the search (e.g., `{"Name": "instance-type", "Values": ["t2.micro"]}`).
    Default filters for `t2.micro` are often pre-configured. |

    | **Max Results** | String | No | The maximum number of results to return in a
    single execution, ranging from 5 to 1000. |


    ### Flow Description

    1.  **Configuration Extraction:** The action retrieves AWS credentials (Access
    Key ID, Secret Access Key) and the default region from the integration settings.

    2.  **Parameter Parsing:** It extracts the `Instance Ids`, `Filters`, and `Max
    Results` from the action input. If `Filters` are provided, they are parsed from
    a JSON string into a list.

    3.  **Manager Initialization:** An `EC2Manager` instance is created to handle
    communication with the AWS EC2 service via the Boto3 SDK.

    4.  **Data Retrieval:**
        *   If **Instance Ids** are specified: The action iterates through each ID
    and calls the `describe_instances` API to fetch specific metadata.
        *   If **Instance Ids** are NOT specified: The action calls the `describe_instances`
    API using the provided `Filters` and `Max Results` to find matching instances.
    5.  **Result Processing:** The retrieved instance data is aggregated into a JSON
    object.

    6.  **Output:** The action attaches the raw JSON data to the execution result
    and provides a summary message indicating which instances were successfully fetched.


    ### Additional Notes

    *   This action is read-only and does not modify any AWS resources.

    *   If both `Instance Ids` and `Filters` are provided, the AWS API typically applies
    both constraints (logical AND).
