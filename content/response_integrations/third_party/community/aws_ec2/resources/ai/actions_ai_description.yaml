  ai_description: >-
    Adds or updates outbound IP permissions (egress rules) for a specific security
    group in an AWS Virtual Private Cloud (VPC). This action interacts with the AWS
    EC2 service to modify network access controls.


    ### Parameters Description

    * **Group ID** (String, Not Mandatory): The ID of the security group to which
    the outbound IP permissions will be added.

    * **IP Permissions** (Code/JSON, Not Mandatory): The IP permissions to add, formatted
    as a JSON string (e.g., `{"FromPort": 80, "IpProtocol": "tcp", "IpRanges": [{"CidrIp":
    "1.1.1.1/16"}], "ToPort": 80}`).


    ### Flow Description

    1. Extracts the AWS credentials and region from the integration configuration.

    2. Extracts the `Group ID` and `IP Permissions` parameters from the action settings.

    3. Parses the `IP Permissions` JSON string into a Python dictionary.

    4. Calls the AWS EC2 API to authorize the security group egress with the specified
    permissions.

    5. Returns the response metadata as a JSON result and outputs a success or failure
    message to the case wall.
