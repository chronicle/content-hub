Find Instance:
  ai_description: >-
    ### General Description

    The **Find Instance** action retrieves detailed information about one or more
    Amazon EC2 instances from an AWS environment. It allows users to query specific
    instances by their unique IDs or to search for instances based on custom filters
    such as instance type, state, or tags. This action is primarily used for asset
    enrichment, providing visibility into the configuration and status of cloud resources.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Instance Ids** | String | No | A comma-separated list of AWS Instance IDs
    to fetch (e.g., `i-1234567890abcdef0`). If provided, the action fetches details
    for these specific instances. |

    | **Filters** | Content (JSON) | No | A JSON object defining filters for the search.
    Default is `{"Name": "instance-type", "Values": ["t2.micro"]}`. This is used when
    specific IDs are not provided or to further narrow the search. |

    | **Max Results** | String | No | The maximum number of results to return in a
    single call, ranging from 5 to 1000. Defaults to 1000 if not specified. |


    ### Additional Notes

    - If neither **Instance Ids** nor **Filters** are specified, the action will attempt
    to fetch information for all instances in the configured region, up to the limit
    defined by **Max Results**.

    - The **Filters** parameter must be a valid JSON object following the AWS Boto3
    `describe_instances` filter syntax.

    - This action does not run on SecOps entities; it relies entirely on the provided
    input parameters.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves AWS credentials (Access Key
    ID, Secret Access Key) and the Default Region from the integration's configuration.

    2. **Parameter Parsing:** It extracts the provided **Instance Ids**, **Filters**,
    and **Max Results** from the action input. If **Filters** are provided, they are
    parsed from a JSON string into a list.

    3. **Instance Lookup:**
        - **Specific IDs:** If **Instance Ids** are provided, the action iterates
    through each ID and calls the AWS `describe_instances` API to fetch specific details
    for each.
        - **Bulk/Filtered Query:** If no **Instance Ids** are provided, the action
    performs a single bulk query using the provided **Filters** and **Max Results**.
    4. **Result Processing:** The retrieved instance metadata is aggregated into a
    JSON result object. The action tracks which instances were successfully found
    and which (if any) failed to be retrieved.

    5. **Output:** The action returns the aggregated JSON data to the SOAR platform
    and provides a summary message indicating the success or failure of the operation.
