    \ Flow Description\n1. **Initialization**: The action extracts AWS credentials\
    \ (Access Key, Secret Key, Region) and action parameters (Image ID, Instance Type,\
    \ Max/Min Count, Security Group IDs).\n2. **Instance Creation**: It initializes\
    \ the `EC2Manager` and calls the AWS `run_instances` API to initiate the creation\
    \ of the requested EC2 instances.\n3. **Status Check (First Run)**: \n   - If\
    \ the instance state is 'pending', the action sets the execution status to 'In\
    \ Progress' and stores the instance IDs in the `additional_data` field for subsequent\
    \ polling.\n   - If the instance state is 'running', the action completes successfully\
    \ and returns the instance details.\n4. **Status Check (Subsequent Runs)**: If\
    \ the action is triggered again (polling), it uses the stored instance IDs to\
    \ call `describe_instances` to check the current status of the instances.\n5.\
    \ **Completion**: Once the instances reach the 'running' state, the action completes\
    \ and returns the instance details in the result JSON.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Image ID | string | No | The AMI ID to create the new instance from (e.g., ami-12345).\
    \ |\n| Instance Type | string | No | The hardware configuration for the instance\
    \ (e.g., m1.small). |\n| Max Count | string | Yes | The maximum number of instances\
    \ to create. |\n| Min Count | string | Yes | The minimum number of instances to\
    \ create. |\n| Security Group ID | string | No | Comma-separated IDs of security\
    \ groups to assign to the instance (e.g., sg-12345,sg-6789). |\n\n### Additional\
    \ Notes\n- This action performs a state-changing operation on an external AWS\
    \ environment.\n- The action is designed to be asynchronous; if instances are\
    \ not immediately 'running', it will require subsequent runs to verify the final\
    \ state."
