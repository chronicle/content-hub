Create Instance:
  ai_description: >-
    ### General Description

    Creates new Amazon EC2 instances for a specific Amazon Machine Image (AMI) using
    AWS EC2.


    ### Flow Description

    1. Extracts the provided Image ID, Instance Type, Min/Max Count, and Security
    Group IDs from the action parameters.

    2. Initializes the AWS EC2 client.

    3. Makes an API call to AWS EC2 (`run_instances`) to create the requested instances.

    4. Checks the state of the newly created instances. If they are in a 'pending'
    state, the action enters an asynchronous loop, periodically checking their status
    via the `describe_instances` API call.

    5. Once the instances reach the 'running' state, the action completes and returns
    the instance details in a JSON result.


    ### Additional Notes

    This is an asynchronous action that will continue to run until the instances are
    fully provisioned and running.
