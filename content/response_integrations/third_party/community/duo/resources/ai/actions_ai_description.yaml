Get Trust Monitor Events:
  ai_description: >-
    ### General Description

    Retrieves DUO Trust Monitor events from the DUO platform for a specified lookback
    period. This action allows analysts to pull historical security events directly
    from DUO to support investigation and monitoring workflows.


    ### Flow Description

    1. Extracts DUO API credentials (API Hostname, Admin Secret Key, and Admin Integration
    Key) from the integration configuration.

    2. Extracts the 'Number Days Back' parameter to define the time range for the
    query.

    3. Calculates the start and end timestamps based on the current time and the provided
    number of days.

    4. Initializes the DUO Admin API client using the extracted credentials.

    5. Calls the `get_trust_monitor_events_by_offset` API method to retrieve events
    within the calculated time range.

    6. Adds the retrieved events to the action results as a JSON object.


    ### Additional Notes

    This action requires valid DUO Admin API credentials configured in the integration
    settings. It performs a read-only operation and does not modify any data in DUO
    or the SOAR platform.
