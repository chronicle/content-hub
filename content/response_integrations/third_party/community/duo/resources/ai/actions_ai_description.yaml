Get Trust Monitor Events:
  ai_description: >-
    ### General Description

    This action retrieves Trust Monitor events from DUO Security for a specified lookback
    period. It is designed to provide visibility into security events and anomalies
    detected by DUO's Trust Monitor feature, allowing analysts to review historical
    event data within Google SecOps.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Number Days Back | String/Number | Yes | The number of days prior to the current
    time from which to start fetching events. Defaults to '1'. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the DUO API Hostname, Admin
    Secret Key, and Admin Integration Key from the integration settings.

    2. **Parameter Processing**: It extracts the 'Number Days Back' parameter and
    calculates the start (mintime) and end (maxtime) timestamps in milliseconds.

    3. **API Interaction**: Using the DUO Python SDK (`duo_client`), the action authenticates
    to the Admin API and calls the `get_trust_monitor_events_by_offset` method.

    4. **Data Output**: The retrieved events are formatted into a JSON object and
    added to the action's execution results for use in subsequent playbook steps.


    ### Additional Notes

    - This action does not process specific entities; it performs a global fetch of
    events based on the time range provided.

    - Ensure the DUO Admin API keys have the necessary permissions to access Trust
    Monitor data.
