Get Trust Monitor Events:
  ai_description: >-
    ### General Description

    Retrieves DUO Trust Monitor events from the specified number of days in the past
    using the DUO Admin API. This action fetches historical security events and telemetry
    data for analysis within the SecOps platform.


    ### Flow Description

    1. Extracts the `Number Days Back` parameter provided by the user.

    2. Calculates the start (`mintime`) and end (`maxtime`) timestamps based on the
    current time and the specified number of days back.

    3. Authenticates with the DUO Admin API using the integration's configured credentials
    (API Hostname, Admin Secret Key, Admin Integration Key).

    4. Makes an API call (`get_trust_monitor_events_by_offset`) to fetch the Trust
    Monitor events within the calculated time range.

    5. Returns the fetched events as a JSON result to the SecOps platform.


    ### Additional Notes

    Requires DUO Admin API keys to be properly configured in the integration settings.
