  ai_description: >-
    ### General Description

    This action retrieves authentication logs and user data from DUO MFA for a specified
    user. It aggregates authentication sources (such as IP addresses, operating systems,
    and applications) and filters them based on a provided success threshold to help
    identify known-good authentication patterns.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the DUO API hostname, Admin
    Secret Key, and Admin Integration Key from the integration configuration.

    2. **Parameter Extraction**: It extracts the `Username`, `Number Days Back`, and
    `Authentication Threshold` from the action parameters.

    3. **Authentication**: It initializes the DUO Admin API client using the extracted
    credentials.

    4. **User Retrieval**: It queries the DUO API to find the `user_id` associated
    with the provided `Username`.

    5. **Log Retrieval**: It fetches authentication logs for the identified user within
    the specified timeframe (calculated from `Number Days Back`).

    6. **Data Aggregation**: It iterates through the logs, counting occurrences of
    various authentication attributes (IP, state, OS, application, device, factor).

    7. **Filtering**: It filters the aggregated counts, removing any sources that
    do not meet the `Authentication Threshold`.

    8. **Result Output**: It compiles the user data, raw logs, and aggregated statistics
    into a JSON object and adds it to the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Authentication Threshold | string | Yes | Number of successful authentications
    required to consider an authentication source as a known safe entity. |

    | Number Days Back | string | Yes | Number of days back to obtain authentication
    logs from. |

    | Username | string | No | The username to retrieve logs for. |


    ### Additional Notes

    If the `Username` is not provided, the action will fail to retrieve user-specific
    logs. The action relies on the DUO Admin API and may implement a retry mechanism
    (sleep) if rate limiting is encountered.
