Ping:
  ai_description: >-
    ### General Description

    Verifies the connectivity and validity of the DUO Auth API credentials by performing
    a health check against the DUO service.


    ### Flow Description

    1. The action extracts the `API Hostname`, `Auth Secret Key`, and `Auth Integration
    Key` from the integration configuration.

    2. It initializes the `duo_client.Auth` client using these credentials.

    3. It calls the `auth_api.check()` method to verify the connection and signature
    generation.

    4. The action returns a success message if the check is successful, or a failure
    message if an exception occurs.


    ### Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    mutation.
