Ping:
  ai_description: >-
    ### General Description

    Verifies the DUO Auth API integration and secret keys by pinging the `/check`
    endpoint. This action ensures that the provided credentials are valid and that
    the signature is being generated properly.


    ### Flow Description

    1. Extracts the API Hostname, Auth Secret Key, and Auth Integration Key from the
    integration configuration.

    2. Initializes the DUO Auth client using the provided credentials.

    3. Calls the `/check` endpoint via the DUO SDK (`auth_api.check()`) to validate
    the connection.

    4. Returns a success message if the credentials are valid, or an error message
    if the connection fails.


    ### Additional Notes

    This action is primarily used for testing connectivity and credential validity.
    It does not process any entities or mutate any data.
