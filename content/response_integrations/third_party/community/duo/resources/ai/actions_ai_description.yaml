Get Users by Name:
  ai_description: >-
    ### General Description

    Queries the DUO Admin API to retrieve detailed user, authentication, and device
    information for a specified username. This action is useful for gathering context
    about a user's multi-factor authentication (MFA) status and associated devices
    directly from DUO.


    ### Flow Description

    1. Extracts the target `Username` from the action parameters.

    2. Initializes the DUO Admin API client using the integration's configured credentials
    (API Hostname, Admin Secret Key, and Admin Integration Key).

    3. Makes an API call to the DUO `get_users_by_name` endpoint via the DUO Python
    SDK to fetch the user's data.

    4. Parses the API response to extract the `user_id` and compiles the full user
    data.

    5. Returns the compiled user information as a JSON result to the SecOps platform.


    ### Additional Notes

    - This action requires DUO Admin API keys to be properly configured in the integration
    settings.

    - The action does not operate on SecOps entities; it relies strictly on the provided
    `Username` parameter.
