Get Users by Name:
  ai_description: >-
    ### General Description

    Queries the DUO Admin API to retrieve user information, including authentication
    and device data, for a specified username. This action is designed to provide
    security analysts with contextual information about a user within the DUO environment.


    ### Flow Description

    1. Extracts the required DUO API configuration parameters (API Hostname, Admin
    Secret Key, Admin Integration Key) from the integration settings.

    2. Extracts the target `Username` parameter provided by the user.

    3. Initializes the `duo_client.Admin` client using the retrieved credentials.

    4. Executes the `get_users_by_name` method via the DUO Admin API to fetch the
    user's profile and associated data.

    5. Parses the response to extract the `user_id` and the full user data object.

    6. Adds the retrieved user information to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires valid DUO Admin API credentials. It is a read-only operation
    and does not modify any data in DUO or the SOAR platform.
