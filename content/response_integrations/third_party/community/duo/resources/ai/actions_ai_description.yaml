  ai_description: >-
    ### General Description

    The **Get Authentication Logs for User** action retrieves detailed user profile
    information and historical authentication logs from DUO MFA for a specific username.
    It is designed to provide security analysts with visibility into a user's authentication
    behavior, identifying common source IPs, devices, and authentication factors used
    over a configurable period. The action also calculates frequency counts for various
    authentication attributes and filters them against a threshold to help distinguish
    between routine and anomalous access patterns.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Username | String | No | The DUO username to query. Note: While marked as non-mandatory
    in configuration, the action requires this value to successfully identify a user
    and retrieve logs. |

    | Number Days Back | String | Yes | The number of days prior to the current time
    to include in the log search (e.g., '1' for the last 24 hours). |

    | Authentication Threshold | String | Yes | The minimum number of successful authentications
    required for a specific source (IP, OS, Device, etc.) to be included in the filtered
    'known' summary results. |


    ### Flow Description

    1. **Authentication**: Initializes a connection to the DUO Admin API using the
    provided API Hostname, Integration Key, and Secret Key.

    2. **User Lookup**: Performs a lookup to retrieve the internal DUO `user_id` associated
    with the provided `Username` parameter.

    3. **Log Retrieval**: Queries the DUO authentication logs for the identified user,
    spanning from the calculated 'Days Back' timestamp to the current time.

    4. **Data Aggregation**: Processes the retrieved logs to count occurrences of
    successful authentication attempts by IP address, geographic state, operating
    system, application, endpoint key, authentication device, and factor.

    5. **Threshold Filtering**: Evaluates the aggregated counts against the `Authentication
    Threshold`. Attributes that do not meet the minimum count are removed from the
    summary dictionaries to highlight frequent/trusted sources.

    6. **Result Output**: Returns a comprehensive JSON object containing the raw user
    metadata, the full authentication log history, and the filtered frequency summaries.


    ### Additional Notes

    - This action does not automatically iterate over entities in the SecOps case;
    it operates strictly on the provided `Username` parameter.

    - The script includes built-in retry logic (60-second wait) to handle potential
    DUO API rate-limiting errors.
