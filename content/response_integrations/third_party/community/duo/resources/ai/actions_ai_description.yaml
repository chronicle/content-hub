  ai_description: >-
    ### General Description

    Retrieves detailed user information from DUO MFA using a specific username. This
    action is designed to query the DUO Admin API to obtain the `user_id`, authentication
    status, and device data associated with a specific identity. It is primarily used
    for identity verification and gathering context during security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Username | String | Yes | The specific username to query within the DUO Admin
    API. |


    ### Flow Description

    1. **Authentication**: Initializes the DUO Admin API client using the configured
    API Hostname, Admin Secret Key, and Admin Integration Key.

    2. **Parameter Extraction**: Retrieves the target `Username` from the action input
    parameters.

    3. **API Request**: Executes a call to the DUO `get_users_by_name` endpoint using
    the DUO Python SDK.

    4. **Data Processing**: Iterates through the returned user data to identify the
    unique `user_id` and aggregates the full response.

    5. **Output**: Returns a structured JSON object containing the username, user
    ID, and the complete user data retrieved from DUO.


    ### Additional Notes

    This action does not process entities from the SecOps case automatically. It operates
    strictly on the `Username` provided as a manual or playbook-driven parameter.
