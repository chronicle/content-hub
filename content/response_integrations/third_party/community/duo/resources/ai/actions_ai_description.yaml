Get Authentication Logs for User:
  ai_description: >-
    ### General Description

    Retrieves user data and authentication logs for a specified user from DUO MFA
    over a defined number of days. It aggregates authentication sources (such as IP
    addresses, operating systems, applications, and devices) and filters them based
    on a threshold to help identify normally seen, known-safe authentication sources.


    ### Flow Description

    1. Extracts the `Username`, `Number Days Back`, and `Authentication Threshold`
    parameters from the action configuration.

    2. Calculates the timestamp range for the requested number of days back from the
    current time.

    3. Makes an API call to DUO (`get_users_by_name`) to retrieve the target user's
    profile and internal DUO user ID.

    4. Makes a subsequent API call to DUO (`get_authentication_log`) to fetch the
    user's authentication logs within the calculated timeframe.

    5. Parses the retrieved logs to count occurrences of access IPs, states, OS, applications,
    endpoint keys, auth devices, and factors for successful authentications.

    6. Filters the aggregated counts against the provided authentication threshold,
    removing sources that do not meet the minimum count.

    7. Returns the final aggregated data, user profile, and raw logs as a JSON result.


    ### Additional Notes

    - Requires DUO Admin API keys configured in the integration.

    - The script includes a built-in retry mechanism: if an API call fails (e.g.,
    due to DUO rate limiting), it will pause for 60 seconds and attempt the call again.
  ai_short_description: >-
    Retrieves user data and authentication logs for a specified user from DUO MFA,
    aggregating and filtering authentication sources based on a threshold to identify
    known safe entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making GET requests to the DUO Admin API to retrieve
      user profiles and authentication logs. It does not perform any state-changing
      operations (POST/PUT/DELETE) on external systems, so it cannot mutate external
      data. It also does not call any SDK methods to update entities, create insights,
      modify alert data, or create case comments, meaning it does not mutate internal
      data.
