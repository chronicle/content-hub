  ai_description: >-
    ### General Description

    The **Get Trust Monitor Events** action retrieves Trust Monitor events from DUO
    Security for a specified historical period. This action is designed to pull security
    telemetry related to trust assessments, providing visibility into DUO's trust
    monitoring logs for auditing or investigation purposes.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Number Days Back | String | Yes | The number of days in the past from the current
    time to retrieve events from. The value is converted to an integer and used to
    calculate the start timestamp. |


    ### Flow Description

    1. **Credential Retrieval:** The action extracts the DUO API Hostname, Admin Secret
    Key, and Admin Integration Key from the integration configuration.

    2. **Time Calculation:** It takes the 'Number Days Back' input and calculates
    a millisecond-based timestamp range starting from X days ago up to the current
    time.

    3. **API Authentication:** It initializes the DUO Admin API client using the provided
    credentials.

    4. **Data Retrieval:** The action calls the DUO SDK method `get_trust_monitor_events_by_offset`
    using the calculated time range to fetch the events.

    5. **Output Generation:** The retrieved events are packaged into a JSON result
    and returned to the Google SecOps platform.


    ### Additional Notes

    This action does not process or filter specific entities (like Users or IPs) from
    the case; it performs a global search for events within the DUO environment based
    solely on the time parameter.
