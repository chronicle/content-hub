Get Authentication Logs for User:
  ai_description: >-
    ### General Description

    Retrieves user data and authentication logs from DUO for a specified user over
    a defined time range. This action aggregates authentication events and calculates
    frequency counts for various authentication attributes (such as IP addresses,
    locations, operating systems, and applications) to help identify potentially anomalous
    authentication sources based on a configurable threshold.


    ### Flow Description

    1. The action extracts the `Username`, `Number Days Back`, and `Authentication
    Threshold` parameters.

    2. It authenticates with the DUO Admin API using the provided configuration credentials.

    3. It calls the `admin_api.get_users_by_name` method to retrieve the `user_id`
    associated with the specified username.

    4. It calculates the time range based on the `Number Days Back` parameter.

    5. It calls the `admin_api.get_authentication_log` method to fetch authentication
    logs for the user within the calculated time range.

    6. It processes the retrieved logs to count occurrences of various authentication
    attributes (e.g., IP, state, OS, application, device).

    7. It filters these attributes based on the `Authentication Threshold` to identify
    frequently seen sources.

    8. It outputs the aggregated results as a JSON object using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires valid DUO Admin API credentials (API Hostname, Admin Secret
    Key, and Admin Integration Key) to be configured in the integration settings.
    It does not perform any state-changing operations on the DUO platform or the SOAR
    case.
  ai_short_description: >-
    Retrieves user data and authentication logs from DUO for a specific user, providing
    aggregated insights on authentication sources.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
