Get Authentication Logs for User:
  ai_description: >-
    Retrieves user profile information and authentication history from Duo Security
    for a specific username. This action queries the Duo Admin API to fetch logs over
    a specified lookback period and performs a frequency analysis on successful authentication
    attempts. It identifies common access patterns such as IP addresses, operating
    systems, and devices that meet a user-defined 'Authentication Threshold'.


    ### Flow Description:

    1. **Authentication**: Connects to the Duo Admin API using the configured API
    Hostname, Secret Key, and Integration Key.

    2. **User Lookup**: Searches for the Duo `user_id` corresponding to the provided
    `Username` parameter.

    3. **Log Retrieval**: Fetches authentication logs for the identified user within
    the timeframe defined by the `Number Days Back` parameter.

    4. **Pattern Analysis**: Iterates through successful authentication logs to count
    occurrences of access IPs, geographic states, OS versions, applications, and hardware
    devices.

    5. **Threshold Filtering**: Filters the aggregated counts, retaining only those
    sources that meet or exceed the `Authentication Threshold` value.

    6. **Output Generation**: Returns a JSON object containing the user's Duo profile,
    raw authentication logs, and the filtered frequency statistics.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Authentication Threshold | String | Yes | The minimum number of successful authentications
    required for a source (e.g., IP, device) to be included in the summary results.
    Default is 2. |

    | Number Days Back | String | Yes | The number of days prior to the current time
    to search for authentication logs. Default is 1. |

    | Username | String | No | The Duo username for which to retrieve data. |


    ### Additional Notes:

    - This action does not process entities from the Google SecOps case; it relies
    entirely on the `Username` parameter.

    - If the `Username` is not found in Duo or not provided, the action will report
    that no username was provided.
