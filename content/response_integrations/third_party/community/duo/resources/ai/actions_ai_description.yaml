  ai_description: >-
    ### General Description

    Verifies the DUO Auth API integration and secret keys by calling the `/check`
    endpoint. This action ensures that the configured credentials are valid and that
    the API signature is being generated properly, acting as a connectivity test (Ping)
    for the integration.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration-level configuration parameters (API Hostname, Auth Secret Key,
    Auth Integration Key).


    ### Flow Description

    1. Extracts the `API Hostname`, `Auth Secret Key`, and `Auth Integration Key`
    from the DUO integration configuration.

    2. Initiates a connection to the DUO API using the extracted credentials.

    3. Calls the `/check` endpoint to verify the validity of the credentials.

    4. Returns a success message and a `True` result if the connection is successful,
    or an error message and a `False` result if the connection fails.
