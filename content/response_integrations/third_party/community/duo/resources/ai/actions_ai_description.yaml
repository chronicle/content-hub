Get Users by Name:
  ai_description: "### General Description\nThis action queries the DUO Admin API\
    \ to retrieve detailed information about a specific user based on a provided username.\
    \ It is designed to fetch contextual data such as user IDs, authentication history,\
    \ and associated device information from the DUO MFA platform. This information\
    \ is typically used for investigation and identity verification during security\
    \ incidents.\n\n### Parameters Description\n| Parameter Name | Type | Mandatory\
    \ | Description | \n| :--- | :--- | :--- | :--- |\n| Username | string | Yes |\
    \ The specific DUO username for which to retrieve account and device data. |\n\
    \n### Flow Description\n1. **Configuration Extraction**: The action retrieves\
    \ the DUO API Hostname, Admin Secret Key, and Admin Integration Key from the integration's\
    \ configuration settings.\n2. **Parameter Extraction**: The action extracts the\
    \ `Username` provided by the user or playbook.\n3. **API Initialization**: It\
    \ initializes the DUO Admin API client using the provided credentials and hostname.\n\
    4. **Data Retrieval**: The action calls the `get_users_by_name` method from the\
    \ DUO SDK to fetch all data associated with the specified username.\n5. **Result\
    \ Processing**: It extracts the `user_id` from the response and packages the full\
    \ user data into a structured JSON format.\n6. **Output**: The results are added\
    \ to the action's JSON output for use in subsequent playbook steps.\n\n### Additional\
    \ Notes\nThis action does not automatically iterate over entities in a case; it\
    \ relies strictly on the `Username` parameter provided in the action configuration."
