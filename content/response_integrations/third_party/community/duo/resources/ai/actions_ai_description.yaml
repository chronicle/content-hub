  ai_description: >-
    Queries the DUO Admin API to retrieve user information for a specified username.
    This action fetches authentication and device data associated with the user from
    the DUO platform and returns it as a JSON result.


    ### Flow Description

    1. Extract configuration parameters (API Hostname, Admin Secret Key, Admin Integration
    Key) from the integration settings.

    2. Extract the `Username` parameter provided by the user.

    3. Initialize the DUO Admin API client using the extracted credentials.

    4. Call the `get_users_by_name` method to fetch user data from the DUO platform.

    5. Format the retrieved user data into a JSON structure and add it to the action
    result using `add_result_json`.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Username | string | Yes | The username to query in the DUO platform. |


    ### Additional Notes

    This action requires valid DUO Admin API credentials (API Hostname, Admin Secret
    Key, and Admin Integration Key) to be configured in the integration settings for
    successful execution.
