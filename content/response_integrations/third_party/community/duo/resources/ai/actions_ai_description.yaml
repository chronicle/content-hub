  ai_description: >-
    ### General Description

    Queries the DUO Admin API to retrieve detailed information, authentication data,
    and device data for a specified username. This action is useful for gathering
    context about a user's multi-factor authentication (MFA) status and associated
    devices directly from DUO.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Username | String | Yes | The target username to obtain data on. Default value
    is 'admin'. |


    ### Flow Description

    1. Extracts the DUO API credentials (API Hostname, Admin Secret Key, Admin Integration
    Key) from the integration configuration.

    2. Retrieves the `Username` parameter provided by the user or playbook.

    3. Initializes the DUO Admin API client using the extracted credentials.

    4. Calls the `get_users_by_name` endpoint to fetch the user's data.

    5. Parses the response to extract the `user_id` and compiles the full user data
    into a JSON object.

    6. Returns the compiled data as a JSON result to the SecOps platform.
