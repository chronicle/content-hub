  ai_description: >-
    ### General Description

    Retrieves user data and authentication logs for a specified user from DUO over
    a defined number of days. It aggregates successful authentication sources (such
    as IP address, OS, application, and device) and filters them based on a provided
    threshold to help identify potentially safe or known authentication sources.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Authentication Threshold | String (Integer) | Yes | The minimum number of successful
    authentications required for a source (e.g., IP, device) to be included in the
    filtered results. Default is 2. |

    | Number Days Back | String (Integer) | Yes | The number of days in the past from
    the current time to retrieve authentication logs. Default is 1. |

    | Username | String | No | The username of the target user to retrieve logs for.
    **Note:** While marked as optional in the configuration, the script requires a
    valid username to successfully fetch user data and logs. |


    ### Flow Description

    1. Extracts the provided parameters and calculates the time range (current time
    minus `Number Days Back`).

    2. Authenticates with the DUO Admin API using the configured integration credentials.

    3. Fetches the user's details using the provided `Username` to obtain their internal
    DUO user ID.

    4. Retrieves the authentication logs for the identified user ID within the calculated
    time range.

    5. Parses the logs to count successful authentications, grouping them by IP address,
    state, OS, application, endpoint key, and device.

    6. Filters these counts, retaining only the sources that meet or exceed the `Authentication
    Threshold`.

    7. Returns the aggregated counts, user data, and raw authentication logs as a
    JSON result.
