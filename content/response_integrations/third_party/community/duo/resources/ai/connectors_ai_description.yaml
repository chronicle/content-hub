DUO - Trust Monitor Connector:
  ai_description: >-
    ### General Description

    The DUO Trust Monitor Connector integrates with the Cisco Duo Admin API to ingest
    Trust Monitor events into Google SecOps. Duo Trust Monitor uses machine learning
    to identify anomalous authentication patterns and potential security risks. This
    connector automates the retrieval of these security events, transforming them
    into actionable cases for security analysts to investigate within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the current script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). Default is 'event_name'. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. Default is 'device_product'. |

    | Days Back | Integer | Yes | The maximum number of days back to retrieve data
    from. |

    | API Hostname | String | Yes | API hostname for your Duo tenant (e.g., api-XXXXXXXX.duosecurity.com).
    |

    | Admin Secret Key | Password | Yes | DUO Admin API Secret Key used for authentication.
    |

    | Admin Integration Key | Password | Yes | DUO Admin API Integration Key used
    for authentication. |


    ### Flow Description

    1. **Initialization**: The connector retrieves configuration parameters, including
    API credentials, the Duo hostname, and the lookback window defined by 'Days Back'.

    2. **Time Range Calculation**: It calculates the start and end timestamps for
    the query based on the current time and the configured 'Days Back' value.

    3. **API Connection**: The connector establishes a connection to the Duo Admin
    API using the provided Integration Key and Secret Key.

    4. **Data Retrieval**: It queries the Duo Trust Monitor endpoint to fetch all
    security events that occurred within the calculated time range.

    5. **Data Transformation**: For each event found, the connector flattens the nested
    JSON data structure to ensure all metadata is accessible within the SOAR environment.

    6. **Case Creation**: The connector maps the Duo event data (using the transaction
    ID as a unique identifier) to the Google SecOps CaseInfo model, setting a default
    priority of Medium (60).

    7. **Ingestion**: The processed alerts are packaged and ingested into Google SecOps
    as new cases.
