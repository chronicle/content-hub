DUO - Trust Monitor Connector:
  ai_description: >-
    ### General Description

    The DUO - Trust Monitor Connector integrates Google SecOps with the Cisco Duo
    Security platform to ingest Trust Monitor events. These events provide visibility
    into authentication anomalies and security-relevant activities within the Duo
    environment. By fetching this data, the connector enables security teams to centralize
    monitoring and automate incident response for potential authentication threats
    or policy violations directly within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Days Back | Integer | Yes | The maximum number of days back to retrieve data
    from. |

    | API Hostname | String | Yes | API hostname for your Duo tenant (e.g., api-XXXXXXXX.duosecurity.com).
    |

    | Admin Secret Key | Password | Yes | DUO Admin API Secret Key. |

    | Admin Integration Key | Password | Yes | DUO Admin API Integration Key. |


    ### Flow Description

    1. The connector initializes the connection to the Duo Admin API using the provided
    API Hostname, Integration Key, and Secret Key.

    2. It calculates the time range based on the "Days Back" parameter to query for
    recent Trust Monitor events.

    3. It calls the `get_trust_monitor_events_by_offset` method to fetch events from
    the Duo platform.

    4. For each retrieved event, the connector flattens the nested JSON data structure
    to ensure compatibility with SOAR event fields.

    5. It maps the event data (such as user, timestamp, and event type) into a `CaseInfo`
    object.

    6. The connector assigns a default priority of "Medium" (60) to the case and ingests
    the alert into the SOAR platform for further investigation.
