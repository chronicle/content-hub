DUO - Trust Monitor Connector:
  ai_description: >-
    ### General Description

    The DUO - Trust Monitor Connector integrates with the Duo Security Admin API to
    monitor and ingest Trust Monitor events. It retrieves security events from the
    specified timeframe, maps them into structured cases, and ingests them into Google
    SecOps for further investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | Days Back | Integer | Yes | The maximum number of days back to retrieve data
    from. |

    | API Hostname | String | Yes | API hostname for your tenant (e.g., api-XXXXXXXX.duosecurity.com).
    |

    | Admin Secret Key | Password | Yes | DUO Admin API Secret Key. |

    | Admin Integration Key | Password | Yes | DUO Admin API Integration Key. |


    ### Flow Description

    1. The connector initializes the connection to the Duo Security Admin API using
    the provided API Hostname, Integration Key, and Secret Key.

    2. It calculates the time range based on the configured 'Days Back' parameter.

    3. It queries the Duo Trust Monitor API to fetch events that occurred within the
    specified timeframe.

    4. For each retrieved event, the connector flattens the nested event data into
    a structured format.

    5. It maps the event details (such as user, timestamp, and event type) into a
    Google SecOps CaseInfo object.

    6. Finally, it packages the created alerts and returns them to the SOAR platform
    for ingestion.
