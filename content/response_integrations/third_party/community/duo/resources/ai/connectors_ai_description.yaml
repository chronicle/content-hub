DUO - Trust Monitor Connector:
  ai_description: >-
    ### General Description


    The **DUO - Trust Monitor Connector** integrates with the Cisco Duo Admin API
    to ingest security events identified by Duo Trust Monitor. Trust Monitor uses
    machine learning to detect anomalous authentication behavior and potential security
    risks within your Duo environment. This connector fetches these events and transforms
    them into cases within Google SecOps for centralized monitoring and incident response.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process running the script. Default is 30. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). Default is 'event_name'. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. Default is 'device_product'. |

    | Days Back | Integer | Yes | The maximum number of days back to retrieve data
    from. |

    | API Hostname | String | Yes | The API hostname for your Duo tenant (e.g., api-XXXXXXXX.duosecurity.com).
    |

    | Admin Secret Key | Password | Yes | The Duo Admin API Secret Key used for authentication.
    |

    | Admin Integration Key | Password | Yes | The Duo Admin API Integration Key used
    for authentication. |


    ### Flow Description


    1.  **Authentication**: The connector establishes a connection to the Duo Admin
    API using the provided API Hostname, Integration Key, and Secret Key.

    2.  **Time Window Calculation**: It determines the ingestion time window by calculating
    the difference between the current time and the number of days specified in the
    'Days Back' parameter.

    3.  **Data Retrieval**: The connector calls the Duo `get_trust_monitor_events_by_offset`
    endpoint to retrieve all security events that occurred within the calculated time
    window.

    4.  **Event Flattening**: For each retrieved event, the connector flattens the
    nested JSON structure into a key-value format suitable for Google SecOps ingestion.

    5.  **Case Mapping**: Each Trust Monitor event is mapped to a Google SecOps Case.
    The connector uses the Duo transaction ID (`txid`) as the unique identifier and
    sets a default priority of Medium (60).

    6.  **Ingestion**: The mapped cases, containing detailed event data such as the
    surfaced authentication details and user information, are returned to the Google
    SecOps platform.
