product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Duo integration provides visibility into authentication logs and Trust Monitor
    events, which are ingested into the SOAR platform via the Trust Monitor Connector.
    This aligns with the SIEM category, as it enables monitoring of authentication
    anomalies and security-relevant activities. The 'Get Users by Name' action retrieves
    user metadata, which qualifies as Asset Inventory enrichment. The integration
    does not provide EDR, Network Security, or IAM management capabilities (such as
    suspending accounts or resetting passwords) based on the provided action list,
    so those categories are marked false.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
