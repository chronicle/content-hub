product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Duo integration is primarily an Identity and Access Management (IAM) solution,
    as it provides visibility into user authentication logs, user metadata, and MFA
    events, which are essential for investigating suspicious user behavior. Additionally,
    it qualifies as a SIEM integration because the 'DUO - Trust Monitor Connector'
    ingests security events into Google SecOps, and the available actions allow analysts
    to search for and retrieve authentication activity related to users, aligning
    with the SIEM capability of finding activity related to users across logs. It
    does not meet the criteria for EDR, Network Security, Cloud Security, or other
    categories as it does not manage endpoints, network traffic, or cloud infrastructure
    resources.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
