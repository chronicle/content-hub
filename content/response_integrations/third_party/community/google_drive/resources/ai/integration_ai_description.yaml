  reasoning: >-
    The Google Drive integration provides utility actions for managing files, such
    as adding permissions, deleting files, downloading content, and retrieving metadata.
    It does not perform SIEM, EDR, or Network Security functions. It is not a Threat
    Intelligence source for indicator reputation. It does not manage user identity
    lifecycles (IAM) or email security workflows. It does not interact with cloud
    infrastructure (GCP/AWS/Azure) for configuration or vulnerability management.
    It does not perform ITSM or Asset Inventory functions, nor does it facilitate
    collaboration via messaging platforms. Therefore, it does not fit into any of
    the provided security product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
