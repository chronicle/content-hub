Upload File From Path:
  ai_description: >-
    Uploads a file from a specified local path to Google Drive. This action is designed
    to move files, such as forensic artifacts or reports, from the local SOAR environment
    to cloud storage. It also supports automated sharing by granting 'writer' permissions
    to a list of specified email addresses.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The local path of the file to be uploaded to Google
    Drive (e.g., `/tmp/report.pdf`). |

    | Share with emails | String | Yes | A semicolon-separated list of email addresses
    to grant 'writer' access to the uploaded file. |


    ### Flow

    1. **Setup**: Initializes the Google Drive manager using the provided service
    account credentials.

    2. **Upload**: Reads the file from the local `File Path` and uploads it to Google
    Drive using the file's original name.

    3. **Permissions**: Parses the `Share with emails` string and, for each email
    address, creates a 'writer' permission for the uploaded file.

    4. **Output**: Returns the full metadata of the created file, including the unique
    File ID, and sets the File ID as the action's result value.
