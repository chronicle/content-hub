Add Permission:
  ai_description: >-
    ### General Description

    Adds specific permissions (Owner, Writer, or Reader) to a file stored in Google
    Drive for one or more users.


    ### Flow Description

    1. Extracts the file ID, role, target email addresses, and notification preference
    from the action parameters.

    2. Initializes the Google Drive API client using the provided credentials.

    3. Iterates through the provided email addresses.

    4. Makes an API call to Google Drive (`permissions().create`) to grant the specified
    role to each email address for the target file.

    5. Returns a success message indicating the permissions were granted.


    ### Additional Notes

    The action can optionally send an email notification to the users being granted
    access if the `Should send notification` parameter is enabled.
  ai_short_description: >-
    Grants specific permissions (Owner, Writer, or Reader) to a file in Google Drive
    for one or more specified email addresses.
