    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds user permissions to a specific file in Google Drive.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Google Drive API to create a new permission
      for a file, which mutates external data. It does not fetch contextual data,
      mutate internal SecOps data, update entities, or create insights.
