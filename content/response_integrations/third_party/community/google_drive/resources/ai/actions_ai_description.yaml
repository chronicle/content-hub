  ai_description: >-
    ### General Description

    The **Upload File From Base64** action enables the uploading of files to Google
    Drive by providing the file content as a Base64 encoded string. This action is
    useful for programmatically storing reports, logs, or captured artifacts directly
    into a cloud storage environment. It also includes functionality to automatically
    share the uploaded file with a list of specified email addresses, granting them
    'writer' access.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Name** | String | Yes | The desired name for the file in Google Drive,
    including the extension (e.g., 'evidence.txt'). |

    | **Base64 String** | String | Yes | The file content encoded in Base64 format.
    |

    | **Share with emails** | String | Yes | A semicolon-separated list of email addresses
    to grant 'writer' permissions to the uploaded file. |


    ### Flow Description

    1. **Setup**: The action extracts the Google Drive service account credentials
    and the user-provided parameters.

    2. **Decoding**: The provided Base64 string is decoded into a binary stream.

    3. **MIME Detection**: The action determines the appropriate MIME type based on
    the file extension provided in the 'File Name' parameter.

    4. **Upload**: The file is uploaded to the root of the Google Drive associated
    with the service account.

    5. **Permission Management**: If email addresses are provided, the action iterates
    through the list and assigns 'writer' permissions to each user for the specific
    file ID created.

    6. **Output**: The action returns the full JSON metadata of the created file,
    including its unique Google Drive ID.


    ### Additional Notes

    - Ensure the service account has the necessary Google Drive API scopes enabled.

    - The 'Share with emails' parameter expects a semicolon (;) as a separator for
    multiple recipients.
