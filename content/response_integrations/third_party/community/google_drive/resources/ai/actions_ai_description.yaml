Download File To Path:
  ai_description: >-
    Downloads a file from Google Drive to a specified local directory on the execution
    environment. This action is useful for retrieving evidence or documents for further
    processing within a playbook.


    ### General Description

    This action interacts with the Google Drive API to retrieve a file's content and
    metadata. It supports both standard binary files and Google Workspace documents
    (Docs, Sheets, Slides), which are automatically converted to Microsoft Office
    formats (docx, xlsx, pptx) during the download process. The file is saved to a
    local path on the system running the action.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | File Id | String | Yes | N/A | The unique identifier of the file in Google Drive.
    This can be found in the file's sharing URL. |

    | Folder Path | String | No | /temp | The local directory path on the runner where
    the file will be saved. |


    ### Additional Notes

    - If the file is a Google Doc, it will be exported as a `.docx` file.

    - If the file is a Google Sheet, it will be exported as an `.xlsx` file.

    - If the file is a Google Slide, it will be exported as a `.pptx` file.

    - Ensure the execution environment has the necessary write permissions for the
    specified `Folder Path`.


    ### Flow Description

    1. **Initialization**: Extracts the Google Drive credentials from the integration
    configuration and the `File Id` and `Folder Path` from the action parameters.

    2. **Metadata Retrieval**: Connects to Google Drive to fetch the file's metadata,
    including its name and MIME type.

    3. **Format Handling**: Determines if the file is a native Google Workspace document
    and selects the appropriate export format if necessary.

    4. **Content Download**: Downloads the file content as a binary stream using the
    Google Drive API.

    5. **Local Storage**: Writes the binary stream to the specified local path on
    the filesystem.

    6. **Completion**: Returns a JSON result containing the file name, type, and the
    final saved path.
