Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Google Drive service. Its primary purpose is to
    ensure that the integration is correctly configured and that the provided service
    account credentials have the necessary permissions to interact with the Google
    Drive API.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the **Credentials
    Json** provided in the integration's shared configuration settings.


    ### Additional Notes

    - This action does not process or interact with any entities.

    - It is typically used during the initial setup of the Google Drive integration
    or for troubleshooting connectivity issues.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the service account credentials
    from the integration's configuration.

    2. **Manager Initialization:** It initializes the Google Drive API client using
    the provided credentials and required scopes.

    3. **Connectivity Test:** The action executes a `list` request on the files resource
    to confirm the API is reachable and the credentials are valid.

    4. **Result Reporting:** If the request completes successfully, the action ends
    with a success message.
