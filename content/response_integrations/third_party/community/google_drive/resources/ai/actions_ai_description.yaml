  ai_description: >-
    ### General Description

    Adds permission for a specific file stored in Google Drive.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Id | string | Yes | The file Id is presented in the file URL. See example
    - https://drive.google.com/drive/u/0/folders/{file-id} |

    | Role | string | Yes | "Owner"- allows to make any changes to the document. "Reader"-
    allows to open and view the document. "Writer"- allows to leave comments in the
    document. |

    | Emails | string | Yes | Email address of the person you would like to add permission
    to the file. You can add multiple emails by adding ";" as a separator. |

    | Should send notification | boolean | No | Define if you would like to send a
    notification to the user. |


    ### Flow Description

    1. Extracts the provided parameters.

    2. Initializes the Google Drive manager.

    3. Iterates over the provided emails and inserts the specified permission role
    for the file.

    4. Returns a success message.
