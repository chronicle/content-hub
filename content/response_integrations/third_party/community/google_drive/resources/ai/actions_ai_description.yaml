Remove Permission:
  ai_description: >-
    ### General Description

    The **Remove Permission** action is designed to revoke a specific user or group's
    access to a file stored in Google Drive. By providing the unique File ID and the
    specific Permission ID, security analysts can programmatically restrict access
    to sensitive documents during an incident response or audit process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Id** | string | Yes | The unique identifier of the Google Drive file.
    This can be found in the file's URL (e.g., `https://drive.google.com/drive/u/0/folders/{file-id}`).
    |

    | **Permission Id** | string | Yes | The unique identifier for the specific permission
    entry to be removed. This ID can be retrieved using the 'List Permissions' action.
    |


    ### Additional Notes

    - This action performs a permanent deletion of the permission entry from the file's
    Access Control List (ACL).

    - To identify which `Permission Id` corresponds to which user, it is recommended
    to run the **List Permissions** action first.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the Google Drive service
    account credentials from the integration settings.

    2. **Parameter Retrieval:** It extracts the `File Id` and `Permission Id` provided
    by the user.

    3. **Manager Initialization:** The `GoogleDriveManager` is initialized using the
    provided credentials to establish a connection with the Google Drive API (v3).

    4. **Permission Deletion:** The action calls the Google Drive API's `permissions().delete`
    method to remove the specified permission from the target file.

    5. **Execution Completion:** Upon success, the action returns a confirmation message
    to the Google SecOps workbench.
