Download File To Base64:
  ai_description: >-
    ### General Description

    Downloads a file from Google Drive and converts its content into a Base64 string.
    This action is designed to retrieve documents, spreadsheets, or binary files using
    their unique File ID and provide the content in a format suitable for further
    automated processing within the SOAR platform.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | File Id | The unique identifier of the file in Google Drive, typically found
    in the file's URL. | String | Yes |


    ### Flow Description

    1. The action initializes the Google Drive manager using provided service account
    credentials.

    2. It retrieves the metadata for the specified File ID to determine the file name
    and MIME type.

    3. If the file is a Google Workspace document (e.g., Doc, Sheet, Slide), it is
    exported to a standard Office format (e.g., .docx, .xlsx, .pptx).

    4. The file content is downloaded as a binary stream from the Google Drive API.

    5. The binary stream is encoded into a Base64 string.

    6. The resulting Base64 string and file metadata are returned as a JSON object
    for use in subsequent playbook steps.
