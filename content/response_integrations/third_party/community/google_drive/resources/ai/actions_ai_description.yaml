Get File Metadata:
  ai_description: >-
    ### General Description

    Retrieves metadata for a specific file from Google Drive using its File ID. This
    action connects to the Google Drive API to fetch detailed information about the
    file, such as its name, MIME type, size, and other properties, returning the data
    as a JSON object.


    ### Flow Description

    1. Extracts the mandatory `File Id` parameter provided by the user.

    2. Initializes the Google Drive API client using the provided integration credentials.

    3. Makes a GET request to the Google Drive API (`files().get`) to retrieve the
    metadata for the specified file.

    4. Attaches the retrieved metadata to the action's JSON result.

    5. Completes the action and returns a success message along with the file ID.


    ### Additional Notes

    Ensure that the service account or credentials used have the necessary permissions
    (`https://www.googleapis.com/auth/drive.metadata` or broader) to access the specified
    file.
