  ai_description: >-
    ### General Description

    Uploads a file from a specified local path to Google Drive and optionally shares
    it with specific users. This action is designed to move local files (such as forensic
    artifacts, logs, or reports) into a centralized cloud storage environment. It
    also automates the permission-granting process, allowing specified collaborators
    to access the file immediately after upload.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | string | True | The absolute file path on the local system from
    which the file will be uploaded to Google Drive. |

    | Share with emails | string | True | A semicolon-separated list of email addresses
    (e.g., `analyst@company.com;manager@company.com`) that will be granted 'writer'
    permissions to the uploaded file. |


    ### Additional Notes

    - The action requires valid Google Drive Service Account credentials configured
    in the integration settings.

    - Although the code handles the 'Share with emails' parameter as optional, the
    integration metadata marks it as mandatory; therefore, at least one email or a
    placeholder should be provided based on the UI configuration.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the Google Drive service account credentials
    from the integration's configuration.

    2. **Parameter Retrieval**: Extracts the local file path and the list of emails
    to share the file with from the action's input parameters.

    3. **File Upload**: Uses the Google Drive API to upload the file from the specified
    local path. The file name in Google Drive will match the original file name from
    the path.

    4. **Permission Management**: If email addresses are provided, the action splits
    the string by semicolons and iterates through each email.

    5. **Grant Access**: For each email, it calls the Google Drive API to insert a
    'writer' permission for the newly uploaded file.

    6. **Result Reporting**: Returns the Google Drive File ID as the main output and
    provides the full JSON response from the upload operation for further use in the
    playbook.
