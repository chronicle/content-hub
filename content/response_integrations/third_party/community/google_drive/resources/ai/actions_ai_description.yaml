    \ (e.g., `https://drive.google.com/file/d/{file-id}/view`). |\n\n### Flow Description\n\
    1. **Configuration Extraction:** The action retrieves the Google Drive service\
    \ account credentials from the integration configuration.\n2. **Parameter Retrieval:**\
    \ The action extracts the mandatory `File Id` provided by the user.\n3. **Metadata\
    \ Retrieval:** It queries the Google Drive API to fetch the file's metadata, including\
    \ its name and MIME type.\n4. **Content Download:** \n    * If the file is a Google\
    \ Workspace document (Doc, Sheet, or Slide), the action uses the `export` method\
    \ to convert it to a standard OpenXML format (DOCX, XLSX, or PPTX).\n    * If\
    \ the file is a standard binary file, it uses the `get_media` method to download\
    \ the raw content.\n5. **Base64 Encoding:** The retrieved binary stream is encoded\
    \ into a Base64 string.\n6. **Result Output:** The action returns a JSON object\
    \ containing the file name, the determined file type, the file size (for binary\
    \ files), and the Base64 encoded content.\n\n### Additional Notes\nThis action\
    \ is strictly a retrieval tool and does not modify the file or its permissions\
    \ in Google Drive. Because it downloads file content, it is not classified as\
    \ an enrichment action."
