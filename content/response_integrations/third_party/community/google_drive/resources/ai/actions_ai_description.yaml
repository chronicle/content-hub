  ai_description: >-
    Adds permissions for a specific file stored in Google Drive. This action allows
    users to grant access to a file by specifying the file ID, the desired role (owner,
    writer, or reader), and a list of email addresses.


    ### Flow Description

    1. The action extracts the required parameters: `File Id`, `Role`, `Emails`, and
    `Should send notification`.

    2. It initializes the `GoogleDriveManager` using the provided credentials.

    3. The `Emails` parameter is parsed into a list by splitting the semicolon-separated
    string.

    4. The action iterates through each email address and calls the Google Drive API
    to insert the specified permission for the given file.

    5. Upon completion, the action returns a success message indicating the permissions
    were granted.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Id | string | Yes | The unique identifier of the file in Google Drive.
    |

    | Role | ddl | Yes | The permission level to grant: "owner", "writer", or "reader".
    |

    | Emails | string | Yes | Semicolon-separated list of email addresses to grant
    access to. |

    | Should send notification | boolean | No | Whether to send an email notification
    to the user. Defaults to "true". |


    ### Additional Notes

    This action performs a mutation on the external Google Drive system by modifying
    file permissions.
  capabilities:
