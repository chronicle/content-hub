Download File To Base64:
  ai_description: >-
    ### General Description

    This action downloads a specific file from Google Drive and converts its content
    into a Base64 encoded string. It is useful for retrieving files for further analysis,
    attachment, or processing within the SOAR platform.


    ### Flow Description

    1. Extracts the `File Id` parameter provided in the action configuration.

    2. Initializes the Google Drive manager and authenticates using the integration
    credentials.

    3. Makes an API call to Google Drive to retrieve the file's metadata and content.

    4. Converts the downloaded file content into a Base64 encoded string.

    5. Attaches the Base64 string and file metadata to the action's JSON result.


    ### Additional Notes

