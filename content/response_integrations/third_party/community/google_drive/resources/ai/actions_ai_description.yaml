    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies file permissions in Google Drive by adding users with specified roles.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Google Drive API to insert a permission
      for a specific file. It does not fetch data for enrichment, nor does it modify
      internal SOAR data or entities.
  categories:
