Upload File From Base64:
  ai_description: >-
    ### General Description

    Uploads a file to Google Drive using a Base64 encoded string. This action allows
    users to programmatically save file content to a Google Drive account and optionally
    share the uploaded file with specific email addresses by granting them 'writer'
    permissions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Name | String | Yes | The name of the file to be created in Google Drive
    (e.g., 'report.txt'). |

    | Base64 String | String | Yes | The Base64 encoded content of the file to be
    uploaded. |

    | Share with emails | String | Yes | A semicolon-separated list of email addresses
    (e.g., 'user1@gmail.com;user2@gmail.com') to grant 'writer' access to the file.
    |


    ### Additional Notes

    The action uses the Google Drive API v3. The MIME type of the file is automatically
    determined based on the file extension provided in the 'File Name' parameter.
    If no extension is provided, it defaults to 'application/octet-stream'.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Google Drive service
    account credentials from the integration configuration.

    2. **Parameter Extraction**: It extracts the file name, Base64 content, and the
    list of emails to share with from the action parameters.

    3. **File Upload**: The Base64 string is decoded into a binary stream and uploaded
    to Google Drive using the `files.create` method.

    4. **Permission Assignment**: If email addresses are provided, the action iterates
    through the list and grants 'writer' permissions to each email for the newly created
    file using the `permissions.create` method.

    5. **Result Reporting**: The action returns the metadata of the created file,
    including its unique Google Drive ID, and marks the execution as completed.
