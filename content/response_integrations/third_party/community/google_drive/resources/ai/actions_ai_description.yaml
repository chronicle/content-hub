Get File Metadata:
  ai_description: >-
    Retrieves comprehensive metadata for a specific file stored in Google Drive. This
    action uses the Google Drive API to fetch all available properties of a file,
    such as its name, MIME type, size, creation time, and permissions, based on a
    provided File ID.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | File Id | The unique identifier of the file, which can be found in the file's
    URL (e.g., https://drive.google.com/drive/u/0/folders/{file-id}). | String | Yes
    |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the necessary service account
    credentials from the integration configuration.

    2. **Parameter Retrieval:** The action extracts the `File Id` provided by the
    user.

    3. **API Interaction:** The `GoogleDriveManager` initializes a connection to the
    Google Drive API and executes a `get` request for the specified file ID, requesting
    all available metadata fields (`fields="*"`).

    4. **Result Processing:** The retrieved metadata is attached to the action's execution
    results as a JSON object.

    5. **Completion:** The action concludes by returning a success message and the
    file's ID as the primary output value.
