  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Google Drive API. It ensures that the provided service account
    credentials are valid and that the environment has the necessary network permissions
    to reach Google's services.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Credentials Json | String | Yes | (Configuration Parameter) The raw JSON content
    of the Google Service Account key. This is used to authenticate the session with
    Google Drive. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Credentials Json` from
    the integration's configuration settings.

    2. **Manager Initialization**: It initializes the `GoogleDriveManager`, which
    parses the JSON credentials and builds a Google Drive API client (v3) with the
    required OAuth2 scopes.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a `files().list()` request to the Google Drive API. This request specifically
    looks for JPEG images to verify that the 'Read' and 'Metadata' permissions are
    functional.

    4. **Completion**: If the API call returns successfully, the action ends with
    a "Connected successfully" status. If an error occurs (e.g., invalid credentials
    or network timeout), the action fails.


    ### Additional Notes

    - This action does not interact with any entities (IPs, Hostnames, etc.) in the
    SOAR case.

    - It is strictly a system-level check and does not perform any data enrichment
    or mutation.
