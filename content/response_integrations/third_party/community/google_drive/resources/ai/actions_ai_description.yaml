  ai_description: >-
    ### General Description

    The **Delete File** action permanently deletes a specific file stored in Google
    Drive using its unique File ID. Unlike moving a file to the trash, this operation
    is destructive and removes the file immediately from the drive.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | **File Id** | The unique identifier of the file to be deleted. This can be found
    in the file's sharing URL (e.g., the string following `/folders/` or `/d/`). |
    String | Yes | This ID must be valid and the service account must have sufficient
    permissions to delete the file. |


    ### Additional Notes

    *   **Destructive Action:** This action skips the Google Drive 'Trash' and permanently
    deletes the resource. It cannot be undone via this action.

    *   **Permissions:** The integration's service account must have the appropriate
    OAuth scopes (e.g., `https://www.googleapis.com/auth/drive`) and file-level permissions
    to perform deletions.


    ### Flow Description

    1.  **Configuration Extraction:** The action retrieves the Google Drive service
    account credentials from the integration settings.

    2.  **Parameter Retrieval:** The action extracts the mandatory `File Id` provided
    by the user.

    3.  **Manager Initialization:** A connection to the Google Drive API (v3) is established
    using the provided credentials.

    4.  **Execution:** The action calls the Google Drive API's delete method for the
    specified `File Id`.

    5.  **Completion:** Upon successful deletion, the action returns a success message
    and the deleted File ID as the script result.
