Delete File:
  ai_description: >-
    ### General Description

    The **Delete File** action permanently deletes a specific file from Google Drive
    using its unique File ID. This action is destructive and bypasses the trash/recycle
    bin, making it useful for automated remediation where malicious or sensitive files
    must be immediately removed from the environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Id** | String | Yes | The unique identifier of the file to be deleted.
    This ID can typically be found in the file's sharing URL (e.g., the string following
    `/file/d/` or within the folder URL). |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Google Drive service
    account credentials from the integration configuration.

    2. **Parameter Retrieval**: The action extracts the `File Id` provided by the
    user or playbook.

    3. **Manager Initialization**: A connection to the Google Drive API (v3) is established
    using the provided credentials.

    4. **Execution**: The action calls the Google Drive API's `delete` method for
    the specified `File Id`.

    5. **Completion**: Upon successful deletion, the action returns a success message
    and the deleted File ID as the script result.


    ### Additional Notes

    * **Warning**: This action performs a permanent deletion. The file will not be
    moved to the 'Trash' and cannot be easily recovered through standard user interfaces.

    * This action does not run on entities; it requires a specific File ID as input.
  capabilities:
