Add Permission:
  ai_description: >-
    ### General Description

    Adds permissions for a specific file stored in Google Drive to one or more users.
    This action allows administrators or automated workflows to programmatically manage
    access control by granting roles such as 'Owner', 'Writer', or 'Reader' to specified
    email addresses. It is particularly useful for sharing forensic evidence, reports,
    or documentation during an incident response process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Id | String | Yes | The unique identifier of the file in Google Drive.
    This can be found in the file's URL (e.g., the string after '/file/d/'). |

    | Role | DDL | Yes | The level of access to grant. Options include: **owner**
    (full control), **writer** (can edit and comment), and **reader** (view only).
    |

    | Emails | String | Yes | A semicolon-separated list of email addresses (e.g.,
    `user1@company.com;user2@company.com`) to which the permissions will be granted.
    |

    | Should send notification | Boolean | No | If set to `true`, Google Drive will
    send an automated email notification to the users informing them that access has
    been granted. Defaults to `true`. |


    ### Additional Notes

    - This action does not operate on SecOps entities (IPs, Hosts, etc.); it relies
    entirely on the provided `File Id` and `Emails` parameters.

    - Granting the 'Owner' role may have significant security implications and should
    be used cautiously.


    ### Flow Description

    1. **Initialization**: The action extracts the Google Drive credentials from the
    integration configuration and the specific file and user details from the action
    parameters.

    2. **Email Parsing**: The provided `Emails` string is split by semicolons into
    individual email addresses.

    3. **Permission Insertion**: For each email address, the action calls the Google
    Drive API's `permissions.create` method, applying the selected `Role` and `File
    Id`.

    4. **Notification**: If enabled, the Google Drive service dispatches notification
    emails to the recipients during the permission creation process.

    5. **Completion**: The action concludes by providing a summary message of the
    granted permissions and returns the `File Id` as the script result.
