  ai_description: >-
    ### General Description

    Removes a specific permission from a file stored in Google Drive. This action
    is used to revoke access (e.g., read, write, or owner) for a specific user or
    group from a document or folder. It is typically used in response to unauthorized
    access or as part of a cleanup process during an incident.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Id | String | Yes | The unique identifier of the file in Google Drive.
    This can be found in the file's URL (e.g., `https://drive.google.com/drive/u/0/folders/{file-id}`).
    |

    | Permission Id | String | Yes | The unique identifier of the permission to be
    removed. This ID can be retrieved using the 'List Permissions' action for the
    specific file. |


    ### Additional Notes

    This action performs a permanent deletion of the permission record in Google Drive.
    To identify which permission to remove, it is recommended to run the 'List Permissions'
    action first to find the correct `Permission Id` associated with a specific user
    or role.


    ### Flow Description

    1. **Extract Configuration**: Retrieves the Google Drive service account credentials
    from the integration settings.

    2. **Extract Parameters**: Retrieves the `File Id` and `Permission Id` provided
    by the user.

    3. **Initialize Manager**: Authenticates with the Google Drive API using the provided
    credentials.

