  ai_description: >-
    ### General Description

    Adds permissions to a specific file stored in Google Drive for one or more users.
    This action allows administrators or automated workflows to programmatically manage
    access control by assigning roles such as Owner, Writer, or Reader to specified
    email addresses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Id | String | Yes | The unique identifier of the file, typically found
    in the file's URL (e.g., https://drive.google.com/drive/u/0/folders/{file-id}).
    |

    | Role | DDL | Yes | The level of access to grant. Options include: **owner**
    (full control), **writer** (can edit and comment), and **reader** (view only).
    |

    | Emails | String | Yes | A semicolon-separated list of email addresses (e.g.,
    user1@gmail.com;user2@gmail.com) to which the permissions will be granted. |

    | Should send notification | Boolean | No | If set to true, Google Drive will
    send an automated email notification to the users informing them of their new
    access. |


    ### Additional Notes

    - Multiple email addresses must be separated by a semicolon (`;`).

    - The action performs a direct mutation on the Google Drive file's permission
    metadata.


    ### Flow Description

    1. **Configuration Retrieval:** Extracts the Google Drive service account credentials
    from the integration settings.

    2. **Parameter Extraction:** Retrieves the target File ID, the assigned Role,
    the list of Emails, and the notification preference from the action inputs.

    3. **Email Parsing:** Splits the provided email string into a list of individual
    recipients.

    4. **Permission Insertion:** Iterates through each email address and calls the
    Google Drive API's `permissions.create` method to apply the specified role to
    the file.

    5. **Notification:** If enabled, the Google Drive API handles sending the notification
    emails to the recipients.

    6. **Completion:** Returns a success message indicating the role granted and the
    file affected.
