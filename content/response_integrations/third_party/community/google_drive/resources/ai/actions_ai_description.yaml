Delete File:
  ai_description: >-
    ### General Description

    Deletes a specific file stored in Google Drive using its unique File ID. This
    action permanently removes the file from the external system, skipping the trash.


    ### Flow Description

    1. Extracts the `File Id` parameter provided by the user.

    2. Initializes the Google Drive API client using the integration credentials.

    3. Makes an HTTP DELETE request to the Google Drive API (`files().delete`) to
    permanently remove the specified file.

    4. Returns a success message confirming the deletion.


    ### Additional Notes

    - The file ID can typically be extracted from the Google Drive file URL (e.g.,
    `https://drive.google.com/drive/u/0/folders/{file-id}`).

    - This action permanently deletes the file and bypasses the trash bin.
