    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specific permission role (owner, writer, or reader) to a file in Google
      Drive for the specified email addresses.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Google Drive API to create a new permission
      for a file, which mutates external data. It does not fetch data for enrichment,
      nor does it mutate internal SecOps data.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding permissions to a file, so it cannot
      be an enrichment action. It does not perform any identity, host, network, or
      email-based remediation, so it is not a remediation action.
    remediation: false
