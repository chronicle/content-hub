  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The integration 'ipqs_fraud_and_risk_scoring' is a dedicated threat intelligence
    enrichment service. Its primary function is to provide reputation, risk scores,
    and threat data for various indicators of compromise (IOCs) such as IP addresses,
    domains, URLs, email addresses, and phone numbers. It does not perform log analysis
    (SIEM), host containment (EDR), firewall/gateway management (Network Security),
    identity management (IAM), or ticket management (ITSM). While it enriches email
    and URL entities, it does not perform the specific 'Email Security' functions
    of managing inboxes or searching for affected users. Therefore, it is classified
    solely under Threat Intelligence.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
