Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using the IPQualityScore (IPQS) API to detect malicious
    links, phishing attempts, and malware. This action performs real-time scanning
    using machine learning models to provide risk scores and detailed domain intelligence,
    such as domain age and parking status. It updates the entity's suspicious status
    in Google SecOps based on the retrieved risk metrics and generates detailed insights
    and data tables for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Strictness | DDL | Yes | Determines the intensity of the scan (0, 1, or 2).
    Higher levels increase detection accuracy but may raise the false-positive rate.
    |

    | Fast | Boolean | No | If enabled, the API provides quicker response times by
    using lighter checks and analysis. |


    ### Flow Description

    1. **Initialization**: Retrieves the API key from the integration configuration
    and the Strictness and Fast parameters from the action settings.

    2. **Entity Filtering**: Identifies URL entities within the current case context.

    3. **API Query**: For each URL, sends a request to the IPQS URL API endpoint with
    the specified strictness and speed settings.

    4. **Data Analysis**: Parses the API response for risk scores, malware/phishing
    flags, and domain metadata (e.g., domain rank, DNS validity, category).

    5. **Internal Mutation**: Updates the URL entity's attributes with enrichment
    data and marks it as suspicious if the risk score or threat flags exceed defined
    thresholds.

    6. **Reporting**: Creates a case insight summarizing the verdict and adds a detailed
    data table and raw JSON result to the case for analyst review.
