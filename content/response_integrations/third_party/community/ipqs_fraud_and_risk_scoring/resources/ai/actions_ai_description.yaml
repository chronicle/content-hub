Enrich IP:
  ai_description: >-
    Enriches IP Address entities using the IPQualityScore (IPQS) API to perform real-time
    fraud and risk scoring. The action retrieves comprehensive threat intelligence,
    including fraud scores, proxy/VPN/TOR detection, ISP information, and geolocation
    data. Based on the retrieved fraud score, the action automatically flags entities
    as suspicious and generates detailed case insights for analysts.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API key from the integration configuration
    and extracts action parameters including strictness levels and optional forensic
    flags (Fast, Mobile, etc.).

    2. **Entity Filtering:** Identifies all IP Address entities within the current
    context.

    3. **External API Interaction:** For each IP address, it sends a POST request
    to the IPQS API with the configured forensic parameters and user-agent/language
    headers if provided.

    4. **Risk Evaluation:** Processes the API response to calculate a risk verdict
    (Clean, Suspicious, Moderate, High, or Critical) based on the returned fraud score.

    5. **Internal Data Enrichment:** Updates the entity's additional properties with
    IPQS metadata, marks the entity as enriched, and sets the 'is_suspicious' flag
    if the risk threshold is met.

    6. **Insight Generation:** Creates a case insight containing the IPQS verdict
    and adds a detailed data table to the entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Strictness | DDL | Yes | Sets the depth of the query (0, 1, or 2). Higher values
    provide more in-depth analysis but may increase false positives. |

    | User Language | String | No | Optional user language header to help evaluate
    fraud scores based on regional context. |

    | User Agent | String | No | Optional browser user-agent string to detect bots
    or invalid browsers. |

    | Fast | Boolean | No | If enabled, skips certain time-consuming forensic checks
    to speed up processing. |

    | Mobile | Boolean | No | If enabled, treats the lookup specifically as a mobile
    device connection. |

    | Allow Public Access Points | Boolean | No | Bypasses checks for known public
    access points like schools or corporate connections. |

    | Lighter Penalties | Boolean | No | Skips specific denylists to reduce false
    positives for sensitive audiences. |


    ### Additional Notes

    - The action specifically targets `ADDRESS` entities. While the underlying manager
    supports other types, this specific action logic is restricted to IP addresses.

    - The 'is_suspicious' flag is triggered if the fraud score is 60 or higher.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
