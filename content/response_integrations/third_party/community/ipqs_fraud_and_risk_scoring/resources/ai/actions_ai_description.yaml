Enrich Phone:
  ai_description: >-
    Enriches Phone Number entities using the IPQualityScore (IPQS) API to verify authenticity
    and assess reputation. This action retrieves detailed metadata including carrier
    information, line type (e.g., mobile, VOIP), and geographic data while performing
    risk analysis to detect fraudulent or disposable numbers.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Strictness | DDL | Yes | Sets the depth of the reputation check (0, 1, or 2).
    Higher levels are more restrictive but may increase false positives. |

    | Country(For multiple countries, provide comma-separated values) | String | No
    | Optional comma-separated list of ISO country codes suspected to be associated
    with the phone number to improve validation accuracy. |


    ### Flow Description

    1. **Initialization**: Retrieves the API key from the integration configuration
    and extracts the 'Strictness' and 'Country' parameters from the action input.

    2. **Entity Filtering**: Identifies all Phone Number entities within the current
    context.

    3. **External API Interaction**: For each phone number, it sends a POST request
    to the IPQS Phone Validation API endpoint with the configured strictness and country
    settings.

    4. **Risk Scoring**: Analyzes the API response (Fraud Score, validity, and active
    status) to determine a risk verdict (e.g., Clean, Suspicious, High Risk).

    5. **Internal Enrichment**: Updates the entity in Google SecOps by adding enrichment
    attributes (prefixed with 'IPQualityScore'), marking the entity as enriched, and
    potentially flagging it as suspicious based on the risk score.

    6. **Reporting**: Generates a detailed entity data table and creates a Case Insight
    containing the IPQS risk verdict.
