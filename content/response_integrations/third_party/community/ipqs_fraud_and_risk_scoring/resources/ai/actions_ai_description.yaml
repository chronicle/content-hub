  ai_description: >-
    Enriches Phone Number entities using the IPQualityScore (IPQS) API to verify validity
    and assess risk. This action retrieves carrier information, line type (e.g., VOIP,
    mobile, landline), and fraud scores to identify suspicious or disposable numbers.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API key from the integration configuration
    and the 'Strictness' and 'Country' parameters from the action settings.

    2. **Entity Filtering:** Identifies all Phone Number entities within the current
    alert context.

    3. **External API Query:** For each phone number, it sends a POST request to the
    IPQS phone validation endpoint.

    4. **Risk Assessment:** Analyzes the API response (fraud score, active status,
    validity) to determine a risk verdict (e.g., CLEAN, SUSPICIOUS, HIGH RISK).

    5. **Internal Data Update:** Updates the entity's 'additional_properties' with
    enrichment data, marks the entity as enriched, and sets the 'is_suspicious' flag
    if risk thresholds are met.

    6. **Insight Generation:** Creates a case insight and adds a data table to the
    entity containing the detailed verification results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Strictness | DDL | Yes | Determines the depth of the reputation check (0, 1,
    or 2). Higher levels are stricter but may increase false positives. |

    | Country(For multiple countries, provide comma-separated values) | String | No
    | Optional list of ISO country codes suspected to be associated with the phone
    number to improve validation accuracy. |


    ### Additional Notes

    - The action uses the `IPQualityScore` prefix for all added entity attributes.

    - Risk verdicts are calculated based on a combination of the `fraud_score`, `valid`,
    and `active` fields returned by the API.
