Enrich Email:
  ai_description: "Enriches Email address entities (represented as User entities)\
    \ using the IPQualityScore (IPQS) Fraud and Risk Scoring API. This action provides\
    \ real-time email validation, reputation scoring, and risk assessment by performing\
    \ syntax checks, DNS verification, and SMTP checks to determine if an inbox exists\
    \ and is active. It identifies disposable email services, honeypots, and addresses\
    \ associated with recent abuse or fraudulent behavior.\n\n### Flow Description:\n\
    1. **Parameter Extraction:** Retrieves the API key from the integration configuration\
    \ and action parameters including Abuse Strictness, Fast mode, Timeout, and Domain\
    \ Suggestion.\n2. **Entity Filtering:** Identifies User entities within the case\
    \ that match a standard email address format using regex.\n3. **External API Interaction:**\
    \ Sends a POST request to the IPQS Email Validation API for each valid email address.\n\
    4. **Risk Scoring:** Evaluates the API response (fraud score, disposable status,\
    \ validity) to assign a risk verdict (e.g., CLEAN, LOW RISK, HIGH RISK, INVALID).\n\
    5. **Internal Data Enrichment:** \n    * Updates the entity's `additional_properties`\
    \ with detailed IPQS metadata.\n    * Sets the entity's `is_enriched` flag to\
    \ true.\n    * Sets the `is_suspicious` flag if the risk score exceeds defined\
    \ thresholds.\n6. **Reporting:** Generates a detailed data table and a Case Insight\
    \ within Google SecOps for analyst review.\n\n### Parameters Description:\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Abuse Strictness\
    \ | DDL | Yes | Sets the strictness level (0, 1, or 2) for machine learning pattern\
    \ recognition of abusive email addresses. |\n| Fast | Boolean | No | If enabled,\
    \ skips the SMTP check with the mail provider to increase API speed. |\n| Timeout\
    \ in seconds | String | No | Maximum seconds to wait for a reply from the mail\
    \ service provider (default is 7). |\n| Suggest Domain | Boolean | No | If enabled,\
    \ checks if the email domain has a typo and suggests corrections for popular mail\
    \ services. |\n\n### Additional Notes:\n* This action specifically targets `USER`\
    \ entities that contain valid email strings.\n* The `is_suspicious` flag is automatically\
    \ triggered if the email is identified as disposable, invalid, or has a high fraud\
    \ score."
  capabilities:
