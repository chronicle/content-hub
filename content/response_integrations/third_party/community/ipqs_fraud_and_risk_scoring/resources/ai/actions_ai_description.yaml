Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the IPQS Fraud and Risk Scoring server.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Makes an API call (POST request) to the IPQS API using a hardcoded test email
    address (`support@ipqualityscore.com`).

    3. Evaluates the response to determine if the connection was successful.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    This is a utility action used to verify that the integration is configured correctly
    and can communicate with the IPQS service. It does not process any case entities.
  ai_short_description: >-
