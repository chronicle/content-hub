Enrich Domain:
  ai_description: >-
    Enriches Hostname entities using the IPQualityScore (IPQS) service to detect suspicious
    URLs, phishing links, and malware in real-time. The action utilizes machine learning
    models to provide risk scores and identify domain attributes such as parking status,
    spam scores, and domain age.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API Key from the integration configuration
    and the 'Strictness' and 'Fast' parameters from the action settings.

    2. **Entity Filtering:** Identifies Hostname entities within the current context.

    3. **External API Query:** For each Hostname, it sends a request to the IPQS URL
    API endpoint with the specified strictness and speed settings.

    4. **Risk Scoring:** Processes the API response to calculate a risk verdict (e.g.,
    Clean, Suspicious, High Risk) based on malware, phishing, and risk score indicators.

    5. **Internal Updates:** Updates the entity's additional properties with enriched
    metadata, sets the 'is_enriched' flag, updates the 'is_suspicious' status if applicable,
    and generates a detailed Case Insight and data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Strictness | DDL | Yes | Determines the scan's intensity (0, 1, or 2). Higher
    levels increase detection but may raise false positives. |

    | Fast | Boolean | No | If enabled, the API performs lighter checks to provide
    faster response times. |


    ### Additional Notes

    - This action specifically targets Hostname entities. While the underlying manager
    supports other types, this specific action logic restricts processing to Hostnames.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with IPQS metadata, modifies entity suspicious/enriched
      flags, and creates case insights with risk scoring details.
  categories:
