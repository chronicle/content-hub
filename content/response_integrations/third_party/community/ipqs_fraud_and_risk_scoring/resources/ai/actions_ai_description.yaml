Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the IPQualityScore (IPQS) Fraud and Risk Scoring
    API. It retrieves over 20 data points including geolocation, ISP, connection type,
    proxy/VPN/TOR status, and an overall fraud score to determine the risk associated
    with the IP address.


    ### Flow Description

    1. Extracts action parameters such as Strictness, User Agent, User Language, Fast,
    Mobile, Allow Public Access Points, and Lighter Penalties.

    2. Iterates over target entities, filtering for IP Address entities.

    3. Makes a POST request to the IPQualityScore API (`https://ipqualityscore.com/api/json/ip`)
    for each IP address to fetch threat intelligence.

    4. Parses the response to extract risk scores and threat intelligence data.

    5. Calculates a verdict based on the fraud score and updates the entity's `is_suspicious`
    status if the risk is high.

    6. Enriches the entity with the retrieved data, creates a case insight, and attaches
    a JSON result and entity table to the case.


    ### Additional Notes

    The action allows fine-tuning the lookup via parameters like strictness and bypassing
    certain checks for specific audiences.
