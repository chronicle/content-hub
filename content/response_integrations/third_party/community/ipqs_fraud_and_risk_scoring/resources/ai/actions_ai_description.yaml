Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ used to verify the connectivity between the Google SecOps platform and the IPQualityScore\
    \ (IPQS) API. It ensures that the integration is correctly configured, the network\
    \ path is open, and the provided API Key is valid and active.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| N/A | N/A | N/A | This action does not have any input parameters.\
    \ It relies on the 'API Key' defined in the integration's shared configuration.\
    \ |\n\n### Flow Description\n1. **Configuration Extraction**: The action retrieves\
    \ the 'API Key' from the integration's global settings.\n2. **Test Payload Preparation**:\
    \ It prepares a sample request using a hardcoded support email address (`support@ipqualityscore.com`)\
    \ to test the API's response.\n3. **API Connectivity Check**: The action sends\
    \ a POST request to the IPQS email validation endpoint via the `IPQSManager`.\n\
    4. **Response Analysis**: It evaluates the JSON response from the service, specifically\
    \ checking the 'success' boolean flag.\n5. **Execution Outcome**: \n    * If the\
    \ API responds with a success status, the action returns a 'Successfully Connected'\
    \ message.\n    * If the connection fails or the API returns an error (e.g., invalid\
    \ key), the action fails and reports the specific error message provided by the\
    \ service.\n\n### Additional Notes\n- This action does not process, filter, or\
    \ enrich any entities within a Google SecOps case.\n- It is strictly intended\
    \ for health checks and troubleshooting integration connectivity."
