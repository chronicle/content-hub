Enrich Domain:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using the IPQualityScore (IPQS) Fraud and Risk Scoring
    API. It scans domains to detect suspicious URLs, identifying phishing links, malware,
    parked domains, and providing real-time risk scores.


    ### Flow Description

    1. Extracts action parameters (`Strictness`, `Fast`).

    2. Iterates over target entities, filtering specifically for Hostname entities.

    3. Sends a POST request to the IPQS API for each valid entity to retrieve threat
    intelligence.

    4. Parses the response to extract risk scores, malware/phishing indicators, and
    other relevant data.

    5. Updates the entity's additional properties and suspicious status based on the
    calculated risk score.

    6. Creates a case insight and attaches an entity table with the enrichment results.


    ### Additional Notes

    The strictness level and fast mode can be configured to balance between false-positive
    rates and response times.
  ai_short_description: >-
    Enriches Hostname entities by querying the IPQualityScore API to retrieve real-time
    risk scores and threat intelligence regarding phishing, malware, and domain reputation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the IPQualityScore API to fetch domain risk
      data. It does not mutate external data but updates internal entities with enrichment
      data and creates case insights.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
