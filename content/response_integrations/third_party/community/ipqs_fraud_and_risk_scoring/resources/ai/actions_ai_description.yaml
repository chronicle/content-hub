  ai_description: >-
    Enriches Hostname entities by querying the IPQualityScore (IPQS) API to retrieve
    real-time risk scores and threat intelligence. It detects suspicious URLs, phishing
    links, malware, and parked domains.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Strictness | Dropdown | Yes | Determines how strict the URL scan should be (0,
    1, or 2). Higher strictness may increase false positives. |

    | Fast | Boolean | No | If enabled, the API provides quicker response times by
    performing lighter checks and analysis. |


    ### Action Flow

    1. Extracts the `Strictness` and `Fast` configuration parameters.

    2. Iterates over the target entities, specifically filtering for `HOSTNAME` entities.

    3. Queries the IPQS API for each valid entity to retrieve threat intelligence,
    risk scores, and domain age.

    4. Calculates a verdict based on the risk score, malware, and phishing indicators.

    5. Updates the entity's properties with the enrichment data and marks it as suspicious
    if the risk score exceeds defined thresholds.

    6. Creates a case insight and adds a data table with the detailed analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties with enrichment data and creates case insights.
    reasoning: >-
      The action fetches data from the IPQualityScore API using a POST request to
      retrieve threat intelligence. It does not mutate any external data. Internally,
      it updates entity properties (is_enriched, is_suspicious, additional_properties)
      and creates case insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data to provide supplemental context about entities, does
      not mutate external state, and only performs allowed internal mutations (updating
      entities and creating insights). Therefore, it is an enrichment action. It does
      not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      `if entity.entity_type in entity_types`. The `entity_types` list is explicitly
      passed as `[EntityTypes.HOSTNAME]` from the main script.
