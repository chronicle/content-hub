  ai_description: >-
    Enriches User entities (specifically email addresses) using IPQualityScore (IPQS)
    Fraud and Risk Scoring. This action retrieves real-time email address reputation
    scoring, validation, and threat intelligence to determine if the email is associated
    with abuse, disposable services, or fraudulent behavior.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Abuse Strictness | Dropdown | Yes | Sets the strictness level for machine learning
    pattern recognition of abusive email addresses with the 'recent_abuse' data point.
    |

    | Fast | Boolean | No | When enabled, the API will not perform an SMTP check with
    the mail service provider, which greatly increases the API speed. |

    | Timeout in seconds | String | No | Maximum number of seconds to wait for a reply
    from a mail service provider. |

    | Suggest Domain | Boolean | No | Forces analysis to check if the email address
    domain has a typo and should be corrected to a popular mail service. |


    ### Action Flow

    1. Iterates through target entities, filtering for User entities whose identifiers
    match an email address format.

    2. Queries the IPQS API for each valid email address to retrieve reputation, validation,
    and risk scoring data.

    3. Calculates a risk verdict based on the returned fraud score, disposable status,
    and validity.

    4. Updates the entity's properties with the enrichment data and sets its suspicious
    status if the risk is deemed high.

    5. Creates a case insight and attaches a data table with the detailed results
    to the entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties with enrichment data, sets the is_suspicious flag,
      and creates case insights.
    reasoning: >-
      The action fetches email reputation data from the IPQS API. Although it uses
      a POST request, it acts as a query to retrieve data and does not mutate external
      state. It mutates internal data by updating entity properties, setting the suspicious
      flag, and creating case insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source without modifying external state.
      It only modifies internal state by updating entities and creating insights,
      which are allowed internal mutations for enrichment actions. Therefore, it is
      classified as an Enrichment action.
    remediation: false
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      if `entity.entity_type` is in the provided list (which is `[EntityTypes.USER]`).
      It further filters the entities by checking if their identifier matches an email
      regex (`re.match(EMAIL_REGEX, entity.identifier)`). Thus, it runs on USER entities
      (mapped to USERUNIQNAME) and filters by both entity type and identifier.
