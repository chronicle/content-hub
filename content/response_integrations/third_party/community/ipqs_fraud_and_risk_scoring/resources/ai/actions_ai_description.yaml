  ai_description: >-
    ### General Description

    This action enriches Hostname entities using the IPQualityScore (IPQS) API to
    detect suspicious URLs, phishing, malware, and parked domains. It retrieves real-time
    threat intelligence, including risk scores and domain reputation, to help analysts
    assess the threat level of a domain.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Strictness` and `Fast` parameters
    from the configuration.

    2. **Entity Filtering**: The action iterates over the target entities, specifically
    filtering for `HOSTNAME` entities.

    3. **API Interaction**: For each valid entity, it performs a POST request to the
    IPQS API to fetch reputation data.

    4. **Data Processing**: The action parses the API response, calculates risk scores,
    and determines if the entity is suspicious.

    5. **Internal Update**: It updates the entity's `additional_properties` (e.g.,
    fraud score, domain age, risk category), sets the `is_enriched` flag, and updates
    the `is_suspicious` status if the risk threshold is met.

    6. **Reporting**: It creates a case insight with the risk verdict and adds a data
    table to the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Strictness | ddl | Yes | Determines the strictness of the URL scan (0, 1, 2).
    Stricter checks may increase false positives. |

    | Fast | boolean | No | When enabled, the API provides quicker response times
    using lighter checks and analysis. |


    ### Additional Notes

    This action is strictly limited to `HOSTNAME` entities as defined in the script
    logic.
