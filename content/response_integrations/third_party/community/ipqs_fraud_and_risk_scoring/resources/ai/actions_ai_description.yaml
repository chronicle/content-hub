  ai_description: "### General Description\nEnriches IP Address entities using the\
    \ IPQualityScore (IPQS) Fraud and Risk Scoring service. This action performs real-time\
    \ lookups to determine the risk level of an IP address, identifying if it is associated\
    \ with a proxy, VPN, or TOR connection, and providing over 20 data points including\
    \ fraud scores, geolocation, ISP, and connection type. It helps analysts identify\
    \ malicious actors, bots, and fraudulent transactions by providing a comprehensive\
    \ reputation profile.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Strictness | ddl | Yes | Determines\
    \ how in-depth (strict) the query should be. Higher values (0, 1, 2) take longer\
    \ but provide more rigorous analysis. |\n| User Agent | string | No | Optional\
    \ browser user agent string to help identify bots or invalid browsers. |\n| User\
    \ Language | string | No | Optional user language header to assist in evaluating\
    \ the 'fraud_score'. |\n| Fast | boolean | No | If enabled, skips certain forensic\
    \ checks to speed up processing. |\n| Mobile | boolean | No | If enabled, specifies\
    \ that the lookup should be treated as a mobile device. |\n| Allow Public Access\
    \ Points | boolean | No | Bypasses checks for IP addresses from education, research,\
    \ or corporate connections. |\n| Lighter Penalties | boolean | No | Skips certain\
    \ denylists to reduce false positives for sensitive audiences. |\n\n### Flow Description\n\
    1. **Configuration Extraction:** Retrieves the API Key from the integration configuration\
    \ and the action parameters (Strictness, User Agent, etc.).\n2. **Entity Filtering:**\
    \ Identifies all IP Address entities within the current context.\n3. **External\
    \ API Interaction:** For each IP address, sends a POST request to the IPQualityScore\
    \ API with the configured parameters.\n4. **Risk Scoring:** Evaluates the returned\
    \ 'fraud_score' and other indicators (proxy, VPN, malware status) to determine\
    \ a risk verdict (e.g., CLEAN, SUSPICIOUS, HIGH RISK, CRITICAL).\n5. **Internal\
    \ Data Enrichment:** \n    * Updates the entity's additional properties with IPQS\
    \ metadata (ISP, ASN, Organization, etc.).\n    * Sets the entity's 'is_enriched'\
    \ flag to true.\n    * Marks the entity as 'is_suspicious' if the risk score exceeds\
    \ defined thresholds.\n6. **Insight Generation:** Creates a Case Insight for each\
    \ entity containing the IPQS verdict and adds a detailed data table to the entity's\
    \ results."
