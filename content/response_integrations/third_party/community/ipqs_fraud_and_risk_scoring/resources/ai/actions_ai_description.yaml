  ai_description: >-
    ### General Description

    Enriches IP Address entities using IPQS Fraud and Risk Scoring. This action performs
    real-time lookups to determine the risk of an IP address, returning data points
    such as Geo location, ISP, Connection type, Device details, fraud score, and proxy/VPN/TOR
    status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | User Language | string | False | Optionally provide the user's language header
    to evaluate risk. |

    | Fast | boolean | False | When enabled, the API will not perform certain forensic
    checks that take longer to process. |

    | Mobile | boolean | False | Optionally specify that this lookup should be treated
    as a mobile device. |

    | Allow Public Access Points | boolean | False | Bypasses certain checks for IP
    addresses from education and research institutions, schools, and some corporate
    connections. |

    | Lighter Penalties | boolean | False | Skip some denylists which can cause false-positives
    for sensitive audiences. |

    | Strictness | ddl | True | How in-depth (strict) the query should be. Higher
    values take longer and may provide a higher false-positive rate. |

    | User Agent | string | False | Optionally provide the user agent string (browser)
    to see if the user is a bot or running an invalid browser. |


    ### Flow

    1. Extracts the configuration and action parameters.

    2. Iterates over the target entities and filters for ADDRESS entities.

    3. For each ADDRESS entity, queries the IPQS API to retrieve risk and fraud data.

    4. Calculates a risk verdict based on the returned fraud score.

    5. Creates a case insight with the verdict and adds a data table with the detailed
    results.

    6. Updates the entity's additional properties with the enrichment data and sets
    it as suspicious if the risk is high.

    7. Returns the results as a JSON object.
