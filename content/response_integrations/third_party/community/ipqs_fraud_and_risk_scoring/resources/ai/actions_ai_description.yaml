      The action fetches threat intelligence from the IPQS API (fetches_data=true).
      It does not modify external systems (can_mutate_external_data=false). It performs
      internal mutations by updating entity properties (is_enriched, is_suspicious,
      additional_properties) and creating case insights (can_mutate_internal_data=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (IPQS) and updates internal
      SOAR entities and insights without modifying external systems. This fits the
      definition of an enrichment action.
  entity_usage:
