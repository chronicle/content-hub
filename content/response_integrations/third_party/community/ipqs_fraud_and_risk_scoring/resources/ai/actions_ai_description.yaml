  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between the Google SecOps platform and the\
    \ IPQualityScore (IPQS) API. It ensures that the provided API Key is valid and\
    \ that the network path to the IPQS servers is open. This action is typically\
    \ used during the initial setup of the integration or for troubleshooting communication\
    \ issues.\n\n### Parameters Description\nThere are no parameters for this action.\n\
    \n### Additional Notes\nThis action performs a test query using a hardcoded email\
    \ address (`support@ipqualityscore.com`) to validate the API response. It does\
    \ not process any entities from the current case or alert.\n\n### Flow Description\n\
    1. **Configuration Extraction:** The action retrieves the 'API Key' from the integration's\
    \ configuration settings.\n2. **Payload Preparation:** A static JSON payload is\
    \ created containing a test email address.\n3. **API Request:** The action sends\
    \ a POST request to the IPQS email validation endpoint using the `IPQSManager`.\n\
    4. **Response Validation:** The action checks the `success` field in the API response.\n\
    5. **Final Status:** \n    * If the request is successful, the action completes\
    \ with a success message.\n    * If the request fails (e.g., invalid API key or\
    \ network error), the action fails and provides the error message returned by\
    \ the API."
