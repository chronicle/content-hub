  ai_description: >-
    ### General Description

    The **Enrich Domain** action leverages IPQualityScore (IPQS) to perform real-time
    analysis of Hostname entities. It identifies malicious URLs, phishing attempts,
    malware distribution points, and parked domains using advanced machine learning
    models. The action provides detailed intelligence including risk scores, domain
    age, and reputation data to help analysts assess the threat level of a domain.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Strictness** | DDL | Yes | Determines the intensity of the scan. Options are
    0, 1, or 2. Higher levels perform more rigorous checks but may increase the false-positive
    rate. |

    | **Fast** | Boolean | No | When enabled, the API provides quicker response times
    by utilizing lighter checks and analysis. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API Key from the integration configuration
    and the Strictness and Fast settings from the action parameters.

    2. **Entity Filtering:** Identifies all Hostname entities within the current context
    to be processed.

    3. **External API Query:** For each Hostname, sends a POST request to the IPQS
    URL API to retrieve reputation and risk data.

    4. **Risk Assessment:** Evaluates the returned risk score and specific threat
    flags (e.g., malware, phishing, suspicious) to determine a final risk verdict
    (e.g., Clean, Suspicious, High Risk, Critical).

    5. **Internal Enrichment:**
        *   Updates the entity's additional properties with IPQS metadata prefixed
    with 'IPQualityScore'.
        *   Sets the entity's status to 'Enriched' and marks it as 'Suspicious' if
    the risk scoring logic determines a threat.
        *   Creates a detailed Case Insight and adds a data table to the entity for
    immediate visibility in the SOAR interface.
    6. **Result Reporting:** Consolidates the results into a JSON object and provides
    a summary message of the processed entities.


    ### Additional Notes

    This action is specifically targeted at Hostname entities. While the underlying
    manager supports multiple types, this specific action script restricts processing
    to Hostnames.
  capabilities:
