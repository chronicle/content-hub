  ai_description: "### General Description\nThis action enriches email address entities\
    \ using the IPQualityScore (IPQS) API. It retrieves real-time reputation, validity,\
    \ and risk scoring data to help analysts determine if an email address is disposable,\
    \ malicious, or associated with fraudulent behavior. The action updates the entity\
    \ with detailed properties and generates a case insight for quick visibility.\n\
    \n### Flow Description\n1. **Configuration Extraction**: The action retrieves\
    \ the API key and user-defined parameters (Abuse Strictness, Fast, Timeout, Suggest\
    \ Domain).\n2. **Entity Filtering**: It iterates through the target entities,\
    \ specifically selecting `USER` entities that match a valid email address format\
    \ (using a regex check).\n3. **External API Interaction**: For each valid email,\
    \ it sends a POST request to the IPQS API to fetch reputation and risk data.\n\
    4. **Data Processing**: The API response is parsed to extract metrics such as\
    \ fraud score, disposable status, and deliverability.\n5. **Internal Updates**:\
    \ \n    - Updates the entity's `additional_properties` with the retrieved data.\n\
    \    - Sets the `is_enriched` flag on the entity.\n    - Optionally updates the\
    \ `is_suspicious` flag based on the risk score.\n    - Adds an entity table to\
    \ the SOAR platform with the detailed results.\n    - Creates a case insight summarizing\
    \ the IPQS verdict.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Abuse Strictness | ddl | Yes\
    \ | Sets the strictness level (0, 1, 2) for machine learning pattern recognition\
    \ of abusive email addresses. |\n| Fast | boolean | No | When enabled, skips the\
    \ SMTP check with the mail service provider to increase API speed. |\n| Timeout\
    \ in seconds | string | No | Maximum number of seconds to wait for a reply from\
    \ the mail service provider. |\n| Suggest Domain | boolean | No | If enabled,\
    \ forces analysis to check if the email domain has a typo and suggests a correction.\
    \ |\n\n### Additional Notes\n- The action specifically targets `USER` entities.\
    \ If an entity is not a `USER` or does not match the email regex, it will be skipped."
