    \ Mobile, Allow Public Access Points, Lighter Penalties).\n2. **Entity Iteration**:\
    \ It iterates through the `target_entities` provided in the case.\n3. **Type Identification**:\
    \ It identifies the entity type (IP, Hostname, URL, Email, or Phone) and prepares\
    \ the corresponding API request.\n4. **External Lookup**: It performs a POST request\
    \ to the IPQS API to fetch risk and reputation data.\n5. **Data Processing**:\
    \ Based on the response, it calculates a risk verdict (Clean, Low, Moderate, High,\
    \ Critical, Suspicious, Invalid).\n6. **Internal Update**: \n   - Updates the\
    \ entity's `additional_properties` with the retrieved data.\n   - Sets `is_enriched`\
    \ to true.\n   - Updates `is_suspicious` if the risk score exceeds defined thresholds.\n\
    \   - Adds an entity table with detailed results.\n   - Creates a case insight\
    \ with the risk verdict.\n   - Adds the raw JSON result to the entity.\n\n###\
    \ Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---\
    \ | :--- | :--- | :--- |\n| Strictness | ddl | Yes | Determines the strictness\
    \ of the query (0-2). Higher values may provide higher false-positive rates. |\n\
    | User Agent | string | No | The user agent string (browser) to check if the user\
    \ is a bot or using an invalid browser. |\n| User Language | string | No | The\
    \ user's language header to evaluate risk. |\n| Fast | boolean | No | If enabled,\
    \ skips certain forensic checks to process faster. |\n| Mobile | boolean | No\
    \ | Specifies if the lookup should be treated as a mobile device. |\n| Allow Public\
    \ Access Points | boolean | No | Bypasses checks for IP addresses from education/research\
    \ institutions and corporate connections. |\n| Lighter Penalties | boolean | No\
    \ | Skips some denylists to reduce false-positives for sensitive audiences. |\n\
    \n### Additional Notes\n- The action supports multiple entity types: `ADDRESS`,\
    \ `HOSTNAME`, `URL`, `USER` (via email regex), and `PHONENUMBER`.\n- The action\
    \ does not mutate external systems; it is strictly for enrichment and internal\
    \ SOAR data updates."
