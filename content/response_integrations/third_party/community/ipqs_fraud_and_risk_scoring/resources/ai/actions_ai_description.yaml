    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (is_enriched, is_suspicious, additional_properties)
      and creates case insights.
    reasoning: >-
      The action fetches threat intelligence data from the IPQS API (fetches_data=true).
      It does not mutate external systems (can_mutate_external_data=false). It updates
      internal entity properties (is_enriched, is_suspicious, additional_properties)
      and creates case insights (can_mutate_internal_data=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (IPQS) and updates internal
      entities/insights without modifying external systems. This fits the definition
      of an enrichment action.
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The script explicitly calls `ipqs_manager.enrich([EntityTypes.HOSTNAME])`, limiting
      the action to HOSTNAME entities. It iterates over `target_entities` and filters
      by `entity_type`.
