Enrich Email:
  ai_description: >-
    ### General Description

    Enriches User entities (specifically email addresses) using the IPQS Fraud and
    Risk Scoring API. This action provides real-time email address reputation scoring
    and validation, detecting disposable or temporary mail services, poor reputation,
    and recent associations with abuse or threats.


    ### Flow Description

    1. Extracts the action parameters including Abuse Strictness, Fast execution,
    Timeout, and Suggest Domain.

    2. Iterates over the target entities, filtering for User entities whose identifiers
    match a standard email address format.

    3. Makes an API call (POST request) to the IPQS API to retrieve reputation, validation,
    and risk data for each valid email address.

    4. Parses the API response to calculate a risk score and determine if the email
    is disposable, invalid, or suspicious.

    5. Updates the entity's properties with the retrieved data, marks it as enriched,
    and updates its suspicious status if the risk score is high.

    6. Creates a case insight and attaches the raw JSON and a data table to the entity.


    ### Additional Notes

    Although the underlying manager supports multiple entity types, this specific
    action is hardcoded to process only User entities.
  ai_short_description: >-
    Enriches User entities containing email addresses by retrieving real-time reputation
    scoring, validation, and risk assessment from IPQS Fraud and Risk Scoring.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making an HTTP POST request to the IPQS API to retrieve
      email reputation data. It does not mutate external data as the API call is strictly
      for querying information. It updates internal entities with the enrichment data
      (`siemplify.update_entities`) and creates case insights (`siemplify.create_case_insight`).
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      if `entity.entity_type in entity_types` (which is passed as `[EntityTypes.USER]`
      from the main script). It further filters the entities by checking if `entity.identifier`
      matches an email regex pattern (`re.match(EMAIL_REGEX, entity.identifier)`).
