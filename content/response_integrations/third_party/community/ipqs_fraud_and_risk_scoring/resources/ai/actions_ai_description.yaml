  ai_description: >-
    ### General Description

    Enriches Email addresses (represented as User entities) using the IPQualityScore
    (IPQS) API. This action performs real-time validation, including syntax and DNS
    checks, and determines if an email address is associated with abuse, fraud, or
    disposable mail services. It calculates a fraud score and provides a risk verdict,
    which is then used to update the entity's suspicious status and create detailed
    case insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Abuse Strictness | DDL | Yes | Sets the strictness level (0, 1, or 2) for machine
    learning pattern recognition of abusive email addresses. |

    | Fast | Boolean | No | If enabled, skips the SMTP check to increase API response
    speed. |

    | Timeout in seconds | String | No | Maximum time (default 7s) to wait for a response
    from the mail service provider. |

    | Suggest Domain | Boolean | No | If enabled, checks for and suggests corrections
    for typos in the email domain. |


    ### Additional Notes

    - The action specifically targets `USER` entities and validates that their identifier
    matches an email regex pattern before processing.

    - Internal risk scoring logic determines the 'is_suspicious' status based on the
    `fraud_score`, `disposable`, and `valid` fields returned by the API.


    ### Flow Description

    1. **Configuration Retrieval**: Retrieves the API key from the integration configuration
    and extracts action parameters (Abuse Strictness, Fast mode, Timeout, and Suggest
    Domain).

    2. **Entity Filtering**: Filters the target entities to identify those of type
    `USER`.

    3. **Email Validation**: For each identified `USER` entity, the action verifies
    if the identifier matches a standard email format using a regular expression.

    4. **API Interaction**: Sends a POST request to the IPQS Email Validation API
    for each valid email address, passing the configured strictness and speed parameters.

    5. **Risk Assessment**: Parses the API response to calculate a risk verdict (e.g.,
    CLEAN, LOW RISK, HIGH RISK, INVALID, or DISPOSABLE) based on the fraud score and
    validation flags.

    6. **Internal Data Mutation**: Updates the Google SecOps entity with enrichment
    attributes (prefixed with 'IPQualityScore'), sets the `is_enriched` flag, and
    marks the entity as `is_suspicious` if the risk level is elevated.

    7. **Insight Generation**: Creates a Case Insight for each processed entity, providing
    a summary of the IPQS verdict.

    8. **Result Reporting**: Adds a detailed data table to the entity and populates
    the action's JSON results with the full API response.
