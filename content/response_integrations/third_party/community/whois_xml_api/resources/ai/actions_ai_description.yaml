  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps environment and the Whois XML API service. Its primary
    purpose is to ensure that the integration is correctly configured and that the
    API credentials provided are valid.


    ### Parameters Description

    There are no input parameters for this action. It relies solely on the integration's
    configuration settings (API Key).


    ### Additional Notes

    This action is a standard connectivity check. According to the classification
    rules, actions named 'Ping' are not categorized as enrichment actions, even though
    they perform a read-only request to an external service.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'API Key' from the integration's
    global configuration.

    2. **Connectivity Test**: It performs an HTTP GET request to the Whois XML API
    endpoint, using a test query for 'google.com' to validate the communication path.

    3. **Credential Validation**: The action inspects the response body for specific
    error strings (e.g., 'ApiKey authenticate failed') to determine if the credentials
    are valid.

    4. **Status Reporting**: If the request is successful and credentials are valid,
    the action concludes with a 'Successful Connection' status.
