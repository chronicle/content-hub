  ai_description: >-
    Fetches domain registration and availability details from the Whois XML API. This
    action retrieves comprehensive WHOIS data for a specified domain, which can be
    used for threat intelligence and domain reputation analysis.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Domain Name | string | Yes | The domain to scan. |

    | Check availability | boolean | No | Whether to check domain availability. |


    ### Flow Description

    1. Extract the API key from the integration configuration.

    2. Extract the `Domain Name` and `Check availability` parameters from the action
    settings.

    3. Construct the API request URL with the provided parameters.

    4. Execute a GET request to the Whois XML API.

    5. Add the JSON response to the action result and context details.

    6. End the action with a success message.
