  ai_description: >-
    ### General Description

    The **Get Domain Details** action retrieves comprehensive WHOIS information for
    a specified domain using the WHOIS XML API. It provides details such as registration
    dates, registrar information, registrant contact details, and name servers. This
    action is primarily used to gather context about a domain during an investigation.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain Name | String | Yes | The domain name to retrieve WHOIS details for (e.g.,
    google.com). |

    | Check availability | Boolean | No | If set to true, the action will also check
    the availability of the domain. Defaults to false. |


    ### Flow Description

    1. **Initialization**: The action retrieves the API Key from the integration configuration.

    2. **Parameter Extraction**: It extracts the target domain name and the optional
    availability check flag from the action parameters.

    3. **Request Construction**: A GET request URL is constructed targeting the WHOIS
    XML API endpoint, including the domain name and the availability check preference.

    4. **Data Retrieval**: The action sends a request to the external API.

    5. **Output**: The resulting JSON data is attached to the action results and made
    available for subsequent playbook steps.


    ### Additional Notes

    This action does not automatically process entities from the case; it requires
    a domain name to be provided as a direct input parameter.
