    ### Parameters Description

    There are no parameters required for this action.


    ### Flow Description

    1. Extracts the API Key from the integration's configuration.

    2. Sends a test GET request to the WHOIS XML API using a hardcoded domain (`google.com`).

    3. Evaluates the response to confirm successful authentication and connectivity.

    4. Outputs a success message if the connection is verified, or raises an error
    if authentication fails.
