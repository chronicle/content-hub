    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action fetches WHOIS registration data for domains/URLs, which provides
      threat intelligence and context for the indicator. This matches the 'Enrich
      IOC' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
