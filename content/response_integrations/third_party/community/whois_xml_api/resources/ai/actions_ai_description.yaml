  ai_description: >-
    ### General Description

    Enriches HOSTNAME and URL entities using the WHOIS XML API. This action retrieves
    WHOIS registration data for the specified domains or URLs and updates the entities'
    properties with the registrant details. The raw WHOIS data is also attached to
    the action's JSON result.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Iterates over the target entities provided in the case.

    3. Filters entities to process only external HOSTNAMEs and URLs.

    4. Makes a GET request to the WHOIS XML API for each matching entity.

    5. Extracts the registrant details from the API response.

    6. Updates the entity's `additional_properties` with the extracted details.

    7. Saves the updated entities back to the case and attaches the raw JSON response
    to the action results.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the API
    Key configured in the integration settings.


    ### Additional Notes

    Only entities of type HOSTNAME that are marked as external (`is_internal` is false)
    and entities of type URL will be processed by this action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional_properties of the target entities with registrant details
      fetched from the WHOIS XML API.
    reasoning: >-
      The action fetches data from the WHOIS XML API using a GET request. It does
      not mutate any external data. It mutates internal data by updating the entities'
      additional properties with the fetched registrant details.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (WHOIS XML API) and updates
      internal entities without mutating external state. This perfectly aligns with
      the Enrichment category.
    remediation: false
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `(entity.entity_type == EntityTypes.HOSTNAME and not entity.is_internal) or
      entity.entity_type == EntityTypes.URL`. Therefore, it runs on HOSTNAME and DestinationURL
      entities, and filters by entity_type and is_internal.
