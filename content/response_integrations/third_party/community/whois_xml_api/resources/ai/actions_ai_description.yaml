  ai_description: >-
    This action verifies connectivity to the Whois XML API by performing a test request.
    It ensures that the provided API key is valid and that the integration can successfully
    communicate with the external service.


    ### Flow Description

    1. **Extract Configuration**: The action retrieves the 'API Key' from the integration
    configuration.

    2. **Construct Request**: A test GET request is constructed using the provided
    API key and a hardcoded domain ('google.com').

    3. **Execute Request**: The action sends the GET request to the Whois XML API
    endpoint.

    4. **Validate Response**: The response is checked for authentication errors (e.g.,
    'ApiKey authenticate failed').

    5. **Finalize**: If the request is successful, the action ends with a success
    status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key used to authenticate the request to the
    Whois XML API. |


    ### Additional Notes

    This action is a diagnostic tool used to verify connectivity and authentication.
    It does not perform any data enrichment or state changes.
