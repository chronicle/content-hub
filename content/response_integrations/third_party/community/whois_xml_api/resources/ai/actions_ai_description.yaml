Enrich Entities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action retrieves WHOIS registration information for Hostname
    and URL entities using the Whois XML API. It specifically targets external hostnames
    and all URLs to gather registrant details such as name, organization, and contact
    information, which are then appended to the entity's metadata within Google SecOps
    to provide analysts with ownership context.


    ### Parameters Description

    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | This is an integration-level configuration parameter
    used to authenticate requests to the Whois XML API. It is not an action-specific
    parameter but is required for the action to function. |


    ### Additional Notes

    - This action only processes Hostname entities that are marked as **not internal**
    (`is_internal` is false).

    - The retrieved registrant details are added to the `additional_properties` of
    the entity, making them visible in the Entity Explorer.


    ### Flow Description

    1. **Initialization**: The action retrieves the API Key from the integration configuration
    and constructs the base URL for the Whois XML API service.

    2. **Entity Filtering**: It iterates through the `target_entities` in the current
    context, selecting only Hostnames (where `is_internal` is false) and URLs.

    3. **API Request**: For each valid entity, a GET request is sent to the Whois
    XML API to fetch the WHOIS record in JSON format.

    4. **Data Extraction**: The action parses the API response to extract registrant
    details (e.g., name, organization) from the `WhoisRecord` object.

    5. **Internal Enrichment**: If registrant data is found, the action updates the
    entity's `additional_properties` with this information.

    6. **Finalization**: The action updates the entities within Google SecOps, attaches
    the full JSON response to the action results, and returns a summary message listing
    the successfully processed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
