Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and the **Whois XML API** service. Its primary purpose is to ensure
    that the integration's configuration, specifically the API Key, is valid and that
    the service endpoint is reachable.


    ### Parameters Description

    This action does not require any input parameters. It relies solely on the global
    integration configuration.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `API Key` from the integration's
    configuration settings.

    2. **Connectivity Test**: It performs a test GET request to the Whois XML API
    endpoint, specifically requesting WHOIS data for the domain `google.com` to validate
    the connection.

    3. **Authentication Check**: The action inspects the API response for specific
    error strings, such as "ApiKey authenticate failed", to determine if the credentials
    are valid.

    4. **Status Reporting**: If the request is successful and no authentication errors
    are found, the action returns a success status; otherwise, it raises an exception.
