  ai_description: >-
    ### General Description

    This action retrieves detailed WHOIS information for a specified domain using
    the WHOIS XML API. It fetches the domain's registration details and optionally
    checks its availability, returning the data as a JSON object for use in subsequent
    playbook steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Domain Name | String | Yes | The domain name to query for WHOIS details. |

    | Check availability | Boolean | No | If set to true, the action will also check
    if the domain is available for registration. |


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Retrieves the `Domain Name` and `Check availability` parameters.

    3. Constructs the API request URL with the provided parameters.

    4. Executes a GET request to the WHOIS XML API.

    5. Parses the response and attaches the WHOIS details as a JSON result to the
    action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the WHOIS XML API to fetch domain details,
      meaning it fetches data. It does not perform any POST/PUT/DELETE requests, so
      it does not mutate external data. It does not call any internal mutation methods
      like update_entities, add_entity_insight, or add_case_comment, so it does not
      mutate internal data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (WHOIS XML API) and does not
      mutate any external or internal state. Therefore, it strictly meets the criteria
      for an enrichment action. It does not perform any containment, blocking, or
      identity manipulation, so it is not a remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. It
      relies entirely on the 'Domain Name' action parameter provided by the user or
      playbook. Therefore, the entity types list is empty and no entity filtering
      occurs.
