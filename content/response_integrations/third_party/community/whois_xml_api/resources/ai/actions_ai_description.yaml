  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities using the Whois XML API. This action retrieves
    detailed registration information, such as registrant name, organization, and
    contact details, and maps this data directly to the entity's additional properties
    within Google SecOps. This provides analysts with immediate context regarding
    the ownership and history of external domains and URLs.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the 'API
    Key' provided in the integration configuration.


    ### Flow Description

    1. **Configuration Retrieval**: Extracts the Whois XML API Key from the integration's
    global configuration.

    2. **Entity Filtering**: Iterates through the target entities in the current context,
    selecting only those that are of type `HOSTNAME` (and are not marked as internal)
    or `URL`.

    3. **External API Query**: For each eligible entity, it performs a GET request
    to the Whois XML API service using the entity's identifier as the domain name.

    4. **Data Extraction**: Parses the JSON response to locate the `WhoisRecord` and
    specifically the `registrant` details.

    5. **Internal Enrichment**: Updates the entity's `additional_properties` with
    the retrieved registrant information.

    6. **Finalization**: Reports the successfully enriched entities back to Google
    SecOps, updates the entity objects in the platform, and provides a summary message
    of the results.
  capabilities:
