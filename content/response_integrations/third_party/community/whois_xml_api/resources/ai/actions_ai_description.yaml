Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities using the WHOIS XML API. It retrieves domain
    registration details and updates the entities in the SecOps platform with the
    newly acquired contextual data.


    ### Flow Description

    1. Iterates through the target entities provided to the action.

    2. Filters the entities to process only external Hostnames (`is_internal` is false)
    and URLs.

    3. Makes an HTTP GET request to the WHOIS XML API for each valid entity to retrieve
    WHOIS records.

    4. Parses the JSON response to extract registrant details.

    5. Updates the entity's `additional_properties` with the extracted registrant
    data.

    6. Saves the updated entities back to the platform using `siemplify.update_entities`
    and attaches the raw JSON response to the action results.


    ### Additional Notes

    This action relies on the WHOIS XML API integration configuration for its API
    key. It will skip any internal Hostname entities.
  ai_short_description: >-
    Enriches external Hostname and URL entities by retrieving domain registration
    details from the WHOIS XML API and updating the entities within the platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional_properties of Hostname and URL entities with WHOIS registrant
      details.
    reasoning: >-
      The action makes an HTTP GET request to the WHOIS XML API to fetch domain registration
      data (fetches_data=true). It does not mutate external data (can_mutate_external_data=false).
      It updates internal entities by modifying their additional_properties and calling
      siemplify.update_entities (can_mutate_internal_data=true, can_update_entities=true).
      It does not create insights, modify alerts, or create case comments.
  entity_usage:
