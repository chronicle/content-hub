  ai_description: >-
    ### General Description

    This action enriches Hostname and URL entities by retrieving WHOIS registration
    data from the Whois XML API. It enhances the context of these entities within
    the SOAR platform by populating their additional properties with registrant details,
    aiding in threat investigation and attribution.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key required to authenticate with the Whois
    XML API service. |


    ### Flow Description

    1. **Initialization**: The action retrieves the API key from the integration configuration.

    2. **Entity Filtering**: It iterates through the provided target entities, filtering
    for `HOSTNAME` (excluding internal hosts) and `URL` entities.

    3. **Data Retrieval**: For each valid entity, it constructs a query and performs
    a GET request to the Whois XML API to fetch registration information.

    4. **Entity Update**: If registrant details are found in the API response, the
    action updates the entity's `additional_properties` with this data.

    5. **Finalization**: The action pushes the updated entity information back to
    the SOAR platform and returns the count of successfully processed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity `additional_properties` with registrant details retrieved from
      the Whois XML API.
    reasoning: >-
      The action fetches WHOIS data from an external API (fetches_data=true). It does
      not mutate external systems (can_mutate_external_data=false). It updates internal
      entity properties using `siemplify.update_entities` (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alert data, or
      create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Whois XML API) and updates
      internal entity properties without modifying any external systems. This aligns
      with the definition of an enrichment action.
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters for `HOSTNAME`
      (where `is_internal` is false) and `URL` (mapped to `DestinationURL`).
