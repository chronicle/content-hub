Get Domain Details:
  ai_description: >-
    ### General Description

    The **Get Domain Details** action retrieves comprehensive WHOIS information for
    a specified domain using the WHOIS XML API. It allows analysts to gather registration
    details, ownership information, and optionally check the domain's availability
    status. The results are returned as a JSON object, making them accessible for
    subsequent playbook steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domain Name | String | Yes | The specific domain (e.g., google.com) to perform
    the WHOIS lookup on. |

    | Check availability | Boolean | No | If set to "true", the action will include
    domain availability information in the response. Defaults to "false". |


    ### Additional Notes

    This action does not automatically process entities from the Google SecOps case.
    It relies entirely on the provided "Domain Name" parameter. To use this action
    with case entities, the domain must be passed into the "Domain Name" parameter
    via a placeholder.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Key from the integration's
    configuration settings.

    2. **Parameter Extraction**: It extracts the target domain name and the availability
    check preference from the action parameters.

    3. **Request Construction**: A GET request URL is constructed, incorporating the
    API key, the target domain, and the availability flag.

    4. **API Interaction**: The action sends a request to the WHOIS XML API service.

    5. **Data Processing**: The JSON response from the API is captured.

    6. **Result Output**: The retrieved data is attached to the action results in
    JSON format for use in the Google SecOps platform.
