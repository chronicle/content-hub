Ping:
  ai_description: >-
    ### General Description

    This action checks connectivity to the WHOIS XML API to ensure that the integration
    is configured correctly and the provided credentials are valid.


    ### Flow Description

    1. Extracts the API Key from the integration configuration.

    2. Makes an HTTP GET request to the WHOIS XML API using a test domain (`google.com`).

    3. Evaluates the response to verify if the API key authentication is successful.

    4. Returns a success message if the connection is established and authenticated.


    ### Additional Notes

    This action does not require any specific parameters as it relies solely on the
    integration-level configuration.
