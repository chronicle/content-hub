Get Domain Details:
  ai_description: >-
    ### General Description

    Retrieves domain registration and WHOIS details from the WHOIS XML API for a specified
    domain name. The action fetches this contextual data and outputs it as a JSON
    result for use in subsequent playbook steps.


    ### Flow Description

    1. Extracts the `Domain Name` and `Check availability` preferences from the action
    parameters.

    2. Constructs the API request URL using the provided parameters and the integration's
    API key.

    3. Executes an HTTP GET request to the WHOIS XML API (`https://www.whoisxmlapi.com/whoisserver/WhoisService`).

    4. Parses the JSON response and attaches it to the action's JSON result and context
    details.


    ### Additional Notes

    This action operates on a specific domain provided as an input parameter rather
    than iterating over case entities.
