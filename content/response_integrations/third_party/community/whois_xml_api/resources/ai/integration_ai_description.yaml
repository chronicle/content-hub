  reasoning: >-
    The integration provides WHOIS data, which is used to determine the reputation
    and registration details of domains and IP addresses. This aligns perfectly with
    the 'Threat Intelligence' category, which is used for the first step of enrichment
    for external indicators (IP, Hash, URL) to determine reputation. The actions 'Enrich
    Entities' and 'Get Domain Details' are specifically designed for this purpose.
    It does not perform any functions related to SIEM, EDR, Network Security (blocking),
    Email, IAM, Cloud, ITSM, Vulnerability Management, Asset Inventory, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
