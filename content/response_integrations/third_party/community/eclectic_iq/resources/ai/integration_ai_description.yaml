  network_security: false
  reasoning: >-
    The EclecticIQ integration is a Threat Intelligence Platform (TIP) solution. The
    'Enrich Entities' action retrieves threat intelligence data (such as risk scores
    and malware family information) for indicators, which directly aligns with the
    'Threat Intelligence' category definition of enriching external indicators to
    determine reputation. Additionally, the 'EclecticIQ - Feed Connector' is designed
    to ingest threat intelligence feeds into the SOAR platform, further solidifying
    its classification as a Threat Intelligence integration. It does not perform functions
    related to SIEM (log analysis), EDR (host containment), Network Security (gateway
    blocking), Email Security, IAM, Cloud Security, ITSM, Vulnerability Management,
    Asset Inventory, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
