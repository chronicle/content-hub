product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The EclecticIQ integration is primarily designed for Threat Intelligence. The
    'Enrich Entities' action retrieves threat intelligence data (reputation, metadata)
    for indicators, which directly aligns with the Threat Intelligence category's
    goal of determining reputation and confirming alerts. Additionally, the 'EclecticIQ
    - Feed Connector' ingests threat intelligence feeds into the SOAR platform to
    create alerts, further solidifying its role in threat intelligence. The integration
    does not perform SIEM log analysis, EDR host containment, network security blocking,
    email security, IAM management, cloud security, ITSM ticketing, vulnerability
    management, asset inventory, or collaboration/approval workflows as defined in
    the provided categories.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
