EclecticIQ - Feed Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the EclecticIQ Intelligence Center to ingest threat
    intelligence data from configured outgoing feeds. It periodically polls the EclecticIQ
    platform for new content blocks, parses the CSV data, and converts them into alerts
    within Google SecOps (SOAR). This allows security teams to automate the ingestion
    of threat intelligence and trigger downstream workflows based on the received
    indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | String | Yes | The authentication token for the EclecticIQ API.
    |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EclecticIQ URL | String | Yes | The base URL of the EclecticIQ instance. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Outgoing Feed ID | String | Yes | The ID of the outgoing feed to fetch entities
    from. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    script execution. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates for API requests.
    |


    ### Flow Description

    1. The connector initializes a connection to the EclecticIQ platform using the
    provided URL and API Token.

    2. It validates the configured Outgoing Feed ID against the available feeds in
    the EclecticIQ instance.

    3. It retrieves the list of content blocks associated with the specified feed.

    4. It checks the local state to identify the last processed content block ID to
    avoid duplicate ingestion.

    5. For each new content block, it fetches the raw CSV data from the EclecticIQ
    platform.

    6. It parses the CSV data and maps the records into SOAR alert and event structures.

    7. The generated alerts are packaged and ingested into the SOAR system.

    8. The connector updates the local state with the latest processed content block
    ID.
