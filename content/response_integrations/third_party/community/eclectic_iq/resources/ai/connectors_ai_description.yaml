EclecticIQ - Feed Connector:
  ai_description: "### General Description\nThis connector integrates with the EclecticIQ\
    \ Intelligence Center to ingest threat intelligence data into Google SecOps. It\
    \ specifically targets \"Outgoing Feeds\" configured within EclecticIQ, downloading\
    \ content blocks (typically in CSV format) and converting the contained observables\
    \ and entities into structured alerts and events. This enables security teams\
    \ to automate the ingestion of curated intelligence for correlation and incident\
    \ response.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| API Token | Password | Yes | The API token\
    \ used to authenticate with the EclecticIQ Intelligence Center API. |\n| EclecticIQ\
    \ URL | String | Yes | The base URL of the EclecticIQ instance (e.g., https://eclecticiq.local).\
    \ |\n| Outgoing Feed ID | String | Yes | The specific ID of the Outgoing Feed\
    \ from which the connector will fetch entities. |\n| DeviceProductField | String\
    \ | Yes | The field name used to determine the device product in the ingested\
    \ data (Default: EclecticIQ). |\n| EventClassId | String | Yes | The field name\
    \ used to determine the event name or sub-type (Default: Threat Intelligence).\
    \ |\n| PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for\
    \ the python process running the current script. |\n| Verify SSL | Boolean | No\
    \ | If enabled, the connector will verify the SSL certificate of the EclecticIQ\
    \ server. |\n\n### Flow Description\n1. **Authentication**: The connector establishes\
    \ a secure session with the EclecticIQ Intelligence Center using the provided\
    \ API Token and URL.\n2. **Feed Validation**: It verifies that the configured\
    \ `Outgoing Feed ID` is valid and accessible on the platform.\n3. **Content Discovery**:\
    \ The connector queries for available content blocks associated with the specified\
    \ outgoing feed.\n4. **Checkpointing**: It retrieves the ID of the last successfully\
    \ processed content block from the internal database to ensure only new data is\
    \ ingested.\n5. **Data Retrieval and Parsing**: For every new content block identified,\
    \ the connector downloads the data (CSV format) and parses it into individual\
    \ records.\n6. **Alert Transformation**: Each record is mapped to a Google SecOps\
    \ Alert object, utilizing fields like `entity.title` for the alert name and `entity.id`\
    \ for the unique identifier.\n7. **Event Mapping**: Detailed attributes from the\
    \ EclecticIQ record\u2014including observable values, types, descriptions, confidence\
    \ levels, and source names\u2014are mapped into a SOAR event attached to the alert.\n\
    8. **Ingestion**: The generated alerts and events are ingested into Google SecOps\
    \ for case creation.\n9. **State Update**: Upon successful processing, the connector\
    \ updates the checkpoint with the latest content block ID to prevent duplicate\
    \ ingestion in subsequent runs."
