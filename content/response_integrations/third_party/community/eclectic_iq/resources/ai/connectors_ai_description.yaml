EclecticIQ - Feed Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the EclecticIQ Intelligence Center to ingest threat
    intelligence data from configured outgoing feeds. It retrieves indicators and
    observables from specific feeds and converts them into alerts and cases within
    Google SecOps, enabling security teams to monitor and act on external threat intelligence.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | Password | Yes | The API token used to authenticate with the EclecticIQ
    Intelligence Center. |

    | EclecticIQ URL | String | Yes | The base URL of the EclecticIQ instance (e.g.,
    https://eclecticiq.local). |

    | Outgoing Feed ID | String | Yes | The specific ID of the outgoing feed from
    which to fetch data. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product (default: EclecticIQ). |

    | EventClassId | String | Yes | The field name used to determine the event name/sub-type
    (default: Threat Intelligence). |

    | PythonProcessTimeout | String | Yes | The timeout limit in seconds for the script
    execution. |

    | Verify SSL | Boolean | No | Whether to verify the SSL certificate of the EclecticIQ
    server. |


    ### Flow Description

    1. **Authentication**: Connects to the EclecticIQ Intelligence Center using the
    provided API Token and URL.

    2. **Feed Validation**: Validates that the specified `Outgoing Feed ID` exists
    and is accessible.

    3. **Content Discovery**: Retrieves a list of available content blocks (data batches)
    associated with the configured feed.

    4. **Checkpointing**: Reads the last processed block ID from the internal database
    to ensure only new data is ingested.

    5. **Data Retrieval**: Fetches the CSV-formatted data for each new content block
    identified.

    6. **Parsing and Mapping**: Parses the CSV records, extracting entity details
    such as titles, descriptions, confidence levels, tags, and platform URLs.

    7. **Alert Creation**: Maps the extracted data into Google SecOps Alert and Event
    objects, assigning a default priority and categorizing them under the EclecticIQ
    product.

    8. **Ingestion**: Ingests the alerts into the system and updates the checkpoint
    with the latest processed block ID to maintain state for the next run.
