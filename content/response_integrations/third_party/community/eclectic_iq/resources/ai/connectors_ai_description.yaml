EclecticIQ - Feed Connector:
  ai_description: >-
    ### General Description

    This connector facilitates the ingestion of threat intelligence data from an EclecticIQ
    Intelligence Center instance into Google SecOps SOAR. By polling a configured
    outgoing feed, it retrieves new content blocks and transforms them into actionable
    alerts, enabling security teams to integrate EclecticIQ's threat intelligence
    directly into their incident response workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Token | Password | Yes | The API token used for authentication with the
    EclecticIQ instance. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EclecticIQ URL | String | Yes | The base URL of the EclecticIQ Intelligence
    Center instance. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | Outgoing Feed ID | String | Yes | The ID of the outgoing feed from which to
    fetch entities. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates when connecting
    to the EclecticIQ API. |


    ### Flow Description

    1. The connector initializes a connection to the EclecticIQ Intelligence Center
    using the provided URL and API token.

    2. It validates the existence of the specified `Outgoing Feed ID`.

    3. It retrieves a list of available content blocks from the feed.

    4. The connector checks the local state to identify and skip previously processed
    content blocks.

    5. For each new content block, it fetches the raw data from the EclecticIQ API.

    6. The retrieved data is parsed and mapped into `AlertInfo` objects, including
    relevant metadata like entity titles, descriptions, and source information.

    7. The generated alerts are returned to the SOAR platform for case creation and
    further investigation.

    8. The connector updates the local state with the latest processed block ID to
    ensure subsequent runs only fetch new data.
