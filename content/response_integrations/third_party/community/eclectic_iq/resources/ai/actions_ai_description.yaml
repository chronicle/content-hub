  ai_description: >-
    Enriches entities using the EclecticIQ platform. This action retrieves threat
    intelligence, entity details, and platform links for the provided entities, updates
    the entities with this information, and adds entity links and tables to the SOAR
    case.


    ### Flow Description

    1. Initialize `EclecticIQManager` with configuration.

    2. Fetch observables and entity information from EclecticIQ for the provided target
    entities.

    3. Parse the retrieved data into enrichment details, links, and tables.

    4. Update the entities in the SOAR platform with the enriched data.

    5. Add entity links and tables to the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | EclecticIQ URL | String | Yes | The base URL for the EclecticIQ instance. |

    | API Token | String | Yes | The authentication token for the EclecticIQ API.
    |

    | Verify SSL | Boolean | Yes | Boolean flag to enable/disable SSL verification.
    |


    ### Additional Notes

    None.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds entity links/tables to the SOAR
      case.
    reasoning: >-
      The action fetches threat intelligence data from EclecticIQ (fetches_data=true).
      It does not modify external systems (can_mutate_external_data=false). It updates
      internal SOAR entities with the retrieved data (can_mutate_internal_data=true,
      can_update_entities=true). It adds entity links and tables, which are forms
      of insights (can_create_insight=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (EclecticIQ) and updates internal
      entities without modifying external systems. This fits the definition of an
      Enrichment action.
  entity_usage:
