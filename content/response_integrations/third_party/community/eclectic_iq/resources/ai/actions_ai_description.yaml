  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the **EclecticIQ** platform. It ensures that the provided
    configuration parameters, such as the URL and API Token, are correct and that
    the network path is open.


    ### Parameters Description

    There are no user-input parameters for this action. It relies entirely on the
    integration's global configuration (EclecticIQ URL, API Token, and Verify SSL).


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting communication issues.

    - It performs a simple GET request to the EclecticIQ 'sources' endpoint to validate
    the API Token and connectivity.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the `EclecticIQ URL`, `API
    Token`, and `Verify SSL` settings from the integration configuration.

    2. **Manager Initialization:** An instance of the `EclecticIQManager` is created
    using the retrieved settings.

    3. **Connectivity Test:** The manager executes a `test_connectivity` call, which
    sends a GET request to the EclecticIQ API `/api/v2/sources` endpoint.

    4. **Result Handling:** If the request is successful, the action completes with
    a success status. If an exception occurs (e.g., authentication failure or network
    timeout), the action fails and provides a descriptive error message.
