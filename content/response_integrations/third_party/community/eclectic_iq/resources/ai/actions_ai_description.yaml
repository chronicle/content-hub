Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between the Google SecOps platform and the EclecticIQ\
    \ instance. It ensures that the provided configuration parameters, such as the\
    \ URL and API Token, are correct and that the network path is open.\n\n### Parameters\
    \ Description\nThis action does not require any input parameters. It relies solely\
    \ on the integration's global configuration settings (EclecticIQ URL, API Token,\
    \ and Verify SSL).\n\n### Flow Description\n1. **Initialization**: The action\
    \ initializes the Siemplify context and retrieves the global integration configuration.\n\
    2. **Manager Setup**: It instantiates the `EclecticIQManager` using the configured\
    \ URL, API Token, and SSL verification setting.\n3. **Connectivity Test**: The\
    \ action calls the `test_connectivity` method, which performs a GET request to\
    \ the EclecticIQ `/api/v2/sources` endpoint.\n4. **Result Handling**: \n    *\
    \ If the request is successful, the action completes with a success status and\
    \ a confirmation message.\n    * If an exception occurs (e.g., authentication\
    \ failure, network timeout), the action fails and provides the error details in\
    \ the output message.\n\n### Additional Notes\n- This action is typically used\
    \ during the initial setup of the integration or for troubleshooting communication\
    \ issues.\n- It does not process any entities or modify any data within EclecticIQ\
    \ or Google SecOps."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
