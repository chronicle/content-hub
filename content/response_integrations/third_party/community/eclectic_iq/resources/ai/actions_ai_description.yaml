Ping:
  ai_description: >-
    ### General Description

    This action facilitates testing connectivity with the EclecticIQ platform. It
    verifies that the provided integration credentials and network configurations
    are valid and operational.


    ### Flow Description

    1. Retrieves the integration configuration, including the EclecticIQ URL and API
    Token.

    2. Initializes the EclecticIQ Manager and attempts to establish a connection.

    3. Makes an HTTP GET request to the `/api/v2/sources` endpoint to validate authentication
    and network access.

    4. Returns a successful execution state if the request succeeds, or a failed state
    with an error message if it fails.


    ### Additional Notes

    This action does not interact with case data, alerts, or entities. It is strictly
    used as a health check or diagnostic tool to ensure the integration is properly
    configured.
  ai_short_description: >-
    Tests connectivity to the EclecticIQ platform to ensure valid credentials and
    network access.
