  ai_description: >-
    ### General Description

    Sends entities from a Google SecOps case to the EclecticIQ Intelligence Center.
    By default, the action creates a **sighting** for each supported entity, associating
    it with the current case metadata. Users can optionally configure the action to
    also create an **indicator** entity in EclecticIQ.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Group Name** | String | Yes | The name of the EclecticIQ Intelligence Center
    Group (e.g., "Testing Group") where the entities will be created. |

    | **Create Indicator** | Boolean | No | If set to `true`, the action creates both
    a sighting and an indicator in EclecticIQ. If `false` (default), only a sighting
    is created. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the EclecticIQ URL, API token, and SSL
    verification settings from the integration configuration, along with the action-specific
    parameters (`Group Name`, `Create Indicator`).

    2. **Source Identification:** Queries the EclecticIQ API to find the internal
    `source_id` associated with the provided `Group Name`.

    3. **Data Preparation:** Maps SecOps entities (IPs, Domains, Hashes, etc.) to
    their corresponding EclecticIQ observable types. It also aggregates case metadata
    (Title, Description, Priority, etc.) to include in the EclecticIQ description
    field.

    4. **Entity Creation:** Sends a `PUT` request to the EclecticIQ `/api/v2/entities`
    endpoint to create the sighting (and optionally the indicator).

    5. **Internal Updates:** Adds a comment to the SecOps case wall confirming the
    operation and provides a direct platform link to the created entity in the action
    results.


    ### Additional Notes

    - Supported entity types include Hostnames, IP Addresses, Processes, File Names,
    File Hashes (SHA256), URLs, CVEs, Credit Cards, Phone Numbers, Threat Actors,
    and Domains.

    - The action uses UUID v5 (based on the case identifier) to ensure consistent
    ID generation for sightings and indicators within EclecticIQ.
