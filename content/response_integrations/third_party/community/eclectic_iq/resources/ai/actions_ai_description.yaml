Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities using EclecticIQ by retrieving observable and entity information.
    This action fetches threat intelligence data from EclecticIQ and updates the entities
    within Google SecOps with the retrieved context.


    ### Flow Description

    1. Iterates through all target entities provided in the case.

    2. Makes a GET request to the EclecticIQ API (`/api/v2/observables`) to fetch
    observable information for the entity identifiers.

    3. Makes a GET request to the EclecticIQ API (`/api/v2/entities`) to fetch related
    entity information based on the retrieved observable IDs.

    4. Makes a GET request to the EclecticIQ API (`/api/v2/sources`) to fetch source
    information and map it to the entities.

    5. Parses the retrieved data and updates the entities' additional properties in
    Google SecOps.

    6. Adds entity links, tables, and JSON results to the case for analyst review.


    ### Additional Notes

    - Entities successfully enriched will have their `is_enriched` flag set to True.

    - If an entity is not found in EclecticIQ, it will be reported in the output message.
  ai_short_description: >-
    Enriches entities using EclecticIQ by retrieving observable and entity information,
    updating the entities in Google SecOps with the retrieved threat intelligence
    context.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with additional properties, sets the `is_enriched` flag, and
      adds entity links, tables, and JSON results to the case.
    reasoning: >-
      The action fetches data from EclecticIQ via GET requests. It does not mutate
      external data. It mutates internal data by updating entities with additional
      properties, setting the `is_enriched` flag, and adding entity links, tables,
      and JSON results to the case. It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
