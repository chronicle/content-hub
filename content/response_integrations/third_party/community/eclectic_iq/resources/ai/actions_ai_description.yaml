Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches multiple entity types using the EclecticIQ threat intelligence platform.
    This action retrieves detailed context, including observable types, confidence
    scores (maliciousness), and related entity information such as titles, descriptions,
    tags, and sources. The retrieved data is used to update the entity's profile within
    Google SecOps, providing analysts with immediate threat context.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: Connects to the EclecticIQ API using the configured URL
    and API Token.

    2. **Data Retrieval**: Fetches observable information for all target entities
    in the current scope from the EclecticIQ platform.

    3. **Contextual Enrichment**: Retrieves related entity data from EclecticIQ for
    the identified observables to provide broader threat context.

    4. **Data Processing**:
        * Generates a JSON result containing the full enrichment payload.
        * Creates platform links for each enriched entity, allowing analysts to pivot
    directly to the EclecticIQ UI.
        * Constructs CSV tables for each entity detailing related threat intelligence
    and sources.
    5. **Entity Update**: Updates the Google SecOps entities with the retrieved metadata
    (prefixed with 'EIQ') and marks them as enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with threat intelligence data and sets
      the 'is_enriched' flag to true.
  categories:
