  ai_description: >-
    ### General Description

    The Ping action is used to test the connectivity between Google SecOps and the
    EclecticIQ platform. It verifies that the provided integration configuration (URL,
    API Token) is valid and that the platform is reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration configuration parameters (EclecticIQ URL, API Token, Verify SSL).


    ### Flow Description

    1. The action retrieves the integration configuration parameters (EclecticIQ URL,
    API Token, Verify SSL).

    2. It attempts to establish a connection to the EclecticIQ platform by making
    a test API request to the `/api/v2/sources` endpoint.

    3. If the request is successful, the action completes and returns a success message.

    4. If the request fails, the action catches the exception, logs the error, and
    returns a failure status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a Ping action that only tests connectivity to the EclecticIQ platform.
      It does not fetch contextual data, mutate external data, or mutate internal
      data.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping', which explicitly excludes it from being an enrichment
      action. It also does not perform any remediation tasks.
    remediation: false
