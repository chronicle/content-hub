Send Entities to EclecticIQ:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action exports entities to a Threat Intelligence Platform (EclecticIQ) as
      sightings or indicators. This does not match any of the predefined expected
      outcomes such as enriching an IOC, updating an alert, creating a ticket, or
      blocking an IOC.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Sends entities from the case to EclecticIQ as sightings. It can optionally create
    an indicator entity alongside the sighting.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Group Name | String | Yes | EclecticIQ Intelligence Center Group Name (e.g.,
    Testing Group). |

    | Create Indicator | Boolean | No | If true, both a sighting and an indicator
    will be created. If false, only a sighting will be created in EclecticIQ. |


    ### Flow Description

    1. Retrieves configuration and parameters.

    2. Fetches the source ID for the specified group from EclecticIQ.

    3. Maps the target entities to EclecticIQ extract kinds based on their entity
    types.

    4. Creates a sighting (and optionally an indicator) in EclecticIQ containing the
    case details and entity extracts.

    5. Adds a case comment indicating success and attaches an entity link to the result.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a sighting and optionally an indicator entity in EclecticIQ.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a case comment indicating successful creation of entities in EclecticIQ.
    reasoning: >-
      The action does not fetch contextual data for enrichment. It mutates external
      data by creating sightings and indicators in EclecticIQ via a PUT request. It
      mutates internal data by adding a case comment upon successful creation.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by creating entities in EclecticIQ, so it cannot
      be classified as Enrichment. It does not perform any containment, blocking,
      or identity revocation, so it is not a Remediation action.
    remediation: false
  entity_usage:
    entity_types:
    - HOSTNAME
    - ADDRESS
    - PROCESS
    - PARENTPROCESS
    - CHILDPROCESS
    - FILENAME
    - FILEHASH
    - PARENTHASH
    - CHILDHASH
    - CVEID
    - CREDITCARD
    - PHONENUMBER
    - CVE
    - THREATACTOR
    - SOURCEDOMAIN
    - DESTINATIONDOMAIN
    - DOMAIN
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      if their `entity_type` is present in the `ENTITY_MAP` dictionary. Therefore,
      it filters by entity type and supports the types defined in the map.
