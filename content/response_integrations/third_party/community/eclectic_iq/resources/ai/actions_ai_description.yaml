Send Entities to EclecticIQ:
  ai_description: >-
    Sends entities from a Google SecOps case to the EclecticIQ Intelligence Center.
    This action allows analysts to export case context and associated entities as
    sightings or indicators within EclecticIQ, facilitating threat intelligence sharing
    and external tracking. By default, the action creates a sighting for each supported
    entity found in the case. If configured, it can also create an indicator object.
    The action utilizes case metadata such as title, description, priority, and status
    to provide context for the created objects in EclecticIQ.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the EclecticIQ configuration (URL, API
    Token) and action parameters (Group Name, Create Indicator flag).

    2. **Source Identification:** Queries the EclecticIQ API to find the internal
    source ID associated with the provided 'Group Name'.

    3. **Entity Mapping:** Iterates through the target entities in the SecOps case
    and maps them to EclecticIQ extract types (e.g., IP to ipv4, Domain to domain).

    4. **Data Construction:** Builds a sighting object (and optionally an indicator
    object) containing the case metadata and the list of entity extracts.

    5. **External Creation:** Sends a PUT request to the EclecticIQ API to create
    the entities within the platform.

    6. **Internal Updates:** Adds a comment to the SecOps case confirming the action's
    success and provides a direct platform link to the created data in the action
    results.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | string | Yes | The name of the EclecticIQ Intelligence Center Group
    (e.g., 'Testing Group') where the sightings/indicators will be created. |

    | Create Indicator | boolean | No | If set to 'true', the action creates both
    a sighting and an indicator in EclecticIQ. If 'false' (default), only a sighting
    is created. |


    ### Additional Notes:

    - The action supports a wide range of entity types including IP addresses, hostnames,
    file hashes, domains, and CVEs.

    - Case metadata is formatted as HTML within the EclecticIQ description field to
    maintain readability.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new sighting and indicator records within the EclecticIQ Intelligence
      Center platform via PUT requests.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a comment to the Google SecOps case to log the successful export of entities
      to EclecticIQ.
