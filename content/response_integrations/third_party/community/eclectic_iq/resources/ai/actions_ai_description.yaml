  ai_description: >-
    Sends entities from a Google SecOps case to the EclecticIQ Intelligence Center
    as sightings or indicators. The action retrieves the source ID for the specified
    group, constructs a sighting object (and optionally an indicator object) using
    case and entity data, and sends the data to EclecticIQ via a PUT request. Finally,
    it adds a comment to the case and links the EclecticIQ entity in the results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | string | Yes | The EclecticIQ Intelligence Center Group Name. |

    | Create Indicator | boolean | No | If true, creates both a sighting and an indicator;
    otherwise, only a sighting. |


    ### Flow Description

    1. Extracts configuration (URL, API Token, SSL verification) and action parameters
    (Group Name, Create Indicator).

    2. Initializes the EclecticIQManager.

    3. Retrieves the source ID for the specified group from EclecticIQ.

    4. Constructs a sighting object containing case details and entity information.

    5. Optionally constructs an indicator object if 'Create Indicator' is true.

    6. Sends the data to EclecticIQ via a PUT request.

    7. Adds a comment to the case and links the EclecticIQ entity in the results.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates sightings and optionally indicators in the EclecticIQ Intelligence Center.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a case comment and an entity link to the Google SecOps case.
    reasoning: >-
      The action fetches the group source ID (fetches_data=true), creates entities
      in EclecticIQ (can_mutate_external_data=true), and adds a case comment and entity
      link (can_mutate_internal_data=true, can_create_case_comments=true).
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data (creates entities in EclecticIQ), so it is
      not an enrichment action.
