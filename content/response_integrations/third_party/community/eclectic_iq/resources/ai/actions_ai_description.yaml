  ai_description: >-
    ### General Description

    This action facilitates testing connectivity with the EclecticIQ platform. It
    verifies that the SOAR platform can successfully communicate with the EclecticIQ
    instance using the provided credentials, ensuring the integration is correctly
    configured.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | EclecticIQ URL | String | Yes | The base URL of the EclecticIQ instance. |

    | API Token | String | Yes | The authentication token for the EclecticIQ API.
    |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates during the connection.
    |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the EclecticIQ URL, API Token,
    and SSL verification setting from the integration configuration.

    2. **Initialization**: The EclecticIQ Manager is initialized with the provided
    credentials.

    3. **Connectivity Test**: A test GET request is performed against the EclecticIQ
    API (specifically the sources endpoint) to verify connectivity.

    4. **Result**: The action returns a success or failure status based on the API
    response, logging the outcome for the analyst.
