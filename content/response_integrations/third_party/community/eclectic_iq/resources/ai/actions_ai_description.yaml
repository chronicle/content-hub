  ai_description: >-
    ### General Description

    Enriches entities within Google SecOps by retrieving threat intelligence data
    from the EclecticIQ platform. This action queries EclecticIQ for observables matching
    the entity identifiers and fetches associated entity metadata, such as confidence
    levels, maliciousness, tags, and source information. The retrieved data is used
    to update entity attributes, provide direct platform links, and populate data
    tables for analyst review.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    - The action automatically prefixes enriched entity fields with "EIQ".

    - It sets the `is_enriched` flag to `true` for all successfully processed entities.

    - It generates external links to the EclecticIQ platform for both observables
    and related entities.


    ### Flow Description

    1. **Initialization**: Connects to the EclecticIQ API using the configured URL
    and API Token.

    2. **Observable Lookup**: Queries the EclecticIQ `/api/v2/observables` endpoint
    using the identifiers of all target entities in the current context.

    3. **Entity Retrieval**: For every observable found, it queries the `/api/v2/entities`
    endpoint to find related threat intelligence entities.

    4. **Source Enrichment**: Fetches source names from the EclecticIQ platform to
    provide context on where the intelligence originated.

    5. **Internal Data Update**: Flattens the retrieved intelligence and updates the
    Google SecOps entities' `additional_properties`.

    6. **UI Enhancement**: Adds CSV-formatted data tables and direct platform links
    to the entity's context in the SecOps interface.
  capabilities:
