      It updates the entities in the SOAR platform with this information and adds
      entity links and tables to the action results. It does not mutate external systems.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (EclecticIQ) and updates internal
      entities without mutating external systems. This fits the definition of an enrichment
      action.
