  ai_description: >-
    Enriches entities using EclecticIQ. This action queries the EclecticIQ platform
    for observables matching the entity identifiers and retrieves associated threat
    intelligence and entity information.


    ### Parameters

    There are no user-configurable parameters for this action.


    ### Action Flow

    1. Initializes the EclecticIQ manager with integration configurations.

    2. Iterates over target entities and fetches observable and entity information
    from EclecticIQ.

    3. Parses the retrieved data to extract threat intelligence, tags, and platform
    links.

    4. Updates the entities in Google SecOps with the enriched data.

    5. Attaches JSON results, entity links, and data tables to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data from EclecticIQ.
    reasoning: >-
      The action fetches data from EclecticIQ using GET requests to observables and
      entities endpoints. It does not mutate external data. It mutates internal data
      by updating entities with the fetched enrichment data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data, does not mutate external data, and only updates entities
      internally. This perfectly matches the enrichment category criteria.
    remediation: false
