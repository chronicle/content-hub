Send Entities to EclecticIQ:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action exports entities to an external Threat Intelligence Platform (EclecticIQ)
      to create sightings or indicators. It does not match any of the provided categories
      (Enrichment, Containment, Ticketing, etc.).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Sends entities from a Google SecOps case to the EclecticIQ Intelligence Center
    as sightings or indicators. The action retrieves the source ID for the specified
    group, constructs a sighting object (and optionally an indicator object) using
    case and entity data, and sends the data to EclecticIQ via a PUT request. Finally,
    it adds a comment to the case and links the EclecticIQ entity in the results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | string | Yes | The EclecticIQ Intelligence Center Group Name. |

    | Create Indicator | boolean | No | If true, creates both a sighting and an indicator;
    otherwise, only a sighting. |


    ### Flow Description

    1. Extracts configuration (URL, API Token, SSL verification) and action parameters
    (Group Name, Create Indicator).

    2. Initializes the EclecticIQManager.

    3. Retrieves the source ID for the specified group from EclecticIQ.

    4. Constructs a sighting object containing case details and entity information.

    5. Optionally constructs an indicator object if 'Create Indicator' is true.

    6. Sends the data to EclecticIQ via a PUT request.

    7. Adds a comment to the case and links the EclecticIQ entity in the results.


    ### Additional Notes

    The action requires a valid EclecticIQ API token and URL configured in the integration
    settings. The 'Group Name' parameter must match an existing group in EclecticIQ.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a PUT request to the EclecticIQ API to create sightings or indicators
      based on the case entities.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a comment to the case and links the EclecticIQ entity in the results.
    reasoning: >-
      The action makes a PUT request to create entities in EclecticIQ (can_mutate_external_data=true).
      It adds a comment to the case (can_mutate_internal_data=true, can_create_case_comments=true).
      It does not fetch contextual data about the entities (fetches_data=false) or
      update internal entities/insights.
  categories:
    enrichment: false
    reasoning: >-
      The action pushes data to an external system (EclecticIQ) and does not fetch
      contextual data about the entities for enrichment purposes. Therefore, it is
      not an enrichment action.
  entity_usage:
