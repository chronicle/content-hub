Send Entities to EclecticIQ:
  ai_description: >-
    ### General Description

    Sends case entities to EclecticIQ as sightings, with an option to also create
    them as indicators. This action exports relevant case data and entity identifiers
    to the EclecticIQ Threat Intelligence Platform.


    ### Flow Description

    1. Retrieves the EclecticIQ group name and indicator creation preference from
    the action parameters.

    2. Fetches the source ID for the specified group name from the EclecticIQ API.

    3. Constructs a payload containing case details (e.g., title, description, priority)
    and extracts from the target entities.

    4. Sends a PUT request to the EclecticIQ API (`/api/v2/entities`) to create the
    sighting and, if configured, the indicator.

    5. Adds a comment to the case and attaches a link to the created entity in the
    action results.


    ### Additional Notes

    Only entities with types supported by EclecticIQ (e.g., Address, Hostname, FileHash,
    URL, Domain) are included in the payload. Unsupported entity types are ignored.
  ai_short_description: >-
    Sends case entities to EclecticIQ to create sightings and optionally indicators.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates sightings and optionally indicators in the EclecticIQ platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the EclecticIQ API to create sightings and
      indicators, which mutates external data. It does not fetch enrichment data,
      update internal entities, or create insights. It does, however, add a comment
      to the case upon successful execution.
