[project]
name = "OpenCTI"
version = "2.0"
description = "OpenCTI integration for Chronicle SOAR"
requires-python = ">=3.11,<3.12"
dependencies = [
    "antlr4-python3-runtime==4.9.3", # required for pycti deps resolution
    "environmentcommon",
    "pycti==7.260626.0",
    "pydantic==2.12.0",
    "tipcommon",
]

[dependency-groups]
dev = [
    "environmentcommon",
    "integration-testing",
    "pytest",
    "pytest-json-report",
    "ruff>=0.15.18",
    "soar-sdk",
    "tipcommon",
]

[tool.uv.sources]
antlr4-python3-runtime = { url = "https://files.pythonhosted.org/packages/3e/38/7859ff46355f76f8d19459005ca000b6e7012f2f1ca597746cbcd1fbfe5e/antlr4-python3-runtime-4.9.3.tar.gz" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.4.1-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.4.1-py3-none-any.whl" }
