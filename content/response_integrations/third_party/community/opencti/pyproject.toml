[project]
name = "OpenCTI"
version = "1.0"
description = "OpenCTI integration for Chronicle SOAR"
requires-python = ">=3.11,<3.12"
dependencies = [
    "antlr4-python3-runtime==4.9.3",
    "environmentcommon",
    "pycti",
    "tipcommon",
    "pydantic==2.12.0",
]

[dependency-groups]
dev = [
    "environmentcommon",
    "integration-testing",
    "pytest",
    "pytest-json-report",
    "ruff>=0.15.18",
    "soar-sdk",
    "tipcommon",
]

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
pycti = { url = "https://files.pythonhosted.org/packages/55/76/d74f42382abf6120d81ac0c17be2bdc68d1ca39faf7aecb54b447e5179f2/pycti-7.260529.0-py3-none-any.whl" }
antlr4-python3-runtime = { url = "https://files.pythonhosted.org/packages/3e/38/7859ff46355f76f8d19459005ca000b6e7012f2f1ca597746cbcd1fbfe5e/antlr4-python3-runtime-4.9.3.tar.gz" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.3.6-py3-none-any.whl" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.2.7-py3-none-any.whl" }

