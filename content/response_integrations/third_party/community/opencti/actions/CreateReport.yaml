name: Create Report
description: Create a report in OpenCTI
integration_identifier: OpenCTI
parameters:
-   name: Name
    type: string
    description: Specify the name of the report
    is_mandatory: true
-   name: Publication Date
    type: string
    description: Specify publication date (ISO 8601 format)
    is_mandatory: true
-   name: Description
    type: string
    description: Specify description of the report
    is_mandatory: false
    default_value: null
-   name: Report Types
    type: string
    description: Specify report types as comma-separated values
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the report
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateReport_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
