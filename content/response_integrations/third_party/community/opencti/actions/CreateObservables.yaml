name: Create Observables
description: Create STIX cyber observables in OpenCTI from the action's target entities.
integration_identifier: OpenCTI
parameters:
-   name: Description
    default_value: ''
    type: string
    description: Observable description
    is_mandatory: false
-   name: Score
    default_value: '50'
    type: string
    description: Threat score. Allowed values are integers between 0 and 100 (inclusive).
    is_mandatory: false
-   name: Labels
    default_value: ''
    type: string
    description: Comma-separated list of labels
    is_mandatory: false
-   name: Marking
    default_value: TLP:AMBER
    type: ddl
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    description: Marking definition to apply
    is_mandatory: false
-   name: Create Indicator
    default_value: 'false'
    type: boolean
    description: Create an indicator from each observable
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/CreateObservables_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
