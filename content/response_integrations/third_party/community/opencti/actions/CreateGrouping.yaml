name: Create Grouping
description: Create a grouping in OpenCTI
integration_identifier: OpenCTI
parameters:
-   name: Name
    type: string
    description: Specify the name of the grouping
    is_mandatory: true
-   name: Context
    type: string
    description: Specify context for the grouping
    is_mandatory: true
    default_value: suspicious-activity
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the grouping
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateGrouping_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
