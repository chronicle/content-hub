name: Create Indicator
description: Create an indicator in OpenCTI
integration_identifier: OpenCTI
parameters:
-   name: Name
    type: string
    description: Specify indicator name
    is_mandatory: true
-   name: Pattern
    type: string
    description: Specify STIX pattern
    is_mandatory: true
-   name: Description
    type: string
    description: Specify indicator description
    is_mandatory: false
    default_value: null
-   name: Valid From
    type: string
    description: Specify valid from date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Valid Until
    type: string
    description: Specify valid until date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Score
    type: string
    description: Specify indicator score (0-100)
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify entity's labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the indicator
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateIndicator_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
