name: Enrich Observable
description: >-
  Full enrichment of an Observable (SCO) in OpenCTI. Looks up the entity value
  as a StixCyberObservable, retrieves its metadata (score, labels, description,
  created_by) and all relationships. Marks the entity suspicious when the
  x_opencti_score exceeds the configured threshold.
integration_identifier: OpenCTI
parameters:
-   name: Threshold
    default_value: '50'
    type: string
    description: >-
      The minimum OpenCTI score (x_opencti_score) required to mark a Google
      SecOps entity as suspicious.
    is_mandatory: false
-   name: Create Insight
    default_value: true
    type: boolean
    description: >-
      If enabled, the action will create an insight containing all retrieved
      information about the observable and its relationships.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/EnrichObservable_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
