name: Create Campaign
description: Create a campaign in OpenCTI
integration_identifier: OpenCTI
parameters:
-   name: Name
    type: string
    description: Specify campaign name
    is_mandatory: true
-   name: Description
    type: string
    description: Specify campaign description
    is_mandatory: false
    default_value: null
-   name: First Seen
    type: string
    description: Specify first seen date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Last Seen
    type: string
    description: Specify last seen date (ISO 8601 format)
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Specify labels as comma-separated values
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify marking for the campaign
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateCampaign_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
