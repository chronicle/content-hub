name: Create Observable
description: Create a new STIX cyber observable in OpenCTI
integration_identifier: OpenCTI
parameters:
-   name: Observable Value
    type: string
    description: Value of the observable
    is_mandatory: true
-   name: Observable Type
    type: ddl
    optional_values:
        - Domain Name
        - URL
        - Hostname
        - Email Subject
        - Email Addr
        - IP
        - Hash
    description: Type of the observable
    is_mandatory: true
    default_value: Doamain Name
-   name: Description
    type: string
    description: Observable description
    is_mandatory: false
    default_value: null
-   name: Score
    type: string
    description: Threat score. Allowed values are integers between 0 and 100 (inclusive).
    is_mandatory: false
    default_value: null
-   name: Labels
    type: string
    description: Comma-separated list of labels
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Marking definition to apply
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
-   name: Create Indicator
    type: boolean
    description: Create an indicator from this observable
    is_mandatory: false
    default_value: false
dynamic_results_metadata:
-   result_example_path: resources/CreateObservable_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0
