name: Create IncidentResponse
description: Create an IncidentResponse in OpenCTI
integration_identifier: OpenCTI
parameters:
-   name: Name
    type: string
    description: Specify the name of the IncidentResponse
    is_mandatory: true
-   name: Description
    type: string
    description: Specify the description of the IncidentResponse
    is_mandatory: false
    default_value: null
-   name: Created At
    type: string
    description: Specify the creation date of the IncidentResponse
    is_mandatory: false
    default_value: null
-   name: Severity
    type: string
    description: Specify the severity of the IncidentResponse
    is_mandatory: false
    default_value: null
-   name: Priority
    type: string
    description: Specify the priority of the IncidentResponse
    is_mandatory: false
    default_value: null
-   name: Type
    type: string
    description: Specify the type of the IncidentResponse
    is_mandatory: false
    default_value: Alert
-   name: Labels
    type: string
    description: Specify labels to apply, comma-separated (e.g. label1, label2)'
    is_mandatory: false
    default_value: null
-   name: Marking
    type: ddl
    description: Specify the marking of the IncidentResponse
    optional_values:
        - TLP:CLEAR
        - TLP:GREEN
        - TLP:AMBER
        - TLP:AMBER+STRICT
        - TLP:RED
    is_mandatory: false
    default_value: TLP:AMBER
dynamic_results_metadata:
-   result_example_path: resources/CreateIncidentResponse_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: b63f7d49-7b62-40be-b967-9a713b7085b0