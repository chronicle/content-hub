Enrich Indicator:
  ai_description: >-
    ### General Description

    Enriches Indicator entities (such as IP addresses, file hashes, URLs, hostnames,
    and domains) using OpenCTI. This action retrieves comprehensive metadata including
    threat scores, confidence levels, kill chain phases, validity windows, and relationships
    (e.g., Malware, TTPs, Campaigns, Threat Actors). It evaluates the retrieved score
    against a configured threshold to mark entities as suspicious and generates a
    detailed insight with the analysis results.


    ### Flow Description

    1. Iterates over supported target entities (Address, File Hash, URL, Hostname,
    Domain).

    2. Makes an API call to OpenCTI (`enrich_indicator`) to fetch indicator enrichment
    data for each entity's identifier.

    3. Evaluates the OpenCTI score against the configured `Threshold` parameter; if
    it exceeds the threshold, marks the entity as suspicious.

    4. Updates the entity's additional properties with the retrieved metadata (score,
    confidence, validity, pattern, labels, kill chain).

    5. Creates an entity link and a data table of relationships if available.

    6. Generates an HTML insight containing the retrieved information and attaches
    it to the entity if `Create Insight` is enabled.

    7. Saves the updated entities back to the platform.


    ### Additional Notes

    The action relies on the OpenCTI integration configuration for API connectivity.
    The base enrichment class handles the actual saving of updated entities.
  ai_short_description: >-
    Enriches Indicator entities using OpenCTI by retrieving threat intelligence metadata
    and relationships, updating entity properties, and optionally creating detailed
    insights.
