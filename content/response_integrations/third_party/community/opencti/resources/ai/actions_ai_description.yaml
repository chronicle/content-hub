      The action fetches data from OpenCTI by calling the `enrich_indicator` API method.
      It does not mutate any external data or internal system data outside of entities
      and insights. It updates entities by modifying their `is_suspicious` status
      and `additional_properties` (via the base class). It creates insights by calling
      `add_entity_insight` with the retrieved threat intelligence. It does not modify
      alert data or create case comments.
