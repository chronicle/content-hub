Add Object to Container:
  ai_description: >-
    ### General Description

    Adds a specified object to an existing container within OpenCTI. This action allows
    users to link objects (such as indicators, observables, or other entities) to
    specific containers like Reports, Incident Response Cases, or Groupings directly
    from Google SecOps.


    ### Flow Description

    1. Parses and validates the provided action parameters, including the container
    type, container ID, and object ID.

    2. Maps the user-friendly container type (e.g., 'Incident Response Case') to the
    corresponding OpenCTI internal entity type (e.g., 'Case-Incident').

    3. Executes an API call (`add_object_to_container`) to the OpenCTI instance to
    link the specified object to the target container.

    4. Retrieves the updated container data and outputs it as a JSON result, along
    with a success message.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It relies strictly on
    the provided OpenCTI identifiers (Container ID and Object ID) to perform the linkage.
  ai_short_description: >-
    Adds a specified object to an existing container (such as a Report or Incident
    Response Case) in OpenCTI.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Links a specified object to an existing container (e.g., Report, Incident Response
      Case) in the external OpenCTI platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to OpenCTI to add an object to a container, which
      mutates data in the external OpenCTI system. It does not fetch contextual data
      for enrichment, nor does it mutate internal Google SecOps data, update entities,
      or create insights.
