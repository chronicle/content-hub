Create Attack Pattern:
  ai_description: >-
    ### General Description

    Creates a new attack pattern in OpenCTI using the provided details such as name,
    description, external ID, labels, and marking. This action allows analysts to
    populate the threat intelligence platform with new MITRE ATT&CK patterns or custom
    attack techniques directly from the SOAR platform.


    ### Flow Description

    1. Validates and parses the input parameters including Name, Description, External
    ID, Labels, and Marking.

    2. Constructs an Attack Pattern data model with the parsed values.

    3. Makes an API call to OpenCTI (`create_attack_pattern`) to create the new attack
    pattern record.

    4. Returns the created attack pattern's ID and JSON representation as the action
    result.


    ### Additional Notes

