  reasoning: >-
    The Zoom integration provides capabilities to manage user accounts, specifically
    through the 'Create User' and 'Delete User' actions, and to enrich user entities
    with profile information via the 'Enrich Entities' action. These operations directly
    align with the 'IAM & Identity Management' category, which covers managing user
    identities and retrieving user-related information. The integration does not interact
    with logs, endpoints, network infrastructure, cloud infrastructure, or ticketing
    systems, and therefore does not qualify for the other categories such as SIEM,
    EDR, Network Security, Cloud Security, or ITSM.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
