product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: true
  itsm: false
  network_security: false
  reasoning: >-
    The Zoom integration provides capabilities to manage user identities (Create User,
    Delete User) and enrich user entities with profile information. These functions
    align with the IAM & Identity Management category, as they allow for the provisioning
    and deprovisioning of user identities and the retrieval of user context. The integration
    does not perform log analysis (SIEM), host management (EDR), network security,
    threat intelligence, email security, cloud security, ITSM, vulnerability management,
    or collaboration (as it does not send notifications). While it enriches user entities,
    it does not fit the Asset Inventory category, which is defined by the retrieval
    of information regarding IT assets (hardware/devices).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
