  ai_description: >-
    ### General Description

    The **Get Meeting Recording** action retrieves the details and sharing URL of
    a specific Zoom meeting recording stored in the cloud. This action is primarily
    used to gather evidence or review recorded communications associated with a security
    incident. It fetches comprehensive metadata about the recording, including the
    start time, duration, and individual recording files.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Meeting ID | The unique identifier of the Zoom meeting for which the recording
    is being requested. | String | Yes | This ID is used to construct the API request
    path. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Meeting ID` provided by
    the user.

    2. **Manager Initialization:** It initializes the `ZoomManager` using the integration's
    configuration (OAuth or JWT credentials).

    3. **API Interaction:** The action calls the Zoom API's GET `/meetings/{meeting_id}/recordings`
    endpoint to fetch recording data.

    4. **Data Processing:** It extracts the `share_url` from the API response to provide
    a direct link to the recording.

    5. **Result Output:** The action adds the sharing URL as a clickable link in the
    SOAR interface and attaches the full JSON response containing all recording details
    for downstream use in the playbook.
