Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Zoom API. It ensures that the provided credentials (either
    JWT or OAuth) are valid and that the network path to Zoom's service is open. This
    action is typically used during the initial setup of the integration or for troubleshooting
    purposes.


    ### Parameters Description

    This action does not require any input parameters. It relies entirely on the integration's
    global configuration (JWT Token or OAuth Client ID, Client Secret, and Account
    ID).


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the integration's configuration
    parameters, including authentication credentials.

    2. **Manager Initialization:** It initializes the `ZoomManager` which handles
    the authentication logic (OAuth token exchange or JWT header setup).

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    performs a `GET` request to the Zoom `/users` endpoint (requesting a small page
    of active users).

    4. **Validation:** If the API responds with a success status code (HTTP 200) and
    valid JSON, the action returns a success message.

    5. **Error Handling:** If the request fails due to invalid credentials, network
    timeouts, or API errors, the action catches the exception and reports the failure
    details.


    ### Additional Notes

    - This action is strictly for connectivity testing and does not process any entities
    or modify any data.

    - Either a JWT Token or a complete set of OAuth credentials (Account ID, Client
    ID, Client Secret) must be configured in the integration settings for this action
    to succeed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
