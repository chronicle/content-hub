  ai_description: >-
    ### General Description

    Creates a scheduled or instant meeting in Zoom for a specified host. This action
    allows for the automated creation of collaboration sessions directly from a playbook,
    facilitating rapid incident response coordination.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Meeting Type | Dropdown | Yes | Specifies if the meeting is 'Instant' or 'Scheduled'.
    Note that 'Instant' will override 'Scheduled' configurations. |

    | Meeting Start Time | String | Yes | The start time for scheduled meetings. Expected
    format is GMT 'yyyy-mm-dd hh:mm:ss'. |

    | Meeting Topic | String | Yes | The title or subject of the meeting. |

    | Auto Recording Type | Dropdown | Yes | Determines if the meeting should be recorded
    automatically. Options are 'local', 'cloud', or 'none'. |

    | Time Zone | String | Yes | The time zone for the meeting in 'Continent/Country'
    format (e.g., 'Europe/London'). |

    | Meeting Duration | String | Yes | The length of the meeting in minutes. |

    | Host Email Address | String | Yes | The email address of the Zoom user who will
    be the host of the meeting. |


    ### Additional Notes

    - This action requires either OAuth credentials (Account ID, Client ID, Client
    Secret) or a JWT Token to be configured in the Zoom integration settings.

    - Upon successful creation, the action provides a direct 'Meeting URL link' in
    the SOAR interface for easy access.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves all user-provided parameters
    including topic, type, timing, and host email.

    2. **Authentication**: Initializes the Zoom Manager using the integration's configuration
    to authenticate with the Zoom API.

    3. **API Request**: Sends a POST request to the Zoom API endpoint `/users/{host_email}/meetings`
    with a payload containing the meeting configuration.

    4. **Output Generation**: If the meeting is created, the action extracts the join
    URL to create a clickable link in the SOAR and returns the complete meeting metadata
    as a JSON result.
