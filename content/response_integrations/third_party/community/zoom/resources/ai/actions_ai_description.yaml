  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Zoom API.\
    \ It ensures that the provided credentials (either JWT or OAuth) are valid and\
    \ that the network path to the Zoom service is open. This action is typically\
    \ used during the initial setup of the integration or for troubleshooting authentication\
    \ issues.\n\n### Parameters Description\nThere are no action-specific parameters\
    \ for this action. It relies entirely on the integration's configuration parameters\
    \ (JWT Token or OAuth credentials).\n\n### Additional Notes\n*   The action requires\
    \ at least one valid authentication method to be configured: either a **JWT Token**\
    \ or a combination of **Account ID**, **Client ID**, and **Client Secret** for\
    \ OAuth.\n*   The connectivity test is performed by attempting to list active\
    \ users from the Zoom account. If the API returns a successful response, the connection\
    \ is considered established.\n\n### Flow Description\n1.  **Initialization**:\
    \ The action initializes the Siemplify environment and logger.\n2.  **Configuration\
    \ Retrieval**: It fetches the integration configuration, including authentication\
    \ credentials.\n3.  **Manager Setup**: The `ZoomManager` is instantiated using\
    \ the retrieved credentials, handling the authentication logic (OAuth login or\
    \ JWT header setup).\n4.  **Connectivity Test**: The action calls the `test_connectivity`\
    \ method, which executes a GET request to the Zoom `/users` endpoint.\n5.  **Result\
    \ Handling**: \n    *   If the request succeeds, the action returns a success\
    \ status with the message \"Connected successfully\".\n    *   If the request\
    \ fails (e.g., due to invalid credentials or network errors), an exception is\
    \ caught, and the action returns a failure status with the specific error message."
