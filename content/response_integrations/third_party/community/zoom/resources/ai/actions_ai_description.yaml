Create Meeting:
  ai_description: >-
    ### General Description

    Creates a scheduled or instant meeting in Zoom for a specified host. This action
    initiates a state change on the external Zoom service by scheduling a new meeting
    and returns the meeting details, including the join URL.


    ### Flow Description

    1. Extracts action parameters including the meeting topic, type, start time, duration,
    timezone, recording type, and host email address.

    2. Initializes the Zoom API client using the provided integration credentials.

    3. Makes a POST request to the Zoom API (`/users/{host_email}/meetings`) with
    the configured meeting payload.

    4. If the meeting is successfully created, attaches the meeting details as a JSON
    result and adds the meeting join URL as a link to the action results.

    5. Returns a success or failure status based on the API response.


    ### Additional Notes

    - The meeting type can be 'Instant' or 'Scheduled'. Setting the meeting to 'Instant'
    will override any 'Scheduled' time configurations.

    - Ensure the provided host email address corresponds to a valid user in the Zoom
    account.
  ai_short_description: >-
    Creates a scheduled or instant meeting in Zoom for a specified host and returns
    the meeting join URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new scheduled or instant meeting in Zoom for the specified host.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Zoom API to create a new meeting, which
      mutates external data. It does not fetch contextual data for enrichment, nor
      does it update internal entities, create insights, or modify alert data.
