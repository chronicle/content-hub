  ai_description: >-
    ### General Description

    This action creates a new user account within the Zoom platform. It allows administrators
    to provision users by specifying their first name, last name, email address, and
    license type.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First Name | string | Yes | The first name of the user to be created. |

    | Last Name | string | Yes | The last name of the user to be created. |

    | Email | string | Yes | The email address of the user to be created. |

    | User Type | ddl | Yes | The license type for the user. Options: 'Basic', 'Licensed',
    'On-prem'. |


    ### Additional Notes

    This action performs a check to see if the user already exists before attempting
    creation. If the user already exists, the action will fail. The action returns
    the details of the created user in the result JSON.


    ### Flow Description

    1. The action extracts the required parameters (First Name, Last Name, Email,
    User Type) from the configuration.

    2. It initializes the ZoomManager using the provided integration credentials.

    3. It attempts to fetch the user details using the provided email to check if
    the user already exists.

    4. If the user does not exist, it performs a POST request to the Zoom API to create
    the new user with the specified details.

    5. If the creation is successful, it returns the user details in the action result;
    otherwise, it reports a failure.
