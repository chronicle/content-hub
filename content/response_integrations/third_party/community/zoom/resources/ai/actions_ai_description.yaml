Delete User:
  ai_description: >-
    ### General Description

    Deletes a user account from Zoom and optionally transfers their associated data
    to another user.


    ### Flow Description

    1. Extracts the target user's email and data transfer preferences (meetings, recordings,
    webinars) from the action parameters.

    2. If data transfer is requested, makes GET requests to the Zoom API (`list_recordings`,
    `list_webinars`, `list_meetings`) to verify if the user actually has data to transfer.

    3. Sends a DELETE request to the Zoom API (`/Users/{user_email}`) to delete the
    user account, passing along the transfer flags and the destination email address
    if applicable.

    4. Returns the execution status and a JSON result indicating whether the deletion
    was successful.


    ### Additional Notes

    If a transfer option is enabled but the user has no data of that specific type
    (e.g., no recordings), the action automatically disables the transfer flag for
    that data type before issuing the delete request.
  ai_short_description: >-
    Deletes a user account from Zoom and optionally transfers their meetings, webinars,
    and recordings to another specified user.
