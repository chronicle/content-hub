  ai_description: >-
    ### General Description

    The `Create Meeting` action creates a scheduled or instant meeting in Zoom for
    a specified host. It interacts with the Zoom API to schedule the meeting and returns
    the meeting details, including the join URL.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Meeting Type | Dropdown | Yes | The type of the meeting. Can be 'Instant' or
    'Scheduled'. Setting the meeting to 'Instant' will override the configuration
    of the 'Scheduled' meeting. |

    | Meeting Start Time | String | Yes | Meeting start time (should be used only
    for scheduled meetings). The time format is GMT yyyy-mm-dd hh:mm:ss. |

    | Meeting Topic | String | Yes | The topic or title of the meeting. |

    | Auto Recording Type | Dropdown | Yes | Specifies the recording behavior: 'local'
    (automatically on the local server), 'cloud' (automatically on cloud), or 'none'
    (do not record). |

    | Time Zone | String | Yes | The time zone in the format Continent/Country (e.g.,
    Pacific/Midway). |

    | Meeting Duration | String | Yes | The duration of the meeting in minutes. |

    | Host Email Address | String | Yes | The email address of the user who will host
    the meeting. |


    ### Flow Description

    1. The action retrieves the provided parameters, including the meeting topic,
    type, start time, duration, time zone, recording type, and host email address.

    2. It authenticates with the Zoom API and sends a POST request to create a new
    meeting for the specified host.

    3. If successful, the action outputs the meeting details as a JSON result and
    attaches the meeting's join URL as a link to the action's results.
