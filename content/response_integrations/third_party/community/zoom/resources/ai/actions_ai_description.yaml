Get Meeting Recording:
  ai_description: >-
    ### General Description

    The **Get Meeting Recording** action retrieves metadata and the shareable URL
    for a specific Zoom meeting recording stored in the cloud. This action is designed
    to provide security analysts with quick access to recorded meeting content for
    forensic investigations, compliance audits, or incident response documentation
    based on a known Meeting ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Meeting ID | String | Yes | The unique identifier of the Zoom meeting recording
    to be retrieved. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Meeting ID` from the input
    parameters.

    2. **Authentication**: The action initializes the `ZoomManager` using the provided
    integration credentials (OAuth or JWT).

    3. **API Interaction**: The action performs a GET request to the Zoom API endpoint
    `/meetings/{meeting_id}/recordings` to fetch the recording details.

    4. **Data Extraction**: It extracts the `share_url` from the API response to serve
    as the primary result value.

    5. **SOAR Enrichment**: The action adds the recording URL as a clickable link
    in the Google SecOps interface and attaches the full JSON response containing
    all recording metadata (e.g., file sizes, recording types, timestamps) to the
    action results.


    ### Additional Notes

    - This action specifically targets recordings stored in the Zoom Cloud; it cannot
    retrieve local recordings.

    - The integration must be configured with credentials that have the `recording:read`
    or `recording:read:admin` scopes.
