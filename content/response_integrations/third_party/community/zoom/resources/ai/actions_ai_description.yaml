  ai_description: >-
    Deletes a user permanently from Zoom. This action allows for the optional transfer
    of the deleted user's meetings, recordings, and webinars to another specified
    user.


    ### Flow Description

    1. Extracts the `Deleted User Email` and transfer preferences (meetings, recordings,
    webinars) from the action parameters.

    2. Checks if the user has any meetings, recordings, or webinars to transfer using
    the Zoom API.

    3. Performs a `DELETE` request to the Zoom API to remove the user, optionally
    transferring their data to the specified `Transfer Email`.

    4. Returns the deletion status in the action result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `Deleted User Email` | string | Yes | The email address of the user to be permanently
    deleted. |

    | `Transfer Meeting` | boolean | No | If true, transfers future meetings scheduled
    for the deleted user to the `Transfer Email`. |

    | `Transfer Recordings` | boolean | No | If true, transfers past recordings associated
    with the deleted user to the `Transfer Email`. |

    | `Transfer Webinar` | boolean | No | If true, transfers future webinars scheduled
    for the deleted user to the `Transfer Email`. |

    | `Transfer Email` | string | No | The email address of the user to whom the data
    will be transferred. Required if any transfer option is set to true. |


    ### Additional Notes

    If any of the transfer options (`Transfer Meeting`, `Transfer Recordings`, `Transfer
    Webinar`) are set to true, the `Transfer Email` parameter should be provided to
    specify the recipient of the transferred data.
