    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by calling `list_recordings`, `list_webinars`, and `list_meetings`
      to verify if there is data to transfer. It mutates external data by sending
      a DELETE request to the Zoom API to delete the user. It does not mutate internal
