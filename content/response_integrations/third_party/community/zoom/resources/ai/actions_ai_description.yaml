  ai_description: >-
    Enriches User entities with Zoom properties.


    ### General Description

    This action retrieves user details from Zoom and enriches the corresponding User
    entities in Google SecOps. It fetches contextual metadata about the user and appends
    it to the entity's additional properties.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `USER`.

    3. For each user entity, queries the Zoom API to retrieve user details using the
    entity's identifier (email).

    4. Flattens the retrieved user data and prefixes the keys with 'Zoom'.

    5. Updates the entity's `additional_properties` with the flattened data and marks
    the entity as enriched.

    6. Saves the updated entities back to the case and adds the raw user information
    to the action's JSON result.


    ### Parameters Description

    This action does not require any specific action parameters. It relies on the
    integration's configuration parameters to authenticate with the Zoom API.
