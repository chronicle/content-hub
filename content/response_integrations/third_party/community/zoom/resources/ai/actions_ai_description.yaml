  ai_description: >-
    ### General Description

    Deletes a user from Zoom. This action disassociates the user from the Zoom account
    and can optionally transfer their meetings, webinars, and recordings to another
    specified user.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Deleted User Email | string | Yes | The email address of the user you would
    like to permanently delete. |

    | Transfer Meeting | boolean | No | Will transfer all the future meetings scheduled
    for the user you are deleting to a selected user. |

    | Transfer Recordings | boolean | No | Will transfer all the past recordings associated
    with the user you are deleting to a chosen user. |

    | Transfer Webinar | boolean | No | Will transfer all the future webinars scheduled
    for the user you are deleting to a selected user. |

    | Transfer Email | string | No | The user's email to which all the associated
    data of the deleted user is transferred. |


    ### Flow Description

    1. Initializes the Zoom integration and extracts the action parameters.

    2. If transfer options are enabled, checks if the user has any recordings, webinars,
    or meetings to transfer.

    3. Sends a request to Zoom to delete (disassociate) the user, transferring data
    to the specified email if applicable.

    4. Returns a success message if the user was deleted, or a failure message if
    the user was not found or an error occurred.
  capabilities:
