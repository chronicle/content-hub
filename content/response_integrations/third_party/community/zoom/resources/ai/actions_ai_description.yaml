  ai_description: >-
    ### General Description

    Creates a new user in Zoom. This action interacts with the Zoom API to provision
    a new user account with the specified details and license type.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | First Name | String | Yes | The first name of the user to be created. |

    | Last Name | String | Yes | The last name of the user to be created. |

    | Email | String | Yes | The email address of the user to be created. |

    | User Type | Dropdown | Yes | The user license type. Can be 'Basic', 'Licensed',
    or 'On-prem'. |


    ### Flow Description

    1. Extracts the integration and action parameters.

    2. Initializes the ZoomManager to interact with the Zoom API.

    3. Checks if a user with the provided email already exists.

    4. If the user does not exist, sends a POST request to the Zoom API to create
    the user with the specified first name, last name, email, and user type.

    5. Returns the created user details as a JSON result and completes the action.
