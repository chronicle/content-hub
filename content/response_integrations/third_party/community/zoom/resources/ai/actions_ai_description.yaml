  ai_description: >-
    ### General Description

    This action permanently deletes a user account from the Zoom platform. It provides
    an option to transfer the deleted user's meetings, recordings, and webinars to
    another specified user, ensuring data continuity before the account is removed.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Deleted User Email` and
    any optional transfer preferences (meetings, recordings, webinars) and the `Transfer
    Email` from the action parameters.

    2. **Data Check**: It queries the Zoom API to check if the specified user has
    any meetings, recordings, or webinars that need to be transferred.

    3. **Deletion**: It performs a `DELETE` request to the Zoom API to remove the
    user, applying the transfer settings if applicable.

    4. **Result**: The action returns the deletion status (success or failure) to
    the SOAR platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `Deleted User Email` | string | Yes | The email address of the user to be permanently
    deleted. |

    | `Transfer Meeting` | boolean | No | If true, transfers future meetings scheduled
    for the deleted user to the `Transfer Email`. |

    | `Transfer Recordings` | boolean | No | If true, transfers past recordings associated
    with the deleted user to the `Transfer Email`. |

    | `Transfer Webinar` | boolean | No | If true, transfers future webinars scheduled
    for the deleted user to the `Transfer Email`. |

    | `Transfer Email` | string | No | The email address of the user to whom the data
    will be transferred. Required if any transfer option is set to true. |


    ### Additional Notes

    If any of the transfer options (`Transfer Meeting`, `Transfer Recordings`, `Transfer
    Webinar`) are set to true, the `Transfer Email` parameter must be provided to
    specify the recipient of the transferred data.
  capabilities:
