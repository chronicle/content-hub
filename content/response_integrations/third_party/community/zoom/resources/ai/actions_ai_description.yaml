  ai_description: >-
    ### General Description

    Deletes a user permanently from the Zoom platform. This action allows for the
    optional transfer of the user's associated data, including future meetings, past
    recordings, and future webinars, to a designated recipient email address before
    the account is removed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Deleted User Email | string | Yes | The email address of the Zoom user to be
    permanently deleted. |

    | Transfer Email | string | No | The email address of the user who will receive
    the transferred data (meetings, recordings, webinars). |

    | Transfer Meeting | boolean | No | If set to true, transfers all future scheduled
    meetings to the Transfer Email recipient. |

    | Transfer Recordings | boolean | No | If set to true, transfers all past cloud
    recordings to the Transfer Email recipient. |

    | Transfer Webinar | boolean | No | If set to true, transfers all future scheduled
    webinars to the Transfer Email recipient. |


    ### Additional Notes

    - The action first checks if the user has any recordings, webinars, or meetings
    before attempting a transfer. If no data is found for a specific category, the
    transfer flag for that category is automatically set to false to prevent API errors.

    - This action performs a permanent deletion (disassociation) of the user account.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the target user's email and the transfer
    configurations from the action parameters.

    2. **Data Validation:** Queries the Zoom API to check for the existence of recordings,
    webinars, and meetings for the target user.

    3. **Conditional Flag Adjustment:** Updates the transfer flags based on whether
    data actually exists to be transferred.

    4. **User Deletion:** Sends a DELETE request to the Zoom API with the specified
    transfer parameters.

    5. **Result Reporting:** Returns a JSON result indicating whether the deletion
    was successful or if the user was not found.
