Delete User:
  ai_description: "Deletes a user permanently from a Zoom account. This action allows\
    \ for the optional transfer of the user's scheduled meetings, webinars, and cloud\
    \ recordings to another specified user before the deletion is finalized. \n\n\
    ### Flow Description:\n1. **Parameter Extraction:** The action retrieves the email\
    \ of the user to be deleted and the transfer preferences (meetings, recordings,\
    \ webinars, and the recipient's email).\n2. **Pre-check:** It verifies if the\
    \ user has existing recordings, webinars, or meetings to transfer if the corresponding\
    \ transfer flags are set to true.\n3. **Deletion Execution:** It sends a DELETE\
    \ request to the Zoom API, passing the transfer parameters to ensure data is moved\
    \ to the designated recipient during the deletion process.\n4. **Result Handling:**\
    \ The action returns a success message if the user is deleted or an error message\
    \ if the user is not found or if the API request fails.\n\n### Parameters Description:\n\
    | Parameter Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Deleted User Email | string | True | The email address of the Zoom user\
    \ to be permanently deleted. |\n| Transfer Meeting | boolean | False | If set\
    \ to true, transfers all future scheduled meetings to the 'Transfer Email'. Defaults\
    \ to false. |\n| Transfer Recordings | boolean | False | If set to true, transfers\
    \ all past cloud recordings to the 'Transfer Email'. Defaults to false. |\n| Transfer\
    \ Webinar | boolean | False | If set to true, transfers all future scheduled webinars\
    \ to the 'Transfer Email'. Defaults to false. |\n| Transfer Email | string | False\
    \ | The email address of the user who will receive the transferred data. Required\
    \ if any transfer flag is set to true. |"
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Permanently deletes a user from the Zoom platform and optionally transfers their
      data (meetings, webinars, recordings) to another user account.
    fetches_data: true
    internal_data_mutation_explanation: null
