Get Meeting Recording:
  ai_description: >-
    ### General Description

    Retrieves details and the shareable URL for a specific Zoom meeting recording
    stored in the cloud. This action interacts with the Zoom API to fetch metadata
    about a recorded meeting and provides a direct link to access it.


    ### Flow Description

    1. Extracts the `Meeting ID` parameter provided by the user or playbook.

    2. Initializes the Zoom API client using the configured integration credentials.

    3. Makes a GET request to the Zoom API (`/meetings/{meeting_id}/recordings`) to
    fetch the recording details.

    4. Extracts the `share_url` from the API response.

    5. Attaches the recording URL as a clickable link in the action results.

    6. Outputs the full recording details as a JSON result for further playbook use.


    ### Additional Notes

    - The action requires the meeting recording to be stored in the Zoom cloud.

    - Ensure the provided Meeting ID is valid and accessible by the authenticated
    Zoom account.
