Create Meeting:
  ai_description: >-
    ### General Description

    Create a scheduled or instant meeting in Zoom for a specific host. This action
    allows users to automate the creation of Zoom meetings directly from a playbook,
    providing a join URL and full meeting details upon success.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Meeting Type | ddl | Yes | The type of the meeting: 'Instant' or 'Scheduled'.
    |

    | Meeting Start Time | string | Yes | Meeting start time in GMT (yyyy-mm-dd hh:mm:ss).
    Used for scheduled meetings. |

    | Meeting Topic | string | Yes | The topic or title of the meeting. |

    | Auto Recording Type | ddl | Yes | Recording preference: 'local', 'cloud', or
    'none'. |

    | Time Zone | string | Yes | The time zone in 'Continent/Country' format. |

    | Meeting Duration | string | Yes | The duration of the meeting in minutes. |

    | Host Email Address | string | Yes | The email address of the Zoom user who will
    host the meeting. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the meeting details (topic,
    type, time, duration, etc.) and the host's email from the input parameters.

    2. **API Interaction**: It uses the Zoom API to send a POST request to the `/users/{host_email}/meetings`
    endpoint.

    3. **Link Generation**: If the meeting is created successfully, the action extracts
    the `join_url` and adds it as a link to the action results for easy access.

    4. **Result Reporting**: The action outputs the full JSON response from Zoom and
    marks the execution as completed.


    ### Additional Notes

    - Ensure the 'Host Email Address' belongs to a registered user in your Zoom account.

    - The 'Meeting Start Time' is mandatory but only effectively used when the 'Meeting
    Type' is set to 'Scheduled'.
  capabilities:
