Create User:
  ai_description: "Creates a new user in the Zoom platform. This action allows administrators\
    \ to provision new Zoom accounts by providing the user's first name, last name,\
    \ email address, and license type. \n\n### Flow Description:\n1. **Parameter Extraction:**\
    \ The action retrieves the 'First Name', 'Last Name', 'Email', and 'User Type'\
    \ from the action parameters.\n2. **Pre-check:** It calls the Zoom API to check\
    \ if a user with the provided email already exists to prevent duplicate account\
    \ creation.\n3. **User Creation:** If the user does not exist, it sends a POST\
    \ request to the Zoom `/users` endpoint with the specified user details and license\
    \ type.\n4. **Result Handling:** If successful, the action returns the created\
    \ user's details in JSON format and marks the execution as completed.\n\n### Parameters\
    \ Description:\n| Parameter Name | Type | Mandatory | Description |\n| :--- |\
    \ :--- | :--- | :--- |\n| First Name | String | Yes | The first name of the user\
    \ to be created. |\n| Last Name | String | Yes | The last name of the user to\
    \ be created. |\n| Email | String | Yes | The email address of the user to be\
    \ created. This serves as the unique identifier in Zoom. |\n| User Type | DDL\
    \ | Yes | The license type for the new user. Supported values are 'Basic', 'Licensed',\
    \ and 'On-prem'. |\n\n### Additional Notes:\n- This action requires valid Zoom\
    \ API credentials (either OAuth or JWT) configured in the integration settings.\n\
    - If the user already exists, the action will fail with a 'User Already Exists'\
    \ error."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user account in the Zoom platform via a POST request to the Zoom
      API.
    fetches_data: true
    internal_data_mutation_explanation: null
