Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with Zoom properties by retrieving user details from the
    Zoom API. This action fetches contextual metadata about the user's Zoom account
    and appends it to the entity's properties within Google SecOps.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `USER`.

    3. Makes a GET request to the Zoom API (`/users/{user_email}`) to fetch the user's
    details.

    4. Flattens the retrieved JSON data and prefixes the keys with "Zoom".

    5. Updates the entity's `additional_properties` with the flattened data and marks
    the entity as enriched.

    6. Updates the entities within Google SecOps and attaches the raw JSON results
    to the action.


    ### Additional Notes

    This action does not modify any data within the Zoom platform. It relies on the
    entity's identifier being a valid email address associated with a Zoom account.
