  ai_description: >-
    ### General Description

    This action enriches User entities by retrieving detailed profile information
    from Zoom. It connects to the Zoom API using either JWT or OAuth credentials,
    fetches user-specific data, and updates the entity's `additional_properties` within
    the SOAR platform to provide analysts with context.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JWT Token | String | No | Token used for JWT authentication. Either this or
    OAuth credentials must be provided. |

    | Account ID | String | No | Account ID for OAuth authentication. |

    | Client ID | String | No | Client ID for OAuth authentication. |

    | Client Secret | String | No | Client Secret for OAuth authentication. |


    ### Additional Notes

    Either the `JWT Token` or the set of OAuth parameters (`Account ID`, `Client ID`,
    `Client Secret`) must be configured for the action to authenticate successfully
    with Zoom.


    ### Flow Description

    1. **Initialization**: The action initializes the `ZoomManager` using the provided
    configuration parameters.

    2. **Entity Iteration**: It iterates through all target entities provided in the
    SOAR case.

    3. **Filtering**: It filters the entities to process only those of type `USER`.

    4. **Data Retrieval**: For each valid user entity, it calls the Zoom API to fetch
    user details.

    5. **Data Processing**: The retrieved user data is flattened and prefixed with
    "Zoom" to ensure clarity.

    6. **Entity Update**: The action updates the entity's `additional_properties`
    with the Zoom data and marks the entity as enriched (`is_enriched = True`).

    7. **Finalization**: It updates the entities in the SOAR platform and adds the
    full JSON result to the action output.
