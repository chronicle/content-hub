    Zoom API to provision a new meeting based on the provided configuration parameters.
    Parameters description: Meeting Type (ddl, mandatory): The type of the meeting:
    'Instant' or 'Scheduled'. Meeting Start Time (string, mandatory): Meeting start
    time (required for scheduled meetings). Format: GMT yyyy-mm-dd hh:mm:ss. Meeting
    Topic (string, mandatory): The topic of the meeting. Auto Recording Type (ddl,
    mandatory): Recording setting: 'local', 'cloud', or 'none'. Time Zone (string,
    mandatory): The time zone in Continent/Country format. Meeting Duration (string,
    mandatory): The meeting duration in minutes. Host Email Address (string, mandatory):
    The email address of the meeting host. Additional notes: The 'Meeting Start Time'
    parameter is required for scheduled meetings. Setting the 'Meeting Type' to 'Instant'
    will override the configuration of the 'Scheduled' meeting. Flow description:
    1. The action extracts the required parameters from the configuration. 2. It initializes
    the ZoomManager with the integration credentials. 3. It calls the create_meeting
    method, which performs a POST request to the Zoom API. 4. If the meeting is created
