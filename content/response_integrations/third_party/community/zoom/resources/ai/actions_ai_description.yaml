    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional_properties of the target User entities with the retrieved
      Zoom user details.
    reasoning: >-
      The action fetches user details from the Zoom API (fetches_data=true). It does
      not modify any data in Zoom (can_mutate_external_data=false). It updates the
      internal entity's additional properties and marks it as enriched (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alert data, or
      create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source, does not mutate external state,
      and only performs allowed internal mutations (updating entities). Therefore,
      it is classified as an enrichment action. It does not perform any remediation
      tasks.
    remediation: false
