  ai_description: >-
    Creates a scheduled or instant meeting in Zoom. This action interacts with the
    Zoom API to provision a new meeting based on the provided configuration parameters.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Meeting Type | ddl | Yes | The type of the meeting: 'Instant' or 'Scheduled'.
    |

    | Meeting Start Time | string | Yes | Meeting start time (required for scheduled
    meetings). Format: GMT yyyy-mm-dd hh:mm:ss. |

    | Meeting Topic | string | Yes | The topic of the meeting. |

    | Auto Recording Type | ddl | Yes | Recording setting: 'local', 'cloud', or 'none'.
    |

    | Time Zone | string | Yes | The time zone in Continent/Country format. |

    | Meeting Duration | string | Yes | The meeting duration in minutes. |

    | Host Email Address | string | Yes | The email address of the meeting host. |


    ### Flow

    1. The action extracts the required parameters from the configuration.

    2. It initializes the `ZoomManager` with the integration credentials.

    3. It calls the `create_meeting` method, which performs a POST request to the
    Zoom API.

    4. If the meeting is created successfully, the action adds the meeting URL as
    a link to the result and attaches the full JSON response.

    5. If the creation fails, the action sets the execution state to failed and logs
    the error.
