  ai_description: >-
    ### General Description

    The **Create User** action allows administrators to programmatically create a
    new user account within the Zoom platform. It facilitates identity management
    by automating the provisioning of users with specific license types and contact
    information directly from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **First Name** | string | True | The first name of the user to be created. |

    | **Last Name** | string | True | The last name of the user to be created. |

    | **Email** | string | True | The email address associated with the new Zoom account.
    This serves as the unique identifier. |

    | **User Type** | ddl | True | The license level for the user. Options include:
    'Basic', 'Licensed', or 'On-prem'. |


    ### Additional Notes

    * The action first performs a check to see if a user with the provided email already
    exists in Zoom. If the user exists, the action will fail to prevent duplicate
    creation.

    * The 'User Type' determines the features and limitations available to the user
    within Zoom.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the first name, last name, email,
    and user type from the input parameters.

    2. **Pre-check:** It queries the Zoom API to verify if the email address is already
    registered.

    3. **User Creation:** If the email is unique, it sends a POST request to the Zoom
    `/users` endpoint with the specified user details.

    4. **Result Processing:** Upon successful creation, the action retrieves the new
    user's metadata from Zoom and attaches it as a JSON result to the action output.
