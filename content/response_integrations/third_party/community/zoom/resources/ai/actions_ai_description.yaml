Enrich Entities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action retrieves detailed profile information for User
    entities from the Zoom platform. It is designed to provide security analysts with
    contextual data about a user's Zoom account, such as their status, department,
    job title, and account type, directly within the Google SecOps environment.


    ### Parameters Description

    There are no action-specific parameters for this component. It relies on the global
    integration configuration (JWT or OAuth credentials) to authenticate with the
    Zoom API.


    ### Additional Notes

    * This action specifically targets entities of type **USER**.

    * Retrieved data is flattened and prefixed with "Zoom" before being appended to
    the entity's additional properties.

    * If a user is not found in Zoom or an error occurs for a specific entity, the
    action will log the error and continue processing the remaining entities.


    ### Flow Description

    1. **Initialization**: The action initializes the Zoom API manager using the provided
    integration credentials (JWT or OAuth).

    2. **Entity Filtering**: It iterates through the target entities in the current
    context and filters for those of type **USER**.

    3. **Data Retrieval**: For each identified User entity, the action calls the Zoom
    API's `/users/{email}` endpoint using the entity's identifier (email address).

    4. **Data Processing**: The resulting JSON data is flattened into a single-level
    dictionary, and keys are prefixed with "Zoom" to avoid naming collisions.

    5. **Internal Update**: The entity's `additional_properties` are updated with
    the Zoom data, and the entity is marked as `is_enriched = True`.

    6. **Finalization**: The action updates the entities within Google SecOps and
    returns a comprehensive JSON result containing the raw data for all successfully
    enriched users.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' and 'is_enriched' status of User entities
      within the SOAR case.
