Scan QR Code:
  ai_description: >-
    ### General Description

    The **Scan QR Code** action extracts and decodes data from a QR code image provided
    as a Base64-encoded string. This utility is primarily used to programmatically
    retrieve the URL or text content embedded within QR codes found in attachments
    or screenshots during security investigations.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default |

    | :--- | :--- | :--- | :--- | :--- |

    | QR Image Base64 Blob | The Base64-encoded string representing the QR code image
    file to be scanned. | String | Yes | N/A |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Base64-encoded image string
    from the input parameters.

    2. **Base64 Decoding:** The string is decoded into raw image bytes. If decoding
    fails, an error is raised.

    3. **API Interaction:** The image bytes are sent to the GOQR API's `read-qr-code`
    endpoint.

    4. **Result Processing:** The action parses the API response, extracting the decoded
    data from the QR symbols.

    5. **Output Generation:** The decoded content is saved into the action's JSON
    results, and the action completes successfully if data is found.


    ### Additional Notes

    * The action expects a valid Base64 string. Ensure that any headers (like `data:image/png;base64,`)
    are stripped if necessary.

    * If the image contains no recognizable QR code or the API fails to decode it,
    the action will result in a failure.
