  ai_description: >-
    ### General Description

    Generates a QR code image from a provided string of data. This action interacts
    with an external QR code generation service to create an image based on user-defined
    parameters such as size, format, and error correction level. The resulting image
    is saved as a temporary file and attached to the current case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Content | string | Yes | The data, URL, or text string to encode into the QR
    code. |

    | Size | string | No | The dimensions of the generated image in pixels in the
    format {width}x{height}. The maximum value is 1000x1000. Default: 200x200. |

    | Image Format | ddl | No | The file format for the output image (png, jpg, gif,
    svg). Default: png. |

    | Error Correction | ddl | No | The level of data redundancy applied to the QR
    code. Higher levels increase damage resistance, but result in a more complex image.
    Default: Low. |

    | Margin | string | No | The width of the blank border (quiet zone) around the
    QR code, measured in pixels. Default: 1. |

    | Foreground Color | string | No | The color of the QR code modules in R-G-B format.
    Default: 0-0-0 (black). |

    | Background Color | string | No | The color of the image background in R-G-B
    format. Default: 255-255-255 (white). |


    ### Flow Description

    1. Extract configuration parameters (Content, Size, Image Format, Error Correction,
    Margin, Foreground Color, Background Color).

    2. Invoke the external QR code generation API with the provided parameters.

    3. Save the returned image bytes to a temporary file.

    4. Attach the generated file to the case wall.

    5. Return a JSON result containing the base64-encoded image and configuration
    details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: Adds an attachment to the case wall.
    reasoning: >-
      The action calls an external API to generate a QR code image (fetches_data=true).
      It does not mutate external systems (can_mutate_external_data=false). It adds
      an attachment to the case wall, which is an internal mutation (can_mutate_internal_data=true).
  categories:
    enrichment: false
    reasoning: >-
      The action generates a QR code image and attaches it to the case. It does not
      gather supplemental context about alerts or entities, so it is not an enrichment
      action.
