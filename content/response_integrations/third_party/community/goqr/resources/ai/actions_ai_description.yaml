  ai_description: >-
    ### General Description

    The Scan QR Code action extracts and reads data from a QR code image provided
    in Base64 format using the GOQR API. It decodes the image and returns the extracted
    data as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | QR Image Base64 Blob | String | Yes | The Base64-encoded string representing
    the QR code image file. |


    ### Flow Description

    1. Extracts the Base64-encoded QR code image from the action parameters.

    2. Decodes the Base64 string into image bytes.

    3. Sends the image bytes to the GOQR API to read and extract the QR code data.

    4. Parses the API response and returns the decoded QR code data as a JSON result.
