  ai_description: >-
    ### General Description

    Use the **Generate QR Code** action to create a QR code image from a provided
    string of data, such as a URL, text, or identifier. This utility action is useful
    for visual representation of data within a case. The generated image is automatically
    attached to the case wall for easy access by analysts.


    ### Parameters Description


    | Parameter | Description | Expected Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Content | The data, URL, or text string to encode into the QR code. | String
    | Yes |

    | Size | The dimensions of the generated image in pixels in the format {width}x{height}.
    The maximum value is 1000x1000. Default is 200x200. | String | No |

    | Image Format | The file format for the output image. Options: png, jpg, gif,
    svg. Default is png. | DDL | No |

    | Error Correction | The level of data redundancy applied to the QR code. Higher
    levels increase damage resistance but result in a more complex image. Options:
    Low (7%), Medium (15%), Quartile (25%), High (30%). Default is Low. | DDL | No
    |

    | Margin | The width of the blank border (quiet zone) around the QR code, measured
    in pixels. Default is 1. | String | No |

    | Foreground Color | The color of the QR code modules in R-G-B format. Default:
    0-0-0 (black). | String | No |

    | Background Color | The color of the image background in R-G-B format. Default:
    255-255-255 (white). | String | No |


    ### Additional Notes

    - This action does not run on Google SecOps entities.

    - The generated QR code is saved as a temporary file and then uploaded as a case
    attachment.

    - The action returns a base64 encoded string of the image in the JSON results
    for use in subsequent playbook steps.


    ### Flow Description

    1. **Extract Parameters:** The action retrieves the input string and optional
    formatting parameters (size, colors, error correction) from the user configuration.

    2. **API Request:** It sends a request to the GOQR API to generate the QR code
    image based on the provided specifications.

    3. **File Handling:** The received image bytes are saved to a temporary file on
    the system.

    4. **Case Integration:** The temporary file is attached to the Google SecOps case
    wall.

    5. **Result Reporting:** The action populates the JSON results with the base64-encoded
    image and metadata, then cleans up temporary files.
