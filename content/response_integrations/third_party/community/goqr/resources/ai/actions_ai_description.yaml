Scan QR Code:
  ai_description: >-
    ### General Description

    The Scan QR Code action extracts and reads data from a QR code image provided
    in Base64 format using the GOQR API. It decodes the image and returns the embedded
    data as structured JSON.


    ### Flow Description

    1. Retrieves the Base64-encoded QR code image from the action parameters.

    2. Decodes the Base64 string into raw image bytes.

    3. Makes an API call to the GOQR service (`v1/read-qr-code/`) to process the image.

    4. Evaluates the API response to ensure the QR code was successfully decoded.

    5. Outputs the decoded data as JSON results.


    ### Additional Notes

    - The action will fail if the provided Base64 string is invalid or cannot be decoded.

    - An error is raised if the uploaded file is not a valid or recognizable QR code
    image, or if the API fails to decode the primary symbol.
  ai_short_description: >-
    Extracts and reads data from a Base64-encoded QR code image using the GOQR API.
