Generate QR Code:
  ai_description: >-
    ### General Description

    Generates a QR code image from a provided string of data using the GOQR API. This
    action takes a text string or URL, customizes the QR code's appearance (size,
    format, colors, margin, and error correction), and attaches the resulting image
    directly to the case wall.


    ### Flow Description

    1. Extracts action parameters including the content to encode, image size, format,
    error correction level, margin, and colors.

    2. Makes an API call to the GOQR service (`api_client.generate_qr_code`) to generate
    the QR code bytes based on the provided specifications.

    3. Saves the generated QR code as a temporary file on the local system.

    4. Attaches the generated QR code image to the Google SecOps case wall.

    5. Returns a JSON result containing the base64 encoded image blob and the configuration
    details used to generate it.


    ### Additional Notes

    This action does not run on Google SecOps entities. It operates solely on the
    string data provided in the 'Content' parameter.
  ai_short_description: >-
    Generates a customized QR code image from a provided string of data and attaches
    it to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Attaches the generated QR code image to the case wall.
    reasoning: >-
      The action makes an external API call to retrieve the generated QR code image
      bytes (fetches_data=true). It does not mutate any external systems. It mutates
      internal data by attaching the generated image file to the case wall (can_mutate_internal_data=true).
      It does not update entities, create insights, modify alert data, or create case
      comments.
