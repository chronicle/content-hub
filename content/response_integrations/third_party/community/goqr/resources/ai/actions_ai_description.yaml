  ai_description: >-
    ### General Description

    The Generate QR Code action creates a QR code image from a provided string of
    data using the GOQR API. The generated image is attached to the case wall, and
    its base64 representation along with metadata is returned as a JSON result. This
    action is a utility and does not run on Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | --- | --- | --- | --- | --- |

    | Content | string | Yes | | The data, URL, or text string to encode into the
    QR code. |

    | Size | string | No | 200x200 | The dimensions of the generated image in pixels
    in the format {width}x{height}. The maximum value is 1000x1000. |

    | Image Format | ddl | No | png | The file format for the output image. Optional
    values: png, jpg, gif, svg. |

    | Error Correction | ddl | No | Low | The level of data redundancy applied to
    the QR code. Higher levels increase damage resistance, but result in a more complex
    image. Optional values: Low, Medium, Quartile, High. |

    | Margin | string | No | 1 | The width of the blank border (quiet zone) around
    the QR code, measured in pixels. |

    | Foreground Color | string | No | 0-0-0 | The color of the QR code modules in
    R-G-B format. Default is black. |

    | Background Color | string | No | 255-255-255 | The color of the image background
    in R-G-B format. Default is white. |


    ### Flow Description

    1. Extracts the action parameters including the content string, size, format,
    and styling options.

    2. Calls the GOQR API to generate the QR code based on the provided parameters.

    3. Saves the generated QR code as a temporary file.

    4. Attaches the generated file to the case wall.

    5. Returns a JSON result containing the base64 encoded image and its configuration
    metadata.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
