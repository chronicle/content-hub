Generate QR Code:
  ai_description: >-
    ### General Description

    The **Generate QR Code** action creates a QR code image from a provided string
    of data, such as a URL or text. This utility action is useful for generating visual
    representations of data that can be scanned by mobile devices or other QR readers.
    The resulting image is automatically attached to the case wall in Google SecOps
    and provided as a base64-encoded string in the action's output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | **Content** | String | Yes | N/A | The data, URL, or text string to encode into
    the QR code. |

    | **Size** | String | No | 200x200 | The dimensions of the generated image in
    pixels (e.g., 300x300). Max 1000x1000. |

    | **Image Format** | DDL | No | png | The file format for the output image (png,
    jpg, gif, svg). |

    | **Error Correction** | DDL | No | Low | Level of data redundancy (Low, Medium,
    Quartile, High). |

    | **Margin** | String | No | 1 | Width of the blank border around the QR code
    in pixels. |

    | **Foreground Color** | String | No | 0-0-0 | Color of the QR code modules in
    R-G-B format. |

    | **Background Color** | String | No | 255-255-255 | Color of the image background
    in R-G-B format. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input string and optional
    formatting parameters (size, colors, etc.).

    2. **API Request**: It sends a request to the GOQR API to generate the QR code
    based on the provided configuration.

    3. **File Handling**: The received image bytes are saved as a temporary file.

    4. **Case Integration**: The temporary file is uploaded as an attachment to the
    current Google SecOps case.

    5. **Result Generation**: The action returns a JSON object containing the base64-encoded
    image and metadata, and cleans up temporary files.


    ### Additional Notes

    - This action does not process or require Google SecOps entities.

    - The generated QR code is visible on the Case Wall as an attachment.
  capabilities:
