    internal_data_mutation_explanation: >-
      Attaches the generated QR code image file to the case wall.
    reasoning: >-
      The action calls an external API to generate a QR code image based on user input,
      but it does not fetch contextual data about alerts or entities (fetches_data=false).
      It does not mutate any state in an external system (can_mutate_external_data=false).
      It modifies internal data by attaching the generated QR code file to the case
      wall (can_mutate_internal_data=true). It does not update entities, create insights,
      modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action does not fetch contextual data about alerts or entities, and it downloads/generates
      a file, so it is not an Enrichment action. It does not perform any containment,
      isolation, or mitigation tasks, so it is not a Remediation action.
    remediation: false
  entity_usage:
