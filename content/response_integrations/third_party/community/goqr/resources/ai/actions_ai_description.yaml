  ai_description: >-
    ### General Description

    The **Scan QR Code** action allows users to extract and decode information from
    a QR code image. The image must be provided as a Base64-encoded string. This utility
    is particularly useful for security analysts who need to programmatically inspect
    the contents of QR codes found in phishing emails, documents, or other suspicious
    artifacts.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | QR Image Base64 Blob | The Base64-encoded string representing the QR code image
    file to be scanned. | string | True | "" |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Base64-encoded image string
    from the input parameters.

    2. **Base64 Decoding**: The string is decoded into raw image bytes. If the string
    is not valid Base64, the action raises a `GOQRError`.

    3. **API Request**: The image bytes are sent to the GOQR API's `read-qr-code`
    endpoint.

    4. **Response Validation**: The action checks if the API successfully identified
    and decoded any QR code symbols within the image.

    5. **Data Extraction**: If valid symbols are found, the action extracts the decoded
    data and metadata (such as the QR code type).

    6. **Output Generation**: The decoded results are formatted into a JSON object,
    and the action completes successfully.


    ### Additional Notes

    - The action expects a valid image file (e.g., PNG, JPG) encoded in Base64 format.

    - If the image does not contain a recognizable QR code or if the API cannot decode
    it, the action will fail with a descriptive error message.
