Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the GOQR (QR Server) API. Its primary purpose is
    to ensure that the integration's configuration (such as the API Root and SSL settings)
    is correct and that the external service is reachable.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. **Initialization**: The action initializes the GOQR API client using the global
    integration configuration (API Root and Verify SSL).

    2. **Connectivity Test**: It executes a lightweight API call to the QR Server's
    `create-qr-code` endpoint using a static 'PingCheck' data string.

    3. **Validation**: The action checks the response from the server. If the server
    responds successfully, the action concludes that the connection is established.

    4. **Output**: A success message is returned if the connection is valid; otherwise,
    an error message is generated to assist in troubleshooting.


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting communication issues.
