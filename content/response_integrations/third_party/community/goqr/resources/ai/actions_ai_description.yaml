  ai_description: >-
    ### General Description

    Use the Scan QR Code action to extract and read data from a QR code image provided
    in Base64 format. This action interacts with an external QR code scanning API
    to decode the image content and return the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | QR Image Base64 Blob | string | Yes | The Base64-encoded string representing
    the QR code image file. |


    ### Flow Description

    1. Accepts a Base64-encoded string representing a QR code image.

    2. Decodes the Base64 string into binary image data.

    3. Sends the image data to the configured QR code scanning API.

    4. Parses the API response to extract the decoded QR code data.

    5. Returns the decoded information as a JSON result.


    ### Additional Notes

    The action requires a valid Base64-encoded string of a QR code image to function.
    If the provided string is not a valid Base64-encoded image or does not contain
    a QR code, the action will fail.
