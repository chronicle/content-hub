  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the QR Server API. It ensures that the integration
    is correctly configured and that the network path to the API endpoint is open.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action uses the 'API Root' and 'Verify SSL' settings defined in the integration
    configuration to establish the connection. It performs a lightweight request to
    a specific endpoint to confirm the service is responsive.


    ### Flow Description

    1. **Initialize API Client**: The action starts by retrieving the integration's
    global configuration, including the API Root URL and SSL verification settings.

    2. **Execute Connectivity Test**: It sends a test request to the QR Server API
    (specifically targeting the QR code creation endpoint with a 'PingCheck' payload).

    3. **Evaluate Response**: The action checks if the API responds successfully without
    errors.

    4. **Report Status**: If the connection is successful, it returns a confirmation
    message; otherwise, it provides an error message indicating a configuration or
    connectivity issue.
