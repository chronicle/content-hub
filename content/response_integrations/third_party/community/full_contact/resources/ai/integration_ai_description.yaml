  reasoning: >-
    The 'full_contact' integration provides identity resolution and enrichment services
    for User entities. It retrieves professional and company-related metadata (e.g.,
    industry, title, location) to enrich user profiles within the SOAR platform. It
    does not perform threat intelligence (reputation, risk scores, malware analysis),
    nor does it manage identity (suspension, password resets) or manage hardware assets.
    While it provides context about users, it does not fit the specific 'Expected
    Outcome' definitions for IAM (which requires management capabilities) or Asset
    Inventory (which focuses on device management). Therefore, it does not align with
    any of the provided product categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
