Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with contextual data extracted from the Full Contact product.


    ### Flow Description

    1. Iterates through the target entities and filters for User entities.

    2. Extracts the email address and domain from the User entity's identifier.

    3. Makes a POST request to the Full Contact API (`/v3/company.enrich`) to retrieve
    company details based on the domain.

    4. Makes a POST request to the Full Contact API (`/v3/person.enrich`) to retrieve
    person details based on the email address.

    5. Updates the entity's additional properties with the retrieved company and person
    information.

    6. Saves the updated entities back to the platform and returns the enrichment
    data as a JSON result.


    ### Additional Notes

    The action expects User entities to be formatted as email addresses to successfully
    extract the domain and email for enrichment.
  ai_short_description: >-
    Enriches User entities by retrieving company and person details from the Full
    Contact API and updating the entities' additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST requests to Full Contact's enrichment endpoints to fetch
      data. Although it uses POST, it does not mutate external data. It updates internal
      entities with the fetched data but does not create insights or mutate other
      internal data.
