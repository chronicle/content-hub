Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Full Contact API. Its primary purpose is to ensure that the integration's
    configuration, specifically the API Key, is correct and that the service is reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action performs a test enrichment request using a hardcoded domain ('google.com')
    against the Full Contact Company Enrichment API. It is used as a diagnostic tool
    rather than a functional enrichment step for case entities.


    ### Flow Description

    1. **Retrieve Configuration:** The action fetches the 'API Key' from the Full
    Contact integration settings.

    2. **Initialize Manager:** It sets up the `FullContactManager` with the provided
    credentials.

    3. **Execute Test Request:** The action sends a POST request to the `https://api.fullcontact.com/v3/company.enrich`
    endpoint for the domain 'google.com'.

    4. **Error Handling:** It specifically monitors for a 401 Unauthorized status
    code. If detected, it raises an exception to notify the user of an authentication
    failure.

    5. **Finalize:** If the request completes without authentication errors, the action
    returns a success status.
