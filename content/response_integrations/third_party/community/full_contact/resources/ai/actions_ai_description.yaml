  ai_description: "Enriches User entities using the Full Contact API. This action\
    \ retrieves comprehensive person and company metadata based on the email address\
    \ of the User entity. It extracts professional details such as job titles and\
    \ LinkedIn profiles, as well as organizational data including company size, industry,\
    \ and location.\n\n### Flow Description:\n1. **Configuration Retrieval:** Fetches\
    \ the Full Contact API key from the integration settings.\n2. **Entity Filtering:**\
    \ Iterates through the target entities and identifies those of type `USER`.\n\
    3. **Data Extraction:** For each User entity, it extracts the email address and\
    \ the associated domain.\n4. **External API Interaction:** \n    * Calls the Full\
    \ Contact `company.enrich` endpoint using the domain to get organizational context.\n\
    \    * Calls the Full Contact `person.enrich` endpoint using the email to get\
    \ individual context.\n5. **Data Mapping:** Maps the retrieved attributes (e.g.,\
    \ Company Name, Industry, Employee Count, Person Title, Gender, LinkedIn URL)\
    \ to the entity's `additional_properties`.\n6. **Internal Update:** Updates the\
    \ entities within Google SecOps with the new enrichment data and provides a JSON\
    \ result for the action.\n\n### Parameters Description:\nThere are no input parameters\
    \ for this action."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of User entities with enrichment data retrieved
      from Full Contact.
  categories:
