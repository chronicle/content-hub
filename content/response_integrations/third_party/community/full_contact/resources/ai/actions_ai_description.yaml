Ping:
  ai_description: >-
    ### General Description

    This action tests connectivity to the Full Contact API to ensure the integration
    is configured correctly with valid credentials.


    ### Flow Description

    1. Retrieves the API key from the integration configuration.

    2. Makes a POST request to the Full Contact `company.enrich` API endpoint using
    a hardcoded test domain (`google.com`).

    3. Evaluates the API response to ensure the provided API key is valid and does
    not return a 401 Unauthorized status.

    4. Returns a success message and a true result value if the connection is successfully
    established and authenticated.


    ### Additional Notes

    This is a utility action primarily used for verifying integration health and credentials.
    It does not process case entities or return enrichment data to the case.
  ai_short_description: >-
    Tests connectivity to the Full Contact API by attempting to enrich a hardcoded
    test domain.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP POST request to the Full Contact API solely to test
      connectivity. It does not fetch contextual data for alerts/entities, does not
      mutate external data (the endpoint is for enrichment, not state change), and
      does not mutate internal data, update entities, create insights, modify alert
      data, or create case comments.
