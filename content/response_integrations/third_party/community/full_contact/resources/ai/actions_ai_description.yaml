    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata (company details, person title, gender,
      LinkedIn profile) for a user entity. This aligns with the 'Enrich Asset' expected
      outcome. It does not enrich IOCs, update alerts, or perform any containment
      or remediation actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
