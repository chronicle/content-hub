  ai_description: >-
    ### General Description

    Tests connectivity with the Full Contact service. This action is used to verify
    that the API key provided in the integration configuration is valid and that the
    Google SecOps environment can reach the Full Contact API endpoints.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action uses a hardcoded domain ('google.com') to perform a test enrichment
    request. It does not process any entities from the case.


    ### Flow Description

    1. **Configuration Retrieval:** Fetches the 'API Key' from the 'Full Contact'
    integration settings.

    2. **API Request:** Sends a POST request to the Full Contact company enrichment
    endpoint using the hardcoded domain 'google.com'.

    3. **Authentication Check:** Evaluates the response status. If a 401 Unauthorized
    status is returned, an exception is raised.

    4. **Completion:** If the request is successful (or returns a non-401 status),
    the action concludes with a success message.
