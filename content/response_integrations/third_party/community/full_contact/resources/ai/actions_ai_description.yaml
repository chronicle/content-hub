      The action makes an API call to the Full Contact company enrichment endpoint
      to test connectivity, so it fetches data. It does not mutate any external data
      as it only queries an enrichment endpoint. It does not interact with internal
      SecOps data, entities, insights, alerts, or case comments.
  categories:
