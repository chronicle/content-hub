  ai_description: >-
    ### General Description

    Tests connectivity with the Full Contact product by making a test API call to
    the company enrichment endpoint using a hardcoded domain.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Retrieves the API key from the integration configuration.

    2. Initializes the FullContactManager.

    3. Makes a POST request to the company enrichment endpoint with the domain "google.com".

    4. Checks if the response status is 401 (Unauthorized) and raises an exception
    if so.

    5. Returns a success message if the request is successful.
  capabilities:
