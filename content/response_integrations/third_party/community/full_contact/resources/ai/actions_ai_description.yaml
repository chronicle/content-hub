Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with detailed person and company information using the
    Full Contact API. This action takes the email address from a User entity, extracts
    the domain, and queries Full Contact to retrieve professional and organizational
    metadata. The retrieved data is then mapped to the entity's additional properties
    within Google SecOps, providing analysts with deeper context about the individuals
    and organizations involved in an alert.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the 'API
    Key' configured in the integration settings.


    ### Additional Notes

    * This action specifically targets entities of type **USER**.

    * It performs two types of enrichment: Person enrichment (using the full email)
    and Company enrichment (using the email domain).

    * The action handles HTTP 202 (Accepted) responses from Full Contact by polling
    until the data is ready.


    ### Flow Description

    1. **Configuration Retrieval:** Fetches the Full Contact API Key from the integration
    configuration.

    2. **Entity Filtering:** Iterates through the target entities and identifies those
    of type `USER`.

    3. **Data Extraction:** For each User entity, extracts the full email address
    and the domain part of the email.

    4. **Company Enrichment:** Queries the Full Contact `company.enrich` endpoint
    using the extracted domain to get details like company name, size, industry, and
    location.

    5. **Person Enrichment:** Queries the Full Contact `person.enrich` endpoint using
    the email address to get details like gender, job title, and LinkedIn profile.

    6. **Internal Mutation:** Maps the retrieved data points to the entity's `additional_properties`
    (e.g., `FullContact_CompanyName`, `FullContact_Person_Linkedin`).

    7. **Entity Update:** Updates the entities in Google SecOps with the new enriched
    attributes.

    8. **Result Reporting:** Returns a JSON result containing the raw enrichment data
    for each successfully enriched entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
