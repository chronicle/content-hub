    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Enriches User entities using the FullContact API. The action extracts the email
    address and domain from the user entity, queries FullContact for person and company
    details, and updates the entity's properties with the retrieved contextual data
    such as company name, location, person title, and LinkedIn profile.


    ### Parameters Description

    There are no action-specific parameters required for this action.


    ### Flow Description

    1. Iterates through the target entities and filters for User entities.

    2. Extracts the email address and domain from the entity identifier.

    3. Queries the FullContact API for company enrichment using the extracted domain.

    4. Queries the FullContact API for person enrichment using the extracted email
    address.

    5. Updates the entity's additional properties with the retrieved data.

    6. Returns a JSON result containing the enrichment data and updates the entities
    in the platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the target entities with the fetched enrichment data.
    reasoning: >-
      The action fetches data from the FullContact API using POST requests to the
      '/v3/company.enrich' and '/v3/person.enrich' endpoints. It does not mutate external
      data as these are strictly enrichment queries. It mutates internal data by updating
      the target entities with the fetched enrichment data using 'siemplify.update_entities'.
      It does not create insights, modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (FullContact) to enrich entities.
      It does not mutate external systems and only performs allowed internal mutations
      (updating entities). Therefore, it is classified as an Enrichment action. It
      does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over 'siemplify.target_entities' and filters them using 'ent.entity_type
      == EntityTypes.USER'. Therefore, it runs on USER entities (mapped to USERUNIQNAME)
      and filters by entity type.
