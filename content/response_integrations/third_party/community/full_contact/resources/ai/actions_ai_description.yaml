  ai_description: >-
    Enriches User entities using the Full Contact API. This action retrieves professional
    and company-related metadata for a given user email and domain, then updates the
    entity's profile within the SOAR platform.


    ### Flow Description

    1. The action iterates through the provided target entities.

    2. It filters for entities of type `USER`.

    3. For each user, it extracts the email address and the associated domain.

    4. It queries the Full Contact API (`/v3/person.enrich` and `/v3/company.enrich`)
    to retrieve contextual data.

    5. It parses the API response to extract details such as company name, industry,
    location, employee count, and person-specific details like title and LinkedIn
    profile.

    6. It updates the entity's `additional_properties` with the retrieved information.

    7. Finally, it updates the entities in the SOAR platform and returns the enrichment
    results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key | String | Yes | The API key required to authenticate with the Full
    Contact API. This is retrieved from the integration configuration. |


    ### Additional Notes

    This action only processes entities of type `USER`. If other entity types are
    provided, they will be ignored. The action relies on the `Full Contact` integration
    configuration to obtain the necessary API credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's `additional_properties` with retrieved enrichment data.
    reasoning: >-
      The action fetches data from an external API (Full Contact) to enrich user entities.
      It updates the entity's `additional_properties` within the SOAR platform, which
      is an allowed internal mutation for enrichment actions. It does not modify external
      systems or create insights/comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Full Contact) and updates internal
      entity properties. It does not mutate external systems. This fits the definition
      of an Enrichment Action.
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly checks `if
      ent.entity_type == EntityTypes.USER`. Therefore, it only processes `USER` entities.
