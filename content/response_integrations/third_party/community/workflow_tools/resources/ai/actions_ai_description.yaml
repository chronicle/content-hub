    internal_data_mutation_explanation: >-
      Assigns the case to a reviewer using the Siemplify API.
    reasoning: >-
      The action fetches user profile data from the API (fetches_data=true). It mutates
      external data by sending a Slack notification and calling the MoveAlertToNewCase
      API (can_mutate_external_data=true). It mutates internal data by assigning the
      case to a reviewer (can_mutate_internal_data=true). It modifies alert data by
      moving the alert to a new case (can_modify_alert_data=true). It does not update
      entities, create insights, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is a workflow management tool, not an enrichment action. It does
      not fetch context for entities.
