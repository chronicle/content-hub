Approval Response:
  ai_description: >-
    Processes an approval or denial for a workflow request within a Google SecOps
    case. This action validates that the user executing the action is an authorized
    'Approval Manager' or 'Secondary Approval Manager' (supporting both specific usernames
    and roles starting with '@'). If authorized, it records the decision, adds any
    provided comments to the case, and sends a notification to a configured Slack
    webhook.


    ### Flow Description

    1. **Authentication & Setup:** Extracts configuration parameters including API
    credentials, Slack Webhook URL, and authorized Approval Managers.

    2. **User Validation:** Identifies the user who triggered the action and verifies
    if they match the authorized managers or belong to the authorized SOC roles by
    querying the internal User Profiles API.

    3. **Decision Processing:** Based on the 'Action Approved' parameter, it determines
    the approval status and constructs a notification message.

    4. **Internal Mutation:** If 'Response Comments' are provided, it appends them
    as a comment to the current case and alert.

    5. **External Notification:** Sends the final approval or denial message (including
    links to the case) to the specified Slack channel.

    6. **Result Reporting:** Returns a JSON object containing the reviewer's name,
    comments, and the final approval status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Action Approved | boolean | No | Determines the outcome of the request. If true,
    the request is marked as approved; if false, it is denied. Default is false. |

    | Response Comments | string | No | Optional notes provided by the reviewer. These
    are added as a case comment and included in the Slack notification. |


    ### Additional Notes

    - The action will fail with an error if the user attempting to run it is not listed
    as an 'Approval Manager' or 'Secondary Approval Manager' in the integration settings.

    - Role-based authorization is supported by prefixing the manager name with '@'
    (e.g., '@SOC_Managers').
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
