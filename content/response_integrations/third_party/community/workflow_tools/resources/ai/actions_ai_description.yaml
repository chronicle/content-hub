  ai_description: >-
    This action performs a connectivity check and configuration validation for the
    'Workflow Tools' integration. It verifies API access by querying user profiles
    and tests the Slack integration by sending a test message.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Siemplify API Key | String | Yes | API key for authentication. |

    | Siemplify API Root | String | Yes | Base URL for the API. |

    | Siemplify Instance Hostname | String | Yes | Hostname of the instance. |

    | Slack Webhook URL | String | No | URL for Slack notifications. |

    | Approval Manager | String | Yes | Primary reviewer name or role. |

    | Secondary Approval Manager | String | No | Secondary reviewer name or role.
    |


    ### Flow Description

    1. Extracts configuration parameters (API credentials, Slack webhook, and reviewer
    details).

    2. Initializes the `WorkflowToolsManager`.

    3. Validates the provided reviewer and secondary reviewer against the SecOps user
    profiles via API.

    4. Sends a test message to the configured Slack webhook.

    5. Logs the completion status.
