Approval Response:
  ai_description: >-
    ### General Description

    Allows an authorized user to respond to a workflow approval request, either approving
    or denying it. The action verifies the user's permissions, records their response,
    optionally adds comments to the case, and sends a notification to a configured
    Slack channel.


    ### Flow Description

    1. Extracts the action parameters (`Action Approved` and `Response Comments`)
    and integration configuration parameters.

    2. Verifies if the requesting user is authorized to approve or deny the request
    by checking their username or role via the internal Siemplify API (`/api/external/v1/settings/GetUserProfiles`).

    3. If authorized, evaluates the `Action Approved` parameter to determine the response
    status.

    4. If `Response Comments` are provided, adds a comment to the case using the Siemplify
    API.

    5. Sends a notification message containing the approval status and comments to
    a configured Slack Webhook URL via an HTTP POST request.

    6. Returns a JSON result with the approval status, reviewer details, and comments.


    ### Additional Notes

    If the requesting user is unauthorized, the action fails, logs an error to Slack,
    and raises an exception to halt the workflow.
  ai_short_description: >-
    Allows an authorized user to respond to a workflow approval request, optionally
    adding case comments and sending a notification to Slack.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an approval or denial notification message to a configured Slack Webhook.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a comment to the case with the reviewer's response notes.
    reasoning: >-
      The action does not fetch external contextual data for enrichment. It mutates
      external data by sending a POST request to a Slack Webhook. It mutates internal
      data by adding a comment to the case/alert. It does not update entities or create
