  ai_description: "### General Description\nThe **Approval Response** action allows\
    \ an authorized user (Approval Manager) to respond to a pending approval request\
    \ within a Google SecOps workflow. It validates the identity of the user attempting\
    \ the action against a predefined list of managers or roles. Once validated, it\
    \ records the approval or denial decision, attaches reviewer comments to the case,\
    \ and sends a notification to a Slack channel.\n\n### Parameters Description\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Action Approved | Boolean | Yes | Determines the outcome of the request.\
    \ If set to `True`, the request is approved; if `False`, it is denied. |\n| Response\
    \ Comments | String | No | Optional notes or justification provided by the reviewer.\
    \ These are added as a comment to the case. |\n\n### Flow Description\n1. **Configuration\
    \ Extraction:** The action retrieves integration settings including API credentials,\
    \ Slack webhook URLs, and the identities of authorized Approval Managers.\n2.\
    \ **User Validation:** It identifies the user who triggered the action (`original_requesting_user`)\
    \ and checks if they match the authorized manager names or belong to the authorized\
    \ SOC roles by querying the Google SecOps API.\n3. **Decision Processing:** \n\
    \    * If the user is authorized and the action is approved, it prepares an approval\
    \ message.\n    * If the user is authorized and the action is denied, it prepares\
    \ a denial message.\n    * If the user is unauthorized, the action fails and sends\
    \ an error notification to Slack.\n4. **Internal Documentation:** If comments\
    \ were provided, the action adds them to the case wall using the `add_comment`\
    \ method.\n5. **External Notification:** The final decision (including the reviewer's\
    \ name and comments) is posted to the configured Slack webhook.\n\n### Additional\
    \ Notes\n* This action requires the `Workflow Tools` integration to be configured\
    \ with a valid Siemplify API Key and Root to perform user role validation.\n*\
    \ If the `Approval Manager` parameter starts with an `@` symbol, the action treats\
    \ it as a Role check rather than a specific username check."
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
