  ai_description: >-
    Allows a designated user (Approval Manager) to respond to an approval request
    within a workflow, either approving or denying it. The action verifies the user's
    authorization, logs the decision to a specified Slack channel via a webhook, and
    optionally adds the reviewer's comments to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Action Approved | Boolean | False | Indicates whether the manager approves (True)
    or denies (False) the request. |

    | Response Comments | String | False | Any relevant notes or reasoning to be added
    as a comment to the case. |


    ### Flow Description

    1. Extracts configuration and action parameters, including the requesting user
    and approval managers.

    2. Verifies if the requesting user is authorized to approve the action (either
    directly or via their SOC role by querying the internal API).

    3. If authorized, processes the approval or denial decision.

    4. If response comments are provided, adds them as a comment to the case.

    5. Sends a notification message with the decision to the configured Slack webhook.

    6. Returns a JSON result with the approval status and reviewer details.
