Approval Request:
  ai_description: >-
    ### General Description

    This action requires approval from a reviewer before continuing a workflow. It
    assigns the current case or alert to a specified approval manager and sends a
    notification to a Slack channel via a webhook.


    ### Flow Description

    1. Extracts configuration parameters (such as API credentials and Slack webhook
    URL) and the action parameter `Move Alert If Grouped`.

    2. Evaluates if the alert should be moved to a new case if it is grouped with
    other alerts.

    3. If the alert should not be moved, it assigns the current case to the approval
    manager and sends a Slack notification.

    4. If the alert should be moved and the case contains multiple alerts, it makes
    a POST request to the Siemplify API (`/api/external/v1/cases/MoveAlertToNewCase`)
    to move the alert to a new case. It then assigns the new case to the approval
    manager and sends a Slack notification.

    5. If the alert should be moved but is the only alert in the case, it simply assigns
    the case to the approval manager and sends a Slack notification.

    6. Returns a JSON result containing the original case ID, new case ID, and approval
    manager details.


    ### Additional Notes

    The action relies on a Slack webhook URL configured in the integration settings
    to send notifications. It also requires valid Siemplify API credentials to move
    alerts and assign cases.
  ai_short_description: >-
    Assigns a case or alert to an approval manager for review, optionally moving grouped
    alerts to a new case, and sends a notification via Slack webhook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to a Slack channel via a webhook URL.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Assigns the case to an approval manager and optionally moves an alert to a new
      case if it is grouped with other alerts.
    reasoning: >-
      The action does not fetch contextual data. It mutates external data by sending
      a message to a Slack webhook. It mutates internal data by assigning cases to
      users and optionally moving alerts to new cases via the Siemplify API. It does
      not update entities or create insights.
