    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a comment to the case and alert using the Siemplify SDK.
    reasoning: >-
      The action fetches user profile data to validate authorization. It mutates external
      data by sending a notification to a Slack webhook. It mutates internal data
      by adding a comment to the case and alert using the Siemplify SDK.
  categories:
    enrichment: false
    reasoning: >-
      The action is not an enrichment action because it performs external mutations
      (Slack notification) and does not primarily fetch data to enrich entities or
      alerts. It is an operational workflow action.
