  ai_description: "### General Description\nThe **Approval Request** action is designed\
    \ to facilitate manual intervention within a workflow by pausing execution and\
    \ requiring a reviewer's approval. It manages the assignment of cases to specific\
    \ approval managers and provides the option to isolate a specific alert into its\
    \ own case if it is currently grouped with others. Additionally, it integrates\
    \ with Slack to notify the designated reviewer that a case is awaiting their attention.\n\
    \n### Parameters Description\n| Parameter | Description | Type | Mandatory | \n\
    | :--- | :--- | :--- | :--- |\n| Move Alert If Grouped | If set to `true` and\
    \ the current case contains multiple alerts, the action will move the specific\
    \ alert being processed into a new, separate case before assigning it for approval.\
    \ If `false`, the entire case is assigned as-is. | Boolean | No (Default: true)\
    \ |\n\n### Additional Notes\n- This action requires several integration-level\
    \ configuration parameters to be set, including the Siemplify API Key, API Root,\
    \ Instance Hostname, and a Slack Webhook URL.\n- The 'Approval Manager' and 'Secondary\
    \ Approval Manager' are defined at the integration configuration level, not as\
    \ action parameters.\n- If the alert is moved to a new case, the action returns\
    \ both the original and the new case IDs in the JSON result.\n\n### Flow Description\n\
    1. **Initialization**: The action retrieves configuration details for the Siemplify\
    \ API and Slack webhook.\n2. **Grouping Check**: It evaluates the `Move Alert\
    \ If Grouped` parameter. If enabled and the case contains more than one alert,\
    \ it triggers a request to the Siemplify API to move the current alert to a new\
    \ case.\n3. **Case Assignment**: The action assigns the relevant case (either\
    \ the original one or the newly created one) to the designated 'Approval Manager'.\n\
    4. **Notification**: It constructs a message containing a direct link to the case\
    \ and sends it to the configured Slack channel via a webhook.\n5. **Completion**:\
    \ The action finishes with a status of 'Completed', providing the case IDs and\
    \ assignment details in the output."
  capabilities:
