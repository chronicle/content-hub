  ai_description: >-
    This action assigns a case or alert to an approval manager for review and optionally
    sends a notification to a Slack webhook. If the alert is grouped with other alerts
    in a single case, the action can be configured to move the alert to a new, separate
    case before assigning it.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Move Alert If Grouped | Boolean | False | If true and the alert is grouped in
    a case with several other alerts, the action will move this alert to its own case
    before continuing the workflow. |


    ### Action Flow

    1. Extracts configuration and action parameters.

    2. Checks if the alert should be moved to a new case based on the `Move Alert
    If Grouped` parameter and the number of alerts in the current case.

    3. If required, moves the alert to a new case using the Siemplify API.

    4. Assigns the case (original or new) to the specified approval manager.

    5. Sends a notification message to the configured Slack webhook.

    6. Returns a JSON result containing the original case ID, new case ID, and approval
    managers.
