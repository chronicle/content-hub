    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to an external Slack channel via a webhook to alert
      a reviewer.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Reassigns the case to a specific user and potentially moves an alert to a new
      case, changing the case structure within Google SecOps.
