Approval Request:
  ai_description: >-
    ### General Description

    The **Approval Request** action is designed to pause a workflow and require manual
    intervention from a designated reviewer. It manages the assignment of cases within
    Google SecOps and provides external notification via Slack to ensure reviewers
    are alerted promptly. A key feature is the ability to isolate a specific alert
    into its own case, preventing a single approval from inadvertently affecting other
    alerts grouped in the same case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Move Alert If Grouped | Boolean | No | If set to `true` (default), and the current
    case contains more than one alert, the action will move the specific alert being
    processed into a new, separate case before assigning it to the reviewer. |


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches necessary integration settings,
    including Siemplify API credentials, the Slack webhook URL, and the designated
    Approval Managers.

    2. **Case/Alert Evaluation:** It identifies the current case and alert identifiers.

    3. **Alert Isolation (Optional):** If `Move Alert If Grouped` is enabled and the
    case has multiple alerts, the action calls the Siemplify API to move the current
    alert to a new case.

    4. **Assignment:** The action assigns the target case (either the original or
    the newly created one) to the primary Approval Manager.

    5. **Notification:** A message containing a direct link to the case is sent to
    the configured Slack webhook.

    6. **Result Reporting:** The action returns a JSON object containing the original
    and (if applicable) new case IDs, along with the assigned managers.


    ### Additional Notes

    - This action requires the "Workflow Tools" integration to be properly configured
    with an API Key that has permissions to move alerts and assign cases.

    - If no Slack Webhook URL is provided, the notification step is skipped.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to a Slack channel via a webhook.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Reassigns the case to a specific reviewer and potentially moves an alert to
      a new case within Google SecOps.
