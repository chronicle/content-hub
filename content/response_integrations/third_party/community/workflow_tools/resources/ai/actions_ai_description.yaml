  ai_description: >-
    ### General Description

    This action manages workflow approvals by assigning cases to designated reviewers
    and optionally moving alerts to new cases if they are grouped. It integrates with
    the Google SecOps (Siemplify) API to perform case management tasks and sends notifications
    to a configured Slack webhook.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Move Alert If Grouped | boolean | false | If true, moves the alert to a new
    case if it is currently grouped with other alerts. |


    ### Flow Description

    1. Extracts configuration parameters including API credentials, Slack webhook,
    and approval managers.

    2. Determines if the alert needs to be moved to a new case based on the `Move
    Alert If Grouped` parameter and the number of alerts in the case.

    3. If moving is required, calls the API to move the alert to a new case.

    4. Assigns the case (or the new case) to the specified approval manager.

    5. Sends a notification to the configured Slack webhook.

    6. Returns a JSON result containing the original case ID, new case ID (if applicable),
    and reviewer information.
