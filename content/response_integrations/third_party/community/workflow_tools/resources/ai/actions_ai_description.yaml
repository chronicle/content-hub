Assign Case to Current User:
  ai_description: >-
    ### General Description

    Assigns the current case and alert to the user who manually triggered the action.
    This action is designed to be used at the beginning of a playbook to ensure that
    the analyst who initiates the investigation is officially recorded as the owner
    of the case and the specific alert within the Google SecOps platform.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    * **Manual Execution Required:** This action will fail if executed automatically
    by the system (e.g., as part of an automated playbook trigger) because it relies
    on the `original_requesting_user` context, which is only populated during manual
    execution.

    * **System User Check:** The action explicitly checks if the requesting user is
    "System" and will raise an error if so, preventing automated assignments to the
    system account.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the necessary API credentials
    and instance hostname from the integration configuration.

    2. **Context Identification:** It identifies the current Case ID and Alert ID
    from the execution context.

    3. **User Identification:** It retrieves the identifier of the user who triggered
    the action (`original_requesting_user`).

    4. **Validation:** It verifies that the requesting user is not the "System" user.

    5. **Assignment:** It calls the internal SDK method to assign the case and alert
    to the identified user.

    6. **Completion:** The action ends, returning the username of the assigned user
    as the result value.
  capabilities:
