    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to an external Slack channel via a webhook to report
      the approval or denial of a request.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a comment to the Google SecOps case containing the reviewer's notes and
      decision details.
