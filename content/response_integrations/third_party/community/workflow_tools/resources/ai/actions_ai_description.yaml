Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity and
    configuration of the Workflow Tools integration. It ensures that the Google SecOps
    platform can successfully communicate with its internal API and external services
    like Slack.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration settings, such as the API Key, API Root, and Slack
    Webhook URL.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves integration-level settings,
    including the Siemplify API Key, API Root, and Slack Webhook URL.

    2. **Manager Initialization**: Initializes the `WorkflowToolsManager` with the
    extracted configuration to handle API requests.

    3. **User/Role Validation**: The action calls the internal API (`GetUserProfiles`)
    to verify the existence and roles of the primary and secondary approval managers
    specified in the configuration.

    4. **External Connectivity Test**: Sends a test notification message to the configured
    Slack Webhook URL to verify outbound communication.

    5. **Execution Completion**: If all checks (API connectivity and Slack messaging)
    succeed, the action completes with a success status.


    ### Additional Notes

    This action does not interact with or process any entities within a case. It is
    strictly for system health and configuration validation.
