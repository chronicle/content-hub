Ping:
  ai_description: >-
    ### General Description

    This action serves as a connectivity test (ping) for the Workflow Tools integration.
    It verifies the integration's configuration by checking user roles via the internal
    Siemplify API and sending a test message to a configured Slack webhook.


    ### Flow Description

    1. Extracts integration configuration parameters, including API credentials, reviewer
    details, and a Slack webhook URL.

    2. Initializes the `WorkflowToolsManager`.

    3. Checks the configured primary and secondary approval managers against the Siemplify
    API (`/api/external/v1/settings/GetUserProfiles`) to verify user roles.

    4. Sends a test message to the configured Slack webhook URL via an HTTP POST request.

    5. Returns a successful execution status if all operations complete without errors.


    ### Additional Notes

    This action does not operate on entities and relies entirely on integration-level
    configuration parameters. It is primarily used to ensure the integration is set
    up correctly.
  ai_short_description: >-
    Tests the Workflow Tools integration connectivity by verifying user roles via
    the Siemplify API and sending a test message to a configured Slack webhook.
