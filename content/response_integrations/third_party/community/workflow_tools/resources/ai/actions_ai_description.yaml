  ai_description: >-
    The Ping action tests the connectivity and configuration of the Workflow Tools
    integration. It verifies user roles within the Google SecOps (Siemplify) platform
    and sends a test message to a configured Slack webhook to ensure communication
    channels are operational.


    ### Parameters Description

    This action does not take any action-specific parameters. However, it relies on
    the integration's configuration parameters, such as the Siemplify API Key, API
    Root, Slack Webhook URL, and Approval Manager settings.


    ### Flow Description

    1. Extracts integration configuration parameters including the Slack Webhook URL
    and Approval Manager details.

    2. Initializes the WorkflowToolsManager to handle API and webhook interactions.

    3. Queries the internal Google SecOps API to verify the configured Approval Manager
    and Secondary Approval Manager roles.

    4. Sends a test message to the configured Slack Webhook URL to validate external
    connectivity.

    5. Returns a success status if all checks and the message dispatch complete without
    errors.
