product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: true
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The 'workflow_tools' integration is designed for case management, workflow orchestration,
    and human-in-the-loop processes. It qualifies for 'Collaboration' because it explicitly
    implements approval workflows ('Approval Request' and 'Approval Response') and
    sends notifications to Slack, which aligns with the requirement for human-in-the-loop
    approval and SOC notification. It also qualifies for 'ITSM' because it manages
    the investigation lifecycle by assigning cases to users and adding comments to
    the case wall, which serves the purpose of documenting investigations and assigning
    tasks. It does not perform functions related to SIEM, EDR, Network Security, Threat
    Intelligence, Email Security, IAM, Cloud Security, Vulnerability Management, or
    Asset Inventory.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
