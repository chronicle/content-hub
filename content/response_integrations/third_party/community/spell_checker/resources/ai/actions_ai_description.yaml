  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and functional status of the **Spell Checker** integration within Google SecOps.
    It serves as a basic health check to ensure that the integration is correctly
    installed and that the environment can execute its associated scripts.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not perform any actual spell-checking logic or external API calls.
    It is strictly used for verifying the integration's presence and operational readiness.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify SDK context.

    2. **Status Confirmation**: The action immediately terminates with a success message,
    "Spell Checker is connected," confirming that the integration is reachable.
