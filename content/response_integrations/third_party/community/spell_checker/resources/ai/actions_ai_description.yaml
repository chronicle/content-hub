  ai_description: >-
    ### General Description  The **Spelling Check** action identifies misspelled words
    within a provided text string and suggests potential corrections based on word
    frequency. It is designed to help analysts clean up notes, reports, or extracted
    text within a playbook.  ### Parameters Description  | Parameter | Type | Mandatory
    | Description | | :--- | :--- | :--- | :--- | | Input | String | No | The text
    content that will be analyzed for spelling errors. |  ### Flow Description  1.
    **Text Extraction**: The action retrieves the string provided in the `Input` parameter.
    2. **Sanitization**: It cleans the input text using regular expressions to remove
    special characters and punctuation, while preserving letters, spaces, and specific
    symbols like '@'. 3. **Misspelling Identification**: The cleaned text is split
    into individual words, which are then checked against a dictionary (including
    a custom allowlist of technical terms like 'microsoft', 'google', 'playbook').
    4. **Suggestion Generation**: For every word identified as misspelled, the action
    generates a list of likely correct candidates. 5. **Reporting**: The results are
    compiled into a JSON object and a data table named 'Found spelling mistakes' for
    use in subsequent playbook steps.  ### Additional Notes  This action performs
    local processing and does not communicate with external web services.
