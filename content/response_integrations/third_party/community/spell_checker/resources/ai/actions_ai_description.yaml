Spelling Check:
  ai_description: >-
    ### General Description\nThis action identifies misspelled words within a provided
    text string and suggests potential corrections based on word frequency. It is
    a utility action designed to improve the quality of text data processed within
    Google SecOps playbooks by identifying errors and providing recommendations.\n\n###
    Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| Input | String | No | The text that will be checked by the Spell Checker.
    Note: While marked as not mandatory in configuration, the action logic expects
    a string to process. |\n\n### Additional Notes\n- The action utilizes a local
    spell-checking library and does not communicate with external web services, ensuring
    data privacy.\n- It includes a built-in allowlist for common technical terms like
    'Microsoft', 'Google', 'Siemplify', and 'SaaS' to prevent them from being flagged
    as errors.\n- Emails and URLs are automatically excluded from the check to reduce
    false positives.\n\n### Flow Description\n1. **Input Acquisition**: Retrieves
    the text string from the 'Input' parameter.\n2. **Text Cleaning**: Applies regular
    expressions to remove non-alphabetic characters and noise while preserving word
    boundaries.\n3. **Word Extraction**: Splits the cleaned text into individual words,
    filtering out any tokens that appear to be email addresses or URLs.\n4. **Spelling
    Analysis**: Identifies words not found in the dictionary (misspellings) using
    the SpellCheckerManager.\n5. **Correction Discovery**: Generates a list of candidate
    corrections for each identified misspelling based on word frequency.\n6. **Result
    Reporting**: Outputs the count of mistakes, a JSON mapping of errors to suggestions,
    and a data table for analyst review.
