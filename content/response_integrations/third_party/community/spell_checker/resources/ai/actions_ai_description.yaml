    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action performs a local spell check on a string input. It does not interact
      with external systems, fetch threat intelligence, or modify alerts/entities.
      It does not fit any of the defined product categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: "This action performs a spell check on a provided input string to\
    \ identify misspelled words and suggest corrections. \n\n### Parameters\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Input |\
    \ string | No | The text that will be checked by the Spell Checker. |\n\n### Flow\n\
    1. Retrieve the `Input` parameter from the action configuration.\n2. Clean the\
    \ input text using regex to remove special characters and irrelevant symbols.\n\
    3. Use the `SpellCheckerManager` to identify unknown words (misspellings) in the\
    \ cleaned text.\n4. Generate correction candidates for each identified misspelled\
    \ word.\n5. Return the results as a JSON object and a data table containing the\
    \ original words and their recommended corrections.\n\n### Additional Notes\n\
    This action performs local text processing and does not interact with external\
    \ systems or modify SOAR case data."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs local text processing using the `pyspellchecker` library.
      It does not interact with external APIs, modify external systems, or update
      internal SOAR data (entities, insights, or alerts). It simply returns the results
      of the spell check as a JSON object and a data table.
  categories:
    enrichment: false
    reasoning: >-
      The action does not fetch data from an external source, nor does it enrich entities
      or alerts. It is a utility action for text processing. Therefore, it is not
      an enrichment action.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not interact with `siemplify.target_entities`. It processes
      a raw string input provided via parameters.
