Spelling Check:
  ai_description: >-
    ### General Description

    Analyzes provided text to identify misspelled words and suggests likely correct
    spellings based on word frequency. It utilizes a local spell-checking library
    with a custom allowlist for common technology and security terms.


    ### Flow Description

    1. Retrieves the input text from the action parameters.

    2. Cleans the text by removing special characters, URLs, and email addresses using
    regular expressions.

    3. Evaluates the cleaned text against a local spell checker dictionary to identify
    unknown or misspelled words.

    4. Generates a list of candidate corrections for each identified misspelled word.

    5. Outputs the findings as a JSON result and a data table containing the original
    text and recommended corrections.


    ### Additional Notes

    This action operates entirely locally using a Python spellchecker library and
    does not make any external API calls.
  ai_short_description: >-
    Analyzes input text to identify misspelled words and provides suggested corrections
    based on word frequency.
