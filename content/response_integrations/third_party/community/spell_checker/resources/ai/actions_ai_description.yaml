Spelling Check:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action is a utility function that performs local spell checking on a provided
      text string. It does not interact with IOCs, assets, alerts, tickets, blocklists,
      identities, hosts, events, files, or emails. Therefore, it does not match any
      of the predefined action outcome categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Analyzes a provided text string to identify misspelled words and suggests likely
    correct spellings based on word frequency. It utilizes a local spell-checking
    library configured with a custom allowlist of common technology and cybersecurity
    terms (e.g., 'microsoft', 'siemplify', 'playbook'). The action outputs the identified
    mistakes and their recommended corrections as a JSON result and a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Input | String | False | The text that will be checked by the Spell Checker.
    If left empty, the action will process an empty string and return no mistakes.
    |


    ### Flow Description

    1. Retrieves the `Input` text from the action parameters.

    2. Cleans the text using regular expressions to remove special characters, while
    preserving spaces, parentheses, and `@` symbols.

    3. Splits the text into individual words and filters out empty strings, email
    addresses (containing `@`), and URLs (containing `http`).

    4. Processes the filtered words through the spell checker to identify unknown
    or misspelled words.

    5. Generates a list of suggested candidate corrections for each identified misspelled
    word.

    6. Outputs the findings as a JSON object and attaches a data table named 'Found
    spelling mistakes' to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action processes a provided text string locally using a Python spell-checking
      library. It does not make any external API calls to fetch data, nor does it
      mutate any external systems. Internally, it only adds a JSON result and a data
      table to the action's output, which does not constitute mutating internal data
      (like updating entities, creating insights, modifying alerts, or adding case
      comments).
  categories:
    enrichment: false
    reasoning: >-
      The action does not fetch data from an external or internal source; it merely
      processes a string locally. Therefore, it is not an Enrichment action. It also
      does not perform any containment, isolation, or mitigation tasks, so it is not
      a Remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
