  ai_description: >-
    ### General Description

    This action performs a spell check on a provided input string to identify misspelled
    words and suggest corrections. It utilizes a local spell checker library to analyze
    the text, clean it, and return a list of misspelled words along with potential
    correction candidates.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Input | string | No | The text that will be checked by the Spell Checker. |


    ### Flow

    1. Retrieve the `Input` parameter from the action configuration.

    2. Clean the input text using regex to remove special characters and irrelevant
    symbols.

    3. Use the `SpellCheckerManager` to identify unknown words (misspellings) in the
    cleaned text.

    4. Generate correction candidates for each identified misspelled word.

    5. Return the results as a JSON object and a data table containing the original
    words and their recommended corrections.


    ### Additional Notes

    This action performs local text processing and does not interact with external
    systems or modify SOAR case data.
