  network_security: false
  reasoning: >-
    The phish_tank integration is primarily designed to provide threat intelligence
    by checking the reputation of URL indicators against the PhishTank community database.
    This aligns directly with the Threat Intelligence category, as it is used to enrich
    URL entities to determine their malicious status. Additionally, because PhishTank
    is a specialized service for identifying phishing attempts, the integration is
    highly relevant to Email Security investigations, where analysts need to verify
    suspicious links found in emails. It does not perform SIEM, EDR, Network Security
    (blocking at the gateway), IAM, Cloud Security, ITSM, Vulnerability Management,
    Asset Inventory, or Collaboration functions.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
