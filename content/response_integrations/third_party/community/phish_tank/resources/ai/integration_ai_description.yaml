  reasoning: >-
    The phish_tank integration is primarily designed to provide threat intelligence
    by querying a community-based database to verify the reputation of URLs. This
    aligns directly with the Threat Intelligence category, as it is used to enrich
    external indicators (URLs) to determine if they are malicious. Additionally, because
    PhishTank is specifically focused on identifying phishing attempts, the integration
    is highly relevant to the Email Security category, as it is used to validate suspicious
    links often found in phishing reports or emails. It does not perform functions
    related to SIEM, EDR, Network Security (blocking), IAM, Cloud Security, ITSM,
    Vulnerability Management, Asset Inventory, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
