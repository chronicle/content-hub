Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the PhishTank service. Its primary purpose is to ensure that the integration
    is correctly configured and that the PhishTank API is reachable from the environment.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration to perform the connectivity test.


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not take any input parameters. |


    ### Additional Notes

    * This action uses a hardcoded test URL (`google.com`) to perform a POST request
    to the PhishTank API to validate the connection.

    * It relies on the 'Service Url' defined in the PhishTank integration settings.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Service Url' from the
    PhishTank integration configuration.

    2. **Request Construction**: It prepares a POST request with a payload containing
    a test URL (`google.com`) and specifies the format as JSON.

    3. **Connectivity Test**: The action sends the request to the PhishTank service
    using the configured headers.

    4. **Validation**: It checks the response status. If the request is successful
    (HTTP 200 OK), it confirms the connection.

    5. **Completion**: The action ends with a success message: 'PhishTank is connected'.
