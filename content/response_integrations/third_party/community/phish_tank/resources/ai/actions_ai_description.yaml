Check Url:
  ai_description: >-
    ### General Description

    Checks if a specific URL is marked as suspicious by the PhishTank Community. The
    action queries the PhishTank database to retrieve threat intelligence regarding
    the URL. It adds an insight with the result of the action and updates the entity's
    suspicious status if the URL is verified as a phishing link.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `URL`.

    3. Extracts the original URL from the entity's additional properties or identifier.

    4. Makes an HTTP POST request to the PhishTank service URL to query the database
    for the specific URL.

    5. Parses the XML response from PhishTank.

    6. If the URL is found in the database, it creates an insight detailing the PhishTank
    page link, verification status, and validity.

    7. If the URL is verified as phishing, it marks the entity as suspicious and updates
    it in the platform.

    8. If the URL is not found, it creates an insight indicating its absence from
    the database.

    9. Returns a JSON result containing the parsed data for each processed URL.


    ### Additional Notes

    - The action relies on the `Service Url` configured at the integration level.

    - Although the action uses an HTTP POST request, it functions as a data fetch/enrichment
    operation rather than a mutation on the external system.
  ai_short_description: >-
    Checks if a specific URL is marked as suspicious by the PhishTank Community, enriching
    the entity with threat intelligence and updating its suspicious status if verified
    as phishing.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the suspicious status of URL entities and adds insights with PhishTank
      data.
    reasoning: >-
      The action fetches data by making an HTTP POST request to the PhishTank API
      to retrieve URL information. It does not mutate external data. It mutates internal
      data by updating the `is_suspicious` flag on entities (using `siemplify.update_entities`)
      and creating insights (using `siemplify.add_entity_insight`).
  entity_usage:
