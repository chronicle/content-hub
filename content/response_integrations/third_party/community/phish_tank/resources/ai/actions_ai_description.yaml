  ai_description: >-
    ### General Description

    The `Check Url` action queries the PhishTank Community database to determine if
    specific URL entities are marked as suspicious or verified phishing links. It
    enriches the entities with threat intelligence, updates their suspicious status
    if verified as malicious, and attaches an insight with the analysis results.


    ### Parameters Description

    There are no action-specific parameters required for this action.


    ### Flow Description

    1. Iterates over the target entities and filters for those of type `URL`.

    2. Extracts the original identifier from the entity's additional properties or
    falls back to the standard identifier.

    3. Sends a POST request to the PhishTank API to query the URL's status.

    4. Parses the XML response to check if the URL is in the database and if it is
    verified.

    5. If verified as a phishing link, marks the entity as suspicious (`is_suspicious
    = True`).

    6. Adds an insight to the entity containing the PhishTank verification details.

    7. Returns a JSON result containing the scores and details for all processed URLs.


    ### Additional Notes

    The action relies on the `Service Url` configured at the integration level.
