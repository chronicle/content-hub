Check Url:
  ai_description: "### General Description\nThe **Check Url** action queries the PhishTank\
    \ community database to determine if specific URL entities are associated with\
    \ phishing activities. It retrieves metadata such as verification status, validity,\
    \ and direct links to PhishTank detail pages. This action is primarily used for\
    \ automated URL enrichment and threat validation within a security orchestration\
    \ workflow.\n\n### Parameters Description\nThere are no action-specific parameters\
    \ for this action. It relies on the global integration configuration for the PhishTank\
    \ Service URL.\n\n### Additional Notes\n* This action requires the **Service Url**\
    \ to be correctly configured in the PhishTank integration settings.\n* The action\
    \ uses the `OriginalIdentifier` of an entity if available; otherwise, it defaults\
    \ to the standard identifier.\n* Results are returned in both a human-readable\
    \ summary and a structured JSON format for downstream playbook logic.\n\n### Flow\
    \ Description\n1. **Configuration Retrieval**: The action fetches the PhishTank\
    \ Service URL from the integration's provider configuration.\n2. **Entity Filtering**:\
    \ It identifies all entities of type `URL` (DestinationURL) within the current\
    \ alert scope.\n3. **External Query**: For each URL, it sends a POST request to\
    \ the PhishTank API to check its status.\n4. **Data Parsing**: The action parses\
    \ the XML response from PhishTank to extract phishing details.\n5. **Internal\
    \ Updates**: \n    * If a URL is found in the database, it generates an **Entity\
    \ Insight** containing the PhishTank link and verification status.\n    * If the\
    \ URL is explicitly marked as **verified** in PhishTank, the action sets the entity's\
    \ `is_suspicious` attribute to `True`.\n6. **Finalization**: The action updates\
    \ the modified entities in Google SecOps and provides a summary message of the\
    \ findings."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute of URL entities and creates entity insights
      based on PhishTank reputation data.
  categories:
    enrichment: true
  entity_usage:
