Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the PhishTank service to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Extracts the `Service Url` from the integration configuration.

    2. Sends a test POST request to the PhishTank API using a static payload (`url:
    google.com`).

    3. Evaluates the HTTP response to ensure no errors occurred.

    4. Returns a success message indicating that PhishTank is connected.


    ### Additional Notes

    This action is typically used as a health check or ping test during the initial
    setup of the PhishTank integration. It does not process alerts or entities.
  ai_short_description: >-
    Tests connectivity to the PhishTank service by sending a test POST request and
