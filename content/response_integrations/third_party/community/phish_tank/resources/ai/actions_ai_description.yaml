  ai_description: >-
    ### General Description

    Tests connectivity to the PhishTank service to ensure the integration is configured
    correctly and can communicate with the API.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Extracts the `Service Url` from the PhishTank integration configuration.

    2. Sends a test POST request to the PhishTank API using a hardcoded payload (checking
    `google.com`).

    3. Evaluates the HTTP response to ensure no errors occurred.

    4. Outputs a success message indicating that PhishTank is connected.
