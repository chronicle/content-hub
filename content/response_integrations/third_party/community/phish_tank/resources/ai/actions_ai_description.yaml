  ai_description: >-
    ### General Description

    Enriches URL entities by checking their reputation against the PhishTank community
    database. This action identifies if a URL is known for phishing activities, retrieves
    verification status, and provides direct links to PhishTank detail pages.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Url | String | Yes | The PhishTank API endpoint URL, configured at the
    integration level. |


    ### Flow Description

    1. **Configuration Retrieval:** Fetches the PhishTank service URL from the integration
    settings.

    2. **Entity Filtering:** Identifies all `URL` entities within the current action
    scope.

    3. **Reputation Lookup:** For each URL, sends a POST request to the PhishTank
    API to query its status.

    4. **Data Parsing:** Processes the XML response to extract database presence,
    verification status, and validity.

    5. **Insight Generation:** Adds an entity insight to the SOAR case for each URL,
    detailing whether it was found and its verification status.

    6. **Entity Update:** If a URL is verified as a phish, the action marks the entity
    as suspicious and updates its status in Google SecOps.

    7. **Result Reporting:** Returns a summary of found, suspicious, and failed entities,
    along with the raw JSON data for further analysis.


    ### Additional Notes

    - This action uses the `OriginalIdentifier` of the entity if available, falling
    back to the standard identifier for the lookup.

    - A score modifier of 50 is applied internally to entities found in the database.
  capabilities:
