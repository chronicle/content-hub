  ai_description: >-
    ### General Description

    Checks if a specific URL is marked as suspicious by the PhishTank Community. This
    action queries the PhishTank API for each URL entity in the scope, retrieves threat
    intelligence, and updates the entity's status if it is verified as malicious.
    It also generates insights for the analyst to review.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Url | String | Yes | The API endpoint URL for the PhishTank service.
    |


    ### Additional Notes

    This action specifically processes `DestinationURL` entities. It uses a `SCORE_MODIFIER`
    of 50.0 when a URL is found in the PhishTank database.


    ### Flow Description

    1. Extract the `Service Url` configuration parameter.

    2. Iterate through all target entities, filtering for those of type `DestinationURL`.

    3. For each URL, send a POST request to the PhishTank API to retrieve reputation
    data.

    4. Parse the XML response to determine if the URL is in the database and if it
    is verified as malicious.

    5. If the URL is found, add an insight to the entity containing details such as
    the link, verification status, and validity.

    6. If the URL is verified as malicious, mark the entity as suspicious and update
    it in the SOAR platform.

    7. Add the raw API response as a JSON result to the action output.
