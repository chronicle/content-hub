  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps environment and the PhishTank service. It ensures that the integration
    is correctly configured and that the PhishTank API is reachable and responding
    to requests.


    ### Parameters Description

    There are no user-configurable parameters for this action. It relies solely on
    the integration's global configuration.


    ### Additional Notes

    This action performs a test request using a hardcoded URL (`google.com`) to validate
    the API's response format and availability.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `Service Url` from the
    PhishTank integration settings.

    2. **Connectivity Request**: It executes a POST request to the service URL with
    a sample payload containing a test URL and a request for a JSON response.

    3. **Status Verification**: The action checks the HTTP response status code. If
    the request fails (e.g., 4xx or 5xx error), an exception is raised.

    4. **Result Reporting**: Upon a successful response, the action concludes by reporting
    that the service is connected.
