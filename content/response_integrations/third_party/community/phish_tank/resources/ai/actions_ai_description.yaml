  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps environment and the PhishTank
    service. This action verifies that the integration is correctly configured and
    can communicate with the external API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Url | String | Yes | The base URL for the PhishTank API. |


    ### Additional Notes

    This action is a diagnostic tool and does not perform any functional operations
    or data retrieval.


    ### Flow Description

    1. Retrieve the `Service Url` from the integration configuration.

    2. Send a POST request to the provided URL with a test payload (`{"url": "google.com",
    "format": "json"}`).

    3. Validate the response status code.

    4. Terminate the action with a success message.
