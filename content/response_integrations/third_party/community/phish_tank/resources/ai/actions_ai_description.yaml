    reasoning: >-
      The action fetches data by making an HTTP POST request to the PhishTank API
      to query URL reputation. It does not mutate external data because the POST request
      is strictly used for querying the database, not altering it. It mutates internal
      data by updating the `is_suspicious` flag on entities and creating entity insights.
      It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action is an Enrichment action because it fetches threat intelligence data
      from an external source (PhishTank) without mutating any external state. Its
      internal mutations are strictly limited to allowed enrichment behaviors: updating
      entities and creating insights. It is not a Remediation action as it does not
      block IPs, disable identities, or perform any containment.
    remediation: false
