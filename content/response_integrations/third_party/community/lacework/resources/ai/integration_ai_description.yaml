  reasoning: >-
    The Lacework integration is primarily focused on ingesting security events from
    the Lacework platform, which monitors cloud environments and cloud-native resources
    (e.g., AWS CloudTrail). As Lacework is a cloud security platform (CSPM/CWPP),
    this integration directly supports the Cloud Security category by providing visibility
    into cloud-native security findings. It does not perform EDR, network blocking,
    IAM management, or general SIEM log aggregation based on the provided connector
    description.
