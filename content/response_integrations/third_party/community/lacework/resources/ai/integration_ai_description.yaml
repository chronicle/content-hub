product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Lacework integration is specifically designed to monitor cloud environments,
    focusing on the analysis of CloudTrail logs and the generation of security alerts
    for cloud-native resources. This aligns directly with the 'Cloud Security' category,
    which is defined for alerts involving cloud-native resources like GCP, AWS, and
    Azure. The connector facilitates the ingestion of these cloud-specific security
    events into the SOAR platform. It does not perform general SIEM log aggregation,
    host-based EDR process analysis, network gateway blocking, or identity management,
    and therefore does not fit those respective categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
