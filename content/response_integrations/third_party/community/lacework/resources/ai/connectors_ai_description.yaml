Lacework Connector:
  ai_description: >-
    ### General Description

    The Lacework Connector is designed to ingest security events from the Lacework
    platform into Google SecOps (SOAR). It periodically polls the Lacework Events
    API to retrieve security alerts, filters them based on a configurable severity
    threshold, and maps them into standardized alert objects for further investigation
    and response within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | accountName | String | Yes | The Lacework account name/URL identifier. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | keyId | String | Yes | The Lacework API Key ID. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process. |

    | secret | Password | Yes | The Lacework API Secret. |

    | severity_threshold | String | Yes | Lacework Event Severity Threshold (1-Critical
    to 5-Info). |


    ### Flow Description

    1. The connector initializes by authenticating with the Lacework API using the
    provided `keyId`, `secret`, and `accountName` to obtain a temporary access token.

    2. It queries the Lacework Events API for events occurring within the last hour.

    3. For each retrieved event, the connector checks the event's severity against
    the configured `severity_threshold`.

    4. If the event meets the threshold, the connector fetches detailed information
    for that specific event ID.

    5. The event data is mapped to a standardized SOAR `AlertInfo` format, including
    severity mapping, start/end times, and event details.

    6. Finally, the processed alerts are returned to the SOAR system for case creation
    and ingestion.
