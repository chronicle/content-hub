Lacework Connector:
  ai_description: >-
    ### General Description

    The Lacework Connector integrates Google SecOps (SOAR) with the Lacework platform.
    It periodically polls the Lacework Events API to retrieve security events, filters
    them based on a configurable severity threshold, and ingests them into the SOAR
    platform as alerts for further investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | accountName | String | Yes | The Lacework account name used to construct the
    API URL. |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | Yes | The field name used to determine the event name
    (sub-type). |

    | keyId | String | Yes | The Lacework API Key ID. |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    Python process. |

    | secret | String | Yes | The Lacework API Secret. |

    | severity_threshold | String | Yes | Lacework Event Severity Threshold (1-Critical,
    2-High, 3-Medium, 4-Low, 5-Info). Only events with severity equal to or higher
    than this value are processed. |


    ### Flow Description

    1. The connector initializes the `LaceworkManager` using the provided credentials
    (`keyId`, `secret`, `accountName`).

    2. It authenticates with the Lacework API to obtain a temporary access token.

    3. It queries the Lacework Events API (`/api/v1/external/events/GetEventsForDateRange`)
    to fetch events generated within the last hour.

    4. For each retrieved event, the connector checks the severity against the configured
    `severity_threshold`.

    5. If the event meets the threshold, the connector fetches full event details
    using the `GetEventDetails` endpoint.

    6. The event data is mapped to the SOAR `AlertInfo` format, including severity
    mapping (e.g., Lacework 1 maps to SOAR 100/Critical).

    7. The processed alerts are packaged and returned to the SOAR platform for ingestion.
