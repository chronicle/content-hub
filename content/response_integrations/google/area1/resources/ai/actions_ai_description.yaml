Get Recent Indicators:
  ai_description: >-
    ### General Description

    Fetches recent malicious indicators from the Area1 security platform.


    ### Flow Description

    1. Initialize the `Area1Manager` using configuration credentials.

    2. Calculate the `since` timestamp by subtracting the provided `Seconds Back`
    parameter from the current UTC time.

    3. Execute an HTTP GET request to the Area1 API (`/indicators`) with the calculated
    time range.

    4. If indicators are returned, format the data into a CSV table and add it to
    the action results.

    5. Return the raw indicator data as a JSON result.


    ### Additional Notes

    This action does not operate on specific entities; it retrieves a global list
    of indicators from the Area1 platform.
  ai_short_description: >-
    Fetches recent malicious indicators from the Area1 platform based on a specified
    time range.
