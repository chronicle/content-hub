Search Indicator:
  ai_description: >-
    ### General Description

    Searches for indicators (hash, URL, domain, IP, email) within the Area 1 security
    platform. This action retrieves threat intelligence and indicator details for
    the provided entities and enriches them within the SOAR platform.


    ### Flow Description

    1. The action initializes the `Area1Manager` using the integration configuration
    (API Root, Username, Password, Verify SSL).

    2. It iterates through all `target_entities` provided to the action.

    3. For each entity, it calls the `search_indicator` API method to retrieve indicator
    data.

    4. If data is found:
        - The indicator data is flattened.
        - An entity table is added to the action result.
        - The entity's `additional_properties` are updated with the retrieved data
    (prefixed with `area1_`).
        - The entity's `is_enriched` status is set to `True`.
    5. If any entities were successfully enriched, the action calls `siemplify.update_entities`
    to save the changes to the platform.

    6. Finally, the action returns a JSON result containing all retrieved indicator
    data and ends with a summary message.


    ### Additional Notes

    This action relies on the Area 1 integration configuration. It does not perform
    any state-changing operations on the external Area 1 system; it is strictly an
    enrichment and data retrieval action.
  ai_short_description: >-
    Searches for indicators (hash, URL, domain, IP, email) in Area 1 and enriches
    the entities with the retrieved data.
