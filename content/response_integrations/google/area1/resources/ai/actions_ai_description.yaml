Search Indicator:
  ai_description: >-
    ### General Description

    Searches for indicators (such as hash, URL, domain, IP, or email) in Area 1 using
    the provided entity identifiers. It retrieves threat intelligence data and enriches
    the entities within the SecOps platform.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Makes a GET request to the Area 1 API (`/search` endpoint) for each entity's
    identifier.

    3. If indicator data is found, it enriches the entity by updating its `additional_properties`
    with the retrieved data and marking it as enriched.

    4. Adds the indicator data to the entity's table and the action's JSON result.

    5. Updates the modified entities in the SecOps platform.


    ### Additional Notes

    The action processes all available entities without filtering by specific entity
    types. It directly updates the entities in the platform with the retrieved Area
    1 data.
  ai_short_description: >-
    Searches for indicators in Area 1 using entity identifiers and enriches the entities
    with the retrieved threat data.
