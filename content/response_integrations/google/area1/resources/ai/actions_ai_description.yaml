Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Area1 service by retrieving recent indicators. This
    action is designed to verify that the SOAR platform can successfully authenticate
    and communicate with the Area1 service.


    ### Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Retrieve the integration configuration (Api Root, Username, Password, Verify
    SSL) for the Area1 integration.

    3. Initialize the `Area1Manager` with the retrieved credentials.

    4. Call the `get_recent_indicators` method, which sends an HTTP GET request to
    the Area1 API to verify connectivity.

    5. Terminate the action with a success message if the connection is established.


    ### Additional Notes

    This action is used to verify that the SOAR platform can successfully authenticate
    and communicate with the Area1 service.
