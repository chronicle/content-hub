Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Area1 platform. This action verifies that the provided
    integration configuration credentials and network settings are valid by attempting
    a simple API request.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Area1 API client with the provided credentials.

    3. Sends a GET request to the Area1 API to fetch recent indicators from the last
    second to verify connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to ensure
    that Google SecOps can successfully communicate with the Area1 API.
