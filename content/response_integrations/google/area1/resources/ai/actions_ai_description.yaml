    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to fetch recent indicators from Area1,
      meaning it fetches data. It does not perform any state-changing operations on
      external systems, nor does it update internal entities, create insights, or
      modify alert data.
