Get Recent Indicators:
  ai_description: >-
    ### General Description

    Retrieves recent malicious indicators from Area1 based on a specified time frame.
    This action is useful for gathering the latest threat intelligence data from Area1
    to be used in further analysis or correlation.


    ### Flow Description

    1. Initializes the Area1 API client using the provided integration configurations.

    2. Calculates the start time for the search by subtracting the `Seconds Back`
    parameter from the current UTC time.

    3. Makes an HTTP GET request to the Area1 `indicators` endpoint to fetch indicators
    created within the specified time range.

    4. If indicators are found, formats the data into a CSV table and attaches it
    to the action's results.

    5. Outputs the raw JSON response containing the indicators to the action results.


    ### Additional Notes

    This action does not operate on specific entities within the case but rather fetches
    global indicators from the Area1 platform.
  ai_short_description: >-
    Retrieves recent malicious indicators from Area1 based on a specified time frame.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
