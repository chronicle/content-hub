name: Execute Custom Search
description: Search events using custom query in Humio.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/humio#execute_custom_search
integration_identifier: Humio
parameters:
-   name: Repository Name
    default_value: ''
    type: string
    description: Specify the name of the repository that should be searched.
    is_mandatory: true
-   name: Query
    default_value: ''
    type: string
    description: 'Specify the query that needs to be executed in Humio. Note: "head()"
        function shouldn''t be a part of this string.'
    is_mandatory: true
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'Specify how many results the action should return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_custom_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
