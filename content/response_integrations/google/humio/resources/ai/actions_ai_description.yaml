  ai_description: >-
    Executes a simple search query in Humio to retrieve events based on specified
    parameters.


    ### Parameters Description

    * **Repository Name** (String, Mandatory): Specify the name of the repository
    that should be searched.

    * **Query Filter** (String, Optional): Specify the query that should be executed
    during the search. Note: functions "head()" and "select()" shouldn't be provided.

    * **Time Frame** (Drop-down, Optional): Specify a time frame for the results.
    If "Custom" is selected, you also need to provide "Start Time".

    * **Start Time** (String, Optional): Specify the start time for the results. This
    parameter is mandatory if "Custom" is selected for the "Time Frame" parameter.
    Format: ISO 8601.

    * **End Time** (String, Optional): Specify the end time for the results. Format:
    ISO 8601. If nothing is provided and "Custom" is selected for the "Time Frame"
    parameter, then this parameter will use the current time.

    * **Fields To Return** (String, Optional): Specify what fields to return as a
    comma-separated list. If nothing is provided, the action will return all fields.

    * **Sort Field** (String, Optional): Specify what parameter should be used for
    sorting. By default, the query sorts data by timestamp in ascending order.

    * **Sort Field Type** (Drop-down, Optional): Specify the type of the field that
    will be used for sorting (String, Number, Hex). This parameter is needed to ensure
    that the correct results are returned.

    * **Sort Order** (Drop-down, Optional): Specify the order of sorting (ASC, DESC).

    * **Max Results To Return** (String, Optional): Specify how many results to return.
    Default is 50.


    ### Flow Description

    1. Extracts and validates the provided parameters, including timeframes and limits.

    2. Constructs a Humio query string incorporating the query filter, fields to return,
    sorting parameters, and limits.

    3. Sends a POST request to the Humio API to execute the search query within the
    specified repository and timeframe.

    4. Parses the returned events and outputs them as JSON results and a data table
    in the SecOps platform.
