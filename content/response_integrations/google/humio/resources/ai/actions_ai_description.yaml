Execute Simple Search:
  ai_description: >-
    ### General Description

    Executes a search query against a Humio repository to retrieve historical event
    logs. This action allows analysts to perform targeted searches by specifying a
    repository, query filters, time frames, and sorting preferences, returning the
    results directly to the SOAR platform for analysis.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Token, Verify SSL) and action-specific parameters (Repository Name,
    Query Filter, Time Frame, etc.).

    2. **Input Validation**: Validates that the "Max Results To Return" is greater
    than 0 and that the "Start Time" precedes the "End Time".

    3. **Manager Initialization**: Initializes the `HumioManager` with the provided
    API credentials and configuration.

    4. **API Interaction**: Calls `manager.get_events_by_custom_query`, which performs
    a POST request to the Humio API endpoint (`/api/v1/repositories/{repository_name}/query`)
    with the constructed query payload.

    5. **Result Processing**: If results are returned, the action adds the data to
    the SOAR platform as a JSON object and a formatted data table. If no results are
    found, an appropriate message is returned.


    ### Additional Notes

    This action supports both predefined time frames (e.g., Last Hour, Last 24 Hours)
    and custom time ranges provided in ISO 8601 format. It does not modify any data
    within Humio or the SOAR platform.
  ai_short_description: >-
    Executes a search query in Humio to retrieve and display event logs based on user-defined
    criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
