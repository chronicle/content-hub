Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query in Humio to retrieve events from a specified repository.
    This action allows analysts to fetch historical logs and telemetry data directly
    into the SecOps platform for further investigation.


    ### Flow Description

    1. Initializes the Humio API client using the provided integration configuration.

    2. Validates the `Max Results To Return` parameter to ensure it is greater than
    0.

    3. Constructs the final query string by appending the limit parameter to the provided
    custom query.

    4. Makes a POST request to the Humio API (`/api/v1/repositories/{repository_name}/query`)
    to execute the search.

    5. Parses the returned events and attaches them to the action's results as both
    JSON and a formatted CSV data table.


    ### Additional Notes

    The `head()` function should not be manually included in the `Query` string, as
    the action automatically appends it based on the `Max Results To Return` parameter.
  ai_short_description: >-
    Executes a custom search query in Humio to retrieve events from a specified repository
    and returns the results as JSON and a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a search query against the Humio API. It
      does not mutate external data, update internal entities, create insights, or
      modify case/alert data.
