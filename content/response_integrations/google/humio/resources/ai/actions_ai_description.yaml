Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query against a specified repository in Humio to retrieve
    event logs. This action allows analysts to perform ad-hoc investigations by querying
    Humio's data store directly from the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Token, Verify SSL)
    and action parameters (Repository Name, Query, Max Results To Return).

    2. It initializes the `HumioManager` to establish a connection with the Humio
    API.

    3. The action constructs and executes a POST request to the Humio API endpoint
    `/api/v1/repositories/{repository_name}/query` using the provided query and limit.

    4. The retrieved events are parsed into event objects.

    5. The results are added to the action's JSON output and displayed as a data table
    within the SOAR platform.


    ### Additional Notes

    The `head()` function should not be included in the query string, as the action
    automatically applies the limit parameter to the query.
  ai_short_description: >-
    Executes a custom search query in Humio to retrieve and display event logs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Humio by executing a query. It does not mutate
      external data, nor does it mutate internal data (it only outputs results to
      the action result). It does not update entities, create insights, modify alerts,
      or create case comments.
