  ai_description: >-
    Tests connectivity to the Humio server using the provided integration configuration
    parameters.


    ### General Description

    This action verifies the connection to the Humio instance by executing a simple
    query (`|select([@id]) | head(1)`) against the `humio-fleet` repository. It ensures
    that the API Root, API Token, and SSL verification settings are correctly configured
    and that the server is reachable.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration configuration parameters (API Root, API Token, Verify SSL).


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Token, Verify
    SSL).

    2. Initializes the HumioManager with the provided credentials.

    3. Executes a test query to the Humio API to verify connectivity.

    4. Returns a success message if the connection is established and the query succeeds,
    or an error message if it fails.
