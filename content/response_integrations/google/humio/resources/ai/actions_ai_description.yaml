    to return. Default is 50. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Humio server using the provided API credentials. This
    action verifies that the integration is correctly configured and can successfully
    communicate with the Humio API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Token`, and `Verify SSL` from the integration settings.

    2. It initializes the `HumioManager` with the provided credentials and SSL verification
    setting.

    3. The `HumioManager` executes the `test_connectivity` method, which sends a `POST`
    request to the Humio API `ping` endpoint (`/api/v1/repositories/humio-fleet/query`)
    with a test query payload.

    4. The response is validated to ensure the connection is successful.

    5. The action returns a success or failure message based on the outcome of the
    API request.


    ### Additional Notes

    This action is intended for administrative use to validate integration settings.
    It does not perform any data retrieval or modification operations on entities
    or cases.
