Execute Simple Search:
  ai_description: >-
    ### General Description

    Executes a simple search query in Humio to retrieve events based on specified
    parameters such as repository name, query filter, and time frame. The action returns
    the matching events as a JSON result and a data table within the case.


    ### Flow Description

    1. Extracts action parameters including the target repository name, query filter,
    time frame, and sorting preferences.

    2. Calculates the start and end timestamps based on the provided time frame (or
    custom start/end times).

    3. Constructs the Humio query string using the provided filter, fields to return,
    limit, and sorting parameters.

    4. Makes a POST request to the Humio API (`/api/v1/repositories/{repository_name}/query`)
    to fetch matching events.

    5. Parses the returned events and attaches them to the action result as JSON and
    a data table.


    ### Additional Notes

    - If "Custom" is selected for the Time Frame parameter, the Start Time parameter
    becomes mandatory.

    - The functions `head()` and `select()` should not be included in the Query Filter,
    as the action handles these internally based on other parameters.
