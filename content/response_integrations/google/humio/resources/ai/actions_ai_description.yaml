  ai_description: >-
    Executes a custom search query in Humio to retrieve events. The action connects
    to the Humio API, submits the specified query against a given repository, and
    retrieves the matching events up to a defined limit. The results are returned
    as JSON and attached as a data table to the action's output.


    ### Flow Description

    1. Initializes the Humio manager with API credentials.

    2. Constructs the query payload using the provided repository name, query string,
    and result limit.

    3. Sends a POST request to the Humio API to execute the search.

    4. Parses the returned events and attaches them to the action result as JSON and
    a data table.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Repository Name | String | Yes | Specify the name of the repository that should
    be searched. |

    | Query | String | Yes | Specify the query that needs to be executed in Humio.
    Note: `head()` function shouldn't be a part of this string. |

    | Max Results To Return | Integer | No | Specify how many results the action should
    return. Default: 50. |
