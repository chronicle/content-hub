    50. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Humio server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Token, Verify
    SSL).

    2. Initializes the Humio manager.

    3. Sends a POST request to the Humio API (`/api/v1/repositories/humio-fleet/query`)
    with a simple query (`|select([@id]) | head(1)`) to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is primarily used to validate the integration settings and does not
    perform any operational tasks on alerts or entities.
