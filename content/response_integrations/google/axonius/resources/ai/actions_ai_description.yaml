Add Note:
  ai_description: >-
    ### General Description

    Adds a note to specified entities (Hostname, IP, MAC Address, User, Email) within
    the Axonius platform. This action allows analysts to annotate assets or users
    directly from the SOAR platform, facilitating better tracking and documentation
    of security investigations.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, API Secret, Verify SSL)
    and the `Note` parameter.

    2. Iterates through the provided `target_entities`, categorizing them into devices
    (IP, Hostname, MAC) and users (Username, Email).

    3. Queries the Axonius API to locate the corresponding internal Axonius IDs for
    the identified entities.

    4. For each successfully located entity, performs an API call to add the specified
    note to the entity's record in Axonius.

    5. Aggregates the results and adds them to the action's JSON output.


    ### Additional Notes

    Supports Hostname, IP, MAC Address, and User entities. User entities are processed
    as either usernames or emails based on validation.
  ai_short_description: >-
    Adds a note to specified entities (Hostname, IP, MAC Address, User, Email) within
    the Axonius platform.
