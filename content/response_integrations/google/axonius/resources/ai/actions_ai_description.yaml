Add Note:
  ai_description: >-
    ### General Description

    Adds a specified note to supported entities (Hostname, IP Address, MAC Address,
    and User) within the Axonius platform. This action allows analysts to append contextual
    information or tracking details directly to asset and user records in Axonius.


    ### Flow Description

    1. Iterates through the target entities provided in the case and filters them
    for supported types (Hostname, IP Address, MAC Address, and User).

    2. Categorizes the filtered entities into users (distinguishing between emails
    and usernames using a regex) and devices (IPs, hostnames, MACs).

    3. Makes a POST request to the Axonius API (`/api/V4.0/users` and `/api/V4.0/devices`)
    to search for the entities and resolve their internal Axonius IDs.

    4. Makes a POST request to the Axonius API (`/api/V4.0/users/{id}/notes` and `/api/V4.0/devices/{id}/notes`)
    to append the provided note to each successfully resolved entity.

    5. Returns a JSON result containing the details of the added notes for each successful
    entity.


    ### Additional Notes

    User entities are automatically categorized as emails if they match a valid email
    regular expression; otherwise, they are treated as standard usernames for the
    Axonius search.
  ai_short_description: >-
    Adds a specified note to Hostname, IP Address, MAC Address, and User entities
    in the Axonius platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specified note to user and device entities in the Axonius platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Axonius (using get_users and get_devices) to resolve
      internal IDs, so fetches_data is true. It then mutates external data by making
      POST requests to add notes to those users and devices in Axonius. It does not
      mutate internal SecOps data, update entities, or create insights.
  entity_usage:
