Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Axonius server using the provided configuration parameters.
    This action verifies that the integration is correctly configured and can successfully
    communicate with the Axonius API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, `API Secret`, and `Verify SSL` from the integration settings.

    2. It initializes the `AxoniusManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Axonius `/api/V4.0/settings/meta/about` endpoint.

    4. If the request is successful, the action completes with a success status. If
    the request fails (e.g., due to invalid credentials or network issues), the action
    fails and logs the error.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data retrieval or modification operations on entities
    or cases.
