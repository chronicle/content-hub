Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to user and device entities in Axonius. This action allows
    analysts to categorize or label assets and identities directly within the Axonius
    platform based on SecOps workflow outcomes.


    ### Flow Description

    1. Extracts the comma-separated list of tags provided in the action parameters.

    2. Iterates through the target entities and filters for supported types (Address,
    Hostname, MAC Address, and User).

    3. Queries the Axonius API (`/api/V4.0/users` and `/api/V4.0/devices`) to resolve
    the internal Axonius IDs for the provided entities.

    4. Sends a PUT request to the Axonius API (`/api/V4.0/users/labels` and `/api/V4.0/devices/labels`)
    to append the specified tags to the resolved users and devices.

    5. Returns a summary message indicating which entities were successfully tagged
    and which failed.


    ### Additional Notes

    Supported entity types include Hostname, IP Address, MAC Address, User, and Email
    Addresses (User entities that match an email regex). Entities that cannot be found
    in Axonius will be marked as failed.
