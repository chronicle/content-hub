Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Axonius server using the parameters provided in the
    integration configuration.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, API Secret,
    Verify SSL).

    2. Initializes the AxoniusManager with the extracted parameters.

    3. Executes a GET request to the `/api/V4.0/settings/meta/about` endpoint to verify
    connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters and does not operate
    on entities.
