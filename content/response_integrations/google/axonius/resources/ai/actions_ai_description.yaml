Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to user and device entities within the Axonius platform. This
    action allows analysts to categorize or label assets and users directly from the
    SOAR platform, facilitating better organization and tracking of entities.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Secret Key, Verify SSL)
    and action parameters (Tags) from the integration configuration and action settings.

    2. Initializes the `AxoniusManager` to establish communication with the Axonius
    API.

    3. Iterates through the provided `target_entities`, categorizing them into users
    (emails/usernames) and devices (IPs, hostnames, MAC addresses) based on their
    entity type.

    4. Queries the Axonius API to find the corresponding internal Axonius IDs for
    the identified entities.

    5. For each found user and device, sends a `PUT` request to the Axonius API to
    apply the specified tags.

    6. Reports the success or failure of the tag addition for each entity in the final
    output message.


    ### Additional Notes

    This action supports Hostname, IP, MAC Address, and User entities. Tags are provided
    as a comma-separated string.
