Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IP Address, Hostname, MAC Address, User, and Email Addresses)
    using information from Axonius. This action retrieves detailed asset and user
    contextual metadata from Axonius and attaches it to the corresponding entities
    in the SecOps platform.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Filters the target entities to supported types (Address, Hostname, MAC Address,
    User).

    3. Separates the entities into user-related (emails, usernames) and device-related
    (IPs, hostnames, MACs) categories.

    4. Queries the Axonius API to find matching users and devices.

    5. Retrieves detailed information for each matched user and device using their
    internal Axonius IDs.

    6. Enriches the entities with the retrieved details, updates their status, and
    adds entity links, tables, and JSON results.

    7. Optionally creates case insights for the enriched users and endpoints based
    on the action parameters.


    ### Additional Notes

    - Supported entities: IP Address, Hostname, Mac Address, User, Email Addresses
    (User entities that match email regex).

    - The action will fail if the Axonius API is unreachable or if the provided credentials
    are invalid.
