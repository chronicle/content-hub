Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IP Address, Hostname, MAC Address, and User) using contextual
    information retrieved from the Axonius platform. This action queries Axonius for
    device and user details, updates the corresponding entities in Google SecOps with
    additional properties, and optionally generates insights for endpoints and users.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, API Secret, Verify SSL)
    and action parameters (Create Endpoint Insight, Create User Insight, Max Notes
    To Return).

    2. Iterates through the `target_entities` provided in the case, filtering for
    supported types: `HOSTNAME`, `ADDRESS` (IP), `MACADDRESS`, and `USER`.

    3. Queries the Axonius API to search for devices and users matching the identified
    entities.

    4. Matches the retrieved Axonius data to the corresponding Siemplify entities.

    5. Fetches detailed information for each matched entity from Axonius.

    6. Updates the entity's `additional_properties` with the retrieved enrichment
    data and marks the entity as enriched.

    7. Optionally generates case insights for endpoints and users based on the configuration
    parameters.

    8. Adds entity links and data tables to the case wall for detailed analysis.


    ### Additional Notes

    This action requires valid Axonius API credentials. It does not perform any external
    mutations (e.g., blocking or modifying external systems) but performs internal
    mutations by updating entities and creating insights within the Google SecOps
    platform.
