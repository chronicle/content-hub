Remove Tags:
  ai_description: >-
    ### General Description

    Removes specified tags from entities (Users, Hosts, IPs, MACs) in the Axonius
    platform. This action allows analysts to clean up metadata by removing unwanted
    tags from identified assets or user accounts.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, API Secret, Verify SSL)
    and the `Tags` parameter.

    2. Iterates through the provided entities, categorizing them into users (usernames/emails)
    and devices (IPs/hostnames/MACs).

    3. Queries the Axonius API (`get_users` or `get_devices`) to retrieve the internal
    Axonius IDs for the identified entities.

    4. Performs a `DELETE` request to the Axonius API (`remove_tags_from_users` or
    `remove_tags_from_devices`) to remove the specified tags from the found entities.

    5. Reports the success or failure of the tag removal for each entity.


