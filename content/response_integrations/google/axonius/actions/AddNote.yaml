name: Add Note
description: 'Add a note to entities in Axonius. Supported entities: Hostname, IP,
    Mac Address, User, Email Addresses (User entities that match email regex).'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/axonius#add_note
integration_identifier: Axonius
parameters:
-   name: Note
    default_value: ''
    type: string
    description: Specify what note needs to be added.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_note_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "MacAddress", "HOSTNAME", "USERUNIQNAME"]}'
