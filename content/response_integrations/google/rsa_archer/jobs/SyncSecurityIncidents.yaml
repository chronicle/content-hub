name: Sync Security Incidents
parameters:
-   name: API Root
    default_value: http://x.x.x.x/RSAarcher
    type: string
    description: API Root of the RSA Archer instance.
    is_mandatory: true
-   name: Instance Name
    default_value: ''
    type: string
    description: Name of the RSA Archer instance.
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: Username of the RSA Archer account.
    is_mandatory: true
-   name: Password
    default_value: ''
    type: password
    description: Password of the RSA Archer account.
    is_mandatory: true
-   name: Sync Fields
    default_value: ''
    type: string
    description: Specify a comma-separated list of fields that need to be synced.
    is_mandatory: true
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        RSA Archer server is valid.
    is_mandatory: true
description: This job will synchronize security incidents in RSA Archer and Siemplify.
integration: RSAArcher
creator: admin
