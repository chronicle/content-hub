name: Create Incident
description: Create a new incident
integration_identifier: RSAArcher
parameters:
-   name: Incident Summary
    default_value: ''
    type: string
    description: The summary of the new incident.
    is_mandatory: false
-   name: Application Name
    default_value: Incidents
    type: string
    description: 'Specify an application name for the incident. Default: Incidents.'
    is_mandatory: false
-   name: Incident Details
    default_value: ''
    type: string
    description: The details (description) of the new incident.
    is_mandatory: false
-   name: Incident Owner
    default_value: ''
    type: string
    description: The owner of the new incident.
    is_mandatory: false
-   name: Incident Status
    default_value: ''
    type: string
    description: The status of the new incident.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: The priority of the new incident.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The category of the new incident.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object of fields that need to be used, when creating
        an incident . Example: {“Category”:“Malware”}.'
    is_mandatory: false
-   name: Custom Mapping File
    default_value: ''
    type: string
    description: Specify an absolute path to the file that contains all of the required
        mapping. If “Remote File“ is enabled, then provide a URL that contains the
        mapping file. Please refer to action documentation for the additional information.
    is_mandatory: false
-   name: Remote File
    default_value: false
    type: boolean
    description: If enabled, action will treat value provided in “Custom Mapping File“
        as a URL and try to fetch a file from it.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_incident_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: content_id
