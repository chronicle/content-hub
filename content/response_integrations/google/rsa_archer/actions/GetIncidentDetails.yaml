name: Get Incident Details
description: Retrieve information about the incident from RSA Archer.
integration_identifier: RSAArcher
parameters:
-   name: Content ID
    default_value: ''
    type: string
    description: Specify ID of the content for which you want to retrieve details.
    is_mandatory: true
-   name: Application Name
    default_value: Incidents
    type: string
    description: 'Specify an application name for the incident. Default: Incidents.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_incident_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
