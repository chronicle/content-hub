Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific incident from RSA Archer. This
    action allows analysts to pull comprehensive data for a given incident ID, facilitating
    deeper investigation and context gathering directly within the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Instance Name, and Verify SSL) to authenticate with the RSA Archer instance.

    2. It extracts the required action parameters: `Content ID` and the optional `Application
    Name`.

    3. The `RSAArcherManager` is initialized to establish a session with the RSA Archer
    API.

    4. The action calls `get_app_by_name` to verify and retrieve the application details
    based on the provided `Application Name`.

    5. It then calls `get_incident_by_id` to fetch the specific incident details from
    RSA Archer using the provided `Content ID`.

    6. Finally, the retrieved incident data is added to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a read-only operation. It does not modify any data within RSA Archer
    or the SOAR platform. If the specified application or incident ID is not found,
    the action will return an error message.
