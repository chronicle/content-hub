Create Incident:
  ai_description: >-
    Creates a new incident in the RSA Archer platform. This action allows users to
    define incident attributes such as summary, details, owner, status, priority,
    and category, along with custom fields and mapping configurations. It interacts
    with the RSA Archer API to generate the incident and subsequently retrieves the
    created incident's details to provide a comprehensive result.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Instance Name, Verify SSL) to establish a connection to RSA Archer.

    2. It extracts action parameters including incident summary, details, owner, status,
    priority, category, custom fields, application name, and mapping file configurations.

    3. The `RSAArcherManager` is initialized to handle API interactions.

    4. The action calls the `create_incident` method of the `RSAArcherManager` to
    create the incident in RSA Archer.

    5. Upon successful creation, it calls `get_incident_by_id` to fetch the full details
    of the newly created incident.

    6. The incident details are added to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action operates independently of entities and does not require any target
    entities to be selected.
