Update Incident:
  ai_description: >-
    ### General Description

    Updates an existing incident in RSA Archer. This action allows users to modify
    various fields of an incident, including its summary, details, owner, status,
    priority, category, and custom fields, based on the provided Content ID.


    ### Flow Description

    1. Initializes the RSA Archer client with the provided credentials.

    2. Parses the provided custom fields JSON object.

    3. Sends a PUT request to the RSA Archer API to update the specified incident
    with the new values.

    4. Sends a GET request to retrieve the updated incident details.

    5. Attaches the updated incident details to the action's JSON result.


    ### Additional Notes

    Custom fields must be provided as a valid JSON object. If a custom mapping file
    is used, it can be fetched remotely if the 'Remote File' parameter is enabled.
