Update Incident:
  ai_description: >-
    ### General Description

    Updates an existing incident record within the RSA Archer platform. This action
    allows users to modify various fields of an incident, such as the summary, description,
    owner, status, priority, category, and custom fields, based on the provided Content
    ID.


    ### Flow Description

    1. The action initializes the RSA Archer manager using the provided configuration
    parameters (API Root, Username, Password, Instance Name).

    2. It parses the input parameters, including the Content ID and any optional fields
    to be updated.

    3. It constructs the payload for the update request, including mapping custom
    fields if provided.

    4. The action calls the `update_incident` method, which performs a PUT request
    to the RSA Archer API to update the specified incident.

    5. Upon a successful update, it calls the `get_incident_by_id` method to retrieve
    the updated incident details.

    6. The retrieved incident details are added to the action results using `siemplify.result.add_result_json`.


