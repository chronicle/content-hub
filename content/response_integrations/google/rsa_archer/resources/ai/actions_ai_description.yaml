Add Incident Journal Entry:
  ai_description: >-
    ### General Description

    Adds a journal entry to a specific security incident in RSA Archer. This action
    allows analysts to append notes or logs directly to an existing incident record
    within the RSA Archer platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Instance Name,
    Verify SSL) to authenticate with RSA Archer.

    2. Extracts action parameters (Destination Content ID, Text) to identify the target
    incident and the content to be added.

    3. Initializes the `RSAArcherManager` to handle API interactions.

    4. Fetches the Incident Journal application ID, security incident ID, and security
    incident level ID from RSA Archer.

    5. Verifies the existence of the security incident by calling `get_security_incident_details`
    with the provided `Destination Content ID`.

    6. Executes a POST request via `add_journal_entry` to append the specified text
    as a journal entry to the incident.

    7. Returns the result JSON containing the operation outcome.


    ### Additional Notes

    This action requires valid RSA Archer credentials and the correct Content ID for
    the target incident. If the incident is not found, the action will fail.
  ai_short_description: >-
    Adds a journal entry to a specific security incident in RSA Archer.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
