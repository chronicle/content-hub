Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific incident from RSA Archer using
    the provided Content ID and Application Name. The action fetches the incident
    data and attaches it to the action's JSON result for further use in the playbook.


    ### Flow Description

    1. Initializes the RSA Archer manager with the provided integration credentials.

    2. Fetches the application details by name to retrieve the application alias.

    3. Makes an API call (GET request) to RSA Archer to retrieve the incident details
    using the Content ID and application alias.

    4. Returns the incident details as a JSON result.


    ### Additional Notes

    If the specified application name is not found, the action will fail gracefully
    and return an appropriate error message.
