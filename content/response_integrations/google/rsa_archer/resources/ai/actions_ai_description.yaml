    1. Extracts configuration and action parameters.

    2. Initializes the RSA Archer API client.

    3. Parses custom fields and mapping files if provided.

    4. Makes a POST API call to RSA Archer to create a new incident with the specified
    parameters.

    5. Retrieves the newly created incident details via a GET API call.

    6. Returns the incident ID and attaches the incident details as a JSON result.


    ### Additional Notes

