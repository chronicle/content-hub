Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the RSA Archer integration by authenticating with the provided
    credentials. This action verifies that the integration can successfully communicate
    with the RSA Archer API.


    ### Flow Description

    1. Retrieves configuration parameters (API Root, Username, Password, Instance
    Name, Verify SSL) from the integration configuration.

    2. Initializes the `RSAArcherManager` with these credentials.

    3. The manager attempts to authenticate by making a POST request to the RSA Archer
    `/api/core/security/login` endpoint to obtain a session token.

    4. If authentication is successful, the action terminates with a success message.


    ### Additional Notes

    This action does not perform any data retrieval or modification beyond verifying
    the connection. It is intended for troubleshooting and connectivity validation.
