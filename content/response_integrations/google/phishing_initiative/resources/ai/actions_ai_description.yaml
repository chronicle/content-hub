Get Url Status:
  ai_description: >-
    ### General Description

    This action retrieves the status of URL entities from the Phishing Initiative
    service. It checks whether a URL has been submitted or identified as phishing,
    providing valuable threat intelligence to help analysts assess the risk of web-based
    threats.


    ### Flow Description

    1. Initialize the `PhishingInitiativeManager` using the configured API root and
    token retrieved from the integration configuration.

    2. Iterate through the `target_entities` provided to the action.

    3. Filter for entities of type `URL`.

    4. For each URL, perform an API call to `get_url_info` to retrieve its status
    from the Phishing Initiative service.

    5. If data is returned, update the entity's `additional_properties` with the retrieved
    status and mark the entity as enriched.

    6. If the status returned is "phishing", mark the entity as suspicious.

    7. Update the modified entities within the SOAR platform.

    8. Add the retrieved JSON data to the action results for further review.


    ### Additional Notes

    This action performs enrichment and does not modify external systems. It relies
    on the integration configuration for API connectivity settings.
  ai_short_description: >-
    Retrieves the status of URL entities from the Phishing Initiative service to determine
    if they are flagged as phishing.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and status flags within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (fetches_data=true). It updates
      internal entities with the retrieved status (can_mutate_internal_data=true,
      can_update_entities=true). It does not mutate external data, create insights,
      modify alerts, or create case comments.
