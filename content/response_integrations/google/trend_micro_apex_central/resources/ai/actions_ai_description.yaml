  ai_description: >-
    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central based
    on the provided entities.


    ### Flow Description

    1. Initializes the Trend Micro Apex Central manager with the provided credentials.

    2. Validates the provided parameters, such as note length and expiration days.

    3. Retrieves the list of existing UDSO entries to prevent duplicates.

    4. Iterates through the target entities (IP, URL, FileHash) and validates their
    format (e.g., IPv4, valid URL, SHA-1 hash).

    5. Adds the valid entities to the UDSO list in Trend Micro Apex Central with the
    specified action (Block or Log).

    6. Retrieves the JSON results for the successfully added entities and attaches
    them to the action result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Action | Dropdown | Yes | Specify what action should be applied to the UDSO
    (Block or Log). |

    | Note | String | No | Specify an additional note for the provided UDSO. Warning:
    this note can't contain more than 256 characters. |

    | Expire In (Days) | String | No | Specify in how many days the UDSO should expire.
    If nothing is provided, UDSO will never expire. |
