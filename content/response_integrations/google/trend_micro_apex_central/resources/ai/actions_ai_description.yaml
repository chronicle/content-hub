Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IP Address, MAC Address, Hostname, URL, Hash) with information
    from Trend Micro Apex Central. It retrieves User-Defined Suspicious Objects (UDSO)
    details and endpoint security agent information to provide additional context
    and threat intelligence.


    ### Flow Description

    1. Initializes the Trend Micro Apex Central manager.

    2. Iterates over supported entities (URL, IP Address, File Hash, Hostname, MAC
    Address).

    3. For UDSO-supported entities, fetches UDSO details from Trend Micro Apex Central.

    4. If UDSO details are found, enriches the entity, optionally marks it as suspicious,
    and prepares insight data.

    5. For endpoint-supported entities, fetches security agent details from Trend
    Micro Apex Central.

    6. If endpoint details are found, checks if the endpoint has a sensor enabled.

    7. Enriches the entity with endpoint details and prepares insight data.

    8. Updates the entities in the platform, creates case insights, and adds JSON
    results and data tables.


    ### Additional Notes

    - Only SHA-1 hashes are supported for File Hash entities.

    - The action can optionally extract the domain from URL entities for UDSO enrichment.
  ai_short_description: >-
    Enriches IP Address, MAC Address, Hostname, URL, and File Hash entities with User-Defined
    Suspicious Objects (UDSO) and endpoint security agent information from Trend Micro
