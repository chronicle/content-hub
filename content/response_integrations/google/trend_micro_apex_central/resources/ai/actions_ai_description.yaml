    ### General Description

    Tests connectivity to the Trend Micro Apex Central server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Application ID,
    API Key, Verify SSL).

    2. Initializes the Trend Micro Apex Central manager.

    3. Makes a GET request to the `/WebApp/API/ServerResource/ProductServers` endpoint
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
