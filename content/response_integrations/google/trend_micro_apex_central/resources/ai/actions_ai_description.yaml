Create File UDSO:
  ai_description: >-
    ### General Description

    This action creates a User-Defined Suspicious Object (UDSO) based on a local file
    in Trend Micro Apex Central. It allows analysts to specify a file path, calculate
    its hash, and add it to the Trend Micro blocklist or quarantine list.


    ### Flow Description

    1. Retrieves existing UDSO file entries from Trend Micro Apex Central via a GET
    request.

    2. Iterates through the provided comma-separated file paths.

    3. Calculates the SHA-1 hash for each file locally.

    4. Checks if the file hash already exists in the retrieved UDSO list.

    5. If the file does not exist, makes a PUT request to the Trend Micro Apex Central
    API to add the file as a UDSO with the specified action (Block, Log, or Quarantine).

    6. Fetches the newly created UDSO entries to return as JSON results.


    ### Additional Notes

    The action requires the files to be accessible locally on the machine executing
    the script.
