  ai_description: >-
    ### General Description

    The **Enrich Entities** action queries Trend Micro Apex Central to retrieve contextual
    information and threat intelligence for supported entities (IP Address, MAC Address,
    Hostname, URL, Hash). It fetches User-Defined Suspicious Objects (UDSO) details
    for IOCs and Security Agent details for endpoints. The action enriches the entities
    with the retrieved data, optionally marks them as suspicious, and generates case
    insights and data tables with the findings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | --- | --- | --- | --- | --- |

    | Create Endpoint Insight | Boolean | False | True | If enabled, the action will
    create an insight consisting of the information regarding the endpoints that were
    enriched. |

    | Create UDSO Insight | Boolean | False | True | If enabled, the action will create
    an insight consisting of the information regarding the entities that matched UDSO.
    |

    | Mark UDSO Entities | Boolean | False | True | If enabled, the action will mark
    all of the entities that were seen in the User-Defined Suspicious Objects list
    as suspicious. |

    | Extract Domain | Boolean | False | False | If enabled, the action will extract
    the domain part of the URL entity and use it for enrichment. |


    ### Flow Description

    1. The action iterates over the target entities and filters them based on supported
    types (URL, IP Address, File Hash, Hostname, MAC Address).

    2. For IOC entities (URL, IP Address, File Hash), it queries Trend Micro Apex
    Central for User-Defined Suspicious Objects (UDSO) details.

    3. If UDSO details are found, it enriches the entity, optionally marks it as suspicious,
    and prepares data for insights and tables.

    4. For endpoint entities (Hostname, MAC Address, IP Address), it queries for Security
    Agent details and checks if the endpoint sensor is enabled.

    5. If endpoint details are found, it enriches the entity and prepares data for
    insights and tables.

    6. Finally, the action updates the enriched entities in the case, creates case
    insights (if configured), and attaches data tables and JSON results to the action
    output.


    ### Additional Notes

    - Only SHA-1 hashes are supported for File Hash entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
