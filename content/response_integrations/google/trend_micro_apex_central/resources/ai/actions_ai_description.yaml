Isolate Endpoints:
  ai_description: >-
    ### General Description

    Isolates endpoints in Trend Micro Apex Central to prevent network connectivity.
    This action supports IP Address, Hostname, and MAC Address entities. It is an
    asynchronous action that initiates the isolation process and periodically checks
    the status until completion or timeout.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `API Root`, `Application
    ID`, `API Key`, and `Verify SSL` settings from the integration configuration.

    2. **Entity Filtering**: The action iterates through the provided `target_entities`,
    filtering for `ADDRESS`, `HOSTNAME`, and `MACADDRESS` types.

    3. **Initiate Isolation**: For each valid entity, the action calls the `manager.isolate_endpoint`
    method (POST request) to request isolation in Trend Micro Apex Central.

    4. **Status Tracking**: If it is the first run, the action tracks the pending
    endpoints and returns an `INPROGRESS` execution state.

    5. **Status Polling**: On subsequent runs, the action calls `manager.get_security_agent`
    (GET request) to retrieve the current isolation status of the endpoints.

    6. **Completion**: Once all endpoints are processed or the action times out, it
    returns the final status and a summary message.


    ### Additional Notes

    This action is asynchronous and may take several minutes to complete. If the action
    approaches the execution timeout, it will report the current status of pending
    endpoints and suggest increasing the timeout in the IDE.
  ai_short_description: >-
    Isolates endpoints in Trend Micro Apex Central by IP, Hostname, or MAC Address.
