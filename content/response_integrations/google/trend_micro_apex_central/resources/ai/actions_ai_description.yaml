Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IP Address, MAC Address, Hostname, URL, and File Hash) with
    threat intelligence and endpoint metadata from Trend Micro Apex Central. This
    action retrieves information regarding User-Defined Suspicious Objects (UDSO)
    and security agent details, providing context to help analysts assess the risk
    associated with the entities.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, Application
    ID, API Key, SSL verification) and action parameters (Create Endpoint Insight,
    Create UDSO Insight, Mark UDSO Entities, Extract Domain).

    2. **Entity Filtering**: Iterates through the provided target entities, filtering
    for supported types: URL, IP Address, File Hash (SHA-1 only), Hostname, and MAC
    Address.

    3. **UDSO Enrichment**: For entities supported by UDSO (URL, File Hash, IP Address),
    the action calls the `get_udso_entry` API method to retrieve suspicious object
    details. If found, it updates the entity's `additional_properties`, optionally
    marks the entity as suspicious, and prepares UDSO insights.

    4. **Endpoint Enrichment**: For entities supported as endpoints (IP Address, Hostname,
    MAC Address), the action calls the `get_security_agent` API method to retrieve
    agent details, including isolation status and sensor availability. It updates
    the entity's `additional_properties` with this data.

    5. **Data Aggregation**: Updates the entities in the SOAR platform using `siemplify.update_entities`
    and generates case insights and data tables containing the retrieved information.


    ### Additional Notes

    Only SHA-1 hashes are supported for File Hash entities. The action supports optional
    configuration to extract the domain from URL entities for UDSO lookups.
