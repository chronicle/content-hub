Isolate Endpoints:
  ai_description: >-
    ### General Description

    Isolates endpoints in Trend Micro Apex Central based on IP Address, Hostname,
    or MAC Address entities. This action initiates a state change on the external
    device to prevent network traffic to or from the specified endpoint.


    ### Flow Description

    1. Iterates over supported entities (IP Address, Hostname, MAC Address).

    2. Initiates an isolation request for each endpoint via the Trend Micro Apex Central
    API (`POST /WebApp/API/AgentResource/ProductAgents`).

    3. Periodically checks the isolation status of the endpoints (`GET /WebApp/API/AgentResource/ProductAgents`).

    4. Completes when the endpoints are successfully isolated or if the action times
    out/fails.


    ### Additional Notes

    This action is asynchronous and can take several minutes to finish. Consider increasing
    the timeout in the IDE.
