Create File UDSO:
  ai_description: >-
    ### General Description

    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central based
    on local file paths. This action allows security teams to proactively block, log,
    or quarantine specific files across their environment by adding them to the Trend
    Micro Apex Central suspicious object list.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Application ID, API
    Key, SSL verification) and action parameters (File Paths, Action, Note).

    2. It initializes the `TrendMicroApexCentralManager` to handle API interactions.

    3. It retrieves the current list of UDSO entries from Trend Micro Apex Central
    to check for existing objects.

    4. For each provided file path, the action calculates the SHA-1 hash.

    5. If the file hash is not already present in the UDSO list, the action performs
    a PUT request to `add_udso_file_to_list` to create the new UDSO entry with the
    specified scan action (Block, Log, or Quarantine).

    6. Finally, it retrieves the updated list of UDSO entries to confirm the creation
    and adds the result to the action output.


    ### Additional Notes

    This action requires the SOAR engine to have read access to the specified file
    paths to calculate their SHA-1 hashes. If a file is inaccessible, the action will
    log an error and skip that file.
