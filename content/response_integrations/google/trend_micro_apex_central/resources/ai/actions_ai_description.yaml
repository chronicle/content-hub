      tables.
    reasoning: >-
      The action fetches UDSO and Security Agent details from Trend Micro Apex Central
      (fetches_data=true). It does not mutate any external data, as the API calls
      are strictly for querying information (can_mutate_external_data=false). Internally,
      it updates the entities with the fetched data, creates case insights, and adds
      data tables (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities, does not
      mutate external state, and only performs allowed internal mutations (updating
      entities and creating insights). Therefore, it is classified as an Enrichment
      action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - DestinationURL
    - FILEHASH
    - ADDRESS
    - MacAddress
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      if `entity.entity_type` is in the supported list (URL, ADDRESS, FILEHASH, HOSTNAME,
      MACADDRESS). Therefore, it filters by entity type.
