Unisolate Endpoints:
  ai_description: >-
    ### General Description

    Unisolates endpoints in Trend Micro Apex Central. This action restores network
    connectivity to endpoints that were previously isolated, allowing them to communicate
    with the network again. It supports targeting endpoints via IP Address, Hostname,
    or MAC Address.


    ### Flow Description

    1. The action retrieves the integration configuration parameters (API Root, Application
    ID, API Key, Verify SSL).

    2. It filters the provided target entities to include only supported types: IP
    Address, Hostname, and MAC Address.

    3. For each valid entity, the action calls the `manager.unisolate_endpoint` method,
    which sends a POST request to the Trend Micro Apex Central API to initiate the
    unisolation process.

    4. The action tracks the status of the unisolation request. If the operation is
    asynchronous, it enters a pending state and periodically queries the endpoint's
    status using `manager.get_security_agent` to verify if the isolation status has
    returned to 'normal'.

    5. Once the unisolation is confirmed or the operation completes, the action returns
    the final status and a summary message.


    ### Additional Notes

    This action is asynchronous and may take several minutes to complete. It is recommended
    to increase the timeout in the IDE if necessary. The action verifies the isolation
    status of the endpoint before and after the request to ensure the operation was
    successful.
