    on provided file paths.


    ### Flow Description

    1. Retrieves the list of existing file UDSOs from Trend Micro Apex Central to
    prevent duplicates.

    2. Iterates over the provided file paths, calculates their SHA-1 hashes, and checks
    if they already exist in the UDSO list.

    3. If a file does not exist, it reads the file content, encodes it in base64,
    and uploads it to Trend Micro Apex Central with the specified scan action.

    4. Retrieves the JSON results for the successfully added files and attaches them
    to the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Paths | String | Yes | A comma-separated list of local file paths that
    need to be used to create a UDSO. |

    | Action | Dropdown | Yes | Specifies what action should be applied to the UDSO
    (e.g., Block, Log, Quarantine). |

    | Note | String | No | Specifies an additional note or description for the provided
    UDSO. |
