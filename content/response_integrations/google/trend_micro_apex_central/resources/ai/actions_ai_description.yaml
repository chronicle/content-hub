Create Entity UDSO:
  ai_description: >-
    ### General Description

    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central based
    on the provided entities. This action allows security analysts to push indicators
    (IP addresses, URLs, or File Hashes) to the Trend Micro Apex Central platform
    to enforce security policies such as blocking or logging.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Application ID, API
    Key) and action parameters (Action, Note, Expiration).

    2. It retrieves the current list of UDSO entries from Trend Micro Apex Central
    via a GET request to identify existing objects and avoid duplicates.

    3. It iterates through the target entities in the SOAR case.

    4. For each entity, it validates the type (IP, URL, or SHA-1 File Hash) and format.

    5. If the entity is valid and does not already exist, the action calls the Trend
    Micro Apex Central API (PUT request) to add the entity to the UDSO list with the
    specified scan action (Block or Log), optional notes, and optional expiration
    date.

    6. Finally, it returns the operation results, including a list of successfully
    created UDSOs and any failures.


    ### Additional Notes

    - Only SHA-1 hashes are supported for File Hash entities.

    - The 'Note' parameter is limited to 256 characters.

    - The action supports IP, URL, and File Hash entity types.
  ai_short_description: >-
    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central for
    specified IP, URL, or File Hash entities to enforce blocking or logging policies.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the entity (IP, URL, or File Hash) to the User-Defined Suspicious Objects
      list in Trend Micro Apex Central.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing UDSO entries to check for duplicates (fetches_data=true)
      and performs a PUT request to add new UDSOs to the external Trend Micro Apex
      Central system (can_mutate_external_data=true). It does not modify internal
      SOAR case data or entities.
