Create Entity UDSO:
  ai_description: >-
    ### General Description

    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central based
    on the provided entities (IP, URL, Hash). This action allows security teams to
    proactively block or log interactions with malicious indicators across their environment.


    ### Flow Description

    1. Retrieves the list of existing UDSO entries from Trend Micro Apex Central to
    prevent duplicates.

    2. Iterates through the target entities and filters for supported types (IP, URL,
    SHA-1 Hash).

    3. Validates the entity identifiers (e.g., checks for valid IPv4 format, valid
    URL format, and SHA-1 length).

    4. If the entity does not already exist in the UDSO list, makes an API call to
    Trend Micro Apex Central to add the entity as a UDSO with the specified action
    (Block or Log), note, and expiration date.

    5. Retrieves the JSON results for the successfully added entities and attaches
    them to the action result.


    ### Additional Notes

    Only SHA-1 hashes and IPv4 addresses are supported. The note parameter cannot
    exceed 256 characters.
  ai_short_description: >-
    Creates a User-Defined Suspicious Object (UDSO) in Trend Micro Apex Central for
    supported entities (IP, URL, Hash) to apply actions like Block or Log.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified entities as User-Defined Suspicious Objects (UDSO) to Trend
      Micro Apex Central.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to Trend Micro Apex Central to add a new UDSO
      entry, which mutates external data. It does not fetch contextual enrichment
      data, nor does it update internal entities, create insights, or add case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
