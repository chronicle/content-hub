name: Enrich Entities
description: 'Enrich entities with information from Trend Micro Apex Central. Supported
    entities: IP Address, MAC Address, Hostname, URL, Hash. Note: only SHA-1 hashes
    are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-apex-central#enrich_entities
integration_identifier: TrendMicroApexCentral
parameters:
-   name: Create Endpoint Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight consisting of the information
        regarding the endpoints that were enriched.
    is_mandatory: false
-   name: Create UDSO Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight consising of the information
        regarding the entities that matched UDSO.
    is_mandatory: false
-   name: Mark UDSO Entities
    default_value: 'True'
    type: boolean
    description: If enabled, action will mark all of the entities that were seen in
        the User-Defined Suspicious Objects list as suspicious.
    is_mandatory: false
-   name: Extract Domain
    default_value: 'False'
    type: boolean
    description: If enabled, action will extract domain part of the URL entity and
        use it for enrichment.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL","FILEHASH","ADDRESS","MacAddress","HOSTNAME"]}'
