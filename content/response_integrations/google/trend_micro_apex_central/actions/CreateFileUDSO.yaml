name: Create File UDSO
description: Create a User-defined suspicious object based on a file in Trend Micro
    Apex Central.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-apex-central#create_file_udso
integration_identifier: TrendMicroApexCentral
parameters:
-   name: File Paths
    default_value: ''
    type: string
    description: Specify a comma-separated list of file paths that needs to be used
        to create a UDSO.
    is_mandatory: true
-   name: Action
    default_value: Block
    type: ddl
    optional_values:
    - Block
    - Log
    - Quarantine
    description: Specify what action should be applied to the UDSO.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: Specify an additional note for the provided UDSO.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_file_udso_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
