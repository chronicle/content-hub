name: Create Entity UDSO
description: 'Create a User-defined suspicious object based on the entities in Trend
    Micro Apex Central. Supported entities: IP, URL, Hash. Note: only SHA-1 hashes
    are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-apex-central#create_entity_udso
integration_identifier: TrendMicroApexCentral
parameters:
-   name: Action
    default_value: Block
    type: ddl
    optional_values:
    - Block
    - Log
    description: Specify what action should be applied to the UDSO.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: 'Specify an additional note for the provided UDSO. Warning: this
        note can''t contain more than 256 characters.'
    is_mandatory: false
-   name: Expire In (Days)
    default_value: ''
    type: string
    description: Specify in how many days the UDSO should expire. If nothing is provided,
        UDSO will never expire.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_entity_udso_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL","FILEHASH","ADDRESS"]}'
