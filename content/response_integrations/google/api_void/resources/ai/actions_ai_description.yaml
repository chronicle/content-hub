    threshold. If the risk score exceeds the threshold, the entity is marked as suspicious.


    ### Flow Description

    1. Iterates through all target entities of type URL.

    2. Validates the URL format, prepending `http://` if a schema is missing.

    3. Makes a POST request to the APIVoid API (`/urlrep/v1/pay-as-you-go/`) to fetch
    the URL's reputation and risk score.

