Get domain reputation:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities by retrieving domain reputation data from APIVoid.
    This action checks if a domain is blacklisted by popular and trusted domain blacklist
    services and evaluates the risk based on a provided threshold.


    ### Flow Description

    1. Iterates over the target entities, filtering for Hostname and URL entity types.

    2. Extracts the domain from the entity identifier.

    3. Makes a GET request to the APIVoid `domainbl/v1/pay-as-you-go/` endpoint to
    fetch the domain reputation report.

    4. Parses the response to extract enrichment data and blacklist reports.

    5. If the `Create Insights` parameter is enabled and a country code is found,
    generates an insight for the entity.

    6. Updates the entity's `additional_properties` with the retrieved enrichment
    data.

    7. If the number of blacklist detections exceeds the specified `Threshold`, marks
    the entity as suspicious.

    8. Marks the entity as enriched and saves the updates to the platform.

    9. Attaches the blacklist report as a CSV table and the raw data as a JSON result
    to the action output.


    ### Additional Notes

    - The action will skip entities that are not Hostnames or URLs.

    - If the API limit is exceeded, the action will fail and raise an error.
