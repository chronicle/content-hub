  ai_description: >-
    ### General Description

    Verifies and enriches User entities (specifically email addresses) using APIVoid.
    It retrieves contextual information and threat intelligence, such as whether the
    email is disposable, has valid MX/SPF records, and its overall risk score.


    ### Flow Description

    1. Iterates through the target User entities and validates if the entity identifier
    matches a standard email address format using a regular expression.

    2. Makes a POST API call to the APIVoid `emailverify/v1/pay-as-you-go/` endpoint
    to fetch detailed information about the email address.

    3. Enriches the entity's additional properties with the retrieved data (e.g.,
    disposable status, MX records, SPF records, and suspicious domain flags).

    4. Adds a data table to the entity containing the detailed email information.

    5. Evaluates the email's risk score against the provided `Threshold` parameter;
    if the score exceeds the threshold, the entity is marked as suspicious.

    6. Updates the entities in the Google SecOps platform and attaches the raw JSON
    results to the action execution.


    ### Additional Notes

    Entities that do not match a standard email regex pattern are skipped and will
    not be processed by the APIVoid service.
