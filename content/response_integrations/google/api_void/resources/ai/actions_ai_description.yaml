Get Screenshot:
  ai_description: >-
    ### General Description

    Captures a high-quality screenshot of specified URL entities using the APIVoid
    service. This action provides visual context for potentially malicious or suspicious
    URLs by retrieving an image of the webpage and attaching it directly to the case,
    along with the screenshot's MD5 hash.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities, continuing only with those of type `URL`.

    3. Validates the URL format, automatically prepending `http://` if a scheme is
    missing.

    4. Makes a POST request to the APIVoid `screenshot/v1/pay-as-you-go/` API endpoint
    to capture the screenshot.

    5. Checks the returned screenshot file size; if it exceeds 3MB, the attachment
    is skipped to prevent oversized payloads.

    6. Attaches the base64-encoded screenshot to the case and records the file's MD5
    hash in the JSON results.

    7. Updates the successfully processed entities within the SecOps platform.


    ### Additional Notes

    - Screenshots larger than 3MB will not be attached to the case, and the action
    will log an error for those specific entities.

    - The `Threshold` parameter is extracted by the script but does not actively influence
    the screenshot capture logic.
  ai_short_description: >-
    Captures a high-quality screenshot of URL entities using APIVoid and attaches
    the image to the case for visual context.
