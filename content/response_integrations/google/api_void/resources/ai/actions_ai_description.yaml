Get Ip Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the APIVoid service. This action retrieves
    comprehensive reputation data, including blacklist detections, for specified IP
    addresses. It enhances the entity's context within the SOAR platform by updating
    its properties, optionally marking it as suspicious based on a configurable detection
    threshold, and generating insights.


    ### Flow Description

    1. The action initializes the APIVoid manager using the provided API credentials
    and configuration.

    2. It iterates through the target entities, filtering specifically for `ADDRESS`
    types and excluding any entities marked as internal.

    3. For each valid entity, the action calls the APIVoid API to retrieve the IP
    reputation report.

    4. If the `Create Insights` parameter is enabled, it adds an entity insight containing
    the country code associated with the IP.

    5. The action updates the entity's `additional_properties` with the retrieved
    enrichment data.

    6. It adds a blacklist report table to the action results for detailed analysis.

    7. If the number of blacklist detections exceeds the configured `Threshold`, the
    action marks the entity as suspicious (`is_suspicious = True`).

    8. Finally, it updates the entities in the SOAR platform and returns the execution
    results.


    ### Additional Notes

    This action is strictly for enrichment and does not perform any state-changing
    operations on external systems. It requires a valid APIVoid API key to function
    correctly.
  ai_short_description: >-
    Enriches IP Address entities by retrieving reputation data and blacklist information
    from APIVoid, optionally marking entities as suspicious based on a detection threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties, sets the is_suspicious flag, sets the
      is_enriched flag, and adds entity insights within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (APIVoid) and updates internal
      SOAR entities with enrichment data, insights, and suspicious status. It does
      not mutate external systems.
