Verify Email:
  ai_description: >-
    ### General Description

    Verifies email addresses using the APIVoid service to assess their legitimacy
    and risk. This action retrieves detailed information, including whether the email
    is disposable, and checks for the presence of MX and SPF records. It helps analysts
    identify potentially malicious or low-reputation email addresses.


    ### Flow Description

    1. The action initializes the APIVoid manager using the provided API credentials
    and configuration.

    2. It iterates through the provided `USER` entities, filtering for those that
    match a valid email format using a regular expression.

    3. For each valid email, the action makes an API call to the APIVoid `emailverify`
    endpoint to retrieve reputation and verification data.

    4. The retrieved data is added to the entity's `additional_properties` and a data
    table is attached to the action results.

    5. If the email's risk score exceeds the configured `Threshold`, the entity is
    marked as suspicious (`is_suspicious = True`).

    6. The action updates the entities in the SOAR platform with the new properties
    and status.


    ### Additional Notes

    This action requires a valid APIVoid API key and root URL. It specifically targets
    `USER` entities. The `Threshold` parameter is optional and defaults to 0 if not
    provided.
  ai_short_description: >-
    Verifies email addresses using APIVoid to retrieve risk information, such as disposable
    status and MX records, and updates the entity's suspicious status based on a configurable
    risk threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
