    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (additional_properties, is_suspicious, is_enriched)
      within the SOAR platform.
    reasoning: >-
      The action fetches email reputation data from APIVoid (fetches_data=true). It
      updates the entity's `additional_properties` and `is_suspicious` status within
      the SOAR platform (can_mutate_internal_data=true, can_update_entities=true).
      It does not change external system state.
