Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the APIVoid service to ensure that the integration is configured
    correctly and the API is reachable.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, API Key,
    Verify SSL).

    2. Initializes the APIVoidManager with the provided credentials.

    3. Makes an HTTP GET request to the APIVoid `iprep/v1/pay-as-you-go/?stats` endpoint
    to verify authentication and network connectivity.

    4. Returns a successful execution state if the request succeeds, or a failed execution
    state if an error occurs.


    ### Additional Notes

    This is a standard utility action primarily used during the initial setup or troubleshooting
    of the APIVoid integration.
