  ai_description: >-
    ### General Description

    The Ping action is used to test connectivity between Google SecOps and the APIVoid
    service. It ensures that the integration is configured correctly with valid credentials
    and network access.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration's configuration parameters (API Root, API Key, and Verify SSL).


    ### Flow Description

    1. **Initialization**: The action initializes the APIVoidManager using the integration's
    configured API Root, API Key, and Verify SSL settings.

    2. **Connectivity Test**: It sends a GET request to the APIVoid stats endpoint
    (`/iprep/v1/pay-as-you-go/?stats`) to verify network access and credential validity.

    3. **Result Evaluation**: If the request is successful, the action completes and
    returns a success message. If the request fails, it catches the exception and
    returns an error message indicating the failure reason.


    ### Additional Notes

    This action does not operate on any entities or alerts and is strictly used for
    diagnostic and configuration verification purposes.
