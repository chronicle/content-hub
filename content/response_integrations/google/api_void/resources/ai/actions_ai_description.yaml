  ai_description: >-
    ### General Description

    The `Get Domain Reputation` action queries the APIVoid service to retrieve reputation
    and threat intelligence data for `HOSTNAME` and `URL` entities. It checks if the
    domain is blacklisted by popular and trusted domain blacklist services, enriches
    the entities with the retrieved data, and optionally creates insights and marks
    entities as suspicious based on a defined threshold.


    ### Flow Description

    1. **Initialization**: Extracts configuration settings and action parameters.

    2. **Entity Filtering**: Filters the target entities to process only `HOSTNAME`
    and `URL` types.

    3. **Reputation Retrieval**: For each valid entity, extracts the domain and queries
    APIVoid for its reputation.

    4. **Insight Creation**: If the `Create Insights` parameter is enabled and country
    code data is available, generates an insight for the entity.

    5. **Entity Enrichment**: Updates the entity's additional properties with the
    retrieved reputation data.

    6. **Data Table & JSON Results**: Attaches a blacklist report as a data table
    and the raw JSON response to the entity.

    7. **Suspicious Evaluation**: Compares the number of blacklist detections against
    the `Threshold` parameter. If the detections exceed the threshold, the entity
    is marked as suspicious.

    8. **Entity Update**: Saves the enriched entities back to the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | Domain risk threshold. If the number of blacklist
    detections exceeds this numeric value, the entity will be marked as suspicious.
    |

    | Create Insights | Boolean | Yes | Specifies whether the action should create
    an insight on the entity containing the country code information. |


    ### Additional Notes

    - The action handles API limits and invalid API keys gracefully, failing the specific
    entities or the action as appropriate.
