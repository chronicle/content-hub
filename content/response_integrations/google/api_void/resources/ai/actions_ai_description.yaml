    Retrieves the safety reputation and risk score for a given URL using the APIVoid
    service. This action provides detailed threat intelligence, including blacklist
    reports and risk assessments, to help analysts evaluate the safety of URLs.


    ### Flow Description

    1. The action initializes the APIVoid manager using the provided API configuration.

    2. It iterates through the target entities, filtering for URL entities.

    3. For each URL, it sends a POST request to the APIVoid URL reputation endpoint.

    4. The retrieved reputation data is parsed, and the entity's `additional_properties`
    are updated with the enrichment details.

    5. If a blacklist report is available, it is added as a data table to the action
    results.

    6. If the URL's risk score exceeds the user-defined threshold, the entity is marked
    as suspicious.

    7. Finally, the action updates the entities in the SOAR platform and returns the
    full JSON result.


