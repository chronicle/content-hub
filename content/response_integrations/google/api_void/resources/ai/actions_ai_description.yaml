Get Ip Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities by retrieving reputation data from APIVoid. This
    action detects potentially malicious IP addresses commonly used for spam, attacks,
    or fraudulent activities, providing threat intelligence and blacklist reports.


    ### Flow Description

    1. Iterates over the target entities, filtering for external IP addresses.

    2. Makes a POST request to the APIVoid API (`/iprep/v1/pay-as-you-go/`) to fetch
    reputation data for each valid IP address.

    3. Evaluates the number of blacklist detections against the provided `Threshold`
    parameter. If the detections exceed the threshold, the entity is marked as suspicious.

    4. Enriches the entity with the retrieved data, including anonymity details and
    detection rates.

    5. If the `Create Insights` parameter is enabled, generates an insight for the
    entity containing its country code.

    6. Attaches a detailed blacklist report as an entity table and updates the entity
    within Google SecOps.


    ### Additional Notes

    - Internal IP addresses and unsupported entity types are automatically skipped
    during execution.

    - The action returns a JSON result containing the full reputation data for each
    processed IP address.
  ai_short_description: >-
    Enriches IP Address entities by retrieving reputation data and blacklist reports
    from APIVoid, marking them as suspicious if detections exceed a specified threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the APIVoid API to fetch IP reputation data
      (fetches_data=true). It does not mutate external data. It updates internal entities
      with enrichment data and creates insights if configured.
