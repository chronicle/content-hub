Get Screenshot:
  ai_description: >-
    ### General Description

    Captures a high-quality screenshot of a specified URL using the APIVoid service.
    This action allows analysts to visually verify the content of a URL, which is
    useful for investigating phishing attempts or suspicious web content. The action
    retrieves the screenshot, validates its size, and attaches it directly to the
    entity within the SOAR platform.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Root, API Key, and
    SSL verification settings from the integration configuration.

    2. **Entity Processing**: The action iterates through all target entities, filtering
    specifically for those of type `URL`.

    3. **URL Preparation**: If the URL is missing a scheme, the action prepends `http://`
    to ensure a valid request.

    4. **API Interaction**: The action calls the `APIVoidManager.get_url_screenshot`
    method to request a screenshot from the APIVoid service.

    5. **Validation**: The action checks if the returned screenshot file size is within
    the 3MB limit.

    6. **Attachment & Update**: If valid, the screenshot is added as an attachment
    to the entity using `siemplify.result.add_attachment`, and the entity is updated
    using `siemplify.update_entities`.

    7. **Result Reporting**: The action returns a JSON result containing the MD5 hash
    of the screenshot file and updates the execution status.


    ### Additional Notes

    - The action requires a valid APIVoid API key.

    - Screenshots larger than 3MB are rejected and not attached to the entity.

    - Only URL entities are supported.
  ai_short_description: >-
    Captures a screenshot of a URL using the APIVoid service and attaches the image
    to the entity for visual analysis.
