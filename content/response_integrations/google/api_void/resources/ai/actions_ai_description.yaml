  ai_description: >-
    Captures a high-quality screenshot of a specified website or URL using APIVoid.


    ### General Description

    This action interacts with the APIVoid service to capture a screenshot of a given
    URL entity. It retrieves the screenshot image and attaches it to the case, while
    also providing the MD5 hash of the image in the JSON results.


    ### Flow Description

    1. The action initializes the connection to the APIVoid service using the provided
    API root and API key.

    2. It iterates over the target URL entities.

    3. For each URL, it verifies the format and prepends 'http://' if the scheme is
    missing.

    4. It requests a screenshot of the URL from APIVoid.

    5. If the screenshot size is under 3MB, it attaches the image to the case and
    records its MD5 hash.

    6. The action updates the successful entities and returns the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | False | A threshold value extracted by the action but
    not actively used in the screenshot capture logic. Default is 0. |


    ### Additional Notes

    - Screenshots larger than 3MB will not be attached to the case.

    - The action only processes entities of type URL.
