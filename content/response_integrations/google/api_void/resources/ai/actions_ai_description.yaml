  ai_description: >-
    ### General Description

    Enriches IP Address entities using APIVoid to detect potentially malicious IP
    addresses commonly used for spam, to attack websites, or to commit fraudulent
    activities. The action retrieves threat intelligence, evaluates risk based on
    thresholds, updates the entity's suspicious status, and generates an insight with
    the analysis results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | String | False | IP risk threshold. The threshold must be a numeric
    value (e.g., 3). If the number of detections exceeds this threshold, the entity
    is marked as suspicious. |

    | Create Insights | Boolean | True | Specify whether the action should create
    insights or not. |


    ### Flow Description

    1. Iterates over the target entities and filters for external ADDRESS entities.

    2. Fetches IP reputation data from APIVoid for each valid entity.

    3. If configured, creates an insight containing the country code.

    4. Enriches the entity with the retrieved reputation data and adds a blacklist
    report as an entity table if available.

    5. Evaluates the number of detections against the provided threshold and marks
    the entity as suspicious if the threshold is exceeded.

    6. Updates the entities in the SecOps platform and returns the JSON results.
