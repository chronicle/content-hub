name: Get Ip Reputation
description: Detect potentially malicious IP addresses commonly used for spam, to
    attack websites or to commit fraudulent activities
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/apivoid#get_ip_reputation
integration_identifier: APIVoid
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: IP risk threshold. The threshold must be a numeric value. e.g. 3
    is_mandatory: true
-   name: Create Insights
    default_value: true
    type: boolean
    description: Specify whether the action should create insights or not.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_ip_reputation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
script_result_name: success
