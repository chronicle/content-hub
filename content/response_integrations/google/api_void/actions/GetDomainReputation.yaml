name: Get domain reputation
description: Check if a domain is blacklisted by popular and trusted domain blacklist
    services.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/apivoid#get_domain_reputation
integration_identifier: APIVoid
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: Domain risk threshold. The threshold must be a numeric value. e.g.
        3
    is_mandatory: true
-   name: Create Insights
    default_value: true
    type: boolean
    description: Specify whether the action should create insights or not.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_domain_reputation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL"]}'
script_result_name: success
