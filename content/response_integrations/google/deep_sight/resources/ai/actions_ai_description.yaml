    4. Flattens the returned JSON data and appends it to the entity's `additional_properties`.

    5. Marks the entity as enriched (`is_enriched = True`) and updates the entity
    in the platform.

    6. Attaches the raw JSON results and a CSV table of the flattened data to the
    action's output.


    ### Additional Notes

    If an error occurs while scanning a specific URL, the action logs the error and
    continues processing the remaining entities.
