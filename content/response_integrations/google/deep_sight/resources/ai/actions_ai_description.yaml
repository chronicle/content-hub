Scan URL:
  ai_description: >-
    ### General Description

    Scans a URL using the DeepSight service to retrieve threat intelligence and reputation
    data. This action is designed to provide analysts with context regarding potentially
    malicious URLs found within an investigation.


    ### Flow Description

    1. The action retrieves the DeepSight integration configuration, including the
    API key and SSL settings.

    2. It iterates through the `target_entities` provided in the SOAR case.

    3. The action filters the entities to process only those with the type `URL`.

    4. For each valid URL entity, the action calls the DeepSight API (`GET /urls/{url}`)
    to fetch reputation and threat intelligence data.

    5. The retrieved data is flattened and added to the entity's `additional_properties`
    dictionary.

    6. The entity is marked as enriched (`is_enriched = True`).

    7. The action updates the entities within the SOAR platform using `siemplify.update_entities`.

    8. Finally, the action adds the raw JSON results and a formatted entity table
    to the action results.


    ### Additional Notes

    This action performs enrichment and does not modify any external systems. It relies
    on the DeepSight integration configuration for authentication.
