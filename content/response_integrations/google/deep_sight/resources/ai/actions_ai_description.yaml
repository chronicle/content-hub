Scan Domain:
  ai_description: >-
    ### General Description

    Enriches User, Hostname, and URL entities by scanning their associated domains
    using the DeepSight threat intelligence service. This action retrieves threat
    intelligence for domains and updates the target entities with the gathered information.


    ### Flow Description

    1. Initialize `DeepSightManager` with the provided API key and SSL configuration.

    2. Iterate through the target entities.

    3. For `USER` entities, extract the domain using `get_domain` or `get_domain_from_entity`.

    4. For `HOSTNAME` or `URL` entities, extract the domain using `get_domain_from_entity`.

    5. If a domain is successfully extracted, call `deepsight_manager.scan_domain(domain)`
    to retrieve threat intelligence.

    6. If scan results are returned, update the entity's `additional_properties` with
    the results (prefixed with "DeepSight") and mark the entity as enriched.

    7. Add the scan results as a table to the entity and as a JSON result to the action
    output.

    8. Update the entities in the SOAR platform.


    ### Additional Notes

    Requires a valid DeepSight API key.
