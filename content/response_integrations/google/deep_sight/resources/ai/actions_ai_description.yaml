Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DeepSight API to verify that the integration is correctly
    configured and communicating with the external service. This action performs a
    sample API request to ensure authentication and network reachability are functional.


    ### Flow Description

    1. Retrieves the integration configuration, specifically the `ApiKey` and `Use
    SSL` settings, from the DeepSight integration settings.

    2. Initializes the `DeepSightManager` with the retrieved credentials and SSL configuration.

    3. Executes the `test_connectivity` method, which triggers a GET request to the
    DeepSight API using a hardcoded test IP address (8.8.8.8).

    4. Validates the API response to confirm successful communication.

    5. Terminates the action with a success message if the connectivity test passes.


    ### Additional Notes

    This action is intended for administrative verification of the integration setup.
    It does not process any entities from the case and does not perform any data enrichment
    or state changes.
