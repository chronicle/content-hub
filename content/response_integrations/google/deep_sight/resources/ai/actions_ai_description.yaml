Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec DeepSight API to ensure the integration is
    configured correctly and can communicate with the service.


    ### Flow Description

    1. Retrieves the API key and SSL settings from the integration configuration.

    2. Initializes the DeepSightManager.

    3. Executes a test connectivity request by querying the DeepSight API for a test
    IP address (8.8.8.8) via an HTTP GET request.

    4. Returns a success message if the connection is established and the API responds
    successfully.


    ### Additional Notes

    This action does not require any input parameters and does not operate on any
    entities. It is solely used for diagnostic purposes.
