Scan Domain:
  ai_description: >-
    ### General Description

    Enriches User, Hostname, and URL entities by extracting their associated domains
    and scanning them using Symantec DeepSight to retrieve threat intelligence data.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Checks if the entity is of type User, Hostname, or URL.

    3. Extracts the domain from the entity's identifier using utility functions.

    4. Makes a GET request to the Symantec DeepSight API (`/v1/domains/{domain}`)
    to scan the extracted domain.

    5. If data is successfully retrieved, it flattens the JSON response, adds it to
    the entity's `additional_properties`, and marks the entity as enriched.

    6. Attaches the results as an entity table and a JSON result to the action.

    7. Updates the entities in the Google SecOps platform with the new enrichment
    data.


    ### Additional Notes

    This action relies on the integration-level API key and SSL settings to communicate
    with the DeepSight API. Entities that do not yield a valid domain or encounter
    an error during the scan are skipped.
