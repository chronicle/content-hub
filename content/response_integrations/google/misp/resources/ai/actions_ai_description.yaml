Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (URL, Hostname, File Hash, IP Address, Domain, User) by querying
    the MISP platform for associated threat intelligence. This action retrieves event
    and attribute data from MISP to provide context, optionally generates insights,
    and marks entities as suspicious based on threat level thresholds.


    ### Flow Description

    1. Initialize the MISP connection using the provided configuration (API Root,
    API Key, SSL settings).

    2. Extract action parameters: Number of attributes to return, Filtering condition,
    Create Insights, and Threat Level Threshold.

    3. Filter `target_entities` to include only supported types (URL, Hostname, File
    Hash, Address, Domain, User).

    4. For each entity, query MISP for attributes matching the entity identifier.

    5. Sort attributes by timestamp and select the main attribute based on the filtering
    condition (First/Last).

    6. Retrieve the associated event from MISP.

    7. Update the entity's `additional_properties` with event and attribute data.

    8. Optionally add an entity insight if `Create Insights` is enabled.

    9. Add an entity table to the case wall with attribute details.

    10. If the event's threat level matches or exceeds the threshold, mark the entity
    as suspicious.

    11. Update the entity in the SOAR platform.


    ### Additional Notes

    The action supports filtering attributes by category and limits the number of
    attributes returned. It handles execution timeouts and logs the status of each
    entity processed.
