    add attributes. |

    | Category | String | No | Specify the category for attributes. Possible values:
    Targeting data, Payload delivery, Artifacts dropped, Payload installation, Persistence
    mechanism, Network activity, Attribution, External analysis, Social network. |

    | Distribution | String | No | Specify the distribution of the attribute. Possible
    values: 0 - Organisation, 1 - Community, 2 - Connected, 3 - All, 5 - Inherit.
    You can either provide a number or a string. |

    | For Intrusion Detection System | Boolean | Yes | If enabled, attribute will
    be labeled as eligible to create an IDS signature out of it. |

    | Comment | String | No | Specify comment related to attribute. |

    | Fallback IP Type | DDL | No | Specify what should be the fallback attribute
    type for the IP address entity. |

    | Fallback Email Type | DDL | No | Specify what should be the fallback attribute
    type for the email address entity. |

