    URL entity. |
Add Sighting to an Attribute:
  ai_description: >-
    ### General Description

    Adds a sighting (e.g., Sighting, False Positive, or Expiration) to specified attributes
    in MISP. This action allows analysts to record sightings for indicators, helping
    to track their prevalence and status within the MISP platform.


    ### Flow Description

    1. Extracts configuration parameters (API root, API token, SSL settings) and action
    parameters (Event ID, Category, Type, Sightings Type, Source, Date Time, Object
    UUID, Attribute Search, Attribute UUIDs, Attribute Names).

    2. Validates the provided parameters, ensuring required fields are present and
    categories are valid.

    3. Initializes the `MISPManager` to establish a connection with the MISP instance.

    4. If "Provided Event" is selected for the attribute search, it verifies the existence
    of the event using the provided Event ID.

    5. Searches for the target attributes in MISP based on the provided criteria (Event
    ID, Object UUID, Attribute UUIDs, or Attribute Names).

    6. Iterates through the identified attributes and adds the specified sighting
    type to each attribute using the `add_sighting` API endpoint.

    7. Returns the result of the operation, including a list of attributes for which
    the sighting was successfully added and those for which it failed, and adds the
    sighting details to the action result.


    ### Additional Notes

    If both "Attribute Name" and "Attribute UUID" are specified, the action will prioritize
    the "Attribute UUID" values. The action supports searching for attributes within
    a specific event or across all events in MISP.
