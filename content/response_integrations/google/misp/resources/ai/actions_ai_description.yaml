Add Attribute:
  ai_description: >-
    ### General Description

    Adds attributes (IOCs) to a specified event in the MISP platform. This action
    allows analysts to enrich MISP events with indicators extracted from entities
    within a Google SecOps case or alert.


    ### Flow Description

    1. Extracts configuration parameters (API root, token, SSL settings) from the
    integration configuration.

    2. Extracts action parameters (Event ID, Category, Distribution, etc.) provided
    by the user.

    3. Filters `target_entities` to include only supported types (Hostname, URL, File
    Hash, IP Address, User, Filename, Email Message, Threat Campaign, Threat Actor,
    Phone Number).

    4. Determines the appropriate MISP attribute type for each entity based on its
    type and context (e.g., source/destination IP, domain extraction).

    5. Calls the MISP API (`add_attribute`) to add the entity as an attribute to the
    specified event.

    6. Returns the result of the operation, including successful and failed entities,
    and adds the result to the action output.


    ### Additional Notes

    Supports both Alert and Case execution scopes. If the action is running in a Case
    scope, it processes all alerts within the case.
  ai_short_description: >-
    Adds attributes (IOCs) to a specified event in the MISP platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds attributes (IOCs) to a specified event in the MISP platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to add an attribute to a MISP event (can_mutate_external_data=true).
      It does not fetch context data or update internal entities.
