    URL entity. |
Add Sighting to an Attribute:
  ai_description: >-
    ### General Description

    Adds a sighting (such as Sighting, False Positive, or Expiration) to specific
    attributes in MISP based on provided search criteria. The action allows users
    to target attributes by Event ID, Object UUID, Attribute UUID, Attribute Name,
    Category, and Type.


    ### Flow Description

    1. Extracts and validates action parameters, ensuring required dependencies (like
    Event ID when searching within a provided event) are met.

    2. Parses the provided Date Time parameter into ISO format, if specified.

    3. Fetches the target attributes from MISP using the provided search criteria
    via the MISP API.

    4. Iterates through the retrieved attributes and makes an API call to add the
    specified sighting type to each attribute.

    5. Returns the JSON results of the added sightings and outputs a summary message
    indicating successful and failed operations.


    ### Additional Notes

    If both "Attribute Name" and "Attribute UUID" are specified, the action will prioritize
    and work with the "Attribute UUID" values. Categories must match acceptable MISP
    category types (e.g., External Analysis, Payload Delivery).
