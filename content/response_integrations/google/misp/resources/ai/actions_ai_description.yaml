Download File:
  ai_description: >-
    ### General Description

    Downloads files or samples associated with a specific MISP event. This action
    retrieves files from a MISP instance and either saves them to a specified local
    directory or attaches them directly to the SOAR case wall.


    ### Flow Description

    1. Extracts integration configuration (API credentials) and action parameters
    (Event ID, Download Folder Path, Overwrite).

    2. Initializes the `MISPManager` to connect to the MISP instance.

    3. Retrieves the event details using the provided Event ID or UUID via `misp_manager.get_event_by_id_or_raise`.

    4. Downloads samples associated with the event using `misp_manager.download_sample`.

    5. If a `Download Folder Path` is provided, saves the files to the specified local
    directory using `save_attachment` (optionally overwriting existing files).

    6. If no path is provided, attaches the files directly to the SOAR case wall using
    `siemplify.result.add_attachment`.

    7. Returns the result, including absolute paths if saved locally or success status.


    ### Additional Notes

    Requires valid MISP API credentials. Files larger than 3MB may fail to attach
    to the case wall.
