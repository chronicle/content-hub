    ### General Description

    Retrieves related events for entities (URL, Hostname, FileHash, Address) from
    MISP. This action queries the MISP platform to find associated threat intelligence
    events and provides them as a table within the entity's context. Optionally, it
    can mark the entity as suspicious if related events are found.


