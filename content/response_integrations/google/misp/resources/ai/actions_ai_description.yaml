Add Tag to an Event:
  ai_description: >-
    ### General Description

    This action adds one or more specified tags to an existing event in MISP. It interacts
    with the MISP API to verify the event and the tags, and then attaches the valid
    tags to the target event.


    ### Flow Description

    1. Retrieves the `Event ID` and `Tag Name` from the action parameters.

    2. Queries the MISP API to verify the existence of the specified event.

    3. Queries the MISP API to find the IDs of the provided tag names.

    4. Iterates through the valid tags and makes a POST request to the MISP API (`/events/addTag/`)
    to attach each tag to the event.

    5. Returns a JSON result containing the API responses and a summary message detailing
    successfully added tags and any tags that were not found.


    ### Additional Notes

    The action accepts either an ID or a UUID for the event. Multiple tags can be
    provided as a comma-separated list. If a provided tag does not exist in MISP,
    it will be skipped and noted in the output message.
