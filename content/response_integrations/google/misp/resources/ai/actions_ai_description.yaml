    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `SUITABLE_ENTITY_TYPES` (HOSTNAME, URL, FILEHASH, ADDRESS, USER, FILENAME, EMAILMESSAGE,
      THREATCAMPAIGN, THREATACTOR, PHONENUMBER). This means it targets these specific
      entity types, filtering by entity_type.
  outcome_categories:
