Add Attribute:
  ai_description: >-
    ### General Description

    Adds attributes to a specified event in MISP based on the target entities. Supported
    entity types include Hostname, URL, FileHash, Address, User, FileName, EmailMessage,
    ThreatCampaign, ThreatActor, and PhoneNumber.


    ### Flow Description

    1. Retrieves the specified Event ID from MISP.

    2. Iterates over the target entities and filters them by supported entity types.

    3. Determines the appropriate MISP attribute type for each entity (e.g., mapping
    IP addresses to source or destination based on alert relations).

    4. Makes a POST request to the MISP API (`/attributes/add/{event_id}`) to add
    each entity as an attribute to the event.

    5. Returns the JSON results of the created attributes.


    ### Additional Notes

    The action can extract domains from URL entities if configured. It also uses fallback
    types for IP and Email entities if their direction (source/destination) cannot
    be determined from alert relations.
  ai_short_description: >-
    Adds attributes to a specified event in MISP based on the target entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds new attributes to a specified event in MISP based on the provided entities.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the MISP API to add attributes to an event,
      which mutates external data. It does not fetch contextual enrichment data, mutate
      internal data, update entities, create insights, modify alert data, or create
      case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
