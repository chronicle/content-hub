    \ If both \u201CAttribute Name\u201C and \u201CAttribute UUID\u201C are specified,\
    \ action will work with \u201CAttribute UUID\u201C values. |\n| Event ID | String\
    \ | No | Specify the ID or UUID of the event, where to seach for attributes. This\
    \ parameter is required, if \u201CAttribute Search\u201C is set to \u201CProvided\
    \ Event\u201C. |\n| Category | String | No | Specify a comma-separated list of\
    \ categories. If specified, action will only unset IDS flag for attributes that\
    \ have matching category. If nothing is specified, action will ignore categories\
    \ in attributes. Possible values: External Analysis, Payload Delivery, Artifacts\
    \ Dropped, Payload Installation. |\n| Type | String | No | Specify a comma-separated\
    \ list of attribute types. If specified, action will only unset IDS flag for attributes\
    \ that have matching attribute type. If nothing is specified, action will ignore\
    \ types in attributes. Example values: md5, sha1, ip-src, ip-dst |\n| Attribute\
    \ Search | Dropdown | No | Specify, where action should search for attributes.\
    \ If \u201CProvided Event\u201C is selected, action will only search for attributes\
    \ or attribute UUIDs in event with ID/UUID provided in \u201CEvent ID\u201C parameter.\
    \ If \u201CAll Events\u201C, action will search for attributes among all events\
    \ and unset IDS flag for all attributes that match our criteria. |\n| Attribute\
    \ UUID | String | No | Specify a comma-separated list of attribute UUIDs for which\
    \ you want to unset an IDS flag. Note: If both \u201CAttribute Name\u201C and\
    \ \u201CAttribute UUID\u201C are specified, action will work with \u201CAttribute\
    \ UUID\u201C values. |"
Upload File:
  ai_description: >-
    ### General Description

    Uploads one or more files to a specific event in MISP.


    ### Flow Description

    1. Extracts the event ID, file paths, and other configuration parameters.

    2. Validates the provided file paths to ensure the files exist locally.

    3. Retrieves the target event from MISP to verify its existence.

    4. Iterates through the file paths, reads the file contents, and makes a POST
    request to the MISP API to upload each file to the event.

    5. Retrieves the updated event details and returns them as JSON.


    ### Additional Notes

    The action requires the files to be accessible locally on the environment where
    the script runs.
