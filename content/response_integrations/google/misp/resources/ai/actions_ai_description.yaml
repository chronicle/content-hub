Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities based on attributes found in MISP. This action retrieves threat
    intelligence data, including attributes and associated events, to provide context
    for supported entities. It can also evaluate the threat level of the associated
    event to automatically mark entities as suspicious.


    ### Flow Description

    1. Iterates over supported entities (URL, Hostname, FileHash, Address, Domain,
    User).

    2. Queries MISP to retrieve attributes matching the entity's identifier.

    3. Sorts the retrieved attributes by timestamp and selects either the oldest or
    newest attribute based on the `Filtering condition` parameter.

    4. Retrieves the associated event details for the selected attribute from MISP.

    5. Enriches the entity's additional properties with the event and attribute data.

    6. If the `Create Insights` parameter is enabled, generates an insight for the
    entity containing the attribute comment.

    7. Evaluates the event's threat level against the `Threat Level Threshold` parameter;
    if the threat level meets or exceeds the threshold, the entity is marked as suspicious.

    8. Updates the entities in the platform and returns the JSON results.


    ### Additional Notes

    - The action supports limiting the number of attributes returned in the JSON result
    via the `Number of attributes to return` parameter.

    - A case wall table is generated for each successfully processed entity containing
    the attribute details.
