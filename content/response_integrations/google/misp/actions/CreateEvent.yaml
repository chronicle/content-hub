name: Create Event
description: Create a new event in MISP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#create_event
integration_identifier: MISP
parameters:
-   name: Event Name
    default_value: ''
    type: string
    description: Specify the name for the new event.
    is_mandatory: true
-   name: Distribution
    default_value: Community
    type: string
    description: 'Specify the distribution of the event. Possible values: 0 - Organisation,
        1 - Community, 2 - Connected, 3 - All. You can either provide a number or
        a string.'
    is_mandatory: false
-   name: Threat Level
    default_value: High
    type: string
    description: 'Specify the threat level of the event. Possible values: 1 - High,
        2 - Medium, 3 - Low, 4 - Undefined. You can either provide a number or a string.'
    is_mandatory: false
-   name: Analysis
    default_value: Initial
    type: string
    description: 'Specify the analysis of the event. Possible values: 0 - Initial,
        1 - Ongoing, 2 - Completed. You can either provide a number or a string.'
    is_mandatory: false
-   name: Publish
    default_value: false
    type: boolean
    description: If enabled, action will publish the event to the community.
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: Specify additional comments related to the event.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_event_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: event_id
