name: Get Related Events
description: Retrieve information about events that are related to entities in MISP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#get_related_events
integration_identifier: MISP
parameters:
-   name: Events Limit
    default_value: ''
    type: string
    description: Specify max amount of events to fetch. If not specified, all events
        will be fetched.
    is_mandatory: false
-   name: Mark As Suspicious
    default_value: true
    type: boolean
    description: If enabled, action will mark entity as suspicious, if there is at
        least one related event to it.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_related_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "FILEHASH", "ADDRESS"]}'
script_result_name: success
