name: Create File Misp Object
description: 'Create a File Object in MISP. Requires one of: FILENAME, MD5, SHA1,
    SHA256, SSDEEP to be provided or “Use Entities“ parameter set to true.'
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event for which you want to add file
        objects.
    is_mandatory: true
-   name: FILENAME
    default_value: ''
    type: string
    description: Specify the name of the file, which you want to add to the event.
    is_mandatory: false
-   name: MD5
    default_value: ''
    type: string
    description: Specify the md5 of the file, which you want to add to the event.
    is_mandatory: false
-   name: SHA1
    default_value: ''
    type: string
    description: Specify the sha1 of the file, which you want to add to the event.
    is_mandatory: false
-   name: SHA256
    default_value: ''
    type: string
    description: Specify the sha256 of the file, which you want to add to the event.
    is_mandatory: false
-   name: SSDEEP
    default_value: ''
    type: string
    description: 'Specify the ssdeep of the file, which you want to add to the event.
        Format: size:hash:hash'
    is_mandatory: false
-   name: Use Entities
    default_value: false
    type: boolean
    description: 'If enabled, action will use entities in order to create objects.
        Supported entities: File name and hash. “Use Entities“ has priority over other
        parameters.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_file_object_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
