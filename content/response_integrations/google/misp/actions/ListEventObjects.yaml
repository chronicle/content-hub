name: List Event Objects
description: Retrieve information about available objects in MISP event.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#list_event_objects
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify a comma-separated list of IDs and UUIDs of the events, for
        which you want to retrieve details.
    is_mandatory: true
-   name: Max Objects to Return
    default_value: '50'
    type: string
    description: Specify how many objects to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_event_objects_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: success
