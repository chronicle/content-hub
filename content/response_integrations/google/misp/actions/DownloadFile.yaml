name: Download File
description: Download files related to event in MISP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#download_file
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event from which you want to download
        files
    is_mandatory: false
-   name: Download Folder Path
    default_value: ''
    type: string
    description: 'Specify the absolute path to the folder, which should store files.
        If nothing is specified, action will create an attachment instead. Note: JSON
        result is only available, when you provide proper value for this parameter.'
    is_mandatory: false
-   name: Overwrite
    default_value: false
    type: boolean
    description: If enabled, action will overwrite existing files.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/download_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: success
