name: Publish Event
description: The action allows the user to publish an event. Publishing an event shares
    it to the sharing group selected, making it visible to all members.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#publish_event
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event that you want to publish.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/publish_event_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
