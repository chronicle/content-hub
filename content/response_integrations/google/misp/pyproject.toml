[project]
name = "MISP"
version = "39.0"
description = "MISP is an open source software solution for collecting, storing, distributing and sharing cyber security indicators and threat about cyber security incidents"
requires-python = ">=3.11,<3.12"
dependencies = [ "arrow>=1.4.0", "environmentcommon", "requests==2.32.4", "tipcommon", "tldextract==5.1.2",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.1-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
