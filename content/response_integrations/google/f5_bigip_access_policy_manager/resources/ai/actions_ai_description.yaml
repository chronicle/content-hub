Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the F5 BIG-IP Access Policy Manager using the provided integration
    configuration parameters. This action ensures that the integration is properly
    configured and can successfully communicate with the F5 BIG-IP API.


    ### Flow Description

    1. Extracts integration configuration parameters including the API Root, Username,
    Password, Token Timeout, and Verify SSL settings.

    2. Initializes the F5 BIG-IP Access Policy Manager client.

    3. Authenticates to the F5 BIG-IP platform, generating a new access token or retrieving
    an existing one from the local cache.

    4. Makes a GET request to the `/mgmt/shared/authz/tokens` endpoint to verify connectivity.

    5. Returns a success message if the connection is established, or an error message
    if the connection fails.


    ### Additional Notes

    This action does not require any specific entities or action-level parameters
    to run. It is primarily used for troubleshooting and verifying integration setup.
