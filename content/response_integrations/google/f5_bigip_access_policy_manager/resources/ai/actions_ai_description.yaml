List Active Sessions:
  ai_description: >-
    ### General Description

    Lists all currently active sessions from the F5 BIG-IP Access Policy Manager (APM).
    This action retrieves session details, including session IDs, client IP addresses,
    and user information, allowing analysts to monitor active connections through
    the F5 platform.


    ### Flow Description

    1. The action extracts configuration parameters, including the F5 BIG-IP API address,
    credentials, and SSL verification settings.

    2. It initializes the `F5BIGIPAccessPolicyManagerManager` to handle authentication
    and API communication.

    3. The action executes a GET request to the F5 BIG-IP API endpoint (`/mgmt/tm/apm/access-info`)
    with an optional `Limit` parameter to restrict the number of returned sessions.

    4. The API response is parsed into `ActiveSessionObject` instances.

    5. The retrieved session data is added to the action results as a JSON object.


    ### Additional Notes

    This action is a read-only operation and does not modify the state of the F5 BIG-IP
    system or the SOAR case data.
