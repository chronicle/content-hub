Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the F5 BIG-IP Access Policy Manager. This action verifies
    that the provided credentials and API endpoint are valid and that the SOAR platform
    can successfully communicate with the F5 BIG-IP server.


    ### Flow Description

    1. The action extracts the required configuration parameters: `BIG-IP APM Address`,
    `User Name`, `Password`, `Token Timeout (in Seconds)`, and `Verify SSL`.

    2. It initializes the `F5BIGIPAccessPolicyManagerManager` with these parameters.

    3. The manager attempts to authenticate by checking for an existing token or generating
    a new one via a POST request to the login endpoint (`/mgmt/shared/authn/login`).

    4. Upon successful authentication, the manager performs a GET request to the ping
    endpoint (`/mgmt/shared/authz/tokens`) to verify connectivity.

    5. The action returns a success or failure status based on the API response.


    ### Additional Notes

    This action does not perform any operations on entities or alerts; it is strictly
    for verifying the integration configuration and connectivity.
