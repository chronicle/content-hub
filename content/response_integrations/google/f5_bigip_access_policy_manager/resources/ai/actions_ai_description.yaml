Disconnect Sessions:
  ai_description: >-
    ### General Description

    Disconnects specified active sessions from the F5 BIG-IP instance. The action
    can operate on provided parameters or dynamically extract target information from
    case entities (Address and User) to identify which sessions to terminate.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Determines the target sessions based on either the provided action parameters
    (Session IDs, Logon User Names, Client IPs) or the case entities (Address and
    User) if the 'Use Case Entities' parameter is enabled.

    3. Makes a GET request to retrieve a list of all active sessions from the F5 BIG-IP
    instance.

    4. Matches the target IPs, Usernames, and Session IDs against the retrieved active
    sessions.

    5. Sends a DELETE request to the F5 BIG-IP API to disconnect the matched sessions.

    6. Verifies the disconnection by re-fetching the active sessions and checking
    if the targeted sessions were successfully removed.

    7. Returns a summary message detailing the successful disconnections, failed attempts,
    and any targets not found.


    ### Additional Notes

    Filters are applied using OR logic, meaning any session matching at least one
    of the provided parameters or entities will be disconnected.
  ai_short_description: >-
    Disconnects specified active sessions from the F5 BIG-IP instance based on provided
    parameters or case entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Disconnects active sessions on the F5 BIG-IP instance.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches active sessions from the F5 BIG-IP instance (fetches_data=true)
      and then sends a DELETE request to disconnect specific sessions (can_mutate_external_data=true).
      It does not mutate internal SecOps data, update entities, or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
