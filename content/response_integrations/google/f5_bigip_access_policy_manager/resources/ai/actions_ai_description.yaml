  ai_description: >-
    Lists all currently active sessions in the F5 BIG-IP Access Policy Manager.


    ### General Description

    This action connects to the F5 BIG-IP Access Policy Manager to retrieve a list
    of all currently active sessions. It returns the session details in JSON format,
    which can be used for further analysis or auditing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Limit | String | False | Specify the maximum number of entries you would like
    to get in the action. Defaults to 0 (no limit). |


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the F5 BIG-IP Access Policy Manager client.

    3. Fetches the list of active sessions up to the specified limit.

    4. Returns the session details as a JSON result.
