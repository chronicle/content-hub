Disconnect Sessions:
  ai_description: "### General Description\nThis action disconnects active sessions\
    \ from an F5 BIG-IP Access Policy Manager (APM) instance. It allows security analysts\
    \ to terminate sessions based on specific Session IDs, Logon User Names, or Client\
    \ IP addresses. The action can operate either by processing entities directly\
    \ from the case (Address and User types) or by using manually provided input parameters.\n\
    \n### Flow Description\n1. **Configuration Extraction**: The action retrieves\
    \ necessary connection details (API root, credentials, SSL verification settings)\
    \ from the integration configuration.\n2. **Input Processing**: \n   - If `Use\
    \ Case Entities` is enabled, the action iterates through the case's `target_entities`,\
    \ filtering for `ADDRESS` and `USER` types to build a list of targets.\n   - If\
    \ `Use Case Entities` is disabled, the action parses the provided `Session IDs`,\
    \ `Logon User Names`, and `Client IPs` parameters.\n3. **Session Retrieval**:\
    \ The action calls the F5 BIG-IP API (`GET /mgmt/tm/apm/access-info`) to fetch\
    \ all currently active sessions.\n4. **Matching**: The action compares the target\
    \ identifiers (IPs, Usernames, Session IDs) against the retrieved active sessions\
    \ to identify the corresponding `active_session_id`s.\n5. **Disconnection**: For\
    \ each matched session, the action executes a DELETE request (`DELETE /mgmt/tm/apm/session/{session_id}`)\
    \ to terminate the session.\n6. **Verification**: The action performs a final\
    \ check by retrieving the active sessions list again to confirm which sessions\
    \ were successfully disconnected.\n7. **Reporting**: The action returns a summary\
    \ message detailing successful disconnections, failed attempts, and any provided\
    \ inputs that were not found in the active sessions list.\n\n### Additional Notes\n\
    - The action uses an OR logic for matching; if a session matches any of the provided\
    \ inputs (IP, User, or Session ID), it will be disconnected.\n- The action requires\
    \ valid F5 BIG-IP credentials and connectivity to the APM API."
  ai_short_description: >-
    Disconnects active user sessions from an F5 BIG-IP Access Policy Manager instance
    based on Session IDs, User Names, or Client IPs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Terminates active user sessions on the F5 BIG-IP device.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches active session data from the F5 BIG-IP API (fetches_data=true)
      and performs a DELETE request to disconnect sessions (can_mutate_external_data=true).
      It does not modify internal SecOps data or entities.
