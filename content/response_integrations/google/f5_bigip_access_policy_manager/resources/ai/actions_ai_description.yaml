  ai_description: >-
    ### General Description

    The Disconnect Sessions action disconnects specified active sessions from the
    F5 BIG-IP instance. It can operate either on entities (Address and User) associated
    with the case or on manually provided parameters (Session IDs, Logon User Names,
    Client IPs).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Use Case Entities | Boolean | No | Specify whether the action should disconnect
    sessions using Address and User entities found in the case, or work on the provided
    parameters only. If checked, the action will ignore all other parameters. |

    | Session IDs | String | No | Specify specific session IDs you would like to disconnect,
    in a comma-separated list. |

    | Logon User Names | String | No | Specify Logon User Names you would like to
    disconnect sessions for, in a comma-separated list. |

    | Client IPs | String | No | Specify Client IPs you would like to disconnect the
    sessions for, in a comma-separated list. |


    ### Additional Notes

    Either `Use Case Entities` must be set to True, or at least one of the other parameters
    (`Session IDs`, `Logon User Names`, `Client IPs`) must be provided for the action
    to have targets to disconnect.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. If `Use Case Entities` is enabled, extracts `ADDRESS` and `USER` entities from
    the case. Otherwise, parses the provided manual parameters.

    3. Fetches all active sessions from the F5 BIG-IP instance.

    4. Matches the active sessions against the provided entities or parameters.

    5. Sends a request to disconnect the matched sessions.

    6. Verifies the disconnection by fetching the active sessions again and checking
    if the disconnected sessions are still present.

    7. Returns a summary message detailing successful disconnections, failed disconnections,
    and targets not found.
