    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Use Case Entities | Boolean | No | Specify whether the action should disconnect
    sessions using Address and Client IP entities found in the case, or work on the
    provided parameters only. NOTE - once checked, action will ignore all other parameters
    in the action |

    | Session IDs | String | No | Specify specific session IDs you would like to disconnect,
    in a comma separated list |

    | Logon User Names | String | No | Specify Logon User Names you would like to
    disconnect sessions for, in a comma separated list, so only sessions for these
    Logon User Names will be disconnected. |

    | Client IPs | String | No | Specify Client IPs you would like to disconnect the
    sessions for,in a comma separated list, so only sessions for these Client IPs
    will be disconnected. |
List Active Sessions:
  ai_description: >-
    ### General Description

    This action lists all currently active sessions in the F5 BIG-IP Access Policy
    Manager. It retrieves the session details and outputs them as a JSON result for
    further use in the playbook.


    ### Flow Description

    1. Extracts the `Limit` parameter to determine the maximum number of sessions
    to retrieve.

    2. Initializes the F5 BIG-IP Access Policy Manager API client using the provided
    integration configuration.

    3. Makes an HTTP GET request to the `/mgmt/tm/apm/access-info` endpoint to fetch
    the active sessions.

    4. Parses the retrieved data and appends the session details to the action's JSON
    result.


    ### Additional Notes

    - If no active sessions are found, the action will complete successfully but indicate
    that no sessions were found in the output message.
