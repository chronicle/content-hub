  ai_description: >-
    ### General Description

    Tests connectivity to the F5 BIG-IP Access Policy Manager using the parameters
    provided at the integration configuration page. This action is used to verify
    that the integration is properly configured and can successfully communicate with
    the F5 BIG-IP API.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Token Timeout, Verify SSL).

    2. Initializes the F5 BIG-IP Access Policy Manager and attempts to authenticate.

    3. Performs a test API call to verify connectivity.

    4. Returns a successful execution state if the connection is established, or a
    failed state if an error occurs.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration configuration parameters.
