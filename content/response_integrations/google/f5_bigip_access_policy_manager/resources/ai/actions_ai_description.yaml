    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` if the 'Use Case Entities'
      parameter is enabled. It filters the entities by checking `if entity.entity_type
      == EntityTypes.ADDRESS` and `if entity.entity_type == EntityTypes.USER`. Therefore,
      it targets Address and User entities and filters by entity type.
  outcome_categories:
