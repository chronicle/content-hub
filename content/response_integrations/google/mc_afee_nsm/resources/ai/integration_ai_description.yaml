product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The McAfee Network Security Platform (NSM) integration is primarily a Network
    Security tool, as it provides capabilities to manage firewall policies, block/unblock
    IP addresses, and quarantine hosts at the network level. It qualifies for the
    Network Security category because it directly interacts with network gateways
    to enforce security policies. It qualifies for the SIEM category because the 'Get
    Alert Info Data' action allows for the retrieval of alert details from the NSM,
    which is a standard SIEM function for investigating security events. It qualifies
    for the Threat Intelligence category because the 'Is IP Blocked' action provides
    enrichment by checking the current enforcement status of an IP address, which
    helps determine its reputation and state. It does not qualify for EDR as it lacks
    process-level visibility or host-based agent management. It does not qualify for
    other categories like Email Security, IAM, Cloud Security, ITSM, Vulnerability
    Management, Asset Inventory, or Collaboration as it lacks the specific functionality
    defined for those domains.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
