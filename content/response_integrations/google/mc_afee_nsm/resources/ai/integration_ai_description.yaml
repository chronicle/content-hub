product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The McAfeeNSM integration is a network security tool designed to manage firewall
    policies and sensor configurations. It provides capabilities to block, unblock,
    and quarantine IP addresses, which directly aligns with the Network Security category.
    The integration also includes enrichment capabilities through the 'Is IP Blocked'
    action, which provides status context for indicators, and the 'Get Alert Info
    Data' action, which retrieves alert details including malware metadata and signature
    information, supporting the Threat Intelligence category by helping to confirm
    the status of an alert. It does not perform EDR, SIEM, IAM, or other functions.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
