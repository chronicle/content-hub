  itsm: false
  network_security: true
  reasoning: >-
    The McAfee Network Security Platform (NSM) integration is primarily focused on
    network security operations. It provides actions to block and unblock IP addresses
    on the firewall/IPS and to retrieve alert information from the NSM system. These
    capabilities align directly with the Network Security category, which involves
    managing firewall/WAF rules and blocking malicious traffic at the gateway. The
    integration does not provide general SIEM log searching, EDR host-level process
    analysis, or external threat intelligence feeds, and therefore does not qualify
    for those categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
