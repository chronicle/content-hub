Block IP:
  ai_description: >-
    ### General Description

    Blocks specific IP addresses on McAfee Network Security Manager (NSM). This action
    initiates a state change on the external firewall device to prevent network traffic
    to or from the specified IP entities.


    ### Flow Description

    1. Initializes a connection to the McAfee NSM API using the provided integration
    configuration.

    2. Filters the target entities to isolate only IP addresses (`ADDRESS`).

    3. Iterates through the filtered IP addresses and checks if each IP is already
    blocked in the NSM policy.

    4. If an IP is not blocked, the action either adds it to an available Siemplify
    rule object or creates a new rule object and attaches it to the firewall policy.

    5. Deploys the updated configuration changes to the configured NSM sensors.

    6. Logs out of the NSM session and returns a summary message listing the successfully
    blocked IP addresses.


    ### Additional Notes

    This action requires a dedicated firewall policy for Siemplify and a configured
    list of sensor names to deploy the changes successfully.
  ai_short_description: >-
    Blocks specific IP addresses on McAfee Network Security Manager (NSM) by adding
    them to a firewall policy and deploying the changes to sensors.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to a blocklist rule object within a firewall policy and deploys
      the updated configuration to McAfee NSM sensors.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making POST/PUT requests to McAfee NSM to
      create/update rule objects and deploy sensor configurations. It does not fetch
      contextual enrichment data, nor does it mutate internal SecOps data like entities,
      insights, or case comments.
