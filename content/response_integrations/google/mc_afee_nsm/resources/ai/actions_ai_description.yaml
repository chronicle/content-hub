  ai_description: "### General Description\\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and the McAfee Network\
    \ Security Manager (NSM) instance. Its primary purpose is to ensure that the integration's\
    \ configuration parameters\u2014such as the API Root, credentials, and Domain\
    \ ID\u2014are correct and that the NSM service is reachable over the network.\\\
    n\\n### Parameters Description\\nThis action does not require any additional input\
    \ parameters. It relies entirely on the global integration configuration.\\n\\\
    n### Flow Description\\n1. **Configuration Retrieval**: The action fetches the\
    \ integration's configuration, including the API Root, Username, Password, and\
    \ Domain ID.\\n2. **Authentication**: It initializes the `NsmManager`, which triggers\
    \ a login request to the NSM `session` endpoint to obtain an authentication token.\\\
    n3. **Session Termination**: Immediately after a successful login, the action\
    \ calls the `logout` method to close the session on the NSM server.\\n4. **Result\
    \ Reporting**: If the login and logout sequence completes without exceptions,\
    \ the action ends with a success message: \"Connection Established.\"\\n\\n###\
    \ Additional Notes\\n* This action is strictly for connectivity testing and does\
    \ not perform any security operations or data retrieval.\\n* As per standard conventions,\
    \ this action is not classified as an enrichment action."
