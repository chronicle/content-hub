  ai_description: >-
    ### General Description

    Blocks IP Address entities in McAfee Network Security Manager (NSM). This action
    automates the process of blacklisting malicious IPs by managing firewall rule
    objects and policies within the NSM environment. It ensures that the block is
    enforced by deploying configuration changes to the relevant sensors.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    It relies on the integration's configuration (API Root, Credentials, Domain ID,
    Policy Name, and Sensor List). |


    ### Additional Notes

    - The action specifically looks for a policy defined in the integration configuration
    ('Siemplify Policy Name').

    - It manages rule objects with a prefix 'Siemplify_Block' and adheres to NSM limits
    (10 addresses per object, 10 objects per rule).

    - A 'Deploy Changes' command is issued to all sensors listed in the configuration
    to make the block effective immediately.


    ### Flow Description

    1. **Authentication**: Establishes a session with the McAfee NSM API using provided
    credentials.

    2. **Entity Filtering**: Identifies all IP Address (ADDRESS) entities provided
    in the action scope.

    3. **Block Verification**: For each IP, it queries NSM to check if the address
    is already blocked within the target policy.

    4. **Policy Modification**: If the IP is not blocked, it searches for an existing
    Siemplify rule object with available capacity. If an available object is found,
    it updates it with the new IP. If no object is available, it creates a new rule
    object and adds it to the firewall policy.

    5. **Deployment**: Triggers a configuration push to all sensors specified in the
    'Sensors Names List Comma Separated' configuration.

    6. **Cleanup**: Logs out of the NSM session and returns the execution status.
