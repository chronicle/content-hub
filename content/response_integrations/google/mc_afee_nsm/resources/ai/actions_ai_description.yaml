Block IP:
  ai_description: >-
    ### General Description

    Blocks an IP address on the McAfee Network Security Manager (NSM). This action
    prevents network traffic to or from the specified IP by updating firewall policies
    and deploying configuration changes to the relevant sensors.


    ### Flow Description

    1. Initialize the `NsmManager` using the integration configuration (API credentials,
    domain, policy name, and sensor list).

    2. Filter the target entities to identify only those of type `ADDRESS`.

    3. For each identified IP address, check if it is already blocked in the NSM by
    querying existing rule objects.

    4. If the IP is not blocked, either update an existing rule object or create a
    new rule object and add it to the configured firewall policy.

    5. Deploy the configuration changes to the specified sensors.

    6. Logout from the NSM session.


    ### Additional Notes

    This action performs external mutations on the McAfee NSM appliance. Ensure the
    provided API credentials have sufficient permissions to modify firewall policies
    and update sensor configurations.
  ai_short_description: >-
    Blocks an IP address on the McAfee Network Security Manager (NSM) by updating
    firewall policies and deploying sensor configuration changes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates firewall policies and sensor configurations on the McAfee NSM appliance
      to block the specified IP address.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data to check if an IP is already blocked (fetches_data=true).
      It performs state-changing operations on the McAfee NSM appliance to block the
      IP (can_mutate_external_data=true). It does not mutate internal SOAR data, update
