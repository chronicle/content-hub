Is IP Blocked:
  ai_description: >-
    ### General Description

    Checks if an IP address is currently blocked in the McAfee Network Security Manager
    (NSM). This action verifies the status of IP entities against active firewall
    block rules configured within the NSM.


    ### Flow Description

    1. Initialize the `NsmManager` using the provided integration configuration (API
    Root, credentials, domain ID, policy name, and sensor list).

    2. Filter the target entities to identify those of type `ADDRESS`.

    3. For each identified IP address, the action calls `nsm_manager.is_ip_blocked`.

    4. The `is_ip_blocked` method performs GET requests to the NSM API to retrieve
    rule objects and firewall policies, verifying if the IP address is present in
    any active block rules.

    5. The action logs out of the NSM session.

    6. The action outputs a summary message listing which entities are blocked and
    which are not, and sets the result value accordingly.


    ### Additional Notes

    This action is a read-only operation and does not modify any firewall configurations
