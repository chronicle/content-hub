Get Alert Info Data:
  ai_description: >-
    ### General Description

    Retrieves detailed alert information from McAfee NSM using a specific Alert ID
    and Sensor Name. This action allows analysts to pull comprehensive data regarding
    a specific security event directly from the McAfee NSM platform for further investigation.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and `NsmManager` using the configured
    integration credentials (API Root, Username, Password, Domain ID, etc.).

    2. It retrieves the required parameters: `Alert ID` and `Sensor Name`.

    3. The action calls the `get_alert_info_by_id` method, which performs an HTTP
    GET request to the McAfee NSM API endpoint `alerts/{alert_id}?sensorId={sensor_id}`.

    4. If data is successfully retrieved, the action adds the JSON response to the
    action results using `siemplify.result.add_json` and `siemplify.result.add_result_json`.

    5. The action terminates with a status message indicating whether the alert data
    was found.


    ### Additional Notes

    This action is a read-only operation. It does not modify any external system state
    or internal SecOps data.
