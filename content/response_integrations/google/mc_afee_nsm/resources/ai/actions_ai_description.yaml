  ai_description: >-
    Unblocks a specific IP address in McAfee NSM.


    ### General Description

    This action iterates over the target ADDRESS entities and removes them from the
    blocklist in McAfee NSM. It locates the rule object associated with the IP address
    and either removes the IP from the rule object or deletes the rule object entirely
    if it is empty. Finally, it deploys the configuration changes to the relevant
    sensors.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. Initializes the McAfee NSM manager using the integration's configuration.

    2. Filters the target entities to include only those of type ADDRESS.

    3. Iterates over the filtered entities and attempts to release (unblock) each
    IP address in McAfee NSM.

    4. Deploys the configuration changes to the configured sensors.

    5. Logs out from the McAfee NSM session.

    6. Returns a success message detailing the unblocked IP addresses.
