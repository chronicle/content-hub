  ai_description: >-
    ### General Description

    Unblocks IP address entities in McAfee Network Security Manager (NSM). This action
    identifies the firewall rule objects associated with the target IP addresses within
    a specific policy, removes the IP entries, and then triggers a configuration deployment
    to the managed sensors to enforce the changes. This action is used to restore
    network connectivity for previously blocked IP addresses.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory |

    | --- | --- | --- | --- |

    | None | This action does not have any specific action parameters; it relies on
    the integration's global configuration. | N/A | No |


    ### Additional Notes

    - This action requires a pre-configured 'Siemplify Policy Name' and a list of
    'Sensors Names' in the integration settings to function correctly.

    - The action performs a state change on the external firewall system.


    ### Flow Description

    1. **Initialization**: Connects to the McAfee NSM instance using provided credentials
    and configuration (API Root, Domain ID, Policy Name, and Sensor List).

    2. **Entity Filtering**: Identifies all IP Address entities within the current
    context.

    3. **IP Release**: For each identified IP, the action searches for the corresponding
    rule object in the NSM policy. If found, it either removes the IP from the rule
    object or deletes the rule object entirely if it contains no other addresses.

    4. **Deployment**: After processing all entities, it initiates a 'Deploy Changes'
    command to push the updated firewall configuration to the specified sensors.

    5. **Cleanup**: Logs out of the NSM session.
