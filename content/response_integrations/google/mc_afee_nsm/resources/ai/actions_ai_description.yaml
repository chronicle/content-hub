Quarantine IP:
  ai_description: >-
    ### General Description

    Quarantines a specific IP address on McAfee NSM sensors. This action isolates
    the target host from the network by applying a quarantine policy across the configured
    sensors, preventing further communication until the quarantine is explicitly released.


    ### Flow Description

    1. The action initializes the `NsmManager` using the provided integration configuration
    (API Root, credentials, Domain ID, and sensor list).

    2. It parses the comma-separated list of sensor names to identify the target sensors.

    3. The action iterates through the provided target entities, filtering for those
    of type `ADDRESS`.

    4. For each valid IP address, it retrieves the corresponding sensor ID for each
    configured sensor.

    5. It executes a `POST` request to the `sensor/{sensor_id}/action/quarantinehost`
    endpoint on the McAfee NSM API to quarantine the IP address.

    6. The action logs the success or failure of the quarantine operation for each
    sensor.

    7. Finally, it terminates the session with the NSM API and returns the result.


    ### Additional Notes

    The action uses a hardcoded duration of 'until_released', meaning the quarantine
    remains in effect until manually removed. The action requires valid connectivity
    to the McAfee NSM API and correctly configured sensor names.
  ai_short_description: >-
    Quarantines a specific IP address on McAfee NSM sensors to isolate the host from
    the network.
  capabilities:
