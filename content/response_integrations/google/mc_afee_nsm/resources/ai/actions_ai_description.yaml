  ai_description: >-
    Blocks IP address entities in McAfee Network Security Manager (NSM). The action
    interacts with the NSM API to manage firewall rule objects and policies. It checks
    if an IP is already blocked; if not, it either appends the IP to an existing 'Siemplify'
    rule object or creates a new one if capacity is reached. Finally, it pushes the
    configuration changes to the specified sensors to enforce the block.


    ### Flow Description:

    1. **Authentication:** Establishes a session with McAfee NSM using provided credentials
    and retrieves a session token.

    2. **Entity Filtering:** Identifies all IP Address entities (ADDRESS) within the
    action scope.

    3. **Block Logic:** For each IP, the action checks if it is already part of the
    configured firewall policy. If not, it attempts to find a rule object with available
    space (max 10 IPs). If no space is available, it creates a new rule object and
    attaches it to the policy.

    4. **Deployment:** Triggers a configuration push ('deploy changes') to the list
    of sensors defined in the integration settings to ensure the new rules are active.

    5. **Cleanup:** Logs out of the NSM session.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take direct input parameters; it relies
    on the integration's global configuration (API Root, Credentials, Policy Name,
    and Sensor List). |


    ### Additional Notes:

    * The action is designed to work with a dedicated firewall policy name specified
    in the integration configuration.

    * It manages rule objects with a specific prefix ('Siemplify_Block') to avoid
    interfering with manual configurations.
  capabilities:
