  ai_description: >-
    Quarantines specific IP addresses across configured sensors in McAfee NSM.


    ### General Description

    This action iterates over target IP address entities and sends a request to McAfee
    NSM to quarantine them on the configured sensors. The quarantine duration is set
    to 'until explicitly released' by default.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies on the
    integration configuration parameters, such as the list of sensor names.


    ### Flow Description

    1. Retrieves the list of target entities from the case.

    2. Filters the entities to include only those of type `ADDRESS`.

    3. For each valid IP address, iterates over the list of configured sensors.

    4. Retrieves the sensor ID and sends a quarantine request to McAfee NSM for the
    IP address.

    5. Returns a success message listing the successfully quarantined IP addresses.
