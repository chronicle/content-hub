  ai_description: >-
    ### General Description

    The **Is IP Blocked** action checks whether specific IP Address entities are currently
    blocked within the McAfee Network Security Manager (NSM). It queries the NSM to
    see if the IP is part of a rule object associated with the configured Siemplify
    firewall policy. This is primarily used for verifying the current enforcement
    state of an IP before or after containment actions.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action relies on the integration's global configuration, specifically the
    'Siemplify Policy Name' and 'Domain ID', to determine which firewall rules to
    inspect. It only checks for blocks within the policy managed by the SOAR.


    ### Flow Description

    1. **Initialization**: Connects to the McAfee NSM API using the integration's
    global configuration credentials.

    2. **Entity Filtering**: Identifies all `ADDRESS` entities within the current
    case scope.

    3. **Status Check**: For each IP address, it queries the NSM to find rule objects
    containing that IP that are also members of the designated Siemplify firewall
    policy.

    4. **Categorization**: Groups entities into 'Blocked' and 'Unblocked' lists based
    on the API response.

    5. **Cleanup**: Logs out of the NSM session to ensure security.

    6. **Completion**: Returns a summary message and a boolean result (True if at
    least one IP is blocked).
