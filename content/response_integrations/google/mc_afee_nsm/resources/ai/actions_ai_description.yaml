  ai_description: >-
    ### General Description

    The **Quarantine IP** action is designed to isolate specific IP addresses across
    one or more McAfee Network Security Manager (NSM) sensors. By communicating with
    the NSM API, the action triggers a quarantine command that restricts the network
    activity of the target host. This is a critical containment capability used during
    security incidents to prevent lateral movement or data exfiltration from compromised
    internal assets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    It uses the global integration configuration for connection details and sensor
    selection. |


    ### Additional Notes

    * The quarantine duration is fixed to **'until released'**, meaning the isolation
    will remain in effect until a manual release is performed or a corresponding release
    action is executed.

    * The action specifically targets the sensors listed in the integration's `Sensors
    Names List Comma Separated` configuration field.


    ### Flow Description

    1. **Establish Session**: The action authenticates with the McAfee NSM API using
    the provided credentials.

    2. **Resolve Sensors**: It retrieves the list of sensors from the integration
    configuration and fetches their corresponding internal IDs from the NSM manager.

    3. **Filter Entities**: The action scans the case for **IP Address** entities.

    4. **Execute Quarantine**: For each valid IP address, it sends a POST request
    to the NSM API to quarantine the host on every identified sensor.

    5. **Cleanup**: The action terminates the NSM session.

    6. **Finalize**: It returns a success message listing the quarantined IP addresses.
