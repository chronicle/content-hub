  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific alert from McAfee Network Security
    Manager (NSM). This action is used to fetch the full context of an alert, including
    signature details, attacker/target information, and malware metadata, which can
    be used for further investigation or automated decision-making within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert in McAfee NSM.
    |

    | Sensor Name | String | Yes | The name of the sensor that generated the alert.
    This is required to locate the alert within the NSM architecture. |


    ### Additional Notes

    This action does not run on entities. It requires a specific Alert ID and Sensor
    Name as input parameters. The retrieved data is returned as a JSON object and
    displayed in a formatted data table within the case wall.


    ### Flow Description

    1. **Initialization**: The action initializes the McAfee NSM manager using the
    integration's configuration (API Root, credentials, and domain information).

    2. **Parameter Retrieval**: The action extracts the Alert ID and Sensor Name provided
    by the user or playbook.

    3. **Sensor Resolution**: The manager resolves the provided Sensor Name to its
    internal Sensor ID by querying the NSM API.

    4. **Data Retrieval**: A GET request is sent to the NSM API to fetch the detailed
    alert information using the Alert ID and the resolved Sensor ID.

    5. **Output Generation**: If data is found, it is added to the action's results
    as a raw JSON object and a formatted data table. The action then concludes with
    a success message.
