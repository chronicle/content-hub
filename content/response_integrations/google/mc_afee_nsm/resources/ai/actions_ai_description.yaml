  ai_description: >-
    ### General Description

    Quarantines specific IP address entities on McAfee Network Security Manager (NSM)
    sensors. This action is used for containment by isolating a potentially malicious
    host from the network. The quarantine is applied with a duration of 'Until Explicitly
    Released', meaning the isolation persists until a manual or automated release
    action is triggered.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | No Action Parameters | N/A | N/A | This action does not require specific input
    parameters. It relies on the integration's global configuration for sensor lists
    and credentials. |


    ### Additional Notes

    * This action requires the **Sensors Names List Comma Separated** to be correctly
    configured in the McAfee NSM integration settings. The action will attempt to
    apply the quarantine on every sensor listed in that configuration.

    * The quarantine duration is hardcoded to `UNTIL_EXPLICITLY_RELEASED`.


    ### Flow Description

    1. **Initialization**: Connects to the McAfee NSM instance using credentials and
    domain information from the integration configuration.

    2. **Entity Filtering**: Identifies all `ADDRESS` (IP) entities provided in the
    current context.

    3. **Sensor Resolution**: For each configured sensor name, the action retrieves
    the corresponding internal Sensor ID from NSM.

    4. **Quarantine Execution**: Sends a POST request to the NSM API for each IP entity
    on every resolved sensor to initiate the quarantine process.

    5. **Result Tracking**: Tracks which IP addresses were successfully quarantined
    across the sensors.

    6. **Completion**: Logs out of the NSM session and returns a summary message of
    the quarantined identifiers.
