    Tests connectivity to the McAfee NSM API by establishing and immediately terminating
    a session. This action is used to verify that the integration configuration is
    correct and that the SOAR platform can successfully authenticate and communicate
    with the McAfee NSM instance.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the required integration
    configuration parameters (API Root, Username, Password, Domain ID, Policy Name,
    and Sensors List).

    2. The `NsmManager` is instantiated, which triggers an authentication request
    to the McAfee NSM API to establish a session.

    3. The `logout` method is called to terminate the session with the McAfee NSM
    API.

