Unblock IP:
  ai_description: >-
    ### General Description

    Unblocks specific IP address entities in McAfee Network Security Manager (NSM).
    This action removes the specified IP addresses from active blocklist policies
    and deploys the updated configuration to the relevant sensors.


    ### Flow Description

    1. Initializes a connection to the McAfee NSM API using the provided integration
    configuration.

    2. Filters the target entities to include only IP addresses (`ADDRESS`).

    3. Iterates through the filtered entities and queries NSM to find the rule object
    containing the IP address.

    4. Makes API calls (PUT/DELETE) to remove the IP address from the rule object,
    or deletes the rule object entirely if it only contains the target IP.

    5. Makes a PUT request to deploy the configuration changes to the configured sensors.

    6. Logs out of the NSM session and returns a summary message of the unblocked
    entities.


    ### Additional Notes

    This action modifies external firewall policies and requires appropriate permissions
    on the McAfee NSM side to update rule objects and deploy sensor configurations.
