  ai_description: >-
    ### General Description

    The **Is IP Blocked** action verifies if specific IP Address entities are currently
    blocked within the McAfee Network Security Manager (NSM). It checks if the IP
    is part of a Siemplify-managed rule object associated with the configured firewall
    policy. This action is useful for validating containment status during an investigation.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | None | This action does not require any input parameters. | N/A | N/A |


    ### Flow Description

    1. **Authentication**: Connects to the McAfee NSM API using the global integration
    credentials and establishes a session.

    2. **Entity Identification**: Filters the case entities to identify all `ADDRESS`
    (IP) types.

    3. **Block Verification**: For each IP entity, the action queries the NSM to find
    rule objects that start with the prefix `Siemplify_Block`, contain the specific
    IP address, and are actively linked to the firewall policy defined in the integration
    settings.

    4. **Categorization**: Groups the entities into 'Blocked' and 'Unblocked' lists
    based on the API response.

    5. **Completion**: Returns a summary message and a boolean result (`True` if at
    least one IP is blocked, `False` otherwise).


    ### Additional Notes

    This action is strictly diagnostic and does not perform any changes to the firewall
    configuration or the entities within Google SecOps.
