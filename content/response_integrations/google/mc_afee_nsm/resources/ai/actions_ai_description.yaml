  ai_description: >-
    Blocks specific IP address entities in McAfee NSM. This action initiates a state
    change on the external network security manager to prevent network traffic to
    or from the specified IP addresses.


    ### Parameters

    There are no input parameters for this action.


    ### Flow Description

    1. Initializes a connection to McAfee NSM using the provided configuration.

    2. Filters the target entities to include only those of type `ADDRESS`.

    3. Iterates over the filtered entities and checks if each IP address is already
    blocked.

    4. If an IP is not blocked, it adds the IP to an available rule object or creates
    a new rule object and attaches it to the firewall policy.

    5. Deploys the configuration changes to the specified sensors.

    6. Logs out of the NSM session and returns a summary of the blocked entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to a firewall policy rule object in McAfee NSM and deploys
      the configuration changes to sensors.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action iterates over target entities and makes POST/PUT requests to McAfee
      NSM to add IP addresses to a blocklist rule object and deploy the changes. It
      does not fetch contextual data for enrichment, nor does it update internal SecOps
      data like entities, insights, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by blocking an IP address on a network security
      device. It does not fetch data for enrichment purposes. Therefore, it is a remediation
      action and not an enrichment action.
    remediation: true
