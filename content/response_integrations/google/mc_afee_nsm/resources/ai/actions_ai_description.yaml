    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates or updates firewall rule objects in McAfee NSM and triggers a configuration
      push to network sensors to enforce the block.
    fetches_data: true
    internal_data_mutation_explanation: null
