      IP addresses.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action interacts with the McAfee NSM API to block IP addresses. It performs
      GET requests to check the current block status and available rule objects, and
      PUT/POST requests to update firewall policies and deploy changes, thus mutating
      external data. It does not modify internal SOAR data (entities, insights, etc.).
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data (blocks an IP on a firewall), which violates
      the 'External State Preservation' rule for enrichment actions. Therefore, it
      is not an enrichment action.
