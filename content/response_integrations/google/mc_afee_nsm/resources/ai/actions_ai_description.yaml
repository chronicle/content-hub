Unblock IP:
  ai_description: >-
    ### General Description

    Unblocks a specific IP address on the McAfee Network Security Manager (NSM). This
    action removes the IP from the configured firewall policy blocklist and deploys
    the changes to the specified sensors.


    ### Flow Description

    1. Initialize the `NsmManager` using the integration configuration (API Root,
    credentials, domain, policy name, and sensor list).

    2. Filter the target entities to identify those of type `ADDRESS`.

    3. For each identified IP address, call `release_ip` to remove it from the associated
    firewall rule object in the NSM.

    4. If the rule object becomes empty, remove it from the firewall policy and delete
    the rule object from the NSM.

    5. Call `deploy_changes` to push the updated configuration to the specified sensors.

    6. Terminate the session by calling `logout`.


    ### Additional Notes

    This action performs state-changing operations on the external McAfee NSM system.
    Ensure the integration configuration is correctly set up with the appropriate
    policy and sensor names.
