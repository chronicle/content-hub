  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific alert from McAfee Network Security
    Manager (NSM) using the Alert ID and Sensor Name. This action is useful for analysts
    who need to fetch the full context of an alert recorded in NSM to assist in investigation
    and response within Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | string | Yes | The unique identifier of the alert in McAfee NSM.
    |

    | Sensor Name | string | Yes | The name of the sensor that generated the alert.
    |


    ### Flow Description

    1. **Initialize Connection**: Establishes a session with the McAfee NSM manager
    using provided credentials.

    2. **Resolve Sensor ID**: Looks up the internal Sensor ID corresponding to the
    provided `Sensor Name`.

    3. **Fetch Alert Data**: Executes a GET request to the NSM API to retrieve the
    full alert details using the `Alert ID` and the resolved `Sensor ID`.

    4. **Process Results**: If data is found, it is formatted as a JSON table and
    added to the case. The raw JSON data is also attached to the action result.


    ### Additional Notes

    This action does not iterate over or process Google SecOps entities; it operates
    strictly based on the provided string parameters.
