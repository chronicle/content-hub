    Retrieves detailed information for a specific alert from McAfee Network Security
    Manager (NSM) using the provided Alert ID and Sensor Name. This action is designed
    to assist analysts in gathering full context for an alert recorded in NSM to support
    investigation and response workflows within Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | string | Yes | The unique identifier of the alert in McAfee NSM.
    |

    | Sensor Name | string | Yes | The name of the sensor that generated the alert.
