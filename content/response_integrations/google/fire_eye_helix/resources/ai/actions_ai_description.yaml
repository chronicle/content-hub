Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the **FireEye Helix** platform. Its primary purpose is to ensure
    that the integration configuration parameters, such as the API Root and API Token,
    are correctly configured and that the FireEye Helix service is reachable over
    the network.


    ### Parameters Description

    This action does not require any input parameters. It utilizes the following integration-level
    configuration settings:

    * **API Root**: The base URL for the FireEye Helix API instance.

    * **API Token**: The authentication token used to authorize requests.

    * **Verify SSL**: A boolean flag indicating whether to validate the SSL certificate
    of the FireEye Helix server.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, API Token, and
    SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `FireEyeHelixManager` with the
    retrieved credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the FireEye Helix health endpoint (`api/v3/appliances/health`).

    4. **Response Validation**: The system validates the HTTP response. If the request
    is successful, it confirms connectivity.

    5. **Execution Result**: The action returns a success message if the connection
    is established, or an error message detailing the failure if the connection cannot
    be made.
