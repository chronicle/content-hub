Suppress Alert:
  ai_description: >-
    ### General Description

    The **Suppress Alert** action allows users to temporarily silence a specific alert
    within the FireEye Helix platform. By providing an Alert ID and a duration in
    minutes, the action calculates an expiration timestamp and updates the alert's
    status in FireEye Helix to prevent further notifications or processing for that
    specific alert during the specified timeframe.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in FireEye
    Helix that you wish to suppress. |

    | **Duration** | Integer | Yes | The amount of time (in minutes) for which the
    alert should remain suppressed. |


    ### Additional Notes

    - The action calculates the suppression end date based on the current system time
    plus the provided duration.

    - If the specified Alert ID does not exist in FireEye Helix, the action will return
    a failure message indicating the alert was not found.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API credentials (Root, Token)
    and the action parameters (Alert ID and Duration).

    2. **Manager Initialization**: Initializes the FireEyeHelixManager to handle communication
    with the FireEye Helix API.

    3. **Date Calculation**: Calculates the suppression end date by adding the specified
    Duration to the current system time.

    4. **API Request**: Executes a POST request to the FireEye Helix suppression endpoint
    (/api/v1/alerts/{alert_id}/suppress) with the calculated end date.

    5. **Error Handling**: If the alert is not found (404), it returns a specific
    'not found' message. Other errors result in a failed execution status.

    6. **Completion**: Returns a success message and sets the is_success result to
    True upon successful suppression.
