Close Alert:
  ai_description: >-
    ### General Description

    The **Close Alert** action programmatically transitions the status of a specific
    alert in FireEye Helix to 'Closed'. This action is essential for synchronizing
    incident response states between Google SecOps and FireEye Helix, allowing analysts
    to resolve external alerts directly from the SOAR interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in FireEye
    Helix that needs to be closed. |

    | **Revision Note** | String | No | An optional text string to provide context
    or a reason for closing the alert. |


    ### Flow Description

    1. **Initialization**: The action initializes the FireEye Helix manager using
    the provided API Root, API Token, and SSL verification settings.

    2. **Parameter Retrieval**: It extracts the mandatory `Alert ID` and the optional
    `Revision Note` from the action parameters.

    3. **API Execution**: The action sends a `PUT` request to the FireEye Helix API
    endpoint (`api/v1/alerts/{alert_id}`) with a payload setting the state to `Closed`
    and including the revision note if provided.

    4. **Error Handling**: The action specifically checks for a 404 error (Alert Not
    Found) and handles it gracefully. Other exceptions are caught and reported as
    execution failures.

    5. **Completion**: The action returns a success message and a boolean result indicating
    whether the alert was successfully closed.


    ### Additional Notes

    - This action does not process entities; it operates strictly based on the provided
    `Alert ID` parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the state of an alert in FireEye Helix to 'Closed' and optionally attaches
      a revision note via a PUT request.
