Get List Items:
  ai_description: >-
    ### General Description

    Retrieves a list of items from a specific FireEye Helix list. This action allows
    users to query threat intelligence or custom lists maintained within FireEye Helix,
    providing visibility into the indicators or values stored within them. It supports
    filtering by item value and type, as well as custom sorting and result limiting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List Short Name** | String | Yes | The unique short name identifier of the
    FireEye Helix list to retrieve items from. |

    | **Value** | String | No | A filter to search for specific item values within
    the list. |

    | **Type** | Enum | No | A filter to search for items of a specific type. Options
    include: `ALL`, `Email`, `FQDN`, `IPv4`, `IPv6`, `MD5`, `MISC`, `SHA-1`. Default
    is `ALL`. |

    | **Sort By** | Enum | No | Specifies the field used to sort the results. Options:
    `Value`, `Type`. Default is `Value`. |

    | **Sort Order** | Enum | No | Specifies the sorting direction. Options: `Ascending`,
    `Descending`. Default is `Ascending`. |

    | **Max Items To Return** | Integer | No | The maximum number of list items to
    return in the response. Default is 100. |


    ### Additional Notes

    - This action does not operate on entities within the Google SecOps case; it is
    a utility action for querying external list data.

    - If the specified `List Short Name` does not exist, the action will return a
    failure message indicating the list was not found.


    ### Flow Description

    1. **Initialization**: The action extracts the FireEye Helix API configuration
    and the user-provided parameters.

    2. **List Resolution**: It first queries FireEye Helix to find the internal ID
    associated with the provided `List Short Name`.

    3. **Data Retrieval**: Using the resolved list ID, it performs a GET request to
    the FireEye Helix items endpoint, applying any specified filters (Value, Type),
    sorting preferences, and limits.

    4. **Result Processing**: The retrieved items are parsed into a structured format.

    5. **Output**: The action populates the JSON result with the raw item data and
    creates a data table in the action output for easy viewing.
