Get Lists:
  ai_description: "### General Description\nRetrieves a collection of lists from FireEye\
    \ Helix based on user-defined filtering and sorting criteria. This action is primarily\
    \ used for administrative or investigative purposes to identify existing watchlists,\
    \ blacklists, or other dynamic lists managed within the FireEye Helix environment.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Name | String | No | Filters the results to include\
    \ only lists whose display name matches the provided string. |\n| Short Name |\
    \ String | No | Filters the results to include only lists whose unique short name\
    \ matches the provided string. |\n| Active | Boolean | No | If set to `True`,\
    \ the action returns only lists that are currently active. |\n| Internal | Boolean\
    \ | No | If set to `True`, the action returns only lists marked as internal. |\n\
    | Protected | Boolean | No | If set to `True`, the action returns only lists that\
    \ are protected from modification. |\n| Sort By | Enum | No | Determines the field\
    \ used to sort the results. Options include `Name`, `Short Name`, and `Created\
    \ At`. Default is `Name`. |\n| Sort Order | Enum | No | Determines the sorting\
    \ direction. Options are `Ascending` or `Descending`. Default is `Ascending`.\
    \ |\n| Max Lists To Return | Integer | No | Limits the number of list records\
    \ returned by the API. Default is 100. |\n\n### Flow Description\n1.  **Initialization**:\
    \ The action initializes the FireEye Helix manager using the provided API Root,\
    \ API Token, and SSL verification settings.\n2.  **Parameter Processing**: It\
    \ extracts and validates the filtering parameters (Name, Short Name, Active, Internal,\
    \ Protected) and sorting preferences.\n3.  **API Request**: The action sends a\
    \ GET request to the FireEye Helix `api/v3/lists` endpoint, passing the filters\
    \ as query parameters.\n4.  **Data Handling**: \n    *   If lists are found, they\
    \ are parsed into data models.\n    *   The results are added to the action output\
    \ as a JSON object.\n    *   A formatted table titled \"FireEye Helix Lists\"\
    \ is created and attached to the action results for display in the SOAR interface.\n\
    5.  **Completion**: The action concludes with a success message if lists were\
    \ retrieved, or a failure message if no matches were found or an error occurred.\n\
    \n### Additional Notes\n*   This action does not require or process any entities\
    \ (IPs, Hostnames, etc.). It is a global search action.\n*   The `Max Lists To\
    \ Return` parameter helps manage performance when dealing with a large number\
    \ of lists."
