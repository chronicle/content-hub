Add Entities To a List:
  ai_description: >-
    ### General Description

    The **Add Entities To a List** action allows users to add entities from the current
    Google SecOps context into a specified list within FireEye Helix. This is primarily
    used for managing watchlists, blocklists, or allowlists by dynamically updating
    FireEye Helix with discovered indicators of compromise (IOCs) or other relevant
    entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List Short Name** | String | Yes | The unique short name of the target list
    in FireEye Helix. The action uses this to find the internal list ID. |

    | **Risk** | Enum | No | The risk level assigned to the items being added. Options
    include: `Low`, `Medium`, `High`, and `Critical`. Defaults to `Medium`. |

    | **Note** | String | No | Optional descriptive notes to be attached to the items
    added to the list. |


    ### Flow Description

    1. **Initialization**: The action initializes the FireEye Helix manager using
    the provided API credentials and configuration.

    2. **List Identification**: It retrieves the internal ID of the target list by
    searching for the provided **List Short Name**.

    3. **Entity Processing**: The action iterates through all entities in the current
    scope. For each entity, it determines the appropriate FireEye Helix item type:
        * **IP Addresses**: Categorized as `ipv4` or `ipv6`.
        * **File Hashes**: Categorized as `md5` or `sha1` based on length.
        * **URLs**: Categorized as `fqdn` (extracting the domain).
        * **Users**: Categorized as `email` if an email address is present.
        * **Others**: Categorized as `misc` using the entity identifier.
    4. **External Mutation**: For each processed entity, a POST request is sent to
    the FireEye Helix API to add the item to the specified list with the configured
    **Risk** and **Note**.

    5. **Result Reporting**: The action collects the API responses and provides a
    summary of which entities were successfully added and which failed.


    ### Additional Notes

    * If the specified **List Short Name** is not found in FireEye Helix, the action
    will fail for all entities.

    * The action supports a wide range of entity types by defaulting to a `misc` category
    if a specific mapping (like IP or Hash) is not identified.
