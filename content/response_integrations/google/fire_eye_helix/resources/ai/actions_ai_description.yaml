Enrich User:
  ai_description: >-
    Enriches User entities by fetching detailed asset and user information from FireEye
    Helix. This action queries the FireEye Helix API to retrieve metadata such as
    risk scores, asset status, VIP status, and operating system details associated
    with a specific user identifier. The retrieved data is then mapped to the entity's
    additional properties within Google SecOps, providing security analysts with enhanced
    context for investigations.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the FireEye Helix instance (e.g.,
    https://helix.fireeye.com). |

    | API Token | String | Yes | The API token used for authentication with FireEye
    Helix. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the FireEye Helix server. |


    ### Flow Description

    1. **Initialization**: The action retrieves the API Root, API Token, and SSL verification
    settings from the integration configuration.

    2. **Entity Filtering**: It identifies all `USERUNIQNAME` entities within the
    current alert or case context.

    3. **External Lookup**: For each identified user, the action calls the FireEye
    Helix `/api/v3/assets` endpoint using the user's identifier as the `asset_name`.

    4. **Data Processing**: If a matching asset is found, the action parses the response
    into an enrichment data model, including fields like `risk_score`, `asset_status`,
    `is_vip_asset`, and `severity`.

    5. **Internal Update**: The action updates the entity's additional properties
    with the prefixed enrichment data (`FEHelix`) and marks the entity as enriched.

    6. **Result Reporting**: Finally, it updates the entities in the Google SecOps
    platform and returns a JSON summary of the successful enrichments.
