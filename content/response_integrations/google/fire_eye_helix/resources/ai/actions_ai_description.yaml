Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname entities by fetching detailed system and asset information from
    FireEye Helix. This action retrieves metadata such as operating system details,
    risk scores, asset status, and event counts to provide security analysts with
    better context regarding the endpoint involved in an alert.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The root URL of the FireEye Helix instance used for
    API requests. |

    | API Token | String | Yes | The API token used to authenticate with the FireEye
    Helix service. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the FireEye Helix server during the connection. |


    ### Additional Notes

    - This action is strictly for enrichment and does not modify any data within the
    FireEye Helix platform.

    - It specifically targets entities of type `HOSTNAME`.

    - Enrichment data added to entities is prefixed with `FEHelix` for easy identification.


    ### Flow Description

    1. **Entity Filtering**: The action filters the input entities to identify those
    of type `HOSTNAME`.

    2. **Manager Initialization**: It initializes the `FireEyeHelixManager` using
    the provided API credentials and SSL settings.

    3. **Data Retrieval**: For each valid hostname, the action queries the FireEye
    Helix `/api/v3/assets` endpoint to find matching asset information.

    4. **Data Processing**: If a matching asset is found, the action flattens the
    asset data and prepares it for enrichment.

    5. **Internal Update**: The action updates the entity's `additional_properties`
    with the retrieved asset details, marks the entity as enriched (`is_enriched =
    True`), and saves these changes back to Google SecOps.

    6. **Result Reporting**: Finally, it provides a JSON result containing the raw
    asset data and outputs a success or failure message for each processed entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of Hostname entities with asset metadata
      and sets the 'is_enriched' flag to true.
