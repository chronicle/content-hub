Archive Search:
  ai_description: >-
    ### General Description

    Performs an asynchronous archive search in FireEye Helix using the Mandiant Query
    Language (MQL). This action is designed to retrieve historical event data that
    is no longer stored in the active index. It manages the lifecycle of the search
    job, including initialization, polling, and automatic resumption if the job is
    paused.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The MQL query string used to filter archive logs (e.g.,
    `srcserver=10.0.0.1`). |

    | Time Frame | String | Yes | The relative time window for the search (e.g., `7h`,
    `1d`). Note: The search window ends 4 hours before the current time due to API
    limitations. |

    | Max Results To Return | Integer | No | Limits the number of records returned
    from the archive (default: 100). |


    ### Additional Notes

    - **Time Constraint**: Due to FireEye Helix API limitations, archive searches
    cannot query data from the last 4 hours. The action automatically offsets the
    search window by 4 hours relative to the current time.

    - **Asynchronous Execution**: This action runs asynchronously. It initializes
    a job and polls for completion across multiple execution cycles.

    - **Auto-Resume**: If the search job is paused by the remote system, the action
    will attempt to resume it up to 3 times before completing without results.


    ### Flow Description

    1. **Job Initiation**: During the first run, the action sends a POST request to
    FireEye Helix to create an archive search job based on the query and calculated
    time frame.

    2. **Status Polling**: In subsequent runs, the action checks the status of the
    job using the job ID.

    3. **Job Management**: If the job is in a 'paused' state, the script triggers
    a resume command. If it is 'in progress', the action waits for the next cycle.

    4. **Result Extraction**: Once the job reaches a 'complete' state, the action
    retrieves the hits and attaches them to the action output as a JSON result.
