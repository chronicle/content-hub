Index Search:
  ai_description: "### General Description\nThe **Index Search** action allows users\
    \ to perform complex queries against the FireEye Helix index to retrieve specific\
    \ log events and data. This is primarily used for threat hunting, investigation,\
    \ and gathering evidence during an incident response workflow. It retrieves raw\
    \ log data based on a user-defined query and time window.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Query** | String | Yes | Specify the query for the search, for example: `srcserver=172.30.202.130`.\
    \ |\n| **Time Frame** | String | No | Specify the time frame for the search. Only\
    \ hours ('h') and days ('d') are supported (e.g., `7h`, `1d`). |\n| **Max Results\
    \ To Return** | Integer | No | Specify how many results to return. Default is\
    \ 100. |\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the FireEye Helix manager using the provided API Root, API Token, and SSL verification\
    \ settings.\n2. **Parameter Extraction**: It extracts the search query, the optional\
    \ time frame, and the maximum results limit from the action parameters.\n3. **Search\
    \ Execution**: The action calls the FireEye Helix API's search endpoint (`/api/v1/search`)\
    \ with a POST request containing the query and search options (offset, page size,\
    \ and time range).\n4. **Result Handling**: \n    - If hits are found, the action\
    \ retrieves the raw JSON results and attaches them to the action's output.\n \
    \   - If no results are found, it returns a message indicating no data was retrieved\
    \ for the query.\n5. **Completion**: The action ends with a success status if\
    \ the API call was successful, or a failure status if an exception occurred during\
    \ execution.\n\n### Additional Notes\n- The `Time Frame` parameter must follow\
    \ a specific format (e.g., `1d 2h`) as per FireEye Helix limitations.\n- This\
    \ action does not iterate over entities; it performs a global index search based\
    \ solely on the provided query string."
