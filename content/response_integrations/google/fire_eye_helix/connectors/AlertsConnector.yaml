name: FireEye Helix - Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: class
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://helix.eu.fireeye.com/helix/id/{id}/
    type: string
    description: 'API Root of the FireEye Helix instance. Example: https://helix.eu.fireeye.com/helix/id/aaaqsj477/'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: API Token of the FireEye Helix account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Server Timezone
    default_value: ''
    type: string
    description: Specify which timezone is set on the FireEye Helix server in regards
        to UTC. For example, +1, -1, etc. If nothing is specified, the connector will
        use UTC as a default timezone.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Risk To Fetch
    default_value: Medium
    type: string
    description: 'Lowest risk that will be used to fetch Alert. Possible values: Low,
        Medium, High, Critical.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts To Fetch
    default_value: 50
    type: integer
    description: How many alerts to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        FireEye Helix server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull alerts from FireEye Helix.
integration: FireEyeHelix
documentation_link: null
rules: []
is_connector_rules_supported: false
creator: admin
