name: Archive Search
description: Perform archive search in FireEye Helix.
integration_identifier: FireEyeHelix
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Specify the query for the search, for example: srcserver=172.30.202.130'
    is_mandatory: true
-   name: Time Frame
    default_value: ''
    type: string
    description: 'Specify the time frame for the search. Only hours and days are supported.
        Note: end time will be 4 hours earlier than current time and time frame will
        start calculation from that point. For example, if ''Time Frame'' is 3h, then
        the start time will be the current time - 7h, while the end time will be the
        current time -4h. API doesn''t allow archive search to be performed on events
        that are only 3 hours old. This is the FireEye Helix limitation. Examples
        of the values: 7h - 7 hours, 1d - 1 day'
    is_mandatory: true
-   name: Max Results To Return
    default_value: 100
    type: string
    description: Specify how many results to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/archive_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities":[]}'
