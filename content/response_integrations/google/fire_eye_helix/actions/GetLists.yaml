name: Get Lists
description: Return information about FireEye Helix lists.
integration_identifier: FireEyeHelix
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify name filter.
    is_mandatory: false
-   name: Short Name
    default_value: ''
    type: string
    description: Specify short name filter.
    is_mandatory: false
-   name: Active
    default_value: false
    type: boolean
    description: Specify, whether action should only return active lists.
    is_mandatory: false
-   name: Internal
    default_value: false
    type: boolean
    description: Specify, whether action should only return internal lists.
    is_mandatory: false
-   name: Protected
    default_value: false
    type: boolean
    description: Specify, whether action should only return protected lists.
    is_mandatory: false
-   name: Sort By
    default_value: Name
    type: ddl
    optional_values:
    - Name
    - Short Name
    - Created At
    description: Specify which parameter should be used for sorting results.
    is_mandatory: false
-   name: Sort Order
    default_value: Ascending
    type: ddl
    optional_values:
    - Ascending
    - Descending
    description: Specify the sorting order for the results.
    is_mandatory: false
-   name: Max Lists To Return
    default_value: 100
    type: string
    description: Specify how many lists to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_lists_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
