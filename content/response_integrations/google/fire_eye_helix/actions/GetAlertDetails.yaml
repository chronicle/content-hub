name: Get Alert Details
description: Retrieve information about Alert from FireEye Helix.
integration_identifier: FireEyeHelix
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify ID of the Alert that needs to be enriched in FireEye Helix.
    is_mandatory: true
-   name: Max Notes To Return
    default_value: 50
    type: string
    description: Specify how many associated notes to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_alert_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
