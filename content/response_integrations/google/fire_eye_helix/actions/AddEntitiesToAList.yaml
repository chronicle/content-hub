name: Add Entities To a List
description: Add Siemplify entities to the FireEye Helix list.
integration_identifier: FireEyeHelix
parameters:
-   name: List Short Name
    default_value: ''
    type: string
    description: Specify the short name of the list.
    is_mandatory: true
-   name: Risk
    default_value: Medium
    type: ddl
    optional_values:
    - Low
    - Medium
    - High
    - Critical
    description: Specify the risk of the items.
    is_mandatory: false
-   name: Note
    default_value: ''
    type: string
    description: Specify notes that should be added to the items.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_entities_to_a_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
