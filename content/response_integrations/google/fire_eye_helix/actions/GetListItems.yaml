name: Get List Items
description: Return information about FireEye Helix lists items.
integration_identifier: FireEyeHelix
parameters:
-   name: List Short Name
    default_value: ''
    type: string
    description: Specify the short name of the list.
    is_mandatory: true
-   name: Value
    default_value: ''
    type: string
    description: Specify value filter for the items.
    is_mandatory: false
-   name: Type
    default_value: ALL
    type: ddl
    optional_values:
    - ALL
    - Email
    - FQDN
    - IPv4
    - IPv6
    - MD5
    - MISC
    - SHA-1
    description: Specify type filter for the items.
    is_mandatory: false
-   name: Sort By
    default_value: Value
    type: ddl
    optional_values:
    - Value
    - Type
    description: Specify which parameter should be used for sorting results.
    is_mandatory: false
-   name: Sort Order
    default_value: Ascending
    type: ddl
    optional_values:
    - Ascending
    - Descending
    description: Specify the sorting order for the results.
    is_mandatory: false
-   name: Max Items To Return
    default_value: 100
    type: string
    description: Specify how many items to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_list_items_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
