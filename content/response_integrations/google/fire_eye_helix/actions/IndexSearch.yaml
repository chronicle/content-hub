name: Index Search
description: Perform index search in FireEye Helix.
integration_identifier: FireEyeHelix
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Specify the query for the search, for example: srcserver=172.30.202.130'
    is_mandatory: true
-   name: Time Frame
    default_value: ''
    type: string
    description: 'Specify the time frame for the search. Only hours and days are supported.
        This is the FireEye Helix limitation. Examples of the values: 7h - 7 hours
        1d - 1 day'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 100
    type: string
    description: Specify how many results to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/index_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
