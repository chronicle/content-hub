Send SMS And Wait:
  ai_description: >-
    ### General Description

    Sends an SMS message to a specified phone number using Twilio and waits asynchronously
    for a reply. The action appends a unique identifier to the outbound message and
    continuously polls for an incoming response containing that specific identifier.


    ### Flow Description

    1. Extracts the target phone number and message content from the action parameters.

    2. Generates a unique 5 to 6-digit identifier and appends it to the outbound message.

    3. Sends the SMS via the Twilio API (`POST` request via `send_message`).

    4. Suspends execution and enters an asynchronous waiting state.

    5. Periodically polls the Twilio API (`GET` request via `list_messages`) to fetch
    incoming messages from the target phone number sent after the initial dispatch
    time.

    6. Completes the action when a reply containing the unique identifier is found,
    returning the response text to the platform.


    ### Additional Notes

    The action requires the target phone number to include a dial code. Because it
    runs asynchronously, it will continue polling in the background until a valid
    response is received or the action reaches its maximum timeout limit.
  ai_short_description: >-
    Sends an SMS message to a target phone number using Twilio and waits asynchronously
    for a reply containing a generated unique identifier.
