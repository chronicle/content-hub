Send SMS And Wait:
  ai_description: >-
    ### General Description

    Sends an SMS message to a specified phone number using the Twilio integration
    and asynchronously waits for a response. This action is designed for interactive
    workflows where an analyst needs to verify information or receive confirmation
    from a recipient via SMS. It appends a unique, randomly generated identifier to
    the message body to track the specific conversation thread.


    ### Flow Description

    1. The action extracts the Twilio configuration (Account SID, Auth Token, and
    Sender Phone Number) and the user-provided parameters (Target Phone Number and
    Message).

    2. A unique 5-6 digit identifier is generated using `secrets.randbelow`.

    3. The original message is appended with instructions to include the unique identifier
    in the reply.

    4. The action calls the `twilio_manager.send_message` API to dispatch the SMS
    to the target phone number.

    5. The action stores the `siemplify_id` and the `sent_message_time` in the execution
    context and sets the status to `EXECUTION_STATE_INPROGRESS`.

    6. In subsequent job executions, the action calls `twilio_manager.list_messages`
    to fetch incoming messages sent after the initial message time.

    7. The action iterates through the retrieved messages, checking if any message
    body ends with the unique `siemplify_id`.

    8. If a matching response is found, the action sets the status to `EXECUTION_STATE_COMPLETED`
    and returns the response content. If no match is found, it continues to wait.


    ### Additional Notes

    This action utilizes a polling mechanism (job) to wait for the response. It does
    not block the execution thread while waiting; instead, it relies on the SOAR platform's
    job scheduling to re-run the `query_job` function until a response is received
    or the job times out.
  ai_short_description: >-
    Sends an SMS message via Twilio and asynchronously waits for a response containing
    a unique identifier.
