name: Whois
description: 'Retrieve Whois information about entities using Talos ThreatSource.
    Supported entities: IP Address, Hostname, URLs. Note: action takes the domain
    part from URL entities. Note: Action is running as async, please adjust script
    timeout value in Siemplify IDE for action as needed. Between each submission action
    waits, so that access won’t be blocked.'
integration_identifier: Talos
parameters: []
dynamic_results_metadata:
-   result_example_path: resources/who_is_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "ADDRESS"]}'
