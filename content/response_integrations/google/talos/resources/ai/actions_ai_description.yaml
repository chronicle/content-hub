    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves Whois information for indicators (IPs, Hostnames, URLs),
      which aligns with the 'Enrich IOC' expected outcome. It does not perform any
      other actions such as updating alerts, creating tickets, or blocking IOCs.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Retrieves Whois information about entities using Talos ThreatSource.


    ### General Description

    This action fetches Whois data for IP Address, Hostname, and URL entities from
    Talos ThreatSource. For URL entities, the action extracts and uses the domain
    part. The action runs asynchronously, processing entities one by one and waiting
    between submissions to prevent access blocking. The retrieved Whois reports are
    returned as JSON results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Use SSL | Boolean | Yes | Specifies if the SSL certificate configured on the
    API root should be validated. |


    ### Flow Description

    1. Filters the target entities to include only supported types (ADDRESS, HOSTNAME,
    URL).

    2. Iterates over the suitable entities and queries Talos ThreatSource for Whois
    information.

    3. Collects the Whois reports and returns them as JSON results.

    4. Manages asynchronous execution state by saving successful and failed entity
    identifiers between runs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches Whois data from Talos ThreatSource using a GET request. It
      does not mutate any external data. Internally, it only adds JSON results to
      the action output and does not update entities, create insights, modify alerts,
      or add case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Talos) to provide additional
      context (Whois information) about entities. It does not mutate external or internal
      data, making it a pure enrichment action. It does not perform any remediation
      tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` (ADDRESS, HOSTNAME, URL). In subsequent asynchronous
      runs, it also filters by `entity.identifier in initial_suitable_entity_identifiers`.
