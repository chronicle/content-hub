Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Talos ThreatSource API to ensure the integration is
    configured correctly and the service is reachable.


    ### Flow Description

    1. Initializes the TalosManager with the provided SSL configuration.

    2. Sends a GET request to the Talos API ping endpoint (using a test domain query).

    3. Validates the HTTP response to confirm successful connectivity.

    4. Returns a success or failure message based on the response.


    ### Additional Notes

    This action does not process any entities or alerts. It is strictly used for verifying
    network access and integration settings.
