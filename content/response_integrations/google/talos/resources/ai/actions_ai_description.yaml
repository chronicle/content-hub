Get Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and URL entities using the Cisco Talos ThreatSource.
    This action retrieves comprehensive reputation, category, and blocklist status
    information for the provided entities. It is designed to run asynchronously to
    handle large volumes of entities without hitting API rate limits.


    ### Flow Description

    1. The action initializes the TalosManager using the provided 'Use SSL' configuration.

    2. It identifies suitable entities from the case (IP Address, Hostname, URL) based
    on supported types.

    3. The action iterates through the entities, querying the Talos API for each:
        - For IP addresses, it retrieves reputation, category info, and blocklist
    status.
        - For URLs, it extracts the domain and retrieves reputation, category info,
    and blocklist status.
        - For Hostnames, it retrieves reputation, category info, and blocklist status.
    4. For each successfully processed entity, the action constructs a JSON result
    and an entity table containing the retrieved data.

    5. The action updates the entities within the SOAR platform with the enrichment
    data and marks them as enriched.

    6. Finally, it adds the result JSON and entity tables to the action output.


    ### Additional Notes

    This action is configured to run asynchronously. It maintains state across runs
    using the `additional_data` parameter to track successful and failed entity processing.
    If the execution deadline is reached, the action will time out.
  ai_short_description: >-
    Enriches IP Address, Hostname, and URL entities with reputation, category, and
    blocklist information from Cisco Talos.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data and sets the is_enriched
      flag.
    reasoning: >-
      The action fetches data from the Talos API (fetches_data=true). It does not
      mutate external data. It updates internal entities with enrichment data (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alert data, or
      create case comments.
  entity_usage:
