Get Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and URL entities using threat intelligence from
    the Talos ThreatSource. The action retrieves reputation, category information,
    and blocklist status for the supported entities to provide additional context
    for analysts.


    ### Flow Description

    1. Iterates over the target entities and filters for supported types (IP Address,
    Hostname, URL).

    2. For URL entities, extracts the domain part to be used for querying.

    3. Makes HTTP GET requests to the Talos API to fetch reputation, category info,
    and blocked info based on the specific entity type.

    4. Aggregates the retrieved data into JSON results and entity tables.

    5. Updates the entities with the enrichment data and marks them as enriched.


    ### Additional Notes

    - The action runs asynchronously. Between each submission, the action waits to
    prevent access from being blocked.

    - For URL entities, the action specifically extracts and queries the domain part.
  ai_short_description: >-
    Enriches IP Address, Hostname, and URL entities by retrieving reputation, category,
    and blocklist information from the Talos ThreatSource.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches reputation data from Talos ThreatSource via HTTP GET requests
      (fetches_data=true). It does not mutate external data. It updates the internal
      entities with the fetched enrichment data using `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
