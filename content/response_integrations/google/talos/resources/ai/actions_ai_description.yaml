Whois:
  ai_description: >-
    ### General Description

    Retrieves Whois information for IP addresses, hostnames, and URLs using the Talos
    ThreatSource integration. This action provides contextual ownership and registration
    details for the specified indicators to assist in threat investigation.


    ### Flow Description

    1. The action initializes the Talos manager and validates connectivity to the
    Talos ThreatSource API.

    2. It filters the provided entities to include only IP addresses, hostnames, and
    URLs.

    3. For each entity, the action extracts the relevant domain (if a URL is provided)
    or uses the identifier directly.

    4. It performs an API call to the Talos ThreatSource endpoint (`/cloud_intel/whois`)
    to fetch the Whois report.

    5. The results are aggregated and returned as a JSON result in the action output.


    ### Additional Notes

    This action is designed to run asynchronously. It handles state management across
    multiple runs to process entities in batches, ensuring that API rate limits are
    respected.
