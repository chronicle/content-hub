Whois:
  ai_description: >-
    ### General Description

    Retrieves Whois information about entities using Talos ThreatSource. Supported
    entities include IP Addresses, Hostnames, and URLs.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses, Hostnames, and URLs.

    2. For URL entities, extracts the domain part to be used for the query.

    3. Makes a GET request to the Talos ThreatSource API (`/cloud_intel/whois`) to
    fetch the Whois report for each valid entity.

    4. Attaches the retrieved Whois information as JSON results to the action.


    ### Additional Notes

    This action runs asynchronously. It waits between each submission to ensure access
    is not blocked by the API.
