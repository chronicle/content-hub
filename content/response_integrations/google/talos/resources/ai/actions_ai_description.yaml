Get Reputation:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action fetches reputation and threat intelligence for IP, Hostname, and
      URL entities from Talos. This matches the 'Enrich IOC' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and URL entities using information from the Talos
    ThreatSource. The action retrieves reputation, category information, and blocked
    status for the supported entities to provide threat intelligence context.


    ### Parameters Description

    There are no user-facing parameters for this action.


    ### Additional Notes

    - The action runs asynchronously. It is recommended to adjust the script timeout
    value in the IDE as needed.

    - Between each submission, the action waits to prevent access from being blocked.


    ### Flow Description

    1. Iterates over the target entities and filters for supported types (IP Address,
    Hostname, URL).

    2. Queries the Talos API to retrieve reputation, category information, and blocked
    status for each entity.

    3. Aggregates the retrieved data into JSON results and entity tables.

    4. Updates the entities with the enrichment data and marks them as enriched.

    5. Returns the results and completes the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with the retrieved enrichment data and marks them as enriched.
    reasoning: >-
      The action fetches reputation and category data from the Talos API via GET requests,
      meaning it fetches data but does not mutate external systems. Internally, it
      updates the entities with the fetched enrichment data. It does not create insights,
      modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data and only performs allowed internal mutations (updating
      entities). Therefore, it is classified as an enrichment action. It does not
      perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      if `entity.entity_type in SUPPORTED_ENTITY_TYPES`, which includes ADDRESS, HOSTNAME,
      and URL (mapped to DestinationURL).
