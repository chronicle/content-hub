[project]
name = "Talos"
version = "21.0"
description = "Talos ThreatSource is a regular intelligence update from Cisco Talos, highlighting the biggest threats each week and other security news."
requires-python = ">=3.11,<3.12"
dependencies = [ "requests==2.32.4", "tipcommon", "tldextract==5.1.2",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.10-py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
