Add Labels to Threats:
  ai_description: >-
    ### General Description

    Adds specified labels to threat resources in the BlueLiv platform. This action
    allows analysts to categorize threats by applying custom labels, facilitating
    better organization and tracking of threat intelligence within the BlueLiv environment.


    ### Flow Description

    1. Extracts action parameters: `Module ID`, `Module Type`, `Resource ID` (threat
    IDs), and `Label Names`.

    2. Initializes the `BlueLivManager` with the configured API credentials.

    3. Retrieves all available labels from BlueLiv and maps the provided `Label Names`
    to their corresponding `label_id` based on the specified `Module ID`.

    4. Validates the existence of each provided `Resource ID` (threat) in BlueLiv.

    5. For each valid threat, retrieves its current labels.

    6. Iterates through the requested labels and calls the `add_label_to_threat` API
    method if the label is not already associated with the threat.

    7. Constructs an output message summarizing the success or failure of the label
    addition for each threat.


    ### Additional Notes

    Requires valid BlueLiv credentials and correct module/resource identifiers. The
    action will fail if none of the provided labels or threats are found in the BlueLiv
    platform.
