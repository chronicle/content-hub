List Entity Threats:
  ai_description: >-
    ### General Description

    Lists threats related to entities in BlueLiv. This action queries the BlueLiv
    API to retrieve threat intelligence associated with the provided entities, allowing
    users to filter the results by specific labels or modules.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Iterates through the provided target entities.

    3. For each entity, makes a GET request to the BlueLiv API to fetch related threat
    data.

    4. Applies the optional 'Label Filter' and 'Module Filter' to the retrieved threats.

    5. Limits the number of threats returned based on the 'Max Threats To Return'
    parameter.

    6. Attaches the threat details as an entity table and a JSON result.

    7. Updates the successful entities in the platform.


    ### Additional Notes

    The action supports all entity types.
