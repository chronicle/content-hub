Add Comment to a Threat:
  ai_description: >-
    ### General Description

    Adds a text comment to a specific threat within the BlueLiv platform. This action
    allows analysts to append notes directly to external threat resources, facilitating
    better collaboration and documentation within the BlueLiv environment.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, User
    Name, Password, Organization ID, Verify SSL) to authenticate with the BlueLiv
    API.

    2. It extracts the action-specific parameters: `Module ID`, `Module Type`, `Resource
    ID` (the threat ID), and `Comment Text`.

    3. The `BlueLivManager` is initialized with the provided credentials.

    4. The action executes a `PUT` request to the BlueLiv API (`ADD_COMMENT_TO_THREAT_URL`)
    to post the comment to the specified threat.

    5. Upon a successful response, the action adds the comment details to the action
    result JSON and constructs an entity table for the threat comments.


    ### Additional Notes

    This action performs a state-changing operation on the external BlueLiv system.
    It does not modify any data within the Google SecOps platform itself.
  ai_short_description: >-
    Adds a text comment to a specific threat in the BlueLiv platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific threat in the BlueLiv system via a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to the BlueLiv API to add a comment to a threat,
      which is an external data mutation. It does not fetch data, mutate internal
      SecOps data, or update entities/alerts.
