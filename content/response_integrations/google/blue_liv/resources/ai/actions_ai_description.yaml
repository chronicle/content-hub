Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches various entity types (IP, Hash, URL, Threat Actor, Threat Campaign, Threat
    Signature, CVE) using the Blueliv Threat Context module. This action retrieves
    threat intelligence, including risk scores and contextual metadata, to help analysts
    assess the threat level of entities within a case.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, SSL verification) from
    the integration settings.

    2. Initializes the Blueliv manager and retrieves the Threat Context module ID.

    3. Filters target entities based on supported types (IP, Hash, URL, CVE, Threat
    Actor, Threat Campaign, Threat Signature).

    4. Iterates through each entity, calling the appropriate Blueliv API endpoint
    to fetch enrichment data.

    5. Updates entity properties with retrieved data, marks them as enriched, and
    optionally flags them as suspicious based on a configurable risk score threshold.

    6. Adds enrichment details to the entity table and links.

    7. Optionally creates a case insight if the 'Create Insight' parameter is enabled.

    8. Updates the entities within the SOAR platform with the new enrichment data.


    ### Additional Notes

    Supports MD5, SHA1, SHA256, and SHA512 hash formats. The action will automatically
    use the maximum allowed value (10) if the 'Lowest Score To Mark as Suspicious'
    parameter exceeds this limit.
  ai_short_description: >-
    Enriches entities (IP, Hash, URL, Threat Actor, Threat Campaign, Threat Signature,
    CVE) using Blueliv Threat Context data.
