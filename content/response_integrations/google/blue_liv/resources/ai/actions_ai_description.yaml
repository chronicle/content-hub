Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches various entity types (IP, Hash, URL, Threat Actor, Threat Campaign, Threat
    Signature, CVE) using the Threat Context module of Blueliv. This action retrieves
    threat intelligence and contextual data, evaluates the risk score of the entities,
    and updates their properties within the platform.


    ### Flow Description

    1. Extracts configuration and action parameters, including the threshold for marking
    entities as suspicious.

    2. Initializes the Blueliv API client and verifies that the Threat Context module
    is supported for the organization.

    3. Iterates over the target entities, filtering for supported types (Address,
    FileHash, URL, Threat Actor, Threat Campaign, Threat Signature, CVE).

    4. Makes specific GET requests to the Blueliv API based on the entity type to
    fetch enrichment details.

    5. Updates the entity's `additional_properties` with the retrieved data and marks
    the entity as enriched.

    6. Evaluates the risk score of Address, FileHash, and URL entities against the
    `Lowest Score To Mark as Suspicious` threshold; if the score meets or exceeds
    the threshold, the entity is marked as suspicious.

    7. Attaches entity links and tables to the action results.

    8. Optionally creates a case insight containing the aggregated enrichment information.

    9. Updates the entities in the SecOps platform and returns the raw data as a JSON
    result.


    ### Additional Notes

    - Only MD5, SHA1, SHA256, and SHA512 hashes are supported for FileHash entities.

    - The maximum allowed value for the `Lowest Score To Mark as Suspicious` parameter
    is 10.
  ai_short_description: >-
    Enriches IP, Hash, URL, Threat Actor, Threat Campaign, Threat Signature, and CVE
    entities using the Threat Context module of Blueliv.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
