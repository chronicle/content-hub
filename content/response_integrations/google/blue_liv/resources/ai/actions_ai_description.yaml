  ai_description: >-
    Adds a text comment to a specific threat in the BlueLiv platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Module Type | String | Yes | Specify the module type the resource belongs to.
    |

    | Module ID | String | Yes | Specify the module ID the resource belongs to. |

    | Resource ID | String | Yes | Specify the Resource ID (Threat ID) to add the
    comment to. |

    | Comment Text | String | Yes | Provide the comment you would like to add to the
    resource. |


    ### Flow

    1. Extracts the necessary configuration and action parameters.

    2. Initializes the BlueLivManager to interact with the BlueLiv API.

    3. Sends a PUT request to the BlueLiv API to add the specified comment to the
    threat.

    4. Returns the comment details, populating the JSON result and creating a data
    table with the comment information.
