Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the BlueLiv instance using the provided integration configuration
    parameters. This action ensures that the Google SecOps platform can successfully
    authenticate and communicate with the BlueLiv API.


    ### Flow Description

    1. Extracts integration configuration parameters including API Root, User Name,
    Password, Organization ID, and Verify SSL.

    2. Initializes the BlueLivManager with the extracted credentials.

    3. Executes a GET request to the BlueLiv API (`/api/v2/organization/{organization_id}/module/0/resource`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
