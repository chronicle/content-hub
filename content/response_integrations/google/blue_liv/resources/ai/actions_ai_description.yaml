  ai_description: >-
    Adds specified labels to specified threat IDs in BlueLiv.


    ### General Description

    This action interacts with the BlueLiv API to apply one or more labels to specific
    threats identified by their Resource IDs. It verifies the existence of both the
    labels and the threats before attempting to apply the labels.


    ### Parameters Description

    * **Module Type** (Mandatory, String): Specify the module type the resource belongs
    to.

    * **Module ID** (Mandatory, String): Specify the module ID the resource belongs
    to.

    * **Resource ID** (Mandatory, String): Specify the Resource IDs, as a comma-separated
    list, to add the labels to.

    * **Label Names** (Mandatory, String): Specify the label names you would like
    to apply to the specified threats, as a comma-separated list. Please pay attention
    to lowercase and uppercase.


    ### Flow Description

    1. Retrieves all available labels from BlueLiv to verify the provided `Label Names`
    exist.

    2. Checks if the provided `Resource ID`s (threats) exist in BlueLiv.

    3. Retrieves the current labels for each valid threat.

    4. Adds the specified labels to the threats if they are not already applied.

    5. Returns a summary message detailing successfully added labels and labels that
    were already present.
