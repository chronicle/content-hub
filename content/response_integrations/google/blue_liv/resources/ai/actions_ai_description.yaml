Remove Labels From Threats:
  ai_description: >-
    ### General Description

    Removes specified labels from specific threat IDs in BlueLiv. This action initiates
    a state change on the external BlueLiv platform to detach labels from the provided
    resources.


    ### Flow Description

    1. Extracts the module ID, module type, resource IDs (threat IDs), and label names
    from the action parameters.

    2. Makes a GET request to the BlueLiv API to fetch all available labels and maps
    the provided label names to their corresponding internal label IDs.

    3. Iterates over the provided threat IDs, making GET requests to verify their
    existence and retrieve their current label associations.

    4. For each valid threat, checks if the specified labels are currently attached.

    5. Makes a PUT request to the BlueLiv API to modify the threat and remove the
    specified labels.

    6. Compiles the results and returns a summary message detailing which labels were
    successfully removed and which were already absent.


    ### Additional Notes

    This action does not operate on Google SecOps entities. Instead, it relies entirely
    on the threat IDs provided in the 'Resource ID' parameter.
  ai_short_description: >-
    Removes specified labels from specific threat IDs in BlueLiv.
