  ai_description: >-
    Enriches entities using information from the Threat Context module of Blueliv.
    Supported entities include IP, Hash, URL, Threat Actor, Threat Campaign, Threat
    Signature, and CVE. Note that only MD5, SHA1, SHA256, and SHA512 hashes are supported.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | boolean | False | If enabled, the action will create insights
    containing information about the enriched entities. |

    | Lowest Score To Mark as Suspicious | string/integer | True | Specify the lowest
    score for the entity to be marked as suspicious. Maximum value is 10. |


    ### Action Flow

    1. Retrieves configuration and action parameters.

    2. Initializes the BlueLivManager and fetches the Threat Context module ID.

    3. Iterates over the supported target entities.

    4. For each entity, fetches enrichment details from Blueliv based on its type.

    5. Updates the entity's additional properties with the enrichment data and marks
    it as enriched.

    6. If the entity type supports risk scoring (IP, Hash, URL) and its risk score
    meets or exceeds the configured threshold, marks the entity as suspicious.

    7. Adds entity links, tables, and JSON results to the action output.

    8. Optionally creates a case insight with the enrichment details.

    9. Updates the entities in the SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and optionally creates case insights.
    reasoning: >-
      The action fetches data from Blueliv using GET requests (fetches_data=true).
      It does not mutate any external data (can_mutate_external_data=false). It mutates
      internal data by updating entities with enrichment data and optionally creating
      case insights (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Blueliv) to enrich entities.
      It does not mutate external data, and its internal mutations are limited to
      updating entities and creating insights, which are allowed for enrichment actions.
      Therefore, it is classified as an Enrichment action. It does not perform any
      remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - THREATACTOR
    - THREATCAMPAIGN
    - THREATSIGNATURE
    - ADDRESS
    - FILEHASH
    - DestinationURL
    - CVE
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`. The supported types are THREATACTOR,
      THREATCAMPAIGN, THREATSIGNATURE, ADDRESS, FILEHASH, URL (DestinationURL), and
      CVE. It does not filter by identifier, creation time, modification time, or
      other attributes.
