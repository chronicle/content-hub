Mark Threat as a Favorite:
  ai_description: >-
    ### General Description

    Marks a specific threat as a favorite in the BlueLiv platform. This action allows
    analysts to update the favorite status of a threat resource, enabling better tracking
    and prioritization within the BlueLiv environment.


    ### Flow Description

    1. The action extracts configuration parameters, including API Root, credentials,
    and organization details, to establish a connection to the BlueLiv API.

    2. It extracts the required action parameters: `Module ID`, `Module Type`, `Resource
    ID` (the threat identifier), and the desired `Favorite Status`.

    3. The action initializes the `BlueLivManager` with the provided configuration.

    4. It calls the `mark_threat_as_favorite` method, which performs a PUT request
    to the BlueLiv API to update the threat's status.

    5. Upon successful execution, it returns a confirmation message. If an error occurs,
    it logs the exception and marks the action as failed.


    ### Additional Notes

    This action performs a state-changing operation on the external BlueLiv platform.
    It does not interact with entities within the Google SecOps platform.
