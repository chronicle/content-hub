  ai_description: >-
    Lists threats related to entities in Blueliv.


    ### General Description

    This action queries Blueliv to retrieve a list of threats associated with the
    provided entities. It allows filtering the results by specific labels or modules
    and limits the number of threats returned per entity. The retrieved threat data
    is attached to the entities as data tables and JSON results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Label Filter | String | False | Specify a comma-separated list of labels that
    will be used to filter threats. Note: label filter works with "OR" logic. |

    | Module Filter | String | False | Specify a comma-separated list of modules that
    will be used to filter threats. |

    | Max Threats To Return | Integer | False | Specify how many threats to return
    per entity. If nothing is specified, the action will return 50 threats. |


    ### Flow

    1. Extracts configuration and action parameters.

    2. Initializes the BlueLivManager with the provided credentials.

    3. Iterates over the target entities.

    4. For each entity, fetches related threats from Blueliv using the provided filters.

    5. If threats are found, adds them to a JSON result, creates an entity table,
    and updates the entity.

    6. Returns a summary message indicating successful and failed entities.
