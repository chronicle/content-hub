  ai_description: >-
    Removes specified labels from specified threat IDs in BlueLiv. The action verifies
    the existence of the provided labels and threats, then updates the threats in
    the BlueLiv platform to remove the designated labels.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Module Type | String | Yes | Specify the module type the resource belongs to.
    |

    | Module ID | String | Yes | Specify the module ID the resource belongs to. |

    | Resource ID | String | Yes | Specify a comma-separated list of resource IDs
    (threat IDs) from which you want to remove labels. |

    | Label Names | String | Yes | Specify a comma-separated list of labels that need
    to be removed. Case-sensitive. |


    ### Action Flow

    1. Fetches existing labels from BlueLiv to validate the provided `Label Names`.

    2. Iterates over the provided `Resource ID`s to check if the threats exist in
    BlueLiv and retrieves their current labels.

    3. Modifies the external threat data in BlueLiv by removing the specified labels
    from the valid threat IDs.

    4. Returns a summary message detailing the successfully removed labels and any
    labels that were already absent from the threats.
