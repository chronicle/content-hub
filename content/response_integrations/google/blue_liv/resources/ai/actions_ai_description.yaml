Add Labels to Threats:
  ai_description: >-
    ### General Description

    Adds specified labels to specified threats in BlueLiv.


    ### Flow Description

    1. Retrieves the specified module ID, module type, threat IDs, and label names
    from the action parameters.

    2. Fetches the available labels from BlueLiv using the `get_labels` API endpoint.

    3. Verifies if the provided labels exist in BlueLiv for the specified module.

    4. Checks if the provided threats exist in BlueLiv using the `get_threat_with_details`
    API endpoint.

    5. Adds the valid labels to the valid threats using the `add_label_to_threat`
    API endpoint (PUT request).

    6. Returns a summary message indicating successful additions and labels that were
    already present.


    ### Additional Notes

    None.
