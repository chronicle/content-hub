Add Comment to a Threat:
  ai_description: >-
    ### General Description

    Adds a text comment to a specific threat resource in BlueLiv. This action initiates
    a state change on the external BlueLiv platform by appending the provided text
    to the specified threat's timeline or details.


    ### Flow Description

    1. Extracts the `Module Type`, `Module ID`, `Resource ID`, and `Comment Text`
    from the action parameters.

    2. Initializes the BlueLiv API client using the provided integration configuration.

    3. Makes an HTTP PUT request to the BlueLiv API (`/api/v2/organization/{org_id}/module/{module_id}/{module_type}/resource/{threat_id}/comment`)
    to add the comment to the threat.

    4. Retrieves the created comment details from the response and attaches them to
    the action results as JSON and a CSV table.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It relies entirely on
    the explicit Resource ID and Module parameters provided by the user or previous
    playbook steps.
  ai_short_description: >-
    Adds a specified text comment to a threat resource in BlueLiv using the provided
    module and resource IDs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a text comment to a specific threat resource in the external BlueLiv platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP PUT request to the BlueLiv API to add a comment to
      a threat, which mutates external data. It does not fetch contextual data for
      enrichment, nor does it mutate internal SecOps data, update entities, or create
      insights.
