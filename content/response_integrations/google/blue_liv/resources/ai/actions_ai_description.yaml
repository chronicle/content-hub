List Entity Threats:
  ai_description: >-
    ### General Description

    Lists threats related to entities using the BlueLiv integration. This action retrieves
    threat intelligence, labels, and modules associated with the provided entities
    from the BlueLiv platform. It helps analysts identify if an entity is involved
    in known threats, data leaks, or other malicious activities tracked by BlueLiv.


    ### Flow Description

    1. Initialize the BlueLiv manager using the provided API credentials and configuration.

    2. Extract action parameters, including optional filters for labels and modules,
    and the maximum number of threats to return.

    3. Iterate through each target entity provided in the SOAR case.

    4. For each entity, perform an API call to the BlueLiv platform to fetch associated
    threat data.

    5. If threat data is found, format the results into a table and a JSON object.

    6. Update the entity in the SOAR platform with the retrieved information.

    7. Return the aggregated results to the SOAR platform.


    ### Additional Notes

    This action supports a wide variety of entity types, including IP addresses, file
    hashes, URLs, and more. It does not perform any state-changing operations on external
    systems; it is strictly an enrichment and data retrieval action.
