Remove Labels From Threats:
  ai_description: >-
    ### General Description

    Removes specified labels from threat records in the BlueLiv platform. This action
    allows analysts to clean up or update threat categorization by removing unwanted
    labels from a list of threat IDs.


    ### Flow Description

    1. Extract configuration parameters (API Root, User Name, Password, Organization
    ID, Verify SSL) and action parameters (Module Type, Module ID, Resource ID, Label
    Names).

    2. Initialize the BlueLiv manager with the provided credentials.

    3. Fetch all available labels from the BlueLiv platform.

    4. Map the provided label names to their corresponding label IDs based on the
    specified Module ID.

    5. Validate the existence of each provided threat ID in the BlueLiv platform.

    6. Fetch current label details for each valid threat.

    7. Iterate through the threats and labels, calling the BlueLiv API to remove the
    specified labels from the threats.

    8. Return the operation status and a summary of successfully removed labels.


    ### Additional Notes

    This action requires valid BlueLiv credentials and correct module/resource identifiers.
    The action operates on threat IDs provided as input parameters rather than entities
    within the SOAR platform.
