name: Remove Labels From Threats
description: The action will remove the specified labels from the specified threat
    IDs.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/blueliv#remove_labels_from_threats
integration_identifier: BlueLiv
parameters:
-   name: Module Type
    default_value: ''
    type: string
    description: Specify the module type the resource belongs to.
    is_mandatory: true
-   name: Module ID
    default_value: ''
    type: string
    description: Specify the module ID the resource belongs to.
    is_mandatory: true
-   name: Resource ID
    default_value: ''
    type: string
    description: Specify a comma-separated list of  resource IDs from which you want
        to remove labels.
    is_mandatory: true
-   name: Label Names
    default_value: ''
    type: string
    description: Specify a comma-separated list of labels that need to be removed.
        Please pay attention to lowercase and uppercase.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
