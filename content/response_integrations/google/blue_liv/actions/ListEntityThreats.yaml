name: List Entity Threats
description: 'List threats related to entities in Blueliv. Supported entities: All.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/blueliv#list_entity_threats
integration_identifier: BlueLiv
parameters:
-   name: Label Filter
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of labels, that will be used to filter
        threats. Note: label filter works with "OR" logic.'
    is_mandatory: false
-   name: Module Filter
    default_value: ''
    type: string
    description: Specify a comma-separated list of modules, that will be used to filter
        threats.
    is_mandatory: false
-   name: Max Threats To Return
    default_value: '50'
    type: string
    description: Specify how many threats to return per entity. If nothing is specified
        action will return 50 threats.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_entity_threats_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": [ "ALERT","HOSTNAME","USERUNIQNAME","ADDRESS","MacAddress","PROCESS","FILENAME","FILEHASH","DestinationURL","THREATSIGNATURE","EMAILSUBJECT","USB","EVENT","CVEID",
    "DEPLOYMENT","CREDITCARD","PHONENUMBER","CVE","THREATACTOR","THREATCAMPAIGN","GENERICENTITY"]}'
