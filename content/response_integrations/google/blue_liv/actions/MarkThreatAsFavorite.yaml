name: Mark Threat as a Favorite
description: The action will mark the specified threat as a favorite threat in BlueLiv
integration_identifier: BlueLiv
parameters:
-   name: Module Type
    default_value: ''
    type: string
    description: Specify the module type the resource belongs to
    is_mandatory: true
-   name: Module ID
    default_value: ''
    type: string
    description: Specify the module ID the resource belongs to
    is_mandatory: true
-   name: Resource ID
    default_value: ''
    type: string
    description: Specify the Resource ID to add the comment to
    is_mandatory: true
-   name: Favorite Status
    default_value: User Starred
    type: ddl
    optional_values:
    - Not Starred
    - User Starred
    - Group Starred
    - Full Starred
    description: Provide the Favorite status you would like to apply on the specified
        threat
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
