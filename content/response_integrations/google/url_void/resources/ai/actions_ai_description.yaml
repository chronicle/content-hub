Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps SOAR platform and the URLVoid
    service to ensure the integration is configured correctly and the API is reachable.


    ### Flow Description

    1. The action retrieves the URLVoid integration configuration, including the API
    URL, API Key, and SSL verification settings.

    2. It initializes the `URLVoidManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the URLVoid API's stats endpoint (`/domainbl/v1/pay-as-you-go/?stats`).

    4. The response is validated to ensure a successful connection.

    5. The action concludes by returning a success message if the connection is established.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the health of
    the integration connection.
  ai_short_description: >-
    Tests connectivity to the URLVoid service.
