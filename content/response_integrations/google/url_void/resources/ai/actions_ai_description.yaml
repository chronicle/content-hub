Get domain reputation:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities by retrieving domain reputation from URLVoid.
    It checks if a domain is blacklisted by popular and trusted domain blacklist services
    and updates the entity's risk status based on a defined threshold.


    ### Flow Description

    1. Iterates over the target entities and filters for Hostname and URL entity types.

    2. Extracts the domain from the entity identifier.

    3. Makes a GET request to the URLVoid API to fetch domain reputation and blacklist
    data.

    4. Creates a blacklist report and attaches it as an entity table.

    5. Generates an insight containing the domain's country code.

    6. Updates the entity's additional properties with the enrichment data.

    7. Evaluates the number of blacklist detections against the configured `Threshold`;
    if exceeded, marks the entity as suspicious.

    8. Updates the entities in the platform and returns the raw data as JSON results.


    ### Additional Notes

    Ensure that the URLVoid API key is properly configured in the integration settings
    to allow successful reputation lookups.
  ai_short_description: >-
    Enriches Hostname and URL entities by retrieving domain reputation and blacklist
    information from URLVoid, updating entity properties and risk status based on
    a defined threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the URLVoid API to fetch domain reputation
      data, meaning it fetches data. It does not mutate external data. It updates
      internal entities with enrichment data and suspicious status, and creates insights
      with country information.
