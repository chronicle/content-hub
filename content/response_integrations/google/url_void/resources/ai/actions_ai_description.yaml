Get domain reputation:
  ai_description: >-
    ### General Description

    This action retrieves domain reputation data from URLVoid to assess the risk of
    Hostname and URL entities. It checks against various blacklist services and provides
    a detailed report, allowing analysts to quickly identify potentially malicious
    domains.


    ### Flow Description

    1. Iterate through the provided target entities (Hostname and URL).

    2. For each entity, extract the domain identifier.

    3. Call the URLVoid API (`get_domain_reputation`) to retrieve reputation data.

    4. Process the raw data to create a blacklist report and flatten server information.

    5. Add an entity insight containing the country code to the SOAR platform.

    6. Update the entity's `additional_properties` with the fetched reputation data.

    7. If the number of detections exceeds the configured `Threshold`, mark the entity
    as suspicious.

    8. Mark the entity as enriched and update it in the SOAR platform.

    9. Add the results to the action output.


    ### Additional Notes

    This action performs enrichment and does not modify external systems. It relies
    on the URLVoid integration configuration for API connectivity.
  ai_short_description: >-
    Enriches Hostname and URL entities with domain reputation data from URLVoid, including
    blacklist status and risk assessment.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
