    internal_data_mutation_explanation: >-
      Updates entity additional properties and suspicious status within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (URLVoid). It updates internal
      entities (`siemplify.update_entities`) and creates insights (`siemplify.add_entity_insight`).
      It does not mutate external data.
