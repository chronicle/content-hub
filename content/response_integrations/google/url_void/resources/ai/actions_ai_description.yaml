Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the URLVoid API to ensure the integration is configured
    correctly and can successfully communicate with the service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API URL, API Key, Verify
    SSL).

    2. Initializes the URLVoidManager with the provided credentials.

    3. Makes a GET request to the URLVoid API (`/domainbl/v1/pay-as-you-go/?stats`)
    to verify authentication and network connectivity.

    4. Returns a success message and a boolean true if the connection is established
    successfully.


    ### Additional Notes

    This is a standard ping action used primarily for testing and validating integration
    settings. It does not interact with alerts or entities.
