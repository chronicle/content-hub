[project]
name = "URLVoid"
version = "14.0"
description = "URLVoid is a service that analyzes a website through multiple blacklist engines and online reputation tools to facilitate the detection of fraudulent and malicious websites."
requires-python = ">=3.11,<3.12"
dependencies = [
 "pytest-mock>=3.15.1",
 "requests>=2.33.1",
]

[dependency-groups]
dev = [
 "pytest>=9.0.3",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
