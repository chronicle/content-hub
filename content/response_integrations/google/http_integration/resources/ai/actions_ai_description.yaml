Get Data:
  ai_description: >-
    General Description: Performs a generic HTTP GET request to a specified URL. This
    action allows users to retrieve data from external APIs or web services by providing
    a URL, optional authentication credentials, custom headers, and SSL verification
    settings.


    Flow Description:

    1. Extracts input parameters: URL, Username, Password, SSL Verification, Headers
    JSON, and Ignore HTTP Error Codes.

    2. Parses the provided Headers JSON string into a dictionary.

    3. Constructs the HTTP GET request with the provided URL, authentication (if applicable),
    headers, and SSL verification settings.

    4. Executes the `requests.get` call.

    5. Validates the response status code (unless `Ignore HTTP Error Codes` is enabled).

    6. Parses the response body (as JSON if possible, otherwise as text).

    7. Adds the response data, status code, and redirect history to the action results.


    Additional Notes: This is a utility action and does not operate on specific entities.
    It is intended for generic API interaction.
  ai_short_description: >-
    Performs a generic HTTP GET request to a specified URL to retrieve data from external
    services.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an HTTP GET request to retrieve data from an external source.
      It does not modify external systems (GET is read-only), nor does it modify internal
      SOAR data (entities, insights, comments).
