    authentication credentials, and SSL verification settings.

    2. Constructs the HTTP POST request, formatting the payload based on the specified
    Content Type (e.g., `application/json`).

    3. Executes the POST request against the target endpoint.

    4. Retrieves the response, parsing it as JSON if applicable, and captures any
    redirect history.

    5. Returns the response data and redirects as a JSON result to the playbook.


    ### Additional Notes

