    ### General Description

    This action performs a connectivity test to verify that the integration is correctly
    configured and communicating with the target system. It serves as a health check
    to ensure the integration environment is operational.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` module.

    2. It executes a simple connectivity check (Ping) to confirm the integration is
    reachable.

    3. It returns a success message ("Connected Successfully") to the SOAR platform
    to indicate the test passed.


    ### Additional Notes

    This action does not interact with external APIs, modify any data, or process
