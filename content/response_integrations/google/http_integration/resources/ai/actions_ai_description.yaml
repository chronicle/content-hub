    | Username | String | No | Username for basic authentication. |

    | Password | Password | No | Password for basic authentication. |

    | SSL Verification | Boolean | No | Whether to verify the SSL certificate of the
    destination server. |

    | Ignore HTTP Error Codes | Boolean | No | If enabled, action should ignore 4xx
    or 5xx HTTP error codes and not return error. |

    | Headers JSON | String | No | JSON object of HTTP headers to be sent with the
    request. |
Get URL Data:
  ai_description: >-
    ### General Description

    Sends an HTTP GET request to URL entities to retrieve their content and redirect
    history.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type URL.

    3. Validates the URL schema, prepending `http://` if no schema is present.

    4. Sends an HTTP GET request to the URL using the `requests` library, applying
    optional basic authentication and SSL verification settings.

    5. Collects the response text and any redirect history from the HTTP response.

    6. Aggregates the results and returns them as a JSON object.


    ### Additional Notes

    - The action supports basic authentication via the `Username` and `Password` parameters.

    - SSL verification can be toggled using the `SSL Verification` parameter.
