Post Data:
  ai_description: >-
    ### General Description

    This action sends a generic HTTP POST request to a specified URL with provided
    data, headers, and authentication credentials. It serves as a flexible utility
    for interacting with external web services or APIs that require POST-based communication.


    ### Flow Description

    1. Extracts input parameters: URL, Data, Username, Password, SSL Verification,
    Headers JSON, and Content Type.

    2. Parses the provided headers (if any) from a JSON string.

    3. Configures the HTTP request attributes, including basic authentication (if
    credentials are provided), headers, and content type.

    4. If the Content Type is `application/json`, it attempts to parse the input data
    as JSON; otherwise, it encodes the data as UTF-8.

    5. Executes the HTTP POST request using the `requests` library.

    6. Validates the response status code using `raise_for_status()`.

    7. Captures the response (JSON or text) and any redirect history.

    8. Returns the response data to the SOAR platform via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a generic HTTP client and does not perform specific security operations
    like enrichment or containment. It is intended for custom API integrations where
    a standard POST request is required.
