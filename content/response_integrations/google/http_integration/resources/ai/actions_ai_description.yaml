Get URL Data:
  ai_description: >-
    ### General Description

    This action performs an HTTP GET request to a specified URL entity to retrieve
    its content and redirect history. It is designed to gather contextual information
    from web resources, supporting optional basic authentication and configurable
    SSL verification.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the `Username`, `Password`,
    and `SSL Verification` settings.

    2. **Entity Iteration**: The action iterates through all provided target entities.

    3. **Filtering**: It filters for entities of type `URL`.

    4. **URL Formatting**: It validates the URL scheme, prepending `http://` if no
    scheme is present.

    5. **HTTP Request**: It executes an HTTP GET request to the target URL using the
    `requests` library, applying authentication credentials if provided and respecting
    the SSL verification setting.

    6. **Result Capture**: The response text and any redirect history are captured
    and stored in a dictionary.

    7. **Output**: The collected data is returned as a JSON result to the SOAR platform.


    ### Additional Notes

    This action does not modify the state of the target URL or the SOAR case. It is
    strictly an information-gathering tool. If the execution deadline is reached,
    the action will terminate gracefully.
