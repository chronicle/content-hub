    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      This is a generic HTTP GET utility action. It does not inherently enrich specific
      IOCs or assets with threat intelligence, nor does it update alerts, create tickets,
      or perform containment actions. Its outcome depends entirely on the URL provided
      by the user, so it does not strictly match any of the predefined specific outcome
      categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
