Ping:
  ai_description: >-
    ### General Description

    Tests connectivity for the HTTP integration. This action is typically used to
    verify that the integration is configured correctly and can execute successfully
    within the SOAR platform.


    ### Flow Description

    1. Initializes the Siemplify action environment.

    2. Generates a static success message ("Connected Successfully").

    3. Ends the execution and returns the success message along with a "true" result.


    ### Additional Notes

    This specific Ping action does not perform an actual external HTTP request; it
    simply returns a successful execution status to validate the integration's basic
    operational state.
