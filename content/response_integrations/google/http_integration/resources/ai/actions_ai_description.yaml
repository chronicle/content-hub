Get Data:
  ai_description: >-
    ### General Description

    Sends an HTTP GET request to a specified URL to retrieve data. This action acts
    as a generic web client, allowing the SOAR platform to interact with external
    REST APIs or web servers to fetch information.


    ### Flow Description

    1. Extracts the target URL, optional authentication credentials (Username/Password),
    custom HTTP headers (provided as a JSON string), and SSL verification preferences.

    2. Constructs and executes an HTTP GET request to the specified URL using the
    `requests` library.

    3. Evaluates the HTTP response code. If the `Ignore HTTP Error Codes` parameter
    is enabled, it bypasses exceptions for 4xx and 5xx status codes.

    4. Parses the response body as JSON (if possible) or plain text, and outputs the
    data, response code, and redirect history as a structured JSON result.


    ### Additional Notes

    This is a generic utility action. It is highly useful for interacting with custom
    endpoints or services that do not have a dedicated integration within the platform.
  ai_short_description: >-
    Sends an HTTP GET request to a specified URL and returns the response data, status
    code, and redirect history.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes an HTTP GET request to fetch data from an external URL (fetches_data=true).
      It does not perform state-changing operations (POST/PUT/DELETE) on external
      systems, so it does not mutate external data. It also does not call any SDK
      methods to update entities, create insights, modify alerts, or add case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
