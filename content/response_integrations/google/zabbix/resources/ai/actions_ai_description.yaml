Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Zabbix instance to verify that the integration is configured
    correctly and authentication is successful.


    ### Flow Description

    1. Retrieves the Zabbix integration configuration parameters (API Root, Username,
    Password, Verify SSL).

    2. Initializes the `ZabbixManager` which attempts to authenticate to the Zabbix
    API.

    3. If the connection and authentication are successful without any exceptions,
    it returns a success message.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify integration settings
    and does not process any entities, alerts, or perform any data enrichment or mutation.
  ai_short_description: >-
    Tests connectivity to the Zabbix instance to verify integration configuration
