Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Zabbix instance by attempting to authenticate with
    the provided credentials. This action ensures that the integration is correctly
    configured and that the SOAR platform can successfully communicate with the Zabbix
    server.


    ### Flow Description

    1. The action retrieves the required configuration parameters (API Root, Username,
    Password, and Verify SSL) from the Zabbix integration settings.

    2. It initializes the `ZabbixManager` using these credentials.

    3. The `ZabbixManager` attempts to establish a session with the Zabbix API.

    4. If the authentication is successful, the action terminates and returns a success
    message indicating the connection was established.


    ### Additional Notes

    This action does not perform any data retrieval or system modifications; it is
    strictly used for validating the integration's connectivity settings.
  ai_short_description: >-
    Tests connectivity to the Zabbix instance by verifying authentication credentials.
  capabilities:
