    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by attempting to authenticate against
      the Zabbix API. It does not fetch data, mutate external/internal systems, or
      interact with entities.
