Execute Script:
  ai_description: >-
    ### General Description

    This action executes a specified script on hosts associated with IP address entities
    via Zabbix. It identifies the relevant hosts in Zabbix using the IP addresses
    and triggers the execution of the designated script on each identified host.


    ### Flow Description

    1. Connects to the Zabbix API using the provided integration credentials.

    2. Retrieves the script details from Zabbix based on the provided `Script Name`
    parameter.

    3. Iterates through the target entities, filtering specifically for IP Address
    entities.

    4. For each IP address, queries Zabbix to find associated hosts via the API.

    5. If hosts are found, executes the script on each host using the Zabbix API (`zabbix.script.execute`).

    6. Collects the execution results (success or failure) and outputs them as JSON
    results.


    ### Additional Notes

    Ensure that the script name provided exactly matches a script available in Zabbix
    and that the Zabbix user has the necessary permissions to execute scripts on the
    target hosts.
  ai_short_description: >-
    Executes a specified script on hosts associated with IP address entities via Zabbix.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a specified script on remote hosts via Zabbix.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a script on external hosts via Zabbix, which mutates external
      data (can_mutate_external_data=true). It does not fetch enrichment data, update
      internal entities, create insights, modify alerts, or create case comments.
