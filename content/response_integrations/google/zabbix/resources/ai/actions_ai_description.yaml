    enrich_ioc: false
    execute_command_on_the_host: true
    get_alert_information: false
    reasoning: >-
      The action executes a script on a remote host via the Zabbix API. This directly
      aligns with the 'Execute Command on the Host' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
