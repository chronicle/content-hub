Execute Script:
  ai_description: >-
    ### General Description

    Executes a predefined script on Zabbix hosts associated with the provided IP address
    entities. This action allows security analysts to trigger automated remediation
    or diagnostic scripts directly on endpoints managed by Zabbix.


    ### Flow Description

    1. Connects to the Zabbix instance using the configured credentials.

    2. Retrieves the script ID for the specified `Script Name` parameter.

    3. Iterates through the provided `ADDRESS` entities.

    4. Queries the Zabbix API to find hosts associated with the entity's IP address.

    5. For each identified host, executes the specified script via the Zabbix API.

    6. Logs the execution status (success or failure) and appends the result to the
    action's JSON output.


    ### Additional Notes

    This action requires valid Zabbix credentials and that the specified script name
    exists within the Zabbix environment. It only operates on entities of type `ADDRESS`.
  ai_short_description: >-
    Executes a specified script on Zabbix hosts associated with the provided IP address
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a predefined script on remote hosts managed by Zabbix.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches host information from Zabbix (fetches_data=true) and executes
      a script on those hosts (can_mutate_external_data=true). It does not modify
      internal SecOps data or entities.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
