name: Run Command As User
description: Run a command as a user (Windows only)
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/runners#run_command_as_user
integration_identifier: Runners
parameters:
-   name: Command
    default_value: ''
    type: string
    description: 'The command to run, e.g: whoami'
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: true
-   name: Domain
    default_value: ''
    type: string
    description: User's domain.
    is_mandatory: true
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: true
-   name: Daemon
    default_value: 'true'
    type: boolean
    description: Whether to run in the background or not
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
