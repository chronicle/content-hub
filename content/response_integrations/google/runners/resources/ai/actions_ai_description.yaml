Run Command As User:
  ai_description: >-
    ### General Description

    Executes a specified command as a specific user on the host machine.


    ### Flow Description

    1. Extracts the command, username, domain, password, and daemon flag from the
    action parameters.

    2. Initializes the appropriate RunnersManager based on the operating system (Windows
    or Linux).

    3. Executes the command using the provided credentials via OS-level mechanisms
    (e.g., `CreateProcessAsUser` on Windows or `su` on Linux).

    4. Captures the standard output and standard error.

    5. Returns the standard output if successful, or the standard error if the command
    fails.


    ### Additional Notes

    This action is primarily designed for Windows environments but contains fallback
    logic for Linux. It requires appropriate permissions (e.g., "Replace a process
    level token" on Windows) to execute commands as another user.
  ai_short_description: >-
    Executes a specified system command as a designated user on the host machine and
    returns the standard output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a local system command on the host where the runner is installed.
      It does not fetch data from external APIs, mutate external systems via API,
      mutate internal SecOps data, update entities, or create insights.
