Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity of the integration by performing a simple "ping"
    operation. It is used to verify that the integration is configured correctly and
    is communicating with the SOAR platform.


    ### Flow Description

    1. The action is triggered.

    2. The `SiemplifyAction` class is initialized.

    3. The action immediately calls `siemplify.end` with a success status, confirming
    that the integration is operational.


    ### Additional Notes

    This action does not perform any external API calls or interact with entities.
    It is strictly for connectivity verification.
  ai_short_description: >-
    Tests the connectivity of the integration by performing a simple ping operation.
