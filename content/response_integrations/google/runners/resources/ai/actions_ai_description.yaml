Ping:
  ai_description: >-
    ### General Description

    The Ping action is a simple utility designed to test connectivity and verify that
    the integration runner is functioning correctly.


    ### Flow Description

    1. Initializes the Siemplify action.

    2. Immediately completes the action, returning a 'Success' message and a 'true'
    result.


    ### Additional Notes

    This action does not interact with any external APIs, process entities, or modify
    any data.
