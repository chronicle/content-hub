Run Command As User:
  ai_description: >-
    ### General Description

    Executes a specified command on a host as a different user. This action allows
    for remote command execution on Windows or POSIX systems by authenticating with
    provided credentials, enabling administrative tasks or system diagnostics to be
    performed under a specific user context.


    ### Flow Description

    1. The action retrieves the input parameters: `Command`, `Username`, `Domain`,
    `Password`, and `Daemon`.

    2. A `RunnersManager` is initialized based on the operating system (Windows or
    POSIX).

    3. The action attempts to authenticate as the specified user using the provided
    credentials.

    4. The `run_command_as_user` method is invoked to execute the command on the host.

    5. The action captures the standard output (stdout) and standard error (stderr)
    from the execution.

    6. The action terminates, returning the command output to the SecOps platform.


    ### Additional Notes

    This action requires appropriate permissions on the target host to execute commands
    as another user. On Windows, this may require configuring 'Replace a process level
    token' in Local Security Policy. The `Daemon` parameter determines whether the
    command runs in the background (hidden window) or foreground.
  ai_short_description: >-
    Executes a system command on a host as a specified user.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a system command on a remote host, which can modify the host's state
      or configuration.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a command on a host, which is a mutation of the external
      system state. It does not fetch contextual data for enrichment, nor does it
      modify internal SecOps data or entities.
