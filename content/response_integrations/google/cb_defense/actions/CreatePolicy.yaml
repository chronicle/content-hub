name: Create Policy
description: Create a new Policy on Cb Defense
integration_identifier: CBDefense
parameters:
-   name: Policy Name
    type: string
    description: Name for the policy
    is_mandatory: true
-   name: Policy Description
    type: string
    description: A description of the policy
    is_mandatory: true
-   name: Priority Level
    default_value: ''
    type: string
    description: The priority score associated with sensors assigned to this policy.
        e.g. LOW
    is_mandatory: true
-   name: Policy Details
    type: string
    description: The policy details
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: new_policy_id
