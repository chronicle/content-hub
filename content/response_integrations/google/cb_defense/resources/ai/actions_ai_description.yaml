Get Device Info:
  ai_description: >-
    ### General Description

    Retrieves detailed device information from Carbon Black Defense for specified
    entities. This action queries the Carbon Black Defense API to fetch metadata such
    as device status, policy information, and other configuration details associated
    with the provided IP addresses or hostnames. The retrieved data is used to enrich
    the entities within the SOAR platform, providing analysts with better context
    for investigation.


    ### Flow Description

    1. **Initialization**: The action initializes the `SiemplifyAction` and extracts
    the required configuration parameters (`Api Root` and `Api Key`).

    2. **Connectivity**: It establishes a connection to the Carbon Black Defense API
    using the provided credentials and performs a connectivity test.

    3. **Entity Processing**: The action iterates through the provided `target_entities`.

    4. **Filtering**: It filters entities to process only those of type `ADDRESS`
    or `HOSTNAME`.

    5. **Data Retrieval**: For each valid entity, it makes an API call to Carbon Black
    Defense (`GET /integrationServices/v3/device`) to fetch device data based on the
    entity identifier.

    6. **Enrichment**: If data is found, the action:
        - Adds the device information to the entity's `additional_properties`.
        - Marks the entity as enriched (`is_enriched = True`).
        - Adds an entity table to the action results containing the device details.
    7. **Update**: Finally, it updates the enriched entities within the SOAR platform
    and returns the results.


    ### Additional Notes

    - This action performs read-only operations (GET requests) against the Carbon
    Black Defense API.

    - If no device data is found for an entity, the action logs the event and continues
    processing other entities.

    - The action supports both IP addresses and hostnames as input entities.
  ai_short_description: >-
    Retrieves and enriches device information from Carbon Black Defense for IP address
    and hostname entities.
  capabilities:
    can_create_case_comments: false
