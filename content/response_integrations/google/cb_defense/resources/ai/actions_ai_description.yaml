  ai_description: >-
    ### General Description

    Changes the policy of a device in Carbon Black Defense based on the provided IP
    address or hostname entities. This action connects to Carbon Black Defense to
    update the assigned policy for specific devices. It first retrieves the device
    information using the entity's IP address or hostname. If a matching device is
    found, it applies the specified new policy to that device.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Policy Name | Yes | String | The new policy name to apply to the device (e.g.,
    TEST_Policy). This determines the new security posture or ruleset applied to the
    endpoint. |


    ### Flow Description

    1. Connects to the Carbon Black Defense API.

    2. Iterates over the target entities (ADDRESS and HOSTNAME).

    3. Fetches device data from Carbon Black Defense using the entity's identifier
    (IP or hostname).

    4. If the device is found, updates its policy to the one specified in the `Policy
    Name` parameter.

    5. Returns a summary of successful, missing, and failed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the policy assigned to a device in Carbon Black Defense.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from Carbon Black Defense to resolve the device
      ID (fetches_data=True). It then mutates external data by changing the policy
      assigned to the device in Carbon Black Defense (can_mutate_external_data=True).
      It does not mutate any internal SecOps data, update entities, create insights,
      modify alerts, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data (changes device policy), so it cannot be classified
      as an Enrichment action. It does not strictly perform identity-based, host-based
      containment, network-based, or email-based remediation according to the strict
      criteria, so it is not classified as a Remediation action.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type not in SUPPORTED_ENTITIES`, where `SUPPORTED_ENTITIES` is
      `[EntityTypes.ADDRESS, EntityTypes.HOSTNAME]`. Therefore, it runs on ADDRESS
      and HOSTNAME entities and filters by entity type.
