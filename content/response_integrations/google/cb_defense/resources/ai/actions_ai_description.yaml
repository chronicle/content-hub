Change Policy:
  ai_description: >-
    ### General Description

    Changes the policy assigned to a device in Carbon Black Defense based on IP Address
    or Hostname entities. This action allows analysts to dynamically reassign endpoints
    to different security policies for remediation or management purposes.


    ### Flow Description

    1. Iterates through the target entities and filters for IP Address and Hostname
    entity types.

    2. For each valid entity, queries the Carbon Black Defense API (`/integrationServices/v3/device`)
    to retrieve the associated device data.

    3. Extracts the device ID from the retrieved data.

    4. Makes an API call to Carbon Black Defense to update the device's assigned policy
    to the specified `Policy Name`.


    ### Additional Notes

    If no device is found for a given entity in Carbon Black Defense, the action will
    skip that entity and report it as missing in the final output.
  ai_short_description: >-
    Changes the policy assigned to a device in Carbon Black Defense based on IP Address
    or Hostname entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the policy assigned to a specific device in Carbon Black Defense.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from Carbon Black Defense using the entity identifier
      (fetches_data=true). It then updates the policy of the device in the external
      system (can_mutate_external_data=true). It does not modify internal SecOps data,
      update entities, or create insights.
