Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Carbon Black Defense
    server. This action verifies that the integration is correctly configured and
    that the SOAR platform can successfully communicate with the external Carbon Black
    Defense API.


    ### Flow Description

    1. The action extracts the `Api Root` and `Api Key` from the integration configuration.

    2. It initializes the `CBDefenseManager` using the provided credentials.

    3. The action executes the `test_connectivity` method, which performs a GET request
    to the Carbon Black Defense API device endpoint (`/integrationServices/v3/device`).

    4. If the request is successful, the action completes with a success status and
    returns "true".

    5. If the request fails (e.g., due to invalid credentials or network issues),
    the action completes with a failure status and returns "false".


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the health of
    the integration connection. It does not perform any data enrichment or state-changing
    operations.
