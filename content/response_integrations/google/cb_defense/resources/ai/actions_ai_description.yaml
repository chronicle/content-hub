    IP Address and Hostname entities. This action fetches contextual metadata about
    the device and enriches the entities within the SecOps platform.


    ### Flow Description

    1. Initializes a connection to the Carbon Black Defense API using integration-level
    credentials.

    2. Iterates through the target entities, filtering specifically for IP Addresses
    and Hostnames.

    3. Queries Carbon Black Defense for device data using the entity's identifier
    (IP or Hostname).

    4. If device data is found, it enriches the entity with the retrieved metadata,
    attaches a CSV table to the entity, and stores the raw JSON results.

    5. Updates the successfully enriched entities within the SecOps platform.


