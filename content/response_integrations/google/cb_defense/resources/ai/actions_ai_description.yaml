Change Policy:
  ai_description: >-
    ### General Description

    Changes the policy of a device in Carbon Black Defense. This action allows security
    analysts to update the security policy assigned to a specific device, ensuring
    that the correct protection level is applied based on the current threat landscape.


    ### Flow Description

    1. Extracts configuration parameters (`Api Root`, `Api Key`) and the `Policy Name`
    action parameter.

    2. Initializes the `CBDefenseManager` to connect to the Carbon Black Defense API.

    3. Iterates through the provided `target_entities` (specifically `ADDRESS` and
    `HOSTNAME` types).

    4. For each valid entity, it fetches the corresponding device data from Carbon
    Black Defense.

    5. If device data is found, it updates the device's policy to the specified `Policy
    Name` using the `cb_defense.change_policy` method.

    6. Logs the outcome for each entity and finishes the action.


    ### Additional Notes

    This action requires valid Carbon Black Defense API credentials. It only supports
    `ADDRESS` and `HOSTNAME` entity types. If a device is not found for a given entity,
    the action will log the failure and continue to the next entity.
  ai_short_description: >-
    Changes the policy of a device in Carbon Black Defense.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the device policy in Carbon Black Defense.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from Carbon Black Defense (fetches_data=true)
      and performs a mutation on the external system to change the device policy (can_mutate_external_data=true).
      It does not update internal entities, create insights, or modify alert data.
