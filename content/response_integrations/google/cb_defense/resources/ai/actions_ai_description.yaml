Delete Rule From Policy:
  ai_description: >-
    ### General Description

    Deletes a specific rule from an existing policy in Carbon Black Defense. This
    action initiates a state change on the external system by removing a configured
    rule, which may alter the protection or monitoring behavior of the associated
    policy.


    ### Flow Description

    1. Extracts the `Policy Name` and `Rule ID` parameters provided by the user.

    2. Establishes a connection to the Carbon Black Defense API.

    3. Fetches the list of available policies via an HTTP GET request to resolve the
    provided `Policy Name` into its corresponding internal Policy ID.

    4. Sends an HTTP DELETE request to the Carbon Black Defense API (`/integrationServices/v3/policy/{policy_id}/rule/{rule_id}`)
    to remove the specified rule.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action directly modifies policy configurations in Carbon Black Defense. Ensure
    that the correct Rule ID and Policy Name are provided to avoid unintended changes
    to endpoint protection policies.
