Create Policy:
  ai_description: >-
    ### General Description

    Creates a new policy in Carbon Black Defense. This action allows users to define
    and deploy a new security policy by providing its name, description, priority
    level, and specific configuration details.


    ### Flow Description

    1. Extracts the policy name, description, priority level, and policy details from
    the action parameters.

    2. Parses the 'Policy Details' parameter as a JSON object.

    3. Establishes a connection to the Carbon Black Defense API.

    4. Makes a POST request to the `/integrationServices/v3/policy/` endpoint with
    the provided policy configuration to create the new policy.

    5. Returns the newly created policy ID upon successful execution.


    ### Additional Notes

    The 'Policy Details' parameter must be a valid JSON string representing the policy
    configuration expected by the Carbon Black Defense API.
