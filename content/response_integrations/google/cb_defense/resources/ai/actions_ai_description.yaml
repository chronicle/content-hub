    reasoning: >-
      The action changes the policy of a device in Carbon Black Defense. This does
      not match the expected outcome of 'Contain Host' (which explicitly isolates
      an endpoint), nor does it match any other specific category like 'Enrich IOC',
      'Update Alert', etc. Therefore, no action outcome categories are applicable.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
