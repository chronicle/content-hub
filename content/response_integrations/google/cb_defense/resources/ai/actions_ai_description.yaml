    1. Extracts `Api Root`, `Api Key`, and `Policy Name` from the configuration and
    action parameters.

    2. Initializes the `CBDefenseManager` and verifies connectivity to the Carbon
    Black Defense API.

    3. Retrieves the policy ID associated with the provided `Policy Name` by querying
    the Carbon Black Defense API.

    4. Sends a DELETE request to the Carbon Black Defense API to remove the policy.

    5. Returns a success or failure message based on the API response.


