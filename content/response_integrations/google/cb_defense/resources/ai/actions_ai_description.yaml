Create Policy:
  ai_description: >-
    ### General Description

    Creates a new policy in Carbon Black Defense. This action allows administrators
    to define security policies by specifying a name, description, priority level,
    and a detailed JSON configuration object.


    ### Flow Description

    1. The action extracts the required configuration parameters (Api Root, Api Key)
    and action parameters (Policy Name, Policy Description, Priority Level, Policy
    Details).

    2. It validates and parses the provided `Policy Details` parameter as a JSON object.

    3. It initializes the `CBDefenseManager` to establish a connection with the Carbon
    Black Defense API.

    4. It executes a POST request via the `create_new_policy` method to the Carbon
    Black Defense API to create the policy with the provided attributes.

    5. Upon successful creation, the action returns the new policy ID as the result.


    ### Additional Notes

    The `Policy Details` parameter must be a valid JSON string. If the JSON parsing
    fails or the API request is unsuccessful, the action will fail and return an error
    message.
