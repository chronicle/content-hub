Upload File:
  ai_description: >-
    ### General Description

    Uploads a specified file to MalShare for malware analysis and scanning. This action
    submits a local file to the MalShare service and retrieves the subsequent analysis
    details associated with the file's hash.


    ### Flow Description

    1. Retrieves the `File Path` from the action parameters.

    2. Initiates a POST request to the MalShare API (`/api.php?action=upload`) to
    upload the file.

    3. If the upload is successful, extracts the file hash from the response.

    4. Initiates a GET request to the MalShare API (`/api.php?action=details`) to
    retrieve the scan details for the uploaded file hash.

    5. Attaches the scan results as a JSON object and a CSV table to the action results.


    ### Additional Notes

    The action relies on a local file path accessible to the execution environment.
    The action will return the hash details even if the file is still pending full
    analysis on MalShare's side.
  ai_short_description: >-
    Uploads a specified file to MalShare for scanning and retrieves the resulting
    analysis details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the MalShare service for malware scanning.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to upload a file to MalShare, which mutates
      external data by adding the file to their database. It also fetches the resulting
      scan data via a GET request. It does not update internal entities, create insights,
      or modify alert data.
