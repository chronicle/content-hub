Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the MalShare service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the API key and SSL verification settings from the integration configuration.

    2. Initializes the MalShareManager.

    3. Makes a GET request to the MalShare API (`action=getlist`) to validate connectivity.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action does not interact with any entities or alerts and is solely used for
    verifying the integration's connection to the MalShare API.
