Upload File:
  ai_description: >-
    ### General Description

    Uploads a file to the MalShare service for analysis and retrieves the resulting
    threat intelligence report. This action allows analysts to submit suspicious files
    to MalShare, which then provides detailed information about the file, such as
    its hash and associated threat data.


    ### Flow Description

    1. The action initializes the `MalShareManager` using the provided API key and
    SSL verification settings.

    2. It retrieves the `File Path` parameter from the action configuration.

    3. The action executes the `upload_and_scan` method, which performs a POST request
    to the MalShare API to upload the specified file.

    4. Upon a successful upload, the action automatically calls the `search_hash`
    method (a GET request) to retrieve the file's details and analysis report from
    MalShare.

    5. The retrieved report is formatted as a CSV table and added to the action results,
    along with the raw JSON response.

    6. The action concludes by setting the result status and output message.


    ### Additional Notes

    This action requires a valid file path that is accessible by the integration environment.
    The file is uploaded to an external service (MalShare) for analysis.
