Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using MalShare. This action queries the MalShare API
    to retrieve detailed threat intelligence and analysis information for specific
    file hashes, updating the entities with the findings.


    ### Flow Description

    1. Iterates through all target entities provided in the case.

    2. Filters the entities to process only those of type File Hash.

    3. Makes a GET request to the MalShare API (`details` action) for each file hash
    to retrieve analysis details.

    4. If data is found, updates the entity's additional properties with the retrieved
    data, marks the entity as enriched and suspicious, and attaches a CSV table with
    the results to the entity.

    5. Updates the entities within the Google SecOps platform and returns the raw
    JSON results.


    ### Additional Notes

    Entities that are not found in MalShare are skipped and reported in the final
    output message. Any errors encountered during the API request for a specific entity
    will be logged, and the script will continue processing the remaining entities.
  ai_short_description: >-
    Enriches File Hash entities by querying the MalShare API for threat intelligence
    and analysis details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the MalShare API to fetch hash details (fetches_data=true).
      It does not mutate external data or internal system data outside of standard
      entity updates. It updates entities by modifying their additional properties,
      setting is_enriched and is_suspicious to True, and calling siemplify.update_entities
      (can_update_entities=true). It does not create insights or case comments.
  entity_usage:
