Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches file hash entities by querying the MalShare threat intelligence service.
    This action retrieves detailed file information, such as malware analysis data,
    and updates the corresponding entities within the SOAR platform to assist in threat
    investigation.


    ### Flow Description

    1. The action initializes the `MalShareManager` using the provided API key and
    SSL verification settings.

    2. It iterates through all `target_entities` provided to the action.

    3. The action filters for entities of type `FILEHASH`.

    4. For each matching entity, it calls the `search_hash` method of the `MalShareManager`
    to retrieve file details from the MalShare API.

    5. If data is found, the action:
        - Converts the report to a flat dictionary.
        - Updates the entity's `additional_properties` with the retrieved data.
        - Sets the entity's `is_enriched` and `is_suspicious` flags to `True`.
        - Adds a result table containing the file details to the entity using `siemplify.result.add_entity_table`.
    6. The action updates the enriched entities in the SOAR platform.

    7. Finally, it adds the full JSON response to the action results and terminates.


    ### Additional Notes

    This action requires a valid MalShare API key configured in the integration settings.
    If a hash is not found in MalShare, the entity is skipped, and the action continues
    processing remaining entities.
  ai_short_description: >-
    Enriches file hash entities by retrieving threat intelligence data from the MalShare
    service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (additional_properties), sets enrichment and suspicious
      flags, and adds a result table to the entity.
    reasoning: >-
      The action fetches data from the MalShare API (fetches_data=true). It does not
      mutate external systems. It mutates internal data by updating entity properties
      (`additional_properties`, `is_enriched`, `is_suspicious`) and adding result
      tables to entities. It does not create insights (via `add_entity_insight`),
      modify alert data, or create case comments.
