Find File:
  ai_description: >-
    ### General Description

    Finds file instances on multiple computers using Carbon Black Protection. This
    action queries the Carbon Black Protection API to identify all endpoints where
    a specific file (identified by its MD5 hash) has been observed, providing visibility
    into the file's prevalence and distribution across the environment.


    ### Flow Description

    1. The action iterates through the provided `FILEHASH` entities.

    2. It validates that the entity identifier is a valid 32-character MD5 hash.

    3. It queries the Carbon Black Protection API (`get_file_instances`) to retrieve
    all instances of the file across the environment.

    4. For each found file instance, it flattens the data and constructs a CSV table.

    5. It attaches the CSV table to the specific entity using `add_entity_table`.

    6. It aggregates all found file instances into a JSON result and attaches it to
    the action output.


    ### Additional Notes

