Analyze File:
  ai_description: >-
    ### General Description

    Analyzes MD5 file hashes using a specified Carbon Black Protection connector to
    determine if they are malicious or suspicious.


    ### Flow Description

    1. Iterates over the target entities and filters for `FILEHASH` entities where
    the identifier is exactly 32 characters long (MD5).

    2. For each valid hash, initiates a file analysis job in Carbon Black Protection
    via a POST request to the API.

    3. Waits for the analysis to complete and retrieves the results via GET requests.

    4. Evaluates if the file is malicious or suspicious based on the analysis results.

    5. If malicious or suspicious, updates the entity's `is_suspicious` status to
    `True`.

    6. Returns the analysis details as a JSON result and updates the entities in Google
    SecOps.


    ### Additional Notes

    The file must already exist in the Carbon Black Protection file catalog and on
    at least one computer for the analysis to be successfully initiated.
  ai_short_description: >-
    Analyzes MD5 file hashes using a specified Carbon Black Protection connector to
    determine if they are malicious or suspicious, updating the entities' suspicious
    status accordingly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a file analysis job in Carbon Black Protection.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to create a file analysis job in Carbon Black
      Protection, which mutates external data. It then fetches the analysis results
      (fetches data). It updates the internal entities' suspicious status using `siemplify.update_entities`.
      It does not create insights or case comments.
