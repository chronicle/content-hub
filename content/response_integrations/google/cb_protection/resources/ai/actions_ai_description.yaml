Block Hash:
  ai_description: >-
    ### General Description

    Blocks specific file hashes in Carbon Black Protection. The action can apply the
    block globally or restrict it to specific policies provided as input.


    ### Flow Description

    1. Retrieves the list of policy names from the action parameters.

    2. Fetches the corresponding policy IDs from Carbon Black Protection via API.

    3. Iterates through the target entities, filtering for `FILEHASH` entity types.

    4. For each valid file hash, sends a POST request to the Carbon Black Protection
    API to create or update a file rule, setting its state to banned for the specified
    policies.

    5. Updates the successfully blocked entities within the SecOps platform.


    ### Additional Notes

    Ensure that the provided policy names exactly match those configured in Carbon
    Black Protection to avoid execution errors.
