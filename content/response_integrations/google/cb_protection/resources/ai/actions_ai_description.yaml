Analyze File:
  ai_description: >-
    ### General Description

    Analyzes file hashes using the Carbon Black Protection platform. This action triggers
    a file analysis job on the external system to determine if a file is malicious
    or suspicious, updates the entity's status within the SOAR platform, and returns
    the detailed analysis results.


    ### Flow Description

    1. The action retrieves the Carbon Black Protection API configuration and user-provided
    parameters (Connector Name, Priority, Timeout).

    2. It resolves the connector ID using the provided connector name.

    3. The action iterates through the target entities, filtering for those with an
    entity type of `FILEHASH` and a valid MD5 identifier (length of 32 characters).

    4. For each valid entity, it makes a POST request to the Carbon Black Protection
    API to trigger a file analysis job.

    5. The action waits for the analysis to complete, polling the status until the
    result is available or the specified timeout is reached.

    6. Upon completion, it checks the analysis result to determine if the file is
    marked as malicious or suspicious.

    7. If the file is flagged, the action updates the entity's `is_suspicious` status
    to `True`.

    8. Finally, it updates the entities in the SOAR platform and attaches the full
    analysis results as a JSON output.


    ### Additional Notes

    This action requires a properly configured Carbon Black Protection integration.
    It specifically targets MD5 file hashes. The action will fail to analyze files
    that do not exist in the Carbon Black file catalog or are not present on any managed
    computers.
  ai_short_description: >-
    Analyzes file hashes using Carbon Black Protection to determine maliciousness
    and updates entity status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Triggers a file analysis job on the Carbon Black Protection platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Carbon Black API (analysis results). It mutates
      external data by creating a new analysis job (POST request). It updates internal
      entities by setting the 'is_suspicious' flag.
