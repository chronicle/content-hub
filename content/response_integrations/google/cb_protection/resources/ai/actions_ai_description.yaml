Get Computers By File:
  ai_description: >-
    ### General Description

    Retrieves a list of computers where a specific file (identified by SHA-256 hash)
    is present using Carbon Black Protection. This action provides visibility into
    the distribution of a file across the environment, helping analysts identify impacted
    endpoints.


    ### Flow Description

    1. The action iterates through the provided target entities, filtering for those
    with the type `FILEHASH`.

    2. For each valid file hash, the action queries the Carbon Black Protection API
    via the `CBProtectionManager` to retrieve a list of computers where the file is
    currently present.

    3. The retrieved computer data (including Hostname, IP Address, MAC Address, Policy
    Name, and OS) is processed and formatted into a table.

    4. The action attaches this table to the specific entity using `siemplify.result.add_entity_table`.

    5. Finally, the action aggregates all results into a JSON object and attaches
    it to the action result using `siemplify.result.add_result_json`.


