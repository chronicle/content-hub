Find File:
  ai_description: >-
    ### General Description

    Finds instances of a specific file hash across multiple computers using Carbon
    Black Protection. This action helps analysts understand the prevalence and location
    of a file within the environment by querying the endpoint protection platform.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. Validates that the file hash identifier is exactly 32 characters long, ensuring
    it is an MD5 hash.

    4. Makes an API call to Carbon Black Protection to retrieve file instances associated
    with the MD5 hash.

    5. Flattens the retrieved file instance data and constructs a CSV table.

    6. Attaches the CSV table to the entity's results and appends the raw data to
    the action's JSON output.


    ### Additional Notes

    This action only supports MD5 file hashes. Hashes of other types (e.g., SHA1,
    SHA256) will be ignored during execution.
