Unblock Hash:
  ai_description: >-
    ### General Description

    Unblocks a file hash in Carbon Black Protection. This action removes the specified
    hash from the blocklist on specific policies or globally, allowing the file to
    execute or be accessed on endpoints governed by those policies.


    ### Flow Description

    1. The action retrieves the Carbon Black Protection API configuration (API Root
    and API Key).

    2. It parses the provided `Policy Names` parameter to resolve them into internal
    policy IDs.

    3. It iterates through the provided `FILEHASH` entities.

    4. For each valid hash, it calls the `unban_hash` method in the Carbon Black Protection
    manager.

    5. The manager locates the existing `FileRule` for the hash.

    6. It removes the specified policies from the rule's policy list. If no policies
    remain, the rule is deleted; otherwise, the rule is updated.

    7. The action updates the entity status within the SOAR platform and returns a
    summary of the operation.


    ### Additional Notes

    This action modifies security policies in Carbon Black Protection. Ensure that
    the provided policy names are accurate to avoid unintended global unblocking.
  ai_short_description: >-
    Unblocks a file hash in Carbon Black Protection by removing it from the blocklist
    on specified policies or globally.
