Change Computer Policy:
  ai_description: >-
    ### General Description

    Changes the assigned policy of a computer in Carbon Black Protection. This action
    allows analysts to dynamically move endpoints to different security policies based
    on IP Address or Hostname entities.


    ### Flow Description

    1. Retrieves the target `Policy Name` from the action parameters.

    2. Iterates through the target entities in the case, specifically filtering for
    `ADDRESS` (IP) and `HOSTNAME` entity types.

    3. For each valid entity, queries the Carbon Black Protection API (via GET request)
    to resolve the entity identifier to a specific computer ID.

    4. If a computer is found, sends a PUT request to the Carbon Black Protection
    API to update the computer's assigned policy to the specified policy.

    5. Appends successfully processed entities to a list and updates them within the
    Google SecOps platform.

    6. Returns a summary message detailing which computers were successfully moved
    to the new policy and lists any errors encountered.


    ### Additional Notes

    Only IP Address and Hostname entities are processed by this action. Other entity
    types will be ignored. The specified policy name must exactly match an existing
    policy in Carbon Black Protection.
  ai_short_description: >-
    Changes the assigned security policy of a computer associated with Hostname or
    IP Address entities in Carbon Black Protection.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Sends a PUT request to the Carbon Black Protection API to change the assigned
      policy of a specific computer.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Calls siemplify.update_entities to update the entities that were successfully
      moved to the new policy.
