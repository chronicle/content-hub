Block Hash:
  ai_description: >-
    ### General Description

    Blocks a file hash on specific Carbon Black Protection policies or globally. This
    action interacts with the Carbon Black Protection API to enforce a ban on the
    specified file hash, preventing its execution or interaction within the protected
    environment.


    ### Flow Description

    1. Retrieve the Carbon Black Protection API configuration (API Root and API Key)
    from the integration settings.

    2. Parse the 'Policy Names' parameter to determine the specific policies where
    the hash should be blocked.

    3. Iterate through the target entities provided to the action.

    4. Filter the entities to process only those with the type 'FILEHASH'.

    5. For each valid file hash, execute the `ban_hash` method via the Carbon Black
    Protection API, which performs a POST request to create or update a file rule.

    6. Update the entity status within the SOAR platform to reflect the action taken.

    7. Generate and return a summary message detailing the success or failure of the
    blocking operation for each hash.


    ### Additional Notes

    This action performs a state-changing operation on the external Carbon Black Protection
    system by modifying file rules. If no policy names are provided, the action may
    default to global rules depending on the underlying API implementation.
  ai_short_description: >-
    Blocks a file hash on specific Carbon Black Protection policies or globally.
