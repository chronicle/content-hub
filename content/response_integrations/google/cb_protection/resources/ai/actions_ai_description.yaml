Unblock Hash:
  ai_description: >-
    ### General Description

    Unblocks specific file hashes in Carbon Black Protection. This action removes
    the specified file hashes from the ban rules of designated policies, or deletes
    the ban rule entirely if no policies remain, effectively restoring execution rights
    for the file.


    ### Flow Description

    1. Retrieves the provided policy names from the action parameters.

    2. Queries Carbon Black Protection to resolve the provided policy names into their
    corresponding policy IDs.

    3. Iterates through the target entities, specifically filtering for `FILEHASH`
    entities.

    4. For each valid file hash, calls the Carbon Black Protection API to remove the
    hash from the specified policies' ban rules. If the hash is removed from all policies,
    the ban rule is deleted globally.

    5. Updates the successfully unblocked entities within Google SecOps and returns
    a summary message.


    ### Additional Notes

    - The action expects the file hash to be a valid MD5 hash.

    - If a rule does not exist for a specific hash, or if the hash is invalid, the
    action will log an error for that entity and continue processing the remaining
    entities.
  ai_short_description: >-
    Unblocks File Hash entities from specific policies or globally in Carbon Black
    Protection by modifying or deleting their ban rules.
