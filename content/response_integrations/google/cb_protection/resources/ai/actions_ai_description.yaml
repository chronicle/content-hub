Change Computer Policy:
  ai_description: >-
    ### General Description

    Moves a computer to a new policy within Carbon Black Protection. This action allows
    analysts to reconfigure the security policy of a specific endpoint (identified
    by IP address or hostname) directly from the SOAR platform.


    ### Flow Description

    1. The action retrieves the Carbon Black Protection API configuration (API Root
    and API Key).

    2. It iterates through the provided target entities (HOSTNAME and ADDRESS).

    3. For each entity, it queries the Carbon Black Protection API to locate the corresponding
    computer object using either `get_computer_by_ip` or `get_computer_by_hostname`.

    4. If the computer is found, the action performs a PUT request to the Carbon Black
    Protection API (`/api/bit9platform/v1/computer/{computer_id}`) to update the computer's
    policy to the specified `Policy Name`.

    5. Finally, the action updates the entity in the SOAR platform and returns a summary
    of the operation.


    ### Additional Notes

    This action requires valid Carbon Black Protection credentials with sufficient
    permissions to modify computer policies. If a computer cannot be found or the
    policy update fails, the action will log an error and continue processing remaining
    entities.
  ai_short_description: >-
    Moves a computer to a new policy within Carbon Black Protection.
