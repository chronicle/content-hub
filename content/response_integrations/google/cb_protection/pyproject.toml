[project]
name = "CBProtection"
version = "13.0"
description = "Cb Protection delivers application control and critical infrastructure protection to lock down servers, critical systems and fixed-function devices in highly regulated environments."
requires-python = ">=3.11,<3.12"
dependencies = [
    "arrow==1.3.0",
    "cbapi==1.7.10",
    "pytest-mock>=3.15.1",
    "requests==2.32.4",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
