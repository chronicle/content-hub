Close EasyVista Ticket:
  ai_description: >-
    ### General Description

    Closes a specific ticket in the EasyVista platform based on the provided ticket
    identifier. This action updates the ticket's status to closed and can optionally
    append a comment, set a specific close date, and delete ongoing actions associated
    with the ticket.


    ### Flow Description

    1. Extracts the provided action parameters, including the ticket identifier, comment,
    close date, and deletion preferences.

    2. Validates the format of the provided `Actions Close Date` (must be MM/DD/YYYY
    HH:MM:SS). If invalid, it defaults to the current time.

    3. Initiates a PUT request to the EasyVista API (`/requests/{ticket_id}`) with
    a payload containing the closure details.

    4. Returns a success or failure message to the SecOps platform based on the API
    response.


    ### Additional Notes

    This action does not operate on SecOps entities; it relies entirely on the explicitly
    provided ticket identifier.
  ai_short_description: >-
    Closes a specified ticket in the EasyVista platform by updating its status and
    appending closure details via the EasyVista API.
