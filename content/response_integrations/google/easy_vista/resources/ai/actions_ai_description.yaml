Add Comment to Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to an existing EasyVista ticket. This action allows users to append
    information or updates to a specific ticket within the EasyVista system.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Account ID, Username, Password,
    Verify SSL) to establish a connection to the EasyVista instance.

    2. Extracts action parameters (Ticket Identifier, Comment) provided by the user.

    3. Initializes the `EasyVistaManager` with the retrieved credentials.

    4. Executes the `add_comment` method, which performs a `PUT` request to the EasyVista
    API endpoint (`{api_root}/requests/{ticket_id}`) with the comment payload.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action does not operate on SOAR entities. It requires a valid Ticket Identifier
    and a comment string to function correctly.
