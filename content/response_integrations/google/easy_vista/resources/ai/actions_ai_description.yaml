Wait for the Ticket Update:
  ai_description: >-
    ### General Description

    Pauses playbook execution to monitor an EasyVista ticket for updates. It periodically
    polls the ticket until a specified field (Status, Comment, or Actions) changes.


    ### Flow Description

    1. The action is triggered with `Ticket Identifier` and `Field To Monitor`.

    2. On the first run, it fetches the current state of the specified field from
    EasyVista and stores it in `additional_data`.

    3. The action returns `EXECUTION_STATE_INPROGRESS` to pause the playbook.

    4. On subsequent runs, it fetches the current state of the field again.

    5. It compares the new state with the stored `additional_data`.

    6. If the field has changed, the action completes (`EXECUTION_STATE_COMPLETED`)
    and returns the updated ticket information.

    7. If no change is detected, it continues to poll (`EXECUTION_STATE_INPROGRESS`).


    ### Additional Notes

    This action is intended for use in asynchronous playbooks to wait for external
    ticket updates.
  ai_short_description: >-
    Monitors an EasyVista ticket for updates on a specific field and pauses playbook
    execution until a change is detected.
