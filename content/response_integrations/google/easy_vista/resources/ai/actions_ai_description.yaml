Wait for the Ticket Update:
  ai_description: >-
    ### General Description

    Pauses the playbook execution and periodically connects to EasyVista to check
    if a specified ticket has been updated. The action monitors a specific field and
    completes once a change is detected, returning the updated ticket information.


    ### Flow Description

    1. Retrieves the initial state of the specified ticket field (Status, Comment,
    or Actions) via the EasyVista API.

    2. Pauses playbook execution and periodically re-fetches the ticket field.

    3. Compares the current state with the initial state.

    4. If the field has changed, completes the action and returns the updated ticket
    information as JSON.


    ### Additional Notes

    This is an asynchronous action that will continue to run until the ticket is updated
    or the action times out.
