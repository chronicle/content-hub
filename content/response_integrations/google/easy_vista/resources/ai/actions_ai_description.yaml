Get EasyVista Ticket:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific EasyVista ticket using its ticket
    identifier. It fetches general ticket details, descriptions, comments, actions,
    and attachments from the EasyVista platform.


    ### Flow Description

    1. Extracts the `Ticket Identifier` parameter.

    2. Makes multiple GET requests to the EasyVista API to fetch general info, description,
    comments, actions, and attachments for the specified ticket.

    3. Aggregates the retrieved data into a single JSON object.

    4. Outputs the aggregated ticket information as a JSON result and a data table
    in the SecOps platform.


    ### Additional Notes

    This action does not operate on Siemplify entities; it requires a specific ticket
    identifier to be provided.
