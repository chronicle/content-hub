    ### General Description

    Retrieves comprehensive details for a specific EasyVista ticket. This action fetches
    general ticket information, description, comments, actions, and attachments from
    the EasyVista platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Account ID, Username, Password,
    Verify SSL) and the `Ticket Identifier` action parameter.

    2. Initializes the `EasyVistaManager` with the provided credentials and configuration.

    3. Executes the `get_ticket_information` method, which performs multiple API GET
    requests to retrieve general ticket info, description, comments, actions, and
    attachments.

    4. Aggregates the retrieved data into a structured object.

    5. Adds the raw JSON result to the action output and displays the ticket information
    in a data table.


