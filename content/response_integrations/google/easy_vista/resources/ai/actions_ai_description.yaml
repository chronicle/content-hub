Add Comment to Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to a specific ticket in the EasyVista system. This action allows
    analysts to update external tickets with notes or findings directly from the SOAR
    platform.


    ### Flow Description

    1. Extracts the `Ticket Identifier` and `Comment` from the action parameters.

    2. Initializes the EasyVista API client using the provided integration configuration
    credentials.

    3. Makes a PUT request to the EasyVista API (`/requests/{ticket_id}`) to append
    the provided comment to the specified ticket.

    4. Returns a success message if the API call is successful, or an error message
    if it fails.


    ### Additional Notes

    This action does not operate on Google SecOps entities. It relies entirely on
    the provided action parameters to identify the target ticket.
  ai_short_description: >-
    Adds a comment to a specific ticket in the EasyVista system.
  capabilities:
