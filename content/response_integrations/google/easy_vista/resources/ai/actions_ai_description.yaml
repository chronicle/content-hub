Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the EasyVista instance to ensure the integration is configured
    correctly and can communicate with the EasyVista API.


    ### Flow Description

    1. Retrieves integration configuration parameters including API Root, Account
    ID, Username, and Password.

    2. Initializes the EasyVista manager with the provided credentials.

    3. Makes an HTTP GET request to the EasyVista API to verify connectivity.

    4. Validates the response and returns a success or failure message based on the
    HTTP status code.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    EasyVista integration and does not require any action-specific parameters.
