Close EasyVista Ticket:
  ai_description: >-
    ### General Description

    Closes an existing ticket in the EasyVista ITSM platform. This action allows analysts
    to finalize a ticket by providing a closure comment, a specific closure date,
    and an option to delete any ongoing actions associated with the ticket.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Account ID, Credentials)
    and action parameters (Ticket Identifier, Comment, Actions Close Date, Delete
    ongoing actions?) from the integration settings.

    2. It validates the provided `Actions Close Date` format (MM/DD/YYYY HH:MM:SS).
    If the format is invalid, it defaults to the current system time.

    3. The action initializes the `EasyVistaManager` using the provided credentials
    and configuration.

    4. It executes a `PUT` request to the EasyVista API (`/requests/{ticket_id}`)
    to update the ticket status to closed, passing the provided comment, close date,
    and the deletion preference for ongoing actions.

    5. The action returns the execution status and a summary message indicating whether
    the ticket was successfully closed or if an error occurred.


    ### Additional Notes

    This action does not operate on SOAR entities; it requires a specific ticket identifier
    provided as an input parameter. It performs a state-changing operation on the
    external EasyVista system.
