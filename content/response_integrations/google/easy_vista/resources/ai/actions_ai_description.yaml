Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the EasyVista instance using the provided configuration
    parameters. This action validates that the integration is correctly configured
    and can communicate with the EasyVista server.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Account
    ID, Username, Password, and Verify SSL) from the integration settings.

    2. It initializes the `EasyVistaManager` with these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the EasyVista API endpoint (`/requests?max_rows=1`) to verify the connection.

    4. If the request is successful, the action completes with a success message;
    otherwise, it reports a failure.


    ### Additional Notes

    This action is used to validate that the integration is correctly configured and
    can communicate with the EasyVista server.
