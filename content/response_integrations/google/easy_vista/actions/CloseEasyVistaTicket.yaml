name: Close EasyVista Ticket
description: 'Close EasyVista ticket based on the provided parameters. Note: action
    is not working on Siemplify entities, ticket identifier (rfc_number) should be
    provided.'
integration_identifier: EasyVista
parameters:
-   name: Ticket Identifier
    default_value: ''
    type: string
    description: EasyVista ticket identifier, eg S201001_000001.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Comment explaining the closing of the ticket.
    is_mandatory: false
-   name: Actions Close Date
    default_value: ''
    type: string
    description: 'Closing date of open actions associated with the ticket and the
        anticipated closure action. Date should be in the following format: MM/DD/YYYY
        HH:MM:SS. If the wrong format is provided, action will use current datetime
        as close date.'
    is_mandatory: false
-   name: Delete ongoing actions?
    default_value: 'False'
    type: boolean
    description: Specify whether to delete the ticket's ongoing actions on ticket
        closing.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
