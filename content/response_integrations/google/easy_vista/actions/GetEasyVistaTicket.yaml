name: Get EasyVista Ticket
description: 'Get information on specific EasyVista ticket. Note: action is not working
    on Siemplify entities, ticket identifier (rfc_number) should be provided.'
integration_identifier: EasyVista
parameters:
-   name: Ticket Identifier
    default_value: ''
    type: string
    description: EasyVista ticket identifier to get info for, eg S201001_000001.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_easy_vista_ticket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
