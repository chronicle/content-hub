name: Sync Closed Requests By Tag
parameters:
-   name: Api Root
    default_value: http://{IP OR FQDN}:8080/api/v3/
    type: string
    description: ''
    is_mandatory: true
-   name: Api Key
    default_value: ''
    type: password
    description: ''
    is_mandatory: true
-   name: Max Hours Backwards
    default_value: '24'
    type: string
    description: ''
    is_mandatory: false
-   name: Verify SSL
    default_value: true
    type: boolean
    description: ''
    is_mandatory: true
description: 'This job will synchronize ServiceDeskPlus requests that were created
    within Siemplify Case playbook and Siemplify cases. Note: in ServiceDeskPlus statuses
    "Cancelled", "Closed" and "Resolved" are treated as closed. Additionally, in order
    for the job to work, it’s required for the case to have 2 tags. First tag should
    be "ServiceDeskPlus" and the second should be with the prefix "ServiceDeskPlus
    Requests:{request id}".'
integration: ServiceDeskPlusV3
creator: Admin
