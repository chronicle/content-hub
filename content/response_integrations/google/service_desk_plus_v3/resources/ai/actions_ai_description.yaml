Create Alert Request:
  ai_description: >-
    ### General Description

    Creates a new request (ticket) in ServiceDesk Plus V3. This action can operate
    in both Alert and Case scopes. It automatically populates the request's description
    with the Siemplify Alert ID and Alert Name to maintain traceability between the
    two systems.


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration and extracts all action
    parameters.

    2. **Scope Determination**: Determines whether the action is running in Alert
    or Case scope.

    3. **Context Building**: For each target alert (the current alert in Alert scope,
    or all alerts in the case in Case scope), it automatically generates a description
    string containing the `external_id` and `name` of the alert.

    4. **API Interaction**: Sends a POST request to the ServiceDesk Plus V3 API (`/requests`
    endpoint) with the provided metadata to create the ticket for each target alert.

    5. **Result Processing**: Captures the API responses, converts them to a JSON
    result, and marks the action as successful if the tickets are created.


    ### Additional Notes

    - This action does not run on specific entities; it operates at the alert level.

    - If a parameter is set to "None" (case sensitive), the integration logic treats
    it as an empty value for dropdown-based fields.
