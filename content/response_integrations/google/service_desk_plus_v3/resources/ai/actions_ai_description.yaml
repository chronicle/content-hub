Update Request:
  ai_description: >-
    ### General Description

    Updates an existing request in ServiceDesk Plus V3 using its unique Request ID.
    This action allows for modifying various attributes of a ticket, such as its status,
    priority, assigned technician, and description, to keep the external ticketing
    system synchronized with the incident response progress in Google SecOps.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and the
    specific request details provided as input parameters.

    2. **Manager Initialization**: Initializes the ServiceDesk Plus V3 manager with
    the provided API Root and Key.

    3. **Payload Construction**: Builds a JSON payload containing only the fields
    that were provided in the action parameters.

    4. **API Interaction**: Executes a PUT request to the ServiceDesk Plus API endpoint
    for the specific Request ID.

    5. **Result Handling**: Captures the API response, converts it to JSON, and marks
    the action as successful if the update was accepted.


    ### Additional Notes

    This action does not operate on Google SecOps entities; it requires a specific
    Request ID as input.
