Create Request:
  ai_description: >-
    Creates a new request in ServiceDesk Plus V3. This action allows users to programmatically
    generate tickets within the ServiceDesk Plus environment by providing various
    details such as subject, requester, description, and priority. It is typically
    used for incident management or service request fulfillment within a SOAR workflow.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject of the request. |

    | Requester | String | Yes | The requester of the request. |

    | Description | String | No | Detailed description of the request. |

    | Assets | String | No | Comma-separated names of assets to be associated with
    the request. |

    | Status | String | No | The status of the request (e.g., Open, In Progress).
    |

    | Technician | String | No | The name of the technician assigned to the request.
    |

    | Priority | String | No | The priority of the request. |

    | Urgency | String | No | The urgency of the request. |

    | Category | String | No | The category of the request. |

    | Request Template | String | No | The template to apply to the request. |

    | Request Type | String | No | The type of the request (e.g., Incident, Service
    Request). |

    | Due By Time (ms) | Integer | No | The due date of the request in milliseconds.
    |

    | Mode | String | No | The mode in which this request is created (e.g., E-mail).
    |

    | Level | String | No | The level of the request. |

    | Site | String | No | The site to which this request belongs. |

    | Group | String | No | The group to which this request belongs. |

    | Impact | String | No | The impact of the request. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves connection settings (API Root,
    Key) and all user-provided request fields from the SOAR environment.

    2. **Manager Initialization**: Initializes the ServiceDeskPlusManagerV3 to handle
    API communication using the provided credentials.

    3. **Request Construction**: Builds a JSON payload containing the request attributes.
    If a parameter is set to 'None' (via dropdown logic), it is excluded from the
    payload.

    4. **API Execution**: Sends a POST request to the ServiceDesk Plus 'requests'
    endpoint to create the ticket.

    5. **Result Processing**: Captures the API response, including the new Request
    ID and metadata, and attaches it as a JSON result to the action for use in downstream
    tasks.
