    Updates an existing request in ServiceDesk Plus V3 using its unique Request ID.
    This action allows for modifying various attributes of a ticket, such as its status,
    priority, assigned technician, and description, to keep the external ticketing
    system synchronized with the incident response progress in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request ID | String | Yes | The unique identifier of the request to update.
    |

    | Subject | String | No | The new subject for the request. |

    | Requester | String | No | The name of the requester. |

    | Description | String | No | The new description for the request. |

    | Assets | String | No | Comma-separated names of assets to associate. |

    | Status | String | No | The new status (e.g., Open, Closed). |

    | Technician | String | No | The name of the technician to assign. |

    | Priority | String | No | The priority level. |

    | Urgency | String | No | The urgency level. |

    | Category | String | No | The category of the request. |

    | Request Template | String | No | The template to apply. |

    | Request Type | String | No | The type (e.g., Incident). |

    | Due By Time (ms) | Integer | No | Due date in milliseconds. |

    | Mode | String | No | The mode (e.g., E-mail). |

    | Level | String | No | The level of the request. |

    | Site | String | No | The site associated with the request. |

    | Group | String | No | The group associated with the request. |

    | Impact | String | No | The impact level. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and the
    specific request details provided as input parameters.

    2. **Manager Initialization**: Initializes the ServiceDesk Plus V3 manager with
