Close Request:
  ai_description: >-
    ### General Description

    Closes a specific request in ServiceDesk Plus V3. This action is used to finalize
    a ticket by providing a mandatory closing comment and optionally acknowledging
    the resolution. It interacts with the ServiceDesk Plus API via a PUT request to
    transition the request state.


    ### Flow Description

    1. **Initialization**: The action initializes the ServiceDesk Plus manager using
    the provided API Root, API Key, and SSL verification settings.

    2. **Parameter Extraction**: It retrieves the mandatory `Request ID` and `Comment`,
    along with the optional `Resolution Acknowledged` flag from the action input.

    3. **API Interaction**: The action sends a PUT request to the ServiceDesk Plus
    endpoint (`requests/{request_id}/close`) with a payload containing the closure
    information.

    4. **Result Processing**: If the request is successful, the API response is captured
    and added to the action's JSON results. If an error occurs, the action fails and
    logs the reason.


    ### Additional Notes

    This action requires a valid Request ID that exists within the ServiceDesk Plus
    instance.
