Create Alert Request:
  ai_description: >-
    Creates a new request (ticket) in ServiceDesk Plus V3 that is specifically associated
    with the current Google SecOps alert. The action automatically populates the request's
    description with the Siemplify Alert ID and Alert Name to maintain traceability
    between the two systems.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject/title of the request to be created. |

    | Requester | String | Yes | The name of the requester. If not specified in the
    external system, it usually defaults to the API key user. |

    | Assets | String | No | A comma-separated list of asset names to associate with
    the request. |

    | Status | String | No | The initial status of the request (e.g., Open, In Progress).
    |

    | Technician | String | No | The name of the technician to assign to the request.
    |

    | Priority | String | No | The priority level of the request. |

    | Urgency | String | No | The urgency level of the request. |

    | Category | String | No | The category classification for the request. |

    | Request Template | String | No | The specific template to use for creating the
    request. |

    | Request Type | String | No | The type of request (e.g., Incident, Service Request).
    |

    | Due By Time (ms) | Integer | No | The due date for the request expressed in
    Unix milliseconds. |

    | Mode | String | No | The mode of the request (e.g., E-mail, Phone). |

    | Level | String | No | The level of the request. |

    | Site | String | No | The site to which this request belongs. |

    | Group | String | No | The group to which this request belongs. |

    | Impact | String | No | The impact level of the request. |


    ### Additional Notes

    - This action does not run on specific entities; it operates at the alert level.

    - If a parameter is set to "None" (case sensitive), the integration logic treats
    it as an empty value for dropdown-based fields.


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (API Root, API Key,
    SSL verification) and extracts all action parameters.

    2. **Context Building**: Automatically generates a description string containing
    the `external_id` and `name` of the current Google SecOps alert.

    3. **API Interaction**: Sends a POST request to the ServiceDesk Plus V3 API (`/requests`
    endpoint) with the provided metadata to create the ticket.

    4. **Result Processing**: Captures the API response, converts it to a JSON result,
    and marks the action as successful if the ticket is created.
