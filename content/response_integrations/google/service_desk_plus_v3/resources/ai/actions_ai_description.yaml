Create Request - Dropdown Lists:
  ai_description: >-
    ### General Description

    Creates a new request (ticket) in ServiceDesk Plus V3 using various input parameters,
    including dropdown selections for status, priority, urgency, category, and more.
    This action allows for detailed ticket creation by specifying core information
    like subject and requester, as well as organizational context like site, group,
    and technician assignment.


    ### Flow Description

    1. Extracts action parameters such as Subject, Requester, Description, and various
    dropdown fields.

    2. Initializes the ServiceDesk Plus V3 manager with API credentials.

    3. Constructs the payload, ignoring dropdown parameters set to "None".

    4. Makes a POST request to the ServiceDesk Plus API to create the new request.

    5. Returns the created request details as a JSON result.


    ### Additional Notes

    This action does not operate on specific SOAR entities; it is a standalone creation
    task.
