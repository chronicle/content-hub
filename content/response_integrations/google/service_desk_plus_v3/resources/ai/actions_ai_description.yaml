Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and a ServiceDesk Plus V3 instance. It ensures that the provided configuration
    parameters, such as the API Root and API Key, are correct and that the service
    is reachable over the network.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Api Root | The base URL of the ServiceDesk Plus instance (e.g., `https://sdp.example.com/api/v3/`).
    | String | Yes |

    | Api Key | The technician key used for authenticating API requests. | String
    | Yes |

    | Verify SSL | Specifies whether to verify the SSL certificate of the ServiceDesk
    Plus server. | Boolean | No (Default: False) |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Api Root`, `Api Key`, and
    `Verify SSL` settings from the integration configuration.

    2. **Manager Initialization:** It initializes the `ServiceDeskPlusManagerV3` using
    the extracted credentials and connection settings.

    3. **Connectivity Test:** The manager executes the `test_connectivity` method,
    which performs a `GET` request to the `/requests` endpoint of the ServiceDesk
    Plus API. To minimize data transfer, it requests a row count of zero.

    4. **Response Validation:** The action validates the HTTP response. If the status
    code indicates success (e.g., 200 OK), the connection is confirmed.

    5. **Final Result:** If successful, the action returns a positive result and a
    success message. If the request fails or an exception occurs, it logs the error
    and reports a failure.
