Create Request - Dropdown Lists:
  ai_description: >-
    Creates a new request (ticket) in ServiceDesk Plus V3 using a variety of input
    parameters, many of which are provided as dropdown selections. This action allows
    for detailed ticket creation by specifying core information like subject and requester,
    as well as organizational context like site, group, and technician assignment.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves connection details (API Root,
    API Key) and a comprehensive set of ticket attributes from the user input.

    2. **Manager Initialization:** It initializes the `ServiceDeskPlusManagerV3` to
    handle API communication.

    3. **Payload Construction:** The action builds a JSON payload for the ServiceDesk
    Plus API. It specifically handles dropdown parameters by ignoring them if they
    are set to "None".

    4. **External API Call:** It executes a POST request to the ServiceDesk Plus 'requests'
    endpoint to create the new ticket.

    5. **Result Processing:** Upon success, the details of the newly created request
    are returned as JSON results in the SOAR platform.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Subject** | String | Yes | The summary or title of the request. |

    | **Requester** | String | Yes | The name of the person requesting the service.
    If omitted, the API key user is typically used. |

    | **Description** | String | No | Detailed information about the request. |

    | **Assets** | String | No | Comma-separated list of asset names to associate
    with the request. |

    | **Status** | Dropdown | No | The initial status of the request (e.g., Open,
    In Progress). |

    | **Technician** | String | No | The name of the technician to assign to the request.
    |

    | **Priority** | Dropdown | No | The priority level (e.g., Low, Normal, High).
    |

    | **Urgency** | Dropdown | No | The urgency level (e.g., Low, Urgent). |

    | **Category** | Dropdown | No | The IT category for the request (e.g., Network,
    Software). |

    | **Request Template** | String | No | The name of the ServiceDesk Plus template
    to use for creation. |

    | **Request Type** | Dropdown | No | The type of request (e.g., Incident, Request
    For Information). |

    | **Due By Time (ms)** | Integer | No | The deadline for the request in Unix epoch
    milliseconds. |

    | **Mode** | Dropdown | No | The channel through which the request was received
    (e.g., E-mail, Web Form). |

    | **Level** | Dropdown | No | The support tier level (e.g., Tier 1, Tier 2). |

    | **Site** | String | No | The physical or logical site the request belongs to.
    |

    | **Group** | String | No | The support group assigned to the request. |

    | **Impact** | Dropdown | No | The business impact of the request (e.g., Low,
    High). |


    ### Additional Notes:

    - This action does not operate on specific SOAR entities; it is a standalone creation
    task.

    - Dropdown parameters set to "None" are treated as empty and will not be sent
    to the external system.
