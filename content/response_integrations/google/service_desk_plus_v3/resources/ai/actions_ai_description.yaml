Create Request:
  ai_description: >-
    ### General Description

    Creates a new request in ServiceDesk Plus V3. This action allows users to programmatically
    generate tickets within the ServiceDesk Plus environment by providing various
    details such as subject, requester, description, and priority. It is typically
    used for incident management or service request fulfillment within a SOAR workflow.


    ### Flow Description

    1. Extracts the provided action parameters including Subject, Requester, Description,
    and other ticket attributes.

    2. Initializes the ServiceDesk Plus API manager with the integration's credentials.

    3. Constructs a JSON payload containing the request attributes, excluding any
    parameters set to 'None'.

    4. Sends a POST request to the ServiceDesk Plus 'requests' endpoint to create
    the ticket.

    5. Captures the API response, including the new Request ID and metadata, and attaches
    it as a JSON result to the action.


    ### Additional Notes

    None.
