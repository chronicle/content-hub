Wait For Field Update:
  ai_description: >-
    ### General Description

    This action is an asynchronous control-flow mechanism designed to pause a playbook's
    execution until a specific field within a ServiceDesk Plus V3 request reaches
    a desired state. It periodically polls the ServiceDesk Plus API to retrieve the
    latest request data and compares a specified field's value against a list of target
    values. This is particularly useful for waiting for manual approvals, status changes,
    or technician assignments before proceeding with automated response steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Request ID** | String | Yes | The unique identifier of the ServiceDesk Plus
    request to monitor. |

    | **Values** | String | Yes | A comma-separated list of target values. The action
    will complete successfully if the monitored field matches any value in this list.
    |

    | **Field Name** | String | Yes | The name of the field to monitor. Supports dot
    notation (e.g., `status.name`) to access nested JSON properties within the request
    object. |


    ### Additional Notes

    * **Asynchronous Execution:** This action is marked as `IsAsync`. If the condition
    is not met during the first check, the action will enter an 'In Progress' state
    and retry based on the environment's polling configuration.

    * **Timeout Configuration:** Users should adjust the action's timeout in the IDE
    to ensure it has enough time to wait for the expected update.

    * **Field Flattening:** The action flattens the request JSON, converting nested
    structures into underscore-separated keys (e.g., `status.name` becomes `status_name`)
    for comparison.


    ### Flow Description

    1. **Initialization:** Retrieves API credentials and action parameters (`Request
    ID`, `Field Name`, and target `Values`).

    2. **Data Retrieval:** Calls the ServiceDesk Plus V3 API to fetch the current
    details of the specified request.

    3. **Data Transformation:** Flattens the resulting JSON object to simplify access
    to nested fields.

    4. **Comparison Logic:** Extracts the current value of the specified `Field Name`
    and compares it against the provided list of `Values`.

    5. **State Determination:**
        * If the current value matches any of the target values, the action completes
    successfully and returns the full request JSON.
        * If the value does not match, the action remains 'In Progress' to be retried
    later.
        * If the field cannot be found in the request data, the action completes with
    a failure message.
