Add Note And Wait For Reply:
  ai_description: >-
    ### General Description

    Adds a note to a specific request in ServiceDesk Plus and waits for the operation
    to be confirmed. This action is asynchronous, meaning it initiates the note creation
    and then periodically checks the status until the note is successfully indexed
    and retrievable from the system.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request ID | String | Yes | The unique identifier of the ServiceDesk Plus request
    (ticket) where the note will be added. |

    | Note | String | Yes | The actual text content of the note. |

    | Show To Requester | Boolean | No | If set to `True`, the note will be visible
    to the person who opened the request. Default is `False`. |

    | Notify Technician | Boolean | No | If set to `True`, the technician assigned
    to the request will receive a notification about the new note. Default is `False`.
    |

    | Mark First Response | Boolean | No | If set to `True`, this note will be recorded
    as the 'First Response' for SLA tracking purposes. Default is `False`. |

    | Add To Linked Requests | Boolean | No | If set to `True`, the note will also
    be added to any requests linked to the primary Request ID. Default is `False`.
    |


    ### Additional Notes

    This action is designed to handle both newer (v12+) and older versions of the
    ServiceDesk Plus API by attempting multiple payload structures for the note creation.
    Because it is an asynchronous action, ensure the IDE timeout for the action is
    configured to allow for polling cycles.


    ### Flow Description

    1. **Initialization**: Extracts API configuration and action parameters.

    2. **Start Operation (First Run)**: Sends a POST request to ServiceDesk Plus to
    create the note using the provided parameters. It then fetches the current list
    of notes to establish a baseline and sets the action status to `IN_PROGRESS`.

    3. **Query Status (Subsequent Runs)**: Retrieves the list of notes for the request
    and identifies the latest note ID. It then attempts to fetch that specific note
    to verify it has been fully processed by the external system.

    4. **Completion**: Once the note is successfully retrieved, the action attaches
    the raw note data to the result and marks the execution as `COMPLETED`.
