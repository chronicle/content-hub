Get Request:
  ai_description: >-
    ### General Description

    The **Get Request** action retrieves comprehensive details about a specific request
    within ServiceDesk Plus. It is used to fetch the current status, requester information,
    priority, and other metadata associated with a ticket ID. This action is useful
    for playbooks that need to verify the state of a ticket or retrieve information
    from a service desk ticket to inform subsequent logic.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the specific `Request ID` from
    the action parameters.

    2. **API Interaction**: It establishes a connection to the ServiceDesk Plus instance
    and performs a GET request to the `requests/{request_id}` endpoint via the `ServiceDeskPlusManagerV3`.

    3. **Data Processing**: The action validates the response. If the request is found,
    it parses the data into a structured `Request` object.

    4. **Output**: The retrieved request details are returned as a JSON object via
    `add_result_json`, and the action completes successfully.


    ### Additional Notes

    - This action does not interact with Google SecOps entities; it operates solely
    based on the provided `Request ID` parameter.

    - If the Request ID does not exist, the action will fail with a specific error
    indicating the request was not found.
