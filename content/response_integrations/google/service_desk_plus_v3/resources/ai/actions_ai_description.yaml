Wait For Status Update:
  ai_description: >-
    ### General Description

    This action polls ServiceDesk Plus V3 to monitor the status of a specific request
    (ticket) and waits until it reaches one of the desired statuses. It is an asynchronous
    action designed for workflow orchestration, allowing a playbook to pause until
    an external ticket is updated to a specific state (e.g., 'Closed' or 'Resolved').


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request ID | String | Yes | The unique identifier of the request in ServiceDesk
    Plus that the action should monitor. |

    | Values | String | Yes | A comma-separated list of target statuses (e.g., 'Closed,Resolved').
    The action will successfully complete only when the request's status matches one
    of these values. |


    ### Additional Notes

    - **Asynchronous Execution**: This action is marked as `IsAsync`. If the desired
    status is not met during a check, the action returns an 'In Progress' state, triggering
    the Google SecOps platform to re-execute the script at a later interval.

    - **Timeout Configuration**: Users should ensure the action's timeout in the IDE
    is configured to accommodate the expected duration of the wait period.

    - **Case Sensitivity**: The status comparison is direct; ensure the values provided
    in the 'Values' parameter exactly match the status names in ServiceDesk Plus.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and the
    specific 'Request ID' and 'Values' from the input.

    2. **API Request**: It performs a GET request to the ServiceDesk Plus API to fetch
    the current metadata of the specified request.

    3. **Status Verification**: The logic extracts the current status of the ticket
    from the API response.

    4. **Condition Check**: It compares the current status against the list of desired
    statuses provided by the user.

    5. **State Management**:
        - If a match is found: The action sets the execution state to `COMPLETED`,
    attaches the request details as a JSON result, and finishes.
        - If no match is found: The action sets the execution state to `IN_PROGRESS`,
    which causes the platform to poll again later.
    6. **Error Handling**: If the request cannot be found or the API returns an error,
    the action will fail with a descriptive error message.
