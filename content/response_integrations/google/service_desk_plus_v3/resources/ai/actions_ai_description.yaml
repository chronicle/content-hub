Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific request in ServiceDesk Plus V3. This action allows users
    to append information, updates, or internal comments to an existing ticket, with
    options to control visibility and notifications.


    ### Flow Description

    1. **Initialization**: The action initializes the ServiceDesk Plus manager using
    the provided API credentials and connection settings.

    2. **Parameter Extraction**: It retrieves the Request ID, Note content, and optional
    flags (visibility, notifications, etc.) from the action input.

    3. **API Interaction**: The action attempts to post the note to the ServiceDesk
    Plus API. It includes a fallback mechanism: it first tries the modern API payload
    structure (`note` key), and if that fails, it retries using the legacy structure
    (`request_note` key) to ensure compatibility across different ServiceDesk Plus
    versions.

    4. **Result Handling**: Upon success, the action returns the details of the created
    note as a JSON object. If an error occurs, it logs the failure and reports it
    to the SOAR platform.


    ### Additional Notes

    This action does not run on entities and requires a specific Request ID to be
    provided manually or via a previous playbook step.
