name: Create Request - Dropdown Lists
description: Create a new request
integration_identifier: ServiceDeskPlusV3
parameters:
-   name: Subject
    default_value: ''
    type: string
    description: The subject of the request.
    is_mandatory: true
-   name: Requester
    default_value: ''
    type: string
    description: The requester of the request. If not specified, set to the user of
        the API key.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: The description of the request.
    is_mandatory: false
-   name: Assets
    default_value: ''
    type: string
    description: Names of Assets to be associated with the request
    is_mandatory: false
-   name: Status
    default_value: None
    type: ddl
    optional_values:
    - None
    - Open
    - Assigned
    - Onhold
    - In Progress
    - Resolved
    - Closed
    description: The status of the request.
    is_mandatory: false
-   name: Technician
    default_value: ''
    type: string
    description: The name of the technician assigned to the request.
    is_mandatory: false
-   name: Priority
    default_value: None
    type: ddl
    optional_values:
    - None
    - Low
    - Normal
    - Medium
    - High
    description: The priority of the request.
    is_mandatory: false
-   name: Urgency
    default_value: None
    type: ddl
    optional_values:
    - None
    - Low
    - Normal
    - High
    - Urgent
    description: The urgency of the request.
    is_mandatory: false
-   name: Category
    default_value: None
    type: ddl
    optional_values:
    - None
    - Desktop Hardware
    - General
    - Internet
    - Network
    - Operating System
    - Printers
    - Routers
    - Services
    - Software
    - Switches
    - Telephone
    - User Administration
    description: The category of the request.
    is_mandatory: false
-   name: Request Template
    default_value: ''
    type: string
    description: The template of the request.
    is_mandatory: false
-   name: Request Type
    default_value: None
    type: ddl
    optional_values:
    - None
    - Incident
    - Request For Information
    description: 'The type of the request. i.e: Incident, Service Request, etc.'
    is_mandatory: false
-   name: Due By Time (ms)
    default_value: ''
    type: string
    description: The due date of the request in milliseconds.
    is_mandatory: false
-   name: Mode
    default_value: None
    type: ddl
    optional_values:
    - None
    - Chat
    - E-mail
    - Phone Call
    - Web Form
    description: 'The mode in which this request is created.Example : E-mail'
    is_mandatory: false
-   name: Level
    default_value: None
    type: ddl
    optional_values:
    - None
    - Tier 1
    - Tier 2
    - Tier 3
    - Tier 4
    description: The level of the request.
    is_mandatory: false
-   name: Site
    default_value: ''
    type: string
    description: Denotes the site to which this request belongs
    is_mandatory: false
-   name: Group
    default_value: ''
    type: string
    description: Group to which this request belongs
    is_mandatory: false
-   name: Impact
    default_value: None
    type: ddl
    optional_values:
    - None
    - Low
    - Medium
    - High
    description: The impact of the request.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_request_dropdown_lists_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
