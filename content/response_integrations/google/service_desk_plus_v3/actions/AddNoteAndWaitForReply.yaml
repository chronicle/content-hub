name: Add Note And Wait For Reply
description: 'Add a note to a request. Note: Please update the actual time you would
    like the action to run in the IDE timeout section for this action.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus-v3#add_note_and_wait_for_reply
integration_identifier: ServiceDeskPlusV3
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The requests' ID.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: The note's content.
    is_mandatory: true
-   name: Show To Requester
    default_value: 'False'
    type: boolean
    description: Specify whether the note should be shown to the requester or not.
    is_mandatory: false
-   name: Notify Technician
    default_value: 'False'
    type: boolean
    description: 'Specify whether the note should be shown to the requester or not '
    is_mandatory: false
-   name: Mark First Response
    default_value: 'False'
    type: boolean
    description: Specify whether this note should be marked as first response
    is_mandatory: false
-   name: Add To Linked Requests
    default_value: 'False'
    type: boolean
    description: Specify whether this note should be added to the linked requests
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_note_and_wait_for_reply_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
