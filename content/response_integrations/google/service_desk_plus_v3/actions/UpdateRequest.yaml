name: Update Request
description: Update a ServiceDesk Plus request via it’s ID
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus-v3#update_request
integration_identifier: ServiceDeskPlusV3
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The ID of the request to update.
    is_mandatory: true
-   name: Subject
    default_value: ''
    type: string
    description: The subject of the request.
    is_mandatory: false
-   name: Requester
    default_value: ''
    type: string
    description: The requester of the request. If not specified, set to the user of
        the API key.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: The description of the request.
    is_mandatory: false
-   name: Assets
    default_value: ''
    type: string
    description: Names of Assets to be associated with the request
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: The status of the request.
    is_mandatory: false
-   name: Technician
    default_value: ''
    type: string
    description: The name of the technician assigned to the request.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: The priority of the request.
    is_mandatory: false
-   name: Urgency
    default_value: ''
    type: string
    description: The urgency of the request.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The category of the request.
    is_mandatory: false
-   name: Request Template
    default_value: ''
    type: string
    description: The template of the request.
    is_mandatory: false
-   name: Request Type
    default_value: ''
    type: string
    description: 'The type of the request. i.e: Incident, Service Request, etc.'
    is_mandatory: false
-   name: Due By Time (ms)
    default_value: ''
    type: string
    description: The due date of the request in milliseconds.
    is_mandatory: false
-   name: Mode
    default_value: ''
    type: string
    description: 'The mode in which this request is created.Example : E-mail'
    is_mandatory: false
-   name: Level
    default_value: ''
    type: string
    description: The level of the request.
    is_mandatory: false
-   name: Site
    default_value: ''
    type: string
    description: Denotes the site to which this request belongs
    is_mandatory: false
-   name: Group
    default_value: ''
    type: string
    description: Group to which this request belongs
    is_mandatory: false
-   name: Impact
    default_value: ''
    type: string
    description: The impact of the request.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_request_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
