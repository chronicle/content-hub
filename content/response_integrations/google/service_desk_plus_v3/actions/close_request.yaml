name: Close Request
description: Close a request
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus-v3#close_request
integration_identifier: ServiceDeskPlusV3
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The requests' ID.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Closing comment.
    is_mandatory: true
-   name: Resolution Acknowledged
    default_value: 'False'
    type: boolean
    description: Whether the resolution of the request is acknowledged or not.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/close_request_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
