name: Wait For Field Update
description: 'Wait for a field of a request ot update to a desired value. Note: Please
    update the actual time you would like the action to run in the IDE timeout section
    for this action.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus-v3#wait_for_field_update
integration_identifier: ServiceDeskPlusV3
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The ID of the request.
    is_mandatory: true
-   name: Values
    default_value: ''
    type: string
    description: Desired values for the given field.
    is_mandatory: true
-   name: Field Name
    default_value: ''
    type: string
    description: The name of the field to be updated.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_field_update_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
