Block Entities:
  ai_description: >-
    ### General Description

    Blocks specified entities (IP addresses, hostnames, URLs, file hashes, email subjects,
    and email addresses) within the Symantec Email Security.Cloud platform. This action
    allows security analysts to automate the remediation of malicious indicators by
    adding them to the Symantec blocklist, preventing further interaction with these
    entities across the organization's email environment.


    ### Flow Description

    1. **Initialization**: The action initializes the `SymantecEmailSecurityCloudManager`
    using the provided API credentials and configuration parameters.

    2. **Entity Processing**: The action iterates through the `target_entities` provided
    in the case.

    3. **Filtering**: It filters entities based on supported types: `ADDRESS`, `HOSTNAME`,
    `USER`, `URL`, `FILEHASH`, and `EMAILMESSAGE`.

    4. **Validation**: For `FILEHASH` entities, it validates that the hash is either
    MD5 or SHA-256. For `USER` entities, it validates that the identifier is a properly
    formatted email address.

    5. **API Interaction**: The action constructs a payload containing the validated
    entities and their corresponding IOC types, then sends a POST request to the Symantec
    Email Security.Cloud API (`/domains/global/iocs/upload?api-list-action=MERGE`)
    to block the entities.

    6. **Result Handling**: It processes the API response to determine which entities
    were successfully blocked and which failed, updating the action results accordingly.


    ### Additional Notes

    - Only MD5 and SHA-256 hashes are supported for file hash entities.

    - The action supports multiple remediation actions, such as 'Block and Delete',
    'Quarantine', 'Redirect', 'Tag Subject', or 'Append Header', which can be configured
    via the 'Remediation Action' parameter.
  ai_short_description: >-
    Blocks malicious entities (IPs, URLs, Hashes, etc.) in Symantec Email Security.Cloud
    to prevent further interaction.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
