Ping:
  ai_description: >-
    Tests connectivity to the Symantec Email Security.Cloud server using the provided
    configuration parameters.


    ### Flow Description

    1. Extract configuration parameters: `IOC API Root`, `Username`, `Password`, and
    `Verify SSL`.

    2. Initialize the `SymantecEmailSecurityCloudManager` with these credentials.

    3. Execute the `test_connectivity` method, which performs an HTTP GET request
    to the configured API endpoint.

    4. Validate the response status.

    5. Return a success or failure message based on the connectivity result.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Symantec Email Security.Cloud API.
