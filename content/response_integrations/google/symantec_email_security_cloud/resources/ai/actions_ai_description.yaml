Block Entities:
  ai_description: >-
    ### General Description

    Blocks specified entities (such as IP addresses, hostnames, URLs, file hashes,
    and email addresses) in Symantec Email Security.Cloud by adding them to the global
    IOC list with a specified remediation action.


    ### Flow Description

    1. Extracts the action parameters: `Remediation Action` and `Description`.

    2. Iterates over the target entities and filters them based on supported types
    (Address, Hostname, User, URL, Filehash, Email Message).

    3. Validates the entities: ensures file hashes are either MD5 or SHA256, and verifies
    that user entities are valid email addresses.

    4. Maps the validated entities to their corresponding Symantec Email Security.Cloud
    IOC types.

    5. Makes a POST request to the Symantec Email Security.Cloud API (`/domains/global/iocs/upload?api-list-action=MERGE`)
    to block the mapped IOCs with the specified remediation action and description.

    6. Returns a JSON result containing the success or failure status for each processed
    entity.


    ### Additional Notes

    Only MD5 and SHA256 hashes are supported. All entities are treated as "sender
    IOCs" during blocking.
  ai_short_description: >-
    Blocks specified entities in Symantec Email Security.Cloud by adding them to the
    global IOC list with a specified remediation action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified entities to the global IOC blocklist in Symantec Email Security.Cloud.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to an external API (`/domains/global/iocs/upload`)
      to block entities, which mutates external data. It does not fetch enrichment
      data, update internal entities, or create insights/case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: true
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      if `entity.entity_type` is in `SUPPORTED_ENTITIES` (ADDRESS, HOSTNAME, USER,
      URL, FILEHASH, EMAILMESSAGE). It also extracts the original identifier using
      `entity.additional_properties.get("OriginalIdentifier", entity.identifier)`,
      meaning it filters by additional properties and identifier. It further validates
      the identifier length for hashes and uses a regex for user entities.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: true
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action makes a POST request to Symantec Email Security.Cloud to upload IOCs
      to a blocklist, effectively preventing future interaction with these indicators.
      This directly matches the 'Add IOC To Blocklist' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Remediation Action | Dropdown | No | Specify the remediation action for the
    entities (e.g., Block and Delete, Quarantine, Redirect, Tag Subject, Append Header).
    Default is 'Block and Delete'. |

    | Description | String | Yes | Specify a description that should be added to the
    blocked entities. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Email Security.Cloud instance using the provided
    integration configuration parameters. This action ensures that the API credentials
    and network settings are valid.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Symantec Email Security.Cloud manager.

    3. Makes an HTTP GET request to the `/domains/global/iocs/download` endpoint to
    verify authentication and connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to ensure the integration
    is configured correctly and can communicate with the Symantec Email Security.Cloud
    API.
  ai_short_description: >-
    Tests connectivity to the Symantec Email Security.Cloud instance to verify that
    the integration is configured correctly and can communicate with the API.
