    external_data_mutation_explanation: >-
      Creates a new CaseComment on a specific case record in Salesforce.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to Salesforce to create a CaseComment, which
      mutates external data. It does not fetch contextual enrichment data for entities,
      nor does it mutate internal SecOps data, update entities, or create internal
      insights/case comments.
