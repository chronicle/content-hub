    3. Executes a global search query across Salesforce records to identify matching
    items.

    4. Retrieves detailed properties for the matched records by executing specific
    SOQL queries for each record type (Cases, Contacts, Leads, Tasks, Users).

    5. Formats the retrieved records into CSV data tables and attaches them to the
    action results, along with the raw JSON data.


    ### Additional Notes

    The action returns separate data tables for each Salesforce record type that contains
    matching results.
