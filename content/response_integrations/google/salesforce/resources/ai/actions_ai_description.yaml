List Cases:
  ai_description: >-
    ### General Description

    Retrieves a list of all existing cases from Salesforce. This action queries the
    Salesforce instance for all case records and returns their details, including
    properties like CaseNumber, Subject, Status, and Priority.


    ### Flow Description

    1. Initializes the Salesforce integration using the provided configuration credentials.

    2. Makes an API call to Salesforce to execute a SOQL query against the `Case`
    object, fetching predefined case properties.

    3. Formats the retrieved case records into a CSV structure and attaches it to
    the action's results as a data table.

    4. Returns the raw case data as a JSON result for further use in the playbook.


    ### Additional Notes

    This action does not require any input parameters and will return all cases available
    to the configured Salesforce user. Depending on the volume of cases in the Salesforce
