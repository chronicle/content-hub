Search Records:
  ai_description: >-
    ### General Description

    Searches for records within Salesforce that match a provided query pattern. This
    action utilizes Salesforce Object Search Language (SOSL) to perform a broad search
    across multiple object types, including Cases, Contacts, Leads, Tasks, and Users,
    and subsequently retrieves detailed information for the matching records.


    ### Flow Description

    1. The action initializes a connection to the Salesforce instance using the configured
    credentials.

    2. It retrieves the search query string from the action parameters.

    3. The action executes a SOSL search via the Salesforce API (`self.sf.search`)
