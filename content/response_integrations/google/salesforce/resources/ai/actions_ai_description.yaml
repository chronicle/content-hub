Update Case:
  ai_description: >-
    ### General Description

    Updates an existing case in Salesforce using the provided case number. This action
    allows users to modify various case attributes such as subject, status, description,
    origin, priority, and type directly from the SOAR platform.


    ### Flow Description

    1. Retrieves the target Case Number and any optional update parameters (Subject,
    Status, Description, Origin, Priority, Type) from the action configuration.

    2. Queries the Salesforce API to retrieve the internal Case ID associated with
    the provided Case Number.

    3. Sends an update request to the Salesforce API to modify the specified fields
    of the case.

    4. Returns a success message to the SOAR platform upon successful update.


    ### Additional Notes

    Ensure that the provided Case Number exists in Salesforce, otherwise the action
    will fail to retrieve the internal Case ID required for the update.
  ai_short_description: >-
    Updates an existing case in Salesforce with new attribute values such as status,
    priority, and description.
