Create Case:
  ai_description: >-
    ### General Description

    Creates a new case record within the Salesforce platform. This action allows users
    to programmatically generate support or incident cases by providing specific details
    such as subject, status, priority, and origin, facilitating seamless integration
    between security operations and customer relationship management workflows.


    ### Flow Description

    1. The action initializes the `SalesforceManager` using the provided integration
    configuration (API Root, Username, Password, Token, and SSL verification settings).

    2. It retrieves the input parameters: `Subject`, `Status`, `Description`, `Origin`,
    `Priority`, and `Type` from the action configuration.

    3. The action calls the `create_case` method of the `SalesforceManager`, which
    performs a POST request to the Salesforce API to create the new case.

    4. Upon successful creation, the manager retrieves the full details of the newly
    created case using its ID.

    5. The action outputs a success message containing the new `CaseNumber` to the
    SOAR platform.


    ### Additional Notes

    This action interacts directly with the Salesforce API. Ensure the provided credentials
    have the necessary permissions to create cases in the target Salesforce instance.
