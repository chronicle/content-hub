Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to an existing Salesforce case. This action allows analysts to
    append notes or updates directly to a case record within Salesforce, facilitating
    better communication and documentation within the external ticketing system.


    ### Flow Description

    1. The action initializes the `SalesforceManager` using the provided integration
    credentials.

    2. It retrieves the specific case ID from Salesforce by calling the `get_case_by_number`
    method, which performs a query against the Salesforce Case object.

    3. The action constructs the comment body by combining the provided `Title` and
    `Body` parameters.

    4. It executes the `add_comment` method, which makes an API call to the Salesforce
    `CaseComment.create` endpoint to attach the new comment to the identified case.


    ### Additional Notes

    This action performs a mutation on external data by creating a new record in the
    Salesforce CaseComment object. It requires a valid Salesforce Case Number to function
    correctly.
  ai_short_description: >-
    Adds a comment to an existing Salesforce case.
