Close Case:
  ai_description: >-
    ### General Description

    Closes a specific case in Salesforce. This action retrieves the case details from
    Salesforce using the provided case number and updates its status to 'Closed'.


    ### Flow Description

    1. Initialize the Salesforce manager using the provided configuration (API Root,
    Username, Password, Token).

    2. Retrieve the `Case Number` parameter from the action inputs.

    3. Call the Salesforce API via `get_case_by_number` to fetch the case details
    and retrieve the internal Salesforce `Id`.

    4. Call the Salesforce API via `close_case` (which triggers an update operation)
    to set the case status to 'Closed'.

    5. Return a success message indicating the case has been closed.


    ### Additional Notes

    This action requires valid Salesforce credentials and connectivity to the Salesforce
    instance. It performs a state change on the external Salesforce system.
