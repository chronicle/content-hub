Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific case in Salesforce. This action interacts with the
    Salesforce API to append a new comment containing a title and body to an existing
    case record.


    ### Flow Description

    1. Retrieves the Salesforce case details by querying the provided `Case Number`.

    2. Extracts the internal Salesforce Case ID from the retrieved record.

    3. Makes a POST API call to Salesforce to create a new `CaseComment` associated
    with the Case ID, combining the provided `Title` and `Body`.

    4. Returns a success message to the SecOps platform upon successful creation.


    ### Additional Notes

    This action modifies data in an external system (Salesforce) and does not operate
    on Google SecOps entities.
  ai_short_description: >-
    Adds a comment to a specific case in Salesforce using the provided case number,
    title, and body.
