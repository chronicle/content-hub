Update Case:
  ai_description: >-
    ### General Description

    Updates an existing case record within Salesforce. This action allows analysts
    to modify specific fields of a case, such as its status, priority, description,
    or type, by referencing the case number.


    ### Flow Description

    1. The action initializes the Salesforce manager using the provided integration
    configuration (credentials and server address).

    2. It retrieves the input parameters, including the mandatory `Case Number` and
    optional fields like `Subject`, `Status`, `Description`, `Origin`, `Priority`,
    and `Type`.

    3. The action calls the `get_case_by_number` method to query Salesforce and retrieve
    the internal `Id` associated with the provided `Case Number`.

    4. Using the retrieved `Id`, the action executes the `update_case` method to apply
    the specified changes to the Salesforce case record.

    5. Upon successful completion, the action returns a success message indicating
    the case has been updated.


    ### Additional Notes

    This action requires valid Salesforce credentials configured in the integration
    settings. It performs a lookup to resolve the case number to an internal ID before
    applying updates.
