name: Update Case
description: Update a case
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/salesforce#update_case
integration_identifier: Salesforce
parameters:
-   name: Case Number
    type: string
    description: The number of the case.
    is_mandatory: true
-   name: Subject
    type: string
    description: The case's subject
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: 'The case''s status. Valid values: New, On Hold, Closed, Escalated'
    is_mandatory: false
-   name: Description
    type: string
    description: The description of the subject.
    is_mandatory: false
-   name: Origin
    type: string
    description: 'The origin of the case. Valid values: Email, Phone, Web'
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: 'The case''s priority. Valid values: Low, Medium, High'
    is_mandatory: false
-   name: Type
    type: string
    description: 'The case type. Valid values: Question, Problem, Feature Request'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
