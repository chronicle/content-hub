[project]
name = "IronScales"
version = "7.0"
description = "IronScales is a comprehensive, people-powered email security platform. IronScales allow you to defend yourself against the full spectrum of phishing threats when and where they are most likely to cause damage – at the mailbox level. Ironscales helps customers leverage more people and expertise against threats than any other solution, based on how it structures its decentralized intelligence and AI-powered incident response and remediation."
requires-python = ">=3.11,<3.12"
dependencies = [ "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.10-py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
