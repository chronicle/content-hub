Get Mitigation Impersonation Details:
  ai_description: >-
    ### General Description

    Fetches company impersonation mitigation details from IronScales for a specified
    time period. This action retrieves a list of impersonation attempts and their
    associated mitigation data, allowing analysts to review recent impersonation activity
    within the organization.


    ### Flow Description

    1. The action initializes the `IronScalesManager` using the provided API credentials,
    company ID, and SSL verification settings.

    2. The selected `Period` parameter is mapped to the corresponding integer value
    required by the IronScales API.

    3. The action performs a GET request to the IronScales API endpoint `appapi/mitigation/{company_id}/impersonation/details/`
    with the specified time period.

    4. The API response is parsed, and the resulting impersonation details are added
    to the action result as a JSON object.


    ### Additional Notes

    Results are limited to the latest 1000 incidents. Please note that the IDs returned
    by this action represent impersonation attempts, not standard incidents or reports;
    searching these IDs in other endpoints may not return the expected results.
