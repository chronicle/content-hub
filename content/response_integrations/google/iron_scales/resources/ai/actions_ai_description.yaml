  ai_description: >-
    Retrieves full incident details from IronScales based on provided incident IDs.
    This action connects to the IronScales API to fetch comprehensive information
    about specific incidents and returns the data as a JSON result.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Incidents IDs | String | Yes | A comma-separated list of incident IDs to fetch
    details for. This parameter dictates which incidents the action will query. |


    ### Flow Description

    1. Initializes the IronScales manager with the provided API credentials and configuration.

    2. Parses the comma-separated list of `Incidents IDs` provided in the parameters.

    3. Iterates through each incident ID and sends a GET request to the IronScales
    API to retrieve its details.

    4. Aggregates the successfully fetched incident details and outputs them as a
    JSON result.

    5. Reports any incident IDs that could not be found or fetched in the action's
    output messages.
