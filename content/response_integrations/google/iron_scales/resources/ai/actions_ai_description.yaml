Classify Incident:
  ai_description: >-
    ### General Description

    Changes the classification of specified incidents within IronScales. This action
    allows analysts to categorize incidents as Attack, False Positive, or Spam directly
    from the SOAR platform.


    ### Flow Description

    1. Extracts the provided incident IDs, the desired new classification, and the
    email address of the user performing the classification.

    2. Iterates through the list of provided incident IDs.

    3. For each incident, makes a GET request to the IronScales API to fetch the current
    incident details and retrieve its existing classification.

    4. Makes a POST request to the IronScales API to update the incident with the
    new classification, providing the old classification and the user's email.

    5. Compiles a list of successfully and unsuccessfully classified incidents and
    returns the results to the SOAR platform.


    ### Additional Notes

    The email address provided in the 'Classifying User Email' parameter must be a
    valid user recognized by the IronScales platform.
  ai_short_description: >-
    Changes the classification of specified incidents in IronScales.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the classification of specified incidents within the IronScales platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by calling the IronScales API to get the current incident
      details (old classification). It mutates external data by sending a POST request
      to update the incident's classification in IronScales. It does not mutate internal
      SecOps data, update entities, create insights, modify alert data, or create
      case comments.
