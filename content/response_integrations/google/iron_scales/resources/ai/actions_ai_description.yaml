Get Mitigations Per Mailbox:
  ai_description: >-
    ### General Description

    Fetches detailed information regarding incident mitigations per mailbox from the
    IronScales platform. This action allows analysts to retrieve mitigation data for
    specific incidents over a defined time period, facilitating investigation and
    reporting.


    ### Flow Description

    1. Extracts configuration parameters: `API Root`, `API Token`, `Company ID`, `Verify
    SSL`, and `Is Partner` to initialize the `IronScalesManager`.

    2. Extracts action parameters: `Incidents IDs` (a comma-separated list), `Period`
    (the time range for the search), and `Max Pages to Fetch`.

    3. Initializes the `IronScalesManager` with the provided credentials and configuration.

    4. Calls the `get_mitigations_per_mailbox` method, which performs a POST request
    to the IronScales API endpoint `appapi/mitigation/{company_id}/details/`.

    5. Handles pagination automatically if `Max Pages to Fetch` is greater than 1,
    aggregating results from multiple pages.

    6. If mitigations are found, adds the retrieved data to the action result JSON;
    otherwise, returns a message indicating no mitigations were found.


    ### Additional Notes

    This action requires valid IronScales API credentials and appropriate permissions
    (e.g., `company.view` or `partner.all` depending on the `Is Partner` setting).
