    1. Initializes the IronScales manager with the provided API credentials and company
    ID.

    2. Maps the selected time period to the corresponding IronScales API value.

    3. Sends a GET request to the IronScales API (`appapi/mitigation/{company_id}/incidents/details/`)
    to fetch incident mitigation details for the specified period.

    4. If mitigation details are found, they are parsed and returned as a JSON result.

