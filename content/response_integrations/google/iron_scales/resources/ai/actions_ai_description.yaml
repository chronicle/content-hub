Get Incident Details:
  ai_description: >-
    ### General Description

    Fetches detailed information for specific incidents from the IronScales platform.
    This action allows analysts to retrieve comprehensive data regarding identified
    incidents by providing their unique identifiers.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Token,
    Company ID, etc.) to establish a connection to the IronScales API.

    2. It retrieves the `Incidents IDs` parameter provided by the user.

    3. The action initializes the `IronScalesManager` to handle API communication.

    4. It iterates through the list of provided incident IDs.

    5. For each ID, it performs a GET request to the IronScales API endpoint (`appapi/incident/{company_id}/details/{incident_id}`)
    to fetch the incident details.

    6. Successful results are aggregated and returned as a JSON result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is read-only and does not modify any data within IronScales or the
    SOAR platform. It is designed to provide context for incident investigation.
