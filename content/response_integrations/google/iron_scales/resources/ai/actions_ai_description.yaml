  ai_description: >-
    Changes the classification of specific incidents in IronScales.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Incidents IDs | String | Yes | Specify a comma-separated list of incident IDs
    to classify. |

    | New Classification | Dropdown | Yes | Specify the new classification for these
    incidents (e.g., Attack, False positive, Spam). |

    | Classifying User Email | String | Yes | Specify the email address of the user
    performing the classification. This email must be recognized by IronScales. |


    ### Flow

    1. Extracts configuration and action parameters.

    2. Iterates over the provided list of incident IDs.

    3. Fetches the current details of each incident to retrieve its previous classification.

    4. Updates the classification of the incident in IronScales using the new classification
    and the classifying user's email.

    5. Returns a summary message detailing which incidents were successfully classified
    and which failed.
