Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves full incident details from IronScales based on provided incident IDs.
    This action queries the IronScales platform to gather comprehensive information
    about specific incidents and returns the data as a JSON result for further use
    in the playbook.


    ### Flow Description

    1. Extracts the provided comma-separated incident IDs from the action parameters.

    2. Iterates through the list of incident IDs.

    3. Makes a GET request to the IronScales API (`appapi/incident/{company_id}/details/{incident_id}`)
    to fetch the details for each incident.

    4. Aggregates the retrieved incident details and appends them to the action's
    JSON result.

    5. Returns a summary message indicating successful and failed fetches.


    ### Additional Notes

    The action expects a comma-separated list of incident IDs. If an incident ID is
    not found, it will be logged as a failure but will not stop the execution for
    other valid IDs.
