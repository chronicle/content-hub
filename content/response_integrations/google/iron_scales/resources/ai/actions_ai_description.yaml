Classify Incident:
  ai_description: >-
    ### General Description

    Updates the classification of incidents within the IronScales platform. This action
    allows analysts to change the classification status (e.g., Attack, False Positive,
    Spam) of one or more incidents by interacting with the IronScales API.


    ### Flow Description

    1. The action initializes the `IronScalesManager` using the provided API credentials
    and configuration.

    2. It parses the input `Incidents IDs` string into a list of individual incident
    identifiers.

    3. For each incident ID:
        * The action calls the `get_incident_details` API endpoint to retrieve the
    current incident information.
        * If the incident is found, it performs a `POST` request to the `classify_incident`
    API endpoint to update the classification, passing the new classification and
    the classifying user's email.
    4. The action tracks successful and failed classification attempts.

    5. Finally, it returns a summary message detailing the outcome of the classification
    process for each provided incident ID.


    ### Additional Notes

    This action requires valid IronScales API credentials and specific incident IDs.
    The `New Classification` parameter must be one of the supported values defined
    in the integration configuration.
  ai_short_description: >-
    Updates the classification of incidents within the IronScales platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the classification status of incidents within the IronScales platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches incident details (fetches_data) and performs a POST request
      to update the incident classification in the IronScales platform (can_mutate_external_data).
      It does not modify internal SecOps data or entities.
