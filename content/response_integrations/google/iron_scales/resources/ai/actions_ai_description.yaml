  ai_description: >-
    ### General Description

    The **Get Mitigations Per Mailbox** action retrieves details of mitigations applied
    per mailbox for specific incidents from IronScales. It fetches the mitigation
    data based on a provided list of incident IDs and a specified time period, returning
    the results as a JSON object.


    ### Flow Description

    1. The action initializes the IronScales integration using the provided API credentials.

    2. It parses the comma-separated list of incident IDs provided in the parameters.

    3. It sends a request to the IronScales API to fetch mitigation details for the
    specified incidents and time period, handling pagination up to the maximum number
    of pages.

    4. The retrieved mitigation details are added to the action's JSON results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | --- | --- | --- | --- | --- |

    | Incidents IDs | String | Yes | None | A comma-separated list of incident IDs
    to search for. |

    | Period | Dropdown | No | All time | The time period for which to get mitigations
    per mailbox (e.g., Last 24 hours, Last 7 days, All time). |

    | Max Pages to Fetch | String | Yes | 1 | The maximum number of pages of results
    to fetch from the API. |


    ### Additional Notes

    - Although the `Period` parameter is not mandatory, it defaults to "All time"
    if not explicitly provided.

    - The action uses a POST request to fetch data, but it acts as a query and does
    not modify any external state.
