name: Classify Incident
description: Change incidents classification.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ironscales#classify_incident
integration_identifier: IronScales
parameters:
-   name: Incidents IDs
    default_value: ''
    type: string
    description: Specify IDs of incidents to classify.
    is_mandatory: true
-   name: New Classification
    default_value: Attack
    type: ddl
    optional_values:
    - Attack
    - False positive
    - Spam
    description: 'Specify the new classification for these incidents. Note: For Phishing
        Attack classification enter “Attack”, for False positive: “False Positive”,
        for spam: “Spam”.'
    is_mandatory: true
-   name: Classifying User Email
    default_value: ''
    type: string
    description: 'Specify which user is performing the classification by providing
        his mail address. Note: This email address should be recognized by IronScales.'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
