name: Get Mitigations Per Mailbox
description: Get details of mitigations per mailbox.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ironscales#get_mitigations_per_mailbox
integration_identifier: IronScales
parameters:
-   name: Incidents IDs
    default_value: ''
    type: string
    description: Provide a comma separated list of incident IDs to search for.
    is_mandatory: true
-   name: Period
    default_value: All time
    type: ddl
    optional_values:
    - Last 24 hours
    - Last 7 days
    - Last 90 days
    - Last 180 days
    - Last 360 days
    - Current year to date
    - All time
    description: Specify the time period for which you would like to get mitigations
        per mailbox for.
    is_mandatory: false
-   name: Max Pages to Fetch
    default_value: 1
    type: string
    description: Specify the maximum number of pages you would like to fetch.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_mitigations_per_mailbox_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
