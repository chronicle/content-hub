identifier: ProofPointPS
name: Proofpoint Email Protection
parameters:
-   name: Api Root
    default_value: https://xxxxxxxx.pphosted.com:10000
    type: string
    description: The base URL of the Proofpoint Protection Server REST API instance.
    is_mandatory: true
    integration_identifier: ProofPointPS
-   name: Username
    default_value: ''
    type: string
    description: The API user authorized under Managed Modules.
    is_mandatory: true
    integration_identifier: ProofPointPS
-   name: Password
    default_value: ''
    type: password
    description: The API user password.
    is_mandatory: true
    integration_identifier: ProofPointPS
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, validates the SSL certificate of the Proofpoint server during API requests.
    is_mandatory: false
    integration_identifier: ProofPointPS
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/proofpoint-ps
categories:
- Email Security
- Security
