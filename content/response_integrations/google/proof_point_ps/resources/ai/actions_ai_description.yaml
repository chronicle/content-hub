Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and User entities using ProofPoint Email Protection. This action
    queries the ProofPoint API to retrieve email quarantine records associated with
    the entity (domain for hostnames, email address for users) and updates the entity's
    additional properties with the retrieved information.


    ### Flow Description

    1. Initialize the `ProofPointPSManager` using configuration parameters (Api Root,
    Username, Password, Verify SSL).

    2. Iterate through the provided target entities.

    3. For `HOSTNAME` entities, extract the domain and perform a search in ProofPoint
    for messages where the sender or recipient matches the domain.

    4. For `USER` entities, validate the identifier as an email address and perform
    a search in ProofPoint for messages where the sender or recipient matches the
    email address.

    5. For each retrieved record, remove specific fields (`dlpviolation`, `messagestatus`),
    flatten the record, and add it to the entity's `additional_properties`.

    6. Update the enriched entities in the SOAR platform.


    ### Additional Notes

    This action performs read-only operations on the ProofPoint API and updates the
    entity metadata within the SOAR platform.
  ai_short_description: >-
    Enriches Hostname and User entities by querying ProofPoint Email Protection for
    associated email quarantine records.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
