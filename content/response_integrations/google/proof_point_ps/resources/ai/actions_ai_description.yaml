Delete Quarantined Email:
  ai_description: >-
    ### General Description

    The "Delete Quarantined Email" action is used to delete quarantined messages from
    a specified folder in Proofpoint Protection Server.


    ### Flow Description

    1. Extracts the provided Message GUIDs, Folder Name, and optional Deleted Folder
    Name parameters.

    2. Validates that the source folder and the deleted folder are not identical.

    3. Performs a search query via the Proofpoint API to validate the existence of
    the provided GUIDs within the specified folder.

    4. Iterates through the validated GUIDs and sends a POST request to the Proofpoint
    API to execute the delete action on each message.

    5. Returns a JSON result containing the details of the successfully deleted records
    and an output message summarizing the operation.


    ### Additional Notes

    This action only works on messages that were created within the last 30 days.
  ai_short_description: >-
    Deletes quarantined messages from a specified folder in Proofpoint Protection
    Server.
