Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ProofPoint Protection Server. This action verifies that
    the integration is correctly configured and that the SOAR platform can successfully
    communicate with the ProofPoint API.


    ### Flow Description

    1. Initialize the `ProofPointPSManager` using the integration configuration (API
    Root, Username, Password, and SSL verification settings).

    2. Call the `test_connectivity` method.

    3. The `test_connectivity` method triggers a `GET` request to the ProofPoint API
    endpoint (`/rest/v1/quarantine`) with a wildcard sender parameter to verify the
    connection.

    4. Validate the HTTP response.

    5. Terminate the action with a success message if the connection is established.


    ### Additional Notes

    This action is used to validate that the ProofPoint Protection Server integration
    is correctly configured and reachable.
