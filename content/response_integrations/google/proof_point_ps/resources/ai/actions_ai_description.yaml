Ping:
  ai_description: >-
    ### General Description

    The Ping action is used to test and verify connectivity to the Proofpoint Email
    Protection server using the provided integration configuration credentials.


    ### Flow Description

    1. Initializes the Proofpoint API client using the configured server address and
    credentials.

    2. Executes a test connectivity request by making a GET request to the `/rest/v1/quarantine`
    endpoint (searching for quarantined emails with a wildcard sender).

    3. Evaluates the response and returns a success message if the connection is successfully
    established.

    4. If the connection fails, it catches the error and returns a failure message
    detailing the issue.


    ### Additional Notes

    This action does not interact with any specific case entities or alerts. It is
    primarily used by administrators to ensure the integration is configured correctly
    and the external service is reachable.
