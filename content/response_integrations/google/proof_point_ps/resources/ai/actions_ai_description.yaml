    ### General Description

    The "Resubmit Quarantined Email" action is used to resubmit specified quarantined
    messages in Proofpoint Protection Server. It processes messages that were created
    within the last 30 days and returns the details of the successfully resubmitted
    emails.


    ### Flow Description

    1. Extracts the `Message GUIDs` and `Folder Name` parameters.

    2. Validates the provided GUIDs by searching the specified folder via the Proofpoint
    API for messages created in the last 30 days.

    3. Iterates through the validated GUIDs and executes a POST request to the Proofpoint
    API (`/rest/v1/quarantine`) with the action set to `resubmit`.

    4. Collects the successfully resubmitted message records and returns them as a
    JSON result.


    ### Additional Notes

    - The action only works on messages that were created in the last 30 days.

