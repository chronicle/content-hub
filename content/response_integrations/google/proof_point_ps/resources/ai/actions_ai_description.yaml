Enrich Entities:
    ai_description: "### General Description\nThe **Enrich Entities** action retrieves\
        \ quarantine message information from **ProofPoint Email Protection (PS)**\
        \ for specific entities. It identifies email traffic associated with Hostnames\
        \ (via domain) and Users (via email address) to provide context on potential\
        \ mail-related security events.\n\n### Parameters\n| Parameter | Type | Mandatory\
        \ | Description |\n| :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This\
        \ action does not take any input parameters; it uses the global integration\
        \ configuration. |\n\n### Additional Notes\n* **User Validation**: User entities\
        \ are only processed if their identifier matches a standard email regex pattern.\n\
        * **Data Cleaning**: The action automatically strips `dlpviolation` and `messagestatus`\
        \ fields from the ProofPoint records before enrichment to maintain data relevance.\n\
        \n### Flow Description\n1. **Connection**: Establishes a session with the\
        \ ProofPoint PS API using the configured API Root and credentials.\n2. **Entity\
        \ Processing**: Iterates through target entities in the current context.\n\
        3. **Search Logic**:\n    * **Hostnames**: Extracts the domain from the hostname\
        \ and searches for quarantine\nrecords where the sender or recipient domain\
        \ matches.\n    * **Users**: Validates the email format and searches for quarantine\
        \ records\nwhere the user is the sender or recipient. 4. **Data Transformation**:\
        \ Flattens the resulting JSON records and applies a `ProofPointPS` prefix.\n\
        5. **Internal Update**: Updates the `additional_properties` of the entities\
        \ in Google SecOps and saves the changes."
    capabilities:
        can_create_case_comments: false
        can_create_insight: false
        can_modify_alert_data: false
        can_mutate_external_data: false
        can_mutate_internal_data: true
        can_update_entities: true
        external_data_mutation_explanation: null
        fetches_data: true
        internal_data_mutation_explanation: Updates the 'additional_properties' attribute
            of Hostname and User entities with flattened quarantine data retrieved
            from ProofPoint.
    categories:
        enrichment: true
    entity_usage:
        entity_types:
        - HOSTNAME
        - USERUNIQNAME
        filters_by_additional_properties: false
        filters_by_alert_identifier: false
        filters_by_case_identifier: false
        filters_by_creation_time: false
        filters_by_entity_type: true
