Move Quarantined Email:
  ai_description: >-
    ### General Description

    Moves quarantined email messages to a specified target folder in ProofPoint Protection
    Server.


    ### Flow Description

    1. Extracts the `Message GUIDs`, current `Folder Name`, and `Target Folder Name`
    from the action parameters.

    2. Validates that the current folder and target folder are not identical.

    3. Validates the existence of the provided GUIDs in the specified current folder
    by making a GET request to the ProofPoint quarantine search endpoint.

    4. Iterates through the validated GUIDs and executes a POST request to the ProofPoint
    quarantine endpoint to move each message to the target folder.

    5. Returns a JSON result containing the details of the successfully moved messages.


    ### Additional Notes

