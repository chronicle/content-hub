Download Quarantined Email:
    ai_description: '### General Description

        Downloads the raw quarantined email message data by GUID and attaches it securely
        to the case wall.

        ### Parameters Description

        | Parameter | Type | Mandatory | Description | | :--- | :--- | :--- | :---
        | | Message GUID | String | True | Global unique ID of the email message to
        download. |

        ### Flow Description

        1. **GET Request**: Executes GET /rest/v1/quarantine?guid=<guid> returning
        raw email bytes. 2. **Attachment Creation**: Writes bytes into a secure temporary
        `.eml` file. 3. **Flush**: Calls `self.soar_action.add_attachment()` to upload
        the raw EML directly to the case wall.'
    capabilities:
        can_create_case_comments: false
        can_create_insight: false
        can_modify_alert_data: false
        can_mutate_external_data: false
        can_mutate_internal_data: true
        can_update_entities: false
        external_data_mutation_explanation: null
        fetches_data: true
        internal_data_mutation_explanation: Attaches a raw EML email file to the case
            results in Google SecOps.
    categories:
        enrichment: false
    entity_usage:
        entity_types: []
