  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Message GUID | String | No | The global unique ID of the email message. |

    | Message ID | String | No | The header Message-ID value. |

    | Sender | String | No | Email address of the sender. |

    | Recipient | String | No | Email address of the recipient. |

    | Subject | String | No | The subject of the email. |

    | Time Frame | Dropdown | No | Specify a time frame for the results. If "Custom"
    is selected, you also need to provide "Start Time". |

    | Start Time | String | No | Specify the start time for the results. This parameter
    is mandatory, if "Custom" is selected for the "Time Frame" parameter. Format:
    ISO 8601. |

    | End Time | String | No | Specify the end time for the results. Format: ISO 8601.
    If nothing is provided and "Custom" is selected for the "Time Frame" parameter
    then this parameter will use current time. |

    | Folder Name | String | No | Quarantine folder name. Defaults to 'Quarantine'.
    |

    | Fetch DLP Violation | Dropdown | No | Dictates, if DLP violation information
    should be fetched alongside message information. |

    | Fetch Message Status | Boolean | No | If selected, fetches the message status
    and comments. |

    | Max Results To Return | String | No | Max results to return. Default: 100. Max:
    1000. |
