Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and User entities with quarantine details from Proofpoint Email
    Protection. This action searches for quarantined, spam, or virus emails associated
    with the entities and appends the findings to the entities' additional properties.


    ### Flow Description

    1. Iterates over the target entities, filtering for Hostname and User entity types.

    2. For Hostname entities, extracts the domain and makes an API call to Proofpoint
    to search for emails where the sender or recipient matches the domain in the "Quarantine",
    "Spam", and "Virus" folders.

    3. For User entities, validates the identifier as an email address and makes an
    API call to Proofpoint to search for emails where the sender or recipient matches
    the email address in the same folders.

    4. If records are found, cleans up the data (removing DLP and message status details),
    flattens the JSON, and updates the entity's additional properties with the retrieved
    quarantine details.

    5. Returns the results as JSON and updates the entities in the platform.


    ### Additional Notes

    Only User entities with valid email address identifiers will be processed.
  ai_short_description: >-
    Enriches Hostname and User entities by searching Proofpoint Email Protection for
    associated quarantined, spam, or virus emails and appending the results to the
    entities.
