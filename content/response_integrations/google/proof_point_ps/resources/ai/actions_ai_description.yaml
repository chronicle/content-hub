        filters_by_is_internal: false
        filters_by_is_pivot: false
        filters_by_is_suspicious: false
        filters_by_is_vulnerable: false
        filters_by_modification_time: false
Ping:
    ai_description: '### General Description

        Tests the connectivity to the ProofPoint Protection Server by attempting to
        authenticate and perform a basic search query against the quarantine API.
        This ensures that the integration configuration (API Root, Username, Password)
        is correct and the server is reachable.


        ### Parameters Description

        | Parameter | Type | Mandatory | Description |

        | :--- | :--- | :--- | :--- |

        | N/A | N/A | N/A | This action does not have any input parameters. |


        ### Flow Description

        1. **Configuration Retrieval**: The action retrieves the integration''s configuration,
        including the API Root, credentials, and SSL verification settings.

        2. **Manager Initialization**: A `ProofPointPSManager` instance is created
        using the retrieved configuration.

        3. **Connectivity Test**: The action calls the `test_connectivity` method,
        which executes a GET request to the `/rest/v1/quarantine` endpoint with a
        wildcard sender filter (`*`).

        4. **Result Handling**: If the request is successful, the action returns a
        success message indicating that the connection is established.


        ### Additional Notes

        This is a standard connectivity test and does not interact with or modify
        any entities in the environment.'
    capabilities:
        can_create_case_comments: false
        can_create_insight: false
        can_modify_alert_data: false
        can_mutate_external_data: false
        can_mutate_internal_data: false
        can_update_entities: false
        external_data_mutation_explanation: null
        fetches_data: true
        internal_data_mutation_explanation: null
    categories:
        enrichment: false
    entity_usage:
        entity_types: []
