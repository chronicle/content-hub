Search Quarantined Emails:
    ai_description: '### General Description

        Trace and search for quarantined email messages filtered by the Proofpoint
        Protection Server. Supports extensive smart search query parameters (sender,
        recipient, subject, start/end dates, folders, global GUIDs, message status,
        and limit).

        ### Parameters Description

        | Parameter | Type | Mandatory | Description | | :--- | :--- | :--- | :---
        | | Message GUID | String | Optional | The global unique ID of the email message.
        | | Message ID | String | Optional | The Message-ID header value. | | Sender
        | String | Optional | Email address of the sender. | | Recipient | String
        | Optional | Email address of the recipient. | | Subject | String | Optional
        | The subject of the email message. | | Start Date | String | Optional | Start
        date of range (YYYY-MM-DD hh:mm:ss). | | End Date | String | Optional | End
        date of range (YYYY-MM-DD hh:mm:ss). | | Folder Name | String | Optional |
        Quarantine folder name. | | Query ID | String | Optional | ID for search result
        tracking. | | DLP Violation | String | Optional | "t" or "details" to fetch
        DLP information. | | Message Status | String | Optional | "t" to fetch message
        status and comments. | | Limit | Integer | Optional | The maximum number of
        email messages to return. |

        ### Flow Description

        1. **Parameter Gathering**: Extracts search parameters from the action context.
        2. **API Call**: Executes GET /rest/v1/quarantine on Proofpoint Protection
        Server. 3. **State Serialization**: Parses records into `QuarantineRecord`
        structures and serializes them cleanly into dicts using `.to_json()`.'
    capabilities:
        can_create_case_comments: false
        can_create_insight: false
        can_modify_alert_data: false
        can_mutate_external_data: false
        can_mutate_internal_data: false
        can_update_entities: false
        external_data_mutation_explanation: null
        fetches_data: true
        internal_data_mutation_explanation: null
    categories:
        enrichment: false
    entity_usage:
        entity_types: []
Release Quarantined Email:
    ai_description: '### General Description

        Releases specified quarantined messages to the email infrastructure without
        further scanning. Optionally moves the message to a deleted folder, branding
        templates, rescanning, or security policies.

        ### Parameters Description

        | Parameter | Type | Mandatory | Description | | :--- | :--- | :--- | :---
        | | Message GUIDs | String | True | Comma-separated list of quarantined message
        GUIDs. | | Folder Name | String | True | Name of the folder where the message
        is stored. | | Deleted Folder Name | String | Optional | Name of the folder
        to move the released message to. | | Rescan Message | String | Optional |
        "t" to rescan released message by DLP/Attachment Defense. | | Branding Template
        | String | Optional | Branding template to use when released. | | Security
        Policy | String | Optional | Secure Reader response profile. |

        ### Flow Description

        1. **Extraction**: Extracts folder, guids list, and optional variables. 2.
        **POST Request**: Executes POST /rest/v1/quarantine with action "release".'
    capabilities:
        can_create_case_comments: false
        can_create_insight: false
        can_modify_alert_data: false
        can_mutate_external_data: true
        can_mutate_internal_data: false
        can_update_entities: false
        external_data_mutation_explanation: Releases emails from the quarantine folder
            back into the corporate mail flow.
        fetches_data: false
        internal_data_mutation_explanation: null
    categories:
        enrichment: false
    entity_usage:
