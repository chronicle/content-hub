[project]
name = "ProofPointPS"
version = "6.0"
description = "Proofpoint Email Protection stops malware and non-malware threats such as impostor email (also known as email fraud)."
requires-python = ">=3.11,<3.12"
dependencies = [
 "arrow>=1.4.0",
 "pytest-mock>=3.15.1",
 "requests>=2.33.1",
]

[dependency-groups]
dev = [
 "pytest>=9.0.3",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
