[project]
name = "ProofPointPS"
version = "8.0"
description = "Proofpoint Email Protection stops malware and non-malware threats such as impostor email (also known as email fraud)."
requires-python = ">=3.11,<3.12"
dependencies = [
    "requests==2.32.5",
    "tipcommon",
    "tldextract>=5.1.2",
]

[tool.uv.sources]
tipcommon = { path = "../../../../packages/tipcommon/whls/TIPCommon-2.4.1-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../packages/integration_testing_whls/integration_testing-2.4.1-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "integration-testing",
    "pytest>=9.1.0",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
