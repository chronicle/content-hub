[project]
name = "ProofPointPS"
version = "10.0"
description = "Automate quarantine searches, message releases, deletes, forwards, moves, downloads, and indicators enrichment using the Proofpoint Protection Server REST APIs."
requires-python = ">=3.11,<3.12"
dependencies = [
    "requests==2.32.5",
    "tipcommon",
    "tldextract>=5.1.2",
]

[tool.uv.sources]
tipcommon = { path = "../../../../packages/tipcommon/whls/TIPCommon-2.4.2-py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../packages/integration_testing_whls/integration_testing-2.4.2-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "integration-testing",
    "pytest>=9.1.0",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]

[tool.ruff]
lint.ignore = [
    "PLR0913", # Too many arguments
    "PLR0917", # Too many positional arguments
    "PLR0912", # Too many branches
    "PLR0915", # Too many statements
    "C901",    # Too complex
    "D401",    # Docstring imperative mood
    "DTZ005",  # Naive datetime
    "DTZ007",  # Naive datetime strptime
    "BLE001",  # Do not catch blind exception
    "TRY002",  # Create your own exception
    "TRY003",  # Avoid specifying long messages outside the exception class
    "ARG002",  # Unused method argument
    "ANN",     # Missing type annotations in some helper modules
    "D103",    # Missing docstring in public function
]

