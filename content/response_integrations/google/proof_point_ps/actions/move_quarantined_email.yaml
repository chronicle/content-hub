name: Move Quarantined Email
description: "Use the “Move Quarantine Email” action to moves quarantined messages
    to the specified target folder. Note: action works on messages that were created in
    the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: The unique message GUID(s) to move. Supports comma-separated values
        for multiple GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: The folder name where the message is stored (e.g., 'Quarantine',
        'PCI', etc.).
    is_mandatory: true

-   name: Target Folder Name
    type: string
    description: The target folder name to move the quarantined emails to.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/move_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
