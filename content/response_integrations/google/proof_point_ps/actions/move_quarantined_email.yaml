name: Move Quarantined Email
description: "Use the “Move Quarantine Email” action to moves quarantined messages
    to the specified target folder. Note: action works on messages that were created in
    the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: Comma-separated list of quarantined message GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: Name of the folder where the message is stored.
    is_mandatory: true

-   name: Target Folder Name
    type: string
    description: Name of the folder to move the message to.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/move_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
