name: Delete Quarantined Email
description: "Use the “Delete Quarantined Email” action to delete quarantined messages
    from the quarantine folder. Note: action works on messages that were created in
    the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: The unique message GUID(s) to delete. Supports comma-separated values
        for multiple GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: The folder name where the message is stored (e.g., 'Quarantine',
        'PCI', etc.).
    is_mandatory: true

-   name: Deleted Folder Name
    type: string
    description: The folder name to move the deleted messages to.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/delete_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
