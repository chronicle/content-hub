name: Release Quarantined Email
description: "Use the “Release Quarantined Email” action to release specified quarantined
    messages. Note: action works on messages that were created in the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: Comma-separated list of quarantined message GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: Name of the folder where the message is stored.
    is_mandatory: true

-   name: Deleted Folder Name
    type: string
    description: Folder to move the message to after release.
    is_mandatory: false
-   name: Rescan Message
    default_value: false
    type: boolean
    description: If selected, rescans the released message by DLP and Attachment Defense.
    is_mandatory: false
-   name: Branding Template
    type: string
    description: Branding template to use when released.
    is_mandatory: false
-   name: Security Policy
    type: string
    description: Secure Reader response profile.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/release_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
