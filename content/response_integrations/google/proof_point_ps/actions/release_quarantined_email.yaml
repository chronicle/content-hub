name: Release Quarantined Email
description: "Use the “Release Quarantined Email” action to release specified quarantined
    messages. Note: action works on messages that were created in the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: The unique message GUID(s) to release. Supports comma-separated values
        for multiple GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: The folder name where the message is stored (e.g., 'Quarantine',
        'PCI', etc.).
    is_mandatory: true

-   name: Deleted Folder Name
    type: string
    description: The folder name to move the released messages to.
    is_mandatory: false
-   name: Rescan Message
    default_value: false
    type: boolean
    description: If selected, rescans the released message by DLP and Attachment Defense.
    is_mandatory: false
-   name: Branding Template
    type: string
    description: The branding template to use when released.
    is_mandatory: false
-   name: Security Policy
    type: string
    description: The Secure Reader response profile to use for Encryption.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/release_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
