name: Forward Quarantined Email
description: "Use the “Forward Quarantine Email” action to forward quarantined messages
    to another recipient. Note: action works on messages that were created in
    the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: Comma-separated list of quarantined message GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: Name of the folder where the message is stored.
    is_mandatory: true

-   name: Deleted Folder Name
    type: string
    description: Folder to move the message to after forwarding.
    is_mandatory: false
-   name: New Subject
    type: string
    description: Overwrites the original subject.
    is_mandatory: false
-   name: Append Old Subject
    default_value: false
    type: boolean
    description: If selected, appends the original Subject to the forwarded Subject.
    is_mandatory: false
-   name: From Address
    type: string
    description: Overwrites envelope sender.
    is_mandatory: false
-   name: Header From
    type: string
    description: Overwrites Header From.
    is_mandatory: false
-   name: To Address
    type: string
    description: Recipient email address(es) to forward to.
    is_mandatory: true
-   name: New Body Comment
    type: string
    description: New message body comment.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/forward_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
