name: Forward Quarantined Email
description: Use the “Forward Quarantine Email” action to forward quarantined messages
    to another recipient.
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: The unique message GUID(s) to forward. Supports comma-separated values
        for multiple GUIDs.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: The folder name where the message is stored (e.g., 'Quarantine',
        'PCI', etc.).
    is_mandatory: true

-   name: Deleted Folder Name
    type: string
    description: The folder name to move the forwarded messages to.
    is_mandatory: false
-   name: New Subject
    type: string
    description: New subject. Overwrites the original Subject of the forwarded message.
    is_mandatory: false
-   name: Append Old Subject
    default_value: false
    type: boolean
    description: If selected, appends the original Subject to the forwarded Subject.
    is_mandatory: false
-   name: From Address
    type: string
    description: The envelope from email address for the forwarded message.
    is_mandatory: false
-   name: Header From
    type: string
    description: The header from email address for the forwarded message.
    is_mandatory: false
-   name: To Address
    type: string
    description: Recipient email address(es). Supports comma-separated values.
    is_mandatory: true
-   name: New Body Comment
    type: string
    description: New message body comment. The original message is sent as an attachment.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
