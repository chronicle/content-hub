name: Search Quarantined Emails
description: Use the “Search Quarantined Emails” to trace and analyze information
    about quarantined messages.
integration_identifier: ProofPointPS
parameters:
-   name: Message GUID
    type: string
    description: The unique message GUID to search for.
    is_mandatory: false
-   name: Message ID
    type: string
    description: The unique Internet Message ID to search for.
    is_mandatory: false
-   name: Sender
    type: string
    description: The email address of the sender.
    is_mandatory: false
-   name: Recipient
    type: string
    description: The email address of the recipient.
    is_mandatory: false
-   name: Subject
    type: string
    description: The subject of the quarantined email.
    is_mandatory: false
-   name: Time Frame
    type: ddl
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: false
    default_value: Last Hour
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Custom
-   name: Start Time
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601.'
    is_mandatory: false
    default_value: ''
-   name: End Time
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
    default_value: ''
-   name: Folder Name
    type: string
    description: The name of the quarantine folder. Defaults to 'Quarantine'.
    is_mandatory: false
-   name: Query ID
    type: string
    description: ID mainly for the REST client to keep track of the search results.
    is_mandatory: false
-   name: Fetch DLP Violation
    type: ddl
    description: Select the level of DLP violation data to fetch.
    is_mandatory: false
    default_value: 'No'
    optional_values:
    - 'No'
    - Basic
    - Detailed
-   name: Fetch Message Status
    type: boolean
    description: If selected, fetches the message status and comments.
    is_mandatory: false
    default_value: false
-   name: Max Results To Return
    type: string
    description: 'Max results to return. Default: 100. Max: 1000.'
    is_mandatory: false
    default_value: '100'
dynamic_results_metadata:
-   result_name: JsonResult
    show_result: true
    result_example_path: resources/search_quarantined_emails_JsonResult_example.json
creator: Admin
is_async: false
simulation_data_json: '{"Entities": []}'
