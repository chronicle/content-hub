name: Download Quarantined Email
description: "Use the “Download Quarantined Email” to download quarantined email message
    raw data. Note: action works on messages that were created in the last 30 days."
integration_identifier: ProofPointPS
parameters:
-   name: Message GUIDs
    type: string
    description: The unique Message GUIDs of the email(s) to download.
    is_mandatory: true
-   name: Folder Name
    type: string
    description: Name of the folder where the message is stored. If not specified, defaults to Quarantine.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/download_quarantined_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
