  ai_description: >-
    ### General Description

    Unlocks a mobile device managed by MobileIron using its unique identifier (UUID).
    This action sends a command to the MobileIron server to remove the lock screen
    or restriction on the specified device, allowing the user to regain access.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device UUID | String | Yes | The unique identifier (UUID) of the target mobile
    device to be unlocked. |


    ### Additional Notes

    This action requires a valid MobileIron integration configuration to be set up
    in the Google SecOps environment. It performs a direct mutation on the external
    MobileIron system.


    ### Flow Description

    1. **Initialization**: Retrieves connection settings (API Root, Credentials, SSL
    settings) from the MobileIron integration configuration.

    2. **Parameter Extraction**: Retrieves the mandatory `Device UUID` from the action
    input.

    3. **Execution**: Calls the MobileIron API's action endpoint with the `UNLOCK_DEVICE_ONLY`
    command specifically for the provided UUID.

    4. **Completion**: Validates the API response and terminates the action with a
    success message if the command was successfully issued.
