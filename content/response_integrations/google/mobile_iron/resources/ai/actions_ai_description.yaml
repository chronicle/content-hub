Unlock Device:
  ai_description: >-
    ### General Description

    Unlocks a mobile device managed by MobileIron using its IP address. This action
    identifies the device associated with the provided IP address and sends a command
    to unlock it.


    ### Flow Description

    1. Filters the target entities to include only IP Address entities.

    2. Iterates over the filtered IP addresses.

    3. For each IP address, makes a GET request to the MobileIron API to fetch the
    device information and extract its UUID.

    4. Makes a POST request to the MobileIron API to execute the `UNLOCK_DEVICE_ONLY`
    action on the identified device UUID.

    5. Collects the results and outputs a summary message indicating which entities
    were successfully processed.


    ### Additional Notes

    The action relies on the IP address being currently associated with a known device
    in the MobileIron platform to successfully retrieve the device UUID.
