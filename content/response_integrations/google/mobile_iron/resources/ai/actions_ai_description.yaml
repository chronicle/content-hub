  ai_description: >-
    ### General Description

    Unlocks a mobile device managed by MobileIron using its unique Universal Unique
    Identifier (UUID). This action is designed to remotely trigger an unlock command
    on a specific device, facilitating administrative access or troubleshooting for
    managed mobile assets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device UUID | String | Yes | The unique identifier (UUID) of the target device
    to be unlocked. This value is used to target the specific device in the MobileIron
    inventory. |


    ### Flow Description

    1. **Initialization**: The action initializes the MobileIron manager using the
    integration's configuration settings (API Root, Credentials, etc.).

    2. **Parameter Extraction**: The action retrieves the mandatory `Device UUID`
    from the input parameters.

    3. **Validation**: It checks if the `Device UUID` is provided; if not, it raises
    an exception.

    4. **API Interaction**: The action calls the `unlock_device_by_uuid` method in
    the manager, which sends a POST request to the MobileIron API (`api/v2/devices/action`)
    with the `actionType` set to `UNLOCK_DEVICE_ONLY`.

    5. **Completion**: Upon a successful API response, the action concludes with a
    success message indicating the unlock command was sent for the specified UUID.
