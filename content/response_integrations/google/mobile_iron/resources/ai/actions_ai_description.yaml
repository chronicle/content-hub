  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and a MobileIron instance. It ensures that the provided credentials
    (Username and Password) and the API Root URL are correct and that the MobileIron
    service is reachable over the network.


    ### Parameters Description

    This action does not have any input parameters. It relies entirely on the integration's
    configuration settings:


    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | API Root | The base URL of the MobileIron instance. | String | Yes | Used to
    construct the API endpoint. |

    | Username | The API username for authentication. | String | Yes | Used for Basic
    Auth. |

    | Password | The API password for authentication. | String | Yes | Used for Basic
    Auth. |

    | Admin Device ID | The device space ID of the administrator. | Integer | No |
    Defaults to 1 if not provided. |

    | Cloud Instance | Whether the instance is a cloud-based MobileIron instance.
    | Boolean | No | If true, appends 'rest/' to the API root. |

    | Verify SSL | Whether to verify the SSL certificate of the connection. | Boolean
    | No | Defaults to false. |


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting communication issues.

    - It performs a simple GET request to the `api/V2/ping` endpoint.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the integration configuration,
    including the API Root, credentials, and connection settings.

    2. **Manager Initialization:** It initializes the `MobileIronManager` with the
    retrieved settings, handling URL formatting for cloud or on-premise instances.

    3. **Connectivity Test:** The action calls the `ping()` method of the manager,
    which sends a GET request to the MobileIron ping API.

    4. **Response Validation:** The manager validates the HTTP response. If the status
    code is successful, it returns `True`.

    5. **Final Result:** The action ends by providing a success message ("Connection
    Established.") or a failure message based on the API response.
