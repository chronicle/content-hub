    1. **Initialization**: The action initializes the MobileIron manager using the
    integration's configuration settings (API Root, Credentials, SSL settings).

    2. **Parameter Processing**: It retrieves the optional 'Fields To Fetch' parameter
    to define the scope of data returned for each device.

    3. **API Request**: The action executes a GET request to the MobileIron `/api/v2/devices`
    endpoint.

    4. **Data Transformation**: The retrieved device list is flattened into a simplified
    structure and converted into a CSV format.

    5. **Result Reporting**: The action adds a data table named 'Devices' to the SOAR
    case and returns the full device list as a JSON result.
