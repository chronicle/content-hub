Unlock Device by UUID:
  ai_description: >-
    ### General Description

    Unlocks a specific mobile device managed by MobileIron using its unique UUID.
    This action initiates a state change on the external MobileIron platform to remove
    the lock from the targeted device.


    ### Flow Description

    1. Retrieves the `Device UUID` from the action parameters.

    2. Validates that the UUID is not empty.

    3. Initiates a POST request to the MobileIron API (`api/v2/devices/action`) with
    the action type `UNLOCK_DEVICE_ONLY` for the specified device.

    4. Returns a success message to the SOAR platform upon successful execution.


    ### Additional Notes

    This action does not operate on SOAR entities. It strictly requires the exact
    device UUID to be provided as an input parameter. Note that the script's success
    output message may incorrectly state that system information was "fetched", but
    the underlying API call successfully performs the unlock mutation.
