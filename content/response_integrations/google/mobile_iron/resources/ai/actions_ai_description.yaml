  ai_description: >-
    ### General Description

    The **Fetch System Information** action retrieves detailed device metadata from
    MobileIron for a given IP address. It is primarily used to gain visibility into
    the state, ownership, and configuration of mobile devices or endpoints managed
    by MobileIron.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields To Fetch | String | No | A comma-separated list of specific MobileIron
    fields to retrieve (e.g., `ios.DeviceName,user.email_address`). If left empty,
    the action fetches a comprehensive default set of fields including OS version,
    battery level, and compliance status. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` entities within the
    current context.

    2. **API Query**: For each IP address, it queries the MobileIron API (`/api/v2/devices`)
    using a filter for the `common.ip_address` field.

    3. **Data Extraction**: It extracts the device information, applying the field
    filters specified in the "Fields To Fetch" parameter.

    4. **Enrichment**: The retrieved data is flattened and added to the action result
    as a table for analyst review.


    ### Additional Notes

    - This action requires the MobileIron integration to be configured with valid
    API credentials and Root URL.

    - If multiple devices share the same IP, the action retrieves the first match.
