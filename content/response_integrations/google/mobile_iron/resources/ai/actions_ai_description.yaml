  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the MobileIron instance. It validates that the integration configuration
    (API Root, Username, and Password) is correct and that the MobileIron service
    is reachable over the network.


    ### Parameters Description

    This action does not have any input parameters. It relies entirely on the integration's
    global configuration settings:


    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | API Root | The base URL of the MobileIron instance. | String | Yes | Used to
    construct the API endpoint. |

    | Username | The API username for authentication. | String | Yes | Used for Basic
    Auth. |

    | Password | The API password for authentication. | String | Yes | Used for Basic
    Auth. |

    | Admin Device ID | The device space ID of the administrator. | Integer | No |
    Defaults to 1 if not provided. |

    | Cloud Instance | Whether the instance is a cloud-based MobileIron instance.
    | Boolean | No | If true, appends 'rest/' to the API root. |

    | Verify SSL | Whether to verify the SSL certificate of the connection. | Boolean
    | No | Defaults to false. |


    ### Additional Notes

    - This action is intended for troubleshooting and initial setup verification.

    - It does not perform any data retrieval or modification on entities or alerts.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the integration settings
    (API Root, credentials, and connection options) from the Google SecOps environment.

    2. **Manager Initialization:** It initializes the `MobileIronManager` using the
    retrieved configuration, handling URL formatting for cloud or on-premise instances.

    3. **Connectivity Test:** The action executes the `ping()` method, which performs
    a GET request to the MobileIron `api/V2/ping` endpoint.

    4. **Response Validation:** The manager validates the HTTP response. If the status
    code indicates success, the action returns `True`.

    5. **Final Result:** The action concludes by outputting a success or failure message
    based on the connectivity test result.
