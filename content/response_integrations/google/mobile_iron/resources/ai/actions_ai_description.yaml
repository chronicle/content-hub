  ai_description: >-
    ### General Description

    The **Fetch System Information** action retrieves detailed technical and ownership
    metadata for mobile devices managed by MobileIron, using the device's IP address
    as the primary identifier. This action is primarily used for asset enrichment
    during investigations to correlate network activity with specific managed devices
    and users.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Fields To Fetch** | String | No | A comma-separated list of specific MobileIron
    fields to retrieve (e.g., `ios.DeviceName,user.display_name,user.email_address`).
    If left empty, the action retrieves a comprehensive set of default fields including
    OS version, IMEI, and compliance status. |


    ### Additional Notes

    - The action specifically targets **ADDRESS** (IP Address) entities.

    - If multiple devices are associated with the same IP (though rare in managed
    environments), the action typically returns the first match found in the MobileIron
    registry.

    - The results are presented as an entity-linked data table within the Google SecOps
    case wall.


    ### Flow Description

    1. **Entity Filtering:** The action identifies all IP Address entities within
    the current context.

    2. **API Query:** For each IP address, it queries the MobileIron API (`api/v2/devices`)
    using a search filter for the `common.ip_address` field.

    3. **Data Retrieval:** It requests either the user-specified fields or a predefined
    set of default system and user attributes.

    4. **Internal Enrichment:** The retrieved device information is flattened and
    attached to the corresponding entity as a data table for analyst review.
