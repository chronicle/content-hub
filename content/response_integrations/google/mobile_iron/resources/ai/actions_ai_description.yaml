  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of all devices managed within the MobileIron system.
    This action is primarily used for administrative overview and asset discovery,
    allowing users to specify exactly which data points (fields) should be returned
    for each device.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields To Fetch | String | No | A comma-separated string of specific device
    fields to retrieve (e.g., ios.DeviceName,user.display_name,user.email_address).
    If left empty, the integration uses a predefined set of default fields including
    hardware identifiers, status, and user information. |


    ### Flow Description

    1. **Authentication**: Connects to the MobileIron API using the configured API
    Root, Username, and Password.

    2. **Data Retrieval**: Executes a GET request to the `/api/v2/devices` endpoint,
    passing the `Fields To Fetch` parameter to filter the returned attributes.

    3. **Data Processing**: Flattens the resulting JSON structures into a tabular
    format.

    4. **Output Generation**: Constructs a CSV-formatted data table named "Devices"
    and attaches it to the action results in Google SecOps.


    ### Additional Notes

    This action does not target specific entities in the case; it performs a global
    fetch of devices from the MobileIron instance.
