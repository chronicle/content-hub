Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the MobileIron instance.
    This action verifies that the integration is correctly configured and that the
    SOAR platform can successfully communicate with the MobileIron API.


    ### Flow Description

    1. Retrieves the integration configuration settings, including the API Root, Username,
    Password, Admin Device ID, Cloud Instance flag, and SSL verification setting.

    2. Initializes the `MobileIronManager` with the retrieved credentials and configuration.

    3. Executes a `GET` request to the `api/V2/ping` endpoint of the MobileIron API.

    4. Validates the HTTP response status to ensure the API is reachable and the credentials
    are valid.

    5. Outputs a success message ("Connection Established.") if the ping is successful,
    or a failure message ("Failed to establish connection.") if the request fails.


    ### Additional Notes

    This action does not interact with any entities or modify any data. It is strictly
    used for troubleshooting and verifying integration connectivity.
