  ai_description: >-
    ### General Description

    The **Unlock Device** action allows analysts to remotely unlock a mobile device
    managed by MobileIron using its IP address. This action is primarily used during
    incident response to restore access to a device or to facilitate forensic investigation
    on a locked endpoint.


    ### Parameters Description

    There are no input parameters for this action. It relies on the IP address entities
    provided in the context and the integration's global configuration.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all entities of type `ADDRESS`
    within the current SOAR context.

    2. **Device Identification**: For each identified IP address, the action queries
    the MobileIron API to find the corresponding unique Device UUID.

    3. **Unlock Command**: Once the UUID is retrieved, the action sends a POST request
    to the MobileIron `Action` endpoint with the `UNLOCK_DEVICE_ONLY` command to trigger
    the physical unlocking of the device.

    4. **Result Reporting**: The action logs the outcome of the operation and reports
    whether the unlock command was successfully dispatched for the processed entities.
