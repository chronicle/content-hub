  ai_description: >-
    ### General Description

    The **Fetch System Information** action retrieves detailed system information
    for a device from MobileIron using its IP address. It enriches the IP address
    entity with the fetched device details by adding a data table to the entity in
    Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Fields To Fetch | String | No | A comma-separated list of fields to fetch for
    the device (e.g., `ios.DeviceName,user.display_name,user.email_address,user.user_id`).
    If left empty, a default set of fields will be retrieved. |


    ### Flow Description

    1. Initializes the MobileIron API client using the provided configuration.

    2. Iterates over the target entities, filtering for those of type `ADDRESS`.

    3. For each valid IP address, queries MobileIron to fetch the associated device's
    system information.

    4. If information is found, it flattens the data and attaches it to the entity
    as a data table.

    5. Returns a summary message indicating which entities were successfully processed
    and lists any errors encountered.
