      It does not perform any POST/PUT/DELETE requests that modify external data (can_mutate_external_data=false).
      It adds an entity table to the action results but does not update the entity
      object, create insights, modify alert data, or create case comments (can_mutate_internal_data=false).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (MobileIron) to provide additional
      context about an IP address. It does not mutate external or internal state,
      making it a pure enrichment action. It does not perform any remediation tasks
      such as blocking IPs or disabling users.
    remediation: false
  entity_usage:
