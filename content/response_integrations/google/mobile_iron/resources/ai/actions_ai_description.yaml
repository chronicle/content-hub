  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of all devices managed within the MobileIron system.
    This action provides visibility into the mobile asset inventory, allowing analysts
    to see device metadata, ownership, and compliance status. The results are presented
    as a data table within the case and as a raw JSON object for further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields To Fetch | String | No | A comma-separated list of specific device attributes
    to retrieve (e.g., `ios.DeviceName,user.display_name,user.email_address`). If
    left empty, the action retrieves a default set of common fields including UUID,
    IMEI, IP address, and OS version. |


    ### Flow Description

    1. **Initialization**: The action initializes the MobileIron manager using the
    integration's configuration settings (API Root, Credentials, SSL settings).

    2. **Parameter Processing**: It retrieves the optional 'Fields To Fetch' parameter
    to define the scope of data returned for each device.

    3. **API Request**: The action executes a GET request to the MobileIron `/api/v2/devices`
    endpoint.

    4. **Data Transformation**: The retrieved device list is flattened into a simplified
    structure and converted into a CSV format.

    5. **Result Reporting**: The action adds a data table named 'Devices' to the SOAR
    case and returns the full device list as a JSON result.


    ### Additional Notes

    This action does not target specific entities within the case; it fetches the
    global list of devices from the MobileIron environment.
