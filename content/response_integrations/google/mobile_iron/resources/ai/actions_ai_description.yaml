Fetch System Information:
  ai_description: >-
    ### General Description

    Fetches system information for a device from MobileIron using its IP address.


    ### Flow Description

    1. Iterates over target entities of type ADDRESS.

    2. Makes a GET request to the MobileIron API (`api/v2/devices`) to fetch device
    information associated with the IP address.

    3. If information is found, formats the data and attaches it as an entity table
    to the action results.


    ### Additional Notes

    - The specific fields to retrieve can be customized using the `Fields To Fetch`
    parameter.
