  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the MobileIron instance. It ensures that the provided configuration
    parameters (API Root, Credentials, etc.) are correct and that the MobileIron API
    is reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration configuration,
    including the API Root, Username, Password, and SSL settings.

    2. **Manager Initialization**: It initializes the `MobileIronManager` with the
    retrieved settings.

    3. **Connectivity Test**: The action calls the `ping` method in the manager, which
    sends a GET request to the MobileIron ping endpoint (`api/V2/ping`).

    4. **Validation**: It validates the HTTP response from the server.

    5. **Final Result**: If the request is successful, it returns a 'Connection Established'
    message; otherwise, it reports a failure.


    ### Additional Notes

    This action does not process any entities and is strictly for testing the integration
    setup.
