Unlock Device:
  ai_description: >-
    General Description

    Unlocks a mobile device managed by MobileIron using its IP address. This action
    interacts with the MobileIron API to identify the device associated with the provided
    IP and issues an unlock command.


    Flow Description

    1. The action initializes the MobileIronManager using the integration configuration
    settings (API Root, Username, Password, etc.).

    2. It filters the target entities to process only those of type 'ADDRESS'.

    3. For each IP address entity, the action performs a GET request to the MobileIron
    API (`api/v2/devices`) to retrieve the device's UUID.

    4. Once the UUID is retrieved, the action performs a POST request to the MobileIron
    API (`api/v2/devices/action`) with the action type set to 'UNLOCK_DEVICE_ONLY'
    to unlock the device.

    5. The action logs the outcome and any errors encountered during the process.


    Additional Notes

    This action requires valid MobileIron API credentials and connectivity to the
    MobileIron instance. The 'Admin Device ID' and 'Cloud Instance' settings must
    be correctly configured in the integration settings.
