  ai_description: >-
    ### General Description

    The **Fetch System Information By UUID** action retrieves detailed system and
    hardware information for a specific mobile device managed by MobileIron. It uses
    the device's unique identifier (UUID) to query the MobileIron API and returns
    a comprehensive set of data points, including battery levels, OS versions, compliance
    status, and network identifiers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device UUID | String | Yes | The unique identifier (UUID) of the target mobile
    device in the MobileIron system. |


    ### Additional Notes

    * This action does not automatically iterate over entities in the Google SecOps
    case. It relies strictly on the provided `Device UUID` parameter.

    * The action is useful for deep-dive investigations into a specific mobile asset
    once its UUID has been identified by other discovery actions.


    ### Flow Description

    1. **Initialization**: The action initializes the MobileIron manager using the
    integration's configuration settings (API Root, credentials, and SSL preferences).

    2. **Parameter Retrieval**: It extracts the `Device UUID` from the action input
    parameters.

    3. **Data Retrieval**: The action calls the MobileIron API's device details endpoint
    specifically for the provided UUID.

    4. **Data Processing**: If information is found, the manager reformats the raw
    key-value pairs into a structured dictionary.

    5. **Output**: The processed system information is added to the action results
    as a data table, and the action completes successfully.
