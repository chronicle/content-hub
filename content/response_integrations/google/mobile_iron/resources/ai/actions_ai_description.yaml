Fetch System Information:
  ai_description: >-
    ### General Description

    Fetches system information for a device from MobileIron using its IP address.
    This action retrieves detailed device metadata, such as OS version, user information,
    and device status, to provide context for security investigations.


    ### Flow Description

    1. Initialize the `MobileIronManager` with configuration settings, including the
    API root, credentials, and SSL verification preferences.

    2. Retrieve the `Fields To Fetch` parameter, which specifies the device attributes
    to be returned.

    3. Filter the `target_entities` to include only those of type `ADDRESS`.

    4. For each valid entity, call the `fetch_device_information_by_ip` method of
    the `MobileIronManager` using the entity's identifier.

    5. If information is successfully retrieved, add the device details as a table
    to the action results using `siemplify.result.add_entity_table`.

    6. Return a summary message indicating the success or failure of the operation
    for each entity.


    ### Additional Notes

    The action requires valid MobileIron credentials and connectivity to the MobileIron
    API. It specifically targets IP address entities and does not perform any state-changing
    operations on the external system.
  ai_short_description: >-
    Fetches system information for a device from MobileIron based on its IP address.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the MobileIron API to fetch device information.
      It does not mutate external data, nor does it update internal entities or create
      insights. It simply displays the fetched information in the action results.
