  ai_description: >-
    Fetches detailed system information for a specific mobile device using its Unique
    Universal Identifier (UUID) via the MobileIron API. This action is used to retrieve
    technical metadata about a device, such as OS version, model, and ownership details,
    which is then presented in a structured data table within the action results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device UUID | string | Yes | The unique identifier (UUID) of the target device
    in the MobileIron system. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the mandatory `Device UUID`
    from the action parameters.

    2. **API Initialization:** It initializes the MobileIron manager using the integration's
    configuration settings (API Root, credentials, etc.).

    3. **Data Retrieval:** The action performs a GET request to the MobileIron API
    endpoint `api/v2/devices/{device_uuid}/details` to fetch the system information.

    4. **Data Transformation:** If data is found, the raw response is processed and
    rearranged into a key-value format suitable for display.

    5. **Output Generation:** The formatted data is added to the action's results
    as an entity table, and the action completes successfully.
