  ai_description: >-
    ### General Description

    Unlocks a mobile device managed by MobileIron using its IP address. This action
    is primarily used to restore user access to a device after a security lock has
    been applied or as part of a remediation workflow.


    ### Parameters

    There are no specific action parameters required for this action. It relies on
    the global integration configuration (API Root, Username, Password, etc.) and
    the IP address entities provided in the context.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all IP Address (ADDRESS) entities
    within the current alert or case context.

    2. **Device Resolution**: For each identified IP address, the action queries the
    MobileIron API to find a matching device and retrieve its unique identifier (UUID).

    3. **Unlock Command**: Once the UUID is obtained, the action sends a POST request
    to the MobileIron 'action' endpoint with the `UNLOCK_DEVICE_ONLY` command type.

    4. **Execution Reporting**: The action logs the outcome of the unlock attempt
    for each entity and provides a summary message to the user.


    ### Additional Notes

    This action requires the MobileIron 'Cloud Instance' and 'Admin Device ID' settings
    to be correctly configured in the integration parameters to resolve device information
    accurately.
