product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The MobileIron integration provides Mobile Device Management (MDM) capabilities.
    Its primary function is to provide visibility into mobile assets, including retrieving
    device metadata (OS version, owner, compliance status) and listing managed devices,
    which directly aligns with the 'Asset Inventory' category. While the integration
    includes 'Unlock Device' actions, these are device-level remediation tasks rather
    than user identity management (IAM) or host-level containment (EDR). It does not
    perform log analysis (SIEM), network traffic blocking (Network Security), threat
    intelligence enrichment, email security, cloud security, ITSM ticketing, vulnerability
    management, or collaboration/notification tasks.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
