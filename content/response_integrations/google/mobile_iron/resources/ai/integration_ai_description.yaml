  reasoning: >-
    The MobileIron integration provides Mobile Device Management (MDM) capabilities,
    primarily focusing on retrieving detailed metadata about mobile devices (e.g.,
    OS version, compliance status, hardware identifiers) and listing managed devices.
    These actions align with the 'Asset Inventory' category, as they provide visibility
    into internal mobile assets. The integration does not perform SIEM log analysis,
    EDR process-level monitoring, network security gateway blocking, threat intelligence
    reputation lookups, or IAM user account management. Therefore, it is classified
    solely under Asset Inventory.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
