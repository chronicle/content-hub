Get Url Status:
  ai_description: >-
    ### General Description

    Queries the Certly service to retrieve reputation and status information for URL
    entities. It enriches the entities with the retrieved status and flags malicious
    URLs as suspicious.


    ### Flow Description

    1. Iterates through the target entities provided to the action.

    2. Filters the entities to process only those of type URL.

    3. Makes an HTTP GET request to the Certly API (`/v1/lookup`) to fetch the status
    of each URL.

    4. Updates the entity's additional properties with the retrieved Certly status
    and marks the entity as enriched.

    5. If the status is identified as "malicious", marks the entity as suspicious
    and attaches an insight to it.

    6. Updates the modified entities within the Google SecOps platform.


    ### Additional Notes

    The action returns a result value of "true" if at least one URL is found to be
    malicious, and "false" otherwise.
  ai_short_description: >-
    Queries the Certly service to retrieve reputation and status information for URL
    entities, enriching them and flagging malicious URLs as suspicious.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Certly API to fetch URL status data (fetches_data=true).
      It does not mutate external data or internal system data outside of standard
      entity updates. It updates entities using `siemplify.update_entities` (can_update_entities=true)
      and creates insights using `siemplify.add_entity_insight` (can_create_insight=true).
