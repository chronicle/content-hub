Ping:
  ai_description: >-
    ### General Description

    Validates the asset configuration and connectivity to the Certly API. This action
    ensures that the provided API Token and API Root are correct and that the SecOps
    platform can successfully communicate with the Certly service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Token and API Root).

    2. Initializes the Certly API manager.

    3. Executes a test connectivity check by making an HTTP GET request to the Certly
    `/v1/lookup` endpoint using a hardcoded test URL (`http://gumblar.cn`).

    4. Returns a successful output message and the JSON response if the connection
    is established without errors.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Certly integration to verify network access and authentication validity.
  ai_short_description: >-
    Validates connectivity to the Certly API by performing a test lookup request.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
