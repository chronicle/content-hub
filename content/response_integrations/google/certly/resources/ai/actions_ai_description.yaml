Get Url Status:
  ai_description: >-
    ### General Description

    Enriches URL entities by querying the Certly service for reputation status. This
    action retrieves threat intelligence regarding the safety of a URL, updates the
    entity with the retrieved status, and flags the entity as suspicious if the status
    is identified as malicious.


    ### Flow Description

    1. The action retrieves the Certly API configuration (API Token and API Root URL)
    from the integration settings.

    2. It iterates through the provided target entities, filtering specifically for
    those of type URL.

    3. For each URL entity, the action makes an API GET request to the Certly service
    (`/v1/lookup`) to retrieve the URL's status.

    4. The retrieved status is added to the entity's `additional_properties` under
    the key `Certly_Status`, and the entity is marked as enriched.

    5. If the returned status is "malicious", the entity is marked as suspicious,
    and an insight is added to the entity via `siemplify.add_entity_insight`.

    6. Finally, the action updates the enriched entities in the SOAR platform and
    returns a summary message indicating which URLs were processed.


    ### Additional Notes

    This action performs data enrichment and does not modify any external systems.
    It only updates internal entity metadata and insights within the SOAR platform.
  ai_short_description: >-
    Enriches URL entities by querying the Certly service for reputation status and
    updating the entity with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (Certly_Status, is_enriched, is_suspicious) and adds
      entity insights.
    reasoning: >-
      The action fetches data from an external API (Certly) to enrich entities. It
      does not mutate external data. It mutates internal data by updating entity properties
      and adding insights to the SOAR platform.
