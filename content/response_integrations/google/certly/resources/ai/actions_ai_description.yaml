Ping:
  ai_description: >-
    ### General Description

    Validates the connectivity between the SOAR platform and the Certly service. This
    action ensures that the integration is correctly configured and that the SOAR
    platform can successfully communicate with the external Certly API.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and retrieve the "Certly" configuration (API
    Token and API Root) from the integration settings.

    2. Instantiate the `CertlyManager` with the retrieved credentials.

    3. Execute the `test_connectivity` method, which performs a GET request to the
    Certly API using a test URL (`http://gumblar.cn`).

    4. Return the connectivity status (the JSON response from the API) to the SOAR
    platform using `siemplify.end`.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured and communicating with the external service. It does not
    perform any operations on entities or modify any data.
