    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the Certly API to fetch the status of
      a test URL, which qualifies as fetching data. It does not perform any POST/PUT/DELETE
      requests to mutate external data, nor does it update internal entities, create
      insights, modify alerts, or create case comments.
