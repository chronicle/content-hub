Get User Activities:
  ai_description: >-
    ### General Description

    Fetches user activity logs from the Elastica Cloud SOC platform for a specified
    time range. This action retrieves historical investigation logs for target user
    entities, allowing analysts to review recent user behavior and potential security
    events.


    ### Flow Description

    1. The action initializes the `ElasticaCloudSOCManager` using the configured API
    credentials.

    2. It retrieves the `Minutes Back` parameter to determine the time window for
    the log search (defaulting to 60 minutes).

    3. It filters the `target_entities` to process only those of type `USER`.

    4. For each identified user, the action calls the `get_user_investigation_logs_since_time`
    method, utilizing the `OriginalIdentifier` from the entity's `additional_properties`
    as the username.

    5. Retrieved logs are formatted into a CSV table and added to the entity's results,
    and the full JSON response is attached to the action results.


    ### Additional Notes

    This action is read-only and does not modify any data in the Elastica Cloud SOC
    or the SOAR platform. It requires valid API credentials for the Elastica Cloud
    SOC integration.
  ai_short_description: >-
    Fetches user activity logs from Elastica Cloud SOC for specified user entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to fetch logs from an external service. It
      does not mutate external data, nor does it mutate internal SOAR data (it only
      adds result tables/JSON for display).
