Get User Activities:
  ai_description: >-
    ### General Description

    Fetches user investigation logs and activities from Elastica Cloud SOC for specific
    User entities within a defined timeframe.


    ### Flow Description

    1. Initializes the Elastica Cloud SOC manager with the provided API credentials.

    2. Calculates the start time for fetching logs based on the `Minutes Back` parameter.

    3. Filters the target entities to include only User entities.

    4. Iterates through each User entity, extracting the `OriginalIdentifier` from
    its additional properties.

    5. Makes a GET request to the Elastica Cloud SOC API (`api/admin/v1/logs/get/`)
    to retrieve investigation logs for the user since the calculated start time.

    6. Formats the retrieved logs into a CSV table and attaches it to the respective
    entity.

    7. Aggregates all results and adds them to the action's JSON result.


    ### Additional Notes

    The action relies on the `OriginalIdentifier` property of the User entity to query
    the Elastica Cloud SOC API, as the username is case-sensitive.
  ai_short_description: >-
    Fetches user investigation logs and activities from Elastica Cloud SOC for specific
    User entities within a defined timeframe.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Elastica Cloud SOC API to fetch user investigation
      logs. It does not mutate external data, nor does it mutate internal data such
      as updating entities, creating insights, or adding case comments. It only attaches
      a data table and JSON results to the action output.
