Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Elastica CloudSOC platform to verify that the integration
    is configured correctly with valid credentials.


    ### Flow Description

    1. Initializes the Elastica CloudSOC manager using the provided integration configurations
    (API Root, Key ID, Key Secret).

    2. Makes an HTTP GET request to the `audit/v2/datasources/` endpoint to verify
    API access.

    3. Returns a success message if the connection is established, or a failure message
    otherwise.


    ### Additional Notes

    This action does not interact with any entities or alerts and is solely used for
    diagnostic and configuration verification purposes.
