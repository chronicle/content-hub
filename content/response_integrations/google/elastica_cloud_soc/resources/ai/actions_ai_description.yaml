Ping:
  ai_description: >-
    General Description: Tests connectivity to the Elastica CloudSOC API.


    Flow Description:

    1. Initialize `SiemplifyAction`.

    2. Retrieve configuration parameters (`API Root`, `Key ID`, `Key Secret`, `Verify
    SSL`) from the integration configuration.

    3. Initialize `ElasticaCloudSOCManager` with the retrieved credentials.

    4. Execute the `ping` method, which sends a GET request to the `audit/v2/datasources/`
    endpoint.

    5. Validate the HTTP response.

    6. Return a success status (`True` or `False`) and output a message indicating
    whether the connection was established.


    Additional Notes: This action is used to verify that the integration is correctly
    configured and can communicate with the Elastica CloudSOC API.
  ai_short_description: >-
    Tests connectivity to the Elastica CloudSOC API.
