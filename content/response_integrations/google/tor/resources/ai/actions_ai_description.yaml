Is Exit Node:
  ai_description: >-
    ### General Description

    Checks if provided IP address entities are currently listed as Tor exit nodes.
    This action queries the Tor Project's exit node list to determine if the specified
    IP addresses are active exit nodes.


    ### Flow Description

    1. The action retrieves the configuration for the Tor integration.

    2. It initializes the `TorManager` to handle requests to the Tor Project's exit
    node list.

    3. It iterates through the provided IP address entities.

    4. For each IP, it queries the Tor Project's exit node list (`https://check.torproject.org/exit-addresses`)
    to determine if the IP is an active exit node.

    5. It collects all identified exit nodes.

    6. Finally, it outputs a message listing the identified exit nodes and returns
    the list as a JSON result.


    ### Additional Notes

    This action is read-only and does not modify any entities or external systems.
  ai_short_description: >-
    Checks if provided IP address entities are currently listed as Tor exit nodes.
