Is Exit Node:
  ai_description: >-
    ### General Description

    Checks whether IP address entities are used as Tor exit nodes.


    ### Flow Description

    1. Iterates over target entities of type ADDRESS.

    2. Makes a GET request to `https://check.torproject.org/exit-addresses` to fetch
    the list of today's Tor exit nodes.

    3. Checks if each IP address is present in the fetched list.

    4. Returns the list of identified exit node IPs as a JSON result.


    ### Additional Notes

    This action relies on the official Tor project exit addresses list.
  ai_short_description: >-
    Checks whether IP address entities are used as Tor exit nodes by querying the
    official Tor project exit addresses list.
