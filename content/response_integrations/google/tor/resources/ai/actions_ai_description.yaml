Ping:
  ai_description: >-
    General Description


    Tests connectivity to the Tor project's exit node list service to ensure the integration
    is properly configured and reachable.


    Flow Description


    1. Retrieves the "Use SSL" configuration parameter from the Tor integration settings.

    2. Initializes the `TorManager` with the specified SSL verification setting.

    3. Executes the `test_connectivity` method, which performs an HTTP GET request
    to the Tor exit nodes list URL (`https://check.torproject.org/exit-addresses`).

    4. Validates the HTTP response status to ensure the service is reachable.

    5. Terminates the action with a success message if the connection is established.


    Additional Notes


    This action is used to verify that the SOAR platform can successfully communicate
    with the external Tor project service.
