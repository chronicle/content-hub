name: Add IP to Address Group
description: 'Add IP address to specific SonicWall Address Group. Caution: Successful
    action execution commits all uncommitted changes. This is a SonicWall limitation.'
integration_identifier: SonicWall-Beta
parameters:
-   name: Group Name
    default_value: ''
    type: string
    description: Specify to which group you want to add IP address. Groups that contain
        unicode characters are not supported. This is a SonicWall limitation.
    is_mandatory: true
-   name: IP Zone
    default_value: ''
    type: string
    description: Specify the zone of the IP address that you want to add.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
