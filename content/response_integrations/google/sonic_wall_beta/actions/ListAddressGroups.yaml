name: List Address Groups
description: List SonicWall Address Groups.
integration_identifier: SonicWall-Beta
parameters:
-   name: Address Type
    default_value: IPv4
    type: ddl
    optional_values:
    - IPv4
    - IPv6
    - All
    description: Specify which address type should be using for address groups.
    is_mandatory: false
-   name: Max Address Groups To Return
    default_value: '100'
    type: string
    description: Specify how many address groups to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_address_groups_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
