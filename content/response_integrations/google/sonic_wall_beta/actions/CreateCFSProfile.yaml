name: Create CFS Profile
description: 'Create SonicWall CFS Profile. Caution: Successful action execution commits
    all uncommitted changes. This is a SonicWall limitation. Requires SonicOS 6.5.3
    or higher.'
integration_identifier: SonicWall-Beta
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name of the CFS Profile. Unicode characters are not supported.
        This is a SonicWall limitation.
    is_mandatory: true
-   name: Allowed URI List or Group
    default_value: ''
    type: string
    description: Specify the allowed URI list or group for the CFS Profile. URI List
        with unicode characters is not supported. This is a SonicWall limitation.
    is_mandatory: false
-   name: Forbidden URI List or Group
    default_value: ''
    type: string
    description: Specify the forbidden URI list or group for the CFS Profile. Unicode
        characters are not supported. This is a SonicWall limitation.
    is_mandatory: false
-   name: Search Order
    default_value: Allowed URI First
    type: ddl
    optional_values:
    - Allowed URI First
    - Forbidden URI First
    description: Specify the search order for the CFS Profile.
    is_mandatory: true
-   name: Operation for Forbidden URI
    default_value: Block
    type: ddl
    optional_values:
    - Block
    - Confirm
    - Passphrase
    description: Specify the operation for forbidden URI for the CFS Profile.
    is_mandatory: true
-   name: Enable Smart Filter
    default_value: 'True'
    type: boolean
    description: Enable Smart Filter.
    is_mandatory: true
-   name: Enable Google Safe Search
    default_value: 'True'
    type: boolean
    description: Enable Google Safe Search.
    is_mandatory: true
-   name: Enable Youtube Restricted Mode
    default_value: 'True'
    type: boolean
    description: Enable Youtube Restricted Mode.
    is_mandatory: true
-   name: Enable Bing Safe Search
    default_value: 'True'
    type: boolean
    description: Enable Bing Safe Search.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
