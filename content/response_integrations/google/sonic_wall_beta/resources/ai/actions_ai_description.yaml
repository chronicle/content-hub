    URLs to a designated list and then committing the changes.


    ### Flow Description

    1. Extracts the target URI List Name from the action parameters.

    2. Filters the target entities to include only URL entities.

    3. Iterates through the URL entities and makes a PUT request to the SonicWall
    API to add each URL to the specified URI List.

    4. Makes a POST request to confirm and commit the pending changes in SonicWall.

    5. Returns a summary message indicating successful and failed additions.


