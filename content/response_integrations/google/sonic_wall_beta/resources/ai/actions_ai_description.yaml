Add IP to Address Group:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified SonicWall Address Group. This action can
    be used to update firewall rules dynamically, such as blocking or allowing specific
    IP addresses.


    ### Flow Description

    1. Iterates through target entities and filters for IP addresses (ADDRESS entity
    type).

    2. Validates whether each IP address is IPv4 or IPv6.

    3. Checks if the specified Address Group exists in SonicWall via a GET request.

    4. Creates a new address object for the IP in SonicWall via a POST request.

    5. Adds the newly created address object to the specified Address Group via a
    PUT request.

    6. Commits the pending changes in SonicWall via a POST request.


    ### Additional Notes

    Caution: Successful action execution commits all uncommitted changes due to a
    SonicWall limitation.
  ai_short_description: >-
    Adds IP address entities to a specified SonicWall Address Group, creating the
    necessary address objects and committing the changes to the firewall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates an address object for the IP and adds it to a specified Address Group
      in SonicWall.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST and PUT requests to SonicWall to create an address object
      and add it to an address group, mutating external data. It does not fetch data
      for enrichment, update internal entities, or create insights.
