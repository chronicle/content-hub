List URI Lists:
  ai_description: >-
    ### General Description

    Retrieves and lists the URI Lists configured on a SonicWall appliance. This action
    allows security analysts to view the existing URI lists, including their names
    and the number of URIs contained within each list, directly from the SecOps platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and the optional 'Max URI Lists To Return' parameter.

    2. Initializes the `SonicWallManager` to establish a secure session with the SonicWall
    appliance.

    3. Executes a GET request to the SonicWall API (`/api/sonicos/content-filter/uri-list-objects`)
    to retrieve the list of URI objects.

    4. Processes the retrieved data, creating a summary table containing the name
    and URI count for each list.

    5. Adds the summary table and the raw JSON data to the action results for analyst
    review.


