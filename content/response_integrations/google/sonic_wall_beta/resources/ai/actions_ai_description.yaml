Add URI List to URI Group:
  ai_description: >-
    ### General Description

    Adds a specified URI List to a SonicWall URI Group. This action interacts with
    the SonicWall API to update the content filter configuration, allowing for the
    management of URI groups used in security policies.


    ### Flow Description

    1. The action initializes the `SonicWallManager` using the provided API credentials
    and configuration.

    2. It calls the `add_uri_list_to_uri_group` method, which sends a PUT request
    to the SonicWall API endpoint `/api/sonicos/content-filter/uri-list-groups` to
    associate the specified URI List with the target URI Group.

    3. It then calls `confirm_changes`, which sends a POST request to `/api/sonicos/config/pending`
    to commit the configuration changes to the SonicWall device.

    4. The action returns a success status if the operation completes, or an error
    message if the URI group is not found or if an authorization/execution error occurs.


    ### Additional Notes

    - **Caution:** Successful execution of this action commits all uncommitted changes
    on the SonicWall device due to a platform limitation.

    - Requires SonicOS 6.5.3 or higher.

    - URI Lists and URI Groups containing unicode characters are not supported.
