Remove IP from Address Group:
  ai_description: >-
    ### General Description

    Removes a specific IP address from a designated Address Group in SonicWall. Note
    that successful execution of this action commits all pending changes on the SonicWall
    device due to API limitations.


    ### Flow Description

    1. Extracts the target Address Group name from the action parameters.

    2. Iterates over all target entities of type ADDRESS.

    3. Determines if the IP address is IPv4 or IPv6.

    4. Retrieves the specified Address Group and all address objects from SonicWall
    via GET requests.

    5. Matches the entity's IP address to an existing address object within the group.

    6. Sends a DELETE request to SonicWall to remove the matched address object from
    the Address Group.

    7. Sends a POST request to confirm and commit the changes on the firewall.


    ### Additional Notes

    Successful action execution commits all uncommitted changes on the SonicWall device.
    Groups that contain unicode characters are not supported.
