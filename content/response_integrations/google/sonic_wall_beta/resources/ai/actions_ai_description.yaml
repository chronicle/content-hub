Create CFS Profile:
  ai_description: >-
    ### General Description

    Creates a Content Filter Service (CFS) profile on a SonicWall device. This action
    allows administrators to define web filtering policies, including allowed/forbidden
    URI lists, search order, and various content filtering settings (Smart Filter,
    Safe Search, etc.).


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API credentials
    (API Root, Username, Password, Verify SSL) from the integration configuration.

    2. **Parameter Extraction**: The action retrieves the CFS profile settings provided
    by the user, including the profile name, URI lists, search order, and filtering
    options.

    3. **Session Initialization**: The `SonicWallManager` is initialized to establish
    an authenticated session with the SonicWall device.

    4. **Profile Creation**: The action calls the `create_cfs_profile` method, which
    sends a POST request to the SonicWall API (`/api/sonicos/content-filter/profiles`)
    to create the new profile with the specified configuration.

    5. **Commit Changes**: The action calls `confirm_changes` to send a POST request
    to the SonicWall API (`/api/sonicos/config/pending`) to commit the configuration
    changes.

    6. **Result Reporting**: The action returns a success or failure message based
    on the outcome of the API calls.


    ### Additional Notes

    Successful execution of this action commits all uncommitted changes on the SonicWall
    device. This is a known SonicWall limitation. This action requires SonicOS 6.5.3
    or higher.
