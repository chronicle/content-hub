List URI Groups:
  ai_description: >-
    ### General Description

    Lists the URI Groups configured on a SonicWall device. This action retrieves the
    current URI group configuration from the SonicWall appliance and presents the
    data in a structured table and JSON format for analyst review.


    ### Flow Description

    1. **Initialization**: The action initializes the `SonicWallManager` using the
    provided API credentials (API Root, Username, Password) and SSL verification settings.

    2. **Data Retrieval**: The action calls the `get_groups()` method, which performs
    a GET request to the SonicWall API endpoint `/api/sonicos/content-filter/uri-list-groups`
    to fetch the list of URI groups.

    3. **Filtering**: The retrieved list is truncated based on the `Max URI Groups
    To Return` parameter (defaulting to 100 if not specified or if the input is less
    than or equal to 0).

    4. **Formatting**: The action processes the results into a list of dictionaries
    containing the Name, URI List Count, and URI Group Count for each group.

    5. **Output**: The action adds a data table titled "Available URI Groups" and
    the raw JSON results to the action output, then completes with a success message.


    ### Additional Notes

    This action requires SonicOS 6.5.3 or higher. It is a read-only operation and
    does not modify any configurations on the SonicWall device.
