Add IP to Address Group:
  ai_description: >-
    ### General Description

    Adds a specified IP address to a designated SonicWall Address Group. This action
    automates the process of updating firewall address objects and group memberships,
    which is a critical step in managing network security policies and access control
    lists.


    ### Flow Description

    1. The action initializes the `SonicWallManager` using the provided API credentials
    and connection settings.

    2. It filters the `target_entities` to identify only those of type `ADDRESS`.

    3. For each identified IP address, the action determines whether it is an IPv4
    or IPv6 address.

    4. It verifies the existence of the specified `Group Name` in the SonicWall configuration
    for the detected IP type via a GET request.

    5. If the group exists, the action creates a new address object for the IP address
    in the specified `IP Zone` using a POST request.

    6. The action then adds the newly created address object to the target address
    group using a PUT request.

    7. Finally, it commits the changes to the SonicWall device using a POST request
    to the confirm endpoint.


    ### Additional Notes

    Successful execution of this action commits all uncommitted changes on the SonicWall
    device. This is a known limitation of the SonicWall API. Ensure that the `Group
    Name` does not contain unsupported unicode characters.
  ai_short_description: >-
    Adds a specified IP address to a designated SonicWall Address Group, updating
    firewall configurations.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates address objects and adds them to specified address groups on the SonicWall
      firewall.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data to verify group existence (GET request) and mutates
      external data by creating address objects and adding them to groups (POST/PUT
      requests). It does not mutate internal SecOps data or update entities.
