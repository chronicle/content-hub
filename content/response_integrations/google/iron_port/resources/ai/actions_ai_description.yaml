  ai_description: >-
    Fetches specific Ironport report information and enriches entities with the retrieved
    data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Report Type | Dropdown | Yes | The type of the report to fetch. Note: mail_sender_ip_hostname_detail
    and mail_incoming_ip_hostname_detail reports work based on Siemplify IP or Host
    entities; mail_users_detail works on Siemplify User entity (with email address).
    Other reports are working without Siemplify entities. |

    | Search Reports Data for Last X Days | String | Yes | Specify a time frame in
    days for which to search for reports data. By default is set to last 7 days. |

    | Max Records to Return | String | Yes | Specify the maximum number of records
    to return. By default is set to 20. |


    ### Flow

    1. Connects to the Ironport API using the provided credentials.

    2. Determines the relevant entity types based on the selected report type.

    3. Fetches the report data for the specified time frame and limit.

    4. If entities are provided and match the required types, filters the report data
    for each entity, adds an entity table, and enriches the entity with the report
    data.

    5. If no entities are provided or matched, adds a data table with all the fetched
    report data.
