Get Report:
  ai_description: >-
    Fetches specific Ironport report information based on the selected report type
    and time frame. Depending on the report type, the action can operate on specific
    entities (User, IP Address, Hostname) to enrich them with the retrieved report
    data, or it can run without entities to simply retrieve general report statistics.


    ### Flow Description

    1. Extracts the integration configurations and action parameters, including the
    report type and time frame.

    2. Determines the applicable entity types based on the selected report type (e.g.,
    User for `mail_users_detail`, IP Address and Hostname for `mail_sender_ip_hostname_detail`).

    3. Filters the target entities to match the applicable entity types.

    4. Calls the Ironport API (`/reporting/{report_type}`) to fetch the requested
    report data for the specified time frame.

    5. If no applicable entities are found, outputs the retrieved reports as a general
    data table.

    6. If applicable entities are found, filters the retrieved reports to match each
    entity's identifier.

    7. Attaches an entity-specific data table with the matching report data and modifies
    the entity's additional properties in memory.


    ### Additional Notes

    - The `mail_sender_ip_hostname_detail` and `mail_incoming_ip_hostname_detail`
    reports work with IP Address or Hostname entities.

    - The `mail_users_detail` report works with User entities (using their email address).

    - Other report types work independently of entities and will return general data
    tables.
  ai_short_description: >-
    Fetches specific Ironport report information and optionally enriches associated
    User, IP Address, or Hostname entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP GET request to the Ironport API to fetch report data
      (fetches_data=true). It does not mutate external data. While it modifies entity
      objects in memory (updating additional_properties and is_enriched), it does
      not call `siemplify.update_entities` to save these changes to the platform,
      so can_update_entities is false. It does not create insights or case comments.
