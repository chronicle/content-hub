  ai_description: >-
    Tests connectivity to the Cisco IronPort server. The action attempts to authenticate
    with the IronPort AsyncOS REST API using the provided credentials to obtain a
    JWT token. If the authentication is successful, the action completes successfully,
    confirming connectivity. Otherwise, it fails and logs the error.


    ### Flow Description

    1. Extracts integration configuration parameters (Server Address, Port, Username,
    Password, etc.).

    2. Initializes the IronportManagerAPI, which attempts to authenticate and retrieve
    a JWT token.

    3. If successful, outputs a success message. If an error occurs, catches the exception
    and fails the action.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the integration's configuration settings.
