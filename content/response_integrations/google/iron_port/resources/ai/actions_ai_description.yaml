  ai_description: >-
    Retrieves a list of recipients who received emails from a specified sender using
    Cisco IronPort. The action searches for emails within a defined timeframe and
    extracts the recipient addresses.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Sender | String | Yes | The sender email address to filter by. |

    | Search Emails for Last X | String | Yes | Specify a time frame for which to
    search for emails. Note that this value should be set accordingly to the amount
    of emails processed by Ironport; if a big enough value is provided, the action
    can time out. |

    | Set Search Email Period in | DDL | Yes | Specify if search emails should be
    done with the period of days or hours. |

    | Max Recipients to Return | String | No | Specify how many recipients the action
    should return. Default is 20. |

    | Page Size | String | No | Specify the page size for the action to use when searching
    for emails. Default is 100. |


    ### Flow

    1. Calculates the search time range based on the provided period parameters.

    2. Initiates a paginated search for messages matching the specified sender in
    IronPort.

    3. Extracts the recipients from the retrieved messages.

    4. Handles pagination and potential timeouts by running asynchronously if needed.

    5. Returns the list of recipients as a JSON result.
