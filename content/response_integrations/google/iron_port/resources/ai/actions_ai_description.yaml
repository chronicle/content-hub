  ai_description: >-
    ### General Description

    Retrieves a list of all recipients who received an email with a specific subject
    from Cisco IronPort. The action searches for emails within a specified timeframe,
    extracts the recipient addresses, and returns them as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Subject | String | Yes | The email subject to filter messages by. |

    | Search Emails for Last X | String | Yes | The timeframe value to search backwards
    for emails. Note that this value should be set accordingly to the amount of emails
    processed by Ironport; if a very large value is provided, the action might take
    longer to complete. |

    | Set Search Email Period in | Drop-down | Yes | The unit of time for the search
    period (Days or Hours). |

    | Max Recipients to Return | String | No | The maximum number of recipient email
    addresses to return. Defaults to 20. |

    | Page Size | String | No | The number of messages to fetch per API request page.
    Defaults to 100. |


    ### Flow Description

    1. Calculates the search time range based on the provided timeframe parameters.

    2. Iteratively fetches pages of messages from IronPort matching the specified
    subject.

    3. Extracts recipient email addresses from the fetched messages and adds them
    to a unique set.

    4. Stops fetching if the maximum recipient limit is reached or all messages within
    the timeframe are processed.

    5. Returns the list of unique recipients as a JSON result.


    ### Additional Notes

    The action runs asynchronously to handle large volumes of messages without timing
    out. If the action approaches the timeout limit during a cycle, it will pause
    and resume fetching in the next iteration.
