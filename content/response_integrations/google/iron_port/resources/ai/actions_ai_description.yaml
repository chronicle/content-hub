Get All Recipients By Sender:
  ai_description: >-
    ### General Description

    Retrieves a list of email recipients who received messages from a specific sender
    using the IronPort AsyncOS API. This action allows analysts to investigate email
    communication patterns by identifying all recipients associated with a given sender
    email address within a specified time frame.


    ### Flow Description

    1. The action initializes the `IronportManagerAPI` using the provided configuration
    parameters (Server Address, Port, Credentials, SSL settings).

    2. It calculates the search time range based on the `Search Emails for Last X`
    and `Set Search Email Period in` parameters.

    3. The action enters a loop to fetch messages from the IronPort appliance using
    the `get_messages_page` method, which performs a GET request to the IronPort API.

    4. It iterates through the retrieved messages, extracting the recipient lists
    and updating a set of unique recipients.

    5. The action handles pagination and script timeouts; if the execution approaches
    the timeout limit, it saves the current state (offset, recipients, dates) and
    returns an `IN_PROGRESS` status to continue in the next iteration.

    6. Once all messages are fetched or the `Max Recipients to Return` limit is reached,
    the action returns the final list of recipients as a JSON result.


    ### Additional Notes

    This action is asynchronous and supports state management to handle large volumes
    of email data without timing out. Ensure that message tracking is enabled in IronPort
    and the AsyncOS API is configured correctly for this integration to function.
  ai_short_description: >-
    Retrieves a list of email recipients who received messages from a specific sender
    using the IronPort AsyncOS API.
