Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the IronPort server using the provided integration configuration
    parameters. This action ensures that the credentials and network settings are
    correct and that the SOAR platform can successfully communicate with the IronPort
    API.


    ### Flow Description

    1. Extracts integration-level configuration parameters (e.g., Server Address,
    Port, Username, Password).

    2. Initializes the `IronportManagerAPI` client with the extracted parameters.

    3. Makes an API call to authenticate and verify connectivity to the IronPort server.

    4. Returns a successful execution state if the connection is established, or a
    failed state with an error message if the connection fails.


    ### Additional Notes

    This action does not require any specific entities or action-level parameters
    to run. It is typically used during the initial setup or troubleshooting of the
    IronPort integration.
