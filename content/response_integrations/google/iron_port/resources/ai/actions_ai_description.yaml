Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the IronPort server by attempting to authenticate using
    the provided credentials. This action validates that the integration configuration
    is correct and that the SOAR platform can successfully communicate with the IronPort
    AsyncOS REST API.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Port, Username, Password,
    SSL settings) from the integration configuration.

    2. Initializes the `IronportManagerAPI` client using the provided parameters.

    3. The client attempts to authenticate with the IronPort AsyncOS REST API by sending
    a POST request to the login endpoint to retrieve a JWT token.

    4. If the authentication is successful, the action logs a success message and
    completes with a success status.

    5. If the authentication fails or a connection error occurs, the action logs the
    error and completes with a failed status.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured before running other actions.
