Get All Recipients By Subject:
  ai_description: >-
    ### General Description

    Retrieves a list of all email recipients who received an email with a specific
    subject from the IronPort appliance. This action allows security analysts to identify
    the scope of an email campaign or phishing attempt by querying the IronPort message
    tracking logs.


    ### Flow Description

    1. **Initialization**: The action initializes the `IronportManagerAPI` using the
    provided configuration parameters (Server Address, Port, Credentials, and SSL
    settings).

    2. **Time Range Calculation**: It calculates the search time range based on the
    'Search Emails for Last X' and 'Set Search Email Period in' parameters.

    3. **Data Retrieval**: The action performs a series of GET requests to the IronPort
    AsyncOS API (`/message-tracking/messages`) to fetch messages matching the specified
    subject, utilizing pagination to handle large result sets.

    4. **Aggregation**: It iterates through the retrieved messages, extracting and
    aggregating unique recipient email addresses.

    5. **Result Output**: The action outputs the final list of unique recipients as
    a JSON result and provides a summary message.


    ### Additional Notes

    For this action to function correctly, message tracking must be enabled in the
    IronPort appliance, and the AsyncOS API must be accessible. The action supports
    asynchronous execution to handle large volumes of data without timing out.
