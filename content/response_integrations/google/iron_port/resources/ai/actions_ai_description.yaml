Get All Recipients By Sender:
  ai_description: >-
    ### General Description

    Gets a list of recipients who received emails from a given sender using Cisco
    IronPort.


    ### Flow Description

    1. Initializes the connection to the Cisco IronPort API.

    2. Calculates the search time frame based on the provided parameters.

    3. Makes a GET request to the IronPort API (`message-tracking/messages`) to fetch
    messages filtered by the specified sender.

    4. Iterates through the fetched messages and extracts the recipient email addresses.

    5. Handles pagination to fetch all relevant messages up to the specified limit.

    6. Returns the list of recipients as a JSON result.


    ### Additional Notes

    For this action to work, please make sure that message tracking is enabled in
    IronPort, along with the AsyncOS API.
  ai_short_description: >-
    Gets a list of recipients who received emails from a given sender using Cisco
    IronPort.
