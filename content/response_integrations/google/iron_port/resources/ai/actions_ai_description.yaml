Get Report:
  ai_description: >-
    ### General Description

    Fetches specific Ironport report information based on the selected report type
    and time range. This action interacts with the Ironport AsyncOS API to retrieve
    detailed reporting data, such as mail authentication, content filtering, or domain
    details. It can operate on specific entities (User, IP, or Hostname) to provide
    targeted enrichment or run globally to retrieve general report data.


    ### Flow Description

    1. **Initialization**: The action initializes the `IronportManagerAPI` using the
    provided configuration parameters (Server Address, Port, Credentials, SSL settings).

    2. **Entity Filtering**: It determines the relevant entity types for the selected
    `Report Type` using the integration's mapping configuration. It then filters the
    `siemplify.target_entities` to include only those matching the required types.

    3. **Data Retrieval**: The action calls the Ironport API (`get_reports`) to fetch
    report data for the specified time range (`Search Reports Data for Last X Days`)
    and limit (`Max Records to Return`).

    4. **Processing & Output**:
       - **If entities are present**: The action filters the retrieved reports to
    match the specific entity identifiers (e.g., matching an IP or User). It updates
    the entity's `additional_properties` with the report data, marks the entity as
    enriched (`is_enriched = True`), and adds an entity-specific table to the action
    results.
       - **If no entities are present**: The action adds a general data table containing
    the retrieved report results to the action output.

    ### Additional Notes

    - Some report types (e.g., `mail_users_detail`, `mail_sender_ip_hostname_detail`)
    require specific entity types to function as an enrichment action. Other reports
    work globally without requiring specific entities.

    - The action supports filtering by entity identifier when entities are provided.
  ai_short_description: >-
    Fetches and displays Ironport report data, optionally enriching entities with
    relevant report details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
