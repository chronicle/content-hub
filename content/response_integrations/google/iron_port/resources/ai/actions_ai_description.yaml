Get All Recipients By Subject:
  ai_description: >-
    ### General Description

    Retrieves a list of all recipients who received an email with a specific subject
    from Cisco IronPort. This action is useful for identifying the scope of an email-based
    threat or communication.


    ### Flow Description

    1. Initializes the connection to the Cisco IronPort AsyncOS API.

    2. Calculates the search time range based on the `Search Emails for Last X` and
    `Set Search Email Period in` parameters.

    3. Makes a GET request to the IronPort API (`message-tracking/messages` endpoint)
    to fetch messages matching the provided `Subject` within the calculated time range.

    4. Iterates through the paginated API responses, extracting the recipient email
    addresses from each matching message.

    5. Aggregates the unique recipients up to the `Max Recipients to Return` limit.

    6. Returns the final list of recipients as a JSON result.


    ### Additional Notes

    This is an asynchronous action designed to handle large volumes of messages by
    paginating through results across multiple execution cycles to prevent timeouts.
    For this action to function correctly, message tracking and the AsyncOS API must
    be enabled on the IronPort appliance.
  ai_short_description: >-
    Searches Cisco IronPort for emails matching a specific subject and returns a list
    of all recipients who received those emails.
