name: Get All Recipients By Subject
description: 'Get a list of all recipients that received an email with the same subject.
    Note: for action to work, please make sure that message tracking is enabled in
    IronPort, along with AsyncOS API.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ironport#get_all_recipients_by_subject
integration_identifier: IronPort
parameters:
-   name: Subject
    default_value: ''
    type: string
    description: The subject to filter by
    is_mandatory: true
-   name: Search Emails for Last X
    default_value: 7
    type: string
    description: Specify a time frame for which to search for emails. Note that this
        value should be set accordingly to the amount of emails processed by Ironport,
        if big enough value will be provided action can time out.
    is_mandatory: true
-   name: Set Search Email Period in
    default_value: Days
    type: ddl
    optional_values:
    - Days
    - Hours
    description: Specify if search emails should be done with the period of days or
        hours.
    is_mandatory: true
-   name: Max Recipients to Return
    default_value: 20
    type: string
    description: Specify how many recipients action should return.
    is_mandatory: false
-   name: Page Size
    default_value: 100
    type: string
    description: Specify the page size for the action to use when searching for emails.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_all_recipients_by_subject_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: recipients
