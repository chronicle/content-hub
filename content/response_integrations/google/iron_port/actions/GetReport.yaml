name: Get Report
description: Fetch specific Ironport report information.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ironport#get_report
integration_identifier: IronPort
parameters:
-   name: Report Type
    default_value: ''
    type: ddl
    optional_values:
    - mail_authentication_incoming_domain
    - mail_content_filter_outgoing
    - mail_destination_domain_detail
    - mail_dlp_outgoing_policy_detail
    - mail_incoming_domain_detail
    - mail_incoming_ip_hostname_detail
    - mail_incoming_network_detail
    - mail_sender_domain_detail
    - mail_sender_ip_hostname_detail
    - mail_users_detail
    - mail_virus_type_detail
    description: 'The type of the report to fetch. Note: mail_sender_ip_hostname_detail
        and mail_incoming_ip_hostname_detail reports work based on Siemplify IP or
        Host entities;  mail_users_detail works on Siemplify User entity (with email
        address). Other reports are working without Siemplify entities.'
    is_mandatory: true
-   name: Search Reports Data for Last X Days
    default_value: '7'
    type: string
    description: Specify a time frame in days for which to search for reports data.
        By default is set to last 7 days.
    is_mandatory: true
-   name: Max Records to Return
    default_value: '20'
    type: string
    description: Specify a time frame in days for which to search for reports data.
        By default is set to last 7 days.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_report_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
