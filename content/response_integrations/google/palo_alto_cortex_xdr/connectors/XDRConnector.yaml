name: Palo Alto Cortex XDR Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: The name of the field where the product name is stored.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: The name of the field that determines the event name (subtype).
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: Api Root
    default_value: https://api-{fqdn}
    type: string
    description: The API root of the Palo Alto XDR instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Api Key
    default_value: ''
    type: password
    description: The Palo Alto XDR API key.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Api Key ID
    default_value: '3'
    type: integer
    description: The Palo Alto XDR API key ID.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Palo Alto XDR server.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Alerts Count Limit
    default_value: '10'
    type: integer
    description: 'The maximum number of incidents the connector processes for every
        iteration. Maximum: 100.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Use dynamic list as a blocklist
    default_value: 'false'
    type: boolean
    description: If selected, the connector uses the dynamic list as a blocklist.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Include Historical Artifacts
    default_value: 'true'
    type: boolean
    description: If selected, the connector retrieves all historical artifacts associated
        with an alert during the initial ingestion. Enabling this option may increase
        the volume of data ingested during the first run.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Disable Overflow
    default_value: 'true'
    type: boolean
    description: If selected, the connector ignores the Google SecOps overflow mechanism.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Days Backwards
    default_value: '24'
    type: integer
    description: The maximum number of days in the past to search for and retrieve
        incidents.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Status Filter
    default_value: New,Under Investigation
    type: string
    description: A comma-separated list of alert statuses for the connector to ingest.
        If no value is provided, the connector defaults to fetching alerts with the
        New and Under Investigation statuses.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Split Incident Alerts
    default_value: 'false'
    type: boolean
    description: If selected, the connector separates the individual alerts within
        a single source incident, creating a distinct SOAR Alert for each one.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Lowest Alert Severity To Fetch
    default_value: ''
    type: string
    description: The lowest severity of the alerts to retrieve. If no value is provided,
        the connector ingests alerts with all severity levels. The Lowest Incident
        SmartScore To Fetch acts as a master filter. If an incident's score meets
        this threshold, all associated alerts will be processed, regardless of their
        individual severity filter settings.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Lowest Incident Severity To Fetch
    default_value: ''
    type: string
    description: The lowest severity of the incidents to retrieve. If no value is
        provided, the connector ingest incidents with all severities.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Lowest Incident SmartScore To Fetch
    default_value: ''
    type: integer
    description: The lowest SmartScore (0 to 100) of the incidents to fetch. This
        filter operates independently of the severity filter. If no value is provided,
        the SmartScore filter is ignored.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the field where the environment name is stored. If the
        environment field is missing, the connector uses the default value.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: ''
    type: integer
    description: A regular expression pattern to run on the value found in the Environment
        Field Name field. This parameter lets you manipulate the environment field
        using the regular expression logic. Use the default value .* to retrieve the
        required raw Environment Field Name value. If the regular expression pattern
        is null or empty, or the environment value is null, the final environment
        result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: '180'
    type: integer
    description: The timeout limit, in seconds, for the Python process that runs the
        current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Artifacts To Ignore
    default_value: ''
    type: string
    description: A comma-separated list of artifacts to exclude from Google SecOps
        event creation.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Pull incidents from Palo Alto XDR. Dynamic List works with the “source”
    parameter.
integration: PaloAltoCortexXDR
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-cortex-xdr#palo-alto-cortex-xdr-connector
rules: []
is_connector_rules_supported: false
creator: admin
