name: Update an Incident
description: The ability to set a specific XDR incident as under investigation, assign
    to named users, etc.
integration_identifier: PaloAltoCortexXDR
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: The ID of the incident to be updated.
    is_mandatory: true
-   name: Assigned User Name
    default_value: ''
    type: string
    description: The updated full name of the incident assignee.
    is_mandatory: false
-   name: Severity
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Low
    - Medium
    - High
    description: Administrator-defined severity
    is_mandatory: false
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - NEW
    - UNDER_INVESTIGATION
    - RESOLVED_TRUE_POSITIVE
    - RESOLVED_KNOWN_ISSUE
    - RESOLVED_DUPLICATE
    - RESOLVED_FALSE_POSITIVE
    - RESOLVED_OTHER
    description: Updated incident status
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
