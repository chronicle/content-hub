name: Execute XQL Search
description: 'Use “Execute XQL Search” action to fetch information using XQL in Palo
    Alto XDR. Note: Action is running as async, please adjust script timeout value
    in Google SecOps IDE for action, as needed.'
integration_identifier: PaloAltoCortexXDR
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Query that needs to be executed in Palo Alto XDR. Note: don''t provide
        "limit" as part of the query. Action will provide it automatically based on
        the value provided in the “Max Results To Return” parameter.'
    is_mandatory: true
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Time frame for the results. If “Custom” is selected, you also need
        to provide "Start Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Start time for the results. This parameter is mandatory, if “Custom”
        is selected for the "Time Frame" parameter. Format: ISO 8601.'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'End time for the results. Format: ISO 8601. If nothing is provided
        and "Custom" is selected for the "Time Frame" parameter then this parameter
        will use current time.'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'How many results to return for the query. Action will append "limit"
        to the provided query. Default: 50. Maximum: 1000.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_xql_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
