name: Resolve an Incident
description: The ability to close XDR incidents with a close reason.
integration_identifier: PaloAltoCortexXDR
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: The ID of the incident to be updated.
    is_mandatory: true
-   name: Status
    default_value: UNDER_INVESTIGATION
    type: ddl
    optional_values:
    - NEW
    - UNDER_INVESTIGATION
    - RESOLVED_TRUE_POSITIVE
    - RESOLVED_KNOWN_ISSUE
    - RESOLVED_DUPLICATE
    - RESOLVED_FALSE_POSITIVE
    - RESOLVED_OTHER
    description: Updated incident status
    is_mandatory: true
-   name: Resolve Comment
    default_value: ''
    type: string
    description: Descriptive comment explaining the incident change.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
