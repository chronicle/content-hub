integration_identifier: PaloAltoCortexXDR
parameters:
-   name: Comment
    default_value: ''
    type: string
    description: Provide additional comment that represents additional information
        regarding the action.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities": ["FILEHASH"]}'
