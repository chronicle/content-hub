name: Download File
description: "Use the “Download File” action to download files from endpoints in Palo Alto XDR. Supported Entities: IP Address, Hostname. Note: This action executes asynchronously, requiring you to adjust the script timeout value in the Google SecOps IDE."
integration_identifier: PaloAltoCortexXDR
is_async: true
parameters:
- name: Incident ID
  default_value: ''
  type: string
  description: The ID of the incident to associate the download activity with, allowing the results to appear in the incident timeline.
  is_mandatory: false
- name: Agent ID
  default_value: ''
  type: string
  description: A comma-separated list of agent IDs to download the files from. This parameter works in conjunction with the provided entities
  is_mandatory: false
- name: File Paths
  default_value: ''
  type: string
  description: A comma-separated list of file paths to download.
  is_mandatory: true
- name: Download Folder Path
  default_value: /tmp
  type: string
  description: Name of the folder, where the file needs to be stored.
  is_mandatory: true
- name: Overwrite
  default_value: 'False'
  type: boolean
  description: If selected, the action overwrites the file with the same name.
  is_mandatory: true
dynamic_results_metadata:
- result_name: JsonResult
  result_example: '[{"Entity": "10.10.10.10", "EntityResult": {"download_file_path": ["x.x.x.x"], "errored_file_paths": ["x.x.x.x"]}}]'
  show_result: true
script_result_name: is_success
creator: Admin
