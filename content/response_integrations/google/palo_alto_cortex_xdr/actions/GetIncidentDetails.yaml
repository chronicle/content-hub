name: Get Incident Details
description: Use “Get Incident Details” action to fetch information about the incident
    in Palo Alto XDR.
integration_identifier: PaloAltoCortexXDR
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: ID of the incident that needs to be returned.
    is_mandatory: true
-   name: Lowest Alert Severity
    default_value: High
    type: ddl
    optional_values:
    - Critical
    - High
    - Medium
    - Low
    description: Lowest severity for the alert to be returned.
    is_mandatory: false
-   name: Max Alerts To Return
    default_value: 50
    type: string
    description: 'How many alerts to return for the query. Default: 50. Maximum: 1000.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_incident_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
