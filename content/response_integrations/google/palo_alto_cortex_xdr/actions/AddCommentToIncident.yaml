name: Add Comment To Incident
description: Add a comment to an incident in Palo Alto Cortex XDR.
integration_identifier: PaloAltoCortexXDR
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: ID of the incident that needs to be updated.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Comment for the incident.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
