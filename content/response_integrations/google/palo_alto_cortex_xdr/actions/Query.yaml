    "AIDescription": "### General Description\n\nThe **Query** action retrieves comprehensive information about a specific incident from Palo Alto Cortex XDR. It is designed to provide security analysts with deep visibility into a single incident by fetching associated alerts, network artifacts, and file artifacts. This action is primarily used to gather detailed context for investigation without modifying the state of the external system.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Incident ID** | String | Yes | The unique identifier of the Cortex XDR incident for which you want to retrieve data. |\n\n### Flow Description\n\n1. **Initialization**: The action initializes the Palo Alto Cortex XDR API client using the integration's configuration parameters (API Root, API Key, etc.).\n2. **Data Retrieval**: It calls the `get_incident_extra_data` API endpoint using the provided **Incident ID** to fetch the incident's details, including alerts, network artifacts, and file artifacts.\n3. **Data Processing**:\n    * If data is successfully retrieved, the action extracts the list of alerts.\n    * It formats the alert data into a CSV-style data table for display in the\nGoogle SecOps UI. 4. **Output Generation**:\n    * Adds a data table named \"Incident [ID] Alerts\" to the action results.\n    * Attaches the full raw JSON response from Cortex XDR to the action results\nfor further analysis.\n    * Returns a summary message indicating success and the number of alerts found.\n\n### Additional Notes\n\n* This action does not process entities (such as IPs or Hostnames) from the case; it operates strictly on the **Incident ID** provided as a parameter.\n* If the specified Incident ID is not found or contains no data, the action will complete with a \"Not found\" message.",
