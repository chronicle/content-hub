name: Sync Incidents
parameters:
-   name: Environment Name
    default_value: Default Environment
    type: string
    description: The name of the environment from which to sync incidents.
    is_mandatory: true
-   name: Api Root
    default_value: ''
    type: string
    description: Palo Alto XDR API Root.
    is_mandatory: false
-   name: Api Key
    default_value: ''
    type: password
    description: Palo Alto XDR API Key.
    is_mandatory: true
-   name: Api Key ID
    default_value: ''
    type: string
    description: Palo Alto XDR API Key ID.
    is_mandatory: true
-   name: Max Hours Backwards
    default_value: 24
    type: integer
    description: The number of hours to synchronize incidents prior to the current
        time. The default value is `24`.
    is_mandatory: true
-   name: User Mapping JSON
    default_value: '{"Google SecOps Display Name": "XDR Username"}'
    type: string
    description: JSON object that contains information about the mapping between Google
        SecOps and Microsoft Sentinel users. This job will sync Google SecOps assignee
        to Palo Alto XDR. If nothing is provided in this parameter, the user sync
        will not be performed.
    is_mandatory: false
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Palo Alto XDR server. Enabled by default.
    is_mandatory: true
description: This job synchronizes Google SecOps Alerts and Palo Alto XDR Incidents.
    It ensures that comments and status are kept in sync between the two systems.
    For the job to identify the correct information, the Google SecOps case must have
    the "Palo Alto XDR Incident" tag. If the alert didn’t originate from "Palo Alto
    Cortex XDR Connector",  you will need to add an "Incident_ID" context value to
    the case for the job to be able to find the correct information.
documentation_link: null
integration: PaloAltoCortexXDR
creator: Admin
