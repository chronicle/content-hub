    optional 'Agent ID' list from the input parameters.\n2. **Entity Resolution**:
    For each provided Hostname or IP entity, the action queries the Cortex XDR API
    to find the corresponding internal Endpoint ID.\n3. **Unisolation Request**: The
    action sends a POST request to the Cortex XDR 'unisolate' endpoint for every resolved
    Endpoint ID.\n4. **Manual Agent Processing**: Any Agent IDs provided in the parameters
    are also sent for unisolation, provided they haven't already been processed via
    entities.\n5. **Internal Updates**: Successfully unisolated entities are updated
    within Google SecOps.\n6. **Reporting**: A summary of successful, failed, and
    missing endpoints is returned to the user.\n\n### Additional Notes\nEither target
    entities or Agent IDs must be provided for the action to run successfully.
