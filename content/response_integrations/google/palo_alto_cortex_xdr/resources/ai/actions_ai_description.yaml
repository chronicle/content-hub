Execute XQL Search:
  ai_description: >-
    ### General Description

    Executes a custom XQL (XDR Query Language) search in Palo Alto Cortex XDR to retrieve
    event data and telemetry. This action is designed for flexible data retrieval,
    allowing users to run complex queries across XDR datasets. It operates asynchronously,
    initiating a search job and polling for results until the query completes.


    ### Flow Description

    1. **Parameter Validation**: The action validates the provided XQL query, time
    frame, and result limits. If 'Custom' is selected, it ensures a valid 'Start Time'
    is provided.

    2. **Search Initiation**: On the first execution, the action sends the query to
    the Cortex XDR API (`/public_api/v1/xql/start_xql_query`) to start a search job
    and retrieves a unique `query_id`.

    3. **Status Polling**: The action enters an asynchronous state, periodically checking
    the status of the `query_id` in Cortex XDR via the API (`/public_api/v1/xql/get_query_results`).

    4. **Result Retrieval**: Once the search job status reaches 'SUCCESS', the action
    fetches the event data.

    5. **Finalization**: The retrieved events are formatted into JSON results, and
    the action completes with a success message and the data payload.


    ### Additional Notes

    - **Asynchronous Execution**: This action runs in an async loop. If the query
    is complex, ensure the Google SecOps IDE timeout is configured to accommodate
    the expected processing time.

    - **Query Limits**: The action enforces a maximum limit of 1000 results to ensure
    performance stability. Do not include a `limit` clause in the query string, as
    the action appends this automatically based on the 'Max Results To Return' parameter.
