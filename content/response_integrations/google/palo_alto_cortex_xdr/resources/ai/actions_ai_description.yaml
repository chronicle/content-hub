Download File:
  ai_description: >-
    ### General Description

    This action downloads a file from endpoints in Palo Alto Cortex XDR. It supports
    both IP Address and Hostname entities, as well as manually provided Agent IDs.
    Because the file retrieval is performed asynchronously, the action will poll the
    Cortex XDR API for the status of the action until it reaches a terminal state
    (Success, Failure, or Timeout) and then download the file.


    ### Flow Description

    1. Extracts the action parameters: Incident ID, Agent ID, File Paths, Download
    Folder Path, and Overwrite.

    2. Validates that the specified download folder path exists and is a directory.

    3. Resolves the provided IP Address and Hostname entities, as well as Agent IDs,
    to Cortex XDR endpoints.

    4. If the Overwrite parameter is false, pre-validates that the destination files
    do not already exist to prevent conflicts.

    5. Initiates a file retrieval action on the resolved endpoints via the Cortex
    XDR API.

    6. Asynchronously polls the Cortex XDR API to check the status of the file retrieval
    action.

    7. Once the retrieval is completed successfully, fetches the download URL for
    the file.

    8. Downloads the file content and saves it to the specified local folder.


    ### Additional Notes

    - This action executes asynchronously, requiring you to adjust the script timeout
    value in the Google SecOps IDE.

    - The downloaded files are saved as zip archives with a normalized filename format.
