Scan Endpoint:
  ai_description: >-
    ### General Description

    This action initiates an asynchronous security scan on endpoints within Palo Alto
    Cortex XDR. It supports both IP Address and Hostname entities, as well as manually
    provided Agent IDs. Because the scan is performed asynchronously, the action will
    poll the Cortex XDR API for the status of the scan until it reaches a terminal
    state (Success, Failure, or Timeout).


    ### Flow Description

    1. **Entity Filtering**: The action identifies all IP Address and Hostname entities
    from the target entities list.

    2. **Endpoint Resolution**: For each entity, the action queries Cortex XDR to
    find the corresponding `endpoint_id` using the IP or Hostname.

    3. **Agent ID Integration**: It merges the resolved endpoint IDs with any manually
    provided `Agent ID` parameters, validating that Agent IDs follow the 32-character
    hexadecimal format.

    4. **Scan Initiation**: It sends a request to Cortex XDR to start the scan for
    all identified endpoints. If an `Incident ID` is provided, the scan is linked
    to that incident.

    5. **Asynchronous Polling**: The action stores the `action_id` and enters a polling
    loop. In each cycle, it checks the status of the scan for each endpoint.

    6. **Finalization**: Once all scans reach a finished status (Completed, Failed,
    Aborted, etc.), the action aggregates the results, updates the JSON output with
    endpoint details, and reports the final success or failure message.


    ### Additional Notes

    - This action is **asynchronous**. It will enter an 'In Progress' state and poll
    for results every 30 seconds (as defined by the `AsyncPollingIntervalInSeconds`).

    - Ensure the script timeout in the Google SecOps IDE is sufficiently high to accommodate
    the duration of a full endpoint scan.

    - Either suitable entities (IP/Hostname) or at least one valid Agent ID must be
    provided for the action to execute.
