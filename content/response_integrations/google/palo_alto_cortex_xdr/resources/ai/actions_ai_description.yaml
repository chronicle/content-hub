    3. **API Interaction**: It sends a POST request to the Cortex XDR `/public_api/v1/incidents/update_incident/`
    endpoint with the specified update data.

    4. **Validation**: The action validates the API response to ensure the update
    was successful.

    5. **Completion**: It reports the final execution state (Completed or Failed)
    and an output message to the Google SecOps platform.


