Enrich Entities:
  ai_description: >-
    Enriches Hostname and IP Address entities with detailed endpoint information retrieved
    from Palo Alto Cortex XDR. This action helps security analysts gain context about
    endpoints, such as their operating system, isolation status, last seen time, and
    associated users.


    ### Parameters

    This action does not require any input parameters.


    ### Flow Description

    1. **Initialization**: Authenticates with the Palo Alto Cortex XDR API using the
    provided integration credentials.

    2. **Entity Filtering**: Identifies supported entities (Hostname and IP Address)
    from the current context.

    3. **Data Retrieval**: For each supported entity, it queries the Cortex XDR API
    to find a matching endpoint by hostname or IP address.

    4. **Enrichment**: If a match is found, the action retrieves endpoint metadata
    (e.g., OS type, endpoint status, domain, users).

    5. **Internal Updates**: Updates the entity's additional properties with the retrieved
    data, adds a detailed CSV table to the entity, and marks the entity as 'enriched'.

    6. **Completion**: Updates the entities within Google SecOps and provides a summary
    of successful, missing, or failed enrichments.
