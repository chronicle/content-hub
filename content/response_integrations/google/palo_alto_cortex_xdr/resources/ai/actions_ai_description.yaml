  ai_description: >-
    ### General Description

    Tests the connectivity to the Palo Alto Cortex XDR instance to ensure that the
    integration is correctly configured and the API credentials are valid. This action
    validates the connection by attempting to authenticate with the Cortex XDR API
    using the provided API Key and API Key ID.


    ### Flow Description

    1. **Initialize Action**: The script initializes the Siemplify action context
    and sets the script name.

    2. **Authentication**: The action retrieves the integration's configuration parameters
    and creates an authenticated session.

    3. **Connectivity Test**: The `XDRManager` makes a POST request to the `/api_keys/validate/`
    endpoint of the Palo Alto Cortex XDR API.

    4. **Response Validation**: The script validates the API response. If the credentials
    are valid and the service is reachable, it proceeds to the final step.

    5. **Completion**: The action returns a success message and sets the result value
    to `true`.


