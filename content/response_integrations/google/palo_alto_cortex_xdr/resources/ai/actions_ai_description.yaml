Unisolate Endpoint:
  ai_description: >-
    ### General Description

    Unisolates endpoints in Palo Alto Cortex XDR. This action allows security administrators
    to restore network connectivity to endpoints that were previously isolated for
    containment purposes. It supports both entity-based execution (IP and Hostname)
    and manual input via Agent IDs.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the optional 'Agent ID' list
    from the input parameters.

    2. **Entity Resolution**: For each provided Hostname or IP entity, the action
    queries the Cortex XDR API to find the corresponding internal Endpoint ID.

    3. **Unisolation Request**: The action sends a POST request to the Cortex XDR
    'unisolate' endpoint for every resolved Endpoint ID.

    4. **Manual Agent Processing**: Any Agent IDs provided in the parameters are also
    sent for unisolation, provided they haven't already been processed via entities.

    5. **Internal Updates**: Successfully unisolated entities are updated within Google
    SecOps.

    6. **Reporting**: A summary of successful, failed, and missing endpoints is returned
    to the user.


    ### Additional Notes

    Either target entities or Agent IDs must be provided for the action to run successfully.
