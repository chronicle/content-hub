    ### General Description\nUnisolates endpoints in Palo Alto Cortex XDR. This action
    allows security administrators to restore network connectivity to endpoints that
    were previously isolated for containment purposes. It supports both entity-based
    execution (IP and Hostname) and manual input via Agent IDs.\n\n### Parameters
