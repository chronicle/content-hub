Get Endpoint Agent Report:
  ai_description: >-
    ### General Description

    The **Get Endpoint Agent Report** action retrieves a detailed agent report for
    specific endpoint entities (Hostnames or IP Addresses) from Palo Alto Cortex XDR.
    This action provides visibility into the operational status, versioning, and configuration
    details of the XDR agent installed on the target machine, which is essential for
    verifying endpoint health and security coverage.


    ### Flow Description

    1. **Entity Filtering**: The action iterates over the target entities and filters
    them to process only supported types: **HOSTNAME** and **ADDRESS**.

    2. **Endpoint Lookup**: For each supported entity, the action queries the Cortex
    XDR API (`get_endpoint_by_hostname` or `get_endpoint_by_ip`) to find the corresponding
    `endpoint_id`.

