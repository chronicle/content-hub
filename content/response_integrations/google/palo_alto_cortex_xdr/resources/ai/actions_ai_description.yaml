Execute XQL Search:
  ai_description: >-
    ### General Description

    Executes a custom XQL (XDR Query Language) search in Palo Alto Cortex XDR to retrieve event data and telemetry. This action is designed for flexible data retrieval, allowing users to run complex queries across XDR datasets. It operates asynchronously, initiating a search job and polling for results until the query completes.



    ### Additional Notes

    - **Asynchronous Execution**: This action runs in an async loop. If the query is complex, ensure the Google SecOps IDE timeout is configured to accommodate the expected processing time.

    - **Query Limits**: The action enforces a maximum limit of 1000 results to ensure performance stability.


    ### Flow Description

    1. **Parameter Validation**: The action validates the XQL query, time frame logic, and result limits. If 'Custom' is selected, it ensures a valid 'Start Time' is provided.

    2. **Search Initiation**: On the first execution, the action sends the query to the Cortex XDR API to start a search job and retrieves a unique `query_id`.

    3. **Status Polling**: The action enters an asynchronous state, periodically checking the status of the `query_id` in Cortex XDR.

    4. **Result Retrieval**: Once the search job status reaches 'SUCCESS', the action fetches the event data.

    5. **Finalization**: The retrieved events are formatted into JSON results, and the action completes with a success message and the data payload.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation:
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
  outcome_categories:
    enrichment: false
  parameters_description: >-
    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The XQL query to be executed. Note: Do not include a `limit` clause in the query string, as the action appends this automatically based on the 'Max Results To Return' parameter. |

    | Time Frame | Dropdown | No | The time range for the search. Options include 'Last Hour', 'Last 6 Hours', 'Last 24 Hours', 'Last Week', 'Last Month', or 'Custom'. Default is 'Last Hour'. |

    | Start Time | String | No | The start time for the search in ISO 8601 format (e.g., 2023-10-01T00:00:00Z). This is mandatory if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time for the search in ISO 8601 format. If 'Custom' is selected and this is left blank, the current time is used. |

    | Max Results To Return | Integer | No | The maximum number of events to return. Supports values between 1 and 1000. Default is 50. |
  ai_short_description: >-
    Executes a custom XQL (XDR Query Language) search in Palo Alto Cortex XDR to retrieve event data and telemetry. This action is designed for flexible data retrieval, allowing users to run complex queries across XDR datasets. It operates asynchronously, initiating a search job and polling for results until the query completes.
Get Endpoint Agent Report:
  ai_description: >-
    ### General Description

    The **Get Endpoint Agent Report** action retrieves a detailed agent report for specific endpoint entities (Hostnames or IP Addresses) from Palo Alto Cortex XDR. This action provides visibility into the operational status, versioning, and configuration details of the XDR agent installed on the target machine, which is essential for verifying endpoint health and security coverage.



    ### Flow Description

    1. **Entity Filtering**: The action identifies and filters the target entities, focusing only on supported types: **HOSTNAME** and **ADDRESS**.

    2. **Endpoint Lookup**: For each entity, the action queries the Cortex XDR API to find the corresponding `endpoint_id`. It uses the hostname for Hostname entities and the IP address for Address entities.

    3. **Report Retrieval**: Once the `endpoint_id` is identified, the action calls the Cortex XDR API to fetch the full agent report data.

    4. **Data Enrichment**: The retrieved report is converted into a flat CSV format and attached as an entity table. The raw JSON data is also added to the action results.

    5. **Entity Update**: The action marks the entities as enriched (`is_enriched = True`) and updates them within the Google SecOps platform.


    ### Additional Notes

    - If an endpoint cannot be found in Cortex XDR for a specific entity, the action logs the missing entity and continues processing others.

    - The action includes built-in timeout handling to ensure it completes or fails gracefully before the execution deadline.
