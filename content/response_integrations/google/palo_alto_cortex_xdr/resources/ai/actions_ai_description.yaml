Isolate Endpoint:
  ai_description: >-
    ### General Description

    This action isolates specific endpoints within the Palo Alto Cortex XDR environment.
    It targets endpoints based on Google SecOps entities (Hostname or IP Address)
    or via a manually provided list of Agent IDs. Isolation effectively restricts
    the endpoint's network connectivity to prevent the spread of threats while maintaining
    communication with the Cortex XDR management console.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the optional `Agent ID` list from the action
    configuration.

    2. **Entity Resolution**: Iterates through the target entities. For `HOSTNAME`
    entities, it queries Cortex XDR to find the matching endpoint. For `ADDRESS` (IP)
    entities, it performs a similar lookup.

    3. **Isolation (Entities)**: For every successfully resolved endpoint from the
    entities, it sends an isolation request to the Cortex XDR API.

    4. **Isolation (Agent IDs)**: Processes the manually provided `Agent ID` list.
    It validates the format of each ID and sends isolation requests for those not
    already processed via entities.

    5. **Internal Updates**: Updates the status of successfully isolated entities
    within Google SecOps.

    6. **Reporting**: Consolidates the results, providing a detailed output message
    regarding successful isolations, missing endpoints, invalid IDs, or failures.


    ### Additional Notes

    - The action requires either valid target entities (Hostname or IP) or at least
    one valid Agent ID to perform any operation.

    - Hostname and IP entities are first resolved to their corresponding Cortex XDR
    Endpoint IDs before the isolation command is sent.
