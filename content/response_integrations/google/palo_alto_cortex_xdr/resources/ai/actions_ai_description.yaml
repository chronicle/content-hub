Update an Incident:
  ai_description: >-
    Updates specific fields of an incident in Palo Alto Cortex XDR. This action allows
    users to modify the assignee, severity, and status of an existing incident by
    providing its unique ID. It interacts with the Cortex XDR Public API to apply
    these changes.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident to be updated
    in Cortex XDR. |

    | Assigned User Name | String | No | The email address or full name of the user
    to whom the incident should be assigned. |

    | Severity | Dropdown | No | The new severity level for the incident. Options
    include: Low, Medium, High. |

    | Status | Dropdown | No | The new status for the incident. Options include: NEW,
    UNDER_INVESTIGATION, RESOLVED_TRUE_POSITIVE, RESOLVED_KNOWN_ISSUE, RESOLVED_DUPLICATE,
    RESOLVED_FALSE_POSITIVE, RESOLVED_OTHER. |


    ### Additional Notes

    * At least one of the optional parameters ('Assigned User Name', 'Severity', or
    'Status') must be configured with a value other than 'Select One' for the action
    to execute successfully.

    * The 'Assigned User Name' is mapped to the 'assigned_user_mail' field in the
    Cortex XDR API.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the Incident ID and the
    desired update values (Assignee, Severity, Status) from the input parameters.

    2. **Validation**: It checks if at least one update field has been provided. If
    all optional fields are empty or set to 'Select One', the action fails with a
    descriptive error.

    3. **API Interaction**: The action calls the `update_an_incident` method in the
    XDR Manager, which sends a POST request to the Cortex XDR `/public_api/v1/incidents/update_incident/`
    endpoint.

    4. **Error Handling**: The action handles specific error cases, such as when the
    incident ID is not found in the external system, and provides clear feedback.

    5. **Completion**: Upon a successful API response, the action returns a success
    message and sets the execution state to completed.
