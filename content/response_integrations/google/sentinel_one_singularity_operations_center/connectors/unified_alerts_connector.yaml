name: SentinelOne Singularity Operations Center - Unified Alerts Connector
parameters:
    -   name: DeviceProductField
        default_value: "Product Name"
        type: string
        description: "Enter the source field name in order to retrieve the Product Field name."
        is_mandatory: true
        is_advanced: false
        mode: regular
    -   name: EventClassId
        default_value: "event_type"
        type: string
        description: "Enter the source field name in order to retrieve the Event Field name."
        is_mandatory: true
        is_advanced: false
        mode: regular
    -   name: Environment Field Name
        default_value: ''
        type: string
        description: "Describes the name of the field where the environment name is stored. If the environment field isn't found, the environment is the default environment."
        is_mandatory: false
        is_advanced: true
        mode: regular
    -   name: Environment Regex Pattern
        default_value: .*
        type: string
        description: "A regex pattern to run on the value found in the 'Environment Field Name' field. Default is .* to catch all and return the value unchanged. Used to allow the user to manipulate the environment field via regex logic. If the regex pattern is null or empty, or the environment value is null, the final environment result is the default environment."
        is_mandatory: false
        is_advanced: true
        mode: regular
    -   name: PythonProcessTimeout
        default_value: '180'
        type: string
        description: "Timeout limit for the python process running the current script."
        is_mandatory: true
        is_advanced: true
        mode: regular
    -   name: API Root
        default_value: ''
        type: string
        description: "API Root for the SentinelOne Singularity Operations Center instance."
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: API Token
        default_value: ''
        type: password
        description: "API Token for the SentinelOne Singularity Operations Center instance."
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: Lowest Severity To Fetch
        default_value: ''
        type: string
        description: "Lowest severity of the issues to fetch. If nothing is provided, the connector will ingest issues with all severities. Possible Values: Critical, High, Medium, Low, Info."
        is_mandatory: false
        is_advanced: true
        mode: script
    -   name: Max Hours Backwards
        default_value: 1
        type: integer
        description: "Amount of hours from where to fetch alerts."
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: Max Alerts To Fetch
        default_value: 10
        type: integer
        description: "How many alerts to process per one connector iteration."
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: Use dynamic list as a blocklist
        default_value: false
        type: boolean
        description: "If enabled, the dynamic list will be used as a blocklist."
        is_mandatory: true
        is_advanced: true
        mode: script
    -   name: Disable Overflow
        default_value: false
        type: boolean
        description: "If enabled, connector will ignore the overflow mechanism."
        is_mandatory: false
        is_advanced: true
        mode: script
    -   name: Verify SSL
        default_value: true
        type: boolean
        description: "If enabled, verify the SSL certificate for the connection to the SentinelOne Singularity Operations Center server is valid."
        is_mandatory: true
        is_advanced: true
        mode: script
    -   name: Proxy Server Address
        default_value: ''
        type: string
        description: "The address of the proxy server to use."
        is_mandatory: false
        is_advanced: true
        mode: regular
    -   name: Proxy Username
        default_value: ''
        type: string
        description: "The proxy username to authenticate with."
        is_mandatory: false
        is_advanced: true
        mode: regular
    -   name: Proxy Password
        default_value: ''
        type: password
        description: "The proxy password to authenticate with."
        is_mandatory: false
        is_advanced: true
        mode: regular
description: "Pull unified alerts from SentinelOne Singularity Operations Center. Dynamic List works with the 'classification' parameter."
integration: SentinelOneSingularityOperationsCenter
rules: []
is_connector_rules_supported: true
creator: Admin
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/SentinelOneSingularityOperationsCenter#sentinelone-singularity-operations-center---unified-alerts-connector
