Ping:
  ai_description: >-
    The Ping action is a diagnostic tool used to verify the connectivity between Google
    SecOps and the SentinelOne Singularity Operations Center. It ensures that the integration's configuration
    parameters, such as the API Root and API Token, are correct and that the SentinelOne service is reachable.


    ### Parameters

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration settings:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the SentinelOne Singularity Operations Center instance.
    |

    | API Token | Secret | Yes | The API Token used for authentication.
    |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the SentinelOne
    server. |


    ### Flow Description

    1. **Initialization**: The action initializes the API client by retrieving the
    global integration configuration (API Root, API Token, and SSL settings).

    2. **Authentication**: It sets up an authenticated session using the provided
    API Token in a Bearer Authorization header.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a lightweight POST request with a minimized GraphQL query to the `/web/api/v2.1/unifiedalerts/graphql` endpoint.

    4. **Result Reporting**: If the request is successful (returns 200 OK without errors), it returns a success message.
    If the connection fails or returns an error, it reports a failure message.
