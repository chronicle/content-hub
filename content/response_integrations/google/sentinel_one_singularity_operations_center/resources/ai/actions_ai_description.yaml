SentinelOne Singularity Operations Center - Unified Alerts Connector:
  ai_description: >-
    ### General Description

    Pulls unified alerts from SentinelOne Singularity Operations Center into Google SecOps.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve Product Field name. |

    | EventClassId | String | Yes | Source field name to retrieve Event Field name. |

    | Environment Field Name | String | No | Field storing environment name. |

    | Environment Regex Pattern | String | No | Regex pattern to run on environment field. |

    | PythonProcessTimeout | String | Yes | Timeout limit for script execution. |

    | API Root | String | Yes | Base URL of SentinelOne Singularity Operations Center. |

    | API Token | Secret | Yes | API Token for authentication. |

    | Lowest Severity To Fetch | String | No | Filter alerts by minimum severity (Critical, High, Medium, Low, Info). |

    | Max Hours Backwards | Integer | Yes | Lookback window in hours for initial fetch. |

    | Max Alerts To Fetch | Integer | Yes | Maximum number of alerts to process per iteration. |

    | Use dynamic list as a blocklist | Boolean | Yes | If enabled, dynamic list is used as a blocklist. |

    | Disable Overflow | Boolean | No | If enabled, ignores overflow mechanism. |

    | Verify SSL | Boolean | Yes | Enable SSL certificate verification. |

    | Proxy Server Address | String | No | Proxy server address. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | Secret | No | Proxy password. |


    ### Flow Description

    1. **Initialization**: Reads execution timestamp and last fetch time from local storage.

    2. **Querying**: Queries SentinelOne Singularity Operations Center GraphQL API for unified alerts created/updated since last fetch.

    3. **Deduplication & Sorting**: Sorts alerts by modification timestamp, filters out previously processed alert IDs, and caps by `Max Alerts To Fetch`.

    4. **Ingestion**: Converts retrieved alerts into SecOps SOAR AlertInfo and Event objects for ingestion.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Ingests SentinelOne unified alerts into Google SecOps as alerts and events.
