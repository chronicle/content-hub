Add Alert Comment:
  ai_description: >-
    ### General Description

    Adds a comment or note to a specific alert in SentinelOne Singularity Operations Center.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique ID of the SentinelOne alert to which the comment should be added. |

    | Comment | String | Yes | The text content of the comment/note. |

    | Comment Type | DDL | No | The format of the comment. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Alert ID, Comment text, and optional Comment Type parameters.

    2. **Mapping**: Maps the UI selection (Plain Text, Markdown, HTML) to the corresponding SentinelOne API enum (PLAIN_TEXT, MARKDOWN, HTML).

    3. **Execution**: Sends an `addAlertNote` GraphQL mutation to the SentinelOne Singularity Operations Center API.

    4. **Result Reporting**: Sets result_value to True and returns a success message if the note was created, or False if an error occurred.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
