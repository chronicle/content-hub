Update Alert:
  ai_description: >-
    ### General Description

    Updates a SentinelOne alert's status, analyst verdict, and/or assignment in SentinelOne Singularity Operations Center.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique ID of the SentinelOne alert to update. |

    | Status | DDL | No | The new status to set for the alert (New, In Progress, Resolved). |

    | Verdict | DDL | No | The granular analyst verdict to apply. |

    | Assignee | String | No | The name/email of the analyst or numerical User ID to assign, or 'Unassign' to remove assignment. |


    ### Flow Description

    1. **Initialization**: Extracts Alert ID, Status, Verdict, and Assignee parameters, validating that at least one update parameter is provided.

    2. **Assignee Resolution**: If Assignee is specified as an email, resolves it to a numerical SentinelOne User ID via user lookup.

    3. **Execution**: Sends an `updateAlert` GraphQL mutation to SentinelOne Singularity Operations Center API.

    4. **Result Reporting**: Reports success, skip, or failure message based on the API response.
