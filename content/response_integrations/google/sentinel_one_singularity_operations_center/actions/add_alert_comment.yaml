creator: admin
description: Add a comment/note to a SentinelOne alert.
dynamic_results_metadata: []
integration_identifier: SentinelOneSingularityOperationsCenter
name: Add Alert Comment
parameters:
  - name: Alert ID
    type: string
    is_mandatory: true
    description: The unique ID of the SentinelOne alert to which the comment should be added.
  - name: Comment
    type: string
    is_mandatory: true
    description: The text content of the comment/note.
  - name: Comment Type
    type: ddl
    is_mandatory: false
    description: The format of the comment.
    optional_values:
      - Plain Text
      - Markdown
script_result_name: is_success
