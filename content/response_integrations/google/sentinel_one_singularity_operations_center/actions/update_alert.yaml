creator: admin
description: Update a SentinelOne alert's status, analyst verdict, and/or assignment.
dynamic_results_metadata: []
integration_identifier: SentinelOneSingularityOperationsCenter
name: Update Alert
parameters:
  - name: Alert ID
    type: string
    is_mandatory: true
    description: The unique ID of the SentinelOne alert to update.
  - name: Status
    type: ddl
    is_mandatory: false
    description: The new status to set for the alert.
    optional_values:
      - New
      - In Progress
      - Resolved
  - name: Verdict
    type: ddl
    is_mandatory: false
    description: The granular analyst verdict to apply.
    optional_values:
      - True positive/Malware
      - True positive/Unauthorized access
      - True positive/Data exfiltration
      - True positive/Insider threat
      - True positive/Phishing attack
      - True positive/Advanced persistent threat
      - True positive/Denial of service
      - True positive/Ransomware
      - True positive/Policy violation
      - True positive/Benign but suspicious
      - True positive/Benign
      - True positive/Undefined
      - True positive/Exploitation tools
      - True positive/PUA Adware
      - False positive/Benign
      - False positive/Benign but suspicious
      - False positive/System error
      - False positive/User error
      - False positive/Undefined
  - name: Assignee
    type: string
    is_mandatory: false
    description: Specify the name of the analyst to whom the alert needs to be assigned. If "Unassign" is provided, action will remove assignment from the alert.
script_result_name: is_success
