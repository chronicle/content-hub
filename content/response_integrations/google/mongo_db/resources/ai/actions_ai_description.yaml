Ping:
  ai_description: >-
    Tests connectivity to a MongoDB instance. This action verifies that the integration
    can successfully communicate with the configured MongoDB server using the provided
    credentials.


    ### Flow Description

    1. The action retrieves the MongoDB configuration (Server Address, Username, Password,
    Port, and Authentication flag) from the integration settings.

    2. It initializes the `MongoDBManager` with the retrieved credentials.

    3. The action calls the `test_connectivity` method, which invokes `client.server_info()`
    to force a connection check to the MongoDB server.

    4. If the connection is successful, the action returns a success message. If the
    connection fails, an exception is raised.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured to communicate with the target MongoDB instance.
  ai_short_description: >-
    Tests connectivity to a MongoDB instance.
