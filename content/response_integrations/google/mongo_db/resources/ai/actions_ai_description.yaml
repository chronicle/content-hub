Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the MongoDB server to ensure the integration is configured
    correctly and the server is reachable.


    ### Flow Description

    1. Retrieves the MongoDB integration configuration settings (Server Address, Port,
    Username, Password, Authentication flag).

    2. Initializes the MongoDB client.

    3. Executes a server info request to verify connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This is a standard ping action used primarily for testing integration configuration.
  ai_short_description: >-
    Tests connectivity to the MongoDB server to ensure the integration is configured
    correctly and the server is reachable.
