Free Query:
  ai_description: >-
    ### General Description

    Executes a custom JSON query against a specified MongoDB database and collection
    to retrieve matching documents.


    ### Flow Description

    1. Extracts the database name, collection name, and JSON query from the action
    parameters.

    2. Establishes a connection to the MongoDB server using the provided integration
    credentials.

    3. Validates the existence of the specified database and collection.

    4. Executes the `find` query on the MongoDB collection via the `pymongo` library.

    5. Formats the retrieved documents and appends them to the action's JSON results.


    ### Additional Notes

    The action can return results as individual JSON documents or a single aggregated
    JSON array based on the "Return a single JSON result" parameter.
  ai_short_description: >-
    Executes a custom JSON query against a specified MongoDB database and collection
    to retrieve matching documents.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a 'find' query on a MongoDB database. It
      does not mutate external data (read-only query), nor does it mutate internal
      SecOps data, update entities, create insights, or add case comments.
