Free Query:
  ai_description: >-
    ### General Description

    Executes a custom query against a MongoDB database to retrieve documents. This
    action allows users to perform read-only operations on a specified database and
    collection using a JSON-formatted query.


    ### Flow Description

    1. Extracts MongoDB connection details (Server, Port, Auth) and action parameters
    (Database Name, Collection Name, Query) from the configuration and action settings.

    2. Parses the provided `Query` string into a JSON object.

    3. Initializes a `MongoDBManager` connection to the specified MongoDB server.

    4. Validates the existence of the specified database and collection.

    5. Executes the `find` operation on the MongoDB collection using the provided
    query.

    6. Processes the results, converting `ObjectId` fields to strings for JSON serialization.

    7. Returns the results to the SOAR platform, either as individual documents or
    a single JSON result based on the `Return a single JSON result` parameter.


    ### Additional Notes

    The action requires a valid JSON query string. It does not modify the database
    (read-only).
  ai_short_description: >-
    Executes a custom query against a MongoDB database and returns the matching documents.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
