Unshorten URL:
  ai_description: >-
    ### General Description

    Resolves short URLs to their original long URLs using the Unshorten.me service.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to process only those of type URL.

    3. For each URL entity, makes a GET request to the Unshorten.me API to retrieve
    the resolved long URL.

    4. Updates the entity's additional properties with the resolved long URL and marks
    the entity as enriched.

    5. Updates the entities in the Google SecOps platform.

    6. Returns a JSON result containing the mapping of short URLs to long URLs.


    ### Additional Notes

    The Unshorten.me API has a limit of 10 requests per hour. If this limit is reached,
    the action will raise an error.
  ai_short_description: >-
    Resolves short URL entities to their original long URLs using the Unshorten.me
    API and enriches the entities with the resolved URLs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Unshorten.me API to fetch the resolved
      long URL. It does not mutate external data. It updates internal entities by
      calling `siemplify.update_entities` but does not create insights, modify alert
      data, or create case comments.
