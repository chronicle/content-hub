Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the UnshortenMe service.


    ### Flow Description

    1. Retrieves the integration configuration parameters.

    2. Initializes the UnshortenMeManager.

    3. Makes a GET request to the UnshortenMe test URL (`https://unshorten.me/json/goo.gl/IGL1lE`)
    to verify connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the UnshortenMe API.
  ai_short_description: >-
    Tests connectivity to the UnshortenMe service to ensure the integration is configured
    correctly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
