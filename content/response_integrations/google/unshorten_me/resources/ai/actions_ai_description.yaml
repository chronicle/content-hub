Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity between the SOAR platform and the UnshortenMe
    service. It verifies that the integration is correctly configured and that the
    platform can successfully communicate with the external UnshortenMe API.


    ### Flow Description

    1. The action initializes the `UnshortenMeManager` using the "Use SSL" configuration
    setting retrieved from the integration configuration.

    2. The action invokes the `test_connectivity` method.

    3. The `test_connectivity` method performs an HTTP GET request to the UnshortenMe
    test endpoint (`https://unshorten.me/json/goo.gl/IGL1lE`).

    4. The response is validated to ensure the service is reachable and functioning
    correctly.

    5. If the connection is successful, the action terminates with a success message.


    ### Additional Notes

    This action does not require any input entities or parameters. It is used primarily
    for troubleshooting and verifying the health of the integration connection.
  ai_short_description: >-
    Tests connectivity to the UnshortenMe service to verify integration health.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an HTTP GET request to test connectivity, which constitutes
      fetching data (in the form of a connectivity check). It does not mutate external
      or internal data, nor does it update entities or insights.
