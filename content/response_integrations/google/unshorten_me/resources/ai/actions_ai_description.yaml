Unshorten URL:
  ai_description: >-
    General Description

    This action resolves shortened URLs to their original, expanded destination URLs
    using the Unshorten.me service. It is designed to assist in security investigations,
    such as phishing triage, by providing visibility into the actual destination of
    a link.


    Flow Description

    1. The action retrieves the configuration for the UnshortenMe integration, specifically
    checking the 'Use SSL' setting.

    2. It iterates through the target entities provided in the SOAR case, filtering
    for entities of type 'URL'.

    3. For each URL entity, the action calls the Unshorten.me API to retrieve the
    resolved long URL.

    4. If successful, it updates the entity's 'additional_properties' with the 'long_url'
    key and marks the entity as enriched.

    5. The action updates the enriched entities within the SOAR platform.

    6. Finally, it adds the results to the action output as a JSON object and terminates
    with a summary message.


    Additional Notes

    This action relies on the external Unshorten.me service. API usage limits (typically
    10 requests per hour) apply to the service. If the limit is reached, the action
    will raise an exception.
  ai_short_description: >-
    Resolves shortened URLs to their original destination URLs using the Unshorten.me
    service and enriches the URL entities with the resolved link.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from an external API (Unshorten.me) to resolve URLs.
