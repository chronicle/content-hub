[project]
name = "UnshortenMe"
version = "9.0"
description = "Unshorten.me is a free service to Un-Shorten the URLs created by URL shortening services. Unshorten.me can un-shorten URLs created by different services like goo.gl (Google), fb.me (Facebook), t.co (Twitter), bit.ly, TinyURL, ow.ly among others."
requires-python = ">=3.11,<3.12"
dependencies = [
 "pytest-mock>=3.15.1",
 "requests>=2.33.1",
]

[dependency-groups]
dev = [
 "pytest>=9.0.3",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
