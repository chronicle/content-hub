    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Update Detection:
  ai_description: >-
    Updates the metadata of a specific detection in ExtraHop. This action allows analysts
    to modify the status, resolution, and assignee of a detection identified by its
    ID.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the Detection ID, Status, Resolution, and
    Assignee from the action input.

    2. **Validation:** Ensures that either a Status or an Assignee is provided. It
    specifically validates that a 'Resolution' is provided if the 'Status' is set
    to 'Closed', and conversely, that a 'Resolution' is not provided for other statuses.

    3. **External Update:** Sends a PATCH request to the ExtraHop API to update the
    detection's properties.

    4. **Data Retrieval:** Performs a follow-up GET request to fetch the most recent
    state of the updated detection.

    5. **Output:** Returns the updated detection details as a JSON result and provides
    a success message.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detection ID | String | Yes | The unique identifier of the ExtraHop detection
    to be updated. |

    | Status | Dropdown | No | The new status for the detection (e.g., 'Closed', 'In
    Progress', 'Acknowledged'). |

    | Resolution | Dropdown | No | The resolution type. **Mandatory** if Status is
    set to 'Closed'. Should not be provided otherwise. |

    | Assign To | String | No | The name of the analyst to assign the detection to.
    Use 'Unassign' to remove the current assignee. |


    ### Additional Notes:

    - At least one of the parameters 'Status' or 'Assign To' must be configured for
    the action to execute successfully.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status, resolution, and assignee fields of a detection record within
      the ExtraHop platform via a PATCH request.
    fetches_data: true
    internal_data_mutation_explanation: null
