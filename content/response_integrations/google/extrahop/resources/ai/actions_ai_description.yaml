Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Extrahop instance. It validates that the integration's configuration
    parameters—such as the API Root, Client ID, and Client Secret—are correct and
    that the SOAR platform can successfully authenticate and communicate with the
    Extrahop API.


    ### Flow Description

    1. **Client Initialization**: The action initializes the Extrahop API client using
    the global integration parameters.

    2. **Authentication**: It performs an OAuth2 authentication flow to retrieve a
    bearer token from the Extrahop server.

    3. **Connectivity Check**: It executes a lightweight GET request to the Extrahop
    `/api/v1/devices` endpoint (limited to one result) to verify that the API responds
    correctly.

    4. **Outcome**: If the API call succeeds, the action returns a success message.
    If any step fails, it returns an error message detailing the failure.


    ### Additional Notes

    - This action is typically executed manually during the initial setup of the integration
    or when troubleshooting connection issues.

    - It performs a real API call to ensure that the network path and credentials
    are fully functional.
