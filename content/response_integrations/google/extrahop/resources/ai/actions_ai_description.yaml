Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Extrahop instance.\
    \ It validates that the integration's configuration parameters\u2014such as the\
    \ API Root, Client ID, and Client Secret\u2014are correct and that the SOAR platform\
    \ can successfully authenticate and communicate with the Extrahop API.\n\n###\
    \ Parameters Description\nThis action does not require any input parameters. It\
    \ uses the global configuration settings provided on the integration's settings\
    \ page.\n\n### Additional Notes\n- This action is typically executed manually\
    \ during the initial setup of the integration or when troubleshooting connection\
    \ issues.\n- It performs a real API call to ensure that the network path and credentials\
    \ are fully functional.\n\n### Flow Description\n1. **Client Initialization**:\
    \ The action initializes the Extrahop API client using the global integration\
    \ parameters (API Root, Client ID, Client Secret, and SSL settings).\n2. **Authentication**:\
    \ It performs an OAuth2 authentication flow to retrieve a bearer token from the\
    \ Extrahop server.\n3. **Connectivity Check**: It executes a lightweight GET request\
    \ to the Extrahop `/api/v1/devices` endpoint (limited to one result) to verify\
    \ that the API responds correctly.\n4. **Outcome**: If the API call succeeds,\
    \ the action returns a success message. If any step fails (authentication or the\
    \ API call), it returns an error message detailing the failure."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
