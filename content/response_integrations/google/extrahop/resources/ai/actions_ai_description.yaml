  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Detection ID | String | Yes | Specify the ID of the detection that needs to
    be updated. |

    | Status | Dropdown | No | Specify the status for the detection. |

    | Resolution | Dropdown | No | Specify the resolution for the detection. Resolution
    parameter is needed, if Status parameter is set to "Closed". |

    | Assign To | String | No | Specify the name of the analyst to whom the alert
    needs to be assigned. If "Unassign" is provided, action will remove assignment
    from the alert. |
  ai_short_description: >-
    Updates the status, resolution, and assignee of a specific detection in ExtraHop.
