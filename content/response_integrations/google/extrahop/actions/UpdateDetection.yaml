name: Update Detection
description: Update a detection in Extrahop.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/extrahop#update_detection
integration_identifier: Extrahop
parameters:
-   name: Detection ID
    default_value: ''
    type: string
    description: Specify the ID of the detection that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Closed
    - In Progress
    - Acknowledged
    description: Specify the status for the detection.
    is_mandatory: false
-   name: Resolution
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Action Taken
    - No Action Taken
    description: Specify the resolution for the detection. Resolution parameter is
        needed, if Status parameter is set to  "Closed"
    is_mandatory: false
-   name: Assign To
    default_value: ''
    type: string
    description: Specify the name of the analyst to whom the alert needs to be assigned.
        If “Unassign '' is provided, action will remove assignment from the alert.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_detection_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
