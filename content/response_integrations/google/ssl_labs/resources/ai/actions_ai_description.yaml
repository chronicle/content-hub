Analyse Entity:
  ai_description: >-
    ### General Description

    Analyzes URL and Hostname entities using the SSL Labs API to retrieve SSL/TLS
    configuration grades and endpoint details. The action evaluates the security posture
    of the provided endpoints and updates the entities with the findings.


    ### Flow Description

    1. Iterates through the target entities associated with the case.

    2. Filters the entities to process only those of type URL and Hostname.

    3. Initiates an analysis request to the SSL Labs API (`https://api.ssllabs.com/api/v3/analyze`)
    for each valid entity.

    4. Polls the API periodically until the analysis is marked as complete.

    5. Retrieves the full analysis report and extracts the SSL/TLS grades for each
    endpoint.

    6. Enriches the entity's additional properties with the retrieved grades.

    7. Evaluates the lowest grade against a configured warning threshold and marks
    the entity as suspicious if the threshold is exceeded.

    8. Updates the entities within Google SecOps and attaches the raw JSON results
    to the action.


    ### Additional Notes

    The action relies on integration-level configurations for the warning threshold
    and SSL verification settings. It does not require any action-specific parameters.
  ai_short_description: >-
    Analyzes URL and Hostname entities using the SSL Labs API to retrieve SSL/TLS
    configuration grades and updates the entities with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the SSL Labs API to fetch SSL analysis data
      for the entities. It does not mutate any external data. Internally, it updates
      the entities with the analysis grades and marks them as suspicious if they exceed
      a threshold, but it does not create insights, modify alert data, or create case
      comments.
