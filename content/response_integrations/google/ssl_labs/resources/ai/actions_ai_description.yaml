Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SSL Labs API to verify that the integration is configured
    correctly and network access is available.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (such as SSL verification
    settings).

    2. Initializes the SSL Labs manager.

    3. Makes an HTTP GET request to the SSL Labs `/info` API endpoint.

    4. Evaluates the HTTP response and returns a success message if the connection
    is established without errors.


    ### Additional Notes

    This is a standard utility action primarily used during integration setup or troubleshooting
    to ensure the SOAR platform can successfully communicate with the SSL Labs service.
  ai_short_description: >-
    Tests connectivity to the SSL Labs API to verify integration configuration and
    network access.
