Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SSL Labs API to ensure the integration is properly configured
    and reachable. This action performs a simple health check against the API endpoint.


    ### Flow Description

    1. Extracts the 'Warning Threshold' and 'Verify SSL' configuration parameters
    from the integration settings.

    2. Initializes the `SSLLabsManager` with the specified SSL verification setting.

    3. Executes the `test_connectivity` method, which performs an HTTP GET request
    to the SSL Labs API info endpoint (`https://api.ssllabs.com/api/v3/info`).

    4. Validates the response status to ensure the API is accessible.

    5. Terminates the action with a success message if the connection is established.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data analysis, entity enrichment, or state changes.
