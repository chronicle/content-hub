Analyse Entity:
  ai_description: >-
    ### General Description

    Analyzes hostnames or URLs using the SSL Labs API to assess their SSL/TLS configuration.
    This action retrieves detailed security reports for the specified entities, evaluates
    their SSL/TLS grade against a configurable threshold, and updates the entity's
    metadata within the SOAR platform.


    ### Flow Description

    1. Retrieves configuration parameters, including the 'Warning Threshold' and 'Verify
    SSL' setting.

    2. Iterates through the provided entities, filtering for 'HOSTNAME' and 'URL'
    types.

    3. Calls the SSL Labs API ('/analyze' endpoint) to initiate and retrieve the SSL/TLS
    analysis report for each entity.

    4. Parses the results to extract grades for each endpoint associated with the
    entity.

    5. Updates the entity's 'additional_properties' with the retrieved SSL grades.

    6. Marks the entity as suspicious if the lowest grade exceeds the configured 'Warning
    Threshold'.

    7. Updates the entities in the SOAR platform and attaches the full JSON report
    to the action results.


    ### Additional Notes

    The action requires connectivity to the public SSL Labs API. The analysis process
    may take time as it waits for the scan to complete.
  ai_short_description: >-
    Analyzes hostnames or URLs using the SSL Labs API to retrieve SSL/TLS configuration
    grades and assess security risk.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the SSL Labs API to fetch SSL/TLS configuration
      data. It updates entity `additional_properties` and `is_suspicious` status,
      but does not mutate external data or change alert/case status.
