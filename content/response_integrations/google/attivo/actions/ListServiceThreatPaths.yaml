name: List Service ThreatPaths
description: List ThreatPaths related to services in Attivo.
integration_identifier: Attivo
parameters:
-   name: Services
    default_value: ''
    type: string
    description: Specify a comma-separated list of services for which action needs
        to return ThreatPaths.
    is_mandatory: true
-   name: Max ThreatPaths To Return
    default_value: 50
    type: string
    description: Specify how many ThreatPaths to return. If nothing is provided, action
        will return 50 ThreatPaths.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_service_threat_paths_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
