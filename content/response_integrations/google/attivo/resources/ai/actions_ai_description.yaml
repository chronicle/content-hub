List Critical ThreatPath:
  ai_description: >-
    ### General Description

    Retrieves a list of critical ThreatPaths from the Attivo platform. This action
    allows users to query and filter critical threat paths based on specific criteria
    such as Rule Name, Service, Severity, Description, or Category, and returns the
    results for analysis.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and extracts configuration parameters,
    including the API Root, Username, Password, and SSL verification settings.

    2. It extracts action-specific parameters: `Filter Key`, `Filter Logic`, `Filter
    Value`, and `Max Records To Return`.

    3. The `AttivoManager` is initialized to establish a session with the Attivo API
    using the provided credentials.

    4. The action calls the `get_critical_threatpaths` method, which performs a POST
    request to the `/api/threatpath/getallcriticalpaths` endpoint to retrieve the
    list of critical ThreatPaths.

    5. If a `Filter Value` is provided, the action filters the retrieved ThreatPaths
    locally based on the selected `Filter Key` and `Filter Logic` (Equal or Contains).

    6. The results are limited based on the `Max Records To Return` parameter.

    7. The filtered ThreatPaths are formatted into a CSV table and a JSON result,
    which are then added to the action output.


    ### Additional Notes

    This action is a read-only operation and does not modify any external system state
    or internal SOAR data. It is designed for reporting and visibility into critical
    threat paths identified by Attivo.
  ai_short_description: >-
    Retrieves and displays a list of critical ThreatPaths from the Attivo platform,
    with optional filtering capabilities.
