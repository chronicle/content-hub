List Vulnerability Hosts:
  ai_description: >-
    ### General Description

    Lists hosts associated with specific vulnerabilities using the Attivo API. This
    action allows users to query the Attivo platform for a list of hostnames that
    are affected by one or more provided vulnerabilities.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials) to establish a connection
    with the Attivo instance.

    2. Extracts action parameters, including the list of vulnerabilities and the maximum
    number of hosts to return.

    3. Initializes the `AttivoManager` to handle API communication.

    4. Iterates through the provided list of vulnerabilities.

    5. For each vulnerability, makes a POST request to the Attivo API (`/api/threatpath/gethostnamesforvul`)
    to retrieve associated hostnames.

    6. Constructs a data table for each successful vulnerability lookup and aggregates
    results into a JSON object.

    7. Returns the aggregated results and a summary message indicating success or
    failure for each vulnerability.


    ### Additional Notes

    The action requires a comma-separated list of vulnerabilities. If no hosts are
    found for a vulnerability, the action will report it as failed.
