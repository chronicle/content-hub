List Critical ThreatPath:
  ai_description: >-
    ### General Description

    Retrieves a list of available critical ThreatPaths from Attivo based on specified
    filtering criteria. This action allows analysts to query the Attivo system for
    critical threat paths and filter the results by specific attributes such as Rule
    Name, Service, Severity, Description, or Category.


    ### Flow Description

    1. Initializes the Attivo manager using the provided API credentials.

    2. Makes an API call (POST request to `/api/threatpath/getallcriticalpaths`) to
    fetch all critical ThreatPaths from Attivo.

    3. Evaluates the provided `Filter Key`, `Filter Logic`, and `Filter Value` parameters.

    4. If filtering criteria are provided, filters the retrieved ThreatPaths locally
    based on exact match (`Equal`) or substring match (`Contains`).

    5. Limits the final list of ThreatPaths to the number specified in the `Max Records
    To Return` parameter.

    6. Outputs the resulting ThreatPaths as a JSON array and attaches a CSV-formatted
    data table to the action results.


    ### Additional Notes

    - If `Filter Key` is set to a specific field and `Filter Logic` is selected, but
    `Filter Value` is left empty, the filter will not be applied and a warning message
    will be appended to the output.

    - The `Max Records To Return` parameter defaults to 50 if not specified.
  ai_short_description: >-
    Retrieves a list of available critical ThreatPaths from Attivo based on specified
    filtering criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making an API call to Attivo to retrieve critical
      threat paths (`fetches_data` is true). It does not perform any state-changing
      operations on external systems (`can_mutate_external_data` is false). It also
      does not mutate internal data, update entities, create insights, modify alert
      data, or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
