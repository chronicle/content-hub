Update Event:
  ai_description: >-
    ### General Description

    Updates an event in the Attivo platform by modifying its status or adding a comment.
    This action allows analysts to manage incident lifecycle directly from the SOAR
    platform by interacting with the Attivo API.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    to establish a connection with the Attivo instance.

    2. Extracts action parameters: `Event ID` (mandatory), `Status` (optional), and
    `Comment` (optional).

    3. Validates that at least one of `Status` or `Comment` is provided if the status
    is not explicitly set.

    4. Initializes the `AttivoManager` to handle API communication.

    5. If a `Comment` is provided, the action calls the `update_comment` method, which
    performs a POST request to the Attivo API (`/api/eventsquery/action`) to append
    the comment to the specified event.

    6. If a `Status` is provided (and is not 'Select One'), the action calls the `update_status`
    method, which performs a POST request to the Attivo API (`/api/eventsquery/action`)
    to update the event status.

    7. Returns a success message upon completion or an error message if the operation
    fails.


    ### Additional Notes

    This action performs a state change on the external Attivo system. It does not
    modify any data within the Google SecOps platform itself.
  ai_short_description: >-
    Updates an event's status or adds a comment in the Attivo platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
