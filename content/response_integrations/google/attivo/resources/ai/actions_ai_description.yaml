      the Attivo system without relying on case entities. Therefore, all entity type
      flags and filter flags are set to false.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
