Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Attivo server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the `AttivoManager` with the provided credentials.

    3. Calls the `test_connectivity` method, which sends a POST request to the `/api/eventsquery/alerts`
    endpoint to verify access.

    4. Returns a success message if the connection is established and authenticated
    successfully, or a failure message if an error occurs.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
