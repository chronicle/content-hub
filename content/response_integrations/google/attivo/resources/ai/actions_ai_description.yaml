  ai_description: >-
    Retrieves a list of available critical ThreatPaths from Attivo. The action fetches
    the critical threat paths and allows filtering the results based on specific keys
    (e.g., Rule Name, Service, Severity, Description, Category) and logic (Equal,
    Contains). The results are returned as a JSON object and a data table.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Key | Dropdown | No | Specify the key that needs to be used to filter
    critical paths. Options include Select One, Rule Name, Service, Severity, Description,
    Category. |

    | Filter Logic | Dropdown | No | Specify what filter logic should be applied.
    Options include Not Specified, Equal, Contains. Filtering logic is working based
    on the value provided in the "Filter Key" parameter. |

    | Filter Value | String | No | Specify what value should be used in the filter.
    If "Equal" is selected, action will try to find the exact match among results
    and if "Contains" is selected, action will try to find results that contain that
    substring. If nothing is provided in this parameter, the filter will not be applied.
    |

    | Max Records To Return | Integer | No | Specify how many records to return. If
    nothing is provided, action will return 50 records. |


    ### Additional Notes

    If a Filter Logic of 'Equal' or 'Contains' is selected, a valid 'Filter Key' must
    be chosen (other than 'Select One'). If 'Filter Value' is left empty while a logic
    is selected, the filter will not be applied.


    ### Flow

    1. Connects to the Attivo API.

    2. Fetches all critical ThreatPaths.

    3. Applies filtering based on the provided Filter Key, Filter Logic, and Filter
    Value.

    4. Limits the results to the specified Max Records To Return.

    5. Returns the results as a JSON object and a data table.
