Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Attivo server using the provided configuration parameters.
    This action validates that the integration is correctly configured and can communicate
    with the Attivo API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, and `Verify SSL` from the integration settings.

    2. It initializes the `AttivoManager` using these credentials and settings.

    3. The action calls the `test_connectivity` method, which performs a `POST` request
    to the Attivo API's ping endpoint.

    4. If the request is successful, the action returns a success message and completes
    the execution.

    5. If the request fails, the action catches the exception, logs the error, and
    returns a failure message.


    ### Additional Notes

    This action does not perform any data retrieval or modification on entities or
    alerts; it is strictly used for verifying the integration's connectivity status.
