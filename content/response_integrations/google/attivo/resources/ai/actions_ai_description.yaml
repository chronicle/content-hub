Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using threat intelligence and asset
    data retrieved from the Attivo platform. This action gathers contextual information
    such as OS details, user information, vulnerabilities, and threat paths associated
    with the target entities. It provides visibility into potential attack vectors
    and security posture by aggregating this data into the SOAR platform.


    ### Flow Description

    1. The action initializes the `AttivoManager` using the provided API credentials
    and configuration.

    2. It filters the `target_entities` to process only those of type `HOSTNAME` or
    `ADDRESS`.

    3. For each valid entity, the action calls the Attivo API to retrieve host information
    (`get_hostname_info`).

    4. Based on the action parameters, it optionally fetches additional data:
        - If `Include ThreatPaths` is enabled, it calls `get_threatpaths`.
        - If `Include Vulnerabilities` is enabled, it calls `get_vulnerabilities`.
        - If `Include Credential Info` is enabled, it calls `get_credentials`.
    5. The retrieved data is formatted and added to the entity's `additional_properties`.

    6. The entity's `is_enriched` status is set to `True`.

    7. If `Create Insights` is enabled, the action generates an entity insight containing
    the aggregated information.

    8. Finally, the action updates the entities in the SOAR platform and adds the
    results to the action output.


    ### Additional Notes

    - The action supports limiting the number of returned ThreatPaths, vulnerabilities,
    and credentials via configuration parameters.

    - If an entity cannot be enriched, it is tracked as a failed entity, but the action
    continues processing remaining entities.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with asset metadata, vulnerabilities,
    and threat paths from the Attivo platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and sets the enriched status within the
      SOAR platform.
    reasoning: >-
      The action fetches data from the Attivo API (fetches_data=true). It updates
      internal entities with enrichment data and sets the enriched status (can_mutate_internal_data=true,
      can_update_entities=true). It creates insights if configured (can_create_insight=true).
      It does not mutate external data.
