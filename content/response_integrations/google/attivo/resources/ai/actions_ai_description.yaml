Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information from Attivo. This
    action retrieves contextual data including threat paths, vulnerabilities, and
    credential information related to the entity.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the Attivo API client.

    3. Iterates over the target Hostname and IP Address entities.

    4. Makes an API call to Attivo to fetch basic entity information.

    5. If enabled, makes additional API calls to fetch threat paths, vulnerabilities,
    and credential information.

    6. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    7. Optionally creates an insight containing the retrieved information.

    8. Attaches the results as JSON and entity tables to the action result.

    9. Updates the entities within the platform.


    ### Additional Notes

    Supported entities: Hostname, IP Address.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving threat paths, vulnerabilities,
    and credential information from Attivo.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Attivo via API calls (fetches_data=true). It does
      not mutate external data. It updates internal entities with the fetched data
      (can_update_entities=true) and creates insights (can_create_insight=true).
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES` includes `EntityTypes.HOSTNAME`
      and `EntityTypes.ADDRESS`. Therefore, it targets Hostname and IP Address entities
      and filters by entity type.
  outcome_categories:
    add_alert_comment: false
