    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches contextual data for IP addresses and hostnames from Attivo,
      returning threat paths, vulnerabilities, and credentials. This matches both
      'Enrich IOC' (for IP) and 'Enrich Asset' (for Hostname).
