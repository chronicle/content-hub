  ai_description: >-
    ### General Description

    The `Enrich Entities` action enriches Hostname and IP Address entities using information
    from Attivo. It retrieves contextual metadata, threat paths, vulnerabilities,
    and credential information associated with the entities, updating their properties
    and optionally generating insights.


    ### Flow Description

    1. Initializes the connection to the Attivo API using the provided credentials.

    2. Iterates over the target entities, filtering for supported types (Hostname
    and IP Address).

    3. For each valid entity, fetches basic entity information from Attivo.

    4. Depending on the configuration, retrieves additional details such as ThreatPaths,
    Vulnerabilities, and Credentials up to the specified limits.

    5. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    6. Optionally creates an insight containing a summary of the retrieved information.

    7. Attaches detailed tables and JSON results to the action's output.

    8. Updates the entities in the SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Include ThreatPaths | Boolean | No | If enabled, the action will return information
    about ThreatPaths related to the entity. |

    | Include Vulnerabilities | Boolean | No | If enabled, the action will return
    information about vulnerabilities related to the entity. |

    | Include Credential Info | Boolean | No | If enabled, the action will return
    information about credential information related to the entity. |

    | Create Insights | Boolean | No | If enabled, the action will create an insight
    containing all of the retrieved information about the entity. |

    | Max ThreatPaths To Return | String/Integer | No | Specify how many ThreatPaths
    to return per entity. Default is 50. |

    | Max Vulnerabilities To Return | String/Integer | No | Specify how many vulnerabilities
    to return per entity. Default is 50. |

    | Max Credentials To Return | String/Integer | No | Specify how many credentials
    to return per entity. Default is 50. |
