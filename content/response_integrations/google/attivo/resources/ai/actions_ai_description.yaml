    reasoning: >-
      The action retrieves a list of critical threat paths from Attivo based on general
      filtering criteria. It does not enrich specific IOCs or assets, modify alerts,
      manage tickets, alter blocklists/allowlists, or perform any endpoint containment
      or identity management. Thus, it does not match any of the predefined outcome
