  ai_description: >-
    Retrieves a list of hostnames associated with specific vulnerabilities from Attivo.
    The action accepts a comma-separated list of vulnerabilities and queries the Attivo
    platform to find affected hosts up to a specified limit. It then outputs the results
    as JSON and creates a data table for each successfully queried vulnerability.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Vulnerabilities | String | Yes | Specify a comma-separated list of vulnerabilities
    for which the action needs to return hostnames. |

    | Max Hosts To Return | Integer | No | Specify how many hosts to return. If nothing
    is provided, the action will return 50 hosts. |


    ### Flow

    1. Parses the input vulnerabilities and the maximum limit of hosts to return.

    2. Iterates over each vulnerability and queries the Attivo API for associated
    hostnames.

    3. For each successful query, creates a data table containing the hostnames and
    appends the data to the JSON result.

    4. Returns a summary message indicating which vulnerabilities were successfully
    queried, which had no hosts, and which were not found.
