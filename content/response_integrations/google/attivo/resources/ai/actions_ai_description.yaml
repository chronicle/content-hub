  ai_description: >-
    ### General Description

    Updates an existing event in the Attivo platform. The action allows users to change
    the status of an event (Acknowledge or Unacknowledge) and append a comment to
    it.


    ### Flow Description

    1. Validates that at least one of the optional parameters (`Status` or `Comment`)
    is provided.

    2. Initializes the Attivo API client.

    3. If a comment is provided, sends a request to add the comment to the specified
    event.

    4. If a status is provided, sends a request to update the event's status.

    5. Returns a success message upon completion.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Event ID | Yes | String | Specify the ID of the event which needs to be updated.
    |

    | Status | No | Drop-down | Specify the status for the event. Options are 'Select
    One', 'Acknowledge', and 'Unacknowledge'. |

    | Comment | No | String | Specify a comment that needs to be added to the event.
    |


    ### Additional Notes

    Either the `Status` or `Comment` parameter must be configured with a valid value
    (not 'Select One' or empty) for the action to execute successfully.
