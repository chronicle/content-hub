    1. Extracts the comma-separated list of vulnerabilities and the maximum number
    of hosts to return from the action parameters.

    2. Initializes the Attivo API manager with the provided integration configuration.

    3. Iterates through each provided vulnerability and makes an API call (`/api/threatpath/gethostnamesforvul`)
    to Attivo to fetch the associated hosts.

    4. Compiles the retrieved hostnames into a CSV-formatted data table and a JSON
    result object for each successfully queried vulnerability.

    5. Returns the aggregated results to the Google SecOps platform, noting any vulnerabilities
    that failed or were not found.


