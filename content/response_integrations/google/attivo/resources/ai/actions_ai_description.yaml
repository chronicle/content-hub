  ai_description: >-
    ### General Description

    The **List Service ThreatPaths** action retrieves threat paths related to specified
    services from Attivo. It queries the Attivo platform for each provided service
    and returns the associated threat paths as JSON results and data tables within
    the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | --- | --- | --- | --- | --- |

    | Services | String | Yes | None | A comma-separated list of services for which
    the action needs to return threat paths. |

    | Max ThreatPaths To Return | Integer | No | 50 | Specify how many threat paths
    to return per service. If nothing is provided, the action will return 50 threat
    paths. |


    ### Flow Description

    1. The action initializes the Attivo manager using the provided integration credentials.

    2. It parses the comma-separated list of services provided in the `Services` parameter.

    3. For each service, it queries the Attivo API to fetch the associated threat
    paths up to the limit specified in `Max ThreatPaths To Return`.

    4. If threat paths are found, they are added to a data table specific to the service
    and appended to the JSON results.

    5. The action completes by returning a summary message detailing which services
    successfully returned threat paths and which did not.


    ### Additional Notes

    There are no additional notes for this action.
