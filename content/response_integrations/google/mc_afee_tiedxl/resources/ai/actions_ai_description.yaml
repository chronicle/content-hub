Set File Reputation:
  ai_description: >-
    ### General Description

    Sets the enterprise reputation of a file hash within the McAfee Threat Intelligence
    Exchange (TIE). This action allows analysts to manually override or set the trust
    level of a file, which influences security decisions across the enterprise.


    ### Flow Description

    1. The action initializes the `McAfeeTIEDXLManager` using the provided configuration
    (server address, broker CA bundle, client certificate, and private key).

    2. It iterates through the `target_entities` provided in the context.

    3. It filters for entities of type `FILEHASH`.

    4. For each valid entity, it calls the `set_file_reputation` method on the TIE
    client, passing the `trust_level`, `filename`, and `comment` parameters.

    5. Upon successful execution, it updates the entities in the SOAR platform using
    `siemplify.update_entities`.


    ### Additional Notes

    This action requires a configured McAfee DXL environment with valid client certificates.
    The `trust_level` parameter must correspond to a valid trust level supported by
    the McAfee TIE system (e.g., KNOWN_MALICIOUS, KNOWN_TRUSTED).
  ai_short_description: >-
    Sets the enterprise reputation of a file hash within the McAfee Threat Intelligence
    Exchange (TIE).
