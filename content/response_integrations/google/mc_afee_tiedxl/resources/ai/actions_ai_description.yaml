Get File References:
  ai_description: >-
    ### General Description

    This action retrieves references for a file hash entity, specifically identifying
    the agents on which the file was used, using McAfee Threat Intelligence Exchange
    (TIE) and Data Exchange Layer (DXL).


    ### Flow Description

    1. Initializes the connection to the McAfee TIE & DXL fabric using the provided
    server address and certificates.

    2. Iterates through the target entities, filtering for those of type `FILEHASH`.

    3. For each valid file hash, makes a request to the McAfee TIE service via DXL
    to fetch the file's first references (agents where it was seen).

    4. If references are found, they are formatted into a CSV table and attached to
    the entity as an entity table.

    5. The successfully processed entities are updated in the Google SecOps platform.

    6. A summary message is generated indicating which entities had references found.


    ### Additional Notes

    - The action requires DXL certificates to be properly configured in the integration
    settings.

    - Only MD5, SHA1, and SHA256 hash types are supported.
  ai_short_description: >-
    Retrieves references for file hash entities, identifying the agents on which the
    file was used, using McAfee TIE & DXL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from McAfee TIE via DXL (fetches_data=true). It does
      not mutate external data or internal data. It updates entities by calling `siemplify.update_entities`
      (can_update_entities=true). It adds an entity table but does not create insights
      or case comments.
  entity_usage:
