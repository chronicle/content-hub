Get File Reputation:
  ai_description: >-
    ### General Description

    This action retrieves file reputation data from the McAfee Threat Intelligence
    Exchange (TIE) via the Data Exchange Layer (DXL). It allows analysts to assess
    the risk associated with specific file hashes by querying McAfee's threat intelligence
    sources, including Global Threat Intelligence (GTI), Advanced Threat Defense (ATD),
    and Web Gateway (MWG).


    ### Flow Description

    1. The action iterates through all provided `FILEHASH` entities in the current
    case.

    2. For each entity, it connects to the McAfee DXL fabric using the provided configuration
    (server address, certificates, and keys).

    3. It calls the `get_file_reputation` method via the `McAfeeTIEDXLManager` to
    fetch reputation details for the file hash.

    4. The retrieved reputation data is formatted into a CSV table and added to the
    action results.

    5. Depending on the `Enrich with all services` parameter:
       - If `True`, it prepares enrichment data from all returned services and updates
    the entity's `additional_properties`.
       - If `False` (default), it identifies the worst trust level reputation and
    updates the entity's `additional_properties` with that specific data.
    6. Finally, the action updates the entities in the SOAR platform with the new
    enrichment data and marks them as enriched.


    ### Additional Notes

    This action requires valid DXL certificates and connectivity to the McAfee DXL
    fabric. It supports MD5, SHA1, and SHA256 hash types. The action does not modify
    external system states; it is strictly an enrichment and information-gathering
    tool.
  ai_short_description: >-
    Retrieves file reputation data from McAfee TIE/DXL and enriches FILEHASH entities
    with threat intelligence.
