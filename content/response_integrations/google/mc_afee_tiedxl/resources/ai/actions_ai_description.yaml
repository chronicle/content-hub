Get File References:
  ai_description: >-
    ### General Description

    Retrieves file reference information from the McAfee Threat Intelligence Exchange
    (TIE) via the Data Exchange Layer (DXL) fabric. This action identifies the systems
    (agents) where a specific file has been executed, providing visibility into the
    file's prevalence and distribution across the environment.


    ### Flow Description

    1. The action initializes the `McAfeeTIEDXLManager` using the configured DXL broker
    and certificate credentials.

    2. It iterates through the provided `target_entities`, filtering for those with
    the `FILEHASH` entity type.

    3. For each valid file hash, it calls the `get_file_references` method via the
    DXL fabric to retrieve a list of systems that have referenced the file.

    4. If references are found, the action constructs a CSV table containing the reference
    data (e.g., File Reference Date, Agent GUID) and attaches it to the entity using
    `siemplify.result.add_entity_table`.

    5. The action updates the enriched entities within the SOAR platform.

    6. Finally, it returns a summary message indicating whether references were found
    for the processed entities.


    ### Additional Notes

    This action requires a properly configured McAfee TIE/DXL integration instance,
    including valid DXL broker addresses and client certificates. It does not modify
    the reputation of the file or perform any blocking actions; it is strictly an
    enrichment and visibility tool.
  ai_short_description: >-
    Retrieves file execution references (systems where the file has run) from the
    McAfee TIE/DXL fabric for specified file hash entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
