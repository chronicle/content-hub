Set File Reputation:
  ai_description: >-
    ### General Description

    Sets the enterprise reputation (trust level) for File Hash entities in McAfee
    Threat Intelligence Exchange (TIE) via DXL. This action allows analysts to manually
    or automatically classify files as malicious, trusted, or other supported trust
    levels within the McAfee ecosystem.


    ### Flow Description

    1. Retrieves the target trust level, file name, and comment from the action parameters.

    2. Iterates through the target entities, specifically filtering for File Hash
    entities.

    3. For each valid File Hash, makes an API call to McAfee TIE to set its reputation
    to the specified trust level.

    4. Updates the successfully processed entities within the Google SecOps platform.


    ### Additional Notes

    The trust level parameter must match one of the supported McAfee TIE trust levels
    (e.g., KNOWN_MALICIOUS, KNOWN_TRUSTED, UNKNOWN).
