    Tests connectivity to the McAfee TIE DXL server to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Server Address, certificates).

    2. Initializes the `McAfeeTIEDXLManager` which attempts to establish a connection
    to the DXL fabric.

    3. If the connection is successful without exceptions, the action completes and
    returns a success message.


