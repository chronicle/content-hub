Get File Reputation:
  ai_description: >-
    ### General Description

    Retrieves file reputation information for FileHash entities using McAfee Threat
    Intelligence Exchange (TIE) and Data Exchange Layer (DXL). It enriches the entities
    with the retrieved reputation data, providing threat intelligence context directly
    within the platform.


    ### Flow Description

    1. Iterates over all target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. For each valid entity, calls the McAfee TIE API (`get_file_reputation`) to
    fetch reputation details for the hash.

    4. Depending on the `Enrich with all services` parameter, it either enriches the
    entity with all returned services' reputations or just the worst trust level reputation.

    5. Updates the entity's `additional_properties` with the reputation data and marks
    it as enriched.

    6. Attaches the reputation data as an entity table and adds the raw JSON results
    to the action output.

    7. Saves the updated entities back to the platform.


    ### Additional Notes

    - The action supports MD5, SHA1, and SHA256 hash types.

    - If an error occurs while processing a specific entity, the action logs the error
    and continues processing the remaining entities.
  ai_short_description: >-
    Retrieves file reputation information for FileHash entities using McAfee TIE and
    DXL, enriching the entities with the threat intelligence data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API call to McAfee TIE to fetch file reputation data (fetches_data=true).
      It does not mutate any external data. It updates the internal entities with
      the retrieved reputation data (can_update_entities=true). It does not create
      insights, modify alert data, or create case comments.
