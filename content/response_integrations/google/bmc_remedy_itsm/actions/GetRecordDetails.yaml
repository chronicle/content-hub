name: Get Record Details
description: Get detailed information about the record from BMC Remedy ITSM.
integration_identifier: BMCRemedyITSM
parameters:
-   name: Record Type
    default_value: ''
    type: string
    description: Specify the type of the record for which you want to retrieve details.
    is_mandatory: true
-   name: Record IDs
    default_value: ''
    type: string
    description: Specify the ids of records for which you want to return details.
    is_mandatory: true
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If invalid fields are provided, action
        will fail. If nothing is provided, action will return all fields.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_record_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
