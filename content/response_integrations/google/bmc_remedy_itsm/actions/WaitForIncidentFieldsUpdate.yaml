name: Wait For Incident Fields Update
description: Wait for incident fields update in BMC Remedy ITSM.
integration_identifier: BMCRemedyITSM
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: Specify the ID of the incident that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - Assigned
    - In Progress
    - Pending
    - Resolved
    - Closed
    - Cancelled
    description: Specify what is the expected status for the incident.
    is_mandatory: false
-   name: Fields To Check
    default_value: '{"field":"value"}'
    type: string
    description: 'Specify a JSON object containing all of the needed fields and values.
        Note: this parameter has priority over "Status" field.'
    is_mandatory: false
-   name: Fail If Timeout
    default_value: true
    type: boolean
    description: If enabled, action will be failed, if not all of the fields were
        updated.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_incident_fields_update_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
