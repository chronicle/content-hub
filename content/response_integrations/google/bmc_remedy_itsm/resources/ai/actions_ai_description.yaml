Delete Incident:
  ai_description: >-
    ### General Description

    Deletes a specific incident in BMC Remedy ITSM. This action initiates a state
    change on the external ITSM system to permanently remove the specified incident
    record.


    ### Flow Description

    1. Initializes the BMC Remedy ITSM manager using the provided integration credentials.

    2. Makes an API GET request to retrieve the incident details using the provided
    `Incident ID` to obtain the internal `entry_id`.

    3. If the incident exists, makes an API DELETE request to BMC Remedy ITSM to remove
    the incident.

    4. Returns a success message if the incident is successfully deleted, or a notification
    if the incident does not exist.


    ### Additional Notes

    This action permanently removes the incident from the external ITSM system. Ensure
    that the provided Incident ID is correct before execution, as this operation cannot
    be undone.
