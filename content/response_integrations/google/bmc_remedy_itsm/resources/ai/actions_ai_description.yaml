Wait For Incident Fields Update:
  ai_description: >-
    ### General Description

    Waits for specific fields in a BMC Remedy ITSM incident to be updated to expected
    values. This action is designed to be used in asynchronous workflows, polling
    the BMC Remedy ITSM system until the incident fields match the provided criteria
    or a timeout occurs.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) and action parameters (Incident ID, Status, Fields To Check, Fail
    If Timeout).

    2. It checks if the asynchronous action is approaching its timeout limit using
    `is_async_action_timeout`.

    3. If a timeout is approaching, it either fails or raises an exception based on
    the `Fail If Timeout` parameter.

    4. The action parses the `Fields To Check` JSON payload. If both `Status` and
    `Fields To Check` are empty, it raises an exception.

    5. It initializes the `BMCRemedyITSMManager` and authenticates with the BMC Remedy
    ITSM API.

    6. The action calls `manager.get_incident_details` to retrieve the current state
    of the specified incident.

    7. It compares the current incident fields against the expected values provided
    in the parameters.

    8. If all fields match, the action completes successfully and returns the incident
    JSON data.

    9. If fields do not match, the action returns an in-progress status, listing the
    fields that are still pending update.


    ### Additional Notes

    This action is asynchronous and intended for polling scenarios. It does not modify
    the incident; it only retrieves and validates its current state.
