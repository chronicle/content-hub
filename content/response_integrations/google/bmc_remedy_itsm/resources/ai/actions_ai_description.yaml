Create Record:
  ai_description: >-
    ### General Description

    Creates a new record in the BMC Remedy ITSM system. This action allows users to
    programmatically generate records (such as incidents, change requests, or other
    ITSM entities) by providing a specific record type and a corresponding JSON payload.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Root, Username,
    Password, and SSL verification settings.

    2. It extracts the action-specific parameters: `Record Type` and `Record Payload`.

    3. The `BMCRemedyITSMManager` is initialized to establish an authenticated session
    with the BMC Remedy ITSM API.

    4. The `Record Payload` parameter is parsed as a JSON object. If the parsing fails,
    the action terminates with an error.

    5. The action executes a `POST` request to the BMC Remedy ITSM API endpoint (`/api/arsys/v1/entry/{record_type}`)
    to create the record.

    6. The resulting record details are added to the action's result output.

    7. Finally, the action logs out from the BMC Remedy ITSM session.


    ### Additional Notes

    The `Record Payload` parameter must be a valid JSON object containing the fields
    and values required by the specific record type being created in BMC Remedy ITSM.
