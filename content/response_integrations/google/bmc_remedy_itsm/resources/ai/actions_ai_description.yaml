Wait For Record Fields Update:
  ai_description: >-
    ### General Description

    Waits for specific fields in a BMC Remedy ITSM record to be updated to expected
    values. This action is designed to be used as an asynchronous polling mechanism,
    checking the status of a record in BMC Remedy ITSM until the specified fields
    match the provided criteria or a timeout occurs.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) and action parameters (Record Type, Record ID, Fields To Check, Fail
    If Timeout).

    2. It checks if the asynchronous action is approaching its execution deadline.

    3. It initializes the `BMCRemedyITSMManager` to interact with the BMC Remedy ITSM
    API.

    4. The action calls the `get_record_details` method to retrieve the current state
    of the specified record.

    5. It compares the retrieved record fields against the provided `Fields To Check`
    JSON object.

    6. If all fields match the expected values, the action completes successfully
    and returns the record details as a JSON result.

    7. If fields do not match, the action returns an `INPROGRESS` status, listing
    the fields that are still pending update.


    ### Additional Notes

    This action is intended for use in asynchronous workflows where the SOAR platform
    needs to wait for an external system (BMC Remedy ITSM) to process a request before
    proceeding. It does not modify any data in BMC Remedy ITSM or the SOAR platform.
  ai_short_description: >-
    Waits for specific fields in a BMC Remedy ITSM record to be updated to expected
    values.
