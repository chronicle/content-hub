Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in the BMC Remedy ITSM system. This action allows users
    to define various incident attributes, such as status, impact, urgency, and custom
    fields, to automate the incident creation process within the ITSM platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (incident details) from the integration configuration.

    2. Initializes the `BMCRemedyITSMManager` and authenticates with the BMC Remedy
    ITSM API.

    3. If a `Template Name` is provided, it queries the BMC Remedy ITSM API to retrieve
    the corresponding `Template ID`.

    4. Parses the `Customer` parameter to extract the first and last names.

    5. Calls the `create_incident` API endpoint with the provided incident details,
    including status, impact, urgency, and any custom fields provided in a JSON payload.

    6. Adds the JSON representation of the created incident to the action result.

    7. Logs out from the BMC Remedy ITSM session.


    ### Additional Notes

    The action supports custom fields via a JSON payload, which will overwrite other
    provided parameters if configured. If a `Template Name` is provided, the action
    will attempt to find the corresponding ID; otherwise, it proceeds without a template.
  ai_short_description: >-
    Creates a new incident in the BMC Remedy ITSM system using the provided incident
    details and configuration.
  capabilities:
    can_create_case_comments: false
