    1. Extracts the record type, record ID, and the fields to check (provided as a
    JSON string).

    2. Checks if the action is approaching its timeout limit.

    3. Makes a GET request to the BMC Remedy ITSM API to fetch the current details
    of the specified record.

    4. Compares the retrieved record fields against the expected values.

    5. If all fields match, completes the action and returns the record details.

    6. If fields do not match, the action suspends and waits for the next execution
    cycle (async).


    ### Additional Notes

    The action will fail if the timeout is reached and the `Fail If Timeout` parameter
    is set to true.
