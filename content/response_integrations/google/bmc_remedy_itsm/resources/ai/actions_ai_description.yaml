Add Work Note To Incident:
  ai_description: >-
    ### General Description

    Adds a work note to an existing incident in BMC Remedy ITSM. This action allows
    analysts to append comments or updates to a ticket directly from the SecOps platform.


    ### Flow Description

    1. Extracts the `Incident ID` and `Work Note Text` from the action parameters.

    2. Makes a GET request to the BMC Remedy ITSM API to verify that the specified
    incident exists.

    3. If the incident is found, makes a POST request to the BMC Remedy ITSM API (`/api/arsys/v1/entry/HPD:WorkLog/`)
    to append the work note to the incident.

    4. Returns a success message upon successful addition of the work note.


    ### Additional Notes

    The action will fail and return an error if the specified incident ID cannot be
    found in BMC Remedy ITSM.
  ai_short_description: >-
    Adds a work note to a specific incident in BMC Remedy ITSM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a work note to a specific incident in the external BMC Remedy ITSM system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by making a POST request to the BMC Remedy
      ITSM API to add a work note to an incident. It does not fetch contextual data
      for enrichment, nor does it mutate internal SecOps data, update entities, create
      insights, or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
