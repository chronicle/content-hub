Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in BMC Remedy ITSM. This action allows users to specify
    various incident details such as status, impact, urgency, description, and assignee
    to generate a new record in the external ITSM system.


    ### Flow Description

    1. Extracts the provided action parameters, including incident details and custom
    fields.

    2. Initializes the BMC Remedy ITSM API client.

    3. If a `Template Name` is provided, makes a GET request to fetch the corresponding
    template ID.

    4. Parses the `Customer` parameter into first and last names.

    5. Makes a POST request to the BMC Remedy ITSM API (`/api/arsys/v1/entry/HPD:IncidentInterface_Create`)
    to create the incident with the specified payload.

    6. Returns the created incident details as a JSON result.


    ### Additional Notes

    - The `Customer` parameter must be provided in the format "{Last Name} {First
    Name}".

    - The `Custom Fields` parameter accepts a JSON object that can be used to overwrite
    or provide additional fields during incident creation.
  ai_short_description: >-
    Creates a new incident record in BMC Remedy ITSM using the provided incident details
    and custom fields.
