Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific incidents from BMC Remedy ITSM.
    This action allows users to query incident data by providing a list of incident
    IDs, with options to specify which fields to return and whether to include associated
    work notes.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Incident IDs, Fields To Return, Fetch Work Notes, Max Work
    Notes To Return).

    2. Initializes the `BMCRemedyITSMManager` to establish a session with the BMC
    Remedy ITSM API.

    3. Calls the `get_incidents_details` method to retrieve incident data from the
    BMC Remedy ITSM system based on the provided incident IDs.

    4. If `Fetch Work Notes` is enabled, iterates through the retrieved incidents
    and calls the `get_worknotes` method for each incident to fetch associated work
    logs up to the specified limit.

    5. Formats the retrieved incident details and work notes into JSON and data tables,
    which are then added to the action results.

    6. Performs a logout operation to close the session with the BMC Remedy ITSM API.


    ### Additional Notes

    If invalid fields are provided in the 'Fields To Return' parameter, the action
    will fail. The action returns a comprehensive result set including incident details
    and work notes, which are displayed in the action's output tables.
  ai_short_description: >-
    Retrieves detailed information and work notes for specified incidents from BMC
    Remedy ITSM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the BMC Remedy ITSM API to retrieve incident
      details. It does not mutate any external or internal data, nor does it update
      entities, create insights, or modify alert data.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
