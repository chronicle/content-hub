Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific incidents from BMC Remedy ITSM.
    This action allows users to fetch specific fields and optionally retrieve associated
    work notes for a given list of incident IDs.


    ### Flow Description

    1. Initializes the connection to the BMC Remedy ITSM API using the provided integration
    credentials.

    2. Parses the provided comma-separated list of `Incident IDs`.

    3. Makes a GET request to the BMC Remedy ITSM API to fetch details for the specified
    incidents, applying any field filters provided in `Fields To Return`.

    4. If `Fetch Work Notes` is enabled, makes additional GET requests to retrieve
    work notes for each successfully found incident, up to the limit specified in
    `Max Work Notes To Return`.

    5. Formats the retrieved incident details and work notes, returning them as JSON
    results and attaching them as data tables to the case.


    ### Additional Notes

    If invalid fields are provided in the `Fields To Return` parameter, the action
    will fail. If no fields are specified, the action will return all available fields
    for the incidents.
  ai_short_description: >-
    Retrieves detailed information and optional work notes for specified incidents
    from BMC Remedy ITSM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the BMC Remedy ITSM API to fetch incident details
      and work notes. It does not mutate external data, update internal entities,
      create insights, or modify alert data.
