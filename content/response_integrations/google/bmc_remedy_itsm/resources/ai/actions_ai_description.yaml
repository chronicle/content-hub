Add Work Note To Incident:
  ai_description: >-
    ### General Description

    Adds a work note to an existing incident in BMC Remedy ITSM. This action allows
    analysts to append contextual information or updates to an incident record directly
    from the SecOps platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Incident ID, Work Note Text).

    2. Initializes the `BMCRemedyITSMManager` to establish a session with the BMC
    Remedy ITSM API.

    3. Calls the `get_incident_details` API endpoint to verify the existence of the
    specified incident.

    4. If the incident exists, calls the `add_worknote_to_incident` API endpoint to
    append the provided work note text to the incident.

    5. Logs the outcome and performs a logout operation to close the session.


    ### Additional Notes

    Requires valid BMC Remedy ITSM credentials. The action validates the existence
    of the incident before attempting to add the note.
  ai_short_description: >-
    Adds a work note to an existing incident in BMC Remedy ITSM.
