identifier: CloudLogging
name: Cloud Logging
parameters:
-   name: API Root
    default_value: https://logging.googleapis.com
    type: string
    description: API root of the Cloud Logging instance.
    is_mandatory: false
    integration_identifier: CloudLogging
-   name: User's Service Account
    default_value: ''
    type: password
    description: The content of the service account key JSON file. You can configure
        either this parameter or the Workload Identity Email parameter. To configure
        this parameter, provide the full content of the service account key JSON file
        that you downloaded when creating a service account.
    is_mandatory: false
    integration_identifier: CloudLogging
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: The client email address of your workload identity. You can configure
        either this parameter or the User's Service Account parameter. To impersonate
        service accounts with the workload identity email address, grant the Service
        Account Token Creator role to your service account.
    is_mandatory: false
    integration_identifier: CloudLogging
-   name: Project ID
    default_value: ''
    type: string
    description: The project ID to use in the integration. If you don't set a value
        for this parameter, the integration retrieves the project ID from your Google
        Cloud service account.
    is_mandatory: false
    integration_identifier: CloudLogging
-   name: Quota Project ID
    default_value: ''
    type: string
    description: The Google Cloud project ID which you use for Google Cloud APIs and
        billing. This parameter requires you to grant the Service Usage Consumer role
        to your service account. The integration attaches this parameter value to
        all API requests. If you don't set a value for this parameter, the integration
        retrieves the quota project ID from your Google Cloud service account.
    is_mandatory: false
    integration_identifier: CloudLogging
-   name: Organization ID
    default_value: ''
    type: string
    description: The organization ID to use in the integration. If you don't set a
        value for this parameter, the integration retrieves the project ID from your
        Google Cloud service account.
    is_mandatory: false
    integration_identifier: CloudLogging
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        connecting to Cloud Logging is valid. Selected by default.
    is_mandatory: false
    integration_identifier: CloudLogging
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cloud-logging
categories:
- IT & Infrastructure
- Google
- Cloud
- Cloud Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
