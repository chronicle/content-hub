  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Project ID | String | No | The project ID to use in the integration. If you
    don't set a value for this parameter, the integration retrieves the project ID
    from your Google Cloud service account. |

    | Organization ID | String | No | The organization ID to use in the integration.
    If you don't set a value for this parameter, the integration retrieves the project
    ID from your Google Cloud service account. |

    | Query | String | Yes | A query to find the logs for. |

    | Time Frame | Dropdown | No | A period to retrieve the results from. If you select
    Custom, also configure the Start Time parameter. |

    | Start Time | String | No | The start time to retrieve results. This parameter
    is required if you selected the Custom option for the Time Frame parameter. To
    configure this parameter, use the ISO 8601 format. |

    | End Time | String | No | The end time to retrieve results. If you don't set
    a value for this parameter and select the Custom option for the Time Frame parameter,
    the action uses the current time as the end time. To configure this parameter,
    use the ISO 8601 format. |

    | Max Records To Return | Integer | No | The maximum number of results to return.
    The default value is 50. |
  ai_short_description: >-
    Executes custom queries in Google Cloud Logging to retrieve specific log entries
    based on project or organization scopes and time-range filters.
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Google Cloud Logging service. It ensures that the integration is correctly
    configured with valid credentials (such as a Service Account or Workload Identity)
    and that the necessary permissions are in place to interact with the Cloud Logging
    API.


    ### Flow Description

    1. **Authentication**: The action initializes the authentication manager using
    the integration's configuration parameters, including the Service Account JSON
    or Workload Identity Email.

    2. **Client Initialization**: It sets up the `CloudLoggingApiManager` with an
    authorized session and the target API root.

    3. **Connectivity Test**: The action executes the `test_connectivity` method,
    which sends a POST request to the Google Cloud Logging `entries:list` endpoint
    with a `pageSize` of 1.

    4. **Response Validation**: The action checks the response from the API. If the
    request is successful, it returns a confirmation message. If it fails (e.g., due
    to authentication or permission issues), it raises a descriptive error.


    ### Additional Notes

    To successfully execute this action, either a **Project ID** or an **Organization
    ID** must be provided in the integration configuration. The action attempts to
    list a single log entry to verify read permissions.
