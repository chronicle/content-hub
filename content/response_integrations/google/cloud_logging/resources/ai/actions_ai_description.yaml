Execute Query:
  ai_description: >-
    ### General Description

    The **Execute Query** action allows users to run custom queries against Google
    Cloud Logging to retrieve specific log entries. It supports scoping the search
    to specific GCP Projects or Organizations and provides flexible time-range filtering,
    including predefined intervals and custom ISO 8601 timestamps. The action handles
    API authentication, query construction, and result pagination up to a user-defined
    limit.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves user inputs including the query,
    scope (Project/Org), and time constraints.

    2. **Validation:** It validates that the 'Max Records' is a positive integer and
    ensures 'Start Time' is provided and correctly formatted if 'Custom' time frame
    is selected.

    3. **Authentication:** Initializes the Google Cloud Logging API client using the
    configured service account or workload identity.

    4. **Query Construction:** Appends the appropriate timestamp filters (based on
    the selected Time Frame) to the user-provided query string.

    5. **API Execution:** Sends a POST request to the `v2/entries:list` endpoint of
    the Google Cloud Logging API to fetch the logs.

    6. **Pagination:** Iterates through result pages using the `nextPageToken` until
    the `Max Records To Return` limit is reached or no more logs are found.

    7. **Output:** Returns the retrieved log entries as a JSON array and sets the
    action status.


    ### Additional Notes

    - Either a **Project ID** or an **Organization ID** must be available (either
    via parameters or the integration configuration) for the action to execute successfully.

    - When using the 'Custom' **Time Frame**, the **Start Time** must be provided
    in a valid ISO 8601 format (e.g., `2023-10-01T12:00:00Z`).
