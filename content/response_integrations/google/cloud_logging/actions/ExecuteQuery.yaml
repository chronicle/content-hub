name: Execute Query
description: Use the Execute Query action to execute custom queries in Cloud Logging.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cloud-logging#execute-query
integration_identifier: CloudLogging
parameters:
-   name: Project ID
    default_value: ''
    type: string
    description: The project ID to use in the integration. If you don't set a value
        for this parameter, the integration retrieves the project ID from your Google
        Cloud service account.
    is_mandatory: false
-   name: Organization ID
    default_value: ''
    type: string
    description: The organization ID to use in the integration.If you don't set a
        value for this parameter, the integration retrieves the project ID from your
        Google Cloud service account.
    is_mandatory: false
-   name: Query
    default_value: ''
    type: string
    description: A query to find the logs for.
    is_mandatory: true
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: A period to retrieve the results from. If you select Custom, also
        configure the Start Time parameter.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: The start time to retrieve results. This parameter is required if
        you selected the Custom option for the Time Frame parameter. To configure
        this parameter, use the ISO 8601 format.
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: The end time to retrieve results. If you don't set a value for this
        parameter and select the Custom option for the Time Frame parameter, the action
        uses the current time as the end time. To configure this parameter, use the
        ISO 8601 format.
    is_mandatory: false
-   name: Max Records To Return
    default_value: 50
    type: string
    description: The maximum number of results to return. The default value is 50.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
