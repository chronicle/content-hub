Ping:
  ai_description: >-
    ### General Description

    This action performs a connectivity test to verify the integration's ability to
    communicate with the external service. It is primarily used for diagnostic purposes
    to ensure that the integration configuration is correct and the service is reachable.


    ### Flow Description

    1. The action is triggered within the SOAR platform.

    2. The `Ping` class is instantiated.

    3. The `run` method is executed to perform the connectivity check.


    ### Additional Notes

    This is a diagnostic action used to validate configuration settings and does not
    perform any data manipulation or retrieval.
  ai_short_description: >-
    Tests connectivity to the external service.
