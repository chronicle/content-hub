Add Tag To Device:
  ai_description: >-
    ### General Description

    Adds a specified tag to a device in McAfee Mvision ePO V2. This action allows
    security analysts to categorize or flag endpoints directly within the McAfee Mvision
    ePO platform based on entities identified in the SOAR case.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, IAM Root, Client ID,
    Client Secret, API Key, Scopes, Verify SSL) and the `Tag Name` parameter.

    2. The `McAfeeMvisionEPOV2Manager` is initialized to handle API communication.

    3. The action validates the existence of the specified tag by querying the McAfee
    Mvision ePO API.

    4. The action iterates through the `target_entities` provided in the case, filtering
    for `ADDRESS` or `HOSTNAME` types.

    5. For each valid entity, the action searches for the corresponding device in
    McAfee Mvision ePO.

    6. If the device is found, the action performs a POST request to the McAfee Mvision
    ePO API (`/epo/v2/devices/{device_id}/relationships/assignedTags`) to assign the
    specified tag to the device.

    7. The action reports the success or failure of the operation for each entity
    processed.


    ### Additional Notes

    This action requires valid API credentials with appropriate scopes (`epo.tags.w`,
    `epo.device.w`) to modify device tags in McAfee Mvision ePO. If the tag does not
    exist or the device cannot be found, the action will fail for that specific entity.
  ai_short_description: >-
    Adds a specified tag to a device in McAfee Mvision ePO V2.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a tag to the device in McAfee Mvision ePO V2 via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device information from the McAfee Mvision ePO API (fetches_data=true)
      and performs a POST request to add a tag to a device, which is a state-changing
      operation on an external system (can_mutate_external_data=true). It does not
      mutate internal SOAR data, update entities, create insights, or modify alert
      data.
