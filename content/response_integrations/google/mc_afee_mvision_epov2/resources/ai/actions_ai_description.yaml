Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using McAfee Mvision ePO V2. This action
    retrieves device system information, such as OS details, agent version, and tags,
    based on the entity's identifier. It updates the entity's additional properties,
    marks it as enriched, and generates an insight with the device details.


    ### Flow Description

    1. Connects to the McAfee Mvision ePO V2 API.

    2. Iterates over all target entities of type Hostname and IP Address.

    3. Makes a GET request to the `/epo/v2/devices` endpoint to search for the device
    by its IP address or hostname.

    4. If a matching device is found, extracts system information and updates the
    entity's additional properties.

    5. Marks the entity as enriched and attaches an insight containing the device
    details.

    6. Returns a data table and JSON results with the fetched device information.


    ### Additional Notes

    If a device is not found in McAfee Mvision ePO V2, the action will log an error
    for that specific entity and continue processing the remaining entities.
