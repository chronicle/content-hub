    1. Initializes the connection to the McAfee Mvision ePO V2 API using the provided
    integration credentials.

    2. Makes a GET request to the `/epo/v2/devices` endpoint to fetch available devices,
    limited by the `Max Devices to Return` parameter.

    3. Parses the returned device data and constructs a CSV data table and JSON output.

