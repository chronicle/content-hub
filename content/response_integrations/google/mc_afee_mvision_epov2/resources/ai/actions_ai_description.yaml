  ai_description: "### General Description\nFetches device system information from\
    \ McAfee Mvision ePO V2 using either a hostname or an IP address. This action\
    \ retrieves comprehensive device details, including OS information, agent version,\
    \ and tags, to provide context for security investigations.\n\n### Flow Description\n\
    1. **Configuration Extraction**: The action retrieves necessary API credentials\
    \ and configuration parameters (API Root, IAM Root, Client ID, Client Secret,\
    \ API Key, Scopes, Verify SSL) from the integration settings.\n2. **Entity Filtering**:\
    \ The action iterates through the provided target entities, filtering for those\
    \ of type `ADDRESS` or `HOSTNAME`.\n3. **Data Retrieval**: For each valid entity,\
    \ the action queries the McAfee Mvision ePO V2 API to find the corresponding device.\n\
    4. **Enrichment**: \n   - If a device is found, the action updates the entity's\
    \ `additional_properties` with the retrieved device data.\n   - It marks the entity\
    \ as enriched (`is_enriched = True`).\n   - It generates an entity insight containing\
    \ key device information (Host, OS, IP, DNS Name, Tags, Username, Agent Version).\n\
    5. **Result Reporting**: The action updates the entities in the SOAR platform\
    \ and adds a data table of the found devices to the action results.\n\n### Additional\
    \ Notes\nThis action requires valid API credentials for the McAfee Mvision ePO\
    \ V2 integration. It specifically targets endpoint entities and does not perform\
