Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity to the McAfee Mvision ePO V2 server to ensure
    that the integration is configured correctly and can successfully communicate
    with the API.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, IAM Root, Client
    ID, Client Secret, API Key, Scopes, Verify SSL).

    2. Initializes the McAfee Mvision ePO V2 Manager, which automatically attempts
    to authenticate and retrieve an access token.

    3. Executes a test connectivity request by making a GET call to the `/epo/v2/devices`
    endpoint with a limit of 1.

    4. Returns a successful execution state if the request succeeds, or a failure
    state if an error occurs.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
