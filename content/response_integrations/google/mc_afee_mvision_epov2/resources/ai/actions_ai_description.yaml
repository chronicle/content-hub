Add Tag To Device:
  ai_description: >-
    ### General Description

    Adds a specific tag to device entities (Hostname, IP Address) in McAfee Mvision
    ePO V2. This action initiates a state change on the external device management
    platform to categorize or label the specified endpoints.


    ### Flow Description

    1. Connects to the McAfee Mvision ePO V2 API.

    2. Retrieves the specified tag to ensure it exists within the system.

    3. Iterates through the target Hostname and IP Address entities.

    4. Searches for the corresponding device in McAfee Mvision ePO V2 for each entity.

    5. Makes a POST request to the API to assign the tag to the matched device.

    6. Returns a summary of successfully tagged devices and any failures.


    ### Additional Notes

    - The action will fail if the specified tag does not exist in the McAfee Mvision
    ePO V2 system. You may need to create the tag or use the 'List Tags' action to
    verify available tags.
  ai_short_description: >-
    Adds a specified tag to Hostname and IP Address entities within McAfee Mvision
    ePO V2.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specified tag to a device in McAfee Mvision ePO V2 via a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee Mvision ePO V2 API (`/epo/v2/devices/{}/relationships/assignedTags`)
      to assign a tag to a device, which mutates external data. It does not fetch
      data for enrichment purposes, mutate internal SecOps data, update entities,
      create insights, modify alert data, or create case comments.
