product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The integration 'micro_focus_itsma' is designed to interact with the Micro Focus
    IT Service Management Automation (ITSMA) platform. The available actions, which
    include 'Create Incident', 'Update Incident', and 'Update Incident External Status',
    are exclusively focused on managing incident tickets within an ITSM system. This
    aligns perfectly with the ITSM category definition, which involves documenting
    investigations and assigning tasks via ticket creation and updates. The integration
    does not perform functions related to SIEM, EDR, Network Security, Threat Intelligence,
    Email Security, IAM, Cloud Security, Vulnerability Management, Asset Inventory,
    or Collaboration.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
