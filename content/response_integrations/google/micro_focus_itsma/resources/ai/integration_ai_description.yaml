product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: true
  network_security: false
  reasoning: >-
    The MicroFocusITSMA integration is designed to interact with the Micro Focus IT
    Service Management Automation (ITSMA) platform. Its primary actions include 'Create
    Incident', 'Update Incident', and 'Update Incident External Status'. These capabilities
    directly align with the ITSM category, which is defined by the ability to document
    investigations and assign tasks by creating or updating tickets in an external
    system. The integration does not perform any functions related to SIEM (log analysis),
    EDR (host/process analysis), Network Security (traffic blocking), Threat Intelligence
    (IOC enrichment), Email Security, IAM (identity management), Cloud Security, Vulnerability
    Management, Asset Inventory, or Collaboration (messaging/approval workflows).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
