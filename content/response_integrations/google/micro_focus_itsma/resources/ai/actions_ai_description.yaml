    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the Micro Focus ITSMA system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Micro Focus ITSMA API to create a
      new incident record. It does not retrieve data (fetches_data=false) or modify
      internal SOAR data (can_mutate_internal_data=false). It mutates external data
      by creating a new ticket.
  categories:
    enrichment: false
    reasoning: >-
      The action is a creation/mutation action, not an enrichment action. It does
      not fetch data or update internal entities/insights.
