  ai_description: >-
    ### General Description

    The `Update Incident External Status` action updates the external status of an
    existing incident (ticket) within MicroFocus ITSMA. It interacts with the MicroFocus
    ITSMA API to modify the incident's external status property based on the provided
    inputs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Incident ID | String | Yes | The unique identifier of the incident to be updated
    in MicroFocus ITSMA. |

    | Status | String | Yes | The new external status to apply to the incident. |


    ### Flow Description

    1. The action retrieves the `Incident ID` and `Status` from the provided parameters.

    2. It constructs a payload containing the incident ID and the new external status.

    3. It sends a POST request to the MicroFocus ITSMA API to update the incident.

    4. If successful, it returns a message indicating the incident's external status
    was changed.
