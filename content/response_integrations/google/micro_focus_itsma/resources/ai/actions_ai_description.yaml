  ai_description: >-
    ### General Description

    Updates the external status of a specific incident within the Micro Focus ITSMA
    platform. This action synchronizes incident states between Google SecOps and the
    external ITSM system by modifying the 'ExternalStatus' property of a target ticket.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Incident ID | The unique identifier of the incident in Micro Focus ITSMA that
    needs to be updated. | String | Yes |

    | Status | The new external status value to be assigned to the incident (e.g.,
    'Pending Vendor', 'Resolved'). | String | Yes |


    ### Flow Description

    1. **Initialization**: The action initializes the Micro Focus ITSMA manager using
    the integration's configuration settings, including API Root, credentials, and
    Tenant ID.

    2. **Parameter Retrieval**: It retrieves the `Incident ID` and the target `Status`
    from the action's input parameters.

    3. **API Request**: The action constructs a payload targeting the specific incident
    ID and updates its external status properties. It then sends a POST request to
    the Micro Focus ITSMA 'ces' (Common Entity Service) endpoint.

    4. **Completion**: Upon a successful response from the API, the action returns
    a success message confirming the status change. If the update fails or no ticket
    is found, it reports the failure accordingly.
