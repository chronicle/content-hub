Create Incident:
  ai_description: >-
    ### General Description

    This action creates a new incident in the MicroFocus ITSMA system. It allows analysts
    to programmatically generate service management tickets directly from the SOAR
    platform by providing incident details such as the display label, description,
    impact scope, urgency, and service ID.


    ### Flow Description

    1. The action initializes the `MicroFocusITSMAManager` using the integration configuration
    (API Root, credentials, and tenant ID).

    2. It retrieves the required incident parameters (`Display Label`, `Description`,
    `Impact Scope`, `Urgency`, and `Service ID`) from the action input.

    3. The action calls the `create_incident` method, which constructs a JSON payload
    containing the provided incident details.

    4. A POST request is sent to the MicroFocus ITSMA API endpoint (`/rest/{tenant_id}/ces`)
    to create the incident.

    5. The API returns the unique ID of the newly created incident.

    6. The action concludes by returning the incident ID to the SOAR platform, which
    is then displayed as the result.


    ### Additional Notes

    This action performs a state-changing operation on an external ITSM system. It
    does not interact with or modify entities within the SOAR case.
  ai_short_description: >-
    Creates a new incident in the MicroFocus ITSMA system using provided incident
    details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the MicroFocus ITSMA system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to create a ticket in an external system
      (can_mutate_external_data=true). It does not fetch data, update internal entities,
      or modify alert data.
