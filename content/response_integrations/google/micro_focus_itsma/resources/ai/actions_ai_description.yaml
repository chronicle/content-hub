Update Incident External Status:
  ai_description: >-
    General Description: Updates the external status of an incident within the MicroFocus
    ITSMA system.


    Flow Description:

    1. Initialize the `MicroFocusITSMAManager` using configuration parameters (API
    Root, Username, Password, Tenant ID, etc.).

    2. Retrieve the `Incident ID` and `Status` from the action parameters.

    3. Call the `update_external_incident_status` method in the manager.

    4. The manager constructs a JSON payload containing the `Incident ID`, the new
    `Status`, and external system identifiers.

    5. The manager sends a `POST` request to the MicroFocus ITSMA API endpoint (`/rest/{tenant_id}/ces`)
    to apply the update.

    6. The action returns a success message indicating whether the incident status
    was updated.


