Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Micro Focus ITSMA instance. This action verifies that
    the integration is configured correctly and can successfully communicate with
    the external service.


    ### Flow Description

    1. Initializes the Micro Focus ITSMA manager using the provided integration configurations
    (API Root, Username, Password, Tenant ID, etc.).

    2. Makes an HTTP POST request to the Micro Focus ITSMA authentication endpoint
    to retrieve an access token.

    3. Evaluates the response to determine if the authentication was successful.

    4. Returns a success message ("Connection Established.") if a token is retrieved,
    or a failure message ("Connection Failed.") otherwise.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
    It relies entirely on the integration-level configuration.
