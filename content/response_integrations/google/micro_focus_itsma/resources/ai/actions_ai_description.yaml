Update Incident:
  ai_description: >-
    ### General Description

    Updates an existing incident in MicroFocus ITSMA. This action allows for the modification
    of various incident attributes such as the display label, description, impact
    scope, urgency, and service ID based on the provided Incident ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | string | True | The unique identifier of the incident to be updated.
    |

    | Display Label | string | False | The updated display label (title) of the incident.
    |

    | Description | string | False | The updated detailed description of the incident.
    |

    | Impact Scope | string | False | The updated impact score/scope of the incident.
    |

    | Urgency | string | False | The updated urgency level of the incident. |

    | Service ID | string | False | The updated ID of the category or service associated
    with the incident. |


    ### Additional Notes

    At least one optional parameter (Display Label, Description, Impact Scope, Urgency,
    or Service ID) should be provided alongside the mandatory Incident ID for the
    update to have an effect.


    ### Flow Description

    1. **Initialization**: The action initializes the MicroFocus ITSMA manager using
    the provided integration configuration (API Root, Credentials, Tenant ID, etc.).

    2. **Parameter Retrieval**: The action retrieves the Incident ID and the optional
    update fields from the user input.

    3. **API Interaction**: The action calls the `update_incident` method in the manager,
    which constructs a JSON payload and sends a POST request to the MicroFocus ITSMA
    API.

    4. **Result Processing**: If the API call is successful, the action identifies
    which parameters were updated and constructs a success message.

    5. **Completion**: The action ends, returning the success status and the summary
    message to the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
