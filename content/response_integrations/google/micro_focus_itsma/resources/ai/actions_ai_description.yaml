  ai_description: >-
    ### General Description

    Creates a new incident in Micro Focus ITSMA. This action allows users to programmatically
    generate incident tickets by providing key details such as the display label,
    description, impact scope, urgency, and service ID. It interacts with the Micro
    Focus ITSMA API via a POST request to create the record and returns the unique
    incident ID upon success.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Display Label | String | True | The display label or title of the incident.
    |

    | Description | String | True | The detailed description of the incident. |

    | Impact Scope | String | True | The impact scope of the incident (e.g., 'MultipleUsers').
    |

    | Urgency | String | True | The urgency of the incident (e.g., 'SevereDisruption').
    |

    | Service ID | String | True | The ID of the category or service the incident
    is registered for. |


    ### Flow Description

    1. **Initialization**: Retrieve configuration and initialize the Micro Focus ITSMA
    manager with API credentials and tenant information.

    2. **Parameter Extraction**: Extract incident details (Display Label, Description,
    Impact Scope, Urgency, and Service ID) from the action parameters.

    3. **API Interaction**: Construct and send a POST request to the Micro Focus ITSMA
    'ces' endpoint with the incident payload.

    4. **Response Processing**: Parse the API response to extract the unique ID of
    the newly created incident.

    5. **Completion**: Return the incident ID and a success message to the Google
    SecOps platform.
