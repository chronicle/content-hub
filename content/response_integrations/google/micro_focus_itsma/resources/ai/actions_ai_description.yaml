Update Incident External Status:
  ai_description: >-
    Updates the external status of a specific incident in Micro Focus ITSMA. This
    action allows analysts to synchronize the status of an incident between Google
    SecOps and the Micro Focus ITSMA platform by providing the incident's unique identifier
    and the desired status value.


    ### Flow Description

    1. **Initialization**: The action initializes the Micro Focus ITSMA manager using
    the provided integration configuration (API Root, credentials, Tenant ID, etc.).

    2. **Parameter Retrieval**: It retrieves the mandatory 'Incident ID' and 'Status'
    parameters from the action input.

    3. **API Interaction**: The action constructs a payload containing the incident
    ID and the new external status, then sends a POST request to the Micro Focus ITSMA
    API endpoint.

    4. **Outcome Reporting**: Based on the API response, the action returns a success
    message indicating the incident was updated or a failure message if no ticket
    was modified.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | string | True | The unique identifier of the incident in Micro
    Focus ITSMA that needs to be updated. |

    | Status | string | True | The new external status value to be applied to the
    incident. |
  capabilities:
