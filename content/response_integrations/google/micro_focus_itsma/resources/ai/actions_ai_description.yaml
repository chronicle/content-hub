  ai_description: >-
    ### General Description

    Updates an existing incident in MicroFocus ITSMA. This action allows users to
    modify specific attributes of a ticket, such as its title, description, impact,
    urgency, and associated service ID. It interacts with the ITSMA API via a POST
    request to apply the changes to the specified incident ID.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident to be updated.
    |

    | Display Label | String | No | The updated display label (title) of the incident.
    |

    | Description | String | No | The updated description text for the incident. |

    | Impact Scope | String | No | The updated impact score/scope of the incident.
    |

    | Urgency | String | No | The updated urgency level of the incident. |

    | Service ID | String | No | The updated ID of the category or service associated
    with the incident. |


    ### Additional Notes

    - At least one optional parameter should be provided alongside the mandatory 'Incident
    ID' for the action to perform a meaningful update.

    - The action uses the 'External System' and 'External ID' configured in the integration
    settings to identify the source of the update.


    ### Flow Description

    1. **Authentication**: Connects to the MicroFocus ITSMA instance using the provided
    credentials and Tenant ID to obtain a session token.

    2. **Parameter Retrieval**: Collects the mandatory Incident ID and any optional
    update fields (Display Label, Description, etc.) from the action input.

    3. **Payload Construction**: Builds a JSON payload containing the incident ID
    and the specific properties that need to be updated.

    4. **API Interaction**: Sends a POST request to the ITSMA 'ces' endpoint to apply
    the updates.

    5. **Result Handling**: Validates the API response and returns a success message
    listing the parameters that were successfully updated.
