Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in Micro Focus ITSMA using the provided details such as
    display label, description, impact scope, urgency, and service ID. This action
    allows analysts to programmatically open tickets in the external ITSM system directly
    from the SecOps platform.


    ### Flow Description

    1. Retrieves the action parameters including Display Label, Description, Impact
    Scope, Urgency, and Service ID.

    2. Authenticates and establishes a session with the Micro Focus ITSMA API using
    the integration's configured credentials.

    3. Makes a POST request to the `/rest/{tenant_id}/ces` endpoint with the incident
    details payload.

    4. Parses the response to extract the newly created incident ID.

    5. Returns the incident ID and a success message to the SecOps platform.


    ### Additional Notes

    Ensure that the provided Service ID corresponds to a valid category within your
    Micro Focus ITSMA environment.
  ai_short_description: >-
    Creates a new incident in Micro Focus ITSMA and returns the generated incident
    ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the external Micro Focus ITSMA system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to an external ITSM system to create a new
      incident, which mutates external data. It does not fetch enrichment data, nor
      does it mutate internal SecOps data such as entities, insights, or case comments.
