Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Micro Focus ITSMA system by attempting to authenticate
    and retrieve an access token.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and retrieve the Micro Focus ITSMA configuration
    (API Root, Username, Password, Tenant ID, etc.).

    2. Instantiate the `MicroFocusITSMAManager` with the provided configuration.

    3. Call the `get_token` method, which sends a POST request to the authentication
    endpoint (`/auth/authentication-endpoint/authenticate/login`) using the provided
    credentials.

    4. Validate the response.

    5. If a token is successfully retrieved, the action outputs "Connection Established.";
    otherwise, it outputs "Connection Failed."


    ### Additional Notes

    This action is used to verify that the integration configuration is correct and
    that the SOAR platform can communicate with the Micro Focus ITSMA instance.
