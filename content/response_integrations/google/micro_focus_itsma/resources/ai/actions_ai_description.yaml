  ai_description: >-
    Creates a new incident in Micro Focus ITSMA.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Display Label | String | Yes | The display label or summary of the incident.
    |

    | Description | String | Yes | The detailed description of the incident. |

    | Impact Scope | String | Yes | The impact scope of the incident. |

    | Urgency | String | Yes | The urgency level of the incident. |

    | Service ID | String | Yes | The ID of the category or service for the incident.
    |


    ### Flow Description

    1. Initializes the connection to Micro Focus ITSMA using the provided integration
    configuration.

    2. Retrieves the incident details from the action parameters.

    3. Sends a request to the Micro Focus ITSMA API to create a new incident with
    the specified properties.

    4. Returns the newly created incident ID and outputs a success message.
