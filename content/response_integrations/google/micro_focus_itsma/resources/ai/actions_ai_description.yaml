Create Incident:
  ai_description: >-
    Creates a new incident in MicroFocus ITSMA. This action allows users to programmatically
    generate incident records by providing key details such as the display label,
    description, impact scope, urgency, and service category. It interacts with the
    MicroFocus ITSMA API via a POST request and returns the unique identifier of the
    newly created incident.


    ### Flow Description

    1. **Initialization**: The action initializes the MicroFocus ITSMA manager using
    the provided integration configuration (API Root, Credentials, Tenant ID, etc.).

    2. **Parameter Extraction**: It retrieves the mandatory input parameters: Display
    Label, Description, Impact Scope, Urgency, and Service ID.

    3. **API Interaction**: The action sends a POST request to the MicroFocus ITSMA
    'ces' endpoint with a payload containing the incident properties and external
    system metadata.

    4. **Result Handling**: If successful, the action extracts the Incident ID from
    the API response and returns it as the script result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Display Label | string | True | The summary or title of the incident to be created.
    |

    | Description | string | True | A detailed description of the incident. |

    | Impact Scope | string | True | The scope of the impact (e.g., MultipleUsers,
    SingleUser). |

    | Urgency | string | True | The urgency level of the incident (e.g., SevereDisruption).
    |

    | Service ID | string | True | The ID representing the category or service the
    incident is registered for. |


    ### Additional Notes

    - This action does not operate on entities; it relies entirely on the provided
    input parameters.

    - The 'External System' and 'External ID' used in the payload are derived from
    the integration's configuration settings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the MicroFocus ITSMA platform.
    fetches_data: false
    internal_data_mutation_explanation: null
