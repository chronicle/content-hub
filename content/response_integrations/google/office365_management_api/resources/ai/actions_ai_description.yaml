    | Client Secret | String | No | The Client Secret for Azure Active Directory app
    registration. Required if Certificate Path is not provided. |

    | Certificate Path | String | No | The file path to the .pfx certificate on the
    SOAR server. Required if Client Secret is not provided. |

    | Certificate Password | String | No | The password for the provided certificate
    file. |

    | OAUTH2 Login Endpoint Url | String | Yes | The OAUTH2 Login Endpoint URL. |

    | Verify SSL | Boolean | Yes | Whether to validate the SSL certificate of the
    API endpoint. |
Start Subscription:
  ai_description: >-
    ### General Description

    Starts a subscription to a specific Office 365 Management API content type. This
    action enables the ingestion of activity logs from the Office 365 environment
    by registering the subscription with the Microsoft Office 365 Management API.


    ### Flow Description

    1. The action initializes the `Office365ManagementAPIManager` using the provided
    configuration parameters, including the API root, Azure Active Directory ID, and
    authentication credentials (Client ID/Secret or Certificate).

    2. It authenticates with the Office 365 Management API to obtain an access token.

    3. The action calls the `start_subscription` method, which performs a POST request
    to the Office 365 Management API endpoint to initiate the subscription for the
    selected content type (e.g., DLP.All, Audit.General).

    4. The action returns a success message upon completion or an error message if
    the request fails.


    ### Additional Notes

    This action is a prerequisite for receiving events from the Office 365 Management
    API. Ensure that the appropriate permissions are configured in the Azure Active
    Directory application to allow subscription management.
