Stop Subscription:
  ai_description: >-
    ### General Description

    Stops a subscription to a chosen Office 365 Management API content type. This
    action initiates a state change in the external Microsoft 365 environment to halt
    the delivery of notifications and data for the specified content type.


    ### Flow Description

    1. Extracts the target subscription content type from the action parameters.

    2. Authenticates with the Office 365 Management API using the provided integration
    credentials (client secret or certificate).

    3. Sends an HTTP POST request to the Office 365 Management API (`/activity/feed/subscriptions/stop`)
    to stop the specified subscription.

    4. Returns a success or failure message based on the API response.


    ### Additional Notes

    When a subscription is stopped, you will no longer receive notifications and you
    will not be able to retrieve available content. If the subscription is later restarted,
    you will have access to new content from that point forward, but you will not
    be able to retrieve content that was available between the time the subscription
    was stopped and restarted.
  ai_short_description: >-
    Stops a subscription to a chosen Office 365 Management API content type, preventing
    further notifications and content retrieval for that type.
