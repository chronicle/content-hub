Start Subscription:
  ai_description: >-
    ### General Description

    This action initiates a subscription to a specified content type within the Office
    365 Management API.


    ### Flow Description

    1. Retrieves the selected content type from the action parameters.

    2. Authenticates and initializes the connection to the Office 365 Management API.

    3. Executes a POST request to the API endpoint (`/activity/feed/subscriptions/start`)
    to start the subscription for the chosen content type.

    4. Outputs a success message if the subscription is successfully created, or an
    error message if it fails.


    ### Additional Notes

    This action is typically used to enable the flow of audit or DLP events from Office
    365 to the integration.
