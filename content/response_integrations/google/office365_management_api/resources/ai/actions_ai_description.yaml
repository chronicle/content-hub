    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only attempts to authenticate with the Office 365 Management API
      to verify connectivity. It does not fetch contextual data for alerts/entities,
      mutate external data, mutate internal data, update entities, create insights,
      modify alert data, or create case comments.
