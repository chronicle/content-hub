Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Office 365 Management API service. This action verifies
    that the integration is configured correctly by attempting to authenticate using
    the provided credentials.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (e.g., Client ID, Client
    Secret, API Root).

    2. Initializes the Office 365 Management API manager.

    3. Attempts to authenticate and retrieve an access token via an HTTP POST request
    to the OAuth2 login endpoint.

    4. Returns a success message if the authentication is successful, or a failure
    message if an error occurs.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    can successfully communicate with the Office 365 Management API. It does not perform
    any operational tasks or data retrieval beyond authentication.
  ai_short_description: >-
    Tests connectivity to the Office 365 Management API service by attempting to authenticate
    and retrieve an access token using the provided integration configuration parameters.
  capabilities:
    can_create_case_comments: false
