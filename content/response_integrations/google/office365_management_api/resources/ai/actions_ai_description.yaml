Stop Subscription:
  ai_description: >-
    ### General Description

    Stops a subscription to a chosen Office 365 Management API content type. When
    a subscription is stopped, you will no longer receive notifications and you will
    not be able to retrieve available content. If the subscription is later restarted,
    you will have access to new content from that point forward. You will not be able
    to retrieve content that was available between the time the subscription was stopped
    and restarted.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Azure AD ID, Client ID, Client
    Secret, etc.) and the `subscription_type` action parameter.

    2. Initializes the `Office365ManagementAPIManager` with the provided credentials
    and configuration.

    3. Calls the `stop_subscription` method, which constructs the API endpoint URL
    for the specified content type.

    4. Executes a `POST` request to the Office 365 Management API to stop the subscription.

    5. Validates the API response and returns a success or failure message.


    ### Additional Notes

    When a subscription is stopped, notifications are no longer received, and content
    cannot be retrieved. If restarted, content is only available from that point forward.
  ai_short_description: >-
    Stops a subscription to a chosen Office 365 Management API content type.
