Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Office 365 Management API by attempting to authenticate
    using the provided configuration parameters. This action verifies that the integration
    is correctly configured and that the SOAR platform can successfully communicate
    with the Office 365 Management API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Azure
    Active Directory ID`, `Client ID`, `Client Secret` (optional), `Certificate Path`
    (optional), `Certificate Password` (optional), `OAUTH2 Login Endpoint Url`, and
    `Verify SSL`.

    2. It initializes the `Office365ManagementAPIManager` with these parameters.

    3. During initialization, the manager attempts to authenticate by making a POST
    request to the configured OAUTH2 login endpoint to retrieve an access token.

    4. If the authentication request is successful, the action sets the execution
    state to completed and returns a success message.

    5. If the authentication fails (e.g., due to invalid credentials or network issues),
    the action catches the exception, logs the error, and sets the execution state
    to failed.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    retrieval or modification operations on the Office 365 environment.
  ai_short_description: >-
    Tests connectivity to the Office 365 Management API by validating authentication
    credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an authentication request to verify connectivity. It does
      not fetch contextual data, mutate external or internal data, or modify any SOAR
      objects.
