name: Stop Subscription
description: 'Stop a subscription to a chosen Office 365 Management API content type.
    Note: When a subscription is stopped, you will no longer receive notifications
    and you will not be able to retrieve available content. If the subscription is
    later restarted, you will have access to new content from that point forward.
    You will not be able to retrieve content that was available between the time the
    subscription was stopped and restarted.'
integration_identifier: Office365ManagementAPI
parameters:
-   name: Stop a Subscription for
    default_value: Select content type
    type: ddl
    optional_values:
    - Select content type
    - DLP.All
    - Audit.General
    description: Specify for which content type to stop a subscription.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
