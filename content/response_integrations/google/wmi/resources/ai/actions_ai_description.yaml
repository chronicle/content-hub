ListServices:
  ai_description: >-
    ### General Description

    Retrieves a list of installed services from a specified remote system using Windows
    Management Instrumentation (WMI). This action connects to the target server and
    extracts details about all configured services.


    ### Flow Description

    1. Retrieves the target server address, username, and password from the action
    parameters.

    2. Establishes a WMI connection to the target server using the provided credentials.

    3. Executes a WMI query (`Win32_Service`) to fetch the list of configured services
    on the system.

    4. Formats the retrieved services into a JSON object and a CSV data table.

    5. Attaches the JSON result and the "WMI Services" data table to the action's
    output.


    ### Additional Notes

    Requires appropriate WMI access and valid credentials for the target server. The
    action automatically handles connections from both Linux and Windows SOAR environments.
