ListUsers:
  ai_description: >-
    ### General Description

    Retrieves a list of all user accounts configured on a specified Windows system
    using WMI (Windows Management Instrumentation). This action provides visibility
    into the user accounts present on a target server, which is useful for auditing
    and investigation purposes.


    ### Flow Description

    1. The action initializes a WMI manager using the provided server address, username,
    and password.

    2. It executes a WMI query (`Win32_UserAccount`) to fetch all user accounts from
    the target system.

    3. The retrieved user data is added to the action results as a JSON object.

    4. A CSV table containing the user information is generated and added to the action
    results.

    5. The action concludes by returning the user list and a summary message.


