    to retrieve system information, telemetry, or configuration data. This action
    acts as a generic interface for querying WMI-enabled endpoints, allowing analysts
    to inspect system states, running services, or user accounts.


    ### Flow Description

    1. The action initializes a WMI manager using the provided `Server Address`, `Username`,
    and `Password`. It detects the environment (Linux or Windows) to select the appropriate
    WMI client wrapper.

    2. The specified `WQL Query` is executed against the target system.

    3. If the query returns data, the action formats the results into a CSV table
    and attaches it to the action results.

    4. The raw JSON results are added to the action output, and the action terminates
    with a success message.

    5. If no results are returned, the action terminates with a "No results from query"
    message.


    ### Additional Notes

    This action requires WMI access to be enabled on the target server. Ensure the
    provided credentials have sufficient permissions to execute the requested WQL
    queries.
