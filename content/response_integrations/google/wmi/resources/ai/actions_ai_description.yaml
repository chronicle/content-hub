  ai_description: >-
    ### General Description

    Retrieves a list of installed services from a remote Windows system using WMI
    (Windows Management Instrumentation). The action connects to the target server
    and extracts the properties of all configured services, returning them as a JSON
    object and a structured data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Server Address | String | Yes | The IP address or hostname of the target server
    to query. |

    | Username | String | No | The username used to authenticate with the target server.
    |

    | Password | Password | No | The password used to authenticate with the target
    server. |


    ### Flow Description

    1. Initializes the WMI manager and connects to the target server using the provided
    `Server Address` and credentials.

    2. Executes a read-only WMI query (`Win32_Service`) to fetch all services configured
    on the system.

    3. Parses the returned WMI objects into a list of dictionaries containing service
    properties.

    4. Outputs the raw JSON results and constructs a CSV-formatted data table named
    'WMI Services' for display in the case wall.

    5. Completes the action with a summary message indicating the number of services
    found.
