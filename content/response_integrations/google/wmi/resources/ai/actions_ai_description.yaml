ListServices:
  ai_description: >-
    General Description

    Retrieves a comprehensive list of installed services from a specified remote server
    using Windows Management Instrumentation (WMI). This action provides visibility
    into the system's configuration, which is useful for identifying unauthorized
    services or verifying the presence of required software.


    Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the required parameters:
    `Server Address`, `Username`, and `Password`.

    2. A `WMIManager` is instantiated based on the target operating system (Windows
    or Posix) to handle the connection.

    3. The action executes a WMI query to fetch all services (`Win32_Service`) from
    the target server.

    4. The retrieved service data is formatted into a JSON object and a CSV table.

    5. The JSON data is added to the action results, and the CSV table is attached
    as a data table named 'WMI Services'.

    6. The action concludes by returning a summary message indicating the number of
    services found.


    Additional Notes

    This action requires WMI access to the target server. Ensure that the provided
    credentials have the necessary permissions to query WMI services on the remote
    host.
