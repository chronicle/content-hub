GetSystemInfo:
  ai_description: >-
    ### General Description

    Retrieves detailed system and operating system information from a remote server
    using Windows Management Instrumentation (WMI). This action connects to the specified
    server and extracts contextual metadata about the machine's hardware and OS configuration.


    ### Flow Description

    1. Initializes the WMI manager and connects to the target server using the provided
    `Server Address`, `Username`, and `Password`.

    2. Executes WQL queries against the `Win32_ComputerSystem` and `Win32_OperatingSystem`
    classes to fetch system metadata.

    3. Parses and merges the retrieved data into a single dictionary.

    4. Formats the system information into a CSV and attaches it as a data table to
    the action results.

    5. Returns the raw system information as a JSON result.


    ### Additional Notes

    Requires appropriate WMI access and credentials to the target server. If used
    as an enrichment action in a playbook, the user must ensure the provided credentials
    have WMI access to the target entities.
  ai_short_description: >-
    Retrieves detailed system and operating system information from a remote server
    using WMI.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
