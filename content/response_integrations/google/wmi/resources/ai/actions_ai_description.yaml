  ai_description: >-
    ### General Description

    This action retrieves detailed system and operating system information from a
    specified server using Windows Management Instrumentation (WMI). It provides contextual
    metadata about the asset to assist in investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Server Address | String | Yes | The IP address or hostname of the target server
    to query. |

    | Username | String | No | The username required to authenticate with the WMI
    service on the target server. |

    | Password | Password | No | The password associated with the provided username
    for WMI authentication. |


    ### Flow Description

    1. The action initializes the WMI manager using the provided Server Address, Username,
    and Password.

    2. It connects to the target server's WMI instance.

    3. It executes WQL queries (`SELECT * FROM Win32_ComputerSystem` and `SELECT *
    FROM Win32_OperatingSystem`) to fetch system and OS details.

    4. The retrieved information is flattened and formatted into a CSV data table.

    5. The action attaches the data table and the raw JSON results to the action output.


    ### Additional Notes

    To use this action successfully, the provided credentials must have WMI access
    granted on the target server.
