GetSystemInfo:
  ai_description: >-
    ### General Description

    Retrieves detailed system and operating system information from a remote host
    using Windows Management Instrumentation (WMI). This action connects to a specified
    server and queries system configuration and OS details, providing visibility into
    the target host's environment.


    ### Flow Description

    1. The action initializes a WMI manager using the provided `Server Address`, `Username`,
    and `Password` parameters.

    2. It establishes a connection to the remote host using the WMI protocol.

    3. The action executes WMI queries for the `Win32_ComputerSystem` and `Win32_OperatingSystem`
    classes to gather system metadata.

    4. The retrieved data is aggregated into a dictionary.

    5. The action formats the collected information into a CSV data table and a JSON
    result, which are attached to the action output.


    ### Additional Notes

    This action requires WMI access to the target server. It operates on the provided
    `Server Address` parameter rather than iterating over existing entities in the
    case. Ensure the provided credentials have sufficient permissions to query WMI
    on the target system.
  ai_short_description: >-
    Retrieves system and operating system information from a remote host via WMI.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
