ListUsers:
  ai_description: >-
    ### General Description

    Retrieves a list of all users configured on a specified remote system using Windows
    Management Instrumentation (WMI).


    ### Flow Description

    1. Initializes the WMI manager using the provided `Server Address`, `Username`,
    and `Password` parameters.

    2. Connects to the target system and executes a WMI query (`SELECT * FROM Win32_UserAccount`)
    to fetch all configured users.

    3. Formats the retrieved user data into a JSON structure and a CSV data table.

    4. Attaches the JSON result and the data table to the action's output.


