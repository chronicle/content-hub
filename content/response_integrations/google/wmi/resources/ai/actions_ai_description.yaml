    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches system information from a remote server via WMI (fetches_data=true).
      It only executes SELECT queries and does not mutate external data. It also does
      not update internal entities, create insights, modify alerts, or create case
      comments.
