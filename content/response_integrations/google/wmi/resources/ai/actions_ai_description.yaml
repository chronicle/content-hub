    1. Extracts the target server address, credentials, and the WQL query from the
    action parameters.

    2. Establishes a WMI connection to the target server using the provided credentials
    via the `WMIManager`.

    3. Executes the WQL query on the remote system.

    4. Formats the query results into a JSON object and constructs a CSV data table.

    5. Returns the results to the Google SecOps platform, attaching the JSON and data
    table to the action results.


    ### Additional Notes

    The action supports execution from both Windows and Linux SOAR environments, utilizing
    the appropriate underlying WMI client wrapper depending on the OS.
