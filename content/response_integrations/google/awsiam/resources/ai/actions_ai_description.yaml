    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specified users to an AWS IAM group, modifying their permissions in the
      external AWS environment.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST/PUT-equivalent request (`add_user_to_group`) to AWS
      IAM to modify group memberships, which mutates external data. It does not fetch
      contextual data for enrichment, nor does it mutate internal SecOps data, update
