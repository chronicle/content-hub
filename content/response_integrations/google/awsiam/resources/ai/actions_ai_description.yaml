Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AWS IAM service using the provided credentials. This
    action validates that the integration configuration is correct and that the SOAR
    platform can successfully communicate with the AWS IAM API.


    ### Flow Description

    1. The action extracts the `AWS Access Key ID`, `AWS Secret Key`, and `Verify
    SSL` configuration parameters from the integration settings.

    2. It initializes the `AWSIAMManager` using the provided credentials and SSL verification
    setting.

    3. The action calls the `test_connectivity` method, which performs an API call
    to the AWS IAM `get_account_summary` endpoint to verify the connection.

    4. If the API call is successful, the action logs a success message and completes
    with a status of `EXECUTION_STATE_COMPLETED`.

    5. If the API call fails (e.g., due to invalid credentials), the action logs the
    error and completes with a status of `EXECUTION_STATE_FAILED`.


    ### Additional Notes

    This action does not perform any operations on entities or modify any data. It
    is strictly used for verifying the connectivity between the SOAR platform and
    the AWS IAM service.
