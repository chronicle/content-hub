Attach a Policy:
  ai_description: >-
    ### General Description

    Attaches a specified managed policy to an AWS IAM identity (User, Group, or Role).
    This action allows administrators to programmatically manage permissions by associating
    existing AWS managed or customer-managed policies with specific IAM entities.


    ### Flow Description

    1. The action extracts AWS credentials and action parameters, including the Identity
    Type (User, Group, or Role), Identity Name, and Policy Name.

    2. It validates the provided Identity Name and Policy Name against allowed character
    sets (alphanumeric and specific symbols).

    3. It calls the AWS IAM API to retrieve the Amazon Resource Name (ARN) for the
    specified Policy Name.

    4. Based on the selected Identity Type, it executes the corresponding AWS IAM
    API call (`attach_group_policy`, `attach_user_policy`, or `attach_role_policy`)
    to associate the policy with the target identity.


    ### Additional Notes

    This action requires valid AWS IAM credentials with sufficient permissions to
    attach policies. The identity and policy names must adhere to AWS naming constraints,
    and the action will fail if the specified identity or policy cannot be found.
