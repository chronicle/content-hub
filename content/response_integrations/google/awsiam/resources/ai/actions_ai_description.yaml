Disable User Access:
  ai_description: >-
    ### General Description

    Disables access for a specific user in AWS IAM by attaching an inline policy that
    explicitly denies all actions. This action is designed to immediately revoke a
    user's permissions within the AWS environment.


    ### Flow Description

    1. The action extracts the required AWS credentials (AWS Access Key ID, AWS Secret
    Key) and the SSL verification setting from the integration configuration.

    2. The `AWSIAMManager` is initialized using these credentials to establish a connection
    to the AWS IAM service.

    3. The action iterates through the provided User entities.

    4. For each user, the action extracts the username from the provided ARN.

    5. The action calls the AWS IAM API `put_user_policy` to apply an inline policy
    named "DisableUserAccessPolicy" to the user, which contains a JSON document explicitly
    denying all actions (`"Effect": "Deny", "Action": "*", "Resource": "*"`).

    6. The action reports the success or failure of the policy application for each
    user.


    ### Additional Notes

    This action performs a destructive change to the user's permissions in AWS. Ensure
    that the target user entity is correct before execution, as this will immediately
    block all actions for that user.
