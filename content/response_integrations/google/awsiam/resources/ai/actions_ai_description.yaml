Create a User:
  ai_description: >-
    ### General Description

    Creates new IAM users in an AWS account. This action allows for the bulk creation
    of users by providing a comma-separated list of usernames. Please note that no
    policies are applied to the users during this creation process.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts the AWS Access Key, Secret
    Key, and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: The action extracts the `User Name` parameter, which
    contains the list of usernames to be created.

    3. **Connectivity Test**: The action initializes the `AWSIAMManager` and performs
    a connectivity test to the AWS IAM service.

    4. **Username Processing**: The provided comma-separated string of usernames is
    parsed into a list.

    5. **User Creation**: For each username in the list:
        * The action validates the username format against AWS requirements (alphanumeric
    characters and specific symbols: +=.@_-).
        * The action calls the AWS IAM API (`manager.create_user`) to create the user.
        * If successful, the user details are added to the results list.
        * If an error occurs (e.g., user already exists, validation failure, or account
    limit reached), the error is logged and the username is tracked in the appropriate
    error list.
    6. **Result Reporting**: The action compiles the results and returns a JSON object
    containing the details of the successfully created users, along with an output
    message summarizing the operation status.


    ### Additional Notes

    This action does not apply any IAM policies to the newly created users. Users
    must be managed or assigned permissions separately after creation.
