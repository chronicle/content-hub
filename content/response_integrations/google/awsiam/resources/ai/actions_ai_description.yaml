Attach a Policy:
  ai_description: >-
    ### General Description

    Attaches a specified managed policy to an AWS IAM identity (User, Group, or Role).
    This action modifies the permissions of the specified identity within AWS IAM
    by attaching the policy using its friendly name.


    ### Flow Description

    1. Validates the provided identity name and policy name to ensure they contain
    only allowed characters.

    2. Makes an API call to AWS IAM to retrieve the Amazon Resource Name (ARN) for
    the specified policy name.

    3. Makes an API call to AWS IAM to attach the retrieved policy ARN to the specified
    identity (User, Group, or Role).

    4. Returns a success message if the policy is successfully attached, or an error
    message if the identity or policy cannot be found.


    ### Additional Notes

    The identity and policy names must be friendly names, not ARNs. They cannot include
    spaces and must contain only alphanumeric characters and/or `+=.@_-`.
