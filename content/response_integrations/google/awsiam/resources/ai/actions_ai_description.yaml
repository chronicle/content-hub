Create a Group:
  ai_description: >-
    ### General Description

    Creates one or more new IAM groups in an AWS account. This action initiates a
    state change on the external AWS IAM service to provision new group resources
    based on the provided names.


    ### Flow Description

    1. Connects to the AWS IAM service using the provided integration credentials.

    2. Parses the comma-separated list of group names provided in the `Group Name`
    parameter.

    3. Validates each group name to ensure it contains only allowed characters (alphanumeric
    and `+=.@_-`).

    4. Calls the AWS IAM API (`create_group`) to create each valid group.

    5. Collects the results and returns a JSON object containing the details of the
    successfully created groups.


    ### Additional Notes

    Group names must be unique within the AWS account and cannot include spaces. If
    a group name already exists or contains invalid characters, the action will log
    the error and continue processing the remaining group names.
