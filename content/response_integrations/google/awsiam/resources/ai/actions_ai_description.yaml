    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified user(s) to an AWS IAM group, modifying the group's membership
      configuration in AWS.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a state-changing operation on an external system (AWS IAM)
