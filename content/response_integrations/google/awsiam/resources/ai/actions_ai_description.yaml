Remove a User from a Group:
  ai_description: >-
    ### General Description

    Removes one or more users from a specified AWS IAM group. This action interacts
    with the AWS IAM service to update user group memberships, effectively revoking
    the permissions associated with that group for the specified users.


    ### Flow Description

    1. The action extracts the AWS credentials (Access Key, Secret Key) and configuration
    settings (SSL verification) from the integration configuration.

    2. It extracts the `Group Name` and `User Name` parameters from the action input.

    3. The action initializes the `AWSIAMManager` and performs a connectivity test
    to the AWS IAM service.

    4. The `User Name` parameter is parsed into a list of individual usernames.

    5. The action iterates through the list of users and calls the `remove_user_from_group`
    API method for each user.

    6. It handles potential errors such as `AWSIAMEntityNotFoundException` (if the
    user or group does not exist) or `AWSIAMLimitExceededException`.

    7. Finally, the action logs the outcome for each user and terminates with a status
    message indicating which users were successfully removed and which failed.


    ### Additional Notes

    The `User Name` parameter supports comma-separated values to allow for bulk removal
    of users from the specified group in a single execution.
