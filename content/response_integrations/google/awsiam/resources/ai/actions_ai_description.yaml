Create a Group:
  ai_description: >-
    ### General Description

    Creates one or more new IAM groups in an AWS account. This action allows administrators
    to provision new groups by specifying a comma-separated list of names, ensuring
    that each group name adheres to AWS naming conventions (alphanumeric characters
    and specific symbols: +=.@_-).


    ### Flow Description

    1. **Initialization**: The action initializes the `AWSIAMManager` using the provided
    AWS Access Key ID and Secret Key, and verifies connectivity to the AWS IAM service.

    2. **Input Parsing**: The `Group Name` parameter is parsed from a comma-separated
    string into a list of individual group names.

    3. **Validation and Creation**: The action iterates through the list of group
    names:
        * Validates each name against allowed character sets.
        * Calls the AWS IAM API `create_group` method to create the group.
    4. **Error Handling**: The action catches and logs specific exceptions, including
    `AWSIAMEntityAlreadyExistsException` (if the group exists), `AWSIAMValidationException`
    (if the name is invalid), and `AWSIAMLimitExceededException` (if account limits
    are reached).

    5. **Result Reporting**: Successfully created groups are added to the result set,
    and an output message summarizing the success or failure of each group creation
    is generated and returned via `siemplify.result.add_result_json`.


    ### Additional Notes

    Group names must be unique within the AWS account. The action does not support
    spaces in group names. If multiple groups are provided, the action processes them
    individually and reports the status of each.
