Add a User to a Group:
  ai_description: >-
    ### General Description

    Adds specified users to a designated AWS IAM group. This action modifies the group
    membership of the users in AWS, effectively applying the group's permission policies
    to them.


    ### Flow Description

    1. Extracts the AWS credentials and action parameters (`Group Name`, `User Name`).

    2. Parses the provided `User Name` string into a list of individual usernames.

    3. Initializes the AWS IAM client and tests connectivity.

    4. Iterates through the list of usernames, making an API call (`add_user_to_group`)
    to AWS IAM for each user to add them to the specified group.

    5. Collects successful additions and specific errors (e.g., entity not found,
    limit exceeded) to construct a final execution summary.


    ### Additional Notes

    The `User Name` parameter accepts a comma-separated list of users, allowing the
    action to process multiple users in a single execution.
  ai_short_description: >-
    Adds one or more specified users to a designated AWS IAM group to manage their
    permissions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
