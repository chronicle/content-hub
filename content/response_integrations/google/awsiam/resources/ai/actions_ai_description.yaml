Add a User to a Group:
  ai_description: >-
    ### General Description

    Adds one or more users to a specified AWS IAM group. This action allows administrators
    to manage user permissions by updating group memberships directly within AWS IAM.


    ### Flow Description

    1. Extracts AWS credentials (Access Key ID, Secret Key) and action parameters
    (Group Name, User Name) from the integration configuration and action settings.

    2. Initializes the AWS IAM manager and performs a connectivity test to ensure
    the provided credentials are valid.

    3. Parses the provided `User Name` parameter, which is expected to be a comma-separated
    list of usernames.

    4. Iterates through each user name in the list and calls the AWS IAM API (`add_user_to_group`)
    to add the user to the specified group.

    5. Handles potential errors, such as `AWSIAMEntityNotFoundException` (if the user
    or group does not exist) or `AWSIAMLimitExceededException` (if AWS account limits
    are reached), and reports the status of each operation.


    ### Additional Notes

    - User names must be provided as a comma-separated string.

    - Group names cannot contain spaces and must adhere to AWS IAM naming conventions
    (alphanumeric characters and/or +=.@_-).
  ai_short_description: >-
    Adds specified users to an AWS IAM group.
  capabilities:
    can_create_case_comments: false
