Disable User Access:
  ai_description: >-
    ### General Description

    Disables user access in AWS Identity and Access Management (IAM) by attaching
    an explicit deny inline policy to the specified users.


    ### Flow Description

    1. Iterates over the provided SOAR User entities.

    2. Extracts the AWS IAM username from the entity's original identifier (which
    is expected to be an ARN).

    3. Makes an API call to AWS IAM (`put_user_policy`) to attach an inline policy
    named "DisableUserAccessPolicy" containing an explicit deny for all actions and
    resources (`"Effect": "Deny", "Action": "*", "Resource": "*"`).

    4. Collects the success or failure status for each processed user.

    5. Returns a summary message and JSON results detailing the outcome for each entity.


    ### Additional Notes

    This action specifically targets SOAR User entities. The original identifier of
    the entity must be a valid AWS ARN from which the username can be extracted.
