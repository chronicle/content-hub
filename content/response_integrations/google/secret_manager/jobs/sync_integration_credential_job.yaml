name: Sync Integration Credential Job
parameters:
-   name: Service Account JSON
    type: password
    description: The Service Account JSON key to authenticate with the Secret Manager.
    is_mandatory: false
-   name: Project ID
    type: string
    description: The Google Cloud Project ID where the secrets are stored. If not provided, it will be inferred from the Service Account JSON if possible, but recommended to specify.
    is_mandatory: false
-   name: Workload Identity Email
    type: string
    description: The service account email to impersonate when authenticating via Workload Identity (Application Default Credentials). Use this instead of Service Account JSON when the SOAR platform runs within Google Cloud with Workload Identity enabled.
    is_mandatory: false
-   name: Verify SSL
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to Secret Manager is valid.
    is_mandatory: true
    default_value: true
-   name: Environment Name
    type: string
    description: The name of the environment in which to search for credentials. For Shared Environments, provide "*"".
    is_mandatory: true
    default_value: "Default Environment"
-   name: Credential Mapping
    type: string
    description: >
        JSON/YAML mapping string that maps SOAR integration instances, connectors,
        and jobs to their Secret Manager resource paths.
        Values must be full resource names:
        'projects/<project_id>/secrets/<secret_name>/versions/<version_id>' for an explicit version,
        or 'projects/<project_id>/secrets/<secret_name>' to automatically resolve the latest enabled version.
        Each secret in Secret Manager is expected to be a JSON object mapping parameter names to credential values.
    is_mandatory: true
    default_value: '{"integration_instances": {"Integration_Instance_Name": {"Parameter_Name": "Secret Manager entry"}}}'
description: >
    Use the Secret Manager - Sync Integration Credentials Job to synchronize Secret Manager entries and automatically update integration, connector, and job configurations.
integration: SecretManager
creator: admin
