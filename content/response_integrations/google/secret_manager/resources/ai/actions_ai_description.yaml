Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Cloud Secret Manager API.


    ### Flow Description

    1. Initializes the Secret Manager client using the provided integration credentials.

    2. Makes a GET request to the Secret Manager API (`projects/{project_id}/secrets`)
    to list secrets with a page size of 1.

    3. Evaluates the response to determine if the connection was successful.

    4. Returns a boolean value indicating the connectivity status.


    ### Additional Notes

    This action does not run on Google SecOps entities and is used solely for verifying
    integration configuration.
  ai_short_description: >-
    Tests connectivity to the Google Cloud Secret Manager API.
