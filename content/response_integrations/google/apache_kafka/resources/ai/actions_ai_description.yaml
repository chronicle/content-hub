Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and an Apache Kafka cluster. It validates the integration's configuration,
    including broker addresses, authentication credentials (SASL), and encryption
    settings (SSL/TLS), by attempting a basic metadata request to the Kafka server.


    ### Parameters

    This action does not require any input parameters. It relies entirely on the global
    integration configuration settings.


    ### Flow Description

    1. **Configuration Loading**: The action retrieves the integration's connection
    parameters, such as the bootstrap servers and security protocols.

    2. **Security Setup**: If SSL or SASL_SSL is configured, the action decodes the
    base64-encoded certificates and writes them to temporary files to facilitate the
    connection.

    3. **Client Initialization**: It initializes a Kafka Admin Client using the `confluent-kafka`
    library, applying the determined security protocol (Plaintext, SSL, SASL_PLAINTEXT,
    or SASL_SSL).

    4. **Connectivity Verification**: The action calls the `list_topics` method on
    the Admin Client. This triggers a request to the Kafka brokers to retrieve cluster
    metadata.

    5. **Cleanup**: The action ensures all temporary certificate files are deleted
    from the system after the check is complete, regardless of whether the connection
    succeeded or failed.
