name: Apache Kafka - Messages Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: The name of the field that stores the product name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: The name of the field that determines the event name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: 'The name of the field that stores the environment name.

        If the field is not found, the system uses the default environment. '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: 'A regular expression pattern that runs on the value from the Environment
        Field Name field to manipulate the result.

        The default value, .*, retrieves the raw field value.

        If the regular expression pattern is empty or the environment value is null,
        the system uses the default environment.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: The timeout, in seconds, for the Python process running the script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Kafka Brokers
    default_value: ''
    type: string
    description: A comma-separated list of Kafka brokers to connect to, in the format
        `hostname:port`.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use TLS for connection
    default_value: false
    type: boolean
    description: If enabled, the integration uses TLS encryption for authentication.
        A CA certificate is mandatory for this connection.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use SASL PLAIN with TLS for connection
    default_value: false
    type: boolean
    description: If enabled, the integration uses the SASL PLAIN username and password
        mechanism for authentication. This option requires a SASL Username and Password
        to be provided. It is only supported with TLS encryption, which requires a
        CA certificate.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: CA certificate of Kafka server
    default_value: ''
    type: password
    description: The Certificate Authority (CA) certificate used to verify the identity
        of the Kafka server.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client certificate
    default_value: ''
    type: password
    description: The client's certificate for mutual TLS authentication with the Kafka
        server.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client certificate key
    default_value: ''
    type: password
    description: The private key that corresponds to the client's certificate, used
        for mutual TLS authentication.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client certificate key password
    default_value: ''
    type: password
    description: The password used to decrypt the client certificate's private key.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: SASL PLAIN Username
    default_value: ''
    type: string
    description: The username for SASL PLAIN authentication with Kafka brokers.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: SASL PLAIN Password
    default_value: ''
    type: password
    description: The password for SASL PLAIN authentication with Kafka brokers.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Topic
    default_value: ''
    type: string
    description: The Kafka topic from which incidents are retrieved.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Consumer group ID
    default_value: ''
    type: string
    description: The identifier of the consumer group used when retrieving incidents.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Partitions
    default_value: ''
    type: string
    description: A CSV list of partitions from which to fetch messages.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Initial Offset
    default_value: ''
    type: string
    description: "The initial offset specifies where the connector starts fetching\
        \ messages.\nA positive integer fetches from that offset number.\n To start\
        \ from the beginning or end of the partition, use the values 'earliest' or\
        \ 'latest'."
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Messages To Fetch
    default_value: 100
    type: integer
    description: The maximum number of messages the connector processes per iteration.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Poll Timeout
    default_value: 5
    type: integer
    description: Poll timeout to consume a message from Kafka, in seconds.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Case Name Template
    default_value: ''
    type: string
    description: 'A custom case name.

        You can use placeholders in the format [field_name], for example: Phishing
        - [event_mailbox].

        This parameter adds a custom_case_name key to the Google SecOps event.

        The connector extracts placeholder values from the first Google SecOps event,
        and placeholders are only supported for fields that contain a string value.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Name Template
    default_value: ''
    type: string
    description: 'A custom alert name.

        You can use placeholders in the format [field_name], for example: Phishing
        - [event_mailbox].

        The connector extracts placeholder values from the first Google SecOps event,
        and placeholders are only supported for fields that contain a string value.

        If you do not provide a value or use an invalid template, the connector uses
        the fallback value "{Connector name} - Alert".'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Rule Generator Template
    default_value: ''
    type: string
    description: 'A custom rule generator.

        You can use placeholders in the format [field_name], for example: Phishing
        - [event_mailbox].

        The connector extracts placeholder values from the first Google SecOps event,
        and placeholders are only supported for fields that contain a string value.

        If you do not provide a value or use an invalid template, the connector uses
        the fallback value "{Connector name} - Rule Generator".'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Timestamp Field
    default_value: timestamp
    type: string
    description: 'The name of the field that contains the Google SecOps alert timestamp.

        If the timestamp is not in Unix epoch format, its format must be defined in
        the Timestamp Format parameter.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Timestamp Format
    default_value: '%Y-%m-%dT%H:%M:%S.%fZ'
    type: string
    description: 'The format of the message timestamp.

        The connector requires this format to process messages correctly.

        If the timestamp is not in Unix epoch format and a timestamp format is not
        configured, the connector will fail.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Severity Mapping JSON
    default_value: '{"Default": 60}'
    type: string
    description: The JSON object used by the connector to extract the severity level
        from the message.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Unique ID Field
    default_value: ''
    type: string
    description: The name of the field that provides a unique message identifier.
        If a value is not set, the connector generates and uses a SHA-256 hash as
        the message identifier.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Disable Overflow
    default_value: true
    type: boolean
    description: If enabled, the connector ignores the Google SecOps overflow mechanism
        when creating alerts.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, the integration validates the SSL certificate for the
        Apache Kafka connection.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The username for proxy authentication.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The password for proxy authentication.
    is_mandatory: false
    is_advanced: true
    mode: script
description: The Apache Kafka Connector retrieves messages from Apache Kafka.
integration: ApacheKafka
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/apache-kafka#apache-kafka-connector
rules: []
is_connector_rules_supported: false
creator: admin
