  ai_description: >-
    Tests connectivity to the FireEye AX server using the parameters provided in the
    integration configuration.


    ### General Description

    This action verifies that the Google SecOps platform can successfully authenticate
    and communicate with the FireEye AX API. It uses the provided API Root, Username,
    and Password to establish a connection and perform a basic API request to ensure
    the integration is configured correctly.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies entirely
    on the integration configuration parameters (API Root, Username, Password, Verify
    SSL).


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEyeAXManager with the provided credentials and obtains
    an authentication token.

    3. Attempts to send a test request to the FireEye AX API to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.
