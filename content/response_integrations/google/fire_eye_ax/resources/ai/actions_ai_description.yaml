    1. Filters target entities for URL type.

    2. Submits the URL to FireEye AX via a POST request using the provided VM profile,
    priority, and analysis type.

    3. Polls the FireEye AX API for the submission status.

    4. Once the analysis is complete, retrieves the detailed report.

    5. Updates the entity with enrichment data and optionally creates a case insight
    with the analysis results.


