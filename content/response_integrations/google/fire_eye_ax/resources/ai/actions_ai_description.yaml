Get Appliance Details:
  ai_description: >-
    ### General Description

    Retrieves configuration and status details from the FireEye AX appliance. This
    action provides visibility into the appliance's current state and configuration
    settings.


    ### Flow Description

    1. The action initializes the `FireEyeAXManager` using the integration configuration
    parameters (API Root, Username, Password, Verify SSL).

    2. It performs a `GET` request to the FireEye AX API endpoint (`wsapis/v2.0.0/config`)
    to retrieve the appliance's configuration and status information.

    3. The retrieved data is added to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is read-only and does not modify any data on the FireEye AX appliance
    or within the Google SecOps platform.
  ai_short_description: >-
    Retrieves configuration and status details from the FireEye AX appliance.
