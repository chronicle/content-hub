  ai_description: >-
    ### General Description

    Submits URL entities for analysis in FireEye AX. The action creates an analysis
    job in the sandbox and retrieves the behavior report and threat score. It operates
    asynchronously to wait for the analysis to complete.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | VM Profile | String | Yes | Specify the virtual machine profile that should
    be used during analysis. |

    | Application ID | String | No | Specify the ID of the application that needs
    to be used during the analysis of the file. |

    | Priority | Dropdown | No | Specify the priority for the submission (Normal,
    Urgent). |

    | Force Rescan | Boolean | No | If enabled, action will force FireEye AX to rescan
    the submitted file. |

    | Analysis Type | Dropdown | No | Specify the type of the analysis (Live or Sandbox).
    |

    | Create Insight | Boolean | Yes | If enabled, action will create an insight containing
    information about the submitted file. |


    ### Additional Notes

    The action runs asynchronously. Ensure that the script timeout value in the IDE
    is adjusted appropriately to allow sufficient time for the analysis to complete.


    ### Flow Description

    1. Iterates over supported URL entities.

    2. Submits each URL to FireEye AX for analysis.

    3. Periodically checks the status of the submission (asynchronous execution).

    4. Once completed, retrieves the analysis results.

    5. Enriches the entities, adds data tables, and optionally creates insights based
    on the results.
