Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye AX server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEye AX manager and obtains an authentication token.

    3. Makes an API call (GET request) to the `wsapis/v2.0.0/config` endpoint to verify
    connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
