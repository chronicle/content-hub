  ai_description: >-
    ### General Description

    Retrieves configuration and details about the FireEye AX appliance. This action
    connects to the FireEye AX instance and fetches its current configuration and
    status details, returning them as a JSON object.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters (API Root, Username, Password, Verify
    SSL) to authenticate and connect to the appliance.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEye AX manager to handle API communication.

    3. Sends a GET request to the FireEye AX API (`wsapis/v2.0.0/config`) to retrieve
    appliance details.

    4. Attaches the retrieved details as a JSON result to the action's output.

    5. Completes the action execution.
