Submit File:
  ai_description: >-
    ### General Description

    Submits one or more files to FireEye AX for malware analysis and retrieves the
    analysis results.


    ### Flow Description

    1. Parses the provided comma-separated list of file paths from the action parameters.

    2. Initiates an asynchronous file submission to FireEye AX via a POST request
    for each file path.

    3. Periodically polls the FireEye AX API to check the status of the analysis using
    the returned submission IDs.

    4. Retrieves the analysis results once the processing is complete.

    5. Optionally creates a case insight with the analysis details for each successfully
    processed file.

    6. Appends the raw analysis results to the action's JSON output.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed to accommodate the analysis duration.
  ai_short_description: >-
    Submits files to FireEye AX for malware analysis and retrieves the analysis results
    asynchronously.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the FireEye AX sandbox for malware analysis.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to upload a file to FireEye AX (mutates external
      data) and subsequently fetches the analysis results. It does not update entities,
      but it can create case insights based on the analysis results.
  entity_usage:
    entity_types:
      address: false
      alert: false
