      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. It
      relies entirely on the 'File Paths' action parameter to determine which files
      to submit. Therefore, it does not run on entities.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action uploads a file to FireEye AX (a sandbox/analysis engine) and retrieves
      the analysis results. This directly aligns with the 'Submit File' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: true
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Paths | String | Yes | Specify a comma-separate list of absolute file paths
    for submission. |

    | VM Profile | String | Yes | Specify the virtual machine profile that should
    be used during analysis. Available VM profiles are available in the action "Get
    Appliance Details" |

    | Application ID | String | No | Specify the ID of the application that needs
    to be used during the analysis of the file. By default, FireEye AX will select
    the needed application automatically. In order to get a list of available applications
    on the profile, please execute action "Get Appliance Details" |

    | Priority | DDL | No | Specify the priority for the submission. "Normal" puts
    submission at the bottom of the queue, while "Urgent" puts submission at the top
    of the queue. |

    | Force Rescan | Boolean | No | If enabled, action will force FireEye AX to rescan
    the submitted file. |

    | Analysis Type | DDL | No | Specify the type of the analysis. If "Live" is selected,
    FireEye AX will analyze suspected files live within the Malware Analysis Multi-Vector
    Virtual Execution (MVX) analysis engine. If "Sandbox" is selected FireEye AX will
    analyze suspected files in a closed, protected environment. |

    | Create Insight | Boolean | Yes | If enabled, action will create an insight containing
    information about the submitted file. |
Submit URL:
  ai_description: >-
    ### General Description

    Submits a URL for analysis in FireEye AX. The action initiates an asynchronous
    analysis job on the FireEye AX appliance, retrieves the analysis results once
    completed, and enriches the URL entity with the findings.


    ### Flow Description

    1. Iterates over the provided URL entities.

    2. Submits each URL to FireEye AX for analysis using the specified VM profile,
    priority, and analysis type.

    3. Periodically checks the status of the submission jobs asynchronously.

    4. Once a submission is complete, retrieves the detailed analysis results.

    5. Enriches the URL entity with the analysis data, adds a table with the results,
    and optionally creates an insight.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed.
