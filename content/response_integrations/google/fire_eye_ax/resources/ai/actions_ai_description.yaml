Get Appliance Details:
  ai_description: >-
    ### General Description

    Retrieves configuration and status details about the FireEye AX appliance.


    ### Flow Description

    1. Initializes the connection to the FireEye AX appliance using the provided integration
    credentials.

    2. Makes an HTTP GET request to the `/wsapis/v2.0.0/config` endpoint to fetch
    the appliance details.

    3. Attaches the retrieved details to the action's JSON result.


    ### Additional Notes

    This action does not operate on entities and does not require any action-specific
    parameters.
