Submit File:
  ai_description: >-
    ### General Description

    Submits one or more files to the FireEye AX malware analysis engine for sandbox
    or live analysis. This action allows users to specify virtual machine profiles,
    analysis types, and submission priorities. Upon completion, it retrieves the analysis
    results, including malicious status, severity, and extracted artifacts, and optionally
    creates a case insight for the analyst.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials) and action parameters
    (File Paths, VM Profile, Application ID, Priority, Force Rescan, Analysis Type,
    Create Insight).

    2. Initializes the `FireEyeAXManager` to interact with the FireEye AX API.

    3. Iterates through the provided `File Paths` and submits each file to the FireEye
    AX engine using the `submit_file` API endpoint.

    4. If the submission is successful, it retrieves the submission ID.

    5. Polls the `get_submission_details` API endpoint to retrieve the analysis results
    for the submitted files.

    6. If `Create Insight` is enabled, it generates a case insight containing the
    analysis summary (malicious status, severity, etc.).

    7. Adds the detailed JSON results to the action output.


    ### Additional Notes

    This action is asynchronous. It handles timeouts by checking the remaining execution
    time and polling for results. If the action times out, it will report the files
    that are still processing. Please ensure the action timeout in the Siemplify IDE
    is adjusted appropriately for the expected analysis time.
  ai_short_description: >-
    Submits a file to the FireEye AX malware analysis engine for sandbox or live analysis
    and retrieves the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
