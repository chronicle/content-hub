  ai_description: >-
    ### General Description

    Submits one or more files for analysis in FireEye AX. This action operates asynchronously,
    uploading the specified files to the FireEye AX sandbox and periodically checking
    for the analysis results. Once the analysis is complete, it retrieves the behavior
    report and optionally creates case insights with the findings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Paths | string | True | Specify a comma-separated list of absolute file
    paths for submission. |

    | VM Profile | string | True | Specify the virtual machine profile that should
    be used during analysis. Available VM profiles can be found using the "Get Appliance
    Details" action. |

    | Application ID | string | False | Specify the ID of the application that needs
    to be used during the analysis of the file. By default, FireEye AX will select
    the needed application automatically. |

    | Priority | string | False | Specify the priority for the submission. "Normal"
    puts submission at the bottom of the queue, while "Urgent" puts submission at
    the top of the queue. |

    | Force Rescan | boolean | False | If enabled, action will force FireEye AX to
    rescan the submitted file. |

    | Analysis Type | string | False | Specify the type of the analysis. "Live" analyzes
    suspected files live within the MVX engine, while "Sandbox" analyzes them in a
    closed, protected environment. |

    | Create Insight | boolean | True | If enabled, action will create an insight
    containing information about the submitted file. |


    ### Flow Description

    1. Extracts the provided file paths and configuration parameters.

    2. Submits each file to FireEye AX for analysis using the specified VM profile
    and analysis type.

    3. Operates asynchronously, periodically checking the status of the submissions.

    4. Retrieves the analysis results once the submissions are complete.

    5. Optionally creates case insights with the analysis results and attaches the
    JSON results to the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads files to FireEye AX, creating new submission records for analysis.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights with the analysis results.
    reasoning: >-
      The action uploads files to FireEye AX, which creates a new submission record
      in the external system (mutates external data). It then fetches the submission
      details and results (fetches data). Internally, it can create case insights
      based on the analysis results (mutates internal data). It does not update entities,
      modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by uploading files to FireEye AX, so it cannot
      be classified as an Enrichment action. It does not perform any containment,
      blocking, or identity-based mitigation, so it is not a Remediation action.
    remediation: false
  entity_usage:
