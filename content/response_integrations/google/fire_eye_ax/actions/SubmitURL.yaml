name: Submit URL
description: 'Submit file for analysis using URL in FireEye AX. Supported entities:
    URL. Note: Action is running as async, please adjust script timeout value in Siemplify
    IDE for action as needed.'
integration_identifier: FireEyeAX
parameters:
-   name: VM Profile
    default_value: ''
    type: string
    description: Specify the virtual machine profile that should be used during analysis.
        Available VM profiles are available in the action "Get Appliance Details"
    is_mandatory: true
-   name: Application ID
    default_value: ''
    type: string
    description: Specify the ID of the application that needs to be used during the
        analysis of the file. By default, FireEye AX will select the needed application
        automatically. In order to get a list of available applications on the profile,
        please execute action "Get Appliance Details"
    is_mandatory: false
-   name: Priority
    default_value: Normal
    type: ddl
    optional_values:
    - Normal
    - Urgent
    description: Specify the priority for the submission. "Normal" puts submission
        at the bottom of the queue, while "Urgent" puts submission at the top of the
        queue.
    is_mandatory: false
-   name: Force Rescan
    default_value: false
    type: boolean
    description: If enabled, action will force FireEye AX to rescan the submitted
        file.
    is_mandatory: false
-   name: Analysis Type
    default_value: Live
    type: ddl
    optional_values:
    - Live
    - Sandbox
    description: Specify the type of the analysis. If "Live" is selected, FireEye
        AX will analyze suspected files live within the Malware Analysis Multi-Vector
        Virtual Execution (MVX) analysis engine. If "Sandbox" is selected FireEye
        AX will analyze suspected files in a closed, protected environment.
    is_mandatory: false
-   name: Create Insight
    default_value: false
    type: boolean
    description: If enabled, action will create an insight containing information
        about the submitted file.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/submit_url_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["DestinationURL"]}'
