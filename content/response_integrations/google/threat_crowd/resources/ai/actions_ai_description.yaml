EnrichEntities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using ThreatCrowd to quickly identify
    related infrastructure and malware. The action retrieves threat intelligence reports
    and updates the entities with the findings, including marking them as suspicious
    if community votes indicate malicious activity.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `ADDRESS` (IP) and `HOSTNAME`
    (Domain).

    3. Makes a GET request to the ThreatCrowd API to retrieve a threat report for
    each valid entity.

    4. If a report is successfully retrieved, enriches the entity by attaching a data
    table, a web link to the full report, and updating the entity's additional properties
    with the flattened report data.

    5. Evaluates the `votes` field from the ThreatCrowd report; if the vote is malicious
    (-1), the entity's `is_suspicious` flag is set to true.

    6. Marks the entity as enriched and updates the entities within the Google SecOps
    platform.

    7. Returns the raw report data as a JSON result.


    ### Additional Notes

    This action relies on ThreatCrowd's community voting system to determine the maliciousness
    of an indicator. Ensure that the integration is properly configured to reach the
    ThreatCrowd API.
  ai_short_description: >-
    Enriches IP Address and Hostname entities using ThreatCrowd to identify related
    infrastructure and malware, updating entity properties and suspicious status based
    on the retrieved threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the ThreatCrowd API to fetch report data (fetches_data=true).
      It does not perform any state-changing operations on external systems (can_mutate_external_data=false)
      or internal systems outside of entities (can_mutate_internal_data=false). It
      updates the entities with the retrieved data using `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The script iterates over `siemplify.target_entities` and explicitly filters
      them using `if entity.entity_type == EntityTypes.ADDRESS` and `if entity.entity_type
      == EntityTypes.HOSTNAME`. It does not filter by any other entity attributes.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
