Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ThreatCrowd API to ensure the integration is configured
    correctly and can communicate with the service.


    ### Flow Description

    1. Retrieves the integration configuration (e.g., SSL verification settings).

    2. Initializes the ThreatCrowd manager.

    3. Makes a test API call (GET request) to the ThreatCrowd API using a dummy IP
    address (8.8.8.8) to verify connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if it is not.


    ### Additional Notes

    This action is typically used for diagnostic purposes to verify that the SOAR
    platform can successfully reach the ThreatCrowd service.
  ai_short_description: >-
    Tests connectivity to the ThreatCrowd API to ensure the integration is configured
