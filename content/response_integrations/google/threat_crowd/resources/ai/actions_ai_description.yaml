EnrichEntities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using the ThreatCrowd intelligence service.
    This action retrieves threat reports, including reputation and malicious vote
    counts, to provide context for security investigations.


    ### Flow Description

    1. The action iterates through the provided `target_entities`.

    2. For each entity, it checks if the type is `ADDRESS` or `HOSTNAME`.

    3. It queries the ThreatCrowd API via `ThreatCrowdManager.get_report` to retrieve
    threat intelligence data.

    4. If data is returned, it adds an entity table and a permalink to the entity
    in the SOAR platform.

    5. It updates the entity's `additional_properties` with the retrieved report data.

    6. If the report indicates malicious activity (based on `MALICIOUS_VOTE`), it
    marks the entity as suspicious.

    7. It marks the entity as enriched and updates the entity in the SOAR platform.

    8. Finally, it adds the aggregated JSON results to the action output.


    ### Additional Notes

    This action requires a configured ThreatCrowd integration. It specifically filters
    for `ADDRESS` and `HOSTNAME` entity types. If no data is found for an entity,
    it is skipped.
  ai_short_description: >-
    Enriches IP Address and Hostname entities with threat intelligence data from ThreatCrowd.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (additional_properties, is_suspicious, is_enriched)
      within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (ThreatCrowd). It updates internal
      entity properties (additional_properties, is_suspicious, is_enriched) and saves
      these changes using siemplify.update_entities. It does not mutate external systems.
  entity_usage:
