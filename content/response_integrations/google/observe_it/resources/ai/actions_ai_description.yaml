Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ObserveIT server using the provided API credentials.
    This action validates that the integration is correctly configured and can successfully
    communicate with the external ObserveIT service.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Client
    ID, Client Secret, and Verify SSL) from the integration settings.

    2. It initializes the `ObserveITManager` using the provided credentials.

    3. The action calls the `test_connectivity` method, which performs a `GET` request
    to the ObserveIT health endpoint (`/v2/apis/report;realm=observeit/_health`).

    4. If the server returns a successful response (status 200), the action completes
    with a success message. If the connection fails or an error occurs, the action
    reports a failure.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the integration
    setup. It does not perform any data enrichment or state-changing operations.
  ai_short_description: >-
    Tests connectivity to the ObserveIT server.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
