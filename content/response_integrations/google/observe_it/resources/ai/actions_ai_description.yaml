  ai_description: >-
    ### General Description

    Tests connectivity to the ObserveIT server using the provided integration configuration
    parameters. This action ensures that the Google SecOps platform can successfully
    authenticate and communicate with the ObserveIT API.


    ### Flow Description

    1. Extracts the API Root, Client ID, Client Secret, and Verify SSL parameters
    from the integration configuration.

    2. Initializes the ObserveIT API client with the extracted credentials.

    3. Makes a GET request to the ObserveIT health endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if the connection fails.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration configuration parameters provided during the setup of the ObserveIT
    integration.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    ObserveIT integration to verify that the connection parameters are correct and
    the server is reachable.
