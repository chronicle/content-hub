ObserveIT - Alerts Connector:
  ai_description: >-
    ### General Description

    This connector fetches alerts from the ObserveIT platform and creates cases in
    Google SecOps. It authenticates via OAuth2, retrieves alerts based on specified
    severity levels, and applies filtering logic (whitelist/blacklist) to ensure only
    relevant incidents are processed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Enter the source field name in order to
    retrieve the Product Field name. |

    | EventClassId | String | Yes | Enter the source field name in order to retrieve
    the Event Field name. |

    | Environment Field Name | String | No | Describes the name of the field where
    the environment name is stored. |

    | Environment Regex Pattern | String | No | A regex pattern to run on the value
    found in the "Environment Field Name" field. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process
    running the current script. |

    | API Root | String | Yes | API root of ObserveIT server. |

    | Client ID | String | Yes | Client ID of the ObserveIT app. |

    | Client Secret | String | Yes | Client Secret of the ObserveIT app. |

    | Lowest Severity To Fetch | String | Yes | Lowest severity that will be used
    to fetch Alerts (Low, Medium, High, Critical). |

    | Fetch Max Hours Backwards | Integer | No | Number of hours before the first
    connector iteration to retrieve alerts from. |

    | Max Alerts To Fetch | Integer | No | How many alerts to process per one connector
    iteration. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, whitelist will be
    used as a blacklist. |

    | Use SSL | Boolean | Yes | Option to enable SSL/TLS connection. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username to authenticate with. |

    | Proxy Password | String | No | The proxy password to authenticate with. |


    ### Flow Description

    1. Connects to the ObserveIT API using OAuth2 credentials.

    2. Determines the time range for fetching alerts based on the last run timestamp
    or the `Fetch Max Hours Backwards` parameter.

    3. Queries the ObserveIT API for alerts with a severity level meeting or exceeding
    the configured threshold.

    4. Filters out previously processed alerts using a local tracking file.

    5. Applies whitelist or blacklist filtering based on the `Use whitelist as a blacklist`
    configuration.

    6. Maps the remaining alerts to the Google SecOps case format, including environment
    mapping.

    7. Ingests the alerts into the SOAR platform and updates the last run timestamp.
