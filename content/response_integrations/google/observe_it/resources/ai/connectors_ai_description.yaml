ObserveIT - Alerts Connector:
  ai_description: >-
    ### General Description

    The ObserveIT - Alerts Connector enables the integration of the ObserveIT platform
    with Google SecOps. It automates the retrieval of security alerts from ObserveIT,
    allowing security teams to centralize incident management and response within
    the SOAR platform. The connector supports OAuth2 authentication, severity-based
    filtering, and custom whitelist/blacklist rules to ensure only relevant alerts
    are ingested.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name for the Product Field.
    |

    | EventClassId | String | Yes | Source field name for the Event Field. |

    | Environment Field Name | String | No | Field name where the environment is stored.
    |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the script execution.
    |

    | API Root | String | Yes | API root URL of the ObserveIT server. |

    | Client ID | String | Yes | Client ID for OAuth2 authentication. |

    | Client Secret | String | Yes | Client Secret for OAuth2 authentication. |

    | Lowest Severity To Fetch | String | Yes | Minimum severity level to fetch (Low,
    Medium, High, Critical). |

    | Fetch Max Hours Backwards | Integer | No | Hours to look back during the initial
    run. |

    | Max Alerts To Fetch | Integer | No | Maximum number of alerts to process per
    iteration. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, treats the whitelist
    as a blacklist. |

    | Use SSL | Boolean | Yes | Enables SSL/TLS for the connection. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | String | No | Password for proxy authentication. |


    ### Flow Description

    1. **Initialization**: The connector initializes with the provided configuration,
    validating parameters and setting up the environment.

    2. **Authentication**: It authenticates with the ObserveIT API using the provided
    Client ID and Client Secret to obtain an OAuth2 access token.

    3. **Data Retrieval**: The connector queries the ObserveIT API for alerts, applying
    filters for the configured minimum severity, time range, and maximum alert limit.

    4. **Filtering**: It filters out already processed alerts using a local state
    file and applies user-defined whitelist or blacklist rules based on the alert
    name.

    5. **Mapping**: Valid alerts are mapped into the standard Google SecOps `AlertInfo`
    format, incorporating event details and environment information.

    6. **Overflow Check**: The connector performs an overflow check to prevent duplicate
    or excessive alert creation.

    7. **Finalization**: It saves the latest timestamp and updated list of processed
    alert IDs to the local filesystem for future runs and returns the ingested alerts
    to the SOAR platform.
