product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The ObserveIT integration provides a connector that fetches security alerts from
    the ObserveIT platform, which monitors user activity on endpoints. The integration
    does not perform EDR actions (such as retrieving process trees or isolating hosts),
    IAM management (such as suspending accounts or resetting passwords), or other
    specific category functions. Because the connector's primary purpose is to ingest
    security alerts related to user activity into the SOAR platform, it aligns with
    the SIEM category, which is used to ingest and monitor activity related to users
    and assets to provide visibility.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
