product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The ObserveIT integration is primarily designed to ingest security alerts related
    to insider threats and user activity. By centralizing these alerts, it enables
    security teams to monitor and investigate user-related risks, which aligns with
    the SIEM category's purpose of finding activity related to users. It does not
    provide EDR capabilities (such as host containment or deep process analysis),
    nor does it perform functions related to network security, threat intelligence,
    email security, IAM management, cloud security, ITSM, vulnerability management,
    asset inventory, or collaboration.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
