Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye ETP server to ensure that the integration is
    configured correctly and can successfully communicate with the API.


    ### Flow Description

    1. Extracts integration configuration parameters such as API Root, Client ID,
    Client Secret, and API Key.

    2. Initializes the FireEye ETP Manager and generates an access token if using
    OAuth credentials.

    3. Executes a POST request to the `/api/v2/public/alerts/search` endpoint with
    a minimal date range payload to verify API reachability and authentication validity.

    4. Returns a success message if the connection is established, or an error message
    if the request fails.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the initial setup
    of the FireEye ETP integration. It does not require any action-specific parameters
    as it relies entirely on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the FireEye ETP server to verify integration configuration
    and API access.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
