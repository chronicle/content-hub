Ping:
  ai_description: >-
    General Description: Tests connectivity to the FireEye ETP server using the provided
    configuration parameters.


    Flow Description:

    1. Extracts the 'API Root', 'API Key', and 'Verify SSL' parameters from the integration
    configuration.

    2. Initializes the `FireEyeETPManager` with the provided credentials.

    3. Executes the `test_connectivity()` method, which sends a `POST` request to
    the `/api/v1/alerts` endpoint with a payload of `{"size": 1}` to verify the connection.

    4. Validates the HTTP response to ensure the connection is successful.

    5. Returns a success or failure message based on the connectivity result.


    Additional Notes: This action does not perform any data retrieval or modification
    beyond verifying the connection.
  ai_short_description: >-
    Tests connectivity to the FireEye ETP server.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to verify connectivity. It does not fetch
      contextual data for entities, nor does it mutate external or internal data.
