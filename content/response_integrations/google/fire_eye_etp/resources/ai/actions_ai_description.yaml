  ai_description: >-
    Tests connectivity to the FireEye ETP server using the provided connection parameters.


    ### General Description

    This action verifies that the Google SecOps platform can successfully communicate
    with the FireEye ETP API. It uses the configured API Root and API Key from the
    integration configuration to authenticate and perform a basic request to ensure
    the connection is valid.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the integration
    configuration parameters (API Root, API Key, Verify SSL).


    ### Flow Description

    1. Extracts the connection parameters (API Root, API Key, Verify SSL) from the
    integration configuration.

    2. Initializes the FireEyeETPManager with the provided credentials.

    3. Attempts to connect to the FireEye ETP server by making a test API request.

    4. Returns a success message if the connection is established, or an error message
    if it fails.
