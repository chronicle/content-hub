Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Snowflake instance using the provided integration configuration
    parameters. It executes a simple query to verify access and authentication.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Account, Username,
    Private Key, Verify SSL).

    2. Initializes the SnowflakeManager and generates a JWT token for authentication.

    3. Makes a POST request to the Snowflake API (`/api/v2/statements`) to execute
    a basic query (`SHOW TABLES LIMIT 1`).

    4. Validates the response to confirm successful connectivity and returns a success
    or failure message.


    ### Additional Notes

    This action is primarily used for integration setup and health checks. It does
    not require any action-specific parameters as it relies entirely on the integration's
    configuration.
