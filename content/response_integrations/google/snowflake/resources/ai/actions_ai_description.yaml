Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes a simple parameterized `SELECT` query in Snowflake and retrieves the
    results. This action allows users to query specific tables and databases without
    writing the full SQL statement manually, returning the output as a data table
    and JSON.


    ### Flow Description

    1. Initializes the Snowflake manager using the provided integration credentials.

    2. Constructs a `SELECT` query string based on the provided action parameters
    (Database, Table, Schema, Where Filter, Fields To Return, Sort Field, and Sort
    Order).

    3. Submits the query asynchronously to the Snowflake API via a POST request to
    `/api/v2/statements?async=true`.

    4. Checks the execution status of the query via a GET request to `/api/v2/statements/{query_id}`.

    5. If the query is still processing, the action returns an in-progress state and
    waits for the next execution cycle.

    6. Once the query finishes, it retrieves the results and attaches them to the
    action's output as a data table and JSON result.


    ### Additional Notes

    This action runs asynchronously. It is designed specifically for `SELECT` queries,
    as the underlying logic automatically constructs the query starting with `SELECT`.
    Ensure the Siemplify IDE script timeout is adjusted appropriately for long-running
    queries.
  ai_short_description: >-
    Executes a parameterized `SELECT` query in Snowflake and returns the results as
    a data table and JSON.
