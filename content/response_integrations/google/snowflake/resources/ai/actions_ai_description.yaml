Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query in Snowflake to retrieve data. This action allows users
    to run specific SQL queries against a Snowflake database and schema, returning
    the results as a data table and JSON object.


    ### Flow Description

    1. Extracts the provided action parameters, including the query, database, schema,
    and the maximum number of results to return.

    2. Initializes the Snowflake API client using the provided integration credentials
    (API Root, Account, Username, Private Key).

    3. Submits the custom query to the Snowflake API for execution.

    4. Checks the execution status of the query. Since this is an asynchronous action,
    it may poll for results if the query is still in progress.

    5. Once the query execution is finished, retrieves the results and attaches them
    to the action as a JSON result and a CSV-formatted data table.


    ### Additional Notes

    - The action runs asynchronously; adjust the script timeout value in the IDE as
    needed.

    - The query should not contain the `LIMIT` keyword, as it is added automatically
    by the action based on the 'Max Results To Return' parameter.

    - Only single quotes are supported within the query string.
  ai_short_description: >-
    Executes a custom query in Snowflake and returns the results as a JSON object
    and a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by submitting a query to the Snowflake API and retrieving
      the results. It does not mutate external data, update internal entities, create
      insights, or modify alert data.
