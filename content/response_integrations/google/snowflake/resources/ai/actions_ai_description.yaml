Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a Snowflake instance using the provided configuration parameters.
    This action verifies that the integration is correctly configured and that the
    Snowflake API is reachable and responsive.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required configuration parameters:
    `API Root`, `Account`, `Username`, `Private Key`, and `Verify SSL`.

    2. **Manager Initialization**: Initializes the `SnowflakeManager` with the extracted
    credentials and settings.

    3. **Connectivity Test**: Calls the `test_connectivity` method, which sends a
    `POST` request to the Snowflake API endpoint (`/api/v2/statements`) with a `SHOW
    TABLES LIMIT 1` SQL statement.

    4. **Response Validation**: Validates the HTTP response from the Snowflake API.

    5. **Result Reporting**: Returns a success message if the connection is established,
    or an error message if the connection fails.


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration settings.
    It does not perform any data enrichment or modification of entities.
  ai_short_description: >-
    Tests connectivity to the Snowflake instance using the provided configuration
    parameters.
