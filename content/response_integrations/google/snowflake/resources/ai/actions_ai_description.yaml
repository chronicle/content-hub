Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom SQL query against a specified Snowflake database and schema.
    This action allows users to retrieve data by submitting a query and fetching the
    results asynchronously, providing flexibility for custom data analysis and log
    retrieval within the Snowflake environment.


    ### Flow Description

    1. The action initializes the `SnowflakeManager` using the provided integration
    configuration (API Root, Account, Username, Private Key, Verify SSL).

    2. It extracts the `Query`, `Database`, `Schema`, and `Max Results To Return`
    parameters.

    3. On the first run, it calls the `submit_query` API endpoint to initiate the
    query execution in Snowflake.

    4. It then checks the query progress. If the query is still running, it returns
    an "In Progress" status and stores the `query_id` for the next run.

    5. If the query is finished, it retrieves the results using the `get_data` API
    endpoint.

    6. The retrieved results are added to the action output as a CSV table and a JSON
    object.


    ### Additional Notes

    This action is asynchronous. If the query takes time to execute, the action will
    return an "In Progress" status, and the SOAR platform will trigger the action
    again to check for completion. Ensure the query does not contain a LIMIT keyword,
    as it is added automatically based on the 'Max Results To Return' parameter.
  ai_short_description: >-
    Executes a custom SQL query in Snowflake and retrieves the results asynchronously.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Snowflake via API calls (submit_query and get_data).
      It does not mutate external data (it performs a SELECT query) and does not mutate
      internal SOAR data (it only adds results to the action output).
