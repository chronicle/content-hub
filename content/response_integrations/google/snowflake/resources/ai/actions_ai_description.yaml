Execute Simple Query:
  ai_description: "### General Description\nExecutes a SQL query against a Snowflake\
    \ database to retrieve data based on user-defined parameters. This action allows\
    \ analysts to perform custom data lookups, filtering, and sorting within their\
    \ Snowflake environment directly from the SOAR platform.\n\n### Flow Description\n\
    1. **Parameter Extraction**: The action extracts configuration parameters (API\
    \ Root, Account, Username, Private Key, Verify SSL) and action parameters (Database,\
    \ Table, Schema, Where Filter, Fields, Sort, Limit).\n2. **Query Construction**:\
    \ The action builds a SQL `SELECT` query string using the provided table, filter,\
    \ and sorting parameters via the `SnowflakeManager`.\n3. **Query Submission**:\
    \ \n    - On the first run, the action submits the query to Snowflake using a\
    \ POST request (`/api/v2/statements?async=true`) and receives a `statementHandle`\
    \ (query ID).\n    - The action then enters an asynchronous polling loop (if configured)\
    \ or checks for results.\n4. **Result Retrieval**: The action polls the Snowflake\
    \ API using the query ID via a GET request (`/api/v2/statements/{query_id}`).\n\
    5. **Output Generation**: If results are found, the action adds the data to the\
    \ SOAR result table and JSON output. If no results are found, it informs the user\
    \ accordingly.\n\n### Additional Notes\nThis action is designed to be asynchronous.\
    \ The script timeout in the SOAR IDE should be adjusted if the query is expected\
    \ to take a long time to execute. Only single quotes are supported in the `Where\
    \ Filter` parameter."
  ai_short_description: >-
    Executes a custom SQL query against a Snowflake database and returns the results.
