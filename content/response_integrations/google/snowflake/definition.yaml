identifier: Snowflake
name: Snowflake
parameters:
-   name: API Root
    default_value: https://{your_instance}.snowflakecomputing.com
    type: string
    description: API root of the Snowflake instance.
    is_mandatory: true
    integration_identifier: Snowflake
-   name: Account
    default_value: ''
    type: string
    description: The name of the account configured with Snowflake.
    is_mandatory: true
    integration_identifier: Snowflake
-   name: Username
    default_value: ''
    type: string
    description: Username used to access Snowflake.
    is_mandatory: true
    integration_identifier: Snowflake
-   name: Private Key
    default_value: ''
    type: password
    description: Private key that is used for authentication.
    is_mandatory: true
    integration_identifier: Snowflake
-   name: Verify SSL
    default_value: 'True'
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Snowflake server is valid.
    is_mandatory: true
    integration_identifier: Snowflake
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/snowflake
categories:
- Cloud
- IT & Infrastructure
svg_logo_path: resources/logo.svg
image_path: resources/image.png
