Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific alert in the IntSights platform.


    ### Flow Description

    1. Extracts the `Alert ID` and `Note` parameters from the action configuration.

    2. Initializes the IntSights API client.

    3. Makes a POST request to the IntSights API (`/public/v1/data/alerts/add-note/{alert_id}`)
    to append the provided note to the specified alert.

    4. Returns a success message if the note is successfully added, or an error message
    if the alert is not found or another issue occurs.


    ### Additional Notes

    This action modifies data in the external IntSights platform but does not modify
    internal Google SecOps case data.
  ai_short_description: >-
    Adds a note to a specific alert in the IntSights platform.
