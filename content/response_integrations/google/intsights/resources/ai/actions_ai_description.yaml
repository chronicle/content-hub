Ping:
  ai_description: >-
    ### General Description

    Validates connectivity to the Intsights platform by performing a test request
    to the API version endpoint. This action ensures that the provided credentials
    and API root URL are correctly configured and that the SOAR platform can successfully
    communicate with the Intsights service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Account
    ID`, `Api Key`, and `Verify SSL`.

    2. It initializes the `IntsightsManager` using these credentials.

    3. The `IntsightsManager` triggers the `test_connectivity` method, which executes
    an HTTP GET request to the `public/v1/api/version` endpoint.

    4. If the request returns a successful response, the action completes with a success
    status. If the request fails (e.g., due to invalid credentials or network issues),
    an error is logged, and the action fails.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment, entity updates, or modifications to external systems.
