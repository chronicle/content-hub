Search IOCs:
  ai_description: >-
    ### General Description

    Searches for Indicators of Compromise (IOCs) in Intsights based on the provided
    entities.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. For each entity, makes a GET request to the Intsights API to search for associated
    IOC data.

    3. If IOC data is found, enriches the entity with the retrieved threat intelligence.

    4. If the IOC severity is "Medium" or "High", marks the entity as suspicious and
    creates an insight.

    5. Updates the entities in the platform and returns the results as JSON.


    ### Additional Notes

    None.
