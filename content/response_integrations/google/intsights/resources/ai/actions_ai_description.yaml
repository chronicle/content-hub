Download Alert CSV:
  ai_description: >-
    ### General Description

    Downloads a CSV file containing detailed information for a specific alert from
    the Intsights platform. This action allows analysts to retrieve raw alert data
    for offline analysis or reporting purposes.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Account ID, API Key,
    Verify SSL) and action parameters (Alert ID, Download Folder Path, Overwrite).

    2. It validates that the specified `Download Folder Path` exists on the local
    system.

    3. The action initializes the `IntsightsManager` to establish a connection with
    the Intsights API.

    4. It calls the `download_alert_csv` method using the provided `Alert ID` to retrieve
    the CSV content via an HTTP GET request.

    5. The retrieved content is saved to the specified `Download Folder Path` using
    the `save_file` utility.

    6. If the file already exists and `Overwrite` is set to false, the action raises
    an error.

    7. Upon successful download, the absolute path of the saved file is added to the
    action result JSON.


    ### Additional Notes

    This action requires a valid `Alert ID` and a writable directory path. It does
    not modify any data within Intsights or the SOAR platform.
