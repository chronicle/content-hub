Search IOCs:
  ai_description: >-
    ### General Description

    Searches for Indicators of Compromise (IOCs) using the Intsights service. This
    action queries the Intsights API for threat intelligence related to the provided
    entities. If IOC data is found, it enriches the entities with contextual information
    such as related campaigns, threat actors, malware, tags, and reported feeds. Additionally,
    if the IOC severity is classified as 'Medium' or 'High', the action marks the
    entity as suspicious and generates an insight within the case.


    ### Flow Description

    1. The action initializes the `IntsightsManager` using the provided configuration
    parameters (Api Root, Account ID, Api Key, and Verify SSL).

    2. It iterates through all target entities provided in the action.

    3. For each entity, it calls the `intsights_manager.search_iocs` method to retrieve
    threat intelligence data.

    4. If data is returned:
        - The JSON result is added to the action results.
        - The entity's `additional_properties` are updated with the enrichment data
    (e.g., campaigns, threat actors).
        - The entity is marked as enriched (`is_enriched = True`).
        - If the IOC severity is 'Medium' or 'High', the entity is marked as suspicious
    (`is_suspicious = True`) and an entity insight is created.
    5. Finally, the action updates the entities in the SOAR platform and returns the
    aggregated JSON results.


    ### Additional Notes

    This action performs read-only operations on the external Intsights service (GET
    requests) and does not modify external system states. It focuses on internal enrichment
    and case documentation.
