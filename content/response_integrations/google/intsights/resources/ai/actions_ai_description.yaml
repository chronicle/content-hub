Assign Alert:
  ai_description: >-
    ### General Description

    Assigns an alert to a specific analyst in the Intsights platform. This action
    allows users to reassign an alert by providing either the analyst's ID or their
    email address. It interacts with the Intsights API to update the alert's assignee
    field, ensuring that the correct analyst is responsible for the alert.


    ### Flow Description

    1. The action extracts configuration parameters (Api Root, Account ID, Api Key,
    Verify SSL) and action parameters (Alert ID, Assignee ID, Assignee Email Address).

    2. It validates that at least one of the `Assignee ID` or `Assignee Email Address`
    parameters is provided.

    3. If `Assignee Email Address` is provided (and `Assignee ID` is not), the action
    calls the `get_user_details` API endpoint to retrieve the corresponding `Assignee
    ID`.

    4. The action then calls the `assign_alert` API endpoint with the `alert_id` and
    the resolved `assignee_id` to perform the assignment.

    5. The action returns a success message or an error message if the assignment
    fails.


    ### Additional Notes

    If both `Assignee ID` and `Assignee Email Address` are provided, the action prioritizes
    the `Assignee ID` for the assignment.
  ai_short_description: >-
    Assigns an alert to a specific analyst in the Intsights platform using either
    an ID or email address.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
