Assign Alert:
  ai_description: >-
    ### General Description

    Assigns a specific alert to an analyst within the IntSights platform.


    ### Flow Description

    1. Extracts the provided `Alert ID`, `Assignee ID`, and `Assignee Email Address`
    parameters.

    2. If an `Assignee Email Address` is provided without an `Assignee ID`, the action
    makes a GET request to the IntSights API to retrieve the corresponding user details
    and resolve the `Assignee ID`.

    3. Makes a PATCH request to the IntSights API (`/public/v1/data/alerts/assign-alert/{alert_id}`)
    to assign the alert to the resolved analyst.

    4. Returns a success message upon successful assignment.


    ### Additional Notes

    Either `Assignee ID` or `Assignee Email Address` must be provided for the action
    to execute successfully. If both are provided, the action will prioritize the
    `Assignee ID`.
