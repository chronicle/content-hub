    ### General Description

    Downloads a CSV file containing information related to a specific alert in IntSights
    and saves it to a specified local folder path.


    ### Flow Description

    1. Validates that the specified download folder path exists on the local system.

    2. Makes a GET request to the IntSights API (`public/v1/data/alerts/csv-file/{alert_id}`)
    to retrieve the CSV file associated with the provided Alert ID.

    3. Saves the retrieved CSV content to the specified local folder, handling file
    overwrite logic based on the provided parameter.

    4. Returns the absolute path of the saved CSV file in the action's JSON result.


    ### Additional Notes

