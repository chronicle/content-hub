Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific alert within the Intsights platform. This action allows
    analysts to append contextual information or updates directly to an existing alert
    in the external system.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Account
    ID`, `Api Key`, and `Verify SSL`.

    2. It extracts the action-specific parameters: `Alert ID` and `Note`.

    3. The `IntsightsManager` is initialized using the provided credentials and configuration.

    4. The action calls the `add_alert_note` method, which performs a POST request
    to the Intsights API endpoint `public/v1/data/alerts/add-note/{alert_id}` with
    the provided note in the request payload.

    5. The action handles potential errors, such as a `NotFoundError` if the specified
    alert ID does not exist in Intsights.

    6. The execution status and a success or error message are returned to the SOAR
    platform.


    ### Additional Notes

    This action performs a state-changing operation on the external Intsights platform
    by adding a note to an alert. It does not modify any data within the Google SecOps
    platform.
  ai_short_description: >-
    Adds a note to an alert in the Intsights platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a note to an existing alert in the Intsights platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Intsights API to add a note to an
      alert. This is a mutation of external data. It does not fetch data, mutate internal
      SOAR data, update entities, create insights, or modify SOAR alert metadata.
