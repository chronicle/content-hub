  ai_description: >-
    Adds a note to a specific alert in IntSights.


    ### General Description

    This action adds a note to an alert in IntSights using the provided Alert ID and
    Note content. It interacts with the IntSights API to append the note to the alert's
    timeline.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert ID | String | Yes | Specify the ID of the alert to which you want to add
    a note. |

    | Note | String | Yes | Specify the note for the alert. |


    ### Flow Description

    1. Extracts the configuration and action parameters.

    2. Initializes the IntsightsManager with the provided credentials.

    3. Calls the IntSights API to add the specified note to the alert with the given
    Alert ID.

    4. Returns a success message if the note was added successfully, or an error message
    if the alert was not found or another error occurred.
