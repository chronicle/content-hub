Get Alert Image:
  ai_description: >-
    ### General Description

    Retrieves alert images from the IntSights platform based on provided Alert Image
    IDs. This action fetches the raw image data, encodes it into Base64 format, and
    presents it within the Google SecOps case as an insight. It allows analysts to
    view visual evidence associated with alerts directly within the investigation
    workflow.


    ### Flow Description

    1. The action extracts configuration parameters (Api Root, Account ID, Api Key,
    Verify SSL) to initialize the `IntsightsManager`.

    2. It retrieves the list of `Alert Image IDs` provided as an input parameter.

    3. For each ID in the list, the action calls the `get_alert_image` method of the
    `IntsightsManager` to fetch the raw image data from the IntSights API.

    4. Each successfully retrieved image is Base64 encoded.

    5. The action generates a case insight containing the images embedded as HTML
    `<img>` tags.

    6. The action adds a JSON result containing the image names and their Base64 content
    to the action output.


    ### Additional Notes

    This action does not modify external systems. It is strictly a data retrieval
    and internal reporting action. If multiple IDs are provided, the action processes
    them iteratively and reports success or failure for each ID individually.
  ai_short_description: >-
    Retrieves alert images from IntSights and attaches them as insights to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates a case insight containing the retrieved images.
    reasoning: >-
