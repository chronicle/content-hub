Ask An Analyst:
  ai_description: >-
    General Description

    This action allows users to send a question or comment to an analyst regarding
    a specific alert within the Intsights platform. It facilitates communication between
    the SOAR platform and the Intsights analyst team to clarify or investigate alerts.


    Flow Description

    1. The action initializes the `IntsightsManager` using the provided configuration
    parameters (Api Root, Account ID, Api Key, Verify SSL).

    2. It extracts the `Alert ID` and `Comment` from the action parameters.

    3. The action calls the `ask_an_analyst` method, which performs a POST request
    to the Intsights API endpoint `public/v1/data/alerts/ask-the-analyst/{alert_id}`
    with the provided comment as the question payload.

    4. The action processes the response, logging success or failure based on the
    API result.


    Additional Notes

    This action performs a state-changing operation on the external Intsights platform
    by submitting a question to an analyst. It does not modify any data within the
    Google SecOps platform.
