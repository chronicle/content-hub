Get Alert Image:
  ai_description: >-
    ### General Description

    Retrieves alert images from IntSights based on provided Alert Image IDs. This
    action fetches the raw image data, encodes it in base64 format, and attaches the
    images to the case as an insight for analyst review.


    ### Flow Description

    1. Initializes the IntSights manager with the provided API credentials.

    2. Iterates through the provided list of Alert Image IDs.

    3. Makes a GET request to the IntSights API (`public/v1/data/alerts/alert-image/{alert_image_id}`)
    to retrieve the raw image data for each ID.

    4. Base64 encodes the successfully retrieved images.

    5. Creates a case insight displaying the retrieved images using HTML tags.

    6. Returns the base64 encoded images and their corresponding IDs as JSON results.


    ### Additional Notes

    If multiple IDs are provided, the action will attempt to retrieve all of them
    and report on both successful and failed retrievals.
