    is provided, it first fetches the corresponding user ID from IntSights. It then
    sends a request to IntSights to update the alert's assignee.


    ### Flow Description

    1. Extracts the Alert ID, Assignee ID, and Assignee Email Address from the parameters.

    2. Validates that either the Assignee ID or Assignee Email Address is provided.

    3. If only the Assignee Email Address is provided, fetches the user details from
    IntSights to retrieve the Assignee ID.

    4. Sends a request to IntSights to assign the alert to the specified analyst.

    5. Returns a success message if the assignment is successful, or an error message
    if it fails.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert ID | String | True | Specify the ID of the alert on which you want to
    change the assignment. |

    | Assignee ID | String | False | Specify the ID of the analyst that should be
    assigned to the alert. |

    | Assignee Email Address | String | False | Specify the email address of the analyst
    that should be assigned to the alert. |


    ### Additional Notes

    Either 'Assignee ID' or 'Assignee Email Address' must be configured for the action
    to run. If both are specified, the action will prioritize 'Assignee ID'.
