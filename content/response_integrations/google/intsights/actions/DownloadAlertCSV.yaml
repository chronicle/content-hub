name: Download Alert CSV
description: Download CSV file containing information related to alert in IntSights.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/intsights#download_alert_csv
integration_identifier: Intsights
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert for which you want to download CSV.
    is_mandatory: true
-   name: Download Folder Path
    default_value: ''
    type: string
    description: Specify the path to the folder, where you want to store the CSV file.
    is_mandatory: true
-   name: Overwrite
    default_value: false
    type: boolean
    description: If enabled, action will overwrite the file with the same name.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/download_alert_csv_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
