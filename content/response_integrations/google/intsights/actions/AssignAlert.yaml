name: Assign Alert
description: Assign alert to an analyst in IntSights.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/intsights#assign_alert
integration_identifier: Intsights
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert on which you want to change the assignment.
    is_mandatory: true
-   name: Assignee ID
    default_value: ''
    type: string
    description: 'Specify the ID of the analyst that should be assigned to the alert.
        Note: If both Assignee ID and Assignee Email Address are specified, action
        will prioritize Assignee ID.'
    is_mandatory: false
-   name: Assignee Email Address
    default_value: ''
    type: string
    description: 'Specify the email address of the analyst that should be assigned
        to the alert. Note: If both Assignee ID and Assignee Email Address are specified,
        action will prioritize Assignee ID.'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
