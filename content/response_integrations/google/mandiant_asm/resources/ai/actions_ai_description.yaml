Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Mandiant ASM service using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Access Key, Secret
    Key, GTI API Key, Project Name, Verify SSL).

    2. Initializes the Mandiant ASM manager, which attempts to authenticate and retrieve
    the project ID via a GET request to the projects endpoint.

    3. Returns a success message if the connection is established and the project
    is found, otherwise returns a failure message.


    ### Additional Notes

    This action is primarily used to verify integration credentials and network connectivity.
    It does not perform any operations on alerts or entities.
