    Searches for entities within the Mandiant ASM platform based on specified criteria
    such as entity names, tags, vulnerability counts, and issue severity. This action
    allows users to discover assets managed within Mandiant ASM that meet specific
    risk or identification parameters.


    ### Flow Description

    1. The action initializes the Mandiant ASM manager using the provided configuration
    parameters (API Root, Access Key, Secret Key, etc.).

    2. It parses the action parameters, including entity names, tags, issue severity
    filters, and vulnerability/issue count thresholds.

    3. A query string is constructed based on the provided filters.

    4. The action executes a search request against the Mandiant ASM API using the
    constructed query.

    5. The retrieved entities are returned as a JSON result to the SOAR platform.


    ### Additional Notes

    This action is a read-only operation used for discovery and information gathering.
