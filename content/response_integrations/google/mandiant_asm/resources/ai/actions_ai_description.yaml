Update Issue:
  ai_description: >-
    ### General Description

    Updates the status of a specific issue in Mandiant ASM.


    ### Flow Description

    1. Extracts the `Issue ID` and the new `Status` from the action parameters.

    2. Validates that a valid status is selected (rejecting the default "Select One"
    placeholder).

    3. Makes a POST request to the Mandiant ASM API to update the issue's status.

    4. Makes a GET request to retrieve the updated issue details.

    5. Returns the updated issue details as a JSON result to the SecOps platform.


    ### Additional Notes

    Requires valid Mandiant ASM credentials and project configuration.
