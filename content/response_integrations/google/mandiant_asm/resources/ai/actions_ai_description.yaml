Search Issues:
  ai_description: >-
    ### General Description

    Searches for issues within the Mandiant ASM platform based on user-defined criteria.
    This action allows analysts to query for specific issues using identifiers, entity
    names, tags, severity levels, and status filters, providing visibility into the
    attack surface management data.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    credentials, project name) and action-specific parameters (Issue IDs, Entity IDs,
    Entity Name, Tags, Time parameters, Severity, Status, and Limit) from the input.

    2. **Query Construction**: The action constructs a query string based on the provided
    filters, including time-based filtering (First Seen/Last Seen) and status/severity
    mappings.

    3. **API Interaction**: The `MandiantASMManager` is initialized, and the `search_issues`
    method is called to perform a GET request against the Mandiant ASM API.

    4. **Result Processing**: The retrieved issues are parsed and returned as a JSON
    result to the SOAR platform.


    ### Additional Notes

    - The action supports pagination to handle large result sets up to the defined
    limit (default 50, max 200).

    - If "Custom" is selected for the Time Frame, the "Start Time" parameter is mandatory.

    - The action does not modify any data; it is a read-only search operation.
