Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Mandiant ASM server using the configured integration
    parameters. This action verifies that the provided API credentials and configuration
    settings are valid and that the integration can successfully communicate with
    the Mandiant ASM API.


    ### Flow Description

    1. The action extracts the integration configuration parameters, including the
    API Root, Access Key, Secret Key, GTI API Key, Project Name, and Verify SSL setting.

    2. It initializes the `MandiantASMManager` with these parameters.

    3. The manager performs a validation check on the provided credentials.

    4. The manager makes a GET request to the `index_projects` endpoint to retrieve
    the list of projects and verify the connection.

    5. If the connection is successful, the action completes with a success message.
    If an error occurs (e.g., invalid credentials or network issues), the action fails
    and logs the error.


    ### Additional Notes

    This action does not require any input entities and is used solely for verifying
    the integration configuration.
