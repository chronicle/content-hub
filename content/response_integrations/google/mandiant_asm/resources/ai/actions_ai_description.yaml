Update Issue:
  ai_description: >-
    ### General Description

    Updates the status of a specific issue within the Mandiant ASM platform. This
    action allows analysts to modify the state of an existing issue (e.g., marking
    it as 'Resolved' or 'False Positive') directly from the SOAR platform, ensuring
    synchronization between the security operations workflow and the external asset
    management system.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, Access
    Key, Secret Key, GTI API Key, Project Name, and SSL verification settings) to
    establish a connection to the Mandiant ASM API.

    2. It retrieves the `Issue ID` and the desired `Status` from the action parameters.

    3. The `MandiantASMManager` is initialized with the provided credentials and project
    context.

    4. The action executes an API call to update the status of the specified issue
    in Mandiant ASM.

    5. Upon a successful update, the action fetches the updated details of the issue
    using the `Issue ID`.

    6. The retrieved issue data is added to the action result as a JSON object for
    analyst review.


    ### Additional Notes

    This action requires valid Mandiant ASM API credentials and a valid `Issue ID`.
    The `Status` parameter must be selected from the provided list of valid statuses
    defined in the integration configuration.
