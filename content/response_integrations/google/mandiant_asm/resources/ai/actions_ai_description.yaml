Get ASM Entity Details:
  ai_description: >-
    ### General Description

    Fetches detailed information about specific entities from Mandiant ASM. This action
    retrieves raw entity data, such as metadata and configuration details, based on
    the provided entity IDs, allowing analysts to gain deeper context on assets tracked
    within the Mandiant ASM platform.


    ### Flow Description

    1. The action extracts configuration parameters, including API credentials (Access
    Key, Secret Key, or GTI API Key), API root, and project name.

    2. It extracts the `Entity IDs` parameter, which is a comma-separated list of
    identifiers.

    3. The `MandiantASMManager` is initialized to handle communication with the Mandiant
    ASM API.

    4. The action iterates through each provided entity ID.

    5. For each ID, it performs a GET request to the Mandiant ASM API endpoint (`/api/v1/entities/{entity_id}/raw`
    or `/api/v3/asm/entities/{entity_id}/raw`) to retrieve the entity details.

    6. Successful results are aggregated into a list, and the final JSON output is
    returned to the SOAR platform using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires valid Mandiant ASM credentials and a configured project.
    It does not modify any data within the SOAR platform or the external system; it
    is strictly an information-retrieval action.
  ai_short_description: >-
    Fetches detailed information for specified entities from Mandiant ASM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
