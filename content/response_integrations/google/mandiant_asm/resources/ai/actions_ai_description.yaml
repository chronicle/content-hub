Search ASM Entities:
  ai_description: >-
    ### General Description

    Searches for entities within Mandiant Attack Surface Management (ASM) based on
    specified criteria such as entity names, tags, and vulnerability counts. This
    action retrieves matching asset records and returns them as a structured JSON
    result for further use in the playbook.


    ### Flow Description

    1. Extracts action parameters including entity names, tags, issue thresholds,
    and result limits.

    2. Validates the provided limits and counts to ensure they are positive integers.

    3. Initializes the Mandiant ASM API client using the provided integration credentials.

    4. Executes a search query via the Mandiant ASM API (`/api/v1/search/entities`
    or `/api/v3/asm/search/entities`) to retrieve entities matching the specified
    criteria.

    5. Parses the API response and returns the retrieved entities as a JSON result.


    ### Additional Notes

    This action does not operate on SOAR case entities directly; instead, it relies
    on the provided action parameters (like 'Entity Name' or 'Tags') to perform the
    search in Mandiant ASM.
