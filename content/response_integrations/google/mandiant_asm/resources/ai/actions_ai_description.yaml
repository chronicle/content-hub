Get ASM Entity Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific Mandiant ASM entities using their
    unique entity IDs. This action queries the Mandiant ASM API to fetch the raw details
    of the specified entities and returns the data as a JSON result.


    ### Flow Description

    1. Extracts the provided comma-separated list of Mandiant ASM Entity IDs from
    the action parameters.

    2. Iterates through each provided ID and makes a GET request to the Mandiant ASM
    API (`api/v1/entities/{entity_id}/raw` or `api/v3/asm/entities/{entity_id}/raw`)
    to fetch the entity's full details.

    3. Aggregates the successfully retrieved entity data.

    4. Returns the aggregated data as a JSON result attached to the action.


    ### Additional Notes

    This action does not operate on standard SOAR entities (like IP addresses or hostnames)
    but relies on explicitly provided Mandiant ASM entity IDs.
  ai_short_description: >-
    Retrieves detailed information about specific Mandiant ASM entities by querying
    the Mandiant ASM API with their unique entity IDs.
