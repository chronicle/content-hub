identifier: MandiantASM
name: Mandiant ASM
parameters:
-   name: API Root
    default_value: https://asm-api.advantage.mandiant.com
    type: string
    description: 'API root of the Mandiant ASM instance. Note: if you want to authenticate
        with GTI credentials provide "https://www.virustotal.com" as API Root.'
    is_mandatory: true
    integration_identifier: MandiantASM
-   name: Access Key
    default_value: ''
    type: string
    description: API Access Key of the Mandiant ASM account
    is_mandatory: false
    integration_identifier: MandiantASM
-   name: Secret Key
    default_value: ''
    type: password
    description: API Secret Key of the Mandiant ASM account.
    is_mandatory: false
    integration_identifier: MandiantASM
-   name: GTI API Key
    default_value: ''
    type: password
    description: 'Google Threat Intelligence API Key. Note: API Root should be "https://www.virustotal.com"
        to use this authentication. GTI API Key authentication has priority over other
        authentication.'
    is_mandatory: false
    integration_identifier: MandiantASM
-   name: Project Name
    default_value: ''
    type: string
    description: Project name that should be used in Mandiant ASM. If Access Key &
        Secret Key is used for authentication, this parameter is mandatory.
    is_mandatory: false
    integration_identifier: MandiantASM
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Mandiant ASM server is valid.
    is_mandatory: false
    integration_identifier: MandiantASM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mandiant-asm
categories:
- Asset Management
- Google
- Vulnerability & Risk Management
svg_logo_path: resources/logo.svg
image_path: resources/image.png
