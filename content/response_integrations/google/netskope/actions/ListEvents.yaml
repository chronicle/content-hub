name: List Events
description: List events.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/netskope#list_events
integration_identifier: Netskope
parameters:
-   name: Query
    default_value: ''
    type: string
    description: This acts as a filter for all the cloud app events in the events
        database.
    is_mandatory: false
-   name: Type
    default_value: ''
    type: string
    description: 'The type of the alert to filter by. Valid values: page | application
        | audit | infrastructure.'
    is_mandatory: false
-   name: Time Period
    default_value: ''
    type: string
    description: 'Time period to search events at (milliseconds backwards). Valid
        Values: 3600 | 86400 | 604800 | 2592000.'
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: Restrict events to those that have timestamps greater than this (unixtime).
        Needed only if time period is not passed.
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: Restrict events to those that have timestamps less than this (unixtime).
        Needed only if time period is not passed.
    is_mandatory: false
-   name: Limit
    default_value: ''
    type: string
    description: 'Number of results to return. Default: 100.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: events
