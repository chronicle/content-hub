name: List Quarantined Files
description: List quarantined files.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/netskope#list_quarantined_files
integration_identifier: Netskope
parameters:
-   name: Start Time
    default_value: ''
    type: string
    description: Restrict events to those that have timestamps greater than this (unixtime).
        Needed only if time period is not passed.
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: Restrict events to those that have timestamps less than this (unixtime).
        Needed only if time period is not passed.
    is_mandatory: false
-   name: Max Items To Return
    default_value: ''
    type: string
    description: Maximum number of items to retrieve. If unspecified, the maximum
        (100) is used.
    is_mandatory: false
-   name: Use V2 API
    default_value: ''
    type: boolean
    description: If enabled, the action will use the V2 API endpoint (requires credentials).
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_quarantined_files_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: files
