name: Add Entities to URL List
description: 'Use the “Add Entities To URL List” action to append new URLs, domains,
    or IP addresses to an existing Netskope URL list. Supported Entities: URL, Domain,
    IP Address.'
integration_identifier: Netskope
parameters:
-   name: URL List Name
    default_value: ''
    type: string
    description: The name of the existing Netskope URL list to update (such as Allowed
        URLs).
    is_mandatory: true
-   name: Entries
    default_value: ''
    type: string
    description: A comma-separated list of URLs, domains, or IP addresses to add to
        the list. The action also automatically processes URL, Domain, and IP Address
        entities attached to the case.
    is_mandatory: false
-   name: Deploy URL List Changes
    default_value: ''
    type: boolean
    description: 'If selected, the action deploys all pending changes to all URL lists.
        Note: All changes across all URL lists are deployed.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_entities_to_url_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["URL", "ADDRESS", "DOMAIN"]}'
script_result_name: success
