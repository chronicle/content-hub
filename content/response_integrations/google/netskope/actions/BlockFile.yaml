name: Block File
description: Block a quarantined file.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/netskope#block_file
integration_identifier: Netskope
parameters:
-   name: File ID
    default_value: ''
    type: string
    description: ID of a file, needed to identify a file.
    is_mandatory: true
-   name: Quarantine Profile ID
    default_value: ''
    type: string
    description: ID of a quarantine profile. This parameter is mandatory for V1 API.
    is_mandatory: false
-   name: Use V2 API
    default_value: ''
    type: boolean
    description: If enabled, the action will use the V2 API endpoint (requires credentials).
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: success
