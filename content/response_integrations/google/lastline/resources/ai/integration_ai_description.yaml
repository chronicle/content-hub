product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: true
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Lastline integration is a Network Detection and Response (NDR) platform that
    provides threat intelligence and sandbox analysis capabilities. It qualifies for
    'Threat Intelligence' because it enriches entities (FileHash, URL) with analysis
    results and reputation data. It qualifies for 'Network Security' as it is an NDR
    platform designed to protect network traffic. It qualifies for 'Email Security'
    and 'Cloud Security' because the integration description explicitly states that
    it protects email and public cloud workloads, which are core use cases for the
    platform's analysis capabilities. It does not perform SIEM log searching, EDR
    host containment, IAM management, ITSM ticketing, or asset inventory management.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
