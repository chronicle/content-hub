product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Lastline integration is primarily focused on sandbox analysis and threat intelligence.
    Its core actions, such as 'Get Analysis Results', 'Submit File', 'Submit URL',
    and 'Search Analysis History', are designed to analyze files and URLs to determine
    their maliciousness, retrieve risk scores, and obtain detailed analysis reports.
    This functionality directly aligns with the 'Threat Intelligence' category, which
    involves enriching external indicators (IPs, Hashes, URLs) to determine their
    reputation and confirm if an alert is a True Positive. The integration does not
    perform SIEM log analysis, EDR host containment, network gateway blocking, or
    other functions related to the remaining categories.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
