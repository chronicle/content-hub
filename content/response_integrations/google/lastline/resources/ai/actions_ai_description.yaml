  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Lastline service.\
    \ It ensures that the provided integration parameters\u2014such as the API Root,\
    \ Username, and Password\u2014are correct and that the Lastline API is reachable\
    \ from the environment.\n\n### Parameters Description\nThis action uses the integration's\
    \ global configuration parameters rather than action-specific inputs:\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Api Root**\
    \ | String | Yes | The base URL of the Lastline API instance. |\n| **Username**\
    \ | String | Yes | The username used for authenticating with the Lastline service.\
    \ |\n| **Password** | String | Yes | The password associated with the provided\
    \ username. |\n| **Verify SSL** | Boolean | No | If enabled (default), the action\
    \ will verify the SSL certificate of the Lastline server. |\n\n### Additional\
    \ Notes\n- This action is typically used during the initial setup of the integration\
    \ or for troubleshooting connection issues.\n- It does not process any entities\
    \ or modify any data within Google SecOps or Lastline.\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the Siemplify context and retrieves\
    \ the global configuration parameters (API Root, Username, Password, and SSL verification\
    \ setting).\n2. **Manager Setup**: It instantiates the `LastlineManager`, which\
    \ immediately attempts to establish a session by requesting a session cookie from\
    \ the Lastline `/papi/login` endpoint.\n3. **Connectivity Test**: The action calls\
    \ the `test_connectivity` method, which performs a GET request to the login endpoint\
    \ to validate that the credentials are valid and the service is responsive.\n\
    4. **Result Handling**: \n    - If the request is successful, the action returns\
    \ a success message and sets the execution state to completed.\n    - If an authentication\
    \ error occurs, it catches the `LastlineAuthenticationException` and reports a\
    \ failure.\n    - If any other network or API error occurs, it catches the general\
    \ exception and provides the error details."
