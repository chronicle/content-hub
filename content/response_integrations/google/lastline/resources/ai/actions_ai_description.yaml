  ai_description: >-
    ### General Description

    Submits a URL to Lastline for threat analysis. The action initiates an analysis
    task in the Lastline sandbox and can optionally run asynchronously to wait for
    the analysis report to complete and return the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | URL For Analysis | String | Yes | The specific URL to be submitted to Lastline
    for analysis. |

    | Wait for the report? | Boolean | No | If set to True, the action will run asynchronously
    and wait until the analysis report is generated. If False, it will just submit
    the task and finish immediately. |


    ### Flow Description

    1. Extracts the URL and configuration parameters.

    2. Submits the URL to the Lastline API via a POST request to create a new analysis
    task.

    3. If configured to wait, the action polls the Lastline API periodically to check
    the task's progress status.

    4. Once the task is completed (or immediately if not waiting), it retrieves the
    analysis results and attaches them to the action's JSON results and data tables.


    ### Additional Notes

    This action does not operate on Google SecOps entities. The URL to analyze must
    be provided explicitly via the action's input parameters.
