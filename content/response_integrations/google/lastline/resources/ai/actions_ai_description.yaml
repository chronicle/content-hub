  ai_description: >-
    ### General Description

    The **Get Analysis Results** action enriches FileHash or URL entities with previously
    completed analysis task results from Lastline. It retrieves the latest successful
    analysis report for the provided entities, enriches the entities with the report
    data, and optionally creates an insight. If the analysis score exceeds a specified
    threshold, the entity is marked as suspicious.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Iterates over the target entities (URL or FILEHASH).

    3. Searches the Lastline analysis history for the specific entity.

    4. Fetches the detailed report for the latest successful analysis task.

    5. Optionally creates an insight based on the report data.

    6. Generates JSON and CSV results for the analysis.

    7. Enriches the entity with the report data and marks it as suspicious if the
    score is above the threshold.

    8. Updates the entities in the SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | Mark entity as suspicious if the score value for
    the entity is above the specified threshold. Default is 70. |

    | Search in last x scans | Integer | Yes | Search for a report for the provided
    entity in the last x analyses executed in Lastline. Default is 25. |

    | Create Insight? | Boolean | No | Specify whether to create an insight based
    on the report data. Default is False. |


    ### Additional Notes

    - The action supports FileHash entities in MD5 and SHA-1 formats.

    - The action always fetches the latest analysis available for the provided entity
    in Lastline.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, marks entities as suspicious, and creates insights.
    reasoning: >-
      The action fetches analysis history and reports from Lastline using GET requests,
      so it fetches data. It does not make any POST/PUT/DELETE requests to mutate
      external data. It mutates internal data by updating entity properties, marking
      entities as suspicious, and creating insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Lastline) to enrich entities.
      It does not mutate external data, and its internal mutations are limited to
      updating entities and creating insights. Therefore, it is an enrichment action.
      It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks if
      `entity.entity_type` is either `EntityTypes.URL` or `EntityTypes.FILEHASH`.
      It skips entities that do not match these types. Therefore, it runs on FILEHASH
      and DestinationURL entities and filters by entity type.
