Submit File:
  ai_description: >-
    ### General Description

    Submits a file to the Lastline sandbox for malware analysis. This action allows
    users to initiate an analysis task for a specific file and optionally wait for
    the results to be generated.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) and action parameters (File Path, Wait for the report?).

    2. It initializes the `LastlineManager` to establish a session with the Lastline
    API.

    3. On the first execution, the action calls the `submit_file` endpoint to upload
    the file and initiate the analysis task.

    4. If `Wait for the report?` is set to True, the action checks the status of the
    task. If the analysis is not yet complete, it returns an `IN_PROGRESS` status
    to allow for asynchronous polling.

    5. Once the analysis is complete, the action calls the `get_result` endpoint to
    retrieve the full analysis report.

    6. The action adds the JSON results to the action output and, if waiting for the
    report, adds a data table containing the analysis summary to the action results.


    ### Additional Notes

    This action is asynchronous and supports polling for results. It does not operate
    on SOAR entities; the file path must be provided as an input parameter.
