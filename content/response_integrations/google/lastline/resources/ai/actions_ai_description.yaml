  ai_description: >-
    ### General Description

    This action searches the Lastline analysis history for completed tasks based on
    user-provided parameters. It allows security analysts to look up previous scan
    results for specific URLs or file hashes (MD5/SHA1) within a defined timeframe
    and scan limit. This action operates exclusively on the input parameters provided
    at runtime and does not process entities from the SOAR case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Submission Name | String | No | The specific URL or Filehash (MD5 or SHA1) to
    search for in the history. |

    | Submission Type | String | No | Defines the type of the 'Submission Name'. Options
    include 'URL', 'FileHash', or 'Not specified'. If 'Not specified', the action
    will attempt to auto-detect the type based on the format of the 'Submission Name'.
    |

    | Max Hours Backwards | Integer | No | The time window (in hours) to look back
    for completed analysis tasks. Defaults to 24 hours. |

    | Search in last x scans | Integer | Yes | The maximum number of recent scans
    to search through in Lastline. Defaults to 100. |

    | Skip first x scans | Integer | No | The number of initial scans to skip in the
    search results (offset). Defaults to 0. |


    ### Additional Notes

    - **Entity Usage:** This action does not interact with or iterate over entities
    present in the Google SecOps case. It relies entirely on the 'Submission Name'
    parameter.

    - **Hash Support:** When searching for files, the action supports both MD5 and
    SHA1 hash formats.


    ### Flow Description

    1. **Initialization:** The action retrieves API credentials (API Root, Username,
    Password) and connection settings from the integration configuration.

    2. **Parameter Parsing:** It extracts the search criteria, including the submission
    name, type, and search constraints (timeframe and limits).

    3. **Type Detection:** If the 'Submission Type' is not specified, the script uses
    validators to determine if the 'Submission Name' is a URL or a file hash.

    4. **API Query:** The `LastlineManager` executes a GET request to the `/papi/analysis/get_history`
    endpoint with the filtered parameters.

    5. **Result Processing:** The response is parsed into data models. If matching
    tasks are found, the action generates a JSON result and populates a 'Search Results'
    data table in the SOAR platform.
