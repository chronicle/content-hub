Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Lastline service to verify that the provided integration
    configuration parameters are correct. This action ensures that the SOAR platform
    can successfully authenticate and communicate with the Lastline API.


    ### Flow Description

    1. The action extracts the `Api Root`, `Username`, `Password`, and `Verify SSL`
    parameters from the integration configuration.

    2. It initializes the `LastlineManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Lastline login endpoint.

    4. The response is validated to ensure successful authentication.

    5. The action concludes by returning a success or failure message based on the
    outcome of the connectivity test.


    ### Additional Notes

    This action does not interact with any entities or perform data enrichment. It
    is strictly a diagnostic tool for verifying integration connectivity.
