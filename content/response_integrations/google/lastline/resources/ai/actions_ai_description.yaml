Get Analysis Results:
  ai_description: >-
    ### General Description

    Enriches FileHash and URL entities by retrieving historical analysis results from
    the Lastline platform. This action queries Lastline for existing analysis reports
    associated with the provided indicators, evaluates the threat score against a
    configurable threshold, and updates the entity with relevant threat intelligence
    and metadata.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves necessary API credentials
    (API Root, Username, Password) and action-specific parameters (Threshold, Search
    limit, Create Insight toggle).

    2. **Entity Processing**: The action iterates through the provided target entities,
    filtering for `URL` and `FILEHASH` types. Unsupported entity types are skipped.

    3. **History Search**: For each valid entity, the action calls the Lastline API
    (`search_analysis_history`) to locate the most recent analysis task UUID based
    on the configured search limit.

    4. **Report Retrieval**: If a task UUID is found, the action calls the Lastline
    API (`get_result`) to fetch the detailed analysis report.

    5. **Insight Creation**: If the `Create Insight?` parameter is enabled, the action
    generates an entity insight containing the analysis report summary.

    6. **Entity Enrichment**: The action updates the entity's `additional_properties`
    with the enrichment data, sets the `is_enriched` flag, and marks the entity as
    suspicious if the analysis score exceeds the defined `Threshold`.

    7. **Platform Update**: Finally, the action saves the updated entities to the
    SOAR platform and adds the analysis results to the action output.


    ### Additional Notes

    - The action supports FileHash entities in MD5 and SHA-1 formats.

    - The action always fetches the latest available analysis for the provided entity
    in Lastline.
  ai_short_description: >-
    Enriches FileHash and URL entities with threat intelligence and analysis reports
    from Lastline.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (is_enriched, is_suspicious, additional_properties)
      and creates entity insights within the SOAR platform.
    reasoning: >-
      The action fetches data from the Lastline API (fetches_data=true). It updates
      internal entities with enrichment data and suspicious status (can_update_entities=true)
      and optionally creates insights (can_create_insight=true). It does not mutate
      external data or modify alert/case data.
