Search Analysis History:
  ai_description: >-
    ### General Description

    Searches for completed analysis tasks within the Lastline platform based on provided
    criteria. This action allows users to query historical analysis reports by specifying
    a submission name (URL or FileHash), submission type, and time-based or scan-based
    filters.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) to establish a connection to the Lastline API.

    2. It extracts action parameters, including the submission name, submission type,
    time range (Max Hours Backwards), and scan limits (Search in last x scans, Skip
    first x scans).

    3. The `LastlineManager` is initialized to handle API communication.

    4. If the submission type is not specified, the action attempts to infer it from
    the submission name (URL or File).

    5. If the submission type is a file, the action extracts the MD5 and SHA1 hashes
    from the provided submission name.

    6. The action calls the `search_analysis_history` API endpoint to retrieve the
    relevant analysis records.

    7. If analysis records are found, the action adds the results as a JSON object
    and a CSV table to the action output.


    ### Additional Notes

    This action does not interact with SOAR entities; it relies entirely on the provided
    input parameters to perform the search.
