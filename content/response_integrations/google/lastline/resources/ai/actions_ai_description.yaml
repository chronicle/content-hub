Get Analysis Results:
  ai_description: >-
    ### General Description

    Enriches FileHash or URL entities with previously completed analysis task results
    from Lastline. This action retrieves the latest analysis available for the provided
    entity, evaluates its risk score against a specified threshold, and enriches the
    entity with the analysis data.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Validates that the entity is either a URL or a FileHash (MD5 or SHA1).

    3. Makes an API call to Lastline (`/papi/analysis/get_history`) to search for
    the analysis history of the entity within the last specified number of scans.

    4. If a successful analysis is found, makes another API call (`/papi/analysis/get_result`)
    to fetch the detailed report using the task UUID.

    5. Optionally creates an insight for the entity based on the report data.

    6. Generates JSON and CSV results containing the analysis details.

    7. Evaluates the analysis score against the provided threshold; if it exceeds
    the threshold, marks the entity as suspicious.

    8. Enriches the entity's additional properties with the report data and updates
    the entity in the platform.


    ### Additional Notes

    - The action supports FileHash entities in MD-5 and SHA-1 formats.

    - It always fetches the latest analysis available for the provided entity in Lastline.
  ai_short_description: >-
    Enriches FileHash or URL entities with previously completed analysis task results
    from Lastline, optionally creating insights and marking entities as suspicious
    based on a score threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Lastline via GET requests (`search_analysis_history`
      and `get_result`). It does not mutate external data. It updates internal entities
      (`siemplify.update_entities`) and creates insights (`siemplify.add_entity_insight`).
      It does not modify alert data or create case comments.
