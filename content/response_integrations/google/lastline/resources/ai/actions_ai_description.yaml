Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Lastline service to ensure that the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, Username,
    Password, Verify SSL).

    2. Initializes the Lastline API manager.

    3. Makes an HTTP GET request to the Lastline `/papi/login` endpoint to verify
    authentication and connectivity.

    4. Returns a successful execution state if the connection succeeds, or a failure
    state if an authentication or connection error occurs.


    ### Additional Notes

    This action does not require any input parameters as it relies entirely on the
    integration's configuration settings. It does not process any entities or modify
    any data.
