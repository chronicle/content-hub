Search Analysis History:
  ai_description: >-
    ### General Description

    Searches Lastline for completed analysis tasks history based on a provided submission
    name, such as a URL or Filehash (MD5 or SHA1). This action retrieves historical
    analysis data within a specified timeframe and scan limit.


    ### Flow Description

    1. Extracts the provided action parameters, including the submission name, type,
    and search constraints.

    2. Determines the submission type (URL or File) and calculates the start time
    based on the `Max Hours Backwards` parameter.

    3. Makes a GET request to the Lastline API (`/papi/analysis/get_history`) to fetch
    the analysis history matching the criteria.

    4. Parses the returned analysis data.

    5. If results are found, attaches the data as a JSON result and a CSV data table
    to the case.


    ### Additional Notes

    This action does not operate on Siemplify entities; it relies exclusively on the
    provided action input parameters to perform the search.
