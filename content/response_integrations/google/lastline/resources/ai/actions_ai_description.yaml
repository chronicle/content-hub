  ai_description: >-
    ### General Description

    This action submits a specific URL to the Lastline platform for sandbox analysis.
    It is designed to initiate a security scan to determine if a URL is malicious
    or benign. Unlike many other actions, this does not automatically process entities
    from the Google SecOps case; instead, the URL must be provided manually as an
    input parameter. The action supports asynchronous execution, meaning it can wait
    for the analysis to complete and retrieve the final report.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL For Analysis | String | Yes | The specific URL that you want Lastline to
    analyze. |

    | Wait for the report? | Boolean | No | If set to `True` (default), the action
    will enter an asynchronous state, polling Lastline until the analysis is finished
    to retrieve the full report. If `False`, the action completes immediately after
    the submission task is created. |


    ### Additional Notes

    - This action **does not** use Google SecOps entities (e.g., it won't iterate
    over URLs found in the alert). You must map or type the URL into the `URL For
    Analysis` parameter.

    - If `Wait for the report?` is enabled, the action may take several minutes to
    complete as it waits for the sandbox environment to finish its execution.


    ### Flow Description

    1. **Submission**: The action sends a POST request to Lastline's `/papi/analysis/submit_url`
    endpoint with the provided URL.

    2. **Initial Check**: If `Wait for the report?` is `False`, the action finishes
    immediately, providing the Task UUID.

    3. **Polling (Async)**: If `Wait for the report?` is `True`, the action checks
    if the report is already available. If not, it enters an 'In Progress' state.

    4. **Status Retrieval**: In subsequent runs (polling), the action calls `/papi/analysis/get_progress`
    using the Task UUID to check if the analysis is finished.

    5. **Finalization**: Once the analysis is complete, the action calls `/papi/analysis/get_result`
    to fetch the full report, which is then attached to the action results as JSON
    and a Data Table.
