Submit File:
  ai_description: >-
    ### General Description

    Submits a file to the Lastline service for malware analysis and sandbox execution.
    This action uploads a specified file and can optionally wait asynchronously to
    retrieve the final analysis report and threat score.


    ### Flow Description

    1. Extracts the provided file path and configuration parameters.

    2. Makes a POST request to the Lastline API (`/papi/analysis/submit_file`) to
    upload the file and initiate a new analysis task.

    3. If the action is configured to wait for the report, it enters an asynchronous
    loop, periodically making GET requests to the Lastline API (`/papi/analysis/get_progress`)
    to check the task status.

    4. Once the analysis is complete, it makes a GET request to the Lastline API (`/papi/analysis/get_result`)
    to fetch the full analysis report.

    5. Attaches the analysis results to the case as JSON data and optionally as a
    data table.


    ### Additional Notes

    This action does not operate on SecOps entities. It requires the full path to
    the file on the host machine to be provided directly via the 'File Path' input
    parameter.
