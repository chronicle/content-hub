    1. Extracts the target URL and the preference to wait for the report from the
    action parameters.

    2. Makes a POST request to the Lastline API (`/papi/analysis/submit_url`) to submit
    the URL for analysis.

    3. If configured to wait for the report, the action enters an asynchronous loop,
    periodically making GET requests to check the task status (`/papi/analysis/get_progress`).

    4. Once the analysis is marked as completed, it makes a GET request to retrieve
    the final results (`/papi/analysis/get_result`).

    5. Attaches the analysis results to the action's JSON output and, if waiting for
    the report, creates a CSV data table with the findings.


