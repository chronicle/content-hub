  ai_description: >-
    ### General Description

    Searches Lastline for completed analysis tasks history based on a provided submission
    name, such as a URL or Filehash. This action retrieves historical analysis data
    from the Lastline platform without requiring Siemplify entities as input.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Submission Name | String | False | Submission name to search for. Can be either
    a URL or a Filehash in MD5 or SHA1 format. |

    | Submission Type | Dropdown | False | Optionally specify the submission type
    to search for, either 'URL' or 'FileHash'. If not specified, the action will attempt
    to infer the type from the Submission Name. |

    | Max Hours Backwards | String | False | The time frame (in hours) for which to
    search for completed analysis tasks. Default is 24. |

    | Search in last x scans | String | True | The maximum number of recent analyses
    to search within Lastline. Default is 100. |

    | Skip first x scans | String | False | The number of initial scans to skip from
    the Lastline API results. Default is 0. |


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Determines the submission type (URL or FILE) based on the provided `Submission
    Name` if `Submission Type` is not explicitly specified.

    3. Calculates the appropriate file hashes (MD5 or SHA1) if a file hash is provided.

    4. Calls the Lastline API to search the analysis history using the specified time
    frame, limits, and submission criteria.

    5. If analysis history is found, the action attaches the results as a JSON object
    and a CSV data table to the case, and completes successfully.
