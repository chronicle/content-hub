Submit URL:
  ai_description: >-
    ### General Description

    Submits a URL to the Lastline service for malware analysis. This action allows
    analysts to trigger an automated sandbox analysis of a specific URL to determine
    its maliciousness and retrieve detailed threat intelligence reports.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) and action parameters (URL, Wait for report) to initialize the `LastlineManager`.

    2. The action submits the provided URL for analysis via a POST request to the
    Lastline `/papi/analysis/submit_url` endpoint.

    3. If the `Wait for the report?` parameter is set to true, the action monitors
    the submission task status.

    4. Upon completion, the action retrieves the analysis results from the Lastline
    service.

    5. The results are returned as a JSON object and a CSV data table containing the
    analysis report, which are added to the action output.


    ### Additional Notes

    This action does not operate on Siemplify entities; the URL to be analyzed must
    be provided directly as an input parameter.
