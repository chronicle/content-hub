  ai_description: >-
    Submits a file to the Lastline sandbox for analysis.


    ### General Description

    This action uploads a file from a specified local path to the Lastline analysis
    engine. It can optionally wait for the analysis to complete and retrieve the resulting
    behavior report and threat score. If the action is configured to wait, it will
    run asynchronously, periodically checking the status of the analysis task until
    it is completed.


    ### Flow Description

    1. Extracts the provided file path and configuration parameters.

    2. Initiates a file submission task to the Lastline API.

    3. If 'Wait for the report?' is enabled, the action enters an asynchronous loop,
    periodically querying the task status.

    4. Once the analysis is complete, it retrieves the full analysis report.

    5. Outputs the results as JSON and optionally creates a CSV data table with the
    analysis summary.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Path | String | Yes | Specify the full path to the file to analyze. |

    | Wait for the report? | Boolean | No | Specify whether the action should wait
    for the report creation. If set to False, the report can be obtained later with
    the 'Get Analysis Results' action once the scan is completed. Default is True.
    |
