    selected, you also need to provide 'Start Time'. |

    | Start Time | String | No | Specify a time frame for the results. If 'Custom'
    is selected, you also need to provide 'Start Time'. |

    | End Time | String | No | Specify the start time for the query. This parameter
    is mandatory, if 'Custom' is selected for the 'Time Frame' parameter. Format:
    ISO 8601. Example: 2021-08-05T05:18:42Z |

    | Max rows to return | String | No | Specify max number of rows the action should
    return. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Devo instance using the provided configuration parameters.
    This action verifies that the integration can successfully authenticate and communicate
    with the Devo API.


    ### Flow Description

    1. Extracts integration configuration parameters (`API URL`, `API Token`, `API
    Key`, `API Secret`, `Verify SSL`) from the integration settings.

    2. Initializes the `DevoManager` with the provided credentials.

    3. Triggers the `test_connectivity` method within the `DevoManager`.

    4. `DevoManager` sends a POST request to the Devo `/search/query` endpoint to
    execute a test query (`from siem.logtrust.alert.info`).

    5. Validates the API response to ensure the connection is successful.

    6. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This action does not perform any data retrieval or modification beyond verifying
    the connection. It is intended for troubleshooting and configuration validation.
