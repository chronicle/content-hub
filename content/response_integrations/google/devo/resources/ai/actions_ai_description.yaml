Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Devo instance using the provided integration configuration
    parameters. This action ensures that the API credentials and network settings
    are correctly configured to communicate with the Devo platform.


    ### Flow Description

    1. Extracts integration configuration parameters (API URL, API Token, API Key,
    API Secret, Verify SSL).

    2. Initializes the DevoManager and triggers a connectivity test.

    3. The connectivity test makes a POST request to the Devo `/search/query` API
    endpoint with a basic query (`from siem.logtrust.alert.info`) to verify access.

    4. Returns a successful execution state if the API responds without errors, otherwise
    returns a failure state with the error details.


    ### Additional Notes

    This action does not require any action-specific parameters or entities to run.
    It relies entirely on the integration-level configuration.
