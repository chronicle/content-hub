Advanced Query:
  ai_description: >-
    ### General Description

    Executes an advanced query against a Devo instance based on the provided parameters
    to retrieve historical logs or telemetry data.


    ### Flow Description

    1. Extracts the provided query, time frame, and row limit parameters.

    2. Validates the time frame and calculates the start and end timestamps.

    3. Makes a POST request to the Devo API (`/search/query`) to execute the query.

    4. Retrieves the query results and formats them.

    5. Returns the results as a JSON object and a CSV data table within the SecOps
    platform.


    ### Additional Notes

    This action does not operate on Siemplify entities. If querying a table other
    than `siem.logtrust.alert.info`, an additional token for that table must be specified
    in the integration configuration.
  ai_short_description: >-
    Executes an advanced query against a Devo instance to retrieve historical logs
    or telemetry data based on specified parameters and time frames.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
