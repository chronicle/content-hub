    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Devo API to fetch query results (fetches_data=true).
      It does not mutate external data, update internal entities, or create insights.
