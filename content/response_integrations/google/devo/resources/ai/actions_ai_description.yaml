  ai_description: >-
    Tests connectivity to the Devo instance using the provided integration configuration
    parameters.


    ### Flow Description

    1. Retrieves the API URL, API Token, API Key, API Secret, and Verify SSL parameters
    from the integration configuration.

    2. Initializes the DevoManager and forces a connectivity test by sending a basic
    query to the Devo API.

    3. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    This action does not take any action-specific parameters. It relies solely on
    the integration configuration parameters.
