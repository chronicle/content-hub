Simple Query:
  ai_description: >-
    ### General Description

    Executes a query against the Devo platform to retrieve data from a specified table.
    This action allows users to perform data retrieval by defining the target table,
    optional fields, filtering criteria, and a time frame.


    ### Flow Description

    1. Extracts configuration parameters (API URL, API Token, API Key, API Secret,
    Verify SSL) and action parameters (Table Name, Fields To Return, Where Filter,
    Time Frame, Start Time, End Time, Max rows to return).

    2. Validates the provided time frame and constructs the query string using the
    `build_devo_query` utility.

    3. Initializes the `DevoManager` and executes the query via the Devo API using
    the `run_simple_query` method.

    4. If results are returned, the action adds the JSON output and a CSV table to
    the action results.


    ### Additional Notes

    This action does not operate on entities. It requires valid API credentials configured
    in the integration settings. If 'Custom' is selected for the 'Time Frame' parameter,
    'Start Time' and 'End Time' must be provided.
