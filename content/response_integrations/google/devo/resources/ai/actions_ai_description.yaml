  ai_description: >-
    ### General Description

    Executes a simple query in Devo based on the provided parameters. This action
    retrieves data from a specified table and returns the results as a JSON object
    and a CSV data table.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Table Name | String | Yes | Specify what table should be queried. Default is
    `siem.logtrust.alert.info`. |

    | Fields To Return | String | No | Specify what fields to return. If nothing is
    provided, the action will return all fields. |

    | Where Filter | String | No | Specify the WHERE filter for the query that needs
    to be executed. |

    | Time Frame | DDL | No | Specify a time frame for the results. If 'Custom' is
    selected, you also need to provide 'Start Time'. Default is 'Last Hour'. |

    | Start Time | String | No | Specify the start time for the query. This parameter
    is mandatory if 'Custom' is selected for the 'Time Frame' parameter. Format: ISO
    8601. |

    | End Time | String | No | Specify the end time for the query. Format: ISO 8601.
    |

    | Max rows to return | String | No | Specify the max number of rows the action
    should return. Default is 50. |


    ### Additional Notes

    - Either a predefined `Time Frame` must be selected, or if `Custom` is selected,
    the `Start Time` parameter must be configured for the action to run successfully.


    ### Flow Description

    1. Validates the provided time frame and max rows to return.

    2. Builds the Devo query using the provided table name, fields to return, and
    where filter.

    3. Executes the query against the Devo API.

    4. Returns the query results as a JSON object and a CSV data table.
