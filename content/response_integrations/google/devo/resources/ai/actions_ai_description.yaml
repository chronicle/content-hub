Simple Query:
  ai_description: >-
    ### General Description

    Executes a simple query in Devo based on the provided parameters. This action
    allows users to query specific tables, filter results, and define timeframes to
    retrieve historical logs or telemetry data.


    ### Flow Description

    1. Validates the provided time frame parameters (Start Time, End Time, or predefined
    Time Frame).

    2. Constructs a Devo query string using the specified Table Name, Fields To Return,
    and Where Filter.

    3. Makes a POST request to the Devo API (`/search/query`) to execute the constructed
    query.

    4. Retrieves the query results and attaches them to the action's JSON result.

    5. Constructs a CSV data table from the results and adds it to the action's output.


    ### Additional Notes

    This action does not operate on Google SecOps entities. If it is planned to query
    a table other than `siem.logtrust.alert.info`, an additional token for that table
    must be created following the Devo documentation and specified on the integration
    configuration page.
