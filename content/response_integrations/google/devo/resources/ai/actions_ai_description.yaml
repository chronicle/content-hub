    reasoning: >-
      The action executes a query against the Devo log management system and returns
      the results. This aligns with the 'Search Events' category, as it retrieves
      historical logs or telemetry data based on the provided query.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
