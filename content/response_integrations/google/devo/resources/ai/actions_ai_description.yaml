  ai_description: >-
    Executes an advanced query against a Devo instance to retrieve logs or telemetry
    data based on provided parameters.


    ### Flow Description

    1. Validates the provided time frame and max rows to return.

    2. Constructs the query parameters including the query string, time frame, and
    limit.

    3. Sends a request to the Devo API to execute the query.

    4. Parses the results and adds them to the action's output as a JSON result and
    a CSV data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | string | True | Specify a query to execute against the Devo instance.
    Example format: 'from siem.logtrust.alert.info'. |

    | Time Frame | string | False | Specify a time frame for the results. If 'Custom'
    is selected, you also need to provide 'Start Time'. |

    | Start Time | string | False | Specify the start time for the query. This parameter
    is mandatory if 'Custom' is selected for the 'Time Frame' parameter. Format: ISO
    8601. |

    | End Time | string | False | Specify the end time for the query. Format: ISO
    8601. |

    | Max rows to return | string | False | Specify the maximum number of rows the
    action should return. Default is 50. |


    ### Additional Notes

    - This action does not work on Google SecOps entities.

    - If 'Custom' is selected for the 'Time Frame' parameter, the 'Start Time' parameter
    must be provided.
