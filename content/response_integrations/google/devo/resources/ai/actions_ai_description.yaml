Advanced Query:
  ai_description: >-
    ### General Description

    Executes an advanced query against the Devo instance using provided parameters.
    This action allows users to run custom queries to retrieve logs or telemetry data
    from Devo, which are then returned as JSON and CSV results within the action output.


    ### Flow Description

    1. Extracts integration configuration (API URL, credentials, SSL settings) and
    action parameters (Query, Time Frame, Start/End Time, Max rows).

    2. Validates the provided time frame and calculates start/end timestamps based
    on the selected option (e.g., 'Last Hour', 'Custom').

    3. Initializes the `DevoManager` with the provided credentials.

    4. Constructs query parameters including the query string, time range, and result
    limit.

    5. Executes the query via a POST request to the Devo `/search/query` endpoint.

    6. If results are returned, adds the raw JSON results to the action output and
    constructs a CSV table of the results.


    ### Additional Notes

    This action does not operate on specific entities. It requires valid Devo API
    credentials to be configured in the integration settings.
  ai_short_description: >-
    Executes an advanced query against the Devo instance and returns the results in
    JSON and CSV formats.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by querying the Devo API. It does not mutate external
      data (it is a read-only query operation) or internal SecOps data. It does not
      update entities, create insights, modify alerts, or create case comments.
  entity_usage:
