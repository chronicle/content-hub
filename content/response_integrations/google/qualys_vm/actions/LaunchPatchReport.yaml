name: Launch Patch Report
description: Launch a patch report
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/qualysvm#launch_patch_report
integration_identifier: QualysVM
parameters:
-   name: Report Title
    default_value: ''
    type: string
    description: A user-defined report title. The title may have a maximum of 128
        characters. For a PCI compliance report, the report title is provided by Qualys
        and cannot be changed.
    is_mandatory: true
-   name: Report Type
    default_value: ''
    type: string
    description: 'Template name. For example: Qualys Patch Report.'
    is_mandatory: true
-   name: Output Format
    default_value: ''
    type: string
    description: 'One output format may be specified. When output_format=pdf is specified,
        the Secure PDF Distribution may be used. e.g: pdf, online, xml or csv.'
    is_mandatory: true
-   name: IPs/Ranges
    default_value: ''
    type: string
    description: Specify IPs/ranges to change (override) the report target, as defined
        in the patch report template. Multiple IPs/ranges are comma separated.
    is_mandatory: false
-   name: Asset Groups
    default_value: ''
    type: string
    description: Asset groups.if more than one has to be comma separated.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: report_id
