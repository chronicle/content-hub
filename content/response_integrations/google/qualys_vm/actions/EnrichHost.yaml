name: Enrich Host
description: 'Enrich host with information from Qualys VM. Note: AssetView module
    is required. Supported entities: IP Address, Hostname.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/qualysvm#enrich_host
integration_identifier: QualysVM
parameters:
-   name: Create Insight
    default_value: 'true'
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the entity.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_host_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS","HOSTNAME"]}'
script_result_name: success
