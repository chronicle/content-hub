Enrich Host:
  ai_description: >-
    ### General Description

    Enriches host entities (IP Address or Hostname) using Qualys VM. It retrieves
    detailed host information, including OS, tags, and comments, and updates the entity
    with this contextual data.


    ### Flow Description

    1. Initialize the Qualys VM manager using configuration parameters.

    2. Filter target entities to include only IP Address and Hostname types.

    3. For each valid entity, query Qualys VM for host details (using IP or Hostname).

    4. If details are found, update the entity's `additional_properties` with the
    retrieved data and mark the entity as enriched.

    5. Add an entity table to the action results.

    6. Optionally, create an entity insight if the `Create Insight` parameter is enabled.

    7. Update the entities in the SOAR platform.

    8. Add the full JSON result to the action output.


    ### Additional Notes

    Requires the AssetView module in Qualys VM.
