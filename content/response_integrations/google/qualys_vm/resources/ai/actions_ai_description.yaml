Download Vm Scan Results:
  ai_description: >-
    ### General Description

    Fetches vulnerability scan results and generates a report from Qualys VM. This
    action retrieves detailed scan data for a specific scan ID, initiates a report
    generation process, and downloads the resulting report as an attachment.


    ### Flow Description

    1. Extracts the `Scan ID` parameter from the action configuration.

    2. Initializes the Qualys VM manager to interact with the Qualys API.

    3. Retrieves scan results using the `qualys_manager.get_vm_scan_results(scan_id)`
    API call.

    4. Initiates a scan report generation using the `qualys_manager.launch_scan_report(...)`
    API call.

    5. Polls the report status using the `qualys_manager.get_report(report_id)` API
    call until it reaches a finished state or an error occurs.

    6. Fetches the completed report content using the `qualys_manager.fetch_report(report_id)`
    API call.

    7. Attaches the report file to the action result.

    8. Adds the scan summary and results as data tables to the action result.

    9. Adds the raw JSON results to the action result.


    ### Additional Notes

    This action interacts with the Qualys VM API to retrieve scan data and generate
    reports. It requires a valid Scan ID in the format `scan/{integer}.{integer}`.
  ai_short_description: >-
    Fetches vulnerability scan results and generates a report from Qualys VM for a
    specified Scan ID.
