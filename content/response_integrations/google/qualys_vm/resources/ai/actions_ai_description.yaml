Launch Compliance Report:
  ai_description: >-
    ### General Description

    Launches a compliance report in the Qualys VM platform. This action allows users
    to trigger specific compliance reports by providing a report title, template type,
    and output format, with optional filtering by IP ranges, asset groups, or specific
    scan references.


    ### Flow Description

    1. The action extracts the required parameters: `Report Title`, `Report Type`,
    `Output Format`, `IPs/Ranges`, `Asset Groups`, and `Scan Reference`.

    2. It converts the `Asset Groups` parameter from a comma-separated string into
    a list.

    3. The action initializes the `QualysVMManager` to interact with the Qualys VM
    API.

    4. It iterates through the provided asset group names and calls the `list_asset_groups`
    API method to retrieve the corresponding Asset Group IDs.

    5. It calls the `get_template_id_by_name` API method to retrieve the ID for the
    specified `Report Type`.

    6. Finally, it calls the `launch_compliance_report` API method with the gathered
    parameters to initiate the report generation and returns the `Report ID`.


    ### Additional Notes

    This action performs state-changing operations on the external Qualys VM system
    by launching a report. It does not modify any internal SOAR entities or alert
    data.
  ai_short_description: >-
    Launches a compliance report in Qualys VM.
