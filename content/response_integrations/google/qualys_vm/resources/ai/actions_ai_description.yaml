Download Report:
  ai_description: >-
    ### General Description

    Fetches a specific report by its ID from Qualys VM and attaches it to the case.
    This action retrieves the report content and its metadata, making it available
    for analysts to review directly within the platform.


    ### Flow Description

    1. Retrieves the `Report ID` parameter provided by the user or previous actions.

    2. Initializes the Qualys VM manager to interact with the Qualys API.

    3. Polls the Qualys VM API using a GET request to check the status of the specified
    report.

    4. Once the report status is confirmed as 'Finished', fetches the report content
    via another GET request to the Qualys VM API.

    5. Attaches the downloaded report file to the action's results and returns the
    report metadata as JSON.


    ### Additional Notes

    If the report is not yet initiated or created in the database, the action will
    wait and retry until the report is ready or an error state is encountered.
  ai_short_description: >-
    Fetches a specific report by its ID from Qualys VM and attaches it to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Qualys VM API to fetch report status and
      content (fetches_data=true). It does not mutate external data, update internal
      entities, create insights, modify alert data, or create case comments.
