    1. Extracts action parameters including Report Title, Report Type, Output Format,
    IPs/Ranges, and Asset Groups.

    2. If Asset Groups are provided, queries the Qualys API to retrieve their corresponding
    IDs.

    3. Queries the Qualys API to retrieve the template ID based on the provided Report
    Type (Template name).

    4. Calls the Qualys API to launch the patch report with the gathered IDs and parameters.

    5. Returns the generated Report ID to the SOAR platform.


    ### Additional Notes

    The action requires a valid template name to exist in Qualys VM. The generated
