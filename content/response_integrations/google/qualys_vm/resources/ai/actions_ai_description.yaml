Launch VM Scan And Fetch Results:
  ai_description: >-
    ### General Description

    Launches a vulnerability scan on specified IP Address entities using Qualys VM.
    This action adds the target IP addresses to the Qualys platform, initiates a vulnerability
    scan with the provided configuration (scan title, priority, profile, scanner appliance,
    and network), and updates the entities within the SOAR platform with the resulting
    scan reference ID.


    ### Flow Description

    1. **Parameter Extraction**: Extracts the scan configuration parameters: `Title`,
    `Processing Priority`, `Scan Profile`, `Scanner Appliance`, and `Network`.

    2. **Entity Filtering**: Filters the `target_entities` to include only those of
    type `ADDRESS`.

    3. **IP Registration**: Iterates through the filtered entities and adds each IP
    address to the Qualys platform using the `qualys_manager.add_ip` method.

    4. **Scan Initiation**: Launches the VM scan via the `qualys_manager.launch_vm_scan`
    method, passing the scan configuration and the list of registered IP addresses.

    5. **Entity Update**: Updates the processed entities in the SOAR platform by adding
    the `qualys_last_scan_id` to their `additional_properties` and setting the `is_enriched`
    flag to `True`.

    6. **Asynchronous Handling**: The action supports an asynchronous `wait_for_results`
    flow, which can be triggered to poll for scan completion and fetch the resulting
    report data.


    ### Additional Notes

    This action is designed to be asynchronous. While the primary `main` function
    initiates the scan, the `wait_for_results` function is available to handle the
    polling and retrieval of scan results once the scan is completed in Qualys.
