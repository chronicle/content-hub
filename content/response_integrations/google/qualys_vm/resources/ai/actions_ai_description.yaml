Download Report:
  ai_description: >-
    ### General Description

    Fetches a report from Qualys VM by its ID. This action retrieves the report status,
    waits for it to be completed if necessary, and then downloads the report content.


    ### Flow Description

    1. Extracts the `Report ID` parameter from the action configuration.

    2. Initializes the Qualys VM manager using the provided integration credentials.

    3. Polls the Qualys API using the `get_report` method to check the report's status.

    4. If the report is not yet finished, the action waits and retries until the report
    reaches a finished state or an error state.

    5. Once the report is finished, it downloads the report content using the `fetch_report`
    method.

    6. Attaches the downloaded report file to the action results and adds the report
    metadata as a JSON result.


    ### Additional Notes

    The action includes a polling mechanism to handle reports that are still being
    generated in Qualys VM, ensuring the action waits for the report to be ready before
    attempting to download it.
  ai_short_description: >-
    Fetches a report from Qualys VM by its ID and attaches it to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Qualys API to fetch report status and content.
      It does not mutate external or internal data, but it does attach the retrieved
      file to the action results.
