List Scans:
  ai_description: >-
    General Description

    Lists scans launched within the past 30 days from Qualys VM. This action retrieves
    a list of scan records from the Qualys VM platform, processes the data by masking
    sensitive user information, and presents the results in both a structured CSV
    table and a JSON format.


    Flow Description

    1. Initialize the Qualys VM manager using the integration configuration.

    2. Call the `list_scans` method, which performs a GET request to the Qualys API
    (`/api/3.0/fo/scan/`) to retrieve scan data.

    3. Iterate through the returned scan records and mask the `USER_LOGIN` field for
    security.

    4. Construct a CSV table of the scan results and add it to the action results.

    5. Add the raw JSON results to the action results.


