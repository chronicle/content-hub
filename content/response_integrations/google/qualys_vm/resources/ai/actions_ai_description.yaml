Launch Scan Report:
  ai_description: >-
    General Description

    Launches a scan report in Qualys VM based on the provided configuration parameters.
    This action interacts with the Qualys VM API to initiate report generation, allowing
    users to specify report titles, types, output formats, and target assets (IPs
    or Asset Groups).


    Flow Description

    1. The action extracts the required parameters: Report Title, Report Type, Output
    Format, IPs/Ranges, Asset Groups, and Scan Reference.

    2. The QualysVM manager is initialized using the integration configuration.

    3. The action converts the provided 'Asset Groups' string into a list and iterates
    through them to retrieve their corresponding IDs from Qualys using the `list_asset_groups`
    API call.

    4. The action retrieves the Template ID from Qualys based on the provided 'Report
    Type' using the `get_template_id_by_name` API call.

    5. The action calls the `launch_scan_report` API method with the collected parameters
    (Report Title, Template ID, Output Format, IPs, Asset Group IDs, and Scan Reference)
    to initiate the report.

    6. The resulting Report ID is returned as the action output.


    Additional Notes

    This action does not operate on specific entities and does not require any target
    entities to be selected in the SOAR platform.
