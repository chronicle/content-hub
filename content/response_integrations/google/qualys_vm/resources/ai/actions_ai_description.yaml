Launch Patch Report:
  ai_description: >-
    ### General Description

    Launches a patch report in the Qualys VM platform. This action allows users to
    initiate a patch report by specifying a report title, template, output format,
    and optional target scope (IPs/Ranges or Asset Groups).


    ### Flow Description

    1. Extracts action parameters: `Report Title`, `Report Type`, `Output Format`,
    `IPs/Ranges`, and `Asset Groups`.

    2. Initializes the Qualys VM manager using the provided integration configuration.

    3. Converts the `Asset Groups` parameter from a comma-separated string into a
    list.

    4. Iterates through the provided asset group names and calls the Qualys API (`list_asset_groups`)
    to retrieve their corresponding IDs.

    5. Retrieves the `template_id` from Qualys based on the provided `Report Type`
    (template name).

    6. Calls the Qualys API (`launch_patch_report`) to initiate the report generation
    with the specified title, template ID, output format, IPs, and asset group IDs.

    7. Returns the generated `report_id` as the action result.


    ### Additional Notes

    This action interacts with the Qualys VM API to trigger report generation. It
    does not perform any modifications to internal SOAR entities or alert data.
