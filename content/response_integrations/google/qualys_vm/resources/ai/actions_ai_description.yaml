    ### General Description

    Retrieves a list of scans launched within the past 30 days from Qualys VM. This
    action interacts with the Qualys VM API to fetch scan metadata and returns the
    results in both JSON and CSV formats.


    ### Flow Description

    1. Initializes the Qualys VM manager using the provided integration configuration.

    2. Makes an API call to Qualys VM to retrieve a list of scans launched in the
    past 30 days.

