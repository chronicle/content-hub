List Reports:
  ai_description: >-
    ### General Description

    Lists all reports available in the QualysVM account, specifically when the Report
    Share feature is enabled. This action retrieves a comprehensive list of report
    types, including scorecard reports, and presents them in the action results.


    ### Flow Description

    1. The action initializes the QualysVM manager using the integration configuration
    parameters (API Root, Username, Password, etc.).

    2. It calls the `list_reports` method on the QualysVM manager to fetch the report
    data from the QualysVM API.

    3. If reports are successfully retrieved:
        - The report data is converted into a CSV format.
        - The CSV data is added to the action result as a data table named "Reports".
        - The raw report data is serialized to JSON and added to the action result.
        - A success message is generated indicating the number of reports found.
    4. If no reports are found, an appropriate message is returned.

    5. Any errors encountered during the process are caught, logged, and the action
    is marked as failed.


