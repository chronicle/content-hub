Enrich Host:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using Qualys VM. This action retrieves
    host details such as OS, NetBIOS name, DNS domain, and tags from Qualys VM to
    provide contextual metadata about the asset. It updates the entities with this
    information and can optionally generate an insight.


    ### Flow Description

    1. Extracts the `Create Insight` parameter.

    2. Filters the target entities to include only IP Addresses and Hostnames.

    3. Iterates over the suitable entities.

    4. For IP Addresses, makes an API call to Qualys VM (`/api/2.0/fo/asset/host/`)
    to fetch host details.

    5. For Hostnames, makes an API call to Qualys VM (`/api/2.0/fo/asset/host/`) to
    fetch hostname details.

    6. If details are found, enriches the entity's additional properties with the
    retrieved data and marks it as enriched.

    7. Creates an entity table with the host details.

    8. If `Create Insight` is enabled, generates an insight with the host information.

    9. Updates the enriched entities in the platform and returns the results as JSON.


    ### Additional Notes

    The AssetView module is required in Qualys VM for this action to function correctly.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving contextual host details
    such as OS, NetBIOS name, and DNS information from Qualys VM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches host details from Qualys VM using GET requests (fetches_data=true).
      It does not mutate any external data. Internally, it updates the entities with
      the fetched data (can_update_entities=true) and optionally creates insights
      (can_create_insight=true). It does not modify alert data or create case comments.
