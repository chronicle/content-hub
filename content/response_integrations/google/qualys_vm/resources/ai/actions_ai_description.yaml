Download Vm Scan Results:
  ai_description: >-
    ### General Description

    Fetches vulnerability scan results and generates a scan report from Qualys VM
    based on a provided Scan ID. The action retrieves the raw scan data, triggers
    the creation of a PDF report, and attaches the final report and data tables to
    the case.


    ### Flow Description

    1. Retrieves the `Scan ID` from the action parameters.

    2. Calls the Qualys VM API (`/api/3.0/fo/scan/`) to fetch the raw scan results.

    3. Initiates the generation of a PDF scan report on the Qualys VM platform by
    calling the report launch API (`/api/3.0/fo/report/`).

    4. Polls the Qualys VM API to check the status of the report generation until
    it is completed or the execution deadline is reached.

    5. Downloads the generated PDF report and attaches it to the action's results.

    6. Parses the raw scan results and adds them as data tables and JSON results to
    the action output.


    ### Additional Notes

    The action will block and wait while polling for the report to finish generating.
    Ensure the execution timeout is configured appropriately to allow for long-running
    report generations.
  ai_short_description: >-
    Fetches vulnerability scan results and generates a downloadable PDF scan report
    from Qualys VM using a specific Scan ID.
