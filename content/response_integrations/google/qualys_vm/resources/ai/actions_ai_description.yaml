Launch VM Scan And Fetch Results:
  ai_description: >-
    ### General Description

    Launches a vulnerability scan on specified IP Address entities using Qualys VM
    and fetches the scan results. This action automatically adds new hosts to Qualys
    as assets before initiating the scan.


    ### Flow Description

    1. Filters target entities to include only IP Addresses.

    2. Iterates through the filtered entities and adds each IP address to Qualys as
    an asset.

    3. Initiates a VM scan on the specified IP addresses using the provided scan profile
    and priority.

    4. Updates the entities with the scan reference ID and marks them as enriched.

    5. In an asynchronous wait step, checks the status of the scan.

    6. Once completed, fetches the scan results and report.

    7. Attaches the report as a file, adds data tables for the report summary and
    scan results, and attaches the JSON results to the action.


    ### Additional Notes

    The number of hosts that can be added depends on the Qualys subscription license
    limit.
