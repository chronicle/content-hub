name: Microsoft Graph Office 365 Security and Compliance Connector
parameters:
-   name: DeviceProductField
    default_value: ProductFieldName
    type: string
    description: NOT SUPPORTED | Describes the name of the field where the product
        name is stored.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: event_class
    type: string
    description: NOT SUPPORTED | Describes the name of the field where the event name
        is stored.
    is_mandatory: false
    is_advanced: true
    mode: regular
-   name: PythonProcessTimeout
    default_value: 30
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the Environment Field
        Name field.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client (Application) ID that was added for the app registration in
        Azure Active Directory for this integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Secret that was entered for Azure AD app registration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Certificate Path
    default_value: ''
    type: string
    description: If authentication based on certificates is used instead of client
        secret, specify path to the certificate on Siemplify server.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Certificate Password
    default_value: ''
    type: password
    description: Optional, if certificate is password-protected, specify the password
        to open the certificate file.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Azure Active Directory ID
    default_value: ''
    type: string
    description: Azure Active Directory Tenant ID
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use V2 API
    default_value: false
    type: boolean
    description: 'If enabled, connector will use V2 API endpoints. Note: the structure
        of the alerts and events will change.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Offset Time In Hours
    default_value: '120'
    type: integer
    description: Fetch alerts from X hours backwards.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Statuses to fetch
    default_value: Dismissed, Active, Investigating, Resolved
    type: string
    description: Specify statuses of the alerts that should be fetched by the Siemplify
        server. Values should be comma separated.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Alert Severities to fetch
    default_value: high, medium, low, informational, unknown
    type: string
    description: Specify severities of the alerts that should be fetched by the Siemplify
        server. Values should be comma separated.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: '50'
    type: integer
    description: How many alerts should be processed during one connector run.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Deprecation Notice! This connector is planned to be deprecated on 30th
    March 2027. Visit documentation for more information. Ingest Office 365 Security
    and Compliance alerts using Graph API
integration: MicrosoftGraphSecurity
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-security#microsoft-graph-office-365-security-and-compliance-connector
rules: []
is_connector_rules_supported: true
creator: admin
