[project]
name = "microsoft-graph-security"
version = "27.0"
description = "Microsoft Graph Security provide integrating with Intelligent Security Graph providers that enable your app to retrieve alerts and update alert lifecycle properties"
requires-python = ">=3.11,<3.12"
dependencies = [
    "pyjwt>=2.8.0",
    "tipcommon",
    "environmentcommon",
    "requests==2.32.5"
]

[dependency-groups]
dev = [
    "pytest-mock",
    "integration-testing",
    "pytest>=9.1.0",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
    "pyyaml"
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.1-py2.py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.4.1-py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.4.1-py3-none-any.whl"
