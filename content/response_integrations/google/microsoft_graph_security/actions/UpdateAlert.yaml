name: Update Alert
description: Update an editable alert property
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-security#update_alert
integration_identifier: MicrosoftGraphSecurity
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: The ID of the alert to update.
    is_mandatory: true
-   name: Assigned To
    default_value: ''
    type: string
    description: Name of the analyst the alert is assigned to for triage, investigation,
        or remediation.
    is_mandatory: false
-   name: Closed Date Time
    default_value: ''
    type: string
    description: 'Time at which the alert was closed. The Timestamp type represents
        date and time information using ISO 8601 format and is always in UTC time.
        For example, midnight UTC on Jan 1, 2014 would look like this: ''2014-01-01T00:00:00Z''.
        Note: this parameter is not supported in the V2 version of API.'
    is_mandatory: false
-   name: Comments
    default_value: ''
    type: string
    description: 'Analyst comments on the alert (for customer alert management), separated
        by comma. This method can update the comments field with the following values
        only: Closed in IPC, Closed in MCAS. Note: in V2 version of API this parameter
        works as a string and a single comment will be added to the Alert.'
    is_mandatory: false
-   name: Feedback
    default_value: ''
    type: string
    description: 'Analyst feedback on the alert. Possible values are: unknown, truePositive,
        falsePositive, benignPositive. Note: in V2 version of API this parameter is
        mapped to "classification" and has the following possible values: unknown,
        falsePositive, truePositive, informationalExpectedActivity, unknownFutureValue.'
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: 'Alert lifecycle status (stage). Possible values are: unknown, newAlert,
        inProgress, resolved.'
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: 'User-definable labels that can be applied to an alert. Separated
        by comma. Note: this parameter is not supported in the V2 version of API.'
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: is_updated
