name: Kill User Session
description: The action invalidates all the refresh tokens issued to applications
    for a user, by resetting the signInSessionsValidFromDateTime user property to
    the current date-time.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-security#kill_user_session
integration_identifier: MicrosoftGraphSecurity
parameters:
-   name: userPrincipalName | ID
    default_value: ''
    type: string
    description: The user's username used during sign in or the user Unique ID provided
        by Azure AD
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
