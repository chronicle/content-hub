Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic utility designed to verify the connectivity and
    authentication configuration between Google SecOps and Microsoft Graph Security.
    Its primary purpose is to ensure that the integration can successfully communicate
    with the Microsoft Graph API using the provided credentials and Tenant information.


    ### Flow Description

    1. **Initialization:** The action extracts all configuration parameters from the
    integration settings.

    2. **Configuration Setup:** It constructs a configuration object containing the
    credentials and connection settings.

    3. **Connection Test:** It attempts to initialize the `MicrosoftGraphSecurityManager`.
    During initialization, the manager performs an OAuth2 handshake with the Microsoft
    identity platform to retrieve an access token.

    4. **Validation:** If the token is successfully retrieved, the connection is validated
    as established. If an error occurs, the action captures the exception and reports
    a failure.


    ### Additional Notes

    - **Authentication Requirement:** The action requires either a Secret ID or a
    valid Certificate Path (and password) to successfully authenticate. If both are
    missing or incorrect, the connectivity test will fail.

    - **No Entity Interaction:** This action does not interact with or process any
    entities within a case.
  ai_short_description: >-
    Verifies the connectivity and authentication configuration between Google SecOps
    and Microsoft Graph Security.
