Get Administrator Consent:
  ai_description: >-
    ### General Description

    The **Get Administrator Consent** action is a utility designed to facilitate the
    initial setup and permission-granting process for the Microsoft Graph Security
    integration. It generates a specific Azure Active Directory (Azure AD) authorization
    URL. An administrator must browse to this generated URL to provide 'Admin Consent'
    for the application's requested scopes, which is a prerequisite for the integration
    to interact with the Microsoft Graph API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Client ID` and `Tenant`
    from the integration's global configuration and the `Redirect URL` from the action's
    input parameters.

    2. **URL Construction**: It formats the standard Microsoft admin consent URL using
    the retrieved `Tenant`, `Client ID`, and `Redirect URL` values.

    3. **Result Delivery**: The action adds the generated URL as a clickable link
    in the Google SecOps interface using the `add_link` method.

    4. **Execution Completion**: The action finishes by providing an output message
    instructing the user to visit the link to complete the consent process in their
    browser.


    ### Additional Notes

    This action does not perform any external API calls or network requests. It is
    strictly a URL generator to assist with manual configuration steps required by
    Azure AD.
