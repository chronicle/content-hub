Kill User Session:
  ai_description: >-
    ### General Description

    The **Kill User Session** action immediately invalidates all active refresh tokens
    issued to applications for a specific user within Microsoft Entra ID (Azure AD).
    By calling the Microsoft Graph API's `revokeSignInSessions` endpoint, it resets
    the `signInSessionsValidFromDateTime` property to the current time, effectively
    forcing the user to re-authenticate across all devices and applications. This
    provides a critical containment capability during account compromise or suspicious
    activity.


    ### Flow Description

    1. **Initialization**: Initializes the Microsoft Graph Security Manager using
    the provided integration configuration (Client ID, Tenant, etc.).

    2. **Parameter Extraction**: Retrieves the `userPrincipalName | ID` from the action
    parameters.

    3. **API Execution**: Sends a POST request to the Microsoft Graph API `revokeSignInSessions`
    endpoint for the specified user.

    4. **Validation**: Validates the response from Microsoft Graph to ensure the session
    revocation was successful.

    5. **Completion**: Reports a successful status if the tokens were invalidated,
    or a failure status if an error occurred.


    ### Additional Notes

    - This action does not target SecOps entities directly; it requires the user identifier
    to be provided as a manual input or mapped from a previous playbook step.

    - The action performs a state-changing operation in the external Microsoft environment.
  ai_short_description: >-
    Invalidates all active refresh tokens and sign-in sessions for a specific user
    in Microsoft Entra ID (Azure AD), forcing re-authentication.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Revokes all active sign-in sessions and refresh tokens for a specific user in
      Microsoft Entra ID (Azure AD).
    fetches_data: false
