List Incidents:
  ai_description: >-
    ### General Description

    This action retrieves a list of security incidents from Microsoft Graph Security
    based on user-defined filtering criteria. It is designed to provide visibility
    into security incidents managed within the Microsoft ecosystem, allowing analysts
    to search for specific incidents by ID or severity and view their details directly
    within Google SecOps.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Validates the provided filter parameters to ensure logical consistency (e.g.,
    if a value is provided, the key and logic must also exist) and checks the record
    limit.

    3. Constructs an OData filter query based on the provided criteria.

    4. Sends a GET request to the Microsoft Graph `/security/incidents` endpoint to
    retrieve the incidents.

    5. Paginates through the results if the number of incidents exceeds the API's
    single-page limit but is less than the requested maximum.

    6. Processes the retrieved incidents into a JSON result and a CSV-formatted data
    table, which is then attached to the case wall.


    ### Additional Notes

    - If a **Filter Value** is provided, both **Filter Key** and **Filter Logic**
    must also be configured; otherwise, the action will fail validation.

    - The `Contains` logic is not supported when filtering by the `severity` key.

    - Results are returned as a JSON object and also rendered as a data table on the
    case wall.
  ai_short_description: >-
    Retrieves a list of security incidents from Microsoft Graph Security based on
    user-defined filtering criteria.
