Get Incident:
  ai_description: >-
    ### General Description

    The **Get Incident** action retrieves comprehensive details for a specific security
    incident from Microsoft Graph Security using its unique Incident ID. This action
    allows analysts to fetch metadata such as the incident's display name, status,
    severity, assigned user, and associated comments, providing critical context for
    investigation and response workflows.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Incident ID` from the action
    parameters.

    2. **API Client Initialization**: It initializes the Microsoft Graph Security
    API client using the provided integration configuration.

    3. **Data Retrieval**: The action sends a GET request to the Microsoft Graph Security
    incidents endpoint (`/security/incidents/{incident_id}`).

    4. **Response Parsing**: The raw JSON response is parsed into a structured `Incident`
    data model.

    5. **Result Output**: The full incident details are returned as a JSON result,
    and a formatted data table containing key incident attributes is added to the
    case wall.


    ### Additional Notes

    - This action requires the Microsoft Graph Security integration to be configured
    with valid credentials.

    - If the provided Incident ID does not exist in the target system, the action
    will return an error indicating the incident was not found.
