Get Alert:
  ai_description: >-
    ### General Description

    The **Get Alert** action retrieves the comprehensive properties and relationships
    of a specific alert from Microsoft Graph Security using its unique Alert ID. This
    action allows analysts to fetch deep contextual metadata about an alert, including
    associated user states, host states, network connections, and malware information,
    which is then presented in a structured format within the case.


    ### Flow Description

    1. **Authentication**: The action authenticates with the Microsoft Graph API using
    the configured credentials.

    2. **API Version Selection**: Depending on the "Use V2 API" configuration, the
    action initializes either the standard or V2 version of the Microsoft Graph Security
    Manager.

    3. **Data Retrieval**: The action executes a GET request to the Microsoft Graph
    Security endpoint to fetch the details of the alert specified by the **Alert ID**.

    4. **Internal Data Processing**: If the alert is found, the raw JSON data is parsed.
    A data table is generated from the alert's properties and attached to the case
    wall.

    5. **Completion**: The action returns the full raw JSON of the alert as a result
    and completes with a success message.


    ### Additional Notes

    None.
