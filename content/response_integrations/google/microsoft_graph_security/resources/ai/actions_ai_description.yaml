    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific alert in Microsoft Graph Security.
    fetches_data: false
    internal_data_mutation_explanation:
    reasoning: >-
      The action makes a POST request to Microsoft Graph Security to add a comment
      to an alert, which mutates external data. It does not fetch data for enrichment,
      nor does it mutate internal SecOps data, update entities, or create insights.
