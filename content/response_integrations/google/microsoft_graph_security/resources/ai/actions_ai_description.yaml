Add Alert Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alert in Microsoft Graph Security. This action allows
    analysts to document findings or updates directly within the Microsoft Graph Security
    platform from Google SecOps.


    ### Flow Description

    1. Extracts the Alert ID and Comment from the action parameters.

    2. Validates that the comment length does not exceed the 1000-character limit.

    3. Initializes the Microsoft Graph Security Manager with the provided credentials.

    4. Makes a POST request to the Microsoft Graph Security API (`alerts_v2/{alert_id}/comments`)
    to append the comment to the specified alert.

    5. Returns a success message if the comment is added, or raises an error if the
    alert is not found.


    ### Additional Notes

    - The comment length is strictly limited to 1000 characters as per the Microsoft
    Graph API limitations.

    - This action specifically targets the `alerts_v2` endpoint in Microsoft Graph
    Security.
  ai_short_description: >-
    Adds a comment to a specific alert in Microsoft Graph Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
