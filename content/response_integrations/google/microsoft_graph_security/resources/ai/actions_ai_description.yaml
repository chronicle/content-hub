Update Alert:
  ai_description: >-
    ### General Description

    Updates editable properties of an alert in Microsoft Graph Security to keep alert
    status and assignments in sync across solutions. This action supports both the
    V1 and V2 versions of the Microsoft Graph Security API, allowing for updates to
    status, assignment, feedback, and comments.


    ### Flow Description

    1. **Initialization**: Establishes a connection to Microsoft Graph Security using
    the configured authentication method (Client Secret or Certificate).

    2. **Validation**: Checks the provided `Status` and `Feedback` parameters against
    the allowed values defined for the active API version (V1 or V2).

    3. **Data Preparation**:
        - **V1 Flow**: Fetches the current alert details to obtain mandatory vendor
    information and processes comma-separated tags and comments.
        - **V2 Flow**: Maps the `Status` and `Feedback` (classification) to the V2-specific
    schema. 4. **Execution**:
        - **V2 Flow**: If a comment is provided, it is posted to the alert's comment
    endpoint first.
        - Sends a PATCH request to the Microsoft Graph Security API (v1.0/security/alerts
    or v1.0/security/alerts_v2) with the updated fields. 5. **Completion**: Evaluates
    the API response and returns a success or failure status to the Google SecOps
    platform.


    ### Additional Notes

    - The action's logic and supported parameters vary based on the "Use V2 API" configuration
    setting.

    - In V1 mode, the action performs an initial GET request to retrieve alert details
    (specifically vendor information) before applying the update.

    - In V2 mode, comments are handled via a separate POST request to the Microsoft
    Graph Security comments endpoint.
  ai_short_description: >-
    Updates editable properties of an alert in Microsoft Graph Security to keep alert
    status and assignments in sync across solutions.
