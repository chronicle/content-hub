name: Upload File
description: Upload files for analysis
integration_identifier: CheckPointSandBlast
parameters:
-   name: File Path
    default_value: ''
    type: string
    description: The full path of the file to upload. For multiple, use comma separated
        values.
    is_mandatory: true
-   name: Enable Threat Emulation feature
    default_value: ''
    type: boolean
    description: If enabled, threat emulation feature will be enabled for the upload.
        By default, if no features are selected, threat emulation will be used.
    is_mandatory: false
-   name: Enable AntiVirus feature
    default_value: ''
    type: boolean
    description: If enabled, antivirus feature will be enabled for the upload. By
        default, if no features are selected, threat emulation will be used.
    is_mandatory: false
-   name: Enable Threat Extraction feature
    default_value: ''
    type: boolean
    description: If enabled, threat extraction feature will be enabled for the upload.
        By default, if no features are selected, threat emulation will be used.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/upload_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
