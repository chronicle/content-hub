    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action uploads a file to a sandbox/analysis engine (CheckPoint SandBlast)
      for threat emulation and antivirus scanning. This directly aligns with the 'Submit
      File' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: true
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Uploads one or more files to CheckPoint SandBlast for security analysis. The action
    allows users to specify which analysis features to enable, such as Threat Emulation,
    AntiVirus, and Threat Extraction, and returns the upload status for each file.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Path | String | Yes | The full local path of the file to upload. For multiple
    files, use comma-separated values. |

    | Enable Threat Emulation feature | Boolean | No | If enabled, the threat emulation
    feature will be used for the upload. |

    | Enable AntiVirus feature | Boolean | No | If enabled, the antivirus feature
    will be used for the upload. |

    | Enable Threat Extraction feature | Boolean | No | If enabled, the threat extraction
    feature will be used for the upload. |


    ### Additional Notes

    - If no specific features are selected, Threat Emulation will be enabled by default.

    - A maximum of 5 files can be uploaded in a single execution. Any additional files
    will be ignored.

    - Files exceeding the maximum allowed size of 100MB will be skipped.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Parses the provided file paths and validates them against maximum count and
    size limits.

    3. Iterates through the valid file paths and uploads each file to the CheckPoint
    SandBlast server via a POST request.

    4. Evaluates the response to determine if the upload was successful or failed.

    5. Aggregates the raw JSON responses and outputs a summary message detailing the
    successful and failed uploads.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads files to the CheckPoint SandBlast server for analysis.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action uploads files to an external system (CheckPoint SandBlast) via a
      POST request, which mutates external data by storing the file for analysis.
      It does not fetch contextual data for entities, nor does it mutate internal
      SecOps data such as updating entities, creating insights, or adding case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by uploading a file to a sandbox and does not
      fetch data or run on entities, so it is not an Enrichment action. It does not
      perform any containment, blocking, or identity revocation, so it is not a Remediation
      action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or interact with `siemplify.target_entities`.
      It operates solely on the file paths provided in the action parameters.
