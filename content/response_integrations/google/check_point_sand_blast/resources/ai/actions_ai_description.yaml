Query:
  ai_description: >-
    ### General Description

    Queries CheckPoint SandBlast to retrieve threat reputation and analysis information
    for File Hash entities. This action fetches Threat Emulation and Anti-Virus reports
    for the specified hashes, enriches the entities with the results, and updates
    their suspicious status based on the findings.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash entities.

    2. Validates the hash type (MD5, SHA1, or SHA256) for each entity.

    3. Makes an API call to the CheckPoint SandBlast `/query` endpoint to retrieve
    the analysis status and reports for each hash.

    4. If the scan is still running, the action pauses and waits for completion (asynchronous
    execution).

    5. Once completed, it evaluates the Threat Emulation and Anti-Virus responses.

    6. Enriches the entities with the retrieved data and marks them as suspicious
    if the verdict is malicious or the severity meets the configured threshold.

    7. Updates the entities in the platform and attaches the raw JSON results.


    ### Additional Notes

    - The action runs asynchronously and will wait if the analysis is still in progress
    on the CheckPoint SandBlast side.

    - Supported hash types are MD5, SHA1, and SHA256.
  ai_short_description: >-
    Queries CheckPoint SandBlast to retrieve threat reputation and analysis reports
    for File Hash entities, enriching them with Threat Emulation and Anti-Virus data
    and updating their suspicious status based on the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
