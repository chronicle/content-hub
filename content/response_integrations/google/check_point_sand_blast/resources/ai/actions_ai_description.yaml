Upload File:
  ai_description: >-
    ### General Description

    Uploads one or more files to Check Point SandBlast for analysis. This action allows
    users to submit files to the sandbox and specify which analysis features (Threat
    Emulation, AntiVirus, Threat Extraction) should be applied.


    ### Flow Description

    1. Extracts the provided file paths and the selected analysis feature flags.

    2. Validates each file path to ensure the file exists and does not exceed the
    maximum allowed size.

    3. Iterates through the valid files and makes a POST request to the Check Point
    SandBlast API (`/upload` endpoint) to submit each file along with the requested
    features.

    4. Collects the upload status and raw JSON response for each file.

    5. Returns a summary message indicating which files were successfully uploaded
    and which failed, along with the raw JSON results.


    ### Additional Notes

    - The action supports uploading multiple files by providing a comma-separated
    list of file paths in the 'File Path' parameter.

    - A maximum of 5 files can be uploaded at a time. If more are provided, only the
    first 5 will be processed.

    - The maximum allowed file size is 100 MB.
  ai_short_description: >-
    Uploads one or more files to Check Point SandBlast for analysis and returns the
    upload status.
