Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Check Point SandBlast service using the provided API
    credentials. This action verifies that the integration is correctly configured
    and can communicate with the external SandBlast API.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and retrieve integration configuration parameters
    (`API Root`, `API Key`, and `Verify SSL`) from the integration settings.

    2. Instantiate the `SandBlastManager` using the retrieved configuration.

    3. Execute the `test_connectivity` method, which performs a sample query to the
    Check Point SandBlast API to validate the connection.

    4. Return a success or failure message based on the API response, updating the
    execution state accordingly.


    ### Additional Notes

    This action is strictly for verifying the integration configuration and does not
    process any entities or perform data enrichment.
  ai_short_description: >-
    Tests connectivity to the Check Point SandBlast service.
