    reasoning: >-
      This is a Ping action used solely to test connectivity to the Check Point SandBlast
      server. It does not perform any security operations, enrich data, update alerts,
      or interact with external systems in a way that matches any of the defined product
      categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
