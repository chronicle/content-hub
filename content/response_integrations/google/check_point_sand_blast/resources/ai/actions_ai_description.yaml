Upload File:
  ai_description: >-
    ### General Description

    Uploads files to the Check Point SandBlast service for security analysis. This
    action allows users to submit files for threat emulation, antivirus scanning,
    and threat extraction to identify potential malicious content.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, SSL verification) to
    establish a connection with the Check Point SandBlast service.

    2. Extracts action parameters, including the file path(s) and optional security
    features (Threat Emulation, AntiVirus, Threat Extraction).

    3. Validates that the provided file paths exist and that the file sizes do not
    exceed the 100MB limit.

    4. Iterates through the validated file paths and performs a POST request to the
    SandBlast `/upload` endpoint for each file, including the selected features.

    5. Processes the response from the service to determine the upload status.

    6. Adds the analysis results to the action result JSON and returns a summary message
    indicating which files were successfully uploaded and which failed.


    ### Additional Notes

    - Supports up to 5 files per execution.

    - If no features are selected, Threat Emulation is enabled by default.
