    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches threat intelligence data from CheckPoint SandBlast using
      a POST request to the `/query` endpoint. It does not mutate external data. It
      updates internal entities with the retrieved enrichment data and suspicious
      status by calling `siemplify.update_entities`.
