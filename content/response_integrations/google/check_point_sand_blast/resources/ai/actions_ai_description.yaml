    filters_by_modification_time: false
    reasoning: >-
      The action does not interact with or process any entities. It does not reference
      `siemplify.target_entities` and the simulation data specifies an empty entity
      list.
Query:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action queries Check Point SandBlast for a file hash to retrieve threat
      emulation and anti-virus reputation data. This directly aligns with the 'Enrich
      IOC' expected outcome. It does not submit a file for detonation (it only queries
      the hash), nor does it perform any blocking, ticketing, or asset enrichment.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Queries Check Point SandBlast to retrieve threat reputation and analysis information
    for FILEHASH entities. The action fetches Threat Emulation and Anti-Virus data,
    enriches the entities with the results, and can mark them as suspicious based
    on the returned verdict or severity threshold.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | Marks the entity as suspicious if the returned severity
    from the Anti-Virus response is equal to or greater than this value. Default is
    0. |


    ### Action Flow

    1. Iterates through the target entities and filters for FILEHASH types.

    2. Queries Check Point SandBlast for Threat Emulation and Anti-Virus features
    for each hash.

    3. If a scan is still running, the action suspends and waits for completion (asynchronous
    execution).

    4. Once completed, enriches the entities with the retrieved threat data.

    5. Evaluates the `Threshold` parameter and the combined verdict to determine if
    the entity should be marked as suspicious.

    6. Updates the entities in Google SecOps and attaches the raw JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data (Threat Emulation and Anti-Virus information)
      and marks them as suspicious if they meet the severity threshold or have a malicious
      verdict.
    reasoning: >-
      The action fetches data from Check Point SandBlast using the '/query' endpoint
      to get threat emulation and AV data for file hashes. It does not mutate any
      external data. Internally, it updates the entities with the fetched enrichment
      data and potentially marks them as suspicious. It does not create insights,
      modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action's primary purpose is to fetch threat intelligence data for file hashes.
      It does not mutate external state and only performs allowed internal mutations
      (updating entities). Therefore, it is classified as an Enrichment action. It
      does not perform any containment, blocking, or identity-based remediation, so
      it is not a Remediation action.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over 'siemplify.target_entities' and explicitly filters them
      using 'if entity.entity_type not in SUPPORTED_ENTITIES:', where SUPPORTED_ENTITIES
      is defined as '[EntityTypes.FILEHASH]'. Thus, it filters by entity type and
      runs exclusively on FILEHASH entities.
