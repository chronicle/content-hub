  ai_description: >-
    Tests connectivity to the Check Point SandBlast server using the provided integration
    configuration parameters.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration configuration parameters (API Root, API Key, Verify SSL).


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the SandBlastManager with the provided credentials.

    3. Sends a test query with a hardcoded hash to the Check Point SandBlast server
    to verify connectivity.

    4. Returns a success message if the connection is established and the query succeeds,
    otherwise returns an error message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a Ping script designed to test connectivity. It queries a hardcoded
      hash but does not fetch contextual data for alerts or entities (fetches_data=false).
      It does not perform any operations that mutate external systems (can_mutate_external_data=false)
      or internal SecOps data (can_mutate_internal_data=false).
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping' and its sole purpose is to test connectivity. According
      to the enrichment rules, Ping actions must not be categorized as enrichment
      actions. It also does not perform any remediation tasks.
    remediation: false
  entity_usage:
