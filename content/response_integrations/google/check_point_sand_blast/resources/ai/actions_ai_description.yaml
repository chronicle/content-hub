Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Check Point SandBlast server to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the SandBlastManager.

    3. Executes a test query to the Check Point SandBlast API using a hardcoded hash
    to verify connectivity.

    4. Returns a success message if the API responds correctly, or an error message
    if the connection fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to validate
    credentials and network access.
  ai_short_description: >-
    Tests connectivity to the Check Point SandBlast server to ensure the integration
    is configured correctly.
  capabilities:
