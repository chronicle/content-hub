Query:
  ai_description: >-
    ### General Description

    Queries Check Point SandBlast for threat reputation information regarding file
    hash entities. This action retrieves threat emulation and anti-virus data to assess
    the risk associated with specific file hashes.


    ### Flow Description

    1. Initialize integration parameters, including API Root, API Key, Verify SSL,
    and the severity Threshold.

    2. Iterate through the target entities, filtering specifically for `FILEHASH`
    types.

    3. Validate the hash type (MD5, SHA1, or SHA256) for each entity.

    4. Call the Check Point SandBlast API (`manager.query`) to retrieve threat emulation
    and anti-virus data for the hash.

    5. Check if the scan is still running; if so, set the execution state to `INPROGRESS`
    and wait for completion.

    6. If the scan is complete, enrich the entity with threat emulation and anti-virus
    information.

    7. Update the entity's `is_enriched` status and set `is_suspicious` if the threat
    severity meets or exceeds the configured threshold.

    8. Update the entities in the SOAR platform and add the raw query results to the
    action output.


    ### Additional Notes

    This action supports asynchronous execution if scans are still in progress, allowing
    the SOAR platform to re-run the action until the scan completes.
  ai_short_description: >-
    Queries Check Point SandBlast for threat reputation information on file hash entities
    and enriches them with threat emulation and anti-virus data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
