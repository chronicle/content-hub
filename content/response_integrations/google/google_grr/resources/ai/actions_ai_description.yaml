Get Hunt Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific hunts from Google GRR. This action
    allows analysts to fetch the configuration, status, and metrics of one or more
    hunts directly into the SecOps platform for review.


    ### Flow Description

    1. Extracts the provided comma-separated Hunt IDs from the action parameters.

    2. Iterates through the list of Hunt IDs.

    3. Makes a GET request to the Google GRR API (`api/hunts/{hunt_id}`) for each
    ID to fetch the hunt details.

    4. Aggregates the retrieved hunt data and attaches it to the action's JSON results.

    5. Creates a direct link to the hunt in the Google GRR console and attaches it
    to the action results.


    ### Additional Notes

    This action does not operate on SecOps entities. It strictly relies on the provided
    Hunt IDs to query the Google GRR instance.
