Start a Hunt:
  ai_description: >-
    ### General Description

    Starts a newly created or paused hunt in Google GRR. It changes the state of the
    specified hunt(s) to 'STARTED' via the Google GRR API.


    ### Flow Description

    1. Extracts the provided comma-separated Hunt IDs.

    2. Iterates through the list of Hunt IDs.

    3. For each Hunt ID, makes a PATCH request to the Google GRR API (`api/hunts/{hunt_id}`)
