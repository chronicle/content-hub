  ai_description: >-
    ### General Description

    Lists flows launched on a specified client using the Google GRR API. This action
    retrieves historical flow data for a given host or IP address, providing visibility
    into activities performed on the endpoint.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Offset, Max Results To Return).

    2. Initializes the `GoogleGRRManager` to handle API communication.

    3. Iterates through the provided `target_entities` (supporting HOSTNAME and ADDRESS
    types).

    4. For each entity, calls the `get_client_id` method to resolve the entity to
    a Google GRR Client ID.

    5. Calls the `list_launched_flows` method using the resolved Client ID, applying
    the specified offset and result limit.

    6. Aggregates the retrieved flow data into JSON and CSV formats.

    7. Outputs the results to the action's result data and adds a summary message.


    ### Additional Notes

    This action performs read-only operations and does not modify any data in Google
