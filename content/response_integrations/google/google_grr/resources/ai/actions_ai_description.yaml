  ai_description: >-
    ### General Description

    Stops one or more hunts in Google GRR. Stopping a hunt prevents new clients from
    being scheduled and interrupts in-progress flows the next time they change state.
    This is a hard stop, meaning in-progress results will be lost, but results already
    reported remain unaffected. Once a hunt is stopped, it cannot be restarted.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --------- | ---- | --------- | ----------- |

    | Hunt ID | String | Yes | A comma-separated list of hunt IDs to stop. |


    ### Flow Description

    1. Extracts the provided Hunt IDs from the action parameters.

    2. Iterates through each Hunt ID.

    3. Sends a PATCH request to Google GRR to change the hunt's state to `STOPPED`.

    4. Collects the results and returns the status of the stopped hunts as a JSON
    result.
