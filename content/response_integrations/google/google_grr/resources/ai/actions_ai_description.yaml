Stop a Hunt:
  ai_description: >-
    ### General Description

    Stops one or more active hunts in Google GRR. Stopping a hunt prevents new clients
    from being scheduled and interrupts in-progress flows the next time they change
    state. This action initiates a state change on the external system to halt the
    specified hunts.


    ### Flow Description

    1. Extracts the comma-separated list of Hunt IDs provided in the action parameters.

    2. Iterates through each provided Hunt ID.

    3. Makes a `PATCH` request to the Google GRR API (`api/hunts/{hunt_id}`) with
    a payload to change the hunt's state to `STOPPED`.

    4. Collects the updated hunt details and appends them to the action's JSON results.

    5. Returns a summary message indicating which hunts were successfully stopped
    and which failed.


    ### Additional Notes

    This is a hard stop, meaning in-progress results will be lost, but results already
    reported remain unaffected. Once a hunt is stopped, there is no way to start it
    again.
