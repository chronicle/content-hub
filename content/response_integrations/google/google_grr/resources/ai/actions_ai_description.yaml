Get Client Details:
  ai_description: >-
    ### General Description

    Fetches detailed information about specific clients from the Google GRR (Google
    Rapid Response) system. This action retrieves comprehensive metadata, including
    agent information, OS details, hardware specifications, and volume information,
    providing visibility into the state of the requested clients.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and the `Client ID` action parameter.

    2. Initializes the `GoogleGRRManager` to establish a connection to the Google
    GRR API.

    3. Parses the provided `Client ID` string into a list of individual IDs.

    4. Iterates through each client ID and performs a GET request to the Google GRR
    API to retrieve client details.

    5. Processes the retrieved data, converting it into CSV and JSON formats.

    6. Adds the processed results to the action output using `siemplify.result.add_result_json`
    and `siemplify.result.add_data_table`.


    ### Additional Notes

    This action is strictly for data retrieval and does not modify any data in Google
    GRR or the SOAR platform. It operates independently of the entity list, relying
    solely on the provided `Client ID` parameter.
  ai_short_description: >-
    Fetches detailed client information from the Google GRR system based on provided
    client IDs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to fetch client details from an external system
