Get Client Details:
  ai_description: >-
    ### General Description

    Retrieves full details for specified Google GRR clients using their Client IDs.
    This action fetches comprehensive contextual metadata about the client, including
    OS information, hardware details, network interfaces, and agent information.


    ### Flow Description

    1. Extracts the provided Client IDs from the action parameters.

    2. Iterates through each Client ID.

    3. Makes a GET request to the Google GRR API (`/api/clients/{client_id}`) to fetch
    the client's details.

    4. Parses the response to extract agent info, OS info, hardware info, and volume
    info.

    5. Aggregates the results and returns them as a JSON object and a data table within
    the SecOps platform.


    ### Additional Notes

    This action does not operate on SecOps entities. It requires valid Google GRR
    Client IDs to function.
  ai_short_description: >-
    Retrieves full details for specified Google GRR clients using their Client IDs.
