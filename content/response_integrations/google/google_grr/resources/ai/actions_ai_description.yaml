    in a PAUSED state and must be started to run. This action can also be used to
    restart hunts that were paused after reaching their client limit.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Hunt ID | String | Yes | A comma-separated list of hunt IDs to start. |


    ### Action Flow

    1. Parses the provided comma-separated list of Hunt IDs.

    2. Iterates through each Hunt ID and sends a request to Google GRR to change its
    state to STARTED.

    3. Collects the status of each request (success, not found, or invalid state).

    4. Returns a summary message and JSON results containing the updated state of
    the successfully started hunts.
