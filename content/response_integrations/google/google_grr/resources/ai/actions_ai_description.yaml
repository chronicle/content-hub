  ai_description: >-
    ### General Description

    The **List Clients** action is designed to search and retrieve a list of available
    clients from Google GRR. This allows analysts to view connected clients and gather
    their basic information, which can be used for further interaction or investigation
    within the SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Offset | String | No | Specifies the starting offset for the clients to be found.
    This is useful for paginating through large sets of clients. |

    | Max Results To Return | String | No | Specifies the maximum number of clients
    to return in the response. The default value is 5. |


    ### Flow Description

    1. **Initialization:** The action extracts the configuration and action parameters,
    including the offset and maximum results to return.

    2. **API Request:** It initializes the `GoogleGRRManager` and sends a GET request
    to the Google GRR API to fetch the list of clients based on the provided parameters.

    3. **Data Processing:** The action parses the returned client objects, extracting
    relevant details such as client ID, OS info, and agent info.

    4. **Output Generation:** It constructs a JSON result containing the detailed
    client information and a CSV data table for easy viewing in the case wall.

    5. **Completion:** The action returns the results to the SecOps platform and completes
    its execution.


    ### Additional Notes

    There are no specific entity requirements for this action, as it operates globally
    to list clients rather than enriching specific entities.
