List Clients:
  ai_description: >-
    General Description

    This action retrieves a list of clients from the Google GRR server. It allows
    users to search for available clients by specifying an offset and a maximum number
    of results to return. The retrieved client information is formatted and presented
    as a data table and a JSON result within the Google SecOps platform.


    Flow Description

    1. The action extracts the necessary configuration parameters (API Root, Username,
    Password, Verify SSL) to establish a connection to the Google GRR server.

    2. It extracts the action-specific parameters: 'Offset' and 'Max Results To Return'.

    3. The action initializes the `GoogleGRRManager` to handle the communication with
    the Google GRR API.

    4. It executes the `list_clients` method, which performs an HTTP GET request to
    the `api/clients` endpoint of the Google GRR server.

    5. The retrieved client data is parsed into client objects.

    6. The action constructs a CSV list and a JSON dictionary of the clients.

    7. Finally, it adds the client data to the Google SecOps result as a data table
    and a JSON result, and completes the execution.


    Additional Notes

    This action does not modify any data on the Google GRR server or within the Google
    SecOps platform. It is a read-only operation used for discovery and listing purposes.
