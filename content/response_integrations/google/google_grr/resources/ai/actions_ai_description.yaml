    1. Extracts the action parameters: `Offset` and `Max Results To Return`.

    2. Initializes the Google GRR manager with the provided credentials.

    3. Makes an API call to the Google GRR server to fetch the list of clients using
    the `list_clients` endpoint.

    4. Parses the response and extracts client details such as Client ID, Agent Info,
    OS Info, and more.

    5. Formats the retrieved data into JSON and CSV structures.

