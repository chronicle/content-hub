Stop a Hunt:
  ai_description: >-
    ### General Description

    Stops a hunt in the Google GRR system. This action prevents new clients from being
    scheduled and interrupts in-progress flows the next time they change state. This
    is a hard stop, meaning in-progress results will be lost, and the hunt cannot
    be restarted once stopped.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Username,
    Password, Verify SSL) and the `Hunt ID` parameter.

    2. It initializes the `GoogleGRRManager` to handle communication with the Google
    GRR API.

    3. The `Hunt ID` input is parsed into a list of IDs.

    4. The action iterates through each provided `Hunt ID`.

    5. For each ID, it calls the `stop_hunt` method, which performs a `PATCH` request
    to the Google GRR API endpoint `api/hunts/{hunt_id}` with the payload `{"state":
    "STOPPED"}`.

    6. The action collects the results and any errors encountered during the process.

    7. Finally, it adds the result JSON to the action output and completes the execution.


    ### Additional Notes

    This action performs a hard stop on the specified hunts. Results already reported
    are unaffected, but in-progress results will be lost. Once a hunt is stopped,
    it cannot be started again.
