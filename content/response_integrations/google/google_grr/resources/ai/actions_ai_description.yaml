Get Hunt Details:
  ai_description: >-
    ### General Description

    Fetches detailed information for specific hunts from the Google GRR platform.
    This action allows analysts to retrieve metadata, status, and configuration details
    for one or more hunts by providing their unique Hunt IDs.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, and `Verify SSL`.

    2. It extracts the `Hunt ID` parameter, which accepts a comma-separated string
    of IDs.

    3. The `GoogleGRRManager` is initialized with the provided credentials.

    4. The action iterates through the list of provided Hunt IDs.

    5. For each Hunt ID, it performs a GET request to the Google GRR API endpoint
    (`api/hunts/{hunt_id}`) to retrieve the hunt details.

    6. If successful, the hunt details are parsed and added to the results list, and
    a link to the hunt in the Google GRR interface is added to the action results.

    7. If a hunt is not found, the error is logged, and the ID is added to a list
    of invalid hunts.

    8. Finally, the action returns the collected hunt details as a JSON result and
    provides an output message summarizing the success or failure of the operation.


    ### Additional Notes

    This action requires valid credentials for the Google GRR instance. It does not
    modify any data in Google GRR or the SOAR platform; it is strictly for information
    retrieval.
