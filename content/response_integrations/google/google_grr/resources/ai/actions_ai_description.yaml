  ai_description: >-
    ### General Description

    The "Get Client Details" action retrieves comprehensive details for specified
    clients from Google GRR. It fetches contextual metadata such as OS information,
    hardware details, memory size, and agent information based on the provided Client
    IDs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Client ID | String | Yes | A comma-separated list of client IDs to fetch details
    for. This parameter dictates which clients the action will query in Google GRR.
    |


    ### Flow Description

    1. Initializes the connection to the Google GRR API using the provided integration
    configuration credentials.

    2. Parses the comma-separated list of `Client ID`s provided in the action parameters.

    3. Iterates over each Client ID and sends a GET request to the Google GRR API
    to fetch the client's full details.

    4. Processes the retrieved data, extracting relevant information such as OS, hardware,
    and agent details.

    5. Aggregates the results into a JSON object and a CSV-formatted data table.

    6. Outputs the aggregated data to the Google SecOps platform and completes the
    execution.


    ### Additional Notes

    There are no additional notes for this action.
