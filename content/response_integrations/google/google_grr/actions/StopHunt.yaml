name: Stop a Hunt
description: Stopping a hunt will prevent new clients from being scheduled and interrupt
    in-progress flows the next time they change state. This is a hard stop, so in-progress
    results will be lost, but results already reported are unaffected. Once a hunt
    is stopped, there is no way to start it again.
integration_identifier: GoogleGRR
parameters:
-   name: Hunt ID
    default_value: ''
    type: string
    description: ID of the hunt to stop. Comma separated
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/stop_hunt_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
