name: Start a Hunt
description: Use this to start a newly created hunt. New hunts are created in the
    PAUSED state, so you’ll need to do this to run them. Hunts that reach their client
    limit will also be set to PAUSED, use this to restart them after you have removed
    the client limit.
integration_identifier: GoogleGRR
parameters:
-   name: Hunt ID
    default_value: ''
    type: string
    description: ID of the hunt to start. Comma separated
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/start_hunt_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
