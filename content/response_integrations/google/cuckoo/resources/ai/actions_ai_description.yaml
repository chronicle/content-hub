Get Report:
  ai_description: >-
    ### General Description

    Retrieves the analysis report for a specific task ID from Cuckoo Sandbox. This
    action is typically used to fetch the results of a previously submitted file or
    URL analysis.


    ### Flow Description

    1. Extracts the provided `Task ID` parameter.

    2. Establishes a connection to the Cuckoo Sandbox API.

    3. Checks the status of the task to determine if the analysis report is ready.

    4. If the report is ready, fetches the JSON report and extracts the threat score.

    5. Attaches the report data as a JSON result, creates a data table with the findings,
    and provides a direct link to the report in the Cuckoo web interface.

    6. If the task is still in progress, the action reschedules itself to check again
    later (asynchronous execution).


    ### Additional Notes

    This action operates asynchronously. It does not require any entities to run and
    relies solely on the provided Task ID.
  ai_short_description: >-
    Retrieves the analysis report and threat score for a specific task ID from Cuckoo
    Sandbox.
