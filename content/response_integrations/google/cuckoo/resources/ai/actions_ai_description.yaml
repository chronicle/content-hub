Detonate Url:
  ai_description: >-
    ### General Description

    Submits URL entities to the Cuckoo Sandbox for asynchronous analysis and retrieves
    the resulting threat report and score.


    ### Flow Description

    1. Iterates through the target entities and filters for URL entities.

    2. Submits each URL to Cuckoo via a POST request to create a new analysis task
    and stores the returned task ID in the entity's additional properties.

    3. Asynchronously polls the Cuckoo server to check the status of the analysis
    tasks.

    4. Once a task is reported as completed, retrieves the JSON report via a GET request.

    5. Extracts the threat score from the report, updates the entity's properties,
    and marks the entity as enriched.

    6. If the threat score exceeds the configured warning threshold, marks the entity
    as suspicious.

    7. Attaches the analysis report link, a data table, and the raw JSON report to
    the action results.


    ### Additional Notes

    This is an asynchronous action. It will continue to poll the Cuckoo server until
    the analysis is complete or the action times out.
  ai_short_description: >-
    Submits URL entities to the Cuckoo Sandbox for asynchronous analysis and retrieves
    the resulting threat report.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
