  ai_description: >-
    ### General Description

    Submits one or more files to the Cuckoo sandbox for analysis and retrieves the
    analysis report asynchronously.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Paths | String | Yes | A comma-separated list of file paths to submit for
    analysis. |


    ### Flow Description

    1. Connects to the Cuckoo server using the provided configuration.

    2. Submits the specified files to Cuckoo for analysis.

    3. Enters an asynchronous state to wait for the analysis tasks to complete.

    4. Once completed, retrieves the analysis report for each submitted file.

    5. Attaches the report data, including a link to the web interface and a data
    table, to the action results.
