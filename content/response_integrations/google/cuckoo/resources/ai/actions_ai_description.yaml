Detonate File:
  ai_description: >-
    ### General Description

    Submits one or more files to Cuckoo Sandbox for analysis and retrieves the resulting
    behavior report asynchronously.


    ### Flow Description

    1. Extracts the provided file paths from the action parameters.

    2. Connects to the Cuckoo Sandbox API.

    3. Submits each file for analysis by making a POST request to the `/tasks/create/file`
    endpoint.

    4. The action suspends and waits for the analysis to complete asynchronously.

    5. Once the tasks are reported as completed, it fetches the analysis report for
    each task via a GET request to the `/tasks/report/{task_id}/json` endpoint.

    6. Parses the report, extracts the maximum score, and attaches the results as
    a JSON object, a data table, and a link to the Cuckoo web interface.


    ### Additional Notes

    This action executes asynchronously.
  ai_short_description: >-
    Submits files to Cuckoo Sandbox for analysis and retrieves the behavior report
    asynchronously.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Cuckoo Sandbox for analysis, creating a new analysis task.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to Cuckoo Sandbox to submit a file for analysis,
      which mutates external data by creating a new task. It also makes a GET request
      to fetch the analysis report, meaning it fetches data. It does not update internal
      entities, create insights, modify alert data, or create case comments.
  entity_usage:
