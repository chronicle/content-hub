  ai_description: >-
    Retrieves the analysis report for a specific task ID from Cuckoo Sandbox. This
    action operates asynchronously, checking the status of the task and fetching the
    report once it is completed.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Task ID | String | Yes | The ID of the task to retrieve the report for. |


    ### Action Flow

    1. Connects to the Cuckoo Sandbox instance using the provided configuration.

    2. Checks if the task with the specified `Task ID` has completed and generated
    a report.

    3. If the report is ready, fetches the JSON report from Cuckoo.

    4. Extracts the analysis score and other relevant information.

    5. Adds a link to the report in the Cuckoo web interface to the action results.

    6. Adds a data table with the flattened report details.

    7. Returns the analysis score as the action result.

    8. If the task is still in progress, the action will pause and retry later (asynchronous
    execution).
