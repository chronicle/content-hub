Detonate File:
  ai_description: >-
    ### General Description

    Submits files to a Cuckoo sandbox for malware analysis. This action automates
    the process of detonating files in a controlled environment to generate threat
    intelligence reports.


    ### Flow Description

    1. The action accepts a list of file paths as input.

    2. It connects to the Cuckoo instance using the provided API credentials.

    3. It submits each file for analysis via the Cuckoo API (`/tasks/create/file`).

    4. The action enters an asynchronous state, tracking the task IDs.

    5. Upon subsequent execution, it checks the status of the submitted tasks (`/tasks/view/{task_id}`).

    6. Once all tasks are reported as complete, it retrieves the analysis report (`/tasks/report/{task_id}/json`).

    7. It adds the report data to the case as a data table and provides a link to
    the Cuckoo web interface.


    ### Additional Notes

    This action is asynchronous and requires multiple executions to complete the analysis
    cycle. It does not directly interact with entities in the case, but rather processes
    file paths provided as parameters.
  ai_short_description: >-
    Submits files to a Cuckoo sandbox for automated malware analysis and retrieves
    the resulting threat reports.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits files to the Cuckoo sandbox for analysis, creating new analysis tasks
      in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to submit files to Cuckoo (can_mutate_external_data=true)
      and a GET request to fetch the analysis report (fetches_data=true). It does
      not mutate internal data or update entities.
