    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the report data from Cuckoo using a GET request (fetches_data=true).
      It does not perform any POST/PUT/DELETE requests that modify external data (can_mutate_external_data=false).
      It does not update entities, create insights, or add case comments within Google
      SecOps (can_mutate_internal_data=false).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Cuckoo) without mutating any
      external or internal state. Therefore, it qualifies as an enrichment action.
      It does not perform any remediation tasks.
    remediation: false
