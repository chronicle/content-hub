Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Cuckoo sandbox instance.
    This action verifies that the integration is correctly configured and that the
    Cuckoo API is reachable.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Web
    Interface Address`, `CA Certificate File`, `Verify SSL`, and `API Token`.

    2. It initializes the `CuckooManager` using these parameters to establish a session.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Cuckoo API status endpoint (`/cuckoo/status`).

    4. If the request is successful, the action returns a success message. If the
    request fails (e.g., due to network issues or invalid credentials), an exception
    is raised.


    ### Additional Notes

    This action does not perform any data enrichment or state changes. It is strictly
    used for troubleshooting and verifying the integration setup.
