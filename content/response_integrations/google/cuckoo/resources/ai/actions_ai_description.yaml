  ai_description: >-
    ### General Description

    The `Detonate Url` action submits a URL to the Cuckoo sandbox for asynchronous
    analysis and retrieves the resulting behavior report and threat score.


    ### Flow Description

    1. The action establishes a connection to the Cuckoo API.

    2. It iterates over the target entities, specifically filtering for URL entities.

    3. For each URL, it submits the URL for analysis and stores the resulting task
    ID in the entity's additional properties.

    4. In subsequent asynchronous executions, it checks the status of the analysis
    tasks.

    5. Once a task is reported as completed, it fetches the analysis report, extracts
    the threat score, and updates the entity's properties (e.g., marking it as suspicious
    if the score exceeds the configured threshold).

    6. It attaches a link to the report and a data table with the analysis results
    to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Api Root | String | Yes | The root URL of the Cuckoo API. |

    | Web Interface Address | String | Yes | The address of the Cuckoo web interface,
    used for generating report links. |

    | CA Certificate File | String | No | The CA certificate file content for SSL
    verification. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the Cuckoo
    server. |

    | API Token | String | No | The API token for authenticating with the Cuckoo API.
    |

    | Warning Threshold | String | Yes | The score threshold above which an entity
    is marked as suspicious. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a new URL analysis task in the Cuckoo sandbox.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, adds data tables with analysis results, and adds
      entity links to the case.
    reasoning: >-
      The action fetches data by retrieving the analysis report from Cuckoo. It mutates
      external data by submitting a new URL analysis task to the Cuckoo sandbox via
      a POST request. It mutates internal data by updating entity properties (such
      as Cuckoo_Score, is_enriched, and is_suspicious), adding data tables, and adding
      entity links. It does not create insights, modify alert data, or create case
      comments.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a new task in an external system (Cuckoo), which violates
      the external state preservation rule for Enrichment actions. It does not perform
      any remediation actions such as blocking IPs or disabling users.
    remediation: false
  entity_usage:
