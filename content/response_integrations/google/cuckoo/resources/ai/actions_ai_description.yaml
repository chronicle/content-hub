Get Report:
  ai_description: >-
    ### General Description

    Fetches the analysis report for a specific Cuckoo Sandbox task by its ID. This
    action retrieves the detailed JSON report, including the threat score and target
    information, from the Cuckoo Sandbox instance and presents it within the SecOps
    platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Web Interface Address, CA Certificate,
    Verify SSL, API Token) and the required `Task ID`.

    2. Initializes the `CuckooManager` to establish communication with the Cuckoo
    Sandbox API.

    3. Checks the status of the task using the provided `Task ID`.

    4. If the task status is 'reported', the action retrieves the full JSON report
    from the Cuckoo API.

    5. Adds a direct link to the report in the Cuckoo web interface to the action
    results.

    6. Generates a data table containing a flattened summary of the report (e.g.,
    score, duration, target info).

    7. Attaches the raw JSON report to the action results.

    8. Returns the task score as the final action result.


    ### Additional Notes

    This action is designed to be asynchronous. If the task has not yet been reported
    by the Cuckoo Sandbox, the action will terminate with an 'In Progress' state,
    allowing the workflow to wait for completion.
