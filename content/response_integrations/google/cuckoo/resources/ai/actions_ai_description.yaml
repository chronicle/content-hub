Detonate Url:
  ai_description: >-
    ### General Description

    Detonates a URL in a Cuckoo sandbox to analyze its behavior and retrieve a threat
    report. This action submits the URL for analysis, monitors the task status asynchronously,
    and updates the entity with the resulting threat score and suspicious status upon
    completion.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters, including
    the Cuckoo API root, web interface address, and authentication credentials.

    2. **Submission**: It iterates over the provided URL entities and submits each
    to the Cuckoo sandbox using the `submit_url` API call (POST request).

    3. **Tracking**: The returned task ID is stored within the entity's `additional_properties`
    for tracking purposes.

    4. **Asynchronous Polling**: In the asynchronous phase, the action checks the
    status of the submitted tasks using the `get_task_status` API call.

    5. **Report Retrieval**: Once the analysis is complete, it fetches the detailed
    report using the `get_report` API call (GET request).

    6. **Enrichment**: The action updates the entity with the Cuckoo score, marks
    it as enriched, and flags it as suspicious if the score exceeds the configured
    threshold.

    7. **Result Presentation**: It adds a link to the Cuckoo report and a data table
    containing the analysis results to the action output.


    ### Additional Notes

    This action is asynchronous and requires a configured Cuckoo sandbox environment.
    It relies on the `CuckooManager` to handle API interactions.
  ai_short_description: >-
    Detonates a URL in a Cuckoo sandbox to analyze its behavior and retrieve a threat
    report.
