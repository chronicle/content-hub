    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a new analysis task in the Cuckoo Sandbox by submitting a URL.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving the analysis report from Cuckoo. It mutates
      external data by submitting a URL to Cuckoo, which creates a new analysis task
      on the server. It updates internal entities with the threat score and enrichment
      status using `siemplify.update_entities`. It does not create insights, modify
      alert data, or create case comments.
