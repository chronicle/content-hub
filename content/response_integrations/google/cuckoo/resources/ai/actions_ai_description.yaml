Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cuckoo server to ensure the integration is configured
    correctly and can communicate with the API.


    ### Flow Description

    1. Extracts integration configuration parameters (e.g., API Root, API Token).

    2. Initializes the CuckooManager.

    3. Makes a GET request to the `/cuckoo/status` API endpoint to verify connectivity.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
