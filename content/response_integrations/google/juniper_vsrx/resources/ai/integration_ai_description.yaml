product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Juniper vSRX integration is a Next-Generation Firewall (NGFW) appliance. Its
    primary capabilities, as demonstrated by the 'Add IP To Address Set' and 'Remove
    IP From Address Set' actions, involve managing network security policies by modifying
    address sets on the firewall device. This directly aligns with the 'Network Security'
    category, which is defined for integrations that allow agents to block malicious
    IPs at the gateway. The integration does not perform SIEM log analysis, EDR host-level
    containment, threat intelligence enrichment, or any of the other specialized functions
    (IAM, ITSM, etc.) defined in the categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
