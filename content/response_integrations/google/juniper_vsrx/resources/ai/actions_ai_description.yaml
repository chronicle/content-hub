  ai_description: >-
    ### General Description

    This action adds IP address entities to a specified address set on a Juniper VSRX
    device. It is primarily used for network access control or blacklisting by grouping
    IP addresses into manageable sets within the firewall's security configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Set Name | String | Yes | The name of the target address set on the
    Juniper VSRX where the IP addresses will be added. |

    | Zone Name | String | No | The specific security zone where the address set and
    address records should be created. If left empty, the action defaults to using
    the global address book. |


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Juniper VSRX device using
    the provided integration credentials.

    2. **Entity Filtering**: Identifies all `ADDRESS` entities within the current
    Google SecOps context.

    3. **Configuration Loading**: For each identified IP address, the action generates
    and loads configuration commands to create a unique address record and associate
    it with the specified `Address Set Name`. If a `Zone Name` is provided, these
    records are scoped to that specific security zone.

    4. **Commitment**: Executes a configuration commit on the Juniper VSRX device
    to apply the changes permanently.

    5. **Cleanup**: Closes the session with the device and reports the success or
    failure for each processed entity.


    ### Additional Notes

    - This action performs a state-changing operation on the external firewall by
    modifying its configuration.

    - If the address record already exists, the behavior depends on the Juniper device's
    handling of duplicate 'set' commands (typically idempotent).
