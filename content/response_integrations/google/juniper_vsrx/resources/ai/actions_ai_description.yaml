  ai_description: >-
    ### General Description

    This action adds IP address entities to a specified address set on a Juniper VSRX
    device. It is primarily used for network access control or blacklisting by grouping
    IP addresses into manageable sets within the firewall's security configuration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Set Name | String | Yes | The name of the target address set on the
    Juniper VSRX where the IP addresses will be added. |

    | Zone Name | String | No | The specific security zone where the address set and
    address records should be created. If left empty, the action defaults to using
    the global address book. |


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Juniper VSRX device using
    the provided integration credentials.

    2. **Entity Filtering**: Identifies all `ADDRESS` entities within the current
    Google SecOps context.

    3. **Configuration Loading**: For each identified IP address, the action generates
    and loads configuration commands to create a unique address record and associate
    it with the specified `Address Set Name`. If a `Zone Name` is provided, these
    records are scoped to that specific security zone.

    4. **Commitment**: Executes a configuration commit on the Juniper VSRX device
    to apply the changes permanently.

    5. **Cleanup**: Closes the session with the device and reports the success or
    failure for each processed entity.


    ### Additional Notes

    - This action performs a state-changing operation on the external firewall by
    modifying its configuration.

    - If the address record already exists, the behavior depends on the Juniper device's
    handling of duplicate 'set' commands (typically idempotent).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the Juniper VSRX firewall configuration by adding IP addresses to a
      specified address set.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to an external Juniper VSRX firewall and executes configuration
      commands to add IP addresses to an address set. It does not retrieve data from
      the device (other than session establishment) or modify internal Google SecOps
      data (entities, insights, or comments). Therefore, it is a pure external mutation
      action.
  categories:
    enrichment: false
    reasoning: >-
      The action does not fetch data (it pushes configuration changes) and it mutates
      external data (firewall configuration). Therefore, it does not meet the criteria
      for an enrichment action.
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code explicitly filters `siemplify.target_entities` to process only entities
      where `entity.entity_type == EntityTypes.ADDRESS`.
