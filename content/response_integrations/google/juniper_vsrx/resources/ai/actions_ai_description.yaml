Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Juniper VSRX instance to ensure the integration is configured
    correctly and the device is reachable.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Address, Port, Username,
    Password).

    2. Initializes the Juniper VSRX manager with the provided credentials.

    3. Executes a probe/ping command to verify network connectivity and authentication.

    4. Returns a success message if the connection is established, or a failure message
    otherwise.

    5. Closes the connection session.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify integration configuration
    and network access before running other actions.
