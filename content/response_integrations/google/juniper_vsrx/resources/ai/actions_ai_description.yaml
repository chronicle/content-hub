    reasoning: >-
      The action does not fetch contextual data for enrichment. It mutates external
      data by executing commands to delete IP records from an address set on a Juniper
      VSRX device and committing the changes. It does not mutate internal SOAR data,
      update entities, create insights, or add case comments.
  categories:
