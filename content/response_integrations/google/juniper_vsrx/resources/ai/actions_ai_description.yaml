Remove IP From Address Set:
  ai_description: >-
    Removes IP Address entities from a specified address set on a Juniper VSRX device.
    This action is typically used to reverse a previous blocking or containment action
    by removing the IP from a restricted address group.


    ### Flow Description

    1. **Parameter Retrieval:** The action extracts the 'Address Set Name' and the
    optional 'Zone Name' from the input parameters.

    2. **Entity Filtering:** It identifies all entities of type 'ADDRESS' within the
    current scope.

    3. **Record Identification:** For each IP address, it queries the Juniper VSRX
    device to find the specific internal record name associated with that IP.

    4. **Configuration Staging:** It loads deletion commands into the device's configuration
    buffer to remove the address record and its association with the specified address
    set.

    5. **Commit Changes:** It executes a commit operation to apply the configuration
    changes permanently to the Juniper VSRX device.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Set Name | String | True | The name of the address set (group) from
    which the IP address should be removed. |

    | Zone Name | String | False | The specific security zone where the address set
    is located. If omitted, the action targets the global address book. |


    ### Additional Notes

    * This action requires the Juniper VSRX integration to be configured with valid
    administrative credentials and network access.

    * The action performs a configuration commit, which may affect other pending changes
    on the device if not managed carefully.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes address records and address set memberships from the Juniper VSRX configuration
      and commits the changes.
    fetches_data: true
    internal_data_mutation_explanation: null
