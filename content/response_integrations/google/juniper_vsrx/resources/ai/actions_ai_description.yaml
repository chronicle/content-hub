Add IP To Address Set:
  ai_description: >-
    ### General Description

    This action adds one or more IP address entities to a specified address set on
    a Juniper VSRX firewall. It allows for optional zone specification to refine the
    configuration scope, enabling automated network security policy updates.


    ### Flow Description

    1. Initialize the JuniperVSRXManager with connection details retrieved from the
    integration configuration.

    2. Retrieve the `Address Set Name` and `Zone Name` parameters provided by the
    user.

    3. Filter the target entities to include only those of type `ADDRESS`.

    4. For each valid address entity, invoke the `add_ip_to_address_set` method on
    the JuniperVSRXManager, which sends configuration commands to the device to create
    an address record and add it to the specified address set.

    5. Commit the configuration changes to the Juniper VSRX device.

    6. Close the session.


    ### Additional Notes

    This action modifies the external firewall configuration. Ensure the provided
    credentials have sufficient permissions to modify security policies on the Juniper
    VSRX device.
  ai_short_description: >-
    Adds IP address entities to a specified address set on a Juniper VSRX firewall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the Juniper VSRX firewall configuration by adding IP addresses to a
      specified address set.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a configuration change on an external Juniper VSRX device
      (mutating external data). It does not fetch data from the device, nor does it
      modify internal SOAR case data or entities.
