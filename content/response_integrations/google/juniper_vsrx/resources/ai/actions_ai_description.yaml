    reasoning: >-
      The action modifies the firewall configuration to include an IP address in a
      specific address set. This is a standard method for implementing network-level
      blocking or access control, which aligns with the 'Add IOC To Blocklist' category.
      It does not perform EDR-based host containment, nor does it fetch data, so it
      is not an enrichment action.
