  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and a **Juniper VSRX** instance. Its primary purpose is to validate
    that the provided configuration details (Address, Port, Username, and Password)
    are correct and that the network path to the device is open.


    ### Parameters Description

    This action does not require any input parameters as it uses the global integration
    configuration.


    ### Additional Notes

    - This action is a standard health check and does not interact with any security
    entities or alert data.

    - It is recommended to run this action immediately after configuring the Juniper
    VSRX integration to ensure the setup is functional.


    ### Flow Description

    1. Retrieve configuration (Address, Port, Username, and Password) from the integration's
    shared configuration.

    2. Initialize the `JuniperVSRXManager` with the retrieved credentials.

    3. Execute a `probe()` call to the Juniper device to test the network connection
    and authentication.

    4. Close the connection session to release resources.

    5. Report the connection status (Success/Failure).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check (ping/probe) to verify the integration
      configuration. It does not fetch data, mutate external systems, or modify internal
      SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a diagnostic 'Ping' utility. Per the instructions, 'Actions named
      Ping must not be categorized as enrichment actions.'
