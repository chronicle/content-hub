Add IP To Address Set:
  ai_description: >-
    ### General Description

    Adds specified IP Address entities to a designated address set on a Juniper VSRX
    firewall. This action modifies the firewall's configuration to include the target
    IPs in a specific address group, which is typically used to dynamically update
    security policies such as blocklists or allowlists.


    ### Flow Description

    1. Retrieves the target `Address Set Name` and optional `Zone Name` from the action
    parameters.

    2. Filters the target entities to include only those of type `ADDRESS`.

    3. Iterates through the filtered entities and executes a configuration command
    via the Juniper VSRX API (using PyEZ) to create an address record and add the
    IP address to the specified address set.

    4. Commits the configuration changes to the firewall to apply the updates.

    5. Closes the session and returns a success message detailing the entities added,
    along with any errors encountered during the process.


    ### Additional Notes

    If a `Zone Name` is provided, the IP is added to the address book of that specific
    security zone. If omitted, the IP is added to the global address book.
  ai_short_description: >-
    Adds specified IP Address entities to a designated address set on a Juniper VSRX
    firewall to dynamically update security controls.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the Juniper VSRX firewall configuration by adding IP addresses to a
      specified address set.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data from an external system for enrichment. It mutates
      external data by executing configuration commands on the Juniper VSRX firewall
      to add IP addresses to an address set and committing the changes. It does not
      mutate internal SecOps data, update entities, or create insights.
