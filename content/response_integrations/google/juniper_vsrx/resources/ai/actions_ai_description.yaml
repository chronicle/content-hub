  ai_description: >-
    ### General Description

    Adds IP address entities to a specified address set on a Juniper VSRX device.
    This action facilitates network security policy management by grouping IP addresses
    into sets, which can then be utilized in security policies. It supports adding
    addresses to either a global address book or a specific security zone's address
    book.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Set Name | string | True | The name of the address set where the IP
    addresses should be added. |

    | Zone Name | string | False | The name of the security zone. If provided, the
    address record and set update will be scoped to this specific zone; otherwise,
    the global address book is used. |


    ### Additional Notes

    - This action performs a configuration commit on the device, which may affect
    other pending changes on the Juniper VSRX if not managed carefully.


    ### Flow Description

    1. **Configuration Retrieval:** Fetches connection details (Address, Port, Username,
    Password) for the Juniper VSRX device.

    2. **Parameter Extraction:** Retrieves the target 'Address Set Name' and the optional
    'Zone Name' from the action parameters.

    3. **Entity Filtering:** Identifies all IP Address entities within the current
    context.

    4. **Address Record Creation:** For each identified IP, it creates a unique address
    record on the Juniper device.

    5. **Address Set Update:** Adds the newly created address record to the specified
    address set.

    6. **Commit Changes:** Executes a configuration commit on the Juniper VSRX to
    persist the changes.
