Remove IP From Address Set:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action removes an IP address from an address set on a firewall/VSRX device.
      This is a standard operation for removing an indicator from a blocklist. It
      does not match other categories like enrichment, ticket creation, or identity
      management.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: true
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action removes IP address entities from a specified address set on a Juniper
    VSRX device. It interacts with the Juniper Junos OS to identify the internal record
    name associated with an IP address, deletes that record from the target address
    set (and optionally a specific security zone), and commits the configuration changes
    to the device to ensure the removal is persistent.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Set Name | String | Yes | The name of the address set from which the
    IP address should be removed. |

    | Zone Name | String | No | The name of the security zone where the address set
    is located. If not provided, the action defaults to the global address book. |


    ### Flow Description

    1. **Initialization**: Connects to the Juniper VSRX device using provided credentials
    and retrieves the action parameters.

    2. **Entity Filtering**: Identifies all 'ADDRESS' entities within the current
    scope.

    3. **Record Identification**: For each IP entity, it queries the device's configuration
    to find the specific internal record name mapped to that IP.

    4. **Staging Deletion**: Issues commands to delete the address record and its
    association with the specified address set (and zone, if provided).

    5. **Commitment**: Executes a configuration commit on the Juniper VSRX device
    to apply the changes.

    6. **Cleanup**: Closes the device session and reports the success or failure for
    each processed entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes the IP address record from the specified address set and commits the
      configuration change on the Juniper VSRX device.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to retrieve configuration data (fetches_data=true)
      to identify the record name. It then performs a series of DELETE commands and
      a COMMIT operation on the Juniper VSRX device, which constitutes an external
      mutation (can_mutate_external_data=true). It does not modify internal SOAR case
      data or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is not an enrichment action because it mutates external data (Rule
      2: Absolute ban on mutating external systems).
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters using `entity.entity_type
      == EntityTypes.ADDRESS`. This means it targets ADDRESS entities, filtering by
      entity_type.
