  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps environment and the Juniper VSRX device. It ensures that the provided
    configuration parameters (Address, Port, Username, and Password) are correct and
    that the device is reachable over the network.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration settings.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the connection details (Address,
    Port, Username, Password) from the integration's configuration.

    2. **Manager Initialization**: It initializes the `JuniperVSRXManager` using the
    retrieved credentials.

    3. **Connectivity Probe**: The action calls the `ping` method, which uses the
    `probe()` function from the underlying Junos library to check if the device is
    responsive.

    4. **Session Termination**: The connection session is closed to ensure no resources
    are left hanging.

    5. **Result Reporting**: The action returns a success message ('Connection Established.')
    and a boolean `True` if the probe succeeds, or a failure message ('Connection
    Failed.') and `False` otherwise.


    ### Additional Notes

    This action does not interact with any entities or modify any data. It is strictly
    used for health checks and troubleshooting integration connectivity.
