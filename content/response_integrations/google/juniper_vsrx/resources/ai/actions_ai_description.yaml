Remove IP From Address Set:
  ai_description: >-
    ### General Description

    Removes a specified IP address from an address set on a Juniper VSRX firewall.
    This action helps manage network security policies by dynamically updating address
    sets to allow or restrict traffic based on the IP address provided in the entity.


    ### Flow Description

    1. **Initialization**: The action initializes the `JuniperVSRXManager` using the
    provided configuration (address, port, username, password).

    2. **Parameter Retrieval**: It retrieves the `Address Set Name` and optional `Zone
    Name` from the action parameters.

    3. **Entity Filtering**: It filters the `target_entities` to identify only those
    of type `ADDRESS`.

    4. **External Interaction**: For each identified IP address, the action:
        * Calls `get_ip_record_name_by_ip` to retrieve the corresponding address record
    name from the firewall configuration via an RPC call.
        * Executes the `remove_ip_from_address_set` method, which sends delete commands
    to the firewall to remove the IP from the specified address set and delete the
    associated address record.
    5. **Commit**: It calls `commit_config_changes` to apply the modifications to
    the firewall configuration.

    6. **Cleanup**: It closes the session with the firewall.


    ### Additional Notes

    This action requires valid credentials and network connectivity to the Juniper
    VSRX device. It performs a state-changing operation on the firewall configuration.
  ai_short_description: >-
    Removes an IP address from a specified address set on a Juniper VSRX firewall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
