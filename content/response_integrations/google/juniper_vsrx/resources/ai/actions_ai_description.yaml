  ai_description: >-
    ### General Description

    This action adds IP address entities to a specified address set in Juniper VSRX.
    It can optionally specify a security zone to target a specific zone's address
    book.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Address Set Name | String | Yes | The name of the address set to which the IP
    address will be added. |

    | Zone Name | String | No | The name of the security zone where the address set
    resides. If not provided, the global address book is used. |


    ### Flow Description

    1. Initializes the Juniper VSRX manager with the provided credentials.

    2. Retrieves the `Address Set Name` and `Zone Name` parameters.

    3. Filters the target entities to include only those of type `ADDRESS`.

    4. Iterates over the filtered entities and executes commands to add each IP address
    to the specified address set (and zone, if provided).

    5. Commits the configuration changes to the Juniper VSRX device.

    6. Closes the session and returns a summary message indicating the successful
    and failed additions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds an IP address to a specified address set in the Juniper VSRX configuration.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to Juniper VSRX and executes configuration commands to add
      an IP address to an address set, which mutates external data. It does not fetch
      data, update internal entities, create insights, modify alert data, or add case
      comments.
  categories:
    enrichment: false
    reasoning: >-
      The action modifies external state by adding an IP to an address set on a firewall,
      so it is not an enrichment action. It performs network-based remediation by
      modifying firewall address sets (which are typically used in security policies
      to block or allow traffic), qualifying it as a remediation action.
    remediation: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type == EntityTypes.ADDRESS`. Therefore, it runs on ADDRESS entities
      and filters strictly by entity type.
