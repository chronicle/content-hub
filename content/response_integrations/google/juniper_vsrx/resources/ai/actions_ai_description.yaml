Remove IP From Address Set:
  ai_description: >-
    ### General Description

    Removes a specific IP address from an address set on a Juniper VSRX device. This
    action modifies the device's configuration to delete the address record and remove
    it from the specified address set, effectively altering the security policies
    applied to that IP.


    ### Flow Description

    1. Retrieves the `Address Set Name` and `Zone Name` parameters from the action
    configuration.

    2. Filters the target entities to include only those of type `ADDRESS`.

    3. For each valid IP address entity, queries the Juniper VSRX device to retrieve
    its corresponding address record name.

    4. Loads configuration commands onto the device to delete the address record and
    remove it from the specified address set (and zone, if provided).

    5. Commits the configuration changes to the Juniper VSRX device to apply the updates.


    ### Additional Notes

    This action is typically used to unblock an IP address or remove it from a specific
    policy group on the firewall. Ensure that the provided `Address Set Name` exists
    on the device.
  ai_short_description: >-
    Removes a specific IP address entity from a designated address set on a Juniper
    VSRX device.
