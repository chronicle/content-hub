  ai_description: >-
    Removes IP address entities from a specified address set on a Juniper VSRX device.


    ### General Description

    This action connects to a Juniper VSRX firewall and removes specific IP addresses
    (provided as entities) from a designated address set. It can optionally target
    a specific security zone. The action commits the configuration changes to the
    device after processing all valid entities.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Address Set Name | String | Yes | The name of the address set from which the
    IP addresses should be removed. |

    | Zone Name | String | No | The security zone associated with the address set.
    If provided, the action will look for the address set within this specific zone.
    |


    ### Flow Description

    1. Establishes a connection to the Juniper VSRX device using the provided credentials.

    2. Iterates over the target entities, filtering for those of type `ADDRESS`.

    3. For each valid IP address, retrieves its corresponding IP record name from
    the device configuration.

    4. Executes the necessary commands to delete the IP record from the specified
    address set (and zone, if configured).

    5. Commits the configuration changes to the Juniper VSRX device.

    6. Closes the connection session and returns a summary of the removed entities.
  capabilities:
