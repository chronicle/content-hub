Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Juniper VSRX device.
    This action verifies that the integration is correctly configured and that the
    device is reachable.


    ### Flow Description

    1. Retrieve the integration configuration parameters (Address, Port, Username,
    Password).

    2. Initialize the `JuniperVSRXManager` with the provided credentials.

    3. Execute the `ping()` method, which invokes the `probe()` function on the Juniper
    device to verify connectivity.

    4. If the probe is successful, set the result to `True` and output "Connection
    Established."; otherwise, set the result to `False` and output "Connection Failed.".

    5. Close the session with the device.

    6. Terminate the action with the final status.


    ### Additional Notes

    This action is used for troubleshooting and verifying the integration setup. It
    does not perform any security operations or data modifications.
