name: Isolate Endpoint
description: 'Isolate endpoints in Trend Vision One. Supported entities: IP Address,
    Hostname. Note: Action is running as async, please adjust script timeout value
    in Chronicle SOAR IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-vision-one#isolate_endpoint
integration_identifier: TrendVisionOne
parameters:
-   name: Description
    default_value: ''
    type: string
    description: Specify the reasoning for the isolation of the endpoints.
    is_mandatory: false
-   name: Agent UUID
    default_value: ''
    type: string
    description: A comma-separated list of UUIDs. The action processes these UUIDs
        along with their related entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/isolate_endpoint_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
