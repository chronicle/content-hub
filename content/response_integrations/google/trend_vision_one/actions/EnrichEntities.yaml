name: Enrich Entities
description: 'Enrich entities using information from Trend Vision One. Supported entities:
    Hostname, IP address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-vision-one#enrich_entities
integration_identifier: TrendVisionOne
parameters:
-   name: Agent UUID
    default_value: ''
    type: string
    description: A comma-separated list of UUIDs. The action processes these UUIDs
        along with their related entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
