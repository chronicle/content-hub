name: Update Workbench Alert
description: Update a workbench alert in Trend Vision One.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-vision-one#update_workbench_alert
integration_identifier: TrendVisionOne
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - In Progress
    - True Positive
    - False Positive
    description: Specify what status to set for the alert.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/update_workbench_alert_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
