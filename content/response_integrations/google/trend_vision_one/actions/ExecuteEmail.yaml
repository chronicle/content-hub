name: Execute Email
description: Execute email action on the endpoint in Trend Vision One. Action is running
    as async, please adjust script timeout value in Chronicle SOAR IDE for action
    as needed.
integration_identifier: TrendVisionOne
parameters:
-   name: Action
    default_value: Delete
    type: ddl
    optional_values:
    - Delete
    - Quarantine
    - Restore
    description: Specify the action for the email.
    is_mandatory: false
-   name: Message ID
    default_value: ''
    type: string
    description: Specify the ID of the message that needs to be used in the action.
    is_mandatory: true
-   name: Mailbox
    default_value: ''
    type: string
    description: Specify the mailbox related to the message.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Specify a description for the performed action.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
