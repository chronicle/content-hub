Execute Email:
  ai_description: >-
    ### General Description

    Executes email management actions (Delete, Quarantine, Restore) on the Trend Vision
    One platform. This action allows analysts to perform remediation tasks on specific
    emails identified during an investigation.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) and action
    parameters (Action, Message ID, Mailbox, Description).

    2. Initializes the `TrendVisionOneManager` and tests connectivity to the Trend
    Vision One API.

    3. If it is the first run, calls `manager.execute_email` to initiate the requested
    action (Delete, Quarantine, or Restore) for the specified `Message ID` and `Mailbox`.

    4. If the action is asynchronous, it enters a polling loop (via `query_operation_status`)
    to check the task status until completion or timeout.

    5. Updates the action result with the final status and adds JSON results to the
    SecOps platform.


    ### Additional Notes

    This action is asynchronous; ensure the script timeout in the Chronicle SOAR IDE
    is configured appropriately to allow for task completion.
