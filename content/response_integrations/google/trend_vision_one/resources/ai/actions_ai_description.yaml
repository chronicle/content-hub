Execute Custom Script:
  ai_description: >-
    ### General Description

    Executes a custom script on specified endpoints in Trend Vision One. This action
    targets endpoints identified by Hostname or IP Address entities, as well as explicitly
    provided Agent UUIDs, and initiates the execution of a predefined script on them.


    ### Flow Description

    1. Extracts the script name, script parameters, and agent UUIDs from the action
    configuration.

    2. Iterates over the provided Hostname and IP Address entities, querying Trend
    Vision One to find their corresponding endpoint GUIDs.

    3. Initiates the execution of the specified script on the identified endpoints
    and any explicitly provided agent UUIDs via a POST request to the Trend Vision
    One API.

    4. Monitors the execution tasks asynchronously, periodically checking their status
    until completion or timeout.

    5. Returns the execution results, including task IDs and statuses, as a JSON object.


    ### Additional Notes

    This is an asynchronous action. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed to accommodate long-running scripts.
