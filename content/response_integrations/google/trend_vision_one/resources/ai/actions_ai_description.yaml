    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities with enrichment data and adds an entity table.
    reasoning: >-
      The action fetches endpoint data from Trend Vision One using a GET request.
      It does not mutate any external data. Internally, it updates the entities with
      the retrieved enrichment data and adds an entity table.
  categories:
