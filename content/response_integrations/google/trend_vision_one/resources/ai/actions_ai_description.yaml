Submit URL:
  ai_description: >-
    ### General Description

    Submits URL entities to the Trend Vision One sandbox for analysis. This asynchronous
    action initiates a sandbox analysis task for each provided URL, monitors the task
    status, and retrieves the analysis results once completed.


    ### Flow Description

    1. Iterates through the provided URL entities.

    2. Submits the URLs to the Trend Vision One sandbox using a POST request to the
    `/v3.0/sandbox/urls/analyze` endpoint.

    3. Monitors the status of the analysis tasks asynchronously by making GET requests
    to the `/v3.0/sandbox/tasks/{task_id}` endpoint.

    4. Once a task is completed successfully, retrieves the analysis results via a
    GET request to the `/v3.0/sandbox/analysisResults/{task_id}` endpoint.

    5. Attaches the retrieved analysis results as JSON data to the action's results.


    ### Additional Notes

    This action runs asynchronously. Ensure that the script timeout value in the Chronicle
    SOAR IDE is adjusted appropriately to allow sufficient time for the sandbox analysis
    to complete.
