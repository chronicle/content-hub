Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using contextual data retrieved from
    Trend Vision One. This action queries the Trend Vision One API to gather endpoint
    details, such as OS description, login accounts, and installed product codes,
    and attaches this information to the corresponding entities within the SOAR platform.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves necessary configuration
    parameters, including the API Root, API Token, and SSL verification settings.

    2. **Entity Filtering**: The action filters the provided target entities, selecting
    only those of type Hostname or IP Address.

    3. **Data Retrieval**: For each valid entity, the action calls the `search_endpoint`
    method (via the Trend Vision One API) to fetch associated endpoint metadata.

    4. **Enrichment**: If endpoint data is found, the action updates the entity's
    `additional_properties` with the retrieved details, marks the entity as enriched,
    and adds an entity table to the result.

    5. **Agent Processing**: If an optional Agent UUID is provided, the action processes
    these identifiers to retrieve additional endpoint information.

    6. **Finalization**: The action updates the enriched entities in the SOAR platform
    and returns a JSON result containing the gathered data.


    ### Additional Notes

    This action is strictly an enrichment operation and does not perform any state-changing
    mutations on external systems. It relies on the Trend Vision One API to provide
    context for security investigations.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with contextual endpoint data from Trend
    Vision One.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
