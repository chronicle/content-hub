    1. The action extracts the required configuration parameters: `API Root`, `API
    Token`, and `Verify SSL`.

    2. It initializes the `TrendVisionOneManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Trend Vision One healthcheck endpoint (`/v3.0/healthcheck/connectivity`).

    4. The response is validated to ensure the connection is successful.

    5. The action concludes by returning a success or failure message based on the
    connectivity test result.


    ### Additional Notes

