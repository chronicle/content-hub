Submit File:
  ai_description: >-
    ### General Description

    This action submits one or more files from the local filesystem to the Trend Vision
    One sandbox for analysis. It operates asynchronously, periodically checking the
    status of the submission tasks and retrieving the analysis results once completed.


    ### Flow Description

    1. Extracts the provided file paths, archive password, document password, and
    arguments from the action parameters.

    2. Verifies that the specified files exist and are accessible on the local filesystem.

    3. Initiates a POST request to the Trend Vision One API (`/v3.0/sandbox/files/analyze`)
    for each file to submit it for analysis.

    4. Asynchronously polls the Trend Vision One API (`/v3.0/sandbox/tasks/{task_id}`)
    to check the status of each submission task.

    5. Once a task completes successfully, retrieves the analysis results via a GET
    request to `/v3.0/sandbox/analysisResults/{task_id}`.

    6. Aggregates the results and attaches them as JSON to the action's output.


    ### Additional Notes

    - This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted appropriately to allow sufficient time for the sandbox analysis
    to complete.

    - The action requires the files to be present on the local filesystem where the
    SOAR agent or connector is running.
