  ai_description: >-
    Enriches Hostname and IP Address entities using information from Trend Vision
    One. The action searches for endpoints associated with the entities or provided
    Agent UUIDs and retrieves contextual metadata such as OS description, login account,
    endpoint name, IP, and installed product codes.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Agent UUID | String | False | A comma-separated list of UUIDs. The action processes
    these UUIDs along with their related entities. |


    ### Action Flow

    1. Iterates over the target entities and filters for Hostname and IP Address types.

    2. For each suitable entity, searches for the corresponding endpoint in Trend
    Vision One.

    3. If Agent UUIDs are provided, searches for endpoints matching those UUIDs.

    4. Enriches the entities with the retrieved endpoint data, updates the entities
    in the platform, and creates an entity table with the results.

    5. Returns a JSON object containing the endpoint details.
