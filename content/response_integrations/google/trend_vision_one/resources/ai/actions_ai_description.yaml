Unisolate Endpoint:
  ai_description: >-
    ### General Description

    Unisolates specific endpoints in Trend Vision One. This action initiates a state
    change on the external device to restore network connectivity for the specified
    entities or agent UUIDs.


    ### Flow Description

    1. Iterates over the target entities, filtering for IP Address and Hostname entity
    types.

    2. For each suitable entity, searches Trend Vision One to retrieve the corresponding
    endpoint's Agent GUID.

    3. Processes any explicitly provided Agent UUIDs from the action parameters.

    4. Makes a POST request to the Trend Vision One API to initiate an unisolation
    (restore) task for each identified Agent GUID.

    5. Asynchronously polls the Trend Vision One API to check the status of the unisolation
    tasks until they succeed, fail, or time out.

    6. Returns the task statuses and outputs a summary message.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed to accommodate the polling duration.
