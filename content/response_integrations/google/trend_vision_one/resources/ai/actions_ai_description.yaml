Execute Email:
  ai_description: >-
    ### General Description

    Executes a specified action (Delete, Quarantine, or Restore) on an email message
    in Trend Vision One. This action initiates a state change on the external system
    to manage potentially malicious or misclassified emails.


    ### Flow Description

    1. Retrieves the specified action, message ID, mailbox, and description from the
    action parameters.

    2. Initiates an asynchronous request to the Trend Vision One API (`POST /v3.0/response/emails/{email_action}`)
    to execute the action on the email.

    3. Polls the API (`GET /v3.0/response/tasks/{task_id}`) to check the status of
    the execution task.

    4. Once completed, returns the execution results and attaches them as JSON to
    the action result.


    ### Additional Notes

    This is an asynchronous action. Ensure the script timeout value in the IDE is
    adjusted appropriately.
