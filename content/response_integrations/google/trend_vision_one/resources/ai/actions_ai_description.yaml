Unisolate Endpoint:
  ai_description: >-
    ### General Description

    Unisolates endpoints in Trend Vision One. This action restores network connectivity
    to endpoints that were previously isolated, allowing them to communicate with
    the network again. It supports processing via specific entity types (IP Address,
    Hostname) or by providing a list of Agent UUIDs.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Token, Verify SSL)
    and action parameters (Description, Agent UUIDs).

    2. It filters the `target_entities` to include only `ADDRESS` and `HOSTNAME` types.

    3. For each valid entity, the action searches for the corresponding endpoint in
    Trend Vision One using the `search_endpoint` API (GET request).

    4. If the endpoint is found, the action initiates the unisolation process by calling
    the `unisolate_endpoint` API (POST request).

    5. If Agent UUIDs are provided, the action processes these agents directly using
    the `unisolate_endpoint` API.

    6. The action monitors the status of the unisolation tasks by polling the `get_task`
    API (GET request) until the operation succeeds, fails, or the action times out.

    7. Finally, it returns the status of the operation and any relevant JSON results.


    ### Additional Notes

    This action is asynchronous. It relies on the Trend Vision One API to perform
    the unisolation and monitor task completion. Ensure the action timeout is configured
    appropriately in the SOAR platform to accommodate the asynchronous nature of the
    task.
  ai_short_description: >-
    Unisolates endpoints in Trend Vision One by restoring their network connectivity.
