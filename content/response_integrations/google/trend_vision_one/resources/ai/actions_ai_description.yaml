Submit URL:
  ai_description: >-
    ### General Description

    Submits URL entities to Trend Vision One for sandbox analysis. This action initiates
    an asynchronous analysis task for the provided URLs and retrieves the resulting
    threat intelligence or behavior reports.


    ### Flow Description

    1. The action identifies URL entities from the target entities list.

    2. It iterates through the URLs in chunks and submits them to the Trend Vision
    One sandbox API (`/v3.0/sandbox/urls/analyze`).

    3. The action monitors the status of the submission tasks asynchronously.

    4. It polls the task details (`/v3.0/sandbox/tasks/{task_id}`) and retrieves the
    analysis results (`/v3.0/sandbox/analysisResults/{task_id}`) once completed.

    5. The final analysis results are added to the action's result JSON, and an output
    message is generated summarizing the submission status.


    ### Additional Notes

    This action is asynchronous. If the action approaches the timeout limit, it will
    raise a `TrendVisionOneTimeoutException`. Ensure the action timeout is configured
    appropriately in the SOAR IDE.
