  ai_description: >-
    ### General Description

    This action isolates endpoints in Trend Vision One. It targets IP Address and
    Hostname entities, as well as explicitly provided Agent UUIDs, to initiate an
    isolation task on the Trend Vision One platform, effectively containing the host.


    ### Flow Description

    1. The action iterates over the target entities (IP Address and Hostname).

    2. For each entity, it queries Trend Vision One to find the corresponding endpoint
    and retrieve its GUID.

    3. It initiates an isolation task for the identified endpoints.

    4. It also processes any explicitly provided Agent UUIDs and initiates isolation
    tasks for them.

    5. The action continuously queries the status of the isolation tasks until they
    complete, fail, or time out.

    6. Finally, it returns a summary of successfully isolated endpoints and those
    that failed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Description | String | False | Specify the reasoning for the isolation of the
    endpoints. This will be recorded in Trend Vision One. |

    | Agent UUID | String | False | A comma-separated list of Agent UUIDs. The action
    processes these UUIDs along with their related entities. |


    ### Additional Notes

    This action runs asynchronously. Please adjust the script timeout value in the
    Chronicle SOAR IDE as needed to allow sufficient time for the isolation tasks
    to complete.
