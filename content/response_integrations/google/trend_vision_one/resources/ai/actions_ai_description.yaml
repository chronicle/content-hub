Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities, as well as provided Agent UUIDs, using
    endpoint information from Trend Vision One. This action retrieves contextual metadata
    about the endpoints and updates the entities within the SecOps platform.


    ### Flow Description

    1. Initializes the Trend Vision One manager and tests connectivity.

    2. Filters the target entities to include only Hostname and IP Address types.

    3. Iterates through the filtered entities and queries Trend Vision One for endpoint
    details using the entity's original identifier (IP or Hostname).

    4. If an endpoint is found, the action enriches the entity's additional properties,
    marks it as enriched, and attaches an entity table with the endpoint data.

    5. Processes any provided Agent UUIDs by querying Trend Vision One and appending
    the successful results.

    6. Updates the successfully enriched entities in the SecOps platform and attaches
    the raw JSON results to the action.


    ### Additional Notes

    None.
  ai_short_description: >-
    Enriches Hostname and IP Address entities, along with optional Agent UUIDs, by
    retrieving endpoint details from Trend Vision One.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to Trend Vision One API to fetch endpoint data.
      It does not mutate external data but updates internal entities with the fetched
      enrichment data.
