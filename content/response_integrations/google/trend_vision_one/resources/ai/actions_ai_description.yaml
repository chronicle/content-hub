Isolate Endpoint:
  ai_description: "### General Description\nThis action isolates endpoints in Trend\
    \ Vision One to prevent network communication. It allows security analysts to\
    \ contain potentially compromised hosts identified by IP address or hostname.\
    \ The action is asynchronous, meaning it initiates the isolation request and polls\
    \ for the task status until completion or timeout.\n\n### Flow Description\n1.\
    \ **Initialization**: The action extracts configuration parameters (API Root,\
    \ API Token, SSL verification) and action parameters (Description, Agent UUIDs).\n\
    2. **Entity Processing**: \n   - It filters `target_entities` for supported types\
    \ (IP Address, Hostname).\n   - For each entity, it calls `manager.search_endpoint`\
    \ to retrieve the corresponding agent GUID from Trend Vision One.\n   - If an\
    \ agent is found, it calls `manager.isolate_endpoint` to trigger the isolation\
    \ task.\n3. **Agent UUID Processing**: If Agent UUIDs are provided, it processes\
    \ them directly via `process_agents` and triggers isolation for those agents.\n\
    4. **Status Polling**: The action enters a polling loop (or is called subsequently\
    \ in async mode) to check the status of the isolation tasks using `manager.get_task`.\n\
    5. **Completion**: Once tasks reach a terminal state (succeeded, failed, or rejected),\
    \ it generates a summary output message and returns the execution status.\n\n\
    ### Additional Notes\n- This action is asynchronous. If the action times out,\
    \ it will report pending endpoints and should be re-run or have its timeout threshold\
    \ adjusted in the SOAR IDE.\n- The action supports both entity-based isolation\
    \ (via IP/Hostname) and direct Agent UUID-based isolation."
