Update Workbench Alert:
  ai_description: >-
    ### General Description

    Updates the investigation status of a specific workbench alert within the Trend
    Vision One platform. This action allows analysts to synchronize the alert's state
    in the external system based on their investigation findings.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) and action
    parameters (Alert ID, Status).

    2. Validates that the provided 'Status' is not the default 'Select One' value.

    3. Initializes the TrendVisionOneManager to handle API interactions.

    4. Executes a PATCH request to the Trend Vision One API to update the investigation
    status of the specified alert.

    5. Retrieves the updated alert details from the Trend Vision One platform using
    the provided Alert ID.

    6. Adds the updated alert data to the action result for visibility.


    ### Additional Notes

    This action requires a valid Alert ID and a supported status value (e.g., New,
    In Progress, True Positive, False Positive) as defined in the Trend Vision One
    platform.
