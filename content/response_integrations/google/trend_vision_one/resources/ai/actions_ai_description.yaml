Submit File:
  ai_description: >-
    ### General Description

    Submits one or more files to the Trend Vision One sandbox for automated analysis.
    This action allows security analysts to upload suspicious files, including archives
    or documents protected by passwords, to evaluate their behavior and threat potential
    within the Trend Vision One environment.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the list of file paths, optional
    passwords (archive/document), and arguments from the action parameters.

    2. **File Validation**: The action verifies that the specified files exist and
    are accessible on the local filesystem.

    3. **File Submission**: For each file, the action makes a POST request to the
    Trend Vision One API (`/v3.0/sandbox/files/analyze`) to initiate the sandbox analysis
    task.

    4. **Task Monitoring**: The action enters an asynchronous polling loop, checking
    the status of the submitted tasks via the Trend Vision One API (`/v3.0/sandbox/tasks/{task_id}`).

    5. **Result Retrieval**: Once a task reaches a terminal state (success, failure,
    or rejection), the action retrieves the analysis results (`/v3.0/sandbox/analysisResults/{task_id}`)
    if available.

    6. **Output Generation**: The action compiles the results and updates the SOAR
    platform with the analysis data using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is designed to run asynchronously. If the analysis takes longer than
    the default timeout, the action may need to be re-run or the timeout settings
    in the Chronicle SOAR IDE should be adjusted. The action handles rate limiting
    and provides detailed logs for each file submission attempt.
  ai_short_description: >-
    Submits files to the Trend Vision One sandbox for analysis and retrieves the resulting
    behavior report.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Trend Vision One sandbox for analysis.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
