Execute Custom Script:
  ai_description: >-
    ### General Description

    Executes a custom script on endpoints managed by Trend Vision One. This action
    allows security analysts to run predefined scripts on specific hosts or IP addresses
    to perform remediation, data collection, or system configuration tasks.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) and action
    parameters (Script Name, Script Parameters, Agent UUIDs).

    2. Identifies target endpoints by searching for provided `HOSTNAME` or `ADDRESS`
    entities in Trend Vision One using the `search_endpoint` API.

    3. Processes provided `Agent UUIDs` directly if they are supplied in the action
    parameters.

    4. Initiates the script execution on the identified endpoints via the Trend Vision
    One API (`run_script`).

    5. Monitors the execution status of the tasks asynchronously by polling the task
    status.

    6. Returns the final execution status and results (JSON) to the SOAR platform.


    ### Additional Notes

    This action is asynchronous. It requires the Trend Vision One integration to be
    configured. The action will wait for the script execution to complete or until
    the action timeout is reached.
