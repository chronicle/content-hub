name: Upload File To Bucket
description: Upload file to bucket in AWS S3.
integration_identifier: AWSS3
parameters:
-   name: File Path
    default_value: ''
    type: string
    description: 'Specify the absolute path to the file that needs to be uploaded.
        Example: /folder_1/folder_2/filename'
    is_mandatory: true
-   name: Bucket Upload Path
    default_value: ''
    type: string
    description: 'Specify the path in the bucket to where the path should be uploaded.
        Example: s3://siemplify/syslog/log.txt'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/upload_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
