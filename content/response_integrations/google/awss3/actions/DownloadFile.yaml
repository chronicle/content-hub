name: Download File From Bucket
description: Download file from bucket in AWS S3.
integration_identifier: AWSS3
parameters:
-   name: Bucket File Path
    default_value: ''
    type: string
    description: 'Specify the path of the file in the bucket. Example: s3://siemplify/syslog/log.txt'
    is_mandatory: true
-   name: Download Path
    default_value: ''
    type: string
    description: 'Specify the absolute path, where to download the file. Example:
        /folder_1/folder_2/filename'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/download_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
