    ### General Description

    Lists objects within a specified AWS S3 bucket. This action retrieves metadata
    about the contents of a bucket, such as object keys, sizes, and last modified
    dates, and returns them for further analysis or processing.


    ### Flow Description

    1. Initializes the AWS S3 client using the provided integration credentials.

    2. Validates connectivity to the AWS S3 service.

    3. Calls the AWS S3 API to list objects in the specified bucket, up to the maximum
    number requested.

    4. Formats the retrieved objects into a JSON result and a CSV data table.

