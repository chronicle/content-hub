Download File From Bucket:
  ai_description: >-
    ### General Description

    Downloads a specific file from an AWS S3 bucket to a specified local path on the
    SOAR environment.


    ### Flow Description

    1. Extracts the AWS credentials and region from the integration configuration.

    2. Extracts the target `Bucket File Path` and the local `Download Path` from the
    action parameters.

    3. Connects to the AWS S3 service and validates the credentials.

    4. Calls the AWS S3 API to download the specified file from the bucket to the
    local path.

    5. Returns the bucket file path and download path in the JSON result.


    ### Additional Notes

    Ensure the local download path is accessible and has the correct write permissions.
    The bucket file path must follow the format `s3://{bucket_name}/{file_name}`.
  ai_short_description: >-
    Downloads a specific file from an AWS S3 bucket to a local path.
