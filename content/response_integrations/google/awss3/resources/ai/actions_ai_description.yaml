    Retrieves information about a specific bucket policy from AWS S3. This action
    connects to the AWS S3 service and fetches the policy configuration for the provided
    bucket name, returning the details as a JSON object.


    ### Flow Description

    1. Extracts the `Bucket Name` parameter provided by the user.

    2. Initializes the AWS S3 client using the integration's configuration credentials
    and tests connectivity.

