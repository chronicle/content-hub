    1. Extracts AWS credentials (Access Key ID, Secret Key) and the default region
    from the integration configuration.

    2. Extracts the `Bucket Name` and `Policy JSON Object` from the action parameters.

    3. Initializes the `AWSS3Manager` and validates connectivity to the AWS S3 service.

    4. Calls the `put_bucket_policy` API via the `AWSS3Manager` to apply the provided
    JSON policy to the specified bucket.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    The policy must be a valid JSON string as per AWS S3 requirements. Ensure the
