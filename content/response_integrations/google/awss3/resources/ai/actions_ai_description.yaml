Download File From Bucket:
  ai_description: >-
    ### General Description

    Downloads a specific file from an AWS S3 bucket to a designated local path on
    the SOAR server. This action facilitates the retrieval of logs, forensic artifacts,
    or configuration files stored in S3 for further analysis within the SOAR platform.


    ### Flow Description

    1. The action extracts the required AWS credentials (Access Key ID, Secret Key,
    and Default Region) from the integration configuration.

    2. It extracts the `Bucket File Path` and `Download Path` parameters provided
    by the user.

    3. The action initializes the `AWSS3Manager` and performs a connectivity test
    to the AWS S3 service.

    4. It parses the `Bucket File Path` to identify the bucket name and the specific
    object key.

    5. It validates the `Download Path` to ensure the destination is valid and accessible.

    6. The action executes the download operation using the AWS SDK (`boto3`) to transfer
    the file from the S3 bucket to the local filesystem.

    7. Upon completion, it returns the status of the operation and a JSON result containing
    the file paths.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate read permissions for
    the target S3 bucket. The `Download Path` must be an absolute path on the server
    where the SOAR engine is running.
  ai_short_description: >-
    Downloads a file from an AWS S3 bucket to a specified local path.
