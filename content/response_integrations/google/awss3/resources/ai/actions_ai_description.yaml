List Bucket Objects:
  ai_description: >-
    ### General Description

    Lists objects within a specified AWS S3 bucket. This action retrieves metadata
    for objects stored in the bucket, including keys, last modified timestamps, ETags,
    sizes, storage classes, and owner information.


    ### Flow Description

    1. Initialize the AWS S3 client using the provided credentials (Access Key, Secret
    Key, Region).

    2. Validate connectivity to the AWS S3 service.

    3. Call the `list_objects` API to retrieve the list of objects from the specified
    bucket, limited by the `Max Objects to Return` parameter.

    4. Process the response to extract object details (Key, LastModified, ETag, Size,
    StorageClass, Owner).

    5. Output the results as a JSON object and a CSV data table within the SOAR platform.


    ### Additional Notes

    This action is read-only and does not modify any data in AWS S3 or the SOAR platform.
