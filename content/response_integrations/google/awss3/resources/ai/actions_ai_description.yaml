Upload File To Bucket:
  ai_description: >-
    ### General Description

    Uploads a local file to a specified AWS S3 bucket. This action facilitates data
    transfer to cloud storage for backup, logging, or further processing.


    ### Flow Description

    1. Extracts AWS credentials (Access Key, Secret Key, Region) and action parameters
    (`File Path`, `Bucket Upload Path`).

    2. Parses the `Bucket Upload Path` to determine the target S3 bucket and destination
    filename.

    3. Initializes the AWS S3 client and validates connectivity to the AWS service.

    4. Validates that the local file at the provided `File Path` exists and is accessible.

    5. Uploads the file to the target AWS S3 bucket using the AWS SDK.

