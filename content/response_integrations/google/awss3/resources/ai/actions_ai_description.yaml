Upload File To Bucket:
  ai_description: >-
    ### General Description

    Uploads a specified local file to an AWS S3 bucket. This action allows users to
    transfer files from the local SOAR environment to an external AWS S3 storage bucket.


    ### Flow Description

    1. Extracts the AWS credentials and region from the integration configuration.

    2. Retrieves the local `File Path` and the target `Bucket Upload Path` from the
    action parameters.

    3. Parses the target bucket path to identify the bucket name and destination filename.

    4. Connects to the AWS S3 service and validates the credentials.

    5. Uploads the file to the specified AWS S3 bucket using the `boto3` client.

    6. Returns a JSON object containing the bucket upload path and the local file
    path.


    ### Additional Notes

    The action requires valid AWS credentials with permissions to write to the target
    S3 bucket. The `Bucket Upload Path` must follow the format `s3://{bucket_name}/{file_name}`.
  ai_short_description: >-
    Uploads a specified local file to a target AWS S3 bucket.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a local file to a specified AWS S3 bucket.
    fetches_data: false
    internal_data_mutation_explanation: null
