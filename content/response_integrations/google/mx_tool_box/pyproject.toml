[project]
name = "MXToolBox"
version = "14.0"
description = "MXToolbox is a trusted tool that offers a free, accurate, and fast network lookup and diagnostic tools. The tool is used by millions of technology experts to diagnose and resolve a wide scope of network infrastructure issues. It is capable of detecting issues relating to IP or host, DNS, domain and URL, and SMTP."
requires-python = ">=3.11,<3.12"
dependencies = [
    "netaddr==1.2.1",
    "pytest-mock>=3.15.1",
    "requests==2.32.4",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
