  ai_description: >-
    ### General Description

    This action performs a ping lookup on target entities (IP Addresses, URLs, Hostnames,
    and Users) using the MXToolBox API. It verifies the reachability of the specified
    targets by sending ICMP packets and reporting the success rate. This information
    helps analysts determine if an indicator or asset is currently active and reachable
    over the network.


    ### Flow Description

    1. The action initializes the `MXToolBoxManager` using the integration configuration
    (API Root, API Key, and SSL verification settings).

    2. It filters the `target_entities` to process only those of type `ADDRESS`, `URL`,
    `USER`, or `HOSTNAME`.

    3. For each valid entity, the action calls the `entity_ping_lookup` method via
    the MXToolBox API.

    4. The action calculates the number of packets sent and received for each entity.

    5. It compiles the results into a data table and a JSON object, which are attached
    to the action result.

    6. Finally, the action concludes by outputting a summary message and the ping
    results to the SOAR platform.


    ### Additional Notes

    This action is strictly an enrichment tool. It does not perform any state-changing
    operations on external systems or modify the internal SOAR case data. If an error
    occurs during the lookup for a specific entity, the action logs the error and
    continues processing the remaining entities.
