SPF Lookup:
  ai_description: >-
    ### General Description

    Performs a Sender Policy Framework (SPF) lookup using MXToolBox to determine if
    a specific IP address is authorized to send emails on behalf of a domain extracted
    from Hostname, User, or URL entities. It enriches the entities with the validation
    results and marks them as suspicious if the IP is unauthorized.


    ### Flow Description

    1. Iterates over the target entities and filters for Hostname, User, and URL entity
    types.

    2. Extracts the domain name from each valid entity.

    3. Makes a GET request to the MXToolBox API (`api/v1/lookup/spf/{domain}`) to
    retrieve the SPF records and authorized IP ranges for the domain.

    4. Evaluates whether the provided `IP Address` parameter falls within any of the
    authorized network ranges.

    5. If the IP is authorized, enriches the entity's additional properties with the
    validation result.

    6. If the IP is unauthorized, marks the entity as suspicious and enriches its
    additional properties with the failure reason.

    7. Updates the entities in the Google SecOps platform and attaches the results
    as JSON and a data table.


    ### Additional Notes

    Ensure that the MXToolBox integration is properly configured with a valid API
    key. The action relies on extracting a valid domain from the supported entity
    types to perform the SPF lookup.
