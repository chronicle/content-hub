Blacklist Check:
  ai_description: >-
    ### General Description

    This action performs a blacklist lookup for Domain and IP Address entities using
    the MXToolBox service. It evaluates the reputation of the provided entities by
    checking them against multiple blacklist engines. If the number of blacklists
    an entity appears in meets or exceeds the configured threshold, the action marks
    the entity as suspicious and provides detailed insights.


    ### Flow Description

    1. **Initialization**: The action initializes the `MXToolBoxManager` using the
    provided API credentials and configuration.

    2. **Entity Filtering**: It filters the `target_entities` to process only those
    of type `HOSTNAME` or `ADDRESS`.

    3. **API Interaction**: For each valid entity, the action calls the `domain_blacklist_lookup`
    method of the `MXToolBoxManager` to retrieve blacklist status via an API GET request.

    4. **Threshold Evaluation**: The action parses the results. If the entity is found
    in any blacklists, it compares the count of blacklists against the `Blacklist
    Threshold` parameter.

    5. **Entity Update**: If the threshold is met, the entity's `is_suspicious` property
    is set to `True`.

    6. **Reporting**: The action updates the entities in the SOAR platform, adds an
    entity insight containing the blacklist findings, and attaches a JSON result containing
    the full lookup data.


    ### Additional Notes

    This action requires a valid MXToolBox API key configured in the integration settings.
    It is designed for enrichment and does not perform any blocking or remediation
    actions on external systems.
