TCP Port Status:
  ai_description: >-
    ### General Description

    Checks if a specific TCP port is open on target entities (IPs, Hostnames, URLs,
    Users) using the MXToolBox service. This action provides visibility into network
    connectivity and service availability for the specified entities.


    ### Flow Description

    1. The action initializes the `MXToolBoxManager` using the configured API root
    and API key.

    2. It retrieves the `Port Number` parameter provided by the user.

    3. It filters the `target_entities` to process only `HOSTNAME`, `ADDRESS`, `USER`,
    and `URL` types.

    4. For each valid entity, the action calls the `get_port_status` method of the
    `MXToolBoxManager` (making an HTTP GET request to the MXToolBox API) to determine
    if the specified port is open.

    5. The result (True/False) is stored in the entity's `additional_properties` under
    the key `MX_port_{port_number}`.

    6. A data table containing the status for each entity is added to the action results.

    7. The action updates the entities in the SOAR platform with the new properties.


    ### Additional Notes

    This action requires a valid MXToolBox API key and API root URL configured in
    the integration settings. It does not perform any blocking or remediation actions;
    it is strictly for information gathering.
