Blacklist Check:
  ai_description: >-
    ### General Description

    Checks if Domain or IP Address entities are blacklisted using MXToolBox. This
    action retrieves threat intelligence regarding the entity's presence on various
    blacklists, evaluates the risk based on a specified threshold, updates the entity's
    suspicious status, and generates an insight with the analysis results.


    ### Flow Description

    1. Initializes the MXToolBox API client.

    2. Iterates over target entities of type HOSTNAME or ADDRESS.

    3. Makes a GET request to the MXToolBox API (`api/v1/lookup/blacklist/{domain_name}`)
    to perform a blacklist lookup for each entity.

    4. If the entity is found on blacklists, it records the failed engines and reasons
    in an entity table.

    5. Compares the number of blacklists the entity appears on against the provided
    `Blacklist Threshold`.

    6. If the threshold is met or exceeded, marks the entity as suspicious.

    7. Updates the entities in the SecOps platform.

    8. Creates an insight for each analyzed entity detailing the number of blacklists
    it was found on.

    9. Returns the results as JSON.


    ### Additional Notes

    None.
