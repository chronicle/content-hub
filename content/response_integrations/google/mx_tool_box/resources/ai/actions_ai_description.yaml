A Record Lookup:
  ai_description: >-
    ### General Description

    Performs an A record lookup on Hostname, URL, and User entities using MXToolBox
    to retrieve their resolved IP addresses. The action enriches the entities with
    the resolved IP addresses and provides the results in a data table and JSON format.


    ### Flow Description

    1. Filters the target entities to include only Hostname, URL, and User entity
    types.

    2. Iterates through the filtered entities and extracts the domain name from each
    entity.

    3. Makes a GET request to the MXToolBox API (`api/v1/lookup/a/{domain}`) to perform
    an A record lookup.

    4. Updates the entity's additional properties with the resolved IP addresses and
    marks the entity as enriched.

    5. Returns the results as a JSON object, a data table, and a comma-separated list
    of IP addresses.


    ### Additional Notes

    If an error occurs during the lookup for a specific entity, the action logs the
    error, skips the entity, and continues processing the remaining entities.
  ai_short_description: >-
    Performs an A record lookup on Hostname, URL, and User entities using MXToolBox
    to retrieve their resolved IP addresses.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the MXToolBox API to fetch A record data (fetches_data=true).
      It does not mutate external data or internal SecOps data outside of entities.
      It updates entities by modifying their additional_properties and setting is_enriched
      to True, followed by calling `siemplify.update_entities` (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
