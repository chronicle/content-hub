SPF Lookup:
  ai_description: >-
    ### General Description

    The SPF Lookup action retrieves and analyzes Sender Policy Framework (SPF) records
    for specified domain entities using the MXToolBox service. It determines whether
    a provided IP address is authorized to send email on behalf of the target domains
    by comparing the IP against the domain's published SPF IP ranges.


    ### Flow Description

    1. The action initializes the MXToolBoxManager using the provided API configuration.

    2. It filters the target entities to include only those of type `HOSTNAME`, `USER`,
    or `URL`.

    3. For each valid entity, the action calls the `MXToolBoxManager.get_spf_ips_list_for_domain`
    method to retrieve the list of authorized IP ranges associated with the domain.

    4. It iterates through the retrieved IP ranges and uses `MXToolBoxManager.is_address_in_network_range`
    to check if the provided `IP Address` parameter falls within any of the authorized
    ranges.

    5. Based on the check:
       - If the IP is authorized, the entity's `additional_properties` are updated
    to reflect the authorization status.
       - If the IP is not authorized, the entity is marked as suspicious, and its
    `additional_properties` are updated accordingly.
    6. The action updates the entities in the system using `siemplify.update_entities`.

    7. Finally, it adds the lookup results to the case as a data table and a JSON
    result object.


    ### Additional Notes

    This action requires a valid MXToolBox API key. It does not perform any external
    mutations; it is strictly an enrichment and investigation tool. The action will
    skip entities that do not match the supported types.
  ai_short_description: >-
    Enriches domain-related entities by verifying if a specific IP address is an authorized
    sender according to the domain's SPF records.
