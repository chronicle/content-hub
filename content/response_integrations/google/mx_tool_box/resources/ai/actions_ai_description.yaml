A Record Lookup:
  ai_description: >-
    ### General Description

    Performs an A record lookup for specified entities using the MXToolBox service.
    This action resolves domain names to their corresponding IP addresses, providing
    valuable network context for investigation and enrichment.


    ### Flow Description

    1. The action initializes the `MXToolBoxManager` using the configured API root
    and API key from the integration settings.

    2. It filters the `target_entities` to process only those of type `HOSTNAME`,
    `URL`, or `USER`.

    3. For each valid entity, the action extracts the domain and performs an A record
    lookup via the MXToolBox API (`api/v1/lookup/a/{0}`).

    4. If successful, the retrieved IP addresses are added to the entity's `additional_properties`
    under the key `MX_IP Addresses`, and the entity is marked as enriched (`is_enriched
    = True`).

    5. The action compiles the results into a data table and a JSON result object.

    6. Finally, it updates the enriched entities within the SOAR platform and terminates
    with a summary message.


    ### Additional Notes

    This action is primarily used for DNS reconnaissance. It does not perform any
    state-changing operations on external systems; it strictly retrieves and stores
    enrichment data within the SOAR platform.
  ai_short_description: >-
    Performs an A record lookup for domain-based entities using MXToolBox to retrieve
    and store associated IP addresses.
