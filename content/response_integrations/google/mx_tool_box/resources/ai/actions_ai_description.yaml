MX Record Lookup:
  ai_description: >-
    ### General Description

    This action performs an MX (Mail Exchange) record lookup for specified entities
    using the MXToolBox service. It retrieves the mail server addresses associated
    with the domain extracted from the provided entities, providing valuable context
    for email security investigations and domain reputation analysis.


    ### Flow Description

    1. The action retrieves the integration configuration, specifically the API Root
    and API Key for MXToolBox.

    2. It filters the `target_entities` to include only those of type `HOSTNAME`,
    `URL`, or `USER`.

    3. For each valid entity, the action extracts the domain using `get_domain_from_entity`.

    4. It makes an API call to the MXToolBox service (`GET api/v1/lookup/mx/{domain}`)
    to retrieve the MX records.

    5. If data is found, the action:
        - Updates the entity's `additional_properties` with the retrieved MX hostnames.
        - Sets the entity's `is_enriched` flag to `true`.
        - Adds an entity table containing the lookup results to the SOAR platform.
        - Updates the entities in the SOAR platform.
    6. Finally, it adds a JSON result containing all lookup data and ends the action
    with a summary of resolved domains.


    ### Additional Notes

    This action is strictly an enrichment tool. It does not modify external systems
    or perform blocking operations. It relies on the MXToolBox API and requires valid
    credentials configured in the integration settings.
