name: SPF Lookup
description: Sender Policy Framework (SPF) records allow domain owners to publish
    a list of IP addresses or subnets that are authorized to send email on their behalf
integration_identifier: MXToolBox
parameters:
-   name: IP Address
    default_value: ''
    type: string
    description: The IP address to look for
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/spf_lookup_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "USERUNIQNAME"]}'
script_result_name: auth_sender
