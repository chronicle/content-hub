Simple Search:
  ai_description: >-
    ### General Description

    Performs a search query against a specified index in Stellar Cyber Starlight.
    This action allows users to retrieve historical logs or telemetry data by providing
    an index, a query filter, and optional sorting parameters.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, API Key/Token, and SSL
    verification settings).

    2. Extracts action parameters (Index, Query, Max Results, Sort Field, and Sort
    Order).

    3. Initializes the `StellarCyberStarlightManager` with the provided credentials.

    4. Executes a GET request to the Stellar Cyber Starlight API endpoint (`data/{index}/_search`)
    using the provided search criteria.

    5. Parses the search results and adds them to the action result JSON for display
    in the SecOps platform.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in Stellar Cyber
    Starlight or the SecOps platform.
