    Performs a simple search in Stellar Cyber Starlight based on a specified index
    and query. This action retrieves matching records and returns them as JSON results
    for further analysis or processing within the SOAR platform.


    ### Flow Description

    1. Initializes the Stellar Cyber Starlight manager using the provided API credentials.

    2. Constructs a search payload using the provided query, limit, and sorting parameters.

    3. Executes a GET request to the Stellar Cyber Starlight `data/{index}/_search`
    API endpoint.

    4. Parses the returned hits and attaches them as JSON results to the action output.


    ### Additional Notes

    Ensure that the specified index exists in Stellar Cyber Starlight and that the
    query is formatted correctly according to the platform's search syntax.
