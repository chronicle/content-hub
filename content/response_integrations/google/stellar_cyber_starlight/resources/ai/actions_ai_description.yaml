Update Security Event:
  ai_description: >-
    ### General Description

    Updates a specific security event in Stellar Cyber Starlight. This action allows
    users to modify the status of an event and append comments to it directly within
    the Stellar Cyber platform.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the event
    ID, index, status, and comment.

    2. Validates that at least a status or a comment is provided.

    3. Initializes the Stellar Cyber Starlight manager with the provided credentials.

    4. Sends a POST request to the Stellar Cyber API to update the specified security
    event with the new status and/or comment.

    5. Returns a success message upon successful update.


    ### Additional Notes

    None.
