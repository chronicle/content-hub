Advanced Search:
  ai_description: >-
    Performs an advanced search in Stellar Cyber Starlight using a custom DSL query.
    This action allows users to query specific indexes within the Stellar Cyber platform
    to retrieve historical logs or telemetry data based on complex filtering criteria.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, API Key/Token,
    Verify SSL) and action parameters (Index, DSL Query).

    2. It initializes the `StellarCyberStarlightManager` with the provided credentials.

    3. The action calls the `make_advanced_search` method, which sends a GET request
    to the Stellar Cyber Starlight API endpoint (`data/{index}/_search`) using the
    provided DSL query as the request body.

    4. The response is parsed, and the resulting hits are added to the action's result
    JSON.


    ### Additional Notes

    Ensure the DSL Query is a valid JSON object formatted according to the Stellar
    Cyber Starlight API requirements.
  ai_short_description: >-
    Performs an advanced search in Stellar Cyber Starlight using a custom DSL query.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to search for data in Stellar Cyber Starlight.
      It retrieves search results and adds them to the action output. It does not
      mutate external or internal data.
