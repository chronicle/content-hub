Update Security Event:
  ai_description: >-
    ### General Description

    Updates a security event in the Stellar Cyber Starlight platform. This action
    allows analysts to modify the status and add comments to specific security events
    identified by their index and ID.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, credentials, SSL verification)
    and action parameters (Index, ID, Comment, Status).

    2. It initializes the `StellarCyberStarlightManager` with the provided credentials.

    3. It calls the `update_security_event` method on the manager.

    4. The manager performs a POST request to the Stellar Cyber Starlight API to update
    the specified event with the provided status and/or comment.

    5. The action returns a success message or an error if the update fails.


    ### Additional Notes

    This action requires valid credentials and specific event identifiers (Index and
    ID) to function. It does not interact with entities within the SOAR platform.
