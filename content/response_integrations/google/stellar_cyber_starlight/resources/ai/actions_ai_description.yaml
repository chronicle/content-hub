Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stellar Cyber Starlight platform. This action verifies
    that the integration is correctly configured and can successfully authenticate
    and communicate with the Stellar Cyber Starlight API.


    ### Flow Description

    1. Extracts integration-level configuration parameters (such as API Root, Username,
    and API Key/Token).

    2. Initializes the Stellar Cyber Starlight manager with the provided credentials.

    3. Sends a test search query (`GET` request to `data/*/_search`) to the Stellar
    Cyber Starlight API to verify authentication and network connectivity.

    4. Returns a success message if the connection is established, or an error message
    if the request fails.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration's configuration settings.
