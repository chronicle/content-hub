Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stellar Cyber Starlight server using the provided configuration
    parameters. This action validates that the integration is correctly configured
    and can communicate with the external service.


    ### Flow Description

    1. The action extracts the required configuration parameters: API Root, Username,
    API Key (optional), API Token (optional), and Verify SSL.

    2. It initializes the `StellarCyberStarlightManager` with these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Stellar Cyber Starlight API endpoint (`data/*/_search`) to verify the connection.

    4. If the connection is successful, it returns a success message. If the connection
    fails (e.g., invalid credentials or network issues), it catches the exception
    and returns a failure message.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data enrichment or state-changing operations.
