Advanced Search:
  ai_description: >-
    ### General Description

    Performs an advanced search in Stellar Cyber Starlight using a provided DSL query.
    This action allows users to query specific indexes and retrieve matching events
    or telemetry data directly from the Stellar Cyber platform.


    ### Flow Description

    1. Initializes the connection to the Stellar Cyber Starlight API using the provided
    integration credentials.

    2. Executes a GET request to the `data/{index}/_search` endpoint with the provided
    DSL query payload.

    3. Parses the response to extract the search hits.

    4. Appends the extracted hits as JSON results to the action's output for further
    use in the playbook.


    ### Additional Notes

    - Ensure the provided DSL query is a valid JSON object formatted according to
    Stellar Cyber Starlight's search syntax.
  ai_short_description: >-
    Performs an advanced search in Stellar Cyber Starlight using a provided DSL query
    and returns the matching events as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
