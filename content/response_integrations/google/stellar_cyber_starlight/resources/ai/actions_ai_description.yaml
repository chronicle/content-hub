    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the Stellar Cyber Starlight
      API to execute a search query. It does not mutate external data, update internal
      entities, create insights, or modify alert data.
