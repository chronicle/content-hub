    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the user's active status to False in CyberArk Vault via an HTTP PUT
      request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches user details (fetches_data=true) and then sends a PUT request
      to CyberArk Vault to change the user's active status to False (can_mutate_external_data=true).
      It does not interact with internal SecOps entities, insights, alerts, or case
