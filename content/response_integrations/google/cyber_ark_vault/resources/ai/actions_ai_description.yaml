Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CyberArk Vault integration to ensure that the provided
    credentials and API endpoints are configured correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (e.g., API Root, Username,
    Password).

    2. Initializes the CyberArk Manager and tests connectivity by making a GET request
    to fetch the users list.

    3. Initializes the Password Vault Manager and tests connectivity by making a GET
    request to fetch a mock account.

    4. Returns a success message if both connections are established without errors.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
    It is primarily used for troubleshooting and verifying integration setup.
