Disable User:
  ai_description: >-
    ### General Description

    Disables a specific user account in CyberArk Vault. This action initiates a state
    change on the external system to prevent the specified user from authenticating
    or accessing resources.


    ### Flow Description

    1. Retrieves the target user's current details from CyberArk Vault using an HTTP
    GET request.

    2. Evaluates the user's current active status.

    3. If the user is currently active, updates the status to `False` and sends an
    HTTP PUT request to CyberArk Vault to apply the disabled status.

    4. Returns a success or failure message based on the operation's outcome.


    ### Additional Notes

    The action requires the exact username as it exists in CyberArk Vault. It does
    not operate on SecOps entities but relies directly on the provided action parameter.
  ai_short_description: >-
    Disables a specific user account in CyberArk Vault by updating their active status
    to false.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
