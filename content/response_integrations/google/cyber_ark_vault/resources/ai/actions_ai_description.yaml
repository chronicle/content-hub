Get User Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific user from CyberArk Vault. This
    action queries the CyberArk Vault API for a given username and returns the associated
    user metadata, attaching it to the action's results for analyst review.


    ### Flow Description

    1. Retrieves the `User Name` parameter provided in the action configuration.

    2. Makes an HTTP GET request to the CyberArk Vault API (`/CyberArk/scim/v2/Users/{user_name}`)
    to fetch the user's details.

    3. If the user is found, parses the returned JSON response and flattens the dictionary
    structure.

    4. Attaches the flattened user details as a CSV-formatted data table to the action
    result.

    5. Returns a successful result if the user is found, or a failure message if the
    user does not exist.


    ### Additional Notes

    This action does not operate on SOAR entities. It relies entirely on the explicitly
    provided `User Name` parameter to perform the lookup.
