Ping:
  ai_description: >-
    General Description

    Tests connectivity to the CyberArk Vault integration by verifying access to both
    the CyberArk SCIM API and the Password Vault AIM Web Service.


    Flow Description

    1. Retrieve configuration parameters (Username, Password, API Root, Password Vault
    API Root, Application ID, SSL settings) from the integration configuration.

    2. Initialize the `CyberarkManager` and execute `test_connectivity()`, which performs
    a `GET` request to the CyberArk SCIM API (`/CyberArk/scim/v2/Users`) to retrieve
    the user list.

    3. Initialize the `PasswordVaultManager` and execute `test_connectivity()` with
    mock parameters ("Mock Safe", "Mock Folder"), which performs a `GET` request to
    the AIM Web Service Accounts endpoint (`/AIMWebService/api/Accounts`).

    4. If both requests succeed (or return expected status codes), the action concludes
    with a success message.


    Additional Notes

    This action is used for validating the integration configuration and connectivity.
    It does not modify any data.
