Enable User:
  ai_description: >-
    General Description: Enables a user account within the CyberArk Vault. This action
    allows security analysts to restore authentication capabilities for a previously
    disabled user account directly from the SOAR platform.


    Flow Description:

    1. Initialize the `CyberarkManager` using the provided configuration parameters
    (Username, Password, Api Root, Use SSL).

    2. Retrieve the current details of the specified user from the CyberArk Vault
    using the `get_user_details` method, which performs a GET request to the CyberArk
    API.

    3. Update the user's active status to `True` (enabled) using the `change_user_active_status`
    method. This method performs a PUT request to the CyberArk API to modify the user's
    account status.

    4. Return a success or failure message based on the API response.


    Additional Notes: This action modifies the state of an identity in an external
    system (CyberArk Vault).
