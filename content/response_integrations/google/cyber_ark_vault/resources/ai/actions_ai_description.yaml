Enable User:
  ai_description: >-
    ### General Description

    Enables a specific user account in CyberArk Vault. It retrieves the user's current
    details and updates their active status to true via the CyberArk SCIM API.


    ### Flow Description

    1. Retrieves the target `User Name` from the action parameters.

    2. Makes a GET request to the CyberArk SCIM API to fetch the current user details.

    3. Makes a PUT request to the CyberArk SCIM API to update the user's active status
    to true.

    4. Returns a success or failure message to the SOAR platform based on the API
    response.


    ### Additional Notes

    This action requires the CyberArk SCIM API to be accessible and properly configured
