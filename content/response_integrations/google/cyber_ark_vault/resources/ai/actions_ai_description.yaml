    external_data_mutation_explanation: >-
      Updates the user's active status to 'False' (disabled) in the CyberArk Vault.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches user details (GET) and performs a state-changing operation
      (PUT) to disable the user in the CyberArk Vault. It does not modify internal
      SOAR data or entities.
