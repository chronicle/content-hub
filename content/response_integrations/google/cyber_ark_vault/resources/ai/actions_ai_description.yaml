    ### General Description

    Retrieves detailed information about a specific group from CyberArk Vault. This
    action fetches group attributes and metadata based on the provided group name
    and attaches the results as a data table within the Google SecOps platform.


    ### Flow Description

    1. Initializes the connection to the CyberArk Vault API using the provided integration
    configuration.

    2. Retrieves the target group name from the action parameters.

