Get Group Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific group from the CyberArk Vault.
    This action allows analysts to query the vault for group-specific metadata and
    configuration details.


    ### Flow Description

    1. The action retrieves configuration settings (API root, credentials) to authenticate
    with the CyberArk Vault.

    2. It accepts the `Group Name` parameter to identify the target group.

    3. It calls the `get_group_details` method of the `CyberarkManager`, which performs
    an HTTP GET request to the CyberArk API.

    4. If the group is found, the action flattens the returned JSON data and adds
    it as a data table to the action result.

    5. The action concludes by returning a success or failure message.


