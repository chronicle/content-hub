Disable User:
  ai_description: >-
    Disables a user account within the CyberArk Vault. This action allows security
    analysts to revoke access for a specific user by modifying their account status
    in the external vault system.


    ### Flow Description

    1. The action initializes the `CyberarkManager` using the configured credentials
    and API root.

    2. It retrieves the current details of the specified user from the CyberArk Vault
    by making a GET request to the `/Users/{user_name}` endpoint.

    3. It updates the user's active status to `False` (disabled) by sending a PUT
    request to the same endpoint with the modified user details.

    4. The action returns a success or failure message based on the outcome of the
    API request.


    ### Additional Notes

    This action performs a state-changing operation on the external CyberArk Vault
    system. Ensure the provided user name matches the exact identifier as it exists
    in the vault.
  ai_short_description: >-
    Disables a specified user account in the CyberArk Vault.
