name: Change Account Password
description: 'Use the "Change Account Password" action to queue an immediate password change task in CyberArk PAM. Note: there is a delay between the task being queued and it being executed.'
integration_identifier: CyberArkPAM
parameters:
-   name: Account ID
    default_value: ''
    type: string
    description: "A comma-separated list of the account IDs to queue for an immediate password change task. Note: You can retrieve the account ID from the List Accounts action."
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/change_account_password_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
