name: Change Account Password
description: Use the "Change Account Password" action to queue a task for the CPM to perform an immediate credentials change for the specified accounts to a new random value. Note: This action doesn't run on Google SecOps SOAR entities.
integration_identifier: CyberArkPAM
parameters:
-   name: Account ID
    default_value: ''
    type: string
    description: Specify a comma-separated list of the account IDs to queue for an immediate password change task. Note: You can retrieve the account ID from the List Accounts action.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
