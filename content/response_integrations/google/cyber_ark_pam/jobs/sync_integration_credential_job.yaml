name: Sync Integration Credential Job
parameters:
-   name: Api Root
    type: string
    description: Specify the API root url of CyberArk PAM.
    is_mandatory: true
-   name: Username
    type: string
    description: Specify the username to connect with.
    is_mandatory: true
-   name: Password
    type: password
    description: Specify the password to connect with.
    is_mandatory: true
-   name: Verify SSL
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to CyberArk PAM is valid.
    is_mandatory: true
    default_value: false
-   name: CA Certificate
    type: string
    description: Specify the CA certificate to use to validate the secure connection to the API root. Base64 encoded.
    is_mandatory: false
-   name: Client Certificate
    type: string
    description: Specify the client certificate to use. Base64 encoded.
    is_mandatory: false
-   name: Client Certificate Passphrase
    type: password
    description: The passphrase for the client certificate.
    is_mandatory: false
-   name: Reason
    type: string
    description: The reason for retrieving passwords from CyberArk PAM.
    is_mandatory: true
    default_value: "Credential Synchronization Job"
-   name: Ticketing System Name
    type: string
    description: Name of the ticketing system to pass to CyberArk PAM.
    is_mandatory: false
-   name: Ticket ID
    type: string
    description: Ticket ID to pass to CyberArk PAM.
    is_mandatory: false
-   name: Environment Name
    type: string
    description: The name of the environment in which to search for credentials. For Shared Environments, provide "*".
    is_mandatory: true
    default_value: "Default Environment"
-   name: Credential Mapping
    type: string
    description: >
        JSON/YAML mapping string that maps SOAR integration instances, connectors, and jobs to their CyberArk PAM account paths.
        Values must be in the format: 'accounts/<account_id>' or 'accounts/<account_id>/versions/<version_id>'.
    is_mandatory: true
    default_value: '{"integration_instances": {"Integration_Instance_Name": {"Parameter_Name": "accounts/Account_ID"}}}'
description: >
    Use the CyberArk PAM - Sync Integration Credentials Job to synchronize credentials from CyberArk PAM and automatically update integration, connector, and job configurations.
integration: CyberArkPAM
creator: admin
