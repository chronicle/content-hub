Get Account Password Value:
  ai_description: >-
    ### General Description

    Retrieves a password or SSH key for a specified account from CyberArk PAM. This
    action allows users to securely fetch credentials from the CyberArk Privileged
    Access Manager (PAM) vault for use in automation workflows.


    ### Flow Description

    1. Initialize `CyberArkPamManager` with configuration parameters (API root, credentials,
    SSL settings).

    2. Authenticate with CyberArk PAM to obtain an access token.

    3. Execute a POST request to the CyberArk PAM API endpoint (`/PasswordVault/API/Accounts/{account_id}/Password/Retrieve/`)
    using the provided `Account` ID, `Reason`, and optional parameters (`Ticketing
    System Name`, `Ticket ID`, `Version`).

    4. Retrieve the password value from the API response.

    5. Add the retrieved password to the action result JSON.


    ### Additional Notes

    This action does not operate on Chronicle SOAR entities. It requires valid CyberArk
    PAM credentials and connectivity to the PAM API.
  ai_short_description: >-
    Retrieves a password or SSH key for a specified account from CyberArk PAM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Performs a POST request to CyberArk PAM to retrieve a password, which typically
      triggers an audit log entry in the PAM system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (password) from an external system (CyberArk PAM) via
      a POST request. This POST request typically triggers an audit log in the PAM
      system, which is a form of external data mutation. It does not mutate internal
      SOAR data or update entities.
