Get Account Password Value:
  ai_description: >-
    ### General Description

    Retrieves an account password or SSH key value from CyberArk PAM based on a specified
    account ID. This action is used to securely fetch credentials for use in automated
    workflows or investigations.


    ### Flow Description

    1. Extracts the provided action parameters, including the Account ID, Reason,
    and optional ticketing information.

    2. Initializes the CyberArk PAM API client using the integration configuration.

    3. Makes a POST request to the CyberArk PAM API (`/PasswordVault/API/Accounts/{account_id}/Password/Retrieve/`)
    to fetch the requested secret.

    4. Returns the retrieved password or SSH key as a JSON result within the SOAR
    platform.


    ### Additional Notes

    This action does not run on Chronicle SOAR entities. Both passwords and SSH keys
    can be retrieved using this action. The Account ID can typically be obtained using
    the 'List Accounts' action.
