Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CyberArk PAM installation by attempting to authenticate
    with the provided credentials. This action verifies that the integration is correctly
    configured and can communicate with the CyberArk PAM server.


    ### Flow Description

    1. The action extracts the required integration configuration parameters, including
    the API Root, Username, Password, and SSL settings.

    2. It initializes the `CyberArkPamManager` class using these parameters.

    3. The manager performs a POST request to the CyberArk PAM API endpoint (`/PasswordVault/API/Auth/CyberArk/Logon`)
    to obtain an access token.

    4. If the authentication request is successful, the action logs a success message
    and returns "true".

    5. If the authentication request fails, the action logs the error and returns
    "false".


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the CyberArk PAM server. It does not perform any data retrieval
    or modification on entities.
