List Accounts:
  ai_description: >-
    ### General Description

    Lists accounts available in CyberArk PAM based on provided search and filter criteria.
    This action queries the CyberArk PAM instance and returns the matching accounts
    as a JSON object and a data table.


    ### Flow Description

    1. Extracts action parameters including search query, search operator, max records
    to return, records offset, filter query, and saved filter.

    2. Validates the provided max records and offset values to ensure they are positive/non-negative
    numbers.

    3. Initializes the CyberArk PAM manager and authenticates using the integration
    credentials.

    4. Makes a GET request to the CyberArk PAM API (`PasswordVault/API/Accounts`)
    to retrieve the list of accounts matching the specified criteria.

    5. Parses the API response and outputs the results as a JSON object and a data
    table named 'Available PAM Accounts'.


    ### Additional Notes

    This action does not run on Chronicle SOAR entities. If both 'Filter Query' and
    'Saved Filter' parameters are provided, the 'Saved Filter' takes priority.
  ai_short_description: >-
    Lists accounts available in CyberArk PAM based on provided search and filter criteria,
    returning the results as a JSON object and a data table.
  capabilities:
    can_create_case_comments: false
