Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CyberArk PAM installation using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters including API Root, Username,
    Password, and SSL certificates.

    2. Initializes the CyberArk PAM Manager.

    3. Makes a POST request to the CyberArk PAM API (`/PasswordVault/API/Auth/CyberArk/Logon`)
    to authenticate and retrieve an access token.

    4. Returns a success message if the connection and authentication are successful,
    or an error message if they fail.


    ### Additional Notes

    This action is primarily used to verify that the integration is configured correctly
    and can communicate with the CyberArk PAM server.
