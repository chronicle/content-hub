List Accounts:
  ai_description: >-
    ### General Description

    Retrieves a list of accounts from the CyberArk PAM system based on provided search
    or filter criteria. This action allows analysts to query the vault for specific
    accounts, supporting administrative tasks and credential management workflows.


    ### Flow Description

    1. Extracts configuration parameters, including API credentials and SSL settings,
    to establish a connection to the CyberArk PAM API.

    2. Extracts action parameters, such as search queries, filters, and pagination
    settings (Max Records, Offset).

    3. Initializes the `CyberArkPamManager` and authenticates with the CyberArk PAM
    service.

    4. Performs a `GET` request to the `/PasswordVault/API/Accounts` endpoint using
    the provided search and filter parameters.

    5. Processes the API response, parsing the account data into a structured format.

    6. Adds the retrieved account list to the action results as a JSON object and
    a formatted data table.


    ### Additional Notes

    This action does not operate on Chronicle SOAR entities and is intended for general
    account discovery within CyberArk PAM.
