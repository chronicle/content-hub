Change Account Password:
  ai_description: >-
    ### General Description

    The 'Change Account Password' action is used to queue an immediate password change
    task for specified accounts in CyberArk PAM.


    ### Flow Description

    1. Extracts the comma-separated list of Account IDs provided in the action parameters.

    2. Iterates through each provided Account ID.

    3. For each account, makes a POST request to the CyberArk PAM API (`/PasswordVault/API/Accounts/{account_id}/Change`)
    to queue a password change task.

    4. Records the success or failure of each API request, catching specific errors
    like account not found or not managed by CPM.

    5. Returns a summary message and a JSON object containing the lists of successfully
    and unsuccessfully processed accounts.


    ### Additional Notes

    Note that there is a delay between the task being queued and it being executed
    by the CyberArk PAM system.
  ai_short_description: >-
    Queues an immediate password change task for specified accounts in CyberArk PAM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Queues a password change task for specified accounts in CyberArk PAM.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the CyberArk PAM API to queue a password
      change task, which mutates external data (can_mutate_external_data=true). It
      does not fetch contextual data, update internal entities, create insights, modify
      alert data, or create case comments.
