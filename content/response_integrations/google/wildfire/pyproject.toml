[project]
name = "Wildfire"
version = "10.0"
description = "Cloud-based threat analysis and prevention engine for highly evasive zero-day exploits and malware."
requires-python = ">=3.11,<3.12"
dependencies = [ "pan-python==0.25.0", "xmltodict==0.13.0", "tipcommon",]

[dependency-groups]
dev = [ "environmentcommon", "integration-testing", "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.3.5-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.7-py3-none-any.whl"
