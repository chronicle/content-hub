GetReport:
  ai_description: >-
    ### General Description

    Fetches detonation reports from Palo Alto Networks WildFire for file hash entities.
    This action retrieves detailed threat intelligence, including file information
    and PDF analysis reports, to assist in the investigation of potentially malicious
    files.


    ### Flow Description

    1. The action iterates through the provided target entities, filtering specifically
    for those of type `FILEHASH`.

    2. It validates that the entity identifier is a valid MD5 or SHA256 hash (32 or
    64 characters).

    3. The action calls the `WildfireManager.get_report` method to retrieve the detonation
    report from the WildFire API.

    4. If the file is identified as malware (`file_info['malware'] == 'yes'`), the
    action marks the entity as suspicious and creates an entity insight.

    5. The action updates the entity's `additional_properties` with the retrieved
    file information, prefixed with 'Wildfire'.

    6. It converts the task information into a CSV format and adds it as a result
    table to the entity.

    7. The action calls `WildfireManager.get_pdf_report` to retrieve the PDF analysis
    report.

    8. The PDF report is attached to the action results using `siemplify.result.add_entity_attachment`.

    9. Finally, the action updates the entities in the SOAR platform with the new
    information.


    ### Additional Notes

    This action requires a valid WildFire API key configured within the WildFire integration
    settings. It performs read-only operations on the WildFire platform (fetching
    reports) but performs internal mutations on the SOAR platform by updating entity
    data and attaching files.
