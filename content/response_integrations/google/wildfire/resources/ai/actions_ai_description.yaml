    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds the downloaded sample as an attachment to the file hash entity within the
      case.
    reasoning: >-
      The action fetches a sample file from WildFire via API (fetches_data=true).
      It does not mutate external data. It mutates internal data by adding the downloaded
      sample as an attachment to the entity (can_mutate_internal_data=true). It does
      not update entity properties, create insights, modify alerts, or create case
      comments.
