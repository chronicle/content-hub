  ai_description: >-
    Uploads one or more files to Palo Alto WildFire for detonation and retrieves the
    resulting analysis reports.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Paths | String | Yes | A comma-separated list of file paths to detonate
    (e.g., `C:\temp\malware.exe`). This dictates which files will be uploaded to the
    sandbox. |


    ### Action Flow

    1. **Initialization:** Connects to the WildFire API using the provided integration
    configuration.

    2. **Submission:** Iterates over the provided file paths and submits each file
    to WildFire for detonation.

    3. **Polling:** Continuously polls the WildFire service until the analysis reports
    for all submitted files are complete.

    4. **Insight Creation:** Evaluates the reports; if a file is determined to be
    malicious, it creates a case insight with a warning severity.

    5. **Result Attachment:** Parses the analysis reports into CSV format and attaches
    them as data tables. It also downloads the PDF version of the reports and attaches
    them to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads files to the Palo Alto WildFire sandbox for detonation and analysis.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates a case insight if the detonated file is identified as malicious.
    reasoning: >-
      The action fetches data by retrieving analysis reports and PDFs from WildFire
      (fetches_data=true). It mutates external data by uploading/submitting files
      to the WildFire sandbox for detonation (can_mutate_external_data=true). It mutates
      internal data by creating case insights if the file is found to be malicious
      (can_mutate_internal_data=true, can_create_insight=true). It does not update
      entities, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is not an enrichment action because it mutates external data (uploads
      a file to a sandbox) and downloads files (PDF reports). It is not a remediation
      action because it does not block, contain, or disable any identities, hosts,
      or network indicators.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
