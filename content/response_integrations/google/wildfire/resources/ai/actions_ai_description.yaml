  ai_description: >-
    ### General Description

    Retrieves detonation reports from Palo Alto WildFire for file hash entities. This
    action queries WildFire for existing analysis reports of MD5 or SHA256 hashes,
    retrieves both the structured data and the PDF report, and enriches the entities
    within Google SecOps. If the file is identified as malware, it escalates the entity's
    risk by marking it as suspicious and generating an insight.


    ### Flow Description

    1. **Entity Filtering:** Iterates through the target entities, filtering specifically
    for `FILEHASH` entities that have a valid MD5 (32 characters) or SHA256 (64 characters)
    identifier length.

    2. **Report Retrieval:** Queries the WildFire API to fetch the XML detonation
    report and the corresponding PDF report for each valid hash.

    3. **Threat Evaluation:** Parses the report to check if the file is classified
    as malware. If it is, the action marks the entity as suspicious and creates a
    case insight.

    4. **Entity Enrichment:** Updates the entity's additional properties with the
    retrieved file information.

    5. **Attachment & Table Creation:** Attaches the task information as a CSV data
    table and uploads the PDF report as an entity attachment.

    6. **Entity Update:** Saves the enriched entities and their new properties back
    to the Google SecOps platform.


    ### Parameters Description

    This action does not require any specific input parameters to be configured in
    the action settings. It relies on the API key provided in the integration's main
    configuration and operates directly on the entities available in the case.
