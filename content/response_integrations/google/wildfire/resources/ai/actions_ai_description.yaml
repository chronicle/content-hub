GetFile:
  ai_description: >-
    ### General Description

    Downloads a malware sample from Palo Alto WildFire based on a provided file hash
    and attaches it to the corresponding entity in Google SecOps.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to include only File Hash entities.

    3. Further filters the hashes to ensure they are either MD5 (32 characters) or
    SHA256 (64 characters).

    4. Makes an API call to WildFire (`wfapi.sample`) to retrieve the sample file
    associated with the hash.

    5. Attaches the downloaded sample to the corresponding entity in Google SecOps
    using base64 encoding.


    ### Additional Notes

    This action only supports MD5 and SHA256 hashes. If a sample is not found in WildFire,
    an error will be logged in the action's output.
  ai_short_description: >-
    Downloads a malware sample from Palo Alto WildFire using a file hash and attaches
    it to the entity in Google SecOps.
