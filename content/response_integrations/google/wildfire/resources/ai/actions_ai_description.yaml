DetonateFile:
  ai_description: >-
    ### General Description

    Uploads one or more files to Palo Alto WildFire for detonation and retrieves the
    resulting analysis reports.


    ### Flow Description

    1. Parses the provided file paths from the action parameters.

    2. Submits each file to the WildFire API for detonation.

    3. Polls the WildFire API periodically to check if the analysis report is ready.

    4. Once the report is ready, evaluates the results. If the file is deemed malicious,
    it creates a case insight.

    5. Attaches the parsed report data as a CSV table to the action results.

    6. Downloads the PDF version of the report from WildFire and attaches it to the
    action results.


    ### Additional Notes

    The action waits synchronously for the report to complete, which may take some
    time depending on WildFire's queue.
  ai_short_description: >-
    Uploads specified files to Palo Alto WildFire for detonation, waits for the analysis
    to complete, and retrieves the resulting threat reports and PDF summaries.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the Palo Alto WildFire sandbox for detonation.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights if the file is malicious, and attaches CSV tables and
      PDF reports to the case.
    reasoning: >-
      The action uploads a file to an external sandbox (WildFire), which is an external
      mutation. It then fetches the analysis report and PDF (fetches data). Internally,
      it creates case insights if the file is malicious and attaches the results to
      the case. It does not update entities or modify alert data.
  entity_usage:
