GetReport:
  ai_description: >-
    ### General Description

    Retrieves a detonation report for FileHash entities from Palo Alto Networks WildFire.
    This action fetches threat intelligence and file information, evaluates the malware
    status, and attaches the detailed analysis report to the entity.


    ### Flow Description

    1. Iterates through the target entities and filters for `FILEHASH` entities.

    2. Validates that the hash identifier is either MD5 (32 characters) or SHA256
    (64 characters).

    3. Makes an API call to WildFire to retrieve the XML detonation report for the
    hash.

    4. Evaluates the report; if the file is identified as malware, marks the entity
    as suspicious and creates an insight.

    5. Enriches the entity's additional properties with the retrieved file information.

    6. Attaches the task information as a CSV table to the entity.

    7. Makes a second API call to WildFire to retrieve the PDF version of the report
    and attaches it to the entity.

    8. Updates the enriched entities within Google SecOps.


    ### Additional Notes

    - Only processes MD5 and SHA256 hashes.

    - Requires a valid WildFire API key configured in the integration settings.
