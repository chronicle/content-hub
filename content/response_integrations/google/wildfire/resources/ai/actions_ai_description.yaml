  ai_description: >-
    Downloads a file sample from Palo Alto WildFire based on a provided file hash.


    ### General Description

    This action connects to the WildFire service to retrieve a file sample associated
    with a specific MD5 or SHA256 file hash. If the sample is found, it is downloaded
    and attached directly to the corresponding entity within the Google SecOps platform
    for further analysis.


    ### Flow Description

    1. Initializes the connection to the WildFire API using the provided API key.

    2. Iterates through the target entities, specifically looking for `FILEHASH` entities.

    3. Validates the hash length to ensure it is either MD5 (32 characters) or SHA256
    (64 characters).

    4. Requests the file sample from WildFire using the validated hash.

    5. If successful, encodes the downloaded file content in base64 and attaches it
    to the entity in Google SecOps.

    6. Returns a summary message listing the entities for which files were successfully
    downloaded, along with any errors encountered.


    ### Parameters Description

    This action does not require any specific input parameters. It relies on the integration
    configuration (API Key) and the target entities provided in the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds the downloaded file sample as an attachment to the entity in Google SecOps.
    reasoning: >-
      The action fetches a file sample from WildFire (fetches_data=true). It does
      not mutate any external data (can_mutate_external_data=false). It mutates internal
      data by adding the downloaded file as an attachment to the entity in Google
      SecOps (can_mutate_internal_data=true). It does not update entity fields, create
      insights, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action downloads a file from an external service. According to Rule 0.2,
      actions that download files must not be categorized as enrichment actions. It
      does not perform any remediation tasks such as blocking IPs, disabling identities,
      or containing hosts.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by `entity.entity_type
      == EntityTypes.FILEHASH`. It also filters by the length of the identifier (`len(entity.identifier)
      == 32 or len(entity.identifier) == 64`). Therefore, it runs on FILEHASH entities
      and filters by entity type and identifier.
