    correctly and the API key is valid. This action performs a health check by sending
    a test request to the Wildfire API.


    Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Retrieve the "Wildfire" configuration to obtain the API key.

    3. Initialize the `WildfireManager` using the retrieved API key.

    4. Execute the `test_connectivity` method, which sends a test request to the Wildfire
    API.

    5. Terminate the action with a success message if the connection is established
    successfully.


    Additional Notes

