GetPcap:
  ai_description: >-
    ### General Description

    Downloads and saves the PCAP file of a sample from Palo Alto WildFire based on
    file hash entities. The retrieved PCAP file is then attached directly to the corresponding
    entity within the SecOps platform for further forensic analysis.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters for entities of type `FILEHASH`.

    3. Further filters the hashes to ensure they are either MD5 (32 characters) or
    SHA256 (64 characters) in length.

    4. Makes an API call to Palo Alto WildFire (`get_pcap`) to retrieve the PCAP file
    associated with the hash.

    5. Attaches the downloaded PCAP file to the corresponding entity in the SecOps
    platform.


    ### Additional Notes

    - The action only supports MD5 and SHA256 file hashes.

    - If a PCAP file is not found for a specific hash, the action will capture the
    error and continue processing the remaining entities.
  ai_short_description: >-
    Downloads and saves the PCAP file of a sample from Palo Alto WildFire for file
