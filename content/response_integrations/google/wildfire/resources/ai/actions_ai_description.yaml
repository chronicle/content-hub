DetonateFile:
  ai_description: >-
    ### General Description

    Uploads specified files to the Palo Alto Networks WildFire sandbox for automated
    malware analysis and retrieves the resulting threat intelligence reports. This
    action automates the submission process, polls for completion, and provides detailed
    analysis results, including malware status and PDF reports, directly within the
    SOAR platform.


    ### Flow Description

    1. The action retrieves the WildFire API key from the integration configuration
    and the list of file paths from the action parameters.

    2. Each file is submitted to the WildFire service using the `WildfireManager.submit_file`
    method.

    3. The action enters a polling loop, repeatedly calling `WildfireManager.get_report`
    until the analysis is complete for all submitted files.

    4. Once the report is available, the action checks if the file is classified as
    malware.

    5. If the file is identified as malware, a case insight is created using `siemplify.create_case_insight_internal`
    to alert the analyst.

    6. The analysis results are formatted as a CSV table and added to the action results
    using `siemplify.result.add_entity_table`.

    7. The PDF version of the report is retrieved via `wildfire_manager.get_pdf_report`
    and attached to the action results using `siemplify.result.add_attachment`.


    ### Additional Notes

    This action requires a valid WildFire API key configured in the integration settings.
    It processes files based on the provided file paths parameter rather than existing
    entities in the case.
  ai_short_description: >-
    Uploads files to Palo Alto Networks WildFire for sandbox analysis and retrieves
    detailed threat reports and malware status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates a case insight if the file is identified as malware.
    reasoning: >-
      The action fetches data (reports) from the WildFire API. It does not mutate
      external data (sandbox submission is analysis, not state change). It mutates
      internal data by creating a case insight if malware is detected.
