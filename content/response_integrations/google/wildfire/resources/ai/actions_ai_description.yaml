GetPcap:
  ai_description: >-
    ### General Description

    Downloads and saves the PCAP (Packet Capture) file associated with a specific
    file hash from the Palo Alto WildFire service. This action provides forensic evidence
    by retrieving network traffic captures related to a malicious file, which can
    be used for further analysis and investigation.


    ### Flow Description

    1. The action initializes the `WildfireManager` using the API key retrieved from
    the integration configuration.

    2. It iterates through the `target_entities` provided in the action context.

    3. It filters the entities to process only those with the type `FILEHASH`.

    4. It validates that the entity identifier is a valid hash (32 characters for
    MD5 or 64 characters for SHA256).

    5. For each valid hash, it calls the `wildfire_manager.get_pcap` method to retrieve
    the PCAP file from WildFire.

    6. The retrieved PCAP file is then attached to the entity using `siemplify.result.add_entity_attachment`.

    7. Finally, the action returns a summary message indicating which entities had
    reports saved.


    ### Additional Notes

    This action requires a valid WildFire API key configured in the integration settings.
    It specifically targets file hash entities and performs a retrieval operation
    to enrich the case with forensic data.
