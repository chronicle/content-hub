GetFile:
  ai_description: >-
    General Description

    Downloads a file sample from Palo Alto Networks WildFire for a given file hash
    entity. This action retrieves the actual file content associated with a specific
    hash and attaches it to the corresponding entity within the SOAR platform for
    further analysis.


    Flow Description

    1. Initialize the `WildfireManager` using the API key retrieved from the integration
    configuration.

    2. Iterate through the `target_entities` provided in the action.

    3. Filter entities to process only those with the type `FILEHASH`.

    4. Validate that the entity identifier is a valid MD5 (32 characters) or SHA256
    (64 characters) hash.

    5. Call the `wildfire_manager.get_sample` method to retrieve the file content
    from WildFire.

    6. Use `siemplify.result.add_entity_attachment` to attach the downloaded file
    to the entity in the SOAR platform.

    7. Return a summary message indicating which files were successfully downloaded
    and any errors encountered.


    Additional Notes

    This action requires a valid WildFire API key configured in the integration settings.
    It specifically targets file hash entities and performs validation on the hash
    length before attempting the download.
