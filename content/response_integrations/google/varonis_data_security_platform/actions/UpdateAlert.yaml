name: Update Alert
description: Update status of alerts ingested from the Varonis Data Security Platform
    connector with parameters provided at the integration configuration page on the
    Marketplace tab.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/varonis-data-security-platform#update_alert
integration_identifier: VaronisDataSecurityPlatform
parameters:
-   name: Alert GUID
    default_value: ''
    type: string
    description: Specify alert GUID for the update. This action can run on multiple
        alerts. Multiple alerts can be specified as a comma-separated string.
    is_mandatory: true
-   name: Alert Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Open
    - Under Investigation
    - Closed
    description: Specify the alert status to update to.
    is_mandatory: true
-   name: Closing Reason
    default_value: Not Provided
    type: ddl
    optional_values:
    - Not Provided
    - Resolved
    - Misconfiguration
    - Threat model disabled or deleted
    - Account misclassification
    - Legitimate activity
    - Other
    description: Specify the closing reason for the alert. When the alert status is
        changed to "closed", closing reason must be specified.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
