Ping:
  ai_description: >-
    General Description: Tests connectivity to the Varonis Data Security Platform
    by validating the provided connection parameters.


    Flow Description:

    1. The action retrieves the API Root, Username, Password, and Verify SSL configuration
    parameters.

    2. It initializes the `VaronisDataSecurityPlatformManager` using these credentials.

    3. The manager performs an authentication request to the Varonis API endpoint
    (`datadvantage/api/authentication/win`) to verify the connection.

    4. If the authentication is successful, the action completes with a success message.
    If the connection fails, the action logs the error and returns a failure status.


    Additional Notes: This action is used to verify that the integration is correctly
    configured and can communicate with the Varonis Data Security Platform.
  ai_short_description: >-
    Tests connectivity to the Varonis Data Security Platform by verifying authentication
    credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an authentication request to verify connectivity. It does
      not fetch data, mutate external data, or modify internal data.
