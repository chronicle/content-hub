Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Varonis Data Security Platform.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Varonis Data Security Platform Manager.

    3. Makes a POST request to the Varonis API (`datadvantage/api/authentication/win`)
    to retrieve an authentication token.

    4. Returns a successful execution state if the token is retrieved, otherwise returns
    a failed state with the error details.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the Varonis Data Security Platform using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
