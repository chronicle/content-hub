    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only performs an authentication request to verify connectivity. It
      does not fetch contextual data, mutate external or internal data, update entities,
      or create insights/comments.
