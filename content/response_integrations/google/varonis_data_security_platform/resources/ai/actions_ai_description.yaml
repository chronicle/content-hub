Update Alert:
  ai_description: >-
    ### General Description

    Updates the status of alerts within the Varonis Data Security Platform. This action
    allows analysts to change the status of one or more alerts, optionally providing
    a closing reason if the status is set to 'Closed'.


    ### Flow Description

    1. Connects to the Varonis Data Security Platform using the provided API credentials
    (API Root, Username, Password, Verify SSL).

    2. Extracts the `Alert GUID`, `Alert Status`, and `Closing Reason` from the action
    parameters.

    3. Validates that if the `Alert Status` is set to 'Closed', a `Closing Reason`
    is provided.

    4. Sends a POST request to the Varonis API (`datadvantage/api/alert/alert/SetStatusToAlerts`)
    to update the status of the specified alert(s).


    ### Additional Notes

    This action interacts directly with the Varonis Data Security Platform API to
    synchronize alert statuses. It does not modify alerts within the Google SecOps
    platform itself.
  ai_short_description: >-
    Updates the status of alerts in the Varonis Data Security Platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of alerts in the Varonis Data Security Platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Varonis Data Security Platform API to
      update the status of alerts. This mutates external data (the alert status in
      Varonis) but does not fetch data, update internal entities, or modify SecOps
      alert data.
