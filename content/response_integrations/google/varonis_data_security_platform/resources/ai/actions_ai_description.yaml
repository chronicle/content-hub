  ai_description: >-
    Tests connectivity to the Varonis Data Security Platform using the provided integration
    configuration parameters.


    ### Parameters

    There are no action-specific parameters for this action. It relies entirely on
    the integration configuration parameters (API Root, Username, Password, Verify
    SSL).


    ### Flow

    1. Retrieves the integration configuration parameters.

    2. Attempts to authenticate to the Varonis Data Security Platform by requesting
    an access token.

    3. Returns a success message and a 'true' result if the connection is successful,
    or an error message and a 'false' result if it fails.
