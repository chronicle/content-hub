Update Alert:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action updates the status and closing reason of an alert in the Varonis
      Data Security Platform. This aligns with the 'Update Alert' category, applied
      to the external alert source.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: true
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Updates the status of one or more alerts in the Varonis Data Security Platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert GUID | String | Yes | Specify the alert GUID for the update. Multiple
    alerts can be specified as a comma-separated string. |

    | Alert Status | Dropdown | Yes | Specify the alert status to update to. Options
    include Open, Under Investigation, and Closed. |

    | Closing Reason | Dropdown | No | Specify the closing reason for the alert. **Note:**
    When the alert status is changed to "Closed", this parameter becomes mandatory.
    |


    ### Flow

    1. Establishes a connection to the Varonis Data Security Platform API.

    2. Validates the provided parameters, ensuring a closing reason is provided if
    the status is set to 'Closed'.

    3. Sends a POST request to the Varonis API to update the status and closing reason
    of the specified alerts.

    4. Returns a success message if the alerts were updated, or an error message if
    the operation failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and closing reason of specified alerts in the Varonis Data
      Security Platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action takes alert GUIDs and a target status, and makes a POST request to
      the Varonis Data Security Platform API to update the alerts. It does not fetch
      data, update internal entities, create insights, or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by updating alert statuses in Varonis, so it
      cannot be classified as Enrichment. It does not perform any containment, blocking,
      or identity-based remediation, so it is not a Remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. It
      relies entirely on the 'Alert GUID' parameter provided in the action configuration.
