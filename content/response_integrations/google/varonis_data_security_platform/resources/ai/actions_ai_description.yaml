Update Alert:
  ai_description: >-
    ### General Description

    Updates the status and closing reason of specific alerts in the Varonis Data Security
    Platform. This action allows analysts to remotely manage and close Varonis alerts
    directly from the SOAR platform.


    ### Flow Description

    1. Extracts the provided `Alert GUID`s, target `Alert Status`, and optional `Closing
    Reason` from the action parameters.

    2. Maps the provided status and closing reason to their corresponding Varonis
    internal IDs.

    3. Validates the inputs, ensuring a closing reason is provided if the status is
    set to "Closed".

    4. Makes a POST request to the Varonis API (`datadvantage/api/alert/alert/SetStatusToAlerts`)
    to update the specified alerts.

    5. Returns a success message if the alerts are updated successfully, or an error
    message if the operation fails.


    ### Additional Notes

    Multiple alerts can be updated simultaneously by providing a comma-separated list
    of Alert GUIDs. A closing reason is mandatory if the alert status is being set
    to "Closed".
  ai_short_description: >-
    Updates the status and optional closing reason of specified alerts in the Varonis
    Data Security Platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and closing reason of specified alerts in the Varonis Data
      Security Platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Varonis API to change the status and
      closing reason of specified alerts. This is a mutation of external data. It
      does not fetch contextual data, update internal entities, create insights, or
