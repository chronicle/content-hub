name: Enrich Entities
description: 'Enrich entities using information from Fortinet FortiSIEM CMDB. Supported
    entities: Hostname, IP. Note: Hostname entity should contain the "name" of the
    device.'
integration_identifier: FortinetFortiSIEM
parameters:
-   name: Target Organization
    default_value: ''
    type: string
    description: Specify optional target organization name to look for enrichment
        information in this organization only.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "HOSTNAME"]}'
