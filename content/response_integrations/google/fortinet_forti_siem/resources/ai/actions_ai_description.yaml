Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes a simple event query in Fortinet FortiSIEM based on provided parameters
    and returns the matching events. This action allows analysts to search for specific
    historical logs or telemetry data by defining criteria such as event types, categories,
    severity, and time frames.


    ### Flow Description

    1. Extracts the provided parameters including time frame, event types, categories,
    severity, and sorting preferences.

    2. Calculates the start and end timestamps for the query based on the selected
    time frame.

    3. Constructs an XML query payload based on the provided criteria.

    4. Initiates the event query via a POST request to the FortiSIEM API (`/phoenix/rest/query/eventQuery`).

    5. Checks the query progress asynchronously via a GET request (`/phoenix/rest/query/progress/{query_id}`).

    6. Once the query is completed, retrieves the query results via a GET request
    (`/phoenix/rest/query/events/{query_id}/0/{limit}`).

    7. Outputs the retrieved events as a JSON result and constructs a data table in
    the case wall.


    ### Additional Notes

    The action runs asynchronously to accommodate potentially long-running queries.
    If "Custom" is selected for the "Time Frame" parameter, the "Start Time" parameter
    becomes mandatory.
