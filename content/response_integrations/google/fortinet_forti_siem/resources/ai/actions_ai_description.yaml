Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes an event query in FortiSIEM based on specified criteria (time frame,
    event types, severity, etc.). This action allows users to search for historical
    events within the FortiSIEM platform and retrieve the results for further analysis.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Fields, Sort, Severity, Event Types, etc.).

    2. Calculates the start and end time range based on the provided time frame or
    custom timestamps.

    3. Constructs an XML query payload using `FortiSIEMManager.build_query_payload`
    based on the provided criteria.

    4. If it is the first run, submits the query to FortiSIEM via `manager.start_event_query`
    and checks the query progress.

    5. If it is a subsequent run, checks the query progress using `manager.get_event_query_progress`
    via the provided `query_id` from `additional_data`.

    6. If the query is completed, retrieves the results via `manager.get_event_query_results`.

    7. Adds the results to the action output as JSON and a data table.


    ### Additional Notes

    This action is asynchronous and may require multiple runs to complete if the query
    takes time to process. The action will return an 'In Progress' status until the
    query is completed in FortiSIEM.
  ai_short_description: >-
    Executes an event query in FortiSIEM based on specified criteria and retrieves
    the results.
