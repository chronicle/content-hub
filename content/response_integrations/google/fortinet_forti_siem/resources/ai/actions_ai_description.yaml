Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using device information retrieved from
    the Fortinet FortiSIEM CMDB. This action allows analysts to gather contextual
    metadata about network devices and endpoints, such as access IP, device type,
    vendor, and discovery methods, directly within the SOAR platform.


    ### Flow Description

    1. The action initializes the `FortiSIEMManager` using the provided API credentials
    (API Root, Username, Password, Verify SSL).

    2. It filters the `target_entities` to include only `ADDRESS` and `HOSTNAME` types.

    3. For each valid entity, the action calls the `manager.get_device_info` method,
    which performs a GET request to the FortiSIEM API to retrieve device details.

    4. The retrieved device information is parsed and added to the entity's `additional_properties`
    dictionary with a 'FortiSIEM' prefix.

    5. The entity is marked as enriched (`is_enriched = True`).

    6. The enrichment data is formatted into a table and added to the action results.

    7. Finally, the action updates the entities in the SOAR platform and returns a
    summary of successful and failed enrichments.


    ### Additional Notes

    This action requires valid connectivity to the FortiSIEM API. The 'Target Organization'
    parameter is optional and can be used to restrict the scope of the enrichment
    search.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with device information from the Fortinet
    FortiSIEM CMDB.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
