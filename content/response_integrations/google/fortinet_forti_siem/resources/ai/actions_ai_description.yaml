Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Fortinet FortiSIEM platform to retrieve event
    data. This action allows analysts to perform targeted searches using specific
    query conditions, time frames, and field selections, providing visibility into
    historical logs and telemetry stored within FortiSIEM.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, credentials) and action-specific parameters (Query, Time Frame, etc.).

    2. **Timestamp Calculation**: It calculates the start and end timestamps based
    on the provided time frame or custom time range.

    3. **Payload Construction**: It builds an XML payload containing the query conditions,
    sorting preferences, and requested fields.

    4. **Query Submission**: It submits the query to the FortiSIEM API (`/phoenix/rest/query/eventQuery`).

    5. **Progress Monitoring**: It checks the query progress. If the query is still
    in progress, it returns an 'In Progress' status. If completed, it proceeds to
    retrieve the results.

    6. **Result Retrieval**: Upon completion, it fetches the event results from the
    FortiSIEM API (`/phoenix/rest/query/events/{query_id}/0/{limit}`).

    7. **Output Generation**: The retrieved events are added to the action result
    as JSON and a data table.


    ### Additional Notes

    This action supports asynchronous execution. If the query takes time to complete,
    the action will return an 'In Progress' status and can be re-run to check for
    completion using the `query_id` stored in the `additional_data` parameter.
  ai_short_description: >-
    Executes a custom query in FortiSIEM to retrieve and display event data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
