Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using device information from the Fortinet
    FortiSIEM CMDB. This action retrieves contextual metadata about the asset and
    updates the entity's properties within the platform.


    ### Flow Description

    1. Extracts the optional `Target Organization` parameter.

    2. Iterates over the provided target entities, filtering specifically for `ADDRESS`
    and `HOSTNAME` entity types.

    3. For each valid entity, makes a GET request to the FortiSIEM API (`/phoenix/rest/cmdbDeviceInfo/device`)
    to fetch device information.

    4. Parses the response and updates the entity's `additional_properties` with the
    retrieved CMDB data (e.g., device model, vendor, access protocols).

    5. Marks the entity as enriched (`is_enriched = True`) and attaches the data as
    an entity table and JSON result.

    6. Calls the SecOps platform to update the entities with the new data.


    ### Additional Notes

    - Hostname entities must contain the exact "name" of the device as registered
    in FortiSIEM to be successfully queried.

    - If a target organization is provided, the search will be restricted to that
    specific organization.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving contextual device information
    from the Fortinet FortiSIEM CMDB.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from FortiSIEM via a GET request to `/phoenix/rest/cmdbDeviceInfo/device`.
      It does not mutate external data. It updates internal entities by calling `siemplify.update_entities`
      and appending data to `additional_properties`. It does not create insights,
      modify alert data, or create case comments.
  entity_usage:
