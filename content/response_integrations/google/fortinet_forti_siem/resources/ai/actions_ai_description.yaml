  ai_description: >-
    Executes a custom query in Fortinet FortiSIEM to retrieve event information based
    on specified criteria.


    ### Flow Description

    1. Establishes a connection to the Fortinet FortiSIEM API.

    2. Constructs an XML payload for the custom query using the provided parameters
    (query, time frame, sorting, etc.).

    3. Submits the query to FortiSIEM and monitors its progress asynchronously.

    4. Once the query completes, retrieves the results up to the specified limit.

    5. Outputs the retrieved events as a JSON result and constructs a data table for
    the case wall.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Fields To Return | String | False | Specify what fields to return. If nothing
    is provided, the action will return all fields. |

    | Sort Field | String | False | Specify what parameter should be used for sorting.
    |

    | Sort Order | Dropdown | False | Specify the order of sorting (DESC or ASC).
    Default is DESC. |

    | Query | String | True | Specify a query that will be used to retrieve information
    about the events. Example: `(relayDevIpAddr = 172.30.202.1 OR 172.30.202.2) AND
    (reptDevName = HOST1)`. |

    | Max Results To Return | String | False | Specify how many results to return.
    Default is 50. |

    | Start Time | String | False | Specify the start time for the results (Format:
    ISO 8601). This parameter is mandatory if "Custom" is selected for the "Time Frame"
    parameter. |

    | End Time | String | False | Specify the end time for the results (Format: ISO
    8601). If nothing is provided and "Custom" is selected for the "Time Frame" parameter,
    this parameter will use the current time. |

    | Time Frame | Dropdown | False | Specify a time frame for the results (e.g.,
    Last Hour, Last 24 Hours, Custom). If "Custom" is selected, you also need to provide
    "Start Time". |


    ### Additional Notes

    - This is an asynchronous action. It will submit the query on the first run and
    periodically check the query status in subsequent runs until the results are ready.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches event data from FortiSIEM based on a custom query. It does
      not mutate any external data, nor does it update internal entities, create insights,
      modify alerts, or add case comments. It only returns the fetched data as JSON
      and a data table.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data (events) from an external source without mutating external
      or internal state. Therefore, it qualifies as an enrichment/data-fetching action.
      It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not operate on SecOps entities. It executes a general query
      against the FortiSIEM platform based on the provided action parameters, without
      iterating over or referencing `target_entities`.
