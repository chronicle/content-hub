Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom event query in Fortinet FortiSIEM to retrieve historical logs
    and telemetry data matching specific search parameters.


    ### Flow Description

    1. Initializes the FortiSIEM manager with the provided integration credentials.

    2. Builds an XML payload based on the provided query, time frame, sorting, and
    field parameters.

    3. Initiates the event query asynchronously via a POST request to the FortiSIEM
    API (`/phoenix/rest/query/eventQuery`).

    4. Checks the query progress via a GET request (`/phoenix/rest/query/progress/{query_id}`).

    5. If the query is completed, retrieves the query results via a GET request (`/phoenix/rest/query/events/{query_id}/0/{limit}`).

    6. Returns the retrieved events as JSON and constructs a data table for the action
    output.


    ### Additional Notes

    This is an asynchronous action. If the query is not completed during the initial
    run, the action will suspend and continue checking the progress in subsequent
    runs until the results are ready.
  ai_short_description: >-
    Executes a custom event query in Fortinet FortiSIEM to retrieve historical logs
    and telemetry data matching specific search parameters.
