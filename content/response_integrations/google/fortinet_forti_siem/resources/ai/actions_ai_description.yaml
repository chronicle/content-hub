Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Fortinet FortiSIEM installation to ensure the integration
    is correctly configured and the API is reachable.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, and `Verify SSL` from the integration settings.

    2. It initializes the `FortiSIEMManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the FortiSIEM API endpoint (`/phoenix/rest/deviceInfo/monitoredDevices`).

    4. The response is validated to confirm successful communication.

    5. The action concludes by returning a success or failure message based on the
    connectivity result.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data retrieval or modifications on entities or alerts.
