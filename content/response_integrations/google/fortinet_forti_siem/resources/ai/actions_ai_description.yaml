Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Fortinet FortiSIEM installation using the provided integration
    configuration parameters. This action ensures that the API Root, credentials,
    and SSL settings are valid and that the SecOps platform can successfully communicate
    with the FortiSIEM instance.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, Username,
    Password, Verify SSL).

    2. Initializes the FortiSIEM API manager with the provided credentials.

    3. Makes an HTTP GET request to the `/phoenix/rest/deviceInfo/monitoredDevices`
    endpoint to verify connectivity.

    4. Returns a successful execution state if the connection is established, or fails
    with an error message if the connection cannot be made.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is configured correctly. It does not require any entities or action-specific parameters
    to run.
  ai_short_description: >-
    Tests connectivity to the Fortinet FortiSIEM installation to ensure the integration
