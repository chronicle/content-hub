  ai_description: >-
    Enriches IP and Hostname entities using device information from the Fortinet FortiSIEM
    CMDB.


    ### Flow Description

    1. Establishes a connection to the Fortinet FortiSIEM API.

    2. Iterates through the target entities, filtering for IP Addresses and Hostnames.

    3. Retrieves device information from the CMDB for each supported entity.

    4. Updates the entity's additional properties with the retrieved device data and
    marks the entity as enriched.

    5. Attaches a data table containing the device information to the entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Target Organization | String | False | Specifies an optional target organization
    name to restrict the enrichment information search to this organization only.
    |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities' additional properties with the fetched device information
      and adds a data table to the entities.
    reasoning: >-
      The action fetches device information from Fortinet FortiSIEM CMDB (fetches_data=True).
      It does not modify any data in the external system (can_mutate_external_data=False).
      Internally, it updates the entities with the fetched data and adds a data table
      (can_mutate_internal_data=True, can_update_entities=True). It does not create
      insights, modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data and its internal mutations are limited to updating
      entities. Therefore, it qualifies as an Enrichment action. It does not perform
      any remediation tasks.
    remediation: false
