  ai_description: >-
    Executes a simple event query in Fortinet FortiSIEM based on provided parameters
    such as event types, categories, IDs, and severity. The action constructs an XML
    query payload, initiates the query asynchronously, and retrieves the matching
    events. The results are returned as JSON and attached to the case as a data table.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the provided limits and severity thresholds.

    3. Calculates the start and end timestamps based on the selected time frame.

    4. Constructs an XML query payload using the provided filters.

    5. Initiates the event query in FortiSIEM.

    6. Asynchronously checks the query progress.

    7. Once completed, retrieves the query results and attaches them to the action's
    JSON result and a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Fields To Return | String | No | Specify what fields to return. If nothing is
    provided, action will return all fields. |

    | Sort Field | String | No | Specify what parameter should be used for sorting.
    |

    | Sort Order | Dropdown | No | Specify the order of sorting (DESC, ASC). |

    | Minimum Severity to Fetch | String | No | Specify minimum event severity to
    fetch to Siemplify in numbers, for example 5 or 7. |

    | Event Types | String | No | Specify event types query should fetch. Parameter
    accepts multiple values as a comma separated string. |

    | Event Category | String | No | Specify event category query should fetch. Parameter
    accepts multiple values as a comma separated string. |

    | Event IDs | String | No | Specify optionally exact event ids query should fetch.
    Parameter accepts multiple values as a comma separated string. |

    | Start Time | String | No | Specify the start time for the results. Mandatory
    if "Custom" is selected for "Time Frame". |

    | End Time | String | No | Specify the end time for the results. If nothing is
    provided and "Custom" is selected, uses current time. |

    | Max Results To Return | String | No | Specify how many results to return. Default:
    50. |

    | Time Frame | Dropdown | No | Specify a time frame for the results. |


    ### Additional Notes

    - The action runs asynchronously, meaning it will periodically check the status
    of the query until it completes.

    - If "Custom" is selected for the "Time Frame" parameter, the "Start Time" parameter
    becomes mandatory.
