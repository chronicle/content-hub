  ai_description: >-
    Tests connectivity to the FortiSIEM installation using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FortiSIEM manager.

    3. Sends a GET request to the `/phoenix/rest/deviceInfo/monitoredDevices` endpoint
    to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error message.


    ### Parameters Description

