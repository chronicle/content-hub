Add Analyst Note:
  ai_description: >-
    ### General Description

    Adds an analyst note to specified entities in Recorded Future. If an entity does
    not already contain a Recorded Future ID, the action will first retrieve its threat
    intelligence data from Recorded Future to ensure it can be properly associated
    with the note.


    ### Flow Description

    1. Filters target entities to include only Hostname, CVE, FileHash, Address, and
    URL types.

    2. Checks if the entities already have a Recorded Future ID in their additional
    properties.

    3. For entities without an ID, fetches IOC-related entity objects from Recorded
    Future.

    4. Optionally enriches these entities with the retrieved threat intelligence data
    based on the `Enrich Entity?` parameter.

    5. Publishes the analyst note to Recorded Future for all successfully identified
    entities.

    6. Updates the entities in Google SecOps with the new analyst note document ID
    and any retrieved enrichment data.


    ### Additional Notes

    The action requires a Note Title, Note Text, and Note Source. The Note Source
    must be a valid Recorded Future ID accessible to the user whose API token is configured.
  ai_short_description: >-
    Publishes an analyst note to Recorded Future for specified entities, optionally
    enriching them with threat intelligence data if they are not already identified.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Publishes an analyst note to Recorded Future for the specified entities.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches IOC data from Recorded Future using a POST request to `/v2/soar/enrichment`
      (fetches_data=true). It mutates external data by publishing an analyst note
      to Recorded Future using a POST request to `/v2/analystnote/publish` (can_mutate_external_data=true).
      It updates entities in Google SecOps with the enrichment data and document ID
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: true
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUITABLE_ENTITY_TYPES` (HOSTNAME, CVE, FILEHASH, ADDRESS, URL). It also checks
      `entity.additional_properties` via `get_recorded_future_id(entity)` to determine
      if the entity needs enrichment. It uses `get_entity_original_identifier(entity)`
      to match entities with the API response.
