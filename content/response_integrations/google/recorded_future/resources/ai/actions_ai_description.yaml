Enrich CVE:
  ai_description: "### General Description\nEnriches CVE (Common Vulnerabilities and\
    \ Exposures) entities using the RecordedFuture integration. This action queries\
    \ the RecordedFuture API to retrieve threat intelligence, risk scores, and related\
    \ entities for a given CVE. It evaluates the risk score against a user-defined\
    \ threshold to determine if the CVE should be marked as suspicious, providing\
    \ actionable intelligence for vulnerability management.\n\n### Flow Description\n\
    1. **Parameter Extraction**: The action extracts configuration parameters (API\
    \ URL, API Key, SSL verification) and action-specific parameters (Risk Score Threshold,\
    \ Include Related Entities).\n2. **API Interaction**: The action initializes the\
    \ `RecordedFutureManager` and calls the `get_cve_reputation` method to fetch detailed\
    \ intelligence for the target CVE entities from the RecordedFuture API.\n3. **Data\
    \ Processing**: The retrieved data is parsed into a structured format. If the\
    \ `Include Related Entities` parameter is enabled, related entities are also fetched\
    \ and processed.\n4. **Internal Update**: \n   - The action updates the entity's\
    \ `additional_properties` with the enrichment data.\n   - If the CVE's risk score\
    \ exceeds the configured `Risk Score Threshold`, the entity is marked as suspicious\
    \ (`is_suspicious = True`), and a case insight is created with the detailed risk\
    \ information.\n   - The action calls `siemplify.update_entities` to save the\
    \ changes to the SOAR platform.\n\n### Additional Notes\nThe `Risk Score Threshold`\
    \ parameter allows analysts to customize the sensitivity of the enrichment. CVEs\
    \ with scores above this threshold are automatically flagged, facilitating prioritization\
    \ of remediation efforts."
