Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Recorded Future to retrieve reputation, risk scores,
    and threat intelligence.


    ### Flow Description

    1. Iterates over the target entities and filters for URL entities.

    2. For each URL entity, makes a GET request to the Recorded Future API (`/v2/url/{entity}`)
    to fetch reputation data.

    3. If the `Include Related Entities` parameter is enabled, fetches related entities
    information as part of the API request.

    4. Evaluates the retrieved risk score against the `Risk Score Threshold`. If the
    score is higher than the threshold, marks the entity as suspicious and creates
    a case insight.

    5. Enriches the entity with the retrieved data (e.g., risk string, rules, criticality
    score) and updates the entity in the platform.

    6. Returns a JSON result with the enrichment data and populates data tables with
    the report details.


