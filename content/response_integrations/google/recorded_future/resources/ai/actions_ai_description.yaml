Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Recorded Future. This action retrieves threat intelligence,
    risk scores, and related entities for the specified CVEs. It evaluates the risk
    score against a provided threshold, updates the entity's suspicious status, and
    generates an insight with the analysis results.


    ### Flow Description

    1. Iterates over the target entities and filters for CVE entities.

    2. Makes a GET request to the Recorded Future API (`/v2/vulnerability/{entity}`)
    to fetch reputation and related entities data.

    3. Evaluates the retrieved risk score against the configured `Risk Score Threshold`.

    4. If the score exceeds the threshold, marks the entity as suspicious and creates
    a case insight.

    5. Enriches the entity with the retrieved data and updates it within the platform.


    ### Additional Notes

    None.
