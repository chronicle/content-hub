Enrich Host:
  ai_description: >-
    ### General Description

    Enriches Host entities using the RecordedFuture threat intelligence platform.
    This action queries RecordedFuture to retrieve reputation data, risk scores, and
    related entities for a given host. It evaluates the host's risk against a configurable
    threshold to determine if it should be marked as suspicious within the SOAR platform.


    ### Flow Description

    1. The action initializes the RecordedFuture manager using the provided API credentials
    and configuration.

    2. It iterates through the target entities, filtering specifically for entities
    of type 'HOSTNAME'.

    3. For each valid host, the action makes an API call to RecordedFuture (`/v2/domain/{entity}`)
    to fetch reputation data, including risk scores, rules, and optionally related
    entities.

    4. The retrieved data is processed, and a data table is added to the action results.

    5. If the host's risk score exceeds the configured 'Risk Score Threshold', the
    entity is marked as suspicious, and a case insight is generated with the threat
    details.

    6. The entity's additional properties are updated with the enrichment data, and
    the entity is updated in the SOAR platform.


    ### Additional Notes

    - The action supports an optional parameter to include related entities in the
    enrichment process.

    - If no score is returned by the API, a default score of 0 is used.

    - The action will time out if the execution deadline is reached during processing.
