Update Alert:
  ai_description: >-
    ### General Description

    Updates an existing alert within the Recorded Future platform. This action allows
    analysts to modify the status, assign the alert to a specific user, or add a note
    to the alert's record in Recorded Future.


    ### Flow Description

    1. The action extracts configuration parameters (API URL, API Key, SSL verification)
    and action parameters (Alert ID, Assign To, Note, Status).

    2. It validates that at least one of the optional parameters (Assign To, Note,
    or Status) is provided.

    3. It maps the provided status string to the corresponding Recorded Future status
    value using a predefined mapping.

    4. It initializes the `RecordedFutureManager` and calls the `update_alert` method,
    which performs a POST request to the Recorded Future `/v2/alert/update` endpoint.

    5. The result of the update operation is added to the action's result JSON.

    6. The action logs the outcome and completes the execution.


    ### Additional Notes

    This action performs a state-changing operation on the external Recorded Future
    platform. It does not modify any entities or alerts within the Google SecOps platform
    itself.
