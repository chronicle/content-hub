Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using RecordedFuture threat intelligence. This action queries
    the RecordedFuture API to retrieve reputation data, risk scores, and related entities
    for a given URL. It evaluates the risk score against a user-defined threshold
    to determine if the URL should be marked as suspicious, updates the entity with
    enrichment data, and generates a case insight for analysts.


    ### Flow Description

    1. The action extracts configuration parameters (API URL, API Key, SSL verification)
    and action parameters (Risk Score Threshold, Include Related Entities).

    2. It initializes the `RecordedFutureManager` to handle API communication.

    3. The action iterates through the `target_entities` provided in the case, filtering
    specifically for entities of type `URL`.

    4. For each valid URL entity, it calls the `get_url_reputation` method of the
    `RecordedFutureManager` to fetch threat intelligence data from RecordedFuture.

    5. The retrieved data is processed, and the entity's `additional_properties` are
    updated with enrichment details.

    6. If the URL's risk score exceeds the configured `Risk Score Threshold`, the
    entity is marked as suspicious (`is_suspicious = True`), and a case insight is
    created containing the threat details.

    7. Finally, the action updates the entities in the SOAR platform and adds the
    raw JSON results to the action output.


