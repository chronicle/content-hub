Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Recorded Future API. This action verifies that the integration
    is configured correctly and can successfully communicate with the Recorded Future
    service.


    ### Flow Description

    1. Extracts integration configuration parameters (API URL, API Key, Verify SSL).

    2. Initializes the Recorded Future manager.

    3. Makes a test API call (fetching reputation for a dummy IP '8.8.8.8') to verify
    the connection.

    4. Returns a successful result if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used during integration setup or troubleshooting to ensure
    network access and valid credentials.
