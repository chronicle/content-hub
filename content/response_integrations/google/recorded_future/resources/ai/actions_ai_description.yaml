Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Recorded Future API to ensure the integration is configured
    correctly. This action verifies that the provided API credentials and URL are
    valid and that the SOAR platform can successfully communicate with the Recorded
    Future service.


    ### Flow Description

    1. Extracts configuration parameters (`ApiUrl`, `ApiKey`, `Verify SSL`) from the
    integration settings.

    2. Initializes the `RecordedFutureManager` with the provided credentials.

    3. Executes the `test_connectivity()` method, which performs a GET request to
    the Recorded Future API using a dummy IP address (`8.8.8.8`) to verify authentication
    and network reachability.

    4. Logs the outcome of the connectivity test.

    5. Terminates the action with a success or failure status based on the API response.


