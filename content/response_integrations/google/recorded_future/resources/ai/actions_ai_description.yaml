Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the RecordedFuture integration. This action
    queries the RecordedFuture API to retrieve threat intelligence, including risk
    scores, triggered rules, and related entities. It evaluates the risk score against
    a user-defined threshold to determine if the hash should be marked as suspicious,
    subsequently updating the entity within the SOAR platform and generating case
    insights for analysts.


    ### Flow Description

    1. The action extracts configuration parameters (API URL, API Key, SSL verification)
    and action-specific parameters (Risk Score Threshold, Include Related Entities).

    2. It initializes the RecordedFuture manager to handle API communication.

    3. The action iterates through the target entities, filtering specifically for
    File Hash entities.

    4. For each valid entity, it performs an API call to the RecordedFuture endpoint
    to fetch reputation data.

    5. If 'Include Related Entities' is enabled, it retrieves and adds related entity
    information to the results.

    6. The action processes the retrieved data, adding enrichment details (e.g., risk
    score, rules) to the entity's additional properties.

    7. If the entity's risk score exceeds the configured 'Risk Score Threshold', the
    action marks the entity as suspicious and creates a case insight containing the
    analysis details.

    8. Finally, the action updates the entities in the SOAR platform and adds the
    raw JSON results to the action output.


    ### Additional Notes

    This action requires a valid RecordedFuture API key and connectivity to the RecordedFuture
    service. The 'Risk Score Threshold' parameter is critical for determining the
    automated suspicious status of the entity.
