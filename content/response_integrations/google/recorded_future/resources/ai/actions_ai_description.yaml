Update Alert:
  ai_description: >-
    ### General Description

    Updates an existing alert in Recorded Future. This action allows analysts to modify
    the status, assignee, and add notes to a specific alert directly within the Recorded
    Future platform.


    ### Flow Description

    1. Extracts the provided parameters: Alert ID, Assign To, Note, and Status.

    2. Validates that at least one update parameter (Status, Assign To, or Note) has
    been provided.

    3. Initiates a POST request to the Recorded Future API (`/v2/alert/update`) with
    the specified alert ID and the fields to be updated.

    4. Retrieves the response and attaches the updated alert data as a JSON result
    to the action.


    ### Additional Notes

    - The `Status` parameter maps to specific Recorded Future statuses (e.g., 'Resolved'
    maps to 'actionable', 'Dismissed' maps to 'dismiss').

    - If the action fails due to unauthorized access, it will explicitly prompt the
    user to check their API token.
