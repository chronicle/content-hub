Add Analyst Note:
  ai_description: >-
    ### General Description

    Adds an analyst note to entities in Recorded Future. This action allows analysts
    to attach contextual notes to specific indicators (IOCs) within the Recorded Future
    platform. Additionally, if an entity has not been previously enriched, the action
    can optionally perform an "Enrich IOC" operation to retrieve threat intelligence
    before publishing the note.


    ### Flow Description

    1. Extracts configuration parameters (API URL, API Key, SSL verification) and
    action parameters (Note Title, Note Text, Note Source, Topic, Enrich Entity?).

    2. Filters target entities by supported types (HOSTNAME, CVE, FILEHASH, ADDRESS,
    URL).

    3. Identifies entities that require enrichment (those without a Recorded Future
    ID).

    4. If "Enrich Entity?" is enabled, fetches enrichment data for those entities
    via the Recorded Future API (`/v2/soar/enrichment`).

    5. Updates the entities with the retrieved enrichment data if enrichment was performed.

    6. Publishes the analyst note to Recorded Future for all successful entities via
    the Recorded Future API (`/v2/analystnote/publish`).

    7. Updates the entities with the new document ID returned from the analyst note
    publication.

    8. Updates the entities in the SOAR platform using `siemplify.update_entities`.


    ### Additional Notes

    This action interacts with the Recorded Future API to publish data. It supports
    enrichment of specific IOC types and requires a valid Recorded Future API key.
    The "Topic" parameter allows for categorization of the note within Recorded Future.
  ai_short_description: >-
    Adds an analyst note to entities in Recorded Future and optionally enriches them
    with threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Publishes an analyst note to the Recorded Future platform for the specified
      entities.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches enrichment data from Recorded Future (fetches_data=true).
      It publishes an analyst note to Recorded Future, which is an external system
      mutation (can_mutate_external_data=true). It updates entity properties and saves
      them to the platform (can_update_entities=true). It does not create insights,
      modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
