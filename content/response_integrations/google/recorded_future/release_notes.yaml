-   description: 'New - Enrich IOC action

        The new action can handle any type of entity and send it to Recorded future
        for enrichment and insights.

        The action also uses a new Recorded Future endpoint, dedicated for SOAR platform,
        for better performance.

        You can use this action with the following entity types: IP Address, URL,
        File Hash, CVE, Domain.

        *Pay Attention* - this action is going to replace the other enrichment actions
        in the future.

        Please be sure to try and combine it in your playbooks when possible.'
    integration_version: 6.0
    item_name: Enrich IOC
    item_type: Action
