name: Enrich Host
description: Query the RecordedFuture to get more information about the Host.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/recorded-future#enrich_host
integration_identifier: RecordedFuture
parameters:
-   name: Risk Score Threshold
    default_value: 25
    type: string
    description: "Represents the minimum malicious risk score for a Host to be marked\
        \ malicious. Has a range of 0-99. Below is the band levels: \n Very Malicious:\
        \ 90-99 \n Malicious: 65-89 \n Suspicious: 25-64 \n Unusual: 5-24 \n No Malicious\
        \ content: 0"
    is_mandatory: true
-   name: Include Related Entities
    default_value: false
    type: boolean
    description: If enabled, action will get information about related entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_host_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME"]}'
script_result_name: is_risky
