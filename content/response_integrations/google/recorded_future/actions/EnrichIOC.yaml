name: Enrich IOC
description: Fetch information about multiple entities, with different types, from
    Siemplify. Note - we recommend using this action first, and then, if additional
    information is needed - use the other enrich methods.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/recorded-future#enrich_ioc
integration_identifier: RecordedFuture
parameters:
-   name: Risk Score Threshold
    default_value: 25
    type: string
    description: Represents the minimum malicious risk score for each entity to be
        marked is suspicious.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/enrich_ioc_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME","CVE", "FILEHASH","ADDRESS","DestinationURL"]}'
