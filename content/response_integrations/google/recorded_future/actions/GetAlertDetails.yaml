name: Get Alert Details
description: Fetch information about specific Alert and return results to the case.
    Use action to get more information available regarding Recorded Future Alerts
    - Documents, Related Entities, Evidence, etc...
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/recorded-future#get_alert_details
integration_identifier: RecordedFuture
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert for which you would like to fetch details
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_alert_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
