name: Enrich CVE
description: Query the RecordedFuture to get more information about the CVE.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/recorded-future#enrich_cve
integration_identifier: RecordedFuture
parameters:
-   name: Risk Score Threshold
    default_value: 25
    type: string
    description: "Represents the minimum malicious risk score for a CVE to be marked\
        \ malicious. Has a range of 0-99. Has the following levels: \n Very Critical:\
        \ 90-99 \n Critical: 80-89 \n High: 65-79 \n Medium: 25-64 \n Low: 5-24 \n\
        \ None: 0"
    is_mandatory: true
-   name: Include Related Entities
    default_value: false
    type: boolean
    description: If enabled, action will get information about related entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_cve_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["CVE"]}'
script_result_name: is_risky
