Add Endpoint To Endpoint Identity Group:
  ai_description: >-
    ### General Description

    Adds a specified endpoint (IP or MAC address) to an endpoint identity group in
    Cisco ISE. This action modifies the endpoint's configuration in the external system
    to include it in the target group.


    ### Flow Description

    1. Queries Cisco ISE to retrieve the ID of the specified endpoint identity group.

    2. Iterates through the target entities, filtering for supported types (IP Address
    and MAC Address).

    3. If the entity is an IP address, it makes an API call to Cisco ISE to resolve
    the corresponding MAC address.

    4. Retrieves the endpoint ID associated with the MAC address from Cisco ISE.

    5. Sends a PUT request to the Cisco ISE API (`/ers/config/endpoint/{endpoint_id}`)
    to update the endpoint's group membership.

    6. Collects the JSON responses for successful updates and returns them as part
    of the action results.


    ### Additional Notes

    Supported entity types are IP Address and MAC Address. If an endpoint or the specified
    group cannot be found in Cisco ISE, the action will fail for that specific entity
    or halt execution entirely.
  ai_short_description: >-
    Adds a specified endpoint (IP or MAC address) to an endpoint identity group in
    Cisco ISE.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the endpoint in Cisco ISE to be part of the specified endpoint identity
      group.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to Cisco ISE to update an endpoint's group membership,
