Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches IP Address entities with endpoint information retrieved from Cisco ISE.
    This action fetches MAC address, device details, and additional enrichment data
    to provide context for network assets.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    to initialize the Cisco ISE manager.

    2. Filters the target entities to identify those of type `ADDRESS`.

    3. For each IP address, retrieves the associated MAC address using the Cisco ISE
    UI API.

    4. Fetches detailed endpoint information and additional enrichment data using
    the retrieved MAC address.

    5. Flattens the retrieved data and updates the entity's `additional_properties`
    with the new context.

    6. Marks the entity as enriched (`is_enriched = True`) and updates the entity
    in the SOAR platform.

    7. Adds a table containing the endpoint details to the action results.


    ### Additional Notes

    This action requires valid Cisco ISE credentials and network connectivity to the
    Cisco ISE API. It specifically targets IP address entities.
