  ai_description: >-
    Adds specified endpoints (IP or MAC addresses) to a designated Endpoint Identity
    Group in Cisco ISE.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Endpoint Identity Group Name | String | Yes | The name of the endpoint identity
    group to which you want to add the endpoint. |


    ### Action Flow

    1. Retrieves the specified Endpoint Identity Group from Cisco ISE.

    2. Iterates through the provided IP and MAC address entities.

    3. For IP addresses, resolves the corresponding MAC address.

    4. Retrieves the endpoint ID for the MAC address.

    5. Updates the endpoint in Cisco ISE to assign it to the specified Endpoint Identity
    Group.

    6. Returns the results and a summary message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the endpoint in Cisco ISE to assign it to the specified Endpoint Identity
      Group.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches endpoint groups and endpoint details from Cisco ISE (fetches_data=true).
      It then makes a PUT request to update the endpoint's group membership in Cisco
      ISE (can_mutate_external_data=true). It does not modify internal SecOps data,
      update entities, create insights, or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by updating an endpoint's group membership
      in Cisco ISE, so it cannot be classified as Enrichment. While it can be used
      to assign an endpoint to a restricted group, it is a generic group assignment
      action rather than a dedicated remediation or containment action.
    remediation: false
  entity_usage:
