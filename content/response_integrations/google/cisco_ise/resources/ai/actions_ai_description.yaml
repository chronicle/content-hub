Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches IP Address entities by retrieving endpoint and enrichment data from Cisco
    ISE. This action fetches the MAC address associated with the IP, retrieves detailed
    endpoint information, and appends the data to the entity's properties and as an
    entity table.


    ### Flow Description

    1. Iterates through all target entities, filtering for those of type `ADDRESS`.

    2. For each IP address, queries Cisco ISE to retrieve the associated MAC address.

    3. Uses the MAC address to fetch detailed endpoint data and additional enrichment
    information.

    4. Flattens the retrieved data and appends it to the entity's additional properties.

    5. Creates an entity table containing the endpoint details.

    6. Marks the entity as enriched and updates it within the platform.


    ### Additional Notes

    - If an error occurs while fetching data for a specific entity, the action logs
    the error and continues processing the remaining entities.
