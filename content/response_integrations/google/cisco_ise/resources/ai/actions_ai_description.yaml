Get Endpoints:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of endpoints from Cisco ISE. This action queries
    the Cisco ISE API to fetch endpoint data, processes the results into a flat format,
    and presents the information in a structured data table within the action results.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, Username,
    Password, and Verify SSL) from the integration settings.

    2. It initializes the `CiscoISEManager` to establish a connection with the Cisco
    ISE API.

    3. The action calls the `get_endpoints` method, which performs a GET request to
    the `/ers/config/endpoint` endpoint to retrieve the list of available endpoints.

    4. For each endpoint found, the action fetches detailed information by ID.

    5. The retrieved endpoint data is flattened and converted into a CSV format.

    6. The action adds the resulting CSV data table to the SOAR action results.


    ### Additional Notes

    This action does not require any specific entities to be present in the case to
    execute. It operates independently to fetch global endpoint data from the Cisco
    ISE environment.
