    `ADDRESS`.

    3. For each IP address, the action calls the `get_endpoint_mac_by_ip` method to
    retrieve the corresponding MAC address from Cisco ISE.

    4. It then calls the `unquarantine_endpoint` method, which performs a PUT request
    to the Cisco ISE API to remove the quarantine policy from the endpoint.

    5. The action collects the results and returns a summary message indicating which
    addresses were successfully unquarantined or if any errors occurred.


