Quarantine Address:
  ai_description: >-
    ### General Description

    Quarantines specific IP address entities by attaching them to a designated policy
    in Cisco ISE. This action isolates the endpoint from the network by applying a
    restrictive policy based on its MAC address.


    ### Flow Description

    1. Iterates over the target entities and filters for entities of type `ADDRESS`.

    2. For each valid IP address, makes a GET request to the Cisco ISE API to retrieve
