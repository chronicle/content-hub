  ai_description: >-
    ### General Description

    Unquarantines an endpoint in Cisco ISE by resolving the provided IP address to
    a MAC address and removing the quarantine status. This action is used to restore
    network access to endpoints that were previously isolated or quarantined due to
    security policies.


    ### Flow Description

    1. The action initializes the `CiscoISEManager` using the integration configuration
    parameters (API Root, Username, Password, Verify SSL).

