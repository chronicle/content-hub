Quarantine Address:
  ai_description: >-
    ### General Description

    Quarantines an endpoint in Cisco ISE by applying a specified policy to its MAC
    address. This action isolates the endpoint from the network by updating its policy
    status in Cisco ISE.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials, SSL verification)
    from the integration settings.

    2. Extracts the `Policy Name` parameter provided by the user.

    3. Iterates through target entities of type `ADDRESS`.

    4. Retrieves the MAC address associated with each IP address using the Cisco ISE
