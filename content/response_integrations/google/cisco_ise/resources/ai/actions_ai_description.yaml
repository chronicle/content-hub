Add Endpoint To Endpoint Identity Group:
  ai_description: >-
    General Description: Adds an endpoint (identified by IP or MAC address) to a specified
    Endpoint Identity Group in Cisco ISE.


    Flow Description:

    1. Extracts configuration parameters (API Root, credentials, SSL verification)
    and the `Endpoint Identity Group Name` parameter.

    2. Filters target entities for `ADDRESS` and `MACADDRESS` types.

    3. Retrieves the target group ID from Cisco ISE using `get_endpoint_groups`.

    4. Iterates through each entity:
       * If the entity is an IP address, it resolves the MAC address using `get_endpoint_mac_by_ip`.
       * Retrieves the endpoint ID from Cisco ISE by matching the MAC address.
       * Calls `add_endpoint_to_group` to update the endpoint's group membership.
    5. Returns the operation results and updates the action output.


    Additional Notes: Requires valid Cisco ISE credentials and network connectivity
    to the Cisco ISE API.
  ai_short_description: >-
    Adds an endpoint to a specified Endpoint Identity Group in Cisco ISE.
