name: Terminate Session
description: Session disconnect via an API call
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cisco-ise#terminate_session
integration_identifier: CiscoISE
parameters:
-   name: Node Server Name
    type: string
    description: ISE node server name, e.g. ciscoISE.
    is_mandatory: true
-   name: Calling Station ID
    type: string
    description: The ID value of the calling station, e.g. 1.
    is_mandatory: true
-   name: Terminate Type
    type: string
    description: Terminate Type value will be an integer between 0 and 2, e.g. 0 (0=DYNAMIC_AUTHZ_PORT_DEFAULT,
        1=DYNAMIC_AUTHZ_PORT_BOUNCE, 2=DYNAMIC_AUTHZ_PORT_SHUTDOWN)
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
script_result_name: is_succeed
