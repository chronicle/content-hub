List Templates:
  ai_description: >-
    ### General Description

    Retrieves a list of available templates from the AlgoSec platform. This action
    allows users to view configured templates, optionally applying filters to narrow
    down the results by name and limiting the total number of returned items.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Filter Logic, Filter Value, Max Templates To Return).

    2. Initializes the `AlgoSecManager` to establish a session with the AlgoSec API.

    3. Performs a GET request to the `/FireFlow/api/templates` endpoint to retrieve
    all available templates.

    4. Filters the retrieved templates locally based on the provided `Filter Logic`
    (Equal or Contains) and `Filter Value`.

    5. Truncates the list of templates based on the `Max Templates To Return` parameter.

    6. Constructs a data table and JSON result containing the filtered templates and
    adds them to the action output.


    ### Additional Notes

    This action is read-only and does not modify any data in AlgoSec or the SOAR platform.
