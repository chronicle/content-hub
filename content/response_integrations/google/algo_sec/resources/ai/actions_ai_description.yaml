    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Template, Source, Service, Subject, Owner, Due Date, Expiration
    Date, Custom Fields).

    2. Filters target entities to include only those of type `ADDRESS`.

    3. Initializes the `AlgoSecManager` and authenticates with the AlgoSec API.

    4. Constructs the request body, mapping the provided parameters and target IP
    addresses to the required AlgoSec format.

    5. Executes a POST request to the AlgoSec API (`/FireFlow/api/change-requests/traffic`)
    to create the traffic change request.

    6. Retrieves the details of the created request using the returned request ID.

    7. Adds the JSON result and a link to the change request to the action output.


    ### Additional Notes

    The action requires valid AlgoSec credentials and connectivity. It specifically
    targets IP address entities.
