List Templates:
  ai_description: >-
    ### General Description

    Lists available templates in AlgoSec based on specified filter criteria.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the `AlgoSecManager` to interact with the AlgoSec API.

    3. Calls the AlgoSec API (`/FireFlow/api/templates`) to retrieve a list of available
    templates.

    4. Applies filtering logic (Equal or Contains) based on the provided `Filter Value`
    against the template names.

    5. Limits the number of returned templates based on the `Max Templates To Return`
    parameter.

    6. Returns the results as a JSON object and populates a data table with the template
    details.


    ### Additional Notes

    If no filter value is provided, all templates up to the specified limit will be
    returned.
