Ping:
  ai_description: >-
    General Description


    Tests connectivity to the AlgoSec server using the provided configuration parameters.
    This action validates that the integration is correctly configured and can communicate
    with the AlgoSec server.


    Flow Description


    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, and `Verify SSL` from the integration settings.

    2. It initializes the `AlgoSecManager` with the provided credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the AlgoSec API endpoint (`/FireFlow/api/templates`) to verify the
    connection.

    4. If the request is successful, the action completes with a success message;
    otherwise, it logs the error and fails.


    Additional Notes


