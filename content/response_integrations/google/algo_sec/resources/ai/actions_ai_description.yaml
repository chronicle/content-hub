    reasoning: >-
      The action does not fetch data for enrichment and it mutates external data,
      so it is not an enrichment action. It allows traffic rather than blocking it,
      so it does not strictly fit the remediation criteria of mitigating a threat.
    remediation: false
  entity_usage:
