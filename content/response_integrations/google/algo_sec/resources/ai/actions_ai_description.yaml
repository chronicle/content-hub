    Creates a traffic change request in AlgoSec to block traffic to specific IP address
    entities. This action initiates a state change on the external device to prevent
    network traffic to the specified destinations.


    ### Flow Description

    1. Extracts action parameters including template, source, service, and custom
    fields.

    2. Filters target entities to include only IP addresses (`ADDRESS`).

    3. Makes a POST request to the AlgoSec API to create a new traffic change request
    with a `Drop` action for the specified IP addresses as destinations.

    4. Waits for a brief period and makes a GET request to retrieve the details of
    the newly created change request.

    5. Adds the change request details as JSON results and provides a link to the
    request in the SecOps platform.


