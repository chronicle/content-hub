  ai_description: >-
    ### General Description

    The **List Templates** action is designed to retrieve a list of available templates
    from the AlgoSec platform. It allows users to filter the retrieved templates based
    on specific criteria (exact match or substring match) and limit the number of
    results returned. The action outputs the retrieved templates as a JSON object
    and a data table for further use in the playbook.


    ### Flow Description

    1. Initializes the AlgoSec manager with the provided API credentials.

    2. Makes a GET request to the AlgoSec API to retrieve all available templates.

    3. Applies filtering logic to the retrieved templates based on the `Filter Logic`
    and `Filter Value` parameters, if provided.

    4. Truncates the list of templates to the maximum number specified in the `Max
    Templates To Return` parameter.

    5. Returns the final list of templates as a JSON result and constructs a data
    table for the action output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Logic | Dropdown | No | Specifies the filter logic to apply. Available
    options are "Equal" (exact match) and "Contains" (substring match). |

    | Filter Value | String | No | Specifies the value to be used in the filter. If
    "Equal" is selected, the action will try to find an exact match among template
    names. If "Contains" is selected, the action will try to find templates that contain
    the substring in their name. If left empty, no filtering is applied. |

    | Max Templates To Return | Integer | No | Specifies the maximum number of templates
    to return. The default value is 50. Must be greater than 0. |


    ### Additional Notes

    - If `Max Templates To Return` is set to a value less than 1, the action will
    fail and raise an exception.
