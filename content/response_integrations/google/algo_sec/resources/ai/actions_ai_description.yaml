    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a traffic change request in the AlgoSec system to allow traffic to specified
      IP addresses.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to create a traffic change request in AlgoSec
      (can_mutate_external_data=true) and a GET request to retrieve the request details
      (fetches_data=true). It does not mutate internal data or update entities/insights.
