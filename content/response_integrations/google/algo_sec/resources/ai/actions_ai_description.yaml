Wait for Change Request Status Update:
  ai_description: >-
    ### General Description

    Waits for a specific change request status update in AlgoSec. This action runs
    asynchronously and continuously checks if a given traffic change request has reached
    one of the specified target statuses.


    ### Flow Description

    1. Extracts the provided `Request ID` and target `Status` parameters.

    2. Validates the provided statuses against the allowed list of AlgoSec statuses
    (e.g., resolved, reconcile, open, check, implementation plan, implement, validate).

    3. Queries the AlgoSec API (via a GET request to the `/FireFlow/api/change-requests/traffic/{request_id}`
    endpoint) to retrieve the current details and status of the specified change request.

    4. Evaluates the retrieved status against the target statuses.

    5. If the current status matches one of the target statuses, the action completes
    successfully and returns the request details as JSON.

    6. If the status does not match, the action remains in an 'In Progress' state
    and will be re-executed in the next cycle until the status matches or a timeout
    occurs.


    ### Additional Notes

    This action is designed to run asynchronously. Ensure the script timeout value
    in the IDE is adjusted as needed. Only traffic change requests are supported.
  ai_short_description: >-
    Asynchronously waits for a specific traffic change request in AlgoSec to reach
    a designated status.
