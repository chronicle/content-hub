Allow IP:
  ai_description: >-
    ### General Description

    Creates a traffic change request in AlgoSec to allow traffic to specified IP address
    entities. This action initiates a state change on the external firewall management
    system to permit network traffic to the target IPs, which are treated as destinations
    in the request.


    ### Flow Description

    1. Extracts action parameters and filters the target entities to include only
    IP addresses.

    2. Initializes the AlgoSec API client with the provided credentials.

    3. Sends a POST request to AlgoSec to create a new traffic change request with
    an "Allow" action, using the target IP addresses as destinations.

    4. Pauses briefly to allow the request to be processed, then retrieves the details
    of the newly created request.

    5. Attaches the request details as a JSON result and provides a direct link to
    the change request in the action results.


    ### Additional Notes

    IP address entities are strictly treated as destinations in the generated change
    request. The source and service parameters must be provided to define the scope
    of the allow rule.
  ai_short_description: >-
    Creates a traffic change request in AlgoSec to allow traffic to specified IP address
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new traffic change request in AlgoSec to allow traffic to the specified
      IP addresses.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to AlgoSec to create a traffic change request,
      which mutates external data. It does not fetch contextual enrichment data, nor
      does it mutate internal SecOps data, update entities, or create insights.
