Wait for Change Request Status Update:
  ai_description: >-
    ### General Description

    Monitors the status of a specific change request in AlgoSec. It polls the request
    details and checks if the current status matches one of the user-provided target
    statuses. If the status matches, the action completes successfully and returns
    the request details. If the status does not match, the action remains in an "In
    Progress" state, allowing the SOAR platform to re-run the action until the desired
    status is reached or a timeout occurs.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials) and action parameters
    (Request ID, target statuses).

    2. Validates the provided statuses against a list of allowed values.

    3. Initializes the `AlgoSecManager` to interact with the AlgoSec API.

    4. Calls the `get_request_details` method (GET request) to retrieve the current
    status of the specified change request.

    5. Checks if the action is approaching a timeout.

    6. If the current status matches one of the target statuses, it adds the request
    details to the result JSON and completes the action.

    7. If the status does not match, it sets the action state to "In Progress" to
    wait for a future update.


    ### Additional Notes

    This action is designed to be used in an asynchronous loop within the SOAR platform.
    Ensure the action timeout is configured appropriately to allow for the expected
    duration of the change request process.
  ai_short_description: >-
    Monitors and waits for a specific change request in AlgoSec to reach a desired
    status.
  capabilities:
