Allow IP:
  ai_description: >-
    ### General Description

    This action creates a traffic change request in AlgoSec to allow traffic to specified
    IP address entities. It interacts with the AlgoSec API to submit a request based
    on provided templates and network parameters.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials) and action parameters
    (Template, Source, Service, etc.).

    2. Filters `target_entities` to include only `ADDRESS` types.

    3. Initializes the `AlgoSecManager` and authenticates with the AlgoSec instance.

    4. Calls `manager.create_request` to submit the traffic change request to AlgoSec.

    5. Retrieves the details of the created request using `manager.get_request_details`.

    6. Adds the request details as a JSON result and provides a direct link to the
    request in the SOAR action output.


    ### Additional Notes

    The action requires valid AlgoSec credentials and configuration. It treats IP
    address entities as destinations in the change request.
  ai_short_description: >-
    Creates a traffic change request in AlgoSec to allow traffic to specified IP address
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
