  ai_description: >-
    ### General Description

    This action creates a traffic change request in AlgoSec FireFlow to allow traffic
    to specified IP address entities. The IP address entities are treated as destinations
    in the change request.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Template | Yes | String | Specify the template for the change request. |

    | Source | Yes | String | Specify a comma-separated list of sources for the allow
    rule. It can be an IP address, IP Set or special keyword like (all). |

    | Service | Yes | String | Specify a comma-separated list of services that needs
    to be allowed. Values can have a look of {TCP/UDP}/{port} (tcp/80) or special
    reserved keyword (all). |

    | Subject | No | String | Specify the subject for the change request. If nothing
    is provided action will put "Siemplify Allow IP request" in the subject. |

    | Owner | No | String | Specify who should be the owner of the change request.
    If nothing is provided, the user that created the ticket will be the owner. |

    | Due Date | No | String | Specify the due date for the change request. Format:
    ISO 8601. Example: 2021-08-13T08:16:10Z. |

    | Expiration Date | No | String | Specify the expiration date for the change request.
    Format: ISO 8601. Example: 2021-08-13T08:16:10Z. |

    | Custom Fields | No | String | Specify a JSON object containing information about
    all of the fields that need to be added to the change request. Note: this parameter
    has a priority over other fields. |


    ### Flow Description

    1. Extracts the configuration and action parameters.

    2. Filters the target entities to include only IP addresses (ADDRESS).

    3. Creates a traffic change request in AlgoSec FireFlow to allow traffic to the
    specified IP addresses, using the provided template, source, and service parameters.

    4. Waits for a short duration and retrieves the details of the newly created change
    request.

    5. Adds the request details as a JSON result and provides a link to the change
    request in the action results.
