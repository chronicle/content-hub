  ai_description: >-
    Waits for a change request status update in AlgoSec. This action runs asynchronously
    and periodically checks the status of a specified change request ID until it matches
    one of the provided target statuses.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Request ID | String | Yes | The ID of the change request to monitor. |

    | Status | String | Yes | A comma-separated list of target statuses to wait for
    (e.g., resolved, reconcile, open, check, implementation plan, implement, validate).
    |


    ### Action Flow

    1. Validates the provided target statuses against the allowed possible statuses.

    2. Authenticates with the AlgoSec API.

    3. Retrieves the current details and status of the specified change request.

    4. Checks if the current status matches any of the target statuses.

    5. If a match is found, completes the action and returns the request details as
    JSON. If not, the action remains in progress and will be re-evaluated in the next
    asynchronous cycle.
