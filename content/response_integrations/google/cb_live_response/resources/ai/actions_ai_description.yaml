  ai_description: >-
    ### General Description

    The `Download File` action connects to VMware Carbon Black Cloud to download a
    specific file from a remote host associated with the provided Hostname or IP Address
    entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Name | String | False | The name of the file to download. Can be a full
    path. If provided as both an entity and a parameter, the parameter takes precedence.
    |

    | Remote Directory Path | String | False | The remote directory path from which
    to download the file. |

    | Local Directory Path | String | True | The local directory path where the downloaded
    file will be saved. |

    | Check for active session x times | Integer | True | The number of attempts the
    action will make to check for an active Live Response session (checked every 2
    seconds). |


    ### Additional Notes

    The file name can be provided either as a Siemplify File entity (artifact) or
    as an action input parameter. If the action is executed against multiple Host
    or IP entities, the downloaded file name is appended with the Hostname or IP address
    to prevent overwriting.


    ### Flow Description

    1. Identify suitable Hostname, IP Address, and File Name entities from the case.

    2. Retrieve the corresponding Carbon Black Cloud device ID for each entity.

    3. Initiate a Live Response session on the target device.

    4. Check the session status until it becomes active or the retry limit is reached.

    5. If a remote directory path is provided without a specific file name, create
    a command to list directory data.

    6. Start a command to get the specified file from the remote host.

    7. Check the command status and retrieve the file content once completed.

    8. Save the downloaded file to the specified local directory path.

    9. Return a JSON result containing the execution details and file paths.
