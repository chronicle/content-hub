Kill Process:
  ai_description: >-
    ### General Description

    Kills a specified process on a host using VMware Carbon Black Cloud Live Response.
    This action allows security analysts to terminate malicious or unauthorized processes
    directly on an endpoint.


    ### Flow Description

    1. Extracts configuration parameters (API credentials) and action parameters (Process
    Name, session check limit).

    2. Identifies the target process name from the provided input parameter or by
    searching for a `PROCESS` artifact in the case.

    3. Filters target entities for `ADDRESS` or `HOSTNAME` types to identify the target
    device.

