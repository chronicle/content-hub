    Deletes a specified file from a remote host running the VMware Carbon Black Cloud
    Agent. The action targets Hostname and IP Address entities to identify the remote
    host, and uses File Name entities or input parameters to specify the file to delete.


    ### Flow Description

    1. Extracts the target file names and remote directory paths from the action parameters
    or File Name entities.

    2. Iterates over the target Hostname and IP Address entities and makes an API
    call to Carbon Black Cloud to find the corresponding device ID.

    3. Initiates a Live Response session on the identified device via an API call.

    4. Periodically checks the status of the Live Response session via API calls until
    it becomes active.

    5. Sends a command to the Carbon Black Cloud API to delete the specified file
    on the remote host.

    6. Monitors the command status via API calls until completion and collects the
    results.


    ### Additional Notes

    The file name can be provided as a Siemplify File entity or as an action input
    parameter. If provided as both, the input parameter takes precedence.
