  ai_description: >-
    Deletes a specified file from a host running VMware Carbon Black Cloud Agent.


    ### General Description

    This action connects to the VMware Carbon Black Cloud via Live Response to delete
    a specific file on a target endpoint. It identifies the endpoint using Hostname
    or IP Address entities and determines the file to delete using either the `File
    Name` input parameter or Filename entities attached to the case.


    ### Parameters Description

    - **Remote Directory Path** (String, Optional): Specify the remote directory path
    to the file to delete (e.g., `C:\TMP\`).

    - **File Name** (String, Optional): Specify the file name to delete. It is case
    insensitive and can be specified as a full path. If provided, this parameter overrides
    any Filename entities in the case.

    - **Check for active session x times** (Integer, Mandatory): Determines how many
    attempts the action should make to get an active Live Response session for the
    entity. Checks are made every 2 seconds.


    ### Additional Notes

    - Either the `File Name` parameter must be provided, or Filename entities must
    be present in the case.

    - If the `File Name` is passed as a full path, the `Remote Directory Path` parameter
    is ignored.


    ### Flow Description

    1. Filters the target entities to identify valid Hostname, IP Address, and Filename
    entities.

    2. Queries VMware Carbon Black Cloud to find the corresponding device ID for each
    endpoint entity.

    3. Initiates a Live Response session on the target device and polls until the
    session is active.

    4. Issues a command to delete the specified file(s) on the endpoint.

    5. Monitors the command execution status and returns the final result.
