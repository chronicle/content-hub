    attached to the case. If both are provided, the parameter takes precedence. |

    | Check for active session x times | Integer | True | How many attempts the action
    should make to get an active session for the entity. Checks are made every 2 seconds.
    |


    ### Additional Notes

    - This action requires Carbon Black Live Response API v6; API v3 is not supported.

    - Either the 'File Name' parameter must be provided, or File entities must be
    attached to the case for the action to execute successfully.
