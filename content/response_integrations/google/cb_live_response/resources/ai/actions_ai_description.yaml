Create Memdump:
  ai_description: >-
    ### General Description

    Creates a memory dump on a host using the VMware Carbon Black Cloud Live Response
    API. This action allows security analysts to capture memory from a remote endpoint
    for forensic analysis, targeting specific hosts or IP addresses.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, organization key) and action
    parameters (File Name, Remote Directory Path, and session check attempts).

    2. Identifies target entities (`HOSTNAME` or `ADDRESS`) and the target file name/path.
    If a `FILENAME` entity is present, it is used as the file name if not provided
    as an action parameter.

    3. Initializes the Carbon Black Live Response manager.

    4. Finds the corresponding Carbon Black device ID for the target entity (API call:
    `appservices/v6/orgs/{org_key}/devices/_search`).

    5. Starts a Live Response session on the device (API call: `integrationServices/v3/cblr/session/{device_id}`
    or `appservices/v6/orgs/{org_key}/liveresponse/sessions`).

    6. Checks the session status until active (API call: `integrationServices/v3/cblr/session/{session_id}`
    or `appservices/v6/orgs/{org_key}/liveresponse/sessions/{session_id}`).

    7. Initiates the memory dump command on the remote host (API call: `integrationServices/v3/cblr/session/{session_id}/command`
    or `appservices/v6/orgs/{org_key}/liveresponse/sessions/{session_id}/commands`).

    8. Polls the command status until completion (API call: `integrationServices/v3/cblr/session/{session_id}/command/{command_id}`
    or `appservices/v6/orgs/{org_key}/liveresponse/sessions/{session_id}/commands/{command_id}`).


    ### Additional Notes

    The action supports `HOSTNAME` and `ADDRESS` entities. File name can be provided
    as a `FILENAME` entity or an action parameter. If both are provided, the action
    parameter takes precedence.
  ai_short_description: >-
    Creates a memory dump on a remote host using VMware Carbon Black Cloud Live Response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a memory dump command on the remote host via the Carbon Black Cloud
      Live Response API.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes multiple API calls to the Carbon Black Cloud to find devices,
      start sessions, initiate commands, and check command status. It mutates external
      data by triggering a memory dump command on the remote host.
  entity_usage:
