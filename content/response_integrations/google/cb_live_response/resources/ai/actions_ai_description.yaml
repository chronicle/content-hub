  ai_description: >-
    Kills a specific process on a host using VMware Carbon Black Cloud Live Response.


    ### General Description

    The action targets ADDRESS and HOSTNAME entities to identify the host, and uses
    a PROCESS entity or an input parameter to identify the process to kill. It establishes
    a Live Response session with the target device, lists the running processes to
    find the PID of the specified process, and then executes a kill command.


    ### Flow Description

    1. Retrieves the device ID for the target ADDRESS or HOSTNAME entity.

    2. Initiates a Live Response session on the device.

    3. Checks the session status until it becomes active.

    4. Executes a command to list running processes on the device.

    5. Parses the process list to find the PID of the specified process name.

    6. Executes a command to kill the process using the identified PID.

    7. Checks the status of the kill command and returns the result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Process Name | String | False | The name of the process to kill. If not provided,
    the action will look for a PROCESS entity in the target entities to use as the
    process name. |

    | Check for active session x times | String | True | The number of attempts the
    action should make to get an active session for the entity. Checks are made every
    2 seconds. Default is 20. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Kills a specific process on the target endpoint via VMware Carbon Black Live
      Response.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (device info, session status, process list) from Carbon
      Black Cloud. It mutates external data by executing a kill command on the target
      endpoint to terminate a process. It does not mutate internal SOAR data, update
      entities, create insights, or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by killing a process, so it cannot be an Enrichment
