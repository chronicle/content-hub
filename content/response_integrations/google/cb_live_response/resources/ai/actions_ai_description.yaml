Download File:
  ai_description: >-
    ### General Description

    Downloads a file from a host running VMware CB Cloud Agent based on the Siemplify
    Hostname or IP Address entity. The file name can be provided either as a Siemplify
    File entity (artifact) or as an action input parameter.


    ### Flow Description

    1. Retrieves the corresponding CB Cloud Device ID for the provided Hostname or
    IP Address entities.

    2. Initiates a Live Response session on the target device.

    3. Polls the session status until it becomes active.

    4. If a remote directory path is provided without specific filenames, it executes
    a command to list the directory contents.

    5. Initiates a command to retrieve the specified file(s) from the remote host.

    6. Polls the command status until it completes successfully.

    7. Downloads the file content and saves it to the specified local directory path.


    ### Additional Notes

    - If the File name is passed to the action both as an entity and an input parameter,
    the action will be executed using the input parameter.

    - The file name is case-insensitive.

    - If the action is executed against multiple Host or IP entities, the downloaded
    file name is appended with the Hostname or IP address to prevent overwriting (e.g.,
    `hostname_filename`).

    - The File Name can also be specified as a full path, in which case the Remote
    Directory Path parameter is ignored.
