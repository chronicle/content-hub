    If the 'File Name' parameter is not provided, it attempts to use FILENAME entities.

    3. Initializes a connection to the Carbon Black Cloud API using the provided credentials.

    4. Locates the corresponding device ID for the target entity (HOSTNAME or ADDRESS).

    5. Initiates a Live Response session on the target device.

    6. Executes the 'delete file' command via the Live Response session.

    7. Monitors the command status until completion and reports the result.


    ### Additional Notes

    The file name can be provided as an entity or as an action input parameter. If
    both are provided, the input parameter takes precedence. The action is case-insensitive
    and supports full paths if specified in the 'File Name' parameter.
