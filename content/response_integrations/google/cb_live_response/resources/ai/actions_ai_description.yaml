Create Memdump:
  ai_description: >-
    ### General Description

    Creates a memory dump on a host running VMware CB Cloud Agent based on the provided
    Hostname or IP Address entities. The action interacts with the VMware Carbon Black
    Cloud API to initiate a Live Response session and execute the memory dump command
    on the remote endpoint.


    ### Flow Description

    1. Iterates over the target entities and filters for supported types (Hostname,
    IP Address) and optionally File Name entities if the `File Name` parameter is
    not provided.

    2. Queries the VMware Carbon Black Cloud API to retrieve the corresponding device
    ID for each target entity.

    3. Initiates a Live Response session on the target device via the API.

    4. Polls the session status up to the configured number of times until the session
    becomes active.

    5. Executes a command via the Live Response session to create a memory dump at
    the specified remote directory path.

    6. Polls the command status until it completes or fails, and collects the execution
    results.


    ### Additional Notes

    The file name for the memdump can be provided either as a Siemplify File entity
    (artifact) or as an action input parameter. If provided as both, the input parameter
    takes precedence. The file name can also be specified as a full path, in which
    case the `Remote Directory Path` parameter is ignored.
  ai_short_description: >-
    Creates a memory dump on a remote host running VMware CB Cloud Agent by initiating
    a Live Response session and executing a memdump command based on Hostname or IP
    Address entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
