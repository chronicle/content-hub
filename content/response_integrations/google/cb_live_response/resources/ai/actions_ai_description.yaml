    File Name from Filename entities.

    2. Retrieve the corresponding Carbon Black Cloud device for each entity.

    3. Initiate a Live Response session on the device.

    4. Upload the file from the local source directory to the Live Response session.

    5. Execute a command to move the uploaded file to the destination directory on
    the remote host.

    6. Check the command status and return the results.
