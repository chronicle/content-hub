    live response session based on the provided Host, IP, or File entities.


    ### Flow Description

    1. Retrieves the corresponding Carbon Black Cloud device ID for the target Host
    or IP entities.

    2. Initiates a Live Response session for the identified device.

    3. Polls the session status until it becomes active, based on the configured number
    of retries.

    4. Retrieves the list of files currently stored in the cloud storage for the active
    session.

    5. Matches the specified file name (provided via parameter or File entity) against
    the stored files.

    6. Deletes the matching file(s) from the Carbon Black Cloud storage.


