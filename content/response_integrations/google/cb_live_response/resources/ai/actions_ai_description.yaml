    7. Monitors the status of the kill command and returns the execution results as
    JSON.


    ### Additional Notes

    This action runs asynchronously. If multiple devices match a single entity, the
    action will target the device with the most recent contact time. If the process
    name is provided both as a parameter and as an entity, the parameter value takes
    precedence.
