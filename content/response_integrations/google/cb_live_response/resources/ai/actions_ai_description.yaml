Execute File:
  ai_description: >-
    ### General Description

    Executes a file on a host running VMware CB Cloud Agent based on the Siemplify
    Hostname or IP Address entity.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Identifies target entities (ADDRESS, HOSTNAME) and filenames (from parameters
    or FILENAME entities).

    3. Initializes the Carbon Black Live Response Manager.

    4. Executes a series of asynchronous steps:
       - Initial step: Prepares entities and filenames.
       - Get Corresponding CB Cloud Device: Finds the device ID for the entity.
       - Session Start: Starts a Live Response session on the device.
       - Session Check: Waits for the session to become active.
       - Command Start: Initiates the command to execute the file on the remote host
    via the `create_command` API endpoint.
       - Command Check: Waits for the command to complete and collects the results
    via the `get_command` API endpoint.
    5. Returns the execution results and outputs a JSON result.


    ### Additional Notes

    The file name can be provided as a Siemplify File entity or as an action input
    parameter. If both are provided, the input parameter takes precedence.
