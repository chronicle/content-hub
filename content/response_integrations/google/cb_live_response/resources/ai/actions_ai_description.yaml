    reasoning: >-
      The action fetches device information and session/command statuses from the
      VMware Carbon Black Cloud API (fetches_data=true). It mutates external data
      by initiating a Live Response session and executing a command to create a memory
      dump on the remote endpoint (can_mutate_external_data=true). It does not mutate
      internal data, update entities, create insights, modify alerts, or create case
      comments.
