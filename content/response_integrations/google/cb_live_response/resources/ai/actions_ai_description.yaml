    Response. The action identifies the target host using Hostname or IP Address entities
    and determines the process to kill based on an input parameter or a Process entity.


    ### Flow Description

    1. Extracts the process name from the action parameters. If not provided, it searches
    the target entities for a Process entity to use as the process name.

