  ai_description: >-
    Creates a memory dump on a host running VMware Carbon Black Cloud Agent based
    on the provided Hostname or IP Address entities. The action initiates a Live Response
    session with the target device and executes a command to generate a memory dump
    file at the specified remote directory path.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Name | String | False | Specify the file name for the memdump creation.
    Can be specified as a full path. If not provided, the action will attempt to use
    File entities attached to the case. |

    | Remote Directory Path | String | False | Specify the directory file path to
    store the memdump on the remote host. |

    | Check for active session x times | Integer | True | How many attempts the action
    should make to get an active session for the entity. Checks are made every 2 seconds.
    Default is 20. |


    ### Flow

    1. Retrieves the corresponding Carbon Black Cloud device for each Hostname or
    IP Address entity.

    2. Initiates a Live Response session on the target device.

    3. Waits for the session to become active, checking up to the configured number
    of times.

    4. Executes the command to create a memory dump at the specified path.

    5. Monitors the command status until completion.

    6. Returns the execution results as JSON.
