Put File:
  ai_description: >-
    ### General Description

    Puts a file on a remote host running the VMware Carbon Black Cloud Agent based
    on the provided Siemplify Hostname or IP Address entities. The file name to be
    uploaded can be provided either as a Siemplify File entity or as an action input
    parameter. The action establishes a Live Response session with the target device,
    uploads the file to the session, and then executes a command to place the file
    in the specified destination directory on the remote host.


    ### Flow Description

    1. Retrieves the corresponding Carbon Black Cloud device for the provided Hostname
    or IP Address entities.

    2. Initiates a Live Response session on the target device.

    3. Polls the session status until it becomes active.

    4. Uploads the specified file from the local SOAR environment to the Live Response
    session.

    5. Initiates a 'put file' command to move the uploaded file to the specified destination
    directory path on the remote host.

    6. Polls the command status until it completes successfully.

    7. Returns a JSON result containing the details of the uploaded file and command
    execution.


    ### Additional Notes

    - The File Name parameter is case-insensitive.

    - If the File Name is passed to the action both as an entity and an input parameter,
    the action will execute using the input parameter.

    - The File Name will be appended to both the Source Directory Path and Destination
    Directory Path to construct the resulting file paths accepted by the Carbon Black
    Cloud API.

    - The File Name can also be specified as a 'full path' containing both the path
    and the file name, in which case the Source Directory Path parameter will not
    be used.
