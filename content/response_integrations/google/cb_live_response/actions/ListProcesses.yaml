name: List Processes
description: List processes running on endpoint based on the provided Siemplify Host
    or IP entity.
integration_identifier: CBLiveResponse
parameters:
-   name: Process Name
    default_value: ''
    type: string
    description: Process name to search for on the host.
    is_mandatory: false
-   name: How Many Records To Return
    default_value: '25'
    type: string
    description: How many records per entity action should return.
    is_mandatory: false
-   name: Check for active session x times
    default_value: '20'
    type: string
    description: How many attempts action should make to get active session for the
        entity. Check is made every 2 seconds.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/list_processes_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
