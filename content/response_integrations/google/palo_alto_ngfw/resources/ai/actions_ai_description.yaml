Block Urls:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified URL category on a Palo Alto Networks Next-Generation
    Firewall (NGFW). This action is primarily used to manage custom URL categories
    which can then be referenced in security policies to control web traffic. It supports
    both local vsys-specific categories and shared objects.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | No | The device name where the group is located. Default
    is 'localhost.localdomain'. Required if 'Use Shared Objects' is disabled. |

    | Vsys Name | String | No | The vsys where the group is located. Default is 'vsys1'.
    Required if 'Use Shared Objects' is disabled. |

    | URL Category Name | String | Yes | The name of the URL category to which the
    URLs will be added. |

    | Use Shared Objects | Boolean | No | If enabled, the action will use shared objects
    instead of vsys-specific objects. |


    ### Additional Notes

    - **Policy Requirement**: Adding a URL to a category does not automatically block
    it; a security policy must be configured on the NGFW to use that category for
    blocking or filtering.

    - **Constraints**: The length of a URL cannot exceed 255 characters; URLs exceeding
    this limit will be skipped.

    - **Configuration Logic**: Either 'Use Shared Objects' must be enabled, or both
    'Device Name' and 'Vsys Name' must be provided for the action to execute successfully.


    ### Flow Description

    1. **Validation**: The action first validates that either 'Use Shared Objects'
    is enabled or that both 'Device Name' and 'Vsys Name' are provided.

    2. **Entity Filtering**: It filters the target entities to identify URL entities.

    3. **Duplicate & Length Check**: For each URL, it verifies the character length
    (max 255) and queries the NGFW to check if the URL already exists in the specified
    category.

    4. **External Mutation**: If the URL is valid and not already present, the action
    sends a request to the Palo Alto NGFW API to add the URL to the category.

    5. **Result Summary**: The action concludes by providing a JSON result and an
    output message detailing which URLs were successfully added, which failed, and
    which already existed.
