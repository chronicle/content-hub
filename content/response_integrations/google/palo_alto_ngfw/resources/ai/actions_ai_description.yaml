Commit Changes:
  ai_description: "### General Description\nThis action commits pending configuration\
    \ changes on a Palo Alto Networks Next-Generation Firewall (NGFW). In Palo Alto\
    \ NGFW, configuration changes are first made to a 'candidate configuration' and\
    \ must be explicitly committed to become part of the 'running configuration'.\
    \ This action allows security analysts to finalize changes made by other automated\
    \ actions (like blocking IPs or URLs) or manual edits.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Only My Changes | Boolean | Yes | If set to `True`, the action will only commit\
    \ changes made by the administrator account configured in the integration settings.\
    \ If set to `False`, it performs a full commit of all pending changes on the device.\
    \ |\n\n### Additional Notes\n- **Permissions:** To use the `Only My Changes` option,\
    \ the configured user must have administrative privileges on the Palo Alto device.\n\
    - **Scope:** This action does not target specific entities; it operates on the\
    \ global configuration state of the firewall.\n\n### Flow Description\n1. **Authentication:**\
    \ The action authenticates with the Palo Alto NGFW using the configured API Root,\
    \ Username, and Password to obtain an API key.\n2. **Parameter Extraction:** It\
    \ retrieves the `Only My Changes` boolean flag from the action parameters.\n3.\
    \ **Commit Execution:** \n    - If `Only My Changes` is enabled, it sends a partial\
    \ commit command targeting only the changes associated with the current user.\n\
    \    - If `Only My Changes` is disabled, it sends a force commit command for all\
    \ pending changes.\n4. **Finalization:** The action validates the API response\
    \ and reports a successful commit to the Google SecOps case wall."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action transitions the Palo Alto NGFW candidate configuration to the running
      configuration, effectively applying all pending changes to the device's active
      policy and state.
    fetches_data: false
    internal_data_mutation_explanation: null
