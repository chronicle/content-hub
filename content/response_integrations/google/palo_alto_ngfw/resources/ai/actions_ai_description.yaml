Unblock Urls:
  ai_description: >-
    ### General Description

    Removes URL entities from a specified URL category in Palo Alto NGFW. This action
    is used to unblock URLs by removing them from custom URL categories that are typically
    referenced in security policies. It supports both vsys-specific categories and
    shared categories.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | No | The device name where the category is located. Defaults
    to 'localhost.localdomain'. This is required if 'Use Shared Objects' is disabled.
    |

    | Vsys Name | String | No | The vsys where the category is located. Defaults to
    'vsys1'. This is required if 'Use Shared Objects' is disabled. |

    | URL Category Name | String | Yes | The name of the custom URL category from
    which the URLs should be removed. |

    | Use Shared Objects | Boolean | No | If enabled, the action will target shared
    objects/categories instead of vsys-specific ones. |


    ### Additional Notes

    - If 'Use Shared Objects' is set to `false`, both 'Device Name' and 'Vsys Name'
    must be provided (or use their defaults) for the action to function correctly.

    - The action performs a 'Read-Compare-Write' flow to ensure it only attempts to
    remove URLs that actually exist in the target category.


    ### Flow Description

    1. **Initialization**: Retrieves configuration parameters (API Root, credentials)
    and action parameters (Device, Vsys, Category Name, and Shared Objects flag).

    2. **Entity Filtering**: Filters the target entities to identify valid URL entities.

    3. **Validation**: Checks if the necessary location parameters (Device/Vsys) are
    provided when not using shared objects.

    4. **Data Retrieval**: Connects to Palo Alto NGFW and fetches the current list
    of URLs associated with the specified category.

    5. **Comparison**: Compares the target entities against the retrieved list to
    determine which URLs are currently blocked and which are not.

    6. **Mutation**: For each matching URL, it sends a request to the NGFW to remove
    the URL from the category (using either vsys-specific or shared object API paths).

    7. **Completion**: Returns a JSON result containing lists of successfully removed
    URLs and URLs that were not found in the category initially.
