Remove Ips from group:
  ai_description: >-
    Removes IP address entities from a specified address group in Palo Alto NGFW.
    This action supports both vsys-specific address groups and shared address groups.
    It first verifies the existence of the IP addresses within the target group before
    attempting removal to ensure accuracy.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Group Name | String | Yes | The name of the address group from which
    the IPs should be removed. |

    | Device Name | String | No | The device name where the group is located (e.g.,
    localhost.localdomain). Required if 'Use Shared Objects' is false. |

    | Vsys Name | String | No | The vsys where the group is located (e.g., vsys1).
    Required if 'Use Shared Objects' is false. |

    | Use Shared Objects | Boolean | No | If enabled, the action will target shared
    address groups instead of vsys-specific ones. |


    ### Additional Notes

    Either the 'Use Shared Objects' parameter must be set to true, or both 'Device
    Name' and 'Vsys Name' must be provided for the action to execute successfully.


    ### Flow Description

    1. **Authentication**: Connects to the Palo Alto NGFW using the provided credentials
    and API root.

    2. **Entity Filtering**: Identifies all 'ADDRESS' entities from the current context.

    3. **Group Retrieval**: Fetches the current list of IP addresses belonging to
    the specified address group (either shared or vsys-specific).

    4. **Membership Validation**: Compares the target entities against the group members
    to identify which IPs actually need to be removed and which are not present.

    5. **Removal Execution**: Sends requests to the NGFW API to remove the identified
    IP addresses from the group.

    6. **Result Reporting**: Returns a summary of successfully removed IPs and those
    that were not found in the group initially.
