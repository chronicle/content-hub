  ai_description: >-
    Unblocks IP addresses by removing them from a specific security policy on a Palo
    Alto NGFW device. This action targets either the source or destination fields
    of a policy and processes each IP address individually.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Device Name** | String | Yes | The device name where the policy is located.
    Default is 'localhost.localdomain'. |

    | **Vsys Name** | String | Yes | The virtual system (vsys) name where the policy
    is located. Default is 'vsys1'. |

    | **Policy Name** | String | Yes | The name of the security policy from which
    the IPs should be removed. |

    | **Target** | String | Yes | Specifies the field to modify. Must be either 'source'
    or 'destination'. |


    ### Additional Notes

    - This action requires a subsequent 'Commit Changes' action to be executed in
    the Palo Alto NGFW for the changes to take effect on the device.

    - Only entities of type `ADDRESS` are processed.


    ### Flow Description

    1. **Validation**: The action validates that the `Target` parameter is set to
    either 'source' or 'destination'.

    2. **Entity Filtering**: It identifies all `ADDRESS` entities within the current
    scope.

    3. **Data Retrieval**: It connects to the Palo Alto NGFW and retrieves the current
    list of blocked IPs for the specified policy and target.

    4. **Policy Modification**: For each identified entity, the action checks if it
    exists in the current policy. If found, it removes the IP from the policy configuration.

    5. **Result Reporting**: The action tracks which IPs were successfully removed
    and which were not present in the policy initially, returning this data as a JSON
    result.
