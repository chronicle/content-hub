Get Blocked Applications:
  ai_description: >-
    ### General Description

    Retrieves a list of applications currently blocked by a specific security policy
    on a Palo Alto Networks Next-Generation Firewall (NGFW). This action is useful
    for auditing security rules and verifying which applications are restricted within
    a particular virtual system (vsys) and device context.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Device Name** | String | Yes | The device name where the policy is located.
    The default for NGFW is `localhost.localdomain`. |

    | **Vsys Name** | String | Yes | The virtual system (vsys) name where the policy
    is located. The default is `vsys1`. |

    | **Policy Name** | String | Yes | The specific name of the security policy to
    inspect for blocked applications. |


    ### Additional Notes

    - This action does not run on entities; it queries the firewall configuration
    based on the provided policy name.

    - It retrieves data from the 'candidate configuration' of the firewall.


    ### Flow Description

    1. **Authentication**: Connects to the Palo Alto NGFW using the provided credentials
    and API root.

    2. **Configuration Retrieval**: Fetches the current candidate configuration XML
    from the device.

    3. **Policy Parsing**: Searches the XML configuration for the specified `Policy
    Name` within the defined `Device Name` and `Vsys Name` using XPath.

    4. **Data Extraction**: Extracts all application members associated with the identified
    security rule.

    5. **Result Reporting**: Returns the list of blocked applications as a JSON array
    and provides a formatted summary message in the action output.
