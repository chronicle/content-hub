Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity and authentication
    credentials between Google SecOps and a Palo Alto Networks Next-Generation Firewall
    (NGFW) or Panorama instance. It ensures that the provided API Root, Username,
    and Password are correct and that the network path is open.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Api Root | The base URL of the Palo Alto NGFW or Panorama server (e.g., https://192.168.1.1).
    | String | Yes |

    | Username | The administrative username used to authenticate with the device.
    | String | Yes |

    | Password | The administrative password used to authenticate with the device.
    | String | Yes |

    | Verify SSL | If enabled, the action will verify the SSL certificate of the target
    server. | Boolean | Yes |


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting communication issues.

    - It attempts to retrieve an API key using the `keygen` API type. It first tries
    a POST request and falls back to a GET request if the POST method is not supported
    by the target firmware version.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    parameters including the API Root, credentials, and SSL verification settings.

    2. **Manager Initialization:** It initializes the `NGFWManager` class.

    3. **Authentication Attempt:** During initialization, the manager attempts to
    authenticate by requesting an API key from the Palo Alto device.

    4. **Validation:** The response from the device is parsed to ensure a valid API
    key was returned.

    5. **Result Reporting:** If the key is successfully retrieved, the action returns
    a success message. If a network error or authentication failure occurs, the action
    catches the exception and reports a failure.
