Block ips in policy:
  ai_description: >-
    ### General Description

    Blocks IP addresses in a specific security policy on a Palo Alto Networks Next-Generation
    Firewall (NGFW). This action allows for granular control by adding IPs to either
    the source or destination field of a named policy. It automatically handles the
    creation of Address Objects if they do not already exist on the device before
    adding them to the policy.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Device Name** | String | Yes | The device name where the policy is located
    (e.g., 'localhost.localdomain'). |

    | **Vsys Name** | String | Yes | The virtual system (vsys) name where the policy
    is located (e.g., 'vsys1'). |

    | **Policy Name** | String | Yes | The name of the security policy to be modified.
    |

    | **Target** | String | Yes | Specifies the field in the policy to update. Must
    be either 'source' or 'destination'. |


    ### Additional Notes

    - The action performs a 'delete' and 'set' operation on the policy's IP list to
    ensure the new IPs are added alongside existing ones.

    - If an IP address is already present in the specified policy and target field,
    the action will identify it as 'already existing' and will not attempt to add
    it again.

    - This action requires a subsequent 'Commit' action to be executed in the playbook
    for the changes to take effect on the NGFW candidate configuration.


    ### Flow Description

    1. **Validation**: Validates that the 'Target' parameter is set to either 'source'
    or 'destination'.

    2. **Entity Filtering**: Identifies all 'ADDRESS' entities within the current
    scope.

    3. **State Retrieval**: Connects to the NGFW and retrieves the list of IP addresses
    currently configured in the specified policy and target field.

    4. **Address Object Management**: For each target IP not already in the policy,
    the action checks for an existing Address Object. If one does not exist, it creates
    a new Address Object for that IP.

    5. **Policy Update**: Updates the security policy by adding the new IP addresses
    to the existing list of members.

    6. **Result Aggregation**: Categorizes each IP as 'success', 'failure', or 'already_exist'
    and returns a summary message and JSON result.
