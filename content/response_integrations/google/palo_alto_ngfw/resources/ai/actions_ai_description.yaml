Edit Blocked Applications:
  ai_description: >-
    ### General Description

    This action allows users to manage application-based blocking on a Palo Alto Networks
    Next-Generation Firewall (NGFW). It enables the addition or removal of specific
    applications from a designated security policy. This is useful for dynamically
    adjusting access controls based on application signatures rather than just IP
    addresses or URLs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Applications To Block | String | No | A comma-separated list of application
    names to be added to the block list (e.g., 'apple-siri, google-analytics'). |

    | Applications To UnBlock | String | No | A comma-separated list of application
    names to be removed from the block list. |

    | Device Name | String | Yes | The name of the device where the policy is located.
    Default is usually 'localhost.localdomain'. |

    | Vsys Name | String | Yes | The virtual system (vsys) name where the policy is
    located. Default is usually 'vsys1'. |

    | Policy Name | String | Yes | The specific name of the security policy to be
    modified. |


    ### Additional Notes

    - If neither 'Applications To Block' nor 'Applications To UnBlock' are provided,
    the action will complete without making any changes to the firewall configuration.

    - This action modifies the 'candidate configuration'. A separate 'Commit' action
    is typically required to make these changes active on the device.


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, credentials)
    and the target policy identifiers (Device, Vsys, Policy Name).

    2. **Input Parsing**: It parses the comma-separated strings of applications to
    block and unblock into unique sets.

    3. **Configuration Retrieval**: It fetches the current candidate configuration
    from the Palo Alto NGFW to identify the existing applications currently assigned
    to the policy.

    4. **Logic Processing**: It calculates the new set of applications by adding the
    requested 'Block' applications and removing the 'Unblock' applications from the
    current list.

    5. **External Mutation**: If changes are detected, it sends a request to the NGFW
    API to update the application list for the specified policy.

    6. **Verification**: It retrieves the updated list of applications from the firewall
    to confirm the current state.

    7. **Reporting**: The action returns a JSON result containing the final list of
    applications in the policy and provides a summary message of the changes made.
  capabilities:
