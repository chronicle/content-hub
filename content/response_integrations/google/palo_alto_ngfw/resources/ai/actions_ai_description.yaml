Add Ips to group:
  ai_description: >-
    ### General Description

    This action adds IP address entities to a specified address group within a Palo
    Alto Networks Next-Generation Firewall (NGFW). It supports managing both vsys-specific
    address groups and shared address groups. The action automatically handles the
    creation of address objects if they do not already exist before adding them to
    the target group.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | No* | The device name where the address group is located
    (e.g., `localhost.localdomain`). Required if 'Use Shared Objects' is disabled.
    |

    | Vsys Name | String | No* | The vsys where the address group is located (e.g.,
    `vsys1`). Required if 'Use Shared Objects' is disabled. |

    | Address Group Name | String | Yes | The name of the target address group to
    which the IP addresses will be added. |

    | Use Shared Objects | Boolean | No | If enabled, the action will interact with
    shared address groups and shared address objects instead of vsys-specific ones.
    |


    ### Additional Notes

    * **Conditional Requirement:** Either the 'Use Shared Objects' parameter must
    be set to `True`, or both 'Device Name' and 'Vsys Name' must be provided for the
    action to execute successfully.

    * The action will not create a shared address group if it does not already exist;
    however, it will create shared address objects for the IP entities if they are
    missing.


    ### Flow Description

    1. **Initialization:** Extracts integration configuration (API credentials, SSL
    verification) and action parameters.

    2. **Validation:** Checks if the required combination of parameters (Shared Objects
    vs. Device/Vsys) is provided.

    3. **Entity Filtering:** Identifies all `ADDRESS` entities from the target entities
    list.

    4. **Processing (Vsys Mode):** If 'Use Shared Objects' is false, the action retrieves
    current group members, checks for existing entries, creates missing address objects,
    and adds new IPs to the group.

    5. **Processing (Shared Mode):** If 'Use Shared Objects' is true, the action checks
    if the entity exists in the shared group, ensures the address object is shared,
    and adds it to the shared group.

    6. **Completion:** Aggregates results into categories (success, failure, already
    exists), attaches a JSON result to the action, and provides a summary output message.
