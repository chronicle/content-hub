name: Edit Blocked Applications
description: Block and unblock applications. Each application is added to or removed
    from a given policy.
integration_identifier: PaloAltoNGFW
parameters:
-   name: Applications To Block
    default_value: ''
    type: string
    description: 'List of applications to block, comma separated, e.g: apple-siri,app2.'
    is_mandatory: false
-   name: Applications To UnBlock
    default_value: ''
    type: string
    description: 'List of applications to unblock, comma separated, e.g: apple-siri,app2.'
    is_mandatory: false
-   name: Device Name
    default_value: ''
    type: string
    description: The device name in which the group is located. The default device
        name of NGFW is localhost.localdomain. In case configured differently, please
        refer to https://<NGFWIP>/php/rest/browse.php/config::devices for the list
        of all the device names and select the relevant device.
    is_mandatory: true
-   name: Vsys Name
    default_value: ''
    type: string
    description: The vsys in which the group is located. The default vsys name of
        NGFW is vsys1. In case configured differently, please refer to https://<NGFW
        IP>/php/rest/browse.php/config::devices::entry[@name='<DEVICE NAME>']::vsys
        for the list of all the vsys names of the device and select the relevant vsys.
    is_mandatory: true
-   name: Policy Name
    default_value: ''
    type: string
    description: Policy name value.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/edit_blocked_applications_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: success
