name: Remove Ips from group
description: Remove IP addresses from an address group
integration_identifier: PaloAltoNGFW
parameters:
-   name: Device Name
    default_value: ''
    type: string
    description: The device name in which the group is located. The default device
        name of NGFW is localhost.localdomain. In case configured differently, please
        refer to https://<NGFWIP>/php/rest/browse.php/config::devices for the list
        of all the device names and select the relevant device.
    is_mandatory: false
-   name: Vsys Name
    default_value: ''
    type: string
    description: The vsys in which the group is located. The default vsys name of
        NGFW is vsys1. In case configured differently, please refer to https://<NGFW
        IP>/php/rest/browse.php/config::devices::entry[@name='<DEVICE NAME>']::vsys
        for the list of all the vsys names of the device and select the relevant vsys.
    is_mandatory: false
-   name: Address Group Name
    default_value: ''
    type: string
    description: The name of the required address group.
    is_mandatory: true
-   name: Use Shared Objects
    default_value: false
    type: boolean
    description: 'If enabled, action will use shared objects instead of vsys. Note:
        action will not create a shared address group, if it doesn''t exist.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/remove_ip_from_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
script_result_name: success
