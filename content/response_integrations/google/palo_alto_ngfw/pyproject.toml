[project]
name = "PaloAltoNGFW"
version = "29.0"
description = "Palo Alto Networks next-generation firewalls are architected to safely enable applications and prevent modern threats."
requires-python = ">=3.11,<3.12"
dependencies = [ "defusedxml==0.7.1", "requests==2.32.4", "tipcommon", "xmltodict==0.13.0",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
