name: Block Sender
description: Block sender in Mimecast.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mimecast#block_sender
integration_identifier: Mimecast
parameters:
-   name: Sender
    default_value: ''
    type: string
    description: Specify the email address of the sender to block.
    is_mandatory: true
-   name: Recipient
    default_value: ''
    type: string
    description: Specify the email address of the recipient to block.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
