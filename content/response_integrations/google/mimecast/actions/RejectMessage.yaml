name: Reject Message
description: 'Reject message in Mimecast. Note: only messages with status "Held" can
    be rejected.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mimecast#reject_message
integration_identifier: Mimecast
parameters:
-   name: Message ID
    default_value: ''
    type: string
    description: Specify the ID of the message that needs to be rejected.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: Specify an additional note containing an explanation regarding why
        the message was rejected.
    is_mandatory: false
-   name: Reason
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Inappropriate Communication
    - Confidential Information
    - Restricted Content
    - Against Email Policy
    description: Specify the reason for rejection.
    is_mandatory: false
-   name: Notify Sender
    default_value: 'false'
    type: boolean
    description: If enabled, action will notify the sender about rejection.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
