name: Create Block Sender Policy
description: Create a Block Sender policy in Mimecast.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mimecast#create_block_sender_policy
integration_identifier: Mimecast
parameters:
-   name: Response
    default_value: Block Sender
    type: ddl
    optional_values:
    - No Action
    - Block Sender
    description: Provide the type of response that will be associated with the created
        policy.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Description for the policy.
    is_mandatory: true
-   name: Extracted Data
    default_value: Both
    type: ddl
    optional_values:
    - Both
    - From Envelope
    - From Headers
    description: Define from where the information about sender and recipient should
        be extracted.
    is_mandatory: false
-   name: Sender
    default_value: ''
    type: string
    description: 'From whom the message should be sent for it to be blocked. Only
        needed if “Sender Type” is one of: Email Domain, Email Address, Header Display
        Name. This parameter is ignored if a different  “From Type” value is selected.'
    is_mandatory: false
-   name: Sender Type
    default_value: Email Domain
    type: ddl
    optional_values:
    - Everyone
    - Email Address
    - Email Domain
    - Header Display Name
    - Internal Addresses
    - External Addresses
    description: Type of the sender for the policy.
    is_mandatory: false
-   name: Recipient
    default_value: ''
    type: string
    description: 'To whom the message should be sent for it to be blocked. Only needed
        if “Recipient Type” is one of: Email Domain, Email Address, Header Display
        Name. This parameter is ignored if a different  “Recipient Type” value is
        selected.'
    is_mandatory: false
-   name: Recipient Type
    default_value: Email Domain
    type: ddl
    optional_values:
    - Everyone
    - Email Address
    - Email Domain
    - Header Display Name
    - Internal Addresses
    - External Addresses
    description: Type of the recipient for the policy.
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: Comment for a policy.
    is_mandatory: false
-   name: Bidirectional
    default_value: true
    type: boolean
    description: If enabled, the policy will be defined in a bidirectional way.
    is_mandatory: false
-   name: Enforced
    default_value: true
    type: boolean
    description: If enabled, the policy is enforced.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Start time for the policy. If nothing is provided, start time will
        be set to eternal. Expects ISO 8601 format. Example: 2025-03-07T16:03:00Z'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'End time for the policy. If nothing is provided, end time will be
        set to eternal. Expects ISO 8601 format. Example: 2025-03-07T16:03:00Z'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_block_sender_policy_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
