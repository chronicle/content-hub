name: Simple Archive Search
description: 'Search archive emails using defined parameters in Mimecast. Note: when
    providing time make sure to take in the account timezones. For ease of use, Siemplify
    instance and Mimecast instance should be in the same timezone.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mimecast#simple_archive_search
integration_identifier: Mimecast
parameters:
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify a comma-separated list of fields that needs to be returned.
    is_mandatory: true
-   name: Mailboxes
    default_value: ''
    type: string
    description: Specify a comma-separated list of mailboxes that need to be searched.
    is_mandatory: false
-   name: From
    default_value: ''
    type: string
    description: Specify a comma-separated list of email addresses from which the
        emails were sent.
    is_mandatory: false
-   name: To
    default_value: ''
    type: string
    description: Specify a comma-separated list of email addresses to which the emails
        were sent.
    is_mandatory: false
-   name: Subject
    default_value: ''
    type: string
    description: Specify a subject that needs to be searched.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the search. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: true
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the search. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the search. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Max Emails To Return
    default_value: '50'
    type: string
    description: 'Specify how many emails to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/simple_archive_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
