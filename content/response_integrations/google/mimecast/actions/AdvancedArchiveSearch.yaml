name: Advanced Archive Search
description: 'Search archive emails using a custom XML query in Mimecast. Note: when
    providing time make sure to take in the account timezones. For ease of use, Siemplify
    instance and Mimecast instance should be in the same timezone.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mimecast#advanced_archive_search
integration_identifier: Mimecast
parameters:
-   name: XML Query
    default_value: ''
    type: string
    description: Specify an XML query that should be used when searching for archive
        emails. Please visit documentation for more details.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/advanced_archive_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
