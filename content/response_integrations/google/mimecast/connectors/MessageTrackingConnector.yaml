name: Mimecast - Message Tracking Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https:/{{api root}}
    type: string
    description: API root of the Mimecast instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Application ID
    default_value: ''
    type: string
    description: Application ID of the Mimecast instance. You need to provide "Application
        ID", "Application Key", "Access Key" and "Secret Key" for the authentication
        to work.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Application Key
    default_value: ''
    type: password
    description: Application Key of the Mimecast instance. You need to provide "Application
        ID", "Application Key", "Access Key" and "Secret Key" for the authentication
        to work.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Access Key
    default_value: ''
    type: password
    description: Access Key of the Mimecast instance.  You need to provide "Application
        ID", "Application Key", "Access Key" and "Secret Key" for the authentication
        to work.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Secret Key
    default_value: ''
    type: password
    description: Secret Key of the Mimecast instance.  You need to provide "Application
        ID", "Application Key", "Access Key" and "Secret Key" for the authentication
        to work.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client ID of the Mimecast instance. You need to provide "Client ID"
        and "Client Secret" for the authentication to work.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Client Secret of the Mimecast instance. You need to provide "Client
        ID" and "Client Secret" for the authentication to work.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Mimecast server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Domains
    default_value: ''
    type: string
    description: A comma-separated list of domains for which to query messages.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Risk To Fetch
    default_value: ''
    type: string
    description: 'Lowest risk that will be used to fetch messages. Possible values:
        Negligible, Low, Medium, High. If nothing is provided, the connector will
        ingest all messages.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Status Filter
    default_value: held
    type: string
    description: 'A comma-separated list of status filters for the messages. Possible
        values: delivery, held, accepted, bounced, deferred, rejected, archived. If
        nothing is provided, the connector will ingest all messages.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Route Filter
    default_value: ''
    type: string
    description: 'A comma-separated route filters for the messages. Possible values:
        internal, outbound, inbound. If nothing is provided, the connector will ingest
        all messages.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Queue Reason Filter
    default_value: ''
    type: string
    description: A comma-separated list of queue reasons that should filter the messages.
        If nothing is provided, this filter is ignored.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Ingest Messages Without Risk
    default_value: true
    type: boolean
    description: If enabled, the connector will ingest messages even if there is no
        info about risk. Siemplify Alerts generated from those messages will have
        priority set to Informational.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: 'Number of hours before the first connector iteration to retrieve
        messages from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector''s last run timestamp expires. Default: 1 hour. Max:
        30 days.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Messages To Return
    default_value: 20
    type: integer
    description: 'How many messages to process per one connector iteration. Default:
        100.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Pull information about messages from the "Message Tracking" tab in Mimecast.
    Note: whitelist works on the "queueDetailStatus/bounceType" parameter.'
integration: Mimecast
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mimecast#mimecast-message-tracking-connector
rules: []
is_connector_rules_supported: false
creator: admin
