Create Block Sender Policy:
  ai_description: >-
    Creates a Block Sender policy in Mimecast to manage and restrict email traffic
    between specific senders and recipients. This action allows security administrators
    to define granular blocking rules based on email addresses, domains, or header
    display names.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves configuration parameters including
    the policy description, sender/recipient details, and enforcement settings.

    2. **Validation:** It validates the input parameters, ensuring that mandatory
    fields like 'Description' are present and that 'Sender' or 'Recipient' values
    are provided and correctly formatted (e.g., email validation) when specific types
    are selected.

    3. **Payload Construction:** It constructs a JSON payload for the Mimecast API,
    mapping the SOAR parameters to the Mimecast policy structure, including time-range
    settings (Start/End Time) and bidirectional flags.

    4. **API Execution:** The action sends a POST request to the Mimecast endpoint
    `/api/policy/blockedsenders/create-policy` using the configured authentication
    (OAuth or legacy HMAC).

    5. **Result Processing:** Upon success, the action returns the details of the
    newly created policy as JSON results.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Response | String (DDL) | No | The response type for the policy: 'Block Sender'
    or 'No Action'. Default is 'Block Sender'. |

    | Description | String | Yes | A descriptive name or summary for the policy. |

    | Extracted Data | String (DDL) | No | Source for sender/recipient info: 'Both',
    'From Envelope', or 'From Headers'. |

    | Sender | String | No | The sender identifier (email, domain, etc.). Required
    if 'Sender Type' is not 'Everyone', 'Internal Addresses', or 'External Addresses'.
    |

    | Sender Type | String (DDL) | No | The category of the sender (e.g., 'Email Domain',
    'Email Address'). |

    | Recipient | String | No | The recipient identifier. Required if 'Recipient Type'
    is not 'Everyone', 'Internal Addresses', or 'External Addresses'. |

    | Recipient Type | String (DDL) | No | The category of the recipient (e.g., 'Email
    Domain', 'Email Address'). |

    | Comment | String | No | An optional internal comment for the policy. |

    | Bidirectional | Boolean | No | If true, the policy applies to traffic in both
    directions. |

    | Enforced | Boolean | No | If true, the policy is actively enforced by Mimecast.
    |

    | Start Time | String | No | ISO 8601 start time. If empty, the policy is set
    to 'eternal'. |

    | End Time | String | No | ISO 8601 end time. If empty, the policy is set to 'eternal'.
    |


    ### Additional Notes:

    - Either a specific 'Sender' or 'Recipient' must be provided depending on the
    selected 'Sender Type' or 'Recipient Type'. If the type is 'Email Address', 'Email
    Domain', or 'Header Display Name', the corresponding identifier parameter becomes
    effectively mandatory.
