Block Sender:
  ai_description: >-
    ### General Description

    The **Block Sender** action is designed to block a specific sender's email address
    for a designated recipient within the Mimecast platform. This is a containment
    action used to prevent further unwanted or malicious communication from reaching
    a specific user by adding the sender to Mimecast's managed sender list with a
    'block' status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Sender** | String | Yes | The email address of the sender that you want to
    block. |

    | **Recipient** | String | Yes | The email address of the internal recipient for
    whom the sender should be blocked. |


    ### Flow Description

    1.  **Parameter Initialization**: The action retrieves the `Sender` and `Recipient`
    email addresses from the action parameters.

    2.  **Manager Setup**: It initializes the `MimecastManager` using the integration's
    configuration (API keys, secrets, etc.).

    3.  **API Interaction**: The action calls the `manage_sender` method in the manager,
    which sends a POST request to Mimecast's `/api/managedsender/permit-or-block-sender`
    endpoint with the action set to `block`.

    4.  **Execution Result**: If the API call is successful, the action completes
    with a success message. If an error occurs (e.g., authentication failure or API
    error), it logs the error and marks the execution as failed.


    ### Additional Notes

    This action does not automatically process entities from the Google SecOps case;
    it requires the sender and recipient to be explicitly provided as parameters.
    It performs a state-changing operation in the external Mimecast environment.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action adds a sender to the Mimecast managed sender list with a 'block'
      status for a specific recipient, effectively changing the mail flow policy for
      those addresses in the external Mimecast system.
