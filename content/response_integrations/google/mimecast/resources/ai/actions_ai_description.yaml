Report Message:
  ai_description: >-
    Reports a specific email message to Mimecast for security analysis. This action
    is primarily used to flag messages that have already been processed (e.g., Held,
    Archived, or Bounced) as potentially malicious or unwanted. By reporting a message,
    users can help improve Mimecast's filtering accuracy by categorizing the threat
    as Spam, Malware, or Phishing.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message ID | String | Yes | The unique identifier of the message in Mimecast
    that needs to be reported. |

    | Comment | String | No | An optional text comment to provide additional context
    for the report. |

    | Report As | String | No | The classification for the report. Valid values are
    'Spam', 'Malware', or 'Phishing'. Defaults to 'Spam'. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the 'Message ID', 'Comment',
    and 'Report As' classification from the input parameters.

    2. **Manager Initialization:** It initializes the Mimecast Manager using the integration's
    API credentials (API Root, App ID, App Key, etc.).

    3. **API Interaction:** The action calls the Mimecast API endpoint `/api/message-finder/report-message`.
    It maps the 'Report As' parameter to the internal Mimecast types (spam, malware,
    or phishing) and sends the request with the provided Message ID and optional comment.

    4. **Outcome Reporting:** The action validates the API response. If successful,
    it returns a completion message; otherwise, it logs the error and fails the action.


    ### Additional Notes

    * This action is marked as **Deprecated** in the integration metadata.

    * It does not operate on SOAR entities (like IP or FileHash) but instead requires
    a specific Mimecast Message ID as input.
