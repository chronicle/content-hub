Simple Archive Search:
  ai_description: >-
    ### General Description

    Search archive emails using defined parameters in Mimecast. This action allows
    users to query the Mimecast archive for specific emails based on sender, recipient,
    subject, and time range.


    ### Flow Description

    1. Extract the action parameters including fields to return, mailboxes, sender/recipient
    addresses, subject, and time frame.

    2. Calculate the start and end timestamps based on the selected time frame.

    3. Construct an XML query using the provided search criteria.

    4. Execute the query against the Mimecast Archive Search API with pagination to
    retrieve the matching emails.

    5. Format the retrieved emails into a JSON result and a CSV data table named 'Results'.


    ### Additional Notes

    When providing time, ensure timezones are accounted for. Ideally, the Siemplify
    and Mimecast instances should be in the same timezone. If 'Custom' is selected
    for 'Time Frame', 'Start Time' must be provided.
