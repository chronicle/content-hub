Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Mimecast server using the credentials and configuration
    provided in the integration settings. This action ensures that the SOAR platform
    can successfully communicate with the Mimecast API.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | --------- | ----------- | ---- | --------- |

    | N/A | This action does not require any input parameters. | N/A | N/A |


    ### Flow Description

    1. **Parameter Initialization**: Retrieves the integration configuration parameters
    including API Root, Application ID/Key, Access/Secret Keys, or Client ID/Secret
    for OAuth2, and SSL verification settings.

    2. **Manager Setup**: Initializes the `MimecastManager` which validates the authentication
    method (Legacy HMAC or OAuth2) and prepares the request session.

    3. **Connectivity Test**: Executes a POST request to the `/api/account/get-account`
    endpoint to verify that the provided credentials are valid and the server is reachable.

    4. **Result Reporting**: Returns a success message if the API responds with a
    valid account status, or a failure message with specific error details if the
    connection or authentication fails.


    ### Additional Notes

    This action does not process any entities and is primarily used for troubleshooting
    and initial setup verification. As a 'Ping' action, it is excluded from enrichment
    categorization.
