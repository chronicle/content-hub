Advanced Archive Search:
  ai_description: >-
    ### General Description

    Searches for archived emails in Mimecast using a custom XML query. This action
    allows for advanced investigations by enabling users to define complex search
    criteria through Mimecast's XML query language, retrieving detailed metadata and
    content for matching archived messages.


    ### Flow Description

    1. Initializes the Mimecast API manager using the integration's configuration
    parameters.

    2. Extracts the mandatory `XML Query` parameter provided by the user.

    3. Calls the Mimecast `/api/archive/search` endpoint with the XML query to retrieve
    matching archived emails.

    4. Converts the retrieved email objects into JSON format and flattens them for
    a data table display.

    5. Populates the action results with the JSON data and the Results data table,
    then ends the action with a success message.


    ### Additional Notes

    - Users should ensure that the timezones of the Google SecOps instance and the
    Mimecast instance are synchronized for accurate time-based filtering within the
    XML query.

    - This action does not process specific entities from the case; it performs a
    broad search based solely on the provided XML input.
