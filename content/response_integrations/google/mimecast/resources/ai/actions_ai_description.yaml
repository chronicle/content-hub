Reject Message:
  ai_description: >-
    ### General Description

    Rejects a held email message in Mimecast. This action processes messages that
    are currently in a 'Held' status within the Mimecast gateway. By rejecting a message,
    it is removed from the hold queue, and depending on the configuration, the sender
    can be notified of the rejection.


    ### Flow Description

    1. Retrieves the mandatory 'Message ID' and optional parameters ('Note', 'Reason',
    'Notify Sender') from the action configuration.

    2. Initializes the Mimecast Manager using the integration's authentication parameters.

    3. Sends a POST request to the Mimecast API (`/api/message-finder/reject-held-email`
    or `/api/gateway/hold-reject` depending on the authentication method) to reject
    the specified message.

    4. Validates the API response to ensure the message was successfully rejected.

    5. Returns a success or failure message to the Google SecOps environment.


    ### Additional Notes

    Only messages with a status of "Held" can be rejected using this action.
