Simple Archive Search:
  ai_description: >-
    ### General Description: Search archive emails using defined parameters in Mimecast.
    This action allows users to query the Mimecast archive for specific emails based
    on sender, recipient, subject, and time range. ### Parameters: 1. Fields To Return
    (Mandatory): Comma-separated list of fields to be returned in the results. 2.
    Mailboxes (Optional): Comma-separated list of mailboxes to be searched. 3. From
    (Optional): Comma-separated list of sender email addresses. 4. To (Optional):
    Comma-separated list of recipient email addresses. 5. Subject (Optional): Subject
    string to search for. 6. Time Frame (Mandatory): Time frame for the search (e.g.,
    Last Hour, Custom). 7. Start Time (Optional): Start time for the search (ISO 8601).
    Mandatory if Time Frame is 'Custom'. 8. End Time (Optional): End time for the
    search (ISO 8601). 9. Max Emails To Return (Optional): Maximum number of emails
    to return (Default: 50). ### Additional Notes: When providing time, ensure timezones
    are accounted for. Ideally, the Siemplify and Mimecast instances should be in
    the same timezone. If 'Custom' is selected for 'Time Frame', 'Start Time' must
    be provided. ### Flow Description: 1. Parameter Extraction: The action retrieves
    all input parameters and validates the 'Max Emails To Return' value. 2. Time Range
    Calculation: It determines the start and end timestamps based on the 'Time Frame'
    and optional 'Start/End Time' parameters. 3. Query Construction: An XML query
    is built using the provided fields, mailboxes, addresses, and subject. 4. Execution:
    The action calls the Mimecast Archive Search API with pagination to retrieve the
    emails. 5. Output Generation: Found emails are formatted into a JSON result and
    a CSV data table named 'Results'.
