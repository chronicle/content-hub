Advanced Archive Search:
  ai_description: >-
    ### General Description\nSearches for archived emails in Mimecast using a custom
    XML query. This action allows for advanced investigations by enabling users to
    define complex search criteria through Mimecast's XML query language, retrieving
    detailed metadata and content for matching archived messages.\n\n### Parameters
    Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| XML Query | String | Yes | The XML-formatted query string used to
    define the search criteria in Mimecast. |\n\n### Additional Notes\n- Users should
    ensure that the timezones of the Google SecOps instance and the Mimecast instance
    are synchronized for accurate time-based filtering within the XML query.\n- This
    action does not process specific entities from the case; it performs a broad search
    based solely on the provided XML input.\n\n### Flow Description\n1. **Setup**:
    Initializes the Mimecast API manager using the integration's configuration parameters
    (API Root, App ID/Key, or Client ID/Secret).\n2. **Input Retrieval**: Extracts
    the mandatory XML Query provided by the user.\n3. **Search Execution**: Calls
    the Mimecast /api/archive/search endpoint with the XML query to retrieve matching
    archived emails.\n4. **Data Transformation**: Converts the retrieved email objects
    into JSON format and flattens them for a data table display.\n5. **Completion**:
    Populates the action results with the JSON data and the Results data table, then
    ends the action with a success message.
  capabilities:
