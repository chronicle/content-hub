Reject Message:
  ai_description: >-
    Rejects a held email message in Mimecast. This action is specifically designed
    to process messages that are currently in a 'Held' status within the Mimecast
    gateway. By rejecting a message, it is removed from the hold queue, and depending
    on the configuration, the sender can be notified of the rejection.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message ID | String | Yes | The unique identifier of the message that needs
    to be rejected. |

    | Note | String | No | An additional explanation or note regarding why the message
    was rejected. |

    | Reason | String (Dropdown) | No | The specific reason for rejection. Options
    include: 'Inappropriate Communication', 'Confidential Information', 'Restricted
    Content', or 'Against Email Policy'. |

    | Notify Sender | Boolean | No | If set to true, the action will trigger a notification
    to the sender informing them of the rejection. Default is false. |


    ### Flow Description


    1. **Parameter Initialization**: The action retrieves the mandatory 'Message ID'
    and optional parameters ('Note', 'Reason', 'Notify Sender') from the input.

    2. **Manager Setup**: It initializes the Mimecast Manager using the integration's
    configuration (API Root, Credentials, etc.).

    3. **API Selection**: The action determines the correct API endpoint based on
    the authentication method used (Legacy API vs. OAuth).

    4. **Rejection Execution**: It sends a POST request to Mimecast to reject the
    specified message, including the provided notes and reason.

    5. **Result Handling**: The action validates the API response to ensure the message
    was successfully rejected and returns a success or failure message to the Google
    SecOps environment.
