Release Message:
  ai_description: >-
    ### General Description

    Releases a held email message in the Mimecast environment. This action is specifically
    designed to handle messages that have been placed in a 'Held' status by Mimecast
    security policies, allowing an analyst to deliver them to the intended recipient
    or move them to a sandbox for inspection.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Message ID | String | Yes | The unique identifier of the Mimecast message to
    be released. |

    | Release To Sandbox | Boolean | No | If set to `True`, the message will be released
    to the Mimecast sandbox environment instead of the recipient's inbox. Defaults
    to `False`. |


    ### Flow Description

    1. **Initialization**: The action extracts the `Message ID` and `Release To Sandbox`
    parameters from the input.

    2. **Authentication**: It initializes the Mimecast API manager, supporting both
    legacy HMAC-SHA1 and modern OAuth2 authentication methods.

    3. **Execution**: Based on the `Release To Sandbox` toggle, the action calls the
    appropriate Mimecast API endpoint (`/api/gateway/hold-release` or legacy equivalents)
    to release the message.

    4. **Verification**: The action validates the API response to ensure the message
    was successfully released. For modern authentication, it explicitly checks the
    `release` status in the response data.

    5. **Finalization**: The action concludes with a success message confirming the
    release or fails with an error if the operation was unsuccessful.


    ### Additional Notes

    - Only messages with the status 'Held' can be released using this action.

    - This action does not process or iterate over Google SecOps entities; it operates
    directly on the provided Message ID.
