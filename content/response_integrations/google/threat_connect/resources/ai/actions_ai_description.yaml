Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP addresses, hostnames, URLs, and file hashes using threat intelligence
    from ThreatConnect. This action retrieves detailed indicator information, including
    threat ratings, confidence scores, and associated tags, to provide context for
    security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Owner Name | String | No | The specific ThreatConnect owner(s) to fetch data
    from. This parameter accepts a single owner name or a comma-separated list of
    names. If left empty, the action will attempt to fetch data from all available
    owners associated with the indicator. |


    ### Additional Notes

    - The action automatically marks an entity as **suspicious** if the ThreatConnect
    `threatAssessRating` is greater than 1.

    - Enrichment data is added to the entity's additional properties with the prefix
    `TC`.

    - A direct web link to the ThreatConnect indicator page is added to each enriched
    entity for quick pivoting.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and configuration from the integration
    settings and extracts the optional `Owner Name` parameter.

    2. **Entity Iteration**: Processes each target entity in the current context,
    specifically looking for IP Addresses, Hostnames, URLs, and File Hashes.

    3. **Data Retrieval**: For each supported entity, it queries the ThreatConnect
    API for indicator information. If specific owners are provided, it queries those;
    otherwise, it fetches data from all available owners.

    4. **Entity Enrichment**: If data is found, the action:
        - Adds a direct URL link to the ThreatConnect portal to the entity.
        - Updates the entity's suspicious status based on the threat rating.
        - Flattens and attaches the full indicator report to the entity's additional
    properties.
        - Sets the `is_enriched` flag to true.
    5. **Insight Generation**: Creates a detailed insight for the entity containing
    the threat assessment rating, confidence level, description, and associated tags.

    6. **Finalization**: Updates all modified entities within Google SecOps and returns
    a comprehensive JSON result containing the raw data for all enriched entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (is_suspicious, is_enriched, additional_properties),
      adds external entity links, and creates entity insights within the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - FILEHASH
    - DestinationURL
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and a ThreatConnect\
    \ instance. Its primary purpose is to validate that the integration's configuration\
    \ parameters\u2014such as API credentials and the base URL\u2014are correct and\
    \ that the ThreatConnect service is reachable and responding to requests.\n\n\
    ### Parameters Description\nThis action does not have any action-specific parameters.\
    \ It utilizes the following integration-level configuration parameters:\n\n| Parameter\
    \ | Description | Type | Mandatory |\n| :--- | :--- | :--- | :--- |\n| ApiAccessId\
    \ | The Access ID used for authenticating with the ThreatConnect API. | String\
    \ | Yes |\n| ApiSecretKey | The Secret Key used for authenticating with the ThreatConnect\
    \ API. | String | Yes |\n| ApiDefaultOrg | The default organization name within\
    \ ThreatConnect to be used for the session. | String | Yes |\n| ApiBaseUrl | The\
    \ base URL (endpoint) of the ThreatConnect instance. | String | Yes |\n\n### Additional\
    \ Notes\n- This action does not interact with or process any entities (IPs, Domains,\
    \ etc.).\n- It is strictly used for testing the health of the integration connection.\n\
    \n### Flow Description\n1. **Initialization**: The action retrieves the necessary\
    \ authentication and connection details (Access ID, Secret Key, Default Org, and\
    \ Base URL) from the integration configuration.\n2. **Manager Setup**: It initializes\
    \ the `ThreatconnectAPI` manager with the provided credentials and configures\
    \ proxy settings if necessary.\n3. **Connectivity Check**: The action executes\
    \ the `test_connectivity` method, which performs a `GET` request to the `/v2/groups`\
    \ endpoint of the ThreatConnect API.\n4. **Outcome Evaluation**: \n    - If the\
    \ API returns a valid response, the action concludes with a \"Connection Established\"\
    \ message and a result value of `true`.\n    - If the API call fails or returns\
    \ an error, the action concludes with a \"Connection Failed\" message and a result\
    \ value of `false`."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
