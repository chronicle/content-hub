name: Get System Information
description: 'Return system information about the endpoints from McAfee ePO. Supported
    entities: Hostname, IP.'
integration_identifier: McAfeeEPO
parameters:
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing information
        about the endpoint.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_system_information_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
