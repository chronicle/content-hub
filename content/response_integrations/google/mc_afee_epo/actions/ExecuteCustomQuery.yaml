name: Execute Custom Query
description: Execute a custom query in McAfee ePO.
integration_identifier: McAfeeEPO
parameters:
-   name: Table Name
    default_value: ''
    type: string
    description: Specify the name of the table from which you want to fetch results.
    is_mandatory: true
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If nothing is specified action will
        return all available fields.
    is_mandatory: false
-   name: Where Clause
    default_value: ''
    type: string
    description: Specify the where clause for the query. For more information please
        refer to the documentation portal.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify what field should be used for ordering of the results.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify what sort order should be applied to the query.
    is_mandatory: false
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_custom_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
