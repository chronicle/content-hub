name: Execute Query By ID
description: Execute a query in McAfee ePO using query id.
integration_identifier: McAfeeEPO
parameters:
-   name: Query ID
    default_value: ''
    type: string
    description: Specify the id of the query that needs to be executed.
    is_mandatory: true
-   name: Max Results To Return
    default_value: '50'
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_query_by_id_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
