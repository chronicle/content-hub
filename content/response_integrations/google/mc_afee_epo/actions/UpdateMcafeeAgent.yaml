name: Update Mcafee Agent
description: 'Update McAfee Agent on the provided endpoints in McAfee ePO. Task for
    Windows: DAT_Update_Windows_CWS. Task for Linux: DAT_Update_Linux_CWS. Supported
    entities: Hostname, IP.'
integration_identifier: McAfeeEPO
parameters:
-   name: Task Name
    default_value: DAT_Update_Windows_CWS
    type: string
    description: Specify what task should be executed in order to update the McAfee
        Agent. Default for Windows is DAT_Update_Windows_CWS. For Linux it’s DAT_Update_Linux_CWS
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/update_mcafee_agent_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
script_result_name: Update_Status
