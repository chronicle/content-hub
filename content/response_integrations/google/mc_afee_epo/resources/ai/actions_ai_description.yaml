Compare Server and Agent DAT:
  ai_description: >-
    ### General Description

    This action retrieves and compares the server and agent DAT (antivirus signature)
    versions for specified endpoints in McAfee ePO. It helps analysts determine if
    an endpoint's antivirus definitions are up-to-date with the server.


    ### Flow Description

    1. Filters the target entities to include only internal IP Address and Hostname
    entities.

    2. Iterates over the suitable entities and queries the McAfee ePO API to retrieve
    the agent DAT version for each endpoint.

    3. Queries the McAfee ePO API to retrieve the current server DAT version.

    4. Compares the agent DAT version with the server DAT version to determine if
    they match.

    5. Attaches the comparison results to the case as an entity table and a JSON result.


    ### Additional Notes

    - Supported entity types are IP Address and Hostname.

    - The action only processes entities that are marked as internal.
