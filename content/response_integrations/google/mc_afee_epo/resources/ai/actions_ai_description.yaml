Compare Server and Agent DAT:
  ai_description: >-
    ### General Description

    Compares the DAT version of the McAfee agent on an endpoint with the server's
    DAT version in McAfee ePO. This action helps identify endpoints that are out-of-date
    by retrieving and comparing version information.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Credentials, etc.) from
    the integration settings.

    2. Initializes the McAfee ePO manager to establish a connection.

    3. Filters target entities (Hostname/IP) to include only internal ones.

    4. Retrieves system data from the specified group.

    5. For each entity, identifies the corresponding system, retrieves the agent's
    DAT version, and fetches the server's DAT version.

    6. Compares the versions and adds the results to an entity table and a JSON result
    object.


    ### Additional Notes

    Requires valid McAfee ePO credentials and connectivity to the ePO server. The
    action does not modify any data on the ePO server.
