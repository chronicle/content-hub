Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a custom query against a specified table in McAfee ePO using entity data
    as filter criteria. This action allows analysts to search for events or system
    information by mapping entities (IP, Host, User, Hash, URL) to specific query
    fields, enabling targeted investigations within the McAfee ePO environment.


    ### Flow Description

    1. **Initialization**: The action initializes the McAfee ePO manager using the
    provided server address, credentials, and SSL verification settings.

    2. **Parameter Extraction**: It extracts action parameters, including the target
    table name, sorting preferences, time range, and entity-to-field mappings.

    3. **Entity Processing**: The action iterates through the `target_entities` provided
    in the case, filtering for supported types (IP, Hostname, User, File Hash, URL).

    4. **Query Construction**: It maps the identified entities to their respective
    query keys and constructs the "Where" clause based on the selected `Cross Entity
    Operator` (AND/OR).

    5. **Execution**: The action executes the query against the McAfee ePO database
    via the `McafeeEpoManager`.

    6. **Result Handling**: Retrieved results are formatted into JSON and CSV, added
    to the action results, and displayed in a data table.


    ### Additional Notes

    - If "Custom" is selected for the "Time Frame" parameter, the "Start Time" parameter
    becomes mandatory.

    - The "Stop If Not Enough Entities" parameter, when enabled, prevents query execution
    if the required entity types for the specified keys are missing from the case.

    - The action supports mapping specific entity types to custom fields in the McAfee
    ePO database using the provided ".. Entity Key" parameters.
