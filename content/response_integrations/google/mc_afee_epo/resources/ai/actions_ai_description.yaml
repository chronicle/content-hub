Add Tag:
  ai_description: >-
    ### General Description

    Adds a specified tag to endpoints in McAfee ePO. This action allows security analysts
    to categorize or label endpoints directly from the SecOps platform, facilitating
    better organization and management of assets within the McAfee ePO environment.


    ### Flow Description

    1. Extracts configuration parameters (ePO server address, credentials, and SSL
    settings).

    2. Extracts the `Tag Name` parameter from the action configuration.

    3. Filters target entities to include only `HOSTNAME` and `ADDRESS` types.

    4. Initializes the `McafeeEpoManager` to establish a connection to the McAfee
    ePO server.

    5. For each valid entity, retrieves system information from McAfee ePO to identify
    the corresponding endpoint.

    6. Applies the specified tag to the endpoint using the `system.applyTag` API call
    (either by host ID or host name).

    7. Aggregates the results (success, failure, or ignored) and returns a summary
    message.


    ### Additional Notes

    This action requires valid credentials with appropriate permissions in McAfee
    ePO. The tag specified must already exist in the McAfee ePO system; otherwise,
    the action will fail to apply the tag.
  ai_short_description: >-
    Adds a specified tag to endpoints in McAfee ePO.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Applies a tag to an endpoint in McAfee ePO.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches system information from McAfee ePO (`get_system_info_or_raise`)
      to identify the endpoint, so `fetches_data` is true. The action applies a tag
      to the endpoint in McAfee ePO (`apply_tag_to_endpoint_by_host_id` / `apply_tag_to_endpoint_by_host_name`),
      which is a state change on an external system, so `can_mutate_external_data`
      is true. It does not mutate internal data, update entities, create insights,
      modify alert data, or create case comments.
