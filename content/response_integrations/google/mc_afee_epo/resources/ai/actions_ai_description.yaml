    Retrieves information about events related to MD5 hashes from McAfee ePO. The
    action queries the VSECustomEvent and optionally the EPExtendedEvent tables to
    find historical events associated with the provided file hashes. It can also mark
    the hashes as suspicious and create insights based on the findings.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Fetch Events From EPExtendedEvent Table | Boolean | Yes | If enabled, the action
    will also query the EPExtendedEvent table to find information about hashes. |

    | Mark As Suspicious | Boolean | No | If enabled, the action will mark all hashes
    for which events were found as suspicious. |

