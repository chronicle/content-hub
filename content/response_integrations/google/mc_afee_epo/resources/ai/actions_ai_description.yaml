Add Tag:
  ai_description: >-
    ### General Description

    Adds a specific tag to endpoint entities (Hostname, IP Address) in McAfee ePO.
    This action allows analysts to categorize or mark endpoints directly within the
    McAfee ePO console.


    ### Flow Description

    1. Establishes a connection to the McAfee ePO API.

    2. Iterates over the target entities, filtering for Hostname and IP Address types.

    3. Retrieves system information for each valid entity using the `system.find`
    API endpoint to ensure the endpoint exists.

    4. Applies the specified tag to the endpoint using the `system.applyTag` API endpoint.
    If a group is configured, it applies the tag by host ID; otherwise, it applies
    it by host name.

    5. Compiles and returns a summary of successfully tagged, ignored (already tagged),
    and failed endpoints.


    ### Additional Notes

    You can only apply tags that already exist in the McAfee ePO system.
  ai_short_description: >-
    Adds a specified tag to Hostname and IP Address endpoint entities in McAfee ePO.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Applies a specified tag to an endpoint in McAfee ePO.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches system information from McAfee ePO to verify the endpoint
      exists (fetches_data=true). It then makes an API request to apply a tag to the
      endpoint in McAfee ePO (can_mutate_external_data=true). It does not mutate internal
      SOAR data, update entities, create insights, or add case comments.
