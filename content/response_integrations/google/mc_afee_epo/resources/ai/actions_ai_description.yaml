Get Events For Hash:
  ai_description: >-
    ### General Description

    Retrieves event information from McAfee ePO for specified file hashes. This action
    queries the McAfee ePO database to find threat events associated with the provided
    MD5 hashes, allowing analysts to investigate the context and prevalence of malicious
    files within their environment.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API credentials, server
    address, SSL verification) and action parameters (time frame, fields to return,
    etc.).

    2. **Time Range Calculation**: Calculates the start and end timestamps for the
    query based on the selected 'Time Frame' (e.g., Last Hour, Last 24 Hours) or custom
    provided dates.

    3. **Connection**: Initializes the `McafeeEpoManager` to establish a connection
    with the McAfee ePO server.

    4. **Entity Filtering**: Filters the target entities to process only those of
    type `FILEHASH`.

    5. **Data Retrieval**: Executes queries against the McAfee ePO database using
    `get_events_by_hash_with_vse_query` and, if enabled, `get_events_by_hash_with_epe_query`
    to fetch relevant event data.

    6. **Processing**: Iterates through the retrieved events. If 'Create Insight'
    is enabled, it adds an insight to the entity. If 'Mark As Suspicious' is enabled,
    it updates the entity's suspicious status.

    7. **Result Output**: Updates the modified entities in the SOAR platform, adds
    the results to the action's JSON output, and generates entity tables for each
    hash.


    ### Additional Notes

    - Only MD5 hashes are supported for this action.

    - If 'Custom' time frame is selected, both 'Start Time' and 'End Time' (or current
    time) must be provided in ISO 8601 format.
