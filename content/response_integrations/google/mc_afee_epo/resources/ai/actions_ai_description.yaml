Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specified tag from endpoints in McAfee ePO. This action allows security
    analysts to manage endpoint tags directly from the SOAR platform, facilitating
    automated cleanup or policy management.


    ### Flow Description

    1. Extracts configuration parameters (ePO server address, credentials, SSL settings)
    and the `Tag Name` parameter.

    2. Filters target entities to include only `HOSTNAME` and `ADDRESS` types.

    3. Initializes the `McafeeEpoManager` to establish a connection to the ePO server.

    4. For each valid entity, retrieves system information from ePO using `manager.get_system_info_or_raise`.

    5. If a group is configured, identifies the system within that group and removes
    the tag using the host ID via `manager.clear_tag_from_endpoint_by_host_id`.

    6. If no group is configured, removes the tag using the host name via `manager.clear_tag_from_endpoint_by_host_name`.

    7. Updates the action result with success, failure, or ignored status for each
    entity.


    ### Additional Notes

