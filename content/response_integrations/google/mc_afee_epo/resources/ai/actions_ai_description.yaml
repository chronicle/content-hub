Get Agent Information:
  ai_description: >-
    ### General Description

    Retrieves information about endpoint agents from McAfee ePO. This action fetches
    contextual metadata for Hostname and IP Address entities and enriches them within
    the platform.


    ### Flow Description

    1. Initializes the McAfee ePO manager with the provided integration credentials.

    2. Iterates over the target entities, filtering for supported types (Hostname
    and IP Address).

    3. For each suitable entity, makes an API call to McAfee ePO (`manager.get_system_info`)
    to retrieve system and agent information.

    4. Extracts the agent information and updates the entity's additional properties
    with the enrichment data.

    5. Marks the entity as enriched and adds the agent information to the action's
    JSON result and entity table.

    6. Updates the enriched entities in the SecOps platform.


    ### Additional Notes

    Supported entity types are Hostname and IP Address.
  ai_short_description: >-
    Retrieves information about endpoint agents from McAfee ePO for Hostname and IP
    Address entities.
