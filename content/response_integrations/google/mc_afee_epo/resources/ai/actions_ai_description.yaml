    1. Filters the target entities to include only IP Addresses and Hostnames.

    2. Retrieves the specified client task details from McAfee ePO using the provided
    task name.

    3. Iterates through the valid entities and retrieves their system information
    from McAfee ePO to verify their existence and obtain necessary internal IDs.

    4. Triggers the full scan task on each endpoint via the McAfee ePO API (`clienttask.run`).

