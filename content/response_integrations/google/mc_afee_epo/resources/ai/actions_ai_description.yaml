    If left empty, all available fields are returned. |

    | Sort Field | String | No | Specifies the field to be used for ordering the results.
    |

    | Sort Order | Dropdown | No | Specifies the sort order (ASC or DESC) to be applied
    to the query. |

    | Time Frame | Dropdown | No | Specifies a time frame for the events. If "Custom"
    is selected, the "Start Time" parameter must be provided. |

    | Start Time | String | No | Specifies the start time for the events in ISO 8601
    format. Mandatory if "Custom" is selected for the "Time Frame" parameter. |

    | End Time | String | No | Specifies the end time for the events in ISO 8601 format.
    If not provided and "Custom" is selected for the "Time Frame", the current time
    is used. |

    | Max Events To Return | String | No | Specifies the maximum number of events
    to return per queried table. Default is 50. |


