  ai_description: >-
    ### General Description

    The `Get Agent Information` action retrieves detailed agent information about
    endpoint entities (Hostname and IP Address) from McAfee ePO. It enriches the entities
    within Google SecOps with the retrieved agent data and provides the results in
    JSON and table formats.


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | ServerAddress | Yes | String | The URL of the McAfee ePO server. |

    | Username | Yes | String | The username to authenticate with McAfee ePO. |

    | Password | Yes | String | The password to authenticate with McAfee ePO. |

    | GroupName | No | String | The name of the group in McAfee ePO to filter the
    systems. |

    | CA Certificate File - parsed into Base64 String | No | String | The CA certificate
    file parsed into a Base64 string for SSL verification. |

    | Verify SSL | Yes | Boolean | Whether to verify the SSL certificate for the connection.
    |


    ### Flow Description

    1.  **Initialization:** The action establishes a connection to the McAfee ePO
    server using the provided credentials and SSL settings.

    2.  **Entity Filtering:** It filters the target entities in the case, selecting
    only those of type `ADDRESS` (IP) and `HOSTNAME`.

    3.  **Data Retrieval:** For each suitable entity, it queries McAfee ePO to find
    the corresponding system information. If a `GroupName` is provided, it filters
    the systems by that group.

    4.  **Enrichment:** If system information is found, it extracts the agent-specific
    data, updates the entity's additional properties with this data, and marks the
    entity as enriched.

    5.  **Result Generation:** The action compiles the retrieved agent information
    into a JSON result and attaches a data table to each successfully processed entity.
