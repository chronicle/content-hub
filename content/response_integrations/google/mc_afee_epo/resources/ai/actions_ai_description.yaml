  ai_description: >-
    Adds a specified tag to an endpoint (Hostname or IP address) in McAfee ePO.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Tag Name | String | Yes | The name of the tag to add to the endpoints. Note
    that the tag must already exist in the McAfee ePO system. |


    ### Action Flow

    1. Establishes a connection to the McAfee ePO server.

    2. Iterates over the target entities, filtering for supported types (Hostname
    and IP Address).

    3. Retrieves system information for each entity to identify the corresponding
    endpoint in McAfee ePO.

    4. Applies the specified tag to the identified endpoint.

    5. Returns a summary message detailing which endpoints were successfully tagged,
    which failed, and which were ignored (e.g., if the tag was already present).
