Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the McAfee ePO database to retrieve specific data
    records. This action allows users to perform flexible database queries by specifying
    the target table, fields to return, filtering conditions (where clause), and sorting
    preferences.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (Server Address,
    Credentials, SSL settings) and action parameters (Table Name, Fields, Where Clause,
    Sort settings, and Limit).

    2. It initializes the `McafeeEpoManager` to establish a connection with the McAfee
    ePO server.

    3. The action calls the `execute_custom_query` method on the manager, passing
    the provided query parameters to the McAfee ePO API.

    4. Upon receiving the results, the action iterates through the returned data,
    converting each record into JSON and CSV formats.

    5. Finally, it adds the results to the action output as a JSON result and a data
    table named 'McAfee Query Results'.


    ### Additional Notes

    This action is a read-only operation designed for data retrieval. It does not
    modify any data within McAfee ePO or the SOAR platform. Ensure the 'Table Name'
    provided exists within the McAfee ePO environment to avoid execution errors.
