Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a custom entity query in McAfee ePO based on the provided entities (IP,
    Hostname, User, File Hash, URL). This action dynamically builds a query using
    the specified table, time frame, and entity keys, and retrieves the matching records
    from the McAfee ePO database.


    ### Flow Description

    1. Connects to the McAfee ePO instance using the provided credentials.

    2. Filters the target entities to include only supported types (ADDRESS, HOSTNAME,
    USER, FILEHASH, URL).

    3. Extracts the original identifiers from the filtered entities and groups them
    by their respective types (including extracting valid emails from USER entities).

    4. Validates if the required entity types are present based on the `Stop If Not
    Enough Entities` parameter.

    5. Constructs a database query using the provided table name, fields to return,
    sort parameters, time frame, and the grouped entity identifiers.

    6. Executes the query via the McAfee ePO API (`core.executeQuery`).

    7. Parses the returned events and adds them to the action's JSON result and a
    data table.


    ### Additional Notes

    The action prepares the "Where" clause based on the entities and the specified
    `Cross Entity Operator`. If `Stop If Not Enough Entities` is enabled, the action
    will fail if any specified entity key lacks corresponding entities in the scope.
  ai_short_description: >-
    Executes a custom entity query in McAfee ePO based on the provided entities and
    returns the matching records.
