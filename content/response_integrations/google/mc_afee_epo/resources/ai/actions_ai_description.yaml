  ai_description: >-
    Executes a custom query in McAfee ePO to fetch data from a specified table. The
    action allows specifying fields to return, a where clause for filtering, sorting
    options, and a limit on the number of results. The retrieved data is returned
    as a JSON result and a data table.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Table Name | String | Yes | Specify the name of the table from which you want
    to fetch results. |

    | Fields To Return | String | No | Specify what fields to return. If nothing is
    specified action will return all available fields. |

    | Where Clause | String | No | Specify the where clause for the query. For more
    information please refer to the documentation portal. |

    | Sort Field | String | No | Specify what field should be used for ordering of
    the results. |

    | Sort Order | Dropdown | No | Specify what sort order should be applied to the
    query. Options are ASC or DESC. |

    | Max Results To Return | String | No | Specify how many results to return. Default:
    50. |


    ### Flow

    1. Connects to the McAfee ePO instance.

    2. Executes the custom query on the specified table using the provided filtering
    and sorting parameters.

    3. Retrieves the results and adds them to the action's JSON result and a data
    table.
