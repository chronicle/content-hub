Get Agent Information:
  ai_description: >-
    ### General Description

    Retrieves endpoint agent information from McAfee ePO for specified Hostname or
    IP Address entities. This action queries the McAfee ePO system to gather detailed
    system and agent metadata, which is then used to enrich the corresponding entities
    in the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters (ServerAddress, Username, Password, etc.)
    from the integration settings.

