  ai_description: >-
    Executes an entity-based query in McAfee ePO to fetch relevant records from a
    specified table.


    ### General Description

    The action dynamically constructs a 'Where' clause using the provided entities
    (IP, Hostname, User, File Hash, URL, Email) and their corresponding entity keys.
    It supports filtering by time frame, sorting, and limiting the number of results.
    The retrieved data is returned as JSON and a data table.


    ### Flow Description

    1. Connects to McAfee ePO using the provided credentials.

    2. Filters the target entities based on the supported types (ADDRESS, HOSTNAME,
    USER, FILEHASH, URL).

    3. Constructs a database query using the specified table name, entity keys, time
    frame, and sorting parameters.

    4. Executes the query against the McAfee ePO database.

    5. Parses the results and outputs them as JSON and a CSV data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Table Name | String | Yes | Specify the name of the table from which you want
    to fetch results. |

    | Fields To Return | String | No | Specify what fields to return. If nothing is
    specified action will return all available fields. |

    | Sort Field | String | No | Specify what field should be used for ordering of
    the results. |

    | Sort Order | DDL | No | Specify what sort order should be applied to the query.
    |

    | Time Frame | DDL | No | Specify a time frame for the results. If 'Custom' is
    selected, you also need to provide 'Start Time'. |

    | Start Time | String | No | Specify the start time for the results. Mandatory
    if 'Custom' is selected for the 'Time Frame' parameter. |

    | End Time | String | No | Specify the end time for the results. If nothing is
    provided and 'Custom' is selected, it will use current time. |

    | Max Results To Return | String | No | Specify how many results to return. Default:
    50. |

    | IP Entity Key | String | No | Specify what key should be used with IP entities.
    |

    | Hostname Entity Key | String | No | Specify what key should be used with Hostname
    entities. |

    | File Hash Entity Key | String | No | Specify what key should be used with File
    Hash entities. |

    | User Entity Key | String | No | Specify what key should be used with User entities.
    |

    | URL Entity Key | String | No | Specify what key should be used with URL entities.
    |

    | Email Address Entity Key | String | No | Specify what key should be used with
    Email Address entities. |

    | Stop If Not Enough Entities | Boolean | Yes | If enabled, action will not start
    execution unless all of the entity types are available for the specified keys.
    |

    | Cross Entity Operator | DDL | Yes | Specify what should be the logical operator
    used between different entity types. |


    ### Additional Notes

    Either the predefined time frame or custom start/end times must be configured
    if a time filter is desired. The action requires at least one entity matching
    the specified entity keys if 'Stop If Not Enough Entities' is enabled.
