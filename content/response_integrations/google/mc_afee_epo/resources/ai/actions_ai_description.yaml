    results. This action allows users to fetch specific records from the McAfee ePO
    database by defining the target table, fields to return, and filtering conditions.


    ### Flow Description

    1. Extracts the table name, fields to return, where clause, sort field, sort order,
    and limit from the action parameters.

    2. Initiates a request to the McAfee ePO API (`core.executeQuery`) to execute
    the custom database query with the provided parameters.

    3. Parses the returned results and formats them into JSON and CSV structures.

    4. Attaches the formatted results to the action's JSON result and outputs a data
    table containing the queried records.


    ### Additional Notes

    This action does not operate on entities. It relies entirely on the provided action
    parameters to construct and execute the query.
