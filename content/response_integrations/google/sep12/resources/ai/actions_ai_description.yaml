ScanEndpoint:
  ai_description: >-
    ### General Description

    Initiates a malware scan on specified endpoints using Symantec Endpoint Protection
    12 (SEP12). This action identifies the corresponding computer in the SEP12 console
    and triggers a full scan, recording the command ID for tracking.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only IP Addresses and Hostnames.

    3. Makes an API call to the SEP12 manager to retrieve the internal computer ID
    for each entity based on its IP address or hostname.

    4. If a computer ID is found, makes a POST request to the SEP12 API to trigger
    a `ScanNow_Full` scan on the endpoint.

    5. Updates the entity's `additional_properties` with the returned scan command
    ID.

    6. Saves the updated entities back to the case.


    ### Additional Notes

    - The scan type is currently hardcoded to `ScanNow_Full` within the script.

    - If a hostname entity is not found initially, the action attempts to split the
    domain from the identifier and search again.
  ai_short_description: >-
    Initiates a full malware scan on specified IP address and hostname entities using
    Symantec Endpoint Protection 12.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
