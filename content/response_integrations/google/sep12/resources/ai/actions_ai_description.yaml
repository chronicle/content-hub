UpdateAndScanEndpoint:
  ai_description: >-
    ### General Description

    Triggers an update and scan command on Symantec Endpoint Protection (SEP) endpoints.
    This action allows security analysts to remotely initiate a content update and
    a full scan on specific endpoints managed by the Symantec Endpoint Protection
    Manager (SEPM).


    ### Flow Description

    1. Connects to the SEP Manager using the provided credentials (Client ID, Client
    Secret, Refresh Token, and API Root URL).

    2. Iterates through the target entities (HOSTNAME or ADDRESS) provided in the
    case.

    3. Resolves each entity to a `computer_id` within the SEP Manager using the `getComputerIdByIP`
    or `getComputerIdByComputerName` methods.

    4. Executes the `runClientCommandUpdateContentAndScan` SOAP command on the identified
    endpoint.

    5. Updates the entity's `additional_properties` with the returned `command_id`.

    6. Updates the entities within the SOAR platform to reflect the triggered command.


    ### Additional Notes

    This action requires valid SEP Manager credentials. It supports both IP addresses
    and Hostnames as input entities. The scan type is currently hardcoded to 'Update_ScanNow_Full'.
  ai_short_description: >-
    Triggers an update and scan command on Symantec Endpoint Protection (SEP) endpoints.
  capabilities:
