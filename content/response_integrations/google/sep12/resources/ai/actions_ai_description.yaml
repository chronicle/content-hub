UpdateAndScanEndpoint:
  ai_description: >-
    ### General Description

    Initiates a content update and malware scan on Symantec Endpoint Protection (SEP)
    clients associated with specific IP Address or Hostname entities. This action
    interacts with the SEP Manager API to locate the endpoint and trigger the scan
    command.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters for entities of type `ADDRESS` or `HOSTNAME`.

    3. Queries the SEP Manager API (via POST request to `ClientService`) to retrieve
    the unique Computer ID for each entity based on its IP address or hostname.

    4. If a Computer ID is found, sends a POST request to the SEP Manager `CommandService`
    to execute the `runClientCommandUpdateContentAndScan` command on the endpoint.

    5. Updates the entity's `additional_properties` with the resulting command ID.

    6. Saves the updated entities back to the case.


    ### Additional Notes

    - The scan type is currently hardcoded to `Update_ScanNow_Full`.

    - If a hostname is not found initially, the action attempts to split the domain
    from the identifier and search again.
