Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Endpoint Protection (SEP) 14 instance. This
    action verifies that the SOAR platform can successfully authenticate and communicate
    with the SEP Manager API.


    ### Flow Description

    1. Retrieves integration configuration parameters, including Client ID, Client
    Secret, Refresh Token, API Root, and Verify SSL settings.

    2. Initializes the `SymantecEp12` manager object using the retrieved configuration.

    3. During initialization, the manager executes the `refreshAccessToken` method,
    which performs an HTTP GET request to the SEP Manager API to validate credentials
    and connectivity.

    4. If the API request is successful, the action completes with a success message.
    If the request fails, an exception is raised, indicating a connectivity or authentication
    issue.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any operational tasks such as scanning, quarantining, or retrieving
    endpoint data.
