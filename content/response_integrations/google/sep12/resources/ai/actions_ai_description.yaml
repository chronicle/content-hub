GetReport:
  ai_description: >-
    ### General Description

    Retrieves the status report for a specific command from the Symantec Endpoint
    Protection Manager (SEPM). This action allows analysts to verify the progress
    or completion status of previously issued commands, such as scans or quarantine
    operations, by querying the SEPM API.


    ### Flow Description

    1. The action retrieves the necessary integration configuration (API credentials,
    API root URL, and SSL verification settings) and the `Command ID` parameter.

    2. It initializes the `SymantecEp12` manager to handle authentication and communication
    with the SEPM.

    3. The action executes a SOAP request to the SEPM `CommandService` using the `getCommandStatusDetails`
    method to fetch the status details for the provided `Command ID`.

    4. The XML response from the SEPM is parsed and converted into a JSON format.

    5. The retrieved report is added to the action results, and the action terminates
    with a success message.


    ### Additional Notes

    This action is a read-only operation and does not modify the state of the Symantec
    Endpoint Protection Manager or the SOAR case data. It relies on a valid `Command
    ID` obtained from previous operations.
  ai_short_description: >-
    Retrieves the status report for a specific command from the Symantec Endpoint
    Protection Manager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
