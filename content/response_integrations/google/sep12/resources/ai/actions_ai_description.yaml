Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Endpoint Protection 14 instance. This action
    verifies that the integration is configured correctly and can successfully authenticate
    with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Client ID, Client Secret,
    Refresh Token, API Root, Verify SSL).

    2. Initializes the Symantec Endpoint Protection manager.

    3. The manager attempts to authenticate by making an HTTP GET request to the Symantec
    Endpoint Protection API to refresh the access token.

    4. If the authentication is successful and no exceptions are raised, the action
    outputs a success message indicating successful connectivity.


    ### Additional Notes

    This action does not interact with alerts or entities and is solely intended for
    administrative verification of the integration's connectivity.
