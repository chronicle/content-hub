    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Initiates a malware scan on the specified endpoint via Symantec Endpoint Protection.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the target entities' additional properties with the scan command ID.
    reasoning: >-
