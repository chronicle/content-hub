ScanEndpoint:
  ai_description: >-
    ### General Description

    Triggers a full scan on a specified endpoint using the Symantec Endpoint Protection
    Manager (SEP12). This action allows security analysts to initiate immediate malware
    scanning on compromised or suspicious assets directly from the SOAR platform.


    ### Flow Description

    1. The action connects to the Symantec Endpoint Protection Manager using the configured
    API credentials.

    2. It iterates through the provided target entities (IP Address or Hostname).

    3. For each entity, it queries the SEP12 manager to retrieve the corresponding
    computer ID.

    4. Upon successfully identifying the computer, it executes a 'ScanNow_Full' command
    on the endpoint via the SEP12 API.

    5. The action updates the entity's `additional_properties` with the returned `command_id`
    to track the scan status.

    6. Finally, it saves the updated entities to the SOAR platform.


    ### Additional Notes

    This action requires valid SEP12 integration configuration (Client ID, Client
    Secret, Refresh Token, and API Root). It specifically supports ADDRESS and HOSTNAME
    entity types. The scan type is hardcoded to 'ScanNow_Full' within the script logic.
  ai_short_description: >-
    Triggers a full scan on a target endpoint via Symantec Endpoint Protection Manager.
  capabilities:
