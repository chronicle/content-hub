GetReport:
  ai_description: >-
    ### General Description

    Retrieves the status report of a specific command executed on Symantec Endpoint
    Protection 12 (SEP12). This action is used to track the progress or outcome of
    previously issued commands, such as scans or updates, using their unique Command
    ID.


    ### Flow Description

    1. Initializes the Symantec Endpoint Protection 12 manager with the provided API
    credentials.

    2. Retrieves the `Command ID` parameter provided by the user or previous playbook
    steps.

    3. Makes a SOAP API call (`getCommandStatusDetails`) to the SEP12 CommandService
    to fetch the status details of the specified command.

    4. Returns the command status report as a JSON object and attaches it to the action's
    JSON results.


    ### Additional Notes

    This action does not operate on entities and relies entirely on the provided Command
    ID. It is typically used in a polling mechanism or as a follow-up step after an
    action that triggers a command (e.g., running a scan) to verify its completion
    status.
  ai_short_description: >-
    Retrieves the status report of a specific command executed on Symantec Endpoint
    Protection 12 (SEP12) using its Command ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
