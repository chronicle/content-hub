UpdateEndpoint:
  ai_description: >-
    ### General Description

    Updates Symantec Endpoint Protection (SEP) clients by triggering an update command
    via the SEP Manager. This action ensures that endpoints are running the latest
    definitions or software versions by issuing a remote update request.


    ### Flow Description

    1. The action connects to the Symantec Endpoint Protection Manager using the provided
    integration configuration (Client ID, Client Secret, Refresh Token, and API Root).

    2. It iterates through the provided target entities (HOSTNAME and ADDRESS).

    3. For each entity, it retrieves the corresponding `computer_id` from the SEP
    Manager:
       - If the entity is an IP Address, it calls `getComputerIdByIP`.
       - If the entity is a Hostname, it calls `getComputerIdByComputerName`.
    4. If a valid `computer_id` is found, the action calls `runClientCommandUpdate`
    to trigger the update command on the endpoint.

    5. The action updates the entity's `additional_properties` with the returned `command_id`.

    6. Finally, it updates the entities within the SOAR platform and returns the status
    of the operation.


    ### Additional Notes

    This action requires a valid connection to the Symantec Endpoint Protection Manager.
    It does not support custom scan types or time limits; it specifically triggers
    the standard update command.
