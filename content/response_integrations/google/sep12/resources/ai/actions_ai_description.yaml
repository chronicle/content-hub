    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a SOAP API request to fetch the status of a command (fetches_data=true).
      It does not mutate external data, nor does it update internal entities, create
      insights, or modify case data.
