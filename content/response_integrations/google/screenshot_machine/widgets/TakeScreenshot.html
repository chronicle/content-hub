<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i,700,700i"
        rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css?family=Source Sans Pro"
        rel="stylesheet"/>
  <title>Take Screenshot</title>
  <style>
      /* Root Variables */
      :root {
      /* Layout & Colors */
      --widget-bg: #212c44;
      --widget-font-family: 'Source Sans Pro', sans-serif;
      --widget-text-color: #ffffff;
      --scrollbar-bg-color: #6275a3;

      /* Components */
      --widget-row-highlight-bg: #2f3d5c;
      --divider-border-colcor: #3a4a6c;
      --divider-border-width: 1px;

      /* Sidebar */
      --sidebar-width: 167px;
      --sidebar-item-active-bg: #3a4a6c;
      --sidebar-toggle-bg: rgba(38, 51, 79, 1); /* Custom Widget specific */

      /* Table */
      --table-color-even-row: #26334f;

      /* Logo */
      --logo-size: 48px;
      --logo-color: #ffffff;

      /* UI Elements */
      --input-border: #6275a3;
      --dropdown-shadow: rgba(0, 0, 0, 0.6);
      --modal-overlay: rgba(0, 0, 0, 0.5);

      /* Status & Tags */
      --tag-bg: #6a7180;
      --status-text: #b5b5b5;
      --tooltip-bg: #ccccda;
      --tooltip-text: #161625;
      
      /* Content Gradients (Custom Widget specific) */
      --content-list-gradient: linear-gradient(to left, rgb(34 43 62), rgba(33, 44, 68, 0));
      --collapsing-gradient: linear-gradient(transparent, rgb(35 44 66));

      /* Severity Colors (Dark Theme Default) */
      --sev-unspec: #b2b6bd;
      --sev-low: #78d9ec;
      --sev-medium: #fff371;
      --sev-high: #fa903e;
      --sev-critical: #ec453b;
      
      /* Legacy Mappings */
      --content-bg: var(--table-color-even-row);
      --content-button-bg: var(--widget-row-highlight-bg);
      --details-button-bg: var(--divider-border-colcor);
      --modal-list-title-bg: var(--sidebar-item-active-bg);
      
      /* Font settings (Legacy) */
      --widget-scrollbar-size: 12px;
      --list-item-key-font: 600 14px/18px var(--widget-font-family);
      --list-item-value-font: 400 14px/18px var(--widget-font-family);
      --table-title-size: 600 14px/18px var(--widget-font-family);
      --table-th-size: 600 14px/18px var(--widget-font-family);
      --table-td-size: 400 14px/18px var(--widget-font-family);
      --header-title-font: 600 16px/22px var(--widget-font-family);
      --sidebar-item-text-style: 400 14px/18px var(--widget-font-family);
      --sidebar-item-text-style-active: 600 14px/16px var(--widget-font-family);
      --sidebar-item-padding: 10px;
      --risk-score-text: var(--tooltip-text); 

    }

      /*Normalize CSS */
      * {
          margin: 0;
          padding: 0;
          outline: none;
          box-sizing: border-box;
      }

      *:hover, *:focus, *:active {
          outline: none;
      }

      ol, ul {
          list-style: none;
      }

      button {
          font-family: inherit;
          background: transparent;
          border: 0;
          color: inherit;
          text-align: left;
      }

      button, a[href] {
          cursor: pointer;
      }

      /*Normalize CSS */

      body {
          font-family: var(--widget-font-family), serif;
          color: var(--widget-text-color);
          background-color: var(--widget-bg);
      }

      /*Global styles*/
      .text-ellipsis {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
      }

      .divider-border-style {
          border: 0;
          border-color: var(--divider-border-colcor);
          border-style: solid;
      }

      .tooltip {
          max-width: 100%;
          position: absolute;
          padding: 8px 16px 8px 16px;
          border-radius: 4px;
          background-color: var(--tooltip-bg);
          color: var(--tooltip-text);
          font: 400 14px/18px var(--widget-font-family);
          z-index: 9;
          word-wrap: break-word;
      }

      .tooltip-triangle {
          position: absolute;
          top: 100%;
          border-top: solid 8px rgb(195, 210, 232);
          border-left: solid 8px transparent;
          border-right: solid 8px transparent;
      }

      /*Global styles*/

      .wrapper {
          display: flex;
          height: 100vh;
      }

      /*left sidebar*/
      .left-side {
          min-width: var(--sidebar-width);
          max-width: var(--sidebar-width);
          overflow-y: auto;
          padding-right: 6px;
          margin-right: 12px;
          border-right-width: var(--divider-border-width);
      }

      .left-side-item {
          width: 100%;
          padding: var(--sidebar-item-padding);
          font: var(--sidebar-item-text-style);
      }

      .left-side-item.active {
          background-color: var(--sidebar-item-active-bg);
          font: var(--sidebar-item-text-style-active);
      }

      /*left sidebar*/

      .right-side {
          width: calc(100% - 180px);
          display: flex;
          flex-direction: column;
      }

      .header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 12px;
          padding-bottom: 5px;
          margin-bottom: 12px;
          border-bottom-width: var(--divider-border-width);
      }

      .header-title {
          font: var(--header-title-font);
          word-break: break-word;
          padding: 0 6px;
      }

      .header .logo {
          width: 44px;
          color: var(--widget-text-color);
      }

      .main-content {
          flex: 1;
          overflow: auto;
          word-wrap: break-word;
          height: 100vh;
          font: var(--widget-font-family);
          position: relative;
      }

      .main-content .screenshot-img {
          position: absolute;
          top: 0;
          left: 0;
          width: auto;
          height: 100%;
          object-fit: contain;
          cursor: pointer;
      }


      /* Custom Scrollbar */
      ::-webkit-scrollbar {
          width: 18px;
          height: 18px;
      }

      ::-webkit-scrollbar-thumb {
          background: rgba(137, 151, 180, 1);
          border: 6px solid var(--widget-bg);
          border-radius: 63px;
      }

      ::-webkit-scrollbar-track {
          background: transparent;
          border: 4px solid transparent;
          border-radius: 44px;
      }

      ::-webkit-scrollbar-corner {
          background-color: transparent;
          border-color: transparent;
      }


      .modal {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background-color: var(--widget-bg);
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
          padding: 16px;
          max-width: 90%;
          min-width: 50%;
          max-height: 90%;
          border-radius: 8px;
          z-index: 999;
          overflow: hidden;
          display: flex;
          flex-direction: column;
      }

      .modal-content {
          overflow: auto;
      }

      .modal-content pre {
          font: var(--table-td-size);
      }

      .modal-close {
          width: 100%;
          height: 24px;
          display: flex;
          align-items: center;
          justify-content: flex-end;
          order: -1;
      }

      .modal-close svg {
          width: 20px;
          height: 20px;
          stroke: var(--widget-text-color);
      }

      .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0, 0, 0, 0.5);
          z-index: 999;
      }

    /* --- SCROLLBAR IMPROVEMENTS --- */

    /* --- GLOBAL ELEMENT FIXES --- */

<script>

    const ThemeSettings = {
        LIGHT_THEME_CLASS: 'light-theme',
        DARK_THEME_CLASS: 'dark-theme',
    };
    
    const LIGHT_THEME_HEX = "#e5e8f2";
    const DARK_THEME_HEX = "#282837";
    const GRAY_THEME_HEX = "#2f3d5c";

    function handleThemeUpdate(event) {
        if (event.source !== window.parent) {
            return;
        }
        const styles = event.data;
        if (typeof styles !== 'object' || styles === null) return;
        const bg = styles.background || styles.backgroundColor || '';
        let isLight = false;
        let isDark = false;
        let isGray = false;
        const colorString = bg.toLowerCase();
        if (colorString === LIGHT_THEME_HEX) isLight = true;
        else if (colorString === DARK_THEME_HEX) isDark = true;
        else if (colorString === GRAY_THEME_HEX) isGray = true;
        else {
            let r, g, b;
            const rgbMatch = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (rgbMatch) { r = parseInt(rgbMatch[1]); g = parseInt(rgbMatch[2]); b = parseInt(rgbMatch[3]); }
            else if (bg.startsWith('#')) {
                const hex = bg.replace('#', '');
                const fH = hex.length === 3 ? hex.split('').map(c => c + c).join('') : hex;
                if (fH.length === 6) { r = parseInt(fH.substring(0, 2), 16); g = parseInt(fH.substring(2, 4), 16); b = parseInt(fH.substring(4, 6), 16); }
            }
            if (r !== undefined) {
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                if (brightness > 128) isLight = true;
            }
        }
        const html = document.documentElement;
        if (isLight) {
            html.classList.add(ThemeSettings.LIGHT_THEME_CLASS); html.classList.remove(ThemeSettings.DARK_THEME_CLASS);
        } else if (isDark) {
            html.classList.add(ThemeSettings.DARK_THEME_CLASS); html.classList.remove(ThemeSettings.LIGHT_THEME_CLASS);
        } else {
            html.classList.remove(ThemeSettings.LIGHT_THEME_CLASS); html.classList.remove(ThemeSettings.DARK_THEME_CLASS);
        }

        const prismLink = document.querySelector('link[href*="/themes/prism"]');
        if (prismLink) {
            if (isLight && prismLink.href.includes('prism-tomorrow')) {
                prismLink.href = prismLink.href.replace('prism-tomorrow.min.css', 'prism.min.css').replace('prism-tomorrow.css', 'prism.css');
            } else if (!isLight && !prismLink.href.includes('prism-tomorrow')) {
                prismLink.href = prismLink.href.replace('prism.min.css', 'prism-tomorrow.min.css').replace('prism.css', 'prism-tomorrow.css');
            }
        }
    }
    window.addEventListener('message', handleThemeUpdate);
    window.onmessage = handleThemeUpdate;
    document.addEventListener("DOMContentLoaded", function() {
        var paths = document.querySelectorAll('svg path');
        paths.forEach(function(path) {
            var fill = path.getAttribute('fill');
            if (fill === 'white' || fill === '#fff' || fill === '#ffffff' || fill === 'rgb(255, 255, 255)') {
                path.setAttribute('fill', 'currentColor');
            }
        });
    });

    // JSON placeholder
    const actionListData = [{stepInstanceName}.JsonResult];

    // Constants for tooltip positioning
    const tooltipGap = 25;
    const tooltipTriangleHeight = 8;

    // Get all elements "table"
    const tables = document.getElementsByClassName("table");

    const tooltipDetectResizeObserver = new ResizeObserver((entries) => {
        for (const entry of entries) {
            const target = entry.target;
            if (target) {
                const {offsetWidth, scrollWidth} = target;
                if (scrollWidth > offsetWidth) {
                    target.addEventListener("mouseover", createTooltipListener);
                    target.addEventListener("mouseout", removeTooltipListener);
                } else {
                    target.removeEventListener("mouseover", createTooltipListener);
                    target.removeEventListener("mouseout", removeTooltipListener);
                }
            }
        }
    });

    // Update the UI with filtered data
    if (actionListData.length > 0) {
        headerTitle.textContent = actionListData[0].Entity;
        displayBase64Image(actionListData[0].EntityResult);

        actionListData.forEach((el, index) => {
            const displayValue = el.Entity;
            const cleanDisplayValue = removeSpecialSymbols(displayValue);
            const button = document.createElement("button");
            button.id = cleanDisplayValue;
            button.classList.add("left-side-item");
            button.setAttribute("data-menu", "item");
            if (index === 0) {
                button.classList.add("active");
            }
            renderWithTooltip(button, displayValue);
            leftSide.append(button);
        });


        if (actionListData.length === 1) {
            leftSide.remove();
            rightSide.style.width = "100%";
        } else {
            leftSide.addEventListener("click", event => {
                const target = event.target.closest("[data-menu='item']");
                if (!target) return;

                const id = target.id;
                const object = actionListData.find(el => removeSpecialSymbols(el.Entity) === id);
                if (object) {
                    mainContent.innerHTML = "";
                    headerTitle.textContent = object.Entity;
                    displayBase64Image(object.EntityResult);
                }
                document.querySelectorAll("[data-menu='item']").forEach(item => item.classList.remove("active"));
                target.classList.add("active");

                mainContent.scrollTop = 0;
            });
        }
    }

    /**
     * Removes special symbols from a string.
     */
    function removeSpecialSymbols(str) {
        return str.replace(/[^\w\s]/gi, "");
    }

    /**
     * Creates a tooltip with given text and position.
     */
    function createTooltip(text, x, y, trianglePointX, placeAtBottom, tooltipContentWidth, tooltipContentHeight, viewportWidth) {
        removeTooltip();
        const tooltip = document.createElement("div");
        tooltip.classList.add("tooltip");
        tooltip.textContent = text;
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y}px`;
        const tooltipTriangle = document.createElement("span");
        tooltipTriangle.classList.add("tooltip-triangle");
        tooltipTriangle.style.left = `${trianglePointX}px`;
        if (placeAtBottom) {
            tooltipTriangle.style.top = "-8px";
            tooltipTriangle.style.borderTop = "0";
            tooltipTriangle.style.borderBottom = "solid 8px rgb(195, 210, 232)";
        }
        tooltip.offsetWidth = tooltipContentWidth;
        tooltip.offsetHeight = tooltipContentHeight;
        document.documentElement.offsetWidth = viewportWidth;
        tooltip.append(tooltipTriangle);
        document.body.append(tooltip);

        if (tooltipContentWidth >= viewportWidth) {
            tooltip.style.right = `20px`;
            tooltip.style.left = `20px`;
            tooltipTriangle.style.left = `${trianglePointX + x}px`;
        }
    }

    /**
     * Removes any existing tooltip from the DOM.
     */
    function removeTooltip() {
        const tooltip = document.querySelectorAll(".tooltip");
        tooltip.forEach((item) => {
            if (item) {
                item.remove();
            }
        });
    }

    /**
     * Sets a timeout to calculate and show tooltip position after a delay.
     */
    function createTooltipListener(event) {
        tooltipTimeout = setTimeout(() => calculateTooltipPosition(event), 1000);
    }

    /**
     * Clears any existing tooltip timeout and removes the tooltip.
     */
    function removeTooltipListener() {
        if (tooltipTimeout) {
            clearTimeout(tooltipTimeout);
        }
        removeTooltip();
    }

    /**
     * Calculates and positions the tooltip relative to the event target.
     */
    function calculateTooltipPosition(event) {
        const target = event.target;
        if (!target) {
            return;
        }
        const rect = target.getBoundingClientRect();
        const textWidth = target.scrollWidth;
        const tooltipContent = document.createElement("div");
        tooltipContent.classList.add("tooltip");
        tooltipContent.textContent = target.textContent;
        document.body.appendChild(tooltipContent);
        const tooltipContentHeight = tooltipContent.offsetHeight;
        tooltipContent.remove();
        const viewportWidth = window.innerWidth;
        const elementMidX = rect.left + (rect.width / 2);
        const placeOnRight = elementMidX + textWidth / 2 + tooltipGap > viewportWidth;
        const x = placeOnRight ? viewportWidth - textWidth - tooltipGap : Math.max(tooltipGap, elementMidX - textWidth / 2);
        const placeAtBottom = rect.top < tooltipContentHeight;
        const y = placeAtBottom ? rect.bottom + tooltipTriangleHeight : rect.top - tooltipContentHeight;
        createTooltip(target.textContent, x, y, elementMidX - x, placeAtBottom, textWidth, tooltipContentHeight, viewportWidth);
    }

    /**
     * Renders an item with text and sets up tooltip behavior.
     */
    function renderWithTooltip(item, text) {
        item.innerText = text;
        item.classList.add("text-ellipsis");
        tooltipDetectResizeObserver.observe(item);
    }

    /**
     * Removes surrounding "b'" and "'" from the base64 string if present.
     *
     * @param {string} base64ScreenshotImg - The base64 string to process.
     * @returns {string} - The cleaned base64 string or the original if no changes are needed.
     */
    function extractInnerString(base64ScreenshotImg) {
        if (base64ScreenshotImg.startsWith("b'") && base64ScreenshotImg.endsWith("'")) {
            return base64ScreenshotImg.slice(2, -1);
        }
        return base64ScreenshotImg;
    }

    /**
     * Creates and displays an image element from a base64-encoded string.
     *
     * @param {string} base64ScreenshotImg - The base64-encoded image string.
     */
    function displayBase64Image(base64ScreenshotImg) {
        screenshotUrl = `data:image/png;base64,${extractInnerString(base64ScreenshotImg)}`;
        const img = document.createElement("img");
        img.classList.add("screenshot-img");
        img.src = screenshotUrl;
        img.addEventListener('click', handleImageClick);
        mainContent.appendChild(img);
    }

    /**
     * Creates a modal dialog with given content.
     */
    function handleImageClick() {
        const modal = document.createElement("div");
        modal.classList.add("modal");

        const modalOverlay = document.createElement("div");
        modalOverlay.classList.add("modal-overlay");
        document.body.appendChild(modalOverlay);

        const modalContent = document.createElement("div");
        modalContent.classList.add("modal-content");
        modal.appendChild(modalContent);

        let contentElement;

        contentElement = document.createElement("img");
        contentElement.src = screenshotUrl;

        modalContent.appendChild(contentElement);

        const closeButton = document.createElement("button");
        closeButton.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12" />
        </svg>`;
        closeButton.classList.add("modal-close");
        modal.appendChild(closeButton);
        document.body.appendChild(modal);

        closeButton.addEventListener("click", () => {
            modal.remove();
            modalOverlay.remove();
        });
    }
</script>
