[project]
name = "Phishrod"
version = "1.0"
description = "PhishRod is an integrated & analytics driven solution for phishing readiness, security awareness automation, threat advisory & policy compliance management. It helps organizations to empower end users and cascade the actionable human intelligence across the organization to deter cyber attacks."
requires-python = ">=3.11,<3.12"
dependencies = [ "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk", "environmentcommon", "integration-testing", "tipcommon", "pytest-mock>=3.14.0",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.22-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.22-py3-none-any.whl"
