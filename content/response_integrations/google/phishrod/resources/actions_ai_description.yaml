Update Incident:
  ai_description: >-
    ### General Description

    Updates the status of a specific incident within the PhishRod platform. This action
    is used to manage the lifecycle of incidents by marking them as 'Safe' or 'Delete'
    based on the investigation's outcome.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident in PhishRod
    that needs to be updated. |

    | Status | String (Enum) | No | The target status for the incident. Available
    options are 'Delete' and 'Safe'. If not provided, it defaults to 'Delete'. |


    ### Additional Notes

    - The action uses a GET request to the PhishRod API to perform the update, which
    is specific to the PhishRod API implementation for state changes.

    - If the incident status was already set to the requested value, the action will
    complete successfully but indicate that no change was necessary.


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (API Root, Key, Client
    ID, etc.) and action parameters (Incident ID and Status).

    2. **API Interaction**: Connects to the PhishRod API and sends a request to the
    `update-incident-status` endpoint using the provided Incident ID and Status.

    3. **Response Validation**: Checks the API response to confirm if the status was
    successfully updated or if the incident was already marked with that status.

    4. **Completion**: Returns a success message and the raw JSON response from PhishRod
    to the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of an incident in the PhishRod platform to either 'Delete'
      or 'Safe'.
