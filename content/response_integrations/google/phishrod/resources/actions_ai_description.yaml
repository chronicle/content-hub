Mark Incident:
  ai_description: >-
    Marks a specific incident in Phishrod with a designated status and provides a
    justification comment. This action is used to transition incidents through the
    analysis workflow, such as escalating for secondary analysis or closing them as
    safe or spam.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident in Phishrod
    that needs to be marked. |

    | Status | String | No | The status to assign to the incident. Options include:
    'Mark For Secondary Analysis', 'Mark As Safe', or 'Mark As Spam'. Defaults to
    'Mark For Secondary Analysis'. |

    | Comment | String | Yes | A comment describing the reason for marking the incident.
    |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Incident ID, Status, and Comment from
    the action inputs.

    2. **Status Mapping:** Maps the human-readable status (e.g., 'Mark As Safe') to
    the internal API value (e.g., 'safe', 'suspicious', or 'spam').

    3. **API Interaction:** Calls the Phishrod API's `initiate-primary-analysis` endpoint
    using the provided incident ID, mapped status, and comment.

    4. **Response Handling:** Parses the API response to determine if the update was
    successful or if the incident had already been updated previously.

    5. **Result Reporting:** Outputs the execution status and the raw JSON response
    from Phishrod to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the analysis status and attaches a comment to an incident within the
      Phishrod platform.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
