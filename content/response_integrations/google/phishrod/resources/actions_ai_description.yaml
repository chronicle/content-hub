Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Phishrod server. It ensures that the integration configuration
    parameters (such as API credentials and network settings) are correct and that
    the Phishrod API is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Phishrod instance API. |

    | API Key | String | Yes | The API Key used for authentication with Phishrod.
    |

    | Client ID | String | Yes | The unique Client ID associated with the Phishrod
    account. |

    | Username | String | Yes | The username for basic authentication. |

    | Password | String | Yes | The password for basic authentication. |

    | Verify SSL | Boolean | Yes | If enabled, the action will validate the SSL certificate
    of the Phishrod server. |


    ### Additional Notes

    - This action does not require any input entities and is typically used during
    the initial setup or troubleshooting of the Phishrod integration.

    - According to the logic, if any of the mandatory configuration parameters are
    missing or incorrect, the action will fail and report a connection error.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    parameters including the API Root, API Key, Client ID, and credentials.

    2. **Manager Initialization:** It initializes the `PhishrodManager` with the provided
    settings.

    3. **Connectivity Test:** The manager executes a GET request to the Phishrod 'ping'
    endpoint using the provided API Key and Client ID.

    4. **Validation:** The response is validated to ensure a successful HTTP status
    code and that no application-level errors (like code 400) are returned.

    5. **Result Reporting:** If the request is successful, the action completes with
    a success message; otherwise, it catches the exception and reports a failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
