name: PhishRod - Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: Event Field
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: 'Describes the name of the field where the environment name is stored.

        If the environment field isn''t found, the environment is the default environment.

        '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: 'A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged.

        Used to allow the user to manipulate the environment field via regex logic.

        If the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.

        '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://{instance}.phishrod.co
    type: string
    description: API root of the Phishrod instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: 'API key of the Phishrod account. '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: password
    description: Client ID of the Phishrod account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the Phishrod account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the Phishrod account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Severity
    default_value: Medium
    type: string
    description: 'Set the severity for the alert based on the incident. Possible values:
        Informational, Low, Medium, High, Critical.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use dynamic list as a blacklist
    default_value: false
    type: boolean
    description: If enabled, the dynamic list is used as a blacklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verifies that the SSL certificate for the connection
        to the PhishRod server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Pull information about incidents from PhishRod. Note: dynamic list filter
    works with “emailSubject” parameter.'
integration: Phishrod
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/phishrod#phishrod-incidents-connector
rules: []
is_connector_rules_supported: false
creator: admin
