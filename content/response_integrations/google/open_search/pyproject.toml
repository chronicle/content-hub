[project]
name = "OpenSearch"
version = "5.0"
description = "Search engine based on Lucene. It provides a distributed, multitenant-capable full-text search engine."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "opensearch-dsl==2.1.0", "opensearch-py==3.0.0", "tipcommon",]

[dependency-groups]
dev = [ "environmentcommon", "integration-testing", "pytest>=9.1.1", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.4-py2.py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.0-py3-none-any.whl"
