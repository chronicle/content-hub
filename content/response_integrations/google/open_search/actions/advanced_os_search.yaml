name: Advanced OS Search
description: Premade structured OpenSearch query, returns a dict of dictionaries.
    This action should be used when you want to use time range in the query. If you
    don’t want to use the time range, use Simple OpenSearch action.
integration_identifier: OpenSearch
parameters:
-   name: Index
    default_value: '*'
    type: string
    description: "Search pattern for a OpenSearch index.\r\nIn OpenSearch, index is\
        \ like a DatabaseName, and data is stored across various indexes.\r\nThis\
        \ param defines in what index(es) to search. It can be an exact name ie: \"\
        smp_playbooks-2019.06.13\"\r\nor you can use a (*) wildcard to search by a\
        \ pattern. e: \"smp_playbooks-2019.06*\" or \"smp*\".\r\nTo learn more about\
        \ OpenSearch indexes visit https://www.elastic.co/blog/what-is-an-opensearch-index"
    is_mandatory: false
-   name: Query
    default_value: '*'
    type: string
    description: "The search query to perform. It is in Lucene syntax.\r\nIE1: \"\
        *\" (this is a wildcard that will return all record)\r\nIE1: \"level:error\"\
        \r\nIE2: \"level:information\"\r\nIE3: \"level:error OR level:warning\"\r\n\
        To learn more about lucene syntax, visit\r\nhttps://www.elastic.co/guide/en/kibana/current/lucene-query.html#lucene-query\r\
        \nhttps://www.elastic.co/guide/en/opensearch/reference/7.1/query-dsl-query-string-query.html#query-string-syntax"
    is_mandatory: false
-   name: Limit
    default_value: '100'
    type: string
    description: "Limits the document return count, ie: 10.\r\n0 = No limit"
    is_mandatory: false
-   name: Display Field
    default_value: '*'
    type: string
    description: "Limits the returned fields. Default \"*\" = Return all fields.\r\
        \nYou can state a single field. ie: \"level\""
    is_mandatory: false
-   name: Search Field
    default_value: _all
    type: string
    description: "Search field for free text queries (When query doesn't specify a\
        \ field name).\r\nDefault is \"_all\", which means all fields are searched.\
        \ It is best to use proper lucene syntanx on \"_all\" fields, or textual search\
        \ on a specific field.\r\nie1: Search Field = \"_all\". Query = \"level:error\"\
        \ Query will return all records where \"level\" field, equals \"error\".\r\
        \nie2: Search Field = \"Message\", query = \"*Login Alarm*\". Query will return\
        \ all records, which their \"Message\" field, contains the text \"Login Alarm\""
    is_mandatory: false
-   name: Timestamp Field
    default_value: '@timestamp'
    type: string
    description: The name of the field to run time-based filtering against. Default
        is @timestamp. If both Earliest Date and Oldest Date are empty, no time-based
        filtering will occur.
    is_mandatory: false
-   name: Oldest Date
    default_value: now-1d
    type: string
    description: "Start date of the search. Search will return only records equal\
        \ or after this point in time.\r\nInput may be in exact UTC:\r\n\tFormat:\
        \ YYYY-MM-DDTHH:MM:SSZ\r\n\tie: 2019-06-04T10:00:00Z\r\nInput may also be\
        \ in relative form (using date-math):\r\n\tie: \"now\", \"now-1d\", \"now-1d/d\"\
        , \"now-2h/h\"\r\n\tto learn more about date-math visit https://www.elastic.co/guide/en/opensearch/reference/7.1/common-options.html#date-math"
    is_mandatory: false
-   name: Earliest Date
    default_value: now
    type: string
    description: "End date of the search. Search will return only records equal or\
        \ before this point in time.\r\nInput may be in exact UTC:\r\n\tFormat: YYYY-MM-DDTHH:MM:SSZ\r\
        \n\tie: 2019-06-04T10:00:00Z\r\nInput may also be in relative form (using\
        \ date-math):\r\n\tie: \"now\", \"now-1d\", \"now-1d/d\", \"now-2h/h\"\r\n\
        \tto learn more about date-math visit https://www.elastic.co/guide/en/opensearch/reference/7.1/common-options.html#date-math"
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/advanced_os_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Siemplify System
script_result_name: results
