name: OpenSearch DSL Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product. e.g. _type
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: name
    type: string
    description: The field name used to determine the event name (sub-type). e.g.
        _source_match_event_id
    is_mandatory: false
    is_advanced: true
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Server Address
    default_value: ''
    type: string
    description: 'The OpenSearch server address, i.e: http://{ip_address}:{port}'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: OpenSearch username
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: CA Certificate File
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: OpenSearch password
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: JWT Token
    default_value: ''
    type: password
    description: OpenSearch JWT Token.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Authenticate
    default_value: 'FALSE'
    type: boolean
    description: Whether to authenticate on connection or not
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'FALSE'
    type: boolean
    description: Whether to use ssl on connection or not
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Field Name
    default_value: ''
    type: string
    description: The name of the field where the alert name is located. e.g. _source_info_alertname
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Description Field
    default_value: ''
    type: string
    description: The name of the field where the description is located. e.g. _source_alert_info_description
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Severity
    default_value: ''
    type: string
    description: 'Severity of the alerts. Possible value: Info, Low, Medium, High,
        Critical. Note: this parameter has priority over “Severity Field Name“. If
        you want to work with “Severity Field Name“, this field should be left empty.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Severity Field Name
    default_value: ''
    type: string
    description: If you want to map severity based on the string value then you would
        need to create a mapping file. Please refer to documentation portal for more
        details.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Timestamp Field
    default_value: ''
    type: string
    description: The name of the field where the timestamp is located (flat field
        path). e.g. _source_@timestamp
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the field where the environment name is stored. If the
        environment field isn't found, the environment is ''
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return value unchanged. Used to
        allow the user to manipulate the environment field via regex logic. If the
        regex pattern is null or empty, or the environment value is null, the final
        environment result is ''.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Index
    default_value: _all
    type: string
    description: Index pattern to search by. e.g. '_all'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Query
    default_value: ''
    type: string
    description: 'DSL Query that is used for the search. Note: Valid Json format needed,
        to make the connector more stable it is recommended to add a sorting timestamp
        key in the ascending order.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alerts Count Limit
    default_value: '20'
    type: integer
    description: Max count of alerts to pull in one cycle. e.g. 20
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: OpenSearch DSL Connector
integration: OpenSearch
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/open-search#connectors
rules: []
is_connector_rules_supported: true
creator: admin
