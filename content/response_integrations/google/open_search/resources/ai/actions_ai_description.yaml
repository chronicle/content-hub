Simple OS Search:
  ai_description: >-
    ### General Description

    The **Simple OS Search** action enables users to execute searches across OpenSearch
    indexes using standard Lucene query syntax. It is designed for broad data retrieval
    tasks that do not require specific time-range filtering. The action fetches matching
    documents, flattens the data structure for readability, and outputs the results
    as both a structured data table and raw JSON.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Index`, `Query`, and `Limit`
    values from the configuration.

    2. **Validation**: It validates that the `Limit` provided is a positive integer.

    3. **API Interaction**: The action calls the OpenSearch API to perform a `query_string`
    search based on the provided Lucene query and index pattern.

    4. **Result Processing**: If hits are found, the action flattens the nested JSON
    results into a flat dictionary format.

    5. **SOAR Integration**: The flattened results are converted into a CSV format
    and added as a Data Table to the action. The raw results are also attached as
    JSON for use in subsequent playbook steps.


    ### Additional Notes

    - This action is intended for simple queries. If time-range filtering (e.g., searching
    within the last 24 hours) is required, the 'Advanced OS Search' action should
    be used instead.
