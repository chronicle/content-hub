Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the OpenSearch server using the provided integration
    configuration. This action is primarily used to ensure that the SOAR platform
    can successfully communicate with the OpenSearch instance using the configured
    credentials and network settings.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes

    This action relies on the global integration configuration (Server Address, Username,
    Password, JWT Token, etc.) to establish a connection.


    ### Flow Description

    1. **Initialize API Client**: The action initializes the `OpenSearchManager` using
    the integration's global configuration parameters, including authentication (Basic
    or JWT) and SSL settings.

    2. **Test Connectivity**: It executes the `test_connectivity` method, which performs
    a call to the OpenSearch `info()` API endpoint to verify the server is reachable
    and responding.

    3. **Output Result**: If the connection is successful, the action returns a boolean
    `True` and a success message.
