Advanced OS Search:
  ai_description: >-
    ### General Description

    The **Advanced OS Search** action executes structured searches against OpenSearch
    indexes using Lucene query syntax. It is specifically designed for scenarios requiring
    precise time-range filtering, allowing users to retrieve documents that fall between
    a specific start and end date. The action returns results as both a raw JSON object
    and a formatted CSV data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Index** | String | Yes | The index name or wildcard pattern (e.g., `logs-*`)
    to search within. |

    | **Query** | String | Yes | The search query using Lucene syntax (e.g., `status:error
    AND user:admin`). |

    | **Limit** | Integer | Yes | The maximum number of documents to return (default
    is 100). |

    | **Display Field** | String | Yes | Comma-separated list of fields to include
    in the output. Use `*` for all fields. |

    | **Search Field** | String | Yes | The default field to search if no field is
    specified in the query string. |

    | **Timestamp Field** | String | Yes | The field used for time-based filtering
    (default is `@timestamp`). |

    | **Oldest Date** | String | No | The start of the time range. Supports ISO 8601
    strings or date-math (e.g., `now-1d`). |

    | **Earliest Date** | String | No | The end of the time range. Supports ISO 8601
    strings or date-math (e.g., `now`). |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves user inputs, ensuring mandatory
    fields like `Index` and `Query` are provided.

    2. **Validation**: It validates that the `Limit` parameter is a positive integer.

    3. **Query Construction**: It builds an OpenSearch DSL query incorporating the
    Lucene string and the specified time range filters (using `gte` and `lte` logic).

    4. **Execution**: The query is executed against the OpenSearch cluster via the
    API client.

    5. **Data Processing**: Retrieved hits are flattened into a single-level dictionary
    structure for better readability.

    6. **Output Generation**: The results are formatted into a CSV data table for
    the Case Wall and a raw JSON object for downstream playbook use.


    ### Additional Notes

    - If both `Oldest Date` and `Earliest Date` are left empty, the action performs
    the search without time-based constraints.

    - This action is preferred over the 'Simple Search' when temporal context is required
    for the investigation.
  capabilities:
    can_create_case_comments: false
