  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Index | String | No | Search pattern for a OpenSearch index. Defines in what
    index(es) to search. It can be an exact name or a wildcard pattern. |

    | Query | String | No | The search query to perform in Lucene syntax. |

    | Limit | String | No | Limits the document return count (e.g., 100). 0 = No limit.
    |

    | Display Field | String | No | Limits the returned fields. Default "*" = Return
    all fields. |

    | Search Field | String | No | Search field for free text queries (when the query
    doesn't specify a field name). Default is "_all". |

    | Timestamp Field | String | No | The name of the field to run time-based filtering
    against. Default is @timestamp. |

    | Oldest Date | String | No | Start date of the search. Search will return only
    records equal or after this point in time. Supports exact UTC or relative date-math.
    |

    | Earliest Date | String | No | End date of the search. Search will return only
    records equal or before this point in time. Supports exact UTC or relative date-math.
    |


    **Parameter Notes:**

    Although the integration metadata defines all parameters as non-mandatory, the
    underlying Python code execution strictly requires `Index`, `Query`, `Limit`,
    `Display Field`, `Search Field`, and `Timestamp Field` to be provided.
  ai_short_description: >-
    Executes structured searches against OpenSearch indexes using Lucene query syntax
    and time-range filtering, returning the results as JSON and CSV.
DSL Search:
  ai_description: >-
    ### General Description

    Executes a Domain Specific Language (DSL) query against an OpenSearch cluster
    to retrieve documents. This action is designed to fetch historical data or specific
    logs based on complex search criteria provided in JSON format. It supports wildcard
    index patterns and allows for limiting the number of returned results.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `Index`, `Query`, and `Limit`
    parameters from the input configuration.

    2. **Validation:** Validates that the `Limit` parameter is a positive integer.

    3. **API Interaction:** Connects to the OpenSearch cluster and executes the DSL
    search via the OpenSearch API (`search` method).

    4. **Result Processing:** If documents are found, the action flattens the JSON
    results for tabular representation.

    5. **Output Generation:** Creates a data table in the SOAR case containing the
    flattened results and attaches the raw JSON data as the action's result JSON.


    ### Additional Notes

    Supports wildcard index patterns and allows for limiting the number of returned
    results. While the metadata marks the parameters as optional, the underlying code
    enforces them as mandatory for successful execution.
