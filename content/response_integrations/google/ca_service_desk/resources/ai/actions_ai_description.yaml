Search Tickets:
  ai_description: >-
    ### General Description

    Searches for tickets in CA Desk Manager based on specified criteria. This action
    allows users to query for incidents using filters such as Incident ID, Summary,
    Description, and Status, within a defined timeframe.


    ### Flow Description

    1. Initialize the connection to CA Desk Manager using the provided API credentials.

    2. Retrieve search parameters: Incident ID, Summary, Description, Status, and
    Days Backwards.

    3. Calculate the time range for the search based on the 'Days Backwards' parameter.

    4. If an Incident ID is provided, the action fetches the specific incident directly.

    5. If no Incident ID is provided, the action calls the `get_incident_ids_by_filter`
    method to retrieve a list of incident IDs matching the provided filters.

    6. For each identified incident ID, the action calls `get_incident_by_id` to retrieve
    detailed ticket information.

    7. The retrieved ticket data is added to a data table and a JSON result object.

    8. The action concludes by returning the list of found incident IDs and a summary
    message.


    ### Additional Notes

    This action is a read-only operation. It does not modify any data in CA Desk Manager
    or the Google SecOps platform. If no incidents are found, the action returns a
    message indicating that no incidents were found.
