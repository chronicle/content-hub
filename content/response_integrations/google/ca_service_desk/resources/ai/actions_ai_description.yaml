Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CA Service Desk instance to ensure the integration is
    configured correctly and can communicate with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Username, Password).

    2. Initializes the CA Service Desk SOAP manager.

    3. Executes a login request to the CA Service Desk SOAP API to verify credentials
    and network connectivity.

    4. Returns a success or failure message based on the connection result.


    ### Additional Notes

