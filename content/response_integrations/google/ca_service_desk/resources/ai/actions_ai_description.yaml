Wait For Status Change:
  ai_description: >-
    ### General Description

    This asynchronous action monitors a specific ticket in CA Service Desk and waits
    until its status changes to an expected value. Once the expected status is reached,
    it retrieves and returns the ticket's details.


    ### Flow Description

    1. Connects to the CA Service Desk API using the provided integration credentials.

    2. Retrieves the current status of the specified ticket using the `get_ticket_status`
    API method.

    3. Compares the current ticket status with the expected status provided in the
    parameters.

    4. If the statuses match, it fetches the full ticket details using the `get_incident_by_id`
    API method, adds the data to the JSON results, and completes the action.

    5. If the statuses do not match, the action suspends itself and retries in the
    next polling cycle.


    ### Additional Notes

    This is an asynchronous action that will continue to run and poll the ticket status
    until the expected status is met or the action reaches its timeout limit.
  ai_short_description: >-
    Asynchronously monitors a CA Service Desk ticket and waits until its status matches
