Sync Ticket History:
  ai_description: >-
    ### General Description

    Fetches the entire ticket history (comments) from CA Service Desk for the ticket
    associated with the current alert and attaches them as case comments in Google
    SecOps.


    ### Flow Description

    1. Retrieves the external ticket ID associated with the current alert (`siemplify.current_alert.external_id`).

    2. Makes a SOAP API call to CA Service Desk to fetch all incident comments associated
    with the ticket ID since the beginning of time.

    3. Iterates through the retrieved comments, extracting details such as the comment
    content, analyst name, ticket type, and timestamp based on the provided field
    mapping parameters.

    4. Formats each comment and attaches it to the Google SecOps case using `siemplify.add_comment`.

    5. Returns the raw comment data as a JSON result.


    ### Additional Notes

    The action relies on the alert having a valid `external_id` that corresponds to
    an existing CA Service Desk ticket.
