Search Tickets:
  ai_description: >-
    ### General Description

    Searches for tickets in CA Service Desk Manager based on specified fields such
    as Incident ID, Summary, Description, and Status.


    ### Flow Description

    1. Retrieves action parameters including Incident ID, Summary, Description, Status,
    and Days Backwards.

    2. Calculates the Unix timestamp to fetch tickets from based on the 'Days Backwards'
    parameter.

    3. If a specific 'Incident ID' is provided, it searches for that specific incident.

    4. Otherwise, it calls the CA Service Desk SOAP API (`get_incident_ids_by_filter`)
    to retrieve incident IDs matching the provided filters.

    5. Iterates through the found incident IDs and fetches detailed incident data
    for each using the API (`get_incident_by_id`).

    6. Constructs a CSV table with the retrieved ticket data and adds it to the action
    results.

    7. Returns the incident data as a JSON result.


    ### Additional Notes

    If an Incident ID is provided, other filters are ignored.
