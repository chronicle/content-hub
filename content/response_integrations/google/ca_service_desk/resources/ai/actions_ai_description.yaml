Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific incident in CA ServiceDesk. This action allows analysts
    to append notes or updates directly to an external ITSM ticket from within the
    SecOps platform.


    ### Flow Description

    1. Retrieves the `Ticket ID` and `Comment` from the action parameters.

    2. Initializes the CA ServiceDesk SOAP client using the provided integration configuration.

    3. Makes a SOAP API call (`logComment`) to CA ServiceDesk to append the provided
    comment to the specified incident.

    4. Returns a success message if the comment was added successfully, or a failure
    message if an error occurred.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds a comment to a specific incident in CA ServiceDesk via the SOAP API.
