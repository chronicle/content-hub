Assign Incident To User:
  ai_description: >-
    ### General Description

    Assigns an existing incident to a specific user within the CA Service Desk system.
    This action facilitates the delegation of incident management tasks by updating
    the assignee field of a ticket in the external service.


    ### Flow Description

    1. The action initializes the `CaSoapManager` using the API credentials (Api Root,
    Username, Password) configured in the integration settings.

    2. It retrieves the `Ticket ID` and `Username` provided as input parameters.

    3. The action calls the `assign_incident_to_user` method, which performs the following
    steps:
        * Retrieves the internal persistent ID for the incident using `get_incident_id_by_ref_num`
    via a SOAP API call.
        * Retrieves the system ID for the target user using `get_user_id_by_name`
    via a SOAP API call.
        * Executes a SOAP API call (`updateObject`) to update the `assignee` field
    of the incident with the retrieved user ID.
    4. The action concludes by returning a success or failure message based on the
    outcome of the API update.


    ### Additional Notes

    This action requires valid CA Service Desk credentials configured in the integration
    settings. It does not perform any operations on entities within the SOAR platform.
