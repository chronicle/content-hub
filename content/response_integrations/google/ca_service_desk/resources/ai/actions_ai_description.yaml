Wait For Status Change:
  ai_description: >-
    ### General Description

    Monitors a CA Service Desk ticket until it reaches a specified status. This action
    is designed to be used in asynchronous workflows where the platform needs to wait
    for an external process or ticket update to complete before proceeding.


    ### Flow Description

    1. The action connects to the CA Service Desk using the configured credentials.

    2. It retrieves the current status of the ticket specified by the `Ticket ID`
    parameter using the `get_ticket_status` method.

    3. It compares the retrieved status with the `Expected Ticket Status Name` provided
    by the user.

    4. If the current status matches the expected status:
       - The action retrieves the full incident details using the `get_incident_by_id`
    method.
       - The incident data is added to the action results using `siemplify.result.add_result_json`.
       - The action terminates with a completed state.
    5. If the current status does not match the expected status:
       - The action logs the current status and terminates with an `EXECUTION_STATE_INPROGRESS`
    state, signaling the platform to poll again later.

    ### Additional Notes

    This action is an asynchronous polling mechanism. It does not perform any modifications
    to the ticket or external systems; it only performs read operations to verify
    the ticket's state.
