    General Description: This action updates the status of an existing incident in
    the CA Service Desk system. It allows analysts to programmatically change the
    state of a ticket (e.g., closing a ticket or moving it to 'In Progress') directly
    from the SOAR platform.


    Flow Description:

    1. The action initializes the `CaSoapManager` using the provided integration configuration
    (API Root, Username, Password).

    2. It retrieves the `Ticket ID` and the new `Status` from the action parameters.

    3. The `CaSoapManager` performs a lookup to retrieve the system ID for the specified
    status name using the `get_status_id_by_status` method.

    4. The `CaSoapManager` retrieves the internal persistent ID for the provided `Ticket
    ID` using the `get_incident_id_by_ref_num` method.

    5. The action calls the `updateObject` SOAP method to update the ticket's status
    in the CA Service Desk.

    6. The action concludes by returning a success message indicating the status change.


    Additional Notes: This action requires valid credentials for the CA Service Desk
    integration. The status provided must be a valid status name recognized by the
    CA Service Desk instance.
