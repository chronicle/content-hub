Sync Ticket History:
  ai_description: >-
    ### General Description

    Fetches the complete ticket history (comments) from the CA Service Desk for the
    current alert and appends them as comments to the SOAR case. This action provides
    analysts with full context regarding the ticket's lifecycle and communication
    history directly within the SOAR platform.


    ### Flow Description

    1. **Initialization**: The action initializes the `CaSoapManager` using the configured
    API root, username, and password from the `CaServiceDesk` integration settings.

    2. **Context Retrieval**: It retrieves the `external_id` of the current alert
    from the SOAR platform to identify the corresponding ticket in CA Service Desk.

    3. **Data Fetching**: The action calls the `get_incident_comments_since_time`
    method via the `CaSoapManager` to retrieve all comments associated with the ticket
    since the beginning of time (Unix timestamp 0).

    4. **Processing**: It iterates through the retrieved comments, extracting the
    content, analyst name, comment type, and timestamp based on the provided configuration
    parameters.

    5. **Case Update**: For each comment, it formats a string containing the ticket
    details and uses `siemplify.add_comment` to append the information to the SOAR
    case wall.

    6. **Result Generation**: Finally, it adds the raw list of comments to the action's
    result JSON and terminates the action with a success message indicating the number
    of comments added.


    ### Additional Notes

    This action requires a properly configured CA Service Desk integration instance.
    It performs read-only operations on the external CA Service Desk system and does
    not modify external ticket data.
