  ai_description: >-
    Waits for a specific ticket in CA Service Desk to reach an expected status. This
    is an asynchronous action that periodically checks the ticket's status. Once the
    expected status is reached, it retrieves the ticket's details and completes the
    execution.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Ticket ID | String | Yes | The ID of the target ticket to monitor. |

    | Expected Ticket Status Name | String | Yes | The status name to wait for. |


    ### Flow

    1. Connects to the CA Service Desk API.

    2. Retrieves the current status of the specified ticket.

    3. Compares the current status with the expected status.

    4. If the statuses match, retrieves the ticket data, adds it to the JSON result,
    and completes the action.

    5. If the statuses do not match, the action suspends and will be re-triggered
    later to check again.
