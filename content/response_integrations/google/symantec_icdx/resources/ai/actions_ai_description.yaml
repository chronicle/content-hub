  ai_description: "### General Description\nThis action retrieves detailed information\
    \ for a specific event from Symantec ICDX using its unique identifier (UUID).\
    \ It is primarily used to gather granular event data that may not be present in\
    \ the initial alert, allowing analysts to perform deeper investigations into specific\
    \ activities recorded by Symantec ICDX.\n\n### Parameters Description\n| Parameter\
    \ | Description | Type | Mandatory |\n| :--- | :--- | :--- | :--- |\n| Event UUID\
    \ | The unique identifier (UUID) of the event to be retrieved from the Symantec\
    \ ICDX archives. | String | Yes |\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Symantec ICDX manager using the provided API Root\
    \ and API Token from the integration configuration.\n2. **Parameter Retrieval**:\
    \ The `Event UUID` is extracted from the action parameters.\n3. **API Request**:\
    \ The action sends a POST request to the Symantec ICDX search endpoint with a\
    \ specific request type (`id: 0`) designed for direct event retrieval by UUID.\n\
    4. **Data Processing**: \n    * If the event is found, the raw JSON response is\
    \ attached to the action results.\n    * A flattened version of the event data\
    \ is created and added as a data table for visibility in the SOAR interface.\n\
    5. **Completion**: The action concludes with a success message if the event was\
    \ found, or a failure message if the UUID did not match any records."
