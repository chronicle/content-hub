Get Events Minutes Back:
  ai_description: >-
    ### General Description

    Searches for events in Symantec ICDX based on a specified query and a time range
    defined in minutes back from the current time.


    ### Flow Description

    1. Retrieves the action parameters including the search query, limit, minutes
    back, and specific fields to return.

    2. Calculates the start time in milliseconds by subtracting the specified `Minutes
    Back` from the current UTC time.

    3. Makes a POST request to the Symantec ICDX API (`/r3_epmp_i/dx/archives/search`)
    to find events matching the query, start time, and limit.

    4. If events are found, they are added to the action's JSON result and a CSV data
    table is constructed and attached to the action.

    5. The action completes by returning the number of found events.


    ### Additional Notes

    The action allows specifying particular fields to return (comma-separated) and
    limits the number of received events to prevent overwhelming the system.
  ai_short_description: >-
    Searches for events in Symantec ICDX based on a specified query and a time range
    defined in minutes back from the current time.
