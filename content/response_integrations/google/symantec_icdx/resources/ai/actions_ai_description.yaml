    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Symantec ICDX API to retrieve event details
      (fetches_data=true). It does not perform any state-changing operations on external
      systems or the SOAR platform.
