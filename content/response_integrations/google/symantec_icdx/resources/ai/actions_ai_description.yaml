  ai_description: >-
    ### General Description

    The **Get Event** action retrieves specific event data from Symantec ICDX using
    the event's unique identifier (UUID). It provides detailed telemetry data associated
    with the specified event.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Event UUID | String | Yes | The unique identifier (UUID) of the event to retrieve
    from Symantec ICDX. |


    ### Action Flow

    1. **Initialization:** Establishes a connection to the Symantec ICDX API using
    the provided configuration credentials.

    2. **Fetch Event:** Sends a request to retrieve the event details matching the
    provided `Event UUID`.

    3. **Process Results:** If the event is found, the action attaches the raw event
    data as a JSON result and formats it into a data table.

    4. **Output:** Returns a success status and message if the event is successfully
    retrieved, otherwise returns a failure status.
