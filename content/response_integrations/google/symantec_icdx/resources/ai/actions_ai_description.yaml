Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Symantec ICDX (Integrated Cyber Defense Exchange)
    platform. It validates the integration's configuration, including the API Root,
    API Token, and SSL settings, by performing a test API call.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration's global configuration,
    including the `Api Root`, `Api Token`, and `Verify SSL` settings.

    2. **Manager Initialization**: It initializes the `SymantecICDXManager` using
    the retrieved credentials.

    3. **Connectivity Test**: The action executes the `test_connectivity` method,
    which attempts to retrieve a specific event by a hardcoded UUID from the Symantec
    ICDX search endpoint.

    4. **Result Reporting**: If the API call is successful, the action concludes with
    a success status and the message 'Connection Established'. If the connection fails,
    an exception is raised.
