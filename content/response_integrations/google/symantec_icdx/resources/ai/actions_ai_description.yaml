    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by attempting to fetch a specific event
      from the Symantec ICDX API. It does not modify external or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action. According to the instructions, 'Actions named
      Ping must not be categorized as enrichment actions.' Therefore, it is not an
