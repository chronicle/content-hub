Get Events Minutes Back:
  ai_description: >-
    ### General Description

    The **Get Events Minutes Back** action retrieves historical event data from Symantec
    ICDX based on a user-defined query and a relative time window (minutes back from
    the current time). This action is primarily used for log searching and event correlation
    within a specific timeframe, allowing analysts to pull raw event data directly
    into the Google SecOps case for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | string | Yes | The search query string used to filter events in
    Symantec ICDX (e.g., filtering by specific IP, user, or event type). |

    | **Limit** | string | No | The maximum number of events to retrieve. Defaults
    to 10 if not specified. |

    | **Minutes Back** | string | No | The number of minutes to look back from the
    current time to define the start of the search window. Defaults to 60 minutes.
    |

    | **Fields** | string | No | A comma-separated list of specific event fields to
    return (e.g., 'uuid,type,device_ip'). If left empty, all default fields are returned.
    |


    ### Additional Notes

    - This action does not run on specific entities; it performs a global search based
    on the provided query.

    - The action handles API pagination automatically to ensure the requested limit
    of events is reached if available.

    - Results are presented both as a raw JSON object and a flattened data table for
    easier viewing in the SOAR interface.


    ### Flow Description

    1. **Time Calculation:** The action calculates the start timestamp by subtracting
    the 'Minutes Back' value from the current UTC time.

    2. **API Request Construction:** It builds a search payload containing the query,
    start time, and limit. If specific fields are requested, they are added to the
    payload.

    3. **Data Retrieval:** The action executes a POST request to the Symantec ICDX
    search endpoint.

    4. **Pagination:** If the initial response indicates more results are available
    (via a 'next' UUID), the action paginates through the results until the limit
    is met or all events are retrieved.

    5. **Output Generation:** The retrieved events are added to the action results
    as a JSON object and converted into a flattened data table for the case wall.
