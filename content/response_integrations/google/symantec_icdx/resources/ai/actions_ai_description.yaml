  ai_description: >-
    ### General Description

    The **Get Event** action retrieves detailed information for a specific event from
    Symantec ICDX using its unique identifier (UUID). This action is primarily used
    for deep-dive investigations where a specific event ID is already known, allowing
    analysts to pull the full raw data and structured fields associated with that
    event from the ICDX archives.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Event UUID** | string | Yes | The unique universal identifier (UUID) of the
    event to be retrieved from Symantec ICDX. |


    ### Additional Notes

    * This action does not process entities automatically; it requires a manual input
    of the Event UUID.

    * The results are presented both as a raw JSON object and a flattened data table
    for easier viewing within the case wall.


    ### Flow Description

    1. **Configuration Retrieval:** The action starts by fetching the Symantec ICDX
    integration settings, including the API Root, API Token, and SSL verification
    preferences.

    2. **Parameter Extraction:** It retrieves the `Event UUID` provided by the user
    or a previous playbook step.

    3. **API Interaction:** The action calls the Symantec ICDX Manager to perform
    a POST request to the search endpoint (`/r3_epmp_i/dx/archives/search`) with a
    request type ID of `0` (specific to 'get event' requests).

    4. **Data Processing:** If an event is found, the action flattens the dictionary
    data for display.

    5. **Output Generation:** The action populates the JSON result and creates a data
    table named after the UUID. If no event is found, it terminates with a 'Not found'
    message.
