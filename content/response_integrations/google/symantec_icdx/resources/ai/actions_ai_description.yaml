Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec ICDX platform to ensure the integration is
    configured correctly and can communicate with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Token, Verify
    SSL).

    2. Initializes the Symantec ICDX manager.

    3. Makes an HTTP POST request to the Symantec ICDX search API endpoint (`/r3_epmp_i/dx/archives/search`)
    to retrieve a hardcoded event ID.

    4. Evaluates the response to confirm successful authentication and connectivity.

    5. Returns a success message if the connection is established.


    ### Additional Notes

    This action is intended for diagnostic purposes and does not process any entities,
    alerts, or user-provided parameters.
  ai_short_description: >-
    Tests connectivity to the Symantec ICDX platform by attempting to retrieve a specific
