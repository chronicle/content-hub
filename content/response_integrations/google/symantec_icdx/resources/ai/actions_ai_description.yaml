Get Events Minutes Back:
  ai_description: >-
    ### General Description

    Retrieves event logs from Symantec ICDX based on a specified query and time range.
    This action allows analysts to query historical telemetry data from the Symantec
    ICDX platform to support investigation and threat hunting activities.


    ### Flow Description

    1. Initialize the `SymantecICDXManager` using the provided API credentials and
    configuration.

    2. Calculate the start time in milliseconds by subtracting the `Minutes Back`
    parameter (defaulting to 60 minutes) from the current UTC time.

    3. Execute a POST request to the Symantec ICDX search API (`/r3_epmp_i/dx/archives/search`)
    using the provided `Query`, `Limit`, `Fields`, and the calculated start time.

    4. If events are returned, add the raw JSON data to the action results and format
    the events into a data table for display in the SOAR platform.

    5. Return the total count of found events as the action output.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within Symantec
    ICDX or the SOAR platform. It relies on user-provided parameters rather than specific
    case entities.
