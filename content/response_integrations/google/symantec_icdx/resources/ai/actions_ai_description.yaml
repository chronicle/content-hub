  ai_description: >-
    ### General Description

    Tests the connectivity to the Symantec ICDX (Integrated Cyber Defense Exchange)
    platform to ensure that the provided credentials and API endpoint are valid and
    reachable. This action is primarily used for troubleshooting and verifying the
    integration setup.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the `SymantecICDXManager` using
    the integration's configuration parameters, including the API Root, API Token,
    and SSL verification settings.

    2. **Connectivity Test**: It calls the `test_connectivity` method, which attempts
    to retrieve a specific hardcoded event UUID from the ICDX archives to verify API
    access.

    3. **Validation**: The manager validates the HTTP response from the Symantec ICDX
    API.

    4. **Completion**: If the API call is successful, the action concludes with a
    "Connection Established" status.
