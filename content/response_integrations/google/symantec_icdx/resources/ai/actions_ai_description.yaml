Get Events Minutes Back:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action performs a search against the Symantec ICDX platform to retrieve
      historical logs based on a query and time range. This directly matches the 'Search
      Events' category. It does not perform enrichment on entities, update alerts,
      or modify external configurations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: true
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action retrieves security events from Symantec ICDX based on a specific search
    query and a relative time window (minutes back from the current time). It is primarily
    used for log searching and event retrieval to gather historical context within
    a SOAR workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The search query string to be executed against the Symantec
    ICDX archives. |

    | Limit | Integer | No | The maximum number of events to retrieve. Defaults to
    10 if not specified. |

    | Minutes Back | Integer | No | The number of minutes to look back from the current
    time for the search window. Defaults to 60 if not specified. |

    | Fields | String | No | A comma-separated list of specific event fields to include
    in the results. If left empty, all default fields are returned. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Symantec ICDX
    API using the provided API Root and Token.

    2. **Time Calculation**: It calculates the start time for the search by subtracting
    the 'Minutes Back' value from the current UTC time, converted to milliseconds.

    3. **Search Execution**: It sends a POST request to the ICDX search endpoint with
    the query, start time, and limit. If specific fields are provided, they are included
    in the request payload.

    4. **Pagination**: If the initial response indicates more results are available
    (via a 'next' UUID), the action automatically paginates through the results to
    fulfill the request.

    5. **Data Processing**: The retrieved events are flattened and formatted.

    6. **Output**: The action populates the 'JsonResult' with the raw event data and
    creates a data table in the SOAR case containing the flattened event details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Symantec ICDX API to search for and
      retrieve event logs. It does not modify any external systems (read-only search).
      It does not modify internal SOAR case data (entities, insights, or case comments),
      but rather outputs the retrieved data to the action result and a data table
      for the analyst to review.
  categories:
    enrichment: false
    reasoning: >-
      While the action fetches data, it is a general search utility and does not operate
      on specific entities or alerts to provide enrichment context. Therefore, it
      does not meet the criteria for an Enrichment Action.
  entity_usage:
