Ping:
  ai_description: >-
    General Description

    Tests connectivity to the Symantec ICDX integration. This action verifies that
    the integration configuration is correct and that the SOAR platform can successfully
    communicate with the Symantec ICDX instance.


    Flow Description

    1. The action initializes the `SymantecICDXManager` using the provided API Root,
    API Token, and SSL verification settings from the integration configuration.

    2. The action calls the `test_connectivity` method of the manager.

    3. The `test_connectivity` method performs a POST request to the Symantec ICDX
    search API to retrieve a specific event (using a hardcoded UUID).

    4. If the request is successful, the action concludes with a success message.


    Additional Notes

    This action is used to verify that the integration configuration is correct and
    that the SOAR platform can communicate with the Symantec ICDX instance.
