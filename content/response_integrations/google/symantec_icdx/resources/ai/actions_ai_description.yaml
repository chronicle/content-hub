Get Event:
  ai_description: >-
    ### General Description

    Retrieves detailed event information from Symantec ICDX using a specific Event
    UUID. This action allows analysts to pull raw event data directly from the Symantec
    Integrated Cyber Defense Exchange (ICDX) for further investigation.


    ### Flow Description

    1. The action initializes the `SymantecICDXManager` using the provided API configuration
    (API Root, API Token).

    2. It retrieves the `Event UUID` parameter from the action input.

    3. It calls the `get_event` method, which sends a POST request to the Symantec
    ICDX API (`/r3_epmp_i/dx/archives/search`) with the provided UUID in the payload.

    4. If the event is found, the action adds the raw JSON response and a flattened
    data table to the action results.

    5. The action concludes by returning a success status and an output message indicating
    whether the event was found.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in Symantec
    ICDX or the SOAR platform.
  ai_short_description: >-
    Retrieves detailed event information from Symantec ICDX using a specific Event
    UUID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
