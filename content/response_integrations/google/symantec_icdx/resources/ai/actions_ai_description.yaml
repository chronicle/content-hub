  ai_description: >-
    ### General Description

    The `SymantecICDX - Get Events Minutes Back` action searches and retrieves historical
    events from Symantec ICDX based on a specified query and a time range defined
    in minutes back from the current time. The retrieved events are added to the action's
    JSON result and displayed in a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | The search query string used to filter events in Symantec
    ICDX. |

    | Limit | String | No | The maximum number of events to retrieve. Defaults to
    10 if not provided. |

    | Minutes Back | String | No | The number of minutes back from the current time
    to start fetching events. Defaults to 60 if not provided. |

    | Fields | String | No | A comma-separated list of specific event fields to return.
    If not provided, all fields are returned. |


    ### Flow Description

    1. The action initializes the Symantec ICDX manager using the provided API credentials
    and SSL verification settings.

    2. It retrieves the input parameters: `Query`, `Limit`, `Minutes Back`, and `Fields`.

    3. It calculates the start time in milliseconds by subtracting the `Minutes Back`
    value from the current UTC time.

    4. It executes the search query against the Symantec ICDX API, applying the limit,
    start time, and requested fields (if any).

    5. If events are found, they are added to the action's JSON result and formatted
    into a CSV data table.

    6. The action completes and returns a message indicating the number of events
    found.
