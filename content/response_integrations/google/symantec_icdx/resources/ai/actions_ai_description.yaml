Get Event:
  ai_description: >-
    ### General Description

    Retrieves specific event data from Symantec ICDX using the event's unique identifier
    (UUID).


    ### Flow Description

    1. Retrieves the `Event UUID` parameter provided by the user or playbook.

    2. Makes an API call to Symantec ICDX to fetch the event data associated with
    the provided UUID.

    3. If the event is found, adds the event data to the action's JSON result and
    creates a flat data table.

    4. Returns a success message if the event is found, or a failure message if it
    is not found.


    ### Additional Notes

    None.
  ai_short_description: >-
    Retrieves specific event data from Symantec ICDX using the event's unique identifier
    (UUID).
