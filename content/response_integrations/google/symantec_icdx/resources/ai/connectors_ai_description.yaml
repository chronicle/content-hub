SymantecICDX query Connector:
  ai_description: >-
    ### General Description

    The Symantec ICDX Query Connector enables the ingestion of security events from
    a Symantec Integrated Cyber Defense Exchange (ICDX) server into Google SecOps.
    It allows users to define custom search queries to filter specific events, ensuring
    that only relevant security data is ingested. The connector maintains state to
    prevent duplicate event ingestion and supports proxy configurations for secure
    network communication.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | Api Root | String | Yes | The base URL of the Symantec ICDX API. |

    | Api Token | String | Yes | The API token for authentication. |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates on connection.
    |

    | Search Query | String | Yes | The query string used to search for events in
    ICDX. |

    | Events Limit | Integer | Yes | The maximum number of events to pull in one cycle.
    |

    | Max Days Backwards | Integer | Yes | The maximum number of days to fetch events
    since. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username to authenticate with. |

    | Proxy Password | String | No | The proxy password to authenticate with. |


    ### Flow Description

    1. The connector initializes by connecting to the Symantec ICDX API using the
    provided credentials and proxy settings.

    2. It determines the start time for the query based on the last execution timestamp
    or the configured `Max Days Backwards` limit.

    3. It executes the configured `Search Query` against the Symantec ICDX API to
    retrieve events.

    4. The connector filters out previously processed events using a local `ids.json`
    file to ensure deduplication.

    5. For each new event, it maps the data to a Google SecOps `CaseInfo` object,
    including relevant fields like device product and event time.

    6. It checks for overflow conditions to prevent system overload.

    7. Finally, it saves the updated timestamp and processed event IDs to maintain
    state for the next execution cycle.
