SymantecICDX query Connector:
  ai_description: >-
    ### General Description

    This connector integrates with the Symantec ICDX server to fetch security events
    based on a user-defined query. It enables security teams to ingest relevant logs
    or alerts into Google SecOps for centralized monitoring, investigation, and case
    management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    python process. |

    | Api Root | String | Yes | The base URL of the Symantec ICDX API. |

    | Api Token | String | Yes | The API token for authentication. |

    | Verify SSL | Boolean | Yes | Whether to use SSL verification for the connection.
    |

    | Search Query | String | Yes | The query string used to filter events from Symantec
    ICDX. |

    | Events Limit | Integer | Yes | The maximum number of events to pull in one cycle.
    |

    | Max Days Backwards | Integer | Yes | The maximum number of days to look back
    when fetching events. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username to authenticate with. |

    | Proxy Password | String | No | The proxy password to authenticate with. |


    ### Flow Description

    1. The connector initializes a connection to the Symantec ICDX API using the provided
    credentials and API root.

    2. It determines the start time for the query based on the last successful run
    timestamp or the configured 'Max Days Backwards' parameter.

    3. It executes the 'Search Query' against the Symantec ICDX API to retrieve events.

    4. It filters out events that have already been processed by checking against
    a local 'ids.json' file.

    5. For each new event, it maps the data to a Google SecOps 'CaseInfo' object,
    including relevant fields like device vendor, product, and event time.

    6. It checks for overflow conditions to prevent ingestion issues.

    7. Finally, it saves the new timestamp and updates the 'ids.json' file to track
    processed events for the next cycle.
