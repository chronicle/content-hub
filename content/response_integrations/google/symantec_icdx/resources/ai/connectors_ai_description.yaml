SymantecICDX query Connector:
  ai_description: >-
    ### General Description


    The SymantecICDX Query Connector enables the ingestion of security events from
    the Symantec Integrated Cyber Defense Exchange (ICDX) into Google SecOps. By utilizing
    the ICDX Search API, the connector allows security teams to define specific search
    queries to filter and pull relevant telemetry, which is then transformed into
    actionable cases within the SOAR platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name in the ICDX event used to
    determine the device product (defaults to `device_product`). |

    | EventClassId | String | No | The field name used to determine the event name
    or sub-type (defaults to `name`). |

    | PythonProcessTimeout | String | Yes | The timeout limit (in seconds) for the
    python process running the script. |

    | Api Root | String | Yes | The base URL of the Symantec ICDX API instance. |

    | Api Token | Password | Yes | The API token used for Basic Authentication with
    the ICDX server. |

    | Verify SSL | Boolean | Yes | Specifies whether to verify the SSL certificate
    of the ICDX server. |

    | Search Query | String | Yes | The ICDX-specific query string used to filter
    events (e.g., `category_id = 1`). |

    | Events Limit | Integer | Yes | The maximum number of events to pull in a single
    execution cycle. |

    | Max Days Backwards | Integer | Yes | The maximum number of days to look back
    for events during the initial run or if the timestamp is lost. |

    | Proxy Server Address | String | No | The address of the proxy server if one
    is required for the connection. |

    | Proxy Username | String | No | The username for proxy authentication. |

    | Proxy Password | Password | No | The password for proxy authentication. |


    ### Flow Description


    1.  **Initialization**: The connector initializes the connection to the Symantec
    ICDX API using the provided API Root and Token.

    2.  **Time Management**: It retrieves the last successful execution timestamp.
    If no timestamp exists, it calculates the start time based on the `Max Days Backwards`
    parameter.

    3.  **Data Retrieval**: The connector sends a POST request to the ICDX search
    endpoint (`/r3_epmp_i/dx/archives/search`) containing the `Search Query`, `start_time`,
    and `limit`.

    4.  **Pagination**: If the ICDX response indicates more data is available (via
    a `next` UUID), the connector iteratively fetches additional pages until the limit
    is reached or no more data remains.

    5.  **Deduplication**: It filters out events that have already been processed
    by comparing event UUIDs against a local tracking file (`ids.json`) that stores
    IDs from the last 72 hours.

    6.  **Case Creation**: For each unique event, the connector maps ICDX fields (such
    as `message`, `uuid`, and `log_time`) to Google SecOps Case objects. It flattens
    the event JSON to ensure all data is available within the case events.

    7.  **Overflow Check**: The connector checks if the alert should be filtered out
    based on configured overflow rules in Google SecOps.

    8.  **Finalization**: Successfully processed cases are ingested, the execution
    timestamp is updated to the time of the latest event, and the processed IDs are
    saved to prevent future duplicates.
