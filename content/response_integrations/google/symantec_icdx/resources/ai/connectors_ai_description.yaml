SymantecICDX query Connector:
  ai_description: >-
    ### General Description

    The Symantec ICDX Query Connector enables the ingestion of security events from
    the Symantec Integrated Cyber Defense Exchange (ICDX) server into Google SecOps
    SOAR. By executing custom search queries against the ICDX API, the connector retrieves
    relevant security events, transforms them into standardized SOAR cases, and facilitates
    automated incident response workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | The field name used to determine the device
    product. |

    | EventClassId | String | No | The field name used to determine the event name
    (sub-type). |

    | PythonProcessTimeout | Integer | Yes | The timeout limit (in seconds) for the
    python process. |

    | Api Root | String | Yes | The base URL of the Symantec ICDX API. |

    | Api Token | String | Yes | The API token for authentication. |

    | Verify SSL | Boolean | Yes | Whether to verify SSL certificates on connection.
    |

    | Search Query | String | Yes | The query string used to search for events in
    ICDX. |

    | Events Limit | Integer | Yes | Maximum number of events to pull in one cycle.
    |

    | Max Days Backwards | Integer | Yes | Maximum number of days to fetch events
    since. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username to authenticate with. |

    | Proxy Password | String | No | The proxy password to authenticate with. |


    ### Flow Description

    1. **Authentication & Initialization**: The connector initializes a connection
    to the Symantec ICDX API using the provided API Root and Token.

    2. **Timestamp Calculation**: It determines the start time for the query based
    on the last successful execution timestamp, constrained by the `Max Days Backwards`
    parameter.

    3. **Event Retrieval**: It executes the configured `Search Query` against the
    ICDX API to fetch events, handling pagination if necessary.

    4. **Deduplication**: Retrieved events are compared against a local `ids.json`
    file to filter out previously processed alerts.

    5. **Case Creation**: Valid events are mapped to SOAR `CaseInfo` objects, including
    relevant metadata like start time, end time, and environment.

    6. **Overflow Check & Ingestion**: The connector checks for overflow conditions
    for each case. If no overflow is detected, the case is ingested into the SOAR
    platform, and the local state (timestamp and processed IDs) is updated.
