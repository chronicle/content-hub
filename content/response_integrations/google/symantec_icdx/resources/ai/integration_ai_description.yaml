  reasoning: >-
    The Symantec ICDX integration functions primarily as a log ingestion and event
    search platform. The connector is designed to ingest security events from the
    Symantec Integrated Cyber Defense Exchange (ICDX) into the SOAR platform, and
    the available actions ('Get Event', 'Get Events Minutes Back') allow analysts
    to search and retrieve historical event data. This capability directly aligns
    with the SIEM category, which focuses on log aggregation, event searching, and
    providing visibility into security activity across the enterprise. The integration
    does not provide specific capabilities for EDR (process-level analysis/containment),
    Threat Intelligence (reputation enrichment), Email Security, IAM, Cloud Security,
    ITSM, Vulnerability Management, Asset Inventory, or Collaboration.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
