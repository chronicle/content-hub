  reasoning: >-
    The Symantec ICDX (Integrated Cyber Defense Exchange) integration functions primarily
    as a data aggregator and log collector. Its connector is designed to ingest security
    events and logs into the Google SecOps platform for centralized monitoring and
    investigation. The available actions ('Get Event' and 'Get Events Minutes Back')
    allow analysts to search through these historical logs to identify activity related
    to assets or users. This aligns directly with the SIEM category, which focuses
    on log ingestion, centralized monitoring, and searching for activity across logs.
    It does not provide EDR, Network Security, Threat Intelligence, or other specialized
    security management capabilities.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
