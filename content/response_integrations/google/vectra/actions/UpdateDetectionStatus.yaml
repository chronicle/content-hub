name: Update Detection Status
description: Update status of the detection.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vectra#update_detection_status
integration_identifier: Vectra
parameters:
-   name: Detection ID
    default_value: ''
    type: string
    description: Specify the detection ID on which you want to update the status.
    is_mandatory: true
-   name: Status
    default_value: Fixed
    type: ddl
    optional_values:
    - Fixed
    - Inactive
    description: Specify what status to set on the detection.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
