name: Get Triage Rule Details
description: Get detailed information about triage rules.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vectra#get_triage_rule_details
integration_identifier: Vectra
parameters:
-   name: Triage Rule IDs
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of triage rule IDs. Example: 28,29.'
    is_mandatory: true
-   name: Create Insights
    default_value: true
    type: boolean
    description: If enabled, action will create a separate insight for every processed
        triage rule.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_triage_rule_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
