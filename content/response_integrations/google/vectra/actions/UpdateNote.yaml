name: Update Note
description: Update note for the endpoint or detection.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vectra#update_note
integration_identifier: Vectra
parameters:
-   name: Item Type
    default_value: Endpoint
    type: ddl
    optional_values:
    - Endpoint
    - Detection
    description: Select on which item type you want to update a note.
    is_mandatory: true
-   name: Item ID
    default_value: ''
    type: string
    description: Specify ID of the detection/endpoint.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: Specify what note you want to have on the detection/endpoint.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
