name: Remove Tags
description: Remove tags from the endpoint or detection in Vectra.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vectra#remove_tags
integration_identifier: Vectra
parameters:
-   name: Item Type
    default_value: Endpoint
    type: ddl
    optional_values:
    - Endpoint
    - Detection
    description: Select from which item type you want to remove tags.
    is_mandatory: true
-   name: Item ID
    default_value: ''
    type: string
    description: Specify ID of the detection/endpoint.
    is_mandatory: true
-   name: Tags
    default_value: ''
    type: string
    description: Specify what tags you want to remove from detection/endpoint. Tags
        should be separated by comma, e.g tag1, tag2.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
