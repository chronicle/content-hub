Update Note:
  ai_description: >-
    ### General Description

    Updates a note for a specific endpoint or detection in Vectra. This action allows
    analysts to append or modify the note associated with a given item directly within
    the Vectra platform.


    ### Flow Description

    1. Retrieves the `Item Type`, `Item ID`, and `Note` from the action parameters.

    2. Makes a GET request to the Vectra API to verify that the specified endpoint
    or detection exists.

    3. If the item exists, makes a PATCH request to the Vectra API (`/api/v2.1/hosts/{item_id}`
    or `/api/v2.1/detections/{item_id}`) with the new note payload.

    4. Returns a success message upon successful update, or an error message if the
    item is not found or the update fails.


    ### Additional Notes

    Ensure that the provided Item ID corresponds to the selected Item Type (Endpoint
    or Detection) in Vectra.
  ai_short_description: >-
    Updates a note for a specific endpoint or detection in Vectra based on the provided
    Item ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the note associated with a specific endpoint or detection in the Vectra
      platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the Vectra API to update a note on a specific
      endpoint or detection, which mutates external data. It does not fetch contextual
      data for enrichment, nor does it mutate internal SecOps data, update entities,
      or create insights.
