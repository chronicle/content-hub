Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by fetching endpoint system information
    from Vectra. This action retrieves contextual metadata about the endpoint, such
    as its state, threat score, certainty, tags, and privilege level, and attaches
    this information to the entity within the SecOps platform.


    ### Flow Description

    1. Initializes the Vectra integration using the provided API credentials.

    2. Filters the target entities to include only those of type `ADDRESS` (IP Address)
    or `HOSTNAME`.

    3. For each suitable entity, makes a GET request to the Vectra API (`api/v2.1/hosts`)
    to retrieve endpoint details associated with the entity's identifier.

    4. Filters the retrieved endpoints to ensure an exact match with the entity's
    identifier (by name or IP).

    5. If a match is found, enriches the entity's `additional_properties` with the
    endpoint data and marks the entity as enriched.

    6. Updates the successfully enriched entities in the Google SecOps platform and
    attaches the results as JSON and entity tables.


    ### Additional Notes

    - If multiple matches are found in Vectra for a single entity, the action will
    only use the first match for enrichment.

    - Entities that do not return any matching endpoints from Vectra will be skipped
    and reported as failed in the output message.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by fetching endpoint system information
    from Vectra.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Vectra API to fetch endpoint details (fetches_data=true).
      It does not mutate external data. It updates the entities in the platform with
      the fetched data by calling `siemplify.update_entities` (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
