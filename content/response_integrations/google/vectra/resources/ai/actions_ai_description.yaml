  ai_description: >-
    Removes specified tags from an endpoint or detection in Vectra.


    ### General Description

    This action connects to Vectra to remove one or more tags from a specific endpoint
    or detection. It first retrieves the current tags of the specified item, removes
    the requested tags from the list, and then updates the item with the new tag list.


    ### Flow Description

    1. Retrieves the specified item (Endpoint or Detection) from Vectra using the
    provided Item ID.

    2. Extracts the existing tags from the retrieved item.

    3. Identifies which of the provided tags exist on the item and removes them from
    the list.

    4. Sends a request to Vectra to update the item with the modified list of tags.

    5. Returns a success message if the tags were successfully removed, or an error
    if the item or tags were not found.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Item Type | Dropdown | Yes | Select from which item type you want to remove
    tags. Options are 'Endpoint' or 'Detection'. |

    | Item ID | String | Yes | Specify the ID of the detection or endpoint in Vectra.
    |

    | Tags | String | Yes | Specify what tags you want to remove from the detection/endpoint.
    Tags should be separated by a comma (e.g., tag1, tag2). |
