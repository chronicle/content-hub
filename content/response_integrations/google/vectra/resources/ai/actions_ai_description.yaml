Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (Hostname or IP Address) by retrieving detailed system
    information from the Vectra platform. This action helps security analysts gain
    context about endpoints involved in potential security incidents.


    ### Flow Description

    1. Initialize the `VectraManager` with the provided API credentials and SSL verification
    setting.

    2. Filter the `target_entities` to process only those of type `HOSTNAME` or `ADDRESS`.

    3. For each valid entity, call the Vectra API (`GET /api/v2.1/hosts`) to fetch
    endpoint details.

    4. Match the retrieved endpoint data against the entity identifier.

    5. If a match is found, update the entity's `additional_properties` with the retrieved
    enrichment data and set the `is_enriched` flag to true.

    6. Add the enrichment data to the action's JSON and CSV results.

    7. Update the entities in the SOAR platform with the new information.


    ### Additional Notes

    This action requires valid Vectra API credentials. It supports both Hostname and
    IP Address entities.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with system details retrieved from the
    Vectra platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and sets the is_enriched flag within the
      SOAR platform.
    reasoning: >-
      The action makes a GET request to the Vectra API to fetch endpoint details.
