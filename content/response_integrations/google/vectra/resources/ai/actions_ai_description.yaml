Add Tags:
  ai_description: >-
    ### General Description

    Adds tags to a specific endpoint or detection in Vectra. This action allows analysts
    to categorize or label items directly within the Vectra platform for better tracking
    and organization.


    ### Flow Description

    1. Extracts the target `Item Type` (Endpoint or Detection), `Item ID`, and the
    `Tags` to be added from the action parameters.

    2. Makes a GET request to the Vectra API to retrieve the current information and
    existing tags for the specified endpoint or detection.

    3. Appends the new, comma-separated tags to the retrieved list of existing tags.

    4. Makes a PATCH request to the Vectra API to update the item with the newly combined
    list of tags.


    ### Additional Notes

    The action requires the exact Item ID of the endpoint or detection in Vectra.
    It preserves existing tags by fetching them first and appending the new ones.
  ai_short_description: >-
    Adds specified tags to an endpoint or detection in Vectra by retrieving existing
    tags and appending the new ones via the Vectra API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the tags of a specific endpoint or detection in the Vectra platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to retrieve the existing tags
      of the item. It then mutates external data by making a PATCH request to Vectra
      to update the item's tags. It does not mutate internal SecOps data, update entities,
      or create insights.
