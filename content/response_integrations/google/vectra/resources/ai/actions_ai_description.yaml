  ai_description: >-
    Adds tags to a specific endpoint or detection in Vectra.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Item Type | Dropdown | Yes | Select whether to add tags to an 'Endpoint' or
    a 'Detection'. |

    | Item ID | String | Yes | The ID of the detection or endpoint in Vectra. |

    | Tags | String | Yes | A comma-separated list of tags to add to the detection
    or endpoint (e.g., tag1, tag2). |


    ### Flow

    1. Retrieves the current information of the specified endpoint or detection from
    Vectra.

    2. Extracts the existing tags from the retrieved item.

    3. Appends the new tags provided in the parameters to the existing tags.

    4. Sends a request to Vectra to update the endpoint or detection with the combined
    list of tags.
