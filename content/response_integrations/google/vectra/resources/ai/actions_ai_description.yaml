Add Tags:
  ai_description: >-
    ### General Description

    Adds tags to an endpoint or detection in Vectra. This action retrieves the current
    item details, appends the specified tags, and updates the item in the Vectra platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL).

    2. Extracts action parameters (Item Type, Item ID, Tags).

    3. Initializes the `VectraManager`.

    4. Calls `get_item_info` to retrieve the current item details from Vectra.

    5. Parses the new tags from the input string.

    6. Appends the new tags to the existing tags of the item.

    7. Calls `update_tags` (PATCH request) to update the item in Vectra with the combined
    list of tags.


    ### Additional Notes

    Tags should be provided as a comma-separated string (e.g., tag1, tag2).
  ai_short_description: >-
    Adds tags to a specified endpoint or detection in Vectra.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates tags on an endpoint or detection in Vectra.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to retrieve item info and a PATCH request to
      update tags in Vectra. It does not mutate internal SOAR data.
