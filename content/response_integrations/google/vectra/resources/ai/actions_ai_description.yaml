Get Triage Rule Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific triage rules from the Vectra platform.
    This action allows analysts to fetch configuration details for triage rules by
    providing their IDs, facilitating better understanding of detection logic and
    triage categories.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) and action
    parameters (Triage Rule IDs, Create Insights).

    2. Initializes the `VectraManager` to interact with the Vectra API.

    3. Iterates through the provided list of Triage Rule IDs.

    4. For each ID, performs a GET request to the Vectra API (`/api/v2.1/rules/{triage_id}`)
    to fetch rule details.

    5. If `Create Insights` is enabled, generates a case insight for each successfully
    retrieved rule using `siemplify.create_case_insight`.

    6. Aggregates successful results into a JSON result and a data table for the action
    output.


    ### Additional Notes

    The action handles missing triage rules gracefully by logging failures and reporting
    them in the output message. It does not modify any external system state.
  ai_short_description: >-
    Retrieves detailed information about specific triage rules from the Vectra platform.
