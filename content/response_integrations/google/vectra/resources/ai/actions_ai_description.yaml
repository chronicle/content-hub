Update Note:
  ai_description: >-
    ### General Description

    Updates a note on a specific endpoint or detection within the Vectra platform.
    This action allows analysts to append contextual information or findings directly
    to an item in Vectra.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) to establish
    a connection to the Vectra platform.

    2. Extracts action parameters (Item Type, Item ID, Note) provided by the user.

    3. Initializes the `VectraManager` to interact with the Vectra API.

    4. Calls `get_item_info` (API GET request) to verify the existence of the specified
    item (Endpoint or Detection) in Vectra.

    5. If the item is found, calls `update_note` (API PATCH request) to update the
    note field for the specified item.

    6. Returns a success message or an error if the item is not found or the API request
    fails.


    ### Additional Notes

    This action modifies external data in the Vectra platform. It does not interact
    with Google SecOps entities directly.
  ai_short_description: >-
    Updates a note on a specified endpoint or detection in the Vectra platform.
