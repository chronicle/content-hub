Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Vectra API using the provided integration configuration
    parameters. This action ensures that the Google SecOps platform can successfully
    authenticate and communicate with the Vectra server.


    ### Flow Description

    1. Extracts the API Root, API Token, and SSL verification settings from the integration
    configuration.

    2. Initializes the VectraManager with the provided credentials.

    3. Makes a GET request to the Vectra API (`api/v2.1/hosts`) to verify connectivity
    and authentication.

    4. Returns a success message if the connection is established, or an error message
    if the request fails.


    ### Additional Notes

    This action is primarily used for diagnostic purposes during setup or troubleshooting
    to ensure the integration is correctly configured.
