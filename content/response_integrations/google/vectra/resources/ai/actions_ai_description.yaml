    ### General Description

    Tests connectivity to the Vectra server using the provided API credentials. This
    action verifies that the integration is correctly configured and can communicate
    with the Vectra API.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `API Token`, `Verify SSL`) from
    the integration settings.

    2. Initializes the `VectraManager` with the provided credentials.

    3. Executes `test_connectivity()` which performs a `GET` request to the Vectra
    API endpoint (`api/v2.1/hosts`).

    4. Validates the response; if successful, returns a success message; otherwise,
    returns an error message.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Vectra server.
