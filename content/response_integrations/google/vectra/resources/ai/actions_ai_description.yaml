  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using Vectra. This action retrieves
    endpoint details including state, threat score, certainty, tags, and privilege
    level. It updates the entity's additional properties with the retrieved data and
    attaches a JSON result and a data table to the action's results.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. Iterates over the target entities, filtering for Hostname and IP Address types.

    2. For each suitable entity, queries Vectra for endpoint details matching the
    entity's identifier.

    3. If a match is found, enriches the entity's additional properties with the endpoint
    data and marks it as enriched.

    4. Attaches the endpoint details as a JSON result and a CSV table to the action's
    output.

    5. Updates the enriched entities in the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional properties of the target entities with the fetched endpoint
      details.
    reasoning: >-
      The action fetches endpoint details from Vectra using a GET request, so it fetches
      data. It does not perform any POST/PUT/DELETE requests to external systems,
      so it does not mutate external data. It updates the internal entities with the
      fetched data using `siemplify.update_entities`, so it mutates internal data
      and updates entities. It does not create insights, modify alert data, or create
      case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Vectra) to enrich entities.
      It does not mutate external data and only performs allowed internal mutations
      (updating entities). Therefore, it is classified as an Enrichment action. It
      does not perform any remediation tasks.
    remediation: false
  entity_usage:
