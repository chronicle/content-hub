  ai_description: >-
    ### General Description

    Retrieves detailed information about specific triage rules from Vectra.


    ### Flow Description

    1. Extracts the provided Triage Rule IDs and the Create Insights flag.

    2. Initializes the Vectra API client.

    3. Iterates over the provided Triage Rule IDs.

    4. Makes a GET request to the Vectra API (`/api/v2.1/rules/{triage_id}`) to fetch
    the details of each triage rule.

    5. If the `Create Insights` parameter is enabled, generates a case insight for
