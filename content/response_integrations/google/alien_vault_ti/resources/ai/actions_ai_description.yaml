Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AlienVault TI integration.


    ### Flow Description

    1. Retrieves the API key from the integration configuration.

    2. Makes a dummy GET request to the `user/me` endpoint of the AlienVault OTX API.

    3. Returns a success message if the connection is established, or a failure message
    if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly.
