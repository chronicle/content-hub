Ping:
  ai_description: >-
    ### General Description

    Validates the connectivity between the SOAR platform and the AlienVault OTX API.
    This action ensures that the integration is correctly configured and that the
    provided API key has valid access to the AlienVault OTX service.


    ### Flow Description

    1. Retrieve the API Key from the integration configuration.

    2. Initialize the `AlienVaultTIManager` using the retrieved API Key.

    3. Execute the `test_connectivity` method, which performs a GET request to the
    AlienVault OTX `user/me` endpoint.

    4. Return a success message ("Connection Established.") if the API call returns
    a valid response, or a failure message ("Connection Failed.") if an exception
    occurs.


    ### Additional Notes

    This action is used for troubleshooting and verifying integration settings. It
    does not process any entities or modify any data.
