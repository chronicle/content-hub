Enriches Entities:
  ai_description: >-
    ### General Description

    Enriches external IP addresses, file hashes, URLs, and hostnames with threat intelligence
    from the AlienVault OTX platform. This action retrieves reputation data and associated
    metadata to provide context for security investigations, helping analysts identify
    potential threats.


    ### Flow Description

    1. Initialize the `AlienVaultTIManager` using the provided API Key.

    2. Iterate through the `target_entities` provided in the SOAR case.

    3. For each entity, check its type (ADDRESS, FILEHASH, URL, or HOSTNAME).

    4. If the entity is an external IP address or hostname, or a valid file hash or
    URL, perform an API call to AlienVault OTX to fetch threat intelligence data.

    5. If data is retrieved, parse the response, update the entity's `additional_properties`
    with the retrieved intelligence, add a CSV table to the entity, and mark the entity
    as enriched (`is_enriched = True`).

    6. Update the SOAR case with the enriched entities using `siemplify.update_entities`.

    7. Return a JSON result containing the intelligence data for all processed entities.


    ### Additional Notes

    The action skips internal IP addresses and hostnames. It handles API timeouts
    and errors gracefully, ensuring that failed entities do not stop the entire process.
  ai_short_description: >-
    Enriches IP addresses, file hashes, URLs, and hostnames with threat intelligence
    data from AlienVault OTX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and marks entities as enriched within the
      SOAR platform.
    reasoning: >-
      The action makes GET requests to the AlienVault OTX API to fetch threat intelligence
      data (fetches_data=true). It updates the entities within the SOAR platform with
      additional properties and enrichment status (can_mutate_internal_data=true,
      can_update_entities=true). It does not mutate external systems or create insights/comments.
