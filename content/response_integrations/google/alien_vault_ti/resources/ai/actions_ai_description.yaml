Enriches Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, File Hash, URL, and Hostname entities using AlienVault Threat
    Intelligence (TI). This action retrieves threat intelligence data for external
    entities, updates the entity's properties with the findings, and attaches a CSV
    table containing the detailed report to the entity.


    ### Flow Description

    1. Iterates through the target entities in the case.

    2. Filters entities by supported types (Address, File Hash, URL, Hostname) and
    ensures Address and Hostname entities are not internal.

    3. Makes a GET request to the AlienVault OTX API to fetch threat intelligence
    data for each valid entity.

    4. Parses the retrieved data, updates the entity's `additional_properties` (including
    country code), and sets the `is_enriched` flag to true.

    5. Attaches a CSV table with the flattened report to the entity.

    6. Updates the entities within the Google SecOps platform and returns a JSON result
    with the raw data.


    ### Additional Notes

    Internal IP addresses and hostnames are skipped during execution.
  ai_short_description: >-
    Enriches external IP Address, File Hash, URL, and Hostname entities with threat
    intelligence data from AlienVault TI.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the AlienVault API to fetch indicator data.
      It does not mutate external data. It updates internal entities with the fetched
      data and adds entity tables, but does not create insights or case comments.
