Upload an Object To a Bucket:
  ai_description: >-
    ### General Description

    Uploads a local file to a specified Google Cloud Storage bucket. This action interacts
    with the Google Cloud Storage API to transfer a file from the local file system
    to a designated bucket, allowing for automated file storage and management within
    the cloud environment.


    ### Flow Description

    1. Extracts configuration parameters (Service Account, Workload Identity, etc.)
    to authenticate with the Google Cloud Storage API.

    2. Extracts action parameters (Bucket Name, Object Name, Source File Path) provided
    by the user.

    3. Initializes the `GoogleCloudStorageManager` to establish a connection with
    the Google Cloud Storage service.

    4. Retrieves the target bucket using `manager.get_bucket` to verify its existence
    and accessibility.

    5. Validates that the source file exists at the provided path and is not a directory.

    6. Uploads the file to the specified bucket using `manager.upload_file`.

    7. Returns the uploaded blob details (ID, name, MD5 hash, path) as a JSON result.


    ### Additional Notes

    This action requires valid credentials and appropriate IAM permissions to access
    the specified Google Cloud Storage bucket. The action will fail if the bucket
    does not exist, the file path is invalid, or if the service account lacks the
    necessary permissions to upload objects.
