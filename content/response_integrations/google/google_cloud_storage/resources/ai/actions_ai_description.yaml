Update an ACL entry on Bucket:
  ai_description: >-
    ### General Description

    Updates an Access Control List (ACL) entry for a specified entity on a Google
    Cloud Storage bucket. This action modifies the permissions of a user, group, or
    special identifier (like allUsers) on the target bucket.


    ### Flow Description

    1. Extracts the `Bucket Name`, `Entity`, and `Role` parameters provided by the
    user.

    2. Initializes the Google Cloud Storage manager and authenticates using the provided
    service account or workload identity.

    3. Makes an API call to Google Cloud Storage to fetch the current ACL of the specified
    bucket.

    4. Validates the provided entity format and checks if it currently exists in the
    bucket's ACL.

    5. Evaluates if the requested role requires an update compared to the entity's
    current roles.

    6. If an update is needed, revokes the previous roles and grants the new role
    to the entity.

    7. Makes an API call to Google Cloud Storage to save the updated ACL back to the
    bucket.


    ### Additional Notes

