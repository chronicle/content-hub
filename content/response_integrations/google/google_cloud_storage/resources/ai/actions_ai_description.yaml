Remove Public Access From Bucket:
  ai_description: >-
    ### General Description

    Removes public access from a specified Google Cloud Storage bucket. This action
    modifies the bucket's IAM policy to remove public principals (`allUsers` and `allAuthenticatedUsers`)
    and can optionally enforce public access prevention at the bucket level.


    ### Flow Description

    1. Initializes the Google Cloud Storage manager with the provided credentials.

    2. Retrieves the specified bucket using the `Resource Name` parameter.

    3. Modifies the bucket's IAM policy by removing public access principals from
    all bindings.

    4. If the `Prevent Public Access From Bucket` parameter is enabled, updates the
    bucket's configuration to enforce public access prevention.

    5. Returns a success message upon successful modification.


    ### Additional Notes

    Ensure the provided service account or workload identity has sufficient permissions
    to get and set IAM policies on the target bucket.
