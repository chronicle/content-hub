Upload an Object To a Bucket:
  ai_description: >-
    ### General Description

    Uploads a local file to a specified Google Cloud Storage bucket. This action allows
    users to transfer files from the local SOAR environment to an external Google
    Cloud Storage bucket.


    ### Flow Description

    1. Initializes the Google Cloud Storage client using the provided integration
    credentials.

    2. Validates the existence and type of the local file specified in the `Source
    File Path` parameter.

    3. Fetches the target bucket using the provided `Bucket Name`.

    4. Uploads the local file to the bucket, saving it under the specified `Object
    Name`.

    5. Returns the uploaded blob details (such as object ID, name, MD5 hash, and path)
    as a JSON result.


    ### Additional Notes

    The action requires valid Google Cloud credentials with sufficient permissions
    to write to the target bucket. The `Source File Path` must point to a valid file,
    not a directory.
