Download an Object From a Bucket:
  ai_description: >-
    ### General Description

    Downloads a specific object (file) from a Google Cloud Storage bucket to a specified
    local directory path. This action is useful for retrieving artifacts, logs, or
    other files stored in GCS for local analysis or processing within the SOAR environment.


    ### Flow Description

    1. Initializes the Google Cloud Storage client using the provided integration
    credentials.

    2. Fetches the specified bucket using the Google Cloud Storage API.

    3. Retrieves the metadata for the specified object (blob) within the bucket.

    4. Validates that the provided local download path exists and is a valid directory.

    5. Downloads the object from the bucket to the local path.

    6. Appends the downloaded file details (object name and local path) to the action's
    JSON result.


    ### Additional Notes

    Ensure that the provided `Download Path` exists and is a valid directory on the
    execution environment before running this action. For objects stored inside folders
    in the bucket, the `Object Name` must include the full inner folder path (e.g.,
    `folder/object_name`).
  ai_short_description: >-
    Downloads a specific object from a Google Cloud Storage bucket to a local directory.
