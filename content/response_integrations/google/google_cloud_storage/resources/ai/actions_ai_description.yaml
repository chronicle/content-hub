Update an ACL entry on Bucket:
  ai_description: >-
    ### General Description

    Updates the Access Control List (ACL) for a specified Google Cloud Storage bucket.
    This action allows administrators to modify the permissions (OWNER, WRITER, READER)
    for a specific entity, such as a user, group, or public access identifier, ensuring
    appropriate access control management within the Google Cloud environment.


    ### Flow Description

    1. Initializes the Google Cloud Storage manager using the provided configuration
    parameters.

    2. Fetches the current ACL for the specified bucket using the `get_acl` method.

    3. Validates the provided entity format (e.g., user-userId, allUsers) and checks
    if the entity exists within the bucket's current ACL.

    4. Determines if an update is required by comparing the requested role with the
    entity's existing permissions.

    5. If an update is necessary, the action revokes all existing roles for the entity
    and grants the new specified role.

    6. Saves the updated ACL configuration back to Google Cloud Storage using the
    `update_acl` method.


    ### Additional Notes

    The action requires valid Google Cloud Storage credentials. The 'Entity' parameter
    must follow specific formats as defined by Google Cloud Storage (e.g., user-userId,
    user-emailAddress, group-groupId, group-emailAddress, allUsers, or allAuthenticatedUsers).
