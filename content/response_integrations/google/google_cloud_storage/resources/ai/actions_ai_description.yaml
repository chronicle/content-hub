Download an Object From a Bucket:
  ai_description: >-
    ### General Description

    Downloads a specified object from a Google Cloud Storage bucket to a local path.
    This action allows users to retrieve files from cloud storage for further analysis
    or processing within the SOAR environment.


    ### Flow Description

    1. Initialize the `GoogleCloudStorageManager` with configuration parameters (Service
    Account, Project ID, etc.).

    2. Validate the provided `Bucket Name`, `Object Name`, and `Download Path` parameters.

    3. Retrieve the specified bucket from Google Cloud Storage using the `get_bucket`
    method.

    4. Locate the specific blob (object) within the bucket using the `get_blob` method.

    5. Verify the existence of the target download directory.

    6. Download the blob to the specified local path using the `download_file` method.

    7. Return the download details as a JSON result.


    ### Additional Notes

    Requires appropriate IAM permissions for the configured service account to access
    the bucket and download objects. The action assumes the download path is a valid,
    writable directory on the system.
  ai_short_description: >-
    Downloads a specified object from a Google Cloud Storage bucket to a local file
    path.
