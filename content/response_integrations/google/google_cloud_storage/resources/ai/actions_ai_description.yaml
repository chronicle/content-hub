Remove Public Access From Bucket:
  ai_description: >-
    ### General Description

    Removes public access from a specified Google Cloud Storage bucket by modifying
    its IAM policy and optionally enforcing public access prevention. This action
    helps secure cloud storage resources by ensuring that public principals, such
    as 'allUsers' and 'allAuthenticatedUsers', are removed from the bucket's access
    control list.


    ### Flow Description

    1. The action extracts the 'Resource Name' and 'Prevent Public Access From Bucket'
    parameters.

    2. It initializes the 'GoogleCloudStorageManager' using the provided service account
    and project configuration.

    3. The action retrieves the target bucket object using the 'get_bucket' method.

    4. It executes the 'remove_public_access' method, which fetches the bucket's current
    IAM policy and removes any bindings associated with public access principals ('allUsers',
    'allAuthenticatedUsers').

    5. If the 'Prevent Public Access From Bucket' parameter is enabled, the action
    executes the 'update_public_access_prevention' method to enforce public access
    prevention on the bucket.

    6. A success message is returned upon completion.


    ### Additional Notes

    This action performs direct modifications to Google Cloud Storage bucket configurations.
    Ensure that the service account used has sufficient permissions to modify IAM
    policies and bucket settings.
  ai_short_description: >-
    Removes public access from a Google Cloud Storage bucket by updating its IAM policy
    and access prevention settings.
