List Bucket Objects:
  ai_description: >-
    General Description

    Lists objects stored in a specified Google Cloud Storage bucket. This action allows
    users to retrieve a list of files or objects from a target bucket, with optional
    support for retrieving Access Control Lists (ACLs) for each object.


    Flow Description

    1. The action initializes the integration configuration and extracts the required
    parameters: 'Bucket Name', 'Max Objects to Return', and 'Retrieves the Access
    Control List of an object'.

    2. It validates the provided parameters and initializes the `GoogleCloudStorageManager`
    to establish a connection to the Google Cloud Storage API.

    3. The action calls the `list_buckets_objects` method of the manager, which performs
    an API request to list the blobs (objects) within the specified bucket.

    4. The retrieved objects are processed and converted into a JSON format.

    5. The final list of objects is added to the action results using `siemplify.result.add_result_json`.


    Additional Notes

    - The 'Max Objects to Return' parameter defaults to 50 if not specified or if
    the provided value is less than the minimum allowed list size.

    - The 'Retrieves the Access Control List of an object' parameter is optional and
    defaults to False.
