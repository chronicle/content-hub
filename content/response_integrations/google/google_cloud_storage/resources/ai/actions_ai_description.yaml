"Get a Bucket\u2019s Access Control List":
  ai_description: >-
    ### General Description

    Retrieves the access control list (ACL) for specified Google Cloud Storage buckets.


    ### Flow Description

    1. Extracts the provided bucket names from the action parameters.

    2. Initializes the Google Cloud Storage client using the provided credentials.

    3. Iterates through the provided bucket names and makes an API call to Google
    Cloud Storage to fetch the ACL for each bucket.

    4. Aggregates the retrieved ACLs and returns them as a JSON result.


    ### Additional Notes

    If a bucket has uniform bucket-level access enabled, legacy ACLs cannot be retrieved,
    and the action will report this in the output message.
