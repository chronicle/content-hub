name: List Buckets
description: Retrieve a list of buckets from Google Cloud Storage.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-cloud-storage#list_buckets
integration_identifier: GoogleCloudStorage
parameters:
-   name: Max Results
    default_value: '50'
    type: string
    description: Maximum number of buckets to return.
    is_mandatory: false
-   name: Project ID
    default_value: ''
    type: string
    description: Specify the name of the project, from where you want to retrieve
        a list of buckets. If nothing is provided, the project will be extracted from
        integration configuration.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_buckets_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
