name: List Bucket Objects
description: List objects stored in the Cloud Storage bucket.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-cloud-storage#list_bucket_objects
integration_identifier: GoogleCloudStorage
parameters:
-   name: Bucket Name
    default_value: ''
    type: string
    description: Specify name of the bucket from which to retrieve objects.
    is_mandatory: true
-   name: Max Objects to Return
    default_value: '50'
    type: string
    description: Specify how many objects to return.
    is_mandatory: false
-   name: Retrieves the Access Control List of an object
    default_value: false
    type: boolean
    description: If checked, retrieve the Access Control List of an object.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_bucket_objects_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
