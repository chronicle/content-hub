name: Download an Object From a Bucket
description: Download an object from a Cloud Storage bucket.
integration_identifier: GoogleCloudStorage
parameters:
-   name: Bucket Name
    default_value: ''
    type: string
    description: Specify the name of the bucket in which the object resides.
    is_mandatory: true
-   name: Object Name
    default_value: ''
    type: string
    description: 'Specify the name of the object in the bucket to download. Please
        note, for objects which are stored inside folders in the bucket, you should
        also specify the inner folder. E.g: folder/object_name'
    is_mandatory: true
-   name: Download Path
    default_value: /{folder_1}/{folder_2}
    type: string
    description: 'Specify the absolute path, where to download the file. Example:
        /folder_1/folder_2'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/download_object_from_bucket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
