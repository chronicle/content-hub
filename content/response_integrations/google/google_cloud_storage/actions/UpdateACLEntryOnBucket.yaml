name: Update an ACL entry on Bucket
description: Updates an ACL entry on the specified bucket.
integration_identifier: GoogleCloudStorage
parameters:
-   name: Bucket Name
    default_value: ''
    type: string
    description: Specify the name of the bucket on which you want to modify the Access
        Control List.
    is_mandatory: true
-   name: Entity
    default_value: ''
    type: string
    description: 'The entity holding the permission. Can be user-userId, user-emailAddress,
        group-groupId, group-emailAddress, allUsers, or allAuthenticatedUsers. For
        more information, please see this reference: https://cloud.google.com/storage/docs/json_api/v1/bucketAccessControls#resource'
    is_mandatory: true
-   name: Role
    default_value: ''
    type: ddl
    optional_values:
    - OWNER
    - WRITER
    - READER
    description: 'The access permission for the entity.Possible values: “OWNER”, ”READER”,
        “WRITER”'
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
