identifier: GoogleCloudStorage
name: Google Cloud Storage
parameters:
-   name: API Root
    default_value: https://storage.googleapis.com
    type: string
    description: API root of the Google Cloud Storage instance.
    is_mandatory: false
    integration_identifier: GoogleCloudStorage
-   name: Service Account
    default_value: ''
    type: password
    description: Specify the full content of the service account JSON file to use
        in the integration.
    is_mandatory: false
    integration_identifier: GoogleCloudStorage
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: A Service Account Client Email to replace the usage of "Service Account",
        which will be used for Impersonation. Note that the SOAR Service Account must
        be granted the "Service Account Token Creator" IAM role on the User Service
        Account.
    is_mandatory: false
    integration_identifier: GoogleCloudStorage
-   name: Project ID
    default_value: ''
    type: string
    description: ID of the project that should be used in Google Cloud Storage integration.
    is_mandatory: false
    integration_identifier: GoogleCloudStorage
-   name: Quota Project ID
    default_value: ''
    type: string
    description: ID of your Google Cloud project for Google Cloud API usage and billing.
        If no value is provided, the project ID defined in your Google Cloud service
        account is used. For this parameter to work, make sure to grant the "Service
        Usage Consumer" IAM role to your Google Cloud service account.
    is_mandatory: false
    integration_identifier: GoogleCloudStorage
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Google Cloud Storage service is valid.
    is_mandatory: false
    integration_identifier: GoogleCloudStorage
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-cloud-storage
categories:
- Cloud
- Cloud Storage
- Google
- Operational
svg_logo_path: resources/logo.svg
image_path: resources/image.png
