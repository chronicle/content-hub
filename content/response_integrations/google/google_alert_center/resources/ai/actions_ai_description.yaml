Delete Alert:
  ai_description: >-
    ### General Description

    Deletes an alert from the Google Alert Center using the provided Alert ID. This
    action interacts with the Google Alert Center API to remove the specified alert.


    ### Flow Description

    1. Extracts configuration parameters (Service Account JSON, Impersonation Email,
    SSL verification).

    2. Extracts the `Alert ID` parameter.

    3. Initializes the `GoogleAlertCenterManager` with the provided credentials.

    4. Executes a `DELETE` request to the Google Alert Center API endpoint `alerts/{alert_id}`.

    5. Returns a success message or handles cases where the alert is not found.


    ### Additional Notes

    Note that it takes 30 days for the alert to fully disappear in Google Alert Center;
    before that, they can still be recovered.
  ai_short_description: >-
    Deletes a specific alert from the Google Alert Center using its unique identifier.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes the specified alert from the Google Alert Center.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a DELETE request to the Google Alert Center API to remove an
      alert. This is an external mutation. It does not fetch data, update internal
      entities, or modify alert data within the SecOps platform.
