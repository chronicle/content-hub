Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Alert Center using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (Service Account JSON Secret,
    Impersonation Email Address, Verify SSL).

    2. Initializes the GoogleAlertCenterManager.

    3. Makes a GET request to the Google Alert Center API (`alerts?pageSize=1`) to
    verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Google Alert Center API.
  ai_short_description: >-
    Tests connectivity to the Google Alert Center using the provided integration configuration
    parameters.
