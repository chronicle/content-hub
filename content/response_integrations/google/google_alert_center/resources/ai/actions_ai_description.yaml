Delete Alert:
  ai_description: >-
    ### General Description

    Deletes a specific alert in Google Alert Center based on the provided Alert ID.


    ### Flow Description

    1. Retrieves the `Alert ID` parameter provided by the user or playbook.

    2. Initializes the Google Alert Center API client using the configured credentials.

    3. Sends an HTTP DELETE request to the Google Alert Center API (`alerts/{alert_id}`)
    to delete the specified alert.

    4. Returns a success message if the alert is successfully deleted or if it is
    not found.


    ### Additional Notes

    It takes 30 days for the alert to fully disappear in Google Alert Center. Before
    that period elapses, the alert can still be recovered.
  ai_short_description: >-
    Deletes a specific alert in Google Alert Center using the provided Alert ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a DELETE request to Google Alert Center to delete a specific alert.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an HTTP DELETE request to the Google Alert Center API to delete
      an alert, which mutates external data. It does not fetch contextual data, mutate
      internal SecOps data, update entities, create insights, modify internal alert
      data, or create case comments.
