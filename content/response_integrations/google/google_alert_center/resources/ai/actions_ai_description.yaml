Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Alert Center API using the provided service account
    credentials and impersonation email. This action verifies that the integration
    is correctly configured and can successfully authenticate with the Google Alert
    Center.


    ### Flow Description

    1. Extracts configuration parameters: `Service Account JSON Secret`, `Impersonation
    Email Address`, and `Verify SSL` from the integration configuration.

    2. Initializes the `GoogleAlertCenterManager` with the provided credentials.

    3. Executes the `test_connectivity` method, which performs a `GET` request to
    the Google Alert Center API (`alerts` endpoint with a limit of 1).

    4. Validates the API response to ensure successful authentication and connectivity.

    5. Returns a success or failure message based on the outcome of the connectivity
    test.


    ### Additional Notes

    This action does not modify any data; it is strictly for verifying the integration
    configuration.
  ai_short_description: >-
    Tests connectivity to the Google Alert Center API to verify integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Google Alert Center API to verify connectivity.
      It does not mutate any data or update internal entities.
