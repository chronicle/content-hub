[project]
name = "GoogleAlertCenter"
version = "11.0"
description = "Real-time security alerts and insights that help you protect your organization from the latest threats, including phishing, malware, and other suspicious activity."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "google-api-core==2.19.2", "google-api-python-client==2.144.0", "google-auth==2.34.0", "googleapis-common-protos==1.65.0", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.1-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
