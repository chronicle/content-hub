  ai_description: >-
    Executes a search query in LogPoint based on the provided entities (User, IP,
    Email Address, URL, File Hash, Hostname). The action dynamically builds a query
    using the specified entity keys and retrieves the matching logs.


    ### Flow Description

    1. Validates the provided parameters, including custom time frames and repository
    availability.

    2. Iterates over the target entities and filters them based on supported types
    (ADDRESS, HOSTNAME, USERUNIQNAME, DestinationURL, FILEHASH).

    3. Builds a sub-query for each entity type using the specified entity keys and
    joins them using the selected logical operator.

    4. Appends the dynamically built entity query to the base query provided in the
    parameters.

    5. Creates an asynchronous query job in LogPoint and periodically checks its status.

    6. Once the query finishes, retrieves the results and attaches them to the action's
    JSON results and data table.


    ### Parameters Description

    - **Query**: (Mandatory, String) Specify the base query that needs to be executed.

    - **Time Frame**: (Mandatory, DDL) Specify the time frame for the query (e.g.,
    Last 24 Hours, Custom).

    - **Start Time**: (Optional, String) Specify the start time for the query if 'Custom'
    time frame is selected. Format: YYYY-MM-DDThh:mm:ssZ or timestamp.

    - **End Time**: (Optional, String) Specify the end time for the query if 'Custom'
    time frame is selected. If not provided, the current time is used.

    - **Repos**: (Optional, String) A comma-separated list of repository names to
    search in. If empty, searches all repositories.

    - **IP Entity Key**: (Optional, String) The field key to use when querying IP
    entities.

    - **Hostname Entity Key**: (Optional, String) The field key to use when querying
    Hostname entities.

    - **File Hash Entity Key**: (Optional, String) The field key to use when querying
    File Hash entities.

    - **User Entity Key**: (Optional, String) The field key to use when querying User
    entities.

    - **URL Entity Key**: (Optional, String) The field key to use when querying URL
    entities.

    - **Email Address Entity Key**: (Optional, String) The field key to use when querying
    Email Address entities.

    - **Stop if Not Enough Entities**: (Mandatory, Boolean) If enabled, the action
    will not execute if any of the specified entity keys do not have corresponding
    entities in the scope.

    - **Cross Entity Operator**: (Mandatory, DDL) The logical operator (OR/AND) used
    to join the different entity type sub-queries.

    - **Max Results To Return**: (Optional, String) The maximum number of query results
    to return.


    ### Additional Notes

    At least one Entity Key parameter must be specified for the action to build the
    entity-based query.
