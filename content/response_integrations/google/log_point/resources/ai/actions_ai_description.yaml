Execute Query:
  ai_description: >-
    ### General Description

    Executes a search query in LogPoint to retrieve logs or telemetry data. This action
    allows users to perform custom searches across specified repositories within the
    LogPoint environment, providing visibility into historical data based on defined
    time frames.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the query, time frame, start/end
    times, repository list, and result limit from the action parameters.

    2. **Validation**: It validates the provided time frame and ensures all specified
    repositories exist in LogPoint.

    3. **Query Initiation**: The action calls the `create_query_job` method via the
    LogPoint API to initiate the search job.

    4. **Status Polling**: If the action is not the first run, it checks the status
    of the search job using `get_query_results`.

    5. **Result Processing**: Once the query execution is complete, the action retrieves
    the results, formats them into a JSON object and a data table, and adds them to
    the action results.


    ### Additional Notes

    This action is designed to be asynchronous. If the query takes time to process,
    the action will return an 'In Progress' status and wait for subsequent runs to
    complete the retrieval of results.
