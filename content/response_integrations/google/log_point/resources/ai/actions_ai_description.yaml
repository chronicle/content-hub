    1. Extracts the search query, time frame, and repository parameters.

    2. Validates the time frame and repository names (fetching available repos from
    Logpoint if specific repositories are requested).

    3. Initiates an asynchronous search query job in Logpoint via the `/getsearchlogs`
    API endpoint.

    4. Polls the Logpoint API periodically to check the status of the query job.

    5. Once the query execution is completed, retrieves the query results and attaches
    them to the action's output as JSON and a data table.


    ### Additional Notes

    This action runs asynchronously to accommodate long-running queries. If "Custom"
    is selected for the time frame, a valid start time must be provided.
