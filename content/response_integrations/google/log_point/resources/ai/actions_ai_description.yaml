Update Incident Status:
  ai_description: >-
    ### General Description

    Updates the status of an incident within the LogPoint platform. This action allows
    analysts to resolve or close incidents directly from the SOAR platform, ensuring
    synchronization between the security operations center and the log management
    system.


    ### Flow Description

    1. The action extracts the required configuration parameters, including the LogPoint
    IP address, username, secret, and SSL verification settings.

    2. It extracts the action parameters: the `Incident ID` to be updated and the
    `Action` (Close or Resolve) to be performed.

    3. The `LogPointManager` is initialized with the provided credentials and connectivity
    settings.

    4. Based on the selected action:
       - If 'Close' is selected, the manager calls the `resolve_and_close_incident`
    method, which performs a POST request to the `/resolve_incident` endpoint followed
    by a POST request to the `/close_incident` endpoint.
       - If 'Resolve' is selected, the manager calls the `resolve_incident_status`
    method, which performs a POST request to the `/resolve_incident` endpoint.
    5. The action logs the outcome of the API request and returns a success or failure
    message.


    ### Additional Notes

    This action requires valid LogPoint API credentials. The 'Close' action performs
    a two-step process (Resolve then Close) to ensure the incident state is fully
    updated in the external system.
  ai_short_description: >-
    Updates the status of an incident in LogPoint to either 'Resolved' or 'Closed'.
