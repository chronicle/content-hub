  ai_description: >-
    ### General Description

    Updates the status of a specific incident in Logpoint. This action connects to
    the Logpoint API to update the status of an existing incident. It can either resolve
    or close the incident based on the provided parameters. It does not operate on
    SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Incident ID | String | Yes | Specify the id of the incident, which you want
    to update. |

    | Action | Dropdown | Yes | Specify the action for the incident. Valid values
    are 'Close' and 'Resolve'. This determines whether the incident will be closed
    or resolved in Logpoint. |


    ### Flow Description

    1. Extracts the `Incident ID` and `Action` parameters.

    2. Initializes the `LogPointManager` to connect to the Logpoint API.

    3. Sends a request to Logpoint to either resolve or close the specified incident
    based on the `Action` parameter.

    4. Returns a success message if the incident was updated successfully, or an error
    message if the operation failed.
