Execute Entity Query:
  ai_description: "### General Description\nExecutes a search query in LogPoint based\
    \ on the entities present in the current case. This action allows analysts to\
    \ correlate security events across various entity types (User, IP, Email Address,\
    \ URL, File Hash, Hostname) by constructing a dynamic query based on the entities\
    \ found in the scope. It supports asynchronous execution, allowing the action\
    \ to wait for the query job to complete in LogPoint before retrieving and displaying\
    \ the results.\n\n### Flow Description\n1. **Parameter Initialization**: The action\
    \ extracts configuration parameters (LogPoint credentials) and action parameters\
    \ (Query, Time Frame, Entity Keys, etc.).\n2. **Entity Filtering**: The action\
    \ iterates through `siemplify.target_entities`, filtering for supported types:\
    \ URL, Address (IP), User, Hostname, and File Hash.\n3. **Query Construction**:\
    \ \n   - It maps the identified entities to the keys provided in the action parameters\
    \ (e.g., IP Entity Key, User Entity Key).\n   - It builds sub-queries for each\
    \ entity type and joins them using the specified `Cross Entity Operator` (AND/OR).\n\
    \   - The final query is constructed by combining the entity-based sub-queries\
    \ with the user-provided `Query` parameter.\n4. **Job Execution**: The action\
    \ calls the LogPoint API (`create_query_job`) to initiate the search.\n5. **Result\
    \ Retrieval**: \n   - If the job is asynchronous, the action returns the search\
    \ ID and waits for the next run.\n   - On subsequent runs, it checks the job status\
    \ via `get_query_results`.\n   - Once finished, it adds the results to the action\
    \ output as a data table and JSON.\n\n### Additional Notes\n- The action supports\
    \ custom time frames. If \"Custom\" is selected, both `Start Time` and `End Time`\
    \ must be provided or calculated.\n- If `Stop if Not Enough Entities` is enabled,\
    \ the action will fail if the required entity types for the provided keys are\
    \ missing from the case."
  ai_short_description: >-
    Executes a search query in LogPoint based on case entities and retrieves the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
