    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `if
      entity.entity_type not in supported_entities: continue`. The supported entities
      are URL, ADDRESS, USER, HOSTNAME, and FILEHASH. Therefore, it filters by `entity_type`
      and targets these specific entity types.
