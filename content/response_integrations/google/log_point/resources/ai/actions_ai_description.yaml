Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the LogPoint server using the provided integration configuration
    parameters. This action ensures that the credentials and network settings are
    correct and that the SOAR platform can successfully communicate with the LogPoint
    API.


    ### Flow Description

    1. Extracts integration-level configuration parameters (IP Address, Username,
    Secret, CA Certificate File, Verify SSL).

    2. Initializes the LogPoint API manager with the provided credentials.

    3. Sends a POST request to the LogPoint `/getalloweddata` endpoint to verify authentication
    and connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action is primarily used for administrative purposes to validate the integration
    setup and does not interact with case data or entities.
