Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the LogPoint server using the provided configuration parameters.
    This action verifies that the integration is correctly configured and can communicate
    with the LogPoint API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `IP Address`, `Username`,
    `Secret`, `CA Certificate File`, and `Verify SSL`.

    2. It initializes the `LogPointManager` with these credentials.

    3. The action calls the `test_connectivity` method, which performs a POST request
    to the LogPoint server's `/getalloweddata` endpoint.

    4. The response is validated to ensure the connection is successful.

    5. The action returns a success or failure message based on the outcome of the
    connectivity test.


    ### Additional Notes

    This action does not interact with entities or modify any data. It is strictly
    used for verifying the integration configuration.
