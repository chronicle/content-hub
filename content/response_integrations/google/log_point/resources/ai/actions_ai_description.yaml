Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a dynamic search query in LogPoint based on the identifiers of supported
    entities (User, IP, URL, File Hash, Hostname). The action constructs a query using
    the provided entity keys and retrieves matching logs or events from the LogPoint
    platform.


    ### Flow Description

    1. Validates the provided parameters, including time frames, repositories, and
    entity keys.

    2. Iterates over the target entities and filters them to include only supported
    types (User, IP, URL, File Hash, Hostname). It also distinguishes between standard
    User entities and Email Addresses based on format validation.

    3. Constructs a dynamic LogPoint query by combining the base `Query` parameter
    with sub-queries built from the entity identifiers and their corresponding entity
    keys.

    4. Initiates an asynchronous query job in LogPoint by making a POST request to
    the `/getsearchlogs` API endpoint.

    5. Periodically polls the LogPoint API to check the status of the query job.

    6. Once the query finishes, retrieves the results and attaches them to the action's
    output as a data table and JSON.


    ### Additional Notes

    - Email addresses are processed as User entities that match an email format.

    - The action can be configured to halt execution if not all specified entity types
    are present in the scope (controlled by the `Stop if Not Enough Entities` parameter).
  ai_short_description: >-
    Executes a dynamic search query in LogPoint based on the identifiers of supported
    entities and returns the matching logs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a POST request to the LogPoint API to create
      a query job and retrieve search results. It does not mutate external data (it
      only performs a search). It does not mutate internal data, update entities,
      or create insights; it only attaches the search results as a data table and
      JSON to the action result.
  entity_usage:
