  ai_description: >-
    Executes a search query in LogPoint to retrieve historical logs and event data.
    The action initiates a query job on the LogPoint server, waits for its completion,
    and retrieves the matching results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Specify the query that needs to be executed in Logpoint.
    |

    | Time Frame | Drop-down | Yes | Specify the time frame for the query. If "Custom"
    is selected, start and end times must be provided. |

    | Start Time | String | No | Specify the start time for the query (Format: YYYY-MM-DDThh:mm:ssZ
    or timestamp). Required if Time Frame is "Custom". |

    | End Time | String | No | Specify the end time for the query. If not provided,
    the current time is used. |

    | Repos | String | No | A comma-separated list of repository names to search in.
    If empty, searches all repositories. |

    | Max Results To Return | String | No | Specify the maximum number of results
    to return (default is 100). |


    ### Flow Description

    1. Extracts and validates the input parameters, including resolving the time frame.

    2. If specific repositories are provided, fetches available repositories from
    LogPoint to validate their existence.

    3. Creates an asynchronous query job in LogPoint with the specified parameters.

    4. Polls the LogPoint API to check the status of the query job.

    5. Once completed, retrieves the query results and attaches them to the action's
    output as JSON and a data table.


    ### Additional Notes

    If the "Custom" time frame is selected, the "Start Time" parameter must be configured
    for the action to run successfully.
