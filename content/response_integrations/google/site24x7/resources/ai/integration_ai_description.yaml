product_categories:
  asset_inventory: false
  cloud_security: true
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Site24x7 integration provides a connector to ingest alert logs from the Site24x7
    monitoring platform into Google SecOps. This functionality aligns with the SIEM
    category, as it involves log ingestion and alert processing. Additionally, Site24x7
    is a monitoring tool that covers cloud-native resources (AWS, Azure, GCP), which
    aligns with the Cloud Security category. The integration does not perform EDR,
    Network Security, Threat Intelligence, Email Security, IAM, ITSM, Vulnerability
    Management, Asset Inventory, or Collaboration tasks.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
