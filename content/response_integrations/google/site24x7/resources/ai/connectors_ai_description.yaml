Site24x7 - Alerts Log Connector:
  ai_description: >-
    ### General Description

    The Site24x7 - Alerts Log Connector is designed to ingest alert logs from the
    Site24x7 monitoring platform into Google SecOps. It enables security teams to
    centralize monitoring data, allowing for automated case creation and incident
    response based on alerts generated by Site24x7.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the Python process.
    |

    | API Root | String | Yes | API root of the Site24x7 instance. |

    | Refresh Token | String | Yes | OAuth2 refresh token for Site24x7. |

    | Client ID | String | Yes | Client ID of the Site24x7 instance. |

    | Client Secret | String | Yes | Client Secret of the Site24x7 instance. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate. |

    | Max Days Backwards | Integer | No | Days to look back on the first run. |

    | Max Alert Logs To Fetch | Integer | No | Maximum number of alert logs to process
    per iteration. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, the whitelist acts
    as a blacklist. |

    | Disable Overflow | Boolean | Yes | If enabled, ignores the overflow mechanism.
    |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Proxy username for authentication. |

    | Proxy Password | String | No | Proxy password for authentication. |


    ### Flow Description

    1. Authenticate with the Site24x7 API using the provided OAuth2 credentials (Client
    ID, Client Secret, and Refresh Token).

    2. Determine the start time for fetching logs based on the last successful run
    or the configured 'Max Days Backwards' parameter.

    3. Retrieve alert logs from the Site24x7 API.

    4. Filter the fetched alerts based on existing IDs (to prevent duplicates), timestamp,
    and whitelist/blacklist settings.

    5. Map the filtered alerts to SOAR case objects, applying environment mapping
    and checking against the overflow mechanism.

    6. Create cases in Google SecOps for the processed alerts.

    7. Update the last success timestamp and save the processed IDs to ensure continuity
    for the next connector iteration.
