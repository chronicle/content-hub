Site24x7 - Alerts Log Connector:
  ai_description: >-
    ### General Description

    The Site24x7 - Alerts Log Connector is designed to ingest alert logs from the
    Site24x7 monitoring platform into Google SecOps. It enables security teams to
    centralize monitoring data, allowing for automated case creation and incident
    response based on alerts generated by Site24x7 monitors.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | API root of the Site24x7 instance (e.g., https://www.site24x7.com).
    |

    | Client ID | String | Yes | Client ID of the Site24x7 instance. |

    | Client Secret | String | Yes | Client Secret of the Site24x7 instance. |

    | Refresh Token | String | Yes | Site24x7 Refresh token. |

    | Verify SSL | Boolean | Yes | If enabled, verify the SSL certificate for the
    connection to the server. |

    | DeviceProductField | String | Yes | Source field name for the Product Field.
    |

    | EventClassId | String | Yes | Source field name for the Event Field. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern for the environment
    field. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process.
    |

    | Max Days Backwards | Integer | No | Days to retrieve alert logs from for the
    initial run. |

    | Max Alert Logs To Fetch | Integer | No | Number of alert logs to process per
    iteration. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, whitelist acts as
    a blacklist. |

    | Disable Overflow | Boolean | Yes | If enabled, ignores the overflow mechanism.
    |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | String | No | Proxy password. |


    ### Flow Description

    1. Authenticates with the Site24x7 API using the provided OAuth2 credentials (Client
    ID, Client Secret, and Refresh Token).

    2. Retrieves the list of available monitors to map alert data correctly.

    3. Fetches alert logs from the Site24x7 API, filtering by the last successful
    run time to ensure only new alerts are processed.

    4. Filters the fetched alerts based on existing IDs (to prevent duplicates), whitelist/blacklist
    configurations, and overflow settings.

    5. Maps the filtered alerts into the Google SecOps case format, including relevant
    metadata like severity, status, and environment.

    6. Ingests the processed alerts as cases into the SOAR platform and updates the
    last run timestamp for the next iteration.
