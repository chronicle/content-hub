Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Site24x7 API using the provided configuration parameters.
    This action verifies that the integration is correctly configured and can successfully
    authenticate and communicate with the Site24x7 service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Client
    ID`, `Client Secret`, `Refresh Token`, and `Verify SSL`.

    2. It initializes the `Site24x7Manager` using these credentials.

    3. The `Site24x7Manager` generates an access token using the provided credentials.

    4. The action calls the `test_connectivity` method, which performs a GET request
    to the Site24x7 API endpoint.

    5. If the request is successful, the action returns a success message; otherwise,
    it returns a failure message with the error details.


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration settings.
    It does not perform any data enrichment or state changes.
