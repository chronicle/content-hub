Generate Refresh Token:
  ai_description: >-
    ### General Description

    Generates a refresh token for the Site24x7 integration using an authorization
    code. This action is a utility designed to facilitate the OAuth2 authentication
    flow required for configuring the integration.


    ### Flow Description

    1. Extracts the provided Authorization Code from the action parameters.

    2. Makes a POST request to the Site24x7 OAuth2 token endpoint (`/oauth/v2/token`)
    using the client credentials and authorization code.

    3. Retrieves the newly generated refresh token from the API response.

    4. Outputs the refresh token as a JSON result, allowing the user to copy it into
    the integration's configuration settings.


    ### Additional Notes

    This action does not interact with cases, alerts, or entities. It is strictly
    used during the initial setup or maintenance of the Site24x7 integration to obtain
    a valid refresh token.
  ai_short_description: >-
    Generates a refresh token for the Site24x7 integration using an authorization
    code to facilitate OAuth2 authentication setup.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
