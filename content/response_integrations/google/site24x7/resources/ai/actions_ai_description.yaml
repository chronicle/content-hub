    get_alert_information: false
    reasoning: >-
      The action is a connectivity test ('Ping') and does not perform any of the defined
      functional outcomes like enrichment, containment, or ticket management. Therefore,
      it does not match any of the provided categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
