    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Site24x7 OAuth2 endpoint to exchange
      an authorization code for a refresh token. It does not fetch security context
      data, mutate external business data (it only generates an auth token), update
      internal entities, or create insights.
