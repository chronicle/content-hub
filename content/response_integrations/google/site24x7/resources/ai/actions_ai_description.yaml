    Tests connectivity to the Site24x7 server using the provided API credentials.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration configuration parameters (API Root, Client ID, Client Secret,
    Refresh Token, Verify SSL).


    ### Flow Description

    1. Initializes the Site24x7 manager with the provided integration configuration.

    2. Sends a test request to the Site24x7 API to verify connectivity.

    3. Returns a success message if the connection is established, or an error message
    if it fails.
