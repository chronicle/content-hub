  ai_description: >-
    ### General Description

    Generates a Site24x7 OAuth2 refresh token using an authorization code. This utility
    action is essential for the initial setup of the Site24x7 integration, as the
    refresh token is a required configuration parameter for other actions and connectors
    to authenticate successfully. The action interacts with Zoho's OAuth service to
    exchange a temporary authorization code for a long-lived refresh token.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Authorization Code | String | Yes | The temporary code obtained from the Site24x7/Zoho
    authorization portal used to request the refresh token. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, Client ID, and
    Client Secret from the integration configuration and the Authorization Code from
    the action input.

    2. **URL Mapping:** It determines the correct Zoho authentication endpoint (e.g.,
    accounts.zoho.com, accounts.zoho.eu) based on the provided API Root.

    3. **Token Request:** It sends a POST request to the OAuth2 token endpoint with
    the client credentials and the authorization code.

    4. **Result Processing:** Upon a successful response, it extracts the `refresh_token`
    and provides it in the JSON results for the user to copy into the integration
    settings.


    ### Additional Notes

    * This action does not process entities and is intended to be run manually during
    the integration configuration phase.
