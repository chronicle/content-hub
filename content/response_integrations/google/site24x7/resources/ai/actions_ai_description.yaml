  ai_description: >-
    ### General Description

    Generates a refresh token for the Site24x7 integration configuration. This action
    is a utility designed to facilitate the OAuth2 authentication flow by exchanging
    an authorization code for a refresh token, which can then be used in the integration's
    configuration settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Authorization Code | Password | True | The authorization code obtained from
    Site24x7 during the initial OAuth consent flow. |


    ### Flow Description

    1. Retrieves the API Root, Client ID, and Client Secret from the integration configuration.

    2. Retrieves the Authorization Code from the action parameters.

    3. Makes a POST request to the Site24x7 OAuth endpoint to exchange the authorization
    code for a refresh token.

    4. Outputs the generated refresh token in the action's JSON result for the user
    to copy into the integration configuration.
