Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Site24x7 server using the provided integration configuration
    parameters. This action is primarily used to verify that the API credentials and
    network settings are correct.


    ### Flow Description

    1. Initializes the Site24x7 manager using the integration-level configuration
    parameters (API Root, Client ID, Client Secret, Refresh Token).

    2. Makes an HTTP GET request to the `/api/monitors` endpoint to verify authentication
    and network connectivity.

    3. Evaluates the response and returns a success message if the connection is established,
    or an error message if it fails.


    ### Additional Notes

    This action does not require any action-specific parameters and does not interact
    with any case entities.
