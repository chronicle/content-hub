Generate Refresh Token:
  ai_description: >-
    ### General Description

    Generates a refresh token required for the Site24x7 integration configuration.
    This action facilitates the OAuth2 authentication flow by exchanging an authorization
    code for a refresh token, which is necessary for the integration to maintain persistent
    access to the Site24x7 API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Client
    ID`, and `Client Secret` from the integration settings.

    2. It extracts the `Authorization Code` provided by the user as an action parameter.

    3. The action invokes the `Site24x7Manager.generate_refresh_token` method.

    4. An HTTP POST request is sent to the appropriate Zoho authentication endpoint
    (determined by the API Root) with the provided credentials and authorization code.

    5. Upon a successful response, the generated refresh token is returned in the
    action's result JSON.


    ### Additional Notes

    This action is intended for initial integration setup and configuration. It does
    not perform any security operations or interact with entities within the SOAR
    platform.
  ai_short_description: >-
    Generates a refresh token for the Site24x7 integration using an authorization
    code.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
