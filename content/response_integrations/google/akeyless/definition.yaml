identifier: Akeyless
name: Akeyless
parameters:
-   name: API Gateway URL
    default_value: https://api.akeyless.io
    type: string
    description: The Akeyless API Gateway URL.
    is_mandatory: false
    integration_identifier: Akeyless
-   name: Access Type
    default_value: gcp
    type: string
    description: The authentication method to use. Supported: gcp, access_key.
    is_mandatory: false
    integration_identifier: Akeyless
-   name: Access ID
    default_value: null
    type: string
    description: The Akeyless Access ID.
    is_mandatory: true
    integration_identifier: Akeyless
-   name: Access Key
    default_value: null
    type: password
    description: The Akeyless Access Key. Required if Access Type is access_key.
    is_mandatory: false
    integration_identifier: Akeyless
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akeyless
categories:
- Identity and Access Management
svg_logo_path: resources/logo.svg
image_path: resources/image.png
