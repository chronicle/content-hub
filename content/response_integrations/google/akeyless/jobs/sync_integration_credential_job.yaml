name: Sync Integration Credential Job
parameters:
-   name: Access ID
    type: string
    description: The Akeyless Access ID.
    is_mandatory: true
-   name: Access Key
    type: password
    description: The Akeyless Access Key. Required if Access Type is access_key.
    is_mandatory: false
-   name: Access Type
    type: string
    description: The authentication method to use. Supported: gcp, access_key.
    is_mandatory: false
-   name: API Gateway URL
    type: string
    description: The Akeyless API Gateway URL.
    is_mandatory: false
-   name: Verify SSL
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to Akeyless is valid.
    is_mandatory: true
    default_value: true
-   name: Environment Name
    type: string
    description: The environment name where the integration instances, connectors, and jobs are configured.
    is_mandatory: true
-   name: Credential Mapping
    type: string
    description: >
        JSON/YAML mapping string that dictates where in Akeyless the data is
        stored. It maps integration instances, connectors, and jobs to their respective
        secret names in Akeyless.
    is_mandatory: true
description: >
    Syncs credentials from Akeyless to SOAR platform. Reads a credential
    mapping JSON, fetches the corresponding secrets from Akeyless, and
    updates configuration parameters on integration instances, connectors, and jobs.
integration: Akeyless
creator: admin
