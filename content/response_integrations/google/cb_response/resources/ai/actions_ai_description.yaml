Enrich Process:
  ai_description: >-
    ### General Description

    Enriches process and hostname entities using data from Carbon Black Response.
    This action retrieves detailed process information, including file modifications
    and process tree data, and cross-references this information with host entities
    to provide a comprehensive view of activity on the endpoint.


    ### Flow Description

    1. **Initialization**: The action initializes the Carbon Black Response manager
    using the provided configuration parameters (API Root, API Key, Version, CA Certificate,
    and SSL verification settings).

    2. **Entity Filtering**: The action filters the target entities to identify those
    of type `PROCESS` and `HOSTNAME`.

    3. **Process Enrichment**: For each `PROCESS` entity, the action queries the Carbon
    Black Response API (`get_process_by_name`) to retrieve process details.

    4. **Data Update**: The retrieved process data is added to the entity's `additional_properties`
    (in CSV format), and the entity is marked as enriched (`is_enriched = True`).

    5. **Host Cross-Referencing**: For `HOSTNAME` entities, the action cross-references
    the retrieved process data and generates an entity table (`siemplify.result.add_entity_table`)
    to display relevant process information associated with the host.

    6. **Finalization**: The action updates the enriched entities in the SOAR platform
    (`siemplify.update_entities`) and outputs the results as a JSON object.


    ### Additional Notes

    This action requires valid API credentials for Carbon Black Response. It performs
    read-only operations (GET requests) against the Carbon Black API and updates entity
    metadata within the SOAR platform.
