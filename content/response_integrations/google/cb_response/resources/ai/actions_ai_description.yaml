Unisolate Host:
  ai_description: >-
    ### General Description

    Unisolates an endpoint in Carbon Black Response, restoring its network connectivity.
    This action reverses a previous containment action, allowing the host to communicate
    normally on the network.


    ### Flow Description

    1. Iterates over target entities of type IP Address and Hostname.

    2. For each entity, queries the Carbon Black Response API (via GET request) to
    find the corresponding sensor ID based on the IP address or hostname.

    3. Sends a PUT request to the Carbon Black Response API to disable network isolation
    (`network_isolation_enabled: False`) for the identified sensor.

    4. Updates the successfully processed entities in Google SecOps.


    ### Additional Notes

    If no sensor is found for a given entity, the action will skip it and log a warning.
