Kill Process:
  ai_description: >-
    ### General Description

    Kills a specific process on a target host using Carbon Black Response. This action
    initiates a state change on the external device to terminate a running process
    by leveraging the Live Response feature.


    ### Flow Description

    1. Initializes the Carbon Black Response API client.

    2. Filters the target entities to identify `PROCESS` and `HOSTNAME` entity types.

    3. Generates combinations of the identified hostnames and processes.

