    ### General Description

    Retrieves file modification (filemod) data for a specific process from Carbon
    Black Response. This action fetches telemetry details about files modified by
    a given process and segment ID, returning the results as a data table and raw
    JSON.


    ### Flow Description

    1. Extracts the `Process ID` and `Segment Id` from the action parameters.

    2. Initializes the Carbon Black Response API client using the provided integration
    configuration.

    3. Makes a GET request to the Carbon Black Response API (`/api/v1/process/{process_id}/{segment_id}/event`)
    to fetch the file modification event list.

    4. Parses the returned events and constructs a data table containing the file
    modification details (e.g., operation type, event time, file path, md5).

    5. Attaches the data table and the raw JSON response to the action results.


    ### Additional Notes

    This action does not operate on SecOps entities. It requires specific process
    and segment identifiers typically obtained from previous Carbon Black Response
    queries or alerts.
  ai_short_description: >-
    Retrieves file modification event data for a specific process and segment ID from
    Carbon Black Response.
