Binary Free Query:
  ai_description: >-
    ### General Description

    Queries Carbon Black Response for binary information based on a provided free-text
    query. This action allows analysts to search for specific binaries across the
    environment using the Carbon Black Response API, facilitating threat hunting and
    forensic investigations.


    ### Flow Description

    1. The action initializes the Carbon Black Response manager using the provided
    configuration parameters (API Root, API Key, Version, etc.).

    2. The `binary_free_query` method is executed against the Carbon Black Response
    API using the user-provided query string.

    3. If binaries are found, the action formats the results into a CSV table and
    a JSON object, which are then attached to the action result.

    4. If no binaries are found, the action returns a message indicating that no results
    were found.


    ### Additional Notes

    This action is strictly for searching and retrieving binary information. It does
    not modify any data in Carbon Black Response or the SOAR platform.
