    API root, and version configuration.

    2. It filters the target entities to identify those of type `FILEHASH` that have
    a valid MD5 length (32 characters).

    3. For each valid entity, the action calls the `manager.get_binary` method to
    fetch binary information from Carbon Black Response.

    4. The retrieved binary data is formatted and added to the entity's `additional_properties`.

    5. The entity is marked as enriched (`is_enriched = True`).

    6. Finally, the action updates the entities in the SOAR platform and returns the
    aggregated results as a JSON object.


