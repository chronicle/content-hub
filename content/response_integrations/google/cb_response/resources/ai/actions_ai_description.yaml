Block Hash:
  ai_description: >-
    ### General Description

    Blocks a specific file hash (MD5) on Carbon Black Response. This action initiates
    a state change on the external device to prevent the execution or presence of
    the specified file hash.


    ### Flow Description

    1. Iterates over target entities, filtering for `FILEHASH` entities with an identifier
    length of 32 characters (MD5).

    2. For each suitable entity, makes a POST request to the Carbon Black Response
    API (`/api/v1/banning/blacklist`) to add the hash to the blocklist.

    3. Returns a summary of successfully and unsuccessfully blocked hashes.


    ### Additional Notes

    This action only supports MD5 hashes (length of 32 characters).
