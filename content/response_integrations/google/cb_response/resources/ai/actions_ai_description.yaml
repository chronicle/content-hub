Enrich Binary:
  ai_description: >-
    ### General Description

    Enriches File Hash entities (specifically MD5 hashes) by retrieving binary information
    from Carbon Black Response. This action fetches metadata about the binary associated
    with the hash and appends it to the entity's properties.


    ### Flow Description

    1. Filters the target entities to include only File Hash entities with an identifier
    length of exactly 32 characters (representing an MD5 hash).

    2. Iterates over the filtered entities and makes a GET request to the Carbon Black
    Response API (`/api/v1/binary/{md5}/summary`) to fetch binary summary data.

    3. Updates the entity's `additional_properties` with the retrieved binary information
    and sets the `is_enriched` flag to true.

    4. Saves the updated entities back to the platform and adds the raw binary data
    to the action's JSON results.


