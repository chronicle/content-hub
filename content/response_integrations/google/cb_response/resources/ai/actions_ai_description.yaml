Enrich Binary:
  ai_description: >-
    ### General Description

    Enriches file hash entities by retrieving binary metadata from Carbon Black Response.
    This action allows analysts to gather detailed information about a specific file
    hash, such as its prevalence and metadata, directly within the SOAR platform to
    support investigation and decision-making.


    ### Flow Description

