    ### General Description

    Enriches Process and Hostname entities using VMware Carbon Black EDR (CB Response).
    This action retrieves detailed process execution information from the EDR and
    correlates it with the relevant entities in the case.


    ### Flow Description

    1. Iterates over all target entities and filters for `PROCESS` and `HOSTNAME`
    entity types.

    2. For each `PROCESS` entity, makes a GET request to the CB Response API to fetch
    process details matching the process name.

    3. Updates the `PROCESS` entity's additional properties with the retrieved process
    data and marks the entity as enriched.

    4. For each `HOSTNAME` entity, filters the previously fetched processes to identify
    those that executed on the specific host.

    5. Attaches an entity table containing the correlated process details to the `HOSTNAME`
    entity.

    6. Returns the raw process data as JSON results and updates the entities in the
    platform.


    ### Additional Notes

    This action relies on the process name (identifier) to query CB Response. Ensure
    that the process entities have valid names.
