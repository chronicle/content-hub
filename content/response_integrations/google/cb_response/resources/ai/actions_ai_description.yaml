Download Binary:
  ai_description: >-
    ### General Description

    Downloads a binary file from Carbon Black Response for a given file hash entity.
    This action retrieves the raw binary content associated with a specific MD5 hash
    from the Carbon Black Response platform and attaches it to the entity within the
    SOAR platform for further analysis.


    ### Flow Description

    1. Initialize the Carbon Black Response manager using the provided configuration
    parameters (API Root, API Key, Version, etc.).

    2. Filter the target entities to include only those of type `FILEHASH` that have
    a length of 32 characters.

    3. For each valid entity, execute the `download_binary` method via the Carbon
    Black Response API to retrieve the file content.

    4. Base64 encode the retrieved binary data.

    5. Attach the binary file to the entity in the SOAR platform using the `add_entity_attachment`
    method.

    6. Update the entity status in the SOAR platform and return the result in JSON
    format.


    ### Additional Notes

    This action requires a valid Carbon Black Response API connection. It specifically
    targets file hashes and performs a download operation, which may be resource-intensive
    depending on the file size.
