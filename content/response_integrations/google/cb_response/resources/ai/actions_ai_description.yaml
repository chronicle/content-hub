Kill Process:
  ai_description: >-
    ### General Description

    Kills a specific process on a target host using Carbon Black Response. This action
    leverages the Carbon Black Response Live Response feature to identify and terminate
    running processes on remote endpoints.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, API Key, Version,
    CA Certificate File, and Verify SSL) to establish a connection.

    2. Initializes the `CBResponseManager` to interact with the Carbon Black Response
    API.

    3. Filters target entities to identify `PROCESS` and `HOSTNAME` types.

    4. Generates all combinations of hostnames and processes from the filtered entities.

    5. For each combination, retrieves the sensor ID associated with the hostname.

    6. Initiates a Live Response session on the sensor.

    7. Lists processes on the host to find the PID matching the process name.

    8. Executes a "kill" command for the identified PID.

    9. Closes the Live Response session.

    10. Reports the outcome of the process termination for each entity combination.


    ### Additional Notes

    This action requires `PROCESS` and `HOSTNAME` entities to function. It performs
    state-changing operations on the endpoint via the Carbon Black Response Live Response
    feature.
