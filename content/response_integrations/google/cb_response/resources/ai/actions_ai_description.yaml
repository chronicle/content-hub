Create Watchlist:
  ai_description: >-
    ### General Description

    Creates a new watchlist in Carbon Black Response for processes or binaries based
    on a specified query. This action allows analysts to proactively monitor for specific
    activities or files within their environment.


    ### Flow Description

    1. Extracts the watchlist name, query, and type from the action parameters.

    2. Initializes the connection to the Carbon Black Response API.

    3. Makes a POST request to the `/api/v1/watchlist` endpoint to create the watchlist
    with the provided query and type.

    4. Makes a subsequent API request to create an alert action for the newly created
    watchlist, ensuring alerts are generated when the watchlist criteria are met.

    5. Returns a success message upon successful creation.


    ### Additional Notes

    The watchlist type can be set to "events" for process-related watchlists or "modules"
    for binary-related watchlists.
