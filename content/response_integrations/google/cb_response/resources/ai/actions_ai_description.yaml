Binary Free Query:
  ai_description: >-
    ### General Description

    Executes a free text query in Carbon Black Response to search for and retrieve
    information about binaries. This action allows analysts to find specific binaries
    based on various attributes supported by the Carbon Black query language.


    ### Flow Description

    1. Initializes the Carbon Black Response manager with the provided API credentials.

    2. Executes a free query against the Carbon Black Response binaries API endpoint
    (`/api/v1/binary`) using the provided query string.

    3. Retrieves the matching binaries and formats their details into a CSV table
    and JSON results.

    4. Attaches the formatted table and JSON data to the action's output results.


    ### Additional Notes

    The query syntax should follow Carbon Black Response's supported search query
    format (e.g., `md5:* AND original_filename:<file-name>`).
  ai_short_description: >-
    Executes a free text query in Carbon Black Response to search for and retrieve
    information about binaries.
