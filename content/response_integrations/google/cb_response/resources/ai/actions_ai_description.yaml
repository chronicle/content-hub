Isolate Host:
  ai_description: >-
    ### General Description

    Isolates an endpoint from the network using the Carbon Black Response platform.
    This action identifies the corresponding sensor for a given IP address or hostname
    and triggers a network isolation command to restrict the host's communication
    capabilities.


    ### Flow Description

    1. Initialize the Carbon Black Response manager using the provided configuration
    parameters (Api Root, Api Key, Version, CA Certificate File, and Verify SSL).

    2. Filter the target entities to include only `ADDRESS` and `HOSTNAME` types.

    3. For each valid entity, query the Carbon Black Response API to retrieve the
    associated sensor information.

    4. If a sensor is successfully identified, execute the isolation command via a
    PUT request to the Carbon Black Response API to set `network_isolation_enabled`
    to `True`.

    5. Log the outcome of the isolation operation for each entity and update the action's
    output message accordingly.


    ### Additional Notes

    This action requires valid API credentials and network connectivity to the Carbon
    Black Response instance. It performs a state-changing operation on the external
