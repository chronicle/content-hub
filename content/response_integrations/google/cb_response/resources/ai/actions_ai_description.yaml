Hosts By Process:
  ai_description: >-
    ### General Description

    Retrieves a list of hosts (sensors) that are related to a specific process using
    Carbon Black Response. This action helps determine the prevalence of a process
    across the environment by identifying all endpoints where it has been observed.


    ### Flow Description

    1. Iterates over the target entities, filtering for those of type `PROCESS`.

    2. For each process entity, makes a GET request to the Carbon Black Response API
    (`/api/v1/process`) to find instances matching the process name.

    3. Extracts unique sensor IDs from the returned process execution data.

    4. Makes subsequent GET requests to the Carbon Black Response API (`/api/v1/sensor/{id}`)
    to retrieve detailed information for each identified sensor.

    5. Attaches the retrieved sensor data as a CSV table to the process entity and
    updates the entity in the platform.

    6. Returns the aggregated sensor data as a JSON result.


    ### Additional Notes

    This action is useful for scoping an incident by identifying all machines that
    have executed a suspicious process.
