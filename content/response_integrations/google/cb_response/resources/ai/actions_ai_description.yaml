Isolate Host:
  ai_description: >-
    ### General Description

    Isolates a specific endpoint from the network using Carbon Black Response. This
    action initiates a state change on the external EDR device to prevent network
    traffic to or from the specified entity, effectively containing the host.


    ### Flow Description

    1. Iterates over the target entities provided in the case, specifically filtering
    for IP Address and Hostname entity types.

    2. For each valid entity, makes a GET request to the Carbon Black Response API
    to retrieve the corresponding sensor data and sensor ID.

    3. If a matching sensor is found, makes a PUT request to the Carbon Black Response
    API to enable network isolation for that specific sensor.

    4. Collects the results and outputs a summary message detailing which entities
    were successfully isolated and which failed.


    ### Additional Notes

    This action requires the Carbon Black Response sensor to be active and manageable
    via the API to successfully apply the network isolation.
