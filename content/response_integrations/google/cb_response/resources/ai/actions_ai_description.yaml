Download Binary:
  ai_description: >-
    ### General Description

    Downloads a binary file associated with a specific file hash (MD5) from Carbon
    Black Response. The downloaded binary is then base64 encoded and attached to the
    corresponding entity within Google SecOps for further analysis.


    ### Flow Description

    1. Iterates over target `FileHash` entities, filtering for those with an identifier
    length of 32 characters (MD5 hashes).

    2. For each valid entity, makes a GET request to the Carbon Black Response API
    (`/api/v1/binary/{md5}`) to download the associated binary.

    3. Extracts the binary content from the retrieved zip file.

    4. Base64 encodes the binary content.

    5. Attaches the encoded binary to the entity in Google SecOps as a `.zip` file.

    6. Updates the successful entities and appends the base64 content to the action's
    JSON results.


    ### Additional Notes

    - This action strictly supports MD5 hashes (identifier length of 32).

    - The downloaded binary is attached directly to the entity in the platform.
