name: Create Watchlist
description: Create a watchlist for processes (type = events) or for binaries (type
    = modules)
integration_identifier: CBResponse
parameters:
-   name: Watchlist Name
    type: string
    description: Name of this watchlist
    is_mandatory: true
-   name: Query
    type: string
    description: The raw Carbon Black query that this watchlist matches
    is_mandatory: true
-   name: Watchlist Type
    default_value: ''
    type: string
    description: The type of watchlist. e.g. modules
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
