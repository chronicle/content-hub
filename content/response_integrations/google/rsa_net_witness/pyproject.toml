[project]
name = "RSANetWitness"
version = "20.0"
description = "The Concentrator indexes metadata extracted from network or log data and makes it available for enterprise-wide querying and real-time analytics."
requires-python = ">=3.11,<3.12"
dependencies = [
    "arrow>=1.4.0",
    "defusedxml==0.7.1",
    "pytest-mock>=3.15.1",
    "requests>=2.33.1",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
