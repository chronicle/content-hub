Query NetWitness For Events Around Host:
  ai_description: "### General Description\nQueries RSA NetWitness to retrieve network\
    \ events and associated PCAP data for Hostname entities found in an alert. This\
    \ action is used to gather forensic evidence and session metadata from the NetWitness\
    \ Concentrator and Decoder, providing security analysts with raw traffic data\
    \ and event logs directly within the Google SecOps case.\n\n### Parameters Description\n\
    There are no action-specific parameters for this action. It relies on the global\
    \ integration configuration for RSA NetWitness (Concentrator/Decoder URIs and\
    \ credentials).\n\n### Additional Notes\n* The action specifically targets `HOSTNAME`\
    \ entities.\n* It retrieves both metadata (JSON/CSV) and raw packet data (PCAP).\n\
    * PCAP files are attached to the entity as base64-encoded files.\n\n### Flow Description\n\
    1. **Entity Filtering**: The action identifies all `HOSTNAME` entities within\
    \ the current alert scope.\n2. **Metadata Retrieval**: For each hostname, it queries\
    \ the RSA NetWitness manager to find events where the hostname is either the source\
    \ or destination domain.\n3. **PCAP Extraction**: It fetches the raw PCAP byte\
    \ array for the identified sessions from the NetWitness Decoder.\n4. **Data Enrichment**:\
    \ \n    * Event metadata is added to the entity as a data table.\n    * The PCAP\
    \ data is attached to the entity as a file attachment.\n    * A JSON result containing\
    \ the raw event data is added to the action output."
