Update The 'TI' Database Of NetWitness:
  ai_description: >-
    Updates the NetWitness Threat Intelligence (TI) database by uploading custom feed
    configurations for specific entities. This action allows users to define metadata
    keys and values that NetWitness will use to enrich entities, which can then be
    leveraged in correlation rules.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Key Value String | String | Yes | A string containing key-value pairs in the
    format `key1:val1,key2:val2`. These pairs define the metadata associated with
    the entities in the feed. |


    ### Flow Description

    1. **Initialization**: Retrieves NetWitness configuration (Concentrator/Decoder
    URIs and credentials) and the user-provided key-value string.

    2. **Entity Processing**: Iterates through all target entities provided in the
    action context.

    3. **Feed Generation**: For each entity, the action updates local JSON, CSV, and
    XML files that define the feed structure and content. The entity identifier is
    used as the primary index.

    4. **Packaging**: Compresses the generated feed files (CSV and XML) into a ZIP
    archive.

    5. **External Update**: Uploads the ZIP archive to the NetWitness Decoder via
    a POST request to the `/decoder/parsers/upload` endpoint.

    6. **Cleanup**: Removes the temporary local files used to create the feed package.


    ### Additional Notes

    This action performs a state change on the external NetWitness system by modifying
    its parser/feed configuration. It does not update entity attributes or create
    insights within Google SecOps.
