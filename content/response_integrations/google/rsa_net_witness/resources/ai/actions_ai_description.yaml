Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the RSA NetWitness instance. It serves as a health check to ensure that the integration
    can successfully communicate with the configured RSA NetWitness Concentrator API
    using the provided credentials and connection settings.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | N/A | This action does not require any input parameters. | N/A | N/A |


    ### Flow Description

    1. **Retrieve Configuration**: The action fetches the integration configuration,
    including the Concentrator API Root, Decoder API Root, Username, Password, and
    SSL verification preference.

    2. **Initialize Manager**: It initializes the RSA manager with the connection
    details.

    3. **Test Connectivity**: The action executes a GET request to the Concentrator
    API endpoint.

    4. **Validate Response**: It checks the HTTP response status to ensure the connection
    is valid and the credentials are accepted.

    5. **Report Result**: The action ends with a success message if the connection
    is established, or raises an error if the connection fails.


    ### Additional Notes

    This action does not interact with any entities or modify any data within Google
    SecOps or RSA NetWitness. It is strictly for connectivity testing.
