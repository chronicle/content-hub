Query NetWitness For Events Around IP:
  ai_description: >-
    Queries RSA NetWitness to retrieve network events and associated PCAP data for
    IP address entities. This action facilitates deep-dive investigation by gathering
    session metadata and raw packet captures related to specific network identifiers.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the global
    integration configuration for RSA NetWitness (Concentrator/Decoder URIs and credentials).


    ### Flow Description

    1. **Entity Filtering**: The action identifies all IP Address (ADDRESS) entities
    within the current alert scope.

    2. **Event Retrieval**: For each identified IP, it queries the RSA NetWitness
    Concentrator to find sessions where the IP is either the source or the destination.

    3. **Data Formatting**: It retrieves these events in both JSON format (for raw
    results) and CSV format (for display).

    4. **PCAP Extraction**: It fetches the raw PCAP byte array for all session IDs
    associated with the IP address.

    5. **SOAR Enrichment**: The action attaches the CSV event data as a table to the
    entity and uploads the PCAP file as an attachment to the entity in the case.

    6. **Final Output**: Returns a summary of entities for which events were successfully
    found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
