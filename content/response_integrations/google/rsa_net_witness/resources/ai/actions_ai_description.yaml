Run General Query:
  ai_description: >-
    ### General Description

    The **Run General Query** action allows users to execute free-form queries against
    an RSA NetWitness Concentrator or Decoder. Its primary purpose is to retrieve
    specific event metadata and associated network traffic (PCAP files) based on custom
    search criteria. This action is designed for deep-dive forensic investigations
    where analysts need to extract raw packet data and detailed session information
    directly from the RSA NetWitness platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The custom RSA NetWitness query string used to filter
    sessions (e.g., `ip.src=10.0.0.1`). This query determines which session IDs are
    targeted for data retrieval. |


    ### Additional Notes

    - This action does not operate on Google SecOps entities; it relies entirely on
    the provided query string.

    - If the query returns results, a PCAP file containing the network traffic for
    all identified sessions is attached to the case.

    - Event metadata is presented in a data table named "Result Events" for easy review
    within the UI.


    ### Flow Description

    1. **Initialization**: The action initializes the RSA manager using the provided
    Concentrator and Decoder API roots and credentials.

    2. **Session Identification**: It executes the user-provided query to retrieve
    a list of matching session IDs from the RSA NetWitness Concentrator.

    3. **PCAP Retrieval**: If session IDs are found, the action requests the combined
    PCAP data for those specific sessions.

    4. **Attachment**: The retrieved PCAP content is base64-encoded and attached to
    the action result as a file named `result_pcap.pcap`.

    5. **Metadata Extraction**: The action iterates through each session ID to fetch
    detailed metadata (event keys and values).

    6. **Output Generation**: The collected metadata is formatted into a CSV data
    table and returned as a JSON result for downstream playbook use.
