"Update The TI Database Of NetWitness Raw Input":
  ai_description: >-
    Updates the NetWitness Threat Intelligence (TI) database by uploading custom feed
    configurations. This action allows users to define specific metadata keys and
    values for a list of identifiers, which are then packaged and sent to the NetWitness
    Decoder. These feeds are used within NetWitness for correlation and enrichment
    purposes.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Identifiers | String | Yes | A comma-separated list of identifiers (e.g., IP
    addresses, hostnames) to be included in the TI feed. |

    | Key And Value Items | String | Yes | A comma-separated list of key-value pairs
    separated by colons (e.g., `threat_level:high,category:malware`) to be associated
    with the provided identifiers. |


    ### Flow Description

    1. **Initialization**: Retrieves the NetWitness configuration (API roots and credentials)
    and the action parameters (`Identifiers` and `Key And Value Items`).

    2. **Feed Generation**: For each provided identifier, the action generates local
    metadata files (CSV, XML, and JSON) in the action's temporary run folder. These
    files define the structure and content of the custom feed.

    3. **Packaging**: The generated files are compressed into a ZIP archive named
    `watchlist.zip`.

    4. **External Mutation**: The ZIP archive is uploaded to the NetWitness Decoder
    via a POST request to the `/decoder/parsers/upload` endpoint.

    5. **Cleanup and Reporting**: The temporary files are removed, and the action
    returns a success message if the upload was successful or an error report if any
    part of the process failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a custom feed configuration (ZIP archive containing CSV and XML metadata)
      to the NetWitness Decoder to update its internal Threat Intelligence database.
    fetches_data: false
    internal_data_mutation_explanation: null
