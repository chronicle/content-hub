name: Update The TI Database Of NetWitness Raw Input
description: Set custom feed configuration in NetWitness to enrich entities with specific
    metadata keys and values. \nThese will be later correlated in the NetWitness correlation
    rules.
integration_identifier: RSANetWitness
parameters:
-   name: Identifiers
    default_value: ''
    type: string
    description: Comma separated identifiers list.
    is_mandatory: true
-   name: Key And Value Items
    default_value: ''
    type: string
    description: 'Comma separated values when each value is a key value pair separated
        by colon, Example: key:val,key:val'
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
