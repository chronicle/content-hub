Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Qualys EDR platform using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, Username,
    Password, Verify SSL).

    2. Initializes the Qualys EDR Manager.

    3. Makes an HTTP POST request to the Qualys EDR authentication endpoint to retrieve
    a JWT token.

    4. Returns a success message if the connection and authentication are successful,
    or an error message if it fails.


    ### Additional Notes

    This action relies entirely on integration-level parameters and does not require
    any action-specific parameters to be configured.
  ai_short_description: >-
    Tests connectivity to the Qualys EDR platform by attempting to authenticate and
    retrieve a token.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
