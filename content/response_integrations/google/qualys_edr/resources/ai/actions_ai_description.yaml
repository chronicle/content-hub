Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Qualys EDR server. This action verifies that the integration
    is correctly configured and can communicate with the Qualys EDR API by attempting
    to authenticate with the provided credentials.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `Username`, `Password`, `Verify
    SSL`) from the integration configuration.

    2. Initializes the `QualysEDRManager` class.

    3. Inside the manager initialization, it calls `get_token()` which sends a POST
    request to the `auth` endpoint of the Qualys EDR API.

    4. Validates the response from the API.

    5. Returns a success or failure message based on the connection result.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Qualys EDR server.
  ai_short_description: >-
    Tests connectivity to the Qualys EDR server by attempting to authenticate with
    the provided credentials.
  capabilities:
