Delete Firewall Rule:
  ai_description: >-
    ### General Description

    Deletes a specific iptables firewall rule on a remote server via SSH. This action
    allows administrators to remove existing network security rules, such as drop
    or reject rules, directly from the SecOps platform.


    ### Flow Description

    1. The action retrieves the connection details (Remote Server, Remote Username,
    Remote Password, and Remote Port) and the specific 'IPtables Rule' string from
    the action parameters.

    2. An `SshManager` instance is initialized using the provided credentials to establish
    a secure connection to the target server.

    3. The action calls the `delete_iptables_rule` method, which executes the `iptables
    -D <rule>` command on the remote host.

    4. The action captures the exit status of the command and returns a success or
    failure message to the SecOps platform.


    ### Additional Notes

    This action requires valid SSH credentials and network connectivity to the target
    server. The 'IPtables Rule' parameter must match the exact syntax of the rule
    to be deleted (e.g., 'INPUT -s 10.0.0.10 -j DROP'). Incorrect rule syntax may
    result in command failure.
