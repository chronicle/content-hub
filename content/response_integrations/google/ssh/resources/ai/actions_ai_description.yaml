Execute Program:
  ai_description: >-
    ### General Description

    Executes a specified program or script on a remote host using SSH. This action
    allows for remote system administration and task execution by connecting to a
    target server and running a command or program located at a specific path.


    ### Flow Description

    1. The action retrieves the connection details (Remote Server, Username, Password,
    and optional Port) and the path to the program from the action parameters.

    2. An SSH connection is established to the remote server using the provided credentials
    via the `SshManager` utility.

    3. The action executes the specified program path on the remote host using the
    `execute_program` method.

    4. The action captures the exit status code and the output (STDOUT) or error (STDERR)
    from the remote execution.

    5. The action terminates the SSH session and returns the execution results to
    the SOAR platform.


