Block IP Address in iptables:
  ai_description: >-
    ### General Description

    Connects to a remote server via SSH and adds an iptables rule to block a specified
    IP address. This action initiates a state change on the external device to prevent
    network traffic from the specified IP.


    ### Flow Description

    1. Retrieves connection parameters (Server, Username, Password, Port) and the
    target IP address to block from the action parameters.

    2. Establishes an SSH connection to the remote server.

    3. Checks if the block rule already exists for the specified IP address.

    4. If the rule does not exist, executes the command `iptables -I INPUT -s <IP>
    -j DROP` to block the IP address.

    5. Returns the execution status and output message.


    ### Additional Notes

    The provided credentials must have sufficient privileges (e.g., root access) on
    the remote server to modify iptables rules.
  ai_short_description: >-
    Connects to a remote server via SSH and adds an iptables rule to block a specified
    IP address.
