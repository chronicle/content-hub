Logoff User:
  ai_description: >-
    ### General Description

    Logs off a specific user from a remote server using SSH. This action connects
    to the target server and terminates all processes associated with the specified
    username, effectively ending the user's active session.


    ### Flow Description

    1. The action retrieves the connection parameters (Remote Server, Remote Username,
    Remote Password, and optional Remote Port) and the target 'Logoff Username' from
    the action configuration.

    2. An SSH connection is established with the remote server using the provided
    credentials.

    3. The action executes the `pkill -KILL -u <username>` command on the remote host
    to terminate all processes owned by the specified user.

    4. The action returns a success or failure status based on the exit code of the
    command execution.


