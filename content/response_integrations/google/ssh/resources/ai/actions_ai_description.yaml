Block IP Address in iptables:
  ai_description: >-
    ### General Description

    Blocks a specific IP address on a remote Linux server by adding a DROP rule to
    the iptables configuration via SSH. This action is designed to prevent network
    traffic from a specified IP address by modifying the firewall rules on the target
    host.


    ### Flow Description

    1. The action retrieves the connection parameters (Remote Server, Remote Username,
    Remote Password, and optional Remote Port) and the target IP address to block
    from the action parameters.

    2. It initializes an SSH connection to the remote server using the provided credentials.

    3. It checks if a blocking rule for the specified IP address already exists on
    the remote server by executing `iptables -C INPUT -s <IP> -j DROP`.

    4. If the rule does not exist, it executes `iptables -I INPUT -s <IP> -j DROP`
    to add the blocking rule.

    5. The action returns a success or failure message based on the execution status
    of the command.


    ### Additional Notes

    This action requires SSH access to the target server. Ensure the user provided
    in the parameters has sufficient privileges to execute iptables commands on the
    remote host.
  ai_short_description: >-
    Blocks a specific IP address on a remote Linux server by adding a DROP rule to
    iptables via SSH.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
