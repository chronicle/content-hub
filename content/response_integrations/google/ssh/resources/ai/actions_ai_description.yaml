    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a rule to iptables on the remote server to block a specific IP address.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action establishes an SSH connection and executes a command to modify iptables
