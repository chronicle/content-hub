Delete Firewall Rule:
  ai_description: >-
    ### General Description

    Deletes a specified iptables firewall rule on a remote server via SSH. This action
    connects to the target machine and removes the exact rule provided from the active
    iptables configuration.


    ### Flow Description

    1. Establishes an SSH connection to the remote server using the provided IP address,
    port, and credentials.

    2. Executes the `iptables -D` command appended with the specified rule string.

    3. Evaluates the exit status of the command to determine success or failure.

    4. Returns `True` if the rule was successfully deleted, or `False` otherwise.


    ### Additional Notes

    The rule parameter must be formatted exactly as it would be passed to the iptables
    command line (e.g., `INPUT -s 10.0.0.10 -j DROP`). Ensure the provided credentials
    have sufficient privileges (e.g., root) to modify iptables rules on the remote
    server.
