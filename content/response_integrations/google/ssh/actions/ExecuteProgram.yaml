name: Execute Program
description: Run script on a remote machine
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ssh#execute_program
integration_identifier: SSH
parameters:
-   name: Remote Server
    default_value: ''
    type: string
    description: 'Remote server address(e.g: x.x.x.x).'
    is_mandatory: true
-   name: Remote Username
    default_value: ''
    type: string
    description: Remote Username
    is_mandatory: true
-   name: Remote Password
    default_value: ''
    type: password
    description: Remote Password
    is_mandatory: true
-   name: Remote Port
    default_value: ''
    type: string
    description: Remote Port
    is_mandatory: false
-   name: Remote Program Path
    default_value: ''
    type: string
    description: The path to the program in the remote host.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: results
