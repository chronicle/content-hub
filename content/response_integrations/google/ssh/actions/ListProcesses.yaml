name: List Processes
description: List running processes on a remote machine
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ssh#list_processes
integration_identifier: SSH
parameters:
-   name: Remote Server
    default_value: ''
    type: string
    description: 'Remote server address(e.g: x.x.x.x).'
    is_mandatory: true
-   name: Remote Username
    default_value: ''
    type: string
    description: Remote Username
    is_mandatory: true
-   name: Remote Password
    default_value: ''
    type: password
    description: Remote Password
    is_mandatory: true
-   name: Remote Port
    default_value: ''
    type: string
    description: The default port will be 22.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_processes_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: results
