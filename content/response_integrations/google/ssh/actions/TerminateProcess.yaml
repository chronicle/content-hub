name: Terminate Process
description: Terminate process on a remote machine
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ssh#terminate_process
integration_identifier: SSH
parameters:
-   name: Remote Server
    default_value: ''
    type: string
    description: 'Remote server address(e.g: x.x.x.x)'
    is_mandatory: true
-   name: Remote Username
    default_value: ''
    type: string
    description: Remote Username
    is_mandatory: true
-   name: Remote Password
    default_value: ''
    type: password
    description: Remote Password
    is_mandatory: true
-   name: Remote Port
    default_value: ''
    type: string
    description: Remote Port
    is_mandatory: false
-   name: PROCESS
    default_value: ''
    type: string
    description: Process to terminate.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
