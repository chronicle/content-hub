DNS Reverse:
  ai_description: >-
    ### General Description

    Looks up the hostnames that have been defined for a given list of IP addresses
    using the Shodan API. This action helps analysts identify domains associated with
    specific IP addresses to enrich threat intelligence and context.


    ### Flow Description

    1. Iterates through the target entities provided in the case and filters for `ADDRESS`
    (IP) entities.

    2. For each valid IP address, makes a GET request to the Shodan API (`/dns/reverse`)
    to retrieve the associated hostnames.

    3. Aggregates the successful and unsuccessful lookups.

    4. Generates a CSV data table named "Shodan DNS Reverse Report" containing the
    successful lookup results and attaches it to the action result.

    5. Attaches the raw JSON response from Shodan to the action's JSON result.


    ### Additional Notes

    - This action requires a valid Shodan API key configured in the integration settings.
