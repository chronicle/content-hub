SearchForExploits:
  ai_description: >-
    ### General Description

    Searches across a variety of data sources for known exploits using the Shodan
    API. It allows users to query the Shodan exploits database and retrieve summary
    information using facets.


    ### Flow Description

    1. Retrieves the search query, facets, and page number from the action parameters.

    2. Makes a GET request to the Shodan Exploits API (`https://exploits.shodan.io/api/search`)
    with the provided query and parameters.

    3. Parses the returned JSON response containing the exploit search results.

    4. Formats the results into a flat CSV table and attaches it to the action results.

    5. Returns the raw JSON response as the action's result value.


    ### Additional Notes

    This action does not operate on specific entities but rather performs a global
    search based on the provided query string.
