Get Ip Info:
  ai_description: >-
    ### General Description

    Retrieves detailed information about an IP address from Shodan, including historical
    banners, port information, and general host data. This action enriches IP entities
    with contextual metadata such as country, last update timestamp, and associated
    domains.


    ### Flow Description

    1. Extracts configuration parameters (API Key, SSL verification) and action parameters
    (Return Historical Banners, Set Minify).

    2. Iterates through the provided target entities, filtering for those of type
    `ADDRESS`.

    3. For each valid IP entity, it performs a GET request to the Shodan API (`/shodan/host/{ip}`)
    to retrieve host information.

    4. If information is found, it generates a CSV table of the results and attaches
    it to the entity using `siemplify.result.add_entity_table`.

    5. Updates the entity's `additional_properties` with Shodan-specific metadata
    (Country, Last Updated, Domains) and marks the entity as enriched.

    6. Updates the entities in the SOAR platform and returns the full JSON response.


    ### Additional Notes

    This action requires a valid Shodan API key. It supports optional parameters to
    include historical banners and to minify the output to only include ports and
    general host information.
