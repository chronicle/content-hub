Scan A Network:
  ai_description: >-
    ### General Description

    Scans a network or specific IP addresses using the Shodan API. This action initiates
    an active network scan on the Shodan platform for the provided IP addresses, which
    consumes API scan credits.


    ### Flow Description

    1. The action initializes the `ShodanManager` using the API key retrieved from
    the integration configuration.

    2. It iterates through the `target_entities` and filters for entities of type
    `ADDRESS`.

    3. It collects the identifiers of the filtered IP addresses into a comma-separated
    string.

    4. It calls the `scan` method of the `ShodanManager`, which performs a POST request
    to the Shodan API (`https://api.shodan.io/shodan/scan`) to initiate the network
    scan.

    5. The action receives a unique scan ID from the API response.

    6. It concludes by ending the action with the scan ID or an error message if the
    scan could not be initiated.


    ### Additional Notes

    This action requires a paid Shodan API plan, as the `scan` method consumes API
    scan credits for each IP address scanned.
