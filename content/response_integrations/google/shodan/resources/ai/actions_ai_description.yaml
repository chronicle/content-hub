DNS Resolve:
  ai_description: >-
    ### General Description

    Resolves a list of Hostname entities to their corresponding IP addresses using
    the Shodan API. This action helps analysts quickly identify the underlying infrastructure
    associated with specific domains or hostnames.


    ### Flow Description

    1. Iterates through the target entities provided in the case and filters for entities
    of type `HOSTNAME`.

    2. Aggregates the identifiers of the filtered hostnames into a comma-separated
    list.

    3. Makes a GET request to the Shodan API (`/dns/resolve`) to fetch the IP addresses
    for the provided hostnames.

    4. Parses the response and attaches the resolved IP addresses as a data table
    and JSON result to the action output.


    ### Additional Notes

    Requires a valid Shodan API key configured in the integration settings.
  ai_short_description: >-
    Resolves Hostname entities to their corresponding IP addresses using the Shodan
    API.
