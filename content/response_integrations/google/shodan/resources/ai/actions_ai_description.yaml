    ### General Description

    Initiates a network scan using Shodan for specified IP address entities. This
    action triggers an active crawl of the provided IP addresses on the Shodan platform
    and returns a scan ID to track the progress.


    ### Flow Description

    1. Iterates through the target entities and filters for IP Address (`ADDRESS`)
    entities.

    2. Aggregates the identifiers of the filtered IP addresses into a comma-separated
    string.

    3. Makes a POST request to the Shodan API (`/shodan/scan`) to initiate the network
    scan for the aggregated IPs.

    4. Retrieves the scan ID from the API response and outputs it as the result value.


    ### Additional Notes

    This action requires a paid Shodan API plan (either one-time payment or subscription)
    as it consumes scan credits. Scanning one IP address consumes one scan credit.
