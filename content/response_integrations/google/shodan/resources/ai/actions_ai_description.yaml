DNS Reverse:
  ai_description: >-
    ### General Description

    Performs a reverse DNS lookup for IP address entities using the Shodan API to
    retrieve associated hostnames. This action provides additional context for IP
    addresses by querying Shodan's database, which can help in identifying the domain
    names associated with specific IP addresses.


    ### Flow Description

    1. Extracts the Shodan API key and SSL verification setting from the integration
    configuration.

    2. Iterates through the provided target entities, filtering for those of type
    `ADDRESS`.

    3. For each valid IP address, calls the `dns_reverse` method of the `ShodanManager`
    to retrieve associated hostnames.

    4. Aggregates the results and adds a data table to the action results.

    5. Adds the structured JSON results to the action output.


    ### Additional Notes

    This action is read-only and does not modify the entities or the case. It only
    retrieves information from the Shodan API.
