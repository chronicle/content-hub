DNS Resolve:
  ai_description: >-
    ### General Description

    This action resolves hostnames to their corresponding IP addresses using the Shodan
    DNS API. It is designed to provide network context for hostname entities found
    within a case, enabling analysts to identify the infrastructure associated with
    specific domains or hostnames.


    ### Flow Description

    1. The action initializes the Shodan manager using the API key retrieved from
    the integration configuration.

    2. It iterates through the `target_entities` provided in the case, filtering specifically
    for entities of type `HOSTNAME`.

    3. The collected hostnames are aggregated into a comma-separated string.

    4. The action calls the Shodan `dns_resolve` API endpoint to retrieve the IP addresses
    for the provided hostnames.

    5. If successful, the results are formatted into a data table and added to the
    action output as a JSON object.

    6. The action concludes by updating the case with the lookup results or an error
    message if the resolution fails.


    ### Additional Notes

    This action requires a valid Shodan API key configured in the integration settings.
    It performs a read-only operation (DNS resolution) and does not modify any external
    or internal system state.
  ai_short_description: >-
    Resolves hostnames to IP addresses using the Shodan DNS API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
