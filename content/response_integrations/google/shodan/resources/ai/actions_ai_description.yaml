Search:
  ai_description: >-
    ### General Description

    Searches the SHODAN database using a provided search query to retrieve information
    about internet-connected devices and services. This action allows analysts to
    query Shodan directly from the SOAR platform and returns the matching host data.


    ### Flow Description

    1. Retrieves the `Search Query`, `Facets`, and `Set Minify` parameters from the
    action configuration.

    2. Executes a GET request to the Shodan API (`/shodan/host/search`) using the
    provided query and parameters.

    3. Parses the JSON response containing the search matches, totals, and optional
    facet summaries.

    4. Formats the retrieved data into a flat dictionary and attaches it as a CSV
    data table to the action results.

    5. Attaches the raw JSON response to the action results for further playbook processing.


    ### Additional Notes

    The search query syntax is identical to the Shodan website (e.g., `apache country:"DE",
    city:"Berlin"`). If facets are provided, summary information on those properties
    will be included in the results.
