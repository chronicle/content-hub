name: Search
description: Search the SHODAN database.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/shodan#search
integration_identifier: Shodan
parameters:
-   name: Search Query
    default_value: ''
    type: string
    description: Search query; identical syntax to the website. e.g. find Apache webservers
        located in Germany(apache country:'DE', city:'Berlin')
    is_mandatory: true
-   name: Facets
    default_value: ''
    type: string
    description: 'A comma-separated list of properties to get summary information
        on. Property names can also be in the format of ''property:count''. (i.e.
        country:100, city:5). More information can be found at https://developer.shodan.io/api '
    is_mandatory: false
-   name: Set Minify
    default_value: 'false'
    type: boolean
    description: Whether to minify the banner and only return the important data
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
