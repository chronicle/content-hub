name: Get Ip Info
description: Get all available information on an IP
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/shodan#get_ip_info
integration_identifier: Shodan
parameters:
-   name: Return Historical Banners
    default_value: 'false'
    type: boolean
    description: True if all historical banners should be returned
    is_mandatory: false
-   name: Set Minify
    default_value: 'false'
    type: boolean
    description: True to only return the list of ports and the general host information,
        no banners.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_ip_info_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
