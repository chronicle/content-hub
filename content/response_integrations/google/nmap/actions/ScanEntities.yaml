name: Scan Entities
description: Use the Scan Entities action to scan entities using Nmap. This action
    runs on the Google SecOps IP Address, Hostname and Domain entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/nmap#scan_entities
integration_identifier: Nmap
parameters:
-   name: IP Address
    default_value: ''
    type: string
    description: 'IP Addresses that need to be scanned. Note: these IP addresses are
        going to be processed alongside entities.'
    is_mandatory: false
-   name: Hostname
    default_value: ''
    type: string
    description: 'Hostnames that need to be scanned. Note: these hostnames are going
        to be processed alongside entities.'
    is_mandatory: false
-   name: Options
    default_value: -sT -sV -p- -T4 -v
    type: string
    description: Options for the execution.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/scan_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
