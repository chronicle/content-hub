[project]
name = "nmap"
version = "5.0"
description = "Nmap (\"Network Mapper\") is a free and open source utility for network discovery and security auditing. This integration is designed to only work on Remote Agent! Nmap capabilities that require Root permissions are not supported."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "tipcommon",]

[dependency-groups]
dev = [
 "pytest-mock",
 "integration-testing",
 "pytest>=9.1.0",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
 "pyyaml",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.0-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.0-py3-none-any.whl"
