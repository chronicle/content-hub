Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and operational status of the Nmap integration. Its primary purpose is to ensure
    that the Nmap binary is correctly installed, accessible via the system path, and
    that the integration is properly configured to run on a Remote Agent.


    ### Flow Description

    1. **Initialization**: The action initializes the Nmap Manager and performs a
    mandatory check to ensure the execution environment is a Remote Agent.

    2. **Command Execution**: It executes the system command `nmap --version` using
    a subprocess call to verify the binary is accessible.

    3. **Response Validation**: The action captures the return code and standard error
    from the command execution.

    4. **Outcome**: If the return code is 0 (success), the action completes with a
    success message. If the return code is non-zero, it raises an exception containing
    the error details from Nmap.


    ### Additional Notes

    - **Remote Agent Requirement**: This action is strictly designed to run on a Google
    SecOps Remote Agent. It will explicitly fail with an error if executed in a cloud-only
    environment because it relies on local system execution of the Nmap binary.

    - **Connectivity Test**: The 'connectivity' in this context refers to the SOAR's
    ability to invoke the Nmap process on the host machine, rather than network connectivity
    to a remote server.
