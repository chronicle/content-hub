Scan Entities:
  ai_description: >-
    ### General Description

    The **Scan Entities** action utilizes the Nmap security scanner to perform network
    discovery and security auditing on specific entities within a Google SecOps environment.
    It is designed to identify active hosts, open ports, running services, and operating
    system details, and then enriches the target entities with this contextual data.


    ### Flow Description

    1. **Parameter Extraction & Validation:** Extracts the provided IP addresses,
    hostnames, and Nmap options. Validates the IP addresses and ensures no restricted
    root-level Nmap flags (e.g., `-sS`, `-O`) are used in the options.

    2. **Target Gathering:** Identifies relevant entities from the current case (IP
    Addresses, Hostnames, and Domains) and merges them with any manually provided
    IP addresses or hostnames from the input parameters.

    3. **Execution:** For each target, the action executes the Nmap command via the
    system shell on the remote agent, capturing the output in XML format.

    4. **Parsing:** Processes the XML output using a custom parser to extract structured
    data such as port states, service versions, OS matches, and hardware vendors.

    5. **Enrichment:** Updates the `additional_properties` of the original SecOps
    entities with the discovered network metadata and marks them as enriched.

    6. **Result Reporting:** Generates a JSON result containing the full scan details
    for each target and provides a summary message to the action output.


    ### Additional Notes

    * **Remote Agent Required:** This action must be executed on a Google SecOps Remote
    Agent where the Nmap binary is installed and accessible.

    * **Root Restriction:** The action includes a validation step that prevents the
    use of Nmap flags requiring root/sudo privileges to ensure stable execution within
    the agent environment.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Nmap scan results (ports, services,
      OS info) and sets the 'is_enriched' flag to true.
