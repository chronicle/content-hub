name: Update Insight
description: Update an insight in AWS Security Hub.
integration_identifier: AWSSecurityHub
parameters:
-   name: Insight ARN
    default_value: ''
    type: string
    description: Specify the ARN of the insight.
    is_mandatory: true
-   name: Insight Name
    default_value: ''
    type: string
    description: Specify the new name of the insight.
    is_mandatory: false
-   name: Group By Attribute
    default_value: ''
    type: ddl
    optional_values:
    - AWS Account ID
    - Company Name
    - Status
    - Generator ID
    - Malware Name
    - Process Name
    - Threat Intel Type
    - Product ARN
    - Product Name
    - Record State
    - EC2 Instance Image ID
    - EC2 Instance IPv4
    - EC2 Instance IPv6
    - EC2 Instance Key Name
    - EC2 Instance Subnet ID
    - EC2 Instance Type
    - EC2 Instance VPC ID
    - IAM Access Key User Name
    - S3 Bucket Owner Name
    - Container Image ID
    - Container Image Name
    - Container Name
    - Resource ID
    - Resource Type
    - Severity Label
    - Source URL
    - Type
    - Verification State
    - Workflow Status
    - Select One
    description: Specify a new name of the attribute by which findings should be grouped
        under one insight.
    is_mandatory: false
-   name: Filter JSON Object
    default_value: ''
    type: string
    description: Specify a new filter for the findings. Filter is represented as a
        JSON object, where you can specify different attributes and values. Please
        refer to action documentation for more details.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
