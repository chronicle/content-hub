Create Insight:
  ai_description: >-
    ### General Description

    Creates a new insight in AWS Security Hub to group findings based on specific
    attributes and filters. This action allows users to organize security findings
    into actionable insights for better visibility and management within the AWS environment.


    ### Flow Description

    1. The action extracts the required AWS credentials (`AWS Access Key ID`, `AWS
    Secret Key`, `AWS Default Region`) from the integration configuration.

    2. It extracts the action parameters: `Insight Name`, `Group By Attribute`, and
    `Filter JSON Object`.

    3. The `Filter JSON Object` is validated to ensure it is a properly formatted
    JSON string.

    4. The `Group By Attribute` is mapped to the corresponding AWS Security Hub attribute
    using the internal mapping configuration.

    5. The `AWSSecurityHubManager` is initialized, and connectivity to the AWS Security
    Hub service is validated.

    6. The `create_insight` method is called on the AWS Security Hub API to create
    the new insight with the specified parameters.

    7. The `InsightArn` of the newly created insight is returned in the action results.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to create
    insights within AWS Security Hub. The `Filter JSON Object` must be a valid JSON
    string representing the desired filter criteria.
  ai_short_description: >-
    Creates a new insight in AWS Security Hub to group findings based on specified
    attributes and filters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new insight in AWS Security Hub.
    fetches_data: false
