Update Insight:
  ai_description: >-
    ### General Description

    Updates an existing insight within AWS Security Hub. This action allows users
    to modify the configuration of a specific insight, including its name, the filter
    criteria used to define the findings included in the insight, and the attribute
    used to group those findings.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required AWS credentials
    (Access Key, Secret Key, Region) and the action-specific parameters: `Insight
    ARN`, `Insight Name`, `Group By Attribute`, and `Filter JSON Object`.

    2. **Validation**: The action validates the `Filter JSON Object` (if provided)
    to ensure it is a valid JSON structure and validates the `Group By Attribute`
    against a predefined mapping.

    3. **Connectivity**: The action initializes the `AWSSecurityHubManager` and performs
    a connectivity test to AWS Security Hub.

    4. **Update Execution**: The action calls the `update_insight` method of the `AWSSecurityHubManager`,
    which invokes the `update_insight` API in AWS Security Hub with the provided parameters.

    5. **Completion**: The action logs the success or failure of the update operation
    and returns the result.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to modify
    insights in AWS Security Hub. The `Insight ARN` is mandatory to identify the specific
    insight to be updated.
