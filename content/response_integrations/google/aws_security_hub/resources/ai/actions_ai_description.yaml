Get Insight Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific insight from AWS Security Hub.
    This action connects to the AWS Security Hub service and fetches the results associated
    with a given Insight ARN, returning the data for further analysis or reporting.


    ### Flow Description

    1. Extracts the `Insight ARN` and `Max Results to Return` parameters.

    2. Initializes the connection to the AWS Security Hub API using the provided integration
    credentials.

    3. Calls the `get_insight_results` API endpoint to fetch the insight details for
    the specified ARN.

    4. Parses the returned insight results and formats them into a JSON object and
    a CSV data table.

    5. Returns the formatted results to the SecOps platform.


    ### Additional Notes

    This action does not operate on SecOps entities and relies solely on the provided
    Insight ARN to fetch data.
