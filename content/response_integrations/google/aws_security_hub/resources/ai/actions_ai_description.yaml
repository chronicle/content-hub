Update Finding:
  ai_description: >-
    ### General Description

    Updates findings in AWS Security Hub by modifying specific attributes such as
    severity, verification state, workflow status, and custom fields. This action
    allows analysts to synchronize investigation results or status changes back to
    the AWS Security Hub platform.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required AWS credentials
    and finding update parameters (ID, Product ARN, Note, Severity, etc.) from the
    integration configuration and action settings.

    2. **Validation**: It validates that the 'Confidence' and 'Criticality' values
    are within the allowed range (0-100). It also ensures that if a 'Note' or 'Note
    Author' is provided, both are present, as required by AWS Security Hub.

    3. **Data Mapping**: It maps the user-provided DDL values (Severity, Verification
    State, Workflow Status) to the corresponding AWS Security Hub API values.

    4. **Parsing**: It parses the 'Types' parameter into a list and 'Custom Fields'
    into a dictionary.

    5. **API Execution**: The action connects to the AWS Security Hub service and
    executes the `batch_update_findings` API call to apply the changes to the specified
    finding.

    6. **Result Handling**: It processes the response from AWS, logging success or
    failure messages based on whether the finding was successfully updated.


    ### Additional Notes

    - This action requires valid AWS credentials (Access Key, Secret Key, and Region).

    - The 'Note' and 'Note Author' parameters must be used together; providing one
    without the other will result in a validation error.

    - The action does not operate on SOAR entities; it targets specific findings in
    AWS Security Hub using the provided ID and Product ARN.
  ai_short_description: >-
    Updates findings in AWS Security Hub by modifying attributes such as severity,
    verification state, workflow status, and notes.
  capabilities:
    can_create_case_comments: false
