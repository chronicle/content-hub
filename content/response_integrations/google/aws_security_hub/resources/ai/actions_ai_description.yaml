Get Insight Details:
  ai_description: >-
    ### General Description

    Fetches detailed information about a specific insight from AWS Security Hub. This
    action allows analysts to retrieve the results associated with an insight ARN,
    providing visibility into the findings grouped by that insight.


    ### Flow Description

    1. The action initializes the AWS Security Hub client using the provided AWS Access
    Key, Secret Key, and Region.

    2. It validates connectivity to the AWS Security Hub service.

    3. The action calls the `get_insight_results` method from the AWS Security Hub
    API using the provided `Insight ARN` and `Max Results to Return` parameters.

    4. The retrieved results are processed and added to the action's output as a data
    table and a JSON object.


    ### Additional Notes

    This action is read-only and does not modify any data in AWS Security Hub or the
    SOAR platform. It requires valid AWS credentials configured in the integration
    settings.
