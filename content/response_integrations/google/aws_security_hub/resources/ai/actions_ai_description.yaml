Update Finding:
  ai_description: >-
    ### General Description

    Updates findings in AWS Security Hub. This action allows users to modify various
    attributes of a specific finding, such as its severity, verification state, confidence,
    criticality, workflow status, and custom fields.


    ### Flow Description

    1. Extracts the finding ID, product ARN, and other optional parameters (e.g.,
    severity, note, workflow status) from the action inputs.

    2. Validates the provided confidence and criticality values to ensure they fall
    within the acceptable range (0-100).

    3. Validates that if a note is provided, the note author is also provided, and
    vice versa.

    4. Maps the provided severity, verification state, and workflow status to their
    corresponding AWS Security Hub values.

    5. Connects to the AWS Security Hub service using the provided AWS credentials.

    6. Calls the `batch_update_findings` API to update the specified finding with
    the new attributes.

    7. Returns a success message if the finding is successfully processed, or an error
    message if the update fails.


    ### Additional Notes

    - If the "Note" parameter has a value, you must also fill out the "Note Author"
    parameter, and vice versa. This is an AWS Security Hub limitation.

    - Confidence and criticality values must be integers between 0 and 100.
  ai_short_description: >-
    Updates a specific finding in AWS Security Hub by modifying attributes such as
    severity, verification state, confidence, criticality, and workflow status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the attributes of a specific finding in AWS Security Hub.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST/PUT request (via batch_update_findings) to AWS Security
      Hub to update a finding's attributes. It does not fetch data for enrichment,
      nor does it mutate internal SecOps data.
