Create Insight:
  ai_description: >-
    ### General Description

    Creates a new insight in AWS Security Hub based on specified filters and grouping
    attributes. This action initiates a state change on the external AWS environment
    by defining a new insight resource.


    ### Flow Description

    1. Extracts the insight name, group by attribute, and filter JSON object from
    the action parameters.

    2. Validates and parses the provided filter JSON object.

    3. Maps the selected group by attribute to the corresponding AWS Security Hub
    attribute format.

    4. Establishes a connection to the AWS Security Hub service using the provided
    integration credentials.

    5. Makes an API call to AWS Security Hub to create the new insight with the specified
    parameters.

    6. Returns the Amazon Resource Name (ARN) of the newly created insight as part
    of the JSON results.


    ### Additional Notes

    The `Filter JSON Object` parameter must be a valid JSON string representing the
    attributes and values used to filter the findings included in the insight.
  ai_short_description: >-
    Creates a new insight in AWS Security Hub using a specified name, grouping attribute,
    and JSON filter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new insight resource in AWS Security Hub.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to AWS Security Hub and makes an API call to create a new
      insight resource in the external system. Therefore, it mutates external data.
      It does not fetch data for enrichment, nor does it mutate internal SecOps data
      such as entities, alerts, or case comments.
