    Tests connectivity to the AWS Security Hub service using the provided credentials.
    This action verifies that the integration is correctly configured and can successfully
    communicate with the AWS API.


    ### Flow Description

    1. The action initializes the `AWSSecurityHubManager` using the provided AWS Access
    Key ID, Secret Key, and Default Region.

    2. It invokes the `test_connectivity` method, which performs an API call (`get_master_account`)
    to the AWS Security Hub service.

    3. The action validates the response status code.

    4. If the connection is successful, the action returns a success message. If the
    connection fails, the action catches the exception and returns a failure message.


    ### Additional Notes

