Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between Google SecOps and the Google Cloud Pub/Sub service. Its primary purpose is to ensure that the integration's configuration—including the Service Account JSON, Project ID, and network settings—is correct and that the environment has the necessary permissions to authenticate and interact with the Pub/Sub API.



    ### Additional Notes

    This action is typically used during the initial setup of the Pub/Sub integration or for troubleshooting authentication and network issues. It does not interact with any specific entities or fetch message data.


    ### Flow Description

    1. **Initialization**: The action initializes the authentication manager using the global integration configuration (Service Account JSON, Project ID, etc.).

    2. **Client Preparation**: It prepares a Google Cloud Pub/Sub API client with an authorized session.

    3. **Connectivity Test**: The action attempts to refresh the OAuth2 credentials. This step validates the service account's validity and the ability to reach Google Cloud's authentication servers.

    4. **Result Reporting**: If the credential refresh is successful, the action returns a success message; otherwise, it raises an exception with details about the failure.
