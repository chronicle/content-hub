name: PubSub - Messages Connector
parameters:
-   name: DeviceProductField
    default_value: findingClass
    type: string
    description: The name of the field where the product name is stored.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: category
    type: string
    description: The name of the field to determine the event name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: 'The name of the field where the environment name is stored.

        If the environment field isn''t found, the environment is set to the default
        environment.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: 'A regular expression pattern to run on the value found in the Environment
        Field Name field. This parameter lets you manipulate the environment field
        using the regular expression logic.

        Use the default value .* to retrieve the required raw Environment Field Name
        value.

        If the regular expression pattern is null or empty, or the environment value
        is null, the final environment result is the default environment.

        '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 60
    type: integer
    description: The timeout limit in seconds for the Python process running the current
        script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Project ID
    default_value: ''
    type: string
    description: The project ID to use in the connector.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Quota Project ID
    default_value: ''
    type: string
    description: The Google Cloud project ID which you use for Google Cloud APIs and
        billing. The integration attaches this parameter value to all API requests.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Service Account JSON File Content
    default_value: ''
    type: password
    description: The content of the service account key JSON file. You can configure
        either this parameter or the Workload Identity Email parameter. To configure
        this parameter, provide the full content of the service account key JSON file
        that you downloaded when creating a service account. For the Pub/Sub Connector,
        authenticating with the service account key JSON file has priority over the
        Workload Identity Federation.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: 'The client email address of your Workload Identity Federation.

        You can configure either this parameter or the Service Account JSON File Content
        parameter.

        For the Pub/Sub Connector, authenticating with the service account key JSON
        file has priority over the Workload Identity Federation.

        '
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Subscription ID
    default_value: ''
    type: string
    description: The Pub/Sub subscription ID.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Messages To Fetch
    default_value: '100'
    type: string
    description: The maximum number of messages to process for every connector iteration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Unique ID Field
    default_value: ''
    type: string
    description: The name of the field to confirm that the message is unique. If you
        don’t set a value, the connector generates a SHA-256 hash and uses it as an
        identifier for the message.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Timestamp Field
    default_value: message_publishTime
    type: string
    description: The name of the field to define the Google SecOps alert timestamp.
        If the timestamp doesn’t use the Unix epoch time format, define the timestamp
        format in the Timestamp Format parameter.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Timestamp Format
    default_value: '%Y-%m-%dT%H:%M:%S.%fZ'
    type: string
    description: The message timestamp format. The connector requires the timestamp
        to correctly process the message. If the timestamp doesn’t use the Unix epoch
        time format and you don’t configure a timestamp format, the connector fails.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Case Name Template
    default_value: ''
    type: string
    description: 'A custom case name. When you configure this parameter, the connector
        adds a new key called custom_case_name to the Google SecOps event. You can
        provide placeholders in the following format: [name of the field]. Example:
        Phishing - [event_mailbox]. For placeholders, the connector uses the first
        Google SecOps event. The connector only handles keys that contain the string
        value.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Name Template
    default_value: ''
    type: string
    description: 'A custom alert name. You can provide placeholders in the following
        format: [name of the field]. Example: Phishing - [event_mailbox]. For placeholders,
        the connector uses the first Google SecOps event. The connector only handles
        keys containing the string value. If you don’t provide any value or use an
        invalid template, the connector will use a fallback value in format “{Connector
        name} - Alert”.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Rule Generator Template
    default_value: ''
    type: string
    description: 'A custom rule generator. You can provide placeholders in the following
        format: [name of the field]. Example: Phishing - [event_mailbox]. For placeholders,
        the connector uses the first Google SecOps event. The connector only handles
        keys containing the string value. If you don’t provide any value or use an
        invalid template, the connector uses a fallback value in the following format:
        “{Connector  name} - Rule Generator”.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Severity Mapping JSON
    default_value: '{"Default": 60}'
    type: string
    description: The JSON object that defines how the connector extracts the severity
        level from the message.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        connecting to Pub/Sub is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Disable Overflow
    default_value: true
    type: boolean
    description: If selected, the connector ignores the Google SecOps overflow mechanism
        during alert creation.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Use the Pub/Sub Connector to retrieve messages from Pub/Sub.
integration: PubSub
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-pub-sub#pub-sub-connector
rules: []
is_connector_rules_supported: false
creator: admin
