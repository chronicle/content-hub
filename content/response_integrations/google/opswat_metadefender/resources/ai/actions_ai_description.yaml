    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a simple connectivity check via an HTTP GET request. It
      does not fetch contextual data for entities, mutate external or internal data,
      or modify any platform objects.
