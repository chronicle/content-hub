Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Opswat Metadefender API to ensure the integration is
    configured correctly.


    ### Flow Description

    1. Retrieves the integration configuration parameters (ApiRoot, ApiKey, Verify
    SSL).

    2. Makes a GET request to the Opswat Metadefender API key info endpoint to test
    connectivity.

    3. Returns a success message if the connection is established, or a failure message
    if the credentials or connection are invalid.


    ### Additional Notes

    This action does not interact with any entities or alerts and is solely used for
    verifying the integration setup.
  ai_short_description: >-
    Tests connectivity to the Opswat Metadefender API to verify integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
