Scan Hash:
  ai_description: >-
    ### General Description

    This action scans a file hash using the Opswat Metadefender service to retrieve
    its reputation and threat intelligence. It helps analysts determine if a file
    is malicious by checking it against multiple security engines.


    ### Flow Description

    1. The action initializes the Opswat Metadefender manager using the integration
    configuration (API Root and API Key).

    2. It filters the target entities to process only those of type `FILEHASH`.

    3. For each file hash, the action performs an API GET request to `hash/{file_hash}`
    to retrieve the reputation report.

    4. If a report is found:
        - It checks the `scan_all_result_a` field. If the result is "Infected", the
    action marks the entity as suspicious (`is_suspicious = True`), updates the entity
    in the system, and adds an entity insight.
        - It converts the scan report into a CSV format and adds it as a data table
    to the action results.
    5. The action concludes by returning a status message and a result value indicating
    whether any suspicious files were found.


    ### Additional Notes

    This action relies on the Opswat Metadefender integration configuration for connectivity.
    It does not perform any write operations on the external Opswat service.
  ai_short_description: >-
    Enriches file hash entities by retrieving reputation and scan results from Opswat
    Metadefender and updating the entity status if malicious.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's suspicious status, adds an entity insight, and attaches
      a data table to the action results.
    reasoning: >-
      The action fetches data from an external API (Opswat Metadefender) to enrich
      file hash entities. It does not mutate external data. It mutates internal data
      by updating entity status, adding insights, and attaching data tables to the
      action results.
