Scan Hash:
  ai_description: >-
    ### General Description

    Scans file hash entities in Opswat Metadefender to retrieve reputation details
    and previous scan results. The action evaluates the scan report, updates the entity's
    suspicious status if an infection is detected, attaches an insight, and provides
    a detailed data table of the scan results.


    ### Flow Description

    1. Filters target entities to include only File Hash entities.

    2. Iterates through the filtered entities and makes a GET request to the Opswat
    Metadefender API to retrieve hash reputation and scan results.

    3. Evaluates the scan results; if the hash is marked as "Infected", updates the
    entity's suspicious status to true and attaches an insight.

    4. Converts the scan report into a CSV format and attaches it as a data table
    to the action results.


    ### Additional Notes

    None.
  ai_short_description: >-
    Scans file hash entities in Opswat Metadefender to retrieve reputation details,
    updating the entity's suspicious status and attaching insights if an infection
    is detected.
