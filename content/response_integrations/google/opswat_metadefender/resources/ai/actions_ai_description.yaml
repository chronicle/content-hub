Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Opswat Metadefender service.
    This action verifies that the integration is correctly configured and that the
    SOAR platform can successfully communicate with the external API.


    ### Flow Description

    1. The action initializes the `OpswatMetadefenderManager` using the integration
    configuration (API Root, API Key, and SSL verification settings).

    2. It performs an HTTP GET request to the configured API root endpoint to verify
    the connection.

    3. If the request is successful (HTTP 200 OK), the action returns a success message
    and a "true" result value.

    4. If the request fails, the action returns a failure message and a "false" result
    value.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the health of the integration
    connection. It does not perform any data enrichment or modification operations.
  ai_short_description: >-
    Tests connectivity to the Opswat Metadefender service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
