name: Remove Items From Network List
description: Use the Remove Items From Network List action to remove items from the
    network list in Akamai.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akamai#remove_items_from_network_list
integration_identifier: Akamai
parameters:
-   name: Network List Name
    default_value: ''
    type: string
    description: Name of the network list that needs to be updated. If both "Network
        List Name" and "Network List ID" are provided, action will work with ID.
    is_mandatory: false
-   name: Network List ID
    default_value: ''
    type: string
    description: ID of the network list that needs to be updated. If both "Network
        List Name" and "Network List ID" are provided, action will work with ID.
    is_mandatory: false
-   name: Items
    default_value: ''
    type: string
    description: Comma-separated list of items that need to be removed from the network
        list.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remove_items_from_network_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
