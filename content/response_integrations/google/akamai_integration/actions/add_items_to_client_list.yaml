name: Add Items To Client List
description: Use the Add Items To Client List action to add items to the client list
    in Akamai.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akamai#add_items_to_client_list
integration_identifier: Akamai
parameters:
-   name: Client List Name
    default_value: ''
    type: string
    description: Name of the client list that needs to be updated. If both "Client
        List Name" and "Client List ID" are provided, action will work with ID.
    is_mandatory: false
-   name: Client List ID
    default_value: ''
    type: string
    description: ID of the client list that needs to be updated. If both "Client List
        Name" and "Client List ID" are provided, action will work with ID.
    is_mandatory: false
-   name: Item Value
    default_value: ''
    type: string
    description: Comma-separated list of items that need to be added to the client
        list.
    is_mandatory: true
-   name: Item Description
    default_value: ''
    type: string
    description: Description for the items that will be added to the client list.
    is_mandatory: false
-   name: Item Expiration Date
    default_value: ''
    type: string
    description: 'Expiration date for the added items. Expected format: ISO 8601.'
    is_mandatory: false
-   name: Item Tags
    default_value: ''
    type: string
    description: Comma-separated list of tags for the added items.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_items_to_client_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
