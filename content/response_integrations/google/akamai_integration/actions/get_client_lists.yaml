name: Get Client Lists
description: Use the Get Client Lists action to get information about client lists
    in Akamai.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akamai#get_client_lists
integration_identifier: Akamai
parameters:
-   name: Client List Name
    default_value: ''
    type: string
    description: Comma-separated list of client list names that you want to search
        for.
    is_mandatory: false
-   name: Client List ID
    default_value: ''
    type: string
    description: Comma-separated list of client list ids that you want to search for.
    is_mandatory: false
-   name: Include Items
    default_value: false
    type: boolean
    description: 'If enabled, action will return information about items inside the
        client list. Note: this information is only returned, if either “Client List
        Name” or “Client List ID” is provided.'
    is_mandatory: false
-   name: Type
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - IP
    - GEO
    - ASN
    - TLS Fingerprint
    - File Hash
    description: Type of the client list that needs to be searched. If Select One
        is provided, action will search among all client lists.
    is_mandatory: false
-   name: Max Client Lists To Return
    default_value: 100
    type: string
    description: How many client lists to return. The maximum is 100.
    is_mandatory: true
-   name: Max Client List Items To Return
    default_value: 100
    type: string
    description: How many items to return per client list. The maximum is 100.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_client_lists_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
