name: Activate Network List
description: Use the Activate Network List action to activate the network list in
    Akamai.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akamai#activate_network_list
integration_identifier: Akamai
parameters:
-   name: Network List Name
    default_value: ''
    type: string
    description: Name of the network list that needs to be updated. If both "Network
        List Name" and "Network List ID" are provided, action will work with ID.
    is_mandatory: false
-   name: Network List ID
    default_value: ''
    type: string
    description: ID of the network list that needs to be updated. If both "Network
        List Name" and "Network List ID" are provided, action will work with ID.
    is_mandatory: false
-   name: Environment
    default_value: Production
    type: ddl
    optional_values:
    - Production
    - Staging
    description: Environment for which the activation status should be returned.
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: A comment that will be associated with activation operation.
    is_mandatory: false
-   name: Notification Recipients
    default_value: ''
    type: string
    description: Comma-separated list of emails that should receive the notification
        about activation of network list.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/activate_network_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
