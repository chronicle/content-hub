name: Get Network Lists
description: Use the Get Networks Lists action to get information about networks lists
    in Akamai.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akamai#get_network_lists
integration_identifier: Akamai
parameters:
-   name: Network List Name
    default_value: ''
    type: string
    description: Comma-separated list of network list names that you want to search
        for.
    is_mandatory: false
-   name: Network List ID
    default_value: ''
    type: string
    description: Comma-separated list of network list ids that you want to search
        for.
    is_mandatory: false
-   name: Include Items
    default_value: false
    type: boolean
    description: If enabled, action will return information about items inside the
        network lists.
    is_mandatory: false
-   name: Include Activation Status
    default_value: false
    type: boolean
    description: 'If enabled, action will return information about activation status.
        Note: this information is only returned, if either "Network List Name" or
        "Network List ID" is provided.'
    is_mandatory: false
-   name: Activation Environment
    default_value: Both
    type: ddl
    optional_values:
    - Both
    - Production
    - Staging
    description: Environment for which the activation status should be returned. Only
        returned, if you provide a specific Network List Name/Network List ID.
    is_mandatory: false
-   name: Max Network Lists To Return
    default_value: 100
    type: string
    description: How many network lists to return.
    is_mandatory: true
-   name: Max Network List Items To Return
    default_value: 100
    type: string
    description: How many items to return per network list. Maximum is 100.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_network_lists_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
