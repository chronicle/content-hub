name: Activate Client List
description: Use the Activate Client List action to enable a specific client list
    within your Akamai environment.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/akamai#activate_client_list
integration_identifier: Akamai
parameters:
-   name: Client List Name
    default_value: ''
    type: string
    description: The name of the client list to activate. If both Client List Name
        and Client List ID are provided, the action prioritizes Client List ID.
    is_mandatory: false
-   name: Client List ID
    default_value: ''
    type: string
    description: The unique identifier of the client list to activate. If both Client
        List Name and Client List ID are provided, the action prioritizes Client List
        ID.
    is_mandatory: false
-   name: Environment
    default_value: Production
    type: ddl
    optional_values:
    - Production
    - Staging
    description: The target network environment for the activation.
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: A brief description or justification associated with the activation
        operation.
    is_mandatory: false
-   name: Notification Recipients
    default_value: ''
    type: string
    description: A comma-separated list of email addresses that receive a notification
        regarding the client list activation.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/activate_client_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
