Remove Items From Client List:
  ai_description: >-
    ### General Description

    The **Remove Items From Client List** action allows users to delete specific entries
    from an existing Akamai client list. This action is primarily used for managing
    security policies by removing specific identifiers (such as IPs or CIDRs) from
    reputation or access control lists within the Akamai platform.



    ### Additional Notes

    - Either **Client List Name** or **Client List ID** must be configured for the
    action to run successfully.

    - The action performs a pre-validation step by fetching the current list items
    from Akamai to ensure only existing items are sent for deletion.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the client list identifier (Name
    or ID) and the comma-separated string of items to remove.

    2. **API Initialization**: Initializes the Akamai API client using the integration
    configuration.

    3. **Validation**: Fetches all client lists from Akamai to verify the existence
    of the target list and retrieve its current members.

    4. **Item Filtering**: Compares the user-provided items against the actual items
    in the Akamai list. Only items that currently exist in the list are queued for
    removal.

    5. **Mutation**: Sends a POST request to the Akamai API with a 'delete' payload
    containing the valid items.

    6. **Output**: Returns a success status and the JSON details of the removed items.
