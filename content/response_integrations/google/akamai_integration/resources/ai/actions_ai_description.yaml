Remove Items From Network List:
  ai_description: >-
    ### General Description

    The **Remove Items From Network List** action allows users to delete specific
    entries from an existing network list within the Akamai platform. This action
    is typically used for remediation or maintenance, such as removing IP addresses
    or CIDR blocks that no longer require blocking or special handling.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves the network list
    identifier (Name or ID) and the list of items to remove. It validates that at
    least one list identifier is present.

    2. **ID Resolution**: If only a name is provided, the action fetches all available
    network lists from Akamai to find the corresponding unique ID.

    3. **Item Processing**: The action parses the comma-separated string of items
    into a list.

    4. **External Mutation**: For each item, the action sends a DELETE request to
    the Akamai API to remove the specific element from the designated network list.

    5. **Outcome Reporting**: The action aggregates the results, providing a summary
    of successful and failed removals in the output message and detailed JSON results.


    ### Additional Notes

    * Either **Network List Name** or **Network List ID** must be provided for the
    action to function.

    * The action processes items individually and will report which items were successfully
    removed and which failed (e.g., if an item was not present in the list).
