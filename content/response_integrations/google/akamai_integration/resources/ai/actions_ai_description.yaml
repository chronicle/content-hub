Get Client Lists:
  ai_description: >-
    ### General Description

    The **Get Client Lists** action retrieves detailed information about client lists
    configured in Akamai. It serves as a search and discovery tool to identify existing
    lists, their metadata, and optionally the specific items (such as IPs, Geographic
    locations, or File Hashes) contained within them. This action is primarily used
    for auditing or as a prerequisite step to identify list IDs for management tasks.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action extracts input parameters
    and validates that the result limits (Max Client Lists and Max Items) are within
    the allowed range (1 to 100).

    2. **API Request**: It sends a GET request to the Akamai API to fetch client lists,
    applying the `Type` filter if specified.

    3. **Filtering**: The action performs local filtering on the retrieved lists to
    match the specific names or IDs provided by the user.

    4. **Item Processing**: If `Include Items` is enabled and specific lists were
    targeted, the action processes the items within those lists.

    5. **Result Truncation**: The action limits the number of items per list and the
    total number of lists based on the user-defined maximums to ensure performance.

    6. **Output**: The final collection of client list data is returned as a JSON
    result, and a success message is displayed.


    ### Additional Notes

    - If neither **Client List Name** nor **Client List ID** is provided, the action
    will return all available client lists matching the type filter up to the specified
    limit.

    - The **Include Items** functionality is dependent on providing specific list
    identifiers (Name or ID).
