Get Network Lists:
  ai_description: >-
    ### General Description

    The **Get Network Lists** action retrieves detailed information about network
    lists configured in Akamai. It allows users to search for specific lists by name
    or ID and can optionally include the items within those lists and their current
    activation status in Staging or Production environments. This action is primarily
    used for auditing, visibility, and verifying the state of network configurations
    in Akamai.


    ### Flow Description

    1. **Initialization**: The action initializes the Akamai API client using the
    integration's configuration parameters.

    2. **Fetch Lists**: It performs a GET request to retrieve all available network
    lists from Akamai.

    3. **Filtering**: The retrieved lists are filtered based on the provided `Network
    List Name` or `Network List ID` parameters.

    4. **Status Enrichment**: If `Include Activation Status` is true and specific
    filters were applied, the action fetches the activation status for each list from
    the specified `Activation Environment` (Staging, Production, or Both).

    5. **Item Enrichment**: If `Include Items` is true, the action fetches the individual
    items (elements) for each network list, up to the specified `Max Network List
    Items To Return`.

    6. **Result Processing**: The action compiles the data into a JSON result and
    returns a success message if lists were found.


    ### Additional Notes

    - The `Include Activation Status` parameter requires a specific filter (Name or
    ID) to be active; it will not fetch status for a bulk retrieval of all lists.

    - The action respects a maximum limit of 100 items per list as per the integration
    constants.
