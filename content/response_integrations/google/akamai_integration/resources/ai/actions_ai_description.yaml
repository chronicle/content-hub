Remove Items From Client List:
  ai_description: >-
    ### General Description

    The **Remove Items From Client List** action allows users to delete specific entries
    from an existing Akamai client list. This action is primarily used for managing
    security policies by removing specific identifiers (such as IPs or CIDRs) from
    reputation or access control lists within the Akamai platform.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the client list identifier (Name
    or ID) and the comma-separated string of items to remove.

    2. **API Initialization**: Initializes the Akamai API client using the integration
    configuration.

    3. **Validation**: Fetches all client lists from Akamai via a GET request to verify
    the existence of the target list and resolve its ID.

    4. **Mutation**: Iterates over the provided items and sends a POST request to
    the Akamai API with a 'delete' payload to remove each item from the client list.

    5. **Output**: Returns a success status and the JSON details of the removed items.


    ### Additional Notes

    - Either **Client List Name** or **Client List ID** must be configured for the
    action to run successfully.
