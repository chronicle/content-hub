Add Items To Network List:
  ai_description: >-
    The **Add Items To Network List** action allows users to append a list of items
    (such as IP addresses or CIDR blocks) to an existing network list within the Akamai
    platform. This action is primarily used for managing access control lists or blocklists
    dynamically from Google SecOps.


    ### General Description

    Appends a list of items to an existing network list within the Akamai platform.
    This action is primarily used for managing access control lists or blocklists
    dynamically from Google SecOps.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves the network list
    identifier (Name or ID) and the list of items. It validates that at least one
    identifier is present and that the items are in a valid CSV format.

    2. **ID Resolution**: If a **Network List ID** is not provided, the action fetches
    all available network lists from Akamai and matches the provided **Network List
    Name** to find the corresponding ID.

    3. **Data Transformation**: The comma-separated string of items is converted into
    a list format suitable for the Akamai API.

    4. **External Mutation**: The action sends a POST request to the Akamai API's
    append endpoint for the specific network list, adding the new items.

    5. **Result Processing**: The action captures the API response, updates the action
    status to success, and attaches the raw JSON result to the case for auditing.


    ### Additional Notes

    - Either **Network List Name** or **Network List ID** must be provided for the
    action to execute successfully.

    - If only the **Network List Name** is provided, the action performs an additional
    lookup to resolve the name to a unique ID.
