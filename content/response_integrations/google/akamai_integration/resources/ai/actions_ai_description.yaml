Activate Client List:
  ai_description: >-
    ### General Description

    The **Activate Client List** action enables a specific client list within an Akamai
    environment. This action is used to push configurations to either the Staging
    or Production networks, allowing security teams to dynamically manage client-based
    access controls or reputation lists. It supports identifying the target list by
    either its unique ID or its display name.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves input parameters
    and ensures that at least one identifier (Name or ID) is present. It also validates
    the format of the notification emails if provided.

    2. **ID Resolution**: If a **Client List ID** is not explicitly provided, the
    action queries the Akamai API (via a GET request) to fetch all available client
    lists and matches the provided **Client List Name** to find the correct ID.

    3. **Activation Request**: The action sends a POST request to the Akamai API's
    activation endpoint, specifying the list ID, target environment (Production/Staging),
    comments, and notification recipients.

    4. **Result Processing**: Upon a successful API response, the action marks the
    execution as successful and attaches the raw activation metadata (including activation
    ID and status) to the action's JSON results.


    ### Additional Notes

    * Either **Client List Name** or **Client List ID** must be provided for the action
    to execute successfully.

    * If both are provided, the **Client List ID** takes precedence.
