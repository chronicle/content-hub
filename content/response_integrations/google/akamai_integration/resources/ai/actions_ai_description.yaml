Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Akamai server using the provided connection parameters.
    This action is used to verify that the SOAR platform can successfully authenticate
    and communicate with the Akamai API.



    ### Flow Description

    1. **Initialize API Client**: The action initializes the Akamai API client using
    the integration's configuration parameters (Host, Client Token, Client Secret,
    Access Token, and SSL verification settings).

