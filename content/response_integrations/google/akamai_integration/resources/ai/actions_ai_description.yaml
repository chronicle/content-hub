Activate Network List:
  ai_description: >-
    ### General Description

    The Activate Network List action triggers the activation of a specific network
    list within the Akamai environment. This operation is used to deploy changes to
    IP or CIDR blocks across Akamai's edge network.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action extracts the input parameters
    and validates that either a Network List Name or a Network List ID is provided.

    2. **ID Resolution**: If only a Network List Name is provided, the action queries
    the Akamai API to fetch all available network lists and matches the name to find
    the corresponding unique ID.

    3. **Activation Request**: The action sends a POST request to the Akamai API's
    activation endpoint (`/network-list/v2/network-lists/{network_list_id}/environments/{environment}/activate`),
    passing the environment, comments, and notification recipients.

    4. **Result Processing**: Upon a successful API response, the action marks the
    execution as successful and attaches the raw activation metadata (including activation
    ID and status) to the action's JSON results.


    ### Additional Notes

    * This action does not run on entities; it operates globally based on the provided
    parameters.
