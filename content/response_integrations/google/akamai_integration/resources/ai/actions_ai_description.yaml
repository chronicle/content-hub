Add Items To Client List:
  ai_description: >-
    ### General Description

    Adds one or more items to a specific Akamai client list. This action allows for
    bulk addition of values (such as IPs, GEO locations, or ASNs) to existing lists,
    supporting metadata like descriptions, tags, and expiration dates for each item.



    ### Additional Notes

    * **Identifier Requirement**: Either 'Client List Name' or 'Client List ID' must
    be configured for the action to run successfully.

    * **Precedence**: If both 'Client List Name' and 'Client List ID' are provided,
    the action will prioritize the 'Client List ID'.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the target list identifiers
    and the details of the items to be added.

    2. **Validation**: It verifies that at least one list identifier is present and
    validates that the expiration date follows the ISO 8601 standard.

    3. **List Resolution**: The action fetches all available client lists from Akamai
    to resolve the provided name or ID into a valid internal Akamai list ID.

    4. **API Interaction**: It constructs a payload containing the items and their
    metadata, then sends a POST request to the Akamai API to append these items to
    the target list.

    5. **Output**: The action returns a success status and provides the raw JSON response
    from Akamai containing details of the appended items.
