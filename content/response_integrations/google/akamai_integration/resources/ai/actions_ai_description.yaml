Activate Network List:
  ai_description: >-
    The **Activate Network List** action triggers the activation of a specific network
    list within the Akamai environment. This is a critical operation for deploying
    changes to IP or CIDR blocks across Akamai's edge network.



    ### Additional Notes

    * Either **Network List Name** or **Network List ID** must be provided for the
    action to execute successfully.

    * This action does not run on entities; it operates globally based on the provided
    parameters.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves the input parameters
    and ensures that at least one identifier (Name or ID) is present. It also validates
    the email format for notification recipients.

    2. **ID Resolution**: If only a **Network List Name** is provided, the action
    queries the Akamai API to fetch all available network lists and matches the name
    to find the corresponding **Unique ID**.

    3. **Activation Request**: The action sends a POST request to the Akamai API's
    activation endpoint, passing the environment, comments, and notification recipients.

    4. **Result Processing**: Upon a successful API response, the action marks the
    execution as successful and attaches the raw activation metadata (including activation
    ID and status) to the action's JSON results.
