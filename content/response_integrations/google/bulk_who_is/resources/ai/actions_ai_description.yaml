WhoIs Details:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves Whois information (registration details, country, etc.)
      for domains and IPs, which aligns with the 'Enrich IOC' expected outcome. It
      does not perform any other actions such as updating alerts, managing tickets,
      or remediating threats.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action queries the BulkWhoIs API to fetch registration details, country,
    city, and other Whois information for URL, Hostname, and Address entities. The
    retrieved data is used to enrich the entities within Google SecOps, providing
    additional context for investigations.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Verify SSL | No | Boolean | Whether to verify the SSL certificate of the BulkWhoIs
    API. Default is False. |

    | Api Key | Yes | String | The API key for authenticating with the BulkWhoIs API.
    |

    | Secret Key | Yes | String | The Secret key for authenticating with the BulkWhoIs
    API. |


    ### Flow Description

    1. Initializes the BulkWhoIs API client with the provided credentials.

    2. Iterates through the target entities, filtering for supported types (URL, Hostname,
    Address) and ensuring Hostnames are not internal.

    3. Extracts the domain or IP address from the entity identifier.

    4. Queries the BulkWhoIs API for Whois details.

    5. Parses the response to extract relevant fields such as country, city, and registrant
    information.

    6. Enriches the entities with the extracted data and marks them as enriched.

    7. Attaches the Whois details as an entity table and a JSON result.

    8. Updates the entities in the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with Whois enrichment data.
    reasoning: >-
      The action fetches Whois data from the BulkWhoIs API (fetches_data=True). It
      does not modify any external systems (can_mutate_external_data=False). It updates
      the entities in Google SecOps with the retrieved Whois information (can_mutate_internal_data=True,
      can_update_entities=True). It does not create insights, modify alert data, or
      create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities and does
      not mutate external state. It only performs allowed internal mutations (updating
      entities). Therefore, it is classified as an Enrichment action. It does not
      perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by `entity_type`
      (URL, HOSTNAME, ADDRESS). For HOSTNAME entities, it also checks `not entity.is_internal`.
      Therefore, it filters by entity type and the `is_internal` flag.
