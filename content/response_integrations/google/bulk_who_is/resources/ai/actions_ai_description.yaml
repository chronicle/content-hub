WhoIs Details:
  ai_description: >-
    ### General Description

    Retrieves Whois information for domain and IP address entities using the BulkWhoIs
    API. It enriches the entities with the retrieved data, providing context such
    as registrant details, country, and city.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Filters entities to process only URLs, external Hostnames, and IP Addresses.

    3. Extracts the relevant domain or IP address to scan from the entity identifier.

    4. Makes a POST request to the BulkWhoIs API (`http://api.bulk-whois-api.com/api/query`)
    to fetch Whois details for each valid entity.

    5. Parses the API response to extract Whois information.

    6. Enriches the entity's additional properties with the parsed data and marks
    the entity as enriched.

    7. Adds the Whois details as an entity table and a JSON result.

    8. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    Internal hostname entities are explicitly skipped and will not be queried.
  ai_short_description: >-
    Retrieves Whois information for domain and IP address entities using the BulkWhoIs
    API and enriches the entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with Whois enrichment data.
    reasoning: >-
      The action fetches data from the BulkWhoIs API using a POST request (which acts
      as a query in this context, not a mutation of external state). It updates internal
      entities with the retrieved Whois data by calling `siemplify.update_entities`.
