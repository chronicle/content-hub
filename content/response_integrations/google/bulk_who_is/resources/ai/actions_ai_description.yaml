Ping:
  ai_description: >-
    General Description

    Tests the connectivity to the BulkWhoIs service by performing a sample query.
    This action verifies that the integration is correctly configured and can communicate
    with the external API.


    Flow Description

    1. Extract configuration parameters: `Api Key`, `Secret Key`, and `Verify SSL`.

    2. Initialize the `WhoisManager` with the provided credentials.

    3. Execute the `test_connectivity` method, which performs a POST request to the
    BulkWhoIs API using the hardcoded IP "8.8.8.8".

    4. Validate the response from the API.

    5. Return "Connection Established" if successful, or "Connection Failed" if not.


    Additional Notes

    This action does not require any entities to run. It is used solely for verifying
    the integration configuration.
  ai_short_description: >-
    Tests connectivity to the BulkWhoIs service by performing a sample query.
