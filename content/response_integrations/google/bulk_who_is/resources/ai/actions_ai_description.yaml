WhoIs Details:
  ai_description: >-
    ### General Description

    Fetches Whois information for domain, URL, and IP address entities using the BulkWhoIs
    service. This action retrieves registration details and contextual information
    to assist in threat intelligence and asset analysis.


    ### Flow Description

    1. Initialize integration configuration (API Key, Secret Key, SSL verification).

    2. Iterate through target entities.

    3. For each entity (URL, Hostname, or Address), extract the relevant identifier
    (e.g., domain from URL).

    4. Call the `WhoisManager.scan` method, which performs an HTTP POST request to
    the BulkWhoIs API with a signed payload.

    5. Parse the response and update the entity's `additional_properties` with the
    retrieved Whois data.

    6. Mark the entity as enriched and update it within the SOAR platform.

    7. Add the enrichment results to the action result as a table and JSON.


    ### Additional Notes

    Requires valid API credentials. Handles errors gracefully per entity, ensuring
    the action continues even if one entity fails to enrich.
  ai_short_description: >-
    Fetches Whois information for domain, URL, and IP address entities using the BulkWhoIs
    service.
