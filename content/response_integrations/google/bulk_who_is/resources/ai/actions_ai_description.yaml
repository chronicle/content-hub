  ai_description: >-
    Tests connectivity to the BulkWhoIs service by performing a WHOIS query on a test
    IP address (8.8.8.8).


    ### Parameters

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters (API Key, Secret Key, Verify SSL).


    ### Action Flow

    1. Extracts the integration configuration parameters (API Key, Secret Key, Verify
    SSL).

    2. Initializes the `WhoisManager` to handle API communication.

    3. Executes a test query against the BulkWhoIs API using the hardcoded IP address
    `8.8.8.8`.

    4. Evaluates the response and returns a success message if the connection is established,
    or a failure message if an error occurs.
