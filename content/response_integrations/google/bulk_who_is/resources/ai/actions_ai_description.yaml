Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the BulkWhoIs service. This action verifies that the integration
    is correctly configured and can successfully communicate with the BulkWhoIs API.


    ### Flow Description

    1. Initializes the BulkWhoIs manager using the provided integration configuration
    credentials (API Key and Secret Key).

    2. Executes a test query against the BulkWhoIs API by scanning a hardcoded IP
    address (8.8.8.8).

    3. Evaluates the API response to determine if the connection and authentication
    were successful.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not process any case entities or modify any data. It is solely
    used for diagnostic and configuration verification purposes.
  ai_short_description: >-
    Tests connectivity to the BulkWhoIs service by executing a test query against
    the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
