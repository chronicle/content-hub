    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a simple connectivity test (Ping). It makes a POST request to
      the BulkWhoIs API using a hardcoded IP (8.8.8.8) to verify credentials and network
      access. It does not fetch contextual data for alerts or entities, nor does it
      mutate any external or internal data, update entities, or create insights.
