Acknowledge Alert Groups:
  ai_description: >-
    ### General Description

    Acknowledge or un-acknowledge alert groups in the FireEye HX platform. This action
    updates the acknowledgement status of specified alert groups in the external system
    based on the provided parameters, allowing for better synchronization between
    the FireEye HX platform and the SOAR platform.


    ### Flow Description

    1. Extract configuration parameters (API Root, Username, Password, Verify SSL)
    for the FireEye HX integration.

    2. Extract action parameters: `Alert Groups IDs`, `Acknowledgment` (Acknowledge/Un-acknowledge),
    `Acknowledgment Comment` (optional), and `Limit` (optional).

    3. Initialize the `FireEyeHXManager` with the provided credentials.

    4. Call the `hx_manager.ackowledge_alert_groups` method, which performs a PATCH
    request to the FireEye HX API endpoint `/alert_groups` with the specified alert
    group IDs and the desired acknowledgement status.

    5. Process the response from the API and return a success or failure message based
    on the outcome.


    ### Additional Notes

    This action modifies the state of alert groups in the external FireEye HX system.
    It does not modify any data within the SOAR platform itself.
  ai_short_description: >-
    Acknowledges or un-acknowledges alert groups in the FireEye HX platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the acknowledgement status of alert groups in the FireEye HX platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PATCH request to the FireEye HX API to update the acknowledgement
      status of alert groups. This constitutes a mutation of external data. It does
      not fetch data, mutate internal data, update entities, create insights, modify
      alert data, or create case comments.
