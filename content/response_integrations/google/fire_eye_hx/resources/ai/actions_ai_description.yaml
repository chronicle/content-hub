Get Host Alert Groups:
  ai_description: >-
    ### General Description

    Retrieves alert groups associated with a specific host from FireEye HX. This action
    allows analysts to query FireEye HX for security alerts related to a given Hostname
    or IP Address, providing visibility into the threat activity on that endpoint.


    ### Flow Description

    1. **Initialization**: The action initializes the `FireEyeHXManager` using the
    provided API credentials (API Root, Username, Password) and SSL verification settings.

    2. **Entity Processing**: The action iterates through the provided `target_entities`
    (Hostname or IP Address).

    3. **Host Search**: For each entity, the action queries FireEye HX to find the
    corresponding host. If multiple hosts are found, it selects the one with the most
    recent `last_poll_timestamp`.

    4. **Alert Group Retrieval**: The action calls the FireEye HX API to fetch alert
    groups for the identified host. This request can be filtered by the `Acknowledgment
    Filter` parameter (All, Only Acknowledged, or Only Unacknowledged) and limited
    by the `Max Alert Groups To Return` parameter.

    5. **Result Presentation**: The retrieved alert groups are added to the action's
    JSON result and displayed as a data table in the SOAR platform.


    ### Additional Notes

