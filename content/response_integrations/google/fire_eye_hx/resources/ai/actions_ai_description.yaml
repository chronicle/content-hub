Cancel Host Contain:
  ai_description: >-
    ### General Description

    Cancels the containment of a host on the FireEye HX server based on Address or
    Hostname entities. This action restores network communication capabilities for
    the specified endpoints.


    ### Flow Description

    1. Iterates through the target Address and Hostname entities.

    2. Queries the FireEye HX API (`GET /hosts`) to find the matching host agent ID
    for each entity.

    3. If multiple hosts match, selects the one with the most recent poll timestamp.

    4. Sends a `DELETE` request to the FireEye HX API (`/hosts/{agent_id}/containment`)
    to cancel the containment status of the identified host.

    5. Returns a summary of successful and failed operations.


    ### Additional Notes

    Action is not supported for Linux hosts by FireEye HX.
