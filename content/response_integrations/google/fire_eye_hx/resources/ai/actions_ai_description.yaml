  ai_description: >-
    The "Get Alerts" action retrieves FireEye HX alerts associated with specific Hostname
    or IP Address entities. It queries the FireEye HX API to find matching hosts and
    then fetches their corresponding alerts based on various filtering criteria, returning
    the results as a data table and JSON.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Limit | String | No | The maximum number of alerts to return (e.g., 100). |

    | Has Share Mode | Drop-down | No | Filters alerts triggered from indicators with
    a specific share mode. Available values: any, restricted, unrestricted. |

    | Alert Resolution Status | Drop-down | No | Filters alerts based on their resolution
    status. Available values: any, active_threat, alert, block, partial_block. |

    | Alert reported in last x hours | String | No | Filters alerts reported within
    the specified number of recent hours (e.g., 4). |

    | Alert Source | Drop-down | No | Filters alerts by their source. Available values:
    any, exd (exploit detection), mal (malware alert), ioc (indicator of compromise).
    |

    | Alert ID | String | No | Fetches a specific alert by its identifier. |


    ### Action Flow

    1. **Entity Iteration**: The action iterates through the provided target entities,
    specifically looking for Hostname and IP Address types.

    2. **Host Identification**: For each valid entity, it queries FireEye HX to find
    the corresponding host agent. If multiple hosts match, it selects the one with
    the most recent poll timestamp.

    3. **Alert Retrieval**: It fetches alerts for the identified host agent, applying
    any provided filters such as Limit, Share Mode, Resolution Status, Timeframe,
    Source, or a specific Alert ID.

    4. **Result Generation**: The retrieved alerts are formatted into a CSV-like data
    table for the case wall, and the raw alert data is returned as a JSON result.
