Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye HX server using the provided credentials. This
    action validates that the integration is correctly configured and can successfully
    authenticate with the FireEye HX API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, and `Verify SSL` from the integration settings.

    2. It initializes the `FireEyeHXManager` using these credentials.

    3. The action performs a connection test by attempting to authenticate and then
    immediately calling the `logout` method to verify the session.

    4. If the connection is successful, the action returns a success message and a
    result value of "true".

    5. If an exception occurs during the process, the action catches the error, logs
    it, and returns a failure message with a result value of "false".


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data retrieval or modification operations on the FireEye
    HX platform beyond session validation.
