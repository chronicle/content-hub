Cancel Host Contain:
  ai_description: >-
    ### General Description

    Cancels the containment of a host on the FireEye HX server. This action removes
    the network isolation for a specified host, restoring its full communication capabilities.


    ### Flow Description

    1. Initialize the FireEye HX manager with the provided credentials (API Root,
    Username, Password, and SSL verification settings).

    2. Iterate through the provided entities (Hostname or IP Address).

    3. For each entity, search for the corresponding host in FireEye HX using `get_hosts`
    or `get_hosts_by_ip`.

    4. If multiple hosts are found, select the one with the most recent `last_poll_timestamp`.

    5. Execute `cancel_containment_by_id` via a DELETE API call to the FireEye HX
    server to remove the host from containment.

    6. Report the success or failure of the operation for each entity.


    ### Additional Notes

    This action is not supported for Linux hosts by FireEye HX.
