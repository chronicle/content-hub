Contain Host:
  ai_description: >-
    ### General Description

    Initiates a containment task on the FireEye HX server for specified IP Address
    and Hostname entities. This action isolates the endpoint from the network to prevent
    further communication during a security incident.


    ### Flow Description

    1. Iterates through the target entities, filtering for IP Address and Hostname
    entity types.

    2. For each valid entity, queries the FireEye HX API to find matching hosts based
    on the IP address or hostname.

    3. If multiple hosts are found for a single entity, selects the host with the
    most recent poll timestamp.

    4. Sends a POST request to the FireEye HX API to contain the identified host,
    optionally approving the containment automatically based on the provided parameter.

    5. Returns a summary of successfully contained entities, missing entities, and
    any errors encountered.


    ### Additional Notes

    This action is not supported for Linux hosts by FireEye HX.
