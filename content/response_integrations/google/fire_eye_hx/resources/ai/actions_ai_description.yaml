Contain Host:
  ai_description: >-
    ### General Description

    Initiates a containment task on a FireEye HX server for specified host entities.
    This action allows security analysts to isolate compromised endpoints directly
    from the SOAR platform, preventing further network activity from the affected
    host. The action supports both IP address and Hostname entities.


    ### Flow Description

    1. **Initialization**: The action initializes the `FireEyeHXManager` using the
    provided API credentials and configuration.

    2. **Entity Processing**: It iterates through the provided `target_entities`.

    3. **Host Identification**: For each entity, it performs an API call to fetch
    matching hosts from the FireEye HX server:
        * If the entity is a `HOSTNAME`, it calls `get_hosts` with the hostname.
        * If the entity is an `ADDRESS`, it calls `get_hosts_by_ip` with the IP address.
    4. **Selection**: If multiple hosts are returned, the action selects the host
    with the most recent `last_poll_timestamp`.

    5. **Containment**: It executes the containment task by calling the `contain_host_by_id`
    method, which performs a POST request to the FireEye HX API to initiate the containment
    state.

    6. **Completion**: The action logs the status of the containment task for each
    entity and closes the session.


    ### Additional Notes

    This action is not supported for Linux hosts by FireEye HX. If the `Approve Containment`
    parameter is set to false, the containment request may require manual approval
    in the FireEye HX web console.
  ai_short_description: >-
    Initiates a containment task on a FireEye HX server for specified host entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a containment task on the FireEye HX server for the identified host.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches host data (GET) to identify the correct agent and then performs
      a state-changing operation (POST) to contain the host on the external FireEye
      HX server. It does not mutate internal SOAR data or update entities.
