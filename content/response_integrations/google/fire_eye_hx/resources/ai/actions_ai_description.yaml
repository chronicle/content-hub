  ai_description: >-
    Acknowledges or un-acknowledges specified alert groups in FireEye HX.


    ### General Description

    This action updates the acknowledgement status of one or more alert groups in
    FireEye HX. It allows analysts to sync the status of alert groups handled within
    the SOAR platform back to the FireEye HX platform, optionally adding an acknowledgement
    comment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert Groups IDs | String | Yes | A comma-separated list of Alert Group IDs
    to acknowledge or un-acknowledge. |

    | Acknowledgment Comment | String | No | A comment to add to the relevant alert
    groups when updating their status. |

    | Acknowledgment | Dropdown | Yes | Specifies whether to 'Acknowledge' or 'Un-acknowledge'
    the specified alert groups. |

    | Limit | String/Integer | No | The maximum amount of alert group listings to
    return from the API in the JSON result. Defaults to 50 if not provided or if a
    non-positive value is given. |


    ### Flow Description

    1. Extracts the provided parameters, including the Alert Groups IDs, Acknowledgment
    status, and Limit.

    2. Initializes the FireEye HX API manager with the integration configuration.

    3. Sends a PATCH request to the FireEye HX API to update the acknowledgement status
    and comment for the specified alert groups.

    4. Evaluates the response to determine which alert groups were successfully updated
    and which failed.

    5. Adds the raw API response to the action's JSON result and returns a summary
    message.
