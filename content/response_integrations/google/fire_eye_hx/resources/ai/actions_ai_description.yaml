  ai_description: >-
    Cancels the containment of a host in FireEye HX based on IP Address or Hostname
    entities.


    ### Flow Description

    1. Iterates over the target entities provided in the action.

    2. Filters entities to process only those of type `ADDRESS` or `HOSTNAME`.

    3. Queries FireEye HX to find matching hosts for each entity identifier.

    4. If multiple hosts match a single entity, selects the host with the most recent
    poll timestamp.

    5. Sends a request to FireEye HX to cancel the containment status of the identified
    host.

    6. Returns a summary message indicating which entities were successfully uncontained
    and which failed or were not found.


    ### Parameters Description

    This action does not require any specific input parameters to be configured.


    ### Additional Notes

    Action is not supported for Linux hosts by FireEye HX.
