Is Contain Malware Alerts:
  ai_description: >-
    ### General Description

    Checks if malware alerts are listed for provided Hostname or IP Address entities
    on the FireEye HX server. It retrieves host statistics and marks the entity as
    suspicious if any malware alerts are associated with the host.


    ### Flow Description

    1. Iterates through the target entities, filtering for Hostname and IP Address
    entity types.

    2. For each valid entity, makes a GET request to the FireEye HX API to fetch matching
    hosts (`/hx/api/v3/hosts`).

    3. If multiple hosts match the entity, selects the host with the most recent `last_poll_timestamp`.

    4. Checks if the selected host has any malware alerts. If malware alerts are found,
    the entity's `is_suspicious` flag is set to true.

    5. Updates the modified entities in Google SecOps and returns the host statistics
