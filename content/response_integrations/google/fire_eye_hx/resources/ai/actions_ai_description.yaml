Acknowledge Alert Groups:
  ai_description: >-
    ### General Description

    Updates the acknowledgment status of specific alert groups in FireEye HX. This
    action allows analysts to acknowledge or un-acknowledge alert groups and optionally
    append a comment to them.


    ### Flow Description

    1. Extracts the provided Alert Group IDs, Acknowledgment status, optional Acknowledgment
    Comment, and Limit parameters.

    2. Initializes the FireEye HX API client.

    3. Makes a PATCH request to the FireEye HX API (`/alert_groups` endpoint) to update
    the acknowledgment status and comment for the specified alert groups.

    4. Evaluates the API response to determine which alert groups were successfully
    updated and which failed.

    5. Returns the raw JSON response from the API and outputs a summary message.


    ### Additional Notes

    Note that you can acknowledge alert groups only, not individual alerts, via the
    FireEye HX API.
  ai_short_description: >-
    Updates the acknowledgment status of specified alert groups in FireEye HX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the acknowledgment status and optionally adds a comment to specified
      alert groups in FireEye HX.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the FireEye HX API to update the acknowledgment
      status of alert groups, which mutates external data. It does not fetch contextual
      data, mutate internal SecOps data, update entities, or create insights.
