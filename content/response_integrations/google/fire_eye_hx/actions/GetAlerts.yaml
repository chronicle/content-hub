name: Get Alerts
description: Get FireEye HX alerts based on provided Siemplify entity and search conditions.
    Action works on Host or IP Siemplify entities.
integration_identifier: FireEyeHX
parameters:
-   name: Limit
    default_value: ''
    type: string
    description: How many alerts action should return, for example, 100.
    is_mandatory: false
-   name: Has Share Mode
    default_value: any
    type: ddl
    optional_values:
    - any
    - restricted
    - unrestricted
    description: 'Filter alerts that were triggered from indicators with specific
        share mode. Available values: any, restricted, unrestricted.'
    is_mandatory: false
-   name: Alert Resolution Status
    default_value: any
    type: ddl
    optional_values:
    - any
    - active_threat
    - alert
    - block
    - partial_block
    description: 'Filter alerts based on alert resolution status. Available values:
        any, active_threat, alert, block, partial_block.'
    is_mandatory: false
-   name: Alert reported in last x hours
    type: string
    description: Filter alerts reported in last x hours, for example last 4 hours.
    is_mandatory: false
-   name: Alert Source
    default_value: any
    type: ddl
    optional_values:
    - any
    - exd (exploit detection)
    - mal (malware alert)
    - ioc (indicator of compromise)
    description: 'Source of alert. Available values: any, exd (exploit detection),
        mal (malware alert), ioc (indicator of compromise).'
    is_mandatory: false
-   name: Alert ID
    type: string
    description: Return specific alert by alert identifier.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_alerts_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
