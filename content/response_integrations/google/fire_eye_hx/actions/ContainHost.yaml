name: Contain Host
description: 'Create contain host task on the FireEye HX server based on the Siemplify
    IP or Host Siemplify entities. Note: Action is not supported for Linux hosts by
    Fireye HX.'
integration_identifier: FireEyeHX
parameters:
-   name: Approve Containment
    default_value: 'false'
    type: boolean
    description: Specify if containment request for host should be automatically approved
        to create contain host task on FireEye HX server. If not approved automatically,
        containment request can be approved in FireEye HX web console.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
