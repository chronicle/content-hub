name: Get Indicator
description: Get information on specific Indicator from FireEye HX server.
integration_identifier: FireEyeHX
parameters:
-   name: Indicator Category
    type: string
    description: 'Specify indicator category uri_name value. uri_name can be found
        by running “Get Indicators” action. '
    is_mandatory: true
-   name: Indicator Name
    type: string
    description: 'Specify indicator uri_name value. uri_name can be found by running
        “Get Indicators” action. '
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_indicator_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
