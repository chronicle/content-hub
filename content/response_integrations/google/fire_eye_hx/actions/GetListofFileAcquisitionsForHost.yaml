name: Get List of File Acquisitions For Host
description: Get list of file acquisitions requested for host from FireEye HX server.
    Action works on Host or IP Siemplify entities.
integration_identifier: FireEyeHX
parameters:
-   name: Search Term
    type: string
    description: Searches all file acquisitions for hosts connected to the FireEye
        HX server. The search_term can be any condition value.
    is_mandatory: false
-   name: Limit
    type: string
    description: How many records action should return, for example, 100.
    is_mandatory: false
-   name: Filter Field
    type: string
    description: Lists only results with the specified field value, results can be
        filtered by external correlation identifier (external_id).
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_listof_file_acquisitions_for_host_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
