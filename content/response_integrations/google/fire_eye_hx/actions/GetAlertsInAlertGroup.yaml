name: Get Alerts in Alert Group
description: Get all the alerts found in the specified alert group.
integration_identifier: FireEyeHX
parameters:
-   name: Alert Group ID
    default_value: ''
    type: string
    description: Specify a comma-separated list of Alert Group IDs for which you want
        to retrieve alerts.
    is_mandatory: true
-   name: Limit
    default_value: '50'
    type: string
    description: Specify the maximum amount of alerts listings coming back from the
        API, for the alert group. Default is 50.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_alerts_in_alert_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
