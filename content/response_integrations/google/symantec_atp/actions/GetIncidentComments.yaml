name: Get Incident Comments
description: Retrieve comments related to the incident.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/symantec-atp#get_incident_comments
integration_identifier: SymantecATP
parameters:
-   name: Incident UUID
    default_value: ''
    type: string
    description: Specify the UUID of the incident.
    is_mandatory: true
-   name: Max Comments To Return
    default_value: '20'
    type: string
    description: 'Specify how many comments to return. Maximum is 1000 comments. This
        is a Symantec ATP limitation. '
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_incident_comments_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: 'is_success '
