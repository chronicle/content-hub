Add Comment To Incident:
  ai_description: >-
    ### General Description

    Adds a comment to a specific incident in Symantec ATP.


    ### Flow Description

    1. Retrieves the `Incident UUID` and `Comment` text from the action parameters.

    2. Makes a PATCH request to the Symantec ATP API to append the provided comment
    to the specified incident.

    3. Returns a success message if the comment was added successfully, or an error
    message if the incident was not found or the operation failed.


    ### Additional Notes

    The comment length is limited to 512 characters due to Symantec ATP API limitations.
