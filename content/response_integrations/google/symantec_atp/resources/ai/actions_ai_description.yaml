Submit Files To Sandbox:
  ai_description: >-
    ### General Description

    Submits file hashes to the Symantec ATP sandbox for detonation and analysis. This
    action allows security analysts to trigger automated sandboxing of suspicious
    files identified during an investigation, facilitating the retrieval of behavioral
    reports and threat intelligence.


    ### Flow Description

    1. The action initializes the `SymantecATPManager` using the provided configuration
    (API Root, Client ID, Client Secret, and SSL verification settings).

    2. It iterates through the `target_entities` provided in the case.

    3. For each entity, it verifies if the entity type is `FILEHASH` and if the identifier
    is a valid SHA256 hash.

    4. Validated hashes are submitted to the Symantec ATP sandbox via the `submit_file_to_sandbox`
    API call.

