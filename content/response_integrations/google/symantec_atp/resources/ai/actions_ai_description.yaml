Add To Blacklist:
  ai_description: >-
    ### General Description

    Creates a blacklist policy for specific entities (File Hash, Hostname, IP Address,
    URL) in Symantec ATP. This action initiates a state change on the external Symantec
    ATP system to prevent network traffic or execution associated with the specified
    entity.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to process only those of type File Hash, Hostname, IP Address,
    or URL.

    3. For File Hash entities, determines if the hash is SHA256 or MD5 based on its
    length.

    4. Makes a POST request to the Symantec ATP API (`atpapi/v2/policies/blacklist`)
    to create a blacklist policy for the entity's identifier.

    5. If the policy is successfully created, attaches an insight to the entity in
    Google SecOps indicating it was blacklisted.


    ### Additional Notes

    This action directly affects the security controls in Symantec ATP by adding the
    entity to the active blacklist.
