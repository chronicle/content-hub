Add To WhiteList:
  ai_description: >-
    ### General Description

    Adds specified entities (File Hashes, Hostnames, IP Addresses, and URLs) to the
    Symantec ATP whitelist policy. This action interacts with the Symantec ATP API
    to create a new whitelist policy for each supported entity, preventing them from
    being blocked or generating alerts. Note that MD5 hashes are not supported due
    to Symantec ATP limitations; only SHA256 hashes are processed.


    ### Flow Description

    1. Iterates through the target entities provided in the action.

    2. Checks the entity type (FileHash, Hostname, Address, URL). For FileHashes,
    it verifies if the hash is a valid SHA256 hash.

    3. Makes a POST request to the Symantec ATP API (`atpapi/v2/policies/whitelist`)
    to create a whitelist policy for the entity.

    4. If successful, adds an insight to the entity in the SecOps platform indicating
    it was whitelisted.

    5. Returns a summary message of all successfully whitelisted entities.


    ### Additional Notes

    - MD5 hashes cannot be added to the whitelist due to Symantec ATP limitations.

    - Ensure the integration is configured with the necessary API credentials and
    permissions to create policies.
  ai_short_description: >-
    Adds specified entities (File Hashes, Hostnames, IP Addresses, and URLs) to the
