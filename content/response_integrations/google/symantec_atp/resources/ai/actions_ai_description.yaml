Delete Blacklist Policy:
  ai_description: >-
    ### General Description

    Deletes a blacklist policy for a specified entity (URL, File Hash, or IP Address)
    from the Symantec ATP system. This action helps in managing security policies
    by removing unnecessary or outdated blacklist entries.


    ### Flow Description

    1. Extracts the required integration configuration parameters: API Root, Client
    ID, Client Secret, and Verify SSL.

    2. Filters the provided `target_entities` to include only those with types: URL,
    File Hash, or Address.

    3. For each valid entity, the action calls the Symantec ATP API to retrieve the
    blacklist policy ID associated with the entity's identifier.

    4. If a policy is found, it sends a DELETE request to the Symantec ATP API to
    remove the blacklist policy.

    5. Logs the success or failure of the deletion for each entity.

    6. Returns a summary message indicating which entities were successfully removed
    from the blacklist.


    ### Additional Notes

    This action performs a destructive operation on external security policies. Ensure
    that the entities provided are intended to be removed from the blacklist.
