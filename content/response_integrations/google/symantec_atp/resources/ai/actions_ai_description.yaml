    1. The action initializes the `SymantecATPManager` using the provided integration
    configuration (API Root, Client ID, Client Secret).

    2. It iterates through the list of `target_entities` provided by the SOAR platform.

    3. For each entity, the action calls `atp_manager.delete_whitelist_policy_by_identifier(entity.identifier)`.

    4. Within this method, the action performs a `GET` request to the Symantec ATP
    API (`atpapi/v2/policies/whitelist`) to retrieve the list of existing whitelist
    policies.

    5. It searches the retrieved policies to find a match for the entity's identifier.

    6. If a matching policy is found, the action performs a `DELETE` request to the
    Symantec ATP API (`atpapi/v2/policies/whitelist/{policy_id}`) to remove the policy.

    7. The action logs the success or failure of the operation for each entity and
    returns the final status.


