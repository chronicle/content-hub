    interacts with the Symantec ATP API to modify the state of a specific incident,
    effectively marking it as resolved or closed within the external system.


    ### Flow Description

    1. Initialize the `SymantecATPManager` using configuration parameters (API Root,
    Client ID, Client Secret).

    2. Retrieve the `Incident UUID` from the action parameters.

    3. Call the `close_incident` method of the `SymantecATPManager`, which sends a
    `PATCH` request to the Symantec ATP API to update the incident's state to closed
    (state 4).

    4. Log the outcome and end the action with a success or failure message.


