Delete Blacklist Policy:
  ai_description: >-
    ### General Description

    Deletes a blacklist policy for specific entities (URL, FileHash, Address) in Symantec
    ATP. This action removes the specified indicators from the active blocklist, restoring
    their connectivity or execution rights.


    ### Flow Description

    1. Initializes the Symantec ATP manager with the provided integration credentials.

    2. Iterates over the target entities, filtering for supported types: URL, FileHash,
    and Address.

    3. For each valid entity, makes a GET request to Symantec ATP to retrieve the
    corresponding blacklist policy ID based on the entity's identifier.

    4. Makes a DELETE request to the Symantec ATP API to remove the identified blacklist
    policy.

    5. Collects the results and outputs a summary message detailing which entities
    had their policies successfully deleted and which were not found.


    ### Additional Notes

    If an entity does not have an existing blacklist policy in Symantec ATP, the action
    will log it as not found and continue processing the remaining entities.
