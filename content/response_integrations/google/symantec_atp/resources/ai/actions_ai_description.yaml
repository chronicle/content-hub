Add To WhiteList:
  ai_description: >-
    ### General Description

    Adds specified entities (IP addresses, Hostnames, URLs, or SHA256 file hashes)
    to the Symantec ATP whitelist policy. This action allows security analysts to
    mark known-good indicators as trusted within the Symantec ATP environment to prevent
    future false-positive alerts.


    ### Flow Description

    1. The action initializes the `SymantecATPManager` using the integration configuration
    (API Root, Client ID, Client Secret).

    2. It iterates through the provided `target_entities`.

    3. For each entity, it checks the entity type:
       - If `FILEHASH`, it verifies the hash is a valid SHA256 (MD5 is not supported
    by Symantec ATP).
       - If `HOSTNAME`, `ADDRESS`, or `URL`, it proceeds with the corresponding type.
    4. For each valid entity, it calls the Symantec ATP API (`POST` request to `atpapi/v2/policies/whitelist`)
    to create a whitelist policy.

    5. If the API call is successful, it adds an entity insight to the case indicating
    the entity was whitelisted.

    6. Finally, it returns a summary message of all successfully whitelisted entities
    and any errors encountered.


    ### Additional Notes

    - MD5 hashes are not supported for whitelisting due to Symantec ATP limitations.

    - This action performs a state change on the external Symantec ATP system.
  ai_short_description: >-
    Adds specified entities (IPs, Hostnames, URLs, or SHA256 hashes) to the Symantec
    ATP whitelist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
