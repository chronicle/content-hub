Update Incident Resolution:
  ai_description: >-
    ### General Description

    Updates the resolution status of an incident within the Symantec ATP platform.
    This action allows analysts to change the resolution state of a specific incident,
    facilitating better incident management and tracking within the Symantec ATP environment.


    ### Flow Description

    1. Extracts integration configuration (API root, credentials) and action parameters
    (Incident UUID, Resolution Status).

    2. Initializes the `SymantecATPManager` with the provided credentials.

    3. Maps the selected `Resolution Status` string to its corresponding integer value.

    4. Executes a `PATCH` request to the Symantec ATP API (`atpapi/v2/incidents`)
    to update the incident's state and resolution status using the provided `incident_uuid`.

    5. Returns a success message or logs an error if the incident is not found or
    permissions are insufficient.


    ### Additional Notes

    This action modifies the state of an incident in the external Symantec ATP system.
