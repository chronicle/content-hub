Add Comment To Incident:
  ai_description: >-
    ### General Description

    Adds a comment to a specific incident within the Symantec ATP platform. This action
    allows analysts to append notes or context directly to an existing incident record
    in the external system.


    ### Flow Description

    1. The action initializes the `SymantecATPManager` using the provided integration
    configuration (API Root, Client ID, Client Secret).

    2. It retrieves the `Incident UUID` and `Comment` parameters provided by the user.

    3. The action calls the `add_incident_comment` method, which performs a `PATCH`
    request to the Symantec ATP API endpoint (`atpapi/v2/incidents`) to update the
    incident record with the provided comment.

    4. The action returns a success status indicating whether the comment was successfully
    attached to the incident.


    ### Additional Notes

    The comment content is subject to a 512-character limit imposed by the Symantec
    ATP platform.
  ai_short_description: >-
    Adds a comment to a specific incident in the Symantec ATP platform.
