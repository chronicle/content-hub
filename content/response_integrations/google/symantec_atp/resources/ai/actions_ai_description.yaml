    entity to an endpoint UUID.

    4. Once the UUID is retrieved, the action sends a 'delete_endpoint_file' command
    to the Symantec ATP API using the provided file hash.

    5. Upon a successful command submission, an entity insight is added to the SOAR
    platform to document the action.

    6. The action generates a result table containing the mapping of entities to their
    respective command IDs.


