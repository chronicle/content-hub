name: Wait For Field Update
description: ''
integration_identifier: ServiceNow
parameters:
-   name: Table Name
    type: string
    description: 'Specify what table should be used to create a record. '
    is_mandatory: true
-   name: Record Sys ID
    type: string
    description: Specify Sys ID of the needed record.
    is_mandatory: true
-   name: Field - Column name
    type: string
    description: Specify name of the column that is expected to be updated.
    is_mandatory: true
-   name: Field - Values
    type: string
    description: 'Specify values that are expected in the column. Example: In Progress,Resolved.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_field_update_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
script_result_name: updated_field
