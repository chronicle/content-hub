name: Wait For Status Update
description: ServiceNow - Wait For Status Update
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/servicenow#wait_for_status_update
integration_identifier: ServiceNow
parameters:
-   name: Incident Number
    type: string
    description: 'Specify number of the incident. Format: INCxxxxxxx'
    is_mandatory: true
-   name: Statuses
    type: string
    description: 'Specify what statuses of the incident are expected. Example: In
        Progress,Resolved.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_status_update_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
script_result_name: new_status
