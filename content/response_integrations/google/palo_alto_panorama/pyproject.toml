[project]
name = "PaloAltoPanorama"
version = "36.0"
description = "Panorama network security management simplifies management tasks while delivering comprehensive controls and deep visibility into network-wide traffic and security threats"
requires-python = ">=3.11,<3.12"
dependencies = [ "bs4>=0.0.2", "defusedxml==0.7.1", "environmentcommon", "python-dateutil>=2.9.0.post0", "requests==2.32.4", "tipcommon", "xmltodict==0.13.0",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.12-py2.py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.1-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
