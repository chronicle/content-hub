name: Edit Blocked Applications
description: Block and unblock applications. Each application is added to or removed
    from a given policy
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#edit_blocked_applications
integration_identifier: PaloAltoPanorama
parameters:
-   name: Applications To Block
    default_value: ''
    type: string
    description: 'Specify what kind of application should be blocked. Example: apple-siri,windows-azure.'
    is_mandatory: false
-   name: Applications To UnBlock
    default_value: ''
    type: string
    description: 'Specify what kind of application should be unblocked. Example: apple-siri,windows-azure.'
    is_mandatory: false
-   name: Device Name
    default_value: ''
    type: string
    description: Specify name of the device. The default device name for Palo Alto
        Panorama is localhost.localdomain. Visit action documentation to get more
        insights on where you can find this value.
    is_mandatory: true
-   name: Device Group Name
    default_value: ''
    type: string
    description: Specify name of the device group. Visit action documentation to get
        more insights on where you can find this value.
    is_mandatory: true
-   name: Policy Name
    default_value: ''
    type: string
    description: Specify name of the policy.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/edit_blocked_applications_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: success
