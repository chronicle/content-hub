name: Get Correlated Traffic Between IPs
description: Action returns correlated network traffic logs from Palo Alto Panorama
    between Source IP Address and Destination IP Address.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#get_correlated_traffic_between_ips
integration_identifier: PaloAltoPanorama
parameters:
-   name: Source IP
    default_value: ''
    type: string
    description: Specify source IP that will be used to get traffic.
    is_mandatory: true
-   name: Destination IP
    default_value: ''
    type: string
    description: Specify destination IP that will be used to get traffic.
    is_mandatory: true
-   name: Max Hours Backwards
    default_value: ''
    type: string
    description: Specify the amount of hours from where to fetch logs.
    is_mandatory: false
-   name: Max Logs to Return
    default_value: '50'
    type: string
    description: Specify how many logs to return. Maximum is 1000.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_correlated_traffic_between_i_ps_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
