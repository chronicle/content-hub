Add Ips to group:
  ai_description: >-
    General Description

    Adds specified IP address entities to a designated address group within a Palo
    Alto Panorama device group. This action interacts with the Panorama API to update
    the address group configuration and retrieves the updated list of addresses in
    that group.


    Flow Description

    1. Extract configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Device Name, Device Group Name, Address Group Name).

    2. Iterate through the provided `target_entities` and filter for entities of type
    `ADDRESS`.

    3. Initialize the `PanoramaManager` to communicate with the Palo Alto Panorama
    API.

    4. For each identified IP address, call the `EditBlockedIpsInGroup` method to
    add the IP to the specified address group.

    5. Call `ListAddressesInGroup` to retrieve the updated list of addresses in the
    group.

    6. Update the action result with the JSON representation of the updated address
    group and provide a summary message of successful or failed additions.


    Additional Notes

    This action performs a mutation on the external Palo Alto Panorama system by modifying
    address group memberships.
  ai_short_description: >-
    Adds specified IP address entities to a designated address group within a Palo
    Alto Panorama device group.
