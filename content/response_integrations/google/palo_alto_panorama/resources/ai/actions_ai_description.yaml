Add Ips to group:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to an address group in Palo Alto Panorama. This
    action modifies the configuration of the Panorama device group to include the
    targeted IP addresses, which is typically used to update firewall policies such
    as blocklists or allowlists.


    ### Flow Description

    1. Extracts the action parameters: Device Name, Device Group Name, and Address
    Group Name.

    2. Iterates over the target entities, filtering for those of type `ADDRESS`.

    3. For each valid IP address, makes an API call to Palo Alto Panorama to add the
    IP to the specified address group.

    4. Retrieves the updated list of addresses in the group via another API call.

    5. Returns the updated list as a JSON result and provides a summary message of
    successful and failed additions.


    ### Additional Notes

    The action relies on the `EditBlockedIpsInGroup` method, which modifies the address
    group configuration on the Panorama device. Ensure the specified address group
    exists and is attached to the correct policy.
  ai_short_description: >-
    Adds IP address entities to a specified address group in Palo Alto Panorama.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to a specified address group in Palo Alto Panorama.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a set request to the Palo Alto Panorama API to add IP addresses
      to an address group, mutating external data. It does not fetch enrichment data,
      update internal entities, or create insights.
