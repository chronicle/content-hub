Block ips in policy:
  ai_description: >-
    ### General Description

    Blocks specified IP address entities within a Palo Alto Panorama security policy.
    This action interacts with the Palo Alto Panorama API to update the security policy
    by adding the identified IP addresses to the blocklist, effectively preventing
    traffic from these sources or to these destinations.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, device details) from the
    integration settings.

    2. Validates the `Target` parameter to ensure it is either 'source' or 'destination'.

    3. Iterates through the provided target entities, filtering specifically for `ADDRESS`
    types.

    4. For each valid IP address, calls `PanoramaManager.EditBlockedIps` to add the
    IP to the specified policy on the Palo Alto Panorama device.

    5. Calls `PanoramaManager.FindRuleBlockedIps` to retrieve the updated list of
    blocked IPs for the policy.

    6. Returns the updated list of blocked IPs as a JSON result and provides a summary
    message indicating success or failure for each entity.


    ### Additional Notes

    Requires valid Palo Alto Panorama credentials and appropriate permissions to modify
    security policies. The action will fail if the `Target` parameter is not correctly
    specified as 'source' or 'destination'.
