Commit Changes:
  ai_description: >-
    ### General Description

    Commits pending configuration changes in Palo Alto Panorama. This action applies
    modifications made to the device's configuration, making them active.


    ### Flow Description

    1. Establishes a connection to the Palo Alto Panorama API.

    2. Initiates a commit operation via an API request, optionally restricting the
    commit to changes made only by the current user based on the provided parameter.

    3. Monitors the commit job status asynchronously, periodically checking if the
    job has finished.

    4. Returns the final success or failure status of the commit operation.


    ### Additional Notes

    In order to use the "Only My Changes" option, the user authenticated via the integration
    must have admin privileges on the Panorama device.
