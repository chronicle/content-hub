Block Urls:
  ai_description: >-
    ### General Description

    Blocks URLs by adding them to a specified URL category in Palo Alto Panorama.
    This action allows security teams to automate the process of blacklisting malicious
    URLs directly on the perimeter firewall or management platform.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, SSL verification) for the
    Palo Alto Panorama integration.

    2. Extracts action parameters (Device Name, Device Group Name, URL Category Name).

    3. Iterates through target entities, filtering for `URL` types.

    4. Initializes `PanoramaManager` to interact with the Panorama API.

    5. Calls `api.AddBlockedUrls` to add the identified URLs to the specified URL
    category.

    6. Calls `api.FindRuleBlockedUrls` to retrieve the updated list of blocked URLs.

    7. Constructs an output message summarizing the success or failure of the operation.

    8. Adds the updated list of blocked URLs to the action results.


    ### Additional Notes

    Requires a pre-configured policy and URL category in Panorama to function correctly.
    The action will fail if the specified URL category does not exist or if the credentials
    lack sufficient permissions.
