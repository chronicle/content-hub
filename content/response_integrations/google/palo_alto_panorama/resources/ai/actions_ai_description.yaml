Unblock ips in policy:
  ai_description: >-
    ### General Description

    Unblocks specific IP addresses from a defined security policy within Palo Alto
    Panorama. This action interacts with the Panorama API to remove IP addresses from
    a specified policy (either source or destination), effectively restoring network
    connectivity or removing restrictions for those indicators.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration parameters (API
    credentials, server address) and action-specific parameters (Device Name, Device
    Group Name, Policy Name, Target).

    2. **Entity Filtering**: The action iterates through the provided `target_entities`,
    filtering specifically for entities of type `ADDRESS`.

    3. **API Interaction**: For each identified IP address, the action utilizes the
    `PanoramaManager` to call the `EditBlockedIps` method. This method performs a
    `delete` operation followed by a `set` operation on the Panorama API to remove
    the IP from the specified policy.

    4. **Verification**: After processing the IPs, the action calls `FindRuleBlockedIps`
    to retrieve the updated list of blocked IPs for the policy.

    5. **Result Reporting**: The action compiles the results, logs the success or
    failure for each entity, and returns the updated policy state as a JSON result.


    ### Additional Notes

    This action requires valid Palo Alto Panorama credentials and correct configuration
    of the Device Name, Device Group Name, and Policy Name. The `Target` parameter
    must be set to either 'source' or 'destination' to correctly identify which part
    of the security rule to modify.
  ai_short_description: >-
    Unblocks IP addresses from a specified Palo Alto Panorama security policy.
