    ### General Description

    Pushes pending commits for a specific device group in Palo Alto Panorama. This
    action applies configuration changes made to the specified device group and monitors
    the progress of the commit job until it completes.


    ### Flow Description

    1. Extracts the `Device Group Name` from the action parameters.

    2. Initiates an asynchronous push operation via the Palo Alto Panorama API by
    sending a commit request for the specified device group.

    3. Retrieves the job ID for the initiated push operation.

    4. Periodically polls the Panorama API to check the commit status of the job ID.

    5. Completes the action once the job status indicates it has finished successfully
    or failed.


