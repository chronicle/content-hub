Edit Blocked Applications:
  ai_description: >-
    ### General Description

    Blocks or unblocks specified applications within a given policy on a Palo Alto
    Panorama device. This action modifies the security rules to control application
    traffic.


    ### Flow Description

    1. Extracts the provided device name, device group name, policy name, and the
    lists of applications to block and unblock.

    2. Retrieves the current candidate configuration from the Panorama API to identify
    currently blocked applications in the specified policy.

    3. Calculates the new set of applications to be blocked by adding the requested
    applications and removing the ones to be unblocked.

    4. Sends an API request to Panorama to update the policy with the new list of
    blocked applications.

    5. Retrieves the updated list of blocked applications from the rule to confirm
    the changes.

    6. Returns the updated list of blocked applications as a JSON result.


    ### Additional Notes

    - The action requires the exact device name, device group name, and policy name
    as configured in Panorama.

    - If neither 'Applications To Block' nor 'Applications To UnBlock' are provided,
    the action will not make any changes.
