Unblock ips in policy:
  ai_description: >-
    ### General Description

    Unblocks specific IP address entities from a given policy in Palo Alto Panorama.
    This action initiates a state change on the external device to restore network
    traffic to or from the specified IP addresses by removing them from the policy's
    blocklist.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters (Device Name, Device
    Group Name, Policy Name, Target).

    2. Iterates over the target entities, filtering specifically for IP addresses
    (`ADDRESS`).

    3. For each valid IP address, makes an API call to Palo Alto Panorama to remove
    the IP from the specified policy's blocklist.

    4. Retrieves the updated list of blocked IPs for the policy from Panorama.

    5. Attaches the updated list of blocked IPs as a JSON result to the action and
    outputs a summary message detailing successful and failed unblock operations.


    ### Additional Notes

    - The `Target` parameter must be strictly set to either `source` or `destination`.
