Commit Changes:
  ai_description: >-
    ### General Description

    Commits configuration changes in Palo Alto Panorama. This action triggers a commit
    operation on the Panorama device to apply pending configuration changes.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and the `Only My Changes` parameter.

    2. If `is_first_run` is true, it calls `CommitChanges` on the Panorama manager,
    which triggers a commit operation on the Panorama device.

    3. If successful, it returns a `job_id` to track the asynchronous operation.

    4. If `is_first_run` is false, it retrieves the `job_id` from the `additional_data`
    and calls `check_commit_status` to verify if the commit job has finished.

    5. Returns the final status of the commit operation.


    ### Additional Notes

    The action supports asynchronous execution. The `Only My Changes` parameter, if
    enabled, restricts the commit to changes made by the current user (requires admin
    privileges).
