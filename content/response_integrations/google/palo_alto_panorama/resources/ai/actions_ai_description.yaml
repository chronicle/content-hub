Edit Blocked Applications:
  ai_description: >-
    ### General Description

    This action modifies the security policy on a Palo Alto Panorama device by adding
    or removing specified applications from the blocklist. It allows security teams
    to dynamically update network security policies to block or unblock traffic for
    specific applications based on threat intelligence or operational requirements.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Username,
    Password, Verify SSL) and action parameters (Device Name, Device Group Name, Policy
    Name, Applications To Block, Applications To UnBlock).

    2. It initializes the `PanoramaManager` to establish a connection with the Palo
    Alto Panorama API.

    3. The action calls the `EditBlockedApplication` method, which performs the following
    steps:
        - Retrieves the current configuration of the specified policy.
        - Updates the application list by adding the applications provided in the
    'Applications To Block' parameter and removing those in the 'Applications To UnBlock'
    parameter.
        - Sends the updated configuration back to the Panorama device.
    4. After the modification, the action calls `FindRuleBlockedApplications` to retrieve
    and verify the updated list of blocked applications.

    5. Finally, it returns a success message indicating which applications were affected
    and outputs the updated list of blocked applications as a JSON result.


    ### Additional Notes

    - This action directly modifies the security policy on the Panorama device. Ensure
    that the provided 'Device Name', 'Device Group Name', and 'Policy Name' are accurate
    to avoid unintended configuration changes.

    - The action does not operate on specific entities (e.g., IP, Hash) but rather
    on policy configurations defined by the user parameters.
  ai_short_description: >-
    Modifies the security policy on a Palo Alto Panorama device by adding or removing
    applications from the blocklist.
