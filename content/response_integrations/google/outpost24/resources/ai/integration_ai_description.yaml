product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Outpost24 integration is primarily focused on vulnerability management and
    asset enrichment. The 'Outpost24 - Outscan Findings Connector' ingests vulnerability
    findings into Google SecOps, which directly aligns with the Vulnerability Management
    category by identifying susceptible assets and exploit risks. The 'Enrich Entities'
    action provides risk scores, vulnerability data, and device metadata (such as
    business criticality and exposure status) for IP and Hostname entities. This capability
    satisfies the criteria for Threat Intelligence (enriching indicators with risk
    data) and Asset Inventory (providing asset context and criticality). It does not
    perform general SIEM log analysis, EDR process-level investigation, network blocking,
    email security, IAM management, cloud-native configuration auditing, ITSM ticketing,
    or collaboration/human-in-the-loop workflows.
  siem: false
  threat_intelligence: true
  vulnerability_management: true
