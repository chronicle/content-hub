product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Outpost24 integration primarily focuses on vulnerability management and asset
    inventory. The 'Outscan Findings Connector' ingests vulnerability findings into
    the SOAR platform, which aligns with the Vulnerability Management category. The
    'Enrich Entities' action retrieves device metadata (business criticality, exposure)
    and vulnerability findings for IP and Hostname entities, which directly supports
    both Asset Inventory (by providing device details) and Vulnerability Management
    (by providing vulnerability status). It does not perform SIEM log analysis, EDR
    host containment, network security blocking, email security, IAM management, cloud
    security configuration, ITSM ticketing, or collaboration/notification tasks.
  siem: false
  threat_intelligence: false
  vulnerability_management: true
