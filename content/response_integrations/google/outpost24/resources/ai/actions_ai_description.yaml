    get_alert_information: false
    reasoning: >-
      The action retrieves device information and vulnerability findings for IP addresses
      and hostnames from Outpost24. This aligns with the 'Enrich Asset' expected outcome,
      as it returns contextual metadata and vulnerability status for a resource. It
      does not perform threat intelligence lookups for IOCs, nor does it perform any
      containment, ticketing, or email operations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
