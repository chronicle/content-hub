Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using threat intelligence and vulnerability
    data from Outpost24. This action retrieves device details, including business
    criticality, exposure status, and associated findings (vulnerabilities or information),
    and updates the entity with this contextual metadata.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, Username,
    Password, Verify SSL) and action parameters (Risk Level Filter, Max Findings,
    etc.).

    2. **Connectivity**: Initializes the Outpost24 manager and performs a connectivity
    test.

    3. **Entity Filtering**: Iterates through the provided target entities, filtering
    for supported types: IP Address and Hostname.

    4. **Data Retrieval**: For each valid entity, calls the Outpost24 API (`GET /opi/rest/outscan/targets`
    and `GET /opi/rest/outscan/findings`) to fetch device information and findings
    based on the provided filters.

    5. **Enrichment**: Updates the entity's `additional_properties` with the retrieved
    data, sets the `is_enriched` flag to true, and adds data tables to the action
    result.

    6. **Insight Creation**: If enabled, generates an entity insight containing the
    device's criticality, findings statistics, and risk levels.

    7. **Finalization**: Updates the entities in the SOAR platform and returns the
    execution status.


    ### Additional Notes

    This action supports filtering findings by risk level (e.g., Low, Medium, High,
    Critical) and finding type (Vulnerability, Information). It handles pagination
    for API requests to ensure all relevant findings are retrieved up to the specified
    maximum limit.
  ai_short_description: >-
    Enriches IP Address and Hostname entities with vulnerability and device information
    from Outpost24.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds insights to the SOAR platform.
    reasoning: >-
      The action fetches data from the Outpost24 API (fetches_data=true). It updates
      internal entities with enrichment data and creates insights (can_update_entities=true,
      can_create_insight=true). It does not mutate external systems.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
