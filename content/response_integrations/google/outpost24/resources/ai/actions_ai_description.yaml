    reasoning: >-
      The action retrieves device metadata (business criticality, exposure) and vulnerability
      findings for IP and Hostname entities. This matches both 'Enrich IOC' (threat
      intel/vulnerabilities) and 'Enrich Asset' (device metadata).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
