    enrich_asset: true
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches vulnerability and device information for IP addresses (IOCs)
      and Hostnames (Assets), which aligns with both 'Enrich IOC' and 'Enrich Asset'
      categories. It does not perform any external mutations or alert updates.
    remove_ioc_from_allowlist: false
