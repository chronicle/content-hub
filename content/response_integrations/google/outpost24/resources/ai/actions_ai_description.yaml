Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities using information from Outpost24. It
    retrieves device details and optionally fetches associated findings based on risk
    level and type filters, providing valuable context for security investigations.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the Outpost24 API client and tests connectivity.

    3. Filters target entities to process only IP Addresses and Hostnames.

    4. For each suitable entity, makes a GET request to the Outpost24 API to retrieve
    device information.

    5. If the 'Return Finding Information' parameter is enabled, makes additional
    GET requests to fetch findings associated with the device, applying the specified
    risk level and type filters.

    6. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    7. Adds data tables containing device details and findings to the action results.

    8. Optionally creates an insight for the entity with the retrieved information.

    9. Updates the entities in the SecOps platform.


    ### Additional Notes

    The action handles pagination when fetching findings and limits the results based
    on the 'Max Findings To Return' parameter. For IP addresses, it fetches all devices
    and filters locally, whereas for hostnames, it applies the filter directly in
    the API request.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving device information and
    associated findings from Outpost24.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device information and findings from Outpost24 via GET requests
      (`fetches_data` is true). It does not mutate external data. It updates internal
      entities using `siemplify.update_entities` (`can_update_entities` is true) and
      creates insights using `siemplify.add_entity_insight` (`can_create_insight`
      is true).
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` where `SUPPORTED_ENTITY_TYPES = [EntityTypes.ADDRESS,
      EntityTypes.HOSTNAME]`. Therefore, it targets Address and Hostname entities
      and filters by entity type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata and threat intelligence for IP addresses
      and hostnames from Outpost24, matching the 'Enrich IOC' (for IP) and 'Enrich
      Asset' (for Hostname) expected outcomes. It does not perform any containment,
      ticketing, or alert modification actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Finding Risk Level Filter | String | No | Specify a comma-separated list of
    risk level findings that will be used during filtering. Possible values: Initial,
    Recommendation, Low, Medium, High, Critical. If nothing is provided, action will
    fetch findings with all risk levels. |

    | Max Findings To Return | String | No | Specify how many findings to process
    per entity. If nothing is provided, action will return 100 findings. |

    | Return Finding Information | Boolean | No | If enabled, action will also retrieve
    information about findings that were found on the endpoint. |

    | Finding Type | DropDown | No | Specify what kind of findings should be returned.
    |

    | Create Insight | Boolean | No | If enabled, action will create an insight containing
    all of the retrieved information about the entity. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Outpost24 server using the provided integration configuration
    parameters. This action ensures that the API credentials and network settings
    are correct and that the platform can successfully communicate with the Outpost24
    service.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Outpost24Manager with the provided credentials.

    3. Makes an API GET request to the Outpost24 findings endpoint (`/opi/rest/outscan/findings?limit=1`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
  ai_short_description: >-
    Tests connectivity to the Outpost24 server to ensure the integration is configured
    correctly.
  capabilities:
    can_create_case_comments: false
