  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Finding Risk Level Filter | String | No | Comma-separated list of risk levels
    (Initial, Recommendation, Low, Medium, High, Critical) to filter findings. Defaults
    to all levels. |

    | Max Findings To Return | String | No | Maximum number of findings to process
    per entity. Defaults to 100. |

    | Return Finding Information | Boolean | No | If enabled, retrieves detailed finding
    information for the endpoint. Defaults to true. |

    | Finding Type | Ddl | No | Specifies the type of findings to return (All, Vulnerability,
    Information). Defaults to All. |

    | Create Insight | Boolean | No | If enabled, creates an entity insight with the
    retrieved information. Defaults to true. |
Ping:
  ai_description: >-
    General Description

    Tests connectivity to the Outpost24 server to ensure the integration is correctly
    configured.


    Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    from the integration settings.

    2. Initializes the `Outpost24Manager` with the provided credentials.

    3. Executes the `test_connectivity` method, which performs an HTTP GET request
    to the Outpost24 API endpoint (`/opi/rest/outscan/findings?limit=1`).

    4. Validates the API response to ensure the connection is successful.

    5. Returns a success or failure message based on the connectivity test result.


    Additional Notes

    This action is used for troubleshooting and verifying integration connectivity.
    It does not modify any data or entities.
  ai_short_description: >-
    Tests connectivity to the Outpost24 server to verify integration configuration.
