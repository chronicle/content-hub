  ai_description: >-
    ### General Description

    Tests connectivity to the Outpost24 server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the Outpost24Manager with the provided credentials.

    3. Sends a GET request to the Outpost24 API to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration configuration parameters.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the Outpost24 API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a Ping script designed to test connectivity to the Outpost24 API.
      It makes a GET request to verify credentials but does not fetch contextual data
      for alerts or entities, nor does it mutate any external or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping' and its sole purpose is to test connectivity. According
      to Rule 0.1, Ping actions are not enrichment actions. It also does not perform
      any remediation tasks.
    remediation: false
