    reasoning: >-
      The action fetches device and vulnerability data from Outpost24 (fetches_data=true).
      It does not modify external systems (can_mutate_external_data=false). It updates
      internal entity properties, adds data tables, and creates insights (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data to enrich entities and does not mutate external systems.
      It performs allowed internal mutations (updating entities, creating insights,
      adding data tables). Therefore, it is an enrichment action.
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` (where `SUPPORTED_ENTITY_TYPES` includes `ADDRESS`
      and `HOSTNAME`).
