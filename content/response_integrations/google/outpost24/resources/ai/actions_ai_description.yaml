    update_ticket: false
  ai_description: >-
    Enriches IP Address and Hostname entities using Outpost24. This action retrieves
    device information and vulnerability findings from Outpost24 to provide context
    on the asset's risk level, exposure, and associated vulnerabilities.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Finding Risk Level Filter | String | No | Specify a comma-separated list of
    risk level findings that will be used during filtering. Possible values: Initial,
    Recommendation, Low, Medium, High, Critical. If nothing is provided, the action
    will fetch findings with all risk levels. |

    | Max Findings To Return | Integer | No | Specify how many findings to process
    per entity. If nothing is provided, the action will return 100 findings. |

    | Return Finding Information | Boolean | No | If enabled, the action will also
    retrieve detailed information about findings that were found on the endpoint.
    |

    | Finding Type | Dropdown | No | Specify what kind of findings should be returned
    (All, Vulnerability, Information). |

    | Create Insight | Boolean | No | If enabled, the action will create an insight
    containing all of the retrieved information about the entity. |


    ### Action Flow

    1. Iterates through the target entities, filtering for supported types (IP Address
    and Hostname).

    2. For each valid entity, queries the Outpost24 API to retrieve device information.

    3. If `Return Finding Information` is enabled, fetches associated vulnerability
    findings based on the `Finding Risk Level Filter` and `Finding Type`.

    4. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    5. Creates an entity insight and attaches data tables with the findings to the
    case if configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Outpost24 device and finding data,
      and creates entity insights.
    reasoning: >-
      The action fetches device and vulnerability data from the Outpost24 API (fetches_data=true).
      It does not make any POST/PUT/DELETE requests to mutate external data (can_mutate_external_data=false).
      It updates internal entity properties and creates entity insights (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true). It does not modify alert
      data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external state, and its internal mutations are restricted to updating
      entities and creating insights. Therefore, it is classified as an Enrichment
      action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where SUPPORTED_ENTITY_TYPES
      includes EntityTypes.ADDRESS and EntityTypes.HOSTNAME. It does not filter by
      other entity attributes.
