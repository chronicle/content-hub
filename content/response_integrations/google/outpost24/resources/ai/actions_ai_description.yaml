    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to test connectivity but does not fetch contextual
      data for alerts/entities, nor does it mutate any external or internal data,
      update entities, or create insights.
