Outpost24 - Outscan Findings Connector:
  ai_description: >-
    ### General Description

    The Outpost24 - Outscan Findings Connector integrates Google SecOps with the Outpost24
    Outscan platform to automate the ingestion of vulnerability findings. It periodically
    queries the Outpost24 API for security findings, such as vulnerabilities, information,
    or port-related issues, and converts them into cases within Google SecOps for
    further analysis and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process.
    |

    | API Root | String | Yes | API root of the Outpost24 instance. |

    | Username | String | Yes | Username for the Outpost24 account. |

    | Password | String | Yes | Password for the Outpost24 account. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate. |

    | Lowest Risk To Fetch | String | No | Minimum risk level to fetch (Initial, Recommendation,
    Low, Medium, High, Critical). |

    | Type Filter | String | Yes | Comma-separated list of finding types (Vulnerability,
    Information, Port). |

    | Max Days Backwards | Integer | No | Days to look back for the initial run. |

    | Max Findings To Fetch | Integer | No | Max findings to process per iteration.
    |

    | Use whitelist as a blacklist | Boolean | Yes | Toggle to use the whitelist as
    a blacklist. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Proxy username. |

    | Proxy Password | String | No | Proxy password. |


    ### Flow Description

    1. The connector authenticates with the Outpost24 API using the provided credentials.

    2. It determines the time range for fetching findings based on the last successful
    run or the configured 'Max Days Backwards'.

    3. It queries the Outpost24 API for findings, applying filters for type and risk
    level.

    4. It iterates through the fetched findings, applying whitelist/blacklist filters
    based on the product name.

    5. For each valid finding, it maps the data to a Google SecOps case format, including
    environment information if configured.

    6. It checks for overflow conditions and skips already processed findings using
    a local ID tracking file.

    7. Finally, it ingests the processed findings as cases into Google SecOps and
    updates the last success timestamp.
