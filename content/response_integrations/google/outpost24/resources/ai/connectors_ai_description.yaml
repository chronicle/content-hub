Outpost24 - Outscan Findings Connector:
  ai_description: "### General Description\nThe Outpost24 - Outscan Findings Connector\
    \ integrates Google SecOps with the Outpost24 platform. It periodically fetches\
    \ security findings\u2014including vulnerabilities, information, and port-related\
    \ data\u2014from Outpost24 and ingests them as cases into Google SecOps. This\
    \ enables security teams to centralize and respond to security findings identified\
    \ by Outpost24 within the SOAR platform.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| DeviceProductField\
    \ | String | Yes | Source field name to retrieve the Product Field name. |\n|\
    \ EventClassId | String | Yes | Source field name to retrieve the Event Class\
    \ ID. |\n| Environment Field Name | String | No | Field name where the environment\
    \ name is stored. |\n| Environment Regex Pattern | String | No | Regex pattern\
    \ to manipulate the environment field value. |\n| PythonProcessTimeout | Integer\
    \ | Yes | Timeout limit for the Python process in seconds. |\n| API Root | String\
    \ | Yes | The API root URL of the Outpost24 instance. |\n| Username | String |\
    \ Yes | Username for the Outpost24 account. |\n| Password | String | Yes | Password\
    \ for the Outpost24 account. |\n| Verify SSL | Boolean | Yes | Whether to verify\
    \ the SSL certificate for the connection. |\n| Lowest Risk To Fetch | String |\
    \ No | Minimum risk level to fetch (Initial, Recommendation, Low, Medium, High,\
    \ Critical). |\n| Type Filter | String | Yes | Comma-separated list of finding\
    \ types (Vulnerability, Information, Port). |\n| Max Days Backwards | Integer\
    \ | No | Lookback period in days for the initial connector run. |\n| Max Findings\
    \ To Fetch | Integer | No | Maximum number of findings to process per iteration.\
    \ |\n| Use whitelist as a blacklist | Boolean | Yes | If enabled, the whitelist\
    \ acts as a blacklist. |\n| Proxy Server Address | String | No | Address of the\
    \ proxy server. |\n| Proxy Username | String | No | Username for proxy authentication.\
    \ |\n| Proxy Password | String | No | Password for proxy authentication. |\n\n\
    ### Flow Description\n1. Authenticates with the Outpost24 API using the provided\
    \ credentials.\n2. Determines the time range for fetching findings based on the\
    \ last successful run or the configured `Max Days Backwards`.\n3. Queries the\
    \ Outpost24 API for findings, applying filters for type, risk level, and whitelist/blacklist\
    \ status.\n4. Processes the fetched findings, mapping them to the internal alert\
    \ format.\n5. Checks for overflow and applies environment mapping based on configuration.\n\
    6. Ingests the processed findings as cases into Google SecOps.\n7. Updates the\
    \ last success timestamp and stores processed IDs to prevent duplicate ingestion."
