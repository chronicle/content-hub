Ping:
  ai_description: >-
    General Description: Tests the connectivity between the Google SecOps SOAR platform
    and the IPVoid service to ensure the integration is correctly configured.


    Flow Description:

    1. Retrieves the integration configuration, including the API Root, API Key, and
    SSL settings, from the IPVoid integration settings.

    2. Initializes the IPVoidManager with the retrieved credentials.

    3. Executes the `test_connectivity` method, which sends a GET request to the IPVoid
    API endpoint (`/iprep/v1/pay-as-you-go/?stats`) to verify the connection.

    4. Validates the API response to ensure the service is reachable and the credentials
    are valid.

    5. Terminates the action with a success message if the connection is established.


    Additional Notes: This action is intended for administrative use to verify that
    the integration is properly set up and that the platform can successfully communicate
    with the external IPVoid service.
