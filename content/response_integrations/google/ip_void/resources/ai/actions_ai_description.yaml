WhoIs:
  ai_description: >-
    ### General Description

    Queries the IPVoid WhoIs database to retrieve registration and ownership information
    for specific domain names or IP addresses.


    ### Flow Description

    1. Initializes the IPVoid manager using the provided API credentials.

    2. Iterates through the target entities, filtering for Address and Hostname entity
    types.

    3. For each matching entity, makes an HTTP POST request to the IPVoid WhoIs endpoint
    (`http://www.ipvoid.com/whois/`) to fetch the HTML report.

    4. Attaches the retrieved WhoIs HTML report to the entity within the SecOps platform.

    5. Returns a summary message listing the entities for which reports were successfully
    attached.


    ### Additional Notes

    This action only retrieves data and does not modify the external IPVoid service
    or update the entity's internal properties.
