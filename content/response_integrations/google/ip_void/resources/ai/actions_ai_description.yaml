WhoIs:
  ai_description: >-
    ### General Description

    Queries the Whois database via the IPVoid service to retrieve registration and
    ownership information for IP addresses and hostnames. This action provides valuable
    context for threat hunting and incident investigation by attaching detailed Whois
    reports directly to the relevant entities within the SecOps platform.


    ### Flow Description

    1. Initialize the IPVoid manager using the configuration parameters (Api Root,
    Api Key, Use SSL) retrieved from the integration settings.

    2. Iterate through the `target_entities` provided in the case.

    3. Filter the entities to process only those of type 'ADDRESS' or 'HOSTNAME'.

    4. For each valid entity, perform a POST request to the IPVoid Whois service to
    fetch the HTML report.

    5. Attach the retrieved HTML report to the entity within the SecOps platform using
    `add_entity_html_report`.

    6. Compile a list of entities for which reports were successfully attached and
    return a summary message.


    ### Additional Notes

    This action is strictly an enrichment operation. It retrieves data from an external
    service and attaches it to the case entities without modifying any external system
    states or internal alert metadata.
