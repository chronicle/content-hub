Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the IPVoid service to ensure the integration is configured
    correctly and the provided credentials are valid.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, Use
    SSL).

    2. Initializes the IPVoidManager with the provided credentials.

    3. Makes an HTTP GET request to the IPVoid API (`/iprep/v1/pay-as-you-go/?stats`)
    to verify connectivity.

    4. Returns a success message if the connection is successfully established.


    ### Additional Notes

    This action does not process any entities or alerts and is solely used for diagnostic
    purposes.
