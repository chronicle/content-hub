Get Ip Reputation:
  ai_description: >-
    ### General Description

    Scans IP addresses using the IPVoid service to retrieve reputation data, including
    blacklist status, detection rates, and geographic information. This action helps
    analysts identify potentially malicious IP addresses involved in spamming or malware
    incidents.


    ### Flow Description

    1. Initialize the IPVoid manager using the API credentials provided in the integration
    configuration.

    2. Iterate through the target entities, filtering specifically for those of type
    'ADDRESS'.

    3. For each valid IP address, query the IPVoid API to retrieve reputation and
    blacklist data.

    4. Process the raw API response to generate a blacklist report and extract key
    enrichment metrics (e.g., detection rate, engines count).

    5. Update the entity's `additional_properties` with the retrieved enrichment data.

    6. Generate an entity insight containing the country code if available.

    7. Evaluate the number of blacklist detections against the configured 'Threshold'
    parameter; if the threshold is exceeded, mark the entity as suspicious.

    8. Update the entities within the SOAR platform and attach the full JSON result
    to the action output.


    ### Additional Notes

    This action requires a valid IPVoid API key configured in the integration settings.
    The 'Threshold' parameter determines the sensitivity for flagging an IP as suspicious
    based on the number of blacklist detections.
  ai_short_description: >-
    Scans IP addresses through IPVoid to retrieve reputation data, blacklist status,
    and detection metrics, updating entities with enrichment information and suspicious
    status based on a configurable threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from an external API (IPVoid) to enrich entities. It
      updates the entities within the SOAR platform (adding properties and insights)
      but does not mutate external system state or modify alert metadata.
