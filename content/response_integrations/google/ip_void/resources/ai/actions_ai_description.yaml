Get Ip Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities by scanning them through multiple DNS-based blacklists
    (DNSBL) and IP reputation services using IPVoid. It retrieves threat intelligence,
    updates the entity's suspicious status based on a defined threshold, and generates
    an insight with the analysis results.


    ### Flow Description

    1. Iterates over the target entities and filters for IP Address entities.

    2. For each IP address, makes an API call (POST request to `/iprep/v1/pay-as-you-go/`)
    to IPVoid to fetch reputation data.

    3. Extracts enrichment data such as country code, detections, detection rate,
    and engines count.

    4. Adds a table to the entity with the blacklist report.

    5. Creates an insight for the entity containing the country code.

    6. Updates the entity's additional properties with the enrichment data.

    7. If the number of detections exceeds the configured `Threshold`, marks the entity
    as suspicious.

    8. Marks the entity as enriched and updates it in the platform.

    9. Returns the raw reputation data as a JSON result.


    ### Additional Notes

    The action only processes entities of type ADDRESS.
  ai_short_description: >-
    Enriches IP Address entities by retrieving reputation and threat intelligence
    data from IPVoid, updating the entity's suspicious status based on a threshold,
    and generating insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API request to IPVoid to fetch IP reputation data (fetches_data=true).
      It does not mutate external data. It updates internal entities (can_update_entities=true)
      and creates insights (can_create_insight=true).
