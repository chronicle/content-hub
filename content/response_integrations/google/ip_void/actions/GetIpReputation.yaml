name: Get Ip Reputation
description: Scan an IP address through multiple DNS-based blacklists (DNSBL) and
    IP reputation services, to facilitate the detection of IP addresses involved in
    malware incidents and spamming activities
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ipvoid#get_ip_reputation
integration_identifier: IPVoid
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: IP risk threshold.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_ip_reputation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
script_result_name: success
