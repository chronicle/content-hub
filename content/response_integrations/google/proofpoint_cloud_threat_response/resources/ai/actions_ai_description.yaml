  parameters_description: >-
    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on the integration's global configuration parameters:

    * **API Root**: The base URL for the Proofpoint CTR API.

    * **Client ID**: The unique identifier for the OAuth2 client.

    * **Client Secret**: The secret key for the OAuth2 client.

    * **Verify SSL**: A boolean flag to determine if SSL certificates should be validated.
