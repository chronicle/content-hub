Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool used to verify the connectivity between Google
    SecOps and the Proofpoint Cloud Threat Response (CTR) instance. It ensures that
    the provided credentials are valid and that the API Root is reachable. This action
    is typically used during the initial setup of the integration or for troubleshooting
    communication issues.


    ### Flow Description

    1. **Authentication**: The action initiates an OAuth2 client credentials flow
    by sending the Client ID and Client Secret to the Proofpoint authentication URL
    to obtain a bearer token.

    2. **Connectivity Test**: Using the authenticated session, the action performs
    a POST request to the Proofpoint incidents endpoint (`api/v1/tric/incidents`)
    with a minimal payload (requesting only one row) to verify that the API responds
    correctly.

    3. **Validation**: The action validates the HTTP response. If the status code
    is successful (2xx), it confirms connectivity. If the API returns an error, the
    action catches the exception and reports a failure.


    ### Additional Notes

    * This action does not process any entities and does not modify any data within
    Proofpoint or Google SecOps.
