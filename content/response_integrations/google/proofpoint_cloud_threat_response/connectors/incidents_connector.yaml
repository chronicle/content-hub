name: Proofpoint Cloud Threat Response - Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: The name of the field where the product name is stored.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: product
    type: string
    description: The name of the field that determines the event name (subtype).
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the field where the environment name is stored. If no
        value is provided, the connector uses the default environment.
    is_mandatory: false
    is_advanced: true
    mode: regular
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regular expression pattern to run on the value found in the Environment
        Field Name field. This parameter lets you manipulate the environment field
        using the regular expression logic. Use the default value .* to retrieve the
        required raw Environment Field Name value. If the regular expression pattern
        is null or empty, or the environment value is null, the final environment
        result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: The timeout limit, in seconds, for the Python process that runs the
        current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://threatprotection-api.proofpoint.com
    type: string
    description: The API Root of the Proofpoint Cloud Threat Response instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: The Client ID of the Proofpoint Cloud Threat Response instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: The Client Secret of the Proofpoint Cloud Threat Response instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: ''
    type: string
    description: 'The lowest severity of the alerts to retrieve. The possible values
        are as follows:: High, Medium, Low. If no value is provided, the connector
        ingests alerts with all severity levels.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Status Filter
    default_value: Open
    type: string
    description: The status filter for the ingestion of incidents. The possible values
        are Open, Closed.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Lowest Confidence To Fetch
    default_value: ''
    type: string
    description: The confidence filter for the ingestion of incidents. The possible
        values are High, Medium, Low. If no value is provided, this filter is not
        applied.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Disposition Filter
    default_value: ''
    type: string
    description: 'The disposition filter for the ingestion of incidents. The possible
        values are: Bulk, Clean, Impostor, In Progress, Internal, Low Risk, Malware,
        Manual Review, Not Set, Phish, Scam, Simulated Phish, Spam, Suspicious, Tap
        False Positive, Toad, Vendor'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verdict Filter
    default_value: ''
    type: string
    description: The verdict filter for the ingestion of incidents. The possible values
        are Failed, Low Risk, Manual Review, Threat.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: The number of hours prior to now to retrieve alerts. This parameter
        can apply to the initial connector iteration after you enable the connector
        for the first time, or the fallback value for an expired connector timestamp.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Max Incidents To Fetch
    default_value: 9
    type: integer
    description: 'The number of incidents to process in every connector iteration.
        Max: 9.'
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Use dynamic list as a blocklist
    default_value: false
    type: boolean
    description: If selected, the connector uses the dynamic list as a blocklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If selected, the connector ignores the Google SecOps overflow mechanism.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Proofpoint Cloud Threat Response server.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Pull incidents from Proofpoint Cloud Threat Response. Dynamic List works
    with the "sourceTypes" parameter.
integration: ProofpointCloudThreatResponse
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/proofpoint-cloud-threat-response#proofpoint-cloud-threat-response-incidents-connector
rules: []
is_connector_rules_supported: true
creator: admin
