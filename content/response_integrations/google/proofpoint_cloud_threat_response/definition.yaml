identifier: ProofpointCloudThreatResponse
name: Proofpoint Cloud Threat Response
parameters:
-   name: API Root
    default_value: https://threatprotection-api.proofpoint.com
    type: string
    description: The API Root of the Proofpoint Cloud Threat Response instance.
    is_mandatory: true
    integration_identifier: ProofpointCloudThreatResponse
-   name: Client ID
    default_value: ''
    type: string
    description: The Client ID of the Proofpoint Cloud Threat Response instance.
    is_mandatory: true
    integration_identifier: ProofpointCloudThreatResponse
-   name: Client Secret
    default_value: ''
    type: password
    description: The Client Secret of the Proofpoint Cloud Threat Response instance.
    is_mandatory: true
    integration_identifier: ProofpointCloudThreatResponse
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Proofpoint Cloud Threat Response server. Enabled by default.
    is_mandatory: true
    integration_identifier: ProofpointCloudThreatResponse
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/proofpoint-cloud-threat-response
categories:
- Cloud
- Email Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
