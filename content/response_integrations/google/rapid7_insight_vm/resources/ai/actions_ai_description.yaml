Get Scan Results:
  ai_description: >-
    ### General Description

    Retrieves the results of a specific scan from Rapid7 InsightVM using the provided
    Scan ID. This action will wait until the scan is completed before fetching and
    returning the results.


    ### Flow Description

    1. Initializes the Rapid7 InsightVM manager with the provided integration configuration.

    2. Retrieves the `Scan ID` from the action parameters.

    3. Polls the Rapid7 InsightVM API (`GET /scans/{scan_id}`) every 2 seconds until
    the scan status is marked as completed.

    4. Fetches the detailed scan information using the Rapid7 InsightVM API.

    5. Formats the scan information into a CSV table and adds it to the action's data
    table.

    6. Returns the scan information as a JSON result.


    ### Additional Notes

    The action will block and wait (polling every 2 seconds) until the scan is completed.
    Ensure that the scan is expected to finish within a reasonable timeframe to avoid
    action timeouts.
  ai_short_description: >-
    Retrieves the results of a specific scan from Rapid7 InsightVM by its ID, waiting
    until the scan is completed before returning the data.
