List Scans:
  ai_description: >-
    ### General Description

    Retrieves a list of scans from the Rapid7 InsightVM platform. This action allows
    users to fetch historical scan data, optionally filtered by a specific time range
    (days backwards), and presents the results in both a structured data table and
    raw JSON format for further analysis.


    ### Flow Description

    1. Initialize the `Rapid7Manager` using the provided API credentials and configuration.

    2. Parse the `Days Backwards` parameter to determine the time range for the scan
    retrieval.

    3. Call the Rapid7 API (`GET /scans`) to fetch scan data, applying the `start_time`
    filter if `Days Backwards` is specified.

    4. Process the retrieved scan list by removing the `links` field from each scan
    object.

    5. Format the scan data into a CSV-style data table and add it to the action results.

    6. Add the raw JSON scan data to the action results.

    7. Return a summary message indicating the total number of scans found.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in the Rapid7
    InsightVM platform or the SecOps environment.
