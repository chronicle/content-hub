Enrich Asset:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using Rapid7 InsightVM. This action
    retrieves contextual metadata about the asset, such as OS version, MAC address,
    risk score, and vulnerability counts, to provide better visibility into the asset's
    security posture.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Checks if the entity type is an IP Address or Hostname.

    3. Makes a GET request to the Rapid7 InsightVM API (`/assets/search`) to search
    for the asset by its IP address or hostname.

    4. If the asset is found, extracts relevant details including IP, hostname, MAC
    address, OS, type, risk score, and vulnerabilities.

    5. Updates the entity's `additional_properties` with the retrieved data, prefixed
    with 'Rapid7InsightVm'.

    6. Marks the entity as enriched and attaches a table with the asset details to
    the action results.

    7. Saves the updated entities back to the SecOps platform.


    ### Additional Notes

    If an entity is not found in Rapid7 InsightVM, it is skipped and an error is logged.
    The action relies on the Rapid7 InsightVM integration configuration for authentication.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving asset details, such as
    OS, MAC address, and risk score, from Rapid7 InsightVM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Rapid7 InsightVM API to fetch asset data,
      meaning it fetches data. It does not mutate external data or internal system
      data. It updates the entities with the fetched data using `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
