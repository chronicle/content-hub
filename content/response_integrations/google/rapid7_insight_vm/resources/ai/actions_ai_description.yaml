    1. Extracts the target entities (IP addresses and hostnames) from the case.

    2. Calls the Rapid7 InsightVM API to launch a scan using the provided site name,
    scan engine, and scan template.

    3. If the 'Fetch Results' parameter is enabled, the action waits asynchronously
    for the scan to complete.

    4. Once completed, it retrieves the scan results and attaches them to the case
    as a JSON result and a data table.


    ### Additional Notes

    The action operates asynchronously if 'Fetch Results' is true, polling the Rapid7
    API until the scan finishes. If a scan name is not provided, a default name with
    a timestamp will be generated.
