List Scans:
  ai_description: >-
    ### General Description

    Retrieves a list of scans from Rapid7 InsightVM. This action allows users to fetch
    historical scan data, optionally filtering the results to a specific timeframe
    based on the number of days backwards.


    ### Flow Description

    1. Retrieves the 'Days Backwards' parameter to determine the timeframe for fetching
    scans.

    2. Calculates the start time if a specific number of days backwards is provided.

    3. Makes a GET request to the Rapid7 InsightVM API (`/scans` endpoint) to fetch
    the list of scans.

    4. Filters the retrieved scans based on the calculated start time.

    5. Formats the scan data by removing unnecessary link information.

    6. Outputs the results as a JSON object and attaches a CSV data table named 'Scans'
    to the action results.


    ### Additional Notes

    If 'Days Backwards' is set to 0 or left empty, the action will fetch all available
    scans without time filtering.
