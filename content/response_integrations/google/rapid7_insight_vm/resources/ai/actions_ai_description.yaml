Get Scan Results:
  ai_description: >-
    General Description: Retrieves detailed information about a specific Rapid7 InsightVM
    scan by its ID. This action allows users to query the status and results of a
    scan directly from the Rapid7 InsightVM platform.


    Flow Description:

    1. The action retrieves the `Scan ID` parameter provided by the user.

    2. It initiates a polling loop using the `is_scan_completed` method, which checks
    the scan status via the Rapid7 InsightVM API.

    3. The loop continues until the scan status is confirmed as 'finished'.

    4. Once completed, the action calls `get_scan_by_id` to fetch the full scan details.

    5. The retrieved scan information is formatted into a data table and added to
    the action results.

    6. The raw scan JSON results are added to the action output using `add_result_json`.


    Additional Notes: This action is a polling mechanism that waits for scan completion
    before returning data. Ensure the provided `Scan ID` is valid and accessible within
    the configured Rapid7 InsightVM environment.
