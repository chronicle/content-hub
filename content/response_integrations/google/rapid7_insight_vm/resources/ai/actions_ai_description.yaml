Enrich Asset:
  ai_description: "Enriches asset entities (IP addresses and hostnames) using Rapid7\
    \ InsightVm. \n\n### Flow Description\n1. Initialize `Rapid7Manager` with configuration\
    \ credentials.\n2. Iterate through target entities.\n3. For `ADDRESS` entities,\
    \ call `rapid7_manager.get_asset_by_ip`.\n4. For `HOSTNAME` entities, call `rapid7_manager.get_asset_by_hostname`.\n\
    5. If asset details are found, construct asset information and update the entity's\
    \ `additional_properties` with a `Rapid7InsightVm` prefix.\n6. Mark the entity\
    \ as enriched (`is_enriched = True`).\n7. Add the asset details to the action\
    \ result as a table and JSON.\n8. Update the entities in the SOAR platform.\n\n\
    ### Additional Notes\nRequires valid Rapid7 InsightVm credentials."
  ai_short_description: >-
    Enriches IP address and hostname entities with contextual asset metadata from
    Rapid7 InsightVm.
