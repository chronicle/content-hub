Launch Scan:
  ai_description: >-
    ### General Description

    Launches a vulnerability scan in Rapid7 InsightVM for specified hosts (IP addresses
    or hostnames). This action initiates a scan on a designated site using a specified
    engine and template, allowing for automated vulnerability assessment.


    ### Flow Description

    1. Retrieves configuration (API Root, credentials) for the Rapid7 InsightVM integration.

    2. Extracts target hosts from the provided entities, filtering specifically for
    `ADDRESS` and `HOSTNAME` types.

    3. Calls the `launch_scan` method of the `Rapid7Manager` to initiate the scan
    on the specified site using the provided engine and template.

    4. If `Fetch Results` is enabled, the action sets the execution state to `IN_PROGRESS`
    and waits for completion.

    5. Upon completion (or if `Fetch Results` is disabled), the action returns the
    `scan_id` and, if applicable, adds scan details to the result data.


    ### Additional Notes

    This action interacts with the Rapid7 InsightVM API. It requires valid credentials
    and configuration for the Rapid7 InsightVM integration. If `Fetch Results` is
    enabled, the action will remain in an `IN_PROGRESS` state until the scan is completed.
  ai_short_description: >-
    Launches a vulnerability scan in Rapid7 InsightVM for specified hosts.
