    1. The action initializes the `Rapid7Manager` using the integration configuration
    (API Root, Username, Password, and SSL verification settings).

    2. It executes the `test_connectivity` method, which performs an HTTP GET request
    to the configured API root.

    3. The response is validated to ensure the connection is successful.

    4. The action concludes by returning a success message indicating the connection
    status.


