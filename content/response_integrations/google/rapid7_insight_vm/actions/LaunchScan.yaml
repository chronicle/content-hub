name: Launch Scan
description: Start a scan for a specific site.
integration_identifier: Rapid7InsightVm
parameters:
-   name: Scan Name
    default_value: ''
    type: string
    description: The scan name.
    is_mandatory: false
-   name: Scan Engine
    default_value: ''
    type: string
    description: The name of the engine to use in the scan.
    is_mandatory: true
-   name: Scan Template
    default_value: ''
    type: string
    description: The name of the template to use in the scan.
    is_mandatory: true
-   name: Site Name
    default_value: ''
    type: string
    description: The name of the site to run the scan on.
    is_mandatory: true
-   name: Fetch Results
    default_value: ''
    type: boolean
    description: Whether to wait for the scan to complete and get its results or not.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/launch_scan_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
script_result_name: scan_id
