Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Anomali Staxx server using the provided configuration
    parameters. This action verifies that the integration is correctly configured
    and can successfully communicate with the Anomali Staxx instance.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Username, Password, Verify
    SSL) from the integration settings.

    2. Initializes the `AnomaliStaxxManager` with these credentials.

    3. Executes a connectivity test by sending a POST request to the Anomali Staxx
    intelligence endpoint.

    4. Validates the response to ensure successful authentication and connectivity.

    5. Returns a success or failure status based on the outcome of the connectivity
    test.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Anomali Staxx instance.
  ai_short_description: >-
    Tests connectivity to the Anomali Staxx server using the provided configuration
    parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by sending a POST request to the Anomali
      Staxx intelligence endpoint. It does not fetch contextual data on alerts/entities,
      nor does it mutate any external or internal data.
