Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Anomali Staxx server to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (Server Address, Username,
    Password, Verify SSL).

    2. Initializes the Anomali Staxx API client.

    3. Authenticates and retrieves an API token via a POST request to the `/api/v1/login`
    endpoint.

    4. Executes a test query via a POST request to the `/api/v1/intelligence` endpoint
    to verify connectivity.

    5. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to validate
    credentials and network access.
  ai_short_description: >-
    Tests connectivity to the Anomali Staxx server using the provided integration
    configuration parameters.
  capabilities:
