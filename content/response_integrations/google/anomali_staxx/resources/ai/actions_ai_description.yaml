  ai_description: >-
    Tests connectivity to the Anomali Staxx server using the provided integration
    configuration parameters.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters (Server Address, Username, Password,
    Verify SSL).


    ### Flow Description

    1. Extracts the integration configuration parameters.

    2. Initializes the Anomali Staxx manager with the provided credentials.

    3. Sends a test query to the Anomali Staxx API to verify connectivity and authentication.

    4. Returns a success message if the connection is established, or an error message
    if it fails.
