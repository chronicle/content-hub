Get Related Reports:
  ai_description: >-
    ### General Description

    Retrieves information about reports related to the provided entities from TruSTAR.
    This action queries TruSTAR for correlated reports based on the entity identifiers
    and optionally filters them by specific enclaves. It returns detailed report information
    and tags, which can be attached to the case as insights and data tables.


    ### Flow Description

    1. Extracts action parameters and integration configurations.

    2. Iterates over the target entities, extracting domains for URL entities and
    using identifiers for all other entity types.

    3. Retrieves a list of available enclaves from TruSTAR via a GET request.

    4. Filters the enclaves based on the provided `Enclave Filter` parameter.

    5. Fetches correlated reports for the entities and filtered enclaves using a GET
    request to TruSTAR.

    6. For each correlated report, fetches detailed report information and tags via
    GET requests.

    7. Aggregates the results, adds JSON and CSV data to the action result, and optionally
    creates a case insight with the report details.


    ### Additional Notes

    This action supports all entity types. If a URL entity is provided, the action
    will automatically parse and use its domain or path for the search.
