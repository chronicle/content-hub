  ai_description: >-
    Retrieves information about Indicators of Compromise (IOCs) that are related to
    the provided entities using TruSTAR. The action fetches related indicators based
    on the entity identifiers and optionally filters the search by specific enclaves.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Max IOCs To Return | Integer | No | Specify how many IOCs to return. Default
    is 50. Maximum is 1000. |

    | Enclave Filter | String | No | Specify a comma-separated list of enclave names
    that should be used during the enrichment. |


    ### Flow

    1. Retrieves configuration and action parameters.

    2. Validates the provided enclaves against the available enclaves in TruSTAR.

    3. Fetches related IOCs for the target entities from TruSTAR.

    4. Groups the related IOCs by their indicator type.

    5. Adds the results as JSON and creates a statistics data table.
