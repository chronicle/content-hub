    reasoning: >-
      The action fetches correlated reports, report details, and tags from TruSTAR
      (fetches_data=true). It does not modify any external data (can_mutate_external_data=false).
      Internally, it creates case insights with the retrieved report information (can_mutate_internal_data=true,
      can_create_insight=true). It does not update entities, modify alert data, or
      create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (TruSTAR) to provide additional
      context (related reports) for entities. It does not mutate external state and
      only performs allowed internal mutations (creating insights). Therefore, it
      is classified as an Enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
