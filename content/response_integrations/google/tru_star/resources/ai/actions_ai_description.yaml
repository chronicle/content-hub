Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the TruSTAR service using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the API Root, API Key, API Secret, and Verify SSL parameters from
    the integration configuration.

    2. Initializes the TruSTAR manager.

    3. Makes an API call to the TruSTAR ping endpoint (`api/1.3/version`) to verify
    connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the TruSTAR API.
