List Enclaves:
  ai_description: >-
    ### General Description

    Lists available enclaves from the TruSTAR platform. This action retrieves a list
    of enclaves based on user-defined filtering criteria and returns the results as
    a JSON object and a data table.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, API Secret, Verify SSL)
    to establish a connection to the TruSTAR service.

    2. Extracts action parameters (Filter Logic, Filter Value, Max Enclaves To Return)
    to define the scope and filtering of the request.

    3. Initializes the `TruSTARManager` to communicate with the TruSTAR API.

    4. Calls the `list_enclaves` method via the manager to retrieve the list of available
    enclaves.

    5. Applies filtering based on the provided `Filter Logic` ("Equal" or "Contains")
    and `Filter Value` if specified.

    6. Limits the number of returned enclaves based on the `Max Enclaves To Return`
    parameter.

    7. Returns the results as a JSON object and a data table in the action results.


    ### Additional Notes

    This action does not interact with entities in the SOAR case and operates independently
    of any specific entity.
