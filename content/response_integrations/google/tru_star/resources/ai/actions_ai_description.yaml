List Enclaves:
  ai_description: >-
    ### General Description

    Retrieves a list of available enclaves from TruSTAR. This action allows users
    to view and filter enclaves accessible to their account.


    ### Flow Description

    1. Connects to the TruSTAR API using the provided credentials.

    2. Executes a GET request to the `/api/1.3/enclaves` endpoint to fetch available
    enclaves.

    3. Filters the retrieved enclaves based on the specified 'Filter Logic' and 'Filter
    Value'.

    4. Limits the number of returned enclaves based on the 'Max Enclaves To Return'
    parameter.

    5. Returns the filtered enclaves as JSON and populates a data table with the results.


    ### Additional Notes

    None.
