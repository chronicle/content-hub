  ai_description: >-
    Tests connectivity to the TruSTAR service using the provided API credentials.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | API Root | String | Yes | The root URL of the TruSTAR API. |

    | API Key | String | Yes | The API key for authentication. |

    | API Secret | String | Yes | The API secret for authentication. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate. Default
    is True. |


    ### Flow

    1. Extracts configuration parameters (API Root, API Key, API Secret, Verify SSL).

    2. Initializes the TruSTARManager with the provided credentials.

    3. Calls the test_connectivity method which sends a GET request to the ping endpoint.

    4. Returns a success message if connected, otherwise returns an error.
