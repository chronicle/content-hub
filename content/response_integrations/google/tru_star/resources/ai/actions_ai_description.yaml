  ai_description: >-
    Lists available enclaves in TruSTAR based on specified filtering criteria.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Logic | Dropdown | No | Specify what filter logic should be applied.
    Options are 'Equal' or 'Contains'. Default is 'Equal'. |

    | Filter Value | String | No | Specify what value should be used in the filter.
    |

    | Max Enclaves To Return | Integer | No | Specify how many enclaves to return.
    Default is 50. |


    ### Flow

    1. Initializes the TruSTAR manager with the provided API credentials.

    2. Fetches the list of available enclaves from TruSTAR up to the specified maximum
    limit.

    3. If a filter value is provided, filters the retrieved enclaves based on the
    selected filter logic (Equal or Contains).

    4. Returns the filtered enclaves as a JSON result and populates a data table with
    the enclave details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from TruSTAR by calling the 'list_enclaves' API endpoint.
      It does not perform any POST/PUT/DELETE requests that would mutate external
      data. It also does not mutate any internal SecOps data such as entities, insights,
      or case comments; it only outputs a JSON result and a data table.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (TruSTAR) without mutating any
      external or internal state. Therefore, it qualifies as an enrichment action.
      It does not perform any remediation tasks.
    remediation: false
