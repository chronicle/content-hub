  ai_description: >-
    ### General Description

    Retrieves information about reports related to the provided entities from TruSTAR.
    This action fetches correlated reports, report details, and tags for the indicators,
    providing additional threat intelligence context.


    ### Flow Description

    1. Retrieves configuration and action parameters.

    2. Validates the provided enclave filters against available enclaves in TruSTAR.

    3. Iterates over target entities to collect their identifiers (extracting domain/path
    for URLs).

    4. Fetches correlated reports for the collected indicators from TruSTAR.

    5. For each report, fetches report details and tags.

    6. Constructs JSON results, CSV tables, and optionally creates case insights with
    the report details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | Boolean | No | If enabled, action will create an insight containing
    information about reports related to the entities. Default is true. |

    | Include Report Body In Insight | Boolean | No | If enabled, insight will contain
    information about the report body. Note: report body can be very big in size.
    Default is false. |

    | Enclave Filter | String | No | Specify a comma-separated list of enclave names
    that should be used during the enrichment. |

    | Max Reports To Return | String | No | Specify how many reports to return. Default:
    10. Maximum: 25. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
