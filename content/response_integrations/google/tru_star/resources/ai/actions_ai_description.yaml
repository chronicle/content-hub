Get Related IOCs:
  ai_description: >-
    ### General Description

    Retrieves related Indicators of Compromise (IOCs) from the TruSTAR platform based
    on the provided entities. This action allows analysts to expand their investigation
    by identifying associated indicators within specific TruSTAR enclaves.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, API Key, API
    Secret, Verify SSL) and action parameters (Max IOCs To Return, Enclave Filter).

    2. **Enclave Validation**: If an Enclave Filter is provided, the action lists
    available enclaves from TruSTAR and validates the requested enclaves against the
    available list.

    3. **Data Retrieval**: Calls the TruSTAR `get_related_indicators` API endpoint,
    passing the identifiers of the target entities, the validated enclave IDs, and
    the requested limit.

    4. **Output Generation**: Processes the retrieved related IOCs, adds the results
    as a JSON object to the action output, and constructs a statistics data table
    summarizing the count of related IOCs by type.


    ### Additional Notes

    This action requires valid TruSTAR API credentials. The Enclave Filter parameter
    is optional; if left blank, the action searches across all available enclaves.
    The action supports a wide range of entity types as it processes all provided
    target entities.
  ai_short_description: >-
    Retrieves related Indicators of Compromise (IOCs) from TruSTAR for the provided
    entities.
