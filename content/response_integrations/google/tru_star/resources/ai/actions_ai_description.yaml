Get Related IOCs:
  ai_description: >-
    ### General Description

    Retrieves information about Indicators of Compromise (IOCs) that are related to
    the provided entities using TruSTAR. This action queries the TruSTAR platform
    to find additional threat intelligence and related indicators based on the target
    entities' identifiers.


    ### Flow Description

    1. Extracts action parameters, including the maximum number of IOCs to return
    and an optional enclave filter.

    2. If an enclave filter is provided, retrieves the list of available enclaves
    from TruSTAR and validates the requested enclave names against the available ones.

    3. Queries the TruSTAR API to fetch related IOCs for the identifiers of the target
    entities, optionally filtering by the resolved enclave IDs.

    4. Aggregates the retrieved IOCs by their indicator type.

    5. Attaches the results as a JSON object and a statistical CSV table to the action's
    output.


    ### Additional Notes

    Supports all entity types. The maximum number of IOCs returned can be configured
    up to 1000. If an invalid enclave name is provided in the filter, the action will
    fail and list the missing enclaves.
  ai_short_description: >-
    Retrieves information about Indicators of Compromise (IOCs) related to the provided
    entities from TruSTAR.
