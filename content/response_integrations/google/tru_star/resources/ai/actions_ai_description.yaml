Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities using threat intelligence data from the TruSTAR platform. This
    action retrieves metadata and summary information for various entity types, including
    indicators of compromise (IOCs) and assets. It evaluates the severity of the entities
    based on a user-defined threshold and updates the entities within the SOAR platform
    with enriched properties, insights, and links to the TruSTAR report.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API credentials
    (API Root, API Key, API Secret) and configuration settings (Verify SSL) from the
    integration settings.

    2. **Parameter Processing**: It extracts the `Security Level Threshold` and `Enclave
    Filter` parameters. If an enclave filter is provided, it validates the enclave
    names against the TruSTAR service.

    3. **Data Retrieval**: The action initializes the `TruSTARManager` and performs
    API calls to fetch metadata (`get_metadata_info`) and summary information (`get_indicators_summary`)
    for all target entities.

    4. **Enrichment**: For each entity, the action:
        * Updates the entity's `additional_properties` with retrieved intelligence
    data.
        * Sets the `is_enriched` flag to true.
        * Adds an entity insight containing severity information.
        * Adds a link to the TruSTAR report.
        * Evaluates the maximum severity against the `Security Level Threshold`. If
    the threshold is met or exceeded, the entity is marked as suspicious (`is_suspicious
    = True`).
    5. **Finalization**: The action updates the entities in the SOAR platform and
    adds a JSON result containing the enrichment data.


    ### Additional Notes

    This action supports a wide range of entity types, including IOCs (hashes, IPs,
    domains) and assets (users, hostnames). It relies on the TruSTAR API for all intelligence
    data. If no data is found for an entity, the action logs the failure but continues
    processing other entities.
  ai_short_description: >-
    Enriches entities with threat intelligence from TruSTAR, including severity evaluation,
    insight generation, and entity updates.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the TruSTAR API (fetches_data=true). It updates
      entity properties and adds insights within the SOAR platform (can_update_entities=true,
      can_create_insight=true). It does not mutate external systems or modify alert
      data.
