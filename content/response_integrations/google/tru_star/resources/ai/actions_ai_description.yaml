Get Related Reports:
  ai_description: >-
    ### General Description

    Fetches related threat intelligence reports from the TruSTAR platform for the
    provided entities. This action allows analysts to correlate indicators (such as
    IP addresses, file hashes, or domains) with existing reports in TruSTAR, providing
    context on potential threats, campaigns, and associated metadata.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves necessary API credentials
    (API Root, Key, Secret) and action parameters (Enclave Filter, Create Insight,
    Include Report Body, Max Reports) from the integration configuration.

    2. **Entity Processing**: The action iterates through all provided `target_entities`.
    For URL entities, it extracts the domain/path to ensure accurate correlation.

    3. **Enclave Validation**: If an `Enclave Filter` is provided, the action validates
    the specified enclaves against the available enclaves in TruSTAR.

    4. **Data Retrieval**: The action calls the TruSTAR API (`GET /api/1.3/reports/correlated`)
    to fetch reports correlated with the provided indicators.

    5. **Report Enrichment**: For each correlated report found, the action performs
    additional API calls (`GET /api/1.3/reports/{report_id}` and `GET /api/1.3/reports/{report_id}/tags`)
    to retrieve full report details and associated tags.

    6. **Result Construction**: The action compiles the report data into a JSON result
    and a CSV table. If `Create Insight` is enabled, it generates an HTML-formatted
    insight containing the report details and attaches it to the case.


    ### Additional Notes

    - The action supports filtering by specific TruSTAR enclaves.

    - Report bodies can be large; the `Include Report Body In Insight` parameter should
    be used with caution.

    - The action creates case insights, which are visible in the SOAR case wall.
  ai_short_description: >-
    Fetches related threat intelligence reports from the TruSTAR platform for the
    provided entities and optionally creates case insights.
