Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the TruSTAR service using the provided API credentials.
    This action verifies that the integration is correctly configured and can successfully
    communicate with the TruSTAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (`API Root`, `API
    Key`, `API Secret`, and `Verify SSL`) from the integration configuration.

    2. It initializes the `TruSTARManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the TruSTAR API version endpoint (`api/1.3/version`).

    4. The response is validated to ensure the connection is successful.

    5. The action concludes by returning a success message if the connection is established,
    or an error message if the connection fails.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment or state-changing operations on entities or external systems.
