Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities using threat intelligence from TruSTAR. It retrieves metadata
    and indicator summaries for the target entities, optionally filtering by specific
    enclaves. It evaluates the security level against a defined threshold to mark
    entities as suspicious, updates entity properties, and generates insights, links,
    and tables with the analysis results.


    ### Flow Description

    1. Retrieves the list of available enclaves from TruSTAR and validates the provided
    enclave filters.

    2. Fetches metadata and indicator summaries for the target entities from TruSTAR
    via API requests.

    3. Iterates through each entity to process the retrieved data.

    4. Updates the entity's additional properties and marks it as enriched.

    5. Adds an insight and a link to the TruSTAR report for the entity.

    6. Evaluates the maximum severity against the configured threshold and marks the
    entity as suspicious if the threshold is met or exceeded.

    7. Updates the entities in the Google SecOps platform and attaches the JSON results.


    ### Additional Notes

    Supported entities: All.
  ai_short_description: >-
    Enriches entities using threat intelligence from TruSTAR, updating entity properties,
    generating insights, and marking entities as suspicious based on a security level
    threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes API requests to TruSTAR to fetch indicator metadata and summaries
      (fetches_data=true). It does not mutate external data (can_mutate_external_data=false).
      It updates internal entities using `siemplify.update_entities` (can_update_entities=true)
      and creates insights using `siemplify.add_entity_insight` (can_create_insight=true).
