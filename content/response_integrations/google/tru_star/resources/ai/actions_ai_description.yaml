  ai_description: >-
    Enriches entities using threat intelligence information from TruSTAR. This action
    retrieves metadata and summary information for the target entities and updates
    their properties accordingly.


    ### Action Flow

    1. **Enclave Validation:** Validates and fetches enclaves if an enclave filter
    is provided.

    2. **Data Retrieval:** Retrieves metadata and summary information for all target
    entities from TruSTAR.

    3. **Entity Processing:** Iterates over the target entities to process the retrieved
    data.

    4. **Enrichment:** Updates entity properties, adds insights, and attaches a report
    link.

    5. **Risk Evaluation:** Evaluates the entity's severity against the configured
    threshold and marks it as suspicious if it exceeds the threshold.

    6. **Update:** Updates the entities in the SecOps platform and provides a JSON
    result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Security Level Threshold | Dropdown | Yes | Specify what should be the lowest
    security level for the entity to be marked as suspicious. Options: Benign, Low,
    Medium, High. |

    | Enclave Filter | String | No | Specify a comma-separated list of enclave names
    that should be used during the enrichment. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, marks entities as suspicious, adds entity insights,
      and adds entity links.
    reasoning: >-
      The action fetches metadata and summary information from TruSTAR for the target
      entities. It does not mutate any external data. Internally, it updates entity
      properties, marks entities as suspicious based on a threshold, adds entity insights,
      and adds entity links.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (TruSTAR) to enrich entities.
      It does not mutate external data and only performs allowed internal mutations
      (updating entities and creating insights). Therefore, it is classified as an
      enrichment action.
    remediation: false
  entity_usage:
    entity_types:
    - ALERT
    - HOSTNAME
    - USERUNIQNAME
    - ADDRESS
    - MacAddress
    - PROCESS
    - FILENAME
    - FILEHASH
    - DestinationURL
    - THREATSIGNATURE
    - EMAILSUBJECT
    - USB
    - EVENT
    - CVEID
    - DEPLOYMENT
    - CREDITCARD
    - PHONENUMBER
    - CVE
    - THREATACTOR
    - THREATCAMPAIGN
    - GENERICENTITY
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` without applying any type-based
      filtering. Therefore, it supports all entity types provided in the simulation
      data.
