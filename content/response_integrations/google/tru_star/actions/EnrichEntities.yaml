name: Enrich Entities
description: 'Enrich entities using information from TruSTAR. Supported entities:
    All.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trustar#enrich_entities
integration_identifier: TruSTAR
parameters:
-   name: Security Level Threshold
    default_value: Low
    type: ddl
    optional_values:
    - Benign
    - Low
    - Medium
    - High
    description: Specify what should be the lowest security level for the entity to
        be marked as suspicious.
    is_mandatory: true
-   name: Enclave Filter
    default_value: ''
    type: string
    description: Specify a comma-separated list of enclave names that should be used
        during the enrichment.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ALERT", "HOSTNAME", "USERUNIQNAME", "ADDRESS",
    "MACADDRESS", "PROCESS", "FILENAME", "FILEHASH",  "DestinationURL", "THREATSIGNATURE",
    "EMAILSUBJECT", "USB", "EVENT", "CVEID", "DEPLOYMENT", "CREDITCARD", "PHONENUMBER",
    "CVE", "THREATACTOR", "THREATCAMPAIGN", "GENERICENTITY"]}'
