name: List Enclaves
description: List available enclaves in TruSTAR.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trustar#list_enclaves
integration_identifier: TruSTAR
parameters:
-   name: Filter Logic
    default_value: Equal
    type: ddl
    optional_values:
    - Equal
    - Contains
    description: Specify what filter logic should be applied.
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter.
    is_mandatory: false
-   name: Max Enclaves To Return
    default_value: 50
    type: string
    description: 'Specify how many enclaves to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_enclaves_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
