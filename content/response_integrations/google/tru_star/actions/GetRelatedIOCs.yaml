name: Get Related IOCs
description: 'Get information about IOCs that are related to the provided entities.
    Supported entities: All.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trustar#get_related_iocs
integration_identifier: TruSTAR
parameters:
-   name: Max IOCs To Return
    default_value: 50
    type: string
    description: 'Specify how many IOCs to return. Default: 50. Maximum: 1000.'
    is_mandatory: false
-   name: Enclave Filter
    default_value: ''
    type: string
    description: Specify a comma-separated list of enclave names that should be used
        during the enrichment.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_related_io_cs_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["DestinationURL","FILEHASH", "USER", "HOSTNAME",
    "USERUNIQNAME", "ADDRESS", "MacAddress", "PROCESS", "FILENAME", "THREATSIGNATURE",
    "EMAILSUBJECT", "USB", "CREDITCARD", "PHONENUMBER", "CVE", "THREATACTOR", "THREATCAMPAIGN",
    "GENERICENTITY"]}'
