name: Kill Process
description: Stop a running process and remove its file. If the process is not running,
    then its file is just removed from the managed endpoint.
integration_identifier: McAfeeMvisionEDR
parameters:
-   name: Process Identifier Type
    default_value: PID
    type: ddl
    optional_values:
    - PID
    description: Specify which process identifier type to use.
    is_mandatory: true
-   name: Process Identifier
    default_value: ''
    type: string
    description: Specify the value for the process identifier.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
