Stop And Remove Content:
  ai_description: >-
    ### General Description

    Stops a specific process by PID and removes a file by its full path on a McAfee
    Mvision EDR endpoint. This action is designed to remediate threats by terminating
    malicious processes and deleting associated files directly on the affected host.


    ### Flow Description

    1. The action extracts the required parameters: `PID` (the process ID to stop)
    and `Full File Path` (the file to remove).

    2. It retrieves the list of hosts from the McAfee Mvision EDR API to map the target
    entities (Hostname or IP Address) to a specific host ID (`ma_guid`).

    3. For each matched entity, the action initiates a `stopAndRemoveContent` task
    via the McAfee Mvision EDR API.

    4. The action enters a polling loop (QueryState) to monitor the status of the
    initiated task.

    5. Once the task completes, the action returns the final status (Success or Error)
    and an output message detailing the outcome for each entity.


    ### Additional Notes

    This action is asynchronous and supports polling for status updates. It requires
    valid API credentials for the McAfee Mvision EDR integration.
