  ai_description: >-
    Enriches endpoint entities (Hostname and IP Address) by fetching system information
    from McAfee Mvision EDR.


    ### General Description

    This action retrieves host details from McAfee Mvision EDR and matches them against
    the target entities in the case. If a match is found based on the hostname or
    IP address, the entity is enriched with contextual metadata such as the operating
    system, last boot time, certainty, and network interfaces.


    ### Flow Description

    1. Establishes a connection to the McAfee Mvision EDR API using the provided integration
    credentials.

    2. Retrieves a list of all available hosts from the McAfee Mvision EDR platform.

    3. Iterates through the target entities (filtered by ADDRESS and HOSTNAME).

    4. Matches each entity's identifier against the hostnames and IP addresses of
    the retrieved hosts.

    5. For each matched entity, updates its additional properties with the host's
    enrichment data and marks it as enriched.

    6. Generates a JSON result and a CSV data table containing the host details for
    each successfully enriched entity.


    ### Parameters Description

    This action does not require any specific input parameters. It relies on the integration's
    configuration parameters (e.g., API Root, Username, Password, Client ID, Client
    Secret) to authenticate and communicate with the McAfee Mvision EDR API.
