Dismiss Threat:
  ai_description: >-
    ### General Description

    Dismisses a specific threat in McAfee Mvision EDR by initiating a remediation
    task. This action interacts with the McAfee Mvision EDR API to create a dismissal
    task for a given threat ID and monitors its status until completion.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, credentials,
    SSL verification) and the mandatory `Threat ID` parameter.

    2. It initializes the `McAfeeMvisionEDRManager` to handle API communication.

    3. If it is the first run of the action, it calls the `create_dismiss_threat_task`
    method, which sends a POST request to the McAfee Mvision EDR API to create a dismissal
    task for the specified threat.

    4. If it is a subsequent run, it extracts the `additional_data` (task ID) and
    calls `get_task_status` to retrieve the current status of the task via a GET request.

    5. The action evaluates the task status (completed, in progress, or failed) and
    returns the final result to the SOAR platform.


    ### Additional Notes

    This action is designed to be asynchronous. If the dismissal task is not completed
    immediately, the action will report the status as 'in progress' and provide the
    task ID in the `additional_data` field for subsequent polling.
  ai_short_description: >-
    Dismisses a threat in McAfee Mvision EDR by creating and monitoring a remediation
    task.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a threat dismissal task in McAfee Mvision EDR.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (task status) from the McAfee Mvision EDR API and mutates
      external data by creating a dismissal task. It does not mutate internal SecOps
      data, update entities, create insights, modify alert data, or create case comments.
  entity_usage:
