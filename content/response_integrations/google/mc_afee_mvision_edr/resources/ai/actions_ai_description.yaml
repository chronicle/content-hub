  ai_description: >-
    ### General Description

    The "Dismiss Threat" action is designed to dismiss a specific threat within McAfee
    Mvision EDR. It initiates a task in the external system to change the threat's
    status to dismissed and monitors the task asynchronously until completion.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Threat ID | Yes | String | Specify the ID of the threat that you want to dismiss.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the necessary configuration and
    the `Threat ID` parameter.

    2. **Task Creation**: It sends a request to McAfee Mvision EDR to create a "DismissThreat"
    task for the specified threat.

    3. **Status Monitoring**: The action runs asynchronously, periodically checking
    the status of the created task.

    4. **Completion**: Once the task status is marked as completed, the action finishes
    successfully. If the task fails, the action reports an error.


    ### Additional Notes

    There are no additional notes for this action.
