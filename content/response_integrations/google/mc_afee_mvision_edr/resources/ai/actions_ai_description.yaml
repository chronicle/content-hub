Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Endpoint entities (IP Addresses and Hostnames) using McAfee Mvision EDR.
    This action retrieves system information for the specified endpoints and updates
    the entities with the fetched contextual data, such as OS details and last boot
    time.


    ### Flow Description

    1. Initializes the McAfee Mvision EDR manager with the provided integration credentials.

    2. Filters the target entities to include only those of type `ADDRESS` or `HOSTNAME`.

    3. Retrieves a list of all available hosts from McAfee Mvision EDR via a GET request
    to the `/ft/api/v2/ft/hosts` API endpoint.

    4. Iterates through the filtered entities and attempts to match each entity's
    identifier against the hostnames or IP addresses of the retrieved hosts.

    5. If a match is found, extracts enrichment data (e.g., OS description, last boot
    time, certainty, and associated IPs) and updates the entity's `additional_properties`.

    6. Marks the successfully processed entities as enriched and attaches the raw
    host data as a JSON result and an entity table.

    7. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    This action fetches a paginated list of all hosts from the McAfee Mvision EDR
    environment and performs the matching logic locally against the target entities.
    It does not query the API for each individual entity identifier.
  ai_short_description: >-
    Enriches IP Address and Hostname entities by retrieving system information from
    McAfee Mvision EDR.
