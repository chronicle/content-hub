Unquarantine Endpoint:
  ai_description: >-
    ### General Description

    Creates an unquarantine task on the McAfee Mvision EDR server for the specified
    IP or Hostname entities. This action restores network connectivity for endpoints
    that were previously isolated.


    ### Flow Description

    1. Retrieves a list of all available hosts from McAfee Mvision EDR.

    2. Iterates through the provided IP and Hostname entities.

    3. Matches each entity's identifier against the hostname or IP addresses of the
    retrieved hosts.

    4. If a match is found, sends a POST request to the McAfee Mvision EDR API to
    create an `UnquarantineHost` task for the corresponding host GUID.

    5. Collects the results and returns a summary of successful, failed, and duplicate
    entity matches.


    ### Additional Notes

    - The action requires appropriate permissions in McAfee Mvision EDR to manage
    host quarantine status.

    - If multiple hosts match a single entity, the action will only process the first
    match and log the others as duplicates.
