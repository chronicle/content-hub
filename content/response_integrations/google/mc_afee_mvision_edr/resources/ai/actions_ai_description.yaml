Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (Hostname or IP Address) by retrieving system information
    from McAfee Mvision EDR. This action helps analysts gain context about endpoints
    involved in an investigation by pulling details such as OS version, last boot
    time, and certainty scores.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Login API Root, Username, Password,
    Client ID, Client Secret, Verify SSL) to authenticate with the McAfee Mvision
    EDR API.

    2. Initializes the McAfee Mvision EDR manager to establish a connection.

    3. Fetches the list of all hosts from McAfee Mvision EDR using the `get_hosts`
    API call.

    4. Iterates through the target entities, filtering for Hostname or IP Address
    types.

    5. Matches each entity against the fetched host data by comparing the entity identifier
    with the host's hostname or network interface IP addresses.

    6. For each matched entity, updates the entity's `additional_properties` with
    enrichment data (e.g., maGuid, OS, lastBootTime, certainty) and sets `is_enriched`
    to true.

    7. Updates the entities in the SOAR platform using `siemplify.update_entities`.

    8. Adds the enrichment results to the action output as a JSON result and a CSV
    table.


    ### Additional Notes

    This action requires valid API credentials for McAfee Mvision EDR. It only processes
    entities of type Hostname or IP Address.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with system information from McAfee
    Mvision EDR.
