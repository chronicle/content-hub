Kill Process:
  ai_description: >-
    ### General Description

    Terminates a specific process on a managed endpoint using McAfee Mvision EDR.
    This action allows security analysts to stop malicious or unauthorized processes
    directly from the SOAR platform, helping to contain threats on infected hosts.


    ### Flow Description

    1. The action extracts configuration parameters (API credentials) and action parameters
    (Process Identifier Type, Process Identifier).

    2. It retrieves the list of managed hosts from the McAfee Mvision EDR API.

    3. It filters the provided target entities (HOSTNAME or ADDRESS) and attempts
    to map them to the corresponding McAfee Mvision EDR host IDs.

    4. For each matched host, it initiates a 'kill process' task via the McAfee Mvision
    EDR API.

    5. The action operates asynchronously, returning an 'In Progress' state and monitoring
    the task status in subsequent runs until the process termination is confirmed
    or failed.


    ### Additional Notes

    This action supports asynchronous execution. It requires valid McAfee Mvision
    EDR API credentials. The 'Process Identifier Type' must be one of: PID, SHA256,
    Name, or Path.
