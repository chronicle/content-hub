Quarantine Endpoint:
  ai_description: >-
    ### General Description

    Creates a quarantine endpoint task on the McAfee Mvision EDR server based on the
    provided IP Address or Hostname entities. This action isolates the endpoint from
    the network to prevent further malicious activity.


    ### Flow Description

    1. Retrieves a list of hosts from the McAfee Mvision EDR server via the API.

    2. Filters the target entities to include only IP Addresses and Hostnames.

    3. Matches each entity's identifier against the hostnames and IP addresses of
    the retrieved hosts.

    4. For each matched host, sends a POST request to the McAfee Mvision EDR API to
    create a `QuarantineHost` task.

    5. Collects the results and outputs a summary of successfully quarantined, failed,
    and duplicate entities.


    ### Additional Notes

    If multiple matches are found for a single entity in McAfee Mvision EDR, the action
    will only quarantine the first matched endpoint.
