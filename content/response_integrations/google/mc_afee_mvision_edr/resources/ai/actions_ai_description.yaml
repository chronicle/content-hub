Kill Process:
  ai_description: >-
    ### General Description

    This action stops a running process and removes its associated file on a specified
    endpoint using McAfee Mvision EDR. If the process is not currently running, the
    file is simply removed from the managed endpoint.


    ### Flow Description

    1. The action filters target entities for Hostname and IP Address types.

    2. It retrieves a list of hosts from McAfee Mvision EDR to match the entities
    to their corresponding host IDs.

    3. For each matched entity, it initiates an asynchronous task to kill the process
    based on the provided Process Identifier Type (e.g., PID, SHA256, Name, Full Path)
    and Process Identifier value.

    4. The action periodically queries the status of the task until it completes,
    fails, or encounters an error.

    5. Results are aggregated and returned, indicating which endpoints successfully
    had the process stopped and file removed.


    ### Additional Notes

    - This is an asynchronous action.

    - Supported Process Identifier Types include PID, SHA256, Name, and Full Path.
