Remove File:
  ai_description: >-
    ### General Description

    Removes a specified file from an endpoint using the McAfee Mvision EDR platform.
    This action allows security analysts to remediate threats by deleting malicious
    or unwanted files directly from managed hosts.


    ### Flow Description

    1. The action extracts the required configuration parameters (API credentials)
    and action parameters (Full File Path, Safe Removal).

    2. It identifies target entities from the case, specifically filtering for `ADDRESS`
    or `HOSTNAME` types.

    3. It retrieves the list of hosts from McAfee Mvision EDR and maps the target
    entities to their corresponding `ma_guid` (host ID).

    4. For each matched host, it initiates a file removal task via a POST request
    to the McAfee Mvision EDR remediation API (`remediation/api/v1/actions/hosts-actions`).

    5. The action operates asynchronously, returning an `IN_PROGRESS` state and polling
    the task status in subsequent executions until completion or failure.


    ### Additional Notes

    This action is asynchronous and requires multiple executions to complete the polling
    process. The `Safe Removal` parameter, if enabled, instructs the EDR to ignore
    files that may be critical or trusted to prevent system instability.
  ai_short_description: >-
    Removes a specified file from an endpoint using McAfee Mvision EDR.
  capabilities:
