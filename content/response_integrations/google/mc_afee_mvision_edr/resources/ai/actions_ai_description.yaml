Unquarantine Endpoint:
  ai_description: >-
    ### General Description

    This action unquarantines an endpoint within the McAfee Mvision EDR system. It
    identifies the target endpoint by matching the provided IP address or hostname
    against the list of managed hosts retrieved from the EDR platform. Once a match
    is found, it triggers a remediation task to remove the quarantine status, restoring
    the endpoint's network connectivity.


    ### Flow Description

    1. The action initializes the McAfee Mvision EDR manager using the provided configuration
    parameters (API credentials and endpoints).

    2. It filters the `target_entities` to include only those of type `ADDRESS` or
    `HOSTNAME`.

    3. It retrieves the list of all managed hosts from the McAfee Mvision EDR API
    via a GET request.

    4. For each suitable entity, it iterates through the retrieved host list to find
    a matching hostname or IP address.

    5. If a match is found, it calls the `quarantine_unquarantine_endpoint` method,
    which performs a POST request to the remediation API with `quarantine=False` to
    unquarantine the host.

    6. The action aggregates the results, noting successful unquarantine tasks, duplicates,
    or failures, and returns the final status message.


    ### Additional Notes

    This action requires valid API credentials for McAfee Mvision EDR. It performs
    a lookup against the EDR's host inventory, so connectivity to the EDR API is essential.
    If multiple hosts match a single entity, the action processes the first match
    found.
