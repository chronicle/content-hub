  ai_description: >-
    Stops a running process and removes its file on McAfee Mvision EDR endpoints associated
    with the target entities. If the process is not running, its file is simply removed
    from the managed endpoint.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Process Identifier Type | Dropdown | Yes | Specify which process identifier
    type to use (e.g., PID, SHA256, Name, Full Path). |

    | Process Identifier | String | Yes | Specify the value for the process identifier
    to be killed. |


    ### Action Flow

    1. **Entity Filtering:** Filters the target entities to include only `ADDRESS`
    and `HOSTNAME` types.

    2. **Host Mapping:** Retrieves the list of hosts from McAfee Mvision EDR to map
    the filtered entities to their corresponding host IDs.

    3. **Task Initiation:** Initiates a kill process task on the matched endpoints
    using the specified process identifier type and value.

    4. **Status Query:** Asynchronously queries the status of the task until it completes
    successfully or fails, returning the final execution state.
