Quarantine Endpoint:
  ai_description: >-
    ### General Description

    This action quarantines an endpoint on the McAfee Mvision EDR server. It identifies
    the target endpoint by matching the provided IP address or hostname entities against
    the list of managed hosts in McAfee Mvision EDR.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, etc.).

    2. Initializes the `McAfeeMvisionEDRManager` to interact with the McAfee Mvision
    EDR API.

    3. Filters the target entities to include only `ADDRESS` and `HOSTNAME` types.

    4. Retrieves the list of all managed hosts from the McAfee Mvision EDR server
    (API call: `GET /ft/api/v2/ft/hosts`).

    5. Iterates through the filtered entities and attempts to match each entity's
    identifier (IP or hostname) with the retrieved host data.

    6. For each matched host, it sends a `POST` request to the McAfee Mvision EDR
    API (API call: `POST /remediation/api/v1/actions/hosts-actions`) to initiate a
    quarantine task.

    7. Updates the action output with the status of the quarantine task for each entity.


    ### Additional Notes

    This action requires valid API credentials for McAfee Mvision EDR. It performs
    a state-changing operation on the external EDR system.
