Dismiss Threat:
  ai_description: >-
    ### General Description

    Dismisses a specific threat in McAfee Mvision EDR based on the provided Threat
    ID.


    ### Flow Description

    1. Extracts the `Threat ID` from the action parameters.

    2. Retrieves the case associated with the Threat ID from McAfee Mvision EDR.

    3. Initiates a task to dismiss the threat by making a POST request to the McAfee
    Mvision EDR API.

    4. Monitors the task status asynchronously until it completes or fails.


    ### Additional Notes

    This action runs asynchronously, checking the status of the dismissal task in
    subsequent runs until completion.
