Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Armis server using the provided API credentials.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, API Secret, Verify
    SSL).

    2. Initializes the ArmisManager.

    3. Calls the `test_connectivity` method which makes a GET request to the `/api/v1/search/`
    endpoint with `aql=in:devices` and `length=1`.

    4. Returns a success message if the connection is successful, otherwise returns
    an error.


    ### Additional Notes

    This action is typically used to verify integration configuration and does not
    perform any operational tasks.
