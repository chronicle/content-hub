Update Alert Status:
  ai_description: >-
    ### General Description

    Updates the status of a specific alert in the Armis platform.


    ### Flow Description

    1. Extracts the `Alert ID` and the desired `Status` from the action parameters.

    2. Initializes the Armis API client with the provided integration credentials.

    3. Sends a PATCH request to the Armis API (`/api/v1/alerts/{alert_id}/`) to update
    the status of the specified alert.

    4. Returns a success message if the alert is successfully updated or if it already
    has the desired status. If the alert is not found, the action fails.


    ### Additional Notes

    If the alert already has the requested status in Armis, the action will catch
    the `ArmisBadRequestException`, log a message, and still return a successful execution
    state.
  ai_short_description: >-
    Updates the status of a specific alert in the Armis platform.
