    update_ticket: false
  ai_description: >-
    ### General Description

    Enriches IP and MAC Address entities using Armis. This action retrieves detailed
    device information such as risk level, operating system, user, and site details
    from Armis. It updates the entities with the retrieved data, adds a link to the
    Armis report, attaches an enrichment table, and optionally generates a case insight.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only IP (`ADDRESS`) and MAC Address (`MACADDRESS`)
    types.

    3. Queries the Armis API to fetch device information based on the entity's identifier
    (IP or MAC).

    4. If device information is found, enriches the entity's additional properties,
    marks it as enriched, and attaches a link and a data table.

    5. Optionally creates a case insight with the endpoint details.

    6. Updates the successfully processed entities in the SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Endpoint Insight | Boolean | No | If enabled (True), the action will
    create a case insight containing information about the endpoints. Default is True.
    |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and creates case insights.
    reasoning: >-
      The action fetches device information from Armis using GET requests. It does
      not modify external data. It updates internal entities with the fetched data
      and creates case insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities and create
      insights without modifying external state. This matches the enrichment category
      criteria.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by `entity.entity_type`
      checking if they are in `SUPPORTED_ENTITIES` (ADDRESS, MACADDRESS).
List Alert Connections:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
