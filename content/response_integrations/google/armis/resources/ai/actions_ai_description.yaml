    force_identity_mfa: false
    get_alert_information: true
    reasoning: >-
      The action fetches connections related to a specific alert from Armis, which
      aligns with the 'Get Alert Information' category. It does not enrich IOCs or
      assets, nor does it perform any containment, ticketing, or identity operations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Lists connections related to a specific alert in Armis. This action queries the
    Armis service for connections associated with a given alert ID, filtering by severity
    and limiting the number of results returned. The retrieved connections are then
    added to the action's JSON result and presented in a data table.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert ID | String | Yes | Specify the ID of the alert for which you want to
    pull connections data. |

    | Lowest Severity To Fetch | Dropdown | No | Specify the lowest severity of the
    connections that should be used when fetching them. Default is Medium. |

    | Max Connections To Return | String | No | Specify how many connections to return.
    Default is 50. |


    ### Flow

    1. Extracts the provided parameters.

    2. Initializes the Armis API client.

    3. Constructs an AQL query using the provided Alert ID and Lowest Severity To
    Fetch.

    4. Fetches the alert connections from Armis.

    5. Processes the results, adding them to the action's JSON output and creating
    a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches alert connections from the Armis API using a GET request.
      It does not mutate any external data. Internally, it only adds results to the
      action's JSON and creates a data table, without updating entities, creating
      insights, or modifying case data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches supplemental context (connections) about an alert from an
      external source. It does not mutate external state and does not perform any
      unauthorized internal mutations. Therefore, it is classified as an Enrichment
      action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not operate on SecOps entities. It uses an Alert ID provided
      as an input parameter to fetch data, and the simulation data indicates an empty
      entities list.
