Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities using the Armis platform. This action
    retrieves detailed device information, including risk levels, operating systems,
    and site details, to provide context for security investigations. It supports
    optional insight creation to summarize endpoint data directly within the case.


    ### Flow Description

    1. The action initializes the Armis Manager using the provided API credentials.

    2. It iterates through the target entities, filtering for IP Address and MAC Address
    types.

    3. For each valid entity, it performs an API call to Armis (`get_device_by_ip`
    or `get_device_by_mac`) to fetch device details.

    4. If device information is found, the action:
        * Updates the entity's `additional_properties` with the retrieved device data.
        * Marks the entity as enriched.
        * Adds an entity link and a data table to the result.
    5. If the `Create Endpoint Insight` parameter is enabled, it generates a summary
    insight containing the device's risk level, OS, and other metadata.

    6. Finally, it updates the entities in the SOAR platform and, if applicable, creates
    a case insight.


    ### Additional Notes

    This action is strictly for enrichment and does not modify external system states.
    It relies on the Armis API to provide contextual data for network-connected devices.
  ai_short_description: >-
    Enriches IP and MAC Address entities with device context from the Armis platform,
    including risk levels and asset metadata.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and creates case insights with device information.
    reasoning: >-
      The action fetches data from the Armis API (fetches_data=true). It does not
      mutate external systems. It mutates internal data by updating entity properties
      and creating case insights (can_mutate_internal_data=true).
