  ai_description: >-
    ### General Description

    Updates the status of a specific alert in the Armis platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert ID | Integer | Yes | Specify the ID of the alert for which you want to
    update the status. |

    | Status | String | No | Specify what status should be set for the alert. Expected
    values are Unhandled, Suppressed, Resolved. Default is Unhandled. |


    ### Flow Description

    1. Extracts the `Alert ID` and `Status` parameters.

    2. Initiates a PATCH request to the Armis API to update the status of the specified
    alert.

    3. Returns a success message if the alert was updated successfully or if it already
    had the requested status.

    4. Returns a failure message if the alert was not found or if another error occurred.
