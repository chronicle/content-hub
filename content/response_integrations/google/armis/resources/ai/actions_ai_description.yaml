List Alert Connections:
  ai_description: >-
    ### General Description

    Fetches connection data related to a specific alert from the Armis service. This
    action allows analysts to retrieve detailed communication logs associated with
    an Armis alert, filtered by severity and quantity, to support investigation and
    threat hunting.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Alert ID`, `Lowest Severity
    To Fetch`, and `Max Connections To Return` from the action parameters, along with
    necessary integration configuration (API Root, API Secret).

    2. **Initialization**: Initializes the `ArmisManager` with the provided credentials
    to establish a connection to the Armis service.

    3. **Query Construction**: Constructs an AQL (Armis Query Language) query string
    using the provided `Alert ID` and `Lowest Severity To Fetch` filter.

    4. **Data Retrieval**: Executes the `get_alert_connections` method via the `ArmisManager`
    to query the Armis API for connections matching the criteria.

    5. **Result Processing**: If connections are found, the action processes the retrieved
    data into JSON and CSV formats.

    6. **Output Generation**: Adds the processed JSON results to the action output
    and constructs a data table named 'Available Communications' containing the CSV
    data for display in the SecOps platform.


    ### Additional Notes

    This action requires valid Armis API credentials configured in the integration
    settings. The `Max Connections To Return` parameter must be at least 1.
  ai_short_description: >-
    Fetches connection data related to a specific alert from the Armis service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Armis API to retrieve alert connection
      data. It does not mutate external or internal data, nor does it update entities,
      create insights, or modify alert metadata.
