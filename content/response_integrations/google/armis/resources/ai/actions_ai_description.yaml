  ai_description: >-
    Tests connectivity to the Armis platform using the parameters provided in the
    integration configuration. The action authenticates and makes a test API call
    to verify that the integration is configured correctly and can communicate with
    the Armis server.


    ### Flow Description

    1. Retrieves the API Root, API Secret, and Verify SSL parameters from the integration
    configuration.

    2. Initializes the ArmisManager and authenticates to get an access token.

    3. Makes a test API call to the Armis search endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    There are no action parameters for this action. It relies entirely on the integration
    configuration parameters (API Root, API Secret, Verify SSL).


    ### Additional Notes

    This action is used solely to verify the integration configuration and does not
    perform any operations on alerts or entities.
