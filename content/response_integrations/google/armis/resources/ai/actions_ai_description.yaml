List Alert Connections:
  ai_description: >-
    ### General Description

    Retrieves a list of network connections associated with a specific alert in Armis.
    This action queries the Armis platform to fetch connection telemetry data linked
    to a given alert ID, filtering the results by a minimum severity level.


    ### Flow Description

    1. Extracts the `Alert ID`, `Lowest Severity To Fetch`, and `Max Connections To
    Return` from the action parameters.

    2. Validates that the maximum connections parameter is greater than or equal to
    the minimum allowed value.

    3. Constructs an Armis Query Language (AQL) query to search for connections (`in:connections`)
    matching the specified alert ID and severity risk levels.

    4. Makes an API call (GET request) to the Armis `/api/v1/search/` endpoint to
    fetch the relevant connection records.

    5. Parses the returned connections and formats them into JSON and CSV structures.

    6. Outputs the data to the SOAR platform as a JSON result and attaches a data
    table named 'Available Communications'.


    ### Additional Notes

    - The action requires a valid Alert ID originating from Armis.

    - The 'Lowest Severity To Fetch' parameter automatically includes all severities
    equal to or higher than the selected value (e.g., selecting 'Medium' fetches 'Medium'
    and 'High' risk connections).
  ai_short_description: >-
    Retrieves a list of network connections associated with a specific alert in Armis
    based on severity and alert ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a GET request to the Armis API to fetch alert connections
      (fetches_data = true). It does not perform any POST/PUT/DELETE requests to mutate
      external data, nor does it update internal entities, alerts, or case comments.
  entity_usage:
