Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP and MAC Address entities using device information from Armis. This
    action retrieves contextual metadata about the endpoints, such as risk level,
    operating system, user, and site details, to provide better visibility into the
    assets involved in a case.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only IP Addresses (`ADDRESS`) and MAC Addresses
    (`MACADDRESS`).

    3. Makes a GET request to the Armis API (`/api/v1/devices/`) to fetch device information
    based on the entity's identifier (IP or MAC).

    4. If device information is found, updates the entity's `additional_properties`
    with the retrieved data and marks the entity as enriched.

    5. Attaches a JSON result, an entity link to the Armis report, and an entity table
    to the case.

    6. If the `Create Endpoint Insight` parameter is enabled, generates a case insight
    containing the endpoint's risk level, OS, user, and other details.

    7. Updates the successfully enriched entities within the Google SecOps platform.


    ### Additional Notes

    Entities that are not of type IP Address or MAC Address will be skipped. If an
    entity cannot be found in Armis, it will be marked as failed and skipped.
  ai_short_description: >-
    Enriches IP and MAC Address entities by retrieving contextual device metadata
    (such as OS, user, and risk level) from Armis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Armis using GET requests (`get_device_by_ip`, `get_device_by_mac`).
      It does not mutate external data. It updates internal entities via `siemplify.update_entities`
      and creates insights via `siemplify.create_case_insight`.
  entity_usage:
