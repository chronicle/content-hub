Update Alert Status:
  ai_description: >-
    ### General Description

    Updates the status of an alert within the Armis platform. This action allows analysts
    to change the state of an existing alert to reflect its current handling status
    (e.g., Unhandled, Suppressed, Resolved).


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, API Secret,
    Verify SSL) and action parameters (Alert ID, Status).

    2. The `ArmisManager` is initialized using the provided credentials to establish
    a connection to the Armis service.

    3. The action executes a `PATCH` request to the Armis API endpoint `/api/v1/alerts/{alert_id}/`
    with the specified status in the payload.

    4. The action logs the outcome of the request and returns a success or failure
    message based on the API response.


    ### Additional Notes

    This action modifies external data in the Armis platform. It does not interact
    with entities within the SOAR platform.
