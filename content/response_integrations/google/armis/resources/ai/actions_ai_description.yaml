Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Armis server using the provided API credentials. This
    action validates that the integration is correctly configured and can successfully
    communicate with the Armis API.


    ### Flow Description

    1. The action extracts the `API Root`, `API Secret`, and `Verify SSL` parameters
    from the integration configuration.

    2. It initializes the `ArmisManager` using the provided credentials.

    3. The action calls the `manager.test_connectivity()` method, which performs a
    GET request to the Armis API endpoint (`/api/v1/search/`) with a query to fetch
    a single device record.

    4. If the API returns a successful response, the action reports a successful connection.
    If the request fails or an exception occurs, the action reports a failure.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data enrichment or state changes.
