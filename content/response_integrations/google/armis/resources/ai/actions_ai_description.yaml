    get_alert_information: false
    reasoning: >-
      The action fetches device information from Armis based on IP or MAC address,
      returning contextual metadata such as OS version, user, and site. This matches
      the 'Enrich Asset' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
