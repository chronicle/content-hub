name: Update Alert Status
description: Update status of the alert in Armis.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/armis#update_alert_status
integration_identifier: Armis
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the id of the alert for which you want to update status.
    is_mandatory: true
-   name: Status
    default_value: Unhandled
    type: ddl
    optional_values:
    - Unhandled
    - Suppressed
    - Resolved
    description: Specify what status should be set for the alert.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
