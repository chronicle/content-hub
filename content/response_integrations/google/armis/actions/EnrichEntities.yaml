name: Enrich Entities
description: 'Enrich entities using information from Armis. Supported entities: IP,
    Mac Address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/armis#enrich_entities
integration_identifier: Armis
parameters:
-   name: Create Endpoint Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight containing information
        about the endpoints.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS", "MacAddress"]}'
