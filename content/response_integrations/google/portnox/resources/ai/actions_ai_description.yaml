    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity `additional_properties` and `is_enriched` status.
    reasoning: >-
      The action queries the Portnox API to retrieve device information based on IP
      or MAC address. It does not modify external systems (the POST request is a search
      query). It updates internal entity properties (`additional_properties`) and
      marks them as enriched in Google SecOps.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external system (Portnox) to enrich entities.
      It does not mutate external systems. It performs allowed internal mutations
      (updating entity properties). Therefore, it is an enrichment action.
  entity_usage:
