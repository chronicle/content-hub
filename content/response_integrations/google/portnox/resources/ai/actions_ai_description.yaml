  ai_description: >-
    Retrieves a list of all open ports for a specific device from the Portnox NAC
    platform. This action supports IP Address and MAC Address entities. It first searches
    for the device within Portnox to obtain its internal ID and then fetches the current
    open port details. The results are presented as an entity-specific data table
    within the case.


    ### Flow Description

    1. **Initialization**: Connects to the Portnox API using the provided credentials
    and configuration (API Root, Username, Password).

    2. **Device Search**: For each IP Address or MAC Address entity, the action queries
    the Portnox `/devices` endpoint to find a matching device record and retrieve
    its unique `deviceId`.

    3. **Port Retrieval**: If a device is found, the action requests the list of open
    ports from the `/devices/{deviceId}/details/openports` endpoint.

    4. **Data Presentation**: Converts the retrieved port data into a CSV format and
    attaches it as an entity-specific data table to the entity in the Google SecOps
    case.

    5. **Entity Update**: Marks the entities as enriched and updates their status
    within the platform.


    ### Parameters Description

    There are no additional parameters for this action; it relies on the target entities
    (IP Address or MAC Address) and the integration's global configuration.


    ### Additional Notes

    - If multiple devices match a search query in Portnox, the action selects the
    first device returned by the API.

    - If no open ports are found for an entity, no table is added for that specific
    entity.
