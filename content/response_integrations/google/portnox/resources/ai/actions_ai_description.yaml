    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities and adds a data table containing device history to the entity.
    reasoning: >-
      The action fetches device history from Portnox (fetches_data=true). It does
      not modify external systems (can_mutate_external_data=false). It updates internal
      entities by adding a data table and marking them as updated (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights or modify alerts.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data (history) and enriches the entity with this information
      (adding a table and updating the entity). It does not mutate external systems.
      It fits the definition of an enrichment action.
  entity_usage:
