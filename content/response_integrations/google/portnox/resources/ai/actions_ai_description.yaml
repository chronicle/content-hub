Enrich Device:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities with comprehensive device metadata
    from Portnox. This action queries the Portnox API to retrieve details such as
    security status, location, and hardware information for the specified network
    identifiers. The retrieved data is then mapped to the entity's additional properties
    within Google SecOps, providing analysts with immediate context regarding the
    device's posture and identity.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    - The action uses a POST request to the `/devices` endpoint for searching, but
    this is a read-only query operation and does not modify data in Portnox.

    - If multiple devices match a search query, the action selects the first result
    returned by the API.


    ### Flow Description

    1. **Authentication**: Connects to the Portnox API using the configured API Root,
    Username, and Password.

    2. **Entity Filtering**: Identifies supported entities (IP Addresses and MAC Addresses)
    from the target entities list.

    3. **Data Retrieval**: For each supported entity, it executes a search query in
    Portnox using the entity's identifier (IP or MAC address).

    4. **Data Transformation**: If a device is found, the resulting JSON object is
    flattened and prefixed with 'Portnox' to ensure clear attribution in the SOAR.

    5. **Internal Update**: Updates the entity's additional properties with the enriched
    data and marks the entity as 'enriched' within Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Portnox device information and sets
      the is_enriched flag to true.
  categories:
    enrichment: true
  entity_usage:
