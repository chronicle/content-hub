Enrich Device:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities with device information retrieved
    from Portnox. This action queries Portnox for device details and appends the retrieved
    data to the entities' additional properties within the SecOps platform.


    ### Flow Description

    1. Iterates through the provided target entities.

    2. Checks if the entity type is an IP Address (`ADDRESS`) or MAC Address (`MACADDRESS`).

    3. Makes an API call (`POST /devices`) to Portnox to search for the device using
    the entity's identifier.

    4. If a matching device is found, the action flattens the device data dictionary,
    prefixes the keys with "Portnox", and updates the entity's `additional_properties`.

    5. Marks the entity as enriched (`is_enriched = True`).

    6. Updates the modified entities in the SecOps platform.


    ### Additional Notes

    If an error occurs while processing a specific entity, the action logs the error
    and continues to the next entity.
  ai_short_description: >-
    Enriches IP Address and MAC Address entities by retrieving device information
    from Portnox and appending it to the entities' additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional properties of the target entities with the retrieved
      device information.
    reasoning: >-
      The action fetches device data from Portnox via an API call. It does not mutate
      external data. It mutates internal data by updating the entities' additional
      properties and calling `siemplify.update_entities`.
