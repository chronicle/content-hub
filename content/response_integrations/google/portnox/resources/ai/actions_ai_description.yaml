Get Device Locations:
  ai_description: >-
    ### General Description

    The **Get Device Locations** action retrieves physical or logical location information
    for devices associated with IP Address or MAC Address entities from the Portnox
    NAC platform. It helps analysts understand where a specific device is connected
    within the network infrastructure by providing details such as switch names, ports,
    or site locations.


    ### Parameters Description

    There are no user-configurable parameters for this action. It relies on the integration's
    global configuration (API Root, Username, Password) and the entities present in
    the current context.


    ### Flow Description

    1. **Entity Identification**: The action iterates through the target entities
    in the case, specifically looking for `ADDRESS` (IP) and `MACADDRESS` types.

    2. **Device Search**: For each supported entity, it queries Portnox to find a
    matching device record using the IP or MAC address as the search key.

    3. **Location Retrieval**: If a device is found, the action retrieves its current
    location data from the Portnox API.

    4. **Data Sanitization**: The retrieved location data is cleaned by removing internal
    or irrelevant fields (e.g., `portIds`).

    5. **Enrichment**: The location details are formatted into a CSV table and attached
    to the entity within Google SecOps. The entity is then updated to reflect the
    enrichment.


    ### Additional Notes

    - This action is strictly read-only regarding the Portnox system; it does not
    change device status or network access policies.

    - If no device is found for a specific entity, that entity is skipped without
    failing the entire action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
