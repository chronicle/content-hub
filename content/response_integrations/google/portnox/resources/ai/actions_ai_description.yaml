Get Device History:
  ai_description: >-
    ### General Description

    Retrieves device history from the Portnox platform for specified IP Address or
    MAC Address entities. This action queries the Portnox API to fetch historical
    authentication and device activity data for a defined period, providing analysts
    with context regarding the device's behavior and network presence.


    ### Flow Description

    1. **Initialization**: The action initializes the `PortnoxManager` using the provided
    API credentials and configuration.

    2. **Time Calculation**: It calculates the `from_timestamp` and `to_timestamp`
    based on the `Days Backwards` parameter to define the search window.

    3. **Entity Iteration**: The action iterates through the provided `target_entities`.

    4. **Device Search**: For each entity of type `ADDRESS` or `MACADDRESS`, it calls
    the `portnox_manager.search_device` method (POST request) to identify the corresponding
    device ID in Portnox.

    5. **Data Retrieval**: If a device is found, it calls `portnox_manager.get_device_history`
    (GET request) to retrieve the historical data for that device within the specified
    time range.

    6. **Result Presentation**: The retrieved history is formatted as a CSV table
    and added to the entity using `siemplify.result.add_entity_table`.

    7. **Entity Update**: Finally, the action updates the enriched entities within
    the SOAR platform using `siemplify.update_entities`.


    ### Additional Notes

    This action requires valid Portnox API credentials. It specifically targets IP
    and MAC Address entities to perform the lookup.
