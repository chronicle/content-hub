  ai_description: >-
    ### General Description

    Enriches IP and MAC Address entities with device information from Portnox. This
    action searches for devices in Portnox using the entity's identifier and appends
    the retrieved device details to the entity's additional properties within Google
    SecOps.


    ### Parameters Description

    There are no parameters required for this action.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Checks if the entity type is an IP Address (`ADDRESS`) or a MAC Address (`MACADDRESS`).

    3. Searches for the corresponding device in Portnox using the entity's identifier.

    4. If a device is found, flattens the device details dictionary and adds a "Portnox"
    prefix to the keys.

    5. Updates the entity's `additional_properties` with the flattened device details
    and marks the entity as enriched.

    6. Updates the enriched entities in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the additional properties of the target entities with the fetched device
      details.
    reasoning: >-
      The action fetches device data from Portnox using a search query. It does not
      mutate any external data. It mutates internal data by updating the entities
      with the fetched device details.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Portnox) to enrich entities.
      It does not mutate external data and only performs allowed internal mutations
      (updating entities). Therefore, it is an enrichment action. It does not perform
      any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks if
      `entity.entity_type` is `EntityTypes.ADDRESS` or `EntityTypes.MACADDRESS`.
