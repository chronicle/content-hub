  ai_description: >-
    ### General Description

    Retrieves historical authentication and connection data for devices associated
    with IP or MAC address entities from Portnox. This action is used to understand
    the historical context of a device's activity within the network over a specified
    period.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Days Backwards | Integer | Yes | Specifies how many days into the past the action
    should look to retrieve device history. Defaults to 1. |


    ### Flow Description

    1. **Initialization**: Connects to the Portnox API using provided credentials.

    2. **Timeframe Calculation**: Determines the start and end timestamps based on
    the 'Days Backwards' parameter.

    3. **Device Lookup**: For each IP (ADDRESS) or MAC address entity, it searches
    Portnox to find the corresponding internal device ID.

    4. **History Retrieval**: Fetches the detailed history for the identified device
    within the calculated timeframe.

    5. **Data Presentation**: Converts the history data into a CSV format and attaches
    it as a table to the specific entity in Google SecOps.

    6. **Entity Update**: Marks the entities as updated/enriched in the system.


    ### Additional Notes

    - If no device is found for an entity, or no history exists for the timeframe,
    the action will skip that entity and report the results at the end.
