  ai_description: >-
    ### General Description

    The **Revalidate Device** action triggers a policy revalidation for a specific
    device within the Portnox Network Access Control (NAC) system. This is used to
    force a device to undergo a fresh security posture check or authentication cycle
    to ensure it complies with current network policies.


    ### Parameters Description

    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceId | String | Yes | The unique identifier of the device in Portnox that
    needs to be revalidated. |


    ### Flow Description

    1. **Initialization**: The action connects to the Portnox API using the provided
    credentials (API Root, Username, Password) and SSL configuration.

    2. **Trigger Revalidation**: It sends a POST request to the Portnox endpoint `/devices/actions/revalidation`
    to initiate the revalidation process for the specified `DeviceId`.

    3. **Status Polling**: The action enters a polling loop, calling the device information
    endpoint `/devices/{deviceId}` to monitor the `securityStatus` of the device.

    4. **Completion**: It waits until the device status reaches 'AuthorizationPassed'
    or a timeout occurs. Once the status is confirmed, the action completes with a
    success message.


    ### Additional Notes

    - This action does not run on SOAR entities; it requires a specific `DeviceId`
    provided as a parameter.

    - The action includes a built-in waiting mechanism to ensure the revalidation
    process finishes before the action returns a result.
