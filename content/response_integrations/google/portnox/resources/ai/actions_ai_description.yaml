    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only IP Addresses (`ADDRESS`) and MAC Addresses
    (`MACADDRESS`).

    3. For each valid entity, queries the Portnox API (`search_device`) to find the
    corresponding device ID.

    4. If a device is found, queries the Portnox API (`get_device_locations`) to retrieve
    its location details.

    5. Formats the retrieved location data into a CSV table and attaches it to the
    entity.

    6. Updates the enriched entities in the Google SecOps platform.


