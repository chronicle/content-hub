Get Device History:
  ai_description: >-
    ### General Description

    Retrieves the device history for IP and MAC Address entities from Portnox. This
    action helps analysts understand the historical context and activity of a device
    connected to the network by fetching its authentication and connection history
    over a specified period.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only IP Addresses (`ADDRESS`) and MAC Addresses
    (`MACADDRESS`).

    3. For each valid entity, searches for the corresponding device in Portnox using
    the entity's identifier (via a POST request to the `/devices` endpoint).

    4. If a device is found, fetches its history for the specified number of days
    backwards (via a GET request to the `/devices/{device_id}/details/deviceHistory`
    endpoint).

    5. Formats the retrieved history into a CSV table and attaches it to the entity
    in Google SecOps.

    6. Updates the successfully processed entities in the platform.


    ### Additional Notes

    - If multiple devices match the search query in Portnox, only the first device
    returned is processed.
  ai_short_description: >-
    Retrieves the device history for IP and MAC Address entities from Portnox and
    attaches the results as an entity table in Google SecOps.
