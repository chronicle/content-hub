Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Portnox instance. It validates the integration configuration
    by attempting to authenticate with the provided credentials (API Root, Username,
    and Password) and checking the server's responsiveness.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration settings.


    ### Flow Description

    1.  **Configuration Retrieval**: The action retrieves the API Root, Username,
    Password, and SSL verification settings from the Portnox integration configuration.

    2.  **Manager Initialization**: It initializes the `PortnoxManager` with the retrieved
    settings.

    3.  **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a GET request to the `/auth/user` endpoint of the Portnox API.

    4.  **Response Validation**: The manager validates the HTTP response. If the request
    is successful (HTTP 200), the connection is considered established.

    5.  **Completion**: The action ends with a success message 'Connection Established'
    and a result value of 'true'.
