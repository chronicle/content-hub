  ai_description: >-
    ### General Description

    Retrieves the user authentication history for specific device entities from Portnox.
    This action allows analysts to see which users have authenticated to a device
    (identified by IP or MAC address) over time, providing critical context for investigations
    involving shared assets or compromised credentials.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action performs a two-step process: first, it searches for the device in
    Portnox to obtain an internal device ID, and then it fetches the user history
    associated with that ID. The results are attached directly to the entity as a
    data table. If no history is found or the device is not located in Portnox, the
    action will complete without enriching that specific entity.


    ### Flow Description

    1. **Identify Entities**: The action iterates through the target entities and
    filters for those of type `ADDRESS` (IP) or `MacAddress`.

    2. **Device Search**: For each valid entity, it queries the Portnox API using
    a POST request to find a matching device record and retrieve its unique internal
    ID.

    3. **Fetch History**: If a device is found, the action performs a GET request
    to retrieve the user authentication history associated with that device ID.

    4. **Data Formatting**: The retrieved history list is converted into a CSV format
    using the `construct_csv` utility.

    5. **Enrichment**: The CSV data is attached to the entity as a data table named
    "[Identifier] - User History".

    6. **Update**: The action updates the entities in Google SecOps to persist the
    newly attached data tables.
