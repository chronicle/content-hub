  ai_description: >-
    ### General Description

    This action retrieves physical or network location information for devices associated
    with IP Address or MAC Address entities from the Portnox NAC platform. It is used
    to identify where a specific device is connected within the network infrastructure,
    providing visibility into the device's current or last known location.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action iterates through the target entities in the
    current context, specifically looking for entities of type `ADDRESS` (IP) or `MacAddress`.

    2. **Device Search**: For each supported entity, the action queries Portnox to
    find a matching device record using the IP address or MAC address as the search
    key.

    3. **Location Retrieval**: If a device is found, the action uses the internal
    Portnox device ID to fetch all associated location records.

    4. **Data Sanitization**: The retrieved location data is processed to remove internal
    technical details (like `portIds`) to ensure the output is clean and readable.

    5. **Result Attachment**: The location data is formatted into a CSV table and
    attached directly to the entity as an 'Entity Table' in the Google SecOps UI.

    6. **Entity Update**: Successfully enriched entities are updated within the system
    to reflect the new information.
