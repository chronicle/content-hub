    reasoning: >-
      The action fetches device information from Portnox based on IP or MAC address
      entities. It updates the internal entity properties in Google SecOps with this
      retrieved data. It does not modify external systems or create insights/comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Portnox) and updates internal
      entity attributes without modifying external state. This fits the definition
      of an enrichment action.
  entity_usage:
