  ai_description: >-
    ### General Description

    The **Get Device History** action retrieves historical activity logs for network
    devices managed by Portnox NAC. It allows analysts to see the connection and authentication
    history of specific endpoints within a defined timeframe, providing context for
    investigations involving potentially compromised or unauthorized devices.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Days Backwards | String | Yes | Specifies the number of days prior to the current
    time to fetch history for. For example, entering "1" retrieves history from the
    last 24 hours. |


    ### Additional Notes

    - This action supports **IP Address** and **MAC Address** entities.

    - The results are presented as a CSV-formatted table attached to the entity.


    ### Flow Description

    1. **Time Range Calculation:** The action calculates the start and end timestamps
    based on the `Days Backwards` parameter and the current UTC time.

    2. **Entity Identification:** It filters the target entities to find IP Addresses
    and MAC Addresses.

    3. **Device Search:** For each valid entity, it queries Portnox to find the internal
    `deviceId` using a POST request to the search endpoint.

    4. **History Retrieval:** Using the `deviceId`, it fetches the device's history
    logs for the calculated time range via a GET request.

    5. **Data Presentation:** If history is found, it is converted to a CSV format
    and added as an entity-specific data table in Google SecOps.

    6. **Entity Update:** The action updates the entities to indicate successful enrichment.
