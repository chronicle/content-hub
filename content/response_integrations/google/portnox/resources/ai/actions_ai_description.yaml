Revalidate Device:
  ai_description: >-
    ### General Description

    Revalidates the security policy of a specific device using the Portnox Network
    Access Control (NAC) system. This action ensures that the device's compliance
    and security status are updated by triggering a revalidation process on the NAC.


    ### Flow Description

    1. The action retrieves the necessary configuration parameters (API Root, Username,
    Password, and SSL verification settings) from the Portnox integration configuration.

    2. It initializes the `PortnoxManager` to handle communication with the Portnox
    API.

    3. The action extracts the `DeviceId` from the provided parameters.

    4. It executes the `revalidate_device` method, which performs a POST request to
    the Portnox API to trigger the revalidation process for the specified device.

    5. It then executes the `wait_for_device_revalidation` method, which performs
    repeated GET requests to poll the device's status until the revalidation is confirmed
    or a timeout is reached.

    6. Finally, the action returns a success message indicating the revalidation status.


    ### Additional Notes

    This action performs a state-changing operation on the external Portnox NAC system.
    It includes a polling mechanism to verify the outcome of the revalidation request,
    which may take time to complete depending on the device's response.
