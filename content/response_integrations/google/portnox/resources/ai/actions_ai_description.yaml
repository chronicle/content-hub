Enrich Device:
  ai_description: >-
    ### General Description

    Enriches device entities (IP Address or MAC Address) by retrieving contextual
    device information from the Portnox platform. This action helps security analysts
    gain visibility into the device's status, configuration, and history by querying
    the Portnox API and updating the corresponding entities within the SOAR platform.


    ### Flow Description

    1. The action initializes the `PortnoxManager` using the provided integration
    configuration (API Root, Username, Password, and SSL verification settings).

    2. It iterates through the `target_entities` provided in the SOAR case.

    3. For each entity, it checks if the type is `ADDRESS` (IP) or `MACADDRESS`.

    4. If the entity type matches, the action calls the `portnox_manager.search_device`
    method to query the Portnox API for device details.

    5. If a device is found, the retrieved data is flattened and prefixed with "Portnox"
    to avoid key collisions.

    6. The action updates the entity's `additional_properties` with the retrieved
    device data and sets the `is_enriched` flag to true.

    7. Finally, the action calls `siemplify.update_entities` to save the enriched
    data back to the SOAR platform and outputs a summary of the enriched entities.


    ### Additional Notes

    This action requires valid Portnox API credentials configured in the integration
    settings. It does not perform any state-changing operations on the Portnox platform;
    it is strictly an enrichment and data retrieval action.
  ai_short_description: >-
    Enriches device entities (IP or MAC Address) by retrieving contextual device information
    from Portnox.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties and sets the is_enriched flag within the
      SOAR platform.
    reasoning: >-
      The action fetches data from the Portnox API (fetches_data=true). It does not
      mutate external data (can_mutate_external_data=false). It updates internal entities
      within the SOAR platform (can_mutate_internal_data=true, can_update_entities=true).
