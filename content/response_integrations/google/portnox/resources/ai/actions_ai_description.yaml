Get User History:
  ai_description: >-
    ### General Description

    Retrieves the user authentication history for a specific device from the Portnox
    NAC platform. This action identifies devices based on their IP address or MAC
    address, queries the Portnox API for associated user history, and attaches this
    information as a CSV table to the entity within the SOAR platform. It also updates
    the entity status to reflect that enrichment has occurred.


    ### Flow Description

    1. **Initialization**: The action initializes the `PortnoxManager` using the configured
    API root, username, password, and SSL verification settings.

    2. **Entity Iteration**: The action iterates through the provided target entities,
    filtering for `ADDRESS` and `MACADDRESS` types.

    3. **Device Search**: For each valid entity, the action performs a POST request
    to the Portnox `/devices` endpoint to search for the device using the entity's
    identifier.

    4. **Data Retrieval**: If a device is found, the action performs a GET request
    to the `/devices/{device_id}/details/userHistory` endpoint to retrieve the authentication
    history.

    5. **Result Processing**: The retrieved history is converted into a CSV format
    and added to the entity's result table.

    6. **Entity Update**: The action updates the enriched entities within the SOAR
    platform using `siemplify.update_entities`.


    ### Additional Notes

    This action requires valid Portnox API credentials configured in the integration
    settings. It does not modify the state of the device or the Portnox system; it
    is strictly an enrichment and search operation.
