  ai_description: >-
    ### General Description

    The **Get Device Locations** action retrieves physical or logical location information
    for devices associated with IP Address or MAC Address entities from the Portnox
    NAC platform. This action helps analysts identify where a specific device is connected
    within the network infrastructure by providing details such as switch names, ports,
    or site locations.


    ### Parameters Description

    This action does not have any user-configurable parameters. It utilizes the integration's
    global configuration (API Root, Username, Password) and processes the entities
    available in the current context.


    ### Flow Description

    1. **Entity Identification**: The action iterates through the target entities
    in the case, specifically filtering for `ADDRESS` (IP) and `MacAddress` types.

    2. **Device Search**: For each supported entity, it queries the Portnox API to
    find a matching device record using the IP or MAC address as the search key via
    a search query.

    3. **Location Retrieval**: If a matching device is found, the action retrieves
    its current location data from the Portnox `/locations` endpoint using the device's
    unique ID.

    4. **Data Sanitization**: The retrieved location data is cleaned by removing internal
    or irrelevant fields, such as `portIds`, to ensure the output is concise.

    5. **Enrichment**: The location details are formatted into a CSV table and attached
    to the specific entity as an entity table. Finally, the action updates the entities
    within Google SecOps to reflect the enrichment.


    ### Additional Notes

    - This action is strictly read-only regarding the Portnox system; it does not
    modify device status or network access policies.

    - If no device is found for a specific entity, that entity is skipped, and the
    action continues processing others.
