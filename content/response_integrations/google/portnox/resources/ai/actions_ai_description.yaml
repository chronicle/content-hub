Revalidate Device By Address:
  ai_description: >-
    ### General Description

    The **Revalidate Device By Address** action forces a re-evaluation of the network
    access control (NAC) policy for specific devices within the Portnox environment.
    This action is used to ensure that a device is compliant with current organizational
    security policies by triggering a fresh authentication and validation cycle. It
    supports both IP address and MAC address entities.


    ### Parameters Description

    There are no parameters for this action. It operates directly on the entities
    provided in the context.


    ### Flow Description

    1. **Entity Identification**: The action iterates through the target entities,
    specifically looking for `ADDRESS` (IP) and `MacAddress` types.

    2. **Device Search**: For each identified entity, it queries the Portnox API to
    find the corresponding device record using the IP or MAC address.

    3. **Trigger Revalidation**: If a matching device is found, the action sends a
    request to Portnox to initiate a revalidation of that device's authentication
    policy.

    4. **Status Polling**: The action enters a wait state, polling the Portnox API
    to monitor the device's security status until the revalidation process is confirmed
    as complete (e.g., status becomes 'AuthorizationPassed').

    5. **Final Reporting**: The action concludes by listing all entities for which
    the device revalidation was successfully triggered and verified.


    ### Additional Notes

    - If no device is found for a given entity, that entity is skipped without affecting
    the overall action execution.

    - The action includes a built-in timeout mechanism during the polling phase to
    prevent the script from running indefinitely if the NAC system does not respond.
