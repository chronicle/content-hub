    ### General Description

    The **Get Open Ports** action retrieves a comprehensive list of open network ports
    for a specific device managed by Portnox. It supports both IP Address and MAC
    Address entities. By querying the Portnox NAC (Network Access Control) system,
    security analysts can gain visibility into the services exposed on a device, which
    is crucial for vulnerability assessment and incident response.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    - The action uses the device's IP or MAC address to first locate the device ID
    within Portnox before fetching the port details.

    - Results are presented as a CSV-formatted table attached to the entity.


    ### Flow Description

    1. **Initialization**: The action connects to the Portnox API using the configured
    credentials and SSL settings.

    2. **Entity Filtering**: It identifies all `ADDRESS` (IP) and `MacAddress` entities
    within the current context.

    3. **Device Lookup**: For each valid entity, it performs a search in Portnox to
    retrieve the internal `deviceId`.

    4. **Port Retrieval**: Using the `deviceId`, it fetches the list of open ports
    from the Portnox details endpoint.

    5. **Enrichment**: If ports are found, it generates a CSV table and attaches it
    to the entity in the SOAR UI.

    6. **Final Update**: The action updates the entities in the case to reflect the
    new information and provides a summary message.
