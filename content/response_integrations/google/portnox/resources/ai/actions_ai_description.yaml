  ai_description: >-
    ### General Description

    This action retrieves a comprehensive list of all installed applications on a
    specific device by interfacing with Portnox. It is designed to provide security
    analysts with visibility into the software inventory of endpoints identified by
    their IP Address or MAC Address. The retrieved data is presented as a CSV table
    attached to the entity within the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - The action relies on the Portnox integration configuration (API Root, Username,
    Password) to authenticate.

    - It specifically targets entities of type **ADDRESS** (IP) and **MacAddress**.

    - If multiple devices match a search criterion in Portnox, the action processes
    the first match returned by the API.


    ### Flow Description

    1. **Initialization**: The action initializes the Portnox manager using the provided
    integration credentials (API Root, Username, Password, and SSL verification settings).

    2. **Entity Filtering**: It iterates through the target entities in the current
    context, filtering for those of type **ADDRESS** (IP) and **MacAddress**.

    3. **Device Search**: For each valid entity, it performs a search in Portnox using
    the IP or MAC Address as the key to find the unique device ID.

    4. **Data Retrieval**: Once a device is identified, the action calls the Portnox
    API to fetch the list of installed applications associated with that device ID.

    5. **Data Formatting**: The list of applications is converted into a CSV format
    using the `construct_csv` utility.

    6. **Internal Update**: The CSV data is added as an entity-specific table in the
    SOAR platform, and the entities are updated to reflect the enrichment process.

    7. **Completion**: The action concludes by providing a summary message indicating
    which entities were successfully enriched with application data.
