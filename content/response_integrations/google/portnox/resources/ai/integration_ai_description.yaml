product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Portnox integration provides comprehensive visibility into network-connected
    devices (assets). It maps directly to 'Asset Inventory' by providing device metadata,
    location, and history. It supports 'Vulnerability Management' by exposing the
    attack surface of assets through 'Get Installed Applications', 'Get Open Ports',
    and 'Get Services' actions, which are critical for assessing susceptibility. It
    qualifies for 'SIEM' as it provides activity logs related to assets and users
    (authentication and connection history), helping to identify the source of suspicious
    activity. It qualifies for 'Network Security' as a Network Access Control (NAC)
    solution, where actions like 'Revalidate Device' allow for controlling network
    access and isolating/containing devices. It does not qualify for 'EDR' as it lacks
    deep process-level visibility (process trees, file retrieval). It does not qualify
    for 'Threat Intelligence' as it does not perform IOC reputation lookups. It does
    not qualify for 'IAM', 'Email Security', 'Cloud Security', 'ITSM', or 'Collaboration'
    as it lacks the specific capabilities defined for those categories.
  siem: true
  threat_intelligence: false
  vulnerability_management: true
