product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Portnox integration is a Network Access Control (NAC) solution that provides
    visibility into network-connected devices. Its primary capabilities, as demonstrated
    by the actions, are to provide deep contextual metadata about internal assets.
    Actions such as 'Enrich Device', 'Get Device Locations', 'Get Installed Applications',
    'Get Services', and 'Get Open Ports' provide detailed information about assets,
    which directly aligns with the 'Asset Inventory' category. Additionally, the 'Get
    Device History' and 'Get User History' actions allow analysts to investigate activity
    related to assets and users, which aligns with the 'SIEM' category's purpose of
    investigating activity. The integration does not perform EDR functions (process-level
    visibility), threat intelligence (reputation), or firewall/WAF management (Network
    Security). While it performs NAC policy revalidation, this does not equate to
    the firewall/WAF blocking capabilities defined in the Network Security category.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
