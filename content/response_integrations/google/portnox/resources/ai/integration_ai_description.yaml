product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Portnox integration is a Network Access Control (NAC) solution. Its primary
    capabilities involve retrieving detailed contextual information about internal
    assets (devices), such as device metadata, location, history, installed applications,
    open ports, and running services. This aligns directly with the 'Asset Inventory'
    category. Additionally, the integration includes actions to revalidate device
    security policies within the NAC system, which is a network security control function,
    fitting the 'Network Security' category. It does not perform SIEM log analysis,
    EDR process-level monitoring, threat intelligence reputation lookups, email security,
    IAM user management, cloud security, ITSM ticketing, or vulnerability management
    (CVE/patching).
  siem: false
  threat_intelligence: false
  vulnerability_management: false
