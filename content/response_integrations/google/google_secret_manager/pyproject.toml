[project]
name = "GoogleSecretManager"
version = "1.0"
description = "Google Secret Manager is a secure and convenient storage system for API keys, passwords, certificates, and other sensitive data. This integration allows you to sync secrets from Google Secret Manager to the platform."
requires-python = ">=3.11,<3.12"
dependencies = [
    "environmentcommon",
    "google-cloud-secret-manager",
    "google-auth",
    "tipcommon",
]

[dependency-groups]
dev = [ "integration-testing", "pytest>=9.0.2", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.3.6-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.6-py3-none-any.whl"
