identifier: GoogleSecretManager
name: Google Secret Manager
parameters:
-   name: Service Account JSON
    default_value: null
    type: password
    description: The Service Account JSON key to authenticate with Google Secret Manager.
    is_mandatory: false
    integration_identifier: GoogleSecretManager
-   name: Project ID
    default_value: null
    type: string
    description: The Google Cloud Project ID where the secrets are stored. If not provided, it will be inferred from the Service Account JSON if possible, but recommended to specify.
    is_mandatory: false
    integration_identifier: GoogleSecretManager
-   name: Workload Identity Email
    default_value: null
    type: string
    description: The service account email to impersonate when authenticating via Workload Identity (Application Default Credentials). Use this instead of Service Account JSON when the SOAR platform runs within Google Cloud with Workload Identity enabled.
    is_mandatory: false
    integration_identifier: GoogleSecretManager
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting to API Service. Selected by default.
    is_mandatory: false
    integration_identifier: GoogleSecretManager
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-secret-manager
categories:
- Identity and Access Management
svg_logo_path: resources/logo.svg
image_path: resources/image.png
