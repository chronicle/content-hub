name: Sync Integration Credential Job
parameters:
-   name: Service Account JSON
    type: password
    description: The Service Account JSON key to authenticate with Google Secret Manager.
    is_mandatory: false
-   name: Project ID
    type: string
    description: The Google Cloud Project ID where the secrets are stored. If not provided, it will be inferred from the Service Account JSON if possible, but recommended to specify.
    is_mandatory: false
-   name: Workload Identity Email
    type: string
    description: The service account email to impersonate when authenticating via Workload Identity (Application Default Credentials). Use this instead of Service Account JSON when the SOAR platform runs within Google Cloud with Workload Identity enabled.
    is_mandatory: false
-   name: Environment Name
    type: string
    description: The environment name where the integration instances, connectors, and jobs are configured.
    is_mandatory: true
-   name: Credential Mapping
    type: string
    description: >
        JSON mapping string that dictates where in the Secret Manager the data is
        stored. It maps integration instances, connectors, and jobs to their respective
        secret IDs in Google Secret Manager. Each secret in GCP is expected to be a
        JSON object where each key is an integration parameter name.
    is_mandatory: true
description: >
    Syncs credentials from Google Secret Manager to SOAR platform. Reads a credential
    mapping JSON, fetches the corresponding secrets from Google Secret Manager, and
    updates configuration parameters on integration instances, connectors, and jobs.
integration: GoogleSecretManager
creator: admin
