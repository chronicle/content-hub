name: Sync Integration Credential Job
parameters:
-   name: Environment Name
    type: string
    description: The environment name where the integration instances, connectors, and jobs are configured.
    is_mandatory: true
-   name: Credential Mapping
    type: string
    description: >
        JSON mapping string that dictates where in the Secret Manager the data is
        stored. It maps integration instances, connectors, and jobs to their respective
        secret IDs in Google Secret Manager. Each secret in GCP is expected to be a
        JSON object where each key is an integration parameter name.
    is_mandatory: true
description: >
    Syncs credentials from Google Secret Manager to SOAR platform. Reads a credential
    mapping JSON, fetches the corresponding secrets from Google Secret Manager, and
    updates configuration parameters on integration instances, connectors, and jobs.
integration: GoogleSecretManager
creator: admin
