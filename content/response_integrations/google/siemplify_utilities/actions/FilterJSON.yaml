name: Filter JSON
description: Filter JSON dict
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-utilities#filter_json
integration_identifier: SiemplifyUtilities
parameters:
-   name: JSON Data
    default_value: ''
    type: string
    description: The json dict data to filter.
    is_mandatory: true
-   name: Root Key Path
    default_value: ''
    type: string
    description: 'The path to the Root Key. Note: The system uses dot notation for
        JSON search. For example: json.message.status. '
    is_mandatory: false
-   name: Condition Path
    default_value: ''
    type: string
    description: The path to the field to filter by, dot separated.
    is_mandatory: true
-   name: Condition Operator
    default_value: ''
    type: string
    description: 'The condition operator. Can be one of the following: = / != / >
        / < / >= / <= / in / not in.'
    is_mandatory: true
-   name: Condition Value
    default_value: ''
    type: string
    description: The value of the condition to filter by.
    is_mandatory: true
-   name: Output Path
    default_value: ''
    type: string
    description: The path to the desired results in the filtered dict, dot separated.
    is_mandatory: false
-   name: Delimeter
    default_value: ''
    type: string
    description: 'The delimiter to join the values in the output path. Default: comma.'
    is_mandatory: false
-   name: Escape JSON Data Input
    default_value: true
    type: boolean
    description: 'If enabled, the action will try to escape input inside JSON Data,
        if it couldn''t detect a valid JSON immediately. Note: escaping operation
        is unstable and should be used with caution. If the parameter is disabled,
        action will never try to escape the JSON Data.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/filter_json_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: results
