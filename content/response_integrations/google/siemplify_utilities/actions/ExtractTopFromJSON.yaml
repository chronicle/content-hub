name: Extract Top From JSON
description: The action gets Json as input, sort it by a specific key and return the
    TOP x of the relevant branches
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-utilities#extract_top_from_json
integration_identifier: SiemplifyUtilities
parameters:
-   name: JSON Data
    default_value: ''
    type: string
    description: JSON data to process.
    is_mandatory: true
-   name: Key To Sort By
    default_value: ''
    type: string
    description: 'Nested key separated by dots. Use * as a wildcard. Example: Host.*.wassap_list.Severity'
    is_mandatory: true
-   name: Field Type
    default_value: ''
    type: string
    description: 'The type of the field to sort by. Valid values: int (numeric field),
        string (a text field) or date'
    is_mandatory: true
-   name: Reverse (DESC -> ASC)
    default_value: 'true'
    type: boolean
    description: Sort results by DESC or ASC (Z -> A).
    is_mandatory: false
-   name: Top Rows
    default_value: ''
    type: string
    description: Retrieve number of rows from JSON to process.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/extract_top_from_json_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: result
