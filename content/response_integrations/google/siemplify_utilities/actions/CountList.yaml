name: Count List
description: Count the number of items on a list - separated by a configurable delimiter.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-utilities#count_list
integration_identifier: SiemplifyUtilities
parameters:
-   name: Input String
    default_value: ''
    type: string
    description: 'Comma separated string list. For example: value1,value2,value3.'
    is_mandatory: false
-   name: Delimiter
    default_value: ''
    type: string
    description: Define a symbol, which is used for separation of values from the
        input list.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: list_count
