name: Query Joiner
description: Form query string from given parameters.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-utilities#query_joiner
integration_identifier: SiemplifyUtilities
parameters:
-   name: Values
    default_value: ''
    type: string
    description: 'Comma separated string list. For example: value1,value2,value3.'
    is_mandatory: true
-   name: Query Field
    default_value: ''
    type: string
    description: Query target field ex. SrcIP, DestHost, etc..
    is_mandatory: true
-   name: Query Operator
    default_value: ''
    type: string
    description: Query operator(OR, AND, etc.)
    is_mandatory: true
-   name: Add Quotes
    default_value: 'False'
    type: boolean
    description: If enabled, action will add quotes to every item in the "Values"
        list.
    is_mandatory: false
-   name: Add Double Quotes
    default_value: 'False'
    type: boolean
    description: If enabled, action will add double quotes to every item in the "Values"
        list.
    is_mandatory: false
-   name: Delimiter
    default_value: ','
    type: string
    description: The delimiter used to split the input string in the 'Values' parameter.
        Default is ','.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: query
