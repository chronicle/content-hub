name: Parse EML to JSON
description: Parse EML to JSON
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-utilities#parse_eml_to_json
integration_identifier: SiemplifyUtilities
parameters:
-   name: EML Content
    default_value: ''
    type: string
    description: The base64 encoded content of the EML file.
    is_mandatory: true
-   name: Blacklisted Headers
    default_value: ''
    type: string
    description: Headers to exclude from the response.
    is_mandatory: false
-   name: Use Blacklist As Whitelist
    default_value: false
    type: boolean
    description: To only include the listed headers.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/parse_eml_to_json_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: parsed_eml
