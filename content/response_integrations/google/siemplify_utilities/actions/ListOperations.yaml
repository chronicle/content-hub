name: List Operations
description: Provide operations on lists.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-utilities#list_operations
integration_identifier: SiemplifyUtilities
parameters:
-   name: First List
    default_value: ''
    type: string
    description: 'Comma separated string list. For example: value1,value2,value3.'
    is_mandatory: false
-   name: Second List
    default_value: ''
    type: string
    description: 'Comma separated string list. For example: value1,value2,value3.'
    is_mandatory: false
-   name: Delimiter
    default_value: ''
    type: string
    description: Define a symbol, which is used for separation of values in both lists.
    is_mandatory: false
-   name: Operator
    default_value: ''
    type: string
    description: 'Has to be one of the following: intersection, union, subtract or
        xor.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_operations_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: result_list
