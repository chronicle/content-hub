Export Entities as OpenIOC File:
  ai_description: >-
    Exports supported entities from the current execution context into a standardized
    OpenIOC (Open Indicators of Compromise) XML file. This utility action is designed
    to facilitate the sharing of threat intelligence by packaging entity identifiers
    and their associated metadata into a portable format.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IOC Name | String | No | The name to be assigned to the IOC within the generated
    file metadata. |

    | Export Folder Path | String | Yes | The local or network directory path where
    the resulting .ioc file will be saved. |


    ### Flow Description

    1. **Initialization**: The action retrieves the user-provided IOC name and the
    mandatory export folder path.

    2. **Entity Filtering**: It identifies supported entities within the case, specifically
    targeting Filehashes, IP Addresses, Hostnames, Users, and URLs.

    3. **IOC Construction**: For each supported entity, the action creates an OpenIOC
    indicator node. It maps the entity's primary identifier (e.g., the MD5 hash or
    IP address) to the corresponding OpenIOC search term.

    4. **Metadata Enrichment**: The action iterates through the entity's 'additional_properties'
    and matches them against a predefined mapping (e.g., matching a Hostname's OS
    version or a User's group list) to add supplemental indicators to the IOC file.

    5. **File Generation**: A unique OpenIOC file is generated using a UUID and written
    to the specified export folder.

    6. **Internal Update**: The generated file is attached to the Google SecOps case
    wall for immediate access and visibility.


    ### Additional Notes

    - The action supports multiple hash types (MD5, SHA1, SHA256) and automatically
    determines the correct OpenIOC term based on the string length.

    - If no supported entities are found in the scope, the action will complete without
    creating a file.
  capabilities:
