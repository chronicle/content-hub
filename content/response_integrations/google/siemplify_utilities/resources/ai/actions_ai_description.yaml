Filter JSON:
  ai_description: >-
    ### General Description

    Filters a JSON dictionary based on a specified condition and returns the filtered
    result or specific fields. This utility is designed to process complex JSON structures
    within a playbook, allowing for data pruning and extraction based on logical operators.
    It is particularly useful for handling large outputs from previous actions where
    only specific subsets of data are required for subsequent steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON Data | String | Yes | The JSON dictionary data to filter. |

    | Root Key Path | String | No | The path to the Root Key using dot notation (e.g.,
    `json.message.status`). This acts as a prefix for the condition and output paths.
    |

    | Condition Path | String | Yes | The dot-separated path to the field within the
    JSON that will be evaluated against the condition. |

    | Condition Operator | String | Yes | The logical operator to use for filtering.
    Supported values: `=`, `!=`, `>`, `<`, `>=`, `<=`, `in`, `not in`. |

    | Condition Value | String | Yes | The value to compare against the field identified
    by the Condition Path. |

    | Output Path | String | No | The dot-separated path to the specific data desired
    from the filtered dictionary. |

    | Delimeter | String | No | The character used to join multiple string results
    found at the Output Path. Defaults to a comma. |

    | Escape JSON Data Input | Boolean | No | When enabled (default), the action attempts
    to automatically fix unescaped quotes in the input JSON if initial parsing fails.
    |


    ### Additional Notes

    - The filtering logic performs string-based comparisons to avoid type mismatch
    issues during evaluation.

    - The system supports advanced path navigation using dot notation and wildcards
    (`*` for keys, `**` for recursive search across branches).


    ### Flow Description

    1. **JSON Parsing**: The action attempts to parse the `JSON Data` string into
    a Python dictionary. If parsing fails and `Escape JSON Data Input` is enabled,
    it applies a regex-based escaping logic to fix malformed quotes and retries the
    parse.

    2. **Path Normalization**: If a `Root Key Path` is provided, the action prepends
    it to both the `Condition Path` and the `Output Path` to create absolute paths
    within the JSON structure.

    3. **Recursive Filtering**: The action traverses the JSON object. It evaluates
    the specified condition against the data at the `Condition Path`. Any branches
    or list items that do not satisfy the condition are pruned from a copy of the
    original dictionary.

    4. **Data Extraction**: If an `Output Path` is specified, the action extracts
    the values from that specific location within the already filtered JSON.

    5. **Result Formatting**: If the extracted data consists of complex objects (dicts/lists),
    they are returned as a JSON string. If the data consists of simple strings, they
    are joined into a single string using the provided `Delimeter`.

    6. **Final Output**: The action returns the filtered JSON object as a JSON result
    and the formatted string as the main action output value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
