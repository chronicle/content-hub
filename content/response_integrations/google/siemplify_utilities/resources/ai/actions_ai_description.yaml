List Operations:
  ai_description: >-
    Performs logical set operations on two provided lists of strings. This utility
    action allows users to compare or combine data sets directly within a playbook
    flow without needing external scripts. It supports common set operations including
    intersection, union, subtraction, and symmetric difference (XOR).


    ### Flow Description:

    1. **Parameter Retrieval:** The action fetches the two input lists, the delimiter
    used to separate items, and the specific operator to apply.

    2. **List Parsing:** Input strings are split into Python lists based on the provided
    delimiter (defaulting to a comma).

    3. **Operation Execution:** The action invokes the `SiemplifyUtilitiesManager`
    to perform the selected mathematical set operation:
        * **Intersection:** Returns items present in both lists.
        * **Union:** Returns all unique items from both lists combined.
        * **Subtract:** Returns items from the first list that are not present in
    the second list.
        * **XOR:** Returns items present in either the first or second list, but not
    both.
    4. **Result Formatting:** The resulting list is joined back into a single string
    using the delimiter and returned alongside a count of the items.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | First List | String | Yes | The first collection of values, separated by the
    specified delimiter. |

    | Second List | String | Yes | The second collection of values, separated by the
    specified delimiter. |

    | Delimiter | String | No | The character or symbol used to split the input strings
    and join the output (default is `,`). |

    | Operator | String | Yes | The set operation to perform. Must be one of: `intersection`,
    `union`, `subtract`, or `xor`. |


    ### Additional Notes:

    * This action does not interact with any external APIs or Google SecOps entities;
    it is a pure data manipulation utility.

    * If the `Operator` provided does not match the supported list, the action will
    fail with a validation error.
