Count Entities In Scope:
  ai_description: >-
    ### General Description

    Counts the number of entities of a specific type within the current action scope.
    This is a utility action used to quantify specific types of evidence or targets
    present in a case, allowing playbooks to make decisions based on the volume of
    specific entity types.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Type | String | Yes | The specific type of entities to count (e.g., ADDRESS,
    HOSTNAME, FILEHASH). The action will iterate through the scope and only count
    entities that match this exact type string. |


    ### Flow Description

    1. **Retrieve Parameter**: The action retrieves the `Entity Type` parameter provided
    by the user.

    2. **Filter Entities**: It iterates through the `target_entities` list (the entities
    currently in the action's scope).

    3. **Type Matching**: For each entity, it checks if the `entity_type` attribute
    matches the user-provided parameter.

    4. **Calculate Count**: It calculates the total number of entities that passed
    the filter.

    5. **Return Result**: The action concludes by returning the count as the `list_count`
    result and providing a summary message to the case wall.
