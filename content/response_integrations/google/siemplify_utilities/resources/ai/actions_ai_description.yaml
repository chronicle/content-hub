Extract Top From JSON:
  ai_description: >-
    Processes and filters a JSON input to extract, sort, and return the top results
    based on a specific nested key. This utility action is designed to handle complex
    JSON structures, allowing for wildcard navigation through nested objects and arrays.
    It is particularly useful for parsing large datasets retrieved from previous playbook
    steps to identify the most relevant items (e.g., top 5 highest severity vulnerabilities
    or the most recent log entries).


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | JSON Data | String | Yes | The raw JSON string to be processed. |

    | Key To Sort By | String | Yes | The nested path to the field used for sorting.
    Use dots for nesting and `*` as a wildcard (e.g., `data.*.severity_score`). |

    | Field Type | String | Yes | The data type of the sorting field. Supported values:
    `int` (numeric), `string` (text), or `date`. |

    | Reverse (DESC -> ASC) | Boolean | No | If `true` (default), sorts in descending
    order (highest to lowest). If `false`, sorts in ascending order. |

    | Top Rows | String/Integer | No | The number of sorted branches to return. Defaults
    to 3 if not specified. |


    ### Flow Description

    1. **Data Parsing**: The action parses the provided `JSON Data` string into a
    Python dictionary.

    2. **Branch Extraction**: It uses the `Key To Sort By` (including wildcards) to
    traverse the JSON structure and identify all matching data branches.

    3. **Sorting**: The identified branches are sorted based on the value of the specified
    key, using the logic appropriate for the selected `Field Type` (numeric, alphabetical,
    or chronological).

    4. **Slicing**: The list is truncated to include only the number of items specified
    in `Top Rows`.

    5. **Output Generation**: Each resulting branch is added to the action's JSON
    results individually (labeled by branch number) and as a collective JSON array.
  capabilities:
