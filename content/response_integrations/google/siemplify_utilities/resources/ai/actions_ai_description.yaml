Query Joiner:
  ai_description: >-
    The Query Joiner action is a utility designed to construct formatted query strings
    based on user-provided parameters. It is primarily used to build complex search
    queries for SIEMs or log management systems by joining multiple values with a
    specific field and logical operator.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Values | String | Yes | A comma-separated list of values (e.g., '10.0.0.1,10.0.0.2')
    to be included in the query. |

    | Query Field | String | Yes | The target field name to apply to each value (e.g.,
    'SrcIP' or 'DestinationHost'). |

    | Query Operator | String | Yes | The logical operator used to join the field-value
    pairs (e.g., 'OR', 'AND'). |

    | Add Quotes | Boolean | No | If true, wraps each value in single quotes (').
    Default is False. |

    | Add Double Quotes | Boolean | No | If true, wraps each value in double quotes
    ("). Default is False. |


    ### Additional Notes

    - If both 'Add Quotes' and 'Add Double Quotes' are enabled, the action will wrap
    values in both (e.g., '"value"').

    - This action does not interact with external APIs or SecOps entities; it performs
    local string manipulation.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the list of values, the target
    field, the operator, and the quoting preferences from the input.

    2. **Value Processing:** It splits the 'Values' string into individual items.

    3. **Formatting:** For each value, it constructs a string in the format `Field=Value`,
    applying single or double quotes to the value as specified by the boolean flags.

    4. **Joining:** It joins all formatted strings using the provided 'Query Operator'
    (e.g., `Field='Val1' OR Field='Val2'`).

    5. **Output:** The final concatenated query string is returned as the action result.
