Parse EML to JSON:
  ai_description: >-
    ### General Description

    Parses EML or MSG email files into a structured JSON format. This utility action
    takes base64-encoded email content as input and extracts comprehensive metadata,
    including headers, body content (plain text and HTML), and attachments. It also
    performs recursive parsing of nested emails and extracts key indicators like domains,
    URLs, IP addresses, and email addresses. Users can filter specific headers using
    a blacklist or whitelist approach.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | EML Content | String | Yes | The base64 encoded content of the EML or MSG file
    to be parsed. |

    | Blacklisted Headers | String | No | A comma-separated list of email headers
    to be excluded from the final JSON output. |

    | Use Blacklist As Whitelist | Boolean | No | If set to true, the 'Blacklisted
    Headers' parameter will act as a whitelist, meaning only those headers will be
    included in the output. |


    ### Flow Description

    1. **Initialization**: Decodes the base64 input string provided in the 'EML Content'
    parameter.

    2. **Type Detection**: Identifies whether the content is an Outlook MSG file (OLE
    container) or a standard EML file.

    3. **Core Parsing**: Extracts email headers, body content (text/plain and text/html),
    and attachments.

    4. **Recursive Processing**: Iterates through attachments; if an attachment is
    another email (EML or MSG), it is parsed recursively to extract its content and
    metadata.

    5. **Indicator Extraction**: Scans the email bodies and nested emails to extract
    and deduplicate domains, URLs, IP addresses, and email addresses.

    6. **Header Filtering**: Applies filtering logic to the extracted headers based
    on the 'Blacklisted Headers' and 'Use Blacklist As Whitelist' parameters.

    7. **Output**: Returns the aggregated structured data as a JSON object to the
    SOAR platform.


    ### Additional Notes

    This action is a utility designed for data transformation and does not interact
    with external APIs or modify existing Google SecOps entities or cases.
