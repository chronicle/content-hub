Delete File:
  ai_description: >-
    ### General Description

    Deletes a specific file from the filesystem using its absolute path. This action
    is part of the Siemplify Utilities integration and is typically used for cleanup
    or remediation tasks where a malicious or temporary file needs to be removed from
    the environment where the runner is executing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The absolute filesystem path of the file to be deleted.
    The action will fail if a relative path is provided. |


    ### Additional Notes

    - The action requires the path to be absolute to prevent accidental deletions
    in unintended directories.

    - If the file does not exist at the provided path, the action completes successfully
    but reports a 'not found' status in the JSON result.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'File Path' from the action input.

    2. **Path Validation**: Converts the string to a path object and verifies if it
    is an absolute path. If not, it raises an error.

    3. **File Check**: Checks if a file exists at the specified location.

    4. **Deletion**: If the file exists, it is deleted using the `unlink()` method.

    5. **Result Reporting**: Returns a JSON object containing the file path and the
    execution status ('deleted' or 'not found').
