Scan Resources:
  ai_description: >-
    ### General Description

    Scans specified AWS resources using the AWS IAM Access Analyzer to identify potential
    access issues or policy misconfigurations.


    ### Flow Description

    1. Extracts configuration parameters (AWS credentials, region, analyzer name)
    and the `Resource ARNs` input.

    2. Initializes the `AWSIAMAnalyzerManager` to interact with the AWS IAM Access
    Analyzer service.

    3. If it's the first run, it iterates through the provided list of resource ARNs
    and calls `manager.start_resource_scan` for each.

    4. It tracks the status of these submissions, storing them in a JSON result object.

    5. In subsequent runs (asynchronous polling), it calls `manager.get_analyzed_resource`
    to check if the scan has completed by comparing the `analyzedAt_timestamp` with
    the action's starting time.

    6. Once all resources are processed or the maximum number of retries is reached,
    it returns the final status and results.


    ### Additional Notes

    This action is asynchronous and requires multiple runs to complete the polling
    process. It relies on the `AWSIAMAnalyzerManager` to communicate with AWS.
  ai_short_description: >-
    Scans specified AWS resources using AWS IAM Access Analyzer to identify access
    policy issues.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
