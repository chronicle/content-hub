Archive Finding:
  ai_description: >-
    ### General Description

    Archives a specific finding in AWS IAM Access Analyzer. This action updates the
    status of a finding to 'ARCHIVED' in the AWS IAM Access Analyzer service, effectively
    removing it from active monitoring or remediation workflows.


    ### Flow Description

    1. Initialize the `AWSIAMAnalyzerManager` using the provided AWS credentials (Access
    Key, Secret Key, Region) and the specified Analyzer Name.

    2. Retrieve the analyzer details from the AWS IAM Access Analyzer service using
    the `get_analyzer` method to obtain the required Analyzer ARN.

    3. Call the `archive_finding` method, passing the `Finding ID` and the retrieved
    Analyzer ARN to update the finding's status to 'ARCHIVED' in AWS.

    4. Return a success message indicating the finding has been archived.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to access
    and modify findings in the AWS IAM Access Analyzer service. The `Analyzer Name`
    must match the name configured in the integration settings.
  ai_short_description: >-
    Archives a specific finding in AWS IAM Access Analyzer by updating its status
    to 'ARCHIVED'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a finding to 'ARCHIVED' in AWS IAM Access Analyzer.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the analyzer configuration (GET request) and performs a state-changing
      operation (archive) on an external AWS resource (POST/PUT equivalent). It does
      not mutate internal SOAR data, update entities, create insights, or modify internal
      alert data.
