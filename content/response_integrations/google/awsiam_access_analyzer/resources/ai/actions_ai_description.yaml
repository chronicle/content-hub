Archive Finding:
  ai_description: >-
    ### General Description

    Archives a specific finding in AWS IAM Access Analyzer. This action initiates
    a state change on the external AWS service to update the finding's status to 'ARCHIVED'.


    ### Flow Description

    1. Initializes the AWS IAM Access Analyzer client using the provided AWS credentials
    and region.

    2. Retrieves the analyzer details to obtain its ARN.

    3. Sends a request to AWS IAM Access Analyzer to update the status of the specified
    finding ID to 'ARCHIVED'.

    4. Returns a success message if the finding is successfully archived, or an error
    message if the analyzer or finding is not found.


    ### Additional Notes

    Ensure that the provided AWS credentials have the necessary permissions to update
    findings in IAM Access Analyzer.
  ai_short_description: >-
    Archives a specific finding in AWS IAM Access Analyzer by updating its status
    to 'ARCHIVED'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a specific finding to 'ARCHIVED' in AWS IAM Access Analyzer.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a state-changing request (via boto3 `update_findings`) to AWS
      IAM Access Analyzer to change the status of a finding to 'ARCHIVED' (can_mutate_external_data=true).
      It does not fetch contextual data for enrichment, nor does it mutate internal
      SecOps data, update entities, or create insights.
