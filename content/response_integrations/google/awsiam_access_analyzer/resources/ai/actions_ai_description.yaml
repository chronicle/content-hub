Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AWS IAM Access Analyzer service using the provided credentials
    and configuration parameters. This action verifies that the integration is correctly
    configured and can successfully communicate with the AWS environment.


    ### Flow Description

    1. Extracts the required configuration parameters: `AWS Access Key ID`, `AWS Secret
    Key`, `AWS Default Region`, and `Analyzer Name` from the integration settings.

    2. Initializes the `AWSIAMAnalyzerManager` with the provided credentials and region.

    3. Executes the `test_connectivity` method, which performs an API call (`get_analyzer`)
    to the AWS IAM Access Analyzer service to validate the connection.

    4. Logs the outcome of the connection attempt.

    5. Terminates the action with a status (Completed or Failed) and an output message
    indicating the result of the connectivity test.


    ### Additional Notes

    This action is strictly for verifying integration connectivity and does not perform
    any data enrichment, modification, or entity processing.
