Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AWS IAM Access Analyzer service using the provided integration
    configuration parameters. This action ensures that the credentials and region
    settings are valid and that the SecOps platform can successfully communicate with
    the AWS API.


    ### Flow Description

    1. Extracts the AWS credentials, region, and Analyzer Name from the integration-level
    configuration.

    2. Initializes the AWS IAM Access Analyzer client.

    3. Executes a test connectivity API call (`get_analyzer`) to verify the connection
    to the specified analyzer.

    4. Returns a successful execution state if the connection is established, or a
    failure state if an error occurs.


    ### Additional Notes

    This action is strictly for diagnostic and configuration verification purposes.
    It does not interact with cases, alerts, or entities within the platform.
