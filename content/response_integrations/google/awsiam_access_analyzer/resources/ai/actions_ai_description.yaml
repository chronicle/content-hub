Scan Resources:
  ai_description: >-
    ### General Description

    Initiates a scan of specified AWS resources using AWS IAM Access Analyzer and
    retrieves the analysis results. This asynchronous action triggers a policy scan
    on the provided resource ARNs to determine if they grant public or cross-account
    access, returning the analyzed details once the scan completes.


    ### Flow Description

    1. Extracts the provided Resource ARNs and AWS configuration parameters.

    2. Retrieves the specified IAM Analyzer from AWS.

    3. Initiates a resource scan for each provided ARN by calling the AWS `start_resource_scan`
    API.

    4. Asynchronously polls the AWS `get_analyzed_resource` API to check the scan
    status.

    5. Once the `analyzedAt` timestamp indicates completion, retrieves and outputs
    the analyzed resource details (e.g., public status, owner account, resource type)
    as JSON results.


    ### Additional Notes

    The action runs asynchronously and will periodically retry fetching the scan results
    up to a maximum number of retries. If a resource scan does not complete within
    the retry limit, it will be marked as failed.
  ai_short_description: >-
    Initiates a policy scan on specified AWS resources using AWS IAM Access Analyzer
    and asynchronously retrieves the analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new policy scan on the specified AWS resources via the AWS IAM Access
      Analyzer API.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by triggering a new resource scan in AWS IAM
      Access Analyzer via the 'start_resource_scan' API call. It also fetches data
      by retrieving the scan results via the 'get_analyzed_resource' API call. It
      does not update entities, create insights, or modify internal case data.
