name: List Files
description: List available files in Microsoft Cloud App Security.
integration_identifier: Office365CloudAppSecurity
parameters:
-   name: Filter Key
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - ID
    - Filename
    - File Type
    - Share Status
    description: 'Specify the key that needs to be used to filter files. Possible
        values for "File Type": Other, Document, Spreadsheet, Presentation, Text,
        Image, Folder. Possible values for "Share Status": Public (Internet), Public,
        External, Internal, Private.'
    is_mandatory: false
-   name: Filter Logic
    default_value: Not Specified
    type: ddl
    optional_values:
    - Not Specified
    - Equal
    - Contains
    description: 'Specify what filter logic should be applied. Filtering logic is
        working based on the value  provided in the "Filter Key" parameter. Note:
        only File Name and ID work with Contains logic.'
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter. If "Equal" is selected,
        action will try to find the exact match among results and if "Contains" is
        selected, action will try to find results that contain that substring. If
        nothing is provided in this parameter, the filter will not be applied. Filtering
        logic is working based on the value  provided in the "Filter Key" parameter.
    is_mandatory: false
-   name: Max Records To Return
    default_value: 50
    type: string
    description: 'Specify how many records to return. If nothing is provided, action
        will return 50 records. Note: for contains logic, action will only look at
        1000 results for matching.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_files_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
