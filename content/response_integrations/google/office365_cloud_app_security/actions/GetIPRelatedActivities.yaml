name: Get IP related activities
description: The action is used to view activities related to an IP.
integration_identifier: Office365CloudAppSecurity
parameters:
-   name: Activity Display Limit
    default_value: ''
    type: string
    description: Limit on the number of activities to display
    is_mandatory: false
-   name: Product name
    default_value: ''
    type: string
    description: Product list where the user can select an app connected to cloudapp
        security to enable them to get IP related activities of a specific selected
        app. The product name is to be converted/mapped to the product code in the
        action filters. Eg. if  Office 365 is selected should be converted to 11161
    is_mandatory: false
-   name: Time Frame
    default_value: ''
    type: string
    description: Specify the value to fetch the number of activities that occurred
        according to the specified value of hours ago
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_ip_related_activities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
