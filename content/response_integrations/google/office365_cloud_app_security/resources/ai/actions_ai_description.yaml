Create IP Address Range:
  ai_description: >-
    ### General Description

    Creates a new IP address range within Microsoft Cloud App Security. This action
    allows administrators to define specific network ranges, categorize them (e.g.,
    Corporate, Risky, VPN), and apply tags for better visibility and policy enforcement
    within the Microsoft security ecosystem.


    ### Flow Description

    1. The action extracts the required parameters: Name, Category, Organization,
    Subnets, and Tags.

    2. It initializes the `Office365CloudAppSecurityManager` using the provided API
    credentials.

    3. The action converts the comma-separated Subnets and Tags strings into lists.

    4. It maps the provided Category string to the corresponding integer value required
    by the API.

    5. The action calls the `create_ip_address_range` method to send a POST request
    to the Microsoft Cloud App Security API to create the new range.

    6. Upon successful creation, it retrieves the newly created IP address range object
    using `get_ip_address_range` to verify and return the details.

    7. The resulting IP address range object is added to the action result JSON.


    ### Additional Notes

    This action performs a state-changing operation on the external Microsoft Cloud
    App Security platform. Ensure that the provided API token has the necessary permissions
    to manage IP address ranges.
