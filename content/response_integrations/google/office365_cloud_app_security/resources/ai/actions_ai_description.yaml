Add IP To IP Address Range:
  ai_description: >-
    ### General Description

    Adds specified IP Address entities to an existing IP address range in Microsoft
    Cloud App Security.


    ### Flow Description

    1. Retrieves the list of existing IP address ranges from Microsoft Cloud App Security.

    2. Finds the target IP address range by the provided name.

    3. Iterates through the target IP Address entities.

    4. Checks if the IP is already in the range; if not, updates the IP address range
    via the Microsoft Cloud App Security API to include the new IP.

    5. Returns the updated IP address range data as a JSON result.


    ### Additional Notes

    The action temporarily renames the IP address range during the update process
    to bypass potential API caching or naming conflicts, then restores the original
    name.
  ai_short_description: >-
    Adds specified IP Address entities to a designated IP address range in Microsoft
    Cloud App Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an IP address range in Microsoft Cloud App Security by adding new IP
      addresses to its subnets list.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing IP address ranges (GET/POST to list) and then mutates
      external data by updating the IP address range with new subnets (POST to update_rule).
      It does not mutate internal data, update entities, or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
