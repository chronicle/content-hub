Remove IP From IP Address Range:
  ai_description: >-
    ### General Description

    Removes a specified IP address from an existing IP address range within Microsoft
    Cloud App Security. This action is used to manage network definitions, effectively
    removing an IP from a trusted or defined network range.


    ### Flow Description

    1. The action extracts the required configuration parameters (portal URL, API
    token) and the action parameter 'Name' (the name of the IP address range to update).

    2. It retrieves the list of all IP address ranges from Microsoft Cloud App Security
    using the `get_ip_address_ranges` API call.

    3. It locates the specific IP address range by the provided name.

    4. The action iterates through the provided target entities, filtering for those
    of type 'ADDRESS'.

    5. For each valid entity, it removes the IP address from the range's subnet list.

    6. It performs an update on the IP address range in Microsoft Cloud App Security
    using the `update_ip_address_range` API call. Note: The action performs a two-step
    update (renaming to a temporary name and back to the original name) to ensure
    the API correctly processes the update.

    7. The action returns the updated IP address range details in the result JSON.


    ### Additional Notes

    - The action includes safety checks to prevent removing the last IP address from
    an IP address range, as at least one IP must remain in the range.

    - The action only supports exact matches for IP addresses within the range.
