Add IP To IP Address Range:
  ai_description: >-
    ### General Description

    Adds one or more IP address entities to a specified IP address range within Microsoft
    Cloud App Security. This action allows administrators to dynamically update defined
    IP ranges (e.g., for VPNs, corporate networks, or risky ranges) directly from
    the SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (Portal URL, API
    Token) and the target IP address range name from the action settings.

    2. It retrieves the list of existing IP address ranges from Microsoft Cloud App
    Security using the `get_ip_address_ranges` API call.

    3. It identifies the specific IP address range to update by matching the provided
    name.

    4. The action iterates through the provided IP address entities.

    5. For each entity, it checks if the IP address is already present in the target
    range's subnet list.

    6. If the IP is not present, it performs an update operation on the range in Microsoft
    Cloud App Security using the `update_ip_address_range` API call. The update is
    performed in a two-step process to ensure the range name is preserved.

    7. The action returns a summary of the operation, including which IPs were successfully
    added, which were already present, and any that failed to process.


    ### Additional Notes

    This action requires valid API credentials for Microsoft Cloud App Security. It
    specifically targets IP address entities and will skip any entities that are not
    of the 'ADDRESS' type.
  ai_short_description: >-
    Adds IP address entities to a specified IP address range in Microsoft Cloud App
    Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an existing IP address range in Microsoft Cloud App Security by adding
      the specified IP address(es) to its subnet list.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches IP address ranges to identify the target range (fetches_data=true)
      and performs a POST request to update the range in Microsoft Cloud App Security
      (can_mutate_external_data=true). It does not mutate internal SOAR data, update
      entities, create insights, or modify alerts.
