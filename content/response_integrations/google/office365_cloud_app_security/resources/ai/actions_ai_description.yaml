Bulk Resolve Alert:
  ai_description: >-
    ### General Description

    Resolves multiple alerts in Microsoft Cloud App Security by sending a bulk resolution
    request. This action allows analysts to mark one or more alerts as resolved in
    the external system, optionally providing a comment to document the resolution
    reason.


    ### Flow Description

    1. Extracts configuration parameters (`portal URL`, `API token`) and action parameters
    (`Alert ID`, `Comment`).

    2. Splits the provided comma-separated `Alert ID` string into a list of individual
    alert identifiers.

    3. Initializes the `Office365CloudAppSecurityManager` with the provided credentials.

    4. Calls the `bulk_resolve_alert` method, which performs a POST request to the
    Microsoft Cloud App Security API endpoint (`/api/v1/alerts/resolve/`) with the
    list of alert IDs and the optional resolution comment.

    5. Returns a success message upon completion or logs an error if the operation
    fails.


    ### Additional Notes

