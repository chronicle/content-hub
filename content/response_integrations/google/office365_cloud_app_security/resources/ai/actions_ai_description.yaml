Close Alert:
  ai_description: >-
    ### General Description

    Closes an alert in Microsoft Cloud App Security. This action allows analysts to
    update the state of an alert (e.g., True Positive, Benign, False Positive) and
    provide a reason and comment for the closure, which is then synchronized with
    the Microsoft Cloud App Security platform.


    ### Flow Description

    1. The action extracts the required configuration parameters, including the portal
    URL and API token, to establish a connection to the Microsoft Cloud App Security
    API.

    2. It extracts the action parameters: `Alert ID`, `Comment`, `State`, and `Reason`.

    3. The action validates the `Reason` parameter if the `State` is not set to "True
    Positive". If the `Reason` is invalid for the selected `State`, an exception is
    raised.

    4. The action calls the `close_alert` method in the `Office365CloudAppSecurityManager`
    class.

    5. The `close_alert` method performs a `POST` request to the Microsoft Cloud App
    Security API endpoint (`/api/v1/alerts/{alert_id}/`) to update the alert's state,
    reason, and comment.


    ### Additional Notes

    This action performs a state-changing operation on an external system (Microsoft
    Cloud App Security). The `Reason` parameter does not have an impact if the `State`
    is set to "True Positive".
  ai_short_description: >-
    Closes an alert in Microsoft Cloud App Security by updating its state, reason,
    and providing a comment.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
