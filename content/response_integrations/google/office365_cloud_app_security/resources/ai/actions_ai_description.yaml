Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities using information retrieved from Microsoft Cloud App Security.
    This action fetches contextual metadata for a user, such as their admin status,
    role, domain, and threat score, and updates the entity within the SOAR platform
    to provide analysts with better context during investigations.


    ### Flow Description

    1. Initialize the `Office365CloudAppSecurityManager` using the provided `portal
    URL` and `API token` configuration parameters.

    2. Iterate through the `target_entities` provided to the action.

    3. Filter the entities to process only those of type `USER`.

    4. For each valid user entity, call the `get_entity` method of the manager to
    retrieve user details from the Microsoft Cloud App Security API.

    5. Update the entity's `additional_properties` with the retrieved enrichment data
    and set the `is_enriched` flag to true.

    6. Generate a data table containing the user's details and add it to the action
    results.

    7. Update the entities in the SOAR platform with the new information.

    8. Add the full JSON response to the action results.


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any state-changing
    operations on external systems. It specifically targets User entities and will
    skip any entities that do not match the `USER` type.
  ai_short_description: >-
    Enriches User entities with contextual metadata retrieved from Microsoft Cloud
    App Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
