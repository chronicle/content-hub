  ai_description: >-
    ### General Description

    Resolves one or more alerts in Microsoft Office 365 Cloud App Security. Note:
    This action is deprecated; users should refer to the "Close Alert" action instead.


    ### Flow Description

    1. Extracts the provided `Alert ID` (which can be a comma-separated list) and
    an optional `Comment`.

    2. Parses the comma-separated string into a list of individual alert identifiers.

    3. Makes a POST request to the Microsoft Office 365 Cloud App Security API (`/api/v1/alerts/resolve/`)
    to resolve the specified alerts in bulk, appending the comment if provided.

    4. Returns a success message indicating the alerts were resolved.


