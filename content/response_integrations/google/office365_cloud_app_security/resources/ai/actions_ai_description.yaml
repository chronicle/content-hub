Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities using information from Microsoft Cloud App Security. This
    action retrieves contextual metadata for the specified users and updates the entities
    within the SecOps platform with the fetched details.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type User.

    3. For each User entity, makes an API call (`GET /api/v1/entities/`) to Microsoft
    Cloud App Security to fetch entity details.

    4. Enriches the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Generates a data table for the case wall and populates the JSON results with
    the entity data.

    6. Updates the successfully processed entities in the SecOps platform.


    ### Additional Notes

    Only User entities are supported by this action. Entities of other types will
    be skipped.
