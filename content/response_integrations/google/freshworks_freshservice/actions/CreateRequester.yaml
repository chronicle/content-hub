name: Create Requester
description: Create a new Freshservice requester. Note that action is not working
    on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#create_requester
integration_identifier: FreshworksFreshservice
parameters:
-   name: Email
    default_value: ''
    type: string
    description: Specify the email of the requester to create.
    is_mandatory: true
-   name: First Name
    default_value: ''
    type: string
    description: Specify the first name of the requester to create.
    is_mandatory: true
-   name: Last Name
    default_value: ''
    type: string
    description: Specify the last name of the requester to create.
    is_mandatory: false
-   name: Can See All Tickets From Associated Departments
    default_value: false
    type: boolean
    description: If enabled, requester will be able to see all tickets from associated
        departments.
    is_mandatory: false
-   name: Departments
    default_value: ''
    type: string
    description: Specify department names associated with the requester. Parameter
        accepts multiple values as a comma separated string.
    is_mandatory: false
-   name: Location
    default_value: ''
    type: string
    description: Specify location name associated with the requester.
    is_mandatory: false
-   name: Job Title
    default_value: ''
    type: string
    description: Specify requester job title.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object that contains custom fields to add to the
        requester. Action appends new custom fields to any existing for requester.
        Example format: {"key1":"value1","key2":"value2"}'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_requester_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
