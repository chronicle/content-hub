name: Add a Ticket Reply
description: Add a reply to a Freshservice ticket. Note that action is not working
    on Siemplify entities.
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify ticket ID to return conversations for.
    is_mandatory: true
-   name: Reply Text
    default_value: ''
    type: string
    description: Specify reply text to add to ticket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_ticket_reply_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
