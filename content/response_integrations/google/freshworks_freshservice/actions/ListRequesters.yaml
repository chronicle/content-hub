name: List Requesters
description: List requesters registered in Freshservice based on the specified search
    criteria. Note that action is not working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#list_requesters
integration_identifier: FreshworksFreshservice
parameters:
-   name: Requester Email
    default_value: ''
    type: string
    description: Specify the email address to return requester records for.
    is_mandatory: false
-   name: Rows per Page
    default_value: 30
    type: string
    description: Specify how many requester records should be returned per page for
        Freshservice pagination.
    is_mandatory: false
-   name: Start at Page
    default_value: 1
    type: string
    description: Specify starting from which page requester records should be returned
        with Freshservice pagination.
    is_mandatory: false
-   name: Max Rows to Return
    default_value: 30
    type: string
    description: Specify how many requester records action should return in total.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_requesters_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
