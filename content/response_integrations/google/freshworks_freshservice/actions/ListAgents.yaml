name: List Agents
description: List Freshservice agents based on the specified search criteria. Note
    that action is not working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#list_agents
integration_identifier: FreshworksFreshservice
parameters:
-   name: Agent Email
    default_value: ''
    type: string
    description: Specify the email address to return agent records for.
    is_mandatory: false
-   name: Agent State
    default_value: All
    type: ddl
    optional_values:
    - All
    - Fulltime
    - Occasional
    description: Specify agent states to return.
    is_mandatory: false
-   name: Include not Active Agents
    default_value: false
    type: boolean
    description: If enabled, results will include not active agent records.
    is_mandatory: false
-   name: Rows per Page
    default_value: 30
    type: string
    description: Specify how many agent records should be returned per page for Freshservice
        pagination.
    is_mandatory: false
-   name: Start at Page
    default_value: 1
    type: string
    description: Specify starting from which page agent records should be returned
        with Freshservice pagination
    is_mandatory: false
-   name: Max Rows to Return
    default_value: 30
    type: string
    description: Specify how many agent records action should return in total.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_agents_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
