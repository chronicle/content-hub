name: Create Agent
description: Create a new Freshservice Agent. Note that action is not working on Siemplify
    entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#create_agent
integration_identifier: FreshworksFreshservice
parameters:
-   name: Email
    default_value: ''
    type: string
    description: Specify the email of the agent to create.
    is_mandatory: true
-   name: First Name
    default_value: ''
    type: string
    description: Specify the first name of the agent to create.
    is_mandatory: true
-   name: Last Name
    default_value: ''
    type: string
    description: Specify the last name of the agent to create.
    is_mandatory: false
-   name: Is occasional
    default_value: false
    type: boolean
    description: If enabled, agent will be created as an occasional agent, otherwise
        full-time agent will be created.
    is_mandatory: false
-   name: Can See All Tickets From Associated Departments
    default_value: false
    type: boolean
    description: If enabled, agent will be able to see all tickets from Associated
        departments.
    is_mandatory: false
-   name: Departments
    default_value: ''
    type: string
    description: Specify department names associated with the agent. Parameter accepts
        multiple values as a comma separated string.
    is_mandatory: false
-   name: Location
    default_value: ''
    type: string
    description: Specify location name associated with the agent.
    is_mandatory: false
-   name: Group Memberships
    default_value: ''
    type: string
    description: Specify group names agent should be a member of.
    is_mandatory: false
-   name: Roles
    default_value: ''
    type: string
    description: 'Specify roles to add to agent. Parameter accepts multiple values
        as a comma separated string. Example: {''role_id'':17000023338,''assignment_scope'':
        ''entire_helpdesk''}'
    is_mandatory: true
-   name: Job Title
    default_value: ''
    type: string
    description: Specify agent job title.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object that contains custom fields to add to the
        agent. Action appends new custom fields to any existing for an agent. Example
        format: {"key1":"value1","key2":"value2"}'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_agent_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
