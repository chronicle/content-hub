name: Add a Ticket Note
description: Add a note to a Freshservice ticket. Note that action is not working
    on Siemplify entities.
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify ticket ID to return conversations for.
    is_mandatory: true
-   name: Note Type
    default_value: Private
    type: ddl
    optional_values:
    - Private
    - Public
    description: Specify the type of note action should add to the ticket.
    is_mandatory: false
-   name: Note Text
    default_value: ''
    type: string
    description: Specify note text to add to ticket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_ticket_note_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
