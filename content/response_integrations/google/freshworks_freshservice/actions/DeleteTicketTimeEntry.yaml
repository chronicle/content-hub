name: Delete Ticket Time Entry
description: Delete a time entry for a Freshservice ticket. Note that action is not
    working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#delete_ticket_time_entry
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify ticket ID to delete a time entry for.
    is_mandatory: true
-   name: Time Entry ID
    default_value: ''
    type: string
    description: Specify time entry ID to delete.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
