    ### General Description

    Adds a note (public or private) to a specified ticket in Freshservice. This action
    allows analysts to append information to existing tickets directly from the SOAR
    platform.


    ### Flow Description

    1. Extracts integration configuration parameters, including the API Root, API
    Key, and SSL verification setting.

    2. Extracts action parameters: Ticket ID, Note Type, and Note Text.

    3. Validates that the provided Ticket ID is a positive integer.

    4. Initializes the `FreshworksFreshserviceManager` to interact with the Freshservice
    API.

    5. Calls the `add_ticket_note` method, which performs a POST request to the Freshservice
    API endpoint `/api/v2/tickets/{ticket_id}/notes` with the provided note text and
    visibility setting (Private or Public).

    6. Returns the conversation details in the action result.


