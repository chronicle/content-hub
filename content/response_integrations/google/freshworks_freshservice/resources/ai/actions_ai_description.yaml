Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Freshservice. This action allows users to specify various
    ticket details such as subject, description, requester email, priority, urgency,
    impact, and tags. It also supports assigning the ticket to a specific agent, group,
    or department, adding custom fields, and uploading file attachments.


    ### Flow Description

    1. Validates the existence and size of any provided file attachments (total size
    must not exceed 15MB).

    2. If an agent email is provided, searches for the corresponding agent ID in Freshservice.

    3. If a group name is provided, searches for the corresponding group ID in Freshservice.

    4. If a department name is provided, searches for the corresponding department
    ID in Freshservice.

    5. Makes a POST request to the Freshservice API to create a new ticket with the
    specified parameters and attachments.

    6. Returns the created ticket details as a JSON result.


    ### Additional Notes

    As of now, the Freshservice API supports only the creation of tickets with the
    type "Incident". The ticket's priority is dynamically calculated according to
    the "Urgency" and "Impact" values, similar to the Freshservice UI.
  ai_short_description: >-
    Creates a new incident ticket in Freshservice with specified details, assignments,
    custom fields, and file attachments.
