    ### General Description

    Creates a new requester in Freshservice. This action initiates a state change
    on the external system by provisioning a new user/requester record with the specified
    details such as email, name, department, and location.


    ### Flow Description

    1. Extracts action parameters including email, first name, last name, departments,
    location, and custom fields.

