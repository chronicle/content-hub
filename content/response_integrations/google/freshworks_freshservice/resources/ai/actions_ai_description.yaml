Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Freshservice based on the provided input parameters.
    This action allows for the modification of various ticket fields, including status,
    priority, urgency, impact, subject, description, requester, and assignment details.
    It also supports replacing existing tags and adding file attachments to the ticket.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Key, SSL verification) and action parameters (Ticket ID, Status, Subject,
    Description, Requester Email, Agent/Group assignment, Priority, Urgency, Impact,
    Tags, Custom Fields, and File Attachments).

    2. **Validation**: The action validates that the provided `Ticket ID` is a positive
    number. If file attachments are provided, it verifies their existence on the local
    file system and ensures the total size does not exceed 15MB.

    3. **Lookup**: If an `Agent Assign To` or `Group Assign To` parameter is provided,
    the action performs a search (GET request) to retrieve the corresponding Agent
    ID or Group ID from Freshservice.

    4. **Update**: The action constructs the payload with the provided fields and
    performs a `PUT` request to the Freshservice API to update the specified ticket.

    5. **Result**: The updated ticket details are returned as a JSON result.


    ### Additional Notes

    - Due to Freshservice API limitations, providing new tags will replace all existing
    tags on the ticket rather than appending to them.

    - The total size of all file attachments must not exceed 15MB.
