  ai_description: >-
    Creates a new requester in Freshworks Freshservice. This action takes requester
    details such as email, first name, last name, job title, location, and departments,
    and creates a new requester record in the external system. It first resolves department
    and location names to their respective IDs by fetching them from Freshservice,
    and then performs a POST request to create the requester.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Email | string | True | Specify the email of the requester to create. |

    | First Name | string | True | Specify the first name of the requester to create.
    |

    | Last Name | string | False | Specify the last name of the requester to create.
    |

    | Can See All Tickets From Associated Departments | boolean | False | If enabled,
    requester will be able to see all tickets from associated departments. |

    | Departments | string | False | Specify department names associated with the
    requester. Parameter accepts multiple values as a comma separated string. |

    | Location | string | False | Specify location name associated with the requester.
    |

    | Job Title | string | False | Specify requester job title. |

    | Custom Fields | string | False | Specify a JSON object that contains custom
    fields to add to the requester. Action appends new custom fields to any existing
    for requester. Example format: {"key1":"value1","key2":"value2"} |


    ### Flow

    1. Retrieves configuration parameters and action parameters.

    2. If departments are provided, fetches all departments from Freshservice to map
    the provided names to their corresponding IDs.

    3. If a location is provided, fetches all locations from Freshservice to map the
    provided name to its corresponding ID.

    4. Calls the Freshservice API to create the requester with the provided details
    and resolved IDs.

    5. Returns a JSON result containing the created requester's details.
