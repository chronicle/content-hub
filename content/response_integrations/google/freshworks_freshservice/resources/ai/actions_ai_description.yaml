Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Freshservice based on the provided parameters. It
    allows modifying various fields such as status, subject, description, requester
    email, assigned agent, assigned group, priority, urgency, impact, tags, and custom
    fields. It also supports adding file attachments up to 15MB.


    ### Flow Description

    1. Extracts the provided action parameters, including the mandatory Ticket ID.

    2. Validates the existence and size of any provided file attachments (must not
    exceed 15MB).

    3. If an agent email or group name is provided, looks up their respective IDs
    in Freshservice via GET requests.

    4. Makes a PUT request to the Freshservice API to update the ticket with the specified
    fields and attachments.

    5. Returns the updated ticket details as a JSON result.


    ### Additional Notes

    Due to Freshservice API limitations, providing new tags replaces the existing
    tags rather than appending them. Custom fields, however, are appended to existing
    ones.
