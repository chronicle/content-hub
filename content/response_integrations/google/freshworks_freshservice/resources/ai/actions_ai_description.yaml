  ai_description: >-
    Adds a time entry to a specific Freshservice ticket.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Ticket ID | Integer | Yes | Specify ticket ID to add a time entry for. Must
    be a positive number. |

    | Agent Email | String | Yes | Specify agent email for whom to add a ticket time
    entry. |

    | Note | String | No | Specify a note to add to the ticket time entry. |

    | Time Spent | String | Yes | Specify time spent for ticket time entry. Format:
    {hh:mm}. |

    | Billable | Boolean | No | If enabled, ticket time entry will be marked as billable.
    |

    | Custom Fields | String | No | Specify a JSON object that contains custom fields
    to add to the ticket time entry. Action appends new custom fields to any existing
    for ticket time entry. Example format: `{"key1":"value1","key2":"value2"}` |


    ### Flow

    1. Retrieves the list of agents from Freshservice to map the provided Agent Email
    to an Agent ID.

    2. Sends a POST request to Freshservice to add a time entry to the specified Ticket
    ID with the provided details.

    3. Returns the created time entry data as a JSON result.
