Add Ticket Time Entry:
  ai_description: >-
    ### General Description

    Adds a time entry to a Freshservice ticket. This action allows users to log time
    spent on a specific ticket, specifying the agent, duration, billable status, and
    any additional notes or custom fields.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Key, Verify SSL)
    and action parameters (Ticket ID, Agent Email, Note, Time Spent, Billable, Custom
    Fields).

    2. The action initializes the `FreshworksFreshserviceManager` to interact with
    the Freshservice API.

    3. The action fetches the list of agents from Freshservice to validate that the
    provided `Agent Email` exists.

    4. If the agent is found, the action calls the `add_ticket_time_entry` method
    to create the time entry on the specified ticket.

    5. The result of the operation is added to the action results as a JSON object.


    ### Additional Notes

    This action does not operate on Siemplify entities. It requires a valid Ticket
    ID and Agent Email to function correctly.
