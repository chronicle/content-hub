    type 'Incident' and allows setting various properties such as subject, description,
    requester email, priority, urgency, impact, tags, custom fields, and attachments.
    It can also assign the ticket to a specific agent, group, or department by resolving
    their names to IDs.


    ### Flow Description

    1. Validates the provided file attachments for existence and size limits (max
    15MB).

    2. Parses tags and custom fields from the input parameters.

    3. Looks up the Agent ID, Group ID, and Department ID if their respective names/emails
    are provided.

    4. Sends a POST request to Freshservice to create the ticket with the specified
    parameters.

    5. Returns the created ticket details as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Subject | string | True | Specify subject field for created ticket. |

    | Description | string | True | Specify description field for created ticket.
    |

    | Requester Email | string | True | Specify requester email for created ticket.
    |

    | Agent Assign To | string | False | Specify the agent email to assign the ticket
    to. |

    | Group Assign To | string | False | Specify the group name to assign the ticket
    to. |

    | Department Name | string | False | Specify the name of the department for the
    ticket. This parameter is case sensitive. |

    | Priority | ddl | True | Specify priority to assign to the ticket. |

    | Urgency | ddl | False | Specify urgency to assign to the ticket. |

    | Impact | ddl | False | Specify impact to assign to the ticket. |

    | Tags | string | False | Specify tags to assign to the ticket. Parameter accepts
    multiple values as a comma separated string. |

    | Custom Fields | string | False | Specify a JSON object that contains custom
    fields to add to the ticket. |

    | File Attachments to Add | string | False | Specify the full path for the file
