Add a Ticket Note:
  ai_description: >-
    ### General Description

    Adds a note (either public or private) to a specific Freshservice ticket. This
    action interacts with the Freshservice API to append information to an existing
    ticket's conversation thread.


    ### Flow Description

    1. Extracts the `Ticket ID`, `Note Type`, and `Note Text` parameters.

    2. Validates that the provided `Ticket ID` is a positive integer.

    3. Makes a POST request to the Freshservice API (`/api/v2/tickets/{ticket_id}/notes`)
    to append the note to the specified ticket.

    4. Retrieves the newly created conversation object and attaches it to the action's
    JSON results.


    ### Additional Notes

    This action does not operate on Siemplify entities and relies solely on the provided
    Ticket ID.
