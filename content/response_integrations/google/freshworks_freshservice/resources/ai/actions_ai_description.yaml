Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new incident ticket in the Freshservice ticketing system. This action
    allows users to define ticket details such as subject, description, requester,
    and assignment information (agent, group, or department). It also supports adding
    custom fields, tags, and file attachments to the ticket.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Key, SSL verification) and action-specific parameters (Subject, Description,
    Requester Email, etc.).

    2. **Validation**: It validates the existence and total size (must not exceed
    15MB) of any provided file attachments.

    3. **Manager Initialization**: Initializes the `FreshworksFreshserviceManager`
    to interact with the Freshservice API.

    4. **Lookup Operations**: Performs lookups to retrieve internal IDs for the specified
    Agent, Group, and Department based on the provided names or emails.

    5. **Ticket Creation**: Calls the `create_ticket` method of the `FreshworksFreshserviceManager`
    to send a POST request to the Freshservice API with the ticket details.

    6. **Result Handling**: Adds the created ticket's JSON representation to the action
    results.


    ### Additional Notes

    - The action is specifically designed for creating 'Incident' type tickets.

    - Priority, Urgency, and Impact are mapped to numeric values as required by the
    Freshservice API.

    - If file attachments are provided, the action performs a check to ensure the
    total size does not exceed 15MB before attempting the API call.
  ai_short_description: >-
    Creates a new incident ticket in Freshservice, supporting custom fields, tags,
    and file attachments.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new ticket in the Freshservice ticketing system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (agent/group/department lookups) to prepare for ticket
      creation. It mutates external data by creating a new ticket in Freshservice.
      It does not mutate internal SecOps data, update entities, create insights, modify
      alerts, or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
