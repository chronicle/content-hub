Deactivate Agent:
  ai_description: >-
    ### General Description

    Deactivates a specific agent in Freshservice. This action allows administrators
    to revoke access for an agent by providing their unique Agent ID, effectively
    disabling their account within the Freshservice platform.


    ### Flow Description

    1. The action extracts the mandatory `Agent ID` parameter.

    2. It initializes the `FreshworksFreshserviceManager` using the provided integration
    configuration (API Root, API Key, and SSL verification settings).

    3. The action calls the `deactivate_agent` method of the manager, which executes
    a `DELETE` request to the Freshservice API endpoint `/api/v2/agents/{agent_id}`.

    4. Upon successful deactivation, the action returns the deactivated agent's details
    as a JSON result.

    5. If the agent is not found or authorization fails, the action logs the error
    and terminates with an appropriate message.


