  ai_description: >-
    Creates a new agent in Freshservice.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Email | String | Yes | Specify the email of the agent to create. |

    | First Name | String | Yes | Specify the first name of the agent to create. |

    | Last Name | String | No | Specify the last name of the agent to create. |

    | Is occasional | Boolean | No | If enabled, agent will be created as an occasional
    agent, otherwise full-time agent will be created. |

    | Can See All Tickets From Associated Departments | Boolean | No | If enabled,
    agent will be able to see all tickets from Associated departments. |

    | Departments | String | No | Specify department names associated with the agent.
    Parameter accepts multiple values as a comma separated string. |

    | Location | String | No | Specify location name associated with the agent. |

    | Group Memberships | String | No | Specify group names agent should be a member
    of. |

    | Roles | String | Yes | Specify roles to add to agent. Note: The code expects
    a valid JSON string or array of JSON objects, e.g., `[{"role_id":17000023338,"assignment_scope":
    "entire_helpdesk"}]`. |

    | Job Title | String | No | Specify agent job title. |

    | Custom Fields | String | No | Specify a JSON object that contains custom fields
    to add to the agent. Action appends new custom fields to any existing for an agent.
    Example format: `{"key1":"value1","key2":"value2"}` |


    ### Flow

    1. Extracts configuration and action parameters.

    2. Parses the provided departments, group memberships, custom fields, and roles.

    3. Fetches agent groups, departments, and locations from Freshservice to map the
    provided names to their respective IDs.

    4. Sends a request to Freshservice to create a new agent with the provided details
    and mapped IDs.

    5. Returns the created agent's details as a JSON result.
