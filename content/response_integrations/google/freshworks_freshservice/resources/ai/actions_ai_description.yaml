    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new ticket in the Freshservice ITSM platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Freshservice API to create a ticket,
      which mutates external data. It does not fetch contextual data for entities,
