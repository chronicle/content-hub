Create Agent:
  ai_description: >-
    ### General Description

    Creates a new agent in Freshworks Freshservice. This action allows users to provision
    a new agent profile by specifying details such as email, name, roles, departments,
    and group memberships.


    ### Flow Description

    1. Extracts the provided action parameters including the agent's email, name,
    roles, and optional attributes like departments and group memberships.

    2. If department names, group memberships, or a location name are provided, the
    action makes GET requests to the Freshservice API to resolve these names into
    their corresponding internal IDs.

    3. Makes a POST request to the Freshservice API (`/api/v2/agents`) to create the
    new agent with the compiled payload.

    4. Returns the newly created agent's details as a JSON result.


    ### Additional Notes

    This action does not operate on Siemplify entities. The `Roles` parameter requires
    a specific JSON string format as defined in the parameter description.
