Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Freshservice instance using the provided integration
    configuration parameters. This action ensures that the API Root, API Key, and
    SSL settings are correctly configured and that the SecOps platform can successfully
    communicate with the Freshservice API.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Root, API Key,
    Verify SSL).

    2. Initializes the `FreshworksFreshserviceManager` with a flag to force a connectivity
    test.

    3. The manager executes an HTTP GET request to the `/api/v2/tickets` endpoint
    (fetching a single item) to verify authentication and network access.

    4. Evaluates the HTTP response and returns a successful execution state if the
    connection is established, or a failed state with the error details if it fails.


