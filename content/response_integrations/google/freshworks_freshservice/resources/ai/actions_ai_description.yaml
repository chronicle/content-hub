Add Ticket Time Entry:
  ai_description: >-
    ### General Description

    Adds a time entry to a specific ticket in Freshservice. This action allows analysts
    to log time spent on a ticket directly from the SOAR platform, specifying the
    agent, time spent, billable status, and additional notes.


    ### Flow Description

    1. Retrieves the list of agents from Freshservice to map the provided Agent Email
    to an Agent ID.

    2. Validates the provided Ticket ID and Custom Fields.

    3. Makes an API call to Freshservice to add a time entry to the specified ticket
    using the mapped Agent ID and other provided parameters.

    4. Returns the created time entry details as a JSON result.


    ### Additional Notes

    - This action does not operate on Siemplify entities.

    - The "Time Spent" parameter must be in the "hh:mm" format.
  ai_short_description: >-
    Adds a time entry to a specific ticket in Freshservice, logging the time spent
    by an agent.
