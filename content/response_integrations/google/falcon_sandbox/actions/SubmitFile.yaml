name: Submit File
description: Submit files for analysis
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/falcon-sandbox#submit_file
integration_identifier: FalconSandbox
parameters:
-   name: File Path
    default_value: ''
    type: string
    description: The full path of the file to analyze. For multiple, use comma separated
        values.
    is_mandatory: true
-   name: Environment
    default_value: Linux (Ubuntu 16.04, 64 bit)
    type: ddl
    optional_values:
    - Linux (Ubuntu 16.04, 64 bit)
    - Android Static Analysis
    - Windows 7 64 bit
    - Windows 7 32 bit (HWP Support)
    - Windows 7 32 bit
    description: The environment to use for the scan.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/submit_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
