name: Analyze File
description: Submit a file for analysis and fetch report
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/falcon-sandbox#analyze_file
integration_identifier: FalconSandbox
parameters:
-   name: File Path
    default_value: ''
    type: string
    description: The full path of the file to analyze
    is_mandatory: true
-   name: Environment
    default_value: ''
    type: string
    description: Environment ID. e.g. 100 (100=Windows 7 32 bit)
    is_mandatory: true
-   name: Include Report
    default_value: 'true'
    type: boolean
    description: 'If enabled, action will fetch report related to the attachment.
        Note: this feature requires a premium key.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/analyze_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities":[]}'
script_result_name: max_threat_score
