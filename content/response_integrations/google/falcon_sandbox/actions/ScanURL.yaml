name: Scan URL
description: Scan URL/domain for analysis.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/falcon-sandbox#scan_url
integration_identifier: FalconSandbox
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: Mark entity as suspicious if number of av detection is equal or above
        the given threshold
    is_mandatory: true
-   name: Environment
    default_value: Linux (Ubuntu 16.04, 64 bit)
    type: ddl
    optional_values:
    - Linux (Ubuntu 16.04, 64 bit)
    - Android Static Analysis
    - Windows 7 64 bit
    - Windows 7 32 bit (HWP Support)
    - Windows 7 32 bit
    description: The environment to use for the scan.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/scan_url_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL"]}'
