Search:
  ai_description: >-
    ### General Description

    Searches the Falcon Sandbox database for existing scan reports and information
    about files and URLs based on user-provided criteria. This action allows analysts
    to query historical analysis data without performing new scans.


    ### Flow Description

    1. Initialize `SiemplifyAction` and retrieve configuration (API Root, API Key).

    2. Retrieve search parameters (e.g., File Name, Verdict, Host, Domain) from the
    action parameters.

    3. Initialize `FalconSandboxManager` with the API credentials.

    4. Call `falcon_manager.search` with the provided parameters, which sends a POST
    request to the Falcon Sandbox API (`/search/terms`).

    5. If results are found, flatten the JSON results, construct a CSV table, and
    add it to the action results.

    6. Add the raw JSON results to the action result.

    7. End the action with a summary message indicating the number of results found.


    ### Additional Notes

    This action is a read-only operation and does not modify any external or internal
    data.
