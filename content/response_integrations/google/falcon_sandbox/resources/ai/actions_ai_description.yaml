Get Hash Scan Report:
  ai_description: >-
    ### General Description

    Fetches hybrid analysis reports from Falcon Sandbox for File Hash entities and
    enriches them with the scan results. It retrieves threat scores, verdicts, and
    other analysis details across multiple sandbox environments.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. For each File Hash, iterates through available Falcon Sandbox environments
    (e.g., Windows 7, Linux, Android).

    3. Makes an API call to Falcon Sandbox to fetch scan information for the hash
    in the specific environment.

    4. Extracts relevant threat intelligence data (e.g., threat score, verdict, AV
    detection) and updates the entity's additional properties.

    5. Makes another API call to fetch the MISP report for the hash and attaches it
    to the entity.

    6. If the maximum threat score across all reports exceeds the configured threshold,
    marks the entity as suspicious.

    7. Updates the entities in the SecOps platform with the enriched data.


    ### Additional Notes

    The action requires the Falcon Sandbox integration to be configured with a valid
    API key and threshold. It will attempt to fetch reports for all supported environments
    and aggregate the results.
