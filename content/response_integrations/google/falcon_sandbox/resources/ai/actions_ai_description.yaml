Analyze File:
  ai_description: >-
    ### General Description

    Submits a file to Falcon Sandbox for analysis and retrieves the resulting threat
    report. This action allows for automated file analysis within specific environments,
    providing threat scores and detailed scan reports.


    ### Flow Description

    1. Extracts configuration (API Root, API Key) and action parameters (File Path,
    Environment, Include Report).

    2. Submits the file to Falcon Sandbox using `submit_file` (POST request).

    3. Checks the job status using `get_job_state` (GET request).

    4. If the job is complete, retrieves scan information using `get_scan_info` (GET/POST
    requests).

    5. Calculates the maximum threat score from the scan results.

    6. Adds the scan report as a JSON result to the action output.

    7. If `Include Report` is enabled, downloads the MISP report using `get_report`
    (GET request) and attaches it to the action.


    ### Additional Notes

    This action is asynchronous and may require multiple runs to complete. It supports
    environment-specific analysis.
  ai_short_description: >-
    Submits a file to Falcon Sandbox for analysis, retrieves the threat report, and
    calculates the maximum threat score.
