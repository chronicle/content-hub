    checking the job status. Once completed, it retrieves the scan reports and MISP
    reports.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | Marks the entity as suspicious if the number of
    AV detections is equal to or above this threshold. |

    | Environment | String | Yes | The environment to use for the scan (e.g., Linux,
    Windows, Android). |


