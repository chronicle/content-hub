Get Hash Scan Report:
  ai_description: >-
    ### General Description

    Enriches file hash entities by querying the Falcon Sandbox (Hybrid Analysis) platform
    for scan reports. This action retrieves comprehensive threat intelligence, including
    threat scores, verdicts, and malware family information, across multiple supported
    environments to provide context for file-based threats.


    ### Flow Description

    1. The action initializes by retrieving the required configuration parameters:
    API Root, API Key, and the threat score Threshold.

    2. It iterates through the provided target entities, filtering specifically for
    those with the type `FILEHASH`.

    3. For each valid file hash, the action queries the Falcon Sandbox API across
    multiple predefined environments (e.g., Windows, Linux, Android) to retrieve scan
    information.

    4. If scan reports are found, the action:
       - Extracts relevant threat intelligence data (e.g., threat score, verdict,
    family).
       - Updates the entity's `additional_properties` with the retrieved data.
       - Attaches the full report to the entity as an attachment.
       - Aggregates the maximum threat score found across all environments.
    5. If the maximum threat score meets or exceeds the configured threshold, the
    entity is marked as suspicious.

    6. Finally, the action updates the entities within the SOAR platform and returns
    the aggregated results as a JSON object.


    ### Additional Notes

    This action performs read-only operations (GET requests) against the Falcon Sandbox
    API. It does not modify any external system state. It performs internal mutations
    by updating entity metadata and attaching reports to entities within the SOAR
    platform.
