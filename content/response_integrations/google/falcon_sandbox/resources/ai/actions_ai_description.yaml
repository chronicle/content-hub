  ai_description: >-
    Submits a file to Falcon Sandbox for analysis and fetches the resulting report.
    The action uploads the file, waits for the analysis job to complete, and then
    retrieves the scan information and threat score.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Path | string | True | The full path of the file to analyze. |

    | Environment | string | True | Environment ID. e.g. 100 (100=Windows 7 32 bit).
    |

    | Include Report | boolean | False | If enabled, action will fetch report related
    to the attachment. Note: this feature requires a premium key. |


    ### Flow

    1. Submits the specified file to Falcon Sandbox for analysis.

    2. Monitors the job state until the analysis is completed.

    3. Retrieves the scan information and calculates the maximum threat score.

    4. Attaches the JSON report and optionally the MISP report to the action results.
