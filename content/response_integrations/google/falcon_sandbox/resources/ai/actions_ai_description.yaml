Submit File:
  ai_description: >-
    **General Description**

    Submits one or more files to Falcon Sandbox for malware analysis within a specified
    environment.


    **Flow Description**

    1. Extracts the file paths and the target environment from the action parameters.

    2. Maps the environment name to its corresponding Falcon Sandbox environment ID.

    3. Iterates through the provided file paths.

    4. For each file, makes a POST request to the Falcon Sandbox API (`/submit/file`)
    to upload the file for analysis.

    5. Collects the resulting job ID and SHA256 hash for each successfully submitted
    file.

    6. Returns the results as a JSON object.


    **Additional Notes**

    Multiple file paths can be provided as a comma-separated list.
