  ai_description: >-
    Waits for a Falcon Sandbox scan job to complete and fetches the corresponding
    scan report. The action queries the status of the provided Job IDs. If the jobs
    are completed, it retrieves the scan information and the MISP report, attaching
    the MISP report to the action results and returning the scan details as JSON.
    If the jobs are still in progress, the action will wait and retry.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Job ID | String | Yes | The job ID to fetch the report for. For multiple, use
    comma-separated values. |


    ### Flow

    1. Queries the status of the provided Job IDs in Falcon Sandbox.

    2. Checks if the jobs and any related jobs have completed.

    3. If completed, fetches the scan reports for the successful jobs.

    4. Fetches the MISP report for each completed job and attaches it to the action
    results.

    5. Returns the scan information as JSON results.
