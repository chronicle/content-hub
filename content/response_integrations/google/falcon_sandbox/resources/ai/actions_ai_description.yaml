Scan URL:
  ai_description: >-
    ### General Description

    Scans URL or Hostname entities using Falcon Sandbox to retrieve threat intelligence
    and analysis reports. This action submits the target entities for sandbox analysis,
    monitors the job status asynchronously, and fetches the resulting reports, including
    MISP reports, once analysis is complete. It evaluates the AV detection rate against
    a configurable threshold to determine if an entity should be marked as suspicious.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API Root,
    API Key) and action parameters (Threshold, Environment) to initialize the `FalconSandboxManager`.

    2. **Submission**: The action iterates through the target URL and Hostname entities.
    For each supported entity, it calls the `submit_url` method of the `FalconSandboxManager`
    to initiate an analysis job in Falcon Sandbox.

    3. **Asynchronous Monitoring**: The action runs in an asynchronous loop. It checks
    the status of submitted jobs using `get_job_state`. If jobs are still in progress,
    it returns an `EXECUTION_STATE_INPROGRESS` status.

    4. **Report Retrieval**: Once all jobs are completed, the action fetches the scan
    reports using `get_scan_info_by_job_id` and MISP reports using `get_report_by_job_id`.

    5. **Enrichment & Insight Generation**: For each report, the action checks the
    AV detection rate. If it meets or exceeds the configured `Threshold`, the entity
    is marked as suspicious (`is_suspicious = True`), and an insight is added to the
    entity using `add_entity_insight`.

    6. **Finalization**: The action attaches the MISP report to the entity, updates
    the entity metadata using `update_entities`, and returns the final result JSON.


    ### Additional Notes

    This action is asynchronous and requires multiple runs to complete. It supports
    URL and Hostname entities. If a MISP report cannot be fetched, the action still
    attempts to process the scan report.
  ai_short_description: >-
    Scans URL or Hostname entities using Falcon Sandbox to retrieve threat intelligence
    and analysis reports, marking entities as suspicious based on a configurable AV
    detection threshold.
