  ai_description: >-
    Enriches File Hash entities using Falcon Sandbox (Hybrid Analysis). It retrieves
    scan reports and threat intelligence for the hashes across multiple environments,
    attaching the results and updating the entity's properties.


    ### Parameters

    There are no action-specific parameters for this action. However, it relies on
    the `Threshold` parameter configured in the integration settings (expected type:
    float) to determine if an entity should be marked as suspicious based on the maximum
    threat score received.


    ### Action Flow

    1. Iterates over the target entities and filters for those of type `FILEHASH`.

    2. For each valid hash, iterates over available Falcon Sandbox environments and
    fetches scan reports.

    3. Attaches the raw JSON report and MISP report to the entity in the case wall.

    4. Enriches the entity's additional properties with specific report details such
    as threat score, vx_family, and verdict.

    5. Evaluates the maximum threat score across all reports against the configured
    threshold; if it meets or exceeds the threshold, the entity is marked as suspicious.

    6. Updates the enriched entities within Google SecOps.
