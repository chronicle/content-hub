Submit File:
  ai_description: >-
    ### General Description

    Submits one or more files to Falcon Sandbox for automated malware analysis. This
    action allows analysts to trigger sandbox execution for suspicious files, providing
    a job ID and file hash upon successful submission.


    ### Flow Description

    1. The action extracts the `File Path` and `Environment` parameters from the action
    configuration.

    2. It initializes the `FalconSandboxManager` using the integration's API credentials.

    3. The action iterates through the provided file paths (comma-separated).

    4. For each file, it calls the `submit_file` API endpoint of Falcon Sandbox, passing
    the selected environment ID.

    5. Upon a successful API response, the action collects the `job_id` and `sha256`
    hash for the submitted file.

    6. Finally, the action adds the collected results to the action's JSON output
    and completes the execution.


    ### Additional Notes

    The action requires the file to be accessible at the provided path. The `Environment`
    parameter determines the operating system or analysis configuration used by the
    sandbox.
