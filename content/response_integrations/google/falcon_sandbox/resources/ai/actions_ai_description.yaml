Analyze File Url:
  ai_description: >-
    ### General Description

    Submits a file via URL to Falcon Sandbox for automated malware analysis and retrieves
    the resulting threat report. This action initiates a sandbox analysis job, monitors
    its progress, and provides detailed threat intelligence, including threat scores
    and forensic reports, once the analysis is complete.


    ### Flow Description

    1. **Initialization**: Connects to the Falcon Sandbox API using the configured
    credentials.

    2. **Submission**: Submits the provided file URL and environment ID to Falcon
    Sandbox to initiate an analysis job (`submit_file_by_url`).

    3. **Status Check**: Checks the status of the analysis job (`is_job_completed`).

    4. **Report Retrieval**: If the job is completed:
        * Fetches scan information (`get_scan_info`).
        * Retrieves the MISP report (`get_report`).
        * Attaches the JSON report and MISP report to the case.
        * Returns the maximum threat score.
    5. **Async Handling**: If the job is still in progress, the action returns an
    'In Progress' state to allow for later polling.


    ### Additional Notes

    This action supports asynchronous execution. If the analysis job is not finished
    upon the initial request, it will return an 'In Progress' status, allowing the
    SOAR platform to re-trigger the action later to check for completion.
