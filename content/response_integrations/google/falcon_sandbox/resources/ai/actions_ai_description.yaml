    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties with enrichment data, marks entities as suspicious
      based on a threshold, and attaches JSON and MISP reports to the entities.
    reasoning: >-
      The action fetches scan reports from Falcon Sandbox (fetches_data=true). It
      does not modify any data in Falcon Sandbox (can_mutate_external_data=false).
      It updates the entities in Google SecOps with the fetched data and attaches
      reports (can_mutate_internal_data=true, can_update_entities=true). It does not
      create insights, modify alert data, or create case comments.
  categories:
