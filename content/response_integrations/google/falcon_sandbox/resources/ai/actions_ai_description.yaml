Analyze File:
  ai_description: >-
    ### General Description

    Submits a file to Falcon Sandbox for analysis and retrieves the resulting threat
    report and score. This action allows analysts to detonate suspicious files in
    a specific sandbox environment and review the behavioral analysis results directly
    within the SecOps platform.


    ### Flow Description

    1. Extracts the `File Path`, `Environment`, and `Include Report` parameters from
    the action configuration.

    2. Makes a POST request to the Falcon Sandbox API (`/submit/file`) to upload the
    file and initiate the analysis job.

    3. Operates asynchronously, periodically making GET requests to the API (`/report/{job_id}/state`)
    to check the status of the analysis job.

    4. Once the job is completed, makes a request to fetch the scan information and
    the maximum threat score.

    5. If the `Include Report` parameter is enabled, makes an additional GET request
    to download the MISP report.

    6. Attaches the JSON scan information and the MISP report (if applicable) to the
    action results.


    ### Additional Notes

    This is an asynchronous action. Fetching the MISP report requires a premium API
    key for Falcon Sandbox. If the provided file is an archive or container, the action
    will attempt to fetch the child report of the embedded files.
  ai_short_description: >-
    Submits a file to Falcon Sandbox for analysis and retrieves the resulting threat
    report and score.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Falcon Sandbox for analysis, creating a new analysis job
      in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving the scan report and job state from Falcon
      Sandbox. It mutates external data by submitting a new file for analysis via
      a POST request, which creates a new job in the sandbox. It does not mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
  entity_usage:
