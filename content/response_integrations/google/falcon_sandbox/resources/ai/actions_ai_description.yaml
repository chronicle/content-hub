    1. Filters the target entities to include only URLs and Hostnames.

    2. Submits each valid entity to Falcon Sandbox for analysis, creating an analysis
    job.

    3. Asynchronously polls the status of the submitted jobs.

    4. Upon completion, fetches the scan summary and MISP report for each job.

    5. Evaluates the AV detection rate against the provided threshold; if it meets
    or exceeds the threshold, marks the entity as suspicious and enriched, and creates
    an insight.

    6. Attaches the MISP report to the entity and updates the entity in the case.
