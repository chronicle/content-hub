Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Falcon Sandbox API to ensure the integration is configured
    correctly and the service is reachable. This action verifies the provided API
    credentials by attempting to access the Falcon Sandbox service.


    ### Flow Description

    1. The action retrieves the 'Api Root' and 'Api Key' from the Falcon Sandbox integration
    configuration.

    2. It initializes the `FalconSandboxManager` using the retrieved credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the `/key/current` endpoint of the Falcon Sandbox API.

    4. The response is validated to ensure the API key is authorized and the service
    is responsive.

    5. Upon successful validation, the action terminates and returns a success message.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment, entity modification, or external system mutation.
