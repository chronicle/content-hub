Wait For Job and Fetch Report:
  ai_description: >-
    ### General Description

    This action monitors the status of one or more Falcon Sandbox scan jobs. It waits
    for the jobs to complete, retrieves the scan summary, and downloads the associated
    MISP report as an attachment to the case.


    ### Flow Description

    1. Extracts the `Job ID` parameter, which may contain multiple comma-separated
    job IDs.

    2. Initializes the `FalconSandboxManager` using the provided API configuration.

    3. Iterates through the provided job IDs and queries their status using the `get_job_state`
    API call.

    4. If any job is still in progress, the action terminates with an `IN_PROGRESS`
    state to allow for asynchronous polling.

    5. If jobs are completed, it fetches the scan summary using `get_scan_info_by_job_id`.

    6. For each successful job, it attempts to download the MISP report using `get_report_by_job_id`
    and attaches it to the case using `siemplify.result.add_attachment`.

    7. Finally, it adds the aggregated scan results as a JSON object to the action
    results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is designed to be used in an asynchronous workflow where it can be
    re-run until the jobs are completed. If a job fails or a report cannot be retrieved,
    the action will report the failure in the output message.
