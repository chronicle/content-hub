Wait For Job and Fetch Report:
  ai_description: >-
    ### General Description

    Waits for a specified Falcon Sandbox scan job to complete and fetches the resulting
    scan report. This action is designed to run asynchronously, checking the status
    of the provided jobs and retrieving their analysis results once they finish.


    ### Flow Description

    1. Retrieves the provided `Job ID`s from the action parameters.

    2. Queries the Falcon Sandbox API (`GET /report/{job_id}/state`) to check the
    status of each job and any related jobs.

    3. If any job is still in progress or in the queue, the action returns an in-progress
    status to wait for completion.

    4. Once all jobs are completed, fetches the scan reports (`POST /report/summary`)
    and MISP reports (`GET /report/{job_id}/report/misp`) for the successful jobs.

    5. Attaches the MISP reports to the case and returns the scan information as JSON
    results.


    ### Additional Notes

    Supports multiple comma-separated Job IDs. If related jobs are found for a given
    job ID, the action will also wait for those related jobs to complete before fetching
    the reports.
  ai_short_description: >-
    Waits for Falcon Sandbox scan jobs to complete, fetches their scan reports, and
