Scan URL:
  ai_description: >-
    ### General Description

    Submits URL and Hostname entities to Falcon Sandbox for analysis and retrieves
    the resulting threat reports. This asynchronous action evaluates the AV detection
    rate against a configured threshold, marks malicious entities as suspicious, and
    attaches the detailed MISP report to the entities in the SecOps platform.


    ### Flow Description

    1. Iterates through the target entities and filters for `URL` and `Hostname` entity
    types.

    2. Submits each valid entity to Falcon Sandbox for analysis via a POST request
    to the `/submit/url` endpoint.

    3. Periodically polls the status of the analysis jobs to check for completion.

    4. Once a job is completed, fetches the scan summary and the MISP report for the
    analyzed entity.

    5. If the AV detection rate meets or exceeds the configured `Threshold`, marks
    the entity as suspicious and enriched, and creates an insight with the detection
    details.

    6. Attaches the fetched MISP report to the entity and updates the entities in
    the SecOps platform.

    7. Returns a JSON result containing the scan reports.


    ### Additional Notes

    - This is an asynchronous action that will run in the background until the sandbox
    analysis is complete.

    - Entities that are not of type `URL` or `Hostname` will be skipped.
