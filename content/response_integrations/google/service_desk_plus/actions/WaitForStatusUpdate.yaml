name: Wait For Status Update
description: Wait for the status of a request ot update to a desired status.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus#wait_for_status_update
integration_identifier: ServiceDeskPlus
parameters:
-   name: Request ID
    type: string
    description: The ID of the request.
    is_mandatory: true
-   name: Statuses
    type: string
    description: Desired request statuses, comma separated.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
is_async: true
script_result_name: new_status
