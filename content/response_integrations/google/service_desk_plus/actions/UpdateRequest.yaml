-   name: Mode
    default_value: ''
    type: string
    description: The mode of the request.
    is_mandatory: false
-   name: Level
    default_value: ''
    type: string
    description: The level of the request.
    is_mandatory: false
-   name: Site
    default_value: ''
    type: string
    description: The site of the request.
    is_mandatory: false
-   name: Group
    default_value: ''
    type: string
    description: The group of the request.
    is_mandatory: false
-   name: Impact
    default_value: ''
    type: string
    description: The impact of the request.
    is_mandatory: false
