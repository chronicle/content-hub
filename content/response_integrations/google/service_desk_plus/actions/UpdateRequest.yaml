name: Update Request
description: Update a request
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus#update_request
integration_identifier: ServiceDeskPlus
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The id of the request to update.
    is_mandatory: true
-   name: Requester
    default_value: ''
    type: string
    description: The requester of the request. If not specified, set to the user of
        the API key.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: The description of the request.
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: The status of the request.
    is_mandatory: false
-   name: Technician
    default_value: ''
    type: string
    description: The name of the technician assigned to the request.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: The priority of the request.
    is_mandatory: false
-   name: Urgency
    default_value: ''
    type: string
    description: The urgency of the request.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The category of the request.
    is_mandatory: false
-   name: Request Template
    default_value: ''
    type: string
    description: The template of the request.
    is_mandatory: false
-   name: Request Type
    default_value: ''
