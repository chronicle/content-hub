name: Wait For Field Update
description: Wait for a field of a request ot update to a desired value.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus#wait_for_field_update
integration_identifier: ServiceDeskPlus
parameters:
-   name: Request ID
    type: string
    description: The ID of the request.
    is_mandatory: true
-   name: Field Name
    type: string
    description: The name of the field to be updated.
    is_mandatory: true
-   name: Values
    type: string
    description: Desired values for the given field.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
is_async: true
script_result_name: new_value
