name: Add Note And Wait For Reply
description: Add a note and wait for new notes to be added to the given request.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus#add_note_and_wait_for_reply
integration_identifier: ServiceDeskPlus
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The requests' ID.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: content
    description: The note's content.
    is_mandatory: true
-   name: Is Public
    default_value: ''
    type: boolean
    description: Whether to make the note public or not.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
is_async: true
script_result_name: new_notes
