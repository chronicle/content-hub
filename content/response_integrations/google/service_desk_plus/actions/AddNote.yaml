name: Add Note
description: Add a note to a request
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/service-desk-plus#add_note
integration_identifier: ServiceDeskPlus
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: The requests' ID.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: content
    description: The note's content.
    is_mandatory: true
-   name: Is Public
    default_value: 'false'
    type: boolean
    description: Whether to make the note public or not.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: success
