[project]
name = "service_desk_plus"
version = "11.0"
description = "ServiceDesk Plus is a game changer in turning IT teams from daily fire-fighting to delivering awesome customer service."
requires-python = ">=3.11,<3.12"
dependencies = [ "tipcommon",]

[dependency-groups]
dev = [ "pytest-mock", "integration-testing", "anyio", "certifi", "defusedxml", "environmentcommon", "google-api-core", "google-api-python-client", "google-auth", "google-auth-httplib2", "googleapis-common-protos", "h11", "httpcore", "httplib2", "httpx", "idna", "proto-plus", "pyasn1", "pyasn1-modules", "pycparser", "pyopenssl", "pyparsing", "pytest>=9.1.0", "pytest-json-report>=1.5.0", "requests", "requests-toolbelt", "rsa", "soar-sdk", "typing-extensions", "uritemplate", "urllib3", "xmltodict", "pyyaml",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.8-py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.3.8-py3-none-any.whl"
