[project]
name = "ServiceDeskPlus"
version = "8.0"
description = "ServiceDesk Plus is a game changer in turning IT teams from daily fire-fighting to delivering awesome customer service."
requires-python = ">=3.11,<3.12"
dependencies = [
    "defusedxml==0.7.1",
    "pytest-mock>=3.15.1",
    "requests>=2.33.1",
    "xmltodict==0.13.0",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
