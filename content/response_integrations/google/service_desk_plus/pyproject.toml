[project]
name = "ServiceDeskPlus"
version = "9.0"
description = "ServiceDesk Plus is a game changer in turning IT teams from daily fire-fighting to delivering awesome customer service."
requires-python = ">=3.11,<3.12"
dependencies = [ "defusedxml==0.7.1", "pytest-mock>=3.15.1", "requests>=2.32.4", "xmltodict==0.13.0",]

[dependency-groups]
dev = [ "environmentcommon", "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk", "tipcommon",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.5-py3-none-any.whl"
