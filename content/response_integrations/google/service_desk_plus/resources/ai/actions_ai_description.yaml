Create Alert Request:
  ai_description: >-
    ### General Description

    This action creates a new request (incident or service request) in ServiceDesk
    Plus that is linked to a specific Google SecOps alert. It allows security analysts
    to bridge the gap between threat detection and IT service management by automatically
    or manually generating tickets with detailed metadata such as priority, urgency,
    and assigned technicians.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject line for the ServiceDesk Plus request.
    |

    | Requester | String | No | The name of the person requesting the ticket. If omitted,
    the API key user is typically used. |

    | Status | String | No | The initial status of the request (e.g., Open, In Progress).
    |

    | Technician | String | No | The name of the technician to whom the request should
    be assigned. |

    | Priority | String | No | The priority level (e.g., High, Medium, Low). |

    | Urgency | String | No | The urgency level of the request. |

    | Category | String | No | The category classification for the request. |

    | Request Template | String | No | The specific ServiceDesk Plus template to apply
    to the request. |

    | Request Type | String | No | The type of request, such as 'Incident' or 'Service
    Request'. |

    | Due By Time (ms) | String | No | The deadline for the request, provided in Unix
    epoch milliseconds. |

    | Mode | String | No | The mode of the request (e.g., Web Form, Phone Call). |

    | Level | String | No | The tier level for the request (e.g., Tier 1). |

    | Site | String | No | The site associated with the request. |

    | Group | String | No | The group associated with the request. |

    | Impact | String | No | The impact level of the request. |


    ### Additional Notes

    - The action automatically populates the 'Description' field of the ServiceDesk
    Plus request with the Google SecOps Alert External ID to maintain traceability.

    - Upon successful creation, the action updates the alert's additional data with
    the new Request ID and adds a 'ServiceDeskPlus' tag to the action result.


    ### Flow Description

    1. **Initialization**: Retrieves the ServiceDesk Plus API configuration and action
    parameters.

    2. **Context Retrieval**: Fetches the external ID of the current alert to use
    as the request description.

    3. **Data Formatting**: Converts the 'Due By Time' from milliseconds to the required
    date-time string format.

    4. **External API Call**: Communicates with ServiceDesk Plus to create the request
    using the provided parameters.

    5. **Internal Updates**: Adds a 'ServiceDeskPlus' tag to the action and updates
    the alert's metadata with the newly created Request ID.

    6. **Completion**: Returns the Request ID as the action result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new request record (ticket) in the ServiceDesk Plus external system.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the alert's additional data with the created request ID and adds a tag
      to the action execution context.
