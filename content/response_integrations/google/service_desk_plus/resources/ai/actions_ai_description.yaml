Close Request:
  ai_description: >-
    ### General Description

    Closes a specific request in ServiceDesk Plus. This action allows users to programmatically
    finalize tickets by providing a mandatory closing comment and specifying whether
    the resolution has been acknowledged by the requester.


    ### Flow Description

    1. **Initialization**: Connects to the ServiceDesk Plus API using the configured
    credentials.

    2. **Parameter Processing**: Retrieves the Request ID, closure comment, and acknowledgment
    status from the action's input parameters.

    3. **API Interaction**: Calls the `CLOSE_REQUEST` operation via the ServiceDesk
    Plus Manager, which sends an HTTP request to the external system to close the
    specified ticket.

    4. **Finalization**: If the API returns a success status, the action completes
    with a success message indicating the request has been closed.


    ### Additional Notes

    Ensure the provided Request ID corresponds to an existing and open request in
    ServiceDesk Plus.
