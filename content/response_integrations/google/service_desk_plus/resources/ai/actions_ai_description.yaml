Create Request:
  ai_description: >-
    ### General Description

    This action creates a new request (incident or service request) in ServiceDesk
    Plus. It allows for the comprehensive definition of ticket details, including
    categorization, prioritization, and assignment. After the request is successfully
    created, the action retrieves and returns the full details of the new ticket.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject of the request. |

    | Requester | String | No | The requester of the request. If not specified, it
    defaults to the user associated with the API key. |

    | Description | String | No | A detailed description of the request. |

    | Status | String | No | The initial status of the request (e.g., Open, In Progress).
    |

    | Technician | String | No | The name of the technician to be assigned to the
    request. |

    | Priority | String | No | The priority level of the request (e.g., High, Medium,
    Low). |

    | Urgency | String | No | The urgency level of the request. |

    | Category | String | No | The category under which the request falls. |

    | Request Template | String | No | The specific template to apply to the request.
    |

    | Request Type | String | No | The type of request, such as 'Incident' or 'Service
    Request'. |

    | Due By Time (ms) | String | No | The due date for the request, provided as a
    Unix timestamp in milliseconds. |

    | Mode | String | No | The mode through which the request was received (e.g.,
    SMS, Web Form). |

    | Level | String | No | The tier level of the request (e.g., Tier 1). |

    | Site | String | No | The physical site or location associated with the request.
    |

    | Group | String | No | The group to which the request should be assigned. |

    | Impact | String | No | The business impact of the request. |


    ### Additional Notes

    - Only the **Subject** parameter is strictly mandatory for the action to execute.

    - The **Due By Time (ms)** parameter is automatically converted from a Unix timestamp
    to the specific date format required by the ServiceDesk Plus API.


    ### Flow Description

    1. **Initialization**: The action initializes the ServiceDesk Plus manager using
    the provided API Root and API Key.

    2. **Parameter Collection**: It retrieves all user-provided parameters from the
    SOAR environment.

    3. **Data Transformation**: If a 'Due By Time' is provided, it converts the Unix
    timestamp into the format `%d %b %Y, %H:%M:%S`.

    4. **Request Creation**: It calls the ServiceDesk Plus API to create a new request
    with the specified fields.

    5. **Data Retrieval**: Upon successful creation, it fetches the complete data
    object for the newly created request ID.

    6. **Finalization**: The action outputs the request ID and the full JSON representation
    of the ticket to the SOAR platform.
