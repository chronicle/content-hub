Create Alert Request:
  ai_description: >-
    ### General Description

    Creates a new request (ticket) in ServiceDesk Plus. This action can operate in
    both Alert and Case scopes. It automatically populates the request's description
    with the Siemplify Alert ID to maintain traceability between the two systems.


    ### Flow Description

    1. **Initialization**: Retrieves the ServiceDesk Plus API configuration and action
    parameters.

    2. **Scope Determination**: Determines whether the action is running in Alert
    or Case scope.

    3. **Context Building**: For each target alert (the current alert in Alert scope,
    or all alerts in the case in Case scope), it automatically generates a description
    string containing the external ID of the alert.

    4. **External API Call**: Communicates with the ServiceDesk Plus API via a POST
    request to create the request using the provided parameters for each target alert.

    5. **Internal Updates**: Adds a 'ServiceDeskPlus' tag to the case and updates
    the alert's additional data with the newly created Request ID.

    6. **Completion**: Returns the Request ID or a comma-separated list of Request
    IDs as the action result.


    ### Additional Notes

    - This action does not run on specific entities; it operates at the alert level.

    - If a parameter is set to "None" (case sensitive), the integration logic treats
    it as an empty value for dropdown-based fields.
