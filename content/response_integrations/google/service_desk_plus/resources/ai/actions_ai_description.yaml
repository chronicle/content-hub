Wait For Status Update:
  ai_description: "### General Description\nThis action is an asynchronous utility\
    \ designed to pause playbook execution until a specific ServiceDesk Plus request\
    \ reaches one or more desired statuses. It is primarily used for workflow synchronization,\
    \ ensuring that subsequent playbook steps only proceed once a ticket has been\
    \ updated in the external ServiceDesk Plus system.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Request ID | String | Yes | The unique identifier of the ServiceDesk Plus request\
    \ (ticket) to monitor. |\n| Statuses | String | Yes | A comma-separated list of\
    \ target statuses (e.g., 'Closed, Resolved, In Progress'). The action will complete\
    \ once the request's status matches any value in this list (case-insensitive).\
    \ |\n\n### Flow Description\n1. **Initialization**: The action receives the `Request\
    \ ID` and the list of target `Statuses`.\n2. **Initial State**: The action immediately\
    \ transitions into an `IN_PROGRESS` state, passing the `Request ID` as additional\
    \ data for the polling mechanism.\n3. **Polling (query_job)**: At defined intervals,\
    \ the action's background task retrieves the current details of the request from\
    \ ServiceDesk Plus using the `GET_REQUEST` operation.\n4. **Status Comparison**:\
    \ The current status of the request is extracted and compared against the user-provided\
    \ list of desired statuses.\n5. **Completion**: \n    * If the current status\
    \ matches one of the desired statuses, the action transitions to `COMPLETED` and\
    \ returns the final status.\n    * If the status does not match, the action remains\
    \ `IN_PROGRESS` and will poll again in the next cycle.\n\n### Additional Notes\n\
    * This action does not use or process Google SecOps entities.\n* The status check\
    \ is case-insensitive."
