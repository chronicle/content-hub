Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific request in ServiceDesk Plus. This action allows analysts
    to document findings or provide updates directly within a ServiceDesk Plus ticket
    from the Google SecOps platform. It supports setting the visibility of the note
    to either public (visible to the requester) or private (technicians only).


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request ID | String | Yes | The unique identifier of the ServiceDesk Plus request
    to which the note will be added. |

    | Note | String | Yes | The actual text content of the note to be added. |

    | Is Public | Boolean | Yes | Determines the visibility of the note. If set to
    `true`, the note is public; if `false`, it is private. Default is `false`. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root and API Key
    from the ServiceDeskPlus integration settings.

    2. **Parameter Extraction**: It extracts the `Request ID`, `Note` content, and
    the `Is Public` visibility flag from the action parameters.

    3. **API Interaction**: The action uses the `ServiceDeskPlusManager` to format
    the note data into an XML structure required by the ServiceDesk Plus API.

    4. **Execution**: It sends a request to the ServiceDesk Plus endpoint `request/{request_id}/notes`
    using the `ADD_NOTE` operation.

    5. **Completion**: The action validates the API response and returns a success
    message if the note was successfully added.


    ### Additional Notes

    This action does not interact with Google SecOps entities; it operates solely
    based on the provided `Request ID` parameter.
  capabilities:
