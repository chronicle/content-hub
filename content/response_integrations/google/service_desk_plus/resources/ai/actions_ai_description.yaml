Update Request:
  ai_description: >-
    ### General Description

    Updates an existing request (ticket) in ServiceDesk Plus. This action allows for
    the modification of a wide range of request attributes, including its status,
    assigned technician, priority, and description. It is primarily used to synchronize
    ticket states between Google SecOps and the ServiceDesk Plus ticketing system.


    ### Flow Description

    1. Retrieves the provided update parameters and the mandatory Request ID from
    the action configuration.

    2. Converts the 'Due By Time' from Unix milliseconds to the specific string format
    expected by the ServiceDesk Plus API, if provided.

    3. Sends an 'EDIT_REQUEST' operation to the ServiceDesk Plus API with the specified
    fields to update the ticket.

    4. Fetches the most recent version of the request from the API to confirm the
    changes.

    5. Attaches the updated request data to the action results as a JSON object and
    completes with a success message.


    ### Additional Notes

    - This action does not run on entities; it requires a specific Request ID as input.

    - The 'Due By Time (ms)' parameter is automatically converted from Unix milliseconds
