Update Request:
  ai_description: >-
    Updates an existing request (ticket) in ServiceDesk Plus. This action allows for
    the modification of a wide range of request attributes, including its status,
    assigned technician, priority, and description. It is primarily used to synchronize
    ticket states between Google SecOps and the ServiceDesk Plus ticketing system.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request ID | String | Yes | The unique identifier of the request to update.
    |

    | Requester | String | No | The name of the requester. If not specified, it defaults
    to the user associated with the API key. |

    | Description | String | No | The updated description of the request. |

    | Status | String | No | The new status of the request (e.g., Open, In Progress,
    Closed). |

    | Technician | String | No | The name of the technician assigned to the request.
    |

    | Priority | String | No | The priority level of the request (e.g., High, Medium,
    Low). |

    | Urgency | String | No | The urgency level of the request. |

    | Category | String | No | The category the request belongs to. |

    | Request Template | String | No | The template to be used for the request. |

    | Request Type | String | No | The type of request (e.g., Incident, Service Request).
    |

    | Due By Time (ms) | Numeric | No | The due date for the request, provided in
    Unix milliseconds. |

    | Mode | String | No | The mode of the request (e.g., Web Form, Phone Call). |

    | Level | String | No | The tier level of the request (e.g., Tier 1, Tier 2).
    |

    | Site | String | No | The site associated with the request. |

    | Group | String | No | The group assigned to the request. |

    | Impact | String | No | The impact level of the request. |


    ### Additional Notes

    - This action does not run on entities; it requires a specific Request ID as input.

    - The 'Due By Time (ms)' parameter is automatically converted from Unix milliseconds
    to the date format required by ServiceDesk Plus.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves all provided update parameters
    and the mandatory Request ID from the input.

    2. **Date Formatting:** If a 'Due By Time' is provided in milliseconds, it is
    converted into the specific string format expected by the ServiceDesk Plus API.

    3. **API Update Call:** The action sends an 'EDIT_REQUEST' operation to the ServiceDesk
    Plus API with the specified fields.

    4. **Data Retrieval:** After the update, the action fetches the most recent version
    of the request from the API to confirm the changes.

    5. **Result Processing:** The updated request data is attached to the action results
    as a JSON object, and the action completes with a success message.
