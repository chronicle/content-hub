Wait For Status Update:
  ai_description: >-
    ### General Description

    This action is an asynchronous utility designed to pause playbook execution until
    a specific ServiceDesk Plus request reaches one or more desired statuses. It is
    primarily used for workflow synchronization, ensuring that subsequent playbook
    steps only proceed once a ticket has been updated in the external ServiceDesk
    Plus system.


    ### Flow Description

    1. **Initialization**: The action receives the `Request ID` and the list of target
    `Statuses`.

    2. **Initial State**: The action immediately transitions into an `IN_PROGRESS`
    state, passing the `Request ID` as additional data for the polling mechanism.

    3. **Polling (query_job)**: At defined intervals, the action's background task
    retrieves the current details of the request from ServiceDesk Plus using the `GET_REQUEST`
    operation.

    4. **Status Comparison**: The current status of the request is extracted and compared
    against the user-provided list of desired statuses.

    5. **Completion**: 
        * If the current status matches one of the desired statuses, the action transitions
    to `COMPLETED` and returns the final status.
        * If the status does not match, the action remains `IN_PROGRESS` and will
    poll again in the next cycle.

    ### Additional Notes

    * This action does not use or process Google SecOps entities.

    * The status check is case-insensitive.
