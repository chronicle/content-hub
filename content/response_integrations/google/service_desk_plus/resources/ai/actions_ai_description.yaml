Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity between Google SecOps and
    a ServiceDesk Plus instance. It ensures that the integration's configuration,
    specifically the API Root and API Key, is correct and that the network path to
    the service is open.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Api Root' and 'Api Key'
    from the ServiceDeskPlus integration settings.

    2. **Manager Initialization**: It initializes the ServiceDeskPlusManager using
    the retrieved credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    internally attempts to list a single request from the ServiceDesk Plus API using
    a GET request.

    4. **Result Reporting**: If the API call is successful, the action concludes with
    a success message ('Connected Successfully') and a boolean result of 'true'. If
    the call fails, an exception is raised with details about the connection error.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connectivity issues.
