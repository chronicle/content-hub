Create Request:
  ai_description: >-
    ### General Description

    This action creates a new request (incident or service request) in ServiceDesk
    Plus. It allows for the comprehensive definition of ticket details, including
    categorization, prioritization, and assignment. After the request is successfully
    created, the action retrieves and returns the full details of the new ticket.


    ### Flow Description

    1. **Initialization**: The action initializes the ServiceDesk Plus manager using
    the provided API Root and API Key.

    2. **Parameter Collection**: It retrieves all user-provided parameters from the
    SOAR environment.

    3. **Data Transformation**: If a 'Due By Time' is provided, it converts the Unix
    timestamp into the format `%d %b %Y, %H:%M:%S`.

    4. **Request Creation**: It calls the ServiceDesk Plus API to create a new request
    with the specified fields.

    5. **Data Retrieval**: Upon successful creation, it fetches the complete data
    object for the newly created request ID.

    6. **Finalization**: The action outputs the request ID and the full JSON representation
    of the ticket to the SOAR platform.


    ### Additional Notes

    - Only the **Subject** parameter is strictly mandatory for the action to execute.

    - The **Due By Time (ms)** parameter is automatically converted from a Unix timestamp
    to the specific date format required by the ServiceDesk Plus API.
