Wait For Field Update:
  ai_description: >-
    ### General Description

    This action is an asynchronous utility designed to pause playbook execution until
    a specific field of a request in ServiceDesk Plus reaches a desired value. It
    is typically used to wait for manual interventions, such as a ticket being 'Closed'
    or 'Approved', before proceeding with automated steps.


    ### Flow Description

    1. **Initialization**: The action captures the Request ID and Field Name, then
    sets the execution state to 'In Progress', passing the Request ID to the background
    query job.

    2. **Data Retrieval**: In each polling cycle, the action uses the ServiceDesk
    Plus API to fetch the current details of the specified request.

    3. **Value Comparison**: The action extracts the current value of the target field
    and compares it against the user-provided list of desired values.

    4. **Completion/Continuation**: If the current value matches any of the target
    values, the action transitions to 'Completed'. If no match is found, the action
    remains 'In Progress' and waits for the next polling interval.


    ### Additional Notes

    - This is an **asynchronous** action. It will periodically poll the ServiceDesk
    Plus API until the condition is met or the action times out.

    - The comparison between the field's current value and the target values is case-insensitive.
