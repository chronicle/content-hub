Add Note And Wait For Reply:
  ai_description: >-
    ### General Description

    Adds a note to a specific request in ServiceDesk Plus and waits for new notes
    to be added to that request. This is an asynchronous action that remains in progress
    until a reply or a new note is detected on the specified request.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request ID | String | Yes | The unique identifier of the request in ServiceDesk
    Plus. |

    | Note | String | Yes | The content of the note to be added to the request. |

    | Is Public | Boolean | Yes | Specifies whether the note should be public (visible
    to the requester) or private. Defaults to false. |


    ### Flow Description

    1. **Add Note**: The action begins by posting the provided note to the ServiceDesk
    Plus request using the `Request ID`.

    2. **Capture State**: It retrieves the current list of notes for the request and
    identifies the timestamp of the note just added.

    3. **Enter Wait State**: The action execution state is set to 'In Progress', and
    the timestamp is saved as additional data.

    4. **Polling**: In the background, the action periodically checks for any notes
    on the request that have a creation timestamp newer than the saved one.

    5. **Completion**: When a new note is found, the action captures the content of
    the new notes and completes the execution, returning the new data.
