Get Request:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific request from ServiceDesk Plus
    using its unique Request ID. This action is used to fetch ticket metadata, status,
    and associated details to provide context within a SOAR case.


    ### Flow Description

    1. Establishes a connection to the ServiceDesk Plus instance.

    2. Retrieves the `Request ID` parameter.

    3. Sends a GET request to the ServiceDesk Plus API to fetch the details of the
    specified request.

    4. Parses the response, flattens the data, and attaches it as a data table to
    the case.

    5. Returns the raw JSON data of the request for use in subsequent playbook steps.


    ### Additional Notes

    This action does not process entities from the case; it relies solely on the provided
    Request ID parameter.
