name: Create Ticket
description: Create a ticket in Zoho Desk.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zoho-desk#create_ticket
integration_identifier: ZohoDesk
parameters:
-   name: Title
    default_value: ''
    type: string
    description: Specify the title for the ticket.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description of the ticket.
    is_mandatory: true
-   name: Department Name
    default_value: ''
    type: string
    description: Specify the name of the department in which you want to create a
        ticket.
    is_mandatory: true
-   name: Contact
    default_value: ''
    type: string
    description: Specify the email of the contact for the ticket.
    is_mandatory: true
-   name: Assignee Type
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Agent
    - Team
    description: Specify the type of the assignee. If "Agent" or "Team" is selected
        "Assignee Name" is required.
    is_mandatory: false
-   name: Assignee Name
    default_value: ''
    type: string
    description: Specify the name of the assignee for the ticket. For the agent type
        you can provide an email address or display name.
    is_mandatory: false
-   name: Priority
    default_value: No Priority
    type: ddl
    optional_values:
    - No Priority
    - Low
    - Medium
    - High
    description: Specify the priority for the ticket.
    is_mandatory: false
-   name: Classification
    default_value: No Classification
    type: ddl
    optional_values:
    - No Classification
    - Question
    - Problem
    - Feature
    - Others
    description: Specify the classification type for the ticket.
    is_mandatory: false
-   name: Channel
    default_value: Email
    type: ddl
    optional_values:
    - Email
    - Phone
    - Web
    - Twitter
    - Facebook
    - Chat
    - Forums
    description: Specify the channel for the ticket.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: Specify the category for the ticket.
    is_mandatory: false
-   name: Sub Category
    default_value: ''
    type: string
    description: Specify the subcategory for the ticket.
    is_mandatory: false
-   name: Due Date
    default_value: ''
    type: string
    description: 'Specify the due date for the ticket. Format: ISO 8601. Example:
        2022-07-06T07:05:43Z.'
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a json object containing the custom fields that need to
        be added. Note: you need to provide the API names of the keys.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_ticket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
