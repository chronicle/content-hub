name: Get Ticket Details
description: Get detailed information about the ticket from Zoho Desk.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zoho-desk#get_ticket_details
integration_identifier: ZohoDesk
parameters:
-   name: Ticket IDs
    default_value: ''
    type: string
    description: Specify a comma-separated list of ids for which you want to return
        details.
    is_mandatory: true
-   name: Create Insight
    default_value: false
    type: boolean
    description: If enabled, action will create an insight containing information
        about tickets.
    is_mandatory: false
-   name: Additional Fields To Return
    default_value: contacts, products, assignee, departments, contract, isRead, team,
        skills
    type: string
    description: 'Specify what additional fields to return. Possible values: contacts,
        products, assignee, departments, contract, isRead, team, skills.'
    is_mandatory: false
-   name: Fetch Comments
    default_value: true
    type: boolean
    description: If enabled, action will fetch comments related to the tickets.
    is_mandatory: false
-   name: Max Comments To Return
    default_value: '50'
    type: string
    description: 'Specify how many comments to return per ticket. Default: 50. Maximum:
        100.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_ticket_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
