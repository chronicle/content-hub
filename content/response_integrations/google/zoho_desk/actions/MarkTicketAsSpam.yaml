name: Mark Ticket As Spam
description: Mark ticket as spam in Zoho Desk.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zoho-desk#mark_ticket_as_spam
integration_identifier: ZohoDesk
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify an id of the ticket that needs to be marked as spam.
    is_mandatory: true
-   name: Mark Contact
    default_value: true
    type: boolean
    description: If enabled, the contact that created the ticket will be marked as
        spammer.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
