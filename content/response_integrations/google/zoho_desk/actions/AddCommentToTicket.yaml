name: Add Comment To Ticket
description: 'Add a comment to a ticket in Zoho Desk. Note: Action is running as async
    if "Wait For Reply" is enabled, please adjust script timeout value in Siemplify
    IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zoho-desk#add_comment_to_ticket
integration_identifier: ZohoDesk
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify an id of the ticket to which you want to add a comment.
    is_mandatory: true
-   name: Visibility
    default_value: Public
    type: ddl
    optional_values:
    - Public
    - Private
    description: Specify if the comment should be public or private.
    is_mandatory: false
-   name: Type
    default_value: Plain Text
    type: ddl
    optional_values:
    - Plain Text
    - HTML
    description: Specify what should be the type of the comment.
    is_mandatory: false
-   name: Text
    default_value: ''
    type: string
    description: Specify the content of the comment.
    is_mandatory: true
-   name: Wait For Reply
    default_value: false
    type: boolean
    description: If enabled, action will wait for reply.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_comment_to_ticket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
