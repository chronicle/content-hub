Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Zoho Desk with specified details such as title, description,
    department, and contact. This action allows for detailed ticket configuration,
    including setting priorities, classifications, assignees (agents or teams), and
    custom fields.


    ### Flow Description

    1. Extracts the provided parameters including title, description, department name,
    contact email, and other optional fields.

    2. Validates and parses the 'Custom Fields' parameter if provided.

    3. Resolves the provided names and emails (Agent, Team, Department, Contact) into
    their respective Zoho Desk IDs by making GET requests to the Zoho Desk API.

    4. Sends a POST request to the Zoho Desk API to create the ticket with the resolved
    IDs and provided metadata.

    5. Returns the full JSON representation of the created ticket and marks the action
    as successful.


    ### Additional Notes

    - If 'Assignee Type' is set to 'Agent' or 'Team', the 'Assignee Name' parameter
    becomes mandatory for the action to successfully assign the ticket.

    - The 'Custom Fields' parameter must be a valid JSON string containing the API
    names of the keys.
