Get Refresh Token:
  ai_description: >-
    ### General Description

    This action is a utility designed to facilitate the OAuth2 authentication process
    for the Zoho Desk integration. Its primary purpose is to exchange a temporary
    authorization code for a long-lived refresh token. This refresh token is then
    used by other actions in the integration to maintain a valid session without manual
    intervention. This action is typically run once during the initial setup of the
    integration.


    ### Flow Description

    1. Retrieves the Client ID and Client Secret from the integration's global configuration.

    2. Retrieves the Authorization Link and Authorization Code from the action's input
    parameters.

    3. Performs a POST request to the provided Authorization Link, sending the Client
    ID, Client Secret, and Authorization Code with the `grant_type` set to `authorization_code`.

    4. Parses the JSON response from Zoho to extract the `refresh_token`.

    5. Adds the refresh token to the action's result JSON and displays it in the output
    message for the user to copy.


    ### Additional Notes

    * Before running this action, the user must have registered a 'Self-Client' or
    'Server-based Application' in the Zoho Developer Console to obtain the Client
    ID, Client Secret, and the Authorization Code.

    * The resulting refresh token must be manually copied and pasted into the 'Refresh
    Token' field of the Zoho Desk Integration Configuration in Google SecOps.
