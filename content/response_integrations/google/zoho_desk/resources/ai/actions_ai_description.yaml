Mark Ticket As Spam:
  ai_description: >-
    ### General Description

    Marks a specific ticket as spam within the Zoho Desk platform. This action allows
    users to flag unwanted tickets and optionally mark the associated contact as a
    spammer to prevent future noise.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The unique identifier of the Zoho Desk ticket to
    be marked as spam. |

    | Mark Contact | Boolean | No | If set to true, the contact who created the ticket
    will also be marked as a spammer in Zoho Desk. Defaults to true. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Ticket ID and the 'Mark
    Contact' preference from the input.

    2. **Ticket Verification**: It fetches the ticket details from Zoho Desk to ensure
    the ticket exists before attempting to modify it.

    3. **Spam Marking**: It executes a POST request to the Zoho Desk API to mark the
    specified ticket ID as spam. If 'Mark Contact' is enabled, the API call includes
    instructions to flag the contact as well.

    4. **Completion**: Returns a success message upon successful execution.


    ### Additional Notes

    This action does not operate on SecOps entities and requires a direct Ticket ID
    input.
