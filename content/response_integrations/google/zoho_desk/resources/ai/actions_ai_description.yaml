Get Ticket Details:
  ai_description: >-
    ### General Description

    This action retrieves detailed information for specific tickets from Zoho Desk
    using their unique identifiers. It allows for deep data retrieval, including additional
    related fields and ticket comments, providing a comprehensive view of the ticket's
    status, history, and associated metadata within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket IDs | String | Yes | A comma-separated list of Zoho Desk ticket IDs for
    which you want to retrieve details. |

    | Create Insight | Boolean | No | If enabled, the action will generate a case
    insight for each successfully retrieved ticket, displaying its title and description.
    |

    | Additional Fields To Return | String | No | A comma-separated list of extra
    fields to include in the response. Supported values include: `contacts`, `products`,
    `assignee`, `departments`, `contract`, `isRead`, `team`, and `skills`. |

    | Fetch Comments | Boolean | No | If enabled, the action will also retrieve comments
    associated with each ticket. |

    | Max Comments To Return | Integer | No | Specifies the maximum number of comments
    to fetch per ticket. Must be between 1 and 100. Default is 50. |


    ### Additional Notes

    - The action validates the `Max Comments To Return` parameter to ensure it falls
    within the allowed range (1-100).

    - If invalid fields are provided in the `Additional Fields To Return` parameter,
    the action will log an error for the invalid ones but continue processing with
    the valid fields.


    ### Flow Description

    1. **Initialization**: The action parses the input parameters, including the list
    of Ticket IDs and configuration for insights and comments.

    2. **Validation**: It checks if the comment fetch limit is within the valid range
    and filters the requested additional fields against a list of supported values.

    3. **API Connection**: Establishes a connection to Zoho Desk using the configured
    API root and OAuth credentials.

    4. **Data Retrieval**: For each provided Ticket ID, the action performs a GET
    request to fetch ticket details. If `Fetch Comments` is enabled, it performs a
    secondary request to retrieve the ticket's comments.

    5. **Result Processing**: The retrieved data is formatted into JSON results and
    a structured data table named 'Ticket Details'.

    6. **Insight Generation**: If `Create Insight` is true, the action creates a general
    insight for each ticket in the SecOps case.

    7. **Completion**: The action concludes by providing a summary message of successful
    and failed ticket lookups.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates case insights within Google SecOps to display ticket details
      if the 'Create Insight' parameter is enabled.
