Mark Ticket As Spam:
  ai_description: >-
    ### General Description

    Marks a specific ticket as spam within the Zoho Desk platform. This action allows
    users to flag unwanted tickets and optionally mark the associated contact as a
    spammer to prevent future noise.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Ticket ID` and the `Mark
    Contact` preference from the input parameters.

    2. **Ticket Verification**: It executes a GET request to the Zoho Desk API (`/api/v1/tickets/{ticket_id}`)
    to fetch the ticket details and ensure it exists.

    3. **Spam Marking**: It executes a POST request to the Zoho Desk API (`/api/v1/tickets/markSpam`)
    to mark the specified ticket ID as spam. If `Mark Contact` is enabled, the API
    call includes instructions to flag the contact as well.

    4. **Completion**: Returns a success message upon successful execution.


    ### Additional Notes

    This action does not operate on SecOps entities and requires a direct Ticket ID
    input.
