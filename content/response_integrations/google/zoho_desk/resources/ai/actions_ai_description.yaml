Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Zoho Desk with new information. This action allows
    for comprehensive modification of ticket attributes, including its title, description,
    status, priority, and custom fields. It also supports changing the ticket's read/unread
    state and reassigning it to different agents or teams.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The unique identifier of the ticket to be updated.
    |

    | Title | String | No | The new title/subject for the ticket. |

    | Description | String | No | The new description for the ticket. |

    | Department Name | String | No | The name of the department to associate with
    the ticket. The action will resolve this name to an ID. |

    | Contact | String | No | The email address of the contact for the ticket. The
    action will resolve this email to a Contact ID. |

    | Assignee Type | Enum | No | Specifies if the ticket should be assigned to an
    'Agent' or a 'Team'. |

    | Assignee Name | String | No | The name or email of the assignee. Required if
    'Assignee Type' is selected. |

    | Resolution | String | No | The resolution text for the ticket. |

    | Priority | Enum | No | The priority level (No Priority, Low, Medium, High).
    |

    | Status | Enum | No | The ticket status (Open, On Hold, Escalated, Closed). |

    | Mark State | Enum | No | Sets the ticket state to 'Read' or 'Unread'. |

    | Classification | Enum | No | The classification type (Question, Problem, Feature,
    Others). |

    | Channel | Enum | No | The communication channel (Email, Phone, Web, Twitter,
    Facebook, Chat, Forums). |

    | Category | String | No | The ticket category. |

    | Sub Category | String | No | The ticket sub-category. |

    | Due Date | String | No | The due date in ISO 8601 format (e.g., 2022-07-06T07:05:43Z).
    |

    | Custom Fields | String | No | A JSON object string containing the API names
    and values for custom fields. |


    ### Additional Notes

    - If **Assignee Type** is configured, **Assignee Name** must also be provided.

    - The **Custom Fields** parameter must be a valid JSON string; otherwise, the
    action will fail during validation.

    - If a provided Department, Contact, Agent, or Team name cannot be found in Zoho
    Desk, the action will raise an error.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves all input parameters
    and validates that 'Assignee Name' is present if an 'Assignee Type' is chosen.
    It also attempts to parse the 'Custom Fields' JSON string.

    2. **Context Retrieval**: The action performs lookup requests to the Zoho Desk
    API to resolve names (Department, Contact, Agent, or Team) into their respective
    internal IDs.

    3. **State Update**: If the 'Mark State' parameter is provided, the action sends
    a specific request to mark the ticket as either 'Read' or 'Unread'.

    4. **Ticket Update**: The action constructs a payload containing all the modified
    fields and sends a PATCH request to the Zoho Desk API to update the ticket identified
    by the 'Ticket ID'.

    5. **Result Processing**: The updated ticket data is retrieved from the API response
    and added to the action's JSON results for use in subsequent playbook steps.
