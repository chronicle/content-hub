Add Comment To Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to a specific ticket in Zoho Desk. This action allows for communication
    within a ticket by posting either public or private comments in plain text or
    HTML format. It also supports an asynchronous mode where the action can wait for
    a reply to be posted on the ticket before completing.


    ### Flow Description

    1. **Initialization**: The action extracts the provided parameters and initializes
    the Zoho Desk API client.

    2. **Add Comment (First Run)**: The action sends a POST request to the Zoho Desk
    API to create a new comment on the specified ticket with the provided text, visibility,
    and content type.

    3. **Execution State Check**: If "Wait For Reply" is disabled, the action completes
    successfully. If enabled, the action sets its state to 'In Progress'.

    4. **Polling for Reply (Subsequent Runs)**: If in an 'In Progress' state, the
    action fetches the list of comments for the ticket via a GET request. It identifies
    the original comment posted by the action and checks for any subsequent comments.

    5. **Completion**: Once a reply is found, the reply data is added to the JSON
    results, and the action transitions to a 'Completed' state.


    ### Additional Notes

    - If **Wait For Reply** is enabled, the action will continue to run until a new
    comment is detected on the ticket that was posted after the action's initial comment.
    The first detected reply will be returned in the JSON results.

    - Ensure the script timeout in the Siemplify IDE is adjusted if **Wait For Reply**
    is used, as the action may run for an extended period.
