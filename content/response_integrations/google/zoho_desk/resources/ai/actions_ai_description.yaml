Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Zoho Desk with new information. This action allows
    for comprehensive modification of ticket attributes, including its title, description,
    status, priority, and custom fields. It also supports changing the ticket's read/unread
    state and reassigning it to different agents or teams.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves all input parameters
    and validates that 'Assignee Name' is present if an 'Assignee Type' is chosen.
    It also attempts to parse the 'Custom Fields' JSON string.

    2. **Context Retrieval**: The action performs lookup requests to the Zoho Desk
    API to resolve names (Department, Contact, Agent, or Team) into their respective
    internal IDs.

    3. **State Update**: If the 'Mark State' parameter is provided, the action sends
    a POST request to mark the ticket as either 'Read' or 'Unread'.

    4. **Ticket Update**: The action constructs a payload containing all the modified
    fields and sends a PATCH request to the Zoho Desk API to update the ticket identified
    by the 'Ticket ID'.

    5. **Result Processing**: The updated ticket data is retrieved from the API response
    and added to the action's JSON results.


    ### Additional Notes

    - If **Assignee Type** is configured, **Assignee Name** must also be provided.

    - The **Custom Fields** parameter must be a valid JSON string; otherwise, the
    action will fail during validation.

    - If a provided Department, Contact, Agent, or Team name cannot be found in Zoho
    Desk, the action will raise an error.
