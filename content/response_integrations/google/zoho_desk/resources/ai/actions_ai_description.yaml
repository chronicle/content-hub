Add Comment To Ticket:
  ai_description: "### General Description\nAdds a comment to a specific ticket in\
    \ Zoho Desk. This action allows for communication within a ticket by posting either\
    \ public or private comments in plain text or HTML format. It also supports an\
    \ asynchronous mode where the action can wait for a reply to be posted on the\
    \ ticket before completing.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Ticket ID | String\
    \ | Yes | The unique identifier of the Zoho Desk ticket to which the comment will\
    \ be added. |\n| Visibility | String | No | Determines if the comment is 'Public'\
    \ or 'Private'. Default is 'Public'. |\n| Type | String | No | The format of the\
    \ comment content. Can be 'Plain Text' or 'HTML'. Default is 'Plain Text'. |\n\
    | Text | String | Yes | The actual content of the comment to be posted. |\n| Wait\
    \ For Reply | Boolean | No | If enabled, the action will enter an 'In Progress'\
    \ state and periodically check for new comments (replies) on the ticket until\
    \ one is found. |\n\n### Additional Notes\n- If **Wait For Reply** is enabled,\
    \ the action will continue to run until a new comment is detected on the ticket\
    \ that was posted after the action's initial comment. The first detected reply\
    \ will be returned in the JSON results.\n- Ensure the script timeout in the Siemplify\
    \ IDE is adjusted if **Wait For Reply** is used, as the action may run for an\
    \ extended period.\n\n### Flow Description\n1. **Initialization**: The action\
    \ extracts the provided parameters and initializes the Zoho Desk API client using\
    \ the integration's configuration.\n2. **Add Comment (First Run)**: The action\
    \ sends a POST request to the Zoho Desk API to create a new comment on the specified\
    \ ticket with the provided text, visibility, and content type.\n3. **Execution\
    \ State Check**: \n    - If **Wait For Reply** is disabled, the action completes\
    \ successfully.\n    - If **Wait For Reply** is enabled, the action sets its state\
    \ to 'In Progress'.\n4. **Polling for Reply (Subsequent Runs)**: If in an 'In\
    \ Progress' state, the action fetches the list of comments for the ticket. It\
    \ identifies the original comment posted by the action and checks for any subsequent\
    \ comments. \n5. **Completion**: Once a reply is found, the reply data is added\
    \ to the JSON results, and the action transitions to a 'Completed' state."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment to a ticket in the Zoho Desk platform via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
