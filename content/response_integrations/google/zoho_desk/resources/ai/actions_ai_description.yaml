Get Ticket Details:
  ai_description: >-
    ### General Description

    This action retrieves detailed information for specific tickets from Zoho Desk
    using their unique identifiers. It allows for deep data retrieval, including additional
    related fields and ticket comments, providing a comprehensive view of the ticket's
    status, history, and associated metadata within Google SecOps.


    ### Flow Description

    1. Extracts and validates parameters, including `Ticket IDs`, `Max Comments To
    Return`, and `Additional Fields To Return`.

    2. Initializes the Zoho Desk API client.

    3. Iterates over the provided `Ticket IDs`.

    4. For each ticket ID, makes a GET request to the `/api/v1/tickets/{ticket_id}`
    endpoint to fetch ticket details.

    5. If `Fetch Comments` is enabled, makes a secondary GET request to the `/api/v1/tickets/{ticket_id}/comments`
    endpoint to retrieve the ticket's comments.

    6. Aggregates the retrieved data and adds it to the action's JSON result and a
    data table named 'Ticket Details'.

    7. If `Create Insight` is enabled, creates a case insight for each successfully
    retrieved ticket.


    ### Additional Notes

    - The action validates the `Max Comments To Return` parameter to ensure it falls
    within the allowed range (1-100).

    - If invalid fields are provided in the `Additional Fields To Return` parameter,
    the action will log an error for the invalid ones but continue processing with
    the valid fields.
