Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Zoho Desk instance. It ensures that the integration parameters provided
    in the configuration (such as API Root, Client ID, Client Secret, and Refresh
    Token) are correct and that the environment can successfully communicate with
    the Zoho Desk API.


    ### Flow Description

    1. **Initialization**: The action initializes the Zoho Desk API client using the
    integration's global configuration parameters.

    2. **Authentication**: It checks for a valid cached OAuth access token. If the
    token is missing or expired, it uses the Refresh Token to obtain a new access
    token from Zoho's OAuth server.

    3. **Connectivity Test**: The action performs a GET request to the `/api/v1/agents`
    endpoint.

    4. **Validation**: It validates the API response. If the response is successful
    (HTTP 200), it confirms the connection; otherwise, it raises an exception with
    details about the failure.


    ### Additional Notes

    This action is primarily used for troubleshooting and initial setup validation.
    It utilizes the OAuth2 flow to ensure that access tokens can be retrieved or refreshed
    before attempting to call the Zoho Desk 'agents' endpoint to confirm a valid session.
