    get_alert_information: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Ticket ID | String | Yes | Specify an id of the ticket that needs to be updated.
    |

    | Title | String | No | Specify the title that should be set for the ticket. |

    | Description | String | No | Specify the description for the ticket. |

    | Department Name | String | No | Specify the name of the department that should
    be set for the ticket. |

    | Contact | String | No | Specify the email of the contact for the ticket. |

    | Assignee Type | String | No | Specify the type of the assignee. If “Agent” or
    “Team” is selected “Assignee Name” is required. |

    | Assignee Name | String | No | Specify the name of the assignee for the ticket.
    For the agent type you can provide an email address or display name. |

    | Resolution | String | No | Specify the resolution for the ticket. |

    | Priority | String | No | Specify the priority for the ticket. |

    | Status | String | No | Specify the status for the ticket. |

    | Mark State | String | No | Specify the mark state for the ticket. |

    | Classification | String | No | Specify the classification type for the ticket.
    |

    | Channel | String | No | Specify the channel for the ticket. |

    | Category | String | No | Specify the category for the ticket. |

    | Sub Category | String | No | Specify the subcategory for the ticket. |

    | Due Date | String | No | Specify the due date for the ticket. Format: ISO 8601.
    Example: 2022-07-06T07:05:43Z. Note: this parameter doesn’t have an impact, when
    status is “On Hold”. |

    | Custom Fields | String | No | Specify a json object containing the custom fields
    that need to be added. Note: you need to provide the API names of the keys. |
  ai_short_description: >-
    Updates an existing ticket in Zoho Desk with new information such as status, priority,
    assignee, and custom fields.
