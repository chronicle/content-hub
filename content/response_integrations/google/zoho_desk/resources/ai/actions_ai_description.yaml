Get Refresh Token:
  ai_description: >-
    ### General Description

    This action is a utility designed to facilitate the OAuth2 authentication process
    for the Zoho Desk integration. Its primary purpose is to exchange a temporary
    authorization code for a long-lived refresh token. This refresh token is then
    used by other actions in the integration to maintain a valid session without manual
    intervention. This action is typically run once during the initial setup of the
    integration.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Authorization Link | String | Yes | The specific Zoho OAuth2 token endpoint
    URL. This varies based on the Zoho region (e.g., .com, .eu, .in). Default is `https://accounts.zoho.{region}/oauth/v2/token`.
    |

    | Authorization Code | String | Yes | The temporary authorization code generated
    via the Zoho Developer Console after authorizing the application. |


    ### Additional Notes

    *   **Prerequisite:** Before running this action, the user must have registered
    a 'Self-Client' or 'Server-based Application' in the Zoho Developer Console to
    obtain the Client ID, Client Secret, and the Authorization Code.

    *   **Outcome:** The resulting refresh token must be manually copied and pasted
    into the 'Refresh Token' field of the Zoho Desk Integration Configuration in Google
    SecOps.


    ### Flow Description

    1.  **Parameter Extraction:** The action retrieves the Client ID and Client Secret
    from the integration's global configuration and the Authorization Link and Code
    from the action's input parameters.

    2.  **Token Request:** It performs a POST request to the provided Authorization
    Link, sending the Client ID, Client Secret, and Authorization Code with the `grant_type`
    set to `authorization_code`.

    3.  **Response Handling:** The action parses the JSON response from Zoho. If successful,
    it extracts the `refresh_token`.

    4.  **Result Reporting:** The refresh token is added to the action's result JSON
    and displayed in the output message for the user to copy.
