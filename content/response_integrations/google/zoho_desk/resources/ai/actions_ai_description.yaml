Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Zoho Desk with specified details such as title, description,
    department, and contact. This action allows for detailed ticket configuration,
    including setting priorities, classifications, assignees (agents or teams), and
    custom fields.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The title/subject of the ticket. |

    | Description | String | Yes | The detailed description of the ticket content.
    |

    | Department Name | String | Yes | The name of the department where the ticket
    will be created. |

    | Contact | String | Yes | The email address of the contact associated with the
    ticket. |

    | Assignee Type | Dropdown | No | Specifies if the ticket should be assigned to
    an 'Agent' or a 'Team'. |

    | Assignee Name | String | No | The name or email of the agent/team. Required
    if 'Assignee Type' is selected. |

    | Priority | Dropdown | No | The priority level (Low, Medium, High). |

    | Classification | Dropdown | No | The classification type (Question, Problem,
    Feature, etc.). |

    | Channel | Dropdown | No | The communication channel (Email, Phone, Web, etc.).
    |

    | Category | String | No | The category for the ticket. |

    | Sub Category | String | No | The sub-category for the ticket. |

    | Due Date | String | No | The due date in ISO 8601 format (e.g., 2022-07-06T07:05:43Z).
    |

    | Custom Fields | String | No | A JSON object containing API names and values
    for custom fields. |


    ### Additional Notes

    - If **Assignee Type** is set to 'Agent' or 'Team', the **Assignee Name** parameter
    becomes effectively mandatory for the action to successfully assign the ticket.

    - The **Custom Fields** parameter must be a valid JSON string.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves all input parameters and validates the
    'Custom Fields' JSON if provided.

    2. **Entity Resolution**: The action performs several lookups to resolve names/emails
    into Zoho Desk IDs:
        - Searches for the **Department ID** based on the provided name.
        - Searches for the **Contact ID** based on the provided email.
        - If an assignee is specified, searches for the **Agent ID** or **Team ID**.
    3. **Ticket Creation**: Sends a POST request to the Zoho Desk API with the resolved
    IDs and ticket metadata.

    4. **Result Handling**: Returns the full JSON representation of the created ticket
    and marks the action as successful.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
