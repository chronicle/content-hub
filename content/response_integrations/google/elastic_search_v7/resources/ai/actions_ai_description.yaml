Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to an Elasticsearch server. This action is used to ensure
    that the Google SecOps platform can successfully communicate with the target Elasticsearch
    instance using the provided configuration, including authentication and SSL settings.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The URL of the Elasticsearch server (e.g., `https://10.0.0.1:9200`).
    |

    | Username | String | No | The username used for basic authentication. |

    | Password | String | No | The password used for basic authentication. |

    | API Token | String | No | The API Key used for authentication as an alternative
    to username/password. |

    | Authenticate | Boolean | Yes | If set to `True`, the action will attempt to
    authenticate using the provided credentials. |

    | Verify SSL | Boolean | Yes | If set to `True`, the action will verify the SSL
    certificate of the Elasticsearch server. |

    | CA Certificate File | String | No | A base64 encoded CA certificate file used
    for SSL verification. |


    ### Additional Notes

    - This action is a diagnostic tool and does not process or enrich entities.

    - Either a combination of `Username`/`Password` or an `API Token` should be provided
    if `Authenticate` is enabled.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the server address, authentication
    credentials, and SSL configuration from the integration settings.

    2. **Manager Initialization**: It initializes the `ElasticsearchManager` with
    the provided connection details.

    3. **Connectivity Test**: The manager executes a `test_connectivity` call, which
    internally performs an `info()` request to the Elasticsearch API to verify the
    service is reachable and responding.

    4. **Result Reporting**: The action returns a success message and a boolean status
    (`True`/`False`) indicating whether the connection was successful.
