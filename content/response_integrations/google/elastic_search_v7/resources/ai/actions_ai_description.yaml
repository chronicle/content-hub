Advanced ES Search:
  ai_description: >-
    ### General Description

    The **Advanced ES Search** action enables users to perform complex, time-bounded
    searches against an Elasticsearch cluster using Lucene query syntax. This action
    is specifically designed for scenarios where time-range filtering is required,
    allowing for precise data retrieval from specific indices. It is ideal for log
    analysis, forensic investigations, and threat hunting within a defined temporal
    window.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Index** | String | No | The Elasticsearch index or index pattern to search
    (e.g., `smp_logs-*`). Defaults to `*`. |

    | **Query** | String | No | The search query in Lucene syntax (e.g., `level:error
    AND user:admin`). Defaults to `*`. |

    | **Limit** | Integer | No | The maximum number of documents to return. Default
    is `100`. |

    | **Display Field** | String | No | A comma-separated list of specific fields
    to include in the results. Defaults to `*` (all fields). |

    | **Search Field** | String | No | The default field to search if the query doesn't
    specify one. Defaults to `_all`. |

    | **Timestamp Field** | String | No | The field name used for time-based filtering.
    Defaults to `@timestamp`. |

    | **Oldest Date** | String | No | The start of the time range. Supports ISO 8601
    strings or Elasticsearch date-math (e.g., `now-1d`). |

    | **Earliest Date** | String | No | The end of the time range. Supports ISO 8601
    strings or Elasticsearch date-math (e.g., `now`). |


    ### Additional Notes

    - This action does not operate on specific entities within a case; it performs
    a global search based on the provided parameters.

    - If both **Oldest Date** and **Earliest Date** are left empty, no time-based
    filtering will be applied to the query.

    - Results are automatically flattened and presented as a Data Table for easier
    visualization.


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Elasticsearch server using
    the provided Server Address, credentials (API Token or Username/Password), and
    SSL/TLS settings.

    2. **Parameter Extraction**: Retrieves search parameters including the index pattern,
    Lucene query, and time-range constraints from the action configuration.

    3. **Query Construction**: Builds a search request using the `elasticsearch-dsl`
    library, incorporating the Lucene query string and specifying the target fields.

    4. **Time Range Application**: If provided, applies a range filter to the specified
    `Timestamp Field` using the `Oldest Date` (greater-than-or-equal) and `Earliest
    Date` (less-than-or-equal) values.

    5. **Execution**: Executes the search against the Elasticsearch instance and retrieves
    the hits up to the defined `Limit`.

    6. **Data Processing**: Flattens the nested JSON results and formats them into
    a CSV-compatible structure.

    7. **Output**: Adds a Data Table to the case results and provides the raw JSON
    data for downstream playbook tasks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table containing the search results to the action output in the
      Google SecOps case.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
