Simple ES Search:
  ai_description: >-
    ### General Description

    Searches through Elasticsearch indices using Lucene query syntax. This action
    allows for broad data retrieval from an Elasticsearch cluster without time range
    constraints. It is designed for general-purpose querying where the user specifies
    the index pattern, the query string, and a result limit. The retrieved documents
    are flattened and presented as a data table within the case and as a raw JSON
    result for downstream processing.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Index | String | No | The index name or pattern (e.g., 'logs-*') to search.
    Defaults to '*' (all indices). |

    | Query | String | No | The Lucene query string (e.g., 'status:error'). Defaults
    to '*' (all records). |

    | Limit | Integer | No | The maximum number of documents to return. Defaults to
    100. |


    ### Additional Notes

    - This action does not support time-range filtering. For time-sensitive searches,
    use the 'Advanced ES Search' action.

    - The action does not process specific entities from the case; it performs a global
    search based on the provided parameters.


    ### Flow Description

    1. **Authentication**: Connects to the Elasticsearch server using the provided
    configuration (API Token or Username/Password) and validates SSL settings.

    2. **Parameter Retrieval**: Extracts the 'Index', 'Query', and 'Limit' parameters
    from the action input.

    3. **Execution**: Executes the Lucene query against the specified Elasticsearch
    indices using the `simple_es_search` method.

    4. **Data Processing**: Flattens the resulting JSON documents into a flat dictionary
    structure for better readability.

    5. **Output Generation**: Constructs a CSV-formatted data table from the flattened
    results and attaches it to the action.

    6. **Completion**: Returns the raw JSON results and a success message indicating
    the number of hits found.
