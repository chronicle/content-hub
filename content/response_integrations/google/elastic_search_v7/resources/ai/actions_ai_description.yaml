DSL Search:
  ai_description: >-
    ### General Description

    The **DSL Search** action allows users to execute complex queries against an ElasticSearch
    cluster using the ElasticSearch Domain Specific Language (DSL). It is primarily
    used for threat hunting, log retrieval, or data correlation within a SOAR workflow.
    The action retrieves documents based on the provided query and index pattern,
    supporting both authenticated and unauthenticated connections.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Index** | String | No | The specific index or wildcard pattern (e.g., `smp_logs-*`)
    to search within. Defaults to `*` (all indices). |

    | **Query** | String | No | A valid JSON-formatted DSL query. If set to `*`, the
    action performs a default search for documents from the last 24 hours using a
    predefined boolean range filter. |

    | **Limit** | Integer | No | The maximum number of documents to retrieve from
    the search results. Defaults to 100. |


    ### Flow Description

    1. **Initialization**: The action extracts connection details (Server Address,
    Credentials, SSL settings) and search parameters (Index, Query, Limit).

    2. **Authentication**: It establishes a connection to the ElasticSearch server
    using either an API Token or Username/Password credentials.

    3. **Query Execution**: The action sends the DSL query to the specified ElasticSearch
    index. If the query is `*`, it applies a default 24-hour lookback. It handles
    pagination to ensure the requested `Limit` of results is reached.

    4. **Data Processing**: Retrieved documents are parsed and flattened into a simplified
    dictionary format.

    5. **Output Generation**: The action constructs a CSV-formatted data table from
    the results and attaches it to the case wall. It also returns the raw JSON results
    for use in subsequent playbook steps.


    ### Additional Notes

    - The action defaults to a 24-hour search window only when the `Query` parameter
    is exactly `*`.

    - SSL verification and CA certificate files are supported for secure environments.
