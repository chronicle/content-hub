    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action adds an IP address to a block list in iBoss, which acts as a secure
      web gateway/proxy. This directly aligns with the 'Add IOC To Blocklist' expected
      outcome, as it updates security controls to prevent future interaction with
      the IOC. It does not perform enrichment, ticket management, or other unrelated
      outcomes.
