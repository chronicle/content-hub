Add IP to Policy Block List:
  ai_description: >-
    ### General Description

    Adds an IP address to a specific policy block list within the iBoss security platform.
    This action enables automated network security enforcement by pushing IP-based
    blocking rules to the iBoss infrastructure, helping to mitigate threats from identified
    malicious indicators.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration parameters (API
    credentials, endpoints) and action-specific parameters (Category ID, Priority,
    Direction, etc.) from the SOAR platform.

    2. **Entity Filtering**: The action iterates through the `target_entities` and
    filters for entities of type `ADDRESS`.

    3. **Validation**: It validates the provided `Category ID` against the iBoss system
    to ensure it is associated with a valid block list.

    4. **API Interaction**: For each valid IP entity, the action performs a `PUT`
    request to the iBoss API (`/json/controls/policyLayers/urls`) to add the IP to
    the specified block list with the provided configuration (priority, direction,
    ports, etc.).

    5. **Entity Update**: Upon successful execution, the action updates the entity's
    `additional_properties` with the `policy_blocked` flag and marks the entity as
    enriched (`is_enriched = True`).

    6. **SOAR Update**: Finally, the action calls `siemplify.update_entities` to persist
    these changes within the SOAR platform.


    ### Additional Notes

    This action requires valid iBoss API credentials. The action supports optional
    parameters such as Start Port, End Port, Note, and a flag to treat the IP as a
    Regular Expression. If the API call fails for a specific entity, the action logs
    the error and continues processing remaining entities.
  ai_short_description: >-
    Adds an IP address to a specific policy block list in the iBoss security platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds the IP address to the specified policy block list in the iBoss system via
      a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to an external system (iBoss) to modify block
      list configurations (external mutation). It also updates the SOAR entity's internal
      properties (is_enriched, additional_properties) using `siemplify.update_entities`.
