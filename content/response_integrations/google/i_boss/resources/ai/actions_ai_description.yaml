Add URL to Policy Block List:
  ai_description: >-
    ### General Description

    This action adds a specified URL or Hostname to an iBoss policy block list. It
    allows security analysts to enforce network-level blocking for malicious indicators
    directly from the SOAR platform, ensuring that traffic to the specified URL is
    restricted according to the configured policy category.


    ### Flow Description

    1. The action extracts configuration parameters (API roots, credentials) and action
    parameters (Category ID, Priority, Direction, etc.).

    2. It initializes the `IBossManager` to handle API communication.

    3. It performs a GET request to validate that the provided `Category ID` is associated
    with a block list.

    4. It iterates through the target entities, filtering for `URL` and `HOSTNAME`
    types.

    5. For each valid entity, it performs a PUT request to the iBoss API to add the
    URL to the specified policy block list.

    6. Upon success, it updates the entity within the SOAR platform by setting `is_enriched`
    to true and adding a `policy_blocked` enrichment property.

    7. Finally, it updates the entities in the SOAR platform and returns a summary
    of the operation.


    ### Additional Notes

    - The action supports optional parameters like `Start Port`, `End Port`, `Note`,
    `Is Regular Expression`, and `Strip Scheme` to refine the block list entry.

    - If the `Category ID` is not a block list, the action will fail with a `ListIsNotBlockListException`.

    - The action updates the entity's `additional_properties` with the `policy_blocked`
    flag to track the blocking status within the case.
