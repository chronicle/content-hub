      a block list, which mutates external data. It does not fetch contextual data
      for enrichment. Internally, it updates the processed entities' additional properties
      to indicate they are no longer blocked, which mutates internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by removing an IP from a block list, so it
      cannot be an Enrichment action. It restores access rather than mitigating a
      threat, so it does not strictly fit the Remediation category.
    remediation: false
