Add IP to Policy Block List:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to a policy block list in iBoss. This action
    initiates a state change on the external device to prevent network traffic to
    or from the specified IP.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates if the specified category ID is associated with a block list in iBoss
    via an API call.

    3. Iterates over target entities of type ADDRESS.

    4. For each IP, sends a PUT request to the iBoss API to add it to the block list
    with the specified priority, direction, ports, and notes.

    5. Updates the entity's additional properties to indicate it was blocked and marks
    it as enriched.

    6. Saves the updated entities to the case.

    7. Returns a summary message indicating successful and failed block operations.


    ### Additional Notes

    Requires a valid Category ID associated with a block list in iBoss.
  ai_short_description: >-
    Adds specific IP address entities to a policy block list in iBoss to prevent network
    traffic to or from the specified IP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds the specified IP addresses to a policy block list in iBoss.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the entity's additional properties with a policy blocked flag and sets
      it as enriched.
    reasoning: >-
      The action validates the block list category and then makes a PUT request to
      the iBoss API to add the IP address to the block list, which mutates external
      data. It does not fetch contextual enrichment data. It updates the internal
      entity's additional properties to reflect the blocked status and calls `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      a list comprehension: `[entity for entity in siemplify.target_entities if entity.entity_type
      == EntityTypes.ADDRESS]`. This means it explicitly targets ADDRESS entities
      and filters them by their `entity_type` attribute.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: true
    contain_host: false
    create_ticket: false
