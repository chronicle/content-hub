URL Lookup:
  ai_description: >-
    ### General Description

    Performs a URL lookup in iBoss for URL and Hostname entities to retrieve categorization
    and action details. This action enriches the entities with the retrieved threat
    intelligence and categorization data.


    ### Flow Description

    1. Extracts the `Group ID` action parameter.

    2. Filters the target entities to include only URL and Hostname entity types.

    3. Iterates through the filtered entities and sends a POST request to the iBoss
    API (`json/controls/urlLookup`) to fetch lookup data for each entity's identifier.

    4. If data is successfully retrieved, it formats the categories, action, and message
    into enrichment data.

    5. Updates the entity's `additional_properties` with the enrichment data and marks
    the entity as enriched.

    6. Saves the updated entities back to the platform and attaches the raw JSON results
    to the action's output.


    ### Additional Notes

    If no `Group ID` is specified, the iBoss API will use the "Default" group for
    the lookup.
