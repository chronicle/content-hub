Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the iBoss server using the provided configuration parameters.
    This action verifies that the integration is correctly configured and can successfully
    communicate with the iBoss API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Cloud API Root`,
    `Account API Root`, `Username`, `Password`, and `Verify SSL` from the integration
    settings.

    2. It initializes the `IBossManager` using these credentials to establish a session.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the iBoss API ping endpoint (`/json/preferences/time`).

    4. The response is validated to ensure the server is reachable and the credentials
    are valid.

    5. The action logs the success or failure of the connection and terminates with
    the appropriate execution status.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data enrichment or state-changing operations.
