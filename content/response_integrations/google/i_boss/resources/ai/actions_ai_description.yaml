  ai_description: >-
    Removes IP address entities from a specified policy block list category in iBoss.


    ### General Description

    This action integrates with iBoss to remove specific IP addresses from a designated
    policy block list category. It validates the category, processes the target IP
    entities, and updates the entities in Google SecOps to reflect that they are no
    longer blocked.


    ### Flow Description

    1. Validates if the provided Category ID is associated with a block list in iBoss.

    2. Iterates through the target entities, filtering for IP addresses (`ADDRESS`).

    3. For each IP address, sends a request to iBoss to remove it from the specified
    block list category, using the optional start and end ports if provided.

    4. Updates the entity's additional properties in Google SecOps to indicate it
    is no longer blocked by the policy (`POLICY_BLOCKED_ENRICHMENT_NAME: "False"`).


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Category ID | True | String | Specify from which policy category do you want
    to remove the IP. |

    | Start Port | False | String | Specify the start port related to the IP that
    needs to be deleted. This parameter is mandatory if the desired IP has a defined
    start port in iBoss. |

    | End Port | False | String | Specify the end port related to the IP that needs
    to be deleted. This parameter is mandatory if the desired IP has a defined end
    port in iBoss. |


    ### Additional Notes

    - The action only processes entities of type `ADDRESS`.

    - If an IP has a defined start or end port in iBoss, the corresponding port parameters
    must be provided for the removal to be successful.
