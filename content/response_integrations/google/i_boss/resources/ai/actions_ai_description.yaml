URL Lookup:
  ai_description: >-
    Performs a URL lookup against the iBoss service to retrieve categorization, policy,
    and reputation information for specified entities. This action allows analysts
    to verify the security posture of URLs or hostnames within the iBoss environment.


    ### Flow Description

    1. The action extracts configuration parameters including API roots, credentials,
    and SSL verification settings.

    2. It extracts the optional `Group ID` parameter to specify the lookup context.

    3. It filters the target entities, processing only those of type `URL` or `HOSTNAME`.

    4. For each valid entity, the action calls the `manager.url_lookup` method, which
    performs a POST request to the iBoss API.

    5. The retrieved data (categories, action, message) is parsed and added to the
    entity's `additional_properties`.

    6. The action marks the entities as enriched (`is_enriched = True`) and updates
    them in the SOAR platform using `siemplify.update_entities`.

    7. The results are returned as a JSON object for display in the SOAR interface.


    ### Additional Notes

    This action requires valid iBoss API credentials. If no `Group ID` is provided,
    the "Default" group is used. The action does not modify external system state;
    it is strictly an enrichment and data retrieval operation.
