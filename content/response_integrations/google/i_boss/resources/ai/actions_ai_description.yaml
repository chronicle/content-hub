  ai_description: >-
    Adds a URL or Hostname to a specified policy block list category in iBoss.


    ### General Description

    This action iterates over URL and Hostname entities and adds them to a specified
    policy block list category in iBoss. It allows configuring the priority, direction,
    ports, and whether the URL should be treated as a regular expression. Upon successful
    blocking, the action updates the entity's additional properties with a 'policy_blocked'
    flag.


    ### Flow Description

    1. Validates if the provided Category ID corresponds to a block list.

    2. Iterates over target entities of type URL and Hostname.

    3. Optionally strips the scheme from the URL.

    4. Adds the URL/Hostname to the iBoss policy block list using the provided parameters.

    5. Updates the successfully blocked entities with a 'policy_blocked' enrichment
    flag.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Category ID | String | True | Specify to which policy category you want to add
    the URL. |

    | Priority | String | True | Specify priority of the URL that needs to be blocked.
    |

    | Direction | Dropdown | True | Specify what is the direction of the URL (Destination,
    Source, Destination and Source). |

    | Start Port | String | False | Specify the start port related to the URL that
    needs to be blocked. Note: if only 'Start Port' or 'End Port' is specified, the
    value will be added to both action parameters. |

    | End Port | String | False | Specify the end port related to the URL that needs
    to be blocked. Note: if only 'Start Port' or 'End Port' is specified, the value
    will be added to both action parameters. |

    | Note | String | False | Add a note related to the URL that needs to be blocked.
    |

    | Is Regular Expression | Boolean | False | If enabled, URL will be considered
    as a regular expression. |

    | Strip Scheme | Boolean | False | If enabled, action will strip the scheme related
    to the URL. |
