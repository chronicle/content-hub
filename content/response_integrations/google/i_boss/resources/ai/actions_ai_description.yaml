  ai_description: >-
    Adds an IP address to a specified policy block list category in iBoss.


    ### Flow Description

    1. Validates if the provided Category ID corresponds to a block list in iBoss.

    2. Iterates over all target entities of type ADDRESS.

    3. Adds the IP address to the block list in iBoss using the provided parameters.

    4. Updates the entity's additional properties to indicate it was blocked and marks
    it as enriched.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Category ID | String | Yes | Specify to which policy category you want to add
    the IP. |

    | Priority | String | Yes | Specify priority of the IP that needs to be blocked.
    |

    | Direction | Dropdown | Yes | Specify what is the direction of the IP (Destination,
    Source, Destination and Source). |

    | Start Port | String | No | Specify the start port related to the IP that needs
    to be blocked. |

    | End Port | String | No | Specify the end port related to the IP that needs to
    be blocked. |

    | Note | String | No | Add a note related to the IP that needs to be blocked.
    |

    | Is Regular Expression | Boolean | No | If enabled, IP will be considered as
    a regular expression. |


    ### Additional Notes

    If only "Start Port" or "End Port" is specified, the value will be added to both
    action parameters.
