    a regular expression. |
Add URL to Policy Block List:
  ai_description: >-
    ### General Description

    Adds URL and Hostname entities to a specified policy block list category in iBoss.
    This action initiates a state change on the external iBoss system to prevent network
    traffic to or from the specified entities.


    ### Flow Description

    1. Validates if the provided `Category ID` corresponds to a valid block list in
    iBoss via an API GET request.

    2. Iterates over the target entities, filtering for URL and Hostname entity types.

    3. Optionally strips the scheme (e.g., `http://`, `https://`) from the URL if
    the `Strip Scheme` parameter is enabled.

    4. Makes a PUT request to the iBoss API (`/json/controls/policyLayers/urls`) to
    add the entity to the block list with the specified priority, direction, ports,
    and notes.

    5. Enriches successfully blocked entities with a custom property (`IBOSS_policy_blocked:
    True`) indicating they were blocked.

    6. Updates the entities in the SecOps platform to reflect the new enrichment data.


    ### Additional Notes

    - The action will fail if the specified `Category ID` is not associated with a
    block list.

    - If only `Start Port` or `End Port` is specified, the value will be applied to
    both port parameters during the API request.
