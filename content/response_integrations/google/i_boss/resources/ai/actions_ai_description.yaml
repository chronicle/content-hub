    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the entity's additional properties with a 'policy_blocked' flag.
    reasoning: >-
      The action does not fetch contextual data for enrichment. It mutates external
      data by making a PUT request to add a URL or Hostname to a block list in iBoss.
      It mutates internal data by updating the entity's additional properties with
      a 'policy_blocked' flag and calling update_entities.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding an IOC to a block list, so it cannot
      be an enrichment action. It performs network-based remediation by blocking URLs
      and Hostnames, so it is a remediation action.
    remediation: true
  entity_usage:
