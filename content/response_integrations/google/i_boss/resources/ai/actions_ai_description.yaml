Remove URL from Policy Block List:
  ai_description: >-
    ### General Description

    Removes a URL from a specific policy block list in the iBoss system. This action
    allows security analysts to manage block list entries by removing URLs that are
    no longer required to be blocked.


    ### Flow Description

