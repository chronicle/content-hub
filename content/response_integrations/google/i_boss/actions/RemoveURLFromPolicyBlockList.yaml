name: Remove URL from Policy Block List
description: Remove URL from iBoss Block List.
integration_identifier: IBoss
parameters:
-   name: Category ID
    default_value: 1001
    type: string
    description: Specify from which policy category do you want to remove the URL.
    is_mandatory: true
-   name: Start Port
    default_value: ''
    type: string
    description: Specify start port related to the URL that needs to be deleted. This
        parameter is mandatory, if the desired URL has a defined start port. This
        is an IBoss limitation.
    is_mandatory: false
-   name: End Port
    default_value: ''
    type: string
    description: Specify end port related to the URL that needs to be deleted. This
        parameter is mandatory, if the desired URL has a defined end port. This is
        an IBoss limitation.
    is_mandatory: false
-   name: Strip Scheme
    default_value: false
    type: boolean
    description: If enabled, action will strip the scheme related to the URL.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
