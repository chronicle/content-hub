name: List Policy Block List Entries
description: Return iBoss Block List entries in a specific group.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/iboss#list_policy_block_list_entries
integration_identifier: IBoss
parameters:
-   name: Category ID
    default_value: 1001
    type: string
    description: Specify in which policy category do you want to list Block List entries.
    is_mandatory: true
-   name: Max Entries to Return
    default_value: 50
    type: string
    description: Specify how many entries to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_policy_block_list_entries_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
