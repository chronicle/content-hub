name: Add IP to Policy Block List
description: Add IP to iBoss Block List.
integration_identifier: IBoss
parameters:
-   name: Category ID
    default_value: 1001
    type: string
    description: Specify to which policy category you want to add the IP.
    is_mandatory: true
-   name: Priority
    default_value: 50
    type: string
    description: Specify priority of the IP that needs to be blocked.
    is_mandatory: true
-   name: Direction
    default_value: Destination
    type: ddl
    optional_values:
    - Destination
    - Source
    - Destination and Source
    description: Specify what is the direction of the IP.
    is_mandatory: true
-   name: Start Port
    default_value: ''
    type: string
    description: 'Specify the start port related to the IP that needs to be blocked.
        Note: if only "Start Port" or "End Port" is specified, the value will be added
        to both action parameters.'
    is_mandatory: false
-   name: End Port
    default_value: ''
    type: string
    description: 'Specify the end port related to the IP that needs to be blocked.
        Note: if only "Start Port" or "End Port" is specified, the value will be added
        to both action parameters.'
    is_mandatory: false
-   name: Note
    default_value: ''
    type: string
    description: Add a note related to the IP that needs to be blocked.
    is_mandatory: false
-   name: Is Regular Expression
    default_value: false
    type: boolean
    description: If enabled, IP will be considered as a regular expression.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
