    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Check Point Cloud Guard API to verify
      connectivity. It does not fetch contextual data for alerts/entities, mutate
      external data, mutate internal data, update entities, create insights, modify
      alert data, or create case comments.
