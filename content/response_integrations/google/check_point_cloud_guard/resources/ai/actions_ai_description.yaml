Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Check Point Cloud Guard server using the provided integration
    configuration parameters. This action is typically used to verify that the integration
    credentials and network access are correctly configured.


    ### Flow Description

    1. Extracts the integration-level configuration parameters (API Key ID, API Key
    Secret, and Verify SSL).

    2. Initializes the Dome9Manager with the provided credentials.

    3. Makes an API call (`GET /Settings`) to the Check Point Cloud Guard server to
    test connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any specific entities or action parameters to run.
  ai_short_description: >-
    Tests connectivity to the Check Point Cloud Guard server to verify integration
    credentials and network access.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
