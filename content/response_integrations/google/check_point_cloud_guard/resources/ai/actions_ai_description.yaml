Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Check Point Cloud Guard (Dome9) API to ensure the integration
    is correctly configured and that the provided credentials are valid.


    ### Flow Description

    1. The action extracts the `API Key ID`, `API Key Secret`, and `Verify SSL` configuration
    parameters from the integration settings.

    2. It initializes the `Dome9Manager` client using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the `/Settings` endpoint of the Check Point Cloud Guard API.

    4. The response is validated to confirm successful authentication and connectivity.

    5. The action returns a success or failure status based on the API response.


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration settings.
    It does not interact with entities or modify any data.
  ai_short_description: >-
    Tests connectivity to the Check Point Cloud Guard API to verify integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by making a GET request to the API.
      It does not fetch contextual data, mutate external or internal data, update
      entities, create insights, or modify alert data.
