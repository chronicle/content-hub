name: Report As False Positive
description: 'Report entities in Anomali ThreatStream as false positive. Supported
    entities: Hash, URL, IP Address, Email Address (user entity that matches email
    regex).'
integration_identifier: AnomaliThreatStream
parameters:
-   name: Reason
    default_value: ''
    type: string
    description: Specify the reason why you want to mark entities as false positives.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify additional information related to your decision regarding
        marking the entity as false positive.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL", "USERUNIQNAME"]}'
