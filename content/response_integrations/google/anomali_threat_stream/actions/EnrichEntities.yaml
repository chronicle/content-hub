name: Enrich Entities
description: 'Retrieve information about entities from Anomali ThreatStream. Supported
    entities: Hash, URL, IP Address, Email Address (user entity that matches email
    regex), Hostname, Domain.'
integration_identifier: AnomaliThreatStream
parameters:
-   name: Severity Threshold
    default_value: Low
    type: ddl
    optional_values:
    - Very High
    - High
    - Medium
    - Low
    description: Specify what should be the severity threshold for the entity, in
        order to mark it as suspicious. If multiple records are found for the same
        entity, action will take the highest severity out of all available records.
    is_mandatory: true
-   name: Confidence Threshold
    default_value: ''
    type: string
    description: 'Specify what should be the confidence threshold for the entity,
        in order to mark it as suspicious. Note: Maximum is 100. If multiple records
        are found for the entity, action will take the average. Active records have
        priority.'
    is_mandatory: true
-   name: Ignore False Positive Status
    default_value: false
    type: boolean
    description: If enabled, action will ignore the false positive status and mark
        the entity as suspicious based on the "Severity Threshold" and "Confidence
        Threshold". If disabled, action will never label false positive entities as
        suspicious, regardless, if they pass the "Severity Threshold" and "Confidence
        Threshold" conditions or not.
    is_mandatory: false
-   name: Add Threat Type To Case
    default_value: false
    type: boolean
    description: 'If enabled, action will add threat types of the entity from all
        records as tags to the case. Example: apt'
    is_mandatory: false
-   name: Create Insight
    default_value: false
    type: boolean
    description: If enabled, action will add an insight per processed entity.
    is_mandatory: true
-   name: Only Suspicious Entity Insight
    default_value: false
    type: boolean
    description: If enabled, action will create insight only for entities that exceeded
        the "Severity Threshold" and "Confidence Threshold".
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: false
creator: Admin
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL", "USERUNIQNAME"]}'
