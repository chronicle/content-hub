Add Tags To Entities:
  ai_description: >-
    ### General Description

    Adds tags to existing indicators in Anomali ThreatStream for specific entity types.
    This action allows security analysts to label and categorize threat intelligence
    data directly from Google SecOps, facilitating better organization and tracking
    of indicators within the ThreatStream platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tags to be added to the indicators
    in Anomali ThreatStream. |


    ### Flow Description

    1. **Initialization**: Extracts the integration configuration (API credentials)
    and the 'Tags' action parameter.

    2. **Entity Filtering**: Identifies supported entities from the case, including
    File Hashes, IP Addresses, URLs, and User entities that match an email format.

    3. **Indicator Retrieval**: Queries the Anomali ThreatStream API to fetch existing
    indicator details for the identified entities to obtain their internal indicator
    IDs.

    4. **Tag Application**: For every entity successfully matched to an existing indicator
    in ThreatStream, the action sends a POST request to append the specified tags.

    5. **Reporting**: Returns a summary message indicating which entities were successfully
    tagged and which entities could not be found in the Anomali ThreatStream database.


    ### Additional Notes

    * This action only applies tags to entities that **already exist** as indicators
    in Anomali ThreatStream. It does not create new indicators.

    * User entities are only processed if their identifier matches a standard email
    regex pattern.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specified tags to existing indicators in Anomali ThreatStream via a POST
      request to the tagging endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
