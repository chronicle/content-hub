Submit Observables:
  ai_description: >-
    ### General Description

    This action submits observables (IP addresses, URLs, File Hashes, and Email Addresses)
    to the Anomali ThreatStream platform. It allows security analysts to contribute
    intelligence to their organization's private repository or the public community.
    The action supports detailed configuration of the intelligence metadata, including
    classification, threat types, TLP levels, and sharing with specific Trusted Circles.
    After submission, the action polls the Anomali API to ensure the import session
    is approved and provides a direct link to the review page for each submitted entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Classification** | String | Yes | Specifies the classification of the observable
    (e.g., 'Public' or 'Private'). |

    | **Threat Type** | String | Yes | Specifies the threat category (e.g., APT, Malware,
    Phish, Bot). |

    | **Source** | String | No | The intelligence source name (defaults to 'Siemplify').
    |

    | **Expiration Date** | Integer | No | The number of days until the observable
    expires. If empty, it never expires. |

    | **Trusted Circle IDs** | String | No | Comma-separated list of IDs for Trusted
    Circles to share the intelligence with. |

    | **TLP** | String | No | The Traffic Light Protocol level (Red, Green, Amber,
    White). |

    | **Confidence** | Integer | No | A confidence score (0-100) for the observable.
    |

    | **Override System Confidence** | Boolean | No | If true, the provided 'Confidence'
    value will override the system's default. |

    | **Anonymous Submission** | Boolean | No | If true, the submission will be made
    anonymously. |

    | **Tags** | String | No | Comma-separated list of tags to attach to the observable.
    |


    ### Additional Notes

    - **Permissions:** Requires "Org admin", "Create Anomali Community Intel", and
    "Approve Intel" permissions in Anomali ThreatStream.

    - **Email Support:** User entities are processed as email observables only if
    their identifier matches a standard email regex.

    - **Polling:** The action includes a built-in polling mechanism that waits for
    the import session to reach an 'approved' status before completing.


    ### Flow Description

    1. **Initialization:** Extracts integration configuration (API keys, roots) and
    action parameters.

    2. **Entity Filtering:** Identifies supported entities (IP, URL, Hash, Email)
    from the target list.

    3. **Submission:** For each valid entity, it sends a POST request to Anomali's
    `/api/v2/intelligence/import/` endpoint with the specified metadata.

    4. **Status Polling:** It retrieves the import session ID and enters a loop, calling
    the `/api/v1/importsession/` endpoint until the job is approved or the action
    times out.

    5. **Reporting:** Adds an entity-specific table containing a direct link to the
    Anomali review page and outputs a summary JSON of approved and excluded jobs.
