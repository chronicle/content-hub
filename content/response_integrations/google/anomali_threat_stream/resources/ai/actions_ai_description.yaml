Report As False Positive:
  ai_description: >-
    ### General Description

    The **Report As False Positive** action allows analysts to mark specific entities
    as false positives within the Anomali ThreatStream platform. This action is used
    to update the status of threat indicators in the external threat intelligence
    system based on manual verification, effectively reducing noise for future detections.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Reason** | String | Yes | The justification for marking the entity as a false
    positive (e.g., 'False Detection', 'Internal Traffic'). |

    | **Comment** | String | Yes | Additional context or detailed notes regarding
    the decision to mark the entity as a false positive. |


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration (API
    credentials) and the action parameters (**Reason** and **Comment**).

    2. **Entity Filtering**: It identifies suitable entities from the current case.
    Supported types include File Hashes, IP Addresses, URLs, and User entities that
    match a standard email format.

    3. **Indicator Retrieval**: The action queries Anomali ThreatStream to find existing
    indicator records corresponding to the target entities.

    4. **Reporting**: For every entity found in ThreatStream, the action sends a POST
    request to the `/api/v1/falsepositive/report/` endpoint, providing the indicator
    ID, the specified reason, and the comment.

    5. **Completion**: The action tracks successful and failed reports and provides
    a summary message to the analyst via the case wall.


    ### Additional Notes

    - This action only works for entities that already exist as indicators in Anomali
    ThreatStream.

    - User entities are only processed if their identifier matches a standard email
    regex pattern.
