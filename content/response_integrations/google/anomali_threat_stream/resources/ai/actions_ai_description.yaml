Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches multiple entity types including IP Addresses, URLs, Domains, File Hashes,
    Hostnames, and Email Addresses using threat intelligence from Anomali ThreatStream.
    The action retrieves indicator details, calculates risk based on severity and
    confidence thresholds, and provides contextual data through entity tables and
    insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Severity Threshold | String (Dropdown) | Yes | The minimum severity level (Very
    High, High, Medium, Low) required to mark an entity as suspicious. |

    | Confidence Threshold | Integer | Yes | The minimum confidence score (0-100)
    required to mark an entity as suspicious. |

    | Ignore False Positive Status | Boolean | No | If enabled, the action will evaluate
    thresholds even for indicators marked as 'False Positive' in ThreatStream. |

    | Add Threat Type To Case | Boolean | No | If enabled, threat types (e.g., 'apt',
    'bot') found in the indicators will be added as tags to the case. |

    | Create Insight | Boolean | Yes | If enabled, creates a detailed HTML insight
    for each processed entity. |

    | Only Suspicious Entity Insight | Boolean | Yes | If enabled, insights will only
    be generated for entities that meet the suspicious thresholds. |


    ### Additional Notes

    - **Email Support:** User entities are only processed if their identifier matches
    a valid email format.

    - **Validation:** Entities containing spaces in their identifiers are automatically
    skipped.

    - **Aggregation:** If multiple indicators are found for a single entity, the action
    uses the highest severity and the average confidence of active records.


    ### Flow Description

    1. **Initialization:** Validates the provided Severity and Confidence thresholds.

    2. **Entity Filtering:** Identifies supported entities (IP, URL, Domain, Hash,
    Hostname, Email) and filters out invalid identifiers (e.g., those containing spaces).

    3. **Data Retrieval:** Fetches indicator data from Anomali ThreatStream for all
    supported entities in a single batch request.

    4. **Processing & Enrichment:** For each entity, it matches retrieved indicators,
    updates entity attributes with metadata, and adds a data table containing indicator
    details.

    5. **Risk Assessment:** Compares the indicator's severity and confidence against
    the user-defined thresholds to determine if the entity should be marked as suspicious.

    6. **Contextual Analysis:** Fetches additional analysis links and specific intel
    details (e.g., VirusTotal or DomainTools classifications) for the entities.

    7. **Internal Updates:** Optionally adds threat-type tags to the case and creates
    detailed insights (IP, URL, Domain, Hash, or Email specific) based on configuration.

    8. **Finalization:** Updates all enriched entities within Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with threat intelligence, marks entities as suspicious
      based on thresholds, adds threat-type tags to the case, and creates detailed
      entity insights.
  categories:
