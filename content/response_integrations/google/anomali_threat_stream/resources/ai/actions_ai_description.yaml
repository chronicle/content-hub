Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Anomali ThreatStream server. It ensures that the provided
    configuration parameters (credentials and URLs) are correct and that the network
    path is open.


    ### Parameters Description

    This action does not take any dynamic input parameters during execution. It relies
    entirely on the integration's configuration settings:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Web Root** | String | Yes | The base URL for the Anomali ThreatStream web
    interface. |

    | **Api Root** | String | Yes | The base URL for the Anomali ThreatStream API.
    |

    | **Email Address** | String | Yes | The username/email address used for API authentication.
    |

    | **API Key** | String | Yes | The API key associated with the provided email
    address. |

    | **Verify SSL** | Boolean | Yes | Determines whether to verify the SSL certificate
    of the Anomali server. |


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting connection issues.

    - It performs a simple `GET` request to the `/api/v2/intelligence/` endpoint with
    a limit of 1 to minimize data transfer while confirming access.


    ### Flow Description

    1. **Parameter Extraction**: The script retrieves the connection details (URLs,
    credentials, and SSL settings) from the integration configuration.

    2. **Manager Initialization**: It initializes the `AnomaliManager` with the `force_check_connectivity`
    flag set to `True`.

    3. **Connectivity Test**: The manager executes a `GET` request to the Anomali
    ThreatStream API's intelligence endpoint.

    4. **Validation**: The script validates the HTTP response. If the status code
    indicates success (e.g., 200 OK), the action completes successfully.

    5. **Error Handling**: If the request fails (e.g., due to invalid credentials,
    incorrect URLs, or network timeouts), an exception is caught, and the action reports
    a failure with the specific error message.
