Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves related threat intelligence associations from Anomali ThreatStream for
    specific entities within a case. This action allows analysts to pivot from basic
    observables (IPs, URLs, Hashes, Emails) to higher-level threat constructs such
    as Campaigns, Actors, Malware, and TTPs. It provides a comprehensive view of the
    threat landscape associated with the indicators, including detailed metadata and
    top-level statistics for related IOCs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Return Campaigns | Boolean | No | If enabled, fetches related campaigns and
    their details. |

    | Return Threat Bulletins | Boolean | No | If enabled, fetches related threat
    bulletins. |

    | Return Actors | Boolean | No | If enabled, fetches related actors and their
    details. |

    | Return Attack Patterns | Boolean | No | If enabled, fetches related attack patterns.
    |

    | Return Courses Of Action | Boolean | No | If enabled, fetches related courses
    of action. |

    | Return Identities | Boolean | No | If enabled, fetches related identities. |

    | Return Incidents | Boolean | No | If enabled, fetches related incidents. |

    | Return Infrastructure | Boolean | No | If enabled, fetches related infrastructure.
    |

    | Return Intrusion Sets | Boolean | No | If enabled, fetches related intrusion
    sets. |

    | Return Malware | Boolean | No | If enabled, fetches related malware. |

    | Return Signatures | Boolean | No | If enabled, fetches related signatures. |

    | Return Tools | Boolean | No | If enabled, fetches related tools. |

    | Return TTPs | Boolean | No | If enabled, fetches related TTPs. |

    | Return Vulnerabilities | Boolean | No | If enabled, fetches related vulnerabilities.
    |

    | Create Campaign Entity | Boolean | No | If enabled, creates a THREATCAMPAIGN
    entity for found associations. |

    | Create Actors Entity | Boolean | No | If enabled, creates a THREATACTOR entity
    for found associations. |

    | Create Signature Entity | Boolean | No | If enabled, creates a THREATSIGNATURE
    entity for found associations. |

    | Create Vulnerability Entity | Boolean | No | If enabled, creates a CVE entity
    for found associations. |

    | Create Case Tag | Boolean | No | If enabled, adds association names as case
    tags. |

    | Create Insight | Boolean | No | If enabled, creates a case insight with the
    results. |

    | Max Associations To Return | Integer | No | Max associations to return per type
    (Default: 5). |

    | Max Statistics To Return | Integer | No | Max top statistics regarding IOCs
    to return (Default: 3). |


    ### Additional Notes

    - **Asynchronous Execution:** This action runs asynchronously, meaning it will
    continue to process in the background until all association details are retrieved
    or the execution deadline is reached.

    - **Entity Support:** Email addresses are supported when provided as USER entities
    that match a standard email regex.

    - **Statistics Limit:** The action processes a maximum of 1000 IOCs related to
    an association to generate statistics.


    ### Flow Description

    1. **Entity Identification:** The action filters the case entities to find supported
    types: IP Addresses, URLs, File Hashes, and Emails.

    2. **Indicator Retrieval:** It queries Anomali ThreatStream to find the internal
    indicator IDs corresponding to the identified entities.

    3. **Association Discovery:** For each enabled association type (e.g., Actors,
    Campaigns), it fetches the IDs of related associations linked to the indicators.

    4. **Detail Enrichment:** The action enters an asynchronous loop to retrieve detailed
    metadata and IOC statistics (countries, types, sources, severities) for every
    discovered association.

    5. **Case Population:** Upon completion, it adds a summary data table and raw
    JSON results to the case. If configured, it also creates new entities, adds case
    tags based on association names, and generates a detailed case insight.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action can create new entities in the case (Campaigns, Actors, Signatures,
      Vulnerabilities), add tags to the case based on association names, and generate
      case insights.
  categories:
