Remove Tags From Entities:
  ai_description: >-
    ### General Description

    Removes specified tags from indicators in Anomali ThreatStream for supported entities.
    This action allows security analysts to manage and clean up metadata associated
    with threat intelligence indicators directly from the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tags | String | Yes | A comma-separated list of tags that should be removed
    from the indicators associated with the entities in Anomali ThreatStream. |


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the configuration parameters
    (API credentials) and the list of tags to be removed from the action parameters.

    2. **Entity Filtering**: It filters the target entities to identify those supported
    by the action: FileHash, Address (IP), DestinationURL, and User (if the identifier
    matches an email format).

    3. **Indicator Retrieval**: The action queries Anomali ThreatStream to find existing
    indicators corresponding to the identifiers of the suitable entities.

    4. **Tag Identification**: For each found indicator, it checks if any of the user-provided
    tags are currently assigned to it.

    5. **Tag Removal**: If matching tags are found, the action sends a DELETE request
    to the Anomali API to remove each specific tag from the indicator.

    6. **Result Compilation**: The action generates a summary message detailing which
    tags were successfully removed, which were already missing, and which entities
    were not found in ThreatStream.


    ### Additional Notes

    - This action performs external mutations by deleting tags from the Anomali ThreatStream
    platform.

    - User entities are only processed if their identifier matches a standard email
    regex.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes specific tags from indicators in Anomali ThreatStream via DELETE requests
      to the platform's API.
