Get Related Entities:
  ai_description: >-
    Retrieves related entities and indicators from Anomali ThreatStream based on associations
    linked to the entities present in the Google SecOps case. This action acts as
    a pivot tool, discovering connected infrastructure, malware, or actors by traversing
    ThreatStream's threat model.


    ### Flow Description:

    1. **Entity Identification**: The action identifies supported entities in the
    case, including IP Addresses, File Hashes, URLs, Emails (User entities), CVEs,
    and Threat Actors.

    2. **Indicator Retrieval**: For standard entities (IP, Hash, URL, Email), it fetches
    the corresponding Indicator IDs from Anomali.

    3. **Association Discovery**: It searches for associations (such as Campaigns,
    Malware, Incidents, or TTPs) linked to those indicators based on the enabled 'Search'
    parameters.

    4. **Model-Based Search**: For CVE and Threat Actor entities, it searches the
    Anomali threat model directly by name/identifier to find related associations.

    5. **Indicator Expansion**: For every discovered association, the action retrieves
    all other indicators (IPs, Domains, URLs, etc.) that share that association, filtered
    by the specified confidence threshold.

    6. **Aggregation**: The results are aggregated into a structured JSON object containing
    lists of related IPs, Domains, URLs, Emails, and Hashes.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Confidence Threshold | Integer | Yes | The minimum confidence score (0-100)
    required for a related indicator to be included in the results. |

    | Search [Type] | Boolean | No | A series of 14 boolean flags (e.g., Search Actors,
    Search Malware) that determine which association types in ThreatStream are traversed
    to find related data. Defaults to True. |

    | Max Entities To Return | Integer | No | Limits the number of related entities
    returned per type (e.g., max 50 IPs). Default is 50. |


    ### Additional Notes:

    - This action does not automatically update entity fields or create insights;
    it provides the raw related data in the action's JSON result for use in subsequent
    playbook steps.
  capabilities:
