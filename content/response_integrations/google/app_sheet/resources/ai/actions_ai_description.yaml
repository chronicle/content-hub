  ai_description: >-
    ### General Description

    The `Add Record` action is used to add a new record to a specified table in AppSheet.
    It takes a JSON object representing the record and inserts it into the target
    table.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Table Name | Yes | String | The name of the table in AppSheet where the record
    will be added. |

    | Record JSON Object | Yes | String | The JSON object representing the record
    to be added. |


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, App ID, Access
    Token, Verify SSL).

    2. Extracts the action parameters (Table Name, Record JSON Object).

    3. Initializes the AppSheetManager to handle API requests.

    4. Calls the AppSheet API to add the record to the specified table using the provided
    JSON object.

    5. Returns the added record details as a JSON result and completes the action
    execution.
