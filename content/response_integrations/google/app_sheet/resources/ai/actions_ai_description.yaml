List Tables:
  ai_description: >-
    ### General Description

    This action retrieves a list of available tables from a specified AppSheet application.
    It allows users to filter the results by table name and limit the number of returned
    tables.


    ### Flow Description

    1. Extracts the integration configuration and action parameters.

    2. Initializes the AppSheet API client.

    3. Makes a GET request to the AppSheet API (`/api/v2/apps/{app_id}/tables/`) to
    fetch all available tables for the configured App ID.

    4. Applies filtering to the retrieved tables based on the `Filter Logic` (Equal
    or Contains) and `Filter Value` parameters.

    5. Truncates the list of tables to the specified `Max Tables To Return`.

    6. Outputs the final list of tables as a JSON result and a data table within the
    SecOps platform.


    ### Additional Notes

    If no `Filter Value` is provided, all tables up to the specified maximum limit
    will be returned.
