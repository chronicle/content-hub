List Tables:
  ai_description: >-
    ### General Description

    Lists available tables within a specified AppSheet application. This action retrieves
    the table structure from the AppSheet API, allowing users to filter the results
    by name and limit the number of returned entries.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts necessary configuration parameters,
    including the API Root, App ID, Access Token, and SSL verification settings.

    2. **Parameter Extraction**: It retrieves action-specific parameters: `Filter
    Logic` (Equal/Contains), `Filter Value`, and `Max Tables To Return`.

    3. **API Interaction**: The action initializes the `AppSheetManager` and performs
    a GET request to the AppSheet API endpoint (`/api/v2/apps/{app_id}/tables/`) to
    retrieve the list of tables.

    4. **Filtering and Limiting**: The retrieved list is filtered based on the provided
    `Filter Logic` and `Filter Value`. The result set is then truncated to the specified
    `Max Tables To Return` limit.

    5. **Output Generation**: The final list of tables is formatted as a CSV table
    and a JSON object, which are then added to the action results.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within AppSheet
    or the SOAR platform.
