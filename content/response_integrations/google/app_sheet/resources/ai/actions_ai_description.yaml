Delete Record:
  ai_description: >-
    ### General Description

    Deletes a specific record from a table in AppSheet. This action interacts with
    the AppSheet API to remove a record based on the provided table name and the record's
    unique identifier.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Root, App ID,
    Access Token, and SSL verification settings.

    2. It extracts the action-specific parameters: `Table Name` and `Record JSON Object`.

    3. The `AppSheetManager` is initialized with the provided configuration.

    4. The action calls the `delete_record` method, which constructs a POST request
    to the AppSheet API endpoint (`/api/v2/apps/{app_id}/tables/{table_name}/Action`)
    with the action set to "Delete" and the provided record details.

    5. The API response is validated, and the result of the deletion operation is
    returned to the SOAR platform.


    ### Additional Notes

    The `Record JSON Object` parameter must contain the unique identifier (ID) of
    the record to be deleted. This action performs a state-changing operation on the
    external AppSheet system.
