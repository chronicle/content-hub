  ai_description: >-
    Searches for records in a specified table within AppSheet.


    ### General Description

    This action retrieves data from an AppSheet table based on a provided selector
    query. It interacts with the AppSheet API using the 'Find' action and returns
    the matching records as JSON and a structured data table.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Table Name | Yes | String | Specify the name of the table for which you want
    to retrieve details. |

    | Selector Query | No | String | Specify the selector query, which will be used
    to limit results. If nothing is provided, the action will return all records.
    |


    ### Flow Description

    1. Retrieves configuration parameters (API Root, App ID, Access Token, Verify
    SSL) and action parameters (Table Name, Selector Query).

    2. Calls the AppSheet API to search for records in the specified table using the
    'Find' action.

    3. If records are found, they are parsed and added to the action's JSON result.

    4. A data table is created containing the retrieved records.

    5. Returns a success or failure message based on the execution result.
