    ### General Description

    Tests connectivity to the AppSheet server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters including API Root, App ID, Access
    Token, and Verify SSL.

    2. Initializes the AppSheetManager with the extracted parameters.

    3. Makes an HTTP GET request to the AppSheet API (`/api/v2/apps/{app_id}/tables`)
    to verify connectivity.

    4. Returns a success message if the connection is established and the response
    is valid, or a failure message if an error occurs.


    ### Additional Notes

    This action is primarily used for validating integration settings and does not
