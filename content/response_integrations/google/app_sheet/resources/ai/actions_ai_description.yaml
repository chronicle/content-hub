  ai_description: >-
    Deletes a specific record from a table in AppSheet.


    ### General Description

    This action initiates a state change on the external AppSheet application by removing
    a specified record from a given table. It uses the AppSheet API to execute a 'Delete'
    action based on the provided JSON object containing the record's unique identifier.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Table Name | Yes | String | The name of the table from which the record should
    be deleted. |

    | Record JSON Object | Yes | String | The JSON object representing the record
    to be deleted. You only need to provide the unique identifier key (e.g., 'ID')
    of the record. |


    ### Flow Description

    1. Extracts the AppSheet configuration and action parameters.

    2. Parses the provided `Record JSON Object` into a valid JSON structure.

    3. Constructs a payload with the 'Delete' action and sends a POST request to the
    AppSheet API.

    4. Validates the response and returns the details of the deleted record as a JSON
    result.
