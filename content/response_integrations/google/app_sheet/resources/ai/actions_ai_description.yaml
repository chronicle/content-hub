Search Records:
  ai_description: >-
    ### General Description

    Searches for records within a specified table in AppSheet using a selector query.
    This action allows users to retrieve specific data entries from an AppSheet application
    to support investigation or data gathering workflows.


    ### Flow Description

    1. The action initializes the `AppSheetManager` using configuration parameters:
    `API Root`, `App ID`, `Access Token`, and `Verify SSL`.

    2. It extracts the `Table Name` and the optional `Selector Query` from the action
    parameters.

    3. The action calls the `search_records` method of the `AppSheetManager`, which
    performs a POST request to the AppSheet API with the action set to "Find" and
    the provided selector query.

    4. If records are found, the action adds the retrieved records as a JSON result
    and constructs a data table for the action output.

    5. If no records are found, the action returns a message indicating that no records
    matched the criteria.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in AppSheet
    or the SOAR platform.
