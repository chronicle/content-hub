Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AppSheet server using the provided configuration parameters.
    This action verifies that the integration is correctly configured and can successfully
    communicate with the AppSheet API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `App
    ID`, `Access Token`, and `Verify SSL`.

    2. It initializes the `AppSheetManager` with these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the AppSheet API endpoint (`/api/v2/apps/{app_id}/tables`).

    4. The response is validated to ensure the connection is successful.

    5. The action returns a success or failure message based on the outcome of the
    connectivity test.


    ### Additional Notes

    This action does not perform any data manipulation or entity updates. It is strictly
    used for troubleshooting and verifying integration connectivity.
