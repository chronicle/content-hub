  ai_description: >-
    Lists available tables in an AppSheet application.


    ### Flow Description

    1. Initializes the AppSheet manager with the provided API root, App ID, and access
    token.

    2. Fetches the list of tables from the AppSheet API.

    3. Applies filtering based on the `Filter Logic` and `Filter Value` parameters.

    4. Limits the number of returned tables based on the `Max Tables To Return` parameter.

    5. Adds the results to the action's JSON output and creates a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Logic | Dropdown | No | Specify what filter logic should be applied.
    Options are 'Equal' or 'Contains'. |

    | Filter Value | String | No | Specify what value should be used in the filter.
    If 'Equal' is selected, the action will try to find the exact match among results.
    If 'Contains' is selected, the action will try to find results that contain that
    substring. If nothing is provided, the filter will not be applied. |

    | Max Tables To Return | Integer | No | Specify how many tables to return. Default
    is 50. |
