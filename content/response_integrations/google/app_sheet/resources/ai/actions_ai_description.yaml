Add Record:
  ai_description: >-
    ### General Description

    Adds a new record to a specified table in AppSheet. This action allows users to
    programmatically insert data into their AppSheet applications by providing the
    target table name and the record data in JSON format.


    ### Flow Description

    1. Extracts the `Table Name` and `Record JSON Object` parameters provided by the
    user.

    2. Validates and parses the `Record JSON Object` to ensure it is a properly formatted
    JSON string.

    3. Initiates a POST request to the AppSheet API (`/api/v2/apps/{app_id}/tables/{table_name}/Action`)
    with the action type set to "Add".

    4. Retrieves the response from AppSheet and attaches the newly created record
    details to the action's JSON result.

    5. Outputs a success or failure message based on the API response.


    ### Additional Notes

    Ensure that the provided JSON object strictly matches the schema and column requirements
    of the target AppSheet table. Invalid JSON structures or missing mandatory fields
    required by the AppSheet table will result in an execution failure.
  ai_short_description: >-
    Adds a new record to a specified table in AppSheet by sending a POST request with
    the record's JSON payload.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new record to a specified table in the external AppSheet application.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the AppSheet API to add a new record,
      which mutates external data. It does not fetch contextual enrichment data, mutate
      internal SecOps data, update entities, create insights, modify alerts, or create
      case comments.
