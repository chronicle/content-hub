Add Record:
  ai_description: >-
    ### General Description

    Adds a new record to a specified table in AppSheet.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `App ID`, `Access Token`, `Verify
    SSL`) and action parameters (`Table Name`, `Record JSON Object`).

    2. Initializes the `AppSheetManager` with the provided configuration.

    3. Parses the `Record JSON Object` string into a JSON object.

    4. Sends a POST request to the AppSheet API endpoint (`/api/v2/apps/{app_id}/tables/{table_name}/Action`)
    with the action set to "Add" and the record data in the payload.

    5. Validates the API response.

    6. Returns the result of the operation.


    ### Additional Notes

    The action requires a valid AppSheet API configuration and a properly formatted
    JSON object for the record.
  ai_short_description: >-
    Adds a new record to a specified table in AppSheet.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new record to the specified table in the AppSheet application.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the AppSheet API to add a record, which
      constitutes an external data mutation. It does not fetch data, update internal
      entities, or modify alert/case data.
