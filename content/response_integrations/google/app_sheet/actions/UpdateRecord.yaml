name: Update Record
description: Update a record in a table in AppSheet.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/appsheet#update_record
integration_identifier: AppSheet
parameters:
-   name: Table Name
    default_value: ''
    type: string
    description: Specify the name of the table in which you want to update a record.
    is_mandatory: true
-   name: Record JSON Object
    default_value: ''
    type: string
    description: Specify the JSON object of the record that needs to be updated. You
        need to provide the "ID" of the record and fields that you want to update.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/update_record_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
