name: Search Records
description: Search records in a table in AppSheet.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/appsheet#search_records
integration_identifier: AppSheet
parameters:
-   name: Table Name
    default_value: ''
    type: string
    description: Specify the name of the table for which you want to retrieve details.
    is_mandatory: true
-   name: Selector Query
    default_value: ''
    type: string
    description: Specify the selector query, which will be used to limit results.
        If nothing is provided, action will return all records.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_records_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
