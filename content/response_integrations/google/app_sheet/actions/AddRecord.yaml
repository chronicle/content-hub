name: Add Record
description: Add a record to a table in AppSheet.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/appsheet#add_record
integration_identifier: AppSheet
parameters:
-   name: Table Name
    default_value: ''
    type: string
    description: Specify the JSON object of the record that needs to be updated. You
        need to provide the unique identifier key and fields that you want to update.
    is_mandatory: true
-   name: Record JSON Object
    default_value: ''
    type: string
    description: Specify the JSON object of the record that needs to be added.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_record_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
