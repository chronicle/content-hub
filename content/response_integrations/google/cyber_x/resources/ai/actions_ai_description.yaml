    Fetches a list of network connections for specific devices (endpoints) from CyberX.


    ### General Description

    This action queries the CyberX platform to retrieve active or historical network
    connections associated with specific endpoints. It targets IP addresses and hostnames,
    resolves them to their corresponding CyberX device IDs, and then fetches the connection
    details, which are attached to the action results as entity tables.


    ### Parameters Description

    This action does not require any input parameters.


    ### Flow Description

    1. Filters the target entities to include only `ADDRESS` and `HOSTNAME` entity
    types.

    2. Iterates over the filtered entities and queries CyberX to resolve each entity's
    identifier to a specific Device ID.

    3. Uses the resolved Device ID to fetch the list of connections for that device.

    4. Formats the retrieved connection data and attaches it as an entity table to
    the respective entity in the action results.
