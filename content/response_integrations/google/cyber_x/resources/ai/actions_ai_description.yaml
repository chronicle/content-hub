Enrich Endpoints:
  ai_description: "Enriches Hostname and Address entities using CyberX. This action\
    \ retrieves detailed device information from the CyberX platform to provide context\
    \ about endpoints within the network. \n\n### Flow Description:\n1. **Authentication**:\
    \ Initializes the CyberX manager using the API Root and Access Token provided\
    \ in the integration configuration.\n2. **Entity Filtering**: Identifies all Address\
    \ (IP) and Hostname entities within the current scope.\n3. **Data Retrieval**:\
    \ For each identified entity, the action queries the CyberX API to find a matching\
    \ device record. \n4. **Enrichment**: If a device is found, the action adds a\
    \ data table to the entity containing the raw device information and updates the\
    \ entity's additional properties with the retrieved data, prefixed with 'CX_'.\n\
    \n### Parameters Description:\n| Parameter Name | Description | Type | Mandatory\
    \ | \n| :--- | :--- | :--- | :--- |\n| None | This action does not have any specific\
    \ input parameters; it relies on the integration's global configuration. | N/A\
    \ | N/A |\n\n### Additional Notes:\n* This action performs a lookup against all\
    \ devices known to the CyberX instance. If a large number of devices exist, performance\
    \ may be impacted by the underlying API call to fetch all devices."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with device metadata retrieved from CyberX
      and adds entity data tables.
  categories:
    enrichment: true
