Get Alerts:
  ai_description: "### General Description\nThe **Get Alerts** action retrieves a\
    \ comprehensive list of all security alerts currently detected by the CyberX XSense\
    \ platform. This action provides visibility into external security events by pulling\
    \ them into the Google SecOps environment for analysis and reporting.\n\n### Parameters\
    \ Description\nThere are no input parameters for this action. It utilizes the\
    \ global integration configuration (API Root and Access Token) to authenticate\
    \ and communicate with the CyberX API.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the CyberX manager using the provided API credentials\
    \ and SSL settings.\n2. **Data Retrieval**: It executes a GET request to the `/api/v1/alerts`\
    \ endpoint to fetch the full list of alerts from the CyberX instance.\n3. **Data\
    \ Processing**: If alerts are found, the action flattens the JSON response and\
    \ formats it into a CSV-compatible structure.\n4. **Output Generation**: \n  \
    \  * A data table titled 'Result Alerts' is added to the action results for display\
    \ in the SOAR UI.\n    * The raw JSON data of all alerts is returned as the script\
    \ result.\n    * An output message is generated stating the total number of alerts\
    \ retrieved.\n\n### Additional Notes\nThis is a global retrieval action and does\
    \ not operate on specific entities within a case."
