  ai_description: "### General Description\nThe **Get Alerts** action retrieves a\
    \ comprehensive list of all security alerts detected by the CyberX XSense platform.\
    \ This action is primarily used for visibility and reporting, allowing security\
    \ analysts to pull the current state of alerts from the CyberX environment into\
    \ Google SecOps for further review or documentation.\n\n### Parameters Description\n\
    There are no input parameters for this action.\n\n### Additional Notes\nThis action\
    \ does not operate on specific entities; it performs a global fetch of all alerts\
    \ available in the CyberX system. The results are presented both as a formatted\
    \ data table and as a raw JSON object.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the CyberX manager using the API Root, Access Token,\
    \ and SSL verification settings from the integration configuration.\n2. **API\
    \ Request**: It executes a GET request to the CyberX `/api/v1/alerts` endpoint\
    \ to retrieve the list of alerts.\n3. **Data Processing**: \n    - If alerts are\
    \ retrieved, the action flattens the dictionary objects and constructs a CSV-formatted\
    \ data table titled \"Result ALerts\".\n    - It calculates the total count of\
    \ alerts found for the output message.\n4. **Output**: The action returns the\
    \ count of alerts in the execution summary and provides the full list of alerts\
    \ in JSON format for use in downstream playbook steps."
