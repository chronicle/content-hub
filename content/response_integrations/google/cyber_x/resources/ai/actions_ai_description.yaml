  ai_description: >-
    ### General Description

    The **Get Device Vulnerability Report** action retrieves detailed vulnerability
    information for specific endpoints (Hostnames or IP Addresses) from the CyberX
    platform. This action provides security analysts with immediate context regarding
    the security posture and known weaknesses of devices involved in an alert, helping
    to prioritize response efforts based on the risk level of the affected assets.


    ### Parameters Description

    There are no additional parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `HOSTNAME` and `ADDRESS` (IP)
    entities within the current case scope.

    2. **Data Retrieval**: It performs a single API call to fetch the complete list
    of device vulnerability reports from the CyberX platform.

    3. **Matching Logic**:
        * For **IP Address** entities, the action iterates through the reports to
    find a match within the `ipAddresses` field.
        * For **Hostname** entities, the action searches for a match against the `name`
    field of the reports.
    4. **Enrichment**: If a matching report is found, the vulnerability data is flattened
    and attached to the specific entity as an **Entity Table** within the Google SecOps
    interface.

    5. **Reporting**: The action concludes by summarizing which entities were successfully
    enriched and reporting any errors encountered during the process.
