    This action retrieves a list of network connections for specific endpoints (IP
    addresses or Hostnames) from the CyberX platform. It helps security analysts understand
    the network activity and communication patterns of a device by fetching its connection
    history and displaying it directly within the Google SecOps entity context as
    a data table.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    * The action requires a valid API Root and Access Token configured in the CyberX
    integration settings.

    * It supports both IP Address (ADDRESS) and Hostname (HOSTNAME) entity types.


