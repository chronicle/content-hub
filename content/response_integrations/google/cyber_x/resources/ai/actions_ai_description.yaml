Get Events:
  ai_description: >-
    ### General Description

    The **Get Events** action retrieves a comprehensive list of events reported to
    the CyberX event log. This action is designed to provide visibility into system
    activities and historical logs within the CyberX platform, facilitating auditing
    and monitoring workflows.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - This action is a global fetch operation and does not target specific entities
    within a case.

    - The retrieved events are automatically flattened and presented in a data table
    for easier analysis.


    ### Flow Description

    1. **Connection**: The action establishes a connection to the CyberX API using
    the configured API Root and Access Token.

    2. **Data Retrieval**: It performs a GET request to the `/api/v1/events` endpoint
    to fetch all available event logs.

    3. **Data Transformation**: The resulting event data is processed and flattened
    using utility functions to ensure compatibility with tabular displays.

    4. **Reporting**: If events are found, they are added to a data table titled 'Result
    Events'.

    5. **Completion**: The action concludes by providing a summary message of the
    number of events found and returning the raw JSON data.
