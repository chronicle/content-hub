  ai_description: >-
    ### General Description

    Enriches **Hostname** and **IP Address** entities with comprehensive device information
    retrieved from the CyberX platform. This action helps security analysts gain visibility
    into OT/IoT devices by providing context such as device type, vendor, and operating
    system directly within the Google SecOps environment.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    The action enriches entities by adding custom properties prefixed with `CX_` and
    attaching a detailed data table to each successfully matched entity.


    ### Flow Description

    1. **Initialization**: Establishes a connection to the CyberX API using the integration's
    configuration (API Root and Access Token).

    2. **Entity Filtering**: Identifies all Hostname and IP Address entities within
    the current alert context.

    3. **Data Retrieval**: For each entity, it queries the CyberX API to find matching
    device records based on the IP address or hostname.

    4. **Enrichment**:
        - Updates the entity's `additional_properties` with the flattened device data.
        - Adds a formatted data table to the entity for quick reference in the UI.
    5. **Reporting**: Summarizes the enrichment results and logs any errors encountered
    during the process.
