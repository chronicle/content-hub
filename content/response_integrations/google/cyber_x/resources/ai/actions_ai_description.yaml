  ai_description: >-
    ### General Description

    Enriches Hostname and Address entities using the CyberX platform. This action
    retrieves detailed device information, such as device metadata, from CyberX to
    provide context about endpoints within the network. It helps analysts understand
    the nature of the devices involved in an alert by populating entity properties
    and adding a data table to the entity.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | None | This action does not have any specific input parameters; it relies on
    the integration's global configuration. | N/A | N/A |


    ### Flow Description

    1. **Authentication**: Initializes the CyberX manager using the API Root and Access
    Token provided in the integration configuration.

    2. **Entity Filtering**: Iterates through the `target_entities` and filters for
    entities of type `ADDRESS` (IP) and `HOSTNAME`.

    3. **Data Retrieval**: For each valid entity, the action queries the CyberX API
    to find a matching device record using either the IP address or the hostname.

    4. **Enrichment**: If a device record is found, the action:
        * Adds a data table to the entity containing the raw device information.
        * Updates the entity's `additional_properties` with the retrieved data, prefixed
    with 'CX_'.
    5. **Completion**: Returns a success message indicating which entities were enriched.


    ### Additional Notes

    * This action performs a lookup against all devices known to the CyberX instance.
    If a large number of devices exist, performance may be impacted by the underlying
    API call to fetch all devices.
