    1. **Entity Filtering**: The action identifies all target entities in the current
    context that are either IP Addresses or Hostnames.

    2. **Device Identification**: For each identified entity, the action queries the
    CyberX API to find the corresponding internal Device ID based on the IP or Hostname.

    3. **Connection Retrieval**: Once the Device ID is obtained, the action fetches
    the list of network connections associated with that device from CyberX.

    4. **Data Enrichment**: The retrieved connection data is flattened and attached
    as a data table to the respective entity in Google SecOps for easy review.
