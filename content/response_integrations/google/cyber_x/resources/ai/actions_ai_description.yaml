Get Alerts:
  ai_description: >-
    ### General Description

    Fetches a list of all alerts detected by CyberX (XSense). This action retrieves
    the alerts and presents them in a structured data table for further analysis.


    ### Flow Description

    1. Initializes the CyberX manager using the integration's API credentials.

    2. Makes an HTTP GET request to the CyberX API (`/api/v1/alerts`) to retrieve
    all available alerts.

    3. If alerts are successfully retrieved, formats the data into a flat dictionary
    and constructs a CSV data table.

    4. Attaches the data table to the action results and returns the raw alert data
    as a JSON object.


    ### Additional Notes

    This action operates globally and does not require any specific entities to execute.
