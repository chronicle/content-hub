    ### General Description

    Retrieves connection information for specific devices (identified by IP address
    or hostname) from the CyberX platform. This action provides visibility into device
    network interactions by querying the CyberX API.


    ### Flow Description

    1. Initialize the `CyberXManager` using the provided API configuration (API Root,
    Access Token, and SSL verification settings).

    2. Filter the target entities to include only `ADDRESS` and `HOSTNAME` types.

    3. For each valid entity, resolve the device ID using the CyberX API (`get_device_id_by_address`
    or `get_device_id_by_host_name`).

    4. Fetch the connection details for the resolved device ID using the CyberX API
    (`get_device_connections`).

    5. Add the retrieved connection data as an entity table to the action results.


