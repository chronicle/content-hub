Enrich Endpoints:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by retrieving device information from
    the CyberX platform. This action queries the CyberX API to gather contextual metadata
    about the specified endpoints, such as device details, and updates the entity's
    additional properties within the SOAR platform for further analysis.


    ### Flow Description

    1. The action initializes the `CyberXManager` using the integration configuration
    (API Root, Access Token, and SSL verification settings).

    2. It filters the `target_entities` list to include only `ADDRESS` and `HOSTNAME`
    types.

    3. For each valid entity, the action performs an API call to the CyberX platform:
        - If the entity is an `ADDRESS`, it calls `get_device_by_ip_address`.
        - If the entity is a `HOSTNAME`, it calls `get_device_by_host_name`.
    4. If device information is successfully retrieved:
        - The data is formatted into a table and added to the action results using
    `siemplify.result.add_entity_table`.
        - The entity's `additional_properties` are updated with the fetched data,
    prefixed with `CX_`.
    5. The action concludes by returning a summary of enriched entities and any errors
    encountered during the process.


    ### Additional Notes

    This action does not modify any external system state; it is strictly an enrichment
    operation. The data retrieved is stored within the SOAR platform as entity properties
    to provide context for analysts.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with device metadata retrieved from
    the CyberX platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from an external API (CyberX) via GET requests. It updates
      the internal entity's 'additional_properties' attribute with the retrieved data,
      which constitutes an update to entities. It does not mutate external data, create
      insights, modify alert data, or create case comments.
