Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the CyberX instance. It ensures that the provided API Root and
    Access Token are valid and that the network path is open by attempting a basic
    data retrieval operation.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the CyberX integration
    or for troubleshooting communication issues. It performs a read-only operation
    and does not impact any data within CyberX or Google SecOps.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root, Access Token,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `CyberXManager` with the retrieved
    credentials.

    3. **Connectivity Test**: The action calls the `get_all_devices` method, which
    sends a GET request to the `/api/v1/devices` endpoint of the CyberX API.

    4. **Validation**: If the API responds with a success status code, the connection
    is considered established.

    5. **Completion**: The action ends with a success message 'Connection established.'
