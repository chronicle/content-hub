Enrich Endpoints:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by retrieving endpoint information from
    CyberX. This action fetches device details from the CyberX platform and attaches
    the information to the entities in Google SecOps.


    ### Flow Description

    1. Iterates over the target entities, specifically filtering for Hostname and
    IP Address entity types.

    2. For each valid entity, makes a GET request to the CyberX API (`/api/v1/devices`)
    to retrieve a list of all devices.

    3. Filters the retrieved devices to find a match based on the entity's identifier
    (IP address or hostname).

    4. If a matching device is found, it adds an entity table containing the endpoint
    information and updates the entity's additional properties with the retrieved
    data (prefixed with `CX_`).


    ### Additional Notes

    Note that while the action modifies the entity's `additional_properties` in memory,
    it does not explicitly call `siemplify.update_entities()` to save these changes
    back to the platform. The primary output is the entity table.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving endpoint information from
    CyberX.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds an entity table with the endpoint information to the case.
    reasoning: >-
      The action fetches device data from the CyberX API using GET requests (fetches_data=true).
      It does not perform any state-changing operations on external systems (can_mutate_external_data=false).
      It mutates internal data by adding entity tables with the retrieved endpoint
      information (can_mutate_internal_data=true). It modifies entity properties in
      memory but does not explicitly call update_entities to save them (can_update_entities=false).
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
