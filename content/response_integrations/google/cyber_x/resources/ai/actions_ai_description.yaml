  ai_description: >-
    Enriches endpoint entities (IP addresses and hostnames) by fetching device information
    from CyberX.


    ### Parameters

    There are no parameters for this action.


    ### Action Flow

    1. Filters the target entities to include only IP addresses and hostnames.

    2. Iterates over the filtered entities.

    3. Fetches device information from CyberX using the entity's identifier (IP or
    hostname).

    4. If device information is found, it adds an entity table with the data and updates
    the entity's additional properties.

    5. Returns a success message with the enriched entities.
