  ai_description: >-
    ### General Description

    The **Get Device Vulnerability Report** action retrieves detailed vulnerability
    information for specific endpoints from the CyberX platform. It allows security
    analysts to see the security posture and known vulnerabilities of devices identified
    as IP addresses or Hostnames within a case, providing critical context for incident
    response and risk assessment.


    ### Parameters Description

    There are no user-configurable parameters for this action. It relies on the global
    CyberX integration configuration, specifically the **API Root**, **Access Token**,
    and **Verify SSL** settings.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the CyberX API using
    the configured credentials.

    2. **Entity Filtering**: It identifies and filters the target entities in the
    current SOAR context, focusing exclusively on `ADDRESS` (IP) and `HOSTNAME` types.

    3. **Data Retrieval**: The action performs a single GET request to the CyberX
    `/api/v1/reports/vulnerabilities/devices` endpoint to fetch the master list of
    all device vulnerability reports.

    4. **Matching Logic**: It iterates through the filtered entities and attempts
    to match each one against the retrieved reports. Matching is performed by IP address
    for `ADDRESS` entities and by device name for `HOSTNAME` entities.

    5. **Enrichment**: For every matching device found, the action flattens the vulnerability
    data and attaches it as a structured data table to the action result within the
    Google SecOps platform.


    ### Additional Notes

    If no matching reports are found for the provided entities, the action will complete
    successfully but will report that no vulnerability data was found.
