Get Connections for Endpoint:
  ai_description: >-
    ### General Description

    Retrieves a list of network connections for specific devices (endpoints) from
    CyberX. This action helps analysts understand the network activity and communication
    patterns of a given host or IP address by fetching its connection history and
    attaching it to the case.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses (`ADDRESS`) and Hostnames
    (`HOSTNAME`).

    2. For each valid entity, queries the CyberX API to resolve the entity identifier
    to a specific CyberX Device ID.

    3. Uses the retrieved Device ID to fetch the list of connections for that device
    via a GET request to the CyberX API.

    4. Formats the retrieved connection data into a CSV format and attaches it to
    the case as an entity-specific table.


    ### Additional Notes

    If a device ID cannot be found for a given entity, or if the API request fails,
    the action will log an error and proceed to the next entity.
