Get Connections for Endpoint:
  ai_description: "The **Get Connections for Endpoint** action retrieves a comprehensive\
    \ list of network connections associated with specific devices from the CyberX\
    \ platform. It supports both IP Address (ADDRESS) and Hostname (HOSTNAME) entities.\
    \ This action is primarily used for visibility and forensic investigation, allowing\
    \ analysts to see which other assets or external addresses a device has communicated\
    \ with. The retrieved data is presented as a table attached to the entity within\
    \ the case.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| N/A | N/A | N/A | This action\
    \ does not have any input parameters. |\n\n### Additional Notes\n\n* The action\
    \ first resolves the entity to a CyberX Device ID before fetching connection data.\
    \ \n* If a device is not found in CyberX for a given entity, an error will be\
    \ logged for that specific entity, but the action will continue to process others.\n\
    \n### Flow Description\n\n1. **Entity Filtering:** The action identifies all `ADDRESS`\
    \ and `HOSTNAME` entities in the current context.\n2. **Device Resolution:** For\
    \ each entity, it queries the CyberX API to find the internal `device_id` by matching\
    \ the IP address or hostname.\n3. **Connection Retrieval:** Using the resolved\
    \ `device_id`, it fetches all recorded network connections from the CyberX `/api/v1/devices/{device_id}/connections`\
    \ endpoint.\n4. **Data Presentation:** The retrieved connection data is flattened\
    \ and added as an Entity Table to the respective entity in the Google SecOps case\
    \ for analyst review."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the entity within the Google SecOps platform
      to display connection information retrieved from CyberX.
