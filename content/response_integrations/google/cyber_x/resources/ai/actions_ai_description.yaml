  ai_description: >-
    ### General Description The **Get Alerts** action retrieves a comprehensive list
    of all security alerts currently detected by the CyberX XSense platform. This
    action provides visibility into external security events by pulling them into
    the Google SecOps environment for analysis and reporting. ### Parameters Description
    No parameters are required for this action. It utilizes the global integration
    configuration (API Root and Access Token) to authenticate and communicate with
    the CyberX API. ### Flow Description 1. **Initialization**: The action initializes
    the CyberX manager using the provided API credentials and SSL settings. 2. **Data
    Retrieval**: It executes a GET request to the `/api/v1/alerts` endpoint to fetch
    the full list of alerts from the CyberX instance. 3. **Data Processing**: If alerts
    are found, the action flattens the JSON response and formats it into a CSV-compatible
    structure. 4. **Output Generation**: A data table titled 'Result Alerts' is added
    to the action results for display in the SOAR UI. The raw JSON data of all alerts
    is returned as the script result. An output message is generated stating the total
    number of alerts retrieved. ### Additional Notes This is a global retrieval action
    and does not operate on specific entities within a case.
