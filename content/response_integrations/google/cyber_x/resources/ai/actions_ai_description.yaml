  ai_description: >-
    Enriches Hostname and Address entities using CyberX. This action retrieves detailed
    device information from the CyberX platform to provide context about endpoints
    within the network, such as OS, device type, and other metadata.


    ### Flow Description:

    1. **Authentication**: Initializes the CyberX manager using the API Root and Access
    Token provided in the integration configuration.

    2. **Entity Filtering**: Identifies all Address (IP) and Hostname entities within
    the current scope.

    3. **Data Retrieval**: For each identified entity, the action queries the CyberX
    API (fetching all devices and filtering locally) to find a matching device record
    by IP or Hostname.

    4. **Enrichment**: If a device is found, the action adds a data table to the entity
    containing the raw device information and updates the entity's additional properties
    with the retrieved data, prefixed with 'CX_'.


    ### Parameters Description:

    | Parameter Name | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | None | This action does not have any specific input parameters; it relies on
    the integration's global configuration. | N/A | N/A |


    ### Additional Notes:

    * This action performs a lookup against all devices known to the CyberX instance.
    If a large number of devices exist, performance may be impacted by the underlying
    API call to fetch all devices.
