product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The cyber_x integration is an OT/ICS/SCADA security platform. It qualifies for
    the SIEM category because it provides 'Get Alerts' and 'Get Events' actions, allowing
    analysts to retrieve security alerts and event logs from the OT environment for
    visibility. It qualifies for Network Security because 'Get Connections for Endpoint'
    provides visibility into network communication patterns of assets. It qualifies
    for Vulnerability Management because 'Get Device Vulnerability Report' retrieves
    vulnerability data for assets, helping assess security posture. It qualifies for
    Asset Inventory because 'Enrich Endpoints' provides critical device metadata (vendor,
    OS, type) and 'Get Connections for Endpoint' provides context on asset activity,
    which is essential for OT asset management. It does not qualify for EDR (no process-level
    activity or host containment), Threat Intelligence (no IOC reputation enrichment),
    Email Security, IAM, Cloud Security, ITSM, or Collaboration.
  siem: true
  threat_intelligence: false
  vulnerability_management: true
