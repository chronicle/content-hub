product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The CyberX integration provides visibility into OT/IoT assets. It qualifies as
    SIEM as it retrieves alerts and events, providing activity timelines for assets.
    It qualifies as EDR as it provides deep visibility into specific hosts (OT devices),
    including network connections and device metadata, which is the OT equivalent
    of EDR. It qualifies as Network Security as it retrieves network connection data
    for endpoints, helping analyze communication patterns. It qualifies as Vulnerability
    Management as it provides specific vulnerability reports for devices. It qualifies
    as Asset Inventory as it enriches assets with detailed device metadata (vendor,
    OS, type). It does not qualify for Threat Intelligence (no reputation data), Email
    Security, IAM, Cloud Security, ITSM, or Collaboration.
  siem: true
  threat_intelligence: false
  vulnerability_management: true
