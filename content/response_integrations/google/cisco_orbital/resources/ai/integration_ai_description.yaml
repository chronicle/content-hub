product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The CiscoOrbital integration provides the capability to execute osquery commands
    on remote endpoints via the 'Execute Query' action. This functionality allows
    security analysts to perform deep, host-level investigations by retrieving process
    lists, network connections, and system configurations directly from specific workstations
    or servers. This aligns directly with the EDR (Endpoint Detection and Response)
    category, which is defined by the need to investigate specific hosts and retrieve
    deep process-level activity. The 'Ping' action is a diagnostic utility and does
    not influence the classification. The integration does not perform log aggregation
    (SIEM), threat intelligence enrichment, network blocking, or identity management,
    and therefore does not qualify for those categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
