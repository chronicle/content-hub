product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Cisco Orbital integration utilizes Osquery to perform live investigations
    on endpoints. It qualifies as EDR because it allows analysts to retrieve deep
    system-level telemetry, such as process lists and network connections, which is
    essential for host-based investigations. It also qualifies as Asset Inventory
    because the ability to execute queries on hosts allows for the enrichment of asset
    data with detailed system configuration and state information, helping to understand
    the status of internal assets.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
