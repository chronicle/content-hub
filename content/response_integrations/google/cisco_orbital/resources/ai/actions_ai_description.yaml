  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Orbital API using the provided integration configuration
    parameters.


    ### Flow Description

    1. Retrieves the API Root, Client ID, Client Secret, and Verify SSL parameters
    from the integration configuration.

    2. Initializes the Cisco Orbital Manager and generates an authentication token.

    3. Sends a GET request to the `v0/ok` endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration configuration parameters.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can successfully communicate with the Cisco Orbital platform.
