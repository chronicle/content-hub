    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check (GET request) to the Cisco Orbital
      API to validate credentials and network reachability. It does not fetch contextual
      data about alerts or entities, nor does it mutate external systems or modify
      internal SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action, which is explicitly excluded from being an enrichment
      action per the provided guidelines. It does not fetch contextual data or modify
      systems.
