Execute Query:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: true
    get_alert_information: false
    reasoning: >-
      The action executes SQL-like queries (osquery) on remote endpoints, which directly
      aligns with the 'Execute Command on the Host' category. It does not perform
      enrichment, ticket management, or alert updates.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Executes SQL-like queries (osquery) on endpoints based on IP and Hostname entities
    using Cisco Orbital. This action enables security analysts to perform live investigations
    by retrieving system information, process lists, and network connections from
    remote hosts. The action operates asynchronously, allowing for long-running queries
    to complete.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The SQL query to be executed on the target endpoints.
    |

    | Name | String | No | A custom name for the query job. If not provided, a default
    name with a GUID is used. |

    | Custom Context Fields | String | No | Key-value pairs (format: `key:value,key:value`)
    to add metadata to the job. |

    | Max Results To Return | Integer | No | The maximum number of result rows to
    retrieve (default is 100). |

    | Hide Case Wall Table | Boolean | No | If set to true, the action will not create
    a visual table in the case wall. |


    ### Flow Description

    1. **Initialization**: The action authenticates with Cisco Orbital using the provided
    credentials.

    2. **Job Submission**: It identifies relevant entities (IPs and Hostnames) from
    the alert and submits a query job to Cisco Orbital via a POST request.

    3. **Asynchronous Polling**: The action enters an asynchronous state, polling
    the job status until results are ready or the timeout is reached.

    4. **Data Retrieval**: Once the job completes, the action fetches the results
    from Cisco Orbital.

    5. **Output**: Results are attached to the action as JSON and, unless disabled,
    rendered as data tables on the case wall for each successful entity.


    ### Additional Notes

    - The action supports a maximum timeout of 24 hours. Users should adjust the IDE
    timeout value accordingly for long-running queries.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a query job to Cisco Orbital via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds result JSON and data tables to the case wall.
    reasoning: >-
      The action submits a query job to an external system (Cisco Orbital) via a POST
      request, which constitutes external data mutation. It also fetches query results
      (GET request) and adds data tables/JSON to the internal SOAR case wall, which
      constitutes internal data mutation.
  categories:
    enrichment: false
    reasoning: >-
      While the action fetches data, it also performs an external mutation by creating
      a query job in Cisco Orbital. According to the enrichment criteria, an action
      must not create, update, or delete data in any external platform to be classified
      as enrichment. Therefore, this action is not an enrichment action.
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code filters `siemplify.target_entities` to include only `ADDRESS` and `HOSTNAME`
      types using the `SUPPORTED_ENTITY_TYPES` list.
Ping:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a connectivity test ('Ping'). It does not perform enrichment,
      containment, or ticket creation. It does not match any of the specific functional
      categories provided.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Cisco Orbital\
    \ API. It validates that the integration's configuration parameters\u2014specifically\
    \ the API Root, Client ID, and Client Secret\u2014are correct and that the Cisco\
    \ Orbital service is reachable and responding to requests.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **API Root** | String | Yes | The base URL of the Cisco Orbital API instance\
    \ used for all requests. |\n| **Client ID** | String | Yes | The unique identifier\
    \ for the OAuth2 client used to authenticate with Cisco Orbital. |\n| **Client\
    \ Secret** | String | Yes | The secret key associated with the Client ID for secure\
    \ authentication. |\n| **Verify SSL** | Boolean | Yes | Determines whether the\
    \ action should verify the SSL certificate of the Cisco Orbital server. |\n\n\
    ### Additional Notes\nThis action does not interact with any entities (IPs, Hostnames,\
    \ etc.) and is strictly used for testing the integration's communication channel.\
    \ It is typically executed during the initial setup or when troubleshooting authentication\
    \ errors.\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the Siemplify environment and extracts the necessary configuration parameters\
    \ from the integration settings.\n2. **Authentication**: It attempts to obtain\
    \ an OAuth2 bearer token from the Cisco Orbital authentication endpoint using\
    \ the provided credentials.\n3. **Connectivity Test**: Upon successful authentication,\
    \ it sends a GET request to the Cisco Orbital health check endpoint.\n4. **Outcome\
    \ Reporting**: If the health check returns a successful response, the action completes\
    \ with a success message. If any step fails (authentication or connectivity),\
    \ it catches the exception and reports a failure with the specific error details."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity (fetches_data=true).
      It does not mutate external or internal data, update entities, or create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test ('Ping'). Per the instructions, Ping actions
      are not enrichment actions.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not process any entities. It does not iterate over `target_entities`
      or use entity-specific identifiers.
