Execute Query:
  ai_description: >-
    ### General Description

    Executes osquery SQL queries on endpoints based on IP Address and Hostname entities
    using Cisco Orbital. This action submits a query job to the Cisco Orbital platform
    and retrieves the execution results from the targeted endpoints.


    ### Flow Description

    1. Extracts the provided query, job name, context fields, and result limits from
    the action parameters.

    2. Filters the target entities to include only IP Addresses and Hostnames.

    3. Submits a new query job to Cisco Orbital for the targeted endpoints via a POST
    request to the `v0/query` endpoint.

    4. Periodically checks the status of the query job using a GET request to the
    `v0/jobs/{job_id}/results` endpoint (runs asynchronously).

    5. Once completed, retrieves the query results and attaches them to the action's
    JSON result.

    6. Optionally creates a case wall table displaying the query results for each
    successful entity.


    ### Additional Notes

    This action runs asynchronously. The maximum timeout allowed is 24 hours.
  ai_short_description: >-
    Executes osquery SQL queries on endpoints based on IP Address and Hostname entities
    using Cisco Orbital, and retrieves the execution results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a new query job to the Cisco Orbital platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving query results from Cisco Orbital. It mutates
      external data by submitting a new query job to the Cisco Orbital API (POST request).
      It does not mutate internal data, update entities, create insights, modify alert
      data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` (which includes ADDRESS and HOSTNAME). During the
      async continuation, it also filters entities using `entity.identifier in entities_identifiers`.
      Therefore, it targets Address and Hostname entities, filtering by entity type
      and identifier.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: true
    get_alert_information: false
    reasoning: >-
      The action executes an osquery SQL query on remote endpoints and retrieves the
      results. This aligns with the 'Execute Command on the Host' category, as it
      runs a query/command on the endpoint and returns the output.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Specify the query that needs to be executed. |

    | Name | String | No | Specify the name for the query job. If nothing is specified,
    action will use a name in the following format: Siemplify-{guid} |

    | Custom Context Fields | String | No | Specify additional custom context fields
    that should be added to the job. Format: key_1:value_1,key_2:value_1. |

    | Max Results To Return | String | No | Specify how many results should be returned.
    |

    | Hide Case Wall Table | Boolean | No | If enabled, action will not prepare a
    case wall table. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Orbital server to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Client ID, Client
    Secret, Verify SSL).

    2. Initializes the Cisco Orbital API client.

    3. Makes an API call (GET request) to the `/v0/ok` endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is intended for administrative purposes to validate integration settings
    and does not process alerts or entities.
  ai_short_description: >-
    Tests connectivity to the Cisco Orbital server using the provided integration
    configuration parameters.
