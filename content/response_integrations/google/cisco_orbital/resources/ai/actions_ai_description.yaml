  ai_description: >-
    ### General Description

    Executes SQL-like queries (osquery) on endpoints based on IP and Hostname entities
    using Cisco Orbital. This action enables security analysts to perform live investigations
    by retrieving system information, process lists, and network connections from
    remote hosts. The action operates asynchronously, allowing for long-running queries
    to complete.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The SQL query to be executed on the target endpoints.
    |

    | Name | String | No | A custom name for the query job. If not provided, a default
    name with a GUID is used. |

    | Custom Context Fields | String | No | Key-value pairs (format: `key:value,key:value`)
    to add metadata to the job. |

    | Max Results To Return | Integer | No | The maximum number of result rows to
    retrieve (default is 100). |

    | Hide Case Wall Table | Boolean | No | If set to true, the action will not create
    a visual table in the case wall. |


    ### Flow Description

    1. **Initialization**: The action authenticates with Cisco Orbital using the provided
    credentials.

    2. **Job Submission**: It identifies relevant entities (IPs and Hostnames) from
    the alert and submits a query job to Cisco Orbital via a POST request.

    3. **Asynchronous Polling**: The action enters an asynchronous state, polling
    the job status until results are ready or the timeout is reached.

    4. **Data Retrieval**: Once the job completes, the action fetches the results
    from Cisco Orbital.

    5. **Output**: Results are attached to the action as JSON and, unless disabled,
    rendered as data tables on the case wall for each successful entity.


    ### Additional Notes

    - The action supports a maximum timeout of 24 hours. Users should adjust the IDE
    timeout value accordingly for long-running queries.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds result JSON and data tables to the case wall.
    reasoning: >-
      The action fetches query results from Cisco Orbital (fetches_data=true). It
      does not perform control actions like blocking (can_mutate_external_data=false).
      It modifies internal SOAR data by adding result JSON and data tables to the
      case (can_mutate_internal_data=true). It does not update entities, create insights,
      or modify alert data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data (query results) from an external system and adds it
      to the case. It does not mutate external systems. It modifies internal SOAR
      data (case wall tables/results), which is allowed for enrichment actions as
      it does not modify existing data. Therefore, it is an enrichment action.
  entity_usage:
