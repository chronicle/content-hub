    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a Ping action designed to test connectivity to the Cisco Orbital
      API. It makes a GET request to the 'v0/ok' endpoint but does not fetch contextual
      data for alerts or entities, nor does it mutate any external or internal data.
