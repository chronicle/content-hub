    reasoning: >-
      The action is a diagnostic connectivity test. It does not perform any of the
      listed operational tasks such as enrichment, containment, ticketing, or alert
      management.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
