Execute Query:
  ai_description: "### General Description\nExecutes custom queries on endpoints using\
    \ the Cisco Orbital platform. This action allows analysts to run specific queries\
    \ against identified IP addresses or hostnames to retrieve telemetry or system\
    \ state information. It supports asynchronous execution, allowing the action to\
    \ wait for query completion within the defined timeout period.\n\n### Flow Description\n\
    1. **Initialization**: The action extracts configuration parameters (API Root,\
    \ Client ID, Client Secret, Verify SSL) and action parameters (Query, Name, Custom\
    \ Context Fields, Max Results, Hide Case Wall Table).\n2. **Entity Filtering**:\
    \ It filters the provided `target_entities` to include only `ADDRESS` and `HOSTNAME`\
    \ types.\n3. **Query Submission**: The action calls the Cisco Orbital API (`POST\
    \ v0/query`) to submit the query job for the identified endpoints.\n4. **Result\
    \ Retrieval**: It polls the Cisco Orbital API (`GET v0/jobs/{job_id}/results`)\
    \ to fetch the query results.\n5. **Data Presentation**: \n    - If results are\
    \ retrieved, it adds the raw JSON results to the action output.\n    - Unless\
    \ disabled, it constructs and adds data tables to the case wall for each successful\
    \ entity result.\n\n### Additional Notes\nThis action is asynchronous. If the\
    \ query takes time to complete, the action will wait until the execution deadline\
    \ is approached. Ensure the action timeout in the SOAR IDE is configured appropriately\
    \ for the expected query duration (up to 24 hours)."
  ai_short_description: >-
    Executes custom queries on endpoints using Cisco Orbital and retrieves the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a query job to the Cisco Orbital platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds query results to the case wall as data tables.
    reasoning: >-
      The action fetches data from Cisco Orbital (GET request) and submits a query
      job (POST request). It also mutates internal data by adding tables to the case
      wall.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them based
      on `SUPPORTED_ENTITY_TYPES`, which includes `EntityTypes.ADDRESS` and `EntityTypes.HOSTNAME`.
      It does not filter by other attributes like creation time, modification time,
      or specific entity flags.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: true
    get_alert_information: false
    reasoning: >-
      The action executes a query on endpoints (matching 'Execute Command on the Host')
      and retrieves the resulting telemetry data (matching 'Search Events'). It does
      not perform enrichment, ticket management, or identity/host containment.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: true
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Specify the query that needs to be executed. |

    | Name | String | No | Specify the name for the query job. If not specified, a
    default name is generated. |

    | Custom Context Fields | String | No | Specify additional custom context fields.
    Format: key_1:value_1,key_2:value_1. |

    | Max Results To Return | String | No | Specify the maximum number of results
    to return. |

    | Hide Case Wall Table | Boolean | No | If enabled, the action will not prepare
    a case wall table. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Orbital server to verify that the integration
    configuration parameters are correct and the service is reachable. This action
    performs a health check against the Cisco Orbital API.


    ### Flow Description

    1. The action extracts the required configuration parameters (`API Root`, `Client
    ID`, `Client Secret`, `Verify SSL`) from the integration configuration.

    2. It initializes the `CiscoOrbitalManager` using these credentials.

    3. The action calls the `test_connectivity` method, which executes an HTTP GET
    request to the `v0/ok` endpoint of the Cisco Orbital API.

    4. If the request is successful, the action returns a success message; otherwise,
    it catches the exception, logs the error, and returns a failure message.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    operations on entities, alerts, or external data systems.
  ai_short_description: >-
    Tests connectivity to the Cisco Orbital server to verify integration configuration
    settings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check (GET request) to verify the API connection.
      It does not fetch contextual data on entities/alerts, nor does it mutate any
      data.
