  ai_description: >-
    Executes queries on endpoints based on IP and Hostname entities using Cisco Orbital.


    ### General Description

    This action submits an osquery job to Cisco Orbital for specified IP and Hostname
    entities. It runs asynchronously, waiting for the query to complete on the endpoints,
    and then retrieves the results. The results are attached to the case as JSON and
    data tables.


    ### Flow Description

    1. Extracts the query and other configuration parameters.

    2. Submits a query job to Cisco Orbital for the target entities.

    3. Waits asynchronously for the job to complete on the endpoints.

    4. Retrieves the query results from Cisco Orbital.

    5. Attaches the results as JSON and optionally creates case wall data tables for
    successful entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | string | True | Specify the query that needs to be executed. |

    | Name | string | False | Specify the name for the query job. If nothing is specified,
    action will use a name in the following format: Siemplify-{guid}. |

    | Custom Context Fields | string | False | Specify additional custom context fields
    that should be added to the job. Format: key_1:value_1,key_2:value_1. |

    | Max Results To Return | string | False | Specify how many results should be
    returned. Default is 100. |

    | Hide Case Wall Table | boolean | False | If enabled, action will not prepare
    a case wall table. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new query job in Cisco Orbital to be executed on the target endpoints.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving query results from Cisco Orbital. It mutates
      external data by submitting a new query job to the Cisco Orbital API (POST request).
      It does not mutate internal data such as updating entities, creating insights,
      modifying alerts, or adding case comments; it only adds JSON results and data
      tables.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a job in an external system (Cisco Orbital) to execute a
      query on endpoints. Since it mutates external state by creating this job, it
      cannot be classified as Enrichment. It does not perform any remediation actions
      like blocking IPs or isolating hosts, so it is not Remediation.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where supported types are ADDRESS
      and HOSTNAME. It does not filter by other attributes like is_internal or is_suspicious.
