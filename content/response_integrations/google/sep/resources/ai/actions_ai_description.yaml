BlockHash:
  ai_description: >-
    ### General Description

    Blocks specific MD5 file hashes on endpoints using Symantec Endpoint Protection
    (SEP). This action adds the target hashes to a specified fingerprint blacklist
    within SEP to prevent their execution.


    ### Flow Description

    1. Retrieves the current list of blacklisted hashes from the specified SEP blacklist
    using the `Black List Name` parameter.

    2. Iterates through the target entities, filtering for File Hash entities that
    are MD5 hashes (32 characters long) and are not already present in the retrieved
    blacklist.

    3. Appends the new hashes to the blacklist and sends a POST request to the SEP
    API to update the fingerprint list.

    4. Updates the processed entities in Google SecOps with an additional property
    (`SEP_IsBlocked`: True) to indicate they were successfully blocked.


    ### Additional Notes

    Only MD5 hashes (32 characters in length) are supported by this action. Hashes
    that are already in the specified blacklist will be skipped.
  ai_short_description: >-
    Blocks MD5 file hashes on endpoints by adding them to a specified fingerprint
    blacklist in Symantec Endpoint Protection.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds the MD5 hash to the specified fingerprint blacklist in Symantec Endpoint
      Protection.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action retrieves the current blacklist from SEP, but this is to facilitate
      an update rather than fetching contextual data for enrichment, so fetches_data
      is false. It makes a POST request to SEP to update the fingerprint blacklist,
      mutating external data. It also updates the internal entities with a 'SEP_IsBlocked'
      property using siemplify.update_entities. It does not create insights, modify
      alert data, or create case comments.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
