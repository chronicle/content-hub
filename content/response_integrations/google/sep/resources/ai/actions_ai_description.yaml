      Updates the target entities' additional properties with the executed command
      ID.
    reasoning: >-
      The action fetches data (computer IDs) from the SEP Manager to identify the
      endpoints. It mutates external data by sending a SOAP command to disable Network
      Threat Protection on the endpoint. It mutates internal data by updating the
