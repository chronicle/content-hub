Get Report And Enrich:
  ai_description: >-
    ### General Description

    Retrieves the status report of previously executed commands from Symantec Endpoint
    Protection (SEP) and enriches the associated entities with the report data.


    ### Flow Description

    1. Parses the provided `Command IDS` parameter into a list of command IDs.

    2. Iterates through the target entities in the case.

    3. For each entity, inspects its `additional_properties` to find a key containing
    `_command_id` that matches one of the provided command IDs.

    4. If a match is found, makes an API call to SEP (`commandStatusReport`) to retrieve
    the status report for that specific command.

    5. Flattens the retrieved report data, prefixes the keys, and adds them to the
    entity's `additional_properties`.

    6. Updates the enriched entities within Google SecOps.

    7. Returns the command reports as JSON results.


    ### Additional Notes

    The action relies on the entities having a `_command_id` key in their additional
    properties, which is typically populated by a previous action that initiated the
    command (e.g., a scan or quarantine action).
