BlockHash:
  ai_description: >-
    ### General Description

    Blocks file hashes on Symantec Endpoint Protection (SEP) by adding them to a specified
    blacklist. This action ensures that malicious files identified in the SOAR platform
    are restricted across the endpoint environment.


    ### Flow Description

    1. Retrieve configuration parameters (API credentials, URL, SSL verification)
    and the target blacklist name from the integration settings.

    2. Initialize the `SEP14Manager` to establish a connection with the Symantec Endpoint
    Protection API.

    3. Fetch the current list of blacklisted hashes from the specified blacklist using
    the `getBlackList` API call.

    4. Iterate through the provided `FILEHASH` entities, filtering for MD5 hashes
    (length 32) that are not already present in the retrieved blacklist.

    5. Update the blacklist on the SEP server by calling `setBlackList` with the updated
    list of hashes.

    6. Update the internal entity properties (`SEP_IsBlocked`) and save the changes
    to the SOAR platform using `update_entities`.


    ### Additional Notes

    This action specifically targets MD5 hashes. It requires a valid Symantec Endpoint
    Protection Manager configuration and the name of an existing blacklist.
  ai_short_description: >-
    Blocks specified file hashes on Symantec Endpoint Protection by adding them to
    a designated blacklist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds the specified file hashes to the designated blacklist in Symantec Endpoint
      Protection.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the current blacklist from the external system (fetches_data=true),
      performs a POST request to update the blacklist on the external system (can_mutate_external_data=true),
      and updates the entity properties within the SOAR platform (can_update_entities=true).
