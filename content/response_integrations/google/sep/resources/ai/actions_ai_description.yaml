  ai_description: >-
    ### General Description

    This action retrieves the status report for specific commands from the Symantec
    Endpoint Protection (SEP) Manager and enriches the associated entities with this
    information.


    ### Flow Description

    1. The action retrieves the `Command IDS` parameter.

    2. It initializes the `SEP14Manager` using credentials from the integration configuration.

    3. It iterates through the `target_entities` provided in the case.

    4. For each entity, it checks if any `additional_properties` contain a command
    ID matching the provided input.

    5. If a match is found, it calls the `commandStatusReport` method of the `SEP14Manager`
    to fetch the report.

    6. The retrieved report is flattened and added to the entity's `additional_properties`
    with a `SEP_` prefix.

    7. The action updates the entities in the SOAR platform using `siemplify.update_entities`.

    8. Finally, it adds the report data to the action results and terminates.


    ### Additional Notes

    This action requires valid SEP Manager credentials and assumes that the entities
    have been previously tagged with command IDs in their `additional_properties`.
