DisableNTP:
  ai_description: >-
    ### General Description

    Disables Network Threat Protection (NTP) on specified endpoints using the Symantec
    Endpoint Protection (SEP) Manager. This action allows administrators to temporarily
    suspend network threat protection for troubleshooting or maintenance purposes.


    ### Flow Description

    1. Authenticates with the SEP Manager using the provided credentials (Username,
    Password, Domain, and API Root).

    2. Iterates through the provided `HOSTNAME` and `ADDRESS` entities.

    3. For each entity, retrieves the corresponding `computer_id` from the SEP Manager:
       - If the entity is an `ADDRESS`, it calls `sep_manager.getComputerIdByIP`.
       - If the entity is a `HOSTNAME`, it calls `sep_manager.getComputerInfo` followed
    by `sep_manager.getComputerIdByComputerName`.
    4. If a `computer_id` is successfully identified, it executes the `runClientCommandDisableNTP`
    command on the SEP Manager for that specific computer, using the provided `Time
    Period` parameter.

    5. Updates the entity's `additional_properties` within the SOAR platform with
    the returned `command_id`.

    6. Updates the entities in the SOAR platform to reflect the changes.


    ### Additional Notes

    The `Time Period` parameter defines the duration (in minutes) for which NTP will
    be disabled. The valid range is 1 to 720 minutes. If the command fails for any
    entity, the error is logged, and the action continues to the next entity.
  ai_short_description: >-
    Disables Network Threat Protection (NTP) on endpoints via Symantec Endpoint Protection
    Manager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
