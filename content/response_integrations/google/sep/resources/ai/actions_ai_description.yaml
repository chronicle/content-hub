    ID:
       - If the entity is an **Address**, it calls `getComputerIdByIP`.
       - If the entity is a **Hostname**, it calls `getComputerInfo` followed by `getComputerIdByComputerName`.
    4. If a valid computer ID is found, the action executes the `Update_ScanNow_Full`
    command on the endpoint via the `runClientCommandUpdateContentAndScan` API call.

    5. The action updates the entity's `additional_properties` with the returned `command_id`.

    6. Finally, it saves the updated entities to the case and returns a summary of
    the operations performed.


    ### Additional Notes

    This action requires a configured SEP integration. The scan type is hardcoded
    to 'Update_ScanNow_Full'. If an entity cannot be resolved to a computer ID in
    SEP, the action skips that entity and logs an error.
