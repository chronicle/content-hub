DisableNTP:
  ai_description: >-
    ### General Description

    Disables Network Threat Protection (NTP) on Symantec Endpoint Protection (SEP)
    endpoints. This action targets IP Address and Hostname entities, retrieves their
    corresponding computer IDs from the SEP Manager, and issues a command to disable
    NTP for a specified time period.


    ### Flow Description

    1. Connects to the Symantec Endpoint Protection (SEP) Manager using the provided
    integration credentials.

    2. Iterates through the target entities provided in the case.

    3. For IP Address entities, queries the SEP Manager via API (`getComputersByIP`)
    to retrieve the associated computer ID.

    4. For Hostname entities, queries the SEP Manager via API (`getComputersByHostName`)
    to retrieve the computer info and subsequently the computer ID.

    5. If a valid computer ID is found, sends a SOAP POST request (`runClientCommandDisableNTP`)
    to the SEP Manager to execute the disable NTP command for the specified time period.

    6. Updates the entity's additional properties with the executed command ID.

    7. Updates the entities in the Google SecOps platform with the new properties.


    ### Additional Notes

    The `Time Period` parameter specifies the length of time (in minutes) after which
    Network Threat Protection is automatically reset to the state specified by the
    policy applied to the client. The minimum time limit is typically 1 minute, and
    the maximum is 720 minutes (12 hours).
  ai_short_description: >-
    Disables Network Threat Protection (NTP) on Symantec Endpoint Protection (SEP)
    endpoints for a specified time period.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
