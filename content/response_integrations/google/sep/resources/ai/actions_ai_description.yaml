DisableDownloadInsight:
  ai_description: >-
    ### General Description

    Disables the "Download Insight" feature on Symantec Endpoint Protection (SEP)
    endpoints. This action is used to temporarily adjust security policies on specific
    hosts, often for troubleshooting or authorized testing purposes.


    ### Flow Description

    1. Authenticates with the SEP Manager using the provided credentials.

    2. Iterates through the provided target entities (IP Address or Hostname).

    3. Resolves each entity to a `computer_id` within the SEP Manager.

    4. Executes the `runClientCommandDisableDownloadInsight` command on the SEP Manager
    for the resolved `computer_id`, passing the specified `time_period`.

    5. Updates the entity's `additional_properties` with the returned `command_id`.

    6. Updates the entities in the SOAR platform with the new properties.


    ### Additional Notes

    The `time_period` parameter defines how long the feature remains disabled (in
    minutes). The action supports both IP Address and Hostname entity types.
