DisableDownloadInsight:
  ai_description: >-
    ### General Description

    Disables the Download Insight feature on specific endpoints using Symantec Endpoint
    Protection (SEP). This action initiates a state change on the external SEP client
    to temporarily turn off the Download Insight security control.


    ### Flow Description

    1. Establishes a connection to the Symantec Endpoint Protection manager.

    2. Iterates through the target entities, specifically filtering for `ADDRESS`
    (IP) and `HOSTNAME` entity types.

    3. For each valid entity, queries the SEP API to retrieve the corresponding Computer
    ID.

    4. Executes a SOAP command (`runClientCommandDisableDownloadInsight`) via the
    SEP API to disable Download Insight on the identified endpoint for the specified
    time period.

    5. Updates the entity's additional properties within Google SecOps with the executed
    command ID.


    ### Additional Notes

    The action requires a time period parameter to specify how long (in minutes) the
    feature should be disabled before it automatically resets to the state defined
    by the endpoint's policy.
