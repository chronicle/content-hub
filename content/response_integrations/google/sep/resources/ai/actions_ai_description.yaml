    ### General Description

    Updates and scans an endpoint using Symantec Endpoint Protection (SEP). This action
    interacts with the SEP Manager to identify a specific endpoint by its IP address
    or hostname and triggers a remote update and full scan command. The action then
    updates the entity within the SOAR platform with the resulting command ID for
    tracking purposes.


