    reasoning: >-
      The action mutates external data by adding a tag to a device, which violates
      the external state preservation rule for Enrichment actions. It also does not
      perform explicit remediation tasks such as containing a host, blocking an IP,
      or disabling an identity, so it is not classified as a Remediation action.
    remediation: false
  entity_usage:
