List Endpoints In Group:
  ai_description: >-
    ### General Description

    Lists endpoints belonging to a specific group in McAfee Mvision ePO. This action
    retrieves a list of devices associated with a provided group name, returning details
    such as UUID, IP address, hostname, and username. The results are presented as
    both a JSON object and a formatted data table within the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Client ID, Client Secret,
    Scopes, Verify SSL) and action parameters (Group Name, Max Endpoints to Return).

    2. The `McAfeeMvisionEPOManager` is initialized to handle API communication.

    3. The action calls the McAfee Mvision ePO API (`/epo/v1/groups`) to retrieve
    the group ID corresponding to the provided `Group Name`.

    4. Using the retrieved group ID, the action calls the API (`/epo/v1/devices`)
    to fetch the list of endpoints associated with that group, respecting the `Max
    Endpoints to Return` limit.

    5. The retrieved endpoint data is processed and added to the action results as
    a JSON list and a CSV data table.

    6. The action concludes by returning the list of endpoints or an error message
    if the group is not found.


    ### Additional Notes

    This action requires valid API credentials for McAfee Mvision ePO. If the specified
    group name does not exist, the action will fail and return an error message indicating
    that the group was not found.
