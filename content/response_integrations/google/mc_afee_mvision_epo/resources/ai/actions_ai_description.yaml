    reasoning: >-
      The action makes a POST request to the McAfee Mvision ePO API to remove a tag
      from a device, which mutates external data. It does not fetch contextual data
      for enrichment, nor does it update internal entities, create insights, or modify
      alert data within Google SecOps.
