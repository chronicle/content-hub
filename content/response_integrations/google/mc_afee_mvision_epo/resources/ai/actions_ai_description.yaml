    Enriches endpoint entities (Hostname and IP Address) by fetching system information
    from McAfee Mvision ePO.


    ### Flow Description

    1. Filters the target entities to include only Hostname and IP Address types.

    2. Iterates through the filtered entities and queries McAfee Mvision ePO for device
    information.

    3. If a device is found, extracts system details and installed products.

    4. Enriches the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Attaches a data table to the action result containing the list of installed
    products on the endpoint.

    6. Updates the entities in the Google SecOps platform.


    ### Parameters Description

    This action does not have any specific input parameters. It relies solely on the
    integration's configuration parameters (such as API Root, Client ID, Client Secret,
    etc.) to authenticate and execute the request.
