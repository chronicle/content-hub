Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specified tag from endpoint devices in McAfee Mvision ePO. This action
    initiates a state change on the external device management platform by detaching
    a tag from the targeted Hostname or IP Address entities.


    ### Flow Description

    1. Extracts the tag name provided in the action parameters.

    2. Queries the McAfee Mvision ePO API to resolve the provided tag name to its
    corresponding tag ID.

    3. Iterates through the target entities, filtering for Hostname and IP Address
    entity types.

    4. For each suitable entity, queries the McAfee Mvision ePO API to find the corresponding
    endpoint device.

    5. Sends a POST request to the McAfee Mvision ePO API to remove the tag from the
    identified device.

    6. Returns a summary message indicating which entities had the tag successfully
    removed and which failed.


    ### Additional Notes

    The action requires the specified tag to already exist in McAfee Mvision ePO.
    If the tag or the endpoint is not found in the external system, the action will
    report a failure for that specific entity or halt execution if the tag itself
    is missing.
  ai_short_description: >-
    Removes a specified tag from endpoint devices in McAfee Mvision ePO.
  capabilities:
