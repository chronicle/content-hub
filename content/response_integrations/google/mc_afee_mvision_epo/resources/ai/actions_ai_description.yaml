Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specified tag from an endpoint (host or IP address) within the McAfee
    Mvision ePO platform. This action allows security analysts to manage device tagging
    dynamically, facilitating policy adjustments or remediation workflows.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Client ID, Client Secret,
    etc.) and the `Tag Name` parameter.

    2. It filters the target entities to include only those of type `HOSTNAME` or
    `ADDRESS`.

    3. The `McAfeeMvisionEPOManager` is initialized to handle communication with the
    McAfee Mvision ePO API.

    4. The action retrieves the tag ID for the specified `Tag Name` by performing
    a GET request to the tags endpoint.

    5. For each suitable entity, the action searches for the corresponding device
    in McAfee Mvision ePO.

    6. Upon finding the device, it performs a POST request to the `remove_tag` endpoint
    to remove the specified tag from the device.

    7. The action logs the success or failure of the operation for each entity and
    updates the final output message.


    ### Additional Notes

    This action requires valid API credentials and appropriate permissions in McAfee
    Mvision ePO. It processes entities of type Hostname and IP Address. If a tag or
    endpoint is not found, the action will log an error and continue processing other
    entities.
  ai_short_description: >-
    Removes a specified tag from an endpoint (host or IP address) in McAfee Mvision
    ePO.
