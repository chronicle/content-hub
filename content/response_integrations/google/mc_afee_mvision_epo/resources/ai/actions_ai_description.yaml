  ai_description: >-
    ### General Description

    Adds a specified tag to an endpoint device in McAfee Mvision ePO. This action
    allows analysts to categorize or label endpoints within the ePO console based
    on SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Tag Name | String | True | Specify the name of the tag you want to add to the
    endpoint. |


    ### Flow Description

    1. Establishes a connection to the McAfee Mvision ePO API.

    2. Queries the API to find the specified tag by its name.

    3. Iterates over the target entities, filtering for `ADDRESS` and `HOSTNAME` types.

    4. For each suitable entity, searches for the corresponding device in McAfee Mvision
    ePO.

    5. Adds the tag to the identified device.

    6. Returns a summary message detailing the successful and failed tagging operations.
