Add Tag:
  ai_description: >-
    ### General Description

    Adds a specified tag to endpoint entities (Hostname, IP Address) in McAfee Mvision
    ePO. This action allows analysts to categorize or mark devices within the McAfee
    Mvision ePO console directly from the SOAR platform.


    ### Flow Description

    1. Extracts the target tag name from the action parameters.

    2. Initializes the McAfee Mvision ePO manager and authenticates using the provided
    integration configuration.

    3. Makes a GET request to the McAfee Mvision ePO API to find the specified tag
    and retrieve its internal ID.

    4. Iterates over the target Hostname and IP Address entities.

    5. For each entity, makes a GET request to search for the corresponding device
    in McAfee Mvision ePO to retrieve its UUID.

    6. Makes a POST request to the McAfee Mvision ePO API (`/epo/v1/devices/add_tag`)
    to attach the tag to the identified device.

    7. Returns a summary message indicating which entities were successfully tagged
    and which failed.


    ### Additional Notes

    The action requires the specified tag to already exist in McAfee Mvision ePO.
    If the tag is not found, the action will fail. If a specific endpoint is not found
    in McAfee Mvision ePO, the action will skip it and report the failure in the output
    message.
  ai_short_description: >-
    Adds a specified tag to Hostname and IP Address endpoint entities within McAfee
    Mvision ePO.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specified tag to an endpoint device in McAfee Mvision ePO.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee Mvision ePO API to attach a tag
      to a device, which mutates external data. It does not fetch data for the purpose
      of enriching entities within the SOAR platform, nor does it update internal
      entities, create insights, or modify case/alert data.
