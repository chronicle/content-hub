    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a specified tag to an endpoint device in McAfee Mvision ePO.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action's primary purpose is to mutate external data by adding a tag to a
      device in McAfee Mvision ePO. While it makes GET requests to find the tag and
      device IDs, it does not fetch additional contextual data to enrich the alert
      or entities. It does not mutate internal SecOps data, update entities, create
      insights, or add case comments.
  categories:
