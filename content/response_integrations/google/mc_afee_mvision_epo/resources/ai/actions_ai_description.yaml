Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (Hostname or IP Address) by fetching system information
    from McAfee Mvision ePO. This action retrieves contextual metadata such as OS
    version, managed state, and installed products, updating the entity's properties
    within the SecOps platform.


    ### Flow Description

    1. Initializes the McAfee Mvision ePO manager with the provided API credentials.

    2. Iterates over the target entities, filtering for those of type `ADDRESS` or
    `HOSTNAME`.

    3. Makes a GET request to the McAfee Mvision ePO API (`/epo/v1/devices`) to search
    for the device matching the entity's identifier.

    4. If a matching device is found, extracts its details and installed products.

    5. Updates the entity's `additional_properties` with the retrieved enrichment
    data and marks the entity as enriched.

    6. Attaches a data table to the action results detailing the products installed
    on the endpoint.

    7. Returns a JSON result containing the full device details and saves the updated
    entities.


    ### Additional Notes

    - There are no action-specific parameters for this action.
