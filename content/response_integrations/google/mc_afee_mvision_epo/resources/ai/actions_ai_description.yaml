Add Tag:
  ai_description: >-
    ### General Description

    Adds a specified tag to an endpoint in McAfee Mvision ePO. This action allows
    security analysts to categorize or label endpoints directly from the SOAR platform,
    facilitating better organization and management of assets within the McAfee ecosystem.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves necessary configuration parameters
    (API Root, Client ID, Client Secret, Scopes, etc.) to establish a connection with
    the McAfee Mvision ePO API.

    2. **Tag Verification**: It calls the `manager.find_tag_or_fail` method to verify
    that the specified `Tag Name` exists in McAfee Mvision ePO. If the tag is not
    found, the action fails.

    3. **Entity Processing**: The action iterates through the provided `target_entities`
    (filtering for `ADDRESS` and `HOSTNAME` types).

    4. **Endpoint Search**: For each entity, it calls `manager.find_entity_or_fail`
    to locate the corresponding device in McAfee Mvision ePO.

    5. **Tag Assignment**: It calls `manager.add_or_remove_tag` (performing a POST
    request) to associate the tag with the identified device.

    6. **Result Reporting**: The action logs the success or failure of the operation
    for each entity and returns the final status.


    ### Additional Notes

    - This action requires valid API credentials for McAfee Mvision ePO.

    - Only `ADDRESS` and `HOSTNAME` entity types are supported.

    - If no entities are processed, the action will return a failure status.
  ai_short_description: >-
    Adds a specified tag to an endpoint in McAfee Mvision ePO.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a tag to an endpoint in McAfee Mvision ePO.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (tags, device info) via GET requests and mutates external
      data (adds a tag) via a POST request to the McAfee Mvision ePO API. It does
      not mutate internal SecOps data, update entities, create insights, modify alert
      data, or create case comments.
