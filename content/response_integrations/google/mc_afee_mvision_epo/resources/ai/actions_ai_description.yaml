Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (Hostname or IP Address) by retrieving system information
    and installed product details from McAfee Mvision ePO. This action helps security
    analysts gain context about endpoints involved in an investigation by pulling
    data such as OS platform, last communication time, and installed software.


    ### Flow Description

    1. The action initializes the McAfee Mvision ePO manager using the provided API
    credentials (API Root, Client ID, Client Secret, Scopes).

    2. It filters the target entities to process only those of type 'ADDRESS' or 'HOSTNAME'.

    3. For each suitable entity, the action queries the McAfee Mvision ePO API to
    locate the corresponding device.

    4. If the device is found, the action:
        - Updates the entity's `additional_properties` with device metadata (e.g.,
    OS, domain, last communicated, username).
        - Sets the entity's `is_enriched` status to true.
        - Adds a data table to the action results containing the list of installed
    products.
        - Stores the device details in a JSON result object.
    5. Finally, the action updates the entities within the SOAR platform and returns
    the enriched data.


    ### Additional Notes

    This action requires valid API credentials for McAfee Mvision ePO. If an endpoint
    is not found in McAfee Mvision ePO, the action logs an error and continues processing
    other entities.
