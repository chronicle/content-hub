Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User, Hostname, and IP Address entities using Microsoft SCCM. It retrieves
    contextual information from SCCM via WMI queries and updates the entities with
    the fetched data.


    ### Flow Description

    1. Connects to the Microsoft SCCM instance using WMI.

    2. Iterates through the target entities, filtering for User, Hostname, and Address
    types.

    3. Executes specific WQL queries against SCCM to fetch enrichment data based on
    the entity type.

    4. If data is found, updates the entity's additional properties and marks it as
    enriched.

    5. Adds the enrichment data to the action's JSON results and creates an entity
    table.

    6. Updates the entities in the SecOps platform.


    ### Additional Notes

    This action relies on integration-level configurations for SCCM authentication
    and does not require any action-specific parameters.
  ai_short_description: >-
    Enriches User, Hostname, and IP Address entities by retrieving contextual information
    from Microsoft SCCM via WMI queries.
