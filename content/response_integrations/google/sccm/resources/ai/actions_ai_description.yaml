Run WQL Query:
  ai_description: >-
    ### General Description

    Executes an arbitrary Windows Management Instrumentation Query Language (WQL)
    query against a Microsoft SCCM instance. This action allows users to retrieve
    specific system or user data from SCCM by providing a custom WQL query string.


    ### Flow Description

    1. Initializes the `SCCMManager` using the configured integration parameters (Server
    Address, Domain, Username, Password).

    2. Extracts the `Query to run` and `Number of records to return` from the action
    parameters.

    3. Executes the provided WQL query against the SCCM instance via the `SCCMManager`.

    4. If results are returned, the action truncates the result set if it exceeds
    the specified `Number of records to return`.

    5. Adds the results to the action output as a JSON object, a table, and a file
    attachment for further analysis.


    ### Additional Notes

    This action does not operate on specific entities and does not require any entities
    to be selected in the case. It is a standalone query execution action.
