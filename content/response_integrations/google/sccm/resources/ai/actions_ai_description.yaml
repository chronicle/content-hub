Get Computer Properties:
  ai_description: >-
    ### General Description

    Fetches computer properties from a Microsoft SCCM instance to enrich Hostname
    entities. This action retrieves detailed system information from SCCM and updates
    the corresponding Host entities within the SOAR platform, providing analysts with
    contextual data such as system configuration and status.


    ### Flow Description

    1. **Initialization**: The action initializes the SCCM connection using the provided
    `Server Address`, `Domain`, `Username`, and `Password` configuration parameters.

    2. **Entity Processing**: The action iterates through all target entities, filtering
    specifically for `HOSTNAME` types.

    3. **Hostname Normalization**: For each valid entity, the action cleans the hostname
    by removing any domain suffixes (e.g., splitting by '@' or '.') to ensure accurate
    querying.

    4. **Data Retrieval**: The action calls the `SCCMManager.get_computer_info` method
    to query the SCCM instance for the specific computer's properties.

    5. **Enrichment**: If data is retrieved:
        * The result is flattened into a key-value structure.
        * The entity's `additional_properties` are updated with the retrieved data,
    prefixed with 'SCCM'.
        * A CSV table containing the computer properties is added to the entity's
    results.
        * The entity is marked as enriched (`is_enriched = True`).
    6. **Update**: Finally, the action calls `siemplify.update_entities` to save the
    changes to the SOAR platform and adds the full JSON result to the action output.


    ### Additional Notes

    This action is currently deprecated. It is recommended to use the "Enrich Entities"
    action instead for similar functionality.
