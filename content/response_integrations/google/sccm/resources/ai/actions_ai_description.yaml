Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Microsoft SCCM instance using the provided configuration
    parameters. This action verifies that the integration is correctly configured
    and can successfully communicate with the target SCCM server.


    ### Flow Description

    1. The action extracts the required connection parameters: `Server Address`, `Domain`,
    `Username`, and `Password` from the integration configuration.

    2. It initializes the `SCCMManager` class using these credentials.

    3. The `SCCMManager` attempts to establish a WMI connection to the specified SCCM
    server.

    4. If the connection is successful, the action returns a success message. If the
    connection fails, it catches the exception, logs the error, and returns a failure
    message.


    ### Additional Notes

    This action does not perform any data retrieval or modification operations; it
    is strictly used for validating the connectivity between the SOAR platform and
    the Microsoft SCCM instance.
