Get Login History:
  ai_description: >-
    ### General Description

    Retrieves user login history from a Microsoft SCCM instance. This action queries
    the SCCM WMI interface to fetch historical login data for specific user entities,
    providing visibility into user activity across the environment.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Domain, Username, Password)
    and the action parameter (Number of Records to Return).

    2. Initializes the `SCCMManager` to establish a connection to the SCCM WMI instance.

    3. Iterates through the provided target entities, filtering for those of type
    `USER`.

    4. For each valid user entity, executes a query against the SCCM instance via
    the `get_login_history` method to retrieve login records.

    5. If login history is found, adds a formatted table to the action result and
    stores the JSON data.

    6. Aggregates the results and returns a summary message indicating success or
    failure for each entity.


    ### Additional Notes

    This action requires network connectivity to the SCCM instance via WMI (ports
    135, 445, 443).
