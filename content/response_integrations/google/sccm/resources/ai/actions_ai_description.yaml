Get Computer Properties:
  ai_description: >-
    ### General Description

    Retrieves computer properties from a Microsoft SCCM instance to enrich Hostname
    entities. Note: This action is deprecated; users should use the "Enrich Entities"
    action instead.


    ### Flow Description

    1. Iterates through the provided target entities and filters for those of type
    `HOSTNAME`.

    2. Cleans the hostname identifier by removing any domain suffixes (e.g., `@domain.com`
    or `.domain.local`).

    3. Executes a WQL query against the SCCM WMI interface (`SMS_R_System` table)
    to fetch computer information for the specific hostname.

    4. If computer properties are found, the action flattens the data and appends
    it to the entity's `additional_properties`.

    5. Attaches a CSV table of the retrieved properties to the entity and marks the
    entity as enriched (`is_enriched = True`).

    6. Updates the entities within the Google SecOps platform and returns the raw
    data as a JSON result.


    ### Additional Notes

    Requires WMI connectivity to the SCCM server (ports 135, 445, 443, and RPC service).
