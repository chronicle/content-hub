Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Siemplify Host, IP, or User entities using data retrieved from Microsoft
    SCCM. This action queries the SCCM instance to gather contextual information about
    the specified entities, such as system properties or user details, and updates
    the entities within the SOAR platform with this enriched data.


    ### Flow Description

    1. **Configuration Initialization**: The action retrieves the required SCCM connection
    parameters (Server Address, Domain, Username, Password) from the integration configuration.

    2. **Connection Establishment**: A connection to the Microsoft SCCM WMI instance
    is established using the provided credentials.

    3. **Entity Filtering**: The action iterates through the `target_entities` provided
    in the case, filtering for supported types: `USER`, `HOSTNAME`, and `ADDRESS`.

    4. **Data Retrieval**: For each supported entity, the action calls the `SCCMManager`
    to query SCCM for relevant information based on the entity type (e.g., `enrich_user`,
    `enrich_host`, or `enrich_address`).

    5. **Entity Update**: If enrichment data is found, the action updates the entity's
    `additional_properties` with the retrieved data, sets the `is_enriched` flag to
    `True`, and adds a table of the results to the action output.

    6. **Finalization**: The action updates the enriched entities in the SOAR platform
    and returns a summary message indicating which entities were successfully enriched
    or failed.


    ### Additional Notes

    This action requires network connectivity to the SCCM server on ports 135, 445,
    and 443, and the RPC service must be enabled on the SCCM instance.
  ai_short_description: >-
    Enriches User, Hostname, and IP Address entities with contextual data from Microsoft
    SCCM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity 'additional_properties' and 'is_enriched' status within the SOAR
      platform.
    reasoning: >-
      The action fetches data from an external SCCM instance (fetches_data=true).
      It does not mutate external data (can_mutate_external_data=false). It updates
      internal entities within the SOAR platform by adding enrichment data to their
      properties (can_mutate_internal_data=true, can_update_entities=true). It does
      not create insights, modify alert data, or create case comments.
