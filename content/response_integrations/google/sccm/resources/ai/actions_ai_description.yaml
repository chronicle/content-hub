Get Login History:
  ai_description: >-
    ### General Description

    Retrieves user login history from a Microsoft System Center Configuration Manager
    (SCCM) instance based on the provided user entities. It queries the SCCM WMI interface
    to fetch login records, including the username, last logged-in time, and login
    count, and attaches the results to the case.


    ### Flow Description

    1. Initializes the connection to the MS SCCM instance using the provided credentials.

    2. Iterates through the target entities, filtering specifically for User entities.

    3. For each valid User entity, executes a WQL query via the WMI interface to retrieve
    the login history up to the specified maximum number of records.

    4. If login history is found, attaches the data as an entity table and adds it
    to the JSON results.

    5. Returns a summary message detailing which entities were successfully processed
    and which failed.


    ### Additional Notes

    Requires ports 135, 445, 443, and the RPC service on the SCCM server to be accessible
    for the WMI client wrapper to function correctly.
