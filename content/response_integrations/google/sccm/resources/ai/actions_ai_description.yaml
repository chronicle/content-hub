Run WQL Query:
  ai_description: >-
    ### General Description

    Runs an arbitrary Windows Management Instrumentation Query Language (WQL) query
    against a Microsoft SCCM instance. This action allows analysts to retrieve custom
    data sets from SCCM by executing a specified WQL query and returning the results
    as JSON, a data table, and an attached file.


    ### Flow Description

    1. Connects to the Microsoft SCCM instance using the provided integration credentials.

    2. Executes the specified WQL query via the WMI client.

    3. Retrieves the query results and truncates them if the result count exceeds
    the specified maximum number of records.

    4. Attaches the results to the action as JSON, a CSV-formatted data table, and
    a base64-encoded file attachment.


    ### Additional Notes

    This action does not operate on Siemplify entities and is used purely for querying
    the SCCM database.
