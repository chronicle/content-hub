identifier: GoogleChat
name: Google Chat
parameters:
-   name: API Root URL
    default_value: https://chat.googleapis.com/
    type: string
    description: API Root URL integration should use to connect to Google Chat service.
    is_mandatory: true
    integration_identifier: GoogleChat
-   name: Service Account
    default_value: ''
    type: password
    description: Service account JSON file content that chat bot should use to work
        with Google Chat service.
    is_mandatory: true
    integration_identifier: GoogleChat
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Google Chat service is valid.
    is_mandatory: true
    integration_identifier: GoogleChat
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-chat
categories:
- IT and Infrastructure
- Google
svg_logo_path: resources/logo.svg
image_path: resources/image.png
