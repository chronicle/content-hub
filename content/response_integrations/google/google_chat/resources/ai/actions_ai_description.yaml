Send Advanced Message:
  ai_description: >-
    ### General Description

    Sends an advanced message to a Google Chat space using a provided JSON payload.
    This allows for sending formatted messages, cards, and interactive elements to
    a specified space.


    ### Flow Description

    1. Retrieves the target space name and the message JSON payload from the action
    parameters.

    2. Validates and parses the provided JSON payload to ensure it is correctly formatted.

    3. Initializes the Google Chat API client using the provided integration credentials.

    4. Makes a POST request to the Google Chat API (`/v1/spaces/{space_name}/messages`)
    to send the advanced message to the specified space.

    5. Returns the created message details as a JSON result.


    ### Additional Notes

    This action does not operate on Siemplify entities.
