    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Key | DropDown | No | Specify the key that needs to be used to filter
    Google Chat spaces. |

    | Filter Logic | DropDown | No | Specify what filter logic should be applied.
    Filtering logic is working based on the value provided in the "Filter Key" parameter.
    |

    | Filter Value | String | No | Specify what value should be used in the filter.
    If "Equal" is selected, action will try to find the exact match among results
    and if "Contains" is selected, action will try to find results that contain that
    substring. If nothing is provided in this parameter, the filter will not be applied.
    Filtering logic is working based on the value provided in the "Filter Key" parameter.
    |

    | Max Records To Return | String | No | Specify how many records to return. If
    nothing is provided, action will return 50 records. |

    | Include User Memberships | Boolean | No | If enabled, user memberships information
    will be added to the action Case Wall table and JSON result. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Chat service using the integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters including the API Root URL, Service
    Account, and Verify SSL settings.

    2. Initializes the Google Chat Manager and forces a connectivity check.

    3. Makes an HTTP GET request to the Google Chat API (`/v1/spaces`) to verify access
    and authentication.

    4. Returns a successful execution state if the connection is established, otherwise
    returns a failure state with the error details.


    ### Additional Notes

    This action is primarily used for diagnostic purposes to ensure the integration
    is correctly configured and can communicate with the Google Chat API.
