  ai_description: >-
    ### General Description

    The **List Spaces** action retrieves a list of Google Chat spaces that the configured
    bot has been added to. It allows filtering the spaces based on specific criteria
    and can optionally fetch user membership information for each space. This action
    does not run on SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Key | Dropdown | No | Specify the key to use for filtering spaces (e.g.,
    Name, Display Name, Type). |

    | Filter Logic | Dropdown | No | Specify the logic for filtering (Equal, Contains).
    Works in conjunction with Filter Key. |

    | Filter Value | String | No | The value to match against the Filter Key. If empty,
    no filter is applied. |

    | Max Records To Return | Integer | No | The maximum number of spaces to return.
    Defaults to 50. |

    | Include User Memberships | Boolean | No | If enabled, fetches and includes user
    membership information for each space in the results. |


    ### Additional Notes

    - If `Filter Logic` is provided, `Filter Key` must also be selected.

    - The action does not run on entities.


    ### Flow Description

    1. Validates the input parameters, ensuring the limit is a positive integer and
    filter logic is valid.

    2. Connects to the Google Chat API using the provided service account credentials.

    3. Fetches the list of spaces the bot is a member of.

    4. Applies the specified filtering logic to the retrieved spaces.

    5. If `Include User Memberships` is enabled, fetches membership details for each
    filtered space.

    6. Constructs a data table and JSON result with the spaces and optional membership
    data.

    7. Returns the results to the SecOps case wall.
