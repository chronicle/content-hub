Send Message:
  ai_description: >-
    ### General Description

    Sends a message to a specified Google Chat space. This action allows automated
    communication by posting text messages directly into a Google Chat space where
    the integration app is present.


    ### Flow Description

    1. Extracts the target space name and the message text from the action parameters.

    2. Initializes the Google Chat API client using the provided service account credentials.

    3. Makes a POST request to the Google Chat API (`/v1/spaces/{space_name}/messages`)
    to create and send the message.

    4. Retrieves the created message details and attaches them to the action's JSON
    result.


    ### Additional Notes

