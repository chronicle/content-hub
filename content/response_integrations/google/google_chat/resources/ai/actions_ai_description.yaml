  ai_description: >-
    Sends an advanced message to a specified Google Chat space using a provided JSON
    payload.


    ### General Description

    This action allows users to send complex, formatted messages (such as cards with
    widgets and buttons) to a Google Chat space. It takes a JSON payload representing
    the message structure and posts it to the specified space via the Google Chat
    API.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the space
    name and message JSON payload.

    2. Parses the provided JSON payload to ensure it is valid.

    3. Initializes the Google Chat manager with the provided credentials.

    4. Sends a POST request to the Google Chat API to create the advanced message
    in the specified space.

    5. Returns the message details as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Space Name | String | Yes | Specify a space name to send the message to. Example
    space name: AAAAdaTsel0. |

    | Message JSON Payload | String | Yes | Specify a JSON payload to send with the
    message. See Google Chat API documentation for examples of message payloads. |


    ### Additional Notes

    This action does not operate on Google SecOps entities.
