List Spaces:
  ai_description: >-
    ### General Description

    Retrieves a list of spaces that the currently configured Google Chat bot has been
    added to. This action allows filtering the spaces based on specific criteria and
    optionally fetching user membership details for each space. It does not operate
    on Siemplify entities.


    ### Flow Description

    1. Extracts configuration and action parameters, including filter criteria and
    limits.

    2. Validates the provided limit parameter to ensure it is a positive integer.

    3. Initializes the Google Chat API client using the provided service account credentials.

    4. Makes a GET request to the Google Chat API to retrieve the list of spaces.

    5. Applies the specified filtering logic (Equal or Contains) based on the selected
    filter key and value.

    6. If the "Include User Memberships" parameter is enabled, makes additional GET
    requests to fetch membership details for each retrieved space.

    7. Formats the retrieved data and adds it to the action's JSON results and Case
    Wall data table.


    ### Additional Notes

    - This action does not run on Siemplify entities.

    - Ensure the Google Chat bot has the necessary permissions to list spaces and
    memberships.
  ai_short_description: >-
    Retrieves a list of spaces that the configured Google Chat bot is a member of,
    with optional filtering and user membership details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to the Google Chat API to fetch spaces and memberships
      (fetches_data=true). It does not mutate external data, mutate internal data,
      update entities, create insights, modify alert data, or create case comments.
  entity_usage:
