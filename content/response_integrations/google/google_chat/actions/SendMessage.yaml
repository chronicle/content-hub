name: Send Message
description: Send a message to a Google Chat space that the Siemplify app was added
    to. Note that action is not working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-chat#send_message
integration_identifier: GoogleChat
parameters:
-   name: Space Name
    default_value: ''
    type: string
    description: 'Specify a space name to send message to. Example space name: AAAAdaTsel0'
    is_mandatory: true
-   name: Message Text
    default_value: ''
    type: string
    description: Specify a message text to send.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_message_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
