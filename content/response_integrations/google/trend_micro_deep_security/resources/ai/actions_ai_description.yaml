  ai_description: >-
    ### General Description

    Retrieves all security profiles (policies) from Trend Micro Deep Security. This
    action connects to the Deep Security API to fetch a comprehensive list of available
    policies and outputs them as a data table for review within the case.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters (such as API Root, API Secret Key,
    API Version, and Verify SSL) to authenticate and communicate with the Trend Micro
    Deep Security instance.


    ### Flow Description

    1. **Initialization:** Establishes a connection to the Trend Micro Deep Security
    API using the provided integration configuration credentials.

    2. **Fetch Profiles:** Sends a GET request to the `/api/policies` endpoint to
    retrieve all configured security profiles.

    3. **Process Data:** Parses the returned policies, extracting the Name, Description,
    and ID for each profile.

    4. **Output Generation:** Constructs a CSV-formatted data table with the extracted
    information and attaches it to the action's results in Google SecOps.
