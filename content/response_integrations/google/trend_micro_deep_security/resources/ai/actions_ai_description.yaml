Get Host Info:
  ai_description: >-
    ### General Description

    Retrieves detailed configuration and status information for a specific host from
    the Trend Micro Deep Security platform. This action allows analysts to gather
    contextual data about a computer, such as its ID, policy assignments, and security
    status, directly within the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Root, API Secret
    Key, API Version, and SSL verification settings.

    2. It iterates through the provided target entities, filtering specifically for
    entities of type `HOSTNAME`.

    3. For each valid hostname, the action calls the `get_computer_id_by_name` method
    to retrieve the corresponding internal computer ID from Trend Micro Deep Security.

    4. Using the retrieved ID, it calls the `get_computer_info` method to fetch the
    full computer details.

    5. The retrieved computer information is added to the action results as a JSON
    object.


    ### Additional Notes

    This action is read-only and does not perform any modifications to the host or
    the security platform. It is intended for enrichment and information gathering
    purposes.
