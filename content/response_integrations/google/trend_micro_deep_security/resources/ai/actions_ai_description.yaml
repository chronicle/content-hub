Scan Host:
  ai_description: >-
    ### General Description

    Requests a malware scan on specified Hostname entities using Trend Micro Deep
    Security. This action interacts with the Trend Micro API to enable the anti-malware
    state on the target computers, effectively triggering a scan.


    ### Flow Description

    1. Initializes the Trend Micro Deep Security API client using the provided integration
    configuration.

    2. Iterates through the provided target entities, specifically filtering for `Hostname`
    entities.

    3. For each valid Hostname, makes a GET request to the `/api/computers` endpoint
    to retrieve the corresponding computer ID.

    4. Makes a POST request to the `/api/computers/{computer_id}` endpoint to modify
    the computer's configuration, setting the anti-malware state to 'on'.

    5. Returns a summary message indicating the success or failure of the scan requests.


    ### Additional Notes

    This action relies on the Trend Micro Deep Security API to manage computer configurations.
    It does not directly execute commands on the endpoint but rather updates the policy
    state via the management console.
