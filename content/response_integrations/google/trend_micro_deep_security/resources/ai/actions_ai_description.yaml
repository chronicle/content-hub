    Retrieves detailed information about a specific host (computer) from Trend Micro
    Deep Security. It queries the API to find the computer ID by its hostname and
    then fetches the corresponding computer details, returning the data as a JSON
    result.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to process only those of type HOSTNAME.

    3. For each valid entity, makes a GET request to the Trend Micro Deep Security
    API to retrieve the computer ID associated with the hostname.

    4. Makes a subsequent GET request to fetch the detailed computer information using
    the retrieved ID.

    5. Attaches the retrieved computer details as a JSON result to the entity.


    ### Additional Notes

