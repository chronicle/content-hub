Assign Security Profile To Host:
  ai_description: >-
    ### General Description

    Assigns a specified security profile (policy) to target host entities within Trend
    Micro Deep Security.


    ### Flow Description

    1. Initializes the connection to the Trend Micro Deep Security API.

    2. Retrieves the policy ID corresponding to the provided `Security Profile Name`.

    3. Iterates through the target entities, specifically filtering for `HOSTNAME`
    entities.

    4. For each valid entity, fetches the corresponding computer ID from Trend Micro
    Deep Security using the entity's identifier.

    5. Executes a POST request to assign the retrieved policy ID to the target computer.

    6. Returns a summary message indicating which entities were successfully assigned
    the policy.


    ### Additional Notes

    This action modifies the configuration of the endpoint in Trend Micro Deep Security
    by applying a new security policy.
