Get Security Profiles:
  ai_description: >-
    ### General Description

    Retrieves all security profiles (policies) from the Trend Micro Deep Security
    platform. This action allows analysts to view the available security policies
    configured within the environment, providing visibility into the current security
    posture.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Api
    Secret Key`, `Api Version`, and `Verify SSL`.

    2. It initializes the `TrendmicroManager` using the provided credentials and connection
    settings.

    3. The action executes a GET request to the `/api/policies` endpoint of the Trend
    Micro Deep Security API to retrieve the list of all security profiles.

    4. Upon receiving the response, it parses the policy data to extract the Name,
    Description, and ID for each profile.

    5. The action constructs a CSV table containing these details and adds it to the
    action results.

    6. Finally, it outputs a summary message indicating the number of security profiles
    retrieved.


    ### Additional Notes

    This action is primarily used for auditing and configuration review. It does not
    modify any settings or perform any containment actions.
