Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Trend Micro Deep Security
    server. This action verifies that the provided integration configuration parameters
    are valid and that the SOAR platform can successfully communicate with the external
    API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Api
    Secret Key`, `Api Version`, and `Verify SSL` from the integration settings.

    2. It initializes the `TrendmicroManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the `/computers` endpoint of the Trend Micro Deep Security API.

    4. If the API returns a successful response, the action completes with a success
    message. If the request fails (e.g., due to invalid credentials or network issues),
    the action catches the exception and reports a failure.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data modification or entity enrichment.
