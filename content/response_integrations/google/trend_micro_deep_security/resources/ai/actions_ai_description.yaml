    ### General Description

    This action queries Trend Micro Deep Security to fetch contextual metadata and
    configuration details for specific endpoints. It resolves the computer ID using
    the hostname and then retrieves the full computer profile, attaching the results
    as JSON data to the action's output.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies entirely
    on the integration-level configuration parameters (Api Root, Api Secret Key, Api
    Version, and Verify SSL) to authenticate and communicate with the Trend Micro
    Deep Security API.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `HOSTNAME`.

    3. Queries the Trend Micro Deep Security API to find the corresponding computer
    ID for each hostname.

    4. Fetches the detailed computer information using the resolved computer ID.

    5. Appends the retrieved computer details as a JSON result to the action's output
    for further use in the playbook.
