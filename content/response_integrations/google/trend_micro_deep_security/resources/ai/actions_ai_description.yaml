Scan Host:
  ai_description: >-
    ### General Description

    Requests a malware scan on a specific host using the Trend Micro Deep Security
    API. This action triggers an anti-malware scan by updating the configuration state
    of the target host within the Trend Micro Deep Security platform.


    ### Flow Description

    1. The action extracts configuration parameters: `Api Root`, `Api Secret Key`,
    `Api Version`, and `Verify SSL`.

    2. It initializes the `TrendmicroManager` with the provided credentials.

    3. The action iterates through the provided `target_entities` and filters for
    entities of type `HOSTNAME`.

    4. For each valid host, it performs a GET request to the Trend Micro API (`/computers`)
    to retrieve the computer's ID based on its name.

    5. It then performs a POST request to the Trend Micro API (`/computers/{id}`)
    to modify the computer's configuration, setting the `antiMalware` state to `on`.

    6. The action returns a success or failure message based on the outcome of the
    API requests.


    ### Additional Notes

    This action performs a state-changing operation on the external Trend Micro Deep
    Security system by enabling the anti-malware scan feature for the specified host.
