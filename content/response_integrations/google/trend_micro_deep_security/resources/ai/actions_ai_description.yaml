  ai_description: >-
    Assigns a specified security profile (policy) to Hostname entities in Trend Micro
    Deep Security.


    ### General Description

    This action updates the configuration of specified computers in Trend Micro Deep
    Security by assigning them a new security policy. It resolves the policy name
    and computer hostnames to their respective IDs and applies the change.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Security Profile Name | String | Yes | The name of the policy to assign to the
    computers. |


    ### Flow Description

    1. Retrieves the policy ID for the provided Security Profile Name.

    2. Iterates over the target entities, filtering for Hostname entities.

    3. For each Hostname entity, retrieves its corresponding computer ID from Trend
    Micro Deep Security.

    4. Assigns the specified policy to the computer by updating its configuration.
