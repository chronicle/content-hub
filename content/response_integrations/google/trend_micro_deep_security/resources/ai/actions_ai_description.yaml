Assign Security Profile To Host:
  ai_description: >-
    ### General Description

    Assigns a specified security policy to one or more host entities within the Trend
    Micro Deep Security platform. This action allows security analysts to enforce
    specific security configurations on endpoints directly from the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Secret Key, API
    Version, Verify SSL) and the required action parameter (Security Profile Name).

    2. It initializes the `TrendmicroManager` to establish a connection with the Trend
    Micro Deep Security API.

    3. It retrieves the unique ID for the specified security policy by calling the
    API to list policies and matching the provided name.

    4. The action iterates through the provided host entities.

    5. For each host entity, it retrieves the corresponding computer ID from the Trend
    Micro Deep Security API.

    6. It then performs a POST request to update the host's configuration, assigning
    the retrieved policy ID to the computer.


    ### Additional Notes

    This action performs a state change on the external Trend Micro Deep Security
    system by modifying the security policy assigned to the target hosts.
  ai_short_description: >-
    Assigns a specified security policy to host entities in Trend Micro Deep Security.
  capabilities:
    can_create_case_comments: false
