  ai_description: >-
    ### General Description

    The `Scan Host` action requests a malware scan on specified HOSTNAME entities
    using Trend Micro Deep Security. It interacts with the Trend Micro API to locate
    the computer by its hostname and modifies its anti-malware state to initiate the
    scan.


    ### Flow Description

    1. The action iterates through the target entities provided in the case and filters
    for `HOSTNAME` entities.

    2. For each valid hostname, it queries the Trend Micro Deep Security API to retrieve
    the corresponding computer ID.

    3. It sends a POST request to modify the computer's configuration, setting the
    anti-malware state to 'on' to trigger a scan.

    4. The action aggregates the results and returns a success message listing the
    hostnames that were successfully scanned, or a failure message if no scans could
    be initiated.


    ### Parameters Description

    This action does not require any specific input parameters. It relies on the integration's
    configuration parameters to authenticate and communicate with the Trend Micro
    Deep Security instance.
