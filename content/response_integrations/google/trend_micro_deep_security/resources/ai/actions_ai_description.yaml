Get Security Profiles:
  ai_description: >-
    ### General Description

    Retrieves all security profiles (policies) from Trend Micro Deep Security.


    ### Flow Description

    1. Initializes the Trend Micro Deep Security manager with the provided API credentials.

    2. Sends a GET request to the Deep Security API to fetch all available security
    profiles (policies).

    3. Parses the response and constructs a CSV table containing the name, description,
    and ID of each policy.

    4. Attaches the generated table to the action results in Google SecOps.


