Add Deceptive Server:
  ai_description: >-
    General Description: Adds a new deceptive server to the Illusive Networks platform.
    This action allows security teams to deploy deceptive assets to detect unauthorized
    activity within the network.


    Flow Description:

    1. Extracts configuration parameters (API Root, API Key, CA Certificate, Verify
    SSL) to establish a connection to the Illusive Networks API.

    2. Extracts action parameters: Server Name, Service Types, and Policy Names.

    3. Initializes the IllusiveNetworksManager to interact with the Illusive Networks
    API.

    4. Performs a GET request to check if a deceptive server with the provided 'Server
    Name' already exists.

    5. If the server does not exist, performs a POST request to add the new deceptive
    server with the specified service types and policies.

    6. Returns a success or failure status based on the outcome of the API request.


    Additional Notes: This action performs a state change on the external Illusive
    Networks system by creating a new deceptive server. If a server with the same
    name already exists, the action will fail.
  ai_short_description: >-
    Adds a new deceptive server to the Illusive Networks platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new deceptive server to the Illusive Networks platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to check for the existence of a deceptive
      server and a POST request to add a new one. It does not mutate internal data,
      update entities, or create insights.
