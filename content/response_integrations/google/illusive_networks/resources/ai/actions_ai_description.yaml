Run Forensic Scan:
  ai_description: >-
    ### General Description

    Initiates a forensic scan on endpoint entities (IP Address and Hostname) using
    Illusive Networks and retrieves the scan results. The action can fetch various
    forensic artifacts such as system information, prefetch files, installed programs,
    startup processes, running processes, user-assist programs, and PowerShell history.


    ### Flow Description

    1. Filters the target entities to include only Hostname and IP Address entity
    types.

    2. Initiates a forensic scan request for each valid entity via the Illusive Networks
    API (`POST /api/v1/event/create-external-event`).

    3. Periodically checks the status of the scan to see if the incident data is ready
    (`GET /api/v1/incidents/id`).

    4. Once the scan is complete, retrieves the requested forensic data based on the
    action parameters (`GET /api/v1/forensics`).

    5. Enriches the entities with host information and attaches the forensic data
    as JSON results and data tables.


    ### Additional Notes

    This is an asynchronous action that will continue to poll the Illusive Networks
    platform until the forensic scan is completed or a timeout is reached.
  ai_short_description: >-
    Initiates a forensic scan on endpoint entities using Illusive Networks and retrieves
    the scan results including system information, running processes, and prefetch
    files.
