Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using information from Illusive Networks. This action
    retrieves detailed host information such as machine name, health status, operating
    system, and logged-in user to provide additional context for the asset.


    ### Flow Description

    1. Initializes the Illusive Networks manager and tests connectivity.

    2. Iterates over the target entities, filtering for Hostname entities.

    3. For each valid entity, makes a GET request to the Illusive Networks API (`/api/v2/monitoring/hosts`)
    to fetch host details.

    4. If data is found, updates the entity's `additional_properties` with the enrichment
    data and sets `is_enriched` to True.

    5. Adds a table with the host details to the action results.

    6. Updates the entities in the platform and provides a JSON result containing
    the raw data.


    ### Additional Notes

    - Supported entity types: Hostname.
