  ai_description: "### General Description\nEnriches Hostname entities with detailed\
    \ information retrieved from Illusive Networks. This action queries the Illusive\
    \ Networks monitoring API to gather metadata about specific hosts, such as operating\
    \ system details, health status, agent versions, and active user sessions. The\
    \ gathered data is used to update the entity's profile within Google SecOps and\
    \ provide context through data tables.\n\n### Parameters\n| Parameter Name | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| API Root | String\
    \ | Yes | The base URL of the Illusive Networks instance. |\n| API Key | String\
    \ | Yes | The API key used for authentication with the Illusive Networks service.\
    \ |\n| CA Certificate File | String | No | Base64 encoded CA certificate file\
    \ for SSL verification. |\n| Verify SSL | Boolean | Yes | If enabled (True), the\
    \ action will verify the SSL certificate of the Illusive Networks server. Default\
    \ is False. |\n\n### Flow Description\n1. **Initialization**: The action extracts\
    \ configuration parameters and initializes the Illusive Networks manager, performing\
    \ a connectivity test.\n2. **Entity Filtering**: It identifies all `HOSTNAME`\
    \ entities within the current context.\n3. **Data Retrieval**: For each identified\
    \ hostname, the action sends a GET request to the Illusive Networks API (`/api/v2/monitoring/hosts`)\
    \ to fetch host-specific metadata.\n4. **Internal Enrichment**: \n    * Updates\
    \ the entity's `is_enriched` status to True.\n    * Populates the entity's `additional_properties`\
    \ with data such as OS name, machine type, and health status.\n    * Attaches\
    \ a detailed data table to each entity containing the retrieved host information.\n\
    5. **Finalization**: Updates the entities in the Google SecOps platform and returns\
    \ a JSON result containing the raw data for all successfully enriched hosts."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties and adds entity tables within Google SecOps.
    reasoning: >-
      The action fetches host metadata from Illusive Networks via GET requests. It
      updates internal entity properties (`is_enriched`, `additional_properties`)
      and adds entity tables to the SOAR platform. It does not mutate external systems
      or modify alerts/comments.
  categories:
