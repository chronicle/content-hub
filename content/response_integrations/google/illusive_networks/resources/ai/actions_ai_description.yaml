  ai_description: >-
    Lists available deceptive items (users and servers) in Illusive Networks based
    on specified criteria.


    ### General Description

    This action connects to the Illusive Networks API to retrieve a list of deceptive
    users and/or servers. It allows filtering by the type of deceptive item and its
    state, and limits the number of results returned. The retrieved data is presented
    as data tables and JSON results within the action's output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Deceptive Type | Dropdown | Yes | Specify what kind of deceptive items should
    be returned (All, Only Users, Only Servers). |

    | Deceptive State | Dropdown | Yes | Specify what kind of deceptive items should
    be returned based on state (All, Only Approved, Only Suggested). |

    | Max Items To Return | String/Integer | No | Specify how many items to return.
    Default is 50. If nothing is specified, the action will return all items. |


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the Illusive Networks manager.

    3. Depending on the `Deceptive Type` parameter, fetches deceptive users and/or
    servers matching the `Deceptive State` up to the `Max Items To Return` limit.

    4. Formats the retrieved items into CSV tables and JSON objects.

    5. Attaches the tables and JSON results to the action output.

    6. Returns a success or failure message based on whether data was found.
