  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the **Illusive\
    \ Networks** platform. It validates that the integration's configuration parameters\u2014\
    such as the API Root, API Key, and SSL settings\u2014are correct and that the\
    \ external service is reachable.\n\n### Parameters Description\n| Parameter |\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **API Root**\
    \ | String | Yes | The base URL of the Illusive Networks API instance. |\n| **API\
    \ Key** | String | Yes | The API key used for authentication with the Illusive\
    \ Networks server. |\n| **CA Certificate File** | String | No | A base64 encoded\
    \ CA certificate file used for SSL verification if a custom certificate is required.\
    \ |\n| **Verify SSL** | Boolean | Yes | If enabled, the action will verify the\
    \ SSL certificate of the Illusive Networks server. Defaults to `False`. |\n\n\
    ### Additional Notes\n- This action does not interact with or process any SecOps\
    \ entities.\n- It is typically used during the initial setup of the integration\
    \ or for troubleshooting connection issues.\n\n### Flow Description\n1. **Parameter\
    \ Extraction:** The action retrieves the connection details (API Root, API Key,\
    \ CA Certificate, and SSL verification flag) from the integration configuration.\n\
    2. **Manager Initialization:** It initializes the `IllusiveNetworksManager` using\
    \ the extracted credentials and network settings.\n3. **Connectivity Test:** The\
    \ manager executes a `GET` request to the `/api/v1/incidents` endpoint (limiting\
    \ the result to 1) to confirm the API is responsive and the credentials are valid.\n\
    4. **Execution Outcome:** If the API call succeeds, the action completes with\
    \ a success status. If an error occurs (e.g., timeout, 401 Unauthorized), it catches\
    \ the exception and reports a failure."
