Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using the Illusive Networks platform. This action retrieves
    detailed forensic and host information, such as OS details, machine type, and
    logged-in users, to provide context for security investigations.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Root, API Key,
    and SSL verification settings.

    2. It filters the provided target entities to identify those of type 'HOSTNAME'.

    3. For each valid hostname, the action calls the Illusive Networks API (`/api/v2/monitoring/hosts`)
    to retrieve host details.

    4. If data is successfully retrieved, the action updates the entity's `additional_properties`
    with the enrichment data and marks the entity as enriched.

    5. It adds a detailed table of the host information to the action results for
    analyst review.

    6. Finally, the action updates the entities within the SOAR platform and returns
    a summary of enriched and failed entities.


    ### Additional Notes

    This action requires a valid API Key and API Root for the Illusive Networks instance.
    It only processes entities of type 'HOSTNAME'.
