Add Deceptive User:
  ai_description: >-
    ### General Description

    Adds a new deceptive user to the Illusive Networks platform. This action allows
    security teams to deploy decoys within their environment to detect unauthorized
    access or lateral movement.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    etc.) and action parameters (Username, Password, DNS Domain, Policy Names).

    2. The `IllusiveNetworksManager` is initialized with the provided credentials.

    3. The action calls the `get_deceptive_user` method (GET request) to check if
    a deceptive user with the specified username already exists.

    4. If the user exists, the action raises a `ManagerAlreadyExistException` and
    terminates.

    5. If the user does not exist, the action calls the `add_deceptive_user` method
    (POST request) to create the new deceptive user in the Illusive Networks platform.

    6. The action returns a success or failure status based on the outcome of the
    API call.


    ### Additional Notes

    This action requires valid API credentials for the Illusive Networks integration.
    The `Policy Names` parameter accepts a comma-separated list of policies; if left
    empty, the system defaults to applying all available policies.
  ai_short_description: >-
    Adds a new deceptive user to the Illusive Networks platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
