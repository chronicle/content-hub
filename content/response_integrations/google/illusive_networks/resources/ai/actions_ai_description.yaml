Add Deceptive Server:
  ai_description: >-
    ### General Description

    Adds a new deceptive server in Illusive Networks.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the Illusive Networks manager.

    3. Checks if a deceptive server with the specified name already exists via an
    API GET request.

    4. If the server does not exist, makes a POST request to the Illusive Networks
    API to add the new deceptive server with the specified service types and policies.

    5. Returns a success message upon completion.


    ### Additional Notes

    None.
