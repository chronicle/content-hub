  ai_description: >-
    ### General Description

    The `Add Deceptive Server` action creates a new deceptive server in Illusive Networks.
    It verifies if the server already exists and, if not, provisions it with the specified
    service types and policies.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Server Name | String | Yes | Specify the name of the deceptive server to be
    added. |

    | Service Types | String | Yes | Specify a comma-separated list of service types
    for the new deceptive server. |

    | Policy Names | String | No | Specify a comma-separated list of policies that
    need to be applied to the new deceptive server. If nothing is provided, the action
    will use all policies by default. |


    ### Flow Description

    1. The action initializes the connection to Illusive Networks.

    2. It checks if a deceptive server with the provided `Server Name` already exists.

    3. If the server exists, the action halts and returns an error.

    4. If the server does not exist, it creates the deceptive server using the provided
    `Service Types` and `Policy Names`.

    5. The action returns a success message upon successful creation.
