  ai_description: >-
    ### General Description

    Adds a new deceptive server to the Illusive Networks platform. This action enables
    security teams to programmatically deploy decoys designed to detect unauthorized
    lateral movement within the network. It checks for the existence of the server
    before attempting creation to avoid duplicates.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Name | String | Yes | The hostname or identifier for the new deceptive
    server to be created. |

    | Service Types | String | Yes | A comma-separated list of service types (e.g.,
    DB, RDP, HTTP) to be configured on the new deceptive server. |

    | Policy Names | String | No | A comma-separated list of policies to apply to
    the new deceptive server. If left empty, the action defaults to applying all available
    policies. |


    ### Flow Description

    1. **Connection Setup**: Initializes the Illusive Networks manager using the API
    root and credentials.

    2. **Duplicate Check**: Performs a lookup to see if a deceptive server with the
    provided 'Server Name' already exists in the system.

    3. **Server Creation**: If the server does not exist, the action sends a request
    to the Illusive Networks API to create the server with the specified 'Service
    Types' and 'Policy Names'.

    4. **Completion**: Returns a success message upon successful creation or an error
    if the server already exists or the API request fails.


    ### Additional Notes

    - This action does not run on entities; it relies entirely on the provided input
    parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new deceptive server in the Illusive Networks platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to check for the existence of a server (fetches_data=true)
      and a POST request to create a new deceptive server in the Illusive Networks
      platform (can_mutate_external_data=true). It does not modify any internal Google
      SecOps data or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is not an enrichment action because it mutates external data (creates
      a server) and does not meet the read-only requirement for external systems.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
