Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Illusive Networks server using the provided configuration
    parameters. This action verifies that the integration is correctly configured
    and can successfully communicate with the Illusive Networks API.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `API Key`, `CA Certificate File`,
    `Verify SSL`) from the integration configuration.

    2. Initializes the `IllusiveNetworksManager` with the provided credentials and
    SSL settings.

    3. Executes a `GET` request to the `/api/v1/incidents?limit=1` endpoint to verify
    connectivity.

    4. Validates the API response to ensure the server is reachable and the credentials
    are valid.

    5. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This action does not perform any data retrieval or modification on entities or
    alerts. It is strictly used for troubleshooting and verifying the integration
    setup.
