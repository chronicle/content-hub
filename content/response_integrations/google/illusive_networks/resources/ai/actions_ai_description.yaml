  ai_description: "### General Description\nThe **List Deceptive Items** action retrieves\
    \ a comprehensive list of deceptive users and servers currently configured within\
    \ the Illusive Networks environment. This action is primarily used for auditing\
    \ and visibility, allowing security teams to see which decoys are active, suggested,\
    \ or approved without modifying any external configurations.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| **Deceptive Type** | String (Enum) | Yes | Determines the category\
    \ of deceptive items to fetch. Options include `All`, `Only Users`, or `Only Servers`.\
    \ |\n| **Deceptive State** | String (Enum) | Yes | Filters the results based on\
    \ the lifecycle state of the deceptive item. Options include `All`, `Only Approved`,\
    \ or `Only Suggested`. |\n| **Max Items To Return** | Integer | No | Limits the\
    \ number of items returned for each category. If left empty, the action defaults\
    \ to 50 items. |\n\n### Flow Description\n1. **Parameter Extraction**: The action\
    \ retrieves the user-defined filters for deceptive type, state, and the result\
    \ limit.\n2. **API Interaction**: \n    - If the type is `All` or `Only Users`,\
    \ it queries the Illusive Networks API for deceptive user accounts.\n    - If\
    \ the type is `All` or `Only Servers`, it queries the API for deceptive server\
    \ hosts.\n3. **Data Processing**: The retrieved items are filtered by the specified\
    \ `Deceptive State` (Approved/Suggested) and truncated based on the `Max Items\
    \ To Return` value.\n4. **Output Generation**: \n    - Results are formatted into\
    \ two separate data tables: \"Deceptive Users\" and \"Deceptive Servers\".\n \
    \   - A full JSON payload containing the raw details of all identified items is\
    \ attached to the action result for further playbook processing."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs GET requests to the Illusive Networks API to retrieve a
      list of deceptive items. It does not mutate any external systems, nor does it
      modify internal Google SecOps data (such as entities, insights, or case comments).
      It simply outputs the retrieved data as tables and JSON results.
  categories:
    enrichment: false
    reasoning: >-
      The action retrieves a list of deceptive items from an external system. It does
      not enrich specific alerts or entities, nor does it perform any of the allowed
      internal mutations (like adding insights or comments). Therefore, it does not
