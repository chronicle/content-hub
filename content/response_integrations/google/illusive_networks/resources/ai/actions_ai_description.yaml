    ### General Description

    Lists available deceptive items (users and/or servers) in Illusive Networks based
    on specified criteria.


    ### Flow Description

    1. Extracts the action parameters: `Deceptive Type`, `Deceptive State`, and `Max
    Items To Return`.

    2. If the deceptive type includes users, makes a GET request to the Illusive Networks
    API to fetch deceptive users matching the state.

    3. If the deceptive type includes servers, makes a GET request to the Illusive
    Networks API to fetch deceptive servers matching the state.

    4. Formats the retrieved data into CSV tables and JSON results.

    5. Returns the results to the SecOps platform.


