  ai_description: >-
    Adds a new deceptive user in Illusive Networks.


    ### General Description

    This action creates a new deceptive user in the Illusive Networks platform. It
    first checks if a user with the specified username already exists to prevent duplication.
    If the user does not exist, it proceeds to create the deceptive user with the
    provided credentials, domain, and policies.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Username | True | String | Specify the username for the new deceptive user.
    |

    | Password | True | Password | Specify the password for the new deceptive user.
    |

    | DNS Domain | False | String | Specify the domain name for the new deceptive
    user. |

    | Policy Names | False | String | Specify a comma-separated list of policies that
    need to be applied to the new deceptive user. If nothing is provided, the action
    will use all policies by default. |


    ### Flow Description

    1. Extracts the configuration and action parameters.

    2. Initializes the Illusive Networks manager.

    3. Checks if the specified deceptive user already exists.

    4. If the user exists, the action fails with an error.

    5. If the user does not exist, it creates the deceptive user using the provided
    parameters.

    6. Returns a success message upon completion.
