  ai_description: >-
    Initiates a forensic scan on endpoint entities (Hostname and IP Address) in Illusive
    Networks and retrieves the scan results. The action creates a forensic scan request
    on the external system and waits for the incident data to become available. Once
    ready, it fetches detailed forensic information based on the provided parameters,
    such as system information, prefetch files, installed programs, startup processes,
    running processes, user-assist programs, and PowerShell history. The retrieved
    data is used to enrich the entities and is attached to the case as data tables.


    ### Flow Description

    1. Filters target entities to include only Hostname and IP Address types.

    2. Initiates a forensic scan request for each valid entity in Illusive Networks.

    3. Periodically checks the status of the scan until the incident data is ready.

    4. Retrieves the requested forensic data (e.g., system info, running processes)
    for each completed scan.

    5. Enriches the entities with host information and attaches the forensic data
    as data tables to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Include System Information | Boolean | Yes | If enabled, action will return
    system information. |

    | Include Prefetch Files Information | Boolean | Yes | If enabled, action will
    return information about prefetch files. |

    | Include Add-Remove Programs Information | Boolean | Yes | If enabled, action
    will return information about add-remove programs. |

    | Include Startup Processes Information | Boolean | Yes | If enabled, action will
    return information about startup processes. |

    | Include Running Processes Information | Boolean | Yes | If enabled, action will
    return information about running processes. |

    | Include User-Assist Programs Information | Boolean | Yes | If enabled, action
    will return information about user-assist programs. |

    | Include Powershell History Information | Boolean | Yes | If enabled, action
    will return information about powershell history. |

    | Max Items To Return | String | No | Specify how many items to return. If nothing
    is provided, action will return everything. |


    ### Additional Notes

    At least one of the 'Include ...' parameters must be enabled for the action to
    execute successfully.
