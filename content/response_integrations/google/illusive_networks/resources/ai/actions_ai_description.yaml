Run Forensic Scan:
  ai_description: >-
    ### General Description

    Initiates and retrieves forensic scan data from Illusive Networks for specified
    endpoints. This action allows security analysts to gather detailed forensic information,
    such as system configuration, prefetch files, installed programs, startup processes,
    running processes, user-assist programs, and PowerShell history, to aid in incident
    investigation and threat hunting.


    ### Flow Description

    1. The action identifies `HOSTNAME` and `ADDRESS` entities from the target entities
    list.

    2. It initiates a forensic scan request for each identified entity by making a
    POST request to the Illusive Networks API (`create_forensic_scan_request`).

    3. The action enters a polling loop (or subsequent execution) to check the status
    of the forensic scan using the `get_incident_id` API call.

    4. Once the scan is ready, it fetches the requested forensic data (based on the
    configured parameters) using the `get_forensic_data` API call.

    5. The action updates the entity with the retrieved forensic data in its `additional_properties`
    and marks the entity as enriched.

    6. Finally, it adds the forensic results to the case as tables and a JSON result
    object.


    ### Additional Notes

    This action is asynchronous and may require multiple runs to complete, as it must
    wait for the forensic scan to be processed by the Illusive Networks platform.
