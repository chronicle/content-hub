Add Deceptive User:
  ai_description: >-
    ### General Description

    Adds a new deceptive user in Illusive Networks. This action creates a honeypot
    user account to help detect unauthorized access or lateral movement within the
    network.


    ### Flow Description

    1. Extracts the provided username, password, DNS domain, and policy names from
    the action parameters.

    2. Queries the Illusive Networks API to check if a deceptive user with the specified
    username already exists.

    3. If the user already exists, the action halts and raises an exception.

    4. If the user does not exist, a POST request is sent to the Illusive Networks
    API to create the new deceptive user with the provided details.

    5. Returns a success message upon successful creation.


    ### Additional Notes

    - If no policy names are provided, the action will apply all default policies
    to the new deceptive user.
