  ai_description: >-
    ### General Description

    Initiates and retrieves a comprehensive forensic scan for **HOSTNAME** and **ADDRESS**
    entities using the Illusive Networks platform. This action is asynchronous; it
    first triggers a scan on the target endpoint and then polls for the results. Once
    the scan is complete, it fetches detailed forensic artifacts based on the user's
    configuration, such as system information, running processes, and PowerShell history.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Include System Information** | Boolean | Yes | If enabled, retrieves OS name,
    machine type, host details, and logged-in user information. |

    | **Include Prefetch Files Information** | Boolean | Yes | If enabled, retrieves
    details about Windows prefetch files, including last execution times. |

    | **Include Add-Remove Programs Information** | Boolean | Yes | If enabled, retrieves
    the list of installed programs from the endpoint. |

    | **Include Startup Processes Information** | Boolean | Yes | If enabled, retrieves
    information about processes configured to start automatically. |

    | **Include Running Processes Information** | Boolean | Yes | If enabled, retrieves
    a snapshot of currently active processes on the endpoint. |

    | **Include User-Assist Programs Information** | Boolean | Yes | If enabled, retrieves
    registry-based information about user program execution. |

    | **Include Powershell History Information** | Boolean | Yes | If enabled, retrieves
    the command history for PowerShell sessions. |

    | **Max Items To Return** | Integer | No | Specifies the maximum number of items
    to return for each forensic category (e.g., processes, files). Defaults to 50
    if not specified. |


    ### Additional Notes

    * **Requirement:** At least one of the "Include..." parameters must be set to
    `True` for the action to execute successfully.

    * **Asynchronous Execution:** The action will remain in an "In Progress" state
    while waiting for Illusive Networks to generate the forensic report.


    ### Flow Description

    1. **Initialization:** Validates that at least one forensic data category is selected
    and checks the connectivity to Illusive Networks.

    2. **Scan Initiation:** Sends a POST request to Illusive Networks to create an
    external forensic scan event for each target entity.

    3. **Status Polling:** Periodically checks the status of the initiated events
    until the forensic data is ready for retrieval.

    4. **Data Retrieval:** Once ready, the action fetches the specific forensic modules
    (System Info, Prefetch, etc.) requested via the parameters.

    5. **Internal Enrichment:** Updates the entities with host information and attaches
    detailed CSV-formatted data tables to the case for each retrieved forensic category.
