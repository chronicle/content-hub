Illusive Networks - Incidents Connector:
  ai_description: >-
    ### General Description

    The Illusive Networks - Incidents Connector enables the ingestion of security
    incidents from the Illusive Networks platform into Google SecOps. It retrieves
    incident data, including forensic timelines, and converts them into actionable
    alerts within the SOAR platform, allowing security teams to monitor and respond
    to deceptive-based threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the Python process.
    |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | API Root | String | Yes | API root URL of the Illusive Networks instance. |

    | API Key | String | Yes | API Key for authentication. |

    | CA Certificate File | String | No | Base64 encoded CA certificate file. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate. |

    | Alert Severity | String | Yes | Severity level for created alerts (Informational,
    Low, Medium, High, Critical). |

    | Max Hours Backwards | Integer | No | Lookback period in hours for the initial
    run. |

    | Max Incidents To Fetch | Integer | No | Maximum number of incidents to process
    per iteration. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, treats the whitelist
    as a blacklist. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | String | No | Password for proxy authentication. |


    ### Flow Description

    1. The connector initializes by extracting configuration parameters and validating
    the environment mapping file.

    2. It determines the start time for fetching incidents based on the last successful
    run or the configured lookback period.

    3. It queries the Illusive Networks API to retrieve recent incidents.

    4. Fetched incidents are filtered to exclude previously processed items and to
    apply whitelist/blacklist logic based on incident types.

    5. For each valid incident, the connector fetches the associated forensic timeline
    data.

    6. The incident data is mapped into a standardized alert format, including severity
    and environment information.

    7. The connector checks for alert overflow and, if valid, adds the alert to the
    processing queue.

    8. Finally, it saves the processed incident IDs and the last run timestamp, then
    returns the alerts to the SOAR platform.
