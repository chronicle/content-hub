Illusive Networks - Incidents Connector:
  ai_description: >-
    ### General Description

    The Illusive Networks - Incidents Connector is designed to integrate Google SecOps
    (Chronicle) with the Illusive Networks platform. It periodically fetches security
    incidents and their associated forensic timelines from Illusive Networks, converting
    them into actionable alerts within the SOAR platform. This allows security teams
    to monitor and respond to deception-based alerts efficiently.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Enter the source field name in order to
    retrieve the Product Field name. |

    | EventClassId | String | Yes | Enter the source field name in order to retrieve
    the Event Field name. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the python process
    running the current script. |

    | Environment Field Name | String | No | Describes the name of the field where
    the environment name is stored. |

    | Environment Regex Pattern | String | No | A regex pattern to run on the value
    found in the "Environment Field Name" field. |

    | API Root | String | Yes | API root of the Illusive Networks instance. |

    | API Key | String | Yes | API Key of the Illusive Networks. |

    | CA Certificate File | String | No | Base 64 encoded CA certificate file. |

    | Verify SSL | Boolean | Yes | If enabled, verify the SSL certificate for the
    connection to the Illusive Networks server is valid. |

    | Alert Severity | String | Yes | Severity of the Siemplify alert that will be
    created. |

    | Max Hours Backwards | Integer | No | Number of hours before the first connector
    iteration to retrieve incidents from. |

    | Max Incidents To Fetch | Integer | No | How many incidents to process per one
    connector iteration. |

    | Use whitelist as a blacklist | Boolean | Yes | If enabled, whitelist will be
    used as a blacklist. |

    | Proxy Server Address | String | No | The address of the proxy server to use.
    |

    | Proxy Username | String | No | The proxy username to authenticate with. |

    | Proxy Password | String | No | The proxy password to authenticate with. |


    ### Flow Description

    1. Connects to the Illusive Networks API using the provided API Root and API Key.

    2. Retrieves incidents since the last successful execution time (or a configured
    fallback period).

    3. Filters incidents based on previously processed IDs and configured whitelist/blacklist
    settings.

    4. For each new incident, fetches the detailed forensic timeline from Illusive
    Networks.

    5. Maps the incident and forensic data into a standardized SOAR alert format.

    6. Ingests the alerts into the SOAR platform, updating the last successful run
    timestamp upon completion.
