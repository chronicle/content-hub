product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Illusive Networks integration provides capabilities for incident ingestion,
    host-based forensic analysis, and asset enrichment. The 'Illusive Networks - Incidents
    Connector' fetches security incidents and creates alerts in the SOAR platform,
    which aligns with the SIEM category. The 'Run Forensic Scan' action retrieves
    deep process-level activity (e.g., running processes, PowerShell history) for
    specific hosts, which aligns with the EDR category. The 'Enrich Entities' action
    retrieves host metadata (OS, health, user), which aligns with the Asset Inventory
    category. It does not perform network security, threat intelligence, email security,
    IAM, cloud security, ITSM, or collaboration functions as defined.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
