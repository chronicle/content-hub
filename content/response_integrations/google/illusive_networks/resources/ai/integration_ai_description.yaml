product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: true
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Illusive Networks integration is primarily categorized as SIEM, EDR, and Asset
    Inventory. It qualifies as SIEM because the 'Illusive Networks - Incidents Connector'
    ingests security incidents and alerts into the SOAR platform, enabling monitoring
    of deceptive-based threats. It qualifies as EDR because the 'Run Forensic Scan'
    action retrieves deep process-level activity (running processes, PowerShell history,
    startup processes) from host entities, which is critical for endpoint investigation.
    It qualifies as Asset Inventory because the 'Enrich Entities' action retrieves
    detailed host metadata (OS, health, agent version), providing visibility into
    internal assets. It does not qualify for Network Security (no blocking/gateway
    interaction), Threat Intelligence (no reputation lookups), IAM (deceptive users
    are not real identity accounts), or other categories like ITSM or Cloud Security.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
