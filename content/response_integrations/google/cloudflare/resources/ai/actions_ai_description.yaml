Update Firewall Rule:
  ai_description: >-
    ### General Description

    Updates an existing firewall rule in Cloudflare. This action modifies the configuration
    of a specified firewall rule, including its action, products, priority, reference
    tag, and filter expression.


    ### Flow Description

    1. Validates the provided parameters, ensuring that "Products" are specified if
    the "Bypass" action is selected, and checks the length of the "Reference Tag".

    2. Retrieves the Zone ID from Cloudflare using the provided Zone Name.

    3. Searches for the specified firewall rule by its Rule Name within the zone.

    4. Updates the firewall rule in Cloudflare with the new action, products, priority,
    and reference tag.

    5. If an Expression is provided, updates the associated firewall filter with the
    new expression.

    6. Retrieves the updated firewall rule data from Cloudflare.

    7. Returns the updated rule details as a JSON result.


    ### Additional Notes

    This action does not operate on entities.
