Add IP To Rule List:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified rule list in Cloudflare. This action allows
    security teams to dynamically update Cloudflare rule lists with malicious or suspicious
    IP addresses identified during an investigation.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL, Account
    Name) and action parameters (Rule Name, Description).

    2. Filters target entities to include only IP Address entities.

    3. Initializes the `CloudflareManager` to interact with the Cloudflare API.

    4. Retrieves the specified rule list by name and validates that it is of the 'ip'
    kind.

    5. Iterates through each valid IP entity and calls the `add_ip_to_rule_list` method
    (POST request) to add the IP to the specified rule list.

    6. Updates the action result with the JSON response from Cloudflare and provides
    a summary message of successful and failed additions.


    ### Additional Notes

    Requires a valid Cloudflare API token and account configuration. The rule list
    must be of type 'ip'.
