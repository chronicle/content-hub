  ai_description: >-
    ### General Description

    Updates an existing firewall rule in Cloudflare. This action modifies the configuration
    of a specified firewall rule within a given zone, allowing changes to its action,
    expression, products, priority, and reference tag.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Rule Name | String | Yes | Specify the name of the rule that needs to be updated.
    |

    | Zone Name | String | Yes | Specify the name of the zone, which will contain
    the firewall rule. |

    | Action | String | No | Specify the action for the firewall rule (e.g., Allow,
    Block, Bypass, Log). If "Bypass" is selected, you must provide values in the "Products"
    parameter. |

    | Expression | String | No | Specify the expression for the firewall rule. |

    | Products | String | No | Specify a comma-separated list of products for the
    firewall rule. Possible values: zoneLockdown, uaBlock, bic, hot, securityLevel,
    rateLimit, waf. |

    | Priority | String | No | Specify the priority for the firewall rule. Must be
    a positive number. |

    | Reference Tag | String | No | Specify a reference tag for the firewall rule.
    It can only be up to 50 characters long. |


    ### Additional Notes

    - The "Products" parameter becomes mandatory if the "Action" parameter is set
    to "Bypass".

    - The "Priority" parameter must be a positive number.

    - The "Reference Tag" parameter has a maximum length limit of 50 characters.


    ### Flow Description

    1. Retrieves the zone information from Cloudflare using the provided `Zone Name`.

    2. Searches for the firewall rule within the retrieved zone using the provided
    `Rule Name`.

    3. Validates the input parameters, ensuring that "Products" are provided if the
    action is "Bypass", and checks the length of the "Reference Tag" and the value
    of "Priority".

    4. Updates the firewall rule in Cloudflare with the new action, products, priority,
    and reference tag.

    5. If an `Expression` is provided, updates the firewall filter associated with
    the rule.

    6. Retrieves the updated firewall rule data and attaches it to the action's JSON
    result.
