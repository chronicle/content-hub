  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Rule Name | String | Yes | Specify the name of the rule that needs to be updated.
    |

    | Zone Name | String | Yes | Specify the name of the zone, which will contain
    the firewall rule. |

    | Action | Dropdown | No | Specify the action for the firewall rule. If "Bypass"
    is selected, you need to provide values in the "Products" parameter. |

    | Expression | String | No | Specify the expression for the firewall rule. |

    | Products | String | No | Specify a comma-separated list of products for the
    firewall rule. Note: this parameter is only mandatory, if "Bypass" is selected
    for "Action" parameter. Possible values: zoneLockdown, uaBlock, bic, hot, securityLevel,
    rateLimit, waf. |

    | Priority | String | No | Specify the priority for the firewall rule. |

    | Reference Tag | String | No | Specify a reference tag for the firewall rule.
    Note: it can only be up to 50 characters long. |
