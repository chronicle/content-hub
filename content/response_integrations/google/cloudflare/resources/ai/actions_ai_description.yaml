Add IP To Rule List:
  ai_description: >-
    ### General Description

    Adds IP Address entities to a specified rule list in Cloudflare. This action allows
    security teams to dynamically update Cloudflare rule lists with new IP addresses,
    which can then be used in firewall rules to block, challenge, or allow traffic.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters.

    2. Makes a GET request to the Cloudflare API to retrieve the specified rule list
    and verifies that its kind is 'ip'.

    3. Filters the target entities to include only IP Addresses.

    4. Iterates through the suitable entities and makes a POST request to the Cloudflare
    API to add each IP address to the rule list.

    5. Collects the results and returns a summary message indicating successful and
    failed additions.


    ### Additional Notes

    - The target rule list in Cloudflare must be of type 'ip'.

    - The action will fail for a specific entity if the IP is already in the list
    or if the API request encounters an error, but it will continue processing other
    entities.
  ai_short_description: >-
    Adds IP Address entities to a specified rule list in Cloudflare.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
