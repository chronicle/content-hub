Create Firewall Rule:
  ai_description: >-
    ### General Description

    Creates a new firewall rule within a specified Cloudflare zone. This action allows
    users to define custom firewall rules, including the action to take (e.g., Block,
    Allow, Bypass), the matching expression, and optional configurations like priority
    and reference tags.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Token, Verify SSL, Account Name) and action parameters (Zone Name, Name,
    Action, Expression, Products, Priority, Reference Tag).

    2. **Input Validation**: The action validates the provided parameters, ensuring
    that if "Bypass" is selected as the action, the "Products" parameter is provided,
    and that the "Reference Tag" and "Priority" values meet the required constraints.

    3. **Zone Retrieval**: The action calls the Cloudflare API (`GET /client/v4/zones`)
    to retrieve the `zone_id` associated with the provided `Zone Name`.

    4. **Rule Creation**: The action sends a POST request to the Cloudflare API (`POST
    /client/v4/zones/{zone_id}/firewall/rules`) to create the firewall rule with the
    specified configuration.

    5. **Result Handling**: The details of the created firewall rule are returned
    as a JSON result.


    ### Additional Notes

    The action defaults to a "Block" action if no specific action is provided. Ensure
    the "Expression" parameter is correctly formatted according to Cloudflare's firewall
    rule syntax.
  ai_short_description: >-
    Creates a new firewall rule within a specified Cloudflare zone.
