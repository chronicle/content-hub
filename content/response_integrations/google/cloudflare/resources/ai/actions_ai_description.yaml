Update Firewall Rule:
  ai_description: >-
    ### General Description

    Updates an existing firewall rule within a specified Cloudflare zone. This action
    allows users to modify rule properties such as action, priority, products, and
    reference tags, as well as the underlying filter expression.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, etc.) and action parameters
    (Rule Name, Zone Name, etc.).

    2. Initializes the Cloudflare manager to interact with the Cloudflare API.

    3. Retrieves the zone ID for the provided `Zone Name` using the Cloudflare API.

    4. Lists firewall rules in the zone to find the rule matching the provided `Rule
    Name`.

    5. Updates the firewall rule properties (action, products, priority, reference
    tag) using a PUT request to the Cloudflare API.

    6. Updates the firewall filter expression using a PUT request if a new expression
    is provided.

    7. Retrieves the updated rule data and adds it to the action results.


    ### Additional Notes

    Requires valid Cloudflare API credentials and appropriate permissions. If "Bypass"
    is selected for the "Action" parameter, the "Products" parameter must be provided.
  ai_short_description: >-
    Updates an existing firewall rule in Cloudflare by modifying its properties and
    filter expression.
