    the Cloudflare API endpoint (`/client/v4/accounts`) to verify the account name
    and connectivity.

    4. Validates the API response to ensure the account is accessible.

    5. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This action does not interact with entities or modify any data; it is strictly
    for verifying integration configuration.
