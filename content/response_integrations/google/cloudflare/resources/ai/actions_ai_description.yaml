Add URL To Rule List:
  ai_description: >-
    ### General Description

    This action adds URL entities to a specified rule list in Cloudflare. It is specifically
    designed to work with rule lists of type "redirect", treating the URL entities
    as "Source URLs" and redirecting them to a specified "Target URL".


    ### Flow Description

    1. The action retrieves configuration and action parameters, including the target
    rule list name and redirect settings.

    2. It validates the parameters, ensuring that "Subpath Matching" is enabled if
    "Preserve Path Suffix" is selected.

    3. It queries the Cloudflare API to retrieve the specified rule list and verifies
    that its kind is "redirect".

    4. The action iterates over the target entities, filtering for those of type URL.

    5. For each URL entity, it makes a POST request to the Cloudflare API (`/client/v4/accounts/{account_id}/rules/lists/{rule_id}/items`)
    to add the URL as a rule list item with the configured redirect settings.

    6. The action collects the results and returns a JSON object containing the details
    of the successfully added rule list items.


    ### Additional Notes

    URL entities are treated as "Source URLs". The target rule list must be of type
    "redirect".
  ai_short_description: >-
    Adds URL entities to a specified redirect rule list in Cloudflare, configuring
    them as source URLs to be redirected to a target URL.
