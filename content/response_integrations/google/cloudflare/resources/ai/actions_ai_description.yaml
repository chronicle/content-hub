  ai_description: >-
    Adds URL entities to a specified rule list in Cloudflare. This action is typically
    used to redirect traffic from specific source URLs to a target URL.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates parameters, ensuring that if `Preserve Path Suffix` is enabled, `Subpath
    Matching` is also enabled.

    3. Fetches the specified rule list from Cloudflare to retrieve its ID and verifies
    that its kind is `redirect`.

    4. Iterates over the target URL entities.

    5. For each URL entity, adds it as a source URL to the rule list item payload
    and sends a request to the Cloudflare API to create the rule list item.

    6. Returns a summary of successful and failed entities, along with the JSON results
    of the created rule list items.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Rule Name | String | Yes | Specify the name of the rule list to which you want
    to add rule list items. |

    | Target URL | String | Yes | Specify the target URL for the rule list item. |

    | Description | String | No | Specify a description for the newly added rule list
    item. |

    | Status Code | Dropdown | No | Specify the status for the rule list item (e.g.,
    301, 302, 307, 308). |

    | Preserve Query String | Boolean | No | If enabled, the rule list item will preserve
    the query string. |

    | Include Subdomains | Boolean | No | If enabled, the rule list item will include
    subdomains. |

    | Subpath Matching | Boolean | No | If enabled, the rule list item will match
    the subpath. |

    | Preserve Path Suffix | Boolean | No | If enabled, the rule list item will preserve
    the path suffix. |


    ### Additional Notes

    - If the `Preserve Path Suffix` parameter is enabled, the `Subpath Matching` parameter
    must also be enabled for the action to execute successfully.
