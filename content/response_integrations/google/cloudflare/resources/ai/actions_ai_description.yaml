List Firewall Rules:
  ai_description: >-
    ### General Description

    Lists available firewall rules in Cloudflare for a specified zone. The action
    allows filtering the retrieved rules based on specific keys and logic, and limits
    the number of returned records.


    ### Flow Description

    1. Initializes the Cloudflare API client using the provided integration configuration.

    2. Makes a GET request to the Cloudflare API (`/client/v4/zones`) to retrieve
    the zone ID associated with the provided `Zone Name`.

    3. Makes a GET request to the Cloudflare API (`/client/v4/zones/{zone_id}/firewall/rules`)
    to fetch the firewall rules for the identified zone.

    4. Applies filtering logic (e.g., 'Equal', 'Contains') based on the `Filter Key`
    and `Filter Value` parameters.

    5. Limits the results to the number specified in `Max Records To Return`.

    6. Outputs the retrieved rules as a data table and JSON result in the SecOps platform.


    ### Additional Notes

    This action is purely for data retrieval and does not modify any configurations
    or rules within Cloudflare.
