Add URL To Rule List:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified redirect rule list in Cloudflare.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Account Name, Verify
    SSL).

    2. Extracts action parameters (Rule Name, Target URL, Description, Status Code,
    etc.).

    3. Initializes `CloudflareManager`.

    4. Retrieves the target rule list ID using `manager.get_rule_list` (GET request).

    5. Validates that the rule list is of type "redirect".

    6. Iterates through `target_entities` filtered by `EntityTypes.URL`.

    7. For each URL entity, calls `manager.add_url_to_rule_list` (POST request to
    Cloudflare API) to add the URL to the rule list.

    8. Updates the action result with successful/failed entities.


    ### Additional Notes

    Requires a valid Cloudflare API token and account name. The rule list must be
    of type "redirect".
