identifier: Cloudflare
name: Cloudflare
parameters:
-   name: API Root
    default_value: https://api.cloudflare.com
    type: string
    description: API root of the Cloudflare instance.
    is_mandatory: true
    integration_identifier: Cloudflare
-   name: API Token
    default_value: ''
    type: password
    description: API Token of the Cloudflare instance.
    is_mandatory: true
    integration_identifier: Cloudflare
-   name: Account Name
    default_value: ''
    type: string
    description: Name of the account that needs to be used in the integration.
    is_mandatory: true
    integration_identifier: Cloudflare
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Cloudflare server is valid.
    is_mandatory: true
    integration_identifier: Cloudflare
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cloudflare
categories:
- Cloud
- Cloud Security
- Network Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
