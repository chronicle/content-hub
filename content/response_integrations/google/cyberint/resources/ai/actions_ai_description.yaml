Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cyberint server using the provided configuration parameters.
    This action is designed to verify that the integration is correctly configured
    and can communicate with the external service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, and `Verify SSL` from the integration settings.

    2. It initializes the `CyberintManager` with these parameters.

    3. The action calls the `test_connectivity` method, which sends a POST request
    to the Cyberint API endpoint (`/alert/api/v1/alerts`) to verify the connection.

    4. If the request is successful, the action returns a success message. If an error
    occurs, it logs the exception and returns a failure message.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment, entity updates, or modifications to external systems.
  ai_short_description: >-
    Tests connectivity to the Cyberint server.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test (ping) to the Cyberint API. It does
      not fetch contextual data, mutate external or internal data, update entities,
      create insights, or modify alerts.
