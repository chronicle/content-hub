Update Alert:
  ai_description: >-
    ### General Description

    Updates the status and closure reason of a specific alert in Cyberint. This action
    initiates a state change on the external Cyberint platform to reflect the current
    investigation or resolution status of an alert.


    ### Flow Description

    1. Extracts the `Alert ID`, `Status`, and `Closure Reason` from the action parameters.

    2. Validates the provided status and closure reason, ensuring that a closure reason
    is provided if the status is set to "Closed".

    3. Makes a PUT request to the Cyberint API (`/alert/api/v1/alerts/status`) to
    update the alert's status and closure reason.

    4. Returns a success message if the update is successful, or an error message
    if the operation fails.


    ### Additional Notes

    - If the "Status" parameter is set to "Closed", the "Closure Reason" parameter
    becomes mandatory for the action to execute successfully.
  ai_short_description: >-
    Updates the status and closure reason of a specific alert in the Cyberint platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and closure reason of an alert in the Cyberint platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Cyberint API to update the status of an
      alert. It mutates external data but does not fetch contextual data, update internal
