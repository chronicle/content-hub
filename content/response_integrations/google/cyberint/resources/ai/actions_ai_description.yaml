  ai_description: >-
    Tests connectivity to the Cyberint platform using the provided API credentials.


    ### Flow Description

    1. Extracts the API Root, API Key, and Verify SSL parameters from the integration
    configuration.

    2. Initializes the CyberintManager with the provided credentials.

    3. Sends a test request to the Cyberint API to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    This action does not take any specific parameters as it relies on the integration
    configuration parameters.
