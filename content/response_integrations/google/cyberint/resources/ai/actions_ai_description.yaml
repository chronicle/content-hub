    get_alert_information: false
    reasoning: >-
      The action updates an alert in an external system (Cyberint). It does not update
      an alert within the SecOps platform (Update Alert), nor does it synchronize
      with an ITSM ticketing system (Update Ticket). It does not match any other specific
      outcome categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
