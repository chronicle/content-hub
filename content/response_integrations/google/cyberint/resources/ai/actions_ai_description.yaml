Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cyberint API using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the API Root, API Key, and Verify SSL settings from the integration
    configuration.

    2. Initializes the Cyberint API manager.

    3. Sends a POST request to the Cyberint alerts endpoint to verify authentication
    and network connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action does not require any specific entities or action-level parameters
    to run.
  ai_short_description: >-
    Tests connectivity to the Cyberint API to ensure the integration is configured
    correctly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
