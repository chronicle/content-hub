    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The **Update Alert** action is designed to update the status and closure reason
    of a specific alert within the Cyberint platform. It allows analysts to manage
    the lifecycle of Cyberint alerts directly from Google SecOps by transitioning
    their states (e.g., Open, Acknowledged, Closed) and providing closure reasons
    when applicable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert ID | String | Yes | Specify the ID of the alert that needs to have its
    status updated. |

    | Status | Dropdown | No | Specify the new status for the event (e.g., Open, Acknowledged,
    Closed). |

    | Closure Reason | Dropdown | No | Specify the closure reason if the status is
    set to 'Closed' (e.g., Resolved, Irrelevant, False Positive). |


    ### Additional Notes

    - Although the **Status** parameter is marked as optional in the configuration,
    the action's logic requires it to be provided to execute successfully.

    - If the **Status** parameter is set to "Closed", the **Closure Reason** parameter
    becomes mandatory and must be provided.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Alert ID`, `Status`, and
    `Closure Reason` from the input parameters.

    2. **Validation**: It checks if the `Status` is provided. If the `Status` is set
    to "Closed", it verifies that a `Closure Reason` is also supplied.

    3. **API Execution**: The action calls the Cyberint API (`PUT /alert/api/v1/alerts/status`)
    to update the alert with the specified status and closure reason.

    4. **Result Handling**: It outputs a success message if the alert is updated successfully,
    or an error message if the operation fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and closure reason of a specific alert in the external Cyberint
      platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action sends a PUT request to the Cyberint API to update the status and
      closure reason of an alert. It does not fetch data, nor does it mutate internal
      SecOps data such as entities, insights, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by updating an alert in Cyberint, so it cannot
      be classified as Enrichment. It does not perform any remediation tasks such
      as blocking IPs, disabling users, or containing hosts, so it is not Remediation.
    remediation: false
