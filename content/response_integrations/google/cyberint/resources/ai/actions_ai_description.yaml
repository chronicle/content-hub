    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a basic HTTP POST request to test connectivity. It does
      not fetch contextual data, mutate external or internal data, update entities,
      create insights, modify alerts, or create case comments.
