Update Alert:
  ai_description: >-
    ### General Description

    Updates the status and closure reason of an alert within the Cyberint platform.
    This action allows analysts to manage the lifecycle of alerts directly from the
    SOAR platform by modifying their status and providing closure reasons when necessary.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL) to establish
    a connection with the Cyberint API.

    2. Extracts action parameters (Alert ID, Status, Closure Reason) provided by the
    user.

    3. Validates the provided status and closure reason, ensuring that if the status
    is set to "Closed", a valid closure reason is also provided.

    4. Initializes the `CyberintManager` with the extracted configuration.

    5. Performs a PUT request to the Cyberint API endpoint (`/alert/api/v1/alerts/status`)
    to update the alert status and closure reason.


    ### Additional Notes

    This action requires an Alert ID to identify the target alert. If the status is
    set to "Closed", a closure reason must be provided. The action does not modify
    any data within the Google SecOps platform itself, but rather synchronizes changes
    to the external Cyberint system.
  ai_short_description: >-
    Updates the status and closure reason of an alert in the Cyberint platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and closure reason of an alert in the Cyberint platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to the Cyberint API to update an alert's status
      and closure reason. This is a mutation of external data. It does not fetch data,
      mutate internal data, update entities, create insights, modify internal alert
      data, or create case comments.
