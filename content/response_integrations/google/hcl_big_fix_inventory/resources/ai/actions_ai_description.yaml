  ai_description: >-
    Tests connectivity to the HCL BigFix Inventory server using the provided integration
    configuration parameters. The action makes a simple API call to the server to
    verify that the API root, API token, and SSL settings are correct and that the
    server is reachable.


    ### Parameters

    There are no action-specific parameters for this action. It relies solely on the
    integration configuration parameters (API Root, API Token, Verify SSL).


    ### Flow

    1. Retrieves the integration configuration parameters.

    2. Initializes the HCL BigFix Inventory manager.

    3. Sends a test request to the server's 'about' endpoint.

    4. Returns a success message if the connection is established, or an error message
    if it fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only tests connectivity to the HCL BigFix Inventory server. It does
      not fetch contextual data for alerts or entities, nor does it mutate any external
      or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping', which is explicitly excluded from being an enrichment
      action according to Rule 0.1. It also does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
