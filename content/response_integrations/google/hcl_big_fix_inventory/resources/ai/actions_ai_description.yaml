Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the HCL BigFix Inventory server to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, API Token, Verify
    SSL).

    2. Initializes the HCL BigFix Inventory manager.

    3. Makes an HTTP GET request to the `/api/sam/about` endpoint to verify connectivity.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

    This action is typically used for troubleshooting and verifying credentials during
    the initial setup of the integration. It does not require any action-specific
    parameters or entities to run.
  ai_short_description: >-
    Tests connectivity to the HCL BigFix Inventory server using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
