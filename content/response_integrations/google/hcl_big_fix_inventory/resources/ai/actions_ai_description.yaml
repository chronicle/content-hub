Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using device information retrieved from
    HCL BigFix Inventory. This action queries the HCL BigFix Inventory API to gather
    contextual metadata about the specified assets, such as OS, last seen timestamps,
    and hardware details. The retrieved information is then used to update the entity's
    properties within the SOAR platform and optionally generate an insight for the
    analyst.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API Root,
    API Token, Verify SSL) and action parameters (Custom Fields, Create Insight).

    2. **Filtering**: It filters the `target_entities` to include only those of type
    `ADDRESS` or `HOSTNAME`.

    3. **Connectivity**: It initializes the `HCLBigFixInventoryManager` and performs
    a connectivity test to the HCL BigFix Inventory API.

    4. **Enrichment**: For each suitable entity, the action performs an API GET request
    to retrieve device details based on the entity identifier (IP or Hostname).

    5. **Data Processing**: If device data is found:
        - The entity's `additional_properties` are updated with the retrieved enrichment
    data.
        - The entity's `is_enriched` flag is set to `True`.
        - If `Create Insight` is enabled, an insight is added to the entity.
        - An entity table is added to the action results.
    6. **Finalization**: The action updates the enriched entities in the SOAR platform
    and returns a JSON result containing the retrieved device information.


    ### Additional Notes

    - The action supports custom fields, which can be specified as a comma-separated
    list in the `Custom Fields` parameter to extend the default data returned by the
    API.

    - If no devices are found for a given entity, the entity is marked as failed for
    enrichment.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with device metadata from HCL BigFix
    Inventory.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from an external API (HCL BigFix Inventory) via
      GET requests. It does not mutate external data. It updates internal entities
      with the retrieved data and optionally creates insights, but does not modify
      alert data or create case comments.
