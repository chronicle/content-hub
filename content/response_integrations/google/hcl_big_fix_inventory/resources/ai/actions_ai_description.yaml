  ai_description: >-
    ### General Description

    The **Ping** action verifies connectivity between Google SecOps and the HCL BigFix
    Inventory server. It ensures that the integration configuration parameters, such
    as the API Root and API Token, are correct and that the server is reachable. This
    is typically used during the initial setup or for troubleshooting connection issues.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the global integration configuration parameters:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the HCL BigFix Inventory API. |

    | API Token | String | Yes | The authentication token used to authorize requests.
    |

    | Verify SSL | Boolean | Yes | Determines whether to validate the SSL certificate
    of the server. |


    ### Additional Notes

    - This action does not process any entities.

    - It performs a simple GET request to the `/api/sam/about` endpoint to validate
    the connection.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, API Token, and
    SSL verification settings from the integration's configuration.

    2. **Manager Initialization:** It initializes the `HCLBigFixInventoryManager`
    with the retrieved credentials.

    3. **Connectivity Test:** The manager executes a GET request to the HCL BigFix
    Inventory 'about' endpoint.

    4. **Result Handling:** If the request is successful (HTTP 200), the action returns
    a success status. If an error occurs (e.g., authentication failure or network
    timeout), it catches the exception and reports a failure.
