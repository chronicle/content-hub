Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the HCL BigFix Inventory server to ensure the integration
    is correctly configured and the API is reachable. This action validates the connection
    using the credentials provided in the integration configuration.


    ### Flow Description

    1. The action extracts the required integration configuration parameters: `API
    Root`, `API Token`, and `Verify SSL`.

    2. It initializes the `HCLBigFixInventoryManager` with these parameters.

    3. The action executes a `GET` request to the `/api/sam/about` endpoint to verify
    connectivity.

    4. If the request is successful, the action completes with a success message.
    If the request fails, it logs the error and marks the action as failed.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the health of the integration
    connection. It does not perform any data enrichment or modification of entities.
  ai_short_description: >-
    Tests connectivity to the HCL BigFix Inventory server.
  capabilities:
