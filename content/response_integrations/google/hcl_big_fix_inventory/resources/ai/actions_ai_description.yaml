Enrich Entities:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata (e.g., OS version, DNS name, health
      status) for a resource (IP or Hostname) from HCL BigFix Inventory. This perfectly
      matches the 'Enrich Asset' expected outcome. It does not return threat intelligence
      (Enrich IOC) or perform any other product category actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Enriches Hostname and IP Address entities using information from HCL BigFix Inventory.
    This action retrieves device details such as OS, DNS name, and health status to
    provide contextual metadata about the asset.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Custom Fields | String | No | Specify a comma-separated list of fields that
    needs to be returned in addition to the ones that are returned by default. |

    | Create Insight | Boolean | No | If enabled, the action will create an insight
    containing all of the retrieved information about the entity. Default is true.
    |


    ### Action Flow

    1. Iterates through the target entities and filters for Hostname and IP Address
    types.

    2. For each suitable entity, queries the HCL BigFix Inventory API to retrieve
    device information.

    3. If device data is found, enriches the entity's properties with the retrieved
    metadata.

    4. Creates an insight for the entity if the `Create Insight` parameter is enabled.

    5. Updates the entities in the SecOps platform and returns a JSON result containing
    the device data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches device data from HCL BigFix Inventory via a GET request (fetches_data=true).
      It does not perform any POST/PUT/DELETE requests to mutate external systems
      (can_mutate_external_data=false). Internally, it updates entity properties and
      creates insights, which are standard enrichment behaviors and do not constitute
      general internal data mutation (can_mutate_internal_data=false).
  categories:
    enrichment: true
    reasoning: >-
      The action proactively fetches data from an external source (HCL BigFix Inventory)
      to gather supplemental context about entities. It does not mutate external state
      and only modifies internal state by updating entities and creating insights.
      Therefore, it strictly qualifies as an Enrichment action. It does not perform
      any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where SUPPORTED_ENTITY_TYPES includes EntityTypes.ADDRESS
      and EntityTypes.HOSTNAME. It does not filter by any other entity attributes.
