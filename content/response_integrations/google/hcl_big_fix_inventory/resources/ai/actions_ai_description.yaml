Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information from HCL BigFix Inventory.
    It retrieves device details such as OS, health status, and hardware information,
    and appends this data to the entities.


    ### Flow Description

    1. Filters target entities to include only Hostname and IP Address types.

    2. Iterates through the filtered entities.

    3. Makes an API call to HCL BigFix Inventory (`/api/sam/v2/computers`) to fetch
    device information based on the entity's identifier (IP or Hostname).

    4. If device information is found, enriches the entity's additional properties
    with the retrieved data and marks it as enriched.

    5. Optionally creates an insight for the entity containing the device details.

    6. Adds a table to the action results with the device information.

    7. Updates the enriched entities in the Google SecOps platform.

    8. Returns a JSON result containing the raw device data.


    ### Additional Notes

    The action supports fetching custom fields by specifying them in the 'Custom Fields'
    parameter.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by retrieving device details from HCL
    BigFix Inventory and updating the entities with the fetched information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from HCL BigFix Inventory via a GET request to `/api/sam/v2/computers`.
      It does not mutate external data. It updates internal entities (`siemplify.update_entities`)
      and creates insights (`siemplify.add_entity_insight`).
