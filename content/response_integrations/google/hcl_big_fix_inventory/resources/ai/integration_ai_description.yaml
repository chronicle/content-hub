product_categories:
  asset_inventory: true
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The HCLBigFixInventory integration provides an 'Enrich Entities' action that retrieves
    hardware, software, and health metadata for IP and Hostname entities. This functionality
    directly aligns with the 'Asset Inventory' category, as it provides contextual
    information about internal assets to help analysts understand device status. The
    integration does not perform threat intelligence enrichment (no IOC reputation),
    EDR operations (no process-level analysis or containment), SIEM log searching,
    or vulnerability management (no explicit CVE or patch status retrieval). Therefore,
    it is classified solely under Asset Inventory.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
