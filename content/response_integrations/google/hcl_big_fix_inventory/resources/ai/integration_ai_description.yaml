  reasoning: >-
    The hcl_big_fix_inventory integration is designed to enrich internal assets (IPs
    and Hostnames) with hardware, software, and health metadata retrieved from the
    HCL BigFix Inventory system. This capability aligns directly with the Asset Inventory
    category, as it provides contextual information about internal assets to help
    analysts understand device status. It does not perform threat intelligence (no
    IOC reputation), EDR functions (no process-level activity or containment), SIEM
    log analysis, or vulnerability management (no CVE or missing patch data retrieval
    is described in the provided actions). Therefore, it is classified solely under
    Asset Inventory.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
