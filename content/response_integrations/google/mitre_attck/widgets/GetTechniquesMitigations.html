<!-- Custom Widget / Integration Version when it was updated 17.0 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i,700,700i"
      rel="stylesheet">
  <link
      href='https://fonts.googleapis.com/css?family=Source Sans Pro'
      rel='stylesheet'>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <title>Get Techniques Mitigations</title>
  <style>
      :root {
      /* Layout & Colors */
      --widget-bg: #212c44;
      --widget-font-family: 'Source Sans Pro', sans-serif;
      --widget-text-color: #ffffff;
      --scrollbar-bg-color: #6275a3;

      /* Components */
      --widget-row-highlight-bg: #2f3d5c;
      --divider-border-colcor: #3a4a6c;
      --divider-border-width: 1px;

      /* Sidebar */
      --sidebar-width: 167px;
      --sidebar-item-active-bg: #3a4a6c;
      --sidebar-toggle-bg: rgba(38, 51, 79, 1); /* Custom Widget specific */

      /* Table */
      --table-color-even-row: #26334f;

      /* Logo */
      --logo-size: 48px;
      --logo-color: #ffffff;

      /* UI Elements */
      --input-border: #6275a3;
      --dropdown-shadow: rgba(0, 0, 0, 0.6);
      --modal-overlay: rgba(0, 0, 0, 0.5);

      /* Status & Tags */
      --tag-bg: #6a7180;
      --status-text: #b5b5b5;
      --tooltip-bg: #ccccda;
      --tooltip-text: #161625;
      
      /* Content Gradients (Custom Widget specific) */
      --content-list-gradient: linear-gradient(to left, rgb(34 43 62), rgba(33, 44, 68, 0));
      --collapsing-gradient: linear-gradient(transparent, rgb(35 44 66));

      /* Severity Colors (Dark Theme Default) */
      --sev-unspec: #b2b6bd;
      --sev-low: #78d9ec;
      --sev-medium: #fff371;
      --sev-high: #fa903e;
      --sev-critical: #ec453b;
      
      /* Legacy Mappings */
      --content-bg: var(--table-color-even-row);
      --content-button-bg: var(--widget-row-highlight-bg);
      --details-button-bg: var(--divider-border-colcor);
      --modal-list-title-bg: var(--sidebar-item-active-bg);
      
      /* Font settings (Legacy) */
      --widget-scrollbar-size: 12px;
      --list-item-key-font: 600 14px/18px var(--widget-font-family);
      --list-item-value-font: 400 14px/18px var(--widget-font-family);
      --table-title-size: 600 14px/18px var(--widget-font-family);
      --table-th-size: 600 14px/18px var(--widget-font-family);
      --table-td-size: 400 14px/18px var(--widget-font-family);
      --header-title-font: 600 16px/22px var(--widget-font-family);
      --sidebar-item-text-style: 400 14px/18px var(--widget-font-family);
      --sidebar-item-text-style-active: 600 14px/16px var(--widget-font-family);
      --sidebar-item-padding: 10px;
      --risk-score-text: var(--tooltip-text); 

    }

      body {
          float: left;
          width: 100%;
          padding: 0;
          margin: 0;
          box-sizing: border-box;
          background-color: var(--widget-bg);
          overflow-y: hidden;
      }

      .logo {
          padding-bottom: 8px;
          padding-top: 8px;
          width: 64px;
          float: right;
      }


      .main-counter {
          font-style: var(--widget-font-style);

          padding: 12px 4% 12px 4%;

          justify-content: center;
          clear: both;
      }

      .counter {
          font-weight: var(--font-weight-bold);
          font-family: var(--widget-number-font);

          color: var(--widget-text-color);

          font-size: 64px;
          line-height: 0;

          align-items: center;
          text-align: center;
      }

      .counter-title {
          font-weight: var(--font-weight-semibold);
          font-family: var(--widget-text-font);

          color: var(--widget-text-color);

          font-size: 20px;

          text-transform: uppercase;
          text-align: center;
      }

      .main-table {
          font-family: var(--widget-text-font);
          font-style: var(--widget-font-style);

          line-height: var(--default-line-height);

          color: var(--widget-text-color);

          overflow-x: auto;
      }

      .main-table table {
          font-size: var(--font-size-medium);

          width: 100%;

          border-collapse: collapse;
          word-break: keep-all;
      }

      .main-table th {
          font-weight: var(--font-weight-semibold);
          line-height: var(--default-line-height);

          background-color: var(--widget-row-highlight-bg);

          padding: 8px 16px;

          text-transform: uppercase;
          vertical-align: top;
          text-align: left;
          white-space: nowrap;
      }

      .main-table tr {
          font-weight: var(--font-weight-regular);
      }

      .main-table tr:nth-child(even) {
          background-color: var(--table-color-even-row);
      }

      .main-table td {
          padding: 8px 16px;

          vertical-align: top;
          white-space: pre-wrap;
          word-wrap: break-word;
      }

      p.long-text {
          margin-top: 0;
          margin-bottom: 0;
          white-space: pre-wrap;
          word-wrap: break-word;
          max-width: 500px;
      }

      .long-text .hidden-content {
          visibility: hidden;
          overflow: hidden;
          max-height: 0;
          float: left;
      }

      .card-container {
          width: 100%;
          height: 100vh;
          display: flex;
          float: left;
      }

      .right-side {
          padding: 8px 16px;
          width: 100%;
          gap: 24px;
          overflow-y: auto;
      }

      .left-side {
          padding-right: 8px;
          max-width: 180px;
          min-width: 180px;
          width: 180px;
          border-right: 1px solid var(--divider-border-colcor);
          overflow-y: auto;
      }

      .left-menu-item {
          font-family: var(--widget-text-font);
          font-weight: var(--font-weight-regular);
          font-style: var(--widget-font-style);
          font-size: var(--font-size-medium);

          color: var(--status-text);

          padding-left: 10px;
          line-height: 38px;
          height: 38px;

          text-overflow: ellipsis;
          white-space: nowrap;
          overflow: hidden;
          cursor: pointer;
          display: block;
      }

      .left-menu-item.active {
          background: var(--sidebar-item-active-bg);

          font-weight: var(--font-weight-semibold);
          font-size: var(--font-size-medium);

          color: var(--widget-text-color);
      }

      .top-title {
          font-family: var(--widget-text-font);

          color: var(--widget-text-color);

          border-bottom: 1px solid var(--divider-border-colcor);
          margin-bottom: 4px;

          justify-content: space-between;
          align-items: center;
          display: flex;
      }

      .top-title-display-value {
          font-weight: var(--font-weight-semibold);

          line-height: 25px;
          font-size: 20px;
          max-width: 70%;

          text-overflow: ellipsis;
          overflow: hidden;
      }

      .link {
          color: var(--color-link);

          font-family: var(--widget-text-font);
          font-weight: var(--font-weight-regular);
          font-style: var(--widget-font-style);
          font-size: var(--font-size-medium);

          line-height: var(--default-line-height);

          text-decoration-line: underline;
          align-items: center;
      }
  

    html.light-theme {
      --widget-bg: #ffffff !important;
      --widget-text-color: #0f1029;
      --scrollbar-bg-color: #d3d8ea;
      --widget-row-highlight-bg: #e5e8f2;
      --divider-border-colcor: #d3d8ea;
      --sidebar-item-active-bg: #d3d8ea;
      --sidebar-toggle-bg: #d3d8ea;
      --table-color-even-row: #f4f5fa;
      --logo-color: #4e4f63;
      --input-border: #d3d8ea;
      --tag-bg: #7a8294;
      --status-text: #6b6d7a;
      --tooltip-bg: #4e4f63;
      --tooltip-text: #ffffff;
      --dropdown-shadow: rgba(0, 0, 0, 0.1);
      --modal-overlay: rgba(0, 0, 0, 0.2);
      
      --content-list-gradient: linear-gradient(to left, #ffffff, rgba(255, 255, 255, 0));
      --collapsing-gradient: linear-gradient(transparent, #ffffff);
      
      /* Severity Colors (Light) */
      --sev-unspec: #95a5a6;
      --sev-low: #0088a5; 
      --sev-medium: #d6a000; 
      --sev-high: #d35400; 
      --sev-critical: #c0392b; 
    }

    html.light-theme body {
      background-color: #ffffff !important;
      color: var(--widget-text-color);
    }

    html.dark-theme {
      --widget-bg: #232330 !important;
      --widget-text-color: #ffffff;
      --scrollbar-bg-color: #303045;
      --widget-row-highlight-bg: #5f6368;
      --divider-border-colcor: #303045;
      --sidebar-item-active-bg: #5f6368;
      --sidebar-toggle-bg: #303045;
      --table-color-even-row: #3c4043;
      --logo-color: #ffffff;
      --input-border: #80808b;
      --tooltip-bg: #e8eaed;
      --tooltip-text: #131314;
      
      --content-list-gradient: linear-gradient(to left, #232330, rgba(35, 35, 48, 0));
      --collapsing-gradient: linear-gradient(transparent, #232330);
    }
    
    html.dark-theme body {
       background-color: var(--widget-bg) !important;
       color: var(--widget-text-color);
    }
    
    /* --- SCROLLBAR IMPROVEMENTS --- */
    * {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-bg-color) transparent;
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: var(--scrollbar-bg-color); border-radius: 4px; border: none; }
    ::-webkit-scrollbar-corner { background: transparent; }
    
    /* --- GLOBAL ELEMENT FIXES --- */
    body {
        font-family: var(--widget-font-family), serif;
        color: var(--widget-text-color);
        background-color: var(--widget-bg);
    }
    
    span.container-list-item {
        color: var(--widget-text-color) !important;
    }
    
    /* FIX: More comprehensive table header selector */
    .table th, .table thead th, .main-table th, .main-table thead th {
        background-color: var(--widget-row-highlight-bg) !important;
        color: var(--widget-text-color) !important;
    }
    
    .left-side-item.active { background-color: var(--sidebar-item-active-bg); }
    .left-side { border-right-color: var(--divider-border-colcor); }
    .header { border-bottom-color: var(--divider-border-colcor); }
    
    /* MitreAttck Specific Fixes */
    .fieldName, .descriptionText, .leftMenu, .chainName {
        color: var(--status-text) !important;
    }
    .leftMenu.active {
        color: var(--widget-text-color) !important;
    }
    .chainCircle {
        border-color: var(--status-text) !important;
    }
    .separator {
        background-color: var(--status-text) !important;
    }

</style>
</head>
<body>
<div class="card-container">
  <div class="left-side" id="left-menu"></div>
  <div class="right-side" id="right-menu">
    <div class="top-title">
      <div class="top-title-display-value" id="title-display-value"></div>
      <svg class="logo" width="92" height="25" viewBox="0 0 92 25" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
            d="M0 25H5.41176L8.38824 9.73684L14.3412 25H18.1294L24.0824 9.73684L27.3294 25H32.7412L27.3294 0H22.7294L16.2353 15.2632L10.0118 0H4.87059L0 25Z"
            fill="currentColor"/>
        <path d="M38.6941 25V0H34.0941V25H38.6941Z" fill="currentColor"/>
        <path d="M40.3176 3.94737V0H56.2824V3.94737H50.6V25H45.7294V3.94737H40.3176Z" fill="currentColor"/>
        <path
            d="M57.3647 0V25H62.2353V4.21053H68.1882C69.0902 4.12281 70.8941 4.57895 70.8941 7.10526C70.8941 9.63158 69.0902 10.0877 68.1882 10H63.0471V14.4737L70.8941 25H76.8471L68.1882 14.4737C74.4118 14.4737 76.0353 10 76.0353 7.10526C76.0353 1.57895 72.2471 0 69.5412 0H57.3647Z"
            fill="currentColor"
        />
        <path d="M77.6588 0V25H92V21.0526H82.2588V14.4737H92V10.5263H82.2588V10.2632V3.94737H92V0H77.6588Z"
              fill="currentColor"/>
      </svg>
    </div>
    <div class="main-counter">
      <h1 class="counter" id="counter"></h1>
      <h2 class="counter-title" id="counter-title"></h2>
    </div>
    <div class="main-table">
      <table id="main-table">
        <thead>
        <tr>
          <th style="width: 25%;" id="External ID">
            External ID
          </th>
          <th style="width: 30%;" id="Mitigation">
            Mitigation
          </th>
          <th id="Description">
            Description
          </th>
        </tr>
        </thead>
        <tbody id="main-table-body"></tbody>
      </table>
    </div>
  </div>
</div>
<script>

    const ThemeSettings = {
        LIGHT_THEME_CLASS: 'light-theme',
        DARK_THEME_CLASS: 'dark-theme',
    };
    
    const LIGHT_THEME_HEX = "#e5e8f2";
    const DARK_THEME_HEX = "#282837";
    const GRAY_THEME_HEX = "#2f3d5c";

    function handleThemeUpdate(event) {
        if (event.source !== window.parent) {
            return;
        }
        const styles = event.data;
        if (typeof styles !== 'object' || styles === null) return;
        const bg = styles.background || styles.backgroundColor || '';
        let isLight = false;
        let isDark = false;
        let isGray = false;
        const colorString = bg.toLowerCase();
        if (colorString === LIGHT_THEME_HEX) isLight = true;
        else if (colorString === DARK_THEME_HEX) isDark = true;
        else if (colorString === GRAY_THEME_HEX) isGray = true;
        else {
            let r, g, b;
            const rgbMatch = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (rgbMatch) { r = parseInt(rgbMatch[1]); g = parseInt(rgbMatch[2]); b = parseInt(rgbMatch[3]); }
            else if (bg.startsWith('#')) {
                const hex = bg.replace('#', '');
                const fH = hex.length === 3 ? hex.split('').map(c => c + c).join('') : hex;
                if (fH.length === 6) { r = parseInt(fH.substring(0, 2), 16); g = parseInt(fH.substring(2, 4), 16); b = parseInt(fH.substring(4, 6), 16); }
            }
            if (r !== undefined) {
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                if (brightness > 128) isLight = true;
            }
        }
        const html = document.documentElement;
        if (isLight) {
            html.classList.add(ThemeSettings.LIGHT_THEME_CLASS); html.classList.remove(ThemeSettings.DARK_THEME_CLASS);
        } else if (isDark) {
            html.classList.add(ThemeSettings.DARK_THEME_CLASS); html.classList.remove(ThemeSettings.LIGHT_THEME_CLASS);
        } else {
            html.classList.remove(ThemeSettings.LIGHT_THEME_CLASS); html.classList.remove(ThemeSettings.DARK_THEME_CLASS);
        }

        const prismLink = document.querySelector('link[href*="/themes/prism"]');
        if (prismLink) {
            if (isLight && prismLink.href.includes('prism-tomorrow')) {
                prismLink.href = prismLink.href.replace('prism-tomorrow.min.css', 'prism.min.css').replace('prism-tomorrow.css', 'prism.css');
            } else if (!isLight && !prismLink.href.includes('prism-tomorrow')) {
                prismLink.href = prismLink.href.replace('prism.min.css', 'prism-tomorrow.min.css').replace('prism.css', 'prism-tomorrow.css');
            }
        }
    }
    window.addEventListener('message', handleThemeUpdate);
    window.onmessage = handleThemeUpdate;
    document.addEventListener("DOMContentLoaded", function() {
        var paths = document.querySelectorAll('svg path');
        paths.forEach(function(path) {
            var fill = path.getAttribute('fill');
            if (fill === 'white' || fill === 'var(--widget-text-color)' || fill === 'var(--widget-text-color)' || fill === 'rgb(255, 255, 255)') {
                path.setAttribute('fill', 'currentColor');
            }
        });
    });

    $(document).ready(() => {
        if ($("body").css("background-color") === "rgb(255, 255, 255)") {
            $(".logo svg path").attr("fill", "black");
        } else {
            $(".logo svg path").attr("fill", "white");
        }

        const actionListData = [{stepInstanceName}.JsonResult];
        if (!actionListData.length) {
            return;
        }

        entityDisplayed(actionListData[0]);

        createLeftMenu();

        $(".left-side").click(event => {
            const arrayLeftSide = $(".left-menu-item");
            const id = event.target.id;

            $.each(arrayLeftSide, (key, value) => {
                if (value.id === id) {
                    $(`#${value.id}`).addClass("active");
                } else {
                    $(`#${value.id}`).removeClass("active");
                }
            });

            const object = actionListData.find(el => {
                if (el.Entity) {
                    return removeSpecialSymbols(el.Entity) === id.split("--__split__--")[0];
                }
            });

            entityDisplayed(object);

            $("#right-menu").scrollTop(0);
        });

        function entityDisplayed(el) {
            const dataCount = el.EntityResult.mitigations.length;
            if (dataCount === 1) {
                $("#counter-title").html("MITIGATION");
            } else {
                $("#counter-title").html("MITIGATIONS");
            }

            $("#counter").html(dataCount);
            $("#title-display-value").html(el.Entity)

            const iterListData = el.EntityResult.mitigations;
            let mhtml = "";
            $.each(iterListData, (key, el) => {
                mhtml += "<tr>";

                mhtml += "<td>" + createTitleId(el) + "</td>";

                mhtml += "<td>" +
                    fieldExists(el.name)
                    + "</td>";

                mhtml += "<td>" +
                    getCollapsableEscapedHTML(
                        fieldExists(el.description)
                    )
                    + "</td>";

                mhtml += "</tr>";
            });

            $("#main-table-body").html(mhtml);

            /* Toggle off a column if all the values in it are "N/A" */
            $("th").each(function (idx, _) {
                const check = Boolean(
                    $("tbody tr").find("td:eq(" + idx + ")").filter(function () {
                        return ["N/A", ""].includes($.trim($(this).text())) ? 0 : 1;
                    }).length
                );

                $("tr").find("td:eq(" + idx + "), th:eq(" + idx + ")").toggle(check);
            });

            function fieldExists(field, toFormatData = true) {
                if (toFormatData) {
                    field = formatData(field);
                }
                return [undefined, ""].includes(field) ? "N/A" : field;
            }

            function formatData(data) {
                const isObject = obj => obj && obj.constructor === ({}).constructor;
                const formatIfObject = item => isObject(item) ? JSON.stringify(item, null, 4) : item;

                if (Array.isArray(data)) {
                    return data.map(
                        item => Array.isArray(item) ? formatData(item) : formatIfObject(item)
                    ).join(",\n");
                }

                return formatIfObject(data);
            }

            addLongTextClickLogic();

            function getCollapsableEscapedHTML(text, maxCharsLimit = 250) {
                if (!text) {
                    return text;
                }

                if (text.length < maxCharsLimit) {
                    return `<p class="long-text">${escapeHTML(text)}</p>`;
                }

                text = escapeHTML(text);
                let firstPart = text.slice(0, maxCharsLimit);
                let secondPart = text.slice(maxCharsLimit);

                const lastSpaceIndex = firstPart.lastIndexOf(" ");
                const spaceSearchPercentage = 0.6;
                const newMaxWithSpace = maxCharsLimit * spaceSearchPercentage;
                if (lastSpaceIndex >= newMaxWithSpace) {
                    firstPart = text.slice(0, lastSpaceIndex);
                    secondPart = text.slice(lastSpaceIndex);
                }

                return `<p class="long-text">` +
                    `${firstPart}<span>... </span>` +
                    `<br><a href="#" class="more link">Show more</a>` +
                    `<span class="hidden-content">` +
                    `${secondPart}` +
                    `<br><a href="#" class="less link">Show less</a>` +
                    `</span>` +
                    `</p>`;
            }

            function addLongTextClickLogic() {
                $(".more").click(function (event) {
                    event.preventDefault();
                    $(this).hide()
                        .prev().hide()
                        .prev().hide();

                    $(this).next().toggleClass("hidden-content");
                });

                $(".less").click(function (event) {
                    event.preventDefault();
                    $(this).parent().toggleClass("hidden-content")
                        .prev().show()
                        .prev().show()
                        .prev().show();
                });
            }

            function escapeHTML(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

        }

        function createLeftMenu() {
            if (actionListData.length == 1) {
                $("#left-menu").hide();
            }
            let string = "";
            actionListData.forEach((el, index) => {
                const displayValue = el.Entity;
                const cleanDisplayValue = removeSpecialSymbols(displayValue) +
                    "--__split__--" +
                    Math.floor(Math.random() * 1_000_000_000_000_000);

                index ?
                    string += `<div class="left-menu-item" id="${cleanDisplayValue}">${displayValue}</div>` :
                    string += `<div class="left-menu-item active" id="${cleanDisplayValue}">${displayValue}</div>`;
            });

            $("#left-menu").html(string);
        }

        function removeSpecialSymbols(el) {
            return el.replaceAll(/[\s ;:.,/%!&?-]/g, "").replaceAll("\\", "");
        }

        function createTitleId(entity) {
            const external_references = entity.external_references;
            if (!external_references || external_references.length === 0) return "N/A";

            return external_references.map(ref => {
                const externalId = ref.external_id || "N/A";
                const url = ref.url ? `<a href="${ref.url}" target="_blank" class="link">${externalId}</a>` : externalId;
                return url;
            }).join(', ');
        }

    });
</script>
</body>
</html>
