name: Get Mitigations
description: Retrieve information about mitigations that are associated with MITRE
    attack technique
integration_identifier: MitreAttck
parameters:
-   name: Technique ID
    default_value: ''
    type: string
    description: Specify the identifier that will be used to find the mitigations
        related to attack technique.
    is_mandatory: true
-   name: Identifier Type
    default_value: Attack ID
    type: ddl
    optional_values:
    - Attack Name
    - Attack ID
    - External Attack ID
    description: 'Specify what identifier type to use. Possible values: Attack Name
        (Example: Access Token Manipulation) Attack ID (Example: attack-pattern--478aa214-2ca7-4ec0-9978-18798e514790)
        External Attack ID (Example: T1050)'
    is_mandatory: true
-   name: Max Mitigations to Return
    default_value: '20'
    type: string
    description: Specify how many mitigations to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_mitigations_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
