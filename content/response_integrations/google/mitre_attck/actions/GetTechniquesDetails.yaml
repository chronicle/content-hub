name: Get Techniques Details
description: Retrieve detailed information about MITRE attack techniques.
integration_identifier: MitreAttck
parameters:
-   name: Technique Identifier
    default_value: ''
    type: string
    description: Specify the identifier that will be used to find the detailed information
        about technique. Comma-separated values.
    is_mandatory: true
-   name: Identifier Type
    default_value: ID
    type: ddl
    optional_values:
    - Name
    - ID
    - External ID
    description: 'Specify what identifier type to use. Possible values: Name (Example:
        Access Token Manipulation) ID (Example: attack-pattern--478aa214-2ca7-4ec0-9978-18798e514790)
        External ID (Example: T1050)'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_techniques_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
