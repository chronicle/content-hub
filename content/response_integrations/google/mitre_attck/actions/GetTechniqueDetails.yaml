name: Get Technique Details
description: Retrieve detailed information about MITRE attack technique
integration_identifier: MitreAttck
parameters:
-   name: Technique Identifier
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of identifiers that will be used
        to find the detailed information about techniques. Example: identifier_1,identifier_2'
    is_mandatory: true
-   name: Identifier Type
    default_value: ID
    type: ddl
    optional_values:
    - Name
    - ID
    - External ID
    description: 'Specify what identifier type to use. Possible values: Name (Example:
        Access Token Manipulation) ID (Example: attack-pattern--478aa214-2ca7-4ec0-9978-18798e514790)
        External ID (Example: T1050)'
    is_mandatory: true
-   name: Create Insights
    default_value: false
    type: boolean
    description: If enabled, action will create a separate insight for every processed
        technique
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_technique_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
