Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Mitre ATT&CK framework data source. It ensures that the
    configured API Root is accessible and that the integration can successfully retrieve
    the required JSON data for subsequent operations.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies on the following
    **Integration Configuration** parameters:


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | API Root | The URL pointing to the Mitre ATT&CK STIX JSON file. | String | Yes
    |

    | Verify SSL | If enabled, the SSL certificate for the connection will be verified.
    | Boolean | No (Default: True) |


    ### Additional Notes

    - This action is primarily used during the initial setup or troubleshooting of
    the Mitre ATT&CK integration.

    - It performs a simple HTTP GET request to the provided URL to validate the connection.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the integration-level configuration (API Root and Verify SSL).

    2. **Manager Setup**: It instantiates the `MitreAttckManager` with the provided
    configuration.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    attempts to fetch the raw attack data from the specified API Root using an HTTP
    GET request.

    4. **Validation**: If the data is successfully retrieved, the action confirms
    the connection is established.

    5. **Completion**: The action returns a success status if the connection is verified,
    or a failure status if the URL is unreachable or returns an error.
