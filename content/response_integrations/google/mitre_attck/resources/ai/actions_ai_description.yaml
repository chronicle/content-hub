Get Techniques Details:
  ai_description: >-
    ### General Description

    The **Get Techniques Details** action retrieves comprehensive information about
    specific MITRE ATT&CK techniques. It allows users to query the MITRE ATT&CK framework
    using various identifier types to obtain technical descriptions, detection strategies,
    and supported platforms. This action is primarily used to provide security analysts
    with immediate context regarding observed attack patterns within a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Technique Identifier** | String | Yes | A comma-separated list of identifiers
    for the techniques you want to retrieve details for. |

    | **Identifier Type** | String | Yes | Defines the format of the provided identifiers.
    Possible values are: `Name` (e.g., "Access Token Manipulation"), `ID` (e.g., "attack-pattern--478aa214-2ca7-4ec0-9978-18798e514790"),
    or `External ID` (e.g., "T1050"). |


    ### Flow Description

    1. **Initialization**: The action extracts the list of technique identifiers and
    the specified identifier type from the input parameters.

    2. **Connectivity Check**: It establishes a connection to the MITRE ATT&CK data
    source (typically a JSON file hosted at a specified API root).

    3. **Data Retrieval**: For each provided identifier, the action searches the MITRE
    ATT&CK dataset based on the selected identifier type (Name, ID, or External ID).

    4. **Processing**: If a matching technique is found, the action extracts key metadata
    including the technique's name, description, detection methods, and target operating
    systems.

    5. **Output Generation**: The retrieved data is formatted into a data table for
    the case wall, an external link to the MITRE ATT&CK website is added for further
    research, and the full raw data is returned in the JSON result.


    ### Additional Notes

    This action does not operate on SecOps entities; it is a utility action for threat
    intelligence lookup based on manual or automated parameter input.
