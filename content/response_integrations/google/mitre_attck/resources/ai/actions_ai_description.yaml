Get Technique Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific MITRE ATT&CK techniques from the
    MITRE ATT&CK framework. This action allows security analysts to quickly pull context,
    detection strategies, and platform information for techniques identified during
    an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Technique Identifier | String | Yes | A comma-separated list of identifiers
    (e.g., "T1050, T1055" or "Access Token Manipulation"). |

    | Identifier Type | String | Yes | Specifies the format of the identifiers provided.
    Options: `Name`, `ID` (STIX ID), or `External ID` (e.g., T1050). |

    | Create Insights | Boolean | No | If enabled, the action will generate a separate
    SOAR insight for each successfully retrieved technique. |


    ### Flow Description

    1. **Initialization**: Connects to the configured MITRE ATT&CK API root and validates
    the connection.

    2. **Parsing**: Processes the comma-separated list of technique identifiers provided
    by the user.

    3. **Retrieval**: For each identifier, the action queries the MITRE dataset based
    on the selected `Identifier Type` (Name, ID, or External ID).

    4. **Data Processing**: Extracts key metadata including the technique's description,
    detection logic, and affected operating systems.

    5. **Output Generation**: Adds a data table to the case for each technique, adds
    a direct link to the MITRE ATT&CK website, and optionally creates a Case Insight
    containing the technique's description.


    ### Additional Notes

    This action does not run on specific entities; it is a utility action that fetches
    reference data based on user-provided strings.
