Get Associated Intrusions:
  ai_description: >-
    ### General Description

    The **Get Associated Intrusions** action retrieves detailed information about
    intrusion sets (threat groups) that are known to utilize a specific MITRE ATT&CK
    technique. This allows analysts to identify potential threat actors associated
    with observed techniques during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Technique ID** | String | Yes | The identifier of the MITRE ATT&CK technique
    to search for. |

    | **Identifier Type** | String | Yes | The type of identifier provided in the
    'Technique ID' field. Options: `Attack Name` (e.g., Access Token Manipulation),
    `Attack ID` (e.g., attack-pattern--478aa214...), or `External Attack ID` (e.g.,
    T1050). |

    | **Max Intrusions to Return** | Integer | No | The maximum number of associated
    intrusion sets to return. Default is 20. |


    ### Flow Description

    1. **Data Retrieval**: The action fetches the latest MITRE ATT&CK dataset from
    the configured API Root via a GET request.

    2. **Technique Identification**: It resolves the provided `Technique ID` to a
    specific MITRE Attack Pattern based on the selected `Identifier Type` (Name, STIX
    ID, or External ID).

    3. **Relationship Mapping**: The action searches for "uses" relationships where
    the target is the identified technique and the source is an "intrusion-set".

    4. **Intrusion Enrichment**: It retrieves the full details for each discovered
    intrusion set, including names, descriptions, and external references.

    5. **Output Generation**: The results are presented as a data table, a JSON object
    for downstream automation, and direct links to the MITRE ATT&CK website for further
    research.


    ### Additional Notes

    This action does not require or process any entities from the Google SecOps case;
    it performs a lookup based solely on the provided technique identifier.
  capabilities:
