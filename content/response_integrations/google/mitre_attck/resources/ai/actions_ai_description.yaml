Get Techniques Mitigations:
  ai_description: >-
    Retrieves mitigation information associated with MITRE ATT&CK techniques from
    a MITRE ATT&CK data source. This action allows users to provide technique identifiers
    (Names, IDs, or External IDs) and returns the corresponding 'Course of Action'
    objects that mitigate those techniques. The results include detailed descriptions
    of the mitigations, their deprecation status, and direct links to the MITRE ATT&CK
    website.


    ### Flow Description:

    1. **Connection Setup:** Establishes a connection to the MITRE ATT&CK API/Data
    source and verifies connectivity.

    2. **Identifier Resolution:** Processes the provided comma-separated 'Technique
    ID' list. If the identifier type is 'Attack Name' or 'External Attack ID', it
    first fetches the specific attack pattern to resolve its internal MITRE identifier.

    3. **Relationship Mapping:** Queries the MITRE dataset for 'mitigates' relationships
    where the target is the identified technique.

    4. **Mitigation Retrieval:** Fetches the full details for each mitigation (Course
    of Action) identified in the relationship mapping, up to the specified limit.

    5. **Result Generation:** Populates a JSON result with the mitigation data, creates
    a data table for each technique, and adds external reference links for further
    investigation.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Technique ID | String | Yes | Comma-separated list of MITRE technique identifiers
    to investigate. |

    | Identifier Type | String | Yes | Specifies the format of the 'Technique ID'
    input. Options: 'Attack Name' (e.g., Access Token Manipulation), 'Attack ID' (e.g.,
    attack-pattern--...), or 'External Attack ID' (e.g., T1050). |

    | Max Mitigations to Return | Integer | No | The maximum number of mitigation
    records to retrieve per technique. Defaults to 20. |


    ### Additional Notes:

    - This action does not run on entities; it is a utility action that queries threat
    intelligence data based on user-provided parameters.
