Get Mitigations:
  ai_description: >-
    ### General Description

    The **Get Mitigations** action retrieves detailed information about mitigation
    strategies (Courses of Action) associated with a specific MITRE ATT&CK technique.
    This action allows security analysts to identify recommended defensive measures
    for identified threats by querying the MITRE ATT&CK framework.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Technique ID | String | Yes | The identifier used to find related mitigations
    (e.g., 'T1022' or 'Data Encrypted'). |

    | Identifier Type | String | Yes | Specifies the format of the Technique ID. Options:
    'Attack Name', 'Attack ID', or 'External Attack ID'. |

    | Max Mitigations to Return | Integer | No | Limits the number of mitigation records
    returned. Default is 20. |


    ### Flow Description

    1. **Initialization**: The action extracts the MITRE ATT&CK API configuration
    and the user-provided parameters.

    2. **Technique Resolution**: The action uses the `MitreAttckManager` to find the
    specific attack technique based on the provided `Technique ID` and `Identifier
    Type`.

    3. **Relationship Lookup**: It queries the MITRE dataset for objects that have
    a 'mitigates' relationship with the identified technique.

    4. **Data Retrieval**: The action fetches the full details for each mitigation
    object (Course of Action) found in the previous step, up to the specified limit.

    5. **Result Generation**: The action populates a data table with mitigation names
    and descriptions, provides a raw JSON result for automation, and adds external
    links to the MITRE ATT&CK documentation for each mitigation.


    ### Additional Notes

    This action does not process entities from the case; it relies entirely on the
    input parameters to perform its search.
