[project]
name = "CiscoThreatGrid"
version = "19.0"
description = "Threat Grid combines advanced sandboxing with threat intelligence into one unified solution to protect organizations from malware."
requires-python = ">=3.11,<3.12"
dependencies = [ "arrow>=1.4.0", "paramiko==3.4.0", "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
