Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Cisco Threat Grid integration.
    This action verifies that the configured API credentials and network settings
    are valid and that the platform can successfully communicate with the Cisco Threat
    Grid service.


    ### Flow Description

    1. The action initializes the `CiscoThreatGridManager` using the integration configuration
    parameters, including the API Root, API Key, and SSL verification settings.

    2. It invokes the `test_connectivity` method, which performs a `GET` request to
    the Cisco Threat Grid API endpoint (`/api/v2/samples`) with the provided API key.

    3. The action validates the HTTP response. If the connection is successful, the
    action completes with a success message. If the connection fails, an exception
    is raised, and the action terminates.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the health of the integration
    configuration. It does not perform any data enrichment or state-changing operations.
