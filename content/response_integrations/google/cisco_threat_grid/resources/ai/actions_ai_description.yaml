  ai_description: >-
    Uploads a file to Cisco Threat Grid for malware analysis and retrieves the analysis
    report, threat score, and associated artifacts (PCAP, screenshots) asynchronously.


    ### Parameters Description

    * **File Path** (String, Mandatory): The path to the sample file to be uploaded.

    * **Vm** (String, Optional): The virtual machine environment to run the analysis
    on (e.g., win7-x64).

    * **Playbook** (String, Optional): Name of a playbook to apply to this sample
    run.

    * **Network Exit** (String, Optional): The network exit location for outgoing
    traffic generated during analysis.

    * **Private** (Boolean, Mandatory): If checked, the sample will be marked as private.

    * **Linux Server Address** (String, Optional): IP address of the remote Linux
    server where the file is located.

    * **Linux Username** (String, Optional): Username for the remote Linux server.

    * **Linux Password** (Password, Optional): Password for the remote Linux server.


    ### Additional Notes

    If the file is located on a remote Linux server, all three Linux parameters (Linux
    Server Address, Linux Username, Linux Password) must be provided for the action
    to successfully retrieve the file via SFTP.


    ### Flow Description

    1. Connects to a remote Linux server via SFTP to retrieve the file content if
    remote credentials are provided, otherwise reads the file locally.

    2. Uploads the file to Cisco Threat Grid for analysis.

    3. Waits asynchronously for the analysis to complete.

    4. Retrieves the threat score, threat report, and links to the HTML report, PCAP,
    and screenshot.

    5. Outputs the results to the action's data table and JSON result.
