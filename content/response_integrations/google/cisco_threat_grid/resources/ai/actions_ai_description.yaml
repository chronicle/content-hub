Get Hash Associated IPs:
  ai_description: >-
    ### General Description

    Retrieves IP addresses associated with a given file hash entity using Cisco Threat
    Grid.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type File Hash.

    3. For each valid file hash, makes an API call to Cisco Threat Grid to fetch associated
    network streams from previous sandbox submissions.

    4. Extracts the destination IP addresses from the network streams, excluding internal
    IPs.

    5. Attaches the discovered IP addresses to the action's JSON result and creates
    an entity-specific table.


    ### Additional Notes

    The action automatically filters out common internal IPs (e.g., 224.0.0.252, 169.254.255.255,
    255.255.255.255, 239.255.255.250) and specific subnets (172.16.x.x) from the results.
