Get Hash Associated Domains:
  ai_description: >-
    ### General Description

    Retrieves domains associated with a given file hash entity using Cisco Threat
    Grid.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash entities.

    2. For each file hash, makes a GET request to the Cisco Threat Grid API to fetch
    associated network streams.

    3. Extracts the associated domains from the network streams.

    4. Adds the extracted domains to the action's JSON results and attaches an entity
    table to the case.


