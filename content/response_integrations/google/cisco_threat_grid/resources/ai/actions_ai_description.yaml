Upload Sample:
  ai_description: >-
    ### General Description

    Uploads a file to Cisco Threat Grid for malware analysis and sandboxing. The file
    can be retrieved from a local path or a remote Linux server via SSH. The action
    runs asynchronously, waiting for the analysis to complete, and then retrieves
    the threat score, behavioral indicators, and links to the HTML report, PCAP, and
    screenshots.


    ### Flow Description

    1. Retrieves the file content from the specified local path or remote Linux server.

    2. Submits the file to Cisco Threat Grid via a POST request to `/api/v2/samples`.

    3. Waits asynchronously for the analysis to complete by polling the sample state.

    4. Once completed, fetches the threat report via a GET request to `/api/v2/samples/{sample_id}/threat`.

    5. Attaches the threat report, analysis links (HTML, PCAP, Screenshot), and JSON
    results to the action output.


    ### Additional Notes

    The action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted accordingly. If fetching from a remote Linux server, all three Linux
    parameters (Address, Username, Password) must be provided.
  ai_short_description: >-
    Uploads a file to Cisco Threat Grid for sandbox analysis and retrieves the resulting
    threat score and analysis reports.
