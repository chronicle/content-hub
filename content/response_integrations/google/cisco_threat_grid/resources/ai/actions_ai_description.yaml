Get Hash Associated IPs:
  ai_description: >-
    ### General Description

    Retrieves IP addresses associated with a specific file hash from Cisco Threat
    Grid. This action provides threat intelligence by identifying network connections
    observed during the analysis of a file sample, helping analysts understand the
    potential network impact of a malicious file.


    ### Flow Description

    1. The action initializes the `CiscoThreatGridManager` using the integration configuration
    (API Root, API Key, SSL settings).

    2. It iterates through the `target_entities` provided in the case.

    3. It filters for entities of type `FILEHASH`.

    4. For each valid file hash, it calls the Cisco Threat Grid API (`get_associated_network`)
    to retrieve network streams associated with the file's submission history.

    5. It parses the network streams to extract destination IP addresses, excluding
    internal/private IP ranges.

    6. It adds a table containing the associated IPs to the action result for the
    specific entity.

    7. Finally, it aggregates all findings into a JSON result and ends the action.


    ### Additional Notes

    This action relies on the Cisco Threat Grid integration configuration. It does
    not modify the entity status or create insights within the SOAR platform; it primarily
    serves to provide contextual data for investigation.
