Upload Sample:
  ai_description: "### General Description\nUploads a file to Cisco Threat Grid for\
    \ automated malware analysis. This action supports both local file paths and remote\
    \ files on Linux servers. It submits the sample for analysis and, upon completion,\
    \ retrieves comprehensive threat intelligence, including threat scores, behavioral\
    \ indicators, and associated artifacts.\n\n### Flow Description\n1. **Initialization**:\
    \ Connects to the Cisco Threat Grid API using configured credentials.\n2. **File\
    \ Retrieval**: \n   - If Linux server credentials are provided, it connects via\
    \ SSH/SFTP to retrieve the file content.\n   - Otherwise, it reads the file from\
    \ the local path.\n3. **Submission**: Calls the Cisco Threat Grid API to upload\
    \ the file for analysis, specifying optional parameters like VM profile, playbook,\
    \ and network exit.\n4. **Async Execution**: Returns the `sample_id` and sets\
    \ the execution state to `INPROGRESS`.\n5. **Completion Check**: On subsequent\
    \ async runs, it checks the analysis status via the API.\n6. **Result Processing**:\
    \ Once complete, it retrieves the threat report, PCAP, and screenshot, adding\
    \ them as links to the action result. It also parses the threat data into a CSV\
    \ table and adds the raw JSON result.\n\n### Additional Notes\nThis action is\
    \ designed to run asynchronously. The initial execution submits the sample, and\
    \ subsequent executions poll for the analysis results until completion."
