Get Hash Associated Domains:
  ai_description: >-
    ### General Description

    Retrieves domains associated with a specific file hash from Cisco Threat Grid.
    This action queries the Cisco Threat Grid API to identify network streams related
    to a given file hash, extracts the domains involved in those streams, and presents
    the findings in the action results.


    ### Flow Description

    1. Initialize the `CiscoThreatGridManager` using the integration configuration
    (API Root, API Key, SSL settings).

    2. Iterate through the provided target entities, filtering specifically for entities
    of type `FILEHASH`.

    3. For each valid file hash, call the `get_associated_network` method of the `CiscoThreatGridManager`.

    4. The manager queries Cisco Threat Grid for submissions related to the hash,
    retrieves network streams, and parses them to extract unique domains.

    5. If domains are found, add an entity table to the action results displaying
    the associated domains for that specific hash.

    6. Compile all findings into a JSON result object and terminate the action.


    ### Additional Notes

    This action is strictly an enrichment operation. It does not modify the state
    of the entities within the SOAR platform, nor does it perform any mutations on
    external systems.
