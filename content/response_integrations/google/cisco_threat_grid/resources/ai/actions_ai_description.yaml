    ### General Description

    Tests connectivity to the Cisco Threat Grid API to ensure the integration is configured
    correctly and can communicate with the service.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, API Key, Use SSL).

    2. Initializes the Cisco Threat Grid Manager.

    3. Makes a GET request to the `/api/v2/samples` endpoint to verify authentication
    and network connectivity.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify that the integration's
    credentials and network settings are valid.
