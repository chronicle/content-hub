  ai_description: >-
    ### General Description

    The `Get Submissions` action retrieves existing analysis submissions from Cisco
    ThreatGrid for specified entities. It fetches submission states, waits for any
    pending analyses to complete (as an asynchronous action), and then retrieves the
    submission details. For the most recent submission, it downloads the analysis
    report, network PCAP, screenshot, and threat report, attaching them to the entity.
    Finally, it enriches the entity with the maximum threat score and marks it as
    suspicious if the score exceeds a configured threshold.


    ### Flow Description

    1. Iterates over the target entities and queries Cisco ThreatGrid for their submission
    states.

    2. If any submissions are in a waiting state, the action pauses and waits for
    them to complete (asynchronous execution).

    3. Once processed, retrieves the successful submissions and creates a summary
    table attached to the entity.

    4. Downloads the most recent HTML analysis report, network PCAP, screenshot, and
    threat report, adding them as entity attachments and tables.

    5. Calculates the maximum threat score across the submissions and updates the
    entity's `additional_properties`.

    6. Marks the entity as enriched, and if the maximum threat score is greater than
    the provided threshold, marks the entity as suspicious.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | The threat score threshold. If the maximum threat
    score from the submissions exceeds this value, the entity will be marked as suspicious.
    Default is 50. |

    | Max Submissions To Return | Integer | No | Specifies the maximum number of submissions
    to return per entity. Must be between 1 and 100. Default is 10. |


    ### Additional Notes

    - Supported entity types include Address, FileHash, Hostname, Process, URL, and
    Filename.

    - The action runs asynchronously to accommodate pending submissions in Cisco ThreatGrid.
