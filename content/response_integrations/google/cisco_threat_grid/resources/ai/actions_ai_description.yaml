Get Submissions:
  ai_description: >-
    ### General Description

    Retrieves submission data, analysis reports, and threat intelligence from Cisco
    ThreatGrid for specified entities. This action queries the Cisco ThreatGrid service
    to identify if a file, URL, process, or host has been submitted for analysis.
    It supports asynchronous processing, waiting for submissions to complete if necessary,
    and subsequently fetches detailed forensic artifacts including HTML reports, PCAP
    files, and screenshots. The action evaluates the threat score against a configurable
    threshold to mark entities as suspicious and updates entity properties with the
    maximum threat score found.


    ### Flow Description

    1. **Initialization**: The action initializes the `CiscoThreatGridManager` using
    the provided API credentials.

    2. **State Check**: It iterates through the target entities and queries Cisco
    ThreatGrid for the submission state of each entity using `get_submission_state`.

    3. **Asynchronous Handling**: If any entity is in a `WAITING_STATE`, the action
    returns an `IN_PROGRESS` status to allow for subsequent polling.

    4. **Data Retrieval**: Once submissions are ready (`TO_PROCESS`), the action fetches
    the submission details using `get_submissions`.

    5. **Artifact Download**: For the most recent sample associated with the entity,
    it downloads the analysis report, network PCAP, and screenshot, attaching them
    to the case using `siemplify.result.add_entity_attachment`.

    6. **Threat Analysis**: It retrieves the threat report and adds a summary table
    to the case using `siemplify.result.add_entity_table`.

    7. **Entity Update**: It calculates the maximum threat score, updates the entity's
    `additional_properties` with this score, sets `is_enriched` to true, and marks
    the entity as `is_suspicious` if the score exceeds the configured threshold.

    8. **Finalization**: It updates the entities in the SOAR platform and returns
    the final status.


    ### Additional Notes

    - The action supports multiple entity types: Address, FileHash, Hostname, Process,
    URL, and Filename.

    - Attachments (reports, PCAPs, screenshots) are added to the entity in the case.

    - The action is designed to be asynchronous; if submissions are pending, it will
    re-run until completion or failure.
  ai_short_description: >-
    Retrieves submission data, forensic reports, and threat intelligence from Cisco
    ThreatGrid for various entity types, updating entity properties and attaching
    analysis artifacts to the case.
  capabilities:
    can_create_case_comments: false
