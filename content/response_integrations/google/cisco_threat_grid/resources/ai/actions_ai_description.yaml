Get Submissions:
  ai_description: >-
    ### General Description

    Retrieves submission details, analysis reports, and threat scores from Cisco Threat
    Grid for specific entities (Address, FileHash, Hostname, Process, URL, FileName).
    It enriches the entities with the retrieved data and can optionally mark them
    as suspicious based on a configurable threat score threshold.


    ### Flow Description

    1. Iterates through the target entities and filters them by supported entity types
    (Address, FileHash, Hostname, Process, URL, FileName).

    2. Makes an asynchronous API call (GET) to Cisco Threat Grid to check the submission
    state for each entity.

    3. Once the submissions are fully processed, retrieves the submission details.

    4. Downloads the most recent analysis report (HTML), network PCAP, screenshot,
    and threat report for the entity.

    5. Calculates the maximum threat score across the retrieved submissions.

    6. Updates the entity's additional properties with the max score, marks it as
    enriched, and marks it as suspicious if the score exceeds the configured threshold.

    7. Attaches the downloaded reports, PCAPs, screenshots, and tables to the entity
    results in the SecOps platform.


    ### Additional Notes

    This is an asynchronous action. It will periodically check the status of the submissions
    until they are ready to be fetched.
  ai_short_description: >-
    Retrieves submission details, analysis reports, and threat scores from Cisco Threat
    Grid for supported entities, enriching them and optionally marking them as suspicious
    based on a threat score threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
