name: Upload Sample
description: 'Upload and analyze a sample. Note: Action is running as async, please
    adjust script timeout value in Siemplify IDE for action as needed'
integration_identifier: CiscoThreatGrid
parameters:
-   name: File Path
    type: string
    description: The sample file path
    is_mandatory: true
-   name: Vm
    type: string
    description: The vm to run the analysis on. e.g. win7-x64
    is_mandatory: false
-   name: Playbook
    type: string
    description: Name of a playbook to apply to this sample run. e.g. default
    is_mandatory: false
-   name: Network Exit
    type: string
    description: Any outgoing network traffic that is generated during the analysis
        to appear to exit from the Network Exit Location.
    is_mandatory: false
-   name: Private
    default_value: 'true'
    type: boolean
    description: if checked, the sample will be marked private
    is_mandatory: true
-   name: Linux Server Address
    default_value: ''
    type: string
    description: Specify the IP address of the remote linux server, where the file
        is located.
    is_mandatory: false
-   name: Linux Username
    default_value: ''
    type: string
    description: Specify the username of the remote linux server, where the file is
        located.
    is_mandatory: false
-   name: Linux Password
    default_value: ''
    type: password
    description: Specify the password of the remote linux server, where the file is
        located.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/upload_sample_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: score
