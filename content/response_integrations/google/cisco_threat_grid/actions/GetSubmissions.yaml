name: Get Submissions
description: Get submissions by entity
integration_identifier: CiscoThreatGrid
parameters:
-   name: Threshold
    default_value: '50'
    type: string
    description: Mark as suspicious if max threat score pass the threshold
    is_mandatory: true
-   name: Max Submissions To Return
    default_value: 10
    type: string
    description: 'Specify how many submissions to return per entitiy. Default: 10.
        Maximum: 100'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_submissions_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["DestinationURL", "FILEHASH", "PROCESS", "HOSTNAME",
    "FILENAME", "ADDRESS"]}'
script_result_name: success
