name: Execute Entity Query
description: Execute query in SolarWinds Orion based on the IP and Hostname entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/solar-winds-orion#execute_entity_query
integration_identifier: SolarWindsOrion
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Specify the query that needs to be executed. Note: SolarWind queries
        don’t support “*” notation and you shouldn’t have a WHERE clause in the query,
        because it is added by the action. Please refer to the action documentation
        for details.'
    is_mandatory: true
-   name: IP Entity Key
    default_value: IpAddress
    type: string
    description: 'Specify what key should be used with IP entities in the WHERE clause
        of the query. Please refer to the action documentation for details. Default:
        IpAddress.'
    is_mandatory: false
-   name: Hostname Entity Key
    default_value: Hostname
    type: string
    description: 'Specify what key should be used with Hostname entities in the WHERE
        clause of the query. Please refer to the action documentation for details.
        Default: Hostname'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 100
    type: string
    description: Specify how many results should be returned.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_entity_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "HOSTNAME"]}'
