name: Execute Query
description: Execute query in SolarWinds Orion.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/solar-winds-orion#execute_query
integration_identifier: SolarWindsOrion
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Specify the query that needs to be executed. Note: SolarWind queries
        don’t support “*” notation.'
    is_mandatory: true
-   name: Max Results To Return
    default_value: 100
    type: string
    description: Specify how many results should be returned.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
