Execute Entity Query:
  ai_description: >-
    General Description

    Executes a custom query against the SolarWinds Orion platform using IP and Hostname
    entities found in the current case. This action allows users to retrieve specific
    node or system information by dynamically appending a WHERE clause to the provided
    query based on the entities present.


    Flow Description

    1. Extracts configuration parameters (API root, credentials) and action parameters
    (Query, entity keys, result limit).

    2. Filters target entities to include only `ADDRESS` and `HOSTNAME` types.

    3. Constructs a query string by appending a `WHERE` clause that filters for the
    identified entities using the specified entity keys.

    4. Executes the query against the SolarWinds Orion API via a POST request.

    5. If results are returned, it adds the raw JSON results to the action output
    and displays the data in a table.


    Additional Notes

    The query string provided should not include a `WHERE` clause, as the action automatically
    appends one based on the entities found.
