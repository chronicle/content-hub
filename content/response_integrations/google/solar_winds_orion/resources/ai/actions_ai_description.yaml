Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities by fetching detailed system information
    from SolarWinds Orion. This action retrieves contextual metadata such as system
    uptime, CPU load, memory usage, and OS details to provide better visibility into
    the targeted endpoints.


    ### Flow Description

    1. Filters the provided target entities to include only Hostname and IP Address
    entity types.

    2. Constructs a SQL-like query to retrieve system information for the identified
    entities.

    3. Executes a POST request to the SolarWinds Orion API (`/SolarWinds/InformationService/v3/Json/Query`)
    to fetch the endpoint data.

    4. Maps the retrieved data back to the corresponding entities based on their IP
    address or display name.

    5. Updates the entities' additional properties with the enrichment data and marks
    them as enriched within the SecOps platform.

    6. Attaches the raw query results as JSON to the action's output.


    ### Additional Notes

    This action relies on integration-level configurations for authentication and
    does not require any action-specific parameters.
  ai_short_description: >-
    Enriches Hostname and IP Address entities by fetching detailed system information
    from SolarWinds Orion.
  capabilities:
