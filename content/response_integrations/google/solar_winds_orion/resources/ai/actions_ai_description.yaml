Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SolarWinds Orion server using the parameters provided
    at the integration configuration page.


    ### Flow Description

    1. Extracts the integration configuration parameters (IP Address, Username, Password,
    Verify SSL).

    2. Initializes the SolarWinds Orion manager.

    3. Makes a POST request to the SolarWinds Orion API to execute a basic test query
    (`SELECT DisplayName FROM Orion.Nodes ORDER BY DisplayName WITH ROWS 1 TO 1`).

    4. Validates the API response to confirm successful connectivity.

    5. Returns a success or failure message based on the result.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
