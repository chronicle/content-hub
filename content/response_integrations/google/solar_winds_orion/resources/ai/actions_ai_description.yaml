Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (IP Address or Hostname) by querying the SolarWinds
    Orion platform. This action retrieves comprehensive system information, including
    status, CPU load, memory usage, OS details, and uptime, to provide context for
    security investigations.


    ### Flow Description

    1. The action initializes the SolarWinds Orion manager using the provided API
    root, credentials, and SSL verification settings.

    2. It filters the target entities to include only those of type 'ADDRESS' or 'HOSTNAME'.

    3. A SWQL query is constructed to fetch node details from the 'Orion.Nodes' table
    in SolarWinds Orion.

    4. The action executes the query via a POST request to the SolarWinds Information
    Service API.

    5. The retrieved results are mapped to the corresponding entities.

    6. For each matched entity, the action updates the entity's 'additional_properties'
    with the enrichment data and marks the entity as enriched.

    7. Finally, the action updates the entities within the SOAR platform and attaches
    the raw JSON results to the action output.


    ### Additional Notes

    This action requires valid SolarWinds Orion credentials with access to the Information
    Service API. It only supports IP Address and Hostname entity types. If no entities
    are found or the query fails, the action will report the failure accordingly.
  ai_short_description: >-
    Enriches IP Address and Hostname entities with system metadata retrieved from
    SolarWinds Orion.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
