Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SolarWinds Orion server using the provided configuration
    parameters. This action verifies that the integration is correctly configured
    and can communicate with the SolarWinds Orion API.


    ### Flow Description

    1. The action extracts the required integration configuration parameters: IP Address,
    Username, Password, and Verify SSL.

    2. It initializes the `SolarWindsOrionManager` with these credentials.

    3. The action executes a test query (`SELECT DisplayName FROM Orion.Nodes ORDER
    BY DisplayName WITH ROWS 1 TO 1`) against the SolarWinds Orion API.

    4. If the query is successful, the action returns a success message. If the connection
    fails or the query returns an error, the action reports a failure with the corresponding
    error details.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment, entity updates, or modifications to external systems.
