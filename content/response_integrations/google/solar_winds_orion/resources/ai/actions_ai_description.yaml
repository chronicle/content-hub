Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a custom query in SolarWinds Orion based on IP Address and Hostname entities.
    It dynamically constructs a WHERE clause using the provided entities and retrieves
    the query results.


    ### Flow Description

    1. Filters target entities to identify IP Addresses and Hostnames.

    2. Constructs a custom query by appending a WHERE clause based on the filtered
    entities and the specified entity keys.

    3. Makes a POST request to the SolarWinds Orion API (`/SolarWinds/InformationService/v3/Json/Query`)
    to execute the query.

    4. Retrieves the results, limits them to the specified maximum, and attaches them
    to the action's JSON results and a data table.


    ### Additional Notes

    SolarWinds queries do not support the "*" notation. You should not include a WHERE
    clause in the base query parameter, as the action automatically appends it based
    on the entities in scope.
