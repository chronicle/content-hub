Execute Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the SolarWinds Orion platform to retrieve specific
    data. This action allows analysts to perform ad-hoc data retrieval from the SolarWinds
    Orion environment by submitting a query string, which is useful for gathering
    telemetry, configuration details, or status information from the monitored infrastructure.


    ### Flow Description

    1. The action extracts configuration parameters, including the SolarWinds Orion
    IP address, credentials, and SSL verification settings.

    2. It retrieves the user-provided `Query` and the optional `Max Results To Return`
    parameter.

    3. The `SolarWindsOrionManager` is initialized to establish a secure connection
    to the SolarWinds Orion API.

    4. The action sends a POST request to the SolarWinds Orion API endpoint with the
    specified query.

    5. The API response is parsed, and the results are truncated based on the `Max
    Results To Return` limit.

    6. If results are found, the action adds the data to the result set as a JSON
    object and a formatted data table for display in the SOAR platform.


    ### Additional Notes

    This action is strictly for data retrieval (read-only) and does not perform any
    state-changing operations (mutations) on the SolarWinds Orion platform or the
    SOAR case data.
