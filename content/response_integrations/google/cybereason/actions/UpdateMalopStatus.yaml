name: Update Malop Status
description: 'Update status for the Malop in Cybereason. Note: detection malops support
    only "Remediated", "Not Relevant" or "Open" statuses.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#update_malop_status
integration_identifier: Cybereason
parameters:
-   name: Malop ID
    default_value: ''
    type: string
    description: Specify the ID of the malop that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: ''
    type: ddl
    optional_values:
    - To Review
    - Remediated
    - Unread
    - Not Relevant
    - Open
    description: Specify the new status for the malop.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
