name: List Malop Processes
description: List processes related to the Malop in Cybereason.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#list_malop_processes
integration_identifier: Cybereason
parameters:
-   name: Malop ID
    default_value: ''
    type: string
    description: Specify the ID of the malop for which you want to return related
        processes.
    is_mandatory: true
-   name: Results Limit
    default_value: ''
    type: string
    description: Specify how many results to return.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/list_malop_processes_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: num_of_processes
