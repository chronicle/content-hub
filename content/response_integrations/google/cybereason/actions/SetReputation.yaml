name: Set Reputation
description: 'Set a reputation for entity in Cybereason. Supported entities: File
    Hash, IP Address, URL (action will extract domain part). Note: only MD5 and SHA1
    hashes are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#set_reputation
integration_identifier: Cybereason
parameters:
-   name: Reputation List Type
    default_value: ''
    type: ddl
    optional_values:
    - Whitelist
    - Blacklist
    description: Specify the reputation that needs to be applied to an entity.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL"]}'
