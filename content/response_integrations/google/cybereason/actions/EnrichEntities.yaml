name: Enrich Entities
description: 'Enrich entities using information from Cybereason. Supported entities:
    Hostname, IP Address, File Hash, URL (action will strip domain part from URL entity).
    Note: IP Address for this action refers to external IP addresses. Only MD5 and
    SHA-1 hashes are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#enrich_entities
integration_identifier: Cybereason
parameters:
-   name: Create Insights
    default_value: true
    type: boolean
    description: If enabled, action will create an insight for each enriched entity.
    is_mandatory: false
-   name: Only Malicious Entity Insight
    default_value: true
    type: boolean
    description: 'If enabled, action will create an insight only for entities that
        have type: ransomware, maltool, unwanted, malware, blacklist. Note: this affects
        only IP Address, File Hash and URL entities, for Hostname entity action will
        still create an insight.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "FILEHASH", "ADDRESS", "DestinationURL"]}'
