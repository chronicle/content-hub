name: Get Sensor Details
description: 'Get sensor details of entities in Cybereason. Supported entities: Hostname,
    IP address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#get_sensor_details
integration_identifier: Cybereason
parameters:
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing information
        about the sensor.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_sensor_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
