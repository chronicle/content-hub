name: Remediate Malop
description: 'Perform remediation action on the malop in Cybereason. Note: Action
    is running as async, please adjust script timeout value in Chronicle SOAR IDE
    for action as needed. To get a list of remediation unique ids, please run the
    action "List Malop Remediations".'
integration_identifier: Cybereason
parameters:
-   name: Malop ID
    default_value: ''
    type: string
    description: Specify the ID of the malop which you want to remediate.
    is_mandatory: true
-   name: Remediation Unique IDs
    default_value: ''
    type: string
    description: Specify a comma-separated list of the remediation actions that need
        to be executed. This value can be retrieved from the action "List Malop Remediations".
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remediate_melop_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
