Allow File:
  ai_description: >-
    ### General Description

    Removes a specific file hash from the blacklist in Cybereason. This action initiates
    a state change on the external system to stop preventing the execution of the
    specified file hash.


    ### Flow Description

    1. Iterates over the target entities provided to the action, filtering for `File
    Hash` entities.

    2. Validates that the file hash is of type MD5, as other hash types are not supported.

    3. Makes a POST request to the Cybereason API (`/rest/classification/update`)
    to remove the hash from the blacklist and unprevent its execution.

    4. Aggregates the results and returns a summary message indicating which hashes
    were successfully removed and which failed.


    ### Additional Notes

    - Only MD5 hashes are supported by this action. Other hash types (e.g., SHA1,
    SHA256) will be skipped and marked as failed.
