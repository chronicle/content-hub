Remediate Malop:
  ai_description: >-
    ### General Description

    Executes specific remediation actions on a Malop in Cybereason using provided
    remediation unique IDs. This action runs asynchronously to monitor the progress
    of the requested remediations.


    ### Flow Description

    1. Retrieves the suspicious details and possible remediations for the specified
    Malop ID from Cybereason.

    2. Validates the provided remediation unique IDs against the available remediations
    for the Malop.

    3. Initiates the remediation process for the matched unique IDs via the Cybereason
    API.

    4. Asynchronously monitors the status of the remediation actions (except for block
    actions, which are registered as successful immediately) until they complete or
    fail.

    5. Returns the final status and results of the remediation actions as a JSON object.


    ### Additional Notes

    This action is asynchronous. The required 'Remediation Unique IDs' can be retrieved
    by first running the 'List Malop Remediations' action.
