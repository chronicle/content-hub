Add Comment To Malop:
  ai_description: >-
    ### General Description

    Adds a comment to a specific Malop (incident) within the Cybereason platform.
    This action allows analysts to append notes or context to an existing Malop, facilitating
    better collaboration and documentation of investigation steps directly within
    the external security system.


    ### Flow Description

    1. **Initialization**: The action initializes the `CybereasonManager` using the
    provided API credentials (API Root, Username, Password) and SSL configuration.

    2. **Validation**: The action calls `manager.get_malop_or_raise(malop_id)` to
    verify that the specified Malop ID exists in the Cybereason environment.

    3. **Execution**: Upon successful validation, the action sends a POST request
    to the Cybereason API endpoint `/rest/crimes/comment/{malop_guid}` to attach the
    provided comment to the Malop.

    4. **Completion**: The action returns a success message if the comment is added,
    or an error message if the operation fails.


    ### Additional Notes

    This action requires a valid Malop ID and the corresponding Cybereason credentials.
    It performs a state-changing operation on the external Cybereason platform.
  ai_short_description: >-
    Adds a comment to a specific Malop in the Cybereason platform.
