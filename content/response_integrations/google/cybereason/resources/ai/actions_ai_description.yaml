    ### General Description

    Executes a simple investigation search in Cybereason based on provided parameters.
    This action allows querying specific data types such as Machines, Users, Processes,
    Files, Connections, Domain Names, IP Addresses, or Services using a strict query
    filter pattern. It retrieves the requested fields for the matching results and
    outputs them as a data table and JSON.


    ### Flow Description

    1. Extracts the action parameters: Request Type, Query Filters, Fields To Return,
    and Max Results To Return.

    2. Initializes the Cybereason API client.

    3. Constructs a search query payload based on the provided request type and query
    filters.

    4. Sends a POST request to the Cybereason `/rest/visualsearch/query/simple` endpoint
    to execute the search.

    5. Parses the returned data into investigation search items.

    6. Outputs the results as a data table and attaches the raw JSON results to the
    action.


    ### Additional Notes

    This action does not support nested queries. Only one type of data (e.g., machines
    or users) can be queried at once. The query filters must follow a strict pattern
