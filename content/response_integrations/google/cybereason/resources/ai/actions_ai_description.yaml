    ### General Description

    Executes a custom investigation search in Cybereason based on provided JSON query
    filters. This action allows for complex, nested queries across different item
    types (e.g., machines, users, processes) and retrieves specific fields for the
    matching results.


    ### Flow Description

    1. Parses the provided JSON query filters and the comma-separated list of fields
    to return.

    2. Initializes the Cybereason API client.

    3. Makes a POST request to the Cybereason visual search API endpoint (`/rest/visualsearch/query/simple`)
    to execute the custom query.

    4. Processes the returned search items and formats them into a data table and
    JSON result.


    ### Additional Notes

    The `Query Filters JSON` parameter must follow a strict structure containing `request_type`,
    `queries`, and optionally `connection`. The queries themselves must follow the
    pattern `"{API field} {Operator} {Value}"`.
