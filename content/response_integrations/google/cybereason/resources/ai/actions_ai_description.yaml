Isolate Machine:
  ai_description: >-
    ### General Description

    Isolates a specific machine in Cybereason based on Hostname entities. This action
    initiates a state change on the external device to prevent network traffic to
    or from the specified entity.


    ### Flow Description

    1. Filters target entities to include only Hostname entities.

    2. For each suitable entity, fetches sensor details from Cybereason using the
    `get_sensor_details` API.

    3. Checks if the machine is already isolated. If not, sends an isolation request
    using the `isolate_machine` API.

    4. Periodically queries the isolation status using the `get_sensor_details` API
    until the machine is confirmed as isolated or a timeout occurs.


    ### Additional Notes

    The action runs asynchronously and will wait for the isolation process to complete
    on the Cybereason side.
