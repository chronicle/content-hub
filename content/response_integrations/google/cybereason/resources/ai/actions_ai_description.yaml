Get Sensor Details:
  ai_description: >-
    ### General Description

    Fetches detailed sensor information for Hostname and IP Address entities from
    the Cybereason platform. This action retrieves contextual data such as sensor
    status, group, policy, isolation state, and uptime, which helps analysts understand
    the state of an endpoint within the environment.


    ### Flow Description

    1. **Initialization**: The action initializes the `CybereasonManager` using the
    provided API credentials (API Root, Username, Password) and SSL configuration.

    2. **Filtering**: It iterates through the provided `target_entities`, filtering
    for those with types `HOSTNAME` or `ADDRESS`.

    3. **Data Retrieval**: For each valid entity, the action calls the `get_sensor_details`
    method from the `CybereasonManager`, which performs a POST request to the Cybereason
    API (`/rest/sensors/query`) to fetch sensor data.

    4. **Enrichment**: If sensor data is found:
        - The entity's `additional_properties` are updated with the retrieved sensor
    details.
        - The entity is marked as enriched (`is_enriched = True`).
        - If the `Create Insight` parameter is enabled, an insight is generated and
    attached to the entity.
    5. **Output**: The action updates the entities in the SOAR platform and adds the
    collected sensor data to the action's JSON results.


    ### Additional Notes

    This action is strictly for enrichment purposes and does not modify the state
    of the Cybereason platform. It requires valid Cybereason credentials to function.
