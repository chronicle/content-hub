Remediate Malop:
  ai_description: >-
    ### General Description

    Performs remediation actions on a specific Malop (malicious operation) within
    the Cybereason platform. This action allows analysts to trigger predefined remediation
    tasks, such as blocking files or killing processes, associated with a detected
    Malop. It supports asynchronous execution to handle long-running remediation tasks
    and provides status updates until completion.


    ### Flow Description

    1. The action extracts the `Malop ID` and `Remediation Unique IDs` from the provided
    parameters.

    2. It calls the Cybereason API method `get_malop_suspicious_details` to retrieve
    all possible remediation actions and their unique IDs for the specified Malop.

    3. The action searches for the provided `Remediation Unique IDs` within the retrieved
    Malop details.

    4. For each found unique ID, it initiates the remediation action by calling the
    Cybereason API method `remediate_melop`.

    5. If the remediation action is not a block action, the action tracks the status
    asynchronously by calling `get_remediation_status` until the task is completed
    or the action times out.

    6. Finally, it updates the action result with the success or failure status of
    each remediation task.


    ### Additional Notes

    This action is designed to run asynchronously. If the action approaches the global
    timeout limit, it will gracefully exit and report the status of pending remediations.
    Ensure the action timeout value in the Chronicle SOAR IDE is configured appropriately
    for the expected duration of the remediation tasks.
  ai_short_description: >-
    Performs remediation actions on a specific Malop in Cybereason.
