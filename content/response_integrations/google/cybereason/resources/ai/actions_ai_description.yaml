  ai_description: >-
    Adds a comment to a specific malop in Cybereason.


    ### General Description

    This action interacts with the Cybereason API to append a comment to an existing
    malop. It first verifies that the specified malop exists and then posts the provided
    comment text to it.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Malop ID | String | True | Specify the ID of the malop to which you want to
    add a comment. |

    | Comment | String | True | Specify the comment for the malop. |


    ### Flow Description

    1. Retrieves the Malop ID and Comment from the action parameters.

    2. Verifies the existence of the malop in Cybereason.

    3. Adds the comment to the malop in Cybereason.

    4. Returns a success message if the comment was added successfully.
