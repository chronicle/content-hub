Prevent File:
  ai_description: >-
    ### General Description

    Adds a specific file hash to the blacklist in Cybereason to prevent its execution
    across the environment.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Filters the entities to include only File Hash entities.

    3. Validates that the file hash is of type MD5, as other hash types are not supported
    for this operation.

    4. Makes a POST request to the Cybereason API (`/rest/classification/update`)
    to add the validated MD5 hash to the blacklist with the prevent flag set to true.

    5. Returns a summary message detailing which hashes were successfully added to
    the blacklist and which failed.


    ### Additional Notes

    Only MD5 hashes are supported by this action. Any other hash types provided will
    be skipped and reported as failed.
  ai_short_description: >-
    Adds a specific file hash (MD5) to the blacklist in Cybereason to prevent its
    execution.
