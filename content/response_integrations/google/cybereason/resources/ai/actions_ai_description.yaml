Set Reputation:
  ai_description: >-
    ### General Description

    Sets the reputation (Whitelist or Blacklist) for File Hash, IP Address, and URL
    entities in Cybereason.


    ### Flow Description

    1. Iterates over the target entities and filters them by supported types (File
    Hash, IP Address, URL).

    2. For each valid entity, extracts the identifier. If the entity is a URL, it
    extracts the domain part.

    3. Makes a POST request to the Cybereason API to set the custom reputation (whitelist
    or blacklist) based on the `Reputation List Type` parameter.

    4. Returns a summary message listing the entities that were successfully updated
    and those that failed.


