  ai_description: >-
    Enriches Hostname, IP Address, File Hash, and URL entities using Cybereason.


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Create Insights | False | Boolean | If enabled, the action will create an insight
    for each enriched entity. |

    | Only Malicious Entity Insight | False | Boolean | If enabled, the action will
    create an insight only for entities that have specific malicious types (ransomware,
    maltool, unwanted, malware, blacklist). Note: this affects only IP Address, File
    Hash and URL entities; for Hostname entities, the action will still create an
    insight. |


    ### Flow

    1. Initializes the Cybereason manager with the provided credentials.

    2. Iterates over the supported target entities (Hostname, IP Address, File Hash,
    URL).

    3. For Hostname entities, fetches the machine GUID and then retrieves the machine
    details.

    4. For IP Address, File Hash, and URL entities, fetches the entity details. If
    the entity is a File Hash, it also fetches associated files.

    5. Updates the entity's additional properties with the fetched data and marks
    it as enriched.

    6. Sets the entity as suspicious if the fetched data indicates it is malicious.

    7. Creates entity insights based on the action parameters.

    8. Attaches the enrichment data as a data table and JSON result to the action.

    9. Updates the entities in the case.
