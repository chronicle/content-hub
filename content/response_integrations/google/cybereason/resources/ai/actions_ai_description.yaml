Unisolate Machine:
  ai_description: >-
    ### General Description

    Unisolates a machine in Cybereason based on Hostname entities. This action restores
    network connectivity to an endpoint that was previously isolated.


    ### Flow Description

    1. Iterates over the target Hostname entities provided in the case.

    2. For each entity, fetches the sensor details from Cybereason using the `/rest/sensors/query`
    API endpoint to determine its current isolation status and retrieve its Pylum
    ID.

    3. If the machine is currently isolated, initiates an unisolation request via
    the `rest/monitor/global/commands/un-isolate` API endpoint.

    4. Asynchronously monitors the unisolation status by periodically querying the
    sensor details until the machine is successfully unisolated or the action times
    out.


    ### Additional Notes

    This action executes asynchronously, meaning it will periodically check the status
    of the unisolation request without blocking the execution thread.
