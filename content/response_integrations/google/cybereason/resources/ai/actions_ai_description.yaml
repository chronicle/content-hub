Clear Reputation:
  ai_description: >-
    ### General Description

    Clears the custom reputation (whitelist or blacklist) of specified entities (File
    Hash, IP Address, URL) in Cybereason.


    ### Flow Description

    1. Iterates over the target entities provided in the case, filtering for File
    Hash, IP Address, and URL entity types.

    2. Extracts the domain from URL entities and validates that File Hash entities
    are either MD5 or SHA1.

    3. Checks if the entity exists in Cybereason by calling the Cybereason API to
    download classifications.

    4. If the entity is found, makes a POST request to the Cybereason API (`/rest/classification/update`)
    to remove its custom reputation.

    5. Returns a summary message indicating which entities were successfully cleared,
    not found, or failed.


    ### Additional Notes

    Only MD5 and SHA1 hashes are supported. The action strips the domain part from
    URL entities before processing.
