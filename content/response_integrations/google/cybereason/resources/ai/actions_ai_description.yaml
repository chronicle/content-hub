  ai_description: >-
    Removes a file hash from the blacklist in Cybereason.


    ### General Description

    This action iterates over File Hash entities and removes them from the blacklist
    in Cybereason. It specifically targets MD5 hashes and interacts with the Cybereason
    API to unprevent the file, restoring its execution rights.


    ### Parameters Description

    * **API Root**: The root URL of the Cybereason API. (Mandatory, String)

    * **Username**: The username for authenticating with the Cybereason API. (Mandatory,
    String)

    * **Password**: The password for authenticating with the Cybereason API. (Mandatory,
    String)

    * **Verify SSL**: Whether to verify the SSL certificate of the Cybereason server.
    (Optional, Boolean, Default: False)

    * **CA Certificate Base64**: The base64 encoded CA certificate to use for SSL
    verification. (Optional, String)


    ### Flow Description

    1. The action initializes the Cybereason API client with the provided credentials.

    2. It filters the target entities to include only File Hash entities.

    3. For each File Hash entity, it verifies if the hash type is MD5.

    4. If the hash is an MD5, it sends a request to the Cybereason API to unprevent
    the file, removing it from the blacklist.

    5. The action collects the successful and failed entities and returns a summary
    message.
