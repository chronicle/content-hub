List Malop Affected Machines:
  ai_description: >-
    ### General Description

    Lists machines affected by a specific Malop in Cybereason. This action retrieves
    detailed information about machines associated with a given Malop ID, constructs
    a CSV table for the case wall, and optionally creates new Hostname entities in
    the case for each affected machine.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, etc.) to initialize
    the Cybereason integration.

    2. Extracts action parameters: `Malop ID`, `Results Limit`, and `Create Hostname
    Entity`.

    3. Initializes the `CybereasonManager` and authenticates with the Cybereason API.

    4. Calls the `get_malop_machines_or_raise` method to fetch the list of affected
    machines from Cybereason for the specified Malop ID.

    5. Constructs a CSV table of the retrieved machines and adds it to the case wall
    using `siemplify.result.add_data_table`.

    6. Adds the raw machine data as JSON to the action results using `siemplify.result.add_result_json`.

    7. If `Create Hostname Entity` is enabled, iterates through the retrieved machines
    and creates new Hostname entities in the case using `siemplify.add_entity_to_case`.


    ### Additional Notes

    This action requires valid Cybereason credentials and connectivity to the Cybereason
    API. The `Results Limit` parameter controls the maximum number of machines returned.
