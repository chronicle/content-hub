Allow File:
  ai_description: >-
    ### General Description

    Removes a file hash from the blacklist in Cybereason. This action allows previously
    blocked files by updating their reputation status in the Cybereason platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, SSL settings)
    from the integration configuration.

    2. Initializes the `CybereasonManager` to handle API communication.

    3. Filters the provided `target_entities` to include only those of type `FILEHASH`.

    4. Iterates through each filtered file hash entity.

    5. Validates that the hash is an MD5 hash using the `get_hash_type` utility.

    6. Calls the `unprevent_file` method (which performs a POST request to the `/rest/classification/update`
    endpoint) to remove the hash from the blacklist.

    7. Logs the outcome for each entity and returns a summary message indicating success
    or failure.


    ### Additional Notes

    Only MD5 hashes are supported by this action. If a non-MD5 hash is provided, the
    action will skip it and log an error.
