Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, File Hash, and URL entities using threat intelligence
    and asset data from Cybereason. This action retrieves detailed information about
    the entities, such as machine details for hostnames or reputation and file associations
    for hashes, and updates the entities within the SOAR platform with this context.


    ### Flow Description

    1. The action initializes the Cybereason manager using the provided API credentials.

    2. It filters the `target_entities` to include only supported types: Hostname,
    IP Address, URL, and File Hash.

    3. For each entity, the action performs the following:
        * If the entity is a **Hostname**, it fetches the machine GUID and then retrieves
    detailed machine information using `manager.get_machine`.
        * If the entity is a **File Hash**, **IP Address**, or **URL**, it retrieves
    entity details using `manager.get_entity_details`.
        * For **File Hashes**, it additionally fetches associated file information
    and owner machines.
    4. The retrieved data is added to the entity's `additional_properties`.

    5. If enabled, the action creates an entity insight using `siemplify.add_entity_insight`.

    6. Finally, the action updates the entities in the SOAR platform using `siemplify.update_entities`
    and adds the results to the action output.


    ### Additional Notes

    * The action supports MD5 and SHA-1 file hashes.

    * URL entities are processed by extracting the domain part.

    * Insights can be configured to be created only for malicious entities.
