Isolate Machine:
  ai_description: >-
    ### General Description

    Isolates a machine in Cybereason. This action is used to contain potentially compromised
    endpoints by restricting their network access via the Cybereason platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    etc.) to authenticate with the Cybereason API.

    2. It filters the provided target entities to identify those of type `HOSTNAME`.

    3. For each identified hostname, the action calls the `get_sensor_details` API
    to retrieve the machine's current status and Pylum ID.

    4. If the machine is found and not already isolated, the action calls the `isolate_machine`
    API to initiate the isolation process.

    5. The action monitors the isolation status asynchronously and returns the final
    outcome.


    ### Additional Notes

    This action performs a state-changing operation on the Cybereason platform. Ensure
    the provided credentials have the necessary permissions to isolate machines.
