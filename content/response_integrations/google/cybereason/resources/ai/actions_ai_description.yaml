Clear Reputation:
  ai_description: >-
    ### General Description

    Clears the custom reputation (whitelist or blacklist status) of entities in Cybereason.
    This action allows analysts to reset the classification of an indicator, effectively
    removing any previously applied custom reputation settings.


    ### Flow Description

    1. **Initialization**: The action initializes the `CybereasonManager` using the
    provided API credentials (API Root, Username, Password) and SSL configuration.

    2. **Entity Filtering**: It iterates through the provided `target_entities`, filtering
    for supported types: File Hash, IP Address, and URL.

    3. **Entity Search**: For each supported entity, the action calls `manager.search_for_entity`
    to verify if the entity exists within the Cybereason classification system.

    4. **Reputation Removal**: If the entity is found, the action calls `manager.remove_custom_reputation`
    (via a POST request to the Cybereason API) to remove the custom reputation.

    5. **Result Reporting**: The action compiles a summary of successful, failed,
    and not-found entities and returns this as the final output message.


    ### Additional Notes

    - Only MD5 and SHA1 hashes are supported for File Hash entities.

    - For URL entities, the action extracts the domain part before processing.

    - The action performs a check against the execution deadline to ensure it does
    not exceed the allowed timeout.
