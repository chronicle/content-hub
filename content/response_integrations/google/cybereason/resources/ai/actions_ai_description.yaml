Execute Custom Investigation Search:
  ai_description: >-
    ### General Description

    Executes a custom investigation search in Cybereason to retrieve specific data
    based on user-defined filters. This action allows analysts to perform complex
    queries against the Cybereason platform by specifying request types, filters,
    and the fields to be returned.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, etc.) and
    action parameters (Query Filters JSON, Fields To Return, Max Results).

    2. Initializes the `CybereasonManager` with the provided credentials and connectivity
    settings.

    3. Validates and parses the `Query Filters JSON` parameter into a structured format.

    4. Calls the `execute_custom_query` method in the manager.

    5. The manager constructs a query payload and sends a POST request to the Cybereason
    `/rest/visualsearch/query/simple` endpoint.

    6. The action processes the returned results and adds them to the action output
    as a data table and JSON.


    ### Additional Notes

    The query filters must follow a strict pattern of "{API field} {Operator} {Value}".
    For multiple values, an "OR" key is required. Each filter must be a separate item
    in the list, and each key represents the request type (e.g., machine, user).
