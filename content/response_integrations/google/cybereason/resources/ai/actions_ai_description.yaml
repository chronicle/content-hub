  ai_description: >-
    Clears the custom reputation of specified entities in Cybereason.


    ### General Description

    This action removes any custom reputation (such as whitelist or blacklist entries)
    assigned to specific entities (File Hash, IP Address, URL) within Cybereason.
    By clearing the reputation, the entity is restored to its default monitoring state
    in the Cybereason platform. Note that for URL entities, the action automatically
    strips the domain part and uses it for the operation. Only MD5 and SHA1 file hashes
    are supported.


    ### Flow Description

    1. The action iterates over the provided target entities, filtering for supported
    types (File Hash, IP Address, URL).

    2. For each valid entity, it extracts the appropriate identifier (e.g., extracting
    the domain from a URL or validating the hash type).

    3. It checks Cybereason to verify if the entity currently has a custom reputation.

    4. If a custom reputation exists, it sends a request to Cybereason to remove it.

    5. The action aggregates the results, reporting which entities were successfully
    cleared, which were not found, and which failed.


    ### Parameters Description

    There are no input parameters for this action.


    ### Additional Notes

    - Supported entity types: File Hash (MD5, SHA1), IP Address, URL.

    - For URL entities, the action will strip the domain part and use it for the API
    request.
