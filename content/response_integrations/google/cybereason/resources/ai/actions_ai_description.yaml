Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, File Hash, and URL entities using information from
    Cybereason. This action retrieves contextual data and threat intelligence, updates
    the entities' properties, and evaluates their risk to flag them as suspicious
    if malicious activity is detected.


    ### Flow Description

    1. Iterates over the target entities and filters them to process only supported
    types (Hostname, IP Address, File Hash, URL).

    2. For Hostname entities, it makes an API call to fetch the machine GUID by name
    or FQDN, and then fetches the machine's detailed information.

    3. For File Hash, URL, and IP Address entities, it makes an API call to fetch
    entity details. For File Hash entities, it additionally fetches associated files.

    4. Updates the entities' `additional_properties` with the retrieved enrichment
    data and sets the `is_enriched` flag to true.

    5. Evaluates the retrieved data and sets the `is_suspicious` flag to true if the
    entity is deemed malicious.

    6. Creates insights for the entities based on the action parameters (`Create Insights`
    and `Only Malicious Entity Insight`).

    7. Attaches the enrichment data as a CSV table and JSON result to the action's
    output.


    ### Additional Notes

    - IP Address for this action refers to external IP addresses.

    - Only MD5 and SHA-1 hashes are supported for File Hash entities.

    - The action will strip the domain part from URL entities before querying Cybereason.
  ai_short_description: >-
    Enriches Hostname, IP Address, File Hash, and URL entities using Cybereason to
    retrieve contextual and threat information.
