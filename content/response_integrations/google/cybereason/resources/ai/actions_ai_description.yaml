Prevent File:
  ai_description: >-
    ### General Description

    This action adds a file hash to the blacklist in Cybereason to prevent its execution.
    It interacts with the Cybereason API to update the classification of the specified
    file hash, effectively blocking it across the environment.


    ### Flow Description

    1. The action initializes the Cybereason manager using the provided configuration
    parameters (API Root, Username, Password, SSL settings).

    2. It retrieves the list of target entities from the SOAR platform.

    3. It filters the entities to include only those of type `FILEHASH`.

    4. For each valid entity, it verifies if the hash is an MD5 hash, as only MD5
    hashes are supported by this action.

    5. If the hash is valid, the action calls the `prevent_file` method on the Cybereason
    manager, which performs a POST request to the Cybereason API to blacklist the
    hash.

    6. The action logs the success or failure of the operation for each entity and
    returns a summary message.


    ### Additional Notes

    - This action only supports MD5 hashes. Other hash types will be skipped.

    - The action requires valid Cybereason credentials and API access.
