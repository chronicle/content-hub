Execute Simple Investigation Search:
  ai_description: >-
    ### General Description

    Executes an investigation search in Cybereason to retrieve specific data based
    on user-defined criteria. This action allows analysts to query various object
    types (e.g., Machines, Users, Processes) within the Cybereason environment using
    custom filters and field selections.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, SSL settings)
    and action parameters (Request Type, Query Filters, Fields To Return, Max Results).

    2. Initializes the `CybereasonManager` to establish a connection to the Cybereason
    API.

    3. Validates the `Max Results To Return` parameter to ensure it is a positive
    integer.

    4. Executes the search query by calling the Cybereason API endpoint `/rest/visualsearch/query/simple`
    via the `manager.execute_query` method.

    5. Processes the returned results and constructs a data table and JSON output.

    6. Adds the formatted results to the action output for the analyst to review.


    ### Additional Notes

    This action supports various request types, including Machine, User, Process,
    File, Connection, Domain Name, IP Address, and Service. It does not support nested
    queries; for nested queries, please use the 'Execute Custom Investigation Search'
    action.
  ai_short_description: >-
    Executes an investigation search in Cybereason to retrieve data based on specified
    filters and request types.
