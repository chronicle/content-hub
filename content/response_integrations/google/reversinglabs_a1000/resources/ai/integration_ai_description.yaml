  reasoning: >-
    The ReversingLabs A1000 integration is a malware analysis platform that provides
    threat intelligence for file-based indicators. Its primary actions, such as 'Get
    Report' and 'Get Scan Status', are designed to enrich file hashes (IOCs) with
    reputation data, threat levels, and analysis status, which directly aligns with
    the 'Threat Intelligence' category. It does not perform SIEM log analysis, EDR
    host containment, network security blocking, email management, IAM operations,
    cloud resource management, ITSM ticketing, vulnerability scanning, asset inventory
    management, or collaboration/notification tasks.
  siem: false
  threat_intelligence: true
