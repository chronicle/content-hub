  reasoning: >-
    The reversinglabs_a1000 integration is primarily a threat intelligence tool focused
    on malware analysis. Its core actions, 'Get Report' and 'Get Scan Status', are
    designed to enrich file hash entities with critical threat intelligence data,
    such as threat status, malware family names, and threat levels, which directly
    aligns with the Threat Intelligence category. The 'Upload File' action further
    supports this by allowing users to submit samples for analysis to obtain intelligence.
    The integration does not perform functions related to SIEM (log searching), EDR
    (host interaction), Network Security (gateway blocking), Email Security, IAM,
    Cloud Security, ITSM, Vulnerability Management, Asset Inventory, or Collaboration.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
