Get Report:
  ai_description: "### General Description\nThe **Get Report** action retrieves summary\
    \ classification reports and detailed analysis metadata for file hashes from the\
    \ ReversingLabs A1000 Malware Analysis Appliance. This action is used to enrich\
    \ file-related indicators by providing threat levels, status (e.g., malicious,\
    \ suspicious, known), and specific threat names identified by ReversingLabs.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This action does not require\
    \ any input parameters; it automatically processes all `FILEHASH` entities in\
    \ the scope. |\n\n### Additional Notes\n* This action performs a bulk lookup for\
    \ all identified hashes in a single API call.\n* It does not submit new files\
    \ for analysis; it only retrieves existing reports.\n* Results are presented as\
    \ data tables attached to the case for each hash.\n\n### Flow Description\n1.\
    \ **Entity Identification**: The action scans the current context for entities\
    \ of type `FILEHASH`.\n2. **Data Retrieval**: It sends a list of these hashes\
    \ to the ReversingLabs A1000 `api/samples/list/` endpoint.\n3. **Context Enrichment**:\
    \ For every hash found, the action extracts key fields including `threat_status`,\
    \ `threat_level`, `threat_name`, and `trust_factor`.\n4. **Output Generation**:\
    \ \n    * A data table is created for each hash and attached to the case.\n  \
    \  * The full response is provided as a JSON result for further playbook processing."
