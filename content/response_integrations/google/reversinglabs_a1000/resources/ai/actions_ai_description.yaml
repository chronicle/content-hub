    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data for enrichment. It mutates external data by sending
      a DELETE request to the ReversingLabs A1000 API to remove a sample and its metadata.
      It does not mutate internal SOAR data, update entities, create insights, modify
      alerts, or create case comments.
