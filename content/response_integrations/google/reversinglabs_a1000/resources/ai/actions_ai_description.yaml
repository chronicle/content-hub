Get Scan Status:
  ai_description: >-
    ### General Description

    Retrieves the processing status of file hash entities from the ReversingLabs A1000
    system. This action is useful for checking whether previously submitted files
    or hashes have finished analysis.


    ### Flow Description

    1. Iterates through the target entities provided in the case and filters for File
    Hash entities.

    2. Extracts the hash values from the filtered entities.

    3. Makes a POST request to the ReversingLabs A1000 API (`api/samples/status/`)
    to fetch the processing status for the collected hashes.

    4. Formats the retrieved status data into a CSV table and a JSON object.

    5. Attaches the formatted results to the action output.


    ### Additional Notes

    This action does not update the entities or create insights; it only provides
    the processing status of the hashes in the A1000 system.
