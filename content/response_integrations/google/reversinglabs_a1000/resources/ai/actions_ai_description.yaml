    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes the specified file sample and its associated metadata from the Reversinglabs
      A1000 appliance.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a `DELETE` request to an external API (Reversinglabs A1000)
      to remove a sample. It does not fetch data, nor does it modify internal SOAR
      data (entities, insights, etc.).
  categories:
    enrichment: false
    reasoning: >-
      The action is a destructive operation (deletion) on an external system. It does
      not fetch data, so it is not an enrichment action.
  entity_usage:
