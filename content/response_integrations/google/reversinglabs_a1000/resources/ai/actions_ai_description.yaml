      The action uploads a file to an external analysis engine (A1000) and retrieves
      the report. This matches the 'Submit File' category. It does not enrich an existing
      entity, update an alert, or perform any other listed operations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
