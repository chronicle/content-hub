Delete Sample:
  ai_description: >-
    ### General Description

    Deletes a set of file samples from the ReversingLabs A1000 appliance based on
    file hash entities. All related data, including extracted samples and metadata,
    will be permanently deleted from the appliance.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to include only those of type `FILEHASH`.

    3. For each valid file hash, makes a `DELETE` request to the ReversingLabs A1000
    API (`/api/samples/{sample_hash}/`) to remove the sample and its associated data.

    4. Collects the successfully deleted hashes and returns a summary message indicating
    which entities were removed.


    ### Additional Notes

    This action performs a destructive operation on the external ReversingLabs A1000
    appliance. Ensure that the file hashes provided are intended for deletion, as
    the extracted samples and metadata cannot be recovered once deleted.
  ai_short_description: >-
    Deletes file samples and their associated metadata from the ReversingLabs A1000
    appliance based on file hash entities.
  capabilities:
    can_create_case_comments: false
