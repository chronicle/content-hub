  ai_description: >-
    ### General Description

    Uploads a file to the ReversingLabs A1000 appliance for automated malware analysis.
    This action submits a local file to the A1000 system, monitors its processing
    status until completion, and retrieves a comprehensive analysis report containing
    critical security metadata such as threat levels, status, and classification details.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | string | True | The absolute path to the file on the local system
    that needs to be uploaded for analysis. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the ReversingLabs A1000 appliance
    using the configured API credentials.

    2. **File Upload**: Submits the file located at the provided 'File Path' to the
    A1000 `/api/uploads/` endpoint.

    3. **Status Polling**: Enters a polling loop, checking the processing status of
    the file's SHA1 hash until the appliance marks it as 'processed'.

    4. **Report Retrieval**: Once processing is finished, the action fetches the summary
    classification report for the file.

    5. **Data Output**: The retrieved report is flattened and presented as a data
    table named 'File Details:' and also attached as a raw JSON result for further
    playbook processing.


    ### Additional Notes

    This action is synchronous and will wait (block) until the A1000 appliance has
    finished analyzing the file. Ensure that the environment where the action runs
    has read access to the specified file path.
