Upload File:
  ai_description: >-
    ### General Description

    Uploads a file to the ReversingLabs A1000 appliance for malware analysis. This
    action allows analysts to submit suspicious files directly from the SOAR platform
    to the A1000 system, enabling automated threat detection and deep analysis. The
    action waits for the analysis to complete and retrieves the resulting report,
    which includes threat status, threat level, and other classification details.


    ### Flow Description

    1. The action initializes the A1000 client using the provided API credentials.

    2. It uploads the specified file to the A1000 appliance via a POST request to
    the `/api/uploads/` endpoint.

    3. The action enters a polling loop, checking the processing status of the file
    via the `/api/samples/status/` endpoint until the status is marked as 'processed'.

    4. Once processed, it retrieves the detailed analysis report by calling the `/api/samples/list/`
    endpoint.

    5. The report data is flattened and added to the action results as a data table,
    and the full JSON result is attached to the action output.


    ### Additional Notes

    This action performs a file upload and waits for the A1000 appliance to complete
    the analysis. Ensure the file path provided is accessible to the integration runner.
