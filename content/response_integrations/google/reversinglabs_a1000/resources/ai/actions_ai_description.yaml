Delete Sample:
  ai_description: >-
    ### General Description

    The **Delete Sample** action allows analysts to remove specific file samples and
    all their associated metadata from a ReversingLabs A1000 appliance. This action
    is primarily used for data management, privacy compliance, or clearing out unwanted
    analysis data from the appliance.


    ### Parameters Description

    There are no user-configurable parameters for this action. It automatically processes
    all `FILEHASH` entities identified in the current context.


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the ReversingLabs
    A1000 appliance using the API Root, Username, and Password provided in the integration
    configuration.

    2. **Entity Identification**: The script iterates through the target entities
    in the SOAR case, specifically filtering for those of type `FILEHASH`.

    3. **Deletion Execution**: For each identified file hash, the action sends a `DELETE`
    request to the A1000 API endpoint (`/api/samples/{hash}/`).

    4. **Status Reporting**: The action tracks successful deletions (based on HTTP
    200 responses) and returns a summary message listing the hashes that were successfully
    removed from the appliance.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes file samples and their associated metadata from the ReversingLabs A1000
      appliance using the HTTP DELETE method.
    fetches_data: false
    internal_data_mutation_explanation: null
