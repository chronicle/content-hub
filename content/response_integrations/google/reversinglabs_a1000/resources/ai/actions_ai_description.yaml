Get Report:
  ai_description: >-
    ### General Description

    Retrieves summary classification reports and detailed analysis for file hashes
    from the ReversingLabs A1000 appliance. This action allows security analysts to
    obtain threat intelligence, including threat status, threat level, and trust factors,
    for specific file hashes identified during an investigation.


    ### Flow Description

    1. The action initializes the ReversingLabs A1000 client using the provided API
    credentials (Api Root, Username, Password) retrieved from the integration configuration.

    2. It iterates through the target entities, filtering specifically for `FILEHASH`
    types.

    3. It sends a POST request to the A1000 API endpoint `api/samples/list/` with
    the collected hash values to retrieve classification reports.

    4. For each retrieved report, it formats the data into a CSV table and adds it
    to the action results.

    5. It aggregates all reports into a JSON object and attaches it to the action
    results.


    ### Additional Notes

    This action is used for threat intelligence enrichment of file hashes. It does
    not modify the state of the A1000 appliance or the SOAR case data.
