  ai_description: >-
    ### General Description

    The **Delete Sample** action removes specific file samples from a Reversinglabs
    A1000 appliance. This operation is destructive, permanently deleting the sample
    file and all associated metadata and analysis data from the appliance.


    ### Parameters Description

    There are no user-configurable parameters for this action. It operates directly
    on the entities provided in the context.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Reversinglabs
    A1000 appliance using the credentials provided in the integration configuration.

    2. **Entity Filtering**: The script iterates through the target entities in the
    current scope and identifies those of type `FILEHASH`.

    3. **Deletion Request**: For each identified file hash, the action sends a `DELETE`
    request to the A1000 API endpoint (`/api/samples/{hash}/`).

    4. **Result Tracking**: The action monitors the API response. If the status code
    is 200, the hash is added to a list of successfully deleted items.

    5. **Final Output**: The action concludes by providing a summary message of the
    deleted hashes and sets the action's result value to `True` if at least one deletion
    was successful, or `False` otherwise.


    ### Additional Notes

    * This action is irreversible. Once a sample is deleted from the A1000 appliance,
    its analysis data cannot be recovered unless the file is re-uploaded.

    * The action converts all hash identifiers to lowercase before sending the request
    to ensure compatibility with the A1000 API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes the specified file sample and its associated metadata from the Reversinglabs
      A1000 appliance.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a DELETE request to an external API (Reversinglabs A1000)
      to remove data, which constitutes external data mutation. It does not fetch
      data, nor does it modify internal SOAR data, entities, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is a destructive operation (deletion) on an external system and does
      not retrieve any data for enrichment purposes. Therefore, it does not meet the
      criteria for an enrichment action.
  entity_usage:
