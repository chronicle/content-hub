Delete Sample:
  ai_description: >-
    ### General Description

    Deletes a specific file sample from the ReversingLabs A1000 appliance. This action
    removes the sample and its associated metadata from the system, effectively cleaning
    up the appliance storage.


    ### Flow Description

    1. The action initializes the ReversingLabs A1000 client using the configured
    API credentials (Api Root, Username, Password).

    2. It iterates through the provided target entities, filtering for those of type
    `FILEHASH`.

    3. For each valid file hash, it sends a DELETE request to the A1000 API endpoint
    (`/api/samples/{hash}/`).

    4. It verifies the response code (200) to confirm successful deletion.

    5. Finally, it terminates the action with a summary message listing the deleted
    hashes or indicating that no entities were deleted.


    ### Additional Notes

    This action performs a destructive operation on the external A1000 appliance.
    Ensure that the samples are no longer needed before execution.
  ai_short_description: >-
    Deletes a file sample from the ReversingLabs A1000 appliance.
