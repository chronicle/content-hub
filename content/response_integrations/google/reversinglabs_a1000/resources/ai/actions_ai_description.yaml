Get Scan Status:
  ai_description: >-
    ### General Description

    Retrieves the processing status of file hash entities from the Reversinglabs A1000
    malware analysis system. This action allows analysts to verify whether specific
    files have been analyzed or are currently being processed by the A1000 appliance.


    ### Flow Description

    1. Initialize the `A1000MalwareAnalysisClient` using the configured API Root,
    Username, and Password.

    2. Iterate through the `target_entities` provided to the action.

    3. Filter the entities to identify those of type `FILEHASH` and collect their
    identifiers.

    4. Execute a POST request to the A1000 API endpoint `api/samples/status/` with
    the list of collected hash values.

    5. Parse the response to map each hash to its current processing status.

    6. Add a data table and a JSON result containing the status information to the
    action output.


