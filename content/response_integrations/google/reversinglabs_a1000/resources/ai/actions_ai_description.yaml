Get Report:
  ai_description: >-
    ### General Description

    Retrieves a summary classification report and detailed analysis for file hash
    entities from ReversingLabs A1000. This action provides threat intelligence, including
    threat status, threat level, and threat name for the specified indicators.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. Extracts the identifiers (hashes) of the filtered entities and converts them
    to lowercase.

    3. Makes an API call (POST request to `api/samples/list/`) to ReversingLabs A1000
    to fetch the summary classification report for the collected hashes.

    4. Parses the response and attaches the report details as a data table and JSON
    result to the action output.


    ### Additional Notes

    The action requires valid integration credentials to authenticate with the ReversingLabs
    A1000 API. It processes multiple hashes in a single API request.
