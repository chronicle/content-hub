  ai_description: >-
    ### General Description\nThe **Delete Sample** action removes specific file samples
    and their associated metadata from the ReversingLabs A1000 appliance. This action
    is primarily used for data management, privacy compliance, or clearing out unwanted
    analysis data from the appliance.\n\n### Parameters Description\nThere are no
    user-configurable parameters for this action. It automatically processes all `FILEHASH`
    entities identified in the current context.\n\n### Flow Description\n1. **Authentication**:
    The action establishes a connection to the ReversingLabs A1000 appliance using
    the API Root, Username, and Password provided in the integration configuration.\n2.
    **Entity Identification**: The script iterates through the target entities in
    the SOAR case, specifically filtering for those of type `FILEHASH`.\n3. **Deletion
    Execution**: For each identified file hash, the action sends a `DELETE` request
    to the A1000 API endpoint (`/api/samples/{hash}/`).\n4. **Status Reporting**:
    The action tracks successful deletions (based on HTTP 200 responses) and returns
    a summary message listing the hashes that were successfully removed from the appliance.
