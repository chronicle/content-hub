Get Scan Status:
  ai_description: >-
    Retrieves the processing status of file hash entities from the ReversingLabs A1000
    Malware Analysis platform. This action allows analysts to check if submitted samples
    have finished analysis or are still being processed.


    ### Flow Description:

    1. **Entity Collection**: The action identifies all `FILEHASH` entities within
    the current scope.

    2. **Status Query**: It sends a bulk request to the ReversingLabs A1000 API using
    the collected hash values to retrieve their current processing status.

    3. **Data Processing**: The response is parsed to map each hash to its specific
    status (e.g., 'processed', 'uploading', 'analyzing').

    4. **Output Generation**: The action generates a data table named 'Scan Status:'
    for the case wall and provides a JSON result containing the status mapping for
    downstream playbook logic.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the entities in the context. |


    ### Additional Notes:

    * This action uses a POST request to the `/api/samples/status/` endpoint to perform
    a bulk lookup of hash statuses.

    * If no status information is returned for the provided hashes, the action will
    complete with a failure status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
