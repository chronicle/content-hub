  ai_description: >-
    ### General Description

    Retrieves the processing status of file hash entities from the ReversingLabs A1000
    Malware Analysis platform. This action allows analysts to check if submitted samples
    have finished analysis or are still being processed, providing visibility into
    the malware analysis lifecycle.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the entities in the context. |


    ### Additional Notes

    * This action performs a bulk lookup of hash statuses using a POST request to
    the `/api/samples/status/` endpoint of the A1000 API.

    * The action is designed to process `FILEHASH` entities. If no status information
    is returned for the provided hashes, the action will complete with a failure status.


    ### Flow Description

    1. **Entity Collection**: The action iterates through the `target_entities` in
    the current SOAR case and identifies all entities of type `FILEHASH`.

    2. **Status Query**: It sends a bulk request to the ReversingLabs A1000 API using
    the collected hash values to retrieve their current processing status.

    3. **Data Processing**: The API response is parsed to map each hash to its specific
    status (e.g., 'processed', 'uploading', 'analyzing').

    4. **Output Generation**: The action generates a data table named 'Scan Status:'
    for the action result and provides a JSON result containing the status mapping
    for downstream playbook logic.
