    3. **Connectivity Test**: The action executes a connectivity test by querying
    the status of a predefined test hash.

    4. **Completion**: If the API responds successfully, the action returns a 'Connected
    Successfully' message.


    ### Additional Notes

    This action does not process any entities or modify any data within the SecOps
    platform or the external A1000 system.
