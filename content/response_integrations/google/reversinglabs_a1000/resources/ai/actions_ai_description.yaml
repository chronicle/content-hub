    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table named 'Scan Status:' to the Google SecOps case containing
      the processing status of the analyzed file hashes.
