  ai_description: >-
    ### General Description

    The **Get Report** action retrieves a comprehensive classification summary and
    detailed analysis for file samples from a ReversingLabs A1000 Malware Analysis
    appliance using their hash values. This action is designed to enrich file hash
    entities with threat intelligence, providing critical data points such as threat
    status, malware names, threat levels, and trust factors.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action iterates through all entities in the current
    context and filters for those of type `FILEHASH`.

    2. **API Authentication**: It initializes the ReversingLabs A1000 client using
    the integration's configured API Root, Username, and Password to obtain an authorization
    token.

    3. **Data Retrieval**: The action sends a batch request to the A1000 `/api/samples/list/`
    endpoint, passing the collected hash values and requesting specific fields including
    `threat_status`, `threat_level`, `threat_name`, and `trust_factor`.

    4. **Result Processing**: For each hash that returns a report, the action flattens
    the dictionary and generates a dedicated data table on the case wall for that
    specific hash.

    5. **Output**: The action concludes by attaching the complete raw JSON response
    to the execution results, allowing for further automated analysis or logic in
    the playbook.


    ### Additional Notes

    This action is strictly read-only regarding the external ReversingLabs system.
    It queries existing reports and does not trigger new file uploads or analysis
    tasks.
