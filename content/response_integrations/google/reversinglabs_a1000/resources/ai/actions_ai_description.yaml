  ai_description: >-
    Uploads a file to the ReversingLabs A1000 appliance for malware analysis.


    ### General Description

    This action uploads a specified file to the ReversingLabs A1000 appliance, waits
    for the analysis to complete, and retrieves the resulting threat report. The analysis
    results are then attached to the action's output as a data table and JSON.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Path | String | Yes | The local path of the file to be uploaded for analysis.
    |


    ### Flow Description

    1. Retrieves the `File Path` parameter.

    2. Uploads the file to the ReversingLabs A1000 appliance.

    3. Polls the appliance until the file processing status is 'processed'.

    4. Retrieves the analysis report for the uploaded file's SHA1 hash.

    5. Attaches the report details as a data table and JSON result to the action output.
