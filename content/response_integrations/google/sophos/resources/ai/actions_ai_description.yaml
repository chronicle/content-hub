Execute Alert Actions:
  ai_description: >-
    ### General Description

    This action executes a specified remediation or management action on an alert
    within Sophos.


    ### Flow Description

    1. Retrieves the target `Alert ID`, the desired `Action`, and an optional `Message`
    from the action parameters.

    2. Maps the provided action name to the corresponding Sophos API action identifier.

    3. Makes a POST request to the Sophos API (`/common/v1/alerts/{alert_id}/actions`)
    to initiate the action on the alert.

    4. Returns a success message upon successful execution or an error message if
    the request fails.


    ### Additional Notes

    Available actions include Acknowledge, Clean PUA, Clean Virus, Auth PUA, Clear
    Threat, Clear HMPA, Send Message PUA, and Send Message Threats. To determine which
    actions are available for a specific alert dynamically, you can use the "List
    Alert Actions" action beforehand.
