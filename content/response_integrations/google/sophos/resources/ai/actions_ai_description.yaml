Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and File Hash entities using information from Sophos.
    This action retrieves endpoint details (such as health, isolation status, and
    OS information) or file hash blocklist status to provide context for security
    investigations.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and action parameters (Create Insights).

    2. Initializes the Sophos Manager to authenticate and connect to the Sophos API.

    3. Filters target entities to include only Hostname, IP Address, and File Hash
    types.

    4. For Hostname and IP Address entities, queries the Sophos API to find the corresponding
    endpoint. If found, retrieves health, isolation status, and system information.

    5. For File Hash entities, queries the Sophos API to check if the hash is present
    in the blocklist.

    6. Updates the entity's `additional_properties` with the retrieved data and marks
    the entity as enriched.

    7. Optionally creates insights and adds entity tables to the action results.

    8. Updates the entities within the SOAR platform.


    ### Additional Notes

    Requires valid Sophos API credentials.
