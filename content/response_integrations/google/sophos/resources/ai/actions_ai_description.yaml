Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    Adds specified file hash entities to the blocklist in Sophos. This action initiates
    a state change on the external Sophos platform to prevent the execution or presence
    of the specified hashes.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to include only `FileHash` types.

    3. Validates that each hash is a SHA-256 hash by checking its length (64 characters).

    4. Makes a POST request to the Sophos API (`/endpoint/v1/settings/blocked-items`)
    for each valid hash to add it to the blocklist, attaching the provided comment.

    5. Collects the results and returns a summary message detailing which entities
    were successfully blocked, which failed, and which were already present on the
    blocklist.


    ### Additional Notes

    Only SHA-256 hashes are supported by this action. Hashes of other types (e.g.,
    MD5, SHA-1) will be skipped and logged as unsupported.
  ai_short_description: >-
    Adds specified SHA-256 file hash entities to the blocklist in Sophos.
