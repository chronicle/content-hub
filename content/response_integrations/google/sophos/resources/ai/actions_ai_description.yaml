Add Entities To Allowlist:
  ai_description: >-
    ### General Description

    Adds file hash entities to the Sophos allowlist. This action enables security
    teams to mark specific file hashes as trusted within Sophos Central, preventing
    them from being flagged or blocked by security policies.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and the action parameter (Comment).

    2. Filters target entities for `FILEHASH` type.

    3. Iterates through each valid file hash entity.

    4. Validates that the hash is a SHA-256 hash (length 64).

    5. Calls the Sophos API via `SophosManager.add_hash_to_allowlist` to add the hash
    to the allowlist.

    6. Handles cases where the hash is already on the allowlist or if an error occurs.

    7. Returns a summary message of successful, failed, and already-added entities.


    ### Additional Notes

    Only SHA-256 hashes are supported. If a hash is not 64 characters long, the action
    will skip it and log an error.
  ai_short_description: >-
    Adds file hash entities to the Sophos allowlist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified file hash to the allowlist in Sophos Central.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Sophos API to add a hash to the allowlist
      (external mutation). It does not fetch data, mutate internal data, or update
      entities/insights.
