Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    Adds file hash entities to the blocklist in Sophos Central. This action allows
    security analysts to proactively block malicious files identified during an investigation
    by pushing their SHA-256 hashes to the Sophos blocklist.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, Client
    ID, Client Secret) and the 'Comment' parameter.

    2. It filters the provided target entities to include only those of type 'FileHash'.

    3. For each valid entity, it validates that the hash is a SHA-256 hash (64 characters
    in length).

    4. It makes a POST request to the Sophos API (`/endpoint/v1/settings/blocked-items`)
    to add the hash to the blocklist with the provided comment.

    5. If the hash is already on the blocklist, the action logs this status and continues
    processing other entities.

    6. It returns a summary of successful, failed, and already-blocked entities.


    ### Additional Notes

    Only SHA-256 hashes are supported. If an entity is not a valid SHA-256 hash, it
    will be skipped.
