Execute Alert Actions:
  ai_description: >-
    ### General Description

    Executes a specified action on a Sophos alert. This action allows analysts to
    perform remediation or management tasks directly on alerts within the Sophos Central
    platform, such as acknowledging alerts, cleaning threats, or sending messages.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required configuration parameters
    (API Root, Client ID, Client Secret, Verify SSL) and action parameters (Alert
    ID, Action, Message).

    2. **Authentication**: Initializes the `SophosManager` with the provided credentials
    to establish a session with the Sophos API.

    3. **Action Mapping**: Maps the user-selected action (e.g., 'Acknowledge', 'Clean
    PUA') to the corresponding API-compatible action string using the `ACTION_TYPES_MAPPING`
    constant.

    4. **API Execution**: Sends a `POST` request to the Sophos API endpoint `/common/v1/alerts/{alert_id}/actions`
    with the specified action and an optional message.

    5. **Result Handling**: Returns a success message if the action is initiated successfully,
    or an error message if the API request fails.


    ### Additional Notes

    - This action requires valid Sophos API credentials.

    - The available actions are restricted to those supported by the Sophos API and
    defined in the integration settings.

    - Use the 'List Alert Actions' action to retrieve the valid actions for a specific
    alert before executing this action.
  ai_short_description: >-
    Executes a specified management or remediation action on a Sophos alert.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a specified action (e.g., Acknowledge, Clean PUA) on a Sophos alert,
      modifying the alert's state in the Sophos platform.
    fetches_data: false
