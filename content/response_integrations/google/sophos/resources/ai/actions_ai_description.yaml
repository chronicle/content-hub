Get Events Log:
  ai_description: >-
    ### General Description

    Retrieves historical event logs related to specific endpoint entities (IP Address,
    Hostname) from Sophos.


    ### Flow Description

    1. Iterates over the target entities, filtering for IP Address and Hostname types.

    2. For each valid entity, queries the Sophos API (`/endpoint/v1/endpoints`) to
    find the corresponding endpoint ID using the entity's identifier.

    3. If an endpoint is found, queries the Sophos SIEM API (`/siem/v1/events`) to
    retrieve the event logs for that endpoint within the specified timeframe.

    4. Attaches the retrieved events as a CSV table to the entity and adds the raw
    data to the action's JSON result.


    ### Additional Notes

    Events are accessible from the Sophos API only for the last 24 hours. If a timeframe
    greater than 24 hours is provided, the action will default to 24 hours.
