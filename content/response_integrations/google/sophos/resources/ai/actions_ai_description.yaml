Isolate Endpoint:
  ai_description: >-
    ### General Description

    Isolates endpoints in the Sophos platform. This action allows security analysts
    to restrict network communication for specific endpoints identified by IP Address
    or Hostname, effectively containing potential threats.


    ### Flow Description

    1. **Initialization**: The action initializes the `SophosManager` using the provided
    API credentials (API Root, Client ID, Client Secret) and SSL verification settings.

    2. **Entity Filtering**: The action iterates through the provided `target_entities`,
    filtering for those with types `ADDRESS` or `HOSTNAME`.

    3. **Endpoint Lookup**: For each suitable entity, the action calls `manager.find_entities`
    to retrieve the corresponding endpoint ID in Sophos.

    4. **Status Check**: The action checks the current isolation status of the endpoint
    using `manager.check_isolation_status`.

    5. **Isolation**: If the endpoint is not already isolated, the action calls `manager.isolate_or_unisolate_endpoint`
    with `isolate=True` and the provided comment.

    6. **Asynchronous Handling**: As an asynchronous action, it monitors the isolation
    status and returns an 'In Progress' state if the operation is pending, or 'Completed'
    if finished.


    ### Additional Notes

    This action is designed to run asynchronously. Please ensure the script timeout
    value in the Siemplify IDE is adjusted appropriately to accommodate the asynchronous
    polling process.
