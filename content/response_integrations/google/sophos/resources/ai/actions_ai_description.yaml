Get Events Log:
  ai_description: >-
    ### General Description

    Retrieves event logs for specific endpoints (IP Address or Hostname) from Sophos.
    This action allows analysts to query historical telemetry data for a given entity
    within a specified timeframe, facilitating investigation and incident response.


    ### Flow Description

    1. **Initialization**: The action initializes the `SophosManager` using the provided
    integration configuration (API Root, Client ID, Client Secret, etc.).

    2. **Timeframe Calculation**: It calculates the start time for the event query
    based on the `Timeframe` parameter (capped at 24 hours).

    3. **Entity Processing**: It iterates through the provided `target_entities`,
    filtering for `ADDRESS` and `HOSTNAME` types.

    4. **Endpoint Search**: For each valid entity, it calls the `manager.find_entities`
    method to locate the corresponding endpoint in Sophos.

    5. **Event Retrieval**: If the endpoint is found, it calls `manager.get_events_by_endpoint`
    to fetch events occurring since the calculated start time.

    6. **Result Output**: Retrieved events are formatted into a CSV table and attached
    to the entity using `siemplify.result.add_entity_table`. Additionally, the full
    JSON result is added to the action output.


    ### Additional Notes

    - Events are only accessible via the Sophos API for the last 24 hours.

    - The `Timeframe` parameter is capped at 24 hours regardless of user input.

    - The `Max Events To Return` parameter is validated to ensure it is a positive
    integer.
  ai_short_description: >-
    Retrieves event logs for endpoints (IP Address or Hostname) from Sophos.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
