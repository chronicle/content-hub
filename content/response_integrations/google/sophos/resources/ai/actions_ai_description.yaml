Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and File Hash entities using information from Sophos.
    It retrieves endpoint details, isolation status, and blocked item information
    to provide contextual threat intelligence and asset data.


    ### Flow Description

    1. Initializes the Sophos API client using the provided integration credentials.

    2. Iterates over the target entities, filtering for supported types (Hostname,
    IP Address, File Hash).

    3. For Hostname and IP Address entities, makes a GET request to the Sophos API
    (`/endpoint/v1/endpoints`) to find the associated endpoint.

    4. If an endpoint is found, makes an additional GET request (`/endpoint/v1/endpoints/{endpoint_id}/isolation`)
    to check its isolation status.

    5. For File Hash entities, makes a GET request (`/endpoint/v1/settings/blocked-items`)
    to retrieve blocked item details.

    6. Updates the entity's additional properties with the retrieved data and marks
    it as enriched (and suspicious for file hashes).

    7. Optionally creates an insight with the retrieved information.

    8. Updates the entities in the SecOps platform and attaches a JSON result and
    entity table.


    ### Additional Notes

    File hashes found in the blocked items list will automatically be marked as suspicious.
  ai_short_description: >-
    Enriches Hostname, IP Address, and File Hash entities by retrieving endpoint details,
    isolation status, and blocked item information from Sophos.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, marks entities as enriched (and suspicious
      for file hashes), and creates insights.
    reasoning: >-
      The action fetches data from Sophos via GET requests. It does not mutate external
      data. It mutates internal data by updating entities with additional properties,
      marking them as enriched/suspicious, and creating insights.
