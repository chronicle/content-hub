Add Entities To Allowlist:
  ai_description: >-
    ### General Description

    Adds specified file hash entities to the allowlist in Sophos.


    ### Flow Description

    1. Extracts the action parameter (Comment).

    2. Filters the target entities to include only FileHash entities.

    3. Validates that the hash is a SHA-256 hash (length of 64 characters).

    4. Iterates over the valid entities and makes a POST request to the Sophos API
    (`/endpoint/v1/settings/allowed-items`) to add each hash to the allowlist.

    5. Collects successful, failed, and already added entities to construct the final
    output message.


    ### Additional Notes

    Only SHA-256 hashes are supported.
  ai_short_description: >-
    Adds specified file hash entities to the allowlist in Sophos.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified file hash entities to the allowlist in Sophos.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by adding a file hash to the allowlist in Sophos
      via a POST request. It does not fetch data, mutate internal data, update entities,
      or create insights.
