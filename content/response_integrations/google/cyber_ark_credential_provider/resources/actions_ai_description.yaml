Run CLI Application Password SDK Command:
  ai_description: >-
    ### General Description

    The **Run CLI Application Password SDK Command** action allows users to execute
    custom commands against the CyberArk CLI Application Password SDK (`clipasswordsdk`)
    on a remote server via SSH. This action is primarily used to retrieve application
    credentials, passwords, or other secrets managed by the CyberArk Credential Provider.
    It does not operate on Google SecOps entities but rather acts as a utility to
    fetch sensitive data for use in other parts of a playbook.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **clipasswordsdk Command** | String | Yes | The specific command string to be
    executed by the `clipasswordsdk` utility. For example: `GetPassword -p AppDescs.AppID=testappid2
    -p Query="Safe=test;Object=testobject" -o Password`. |


    ### Additional Notes

    - This action requires a properly configured SSH connection to the server where
    the CyberArk Credential Provider is installed.

    - The integration configuration must include the path to the `clipasswordsdk`
    executable, the Docker Gateway IP, and valid SSH credentials (either a password
    or a private key).


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    (SSH details, SDK path) and the user-provided SDK command.

    2. **Validation:** It validates the format of the Docker Gateway IP address and
    ensures the SSH private key file exists if provided.

    3. **Connection Establishment:** An SSH connection is established to the target
    server using the `paramiko` library.

    4. **Command Execution:** The action prepends the configured SDK path to the user's
    command and executes it on the remote server.

    5. **Result Processing:** The standard output (`stdout`) of the command is captured.
    If the command returns an error status or output in `stderr`, an exception is
    raised. Otherwise, the output is returned as a JSON result.
