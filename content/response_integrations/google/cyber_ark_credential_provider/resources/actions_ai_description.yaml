Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the network connectivity
    and authentication configuration between Google SecOps and the **CyberArk Credential
    Provider**. It ensures that the SOAR environment can successfully reach the Docker
    Gateway and execute commands using the Credential Provider SDK.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. It relies
    entirely on the integration's shared configuration. |


    ### Additional Notes

    - This action does not operate on any Google SecOps entities.

    - It requires the integration configuration (Docker Gateway IP, Username, RSA
    Public Key, and either a Password or SSH Private Key) to be correctly populated.

    - The connectivity test is performed by executing the SDK binary with a help flag
    (`-?`), which is a non-mutating operation.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the integration-level parameters,
    including the SDK path and SSH credentials.

    2. **Validation**: It verifies that the SSH private key file exists on the system
    if one was specified in the configuration.

    3. **SSH Connection**: The action establishes an SSH tunnel to the remote server
    (Docker Gateway IP) using the `paramiko` library. It validates the host's identity
    using the provided RSA public key.

    4. **Command Execution**: It executes the connectivity test command (e.g., `/path/to/clipasswordsdk
    -?`) on the remote server.

    5. **Status Check**: The action evaluates the command's exit status. A successful
    execution (exit code 0) confirms connectivity, while any other result triggers
    a failure message containing the error details.
