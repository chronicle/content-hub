Get Application Password Value:
  ai_description: >-
    ### General Description

    Retrieves application password values from the CyberArk Credential Provider. This
    action interacts with the `clipasswordsdk` utility via an SSH connection to a
    remote server to fetch specific account details based on the provided Application
    ID, Safe, and Object names. It is designed for credential retrieval within automated
    workflows and does not process or enrich Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Application | String | Yes | The application ID to retrieve the password value
    from. |

    | Safe Name | String | Yes | The name of the Safe to retrieve the password from.
    |

    | Folder Name | String | No | The name of the folder to retrieve the password
    from. |

    | Object Name | String | Yes | The name of the object to retrieve the password
    from. |

    | Output | String | Yes | A comma-separated list of output fields to specify exactly
    which data to retrieve (e.g., Password). |


    ### Additional Notes

    - This action requires a functional SSH connection to the server where the CyberArk
    Credential Provider (clipasswordsdk) is installed.

    - Authentication to the SSH server is handled via the integration configuration
    (Password or SSH Private Key).

    - The action does not run on entities.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Application ID, Safe Name, Folder Name,
    Object Name, and desired Output fields from the action input.

    2. **Validation**: Validates the Docker Gateway IP address and ensures the Output
    parameter is a valid comma-separated string.

    3. **SSH Connection**: Establishes a secure SSH connection to the target server
    using the credentials provided in the integration settings.

    4. **Command Execution**: Executes the `clipasswordsdk GetPassword` command on
    the remote server with the constructed query.

    5. **Result Processing**: Captures the command's standard output, parses the requested
    fields, and returns the data as a JSON result.
