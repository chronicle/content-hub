name: Get Application Password Value
description: 'Use the Get Application Password Value to retrieve the application password
    value from CyberArk Credential Provider. Note: This action doesn''t run on Google
    SecOps entities.'
integration_identifier: CyberArkCredentialProvider
parameters:
-   name: Application
    default_value: ''
    type: string
    description: The application ID to retrieve the password value from.
    is_mandatory: true
-   name: Safe Name
    default_value: ''
    type: string
    description: The name of the Safe to retrieve the password from.
    is_mandatory: true
-   name: Folder Name
    default_value: ''
    type: string
    description: The name of the folder to retrieve the password from.
    is_mandatory: false
-   name: Object Name
    default_value: ''
    type: string
    description: The name of the object to retrieve the password from.
    is_mandatory: true
-   name: Output
    default_value: Password
    type: string
    description: A comma-separated list of output fields to specify exactly which
        data to retrieve.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_application_password_value_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
