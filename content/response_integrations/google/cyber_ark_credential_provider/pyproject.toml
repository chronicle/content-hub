[project]
name = "cyber_ark_credential_provider"
version = "4.0"
description = "CyberArk's Secrets Manager Credential Providers, part of the Privileged Access Security solution, is used to eliminate hard coded application credentials embedded in applications, scripts or configuration files, and allows these highly-sensitive passwords to be centrally stored, logged and managed within the Vault."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "paramiko==3.5.1", "tipcommon",]

[dependency-groups]
dev = [
 "pytest-mock",
 "integration-testing",
 "pytest>=9.1.0",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
 "pyyaml",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.4-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.0-py3-none-any.whl"
