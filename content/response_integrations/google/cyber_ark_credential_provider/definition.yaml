identifier: CyberArkCredentialProvider
name: CyberArk Credential Provider
parameters:
-   name: Path to clipasswordsdk
    default_value: /opt/CARKaim/sdk/clipasswordsdk
    type: string
    description: The full path to the CLI Application Password SDK.
    is_mandatory: true
    integration_identifier: CyberArkCredentialProvider
-   name: Username for Credential Provider for Linux
    default_value: secopsuser
    type: string
    description: The username for the remote agent to authenticate when deployed in
        a Docker container.
    is_mandatory: true
    integration_identifier: CyberArkCredentialProvider
-   name: Docker Gateway IP Address
    default_value: 172.17.0.1
    type: string
    description: The IP address of the Docker gateway.
    is_mandatory: true
    integration_identifier: CyberArkCredentialProvider
-   name: RSA Public Key
    default_value: ''
    type: string
    description: The host machine's public key to ensure a secure connection to the
        correct server and to prevent unauthorized access.
    is_mandatory: true
    integration_identifier: CyberArkCredentialProvider
-   name: SSH Private Key Path
    default_value: ''
    type: password
    description: "The full path to the SSH private key. \n\nThis is the recommended\
        \ method for authentication, and if chosen, this parameter is required."
    is_mandatory: false
    integration_identifier: CyberArkCredentialProvider
-   name: Password for Credential Provider for Linux
    default_value: ''
    type: password
    description: The password for the remote agent to authenticate when deployed in
        a Docker container.
    is_mandatory: false
    integration_identifier: CyberArkCredentialProvider
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cyberark-credential-provider
categories:
- Identity and Access Management
svg_logo_path: resources/logo.svg
image_path: resources/image.png
