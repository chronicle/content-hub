Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps SOAR platform and the ThreatExchange
    service. This action verifies that the integration is correctly configured and
    that the platform can successfully communicate with the external API.


    ### Flow Description

    1. Retrieves the integration configuration settings, including the API Root, App
    ID, App Secret, API Version, and SSL settings.

    2. Initializes the `ThreatExchangeManager` using the retrieved credentials.

    3. Executes the `test_connectivity` method, which performs a GET request to the
    ThreatExchange API using a hardcoded test hash (`d2b4a84e2b69856ba8e234f55b1fbc4b`)
    to validate the connection.

    4. If the API returns a successful response, the action completes and returns
    a success message indicating the connection is established.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any operational tasks or data enrichment.
