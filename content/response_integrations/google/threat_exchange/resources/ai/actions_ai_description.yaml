Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ThreatExchange integration to ensure that the provided
    credentials and network settings are valid.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, App ID, App Secret,
    API Version, Use SSL).

    2. Initializes the ThreatExchangeManager with the retrieved settings.

    3. Executes the `test_connectivity` method, which makes a test GET request to
    the ThreatExchange API to fetch the reputation of a hardcoded test hash.

    4. Returns a success message if the connection is established and the API responds
    without errors.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    integration to verify that Google SecOps can successfully communicate with the
    ThreatExchange service.
  ai_short_description: >-
    Tests connectivity to the ThreatExchange integration by making a test API call.
