Get Reputations:
  ai_description: >-
    ### General Description

    Fetches threat intelligence and reputation data for various entity types (File
    Hash, Hostname, IP Address, and URL) from the ThreatExchange platform. This action
    retrieves historical analysis and reputation scores to help analysts assess the
    risk associated with specific indicators.


    ### Flow Description

    1. Initialize the `ThreatExchangeManager` using the provided configuration parameters
    (API Root, App ID, App Secret, API Version, and SSL settings).

    2. Iterate through the `target_entities` provided in the case.

    3. For each entity, identify its type (File Hash, Hostname, IP Address, or URL)
    and invoke the corresponding API method (`get_file_reputation`, `get_domain_reputation`,
    `get_ip_reputation`, or `get_url_reputation`) to retrieve reputation data.

    4. If reputation data is found, convert the results into a CSV format and attach
    it to the entity as a table using `siemplify.result.add_entity_table`.

    5. Evaluate the retrieved reputation data against predefined suspicious statuses
    and severity levels.

    6. If the entity is identified as suspicious or malicious, set the entity's `is_suspicious`
    flag to `True`.

    7. Update the entities in the SOAR platform with the modified status.


    ### Additional Notes

    This action performs enrichment and does not modify external systems. It relies
    on the ThreatExchange integration configuration for authentication and connectivity.
  ai_short_description: >-
    Fetches reputation and threat intelligence for File Hash, Hostname, IP Address,
    and URL entities from ThreatExchange and updates their suspicious status if necessary.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity status (is_suspicious) and attaches reputation tables to entities
      within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (ThreatExchange) and updates internal
      entities (is_suspicious flag and entity tables). It does not mutate external
      data.
