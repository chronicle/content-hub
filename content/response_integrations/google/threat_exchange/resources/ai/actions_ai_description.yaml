Get Reputations:
  ai_description: >-
    ### General Description

    Enriches File Hash, Hostname, IP Address, and URL entities by retrieving their
    reputation from ThreatExchange. The action evaluates the returned threat intelligence
    and updates the entity's suspicious status if malicious indicators are found.


    ### Flow Description

    1. Initializes the ThreatExchange API client using the integration configuration.

    2. Iterates through the target entities provided in the case.

    3. Checks if the entity type is File Hash, Hostname, IP Address, or URL.

    4. Makes a GET request to the ThreatExchange API to fetch the reputation data
    for the specific entity.

    5. If reputation data is found, it is formatted as a CSV and attached to the entity
    as an entity table.

    6. Evaluates the reputation status and severity; if deemed suspicious or malicious,
    the entity's `is_suspicious` flag is set to True.

    7. Updates the modified entities in the Google SecOps platform.


    ### Additional Notes

    This action relies on the ThreatExchange API and requires valid credentials configured
    at the integration level.
  ai_short_description: >-
    Retrieves reputation data for File Hash, Hostname, IP Address, and URL entities
    from ThreatExchange and updates their suspicious status based on the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the ThreatExchange API via GET requests (fetches_data=true).
      It does not mutate external data. It updates entities internally by setting
      their `is_suspicious` flag and calling `siemplify.update_entities` (can_update_entities=true).
      It attaches an entity table but does not create insights, modify alert data,
      or create case comments.
  entity_usage:
