    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks `entity.entity_type`
      against `EntityTypes.FILEHASH`, `EntityTypes.HOSTNAME`, `EntityTypes.ADDRESS`,
      and `EntityTypes.URL`. Therefore, it targets these specific entity types and
      filters by `entity_type`.
