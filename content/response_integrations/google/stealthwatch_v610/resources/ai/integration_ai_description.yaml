product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The StealthwatchV6-10 integration provides visibility into network activity by
    searching for security events and network flows associated with IP addresses.
    It is categorized as SIEM because it allows analysts to search for historical
    logs and events to identify the source of suspicious activity. It is categorized
    as Network Security because Cisco Stealthwatch (Secure Network Analytics) is a
    network security tool that provides flow and event data, which is essential for
    verifying network communications and identifying malicious traffic patterns. It
    is categorized as Threat Intelligence because the 'Search Events' and 'Search
    Flows' actions serve as enrichment for IP addresses, providing historical context
    and behavioral data that helps confirm if an alert is a True Positive. It does
    not perform EDR (process-level analysis), Email Security, IAM, Cloud Security,
    ITSM, Vulnerability Management, Asset Inventory (it does not return asset owner/department
    details), or Collaboration tasks.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
