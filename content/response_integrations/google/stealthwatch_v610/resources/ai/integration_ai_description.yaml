product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Cisco Stealthwatch integration provides network visibility and security analytics.
    The 'Search Events' and 'Search Flows' actions allow analysts to retrieve historical
    network activity and security events for specific IP addresses. This capability
    directly supports the SIEM category by providing a timeline of activity and identifying
    the source of suspicious activity. It supports the Network Security category as
    it provides visibility into network traffic and flow logs, which are essential
    for verifying communication patterns. Finally, it supports the Threat Intelligence
    category by enriching IP entities with behavioral context and historical 'last
    seen' data, helping analysts confirm if an alert is a True Positive. It does not
    perform EDR, IAM, ITSM, Email Security, or Asset Inventory functions.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
