product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The stealthwatch_v610 integration provides network visibility and security analytics.
    The available actions, 'Search Events' and 'Search Flows', allow security analysts
    to retrieve security events and network flow data for IP address entities. This
    functionality aligns with SIEM capabilities by enabling the investigation of activity
    related to assets and IOCs. It aligns with Network Security as it provides visibility
    into network traffic and communication patterns, which is essential for identifying
    malicious network activity. It also aligns with Threat Intelligence, as the retrieved
    events and flows serve as enrichment data to help determine the reputation of
    IP indicators and confirm if alerts are True Positives. It does not provide EDR,
    Email Security, IAM, ITSM, Vulnerability Management, Asset Inventory, or Collaboration
    capabilities.
  siem: true
  threat_intelligence: true
  vulnerability_management: false
