Search Flows:
  ai_description: >-
    Searches for network flows associated with IP address entities using the Stealthwatch
    integration. This action retrieves historical flow data to provide context for
    network activity involving specific IP addresses.


    ### Flow Description

    1. The action retrieves the Stealthwatch configuration (API Root, Username, Password).

    2. It calculates the start and end times for the search based on the provided
    `Timeframe` parameter.

    3. It iterates through the target entities, filtering for those with the type
    `ADDRESS`.

    4. For each valid IP entity, it retrieves the corresponding domain ID using the
    `get_domain_id_by_ip` method.

    5. It initiates a flow search for the IP as a source using `search_flows` (POST
    request).

    6. It initiates a flow search for the IP as a destination using `search_flows`
    (POST request).

    7. It retrieves the results for both searches using `get_flows_search_results`
    (GET request).

    8. The retrieved flow data is attached to the entity as a JSON object and a CSV
    table using `siemplify.result.add_json` and `siemplify.result.add_entity_table`.


    ### Additional Notes

    This action requires valid Stealthwatch credentials. It performs search operations
    and does not modify any data on the Stealthwatch server.
