Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events associated with specific IP addresses from Cisco Secure
    Network Analytics (Stealthwatch) for a given time frame.


    ### Flow Description

    1. Initializes the Stealthwatch manager using the provided integration configurations.

    2. Calculates the search start and end times based on the `Timeframe` parameter.

    3. Iterates through the target entities, filtering specifically for IP addresses
    (ADDRESS).

    4. For each IP address, queries the Stealthwatch API to determine its associated
    domain ID.

    5. Initiates two event searches via the Stealthwatch API: one where the IP address
    is the source, and another where it is the destination.

    6. Retrieves the search results for both queries and combines them into a single
    list.

    7. Attaches the combined event results as a JSON object and a CSV table to the
    action's output for each processed entity.


    ### Additional Notes

    This action only operates on entities of type ADDRESS. If no events are found
    for an entity, it is skipped in the final output summary.
  ai_short_description: >-
    Retrieves historical security events associated with specific IP addresses from
    Cisco Secure Network Analytics (Stealthwatch) for a given time frame.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
