    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches security events from Stealthwatch using the 'search_events'
      and 'get_events_search_results' methods. It does not mutate external data, as
      the POST request is only used to initiate an asynchronous search query, not
      to alter system state. It does not mutate internal data, update entities, create
      insights, modify alert data, or create case comments; it only attaches JSON
      and data tables to the action results.
  categories:
