Ping:
  ai_description: >-
    General Description: Tests connectivity to the Stealthwatch V6-10 instance to
    ensure the integration is properly configured and the server is reachable.


    Flow Description:

    1. The action retrieves the integration configuration, including the API Root,
    Username, and Password, for the StealthwatchV6-10 integration.

    2. It initializes the StealthwatchManager using these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the `/sw-reporting/v1/tenants` endpoint on the Stealthwatch server.

    4. If the request is successful, the action returns a success message; otherwise,
    it raises an exception.


    Additional Notes: This action is intended for health checks and connectivity verification.
    It does not perform any data enrichment, entity updates, or system mutations.
  ai_short_description: >-
    Tests connectivity to the Stealthwatch V6-10 instance.
