    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches network flow data from Cisco Stealthwatch based on IP address
      entities. It does not modify any external systems or internal SOAR data (entities,
      insights, comments). It simply attaches the retrieved data to the action results
      using standard result methods.
  categories:
    enrichment: true
    reasoning: >-
      The action is classified as an enrichment action because it proactively fetches
      contextual network flow data for an IP address entity without modifying any
      external or internal system state.
