  ai_description: >-
    Retrieves a host's security events from Cisco Secure Network Analytics (Stealthwatch)
    for a specified time frame. The action queries the Stealthwatch API for events
    where the target IP address acts as either the source or destination.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Timeframe | String | Yes | The time frame in hours to search backwards from
    the current time. |


    ### Action Flow

    1. Calculates the start and end times based on the provided `Timeframe` parameter.

    2. Iterates over the target entities and filters for `ADDRESS` entities.

    3. For each valid entity, retrieves its associated domain ID from Stealthwatch.

    4. Initiates a search query for security events where the entity's IP is the source.

    5. Initiates a second search query for security events where the entity's IP is
    the destination.

    6. Polls for completion and aggregates the results from both searches.

    7. Attaches the raw JSON results and a CSV-formatted data table to the action's
    output for each processed entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
