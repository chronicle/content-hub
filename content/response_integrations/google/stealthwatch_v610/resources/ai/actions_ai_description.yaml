Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stealthwatch V6-10 instance to ensure proper configuration
    and communication.


    ### Flow Description

    1. Retrieves integration configurations including the API Root, Username, and
    Password.

    2. Initializes the StealthwatchManager with the provided credentials.

    3. Executes a connectivity test by attempting to fetch domains from the Stealthwatch
    API via an HTTP GET request.

    4. Returns a success message if the connection is successfully established.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Stealthwatch V6-10 integration to verify that the SOAR platform can successfully
    authenticate and communicate with the external service.
