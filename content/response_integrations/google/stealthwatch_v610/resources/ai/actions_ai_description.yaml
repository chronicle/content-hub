Search Flows:
  ai_description: >-
    ### General Description

    Retrieves network flow data associated with specific IP address entities from
    Cisco Secure Network Analytics (Stealthwatch).


    ### Flow Description

    1. Iterates through the target entities and filters for IP Address entities.

    2. For each IP address, queries Stealthwatch via API to determine its associated
    domain ID.

    3. Initiates a flow search in Stealthwatch for flows where the IP address is the
    source.

    4. Retrieves the results of the source flow search.

    5. Initiates a second flow search in Stealthwatch for flows where the IP address
    is the destination.

    6. Retrieves the results of the destination flow search and combines them with
    the source flow results.

    7. Attaches the combined flow results to the entity as a JSON object and a CSV
    table within the SecOps platform.


    ### Additional Notes

    The action requires a timeframe (in hours) and a limit for the number of flows
    to retrieve.
