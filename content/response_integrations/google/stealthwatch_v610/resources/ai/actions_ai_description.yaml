  ai_description: >-
    Tests connectivity to the Stealthwatch instance.


    ### General Description

    This action verifies that the Google SecOps platform can successfully communicate
    with the Stealthwatch API using the provided integration configurations.


    ### Flow Description

    1. Retrieves the integration configurations (API Root, Username, Password).

    2. Initializes the Stealthwatch manager and authenticates.

    3. Tests connectivity by attempting to fetch domains from the Stealthwatch instance.

    4. Returns a success message if the connection is established and the domains
    are retrieved successfully.


    ### Parameters Description

    There are no parameters for this action.
