Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events for IP address entities from Cisco Stealthwatch within
    a specified hourly timeframe. This action is useful for identifying malicious
    or suspicious network activity associated with a host by searching for events
    where the host is either the source or the target.


    ### Parameters Description

    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeframe | String | True | The number of hours back from the current time to
    search for security events. |


    ### Additional Notes

    - The action automatically identifies the correct Stealthwatch Domain ID for each
    IP address before performing the search.

    - Results are attached to the case as both raw JSON and formatted entity-level
    data tables.


    ### Flow Description

    1. **Time Calculation**: Calculates the search start and end times based on the
    provided `Timeframe` parameter and the current UTC time.

    2. **Domain Identification**: For each IP address entity, the action queries Stealthwatch
    to find the associated Domain ID.

    3. **Event Search**: Initiates two asynchronous search queries per entity: one
    for events where the IP is the source and another where it is the destination.

    4. **Result Polling**: Polls the Stealthwatch API until the search jobs are completed.

    5. **Data Retrieval**: Fetches the search results for both queries.

    6. **Data Attachment**: Flattens the event data and attaches it to the case as
    a JSON result and an entity data table titled 'Security Event Details'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
