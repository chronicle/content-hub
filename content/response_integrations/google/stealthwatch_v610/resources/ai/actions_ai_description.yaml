  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Cisco Stealthwatch\
    \ (v6.10) instance. It ensures that the provided integration parameters\u2014\
    such as the API Root, Username, and Password\u2014are correct and that the Stealthwatch\
    \ server is reachable over the network.\n\n### Parameters\nThere are no user-input\
    \ parameters for this action. It relies entirely on the integration's global configuration\
    \ settings.\n\n### Flow Description\n1. **Configuration Retrieval**: The action\
    \ fetches the 'Api Root', 'Username', and 'Password' from the StealthwatchV6-10\
    \ integration settings.\n2. **Authentication**: The action initializes the `StealthwatchManager`,\
    \ which performs a POST request to the `/token/v2/authenticate` endpoint to obtain\
    \ a JWT cookie.\n3. **Connectivity Test**: The manager executes the `test_connectivity`\
    \ method, which performs a GET request to the `/sw-reporting/v1/tenants` endpoint\
    \ to retrieve available domains.\n4. **Result Reporting**: If the authentication\
    \ and domain retrieval are successful, the action returns a 'Connected Successfully'\
    \ message and a boolean `True` result."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to retrieve domains to verify connectivity.
      It does not modify any external or internal data. Authentication is a session
      establishment, not a data mutation.
  categories:
    enrichment: false
    reasoning: >-
      The action is a Ping action, which is explicitly excluded from being an enrichment
      action. It does not perform any enrichment of entities or alerts.
  entity_usage:
