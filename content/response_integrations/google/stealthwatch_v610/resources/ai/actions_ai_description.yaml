      The action does not use any entities, as it is a diagnostic connectivity test.
Search Events:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves security events for an IP address, which provides threat
      intelligence and context, matching 'Enrich IOC'. Additionally, it performs a
      search for historical logs based on parameters, matching 'Search Events'.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: true
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    This action retrieves security events for specific IP address entities from Cisco
    Stealthwatch (v6.10) within a user-defined timeframe. It is designed to provide
    security analysts with visibility into the network behavior of a host by identifying
    events where the host acted as either a source or a destination. The results are
    presented as both raw JSON data and formatted entity tables for easy review within
    the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeframe | Integer | Yes | Specifies the lookback period in hours from the
    current time to search for security events. |


    ### Flow Description

    1. **Time Calculation**: The action calculates the start and end timestamps for
    the search based on the current UTC time and the provided `Timeframe` parameter.

    2. **Entity Filtering**: It iterates through the target entities and processes
    only those of type `ADDRESS` (IP addresses).

    3. **Domain Identification**: For each IP address, the action queries the Stealthwatch
    API to determine the `domain_id` associated with that host.

    4. **Search Initiation**: If a domain is found, the action initiates two separate
    asynchronous search queries: one for events where the IP is the source and another
    where it is the destination.

    5. **Result Retrieval**: The action polls the Stealthwatch API for the completion
    of these search jobs and retrieves the resulting event data.

    6. **Data Attachment**: The retrieved events are attached to the action results
    in the SOAR interface as a JSON object and a formatted CSV table containing security
    event details.

    7. **Final Status**: The action concludes by reporting which entities had security
    events found or if no events were discovered.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches security event data from an external system (Stealthwatch)
      via API calls (GET/POST). It does not mutate external systems, nor does it modify
      internal SOAR data (no entity updates, insights, or case comments are created).
      It simply attaches the retrieved data to the action results.
  categories:
    enrichment: true
    reasoning: >-
      The action is classified as enrichment because it proactively fetches security
      event data for IP entities from an external source (Stealthwatch) to provide
      context to the analyst. It does not mutate external systems, nor does it perform
      any restricted internal mutations (it does not update entities, create insights,
      or add comments).
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly filters for
      `EntityTypes.ADDRESS`. It does not use other entity types or filter by other
      attributes.
