Search Flows:
  ai_description: >-
    ### General Description

    The **Search Flows** action retrieves network flow data from Cisco Stealthwatch
    (v6.10+) for specific IP Address entities. It allows security analysts to investigate
    network traffic patterns by searching for flows where the target entity acts as
    either the source or the destination within a defined historical window. This
    provides critical context for understanding lateral movement, data exfiltration,
    or communication with known malicious infrastructure.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Timeframe** | String | Yes | The number of hours to look back from the current
    time (e.g., '3' for the last 3 hours). |

    | **Limit** | String | Yes | The maximum number of flow records to return for
    each search (source and destination). |


    ### Flow Description

    1. **Initialization**: The action retrieves integration credentials (API Root,
    Username, Password) and input parameters (`Timeframe`, `Limit`).

    2. **Time Calculation**: It calculates the search window's start and end timestamps
    based on the provided `Timeframe` relative to the current UTC time.

    3. **Domain Resolution**: For each IP Address entity in the scope, the action
    queries Stealthwatch to identify the corresponding `domain_id` required for reporting.

    4. **Source Search**: It initiates a flow search query where the entity is the
    source IP.

    5. **Destination Search**: It initiates a flow search query where the entity is
    the destination IP.

    6. **Data Retrieval**: The action polls the Stealthwatch API for the completion
    of both search jobs and fetches the resulting flow records.

    7. **Output Generation**: It aggregates the results, flattens the data for CSV/Table
    display, and attaches the findings to the action results as both raw JSON and
    entity-specific tables for visualization in the Google SecOps UI.


    ### Additional Notes

    - This action performs two separate searches per entity (Source and Destination)
    and combines the results into a single output.

    - If the action cannot resolve a domain ID for a specific IP address, that entity
    will be skipped.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action populates entity tables with network flow data, which modifies the
      internal data associated with the entities in the Google SecOps case.
