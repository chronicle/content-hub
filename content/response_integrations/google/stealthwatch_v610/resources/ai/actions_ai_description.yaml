Search Events:
  ai_description: >-
    General Description: Searches for security events associated with IP address entities
    within a specified timeframe using Stealthwatch. This action provides historical
    context by retrieving event logs where the target IP acted as either a source
    or destination, facilitating incident investigation.


    Flow Description:

    1. Retrieve the Stealthwatch configuration (API Root, Username, Password).

    2. Calculate the search time window based on the provided 'Timeframe' parameter
    (in hours).

    3. Iterate through the target entities, filtering specifically for IP address
    entities.

    4. For each valid IP, query Stealthwatch to identify the corresponding domain
    ID.

    5. Initiate a search for security events in Stealthwatch using the identified
    domain ID, start time, end time, and the IP address (as both source and destination).

    6. Poll the Stealthwatch API until the search job is completed.

    7. Retrieve the search results from Stealthwatch.

    8. Format the retrieved events into a CSV table and JSON, and attach them to the
    action results in the SOAR platform.


    Additional Notes: This action is read-only regarding the external system and does
    not modify any configurations or security policies. It is intended for investigative
    purposes to gather historical telemetry.
  ai_short_description: >-
    Searches for security events associated with IP address entities in Stealthwatch
    over a specified timeframe.
