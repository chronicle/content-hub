  ai_description: >-
    Searches for network flows associated with specific IP address entities within
    Cisco Secure Network Analytics (Stealthwatch).


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Timeframe | String | Yes | Time frame in hours to search back from the current
    time (e.g., 3). |

    | Limit | String | Yes | The maximum number of flow records to retrieve. |


    ### Action Flow

    1. Iterates through the target entities and filters for IP addresses.

    2. For each IP address, retrieves the associated domain ID from Stealthwatch.

    3. Initiates a search for flows where the IP is the source address.

    4. Retrieves the results of the source flow search.

    5. Initiates a search for flows where the IP is the destination address.

    6. Retrieves the results of the destination flow search and combines them with
    the source flows.

    7. Attaches the combined flow results as a JSON object and a data table to the
    entity in the action results.
