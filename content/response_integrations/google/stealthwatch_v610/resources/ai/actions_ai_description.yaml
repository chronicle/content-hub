    reasoning: >-
      The action proactively fetches data (security events) from an external source.
      It preserves external state (read-only operations) and does not modify internal
      Google SecOps data outside of allowed boundaries. Therefore, it qualifies as
      an Enrichment action. It does not perform any containment, blocking, or identity
      disabling, so it is not a Remediation action.
    remediation: false
