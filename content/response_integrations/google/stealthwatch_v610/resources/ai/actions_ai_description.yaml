Ping:
  ai_description: "### General Description\nThe **Ping** action is a utility designed\
    \ to verify the connectivity between the Google SecOps platform and the Cisco\
    \ Stealthwatch (v6.10) instance. Its primary purpose is to ensure that the integration's\
    \ configuration parameters\u2014specifically the API Root, Username, and Password\u2014\
    are correct and that the Stealthwatch server is reachable and responding to requests.\n\
    \n### Parameters Description\nThis action does not require any input parameters.\
    \ It relies entirely on the integration's global configuration settings.\n\n###\
    \ Additional Notes\n*   The action performs a live authentication check by requesting\
    \ a JWT token from the Stealthwatch server.\n*   It further validates the connection\
    \ by attempting to retrieve a list of available domains (tenants) from the system.\n\
    *   If any step in the authentication or domain retrieval fails, the action will\
    \ report a failure, indicating a configuration or network issue.\n\n### Flow Description\n\
    1.  **Configuration Retrieval:** The action fetches the 'Api Root', 'Username',\
    \ and 'Password' from the StealthwatchV6-10 integration settings.\n2.  **Manager\
    \ Initialization:** It initializes the `StealthwatchManager`, which triggers an\
    \ authentication request (`POST /token/v2/authenticate`) to obtain a session cookie/JWT.\n\
    3.  **Connectivity Test:** The action calls the `test_connectivity` method, which\
    \ executes a `GET` request to the `/sw-reporting/v1/tenants` endpoint to verify\
    \ that the authenticated session can successfully read data.\n4.  **Result Reporting:**\
    \ If the requests are successful, the action concludes with a 'Connected Successfully'\
    \ message and returns a boolean `True` status."
  capabilities:
