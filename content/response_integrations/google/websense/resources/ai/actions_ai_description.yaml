Block Url API:
  ai_description: >-
    ### General Description

    This action blocks specified URLs by adding them to a designated API-managed category
    within Websense.


    ### Flow Description

    1. Initializes the connection to the Websense API.

    2. Retrieves the target category name and an optional list of URLs from the action
    parameters.

    3. If the 'Urls' parameter is empty, the action falls back to extracting identifiers
    from the case's target entities that are of type URL.

    4. Iterates through the collected URLs and executes a POST request to the Websense
    API (`categories/urls` endpoint) to add each URL to the specified category.

    5. Commits the transaction in Websense.

    6. Outputs a summary message detailing which URLs were successfully blocked.


    ### Additional Notes

    Only API-created categories can be manipulated using this action.
  ai_short_description: >-
    Blocks specified URLs by adding them to an API-managed category in Websense.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds URLs to a specified API-managed category in Websense.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Websense API to add URLs to a category,
      which mutates external data. It does not fetch data for enrichment, nor does
      it update internal entities, create insights, or modify alert data.
