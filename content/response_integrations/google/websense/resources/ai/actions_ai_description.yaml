Block Url API:
  ai_description: >-
    ### General Description

    Blocks a URL in a specified WebSense API category. This action interacts with
    the WebSense API to add one or more URLs to a designated category, effectively
    blocking them within the organization's web filtering policy.


    ### Flow Description

    1. Initialize the `WebsenseAPIManager` using the provided API root, gateway user,
    and password.

    2. Retrieve the `CategoryName` and optional `Urls` parameter from the action configuration.

    3. If `Urls` are not provided via parameters, extract them from the `target_entities`
    list, filtering specifically for `URL` entity types.

    4. For each URL, call the `add_url_to_category` method, which performs a POST
    request to the WebSense API to add the URL to the specified category.

    5. Commit the changes via the API to finalize the block operation.

    6. Return the result of the operation, indicating which URLs were successfully
    added to the category.


    ### Additional Notes

    This action requires a valid WebSense API configuration. Only API-managed categories
    can be manipulated using this action. Ensure the `CategoryName` provided exists
    and is configured for API management in the WebSense console.
  ai_short_description: >-
    Blocks a URL in a specified WebSense API category by adding it to the category
    list via the WebSense API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified URL(s) to a WebSense category, effectively blocking them.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the WebSense API to add a URL to a category,
      which is an external mutation. It does not fetch data, update internal entities,
      or modify alert data.
