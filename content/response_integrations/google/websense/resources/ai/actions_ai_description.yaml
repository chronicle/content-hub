Get Category Urls API:
  ai_description: >-
    ### General Description

    Retrieves a list of all URLs associated with a specific API-managed category in
    Websense. It connects to the Websense API, fetches the URLs for the provided category
    name, and outputs the results as a data table within the SecOps platform.


    ### Flow Description

    1. Initializes the Websense API client using the provided integration configuration.

    2. Retrieves the target category name from the action parameters.

    3. Makes an HTTP GET request to the Websense API to fetch the list of URLs for
    the specified category.

    4. Formats the retrieved URLs and attaches them to the action's results as a data
    table.


    ### Additional Notes

    This action does not operate on specific entities but rather queries the Websense
    system for configuration or policy data.
