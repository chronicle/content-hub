Unblock Url API:
  ai_description: >-
    ### General Description

    This action removes a specified URL from a designated category within the Websense
    Content Gateway. By interacting with the Websense API, it allows security analysts
    to programmatically unblock URLs that may have been previously restricted, facilitating
    the restoration of access to legitimate resources.


    ### Flow Description

    1. The action retrieves the Websense integration configuration, including API
    credentials and SSL verification settings.

    2. It identifies the target URL(s) to be unblocked. If the `URL` parameter is
    provided, it uses that value. Otherwise, it iterates through the `target_entities`
    in the current case, filtering for entities of type `URL`.

    3. For each identified URL, the action calls the `remove_url_form_category` method
    from the `WebsenseAPIManager`.

    4. The manager obtains a transaction ID from the Websense API, sends a POST request
    to remove the URL from the specified category, and commits the changes.

    5. The action concludes by returning a success message indicating which URLs were
    successfully removed from the category or an error message if the operation failed.


    ### Additional Notes

    This action requires that the category being modified is an API-managed category
    within Websense. It performs a state-changing operation on the external Websense
    gateway.
