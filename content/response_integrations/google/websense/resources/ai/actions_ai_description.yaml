Ping:
  ai_description: >-
    Tests connectivity to the Websense API to ensure the integration is configured
    correctly and the service is reachable. This action verifies that the SOAR platform
    can successfully authenticate and communicate with the Websense gateway.


    ### Flow Description

    1. The action initializes the `WebsenseAPIManager` using the integration configuration,
    including the API Root, credentials, and SSL verification settings.

    2. It calls the `test_connectivity` method.

    3. The `test_connectivity` method performs a POST request to the Websense API
    to obtain a transaction ID.

    4. It then performs a POST request to commit the transaction, confirming the API
    is responsive and functional.

    5. The action returns a success or failure message to the SOAR platform based
    on the API response.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the health of the Websense
    integration. It does not perform any security operations or modify any data within
    the Websense system.
