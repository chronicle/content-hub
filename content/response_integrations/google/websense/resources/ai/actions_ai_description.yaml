  ai_description: >-
    ### General Description

    This action unblocks URLs by removing them from a specified Websense API managed
    category. It can operate on a specific URL provided as a parameter or automatically
    process all URL entities associated with the case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | CategoryName | String | Yes | The API manage category name from which the URL
    will be removed. |

    | URL | String | No | The specific URL to unblock. If not provided, the action
    will process all URL entities in the case. |


    ### Flow

    1. Retrieves the integration configuration and action parameters.

    2. Determines the list of URLs to process. If the `URL` parameter is provided,
    it uses that; otherwise, it extracts all URL entities from the case.

    3. Iterates through the list of URLs and sends a request to the Websense API to
    remove each URL from the specified category.

    4. Outputs a success message listing the URLs that were successfully unblocked.
