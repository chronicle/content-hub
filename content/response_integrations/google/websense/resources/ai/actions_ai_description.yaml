  ai_description: >-
    ### General Description

    Blocks specified URLs by adding them to a designated API-managed category in Websense.
    This action is typically used to prevent access to malicious or unwanted URLs
    by updating the web gateway's filtering policies.


    ### Parameters Description

    | Parameter Name | Expected Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | CategoryName | String | Yes | The API manage category name where the URLs will
    be added. |

    | Urls | String | No | A comma-separated list of URLs to block. If not provided,
    the action will automatically use the target entities of type URL from the case.
    |


    ### Additional Notes

    Either the `Urls` parameter must be provided, or the action must be run on URL
    entities within the case for it to have URLs to process.


    ### Flow Description

    1. Retrieves the `CategoryName` and `Urls` from the action parameters.

    2. If no URLs are provided in the parameters, extracts URL entities from the case's
    target entities.

    3. Iterates through the collected URLs and makes an API call to Websense to add
    each URL to the specified category.

    4. Commits the transaction in Websense to apply the changes.

    5. Returns a success message listing the URLs that were successfully blocked.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds URLs to a specific API-managed category in Websense to block them.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action takes URLs (either from parameters or entities) and makes a POST
      request to the Websense API to add them to a specific category, which mutates
      external data. It does not fetch data for enrichment, nor does it mutate internal
      SecOps data like entities, insights, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding URLs to a category in Websense, which
      is a remediation step to block access. It does not fetch data for enrichment.
    remediation: true
