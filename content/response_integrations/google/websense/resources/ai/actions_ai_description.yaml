    reasoning: >-
      The action performs a POST request to add a URL to a blocklist category in Websense
      (can_mutate_external_data=true). It does not fetch context data, update internal
      entities, or modify alert data.
  categories:
    enrichment: false
    reasoning: >-
      The action performs a mutation (blocking a URL) on an external system (Websense)
      and does not retrieve any data for enrichment purposes. Therefore, it is not
      an enrichment action.
  entity_usage:
