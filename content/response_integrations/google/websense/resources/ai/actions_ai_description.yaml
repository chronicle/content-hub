Unblock Url API:
  ai_description: >-
    ### General Description

    Unblocks a URL by removing it from a specified API-managed category in Websense.
    This action restores access to the URL by modifying the external Websense configuration.


    ### Flow Description

    1. Retrieves the `CategoryName` and optional `URL` from the action parameters.

    2. If the `URL` parameter is not provided, the action iterates over the case's
    target entities and filters for those of type `URL`.

    3. For each identified URL, the action makes a POST request to the Websense API
    (`categories/delete/urls`) to remove the URL from the specified category.

    4. Commits the changes to the Websense gateway.

    5. Returns a summary message indicating which URLs were successfully unblocked.


    ### Additional Notes

    Only API-created categories can be manipulated by this action. If the `URL` parameter
    is provided, the action will ignore case entities and only process the provided
    URL.
