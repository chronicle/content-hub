Get Category Urls API:
  ai_description: >-
    Retrieves a list of URLs associated with a specific category from the Websense
    Content Gateway. This action allows analysts to audit the contents of a managed
    category by fetching the full list of URLs currently assigned to it.


    ### Flow Description

    1. The action initializes the `WebsenseAPIManager` using the integration's configuration
    (API root, credentials, and SSL verification settings).

    2. It retrieves the `CategoryName` parameter provided by the user.

    3. The action calls the `get_category_urls_list` method of the `WebsenseAPIManager`,
    which performs an HTTP GET request to the Websense API to fetch the URLs for the
    specified category.

    4. The retrieved list of URLs is formatted into a data table.

    5. The data table is added to the action results using `siemplify.result.add_data_table`.

    6. The action concludes by ending the execution with a success message.


    ### Additional Notes

    This action is a read-only operation. It does not modify any Websense configurations,
    blocklists, or internal SOAR case data. It is intended solely for information
    retrieval and auditing purposes.
