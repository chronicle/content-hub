product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Websense integration provides capabilities to manage URL filtering policies
    by blocking or unblocking URLs via the Websense Content Gateway API. This functionality
    directly aligns with the 'Network Security' category, as it allows security agents
    to control web access and block malicious URLs at the gateway level. The integration
    does not perform threat intelligence enrichment (reputation lookups), nor does
    it interact with endpoints (EDR), cloud resources, identity management, or ITSM
    systems. It is strictly a network security policy management tool.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
