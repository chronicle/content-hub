product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The Websense integration provides actions to manage URL filtering categories on
    a web gateway, specifically allowing users to block and unblock URLs (Block Url
    API, Unblock Url API) and audit category contents (Get Category Urls API). This
    functionality directly aligns with the Network Security category, which involves
    managing traffic and blocking malicious URLs at the gateway. The integration does
    not provide SIEM log analysis, EDR host-level visibility, threat intelligence
    enrichment (reputation scores), or other functions related to the remaining categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
