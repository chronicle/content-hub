Isolate Machine:
  ai_description: >-
    ### General Description

    Isolates a machine on the Cisco AMP platform. This action identifies the target
    computer using either its IP address or hostname, retrieves its unique connector
    GUID from Cisco AMP, and then initiates an isolation command to restrict the machine's
    network connectivity.


    ### Flow Description

    1. The action initializes the `CiscoAMPManager` using the integration configuration
    (API Root, Client ID, API Key, and SSL settings).

    2. It iterates through the provided `target_entities`.

    3. For each entity:
        * If the entity type is `ADDRESS`, it calls `manager.get_computer_info_by_ip`
    to retrieve the computer's details.
        * If the entity type is `HOSTNAME`, it calls `manager.get_computer_info_by_hostname`
    to retrieve the computer's details.
    4. If a computer is found, the action calls `manager.isolate_machine` (a PUT request
    to the Cisco AMP API) using the computer's `connector_guid`.

    5. The action updates the entity in the SOAR platform using `siemplify.update_entities`.

    6. Finally, it adds the isolation result to the action's JSON output and terminates.


    ### Additional Notes

    This action requires valid Cisco AMP credentials configured in the integration
    settings. It performs a state-changing operation on the external Cisco AMP system.
