Add File To File List:
  ai_description: >-
    ### General Description

    Adds a SHA-256 file hash to a specified file list in Cisco AMP. This action is
    typically used to update custom detection or application blocking lists to prevent
    or allow execution of specific files.


    ### Flow Description

    1. Retrieves the specified file list from Cisco AMP by its name.

    2. Iterates through the target entities in the case.

    3. Filters the entities to include only File Hash entities that are exactly 64
    characters long (SHA-256).

    4. Makes an API call to Cisco AMP to add each valid SHA-256 hash to the retrieved
    file list.

    5. Updates the successfully processed entities in the SecOps platform.


    ### Additional Notes

    Only SHA-256 hashes are supported by this action.
  ai_short_description: >-
    Adds a SHA-256 file hash to a specified file list in Cisco AMP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds a SHA-256 file hash to a specific file list in Cisco AMP.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to Cisco AMP to add a file hash to a file list,
      which mutates external data. It does not fetch contextual data for enrichment.
      It updates the internal entities to reflect the successful operation.
