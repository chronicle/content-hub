Add File To File List:
  ai_description: >-
    ### General Description

    Adds a file hash (SHA-256) to a specified file list within Cisco AMP. This action
    helps in managing blocklists or allowlists by programmatically updating the Cisco
    AMP file lists based on identified file hash entities.


    ### Flow Description

    1. Initialize the `CiscoAMPManager` using the provided integration configuration
    (API Root, Client ID, API Key, SSL settings).

    2. Retrieve the file list GUID from Cisco AMP using the provided `File List Name`
    parameter via the `get_file_list_by_name` method.

    3. Iterate through the `target_entities` provided in the case.

    4. Filter entities to identify those of type `FILEHASH` with a length of 64 characters
    (validating SHA-256 format).

    5. For each valid hash, call the `add_file_to_list` method in the `CiscoAMPManager`
    to add the hash to the retrieved file list using the provided `Description`.

    6. Update the processed entities within the SOAR platform using `siemplify.update_entities`.

    7. Terminate the action and return a summary message indicating the success or
    failure of the operation.


    ### Additional Notes

    This action requires the file hash to be a valid SHA-256 (64 characters). It interacts
    with the Cisco AMP API to modify external file list configurations.
  ai_short_description: >-
    Adds a SHA-256 file hash to a specified file list in Cisco AMP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
