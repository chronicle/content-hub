Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco AMP API to ensure the integration is properly
    configured.


    ### Flow Description

    1. Retrieves the integration configuration (API Root, Client ID, API Key, Use
    SSL) from the Cisco AMP integration settings.

    2. Initializes the `CiscoAMPManager` using the retrieved credentials.

    3. Executes the `test_connectivity` method, which performs an HTTP GET request
    to the `/v1/version` endpoint of the Cisco AMP API.

    4. Validates the API response; if the connection is successful, the action completes
    with a success message.


