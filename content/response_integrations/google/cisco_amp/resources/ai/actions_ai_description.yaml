Isolate Machine:
  ai_description: >-
    ### General Description

    Isolates a machine using Cisco AMP based on IP address or hostname entities. This
    action initiates a state change on the external device to prevent network traffic
    to or from the specified entity.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters entities to process only those of type Address or Hostname.

    3. Makes a GET request to the Cisco AMP API to fetch the computer information
    and retrieve the connector GUID using the entity's identifier.

    4. Makes a PUT request to the Cisco AMP API to isolate the machine associated
    with the retrieved connector GUID.

    5. Updates the successfully processed entities in Google SecOps and attaches the
    isolation details as a JSON result.


