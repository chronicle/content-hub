Unisolate Machine:
  ai_description: >-
    ### General Description

    Unisolates a machine in Cisco AMP based on IP address or hostname entities. This
    action restores network communication capabilities to an endpoint that was previously
    isolated.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `ADDRESS` (IP) or `HOSTNAME`.

    3. For each valid entity, makes a GET request to the Cisco AMP API to fetch the
    corresponding computer information using the entity's identifier.

    4. If a matching computer is found, extracts its connector GUID and makes a DELETE
    request to the Cisco AMP API to remove the isolation status of the machine.

    5. Updates the successfully processed entities in Google SecOps and attaches the
    unisolation results as JSON data.


    ### Additional Notes

    When processing IP address entities, the action uses the entity's `is_internal`
    property to determine whether to search for an internal or external IP in Cisco
    AMP.
  ai_short_description: >-
    Unisolates a machine in Cisco AMP based on IP address or hostname entities, restoring
    its network communication capabilities.
