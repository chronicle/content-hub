Unisolate Machine:
  ai_description: >-
    ### General Description

    Unisolates a machine in Cisco AMP. This action removes the network isolation status
    from a specified endpoint, restoring its full communication capabilities. It identifies
    the machine using either its IP address or hostname, retrieves its unique connector
    GUID from Cisco AMP, and then executes the unisolation command.


    ### Flow Description

    1. Retrieve the Cisco AMP integration configuration (API Root, Client ID, API
    Key, SSL settings).

    2. Iterate through the provided target entities (HOSTNAME and ADDRESS).

    3. For each entity:
        - If the entity is an ADDRESS, call the Cisco AMP API to retrieve computer
    information, passing the internal/external status.
        - If the entity is a HOSTNAME, call the Cisco AMP API to retrieve computer
    information.
        - If a matching computer is found, call the Cisco AMP API (DELETE request
    to `/v1/computers/{connector_guid}/isolation`) to unisolate the machine.
        - Update the entity in the SOAR platform with the results.
    4. Return the final status and any errors encountered during the process.


    ### Additional Notes

    This action requires valid Cisco AMP credentials configured in the integration
    settings. It performs a state-changing operation on the external Cisco AMP system.
