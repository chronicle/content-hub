Get Computer Info:
  ai_description: >-
    ### General Description

    Retrieves detailed computer information from Cisco AMP for Hostname and IP Address
    entities. This action fetches contextual metadata about the endpoint, such as
    the operating system, install date, and connector version, and enriches the entities
    within the platform.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Checks if the entity type is an IP Address or a Hostname.

    3. Makes a GET request to the Cisco AMP API (`/v1/computers`) to fetch computer
    details based on the entity's identifier. For IP addresses, it uses the entity's
    `is_internal` flag to determine whether to search by internal or external IP.

    4. Flattens the retrieved JSON data and prefixes the keys with "CiscoAMP".

    5. Updates the entity's `additional_properties` with the flattened data.

    6. Attaches a CSV table containing the human-readable computer information to
    the entity.

    7. Saves the updated entities back to the platform.


    ### Additional Notes

    The action relies on the `is_internal` property of IP Address entities to accurately
    query Cisco AMP for internal versus external IP addresses.
  ai_short_description: >-
    Retrieves detailed computer information from Cisco AMP for Hostname and IP Address
    entities, enriching them with contextual metadata such as OS version and install
    date.
