Get Computer Info:
  ai_description: >-
    ### General Description

    Retrieves detailed computer information from Cisco AMP for specified Hostname
    or IP Address entities. This action queries the Cisco AMP API to fetch asset metadata,
    including operating system, policy, and connectivity status, and enriches the
    corresponding entities within the SOAR platform.


    ### Flow Description

    1. Retrieves the Cisco AMP integration configuration (API Root, Client ID, API
    Key, and SSL settings).

    2. Iterates through the provided target entities.

    3. For each entity, checks if the type is `ADDRESS` or `HOSTNAME`.

    4. If the entity is an IP Address, calls the `get_computer_info_by_ip` method
    of the Cisco AMP manager.

    5. If the entity is a Hostname, calls the `get_computer_info_by_hostname` method
    of the Cisco AMP manager.

    6. If computer data is retrieved, removes the 'links' field, flattens the data,
    and adds a 'CiscoAMP' prefix to the keys.

    7. Updates the entity's `additional_properties` with the enriched data.

    8. Adds a table containing the computer information to the entity's result using
    `siemplify.result.add_entity_table`.

    9. Updates the entities in the SOAR platform using `siemplify.update_entities`.

    10. Adds the full JSON result to the action output.


    ### Additional Notes

    This action requires a valid Cisco AMP integration configuration. It does not
    perform any state-changing operations on the external Cisco AMP system.
