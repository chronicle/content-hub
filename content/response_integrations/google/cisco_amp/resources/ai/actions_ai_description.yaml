Get Computers By File Hash:
  ai_description: >-
    ### General Description

    Fetches a list of computers that have observed files matching a given SHA-256
    file hash using Cisco AMP. This action helps determine the prevalence and impact
    of a specific file hash across the environment.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to include only File Hash entities where the identifier
    length is exactly 64 characters (indicating a SHA-256 hash).

    3. For each valid file hash, makes a GET request to the Cisco AMP API (`/v1/computers/activity`)
    to retrieve computer activity associated with the hash.

    4. Parses the returned computer information (e.g., Hostname, IP addresses, Operating
    System) and constructs a CSV data table.

    5. Attaches the CSV table and raw JSON results to the action output.

    6. Updates the successfully processed entities in the platform.


    ### Additional Notes

    - The action strictly requires SHA-256 file hashes; MD5 or SHA-1 hashes will be
    ignored due to the 64-character length filter.
