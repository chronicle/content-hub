Close Alert:
  ai_description: >-
    Closes a specific alert in Zerofox using its unique identifier. This action is
    used to programmatically resolve or dismiss alerts within the Zerofox platform
    by updating their status to closed.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory 'Alert ID' from
    the input parameters.

    2. **API Initialization**: It initializes the Zerofox API client using the integration's
    configuration (API Root and Token).

    3. **Alert Closure**: It sends a POST request to the Zerofox endpoint `/1.0/alerts/{alert_id}/close/`
    to perform the closure operation.

    4. **Error Handling**: The action validates the API response. If the alert is
    not found, it raises a specific 'AlertNotFoundError'; otherwise, it handles general
    API errors through the manager.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the Zerofox alert that needs
    to be closed. |


    ### Additional Notes

    This action does not process or iterate over Google SecOps entities. It operates
    exclusively on the specific Alert ID provided as a parameter.
