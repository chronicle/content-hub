Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Zerofox platform. It serves as a health check to ensure that the integration's
    configuration parameters, such as the API Root and API Token, are correct and
    that the service is reachable.


    ### Parameters Description

    There are no input parameters for this action. It utilizes the global integration
    settings (API Root, API Token, and Verify SSL) to establish a connection.


    ### Flow Description

    1. **Client Initialization**: The action initializes the Zerofox API manager using
    the provided integration credentials.

    2. **Connectivity Test**: It executes a `GET` request to the Zerofox alerts endpoint
    (`/1.0/alerts/`) with a result limit of 1 to verify the API's responsiveness.

    3. **Response Validation**: The action validates the HTTP response. A successful
    response confirms connectivity, while an error (such as an invalid token or network
    timeout) results in a failure message with specific error details.


    ### Additional Notes

    This action does not interact with or process any entities within the SOAR environment.
    It is strictly a diagnostic tool.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
