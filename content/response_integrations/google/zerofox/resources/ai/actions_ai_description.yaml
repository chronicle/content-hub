Add Evidence To Alert:
  ai_description: >-
    The 'Add Evidence To Alert' action allows users to upload a local file as evidence
    to a specific alert within the Zerofox platform. This is typically used to attach
    supporting documentation, logs, or screenshots to an existing security alert for
    better context and record-keeping.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the 'Alert ID' and the 'Filepath'
    from the user input.

    2. **API Initialization:** It initializes the Zerofox API client using the provided
    integration configuration (API Root and Token).

    3. **Payload Construction:** The action reads the file from the specified absolute
    path and constructs a multipart/form-data payload, identifying the file's MIME
    type and setting the attachment type to 'evidence'.

    4. **External API Call:** It executes a POST request to the Zerofox attachments
    endpoint associated with the provided Alert ID.

    5. **Result Handling:** If the upload is successful, the action returns a success
    message. If the alert is not found or the file extension is unsupported, it raises
    a specific error.


    ### Additional Notes:

    - The action requires the file to be accessible on the local filesystem where
    the SOAR agent is running.

    - Zerofox may have restrictions on supported file extensions for attachments;
    if an invalid extension is used, the action will fail with an 'UnsupportedAttachmentError'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action uploads a file as an attachment (evidence) to an existing alert
      in the Zerofox platform via a POST request.
    fetches_data: false
    internal_data_mutation_explanation:
