Request Takedown:
  ai_description: >-
    ### General Description

    The **Request Takedown** action allows users to programmatically initiate a takedown
    request for a specific alert within the Zerofox platform. This is typically used
    in response to identified threats like brand impersonation, phishing domains,
    or malicious social media content that requires removal by the service provider.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the mandatory `Alert ID` from
    the user input.

    2. **API Initialization**: It initializes the Zerofox API client using the integration's
    configuration.

    3. **External Request**: The action executes a POST request to the Zerofox endpoint
    `/1.0/alerts/{alert_id}/request_takedown/`.

    4. **Error Handling**: If the alert ID is not found or the Zerofox API returns
    an error (e.g., the alert is not eligible for takedown), the action raises a specific
    exception.

    5. **Completion**: Upon a successful response from Zerofox, the action marks the
    execution as successful and provides a confirmation message.


    ### Additional Notes

    This action does not process entities from the Google SecOps environment; it operates
    strictly based on the provided `Alert ID` parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
