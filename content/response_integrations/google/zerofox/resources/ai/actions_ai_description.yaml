Add Note To Alert:
  ai_description: >-
    ### General Description

    The **Add Note To Alert** action allows users to append a text note to a specific
    alert within the Zerofox platform. This action is primarily used for documentation
    and collaboration, enabling analysts to push context or investigation findings
    from Google SecOps directly into the Zerofox alert record.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Alert ID` and the `Note`
    text from the user input.

    2. **API Client Initialization**: It initializes the Zerofox API manager using
    the integration's configuration (API Root and Token).

    3. **External API Call**: The action performs a POST request to the Zerofox `append_notes`
    endpoint (`/1.0/alerts/{alert_id}/append_notes/`) with the provided note content.

    4. **Error Handling**: If the API returns an error indicating the alert was not
    found, a specific `AlertNotFoundError` is raised. Otherwise, general API errors
    are handled by the manager.

    5. **Completion**: Upon a successful response from Zerofox, the action returns
    a success message and sets the result value to true.


    ### Additional Notes

    This action strictly modifies data within the external Zerofox platform and does
    not alter internal Google SecOps case data or entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action performs a POST request to the Zerofox API to append a note to an
      existing alert, thereby modifying the state of the alert record in the external
      Zerofox system.
    fetches_data: false
    internal_data_mutation_explanation:
