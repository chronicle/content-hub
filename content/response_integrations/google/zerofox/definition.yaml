identifier: Zerofox
name: Zerofox
parameters:
-   name: API Root
    default_value: ''
    type: string
    description: The API root of the Zerofox instance.
    is_mandatory: true
    integration_identifier: Zerofox
-   name: API Token
    default_value: ''
    type: password
    description: The Zerofox API token.
    is_mandatory: true
    integration_identifier: Zerofox
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to Zerofox. Selected by default.
    is_mandatory: true
    integration_identifier: Zerofox
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zerofox
categories:
- Cloud
- Threat Intelligence
svg_logo_path: resources/logo.svg
image_path: resources/image.png
