Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves related associations from Anomali ThreatStream for supported entities
    (FileHash, Address, URL, and User/Email). This action fetches threat intelligence
    context such as related campaigns, actors, vulnerabilities, and malware, and can
    optionally create new entities in the case based on the retrieved associations.


    ### Flow Description

    1. Extracts action parameters to determine which association types to fetch and
    whether to create new entities.

    2. Iterates over target entities and filters them by supported types (FileHash,
    Address, URL, and User/Email).

    3. Queries Anomali ThreatStream to get indicators for the filtered entities.

    4. For each indicator, fetches related associations based on the selected types
    (e.g., Campaigns, Actors, Vulnerabilities).

    5. Asynchronously waits for all association details to be retrieved.

    6. Adds the retrieved association details as JSON results and a data table to
    the case.

    7. Optionally creates new entities in the case for specific association types
    (Campaigns, Actors, Signatures, Vulnerabilities) if configured.


    ### Additional Notes

    This is an asynchronous action. It will periodically check the status of the association
    details retrieval until all data is fetched.
  ai_short_description: >-
    Retrieves related associations from Anomali ThreatStream for supported entities
    and optionally creates new entities based on the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds new entities to the case based on the retrieved associations if configured.
    reasoning: >-
      The action makes GET requests to Anomali ThreatStream to fetch indicators and
      their related associations (fetches_data=true). It does not mutate external
      data. It can mutate internal data by adding new entities to the case (can_mutate_internal_data=true).
      It does not update existing entities, create insights, modify alert data, or
      create case comments.
