Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Anomali ThreatStream platform by validating the provided
    API credentials and endpoint configuration. This action ensures that the integration
    is correctly configured and can communicate with the external service.


    ### Flow Description

    1. The action extracts the `Api Root`, `Username`, and `Api Key` from the integration
    configuration.

    2. It initializes the `AnomaliManager` class with the provided credentials.

    3. The `AnomaliManager` performs a connectivity test by sending a GET request
    to the Anomali API's ping endpoint (`v2/intelligence`).

    4. The action validates the HTTP response. If the connection is successful, it
    returns a success message; otherwise, it catches the exception and reports the
    error.


    ### Additional Notes

    This action is intended for verifying the health and configuration of the Anomali
    integration. It does not perform any data enrichment or state-changing operations.
