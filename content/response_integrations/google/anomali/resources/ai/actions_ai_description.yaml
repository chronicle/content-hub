Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves related associations (such as campaigns, actors, signatures, and vulnerabilities)
    for specific entities (File Hash, IP Address, URL, or Email) from the Anomali
    ThreatStream platform. This action enriches the investigation by identifying connections
    between the provided indicators and broader threat intelligence data.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API credentials)
    and action parameters (requested association types, max associations, and entity
    creation preferences).

    2. **Entity Filtering**: It identifies suitable entities from the case (File Hash,
    Address, URL, Email) based on supported types.

    3. **Indicator Retrieval**: It queries the Anomali ThreatStream API (`get_indicators`)
    to find corresponding indicators for the identified entities.

    4. **Association Fetching**: For each requested association type (e.g., Campaigns,
    Actors), it calls the Anomali API (`get_associations`) to retrieve related association
    IDs.

    5. **Asynchronous Processing**: If associations are found, the action sets its
    state to `INPROGRESS` and stores the IDs in the action's `additional_data` to
    process them in subsequent runs.

    6. **Detail Retrieval**: In subsequent runs, the action iterates through the stored
    IDs and calls `get_association_details` for each to fetch full metadata.

    7. **Result Compilation**: Once all details are retrieved, it compiles the results
    into a JSON object and a CSV table (`Related Associations`) and attaches them
    to the action results.

    8. **Entity Creation**: Optionally, based on configuration, it creates new entities
    (e.g., Threat Campaign, Threat Actor, CVE) in the case for the retrieved associations.


    ### Additional Notes

    This action is asynchronous. It may require multiple runs to complete the retrieval
    of all association details. It supports creating new entities in the case if the
    'Create Entity' parameters are enabled for specific association types.
  ai_short_description: >-
    Retrieves related threat intelligence associations (campaigns, actors, vulnerabilities,
    etc.) for entities from Anomali ThreatStream and optionally creates new entities
    in the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates new entities in the case based on retrieved association data.
    reasoning: >-
      The action fetches threat intelligence data from Anomali (fetches_data=true).
      It creates new entities in the case using `siemplify.add_entity_to_case`, which
      constitutes an internal data mutation (can_mutate_internal_data=true). It does
      not mutate external data, update existing entities, create insights, or modify
      alert data.
