    | Limit | String | Yes | Specify how many records to return per entity. |

    | Severity Threshold | DDL | No | Specify what should be the severity threshold
    for the entity, in order to mark it as suspicious. If multiple records are found
    for the same entity, action will take the highest severity out of all available
    records. |

    | Confidence Threshold | String | No | Specify what should be the confidence threshold
    for the entity, in order to mark it as suspicious. Note: Maximum is 100. If multiple
    records are found for the entity, action will take the average. Active records
    have priority. Default: 50. |

    | Ignore False Positive Status | Boolean | No | If enabled, action will ignore
    the false positive status and mark the entity as suspicious based on the "Severity
    Threshold" and "Confidence Threshold". If disabled, action will never label false
    positive entities as suspicious, regardless, if they pass the "Severity Threshold"
    and "Confidence Threshold" conditions or not. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Anomali ThreatStream platform. This action verifies
    that the provided API credentials and network configurations are correct and that
    the Google SecOps platform can successfully communicate with the Anomali ThreatStream
    API.


    ### Flow Description

    1. Initializes the connection to Anomali ThreatStream using the integration-level
    API credentials.

    2. Makes a GET request to the Anomali ThreatStream API (`v2/intelligence`) to
    verify authentication and network connectivity.

    3. Returns a success message if the connection is established and the API responds
    correctly.

    4. Returns a failure message and logs the error if the connection or authentication
    fails.


    ### Additional Notes

    This action is typically used for diagnostic purposes to ensure the integration
    is configured correctly and does not interact with or modify any case data or
    entities.
