  ai_description: >-
    Enriches entities using information from Anomali ThreatStream. Supported entities
    include IP, URL, Hash, and Email Addresses (User entities that match an email
    regex).


    ### Action Flow

    1. **Initialization**: Connects to the Anomali ThreatStream API using the provided
    credentials.

    2. **Entity Filtering**: Filters the target entities to include only supported
    types (ADDRESS, URL, FILEHASH, and USERUNIQNAME matching an email regex).

    3. **Data Fetching**: Iterates over the filtered entities and fetches threat information
    for each from Anomali ThreatStream.

    4. **Threshold Evaluation**: Evaluates the retrieved threat information against
    the configured severity and confidence thresholds.

    5. **Entity Update**: Marks entities as suspicious if the thresholds are met (and
    considering the "Ignore False Positive Status" parameter). Enriches the entities
    with the threat data and updates them in the platform.

    6. **Result Generation**: Generates a CSV table and JSON result containing the
    threat information for the enriched entities.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Limit | string | Yes | Specify how many records to return per entity. |

    | Severity Threshold | ddl | No | Specify what should be the severity threshold
    for the entity, in order to mark it as suspicious. If multiple records are found
    for the same entity, action will take the highest severity out of all available
    records. |

    | Confidence Threshold | string | No | Specify what should be the confidence threshold
    for the entity, in order to mark it as suspicious. Note: Maximum is 100. If multiple
    records are found for the entity, action will take the average. Active records
    have priority. Default: 50. |

    | Ignore False Positive Status | boolean | No | If enabled, action will ignore
    the false positive status and mark the entity as suspicious based on the "Severity
    Threshold" and "Confidence Threshold". If disabled, action will never label false
    positive entities as suspicious, regardless, if they pass the "Severity Threshold"
    and "Confidence Threshold" conditions or not. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and marks them as suspicious based on
      severity and confidence thresholds.
    reasoning: >-
      The action fetches threat information from Anomali ThreatStream using GET requests.
      It does not mutate any external data. Internally, it updates entities with enrichment
      data and marks them as suspicious if certain thresholds are met.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Anomali ThreatStream) to enrich
      entities. It does not mutate external data and only performs allowed internal
      mutations (updating entities). Therefore, it is classified as an Enrichment
      action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - DestinationURL
    - FILEHASH
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `get_entity_type(entity) in SUPPORTED_ENTITY_TYPES`. The supported types are
      ADDRESS, URL (DestinationURL), FILEHASH, and EMAIL_TYPE (USERUNIQNAME matching
      an email regex).
