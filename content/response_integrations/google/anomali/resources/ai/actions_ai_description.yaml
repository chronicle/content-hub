    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Anomali ThreatStream API to fetch threat
      data (`fetches_data` is true). It does not mutate external data. It updates
      internal entities with enrichment data and suspicious status (`can_update_entities`
      is true). It does not create insights, modify alert data, or create case comments.
