  ai_description: >-
    Tests connectivity to the Anomali ThreatStream platform.


    ### General Description

    This action verifies that the Google SecOps platform can successfully authenticate
    and communicate with the Anomali ThreatStream API using the provided integration
    configuration credentials.


    ### Flow Description

    1. Extracts the integration configuration parameters (Api Root, Username, Api
    Key).

    2. Initializes the `AnomaliManager` with a flag to force a connectivity check.

    3. The manager sends a lightweight GET request to the Anomali ThreatStream API
    (`v2/intelligence`) to verify access.

    4. If the request succeeds, the action completes successfully. If an error occurs
    (e.g., unauthorized, bad request), the action fails and logs the error.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration's configuration parameters.
