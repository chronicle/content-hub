  ai_description: >-
    Retrieves related associations for entities from Anomali ThreatStream. The action
    fetches various types of associations such as campaigns, threat bulletins, actors,
    attack patterns, and more based on the provided parameters. It can also create
    new entities in the case for specific association types like campaigns, actors,
    signatures, and vulnerabilities.


    ### Flow Description

    1. Extracts the target entities and filters them by supported types (FileHash,
    Address, URL, Email).

    2. Queries Anomali ThreatStream to get indicators for the target entities.

    3. For each requested association type, fetches the related associations for the
    retrieved indicators.

    4. Asynchronously waits for all association details to be retrieved.

    5. Adds the retrieved association details as JSON results and a data table to
    the case.

    6. Optionally creates new entities in the case for specific association types
    if configured.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Return Campaigns | Boolean | No | If enabled, fetches related campaigns. Default
    is true. |

    | Return Threat Bulletins | Boolean | No | If enabled, fetches related threat
    bulletins. Default is true. |

    | Return Actors | Boolean | No | If enabled, fetches related actors. Default is
    true. |

    | Return Attack Patterns | Boolean | No | If enabled, fetches related attack patterns.
    Default is true. |

    | Return Courses Of Action | Boolean | No | If enabled, fetches related courses
    of action. Default is true. |

    | Return Identities | Boolean | No | If enabled, fetches related identities. Default
    is true. |

    | Return Incidents | Boolean | No | If enabled, fetches related incidents. Default
    is true. |

    | Return Infrastructure | Boolean | No | If enabled, fetches related infrastructure.
    Default is true. |

    | Return Intrusion Sets | Boolean | No | If enabled, fetches related intrusion
    sets. Default is true. |

    | Return Malware | Boolean | No | If enabled, fetches related malware. Default
    is true. |

    | Return Signatures | Boolean | No | If enabled, fetches related signatures. Default
    is true. |

    | Return Tools | Boolean | No | If enabled, fetches related tools. Default is
    true. |

    | Return TTPs | Boolean | No | If enabled, fetches related TTPs. Default is true.
    |

    | Return Vulnerabilities | Boolean | No | If enabled, fetches related vulnerabilities.
    Default is true. |

    | Create Campaign Entity | Boolean | No | If enabled, creates an entity out of
    available "Campaign" associations. Default is false. |

    | Create Actors Entity | Boolean | No | If enabled, creates an entity out of available
    "Actor" associations. Default is false. |

    | Create Signature Entity | Boolean | No | If enabled, creates an entity out of
    available "Signature" associations. Default is false. |

    | Create Vulnerability Entity | Boolean | No | If enabled, creates an entity out
    of available "Vulnerability" associations. Default is false. |

    | Max Associations To Return | String | No | Specify how many associations to
    return per type. Default is 5. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds new entities to the case based on the retrieved associations (e.g., Campaigns,
      Actors, Signatures, Vulnerabilities).
    reasoning: >-
      The action fetches data from Anomali ThreatStream using GET requests (fetches_data=true).
      It does not mutate any external data (can_mutate_external_data=false). It mutates
      internal data by adding new entities to the case using 'siemplify.add_entity_to_case'
      (can_mutate_internal_data=true). It does not update existing entities, create
      insights, modify alert data, or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action's primary purpose is to fetch supplemental context (related associations)
      about entities from an external source. It does not mutate external state. Although
      it adds new entities to the case (which is a form of internal mutation), this
      is done to enrich the case context, aligning with the Enrichment category. It
      does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    - ADDRESS
    - DestinationURL
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over 'siemplify.target_entities' and filters them using
      'get_entity_type(entity) in SUPPORTED_ENTITY_TYPES'. The supported types are
      FILEHASH, ADDRESS, URL (mapped to DestinationURL), and EMAIL_TYPE (mapped to
      USERUNIQNAME). Therefore, it filters by entity type.
