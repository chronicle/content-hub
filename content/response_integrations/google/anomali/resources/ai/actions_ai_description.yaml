GetThreatInfo:
  ai_description: >-
    ### General Description

    Enriches IP, URL, Hash, and Email entities using threat intelligence from Anomali
    ThreatStream. This action retrieves threat records, evaluates risk based on severity
    and confidence thresholds, updates the entity's suspicious status, and enriches
    the entity's properties with the analysis results.


    ### Flow Description

    1. Extracts configuration and action parameters including Limit, Severity Threshold,
    Confidence Threshold, and Ignore False Positive Status.

    2. Iterates over target entities and filters them by supported types (IP Address,
    URL, File Hash, and User entities matching an email format).

    3. For each suitable entity, queries the Anomali ThreatStream API (`v2/intelligence`)
    to fetch threat information.

    4. Evaluates the returned threats based on the configured severity and confidence
    thresholds.

    5. If the threat meets the criteria (and considering the false positive flag),
    marks the entity as suspicious.

    6. Enriches the entity's additional properties with the threat data and marks
    it as enriched.

    7. Updates the entities in the platform.

    8. Adds a CSV table and JSON result containing the threat details for the enriched
    entities.


    ### Additional Notes

    - The action handles multiple threats per entity by prioritizing active threats,
    taking the highest severity and average confidence.

    - If no active threats are found, it uses the newest threat for evaluation.
  ai_short_description: >-
    Enriches IP, URL, Hash, and Email entities with threat intelligence from Anomali
    ThreatStream, updating their suspicious status and adding contextual data based
    on severity and confidence thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
