    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `get_entity_type(entity)
      in SUPPORTED_ENTITY_TYPES`. The supported types are `EntityTypes.ADDRESS`, `EntityTypes.URL`,
      `EntityTypes.FILEHASH`, and `EMAIL_TYPE` (which is a `USER` entity whose identifier
      matches an email regex). Therefore, it targets Address, URL, File Hash, and
      User entities, filtering by entity type and identifier.
