GetThreatInfo:
  ai_description: >-
    ### General Description

    Enriches IP, URL, File Hash, and Email entities using threat intelligence from
    Anomali ThreatStream. This action queries the Anomali API to retrieve threat information,
    evaluates the threat based on configurable severity and confidence thresholds,
    and updates the entities within the SOAR platform with enrichment data and suspicious
    status.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, API Key) and action
    parameters (Limit, Severity Threshold, Confidence Threshold, Ignore False Positive
    Status).

    2. Initializes the `AnomaliManager` to interact with the Anomali ThreatStream
    API.

    3. Filters `target_entities` to include only supported types (IP, URL, Hash, Email).

    4. Queries the Anomali API for each entity to retrieve threat information.

    5. Processes the retrieved threat data, calculating severity and confidence scores
    based on active threats.

    6. Updates the entities with enrichment data (additional properties, suspicious
    status) and adds entity tables and JSON results to the action output.


    ### Additional Notes

    The action supports configurable severity and confidence thresholds to determine
    if an entity should be marked as suspicious. If multiple records are found for
    an entity, the action calculates the highest severity and average confidence to
    evaluate the risk.
