Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps (Chronicle) and the integration. It ensures that the provided credentials
    and API root configuration are correct and that the environment can successfully
    communicate with the Google Chronicle API.


    ### Parameters Description

    There are no input parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connection issues. It does not process any entities or modify
    any data.


    ### Flow Description

    1. **Authentication**: The action initializes the API client using the integration's
    authentication parameters.

    2. **Connectivity Test**: It attempts to list investigations from the Chronicle
    API using a dummy alert ID (`siemplify-connectivity-test`) and a page size of
    1 to verify the API key and endpoint.

    3. **Validation**: If the API call returns a successful response, the action confirms
    connectivity.

    4. **Outcome**: A success message is returned if the connection is established;
    otherwise, an error message is provided.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
