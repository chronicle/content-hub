    filters_by_modification_time: false
Triage and Investigation Agent:
  ai_description: >-
    ### General Description

    Performs automated triage and investigation of Google SIEM alerts using AI agents.
    This action identifies if an alert originated from the Google SIEM detection engine
    and either retrieves an existing investigation or triggers a new one. It is an
    asynchronous action that polls for the investigation's completion to provide a
    final verdict, confidence score, and detailed summaries.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    * This action is asynchronous and will poll the Google SecOps API until the investigation
    reaches a terminal state.

    * The action requires the alert to have a `SiemAlertId` in its additional properties
    to execute.

    * It updates the alert context with the investigation name to maintain state across
    polling cycles.


    ### Flow Description

    1. **Validation:** Checks if the current alert originated from Google's SIEM detection
    engine by looking for a `SiemAlertId`.

    2. **Investigation Search:** On the first run, it searches for any existing investigations
    associated with the alert ID.

    3. **Trigger Investigation:** If no existing investigation is found, it triggers
    a new investigation in Google SecOps.

    4. **Context Management:** Stores the investigation name in the alert context
    for tracking.

    5. **Polling:** In subsequent runs, it retrieves the investigation name from the
    context and checks its status (e.g., PENDING, IN_PROGRESS, COMPLETED).

    6. **Result Retrieval:** Once the investigation is successfully completed, it
    retrieves the verdict, confidence level, and detailed summaries.

    7. **Reporting:** Formats the findings into Markdown reports (Alert Summary, Investigation
    Summary, Suggested Next Steps) and populates the action's JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new investigation resource in Google SecOps for the specific alert
      if one does not already exist.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates alert context properties with the investigation name to track progress
      across asynchronous polling cycles.
  categories:
    enrichment: false
