[project]
name = "GoogleSecOpsAiAgents"
version = "13.0"
description = "This integration provides first-party AI agents for Google Chronicle. It allows users to leverage Google's advanced AI capabilities for security operations and threat intelligence within the Chronicle platform."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "google-api-core==2.29.0", "google-auth==2.47.0", "googleapis-common-protos==1.72.0", "requests==2.32.5", "tipcommon",]

[dependency-groups]
dev = [ "integration-testing", "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.1-py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.3.1-py3-none-any.whl"
