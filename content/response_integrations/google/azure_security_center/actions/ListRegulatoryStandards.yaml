name: List Regulatory Standards
description: List available regulatory standards in Microsoft Azure Security Center
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/azure-security-center#list_regulatory_standards
integration_identifier: AzureSecurityCenter
parameters:
-   name: Subscription ID
    default_value: ''
    type: string
    description: 'Specify the ID of the subscription for which you want to query information.
        Note: if subscription ID is provided at the integration level and action level,
        priority will be given to action configuration.'
    is_mandatory: false
-   name: State Filter
    default_value: Failed
    type: string
    description: 'Specify the comma-separated list of states. Example: Failed, Skipped.
        Only standards with the matching state will be returned. For example, if you
        specify “Failed”, action will only return failed standards. Possible values:
        Passed, Failed, Unsupported, Skipped'
    is_mandatory: false
-   name: Max Standards To Return
    default_value: '50'
    type: string
    description: Specify how many standards to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_regulatory_standards_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
