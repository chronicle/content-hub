name: Update Alert Status
description: Update status of the alert in Microsoft Azure Security Center.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/azure-security-center#update_alert_status
integration_identifier: AzureSecurityCenter
parameters:
-   name: Subscription ID
    default_value: ''
    type: string
    description: 'Specify the ID of the subscription for which you want to query information.
        Note: if subscription ID is provided at the integration level and action level,
        priority will be given to action configuration.'
    is_mandatory: false
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify an ID of the alert, where you want to update status.
    is_mandatory: true
-   name: Location
    default_value: ''
    type: string
    description: 'Specify the location of the alert. Example: centralus.'
    is_mandatory: true
-   name: Status
    default_value: Resolve
    type: ddl
    optional_values:
    - Dismiss
    - Reactivate
    - Resolve
    description: Specify the status for the alert.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
