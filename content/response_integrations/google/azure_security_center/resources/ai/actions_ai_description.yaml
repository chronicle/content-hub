    ### General Description

    Generates an OAuth refresh token for the Azure Security Center integration configuration.
    This action uses an authorization code to obtain the refresh token required for
    continuous authentication.


    ### Flow Description

    1. Retrieves the authorization code and redirect URL from the action parameters.

    2. Makes a POST request to the Microsoft OAuth token endpoint to exchange the
    authorization code for a refresh token.

    3. Attaches the resulting token data as a JSON object to the action's results.


