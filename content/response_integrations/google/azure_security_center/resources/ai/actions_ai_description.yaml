List Regulatory Standard Controls:
  ai_description: >-
    ### General Description

    Retrieves a list of available regulatory standard controls from Microsoft Azure
    Security Center based on specified standard names and state filters. This action
    allows analysts to query compliance posture and specific control states directly
    from Azure.


    ### Flow Description

    1. Extracts action parameters including Subscription ID, Standard Names, State
    Filter, and Max Standards To Return.

    2. Validates the provided state filters against supported states (Passed, Failed,
    Unsupported, Skipped).

    3. Initializes the Azure Security Center manager and authenticates using the provided
    credentials.

    4. Makes a GET request to the Azure API to fetch regulatory compliance standards
    for the specified subscription.

    5. Iterates through the provided standard names and makes GET requests to retrieve
    the specific regulatory standard controls matching the state filters.

    6. Aggregates the retrieved controls and outputs them as a data table and JSON
    result within the SecOps platform.


    ### Additional Notes

    If a subscription ID is provided at both the integration and action levels, the
    action-level configuration takes precedence.
