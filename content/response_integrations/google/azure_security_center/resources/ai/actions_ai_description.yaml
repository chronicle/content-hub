Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth authorization code URL for Azure Security Center. This action
    constructs the necessary Microsoft login URL required to initiate the OAuth 2.0
    authorization code flow.


    ### Flow Description

    1. Extracts the `Redirect URL` from the action parameters.

    2. Retrieves the `Tenant ID` and `Client ID` from the integration configuration.

    3. Formats the Microsoft OAuth 2.0 authorization URL using the provided parameters.

    4. Attaches the generated URL as a link to the action results, instructing the
    user to manually navigate to the URL in a browser to retrieve the authorization
    code.


    ### Additional Notes

    This action does not make any direct API calls to external services. It solely
    constructs the authorization URL required for the OAuth flow and provides it to
    the user.
  ai_short_description: >-
    Generates an OAuth authorization code URL for Azure Security Center and attaches
    it as a link to the action results for manual user interaction.
