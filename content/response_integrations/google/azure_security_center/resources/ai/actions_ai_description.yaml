List Regulatory Standard Controls:
  ai_description: >-
    ### General Description

    Lists regulatory standard controls from Microsoft Azure Security Center. This
    action retrieves compliance information for specified regulatory standards, allowing
    analysts to view the status (e.g., Passed, Failed, Unsupported, Skipped) of controls
    within their Azure environment.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts integration configuration (Client
    ID, Secret, Tenant ID, etc.) and action-specific parameters (Subscription ID,
    Standard Names, State Filter, Max Standards To Return).

    2. **Initialization**: Initializes the `AzureSecurityCenterManager` using the
    provided credentials to establish a connection to the Azure Security Center API.

    3. **Data Retrieval**: Iterates through the provided list of `Standard Names`.

    4. **API Interaction**: For each standard, the action calls the `manager.get_regulatory_standard_controls`
    method to fetch compliance data, applying the `State Filter` and `Max Standards
    To Return` limit.

    5. **Result Aggregation**: Aggregates the retrieved controls into a structured
    data table and a JSON result object.

    6. **Output**: Adds the data table and JSON results to the action output.


    ### Additional Notes

    - The action requires valid Azure credentials (Client ID, Client Secret, Tenant
    ID) configured in the integration settings.

    - If a Subscription ID is provided in the action configuration, it takes precedence
    over the integration-level configuration.
  ai_short_description: >-
    Lists regulatory standard controls from Microsoft Azure Security Center based
    on specified standards and state filters.
