Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth authorization URL for Azure Security Center. This action facilitates
    the authentication process by providing the necessary URL for users to obtain
    an authorization code, which is required for subsequent authentication steps such
    as retrieving a refresh token.


    ### Flow Description

    1. The action extracts the `Tenant ID` and `Client ID` from the integration configuration.

    2. It extracts the `Redirect URL` from the action parameters.

    3. It constructs the authorization URL using the provided credentials and redirect
    URI.

    4. The action adds the generated URL as a link to the action results, allowing
    the user to copy and visit it in a browser to retrieve the authorization code.


    ### Additional Notes

    This action does not perform any API calls to Azure; it purely generates a URL
    string for the user to manually visit to complete the OAuth authorization flow.
