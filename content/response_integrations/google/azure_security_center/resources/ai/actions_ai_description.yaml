Update Alert Status:
  ai_description: >-
    ### General Description

    Updates the status of an alert within Microsoft Azure Security Center. This action
    allows analysts to change the status of a specific alert (e.g., to Resolve, Dismiss,
    or Reactivate) directly from the security platform.


    ### Flow Description

    1. The action extracts the necessary integration configuration parameters, including
    `Client ID`, `Client Secret`, `Tenant ID`, and `Subscription ID`.

    2. It extracts the action-specific parameters: `Subscription ID` (if provided
    at the action level, it overrides the integration-level setting), `Alert ID`,
    `Location`, and the desired `Status`.

    3. The `AzureSecurityCenterManager` is initialized with the provided credentials
    and configuration.

    4. The requested `Status` is mapped to the corresponding API value using the `get_mapped_value`
    utility.

    5. The action executes a `POST` request to the Azure Security Center API endpoint
    (`/subscriptions/{subscription_id}/providers/Microsoft.Security/locations/{location}/alerts/{alert_id}/{status}`)
    to update the alert status.

    6. Upon success, it returns a confirmation message; otherwise, it logs the error
    and fails the execution.


    ### Additional Notes

    This action requires valid Azure credentials with appropriate permissions to modify
    alerts in the target Azure Security Center subscription. The `Subscription ID`
    must be correctly configured either at the integration level or provided as an
    action parameter.
