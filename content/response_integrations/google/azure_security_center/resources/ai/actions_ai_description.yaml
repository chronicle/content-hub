Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Azure Security Center API using the configuration parameters
    defined in the integration settings. This action verifies that the provided credentials
    and connection settings are valid and that the SOAR platform can successfully
    communicate with the Azure Security Center service.


    ### Flow Description

    1. The action extracts the required integration configuration parameters (Client
    ID, Client Secret, Tenant ID, etc.) from the integration settings.

    2. It initializes the `AzureSecurityCenterManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Azure Security Center operations endpoint (`https://management.azure.com/providers/Microsoft.Security/operations`).

    4. If the request is successful, the action returns a success message and completes.
    If the request fails, it logs the error and returns a failure status.


    ### Additional Notes

    This action is a diagnostic tool used to validate integration connectivity. It
    does not perform any data retrieval, entity enrichment, or system state changes.
