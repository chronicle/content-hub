Get OAuth Refresh Token:
  ai_description: >-
    ### General Description

    Generates an OAuth refresh token for the Azure Security Center integration. This
    action is used during the initial configuration phase to authenticate the integration
    with Microsoft Azure.


    ### Flow Description

    1. Extracts integration configuration parameters: `Tenant ID`, `Client ID`, `Client
    Secret`, and `Verify SSL`.

    2. Extracts action parameters: `Redirect URL` and `Authorization Code`.

    3. Calls the `AzureSecurityCenterManager.obtain_refresh_token` method.

    4. This method performs an HTTP POST request to the Microsoft OAuth token endpoint
    (`https://login.microsoftonline.com/{tenant_id}/oauth2/token`) using the provided
    credentials and authorization code.

    5. The resulting token data is returned to the SOAR platform using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to obtain
    the necessary credentials for subsequent API calls.
