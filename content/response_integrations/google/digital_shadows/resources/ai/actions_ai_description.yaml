Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Digital Shadows service by validating the provided API
    credentials. This action ensures that the integration is correctly configured
    and can successfully communicate with the Digital Shadows platform.


    ### Flow Description

    1. Extracts the `Api Key` and `Api Secret` from the integration configuration.

    2. Initializes the `DigitalShadowsManager` using the provided credentials.

    3. Executes the `test_connectivity` method, which performs a sample search request
    (`www.google.com`) to the Digital Shadows API.

    4. If the request is successful, the action completes with a "Connection Established"
    message.

    5. If an error occurs (e.g., invalid credentials), the action fails and reports
    the error.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Digital Shadows platform.
