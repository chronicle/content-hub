    4. If data is found, it updates the entity's additional properties, adds a data
    table with the results, and provides a link to the Digital Shadows portal.

    5. The entity is marked as enriched and updated in the Google SecOps platform.

    6. The action returns a JSON result containing the raw data for all successfully
    enriched IPs.
