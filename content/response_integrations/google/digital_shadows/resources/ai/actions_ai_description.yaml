EnrichURL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Digital Shadows. This action retrieves threat intelligence,
    domain WHOIS data, and reputation scores from Digital Shadows to provide additional
    context for URL indicators.


    ### Flow Description

    1. Iterates over the provided target entities and filters for those of type `URL`.

    2. For each suitable entity, makes an API call to the Digital Shadows search endpoint
    (`/api/search/find`) to fetch domain information.

    3. If data is found, enriches the entity by adding an entity table, attaching
    a link to the Digital Shadows portal, and updating the entity's `additional_properties`
    with the retrieved threat data.

    4. Marks the entity as enriched (`is_enriched = True`) and updates the entity
    within the Google SecOps platform.

    5. Aggregates the raw JSON results and returns them as part of the action's output.


