EnrichHash:
  ai_description: "### General Description\nEnriches File Hash entities using Digital\
    \ Shadows threat intelligence. This action queries the Digital Shadows platform\
    \ to retrieve contextual information, such as Cylance and Webroot reputation scores,\
    \ malware categories, and file metadata. The retrieved data is used to enrich\
    \ the entity within the SOAR platform, providing analysts with actionable threat\
    \ intelligence to support investigation and decision-making.\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the `DigitalShadowsManager` using\
    \ the provided `Api Key` and `Api Secret` from the integration configuration.\n\
    2. **Entity Filtering**: The action iterates through the `target_entities` provided\
    \ by the SOAR platform, filtering specifically for entities of type `FILEHASH`.\n\
    3. **Data Retrieval**: For each valid file hash, the action calls the `manager.enrich_hash`\
    \ method, which performs a search against the Digital Shadows API to fetch associated\
    \ threat intelligence.\n4. **Enrichment**: \n    * The retrieved data is formatted\
    \ and added to the entity's `additional_properties`.\n    * The entity's `is_enriched`\
    \ status is set to `True`.\n    * An entity table and a direct link to the Digital\
    \ Shadows portal are added to the action results.\n5. **Update**: The action calls\
    \ `siemplify.update_entities` to save the enriched data back to the SOAR platform.\n\
    6. **Result Reporting**: A JSON summary of the enrichment results is added to\
    \ the action output, and the execution status is finalized.\n\n### Additional\
    \ Notes\nThis action is marked as deprecated in the configuration. It requires\
    \ valid Digital Shadows API credentials to function. If no suitable file hash\
    \ entities are found, the action terminates gracefully with a message indicating\
