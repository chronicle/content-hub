  ai_description: >-
    Enriches CVE entities using Digital Shadows. This action retrieves threat intelligence
    regarding vulnerabilities and exploits associated with the CVE.


    ### Flow

    1. Filters the target entities to process only those of type CVE.

    2. Queries the Digital Shadows API to fetch exploit and vulnerability details
    for each CVE identifier.

    3. Enriches the entity by updating its additional properties, adding an entity
    table with the retrieved data, and attaching relevant source links.

    4. Marks the entity as enriched and returns the results in JSON format.


