EnrichCVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Digital Shadows. It retrieves exploit and vulnerability
    information from Digital Shadows and updates the entities with the gathered intelligence.


    ### Flow Description

    1. Iterates over target entities, filtering for CVE entity types.

    2. For each CVE, makes a POST request to the Digital Shadows API (`/api/search/find`)
    to fetch exploit and vulnerability data.

    3. Updates the entity's additional properties with the enrichment data, sets `is_enriched`
    to True, and adds entity tables and links.

    4. Updates the entities in the platform and returns the JSON results.


    ### Additional Notes

    None.
