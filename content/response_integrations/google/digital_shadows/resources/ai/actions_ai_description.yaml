EnrichCVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Digital Shadows threat intelligence. This action retrieves
    vulnerability and exploit data associated with a specific CVE identifier, providing
    context such as exploit titles, types, platforms, and CVSS scores. The retrieved
    information is added to the entity's additional properties and attached to the
    entity as a result table and links.


    ### Flow Description

    1. **Initialization**: The action initializes the Digital Shadows manager using
    the provided API Key and API Secret.

    2. **Filtering**: It filters the target entities to process only those of type
    `CVE`.

    3. **Enrichment**: For each valid CVE entity:
        - The action calls the Digital Shadows API (`/api/search/find`) to retrieve
    vulnerability and exploit data.
        - If data is found, it parses the response into a CVE object.
        - The entity's `additional_properties` are updated with the enrichment data.
        - The entity is marked as enriched (`is_enriched = True`).
        - A result table containing the CVE details and relevant links is added to
    the entity.
    4. **Update**: Finally, the action updates the enriched entities within the SOAR
    platform and returns a JSON result containing the enrichment data.


    ### Additional Notes

    - This action requires valid Digital Shadows API credentials (Api Key and Api
    Secret).

    - If no suitable CVE entities are found, the action terminates without performing
    any enrichment.
  ai_short_description: >-
    Enriches CVE entities with vulnerability and exploit data from Digital Shadows.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
