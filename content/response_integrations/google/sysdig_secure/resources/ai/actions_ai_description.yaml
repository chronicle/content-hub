Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the **Sysdig Secure** server. It ensures that the integration's
    configuration parameters, such as the API Root and API Token, are correctly configured
    and that the network path to the Sysdig Secure API is functional.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - This action is primarily used during the initial setup of the Sysdig Secure
    integration or for troubleshooting connectivity issues.

    - It performs a read-only GET request to the events endpoint to validate credentials.


    ### Flow Description

    1. **Authentication**: The action retrieves the API Root, API Token, and SSL verification
    settings from the integration's configuration.

    2. **Request Preparation**: It calculates a time window (the last hour) in nanoseconds
    to use as a filter for a lightweight data request.

    3. **Connectivity Test**: It executes a GET request to the Sysdig Secure events
    endpoint (`secure/events/v1/events`) with a result limit of 1.

    4. **Validation**: The action validates the HTTP response. If the request is successful
    (status code 2xx), it returns a success message confirming connectivity. If the
    request fails, it raises an exception with the relevant error details.
