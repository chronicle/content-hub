[project]
name = "sysdig_secure"
version = "3.0"
description = "Sysdig Secure is a comprehensive security platform that provides continuous security and compliance monitoring for cloud-native environments."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest-mock", "integration-testing", "anyio", "beautifulsoup4", "cachetools", "certifi", "charset-normalizer", "environmentcommon", "google-api-core", "google-api-python-client", "google-auth", "google-auth-httplib2", "googleapis-common-protos", "h11", "httpcore", "httplib2", "httpx", "idna", "proto-plus", "pyasn1", "pyasn1-modules", "pyparsing", "pytest>=9.1.0", "pytest-json-report>=1.5.0", "requests", "rsa", "sniffio", "soar-sdk", "soupsieve", "uritemplate", "urllib3", "pyyaml",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.0.7-py2.py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.0.6-py3-none-any.whl"
