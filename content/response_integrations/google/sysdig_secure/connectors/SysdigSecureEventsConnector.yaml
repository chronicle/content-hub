name: Sysdig Secure - Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: The name of the field where the product name is stored. The default
        value is "Product Name". The product name primarily impacts mapping. To streamline
        and improve the mapping process for the connector, the default value "Product
        Name" resolves to a fallback value that is referenced from the code. Any invalid
        input for this parameter resolves to a fallback value by default.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: content_ruleName
    type: string
    description: The name of the field to determine the event name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: The timeout limit in seconds for the Python process running the current
        script.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the field where the environment name is stored. If the
        environment field isn't found, the environment is set to the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regular expression pattern to run on the value found in the Environment
        Field Name field. This parameter lets you manipulate the environment field
        using the regular expression logic. Use the default value .* to retrieve the
        required raw Environment Field Name value. If the regular expression pattern
        is null or empty, or the environment value is null, the final environment
        result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: API Root
    default_value: ''
    type: string
    description: The API root of the Sysdig Secure instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: The Sysdig Secure API token.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to Sysdig Secure
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Lowest Severity To Fetch
    default_value: ''
    type: string
    description: 'The lowest severity of the events to fetch. If you don''t set a
        value, the connector ingests events with all severities. The possible values
        are as follows: Informational, Low, Medium, High.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Custom Filter Query
    default_value: ''
    type: string
    description: 'A query to filter, scope, or group events during ingestion. This
        parameter has priority over the "Lowest Severity To Fetch" parameter and values
        that you provide in the dynamic list. For more information about how to filter
        events, see Filter Secure Events (https://docs.sysdig.com/en/docs/sysdig-secure/threats/activity/events-feed/#filter-secure-events).
        Example: host.hostName = "instance-1"'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: A number of hours before the first connector iteration to retrieve
        the events from. This parameter can apply to the initial connector iteration
        after you enable the connector for the first time or the fallback value for
        an expired connector timestamp.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Events To Fetch
    default_value: 100
    type: integer
    description: The maximum number of events to process for every connector iteration.
        The maximum value is 200.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Use dynamic list as a blocklist
    default_value: false
    type: boolean
    description: If enabled, the dynamic list will be used as a blocklist.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If selected, the connector ignores the Google SecOps overflow mechanism
        during alert creation.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Use the Sysdig Secure - Events Connector to pull events from Sysdig Secure.
    The dynamic list works with the "ruleName" parameter.
integration: SysdigSecure
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sysdig-secure#events-connector
rules: []
is_connector_rules_supported: false
creator: admin
