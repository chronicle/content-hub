Delete Record:
  ai_description: >-
    ### General Description

    Deletes a specific record in BMC Helix Remedyforce. This action initiates a state
    change on the external system by removing the specified record based on its type
    and ID.


    ### Flow Description

    1. Extracts the `Record Type` and `Record ID` parameters.

    2. Initializes the BMC Helix Remedyforce API client using the provided integration
    configuration.

    3. Makes an HTTP DELETE request to the BMC Helix Remedyforce API (`/services/data/v51.0/sobjects/{record_type}/{record_id}`)
    to remove the specified record.

    4. Returns a success message if the record is successfully deleted, or an error
    message if the record or record type is not found.


    ### Additional Notes

    Ensure that the provided Record Type exists and the Record ID is valid. You can
    use the "List Record Types" action to find available record types.
