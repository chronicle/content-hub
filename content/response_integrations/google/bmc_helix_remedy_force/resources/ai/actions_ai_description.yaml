Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom SOQL (Salesforce Object Query Language) query in BMC Helix Remedyforce
    to retrieve specific records or data.


    ### Flow Description

    1. Initializes the action and retrieves the provided SOQL query parameter.

    2. Authenticates with the BMC Helix Remedyforce API using the configured credentials.

    3. Executes an HTTP GET request to the `/services/data/v51.0/query/` endpoint
    with the custom query.

    4. Parses the returned records and total size.

    5. Attaches the results as a JSON object and a CSV data table to the action's
    output.


    ### Additional Notes

    Ensure the provided SOQL query is valid and adheres to the BMC Helix Remedyforce
    API limitations.
