Wait For Fields Update:
  ai_description: >-
    ### General Description

    Monitors a specific record in BMC Helix Remedyforce for updates to defined fields.
    This action polls the record periodically until the specified fields match the
    expected values or a timeout occurs.


    ### Flow Description

    1. The action initializes by validating the provided `Record Type`, `Record ID`,
    and `Fields To Check` (JSON payload).

    2. It performs an initial check to verify the record exists in BMC Helix Remedyforce
    using the `get_record_details` method.

    3. In subsequent runs (asynchronous polling), the action fetches the current state
    of the record from BMC Helix Remedyforce.

    4. It compares the current field values against the expected values provided in
    the `Fields To Check` parameter.

    5. If the fields match the expected values, the action completes successfully
    and returns the record details as a JSON result.

    6. If the fields do not match, the action remains in an in-progress state to continue
    polling until the fields are updated or the timeout is reached.


    ### Additional Notes

    This action is designed to be used in asynchronous workflows. It requires valid
    API credentials for BMC Helix Remedyforce. If `Fail If Timeout` is enabled, the
    action will fail if the fields are not updated within the execution time limit.
