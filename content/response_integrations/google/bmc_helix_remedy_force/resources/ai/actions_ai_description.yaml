    Generates an OAuth refresh token required for the BMC Helix Remedyforce integration
    configuration. This action uses an authorization code to request the token from
    the authentication server.


    ### Flow Description

    1. Retrieves the required integration configuration parameters (Client ID, Client
    Secret, Login API Root) and action parameters (Redirect URL, Authorization Code).

    2. Makes a POST request to the BMC Helix Remedyforce OAuth token endpoint (`/services/oauth2/token`)
    using the provided authorization code and credentials.

    3. Retrieves the response containing the refresh token and access token.

    4. Adds the resulting JSON to the action's results for use in subsequent configurations.


    ### Additional Notes

    The authorization code must be generated prior to running this action, typically
    using the "Get OAuth Authorization Code" action or manually via the browser.
