Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth authorization code URL for BMC Helix Remedyforce. This action
    constructs a specific authorization link using the provided API Root, Client ID,
    and Redirect URL, which the user can then navigate to in order to obtain an authorization
    code.


    ### Flow Description

    1. Extracts the API Root and Client ID from the integration configuration.

    2. Extracts the Redirect URL from the action parameters.

    3. Constructs the authorization URL locally without making any API calls.

    4. Attaches the generated URL as a link to the action's results.


    ### Additional Notes

    The user must manually navigate to the generated URL in a browser, authenticate,
    and copy the "code" parameter from the resulting URL to use in the "Get OAuth
    Refresh Token" action.
