  ai_description: >-
    ### General Description

    Generates an OAuth refresh token for the BMC Helix Remedyforce integration.


    ### Flow Description

    1. Extracts integration configuration parameters (Client ID, Client Secret, Login
    API Root) and action parameters (Redirect URL, Authorization Code).

    2. Calls the `BMCHelixRemedyForceManager.obtain_refresh_token` method.

    3. Performs an HTTP POST request to the BMC Helix Remedyforce login API endpoint
    using the provided authorization code and credentials.

    4. Returns the generated refresh token in the action result JSON.


    ### Additional Notes

    This action is typically used during the initial setup or re-authentication of
