Delete Record:
  ai_description: >-
    ### General Description

    Deletes a specific record from the BMC Helix Remedyforce platform. This action
    allows users to remove records by specifying the record type and the unique identifier
    of the record to be deleted.


    ### Flow Description

    1. The action initializes the `BMCHelixRemedyForceManager` using the provided
    configuration parameters (API Root, credentials, etc.).

    2. It extracts the `Record Type` and `Record ID` from the action parameters.

    3. The action calls the `delete_record` method, which performs a DELETE HTTP request
    to the BMC Helix Remedyforce API endpoint (`/services/data/v51.0/sobjects/{record_type}/{record_id}`).

    4. The action handles potential exceptions, such as `RecordIDNotFound` or `RecordTypeNotFound`,
    and logs the outcome.

    5. The execution status and a summary message are returned to the SecOps platform.


    ### Additional Notes

    This action performs a destructive operation on the external BMC Helix Remedyforce
    system. Ensure that the `Record ID` and `Record Type` are correct before execution,
    as this action cannot be undone.
  ai_short_description: >-
    Deletes a specific record from the BMC Helix Remedyforce platform.
