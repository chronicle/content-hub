Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth authorization URL for BMC Helix Remedyforce. This action constructs
    the necessary authorization link using the provided API root, Client ID, and Redirect
    URL, allowing users to manually obtain an authorization code required for subsequent
    OAuth authentication steps.


    ### Flow Description

    1. Retrieve the `API Root` and `Client ID` from the integration configuration.

    2. Retrieve the `Redirect URL` from the action parameters.

    3. Construct the authorization URL using the provided parameters.

    4. Add the generated URL as a link to the action results using `siemplify.result.add_link`.

    5. Return a success message instructing the user on how to use the link to obtain
    the authorization code.


    ### Additional Notes

    This action does not perform any network requests. It is a utility action designed
    to facilitate the OAuth authentication flow for the BMC Helix Remedyforce integration.
