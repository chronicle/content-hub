Create Record:
  ai_description: >-
    ### General Description

    Creates a new record in BMC Helix Remedyforce. This action allows users to programmatically
    generate records (such as incidents or service requests) within the BMC Helix
    Remedyforce platform by providing a specific record type and a corresponding JSON
    payload.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, etc.) to establish a connection
    to the BMC Helix Remedyforce API.

    2. Extracts action parameters: 'Record Type' and 'Record Payload'.

    3. Validates that the provided 'Record Payload' is a valid JSON object.

    4. Initializes the `BMCHelixRemedyForceManager` with the provided credentials.

    5. Executes a POST request to the BMC Helix Remedyforce API endpoint (`/services/data/v51.0/sobjects/{record_type}`)
    to create the record.

    6. Adds the resulting record information to the action result.


    ### Additional Notes

    Requires a valid JSON payload for the 'Record Payload' parameter. If the record
    type is unknown, it is recommended to first execute the 'List Record Types' action.
  ai_short_description: >-
    Creates a new record in BMC Helix Remedyforce using the provided record type and
    JSON payload.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
