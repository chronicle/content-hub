Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes a custom SOQL query in BMC Helix Remedyforce based on provided parameters
    and returns the matching records. This action allows users to retrieve specific
    data from the ITSM platform by defining the record type, filters, time frames,
    and fields to return.


    ### Flow Description

    1. Extracts the integration configuration and action parameters, including the
    target record type, filters, and time frame.

    2. Validates the provided parameters, ensuring limits are within bounds and custom
    time frames have the required start time.

    3. Constructs a SOQL query string using the provided parameters (Record Type,
    Where Filter, Time Frame, Fields To Return, Sort Field, Sort Order, and Limit).

    4. Makes an HTTP GET request to the BMC Helix Remedyforce API (`/services/data/v51.0/query/`)
    to execute the constructed query.

    5. Parses the response and attaches the retrieved records to the action result
    as a JSON object and a formatted data table.


    ### Additional Notes

    The action requires valid authentication credentials (either Basic or OAuth) configured
    in the integration settings. The maximum number of results that can be returned
    is 200.
  ai_short_description: >-
    Executes a custom SOQL query in BMC Helix Remedyforce and returns the matching
    records.
