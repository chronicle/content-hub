Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom SOQL (Salesforce Object Query Language) query against the BMC
    Helix Remedyforce platform to retrieve specific records or data. This action allows
    users to perform flexible data retrieval operations directly from the BMC Helix
    Remedyforce instance.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API credentials,
    API roots, and SSL verification settings) and the `SOQL Query` parameter provided
    by the user.

    2. The `BMCHelixRemedyForceManager` is initialized using the extracted credentials
    to establish a session with the BMC Helix Remedyforce API.

    3. The action calls the `execute_custom_query` method, which sends an HTTP GET
    request to the BMC Helix Remedyforce API endpoint (`/services/data/v51.0/query/`)
    with the provided SOQL query as a parameter.

    4. If the query returns records, the action adds the raw JSON response to the
    action results and constructs a data table for display within the SecOps platform.

    5. If no records are found, the action returns a message indicating that no results
    were found for the specified query.


    ### Additional Notes

    This action is intended for advanced users familiar with SOQL syntax. It is a
    read-only operation and does not modify any data within BMC Helix Remedyforce.
  ai_short_description: >-
    Executes a custom SOQL query in BMC Helix Remedyforce to retrieve data.
