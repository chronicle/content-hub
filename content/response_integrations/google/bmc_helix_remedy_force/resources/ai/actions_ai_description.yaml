Create Record:
  ai_description: >-
    ### General Description

    Creates a new record in BMC Helix Remedyforce. This action allows users to dynamically
    generate records (such as incidents or service requests) by specifying the record
    type and providing a JSON payload with the required fields and values.


    ### Flow Description

    1. Extracts the `Record Type` and `Record Payload` from the action parameters.

    2. Validates that the provided `Record Payload` is a properly formatted JSON object.

    3. Initiates a POST request to the BMC Helix Remedyforce API (`/services/data/v51.0/sobjects/{record_type}`)
    to create the new record.

    4. Retrieves the response from the API and attaches the created record's details
    to the action's JSON result.


    ### Additional Notes

    Ensure that the specified `Record Type` exists in your BMC Helix Remedyforce environment.
    If you are unsure of the available record types, you can use the "List Record
    Types" action to retrieve them. The JSON payload must match the schema expected
    by the specified record type.
  ai_short_description: >-
    Creates a new record of a specified type in BMC Helix Remedyforce using a provided
    JSON payload.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new record of a specified type in the BMC Helix Remedyforce ITSM platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the BMC Helix Remedyforce API to create
      a new record, which mutates external data (can_mutate_external_data=true). It
      does not fetch enrichment data, update internal entities, create insights, modify
      alert data, or create case comments.
