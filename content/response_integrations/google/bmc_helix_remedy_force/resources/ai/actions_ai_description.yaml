Execute Simple Query:
  ai_description: >-
    ### General Description

    Executes a SOQL query against BMC Helix Remedyforce to retrieve records based
    on specified criteria. This action allows users to query various record types
    within the BMC Helix Remedyforce platform, supporting filtering, sorting, and
    time-based constraints.


    ### Flow Description

    1. The action extracts configuration parameters (API credentials) and action parameters
    (Record Type, filters, time frame, etc.).

    2. It validates the provided parameters, ensuring that if a 'Custom' time frame
    is selected, a 'Start Time' is provided, and that the 'Max Results To Return'
    is within the allowed limits.

    3. The action initializes the `BMCHelixRemedyForceManager` to handle authentication
    and API communication.

    4. It constructs the SOQL query string using the provided parameters (Record Type,
    Where Filter, Time Frame, etc.).

    5. The action executes the query by making a GET request to the BMC Helix Remedyforce
    API.

    6. If records are found, the action returns the results as a JSON object and populates
    a data table in the action results. If no records are found, it outputs a message
    indicating no results were found.


    ### Additional Notes

    This action is designed for data retrieval and does not modify any data within
    BMC Helix Remedyforce. It supports various time frames including 'Last Hour',
    'Last 6 Hours', 'Last 24 Hours', 'Last Week', 'Last Month', and 'Custom'.
