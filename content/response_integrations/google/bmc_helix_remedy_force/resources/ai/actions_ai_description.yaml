    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new record in the BMC Helix Remedyforce system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to create a record in the external BMC Helix
      Remedyforce system (can_mutate_external_data=true). It does not fetch data,
