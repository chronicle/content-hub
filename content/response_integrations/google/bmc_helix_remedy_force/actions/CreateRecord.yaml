name: Create Record
description: Create a record in BMC Helix Remedyforce.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Record Type
    default_value: ''
    type: string
    description: Specify the type of the record that needs to be created. If you don't
        know what kind of records are available, please execute action "List Record
        Types".
    is_mandatory: true
-   name: Record Payload
    default_value: ''
    type: string
    description: Specify a JSON object containing all of the needed fields and values.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_record_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
