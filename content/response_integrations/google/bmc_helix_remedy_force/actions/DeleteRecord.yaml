name: Delete Record
description: Delete a record in BMC Helix Remedyforce.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Record Type
    default_value: ''
    type: string
    description: Specify the type of the record that needs to be deleted. If you don't
