name: Get OAuth Refresh Token
description: Generate the refresh token that is needed for the integration configuration.
    Authorization code can be generated using "Get OAuth Authorization Code". Please
    refer to the documentation portal for more information.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Redirect URL
    default_value: https://localhost
    type: string
    description: Specify the redirect URL that was used when the "Connector App" was
        created.
    is_mandatory: true
-   name: Authorization Code
    default_value: ''
    type: string
    description: Specify the authorization code from action "Get OAuth Authorization
        Code".
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
