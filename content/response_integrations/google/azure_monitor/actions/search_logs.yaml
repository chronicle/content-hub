name: Search Logs
description: Use the Search Logs action to search logs based on the provided query
    in Azure Monitor.
integration_identifier: AzureMonitor
parameters:
-   name: Workspace ID
    default_value: ''
    type: string
    description: ID of the workspace that needs to be searched. If nothing is provided,
        action will take the Workspace ID provided in the integration configuration.
    is_mandatory: false
-   name: Query
    default_value: ''
    type: string
    description: Query that needs to be executed.
    is_mandatory: true
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Time frame for the query. If "Custom" is selected, you also need
        to provide "Start Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Start time for the query. This parameter is mandatory, if "Custom"
        is selected for the "Time Frame" parameter. Format: ISO 8601.'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'End time for the query. Format: ISO 8601. If nothing is provided
        and "Custom" is selected for the "Time Frame" parameter then this parameter
        will use current time.'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 100
    type: string
    description: 'How many results should be returned from the search. Maximum: 1000.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/search_logs_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
