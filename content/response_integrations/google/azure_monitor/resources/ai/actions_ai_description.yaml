Ping:
  ai_description: >-
    ### General Description The **Ping** action is designed to verify the connectivity
    between Google SecOps and the Azure Monitor service. It ensures that the provided
    credentials (Tenant ID, Client ID, Client Secret) and the Workspace ID are valid
    and that the network path to the Azure Log Analytics API is open. ### Parameters
    Description | Parameter Name | Description | Type | Mandatory | Default Value
    | | :--- | :--- | :--- | :--- | :--- | | N/A | This action does not require any
    input parameters. | N/A | N/A | N/A | ### Additional Notes This action is typically
    used during the initial setup of the integration or for troubleshooting connection
    issues. It performs a minimal query against the AzureActivity table to confirm
    end-to-end communication. ### Flow Description 1. **Authentication**: The action
    retrieves the integration configuration and performs an OAuth2 Client Credentials
    flow to obtain an access token from the Microsoft identity platform. 2. **Connectivity
    Test**: It sends a POST request to the Azure Monitor Query API endpoint. 3. **Validation**:
    The request includes a simple query (AzureActivity) limited to a single row and
    a one-hour time window to verify the API is responsive. 4. **Result**: If the
    API returns a successful response, the action reports a successful connection.
    Otherwise, it parses the error message from the response and reports a failure.
