  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Workspace ID | String | No | ID of the workspace that needs to be searched.
    If nothing is provided, action will take the Workspace ID provided in the integration
    configuration. |

    | Query | String | Yes | Query that needs to be executed. |

    | Time Frame | Dropdown | No | Time frame for the query. If "Custom" is selected,
    you also need to provide "Start Time". |

    | Start Time | String | No | Start time for the query. This parameter is mandatory,
    if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601. |

    | End Time | String | No | End time for the query. Format: ISO 8601. If nothing
    is provided and "Custom" is selected for the "Time Frame" parameter then this
    parameter will use current time. |

    | Max Results To Return | Integer | Yes | How many results should be returned
    from the search. Maximum: 1000. |
  ai_short_description: >-
    Executes KQL queries against an Azure Monitor Log Analytics workspace to retrieve
    log data based on specified timeframes and returns the results as JSON objects.
