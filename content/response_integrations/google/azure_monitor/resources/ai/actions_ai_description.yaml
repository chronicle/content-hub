Search Logs:
  ai_description: >-
    ### General Description

    The **Search Logs** action allows users to execute KQL (Kusto Query Language)
    queries against an Azure Monitor Log Analytics workspace to retrieve log data.
    It is designed for flexible data retrieval, supporting both predefined time ranges
    and custom ISO 8601 timeframes. The results are returned as a list of JSON objects
    representing the log entries found.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Workspace ID** | String | No | The unique identifier of the Azure Log Analytics
    workspace to search. If left blank, the action uses the Workspace ID configured
    in the integration settings. |

    | **Query** | String | Yes | The KQL query string to be executed (e.g., `AzureActivity`).
    |

    | **Time Frame** | Dropdown | No | Defines the temporal scope of the search. Options
    include `Last Hour`, `Last 6 Hours`, `Last 24 Hours`, `Last Week`, `Last Month`,
    or `Custom`. Default is `Last Hour`. |

    | **Start Time** | String | No | The beginning of the search window in ISO 8601
    format (e.g., `2025-10-29T10:15:00Z`). This is **mandatory** if 'Time Frame' is
    set to `Custom`. |

    | **End Time** | String | No | The end of the search window in ISO 8601 format.
    If 'Time Frame' is `Custom` and this is empty, the current UTC time is used. |

    | **Max Results To Return** | Integer | Yes | Limits the number of log records
    returned. Must be between 1 and 1000. Default is 100. |


    ### Additional Notes

    - **Time Logic:** If the 'Time Frame' parameter is set to any value other than
    `Custom`, the 'Start Time' and 'End Time' parameters provided by the user are
    ignored in favor of the calculated relative time.

    - **Validation:** The action validates that 'Max Results To Return' does not exceed
    1000 and ensures that 'Start Time' is provided when using a custom timeframe.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the workspace ID, query, time
    settings, and result limits from the input.

    2. **Time Calculation:** It determines the `timespan` for the API request. If
    a predefined time frame is used, it calculates the start time relative to the
    current UTC time. If `Custom` is used, it validates the provided ISO 8601 strings.

    3. **API Request:** A POST request is sent to the Azure Monitor Log Analytics
    query endpoint (`/v1/workspaces/{workspace_id}/query`) containing the query, timespan,
    and row limit.

    4. **Data Parsing:** The raw tabular response from Azure is parsed into dynamic
    JSON objects where column names are converted to snake_case.

    5. **Result Delivery:** The action populates the JSON results with the retrieved
    log entries and provides a summary message indicating success or if no results
    were found.
