Get Ip Info:
  ai_description: >-
    ### General Description

    Queries DShield to retrieve threat intelligence and information regarding external
    IP addresses. This action enriches IP entities with data such as packet block
    counts and attack targets, appending the results directly to the entities.


    ### Flow Description

    1. Iterates through the target entities, filtering for IP addresses (ADDRESS entity
    type) that are not marked as internal.

    2. Makes a GET request to the DShield API (`/ip/{ip}`) for each valid IP address
    to retrieve threat information.

    3. Parses the retrieved data, converts it to a flat dictionary, and attaches it
    to the entity as a CSV table.

    4. Updates the entity's `additional_properties` with the retrieved data and marks
    the entity as enriched (`is_enriched = True`).

    5. Saves the updated entities back to the platform and returns the aggregated
    data as a JSON result.


    ### Additional Notes

    Internal IP addresses are explicitly skipped during execution.
  ai_short_description: >-
    Queries DShield to retrieve threat intelligence and information about external
    IP addresses, enriching the entities with the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the DShield API to fetch IP information (fetches_data=true).
      It does not mutate external data. It updates internal entities by modifying
      their additional_properties and calling `siemplify.update_entities` (can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
