Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DShield API to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. The action retrieves the "Api Root" configuration from the DShield integration
    settings.

    2. It initializes the `DShieldManager` with the provided API root URL.

    3. It executes the `test_connectivity` method, which attempts to open a connection
    to the API URL using `urllib`.

    4. If the connection is successful, it outputs "Connection Established." and returns
    "true".

    5. If the connection fails, it outputs "Connection Failed." and returns "false".


    ### Additional Notes

    This action does not require any entities and is used solely for verifying the
    integration's health.
