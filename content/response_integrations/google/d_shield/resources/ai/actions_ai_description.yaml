Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DShield API to ensure the integration is configured
    correctly and can communicate with the service.


    ### Flow Description

    1. Retrieves the API Root URL from the integration configuration.

    2. Initializes the DShieldManager.

    3. Executes a connectivity test by attempting to open the API URL using an HTTP
    request.

    4. Returns a success or failure message based on the connection result.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify network access and
    configuration validity for the DShield integration.
  ai_short_description: >-
    Tests connectivity to the DShield API to ensure the integration is configured
