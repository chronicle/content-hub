Get Ip Info:
  ai_description: >-
    ### General Description

    Queries the DShield API to retrieve threat intelligence and reputation information
    for external IP addresses. This action helps analysts understand the risk associated
    with specific IP addresses by fetching data such as attack counts and target counts
    from the DShield database.


    ### Flow Description

    1. The action initializes the DShield manager using the configured API root.

    2. It iterates through the provided target entities, filtering for those that
    are of type 'ADDRESS' and are marked as external (not internal).

    3. For each valid IP address, the action calls the `get_ip_info` method via the
    DShield API.

    4. If data is successfully retrieved, the action:
        - Updates the entity's `additional_properties` with the retrieved IP information.
        - Adds an entity table to the result containing the formatted IP data.
        - Marks the entity as enriched.
    5. Finally, the action updates the entities within the SOAR platform and returns
    a JSON result containing the gathered information.


    ### Additional Notes

    This action requires a valid DShield integration configuration. It specifically
    targets external IP addresses and will skip any internal entities or non-IP entities.
  ai_short_description: >-
    Queries DShield for threat intelligence and reputation information regarding external
    IP addresses.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and marks entities as enriched within the
      SOAR platform.
    reasoning: >-
      The action fetches data from an external API (DShield) and updates internal
      entities with the retrieved information. It does not mutate external systems
      or modify alert data.
