<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link
    href="https://fonts.googleapis.com/css?family=Open+Sans:400,400i,700,700i"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css?family=Source Sans Pro"
    rel="stylesheet"
  />
  <title>Url Check</title>
  <style>
      /* Root Variables */
      :root {
      /* Layout & Colors */
      --widget-bg: #212c44;
      --widget-font-family: 'Source Sans Pro', sans-serif;
      --widget-text-color: #ffffff;
      --scrollbar-bg-color: #6275a3;

      /* Components */
      --widget-row-highlight-bg: #2f3d5c;
      --divider-border-colcor: #3a4a6c;
      --divider-border-width: 1px;

      /* Sidebar */
      --sidebar-width: 167px;
      --sidebar-item-active-bg: #3a4a6c;
      --sidebar-toggle-bg: rgba(38, 51, 79, 1); /* Custom Widget specific */

      /* Table */
      --table-color-even-row: #26334f;

      /* Logo */
      --logo-size: 48px;
      --logo-color: #ffffff;

      /* UI Elements */
      --input-border: #6275a3;
      --dropdown-shadow: rgba(0, 0, 0, 0.6);
      --modal-overlay: rgba(0, 0, 0, 0.5);

      /* Status & Tags */
      --tag-bg: #6a7180;
      --status-text: #b5b5b5;
      --tooltip-bg: #ccccda;
      --tooltip-text: #161625;
      
      /* Content Gradients (Custom Widget specific) */
      --content-list-gradient: linear-gradient(to left, rgb(34 43 62), rgba(33, 44, 68, 0));
      --collapsing-gradient: linear-gradient(transparent, rgb(35 44 66));

      /* Severity Colors (Dark Theme Default) */
      --sev-unspec: #b2b6bd;
      --sev-low: #78d9ec;
      --sev-medium: #fff371;
      --sev-high: #fa903e;
      --sev-critical: #ec453b;
      
      /* Legacy Mappings */
      --content-bg: var(--table-color-even-row);
      --content-button-bg: var(--widget-row-highlight-bg);
      --details-button-bg: var(--divider-border-colcor);
      --modal-list-title-bg: var(--sidebar-item-active-bg);
      
      /* Font settings (Legacy) */
      --widget-scrollbar-size: 12px;
      --list-item-key-font: 600 14px/18px var(--widget-font-family);
      --list-item-value-font: 400 14px/18px var(--widget-font-family);
      --table-title-size: 600 14px/18px var(--widget-font-family);
      --table-th-size: 600 14px/18px var(--widget-font-family);
      --table-td-size: 400 14px/18px var(--widget-font-family);
      --header-title-font: 600 16px/22px var(--widget-font-family);
      --sidebar-item-text-style: 400 14px/18px var(--widget-font-family);
      --sidebar-item-text-style-active: 600 14px/16px var(--widget-font-family);
      --sidebar-item-padding: 10px;
      --risk-score-text: var(--tooltip-text); 

    }

      /*Normalize CSS */
      * {
          margin: 0;
          padding: 0;
          outline: none;
          box-sizing: border-box;
      }

      *:hover, *:focus, *:active {
          outline: none;
      }

      table {
          width: 100%;
          border-collapse: collapse;
          border-spacing: 0;
      }

      ol, ul {
          list-style: none;
      }

      button,
      input,
      textarea {
          font-family: inherit;
          background: transparent;
          border: 0;
          color: inherit;
          text-align: left;
          width: 100%;
      }

      button, a[href] {
          cursor: pointer;
      }

      img {
          width: 100%;
          height: 100%;
          object-fit: contain;
      }

      /*Normalize CSS */


      /* Thin Scrollbar */
      ::-webkit-scrollbar {
          width: 18px;
          height: 18px;
      }

      ::-webkit-scrollbar-thumb {
          background: rgba(137, 151, 180, 1);
          border: 6px solid var(--widget-bg);
          border-radius: 63px;
      }

      ::-webkit-scrollbar-track {
          background: transparent;
          border: 4px solid transparent;
          border-radius: 44px;
      }

      ::-webkit-scrollbar-corner {
          background-color: transparent;
          border-color: transparent;
      }


      body {
          font-family: var(--widget-font-family), serif;
          color: var(--widget-text-color);
          background-color: var(--widget-bg);
      }

      /*Global styles*/
      .text-ellipsis {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
      }

      .divider-border-style {
          border: 0;
          border-color: var(--divider-border-colcor);
          border-style: solid;
      }

      .tooltip {
          max-width: 100%;
          position: absolute;
          padding: 8px 16px 8px 16px;
          border-radius: 4px;
          background-color: var(--tooltip-bg);
          color: var(--tooltip-text);
          font: 400 14px/18px var(--widget-font-family);
          z-index: 9;
          word-wrap: break-word;
      }

      .tooltip-triangle {
          position: absolute;
          top: 100%;
          border-top: solid 8px rgb(195, 210, 232);
          border-left: solid 8px transparent;
          border-right: solid 8px transparent;
      }

      /*Global styles*/

      .wrapper {
          display: flex;
          height: 100vh;
      }

      /*left sidebar*/
      .left-side {
          min-width: var(--sidebar-width);
          max-width: var(--sidebar-width);
          overflow-y: auto;
          padding-right: 6px;
          margin-right: 12px;
          border-right-width: var(--divider-border-width);
      }

      .left-side-item {
          padding: var(--sidebar-item-padding);
          font: var(--sidebar-item-text-style);
      }

      .left-side-item.active {
          background-color: var(--sidebar-item-active-bg);
          font: var(--sidebar-item-text-style-active);
      }

      /*left sidebar*/

      .right-side {
          width: calc(100% - 180px);
          display: flex;
          flex-direction: column;
      }

      .header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 12px;
          margin-bottom: 12px;
          border-bottom-width: var(--divider-border-width);
      }

      .header-title {
          font: var(--header-title-font);
          word-break: break-word;
          padding: 0 6px;
      }

      .logo {
          min-width: var(--logo-size);
          min-height: var(--logo-size);
          color: var(--logo-color);
      }

      .main-content {
          flex: 1;
          overflow: auto;
      }

      .list-item {
          display: flex;
          align-items: flex-start;
          gap: 6px;
          padding: 3px 6px;
      }

      .list-item:hover {
          background-color: var(--widget-row-highlight-bg);
      }

      .list-item + .list-item {
          margin-top: 6px;
      }

      .list-item-text {
          width: 50%;
          max-width: 300px;
          word-break: break-word;
      }

      .list-item-text-key {
          font: var(--list-item-key-font);
      }

      .list-item-text-value {
          font: var(--list-item-value-font);
      }

      .list-item-status-value {
          color: rgb(255, 243, 113);
      }

      .list-item-specific-value {
          display: flex;
          align-items: center;
          gap: 8px;
      }

      .list-item-success-value {
          color: rgb(153, 215, 201);
      }

      .list-item-warning-value {
          color: rgb(255, 243, 113);
      }

      .list-item-error-value {
          color: rgba(255, 90, 80);
      }

      .list-item-status-value:first-letter {
          text-transform: uppercase;
      }

      .list-item-screenshot {
          justify-content: center;
      }

      .list-item-screenshot-text {
          display: none;
      }

      @media screen and (min-width: 700px) {
          .list-item-text-value {
              max-width: 100%;
              width: 100%;
          }

          .list-item-screenshot-text {
              display: block;
          }
      }

      .tag {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
      }

      .tag-item {
          max-width: 75px;
          padding: 2px 12px;
          background-color: var(--tag-bg);
          border-radius: 2px;
      }

      @media screen and (min-width: 700px) {
          .tag-item {
              max-width: 150px;
          }
      }

      .modal {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background-color: var(--widget-bg);
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
          padding: 16px;
          max-width: 90%;
          min-width: 50%;
          max-height: 90%;
          border-radius: 8px;
          z-index: 999;
          overflow: hidden;
          display: flex;
          flex-direction: column;
      }

      .modal-content {
          overflow: auto;
      }

      .modal-content pre {
          font: var(--table-td-size);
      }

      .modal-close {
          width: 100%;
          height: 24px;
          display: flex;
          align-items: center;
          justify-content: flex-end;
          order: -1;
      }

      .modal-close svg {
          width: 20px;
          height: 20px;
          stroke: var(--widget-text-color);
      }

      .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0, 0, 0, 0.5);
          z-index: 999;
      }

      .additional-content-container {
          padding: 0 6px;
          margin-top: 24px;
      }

      .additional-content-title {
          font: 600 14px/16px var(--widget-font-family);
          text-transform: uppercase;
          margin-bottom: 8px;
      }

      .additional-content {
          font: 400 14px/18px var(--widget-font-family);
      }

      .additional-content + .additional-content {
          margin-top: 6px;
      }

    /* --- SCROLLBAR IMPROVEMENTS --- */

<body>

<div class="wrapper">
  <div class="left-side divider-border-style" id="leftSide"></div>
  <div class="right-side" id="rightSide">
    <div class="header divider-border-style">
      <h1 class="header-title" id="headerTitle"></h1>
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" width="30" height="35"
           fill="currentColor"
           viewBox="0 0 25 25">
        <path fill-rule="evenodd"
              d="M22.55 19.5L17 13.95c.55-1.1.9-2.35.9-3.7 0-4.4-3.6-8-8-8s-8 3.6-8 8 3.6 8 8 8c1.7 0 3.3-.55 4.6-1.45l5.4 5.4c.75.75 1.95.75 2.65 0 .75-.75.75-1.95 0-2.7zM9.9 15.6c-2.95 0-5.35-2.4-5.35-5.35 0-2.95 2.4-5.35 5.35-5.35 2.95 0 5.35 2.4 5.35 5.35 0 2.95-2.4 5.35-5.35 5.35zM9 6.7c-.9 0-1.6.7-1.6 1.6 0 .9.7 1.6 1.6 1.6.9 0 1.6-.7 1.6-1.6 0-.9-.7-1.6-1.6-1.6z"
              clip-rule="evenodd"></path>
      </svg>
    </div>
    <section class="main-content" id="mainContent"></section>
  </div>
</div>

<script>

    const ThemeSettings = {
        LIGHT_THEME_CLASS: 'light-theme',
        DARK_THEME_CLASS: 'dark-theme',
    };
    
    const LIGHT_THEME_HEX = "#e5e8f2";
    const DARK_THEME_HEX = "#282837";
    const GRAY_THEME_HEX = "#2f3d5c";

    function handleThemeUpdate(event) {
        if (event.source !== window.parent) {
            return;
        }
        const styles = event.data;
        if (typeof styles !== 'object' || styles === null) return;
        const bg = styles.background || styles.backgroundColor || '';
        let isLight = false;
        let isDark = false;
        let isGray = false;
        const colorString = bg.toLowerCase();
        if (colorString === LIGHT_THEME_HEX) isLight = true;
        else if (colorString === DARK_THEME_HEX) isDark = true;
        else if (colorString === GRAY_THEME_HEX) isGray = true;
        else {
            let r, g, b;
            const rgbMatch = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (rgbMatch) { r = parseInt(rgbMatch[1]); g = parseInt(rgbMatch[2]); b = parseInt(rgbMatch[3]); }
            else if (bg.startsWith('#')) {
                const hex = bg.replace('#', '');
                const fH = hex.length === 3 ? hex.split('').map(c => c + c).join('') : hex;
                if (fH.length === 6) { r = parseInt(fH.substring(0, 2), 16); g = parseInt(fH.substring(2, 4), 16); b = parseInt(fH.substring(4, 6), 16); }
            }
            if (r !== undefined) {
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                if (brightness > 128) isLight = true;
            }
        }
        const html = document.documentElement;
        if (isLight) {
            html.classList.add(ThemeSettings.LIGHT_THEME_CLASS); html.classList.remove(ThemeSettings.DARK_THEME_CLASS);
        } else if (isDark) {
            html.classList.add(ThemeSettings.DARK_THEME_CLASS); html.classList.remove(ThemeSettings.LIGHT_THEME_CLASS);
        } else {
            html.classList.remove(ThemeSettings.LIGHT_THEME_CLASS); html.classList.remove(ThemeSettings.DARK_THEME_CLASS);
        }

        const prismLink = document.querySelector('link[href*="/themes/prism"]');
        if (prismLink) {
            if (isLight && prismLink.href.includes('prism-tomorrow')) {
                prismLink.href = prismLink.href.replace('prism-tomorrow.min.css', 'prism.min.css').replace('prism-tomorrow.css', 'prism.css');
            } else if (!isLight && !prismLink.href.includes('prism-tomorrow')) {
                prismLink.href = prismLink.href.replace('prism.min.css', 'prism-tomorrow.min.css').replace('prism.css', 'prism-tomorrow.css');
            }
        }
    }
    window.addEventListener('message', handleThemeUpdate);
    window.onmessage = handleThemeUpdate;
    document.addEventListener("DOMContentLoaded", function() {
        var paths = document.querySelectorAll('svg path');
        paths.forEach(function(path) {
            var fill = path.getAttribute('fill');
            if (fill === 'white' || fill === '#fff' || fill === '#ffffff' || fill === 'rgb(255, 255, 255)') {
                path.setAttribute('fill', 'currentColor');
            }
        });
    });


    const actionListData = [{stepInstanceName}.JsonResult];

    // Flatten the keys of the first object's EntityResult within actionListData
    const allKeys = flattenKeys(actionListData[0].EntityResult);

    // Error Date format
    const InvalidDateError = "invalidDateError";

    // Constants for tooltip positioning
    const tooltipGap = 25;
    const tooltipTriangleHeight = 8;

    // Render the flattened keys in the UI
    renderKeysInUI(allKeys);
    additionalContent(actionListData[0].EntityResult);

    // Set the header title to the Entity name from the first object in actionListData
    headerTitle.textContent = actionListData[0].Entity;


    // Generate menu items based on actionListData and clean the display values
    const menuItems = actionListData.map((el, index) => {
        const displayValue = el.Entity;
        const cleanDisplayValue = removeSpecialSymbols(displayValue);
        return `<button class="left-side-item text-ellipsis ${index === 0 ? "active" : ""}" id="${cleanDisplayValue}" data-menu="item" data-item="tooltip" data-tooltip="${displayValue}">${displayValue}</button>`;
    }).join("");

    // Populate the left side menu with generated menu items
    leftSide.innerHTML = menuItems;

    // Add event listener for left side menu item clicks
    if (actionListData.length === 1) {
        leftSide.remove();
        rightSide.style.width = "100%";
    } else {
        leftSide.addEventListener("click", event => {
            const target = event.target.closest("[data-menu='item']");
            if (!target) return;

            const id = target.id;
            const object = actionListData.find(el => removeSpecialSymbols(el.Entity) === id);
            if (object) {
                mainContent.innerHTML = "";
                renderKeysInUI(flattenKeys(object.EntityResult));
                additionalContent(object.EntityResult);
                headerTitle.textContent = object.Entity;
                renderTooltip();
                renderModal();
            }
            document.querySelectorAll("[data-menu='item']").forEach(item => item.classList.remove("active"));
            target.classList.add("active");

            mainContent.scrollTop = 0;
        });
    }

    // Initial rendering of tooltips and modals
    renderModal();
    renderTooltip();

    /**
     * Recursively flattens a nested object into an array of { key, value } pairs.
     */
    function flattenKeys(obj, parentKey = "", sep = ".") {
        let keys = [];

        for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
                let combinedKey = parentKey ? `${parentKey}${sep}${key}` : key;

                if (Array.isArray(obj[key])) {
                    keys.push({key: combinedKey, value: obj[key]});
                } else if (typeof obj[key] === "object" && obj[key] !== null) {
                    let nestedKeys = flattenKeys(obj[key], combinedKey, sep);
                    keys = [...keys, ...nestedKeys];
                } else {
                    keys.push({key: combinedKey, value: obj[key]});
                }
            }
        }

        return keys;
    }

    /**
     * Renders keys and their corresponding values in the UI.
     */
    function renderKeysInUI(keys) {
        const mainContent = document.getElementById("mainContent");
        mainContent.innerHTML = "";
        const ul = document.createElement("ul");
        ul.classList.add("list");
        ul.id = "list";
        const keyMap = {
            "page.url": "Effective URL",
            "verdicts.overall.score": "Score",
            "task.screenshotURL": "Screenshot",
        };

        keys.forEach(({key, value}) => {
            if (!value && value !== false && typeof value !== "number") return;
            const li = document.createElement("li");
            li.classList.add("list-item");

            if (keyMap[key]) {
                key = keyMap[key];
            }

            const spanValue = document.createElement("span");
            const spanKey = document.createElement("span");
            spanKey.classList.add("list-item-text", "list-item-text-key", "text-ellipsis");
            spanKey.setAttribute("data-tooltip", key);
            spanKey.setAttribute("data-item", "tooltip");
            spanKey.textContent = key;

            spanValue.classList.add("list-item-text", "list-item-text-value");
            if (key === "Screenshot") {
                const icon = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12.6284 11.4587L10.0829 5.94357C10.0201 5.80781 9.89075 5.71533 9.74227 5.69963C9.59209 5.68393 9.44827 5.74714 9.35833 5.86678L7.06745 8.92129L5.70989 7.90312C5.60892 7.82761 5.47995 7.80046 5.35777 7.8293C5.23517 7.85815 5.13208 7.94003 5.07565 8.05245L3.3787 11.4464C3.31295 11.5779 3.32016 11.734 3.39737 11.8591C3.47458 11.9843 3.61119 12.0607 3.7584 12.0607H12.2432C12.3878 12.0607 12.5227 11.9868 12.6004 11.8651C12.6784 11.7433 12.689 11.5902 12.6284 11.4587Z" fill="currentColor"/><path d="M6.30396 6.1216C7.00686 6.1216 7.57668 5.55179 7.57668 4.84889C7.57668 4.14599 7.00686 3.57617 6.30396 3.57617C5.60106 3.57617 5.03125 4.14599 5.03125 4.84889C5.03125 5.55179 5.60106 6.1216 6.30396 6.1216Z" fill="currentColor"/></svg>`;
                spanValue.classList.add("list-item-specific-value");
                spanValue.innerHTML = `<button class="list-item-screenshot tag tag-item" data-modal="${value}" data-modal-button="item" data-modal-img="true">${icon} <span class="list-item-screenshot-text text-ellipsis">Screenshot</span></button>`;
            } else {
                spanValue.textContent = value;
            }
            li.appendChild(spanValue);

            if (!spanValue.textContent || !["Effective URL", "Score", "Screenshot"].includes(key)) {
                return;
            }

            li.insertBefore(spanKey, li.firstChild);
            ul.appendChild(li);
        });
        mainContent.appendChild(ul);
    }

    /**
     * Additional keys and their corresponding values.
     */
    function additionalContent(result) {
        const {lists, page} = result;

        const ipCount = lists.ips && Array.isArray(lists.ips) ? lists.ips.length : "N/A";
        const countryCount = lists.countries && Array.isArray(lists.countries) ? lists.countries.length : "N/A";
        const domainCount = lists.domains && Array.isArray(lists.domains) ? lists.domains.length : "N/A";
        const httpCount = lists.urls && Array.isArray(lists.urls) ? lists.urls.length : "N/A";
        const mainIp = page.ip || "N/A";
        const locatedIn = page.city || "N/A";
        const locatedCountry = page.country || "N/A";
        const belongsTo = page.asnname || "N/A";
        const mainDomain = page.domain || "N/A";
        const certificateIssuer = page.tlsIssuer || "N/A";
        let issuedOn = formatDateString(page.tlsValidFrom);
        const tlsValidDays = page.tlsValidDays || "N/A";
        const tlsAgeDays = page.tlsAgeDays || "N/A";
        const hasCertificateInfo = certificateIssuer !== "N/A";

        let validTill;
        if (typeof tlsValidDays === "number" && typeof tlsAgeDays === "number") {
            validTill = tlsValidDays - tlsAgeDays;
            if (validTill < 0) {
                validTill = "N/A";
            }
        } else {
            validTill = "N/A";
        }
        const additionalContent = document.createElement("div");
        additionalContent.classList.add("additional-content-container");
        additionalContent.innerHTML = `
            <h2 class="additional-content-title">Summary</h2>
            <div class="additional-content">This website contacted <b>${ipCount}</b> IPs in <b>${countryCount}</b> countries across <b>${domainCount}</b> domains to perform <b>${httpCount}</b> HTTP transactions. The main IP is <b>${mainIp}</b>, located in <b>${locatedIn}</b>, <b>${locatedCountry}</b> and belongs to <b>${belongsTo}</b>. The main domain is <b>${mainDomain}</b>.</div>
        `;

        if (hasCertificateInfo) {
            if (issuedOn === InvalidDateError) {
                issuedOn = "N/A";
            }
            let validTillText = validTill === 1 ? "day" : "days";
            additionalContent.innerHTML += `
                <div class="additional-content">TLS certificate: Issued by <b>${certificateIssuer}</b> on <b>${issuedOn}</b>. Valid for: <b>${validTill}</b> ${validTillText}.</div>
            `;
        }
        mainContent.appendChild(additionalContent);
    }

    /**
     * Removes special symbols from a string.
     */
    function removeSpecialSymbols(str) {
        return str.replace(/[^\w\s]/gi, "");
    }

    /**
     * Creates a modal dialog with given content.
     */
    function createModal(content, isImage) {
        const modal = document.createElement("div");
        modal.classList.add("modal");

        const modalOverlay = document.createElement("div");
        modalOverlay.classList.add("modal-overlay");
        document.body.appendChild(modalOverlay);

        const modalContent = document.createElement("div");
        modalContent.classList.add("modal-content");
        modal.appendChild(modalContent);

        let contentElement;

        if (isImage) {
            contentElement = document.createElement("img");
            contentElement.src = content;
        } else {
            contentElement = document.createElement("pre");
            contentElement.textContent = content;
        }

        modalContent.appendChild(contentElement);

        const closeButton = document.createElement("button");
        closeButton.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12" />
        </svg>`;
        closeButton.classList.add("modal-close");
        modal.appendChild(closeButton);
        document.body.appendChild(modal);

        closeButton.addEventListener("click", () => {
            modal.remove();
            modalOverlay.remove();
        });
    }

    /**
     * Attaches modal creation behavior to elements with data-modal-button attribute.
     */
    function renderModal() {
        document.querySelectorAll("[data-modal-button=\"item\"]").forEach((button) => {
            button.addEventListener("click", () => {
                const content = button.getAttribute("data-modal");
                const isImage = button.getAttribute("data-modal-img") === "true";
                createModal(content, isImage);
            });
        });
    }

    /**
     * Creates a tooltip with given text and position.
     */
    function createTooltip(text, x, y, trianglePointX, placeAtBottom, tooltipContentWidth, tooltipContentHeight, viewportWidth) {
        removeTooltip();
        const tooltip = document.createElement("div");
        tooltip.classList.add("tooltip");
        tooltip.textContent = text;
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y}px`;
        const tooltipTriangle = document.createElement("span");
        tooltipTriangle.classList.add("tooltip-triangle");
        tooltipTriangle.style.left = `${trianglePointX}px`;
        if (placeAtBottom) {
            tooltipTriangle.style.top = "-8px";
            tooltipTriangle.style.borderTop = "0";
            tooltipTriangle.style.borderBottom = "solid 8px rgb(195, 210, 232)";
        }
        tooltip.offsetWidth = tooltipContentWidth;
        tooltip.offsetHeight = tooltipContentHeight;
        document.documentElement.offsetWidth = viewportWidth;
        tooltip.append(tooltipTriangle);
        document.body.append(tooltip);

        if (tooltipContentWidth === viewportWidth) {
            tooltip.style.right = `20px`;
            tooltip.style.left = `20px`;
            tooltipTriangle.style.left = `${trianglePointX / 2}px`;
        }
    }

    /**
     * Removes any existing tooltip from the DOM.
     */
    function removeTooltip() {
        const tooltip = document.querySelectorAll(".tooltip");
        tooltip.forEach((item) => {
            if (item) {
                item.remove();
            }
        });

    }

    /**
     * Attaches tooltip behavior to elements with data-item attribute.
     */
    function renderTooltip() {
        document.querySelectorAll("[data-item=\"tooltip\"]").forEach((button) => {
            let timeout = null;
            const buttonWidth = button.offsetWidth;
            const textWidth = button.scrollWidth;
            if (textWidth > buttonWidth) {
                button.addEventListener("mouseover", (event) => {
                    timeout = setTimeout(() => {
                        const rect = event.target.getBoundingClientRect();
                        const tooltipContent = document.createElement("div");
                        tooltipContent.classList.add("tooltip");
                        tooltipContent.textContent = event.target.getAttribute("data-tooltip");
                        document.body.appendChild(tooltipContent);
                        const tooltipContentWidth = tooltipContent.offsetWidth;
                        const tooltipContentHeight = tooltipContent.offsetHeight;
                        const viewportWidth = window.innerWidth;
                        tooltipContent.remove();
                        const elementMidX = rect.left + (rect.width / 2);
                        const placeOnRight = elementMidX + textWidth / 2 + tooltipGap > viewportWidth;
                        const x = placeOnRight ? viewportWidth - textWidth - tooltipGap : Math.max(tooltipGap, elementMidX - textWidth / 2);
                        const placeAtBottom = rect.top < tooltipContentHeight;
                        const y = placeAtBottom ? rect.bottom + tooltipTriangleHeight : rect.top - tooltipContentHeight;
                        createTooltip(event.target.getAttribute("data-tooltip"), x, y, elementMidX - x, placeAtBottom, tooltipContentWidth, tooltipContentHeight, viewportWidth);
                    }, 1000);
                });
            } else {
                button.removeAttribute("data-tooltip");
                button.removeAttribute("data-item");
            }

            button.addEventListener("mouseout", () => {
                clearTimeout(timeout);
                removeTooltip();
            });
        });
    }

    /**
     * Formats a date string into a human-readable date format with ordinal suffix.
     */
    function formatDateString(dateStr) {
        const date = new Date(dateStr);
        if (isNaN(date)) {
            return InvalidDateError;
        }
        const options = {
            year: "numeric",
            month: "short",
            day: "numeric",
        };

        const formattedDate = date.toLocaleDateString("en-US", options);
        const parts = formattedDate.split(" ");
        const month = parts[0];
        const day = parts[1].replace(",", "");
        const year = parts[2];

        function getOrdinalSuffix(day) {
            if (day >= 11 && day <= 13) {
                return "th";
            }
            switch (day % 10) {
                case 1:
                    return "st";
                case 2:
                    return "nd";
                case 3:
                    return "rd";
                default:
                    return "th";
            }
        }

        const ordinalDay = day + getOrdinalSuffix(parseInt(day));
        return `${month} ${ordinalDay} ${year}`;
    }
