name: Url Check
description: Submit a URL to be scanned and get the scan details
integration_identifier: UrlScanIo
parameters:
-   name: Visibility
    default_value: public
    type: ddl
    optional_values:
    - public
    - unlisted
    - private
    description: Scans on urlscan.io have one of three visibility levels, make sure
        to use the appropriate level for your submission.
    is_mandatory: false
-   name: Threshold
    default_value: '0'
    type: string
    description: Mark entity as suspicious if the score of verdicts is equal or above
        the given threshold. Default is 0, in this case, we consider every scanned
        url as suspicious.
    is_mandatory: false
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing information
        about entities.
    is_mandatory: false
-   name: Only Suspicious Insight
    default_value: false
    type: boolean
    description: 'If enabled, action will only create insight for suspicious entities.
        Note: "Create Insight" parameter needs to be enabled.'
    is_mandatory: false
-   name: Add Screenshot To Insight
    default_value: false
    type: boolean
    description: If enabled, action will add a screenshot of the website to the insight,
        if it’s available.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/url_check_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["DestinationURL"]}'
