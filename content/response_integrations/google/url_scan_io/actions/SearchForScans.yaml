name: Search for Scans
description: ' Search for urlscan.io existing scans by attributes such as domains,
  IPs, Autonomous System (AS) numbers, hashes, etc.  The action will find public scans
  performed by anyone as well as unlisted and private scans performed by you or your
  teams.'
integration_identifier: UrlScanIo
parameters:
- name: Max Scans
  default_value: '100'
  type: string
  description: 'Number of scans to return per entity. Default: 100, Max: 10000 (depending
    on subscription)'
  is_mandatory: false
dynamic_results_metadata:
- result_example_path: resources/SearchForScans_JsonResult_example.json
  result_name: JsonResult
  show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL", "ADDRESS", "HOSTNAME", "FILEHASH",
  "FILENAME", "DOMAIN"]}'
