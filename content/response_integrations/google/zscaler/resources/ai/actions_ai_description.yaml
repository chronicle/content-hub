Get Url Categories:
  ai_description: >-
    ### General Description

    The **Get URL Categories** action retrieves a comprehensive list of all URL categories
    from the Zscaler service. This includes both system-defined and custom-defined
    categories. The action provides high-level metadata for each category and can
    optionally provide the specific URLs associated with them.



    ### Additional Notes

    This action does not require any input entities and performs a global lookup of
    categories within the Zscaler tenant.


    ### Flow Description

    1. **Initialize Manager**: Connects to the Zscaler API using the configured credentials.

    2. **Fetch Categories**: Executes a GET request to retrieve all URL category definitions.

    3. **Process Results**: Iterates through the retrieved categories to extract IDs,
    custom status, and URL counts.

    4. **Generate Summary Table**: Creates a 'Zscaler Categories' data table in the
    SOAR interface.

    5. **Generate Detailed Tables**: If `Display URL` is enabled, creates separate
    data tables for each category containing its specific URL list.

    6. **Output JSON**: Attaches the raw JSON response to the action results for use
    in downstream playbooks.
