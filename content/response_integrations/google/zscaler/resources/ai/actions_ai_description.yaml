Get Sandbox Report:
  ai_description: >-
    ### General Description

    The **Get Sandbox Report** action retrieves a detailed analysis report from Zscaler
    for file hash entities that have been processed by the Zscaler Cloud Sandbox.
    This action provides deep visibility into file behavior, including system summaries,
    classification scores, and persistence mechanisms, helping analysts understand
    the risk associated with a specific file.



    ### Additional Notes

    - This action specifically targets **FILEHASH** entities.

    - The Zscaler API requires the hash to be in **MD5** format for sandbox report
    retrieval.

    - If a report is not yet completed or the hash is unknown to Zscaler, the action
    will log this information and continue processing other entities.


    ### Flow Description

    1. **Authentication**: The action initializes a session with the Zscaler API using
    the provided credentials and an obfuscated API key.

    2. **Entity Filtering**: It iterates through the target entities and filters for
    those of type `FILEHASH`.

    3. **Data Retrieval**: For each identified hash, it performs a GET request to
    the Zscaler Sandbox API to fetch the full detail report.

    4. **Data Processing**:
        - If a report is found, the action flattens the data and adds it as an entity-specific
    data table named "[Hash] Sandbox Report".
        - The raw JSON report is added to the action's result object for further downstream
    use. 5. **Completion**: The action concludes by providing a summary message indicating
    which hashes were found in Zscaler, which were missing, and if any errors occurred
    during the process.
