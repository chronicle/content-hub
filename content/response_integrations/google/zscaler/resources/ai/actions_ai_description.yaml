Get Blacklist:
  ai_description: >-
    ### General Description

    Retrieves the current list of blacklisted URLs from the Zscaler Advanced Threat
    Protection policy. This action allows security analysts to audit the global blocklist
    configured in Zscaler and use the data for cross-referencing or reporting within
    Google SecOps.



    ### Flow Description

    1. **Authentication**: The action initializes the Zscaler manager and authenticates
    using the API Key, Login ID, and Password provided in the integration configuration.

    2. **Data Retrieval**: It calls the Zscaler API to fetch the advanced security
    configuration, specifically targeting the blacklisted URLs.

    3. **Processing**: The script extracts the list of URLs from the `blacklistUrls`
    field of the response.

    4. **Output Generation**: 
        * If URLs are found, it constructs a CSV data table titled 'Blacklist Urls'
    containing the list.
        * It attaches the raw JSON response to the action results.
        * It returns a comma-separated string of the blacklisted URLs as the primary
    result value.
