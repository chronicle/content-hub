Remove From Blacklist:
  ai_description: >-
    ### General Description

    Removes specified entities from the Zscaler Advanced Threat Protection blacklist.
    This action allows security administrators to programmatically unblock Hostnames,
    URLs, Domains, and external IP addresses that were previously restricted. It ensures
    that the removal is finalized by triggering a configuration activation in the
    Zscaler cloud environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |
    | :--- | :--- | :--- | :--- |
    | **IOCs** | String | No | A comma-separated list of IOCs (IP Addresses, URLs,
    or Domains) to remove from the blacklist. |


    ### Additional Notes

    * The action automatically filters out internal IP addresses to prevent accidental
    modification of internal infrastructure settings.

    * If an entity is already missing from the blacklist, the action will log the
    information and proceed without error.

    * Configuration changes are activated immediately after the removal request is
    sent to ensure the policy takes effect.


    ### Flow Description

    1. **Authentication**: The action initializes the Zscaler manager using the provided
    API credentials and authenticates with the Zscaler cloud.

    2. **Entity Filtering**: It iterates through the target entities in the SOAR case,
    identifying supported types: Hostnames, URLs, Domains, and IP Addresses.

    3. **Data Normalization**: For URL, Hostname, and Domain entities, it extracts
    the core network location (netloc) and strips 'www.' prefixes. For IP addresses,
    it verifies the entity is not marked as internal.

    4. **Blacklist Removal**: For each valid entity, it calls the Zscaler API to remove
    the identifier from the Advanced Threat Protection blacklist.

    5. **Change Activation**: After processing the removals, it sends an activation
    request to the Zscaler service to apply the pending configuration changes.

    6. **Reporting**: The action concludes by providing a summary of entities successfully
    removed, entities already absent from the list, and any errors encountered during
    the process.
