Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Zscaler API. It validates the integration configuration
    by attempting to establish an authenticated session and ensuring the service is
    reachable.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Zscaler API credentials
    and connection settings from the integration configuration.

    2. **Manager Initialization**: It instantiates the `ZscalerManager` and authenticates
    the session using either OAuth 2.0 or Legacy API Key authentication.

    3. **Connectivity Verification**: The action executes the `test_connectivity`
    method, which performs a GET request to the `/status` or `/authenticatedSession`
    endpoint to confirm the session is active and the service is responsive.

    4. **Result Reporting**: If the connection is successful, the action returns a
    success status and a 'Connection Established' message.


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Zscaler integration to ensure that the provided credentials and network settings
    are correct.
