Add To Whitelist:
  ai_description: "### General Description\nThe **Add To Whitelist** action allows
    security analysts to programmatically add specific network indicators to the Zscaler
    global whitelist. This action is primarily used to ensure that known-safe traffic
    (URLs, Hostnames, Domains, or external IP addresses) is not blocked by Zscaler's
    security policies, effectively preventing false positives during incident response.\n
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---
    | :--- | :--- |\n| **IOCs** | String | No | A comma-separated list of IOCs (IP
    Addresses, URLs, or Domains) to add to the whitelist. |\n\n### Flow Description\n
    1. **Authentication**: The action initializes the Zscaler manager and establishes
    an authenticated session using the integration's credentials.\n2. **Entity Processing**:
    The action iterates through all entities provided in the current scope.\n3. **Validation
    and Extraction**: \n    * For **URL**, **Hostname**, and **Domain** entities,
    the action extracts the network location (e.g., stripping 'www.' and protocol
    prefixes).\n    * For **IP Address** entities, the action verifies that the entity
    is not marked as internal.\n4. **Whitelist Retrieval**: For each valid entity,
    the action fetches the current whitelist from Zscaler to ensure the update doesn't
    overwrite existing data.\n5. **Update and Activation**: The action appends the
    new entity to the whitelist, performs a PUT request to update the list in Zscaler,
    and then calls the activation endpoint to apply the changes globally.\n6. **Result
    Summary**: The action concludes by providing a detailed message indicating which
    entities were successfully added, which were already present in the whitelist,
    and any errors that occurred during the process.\n\n### Additional Notes\n- This
    action performs a state change in Zscaler and requires the 'activate' permission
    in the Zscaler API.\n- IP addresses are ignored if they are flagged as internal
    to the organization."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action updates the global whitelist configuration in Zscaler by adding
      new entries and then triggers a configuration activation to apply the changes.
    fetches_data: true
    internal_data_mutation_explanation:
