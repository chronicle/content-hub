Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Zscaler API. It validates the integration configuration,
    including the API Root, Login ID, API Key, and Password, by attempting to establish
    an authenticated session.



    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Zscaler API credentials
    and connection settings (API Root, Login ID, API Key, Password, and SSL verification
    preference) from the integration configuration.

    2. **Manager Initialization**: It instantiates the `ZscalerManager`, which performs
    two internal steps: 
        *   **API Key Obfuscation**: Generates a time-based obfuscated key required
    by Zscaler's security protocol.
        *   **Authentication**: Sends a POST request to the `/authenticatedSession`
    endpoint to establish a valid session.
    3. **Connectivity Verification**: The action executes the `test_connectivity`
    method, which performs a GET request to the `/authenticatedSession` endpoint to
    confirm the session is active and the service is responsive.

    4. **Result Reporting**: If the connection is successful, the action returns a
    success status and a 'Connection Established' message.
  capabilities:
