Lookup Entity:
  ai_description: >-
    ### General Description

    The **Lookup Entity** action retrieves categorization and security classification
    data for URL, Domain, and Hostname entities from the Zscaler cloud platform. This
    action allows security analysts to determine the reputation and category (e.g.,
    'Malware Site', 'Social Networking') of web-based entities to assess potential
    risks within a case.


    ### Flow Description

    1. **Initialization**: The action extracts integration-level configuration parameters
    and initializes the Zscaler API manager.

    2. **Entity Filtering**: It iterates through the target entities and filters for
    those of type URL, Hostname, or Domain.

    3. **Normalization**: The identifiers of the filtered entities are cleaned and
    prepared for the API request.

    4. **Zscaler Lookup**: The action performs a batch POST request to the Zscaler
    `urlLookup` endpoint.

    5. **Result Processing**: For every entity found in Zscaler, the action generates
    a JSON result containing the full classification data and adds an entity-specific
    data table to the action results showing the categorization and security alerts.

    6. **Finalization**: The action concludes by providing a summary message of found
    entities and any errors encountered during the execution.


    ### Additional Notes

    * The action automatically normalizes entity identifiers by converting them to
    lowercase and stripping 'www.' prefixes to ensure compatibility with Zscaler's
    lookup engine.

    * Requests are processed in batches of 100 to adhere to Zscaler API limitations.
