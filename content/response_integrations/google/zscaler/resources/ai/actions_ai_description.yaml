Remove From Whitelist:
  ai_description: >-
    ### General Description

    The **Remove From Whitelist** action is designed to remove specific entities (URLs,
    Hostnames, Domains, or external IP addresses) from the Zscaler security whitelist.
    This action is critical for security teams who need to revoke previously granted
    access or correct misconfigurations in their Zscaler environment. It ensures that
    the specified entities are no longer bypassed by Zscaler's security inspection
    policies.


    ### Parameters

    | Parameter | Type | Mandatory | Description |
    | :--- | :--- | :--- | :--- |
    | **IOCs** | String | No | A comma-separated list of IOCs (IP Addresses, URLs,
    or Domains) to remove from the whitelist. |


    ### Flow Description

    1.  **Authentication**: The action initializes a session with the Zscaler API
    using the provided credentials (API Root, Login ID, API Key, and Password).

    2.  **Entity Filtering**: It iterates through the target entities, specifically
    looking for Hostnames, Domains, URLs, and external (non-internal) IP addresses.

    3.  **URL Normalization**: For URL, Hostname, and Domain entities, the action
    cleans and extracts the network location (e.g., removing 'www.' and protocols)
    to match Zscaler's expected format.

    4.  **Whitelist Modification**: For each valid entity, the action retrieves the
    current whitelist from Zscaler, removes the target entity from the list, and uploads
    the updated list back to the Zscaler service.

    5.  **Activation**: After the list is updated, the action calls the Zscaler activation
    endpoint to ensure the changes take effect immediately.

    6.  **Reporting**: The action provides a summary of which entities were successfully
    removed, which were already absent from the whitelist, and any errors encountered
    during the process.
