Add To Blacklist:
  ai_description: >-
    ### General Description

    Adds URLs, Domains, Hostnames, and external IP addresses to the Zscaler Advanced
    Threat Protection blacklist. This action is used to block malicious traffic at
    the perimeter by updating Zscaler's security policy and activating the changes
    immediately.


    ### Flow Description

    1. **Authentication**: The action authenticates with the Zscaler API using the
    provided credentials (OAuth 2.0 or Legacy API Key).

    2. **Entity Filtering**: It uses the provided **IOCs** parameter to identify URLs,
    Hostnames, Domains, and IP addresses. If the parameter is not provided, it iterates
    through the target entities in the case.

    3. **Normalization**: For URL, Hostname, and Domain entities, it extracts the
    network location (domain) using a normalization utility. For IP addresses, it
    verifies that the entity is not marked as internal.

    4. **Blacklist Update**: It sends a POST request to the Zscaler API to add the
    identified entities to the Advanced Threat Protection blacklist.

    5. **Activation**: It calls the Zscaler activation endpoint to ensure the configuration
    changes take effect in the environment.

    6. **Reporting**: The action returns a success message listing the entities added
    or an error message if the operation failed for specific entities.


    ### Additional Notes

    This action supports both manual input via the IOCs parameter and automated execution
    based on the case's target entities.
