identifier: Zscaler
name: Zscaler
parameters:
-   name: Api Root
    default_value: https://admin.zscalertwo.net
    type: string
    description: The base URL of the Zscaler instance.
    is_mandatory: true
    integration_identifier: Zscaler
-   name: Login ID
    default_value: null
    type: string
    description: The username or email address associated with the Zscaler administrator
        account used for authentication. This parameter is mandatory for legacy authentication.
        If both legacy and OAuth 2.0 credentials are provided, OAuth 2.0 takes precedence.
    is_mandatory: false
    integration_identifier: Zscaler
-   name: Api Key
    default_value: null
    type: password
    description: The unique API key generated in the Zscaler portal to authorize API
        requests. This parameter is mandatory for legacy authentication. If both legacy
        and OAuth 2.0 credentials are provided, OAuth 2.0 takes precedence.
    is_mandatory: false
    integration_identifier: Zscaler
-   name: Password
    default_value: null
    type: password
    description: The password associated with the Zscaler administrator account used
        for authentication. This parameter is mandatory for legacy authentication.
        If both legacy and OAuth 2.0 credentials are provided, OAuth 2.0 takes precedence.
    is_mandatory: false
    integration_identifier: Zscaler
-   name: Client ID
    default_value: null
    type: string
    description: The unique identifier for the OAuth 2.0 client used for authentication
        using the ZSLogin service. This parameter is mandatory for OAuth 2.0 configuration
        and takes precedence over legacy authentication.
    is_mandatory: false
    integration_identifier: Zscaler
-   name: Client Secret
    default_value: null
    type: password
    description: The secret key associated with the client ID used to authenticate
        the OAuth 2.0 client. This parameter is mandatory for OAuth 2.0 configuration
        and takes precedence over legacy authentication.
    is_mandatory: false
    integration_identifier: Zscaler
-   name: Login API Root
    default_value: https://siempify.zslogin.net
    type: string
    description: The base URL for the ZSLogin service used for centralized identity
        and access management. This parameter is mandatory for OAuth 2.0 configuration
        and takes precedence over legacy authentication.
    is_mandatory: false
    integration_identifier: Zscaler
-   name: Verify SSL
    default_value: 'False'
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Zscaler server.
    is_mandatory: true
    integration_identifier: Zscaler
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zscaler
categories:
- Secure Web Gateway
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
