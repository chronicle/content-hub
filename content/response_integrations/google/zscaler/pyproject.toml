[project]
name = "zscaler"
version = "16.0"
description = "Zscaler is a cloud security solution built for performance and flexible scalability. Use the Zscaler integration to block and manage domains using whitelists and blacklists."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "requests==2.32.5", "tipcommon",]

[dependency-groups]
dev = [
 "pytest-mock",
 "integration-testing",
 "pytest>=9.1.0",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
 "pyyaml",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.4-py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.3.4-py3-none-any.whl"
