name: Post Data
description: Send HTTP post requests
integration_identifier: HTTP
parameters:
-   name: URL
    default_value: ''
    type: string
    description: The url to send the request to.
    is_mandatory: true
-   name: Data
    default_value: ''
    type: string
    description: The data to send with the request.
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: false
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: false
-   name: SSL Verification
    default_value: ''
    type: boolean
    description: Whether to verify the SSL certificate of the destination server.
    is_mandatory: false
-   name: Headers JSON
    default_value: ''
    type: string
    description: JSON object of HTTP headers to be sent with the request.
    is_mandatory: false
-   name: Content Type
    default_value: None
    type: ddl
    optional_values:
    - application/json
    - text/plain
    - text/html
    - None
    description: Content Type. If set to application/json the input data must be JSON
        string.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/post_data_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: response_data
