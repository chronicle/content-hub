name: Get Data
description: Send HTTP get request
integration_identifier: HTTP
parameters:
-   name: URL
    default_value: ''
    type: string
    description: The url to send the request to.
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: false
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: false
-   name: SSL Verification
    default_value: ''
    type: boolean
    description: Whether to verify the SSL certificate of the destination server.
    is_mandatory: false
-   name: Ignore HTTP Error Codes
    default_value: ''
    type: boolean
    description: If enabled, action should ignore 4xx or 5xx HTTP error codes and
        not return error.
    is_mandatory: false
-   name: Headers JSON
    default_value: ''
    type: string
    description: JSON object of HTTP headers to be sent with the request.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_data_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: response_data
