  network_security: false
  reasoning: >-
    The symantec_content_analysis integration is designed to analyze files and file
    hashes to determine their threat potential, which is a core function of threat
    intelligence. The 'Get Hash Report' action enriches file hash entities with reputation
    data, and the 'Submit File' action performs sandboxing and reputation analysis.
    These capabilities directly align with the 'Threat Intelligence' category, which
    focuses on enriching external indicators (IPs, Hashes, URLs) to determine reputation
    and confirm if an alert is a True Positive. The integration does not perform SIEM,
    EDR, Network Security, Email Security, IAM, Cloud Security, ITSM, Vulnerability
    Management, Asset Inventory, or Collaboration functions.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
