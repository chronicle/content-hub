  reasoning: >-
    The symantec_content_analysis integration is primarily focused on analyzing files
    and hashes to determine their reputation and threat level. The 'Get Hash Report'
    action enriches file hash entities with threat intelligence data, and the 'Submit
    File' action performs reputation analysis on files. These capabilities align directly
    with the 'Threat Intelligence' category, which involves enriching indicators to
    determine reputation and confirm if an alert is a True Positive. The integration
    does not perform SIEM, EDR, Network Security, Email Security, IAM, Cloud Security,
    ITSM, Vulnerability Management, Asset Inventory, or Collaboration functions as
    defined in the provided criteria.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
