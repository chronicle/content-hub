Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps SOAR platform and the Symantec
    Content Analysis service. This action verifies that the integration is correctly
    configured and that the SOAR platform can successfully communicate with the external
    API.


    ### Flow Description

    1. The action retrieves the integration configuration, including the API Root,
    API Key, and SSL verification settings.

    2. It initializes the `SymantecContentAnalysisManager` using these credentials.

    3. The action executes a `GET` request to the `rapi/pattern_groups` endpoint on
    the Symantec Content Analysis server.

    4. If the request is successful, the action returns a "Connection Established"
    message; otherwise, it reports a connection failure.


    ### Additional Notes

    This action is strictly for health checks and connectivity verification. It does
    not perform any data enrichment, entity updates, or modifications to the external
    system or the SOAR case.
