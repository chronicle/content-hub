Get Hash Report:
  ai_description: >-
    ### General Description

    Fetches file samples and threat intelligence reports for file hash entities (MD5
    or SHA256) using the Symantec Content Analysis API. This action retrieves detailed
    analysis data for specified file hashes, allowing analysts to assess the reputation
    and characteristics of files encountered during an investigation.


    ### Flow Description

    1. The action initializes the Symantec Content Analysis manager using the configured
    API Root, API Key, and SSL verification settings.

    2. It filters the target entities to process only those of type `FILEHASH`.

    3. For each valid entity, the action calls the `get_file_samples` method via the
    Symantec API to retrieve the associated report.

    4. If a report is successfully retrieved, the action adds the report data to the
    entity's `additional_properties` and attaches the report as a table to the action
    results.

    5. Finally, the action updates the entities within the SOAR platform with the
    enriched data and concludes with a summary message.


    ### Additional Notes

    This action requires a valid API Key and API Root URL configured in the integration
    settings. It supports both MD5 and SHA256 hash formats. If no report is found
    or an error occurs, the action logs the details and proceeds to the next entity.
  ai_short_description: >-
    Fetches file samples and threat intelligence reports for file hash entities using
    Symantec Content Analysis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
