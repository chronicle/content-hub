  ai_description: >-
    Uploads a file from a specified path to Symantec Content Analysis for scanning
    and retrieves its reputation score.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | File Path | String | Yes | The local path of the file to be submitted for scanning.
    |


    ### Flow

    1. Retrieves the file from the provided file path.

    2. Submits the file to Symantec Content Analysis via a POST request.

    3. Parses the response to extract the file reputation score.

    4. Creates a case insight if the file is found to be suspicious (score 2-6) or
    malicious (score 7-10).

    5. Returns the reputation score and an output message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to Symantec Content Analysis for scanning.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates a case insight if the file reputation score indicates it is suspicious
      or malicious.
    reasoning: >-
      The action submits a file to Symantec Content Analysis, which mutates external
      data by creating a scan task. It fetches the resulting reputation score. It
      also mutates internal data by creating a case insight based on the reputation
      score.
