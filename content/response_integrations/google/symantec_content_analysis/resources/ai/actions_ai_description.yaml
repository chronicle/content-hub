Get Hash Report:
  ai_description: >-
    Enriches File Hash entities (MD5 and SHA256) by retrieving sample reports from
    Symantec Content Analysis. This action queries the Symantec API to find basic
    sample information associated with a specific file hash and provides the results
    as both entity attributes and a data table within the case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any specific input parameters beyond
    the target entities. |


    ### Additional Notes


    *   The action automatically distinguishes between MD5 (32 characters) and SHA256
    (64 characters) hashes to use the appropriate API endpoint.

    *   If a hash is neither 32 nor 64 characters long, an error will be logged for
    that specific entity.


    ### Flow Description


    1.  **Filter Entities:** The action identifies all File Hash entities within the
    current context.

    2.  **API Query:** For each identified hash, it determines the hash type (MD5
    or SHA256) and sends a GET request to the Symantec Content Analysis API to retrieve
    sample data.

    3.  **Data Processing:** If a report is found, the action flattens the JSON response
    and adds it to the entity's additional properties.

    4.  **UI Enhancement:** A CSV-formatted table containing the report details is
    attached to the entity in the Google SecOps interface.

    5.  **Update:** The action updates the entities in the platform to persist the
    enriched data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with flattened report data and adds a data
      table to the entity's record in the case.
  categories:
    enrichment: true
