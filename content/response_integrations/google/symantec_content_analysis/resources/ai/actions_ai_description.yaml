  ai_description: >-
    ### General Description

    Enriches File Hash entities by retrieving sample reports from Symantec Content
    Analysis. This action supports both MD5 and SHA256 hash types, providing detailed
    sample information in a tabular format and updating the entity's metadata within
    Google SecOps.


    ### Parameters

    There are no specific action parameters for this action. It relies on the global
    integration configuration (API Root, API Key, and Verify SSL).


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `FILEHASH` entities within
    the current context.

    2. **Hash Validation**: For each entity, it validates the hash type based on string
    length (32 characters for MD5, 64 characters for SHA256).

    3. **Data Retrieval**: It performs a GET request to the Symantec Content Analysis
    API to fetch sample data associated with the specific hash.

    4. **Data Attachment**: If a report is found, the action converts the results
    into a CSV format and attaches it as an entity table.

    5. **Internal Enrichment**: The raw JSON response is mapped to the entity's 'additional_properties'
    field.

    6. **Entity Update**: Finally, the action updates the entities in the case to
    persist the enriched data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties and adds entity tables to the
      SOAR case.
    reasoning: >-
      The action fetches data from an external API (Symantec Content Analysis) to
      retrieve file samples. It does not mutate external systems (no POST/PUT/DELETE).
      It performs internal mutations by updating entity additional properties and
      adding entity tables to the SOAR case, which are allowed internal operations.
  categories:
    enrichment: true
    reasoning: >-
      The action is an enrichment action because it proactively fetches data from
      an external source, does not mutate external systems, and only performs allowed
      internal mutations (updating entities and adding entity tables).
  entity_usage:
