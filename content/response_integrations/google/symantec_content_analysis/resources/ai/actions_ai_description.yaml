    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with retrieved report data and adds result tables to the action
      output.
    reasoning: >-
      The action fetches data from an external API (Symantec Content Analysis) via
