Submit File:
  ai_description: >-
    ### General Description

    Uploads a file to Symantec Content Analysis for scanning and reputation assessment.
    This action allows analysts to submit a file from a specified path to the Symantec
    Content Analysis engine to determine if the file is malicious or suspicious.


    ### Flow Description

    1. The action retrieves the `File Path` parameter provided by the user.

    2. It initializes the `SymantecContentAnalysisManager` using the configured API
    root and API key.

    3. The action performs a POST request to the Symantec Content Analysis API (`rapi/cas/scan`)
    to submit the file for analysis.

    4. Upon receiving the response, the action parses the `file_reputation_score`
    from the result.

    5. If the reputation score falls within the suspicious range (2-6) or the malicious
    range (7-10), the action creates a case insight in the SOAR platform to alert
    the analyst.

    6. Finally, the action returns the submission status and the reputation score
    as the output message.


    ### Additional Notes

    This action does not operate on specific entities (e.g., IP, Hash) from the case;
    it operates on a file path provided as a parameter. It is primarily used for file
    reputation enrichment and threat analysis.
  ai_short_description: >-
    Uploads a file to Symantec Content Analysis to retrieve a reputation score and
    generate case insights based on the scan results.
