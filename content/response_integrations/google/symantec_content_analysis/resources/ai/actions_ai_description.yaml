  ai_description: "### General Description\nThis action uploads a file from a specified\
    \ local path to the Symantec Content Analysis service for security scanning and\
    \ reputation analysis. It is designed to determine if a file is malicious or suspicious\
    \ by leveraging Symantec's analysis engine. The action retrieves a reputation\
    \ score and provides immediate feedback within the case by creating insights.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| File Path | String | Yes | The full local path\
    \ to the file that should be uploaded and scanned. |\n\n### Flow Description\n\
    1. **Configuration Retrieval**: The action initializes the Symantec Content Analysis\
    \ manager using the provided API Root and API Key.\n2. **File Submission**: It\
    \ reads the file from the provided `File Path` and performs a POST request to\
    \ the Symantec `rapi/cas/scan` endpoint.\n3. **Score Extraction**: The action\
    \ waits for the scan results (with a 5-minute timeout) and extracts the `file_reputation_score`\
    \ from the API response.\n4. **Insight Creation**: \n    * If the score is between\
    \ 2 and 6, a 'File Found as Suspicious' insight is created.\n    * If the score\
    \ is between 7 and 10, a 'File Found as Malicious' insight is created.\n5. **Completion**:\
    \ The action ends by returning the reputation score and a summary message to the\
    \ Google SecOps workbench."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the Symantec Content Analysis service for scanning, creating
      a new scan record in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights within the Google SecOps platform based on the file reputation
      score.
    reasoning: >-
      The action performs a POST request to submit a file to an external service (Symantec
      Content Analysis), which constitutes external data mutation (creating a scan
      record). It fetches the reputation score from the response (fetches_data=true).
      It creates case insights within the SOAR platform based on the results, which
      is an internal mutation.
  categories:
    enrichment: false
    reasoning: >-
      While the action fetches data (reputation score), it does not operate on entities
      (it uses a file path parameter) and it mutates external data by uploading a
      file. Therefore, it does not meet the strict criteria for an Enrichment Action.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
