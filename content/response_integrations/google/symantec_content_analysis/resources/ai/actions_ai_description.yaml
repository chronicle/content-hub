Submit File:
  ai_description: >-
    ### General Description

    Submits a file from a specified local path to Symantec Content Analysis for scanning
    and retrieves its reputation score. Based on the returned score, the action can
    automatically generate case insights to highlight suspicious or malicious files.


    ### Flow Description

    1. Retrieves the `File Path` from the action parameters.

    2. Reads the file from the local file system.

    3. Makes an HTTP POST request to the Symantec Content Analysis API (`rapi/cas/scan`)
    to upload the file for analysis.

    4. Parses the API response to extract the file reputation score.

    5. Evaluates the score: if it falls between 2 and 6, a "File Found as Suspicious"
    case insight is created. If it falls between 7 and 10, a "File Found as Malicious"
    case insight is created.

    6. Completes the action by returning the reputation score and a summary message.


    ### Additional Notes

    The action requires a valid file path that is accessible by the environment executing
    the integration. The reputation score is also returned as dynamic result metadata
    (`file_reputation_score`) for use in subsequent playbook steps.
  ai_short_description: >-
    Uploads a file to Symantec Content Analysis for scanning, retrieves its reputation
    score, and generates case insights based on the identified threat level.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
