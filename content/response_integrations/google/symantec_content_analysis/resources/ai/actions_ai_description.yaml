  ai_description: "### General Description\nThis action submits a file from a specified\
    \ local path to the Symantec Content Analysis service for scanning and reputation\
    \ analysis. It retrieves the file's reputation score and generates case insights\
    \ within the SOAR platform based on the severity of the findings. This action\
    \ is useful for automating the initial triage of suspicious files.\n\n### Parameters\
    \ Description\n| Parameter Name | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| File Path | string | True | The local file system path of\
    \ the file to be uploaded and scanned. |\n\n### Flow Description\n1. **Configuration\
    \ Retrieval:** The action initializes the Symantec Content Analysis manager using\
    \ the provided API Root and API Key.\n2. **File Submission:** It reads the file\
    \ from the provided 'File Path' and performs a POST request to the Symantec Content\
    \ Analysis API to initiate a scan.\n3. **Score Parsing:** The action extracts\
    \ the file reputation score from the API response.\n4. **Insight Generation:**\
    \ \n    * If the score is between 2 and 6, it creates a 'File Found as Suspicious'\
    \ insight.\n    * If the score is between 7 and 10, it creates a 'File Found as\
    \ Malicious' insight.\n5. **Completion:** The action concludes by returning the\
    \ reputation score and a summary message."
