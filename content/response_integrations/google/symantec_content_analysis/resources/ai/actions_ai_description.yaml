Submit File:
  action_product_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action uploads a file to an analysis engine (Symantec Content Analysis)
      and returns a reputation score. This directly aligns with the 'Submit File'
      category.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: true
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: "### General Description\nThis action uploads a file from a specified\
    \ local path to the Symantec Content Analysis service for security scanning and\
    \ reputation analysis. It is designed to determine if a file is malicious or suspicious\
    \ by leveraging Symantec's analysis engine. The action retrieves a reputation\
    \ score and provides immediate feedback within the case by creating insights.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| File Path | String | Yes | The full local path\
    \ to the file that should be uploaded and scanned. |\n\n### Flow Description\n\
    1. **Configuration Retrieval**: The action initializes the Symantec Content Analysis\
    \ manager using the provided API Root and API Key.\n2. **File Submission**: It\
    \ reads the file from the provided `File Path` and performs a POST request to\
    \ the Symantec `rapi/cas/scan` endpoint.\n3. **Score Extraction**: The action\
    \ waits for the scan results (with a 5-minute timeout) and extracts the `file_reputation_score`\
    \ from the API response.\n4. **Insight Creation**: \n    * If the score is between\
    \ 2 and 6, a 'File Found as Suspicious' insight is created.\n    * If the score\
    \ is between 7 and 10, a 'File Found as Malicious' insight is created.\n5. **Completion**:\
    \ The action ends by returning the reputation score and a summary message to the\
    \ Google SecOps workbench."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the Symantec Content Analysis service for scanning, creating
      a new sample record on the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights within the Google SecOps platform based on the file reputation
      score.
    reasoning: >-
      The action performs a POST request to upload a file to an external service (Symantec
      Content Analysis), which constitutes an external data mutation. It fetches a
      reputation score from the response (fetches data). It also creates case insights
      within the SOAR platform based on the results (internal mutation).
  categories:
    enrichment: false
    reasoning: >-
      While the action fetches data (reputation score), it also creates data on an
      external system (uploads a file for scanning). According to the enrichment criteria,
      an action must not create, update, or delete data in any external platform to
      be classified as enrichment. Therefore, this action is not an enrichment action.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not operate on entities. It takes a file path as a parameter
      and performs the scan on that file, rather than iterating over `target_entities`.
