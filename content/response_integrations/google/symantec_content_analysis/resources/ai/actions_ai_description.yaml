    Tests connectivity to the Symantec Content Analysis service.


    ### General Description

    This action tests the connection to the Symantec Content Analysis service by making
    a simple API request to the pattern groups endpoint. It is used to verify that
    the integration is configured correctly and the service is reachable.


    ### Parameters Description

    This action does not require any parameters.


    ### Flow Description

    1. Initialize the connection to the Symantec Content Analysis service using the
    provided configuration.

    2. Send a GET request to the pattern groups endpoint to test connectivity.

    3. Return a success message if the connection is established, or a failure message
    otherwise.
