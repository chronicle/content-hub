Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Symantec Content Analysis server. Its primary purpose
    is to ensure that the integration's configuration parameters (API Root and API
    Key) are correct and that the server is reachable over the network.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Symantec Content Analysis server
    (configured in the integration settings). |

    | API Key | String | Yes | The API token used for authentication (configured in
    the integration settings). |

    | Verify SSL | Boolean | Yes | Determines whether to validate the SSL certificate
    of the target server (configured in the integration settings). |


    ### Additional Notes

    This action does not accept any input parameters directly and does not process
    any entities. It relies entirely on the integration's global configuration.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration, including
    the API Root, API Key, and SSL verification preference.

    2. **Manager Setup**: It initializes the `SymantecContentAnalysisManager` with
    the provided credentials.

    3. **API Call**: The action executes a `GET` request to the `rapi/pattern_groups`
    endpoint on the Symantec Content Analysis server.

    4. **Validation**: It validates the HTTP response status. If the request is successful
    (2xx status code), the connectivity is confirmed.

    5. **Final Output**: The action returns a success message ('Connection Established')
    or a failure message ('Connection Failed') based on the API response.
