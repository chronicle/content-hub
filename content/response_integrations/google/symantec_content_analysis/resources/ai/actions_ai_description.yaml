    get_alert_information: false
    reasoning: >-
      This is a diagnostic action used to test connectivity. It does not perform any
      of the defined product category operations (enrichment, containment, ticketing,
      etc.).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Symantec Content Analysis server. It ensures that the provided
    API Root and API Key are valid and that the network path is open.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (API Root, API Key, and Verify SSL).


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration's global settings,
    including the API Root, API Key, and SSL verification preference.

    2. **Manager Initialization**: It initializes the `SymantecContentAnalysisManager`
    with the retrieved credentials.

    3. **Connectivity Test**: The manager executes a `GET` request to the `rapi/pattern_groups`
    endpoint of the Symantec Content Analysis API.

    4. **Validation**: The action validates the HTTP response. If the status code
    indicates success, it confirms the connection.

    5. **Result Reporting**: The action outputs 'Connection Established' on success
    or 'Connection Failed' if an error occurs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity. It does not mutate
      external or internal data, nor does it update entities or create insights. It
      is a diagnostic tool.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action, which is explicitly excluded from enrichment
      classification per the provided instructions.
