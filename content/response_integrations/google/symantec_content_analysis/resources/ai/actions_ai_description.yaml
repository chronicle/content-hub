Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Content Analysis API. This action verifies
    that the integration is configured correctly and can successfully communicate
    with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the Symantec Content Analysis manager.

    3. Makes an HTTP GET request to the `rapi/pattern_groups` endpoint to verify API
    access and credentials.

    4. Returns a success message if the connection is established, or a failure message
    if it is not.


    ### Additional Notes

    This action is typically used as a diagnostic tool to ensure that the integration's
    connection settings are valid and the Symantec Content Analysis server is reachable.
