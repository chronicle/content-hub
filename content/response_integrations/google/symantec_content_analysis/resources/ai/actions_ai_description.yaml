Get Hash Report:
  ai_description: >-
    ### General Description

    Retrieves sample reports for file hash entities (MD5 and SHA256) from Symantec
    Content Analysis and enriches the entities with the retrieved data.


    ### Flow Description

    1. Filters the target entities to include only File Hash entities.

    2. Iterates through the filtered entities and makes a GET request to the Symantec
    Content Analysis API (`rapi/samples/basic`) to fetch sample reports for each hash.

    3. If a report is found, it constructs a CSV table and attaches it to the entity.

    4. Enriches the entity's additional properties with the report data.

    5. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    Supports MD5 and SHA256 hashes. Hashes of other lengths will result in an error.
  ai_short_description: >-
    Retrieves sample reports for file hash entities (MD5 and SHA256) from Symantec
    Content Analysis and enriches the entities with the results.
