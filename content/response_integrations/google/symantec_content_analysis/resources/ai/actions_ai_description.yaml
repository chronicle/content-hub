Submit File:
  ai_description: "Submits a file to Symantec Content Analysis for scanning and analysis.\
    \ This action uploads a file from a specified local path to the Symantec service,\
    \ retrieves the resulting reputation score, and generates case insights based\
    \ on the severity of the findings.\n\n### Flow Description\n1. **Configuration\
    \ Retrieval:** The action initializes the Symantec Content Analysis manager using\
    \ the provided API Root and API Key.\n2. **File Submission:** It reads the file\
    \ from the provided 'File Path' and performs a POST request to the Symantec Content\
    \ Analysis API to initiate a scan.\n3. **Score Parsing:** The action extracts\
    \ the file reputation score from the API response.\n4. **Insight Generation:**\
    \ \n    * If the score is between 2 and 6, it creates a 'File Found as Suspicious'\
    \ insight.\n    * If the score is between 7 and 10, it creates a 'File Found as\
    \ Malicious' insight.\n5. **Completion:** The action concludes by returning the\
    \ reputation score and a summary message.\n\n### Parameters Description\n| Parameter\
    \ Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| File\
    \ Path | string | True | The local file system path of the file to be uploaded\
    \ and scanned. |\n\n### Additional Notes\n* This action does not process SecOps\
    \ entities; it operates strictly on the file path provided in the parameters.\n\
    * The action includes a timeout mechanism (defaulting to 5 minutes) for the file\
    \ submission process."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Symantec Content Analysis service for scanning, which
      creates a new analysis record in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights within Google SecOps based on the reputation score returned
      by the external service.
