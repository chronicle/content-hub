      adds an entity table.
    reasoning: >-
      The action fetches data from Symantec Content Analysis using a GET request.
      It does not mutate any external data. It mutates internal data by updating the
      entity's additional properties and adding an entity table. It does not create
      insights, modify alert data, or create case comments.
