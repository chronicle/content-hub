  ai_description: >-
    ### General Description

    Retrieves sample reports for MD5 and SHA256 file hashes from Symantec Content
    Analysis. This action fetches threat intelligence and context for file hash entities
    and enriches them within the SecOps platform.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Filters the target entities to include only `FILEHASH` entities.

    2. Iterates through the filtered entities and queries Symantec Content Analysis
    for sample reports using the hash identifier.

    3. If a report is found, it adds the report as a data table to the entity.

    4. Enriches the entity's `additional_properties` with the report data.

    5. Updates the successfully enriched entities in the SecOps platform.
