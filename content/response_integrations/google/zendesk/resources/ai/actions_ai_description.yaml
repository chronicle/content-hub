Add Comment To Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to an existing Zendesk ticket. This action allows analysts to append
    information, updates, or internal notes to a specific ticket within the Zendesk
    platform, facilitating communication and documentation directly from the SOAR
    environment.


    ### Flow Description

    1. The action extracts configuration parameters (User Email, API Token, Server
    Address) and action parameters (Ticket ID, Comment Body, Author Name, Internal
    Note) from the environment.

    2. The `ZendeskManager` is initialized with the provided credentials to establish
    a session with the Zendesk API.

    3. The action calls the `add_comment_to_ticket` method, which performs the following
    steps:
        * Executes a `GET` request to retrieve the current details of the specified
    ticket.
        * Constructs a `PUT` request payload containing the new comment body, author
    information, and visibility settings (public or internal).
        * Executes the `PUT` request to update the ticket in Zendesk.
    4. The action returns a success or failure message based on the API response.


    ### Additional Notes

    The 'Internal Note' parameter determines the visibility of the comment. If checked,
    the comment is added as an internal note (private); if unchecked, it is added
    as a public comment.
  ai_short_description: >-
    Adds a comment to an existing Zendesk ticket.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an existing Zendesk ticket by adding a comment.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches ticket details via GET (fetches_data=true) and performs a
      PUT request to update the ticket in Zendesk (can_mutate_external_data=true).
      It does not modify internal SecOps data or entities.
