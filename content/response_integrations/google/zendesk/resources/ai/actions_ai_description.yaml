Apply Macros On Ticket:
  ai_description: >-
    ### General Description

    Applies a predefined macro to a specific Zendesk ticket. This action automates
    the process of updating ticket properties (such as status, tags, or comments)
    based on a configured macro within the Zendesk platform.


    ### Flow Description

    1. Retrieve the Zendesk configuration (User Email, API Token, Server Address)
    to initialize the `ZendeskManager`.

    2. Extract the `Ticket ID` and `Macro Title` from the action parameters.

    3. Call the `get_macro_id_by_name` method (GET request) to retrieve the unique
    identifier for the specified macro.

    4. Call the `apply.json` endpoint (GET request) to preview the changes that the
    macro would apply to the ticket.

    5. Perform a PUT request to the Zendesk tickets endpoint (`/tickets/{ticket_id}.json`)
    to apply the macro changes to the ticket.

    6. Terminate the action with a success or failure message based on the outcome
    of the API request.


    ### Additional Notes

    This action modifies the state of an existing ticket in Zendesk. Ensure the provided
    `Macro Title` exists in the Zendesk instance, or the action will fail.
  ai_short_description: >-
    Applies a predefined macro to a specific Zendesk ticket.
