Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket's details in Zendesk. This action allows users to modify
    various ticket properties such as subject, assigned user, assignment group, priority,
    ticket type, tags, and status. It also supports appending an additional public
    or internal comment to the ticket.


    ### Flow Description

    1. Extracts the provided ticket ID and the fields to be updated (e.g., Subject,
    Priority, Status).

    2. Initializes the Zendesk API client.

    3. Makes a GET request to retrieve the current ticket details.

    4. Makes a PUT request to the Zendesk API to update the ticket with the new values.

    5. If an additional comment is provided, makes another PUT request to append the
    comment to the ticket.


    ### Additional Notes

    The action requires a valid Ticket ID. If an assigned user or assignment group
    is provided, the action will first resolve their respective IDs via the Zendesk
    API before updating the ticket.
