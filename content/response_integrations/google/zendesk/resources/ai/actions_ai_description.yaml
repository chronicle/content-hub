Get Ticket Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for a specific Zendesk ticket, including metadata,
    conversation history (comments), and associated file attachments. This action
    provides visibility into the ticket's current state and history without modifying
    the ticket itself.


    ### Flow Description

    1. The action extracts the required configuration parameters (User Email Address,
    API Token, Server Address) and the target Ticket ID.

    2. It initializes the `ZendeskManager` to establish a connection to the Zendesk
    API.

    3. The action calls `get_ticket_details` to retrieve the primary ticket metadata.

    4. It calls `get_ticket_comments` to fetch the conversation history, which is
    then formatted into a CSV data table and added to the action results.

    5. It calls `get_attachments_from_ticket` to retrieve any files attached to the
    ticket, which are then added as attachments to the action result.

    6. Finally, the ticket metadata is serialized to JSON and added to the action
    results, and the action concludes with a success or failure message.


    ### Additional Notes

    This action is strictly read-only and does not perform any mutations on the Zendesk
    platform or internal SecOps data.
