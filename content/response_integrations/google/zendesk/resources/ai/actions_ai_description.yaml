Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in the Zendesk ticketing system with specified details such
    as subject, description, priority, and assignment. This action allows for the
    configuration of ticket metadata, including tags, ticket type, and internal notes,
    and supports adding email CCs to the ticket notification list.


    ### Flow Description

    1. The action extracts configuration parameters (User Email, API Token, Server
    Address) and action parameters (Subject, Description, etc.).

    2. It validates the format of any provided 'Email CCs' using a regular expression.

    3. If the 'Validate Email CCs' parameter is enabled, the action performs a GET
    request to the Zendesk API (`/users.json`) to retrieve existing user email addresses
    and verifies that the provided CC emails exist in the system.

    4. The action calls the `create_ticket` method, which executes a POST request
    to the Zendesk API (`/tickets.json`) with the provided ticket details.

    5. Upon successful creation, the action returns the new ticket ID as the result.


    ### Additional Notes

    The action supports optional assignment, priority, ticket type, and tagging. If
    'Validate Email CCs' is enabled, the action will fail if any provided CC email
    is not found in the Zendesk user list.
  ai_short_description: >-
    Creates a new ticket in Zendesk with configurable properties like subject, description,
    priority, and assignment.
