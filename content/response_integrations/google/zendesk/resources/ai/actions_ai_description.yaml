Update Ticket:
  ai_description: >-
    ### General Description

    Updates an existing ticket in Zendesk. This action allows users to modify various
    ticket attributes such as subject, assignee, priority, ticket type, tags, and
    status. Additionally, it supports appending comments to the ticket, with options
    to specify whether the comment is public or internal.


    ### Flow Description

    1. The action extracts the required configuration parameters (User Email Address,
    API Token, Server Address) to authenticate with the Zendesk API.

    2. It extracts the action parameters, including the mandatory `Ticket ID` and
    optional fields like `Subject`, `Assigned User`, `Assignment Group`, `Priority`,
    `Ticket Type`, `Tag`, `Status`, `Additional Comment`, and `Internal Note`.

    3. The action initializes the `ZendeskManager` to handle API interactions.

    4. It calls the `update_ticket` method, which performs a GET request to retrieve
    current ticket details, followed by a PUT request to apply the specified updates
    to the ticket in Zendesk.

    5. If an `Additional Comment` is provided, the action calls the `add_comment_to_ticket`
    method, which performs a PUT request to append the comment to the ticket's conversation
    history.

    6. The action returns a success or failure message based on the outcome of the
    API requests.


    ### Additional Notes

    This action requires valid Zendesk credentials (email and API token) and a valid
    `Ticket ID` to function correctly. The `Internal Note` parameter determines the
    visibility of the added comment; if checked, the comment is internal, otherwise,
    it is public.
  ai_short_description: >-
    Updates an existing ticket in Zendesk by modifying its fields and optionally appending
    a public or internal comment.
