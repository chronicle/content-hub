Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Zendesk platform to ensure that the integration is configured
    correctly and can communicate with the Zendesk API.


    ### Flow Description

    1. Retrieves the Zendesk integration configuration parameters (User Email Address,
    API Token, Server Address).

    2. Initializes the Zendesk API client.

    3. Makes an HTTP GET request to the Zendesk `/api/v2/tickets.json` endpoint to
    verify authentication and network connectivity.

    4. Returns a success message and a `true` result if the connection is established,
    or a failure message and `false` otherwise.


    ### Additional Notes

    This action is typically used during the initial setup of the Zendesk integration
    to validate credentials and network access.
