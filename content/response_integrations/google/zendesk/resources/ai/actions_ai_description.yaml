Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Zendesk instance by attempting to retrieve a list of
    tickets.


    ### Flow Description

    1. Initialize the `ZendeskManager` using the configured credentials (User Email,
    API Token, Server Address).

    2. Execute the `test_connectivity` method.

    3. The `test_connectivity` method calls the `get_tickets` function, which performs
    a GET request to the Zendesk API (`/tickets.json`).

    4. If the API returns a valid response (tickets are retrieved), the connection
    is considered successful.

    5. The action concludes by outputting the connection status ('Connection Established'
    or 'Connection Failed') and a boolean result.


    ### Additional Notes

    This action is used to verify that the integration configuration is correct and
    that the SOAR platform can communicate with the Zendesk API.
