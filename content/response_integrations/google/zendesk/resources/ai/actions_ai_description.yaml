Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Zendesk with specific properties such as subject, description,
    assignee, priority, and tags.


    ### Flow Description

    1. Extracts action parameters including subject, description, and optional fields
    like assigned user, priority, and email CCs.

    2. Validates the format of the provided email CCs.

    3. If the `Validate Email CCs` parameter is enabled, makes a GET request to the
    Zendesk API to verify that the provided email addresses exist in the system.

    4. Makes a POST request to the Zendesk API to create a new ticket with the specified
    details.

    5. Returns the newly created ticket ID.


    ### Additional Notes

    The action can optionally validate if the provided email CCs exist in Zendesk
    before creating the ticket. If validation fails, the action will fail.
