Apply Macros On Ticket:
  ai_description: >-
    ### General Description

    Applies a specified macro to an existing Zendesk ticket. This action modifies
    the ticket's properties or adds comments based on the predefined macro configuration
    in Zendesk.


    ### Flow Description

    1. Retrieves the macro ID by its title from Zendesk.

    2. Simulates applying the macro to the ticket to retrieve the updated ticket data
    via a GET request to the Zendesk API.

    3. Updates the ticket with the new data via a PUT request to the Zendesk API to
    finalize the macro application.


    ### Additional Notes

    Requires a valid Ticket ID and Macro Title.
