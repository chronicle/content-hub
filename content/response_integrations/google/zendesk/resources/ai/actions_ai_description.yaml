Add Comment To Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to an existing ticket in Zendesk.


    ### Flow Description

    1. Extracts the Ticket ID, Comment Body, Author Name, and Internal Note parameters.

    2. Initializes the Zendesk API client.

    3. Retrieves the current ticket details via a GET request to the Zendesk API.

    4. Appends the new comment to the ticket data and sends a PUT request to the Zendesk
    API to update the ticket.

    5. Returns a success message if the comment was added successfully.


    ### Additional Notes

    The comment can be set as public or internal based on the 'Internal Note' parameter.
