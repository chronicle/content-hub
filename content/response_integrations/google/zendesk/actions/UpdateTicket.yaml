name: Update Ticket
description: Update existing ticket details
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zendesk#update_ticket
integration_identifier: Zendesk
parameters:
-   name: Ticket ID
    type: string
    description: Ticket number.
    is_mandatory: true
-   name: Subject
    type: string
    description: The subject of the ticket.
    is_mandatory: false
-   name: Assigned User
    type: string
    description: User full name.
    is_mandatory: false
-   name: Assignment Group
    type: string
    description: Group name.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: 'Priority will be one of the following: urgent, high, normal or low.'
    is_mandatory: false
-   name: Ticket Type
    default_value: ''
    type: string
    description: 'The ticket type will be one of the following: problem, incident,
        question or task.'
    is_mandatory: false
-   name: Tag
    default_value: ''
    type: string
    description: Tag to add to the ticket.
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: 'The status will be one of the following: new, open, pending, hold,
        solved or closed.'
    is_mandatory: false
-   name: Internal Note
    default_value: 'False'
    type: boolean
    description: Specify whether the comment should be public, or internal. Unchecked
        means it will be public, checked means it will be internal only.
    is_mandatory: false
-   name: Additional Comment
    default_value: ''
    type: string
    description: If you want to add a comment to the ticket, specify the text you
        would like to add as a comment here.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
script_result_name: is_updated
