name: Add Comment To Ticket
description: Add a comment to an existing ticket
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zendesk#add_comment_to_ticket
integration_identifier: Zendesk
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify the Zendesk Ticket ID for which you would like to add a comment.
    is_mandatory: true
-   name: Comment Body
    default_value: ''
    type: content
    description: Provide the text you would like to be contained in the comment body
    is_mandatory: true
-   name: Author Name
    default_value: ''
    type: string
    description: Specify the name of the author, please make sure this name exists
        on Zendesk
    is_mandatory: false
-   name: Internal Note
    default_value: ''
    type: boolean
    description: Specify whether the comment should be public, or internal. Unchecked
        means it will be public, checked means it will be internal only.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
