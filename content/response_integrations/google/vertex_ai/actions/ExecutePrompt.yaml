name: Execute Prompt
description: Use the Execute Prompt action to execute individual text prompts using
    Vertex AI.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vertex-ai#execute_prompt
integration_identifier: VertexAI
parameters:
-   name: Model ID
    default_value: ''
    type: string
    description: The ID of the model to use, such as gemini-1.5-flash-002.
    is_mandatory: false
-   name: Publisher Name
    default_value: ''
    type: string
    description: The name of the publisher for the model.
    is_mandatory: false
-   name: Text Prompt
    default_value: ''
    type: string
    description: The text instructions to include in the prompt.
    is_mandatory: true
-   name: Temperature
    default_value: ''
    type: string
    description: The value to control the degree of randomness in a token selection.
        This parameter accepts float data type values. For more information about
        temperature values, see "Experiment with the parameter values" (https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/adjust-parameter-values#temperature).
    is_mandatory: false
-   name: Candidate Count
    default_value: ''
    type: string
    description: The number of response variations to return in every action run.
        For every request, the billing applies to an input token once and every output
        token of all generated candidates.
    is_mandatory: false
-   name: Response MIME type
    default_value: text/plain
    type: ddl
    optional_values:
    - application/json
    - text/plain
    - text/x.enum
    description: 'The media (MIME) type of the output response for the generated candidate
        text. The response media (MIME) type is available for the following models:
        gemini-1.5-pro, gemini-1.5-flash.'
    is_mandatory: false
-   name: Response Schema
    default_value: ''
    type: string
    description: 'The schema for the generated candidate text to follow. To use this
        parameter, configure the "Response mIME Type" parameter. The response schema
        is available for the following models: gemini-1.5-pro, gemini-1.5-flash.'
    is_mandatory: false
-   name: Max Input Tokens
    default_value: ''
    type: string
    description: The maximum number of input tokens to submit. One token consists
        of up to four characters. 100 tokens can correspond to 60-80 words. If you
        don’t set a value, the action executes any prompt. If the number of tokens
        exceeds the configured maximum number, the action fails.
    is_mandatory: false
-   name: Max Output Tokens
    default_value: ''
    type: string
    description: The maximum number of output tokens to generate in every response.
        A token is approximately four characters. 100 tokens correspond to roughly
        60-80 words. For more information, see "Experiment with parameter values"
        (https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/adjust-parameter-values#max-output-tokens).
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_prompt_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
