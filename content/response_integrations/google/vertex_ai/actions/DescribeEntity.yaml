name: Describe Entity
description: Preview. Use the Describe Entity action to summarize information about
    entities using Vertex AI. This action works with all entity types. and submits
    every entity individually.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vertex-ai#describe_entity
integration_identifier: VertexAI
parameters:
-   name: Model ID
    default_value: ''
    type: string
    description: The ID of the model to use, such as gemini-1.5-flash-002.
    is_mandatory: false
-   name: Publisher Name
    default_value: ''
    type: string
    description: The name of the publisher for the model.
    is_mandatory: false
-   name: Temperature
    default_value: ''
    type: string
    description: The value to control the degree of randomness in a token selection.
        This parameter accepts float data type values. For more information about
        temperature values, see "Experiment with the parameter values" (https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/adjust-parameter-values#temperature).
    is_mandatory: false
-   name: Exclude Fields
    default_value: ''
    type: string
    description: A comma-separated list of the Google SecOps entity metadata fields
        to exclude during the entity summary generation.
    is_mandatory: false
-   name: Force Refresh
    default_value: 'False'
    type: boolean
    description: If selected, the action ignores the "Refresh After (Days)" parameter
        and hash validation and regenerates the entity summary for every action run.
    is_mandatory: false
-   name: Refresh After (Days)
    default_value: '30'
    type: string
    description: The number of days for the action to wait before refreshing the entity
        summary. The action generates a hash value that is based on all inputs that
        are sent to Vertex AI excluding values from the "Fields To Ignore" parameter.
        If the hash value changed, the action refreshes the summary after the set
        number of days. If the hash value didn’t change, the action doesn’t refresh
        the summary even if the "Refresh After (Days)" parameter value is earlier
        than the latest summary generation time. The action validates the hash value
        of the latest actual generated summary and ignores the cached hash value.
    is_mandatory: true
-   name: Max Output Tokens
    default_value: ''
    type: string
    description: The maximum number of output tokens to generate in every response.
        A token is approximately four characters. 100 tokens correspond to roughly
        60-80 words. This limit applies to every individual entity. For more information,
        see "Experiment with parameter values" (https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/adjust-parameter-values#max-output-tokens).
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/describe_entity_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "ALERT", "APPLICATION", "CHILDHASH",
