    "FILENAME", "GENERICENTITY", "HOSTNAME", "IPSET", "MacAddress", "PARENTHASH",
    "PARENTPROCESS", "PHONENUMBER", "POD", "PROCESS", "SERVICE", "SOURCEDOMAIN", "THREATACTOR",
    "THREATCAMPAIGN", "THREATSIGNATURE", "DestinationURL", "USB", "USERUNIQNAME"]}'
