[project]
name = "vertex_ai"
version = "7.0"
description = "Vertex AI is a fully-managed, unified AI development platform for building and using generative AI."
requires-python = ">=3.11,<3.12"
dependencies = [ "tipcommon",]

[dependency-groups]
dev = [ "pytest-mock", "integration-testing", "environmentcommon", "pytest>=9.1.0", "pytest-json-report>=1.5.0", "soar-sdk", "pyyaml",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.1-py2.py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.1-py3-none-any.whl"
