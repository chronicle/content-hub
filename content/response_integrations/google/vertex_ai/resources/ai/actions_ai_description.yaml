Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility
    designed to verify the connectivity between Google SecOps and the Vertex AI service.
    It validates that the integration's configuration parameters—such as the API Root,
    Project ID, and authentication credentials—are correctly set up and that the Vertex
    AI API is reachable.\n\n### Parameters\nThis action does not have any action-specific
    parameters. It utilizes the following integration configuration parameters to
    perform the connectivity test:\n\n| Parameter | Type | Mandatory | Description
    |\n| :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL for
    the Vertex AI API (e.g., https://us-central1-aiplatform.googleapis.com). |\n|
    Location ID | String | No | The GCP region. If not provided, it is extracted from
    the API Root. |\n| Default Model | String | Yes | The ID of the model used to
    test the connection. |\n| Publisher Name | String | Yes | The name of the model
    publisher (e.g., 'google' or 'anthropic'). |\n\n### Additional Notes\n* This action
    is strictly for connectivity testing and does not process any alert or entity
    data.\n* It requires valid Google Cloud credentials (Service Account JSON or Workload
    Identity) configured at the integration level.\n\n### Flow Description\n1. **Authentication**:
    The action initializes the `AuthManager` to prepare an authorized session using
    the provided GCP credentials.\n2. **Parameter Extraction**: It retrieves the `Default
    Model` and `Publisher Name` from the integration's configuration.\n3. **Connectivity
    Test**: The action calls the `test_connectivity` method in the `ApiManager`, which
    executes a `GET` request to the Vertex AI `publishers.models.get` endpoint.\n
    4. **Result Handling**: If the API call is successful, the action returns a success
    message. If the request fails (e.g., due to authentication errors or network issues),
    it raises a `VertexAIManagerException` with the relevant error details."
