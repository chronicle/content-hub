Execute Prompt:
  ai_description: >-
    ### General Description

    Executes a text prompt using Google Vertex AI models (e.g., Gemini). This action
    allows users to interact with Large Language Models (LLMs) to perform tasks such
    as summarization, analysis, or data extraction based on a provided text instruction.
    It supports various model parameters to control the output's creativity, format,
    and length.



    ### Flow Description

    1. **Initialization**: Extracts and validates all input parameters, ensuring types
    like floats and JSON strings are correctly formatted.

    2. **Token Validation**: If a `Max Input Tokens` limit is set, the action calls
    the Vertex AI API to count the tokens in the prompt. If the count exceeds the
    limit, the action terminates with an error.

    3. **API Interaction**: Constructs a request with the prompt and generation configuration
    (temperature, candidate count, etc.) and sends it to the Vertex AI service.

    4. **Response Handling**: Receives the generated content from the model, parses
    the text and metadata, and populates the action's JSON results for use in subsequent
    playbook steps.


    ### Additional Notes

    This action is a utility and does not process or enrich specific SecOps entities
    (like IPs or Hostnames) automatically; it operates solely on the provided text
    prompt.
