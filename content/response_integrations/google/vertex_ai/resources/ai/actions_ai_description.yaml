    the AI model. |

    | **Model ID** | String | No | The specific identifier of the model to use (e.g.,
    `gemini-1.5-flash-002`). If not provided, the default model from the integration
    configuration is used. |

    | **Publisher Name** | String | No | The name of the model publisher (e.g., `google`,
    `anthropic`). |

    | **Temperature** | Float | No | Controls the degree of randomness in token selection.
    Higher values increase creativity, while lower values make the output more deterministic.
    |

    | **Candidate Count** | Integer | No | The number of response variations to return
    for the prompt. |

    | **Response MIME type** | Enum | No | The media type of the output response (e.g.,
    `text/plain`, `application/json`). |

    | **Response Schema** | JSON | No | A JSON schema that the generated text should
    follow. Requires the Response MIME type to be configured. |

    | **Max Input Tokens** | Integer | No | The maximum number of input tokens allowed.
    The action will fail if the prompt exceeds this threshold. |

    | **Max Output Tokens** | Integer | No | The maximum number of tokens to generate
    in the response. |
