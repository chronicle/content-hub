Describe Entity:
  ai_description: >-
    ### General Description

    The **Describe Entity** action utilizes Google Vertex AI to generate concise,
    human-readable summaries of security entities. It processes metadata associated
    with any entity type (e.g., IP addresses, hostnames, file hashes) and uses generative
    AI to provide a high-level overview of the entity's context and attributes within
    the environment.


    ### Flow Description

    1. Extracts action parameters including model configuration and caching preferences.

    2. Iterates over the target entities provided in the action scope.

    3. Retrieves the full metadata for each target entity from Google SecOps.

    4. Flattens the metadata and removes fields specified in the 'Exclude Fields'
    parameter or the internal default exclusion list.

    5. Calculates a unique hash for the entity data and checks the internal SOAR context
    for a valid, non-expired summary cache.

    6. If no valid cache exists, sends a request to the Vertex AI API (`generateContent`
    or `rawPredict`) with the entity data to generate a summary.

    7. Saves the generated summary to the internal cache.

    8. Returns the summary and usage metadata in the action's JSON result.


    ### Additional Notes

    - This action implements an internal caching mechanism using the SOAR context
    to minimize API usage and improve performance.

    - The cache is validated using a hash of the entity's metadata; if the metadata
    changes (excluding ignored fields), the summary will be regenerated regardless
    of the 'Refresh After' setting.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the internal SOAR context cache to store generated entity
      summaries, optimizing performance and reducing redundant API calls to Vertex
      AI.
