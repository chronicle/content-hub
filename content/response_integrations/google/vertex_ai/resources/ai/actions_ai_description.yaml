Transform Data:
  ai_description: >-
    ### General Description

    The **Transform Data** action leverages Google Vertex AI's generative models to
    perform structured data transformations. It takes a raw JSON object and a set
    of natural language instructions (Text Prompt) to produce a new, transformed JSON
    output. This action is designed for utility tasks such as reformatting data, extracting
    specific fields, or normalizing values between different system formats within
    a playbook flow.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the model configuration, the
    text prompt, and the input JSON object from the action parameters.

    2. **Validation**: It validates that the input JSON is well-formed and that numerical
    parameters like Temperature and Max Output Tokens are valid.

    3. **Data Preparation**: The input JSON object is serialized and base64-encoded
    to be sent as inline data within the prompt structure.

    4. **API Interaction**: The action sends a request to the Vertex AI API (using
    either `generateContent` or `rawPredict` depending on the publisher) containing
    the instructions and the encoded data.

    5. **Result Processing**: The model's response is parsed as JSON and stored in
    the action's results for use in subsequent playbook steps.


    ### Additional Notes

    - This action does not operate on SecOps entities; it processes the specific JSON
    object provided in the parameters.

    - The output is explicitly requested in `application/json` format via the generation
    configuration.
