Analyze EML:
  ai_description: "### General Description\nThe **Analyze EML** action leverages Google
    Vertex AI to perform deep security analysis on EML (Email) files. It is designed
    to identify potential threats such as phishing links, malicious attachments, and
    social engineering tactics by processing the raw email content through a generative
    AI model. The action returns a structured analysis including threat levels, specific
    findings, and recommended verification steps.\n\n### Parameters\n| Parameter |
    Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Model ID**
    | String | No | The specific Vertex AI model to use (e.g., `gemini-1.5-flash-002`).
    If not provided, the default model from the integration configuration is used.
    |\n| **Publisher Name** | String | No | The name of the model publisher. Defaults
    to the integration's configured publisher. |\n| **Temperature** | Float | No |
    Controls the randomness of the AI's output. Higher values increase creativity,
    while lower values make the output more deterministic. |\n| **Files To Analyze**
    | String | Yes | A comma-separated list of full file paths to the EML files that
    need analysis. |\n| **Max Output Tokens** | Integer | No | The maximum length
    of the generated response per file. |\n\n### Flow Description\n1. **Parameter
    Extraction**: The action retrieves the model configuration and the list of files
    to be analyzed from the action parameters.\n2. **Validation**: It validates the
    file list format and ensures numerical parameters (Temperature, Max Tokens) are
    within valid ranges.\n3. **File Processing**: The action iterates through each
    provided file path, reads the file from the local system, and Base64 encodes the
    content.\n4. **AI Analysis**: For each file, a specialized security analyst prompt
    is constructed and sent to the Vertex AI API along with the encoded EML data.
    The prompt instructs the AI to identify phishing, malware, and social engineering
    risks.\n5. **Result Aggregation**: The AI's response—containing a threat level
    (Critical to None), identified threats, and protection measures—is parsed and
    aggregated into a structured JSON result for the SOAR platform.\n\n### Additional
    Notes\nThis action does not automatically process entities from the case; it requires
    explicit file paths provided in the 'Files To Analyze' parameter. If a file is
    not found at the specified path, the action logs an error for that specific file
    but continues processing others."
  capabilities:
