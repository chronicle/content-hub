Describe Entity:
  ai_description: >-
    ### General Description

    The **Describe Entity** action utilizes Google Vertex AI to generate concise,
    human-readable summaries of security entities. It processes metadata associated
    with any entity type (e.g., IP addresses, hostnames, file hashes) and uses generative
    AI to provide a high-level overview of the entity's context and attributes within
    the environment.



    ### Additional Notes

    - This action implements an internal caching mechanism using the SOAR context
    to minimize API usage and improve performance.

    - The cache is validated using a hash of the entity's metadata; if the metadata
    changes (excluding ignored fields), the summary will be regenerated regardless
    of the 'Refresh After' setting.


    ### Flow Description

    1. **Metadata Extraction**: The action retrieves the full metadata for the target
    entity from Google SecOps.

    2. **Data Cleaning**: It flattens the metadata and removes fields specified in
    the 'Exclude Fields' parameter or the internal default exclusion list.

    3. **Cache Lookup**: It calculates a unique hash for the entity data and checks
    the internal SOAR context for a valid, non-expired summary.

    4. **AI Processing**: If no valid cache exists, the cleaned metadata is base64-encoded
    and sent to Vertex AI with a prompt to generate a concise summary.

    5. **Result Storage**: The generated summary is saved to the internal cache and
    returned as the action's output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the internal SOAR context cache to store generated entity
      summaries, optimizing performance and reducing redundant API calls to Vertex
      AI.
