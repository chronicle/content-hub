identifier: GoogleTranslate
name: Google Translate
parameters:
-   name: API Root
    default_value: https://translation.googleapis.com
    type: string
    description: API root of the Google Translate instance.
    is_mandatory: true
    integration_identifier: GoogleTranslate
-   name: API Key
    default_value: ''
    type: password
    description: API key of the Google Translate account.
    is_mandatory: true
    integration_identifier: GoogleTranslate
-   name: Verify SSL
    default_value: 'True'
    type: boolean
    description: If enabled, verifies that the SSL certificate for the connection
        to the Google Translate server is valid.
    is_mandatory: true
    integration_identifier: GoogleTranslate
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-translate
categories:
- Google
- Free to use
svg_logo_path: resources/logo.svg
image_path: resources/image.png
