Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Translate service using the provided configuration
    parameters. This action ensures that the integration is correctly configured and
    can communicate with the Google Translate API.


    ### Flow Description

    1. Extracts `API Root`, `API Key`, and `Verify SSL` from the integration configuration.

    2. Initializes the `GoogleTranslateManager` with the provided credentials and
    settings.

    3. Executes the `test_connectivity` method, which performs a `GET` request to
    the Google Translate API's languages endpoint (`/language/translate/v2/languages`)
    to verify the connection.

    4. Validates the API response.

    5. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This action does not perform any data translation or entity enrichment; it is
    strictly for verifying the integration's connectivity.
