List Languages:
  ai_description: >-
    ### General Description

    Retrieves a list of available languages supported by Google Translate. This action
    allows users to fetch and filter the supported languages based on specific criteria.


    ### Flow Description

    1. Extracts action parameters including filter key, filter logic, filter value,
    and the maximum number of records to return.

    2. Makes a GET request to the Google Translate API (`/language/translate/v2/languages`)
    to fetch the list of available languages.

    3. Applies the specified filtering logic (e.g., Equal, Contains) to the retrieved
    languages if a filter key and value are provided.

    4. Limits the results to the specified maximum number of records.

    5. Returns the filtered list of languages as a JSON object and populates a data
    table with the results.


    ### Additional Notes

    This action is useful as a utility step to dynamically retrieve supported languages
    before performing translation tasks.
  ai_short_description: >-
    Retrieves a list of available languages supported by Google Translate, with optional
    filtering capabilities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Google Translate API to fetch available
      languages (fetches_data=true). It does not mutate external data, update internal
      entities, create insights, or modify alert data.
