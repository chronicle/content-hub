  ai_description: >-
    ### General Description

    Tests connectivity to the Google Translate API using the parameters provided in
    the integration configuration page. This action ensures that the integration is
    properly configured and can communicate with the external service.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, API Key, Verify
    SSL).

    2. Initializes the Google Translate Manager.

    3. Makes a test API call to the Google Translate service to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies solely on the
    integration configuration parameters.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connectivity issues.
