    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Filter Key | ddl | No | Specify the key that needs to be used to filter languages.
    |

    | Filter Logic | ddl | No | Specify what filter logic should be applied. Filtering
    logic is working based on the value provided in the "Filter Key" parameter. |

    | Filter Value | string | No | Specify what value should be used in the filter.
    If "Equal" is selected, action will try to find the exact match among results
    and if "Contains" is selected, action will try to find results that contain that
    substring. If nothing is provided in this parameter, the filter will not be applied.
    Filtering logic is working based on the value provided in the "Filter Key" parameter.
    |

    | Max Records To Return | string | No | Specify how many records to return. If
    nothing is provided, action will return 50 records. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Translate API using the provided integration
    configuration parameters. This action ensures that the API key and network settings
    are correctly configured to communicate with the Google Translate service.


    ### Flow Description

    1. Extracts the API Root, API Key, and Verify SSL settings from the integration
    configuration.

    2. Initializes the Google Translate manager with the extracted credentials.

    3. Makes an HTTP GET request to the `/language/translate/v2/languages` endpoint
    to verify the API key and network connectivity.

    4. Returns a successful execution state if the connection is established and authenticated,
    or fails with an error message otherwise.


    ### Additional Notes

    This action is primarily used for verifying integration setup and does not process
    any entities, alerts, or case data.
