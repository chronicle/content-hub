  ai_description: >-
    ### General Description

    Translates a given text from a source language to a target language using the
    Google Translate API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Source Language | String | No | Specify the source language of the text. If
    nothing is provided, the action will detect the language automatically. |

    | Target Language | String | Yes | Specify the desired language to translate the
    text into. |

    | Text | String | Yes | Specify the text that needs to be translated. |


    ### Flow Description

    1. Extracts the provided text, source language, and target language parameters.

    2. Initializes the Google Translate API client.

    3. Sends a request to the Google Translate API to translate the text.

    4. Retrieves the translated text and attaches it to the action's JSON result.
