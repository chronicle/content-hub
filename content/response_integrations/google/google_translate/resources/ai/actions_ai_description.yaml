Translate Text:
  ai_description: >-
    ### General Description

    Translates text from a source language to a target language using the Google Translate
    API. This action allows users to input text and receive a translated version,
    facilitating communication or analysis of foreign language content within the
    SOAR platform.


    ### Flow Description

    1. The action initializes the `GoogleTranslateManager` using the provided API
    credentials and configuration settings.

    2. It extracts the required parameters: `Target Language` and `Text`, and the
    optional `Source Language`.

    3. The action calls the `translate_text` method, which performs a POST request
    to the Google Translate API endpoint with the provided text and language settings.

    4. The API returns the translated text.

    5. The action adds the resulting translation JSON to the action output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a utility operation and does not modify any external system state
    or internal SOAR case data. It purely performs a translation computation.
