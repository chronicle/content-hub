Translate Text:
  ai_description: >-
    ### General Description

    Translates text using Google Translate. This action takes a specific text and
    translates it from a source language to a target language using the Google Translate
    API.


    ### Flow Description

    1. Extracts the provided action parameters: Source Language, Target Language,
    and Text.

    2. Initializes the Google Translate manager with the provided API credentials.

    3. Makes a POST request to the Google Translate API (`/language/translate/v2`)
    to translate the text.

    4. Retrieves the translated text and attaches the response as a JSON result to
    the action.


    ### Additional Notes

    If the Source Language is not provided, the Google Translate API will attempt
    to detect the language automatically.
  ai_short_description: >-
    Translates a given text from a source language to a target language using the
    Google Translate API.
