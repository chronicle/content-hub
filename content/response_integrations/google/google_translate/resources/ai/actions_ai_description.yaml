List Languages:
  ai_description: >-
    ### General Description

    Retrieves a list of supported languages from the Google Translate service. This
    action allows users to query the available languages and apply optional filtering
    criteria to narrow down the results, which are then presented as a data table
    and a JSON object within the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Root, API Key,
    and SSL verification settings.

    2. It extracts action-specific parameters: Filter Key, Filter Logic, Filter Value,
    and Max Records To Return.

    3. The `GoogleTranslateManager` is initialized with the provided configuration.

    4. A GET request is executed against the Google Translate API endpoint (`/language/translate/v2/languages`)
    to retrieve the full list of supported languages.

    5. The retrieved list is filtered based on the provided `Filter Key`, `Filter
    Logic`, and `Filter Value` parameters.

    6. The final list is truncated to the specified `Max Records To Return`.

    7. The results are added to the SOAR action result as a data table and a JSON
    object.


    ### Additional Notes

    This action is a utility function and does not interact with specific entities
    or alert data. It is used to discover supported language codes for use in translation
    tasks.
  ai_short_description: >-
    Retrieves and filters a list of supported languages from the Google Translate
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Google Translate API to fetch data.
      It does not mutate any external or internal data, nor does it update entities
      or create insights.
