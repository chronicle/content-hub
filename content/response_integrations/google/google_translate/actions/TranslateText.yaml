name: Translate Text
description: Translate text using Google Translate.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-translate#translate_text
integration_identifier: GoogleTranslate
parameters:
-   name: Source Language
    default_value: ''
    type: string
    description: Specify the source language of the text. If nothing is provided,
        action will detect the language automatically.
    is_mandatory: false
-   name: Target Language
    default_value: en
    type: string
    description: Specify the desired language.
    is_mandatory: true
-   name: Text
    default_value: ''
    type: string
    description: Specify the text that needs to be translated.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/translate_text_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
