    Retrieves vulnerabilities and a severity summary for IP address entities from
    Tenable Security Center.


    ### Flow Description

    1. Initializes the Tenable Security Center manager using the provided integration
    configuration.

    2. Iterates through the target entities, filtering specifically for IP addresses
    (`EntityTypes.ADDRESS`).

    3. Makes a POST request to the Tenable Security Center API (`/rest/analysis`)
    to fetch vulnerabilities associated with each IP address.

    4. Analyzes the retrieved vulnerabilities to calculate a summary of severities
    (Info, Low, Medium, High, Critical).

    5. Marks the entity as suspicious if any "High" severity vulnerabilities are detected.

    6. Enriches the entity's additional properties with the calculated severity counts.

    7. Attaches a CSV data table containing the vulnerability details to the entity.

    8. Updates the entities in the Google SecOps platform and returns the raw JSON
    results.


    ### Additional Notes

    None.
