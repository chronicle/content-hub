Get Report:
  ai_description: >-
    ### General Description

    Fetches report content from Tenable Security Center. This action retrieves a report
    based on either a provided Report ID or a Report Name, allowing users to access
    report data directly within the security platform.


    ### Flow Description

    1. Initialize the `TenableSecurityCenterManager` using the configured credentials
    (server address, username/password or access/secret keys).

    2. Check if either `Report ID` or `Report Name` is provided as a parameter.

    3. If `Report ID` is provided, call the `get_report_by_id` method via the Tenable
    Security Center API to fetch the report.

    4. If `Report Name` is provided, call the `get_report_by_name` method via the
    Tenable Security Center API to fetch the report.

    5. If a report is successfully retrieved, add the report data as a JSON result
    to the action output and set the result value to "true".

    6. If the report is not found or an error occurs, set the result value to "false"
    and log the error.


    ### Additional Notes

    Either `Report ID` or `Report Name` must be configured for the action to execute
    successfully. This action does not modify any data in Tenable Security Center
