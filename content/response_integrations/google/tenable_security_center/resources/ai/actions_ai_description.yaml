Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using Tenable Security Center. This action retrieves
    device information, such as repository details and asset context, for the specified
    IP addresses.


    ### Flow Description

    1. The action retrieves the `Repository Name` parameter.

    2. It iterates through the target entities, filtering for those of type `ADDRESS`.

    3. For each valid IP address, it calls the Tenable Security Center API (`get_ip_info`)
    to retrieve device information.

    4. The retrieved data is flattened and added to the entity's `additional_properties`.

    5. The entity's `is_enriched` flag is set to `True`.

    6. The action updates the entities in the SOAR platform and adds the raw JSON
    result to the action output.


    ### Additional Notes

