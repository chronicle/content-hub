Create IP List Asset:
  ai_description: >-
    ### General Description

    Creates an IP list asset in Tenable.sc using the provided IP address entities.
    This action facilitates the organization of network assets within Tenable.sc by
    grouping specific IP addresses into a named asset list.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Credentials, SSL settings)
    and action parameters (Name, Description, Tag).

    2. Filters `target_entities` to include only those of type `ADDRESS`.

    3. If valid IP entities are found, initializes the `TenableSecurityCenterManager`.

    4. Constructs a comma-separated string of the IP addresses from the filtered entities.

    5. Calls the `create_ip_list_asset` method on the Tenable.sc API to create the
    asset.

    6. Adds the resulting asset JSON to the action results and returns a success message.


    ### Additional Notes

    Requires at least one IP entity to execute. If no IP entities are provided, the
    action will fail to create the asset.
