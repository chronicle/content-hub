Add IP To IP List Asset:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified IP List Asset in Tenable.sc. This action
    modifies the external asset by appending the target IP addresses to its defined
    IP list.


    ### Flow Description

    1. Extracts the target IP List Asset name from the action parameters.

    2. Filters the target entities to include only IP addresses.

    3. Makes a GET request to Tenable.sc to retrieve the asset ID and its existing
    defined IPs.

    4. Appends the new IP addresses to the existing list.

    5. Makes a PATCH request to Tenable.sc to update the IP List Asset with the combined
    IP list.

    6. Retrieves the updated asset details and attaches them to the action as a JSON
    result.


    ### Additional Notes

    - Only entities of type ADDRESS are processed.

    - If the specified asset name is not found in Tenable.sc, the action will fail.
  ai_short_description: >-
    Adds IP address entities to a specified IP List Asset in Tenable.sc.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the specified IP List Asset in Tenable.sc by appending new IP addresses
      to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to Tenable.sc to update an IP List Asset with
      new IP addresses, which mutates external data. It does not fetch contextual
      enrichment data for the entities, update internal entities, create insights,
      or modify alert data.
