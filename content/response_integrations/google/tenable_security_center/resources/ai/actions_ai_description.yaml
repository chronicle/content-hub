Get Scan Results:
  ai_description: >-
    ### General Description

    Retrieves scan results and severity summaries from Tenable Security Center for
    a specified scan result ID. This action allows analysts to monitor the progress
    of a scan and obtain detailed findings once the scan is complete.


    ### Flow Description

    1. The action initializes the `TenableSecurityCenterManager` using the provided
    integration configuration (Server Address, Username/Password or Access/Secret
    Keys).

    2. It retrieves the `Scan Result ID` from the action parameters.

    3. The action calls `wait_for_scan_results` to poll the Tenable API until the
    scan status is complete, then fetches the vulnerability results.

    4. It calls `get_severity_summary` to retrieve the breakdown of vulnerabilities
    by severity level.

    5. The scan results and severity summary are formatted into CSV tables and added
    to the action results using `siemplify.result.add_data_table`.

    6. The raw JSON results are added to the action output using `siemplify.result.add_result_json`.

    7. The action concludes with a success or failure message.


    ### Additional Notes

    This action is strictly for data retrieval and does not perform any modifications
    to the Tenable Security Center environment or the SOAR case data.
