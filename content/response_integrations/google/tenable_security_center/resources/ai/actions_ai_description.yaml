Add IP To IP List Asset:
  ai_description: >-
    ### General Description

    Adds IP addresses to an existing IP list asset in Tenable.sc. This action retrieves
    the current IP list for a specified asset, appends the new IP addresses from the
    target entities, and updates the asset in Tenable.sc.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Credentials, SSL settings)
    and the `Asset Name` parameter.

    2. Filters target entities to include only IP addresses.

    3. Initializes the Tenable Security Center manager.

    4. Retrieves the ID of the specified asset by name using the `manager.get_asset_id_by_asset_name`
    API call.

    5. Fetches the current IP list for the identified asset using the `manager.get_asset_details`
    API call.

    6. Appends the new IP addresses from the target entities to the existing list.

    7. Updates the asset in Tenable.sc with the combined list of IP addresses via
    a PATCH request using the `manager.update_ip_list_asset` API call.

    8. Returns the updated asset details as a JSON result.


    ### Additional Notes

    Requires valid Tenable.sc credentials. Only processes entities of type ADDRESS.
  ai_short_description: >-
    Adds specified IP address entities to an existing IP list asset in Tenable.sc.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the IP list of an existing asset in Tenable.sc by appending new IP addresses.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches asset details from Tenable.sc to identify the asset and retrieve
      its current IP list (fetches_data=true). It then performs a PATCH request to
      update the asset's IP list (can_mutate_external_data=true). It does not mutate
      internal data, update entities, create insights, modify alert data, or create
      case comments.
