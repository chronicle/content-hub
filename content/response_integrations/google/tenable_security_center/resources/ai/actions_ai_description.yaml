    Creates a new IP list asset in Tenable.sc using IP address entities from the case.


    ### Flow Description

    1. Filters the target entities to include only IP addresses (ADDRESS).

    2. Extracts the identifiers of the filtered IP entities and formats them as a
    comma-separated string.

    3. Makes a POST request to the Tenable.sc API (`/rest/asset`) to create a new
