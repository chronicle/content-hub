Run Asset Scan:
  ai_description: >-
    ### General Description

    Executes an asset scan in Tenable.sc. This action allows users to trigger a vulnerability
    scan for a specific asset by providing the scan name, asset name, policy ID, and
    repository ID. It automates the process of identifying the asset ID and initiating
    the scan via the Tenable.sc API.


    ### Flow Description

    1. The action authenticates with the Tenable.sc server using the provided credentials.

    2. It calls the `get_asset_id_by_asset_name` method, which performs a GET request
    to `/rest/asset` to retrieve the ID of the asset specified by the `Asset Name`
    parameter.

    3. If the asset is found, the action proceeds to call `execute_scan`.

    4. The `execute_scan` method performs a POST request to `/rest/scan` with the
    provided `Scan Name`, `Policy ID`, `Repository ID`, `Description`, and the retrieved
    `Asset ID` to create and launch the scan.

    5. The result of the scan creation is returned as a JSON object.


    ### Additional Notes

    This action requires valid Tenable.sc credentials (either username/password or
    access/secret keys) configured in the integration settings. The `Policy ID` and
    `Repository ID` must be valid integers corresponding to existing configurations
    in Tenable.sc.
