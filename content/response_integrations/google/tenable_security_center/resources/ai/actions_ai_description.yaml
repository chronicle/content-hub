Get Vulnerabilities for IP:
  ai_description: >-
    ### General Description

    Fetches vulnerability information and severity summaries for IP address entities
    from Tenable Security Center. This action enriches IP entities by retrieving vulnerability
    data, aggregating severity counts, and updating the entity's status and additional
    properties within the SOAR platform.


    ### Flow Description

    1. Initialize the `TenableSecurityCenterManager` using the provided configuration
    credentials (Server Address, Username/Password or Access/Secret Keys).

    2. Iterate through the target entities, filtering specifically for `ADDRESS` entity
    types.

    3. For each valid IP entity, call the `tenable_manager.get_vulnerabilities_for_ip(entity.identifier)`
    method to retrieve vulnerability data from Tenable Security Center.

    4. Aggregate the vulnerability counts by severity (Info, Low, Medium, High, Critical).

    5. If any "High" severity vulnerabilities are detected, mark the entity as suspicious
    (`entity.is_suspicious = True`).

    6. Update the entity's `additional_properties` with the aggregated severity counts,
    prefixed with "Tenable".

    7. Construct a CSV data table of the retrieved vulnerabilities and add it to the
    action result using `siemplify.result.add_data_table`.

    8. Update the enriched entities in the SOAR platform using `siemplify.update_entities`.

    9. Add the full JSON result of the operation to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires valid Tenable Security Center credentials. Either (Username
    and Password) or (Access Key and Secret Key) must be configured in the integration
    settings. The action only processes `ADDRESS` entities.
