Get Related Assets:
  ai_description: >-
    ### General Description

    Retrieves assets related to a specific IP address from Tenable Security Center.
    This action helps analysts understand the context of an IP address by identifying
    associated assets within a specified repository.


    ### Flow Description

    1. The action initializes the Tenable Security Center manager using the provided
    configuration credentials.

    2. It iterates through the target entities, filtering specifically for IP Address
    entities.

    3. For each valid IP address, it calls the Tenable API endpoint `/rest/repository/{repo_id}/assetIntersections`
    to fetch related asset information.

    4. The retrieved asset data is processed to construct a CSV table, which is then
    added to the action results.

    5. The action updates the entities in the SOAR platform with the new information.

    6. Finally, it returns a comprehensive JSON result containing all retrieved asset
    data.


    ### Additional Notes

    This action requires a valid Tenable Security Center repository name to be provided
    as a parameter.
