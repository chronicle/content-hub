Run Asset Scan:
  ai_description: >-
    ### General Description

    Executes a new asset scan in Tenable Security Center (Tenable.sc). This action
    allows analysts to trigger on-demand vulnerability scans for specific assets directly
    from the SOAR platform.


    ### Flow Description

    1. Extracts the provided scan name, asset name, policy ID, repository ID, and
    description from the action parameters.

    2. Queries Tenable.sc via a GET request to the `/rest/asset` endpoint to resolve
    the provided asset name into an internal asset ID.

    3. Initiates a new scan for the resolved asset by making a POST request to the
    `/rest/scan` endpoint with the specified policy and repository configurations.

    4. Returns the resulting scan object details as a JSON result to the SOAR platform.


    ### Additional Notes

    This action does not operate on SecOps entities. It relies entirely on the explicit
    asset name and configuration IDs provided in the action parameters.
