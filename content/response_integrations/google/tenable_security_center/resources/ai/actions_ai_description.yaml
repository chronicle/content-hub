Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using Tenable Security Center. This action retrieves
    detailed device information for the specified IP addresses from a given repository
    and updates the entities with the fetched data.


    ### Flow Description

    1. Initializes the connection to Tenable Security Center using the provided credentials.

    2. Iterates through the target entities, filtering specifically for `ADDRESS`
    entity types.

    3. For each valid IP address, makes an API call to Tenable Security Center to
    retrieve device information from the specified repository.

    4. Parses the retrieved information, flattens the JSON structure, and adds a "Tenable"
    prefix to the keys.

    5. Updates the entity's `additional_properties` with the flattened data and marks
    the entity as enriched.

    6. Saves the updated entities back to the case and attaches the raw JSON results
    to the action's output.


    ### Additional Notes

    Entities that fail to be enriched (e.g., due to API errors or missing data) are
    logged and skipped without failing the entire action.
