name: Get Report
description: Get report content by ID or name.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/tenable-security-center#get_report
integration_identifier: TenableSecurityCenter
parameters:
-   name: Report ID
    type: string
    description: Report ID number.Can be found at the report URL.
    is_mandatory: false
-   name: Report Name
    type: string
    description: The name of the report, as mentioned at the GUI.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_report_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
