name: Run Asset Scan
description: Execute Asset Scan in Tenable.sc.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/tenable-security-center#run_asset_scan
integration_identifier: TenableSecurityCenter
parameters:
-   name: Scan Name
    default_value: ''
    type: string
    description: Specify the name for the scan.
    is_mandatory: true
-   name: Asset Name
    default_value: ''
    type: string
    description: Specify the name of the asset that should be scanned.
    is_mandatory: true
-   name: Policy ID
    default_value: ''
    type: string
    description: Specify the id of the policy that should be used in the scan.
    is_mandatory: true
-   name: Repository ID
    default_value: ''
    type: string
    description: Specify the id of the repository that should be used in the scan.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description for the scan.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_asset_scan_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
