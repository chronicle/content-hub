identifier: TenableSecurityCenter
name: Tenable Security Center
parameters:
-   name: Server Address
    default_value: null
    type: ip
    description: The server Address of the Tenable Security Center.
    is_mandatory: true
    integration_identifier: TenableSecurityCenter
-   name: Username
    default_value: null
    type: string
    description: 'The username of the Tenable Security Center account. Note: Both
        “Username” and “Password” must be provided.'
    is_mandatory: false
    integration_identifier: TenableSecurityCenter
-   name: Password
    default_value: null
    type: password
    description: 'The password of the Tenable Security Center account. Note: Both
        “Username” and “Password” must be provided.'
    is_mandatory: false
    integration_identifier: TenableSecurityCenter
-   name: Access Key
    default_value: null
    type: password
    description: 'The Access Key of the Tenable Security Center account. Note: Both
        “Access Key” and “Secret Key” must be provided.'
    is_mandatory: false
    integration_identifier: TenableSecurityCenter
-   name: Secret Key
    default_value: null
    type: password
    description: 'The Secret Key of the Tenable Security Center account. Note: Both
        “Access Key” and “Secret Key” must be provided.'
    is_mandatory: false
    integration_identifier: TenableSecurityCenter
-   name: Use SSL
    default_value: 'False'
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Tenable Security Center server. Enabled by default.
    is_mandatory: true
    integration_identifier: TenableSecurityCenter
    display_name: Verify SSL
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/tenable-security-center
categories:
- Vulnerability & Risk Management
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
