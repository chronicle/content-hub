    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over `siemplify.target_entities` or use any entity-specific
      identifiers. It performs a general search based on the provided parameters.
      Therefore, it does not run on entities, and all entity type and filter flags
      are set to false.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
