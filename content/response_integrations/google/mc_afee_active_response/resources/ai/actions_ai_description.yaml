Ping:
  ai_description: >-
    Tests the connectivity between the SOAR platform and the McAfee Active Response
    (MAR) environment. This action verifies that the integration is correctly configured
    and capable of establishing a connection to the DXL fabric.


    ### Flow Description

    1. Initializes the `SiemplifyAction` to interact with the SOAR platform.

    2. Retrieves the required integration configuration settings, including the Broker
    URLs, Broker CA Bundle file path, Certificate file path, and Private Key file
    path.

    3. Instantiates the `McAfeeActiveResponseManager` using the retrieved configuration.

    4. The manager attempts to connect to the DXL fabric using the provided credentials
    and broker information.

    5. Upon successful connection, the action terminates and returns a success message
    indicating that the connection is established.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the health of
    the integration configuration. It does not perform any data retrieval or modification
    operations on entities or external systems.
  ai_short_description: >-
    Tests the connectivity between the SOAR platform and the McAfee Active Response
    environment.
