    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action searches for telemetry data (e.g., processes, network flows, files)
      across McAfee Active Response collectors based on specific search parameters.
      This aligns with the 'Search Events' expected outcome. It does not enrich specific
      IOCs or assets, nor does it perform any remediation or ticketing operations.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: true
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Executes a search query across specified collectors in McAfee Active Response.
    This action retrieves telemetry and system data (such as processes, network flows,
    and files) based on user-defined filters and returns the results as a JSON object
    and a data table.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Collectors | String | Yes | A comma-separated list of collectors to search in
    (e.g., Processes, Files, NetworkFlow). |

    | Filter Collector | String | No | The specific collector to apply the filter
    on. |

    | Filter By | String | No | The field within the collector to filter by. |

    | Filter Operator | String | No | The operator for the filter (e.g., GreaterEqualThan,
    Equals, Contains). |

    | Filter Value | String | No | The value to filter against. |


    ### Additional Notes

    If the `Filter Collector` parameter is provided, then `Filter By`, `Filter Operator`,
    and `Filter Value` must also be configured for the action to run successfully.


    ### Flow Description

    1. Initializes the McAfee Active Response client using the provided integration
    configuration.

    2. Retrieves the search parameters including collectors and optional filter criteria.

    3. Executes the search query against the specified collectors via the McAfee Active
    Response API.

    4. Parses the search results and constructs a data table.

    5. Attaches the JSON results and data table to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from McAfee Active Response by executing a search query
      across specified collectors. It does not mutate any external data, nor does
      it mutate internal data such as entities, insights, alerts, or case comments.
      It only attaches the search results to the action's output.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data (search results) from an external source without mutating
      external or internal state. Therefore, it qualifies as an enrichment action.
      It does not perform any containment, blocking, or identity-based mitigation,
      so it is not a remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
