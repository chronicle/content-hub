    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Collectors | String | Yes | The collectors to search in (comma-separated) |

    | Filter Collector | String | No | The collector filter |

    | Filter By | String | No | The field to filter by |

    | Filter Operator | String | No | The operator of the filter. Must be on of those:
    GreaterEqualThan,GreaterThan,LessEqualThan,LessThan,Equals,Contains,StartWith,EndsWith,Before,After
    |

    | Filter Value | String | No | The filter value |


    **Parameter Notes:**

    If you provide a `Filter Collector`, you must also provide `Filter By`, `Filter
    Operator`, and `Filter Value`.
