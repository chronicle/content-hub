    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only establishes a connection to the DXL fabric to verify connectivity.
      It does not fetch contextual data, mutate external or internal data, update
      entities, create insights, modify alerts, or create case comments.
