    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action executes a search query against McAfee Active Response collectors
      to retrieve telemetry data and historical logs based on specified filters. This
      directly aligns with the 'Search Events' expected outcome. It does not enrich
      specific IOCs or assets, nor does it mutate any external or internal state.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
