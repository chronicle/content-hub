Search:
  ai_description: >-
    ### General Description

    Searches McAfee Active Response using specified collectors and optional filters.
    This action retrieves telemetry data and historical logs from the McAfee Active
    Response platform and returns the findings as structured data.


    ### Flow Description

    1. Initializes the McAfee Active Response client using the provided DXL broker
    configurations and certificates.

    2. Retrieves the list of collectors and optional filter parameters (Collector,
    Field, Operator, Value) from the action inputs.

    3. Executes a search query via the McAfee Active Response API (`mar_client.search`)
    using the specified collectors and conditions.

    4. Parses the returned items, flattening the output dictionaries and appending
    metadata such as Count, ID, and Created At.

    5. Attaches the raw JSON results and a formatted CSV data table to the action
    output.


    ### Additional Notes

    This action does not operate on specific entities but rather performs a global
    search based on the provided parameters. If a filter is used, all filter-related
    parameters (Filter Collector, Filter By, Filter Operator, Filter Value) must be
    provided together.
  ai_short_description: >-
    Searches McAfee Active Response for telemetry data across specified collectors,
    returning the results as JSON and a data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by executing a search query against McAfee Active Response
      via the DXL client (fetches_data=true). It does not perform any state-changing
      operations on external systems (can_mutate_external_data=false). It does not
      update entities, create insights, modify alert data, or create case comments
      within Google SecOps.
  entity_usage:
    entity_types:
