  ai_description: >-
    Tests connectivity to the McAfee Active Response broker.


    ### General Description

    This action establishes a connection to the McAfee Active Response DXL fabric
    using the provided broker URLs and certificates to verify that the integration
    is configured correctly and can communicate with the service.


    ### Flow Description

    1. Retrieves the integration configuration including Broker URLs, CA Bundle, Certificate,
    and Private Key.

    2. Initializes the `McAfeeActiveResponseManager` which attempts to connect to
    the DXL fabric.

    3. If successful, returns a 'Connection Established' message.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This is a utility action primarily used for testing integration connectivity.
