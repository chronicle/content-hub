Search:
  ai_description: >-
    ### General Description

    Searches for data across McAfee Active Response (MAR) collectors. This action
    allows users to query specific collectors (e.g., Processes, Files, NetworkFlow)
    to retrieve system telemetry and endpoint data. It supports filtering the search
    results based on specific fields, operators, and values to narrow down the returned
    information.


    ### Flow Description

    1. The action initializes the `McAfeeActiveResponseManager` using the configured
    broker URLs and authentication certificates.

    2. It retrieves the input parameters: `Collectors`, `Filter Collector`, `Filter
    By`, `Filter Operator`, and `Filter Value`.

    3. The action calls the `search_multiple_collectors` method of the manager, which
    executes the query against the McAfee Active Response fabric.

    4. If results are returned, the action adds the raw JSON result to the action
    output using `siemplify.result.add_result_json`.

    5. The action processes the items, flattens the output data, and adds a data table
    named "Results" to the action output containing the retrieved information.

    6. If no results are found, it returns a message indicating no results were found.


    ### Additional Notes

    This action is a read-only operation and does not modify any data on the McAfee
    Active Response system or within the SOAR platform. It is intended for data retrieval
    and investigation purposes.
  ai_short_description: >-
    Searches for data across McAfee Active Response collectors based on specified
    filters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
