    reasoning: >-
      The action searches for endpoint telemetry (processes, files, network connections)
      across the environment using McAfee Active Response. This matches the 'Search
      Events' category. It does not perform enrichment, containment, or ticket management.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: true
    send_email: false
    send_message: false
    submit_file: false
