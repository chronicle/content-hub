Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee Active Response DXL fabric. This action verifies
    that the integration is configured correctly and can successfully authenticate
    and communicate with the McAfee Active Response infrastructure.


    ### Flow Description

    1. Retrieves integration configuration parameters (Broker URLs, CA Bundle, Certificate,
    and Private Key).

    2. Initializes the McAfee Active Response Manager.

    3. Attempts to establish a connection to the DXL fabric using the provided credentials
    and broker URLs.

    4. Returns a success message if the connection is successfully established.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying integration settings.
    It does not interact with alerts, cases, or entities.
  ai_short_description: >-
    Tests connectivity to the McAfee Active Response DXL fabric to verify integration
    configuration and authentication.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
