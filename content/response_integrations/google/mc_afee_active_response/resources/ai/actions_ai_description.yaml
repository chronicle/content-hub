    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action queries the McAfee Active Response fabric for endpoint data. It does
      not modify external systems or internal SOAR case data (entities/insights).
      It returns search results as action output.
  categories:
    enrichment: false
    reasoning: >-
      The action is a search tool for endpoint telemetry. It does not perform entity
      enrichment, nor does it modify internal or external state. Therefore, it is
      not an enrichment action.
