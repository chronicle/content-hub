Simple ES Search:
  ai_description: "### General Description\nThis action performs a search across Elasticsearch\
    \ indices using Lucene query syntax. It is designed for general data retrieval\
    \ where a time range is not required. The action retrieves raw documents, flattens\
    \ them for readability, and presents the results both as a structured data table\
    \ and raw JSON.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Index | String | No | Defines\
    \ the Elasticsearch index or pattern to search (e.g., 'logs-*' or 'system_index').\
    \ Supports wildcards. Defaults to '*' if not provided. |\n| Query | String | No\
    \ | The search query in Lucene syntax (e.g., 'status:error AND user:admin'). Defaults\
    \ to '*' (match all) if not provided. |\n| Limit | Integer | No | The maximum\
    \ number of documents to return in the result set. Defaults to 100. |\n\n### Additional\
    \ Notes\n- This action does not support time-range filtering. For time-sensitive\
    \ queries, use the 'Advanced ES Search' action.\n- The action flattens nested\
    \ JSON structures from Elasticsearch to ensure they are compatible with the SOAR\
    \ data table view.\n\n### Flow Description\n1. **Authentication**: The action\
    \ connects to the Elasticsearch server using the provided credentials and SSL\
    \ configuration.\n2. **Query Execution**: It executes a `query_string` search\
    \ against the specified `Index` using the provided `Query` and `Limit` parameters.\n\
    3. **Data Processing**: If hits are returned, the action iterates through the\
    \ results and flattens the dictionary structures using `dict_to_flat`.\n4. **Output\
    \ Generation**: \n    - A CSV-formatted data table is created from the flattened\
    \ results and added to the case wall.\n    - The raw search results are attached\
    \ as `result_json`.\n5. **Completion**: The action ends with a summary message\
    \ indicating the number of hits found."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the case containing the search results retrieved
      from Elasticsearch.
  categories:
