Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Elasticsearch server using the provided configuration
    parameters. This action is primarily used as a health check to ensure that the
    SOAR platform can successfully communicate with the Elasticsearch instance and
    that the provided credentials and network settings are correct.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The URL or IP address of the Elasticsearch server
    (retrieved from integration configuration). |

    | Username | String | No | The username for authentication (retrieved from integration
    configuration). |

    | Password | String | No | The password for authentication (retrieved from integration
    configuration). |

    | CA Certificate File | String | No | Base64 encoded CA certificate file content
    for SSL verification (retrieved from integration configuration). |

    | Authenticate | Boolean | Yes | Determines if authentication should be used for
    the connection (retrieved from integration configuration). |

    | Verify SSL | Boolean | Yes | Determines if SSL certificates should be verified
    (retrieved from integration configuration). |


    ### Additional Notes

    This action does not process any entities and relies entirely on the integration's
    global configuration settings. It does not perform any data retrieval or modification
    beyond checking the server's basic information.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the global integration configuration
    for Elasticsearch, including connection details and security settings.

    2. **Manager Initialization**: An `ElasticsearchManager` instance is initialized.
    If authentication is enabled, it configures the client with the provided username
    and password. It also handles SSL verification and CA certificate decoding if
    applicable.

    3. **Connectivity Test**: The action calls the `test_connectivity` method of the
    manager, which executes a basic `info()` call to the Elasticsearch API to verify
    the server is reachable and responding.

    4. **Result Reporting**: The action concludes by returning a success message and
    a boolean status indicating whether the connection was successful.
  capabilities:
    can_create_case_comments: false
