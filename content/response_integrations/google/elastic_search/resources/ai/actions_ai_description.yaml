    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
DSL Search:
  ai_description: >-
    ### General Description

    This action executes a Domain Specific Language (DSL) query against an ElasticSearch
    instance to retrieve specific documents or logs. It is designed to facilitate
    deep-dive investigations by allowing analysts to run complex, JSON-based queries
    directly from Google SecOps. The results are returned as both a raw JSON object
    and a formatted data table attached to the case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Index | String | No | Defines the ElasticSearch index or index pattern to search
    (e.g., "logs-*" or "smp_playbooks-2019.06*"). If left as "*", it searches across
    all indices. |

    | Query | String | No | The DSL query to perform. This must be a valid JSON string.
    If set to "*", the action performs a default search for all documents within the
    last 24 hours. |

    | Limit | Integer | No | Limits the number of documents returned. The default
    is 100. Setting this to 0 attempts to retrieve all matching documents (subject
    to ElasticSearch's internal limits). |


    ### Additional Notes

    - **Default Query Behavior:** When the `Query` parameter is set to `*`, the action
    uses a predefined boolean query that filters for the `@timestamp` field between
    `now-1d` and `now`.

    - **Authentication:** The action supports both authenticated and unauthenticated
    connections to ElasticSearch based on the integration's configuration.

    - **Data Presentation:** Results are flattened for the data table to ensure readability,
    while the full nested structure is preserved in the JSON output.


    ### Flow Description

    1. **Initialization:** The action retrieves connection settings (Server Address,
    Credentials, SSL/TLS configuration) and action-specific parameters (Index, Query,
    Limit).

    2. **Connection:** It establishes a session with the ElasticSearch server using
    the `ElasticsearchManager`.

    3. **Query Execution:** The action parses the provided DSL query. If the query
    is "*", it applies the default 24-hour time range filter. It then executes the
    search against the specified index.

    4. **Pagination:** The script iterates through search results until the specified
    `Limit` is reached or all matching documents are fetched.

    5. **Data Processing:** Retrieved documents are processed into two formats: a
    raw JSON list and a flattened list suitable for tabular display.

    6. **Output Generation:** The action attaches a CSV-formatted data table to the
    case and populates the JSON result field with the search hits.

    7. **Completion:** The action concludes by reporting the total number of hits
    found and successfully retrieved.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table containing the search results to the Google SecOps
      case.
  categories:
    enrichment: false
