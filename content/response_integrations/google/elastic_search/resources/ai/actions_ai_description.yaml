Advanced ES Search:
  ai_description: >-
    ### General Description

    Performs an advanced search against an Elasticsearch instance using Lucene query
    syntax and time-based filtering. This action is designed for complex queries where
    a specific time range is required to narrow down results. It retrieves documents
    from specified indices, flattens the data, and presents it within the SOAR case
    for analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Index | String | No | The index or index pattern to search (e.g., 'logs-*').
    Default is '*'. |

    | Query | String | No | The search query in Lucene syntax (e.g., 'status:error').
    Default is '*'. |

    | Limit | Integer | No | Maximum number of documents to return. Default is 100.
    |

    | Display Field | String | No | Limits the returned fields to a specific field
    or comma-separated list. Default is '*' (all fields). |

    | Search Field | String | No | The field to search against when the query doesn't
    specify one. Default is '_all'. |

    | Timestamp Field | String | No | The field used for time-based filtering. Default
    is '@timestamp'. |

    | Oldest Date | String | No | The start date/time for the search. Supports ISO
    8601 strings or Elasticsearch date-math (e.g., 'now-1d'). |

    | Earliest Date | String | No | The end date/time for the search. Supports ISO
    8601 strings or Elasticsearch date-math (e.g., 'now'). |


    ### Additional Notes

    - This action does not run on specific entities; it performs a global search based
    on the provided parameters.

    - If both 'Oldest Date' and 'Earliest Date' are left empty, no time-based filtering
    is applied.


    ### Flow Description

    1. **Authentication**: Connects to the Elasticsearch server using the configured
    credentials, SSL settings, and CA certificate.

    2. **Query Construction**: Builds a search request using the Lucene query string,
    index pattern, and field limitations.

    3. **Time Filtering**: Applies a range filter to the specified 'Timestamp Field'
    using the 'Oldest Date' and 'Earliest Date' values.

    4. **Execution**: Executes the search against the Elasticsearch API.

    5. **Data Processing**: Flattens the resulting JSON documents into a tabular format.

    6. **Output**: Adds a data table to the case containing the search results and
    provides the raw JSON output for downstream actions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table containing the flattened search results to the case context.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
