Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Harmony Mobile server using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Client ID, Client
    Secret, Verify SSL).

    2. Initializes the Harmony Mobile manager and generates an authentication token.

    3. Sends an HTTP GET request to the Harmony Mobile ping endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any action-specific parameters and relies entirely
    on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the Harmony Mobile server to ensure the integration is configured
    correctly and can successfully communicate with the API.
  capabilities:
    can_create_case_comments: false
