  ai_description: >-
    ### General Description

    Tests connectivity to the Harmony Mobile API using the provided integration configuration
    parameters. This action ensures that the credentials and network settings are
    correctly configured to communicate with the Harmony Mobile server.


    ### Flow Description

    1. Extracts the API Root, Client ID, Client Secret, and Verify SSL parameters
    from the integration configuration.

    2. Initializes the Harmony Mobile Manager with the extracted credentials.

    3. Sends a GET request to the device status endpoint to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration configuration parameters.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    that the connection to the Harmony Mobile API is working as expected.
