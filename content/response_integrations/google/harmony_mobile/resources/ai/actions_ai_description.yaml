Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using device information retrieved from Harmony Mobile.
    This action retrieves comprehensive device metadata, including OS type, version,
    risk level, and status, and attaches this information to the corresponding Hostname
    entity within the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and the `Create Insight` action parameter.

    2. Filters the target entities to include only those of type Hostname.

    3. Initializes the `HarmonyMobileManager` to authenticate and interact with the
    Harmony Mobile API.

    4. Fetches the list of devices from Harmony Mobile using the `get_devices` method.

    5. Iterates through the filtered Hostname entities and matches them against the
    fetched device data based on the device name.

    6. For each matched device, updates the entity's `additional_properties` with
    enrichment data and sets the `is_enriched` flag to true.

    7. Adds a table result containing the device details to the action output.

    8. If the `Create Insight` parameter is enabled, generates an entity insight containing
    the device's risk level, status, and other relevant metadata.

    9. Updates the entities in the SOAR platform and returns the enrichment results
    as a JSON object.


    ### Additional Notes

    This action requires valid Harmony Mobile API credentials. It specifically targets
    Hostname entities and relies on the device name matching the entity identifier.
  ai_short_description: >-
    Enriches Hostname entities with device details retrieved from Harmony Mobile.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties and sets the is_enriched flag to true.
    reasoning: >-
      The action fetches data from an external API (Harmony Mobile) to enrich entities.
      It updates internal entities (additional_properties, is_enriched) and optionally
      creates insights. It does not mutate external data.
