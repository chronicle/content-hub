Ping:
  ai_description: >-
    General Description

    Tests connectivity to the Harmony Mobile server using the provided configuration
    parameters.


    Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) from the integration configuration.

    2. Initializes the `HarmonyMobileManager` with these credentials.

    3. Executes the `test_connectivity` method, which performs a GET request to the
    Harmony Mobile API's ping endpoint (`/app/SBM/external_api/v1/device_status/?limit=1&offset=0`).

    4. Validates the API response.

    5. Returns a success or failure message based on the connectivity result.


    Additional Notes

    This action does not modify any data and is used solely for verifying the integration's
    connection settings.
  ai_short_description: >-
    Tests connectivity to the Harmony Mobile server to verify integration configuration
    settings.
