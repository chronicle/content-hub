    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches device information from Harmony Mobile for Hostname entities,
      returning contextual metadata such as OS version, model, and risk status. This
      matches the 'Enrich Asset' expected outcome.
