  ai_description: >-
    ### General Description

    Enriches Hostname entities using information from Harmony Mobile. This action
    retrieves device details such as OS version, risk level, and status from Harmony
    Mobile and updates the corresponding entities in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | Boolean | False | If enabled, the action will create an insight
    containing all of the retrieved information about the entity. |


    ### Flow Description

    1. Initializes the Harmony Mobile manager with the provided API credentials.

    2. Retrieves a list of devices from Harmony Mobile.

    3. Iterates through the target Hostname entities.

    4. Matches the entity identifier with the retrieved device names.

    5. If a match is found, enriches the entity with device details and marks it as
    enriched.

    6. Optionally creates an insight for the entity based on the `Create Insight`
    parameter.

    7. Updates the enriched entities in the SecOps platform and returns the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and creates insights.
    reasoning: >-
      The action fetches device data from Harmony Mobile via a GET request. It does
      not mutate external data. It mutates internal data by updating entities with
      the fetched device information and optionally creating insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data and only performs allowed internal mutations (updating
      entities, creating insights). Therefore, it is classified as an enrichment action.
      It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES`
      contains `EntityTypes.HOSTNAME`. Therefore, it targets HOSTNAME entities and
      filters by entity type.
