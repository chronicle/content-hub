    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only sends a GET request to a ping endpoint to verify connectivity.
      It does not fetch contextual data for entities, mutate external data, mutate
      internal data, update entities, create insights, modify alert data, or create
      case comments.
