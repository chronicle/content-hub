    reasoning: >-
      The action retrieves contextual metadata (device details like OS version, model,
      risk) for a Hostname entity, which aligns with the 'Enrich Asset' expected outcome.
      It does not enrich IOCs or perform any other specific product category outcomes.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
