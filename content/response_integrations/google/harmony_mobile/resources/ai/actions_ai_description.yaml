Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using device information retrieved from Harmony Mobile.
    This action fetches contextual metadata about the devices and updates the entities
    within the platform.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Retrieves a list of devices from Harmony Mobile via a GET request to the `/app/SBM/external_api/v1/device_status`
    endpoint.

    3. Filters the retrieved devices to match the identifiers of the provided Hostname
    entities.

    4. For each matched entity, enriches its additional properties with device details
    (e.g., OS version, risk, status).

    5. Optionally creates an insight for the entity based on the `Create Insight`
    parameter.

    6. Updates the entities in the Google SecOps platform and returns the results
    in JSON format.


    ### Additional Notes

    The Hostname entity identifier must match the "name" of the device in Harmony
    Mobile for successful enrichment.
  ai_short_description: >-
    Enriches Hostname entities by retrieving device contextual metadata from Harmony
    Mobile.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to Harmony Mobile to fetch device data (fetches_data=true).
      It does not mutate external data. It updates internal entities with the fetched
      data (can_update_entities=true) and optionally creates insights (can_create_insight=true).
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
