  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Classification | String | Yes | Specify the classification of the observable.
    |

    | Threat Type | String | Yes | Specify the threat type of the observables. |

    | Source | String | No | Specify the intelligence source for the observable. |

    | Expiration Date | String | No | Specify the expiration date in days for the
    observable. If nothing is specified here, action will create an observable that
    will never expire. |

    | Trusted Circle IDs | String | No | Specify the comma-separated list of trusted
    circle ids. Observables will be shared with those trusted circles. |

    | TLP | String | No | Specify the TLP for your observables. |

    | Confidence | String | No | Specify what should be the confidence for the observable.
    Note: this parameter will only work, if you create observables in your organization
    and requires 'Override System Confidence' to be enabled. |

    | Override System Confidence | Boolean | No | If enabled, created observables
    will have the confidence specified in the 'Confidence' parameter. Note: you can't
    share observables in trusted circles and publicly, when this parameter is enabled.
    |

    | Anonymous Submission | Boolean | No | If enabled, action will make an anonymous
    submission. |

    | Tags | String | No | Specify a comma-separated list of tags that you want to
    add to observable. |
