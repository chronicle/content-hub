    types (`FILEHASH`, `ADDRESS`, `URL`, `USER`, `CVE`, `THREATACTOR`).

    2. Excludes any entities that contain a space character in their identifier.

    3. Separates the entities into two groups: actors/vulnerabilities (CVE, THREATACTOR)
