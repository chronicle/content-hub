Submit Observables:
  ai_description: >-
    ### General Description

    Submits observables (IP, URL, Hash, or User) to the Siemplify ThreatFuse platform
    for threat intelligence management. This action automates the process of importing
    indicators into the ThreatFuse system, allowing for centralized threat intelligence
    tracking and sharing.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    credentials, web/API roots) and action-specific parameters (Classification, Threat
    Type, Source, Expiration Date, Trusted Circle IDs, TLP, Confidence, Override System
    Confidence, Anonymous Submission, and Tags).

    2. **Entity Filtering**: The action iterates through the `target_entities` provided
    in the case, filtering for supported types: `FILEHASH`, `ADDRESS`, `URL`, and
    `USER`. Entities containing spaces are skipped.

    3. **Submission**: For each valid entity, the action calls the `manager.submit_observable`
    method, which performs a POST request to the ThreatFuse API to submit the observable
    with the specified metadata.

    4. **Job Monitoring**: The action tracks the submission job by polling `manager.get_job_details`
    in a loop until the job is approved by the ThreatFuse platform.

    5. **Result Aggregation**: The action aggregates the results, categorizing them
    into approved jobs and jobs with excluded entities, and adds this information
    to the action result JSON.


    ### Additional Notes

    This action requires specific permissions in the ThreatFuse platform, including
    'Org admin', 'Create Anomali Community Intel', and 'Approve Intel'.
