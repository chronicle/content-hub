    | Create Insight | Boolean | No | If enabled, action will add an insight per processed
    entity. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, action will create
    insight only for entities that exceeded the "Severity Threshold" and "Confidence
    Threshold". |
Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves entity-related associations from Siemplify ThreatFuse. This action fetches
    detailed threat intelligence regarding campaigns, threat bulletins, actors, attack
    patterns, courses of action, identities, incidents, infrastructure, intrusion
    sets, malware, signatures, tools, TTPs, and vulnerabilities related to the provided
    entities. It can also optionally create new entities, case tags, and case insights
    based on the retrieved associations.


    ### Flow Description

    1. Iterates over the supported target entities (FileHash, Address, URL, User).

    2. Retrieves indicators for the supported entities from ThreatFuse.

    3. Fetches related associations for each indicator based on the selected association
    types in the action parameters.

    4. Retrieves detailed information for each found association.

    5. Optionally fetches statistics for the associations if configured.

    6. Creates case insights, case tags, and new entities based on the retrieved data
    and action parameters.

    7. Returns a JSON result and a CSV table with the findings.


    ### Additional Notes

    This action operates asynchronously to handle potentially large amounts of data
    and pagination. It processes entities in batches and handles timeouts gracefully.
