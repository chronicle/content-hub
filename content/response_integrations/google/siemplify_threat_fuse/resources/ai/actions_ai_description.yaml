Submit Observables:
  ai_description: >-
    ### General Description

    Submits observables (IP, URL, Hash, or User entities) to Siemplify ThreatFuse.
    This action allows analysts to contribute threat intelligence back to the ThreatFuse
    platform by importing indicators with specific classifications, threat types,
    and confidence levels.


    ### Flow Description

    1. Iterates over the supported target entities (Address, File Hash, URL, User).

    2. Validates the entity identifiers, skipping any that contain unsupported characters
    like spaces.

    3. Makes a POST request to the ThreatFuse API (`/api/v1/intelligence/import/`)
    to submit the observable with the configured parameters (e.g., classification,
    threat type, expiration date, tags).

    4. Polls the ThreatFuse API periodically to check the status of the submission
    job until it is approved.

    5. Returns a JSON result containing the details of the approved jobs and any jobs
    with excluded entities.


    ### Additional Notes

    - This action requires 'Org admin', 'Create Anomali Community Intel', and 'Approve
    Intel' permissions in Siemplify ThreatFuse.

    - If the 'Expiration Date' parameter is left empty, the action will create an
    observable that never expires.
