Get Related Domains:
  ai_description: >-
    ### General Description

    Retrieves related domains for specific entities based on associations in Siemplify
    ThreatFuse. The action supports Hash, URL, IP Address, Email Address (User), Threat
    Actor, and CVE entities. It queries ThreatFuse for various association types (e.g.,
    Actors, Campaigns, Malware) and extracts the associated domains, returning them
    as a JSON result.


    ### Flow Description

    1. Extracts configuration and action parameters, including the confidence threshold
    and the specific association types to search.

    2. Validates the confidence threshold and the maximum number of domains to return.

    3. Iterates over the target entities, filtering for supported types (File Hash,
    Address, URL, User, CVE, Threat Actor).

    4. Separates entities into two groups: actors/vulnerabilities and other supported
    indicators.

    5. For standard indicators, makes a GET request to the ThreatFuse API to fetch
    their corresponding indicator IDs.

    6. Makes subsequent GET requests to retrieve related associations for those indicator
    IDs based on the selected association types.

    7. For actors and vulnerabilities, makes a GET request to fetch related associations
    directly by the entity's name.

    8. For all retrieved associations, makes GET requests to fetch the associated
    indicators of type 'domain' that meet the confidence threshold.

    9. Aggregates the unique domains up to the specified maximum limit.

    10. Attaches the aggregated list of domains to the action's JSON result.


    ### Additional Notes

    - Entities containing space characters in their identifiers are skipped.

    - The action will stop querying once the `Max Domains To Return` limit is reached
    or if the execution deadline is approaching.
  ai_short_description: >-
    Retrieves related domains for supported entities (Hash, URL, IP, User, Threat
    Actor, CVE) based on associations in Siemplify ThreatFuse, returning the results
    as JSON.
