Enrich Entities:
  ai_description: >-
    ### General Description

    Retrieves information about IPs, URLs, hashes, or User entities (with Email regexes)
    from Siemplify ThreatFuse. If multiple records are found for the same entity,
    the action will enrich using the latest record. It evaluates the severity and
    confidence of the indicators to determine if the entity should be marked as suspicious.


    ### Flow Description

    1. Extracts configuration and action parameters, including severity and confidence
    thresholds.

    2. Filters the target entities to process only supported types (FileHash, Address,
    URL, User) and ignores entities with spaces in their identifiers.

    3. Retrieves indicators for the supported entities from ThreatFuse via the `/api/v2/intelligence/`
    endpoint.

    4. Matches the retrieved indicators to their corresponding entities.

    5. Enriches the entities with indicator data, updating their additional properties
    and marking them as enriched.

    6. Evaluates the indicators against the provided severity and confidence thresholds
    to optionally mark the entities as suspicious.

    7. Fetches related analysis links for the entities.

    8. Optionally adds the threat types of the indicators as tags to the case.

    9. Optionally fetches further intel details and creates insights for the processed
    entities.

    10. Updates the enriched entities in the Google SecOps platform.


    ### Additional Notes

    - If the 'Ignore False Positive Status' parameter is enabled, the action will
    ignore the false positive status and mark the entity as suspicious based solely
    on the thresholds.

    - The action will take the highest severity out of all available records if multiple
    records are found for the same entity.
  ai_short_description: >-
    Retrieves threat intelligence information about IPs, URLs, hashes, or User entities
    from Siemplify ThreatFuse, enriches the entities, and optionally marks them as
    suspicious based on severity and confidence thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds threat types of the indicators as tags to the case.
    reasoning: >-
      The action fetches data from ThreatFuse using GET requests (`get_indicators`,
      `get_analysis_links`, `get_intel_details`). It mutates internal data by adding
      tags to the case (`siemplify.add_tag`). It updates entities (`siemplify.update_entities`)
      and creates insights (`siemplify.create_case_insight`). It does not mutate external
      data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
