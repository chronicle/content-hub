Get Related Associations:
  ai_description: >-
    ### General Description

    Retrieves related associations (e.g., campaigns, actors, vulnerabilities, malware)
    for entities (FILEHASH, ADDRESS, URL, USER) from the Siemplify ThreatFuse platform.
    This action allows analysts to enrich cases with contextual threat intelligence
    by identifying connections between observed indicators and known threat models.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, Web Root) and action parameters
    (association types to return, entity creation flags, insight/tag creation flags,
    and limits).

    2. Identifies supported entities from the case (FILEHASH, ADDRESS, URL, USER)
    and filters out unsupported types.

    3. Fetches indicator IDs for the supported entities from ThreatFuse using the
    `manager.get_indicators` method.

    4. Retrieves related association IDs for the selected association types using
    `manager.get_related_indicator_associations`.

    5. Iteratively fetches detailed information for each association using `get_association_detailed_information`.

    6. Optionally fetches statistics for each association using `manager.get_association_type_indicators_stats`
    if the statistics limit is greater than zero.

    7. Creates insights, case tags, and new entities based on the retrieved data,
    and adds them to the case using `siemplify.add_entity_to_case`, `siemplify.add_tag`,
    and `siemplify.create_case_insight`.


    ### Additional Notes

    This action supports asynchronous execution, allowing it to process large numbers
    of associations across multiple runs if necessary. It uses the `additional_data`
    parameter to maintain state between execution cycles.
