    for the same entity, action will take the highest severity out of all available
    records. |

    | Confidence Threshold | String | Yes | Specify what should be the confidence
    threshold for the entity, in order to mark it as suspicious. Note: Maximum is
    100. If multiple records are found for the entity, action will take the average.
    Active records have priority. |

    | Ignore False Positive Status | Boolean | No | If enabled, action will ignore
    the false positive status and mark the entity as suspicious based on the "Severity
    Threshold" and "Confidence Threshold". If disabled, action will never label false
    positive entities as suspicious, regardless, if they pass the "Severity Threshold"
    and "Confidence Threshold" conditions or not. |

    | Add Threat Type To Case | Boolean | No | If enabled, action will add threat
