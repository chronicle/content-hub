    reasoning: >-
      The action submits observables (indicators) to a Threat Intelligence Platform
      (ThreatFuse). It does not fetch enrichment data, update alerts, block IOCs on
      security controls, or submit files to a sandbox. Therefore, it does not match
      any of the predefined outcome categories.
