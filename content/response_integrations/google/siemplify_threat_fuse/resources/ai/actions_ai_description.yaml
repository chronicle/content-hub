Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IPs, URLs, Hashes, and Users) using the Siemplify ThreatFuse
    integration. This action retrieves threat intelligence, including severity and
    confidence scores, for the provided entities. It evaluates these indicators against
    configurable thresholds to determine if an entity should be marked as suspicious,
    updates the entity's internal properties, and optionally generates case insights
    or adds threat types as tags to the case.


    ### Flow Description

    1. Extracts configuration parameters (Web Root, API Root, Email, API Key, Verify
    SSL) and action parameters (Severity Threshold, Confidence Threshold, etc.).

    2. Filters the `target_entities` to include only supported types: `FILEHASH`,
    `ADDRESS`, `URL`, and `USER`.

    3. Calls `ThreatFuseManager.get_indicators` to fetch threat intelligence data
    for the supported entities.

    4. Matches the retrieved indicators to the corresponding entities using `ThreatFuseParser.match_entity_to_indicators`.

    5. For each entity, updates its `additional_properties` with enrichment data and
    marks it as enriched.

    6. Evaluates the entity's severity and confidence against the configured thresholds
    to determine if it is suspicious.

    7. Optionally adds threat types as tags to the case using `siemplify.add_tag`.

    8. Optionally creates case insights for the entity using `siemplify.create_case_insight`.

    9. Updates the enriched entities in the case using `siemplify.update_entities`.


    ### Additional Notes

    The action supports configurable thresholds for severity and confidence. It also
    provides options to ignore false positive statuses and to control the creation
    of insights based on whether the entity is deemed suspicious.
  ai_short_description: >-
    Enriches IP, URL, Hash, and User entities with threat intelligence from Siemplify
    ThreatFuse, evaluating risk based on configurable thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, adds tags to the case, and creates case
      insights.
    reasoning: >-
      The action fetches threat intelligence data from Siemplify ThreatFuse (fetches_data=true).
      It does not change external system state (can_mutate_external_data=false). It
      updates internal entities with enrichment data, adds tags to the case, and creates
      insights (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: true
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
