Get Related Hashes:
  ai_description: >-
    ### General Description

    Retrieves related file hashes for specified entities (Hash, URL, IP, Email, Threat
    Actor, CVE) from the Siemplify ThreatFuse platform. This action allows analysts
    to pivot from known indicators or threat entities to discover associated malicious
    file hashes, aiding in threat hunting and investigation.


    ### Flow Description

    1. Extracts configuration parameters (Web Root, API Root, API Key, etc.) and action
    parameters (Confidence Threshold, Max Hashes, and various search flags).

    2. Validates the provided confidence threshold against defined limits.

    3. Initializes the `ThreatFuseManager` to handle API interactions.

