      The action submits observables to an external threat intelligence platform (ThreatFuse).
      This does not match any of the predefined outcome categories (e.g., enrichment,
      containment, ticketing, etc.).
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Classification | DDL | Yes | Specify the classification of the observable (Public/Private).
    |

    | Threat Type | DDL | Yes | Specify the threat type of the observables (e.g.,
    APT, Malware, Phish). |

    | Source | String | No | Specify the intelligence source for the observable. |

    | Expiration Date | String | No | Specify the expiration date in days for the
    observable. If not specified, the observable will not expire. |

    | Trusted Circle IDs | String | No | Comma-separated list of trusted circle IDs
    to share the observables with. |

    | TLP | DDL | No | Specify the Traffic Light Protocol (TLP) for the observables.
    |

    | Confidence | String | No | Specify the confidence score for the observable.
    Requires 'Override System Confidence' to be enabled. |

    | Override System Confidence | Boolean | No | If enabled, created observables
    will use the confidence specified in the 'Confidence' parameter. |

    | Anonymous Submission | Boolean | No | If enabled, the action will perform an
    anonymous submission. |

    | Tags | String | No | Comma-separated list of tags to add to the observable.
    |
