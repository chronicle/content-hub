name: Remove IP From Group
description: "Remove a firewall address object from a suitable address group and delete\
    \ the firewall address object. \nAction is running as async, please adjust script\
    \ timeout value in Chronicle SOAR IDE for action as needed."
integration_identifier: FortiManager
parameters:
-   name: ADOM Name
    default_value: ''
    type: string
    description: 'The name of the ADOM. Default: root.'
    is_mandatory: true
-   name: Address Group Name
    type: string
    description: The name of the address group to remove the address from.
    is_mandatory: true
dynamic_results_metadata: []
creator: System
is_async: true
simulation_data_json: '{"Entities": ["ADDRESS"]}'
