name: Add IP To Group
description: "Create a firewall address object and add it to a suitable address group.\
    \ \nAction is running as async, please adjust script timeout value in Chronicle\
    \ SOAR IDE for action as needed."
integration_identifier: FortiManager
parameters:
-   name: ADOM Name
    default_value: root
    type: string
    description: 'The name of the ADOM. Default: root.'
    is_mandatory: true
-   name: Address Group Name
    type: string
    description: The name of the address group to add to address object to.
    is_mandatory: true
dynamic_results_metadata: []
creator: System
is_async: true
simulation_data_json: '{"Entities": ["ADDRESS"]}'
