name: Add URL To Url Filter
description: "Add a new block record to a url filter by it's name. \nAction is running\
    \ as async, please adjust script timeout value in Chronicle SOAR IDE for action\
    \ as needed."
integration_identifier: FortiManager
parameters:
-   name: ADOM Name
    default_value: root
    type: string
    description: 'The name of the ADOM. Default: root.'
    is_mandatory: true
-   name: Url Filter Name
    type: string
    description: The name of the URL filter to add record to.
    is_mandatory: true
dynamic_results_metadata: []
creator: System
is_async: true
simulation_data_json: '{"Entities": ["DestinationURL"]}'
