Execute Script:
  ai_description: >-
    ### General Description

    Executes a pre-defined script on a FortiManager device or device group. This action
    allows administrators to trigger automated configuration changes or administrative
    tasks remotely via the FortiManager API.


    ### Flow Description

    1. The action initializes the FortiManager client using the provided configuration
    (API Root, Username, Password).

    2. It retrieves the required parameters: `ADOM Name`, `Policy Package Name`, `Script
    Name`, `Device Name`, and the optional `VDOM`.

    3. The action calls the `execute_script` method, which sends a POST request to
    the FortiManager `/dvmdb/adom/{adom_name}/script/execute` endpoint.

    4. The FortiManager API processes the request and returns a `task_id`.

    5. The action concludes by returning the `task_id` to the SOAR platform.


    ### Additional Notes

    This action performs a state-changing operation on the FortiManager system. Ensure
    that the script being executed is verified and that the provided credentials have
    the necessary permissions to perform script execution within the specified ADOM.
