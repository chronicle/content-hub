Remove URL From Url Filter:
  ai_description: >-
    ### General Description

    Removes a specific URL from a URL filter configuration within FortiManager. This
    action facilitates the management of web filtering policies by allowing security
    analysts to remove previously blocked URLs from a specified URL filter list.


    ### Flow Description

    1. Initialize the `FortiManager` client using the provided configuration parameters
    (API Root, Username, Password).

    2. Filter the `target_entities` to include only those of type `URL`.

    3. For each URL entity:
        * Retrieve the URL filter ID by calling the `get_urlfilter_id_by_name` method
    using the provided `Url Filter Name` and `ADOM Name`.
        * Normalize the URL by removing 'http' or 'https' prefixes using the `remove_url_prefix`
    method.
        * Execute the `delete_block_url_record_from_urlfilter_by_id` method to remove
    the URL record from the specified filter in FortiManager.
    4. Manage the workflow session (lock/unlock ADOM) if workflow mode is enabled.

    5. Return the execution status and a summary of the removed entities.


    ### Additional Notes

    This action is asynchronous and may require adjusting the script timeout in the
    Chronicle SOAR IDE. It performs a direct mutation on the FortiManager configuration.
