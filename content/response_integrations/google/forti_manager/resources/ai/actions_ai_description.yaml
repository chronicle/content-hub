Remove IP From Group:
  ai_description: >-
    ### General Description

    Removes a firewall address object from a specified address group and deletes the
    address object from FortiManager. This action helps in cleaning up firewall configurations
    by removing decommissioned or unnecessary IP address objects from both their associated
    groups and the FortiManager database.


    ### Flow Description

    1. Initialize the `FortiManager` client using the provided configuration (API
    root, credentials, and workflow mode settings).

    2. Filter the target entities to process only those of type `ADDRESS`.

    3. For each target entity:
        a. Construct the address object name using the pattern `Siemplify_<IP>`.
        b. Call the `remove_address_object_from_address_group` method to remove the
    object from the specified address group.
        c. Call the `delete_address_object` method to delete the address object from
    FortiManager.
    4. Manage workflow sessions (locking/unlocking ADOM) if `workflow_mode` is enabled
    to ensure configuration changes are committed correctly.

    5. Return the execution result and log any errors encountered during the process.


    ### Additional Notes

    This action is asynchronous. Ensure the timeout is configured appropriately in
    the SOAR IDE to accommodate the time required for FortiManager to process the
    changes.
