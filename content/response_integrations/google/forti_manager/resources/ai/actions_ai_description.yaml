Add IP To Group:
  ai_description: >-
    ### General Description

    Adds IP Address entities to a specified address group in FortiManager. This action
    creates a firewall address object for the IP if it does not already exist, and
    then appends it to the designated address group.


    ### Flow Description

    1. Iterates through the target entities, filtering for those of type `ADDRESS`.

    2. For each IP address, checks if a corresponding address object already exists
    in FortiManager by making a GET request to the API.

    3. If the address object does not exist, makes a POST request to the FortiManager
    API to create a new address object for the IP.

    4. Makes a POST request to the FortiManager API to update the specified address
    group, adding the address object to its members.


    ### Additional Notes

    - This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed.
  ai_short_description: >-
    Creates a firewall address object for IP entities and adds them to a specified
    address group in FortiManager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates firewall address objects and adds them to a specified address group
      in FortiManager.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by creating address objects and adding them
      to address groups in FortiManager via POST requests. It does not fetch contextual
      enrichment data for the entities, nor does it mutate internal SecOps data, update
      entities, or create insights.
