Execute Script:
  ai_description: >-
    ### General Description

    Executes an existing script on a FortiManager device or device group. This action
    triggers a script execution on the target network device and returns the resulting
    task ID for tracking.


    ### Flow Description

    1. Retrieves the action parameters including the ADOM Name, Policy Package Name,
    Script Name, Device Name, and optionally the VDOM.

    2. Initializes the connection to the FortiManager API.

    3. Sends a POST request to the FortiManager API (`/dvmdb/adom/{adom_name}/script/execute`)
    to execute the specified script on the target device or device group.

    4. Retrieves the task ID from the API response and returns it as the action result.


    ### Additional Notes

    The script can be executed on a single device if the VDOM parameter is provided.
    If the VDOM is not provided, the script can be executed on a device group.
