Add URL To Url Filter:
  ai_description: >-
    ### General Description

    Adds a URL to a specified URL filter within FortiManager. This action helps in
    blocking malicious URLs by updating the URL filter configuration on the FortiManager
    device.


    ### Flow Description

    1. Initialize the `FortiManager` client using the provided configuration.

    2. Filter the target entities to process only those of type `URL`.

    3. Initiate a session for the specified ADOM (Administrative Domain), including
    locking the ADOM if workflow mode is enabled.

    4. For each URL entity:
        a. Call `forti_manager.get_urlfilter_id_by_name` to retrieve the ID of the
    target URL filter.
        b. Call `forti_manager.add_block_url_record_to_urlfilter_by_id` to add the
    URL as a block record to the filter.
    5. Finalize the session by submitting and committing changes (if in workflow mode)
    and unlocking the ADOM.


    ### Additional Notes

    This action is asynchronous and may require adjusting the script timeout in the
    Chronicle SOAR IDE.
