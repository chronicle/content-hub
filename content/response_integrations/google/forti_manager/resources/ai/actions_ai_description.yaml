Add IP To Group:
  ai_description: >-
    ### General Description

    This action adds an IP address entity to a specified address group within FortiManager.
    It ensures the necessary address object exists (creating it if it does not) and
    then updates the address group membership to include the new object. This is typically
    used to manage firewall policies or blocklists dynamically.


    ### Flow Description

    1. Initialize the `FortiManager` client using the provided configuration (API
    Root, Username, Password).

    2. Filter `target_entities` to include only those with the `ADDRESS` entity type.

    3. For each valid entity:
        a. Construct the address object name using the entity identifier (e.g., `Siemplify_{IP}`).
        b. Check if the address object already exists in the specified ADOM using
    a GET request.
        c. If the object does not exist, create it in the ADOM using an ADD request.
        d. Add the address object to the specified address group using an UPDATE request.
    4. If `Workflow Mode` is enabled, manage the ADOM session by locking it at the
    start and submitting/committing/approving changes at the end.

    5. Log the results and finalize the action.


    ### Additional Notes

    This action is asynchronous and may require adjusting the script timeout in the
    Chronicle SOAR IDE. It supports workflow sessions for ADOM management, which may
    cause the action to remain in an 'In Progress' state while waiting for ADOM locks.
  ai_short_description: >-
    Adds an IP address entity to a specified address group in FortiManager, creating
    the address object if it does not exist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates address objects and updates address group membership in FortiManager.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs API calls to FortiManager to create address objects and
      update address group membership (mutating external data). It does not fetch
      contextual data for enrichment, nor does it update internal SOAR entities or
      create insights.
