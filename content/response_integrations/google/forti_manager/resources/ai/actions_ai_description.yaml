Add URL To Url Filter:
  ai_description: >-
    ### General Description

    Adds a URL entity to a specified URL filter blocklist in FortiManager. This action
    initiates a state change on the external device to prevent network traffic to
    the specified URL.


    ### Flow Description

    1. Retrieves the specified `ADOM Name` and `Url Filter Name` parameters.

    2. Filters the target entities to include only URL entities.

    3. Establishes a session with FortiManager and locks the ADOM if workflow mode
    is enabled.

    4. For each URL entity, retrieves the URL filter ID by its name using the FortiManager
    API.

    5. Adds a block record for the URL to the specified URL filter via a POST request
    to the FortiManager API.

    6. Commits the changes, approves the workflow session, and unlocks the ADOM.


    ### Additional Notes

    The action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed to accommodate the workflow session locks and commits.
