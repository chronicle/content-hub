Search:
  ai_description: >-
    ### General Description

    Executes a search query in Sumo Logic to retrieve log messages and telemetry data
    matching specific criteria.


    ### Flow Description

    1. Initiates a search job in Sumo Logic using the provided query, start time,
    and end time via a POST request to the `api/v1/search/jobs` endpoint.

    2. Polls the job status asynchronously until completion via a GET request to the
    `api/v1/search/jobs/{job_id}` endpoint.

    3. Once completed, retrieves the search results up to the specified limit via
    a GET request to the `api/v1/search/jobs/{job_id}/messages` endpoint.

    4. Optionally deletes the search job from Sumo Logic if configured to do so via
    a DELETE request to the `api/v1/search/jobs/{job_id}` endpoint.

    5. Returns the search results as a JSON object and populates a data table in the
    SecOps platform.


    ### Additional Notes

    The action runs asynchronously. Time parameters can be provided in ISO-8601 format
    or Unix timestamp (milliseconds).
  ai_short_description: >-
    Executes a search query in Sumo Logic to retrieve log messages and telemetry data
    matching specific criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a search job in Sumo Logic and optionally deletes it after completion.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by retrieving search results from Sumo Logic. It mutates
