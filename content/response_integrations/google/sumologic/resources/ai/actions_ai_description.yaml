Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Sumo Logic platform to ensure that the integration is
    configured correctly and can communicate with the Sumo Logic API.


    ### Flow Description

    1. Retrieves the integration configuration parameters (API Root, Access ID, Access
    Key, Verify SSL).

    2. Initializes the Sumo Logic manager with the provided credentials.

    3. Executes a test search query (`| count _sourceCategory`) by making a POST request
    to the Sumo Logic search jobs API.

    4. Deletes the test search job by making a DELETE request to the Sumo Logic API.

    5. Returns a success message if the connection and test query are successful,
    or a failure message if an error occurs.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connectivity issues. It does not require any action-specific parameters.
  ai_short_description: >-
    Tests connectivity to the Sumo Logic platform by executing and deleting a test
    search job.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
