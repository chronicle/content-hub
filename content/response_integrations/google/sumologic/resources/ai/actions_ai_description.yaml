    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action tests connectivity by creating and deleting a test search job. It
      does not fetch contextual data for alerts, mutate persistent external business
      data, update internal entities, or create insights.
