Search:
  ai_description: >-
    ### General Description

    Executes a search query in Sumo Logic to retrieve log data. This action allows
    analysts to perform historical log analysis by querying the Sumo Logic platform
    directly from the SOAR environment.


    ### Flow Description

    1. The action initiates a search job in Sumo Logic using the provided query, start
    time, and end time parameters.

    2. If it is the first run, the action returns an 'In Progress' status while the
    search job executes on the Sumo Logic server.

    3. On subsequent runs, the action checks the status of the search job.

    4. Once the job is completed, the action retrieves the search results from Sumo
    Logic.

    5. The retrieved results are added to the action output as a data table and a
    JSON result object.

    6. If the 'Delete Search Job' parameter is enabled, the action deletes the search
    job from Sumo Logic after the results are collected.


    ### Additional Notes

    This action is asynchronous and may require multiple runs to complete if the search
    job takes time to process. The 'Since' and 'To' parameters support ISO-8601 or
    unixtime (milliseconds) formats.
  ai_short_description: >-
    Executes a search query in Sumo Logic and retrieves the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches search results from Sumo Logic (fetches_data=true). It does
      not mutate external security data (deleting a job is administrative cleanup).
      It does not mutate internal SOAR data.
