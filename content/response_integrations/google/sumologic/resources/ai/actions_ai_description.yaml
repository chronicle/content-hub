Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Sumo Logic server by initiating a search job and verifying
    the response. This action validates that the provided integration credentials
    and API root are correct and that the SOAR platform can successfully communicate
    with the Sumo Logic API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Access
    ID`, `Access Key`, and `Verify SSL`.

    2. It initializes the `SumoLogicManager` using these credentials.

    3. The `test_connectivity` method is invoked, which performs the following steps:
        * Initiates a search job via a POST request to the Sumo Logic API (`/api/v1/search/jobs`).
        * Deletes the created search job via a DELETE request to the Sumo Logic API
    (`/api/v1/search/jobs/{job_id}`).
    4. If the API calls succeed, the action returns a success status; otherwise, it
    catches the exception and returns a failure status.


    ### Additional Notes

    This action does not perform any data enrichment or alert management. It is strictly
    used for verifying the health and configuration of the Sumo Logic integration.
  ai_short_description: >-
    Tests connectivity to the Sumo Logic server to validate integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates and subsequently deletes a temporary search job in Sumo Logic to verify
      connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by creating and deleting a search job
      in the external system (Sumo Logic). This constitutes a mutation of external
      data (job state). It does not fetch contextual data for entities or alerts,
      nor does it modify internal SOAR data.
