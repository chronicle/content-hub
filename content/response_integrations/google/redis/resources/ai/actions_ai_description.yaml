Add To List:
  ai_description: >-
    ### General Description

    Adds a value to the head of a specified Redis list. If the list does not exist,
    the action creates a new list. This utility is useful for maintaining queues,
    logs, or tracking data points within a Redis instance.


    ### Flow Description

    1. The action connects to the Redis server using the configured server address
    and port.

    2. It retrieves the `List Name` and `Value` parameters provided by the user.

    3. It calls the `add_to_list` method, which executes the `LPUSH` command to add
    the value to the head of the specified Redis list.

    4. It calls the `get_list` method to retrieve all current values from the specified
    list.

    5. The retrieved list content is added to the action results as a JSON object.

    6. The action terminates with a success message.


    ### Additional Notes

    This action performs both a write operation (adding the value) and a read operation
    (fetching the updated list). The `Value` parameter can be any type supported by
    Redis (e.g., string, integer, dictionary, list).
  ai_short_description: >-
    Adds a value to a Redis list and returns the updated list content.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a value to a Redis list using the LPUSH command.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a write operation (LPUSH) to an external Redis database,
      which constitutes external data mutation. It also performs a read operation
      (fetching the list) to return the current state, which constitutes fetching
      data. It does not modify internal SOAR data or entities.
