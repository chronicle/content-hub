Get Key:
  ai_description: >-
    ### General Description

    Retrieves the value associated with a specific key from a Redis database. This
    action allows users to query the Redis instance and extract stored data for use
    within the playbook.


    ### Flow Description

    1. Connects to the Redis server using the integration's configured server address
    and port.

    2. Retrieves the target key name from the action parameters.

    3. Executes a GET command (`redis_client.get`) on the Redis database to fetch
    the value of the specified key.

    4. Returns the retrieved value as a JSON object, or returns `None` if the key
    does not exist.


    ### Additional Notes

    This action does not operate on entities. It strictly queries the Redis database
    based on the provided key name parameter.
