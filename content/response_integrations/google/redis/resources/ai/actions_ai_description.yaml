    1. The action initializes the `RedisManager` using the server address and port
    retrieved from the integration configuration.

    2. It retrieves the `List Name` parameter provided by the user.

    3. It calls the `get_list` method from the `RedisManager` to fetch all elements
    associated with the specified list name from the Redis database.

    4. The retrieved list values are added to the action results as JSON.

    5. The action terminates with a summary message indicating the number of elements
