Set Key:
  ai_description: >-
    ### General Description

    Sets a string value for a specified key in a Redis database. This action allows
    users to store or update data within a Redis instance, which can be used for various
    purposes such as maintaining state, caching, or storing configuration data.


    ### Flow Description

    1. Retrieves the Redis server configuration (address and port) from the integration
    settings.

    2. Initializes a connection to the Redis server using the `RedisManager`.

    3. Extracts the `Key Name` and `Value` from the action parameters.

    4. Executes the `set_key` method, which performs a `SET` command on the Redis
    server to store the provided value under the specified key.

    5. Terminates the action with a success message.


    ### Additional Notes

    This action overwrites any existing value associated with the specified key, regardless
    of the data type. The `Value` parameter can accept various data types, including
    strings, integers, dictionaries, or lists, which are then stored in Redis.
