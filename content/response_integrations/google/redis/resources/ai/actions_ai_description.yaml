Add To List:
  ai_description: >-
    ### General Description

    Adds a specified value to the head of a Redis list. If the target list does not
    already exist, a new list is created automatically.


    ### Flow Description

    1. Connects to the Redis server using the configured server address and port.

    2. Retrieves the `List Name` and `Value` from the action parameters.

    3. Executes an `LPUSH` command via the Redis API to add the value to the head
    of the specified list.

    4. Retrieves the updated list values from Redis.

    5. Returns the updated list as a JSON result and completes the action.


    ### Additional Notes

    The value parameter can represent various data types (e.g., string, integer, dictionary,
    list), though it is passed as a string from the SOAR platform.
  ai_short_description: >-
    Adds a specified value to the head of a Redis list, creating the list if it does
    not already exist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a value to the head of a specified Redis list.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to a Redis server and executes an LPUSH command to add a
      value to a list, which mutates external data (can_mutate_external_data=true).
      It does not fetch contextual data for entities, mutate internal SOAR data, update
      entities, create insights, modify alerts, or create case comments.
