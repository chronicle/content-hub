    Sets a string value for a specified key in a Redis database. If the key already
    exists, its value is overwritten regardless of its previous type.


    ### Flow Description

    1. Initializes the Redis connection using the configured server address and port.

    2. Retrieves the target `Key Name` and the `Value` to be set from the action parameters.

    3. Executes a `set` command via the Redis client API to assign the value to the
    specified key.

    4. Returns a success message upon successful execution.


    ### Additional Notes

    The value parameter can accept various types (e.g., string, integer, dictionary,
    list), which will be stored in the Redis database.
