    Retrieves all elements from a specified Redis list. This action connects to a
    Redis server and fetches the contents of a given list, returning the values as
    a JSON object.


    ### Flow Description

    1. Connects to the Redis server using the integration configuration parameters.

    2. Executes a command to retrieve all elements from the specified Redis list.

    3. If elements are found, they are formatted into a JSON object and attached to
    the action's results.

    4. Returns a summary message indicating the number of elements found or a failure
    message if the list is empty or not found.


