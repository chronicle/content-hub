Get Key:
  ai_description: >-
    General Description: Retrieves a value from a Redis database based on a specified
    key name.


    Flow Description:

    1. Initialize the `SiemplifyAction` and retrieve the Redis server configuration
    (Server Address, Port).

    2. Initialize the `RedisManager` with the server and port details.

    3. Retrieve the `Key Name` parameter provided by the user.

    4. Call the `get_key` method of the `RedisManager` to fetch the value associated
    with the key from the Redis database.

    5. Terminate the action using `siemplify.end`, returning the retrieved value or
    an indication that the value was not found.


    Additional Notes: This action is a read-only operation and does not modify the
    Redis database state.
