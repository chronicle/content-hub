name: Set Key
description: Set some string value in a Redis key. If the key already holds a value,
    overwrite the value, regardless of its type
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/redis#set_key
integration_identifier: Redis
parameters:
-   name: Key Name
    type: string
    description: Target key name.
    is_mandatory: true
-   name: Value
    type: string
    description: 'Can be any of the following types: str, int, dict, list, etc.'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: is_set
