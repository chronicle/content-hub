name: Add To List
description: Add a value to the head of a Redis list. If the list does not exist,
    create a new list
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/redis#add_to_list
integration_identifier: Redis
parameters:
-   name: List Name
    type: string
    description: Target list name.
    is_mandatory: true
-   name: Value
    type: string
    description: 'Can be any of the following types: str, int, dict, list, etc.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_to_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_added
