Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a PostgreSQL database to verify that the integration is
    configured correctly and can communicate with the server.


    ### Flow Description

    1. Retrieves connection details (server address, username, password, port, and
    database name) from the integration configuration.

    2. Attempts to establish a connection to the PostgreSQL database using the provided
    credentials.

    3. Closes the connection immediately upon successful establishment.

    4. Returns a success message if no exceptions occur during the connection process.


    ### Additional Notes

    This action is primarily used as a diagnostic tool to ensure the PostgreSQL integration
    is properly set up and reachable.
  ai_short_description: >-
    Tests connectivity to a PostgreSQL database to verify integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
