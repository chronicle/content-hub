Run SQL Query:
  ai_description: >-
    ### General Description

    Executes a custom SQL query against a specified PostgreSQL database. This action
    allows users to retrieve data or perform database operations by providing a database
    name and the SQL query string. It is designed for flexible database interaction,
    enabling analysts to query logs, telemetry, or application data stored within
    PostgreSQL.


    ### Flow Description

    1. The action initializes the `PostgreSQLManager` using connection details (server
    address, username, password, port) retrieved from the integration configuration.

    2. It establishes a connection to the specified `Database Name`.

    3. The provided `Query` is executed against the database using the `execute` method.

    4. The action commits the transaction to the database.

    5. If the query returns results, the action constructs a CSV table and adds it
    to the action results.

    6. The raw query results are returned as a JSON object in the action output.


    ### Additional Notes

    This action supports any valid SQL query. Users should exercise caution when executing
    queries that modify database state (e.g., DELETE, UPDATE, INSERT), as the action
    commits changes to the database. Ensure the database user provided in the configuration
    has the appropriate permissions for the intended operations.
  ai_short_description: >-
    Executes a custom SQL query against a PostgreSQL database and returns the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action executes arbitrary SQL queries, which may include commands that modify,
      update, or delete data within the connected PostgreSQL database.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes arbitrary SQL queries against a PostgreSQL database. It
      fetches data (SELECT queries) and can mutate external data (INSERT/UPDATE/DELETE
      queries). It does not mutate internal SOAR data, update entities, or create
      insights.
