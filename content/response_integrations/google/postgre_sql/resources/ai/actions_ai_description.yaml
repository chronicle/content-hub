Run SQL Query:
  ai_description: >-
    ### General Description

    Executes a custom SQL query against a specified PostgreSQL database. This action
    connects to the database, runs the provided query, and retrieves the results,
    making it suitable for both data retrieval and data manipulation tasks.


    ### Flow Description

    1. Retrieves the target database name and SQL query from the action parameters.

    2. Establishes a connection to the external PostgreSQL database using the integration's
    configured credentials and server address.

    3. Executes the provided SQL query against the database.

    4. Commits the transaction to ensure any data manipulation statements (e.g., INSERT,
    UPDATE) are saved.

    5. If the query returns a result set (e.g., a SELECT statement), it formats the
    rows into a JSON structure and a CSV data table.

    6. Closes the database connection and returns the results to the SecOps platform.


    ### Additional Notes

    Because this action executes arbitrary SQL queries and commits the transaction,
    it can be used to mutate data in the target database. Ensure that the provided
    query is safe and that the database user has appropriate permissions.
  ai_short_description: >-
    Executes a custom SQL query against a specified PostgreSQL database and returns
    the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action can execute arbitrary SQL queries, including data manipulation statements
      (INSERT, UPDATE, DELETE), which will modify records in the external PostgreSQL
      database.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes an arbitrary SQL query and commits the transaction. This
