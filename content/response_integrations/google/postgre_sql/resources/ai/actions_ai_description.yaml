Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a PostgreSQL database. This action verifies that the integration
    configuration is correct and that the SOAR platform can successfully establish
    a connection to the target PostgreSQL instance.


    ### Flow Description

    1. Retrieves configuration parameters (Server Address, Username, Password, Port,
    and Database Name) from the integration configuration.

    2. Initializes the `PostgreSQLManager` class, which attempts to establish a connection
    to the specified PostgreSQL database using the provided credentials.

    3. Closes the connection immediately upon successful initialization.

    4. Returns a success message if the connection is established without errors.


    ### Additional Notes

    This action does not perform any queries or data retrieval. It is strictly used
    for connectivity testing to ensure the integration is properly configured.
  ai_short_description: >-
    Tests connectivity to a PostgreSQL database by attempting to establish a connection
    with the provided credentials.
