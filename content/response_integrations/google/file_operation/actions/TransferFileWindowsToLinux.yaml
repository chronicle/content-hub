name: Transfer File Windows To Linux
description: Transfer file from windows share to a remote Linux host
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fileoperation#transfer_file_windows_to_linux
integration_identifier: FileOperation
parameters:
-   name: source_win_file_path
    default_value: ''
    type: string
    description: The server folder with the relevant files. Full path
    is_mandatory: true
-   name: dest_linux_path
    default_value: ''
    type: string
    description: The remote server folder to put the files into
    is_mandatory: true
-   name: dest_linux_ip
    default_value: ''
    type: string
    description: x.x.x.x
    is_mandatory: true
-   name: dest_linux_username
    default_value: ''
    type: string
    description: dest_linux_username
    is_mandatory: true
-   name: dest_linux_password
    default_value: ''
    type: password
    description: dest_linux_password
    is_mandatory: true
-   name: keep_file
    default_value: ''
    type: boolean
    description: Indicates weather to keep the file in source or remove it
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: FilePath
