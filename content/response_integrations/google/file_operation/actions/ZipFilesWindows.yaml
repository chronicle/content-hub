name: Zip Files Windows
description: Create a zip file from source windows share files
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fileoperation#zip_files_windows
integration_identifier: FileOperation
parameters:
-   name: source_folder
    default_value: ''
    type: string
    description: The folder with the relevant files
    is_mandatory: true
-   name: file_filter
    default_value: ''
    type: string
    description: 'files extension to include in zip file {ex: *.txt}'
    is_mandatory: true
-   name: output_folder
    default_value: ''
    type: string
    description: The folder to put the zip file into
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: ZIpPath
