name: Transfer File Windows To Windows
description: Transfer file between two windows shares
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fileoperation#transfer_file_windows_to_windows
integration_identifier: FileOperation
parameters:
-   name: source_win_file_path
    default_value: ''
    type: string
    description: The folder with the relevant files. Full path
    is_mandatory: true
-   name: dest_win_path
    default_value: ''
    type: string
    description: The folder to put the files into
    is_mandatory: true
-   name: keep_file
    default_value: ''
    type: string
    description: Indicates weather to keep the file in source or remove it
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: FilePath
