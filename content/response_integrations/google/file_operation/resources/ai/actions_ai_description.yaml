    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to a destination remote Linux host and optionally deletes the
      original file from the source Linux host.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to two remote Linux hosts via SFTP. It downloads a file
      from the source host and uploads it to the destination host, optionally deleting
      the source file. This mutates external data (creating a file on the destination
      and potentially deleting on the source). It does not fetch data for enrichment,
