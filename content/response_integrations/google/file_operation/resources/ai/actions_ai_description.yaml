Tarzip Files Linux:
  ai_description: >-
    ### General Description

    This action creates a compressed `.tar.gz` archive of files on a remote Linux
    server. It connects to the specified server via SSH, identifies files matching
    a provided filter within a source directory, and archives them into a specified
    output directory.


    ### Flow Description

    1. The action initializes a connection to the remote Linux server using the provided
    `server_ip`, `username`, and `password` via SSH.

    2. It constructs a shell command using the `find` utility to locate files in the
    `source_folder` that match the `file_filter` pattern.

    3. The identified files are piped to the `tar` command to create a compressed
    archive at the specified `output_folder`.

    4. The action returns the full path of the newly created archive file as the result.


    ### Additional Notes

    This action performs file system operations on a remote host. Ensure the provided
    credentials have sufficient permissions to read the source files and write to
    the output directory.
