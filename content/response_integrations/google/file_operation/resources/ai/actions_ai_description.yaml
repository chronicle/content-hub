Transfer File Linux To Windows:
  ai_description: >-
    ### General Description

    Transfers a file from a remote Linux host to a local Windows path using SFTP.
    This action facilitates the retrieval of files for forensic analysis or data collection
    by establishing a secure connection to a remote server and downloading the specified
    file.


    ### Flow Description

    1. The action initializes the `FileOperationManager` to handle file operations.

    2. It retrieves the required parameters: `source_linux_file_path`, `source_linux_ip`,
    `source_linux_username`, `source_linux_password`, `dest_win_path`, and `keep_file`.

    3. An SFTP session is established with the remote Linux host using the provided
    credentials via the `paramiko` library.

    4. The action downloads the specified file from the remote Linux host to the local
    Windows destination path.

    5. If the `keep_file` parameter is set to `False`, the action deletes the original
    file from the remote Linux host.

    6. The SFTP session is closed.

    7. The action concludes by returning the destination path of the transferred file.


    ### Additional Notes

    This action requires network connectivity to the remote Linux host via SSH/SFTP
    (typically port 22). Ensure the provided credentials have sufficient permissions
    to read and, if `keep_file` is False, delete the source file.
  ai_short_description: >-
    Transfers a file from a remote Linux host to a local Windows path via SFTP, with
    an optional feature to delete the source file after transfer.
