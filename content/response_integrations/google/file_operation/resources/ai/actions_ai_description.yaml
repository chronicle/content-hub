Transfer File Linux To Linux:
  ai_description: >-
    ### General Description

    Transfers a file from a source Linux server to a destination Linux server using
    SFTP. This action facilitates the movement of files between remote systems, with
    an optional configuration to remove the source file after a successful transfer.


    ### Flow Description

    1. The action establishes an SFTP connection to the source Linux server using
    the provided credentials.

    2. The action establishes an SFTP connection to the destination Linux server using
    the provided credentials.

    3. The specified file is downloaded from the source Linux server to a temporary
    local file.

    4. The temporary local file is uploaded to the specified destination path on the
    destination Linux server.

    5. If the `keep_file` parameter is set to `False`, the original file is deleted
    from the source Linux server.

    6. The temporary local file is deleted from the local environment.


    ### Additional Notes

    This action requires valid SSH/SFTP credentials for both the source and destination
    servers. Ensure that the service account used has the necessary read/write permissions
    on the respective file paths.
