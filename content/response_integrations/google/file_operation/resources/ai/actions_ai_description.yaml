Transfer File Linux To Linux:
  ai_description: >-
    ### General Description

    Transfers a file from one remote Linux host to another remote Linux host using
    SFTP. This action allows for automated file movement between servers and can optionally
    clean up the original file from the source server.


    ### Flow Description

    1. Establishes an SFTP connection to the source Linux host using the provided
    IP and credentials.

    2. Downloads the specified file from the source host to a temporary local location.

    3. Establishes an SFTP connection to the destination Linux host using the provided
    IP and credentials.

    4. Uploads the temporary file to the specified destination path on the destination
    host.

    5. If the `keep_file` parameter is set to false, deletes the original file from
    the source host.

    6. Removes the temporary local file and closes both SFTP connections.


    ### Additional Notes

    Ensure that the SOAR platform has network access to port 22 (SSH/SFTP) on both
    the source and destination Linux hosts, and that the provided credentials have
    the necessary read/write permissions.
  ai_short_description: >-
    Transfers a file from a source remote Linux host to a destination remote Linux
    host via SFTP.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
