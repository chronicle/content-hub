Tarzip Files Linux:
  ai_description: >-
    ### General Description

    Creates a `.tar.gz` archive file on a remote Linux host. This action connects
    to the specified Linux server via SSH and compresses files matching a specific
    extension filter from a source directory into a new archive file in the destination
    directory.


    ### Flow Description

    1. Establishes an SSH connection to the remote Linux host using the provided IP
    address, username, and password.

    2. Constructs and executes a `tar` command over SSH to find and compress files
    matching the `file_filter` within the `source_folder`.

    3. Saves the resulting `.tar.gz` archive in the specified `output_folder` on the
    remote host.

    4. Returns the full path of the newly created archive file as the result.


    ### Additional Notes

    Ensure that the provided credentials have the necessary permissions to read the
    source files and write to the output directory on the remote Linux host.
