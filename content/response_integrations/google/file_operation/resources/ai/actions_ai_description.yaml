Tarzip Files Windows:
  ai_description: >-
    ### General Description

    Compresses files from a specified Windows source folder into a `.tar.gz` archive
    and saves it to a designated output folder. This utility action facilitates file
    management and data preparation tasks within the SOAR environment.


    ### Flow Description

    1. The action retrieves the `source_folder`, `file_filter`, and `output_folder`
    parameters from the configuration.

    2. It initializes the `FileOperationManager` to handle the file system operations.

    3. The `targz_windows` method is invoked, which performs the following steps:
        * It generates a unique filename for the archive using a timestamp.
        * It walks through the specified `source_folder` using `os.walk`.
        * It identifies files that match the provided `file_filter` extension.
        * It creates a new `.tar.gz` archive in the `output_folder` and adds the filtered
    files to it.
    4. The action concludes by returning the path of the newly created archive file
    to the SOAR platform.


    ### Additional Notes

    This action performs local file system operations. Ensure that the SOAR engine
    has the necessary read and write permissions for both the source and output directories.
    This action does not interact with external security APIs or entities.
