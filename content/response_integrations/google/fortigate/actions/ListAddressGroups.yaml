name: List Address Groups
description: List available address groups in Fortigate
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fortigate#list_address_groups
integration_identifier: Fortigate
parameters:
-   name: Filter Key
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Name
    description: Specify the key that needs to be used to filter address groups.
    is_mandatory: false
-   name: Filter Logic
    default_value: Not Specified
    type: ddl
    optional_values:
    - Not Specified
    - Equal
    - Contains
    description: Specify what filter logic should be applied. Filtering logic is working
        based on the value provided in the "Filter Key" parameter.
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter. If "Equal" is selected,
        action will try to find the exact match among results and if "Contains" is
        selected, action will try to find results that contain that substring. If
        nothing is provided in this parameter, the filter will not be applied. Filtering
        logic is working based on the value  provided in the "Filter Key" parameter.
    is_mandatory: false
-   name: Max Records To Return
    default_value: 50
    type: string
    description: Specify how many records to return. If nothing is provided, action
        will return 50 records.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_address_groups_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
