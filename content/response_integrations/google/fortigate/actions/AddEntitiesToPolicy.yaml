name: Add Entities To Policy
description: 'Add entities to policy in Fortigate. Supported entities: URL, IP Address.
    Note: action will extract domain part of URL entities. '
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fortigate#add_entities_to_policy
integration_identifier: Fortigate
parameters:
-   name: Policy Name
    default_value: ''
    type: string
    description: Specify the name of the policy to which action should add entities.
    is_mandatory: true
-   name: Location
    default_value: Destination
    type: ddl
    optional_values:
    - Destination
    - Source
    description: Specify the location for the entities.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "DestinationURL"]}'
