name: Add Entities To Address Group
description: 'Add entities to the address group in Fortigate. Supported entities:
    URL, IP Address. Note: action will extract domain part of URL entities.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fortigate#add_entities_to_address_group
integration_identifier: Fortigate
parameters:
-   name: Address Group Name
    default_value: ''
    type: string
    description: Specify the name of the address group to which action should add
        entities.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "DestinationURL"]}'
