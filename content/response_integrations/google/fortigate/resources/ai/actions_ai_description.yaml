    ### General Description

    Tests connectivity to the Fortigate server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, API Key, Verify SSL).

    2. Initializes the FortigateManager.

    3. Calls the `test_connectivity` method which makes a GET request to the `/api/v2/cmdb/firewall/addrgrp?count=1`
    endpoint.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

