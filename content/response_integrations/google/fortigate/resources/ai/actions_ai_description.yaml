  ai_description: >-
    Adds specified IP Address and URL entities to a designated policy in Fortigate.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Policy Name | string | Yes | Specify the name of the policy to which the action
    should add entities. |

    | Location | string | No | Specify the location for the entities within the policy
    (Destination or Source). Default is Destination. |


    ### Flow

    1. Retrieves the specified policy from Fortigate.

    2. Iterates over the supported entities (IP Address, URL).

    3. Checks if each entity already exists in Fortigate; if not, creates it.

    4. Adds the entity to the specified policy's source or destination items if it
    is not already present.

    5. Returns a summary of successfully added, already existing, and failed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new address entities in Fortigate if they do not exist and adds them
      to the specified policy's source or destination items.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches policy and entity data from Fortigate (fetches_data=true).
      It then creates entities if they do not exist and updates the policy to include
      these entities (can_mutate_external_data=true). It does not mutate internal
      Siemplify data such as updating entities, creating insights, or adding case
      comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by creating entities and updating policies
      in Fortigate, so it cannot be an Enrichment action. Since adding entities to
      a firewall policy is a standard method for blocking or allowing network traffic
      (e.g., blocking IPs or domains), it qualifies as a Remediation action.
    remediation: true
  entity_usage:
    entity_types:
    - ADDRESS
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where supported types are ADDRESS and URL (mapped
      to DestinationURL in simulation data).
