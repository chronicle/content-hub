Remove Entities From Policy:
  ai_description: >-
    ### General Description

    Removes specified IP Address and URL entities from a designated policy in Fortigate.
    This action modifies the firewall configuration by detaching the entities from
    either the source or destination items of the specified policy.


    ### Flow Description

    1. Retrieves the specified policy from Fortigate using the provided `Policy Name`.

    2. Iterates through the target IP Address and URL entities.

    3. Checks if each entity exists in the Fortigate environment via a GET request.

    4. Verifies if the entity is currently a part of the specified policy's source
    or destination items (based on the `Location` parameter).

    5. If present, makes a PUT request to the Fortigate API to update the policy and
    remove the entity.

    6. Returns a summary of successfully removed entities, entities not found in the
    policy, and failed entities.


    ### Additional Notes

    The action automatically extracts the domain part of URL entities before processing
    them against the Fortigate API.
