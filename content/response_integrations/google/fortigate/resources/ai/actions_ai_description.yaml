Add Entities To Policy:
  ai_description: >-
    ### General Description

    Adds specified entities (IP Addresses or URLs) to a designated firewall policy
    within Fortigate. This action automates the process of updating security policies
    by ensuring the required address objects exist in Fortigate and then appending
    them to the specified policy's source or destination list.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API Root,
    API Key, SSL verification) and action parameters (Policy Name, Location).

    2. **Policy Retrieval**: It calls the Fortigate API (`GET /api/v2/cmdb/firewall/policy/`)
    to verify the existence of the specified policy.

    3. **Entity Processing**: For each target entity (filtered for `ADDRESS` or `URL`
    types):
        - It checks if the entity already exists in Fortigate using `GET /api/v2/cmdb/firewall/address/`.
        - If the entity does not exist, it creates it via `POST /api/v2/cmdb/firewall/address/`.
        - It checks if the entity is already present in the target policy's item list.
        - If not present, it updates the policy using `PUT /api/v2/cmdb/firewall/policy/{policy_id}`
    to include the new entity.
    4. **Completion**: The action returns a summary of successful, existing, and failed
    entities.


    ### Additional Notes

    - The action supports both `Source` and `Destination` locations for the entities
    within the policy.

    - URL entities are processed by extracting the domain part before being added
    to Fortigate.

    - IP Address entities have their subnet information handled appropriately during
    the creation and addition process.
  ai_short_description: >-
    Adds IP Address or URL entities to a specific Fortigate firewall policy, creating
    the necessary address objects if they do not exist.
