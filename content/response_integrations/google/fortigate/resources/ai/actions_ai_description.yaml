List Address Groups:
  ai_description: >-
    ### General Description

    Lists available address groups from the Fortigate firewall. This action allows
    users to retrieve a list of address groups, with optional filtering capabilities
    based on name, to better understand the network configuration.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Key, Verify SSL)
    and action parameters (Filter Key, Filter Logic, Filter Value, Max Records To
    Return).

    2. It validates the provided parameters, ensuring that if a filter logic is specified,
    a filter key is also selected, and that the maximum records limit is a positive
    integer.

    3. The `FortigateManager` is initialized with the provided credentials and configuration.

    4. The action calls the `list_address_groups` method on the `FortigateManager`,
    which performs a GET request to the Fortigate API to retrieve the address groups
    based on the provided filters.

    5. If address groups are found, the action adds a data table and the raw JSON
    result to the action output.

    6. If no address groups are found, it returns a message indicating that no results
    were found for the provided criteria.


    ### Additional Notes

    The action supports filtering by name using "Equal" or "Contains" logic. If no
    filter value is provided, the filter is not applied.
