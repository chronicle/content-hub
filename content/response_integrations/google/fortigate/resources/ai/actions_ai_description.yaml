Add Entities To Address Group:
  ai_description: >-
    ### General Description

    Adds entities to a specified address group in Fortigate. The action supports IP
    Address and URL entities, extracting the domain part from URL entities before
    processing.


    ### Flow Description

    1. Retrieves the specified address group from Fortigate to verify its existence.

    2. Iterates through the supported target entities (IP Address and URL).

    3. Checks if each entity already exists as an address object in Fortigate.

    4. If the entity does not exist, it creates a new address object for it via the
    Fortigate API.

    5. Checks if the entity is already a member of the target address group.

    6. If not, adds the entity to the address group by making a PUT request to the
    Fortigate API.

    7. Returns a summary message detailing which entities were successfully added,
    which already existed in the group, and which failed.


    ### Additional Notes

    Supported entities: IP Address, URL. The action extracts the domain part of URL
    entities.
  ai_short_description: >-
    Adds IP Address and URL entities to a specified address group in Fortigate, creating
    new address objects if they do not already exist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new address objects if they do not exist and adds them to the specified
      address group in Fortigate.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action interacts with the Fortigate API to check for the existence of address
      objects and address groups. It mutates external data by creating new address
      objects (POST request) if they do not exist and updating the address group (PUT
      request) to include the entities. It does not fetch contextual data for enrichment,
      nor does it mutate internal SecOps data, update entities, or create insights.
