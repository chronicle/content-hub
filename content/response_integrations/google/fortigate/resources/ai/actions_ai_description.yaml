Add Entities To Address Group:
  ai_description: >-
    ### General Description

    Adds specified entities (IP addresses or URLs) to a designated address group within
    the Fortigate firewall. This action facilitates the dynamic management of network
    security policies by allowing security teams to update firewall address groups
    directly from the SOAR platform based on incident response requirements.


    ### Flow Description

    1. The action retrieves the Fortigate API configuration (API Root, API Key, Verify
    SSL).

    2. It fetches the specified address group from the Fortigate firewall using the
    `get_address_group_by_name` API call to verify its existence.

    3. It iterates through the provided target entities, filtering for supported types:
    IP Address and URL.

    4. For each entity, it checks if the entity already exists in Fortigate using
    the `get_entity` API call.

    5. If the entity does not exist, it creates the entity in Fortigate using the
    `create_entity` API call.

    6. It then adds the entity to the specified address group using the `update_address_group_entities`
    API call.

    7. Finally, it returns a summary message detailing which entities were successfully
    added, which were already present, and which failed to be added.


    ### Additional Notes

    - URL entities are processed by extracting the domain part using `get_domain_from_entity`.

    - IP address entities are processed by removing subnet information using `remove_subnet_from_ip_address`.

    - This action performs a state change on the external Fortigate firewall.
  ai_short_description: >-
    Adds IP Address or URL entities to a specified address group in Fortigate.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entities to a Fortigate address group and creates missing entities in Fortigate.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET requests to fetch address group and entity information,
      and POST/PUT requests to create entities and update the address group in Fortigate.
      It does not modify internal SOAR data (entities/insights).
