Remove Entities From Address Group:
  ai_description: >-
    ### General Description

    Removes specified entities (IP Addresses or URLs) from a designated address group
    within a Fortigate firewall. This action is typically used to manage network security
    policies by dynamically updating address groups, such as blocklists or allowlists,
    directly from the SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, and `Verify SSL` to establish a connection with the Fortigate firewall.

    2. It retrieves the `Address Group Name` parameter provided by the user.

    3. The action initializes the `FortigateManager` and verifies the existence of
    the specified address group on the Fortigate device.

    4. It iterates through the provided target entities, filtering for `ADDRESS` and
    `URL` types.

    5. For each valid entity, the action checks if it exists within the Fortigate
    system.

    6. If the entity exists and is currently part of the specified address group,
    the action calls the Fortigate API to remove the entity from that group.

    7. Finally, the action generates an output message summarizing the successful
    removals, entities not found in the group, and any failures encountered during
    the process.


    ### Additional Notes

    - The action automatically handles the extraction of domain names from URL entities
    and removes subnet masks from IP addresses to ensure compatibility with Fortigate's
    address object format.

    - If the specified address group does not exist, the action will fail and return
    an error message.
