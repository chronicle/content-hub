Remove Entities From Policy:
  ai_description: >-
    ### General Description

    Removes specified entities (IP Addresses and URLs) from a designated firewall
    policy within the Fortigate environment. This action allows security analysts
    to dynamically update firewall policies by removing indicators that no longer
    require restriction or monitoring, directly interacting with the Fortigate API
    to modify policy configurations.


    ### Flow Description

    1. **Initialization**: The action initializes the `FortigateManager` using the
    provided API credentials and connectivity settings.

    2. **Policy Retrieval**: It calls the Fortigate API (`GET /api/v2/cmdb/firewall/policy/`)
    to locate the policy specified by the `Policy Name` parameter.

    3. **Entity Processing**: The action iterates through the provided `target_entities`,
    filtering for `ADDRESS` and `URL` types.

    4. **Existence Check**: For each valid entity, it queries the Fortigate API to
    verify if the entity exists in the Fortigate address book.

    5. **Policy Update**: If the entity exists and is currently associated with the
    specified policy (in the defined `Location`: Source or Destination), the action
    performs a `PUT` request to the Fortigate API to remove the entity from the policy's
    item list.

    6. **Result Reporting**: The action compiles a summary of successfully removed
    entities, entities that were not found in the policy, and any failures, returning
    this as the final output message.


    ### Additional Notes

    - The action supports both Source and Destination locations for the entities within
    the policy.

    - URL entities are processed by extracting the domain part before removal.

    - IP Address entities are processed by removing subnet information if present.
  ai_short_description: >-
    Removes specified IP Address or URL entities from a designated Fortigate firewall
    policy.
