List Address Groups:
  ai_description: >-
    ### General Description

    Retrieves a list of available address groups from Fortigate based on specified
    filtering criteria. This action allows users to query the Fortigate firewall for
    address groups, optionally filtering by name and limiting the number of results
    returned.


    ### Flow Description

    1. Extracts the provided filter key, logic, value, and limit parameters.

    2. Validates the filter parameters to ensure a valid combination is provided (e.g.,
    if a filter logic is selected, a filter key must also be selected).

    3. Makes a GET request to the Fortigate API (`/api/v2/cmdb/firewall/addrgrp/`)
    to fetch the address groups matching the criteria.

    4. Parses the response and returns the address groups as a JSON result and populates
    a data table with the findings.


    ### Additional Notes

    If no filter value is provided, the filter will not be applied, and the action
    will return up to the maximum number of records specified.
