Add Entities To Policy:
  ai_description: >-
    ### General Description

    Adds specified IP Address and URL entities to a designated policy in Fortigate.
    This action ensures that the entities exist as address objects in Fortigate and
    then appends them to either the source or destination of the specified firewall
    policy.


    ### Flow Description

    1. Extracts the target policy name and location (Source or Destination) from the
    action parameters.

    2. Retrieves the specified policy from Fortigate via a GET request to verify its
    existence.

    3. Iterates over the supported entities (IP Address and URL) provided in the case.

    4. For each entity, checks if a corresponding address object already exists in
    Fortigate using a GET request.

    5. If the address object does not exist, creates it in Fortigate via a POST request.

    6. Checks if the entity is already part of the target policy's source or destination
    items.

    7. If the entity is not in the policy, updates the policy to include the new entity
    via a PUT request.


    ### Additional Notes

    - The action automatically extracts the domain part of URL entities before processing
    them.

    - Subnets are removed from IP addresses when creating the address object name,
    but the full subnet is used for the object's configuration.
  ai_short_description: >-
    Adds IP Address and URL entities to a specified firewall policy in Fortigate,
    automatically creating the necessary address objects if they do not already exist.
