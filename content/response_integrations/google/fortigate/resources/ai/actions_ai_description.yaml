  ai_description: >-
    Lists available address groups in Fortigate based on specified filter criteria.


    ### Parameters Description

    * **Filter Key**: (Optional, String) Specify the key that needs to be used to
    filter address groups (e.g., Name).

    * **Filter Logic**: (Optional, String) Specify what filter logic should be applied
    (Equal, Contains). Filtering logic works based on the value provided in the 'Filter
    Key' parameter.

    * **Filter Value**: (Optional, String) Specify what value should be used in the
    filter. If 'Equal' is selected, the action will try to find an exact match. If
    'Contains' is selected, it will try to find results that contain that substring.
    If nothing is provided, the filter will not be applied.

    * **Max Records To Return**: (Optional, Integer) Specify how many records to return.
    Default is 50.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the filter parameters to ensure correct usage.

    3. Calls the Fortigate API to retrieve address groups matching the criteria.

    4. Returns the results as a JSON object and a data table.
