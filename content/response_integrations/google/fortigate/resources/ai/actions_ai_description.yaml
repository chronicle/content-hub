Add Entities To Address Group:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action adds entities to an address group in Fortigate. While this could
      be part of a blocking workflow, it does not explicitly update a blocklist or
      allowlist, nor does it match any other specific expected outcome like enriching
      an IOC, updating an alert, or containing a host.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Adds specific entities (IP Addresses and URLs) to a designated Address Group in
    Fortigate. The action ensures that the entities exist in Fortigate before adding
    them to the specified group. For URL entities, the action extracts and uses the
    domain part.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Address Group Name | Yes | String | Specify the name of the address group to
    which the action should add entities. |


    ### Flow Description

    1. Validates the existence of the specified Address Group in Fortigate.

    2. Iterates through the target entities (IP Addresses and URLs).

    3. Checks if each entity exists in Fortigate; creates the entity if it does not.

    4. Checks if the entity is already a member of the Address Group.

    5. Adds the entity to the Address Group if it is not already a member.

    6. Returns a summary of successful, existing, and failed entity additions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new address entities and updates the membership of an existing address
      group in Fortigate.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch contextual data to enrich entities. It mutates external
      data by creating new address entities (`manager.create_entity`) and updating
      the membership of an address group (`manager.update_address_group_entities`)
      in Fortigate. It does not mutate internal SecOps data, update entities, create
      insights, or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by creating entities and updating address groups
      in Fortigate, so it cannot be an Enrichment action. It does not explicitly perform
      identity, host, network, or email remediation (like blocking an IP or isolating
      a host), as adding to an address group does not inherently block traffic unless
      the group is used in a block policy. Therefore, it is not strictly a Remediation
      action.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES`
      includes `EntityTypes.ADDRESS` and `EntityTypes.URL`. Therefore, it processes
      ADDRESS and DestinationURL entities and filters by entity type.
