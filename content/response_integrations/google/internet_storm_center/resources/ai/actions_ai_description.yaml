Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using threat intelligence data from the Internet
    Storm Center. This action retrieves detailed information about an IP address,
    including attack counts, risk levels, and associated threat feeds, to assist analysts
    in evaluating the potential threat posed by the entity.


    ### Flow Description

    1. The action extracts the `Create Insight` parameter and configuration settings
    (Email Address, Verify SSL).

    2. It filters the `target_entities` to identify those of type `ADDRESS`.

    3. For each suitable entity, the action initiates a request to the Internet Storm
    Center API to fetch device-specific data.

    4. Upon receiving the data, the action updates the entity's `additional_properties`
    with the retrieved enrichment data and sets `is_enriched` to true.

    5. If `Create Insight` is enabled, the action generates an insight containing
    the retrieved threat intelligence and attaches it to the entity.

    6. The action compiles the results into JSON and table formats and returns them
    to the SOAR platform.


    ### Additional Notes

    This action is designed to run asynchronously. It includes logic to handle API
    rate limiting and execution timeouts, ensuring that the action gracefully exits
    or reports pending entities if the global timeout is approached.
  ai_short_description: >-
    Enriches IP Address entities with threat intelligence data from the Internet Storm
    Center.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties and creates insights within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (Internet Storm Center) and updates
      internal SOAR entities (enrichment data and insights). It does not mutate external
      systems.
