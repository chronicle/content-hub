Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Internet Storm Center API to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Initializes the connection to the Internet Storm Center API using the provided
    integration configuration.

    2. Makes a GET request to the `/api/handler?json=null` endpoint.

    3. Validates the response to confirm successful communication.

    4. Returns a success or failure message based on the HTTP response.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
  ai_short_description: >-
    Tests connectivity to the Internet Storm Center API to verify integration configuration.
