Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using information from the Internet Storm Center.
    This action retrieves threat intelligence data such as attack counts, threat feeds,
    and risk levels associated with the IP address.


    ### Flow Description

    1. The action filters the target entities to include only IP Addresses.

    2. For each suitable entity, it makes an asynchronous GET request to the Internet
    Storm Center API to retrieve device information.

    3. If data is found, the action updates the entity's additional properties with
    the retrieved information and marks it as enriched.

    4. If the `Create Insight` parameter is enabled, it generates an insight containing
    the retrieved information.

    5. The action attaches the results as JSON and CSV tables to the case.


    ### Additional Notes

    - The action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted accordingly.

    - Due to API rate limiting, a large timeout value is recommended.
  ai_short_description: >-
    Enriches IP Address entities by retrieving threat intelligence data, such as attack
    counts and risk levels, from the Internet Storm Center.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Internet Storm Center API to fetch device
      data for IP addresses. It does not mutate external data. It updates internal
      entities with the retrieved data and can optionally create insights.
  entity_usage:
