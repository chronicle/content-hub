Enrich Entities:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action fetches threat intelligence data (attacks, threat feeds, AS info)
      for an IP address from the Internet Storm Center. This matches the 'Enrich IOC'
      expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Enriches IP Address entities using information from the Internet Storm Center.
    This action retrieves threat intelligence data such as blocked packets count,
    amount of attacks, first seen, last seen, max risk, AS information, and threat
    feeds. It updates the entity's additional properties, creates an insight (if configured),
    and adds a data table and JSON result.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | boolean | False | If enabled, action will create an insight
    containing all of the retrieved information about the entity. Default is true.
    |


    ### Flow

    1. Filters target entities to include only IP Addresses.

    2. Iterates over the suitable entities and queries the Internet Storm Center API
    for device information.

    3. Retrieves threat intelligence data for each IP address.

    4. Updates the entity's additional properties and marks it as enriched.

    5. Creates an insight for the entity if the 'Create Insight' parameter is enabled.

    6. Adds a data table and JSON result to the action's output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and creates insights.
    reasoning: >-
      The action fetches data from the Internet Storm Center API using a GET request.
      It does not mutate any external data. Internally, it updates the entity's additional
      properties and creates an insight if configured.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data and only performs allowed internal mutations (updating
      entities and creating insights). Therefore, it is classified as an enrichment
      action.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES`
      is `[EntityTypes.ADDRESS]`. Therefore, it runs on ADDRESS entities and filters
      by entity type.
