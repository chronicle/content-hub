    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action is a connectivity test (Ping) and does not match any of the specific
      product categories such as enriching IOCs, updating alerts, or modifying external
      systems.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Tests connectivity to the Internet Storm Center API.


    ### General Description

    This action verifies the connection to the Internet Storm Center server using
    the provided integration configuration parameters. It ensures that the API is
    reachable and the settings are valid.


    ### Flow Description

    1. Extracts the 'Email Address' and 'Verify SSL' parameters from the integration
    configuration.

    2. Initializes the Internet Storm Center manager with the provided settings.

    3. Sends a test request to the Internet Storm Center API to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies on the
    integration-level configuration parameters ('Email Address' and 'Verify SSL').
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a Ping action that tests connectivity to the Internet Storm Center
      API. It does not fetch contextual data for alerts or entities, nor does it mutate
      any external or internal data. It simply makes a GET request to verify the connection
      and returns a success or failure status.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping' and its primary purpose is to test connectivity.
      According to the enrichment rules, Ping actions must not be categorized as enrichment
      actions. It also does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not process or reference any entities. It simply tests connectivity
      to the external API.
