Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Internet Storm Center API to ensure the integration
    is configured correctly. This action verifies that the provided credentials and
    SSL settings allow for successful communication with the service.


    ### Flow Description

    1. The action extracts the `Email Address` and `Verify SSL` configuration parameters
    from the integration settings.

    2. It initializes the `InternetStormCenterManager` using these parameters.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Internet Storm Center API ping endpoint.

    4. The response is validated; if the connection is successful, the action completes
    with a success status. If the connection fails, an error is logged, and the action
    fails.


    ### Additional Notes

    This action does not interact with entities, modify any data, or retrieve threat
    intelligence. It is strictly used for verifying the connectivity of the integration
    configuration.
  ai_short_description: >-
    Tests connectivity to the Internet Storm Center API to verify integration configuration.
