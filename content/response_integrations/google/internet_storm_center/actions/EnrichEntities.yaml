name: Enrich Entities
description: 'Enrich entities using information from the Internet Storm Center. Supported
    entities: IP Address. Note: Action is running as async, please adjust script timeout
    value in Siemplify IDE for action as needed. There is rate limiting for API, so
    make sure to put a big timeout in IDE.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/internet-storm-center#enrich_entities
integration_identifier: InternetStormCenter
parameters:
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the entity.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["ADDRESS"]}'
