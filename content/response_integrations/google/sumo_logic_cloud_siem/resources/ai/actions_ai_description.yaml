    1. The action extracts the required configuration parameters, including API Root,
    API Key, Access ID, Access Key, and Verify SSL, from the integration settings.

    2. It initializes the `SumoLogicCloudSIEMManager` with the provided credentials
    and configuration.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Sumo Logic Cloud SIEM API endpoint (`/insights?limit=1`).

    4. The response is validated to ensure the connection is successful.

    5. The action returns a success or failure message based on the outcome of the
    API request.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment or state-changing operations on the SIEM or the SOAR platform.
