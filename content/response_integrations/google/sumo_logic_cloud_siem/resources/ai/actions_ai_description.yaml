Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Sumo Logic Cloud SIEM API using the provided integration
    configuration parameters. This action ensures that the authentication credentials
    and network settings are correctly configured to communicate with the external
    service.


    ### Flow Description

    1. Extracts integration-level configuration parameters, including API Root, API
    Key, Access ID, Access Key, and Verify SSL.

    2. Initializes the Sumo Logic Cloud SIEM manager with the provided credentials.

    3. Makes an HTTP GET request to the `/insights?limit=1` endpoint to verify authentication
    and network connectivity.

    4. Returns a successful execution state if the API responds correctly, or a failed
    state with an error message if the connection cannot be established.


    ### Additional Notes

    This action is primarily used for diagnostic purposes and does not interact with
    case entities, alerts, or insights.
