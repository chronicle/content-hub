Search Entity Signals:
  ai_description: >-
    ### General Description

    Searches for signals related to specific entities (IP Address, Hostname, Username)
    within Sumo Logic Cloud SIEM. This action retrieves relevant security signals
    based on configurable severity thresholds and time ranges, providing visibility
    into entity activity within the Sumo Logic environment.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Root, credentials)
    and action parameters (Severity, Time Frame, Limits).

    2. **Time Calculation**: Determines the search time range based on the selected
    'Time Frame' (e.g., Last Hour, Custom) or the alert's context (e.g., 30 Minutes
    Around Alert Time).

    3. **Entity Processing**: Iterates through the provided target entities, filtering
    for supported types: IP Address, Hostname, and Username.

    4. **Data Retrieval**: For each valid entity, the action makes a GET request to
    the Sumo Logic Cloud SIEM API (`/signals`) to fetch signals matching the entity
    identifier, severity, and time range.

    5. **Result Aggregation**: Collects the retrieved signals and attaches them to
    the action's result JSON.


    ### Additional Notes

    If 'Custom' is selected for the 'Time Frame', the 'Start Time' parameter becomes
    mandatory. The action supports filtering by severity (1-10) and limits the number
    of signals returned per entity.
  ai_short_description: >-
    Searches for signals related to entities in Sumo Logic Cloud SIEM.
