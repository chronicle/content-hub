Add Tags To Insight:
  ai_description: >-
    ### General Description

    Adds tags to a specific insight in Sumo Logic Cloud SIEM. This action allows analysts
    to categorize or label insights directly within the Sumo Logic platform to improve
    organization and tracking.


    ### Flow Description

    1. The action extracts the necessary API credentials (API Root, API Key, Access
    ID, Access Key) and configuration settings from the integration parameters.

    2. It extracts the `Insight ID` and `Tags` from the action parameters.

    3. The action initializes the `SumoLogicCloudSIEMManager` to handle communication
    with the Sumo Logic Cloud SIEM API.

    4. The `Tags` parameter is converted from a comma-separated string into a list.

    5. For each tag in the list, the action performs a POST request to the Sumo Logic
    Cloud SIEM API endpoint `/insights/{insight_id}/tags` with the payload `{"tagName":
    tag}`.

    6. The result of the operation is added to the action's result JSON, and a success
    message is returned.


    ### Additional Notes

    The `Tags` parameter must be provided as a comma-separated string (e.g., "tag1,
    tag2").
  ai_short_description: >-
    Adds tags to a specific insight in Sumo Logic Cloud SIEM.
