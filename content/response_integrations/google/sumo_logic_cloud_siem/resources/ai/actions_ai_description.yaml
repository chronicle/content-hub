Add Comment To Insight:
  ai_description: >-
    ### General Description

    Adds a comment to a specific insight in Sumo Logic Cloud SIEM. This action allows
    analysts to append notes or automated log entries directly to an insight's timeline
    within the external Sumo Logic platform.


    ### Flow Description

    1. Extracts the `Insight ID` and `Comment` from the action parameters.

    2. Initializes the Sumo Logic Cloud SIEM API client using the provided integration
    credentials.

    3. Makes a POST request to the `/insights/{insight_id}/comments` endpoint with
    the comment payload to append it to the specified insight.

    4. Retrieves the JSON response from the API and attaches it to the action results.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action mutates data in the external Sumo Logic Cloud SIEM environment by
    adding a comment. It does not modify internal Google SecOps case data or interact
    with entities.
  ai_short_description: >-
    Adds a comment to a specific insight in Sumo Logic Cloud SIEM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific insight in the external Sumo Logic Cloud SIEM platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a POST request to the Sumo Logic Cloud SIEM API to add a
      comment to an insight, which mutates external data. It does not fetch contextual
      data for enrichment, nor does it update internal entities, create insights,
      or modify internal alert data.
