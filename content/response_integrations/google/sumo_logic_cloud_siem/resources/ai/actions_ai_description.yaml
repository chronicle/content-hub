Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and User entities using contextual data and threat
    intelligence retrieved from Sumo Logic Cloud SIEM. This action enhances the visibility
    of entities within the SOAR platform by pulling relevant metadata such as activity
    scores, criticality, and tags.


    ### Flow Description

    1. The action initializes by retrieving the necessary API credentials (API Root,
    API Key, Access ID, Access Key) and configuration settings.

    2. It filters the `target_entities` to process only supported types: Hostname,
    IP Address, and User.

    3. For each valid entity, the action calls the Sumo Logic Cloud SIEM API (`GET
    /entities`) to retrieve detailed entity information.

    4. If entity information is successfully retrieved:
        - The entity's `additional_properties` are updated with the enrichment data.
        - The entity is marked as enriched (`is_enriched = True`).
        - An entity table is added to the action results.
        - If the 'Create Insight' parameter is enabled, an entity insight is generated
    containing the entity's activity score, criticality, and tags.
    5. Finally, the action updates the entities in the SOAR platform and returns a
    summary of successful, not found, and failed enrichments.


    ### Additional Notes

    This action performs read-only operations against the Sumo Logic Cloud SIEM API
    and does not mutate any external system state. It is strictly an enrichment action
    that updates internal SOAR data models.
  ai_short_description: >-
    Enriches Hostname, IP Address, and User entities with contextual metadata and
    threat intelligence from Sumo Logic Cloud SIEM.
