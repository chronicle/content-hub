    ### General Description

    Adds one or more tags to a specific insight in Sumo Logic Cloud SIEM.


    ### Flow Description

    1. Extracts the `Insight ID` and comma-separated `Tags` from the action parameters.

    2. Converts the comma-separated tags into a list.

    3. Iterates through the list of tags and makes a POST request to the Sumo Logic
