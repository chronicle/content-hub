Update Insight:
  ai_description: >-
    ### General Description

    Updates the status or assignee of a specific insight in Sumo Logic Cloud SIEM.


    ### Flow Description

    1. Extracts the Insight ID, Status, Assignee Type, and Assignee parameters.

    2. Validates that either a valid status or an assignee is provided.

    3. If an assignee is provided, makes a PUT request to the Sumo Logic Cloud SIEM
    API to update the insight's assignee.

    4. If a valid status is provided, makes a PUT request to the Sumo Logic Cloud
    SIEM API to update the insight's status.

    5. Makes a GET request to retrieve the updated insight details.

    6. Returns the updated insight data as a JSON result.


    ### Additional Notes

    Although the 'Status' parameter is marked as mandatory in the configuration, its
    default value ('Select One') maps to an empty status. The action requires either
    a valid 'Status' (other than 'Select One') or an 'Assignee' to be provided to
    execute successfully.
