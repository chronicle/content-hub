Search Entity Signals:
  ai_description: >-
    ### General Description

    Searches for signals related to specific entities (IP Address, Hostname, Username)
    within Sumo Logic Cloud SIEM. The action retrieves relevant security signals based
    on a specified timeframe and severity threshold, returning the findings as JSON
    results for further analysis.


    ### Flow Description

    1. Extracts configuration and action parameters, including the timeframe, severity
    threshold, and maximum number of signals to return.

    2. Calculates the start and end timestamps based on the provided timeframe (e.g.,
    'Last Hour', 'Custom', or relative to the alert time).

    3. Iterates over the target entities in the case.

    4. Filters the entities to process only supported types: Address, Hostname, and
    User.

    5. For each supported entity, makes a GET request to the Sumo Logic Cloud SIEM
    API (`/signals`) to fetch signals matching the entity's identifier, timeframe,
    and severity.

    6. Collects the returned signals and attaches them as JSON results to the action
    execution.


    ### Additional Notes

    The action requires valid API credentials (either API Key or Access ID/Key) configured
    in the integration. If 'Custom' is selected for the Time Frame, the 'Start Time'
    parameter becomes mandatory.
  ai_short_description: >-
    Searches for signals related to specific entities (IP Address, Hostname, Username)
    within Sumo Logic Cloud SIEM and returns the results as JSON.
