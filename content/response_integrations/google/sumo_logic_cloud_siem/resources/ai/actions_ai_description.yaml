Add Comment To Insight:
  ai_description: >-
    ### General Description

    Adds a comment to a specific insight within the Sumo Logic Cloud SIEM platform.
    This action allows analysts to append notes or context directly to an existing
    insight in the external SIEM, facilitating better collaboration and documentation
    of investigation steps.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, API Key/Access
    ID/Key, and SSL verification settings) to establish a connection to the Sumo Logic
    Cloud SIEM instance.

    2. It extracts the action-specific parameters: `Insight ID` (the identifier of
    the target insight) and `Comment` (the text to be added).

    3. The `SumoLogicCloudSIEMManager` is initialized with the provided credentials.

    4. The action calls the `add_comment_to_insight` method, which executes an HTTP
    POST request to the Sumo Logic Cloud SIEM API endpoint `/insights/{insight_id}/comments`
    with the comment payload.

    5. The API response is captured and added to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires valid authentication credentials (API Key or Access ID/Key)
    for the Sumo Logic Cloud SIEM integration. It performs a direct mutation on the
    external system and does not interact with SOAR entities.
  ai_short_description: >-
    Adds a comment to a specific insight in Sumo Logic Cloud SIEM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to an existing insight in the Sumo Logic Cloud SIEM platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Sumo Logic Cloud SIEM API to add a
      comment to an insight. This is an external data mutation. It does not fetch
      contextual data for enrichment, nor does it modify internal SOAR data.
