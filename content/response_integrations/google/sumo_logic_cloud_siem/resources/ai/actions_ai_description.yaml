Update Insight:
  ai_description: >-
    ### General Description

    Updates the status and/or assignee of an insight in Sumo Logic Cloud SIEM. This
    action allows analysts to modify the state of an existing insight, facilitating
    better workflow management and tracking within the Sumo Logic platform.


    ### Flow Description

    1. Extracts configuration parameters (API credentials) and action parameters (Insight
    ID, Status, Assignee Type, Assignee).

    2. Validates that at least one of Status or Assignee is provided to ensure a meaningful
    update.

    3. Initializes the Sumo Logic Cloud SIEM manager using the provided credentials.

    4. If an assignee is provided, makes a PUT request to the Sumo Logic API to update
    the insight's assignee.

    5. If a status is provided, makes a PUT request to the Sumo Logic API to update
    the insight's status.

    6. Fetches the updated insight details via a GET request to confirm the changes.

    7. Returns the updated insight data as a JSON result.


    ### Additional Notes

    Requires either Status or Assignee to be specified. The action will fail if neither
    is provided.
  ai_short_description: >-
    Updates the status and/or assignee of an insight in Sumo Logic Cloud SIEM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and/or assignee of an insight in Sumo Logic Cloud SIEM.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs PUT requests to update external data (status/assignee) and
      a GET request to retrieve the updated insight. It modifies alert data (insight)
      but does not mutate internal SOAR data or entities.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
