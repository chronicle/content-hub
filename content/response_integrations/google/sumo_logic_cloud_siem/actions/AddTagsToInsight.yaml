name: Add Tags To Insight
description: Add tags to insight in Sumo Logic Cloud SIEM.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumo-logic-cloud-siem#add_tags_to_insight
integration_identifier: SumoLogicCloudSIEM
parameters:
-   name: Insight ID
    default_value: ''
    type: string
    description: Specify the ID of the insight to which action needs to add tags.
    is_mandatory: true
-   name: Tags
    default_value: ''
    type: string
    description: Specify a comma-separated list of tags that needs to be added in
        insight.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_tags_to_insight_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
