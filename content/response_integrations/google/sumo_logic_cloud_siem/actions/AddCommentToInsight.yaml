name: Add Comment To Insight
description: Add a comment to insight in Sumo Logic Cloud SIEM.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumo-logic-cloud-siem#add_comment_to_insight
integration_identifier: SumoLogicCloudSIEM
parameters:
-   name: Insight ID
    default_value: ''
    type: string
    description: Specify the ID of the insight to which action needs to add a comment.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify the comment that needs to be added in insight.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_comment_to_insight_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
