name: Update Insight
description: Update insight status in Sumo Logic Cloud SIEM.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumo-logic-cloud-siem#update_insight
integration_identifier: SumoLogicCloudSIEM
parameters:
-   name: Insight ID
    default_value: ''
    type: string
    description: Specify the ID of the insight needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - In Progress
    - Closed
    description: Specify what status to set for the insight.
    is_mandatory: true
-   name: Assignee Type
    default_value: User
    type: ddl
    optional_values:
    - User
    - Team
    description: Specify the assignee type for the "Assignee" parameter.
    is_mandatory: true
-   name: Assignee
    default_value: ''
    type: string
    description: Specify the assignee identifier.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_insight_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
