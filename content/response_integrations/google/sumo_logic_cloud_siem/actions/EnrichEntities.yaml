name: Enrich Entities
description: 'Enrich entities using information from Sumo Logic Cloud SIEM. Supported
    entities: Hostname, User, IP address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumo-logic-cloud-siem#enrich_entities
integration_identifier: SumoLogicCloudSIEM
parameters:
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the entity.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "USERUNIQNAME"]}'
