Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AWS Cloud Trail service to ensure the integration is
    correctly configured.


    ### Flow Description

    1. The action retrieves the AWS configuration parameters (Access Key ID, Secret
    Key, and Default Region) from the integration settings.

    2. It initializes the `AWSCloudTrailManager` client using these credentials.

    3. It executes the `test_connectivity` method, which performs a `lookup_events`
    API call to AWS Cloud Trail with the `insight` category.

    4. The action returns a success or failure status based on the API response.


    ### Additional Notes

    This action is intended for verifying connectivity and does not perform any data
    enrichment or modification.
  ai_short_description: >-
    Tests connectivity to the AWS Cloud Trail service using the provided credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request (via `lookup_events`) to verify connectivity
      to the AWS Cloud Trail API. It does not mutate any external or internal data,
      nor does it update entities or create insights.
