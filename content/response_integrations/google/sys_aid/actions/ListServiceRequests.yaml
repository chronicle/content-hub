name: List Service Requests
description: List service requests.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sysaid#list_service_requests
integration_identifier: SysAid
parameters:
-   name: Service Request Type
    default_value: ''
    type: string
    description: 'The type of the service request to filter by. Valid values: incident,
        request, problem, change, all.'
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: The status of the request service to filter by.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: The priority of the request service to filter by.
    is_mandatory: false
-   name: Assignee
    default_value: ''
    type: string
    description: The assignee of the request service to filter by.
    is_mandatory: false
-   name: Urgency
    default_value: ''
    type: string
    description: The urgency of the request service to filter by.
    is_mandatory: false
-   name: Request User
    default_value: ''
    type: string
    description: The request user of the request service to filter by.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The category of the request service to filter by.
    is_mandatory: false
-   name: Subcategory
    default_value: ''
    type: string
    description: The subcategory of the request service to filter by.
    is_mandatory: false
-   name: Third Category
    default_value: ''
    type: string
    description: The third category of the request service to filter by.
    is_mandatory: false
-   name: Assigned Group
    default_value: ''
    type: string
    description: The assigned group of the request service to filter by.
    is_mandatory: false
-   name: Get Archived
    default_value: ''
    type: boolean
    description: Whether to get archived request services or not.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: request_services
