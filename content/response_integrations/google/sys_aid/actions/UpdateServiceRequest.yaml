name: Update Service Request
description: Update a service request.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sysaid#update_service_request
integration_identifier: SysAid
parameters:
-   name: Service Request ID
    default_value: ''
    type: string
    description: The id of the service request to update.
    is_mandatory: true
-   name: Status
    default_value: ''
    type: string
    description: The new status of the request service.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: The new priority of the request service.
    is_mandatory: false
-   name: Assignee
    default_value: ''
    type: string
    description: The new assignee of the request service.
    is_mandatory: false
-   name: Urgency
    default_value: ''
    type: string
    description: The new urgency of the request service.
    is_mandatory: false
-   name: Request User
    default_value: ''
    type: string
    description: The new request user of the request service.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The new category of the request service.
    is_mandatory: false
-   name: Subcategory
    default_value: ''
    type: string
    description: The new subcategory of the request service.
    is_mandatory: false
-   name: Third Category
    default_value: ''
    type: string
    description: The new third category of the request service.
    is_mandatory: false
-   name: Assigned Group
    default_value: ''
    type: string
    description: The new assigned group of the request service.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: success
