List Service Requests:
  ai_description: >-
    ### General Description

    Lists service requests from SysAid based on specified filtering criteria. This
    action allows users to query the SysAid ITSM platform for service requests matching
    specific attributes such as type, status, priority, assignee, and category.


    ### Flow Description

    1. Initializes the SysAid integration and retrieves configuration parameters.

    2. Collects filtering parameters including Service Request Type, Status, Priority,
    Assignee, Urgency, Request User, Category, Subcategory, Third Category, Assigned
    Group, and Get Archived.

    3. Makes a GET request to the SysAid API (`/sr` endpoint) to fetch the matching
    service requests.

    4. Formats the retrieved service requests into a flat structure.

    5. Outputs the results as a CSV data table within the SecOps platform and returns
    the raw JSON data.


    ### Additional Notes

    If no filters are provided, the action may return a large number of service requests
    depending on the SysAid environment. Pagination is not explicitly handled in the
    current implementation.
