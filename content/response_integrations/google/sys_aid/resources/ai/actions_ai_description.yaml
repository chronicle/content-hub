Close Service Request:
  ai_description: >-
    ### General Description

    Closes a service request in the SysAid ITSM platform by submitting a solution.
    This action updates the status of an existing service request to closed, providing
    the necessary resolution details.


    ### Flow Description

    1. The action initializes the `SysAidManager` using the provided configuration
    (API root, username, password).

    2. It retrieves the `Service Request ID` and `Solution` parameters from the action
    input.

    3. It calls the `close_service_request` method of the `SysAidManager`.

    4. The `SysAidManager` executes a `PUT` request to the SysAid API endpoint `/sr/{sr_id}/close`
    with the provided solution in the payload.

    5. The action concludes by returning a success message indicating the service
    request has been closed.


    ### Additional Notes

    This action directly modifies the state of a service request in the external SysAid
    system.
  ai_short_description: >-
    Closes a service request in the SysAid ITSM platform by submitting a solution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Closes a service request in the SysAid ITSM platform by sending a PUT request
      with the provided solution.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to the SysAid API to close a service request,
      which is an external data mutation. It does not fetch data, update internal
      entities, or create insights.
