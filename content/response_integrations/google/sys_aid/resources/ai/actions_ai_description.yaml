Update Service Request:
  ai_description: >-
    ### General Description

    Updates an existing service request within the SysAid ITSM platform. This action
    allows analysts to modify various attributes of a service request, such as its
    status, priority, assignee, urgency, and categorization, directly from the SOAR
    platform.


    ### Flow Description

    1. The action initializes the `SysAidManager` using the provided integration configuration
    (API Root, Username, Password, and SSL verification settings).

    2. It retrieves the mandatory `Service Request ID` and any optional update parameters
    (e.g., Status, Priority, Assignee, Urgency, Request User, Category, Subcategory,
    Third Category, Assigned Group) from the action inputs.

    3. The action calls the `update_service_request` method, which constructs a payload
    containing the provided fields.

    4. The manager executes a `PUT` request to the SysAid API endpoint (`/sr/{sr_id}`)
    to apply the changes to the specified service request.

    5. Upon a successful API response, the action concludes by returning a success
    message indicating the service request was updated.


