  ai_description: >-
    ### General Description

    Retrieves a list of all users from the SysAid ITSM platform. This action is useful
    for gathering user directory information to be used in subsequent steps or for
    analyst review.


    ### Flow Description

    1. Initializes the SysAid API client using the provided integration credentials.

    2. Makes an HTTP GET request to the `/users` endpoint of the SysAid API to fetch
    the list of users.

    3. Parses the response and formats the user objects.

    4. Flattens the user dictionaries and constructs a CSV representation.

    5. Attaches the CSV as a data table named "SysAid - Users" to the action results.

    6. Returns the raw JSON list of users as the action's output message.


    ### Additional Notes

    This action does not require any input parameters and does not operate on specific
    case entities. It retrieves the entire user directory accessible by the configured
