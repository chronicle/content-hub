Close Service Request:
  ai_description: >-
    ### General Description

    This action closes a specific service request in SysAid by providing a solution.


    ### Flow Description

    1. Retrieves the `Service Request ID` and `Solution` from the action parameters.

    2. Initiates a PUT request to the SysAid API (`/sr/{sr_id}/close`) to close the
    specified service request with the provided solution.

    3. Returns a success message indicating the service request was successfully closed.


    ### Additional Notes

    This action modifies data in the external SysAid ITSM system.
