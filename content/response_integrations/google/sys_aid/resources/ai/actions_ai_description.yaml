Create Service Request:
  ai_description: >-
    ### General Description

    Creates a new service request in the SysAid ITSM platform. This action allows
    analysts to automate the generation of tickets, incidents, or change requests
    directly from the SOAR platform, ensuring seamless integration between security
    operations and IT service management.


    ### Flow Description

    1. The action initializes the `SysAidManager` using the provided API credentials
    and server address.

    2. It retrieves the required parameters (Title, Description, Status, Priority,
    etc.) from the action configuration.

    3. The action calls the `create_service_request` method, which performs a POST
    request to the SysAid API (`/sr` endpoint) to create the new service record.

    4. During the creation process, the manager performs GET requests to the SysAid
    API to validate and parse filter values (e.g., status, priority, assignee) to
    ensure they match valid system options.

    5. Upon successful creation, the action returns the ID of the newly created service
    request.


    ### Additional Notes

    This action requires valid SysAid API credentials. The action will fail if the
    provided filter values (e.g., Status, Priority) do not exist or are not configured
    correctly within the SysAid instance.
  ai_short_description: >-
    Creates a new service request in the SysAid ITSM platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
