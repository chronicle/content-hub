[project]
name = "gmail"
version = "10.0"
description = "Secure business email, and so much more - the latest Gmail makes it easier to stay on top of the work that matters. With secure, ad-free email as a foundation, you can also chat, make voice or video calls, and stay on top of project work with shared files and tasks - all right in Gmail."
requires-python = ">=3.11,<3.12"
dependencies = [
    "beautifulsoup4>=4.15.0",
    "google-api-python-client>=2.198.0",
    "google-auth-httplib2>=0.4.0",
    "google-auth-oauthlib>=1.4.0",
    "html2text>=2025.4.15",
    "pydantic>=2.13.4",
]

[dependency-groups]
dev = [
 "pytest-mock",
 "integration-testing",
 "environmentcommon",
 "pytest>=9.1.0",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
 "tipcommon",
 "pyyaml",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.12-py2.py3-none-any.whl"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.0-py3-none-any.whl"
