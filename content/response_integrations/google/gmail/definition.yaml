identifier: Gmail
name: Gmail
parameters:
-   name: Service Account JSON File Content
    default_value: ''
    type: password
    description: The content of the service account key JSON file. You can configure
        either this parameter, or the Workload Identity Email parameter. To configure
        this parameter, provide the full content of the service account key JSON file
        that you have downloaded when creating a service account.
    is_mandatory: false
    integration_identifier: Gmail
    display_name: Service Account Json File Content
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: 'The client email address of your service account.

        You can configure either this parameter or the Service Account JSON File Content
        parameter. To impersonate service accounts with workloads, grant the Service
        Account Token Creator role to your Google SecOps service account.'
    is_mandatory: false
    integration_identifier: Gmail
-   name: Default Mailbox
    default_value: ''
    type: string
    description: A default mailbox to use in the integration.
    is_mandatory: true
    integration_identifier: Gmail
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        connecting to Gmail is valid. Selected by default.
    is_mandatory: false
    integration_identifier: Gmail
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail
categories:
- IT and Infrastructure
- Google
- Email
svg_logo_path: resources/logo.svg
image_path: resources/image.png
