Search For Emails:
  ai_description: >-
    ### General Description

    The **Search For Emails** action allows users to perform complex searches across one or more Gmail mailboxes. It is designed to retrieve email metadata or full content based on specific criteria such as senders, recipients, subjects, labels, and timeframes. This action is particularly useful for security investigations where an analyst needs to identify phishing attempts, internal data leaks, or communication patterns across the organization. The action is asynchronous, meaning it can handle long-running searches across multiple mailboxes by checking for results in subsequent iterations.



    ### Additional Notes

    - **Asynchronous Execution:** This action runs asynchronously. If the search takes longer than the initial execution window, it will enter a 'Pending' state and continue in the next cycle.

    - **Permissions:** The service account used for the integration must have Domain-Wide Delegation or appropriate permissions to access the specified mailboxes.

    - **Entity Usage:** This action does **not** run on Google SecOps entities; it relies entirely on the provided input parameters.


    ### Flow Description

    1. **Initialization:** The action extracts and validates all input parameters, ensuring mailboxes and email filters are correctly formatted.

    2. **Context Management:** It checks if this is a new search or a continuation of a previous asynchronous task.

    3. **API Interaction:** For each mailbox, the action connects to the Gmail API and executes a search query constructed from the provided filters (subject, sender, labels, etc.).

    4. **Data Retrieval:** It fetches the message IDs matching the query and then retrieves the specific details (headers and optionally the body) for each message up to the defined limit.

    5. **Result Compilation:** Discovered emails are formatted into a JSON result and a Data Table named 'Found Mails' for display in the Google SecOps interface.

    6. **Completion:** The action returns a success message summarizing how many emails were found in each mailbox or enters a pending state if more processing time is required.
