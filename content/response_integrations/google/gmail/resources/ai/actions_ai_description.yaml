Send Thread Reply:
  ai_description: >-
    The **Send Thread Reply** action allows users to send an email message as a reply to an existing email thread in Gmail. It identifies the target thread using a specific Internet Message ID and can either reply to the original sender or to all recipients involved in the thread. The action automatically includes attachments from the original message in the reply and allows for additional files to be attached from the Google SecOps server.



    ### Additional Notes

    - This action **does not run on entities**. It relies entirely on the provided 'Internet Message ID' to locate the thread.

    - If 'Reply All' is not selected and 'Reply To' is empty, the action defaults to replying only to the original sender.

    - The action preserves email threading by correctly setting 'In-Reply-To' and 'References' headers.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the mailbox, message ID, recipients, and content from the action input.

    2. **Message Lookup**: Searches the specified Gmail mailbox for the original message matching the provided Internet Message ID.

    3. **Context Retrieval**: Fetches the full details of the original message, including its headers and existing attachments.

    4. **Recipient Resolution**: Determines the final list of recipients based on the 'Reply All' toggle or the 'Reply To' list.

    5. **Message Construction**: Builds a new MIME message with the 'Re:' subject prefix, appropriate threading headers, the new body content, original attachments, and any new attachments provided.

    6. **Transmission**: Sends the constructed reply via the Gmail API.

    7. **Result Reporting**: Returns the metadata of the newly sent message as a JSON result.
