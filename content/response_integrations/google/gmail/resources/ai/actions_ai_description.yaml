Forward Email:
  ai_description: >-
    ### General Description

    The **Forward Email** action allows users to forward an existing email from a
    specified Gmail mailbox to one or more recipients. It searches for an email using
    its unique Internet Message ID, retrieves its content and attachments, and constructs
    a new forwarded message that includes the original thread details and any additional
    content or attachments provided by the user.


    ### Flow Description

    1. **Search:** The action searches the specified mailbox for an email matching
    the provided Internet Message ID using the Gmail API.

    2. **Retrieval:** If found, it retrieves the full MIME content and all attachments
    of the original email.

    3. **Construction:** It builds a new multipart email message, setting the new
    subject, recipients (To, CC, BCC), and references to the original message to maintain
    threading.

    4. **Content Assembly:** It combines the user-provided 'Mail Content' with the
    original email's body and metadata.

    5. **Attachment Handling:** It attaches both the original email's files and any
    new files specified in the 'Attachments Paths' parameter.

    6. **Execution:** The action sends the constructed email via the Gmail API and
    returns the metadata of the newly sent message.


    ### Additional Notes

    - This action does not operate on Google SecOps entities; it relies entirely on
    the provided parameters.

    - The action automatically includes the original email's attachments in the forwarded
    message.

    - The original email's content is appended to the new mail content using a standard
    forwarding template (From, Date, Subject, To).
