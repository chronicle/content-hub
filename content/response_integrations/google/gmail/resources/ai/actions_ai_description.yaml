    | **Email Status** | Dropdown | No | Filter by 'Only Unread Messages', 'Only Read Messages', or 'Both Read & Unread Messages'. |

    | **Headers To Return** | String (CSV) | No | Specific email headers to include in the output. Default includes standard headers like date, from, to, etc. |

    | **Return Email Body** | Boolean | No | If true, retrieves the full body content of the emails. |

    | **Max Emails To Return** | String/Integer | No | The maximum number of email results to return per search. Default is 50. |
