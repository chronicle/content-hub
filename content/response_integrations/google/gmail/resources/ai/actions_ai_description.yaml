    | **Mailbox** | String | Yes | A comma-separated list of mailboxes to search (e.g., `user@example.com`). If not provided, it uses the default mailbox from the integration configuration. |

    | **Labels Filter** | String | No | Filter emails by labels (e.g., `Inbox`, `Sent`). Use a minus sign (e.g., `-label1`) to exclude labels. |

    | **Internet Message ID** | String | No | A comma-separated list of specific Internet Message IDs. If provided, other filters (Subject, Sender, Labels, Time Frame) are ignored. |

