Save Email To The Case:
  ai_description: >-
    ### General Description

    The **Save Email To The Case** action allows users to retrieve a specific email
    from a Gmail mailbox and save it, or its attachments, directly to the Case Wall
    of a Google SecOps case. This is primarily used for evidence preservation and
    documentation within an investigation. The action identifies the email using its
    unique Internet Message ID and can be configured to save the entire email as an
    `.eml` file or extract specific attachments based on filename filters.


    ### Flow Description

    1. **Search:** The action searches the specified Gmail mailbox for a message matching
    the provided Internet Message ID via the Gmail API.

    2. **Retrieval:** Once found, the action retrieves the message details and content.

    3. **Processing:** Depending on the configuration, it either prepares the full
    MIME content of the email or iterates through the message parts to find specific
    attachments.

    4. **Internal Mutation:** The action uses the Google SecOps API to upload the
    resulting file(s) (the email `.eml` or the attachments) directly to the Case Wall.


    ### Additional Notes

    - This action does not operate on Google SecOps entities (e.g., it does not iterate
    through IPs or Domains in the case).

    - The action requires the `Internet Message ID`, which is typically found in the
    email headers (e.g., `<CAAfJ0RiK... @mail.gmail.com>`).
