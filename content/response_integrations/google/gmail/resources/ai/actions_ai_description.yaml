Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify connectivity between Google
    SecOps and the Gmail service. Its primary purpose is to ensure that the integration's
    connection parameters, such as the Service Account JSON or Workload Identity configuration,
    are valid and that the environment has the necessary network access and permissions
    to communicate with the Google Gmail API.


    ### Flow Description

    1. **Initialization**: The action initializes the Google Gmail API client using
    the integration's global configuration.

    2. **Connectivity Test**: It invokes the `test_connectivity` method, which attempts
    to refresh the OAuth2 access token to validate the credentials and ensure the
    Google Cloud authentication endpoint is reachable.

    3. **Cleanup**: Upon completion, the action closes the API session and returns
    a success message if the connection was established, or an error message if the
    validation failed.


    ### Additional Notes

    This action is typically used during the initial setup of the Gmail integration
    or for troubleshooting authentication and networking issues. It does not interact
    with specific emails or user data beyond verifying the ability to refresh OAuth2
    credentials.
