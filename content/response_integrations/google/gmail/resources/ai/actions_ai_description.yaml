Wait For Thread Reply:
  ai_description: >-
    ### General Description

    This asynchronous action waits for a reply to a specific email thread in a Gmail
    mailbox. It is typically used following a 'Send Email' action to pause a playbook
    until a user responds. The action monitors the specified thread for new messages
    from the original recipients and can optionally retrieve attachments from those
    replies.


    ### Flow Description

    1. **Initialization**: The action retrieves the original email using the provided
    Internet Message ID to identify the thread ID and the list of recipients.

    2. **Thread Monitoring**: It fetches all messages within the identified thread
    from the Gmail API.

    3. **Filtering**: The action filters for messages that were sent after the original
    email and originated from one of the original recipients.

    4. **Data Retrieval**: If a valid reply is found, the action retrieves the message
    content. If 'Fetch Response Attachments' is enabled, it downloads attachments
    and uploads them to the Case Wall.

    5. **Completion Check**: Based on the 'Wait for All Recipients to Reply' setting,
    the action either completes with the reply data or remains 'In Progress' to wait
    for further responses.


    ### Additional Notes

    - This action is **asynchronous** and will run repeatedly until the condition
    (reply received) is met or the action timeout is reached.

    - It does not operate on Google SecOps entities; it uses the provided Message
    ID to track the conversation.

    - Ensure the action timeout in the IDE is set high enough to account for human
    response times.
