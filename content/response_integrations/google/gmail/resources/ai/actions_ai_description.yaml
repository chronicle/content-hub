    | **Email Status** | DDL | No | Filter by read status: `Only Unread Messages`, `Only Read Messages`, or `Both Read & Unread Messages`. |

    | **Move to Trash** | Boolean | No | If `True` (default), emails are moved to the Trash folder. If `False`, emails are deleted permanently. |
