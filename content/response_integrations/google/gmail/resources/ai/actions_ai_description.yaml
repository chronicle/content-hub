    | **Mailbox** | String | Yes | The email address of the mailbox to search in. Defaults to the integration's configured default mailbox. |

    | **Label** | String | Yes | A comma-separated list of labels to add to the emails. New labels will be created if they don't exist. |

    | **Internet Message ID** | String | No | A comma-separated list of specific Internet Message IDs to target. If provided, other filters are ignored. |

    | **Labels Filter** | String | No | A comma-separated list of labels to filter the search. Use a minus sign (e.g., `-label1`) to exclude emails with that label. |

    | **Subject Filter** | String | No | Filters emails where the subject contains the specified full words. |

    | **Sender Filter** | String | No | Filters emails sent by a specific email address (exact match). |

    | **Time Frame (minutes)** | String | No | Limits the search to emails received within the last X minutes. Default is 60. |

    | **Email Status** | Dropdown | No | Filters by message status: 'Only Unread Messages', 'Only Read Messages', or 'Both Read & Unread Messages'. |
