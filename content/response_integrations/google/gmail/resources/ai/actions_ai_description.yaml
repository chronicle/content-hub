Send Email:
  ai_description: >-
    ### General Description

    The **Send Email** action allows users to send emails through the Gmail API based on specified parameters. It supports standard email features including CC, BCC, attachments, and custom 'Reply-To' headers. This action is designed to be standalone and does not operate on Google SecOps entities.



    ### Additional Notes

    - The action validates all provided email addresses and CSV formats before attempting to send.

    - If attachments are provided, the action reads the files from the local server path and encodes them for transmission.


    ### Flow Description

    1. **Parameter Extraction & Validation:** The action extracts all input parameters and validates that email addresses are correctly formatted and mandatory fields are present.

    2. **API Initialization:** It initializes the Google Gmail API client using the provided sender mailbox or the default integration mailbox.

    3. **Connectivity Test:** Performs a connectivity check to ensure the service account has the necessary permissions to access the mailbox.

    4. **Email Construction:** Builds a MIME multipart message including headers (To, CC, BCC, Subject, Reply-To), the HTML body, and any specified attachments.

    5. **Transmission:** Sends the email via the Gmail `users.messages.send` endpoint.

    6. **Result Retrieval:** Fetches the metadata of the successfully sent message (ID, thread ID, labels) and returns it as the action's JSON result.
