Add Email Label:
  ai_description: >-
    ### General Description

    The **Add Email Label** action allows users to apply one or more labels to specific
    emails within a Gmail mailbox. This action is useful for organizing, categorizing,
    or marking emails for further processing during an investigation. It can target
    emails using a specific Internet Message ID or by applying a set of filters such
    as subject, sender, existing labels, and timeframe. If a specified label does
    not already exist in the mailbox, the action will automatically create it before
    applying it to the messages.


    ### Flow Description

    1. Initializes a connection to the Google Gmail API using the provided mailbox
    credentials.

    2. Retrieves the list of existing labels in the mailbox via the Gmail API. If
    any of the labels specified in the `Label` parameter are missing, the action creates
    them.

    3. Searches for emails based on the provided `Internet Message ID` or constructs
    a Gmail search query based on the `Subject Filter`, `Sender Filter`, `Labels Filter`,
    `Time Frame`, and `Email Status` parameters.

    4. Performs a batch update via the Gmail API to apply the requested labels to
    all matching emails.

    5. Returns a success message indicating the number of emails updated.


    ### Additional Notes

    This action does not run on Google SecOps entities; it operates directly on the
    external Gmail service based on the provided parameters. Either the `Internet
    Message ID` must be provided, or at least one of the following filters must be
    configured: `Subject Filter`, `Labels Filter`, `Sender Filter`, or `Time Frame
    (minutes)`.
