Delete Email:
  ai_description: >-
    ### General Description

    The **Delete Email** action allows for the removal of one or multiple emails from
    specified Gmail mailboxes based on a variety of search criteria. It is designed
    to help security teams remediate phishing or malicious email campaigns by removing
    messages from user inboxes. The action can either move emails to the 'Trash' folder
    (default) or delete them permanently. This action is asynchronous and does not
    operate on Google SecOps entities; instead, it uses provided parameters to target
    specific mailboxes and messages.


    ### Flow Description

    1. **Validation**: The action validates that at least one search criterion is
    provided and parses the target mailboxes.

    2. **Search**: For each mailbox, the action queries the Gmail API to find message
    IDs matching the specified filters (Subject, Sender, Time, etc.).

    3. **Deletion/Trashing**: Once message IDs are retrieved, the action iterates
    through them and calls the Gmail API to either move the message to the Trash or
    delete it forever, depending on the `Move to Trash` parameter.

    4. **Reporting**: The action tracks the number of emails found and successfully
    deleted per mailbox, returning a summary and detailed JSON results.


    ### Additional Notes

    - This action is asynchronous; ensure the action timeout in the IDE is sufficient
    for processing large mailboxes.
