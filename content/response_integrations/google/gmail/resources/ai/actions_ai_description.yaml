Remove Email Label:
  ai_description: "Removes specific labels from emails within a Gmail mailbox. This
    action authenticates with the Google Gmail API, searches for target emails using
    Internet Message IDs or various filters (subject, sender, timeframe, etc.), and
    removes the specified labels from the matching emails.\n\n### Flow Description\n
    1. Authenticates with the Google Gmail API using the provided credentials.\n2.
    Retrieves the list of existing labels in the mailbox to validate the requested
    labels.\n3. Searches for target emails using the provided Internet Message IDs
    or search filters (Subject, Sender, Time Frame, etc.).\n4. Performs a batch modification
    request (`POST /gmail/v1/users/{user_email}/messages/batchModify`) to the Gmail
    API to remove the specified labels from the identified emails.\n5. Returns a summary
    message indicating the number of updated emails and any invalid labels.\n\n###
    Additional Notes\nEither the 'Internet Message ID' parameter or at least one search
    filter ('Subject Filter', 'Labels Filter', 'Sender Filter', or 'Time Frame (minutes)')
    must be configured for the action to execute successfully."
