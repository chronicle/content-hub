name: Gmail Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: event_name
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: 'Describes the name of the field where the environment name is stored.

        If the environment field isn''t found, the environment is the default environment.

        '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: ''
    type: string
    description: 'A regex pattern to run on the value found in the "Environment Field
        Name" field.

        Default is .* to catch all and return the value unchanged.

        Used to allow the user to manipulate the environment field via regex logic.

        If the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Email Exclude Pattern
    default_value: ''
    type: string
    description: 'A regular expression to exclude specific emails from ingestion,
        such as spam or news. This parameter works with both the subject and the body
        of an email. For example, to exclude the autoreply emails from ingestion,
        you can configure the following regular expression: (?i)(auto|no)(\s|-)?re(ply|sponse|sponder)'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Service Account JSON File Content
    default_value: ''
    type: password
    description: The content of the service account key JSON file. You can configure
        either this parameter or the Workload Identity Email parameter. To configure
        this parameter, provide the full content of the service account key JSON file
        that you have downloaded when creating a service account.
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: 'The client email address of your service account.

        You can configure either this parameter or the Service Account JSON File Content
        parameter. To impersonate service accounts with workloads, grant the Service
        Account Token Creator role to your Google SecOps service account.'
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: 'If selected, the connector ignores the Google SecOps overflow mechanism
        during alert creation.

        Not selected by default.

        '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Default Mailbox
    default_value: ''
    type: string
    description: An email address to use as a default mailbox for the integration,
        such as user@example.com.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Labels Filter
    default_value: Inbox
    type: string
    description: The labels of emails to ingest into Google SecOps. The connector
        supports nested labels. Provide the labels in a format that is acceptable
        for Gmail, such as Inbox-label1-label2.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Email Status
    default_value: Both
    type: string
    description: 'A status of the email to search for. Possible values are as follows:
        Both, Read, Unread. The default value is Both.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Mark Emails as Read
    default_value: true
    type: boolean
    description: If selected, the connector marks ingested emails as read.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Extract Headers
    default_value: ''
    type: string
    description: 'Header values to filter from the “internetMessageHeaders” list and
        add to a Google SecOps event. By default, the connector adds all headers to
        the event. To add only specific headers, enter them as a comma-separated list,
        such as “DKIM-Siganture”, “Received”, “From”. To prevent the connector from
        adding any header, enter the following value: None. This parameter is case-insensitive.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Attached Mail File Prefix
    default_value: attach
    type: string
    description: A prefix to add to the extracted event keys (for example, to, from,
        or subject) from the attached email file received in the monitored mailbox.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Original Mail File Prefix
    default_value: orig
    type: string
    description: A prefix to add to the extracted event keys (for example, to, from,
        or subject) from the original email received in the monitored mailbox.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Attach Original EML
    default_value: false
    type: boolean
    description: 'If selected, the connector attaches the original email to the case
        information as an EML file.

        Not selected by default.

        '
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Create Alert Per Attachment File
    default_value: false
    type: boolean
    description: 'If selected, the connector creates multiple alerts, with one alert
        for every attached email file.

        This behavior is useful when you process emails with multiple email files
        attached and set the Google SecOps event mapping to create entities from attached
        email files.

        Not selected by default.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Emails Per Cycle
    default_value: 10
    type: integer
    description: 'The maximum number of emails to retrieve for every connector iteration.

        The maximum number is 100 emails. The default value is 10 emails.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 24
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time or the fallback value for
        an expired connector timestamp.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Case Name Template
    default_value: ''
    type: string
    description: 'A custom case name. When you configure this parameter, the connector
        adds a new key called custom_case_name to the Google SecOps event. You can
        provide placeholders in the following format: [name of the field]. Example:
        Phishing - [event_mailbox]. For placeholders, the connector uses the first
        Google SecOps event. The connector only handles keys that contain the string
        value. To configure this parameter, specify event fields without prefixes.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Name Template
    default_value: ''
    type: string
    description: 'A custom alert name. You can provide placeholders in the following
        format: [name of the field]. Example: Phishing - [event_mailbox]. For placeholders,
        the connector uses the first Google SecOps event. The connector only handles
        keys containing the string value. If you don’t provide any value or use an
        invalid template, the connector uses the default alert name. To configure
        this parameter, specify event fields without prefixes.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Google Gmail server is valid.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'The Gmail Connector retrieves Gmail emails from the specified mailbox.
    To filter specific values from the email body and subject, use the dynamic list
    regular expressions in the following format: “key: regex”. For example, after
    finding a match for the following regex: “subject: (?<=Subject: ).*”, the connector
    creates a Google SecOps alert event and adds a new key with the “subject” name
    to it. The new key value matches the regular expression.'
integration: Gmail
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#gmail-connector
rules: []
is_connector_rules_supported: false
creator: admin
