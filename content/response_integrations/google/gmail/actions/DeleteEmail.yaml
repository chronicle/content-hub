name: Delete Email
description: Use the Delete Email action to delete one or multiple emails from the
    mailbox based on the provided search criteria. By default, this action moves emails
    to Trash. You can configure the action to delete emails forever instead of moving
    them to Trash. The Delete Email action is asynchronous. Adjust the action timeout
    in the Google SecOps IDE accordingly. This action doesn’t run on Google SecOps
    entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#delete_email
integration_identifier: Gmail
parameters:
-   name: Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to search the email in, such as user@example.com. By default,
        the action uses the default mailbox that you configured for the integration.
        This parameter accepts multiple values as a comma-separated string.
    is_mandatory: true
-   name: Labels Filter
    default_value: Inbox
    type: string
    description: 'A filter condition that specifies the email labels to search for.
        This parameter accepts multiple values as a comma-separated string. You can
        search for emails with specific labels, such as label1, label2. To search
        for emails that don’t possess the specific label, use the following format:
        -label1. You can configure this parameter to search for emails with and without
        specific labels in one string, such as label1, -label2, label3.'
    is_mandatory: false
-   name: Internet Message ID
    default_value: ''
    type: string
    description: An internet message ID of the email to search for. This parameter
        accepts multiple values as a comma-separated string. If you provide the internet
        message ID, the action ignores the Subject Filter, Sender Filter, Labels Filter,
        and Time Frame (minutes) parameters.
    is_mandatory: false
-   name: Subject Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email subject to search for.
        This filter uses the “contains” logic and requires you to specify search items
        in full words. This filter doesn’t support partial matches.
    is_mandatory: false
-   name: Sender Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email sender to search for.
        This filter uses the “equals” logic.
    is_mandatory: false
-   name: Time Frame (minutes)
    default_value: '60'
    type: string
    description: A filter condition that specifies the timeframe in minutes to search
        for emails.
    is_mandatory: false
-   name: Email Status
    default_value: Both Read & Unread Messages
    type: ddl
    optional_values:
    - Only Unread Messages
    - Only Read Messages
    - Both Read & Unread Messages
    description: A status of the email to search for.
    is_mandatory: false
-   name: Move to Trash
    default_value: 'true'
    type: boolean
    description: 'If selected, the action moves emails to Trash and doesn’t search
        through emails with the Trash label unless you configure the Labels Filter
        parameter to include the following label: Trash. If not selected, the action
        executes search across the whole mailbox and deletes emails forever. Selected
        by default.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/delete_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
