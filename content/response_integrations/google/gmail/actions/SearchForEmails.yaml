name: Search For Emails
description: Use the Search for Emails action to execute email search in a specified
    mailbox using the provided search criteria. With appropriate permissions, this
    action can run a search in other mailboxes. This action is asynchronous. Adjust
    the action timeout in the Google SecOps IDE accordingly. This action doesn't run
    on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#search-for-emails
integration_identifier: Gmail
parameters:
-   name: Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to search the email in, such as user@example.com. By default,
        the action uses the default mailbox that you configured for the integration.
        This parameter accepts multiple values as a comma-separated string.
    is_mandatory: true
-   name: Labels Filter
    default_value: Inbox
    type: string
    description: 'A filter condition that specifies the email labels to search for.
        This parameter accepts multiple values as a comma-separated string. You can
        search for emails with specific labels, such as label1, label2. To search
        for emails that don’t possess the specific label, use the following format:
        -label1. You can configure this parameter to search for emails with and without
        specific labels in one string, such as label1, -label2, label3.'
    is_mandatory: false
-   name: Internet Message ID
    default_value: ''
    type: string
    description: An internet message ID of the email to search for. This parameter
        accepts multiple values as a comma-separated string. If you provide the internet
        message ID, the action ignores the Subject Filter, Sender Filter, Labels Filter,
        Recipient Filter, Time Frame (minutes), and Email Status parameters.
    is_mandatory: false
-   name: Subject Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email subject to search for.
    is_mandatory: false
-   name: Sender Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email sender to search for.
    is_mandatory: false
-   name: Recipient Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email recipient to search for.
    is_mandatory: false
-   name: Time Frame (minutes)
    default_value: '60'
    type: string
    description: A filter condition that specifies the timeframe in minutes to search
        for emails.
    is_mandatory: false
-   name: Email Status
    default_value: Both Read & Unread Messages
    type: ddl
    optional_values:
    - Only Unread Messages
    - Only Read Messages
    - Both Read & Unread Messages
    description: A status of the email to search for.
    is_mandatory: false
-   name: Headers To Return
    default_value: date, from, to, cc, bcc, in-reply-to, reply-to, message-id, subject
    type: string
    description: 'A comma-separated list of headers to return in the action output.
        The action always returns the following headers: date, from, to, cc, bcc,
        in-reply-to, reply-to, message-id and subject headers. If you don’t provide
        any value, the action returns all headers.This parameter is case sensitive.'
    is_mandatory: false
-   name: Return Email Body
    default_value: 'false'
    type: boolean
    description: If selected, the action returns the full body content of an email
        in the action output. If not selected, the information about the attachment
        names in the email is unavailable
    is_mandatory: false
-   name: Max Emails To Return
    default_value: '50'
    type: string
    description: The maximum number of emails for the action to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_for_emails_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
