name: Wait For Thread Reply
description: Use the Wait For Thread Reply action to wait for the user's reply based
    on an email sent using the Send Email action. This action is asynchronous. Adjust
    the action timeout in the Google SecOps IDE accordingly. This action doesn't run
    on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#wait_for_thread_reply
integration_identifier: Gmail
parameters:
-   name: Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to wait for a reply in, such as user@example.com. By default,
        the action uses the default mailbox that you configured for the integration.
    is_mandatory: true
-   name: Internet Message ID
    default_value: ''
    type: string
    description: 'The internet message ID of an email for the action to wait for.
        If the message was sent using the Send Email action, configure this parameter
        using the following placeholder: SendEmail.JSONResult|message_id. To retrieve
        an internet message ID, use the Search for Emails action.'
    is_mandatory: true
-   name: Wait for All Recipients to Reply
    default_value: 'false'
    type: boolean
    description: If selected, the action waits for responses from all recipients until
        reaching timeout. Not selected by default.
    is_mandatory: false
-   name: Fetch Response Attachments
    default_value: 'false'
    type: boolean
    description: If selected and the recipient reply contains attachments, the action
        retrieves email attachments and adds them as an attachment to the Case Wall
        in Google SecOps. Not selected by default.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/wait_for_thread_reply_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
