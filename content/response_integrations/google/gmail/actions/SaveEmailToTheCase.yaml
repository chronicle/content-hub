name: Save Email To The Case
description: Use the Save Email To The Case action to save email or email attachments
    to the action Case Wall in Google SecOps. This action doesn’t run on Google SecOps
    entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#save_email_to_the_case
integration_identifier: Gmail
parameters:
-   name: Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to search the email in, such as user@example.com. By default,
        the action uses the default mailbox that you configured for the integration.
    is_mandatory: true
-   name: Internet Message ID
    default_value: ''
    type: string
    description: An internet message ID of the email to search for.
    is_mandatory: true
-   name: Save Only Email Attachments
    default_value: 'false'
    type: boolean
    description: If selected, the action saves only attachments from the specified
        email. Not selected by default.
    is_mandatory: false
-   name: Attachment To Save
    default_value: ''
    type: string
    description: If you selected the “Save Only Email Attachments” parameter, the
        action only saves attachments that this parameter specifies. This parameter
        accepts multiple values as a comma-separated string.
    is_mandatory: false
-   name: Base64 Encode
    default_value: 'false'
    type: boolean
    description: If selected, the action encodes the email file into a base64 format.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/save_email_to_the_case_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
