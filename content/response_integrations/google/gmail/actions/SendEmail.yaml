name: Send Email
description: Use the Send Email action to send an email based on the provided parameters.
    This action is not running on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#send-email
integration_identifier: Gmail
parameters:
-   name: Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to send an email from, such as user@example.com. By default,
        the action uses the default mailbox that you configured for the integration.
    is_mandatory: true
-   name: Subject
    default_value: ''
    type: string
    description: The subject for an email to send.
    is_mandatory: true
-   name: Send To
    default_value: ''
    type: string
    description: A comma-separated string of email addresses for the email recipients,
        such as user1@example.com, user2@example.com.
    is_mandatory: true
-   name: CC
    default_value: ''
    type: string
    description: A comma-separated string of email addresses for the carbon copy (CC)
        email recipients, such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: BCC
    default_value: ''
    type: string
    description: A comma-separated string of email addresses for the blind carbon
        copy (BCC) email recipients, such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: Attachments Paths
    default_value: ''
    type: string
    description: A comma-separated string of paths for file attachments stored on
        the Google SecOps server.
    is_mandatory: false
-   name: Mail Content
    default_value: ''
    type: email_content
    description: The body of an email.
    is_mandatory: true
-   name: Reply-To Recipients
    default_value: ''
    type: string
    description: A comma-separated list of recipients to use in the “Reply-To” header.
        Use the “Reply-To” header to redirect reply emails to the specific email address
        instead of the sender address that is stated in the “From” field.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/send_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
