name: Forward Email
description: Use the Forward Email action to forward emails, including emails with
    previous threads. This action doesn’t run on Google SecOps entities
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/gmail#forward_email
integration_identifier: Gmail
parameters:
-   name: Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to search the email in, such as user@example.com. By default,
        the action uses the default mailbox that you configured for the integration.
    is_mandatory: true
-   name: Internet Message ID
    default_value: ''
    type: string
    description: An internet message ID of the email to search for.
    is_mandatory: true
-   name: Send To
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email recipients,
        such as user1@example.com, user2@example.com.
    is_mandatory: true
-   name: CC
    default_value: ''
    type: string
    description: A comma-separated string of email addresses for the carbon copy (CC)
        email recipients, such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: BCC
    default_value: ''
    type: string
    description: A comma-separated string of email addresses for the blind carbon
        copy (BCC) email recipients, such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: Subject
    default_value: ''
    type: string
    description: A new subject for the email to forward.
    is_mandatory: true
-   name: Attachments Paths
    default_value: ''
    type: string
    description: A comma-separated string of paths for file attachments stored on
        the Google SecOps server.
    is_mandatory: false
-   name: Mail Content
    default_value: ''
    type: email_content
    description: The body of an email.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/forward_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
