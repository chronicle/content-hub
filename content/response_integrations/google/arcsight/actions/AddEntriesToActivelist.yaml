name: Add Entries To Activelist
description: Add new entry to active list in ArcSight. Column values are separated
    by delimiter ‘|' and entries are separated by ‘;’ in parameter ‘Entries’. Column
    names are separated by delimiter ‘;’ in parameter ‘Columns’. You can also use
    Entries JSON instead of ‘Columns’ + 'Entries’“.
integration_identifier: Arcsight
parameters:
-   name: Columns
    default_value: ''
    type: string
    description: 'Specify the name of the columns, where you want to put values for
        the entries. Format: Column_name1;Column_name2'
    is_mandatory: false
-   name: Entries
    default_value: ''
    type: string
    description: Specify the entries. Format entry1_value1|entry1_value2;entry2_value1|entry2_value2
    is_mandatory: false
-   name: Active List UUID
    default_value: ''
    type: string
    description: 'Specify the UUID of the active list, where you want to add new entries.
        Note: parameter “Active list UUID“ takes priority over “Active list name“.
        Example: HLZRc9yYBABC-lHtlf3-f0Q=='
    is_mandatory: false
-   name: Active list name
    default_value: ''
    type: string
    description: 'Specify the name of the active list, where you want to add new entries.
        Note: parameter “Active list UUID“ takes priority over “Active list name“.'
    is_mandatory: false
-   name: Entries JSON
    default_value: ''
    type: string
    description: 'Specify a list of JSON objects that contain information about the
        entry. Note: Combination of ‘Columns'' and ‘Entries’ parameters have priority
        over ''Entries JSON’. Format: [{"Column_1": "Value_1", "Column_2": "Value_2"},
        {"Column_1": "Value_3", "Column_2": "Value_4"}]'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
script_result_name: is_succeed
