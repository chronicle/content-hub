name: Search
description: Search for available resources in ArcSight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#search
integration_identifier: Arcsight
parameters:
-   name: Search Query
    type: string
    description: Specify the search query.
    is_mandatory: true
-   name: Max Items To Return
    default_value: '100'
    type: string
    description: Specify how many items to return in the response.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: success
