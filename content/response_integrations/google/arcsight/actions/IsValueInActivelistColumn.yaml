name: Is Value In Activelist Column
description: Action checks, if entities were found in ArcSight Activelist
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#is_value_in_activelist_column
integration_identifier: Arcsight
parameters:
-   name: Active list UUID
    default_value: ''
    type: string
    description: 'Specify the UUID of the active list, where you want to search for
        entities. Note: parameter “Active list UUID“ takes priority over “Active list
        name“. Example: HLZRc9yYBABC-lHtlf3-f0Q=='
    is_mandatory: false
-   name: Column name
    default_value: ''
    type: string
    description: Specify the name of the column, where you want to search for the
        entity.
    is_mandatory: true
-   name: Active list name
    default_value: ''
    type: string
    description: 'Specify the name of the active list, where you want to search for
        entities. Note: parameter “Active list UUID“ takes priority over “Active list
        name“.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/is_value_in_activelist_column_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: Success_Indicator
