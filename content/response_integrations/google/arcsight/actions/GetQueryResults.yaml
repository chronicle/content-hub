name: Get Query Results
description: Get results for the provided query in ArcSight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#get_query_results
integration_identifier: Arcsight
parameters:
-   name: Query ID
    default_value: ''
    type: string
    description: 'Specify the ID of the query for which you want to return results.
        Note: parameter “Query ID“ takes priority over “Query Name“. Example: cyUJKRz4BABCFwS9iFPq+aA=='
    is_mandatory: false
-   name: Max Items To Return
    default_value: '100'
    type: string
    description: Specify how many items to return in the response.
    is_mandatory: false
-   name: Query Name
    default_value: ''
    type: string
    description: 'Specify the name of the query for which you want to return results.
        Note: parameter “Query ID“ takes priority over “Query Name“.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_query_results_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: success
