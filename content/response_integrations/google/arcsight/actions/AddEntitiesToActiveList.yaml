name: Add Entities To Active List
description: Add entities to the active list in ArcSight.
integration_identifier: Arcsight
parameters:
-   name: Active List Name
    default_value: ''
    type: string
    description: Specify the name of the active list to which you want to add entities.
    is_mandatory: true
-   name: Entity Column
    default_value: ''
    type: string
    description: Specify the name of the column, where entity value should be put.
    is_mandatory: true
-   name: Additional Fields
    default_value: ''
    type: string
    description: 'Specify additional fields that should be added alongside the entity
        in the active list. Format is a JSON object. Example: {"Column_1": "Value_1","Column_2":
        "Value_2"}'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "FILEHASH", "ADDRESS"]}'
