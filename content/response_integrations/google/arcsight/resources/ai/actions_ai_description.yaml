Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Arcsight instance by attempting to authenticate and
    then immediately logging out. This action is used to verify that the integration
    configuration is correct and that the SOAR platform can communicate with the Arcsight
    server.


    ### Flow Description

    1. Extracts configuration parameters (Api Root, Username, Password, CA Certificate
    File, Verify SSL).

    2. Initializes the `ArcsightManager` with the provided credentials.

    3. Calls the `login()` method, which performs a POST request to the Arcsight login
    endpoint to obtain an authentication token.

    4. Calls the `logout()` method, which performs a GET request to the Arcsight logout
    endpoint to invalidate the session.

    5. Returns a success or failure message based on the outcome of these operations.


    ### Additional Notes

    This action does not perform any data retrieval or modification on the Arcsight
    platform beyond session management for connectivity testing.
