Change Case Stage:
  ai_description: >-
    ### General Description

    Updates the stage of a specific case in ArcSight.


    ### Flow Description

    1. Extracts the `Case Name` and the new `Stage` from the action parameters.

    2. Validates the provided stage against the allowed values (INITIAL, QUEUED, CLOSED,
    FINAL, FOLLOW_UP).

    3. Retrieves the current case details from ArcSight using the case name via a
    POST request to the `www/manager-service/rest/CaseService/getResourceByName` endpoint.

    4. Sends a POST request to the ArcSight API (`www/manager-service/rest/CaseService/update`)
    to update the case with the new stage.


    ### Additional Notes

