Add Entries To Activelist:
  ai_description: >-
    ### General Description

    Adds new entries to an ArcSight Active List. This action allows users to populate
    an Active List in ArcSight by providing either a set of columns and entries or
    a JSON representation of the entries.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials) and action parameters
    (Columns, Entries, Active List identifiers).

    2. Validates that either an Active List UUID or Name is provided, and that either
    Entries JSON or Columns/Entries are provided.

    3. Parses the input entries into a structured format.

    4. Authenticates with the ArcSight API.

    5. If an Active List Name is provided instead of a UUID, it retrieves the corresponding
    UUID.

    6. Sends a POST request to the ArcSight API to add the entries to the specified
    Active List.

    7. Logs out of the ArcSight session.


    ### Additional Notes

    Ensure the ArcSight API is accessible and the provided credentials have sufficient
    permissions to modify the target Active List. Either 'Active list UUID' or 'Active
