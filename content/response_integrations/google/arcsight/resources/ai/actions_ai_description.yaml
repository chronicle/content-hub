Change Case Stage:
  ai_description: >-
    ### General Description

    Updates the stage of a specific case within the Arcsight platform. This action
    allows analysts to transition a case through its lifecycle by modifying its stage
    field.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, connection settings) and
    action parameters (`Case Name`, `Stage`).

    2. Validates the provided `Stage` against a list of allowed values (`INITIAL`,
    `QUEUED`, `CLOSED`, `FINAL`, `FOLLOW_UP`).

    3. Initializes the `ArcsightManager` and authenticates with the Arcsight REST
    API.

    4. Retrieves the case details by name using the `get_case_by_name` method.

    5. Updates the stage field in the case's raw data.

    6. Sends a POST request to the `update_case` endpoint to persist the changes in
    Arcsight.

    7. Logs out of the Arcsight session.


    ### Additional Notes

    The action requires valid Arcsight credentials and connectivity to the Arcsight
    REST API. The `Case Name` must exist in Arcsight for the update to succeed.
