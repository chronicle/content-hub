Add Entities To Active List:
  ai_description: >-
    ### General Description

    Adds target entities to a specified active list in ArcSight. This action allows
    analysts to dynamically populate ArcSight active lists with entities and optional
    additional fields directly from the case.


    ### Flow Description

    1. Extracts the target entities from the case.

    2. Authenticates with the ArcSight API.

    3. Retrieves the UUID of the specified active list using its name.

    4. Formats the entities and any additional fields into the required payload structure.

    5. Makes a POST request to the ArcSight API to add the entries to the active list.


    ### Additional Notes

    The action processes all available entities without filtering by type. Additional
    fields must be provided as a valid JSON object.
  ai_short_description: >-
    Adds target entities and optional additional fields to a specified active list
    in ArcSight.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entries to a specified active list in ArcSight.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the ArcSight API to add entries to an active
      list, which mutates external data. It does not fetch data, update internal entities,
      or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: true
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
