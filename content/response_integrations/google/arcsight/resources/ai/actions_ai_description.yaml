Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity to the Arcsight server to ensure the integration
    is configured correctly and can successfully communicate with the API.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    etc.).

    2. Initializes the Arcsight API client.

    3. Attempts to authenticate and log in to the Arcsight server.

    4. Logs out of the Arcsight server.

    5. Returns a success status if the connection and authentication were successful,
    or a failure status otherwise.


    ### Additional Notes

