    their details (`act.getResourcesByIds`).

    5. If requested, makes API calls to fetch case IDs (`cas.findAllIds`) and their
    details (`cas.getResourcesByIds`).

    6. If requested, makes API calls to fetch report IDs (`rep.findAllIds`) and their
    details (`rep.getResourcesByIds`).

    7. Aggregates the retrieved resources into JSON results and constructs data tables
    for each requested type.


