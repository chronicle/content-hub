Get Report:
  ai_description: >-
    ### General Description

    Retrieves a report from ArcSight by its URI. This action authenticates with the
    ArcSight API, fetches the report metadata, generates a download token, and downloads
    the report content. If the report is in CSV format, it transforms the data into
    JSON, adds a data table to the action results, and attaches the raw report file
    to the action.


    ### Flow Description

    1. Authenticates with the ArcSight API using the provided credentials (Api Root,
    Username, Password).

    2. Retrieves report metadata using the provided `Report Full Path (URI)`.

    3. Generates a download token for the report using the report ID and any provided
    dynamic parameters (Fields 2-10).

    4. Downloads the report content from the ArcSight server.

    5. If the report format is CSV, it transforms the data into JSON, adds a data
    table to the action results, and adds the JSON result.

    6. Attaches the raw report file to the action results.

    7. Logs out of the ArcSight session.


    ### Additional Notes

    The action supports dynamic parameters for report generation, which can be passed
    via the optional fields.
  ai_short_description: >-
    Retrieves and downloads a report from ArcSight by its URI, supporting CSV transformation
