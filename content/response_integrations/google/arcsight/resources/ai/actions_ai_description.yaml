Add Entries To Activelist:
  ai_description: >-
    ### General Description

    Adds new entries to a specified active list in ArcSight. The action allows providing
    the entries either as delimited strings (Columns and Entries) or as a JSON array
    of objects.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Parses the provided entries from either the `Entries JSON` parameter or the
    combination of `Columns` and `Entries` parameters.

    3. Connects to the ArcSight API.

    4. If an `Active list name` is provided instead of an `Active List UUID`, it fetches
    the corresponding UUID from ArcSight.

    5. Calls the ArcSight API to add the parsed entries to the specified active list.

    6. Returns a success or failure message based on the API response.


    ### Additional Notes

    - The `Active List UUID` parameter takes priority over the `Active list name`
    parameter.

    - The combination of `Columns` and `Entries` parameters takes priority over the
    `Entries JSON` parameter.

    - Either `Active List UUID` or `Active list name` must be provided.

    - Either `Entries JSON` or both `Columns` and `Entries` must be provided.
