Is Value In Activelist Column:
  ai_description: >-
    ### General Description

    Checks if entities exist within a specific column of an ArcSight Active List.
    This action allows analysts to verify if an entity (e.g., IP, domain, user) is
    present in a specific column of an ArcSight Active List, providing valuable context
    for investigations.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials, SSL settings).

    2. Extracts action parameters (Active list UUID/name, Column name).

    3. Authenticates with the ArcSight Manager via `arcsight_manager.login()`.

    4. Resolves the Active List UUID if only the name is provided using `arcsight_manager.get_activelist_uuid()`.

    5. Retrieves entries from the specified Active List using `arcsight_manager.get_activelist_entries_by_uuid()`.

    6. Validates the existence of the specified column.

    7. Iterates through target entities, checking if their original identifier matches
    any value in the specified column.

    8. Updates entities with `IsInActivelist: True` if found using `siemplify.update_entities()`.

    9. Adds the filtered results to the action output using `siemplify.result.add_result_json()`.


    ### Additional Notes

    Requires valid ArcSight credentials and connectivity. The `Active list UUID` parameter
    takes precedence over `Active list name`.
