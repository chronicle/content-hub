Get Report:
  ai_description: >-
    ### General Description

    Retrieves and downloads a specific report from ArcSight based on its URI and optional
    dynamic parameters. The action fetches the report content, attaches it to the
    case, and if the report is in CSV format, it also parses the data to create a
    data table and JSON results.


    ### Flow Description

    1. Initializes the ArcSight manager using the provided integration credentials.

    2. Makes an API call to ArcSight to retrieve the report information based on the
    provided `Report Full Path (URI)`.

    3. Makes an API call to generate a download token for the report, passing any
    configured dynamic parameters (`Field 2` through `Field 10`).

    4. Makes an API call to download the actual report content using the generated
    token.

    5. If the report format is CSV, parses the content, adds a data table to the action
    results, and prepares JSON output.

    6. Attaches the downloaded report file to the case.


    ### Additional Notes

    The action supports up to 9 dynamic fields (`Field 2` to `Field 10`) which can
    be passed as parameters to generate the report. These fields should be formatted
    as `key=value`.
  ai_short_description: >-
    Retrieves and downloads a specific report from ArcSight based on its URI, attaching
    the file to the case and parsing CSV results if applicable.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes HTTP requests to ArcSight to fetch report information and download
      the report content. It does not mutate external data, update internal entities,
