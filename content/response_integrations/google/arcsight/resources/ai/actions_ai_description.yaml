Is Value In Activelist Column:
  ai_description: >-
    ### General Description

    This action checks if the target entities exist within a specified column of an
    ArcSight Active List. It retrieves the list contents and compares them against
    the entities, enriching the matching entities with a custom property if they are
    found in the list.


    ### Flow Description

    1. Extracts the provided Active List UUID or Name and the target Column Name.

    2. Authenticates with the ArcSight API.

    3. Makes an API call to retrieve the Active List UUID if only the Active List
    Name was provided.

    4. Makes an API call to retrieve the entries of the specified Active List.

    5. Iterates through the target entities and checks if their original identifier
    matches any value in the specified column.

    6. If a match is found, updates the entity's additional properties with `IsInActivelist:
    True`.

    7. Returns the matching rows as JSON results and updates the entities in the platform.


    ### Additional Notes

    Either 'Active list UUID' or 'Active list name' must be provided for the action
    to execute successfully.
