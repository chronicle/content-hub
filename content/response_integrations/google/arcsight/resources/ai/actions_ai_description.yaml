Add Entities To Active List:
  ai_description: >-
    ### General Description

    Adds entities to a specified Active List in ArcSight. This action allows analysts
    to populate ArcSight Active Lists with entities from the current case, enabling
    further correlation or monitoring within the ArcSight environment.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, SSL settings) from the
    integration configuration.

    2. Extracts action parameters (Active List Name, Entity Column, Additional Fields)
    from the action configuration.

    3. Iterates over the `target_entities` provided in the case.

    4. Constructs a payload containing the entity identifiers and any additional fields
    provided in the `Additional Fields` parameter.

    5. Authenticates with the ArcSight API using the provided credentials.

    6. Retrieves the UUID of the specified Active List by name.

    7. Sends a POST request to the ArcSight API to add the entries to the Active List.


    ### Additional Notes

    Requires valid ArcSight API credentials and connectivity to the ArcSight manager
    service.
  ai_short_description: >-
    Adds entities to a specified Active List in ArcSight.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: Adds entries to an ArcSight Active List.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to fetch the Active List UUID and a POST request
      to add entries to the Active List. This mutates external data (ArcSight Active
      List) but not internal data.
