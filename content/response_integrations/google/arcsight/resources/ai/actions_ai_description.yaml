Get Activelist Entries:
  ai_description: >-
    ### General Description

    Retrieves entries from a specified ArcSight Active List. This action allows users
    to fetch data from ArcSight by providing either the Active List UUID or the Active
    List name. It supports optional column mapping and entry limits to control the
    output format and volume.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    etc.) and action parameters (Active List UUID, Active List Name, Map Columns,
    Max Entries To Return).

    2. It initializes the `ArcsightManager` and authenticates with the ArcSight REST
    API.

    3. If the Active List UUID is not provided, the action calls the `get_activelist_uuid`
    API endpoint using the provided Active List name to resolve the UUID.

    4. The action calls the `get_activelist_entries_by_uuid` API endpoint to retrieve
    the entries from the Active List.

    5. If entries are found, the action adds the results to the SOAR action output
    as a data table and a JSON object.

    6. Finally, the action logs out of the ArcSight session.


    ### Additional Notes

    This action is a data retrieval operation and does not modify any data within
    ArcSight or the SOAR platform. It requires valid ArcSight credentials to authenticate
    successfully.
