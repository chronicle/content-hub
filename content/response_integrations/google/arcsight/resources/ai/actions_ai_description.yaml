Get Query Results:
  ai_description: >-
    ### General Description

    Retrieves the results of a specific query from ArcSight based on the provided
    Query ID or Query Name. The action returns the query data as a JSON object and
    attaches it as a data table to the case.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates that either a `Query ID` or `Query Name` is provided.

    3. Authenticates with the ArcSight API.

    4. If a `Query Name` is provided instead of an ID, makes an API call to resolve
    the name to a Query ID.

    5. Makes an API call to fetch the query results using the Query ID and the specified
    limit.

    6. Outputs the results as a JSON object and a data table.


    ### Additional Notes

    The `Query ID` parameter takes precedence over `Query Name`. If both are provided,
    the action will use the `Query ID`.
