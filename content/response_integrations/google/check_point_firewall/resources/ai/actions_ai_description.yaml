Remove Url From Group:
  ai_description: >-
    ### General Description

    Removes a URL from a specified application site group on a Checkpoint Firewall.
    This action allows security teams to manage URL filtering policies by dynamically
    removing URLs from defined groups, effectively unblocking them or removing them
    from restricted access lists.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves necessary integration configuration
    parameters, including the Checkpoint server address, credentials, and policy name.

    2. **Entity Filtering**: The action filters the provided target entities to identify
    only those of type `URL`.

    3. **Manager Initialization**: A `CheckpointManager` instance is initialized to
    handle communication with the Checkpoint Firewall API.

    4. **URL Removal**: For each identified URL entity, the action calls the `unblock_url_in_group`
    method, which performs a `set-application-site-group` API call to remove the URL
    from the specified group.

    5. **Policy Installation**: After processing the entities, the action calls `install_policy`
    to apply the changes to the firewall policy.

    6. **Session Termination**: The action logs out of the Checkpoint session.


    ### Additional Notes

    This action requires a valid Checkpoint Firewall integration configuration. The
    changes made to the group are only effective after the policy installation step
    is completed. If the specified group does not exist or is read-only, the action
    will fail for that entity.
