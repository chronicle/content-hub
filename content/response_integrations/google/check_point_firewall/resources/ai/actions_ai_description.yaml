    update_identity: false
    update_ticket: false
  ai_description: >-
    Adds a Suspicious Activity Monitoring (SAM) rule to a Checkpoint Firewall. This
    action constructs and executes a command to drop, reject, or notify on specific
    network traffic based on source/destination IP, netmask, port, and protocol. It
    monitors the task execution on the firewall and publishes the changes upon successful
    completion.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Security Gateway to Create SAM Rule on | string | Yes | Specify the name of
    Security Gateway to create a rule for. |

    | Source IP | string | No | Specify the source IP to be added to the rule. |

    | Source Netmask | string | No | Specify the source netmask to be added to the
    rule. |

    | Destination IP | string | No | Specify the destination IP to be added to the
    rule. |

    | Destination Netmask | string | No | Specify the destination netmask to be added
    to the rule. |

    | Port | string | No | Specify the port number to be added to the rule for example,
    5005. |

    | Protocol | string | No | Specify the protocol name to be added to the rule for
    example, TCP. |

    | Expiration | string | No | Specify how long in seconds the newly added SAM rule
    should be active for example, 4. If nothing is specified - then the rule never
    expires. |

    | Action for the Matching Connections | string | Yes | Specify the action that
    should be executed for the matching connections (Notify, Reject, Drop). |

    | How to Track Matching Connections | string | Yes | Specify how to track matching
    connections (No Log, Log, Alert). |

    | Close Connections | boolean | No | Specify if the existing matching connections
    should be closed. |


    ### Action Flow

    1. Connects to the Checkpoint Firewall using the provided credentials.

    2. Constructs the criteria for the SAM rule based on the provided IP, netmask,
    port, and protocol parameters.

    3. Constructs the `fw sam` command with the specified action, tracking, and expiration
    settings.

    4. Executes the command on the specified Security Gateway.

    5. Monitors the task status until completion or timeout.

    6. Publishes the changes to the firewall if the task succeeds.

    7. Returns the execution status and task details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a Suspicious Activity Monitoring (SAM) rule to the Checkpoint Firewall.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action executes a command on the Checkpoint Firewall to add a SAM rule,
      which mutates the external state of the firewall. It does not fetch data for
      enrichment, nor does it mutate internal SecOps data like entities or insights.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding a firewall rule, which disqualifies
      it from being an enrichment action. Since it can be used to drop or reject connections
      (blocking IPs/ports), it is classified as a remediation action.
    remediation: true
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. It
      relies entirely on action parameters (like Source IP, Destination IP) provided
      by the user or playbook.
