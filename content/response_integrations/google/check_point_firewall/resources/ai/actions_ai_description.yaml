Download Log Attachment:
  ai_description: >-
    ### General Description

    Downloads log attachments from a CheckPoint Firewall. This action retrieves specific
    log attachments based on provided Log IDs, saves them to a specified local directory,
    and optionally attaches them to the case wall within the SecOps platform.


    ### Flow Description

    1. The action extracts configuration parameters (Server Address, Username, Password,
    Domain, Verify SSL) and action parameters (Log IDs, Download Folder Path, Create
    Case Wall Attachment).

    2. It initializes the `CheckpointManager` to establish a session with the CheckPoint
    Firewall.

    3. For each provided Log ID, the action calls the `get_task_process_data` API
    to initiate the retrieval process.

    4. It monitors the task progress using `check_the_progress_of_task` until completion.

    5. Upon successful task completion, it retrieves the task details and parses the
    attachments.

    6. The action saves the retrieved attachments to the specified `Download Folder
    Path` using `save_attachment`.

    7. If `Create Case Wall Attachment` is enabled, it adds the attachment to the
    case wall, provided the file size is within the allowed limit (3 MB).

    8. Finally, it returns a JSON result containing the details of the successfully
    processed tasks.


    ### Additional Notes

    This action requires valid connectivity to the CheckPoint Firewall. The `Create
    Case Wall Attachment` feature is subject to a 3 MB file size limit. Ensure the
    `Download Folder Path` is accessible and writable by the execution environment.
  ai_short_description: >-
    Downloads log attachments from a CheckPoint Firewall and saves them locally or
    to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
