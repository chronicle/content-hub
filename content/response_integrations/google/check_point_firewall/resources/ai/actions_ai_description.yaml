    Adds IP address entities to a specified Checkpoint Firewall group, effectively
    blocking them or applying a specific policy.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Blacklist Group Name | String | Yes | Specify the name of the group to which
    you want to add the IP address. |


    ### Flow

    1. Initializes the Checkpoint Firewall manager with the provided credentials.

    2. Iterates over the target entities of type ADDRESS.

    3. For each IP, checks if the specified group exists and is editable.

    4. Checks if the IP address range already exists; if not, creates it.

    5. Adds the IP address to the specified group.

    6. Publishes the changes and installs the policy.

    7. Returns a summary message of successful and failed operations.
