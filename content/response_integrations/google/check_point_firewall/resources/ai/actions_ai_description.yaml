Add Ip To Group:
  ai_description: >-
    ### General Description

    Adds specific IP address entities to a designated Checkpoint Firewall group. This
    action is typically used to block or restrict network traffic associated with
    the IP addresses by updating the firewall's policy configuration.


    ### Flow Description

    1. Extracts the target Checkpoint Firewall group name from the action parameters.

    2. Filters the target entities to include only IP addresses (ADDRESS).

    3. Iterates through the relevant IP addresses and makes API calls to Checkpoint
    Firewall to add each IP to the specified group.

    4. Publishes the changes and makes an API call to install the updated policy on
    the Checkpoint Firewall.

    5. Returns a summary message indicating which IP addresses were successfully added
    or failed.


    ### Additional Notes

    The action requires a valid policy name configured in the integration settings
    to successfully install the policy after adding the IPs to the group.
  ai_short_description: >-
    Adds specific IP address entities to a designated Checkpoint Firewall group and
    installs the updated policy.
