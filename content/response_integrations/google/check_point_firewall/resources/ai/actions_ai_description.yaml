Add a SAM Rule:
  ai_description: >-
    ### General Description

    Adds a Suspicious Activity Monitoring (SAM) rule to a Checkpoint Firewall. This
    action modifies the firewall's configuration to drop, reject, or notify on specific
    network connections based on provided IP, netmask, port, and protocol criteria.


    ### Flow Description

    1. Extracts configuration and action parameters (e.g., Source IP, Destination
    IP, Action).

    2. Connects to the Checkpoint Firewall via the Checkpoint API.

    3. Constructs the SAM rule criteria based on the provided network parameters.

    4. Executes the `fw sam` command on the specified Security Gateway using the `run-script`
    API endpoint.

    5. Polls the task status until completion.

    6. Publishes the changes to the firewall to apply the rule.

    7. Returns the execution status and task details as JSON results.


    ### Additional Notes

    The action allows specifying expiration times for the rule and how matching connections
    should be tracked (e.g., Log, Alert). It does not operate on SOAR entities directly
    but relies on the provided action parameters.
