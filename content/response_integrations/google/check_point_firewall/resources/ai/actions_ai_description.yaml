Add a SAM Rule:
  ai_description: >-
    ### General Description

    Adds a Suspicious Activity Monitoring (SAM) rule to a Checkpoint Firewall. This
    action allows users to define specific network criteria (IPs, ports, protocols)
    and actions (Drop, Reject, Notify) to monitor or block traffic on a target Security
    Gateway.


    ### Flow Description

    1. Extracts configuration parameters (Server Address, Username, Password, Domain,
    Verify SSL).

    2. Extracts action parameters (Gateway, IPs, Port, Protocol, Action, Tracking,
    Expiration).

    3. Connects to the Checkpoint Firewall API.

    4. Constructs the `fw sam` command criteria based on provided network parameters.

    5. Executes the `fw sam` command on the specified Security Gateway.

    6. Polls the task status until completion or timeout.

    7. Publishes the changes to the firewall.

    8. Returns the task details as a JSON result.


    ### Additional Notes

    This action performs a state-changing operation on the firewall. Ensure the provided
    Security Gateway name is correct.
