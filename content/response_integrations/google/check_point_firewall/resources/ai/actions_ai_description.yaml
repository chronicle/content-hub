    frame, and log type. This action allows analysts to pull historical telemetry
    data directly from the firewall to assist in investigations.


    ### Flow Description

    1. The action initializes the `CheckpointManager` using the provided integration
    configuration (Server Address, Username, Password, Domain, and SSL verification
    settings).

    2. It extracts the action parameters: `Query Filter`, `Time Frame`, `Log Type`,
    and `Max Logs To Return`.

    3. The action calls the `get_logs` method on the `CheckpointManager` to query
    the CheckPoint FireWall API with the specified parameters.

    4. If logs are successfully retrieved, the action formats the data into a CSV
    table and a JSON result object, which are then added to the action results.

    5. Finally, the action logs out of the CheckPoint session.


    ### Additional Notes

    The action supports filtering logs by time frame and type. The maximum number
    of logs returned is limited to 100 due to Checkpoint Firewall API limitations.
