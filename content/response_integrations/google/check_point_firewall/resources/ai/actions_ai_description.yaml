Download Log Attachment:
  ai_description: >-
    ### General Description

    Downloads log attachments from CheckPoint FireWall based on provided Log IDs.
    This action retrieves files associated with specific logs and saves them to a
    designated local folder, with an option to attach them directly to the case wall.


    ### Flow Description

    1. Extracts the provided Log IDs and the target download folder path.

    2. Initiates a task to retrieve attachments for each Log ID by calling the CheckPoint
    FireWall API (`get-attachment`).

    3. Monitors the progress of the tasks until they are completed.

    4. Downloads and saves the retrieved attachments to the specified local folder
    path.

    5. If configured, attaches the downloaded files to the action results/case wall
    (only for files smaller than 3 MB).

    6. Returns the task details and attachment metadata as JSON results.


    ### Additional Notes

    Ensure that the provided download folder path exists and is accessible by the
    integration.
