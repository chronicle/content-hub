  ai_description: >-
    Downloads log attachments from CheckPoint FireWall based on provided Log IDs.


    ### General Description

    This action connects to CheckPoint FireWall to retrieve attachments associated
    with specific log entries. It initiates a task to process the logs, waits for
    completion, and then downloads the attachments to a specified local folder. Optionally,
    it can also attach the downloaded files directly to the case wall in Google SecOps
    if they are under a specific size limit (3 MB).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Log IDs | String | Yes | Specify the comma-separated list of log IDs from which
    you want to download attachments. |

    | Download Folder Path | String | Yes | Specify the absolute path for the folder
    where the action should store the attachments locally. |

    | Create Case Wall Attachment | Boolean | No | If enabled, the action will create
    a case wall attachment for each successfully downloaded file, provided its size
    is less than 3 MB. |


    ### Flow Description

    1. Establishes a connection to CheckPoint FireWall.

    2. Iterates over the provided Log IDs and initiates tasks to retrieve their attachments.

    3. Polls the CheckPoint FireWall to check the progress of the tasks until they
    are completed.

    4. Retrieves the task details and downloads the attachments to the specified local
    folder path.

    5. If the `Create Case Wall Attachment` parameter is enabled, attaches the downloaded
    files (under 3 MB) to the case wall.

    6. Returns the task details and attachment metadata as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds downloaded attachments to the case wall if the 'Create Case Wall Attachment'
      parameter is enabled.
    reasoning: >-
      The action fetches data (log attachments) from CheckPoint FireWall. It does
      not mutate external data as it only reads/downloads files. It mutates internal
      data by optionally adding the downloaded files as attachments to the case wall.
      It does not update entities, create insights, modify alert data, or create case
      comments.
  categories:
