      The action adds a SAM rule to the firewall, which can be configured to drop
      or reject traffic based on IP addresses, ports, and protocols. This aligns with
      the 'Add IOC To Blocklist' and 'Block IP' expected outcomes, as it updates security
      controls to prevent future interaction with specific network indicators.
    remove_ioc_from_allowlist: false
