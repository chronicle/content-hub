Add Url To Group:
  ai_description: >-
    ### General Description

    Adds URL entities to a specified Checkpoint Firewall group. This action initiates
    a state change on the external firewall device to include the URL in a group,
    which is typically used for blocking or allowing traffic, and then installs the
    policy.


    ### Flow Description

    1. Initializes the Checkpoint Firewall manager with the provided credentials.

    2. Iterates through the target entities, filtering for URL entities.

    3. For each URL, checks if the specified application site group exists and is
    editable.

    4. Checks if the URL application site exists; if not, creates it.

    5. Adds the URL application site to the specified group via the Checkpoint API.

    6. Publishes the changes and installs the specified policy.


    ### Additional Notes

    The action will fail if the specified group does not exist or is read-only.
