List Layers On Site:
  ai_description: >-
    ### General Description

    Retrieves available Access Control and Threat Prevention layers from a Checkpoint
    Firewall. This action connects to the firewall, queries the configuration for
    defined layers, and returns the data as structured tables and a JSON object for
    analysis.


    ### Flow Description

    1. Initialize the connection to the Checkpoint Firewall using the provided server
    address, username, password, and domain.

    2. Execute an API call to retrieve Access Control layers, limited by the `Max
    Layers To Return` parameter.

    3. Execute an API call to retrieve Threat Prevention layers, limited by the `Max
    Layers To Return` parameter.

    4. Construct CSV data tables for both Access Control and Threat Prevention layers
    and add them to the action results.

    5. Aggregate all retrieved layer data into a single JSON result and attach it
    to the action output.

    6. Log out of the Checkpoint session.


    ### Additional Notes

    This action is a read-only operation and does not modify any firewall configurations
    or internal SOAR entities. It is intended for gathering configuration context
    from the firewall.
