    ### General Description

    Removes specific IP address entities from a designated Checkpoint Firewall Group.
    This action is typically used to unblock an IP address by removing it from a restricted
    group and then applying the updated policy to the firewall.


    ### Flow Description

    1. Extracts the target Checkpoint Firewall Group name from the action parameters.

    2. Iterates over all target entities, filtering for those of type ADDRESS.

    3. For each valid IP address, makes an API call (`set-group`) to the Checkpoint
