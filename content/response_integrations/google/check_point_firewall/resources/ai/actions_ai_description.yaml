Add Url To Group:
  ai_description: >-
    General Description

    Adds a URL to a specified URL group on a Checkpoint Firewall. This action modifies
    the firewall's configuration to include the URL in the target group and subsequently
    installs the policy to ensure the changes take effect.


    Flow Description

    1. Initialize the `CheckpointManager` using the provided integration configuration
    (Server Address, Username, Password, Domain, Verify SSL).

    2. Filter the target entities to identify those of type `URL`.

    3. For each identified URL, call `block_url_in_group` to add the URL to the specified
    `URLs Group Name`.

    4. Within `block_url_in_group`, verify the group exists and is editable, then
    add the URL to the group.

    5. Call `publish_changes` to commit the modifications to the Checkpoint database.

    6. Call `install_policy` using the provided `Policy Name` to apply the changes
    to the firewall.

    7. Log out of the Checkpoint session.


    Additional Notes

    This action requires the `Policy Name` to be correctly configured in the integration
    settings to successfully apply the changes.
