Add Ip To Group:
  ai_description: >-
    ### General Description

    Adds an IP address to a specified Checkpoint Firewall group. This action updates
    the firewall configuration to include the IP in a blacklist group and subsequently
    installs the policy to apply the changes to the network environment.


    ### Flow Description

    1. Extracts integration configuration (Server Address, Credentials, Domain, Verify
    SSL, Policy Name) and the `Blacklist Group Name` parameter.

    2. Filters target entities to process only those of type `ADDRESS`.

    3. For each valid IP entity, the action performs the following:
        * Validates that the specified group exists and is editable on the Checkpoint
    Firewall.
        * Checks if an address range object for the IP already exists.
        * If the object exists, it adds the IP to the group using `set-group`.
        * If the object does not exist, it creates a new address range object and
    adds it to the group.
        * Publishes the changes to the Checkpoint server.
    4. After processing all entities, the action calls `install-policy` using the
    provided `Policy Name` to ensure the changes are applied.


    ### Additional Notes

    This action performs state-changing operations on the Checkpoint Firewall. Ensure
    the provided credentials have sufficient permissions to modify groups and install
    policies. The action will fail if the specified group is read-only or cannot be
    found.
  ai_short_description: >-
    Adds an IP address to a specified Checkpoint Firewall group and installs the policy.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the IP address to the specified Checkpoint Firewall group, publishes the
      changes, and installs the policy.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data to verify group and address existence (fetches_data=true).
      It performs state-changing operations on the Checkpoint Firewall by adding objects
      to groups, publishing changes, and installing policies (can_mutate_external_data=true).
      It does not mutate internal SecOps data, update entities, create insights, or
      modify alert data.
