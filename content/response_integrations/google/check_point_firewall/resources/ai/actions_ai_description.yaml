      policy.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs POST requests to the Checkpoint Firewall API to add an IP
      address to a group and install the policy, which mutates external data. It does
      not fetch enrichment data, update internal entities, create insights, or modify
