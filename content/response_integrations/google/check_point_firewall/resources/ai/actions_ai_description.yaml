List Policies On Site:
  ai_description: >-
    ### General Description

    Retrieves a list of security policies from the CheckPoint firewall. This action
    connects to the firewall, fetches the configured policy packages, and presents
    them in both a structured CSV table and a JSON format for analysis within the
    SOAR platform.


    ### Flow Description

    1. The action initializes the `CheckpointManager` using the provided integration
    credentials (Server Address, Username, Password, Domain, and SSL verification
    settings).

    2. It calls the `get_policies` method to retrieve the policy packages from the
    CheckPoint firewall, applying the specified limit for the number of policies to
    return.

    3. The retrieved policies are parsed using the `get_policies_parsed` method.

    4. The action generates a CSV report of the policies and adds it to the action
    results using `siemplify.result.add_data_table`.

    5. The parsed policy data is added to the action results as a JSON object using
    `siemplify.result.add_result_json`.

    6. Finally, the action logs out of the CheckPoint session.


    ### Additional Notes

    This action is a read-only operation and does not modify any configurations or
    policies on the CheckPoint firewall.
