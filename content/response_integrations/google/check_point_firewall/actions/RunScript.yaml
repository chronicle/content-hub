name: Run Script
description: 'Run arbitrary script with CheckPoint run-script API call. Note: action
    is not using Siemplify entities to operate.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/check-point-firewall#run_script
integration_identifier: CheckPointFirewall
parameters:
-   name: Script text
    default_value: ''
    type: string
    description: 'Script to execute. For example, fw sam command: fw sam -t 600 -I
        src 8.9.10.12'
    is_mandatory: true
-   name: Target
    default_value: ''
    type: string
    description: 'Specify CheckPoint device to execute script on, for example: gaia80.10.
        Parameter accepts multiple values as a comma separated list.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/run_script_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
