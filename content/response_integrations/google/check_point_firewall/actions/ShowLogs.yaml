name: Show Logs
description: Retrieve logs from CheckPoint FireWall based on the filter.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/check-point-firewall#show_logs
integration_identifier: CheckPointFirewall
parameters:
-   name: Query Filter
    default_value: ''
    type: string
    description: Specify the query filter that will be used to return logs.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Today
    - Yesterday
    - Last Hour
    - Last 24 Hours
    - Last 30 Days
    - This Week
    - This Month
    - All Time
    description: Specify what time frame should be used for log retrieval.
    is_mandatory: true
-   name: Log Type
    default_value: Log
    type: ddl
    optional_values:
    - Log
    - Audit
    description: Specify what type of logs should be returned.
    is_mandatory: true
-   name: Max Logs To Return
    default_value: 50
    type: string
    description: Specify how many logs to return. Maximum is 100. This is Checkpoint
        FireWall limitation.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/show_logs_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
