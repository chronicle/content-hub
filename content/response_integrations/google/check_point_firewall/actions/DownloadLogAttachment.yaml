name: Download Log Attachment
description: Download log attachments from CheckPoint FireWall.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/check-point-firewall#download_log_attachment
integration_identifier: CheckPointFirewall
parameters:
-   name: Log IDs
    default_value: ''
    type: string
    description: Specify the comma-separated list of log IDs from which you want to
        download attachments.
    is_mandatory: true
-   name: Download Folder Path
    default_value: ''
    type: string
    description: Specify the absolute path for the folder where the action should
        store the attachments.
    is_mandatory: true
-   name: Create Case Wall Attachment
    default_value: ''
    type: boolean
    description: 'If enabled, action will create a case wall attachment for each successfully
        downloaded file. Note: that attachment will only be created if it’s size is
        less than 3 MB.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/download_log_attachment_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
