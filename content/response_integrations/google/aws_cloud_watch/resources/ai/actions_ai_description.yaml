List Log Groups:
  ai_description: >-
    ### General Description

    Lists available log groups in AWS CloudWatch. This action retrieves a list of
    log groups from the AWS CloudWatch service based on the specified maximum number
    of groups to return, providing visibility into the available logging infrastructure.


    ### Flow Description

    1. The action initializes the `AWSCloudWatchManager` using the provided AWS credentials
    (Access Key, Secret Key, and Region).

    2. It extracts the `Max Groups To Return` parameter, defaulting to 50 if not provided.

    3. The action calls the `list_log_groups` method of the `AWSCloudWatchManager`,
    which interacts with the AWS CloudWatch API to fetch the log groups.

    4. The retrieved log groups are processed and converted into JSON and CSV formats.

    5. The results are added to the action output as a JSON result and a data table.


    ### Additional Notes

    This action is read-only and does not modify any data in AWS CloudWatch or the
