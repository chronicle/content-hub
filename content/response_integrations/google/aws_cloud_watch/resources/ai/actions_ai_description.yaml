    Creates a new log stream for a specified log group in AWS CloudWatch. This action
    initiates a state change on the external AWS environment by provisioning a new
    log stream resource.


    ### Flow Description

    1. Extracts the necessary AWS authentication credentials from the integration
    configuration.

    2. Retrieves the action parameters: `Log Group` and `Log Stream Name`.

    3. Initializes the AWS CloudWatch Manager.

    4. Makes an API call to AWS CloudWatch (`create_log_stream`) to create the new
    log stream within the specified log group.

    5. Returns the created log stream name as part of the action's JSON result.


    ### Additional Notes

    Ensure that the provided AWS credentials have the necessary IAM permissions to
