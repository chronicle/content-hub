    retrieves metadata about the log streams within the provided log groups, such
    as creation time, stored bytes, and the last event timestamp.


    ### Flow Description

    1. Extracts the provided log groups, sorting preferences, and the maximum number
    of streams to return.

    2. Iterates through each provided log group.

    3. Makes an API call to AWS CloudWatch (`describe_log_streams`) to fetch the log
    streams for the current log group.

    4. Formats the retrieved log streams into JSON and CSV tables.

    5. Returns the aggregated data to the SecOps platform.


