name: List Log Streams
description: List available log streams in AWS CloudWatch.
integration_identifier: AWSCloudWatch
parameters:
-   name: Log Groups
    default_value: ''
    type: string
    description: Specify a comma-separated list of group names for which you want
        to retrieve log streams.
    is_mandatory: true
-   name: Order By
    default_value: Log Stream Name
    type: ddl
    optional_values:
    - Log Stream Name
    - Last Event Time
    description: Specify how the log streams should be ordered.
    is_mandatory: false
-   name: Sort Order
    default_value: Ascending
    type: ddl
    optional_values:
    - Ascending
    - Descending
    description: Specify how the log streams should be sorted.
    is_mandatory: false
-   name: Max Streams To Return
    default_value: '50'
    type: string
    description: 'Specify how many streams to return per log group. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_log_streams_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
