name: List Address Lists
description: List available address lists in F5 BIG-IP.
integration_identifier: F5BIGIPiControlAPI
parameters:
-   name: Filter Logic
    default_value: Equal
    type: ddl
    optional_values:
    - Equal
    - Contains
    description: Specify what filter logic should be applied.
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: 'Specify what value should be used in the filter. If "Equal" is selected,
        action will try to find the exact match among results and if "Contains" is
        selected, action will try to find results that contain that substring. If
        nothing is provided in this parameter, the filter will not be applied. '
    is_mandatory: false
-   name: Max Address Lists To Return
    default_value: 50
    type: string
    description: 'Specify how many address lists to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_address_lists_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
