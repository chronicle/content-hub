name: Create Port List
description: Create a port list in F5 BIG-IP.
integration_identifier: F5BIGIPiControlAPI
parameters:
-   name: Name
    default_value: ''
    type: string
    description: 'Specify the name of the port list that needs to be created. Note:
        name shouldn''t contain whitespace. This is F5 BIG-IP limitation.'
    is_mandatory: true
-   name: Ports
    default_value: ''
    type: string
    description: Specify a comma-separated list of ports that will be a part of the
        new port list.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_port_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
