name: Create Data Group
description: 'Create a data group in F5 BIG-IP. Note: action only supports internal
    data groups.'
integration_identifier: F5BIGIPiControlAPI
parameters:
-   name: Type
    default_value: IP Address
    type: ddl
    optional_values:
    - IP Address
    - String
    - Integer
    description: Specify the type for the data group.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify the name of the data group that needs to be created.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_data_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
