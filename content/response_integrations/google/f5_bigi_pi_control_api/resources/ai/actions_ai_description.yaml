Remove IP From Address List:
  ai_description: >-
    ### General Description

    Removes specified IP address entities from a designated address list within an
    F5 BIG-IP environment. This action allows security teams to dynamically manage
    network access control lists by removing indicators that no longer require blocking
    or restriction.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the F5 BIG-IP API root,
    credentials, and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: The action extracts the `Address List Name` parameter
    provided by the user.

    3. **Entity Filtering**: The action filters the `target_entities` to identify
    only those of type `ADDRESS`.

    4. **Fetch Current List**: The action calls the `get_address_list` method via
    the F5 BIG-IP API to retrieve the current contents of the specified address list.

    5. **List Modification**: The action processes the current list, removing the
    IPs that match the identified `ADDRESS` entities.

    6. **Update External System**: The action performs a `PATCH` request via the `update_address_list`
    method to push the updated address list configuration to the F5 BIG-IP device.

    7. **Result Reporting**: The action reports the successful removal of IPs or identifies
    IPs that were not present in the list.


    ### Additional Notes

    This action requires valid F5 BIG-IP credentials with sufficient permissions to
    modify address lists. If the resulting list would be empty, the action will raise
    an exception, as the system prevents removing all IPs from an address list.
