Add IP To Address List:
  ai_description: >-
    ### General Description

    Adds one or more IP address entities to a specified address list within an F5
    BIG-IP instance. This action is typically used to update firewall or security
    policy lists to manage network traffic.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the F5 BIG-IP API root, credentials
    (username, password), and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: Retrieves the `Address List Name` from the action
    parameters.

    3. **Entity Filtering**: Filters the provided `target_entities` to include only
    those of type `ADDRESS`.

    4. **Address List Retrieval**: For each suitable entity, the action calls the
    F5 BIG-IP API (`GET` request) to retrieve the current configuration of the specified
    address list.

    5. **List Update**: Appends the IP address to the existing list and sends an update
    request (`PATCH` request) to the F5 BIG-IP API to save the changes.

    6. **Result Reporting**: Logs the success or failure of the operation for each
    entity and adds the updated address list details to the action result.


    ### Additional Notes

    - The action requires valid credentials with sufficient permissions to modify
    address lists on the F5 BIG-IP device.

    - If no suitable entities are found, the action will terminate and report that
    no entities were processed.
  ai_short_description: >-
    Adds IP address entities to a specified address list in F5 BIG-IP to manage network
    security policies.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the specified address list on the F5 BIG-IP device by adding the provided
      IP addresses.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the current address list configuration (GET request) and
      then updates it (PATCH request) on the external F5 BIG-IP system. It does not
      mutate internal SOAR data or update entities.
