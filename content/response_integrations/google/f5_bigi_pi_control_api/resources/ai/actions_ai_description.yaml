Remove Port From Port List:
  ai_description: >-
    ### General Description

    Removes specified ports from a port list in F5 BIG-IP. This action modifies the
    configuration of the external F5 BIG-IP device by updating an existing port list
    to exclude the provided ports.


    ### Flow Description

    1. Retrieves the current configuration of the specified port list from F5 BIG-IP
    via a GET request.

    2. Evaluates the retrieved ports and filters out the ones specified in the action
    parameters.

    3. Validates that the resulting port list is not empty (raises an exception if
    it is).

    4. Updates the port list in F5 BIG-IP with the remaining ports via a PATCH request.

    5. Returns the updated port list as a JSON result and outputs a summary message
    detailing the successfully removed ports and any ports that did not exist in the
    list.


    ### Additional Notes

    - The action will fail if the user attempts to remove all ports from the port
    list, as F5 BIG-IP requires at least one port to remain in a port list.
