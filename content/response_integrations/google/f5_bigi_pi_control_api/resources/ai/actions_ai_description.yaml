Remove IP From Data Group:
  ai_description: >-
    ### General Description

    Removes specified IP address entities from a designated data group within an F5
    BIG-IP system. This action allows security teams to dynamically manage network
    access control lists or blocklists by removing indicators that no longer require
    restriction.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the F5 BIG-IP API root,
    credentials, and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: The action retrieves the `Data Group Name` parameter
    provided by the user.

    3. **Entity Filtering**: The action filters the provided target entities to include
    only those of type `ADDRESS`.

    4. **Data Group Retrieval**: The action calls the F5 BIG-IP API to fetch the current
    configuration of the specified data group.

    5. **Validation**: It verifies that the retrieved data group is of the `ip` type.

    6. **Record Modification**: For each valid entity, the action masks the IP address
    and checks if it exists within the data group's records. If found, the IP is removed
    from the records list.

    7. **External Update**: If modifications were made, the action sends a PATCH request
    to the F5 BIG-IP API to update the data group with the new record set.

    8. **Result Reporting**: The action returns a JSON result containing the updated
    data group configuration and a summary message detailing which IPs were successfully
    removed or failed to be found.


    ### Additional Notes

    This action requires the F5 BIG-IP integration to be properly configured with
    valid credentials. The action will fail if the specified data group does not exist
    or is not of the `ip` type.
