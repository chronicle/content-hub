Update iRule:
  ai_description: >-
    ### General Description

    Updates an existing iRule configuration on an F5 BIG-IP device. This action allows
    administrators to modify the logic of a specific iRule by providing its name and
    the new rule content.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, Username,
    Password, Verify SSL) and the action-specific parameters (Name, Rule) from the
    integration settings.

    2. The `F5BIGIPiControlAPIManager` is initialized with the provided credentials
    and connection settings.

    3. The action calls the `update_irule` method, which sends a `PATCH` request to
    the F5 BIG-IP API endpoint `/mgmt/tm/ltm/rule/{name}` with the new rule content
    (`apiAnonymous`).

    4. The updated iRule details are returned and added to the action result as a
    JSON object.


    ### Additional Notes

    This action directly modifies the configuration of the F5 BIG-IP device. Ensure
    that the provided rule syntax is valid according to F5 iRule standards to prevent
    configuration errors or service disruption.
