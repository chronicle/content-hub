Add IP To Address List:
  ai_description: >-
    ### General Description

    Adds IP addresses to a specified address list in F5 BIG-IP. This action initiates
    a state change on the external device to update the address list with the provided
    IP address entities.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the target
    Address List Name.

    2. Filters the target entities to include only IP Address entities.

    3. Initializes the F5 BIG-IP API manager.

    4. Iterates over the suitable entities and retrieves the current state of the
    specified address list.

    5. Appends the entity's IP address to the list of addresses.

    6. Updates the address list in F5 BIG-IP via a PATCH request.

    7. Returns the updated address list as JSON data in the action results.


    ### Additional Notes

    - Supported entity types: IP Address.
  ai_short_description: >-
    Adds IP addresses to a specified address list in F5 BIG-IP.
