Add Port To Port List:
  ai_description: >-
    ### General Description

    This action adds a specified list of ports to an existing port list within an
    F5 BIG-IP device. It allows security teams to dynamically update firewall port
    configurations directly from the SOAR platform, facilitating automated network
    security management.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, Username,
    Password, Verify SSL) and action parameters (Port List Name, Ports).

    2. The `Ports` parameter is converted from a comma-separated string into a list.

    3. The action initializes the `F5BIGIPiControlAPIManager` to interact with the
    F5 BIG-IP API.

    4. For each port in the provided list, the action retrieves the current port list
    configuration using the `get_port_list` API endpoint.

    5. The new port is appended to the existing list of ports.

    6. The action updates the port list on the F5 BIG-IP device using the `update_port_list`
    API endpoint.

    7. The action tracks successful and failed additions and returns a summary message
    and the updated port list JSON.


    ### Additional Notes

    This action requires valid credentials and connectivity to the F5 BIG-IP management
    interface. It performs a PATCH request to update the port list configuration.
    If a port is already present, the logic simply appends it, which may result in
    duplicates depending on the F5 BIG-IP implementation; however, the action reports
    success based on the API response.
