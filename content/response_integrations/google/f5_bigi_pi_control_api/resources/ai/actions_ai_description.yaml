Add IP To Data Group:
  ai_description: >-
    ### General Description

    Adds an IP address entity to a specified internal data group within an F5 BIG-IP
    instance. This action allows security teams to dynamically update F5 BIG-IP configurations,
    such as blocklists or allowlists, directly from the SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Username,
    Password, Verify SSL) and the action parameter (Data Group Name).

    2. It filters the `target_entities` to identify those of type `ADDRESS`.

    3. For each suitable entity, the action performs the following steps:
        - Calls the F5 BIG-IP API (`GET` request) to retrieve the current configuration
    of the specified data group.
        - Validates that the data group exists and is of the correct type (`IP_GROUP_TYPE`).
        - Appends the entity's identifier to the data group's record list.
        - Calls the F5 BIG-IP API (`PATCH` request) to update the data group with
    the new records.
    4. The action concludes by adding the updated data group information to the result
    JSON and providing a summary of successful and failed operations in the output
    message.


    ### Additional Notes

    This action requires the target data group to be configured as an 'internal' data
    group with the 'IP' type in F5 BIG-IP. If the data group is not found or is of
    an incorrect type, the action will fail for that entity.
