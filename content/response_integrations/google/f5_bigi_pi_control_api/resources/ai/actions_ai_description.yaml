Add IP To Data Group:
  ai_description: >-
    ### General Description

    Adds IP address entities to a specified internal data group in F5 BIG-IP. This
    action modifies the configuration of the F5 BIG-IP device, which is typically
    used to update access control lists, blocklists, or allowlists.


    ### Flow Description

    1. Filters the target entities to include only IP addresses (`ADDRESS`).

    2. Makes a GET request to the F5 BIG-IP API to retrieve the current records of
    the specified data group.

    3. Verifies that the retrieved data group is of type 'ip'.

    4. Appends the target IP addresses to the data group's records.

    5. Makes a PATCH request to the F5 BIG-IP API to update the data group with the
    new records.

    6. Returns the updated data group details as a JSON result.


    ### Additional Notes

    - This action only supports internal data groups in F5 BIG-IP.

    - The specific effect of adding an IP to a data group (e.g., blocking or allowing
    traffic) depends on the iRules configured on the F5 BIG-IP device that reference
    this data group.
