Add Port To Port List:
  ai_description: >-
    ### General Description

    Adds one or more ports to a specified port list in F5 BIG-IP. This action modifies
    the configuration of the F5 BIG-IP device by appending new ports to an existing
    port list.


    ### Flow Description

    1. Extracts the target port list name and the comma-separated list of ports from
    the action parameters.

    2. Initializes the F5 BIG-IP API manager.

    3. Iterates through the provided ports.

    4. For each port, retrieves the current port list configuration from F5 BIG-IP
    via an API GET request.

    5. Appends the new port to the retrieved list.

    6. Updates the port list in F5 BIG-IP via an API PATCH request.

    7. Returns the updated port list as a JSON result and provides a summary message
    of successful and failed additions.


