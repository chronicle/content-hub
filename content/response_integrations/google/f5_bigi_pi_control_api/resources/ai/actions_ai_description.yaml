  ai_description: >-
    Adds IP address entities to a specified address list in F5 BIG-IP.


    ### General Description

    This action takes IP address entities from the case and appends them to an existing
    address list in F5 BIG-IP. It is typically used to update firewall rules or access
    control lists dynamically.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Address List Name | String | Yes | Specify the name of the address list to which
    you want to add IP addresses. |


    ### Flow

    1. Iterates over the target IP address entities.

    2. Retrieves the current addresses in the specified address list from F5 BIG-IP.

    3. Appends the target IP addresses to the list.

    4. Updates the address list in F5 BIG-IP via a PATCH request.

    5. Returns the updated address list as a JSON result and outputs a summary message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates an address list in F5 BIG-IP by adding new IP addresses to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch contextual data for entities. It mutates external
      data by updating an address list in F5 BIG-IP. It does not mutate internal SOAR
      data, update entities, or create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data (updates an address list in a firewall/load
      balancer), which is a network-based remediation action. It does not meet the
      criteria for enrichment.
    remediation: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES`
      is `[EntityTypes.ADDRESS]`.
