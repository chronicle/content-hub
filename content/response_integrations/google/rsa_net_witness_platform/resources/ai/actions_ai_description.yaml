Enrich File:
  ai_description: >-
    ### General Description

    Enriches File Name and File Hash entities using RSA NetWitness Platform. It retrieves
    file information, reputation status, and risk scores to provide additional context
    for investigation.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Filters target entities to include only File Name and File Hash types.

    3. Retrieves the required service ID (`endpoint-server`) from RSA NetWitness.

    4. Iterates over the filtered entities and queries RSA NetWitness for file information
    using the entity identifier (via `GET /files` API endpoint).

    5. If file data is found, enriches the entity's additional properties with the
    retrieved data.

    6. If the file's global risk score exceeds the configured `Risk Score Threshold`,
    marks the entity as suspicious.

    7. Updates the entities in the platform and attaches the raw JSON results.


    ### Additional Notes

    Only MD5 and SHA256 hashes are supported for File Hash entities.
