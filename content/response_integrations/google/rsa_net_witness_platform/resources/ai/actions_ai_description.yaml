Enrich Endpoint:
  ai_description: >-
    ### General Description

    Fetches endpoint system information by its hostname or IP address from RSA NetWitness
    Platform. This action retrieves contextual metadata and risk scores for the specified
    endpoints, enriches the entities, and optionally marks them as suspicious if their
    risk score exceeds a defined threshold.


    ### Flow Description

    1. Extracts the `Risk Score Threshold` parameter.

    2. Iterates over target entities, filtering for `ADDRESS` and `HOSTNAME` entity
    types.

    3. For each suitable entity, queries RSA NetWitness for endpoint information using
    the entity's identifier.

    4. If the endpoint is found, extracts enrichment data and updates the entity's
    `additional_properties`.

    5. Marks the entity as enriched and, if the endpoint's risk score exceeds the
    `Risk Score Threshold`, marks the entity as suspicious.

    6. Updates the entities in the platform and attaches the raw JSON results.


    ### Additional Notes

    Requires an RSA Netwitness Respond license, the endpoint server service running
    in the background, and configured Web Username and Web Password in the integration
    configuration.
  ai_short_description: >-
    Fetches endpoint system information by its hostname or IP address from RSA NetWitness
    Platform to enrich entities and evaluate risk scores.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
