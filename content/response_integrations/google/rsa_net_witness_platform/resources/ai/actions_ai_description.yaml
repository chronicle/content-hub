Isolate Endpoint:
  ai_description: >-
    ### General Description

    This action requests endpoint isolation in the RSA NetWitness platform. It allows
    security analysts to isolate a compromised host or IP address from the network
    to prevent further malicious activity. The action requires the RSA NetWitness
    Respond license and an active endpoint server service.


    ### Flow Description

    1. The action initializes the RSA NetWitness manager using the provided API credentials
    (Web API Root, Username, Password) and SSL verification settings.

    2. It identifies the required service ID for the endpoint server by calling `rsa_manager.find_required_service_id()`.

    3. It iterates through the provided target entities, filtering for `ADDRESS` and
    `HOSTNAME` types.

    4. For each suitable entity, it performs a search in RSA NetWitness to retrieve
    the corresponding agent ID:
       - If the entity is an `ADDRESS`, it calls `rsa_manager.search_for_ip()`.
       - If the entity is a `HOSTNAME`, it calls `rsa_manager.search_for_host()`.
    5. If the entity is found, the action calls `rsa_manager.isolate_endpoint()` with
    the retrieved agent ID, service ID, and the user-provided comment.

    6. The action logs the success or failure of the isolation request for each entity
    and returns a summary message.


    ### Additional Notes

    - This action performs a state-changing operation on the RSA NetWitness platform.

    - Ensure the RSA NetWitness integration is properly configured with valid credentials
    and that the endpoint server service is running.
  ai_short_description: >-
    Requests endpoint isolation for a specific host or IP address in the RSA NetWitness
    platform.
