Unisolate Endpoint:
  ai_description: >-
    ### General Description

    Requests the unisolation of an endpoint within the RSA NetWitness Platform. This
    action allows security analysts to restore network connectivity to an endpoint
    that was previously isolated due to security concerns. It requires the RSA NetWitness
    Respond license and an active endpoint server service.


    ### Flow Description

    1. The action extracts configuration parameters (API root, credentials, SSL verification)
    and the mandatory `Comment` parameter.

    2. It initializes the `RSAManager` to handle communication with the RSA NetWitness
    API.

    3. It retrieves the required service ID for the endpoint server.

    4. The action iterates through the provided `target_entities`, filtering for `ADDRESS`
    and `HOSTNAME` types.

    5. For each suitable entity, it performs a search in RSA NetWitness to identify
    the corresponding agent ID (`search_for_ip` or `search_for_host`).

    6. If the entity is found, the action calls the `unisolate_endpoint` method, which
    sends a DELETE request to the RSA NetWitness isolation API endpoint to remove
    the isolation status.

    7. The action tracks successful and failed requests and returns a summary message.


    ### Additional Notes

    This action performs a state-changing operation on the RSA NetWitness platform.
    Ensure that the provided credentials have the necessary permissions to manage
    endpoint isolation. If no entities are provided or if the entities are not of
    the supported types, the action will not perform any unisolation requests.
