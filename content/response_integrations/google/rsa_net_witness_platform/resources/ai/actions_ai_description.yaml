Add Note to Incident:
  ai_description: >-
    ### General Description

    Adds a note to a specific incident in RSA Netwitness.


    ### Flow Description

    1. Extracts the Incident ID, Note, and Author from the action parameters.

    2. Initializes the RSA Netwitness manager with the provided credentials.

    3. Makes a POST request to the RSA Netwitness API (`incidents/{incident_id}/journal`)
    to append the note to the incident.

    4. Returns a success message if the note is added successfully, or an error message
    if it fails.


    ### Additional Notes

    Requires RSA Netwitness Respond license.
  ai_short_description: >-
    Adds a note to a specific incident in RSA Netwitness.
