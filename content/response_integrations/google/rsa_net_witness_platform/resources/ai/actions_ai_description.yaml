Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the RSA NetWitness Platform by verifying the configured
    API endpoints (Broker, Concentrator, or Web API). This action ensures that the
    integration is correctly configured and can communicate with the target RSA NetWitness
    services.


    ### Flow Description

    1. Extracts configuration parameters (API roots, credentials, SSL verification)
    from the integration settings.

    2. Initializes the `RSAManager` with the provided credentials and API endpoints.

    3. Executes `test_connectivity()` which performs a `GET` request to the Broker
    API (if configured) using the `PING_QUERY` to verify connectivity.

    4. If the Web API is configured, it validates the connection by obtaining an authentication
    token.

    5. Returns a success or failure status based on the connectivity test result.


    ### Additional Notes

    This action does not require any entities to run. It is used to validate the integration
    configuration.
