  ai_description: >-
    ### General Description

    Queries RSA NetWitness to retrieve the latest events and network packet captures
    (PCAP) related to specific Hostname entities. This action searches for the hostname
    in the source and destination domain fields within the specified timeframe and
    returns the matching telemetry data.


    ### Flow Description

    1. Extracts action parameters, including the maximum hours backwards to search
    and the maximum number of events to return.

    2. Iterates over the target entities, filtering specifically for Hostname entities.

    3. For each suitable entity, queries the RSA NetWitness API to fetch related events
    within the specified timeframe.

    4. Retrieves the associated PCAP file for the identified events.

    5. Attaches the events as a CSV table and the PCAP file as an entity attachment
    to the case.

    6. Returns the events in a JSON result.


    ### Additional Notes

    Requires configuration of the Broker API or Concentrator API in the integration
    settings.
