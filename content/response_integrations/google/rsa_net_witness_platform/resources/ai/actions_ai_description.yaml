Query NetWitness For Events Around Host:
  ai_description: >-
    ### General Description

    Retrieves historical events and associated PCAP files for specific hostname entities
    from the RSA NetWitness Platform. This action allows analysts to investigate network
    activity surrounding a host by querying the Broker or Concentrator APIs for events
    within a defined timeframe.


    ### Flow Description

    1. The action initializes the `RSAManager` using the provided integration configuration
    (Broker/Concentrator API credentials).

    2. It filters the `target_entities` to identify only those of type `HOSTNAME`.

    3. For each identified hostname, the action performs the following steps:
        * Queries the RSA NetWitness API for events related to the hostname, constrained
    by the `Max Hours Backwards` parameter.
        * If events are found, it formats the event data into a table and adds it
    to the action result using `siemplify.result.add_entity_table`.
        * Retrieves the PCAP file for the domain/host using `rsa_manager.get_pcap_for_domain`
    and attaches it to the entity using `siemplify.result.add_entity_attachment`.
    4. Finally, it aggregates all retrieved event data into a JSON result and returns
    the execution status.


    ### Additional Notes

    This action requires proper configuration of either the Broker API or Concentrator
    API within the RSA NetWitness Platform integration settings. The action does not
    modify any data within RSA NetWitness or the Google SecOps platform; it is strictly
    a retrieval and investigation tool.
  ai_short_description: >-
    Retrieves historical events and PCAP files for hostname entities from the RSA
    NetWitness Platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches event data and PCAP files from an external system (RSA NetWitness)
      via API calls. It does not mutate external data, nor does it mutate internal
      SecOps data (it only adds results to the action output). It does not update
      entities, create insights, modify alerts, or create case comments.
