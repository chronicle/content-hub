Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (IP addresses or Hostnames) by querying the RSA NetWitness
    Platform. This action retrieves detailed system information, including network
    interfaces and risk scores, to provide context for security investigations. It
    allows for automated risk assessment by marking entities as suspicious if their
    risk score exceeds a user-defined threshold.


    ### Flow Description

    1. The action initializes the `RSAManager` using the provided integration configuration
    (API Root, Username, Password, and SSL verification settings).

    2. It retrieves the required service ID from the RSA NetWitness Platform to facilitate
    subsequent API requests.

    3. The action iterates through the target entities, filtering for those with the
    type `ADDRESS` or `HOSTNAME`.

    4. For each valid entity, it performs an API call to the RSA NetWitness Platform
    (`search_for_ip` or `search_for_host`) to fetch endpoint details.

    5. If data is retrieved, the action updates the entity's `additional_properties`
    with the enrichment data and sets the `is_enriched` flag to true.

    6. If a `Risk Score Threshold` is provided and the entity's risk score exceeds
    this value, the entity is marked as suspicious (`is_suspicious = True`).

    7. Finally, the action updates the entities within the SOAR platform and attaches
    the raw JSON results to the action output.


    ### Additional Notes

    This action requires a valid RSA NetWitness Respond license and an active endpoint
    server service. If no entities are successfully enriched, the action will report
    a failure status.
  ai_short_description: >-
    Enriches IP Address and Hostname entities with system information and risk scores
    from the RSA NetWitness Platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
