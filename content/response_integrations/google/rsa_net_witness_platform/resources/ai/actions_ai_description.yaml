Isolate Endpoint:
  ai_description: >-
    ### General Description

    Requests endpoint isolation in RSA Netwitness for specified Hostname and IP Address
    entities. This action initiates a state change on the external device to prevent
    network traffic to or from the specified endpoint.


    ### Flow Description

    1. Extracts the required configuration and action parameters, including the isolation
    comment.

    2. Initializes the RSA Netwitness manager and retrieves the required endpoint
    server service ID via the API.

    3. Iterates over the target Hostname and IP Address entities.

    4. Searches for the corresponding agent ID in RSA Netwitness using the entity's
    identifier via a GET request.

    5. If found, makes a POST request to the RSA Netwitness API to isolate the endpoint.

    6. Returns a summary of successfully isolated and failed entities.


    ### Additional Notes

    Requires RSA Netwitness Respond license and endpoint server service running in
    the background.
