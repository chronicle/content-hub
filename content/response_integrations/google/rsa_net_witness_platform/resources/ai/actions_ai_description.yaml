Add Note to Incident:
  ai_description: >-
    ### General Description

    Adds a note to an incident in the RSA NetWitness platform. This action allows
    analysts to append contextual information or updates directly to an existing incident
    record within RSA NetWitness.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials, SSL verification)
    from the integration settings.

    2. Extracts action parameters (Incident ID, Note, Author) provided by the user.

    3. Initializes the `RSAManager` with the provided credentials.

    4. Executes a POST request to the RSA NetWitness API endpoint `incidents/{incident_id}/journal`
    to append the note to the specified incident.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    Requires RSA NetWitness Respond license.
  ai_short_description: >-
    Adds a note to an incident in RSA NetWitness.
