name: Query NetWitness For Events Around IP
description: Run a query on RSA NetWitness to retreive all events for a specific query
    (conditions) for a given IP address in the alert
integration_identifier: RSANetWitnessPlatform
parameters:
-   name: Max Hours Backwards
    default_value: 1
    type: string
    description: Specify how many hours backwards to fetch events. Default is 1 hour.
    is_mandatory: false
-   name: Max Events To Return
    default_value: 50
    type: string
    description: Specify how many events to return. If nothing is specified, action
        will return 50 events.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/query_net_witness_for_events_around_ip_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
