name: Enrich Endpoint
description: Fetch endpoint's system information by its hostname or IP address. Requires
    RSA Netwitness Respond license, endpoint server service running in the background,
    configured Web Username and Web Password in the integration configuration.
integration_identifier: RSANetWitnessPlatform
parameters:
-   name: Risk Score Threshold
    default_value: 50
    type: string
    description: Specify risk threshold for the endpoint. If the endpoint exceeds
        the threshold, the related entity will be marked as suspicious. If nothing
        is specified, action won’t check the risk score.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_endpoint_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
