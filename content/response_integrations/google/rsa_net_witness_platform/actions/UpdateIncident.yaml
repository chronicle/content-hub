name: Update Incident
description: Update Incident in RSA Netwitness. Requires RSA Netwitness Respond license,
    configured Web Username and Web Password in the integration configuration.
integration_identifier: RSANetWitnessPlatform
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: Specify ID of the incident that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: ''
    type: ddl
    optional_values:
    - New
    - Assigned
    - In Progress
    - Task Requested
    - Task Complete
    - Closed
    - Closed - False Positive
    description: Specify new status for the incident.
    is_mandatory: false
-   name: Assignee
    default_value: ''
    type: string
    description: Specify new assignee for the incident.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_incident_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":["ADDRESS"]}'
