name: Run General Query
description: Run free query and receive event and a PCAP file.
integration_identifier: RSANetWitnessPlatform
parameters:
-   name: Query
    type: string
    description: Custom query string.
    is_mandatory: true
-   name: Max Hours Backwards
    default_value: 1
    type: string
    description: Specify how many hours backwards to fetch events. Default is 1 hour.
    is_mandatory: false
-   name: Max Events To Return
    default_value: 50
    type: string
    description: Specify how many events to return. If nothing is specified, action
        will return 50 events.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_general_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
script_result_name: events_json
