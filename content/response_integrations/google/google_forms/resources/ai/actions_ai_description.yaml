Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity and authentication between
    Google SecOps and the Google Forms API. It ensures that the provided credentials
    (Service Account JSON and Delegated Email) are valid and that the network path
    to Google's services is open.


    ### Flow Description

    1. **Initialization**: The action initializes the Google Forms API client using
    the integration's global configuration, including the Service Account JSON, Delegated
    Email, and SSL verification settings.

    2. **Authentication**: It performs an OAuth2 token refresh to validate the service
    account credentials and domain-wide delegation.

    3. **Connectivity Test**: It executes a GET request to the Google Admin Directory
    API (`/admin/directory/v1/users`) with a limit of one result to minimize data
    transfer.

    4. **Validation**: The action validates the HTTP response status. If successful,
    it confirms connectivity; otherwise, it raises an exception with the specific
    error returned by the API.


    ### Additional Notes

    This action uses the Google Admin Directory API ('list-users' endpoint) as a health
    check mechanism to confirm that the service account has the necessary permissions
    and delegation to interact with the Google Workspace environment.
