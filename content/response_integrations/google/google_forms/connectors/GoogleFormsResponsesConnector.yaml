name: Google Forms  - Responses Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: The name of the field where the product name is stored.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the field where the environment name is stored. If the
        environment field isn't found, the environment is set to the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regular expression pattern to run on the value found in the Environment
        Field Name field. This parameter lets you manipulate the environment field
        using the regular expression logic. Use the default value .* to retrieve the
        required raw Environment Field Name value. If the regular expression pattern
        is null or empty, or the environment value is null, the final environment
        result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: The timeout limit in seconds for the Python process running the current
        script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Delegated Email
    default_value: ''
    type: string
    description: An email address to use for the impersonation and access control.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Service Account JSON
    default_value: ''
    type: password
    description: The content of the service account key JSON file.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Form IDs To Track
    default_value: ''
    type: string
    description: A comma-separated list of Google Forms IDs to track for responses.
        To retrieve a form's unique ID, open the form in the Forms editor (not the
        public response link) and copy the string located between /d/ and /edit in
        the full address shown in your browser's bar.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Severity
    default_value: Low
    type: string
    description: 'Severity of the alert created out of responses. Supported values:
        Informational, Low, Medium, High, Critical.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: A number of hours before the first connector iteration to retrieve
        responses from. This parameter applies either to the initial connector iteration
        after you enable the connector for the first time or the fallback value for
        an expired connector timestamp.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Responses To Fetch
    default_value: 100
    type: integer
    description: The maximum number of responses to process for every connector iteration.
        The maximum value is 100.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If selected, the connector ignores the Google SecOps overflow mechanism
        during alert creation.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        connecting to Google Forms is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Pull responses from Google Forms.
integration: GoogleForms
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-forms
rules: []
is_connector_rules_supported: true
creator: admin
