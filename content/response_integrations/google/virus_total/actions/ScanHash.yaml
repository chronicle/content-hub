name: Scan Hash
description: Scan Hash via VirusTotal. *Mark entity as suspicious and show insights
    if risk score matches a given threshold.
integration_identifier: VirusTotal
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: Mark entity as suspicious if number of negative engines is equal
        or above the given threshold
    is_mandatory: true
-   name: Rescan after days
    default_value: ''
    type: string
    description: Action will fetch the latest result. If the result is older than
        mentioned days it will automatically rescan the entity
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/scan_hash_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: System
is_async: true
simulation_data_json: '{"Entities": ["FILEHASH"]}'
script_result_name: is_risky
