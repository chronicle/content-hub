  ai_description: >-
    Uploads and scans files using VirusTotal. The action can upload files from a local
    path or retrieve them from a remote Linux server via SSH/SFTP before uploading.
    It asynchronously queries VirusTotal for the scan report and creates a case insight
    if the file is found to be malicious based on a specified threshold.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | String | Yes | The minimum number of positive engine detections
    required to mark the file as risky and generate an insight. |

    | File Paths | String | Yes | A comma-separated list of target file paths to upload
    and scan. |

    | Linux Server Address | String | No | The IP address or hostname of the remote
    Linux server where the files are located. |

    | Linux User | String | No | The username for authenticating to the remote Linux
    server. |

    | Linux Password | Password | No | The password for authenticating to the remote
    Linux server. |


    ### Additional Notes

    If `Linux Server Address`, `Linux User`, and `Linux Password` are provided, the
    action will attempt to fetch the files from the remote server before uploading
    them to VirusTotal. Otherwise, it will look for the files locally.


    ### Flow

    1. Extracts the action parameters.

    2. Iterates over the provided file paths.

    3. If Linux server credentials are provided, fetches the file content from the
    remote server.

    4. Uploads the file to VirusTotal for scanning.

    5. Asynchronously waits for the scan to complete.

    6. Retrieves the scan report, comments, and web link from VirusTotal.

    7. Adds the report data to the action results as data tables.

    8. Creates a case insight if the number of positive detections exceeds the configured
    threshold.
