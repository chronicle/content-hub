Get Domain Report:
  ai_description: >-
    ### General Description

    Retrieves a domain report from VirusTotal for HOSTNAME, USER, and URL entities.
    This action fetches threat intelligence, categorization data, and related domain
    information to enrich the entities within the platform.


    ### Flow Description

    1. Initializes the VirusTotal manager using the provided API key.

    2. Filters the target entities to include only HOSTNAME, USER, and URL types.

    3. Iterates over the supported entities and extracts the domain from each entity.

    4. Makes a GET request to the VirusTotal API (`/vtapi/v2/domain/report`) to fetch
    the domain report.

    5. If a report is found, enriches the entity's additional properties with the
    retrieved data (e.g., categories, BitDefender info, Alexa info).

    6. Attaches a CSV table containing the scan report to the entity.

    7. Attaches a web link to the full VirusTotal report to the entity.

    8. Updates the enriched entities in the platform and returns the JSON results.


    ### Additional Notes

    - The action handles API rate limits and invalid API keys gracefully, skipping
    entities or failing the action as appropriate.

    - Entities that are not found in VirusTotal are skipped and reported in the output
    message.
  ai_short_description: >-
    Retrieves a domain report from VirusTotal for HOSTNAME, USER, and URL entities,
    enriching them with threat intelligence and categorization data.
