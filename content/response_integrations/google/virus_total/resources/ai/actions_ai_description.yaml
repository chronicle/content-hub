    4. Asynchronously queries the status of the scan tasks until completed.

    5. Retrieves the scan reports and comments for the URLs.

    6. Evaluates the number of positive detections against the provided `Threshold`.

    7. Marks the entity as suspicious and creates an insight if the threshold is met
    or exceeded.

    8. Enriches the entity with the scan results and adds data tables containing engine
    details and comments.


