Scan Hash:
  ai_description: >-
    ### General Description

    This action scans file hash entities using the VirusTotal API to retrieve threat
    intelligence and reputation data. It evaluates the file's risk based on a configurable
    threshold of malicious detections from security engines. If the threshold is met,
    the entity is marked as suspicious, and an insight is generated.


    ### Flow Description

    1. **Initialization**: The action initializes the VirusTotal manager using the
    provided API key and configuration.

    2. **Filtering**: It filters the target entities to process only those of type
    `FILEHASH`.

    3. **Operation Start**: For each file hash, it checks the existing report status.
    If a rescan is required (based on the `Rescan after days` parameter) or if the
    file is missing, it triggers a rescan request via the VirusTotal API.

    4. **Status Querying**: If the action is running asynchronously, it polls the
    status of the submitted tasks.

    5. **Data Collection**: Once the analysis is complete, it fetches the full report
    from VirusTotal.

    6. **Enrichment**: It updates the entity with additional properties (e.g., MD5,
    SHA1, file type, detection engines), adds a data table of engine results, and
    attaches a link to the VirusTotal report.

    7. **Risk Assessment**: If the number of positive detections meets or exceeds
    the `Threshold` parameter, the entity is marked as suspicious, and an insight
    is added to the case.

    8. **Finalization**: The action updates the entities within the SOAR platform
    with the gathered intelligence.


    ### Additional Notes

    This action supports asynchronous execution, allowing it to wait for VirusTotal
    analysis to complete if the file was not previously scanned or if a rescan was
    triggered. It requires a valid VirusTotal API key with appropriate permissions
    for the requested operations.
  ai_short_description: >-
    Enriches file hash entities using VirusTotal threat intelligence, evaluates risk
