    ### General Description

    Scans IP addresses using VirusTotal to retrieve threat intelligence, including
    reputation, related domains, and malicious sample counts. This action helps analysts
    assess the risk associated with external IP addresses identified in security alerts.


    ### Flow Description

    1. Extracts configuration parameters (API Key, SSL verification) and action parameters
    (Threshold) from the integration settings.

    2. Filters the target entities to process only non-internal IP addresses.

    3. Queries the VirusTotal API for each IP address to retrieve a comprehensive
    report.

    4. Updates the entity with enrichment data (e.g., country, related domains) and
    marks it as enriched.

    5. Evaluates the IP's risk score against the provided threshold; if the number
    of malicious samples exceeds the threshold, the entity is marked as suspicious.

    6. Adds an entity link to the VirusTotal report, a table of resolutions, and an
    insight message to the case.

    7. Updates the entities in the SOAR platform and returns the full JSON report.


    ### Additional Notes

    The action requires a valid VirusTotal API key. It supports filtering by a malicious
    sample threshold to automatically flag suspicious entities, facilitating faster
    triage.
