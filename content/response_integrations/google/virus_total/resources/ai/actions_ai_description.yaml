      internal data by updating entities with enrichment data, adding insights, data
      tables, and entity links (can_mutate_internal_data=true, can_update_entities=true,
      can_create_insight=true). It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (VirusTotal) to enrich entities.
      It does not mutate external systems. It only performs allowed internal mutations
      (updating entities, creating insights). Therefore, it is an Enrichment action.
      It does not perform any remediation tasks.
    remediation: false
