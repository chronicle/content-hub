Upload And Scan Files:
  ai_description: >-
    ### General Description

    Uploads files to VirusTotal for scanning and retrieves the analysis report. This
    action supports both local files and files located on remote Linux servers, providing
    a comprehensive way to analyze potentially malicious files.


    ### Flow Description

    1. The action receives a list of file paths and optional Linux server credentials.

    2. If a Linux server is specified, it connects via SSH/SFTP to retrieve the file
    content.

    3. It uploads the file(s) to VirusTotal using the `upload_file` API call.

    4. The action enters an asynchronous state (`EXECUTION_STATE_INPROGRESS`) to wait
    for the scan to complete.

    5. In subsequent runs, it polls the VirusTotal API using `get_report_by_scan_id`
    to check the scan status.

    6. Once complete, it retrieves the report, adds a CSV data table of engine detections,
    adds comments, and provides a link to the VirusTotal report.

    7. If the number of malicious detections exceeds the configured `Threshold`, it
    creates a case insight.


    ### Additional Notes

    This action is asynchronous and requires multiple runs to complete the scan and
    report retrieval. It does not operate on specific SOAR entities but rather on
    file paths provided as input parameters.
