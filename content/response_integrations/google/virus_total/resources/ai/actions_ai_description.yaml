  ai_description: >-
    Retrieves a comprehensive domain report from VirusTotal for HOSTNAME, URL, and
    USER entities.


    ### Flow Description

    1. Initializes the VirusTotal API client using the provided integration configuration.

    2. Filters the case entities to process only HOSTNAME, URL, and USER types.

    3. Iterates over the supported entities and queries the VirusTotal API for a domain
    report.

    4. Parses the response to extract threat intelligence, categories, and resolution
    data.

    5. Enriches the entities by updating their additional properties with the retrieved
    data.

    6. Attaches an entity table with the scan report and a direct web link to the
    VirusTotal results.

    7. Updates the entities in the platform and returns the raw JSON results.


    ### Parameters Description

    This action does not require any specific input parameters. It relies on the integration's
    configuration (API Key and Verify SSL) and the entities present in the case.
