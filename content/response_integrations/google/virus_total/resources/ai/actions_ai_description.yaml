    reasoning: >-
      The action fetches data from an external source (VirusTotal) to enrich entities.
      It does not mutate external state and only updates internal entity attributes,
      which aligns perfectly with the Enrichment category. It does not perform any
      remediation tasks.
    remediation: false
  entity_usage:
