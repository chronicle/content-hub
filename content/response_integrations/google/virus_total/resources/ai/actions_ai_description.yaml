  ai_description: >-
    ### General Description

    Enriches `FILEHASH` entities using VirusTotal. This action retrieves threat intelligence
    including reputation scores, scan reports, and comments. It evaluates risk based
    on a threshold of positive engine detections, updates the entity's suspicious
    status, and generates an insight with the analysis results. If the existing report
    is older than a specified number of days, it can automatically trigger a rescan.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | True | Mark entity as suspicious if the number of engines
    detecting the hash as malicious is equal to or above the given threshold. Default
    is 3. |

    | Rescan after days | Integer | False | Action will fetch the latest result. If
    the result is older than the mentioned days, it will automatically rescan the
    entity in VirusTotal. |


    ### Flow Description

    1. Filters target entities to include only `FILEHASH` entities.

    2. For each hash, checks VirusTotal for an existing report or triggers a rescan
    if the report is outdated based on the `Rescan after days` parameter.

    3. If a rescan is triggered, the action waits asynchronously for the scan to complete.

    4. Retrieves the scan report and comments for each hash.

    5. Evaluates the number of positive detections against the `Threshold`. If it
    meets or exceeds the threshold, marks the entity as suspicious and creates an
    insight.

    6. Enriches the entity with the report data and adds data tables with engine results
    and comments.
