Upload And Scan Files:
  ai_description: >-
    ### General Description

    Uploads and scans files using VirusTotal. The action supports uploading files
    from local paths or remote Linux servers via SSH/SFTP. It submits the files for
    analysis and retrieves the scan reports, including detection engines, comments,
    and risk scores.


    ### Flow Description

    1. Extracts the provided file paths and optional Linux server credentials.

    2. If a Linux server is specified, connects via SSH/SFTP to retrieve the file
    content.

    3. Uploads the file to VirusTotal via a POST request to the `/file/scan` endpoint.

    4. Periodically queries VirusTotal to check the scan status (asynchronous execution).

    5. Once the scan is complete, retrieves the full analysis report.

    6. Evaluates the number of positive detections against the provided threshold.

    7. If the threshold is exceeded, creates a case insight indicating the file is
    suspicious.

    8. Attaches the scan results, comments, and VirusTotal web links to the action
    results.


    ### Additional Notes

    This is an asynchronous action that will continue to run until all submitted files
    have been fully analyzed by VirusTotal or an API limit is reached.
