    1. Filters the target entities to include only external ADDRESS entities.

    2. Iterates over the filtered entities and fetches the IP address report from
    VirusTotal.

    3. Enriches the entity with the retrieved data and marks it as enriched.

    4. Evaluates the number of positive detections against the configured `Threshold`
    and marks the entity as suspicious if the threshold is exceeded.

    5. Creates an entity insight with the analysis results and adds a table of reverse
    domains (resolutions).

    6. Updates the entities in the SecOps platform and attaches the full JSON result.
