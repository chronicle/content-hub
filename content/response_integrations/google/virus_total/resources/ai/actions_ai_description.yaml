    updates the entity's suspicious status, and generates an insight with the analysis
    results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | False | Specify the accepted threshold for the detected
    samples related to the IP address. If the number of engines that marked related
    samples as malicious is higher than the specified threshold, the IP address will
    be marked as suspicious. Default is 25. |


