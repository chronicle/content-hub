Get Domain Report:
  ai_description: >-
    ### General Description

    Enriches domain-related entities (Hostname, URL, and User) using VirusTotal. This
    action retrieves threat intelligence reports for domains associated with the provided
    entities, including reputation scores, categories, and related samples. It updates
    the entities with this contextual data and provides links to the full VirusTotal
    report.


    ### Flow Description

    1. **Initialization**: The action initializes the VirusTotal manager using the
    provided API key and SSL verification setting.

    2. **Entity Filtering**: It filters the target entities to include only those
    of type `HOSTNAME`, `USER`, or `URL`.

    3. **Data Retrieval**: For each supported entity, it extracts the domain and queries
    the VirusTotal API (`vt.get_domain_report`) to fetch the domain report.

    4. **Enrichment**: If a report is found, it updates the entity's `additional_properties`
    with the retrieved data (prefixed with `VT_`) and marks the entity as enriched
    (`is_enriched = True`).

    5. **Result Reporting**: It adds an entity table containing the enrichment data
    and a link to the VirusTotal web report to the action results.

    6. **Entity Update**: Finally, it updates the enriched entities within the platform
    and adds the full JSON results to the action output.


    ### Additional Notes

    - This action requires a valid VirusTotal API key.

    - If an entity is not found in VirusTotal, it is logged as missing.

    - If API limits are reached, the action logs the limitation and skips the affected
    entities.
  ai_short_description: >-
    Enriches Hostname, URL, and User entities with domain reputation data from VirusTotal.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
