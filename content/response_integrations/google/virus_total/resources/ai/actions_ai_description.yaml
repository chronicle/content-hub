Scan Hash:
  ai_description: >-
    ### General Description

    Scans File Hash entities using VirusTotal to retrieve threat intelligence and
    reputation scores. It evaluates the risk based on a specified threshold of negative
    engine detections, updates the entity's suspicious status, and generates insights
    with the analysis results.


    ### Flow Description

    1. Filters the target entities to include only File Hash entities.

    2. For each hash, checks VirusTotal for an existing report or initiates a rescan
    via the VirusTotal API if the report is older than the specified `Rescan after
    days` parameter.

    3. Asynchronously waits for any queued scans to complete.

    4. Retrieves the final scan report and any associated comments from VirusTotal.

    5. Enriches the entity with the report data, adds data tables for engine results
    and comments, and attaches a web link to the report.

    6. If the number of positive detections meets or exceeds the `Threshold`, marks
    the entity as suspicious and creates an insight.


    ### Additional Notes

    - The action runs asynchronously to accommodate VirusTotal scan times.

    - If the provided API key is for the public API, rescanning might be forbidden
    and the action will handle it gracefully.
  ai_short_description: >-
    Scans File Hash entities using VirusTotal to retrieve threat intelligence, evaluate
    risk based on a threshold, and enrich the entities with reputation data and insights.
