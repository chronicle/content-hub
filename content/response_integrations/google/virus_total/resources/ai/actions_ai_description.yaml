  ai_description: >-
    Scans URL entities using VirusTotal. The action retrieves the latest scan report
    for the URL. If the report is older than a specified number of days, or if the
    URL has never been scanned, it submits the URL to VirusTotal for a new scan. It
    enriches the entities with the scan results, including the number of positive
    detections.


    ### Parameters

    * **Threshold** (Integer, Optional, Default: 3): Marks the entity as suspicious
    and creates an insight if the number of positive engines detecting the URL is
    equal to or greater than this value.

    * **Rescan after days** (Integer, Optional): If the existing VirusTotal report
    is older than the specified number of days, the action will automatically rescan
    the URL.


    ### Flow

    1. Filters the target entities to include only URL entities.

    2. Checks VirusTotal for existing reports for each URL.

    3. If a report is missing or older than the 'Rescan after days' parameter, submits
    the URL for a new scan (asynchronous).

    4. Retrieves the scan reports once completed.

    5. Enriches the URL entities with the report data, adds a data table with comments,
    and attaches a web link to the report.

    6. If the number of positive detections meets or exceeds the 'Threshold', marks
    the entity as suspicious and generates an insight.
