Delete Quarantined Email:
  ai_description: >-
    ### General Description

    Deletes a quarantined email from the FireEye EX system using the provided Queue
    ID. This action interacts with the FireEye EX API to remove the specified email
    from the quarantine queue, effectively purging it from the system.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Username,
    Password, and Verify SSL) and the mandatory `Queue ID` parameter.

    2. It initializes the `FireEyeEXManager` with the provided credentials to establish
    a connection to the FireEye EX API.

    3. The action calls the `delete_quarantined_email` method, which performs a POST
    request to the `/emailmgmt/quarantine/delete` endpoint with the specified `queue_id`
    in the request body.

    4. The action logs the outcome of the deletion operation and returns a success
    or failure message based on the API response.


    ### Additional Notes

    This action performs a destructive operation on the external FireEye EX system.
    Ensure that the provided Queue ID is correct before executing this action, as
    the deletion is permanent.
  ai_short_description: >-
    Deletes a quarantined email from the FireEye EX system using the specified Queue
    ID.
