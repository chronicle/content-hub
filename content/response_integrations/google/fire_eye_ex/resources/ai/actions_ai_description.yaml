Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads alert artifacts (as a ZIP file) from the FireEye EX platform for a specified
    alert UUID. This action retrieves the artifact package associated with the alert,
    attaches it to the SOAR action result, and optionally saves it to a specified
    local file system path.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Alert UUID, Download Path).

    2. Initializes the `FireEyeEXManager` to establish a session with the FireEye
    EX API.

    3. Calls the `download_alert_artifacts` method using the provided `Alert UUID`
    to retrieve the artifact ZIP content via a GET request.

    4. Attaches the ZIP file to the SOAR action result using `siemplify.result.add_attachment`.

    5. Saves the ZIP file to the local disk at the specified `Download Path` using
    `ex_manager.save_artifacts_to_file`.

    6. Returns a JSON result indicating the file path or an error message if the operation
    fails.


    ### Additional Notes

    This action requires valid FireEye EX credentials and network connectivity to
    the API. The `Download Path` must be a valid, writable directory on the system
    where the action is executed. If the file already exists at the specified path,
    the action will fail to save the file to disk.
