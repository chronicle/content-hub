List Quarantined Emails:
  ai_description: >-
    ### General Description

    Lists quarantined emails from FireEye EX based on specified filters such as time
    range, sender, and subject.


    ### Flow Description

    1. Initializes the FireEye EX manager with the provided API credentials.

    2. Extracts action parameters including Start Time, End Time, Sender Filter, Subject
    Filter, and Max Email to Return.

    3. Makes a GET request to the FireEye EX API (`/emailmgmt/quarantine`) to retrieve
    quarantined emails matching the criteria.

    4. Parses the response and constructs a JSON result and a CSV table containing
    the details of the found emails.

    5. Returns the results to the SecOps platform.


    ### Additional Notes

    If Start Time and End Time are not specified, the action defaults to returning
    quarantined emails from the last 24 hours. The maximum number of emails returned
    is limited by the FireEye EX API (default limit is 10000).
