Delete Quarantined Email:
  ai_description: >-
    ### General Description

    Deletes a specific quarantined email from FireEye EX.


    ### Flow Description

    1. Initializes the FireEye EX manager using the provided integration credentials.

    2. Executes a POST request to the FireEye EX API (`/emailmgmt/quarantine/delete`)
    to delete the email associated with the provided Queue ID.

    3. Logs out of the FireEye EX session.

    4. Returns a success message if the deletion is successful, or an error message
    if it fails.


    ### Additional Notes

    The action requires a valid Queue ID to identify the email to be deleted.
