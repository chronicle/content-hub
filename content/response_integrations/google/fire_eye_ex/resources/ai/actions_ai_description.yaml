Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads alert artifacts from FireEye EX based on a provided Alert UUID. The
    action retrieves the artifacts as a ZIP file and attaches them to the action results.
    Optionally, it can save the downloaded file to a specified local disk path.


    ### Flow Description

    1. Initializes the FireEye EX manager with the provided API credentials.

    2. Makes a GET request to the FireEye EX API to download the artifacts associated
    with the specified Alert UUID.

    3. Attaches the downloaded ZIP file to the action's results in Google SecOps.

    4. If a download path is specified, saves the ZIP file to the local disk at the
    given path.

    5. Returns a JSON result containing the file path if the file was saved successfully.


    ### Additional Notes

    If the file size is too large, the action will fail to attach it and will return
    an error message.
