  ai_description: >-
    Retrieves a list of quarantined emails from FireEye EX based on specified filters
    such as time range, sender, and subject.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Start Time | String | No | If specified, only emails created after this time
    will be returned. Format: YYYY-MM-DD'T'HH:MM:SS.SSS-HHMM. |

    | End Time | String | No | If specified, only emails created before this time
    will be returned. Format: YYYY-MM-DD'T'HH:MM:SS.SSS-HHMM. |

    | Sender Filter | String | No | If specified, returns quarantined emails only
    from this sender. |

    | Subject Filter | String | No | If specified, returns quarantined emails only
    with this subject. |

    | Max Email to Return | Integer | No | Specifies the maximum number of emails
    to return. The limit is 10000 due to FireEye EX limitations. |


    ### Additional Notes

    If neither Start Time nor End Time is specified, the action defaults to returning
    quarantined emails from the last 24 hours.


    ### Flow Description

    1. Initializes the connection to the FireEye EX API using the provided integration
    configuration.

    2. Constructs the query parameters based on the provided filters (Start Time,
    End Time, Sender, Subject, Limit).

    3. Executes a GET request to the FireEye EX quarantine endpoint to fetch matching
    emails.

    4. Parses the response and outputs the found emails as a JSON result and a CSV-formatted
    data table.
