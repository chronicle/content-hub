    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to retrieve data from the FireEye EX appliance.
      It does not modify any external system state (no POST/PUT/DELETE on external
      resources). It does not modify internal Google SecOps data (no entity updates,
      insights, or case comments). It simply outputs the retrieved data as a table
      and JSON result.
  categories:
