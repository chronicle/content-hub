    reasoning: >-
      The action fetches data (quarantined emails), but it does not enrich an entity
      or alert. It is a standalone search/investigation action that does not update
      entity attributes, create insights, or add case comments. Therefore, it does
      not meet the criteria for an Enrichment Action.
