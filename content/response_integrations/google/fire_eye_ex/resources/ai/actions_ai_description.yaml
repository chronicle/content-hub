Download Quarantined Email:
  ai_description: >-
    ### General Description

    Downloads a quarantined email from FireEye EX based on a specified Queue ID. The
    action retrieves the email content and attaches it to the case. It can also save
    the downloaded email to a specified local path on the host executing the action.


    ### Flow Description

    1. Extracts the `Queue ID` and `Download Path` parameters.

    2. Makes a GET request to the FireEye EX API (`/emailmgmt/quarantine/{queue_id}`)
    to download the quarantined email associated with the Queue ID.

    3. Attaches the downloaded email content as an `.eml` file to the Google SecOps
    case.

    4. If a `Download Path` is provided, saves the email file to the specified local
    directory.

    5. Returns the file path in the JSON results if saved locally.


    ### Additional Notes

    Ensure the provided Queue ID is valid and exists in the FireEye EX quarantine.
    Although the `Download Path` parameter is marked as mandatory in the configuration,
    providing an empty string will skip saving the file to the disk.
