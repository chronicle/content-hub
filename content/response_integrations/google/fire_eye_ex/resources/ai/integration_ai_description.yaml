  network_security: false
  reasoning: >-
    The FireEye EX integration is specifically designed for managing email security.
    Its actions (Delete, Download, List, and Release Quarantined Emails) and its connector
    (Alerts Connector) are focused on identifying, ingesting, and managing suspicious
    emails and email-based threats. It does not provide capabilities for general SIEM
    log analysis, EDR host-level process inspection, network gateway blocking, threat
    intelligence enrichment, IAM user management, cloud resource monitoring, ITSM
    ticketing, vulnerability management, asset inventory, or collaboration/notification
    workflows. Therefore, it falls exclusively under the Email Security category.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
