product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: true
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The FireEye EX integration is specifically designed to interface with the FireEye
    Email Security platform. Its primary capabilities include ingesting malicious
    email alerts into the SOAR platform via the 'FireEye EX - Alerts Connector' and
    performing management operations on quarantined emails, such as listing, downloading,
    deleting, and releasing them. These functions directly align with the 'Email Security'
    category, which is defined for alerts involving phishing reports, suspicious attachments,
    or links delivered via email, with the expected outcome of managing emails in
    inboxes. The integration does not perform general SIEM log aggregation, EDR host
    containment, threat intelligence enrichment, or other functions listed in the
    other categories.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
