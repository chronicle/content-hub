FireEye EX - Alerts Connector:
  ai_description: >-
    ### General Description

    The FireEye EX - Alerts Connector is designed to ingest security alerts from the
    FireEye EX (Email Security) platform into Google SecOps. It periodically polls
    the FireEye EX API for new alerts, processes them, and creates corresponding cases
    within the SOAR platform. This integration helps security teams centralize email-based
    threat detection and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit (in seconds) for the Python
    process. |

    | API Root | String | Yes | API root URL of the FireEye EX server. |

    | Username | String | Yes | Username for FireEye EX authentication. |

    | Password | String | Yes | Password for FireEye EX authentication. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the FireEye
    EX server. |

    | Fetch Max Hours Backwards | Integer | Yes | Hours to look back for alerts during
    the initial run or fallback. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Username for proxy authentication. |

    | Proxy Password | String | No | Password for proxy authentication. |


    ### Flow Description

    1. The connector initializes and connects to the FireEye EX API using the provided
    credentials.

    2. It retrieves the last successful execution time to determine the starting point
    for fetching alerts.

    3. It fetches alerts from the FireEye EX API, filtering by the specified time
    range.

    4. It filters out previously processed alerts using a local `ids.json` file to
    prevent duplication.

    5. It drops alerts that occurred within the last 5 minutes to ensure data completeness.

    6. It groups the remaining alerts by email subject, recipient, and sender.

    7. It maps the grouped alerts into the SOAR `AlertInfo` format, including environment
    mapping.

    8. It checks for overflow alerts and creates cases in Google SecOps for valid
    alerts.

    9. Finally, it updates the last success timestamp and saves the processed alert
    IDs.
