FireEye EX - Alerts Connector:
  ai_description: >-
    ### General Description

    The FireEye EX - Alerts Connector is designed to integrate with the FireEye EX
    (Email Security) platform to ingest malicious email alerts into Google SecOps.
    It periodically polls the FireEye EX API for new alerts, groups them based on
    email metadata (subject, sender, recipient), and creates corresponding cases within
    the SOAR platform for further investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | DeviceProductField | String | Yes | Source field name to retrieve the Product
    Field name. |

    | EventClassId | String | Yes | Source field name to retrieve the Event Field
    name. |

    | Environment Field Name | String | No | Field name where the environment name
    is stored. |

    | Environment Regex Pattern | String | No | Regex pattern to manipulate the environment
    field value. |

    | PythonProcessTimeout | Integer | Yes | Timeout limit for the Python process.
    |

    | API Root | String | Yes | API root URL of the FireEye EX server. |

    | Username | String | Yes | Username for the FireEye EX account. |

    | Password | String | Yes | Password for the FireEye EX account. |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate for the connection.
    |

    | Fetch Max Hours Backwards | Integer | Yes | Hours to look back for initial alert
    retrieval. |

    | Proxy Server Address | String | No | Address of the proxy server. |

    | Proxy Username | String | No | Proxy username for authentication. |

    | Proxy Password | String | No | Proxy password for authentication. |


    ### Flow Description

    1. Authenticates with the FireEye EX API using the provided credentials.

    2. Retrieves alerts from the FireEye EX server based on the configured time range.

    3. Filters out previously processed alerts using a local tracking file (`ids.json`).

    4. Excludes alerts that occurred within the last 5 minutes to ensure data stability.

    5. Groups individual alerts into logical groups based on email subject, sender,
    and recipient.

    6. Maps the grouped alerts into the SOAR `AlertInfo` format, including environment
    mapping.

    7. Checks for alert overflow to prevent system saturation.

    8. Ingests the processed alert groups into the SOAR platform as cases.
