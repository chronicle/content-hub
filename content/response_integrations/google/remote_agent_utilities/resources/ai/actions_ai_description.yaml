    external_data_mutation_explanation: >-
      Writes a decoded file to the local disk of the agent host.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data from an external API. It mutates external data
      by writing a file to the local file system of the agent host. It does not mutate
      internal data, update entities, create insights, modify alert data, or create
      case comments.
