Deserialize A File:
  ai_description: >-
    General Description: This action deserializes a base64-encoded string into a file
    and saves it to a specified directory on the local agent filesystem.


    Flow Description:

    1. Extracts the `File Name` and `File base64` parameters from the action configuration.

    2. Verifies the existence of the target directory `/opt/SiemplifyAgent/Files/`
    and creates it if it does not exist.

    3. Decodes the provided base64 string.

    4. Writes the decoded content to a new file at the specified path.

    5. Returns the path of the newly created file as the action result.


    Additional Notes: This action performs local file system operations on the agent
    host. Ensure the agent has appropriate write permissions to the `/opt/SiemplifyAgent/Files/`
    directory.
  ai_short_description: >-
    Deserializes a base64-encoded string into a file and saves it to the local agent
    filesystem.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Writes a file to the local filesystem of the agent host.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action writes a file to the local filesystem of the agent host, which constitutes
      a mutation of an external system (the agent's disk). It does not fetch data,
      update entities, or modify internal SOAR data.
