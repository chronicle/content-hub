Serialize A File:
  ai_description: >-
    ### General Description

    Serializes a specified file from the local file system into a base64 encoded string.
    This action is designed to read a file's contents and convert it into a format
    suitable for JSON transmission or further processing within a playbook.


    ### Flow Description

    1. Retrieves the `File Path` from the action parameters.

    2. Validates that the file exists and is accessible on the local file system.

    3. Checks that the file size does not exceed the maximum allowed limit (5MB).

    4. Reads the file content in binary mode and encodes it into a base64 string.

    5. Returns the base64 string and the file name as a JSON result.


    ### Additional Notes

    This action is typically executed on a Remote Agent to access files local to that
    agent's environment. The maximum supported file size for serialization is 5MB.
    If the file exceeds this limit or is inaccessible, the action will fail.
  ai_short_description: >-
    Serializes a specified file from the local file system into a base64 encoded string
    and returns it as a JSON result.
