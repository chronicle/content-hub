Serialize A File:
  ai_description: >-
    General Description: Serializes a local file to a base64 string. This utility
    action allows users to convert a file from the local file system into a base64-encoded
    string, which can then be used in subsequent automation steps.


    Flow Description:

    1. Extracts the `File Path` parameter from the action configuration.

    2. Validates that the file exists at the specified path.

    3. Checks if the file size is within the 5MB limit.

    4. Reads the file content in binary mode.

    5. Encodes the content into a base64 string.

    6. Returns the base64 content and file name as a JSON result.


    Additional Notes: This action runs locally on the agent/host where the script
    is executed. It does not interact with external APIs or modify SOAR case data.
  ai_short_description: >-
    Serializes a local file to a base64 string.
