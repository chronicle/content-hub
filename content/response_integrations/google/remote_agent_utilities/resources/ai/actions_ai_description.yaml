Deserialize A File:
  ai_description: >-
    ### General Description

    Deserializes a base64 encoded string into a file and saves it to the local disk
    of the Remote Agent.


    ### Flow Description

    1. Retrieves the base64 encoded file content and the desired file name from the
    action parameters.

    2. Verifies the existence of the target directory (`/opt/SiemplifyAgent/Files/`)
    on the agent, creating it if necessary.

    3. Decodes the base64 string and writes the binary data to the specified file
    path.

    4. Returns the path of the newly created file.


    ### Additional Notes

    This action is typically used in conjunction with a previous action that retrieves
    a file and outputs its content as a base64 string.
  ai_short_description: >-
    Deserializes a base64 encoded string into a file and saves it to the local disk
    of the Remote Agent.
