[project]
name = "RemoteAgentUtilities"
version = "8.0"
description = "Remote Agents Utilities enable file transfers between a Google SecOps machine to a machine which has a remote agent installed on it and vice versa."
requires-python = ">=3.11,<3.12"
dependencies = [ "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
