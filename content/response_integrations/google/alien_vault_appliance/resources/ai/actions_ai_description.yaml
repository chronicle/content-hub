Get PCAP Files For Events:
  ai_description: >-
    ### General Description

    Retrieves PCAP (Packet Capture) files associated with security events from AlienVault.
    This action connects to the AlienVault appliance to download network traffic captures
    for specific events and attaches them directly to the case in Google SecOps for
    further forensic analysis.


    ### Flow Description

    1. Determines the execution scope (either the current Alert or the entire Case).

    2. Iterates through the target alerts and their associated security events.

    3. Extracts the AlienVault event ID from each event's `additional_properties`.

    4. Makes an HTTP GET request to the AlienVault API to fetch the PCAP file content
    for the specific event ID.

    5. If a PCAP file is found, it base64 encodes the content and attaches it to the
    case using `siemplify.result.add_attachment`.

    6. Returns the base64 encoded PCAP data as a JSON result.


    ### Additional Notes

    The action relies on the security events having an "Id" field populated in their
    additional properties to successfully query AlienVault for the corresponding PCAP
    file.
