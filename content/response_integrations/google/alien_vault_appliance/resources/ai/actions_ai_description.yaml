Get Vulnerability Reports:
  ai_description: >-
    ### General Description

    Fetches vulnerability report files from an AlienVault appliance. This action connects
    to the AlienVault SIEM, retrieves a list of available vulnerability reports, and
    downloads the specified number of report files for further analysis.


    ### Flow Description

    1. The action initializes a connection to the AlienVault appliance using the configured
    API root, username, and password.

    2. It calls the `get_vulnerability_reports` method to retrieve a list of available
    vulnerability reports from the appliance.

    3. The list of reports is filtered based on the 'Number Of Files To Fetch' parameter.

    4. For each report in the filtered list, the action downloads the file content
    using the `download_file_from_link` method.

    5. Each downloaded file is attached to the action result using `siemplify.result.add_attachment`.

    6. A summary table of the fetched reports is added to the action result using
    `siemplify.result.add_data_table`.

    7. The final list of reports is returned as a JSON result.


    ### Additional Notes

    This action requires valid credentials for the AlienVault appliance. It does not
    modify any data on the AlienVault appliance or within the SOAR platform; it strictly
    retrieves and attaches files for analyst review.
