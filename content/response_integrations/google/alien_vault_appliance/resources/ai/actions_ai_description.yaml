Fetch Last PCAP Files:
  ai_description: >-
    ### General Description

    Fetches the most recent PCAP (Packet Capture) files from an AlienVault appliance.
    This action allows analysts to retrieve network traffic captures directly from
    the security appliance for forensic analysis.


    ### Flow Description

    1. The action initializes the `AlienVaultManager` using the provided API credentials.

    2. It retrieves the list of available PCAP files from the AlienVault appliance
    via an HTTP GET request.

    3. The list is filtered based on the `Number Of Files To Fetch` parameter.

    4. For each selected PCAP file, the action downloads the file content from the
    appliance.

    5. The downloaded files are attached to the SOAR case.

    6. A summary table containing the PCAP file records is added to the action results.


    ### Additional Notes

    This action requires valid credentials for the AlienVault appliance. The downloaded
    files are attached to the case for further investigation.
