Get PCAP Files For Events:
  ai_description: >-
    ### General Description

    Retrieves PCAP (Packet Capture) files for security events associated with alerts
    in an AlienVault SIEM. This action facilitates forensic analysis by allowing analysts
    to download and inspect network traffic captures directly from the AlienVault
    platform.


    ### Flow Description

    1. Connects to the AlienVault SIEM using the configured API Root, Username, and
    Password.

    2. Determines the execution scope (either the current alert or all alerts within
    the case).

    3. Iterates through each security event within the target alerts.

    4. Extracts the `event_id` from the event's `additional_properties`.

    5. Calls the AlienVault API (`get_event_pcap`) to retrieve the PCAP file content
    for the identified event.

    6. If the PCAP content is successfully retrieved, it attaches the file to the
    alert and includes the data in the action's JSON result.


    ### Additional Notes

    This action requires a properly configured AlienVault integration. If an event
    does not contain an `Id` field in its `additional_properties`, the action will
    skip it and log the omission.
