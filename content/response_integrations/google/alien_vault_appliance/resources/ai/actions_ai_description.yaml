Enrich Vulnerabilities:
  ai_description: "### General Description\nEnriches Hostname and IP Address entities\
    \ with vulnerability data retrieved from an AlienVault USM Appliance. This action\
    \ identifies the corresponding asset in AlienVault and fetches its associated\
    \ vulnerability report, providing security analysts with critical context regarding\
    \ the security posture of the targeted assets.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the `AlienVaultManager` using the configured API root,\
    \ username, and password.\n2. **Entity Processing**: It iterates through the provided\
    \ `target_entities`, filtering for `ADDRESS` and `HOSTNAME` types.\n3. **Asset\
    \ Identification**: For each valid entity, it queries the AlienVault Appliance\
    \ to retrieve the internal `asset_id` based on the entity's identifier (IP or\
    \ Hostname).\n4. **Vulnerability Retrieval**: If an `asset_id` is found, the action\
    \ calls `alienvault_manager.get_asset_vulnerabilities(asset_id)` to fetch the\
    \ list of vulnerabilities.\n5. **Enrichment**: \n    - The vulnerability data\
    \ is flattened and added to the entity's `additional_properties` with the prefix\
    \ `AlientVault_Vulnerabilities`.\n    - A CSV table containing the vulnerability\
    \ details is attached to the entity using `siemplify.result.add_entity_table`.\n\
    6. **Update**: The action updates the enriched entities in the SOAR platform using\
    \ `siemplify.update_entities` and returns a summary message.\n\n### Additional\
    \ Notes\nThis action requires valid credentials for the AlienVault USM Appliance.\
    \ It does not perform any state-changing operations on the AlienVault system;\
    \ it is strictly an enrichment action."
