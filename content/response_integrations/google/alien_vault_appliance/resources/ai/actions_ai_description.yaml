Enrich Assets:
  ai_description: >-
    ### General Description

    Retrieves asset information from AlienVault USM Appliance to enrich IP Address
    and Hostname entities. This action fetches contextual metadata about the assets
    and appends it to the entities within the SecOps platform.


    ### Flow Description

    1. Initializes the connection to the AlienVault USM Appliance using the provided
    integration configurations.

    2. Iterates through the target entities, specifically looking for `ADDRESS` and
    `HOSTNAME` entity types.

    3. For each valid entity, makes an API call to AlienVault to retrieve the corresponding
    asset ID based on the IP address or hostname.

    4. If an asset ID is found, makes another API call to fetch detailed asset information
    (e.g., OS, Device Type, Asset Value).

    5. Flattens the retrieved asset information, prefixes the keys with "AlientVault",
    and adds it to the entity's `additional_properties`.

    6. Updates the enriched entities in the SecOps platform and returns the raw asset
    data as a JSON result.


    ### Additional Notes

    - Only entities of type `ADDRESS` and `HOSTNAME` are processed by this action;
    all other entity types are ignored.

    - The action will complete successfully even if no entities are enriched, returning
    a corresponding output message.
  ai_short_description: >-
    Retrieves asset information from AlienVault USM Appliance to enrich IP Address
    and Hostname entities with contextual metadata.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches asset data from AlienVault USM Appliance via HTTP requests
      (fetches_data=true). It does not mutate external data or internal case data.
      It updates the internal entities with the fetched data by calling `siemplify.update_entities`
      (can_update_entities=true). It does not create insights, modify alert data,
      or create case comments.
