Enrich Vulnerabilities:
  ai_description: >-
    ### General Description

    Retrieves vulnerability information for Hostname and IP Address entities from
    AlienVault USM Appliance. This action queries the AlienVault platform to find
    assets matching the provided entities and extracts their known vulnerabilities,
    enriching the entities with this contextual data.


    ### Flow Description

    1. Iterates through the target entities provided in the case.

    2. Filters the entities to process only those of type `ADDRESS` or `HOSTNAME`.

    3. For each valid entity, makes an API call to AlienVault to retrieve the corresponding
    asset ID based on the IP address or hostname.

    4. If an asset ID is successfully found, makes a subsequent API call to fetch
    the vulnerabilities associated with that specific asset.

    5. Flattens the retrieved vulnerability data and appends it to the entity's `additional_properties`.

    6. Constructs a CSV table containing the vulnerabilities and attaches it to the
    entity.

    7. Updates the entities within the Google SecOps platform with the enriched data
    and returns a comprehensive JSON result.


    ### Additional Notes

    - The action relies on the AlienVault asset inventory to match entities. If an
    IP or Hostname is not registered as an asset in AlienVault, no vulnerabilities
    will be retrieved.
