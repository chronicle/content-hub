Fetch Last PCAP Files:
  ai_description: >-
    ### General Description

    Fetches the most recent PCAP (Packet Capture) files from an AlienVault appliance
    and attaches them to the case for further analysis.


    ### Flow Description

    1. Retrieves the specified number of recent PCAP file records from AlienVault
    using the `get_last_pcap_files` method.

    2. Iterates through the retrieved records up to the requested limit.

    3. Downloads the content of each PCAP file via the `download_pcap_file` method.

    4. Attaches the downloaded PCAP files to the case in Google SecOps.

    5. Creates a data table containing the metadata of the fetched PCAP files and
    returns the records as a JSON result.


    ### Additional Notes

    This action does not require any specific entities to run and will fetch the latest
    PCAP files globally available on the appliance.
