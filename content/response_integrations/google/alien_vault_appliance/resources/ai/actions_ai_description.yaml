Enrich Assets:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities with asset information retrieved from
    an AlienVault USM Appliance. This action enhances the context of security alerts
    by pulling detailed asset metadata, such as OS, device type, and vulnerability
    status, directly from the AlienVault SIEM.


    ### Flow Description

    1. The action initializes the `AlienVaultManager` using the 'Api Root', 'Username',
    and 'Password' retrieved from the integration configuration.

    2. It iterates through the provided `target_entities` list.

    3. For each entity, it checks if the type is `ADDRESS` or `HOSTNAME`.

    4. If the entity is an `ADDRESS`, it calls `alienvault_manager.get_asset_id_by_ip`
    to find the corresponding asset ID.

    5. If the entity is a `HOSTNAME`, it calls `alienvault_manager.get_asset_id_by_hostname`
    to find the corresponding asset ID.

    6. If an asset ID is successfully retrieved, the action calls `alienvault_manager.get_asset_info`
    to fetch the full asset details.

    7. The retrieved asset data is flattened, prefixed with "AlientVault", and added
    to the entity's `additional_properties` dictionary.

    8. Finally, the action calls `siemplify.update_entities` to save the enriched
    data to the SOAR platform and returns a JSON result containing the enrichment
    details.


    ### Additional Notes

    This action performs read-only operations on the external AlienVault appliance
    and updates internal entity metadata within the SOAR platform. It does not modify
    any external system state.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with asset metadata retrieved from an
    AlienVault USM Appliance.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity 'additional_properties' with retrieved asset metadata from AlienVault.
    reasoning: >-
      The action fetches asset data from an external AlienVault appliance (fetches_data=true).
      It does not mutate external data. It updates internal entities within the SOAR
      platform by adding properties (can_mutate_internal_data=true, can_update_entities=true).
      It does not create insights, modify alert data, or create case comments.
