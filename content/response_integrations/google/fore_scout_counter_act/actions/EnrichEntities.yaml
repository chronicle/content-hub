name: Enrich Entities
description: 'Enrich entities using information from ForeScout CounterACT. Supported
    entities: IP, Mac Address.'
integration_identifier: ForeScoutCounterACT
parameters:
-   name: Create Insight
    default_value: 'True'
    type: boolean
