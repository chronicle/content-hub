Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities using data retrieved from the ForeScout
    CounterACT platform. This action queries the ForeScout API to obtain detailed
    endpoint information, such as online status, classification, agent version, and
    fingerprinting data. The retrieved information is then used to update the entity's
    metadata within the SOAR platform and optionally generate an insight for the analyst.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    etc.) to establish a connection with the ForeScout CounterACT API.

    2. It filters the provided `target_entities` to identify those matching `ADDRESS`
    or `MACADDRESS` types.

    3. For each supported entity, the action performs an API request to the ForeScout
    CounterACT server:
       - If the entity is a MAC Address, it calls `get_endpoint_info_by_mac`.
       - If the entity is an IP Address, it calls `get_endpoint_info_by_ip_address`.
    4. If endpoint details are successfully retrieved:
       - An insight is created in the case (if the `Create Insight` parameter is enabled).
       - The entity's `additional_properties` are updated with the enrichment data.
       - The entity is marked as enriched (`is_enriched = True`).
       - A data table containing the enrichment details is added to the action results.
    5. Finally, the action updates the entities in the SOAR platform and returns a
    JSON result containing the enrichment data for all processed entities.


    ### Additional Notes

    - The action requires valid credentials for the ForeScout CounterACT API.

    - The action respects the execution deadline to prevent timeouts during large
    batch processing.

    - The `Create Insight` parameter defaults to `True`.
  ai_short_description: >-
    Enriches IP and MAC Address entities with endpoint metadata retrieved from ForeScout
    CounterACT.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and creates insights within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (ForeScout). It mutates internal
      SOAR data by updating entities and creating insights. It does not mutate external
      data.
