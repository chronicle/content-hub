    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITIES or entity.entity_type.lower() == EntityTypes.MACADDRESS`.
      This means it specifically targets ADDRESS and MACADDRESS entities, filtering
      by the `entity_type` attribute.
