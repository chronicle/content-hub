Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP and MAC Address entities using ForeScout CounterACT to retrieve endpoint
    contextual information. This action fetches details such as vendor, classification,
    agent version, and online status to provide better visibility into network assets.


    ### Flow Description

    1. Initializes the connection to the ForeScout CounterACT API.

    2. Iterates over the target entities, filtering for IP Address and MAC Address
    types.

    3. For each MAC Address, makes a GET request to `/api/hosts/mac/{mac_address}`
    to fetch endpoint details.

    4. For each IP Address, makes a GET request to `/api/hosts/ip/{ip_address}` to
    fetch endpoint details.

    5. If the `Create Insight` parameter is enabled, generates an insight containing
    the endpoint's status and classification.

    6. Updates the entity's additional properties with the retrieved enrichment data.

    7. Saves the updated entities and attaches the results as JSON and CSV tables
    to the action's output.


    ### Additional Notes

    - Supported entity types are IP Address and MAC Address.
  ai_short_description: >-
    Enriches IP and MAC Address entities by retrieving endpoint contextual metadata
    from ForeScout CounterACT.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches endpoint data from ForeScout CounterACT via GET requests.
      It does not mutate external data. Internally, it updates the entities with enrichment
      data and creates case insights if configured to do so.
  entity_usage:
