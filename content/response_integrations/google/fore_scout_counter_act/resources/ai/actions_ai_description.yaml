Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ForeScout CounterACT server to ensure the integration
    is correctly configured and the credentials provided are valid.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, `CA Certificate File`, and `Verify SSL` from the integration settings.

    2. It initializes the `ForeScoutCounterACTManager` using these parameters.

    3. The manager attempts to authenticate by performing a POST request to the `/api/login`
    endpoint to retrieve a JWT token.

    4. If the authentication is successful, the action completes with a success message.
    If an exception occurs (e.g., invalid credentials, network issues), the action
    fails and logs the error.


    ### Additional Notes

    This action is strictly for connectivity validation and does not perform any data
    enrichment, entity manipulation, or external system state changes.
  ai_short_description: >-
    Tests connectivity to the ForeScout CounterACT server using the provided configuration
    parameters.
