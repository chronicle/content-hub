Enrich Entities:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action fetches contextual metadata (such as vendor, classification, agent
      version, and online status) for IP and MAC addresses from ForeScout CounterACT.
      This aligns with the 'Enrich Asset' expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Enriches IP and MAC Address entities using information from ForeScout CounterACT.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the ForeScout CounterACT API client.

    3. Iterates over supported entities (IP and MAC Address) from the case.

    4. Fetches endpoint information from ForeScout CounterACT based on the entity
    type.

    5. If successful, updates the entity with enrichment data, adds a data table,
    and optionally creates an insight.

    6. Returns the enriched entities and JSON results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | Boolean | False | If enabled, the action will create insights
    containing enrichment information for each successfully processed entity. Default
    is True. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with enrichment data and creates case insights.
    reasoning: >-
      The action fetches endpoint information from ForeScout CounterACT using GET
      requests, so it fetches data. It does not perform any POST/PUT/DELETE requests
      that modify external data. Internally, it updates entities with enrichment data
      and creates case insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source, does not mutate external data,
      and only performs allowed internal mutations (updating entities and creating
      insights). Therefore, it is an enrichment action.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITIES` (where SUPPORTED_ENTITIES includes ADDRESS and MACADDRESS).
      Therefore, it runs on ADDRESS and MacAddress entities and filters by entity
      type.
Ping:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action is a simple connectivity test (Ping) and does not match any of the
      specific action outcomes categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Tests connectivity to the ForeScout CounterACT server using the provided connection
    parameters.


    ### Flow Description

    1. Retrieves the connection parameters (API Root, Username, Password, CA Certificate
    File, Verify SSL).

    2. Attempts to initialize the ForeScout CounterACT Manager, which internally requests
    a JWT token to verify the connection.

    3. If successful, returns a success message. Otherwise, returns an error message.


    ### Parameters Description

    There are no action-specific parameters. The action uses the integration configuration
    parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action tests connectivity by attempting to fetch a JWT token from the ForeScout
      CounterACT server. It does not mutate external data, nor does it mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is a Ping action, which is explicitly excluded from being categorized
      as an Enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not process or interact with any entities.
