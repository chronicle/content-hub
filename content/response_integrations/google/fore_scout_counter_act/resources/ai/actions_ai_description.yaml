Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ForeScout CounterACT server using the parameters provided
    in the integration configuration.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    CA Certificate File, Verify SSL).

    2. Initializes the ForeScout CounterACT manager.

    3. Makes an API call (POST to `/api/login`) to authenticate and retrieve a JWT
    token.

    4. Returns a success message if the connection and authentication are successful,
    or an error message if they fail.


    ### Additional Notes

    This action is primarily used for verifying that the integration is configured
    correctly and can communicate with the ForeScout CounterACT API.
  ai_short_description: >-
