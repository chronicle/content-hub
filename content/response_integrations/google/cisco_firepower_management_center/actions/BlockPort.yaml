name: Block Port
description: Block port by assigning it to a port group attached to a policy
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cisco-firepower-management-center#block_port
integration_identifier: CiscoFirepowerManagementCenter
parameters:
-   name: Port Group Name
    type: string
    description: Name of the port object group.
    is_mandatory: true
-   name: Port
    type: string
    description: Port to block, e.g. 9856.
    is_mandatory: true
-   name: Port Protocol
    type: string
    description: Target port protocol, e.g. TCP.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: is_succeed
