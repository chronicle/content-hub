name: Unblock Port
description: Remove port from a group of blocked ports
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cisco-firepower-management-center#unblock_port
integration_identifier: CiscoFirepowerManagementCenter
parameters:
-   name: Port Group Name
    default_value: ''
    type: string
    description: Name of the port object group.
    is_mandatory: true
-   name: Port
    type: string
    description: Target port, e.g. 9856.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: is_succeed
