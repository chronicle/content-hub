Block Port:
  ai_description: >-
    ### General Description

    Blocks a specific network port by adding it to a designated port group within
    the Cisco Firepower Management Center. This action ensures that traffic on the
    specified port is restricted according to the policies associated with the target
    port group.


    ### Flow Description

    1. The action initializes the Cisco Firepower Management Center manager using
    the provided integration configuration.

    2. It retrieves the required parameters: `Port Group Name`, `Port`, and `Port
    Protocol`.

    3. The action calls `get_port_group_object_by_name` to fetch the existing port
    group object from the Cisco Firepower Management Center via a GET request.

    4. It then calls `block_port`, which performs the following steps:
        * Checks if the port is already present in the port group.
        * If not present, it creates a new port object via a POST request to the Cisco
    Firepower Management Center.
        * Updates the port group object by appending the new port object.
        * Executes a PUT request to update the port group configuration in the Cisco
    Firepower Management Center.
    5. Finally, the action concludes with a success message indicating whether the
    port was blocked.


    ### Additional Notes

    This action modifies the configuration of the Cisco Firepower Management Center
    by creating new objects and updating existing port groups. Ensure that the provided
    `Port Group Name` exists in the environment to avoid errors.
