Block Address:
  ai_description: >-
    ### General Description

    Blocks specific IP address entities on Cisco Firepower Management Center by assigning
    them to a designated network group attached to a policy. This action initiates
    a state change on the external firewall device to prevent network traffic to or
    from the specified IP addresses.


    ### Flow Description

    1. Retrieves the specified network group object from Cisco Firepower Management
    Center using the provided network group name.

    2. Iterates through the target entities, filtering specifically for IP Address
    entities.

    3. For each IP address, checks if it is already present in the network group.

    4. If not present, makes a PUT request to the Cisco Firepower API to append the
    IP address to the network group's blocklist.

    5. Returns a summary of successfully blocked entities and any errors encountered
    during the process.


    ### Additional Notes

    The network group must already exist and be attached to an active blocking policy
    in Cisco Firepower Management Center for the block to be effective.
  ai_short_description: >-
    Blocks specific IP address entities on Cisco Firepower Management Center by assigning
    them to a designated network group.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a network group object on Cisco Firepower Management Center to include
      the target IP addresses, effectively blocking them.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to the Cisco Firepower API to update a network
      group object, adding IP addresses to it (can_mutate_external_data=true). It
      does not fetch contextual enrichment data, nor does it update internal entities,
