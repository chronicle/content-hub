Unblock Address:
  ai_description: >-
    ### General Description

    Unblocks specific IP address entities by removing them from a designated Network
    Group in Cisco Firepower Management Center. This action restores network connectivity
    for the specified IP addresses by updating the firewall's network object configuration.


    ### Flow Description

    1. Retrieves the specified Network Group object from Cisco Firepower Management
    Center using the provided `Network Group Name`.

    2. Iterates through the target entities, filtering specifically for IP Address
    entities.

    3. For each valid IP address, removes its literal value from the retrieved Network
    Group object.

    4. Sends an API request (PUT) to Cisco Firepower to update the Network Group,
    effectively unblocking the IP addresses.

    5. Returns a summary message detailing the successfully unblocked entities and
    any errors encountered.


    ### Additional Notes

    - The action requires a valid Network Group Name to function.

    - According to Cisco Firepower API constraints, a Network Group cannot be completely
    empty. If removing an IP address results in an empty Network Group, the action
    will raise an error stating that at least one address must remain in the group.
