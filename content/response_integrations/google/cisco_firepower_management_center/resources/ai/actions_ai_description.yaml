Block Port:
  ai_description: >-
    ### General Description

    Blocks a specific network port on Cisco Firepower Management Center by assigning
    it to a designated port group.


    ### Flow Description

    1. Retrieves the specified port group object by its name from Cisco Firepower.

    2. Checks if the port is already present in the port group.

    3. If not present, creates a new port object with the specified port and protocol
    via a POST request.

    4. Updates the port group to include the newly created port object via a PUT request.


    ### Additional Notes

    This action modifies the configuration of the firewall and may affect network
    traffic depending on the policies associated with the port group.
