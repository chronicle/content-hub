Block Address:
  ai_description: >-
    ### General Description

    Blocks IP address entities by adding them to a specified network group within
    the Cisco Firepower Management Center. This action updates the configuration of
    an existing network group object to include the target IP addresses, effectively
    enforcing a block policy on the firewall.


    ### Flow Description

    1. **Initialization**: The action initializes the `CiscoFirepowerManager` using
    the provided integration configuration (API Root, Username, Password).

    2. **Parameter Retrieval**: Retrieves the `Network Group Name` parameter to identify
    the target network group.

    3. **Entity Filtering**: Filters the `target_entities` to include only those of
    type `ADDRESS`.

    4. **Object Retrieval**: Calls the Cisco Firepower API (`GET` request) to retrieve
    the network group object by its name.

    5. **Blocking**: Iterates through the filtered IP address entities and calls the
    `block_ip_address` method, which performs a `PUT` request to the Cisco Firepower
    API to append the IP address to the network group's literals list.

    6. **Result Reporting**: Returns a success message indicating which entities were
    blocked or reports any errors encountered during the process.


    ### Additional Notes

    This action requires a valid `Network Group Name` that exists within the Cisco
    Firepower Management Center. The action performs a state change on the external
    firewall system by modifying the network group configuration.
  ai_short_description: >-
    Blocks IP address entities by adding them to a specified network group in Cisco
    Firepower Management Center.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
