Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cisco Firepower Management Center API. This action verifies
    that the integration is configured correctly with valid credentials and network
    access.


    ### Flow Description

    1. Initializes the Cisco Firepower Manager using the provided integration configuration
    (API Root, Username, Password, and Verify SSL).

    2. Makes a POST request to the `/api/fmc_platform/v1/auth/generatetoken` endpoint
    to obtain an authentication token and domain UUID.

    3. Evaluates the response to determine if the connection and authentication were
    successful.

    4. Returns a success message ("Connection Established.") if the domain UUID is
