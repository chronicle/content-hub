name: Add IPS Policy Exception
description: 'Add IPS Policy Exception in FireEye NX. Note: IP entities are treated
    as "Attacker IP Address".'
integration_identifier: FireEyeNX
parameters:
-   name: Victim IP Subnet
    default_value: ''
    type: string
    description: 'Specify the IP subnet of the victim that should be used to create
        a new policy exception. Format: x.x.x.x/xx Example: 10.0.0.1/24'
    is_mandatory: true
-   name: Interface
    default_value: ALL
    type: ddl
    optional_values:
    - A
    - B
    - C
    - D
    - ALL
    description: Specify what interface should be used in policy exceptions.
    is_mandatory: true
-   name: Mode
    default_value: Block
    type: ddl
    optional_values:
    - Block
    - Unblock
    - Suppress
    - Suppress-unblock
    description: Specify the mode that should be used in the policy exception.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify the name for the policy exception. If nothing is specified,
        action will add policy exception with name Siemplify_{Interface}_{Mode}
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
