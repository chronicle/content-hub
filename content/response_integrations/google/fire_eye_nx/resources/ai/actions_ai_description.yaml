    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data. It mutates external data by creating an IPS
      policy exception in FireEye NX via a POST request. It does not mutate internal
      data, update entities, create insights, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by creating a policy exception, so it is not
      an enrichment action. It can block IPs based on the selected mode, making it
      a remediation action.
    remediation: true
  entity_usage:
