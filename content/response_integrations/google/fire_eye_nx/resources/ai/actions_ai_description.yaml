  ai_description: >-
    Tests connectivity to the FireEye NX instance using the provided integration configuration
    parameters.


    ### General Description

    This action verifies that the Google SecOps platform can successfully authenticate
    and communicate with the FireEye NX API. It is typically used during integration
    setup or troubleshooting to ensure network reachability and valid credentials.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEye NX API client.

    3. Sends a GET request to the system health endpoint to test connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration configuration parameters.


    ### Additional Notes

    None.
