  ai_description: >-
    Adds an IPS Policy Exception in FireEye NX for the specified IP address entities.
    The action treats the IP entities as the 'Attacker IP Address' and allows configuring
    the victim IP subnet, interface, and policy mode.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Victim IP Subnet | String | Yes | Specify the IP subnet of the victim that should
    be used to create a new policy exception. Format: x.x.x.x/xx (e.g., 10.0.0.1/24).
    |

    | Interface | Dropdown | Yes | Specify what interface should be used in policy
    exceptions. Options: A, B, C, D, ALL. Default is ALL. |

    | Mode | Dropdown | Yes | Specify the mode that should be used in the policy exception.
    Options: Block, Unblock, Suppress, Suppress-unblock. Default is Block. |

    | Name | String | No | Specify the name for the policy exception. If nothing is
    specified, the action will add a policy exception with the name Siemplify_{Interface}_{Mode}.
    |


    ### Action Flow

    1. Extracts configuration and action parameters.

    2. Filters target entities to include only IP addresses (ADDRESS).

    3. Iterates over the suitable entities and masks the IP address (adds /32 for
    IPv4).

    4. Calls the FireEye NX API to create an IPS policy exception for each entity
    with the specified parameters.

    5. Returns a summary message indicating successful and failed policy exception
    creations.
