  ai_description: >-
    Downloads alert artifacts from FireEye NX based on a provided Alert UUID and saves
    them to a specified local path.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert UUID | String | Yes | The UUID of the alert from which to download artifacts.
    |

    | Download Path | String | Yes | The local directory path where the downloaded
    artifacts zip file should be saved. |


    ### Flow

    1. Initializes the FireEye NX manager with provided credentials.

    2. Fetches the alert artifacts using the provided Alert UUID.

    3. Saves the downloaded artifacts as a zip file in the specified download path.

    4. Returns the absolute path of the saved file in the JSON result.
