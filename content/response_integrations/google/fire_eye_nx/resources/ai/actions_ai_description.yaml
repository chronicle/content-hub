    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Victim IP Subnet | String | Yes | The IP subnet of the victim to be used in
    the policy exception (e.g., 10.0.0.1/24). |

    | Interface | DDL | Yes | The network interface to apply the policy exception
    to (A, B, C, D, ALL). |

    | Mode | DDL | Yes | The operational mode for the policy exception (Block, Unblock,
    Suppress, Suppress-unblock). |

    | Name | String | No | The name for the policy exception. Defaults to 'Siemplify_{Interface}_{Mode}'
    if not provided. |
Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads alert artifacts from FireEye NX for a specific alert UUID and saves
    them to a specified local path. This action facilitates the retrieval of forensic
    data associated with security alerts for further analysis.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials, SSL verification)
    and action parameters (Alert UUID, Download Path).

    2. Initializes the `FireEyeNXManager` to handle communication with the FireEye
    NX API.

    3. Calls the `download_alert_artifacts` method, which performs a GET request to
    the FireEye NX API endpoint (`wsapis/v2.0.0/artifacts/{alert_uuid}`) to retrieve
    the artifact data.

    4. Saves the retrieved artifact data to the specified `Download Path` as a ZIP
    file.

    5. Returns the file path in the action result JSON if successful.


    ### Additional Notes

    Requires valid FireEye NX credentials and network access to the API. The action
    saves files to the local filesystem of the SOAR environment.
  ai_short_description: >-
    Downloads alert artifacts from FireEye NX for a specified alert UUID and saves
    them to a local file path.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
