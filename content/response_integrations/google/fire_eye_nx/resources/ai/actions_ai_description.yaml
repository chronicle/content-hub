    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES`
      is defined as `[EntityTypes.ADDRESS]`. This constitutes a filter by entity type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: true
    add_ioc_to_blocklist: true
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action allows the user to select a 'Mode' parameter which determines the
      outcome. 'Block' maps to adding an IOC to a blocklist. 'Unblock' maps to removing
      an IOC from a blocklist. 'Suppress' maps to adding an IOC to an allowlist. 'Suppress-unblock'
      maps to removing an IOC from an allowlist. Therefore, the action supports all
      four categories.
    remove_ioc_from_allowlist: true
    remove_ioc_from_blocklist: true
    reset_identity_password: false
    search_asset: false
