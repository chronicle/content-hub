Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads artifacts associated with a specific alert from FireEye NX and saves
    them to a specified local directory. This action allows analysts to retrieve forensic
    files and evidence related to an alert for further local analysis or sandboxing.


    ### Flow Description

    1. Extracts the `Alert UUID` and `Download Path` parameters provided by the user.

    2. Authenticates with the FireEye NX API using the configured credentials.

    3. Initiates an HTTP GET request to the FireEye NX `/artifacts/{alert_uuid}` endpoint
    to retrieve the artifact data.

    4. Saves the retrieved data as a `.zip` file in the specified local download path.

    5. Returns the absolute file path of the downloaded artifacts in the action's
    JSON result.


    ### Additional Notes

    - The action will fail to save the file if a file with the same name (e.g., `{alert_uuid}.zip`)
    already exists at the specified download path.

    - Ensure the SOAR platform has the necessary write permissions for the specified
    download directory.
  ai_short_description: >-
    Downloads artifacts for a specific alert from FireEye NX and saves them as a ZIP
    file to a specified local directory.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches artifact data from FireEye NX via an HTTP GET request. It
      does not mutate external data, nor does it mutate internal SOAR data (like entities,
      insights, or case comments). It simply saves the downloaded file to the local
      disk.
