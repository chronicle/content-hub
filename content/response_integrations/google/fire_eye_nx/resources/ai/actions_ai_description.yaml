Ping:
  ai_description: >-
    General Description

    Tests connectivity to the FireEye NX server to ensure the integration is properly
    configured.


    Flow Description

    1. Extracts the required integration configuration parameters (API Root, Username,
    Password, and Verify SSL) from the integration settings.

    2. Initializes the `FireEyeNXManager` using the provided credentials.

    3. Executes a GET request to the FireEye NX health check endpoint (`wsapis/v2.0.0/health/system`).

    4. Validates the API response to confirm successful connectivity.

    5. Returns a success or failure status based on the connectivity test result.


    Additional Notes

    This action is intended for troubleshooting and verifying the connection between
    the SOAR platform and the FireEye NX appliance.
