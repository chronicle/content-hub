Add IPS Policy Exception:
  ai_description: >-
    ### General Description

    Adds an IPS policy exception in FireEye NX for specific IP address entities. The
    IP entities are treated as the "Attacker IP Address" in the policy exception configuration.


    ### Flow Description

    1. Extracts action parameters including Victim IP Subnet, Interface, Mode, and
    Name.

    2. Filters target entities to include only IP addresses.

    3. Iterates through the filtered IP entities and masks the IP address (appends
    `/32` if it is a valid IPv4 address).

    4. Makes a POST request to the FireEye NX API (`wsapis/v2.0.0/ips/policy_exceptions`)
    to create the IPS policy exception for each IP.

    5. Returns a summary message indicating successful and failed policy exception
    creations.


    ### Additional Notes

    The action treats the target entity as the attacker IP. The mode parameter determines
    the action taken by the IPS (e.g., Block, Unblock, Suppress).
  ai_short_description: >-
    Adds an IPS policy exception in FireEye NX for specific IP address entities, treating
    them as attacker IPs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new IPS policy exception in FireEye NX for the specified attacker
      IP and victim subnet.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the FireEye NX API to create an IPS policy
      exception. It mutates external data by adding a new policy rule. It does not
      fetch enrichment data, update internal entities, or create insights.
  entity_usage:
