    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action creates an IPS policy exception in FireEye NX for an IP address.
      Depending on the selected mode (Block, Unblock, Suppress), this action can block
      the IP (Add IOC To Blocklist), unblock the IP (Remove IOC From Blocklist), or
      suppress alerts for the IP (Add IOC To Allowlist).
