Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the FireEye NX server using the provided integration configuration
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the FireEye NX manager and obtains an authentication token.

    3. Makes an API call to the FireEye NX `health/system` endpoint to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can communicate with the FireEye NX instance. It does not require any action-specific
    parameters or entities to run.
