Add IPS Policy Exception:
  ai_description: >-
    ### General Description

    Adds an IPS policy exception in the FireEye NX system. This action allows security
    analysts to manage network traffic policies by creating exceptions based on specific
    IP addresses, victim subnets, and interface configurations. It supports multiple
    operational modes, including blocking, unblocking, and suppressing traffic, providing
    granular control over the IPS policy enforcement.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) and action parameters (Victim IP Subnet, Interface, Mode, Name).

    2. It filters the `target_entities` to identify those of type `ADDRESS`.

    3. For each valid IP address entity, the action masks the IP (appending `/32`
    if it is an IPv4 address).

    4. It initializes the `FireEyeNXManager` and performs a POST request to the FireEye
    NX API endpoint `wsapis/v2.0.0/ips/policy_exceptions` to create the policy exception
    with the specified parameters.

    5. The action logs the success or failure of the operation for each entity and
    returns a summary message.


    ### Additional Notes

    The action supports four modes: 'Block', 'Unblock', 'Suppress', and 'Suppress-unblock'.
    The 'Name' parameter is optional; if not provided, the action defaults to a naming
    convention based on the interface and mode.
  ai_short_description: >-
    Adds an IPS policy exception in FireEye NX for specified IP address entities,
    supporting block, unblock, and suppression modes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates an IPS policy exception in the FireEye NX system via API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the FireEye NX API to create a policy
      exception, which is a mutation of external data. It does not fetch data, update
      internal entities, create insights, or modify alert data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
