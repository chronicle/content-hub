[project]
name = "microsoft-graph-mail-delegated"
version = "19.0.0"
description = "This integration version uses Delegated Authentication in Microsoft 365..."
requires-python = ">=3.11,<3.12"
dependencies = [
    "tipcommon",
    "environmentcommon",
    "requests==2.32.4",
    "beautifulsoup4",
    "compressed_rtf",
    "extract-msg",
    "html2text",
    "icalendar"
]

[dependency-groups]
dev = [
    "pytest-mock",
    "integration-testing",
    "pytest>=9.1.0",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
    "pyyaml"
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.4-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.0-py3-none-any.whl"
