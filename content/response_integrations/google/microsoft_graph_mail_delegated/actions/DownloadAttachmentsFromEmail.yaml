name: Download Attachments from Email
description: Use the Download Attachments From Email action to download attachments
    from emails based on the criteria provided. This action doesn't run on Google
    SecOps entities. This action is asynchronous. Adjust the script timeout value
    in the Google SecOps IDE. The action replaces the “/” forward slash and “\”  backslash
    characters in the names of the downloaded attachments with the “_” underscore
    character.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#download_attachments_from_email
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Search In Mailbox
    default_value: Default Mailbox
    type: string
    description: The default mailbox to execute the search operation in. If permissions
        allow it, the action can search in other mailboxes. This parameter accepts
        multiple values as a comma-separated string.
    is_mandatory: true
-   name: Folder Name
    default_value: Inbox
    type: string
    description: A mailbox folder in which to search for an email. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: false
-   name: Download Destination
    default_value: GCP Bucket
    type: ddl
    optional_values:
    - GCP Bucket
    - Local File System
    description: A location to save the downloaded attachments. By default, the action
        attempts to save the attachment to the Cloud Storage bucket. Saving an attachment
        to the local file system is a fallback option. The possible values are GCP
        Bucket and Local File System. The default value is GCP Bucket.
    is_mandatory: true
-   name: Download Path
    default_value: ''
    type: string
    description: A path to download attachments to. When saving attachments to the
        Cloud Storage bucket or a local file system, the action expects you to specify
        the download path in the Unix-like format, such as"/tmp/test"
    is_mandatory: true
-   name: Mail IDs
    default_value: ''
    type: string
    description: A filter condition to search for emails with specific email IDs or
        internetMessageId values. This parameter accepts a comma-separated list of
        email IDs to search for. If this parameter is provided, the search ignores
        the Subject Filter and Sender Filter parameters.
    is_mandatory: false
-   name: Subject Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email subject to search for.
        This filter uses the contains logic.
    is_mandatory: false
-   name: Sender Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the sender of requested emails.
        This filter uses the equals logic.
    is_mandatory: false
-   name: Download Attachments from EML
    default_value: 'False'
    type: boolean
    description: If selected, the action downloads attachments from EML files.
    is_mandatory: false
-   name: Download Attachments to unique path?
    default_value: 'False'
    type: boolean
    description: If selected, the action downloads attachments to the unique path
        provided in the Download Path parameter to avoid overwriting any previously
        downloaded attachments.
    is_mandatory: false
-   name: How many mailboxes to process in a single batch
    default_value: '25'
    type: string
    description: The number of mailboxes to process in a single batch (a single connection
        to the Microsoft 365 server). The default value is 25.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/download_attachments_from_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
