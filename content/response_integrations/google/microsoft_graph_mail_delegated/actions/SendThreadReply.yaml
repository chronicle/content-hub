name: Send Thread Reply
description: Use the Send Thread Reply action to send a message as a reply to the
    email thread. With appropriate permissions, the action can send emails from a
    mailbox other than the one specified in the integration configuration. This action
    doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#send_thread_reply
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Send From
    default_value: Default Mailbox
    type: string
    description: An optional email address from which to send emails if permissions
        allow it. By default, the action sends emails from the default mailbox that
        is specified in the integration configuration.
    is_mandatory: true
-   name: Mail ID
    default_value: ''
    type: string
    description: The email ID or the internetMessageId value of the email to reply
        to.
    is_mandatory: true
-   name: Folder Name
    default_value: Inbox
    type: string
    description: A mailbox folder in which to search for an email. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: true
-   name: Attachments Paths
    default_value: ''
    type: string
    description: A comma-separated list of paths for file attachments stored on the
        server, for example, /{FILE_DIRECTORY}/file.pdf, /{FILE_DIRECTORY}/image.jpg.
    is_mandatory: false
-   name: Mail Content
    default_value: ''
    type: string
    description: The email body.
    is_mandatory: true
-   name: Reply All
    default_value: ''
    type: boolean
    description: If selected, the action sends a reply to all recipients related to
        the original email. Not selected by default. This parameter has priority over
        the Reply To parameter.
    is_mandatory: false
-   name: Reply To
    default_value: ''
    type: string
    description: A comma-separated list of emails to reply to. If you don't set a
        value and the Reply All checkbox is clear, the action only sends a reply to
        the original email sender. If you select the Reply All checkbox, the action
        ignores this parameter.
    is_mandatory: false
-   name: Attachment Location
    default_value: GCP Bucket
    type: ddl
    optional_values:
    - GCP Bucket
    - Local File System
    description: A location where the attachments are stored. By default, the action
        attempts to upload attachments from the Cloud Storage bucket. The possible
        values are GCP Bucket or Local File System. The default value is GCP Bucket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_thread_reply_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
