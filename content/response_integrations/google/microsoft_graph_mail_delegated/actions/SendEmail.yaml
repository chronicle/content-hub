name: Send Email
description: Use the Send Email action to send emails from a specific mailbox to an
    arbitrary list of recipients. This action can send either plain text or HTML-formatted
    emails. With appropriate permissions, the action can send emails from a mailbox
    different than the one specified in the integration configuration. This action
    doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#send-email
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Send From
    default_value: Default Mailbox
    type: string
    description: An optional email address from which to send emails if permissions
        allow it. By default, the action sends emails from the default mailbox specified
        in the integration configuration.
    is_mandatory: true
-   name: Subject
    default_value: ''
    type: string
    description: The email subject.
    is_mandatory: true
-   name: Send to
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email recipients,
        such as user1@example.com, user2@example.com.
    is_mandatory: true
-   name: CC
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email CC field,
        such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: BCC
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email BCC field,
        such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: Attachments Paths
    default_value: ''
    type: string
    description: A comma-separated list of paths for file attachments stored on the
        server, for example, /{FILE_DIRECTORY}/file.pdf, /{FILE_DIRECTORY}/image.jpg.
    is_mandatory: false
-   name: Mail Content Type
    default_value: Text
    type: ddl
    optional_values:
    - Text
    - Html
    description: The type of the email content. The default value is Text.
    is_mandatory: false
-   name: Mail Content
    default_value: ''
    type: string
    description: The email body.
    is_mandatory: true
-   name: Reply-To Recipients
    default_value: ''
    type: string
    description: A comma-separated list of recipients to use in the Reply-To header.
        Use the Reply-To header to redirect reply emails to the specific email address
        instead of the sender address that is stated in the From field.
    is_mandatory: false
-   name: Attachment Location
    default_value: GCP Bucket
    type: ddl
    optional_values:
    - GCP Bucket
    - Local File System
    description: A location where the attachments are stored. By default, the action
        attempts to upload attachments from the Cloud Storage bucket. The possible
        values are GCP Bucket or Local File System. The default value is GCP Bucket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
