name: Wait For Vote Email Results
description: Use the Wait For Vote Email Results action to wait for the user response
    based on the vote email sent using the Send Vote Email action. This action is
    asynchronous. Adjust the action timeout in the Google SecOps IDE accordingly.
    This action doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#wait_for_vote_email_results
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Vote Mail Sent From
    default_value: Default Mailbox
    type: string
    description: The mailbox from which an email is sent using the Send Vote Email
        action. The default value is the mailbox that you specified in the integration
        configuration. Optionally, you can set a different value for this parameter
        if the vote mail is sent from a different mailbox.
    is_mandatory: true
-   name: Mail ID
    default_value: ''
    type: string
    description: The ID of the email. If the email is sent using the Send Vote Email
        action, set the parameter value to the SendVoteEmail.JSONResult|id or SendEmail.JSONResult|internetMessageId
        placeholder. To return email IDs, you can use the Search Emails action.
    is_mandatory: true
-   name: Wait for All Recipients to Reply?
    default_value: 'False'
    type: boolean
    description: If selected, the action waits for responses from all recipients until
        reaching timeout or proceeding with the first reply. Selected by default.
    is_mandatory: false
-   name: Wait Stage Exclude pattern
    default_value: ''
    type: string
    description: A regular expression to exclude specific replies from the wait stage.
        This parameter works with the email body. For example, if you configure the
        “Out of Office.*” regular expression, the action doesn't consider automatic
        out-of-office messages as recipient replies and waits for an actual user reply.
    is_mandatory: false
-   name: Folder to Check for Reply
    default_value: Inbox
    type: string
    description: A mailbox email folder to search for the user reply. The action searches
        in the mailbox from which you sent the email with a question. This parameter
        accepts a comma-separated list of folders to check the user response in multiple
        folders. To specify a subfolder, use the “/” forward slash, such as {Inbox/Subfolder}.
        This parameter is case-sensitive. The default value is Inbox.
    is_mandatory: false
-   name: Folder to check for Sent Mail
    default_value: Sent Items
    type: string
    description: A mailbox folder to search for the sent mail. The action searches
        in the mailbox from which you sent the email with a question. This parameter
        accepts a comma-separated list of folders to check the user response in multiple
        folders. To specify a subfolder, use the “/” forward slash, such as {Inbox/Subfolder}.
        This parameter is case-sensitive. The default value is Sent Items.
    is_mandatory: false
-   name: Fetch Response Attachments
    default_value: 'False'
    type: boolean
    description: If selected and the recipient reply contains attachments, the action
        fetches the reply and adds it as an attachment to the action result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/wait_for_vote_email_results_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
