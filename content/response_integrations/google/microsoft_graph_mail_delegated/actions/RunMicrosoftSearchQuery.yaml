name: Run Microsoft Search Query
description: Use the Run Microsoft Search Query action to perform a search using Microsoft
    Search engine. The search bases on the constructed basic or advanced query that
    you specify. For more information about Microsoft Search, see Overview of the
    Microsoft Search API in Microsoft Graph (https://learn.microsoft.com/en-us/graph/search-concept-overview).
    This action doesn’t run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#run_microsoft_search_query
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Entity Types To Search
    default_value: ''
    type: string
    description: 'A comma-separated list of expected resource types for the search
        response. The possible values are as follows: event, message, driveItem, externalItem,
        site, list, listItem, drive, chatMessage, person, acronym, bookmark.'
    is_mandatory: false
-   name: Fields To Return
    default_value: ''
    type: string
    description: The fields to return in the search response. If you don’t configure
        this parameter, the action returns all available fields.
    is_mandatory: false
-   name: Search Query
    default_value: ''
    type: string
    description: The query to run the search. For more information about the search
        query examples, see Use the Microsoft Search API to search Outlook messages(https://learn.microsoft.com/en-us/graph/search-concept-messages).
    is_mandatory: false
-   name: Max Rows To Return
    default_value: '25'
    type: string
    description: The maximum number of rows for the action to return. If you don’t
        configure this parameter, the action uses the default value. The default value
        is 25.
    is_mandatory: false
-   name: Advanced Query
    default_value: ''
    type: string
    description: The full search payload to use instead of constructing the search
        query with other action parameters. Format the search payload as a JSON string.
        If you configure this parameter, the action ignores all other parameters.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_microsoft_search_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
