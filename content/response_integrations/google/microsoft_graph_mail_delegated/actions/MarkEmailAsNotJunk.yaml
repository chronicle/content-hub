name: Mark Email as Not Junk
description: Use the Mark Email as Not Junk action to mark emails as not junk in a
    specific mailbox. This action removes the sender from the list of blocked senders
    and moves the message to the Inbox folder. The Mark Email as Not Junk action uses
    the beta version of Microsoft Graph API. This action doesn't run on Google SecOps
    entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#mark_email_as_not_junk
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Search In Mailbox
    default_value: Default Mailbox
    type: string
    description: A mailbox to search for an email in. By default, the action attempts
        to search for the email in the default mailbox that you specified in the integration
        configuration. To execute a search in other mailboxes, configure appropriate
        permissions for the action. This parameter accepts multiple values as a comma-separated
        string.
    is_mandatory: true
-   name: Folder Name
    default_value: Junk Email
    type: string
    description: A mailbox folder in which to search for an email. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: true
-   name: Mail IDs
    default_value: ''
    type: string
    description: A comma-separated string of the mail IDs or internetMessageId values
        of the emails to mark as not junk.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: null
    result_name: JsonResult
    show_result: true
creator: Admin
