name: Send Vote Email
description: Use the Send Vote Email action to send emails with the predefined answering
    options. This action uses Google SecOps HTML templates to format the email. With
    appropriate permissions, the Send Vote Email action can send emails from a mailbox
    other than the default one. This action doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#send-vote-email
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Send From
    default_value: Default Mailbox
    type: string
    description: An optional email address from which to send an email if permissions
        allow it. By default, the email is sent from the default mailbox that is specified
        in the integration configuration.
    is_mandatory: true
-   name: Subject
    default_value: ''
    type: string
    description: The email subject.
    is_mandatory: true
-   name: Send to
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email recipients,
        such as user1@example.com, user2@example.com.
    is_mandatory: true
-   name: CC
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email CC field,
        such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: BCC
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email BCC field,
        such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: Attachments Paths
    default_value: ''
    type: string
    description: A comma-separated list of paths for file attachments stored on the
        server, for example, /{FILE_DIRECTORY}/file.pdf, /{FILE_DIRECTORY}/image.jpg.
    is_mandatory: false
-   name: Email HTML Template
    default_value: Email HTML Template
    type: email_content
    description: The type of the HTML template to use. The default value is Email
        HTML Template.
    is_mandatory: true
-   name: Structure of voting options
    default_value: Yes/No
    type: ddl
    optional_values:
    - Yes/No
    - Approve/Reject
    description: The structure of the vote to send to recipients. The possible values
        are Yes/No or Approve/Reject. The default value is Yes/No.
    is_mandatory: true
-   name: Reply-To Recipients
    default_value: ''
    type: string
    description: A comma-separated list of recipients to use in the Reply-To header.
        Use the Reply-To header to redirect reply emails to the specific email address
        instead of the sender address that is stated in the From field.
    is_mandatory: false
-   name: Attachment Location
    default_value: GCP Bucket
    type: ddl
    optional_values:
    - GCP Bucket
    - Local File System
    description: A location where the attachments are stored. By default, the action
        attempts to upload attachments from the Cloud Storage bucket. The possible
        values are GCP Bucket or Local File System. The default value is GCP Bucket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_vote_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
