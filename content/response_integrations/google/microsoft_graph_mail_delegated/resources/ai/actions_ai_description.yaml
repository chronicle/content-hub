Send Thread Reply:
  ai_description: >-
    ### General Description

    The **Send Thread Reply** action allows users to send an email message as a reply
    to an existing email thread using the Microsoft Graph API. It supports replying
    to the original sender or all recipients, adding file attachments from GCP buckets
    or local storage, and sending from delegated mailboxes if permissions are configured.



    ### Additional Notes

    - This action does not operate on Google SecOps entities; it relies entirely on
    the provided **Mail ID**.

    - If **Reply All** is selected, the **Reply To** parameter is ignored.

    - The action requires appropriate delegated permissions to send on behalf of other
    mailboxes.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves input parameters
    and validates that any specified attachment paths exist in the chosen storage
    location (GCP or Local).

    2. **Mailbox & Folder Verification**: It verifies that the 'Send From' mailbox
    and the target 'Folder Name' are accessible via the Microsoft Graph API.

    3. **Email Retrieval**: The action fetches the details of the original email using
    the provided **Mail ID** to establish the thread context.

    4. **Draft Creation**: It calls the Microsoft Graph API to create a reply draft
    (using either the `createReply` or `createReplyAll` endpoint), attaching any specified
    files.

    5. **Email Dispatch**: The action sends the created draft.

    6. **Confirmation**: It searches the 'Sent Items' folder to retrieve the metadata
    of the successfully sent reply and returns it as the action result.
