Extract Data from Attached EML:
  ai_description: >-
    ### General Description

    The **Extract Data from Attached EML** action is designed to retrieve and parse
    data from email attachments within a Microsoft Graph environment. It specifically
    targets attachments in `.eml`, `.msg`, and `.ics` formats. The action allows security
    analysts to programmatically inspect the contents of attached emails, extracting
    metadata, body content, and specific data points using regular expressions without
    needing to manually download or open the files. This is particularly useful for
    phishing analysis and automated triage where malicious indicators might be hidden
    within attached communication files.



    ### Flow Description

    1.  **Mailbox Validation:** The action first validates the provided mailboxes
    and ensures the specified folder exists within them.

    2.  **Email Retrieval:** It fetches the email objects corresponding to the provided
    `Mail IDs` from the target mailboxes.

    3.  **Attachment Identification:** The action scans the retrieved emails for attachments
    with supported extensions (`.eml`, `.msg`, `.ics`).

    4.  **Content Extraction:**
        *   For **.eml** files: The action parses the MIME structure, handles S/MIME
    decryption if configured, and extracts headers and body parts.
        *   For **.msg** files: It utilizes specialized libraries to parse the Outlook
    message format.
        *   For **.ics** files: It extracts calendar event details like subject, organizer,
    and attendees. 5.  **Regex Processing:** If a `Regex Map JSON` is provided, the
    action runs the defined regular expressions against the extracted text and HTML
    content of the attachments.

    6.  **Result Compilation:** The extracted metadata (From, To, Subject, Date),
    body content, and regex matches are compiled into a structured JSON result for
    use in subsequent playbook steps.


    ### Additional Notes

    *   This action does **not** run on Google SecOps entities; it operates strictly
    based on the provided `Mail IDs` parameter.

    *   It supports S/MIME decryption if the integration is configured with the necessary
    private keys and certificates.
