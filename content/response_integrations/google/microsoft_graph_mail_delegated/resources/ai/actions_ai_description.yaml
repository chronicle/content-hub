Mark Email as Junk:
  ai_description: >-
    ### General Description

    The **Mark Email as Junk** action allows users to programmatically manage unwanted
    emails within Microsoft Graph (Office 365) mailboxes. It identifies specific emails
    based on provided IDs and utilizes the Microsoft Graph Beta API to mark them as
    junk. This operation has two primary effects in the external system: it moves
    the message to the 'Junk Email' folder and adds the sender's email address to
    the mailbox's blocked senders list.



    ### Additional Notes

    *   **Beta API:** This action specifically utilizes the Microsoft Graph Beta API
    endpoints (`microsoft.graph.markAsJunk`).

    *   **No Entity Context:** This action does not process Google SecOps entities
    (like IP or FileHash). It operates strictly based on the provided manual input
    parameters.


    ### Flow Description

    1.  **Mailbox Validation:** The action first verifies that the provided mailboxes
    exist and are accessible using the configured credentials.

    2.  **Folder Resolution:** It searches for the specified folder name within the
    validated mailboxes.

    3.  **Email Retrieval:** The action fetches the metadata for the emails corresponding
    to the provided Mail IDs or Internet Message IDs to ensure they exist in the target
    folders.

    4.  **Junk Marking:** For each found email, it sends a POST request to the Microsoft
    Graph API to trigger the 'markAsJunk' logic, which moves the mail and blocks the
    sender.
