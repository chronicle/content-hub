Forward Email:
  ai_description: >-
    Forwards an existing email from a Microsoft Graph mailbox to specified recipients.
    This action allows users to include previous email threads and optionally send
    from a delegated mailbox. It supports adding attachments from either a Google
    Cloud Project (GCP) bucket or a local file system. ### Parameters | Parameter
    | Type | Mandatory | Description | | :--- | :--- | :--- | :--- | | Send From |
    String | Yes | The email address to send from. Defaults to 'Default Mailbox' from
    the integration configuration. | | Mail ID | String | Yes | The unique ID or internetMessageId
    of the email to be forwarded. | | Folder Name | String | No | The mailbox folder
    where the original email is located (e.g., Inbox). | | Subject | String | Yes
    | The subject line for the forwarded email. | | Send to | String | Yes | A comma-separated
    list of recipient email addresses. | | CC | String | No | A comma-separated list
    of CC recipient email addresses. | | BCC | String | No | A comma-separated list
    of BCC recipient email addresses. | | Attachments Paths | String | No | A comma-separated
    list of file paths for attachments. | | Mail Content | String | Yes | The body
    content of the forwarded email. | | Attachment Location | String | Yes | Specifies
    if attachments are stored in a 'GCP Bucket' or 'Local File System'. | ### Flow
    1. **Initialization**: Validates the sender's mailbox and ensures the source folder
    exists within that mailbox. 2. **Retrieval**: Fetches the details of the original
    email using the provided Mail ID to ensure it exists and is accessible. 3. **Attachment
    Processing**: If attachment paths are provided, the action validates their existence
    in the specified location (GCP or Local) and prepares them for upload. 4. **Draft
    Creation**: Calls the Microsoft Graph API to create a 'forward' draft of the original
    message, incorporating the new subject, recipients, and body content. 5. **Dispatch**:
    Sends the created draft email. 6. **Verification**: Polls the 'Sent Items' folder
    to confirm the email was successfully dispatched and retrieves the final sent
    object for the action results. ### Additional Notes This action does not process
    or interact with Google SecOps entities. It operates purely based on the provided
    parameters.
