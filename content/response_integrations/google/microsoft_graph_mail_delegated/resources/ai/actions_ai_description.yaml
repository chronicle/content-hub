Delete Email:
  ai_description: >-
    ### General Description

    The **Delete Email** action is an asynchronous task designed to remove one or
    more emails from specified Microsoft 365 mailboxes. It allows for targeted deletion
    using specific Email IDs or broader cleanup based on search criteria such as subject,
    sender, and time frame. This action is particularly useful for remediation workflows,
    such as removing phishing emails or sensitive data from user mailboxes across
    an organization.



    ### Additional Notes

    - This action is **asynchronous** and will poll until all specified mailboxes
    are processed or the action times out.

    - If **Mail IDs** are provided, the action bypasses the search filters and attempts
    to delete those specific items directly.

    - The action requires delegated permissions to access and modify user mailboxes.


    ### Flow Description

    1. **Initialization**: The action extracts and validates input parameters, ensuring
    mailbox formats and time frames are correct.

    2. **Mailbox Validation**: It verifies the existence and accessibility of the
    target mailboxes via the Microsoft Graph API.

    3. **Email Identification**: 
        - If **Mail IDs** are provided, it retrieves those specific email objects.
        - Otherwise, it performs a search within the specified **Folder Name** using
    the provided filters (Subject, Sender, Time, Unread status).
    4. **Deletion**: The action iterates through the identified emails and sends a
    `DELETE` request to the Microsoft Graph API for each.

    5. **Asynchronous Management**: If multiple mailboxes are targeted, the action
    processes them in batches. It saves the state of pending and processed mailboxes
    to continue in the next polling cycle if necessary.

    6. **Finalization**: Once all batches are complete or a timeout occurs, it generates
    a summary message and optionally attaches the deleted email metadata to the action
    results.
