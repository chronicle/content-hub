Send Vote Email:
  ai_description: >-
    The 'Send Vote Email' action allows users to send interactive emails containing
    predefined voting options (Yes/No or Approve/Reject) using the Microsoft Graph
    API. This action is designed to facilitate quick decision-making or approvals
    directly from an email recipient's inbox. It utilizes Google SecOps HTML templates
    to format the email body and supports sending from delegated mailboxes if the
    configured account has the necessary permissions.



    ### Additional Notes

    - This action does not process or interact with Google SecOps entities (IPs, Hostnames,
    etc.).

    - Attachments are limited to a maximum size of 20MB.

    - The action automatically handles Right-to-Left (RTL) formatting if detected
    in the HTML template.


    ### Flow Description

    1. **Parameter Extraction and Validation**: The action retrieves all input parameters
    and validates that any specified attachment paths exist in the chosen storage
    location (GCP or Local).

    2. **Mailbox Setup**: It validates the 'Send From' mailbox to ensure the integration
    has access to it.

    3. **Email Construction**: The action prepares the email payload, including the
    HTML body, attachments, and the specific metadata required by Microsoft Outlook
    to render voting buttons.

    4. **Draft Creation and Dispatch**: It creates a draft message in the sender's
    mailbox and then triggers the send command.

    5. **Verification**: After sending, the action polls the 'Sent Items' folder to
    retrieve the final metadata of the sent email.

    6. **Result Reporting**: The action returns the sent email's details as a JSON
    result and provides a success message.
