Wait For Email From User:
  ai_description: >-
    ### General Description

    An asynchronous action that monitors a Microsoft 365 mailbox for replies to a
    specific email sent previously. It is designed to facilitate human-in-the-loop
    workflows by waiting for user feedback or confirmation before proceeding with
    a playbook. The action polls the specified mailbox folders at regular intervals
    to identify valid responses based on conversation threading and message identifiers.



    ### Additional Notes

    * This action is **asynchronous** and relies on the Google SecOps polling mechanism.
    Ensure the action timeout in the IDE is set long enough to account for human response
    times.

    * The action does not process or require Google SecOps entities (IPs, Hosts, etc.)
    to run.


    ### Flow Description

    1. **Initialization**: The action authenticates with Microsoft Graph and validates
    the target mailbox configuration.

    2. **Original Email Retrieval**: It fetches the metadata of the original email
    using the provided **Mail ID** to establish the conversation context.

    3. **Polling/Search**: The action searches the specified **Folders** for any messages
    belonging to the same conversation thread or referencing the original message
    ID.

    4. **Filtering**: Retrieved replies are filtered to ensure they come from the
    original recipients. The **Exclude pattern** is applied to the email body to discard
    automated responses.

    5. **Data Processing**: Once valid replies are found, the action extracts the
    message content. If **Fetch Response Attachments** is enabled, it downloads files
    from the reply and attaches them to the case.

    6. **Completion**: The action completes successfully once the reply criteria (first
    reply or all replies) are met. If the timeout is reached before criteria are met,
    the action fails or returns a partial success status.
