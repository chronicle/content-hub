Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Microsoft Graph Mail service. It validates the integration's
    configuration parameters, including the Client ID, Client Secret, Tenant ID, and
    Refresh Token, by attempting a basic API call to the Microsoft Graph endpoint.



    ### Additional Notes

    - This action does not process or interact with any Google SecOps entities.

    - It is primarily used during the initial setup of the integration or for troubleshooting
    authentication and network issues.


    ### Flow Description

    1. **Initialization**: The action initializes the Microsoft Graph API client using
    the global integration settings (Endpoints, Credentials, and Refresh Token).

    2. **Mailbox Resolution**: It retrieves the User Principal Name (UPN) for the
    configured mailbox to ensure the account is accessible.

    3. **Connectivity Test**: It executes a `GET` request to the Microsoft Graph `mailFolders`
    endpoint for the specified user.

    4. **Validation**: If the API returns a successful response (200 OK), the action
    reports a successful connection. If the API call fails due to invalid credentials
    or network errors, an error message is returned.
