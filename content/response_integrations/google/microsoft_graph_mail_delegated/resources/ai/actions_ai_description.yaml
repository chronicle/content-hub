Move Email To Folder:
  ai_description: >-
    ### General Description

    The **Move Email To Folder** action allows users to move one or multiple emails
    from a source folder to a destination folder within one or more Microsoft 365
    mailboxes. This action is particularly useful for automated incident response,
    such as moving suspicious emails to a 'Junk' or 'Quarantine' folder. It supports
    filtering emails by subject, sender, time frame, or specific Mail IDs. The action
    is asynchronous and can handle multiple mailboxes in batches.



    ### Additional Notes

    - This action is **asynchronous**; it will run in the background and poll for
    completion. Ensure the action timeout in the Google SecOps IDE is sufficient for
    the number of mailboxes being processed.

    - If **Mail IDs** are provided, the action prioritizes them and ignores the **Subject
    Filter** and **Sender Filter**.


    ### Flow Description

    1. **Initialization**: Extracts and validates input parameters, including mailbox
    addresses and folder paths.

    2. **Mailbox Validation**: Verifies that the target mailboxes exist and are accessible.

    3. **Folder Verification**: Checks if both the source and destination folders
    exist in each target mailbox.

    4. **Email Discovery**: Searches for emails in the source folder based on the
    provided filters (Subject, Sender, Time, Unread) or specific Mail IDs.

    5. **Execution**: Moves the identified emails to the destination folder using
    the Microsoft Graph API.

    6. **Result Processing**: Aggregates the results of the move operations, updates
    metadata (including S/MIME handling if applicable), and prepares the final JSON
    output and log messages.
