Generate Token:
  ai_description: >-
    ### General Description

    The **Generate Token** action is a configuration utility for the Microsoft Graph
    Mail Delegated integration. Its primary purpose is to exchange an authorization
    code (found within an Authorization URL) for a long-lived refresh token. This
    refresh token is essential for the integration to authenticate with Microsoft
    Graph using delegated permissions, allowing it to act on behalf of a specific
    user. This action is typically performed once during the initial setup or when
    a token needs to be manually re-generated.



    ### Additional Notes

    - This action does **not** run on Google SecOps entities.

    - The resulting refresh token must be manually copied into the integration's configuration
    settings.

    - It is highly recommended to configure the 'Refresh Token Renewal Job' after
    successfully generating the initial token to ensure continuous connectivity.


    ### Flow Description

    1. **Extraction**: The action parses the provided **Authorization URL** to extract
    the `code` parameter.

    2. **Validation**: It verifies that a valid authorization code is present in the
    URL.

    3. **Token Request**: The action makes a POST request to the Microsoft Entra ID
    (Azure AD) token endpoint using the extracted code, along with the Client ID and
    Client Secret from the integration configuration.

    4. **Retrieval**: Upon a successful response from Microsoft, the action retrieves
    the `refresh_token`.

    5. **Output**: The refresh token is displayed in the action's output message,
    providing instructions for the user to update the integration settings.
