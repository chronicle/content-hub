Send Email:
  ai_description: >-
    ### General Description

    The **Send Email** action allows users to send plain text or HTML-formatted emails
    through the Microsoft Graph API using a delegated mailbox. It supports multiple
    recipients (To, CC, BCC), custom Reply-To headers, and file attachments sourced
    from either a Google Cloud Storage (GCP) bucket or the local file system. This
    action is designed for automated notifications, reporting, or communication within
    a SOAR workflow and does not operate on specific Google SecOps entities.



    ### Additional Notes

    - The action requires appropriate delegated permissions in Microsoft Entra ID
    to send emails on behalf of the specified mailbox.

    - If attachments are provided, the action will fail if any of the specified files
    cannot be found at the designated location.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves all input parameters
    and validates the `Mail Content Type`. It also verifies that all specified attachment
    paths exist in the chosen `Attachment Location` (GCP or Local).

    2. **Mailbox Verification**: It validates the `Send From` mailbox address against
    the Microsoft Graph API to ensure it is active and accessible.

    3. **Attachment Loading**: If attachments are specified, the action loads the
    file content into memory, ensuring no single file exceeds the 20MB limit.

    4. **Email Creation & Dispatch**: The action constructs a draft email with the
    provided subject, body, recipients, and attachments. It then sends the draft using
    the Microsoft Graph API.

    5. **Metadata Retrieval**: After sending, the action polls the 'Sent Items' folder
    to retrieve the final metadata of the sent email (such as the `internetMessageId`)
    to confirm success and provide detailed output.
