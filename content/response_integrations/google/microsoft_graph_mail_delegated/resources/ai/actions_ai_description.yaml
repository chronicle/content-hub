Mark Email as Not Junk:
  ai_description: >-
    ### General Description

    The **Mark Email as Not Junk** action allows users to programmatically manage
    email classification within Microsoft 365 mailboxes. It specifically targets emails
    located in a junk or spam folder, moves them to the Inbox, and removes the sender
    from the blocked senders list. This action utilizes the Microsoft Graph API (beta
    version) and is designed to work with specific Mail IDs rather than processing
    Google SecOps entities directly.



    ### Additional Notes

    * This action does not run on Google SecOps entities; it operates strictly based
    on the provided Mail IDs.

    * It uses the **beta** endpoint of the Microsoft Graph API.

    * If multiple mailboxes are provided, the action will attempt to find the specified
    Mail IDs across all of them.


    ### Flow Description

    1. **Initialization**: The action initializes the Microsoft Graph API client using
    the integration's credentials.

    2. **Mailbox & Folder Validation**: It validates that the provided mailboxes exist
    and that the specified folder (e.g., 'Junk Email') is accessible within those
    mailboxes.

    3. **Email Retrieval**: The action searches for the specific emails using the
    provided Mail IDs or Internet Message IDs within the target folders.

    4. **Execution**: For each found email, it sends a POST request to the Microsoft
    Graph API `markAsNotJunk` endpoint.

    5. **Outcome**: The emails are moved to the Inbox, and the sender's status is
    updated in the external system. The action returns a success message detailing
    which emails were processed.
