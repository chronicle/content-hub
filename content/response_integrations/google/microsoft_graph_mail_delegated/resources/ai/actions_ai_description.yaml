    1. **Parameter Extraction**: Retrieves all input parameters, including recipients,
    subject, and HTML content.

    2. **Validation**: Validates that the specified attachment files exist in the
    chosen storage location (GCP Bucket or Local).

    3. **Mailbox Verification**: Confirms that the 'Send From' mailbox is valid and
    accessible via the Microsoft Graph API.

    4. **Draft Creation**: Creates a draft email in the sender's mailbox containing
    the HTML body, recipients, and any processed attachments.

    5. **Email Dispatch**: Sends the created draft email.

    6. **Confirmation**: Polls the 'Sent Items' folder to retrieve the final sent
    email object and confirms successful delivery.
