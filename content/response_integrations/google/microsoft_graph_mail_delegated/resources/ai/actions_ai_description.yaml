Wait For Vote Email Results:
  ai_description: >-
    ### General Description

    An asynchronous action that monitors a Microsoft Graph mailbox for replies to
    a specific 'Vote Email' sent previously. It tracks recipient responses, extracts
    their voting choices (e.g., Approve, Reject, Yes, No), and can optionally retrieve
    attachments from the replies. The action remains in an 'In Progress' state until
    the specified completion criteria (either the first reply or all replies) are
    met or the action times out.



    ### Additional Notes

    - This action is **asynchronous** and relies on polling the Microsoft Graph API
    at intervals.

    - It does not process Google SecOps entities; it operates based on the provided
    `Mail ID` and mailbox configuration.

    - The 'Vote' is extracted from the prefix of the reply's subject line (e.g., 'Approve:
    [Original Subject]').


    ### Flow Description

    1. **Initialization**: Validates the target mailbox and extracts the original
    email ID and folder paths.

    2. **Sent Mail Retrieval**: Locates the original sent email in the specified 'Sent'
    folders to identify the list of recipients.

    3. **Reply Polling**: Searches the 'Reply' folders for messages that are part
    of the same conversation thread as the original email.

    4. **Filtering**: Filters found replies to ensure they come from the original
    recipients and do not match the 'Exclude pattern' (like automated OOO messages).

    5. **Data Extraction**: Parses the subject line of valid replies to determine
    the vote and optionally fetches attachments if configured.

    6. **Completion Check**: Evaluates if the 'Wait for All' condition is met. If
    so, or if the timeout is reached, it produces the final result JSON and data table.
