Get Authorization:
  ai_description: >-
    ### General Description

    The **Get Authorization** action is a utility designed to facilitate the OAuth
    2.0 delegated authentication flow for the Microsoft Graph Mail integration. Its
    primary purpose is to generate a specific Microsoft login URL that a user must
    visit to grant the necessary permissions (scopes) to the application. This is
    the first step in obtaining a refresh token for delegated access.



    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the Tenant ID, Client ID, and
    Redirect URL from the integration's settings.

    2. **URL Construction:** It builds a standard Microsoft OAuth 2.0 authorization
    URL using the `authorize_url` endpoint. It automatically includes the required
    scopes (e.g., `mail.read`, `mail.send`, `offline_access`).

    3. **Link Generation:** The constructed URL is returned to the Google SecOps interface
    as a clickable link labeled "Browse to this authorization link".


    ### Additional Notes

    * This action **does not** interact with any Google SecOps entities.

    * After running this action, the user must manually click the link, authenticate
    with Microsoft, and then copy the resulting URL from their browser to use in the
    subsequent **Generate Token** action.
