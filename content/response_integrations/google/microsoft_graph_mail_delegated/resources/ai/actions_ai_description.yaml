"Get Mailbox Account Out Of Facility Settings":
  ai_description: >-
    ### General Description

    Retrieves the Out of Facility (OOF) settings for Microsoft 365 mailbox accounts
    associated with User entities. This action leverages the Microsoft Graph Beta
    API to provide visibility into a user's current availability, activity status,
    and specific Out of Office configurations, including automated reply messages.



    ### Flow Description

    1. **Entity Filtering**: The action identifies all User entities within the current
    context.

    2. **Email Validation**: For each User entity, it validates that the identifier
    is a properly formatted email address.

    3. **User Identification**: It communicates with Microsoft Graph to retrieve the
    unique User ID associated with the validated email address.

    4. **Data Retrieval**: It fetches the Out of Facility settings (availability,
    activity, status message, and OOF settings) for the identified user.

    5. **Enrichment**: The action updates the User entity's additional properties
    with the OOF status and message.

    6. **Reporting**: A data table is added to the case wall for each successful retrieval,
    containing detailed status information. The entity is marked as enriched in the
    SOAR platform.
