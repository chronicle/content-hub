Search Emails:
  ai_description: >-
    ### General Description

    Asynchronously searches for emails in Microsoft 365 mailboxes using the Microsoft
    Graph API. This action allows security analysts to perform broad or targeted searches
    across one or multiple mailboxes based on specific criteria such as subject, sender,
    and time frame. It is particularly useful for phishing investigations, data exfiltration
    analysis, and incident response where identifying malicious emails is required.
    The action supports S/MIME decryption if the appropriate certificates and private
    keys are configured in the integration settings.



    ### Additional Notes

    - This action is asynchronous and may require an increased action timeout in the
    Google SecOps IDE for large-scale searches.

    - Searching mailboxes other than the default requires the application to have
    the appropriate delegated or application permissions in Microsoft Entra ID.

    - If S/MIME certificates are provided in the integration configuration, the action
    will attempt to decrypt encrypted emails automatically.


    ### Flow Description

    1. **Initialization**: Extracts action parameters and validates that mandatory
    fields like 'Search in Mailbox' and 'Folder Name' are provided.

    2. **Authentication**: Establishes an authenticated session with Microsoft Graph
    using the configured Client ID, Secret, and Refresh Token.

    3. **Mailbox Validation**: Verifies the existence of the target mailboxes and
    the specified folders within those mailboxes.

    4. **Query Construction**: Builds an OData filter query based on the provided
    subject, sender, time frame, and unread status filters.

    5. **Execution**: Iterates through the mailboxes in batches, executing the search
    query against the Microsoft Graph API.

    6. **Data Processing**: Retrieves email metadata and content. If the email is
    S/MIME encrypted and decryption keys are available, it decrypts the content.

    7. **Output Generation**: Formats the results into a data table named 'Matching
    Mails' on the case wall and populates the action's JSON result.
