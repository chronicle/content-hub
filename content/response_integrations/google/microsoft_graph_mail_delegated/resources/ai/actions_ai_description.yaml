Run Microsoft Search Query:
  ai_description: >-
    ### General Description

    The **Run Microsoft Search Query** action allows users to perform complex searches
    across Microsoft 365 resources using the Microsoft Search API (via Microsoft Graph).
    It supports searching for various resource types such as emails, calendar events,
    files (driveItems), chat messages, and more. Users can either construct a query
    using simplified parameters or provide a full JSON payload for advanced search
    scenarios.



    ### Additional Notes

    - This action does not operate on Google SecOps entities; it is a standalone search
    utility.

    - Either the combination of (**Entity Types To Search** and **Search Query**)
    or the **Advanced Query** must be configured for the action to run successfully.


    ### Flow Description

    1. **Initialization**: The action initializes the Microsoft Graph API client using
    delegated permissions.

    2. **Parameter Extraction**: It retrieves the search parameters, converting comma-separated
    strings into lists where necessary.

    3. **Validation**: The action ensures that either an advanced JSON query is provided
    or that the basic search requirements (entity types and query string) are met.
    It also validates that the requested entity types are supported by the integration.

    4. **Execution**: 
        - If an **Advanced Query** is provided, it sends the raw JSON payload directly
    to the `/search/query` endpoint.
        - If a basic query is used, it constructs the payload and handles pagination
    to retrieve the requested number of rows.
    5. **Result Processing**: The search hits are parsed into a structured format
    and returned as a JSON result for use in playbooks.
