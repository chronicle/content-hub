Download Attachments from Email:
  ai_description: >-
    ### General Description

    Use the **Download Attachments From Email** action to retrieve and save email
    attachments from Microsoft 365 mailboxes to a specified destination. This action
    is designed for bulk processing and operates asynchronously, making it suitable
    for handling multiple mailboxes and large volumes of data without blocking the
    playbook execution. It supports filtering emails by specific IDs, subjects, or
    senders and can even extract attachments nested within EML files.



    ### Additional Notes

    - **Asynchronous Execution:** This action runs in the background. Ensure the script
    timeout in the Google SecOps IDE is sufficient for the expected volume of data.

    - **Filename Sanitization:** The action automatically replaces forward slashes
    (`/`) and backslashes (`\`) in attachment names with underscores (`_`) to ensure
    filesystem compatibility.

    - **Entity Support:** This action **does not** run on Google SecOps entities;
    it relies entirely on the provided parameters.


    ### Flow Description

    1. **Initialization:** The action validates the provided mailboxes and batches
    them based on the batch size parameter.

    2. **Email Discovery:** For each valid mailbox, it searches the specified folder
    for emails matching the Mail IDs or the Subject/Sender filters.

    3. **Attachment Retrieval:** It identifies all attachments for the discovered
    emails, including handling S/MIME decrypted content if the integration is configured
    with certificates.

    4. **Extraction (Optional):** If 'Download Attachments from EML' is enabled, it
    parses attached EML files to find nested attachments.

    5. **Storage:** The attachment content is downloaded from Microsoft Graph and
    saved to the specified 'Download Path' on either the GCP Bucket or the Local File
    System.

    6. **Reporting:** The action returns a JSON array containing the names and final
    storage paths of all successfully downloaded attachments.
