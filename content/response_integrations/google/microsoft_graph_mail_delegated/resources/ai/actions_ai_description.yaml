Send Email HTML:
  ai_description: >-
    ### General Description

    Sends an email using a Google SecOps HTML template from a specified Microsoft
    365 mailbox. This action allows for rich-text communication, including attachments
    and CC/BCC recipients, by interacting with the Microsoft Graph API. It is designed
    for automated notifications or manual responses within a SOAR workflow and does
    not operate on specific SecOps entities.



    ### Additional Notes

    - The action validates the existence of the sender's mailbox and the specified
    attachment files before attempting to send the email.

    - If attachments are provided, they must not exceed the 20MB size limit.


