Save Email to the Case:
  ai_description: >-
    ### General Description

    The **Save Email to the Case** action allows users to retrieve emails or specific
    email attachments from a Microsoft 365 mailbox and save them directly to a Google
    SecOps case. This is particularly useful for preserving evidence, such as phishing
    emails or malicious attachments, within the case record for further investigation.



    ### Additional Notes

    - This action does not operate on Google SecOps entities (like IP addresses or
    Hostnames); it relies entirely on the provided Mail ID.

    - To save from a mailbox other than the default, the delegated account must have
    the appropriate 'Mail.Read.Shared' or 'Mail.ReadWrite.Shared' permissions.


    ### Flow Description

    1. **Initialization**: The action validates the provided mailbox and folder name
    using the Microsoft Graph API.

    2. **Email Retrieval**: It fetches the email details and content (MIME/EML) based
    on the provided Mail ID.

    3. **Filtering**: If 'Save Only Email Attachments' is selected, the action identifies
    and filters the attachments based on the 'Attachment To Save' list.

    4. **Processing**: The action prepares the email file or the individual attachments,
    optionally encoding them in Base64.

    5. **Internal Mutation**: The files are added to the action's execution results.
    If 'Save Email to the Case Wall' is true, the files are uploaded to the Case Wall
    for visibility across the SOC team.
  capabilities:
    can_create_case_comments: false
