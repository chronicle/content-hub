name: Refresh Token Renewal Job
parameters:
-   name: Integration Environments
    default_value: ''
    type: string
    description: The integration environments for which to update the refresh tokens.
        This parameter accepts multiple values as comma-separated string. To configure
        this parameter, enclose every environment name in “” double quotes, such as
        “Default environment”, “Environment 1”, “Environment 5”.
    is_mandatory: false
-   name: Connector Names
    default_value: ''
    type: string
    description: The connector names for which to update the refresh tokens. This
        parameter accepts multiple values as comma-separated string. To configure
        an individual value, enclose it in double quotes.
    is_mandatory: false
description: Token renewal job should be used to periodically update the refresh token
    configured for the integration. By default, the refresh token expires every 90
    days, making integration unusable upon expiration. It is recommended to run this
    job every 7 or 14 days to make sure that refresh token will be up to date.
documentation_link: null
integration: MicrosoftGraphMailDelegated
creator: admin
