Detonate File:
  ai_description: >-
    ### General Description

    Submits files to JoeSandbox for detonation and analysis. This action allows users
    to scan files for malicious activity and retrieve detailed threat intelligence
    reports.


    ### Flow Description

    1. The action accepts file paths as input.

    2. It submits the files to JoeSandbox for analysis.

    3. The action runs asynchronously, checking the status of the analysis.

    4. Once completed, it downloads the analysis report and attaches it to the case.

    5. It adds a link to the JoeSandbox report.

    6. If the file is detected as suspicious, it creates a case insight.


    ### Additional Notes

    Requires a Pro level account.
  ai_short_description: >-
    Submits files to JoeSandbox for detonation, monitors analysis status, and creates
    insights if the file is flagged as suspicious.
