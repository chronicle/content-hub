Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps SOAR platform and the Joe Sandbox
    service. This utility action verifies that the integration is correctly configured
    and that the Joe Sandbox API is reachable and operational.


    ### Flow Description

    1. The action retrieves the Joe Sandbox integration configuration, including the
    API Root, API Key, and SSL settings.

    2. It initializes the `JoeSandboxManager` using these credentials.

    3. The action calls the `test_connectivity` method, which sends a POST request
    to the Joe Sandbox `api/v2/server/online` endpoint.

    4. The response is validated to determine if the service is online.

    5. The action concludes by returning a success or failure message and setting
    the result value to "true" or "false" accordingly.


    ### Additional Notes

    This action is a diagnostic tool used for troubleshooting integration connectivity.
    It does not perform any analysis, interact with entities, or modify data in either
    the SOAR platform or the external Joe Sandbox service.
