Detonate File:
  ai_description: >-
    ### General Description

    Submits files to JoeSandbox for detonation and analysis, and retrieves the resulting
    behavior report.


    ### Flow Description

    1. Reads the provided file paths and optional comments from the action parameters.

    2. Submits each file to JoeSandbox via a POST request to the `api/v2/analysis/submit`
    endpoint.

    3. Asynchronously polls JoeSandbox to check the analysis status using the `api/v2/analysis/info`
    endpoint.

    4. Once the analysis is complete, retrieves the analysis information and downloads
    the report in the specified format via the `api/v2/analysis/download` endpoint.

    5. Attaches the downloaded report to the case and adds a web link to the report.

    6. If the file is detected as suspicious or malicious, creates a case insight.

    7. Returns the analysis results as JSON.


    ### Additional Notes

    This action requires a Pro level JoeSandbox account. It operates asynchronously
    to wait for the analysis to complete.
  ai_short_description: >-
    Submits files to JoeSandbox for detonation and retrieves the analysis report,
    attaching it to the case and creating insights for suspicious files.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits files to JoeSandbox, creating a new analysis task on the external service.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action uploads files to JoeSandbox for analysis (mutating external state
      by creating an analysis task) and fetches the resulting report data. It does
      not update entities, but it creates case insights if the file is found to be
      suspicious.
