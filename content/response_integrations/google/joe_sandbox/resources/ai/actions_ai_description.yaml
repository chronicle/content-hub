Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Joe Sandbox API to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Retrieves the Joe Sandbox integration configuration (API Root, API Key, Use
    SSL).

    2. Initializes the `JoeSandboxManager`.

    3. Calls the `test_connectivity` method, which sends an HTTP POST request to the
    `api/v2/server/online` endpoint.

    4. Evaluates the response and returns a success message if the server is online,
    or a failure message if it is in maintenance mode.


    ### Additional Notes

    This action is typically used as a diagnostic tool to verify that the SOAR platform
    can successfully communicate with the Joe Sandbox instance.
