Search Url:
  ai_description: >-
    ### General Description

    Searches for a URL in Joe Sandbox to retrieve analysis reports and threat intelligence.
    This action queries the Joe Sandbox platform for existing analysis records associated
    with a specific URL, downloads the corresponding PDF report, and enriches the
    entity with the gathered intelligence.


    ### Flow Description

    1. The action iterates through the target entities, filtering for those of type
    URL.

    2. For each URL entity, it performs a search in Joe Sandbox using the `JoeSandboxManager`
    to find associated analysis IDs.

    3. If an analysis record is found, it retrieves the detailed analysis information.

    4. It downloads the full analysis report in PDF format and attaches it to the
    entity in the SOAR platform.

    5. It adds a web link to the entity pointing to the Joe Sandbox analysis report.

    6. It enriches the entity by updating its additional properties with the analysis
    data and setting the `is_enriched` flag to true.

    7. If the analysis indicates the URL is suspicious, it marks the entity as suspicious
    and generates an insight in the SOAR platform.

    8. Finally, it updates the entities and returns the JSON results of the analysis.


    ### Additional Notes

    This action requires valid Joe Sandbox API credentials configured in the integration
    settings. It handles API rate limits by catching `JoeSandboxLimitManagerError`
    and logging the error. The action does not submit new samples for analysis; it
    only searches for existing ones.
