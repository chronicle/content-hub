Search Hash:
  ai_description: >-
    ### General Description

    Searches for file hash entities in JoeSandbox records to retrieve existing analysis
    information. If a matching record is found, the action downloads the analysis
    report as a PDF, attaches it to the entity, and enriches the entity with the analysis
    details. It also evaluates the detection risk and flags the entity as suspicious
    if malicious activity was detected.


    ### Flow Description

    1. Iterates through the target entities and filters for `FILEHASH` entities.

    2. For each file hash, calls the JoeSandbox API (`api/v2/analysis/search`) to
    search for existing analysis records.

    3. If records are found, retrieves the detailed analysis information (`api/v2/analysis/info`).

    4. Downloads the analysis report as a PDF (`api/v2/analysis/download`) and attaches
    it to the entity in the SecOps platform.

    5. Adds a web link to the JoeSandbox report on the entity.

    6. Enriches the entity's additional properties with the flattened analysis data
    and marks it as enriched.

    7. Evaluates the detection risk; if the analysis indicates suspicious or malicious
    behavior, marks the entity as suspicious and creates an insight.

    8. Updates the entities in the platform and returns the JSON results.


    ### Additional Notes

    The action handles API rate limits by raising a specific error if the daily submission
    limit (20) is reached. If an attachment exceeds the 3 MB limit, an error is logged
    but the action continues processing.
  ai_short_description: >-
    Searches for file hash entities in JoeSandbox to retrieve existing analysis reports,
    enriches the entities with the findings, attaches the PDF report, and flags suspicious
    hashes with insights.
