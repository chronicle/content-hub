Search Hash:
  ai_description: >-
    ### General Description

    Searches for file hashes in Joe Sandbox to retrieve analysis reports and threat
    intelligence. This action queries the Joe Sandbox API for existing analysis records
    associated with a given file hash, downloads the corresponding PDF report, and
    enriches the entity with analysis details.


    ### Flow Description

    1. The action iterates through the provided target entities, filtering for those
    of type FILEHASH.

    2. For each valid entity, it calls the Joe Sandbox API (`search`) to retrieve
    associated analysis web IDs.

    3. If a match is found, it retrieves the analysis information (`get_analysis_info`)
    and downloads the full PDF report (`download_report`).

    4. The action attaches the PDF report to the entity and adds a web link to the
    analysis in the SOAR platform.

    5. It updates the entity's additional properties with the analysis data and marks
    the entity as enriched.

    6. If the analysis indicates the file is suspicious, it marks the entity as suspicious
    and adds an insight to the entity.

    7. Finally, it updates the entities in the SOAR platform and returns a summary
    of the findings.


    ### Additional Notes

    This action requires a valid Joe Sandbox API configuration (API Root, API Key,
    and SSL settings). If the daily API request limit is reached, the action will
    log an error and terminate for that entity.
