    Searches for URL entities in JoeSandbox records to retrieve existing analysis
    information. If a match is found, the action downloads the associated PDF report,
    attaches it to the entity, enriches the entity with the analysis data, and flags
    it if the detection is deemed suspicious or malicious.


    ### Flow Description

    1. Iterates over the target entities and filters for those of type `URL`.

    2. Calls the JoeSandbox API (`api/v2/analysis/search`) to search for the URL identifier.

    3. If a match is found, retrieves the detailed analysis information (`api/v2/analysis/info`).

    4. Downloads the analysis report as a PDF (`api/v2/analysis/download`) and attaches
    it to the entity in Google SecOps.

    5. Adds a web link to the JoeSandbox report on the entity.

    6. Enriches the entity's additional properties with the flattened analysis data
    and marks it as enriched.

    7. Checks if the detection is suspicious or malicious; if so, marks the entity
    as suspicious and creates an insight.

    8. Updates the entities in the platform and adds the analysis results to the JSON
    output.


    ### Additional Notes

    The action handles API limits and will raise an error if the daily submission
    limit is reached. It does not submit new URLs for analysis; it only searches for
    existing records.
