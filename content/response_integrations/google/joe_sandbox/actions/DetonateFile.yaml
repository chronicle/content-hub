name: Detonate File
description: 'Scan file and fetch its reputation. Note : This action requires Pro
    level account.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/joesandbox#detonate_file
integration_identifier: JoeSandbox
parameters:
-   name: File Paths
    type: string
    description: The paths of the files to scan comma separated.
    is_mandatory: true
-   name: Comment
    type: string
    description: The comment to add to the entry
    is_mandatory: false
-   name: Report Format
    type: string
    description: The format of the report
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/detonate_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: ScriptResult
