[project]
name = "JoeSandbox"
version = "11.0"
description = "Deep Malware Analysis. Joe Sandbox combines the best parts of multiple techniques. This enables deep analysis, excellent detection and big evasion resistance."
requires-python = ">=3.11,<3.12"
dependencies = [
 "pytest-mock>=3.15.1",
 "requests>=2.33.1",
]

[dependency-groups]
dev = [
 "pytest>=9.0.3",
 "pytest-json-report>=1.5.0",
 "soar-sdk",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
