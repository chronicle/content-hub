identifier: Okta
name: Okta
parameters:
-   name: Api Root
    default_value: https://
    type: string
    description: The base URL of the Okta instance.
    is_mandatory: true
    integration_identifier: Okta
-   name: Api Token
    default_value: ''
    type: password
    description: The API token (SSWS) used for authentication with the Okta instance.
        This parameter is mandatory if Use Oauth Authentication is disabled.
    is_mandatory: false
    integration_identifier: Okta
-   name: Use Oauth Authentication
    default_value: 'False'
    type: boolean
    description: If enabled, the integration uses OAuth 2.0 for authentication instead
        of an API token.
    is_mandatory: false
    integration_identifier: Okta
-   name: Client ID
    default_value: ''
    type: string
    description: The unique identifier for the Okta OAuth application. This parameter
        is mandatory if Use Oauth Authentication is enabled. Leave this field blank
        if authenticating using an API token.
    is_mandatory: false
    integration_identifier: Okta
-   name: Key ID
    default_value: ''
    type: string
    description: The ID of the public key associated with the private key used for
        OAuth authentication. This parameter is mandatory if Use Oauth Authentication
        is enabled.
    is_mandatory: false
    integration_identifier: Okta
-   name: Private Key
    default_value: ''
    type: password
    description: The private key in PEM format used for OAuth authentication. This
        parameter is mandatory if Use Oauth Authentication is enabled. Leave this
        field blank if authenticating using an API Token.
    is_mandatory: false
    integration_identifier: Okta
-   name: Verify SSL
    default_value: 'False'
    type: boolean
    description: If enabled, the integration validates the SSL certificate when connecting
        to the Okta server.
    is_mandatory: true
    integration_identifier: Okta
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/okta
categories:
- Identity
- IAM
- Access Management
- Operational
svg_logo_path: resources/logo.svg
image_path: resources/image.png
