name: Send ITP Signal To Okta
description: Send ITP Signal To Okta
integration_identifier: Okta
parameters:
-   name: Key ID
    default_value: ''
    type: string
    description: The ID of the public key, used to verify the private key’s signature.
    is_mandatory: true
-   name: Private Key
    default_value: ''
    type: password
    description: Private key used to sign the signal. Provided in a string format
        (including the “BEGIN” and “END” statements).
    is_mandatory: true
-   name: User Email
    default_value: ''
    type: string
    description: Email address of the affected user.
    is_mandatory: true
-   name: Timestamp
    default_value: ''
    type: string
    description: Timestamp of the signal occurrence. Timestamp format is ISO 8601.
    is_mandatory: true
-   name: Reason
    default_value: ''
    type: string
    description: Reason for the signal creation.
    is_mandatory: true
-   name: Severity
    default_value: Medium
    type: ddl
    optional_values:
    - Low
    - Medium
    - High
    description: Severity of the signal.
    is_mandatory: true
-   name: Issuer URL
    default_value: ''
    type: string
    description: Creation source of the signal.
    is_mandatory: true
dynamic_results_metadata: []
creator: System
simulation_data_json: '{"data": "<Response [202]>", "redirects": []}'
script_result_name: ScriptResult
