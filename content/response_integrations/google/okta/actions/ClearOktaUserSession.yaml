name: Clear Okta User Session
description: Use the Clear Okta Session for User action to terminate all active Okta
    sessions for specified users.
integration_identifier: Okta
parameters:
-   name: User IDs Or Logins
    default_value: ''
    type: string
    description: A comma-separated list of Okta user IDs or login identifiers.
    is_mandatory: false
-   name: Also Run On Scope
    default_value: 'false'
    type: boolean
    description: If selected, the action revokes active Identity Provider (IdP) sessions
        for all users identified in the entity scope, in addition to those explicitly
        listed in User IDs Or Logins.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
