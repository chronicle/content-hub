name: Get User
description: Get information about a user
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/okta#get_user
integration_identifier: Okta
parameters:
-   name: User Ids Or Logins
    default_value: ''
    type: string
    description: Ids or logins (email or short email name) of a user in Okta, e.g.
        test@gmail.com or simply 'test'
    is_mandatory: false
-   name: Also Run On Scope
    default_value: 'false'
    type: boolean
    description: Whether to run on entities as well as the input
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_user_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: System
simulation_data_json: '{"Entities": ["HOSTNAME", "USERUNIQNAME"]}'
script_result_name: ScriptResult
