name: List Users
description: Get the list of users
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/okta#list_users
integration_identifier: Okta
parameters:
-   name: Query
    default_value: ''
    type: string
    description: Search for a match in the firstname, lastname or in the email
    is_mandatory: false
-   name: Filter
    default_value: ''
    type: string
    description: Custom search query for a subset of properties
    is_mandatory: false
-   name: Search
    default_value: ''
    type: string
    description: Custom search query for most properties
    is_mandatory: false
-   name: Limit
    default_value: '200'
    type: string
    description: Max amount of results to return
    is_mandatory: false
dynamic_results_metadata: []
creator: System
script_result_name: ScriptResult
