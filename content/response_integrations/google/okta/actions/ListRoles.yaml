name: List Roles
description: Lists all roles assigned to a user
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/okta#list_roles
integration_identifier: Okta
parameters:
-   name: User IDs
    default_value: ''
    type: string
    description: Ids of users in Okta
    is_mandatory: false
-   name: Also Run On Scope
    default_value: 'false'
    type: boolean
    description: Whether to run on entities as well as the input
    is_mandatory: false
dynamic_results_metadata: []
creator: System
simulation_data_json: '{"Entities": ["HOSTNAME", "USERUNIQNAME"]}'
script_result_name: ScriptResult
