List Providers:
  ai_description: >-
    ### General Description

    The **List Providers** action retrieves a list of Identity Providers (IdPs) configured
    within an Okta organization. It allows security analysts to audit and search for
    specific authentication sources based on name or type. The action supports pagination
    to handle large sets of providers and outputs the results as both data tables
    and raw JSON for downstream processing.


    ### Flow Description

    1. **Initialization**: The action retrieves the Okta configuration and user-provided
    parameters (`Query`, `Type`, `Limit`).

    2. **API Request**: It calls the Okta `/idps` endpoint using a GET request, applying
    the provided filters.

    3. **Pagination**: The logic handles Okta's link-based pagination to fetch subsequent
    pages of results until the specified `Limit` is reached or all providers are retrieved.

    4. **Data Processing**: Each retrieved provider is flattened into a key-value
    structure.

    5. **Output Generation**: Creates a separate Data Table for each provider found,
    displaying its attributes in CSV format, and returns the full list of providers
    as a JSON object in the script result.


    ### Additional Notes

    This action does not operate on specific entities but rather queries the Okta
    tenant's global configuration.
