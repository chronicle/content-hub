Get Group:
  ai_description: >-
    ### General Description

    Retrieves detailed information about one or more Okta groups based on their unique
    IDs or display names. This action is useful for gathering context about group
    memberships, profiles, and administrative metadata within an Okta organization.



    ### Flow Description

    1. **Initialization**: The action parses the input parameters and initializes
    the Okta API client using the integration's configuration (API Root and Token).

    2. **Identifier Parsing**: The provided string of group identifiers is split by
    commas and trimmed of whitespace.

    3. **Data Retrieval**: For each identifier, the action queries Okta:
        - If **Is Id** is true, it calls the direct 'Get Group' endpoint.
        - If **Is Id** is false, it lists groups matching the query string and filters
    for an exact name match to ensure accuracy. 4. **Data Presentation**: For every
    group found, the action flattens the JSON profile and attaches it to the Google
    SecOps case as a Data Table named after the group.

    5. **Finalization**: The action returns a summary message indicating which groups
    were found or missed, along with the full JSON payload of the retrieved groups.
