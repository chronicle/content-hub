Add Group:
  ai_description: >-
    ### General Description

    This action creates a new group in Okta using a provided name and description.
    It is primarily used for administrative tasks or automated access management workflows
    within Google SecOps. If the group already exists, the action identifies the existing
    group and returns its details instead of creating a duplicate.



    ### Flow Description

    1. **Initialization**: The action initializes the Okta API manager using the provided
    configuration (API Root, Token, and SSL verification settings).

    2. **Creation Attempt**: It attempts to create a new group by sending a POST request
    to Okta with the specified name and description.

    3. **Success Handling**: If the group is successfully created, the action retrieves
    the group's metadata, converts it into a flat format, and displays it in a data
    table named 'Okta - Group'.

    4. **Conflict Handling**: If the creation fails (typically because the group name
    is already taken), the action performs a search for existing groups with the same
    name.

    5. **Result Reporting**: If an existing group is found, it displays that group's
    details in the data table and notifies the user that the group already exists.
    If no group is created or found, it reports a failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action creates a new group resource within the Okta environment via a POST
      request to the /groups endpoint.
    fetches_data: true
    internal_data_mutation_explanation: >-
      This action adds a data table to the Google SecOps case wall containing the
      details (ID, name, description, etc.) of the created or existing Okta group.
