Clear Okta User Session:
  ai_description: >-
    ### General Description

    Terminates all active Okta sessions for specified users. This action is used to
    force a logout across all devices and browsers for targeted accounts, effectively
    revoking their current access until they re-authenticate. It can process users
    provided as manual input or automatically target User entities within the Google
    SecOps case scope.



    ### Additional Notes

    - At least one user must be identified either through the 'User IDs Or Logins'
    parameter or via the entity scope (if 'Also Run On Scope' is enabled) for the
    action to perform any operations.

    - The action first resolves identifiers to internal Okta User IDs before executing
    the session clearance.


    ### Flow Description

    1. **Identifier Collection**: The action gathers user identifiers from the 'User
    IDs Or Logins' parameter and, if enabled, from the User entities in the SecOps
    scope.

    2. **User Validation**: For each identifier, it queries the Okta API to retrieve
    the specific User object and internal ID.

    3. **Session Termination**: It sends a DELETE request to the Okta `/users/{userId}/sessions`
    endpoint for every successfully identified user to terminate their active sessions.

    4. **Result Reporting**: The action tracks successful and failed attempts, providing
    a summary message in the case wall and setting the action result to success if
    at least one session was cleared or if no users were found to process.
