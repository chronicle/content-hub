    ### General Description

    Sets a new password for specified Okta users without requiring their current credentials.
    This action is primarily used for administrative password resets or account recovery
    scenarios. It can target specific users provided via a manual list or automatically
    target User and Hostname entities within the current alert scope.


    ### Flow Description

    1. **Initialization**: Retrieves configuration and parameters, including the new
    password and targeting options.

    2. **Validation**: If random characters are not being added, it validates the
    `New Password` against length and casing requirements.

    3. **Manual Processing**: Iterates through the list provided in `User IDs Or Logins`.
    For each ID, it optionally appends random characters and calls the Okta API (`POST
    /users/{userId}`) to set the password.

    4. **Scope Processing**: If `Also Run On Scope` is enabled, it identifies `USER`
    and `HOSTNAME` entities in the case. For each valid entity, it optionally appends
    random characters and calls the Okta API (`POST /users/{userId}`) to set the password.

    5. **Completion**: Returns a summary message of successful and failed resets,
    along with a JSON object mapping user identifiers to their newly assigned passwords.


    ### Additional Notes

    - **Password Complexity**: If `Add 10 Random Chars` is `false`, the action enforces
    a basic complexity check: the password must be at least 8 characters long and
    contain both uppercase and lowercase letters. If these requirements are not met,
    the action will terminate with an error.

    - **Targeting**: At least one user must be provided via the `User IDs Or Logins`
    parameter or the `Also Run On Scope` parameter must be enabled for the action
    to perform any operations.
