Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Okta API. Its primary purpose is to ensure that
    the integration configuration (API Root, API Token, and SSL settings) is correct
    and that the network path to the Okta instance is open.


    ### Parameters

    This action does not have any action-specific parameters. It utilizes the global
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Okta instance (e.g., `https://<org>.okta.com`).
    |

    | Api Token | String | Yes | The API token (SSWS) used for authentication. |

    | Verify SSL | Boolean | Yes | Specifies whether to verify the SSL certificate
    of the Okta server. |


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the API Root, API Token,
    and SSL verification preference from the Okta integration settings.

    2. **Manager Initialization:** It initializes the `OktaManager` with the provided
    credentials.

    3. **Connectivity Test:** The action performs a `GET` request to the `/api/v1/users/me`
    endpoint, which is a lightweight call to validate the current session/token.

    4. **Validation:** If the API responds with a success status, the action concludes
    with a "Connection Established Successfully" message. If the request fails, an
    `OktaException` is raised with the specific error details.


    ### Additional Notes

    - This action does not process any entities and is strictly used for configuration
    validation.
