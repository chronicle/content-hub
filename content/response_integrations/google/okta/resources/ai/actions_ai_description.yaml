    1. **Initialization**: The action retrieves the Okta configuration (API Root,
    Token) and user-provided parameters (`Query`, `Type`, `Limit`).

    2. **API Request**: It calls the Okta `/idps` endpoint using a GET request, applying
    the provided filters.

    3. **Pagination**: The logic handles Okta's link-based pagination to fetch subsequent
    pages of results until the specified `Limit` is reached or all providers are retrieved.

    4. **Data Processing**: Each retrieved provider is flattened into a key-value
    structure.

    5. **Output Generation**: 
        * Creates a separate **Data Table** for each provider found, displaying its
    attributes in CSV format.
        * Returns a summary message indicating the number of providers found.
        * Provides the full list of providers as a JSON object in the script result.
