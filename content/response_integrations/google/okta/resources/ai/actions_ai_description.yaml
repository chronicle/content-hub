List Roles:
  ai_description: >-
    ### General Description

    Lists all roles assigned to specific users in Okta. This action allows security
    analysts to audit user permissions by retrieving a comprehensive list of roles
    associated with either a manually provided list of User IDs or entities (Users
    and Hosts) identified within the current Google SecOps case scope. The retrieved
    data includes role types and detailed role configurations, which are presented
    as data tables for each user.


    ### Flow Description

    1. **Initialization**: The action initializes the Okta API client using the provided
    integration configuration.

    2. **Manual ID Processing**: If the `User IDs` parameter is provided, the action
    splits the string into individual IDs and iterates through them to fetch assigned
    roles from Okta.

    3. **Scope Processing**: If `Also Run On Scope` is enabled, the action iterates
    through all entities in the current case, filtering for `USER` and `HOSTNAME`
    types.

    4. **ID Resolution**: For each valid entity in scope, the action calls the Okta
    API to resolve the entity's identifier (e.g., username) to a unique Okta User
    ID.

    5. **Role Retrieval**: The action fetches the list of roles for each identified
    User ID via the Okta `/users/{userId}/roles` endpoint.

    6. **Data Presentation**: For every user with roles found, the action flattens
    the role data and attaches a CSV-formatted data table to the case.

    7. **Completion**: The action concludes by providing a summary message of the
    roles found and returning the full role data in JSON format.


    ### Additional Notes

    - The action requires at least one source of input: either the `User IDs` parameter
    must be populated, or `Also Run On Scope` must be enabled with valid entities
    present in the case.

    - For entities in scope, the action performs an ID resolution step (login to ID)
    before querying roles.
