  ai_description: >-
    ### General Description

    The **Get User** action retrieves detailed profile information for users from
    Okta. This action can query specific users provided as input or automatically
    enrich user-related entities within the case context.


    ### Flow Description

    1. **Initialization:** The action initializes the Okta manager using the provided
    API credentials.

    2. **Manual Input Processing:** It parses the `User Ids Or Logins` parameter,
    splitting it into individual identifiers.

    3. **Scope Processing:** If `Also Run On Scope` is enabled, it identifies all
    `USER` and `HOSTNAME` entities in the current context.

    4. **API Querying:** For each identifier (from manual input or scope), the action
    calls the Okta API's `/users/{userId}` endpoint via a GET request.

    5. **Result Compilation:** Found user data is added to a central result dictionary,
    a data table is generated for each found user containing flattened profile details,
    and a JSON result containing all retrieved user objects is attached to the action
    output.

    6. **Completion:** The action ends with a summary message detailing the success
    or failure of each lookup.


    ### Additional Notes

    - This action is an enrichment-only task and does not modify any data in Okta.

    - To ensure the action performs work, either provide a list of identifiers in
    **User Ids Or Logins** or set **Also Run On Scope** to `True`.
