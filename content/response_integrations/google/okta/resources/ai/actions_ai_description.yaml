Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Okta API. Its primary purpose is to ensure that
    the integration configuration is correct and that the network path to the Okta
    instance is open.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the integration configuration
    parameters (such as API Root, API Token, Client ID, etc.) from the Okta integration
    settings.

    2. **Manager Initialization:** It initializes the `OktaManager` with the provided
    credentials.

    3. **Connectivity Test:** The action performs a `GET` request to the `/api/v1/users/me`
    or `/api/v1/users` endpoint to validate the current session/token.

    4. **Validation:** If the API responds with a success status, the action concludes
    with a "Connection Established Successfully" message. If the request fails, an
    `OktaException` is raised with the specific error details.


    ### Additional Notes

    - This action does not process any entities and is strictly used for configuration
    validation.
