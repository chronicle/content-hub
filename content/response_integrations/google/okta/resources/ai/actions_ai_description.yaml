Enable User:
  ai_description: >-
    ### General Description

    The **Enable User** action allows for the restoration of user access within Okta.
    It supports two primary modes of operation: activating a deactivated user or unsuspending
    a suspended user. The action can target specific users provided via manual input
    or automatically process relevant entities within the current SOAR case scope.


    ### Flow Description

    1. **Initialization**: The action initializes the Okta API manager using the provided
    integration configuration.

    2. **Manual Input Processing**: If the `User IDs Or Logins` parameter is provided,
    the action iterates through each identifier.

    3. **Scope Processing**: If `Also Run On Scope` is enabled, the action identifies
    all `USER` and `HOSTNAME` entities in the current case.

    4. **API Execution**: For each identified user, the action calls the Okta API's
    lifecycle endpoints (`/activate` or `/unsuspend`) based on the `Is Activate` parameter.

    5. **Result Aggregation**: The action collects the status of each attempt and
    returns a summary message along with a JSON object mapping user identifiers to
    the action performed.


    ### Additional Notes

    - Either the `User IDs Or Logins` parameter must be populated, or `Also Run On
    Scope` must be set to `True` for the action to have targets to process.

    - The action uses the `USER` and `HOSTNAME` entity types to identify users when
    running on scope.
