    can_update_entities: false
    external_data_mutation_explanation: >-
      Assigns administrative roles to users in Okta, which modifies their permissions
      and access levels within the Okta platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds data tables to the case wall containing the details of the roles assigned
      to each user.
