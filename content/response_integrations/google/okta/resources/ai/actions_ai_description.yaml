List Providers:
  ai_description: >-
    ### General Description

    The **List Providers** action retrieves a list of Identity Providers (IdPs) configured
    within an Okta organization. It allows security analysts to audit and search for
    specific authentication sources based on name or type. The action supports pagination
    to handle large sets of providers and outputs the results as both data tables
    and raw JSON for downstream processing.



