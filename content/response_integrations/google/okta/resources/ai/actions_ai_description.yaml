Send ITP Signal To Okta:
  ai_description: >-
    ### General Description

    This action sends an Identity Threat Protection (ITP) signal to Okta to report
    a change in a user's risk level. It utilizes the Shared Signals and Events (SSE)
    framework to communicate security events to Okta, allowing for automated response
    actions within the Okta ecosystem based on the reported risk.


    ### Flow Description

    1. Extracts the action parameters: Key ID, Private Key, User Email, Timestamp,
    Reason, Severity, and Issuer URL.

    2. Validates the provided severity level and user email format.

    3. Tests connectivity to the Okta API.

    4. Formats the provided RSA private key into a standard PEM structure.

    5. Constructs a JWT payload following the Okta `user-risk-change` schema, including
    the user's email, risk levels, and the provided reason.

    6. Signs the JWT payload using the RS256 algorithm with the provided Private Key
    and Key ID.

    7. Sends the signed JWT via a POST request to Okta's security events API endpoint
    (`/security/api/v1/security-events`).

    8. Returns a success message if Okta returns an HTTP 202 (Accepted) status.


    ### Additional Notes

    - This action does not run on entities; it requires the user's email to be provided
    as a direct parameter.

    - The action performs a cryptographic signing of a JWT (RS256) before transmission.
