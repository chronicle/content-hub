Reset Password:
  ai_description: >-
    ### General Description

    The **Reset Password** action triggers a password reset process for users in Okta.
    It generates a one-time token that can be used to reset a user's password. Depending
    on the configuration, the action can either return the reset URL directly to Google
    SecOps or trigger Okta to send an automated reset email to the user. This action
    is primarily used for account recovery or as a response to compromised credentials.


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Okta API using the integration's
    configuration.

    2. **Target Collection**: Aggregates user identifiers from the manual input parameter
    and, if enabled, from the case's target entities (filtering for Users and Hostnames).

    3. **API Execution**: For each identified user, the action sends a POST request
    to the Okta `/lifecycle/reset_password` endpoint.

    4. **Response Handling**: 
        - If `Send Email` is `false`, the action captures the `resetPasswordUrl` from
    the API response.
        - If `Send Email` is `true`, it confirms that the email request was sent.
    5. **Completion**: Returns a summary message containing the reset links or email
    confirmations, along with the raw JSON response for each user.


    ### Additional Notes

    - Either the **User IDs Or Logins** parameter must be populated, or **Also Run
    On Scope** must be set to `true` with valid entities in the case for the action
    to have any targets.

    - The action supports `USER` (mapped as `USERUNIQNAME`) and `HOSTNAME` entity
    types.
