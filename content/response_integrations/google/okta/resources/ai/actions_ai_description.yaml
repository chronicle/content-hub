Unassign Role:
  ai_description: >-
    ### General Description

    Unassigns one or more roles from specific users in Okta. This action supports
    unassigning roles from a manually provided list of User IDs and/or from User and
    Hostname entities present in the current Google SecOps scope.


    ### Flow Description

    1. **Initialization**: Connects to the Okta API using the provided credentials.

    2. **Manual Processing**: If `User IDs` are provided, the action iterates through
    each user and each specified role, calling the Okta API to delete the role assignment.

    3. **Scope Processing**: If `Also Run On Scope` is `true`, the action identifies
    `USER` and `HOSTNAME` entities in the scope.

    4. **ID Resolution**: For each entity, it fetches the corresponding Okta User
    ID.

    5. **Role Unassignment**: For each resolved user, it iterates through the specified
    roles and performs the unassignment.

    6. **Completion**: Returns a summary message indicating which users were successfully
    unassigned from which roles, along with any errors encountered.


    ### Additional Notes

    - If `Also Run On Scope` is enabled, the action will attempt to resolve the Okta
    User ID for each entity using its identifier (login).

    - If a role name is provided but cannot be found for a specific user, that specific
    unassignment will be skipped and an error will be logged.
