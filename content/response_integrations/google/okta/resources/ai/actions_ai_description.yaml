Assign Role:
  ai_description: >-
    ### General Description

    Assigns one or more administrative roles to specified users in Okta. This action
    is used to manage user permissions and access levels within the Okta environment.
    It can target users explicitly by their Okta IDs or dynamically by processing
    User and Hostname entities within the current SOAR scope.


    ### Flow Description

    1. **Initialization**: Connects to the Okta API using the provided credentials.

    2. **Manual Assignment**: If `User IDs` are provided, the action iterates through
    each ID and attempts to assign every role listed in `Role Types` via a POST request
    to the Okta API.

    3. **Scope Processing**: If `Also Run On Scope` is enabled, the action identifies
    all `USER` and `HOSTNAME` entities in the current context.

    4. **Identity Resolution**: For each identified entity, it calls the Okta API
    to resolve the entity identifier to a valid Okta User ID.

    5. **Role Assignment**: Assigns the specified roles to the resolved User IDs via
    a POST request to the Okta API.

    6. **Reporting**: Generates data tables for the case wall detailing the assignment
    results for each user and provides a summary message.


    ### Additional Notes

    - Either `User IDs` must be provided, or `Also Run On Scope` must be set to `true`
    for the action to perform any assignments.

    - Common role types include `SUPER_ADMIN`, `ORG_ADMIN`, `APP_ADMIN`, `USER_ADMIN`,
    and `READ_ONLY_ADMIN`.
