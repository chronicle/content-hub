Send ITP Signal To Okta:
  ai_description: >-
    ### General Description

    This action sends an Identity Threat Protection (ITP) signal to Okta to report
    a change in a user's risk level. It utilizes the Shared Signals and Events (SSE)
    framework to communicate security events to Okta, allowing for automated response
    actions within the Okta ecosystem based on the reported risk.



    ### Additional Notes

    * This action does not run on entities; it requires the user's email to be provided
    as a direct parameter.

    * The action performs a cryptographic signing of a JWT (RS256) before transmission.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves all mandatory parameters including
    keys, user details, and event metadata.

    2. **Validation:** It validates the email format and ensures the severity level
    matches Okta's accepted values.

    3. **Key Formatting:** The provided RSA private key is formatted into a standard
    PEM structure.

    4. **Payload Construction:** A JWT payload is constructed following the Okta `user-risk-change`
    schema, including the user's email, risk levels, and the provided reason.

    5. **JWT Signing:** The payload is signed using the RS256 algorithm with the provided
    Private Key and Key ID.

    6. **Transmission:** The signed JWT is sent via a POST request to Okta's security
    events API endpoint.

    7. **Result Handling:** The action returns a success message if Okta returns an
    HTTP 202 (Accepted) status.
