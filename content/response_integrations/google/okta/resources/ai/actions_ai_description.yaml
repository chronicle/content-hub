Disable User:
  ai_description: >-
    ### General Description

    The **Disable User** action allows security analysts to programmatically suspend
    or deactivate user accounts within Okta. This is a critical containment action
    used during incident response to prevent unauthorized access by compromised or
    suspicious accounts. The action can target specific users provided via input parameters
    or automatically target user-related entities within the current SOAR case scope.


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the Okta API using
    the configured API Root and Token.

    2. **Manual Input Processing**: If the "User IDs Or Logins" parameter is populated,
    the action parses the comma-separated list.

    3. **Lifecycle Execution**: For each provided identifier, the action calls the
    Okta API to perform either a `SUSPEND` or `DEACTIVATE` operation based on the
    "Is Deactivate" toggle.

    4. **Scope-Based Processing**: If "Also Run On Scope" is enabled, the action iterates
    through the entities in the current case, filtering specifically for `USER` and
    `HOSTNAME` types.

    5. **Entity Action**: The action attempts to disable the identified entities using
    their identifiers as the Okta user reference.

    6. **Completion**: The action returns a summary message of all successful and
    failed operations, along with a JSON result mapping each identifier to the specific
    action taken (SUSPEND or DEACTIVATE).


    ### Additional Notes

    - Either the "User IDs Or Logins" parameter must be provided, or "Also Run On
    Scope" must be set to `True` for the action to perform any operations.

    - Suspending a user is a reversible state that prevents login, while deactivating
    is a more permanent lifecycle change in Okta.
