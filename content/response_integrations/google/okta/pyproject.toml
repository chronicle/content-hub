[project]
name = "okta"
version = "17.0"
description = "The Okta Identity Cloud provides secure identity management with Single Sign-On, Multi-factor Authentication, Lifecycle Management (Provisioning), and more."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "pyjwt==2.9.0", "requests==2.32.4",]

[dependency-groups]
dev = [
 "pytest-mock",
 "integration-testing",
 "anyio",
 "beautifulsoup4",
 "cachetools",
 "certifi",
 "charset-normalizer",
 "environmentcommon",
 "google-api-core",
 "google-api-python-client",
 "google-auth",
 "google-auth-httplib2",
 "googleapis-common-protos",
 "h11",
 "httpcore",
 "httplib2",
 "httpx",
 "idna",
 "paramiko",
 "proto-plus",
 "pyasn1",
 "pyasn1-modules",
 "pycparser",
 "pyjwt",
 "pyparsing",
 "pytest>=9.1.0",
 "pytest-json-report>=1.5.0",
 "python2-secrets",
 "pyzipper",
 "requests",
 "rsa",
 "sniffio",
 "soar-sdk",
 "soupsieve",
 "tipcommon",
 "uritemplate",
 "urllib3",
 "pyyaml",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

