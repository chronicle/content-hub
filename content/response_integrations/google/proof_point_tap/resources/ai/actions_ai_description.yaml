GetCampaign:
  ai_description: >-
    ### General Description

    Retrieves comprehensive information about specific campaigns from Proofpoint TAP
    based on provided Campaign IDs. This action is designed to provide security analysts
    with deep context regarding threat campaigns, including descriptions, start dates,
    and associated threat actors or malware families. It can also retrieve forensic
    evidence and automatically populate the Google SecOps case with new entities and
    insights.


    ### Flow Description

    1. **Initialization**: Validates the 'Max Forensics Evidence To Return' parameter
    and establishes a connection to the Proofpoint TAP API.

    2. **Data Retrieval**: Iterates through each provided Campaign ID and makes a
    GET request to the Proofpoint TAP API to fetch core campaign metadata.

    3. **Forensics (Optional)**: If requested, makes an additional GET request to
    fetch forensic data for each campaign, applying the specified type filters and
    limits.

    4. **Internal Enrichment**: 
        - Generates a data table for campaign details.
        - If 'Fetch Forensics' is active, generates a specific evidence data table
    for each campaign.
        - If 'Create Insight' is active, generates a formatted HTML insight in the
    case.
        - If 'Create Threat Campaign Entity' is active, adds the campaign as a new
    THREATACTOR entity to the case.
    5. **Finalization**: Returns the aggregated JSON results and updates the action
    status based on the success of the ID lookups.


    ### Additional Notes

    - This action does not run on existing entities in the case; it uses the provided
    'Campaign ID' list as the primary input.

    - If 'Create Threat Campaign Entity' is selected, the campaign name is used to
    create a 'THREATACTOR' entity type within the case.
