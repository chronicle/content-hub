Search Events:
  ai_description: >-
    ### General Description

    The **Search Events** action allows users to query and retrieve security events from Proofpoint TAP (Targeted Attack Protection). It is designed for threat hunting and historical analysis, enabling security analysts to find specific types of events (like blocked messages or permitted clicks) within a defined timeframe. The action returns a list of events in JSON format, including details such as spam scores, threat information, and message metadata.



    ### Additional Notes

    - If `Time Frame` is set to `Custom`, the `Start Time` must be provided, and it must be a valid ISO 8601 timestamp.

    - The action performs multiple API calls if the requested timeframe is large, as it breaks the search into 1-hour intervals to ensure comprehensive data retrieval.

    - This action does not run on specific entities; it is a global search action.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves all input parameters and validates that the `Max Results To Return` is within the allowed range (1-1000). It also ensures that `Start Time` is provided if a `Custom` timeframe is selected.

    2. **Time Range Calculation**: Based on the `Time Frame` selection, the action calculates the start and end UTC timestamps. If `Custom` is used, it parses the provided strings.

    3. **API Client Initialization**: The action authenticates with Proofpoint TAP using the provided API credentials (Service Principal and Secret).

    4. **Event Querying**: The action generates 1-hour time intervals and iterates through the requested threat statuses, making GET requests to the Proofpoint TAP SIEM API endpoint for each interval.

    5. **Data Aggregation**: Results from the API are parsed into structured event objects and aggregated until the `Max Results To Return` limit is reached or all data is fetched.

    6. **Result Output**: The collected events are returned as a JSON array under the `events` key.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation:
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
  outcome_categories:
    enrichment: false
  parameters_description: >-
    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Event Type** | Dropdown | No | Specifies the category of events to return. Options include: `All`, `Clicks Blocked`, `Clicks Permitted`, `Messages Delivered`, `Messages Blocked`, and `Issues`. Default is `All`. |

    | **Threat Status** | Dropdown | No | Filters events by the status of the associated threat. Options include: `Select One`, `Active`, `Cleared`, and `False Positive`. If `Select One` is chosen, the action returns both `Active` and `Cleared` threats. |

    | **Time Frame** | Dropdown | No | Defines the lookback period for the search. Options include: `Last Hour`, `Last 6 Hours`, `Last 24 Hours`, `Last Week`, and `Custom`. Default is `Last Hour`. |

    | **Start Time** | String | No | The start time for the search in ISO 8601 format (e.g., `2023-10-01T12:00:00Z`). This parameter is **mandatory** if `Time Frame` is set to `Custom`. |

    | **End Time** | String | No | The end time for the search in ISO 8601 format. If left empty while `Time Frame` is `Custom`, the current time is used. |

    | **Max Results To Return** | Integer | Yes | Limits the number of events returned by the action. Must be between 1 and 1000. Default is 50. |
  ai_short_description: >-
    The **Search Events** action allows users to query and retrieve security events from Proofpoint TAP (Targeted Attack Protection). It is designed for threat hunting and historical analysis, enabling security analysts to find specific types of events (like blocked messages or permitted clicks) within a defined timeframe. The action returns a list of events in JSON format, including details such as spam scores, threat information, and message metadata.
