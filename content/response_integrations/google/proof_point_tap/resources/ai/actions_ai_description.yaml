DecodeURL:
  ai_description: >-
    ### General Description

    Decodes URLs that have been rewritten by Proofpoint Targeted Attack Protection
    (TAP). This action allows security analysts to reveal the original destination
    of URLs protected by Proofpoint's URL Defense, facilitating further investigation
    and threat analysis.


    ### Flow Description

    1. **Initialization**: Retrieves configuration parameters and establishes an authenticated
    session with the Proofpoint TAP API.

    2. **Entity Collection**: Identifies all URL entities within the current alert
    scope.

    3. **Input Merging**: Combines the identified URL entities with any URLs provided
    manually via the `Encoded URLs` parameter.

    4. **API Interaction**: Sends the combined list of URLs to the Proofpoint TAP
    `/v2/url/decode` endpoint.

    5. **Result Processing**: Parses the API response to extract decoded URLs and
    success statuses.

    6. **Internal Mutation**: If `Create URL Entities` is enabled, it adds the decoded
    URLs as new entities to the case.

    7. **Output**: Returns a JSON result containing the mapping of encoded to decoded
    URLs and updates the action output message.


    ### Additional Notes

    - This action does not modify the original URL entities; it only retrieves their
    decoded counterparts and optionally creates new entities.

    - Either URL entities must be present in the scope, or URLs must be provided in
    the `Encoded URLs` parameter for the action to have data to process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
