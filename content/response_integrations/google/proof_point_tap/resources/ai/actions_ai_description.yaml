DecodeURL:
  ai_description: >-
    ### General Description

    Decodes URLs that have been rewritten by Proofpoint Targeted Attack Protection (TAP). This action allows security analysts to reveal the original destination of URLs protected by Proofpoint's URL Defense, facilitating further investigation and threat analysis.



    ### Flow Description

    1. **Initialization**: Retrieves configuration parameters and establishes an authenticated session with the Proofpoint TAP API.

    2. **Entity Collection**: Identifies all URL entities within the current alert scope.

    3. **Input Merging**: Combines the identified URL entities with any URLs provided manually via the "Encoded URLs" parameter.

    4. **API Interaction**: Sends the combined list of URLs to the Proofpoint TAP `/v2/url/decode` endpoint.

    5. **Result Processing**: Parses the API response to extract decoded URLs and success statuses.

    6. **Internal Mutation**: If "Create URL Entities" is enabled, it adds the decoded URLs as new entities to the case.

    7. **Output**: Returns a JSON result containing the mapping of encoded to decoded URLs and updates the action output message.


    ### Additional Notes

    - This action does not modify the original URL entities; it only retrieves their decoded counterparts and optionally creates new entities.

    - Either URL entities must be present in the scope, or URLs must be provided in the "Encoded URLs" parameter for the action to have data to process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates new URL entities in the Google SecOps case if the 'Create URL Entities'
      parameter is enabled and URLs are successfully decoded.
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
  outcome_categories:
    enrichment: false
  parameters_description: >-
    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Encoded URLs | String | No | A comma-separated list of specific URLs to decode. These are processed alongside any URL entities found in the alert scope. |

    | Create URL Entities | Boolean | No | If enabled (default: true), the action will automatically create new URL entities in the Google SecOps case for every URL that is successfully decoded. |
  ai_short_description: >-
    Decodes URLs that have been rewritten by Proofpoint Targeted Attack Protection (TAP). This action allows security analysts to reveal the original destination of URLs protected by Proofpoint's URL Defense, facilitating further investigation and threat analysis.
Get Threat Forensics:
  ai_description: >-
    ### General Description

    The **Get Threat Forensics** action retrieves detailed forensic information associated with specific threat IDs from the Proofpoint Targeted Attack Protection (TAP) platform. It allows security analysts to gather deep technical context about threats, such as associated malicious URLs, file hashes, IP addresses, and platform-specific analysis. This action is primarily used for investigation and incident response to understand the nature and scope of a detected threat.



    ### Additional Notes

    - This action does not run on entities; it relies entirely on the provided **Threat ID** parameter.

    - If multiple Threat IDs are provided, the action iterates through them and aggregates the results. If some IDs are not found, the action will report the successful ones and list the failed/invalid ones in the output message.


    ### Flow Description

    1. **Parameter Extraction**: The action parses the input parameters, converting the comma-separated string of Threat IDs into a unique list.

    2. **Validation**: It validates that the `Max Results To Return` value is within the supported range (1 to 1000).

    3. **API Interaction**: For each Threat ID, the action performs a GET request to the Proofpoint TAP `/v2/forensics` endpoint, optionally including campaign forensics.

    4. **Data Processing**: The raw JSON response is parsed into structured data models. The number of forensic items returned is capped based on the `Max Results To Return` parameter.

    5. **Result Aggregation**: The action compiles the forensic reports into a JSON result and generates a summary message indicating which threats were successfully processed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation:
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
  outcome_categories:
    enrichment: false
  parameters_description: >-
    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threat ID** | String | Yes | A comma-separated list of unique threat identifiers for which forensics data will be retrieved. |

    | **Include Campaign Forensics** | Boolean | No | If set to `True`, the action will also retrieve forensic data related to the broader campaign associated with the threat. Default is `False`. |

    | **Max Results To Return** | Integer | Yes | Specifies the maximum number of forensic records to return per threat ID. Must be between 1 and 1000. Default is 50. |
  ai_short_description: >-
    The **Get Threat Forensics** action retrieves detailed forensic information associated with specific threat IDs from the Proofpoint Targeted Attack Protection (TAP) platform. It allows security analysts to gather deep technical context about threats, such as associated malicious URLs, file hashes, IP addresses, and platform-specific analysis. This action is primarily used for investigation and incident response to understand the nature and scope of a detected threat.
GetCampaign:
  ai_description: >-
    ### General Description

    Retrieves comprehensive information about specific campaigns from Proofpoint TAP based on provided Campaign IDs. This action is designed to provide security analysts with deep context regarding threat campaigns, including descriptions, start dates, and associated threat actors or malware families. It can also retrieve forensic evidence and automatically populate the Google SecOps case with new entities and insights.



    ### Additional Notes

    - This action does not run on existing entities in the case; it uses the provided 'Campaign ID' list as the primary input.

    - If 'Create Threat Campaign Entity' is selected, the campaign name is used to create a 'THREATACTOR' entity type within the case.


    ### Flow Description

    1. **Initialization**: Validates the 'Max Forensics Evidence To Return' parameter and establishes a connection to the Proofpoint TAP API.

    2. **Data Retrieval**: Iterates through each provided Campaign ID to fetch core campaign metadata.

    3. **Forensics (Optional)**: If requested, fetches forensic data for each campaign, applying the specified type filters and limits.

    4. **Internal Enrichment**: 
        - Generates a data table for campaign details.
        - If 'Fetch Forensics' is active, generates a specific evidence data table for each campaign.
        - If 'Create Insight' is active, generates a formatted HTML insight in the case.
        - If 'Create Threat Campaign Entity' is active, adds the campaign as a new entity to the case.
    5. **Finalization**: Returns the aggregated JSON results and updates the action status based on the success of the ID lookups.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation:
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action can create new 'Threat Actor' entities within the Google SecOps case
      and generate case insights based on the retrieved campaign data.
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
  outcome_categories:
    enrichment: false
  parameters_description: >-
    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Campaign ID** | String | Yes | A comma-separated list of Proofpoint Campaign IDs to retrieve information for. |

    | **Create Insight** | Boolean | No | If enabled (default), the action creates a detailed case insight containing the campaign's summary, related malware, and techniques. |

    | **Create Threat Campaign Entity** | Boolean | No | If enabled (default), the action adds a new 'Threat Actor' entity to the current case representing the campaign. |

    | **Fetch Forensics Info** | Boolean | No | If enabled (default), the action retrieves forensic evidence (e.g., URLs, IPs, file hashes) associated with the campaign. |

    | **Forensic Evidence Type Filter** | String | No | A comma-separated list of evidence types to filter the forensics results (e.g., 'url, file, network'). |

    | **Max Forensics Evidence To Return** | Integer | No | The maximum number of forensic evidence items to return per campaign (Default: 50, Max: 1000). |
  ai_short_description: >-
    Retrieves comprehensive information about specific campaigns from Proofpoint TAP based on provided Campaign IDs. This action is designed to provide security analysts with deep context regarding threat campaigns, including descriptions, start dates, and associated threat actors or malware families. It can also retrieve forensic evidence and automatically populate the Google SecOps case with new entities and insights.
List Campaigns:
  ai_description: >-
    ### General Description

    The **List Campaigns** action retrieves a list of active campaigns from Proofpoint TAP within a specified time window. This action is useful for identifying ongoing threat campaigns and gathering high-level metadata about them.



    ### Additional Notes

    - If 'Custom' is selected for the 'Time Frame', the 'Start Time' parameter must be provided.

    - If a 'Time Frame' other than 'Custom' is selected, the 'Start Time' parameter must be left empty.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the user-provided time frame, start/end times, and result limits.

    2. **Validation**: It ensures that the 'Start Time' is provided only when 'Custom' is selected and that the result limit is within the allowed range (1-1000).

    3. **Time Range Calculation**: Based on the 'Time Frame', it calculates the specific UTC start and end timestamps.

    4. **API Interaction**: The action queries the Proofpoint TAP API (`/v2/campaign/ids`) in 24-hour intervals to gather campaign IDs and metadata.

    5. **Result Processing**: The retrieved campaigns are formatted into a JSON structure and returned to the SOAR platform.
