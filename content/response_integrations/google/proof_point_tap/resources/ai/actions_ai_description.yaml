Get Threat Forensics:
  ai_description: >-
    ### General Description

    The **Get Threat Forensics** action retrieves detailed forensic information associated
    with specific threat IDs from the Proofpoint Targeted Attack Protection (TAP)
    platform. It allows security analysts to gather deep technical context about threats,
    such as associated malicious URLs, file hashes, IP addresses, and platform-specific
    analysis. This action is primarily used for investigation and incident response
    to understand the nature and scope of a detected threat.


    ### Flow Description

    1. **Parameter Extraction**: The action parses the input parameters, converting
    the comma-separated string of Threat IDs into a unique list.

    2. **Validation**: It validates that the `Max Results To Return` value is within
    the supported range (1 to 1000).

    3. **API Interaction**: For each Threat ID, the action performs a GET request
    to the Proofpoint TAP `/v2/forensics` endpoint, optionally including campaign
    forensics.

    4. **Data Processing**: The raw JSON response is parsed into structured data models.
    The number of forensic items returned is capped based on the `Max Results To Return`
    parameter.

    5. **Result Aggregation**: The action compiles the forensic reports into a JSON
    result and generates a summary message indicating which threats were successfully
    processed.


    ### Additional Notes

    - This action does not run on entities; it relies entirely on the provided **Threat
    ID** parameter.

    - If multiple Threat IDs are provided, the action iterates through them and aggregates
    the results. If some IDs are not found, the action will report the successful
    ones and list the failed/invalid ones in the output message.
