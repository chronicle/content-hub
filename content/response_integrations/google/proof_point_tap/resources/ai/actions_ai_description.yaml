Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Proofpoint Targeted Attack Protection (TAP) server. It ensures that the
    integration configuration parameters are correct and that the service is reachable.


    ### Flow Description

    1. **Initialize API Client:** The action retrieves the integration's configuration
    to initialize the Proofpoint TAP manager.

    2. **Test Connectivity:** It executes a GET request to the Proofpoint TAP `/v2/campaign/{campaign_id}`
    endpoint using a hardcoded campaign ID to verify that the credentials are valid
    and the server responds correctly.

    3. **Validate Response:** The action checks the HTTP response status. If the request
    is successful, it confirms the connection; otherwise, it raises an error based
    on the response code.

    4. **Report Result:** Returns a success message if the connection is established
    or an error message if the test fails.


    ### Additional Notes

    This action is typically used during the initial setup or for troubleshooting
    purposes to confirm that the API credentials have the necessary permissions to
    communicate with the Proofpoint TAP environment.
