Search Events:
  ai_description: >-
    ### General Description

    The **Search Events** action allows users to query and retrieve security events
    from Proofpoint TAP (Targeted Attack Protection). It is designed for threat hunting
    and historical analysis, enabling security analysts to find specific types of
    events (like blocked messages or permitted clicks) within a defined timeframe.
    The action returns a list of events in JSON format, including details such as
    spam scores, threat information, and message metadata.


    ### Flow Description

    1. **Parameter Extraction & Validation**: The action retrieves all input parameters
    and validates that the `Max Results To Return` is within the allowed range (1-1000).
    It also ensures that `Start Time` is provided if a `Custom` timeframe is selected.

    2. **Time Range Calculation**: Based on the `Time Frame` selection, the action
    calculates the start and end UTC timestamps. If `Custom` is used, it parses the
    provided strings.

    3. **API Client Initialization**: The action authenticates with Proofpoint TAP
    using the provided API credentials.

    4. **Event Querying**: The action generates 1-hour time intervals and iterates
    through the requested threat statuses, making GET requests to the Proofpoint TAP
    SIEM API endpoint (`/v2/siem/{event_type}`) for each interval.

    5. **Data Aggregation**: Results from the API are parsed into structured event
    objects and aggregated until the `Max Results To Return` limit is reached or all
    data is fetched.

    6. **Result Output**: The collected events are returned as a JSON array under
    the `events` key.


    ### Additional Notes

    - If `Time Frame` is set to `Custom`, the `Start Time` must be provided, and it
    must be a valid ISO 8601 timestamp.

    - The action performs multiple API calls if the requested timeframe is large,
    as it breaks the search into 1-hour intervals to ensure comprehensive data retrieval.

    - This action does not run on specific entities; it is a global search action.
