    | :--- | :--- | :--- | :--- |

    | **Time Frame** | String | No | The time window for the search (e.g., 'Last Hour', 'Last Week', 'Custom'). Default is 'Last Hour'. |

    | **Start Time** | String | No | The start time in ISO 8601 format. This is **mandatory** if 'Time Frame' is set to 'Custom'. |

    | **End Time** | String | No | The end time in ISO 8601 format. If omitted and 'Time Frame' is 'Custom', the current time is used. |

