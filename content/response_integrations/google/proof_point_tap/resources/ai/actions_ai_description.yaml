List Campaigns:
  ai_description: >-
    ### General Description

    The **List Campaigns** action retrieves a list of active campaigns from Proofpoint
    TAP within a specified time window. This action is useful for identifying ongoing
    threat campaigns and gathering high-level metadata about them.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the user-provided time frame,
    start/end times, and result limits.

    2. **Validation**: It ensures that the 'Start Time' is provided only when 'Custom'
    is selected and that the result limit is within the allowed range (1-1000).

    3. **Time Range Calculation**: Based on the 'Time Frame', it calculates the specific
    UTC start and end timestamps.

    4. **API Interaction**: The action queries the Proofpoint TAP API (`/v2/campaign/ids`)
    via a GET request in 24-hour intervals to gather campaign IDs and metadata.

    5. **Result Processing**: The retrieved campaigns are formatted into a JSON structure
    and returned to the SOAR platform.


    ### Additional Notes

    - If 'Custom' is selected for the 'Time Frame', the 'Start Time' parameter must
    be provided.

    - If a 'Time Frame' other than 'Custom' is selected, the 'Start Time' parameter
    must be left empty.
