name: Search Events
description: Use the Search Events action to search events in Proofpoint TAP.
integration_identifier: ProofPointTAP
parameters:
-   name: Event Type
    default_value: All
    type: ddl
    optional_values:
    - All
    - Clicks Blocked
    - Clicks Permitted
    - Messages Delivered
    - Messages Blocked
    - Issues
    description: Type of the event that needs to be returned.
    is_mandatory: false
-   name: Threat Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Active
    - Cleared
    - False Positive
    description: Status of threat that needs to be returned. If "Select One" is provided,
        then action will return “Active” and “Cleared” threats.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Custom
    description: Time frame for the results. If “Custom” is selected, you also need
        to provide "Start Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Start time for the results. This parameter is mandatory, if "Custom"
        is selected for the "Time Frame" parameter. Format: ISO 8601.'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'End time for the results. Format: ISO 8601. If nothing is provided
        and "Custom" is selected for the "Time Frame" parameter then this parameter
        will use current time.'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'How many results to return. Default: 50. Maximum: 1000.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/search_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
