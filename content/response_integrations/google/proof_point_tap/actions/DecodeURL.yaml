name: DecodeURL
description: 'Decode URLs in Proofpoint TAP. Supported entities: URL.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/proofpointtap#decodeurl
integration_identifier: ProofPointTAP
parameters:
-   name: Encoded URLs
    type: string
    description: 'Specify a comma-separated list of URLs that need to be decoded.
        Note: URL entities in the scope of the alert will be decoded together.'
    is_mandatory: false
-   name: Create URL Entities
    default_value: 'true'
    type: boolean
    description: If enabled, action will create URL entities that were successfully
        decoded.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/decode_url_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
script_result_name: decoded_urls
