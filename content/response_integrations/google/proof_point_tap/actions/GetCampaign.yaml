name: GetCampaign
description: Return information about campaigns in Proofpoint TAP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/proofpointtap#getcampaign
integration_identifier: ProofPointTAP
parameters:
-   name: Campaign ID
    default_value: ''
    type: string
    description: Specify a comma-separated list of campaign IDs for which you want
        to return info.
    is_mandatory: true
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing information
        about the campaign.
    is_mandatory: false
-   name: Create Threat Campaign Entity
    default_value: true
    type: boolean
    description: If enabled, action will create a threat campaign entity from the
        enriched campaigns.
    is_mandatory: false
-   name: Fetch Forensics Info
    default_value: true
    type: boolean
    description: If enabled, action will return forensics information about the campaigns.
    is_mandatory: false
-   name: Forensic Evidence Type Filter
    default_value: attachment,dns, dropper, file, network, process, registry, screenshot,
        url, redirect_chain
    type: string
    description: 'Specify a comma-separated list of evidence types that need to be
        returned, when fetching forensic info. Possible values: attachment, cookie,
        dns, dropper, file, ids, mutex, network, process, registry, screenshot, url,
        redirect_chain, behavior.'
    is_mandatory: false
-   name: Max Forensics Evidence To Return
    default_value: '50'
    type: string
    description: 'Specify how much evidence to return per campaign. Default: 50. Maximum:
        1000.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_campaign_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: campaign_info
