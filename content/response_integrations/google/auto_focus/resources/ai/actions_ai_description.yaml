Hunt File:
  ai_description: >-
    ### General Description

    Hunt File is an asynchronous action that queries the AutoFocus platform to retrieve
    threat intelligence for file-based indicators. It supports hunting by file hash
    (MD5, SHA1, SHA256) or filename. The action initiates a search, monitors the progress,
    and upon completion, enriches the entities with findings, including associated
    tags and metadata.


    ### Flow Description

    1. **Initialization**: The action extracts the `Api Key` from the integration
    configuration.

    2. **Initiation**: The action iterates through the provided `FILEHASH` and `FILENAME`
    entities. For each entity, it calls the AutoFocus API (`samples_search`) to start
    a hunt and receives a cookie (`af_cookie`) to track the request.

    3. **Asynchronous Monitoring**: The action returns an `IN_PROGRESS` status, allowing
    the SOAR platform to poll for results. In subsequent executions, the `async_action`
    logic checks the status of the hunt using the stored cookie.

    4. **Data Retrieval & Enrichment**: Once the hunt completes, the action retrieves
    the results from AutoFocus. For each successful hit, it:
        - Flattens the result data and updates the entity's `additional_properties`.
        - Attaches a CSV table of the results to the entity.
        - Attaches the full JSON report to the entity.
        - Marks the entity as `enriched` and `suspicious`.
        - Adds an entity insight summarizing the number of hits found.
    5. **Finalization**: The action updates the entities in the SOAR platform and
    returns the final results.


    ### Additional Notes

    This action is designed to be asynchronous. It requires the AutoFocus integration
    to be configured with a valid API key. The `Results Limit` parameter can be used
    to restrict the number of hits processed per entity.
  ai_short_description: >-
    Hunts for file hashes or filenames in the AutoFocus platform and enriches entities
    with retrieved threat intelligence, tags, and metadata.
