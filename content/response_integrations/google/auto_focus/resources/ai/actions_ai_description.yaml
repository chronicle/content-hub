    reports and insights.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash and File Name entity
    types.

    2. Initiates an asynchronous hunt query in AutoFocus for each valid entity (using
    MD5, SHA1, SHA256, or filename).

    3. Periodically checks the status of the hunt queries until they are completed.

