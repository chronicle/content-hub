Hunt Domain:
  ai_description: >-
    ### General Description

    Hunts for Hostname entities in Palo Alto AutoFocus to retrieve associated threat
    intelligence and tags. This action queries the AutoFocus database to find any
    known intelligence or hits related to the specified domains and enriches the entities
    with the findings.


    ### Flow Description

    1. Iterates through the target entities and filters for Hostname entities.

    2. Initiates an asynchronous hunt query in AutoFocus for each valid domain via
    the `samples_search` API.

    3. Periodically checks the status of the hunt using the `samples_results` API
    until the query completes.

    4. Retrieves the hunt results (hits) from AutoFocus.

    5. Enriches the entities with the retrieved data by adding it to their additional
    properties.

    6. Attaches a CSV table and a base64-encoded JSON report of the hits to the entities.

    7. Marks the entities as enriched and suspicious, and creates an insight summarizing
    the number of hits found.

    8. Updates the entities within the Google SecOps platform.


    ### Additional Notes

    This is an asynchronous action. It will return an 'In Progress' status while waiting
    for the AutoFocus hunt queries to complete.
  ai_short_description: >-
    Hunts for Hostname entities in Palo Alto AutoFocus to retrieve associated threat
    intelligence and tags, enriching the entities with the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes GET/POST requests to the AutoFocus API to search for domain
      intelligence (fetches_data=true). It does not mutate external data. It updates
      internal entities with the retrieved data (can_update_entities=true) and creates
      insights (can_create_insight=true).
