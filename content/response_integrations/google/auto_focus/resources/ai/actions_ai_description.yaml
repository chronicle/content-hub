  ai_description: >-
    ### General Description

    The Hunt Domain action integrates with Palo Alto AutoFocus to search for threat
    intelligence and tags associated with domain entities. It operates asynchronously
    to handle potentially long-running search queries and enriches the entities with
    the retrieved intelligence.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Api Key | String | Yes | The API key used to authenticate with the AutoFocus
    service. |

    | Results Limit | Integer | No | The maximum number of search hits to process
    and attach to the entity. If left empty, all retrieved hits will be processed.
    |


    ### Flow Description

    1. The action initiates an asynchronous search query in AutoFocus for each supported
    HOSTNAME entity.

    2. It periodically checks the status of the search queries using the returned
    query cookie.

    3. Once a query is completed, it retrieves the search hits.

    4. The action enriches the entity with the retrieved data (up to the specified
    limit), attaches a CSV table of the hits, attaches a full JSON report, marks the
    entity as suspicious, and creates an insight summarizing the findings.
