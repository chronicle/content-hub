  ai_description: >-
    ### General Description

    The **Hunt File** action asynchronously queries Palo Alto AutoFocus to retrieve
    threat intelligence and associated tags for file hashes (MD5, SHA1, SHA256) and
    filenames. It enriches the matching entities with the retrieved data, marks them
    as suspicious, and attaches detailed reports and tables to the case.


    ### Flow Description

    1. **Initialization**: The action iterates over the target entities, filtering
    for `FILEHASH` and `FILENAME` types.

    2. **Search Initiation**: For each supported entity, it initiates a search query
    in AutoFocus and retrieves a tracking cookie.

    3. **Asynchronous Polling**: The action waits and periodically checks the status
    of the initiated hunts using the tracking cookies.

    4. **Data Retrieval & Enrichment**: Once a hunt completes, the action retrieves
    the hits (results). It flattens the data, updates the entity's additional properties,
    marks the entity as enriched and suspicious, and creates an insight.

    5. **Attachment Creation**: The action attaches a CSV table of the hits and a
    JSON report to the entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Results Limit | Integer | No | The maximum number of hits to process and attach
    to the entity. If left empty, all retrieved hits will be processed. |


    ### Additional Notes

    This action runs asynchronously, meaning it will yield execution and be re-triggered
    by the SOAR platform until the AutoFocus searches are complete.
