Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AutoFocus integration. This action verifies that the
    provided API credentials are valid and that the SecOps platform can successfully
    communicate with the AutoFocus service.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Initializes the AutoFocus manager with the provided credentials.

    3. Executes a test connectivity query (searching for a dummy IP address, 8.8.8.8)
    against the AutoFocus API.

    4. Returns a success message if the connection is established and the query succeeds,
    or an error message if it fails.


    ### Additional Notes

    This action is typically used during integration setup or troubleshooting to verify
    that the integration is configured correctly.
