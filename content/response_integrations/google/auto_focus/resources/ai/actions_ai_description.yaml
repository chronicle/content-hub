  ai_description: >-
    ### General Description

    The `Hunt Url` action asynchronously searches Palo Alto AutoFocus for intelligence
    and tags associated with URL entities. It retrieves hits from AutoFocus, enriches
    the entities with the findings, marks them as suspicious, and attaches detailed
    reports and insights to the case.


    ### Flow Description

    1. **Initialization**: The action extracts the API key and iterates over the target
    entities, filtering for supported URL entities.

    2. **Hunt Initiation**: For each valid URL, it initiates an asynchronous hunt
    in AutoFocus and stores the query cookie.

    3. **Status Check (Async)**: The action periodically checks the status of the
    hunts using the stored cookies.

    4. **Result Processing**: Once a hunt completes, it retrieves the hits (up to
    the configured limit).

    5. **Enrichment**: The action enriches the entity's additional properties with
    the flattened results, attaches a CSV table of the hits, and adds a JSON report
    as an attachment.

    6. **Finalization**: The entity is marked as enriched and suspicious, an insight
    is created, and the entity is updated in the SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Api Key | String | Yes | The API key used to authenticate with Palo Alto AutoFocus.
    |

    | Results Limit | Integer | No | The maximum number of hunt results (hits) to
    process and attach to the entity. If left empty, all results are processed. |


    ### Additional Notes

    This is an asynchronous action, meaning it will run in the background and periodically
    check for completion to avoid timing out during long-running hunts.
