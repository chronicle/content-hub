Hunt Domain:
  ai_description: >-
    ### General Description

    Hunts for a domain using the AutoFocus integration to retrieve associated threat
    intelligence. This action initiates an asynchronous search, monitors the progress,
    and upon completion, enriches the entity with findings, including threat intelligence
    hits, CSV reports, and JSON data.


    ### Flow Description

    1. The action initializes the AutoFocus manager using the provided API key.

    2. It iterates through the target entities, filtering for `HOSTNAME` types.

    3. For each valid entity, it calls the `autofocus_manager.hunt_domain` method
    to initiate the search.

    4. If the action is running asynchronously, it checks the status of the hunt using
    the `af_cookie` returned from the initial request.

    5. Once the hunt is complete, it retrieves the results (hits) from AutoFocus.

    6. It updates the entity's `additional_properties` with the flattened hit data,
    up to the configured `Results Limit`.

    7. It attaches a CSV table and a JSON report of the findings to the entity.

    8. It marks the entity as enriched and suspicious, and adds an insight summarizing
    the number of hits found.


    ### Additional Notes

    This action is designed to run asynchronously. It supports pagination/limiting
    of results via the `Results Limit` parameter. If no results are found, the entity
    is not enriched.
  ai_short_description: >-
    Hunts for a domain using AutoFocus to retrieve associated threat intelligence
    and enriches the entity with findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, adds insights, and attaches reports/tables to the
      entity within the SOAR platform.
    reasoning: >-
      The action fetches threat intelligence data from AutoFocus (fetches_data=true).
      It updates internal entities with properties, insights, and attachments (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true). It does not mutate external
      systems.
