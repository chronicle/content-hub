Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AutoFocus integration by performing a sample search
    query against the AutoFocus API. This action verifies that the provided API key
    is valid and that the SOAR platform can successfully communicate with the AutoFocus
    service.


    ### Flow Description

    1. The action extracts the `Api Key` from the integration configuration.

    2. It initializes the `AutoFocusManager` using the provided API key.

    3. The action calls the `test_connectivity` method, which executes a sample search
    query (`samples_search`) against the AutoFocus API.

    4. If the API call returns a successful response, the action logs a success message
    and completes with a result value of "true".

    5. If an exception occurs during the API call, the action logs the error and completes
    with a result value of "false".


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration configuration.
    It does not perform any data enrichment or state changes on entities or alerts.
