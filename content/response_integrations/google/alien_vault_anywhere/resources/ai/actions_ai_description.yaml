List Events:
  ai_description: >-
    ### General Description

    Searches for and retrieves events from AlienVault Anywhere based on specified
    criteria such as account name, event name, source name, and time range.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Validates the integration version (only V2 is supported).

    3. Parses the start and end times into Unix timestamps.

    4. Initializes the AlienVaultManagerLoader to connect to the AlienVault Anywhere
    API.

    5. Calls the API to fetch events matching the provided filters.

    6. Constructs a CSV table of the retrieved events and adds it to the action results.

    7. Returns the raw JSON data of the events.


    ### Additional Notes

    This action is only supported for AlienVault Anywhere V2 integration.
