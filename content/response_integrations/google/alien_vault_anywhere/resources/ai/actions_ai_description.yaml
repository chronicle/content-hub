List Events:
  ai_description: >-
    ### General Description

    Searches for and retrieves events from AlienVault Anywhere based on specified
    criteria such as account name, event name, source, and time range. This action
    allows analysts to query historical event data from the AlienVault platform to
    support investigation and threat hunting workflows.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, version, etc.) and action
    parameters (filters) from the integration settings.

    2. Validates the integration version; this action requires AlienVault Anywhere
    V2.

    3. Converts the provided 'Start Time' and 'End Time' parameters from 'DD/MM/YYYY'
    format to Unix timestamps.

    4. Initializes the AlienVault manager using the provided credentials.

    5. Executes a GET request to the AlienVault API to fetch events matching the provided
    filters (account name, event name, source name, time range, and suppression status).

    6. Constructs a CSV table of the retrieved events for display in the action results.

    7. Adds the raw event data as JSON to the action results.


    ### Additional Notes

    This action is read-only and does not modify any data in AlienVault or the SOAR
    platform. It requires the AlienVault Anywhere V2 integration version to function.
