Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AlienVault Anywhere API. This action verifies that the
    integration is correctly configured and can successfully communicate with the
    AlienVault Anywhere instance.


    ### Flow Description

    1. The action extracts the required integration configuration parameters, including
    'Product Version', 'Api Root', 'Username', 'Password', and 'Verify SSL'.

    2. It initializes the appropriate AlienVault manager (V1 or V2) based on the provided
    'Product Version'.

    3. The action executes a connectivity test by making an API request to the AlienVault
    Anywhere instance.

    4. If the request is successful, the action returns a success message; otherwise,
    it logs the error and returns a failure message.


    ### Additional Notes

    This action does not perform any data enrichment or modification. It is strictly
    used for troubleshooting and verifying the health of the integration connection.
