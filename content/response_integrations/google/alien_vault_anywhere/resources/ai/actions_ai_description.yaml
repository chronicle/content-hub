Get Alarm Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific alarm from AlienVault Anywhere using
    its Alarm ID. This action fetches the alarm's metadata and raw data to provide
    additional context for analysts.


    ### Flow Description

    1. Extracts the `Alarm ID` parameter provided by the user or playbook.

    2. Validates that the integration is configured to use version V2, as V1 is not
    supported for this action.

    3. Initializes the AlienVault Anywhere manager and authenticates via the API.

    4. Makes an HTTP GET request to the AlienVault Anywhere API (`/api/2.0/alarms/{alarm_id}`)
    to fetch the alarm details.

    5. Parses the returned data and attaches the alarm details to the action's JSON
    results and a data table.


    ### Additional Notes

    This action only supports AlienVault Anywhere V2. If V1 is configured, the action
    will fail immediately.
  ai_short_description: >-
    Retrieves detailed information for a specific alarm from AlienVault Anywhere using
    its Alarm ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
