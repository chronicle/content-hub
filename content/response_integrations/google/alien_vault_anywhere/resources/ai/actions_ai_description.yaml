Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AlienVault Anywhere instance to verify credentials and
    network access.


    ### Flow Description

    1. Extracts integration configuration parameters (such as API Root, Username,
    Password, and Product Version).

    2. Initializes the AlienVault Anywhere manager based on the configured version
    (V1 or V2).

    3. Makes an API call to test connectivity (fetching license information in V1
    or retrieving a single alarm in V2).

    4. Returns a success message if the connection is successfully established, or
    an error message if it fails.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
    It is primarily used for troubleshooting and verifying integration setup.
