Get Alarm Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information for a specific alarm from the AlienVault Anywhere
    platform using its unique identifier. This action allows analysts to fetch comprehensive
    metadata about an alarm, including its priority, source, and associated rule information,
    directly from the AlienVault system.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, SSL verification)
    and the `Alarm ID` parameter.

    2. Validates that the integration version is V2, as this action is not supported
    for V1.

    3. Initializes the `AlienVaultManager` using the provided credentials and configuration.

    4. Executes an API call to the AlienVault Anywhere platform to retrieve the specific
    alarm details using the provided `Alarm ID`.

    5. Parses the retrieved alarm data into a structured format.

    6. Adds the alarm details to the action's result as a data table and a JSON object
    for further analysis.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in the AlienVault
    platform or the SOAR case. It requires a valid `Alarm ID` which can typically
    be obtained from other connector actions or alert data.
  ai_short_description: >-
    Retrieves detailed information for a specific alarm from AlienVault Anywhere using
    the alarm's unique identifier.
