name: List Events
description: Search for AlienVault events.
integration_identifier: AlienVaultAnywhere
parameters:
-   name: Account Name
    default_value: ''
    type: string
    description: The account name.
    is_mandatory: false
-   name: Event Name
    default_value: ''
    type: string
    description: The name of the event.
    is_mandatory: false
-   name: Source Name
    default_value: ''
    type: string
    description: The source name.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Filtered results will include events that occurred after this timestamp.
        format: DD/MM/YYYY'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Filtered results will include events that occurred before this timestamp.
        format: DD/MM/YYYY'
    is_mandatory: false
-   name: Suppressed
    default_value: 'False'
    type: boolean
    description: Whether to filter events by the suppressed flag.
    is_mandatory: false
-   name: Events Limit
    default_value: '100'
    type: string
    description: Maximum number of events to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
