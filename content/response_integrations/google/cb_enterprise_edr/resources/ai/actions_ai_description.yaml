"Get Events Associated With Process by Process Guid":
  ai_description: >-
    ### General Description

    Retrieves events associated with specific processes based on the information from
    VMware Carbon Black Enterprise EDR. This action provides detailed results on specific
    process activity by searching for events linked to a provided Process GUID.


    ### Flow Description

    1. Extracts the provided Process GUIDs, search criteria, query, time frame, record
    limit, and sorting parameters.

    2. Iterates through each provided Process GUID.

    3. Makes an API call (POST request) to VMware Carbon Black Enterprise EDR to search
    for events associated with the Process GUID using the specified query and filters.

    4. Collects the returned events and formats them into a CSV table and JSON results.

    5. Returns the results to the SecOps platform.


    ### Additional Notes

    The action requires a Process GUID to function correctly. Multiple Process GUIDs
    can be provided as a comma-separated string.
