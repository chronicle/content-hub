"Get Events Associated With Process by Process Guid":
  ai_description: "### General Description\nFetches detailed event logs associated\
    \ with specific processes from VMware Carbon Black Enterprise EDR. This action\
    \ allows analysts to retrieve granular activity data, such as network connections\
    \ or file modifications, for a given process GUID, providing deeper visibility\
    \ into process behavior than standard process searches.\n\n### Flow Description\n\
    1. **Configuration Initialization**: The action initializes the `CBEnterpriseEDRManager`\
    \ using the provided API credentials (API Root, Org Key, API ID, API Secret Key)\
    \ and SSL verification settings.\n2. **Parameter Extraction**: It extracts the\
    \ required action parameters, including the `Process GUID` (or comma-separated\
    \ list), `Query`, and `Record limit`, along with optional parameters like `Search\
    \ Criteria`, `Time Frame`, `Sort By`, and `Sort Order`.\n3. **Event Search**:\
    \ The action iterates through the provided Process GUIDs and executes the `events_search`\
    \ method via the `CBEnterpriseEDRManager` to query the Carbon Black EDR API.\n\
    4. **Result Processing**: \n   - If events are found, the action adds the results\
    \ to a data table in the case wall and stores the raw event data in the action's\
    \ JSON result.\n   - If no events are found or an error occurs, the action logs\
    \ the status and updates the output message accordingly.\n5. **Finalization**:\
    \ The action concludes by returning the status and the collected event data.\n\
    \n### Additional Notes\n- The action requires a valid Process GUID to function.\
    \ \n- The `Search Criteria` parameter currently only accepts `event_type` values\
    \ (e.g., 'netconn').\n- The action supports pagination to handle large result\
    \ sets up to the specified `Record limit`."
  ai_short_description: >-
    Fetches detailed event logs associated with specific processes from VMware Carbon
