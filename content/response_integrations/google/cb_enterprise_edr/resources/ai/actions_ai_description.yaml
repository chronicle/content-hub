  ai_description: >-
    Retrieves events associated with specific processes from VMware Carbon Black Enterprise
    EDR using a Process GUID. This action provides detailed results on specific process
    activity, offering more granularity than a standard process search.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Process GUID | String | Yes | The unique identifier of the process to search
    events for. Multiple values can be provided as a comma-separated string. |

    | Search Criteria | String | No | Criteria for the request. Currently, only 'event_type'
    values (e.g., netconn) are accepted. Multiple values can be comma-separated. |

    | Query | String | Yes | The query to execute in the process search (e.g., 'netconn_action:ACTION_CONNECTION_CREATE').
    |

    | Time Frame | String | No | The timeframe in hours for which to fetch events.
    |

    | Record limit | String | Yes | The maximum number of records to return. |

    | Sort By | String | No | The parameter to sort the data by. |

    | Sort Order | DDL | No | The order to sort the results (ASC or DESC). |


    ### Action Flow

    1. Extracts configuration and action parameters, including the target Process
    GUIDs.

    2. Iterates through the provided Process GUIDs.

    3. Initiates an event search in Carbon Black Enterprise EDR for each GUID using
    the specified query, criteria, and timeframe.

    4. Retrieves and formats the matching events.

    5. Outputs the results as a data table and JSON result for each process GUID.
