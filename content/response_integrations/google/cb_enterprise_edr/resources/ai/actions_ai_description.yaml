  ai_description: >-
    ### General Description

    The `Enrich Hash` action enriches FileHash entities using VMware Carbon Black
    Enterprise EDR. It retrieves detailed metadata and summary information for SHA256
    hashes and updates the entities' additional properties with the findings.


    ### Parameters Description

    This action does not require any specific parameters to be configured in the action
    itself. It relies on the integration's configuration parameters (API Root, Organization
    Key, API ID, API Secret Key, Verify SSL).


    ### Flow Description

    1. Initializes the connection to VMware Carbon Black Enterprise EDR using the
    integration configuration.

    2. Iterates through the target entities, filtering for `FILEHASH` entities where
    the identifier length is exactly 64 characters (indicating a SHA256 hash).

    3. For each valid hash, it fetches the file hash metadata from the EDR platform.

    4. It then fetches the file hash summary (device prevalence, first/last seen)
    from the EDR platform.

    5. Updates the entity's `additional_properties` with the retrieved metadata and
    summary data.

    6. Marks the entity as enriched and saves the updated entities back to the case.

    7. Attaches the raw JSON results to the action's output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities' additional properties with the fetched hash metadata and
      summary.
    reasoning: >-
      The action fetches file hash metadata and summary data from VMware Carbon Black
      Enterprise EDR (fetches_data=true). It does not perform any state-changing operations
      on the external EDR platform (can_mutate_external_data=false). It updates the
      entities in Google SecOps with the fetched data (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alert data, or
      create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to enrich entities. It does
      not mutate external data, and its internal mutations are limited to updating
      entities, which is allowed for enrichment actions. Therefore, it is classified
      as an enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by checking
      `if entity.entity_type not in SUPPORTED_ENTITIES:` where SUPPORTED_ENTITIES
      is `[EntityTypes.FILEHASH]`. It also filters by the length of the identifier
      (`if len(entity.identifier) != 64:`).
