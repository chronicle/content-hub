Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the VMware Carbon Black Enterprise EDR server using the
    provided API credentials. This action ensures that the integration is correctly
    configured and capable of communicating with the external service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Organization
    Key`, `API ID`, `API Secret Key`, and `Verify SSL` from the integration settings.

    2. It initializes the `CBEnterpriseEDRManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Carbon Black Enterprise EDR API endpoint (`/threathunter/watchlistmgr/v3/orgs/{org_key}/watchlists`)
    to verify the connection.

    4. If the API returns a successful response, the action completes with a success
    message and a result value of "true".

    5. If the connection fails (e.g., due to invalid credentials or network issues),
    the action catches the exception, logs the error, and completes with a failure
    message and a result value of "false".


    ### Additional Notes

    This action is a utility function used for troubleshooting and verifying integration
    setup. It does not perform any data enrichment or operational tasks on entities
    or alerts.
  ai_short_description: >-
    Tests connectivity to the VMware Carbon Black Enterprise EDR server.
