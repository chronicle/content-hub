Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using VMware Carbon Black Enterprise EDR. This action
    retrieves metadata and device summary information for SHA256 hashes to provide
    additional context.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash entities.

    2. Validates that the entity identifier is exactly 64 characters long, ensuring
    it is a SHA256 hash.

    3. Makes a GET request to the Carbon Black Enterprise EDR API to fetch metadata
    for the file hash.

    4. Makes a second GET request to the API to fetch the device summary for the file
    hash.

    5. Updates the entity's additional properties with the retrieved enrichment data
    and marks the entity as enriched.

    6. Updates the entities within the platform and attaches the raw data to the JSON
    results.


    ### Additional Notes

    - This action only supports File Hash entities in SHA256 format. Hashes of other
    formats (e.g., MD5, SHA1) will be skipped.
  ai_short_description: >-
    Enriches SHA256 File Hash entities by retrieving metadata and device summary information
    from VMware Carbon Black Enterprise EDR.
