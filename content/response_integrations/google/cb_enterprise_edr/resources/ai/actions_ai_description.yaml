Process Search:
  ai_description: >-
    ### General Description

    Searches for process activity on a host using the CB Enterprise EDR platform.
    This action allows analysts to query process data based on specific criteria such
    as process name or hash, providing visibility into endpoint activity.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Organization Key, API ID, API
    Secret Key, Verify SSL) and action parameters (Query, Time Frame, Record limit,
    Sort By, Sort Order).

    2. Iterates through the provided target entities, filtering for those of type
    `HOSTNAME`.

    3. For each valid entity, the action calls the `CBEnterpriseEDRManager.process_search`
    method, which performs a POST request to initiate a search job on the CB Enterprise
    EDR platform.

    4. The action polls the search job results via a GET request to retrieve the process
    data.

    5. If results are found, it constructs a CSV table of the process data and adds
    it to the action output.

    6. Updates the successful entities within the SOAR platform.

    7. Returns the raw JSON results of the search.


    ### Additional Notes

    This action is a read-only operation regarding external systems and does not modify
    any external configurations or security policies. It focuses on retrieving and
    presenting process telemetry for investigation purposes.
