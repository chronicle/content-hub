Process Search:
  ai_description: >-
    ### General Description

    Searches for process activity on a host with a Carbon Black Enterprise EDR sensor
    based on provided search parameters. The action accepts Hostname entities and
    retrieves historical process execution data matching the query.


    ### Flow Description

    1. Iterates over the provided target entities, filtering for those of type `HOSTNAME`.

    2. For each valid entity, initiates a process search job via the Carbon Black
    Enterprise EDR API (POST `/api/investigate/v2/orgs/{org_key}/observations/search_jobs`).

    3. Polls the API to retrieve the search job results (GET `/api/investigate/v2/orgs/{org_key}/observations/search_jobs/{job_id}/results`).

    4. If processes are found, attaches a data table to the action result containing
    the process details.

    5. Updates the successful entities and aggregates the raw JSON results for all
    processed entities.


    ### Additional Notes

    - The action requires valid Carbon Black Enterprise EDR credentials configured
    at the integration level.

    - The `Query` parameter allows for advanced filtering, such as `process_name:svchost.exe`
    or `process_hash:<hash>`.
  ai_short_description: >-
    Searches for process activity on a host with a Carbon Black Enterprise EDR sensor
    based on provided search parameters.
