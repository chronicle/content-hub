Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using VMware Carbon Black Enterprise EDR. This action
    retrieves file metadata and device summary information for a given SHA256 hash
    to provide context for security investigations.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Organization Key,
    API ID, API Secret Key, Verify SSL).

    2. Iterates through the provided entities, filtering for those of type `FILEHASH`
    with a length of 64 characters (SHA256).

    3. For each valid entity, calls the VMware Carbon Black Enterprise EDR API to
    fetch file metadata (`get_filehash_metadata`).

    4. Calls the API again to fetch the file summary (`get_filehash_summary`).

    5. Updates the entity's `additional_properties` with the retrieved metadata and
    summary data.

    6. Marks the entity as enriched (`is_enriched = True`).

    7. Updates the entities in the SOAR platform and adds the combined JSON results
    to the action output.


    ### Additional Notes

    This action specifically requires SHA256 hashes. It will skip any entities that
    do not meet the type or length requirements.
  ai_short_description: >-
    Enriches File Hash entities by retrieving metadata and device summary information
    from VMware Carbon Black Enterprise EDR.
