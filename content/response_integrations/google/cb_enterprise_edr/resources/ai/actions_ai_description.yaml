  ai_description: >-
    ### General Description

    Tests connectivity to the VMware Carbon Black Enterprise EDR server using the
    provided integration configuration parameters. This action is used to verify that
    the credentials and network settings are correct and that the SecOps platform
    can successfully communicate with the Carbon Black API.


    ### Flow Description

    1. Retrieves integration configuration parameters (API Root, Organization Key,
    API ID, API Secret Key, Verify SSL).

    2. Initializes the `CBEnterpriseEDRManager` with the retrieved credentials.

    3. Calls the `test_connectivity` method, which makes a GET request to the watchlists
    endpoint to verify access.

    4. Returns a success or failure message based on the HTTP response.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration-level configuration parameters.


    ### Additional Notes

    This action is typically run manually during the initial setup of the integration
    to ensure connectivity is established before running other actions.
