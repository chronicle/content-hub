  ai_description: >-
    ### General Description

    Searches for process activity on a host using VMware Carbon Black Enterprise EDR
    based on provided search parameters. The action retrieves telemetry data about
    processes executed on the specified Hostname entities and attaches the results
    as a data table and JSON output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | False | Query to execute in process search. For example, `process_name:svchost.exe`
    to search by process name, or `process_hash:9520a99e77d6196d0d09833146424113`
    to search by process hash. |

    | Time Frame | String | False | Specify a time frame in hours for which to fetch
    process activity. |

    | Record limit | String | True | Specify the maximum number of records that can
    be returned by the action. |

    | Sort By | String | False | Specify a field parameter for sorting the returned
    data. |

    | Sort Order | Dropdown | False | Sort order for the results. Expected values
    are `ASC` or `DESC`. |


    ### Flow Description

    1. Iterates through the provided target entities, filtering for `HOSTNAME` entities.

    2. Initiates a process search job in CB Enterprise EDR for each valid host using
    the specified query, timeframe, and limits.

    3. Polls the search job until results are available or the record limit is reached.

    4. Attaches the retrieved process data as a data table to the case for each successful
    entity.

    5. Updates the successful entities in the SecOps platform and returns the raw
    data as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entities that successfully returned process search results.
    reasoning: >-
      The action fetches process telemetry data from CB Enterprise EDR using a search
      job (fetches_data=true). It does not mutate any external data (can_mutate_external_data=false).
      Internally, it updates the entities that successfully returned results (can_update_entities=true)
      and attaches data tables, but does not create insights, modify alerts, or add
      case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action is an Enrichment action because it proactively fetches data from
      an external source (CB Enterprise EDR) without mutating external state, and
      only performs allowed internal updates (updating entities). It is not a Remediation
      action as it does not block, contain, or disable any resources.
    remediation: false
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and explicitly filters them
      using `if entity.entity_type not in SUPPORTED_ENTITIES`, where `SUPPORTED_ENTITIES`
      is defined as `[EntityTypes.HOSTNAME]`. Therefore, it targets HOSTNAME entities
      and filters by entity type.
