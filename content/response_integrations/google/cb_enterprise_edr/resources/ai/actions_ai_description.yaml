Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the VMware Carbon Black Enterprise EDR server using the
    provided integration configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Organization Key,
    API ID, API Secret Key, Verify SSL).

    2. Initializes the VMware Carbon Black Enterprise EDR manager.

    3. Makes a GET request to the `/threathunter/watchlistmgr/v3/orgs/{org_key}/watchlists`
    endpoint to verify API access and authentication.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is primarily used for setup and troubleshooting to ensure that the
    integration can successfully communicate with the VMware Carbon Black Enterprise
    EDR API.
