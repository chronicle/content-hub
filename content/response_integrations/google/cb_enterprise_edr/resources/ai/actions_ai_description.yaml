    reasoning: >-
      The action fetches data from the Carbon Black Enterprise EDR API via GET requests
      to retrieve hash metadata and summaries. It does not mutate external data. It
      updates internal entities with the fetched enrichment data using `siemplify.update_entities`.
      It does not create insights, modify alert data, or create case comments.
