name: Process Search
description: Search information about process activity on the host with CB sensor
    based on the provided search parameters. The action accepts Host Siemplify entities.
integration_identifier: CBEnterpriseEDR
parameters:
-   name: Query
    default_value: ''
    type: string
    description: Query to execute in process search. For example, process_name:svchost.exe
        - to search based by process name, process_hash:9520a99e77d6196d0d09833146424113
        - to search based by process hash.
    is_mandatory: false
-   name: Time Frame
    default_value: '4'
    type: string
    description: Specify a time frame in hours for which to fetch alerts.
    is_mandatory: false
-   name: Record limit
    default_value: '20'
    type: string
    description: Specify how many records can be returned by the action.
    is_mandatory: true
-   name: Sort By
    default_value: ''
    type: string
    description: Specify a parameter for sorting the data.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Sort order.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/process_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME"]}'
