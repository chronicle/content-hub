    | Priority | DDL | Yes | Assigns a priority to the investigation (High, Medium,
    Low). |

    | Hint | String | No | Automatically links related investigations and avoids creating
    many cases from multiple alerts related to the same incident. |

    | Name | String | No | Gives the investigation a meaningful name. If the name
