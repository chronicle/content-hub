Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee Mvision EDR V2 server by validating authentication
    credentials. This action ensures that the integration is correctly configured
    and can successfully communicate with the McAfee Mvision EDR V2 API.


    ### Flow Description

    1. Extract configuration parameters (API Root, IAM Root, Client ID, Client Secret,
    API Key, Scopes, Verify SSL) from the integration settings.

    2. Initialize the `McAfeeMvisionEDRV2Manager` with the provided configuration.

    3. During initialization, the manager attempts to authenticate by performing an
    HTTP GET request to the IAM token endpoint (`/iam/v1.0/token`) using the provided
    credentials.

    4. If the authentication request is successful, the action confirms connectivity
    and reports success.

    5. If the authentication request fails, the action logs the error and reports
    a connection failure.


    ### Additional Notes

    This action does not operate on any entities and is strictly used for verifying
    the connectivity between the SOAR platform and the McAfee Mvision EDR V2 server.
  ai_short_description: >-
    Tests connectivity to the McAfee Mvision EDR V2 server by validating authentication
    credentials.
