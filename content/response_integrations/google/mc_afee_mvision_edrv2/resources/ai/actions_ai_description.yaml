    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Case Type | ddl | Yes | Defines the type of alert. |

    | Priority | ddl | Yes | Assigns a priority to the investigation. |

    | Hint | string | No | Automatically links related investigations and avoids creating
    many cases from multiple alerts related to the same incident. If the same hint
    is used, the evidences will be added to the already existing investigation. |

    | Name | string | No | Gives the investigation a meaningful name. If the name
    is missing, a default case name is assigned. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee Mvision EDR V2 API.


    ### Flow Description

    1. Extracts integration configuration parameters.

    2. Initializes the McAfee Mvision EDR V2 manager.

    3. Makes an API call to the `/iam/v1.0/token` endpoint to authenticate and retrieve
    an authorization token.

    4. Returns a successful execution state if the connection is established, otherwise
    returns a failure.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly.
  ai_short_description: >-
    Tests connectivity to the McAfee Mvision EDR V2 API by authenticating and retrieving
    an authorization token.
