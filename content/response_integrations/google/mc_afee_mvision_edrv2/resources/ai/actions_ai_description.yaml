Create Investigation:
  ai_description: >-
    ### General Description

    Creates a new investigation in McAfee Mvision EDR V2 for IP address and hostname
    entities. This action initiates a state change on the external EDR platform by
    generating a new investigation record associated with the specified indicators.


    ### Flow Description

    1. Initializes a connection to the McAfee Mvision EDR V2 API using the provided
    credentials.

    2. Iterates through the target entities provided in the case.

    3. Filters entities to process only those of type `ADDRESS` or `HOSTNAME`.

    4. Makes a POST request to the McAfee Mvision EDR V2 API to create an investigation
    for each valid entity, applying the specified case type, priority, name, and hint.

    5. Collects the created investigation details, adds them to a data table, and
    returns the information as a JSON result.


    ### Additional Notes

    - Only `ADDRESS` and `HOSTNAME` entity types are supported; other entity types
    will be skipped.

    - If a `Hint` is provided, the action will pause for 10 seconds between requests
    to avoid rate limiting (429 errors) when adding evidence to an existing investigation.
  ai_short_description: >-
    Creates a new investigation in McAfee Mvision EDR V2 for IP address and hostname
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new investigation record in the McAfee Mvision EDR V2 platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee Mvision EDR V2 API to create a
      new investigation, which mutates external data. It does not fetch contextual
      data for enrichment, nor does it mutate internal SecOps data, update entities,
      or create insights.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: true
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks `if
      entity.entity_type == EntityTypes.ADDRESS:` and `elif entity.entity_type ==
      EntityTypes.HOSTNAME:`. Therefore, it targets ADDRESS and HOSTNAME entities
      and filters them by their entity_type.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action creates an investigation in an EDR platform. While similar to creating
      a ticket, it does not strictly integrate with an ITSM (like Jira or ServiceNow)
      for ticketing purposes, nor does it match any other specific outcome categories
      such as blocking an IOC or containing a host.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
