Create Investigation:
  ai_description: >-
    ### General Description

    Creates investigations in McAfee Mvision EDR V2 for specified IP address and hostname
    entities. This action allows analysts to initiate guided investigations directly
    from the SOAR platform, facilitating streamlined incident response workflows.


    ### Flow Description

    1. Initializes the McAfee Mvision EDR V2 manager using the provided configuration
    parameters (API Root, IAM Root, Client ID, Client Secret, API Key, and Scopes).

    2. Iterates through the provided target entities.

    3. For each entity, checks if it is an `ADDRESS` or `HOSTNAME` type.

    4. If it is an `ADDRESS`, calls the `create_ip_investigation` method, which sends
    a POST request to the McAfee API to create an investigation.

    5. If it is a `HOSTNAME`, calls the `create_hostname_investigation` method, which
    sends a POST request to the McAfee API to create an investigation.

    6. Collects the results and adds them to the action's result data table and JSON
    output.


    ### Additional Notes

    The action supports optional parameters like `Name` and `Hint` to customize the
    investigation creation. A delay is introduced if a `Hint` is provided to avoid
    rate limiting.
  ai_short_description: >-
    Creates investigations in McAfee Mvision EDR V2 for IP address and hostname entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new investigation record in McAfee Mvision EDR V2.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee Mvision EDR V2 API to create an
      investigation. This mutates external data. It does not fetch data, update internal
      entities, or create insights.
