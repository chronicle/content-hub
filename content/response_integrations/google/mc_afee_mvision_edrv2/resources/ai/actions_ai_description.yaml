    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an authentication check to verify connectivity. It does
      not fetch contextual data about entities or alerts, nor does it mutate any external
