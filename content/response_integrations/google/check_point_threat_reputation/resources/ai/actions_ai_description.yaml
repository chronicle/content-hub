Get File Hash Reputation:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the CheckPoint Threat Reputation service. It
    retrieves threat intelligence and reputation data for MD5, SHA1, and SHA256 hashes,
    evaluating their risk based on a specified threshold.


    ### Flow Description

    1. Connects to the CheckPoint Threat Reputation service using the provided API
    credentials.

    2. Iterates through the target File Hash entities.

    3. Makes a POST request to the CheckPoint API (`/file-rep/service/v2.0/query`)
    to fetch reputation data for each file hash.

    4. Evaluates the returned risk score against the provided `Threshold` and checks
    if the classification is not in the whitelist. If both conditions are met, marks
    the entity as suspicious.

    5. Optionally creates an insight for the entity if `Create Insight?` is enabled.

    6. Updates the entity's additional properties with the retrieved reputation data
    and marks it as enriched.

    7. Provides the results in JSON and CSV formats.


    ### Additional Notes

    Only supports File Hash entities.
  ai_short_description: >-
    Enriches File Hash entities by retrieving threat intelligence and reputation data
    from the CheckPoint Threat Reputation service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API request to CheckPoint Threat Reputation to fetch file
      hash reputation data. It does not mutate external data, but it updates internal
      entities and creates insights based on the retrieved data.
