Get Host Reputation:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence including risk scores, classifications, and
    context data to evaluate the reputation of the provided hostnames.


    ### Flow Description

    1. Iterates over the target entities and filters for Hostname entities.

    2. Makes a POST request to the CheckPoint Threat Reputation API (`/url-rep/service/v2.0/query`)
    to fetch reputation data for each valid hostname.

    3. Evaluates the returned risk score against the provided threshold and checks
    the classification against a predefined whitelist.

    4. Marks the entity as suspicious if the risk exceeds the threshold and the classification
    is not whitelisted.

    5. Updates the entity's additional properties with the fetched reputation data.

    6. Optionally creates an insight for the entity based on the action parameters.

    7. Adds a data table with the reputation details and updates the entities in the
    platform.


    ### Additional Notes

    The action requires a valid API key and API root URL configured in the integration
    settings.
