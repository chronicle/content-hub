  ai_description: >-
    Enriches File Hash entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence and reputation data for file hashes (MD5,
    SHA1, SHA256). It evaluates the risk based on a provided threshold, updates the
    entity's suspicious status, and appends the reputation data to the entity's properties.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | Mark entity as suspicious if the returned risk value
    for the entity is strictly greater than this given threshold. |

    | Create Insight? | Boolean | No | Specify whether a Siemplify Insight should
    be created based on the action result. |


    ### Action Flow

    1. Establishes a connection to the CheckPoint Threat Reputation service.

    2. Iterates through the target entities and filters for supported File Hash entities.

    3. Fetches reputation data for each valid file hash from the external service.

    4. Evaluates the risk score against the configured threshold and whitelist classifications
    to determine if the entity is suspicious.

    5. Optionally creates an insight for the entity if the `Create Insight?` parameter
    is enabled.

    6. Updates the entity's additional properties with the fetched reputation data
    and marks it as enriched.

    7. Generates a CSV data table and JSON results for the enriched entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches reputation data from the CheckPoint Threat Reputation API.
      It does not mutate any external data (the POST request is strictly for querying
      reputation). Internally, it updates entity properties, sets the suspicious flag,
      and optionally creates insights, but does not mutate other internal case or
      alert data.
  categories:
    enrichment: true
    reasoning: >-
      The action proactively fetches data from an external source (CheckPoint) to
      gather supplemental context about file hash entities. It does not modify external
      state and only modifies internal state by updating entities and creating insights.
      Therefore, it is classified as an Enrichment action. It does not perform any
      remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly checks `if
      entity.entity_type not in SUPPORTED_ENTITIES`, where `SUPPORTED_ENTITIES` is
      defined as `EntityTypes.FILEHASH`. Thus, it filters entities by their entity
      type and specifically targets FILEHASH entities.
