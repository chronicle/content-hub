Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CheckPoint Threat Reputation service using the provided
    integration configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters, including the API Root,
    API Key, and SSL verification settings.

    2. Initializes the CheckPoint Threat Reputation manager and generates a session
    token.

    3. Makes a GET request to the CheckPoint Threat Reputation API (`/rep-auth/service/v1.0/request`)
    to verify connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to ensure
    that the provided credentials and network settings are correct.
