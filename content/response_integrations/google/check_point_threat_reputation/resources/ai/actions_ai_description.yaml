      using a POST request to a query endpoint (fetches_data=true). It does not mutate
      any external data (can_mutate_external_data=false). It mutates internal data
      by updating entity properties, marking entities as suspicious/enriched, and
      optionally creating insights (can_mutate_internal_data=true, can_update_entities=true,
      can_create_insight=true). It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source, does not mutate external state,
      and only performs allowed internal mutations (updating entities and creating
      insights). Therefore, it is classified as an Enrichment action. It does not
      perform any remediation tasks like blocking or isolating.
    remediation: false
  entity_usage:
