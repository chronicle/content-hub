Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the CheckPoint Threat Reputation service to ensure the integration
    is correctly configured and communicating with the external API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, and `Verify SSL`.

    2. It initializes the `CheckPointThreatReputationManager` using these parameters.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the service's ping endpoint.

    4. If the request is successful, the action logs the success and completes. If
    the request fails, the action logs the error and terminates with a failure status.


    ### Additional Notes

    This action does not perform any data enrichment or mutation. It is strictly used
    for validating the connection between the SOAR platform and the CheckPoint Threat
    Reputation service.
