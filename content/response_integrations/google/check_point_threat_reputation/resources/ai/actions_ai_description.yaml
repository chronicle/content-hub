Get Host Reputation:
  ai_description: >-
    ### General Description

    Enriches Hostname entities by querying the CheckPoint Threat Reputation service.
    This action retrieves comprehensive reputation data, including risk scores, classification,
    and contextual metadata, to assist analysts in evaluating the security posture
    of host assets.


    ### Flow Description

    1. **Initialization**: The action initializes a connection to the CheckPoint Threat
    Reputation service using the provided API credentials and SSL verification settings.

    2. **Entity Processing**: The action iterates through all target entities, filtering
    specifically for those of type `HOSTNAME`.

    3. **Data Retrieval**: For each valid host, the action performs an API request
    to the CheckPoint Threat Reputation service to fetch reputation details.

    4. **Risk Evaluation**: The retrieved risk score is compared against the user-defined
    `Threshold`. If the risk exceeds this threshold and the classification is not
    in the allowlist, the entity is marked as suspicious.

    5. **Insight Creation**: If the `Create Insight?` parameter is enabled, an insight
    containing the reputation details is attached to the entity.

    6. **Entity Update**: The entity is updated with additional properties containing
    the enriched data, and the entity is marked as enriched.

    7. **Result Reporting**: A data table containing the reputation details is added
    to the action results, and the final status is reported.


    ### Additional Notes

    This action is strictly an enrichment operation and does not perform any state-changing
    mutations on external systems. It relies on the CheckPoint Threat Reputation API
    to provide intelligence on host entities.
