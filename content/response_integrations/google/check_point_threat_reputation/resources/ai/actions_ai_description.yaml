  ai_description: >-
    Enriches Hostname entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence and reputation data for the specified hostnames
    to determine their risk level.


    ### Flow Description

    1. Establishes a connection to the CheckPoint Threat Reputation service using
    the provided API credentials.

    2. Iterates over the target entities, filtering for supported `HOSTNAME` entities.

    3. Fetches reputation data (risk score, classification, context) for each valid
    hostname.

    4. Evaluates the risk score against the provided `Threshold` parameter. If the
    risk exceeds the threshold and the classification is not whitelisted, the entity
    is marked as suspicious.

    5. Optionally creates a case insight for the entity if the `Create Insight?` parameter
    is enabled.

    6. Updates the entity's additional properties with the fetched reputation data
    and marks the entity as enriched.

    7. Generates a CSV data table and JSON results containing the raw and parsed reputation
    details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threshold | Integer | Yes | Mark entity as suspicious if the returned risk value
    for the entity is above this given threshold. Default is 0. |

    | Create Insight? | Boolean | No | Specify whether a Siemplify Insight should
    be created based on the action result. Default is False. |
  capabilities:
