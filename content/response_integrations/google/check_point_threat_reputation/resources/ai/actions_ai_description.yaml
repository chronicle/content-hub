Get IP Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the CheckPoint Threat Reputation service. This
    action retrieves comprehensive threat intelligence, including risk scores, reputation
    classification, and contextual metadata (such as ASN, location, and malware associations).
    It evaluates the risk against a user-defined threshold to determine if the entity
    should be marked as suspicious.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL) and action
    parameters (Threshold, Create Insight?).

    2. Initializes the `CheckPointThreatReputationManager` to establish a connection
    with the CheckPoint Threat Reputation service.

    3. Iterates through the provided `target_entities`, filtering specifically for
    `ADDRESS` type entities.

    4. For each valid entity, calls the CheckPoint API to fetch reputation data.

    5. Evaluates the returned risk score against the provided `Threshold` and checks
    the classification against a whitelist.

    6. Updates the entity's `is_suspicious` status and adds the enriched data to the
    entity's `additional_properties`.

    7. Optionally creates an entity insight if the `Create Insight?` parameter is
    enabled.

    8. Adds a data table containing the reputation details to the action results.

    9. Updates the entities in the SOAR platform with the new information.


    ### Additional Notes

    This action requires a valid API key and API root for the CheckPoint Threat Reputation
    service. It does not perform any external mutations (e.g., blocking IPs) but focuses
    solely on enrichment and internal entity updates.
