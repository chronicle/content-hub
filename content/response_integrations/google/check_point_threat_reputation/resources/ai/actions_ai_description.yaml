    reasoning: >-
      The action fetches reputation, malware family, and threat intelligence for a
      file hash indicator from CheckPoint Threat Reputation. This directly aligns
      with the 'Enrich IOC' expected outcome. It does not perform any asset enrichment,
      alert updates, ticketing, or remediation actions.
    remove_ioc_from_allowlist: false
