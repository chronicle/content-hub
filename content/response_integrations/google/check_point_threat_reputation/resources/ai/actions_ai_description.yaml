Get IP Reputation:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the CheckPoint Threat Reputation service. This
    action retrieves threat intelligence, including risk scores and reputation classifications,
    to evaluate the potential threat level of an IP address.


    ### Flow Description

    1. Initializes the connection to the CheckPoint Threat Reputation service using
    the provided API credentials.

    2. Iterates through the target entities, filtering specifically for IP Address
    entities.

    3. For each valid entity, makes an API call (`POST /ip-rep/service/v2.0/query`)
    to fetch IP reputation data from CheckPoint.

    4. Evaluates the returned risk score against the configured `Threshold` and checks
    if the classification is not in the whitelist. If both conditions are met, marks
    the entity as suspicious.

    5. Optionally creates an insight for the entity containing the reputation details,
    if configured to do so.

    6. Enriches the entity's additional properties with the flattened reputation data.

    7. Generates a CSV data table with the reputation results for each entity.

    8. Updates the enriched entities within the Google SecOps platform.


    ### Additional Notes

    - The action will skip entities that are not of type ADDRESS.

    - The whitelist classifications used for evaluation are "Benign" and "Unclassified".
