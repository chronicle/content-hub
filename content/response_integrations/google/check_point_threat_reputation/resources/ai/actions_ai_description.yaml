Get File Hash Reputation:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the CheckPoint Threat Reputation service. This
    action retrieves comprehensive threat intelligence, including risk scores, malware
    families, and classification details, to help analysts assess the potential threat
    posed by a specific file hash.


    ### Flow Description

    1. The action initializes a connection to the CheckPoint Threat Reputation service
    using the provided API credentials.

    2. It iterates through the provided target entities, filtering for File Hash types.

    3. For each valid File Hash entity, the action queries the CheckPoint API to retrieve
    reputation data.

    4. The retrieved risk score is evaluated against the user-defined threshold, and
    the classification is checked against a whitelist.

    5. Based on the evaluation, the entity's `is_suspicious` status is updated.

    6. If the 'Create Insight?' parameter is enabled, an insight is generated and
    attached to the entity.

    7. The entity's additional properties are updated with the enriched data, and
    a data table is added to the action results.

    8. Finally, the action updates the entities within the SOAR platform.


    ### Additional Notes

    This action supports file hashes in MD5, SHA1, and SHA256 formats. It requires
    a valid API key and API root URL for the CheckPoint Threat Reputation service.
  ai_short_description: >-
    Enriches File Hash entities with threat intelligence from the CheckPoint Threat
    Reputation service, evaluating risk and updating entity status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from an external API (CheckPoint Threat Reputation)
      to enrich entities. It updates internal entities with this data and optionally
      creates insights. It does not mutate external data (the API call is a query)
      or modify alert/case data.
