name: Get IP Reputation
description: Enrich Siemplify IP entity based on the information from the CheckPoint
    Threat Reputation service.
integration_identifier: CheckPointThreatReputation
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: Mark entity as suspicious if the returned risk value for entity is
        above a given threshold.
    is_mandatory: true
-   name: Create Insight?
    default_value: ''
    type: boolean
    description: Specify whether the Siemplify Insight should be created based on
        the action result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_ip_reputation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
