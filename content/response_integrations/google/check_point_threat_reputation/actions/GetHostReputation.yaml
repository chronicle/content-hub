name: Get Host Reputation
description: Enrich the Siemplify Host entity based on the information from the CheckPoint
    Threat Reputation service.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/check-point-threat-reputation#get_host_reputation
integration_identifier: CheckPointThreatReputation
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: Mark entity as suspicious if the returned risk value for entity is
        above a given threshold.
    is_mandatory: true
-   name: Create Insight?
    default_value: ''
    type: boolean
    description: Specify whether the Siemplify Insight should be created based on
        the action result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_host_reputation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME"]}'
