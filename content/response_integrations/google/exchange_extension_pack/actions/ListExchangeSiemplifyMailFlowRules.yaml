name: List Exchange-Siemplify Mail Flow Rules
description: 'Action will get as a parameter a rule name and will list it. Note -
    to use this action, please make sure you have Organization Management permissions,
    as stated here: https://docs.microsoft.com/en-us/exchange/permissions-exo/feature-permissions'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Rule Name To List
    default_value: ''
    type: ddl
    optional_values:
    - Siemplify - Senders List - Permanently Delete
    - Siemplify - Domains List - Permanently Delete
    - All available Exchange-Siemplify Mail Flow Rules
    description: Specify the Rule name you would like to list
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/list_exchange_siemplify_mail_flow_rules_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
