name: Remove Domains from Exchange-Siemplify Mail Flow Rules
description: 'Action will get as a parameter a list of Domains, and will be able to
    remove the provided domains from the existing rules. Note - to use this action,
    please make sure you have Organization Management permissions, as stated here:
    https://docs.microsoft.com/en-us/exchange/permissions-exo/feature-permissions'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Domains
    default_value: ''
    type: string
    description: Specify the Domains you would like to remove from the rule, in a
        comma separated list.
    is_mandatory: false
-   name: Rule to remove Domains from
    default_value: Siemplify - Domains List - Permanently Delete
    type: ddl
    optional_values:
    - Siemplify - Domains List - Permanently Delete
    description: Specify the rule to remove the Domains from. If the rule doesn't
        exist - action will do nothing.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remove_domains_from_exchange_siemplify_mail_flow_rules_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
