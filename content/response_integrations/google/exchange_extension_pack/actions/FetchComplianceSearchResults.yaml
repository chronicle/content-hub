name: Fetch Compliance Search Results
description: 'Fetch results for the completed Compliance Search. Note: Action is not
    working on Siemplify entities. Note2: Maximum of 200 elements will be displayed,
    but actual search can have more findings that are shown.'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Compliance Search Name
    default_value: ''
    type: string
    description: Name for the Compliance Search. Note that name shouldn't contain
        special characters.
    is_mandatory: true
-   name: Max Emails To Return
    default_value: ''
    type: string
    description: Specify how many emails action can return.
    is_mandatory: false
-   name: Remove Compliance Search Once Action Completes?
    default_value: true
    type: boolean
    description: Specify whether action should remove from Exchange server the search
        action and any related fetch or purge tasks once the action completes.
    is_mandatory: false
-   name: Create Case Wall Output Table?
    default_value: true
    type: boolean
    description: Specify if action should create case wall output table. If Max Emails
        To Return is set to a bigger number, its recommended to uncheck this to increase
        action performance.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/fetch_compliance_search_results_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
