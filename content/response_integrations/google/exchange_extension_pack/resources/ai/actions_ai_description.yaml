  ai_description: >-
    ### General Description

    Removes specified domains from an existing Exchange mail flow rule. This action
    connects to an Exchange On-Prem or Office 365 environment via PowerShell, retrieves
    the specified mail flow rule, and removes the provided domains from its conditions.
    This is typically used to unblock domains that were previously added to a deletion
    or quarantine rule.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Domains | String | False | Specify the Domains you would like to remove from
    the rule, in a comma separated list. |

    | Rule to remove Domains from | String | True | Specify the rule to remove the
    Domains from. If the rule doesn't exist - action will do nothing. |


    ### Additional Notes

    - The action requires integration configuration parameters to determine the connection
    type. Either `Is Exchange On-Prem?` or `Is Office365 (Exchange Online)?` must
    be set to true.

    - If connecting to Office 365, the `Exchange Office365 Online Powershell Uri`
    parameter must be provided.

    - The action uses PowerShell to execute commands on the Exchange server.


    ### Flow Description

    1. Connects to the Exchange server (On-Prem or Office 365) using PowerShell based
    on the configuration parameters.

    2. Validates the provided domains using a regular expression.

    3. Retrieves the existing mail flow rule specified in the parameters.

    4. Removes the valid domains from the rule's conditions.

    5. Returns the successfully removed domains, domains that didn't exist in the
    rule, and invalid domains.
