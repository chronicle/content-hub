Purge Compliance Search Results:
  ai_description: >-
    ### General Description

    Purges emails identified by a previously executed Compliance Search on an Exchange
    server (On-Premise or Office 365). This action initiates a purge task to remove
    the identified emails, supporting both SoftDelete and HardDelete operations. It
    is designed to clean up mailboxes based on the results of a compliance search.


    ### Flow Description

    1. The action initializes the `ExchangeExtensionPackManager` using the provided
    configuration parameters (server address, credentials, etc.).

    2. If it is the first run, it triggers the `create_compliance_search_purge` operation
    on the Exchange server using the specified `Compliance Search Name` and the selected
    deletion state (SoftDelete or HardDelete).

    3. The action enters a polling loop (via `QueryState` mode) to check the status
    of the purge operation using `get_compliance_search_purge_results`.

    4. Once the purge operation is completed, if the `Remove Compliance Search Once
    Action Completes?` parameter is set to true, the action calls `remove_compliance_search`
    to delete the compliance search object from the Exchange server.

    5. The action returns the final status and results count to the SOAR platform.


    ### Additional Notes

    This action does not operate on Siemplify entities. It is an asynchronous action
    that requires polling to complete. Ensure that the Exchange server is accessible
    and the provided credentials have the necessary permissions to perform compliance
    searches and purges.
