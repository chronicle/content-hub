    update_email: false
    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Compliance Search Name | String | Yes | Name for the Compliance Search. Should
    not contain special characters. |

    | Subject Filter | String | No | Filter condition for the email subject. |

    | Sender Filter | String | No | Filter condition for the email sender. |

    | Recipient Filter | String | No | Filter condition for the email recipient. |

    | Operator | DDL | No | Operator (AND/OR) to construct the query from conditions.
    |

    | Time Frame (hours) | String | No | Time frame interval in hours to search for
    emails. |

    | Location to Search Emails In | String | Yes | Location to search (comma-separated
    mailboxes, distribution group, or 'All'). |

    | Fetch Compliance Search Results? | Boolean | No | Whether to immediately fetch
    the compliance search results. |

    | Max Emails To Return | String | No | Maximum number of emails to return. |

    | Create Case Wall Output Table? | Boolean | No | Whether to create a case wall
    output table. |

    | Advanced Query | String | No | Custom KQL query to run instead of standard filters.
    |
