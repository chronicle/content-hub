"Add Domains to Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    Adds a list of domains to a specified Exchange mail flow rule. If the rule does
    not exist, the action will create it. This is typically used to filter or block
    emails originating from or containing specific domains.


    ### Flow Description

    1. Validates the provided list of domains from the action parameters.

    2. Connects to the Exchange server (On-Prem or Office 365) via PowerShell.

    3. Checks if the specified mail flow rule exists.

    4. If the rule exists, updates it by adding the valid domains.

    5. If the rule does not exist, creates a new rule with the specified domains and
    predefined conditions/actions.

    6. Returns a JSON result detailing successfully added domains, domains already
    in the rule, and invalid domains.


    ### Additional Notes

    Requires Organization Management permissions on the Exchange Server.
  ai_short_description: >-
    Adds a list of domains to a specified Exchange mail flow rule, creating the rule
    if it does not already exist.
