"Add Domains to Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    This action adds a list of domains to a specified mail flow rule on an Exchange
    Server (On-Prem or Office 365). It ensures the rule exists, creating it if necessary,
    and updates it with the provided domains.


    ### Flow Description

    1. Extracts configuration parameters (server details, credentials) and action
    parameters (domains, rule name).

    2. Validates the provided domains.

    3. Initializes the `ExchangeExtensionPackManager` to handle PowerShell communication
    with the Exchange Server.

    4. Checks for the existence of the specified mail flow rule using `Get-TransportRule`.

    5. If the rule exists, it updates the rule using `Set-TransportRule` to include
    the new domains. If the rule does not exist, it creates a new rule using `New-TransportRule`.

    6. Returns the result of the operation, including successfully added domains and
    any invalid domains.


    ### Additional Notes

    Requires Organization Management permissions on the Exchange Server. Supports
    both Exchange On-Prem and Office 365.
