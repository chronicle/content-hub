    1. Initiates a compliance search preview action on the Exchange server for the
    specified search name.

    2. Periodically checks the status of the preview action (as this is an asynchronous
    action).

    3. Once completed, retrieves the search results up to the specified limit.

    4. Optionally removes the compliance search from the Exchange server if configured
    to do so.

    5. Returns the results as JSON and optionally creates a case wall output table.


