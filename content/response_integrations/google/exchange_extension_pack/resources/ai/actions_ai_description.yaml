"Add Senders to Exchange-Siemplify Mail Flow Rule":
  ai_description: >-
    ### General Description

    Adds specified email addresses or User entity identifiers to a designated Exchange
    mail flow rule. This action supports both Exchange On-Premises and Office 365
    environments. Optionally, it can also add the domains of these email addresses
    to corresponding domain-based mail flow rules.


    ### Flow Description

    1. Extracts configuration parameters (server details, credentials, etc.) and action
    parameters (email addresses, rule name, domain addition flag).

    2. Validates the mail server type (On-Prem or Office 365) and initializes the
    `ExchangeExtensionPackManager`.

    3. If no email addresses are provided in the parameters, it extracts identifiers
    from `User` entities.

    4. Validates the email addresses.

    5. Checks for existing rules using `get_rules_by_names`.

    6. If the rule exists, it updates the rule by adding the new items (using `Set-TransportRule`).
    If the rule does not exist, it creates a new rule (using `New-TransportRule`).

    7. If the `Should add senders' domain...` parameter is enabled, it repeats the
    process for the corresponding domain rule.

    8. Returns the result (success/invalid items) and updates the action status.


    ### Additional Notes

    Requires Organization Management permissions in Exchange. The action is asynchronous
    and may retry in case of network errors.
