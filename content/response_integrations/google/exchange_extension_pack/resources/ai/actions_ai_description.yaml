    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates or updates a mail flow rule in Exchange to filter the specified domains.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to an external Exchange server and executes PowerShell commands
      to create or update a mail flow rule, mutating external data. It does not fetch
      enrichment data, update internal entities, or create insights.
