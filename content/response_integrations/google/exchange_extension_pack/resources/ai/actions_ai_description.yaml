Run Compliance Search:
  ai_description: >-
    ### General Description

    Runs an Exchange Compliance Search to identify emails across multiple mailboxes.
    This action is designed for large organizations and supports both Exchange On-Premises
    and Office 365 environments. It allows users to search for emails based on specific
    criteria such as subject, sender, recipient, and time frame, or by providing an
    advanced KQL query.


    ### Flow Description

    1. **Initialization**: The action initializes the `ExchangeExtensionPackManager`
    using the provided configuration (server address, credentials, and environment
    type).

    2. **Query Construction**: It constructs a search query using the provided filters
    (Subject, Sender, Recipient, Time Frame, Operator) or uses the provided `Advanced
    Query` if available.

    3. **Search Execution**: It executes the `New-ComplianceSearch` PowerShell command
    on the Exchange server to initiate the search.

    4. **Status Monitoring**: The action periodically checks the status of the compliance
    search (`Get-ComplianceSearch`) until it reaches a completed state.

    5. **Result Retrieval**: If the `Fetch Compliance Search Results?` parameter is
    enabled, the action creates a preview (`New-ComplianceSearchAction -Preview`)
    and retrieves the results (`Get-ComplianceSearchAction`).

    6. **Output**: The retrieved results are returned as a JSON object. If `Create
    Case Wall Output Table?` is enabled, the results are also formatted and added
    as a table to the case wall.


    ### Additional Notes

    This action is asynchronous and does not operate on Siemplify entities. It is
    optimized for large-scale environments with 1000+ mailboxes. Note that when fetching
    results, a maximum of 200 elements will be displayed, though the actual search
    may contain more findings.
