"Add Senders to Exchange-Siemplify Mail Flow Rule":
  ai_description: >-
    ### General Description

    Adds specified email addresses or domains to a Microsoft Exchange mail flow rule.
    This action can be used to block or filter incoming emails from specific senders
    by updating transport rules on Exchange On-Premises or Office 365.


    ### Flow Description

    1. Extracts the list of email addresses from the action parameters or from User
    entities attached to the case.

    2. Validates the provided email addresses.

    3. Connects to the Exchange server (On-Premises or Office 365) via PowerShell.

    4. Retrieves the existing mail flow rules to check if the target rule exists.

    5. If the rule exists, updates it by appending the new senders (and optionally
    their domains). If it does not exist, creates a new mail flow rule with the specified
    senders.

    6. Returns a JSON result containing the successfully added, already existing,
    and invalid email addresses.


    ### Additional Notes

    Requires Organization Management permissions in Exchange. The action executes
    PowerShell commands remotely.
