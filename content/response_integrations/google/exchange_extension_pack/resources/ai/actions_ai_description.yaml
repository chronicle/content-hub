  ai_description: >-
    ### General Description

    Adds a list of domains to a specified Exchange Mail Flow Rule. This action is
    typically used to filter or block emails from specific domains by adding them
    to a rule (e.g., 'Siemplify - Domains List - Permanently Delete'). If the specified
    rule does not exist, the action will create it.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Domains | String | False | Specify the Domains you would like to add to the
    rule, in a comma-separated list. These domains will be validated and added to
    the specified Mail Flow Rule. |

    | Rule to add Domains to | String | True | Specify the rule to add the Domains
    to. If the rule doesn't exist, the action will create it. |


    ### Action Flow

    1. Validates the provided domains from the parameters.

    2. Connects to Exchange On-Prem or Office 365 via PowerShell.

    3. Retrieves existing Mail Flow Rules to check if the target rule exists.

    4. Creates the rule if it doesn't exist, or updates it by adding the new domains.

    5. Returns a JSON result with successful, already available, and invalid domains.
