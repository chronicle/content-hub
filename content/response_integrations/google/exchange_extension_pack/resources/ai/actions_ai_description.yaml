"Remove Senders from Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    Removes specified email addresses (senders) from existing Exchange mail flow rules.
    If no email addresses are provided as parameters, the action extracts them from
    User entities. It can also optionally extract the domains of these senders and
    remove them from corresponding domain rules.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Connects to the Exchange server (On-Prem or Office 365) using PowerShell commands.

    3. If no email addresses are provided, extracts them from User entities.

    4. Validates the provided email addresses.

    5. Retrieves the existing mail flow rules using the `Get-TransportRule` PowerShell
    command.

    6. Removes the specified senders from the target rule using the `Set-TransportRule`
    PowerShell command.

    7. If configured, extracts domains from the senders and removes them from the
    corresponding domain rule.

    8. Returns the results, including successfully removed items, items that didn't
    exist in the rule, and invalid items.


    ### Additional Notes

    - Requires Organization Management permissions in Exchange.

    - Uses PowerShell commands under the hood to interact with Exchange.
