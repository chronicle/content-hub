Fetch Compliance Search Results:
  ai_description: >-
    ### General Description

    Fetches results from a previously initiated Compliance Search on an Exchange server
    (On-Prem or Office 365). This action allows analysts to retrieve email metadata
    and content based on specific search criteria defined in the compliance search.
    It supports asynchronous execution, allowing the action to poll for the completion
    of the search task before retrieving the final results.


    ### Flow Description

    1. The action checks if it is the first run or a subsequent query state.

    2. If it is the first run, it calls `create_compliance_search_preview` to initiate
    the preview of the compliance search.

    3. In subsequent runs, it calls `get_compliance_search_preview_results` to check
    the status of the search preview.

    4. Once the search status is 'Completed', it retrieves the results.

    5. If the 'Create Case Wall Output Table?' parameter is enabled, it constructs
    and adds a CSV table to the case wall.

    6. If the 'Remove Compliance Search Once Action Completes?' parameter is enabled,
    it calls `remove_compliance_search` to delete the search task from the Exchange
    server.

    7. Finally, it returns the results as JSON and updates the action status.


    ### Additional Notes

    This action does not operate on Siemplify entities. It interacts directly with
    the Exchange server via PowerShell commands. The action is designed to handle
    asynchronous operations, meaning it may need to be triggered multiple times until
    the search task completes.
