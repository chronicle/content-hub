  ai_description: >-
    Runs an Exchange Compliance Search based on provided search conditions (such as
    subject, sender, recipient, time frame, or an advanced query). It creates a compliance
    search job on the Exchange server and can optionally fetch and display the search
    results.


    ### Action Flow

    1. Connects to the Exchange On-Prem or Office 365 server using the provided credentials.

    2. Creates a compliance search job on the server using the specified filters or
    advanced query.

    3. Periodically checks the status of the compliance search job until it completes.

    4. If configured to fetch results, creates a compliance search preview and waits
    for its completion.

    5. Retrieves the search results and optionally creates a case wall output table
    with the findings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Compliance Search Name | String | Yes | Name for the Compliance Search. Note
    that the name shouldn't contain special characters. |

    | Subject Filter | String | No | Filter condition, specify what subject to search
    for emails. |

    | Sender Filter | String | No | Filter condition, specify who should be the sender
    of needed emails. |

    | Recipient Filter | String | No | Filter condition, specify who should be the
    recipient of needed emails. |

    | Operator | Dropdown | No | Operator (AND/OR) to use to construct the query from
    the conditions above. |

    | Time Frame (hours) | String | No | Time frame interval in hours to search for
    emails. |

    | Location to Search Emails In | String | Yes | Location to search emails in.
    Can be a comma-separated list of mailboxes, a distribution group, or 'All' for
    all mailboxes. |

    | Fetch Compliance Search Results? | Boolean | No | Specify whether the action
    should immediately fetch the compliance search results. |

    | Max Emails To Return | String | No | Specify how many emails the action can
    return. |

    | Create Case Wall Output Table? | Boolean | No | Specify if the action should
    create a case wall output table. |

    | Advanced Query | String | No | Instead of subject, sender, or recipient filters,
    provide a query you want to run the compliance search on. |


    ### Additional Notes

    - This action does not work on Google SecOps entities.

    - If the "Fetch Compliance Search Results?" checkbox is checked, a maximum of
    200 elements will be displayed, but the actual search can have more findings than
    are shown.
