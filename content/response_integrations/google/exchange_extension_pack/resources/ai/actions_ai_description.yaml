"Remove Domains from Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    This action removes a specified list of domains from an existing Exchange-Siemplify
    Mail Flow Rule. It connects to either an Exchange On-Premises or Office 365 environment
    and modifies the rule to exclude the provided domains, effectively stopping the
    rule's actions (such as permanent deletion) from applying to emails originating
    from those domains.


    ### Flow Description

    1. Validates the provided domains and filters out any invalid entries.

    2. Connects to the target Exchange server (On-Premises or Office 365) via PowerShell.

    3. Retrieves the current configuration of the specified mail flow rule.

    4. Calculates the intersection of the existing domains in the rule and the domains
    to be removed.

    5. Updates the mail flow rule on the Exchange server by removing the specified
    domains from its conditions.

    6. Returns a JSON result detailing the successfully removed domains, domains that
    didn't exist in the rule, and invalid domains.


    ### Additional Notes

    To use this action, ensure that the configured account has Organization Management
    permissions in Exchange. The action operates asynchronously and will retry in
    case of network errors.
