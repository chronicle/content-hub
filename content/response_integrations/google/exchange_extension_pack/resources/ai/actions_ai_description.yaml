"Remove Domains from Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    Removes specified domains from an existing Exchange mail flow rule. This action
    interacts with an Exchange server (On-Prem or Office 365) via PowerShell to update
    transport rules, effectively modifying the filtering policy for incoming or outgoing
    mail.


    ### Flow Description

    1. Extracts configuration parameters (server details, credentials) and action
    parameters (domains, rule name).

    2. Validates the provided domains using regex.

    3. Initializes the `ExchangeExtensionPackManager` to establish a connection to
    the Exchange server.

    4. Retrieves the specified mail flow rule using `get_rules`.

    5. Removes the valid domains from the rule's existing items using `remove_items_from_rule`.

    6. Updates the rule on the Exchange server using `Set-TransportRule` or deletes
    the rule if it becomes empty using `Remove-TransportRule`.

    7. Returns the result of the operation, including lists of successfully removed,
    non-existent, and invalid domains.


    ### Additional Notes

    Requires Organization Management permissions on the Exchange server. Supports
    both Exchange On-Prem and Office 365. If the rule becomes empty after removing
    the domains, the action will delete the rule entirely.
