Create Saved Query:
  ai_description: >-
    ### General Description

    Creates a new saved query in Rapid7 InsightIDR based on the specified input parameters.
    This action allows analysts to programmatically define and save queries for future
    execution or monitoring. Note that this action does not operate on Google SecOps
    entities.


    ### Flow Description

    1. Extracts the necessary action parameters, including the query name, LEQL statement,
    time frame, and target logs.

    2. Initializes the Rapid7 InsightIDR API client.

    3. Makes a POST request to the Rapid7 InsightIDR API to create the saved query
    with the specified configuration.

    4. If successful, returns the created saved query details as a JSON result and
    outputs a success message containing the new query ID.


    ### Additional Notes

    - The `Statement` parameter must follow LEQL (Logentries Query Language) syntax
    (e.g., `where(foo=bar)`).

    - If `Logs` are provided, the action will first fetch the corresponding log IDs
    from Rapid7 InsightIDR before creating the saved query.
  ai_short_description: >-
    Creates a new saved query in Rapid7 InsightIDR using the provided LEQL statement,
    time frame, and target logs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new saved query in Rapid7 InsightIDR.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to Rapid7 InsightIDR to create a saved query,
      which mutates external data. It does not fetch contextual data for entities,
      nor does it mutate internal SecOps data, update entities, or create insights.
