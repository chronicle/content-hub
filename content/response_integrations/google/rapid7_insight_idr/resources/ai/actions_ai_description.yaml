    Retrieves a list of investigations from Rapid7 InsightIDR based on specified time
    frame and record limit parameters. This action allows analysts to query recent
    investigations, optionally including closed ones, directly from the Rapid7 platform.


    ### Flow Description

    1. Extracts the action parameters including time frame, record limit, and whether
    to include closed investigations.

    2. Makes a GET request to the Rapid7 InsightIDR API (`/idr/v1/investigations`)
