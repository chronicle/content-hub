Run Saved Query:
  ai_description: >-
    ### General Description

    Executes a saved query in Rapid7 InsightIDR using a provided Saved Query ID. This
    action retrieves log search results from the Rapid7 InsightIDR platform and makes
    them available within the SOAR action results for further analysis or reporting.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL) and the action
    parameter (Saved Query ID).

    2. Initializes the `Rapid7InsightIDRManager` to handle API communication.

    3. Executes a GET request to the Rapid7 InsightIDR API endpoint `/log_search/query/saved_query/{saved_query_id}`.

    4. Handles pagination if the API returns a `next_query_link`, continuing to fetch
    results until all data is retrieved or the action timeout is reached.

    5. Adds the retrieved query results to the action's JSON output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action does not interact with SOAR entities. It is designed to fetch log
    data based on pre-configured saved queries in Rapid7 InsightIDR.
