Delete Saved Query:
  ai_description: >-
    ### General Description

    Deletes a specific saved query in Rapid7 InsightIDR. This action initiates a state
    change on the external Rapid7 platform to remove the specified query configuration.


    ### Flow Description

    1. Extracts the `Saved Query ID` from the action parameters.

    2. Initializes the Rapid7 InsightIDR API client using the provided integration
    configuration.

    3. Makes an HTTP DELETE request to the Rapid7 InsightIDR API (`/log_search/query/saved_queries/{saved_query_id}`)
    to remove the specified saved query.

    4. Returns a success message if the deletion is successful, or an error message
    if the query is not found or another exception occurs.


    ### Additional Notes

    This action does not operate on Siemplify entities.
