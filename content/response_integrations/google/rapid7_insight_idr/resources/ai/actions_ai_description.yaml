Update Investigation:
  ai_description: >-
    ### General Description

    Updates an existing investigation in Rapid7 InsightIDR by modifying its status
    and/or disposition. This action allows analysts to synchronize investigation states
    from the SOAR platform to the external Rapid7 InsightIDR system.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the required configuration parameters
    (API Root, API Key, Verify SSL) and action parameters (Investigation ID, Status,
    Disposition).

    2. **Validation**: It verifies that at least one of the 'Status' or 'Disposition'
    parameters has been provided.

    3. **Manager Initialization**: The `Rapid7InsightIDRManager` is initialized with
    the provided credentials.

    4. **API Interaction**: The action calls the `update_investigation` method, which
    performs a `PATCH` request to the Rapid7 InsightIDR API endpoint (`/idr/v2/investigations/{investigation_id}`)
    to apply the requested changes.

    5. **Result Handling**: The updated investigation data is returned as a JSON result,
    or an error is raised if the investigation is not found or the request fails.


    ### Additional Notes

    This action utilizes API endpoints that are currently in preview release. Ensure
    that the API Key has the necessary permissions to modify investigations in Rapid7
    InsightIDR.
