Create Saved Query:
  ai_description: >-
    ### General Description

    Creates a new saved query in Rapid7 InsightIDR using the provided name, LEQL statement,
    time frame, and optional log names.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL).

    2. Extracts action parameters (Name, Statement, Time Frame, Logs).

    3. Initializes the `Rapid7InsightIDRManager` to handle API communication.

    4. Calls `get_logs_ids` to retrieve log IDs from the Rapid7 InsightIDR API based
    on the provided log names.

    5. Calls `create_saved_query`, which performs a POST request to the Rapid7 InsightIDR
    API (`/log_search/query/saved_queries`) with the query details.

    6. Returns the created saved query ID and details in the action result.


    ### Additional Notes

    This action does not interact with SOAR entities.
  ai_short_description: >-
    Creates a new saved query in Rapid7 InsightIDR based on the provided name, LEQL
    statement, time frame, and logs.
