    ### General Description

    Tests connectivity to the Rapid7 InsightIDR service to ensure the integration
    is correctly configured and the SOAR platform can communicate with the service.


    ### Flow Description

    1. The action extracts the `API Root`, `API Key`, and `Verify SSL` configuration
    parameters from the integration settings.

    2. It initializes the `Rapid7InsightIDRManager` with these credentials.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the `/validate` endpoint of the Rapid7 InsightIDR API.

    4. The action logs the result and returns a success or failure message based on
    the API response.


    ### Additional Notes

    This action is strictly used for verifying the connection between the SOAR platform
    and the Rapid7 InsightIDR service. It does not perform any data retrieval, entity
    enrichment, or state-changing operations.
