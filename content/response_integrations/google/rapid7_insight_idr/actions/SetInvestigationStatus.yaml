name: Set Investigation Status
description: 'Set the status for the specific Rapid7 InsightIDR investigation. Note:
    Action is not working with Siemplify Entities.'
integration_identifier: Rapid7InsightIDR
parameters:
-   name: Investigation ID
    default_value: ''
    type: string
    description: ID of investigation to update status for. ID should be in the format
        like 8ec8e324-4522-4a6e-9838-81496a0cadb0
    is_mandatory: true
-   name: Status
    default_value: ''
    type: ddl
    optional_values:
    - open
    - closed
    description: New Status of investigation.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/set_investigation_status_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
