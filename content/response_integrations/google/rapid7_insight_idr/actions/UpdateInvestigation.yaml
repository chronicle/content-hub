name: Update Investigation
description: 'Update investigation in Rapid7 InsightIDR. Note: this action was built
    using API endpoints that are in preview release.'
integration_identifier: Rapid7InsightIDR
parameters:
-   name: Investigation ID
    default_value: ''
    type: string
    description: Specify the ID of the investigation that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: ''
    type: ddl
    optional_values:
    - Open
    - Investigating
    - Closed
    description: Specify the status for the investigation.
    is_mandatory: false
-   name: Disposition
    default_value: ''
    type: ddl
    optional_values:
    - Benign
    - Malicious
    - Not Applicable
    description: Specify the disposition for the investigation.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_investigation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
