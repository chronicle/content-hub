name: List Investigations
description: 'List Rapid7 InsightIDR investigations based on the specified action
    input parameters.  Note: Action is not working with Siemplify entities, only with
    action input parameters.'
integration_identifier: Rapid7InsightIDR
parameters:
-   name: Time Frame
    default_value: 4
    type: string
    description: Specify a time frame in hours for which to fetch findings.
    is_mandatory: false
-   name: Record limit
    default_value: 20
    type: string
    description: Specify how many records can be returned by the action.
    is_mandatory: false
-   name: Include Closed Investigations?
    default_value: false
    type: boolean
    description: Specify whether to include closed investigations in results or not.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_investigations_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
