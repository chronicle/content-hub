name: Enrich Entities
description: 'Enrich entities using information from Ivanti Endpoint Manager. Supported
    entities: IP Address, Hostname, MAC Address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ivanti-endpoint-manager#enrich_entities
integration_identifier: IvantiEndpointManager
parameters:
-   name: Custom Column Set
    default_value: ''
    type: string
    description: If specified, action will also try to return information about endpoints
        using custom column sets. If not specified, action will only return basic
        information.
    is_mandatory: false
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the entity.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "HOSTNAME", "MacAddress"]}'
