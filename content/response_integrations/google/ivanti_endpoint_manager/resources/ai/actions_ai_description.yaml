    ### General Description

    Scans endpoints for vulnerabilities using Ivanti Endpoint Manager. The action
    targets IP Address, Hostname, and MAC Address entities, creating and initiating
    a vulnerability scan task on the corresponding machines.


    ### Flow Description

    1. Filters the provided target entities to include only supported types (IP Address,
    Hostname, MAC Address).

    2. Makes an API call to Ivanti Endpoint Manager to retrieve machine details that
    match the identifiers of the filtered entities.

    3. Makes an API call to create a new vulnerability scan task for the identified
    machines.

    4. Makes an API call to initiate the newly created scan task.

    5. If the `Only Initiate` parameter is set to false, the action runs asynchronously
    and periodically polls the API to check the task status until it completes or
    times out.

    6. Returns the task status and execution details as JSON results.


    ### Additional Notes

    This action can run asynchronously. If the `Only Initiate` parameter is enabled,
    the action will start the scan task and finish immediately without waiting for
    the scan to complete. Ensure the script timeout value in the IDE is adjusted appropriately
