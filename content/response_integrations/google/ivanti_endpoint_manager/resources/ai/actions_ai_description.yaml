  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and MAC Address entities using information from
    Ivanti Endpoint Manager. This action retrieves endpoint details such as OS name,
    last login, and network configuration to provide contextual metadata about the
    assets. It updates the entities with this enrichment data and can optionally generate
    a case insight summarizing the findings.


    ### Flow Description

    1. Initializes the connection to the Ivanti Endpoint Manager API.

    2. Validates the provided custom column set, if any.

    3. Filters the target entities to include only supported types (IP Address, Hostname,
    MAC Address).

    4. Fetches machine data from Ivanti Endpoint Manager for the filtered entities.

    5. Retrieves additional machine details if a custom column set is specified.

    6. Matches the retrieved data with the corresponding entities, updates their properties,
    and marks them as enriched.

    7. Optionally creates a case insight with the gathered information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Custom Column Set | String | False | If specified, the action will try to return
    additional information about endpoints using custom column sets. If not specified,
    only basic information is returned. |

    | Create Insight | Boolean | False | If enabled (default is true), the action
    will create an insight containing all of the retrieved information about the entity.
    |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties with enrichment data and optionally creates a case
      insight.
    reasoning: >-
      The action fetches data from Ivanti Endpoint Manager using GET requests (get_machines,
      get_machine_details). It does not mutate any external data. Internally, it updates
      the entities with the fetched data (siemplify.update_entities) and creates case
      insights (siemplify.create_case_insight). It does not modify alert data or create
      case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source to gather supplemental context
      about entities. It does not mutate external state, and its internal mutations
      are restricted to updating entities and creating insights. Therefore, it is
      an Enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where SUPPORTED_ENTITY_TYPES
      includes ADDRESS, HOSTNAME, and MACADDRESS. It does not filter by identifier,
      creation time, or other attributes.
