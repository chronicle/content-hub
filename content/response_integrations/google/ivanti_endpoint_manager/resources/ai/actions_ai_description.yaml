    Lists available fields within a specified column set in Ivanti Endpoint Manager.
    This action allows users to query the configuration of column sets to understand
    the available data fields, which can be useful for reporting or data retrieval
    tasks.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary connection
    details (API Root, Username, Password, Verify SSL) from the integration configuration.

    2. **Parameter Extraction**: The action extracts the user-provided parameters:
    `Column Set` (mandatory), `Filter Logic`, `Filter Value`, and `Max Fields To Return`.

    3. **API Interaction**: The action initializes the `IvantiEndpointManagerManager`
    and performs a GET request to the Ivanti API endpoint `/MBSDKService/MsgSDK.asmx/ListColumnSetColumns`
    using the provided `Column Set` name.

    4. **Data Processing**: The XML response from the API is parsed into field objects.

    5. **Filtering**: The action applies the specified `Filter Logic` (Equal or Contains)
    and `Filter Value` to the retrieved fields, limiting the results based on the
    `Max Fields To Return` parameter.

    6. **Result Output**: The filtered list of fields is returned as a JSON result
    to the SOAR platform.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in Ivanti Endpoint
    Manager or the SOAR platform.
