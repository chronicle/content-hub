    reasoning: >-
      The action retrieves contextual metadata (e.g., OS version, MAC address, last
      login) for resources/endpoints from Ivanti Endpoint Manager. This perfectly
      matches the 'Enrich Asset' expected outcome. It does not return threat intelligence
      or reputation, so it is not 'Enrich IOC'. It does not perform any other product
      category outcomes.
    remove_ioc_from_allowlist: false
