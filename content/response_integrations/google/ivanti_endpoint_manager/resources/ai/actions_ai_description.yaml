  ai_description: >-
    Executes a task in Ivanti Endpoint Manager on specified entities (Hostname, IP
    address, MAC Address).


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Task Name | string | False | Specify the name of the task. If nothing is provided
    the action will use the "Siemplify Execute Task" name. |

    | Delivery Method | string | True | Specify the name of the delivery method that
    will be used during task execution. |

    | Package | string | True | Specify the name of the package that will be used
    during task execution. |

    | Wake Up Machines | boolean | True | If enabled, action will wake up the machine
    during task execution. |

    | Common Task | boolean | True | If enabled, action will mark this task as common.
    |

    | Only Initiate | boolean | True | If enabled, action will only initiate the task
    execution without waiting for results. |


    ### Flow

    1. Retrieves machines from Ivanti Endpoint Manager matching the provided entities.

    2. Creates a new task with the specified delivery method and package.

    3. Adds the matched devices to the task.

    4. Starts the task execution.

    5. If 'Only Initiate' is false, waits asynchronously for the task to complete
    and returns the execution status.
