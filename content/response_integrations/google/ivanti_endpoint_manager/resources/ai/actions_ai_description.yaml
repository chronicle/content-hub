  ai_description: >-
    Lists available fields in column sets in Ivanti Endpoint Manager.


    ### General Description

    This action connects to Ivanti Endpoint Manager to retrieve and list the available
    fields within a specified column set. It allows filtering the results based on
    specific logic and values, and limits the number of returned fields.


    ### Parameters Description

    - **Column Set** (Mandatory, String): Specify the name of the column set for which
    you want to return fields.

    - **Filter Logic** (Optional, Dropdown): Specify what filter logic should be applied.
    Options are 'Equal' or 'Contains'.

    - **Filter Value** (Optional, String): Specify what value should be used in the
    filter. If 'Equal' is selected, the action will try to find the exact match among
    items. If 'Contains' is selected, the action will try to find items that contain
    that substring. If nothing is provided, the filter will not be applied.

    - **Max Fields To Return** (Optional, String/Integer): Specify how many column
    sets to return. Default is 50.


    ### Flow Description

    1. Extracts the configuration and action parameters.

    2. Initializes the connection to Ivanti Endpoint Manager.

    3. Fetches the fields for the specified column set.

    4. Applies the specified filter logic and value to the retrieved fields.

    5. Limits the results to the specified maximum number.

    6. Returns the fields as JSON results.
