    Ivanti API endpoint `/MBSDKService/MsgSDK.asmx/ListDeliveryMethod`.

    5. Parse the XML response into `DeliveryMethod` objects.

    6. Filter the retrieved items based on the provided `Filter Logic` and `Filter
    Value`.

    7. Return the results as a JSON object and a data table in the action output.


    ### Additional Notes

    None.
