Execute Task:
  ai_description: >-
    ### General Description

    Executes a specified task on target endpoints using Ivanti Endpoint Manager. This
    action allows for the deployment of packages or execution of tasks on specific
    machines identified by their Hostname, IP Address, or MAC Address.


    ### Flow Description

    1. Filters target entities to include only Hostname, IP Address, and MAC Address.

    2. Queries Ivanti Endpoint Manager via the `ListMachines` API to find matching
    machines for the provided entities.

    3. Creates a new task in Ivanti Endpoint Manager via the `CreateTask` API using
    the specified delivery method and package.

    4. Adds the identified devices to the newly created task via the `AddDeviceToScheduledTask`
    API.

    5. Initiates the task execution via the `StartTaskNow` API.

    6. If the `Only Initiate` parameter is false, the action runs asynchronously,
    periodically checking the task status via the `GetTaskMachineStatus` API until
    completion or timeout.

    7. Returns the execution results as JSON.


    ### Additional Notes

    This action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed to accommodate long-running tasks.
  ai_short_description: >-
    Executes a specified task or package on target endpoints via Ivanti Endpoint Manager,
    optionally waiting for the execution to complete asynchronously.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new task, adds devices to it, and initiates the task execution in
      Ivanti Endpoint Manager.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches machine data to map entities to devices (fetches_data=true).
      It then makes API calls to create a task, add devices, and start the task in
      Ivanti Endpoint Manager, which mutates external data (can_mutate_external_data=true).
      It does not update internal entities, create insights, or add case comments.
