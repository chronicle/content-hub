Execute Query:
  ai_description: >-
    ### General Description

    Executes a predefined query within the Ivanti Endpoint Manager platform to retrieve
    specific endpoint or system data. This action allows users to run custom queries
    configured in the Ivanti environment and returns the results for further analysis.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials, SSL verification)
    from the integration settings.

    2. Extracts action parameters (Query name, Max Results) provided by the user.

    3. Initializes the `IvantiEndpointManagerManager` with the provided credentials.

    4. Calls the `execute_query` method, which performs an HTTP GET request to the
    Ivanti API endpoint `/MBSDKService/MsgSDK.asmx/RunQuery`.

    5. Parses the XML response into JSON objects.

    6. Adds the results to the action output using `siemplify.result.add_result_json`.


    ### Additional Notes

    Requires valid Ivanti Endpoint Manager credentials. The `Max Results To Return`
    parameter limits the number of records retrieved, with a default value of 50.
