Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and MAC Address entities using information from
    Ivanti Endpoint Manager. This action retrieves contextual metadata about endpoints,
    such as OS version, IP, MAC, and last login details, to provide better visibility
    into the assets involved in an alert.


    ### Flow Description

    1. Retrieves action parameters, including the custom column set and the insight
    creation flag.

    2. Filters target entities to include only supported types (IP Address, Hostname,
    MAC Address).

    3. Makes an API call to Ivanti Endpoint Manager to fetch machine details for the
    filtered entities.

    4. If a custom column set is specified, makes additional API calls to retrieve
    extended machine details for each endpoint.

    5. Matches the retrieved machine data with the corresponding entities based on
    device name, IP address, or MAC address.

    6. Enriches the entities with the retrieved data, updates their status in the
    platform, and optionally creates a case insight with the endpoint details.


    ### Additional Notes

    The action supports custom column sets to retrieve extended information beyond
    the basic endpoint details. If the custom column set is invalid, the action will
    fail.
  ai_short_description: >-
    Enriches IP Address, Hostname, and MAC Address entities by retrieving endpoint
    contextual metadata from Ivanti Endpoint Manager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches endpoint data from Ivanti Endpoint Manager via GET requests
      (fetches_data=true). It does not perform any state-changing operations on the
      external system (can_mutate_external_data=false). It updates the entities with
      the retrieved data using `siemplify.update_entities` (can_update_entities=true)
      and creates case insights using `siemplify.create_case_insight` (can_create_insight=true).
      It does not modify alert data or create case comments.
