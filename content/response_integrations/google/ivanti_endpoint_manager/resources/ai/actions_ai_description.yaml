  ai_description: >-
    The "List Endpoint Vulnerabilities" action retrieves a list of vulnerabilities
    associated with specific endpoints from Ivanti Endpoint Manager.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Severity Filter | String | No | Specify a comma-separated list of severities
    that will be used when returning information about vulnerabilities. If nothing
    is provided, the action will return all vulnerabilities. Possible values: ServicePack,
    Critical, High, Medium, Low, N/A, Unknown. |

    | Max Vulnerabilities To Return | Integer | No | Specify how many vulnerabilities
    to return per entity. Default: 50. |


    ### Flow

    1. The action filters the target entities to include only supported types (IP
    Address, Hostname, MAC Address).

    2. It queries Ivanti Endpoint Manager to find machines matching the identifiers
    of the suitable entities.

    3. For each matched machine, it retrieves the associated vulnerabilities based
    on the provided severity filter and limit.

    4. The retrieved vulnerabilities are added to the action's JSON results.
