    ### General Description

    This action targets IP Address, Hostname, and MAC Address entities. It queries
    Ivanti Endpoint Manager to find the corresponding machines, creates a vulnerability
    scan task for the identified machines, and initiates the scan. The action can
    run asynchronously, waiting for the scan to complete and returning the status,
    or it can simply initiate the scan and exit immediately.


    ### Parameters Description

    - **Task Name**: (Optional, String) Specify the name of the scan vulnerabilities
    task. If nothing is provided, the action will use the default 'Siemplify Scan
    Endpoints' name.

    - **Only Initiate**: (Mandatory, Boolean) If enabled, the action will only initiate
    the task execution without waiting for results. Default is true.


    ### Flow Description

    1. Filters the target entities to include only supported types (IP Address, Hostname,
    MAC Address).

    2. Queries Ivanti Endpoint Manager to retrieve machine details matching the entities.

    3. Creates a new vulnerability scan task for the identified machines.

    4. Starts the scan task.

    5. If 'Only Initiate' is false, the action runs asynchronously, periodically checking
    the task status until completion or timeout.

    6. Returns the scan status and task details as JSON results.
