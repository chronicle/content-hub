Execute Task:
  ai_description: >-
    ### General Description

    Executes a specified task on endpoints managed by Ivanti Endpoint Manager. This
    action allows administrators to trigger software distribution, script execution,
    or other management tasks on target devices identified by Hostname, IP Address,
    or MAC Address. It supports asynchronous execution, allowing the action to initiate
    a task and optionally poll for completion status.


    ### Flow Description

    1. **Entity Filtering**: The action filters the provided `target_entities` to
    include only those matching supported types: Hostname, IP Address, or MAC Address.

    2. **Device Mapping**: It calls the Ivanti Endpoint Manager API to map the filtered
    entities to valid device names within the Ivanti system.

    3. **Task Creation**: It creates a new task in Ivanti Endpoint Manager using the
    provided `Task Name`, `Delivery Method`, and `Package` parameters. It also applies
    configuration settings such as `Wake Up Machines` and `Common Task`.

    4. **Device Assignment**: The mapped device names are added to the newly created
    task.

    5. **Task Initiation**: The action triggers the task execution via the Ivanti
    API.

    6. **Result Polling**: If the `Only Initiate` parameter is set to `false`, the
    action enters a polling loop to monitor the task status on the target devices
    until completion or timeout.


    ### Additional Notes

    This action is designed to run asynchronously. If the task takes a long time to
    complete, ensure the action timeout in the SOAR platform is configured appropriately,
    or enable the `Only Initiate` parameter to avoid timeout errors.
  ai_short_description: >-
    Executes a management task on endpoints via Ivanti Endpoint Manager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
