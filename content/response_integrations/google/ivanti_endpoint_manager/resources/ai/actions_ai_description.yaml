Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and MAC Address entities using data retrieved from
    Ivanti Endpoint Manager. This action retrieves detailed endpoint information,
    such as OS name, last login, and network configuration, to provide context for
    security investigations.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, credentials) and action
    parameters (Custom Column Set, Create Insight).

    2. It filters the `target_entities` to include only supported types: IP Address,
    Hostname, and MAC Address.

    3. It queries the Ivanti Endpoint Manager API to fetch machine data for the identified
    entities.

    4. If a 'Custom Column Set' is provided, the action performs additional API calls
    to retrieve specific machine details for the matched endpoints.

    5. For each matched entity, it updates the entity's `additional_properties` with
    the retrieved enrichment data and marks the entity as enriched.

    6. It adds a result table containing the enrichment data to the action output.

    7. If 'Create Insight' is enabled, it generates a case insight containing the
    endpoint's metadata.


    ### Additional Notes

    This action requires valid credentials for the Ivanti Endpoint Manager API. The
    enrichment data is mapped to the entity's additional properties, allowing for
    further automation or correlation within the SOAR platform.
  ai_short_description: >-
    Enriches IP, Hostname, and MAC Address entities with endpoint metadata from Ivanti
    Endpoint Manager.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
