[project]
name = "IvantiEndpointManager"
version = "11.0"
description = "Ivanti is a recognized leader in unified endpoint management. Ivanti® Endpoint Manager, powered by Landesk, increases user and IT productivity by helping IT administrators gather detailed device data, automate software and OS deployments, and quickly fix user issues. It integrates and unifies the management of all end-user devices and provides core data and services leveraged by other Ivanti solutions and Ivanti partners."
requires-python = ">=3.11,<3.12"
dependencies = [ "requests==2.32.4", "requests-ntlm==1.3.0", "tipcommon", "xmltodict==0.13.0",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.10-py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
