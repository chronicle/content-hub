name: Update Notable Events
description: 'Update notable events in Splunk ES. Note: This action is only supported
    for Splunk ES.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#update_notable_events
integration_identifier: Splunk
parameters:
-   name: Notable Event IDs
    default_value: ''
    type: string
    description: Specify IDs of notable events. Example:1A082D7B-D5A1-4A2B-BB94-41C439BE3EB7@@notable@@cb87390ae72763679d3f6f8f097ebe2b,1D234D5B-1531-2D2B-BB94-41C439BE12B7@@notable@@cb87390ae72763679d3f6f8f097ebe2b
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Unassigned
    - New
    - In Progress
    - Pending
    - Resolved
    - Closed
    description: Specify the new status for notable events.
    is_mandatory: false
-   name: Urgency
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Critical
    - High
    - Medium
    - Low
    - Informational
    description: Specify the new urgency for the notable event.
    is_mandatory: false
-   name: New Owner
    default_value: ''
    type: string
    description: Specify the new owner of the notable event.
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: Specify comment for the notable event.
    is_mandatory: false
-   name: Disposition
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - True Positive - Suspicious Activity
    - Benign Positive - Suspicious But Expected
    - False Positive - Incorrect Analytic Logic
    - False Positive - Inaccurate Data
    - Other
    description: Specify the disposition for the notable event.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
