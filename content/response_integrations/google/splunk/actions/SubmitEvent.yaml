name: Submit Event
description: Submit event to Splunk
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#submit_event
integration_identifier: Splunk
parameters:
-   name: Index
    default_value: main
    type: string
    description: Specify the index, where the event should be created.
    is_mandatory: true
-   name: Event
    default_value: ''
    type: string
    description: Specify the raw event that needs to be submitted.
    is_mandatory: true
-   name: Host
    default_value: ''
    type: string
    description: Specify the host that is related to the event.
    is_mandatory: false
-   name: Source
    default_value: ''
    type: string
    description: 'Specify the source of the event. Example: www.'
    is_mandatory: false
-   name: Sourcetype
    default_value: ''
    type: string
    description: 'Specify the source type of the event. Example: web_event'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/submit_event_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: success
