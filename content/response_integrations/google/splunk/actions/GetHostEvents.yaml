name: Get Host Events
description: Get events related to hosts in Splunk.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#get_host_events
integration_identifier: Splunk
parameters:
-   name: Event Per Host Limit
    default_value: '100'
    type: string
    description: Specify how many events to return per host.
    is_mandatory: true
-   name: Results From
    default_value: -24h
    type: string
    description: Specify the start time for the events.
    is_mandatory: true
-   name: Results To
    default_value: now
    type: string
    description: Specify the end time for the events.
    is_mandatory: true
-   name: Result fields
    default_value: ''
    type: string
    description: Specify a comma-separated list of fields that need to be returned.
    is_mandatory: false
-   name: Index
    default_value: ''
    type: string
    description: Specify what index should be used, when searching for events related
        to the host. If nothing is provided, action will not use index.
    is_mandatory: false
-   name: Host Key
    default_value: host
    type: string
    description: 'Specify what key should be used to get information about host events.
        Default: host.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_host_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME"]}'
script_result_name: success
