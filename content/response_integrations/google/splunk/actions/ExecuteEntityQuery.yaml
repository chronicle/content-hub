name: Execute Entity Query
description: 'Execute an entity query in Splunk. Note: this action prepares the “Where”
    clause based on the entities. Check documentation for additional information.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#execute_entity_query
integration_identifier: Splunk
parameters:
-   name: Search Mode
    default_value: Smart
    type: ddl
    optional_values:
    - Verbose
    - Smart
    - Fast
    description: Specify the mode for search execution.
    is_mandatory: false
-   name: Query
    default_value: ''
    type: string
    description: 'Specify the query that needs to be executed without the “Where”
        clause.  Example: index="_internal"'
    is_mandatory: true
-   name: Results count limit
    default_value: 100
    type: string
    description: 'Specify how many results to return. Note: this parameter appends
        the "head" key word to the provided query. Default is 100.'
    is_mandatory: false
-   name: Results from
    default_value: -24h
    type: string
    description: 'Specify the start time for the query. Default: -24h'
    is_mandatory: false
-   name: Results To
    default_value: now
    type: string
    description: 'Specify the end time for the query. Default: now.'
    is_mandatory: false
-   name: Result fields
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of fields that need to be returned.
        Note: this parameter appends "fields" key word to the provided query.'
    is_mandatory: false
-   name: IP Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with IP entities. Please refer to
        the action documentation for details.
    is_mandatory: false
-   name: Hostname Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with Hostname entities, when preparing
        the. Please refer to the action documentation for details.
    is_mandatory: false
-   name: File Hash Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with File Hash entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: User Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with User entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: URL Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with URL entities. Please refer to
        the action documentation for details.
    is_mandatory: false
-   name: Email Address Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with Email Address entities. Please
        refer to the action documentation for details.
    is_mandatory: false
-   name: Stop If Not Enough Entities
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will not start execution, unless all of the entity
        types are available for the specified ".. Entity Keys". Example: if "IP Entity
        Key" and "File Hash Entity Key" are specified, but in the scope there are
        no file hashes then if this parameter is enabled, action will not execute
        the query.'
    is_mandatory: false
-   name: Cross Entity Operator
    default_value: OR
    type: ddl
    optional_values:
    - OR
    - AND
    description: Specify what should be the logical operator used between different
        entity types.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/execute_entity_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "FILEHASH", "ADDRESS",
    "USER"]}'
