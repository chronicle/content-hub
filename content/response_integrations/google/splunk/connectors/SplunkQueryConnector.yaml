name: Splunk Query Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: 'The field name used to determine the device product, e.g: device_product'
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: app
    type: string
    description: 'The field name used to determine the event name (sub-type),  e.g:
        event_type_field_name'
    is_mandatory: false
    is_advanced: true
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Api Root
    default_value: https://<ip>:8089
    type: string
    description: API root of the Splunk instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the Splunk account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the Splunk account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: Splunk API Token. API token has priority over other authentication
        methods, when this field is not empty.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'FALSE'
    type: boolean
    description: Whether to verify ssl certificate on connection or not
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Field which represent the environment in the event data.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Rule Generator Field
    default_value: ''
    type: string
    description: Field that represents the rule generator field.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Name Field Name
    default_value: ''
    type: string
    description: Field which represent the alert name.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Events Count Limit Per Query
    default_value: '10'
    type: string
    description: 'Max amount of events to fetch per query, e.g: 10'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '1'
    type: string
    description: Number of days before the first connector iteration to retrieve events
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Aggregate Events Query
    default_value: 'FALSE'
    type: boolean
    description: If enabled, the connector will combine all events under one alert.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: CA Certificate File
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the 'Environment Field
        Name' field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
description: The connector sends queries that are a part of the whitelist, retrieves
    results and builds a case based on the results.
integration: Splunk
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#splunk-connector
rules: []
is_connector_rules_supported: false
creator: Admin
