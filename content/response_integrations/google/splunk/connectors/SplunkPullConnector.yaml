name: Splunk Pull Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Describes the name of the field where the product name is stored.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: app
    type: string
    description: Describes the name of the field where the event name is stored.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: PythonProcessTimeout
    default_value: 60
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Server Address
    default_value: ''
    type: string
    description: IP Address of Splunk API Server.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Port
    default_value: 8089
    type: integer
    description: Port of the Splunk Instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Splunk account username.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Splunk account password.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: Splunk API Token. API token has priority over other authentication
        methods, when this field is not empty.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Time Frame
    default_value: 1h
    type: string
    description: 'Time frame of alerts to fetch. Examples: 1m - from 1 minute ago
        3h - from 3 hours ago 1d - from 24 hours ago (1 day) 1w - from 1 week ago.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Alerts Count Limit
    default_value: 100
    type: integer
    description: Limit the number of Alerts returned by the connector per 1 iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: Whether to verify ssl certificate on connection or not.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If environment field isn't found, environment is "".
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return value unchanged. Used to
        allow the user to manipulate the environment field via regex logic. If regex
        pattern is null or empty, or the environment value is null, the final environment
        result is "".
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: CA Certificate File
    is_mandatory: false
    is_advanced: true
    mode: script
description: Splunk Pull Connector
integration: Splunk
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#splunk-connector
rules: []
is_connector_rules_supported: false
creator: admin
