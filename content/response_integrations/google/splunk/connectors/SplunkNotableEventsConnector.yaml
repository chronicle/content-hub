name: Splunk ES - Notable Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: app
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the 'Environment Field
        Name' field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Rule Generator Field Name
    default_value: ''
    type: string
    description: 'The name of the field that will be used to map the rule generator
        value. Note: only information about notable event itself is used for mapping,
        events are disregarded. If invalid value is provided, connector will use "rule_name"
        as field.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Server Address
    default_value: https://<ip>:8089
    type: string
    description: Server address of the Splunk instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the Splunk account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the Splunk account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: Splunk API token. API token has priority over other authentication
        methods, when this field is not empty.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Urgency To Fetch
    default_value: Medium
    type: string
    description: 'Lowest urgency that will be used to fetch notable events. Possible
        values: Informational Low Medium High Critical'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        notable events from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Padding Time
    default_value: ''
    type: integer
    description: 'Amount of hours that will be used as a padding. If nothing is provided,
        this parameter is not going to be applied. Max 100 hours. Note: it''s not
        safe to increase the padding period beyond 12 hours.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Only Drilldown Events
    default_value: false
    type: boolean
    description: 'If enabled, the connector will only try to fetch drilldown events,
        without trying to fetch base events. Note: this parameter requires ''Extract
        Base Events'' to be enabled.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Notable Events To Fetch
    default_value: 50
    type: integer
    description: How many notable events to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Splunk server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Query Filter
    default_value: ''
    type: string
    description: Additional filter for the query that is sent to Splunk to get notable
        events. Value provided here will be appended to the WHERE clause of the query.
        Please refer to documentation portal for more information.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: CA Certificate File
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Extract Base Events
    default_value: 'true'
    type: boolean
    description: 'If enabled, connector will try to extract base events related to
        notable event using information about the job. In other case, connector will
        create a Siemplify Event based on the notable event. Note: that if parameter
        is set to True, but connector can''t work with jobs, connector will use information
        about notable event as a fallback mechanism.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Notable Event Data Along Base Event
    default_value: 'false'
    type: boolean
    description: If enabled, connector will create Siemplify Events based on both
        Notable Event and Base Events together.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Multivalue Fields
    default_value: asset, src, dest, ip
    type: string
    description: A comma-separated list of fields that contain multiple entities.
        If, for example, one field can contain two hostnames, we would need to split
        notable event into two Siemplify Events in order to do a correct mapping of
        entities.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Name Source
    default_value: Search Name
    type: string
    description: 'Source for the alert name. Possible values: Search Name, Rule Name.'
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Ingest notable events from Splunk ES. Note: This connector only works
    with Splunk ES.'
integration: Splunk
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/splunk#splunk-es-notable-events-connector
rules: []
is_connector_rules_supported: false
creator: admin
