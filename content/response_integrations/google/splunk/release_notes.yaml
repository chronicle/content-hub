-   description: 'Added Splunk Pull Connector. Customers who are going to update the
        marketplace using zip, please follow these steps in order to successfully
        update the Splunk integration: 1. Update the marketplace using the provided
        zip file. 2. Connect to your server using or RDP (for 5.1) or ssh (for 5.3)
        and go to the following path: On 5.1: C:\Siemplify_Server\MarketPlace\Integrations\Splunk\Dependencies\cross.
        On 5.3: /opt/siemplify/siemplify_server/Marketplace/Integrations/Splunk/Dependencies/cross.
        And make sure you only have the latest dependencies in this folder, you can
        either compare this folder content with the latest integration in the marketplace
        zip or leave only the newest dependencies on your server, e.g if you have
        TIPCommon-1.0.9-py2.. and TIPCommon-1.0.10-py… remove the TIPCommon-1.0.9-py2..
        from your server. Then update the integration to the newest version.'
    version: 15.0
    item_name: Splunk Pull Connector
    item_type: Integration
    ticket_number: TIPG-88
    new: true
    regressive: false
    deprecated: false
    removed: false
