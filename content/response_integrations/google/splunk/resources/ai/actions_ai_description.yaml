Update Notable Events:
  ai_description: >-
    ### General Description

    Updates notable events in Splunk Enterprise Security (ES). This action allows
    analysts to programmatically modify the metadata of specific notable events by
    providing their unique identifiers. It is specifically designed for Splunk ES
    environments.


    ### Flow Description

    1. **Initialization:** Extracts Splunk configuration and action parameters.

    2. **Validation:** Checks if the `Notable Event IDs` are provided and ensures
    at least one update field (Status, Urgency, New Owner, Comment, or Disposition)
    is populated.

    3. **Mapping:** Converts human-readable dropdown selections (like 'Closed' or
    'True Positive') into the numerical or formatted values required by the Splunk
    ES API.

    4. **Execution:** Sends a POST request to the Splunk `/services/notable_update`
    endpoint with the specified IDs and the requested changes.

    5. **Completion:** Reports the number of successfully updated events or handles
    errors if the update fails.


    ### Additional Notes

    - **Requirement:** At least one update parameter (Status, Urgency, New Owner,
    Comment, or Disposition) must be configured for the action to run successfully.

    - This action is only compatible with Splunk Enterprise Security.
