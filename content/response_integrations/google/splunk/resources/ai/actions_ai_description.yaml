Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and a Splunk instance. It ensures that the provided configuration parameters—such
    as the API Root, authentication credentials, and SSL settings—are correct and
    that the Splunk server is reachable over the network.


    ### Flow Description

    1. **Initialization**: The action starts by initializing the Siemplify context
    and logger.

    2. **Parameter Extraction**: It retrieves the integration configuration parameters,
    including the API endpoint, credentials, and security settings.

    3. **Manager Setup**: It instantiates the `SplunkManager`. During instantiation,
    the manager handles authentication and configures the request session with the
    appropriate SSL settings.

    4. **Connectivity Check**: The manager executes a connectivity test, which sends
    a POST request to the Splunk search export endpoint with a minimal query designed
    to return quickly.

    5. **Result Handling**: If the request is successful, the action returns a success
    message and completes with a `True` result. If an exception occurs, the action
    logs the error, returns a failure message, and completes with a `False` result.


    ### Additional Notes

    * **Authentication**: The action requires either a valid Username and Password
    combination or a valid API Token configured in the integration settings.

    * **Connectivity Test**: The action performs a lightweight search query (`search
    index=main | where _time > {time.time()}| head 1`) to confirm that the API is
    functional.
