SplunkQuery:
  ai_description: >-
    ### General Description

    Executes one or more search queries in Splunk and retrieves the resulting event
    data. This action supports asynchronous execution, meaning it initiates search
    jobs and polls for their completion. It allows for fine-grained control over the
    search timeframe, result limits, and specific fields to be returned. The results
    are presented both as a raw JSON object and a formatted data table within the
    Google SecOps case.


    ### Flow Description

    1. Parses the input query parameter to identify if one or multiple queries need
    to be executed.

    2. For each query, sends a request to Splunk to create an asynchronous search
    job.

    3. Enters a polling state, checking the status of the search jobs at regular intervals
    until they are marked as 'Done'.

    4. Once a job is complete, fetches the results from Splunk, respecting the defined
    count limit and field filters.

    5. Deletes the search jobs from the Splunk server to free up resources.

    6. Aggregates results from all queries and populates the action's JSON result
    and a data table named 'Splunk Query Results'.


    ### Additional Notes

    - This action does not operate on specific entities; it executes generic queries
    against the Splunk index.

    - The action automatically appends `head` and `fields` commands to the SPL query
    based on the provided parameters.
