Execute Entity Query:
  ai_description: >-
    ### General Description

    This action executes a dynamic Splunk search query that is automatically filtered
    based on the entities present in the current Google SecOps context. It allows
    analysts to perform targeted threat hunting or data retrieval by mapping SecOps
    entities (IPs, Hostnames, File Hashes, Users, URLs) to specific Splunk fields.
    The action constructs a Splunk `WHERE` clause using the provided entity keys and
    logical operators, executes the search as an asynchronous job, and returns the
    results as both a data table and raw JSON.


    ### Flow Description

    1. **Entity Identification:** The action scans the alert for entities of types
    ADDRESS, HOSTNAME, FILEHASH, USER, and URL.

    2. **Query Construction:** It maps these entities to the user-defined Splunk field
    keys and builds a `WHERE` clause using the specified `Cross Entity Operator`.

    3. **Job Creation:** A search job is initiated in Splunk using the base query,
    the generated filters, time range, and result limits via a POST request to the
    Splunk API.

    4. **Polling:** The action polls Splunk until the search job reaches a completed
    state.

    5. **Data Retrieval:** Once finished, the action fetches the results via a GET
    request and formats them into a data table and a JSON object.

    6. **Cleanup:** The temporary search job is deleted from the Splunk server via
    a DELETE request.


    ### Additional Notes

    - The action requires at least one "Entity Key" parameter to be configured to
    effectively filter the search by entities.

    - If "Stop If Not Enough Entities" is True, the action will abort if a configured
    key (e.g., IP Entity Key) finds no matching entities in the alert scope.
