Get Host Events:
  ai_description: >-
    ### General Description

    Retrieves events from Splunk associated with specific Hostname entities. This
    action allows analysts to gather historical or contextual log data directly from
    Splunk for investigation within Google SecOps. It constructs a search query for
    each host, retrieves matching events within a specified time range, and presents
    the data as entity tables and raw JSON.


    ### Flow Description

    1. **Initialization**: The action extracts Splunk connection details and user-defined
    search parameters.

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities within the current
    Google SecOps case context.

    3. **Query Construction**: For each host, it builds a Splunk search query using
    the `Host Key` and the entity's identifier (or original identifier), optionally
    restricted by the specified `Index` and time range.

    4. **Data Retrieval**: It executes the search via the Splunk API (`/services/search/v2/jobs/export`)
    and fetches the resulting events up to the specified `Event Per Host Limit`.

    5. **Data Processing**: Retrieved events are parsed and converted into both JSON
    and CSV formats for display and downstream use.

    6. **Output Generation**: The action attaches a data table to each host entity
    in the case and provides a comprehensive JSON result containing all retrieved
    events.


    ### Additional Notes

    - This action specifically targets `HOSTNAME` entities. Other entity types in
    the case will be ignored.

    - The action uses the Splunk Export API to efficiently retrieve event data.
