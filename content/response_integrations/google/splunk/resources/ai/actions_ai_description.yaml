SplunkCsvViewer:
  ai_description: >-
    ### General Description

    The SplunkCsvViewer action is a deprecated utility designed to transform raw JSON
    data into a structured CSV format and display it as a data table within a Google
    SecOps case. It is primarily used to visualize results obtained from previous
    Splunk search actions.


    ### Flow Description

    1. Retrieves Splunk connection details from the integration configuration.

    2. Extracts the `Results` parameter provided by the user or a previous playbook
    step.

    3. Parses the `Results` string as JSON and converts the dictionary/list structure
    into a CSV-formatted string.

    4. Attaches the resulting CSV data to the SOAR case as a new data table titled
    "Splunk Query Results".

    5. Concludes by reporting whether results were successfully processed.


    ### Additional Notes

    This action is marked as Deprecated.
