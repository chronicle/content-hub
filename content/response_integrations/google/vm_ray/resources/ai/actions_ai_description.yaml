Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the VMRay API by performing a GET request to the analysis
    endpoint. This action is used to verify that the integration configuration, including
    the API root and API key, is correct and that the SOAR platform can successfully
    communicate with the VMRay instance.


    ### Flow Description

    1. Extracts configuration parameters (`Api Root`, `Api Key`, `Verify SSL`) from
    the integration settings.

    2. Initializes the `VMRayClient` with the provided credentials and SSL verification
    setting.

    3. Executes the `test_connectivity()` method, which performs an HTTP GET request
    to the VMRay API analysis endpoint (`/rest/analysis?_limit=1`).

    4. Returns a success message if the connection is established, or an error message
    if the connection fails, updating the action status accordingly.


    ### Additional Notes

    This action does not interact with entities or modify any data. It is used solely
    for verifying integration configuration.
