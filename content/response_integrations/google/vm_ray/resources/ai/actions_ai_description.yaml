Scan Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using VMRay. This action retrieves detailed sample
    analysis, associated IOCs, and threat indicators for a specific hash to provide
    comprehensive threat intelligence.


    ### Flow Description

    1. Iterates over the target File Hash entities.

    2. Makes a GET request to the VMRay API (`/rest/sample/md5/`, `/rest/sample/sha1/`,
    or `/rest/sample/sha256/` depending on the hash type) to retrieve sample analysis
    data.

    3. Makes a GET request to the VMRay API (`/rest/sample/{id}/iocs`) to fetch associated
    IOCs, filtering the results by the specified IOC types and verdicts.

    4. Makes a GET request to the VMRay API (`/rest/sample/{id}/threat_indicators`)
    to fetch threat indicators, filtering by the specified score threshold.

    5. Updates the entity's enrichment data, adds data tables and web links, and marks
    the entity as suspicious if the sample verdict is malicious or suspicious.

    6. Optionally creates an insight with the analysis results based on the action
    parameters.


    ### Additional Notes

    Supports MD5, SHA1, and SHA256 hashes. The action allows fine-grained control
    over the types and verdicts of IOCs returned, as well as the minimum score for
    threat indicators.
