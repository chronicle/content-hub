Scan Hash:
  ai_description: >-
    ### General Description

    Scans a file hash using VMRay to retrieve threat intelligence, IOCs, and threat
    indicators. This action provides detailed analysis of a file sample, including
    its verdict, associated IOCs, and threat indicators, which helps in assessing
    the risk of the file.


    ### Flow Description

    1. Extracts configuration (API Root, API Key, Verify SSL) and action parameters
    (Threat Indicator Score Threshold, IOC Type Filter, IOC Verdict Filter, etc.).

    2. Filters target entities for `FILEHASH` type.

    3. For each entity, queries the VMRay API for sample analysis using the hash.

    4. Retrieves associated IOCs (filtered by type and verdict) and threat indicators
    (filtered by score).

    5. Adds analysis details, IOC tables, and threat indicator tables to the entity
    results.

    6. Updates the entity with enrichment data and sets the suspicious status if the
    sample verdict is malicious or suspicious.

    7. Optionally creates an insight on the entity if the `Create Insight` parameter
    is enabled.


    ### Additional Notes

    Supports filtering IOCs and threat indicators based on user-defined thresholds
    and types. The action updates the entity's `additional_properties` with enrichment
    data and marks the entity as enriched.
  ai_short_description: >-
    Scans a file hash using VMRay to retrieve threat intelligence, IOCs, and threat
    indicators, enriching the entity with analysis results.
