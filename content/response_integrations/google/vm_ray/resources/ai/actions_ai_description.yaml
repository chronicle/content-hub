Add Tag to Submission:
  ai_description: >-
    General Description

    Adds a tag to a specific submission in the VMRay platform. This action allows
    users to categorize or label submissions for better organization and tracking
    within VMRay.


    Flow Description

    1. The action extracts the required configuration parameters (Api Root, Api Key,
    Verify SSL) and action parameters (Submission ID, Tag Name).

    2. It initializes the `VMRayClient` with the provided credentials.

    3. The action calls the `add_tag_to_submission` method, which performs a POST
    request to the VMRay API endpoint `/rest/submission/{submission_id}/tag/{tag_name}`.

    4. The action returns a success or failure message based on the API response.


    Additional Notes

    This action modifies the state of a submission in VMRay by adding a tag.
  ai_short_description: >-
    Adds a tag to a VMRay submission using the submission ID.
