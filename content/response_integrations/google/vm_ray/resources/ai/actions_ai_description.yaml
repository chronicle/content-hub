  ai_description: >-
    The "Scan Hash" action integrates with VMRay to retrieve detailed analysis reports,
    IOCs, and threat indicators for specific file hashes. It enriches the target entities
    with the retrieved data, updates their suspicious status based on the analysis
    verdict, and optionally creates insights containing the analysis results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Threat Indicator Score Threshold | string (int) | Yes | Specify the lowest score
    that will be used to return threat indicators. Maximum: 5. |

    | IOC Type Filter | string | Yes | Specify a comma-separated list of IOC types
    that need to be returned. Possible values: domains, emails, files, ips, mutexes,
    processes, registry, urls. |

    | IOC Verdict Filter | string | Yes | Specify a comma-separated list of IOC verdicts
    that will be used during the ingestion of IOCs. Possible values: Malicious, Suspicious,
    Clean, None. |

    | Max IOCs To Return | string (int) | No | Specify how many IOCs to return per
    entity per IOC type. Default: 10. |

    | Max Threat Indicators To Return | string (int) | No | Specify how many threat
    indicators to return per entity. Default: 10. |

    | Create Insight | boolean | No | If enabled, action will create an insight containing
    information about entities. |

    | Only Suspicious Insight | boolean | No | If enabled, action will only create
    insight for suspicious entities. Note: "Create Insight" parameter needs to be
    enabled. |


    ### Flow

    1. Validates the provided parameters, ensuring thresholds and filters are within
    acceptable ranges.

    2. Iterates over the target entities of type FILEHASH.

    3. For each entity, fetches the sample analysis report from VMRay using the hash.

    4. Retrieves associated IOCs and threat indicators based on the configured filters
    and limits.

    5. Adds data tables to the entity containing the retrieved IOCs and threat indicators.

    6. Enriches the entity with the analysis data and updates its suspicious status
    if the verdict is malicious or suspicious.

    7. Creates an insight for the entity if configured to do so.

    8. Returns a JSON result containing the full analysis data for all successfully
    processed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment data, suspicious status, and creates insights.
    reasoning: >-
      The action fetches data from VMRay using GET requests (`get_sample_by_hash`,
      `get_sample_iocs`, `get_sample_threat_indicators`). It does not mutate external
      data. It mutates internal data by updating entities (`siemplify.update_entities`)
      and creating insights (`siemplify.add_entity_insight`).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data, doesn't mutate external data, and only mutates internal
      data by updating entities and creating insights. This perfectly matches the
      Enrichment category.
    remediation: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters by `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` where `SUPPORTED_ENTITY_TYPES = [EntityTypes.FILEHASH]`.
      So it runs on FILEHASH entities and filters by entity_type.
