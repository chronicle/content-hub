  ai_description: >-
    Adds a tag to a specific submission in VMRay using the submission ID.


    ### Parameters

    | Parameter | Mandatory | Type | Description |

    | --- | --- | --- | --- |

    | Submission ID | Yes | Integer | The ID of the submission to which the tag will
    be added. |

    | Tag Name | Yes | String | The name of the tag that needs to be added. |


    ### Flow

    1. Extracts the integration configuration and action parameters.

    2. Initializes the VMRay client.

    3. Sends a POST request to VMRay to add the specified tag to the given submission
    ID.

    4. Returns a success message if the tag is added successfully, or an error message
    if the action fails.
