Upload File And Get Report:
  ai_description: >-
    ### General Description

    Submits files for analysis in VMRay and retrieves the resulting analysis reports.
    This action operates asynchronously, uploading specified files to the VMRay sandbox
    and periodically checking the submission status until the analysis is complete.
    It then retrieves and attaches the analysis reports, IOCs, and threat indicators
    to the action results.


    ### Flow Description

    1. Extracts the file paths, tags, and comments from the action parameters.

    2. Validates that the specified files are accessible on the local system.

    3. Submits the files to VMRay via a POST request (`/rest/sample/submit`).

    4. Asynchronously polls the VMRay API (`/rest/submission/{id}`) to check if the
    analysis is finished.

    5. Once finished, retrieves the sample details, IOCs, and threat indicators via
    GET requests.

    6. Downloads the JSON and ZIP analysis archives and attaches them to the case.

    7. Populates data tables with the extracted IOCs and threat indicators.


    ### Additional Notes

    The action runs asynchronously. Ensure the script timeout value in the IDE is
    adjusted as needed to accommodate the analysis duration.
