    Submits a URL to VMRay for analysis and retrieves the resulting threat intelligence,
    including IOCs and threat indicators. The action updates the entity's suspicious
    status based on the analysis verdict and can optionally create an insight with
    the findings.


    ### Parameters Description

    | Parameter | Mandatory | Type | Description |

