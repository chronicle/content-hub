Scan URL:
  ai_description: >-
    ### General Description

    Submits a URL to VMRay for browser analysis and retrieves the resulting threat
    intelligence, including IOCs and threat indicators. This action allows for automated
    URL scanning to assess potential maliciousness and gather contextual data for
    security investigations.


    ### Flow Description

    1. The action receives a URL entity.

    2. It submits the URL to VMRay for analysis using the `submit_url_for_browser_analysis`
    API call.

    3. It polls for job completion using `get_job_details`.

    4. Once the analysis is finished, it retrieves the detailed report, IOCs, and
    threat indicators using `get_sample_by_id`, `get_sample_iocs`, and `get_sample_threat_indicators`
    API calls.

    5. It updates the entity with enrichment data (e.g., threat indicators, IOCs)
    and optionally creates an insight based on the analysis results.


    ### Additional Notes

    The action supports filtering IOCs by type and verdict, and filtering threat indicators
    by score. It also allows for adding tags and comments to the submission.
