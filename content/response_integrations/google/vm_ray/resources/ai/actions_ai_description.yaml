Upload File And Get Report:
  ai_description: >-
    ### General Description

    Submits files to VMRay for sandbox analysis and retrieves the resulting threat
    intelligence report. This action automates the file submission process, monitors
    the analysis status, and extracts detailed findings including IOCs and threat
    indicators.


    ### Flow Description

    1. Extracts the `Sample File Path`, `Tag Names`, and `Comment` parameters.

    2. Validates that the specified files are accessible on the system.

    3. Submits the files to VMRay via the `submit_sample_file` API call.

    4. If the analysis is asynchronous, the action periodically queries the submission
    status until completion or timeout.

    5. Retrieves analysis results, including IOCs (Files, IPs, URLs, Registry, Domains,
    Mutexes) and threat indicators.

    6. Adds data tables for IOCs and threat indicators to the action results.

    7. Downloads the JSON and ZIP analysis reports and attaches them to the action
    results.


    ### Additional Notes

    This action is asynchronous. Ensure the script timeout in the Siemplify IDE is
    adjusted if necessary to allow sufficient time for the analysis to complete.
