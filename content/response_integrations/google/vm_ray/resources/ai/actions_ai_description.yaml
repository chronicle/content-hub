Scan URL:
  ai_description: >-
    ### General Description

    Submits a URL entity to VMRay for browser analysis and retrieves the resulting
    threat intelligence, IOCs, and threat indicators. This action initiates a new
    analysis job on the VMRay platform and enriches the URL entity with the detailed
    behavior report.


    ### Flow Description

    1. Iterates over the target URL entities.

    2. Submits each URL to VMRay for analysis via a POST request (`/rest/sample/submit`).

    3. Waits asynchronously for the analysis job to complete by polling the job status.

    4. Retrieves the sample analysis report, associated IOCs, and threat indicators
    from VMRay.

    5. Enriches the URL entity with the analysis results, updates its suspicious status
    if applicable, and optionally creates an insight.


    ### Additional Notes

    This is an asynchronous action that will pause and resume execution until the
    VMRay analysis job finishes.
