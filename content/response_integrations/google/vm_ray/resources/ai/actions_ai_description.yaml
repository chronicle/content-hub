  ai_description: >-
    ### General Description

    The **Upload File And Get Report** action submits specified files to VMRay for
    malware analysis and retrieves the resulting behavior reports, IOCs, and threat
    indicators. This action runs asynchronously, polling the VMRay service until the
    analysis is complete, and then attaches the detailed JSON and ZIP reports to the
    action results.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Sample File Path | String | Yes | A comma-separated list of absolute file paths
    to be submitted for analysis. |

    | Tag Names | String | No | Tags to add to the submission for categorization or
    tracking. |

    | Comment | String | No | A comment to attach to the submission. |


    ### Flow Description

    1. **Initialization**: Extracts the provided file paths, tags, and comments from
    the action parameters.

    2. **Submission**: Uploads the specified files to VMRay via a POST request to
    initiate the analysis.

    3. **Status Polling**: Asynchronously checks the status of the submission to determine
    if the analysis has finished.

    4. **Data Retrieval**: Once the analysis is complete, fetches the sample analysis
    details, extracted IOCs (files, IPs, URLs, registries, domains, mutexes), and
    threat indicators.

    5. **Result Generation**: Downloads the JSON and ZIP analysis archives and attaches
    them to the action results, along with data tables containing the IOCs and threat
    indicators.
