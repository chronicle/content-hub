Add Tag to Submission:
  ai_description: >-
    ### General Description

    This action adds a specific tag to a submission in VMRay using the provided Submission
    ID.


    ### Flow Description

    1. Extracts the `Submission ID` and `Tag Name` from the action parameters.

    2. Initializes the VMRay client with the provided API credentials.

    3. Makes a POST request to the VMRay API (`/rest/submission/{submission_id}/tag/{tag_name}`)
    to add the tag to the submission.

    4. Returns a success message if the operation completes, or an error message if
    it fails.


    ### Additional Notes

    None.
