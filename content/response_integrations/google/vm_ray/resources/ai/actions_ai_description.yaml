    information about entities. |

    | Only Suspicious Insight | No | Boolean | If enabled, action will only create
    insight for suspicious entities. Note: "Create Insight" parameter needs to be
    enabled. |

    | Tag Names | No | String | Specify the tags that you want to add to the submission.
