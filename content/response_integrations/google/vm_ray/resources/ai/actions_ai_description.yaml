    1. Submits the target URL entities to VMRay for browser analysis.

    2. Waits for the analysis jobs to complete.

    3. Retrieves the sample analysis results, including associated IOCs and threat
    indicators.

    4. Enriches the entities with the retrieved data, updates their suspicious status
    if applicable, and optionally creates insights.
