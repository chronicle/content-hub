[project]
name = "VMRay"
version = "20.0"
description = "VMRay Analyzer provides Malware Analysts and Incident Responders with a comprehensive picture of advanced threats in an intiutive interface."
requires-python = ">=3.11,<3.12"
dependencies = [ "hashid==3.1.4", "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
