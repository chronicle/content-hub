Reset:
  ai_description: >-
    ### General Description

    Hard resets a virtual machine in a VSphere environment.


    ### Flow Description

    1. Connects to the VSphere server using the provided configuration (Server Address,
    Username, Password, Port).

    2. Retrieves the target virtual machine object using the `Vm Name` parameter.

    3. Executes the `ResetVM_Task` on the retrieved virtual machine object via the
    VSphere API.

    4. Waits for the task to complete.


    ### Additional Notes

    This action performs a hard reset, which may result in data loss on the target
    VM.
