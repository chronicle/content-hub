Get Vm By Ip:
  ai_description: >-
    ### General Description

    Retrieves Virtual Machine (VM) information from VMware vSphere based on IP address
    entities. This action queries the vCenter server to find a VM associated with
    a specific IP address and returns contextual metadata about the VM, such as its
    name, state, guest OS, and UUIDs.


    ### Flow Description

    1. Initializes the connection to the vSphere server using the provided integration
    configuration.

    2. Iterates through the target entities, specifically filtering for IP Address
    entities.

    3. For each valid IP address, queries vSphere using the `FindAllByIp` method to
    locate the corresponding VM.

    4. Retrieves detailed information about the found VM (e.g., Name, Template, Path,
    Guest, Instance UUID, Bios UUID, State, VMware Tools status, and IP Address).

    5. Aggregates the retrieved VM information and attaches it to the action's JSON
    result.


    ### Additional Notes

    - This action only processes IP Address entities.

    - If multiple VMs share the same IP address, the action will return information
    for the first VM found by the vSphere search index.
