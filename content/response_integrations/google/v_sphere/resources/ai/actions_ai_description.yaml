Get System Info:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific Virtual Machine (VM) from VMware
    vSphere. This action fetches contextual metadata such as the VM's power state,
    IP address, UUIDs, and guest OS details based on the provided VM name.


    ### Flow Description

    1. Establishes a connection to the vSphere server using the integration's configured
    credentials.

    2. Searches the vSphere environment for the target VM using the provided `Vm Name`
    parameter.

    3. Retrieves detailed information about the VM via the vSphere API.

    4. Formats the retrieved data into a CSV table and attaches it to the action's
    results.

    5. Returns the VM information as a JSON object for further use in the playbook.


    ### Additional Notes

    This action does not operate on SecOps entities; it relies entirely on the explicit
    VM name provided in the action parameters.
