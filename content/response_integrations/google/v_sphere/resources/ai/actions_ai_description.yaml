  ai_description: >-
    Retrieves Virtual Machine (VM) information from a VMware vSphere environment based
    on provided IP address entities.


    ### General Description

    This action connects to a vSphere server and searches for Virtual Machines that
    match the IP addresses of the target entities. When a match is found, it extracts
    contextual metadata about the VM, including its name, template status, path, guest
    OS, UUIDs, power state, and VMware Tools status. The extracted information is
    returned as a JSON result for further use in the playbook.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration's configuration parameters (Server Address, Username, Password,
    Port) and the target entities provided in the case.


    ### Flow Description

    1. Establishes a connection to the vSphere server using the integration's configured
    credentials.

    2. Iterates through the target entities, filtering specifically for those of type
    `ADDRESS`.

    3. Queries the vSphere environment to locate a VM associated with each IP address.

    4. Retrieves detailed configuration and runtime information for each found VM.

    5. Aggregates the data and attaches it to the action's output as a JSON result,
    concluding with a summary message of the found VMs.
