Get System Info:
  ai_description: >-
    ### General Description

    Retrieves detailed configuration and status information for a specific Virtual
    Machine (VM) from a vSphere environment. This action allows analysts to gather
    contextual data about a VM, such as its power state, guest operating system, IP
    address, and UUIDs, to assist in investigation and troubleshooting.


    ### Flow Description

    1. The action initializes a connection to the vSphere server using the configured
    credentials (Server Address, Username, Password, Port).

    2. It retrieves the target VM name from the action parameters.

    3. The action calls the `get_obj_by_name` method of the `VSphereManager` to locate
    the specified VM within the vSphere inventory.

    4. Once the VM object is retrieved, it calls `VSphereManager.get_vm_info` to extract
    key attributes, including Name, Template status, Path, Guest OS, Instance UUID,
    BIOS UUID, Power State, VMware Tools status, and IP Address.

    5. The retrieved information is formatted into a CSV table and a JSON object.

    6. The action adds these results to the output and terminates with a success message.


    ### Additional Notes

    This action is a read-only operation and does not perform any state-changing modifications
    on the vSphere environment or the target virtual machine.
  ai_short_description: >-
    Retrieves detailed configuration and status information for a specific Virtual
    Machine from a vSphere environment.
