  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific Virtual Machine (VM) from VMware
    vSphere. This action connects to the vSphere environment and fetches contextual
    metadata such as the guest OS, IP address, power state, and UUIDs for the specified
    VM.


    ### Flow Description

    1. Connects to the vSphere server using the provided integration credentials.

    2. Searches for the target Virtual Machine using the provided VM name.

    3. Retrieves the VM's configuration and runtime information.

    4. Outputs the retrieved information as a JSON result and attaches a data table
    to the action results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Vm Name | String | Yes | The name of the target Virtual Machine to retrieve
    information for. This dictates which VM's data will be fetched. |
