Power Off:
  ai_description: >-
    ### General Description

    Powers off a specific Virtual Machine (VM) in a VMware vSphere environment. This
    action initiates a state change on the external vCenter/ESXi server to completely
    shut down the target VM.


    ### Flow Description

    1. Establishes a connection to the vSphere server using the integration's configured
    credentials.

    2. Searches for and retrieves the target Virtual Machine object using the provided
    `Vm Name` parameter.

    3. Executes a power-off task on the retrieved Virtual Machine via the vSphere
    API.

    4. Waits for the task to complete and returns a success message to the SOAR platform.


    ### Additional Notes

    This action directly affects the operational state of the target VM, resulting
    in immediate downtime for the system. Ensure the correct VM name is provided to
    avoid unintended service disruptions.
