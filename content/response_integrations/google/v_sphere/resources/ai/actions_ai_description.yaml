Reset:
  ai_description: >-
    ### General Description

    Hard resets a specific Virtual Machine (VM) in VMware vSphere. This action initiates
    a state change on the external vSphere environment to forcefully restart the specified
    VM.


    ### Flow Description

    1. Establishes a connection to the VMware vSphere server using the provided integration
    credentials.

    2. Retrieves the target Virtual Machine object by its name using the vSphere API.

    3. Executes a hard reset command (`ResetVM_Task`) on the target VM.

    4. Waits for the reset task to complete successfully.

    5. Returns a success message to the SecOps platform.


    ### Additional Notes

    This action performs a hard reset, which is equivalent to forcefully restarting
    the machine without a graceful OS shutdown. Ensure that the target VM name exactly
    matches the name in vSphere.
