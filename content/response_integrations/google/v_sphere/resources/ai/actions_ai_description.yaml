Get Vm By Ip:
  ai_description: >-
    ### General Description

    This action retrieves virtual machine (VM) information from a VMware vSphere environment
    based on a provided IP address. It connects to the vSphere server, searches for
    the VM associated with the given IP, and returns detailed configuration and state
    information.


    ### Flow Description

    1. Connect to the vSphere server using the provided configuration parameters (Server
    Address, Username, Password, Port).

    2. Iterate through the target entities in the case.

    3. Filter for entities of type 'ADDRESS'.

    4. For each IP address, query the vSphere environment using the `search_index.FindAllByIp`
    method to identify the associated virtual machine.

    5. Retrieve detailed information about the VM, such as its name, power state,
    and guest OS, using the `get_vm_info` method.

    6. Add the retrieved VM information to the action results as a JSON object.

    7. Provide a summary of the found VMs in the action output.


    ### Additional Notes

