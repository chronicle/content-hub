Hash Query:
  ai_description: >-
    General Description

    This action retrieves detailed information about a specific file hash from the
    Cynet platform. It allows analysts to gather threat intelligence and file metadata
    to assist in investigations.


    Flow Description

    1. The action initializes the CynetManager using the configured API credentials
    (Api Root, Username, Password, Verify SSL).

    2. It iterates through the provided target entities, filtering specifically for
    entities of type 'FILEHASH'.

    3. For each file hash, it validates if the hash format is SHA256 using the `hashid`
    library.

    4. If the hash is a valid SHA256, the action performs a GET request to the Cynet
    API (`/full/file`) to retrieve the file details.

    5. The retrieved data is added to the entity's table in the UI and included in
    the final action result JSON.


    Additional Notes

    This action only supports SHA256 hashes. If a hash is not in SHA256 format, it
    will be skipped. The action does not modify the entity state or create insights;
    it purely provides enrichment data.
