Kill Hash In Hosts:
  ai_description: >-
    ### General Description

    This action identifies hosts where a specific file hash is present and terminates
    the associated processes using Cynet. It is designed to remediate threats by stopping
    malicious processes from running on affected endpoints.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. Validates whether the file hash is in SHA256 format.

    4. Makes a GET request to the Cynet API (`/full/file`) to retrieve details and
    occurrences of the hash across the environment.

    5. Iterates through the list of hosts where the hash was found.

    6. Makes a POST request to the Cynet API (`/file/remediation/kill`) for each host
    to execute a kill process remediation action.

    7. Makes a GET request to the Cynet API (`/file/remediation/{remediation_action_id}`)
    to retrieve the status of the remediation action.

    8. Aggregates the remediation IDs and outputs them as a JSON result.


    ### Additional Notes

    This action only processes SHA256 file hashes. Hashes of other types (e.g., MD5,
    SHA1) will be ignored.
