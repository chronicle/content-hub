Delete Hash In Hosts:
  ai_description: >-
    ### General Description

    Deletes a specific file hash from infected hosts using the Cynet platform. This
    action is used for remediation of malicious files identified in the environment.


    ### Flow Description

    1. The action iterates through the provided target entities, filtering for those
    of type `FILEHASH`.

    2. It validates that the hash is a SHA256 hash.

    3. It calls the Cynet API (`get_hash_details`) to retrieve information about the
    file, specifically identifying the hosts where the file is present.

    4. For each host identified, it triggers a delete file remediation request (`delete_file_remediation`)
    via the Cynet API.

    5. It retrieves the status of the remediation action and compiles the results.

    6. Finally, it outputs the remediation status for each host to the action results.


    ### Additional Notes

    This action requires valid Cynet API credentials configured in the integration
    settings. It only supports SHA256 hashes.
