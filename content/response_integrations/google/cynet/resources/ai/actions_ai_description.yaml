Delete Hash In Hosts:
  ai_description: >-
    ### General Description

    Initiates a delete file remediation action on hosts via Cynet for specified File
    Hash entities. This action identifies where a specific file hash has been observed
    across the environment and triggers a deletion command on those endpoints.


    ### Flow Description

    1. Iterates over the target entities and filters for File Hash entities.

    2. Verifies if the provided file hash is a valid SHA256 hash.

    3. Retrieves hash details from Cynet using the `get_hash_details` API endpoint
    to find occurrences of the file on various hosts.

    4. For each host where the file is found, initiates a delete file remediation
    action using the `delete_file_remediation` API endpoint.

    5. Retrieves the status of the remediation action using the `get_remediation_status`
    API endpoint.

    6. Returns a JSON result containing the remediation IDs mapped to each host.


    ### Additional Notes

    - The action only supports SHA256 hashes. Other hash types will be ignored.

    - The action automatically discovers the hosts where the file is present based
    on Cynet's telemetry; it does not require hostnames as input.
  ai_short_description: >-
    Initiates a delete file remediation action on hosts via Cynet for specified File
    Hash entities by discovering occurrences and triggering deletion.
