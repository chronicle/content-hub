  ai_description: >-
    Deletes files associated with specific file hashes across hosts using Cynet.


    ### General Description

    This action acts as a remediation step by identifying hosts where a specific file
    hash exists and issuing a command to Cynet to delete the file from those hosts.
    It retrieves the status of the remediation action and returns the results to the
    case.


    ### Flow Description

    1. Iterates over the target entities and filters for `FILEHASH` entities.

    2. Verifies if the provided hash is a valid SHA256 hash.

    3. Fetches hash details from Cynet to identify occurrences (hostnames) where the
    file is present.

    4. Issues a delete file remediation command to Cynet for each identified host.

    5. Retrieves the remediation status for the issued commands.

    6. Aggregates the remediation IDs and statuses, returning them as a JSON result.


    ### Parameters Description

    This action does not require any specific input parameters beyond the standard
    Cynet integration configuration (API Root, Username, Password, and Verify SSL).
