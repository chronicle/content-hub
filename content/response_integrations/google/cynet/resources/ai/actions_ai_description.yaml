Quarantine Hash In Hosts:
  ai_description: >-
    ### General Description

    Quarantines a malicious file hash on all affected hosts identified via the Cynet
    platform. This action retrieves threat intelligence regarding the file hash, identifies
    all hosts where the file is present, and triggers a quarantine remediation command
    on those endpoints to prevent further execution or interaction.


    ### Flow Description

    1. The action retrieves the Cynet integration configuration (API Root, credentials,
    and SSL verification settings).

    2. It iterates through the provided `FILEHASH` entities.

    3. For each entity, it verifies if the hash is a valid SHA-256 format.

    4. It calls the Cynet API (`get_hash_details`) to retrieve information about the
    file, including a list of occurrences (hosts).

    5. For each identified host, it executes a quarantine remediation command (`quarantine_file_remediation`)
    via the Cynet API.

    6. It retrieves the status of the remediation action and stores the result.

    7. Finally, it outputs the remediation status for each host and adds the result
    data to the action output.


    ### Additional Notes

    This action requires a valid Cynet integration configuration. It specifically
    targets `FILEHASH` entities and will skip any entities that do not match this
    type or are not valid SHA-256 hashes.
