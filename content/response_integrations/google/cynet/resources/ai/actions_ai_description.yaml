Kill Hash In Hosts:
  ai_description: >-
    ### General Description

    This action terminates a malicious process associated with a specific file hash
    on affected hosts using the Cynet platform. It identifies hosts where the file
    hash is present and triggers a remediation action to kill the process, effectively
    neutralizing the threat on those endpoints.


    ### Flow Description

    1. The action retrieves the Cynet integration configuration (API root, credentials,
    and SSL verification settings).

    2. It iterates through the provided `FILEHASH` entities.

    3. For each entity, it verifies if the hash is a valid SHA256 format.

    4. It calls the `get_hash_details` API method to retrieve information about the
    file, including a list of affected hosts.

    5. For each host identified in the hash details, it executes the `kill_file_remediation`
    API call to terminate the process.

    6. It retrieves the status of the remediation action using `get_remediation_status`.

    7. Finally, it aggregates the results and outputs a summary of the remediation
    actions performed.


    ### Additional Notes

    This action requires valid Cynet API credentials. It only processes SHA256 hashes.
    If a hash is not SHA256, the action will skip it.
