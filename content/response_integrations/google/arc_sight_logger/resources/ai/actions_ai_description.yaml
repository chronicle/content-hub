    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches event data from ArcSight Logger. It does not mutate external
      data (no POST/PUT/DELETE that changes state on the target system, only read
      operations). It does not mutate internal data (no changes to case entities or
      insights).
