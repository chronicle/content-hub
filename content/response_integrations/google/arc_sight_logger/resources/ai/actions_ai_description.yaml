Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ArcSight Logger instance using the provided integration
    configuration parameters. This action verifies that the credentials and network
    settings are correct and that the platform can successfully communicate with the
    ArcSight Logger API.


    ### Flow Description

    1. Extracts integration configuration parameters including Server Address, Username,
    Password, and Verify SSL.

    2. Initializes the ArcSight Logger manager.

    3. Authenticates to the ArcSight Logger API by making a POST request to the login
    endpoint.

    4. Performs a test connectivity request by making a POST request to the search
    endpoint.

    5. Logs out of the ArcSight Logger API by making a POST request to the logout
    endpoint.

    6. Returns a success or failure message based on the connection result.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the ArcSight Logger instance using the provided integration
    configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action only performs authentication and a basic search request to test connectivity.
      It does not fetch contextual data for alerts/entities, mutate external data,
      mutate internal data, update entities, create insights, modify alert data, or
      create case comments.
