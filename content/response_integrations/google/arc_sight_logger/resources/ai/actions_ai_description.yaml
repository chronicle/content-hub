  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Query | String | Yes | Specify the query to send to ArcSight Logger event search.
    |

    | Max Events to Return | String | No | Specify the amount of events to return.
    Limit is 10000. This is ArcSight Logger limitation. |

    | Time Frame | String | No | Specify the time frame which will be used to fetch
    events. Possible values: 1m, 1h, 1d. |

    | Fields to Fetch | String | No | Specify what fields to fetch from ArcSight Logger.
    If nothing is specified, then all of the available fields will be returned. |

    | Include Raw Event Data | Boolean | No | If enabled, raw event data is included
    in the response. |

    | Local Search Only | Boolean | No | Indicates that ArcSight Logger event search
    is local only, and does not include ArcSight Logger peers. |

    | Discover Fields | Boolean | No | Indicates that the ArcSight Logger search should
    try to discover fields in the events found. |

    | Sort | String | No | Specify what sorting method to use. Possible values: ascending,
    descending. |
