    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action executes a search query to retrieve historical logs and events from
      ArcSight Logger, which directly aligns with the 'Search Events' category. It
      does not enrich specific IOCs or assets, update alerts, or perform any containment
      or remediation actions.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: true
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Sends a query to ArcSight Logger to retrieve related events based on specified
    search parameters.


    ### Parameters Description

    * **Query** (Mandatory, String): Specify the query to send to ArcSight Logger
    event search.

    * **Max Events to Return** (Optional, String): Specify the amount of events to
    return. Limit is 10000. This is an ArcSight Logger limitation.

    * **Time Frame** (Optional, String): Specify the time frame which will be used
    to fetch events (e.g., 1m, 1h, 1d).

    * **Fields to Fetch** (Optional, String): Specify what fields to fetch from ArcSight
    Logger. If nothing is specified, then all of the available fields will be returned.

    * **Include Raw Event Data** (Optional, Boolean): If enabled, raw event data is
    included in the response.

    * **Local Search Only** (Optional, Boolean): Indicates that ArcSight Logger event
    search is local only, and does not include ArcSight Logger peers. Set to false
    if you want to include peers in the event search.

    * **Discover Fields** (Optional, Boolean): Indicates that the ArcSight Logger
    search should try to discover fields in the events found.

    * **Sort** (Optional, String): Specify what sorting method to use (ascending or
    descending).


    ### Flow Description

    1. The action initiates a search query session on the ArcSight Logger server.

    2. It asynchronously polls the server to check the status of the query execution.

    3. Once the query is completed, it retrieves the matching events based on the
    specified limits and sorting.

    4. The retrieved events are formatted and added to the action's JSON results and
    a case data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches event data from ArcSight Logger using a search query. It
      does not mutate any external data (initiating a search session is considered
      a read operation). It also does not mutate internal SecOps data such as entities,
      insights, or case comments; it only outputs results to the action's data table
      and JSON result.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source without mutating external state
      or modifying internal SecOps data (other than standard action outputs). Therefore,
      it qualifies as an enrichment action. It does not perform any remediation tasks.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not iterate over or process `siemplify.target_entities`. It
      executes a standalone query against the ArcSight Logger based on the provided
      parameters, without relying on SecOps entities.
