Send Query:
  ai_description: >-
    ### General Description

    Sends a query to the ArcSight Logger event log manager to retrieve and display
    related event logs. This action allows analysts to search for specific events
    within the ArcSight Logger environment based on a custom query, time frame, and
    other search parameters.


    ### Flow Description

    1. The action initiates a search session with ArcSight Logger by sending the provided
    query, time frame, and search parameters.

    2. If it is the first run, the action returns an `IN_PROGRESS` state along with
    a session ID and an encrypted token to track the query.

    3. On subsequent runs, the action checks the status of the query session using
    the session ID.

    4. If the query status is `COMPLETED`, the action retrieves the event results
    from ArcSight Logger.

    5. The retrieved events are then formatted into a CSV data table and a JSON result,
    which are added to the action output.

    6. If the query is still `RUNNING` or `STARTING`, the action continues to wait.


    ### Additional Notes

    This action is asynchronous and handles session management via encrypted tokens.
    It supports various parameters like time frame, sorting, and field selection to
    refine the search results.
  ai_short_description: >-
    Sends a query to ArcSight Logger to retrieve and display event logs.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
