Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ArcSight Logger instance using the provided credentials.
    This action verifies that the integration can successfully authenticate and communicate
    with the target server.


    ### Flow Description

    1. Extracts configuration parameters (`Server Address`, `Username`, `Password`,
    `Verify SSL`) from the integration settings.

    2. Initializes the `ArcSightLoggerManager` with the provided credentials.

    3. Calls the `login` method to authenticate with the ArcSight Logger API.

    4. Calls the `test_connectivity` method, which sends a test search request to
    the server to verify the connection.

    5. Calls the `logout` method to terminate the session.

    6. Returns the execution status and a success/failure message.


    ### Additional Notes

    This action does not modify any data; it is strictly for verifying connectivity.
  ai_short_description: >-
    Tests connectivity to the ArcSight Logger instance using the provided credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a login and a test search request to verify connectivity.
      It does not fetch contextual data for entities, nor does it mutate external
      or internal data.
