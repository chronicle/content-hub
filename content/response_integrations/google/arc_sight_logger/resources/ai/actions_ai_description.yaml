  parameters_description: "| Parameter | Type | Mandatory | Description |\n| --- |\
    \ --- | --- | --- |\n| Query | String | Yes | Specify the query to send to ArcSight\
    \ Logger event search. |\n| Max Events to Return | String | No | Specify the amount\
    \ of events to return. Limit is 10000. This is ArcSight Logger limitation. |\n\
    | Time Frame | String | No | Specify the time frame which will be used to fetch\
    \ events. Possible values: 1m - 1 minute ago, 1h - 1 hour ago, 1d - 1 day ago.\
    \ Note: You can\u2019t combine different values, like 1d2h30m. |\n| Fields to\
    \ Fetch | String | No | Specify what fields to fetch from ArcSight Logger. If\
    \ nothing is specified, then all of the available fields will be returned. |\n\
    | Include Raw Event Data | Boolean | No | If enabled, raw event data is included\
    \ in the response. |\n| Local Search Only | Boolean | No | Indicates that ArcSight\
    \ Logger event search is local only, and does not include ArcSight Logger peers.\
    \ Set to false if you want to include peers in the event search. |\n| Discover\
    \ Fields | Boolean | No | Indicates that the ArcSight Logger search should try\
    \ to discover fields in the events found. |\n| Sort | String | No | Specify what\
    \ sorting method to use. Possible values: ascending, descending. |"
