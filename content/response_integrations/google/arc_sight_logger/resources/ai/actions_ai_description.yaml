  ai_description: >-
    Tests connectivity to the ArcSight Logger instance using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (Server Address, Username,
    Password, Verify SSL).

    2. Initializes the ArcSight Logger manager.

    3. Attempts to log in to the ArcSight Logger instance.

    4. Tests connectivity by sending a dummy search request.

    5. Logs out of the ArcSight Logger instance.

    6. Returns a success message if the connection is established, otherwise returns
    an error message.


    ### Parameters Description

    This action does not require any action-specific parameters. It relies solely
    on the integration configuration parameters.
