Send Query:
  ai_description: >-
    ### General Description

    Sends a search query to ArcSight Logger to retrieve related events based on specified
    criteria such as time frame, event limits, and specific fields. This action is
    useful for fetching historical logs and telemetry data directly from the ArcSight
    Logger event log manager.


    ### Flow Description

    1. Initializes a connection and authenticates with the ArcSight Logger instance.

    2. During the initial execution, the action initiates the search query asynchronously
    by making a POST request to the `/server/search` endpoint.

    3. In subsequent polling executions, the action checks the status of the running
    query by making a POST request to the `/server/search/status` endpoint.

    4. Once the query status is marked as completed, the action retrieves the matching
    events by making a GET request to the `/server/search/events` endpoint.

    5. The retrieved events are filtered by the requested fields (if specified), formatted
    into a flat structure, and attached to the action's results as a data table and
    JSON output.


    ### Additional Notes

    This is an asynchronous action. It will continue to run and poll the ArcSight
    Logger until the query completes, errors out, or times out. The maximum number
    of events that can be returned is limited to 10,000 due to ArcSight Logger limitations.
  ai_short_description: >-
    Sends a search query to ArcSight Logger to retrieve related events based on specified
    criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
