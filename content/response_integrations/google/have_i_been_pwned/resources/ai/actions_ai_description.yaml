Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the HaveIBeenPwned API to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Retrieves the API Key and SSL verification settings from the integration configuration.

    2. Initializes the HaveIBeenPwned manager.

    3. Makes a test GET request to the HaveIBeenPwned API (`/api/v3/breachedaccount/test@gmail.com`)
    to verify authentication and network connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    that the provided API key is valid and the service is reachable.
  ai_short_description: >-
    Tests connectivity to the HaveIBeenPwned API to verify integration health and
    authentication credentials.
