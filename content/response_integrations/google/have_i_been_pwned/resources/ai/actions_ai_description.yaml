Check Account:
  ai_description: >-
    General Description: This action retrieves information about data breaches and
    public pastes associated with a specific user account using the HaveIBeenPwned
    service. It helps analysts identify compromised credentials.


    Flow Description:

    1. The action iterates through the provided target entities, filtering for those
    of type `USER`.

    2. For each valid user entity, the action validates the email format.

    3. The action makes a GET request to the HaveIBeenPwned API (`/breachedaccount/{account}`
    and `/pasteaccount/{account}`) to fetch breach and paste history.

    4. If breach or paste data is found, the action generates an entity insight, adds
    the details to the action result as data tables, and updates the JSON result.

    5. Finally, the action returns a summary message indicating whether the account
    was found in any breaches or pastes.


    Additional Notes: This action is read-only and does not modify external systems.
    It requires a valid HaveIBeenPwned API key.
  ai_short_description: >-
    Checks if a user account has been involved in data breaches or public pastes using
    the HaveIBeenPwned service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds entity insights and data tables to the SOAR case.
    reasoning: >-
      The action makes GET requests to the HaveIBeenPwned API to fetch breach and
      paste data. It does not mutate external data. It updates internal entities by
      adding insights and data tables to the SOAR case.
