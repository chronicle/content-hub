Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps SOAR platform and the HaveIBeenPwned
    service. This action verifies that the integration is correctly configured and
    capable of communicating with the external API.


    ### Flow Description

    1. The action retrieves the 'Api Key' and 'Verify SSL' settings from the HaveIBeenPwned
    integration configuration.

    2. It initializes the `HaveIBeenPwnedManager` using the provided credentials and
    SSL verification preference.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the HaveIBeenPwned API using a test email address ('test@gmail.com')
    to validate the connection.

    4. Upon a successful response, the action terminates and returns a 'Connection
    Established' message with a result value of 'true'.


    ### Additional Notes

    This action is intended for administrative use to troubleshoot or verify integration
    connectivity. It does not perform any data enrichment or security operations on
    entities.
  ai_short_description: >-
    Tests connectivity to the HaveIBeenPwned service to ensure the integration is
    properly configured.
