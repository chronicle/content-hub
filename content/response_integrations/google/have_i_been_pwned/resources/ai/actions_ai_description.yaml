Check Account:
  ai_description: >-
    ### General Description

    Enriches User entities by querying the HaveIBeenPwned service to retrieve all
    known data breaches and public pastes associated with the account. This action
    helps analysts quickly identify if a user's credentials or personal information
    have been compromised in known security incidents.


    ### Flow Description

    1. Iterates over all target entities and filters for `USER` entities.

    2. Validates the entity identifier to ensure it is a properly formatted email
    address.

    3. Makes a GET request to the HaveIBeenPwned API to fetch all known breaches for
    the account.

    4. Makes a GET request to the HaveIBeenPwned API to fetch all public pastes where
    the account was found.

    5. If breaches or pastes are discovered, generates an insight on the entity indicating
    the account has been compromised.

    6. Attaches the detailed breach and paste information as data tables and JSON
    results to the action output.


    ### Additional Notes

    The action will skip entities that are not valid email addresses or if an API
    error occurs during the lookup.
  ai_short_description: >-
    Enriches User entities by querying HaveIBeenPwned to retrieve and attach information
    about known data breaches and public pastes associated with the account.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the HaveIBeenPwned API via GET requests (fetches_data=true).
      It does not mutate external data (can_mutate_external_data=false) or internal
      case data (can_mutate_internal_data=false). It does not update entities (can_update_entities=false)
      but it does create insights for compromised accounts by calling `siemplify.add_entity_insight`
      (can_create_insight=true). It does not modify alert data or create case comments.
