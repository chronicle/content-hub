[project]
name = "HaveIBeenPwned"
version = "10.0"
description = "Have I Been Pwned? (HIBP) is a website that allows internet users to check if their personal data has been compromised by data breaches."
requires-python = ">=3.11,<3.12"
dependencies = [
    "pytest-mock>=3.15.1",
    "requests>=2.33.1",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
