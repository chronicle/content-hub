Get URL Rank:
  ai_description: >-
    ### General Description

    Queries the Alexa Web Information Service to retrieve the global rank of URL entities.
    This action enriches the entities with their Alexa rank and can optionally mark
    them as suspicious if their rank exceeds a specified threshold.


    ### Flow Description

    1. Iterates over the provided target entities and filters for those of type `URL`.

    2. For each valid URL entity, makes an HTTP GET request to the Alexa API (`UrlInfo`
    action) to fetch the URL's rank.

    3. Updates the entity's `additional_properties` with the retrieved `Alexa_Rank`
    and marks the entity as enriched (`is_enriched = True`).

    4. Compares the retrieved rank against the provided `Threshold` parameter. If
    the rank is greater than the threshold, the entity is marked as suspicious (`is_suspicious
    = True`) and an insight is added to the entity.

    5. Updates the modified entities within the Google SecOps platform and returns
    the raw rank data as a JSON result.


    ### Additional Notes

    - The action requires valid AWS credentials (Access Key ID and Secret Access Key)
    configured in the integration settings to authenticate with the Alexa Web Information
    Service.

    - If the API does not return a rank for a URL, the rank is recorded as 'None'.
  ai_short_description: >-
    Queries the Alexa Web Information Service to retrieve the global rank of URL entities,
    enriching them and optionally marking them as suspicious based on a defined threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
