Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Alexa service to ensure the integration is configured
    correctly and can communicate with the external API.


    ### Flow Description

    1. Initializes the Alexa manager using the provided integration credentials (Access
    Key ID and Secret Access Key).

    2. Makes an HTTP GET request to the Alexa API to retrieve URL information for
    a test domain (`google.co.il`).

    3. Evaluates the response to confirm successful authentication and connectivity.

    4. Returns a success message and a boolean indicating the connectivity status.


    ### Additional Notes

    This action does not process any entities or case data. It is solely used for
    diagnostic purposes to verify the integration setup.
