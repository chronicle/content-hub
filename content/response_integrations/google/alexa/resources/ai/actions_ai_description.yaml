    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Alexa API using a GET request. It does not
      mutate external data. It updates internal entities with the retrieved rank and
      creates insights if the rank exceeds the threshold.
