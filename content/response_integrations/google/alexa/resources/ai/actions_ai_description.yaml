Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Alexa Web Information Service (AWIS) to ensure the integration
    is configured correctly. This action verifies that the provided credentials are
    valid and that the integration can successfully communicate with the Alexa API.


    ### Flow Description

    1. The action initializes the `AlexaManager` using the `Access key id` and `Secret
    access key` retrieved from the integration configuration.

    2. It calls the `test_connectivity` method, which triggers a request to the Alexa
    API using the `get_url_info` method for a sample URL ("google.co.il").

    3. The `get_url_info` method prepares an authenticated request (using AWS signature)
    and performs a GET request to the Alexa Web Information Service.

    4. The response is parsed, and if successful, the action returns a success message
    to the user.


    ### Additional Notes

    This action is used for verifying the integration's connectivity and does not
    perform any data enrichment or mutation.
