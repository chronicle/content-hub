Get URL Rank:
  ai_description: >-
    ### General Description

    This action queries the Alexa Web Information Service (AWIS) to retrieve the traffic
    rank for a given URL. It is designed to assist security analysts in assessing
    the reputation and popularity of URLs encountered during an investigation. By
    comparing the retrieved rank against a user-defined threshold, the action can
    automatically flag URLs as suspicious.


    ### Flow Description

    1. The action retrieves the necessary Alexa API credentials (Access Key ID and
    Secret Access Key) from the integration configuration.

    2. It iterates through the `target_entities` provided in the SOAR case, filtering
    specifically for entities of type `URL`.

    3. For each valid URL, the action calls the `AlexaManager.get_url_info` method
    to fetch the traffic rank data from the Alexa API.

    4. The retrieved rank is stored in the entity's `additional_properties` under
    the key `Alexa_Rank`.

    5. The entity is marked as enriched (`is_enriched = True`).

    6. If the retrieved rank is greater than the user-provided `Threshold` parameter,
    the entity is marked as suspicious (`is_suspicious = True`) and an insight is
    added to the entity with the message "Found as suspicious by Alexa.".

    7. Finally, the action updates the modified entities in the SOAR platform and
    returns the collected data as a JSON result.


    ### Additional Notes

    This action requires valid Alexa API credentials to function. The `Threshold`
    parameter is critical; a higher threshold value implies that only URLs with a
    rank higher than that number (i.e., less popular/more obscure) will be flagged
    as suspicious.
  ai_short_description: >-
    Enriches URL entities with their Alexa traffic rank and flags them as suspicious
    if the rank exceeds a specified threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and suspicious status within the SOAR platform.
    reasoning: >-
      The action fetches data from the Alexa API (fetches_data=true). It does not
      mutate external systems (can_mutate_external_data=false). It updates internal
      entities with enrichment data and adds insights (can_update_entities=true, can_create_insight=true).
