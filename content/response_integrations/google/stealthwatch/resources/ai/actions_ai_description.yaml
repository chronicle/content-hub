Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stealthwatch server to ensure the integration is configured
    correctly and the service is reachable.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the StealthwatchManager.

    3. Makes a GET request to the `/smc/rest/product/info` API endpoint to verify
    connectivity.

    4. Returns a success message if the connection is established.


    ### Additional Notes

    This action is typically used to verify integration settings and does not process
    any entities or modify any data.
