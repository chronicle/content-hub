Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stealthwatch instance by authenticating and retrieving
    product information. This action verifies that the integration is correctly configured
    and that the SOAR platform can communicate with the Stealthwatch server.


    ### Flow Description

    1. The action retrieves the integration configuration (Api Root, Username, Password,
    Verify SSL) from the Stealthwatch integration settings.

    2. The `StealthwatchManager` initializes by sending a POST request to the `/token/v2/authenticate`
    endpoint to obtain an authentication cookie.

    3. The action executes a connectivity test by sending a GET request to the `/smc/rest/product/info`
    endpoint.

    4. The action returns the connectivity status to the SOAR platform.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    that the SOAR platform can communicate with the Stealthwatch server.
  ai_short_description: >-
    Tests connectivity to the Stealthwatch instance.
  capabilities:
