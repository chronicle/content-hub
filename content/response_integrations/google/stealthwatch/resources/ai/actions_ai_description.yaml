Search Flows:
  ai_description: >-
    ### General Description

    Searches for network flows associated with specific IP addresses within a given
    timeframe using Cisco Secure Network Analytics (Stealthwatch). It retrieves flow
    data where the IP acts as either the source or destination, providing valuable
    telemetry for investigations.


    ### Flow Description

    1. Iterates through the target entities provided in the case, filtering specifically
    for IP Address entities.

    2. Calculates the search timeframe based on the provided `Timeframe` parameter.

    3. For each valid IP address, makes an API call to Stealthwatch to find the associated
    domain ID.

    4. Initiates a flow search API call (`POST /smc/rest/domains/{domain_id}/searches`)
    for flows where the IP is the source.

    5. Initiates a second flow search API call for flows where the IP is the destination.

    6. Aggregates the results, formats them into a CSV table, and attaches the raw
    JSON and CSV data to the entity in the SecOps platform.


    ### Additional Notes

    The action requires the Stealthwatch integration to be properly configured with
    API credentials. The results are attached as entity tables and JSON results, but
    do not directly update the entity's properties or create insights.
