Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events for a specific host (IP address) within a given time
    frame from Cisco Secure Network Analytics (Stealthwatch). This action helps analysts
    investigate network activity and alerts associated with an endpoint.


    ### Flow Description

    1. Iterates over the target entities provided to the action.

    2. Filters the entities to process only those of type `ADDRESS` (IP addresses).

    3. For each valid IP address, queries the Stealthwatch API to determine the associated
    domain ID.

    4. Initiates an alert search job in Stealthwatch for the IP address within the
    specified time frame.

    5. For each alert found, initiates a security event search job to retrieve detailed
    event logs.

    6. Attaches the raw event data as JSON and a filtered summary as an entity table
    to the action's results in the SecOps platform.


    ### Additional Notes

    The action relies on creating asynchronous search jobs in Stealthwatch and polling
    for their completion to fetch the results. The time frame parameter determines
    how far back in hours the search should look.
  ai_short_description: >-
    Retrieves security events for a specific host (IP address) within a given time
    frame from Cisco Secure Network Analytics (Stealthwatch).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
