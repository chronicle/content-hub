Search Flows:
  ai_description: >-
    ### General Description

    Searches for network flow data associated with specific IP address entities using
    the Stealthwatch integration. This action retrieves historical flow telemetry,
    including source and destination details, to provide visibility into network activity
    for the specified timeframe.


    ### Flow Description

    1. Retrieve the Stealthwatch integration configuration (API Root, credentials,
    and SSL verification settings) and action parameters (Timeframe, Limit).

    2. Calculate the start and end timestamps based on the provided `Timeframe` parameter.

    3. Iterate through the target IP address entities provided in the case.

    4. For each IP entity, query the Stealthwatch API to identify the associated domain
    ID.

    5. Execute flow searches in Stealthwatch for the IP address, filtering for both
    source and destination traffic within the calculated time range.

    6. If flow data is found, attach the raw results as JSON to the action output
    and generate a formatted CSV table of the filtered flow results.

    7. Conclude the action with a summary message indicating whether flows were found
    for the processed entities.


    ### Additional Notes

    This action is strictly for data retrieval and does not modify the security posture
    of the target environment. It requires valid Stealthwatch credentials and connectivity
    to the Stealthwatch Management Console (SMC).
