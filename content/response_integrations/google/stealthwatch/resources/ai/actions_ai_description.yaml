Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events for IP address entities from the Stealthwatch platform
    within a specified timeframe. This action allows analysts to investigate historical
    network activity associated with specific IP addresses.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and the `Timeframe` parameter.

    2. Calculates the start and end times based on the provided `Timeframe` in hours.

    3. Initializes the `StealthwatchManager` to authenticate with the Stealthwatch
    API.

    4. Iterates through the provided `ADDRESS` entities.

    5. For each entity, retrieves the corresponding domain ID from Stealthwatch.

    6. Searches for alerts associated with the IP address within the calculated time
    range.

    7. For each found alert, searches for detailed security events.

    8. Attaches the raw JSON results and a formatted CSV table of the security events
    to the action results.


    ### Additional Notes

    This action is read-only and does not modify external systems or internal entity
    states. It focuses on data retrieval for investigation.
  ai_short_description: >-
    Retrieves security events for IP address entities from Stealthwatch within a specified
    timeframe.
  capabilities:
    can_create_case_comments: false
