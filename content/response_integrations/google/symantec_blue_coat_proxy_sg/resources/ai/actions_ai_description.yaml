Block Entities:
  ai_description: >-
    ### General Description

    This action blocks specific IP address entities on a Symantec Blue Coat ProxySG
    device. It leverages SSH connectivity to interact with the device's command-line
    interface, executing a sequence of configuration commands to add the target IP
    addresses to the device's blocklist. This helps in mitigating threats by preventing
    network traffic associated with malicious or suspicious IP addresses.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the required connection
    parameters (`SSH Root`, `Username`, `Password`) from the integration configuration.

    2. **Entity Filtering**: It iterates through the `target_entities` provided in
    the case, filtering for entities of type `ADDRESS`.

    3. **Manager Initialization**: A `SymantecBlueCoatProxySGManager` is initialized
    with the provided credentials to establish an SSH connection.

    4. **Execution**: For each valid IP entity, the action calls the `block_entity`
    method, which performs the following steps via an interactive shell:
        * Enters configuration mode (`conf t`).
        * Navigates to the attack detection settings (`attack-detection`).
        * Accesses the client configuration (`client`).
        * Executes the block command (`block {identifier}`) for the specific IP address.
    5. **Result Processing**: The action captures the output of the block command,
    determines success or failure based on the presence of a success indicator, and
    updates the `json_results` dictionary.

    6. **Finalization**: The action generates a summary message detailing the success
    or failure of the operation for each entity and terminates the execution.


    ### Additional Notes

    This action requires valid SSH credentials for the Symantec Blue Coat ProxySG
    device. It performs direct configuration changes on the external device. Ensure
    that the provided credentials have the necessary permissions to execute configuration
    and block commands.
  ai_short_description: >-
    Blocks IP address entities on a Symantec Blue Coat ProxySG device by executing
    configuration commands via SSH.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action executes configuration commands on the Symantec Blue Coat ProxySG
      device to add IP addresses to the blocklist.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to an external device via SSH and executes configuration
      commands to block IP addresses, which constitutes a mutation of external data.
      It does not fetch data, mutate internal SecOps data, update entities, create
      insights, or modify alert data.
