Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and URL entities by querying the Symantec Blue
    Coat ProxySG device. This action retrieves relevant threat intelligence, geolocation,
    or content filtering data from the proxy and updates the entities within the SOAR
    platform with this contextual information.


    ### Flow Description

    1. The action extracts configuration parameters (SSH Root, Username, Password)
    and the 'Create Insight' action parameter.

    2. It filters the provided target entities to include only those of type Hostname,
    IP Address, or URL.

    3. For each suitable entity, the action establishes an SSH connection to the Symantec
    Blue Coat ProxySG device.

    4. It executes specific commands on the device based on the entity type (e.g.,
    'test_dns' for Hostnames, 'test_geolocation' for IP Addresses, 'test_threat_risk'
    and 'test_content_filter' for URLs).

    5. The retrieved data is parsed and added to the entity's additional properties,
    and the entity is marked as enriched.

    6. If the 'Create Insight' parameter is enabled, an insight containing the retrieved
    information is attached to the entity.

    7. Finally, the action updates the entities in the SOAR platform and returns a
    summary of successful, not found, and failed enrichments.


    ### Additional Notes

    This action requires valid SSH credentials and network connectivity to the Symantec
    Blue Coat ProxySG device. It does not modify the state of the external device;
    it only performs read-only queries.
  ai_short_description: >-
    Enriches Hostname, IP Address, and URL entities by querying the Symantec Blue
    Coat ProxySG device via SSH.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
