  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Blue Coat ProxySG server to ensure the integration
    is configured correctly.


    ### Flow Description

    1. Extracts the SSH Root, Username, and Password from the integration configuration.

    2. Initializes the Symantec Blue Coat ProxySG manager.

    3. Connects to the server via SSH and executes the 'help' command to verify connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration configuration parameters.


    ### Additional Notes

    This action is typically used during the initial setup of the integration to verify
    that the provided credentials and network path are valid.
