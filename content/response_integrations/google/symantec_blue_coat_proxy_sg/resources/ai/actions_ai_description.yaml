  ai_description: >-
    ### General Description

    Blocks IP address entities using Symantec Blue Coat ProxySG. This action connects
    to the ProxySG appliance via SSH and executes interactive shell commands to add
    the specified IP addresses to the blocklist.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --------- | ---- | --------- | ----------- |

    | SSH Root | String | Yes | The SSH root address (IP or Hostname) of the Symantec
    Blue Coat ProxySG. |

    | Username | String | Yes | The username to authenticate with the ProxySG appliance.
    |

    | Password | Password | Yes | The password to authenticate with the ProxySG appliance.
    |


    ### Flow Description

    1. Extracts the provided configuration parameters to establish an SSH connection.

    2. Filters the target entities to include only IP addresses (`ADDRESS`).

    3. Iterates over the suitable entities and connects to the Symantec Blue Coat
    ProxySG via SSH.

    4. Executes interactive shell commands (`conf t`, `attack-detection`, `client`,
    `block {identifier}`) to block each IP address.

    5. Collects the raw output from the shell commands and returns the execution status
    and raw output as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Blocks the specified IP address entities on the Symantec Blue Coat ProxySG by
      executing interactive shell commands.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to the Symantec Blue Coat ProxySG via SSH and executes commands
      to block an IP address. This mutates external data. It does not fetch data,
      update entities, create insights, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by blocking an IP address, so it is not an
      enrichment action. It performs network-based remediation by blocking an IP,
      so it is a remediation action.
    remediation: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES` where `SUPPORTED_ENTITY_TYPES = [EntityTypes.ADDRESS]`.
      This means it targets ADDRESS entities, filtering by entity_type.
