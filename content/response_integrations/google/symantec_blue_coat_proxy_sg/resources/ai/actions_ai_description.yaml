    reasoning: >-
      The action blocks an IP address on a proxy. This aligns with 'Add IOC To Blocklist'
      and 'Block IP'. It does not match other categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
