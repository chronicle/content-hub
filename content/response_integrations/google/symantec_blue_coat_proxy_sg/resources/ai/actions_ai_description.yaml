Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Blue Coat ProxySG server to ensure the integration
    is configured correctly and can communicate with the target system.


    ### Flow Description

    1. Extracts the integration configuration parameters (SSH Root, Username, Password).

    2. Initializes the `SymantecBlueCoatProxySGManager` with the provided credentials.

    3. Calls the `test_connectivity` method, which establishes an SSH connection to
    the server and executes a basic 'help' command.

    4. Returns a success message if the connection and command execution are successful,
    or a failure message if an error occurs.


    ### Additional Notes

    This action does not require any action-specific parameters as it relies entirely
    on the integration-level configuration. It is typically used for troubleshooting
    and initial setup verification.
