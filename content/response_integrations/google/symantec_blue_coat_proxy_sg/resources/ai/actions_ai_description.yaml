  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and URL entities using information from Symantec
    Blue Coat ProxySG. This action connects to the ProxySG appliance via SSH and executes
    test commands to retrieve DNS resolution, geolocation, threat risk, and content
    filter categories.


    ### Flow Description

    1. Establishes an SSH connection to the Symantec Blue Coat ProxySG appliance.

    2. Iterates through the target entities (Hostname, IP Address, URL).

    3. Executes specific test commands (`test dns`, `test geolocation`, `test threat-risk`,
    `test content-filter`) based on the entity type.

    4. Parses the command output to extract relevant threat intelligence and contextual
    data.

    5. Enriches the entities with the retrieved data and optionally creates an insight.

    6. Updates the entities in the Google SecOps platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | Boolean | False | If enabled, the action will create an insight
    containing all of the retrieved information about the entity. Default is true.
    |


    ### Additional Notes

    There are no additional notes for this action.
