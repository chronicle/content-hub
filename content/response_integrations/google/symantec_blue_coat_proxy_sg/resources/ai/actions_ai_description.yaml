Block Entities:
  ai_description: >-
    ### General Description

    Blocks IP Address entities using Symantec Blue Coat ProxySG. This action connects
    to the ProxySG appliance via SSH and executes commands to add the specified IP
    addresses to the blocklist, preventing network traffic to or from those addresses.


    ### Flow Description

    1. Filters the target entities provided to the action, keeping only those of type
    IP Address.

    2. Establishes an SSH connection to the Symantec Blue Coat ProxySG appliance using
    the provided integration credentials.

    3. Iterates over the filtered entities and executes a sequence of interactive
    shell commands (`conf t`, `attack-detection`, `client`, `block <ip>`) to block
    each IP address.

    4. Evaluates the output of the commands to determine if the block was successful.

    5. Aggregates the raw output and status for each entity and attaches them to the
    action's JSON result.


    ### Additional Notes

    - This action requires SSH access to the Symantec Blue Coat ProxySG appliance.

    - Only IP Address entities are supported; other entity types will be ignored.
  ai_short_description: >-
    Blocks specific IP address entities on the Symantec Blue Coat ProxySG appliance
    to prevent network traffic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes interactive shell commands on the Symantec Blue Coat ProxySG appliance
      to add IP addresses to the blocklist.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to an external system (Symantec Blue Coat ProxySG) via SSH
      and executes commands to block an IP address, which mutates external data. It
      does not fetch enrichment data, update internal entities, create insights, or
      modify alert data.
