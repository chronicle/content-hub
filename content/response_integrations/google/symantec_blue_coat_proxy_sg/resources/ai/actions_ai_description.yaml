Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Symantec Blue Coat ProxySG server using the provided
    SSH credentials. This action verifies that the integration is correctly configured
    and can successfully communicate with the target appliance.


    ### Flow Description

    1. Extracts the `SSH Root`, `Username`, and `Password` from the integration configuration
    parameters.

    2. Initializes the `SymantecBlueCoatProxySGManager` with the provided credentials.

    3. Executes the `test_connectivity` method, which establishes an SSH connection
    to the server and runs a "help" command to verify the connection.

    4. Returns a success message if the connection is established, or an error message
    if the connection fails.


    ### Additional Notes

    This action is strictly for verifying the integration configuration and does not
    perform any data enrichment, entity modification, or external system state changes.
