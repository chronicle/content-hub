Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, and URL entities using Symantec Blue Coat ProxySG.
    It connects to the appliance via SSH and executes test commands to retrieve DNS
    resolution, geolocation, threat risk, and content filter information.


    ### Flow Description

    1. Filters target entities to include only Hostname, IP Address, and URL types.

    2. Establishes an SSH connection to the Symantec Blue Coat ProxySG appliance.

    3. Iterates over the filtered entities and executes specific CLI commands based
    on the entity type (e.g., `test dns`, `test geolocation`, `test threat-risk`,
    `test content-filter`).

    4. Parses the command output to extract relevant enrichment data.

    5. Updates the entity's additional properties with the retrieved data and marks
    it as enriched.

    6. Optionally creates an insight for the entity containing the retrieved information.

    7. Updates the entities in the Google SecOps platform.


    ### Additional Notes

    Requires SSH access to the Symantec Blue Coat ProxySG appliance.
  ai_short_description: >-
    Enriches Hostname, IP Address, and URL entities by retrieving DNS, geolocation,
    and threat risk information from Symantec Blue Coat ProxySG via SSH commands.
