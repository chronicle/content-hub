    reasoning: >-
      The action fetches data from Symantec Blue Coat ProxySG via SSH commands (fetches_data=true).
      It does not mutate any external data (can_mutate_external_data=false). It mutates
      internal data by updating entities with enrichment data and creating insights
      (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not modify alert data or create case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data to enrich entities and does not mutate external state.
      It only performs allowed internal mutations (updating entities, creating insights).
      Therefore, it is classified as an Enrichment action. It does not perform any
      remediation tasks.
    remediation: false
  entity_usage:
