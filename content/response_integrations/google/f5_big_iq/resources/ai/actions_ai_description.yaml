    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action updates the enforcement mode of a security policy on the F5 Big-IQ
      appliance via a PATCH request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PATCH request to the F5 Big-IQ API to update the enforcement
      mode of a policy. It does not fetch data (no GET requests for context), nor
      does it modify any internal SOAR data (entities, insights, or case comments).
      It is a state-changing operation on an external system.
  categories:
    enrichment: false
    reasoning: >-
      The action does not fetch data (it is a mutation-only action) and it modifies
      external system state. Therefore, it does not meet the criteria for an Enrichment
      action.
