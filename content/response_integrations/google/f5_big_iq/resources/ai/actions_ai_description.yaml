  ai_description: >-
    ### General Description

    Tests the connectivity to the F5 Big-IQ server by attempting to authenticate with
    the provided credentials. This action ensures that the integration is correctly
    configured and that the Google SecOps platform can communicate with the F5 Big-IQ
    API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The hostname or IP address of the F5 Big-IQ
    server. This is retrieved from the integration configuration. |

    | Username | String | Yes | The username used to authenticate with the F5 Big-IQ
    server. This is retrieved from the integration configuration. |

    | Password | String | Yes | The password used to authenticate with the F5 Big-IQ
    server. This is retrieved from the integration configuration. |

    | Verify SSL | Boolean | No | If enabled, the SSL certificate of the server will
    be verified. Default is False. |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the server address, credentials,
    and SSL verification settings from the integration's global configuration.

    2. **Manager Initialization**: An instance of the `F5BigIQManager` is created
    using the retrieved configuration.

    3. **Authentication**: During the manager's initialization, it performs a POST
    request to the `/mgmt/shared/authn/login` endpoint to obtain an authentication
    token.

    4. **Token Extension**: Upon receiving a token, the manager immediately sends
    a PATCH request to `mgmt/shared/authz/tokens/` to extend the session timeout.

    5. **Result Reporting**: If the authentication and token extension processes complete
    successfully, the action returns a "Connection Established" message with a success
    status. If any step fails, it returns "Connection Failed".


    ### Additional Notes

    This action does not have any specific input parameters; it relies entirely on
    the integration's shared configuration settings.
