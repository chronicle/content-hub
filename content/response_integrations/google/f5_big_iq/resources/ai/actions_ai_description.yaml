Get Event Logs By Blocking ID:
  ai_description: >-
    ### General Description

    Retrieves event logs from the F5 Big-IQ platform based on a specific Blocking
    ID. This action allows analysts to query historical telemetry data associated
    with a particular security event, facilitating investigation and incident response.


    ### Flow Description

    1. The action initializes the F5 Big-IQ manager using the provided server address,
    credentials, and SSL verification settings.

    2. It retrieves the `Blocking ID` parameter provided by the user.

    3. The action executes a POST request to the F5 Big-IQ API endpoint (`mgmt/cm/shared/es/logiq/asmindex/_search`)
    using the `Blocking ID` as a query parameter to search for relevant event logs.

    4. If logs are successfully retrieved, the action adds the JSON-formatted log
    data to the action results.

    5. The action concludes by returning a success or failure message indicating whether
    logs were found.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within F5 Big-IQ
    or the Google SecOps platform.
