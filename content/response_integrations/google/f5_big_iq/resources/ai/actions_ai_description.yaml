Get Event Logs By Blocking ID:
  ai_description: >-
    ### General Description

    Retrieves event logs from F5 BigIQ associated with a specific blocking ID. This
    action queries the F5 BigIQ system to fetch detailed log records related to a
    blocked event.


    ### Flow Description

    1. Extracts the `Blocking ID` parameter provided by the user or playbook.

    2. Authenticates with the F5 BigIQ API.

    3. Makes an API call to the `mgmt/cm/shared/es/logiq/asmindex/_search` endpoint
    to search for event logs matching the provided blocking ID.

    4. If logs are found, they are attached to the action's result as a JSON object.


    ### Additional Notes

    None.
