Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the F5 Big-IQ server to ensure the integration is configured
    correctly and can communicate with the API.


    ### Flow Description

    1. Retrieves the server address, username, and password from the integration configuration.

    2. Initializes the F5 Big-IQ manager, which triggers a POST request to the `/mgmt/shared/authn/login`
    endpoint to obtain an authentication token.

    3. Makes a PATCH request to extend the token's lifetime.

    4. Returns a success message if the connection and authentication are successful,
    otherwise returns a failure message.


    ### Additional Notes

    This action does not require any specific parameters and is typically used during
    the initial setup or troubleshooting of the F5 Big-IQ integration.
