    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the enforcement mode of a specific policy on the F5 BIG-IQ device.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the F5 BIG-IQ API to modify the enforcement
      mode of a policy, which mutates external data. It does not fetch contextual
      data, update internal entities, create insights, or modify alert data.
