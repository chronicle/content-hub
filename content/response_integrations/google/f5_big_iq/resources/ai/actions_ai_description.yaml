Change Policy Enforcement Mode:
  ai_description: >-
    ### General Description

    Changes the enforcement mode of a specific policy in F5 BIG-IQ. This action modifies
    the configuration of a policy by its ID, setting its enforcement mode to the specified
    value (e.g., blocking).


    ### Flow Description

    1. Initializes the F5 BIG-IQ manager with the provided integration credentials.

    2. Retrieves the `Policy ID` and `Enforcement Mode` parameters from the action
    configuration.

    3. Sends a PATCH request to the F5 BIG-IQ API (`/mgmt/cm/asm/working-config/policies/{policy_id}`)
    to update the policy's enforcement mode.

    4. Returns a success message indicating the policy enforcement mode was successfully
    changed.


    ### Additional Notes

    Ensure the provided Policy ID exists and the enforcement mode is valid for the
    target F5 BIG-IQ system.
  ai_short_description: >-
    Changes the enforcement mode of a specific policy in F5 BIG-IQ using its Policy
    ID.
  capabilities:
