  ai_description: >-
    ### General Description

    This action modifies the enforcement mode of a specific security policy within
    the F5 Big-IQ platform. By programmatically updating the policy's enforcement
    mode (e.g., switching between 'blocking' and 'transparent'), security teams can
    dynamically adjust how traffic is handled by the security appliance without manual
    intervention.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Policy ID | String | Yes | The unique identifier of the policy to be modified.
    |

    | Enforcement Mode | String | Yes | The target enforcement mode to apply (e.g.,
    'blocking', 'transparent'). |


    ### Flow Description

    1. **Authentication**: The action authenticates with the F5 Big-IQ server using
    the provided credentials and obtains an authentication token.

    2. **Parameter Extraction**: Retrieves the 'Policy ID' and 'Enforcement Mode'
    from the action parameters.

    3. **API Request**: Executes a PATCH request to the F5 Big-IQ REST API endpoint
    for the specified policy ID, updating the `enforcementMode` field with the new
    value.

    4. **Completion**: Returns a success status and an informative message to the
    Google SecOps platform.
  capabilities:
