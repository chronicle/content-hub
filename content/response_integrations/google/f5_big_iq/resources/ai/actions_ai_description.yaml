Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the F5 Big IQ server by attempting
    to authenticate with the provided credentials. This action verifies that the integration
    is correctly configured and that the SOAR platform can successfully communicate
    with the F5 Big IQ API.


    ### Flow Description

    1. The action retrieves the required configuration parameters: `Server Address`,
    `Username`, `Password`, and `Verify SSL` from the integration settings.

    2. It initializes the `F5BigIQManager` using these credentials.

    3. During initialization, the manager attempts to authenticate by sending a POST
    request to the F5 Big IQ login endpoint (`/mgmt/shared/authn/login`).

    4. If the authentication is successful, the manager proceeds to extend the token
    lifetime via a PATCH request.

    5. If the manager is successfully initialized, the action returns a success message
    ("Connection Established") and a result value of `True`.

    6. If the authentication fails or the manager cannot be initialized, the action
    returns a failure message ("Connection Failed") and a result value of `False`.


    ### Additional Notes

    This action is strictly for verifying integration connectivity. It does not perform
    any operations on entities, modify system configurations, or retrieve business
    data (such as events or logs).
  ai_short_description: >-
    Tests connectivity to the F5 Big IQ server by validating authentication credentials.
