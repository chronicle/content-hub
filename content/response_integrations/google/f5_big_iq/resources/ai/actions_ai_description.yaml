  ai_description: >-
    ### General Description

    This action modifies the enforcement mode of a specific security policy within
    the F5 Big-IQ platform. By programmatically updating the policy's enforcement
    mode (e.g., switching between 'blocking' and 'transparent'), security teams can
    dynamically adjust how traffic is handled by the security appliance without manual
    intervention.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Policy ID | String | Yes | The unique identifier of the policy to be modified.
    |

    | Enforcement Mode | String | Yes | The target enforcement mode to apply (e.g.,
    'blocking', 'transparent'). |


    ### Flow Description

    1. **Authentication**: The action authenticates with the F5 Big-IQ server using
    the provided credentials and obtains an authentication token.

    2. **Parameter Extraction**: Retrieves the 'Policy ID' and 'Enforcement Mode'
    from the action parameters.

    3. **API Request**: Executes a PATCH request to the F5 Big-IQ REST API endpoint
    for the specified policy ID, updating the `enforcementMode` field with the new
    value.

    4. **Completion**: Returns a success status and an informative message to the
    Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action updates the enforcement mode of a security policy on the F5 Big-IQ
      platform via a PATCH request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PATCH request to an external F5 Big-IQ API to modify the
      configuration (enforcement mode) of a security policy. It does not retrieve
      data for enrichment, nor does it modify any internal Google SecOps data or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is a configuration/mutation action that changes the state of an external
      system. It does not fetch data for enrichment purposes, therefore it is not
      an enrichment action.
