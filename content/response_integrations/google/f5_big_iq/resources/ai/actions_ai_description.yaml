Change Policy Enforcement Mode:
  ai_description: >-
    ### General Description

    Changes the enforcement mode of a specific policy on an F5 Big-IQ device. This
    action allows security analysts to dynamically adjust the security posture of
    policies (e.g., switching between transparent and blocking modes) directly from
    the SOAR platform.


    ### Flow Description

    1. **Initialization**: The action initializes the `F5BigIQManager` using the server
    address, username, and password retrieved from the integration configuration.

    2. **Parameter Retrieval**: The action retrieves the `Policy ID` and the desired
    `Enforcement Mode` from the action parameters.

    3. **API Interaction**: The action calls the `change_policy_enforcement_mode`
    method, which performs a PATCH request to the F5 Big-IQ API endpoint `/mgmt/cm/asm/working-config/policies/{policy_id}`
    with the new enforcement mode in the JSON payload.

    4. **Completion**: The action returns a success message confirming the policy
    enforcement mode has been updated.


    ### Additional Notes

    This action performs a direct configuration change on the external F5 Big-IQ system.
    Ensure that the provided `Policy ID` is valid and that the `Enforcement Mode`
    value is supported by the target F5 Big-IQ configuration.
  ai_short_description: >-
    Changes the enforcement mode of a policy on an F5 Big-IQ device.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the enforcement mode of a specific policy on the F5 Big-IQ device via
      a PATCH request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PATCH request to an external system (F5 Big-IQ) to change
      a policy's enforcement mode. It does not fetch data, update internal entities,
      or modify alert data.
