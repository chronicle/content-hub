  ai_description: >-
    Changes the enforcement mode of a specific policy in F5 Big-IQ.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Policy ID | String | Yes | The ID of the policy to modify. |

    | Enforcement Mode | String | Yes | The new enforcement mode to apply (e.g., blocking).
    |


    ### Flow Description

    1. Initializes the connection to the F5 Big-IQ server.

    2. Retrieves the `Policy ID` and `Enforcement Mode` parameters.

    3. Sends a PATCH request to F5 Big-IQ to update the specified policy's enforcement
    mode.

    4. Returns a success message indicating the policy mode was changed.
