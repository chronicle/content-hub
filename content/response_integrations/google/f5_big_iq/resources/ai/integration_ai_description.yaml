product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The f5_big_iq integration manages F5 BIG-IP infrastructure, specifically the Application
    Security Manager (ASM) module, which functions as a Web Application Firewall (WAF).
    The action 'Get Event Logs By Blocking ID' allows analysts to retrieve logs for
    blocked requests, which aligns with the Network Security category's goal of verifying
    if a web-based attack was blocked. Additionally, this log retrieval capability
    provides visibility into security events, supporting the SIEM category by allowing
    the search of event logs to identify the source of suspicious activity. The 'Change
    Policy Enforcement Mode' action further supports Network Security by allowing
    dynamic adjustment of security policies on the gateway.
  siem: true
  threat_intelligence: false
  vulnerability_management: false
