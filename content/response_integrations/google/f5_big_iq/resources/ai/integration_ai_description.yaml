product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: true
  reasoning: >-
    The F5 Big-IQ integration is primarily focused on managing and investigating traffic
    security policies on F5 appliances. The 'Change Policy Enforcement Mode' action
    allows security teams to dynamically adjust the security posture (e.g., switching
    between blocking and transparent modes), which directly aligns with the Network
    Security category's capability to manage security at the gateway. The 'Get Event
    Logs By Blocking ID' action retrieves detailed logs from the F5 ASM (Application
    Security Manager), which aligns with the Network Security category's requirement
    to verify web-based attacks and retrieve firewall/WAF logs. The integration does
    not provide general SIEM, EDR, Threat Intelligence, or other listed capabilities.
  siem: false
  threat_intelligence: false
  vulnerability_management: false
