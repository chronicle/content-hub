Disconnect Agent From Network:
  ai_description: >-
    ### General Description

    Disconnects a specific agent from the network using the SentinelOne platform.
    This action isolates the endpoint to prevent further network communication, effectively
    containing the host.


    ### Flow Description

    1. The action retrieves the SentinelOne integration configuration (API Root, Username,
    Password).

    2. It filters the target entities to include only `ADDRESS` and `HOSTNAME` types.

    3. For each valid entity, the action queries the SentinelOne API (`/web/api/v1.6/agents`)
    to resolve the entity identifier (IP or Hostname) to a specific `agent_id`.

    4. Once the `agent_id` is retrieved, the action sends a POST request to the SentinelOne
    API (`/web/api/v1.6/agents/{agent_id}/disconnect`) to disconnect the agent from
    the network.

    5. If an agent is not found for a given entity, the action logs an error.

    6. The action concludes by outputting a summary message and, if applicable, a
    data table detailing any unsuccessful attempts.


    ### Additional Notes

    This action performs a state-changing operation on the external SentinelOne platform.
    It relies on the SentinelOne integration configuration for authentication and
    connectivity settings.
  ai_short_description: >-
    Disconnects an agent from the network via the SentinelOne platform by identifying
    the agent associated with the provided hostname or IP address and triggering a
    network isolation command.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Disconnects the agent from the network via the SentinelOne API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes API calls to SentinelOne to disconnect an agent, which is a
      mutation of external system state. It does not fetch contextual data for enrichment,
      nor does it mutate internal SecOps case data.
