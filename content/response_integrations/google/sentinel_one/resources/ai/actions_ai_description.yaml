Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities with system information from SentinelOne.
    This action retrieves endpoint details such as operating system, network interfaces,
    and agent status, and appends this data to the entity's additional properties
    within the SecOps platform.


    ### Flow Description

    1. Filters the target entities to include only Hostname and IP Address types.

    2. Iterates through the filtered entities and queries the SentinelOne API (`GET
    web/api/v1.6/agents`) to find the corresponding agent ID based on the entity's
    identifier.

    3. Retrieves system information for the identified agent via the SentinelOne API
    (`GET web/api/v1.6/agents/{agent_id}`).

    4. Enriches the entity's additional properties with the retrieved system information,
    prefixed with `SENO_`.

    5. Attaches a data table to the entity containing the flattened system information.

    6. Updates the successfully enriched entities in the Google SecOps platform.


    ### Additional Notes

    If the action fails to find an agent or retrieve information for specific entities,
    it logs the errors and presents them in an "Unsuccessful Attempts" data table.
