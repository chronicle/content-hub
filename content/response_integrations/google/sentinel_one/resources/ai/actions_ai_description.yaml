    types.

    2. For each valid entity, queries the SentinelOne API (`web/api/v1.6/agents`)
    to find the corresponding endpoint agent ID.

    3. Retrieves the agent's active status using the agent ID via the SentinelOne
    API (`web/api/v1.6/agents/{agent_id}`).

    4. Compiles the retrieved statuses into an "Agents Statuses" data table.

    5. Updates the successful entities in the SecOps platform.

    6. Logs any errors or unfound agents in an "Unsuccessful Attempts" data table.


