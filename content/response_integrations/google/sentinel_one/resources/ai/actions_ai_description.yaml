Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (Hostname or IP Address) with system information retrieved
    from SentinelOne. This action identifies the corresponding agent in SentinelOne
    for a given entity and fetches detailed system metadata, such as OS type and status,
    to provide context for investigation.


    ### Flow Description

    1. The action initializes the SentinelOne manager using the configured API credentials.

    2. It filters the target entities to process only those of type `HOSTNAME` or
    `ADDRESS`.

    3. For each valid entity, the action calls the SentinelOne API to find the associated
    agent ID.

    4. It then retrieves the system information for the identified agent using the
    `get_endpoint_system_information` method.

    5. The retrieved system information is flattened and added to the entity's `additional_properties`
    with a `SENO_` prefix.

    6. A data table containing the system information is added to the action results
    for the specific entity.

    7. Finally, the action updates the entities in the SOAR platform and concludes
    with a summary message.


    ### Additional Notes

    This action requires valid SentinelOne API credentials configured in the integration
    settings. If an agent is not found for a specific entity, the action logs an error
    and continues processing remaining entities.
