  ai_description: >-
    ### General Description

    Adds a specified file path to an existing exclusion list in SentinelOne. This
    action modifies the external system's configuration to prevent the specified path
    from triggering security alerts or being scanned, effectively allowing it to operate
    without interference.


    ### Flow Description

    1. Retrieves the target exclusion list name, the file path to be excluded, and
    the target operating system from the action parameters.

    2. Makes a GET request to the SentinelOne API to retrieve all exclusion lists
    and matches the provided list name to obtain its unique ID.

    3. Makes a POST request to the SentinelOne API (`web/api/v1.6/exclusion-lists/{list_id}/folders`)
    to append the specified folder path to the exclusion list.

    4. Returns a success message to the SecOps platform confirming the directory was
    added to the exclusion list.


    ### Additional Notes

    Ensure that the provided 'List Name' exactly matches an existing exclusion list
    in SentinelOne. The 'Operation System' parameter must be one of the supported
    OS families (windows, osx, linux, or android).
