Disconnect Agent From Network:
  ai_description: >-
    ### General Description

    Disconnects a specific endpoint agent from the network using SentinelOne. This
    action isolates the host to prevent further network communication, which is critical
    for containing compromised endpoints during an incident response process.


    ### Flow Description

    1. Filters the target entities to include only IP Addresses and Hostnames.

    2. Iterates over the filtered entities and queries the SentinelOne API to find
    the corresponding endpoint agent ID based on the entity's identifier.

    3. Makes a POST request to the SentinelOne API (`web/api/v1.6/agents/{agent_id}/disconnect`)
    to disconnect the identified agent from the network.

    4. Collects successful disconnections and errors, returning a summary message
    and attaching a data table of unsuccessful attempts to the action results.


    ### Additional Notes

    This action effectively isolates the machine at the network level via the SentinelOne
    agent, allowing communication only with the management console.
  ai_short_description: >-
    Disconnects a specific endpoint agent from the network using SentinelOne to isolate
    the host and prevent further network communication.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Disconnects the endpoint agent from the network in SentinelOne, isolating the
      host.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the SentinelOne API to disconnect an agent
      from the network, which mutates external data (can_mutate_external_data=true).
      It does not fetch contextual enrichment data, update internal entities, create
      insights, or modify alert data.
