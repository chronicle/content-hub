Get Agent Status:
  ai_description: >-
    ### General Description

    Retrieves the current operational status (active/inactive) of SentinelOne agents
    for specified hostnames or IP addresses. This action queries the SentinelOne API
    to determine if the agent associated with the target entity is currently active,
    providing visibility into endpoint health.


    ### Flow Description

    1. Initialize the `SentinelOneManager` using the integration configuration credentials
    (API Root, Username, Password).

    2. Filter the `target_entities` to process only those with types `HOSTNAME` or
    `ADDRESS`.

    3. For each valid entity, call the `find_endpoint_agent_id` method to retrieve
    the corresponding agent ID from SentinelOne.

    4. Call the `get_agent_status` method using the retrieved agent ID to determine
    the agent's status.

    5. Store the status results and any errors encountered during the process.

    6. Add the results and errors as data tables to the action output.

    7. Update the successfully processed entities within the SOAR platform using `siemplify.update_entities`.


    ### Additional Notes

    This action performs read-only operations against the SentinelOne API and does
    not modify external system states. It is designed to provide contextual information
    about endpoints.
