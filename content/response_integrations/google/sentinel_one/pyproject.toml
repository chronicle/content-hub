[project]
name = "SentinelOne"
version = "5.0"
description = "Endpoint security software that defends every endpoint against every type of attack, at every stage in the threat lifecycle."
requires-python = ">=3.11,<3.12"
dependencies = [ "requests==2.32.5", "tipcommon",]

[dependency-groups]
dev = [ "environmentcommon", "integration-testing", "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.3.8-py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.8-py3-none-any.whl"
