WhoIs Scan Address:
  ai_description: >-
    ### General Description

    Enriches IP Address entities with WHOIS information retrieved from RiskIQ PassiveTotal.
    This action provides threat intelligence and context by querying external WHOIS
    records for specified IP addresses.


    ### Flow Description

    1. Initialize the `PassiveTotal` manager using credentials from the integration
    configuration.

    2. Filter target entities to identify `ADDRESS` types that are not marked as internal.

    3. For each valid entity, execute `passive_total.get_whois_report` to fetch WHOIS
    details.

    4. Convert the report into dictionary and CSV formats.

    5. Update the entity's `additional_properties` with the retrieved WHOIS data,
    including specific location fields like City and Country.

    6. Add the WHOIS data as a table to the action result.

    7. Update the entities within the SOAR platform with the new properties.

    8. Add the full JSON result to the action output.


