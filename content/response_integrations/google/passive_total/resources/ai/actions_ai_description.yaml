WhoIs Address Reputation:
  ai_description: >-
    ### General Description

    Enriches external IP Address entities by retrieving passive DNS reports and reputation
    data from RiskIQ (PassiveTotal). This action provides threat intelligence context
    by appending DNS resolution history directly to the entity's properties.


    ### Flow Description

    1. Filters the target entities to include only IP addresses (`ADDRESS`) that are
    marked as external (`not is_internal`).

    2. Iterates through the filtered entities and makes an API call to RiskIQ (PassiveTotal)
    to fetch the passive DNS report for each IP address.

    3. Parses the retrieved DNS report into dictionary and CSV formats.

    4. Enriches the entity's `additional_properties` with the parsed dictionary data.

    5. Attaches the CSV data as an entity table to the action results for analyst
    review.

    6. Updates the entities within the SecOps platform to save the enriched properties.

    7. Returns the raw JSON results and a summary message indicating which entities
    were successfully enriched.


    ### Additional Notes

    This action requires valid RiskIQ (PassiveTotal) credentials configured at the
    integration level. It will skip any entities that are not IP addresses or are
    marked as internal.
