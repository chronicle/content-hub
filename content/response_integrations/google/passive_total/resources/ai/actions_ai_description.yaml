Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the PassiveTotal service to ensure the integration is configured
    correctly.


    ### Flow Description

    1. Initializes the PassiveTotal manager using the integration's configured Username
    and API Key.

    2. Makes an API call to the PassiveTotal service to retrieve a WHOIS report for
    a hardcoded test domain (`google.com`).

    3. Evaluates the API response to check for any error messages.

    4. Returns a successful result and a "Connection Established" message if the request
    succeeds, or a failure result if it does not.


    ### Additional Notes

    This action does not process any case entities or alerts. It is solely used as
    a diagnostic tool to verify API credentials and network connectivity to PassiveTotal.
