WhoIs Address Reputation:
  ai_description: >-
    ### General Description

    This action enriches IP Address entities by retrieving DNS and Whois reputation
    data from the RiskIQ PassiveTotal service. It helps security analysts understand
    the context and history of an IP address by fetching passive DNS reports, which
    are then parsed and attached to the entity as additional properties.


    ### Flow Description

    1. The action retrieves the PassiveTotal integration configuration, specifically
    the 'Username' and 'Api_Key'.

    2. It filters the `target_entities` to identify only those of type 'ADDRESS' that
    are marked as external (`not entity.is_internal`).

    3. For each valid entity, the action calls the `PassiveTotal` API (`get_dns_report`)
    to retrieve the DNS report.

    4. If a report is returned, the action parses the data into a dictionary and a
    CSV format.

    5. The entity's `additional_properties` are updated with the parsed Whois/DNS
    data.

    6. The action updates the entities in the SecOps platform using `siemplify.update_entities`.

    7. Finally, it adds the result as a table and a JSON object to the action results
    and terminates with a summary message.


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any blocking
    or containment operations. It relies on the PassiveTotal integration being configured
    with valid credentials.
  ai_short_description: >-
    Enriches IP Address entities with DNS and Whois reputation data from RiskIQ PassiveTotal.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
