  ai_description: >-
    ### General Description

    This action retrieves DNS reputation and historical resolution data for hostnames
    using the PassiveTotal (RiskIQ) service. It enriches the entity with DNS resolution
    details, which helps analysts understand the host's infrastructure, history, and
    potential associations with malicious activity.


    ### Flow Description

    1. The action initializes the PassiveTotal client using the credentials configured
    in the integration settings.

    2. It filters the target entities to process only those of type `HOSTNAME` that
    are not marked as internal.

    3. For each valid hostname, it calls the `get_dns_report` method from the PassiveTotal
    API to retrieve DNS resolution data.

    4. The retrieved data is converted into a dictionary and a CSV format.

    5. The entity's `additional_properties` are updated with the DNS resolution details.

    6. The action adds an entity table containing the DNS report to the result.

    7. Finally, it updates the entities in the SOAR platform and returns a JSON result
    containing the full report.


