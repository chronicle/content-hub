List Policies:
  ai_description: >-
    ### General Description

    Use the "List Policies" action to retrieve and list Cloud Identity policies from
    a specified organizational unit. This action allows for granular filtering of
    policies based on policy type, setting type, and display names, providing visibility
    into the security configuration of the organization.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required parameters: `Organization
    Unit Name`, `Policy Type Filter`, `Setting Type Filter`, `Settings Display Name
    Filter`, and `Max Results To Return`.

    2. **Validation**: The `Max Results To Return` parameter is validated to ensure
    it falls within the allowed range (1-100).

    3. **Org Unit Retrieval**: The action calls the `fetch_org_unit` method via the
    API client to resolve the provided `Organization Unit Name` to an internal Organization
    Unit ID.

    4. **Policy Listing**: The action calls the `list_policies` method on the API
    client, passing the resolved Org Unit ID and the specified filters (display names,
    policy type, setting type).

    5. **Result Processing**: The retrieved policies are limited by the `Max Results
    To Return` parameter and returned as a JSON list. If no policies match the criteria,
    an appropriate message is returned.


    ### Additional Notes

    This action is read-only and does not modify any external or internal system state.
    It is intended for auditing and visibility purposes.
  ai_short_description: >-
    Lists Cloud Identity policies for a specified organizational unit, supporting
    filtering by policy type, setting type, and display name.
