Add Entity To Detector URL List:
  ai_description: >-
    ### General Description

    The Add Entity To Detector URL List action adds specific URLs and Domains to a
    Google Cloud Identity Policy detection list. It can process both manually provided
    indicators and target entities from the case.


    ### Flow Description

    1. Extracts the `Detector Policy ID`, `URL`, and `Domain` parameters.

    2. Combines the manually provided URLs and Domains with the identifiers of any
    target entities of type URL or HOSTNAME.

    3. If no indicators are found to process, the action stops and returns a failure.

    4. Calls the Google Cloud Identity API to fetch the existing policy, appends the
    new indicators, and sends a PATCH request to update the URL list detector policy.

    5. Returns the updated policy details as a JSON result.


    ### Additional Notes

    - Supported entity types are URL and Domain (HOSTNAME).

    - The action requires a valid Detector Policy ID to function.
  ai_short_description: >-
    Adds specific URLs and Domains, including those extracted from target entities,
    to a Google Cloud Identity Policy detection list.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a URL list detector policy in Google Cloud Identity by adding new URLs
      and domains to it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PATCH request to the Google Cloud Identity API to update
      a URL list detector policy, mutating external data. It does not fetch contextual
      data for enrichment, update internal entities, create insights, or modify alert
      data.
