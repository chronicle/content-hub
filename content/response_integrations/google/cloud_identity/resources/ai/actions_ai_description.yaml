Add Entity To Detector URL List:
  ai_description: >-
    General Description

    Adds specified URLs and Domains to a Cloud Identity URL list detector policy.
    This action helps in maintaining security policies by dynamically updating detection
    lists based on provided parameters or case entities.


    Flow Description

    1. Extract the `Detector Policy ID`, `URL`, and `Domain` parameters from the action
    configuration.

    2. Parse the `URL` and `Domain` parameters into lists.

    3. Iterate through the `target_entities` in the current case, filtering for `URL`
    and `HOSTNAME` entity types.

    4. Aggregate all URLs and Domains from both the parameters and the identified
    entities.

    5. Call the Cloud Identity API to fetch the existing policy (`update_url_list_detector_policy`
    -> `fetch_policy`).

    6. Update the policy by appending the new URLs/Domains to the existing list.

    7. Send the updated policy back to the Cloud Identity API via a PATCH request.

    8. Return the result and update the action output message.


    Additional Notes

    The action requires a valid `Detector Policy ID`. It supports both manual input
    parameters and automatic entity extraction from the case.
  ai_short_description: >-
    Adds URLs and Domains to a Cloud Identity URL list detector policy.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the URL list detector policy in Cloud Identity by appending new URLs
      and domains to the existing list.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the existing policy from Cloud Identity (GET) and then updates
      it (PATCH). This involves fetching data and mutating external data.
