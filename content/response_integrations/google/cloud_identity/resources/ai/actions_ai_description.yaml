Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Cloud Identity API to ensure the integration
    is correctly configured and that the provided credentials have the necessary permissions.


    ### Flow Description

    1. The action initializes the API client using the provided credentials (service
    account or workload identity).

    2. It calls the `test_connectivity` method.

    3. The `test_connectivity` method performs a GET request to the Policies API (`/v1/policies`)
    with a page size of 1 to verify that the API is accessible and credentials are
    valid.

    4. If the request returns a successful response, the action completes successfully.
    If the request fails or no policies are returned, an exception is raised.


    ### Additional Notes

    This action does not modify any data and is intended solely for diagnostic purposes
    to verify integration health.
