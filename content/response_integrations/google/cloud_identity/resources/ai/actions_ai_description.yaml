Create Policy:
  ai_description: >-
    ### General Description

    Use the "Create Policy" action to create a new policy entry within Google Cloud
    Identity.


    ### Flow Description

    1. Extracts the `Policy Entry` parameter containing the JSON configuration of
    the policy.

    2. Validates that the provided input is a valid JSON dictionary.

    3. Constructs a policy data model from the parsed JSON.

    4. Makes a POST request to the Google Cloud Identity API to create the new policy.

    5. Returns the created policy details as a JSON result.


    ### Additional Notes

    - The `Policy Entry` parameter must be a properly formatted JSON string representing
    the policy configuration.
