List Policies:
  ai_description: >-
    ### General Description

    The "List Policies" action is used to retrieve a list of Cloud Identity policies
    associated with a specific organizational unit. It allows filtering the results
    based on policy type, setting type, and display names, returning the matching
    policies as JSON data.


    ### Flow Description

    1. Extracts and validates the input parameters, including the organizational unit
    name, policy type filter, setting type filter, display names filter, and the maximum
    number of results to return.

    2. Queries the Google Cloud Identity API to fetch the organizational unit ID corresponding
    to the provided organizational unit name.

    3. Calls the Cloud Identity API to list policies that match the organizational
    unit ID and the specified filters.

    4. Limits the retrieved policies to the specified maximum number.

    5. Returns the retrieved policies as JSON results and outputs a success or failure
    message.


    ### Additional Notes

    This action requires appropriate permissions to read organizational units and
    policies in Google Cloud Identity.
  ai_short_description: >-
    Retrieves a list of Cloud Identity policies for a specific organizational unit
    based on various filters.
