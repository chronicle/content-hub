Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cloud Identity integration to ensure that the provided
    credentials and configuration are valid.


    ### Flow Description

    1. Initializes the Cloud Identity API client using the provided integration parameters.

    2. Makes a test GET request to the Cloud Identity Policies API to retrieve a single
    policy.

    3. Validates the response to confirm successful authentication and network connectivity.


    ### Additional Notes

    This action does not modify any data or interact with specific entities. It is
