[project]
name = "CloudIdentity"
version = "1.0"
description = "A unified identity, access, app, and endpoint management (IAM/EMM) platform."
requires-python = ">=3.11"
dependencies = [
    "dataclass-wizard==0.39.1",
    "environmentcommon",
    "google-api-core==2.22.0",
    "google-auth==2.35.0",
    "googleapis-common-protos==1.65.0",
    "PyYAML==6.0.3",
    "requests==2.32.4",
    "tipcommon",
    "urllib3==2.2.3",
]

[tool.uv.sources]
environmentcommon = { path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl" }
tipcommon = { path = "../../../../packages/tipcommon/whls/TIPCommon-2.0.1-py2.py3-none-any.whl" }
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../packages/integration_testing_whls/integration_testing-2.0.1-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "integration-testing",
    "pytest>=9.0.2",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
