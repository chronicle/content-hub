name: Create Watchlist
description: Create a watchlist in Exabeam Advanced Analytics.
integration_identifier: ExabeamAdvancedAnalytics
parameters:
-   name: Title
    default_value: ''
    type: string
    description: Specify the title of the watchlist.
    is_mandatory: true
-   name: Category
    default_value: User
    type: ddl
    optional_values:
    - User
    - Asset
    description: Specify the category for the watchlist.
    is_mandatory: true
-   name: Access Control
    default_value: Private
    type: ddl
    optional_values:
    - Private
    - Public
    description: Specify the access control for the watchlist.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify description for the watchlist.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_watchlist_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
