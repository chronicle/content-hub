name: Remove Entity From Watchlist
description: 'Remove entities from the watchlist in Exabeam Advanced Analytics. Note:
    Watchlists with categori ''AssetLabels'' and ''UserLabels'' are not supported
    in this action.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/exabeam-advanced-analytics#remove_entity_from_watchlist
integration_identifier: ExabeamAdvancedAnalytics
parameters:
-   name: Watchlist Title
    default_value: ''
    type: string
    description: Specify the title of the watchlist from which you want to remove
        entities.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "USERUNIQNAME", "HOSTNAME"]}'
