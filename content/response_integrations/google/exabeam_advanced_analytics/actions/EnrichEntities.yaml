name: Enrich Entities
description: 'Enrich entities using the information from Exabeam Advanced Analytics.
    Supported entities: Hostname, IP and User. Event time frame parameter works with
    hours.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/exabeam-advanced-analytics#enrich_entities
integration_identifier: ExabeamAdvancedAnalytics
parameters:
-   name: Return Entity Timeline
    default_value: 'True'
    type: boolean
    description: If enabled, action will return the timeline for the entity.
    is_mandatory: true
-   name: Event Time Frame
    default_value: '24'
    type: string
    description: Specify the frame for the events that you want to see in hours.
    is_mandatory: false
-   name: Only Anomaly Events
    default_value: 'True'
    type: boolean
    description: If enabled, action will only return events that are considered to
        be anomalies.
    is_mandatory: false
-   name: Lowest Event Risk Score To Fetch
    default_value: ''
    type: string
    description: Specify what should be the lowest risk score of the event in order
        to ingest it. If nothing is specified, action will not do any filtering.
    is_mandatory: false
-   name: Return Comments
    default_value: 'True'
    type: boolean
    description: If enabled, action will return comments related to the entity.
    is_mandatory: false
-   name: Create Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight per entity.
    is_mandatory: false
-   name: Max Events To Return
    default_value: ''
    type: string
    description: Specify how many events should be returned. If nothing is specified,
        action will return all of the events.
    is_mandatory: false
-   name: Max Comments To Return
    default_value: '10'
    type: string
    description: Specify how many comments to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "USERUNIQNAME"]}'
