name: List Watchlist Items
description: List available items in watchlists from Exabeam Advanced Analytics.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/exabeam-advanced-analytics#list_watchlist_items
integration_identifier: ExabeamAdvancedAnalytics
parameters:
-   name: Watchlist Titles
    default_value: ''
    type: string
    description: Specify a comma-separated list of watchlist titles for which you
        want to return items.
    is_mandatory: true
-   name: Max Items To Return
    default_value: '100'
    type: string
    description: Specify how many watchlist items should be returned.
    is_mandatory: false
-   name: Max Days Backwards
    default_value: '1'
    type: string
    description: 'Specify how many days backwards to list watchlists. Default: 1'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_watchlist_items_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
