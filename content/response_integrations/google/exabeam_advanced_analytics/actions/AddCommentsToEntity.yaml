name: Add Comments To Entity
description: 'Add comments to entities in Exabeam Advanced Analytics. Supported entities:
    Hostname, IP and User.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/exabeam-advanced-analytics#add_comments_to_entity
integration_identifier: ExabeamAdvancedAnalytics
parameters:
-   name: Comment
    default_value: ''
    type: string
    description: Specify the comment that needs to be added to the entity.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_comments_to_entity_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "USERUNIQNAME", "HOSTNAME"]}'
