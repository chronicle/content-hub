name: Add Entity To Watchlist
description: 'Add entities to the watchlist in Exabeam Advanced Analytics. Note: Watchlists
    with category ''AssetLabels'' and ''UserLabels'' are not supported in this action.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/exabeam-advanced-analytics#add_entity_to_watchlist
integration_identifier: ExabeamAdvancedAnalytics
parameters:
-   name: Watchlist Title
    default_value: ''
    type: string
    description: Specify the title of the watchlist of which you want to add entities.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "USERUNIQNAME", "HOSTNAME"]}'
