List Watchlists:
  ai_description: >-
    Retrieves a list of available watchlists from Exabeam Advanced Analytics. This
    action allows users to discover existing watchlists, including their IDs, titles,
    and categories (e.g., Users, Assets). The results are presented as both a JSON
    object for downstream automation and a formatted data table for analyst review.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Watchlists To Return | Integer | No | Specifies the maximum number of watchlists
    to retrieve. If not provided or set to a value less than 1, it defaults to 100.
    |


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API Root,
    Token, SSL verification) and the optional 'Max Watchlists To Return' parameter.

    2. **Validation**: It ensures the 'Max Watchlists To Return' value is valid; if
    invalid, it reverts to the default value of 100.

    3. **API Interaction**: It sends a GET request to the Exabeam Advanced Analytics
    API endpoint `/uba/api/watchlist` to fetch the list of watchlists.

    4. **Data Processing**: The response is parsed into a list of watchlist objects,
    limited by the specified maximum count.

    5. **Output**: The action populates a JSON result with the raw watchlist data
    and constructs a data table containing the Watchlist ID, Title, and Category for
    display in the case wall.
