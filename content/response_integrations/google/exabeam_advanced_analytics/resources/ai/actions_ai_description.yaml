Delete Watchlist:
  ai_description: >-
    Deletes a specific watchlist in Exabeam Advanced Analytics based on its title.
    The action first retrieves all available watchlists to identify the unique ID
    associated with the provided title and then performs the deletion.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Title | String | Yes | The exact title of the watchlist that needs
    to be deleted from the Exabeam system. |


    ### Flow Description

    1. **Initialization**: The action initializes the Exabeam Advanced Analytics manager
    using the provided API Root and Token.

    2. **Watchlist Lookup**: It fetches a list of all existing watchlists from the
    Exabeam API.

    3. **Identification**: The code iterates through the retrieved watchlists to find
    one that matches the user-provided 'Watchlist Title'.

    4. **Deletion**: If a match is found, it calls the deletion endpoint using the
    specific 'watchlist_id'.

    5. **Error Handling**: If the watchlist title is not found in the system, the
    action raises a 'NotFoundError' and fails the execution.
