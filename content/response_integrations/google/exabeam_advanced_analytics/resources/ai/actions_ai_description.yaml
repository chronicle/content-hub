Create Watchlist:
  ai_description: >-
    ### General Description

    Creates a new watchlist in Exabeam Advanced Analytics. This action allows users
    to define a new collection of entities (Users or Assets) with specific access
    controls and descriptions within the Exabeam platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The title of the watchlist to be created. |

    | Category | String | Yes | The category for the watchlist. Options are 'User'
    (mapped to 'Users') or 'Asset' (mapped to 'Assets'). |

    | Access Control | String | Yes | Specifies the access level for the watchlist.
    Options are 'Private' (mapped to 'private') or 'Public' (mapped to 'public').
    |

    | Description | String | No | A detailed description of the watchlist's purpose.
    |


    ### Additional Notes

    This action does not operate on specific entities within the Google SecOps case;
    it is a management action used to configure the external Exabeam environment.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (Root, Token, SSL)
    and action parameters (Title, Category, Access Control, Description).

    2. **Manager Initialization**: Initializes the `ExabeamAdvancedAnalyticsManager`
    to handle API communication.

    3. **Mapping**: Converts the user-friendly parameter values for 'Category' and
    'Access Control' into the specific strings required by the Exabeam API.

    4. **API Execution**: Sends a POST request to the Exabeam `uba/api/watchlist`
    endpoint with the provided details.

    5. **Result Handling**: Captures the API response containing the new watchlist's
    details (including its ID) and adds it to the action's JSON results.
