Add Comments To Entity:
  ai_description: >-
    ### General Description

    Adds comments to specific entities within the Exabeam Advanced Analytics platform.
    This action allows security analysts to document findings or provide context directly
    on entity profiles (Users or Assets) in Exabeam from within Google SecOps. It
    supports IP addresses, Hostnames, and User entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Comment | String | Yes | The text content of the comment to be added to the
    entity in Exabeam Advanced Analytics. |


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (API Root, Token, SSL
    verification) and the mandatory 'Comment' parameter.

    2. **Entity Filtering**: Iterates through the target entities in the current context,
    filtering for supported types: `USER`, `ADDRESS` (IP), and `HOSTNAME`.

    3. **Existence Check**: For each supported entity, the action queries Exabeam
    Advanced Analytics to verify the entity exists in their system. It maps SecOps
    entity types to Exabeam's 'user' or 'asset' categories.

    4. **Mutation**: If the entity is found, the action performs a POST request to
    the Exabeam API to attach the provided comment to that specific entity.

    5. **Result Reporting**: Tracks successful and failed comment additions, providing
    a summary message and detailed JSON results for each processed entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Exabeam Advanced Analytics API to
      create and attach a new comment to an entity's profile.
    fetches_data: true
    internal_data_mutation_explanation: null
