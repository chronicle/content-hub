    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entities to a watchlist in Exabeam Advanced Analytics, which modifies the
      membership state of that watchlist in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
