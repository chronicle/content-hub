Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP, and User entities using behavioral analytics and threat
    intelligence from Exabeam Advanced Analytics. This action provides deep context
    into entity risk scores, labels, and historical activity, helping analysts understand
    the risk profile of entities within their environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Return Entity Timeline | Boolean | Yes | If enabled, retrieves the event timeline
    for the entity. |

    | Event Time Frame | Integer | No | The number of hours back to look for events
    (default is 24). |

    | Only Anomaly Events | Boolean | No | If enabled, filters the timeline to only
    include events flagged as anomalies. |

    | Lowest Event Risk Score To Fetch | Integer | No | Filters events to only include
    those with a risk score equal to or higher than this value. |

    | Return Comments | Boolean | No | If enabled, retrieves comments associated with
    the entity in Exabeam. |

    | Create Insight | Boolean | No | If enabled, creates a detailed insight for each
    enriched entity. |

    | Max Events To Return | Integer | No | Limits the number of events returned in
    the timeline. |

    | Max Comments To Return | Integer | No | Limits the number of comments returned
    (default is 10). |


    ### Additional Notes

    The action automatically identifies if an entity is "notable" by checking global
    Exabeam lists. For IP entities, the action attempts to resolve the hostname to
    align with Exabeam's asset-centric data model. If a parameter like 'Lowest Event
    Risk Score To Fetch' is negative, it defaults to 0.


    ### Flow Description

    1. **Authentication**: Establishes a session with the Exabeam Advanced Analytics
    API using the provided API Root and Token.

    2. **Global Context Retrieval**: Fetches global lists of notable users and assets
    to allow for 'notable' status identification during entity processing.

    3. **Entity Filtering**: Iterates through target entities, processing only supported
    types: Hostname, IP (Address), and User.

    4. **Detail Retrieval**: Retrieves core entity details including risk scores,
    first/last seen timestamps, and labels from Exabeam.

    5. **Comment Enrichment**: If enabled, fetches the most recent comments for the
    entity and adds them as a data table to the case.

    6. **Timeline Analysis**: If enabled, retrieves sequences and events within the
    specified time frame, applying filters for anomalies and risk score thresholds.

    7. **Internal Mutation**: Updates the entity's additional properties with enrichment
    data and adds a direct link to the Exabeam report.

    8. **Insight Generation**: Creates a comprehensive case insight for each entity,
    summarizing the findings for the analyst.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with enrichment data, creates case insights,
      and adds data tables to the case wall.
