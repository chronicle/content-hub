Remove Entity From Watchlist:
  ai_description: >-
    Removes entities from a specified watchlist in Exabeam Advanced Analytics. This
    action supports removing User, IP Address, and Hostname entities from watchlists
    categorized as 'Users' or 'Assets'. It validates the entity type against the watchlist
    category to ensure compatibility before performing the removal.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Title | String | Yes | The exact title of the watchlist from which
    you want to remove entities. |


    ### Flow Description

    1. **Initialization**: Retrieves the API connection details and the target watchlist
    title from the action parameters.

    2. **Watchlist Discovery**: Queries Exabeam to find the watchlist matching the
    provided title.

    3. **Validation**: Verifies that the watchlist exists and belongs to a supported
    category ('Users' or 'Assets'). Categories like 'AssetLabels' and 'UserLabels'
    are explicitly excluded.

    4. **Entity Filtering**: Iterates through the target entities in the SOAR case.
    It filters for supported types (USER, ADDRESS, HOSTNAME) and ensures they match
    the watchlist category (e.g., User entities are only processed for 'Users' watchlists).

    5. **Removal Execution**: Sends a request to the Exabeam API to remove the valid
    entities from the specified watchlist.

    6. **Verification**: Checks the API response to confirm how many entities were
    removed. If the count doesn't match the input, it performs a secondary check by
    fetching the current watchlist state to identify which specific entities were
    successfully removed.

    7. **Reporting**: Provides a summary message indicating which entities were successfully
    removed and which failed.
