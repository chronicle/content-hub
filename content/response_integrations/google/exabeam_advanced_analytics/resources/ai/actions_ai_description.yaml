List Watchlist Items:
  ai_description: >-
    ### General Description

    Retrieves a list of items from specified watchlists within Exabeam Advanced Analytics.
    This action allows users to query multiple watchlists by title and fetch the associated
    assets or users, providing visibility into tracked entities and their risk scores
    directly within Google SecOps.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Titles | String | Yes | A comma-separated list of watchlist titles
    (e.g., 'High Risk Users, Critical Assets') for which you want to retrieve items.
    |

    | Max Items To Return | Integer | No | The maximum number of items to return for
    each watchlist. Defaults to 100 if not specified or if a negative value is provided.
    |

    | Max Days Backwards | Integer | No | The number of days to look back for watchlist
    items. Defaults to 1 if not specified or if a negative value is provided. |


    ### Additional Notes

    - The action automatically determines whether a watchlist contains 'Users' or
    'Assets' based on its category in Exabeam.

    - If a requested watchlist title is not found in the Exabeam instance, the action
    will report it as failed/missing in the output message.

    - Results are presented as individual data tables for each successful watchlist
    and a combined JSON result.


    ### Flow Description

    1. **Initialization**: Extracts the API configuration (Root, Token, SSL) and action
    parameters (Titles, Max Items, Days Backwards).

    2. **Validation**: Ensures that 'Max Items To Return' and 'Max Days Backwards'
    are non-negative, reverting to defaults if necessary.

    3. **Watchlist Discovery**: Connects to Exabeam and retrieves the full list of
    available watchlists to match the provided titles with their internal IDs and
    categories.

    4. **Item Retrieval**: For every matching watchlist, the action queries Exabeam
    for its specific items (Users or Assets) using the defined time range and limit.

    5. **Data Processing**: Converts the raw API response into structured data models
    and prepares CSV-formatted tables for the SOAR interface.

    6. **Output**: Adds a data table for each watchlist containing items and returns
    a comprehensive JSON object containing all retrieved data.
