Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Exabeam Advanced\
    \ Analytics server. It ensures that the provided configuration parameters (API\
    \ Root, API Token, and SSL settings) are correct and that the external service\
    \ is reachable.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **API Root** | String | Yes\
    \ | The base URL of the Exabeam Advanced Analytics instance (e.g., `https://exabeam.example.com`).\
    \ |\n| **API Token** | String | Yes | The authentication token used to authorize\
    \ requests to the Exabeam API. |\n| **Verify SSL** | Boolean | Yes | If enabled,\
    \ the action will verify the SSL certificate of the Exabeam server. |\n\n### Additional\
    \ Notes\n- This action does not process any entities.\n- It is primarily used\
    \ during the initial setup or troubleshooting of the Exabeam Advanced Analytics\
    \ integration.\n- According to standard SOAR categorization, Ping actions are\
    \ not classified as enrichment actions.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify context and logs the start of the process.\n\
    2. **Parameter Extraction**: It retrieves the `API Root`, `API Token`, and `Verify\
    \ SSL` settings from the integration configuration.\n3. **Manager Setup**: An\
    \ instance of the `ExabeamAdvancedAnalyticsManager` is created using the extracted\
    \ credentials.\n4. **Connectivity Test**: The manager executes a `test_connectivity`\
    \ call, which sends a GET request to the `uba/api/ping` endpoint of the Exabeam\
    \ server.\n5. **Result Handling**: \n    - If the request is successful (HTTP\
    \ 200), the action returns a success message and sets the execution state to completed.\n\
    \    - If an exception occurs (e.g., network error, invalid token), the action\
    \ logs the error and returns a failure status."
