Add Entity To Watchlist:
  ai_description: >-
    ### General Description

    Adds entities to a specified watchlist in Exabeam Advanced Analytics. This action
    allows security analysts to programmatically tag or monitor specific users or
    assets by placing them into existing watchlists within the Exabeam platform. It
    ensures that entities are only added to compatible watchlist categories (e.g.,
    users to user watchlists and hosts/IPs to asset watchlists).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Title | String | Yes | The exact title of the watchlist in Exabeam
    Advanced Analytics where the entities should be added. |


    ### Additional Notes

    - **Supported Categories**: The action only supports watchlists with the category
    'Users' or 'Assets'.

    - **Category Constraints**: 'User' entities can only be added to 'Users' category
    watchlists. 'IP Address' and 'Hostname' entities can only be added to 'Assets'
    category watchlists.

    - **Unsupported Categories**: Watchlists with categories 'AssetLabels' and 'UserLabels'
    are explicitly not supported and will cause the action to fail.


    ### Flow Description

    1. **Initialization**: The action connects to Exabeam Advanced Analytics using
    the provided API credentials.

    2. **Watchlist Retrieval**: It fetches the list of all available watchlists from
    Exabeam to find the one matching the provided 'Watchlist Title'.

    3. **Validation**: It verifies the existence of the watchlist and ensures its
    category is either 'Users' or 'Assets'.

    4. **Entity Filtering**: It iterates through the target entities in the Google
    SecOps case, filtering them to ensure they match the watchlist category (e.g.,
    skipping IP entities if the target is a User watchlist).

    5. **External Mutation**: It performs a bulk update request to the Exabeam API
    to add the suitable entities to the specified watchlist.

    6. **Verification**: The action compares the number of successfully added entities
    against the requested list and identifies any failures before returning the final
    status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
