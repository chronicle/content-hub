name: Get a Trusted IP List
description: Get details about a trusted IP list in AWS GuardDuty.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to get an IP set. This
        parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: Trusted IP List IDs
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of ids of ips sets. Example: id_1,id_2.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_a_trusted_ip_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
