name: Get all Trusted IP lists
description: Get all trusted IP lists (IPSets) of the GuardDuty service specified
    by the detector ID.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to list IP sets. This
        parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: Max Trusted IP Lists To Return
    default_value: '50'
    type: string
    description: Specify how many Trusted IPs lists to return. Default is 50.
    is_mandatory: false
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_all_trusted_i_ps_lists_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
