name: Get Finding Details
description: Return detailed information about a finding in AWS Guard Duty.
integration_identifier: AWSGuardDuty
parameters:
-   name: Finding IDs
    default_value: ''
    type: string
    description: The IDs of the findings that you want to retrieve. Comma separated
        ids.
    is_mandatory: true
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector that you want to retrieve.
    is_mandatory: true
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_finding_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
