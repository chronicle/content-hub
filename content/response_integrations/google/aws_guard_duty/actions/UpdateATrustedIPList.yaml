name: Update a Trusted IP List
description: Update a trusted IP list in AWS GuardDuty.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to update a Trusted IP
        List. This parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: Trusted IP List ID
    default_value: ''
    type: string
    description: Specify the ID of the Trusted IP List that should be updated.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify the new name of the Trusted IP List.
    is_mandatory: false
-   name: File Location
    default_value: https://s3.amazonaws.com/{bucket-name}/file.txt
    type: string
    description: Specify a new URI location, where the file is located.
    is_mandatory: false
-   name: Activate
    default_value: 'true'
    type: boolean
    description: If enabled, the Trusted IP List will be activated.
    is_mandatory: true
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
