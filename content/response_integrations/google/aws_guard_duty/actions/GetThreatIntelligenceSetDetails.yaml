name: Get Threat Intelligence Set Details
description: Get details about a threat intelligence set in AWS GuardDuty.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to get threat intelligence
        sets details. This parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: Threat Intelligence Set IDs
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of ids of threat intelligence sets.
        Example: id_1,id_2.'
    is_mandatory: true
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_threat_intelligence_set_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
