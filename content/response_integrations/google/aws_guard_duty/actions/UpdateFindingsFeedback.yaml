name: Update Findings Feedback
description: Mark the specified Amazon GuardDuty findings as useful or not useful.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector associated with the findings to update
        feedback for.
    is_mandatory: true
-   name: Useful?
    default_value: ''
    type: boolean
    description: The feedback for the finding.
    is_mandatory: true
-   name: Findings IDs
    default_value: ''
    type: string
    description: The IDs of the findings that you want to mark as useful or not useful.
        Comma separated values.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Additional feedback about the GuardDuty findings.
    is_mandatory: false
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
