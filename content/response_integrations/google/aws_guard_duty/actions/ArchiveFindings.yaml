name: Archive Findings
description: Archive GuardDuty findings that are specified by finding IDs.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector.
    is_mandatory: true
-   name: Finding IDs
    default_value: ''
    type: string
    description: The IDs of the findings that you want to archive. Comma separated
        ids.
    is_mandatory: true
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
