Archive Findings:
  ai_description: >-
    ### General Description

    Archives specified AWS GuardDuty findings. This action allows users to mark specific
    findings as archived in AWS GuardDuty, effectively removing them from the active
    findings list.


    ### Flow Description

    1. Extracts parameters: `Detector ID`, `Finding IDs`, and `AWS Region`.

    2. Initializes the `AWSGuardDutyManager` with the provided AWS credentials.

    3. Validates connectivity to the AWS GuardDuty service.

    4. Parses the comma-separated `Finding IDs` parameter into a list.

    5. Retrieves the findings from AWS using `get_findings_by_ids` to verify their
    existence.

    6. Iterates through the verified findings and calls the `archive_findings` API
    method for each.

    7. Reports the success or failure for each finding in the final output message.


    ### Additional Notes

    Requires valid AWS credentials configured in the integration. This action performs
    a state change in AWS GuardDuty.
  ai_short_description: >-
    Archives specified AWS GuardDuty findings by ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
