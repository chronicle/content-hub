    ### Flow Description

    1. Extracts the `Detector ID` and `Finding Types` parameters.

    2. Connects to the AWS GuardDuty service.

    3. If finding types are provided, makes an API call to AWS GuardDuty (`create_sample_findings`)
    to generate the sample findings for the specified detector.

    4. Returns a success message if the sample findings were created successfully,
    or a message indicating no samples were created if the finding types list was
    empty.


