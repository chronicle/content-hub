Create a Detector:
  ai_description: >-
    ### General Description

    Creates a new Amazon GuardDuty detector in the specified AWS region. A detector
    is a resource that represents the GuardDuty service, and this action enables the
    service for the account in that region. Note that only one detector is allowed
    per account per region.


    ### Flow Description

    1. The action initializes the `AWSGuardDutyManager` using the provided AWS credentials
    (Access Key, Secret Key, and Default Region).

    2. It validates connectivity to the AWS GuardDuty service.

    3. It calls the `create_detector` method, passing the `Enable` parameter to determine
    if the detector should be enabled upon creation.

    4. If the detector is successfully created, the action returns the `detectorId`
    in the JSON results.

    5. If a detector already exists for the account, the action catches the `AWSGuardDutyResourceAlreadyExistsException`
    and reports that the action could not create a new detector.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to manage
    GuardDuty resources. It does not operate on any specific entities within the SOAR
    platform.
