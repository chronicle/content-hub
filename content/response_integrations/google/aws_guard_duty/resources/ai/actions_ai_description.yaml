Create Sample Findings:
  ai_description: >-
    ### General Description

    Generates example findings in AWS GuardDuty for a specified detector. This action
    allows users to create sample findings to test their security monitoring and alerting
    configurations within AWS GuardDuty.


    ### Flow Description

    1. Extracts `Detector ID` and `Finding Types` from action parameters.

    2. Initializes `AWSGuardDutyManager` with AWS credentials.

    3. Validates connectivity to the AWS GuardDuty service.

    4. If `Finding Types` are provided, converts them into a list.

    5. Calls the `create_sample_findings` API method of the AWS GuardDuty service
    using the provided `Detector ID` and `Finding Types`.

    6. Returns a success or failure status based on the API response.


