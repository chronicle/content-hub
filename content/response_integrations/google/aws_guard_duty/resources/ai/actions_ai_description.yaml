Create a Detector:
  ai_description: >-
    ### General Description

    Creates a single Amazon GuardDuty detector in the specified AWS account and region.
    A detector is a resource that represents the GuardDuty service, and an account
    can only have one detector per region.


    ### Flow Description

    1. Extracts the `Enable` parameter to determine if the detector should be activated
    upon creation.

    2. Initializes the AWS GuardDuty client and validates credentials.

    3. Makes an API call (`create_detector`) to AWS GuardDuty to provision the new
    detector.

    4. If successful, returns the newly created detector ID and attaches it to the
    action's JSON results.

    5. If a detector already exists for the account, catches the resulting error and
    outputs a message indicating the resource already exists.


    ### Additional Notes

    You can have only one detector per account per Region. If the action attempts
    to create a detector where one already exists, it will gracefully fail and notify
    the user.
