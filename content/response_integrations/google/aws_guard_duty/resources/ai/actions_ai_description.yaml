Delete Threat Intelligence Set:
  ai_description: >-
    ### General Description

    Deletes specified threat intelligence sets from AWS GuardDuty. This action allows
    users to remove existing threat intelligence lists from a specific detector by
    providing the detector ID and a comma-separated list of threat intelligence set
    IDs.


    ### Flow Description

    1. Extracts AWS credentials (Access Key, Secret Key, Region) and action parameters
    (`Detector ID`, `Threat Intelligence Set IDs`) from the configuration.

    2. Initializes the `AWSGuardDutyManager` and performs a connectivity test to ensure
    the service is accessible.

    3. Validates the existence of the specified detector using the `get_detector`
    method.

    4. Iterates through the provided list of Threat Intelligence Set IDs.

    5. For each ID, calls the `delete_threat_intel_set_by_id` method to remove the
    threat intelligence set from AWS GuardDuty.

    6. Collects the results of each deletion attempt and generates a summary message
    indicating which sets were successfully deleted and which failed.


    ### Additional Notes

    This action performs a destructive operation on AWS GuardDuty resources. Ensure
    that the provided Threat Intelligence Set IDs are correct, as this action will
    permanently remove the specified sets from the detector's configuration.
