Create a Trusted IP List:
  ai_description: >-
    ### General Description

    Creates a new list of trusted IP addresses (IPSet) in AWS GuardDuty. This list
    acts as an allowlist for secure communication with AWS infrastructure and applications,
    ensuring that GuardDuty does not generate findings for the IP addresses included
    in the IPSet.


    ### Flow Description

    1. Extracts the necessary parameters including the Detector ID, list name, file
    format, file location (URI), and activation status.

    2. Initializes a connection to the AWS GuardDuty service.

    3. Makes an API call (`create_ip_set`) to AWS GuardDuty to create the new Trusted
    IP List using the provided file location.

    4. Retrieves the newly created IP Set ID and attaches it to the action's JSON
    results.


    ### Additional Notes

    Only one Trusted IP set can be created and activated at a time. GuardDuty does
    not generate findings for IP addresses that are included in IPSets. Only users
    from the master account can use this operation.
  ai_short_description: >-
    Creates a new Trusted IP List (IPSet) in AWS GuardDuty from a specified file location
