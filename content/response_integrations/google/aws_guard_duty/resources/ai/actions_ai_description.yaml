Create Threat Intelligence Set:
  ai_description: >-
    ### General Description

    Creates a new Threat Intelligence Set in AWS GuardDuty. This action allows users
    to configure a new threat intelligence feed by specifying the detector ID, name,
    file format, and location of the threat intelligence file. It also allows for
    the activation of the set and the addition of custom tags.


    ### Flow Description

    1. The action extracts the required AWS credentials (Access Key, Secret Key, Region)
    and action parameters (Detector ID, Name, File Format, File Location, Active,
    Tags) from the configuration.

    2. It initializes the `AWSGuardDutyManager` and performs a connectivity test to
    ensure the credentials are valid.

    3. The action calls the `manager.create_threat_intel_set` method, which sends
    a request to the AWS GuardDuty API to create the Threat Intelligence Set with
    the provided configuration.

    4. Upon successful creation, the action logs the new Threat Intelligence Set ID
    and adds it to the result JSON.

    5. The action concludes by setting the execution state to completed and returning
    the output message.


    ### Additional Notes

    - This action requires the `iam:PutRolePolicy` permission in AWS.

    - There is a maximum limit of 6 Threat Intelligence sets per detector.
