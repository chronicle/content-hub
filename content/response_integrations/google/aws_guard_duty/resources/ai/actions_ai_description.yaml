Create a Trusted IP List:
  ai_description: >-
    ### General Description

    Creates a new Trusted IP List (IPSet) in AWS GuardDuty. This list is used to whitelist
    IP addresses, preventing GuardDuty from generating findings for them. This action
    is useful for managing trusted infrastructure and reducing false positives in
    security monitoring.


    ### Flow Description

    1. Extracts AWS credentials and action parameters (Detector ID, Name, File Format,
    File Location, Activate, AWS Region).

    2. Initializes the `AWSGuardDutyManager` with the provided credentials and region.

    3. Validates connectivity to the AWS GuardDuty service.

    4. Calls the `create_ip_set` method of the `AWSGuardDutyManager` to create the
    Trusted IP List in AWS GuardDuty.

    5. Returns the ID of the newly created Trusted IP List in the action results.


    ### Additional Notes

    Only users from the master account can perform this operation. Only one Trusted
    IP set can be created and activated.
