Update Findings Feedback:
  ai_description: >-
    ### General Description

    Updates the feedback status of specified Amazon GuardDuty findings to mark them
    as useful or not useful. This action allows analysts to provide feedback directly
    to AWS GuardDuty to improve its machine learning models and future finding accuracy.


    ### Flow Description

    1. Extracts the provided Detector ID, Findings IDs, feedback status (Useful/Not
    Useful), and optional comments.

    2. Initializes the AWS GuardDuty client and establishes a connection to the service.

    3. Calls the `get_findings` API to verify the existence of the provided finding
    IDs within the specified detector.

    4. Calls the `update_findings_feedback` API to apply the feedback status and comments
    to the verified findings.

    5. Returns a summary message detailing which findings were successfully updated
    and which failed or were not found.


