Unarchive Findings:
  ai_description: >-
    ### General Description

    Unarchives specific AWS GuardDuty findings by their IDs. This action interacts
    with the AWS GuardDuty service to change the status of findings from archived
    to active, allowing them to be visible and actionable again within the AWS console.


    ### Flow Description

    1. Extracts the `Detector ID` and `Finding IDs` from the action parameters.

    2. Initializes the `AWSGuardDutyManager` using the configured AWS credentials
    (Access Key, Secret Key, and Region).

    3. Validates connectivity to the AWS GuardDuty service using `manager.test_connectivity()`.

    4. Retrieves the specified findings using `manager.get_findings_by_ids` to verify
