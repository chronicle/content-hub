Create Threat Intelligence Set:
  ai_description: >-
    ### General Description

    This action creates a new Threat Intelligence Set in AWS GuardDuty. It allows
    users to specify the detector ID, set name, file format, file location (URI),
    and optional tags. The action interacts with the AWS GuardDuty API to register
    the threat intelligence feed, which GuardDuty can then use to monitor and alert
    on known malicious IP addresses or domains.


    ### Flow Description

    1. Extracts the provided parameters including Detector ID, Name, File Format,
    File Location, Active status, and Tags.

    2. Connects to the AWS GuardDuty service using the provided integration credentials.

    3. Calls the AWS GuardDuty API (`create_threat_intel_set`) to create the Threat
    Intelligence Set with the specified configuration.

    4. Returns the newly created Threat Intelligence Set ID as a JSON result.


    ### Additional Notes

    Requires `iam:PutRolePolicy` permission. The maximum number of Threat Intel sets
    allowed per detector is 6.
