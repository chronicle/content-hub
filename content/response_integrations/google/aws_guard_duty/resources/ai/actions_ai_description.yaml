    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Archives the specified findings in AWS GuardDuty.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to fetch findings (fetches_data=true) and a POST/PUT
      request to archive them (can_mutate_external_data=true). It does not mutate
      internal data or update entities.
