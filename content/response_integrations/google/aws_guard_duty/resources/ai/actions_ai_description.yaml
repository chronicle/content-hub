Archive Findings:
  ai_description: >-
    ### General Description

    Archives specific AWS GuardDuty findings based on their finding IDs and the associated
    detector ID. This action changes the state of the findings in the external AWS
    environment to 'archived'.


    ### Flow Description

    1. Extracts the `Detector ID`, `Finding IDs`, and `AWS Region` from the action
    parameters.

    2. Initializes the AWS GuardDuty client and tests connectivity to the service.

    3. Fetches the specified findings from AWS GuardDuty to verify their existence.

    4. Iterates through the verified findings and sends an API request (`archive_findings`)
    to AWS GuardDuty to archive each one.

    5. Returns a summary message detailing which findings were successfully archived
    and which could not be found or archived.


    ### Additional Notes

    The action requires valid AWS credentials and appropriate permissions to archive
    findings in GuardDuty. The `Finding IDs` parameter accepts a comma-separated list
    of IDs.
  ai_short_description: >-
    Archives specific AWS GuardDuty findings using their finding IDs and the associated
    detector ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Archives specified findings in the external AWS GuardDuty service.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes an API request to AWS GuardDuty to archive specific findings,
      which mutates external data (can_mutate_external_data = true). It does not fetch
      contextual data for enrichment (it only fetches findings to validate their existence
      before archiving), nor does it mutate internal SecOps data, update entities,
      create insights, modify SecOps alerts, or create case comments.
