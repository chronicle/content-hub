Change Host OU:
  ai_description: >-
    ### General Description

    Changes the Organizational Unit (OU) of a Hostname entity in Active Directory.
    This action moves a computer object from its current location in the directory
    to a specified target OU, which can be useful for applying different Group Policies
    or isolating the host.


    ### Flow Description

    1. Iterates over the target entities provided to the action, filtering for entities
    of type `HOSTNAME`.

    2. For each valid entity, queries Active Directory to locate the computer object
    and the target Organizational Unit.

    3. Executes an LDAP `modify_dn` operation to change the host's distinguished name,
    effectively moving it to the new OU.

    4. Collects the results and outputs a summary message detailing which hosts were
    successfully moved and which failed.


    ### Additional Notes

    - The integration must be configured with credentials that have sufficient privileges
    to modify computer objects and move them between OUs in Active Directory.

    - The target OU must exist in Active Directory, and its name must be provided
    exactly as it appears in the directory.
