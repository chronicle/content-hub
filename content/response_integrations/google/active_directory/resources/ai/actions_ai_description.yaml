    2. Filters the provided entities to identify those of type `HOSTNAME`.

    3. For each valid hostname, the action queries Active Directory to locate the
    corresponding computer object.

    4. If the computer object is found, the action updates the `userAccountcontrol`
    attribute to the value `4098` (Disable Computer) using an LDAP modification request.

    5. The action tracks successful, failed, and missing entities, providing a summary
    in the output message.


