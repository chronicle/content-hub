Add User To Group:
  ai_description: >-
    ### General Description

    Adds one or more users to specified Active Directory groups. This action interacts
    with Active Directory to modify group membership, enabling automated user management
    within the directory service.


    ### Flow Description

    1. Extracts Active Directory configuration parameters (server, credentials, domain,
    etc.) and the `Group Name` parameter.

    2. Initializes the `ActiveDirectoryManager` to handle LDAP operations.

    3. Parses the `Group Name` parameter into a list of groups.

    4. Iterates through the provided `target_entities` (filtered for `User` type).

    5. For each user and each group, calls the `add_user_to_group` method, which performs
    an LDAP `MODIFY_ADD` operation to add the user to the group's member list.

    6. Tracks successful and failed additions, logging the outcome for each entity.

    7. Returns a summary message indicating which users were added to which groups.


    ### Additional Notes

    Requires valid Active Directory credentials with sufficient permissions to modify
    group memberships.
  ai_short_description: >-
    Adds specified users to Active Directory groups by modifying group membership
    attributes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies Active Directory group membership by adding the user to the group's
      member list.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an LDAP `MODIFY_ADD` operation on the group's `member` attribute
      in Active Directory. This is a mutation of external data. It does not update
      internal SOAR entities or create insights.
