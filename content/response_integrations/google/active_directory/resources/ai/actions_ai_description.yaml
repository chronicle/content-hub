Is User In Group:
  ai_description: >-
    ### General Description

    Checks whether a user is a member of a specific Active Directory group. This action
    queries Active Directory to retrieve the group memberships for the provided user
    entities and verifies if the user belongs to the specified group.


    ### Flow Description

    1. Extracts configuration parameters (Server, Credentials, Domain, etc.) and the
    `GroupName` action parameter.

    2. Initializes the `ActiveDirectoryManager` to establish a connection to the Active
    Directory server.

    3. Filters the target entities to include only those of type `USER`.

    4. For each user entity, queries Active Directory to retrieve the list of groups
