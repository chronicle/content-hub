Disable account:
  ai_description: >-
    ### General Description

    Disables a user account in Active Directory. This action interacts with the Active
    Directory server to modify the user's account status, effectively preventing the
    user from authenticating.


    ### Flow Description

    1. Initialize the `ActiveDirectoryManager` with the provided configuration parameters
    (server, domain, credentials, etc.).

    2. Filter the target entities to include only those of type `USER`.

    3. For each user entity, the action calls the `disable_account` method in the
    `ActiveDirectoryManager`.

    4. The `disable_account` method performs an LDAP `modify` operation on the user's
    `userAccountcontrol` attribute to set the value to `514`, effectively disabling
    the account.

    5. Log the success or failure of the operation for each entity.

    6. Return the final status and output message.


    ### Additional Notes

    This action directly modifies the state of the user account in Active Directory.
