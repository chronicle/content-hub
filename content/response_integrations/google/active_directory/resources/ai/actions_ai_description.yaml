    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified user to the target groups in Active Directory by modifying
      the group's member attribute.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an LDAP modify request to add a user to a group in Active
      Directory (can_mutate_external_data=true). It does not fetch contextual data
      for enrichment, update internal entities, or create insights.
