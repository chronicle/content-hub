Add User To Group:
  ai_description: >-
    ### General Description

    Adds specified User entities to one or more Active Directory groups. This action
    initiates a state change on the external Active Directory server to modify the
    group membership of the targeted users.


    ### Flow Description

    1. Initializes the Active Directory connection using the provided integration
    credentials.

    2. Parses the provided comma-separated list of target group names.

    3. Iterates through the target User entities in the case.

    4. For each user, queries Active Directory to resolve the user and group Distinguished
    Names (DNs).

    5. Executes an LDAP modify operation (`MODIFY_ADD`) to append the user's DN to
    the target group's `member` attribute.

    6. Aggregates the results, handling errors such as missing users, missing groups,
    or insufficient permissions, and returns a summary message.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds specified User entities to one or more Active Directory groups by modifying
    the group's member attribute.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
