  ai_description: >-
    Forces a user password update on the next logon in Active Directory. This action
    modifies the user's account settings in the external Active Directory environment
    to ensure the user must change their password upon their next authentication attempt.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Server | String | Yes | The Active Directory server IP or hostname. |

    | Username | String | Yes | The username to authenticate with Active Directory.
    |

    | Password | String | Yes | The password to authenticate with Active Directory.
    |

    | Domain | String | Yes | The Active Directory domain. |

    | Use SSL | Boolean | Yes | Whether to use SSL for the connection. |

    | Custom Query Fields | String | No | Comma-separated list of custom fields to
    query. |

    | CA Certificate File - parsed into Base64 String | String | No | The CA certificate
    file content parsed into a Base64 string for SSL validation. |


    ### Action Flow

    1. Initializes the Active Directory manager with the provided credentials and
    connection details.

    2. Iterates through the target entities, filtering for User entities.

    3. For each valid user entity, sends an LDAP modify request to Active Directory
    to set the `pwdLastSet` attribute to 0, forcing a password reset on the next logon.

    4. Returns a summary of successful and failed password update enforcements.
