Force password update:
  ai_description: >-
    ### General Description

    Forces a user to update their password on their next logon in Active Directory.
    This action modifies the user's account settings to invalidate the current password
    lifespan, requiring the user to set a new password upon their next authentication
    attempt.


    ### Flow Description

    1. The action filters the target entities to include only those of type `USER`.

    2. For each valid user entity, it queries Active Directory to locate the user's
    distinguished name (DN).

    3. It executes an LDAP modify operation (`MODIFY_REPLACE`) on the user's DN, setting
    the `pwdLastSet` attribute to `0`.

    4. The action collects the results and returns a summary message detailing which
    users were successfully forced to update their passwords and which failed.


