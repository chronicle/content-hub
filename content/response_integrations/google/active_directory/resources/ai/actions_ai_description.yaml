Get Group Members:
  ai_description: >-
    ### General Description

    Fetches the list of members (users or hosts) belonging to a specified group in
    Active Directory. This action retrieves member details based on the provided group
    name and member type, supporting nested group searches and pagination for large
    result sets.


    ### Flow Description

    1. Initializes the Active Directory connection using provided configuration parameters
    (Server, Domain, Credentials, etc.).

    2. Retrieves the distinguished name of the specified group using `manager.get_group_distinguished_name`.

    3. Queries Active Directory for members of the group using `manager.list_user_group_members`,
    applying filters for member type (User/Host), nested search, and pagination limits.

    4. If the results exceed the page size or limit, it continues fetching in subsequent
    runs using a pagination cookie.

    5. Once all members are retrieved (or the limit is reached), it adds the resulting
    list of members to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is read-only and does not modify Active Directory data. It supports
