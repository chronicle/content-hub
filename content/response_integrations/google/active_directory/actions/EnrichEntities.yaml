name: Enrich entities
description: Enrich Hostname or Username entities with Active Directory properties
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/active-directory#enrich_entities
integration_identifier: ActiveDirectory
parameters:
-   name: Mark entities as internal
    default_value: ''
    type: boolean
    description: Specify whether successfully enriched entities should be automatically
        marked as “Internal Entity”
    is_mandatory: false
-   name: Specific Attribute Names To Enrich With
    default_value: ''
    type: string
    description: Provide a comma separated list of attribute names to enrich the entities
        with. If nothing is provided - action will enrich with all available attributes.
        If an attribute contains a few values - it will be enriched with all of the
        available values. Parameter is case sensitive.
    is_mandatory: false
-   name: Should Case Wall Table be filtered by the specified Attributes?
    default_value: false
    type: boolean
    description: If checked, the Case Wall Table for this action will only present
        the specified attributes, found in the “Specific Attribute Names To Enrich
        With” parameter.
    is_mandatory: false
-   name: Should JSON result be filtered by the specified Attributes?
    default_value: false
    type: boolean
    description: If checked, the JSON result for this action will only return the
        specified attributes, found in the “Specific Attribute Names To Enrich With”
        parameter.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "USERUNIQNAME"]}'
