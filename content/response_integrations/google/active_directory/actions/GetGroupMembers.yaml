name: Get Group Members
description: Get the members list of the provided group name in Active Directory
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/active-directory#get_group_members
integration_identifier: ActiveDirectory
parameters:
-   name: Group Name
    default_value: ''
    type: string
    description: Specify whether the name of the group of which you would like to
        list down the group members.
    is_mandatory: true
-   name: Members Type
    default_value: User
    type: ddl
    optional_values:
    - User
    - 'Host '
    description: Specify the member type of the group.
    is_mandatory: true
-   name: Perform Nested Search
    default_value: false
    type: boolean
    description: Specify whether the action should fetch additional details regarding
        groups found in the main group.
    is_mandatory: true
-   name: Limit
    default_value: '100'
    type: string
    description: Specify the maximum number of listings to fetch from Active Directory
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_group_members_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["USERUNIQNAME"]}'
