name: Get Findings
description: 'Get Amazon Macie findings based on specified Finding ID. Note: Action
    is not working with Siemplify Entities.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/amazon-macie#get_findings
integration_identifier: AmazonMacie
parameters:
-   name: Finding ID
    default_value: ''
    type: string
    description: Finding ID to get details for. Parameter can take multiple values
        as a comma separated string.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_findings_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
