Get Findings:
  ai_description: >-
    General Description: Retrieves detailed information for specific Amazon Macie
    findings using their unique identifiers.


    Flow Description:

    1. Extracts AWS configuration parameters (Access Key, Secret Key, Region) and
    the `Finding ID` input parameter.

    2. Initializes the `AmazonMacieManager` and validates connectivity to the Amazon
    Macie service.

    3. Parses the provided `Finding ID` string into a list.

    4. Calls the `get_findings_by_ids` method of the `AmazonMacieManager` to fetch
    details for the specified findings from AWS.

    5. Constructs a data table with the retrieved finding details and adds it to the
    action results.

    6. Generates a JSON result containing the raw data for each successfully retrieved
    finding.

    7. Returns a summary message indicating which findings were successfully retrieved
    and which failed.


