Create Custom Data Identifier:
  ai_description: >-
    ### General Description

    Creates a new custom data identifier in Amazon Macie. This action allows users
    to define custom patterns for sensitive data detection within their AWS environment.


    ### Flow Description

    1. Extracts AWS configuration parameters (Access Key, Secret Key, Region) and
    action parameters (Name, Description, Regex, Keywords, Ignore Words, Max Match
    Distance).

    2. Initializes the `AmazonMacieManager` with the provided AWS credentials.

    3. Validates connectivity to the Amazon Macie service.

    4. Calls the `create_custom_data_identifier` method of the `AmazonMacieManager`
    to create the identifier in AWS.

    5. Returns the ID of the newly created custom data identifier in the action results.


    ### Additional Notes

    This action does not interact with Siemplify entities.
