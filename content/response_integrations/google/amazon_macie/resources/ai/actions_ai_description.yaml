List Findings:
  ai_description: >-
    ### General Description

    Lists Amazon Macie findings based on user-provided filters such as finding type,
    severity, time frame, and archival status. This action retrieves findings from
    the Amazon Macie service and presents them in a structured data table and JSON
    format for further analysis.


    ### Flow Description

    1. Extracts AWS credentials and action parameters (Finding Type, Severity, Time
    Frame, Include Archived, Record Limit, Sort By, Sort Order).

    2. Connects to the Amazon Macie service using the provided credentials.

    3. Queries Amazon Macie for finding IDs matching the specified criteria (e.g.,
    severity, time filter, archived status) using the `manager.get_findings_ids` method.

    4. Retrieves detailed information for the identified findings using the `manager.get_findings_by_ids`
    method.

    5. Constructs a data table of the findings and adds the raw JSON results to the
    action output using `siemplify.result.add_data_table` and `siemplify.result.add_result_json`.


    ### Additional Notes

    This action operates independently of SOAR entities and relies solely on the provided
    input parameters. It does not modify any external or internal system state.
