Disable Macie:
  ai_description: >-
    Disables the Amazon Macie service in the specified AWS account. This action interacts
    with the AWS Macie API to deactivate the service, effectively stopping data discovery
    and security monitoring for the account.


    ### Flow Description

    1. The action initializes the Amazon Macie integration using the provided AWS
    credentials (Access Key, Secret Key, and Region).

    2. It establishes connectivity to the Amazon Macie service using the `test_connectivity`
    method.

    3. The action executes the `disable_macie` API call via the AWS SDK to disable
    the Macie service.

    4. The outcome of the operation is logged, and the final status is returned to
    the SOAR platform.


    ### Additional Notes

    This action performs a direct mutation on the AWS environment. It does not interact
    with SOAR entities.
