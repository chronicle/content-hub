    1. Extracts the `Custom Data Identifier ID` from the action parameters.

    2. Initializes a connection to the Amazon Macie service using the provided AWS
    credentials.

    3. Executes an API call (`delete_custom_data_identifier`) to Amazon Macie to soft
    delete the specified custom data identifier.

    4. Returns a success message if the deletion is successful, or an error message
    if the operation fails.


