    limit, and sorting preferences.

    2. Connects to the Amazon Macie service using the provided AWS credentials.

    3. Executes an API call (`list_findings`) to retrieve a list of finding IDs that
    match the specified filtering criteria.

    4. Executes a subsequent API call (`get_findings`) to fetch the detailed information
    for the retrieved finding IDs.

