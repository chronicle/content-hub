Create Custom Data Identifier:
  ai_description: >-
    ### General Description

    Creates a new custom data identifier in Amazon Macie based on the provided regular
    expression and keywords. This allows Amazon Macie to detect specific patterns
    of sensitive data.


    ### Flow Description

    1. Extracts the action parameters including name, description, regex, keywords,
    ignore words, and maximum match distance.

    2. Parses the keywords and ignore words from comma-separated strings into lists.

    3. Initializes the Amazon Macie manager and tests connectivity.

    4. Calls the Amazon Macie API (`create_custom_data_identifier`) to create the
    custom data identifier.

    5. Returns the ID of the newly created custom data identifier as a JSON result.


    ### Additional Notes

    This action does not operate on Google SecOps entities.
  ai_short_description: >-
    Creates a new custom data identifier in Amazon Macie using a specified regular
    expression and optional keywords.
