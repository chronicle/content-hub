    ### General Description

    Retrieves detailed information about specific Amazon Macie findings based on their
    Finding IDs. This action fetches the raw data and metadata for the specified findings
    and presents them in a data table and JSON format. Note that this action does
    not operate on Google SecOps entities.


    ### Flow Description

    1. Initializes the connection to the Amazon Macie service using the provided AWS
    credentials and region.

    2. Parses the provided comma-separated list of Finding IDs.

    3. Makes an API call (`get_findings`) to Amazon Macie to fetch the details for
    the specified Finding IDs.

    4. Processes the retrieved findings and constructs a data table with the results.

    5. Outputs the raw JSON data of the findings and returns a summary message indicating
    successful and failed retrievals.


