name: Run a CLI Command
description: 'Run a CLI command on Nozomi Networks device. Note: Nozomi API doesnt
    provide a validation for executed CLI commands, its up to the User to make sure
    that the provided CLI command is correct. Note2: Action is not working with Siemplify
    Entities.'
integration_identifier: NozomiNetworks
parameters:
-   name: CLI Command
    default_value: ''
    type: string
    description: 'Specify a CLI Command to execute on Nozomi Networks device.  Note:
        Nozomi API doesnt provide a validation for executed CLI commands, its up to
        the User to make sure that the provided CLI command is correct.'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
