name: Enrich Entities
description: Enrich Siemplify Host or IP entities based on the information from the
    Nozomi Networks device.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/nozomi-networks#enrich_entities
integration_identifier: NozomiNetworks
parameters:
-   name: Additional fields to add to enrichment
    default_value: ''
    type: string
    description: Comma separated list of fields that should be additionally taken
        from Nodes query to add to fields that are used for enrichment by default.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
