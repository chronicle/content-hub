Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Nozomi Networks instance to ensure the integration is
    correctly configured and the API is reachable. This action validates the provided
    connection parameters, including the API URL and authentication credentials, by
    performing a test request against the Nozomi Networks API.


    ### Flow Description

    1. The action extracts the required configuration parameters: API URL, Username,
    Password, Verify SSL, and CA Certificate File.

    2. It initializes the `NozomiNetworksManager` with the provided credentials and
    SSL configuration.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Nozomi Networks API connectivity endpoint.

    4. The response is validated to ensure the connection is successful.

    5. The action returns a success or failure status based on the API response, which
    is logged and reported back to the SOAR platform.


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration health.
    It does not perform any data retrieval or modification operations on entities
    or alerts.
