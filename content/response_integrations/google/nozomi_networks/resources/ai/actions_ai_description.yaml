    \ to perform ad-hoc searches against the Nozomi Networks platform, providing flexibility\
    \ in data retrieval based on user-defined query strings.\n\n### Flow Description\n\
    1. **Configuration Extraction**: The action retrieves necessary connection details\
    \ (API URL, credentials, and SSL verification settings) from the integration configuration.\n\
    2. **Parameter Processing**: It extracts the `Query` and `Record Limit` parameters\
    \ provided by the user. If a `Record Limit` is provided, it is validated and applied\
    \ to the query string.\n3. **Query Execution**: The action initializes the `NozomiNetworksManager`\
    \ and calls the `run_query` method, which sends a GET request to the Nozomi Networks\
    \ API endpoint.\n4. **Result Handling**: \n   - If the API returns data, the action\
    \ parses the results and adds them to the action result JSON using `siemplify.result.add_result_json`.\n\
    \   - If no data is returned, it reports a successful execution with a message\
    \ indicating no results were found.\n5. **Completion**: The action concludes by\
    \ setting the execution state and output message.\n\n### Additional Notes\nThis\
