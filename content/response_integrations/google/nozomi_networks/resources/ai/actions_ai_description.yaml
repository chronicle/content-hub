List Vulnerabilities:
  ai_description: >-
    ### General Description

    Retrieves a list of vulnerabilities discovered by a Nozomi Networks device based
    on specified search criteria such as IP address, CVE score, vulnerability name,
    and CVE ID.


    ### Flow Description

    1. Validates the provided `CVE Score` parameter to ensure it falls within the
    0-10 range.

    2. Initializes the connection to the Nozomi Networks API.

    3. Executes a GET request to the `/api/open/query/do` endpoint to fetch vulnerabilities
    matching the provided parameters (IP addresses, CVE score, name, CVE IDs, record
    limit, and resolution status).

    4. Parses the returned data and outputs the results as a JSON object and a data
    table.


    ### Additional Notes

    This action does not operate on Siemplify entities; it relies entirely on the
    provided action input parameters.
