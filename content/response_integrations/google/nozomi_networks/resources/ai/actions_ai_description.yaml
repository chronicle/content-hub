Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Nozomi Networks instance using the provided integration
    configuration parameters.


    ### Flow Description

    1. Extracts integration configuration parameters (API URL, Username, Password,
    Verify SSL, CA Certificate File).

    2. Initializes the `NozomiNetworksManager` to handle API communication.

    3. Executes the `test_connectivity` method, which sends a GET request to the Nozomi
    Networks API (`/api/open/query/do?query=node_cpes | head 5`).

    4. Validates the response and returns a success message if the connection is established,
    or an error message if it fails.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
    and can successfully communicate with the Nozomi Networks instance. It does not
    require any action-specific parameters or entities to run.
