List Vulnerabilities:
  ai_description: >-
    ### General Description

    Lists vulnerabilities discovered by a Nozomi Networks device based on user-defined
    filters. This action allows analysts to query the Nozomi platform for specific
    vulnerabilities, filtering by IP address, CVE score, vulnerability name, or specific
    CVE IDs.


    ### Flow Description

    1. The action extracts configuration parameters (API URL, credentials, SSL settings)
    and action parameters (IP Address, CVE Score, Vulnerability Name, CVE ID, Record
    Limit, Include Resolved).

    2. It validates the provided CVE Score to ensure it falls within the 0-10 range.

    3. The `NozomiNetworksManager` is initialized to establish a connection to the
    Nozomi Networks API.

    4. The action executes a query against the Nozomi API using the provided filters
    to retrieve relevant vulnerability data.

    5. If vulnerabilities are found, the action adds the results as a JSON object
    and a formatted data table to the action output.

    6. The action concludes by returning a success status and the retrieved data.


    ### Additional Notes

    This action does not interact with Siemplify entities; it operates exclusively
    based on the provided input parameters.
  ai_short_description: >-
    Lists vulnerabilities from a Nozomi Networks device based on specified filtering
    criteria.
