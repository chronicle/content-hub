Run a CLI Command:
  ai_description: >-
    ### General Description

    Executes a specified CLI command directly on a Nozomi Networks device. This action
    allows users to interact with the Nozomi appliance via its API to perform administrative
    or diagnostic tasks.


    ### Flow Description

    1. Extracts the provided `CLI Command` parameter.

    2. Authenticates with the Nozomi Networks API using the configured credentials.

    3. Sends an HTTP POST request to the `/api/open/cli` endpoint containing the command
    payload.

    4. Returns a success message if the API accepts and executes the command without
    error.


    ### Additional Notes

    The Nozomi API does not provide validation for the executed CLI commands; it is
    up to the user to ensure that the provided CLI command is correct and safe to
    run. This action does not operate on or interact with Siemplify entities.
