Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information retrieved from Nozomi
    Networks Guardian. This action queries the Nozomi Networks device for node details
    associated with the entities and appends the retrieved contextual metadata to
    the entities in Google SecOps.


    ### Flow Description

    1. Initializes the Nozomi Networks manager with the provided API credentials.

    2. Iterates through the target entities, filtering for Hostname and IP Address
    types.

    3. For each suitable entity, makes an API call (`manager.get_entity`) to Nozomi
    Networks to retrieve node information.

    4. If multiple matches are found, selects the most recent match based on the last
    activity time.

    5. Extracts the node details (e.g., OS, MAC address, vendor, firmware version)
    and any specified additional fields to create enrichment data.

    6. Updates the entity's additional properties with the enrichment data and marks
    it as enriched.

    7. Attaches the raw JSON result to the action and updates the entities in Google
    SecOps.


    ### Additional Notes

    The action supports adding custom fields to the enrichment data via the 'Additional
    fields to add to enrichment' parameter. If an entity cannot be found in Nozomi
    Networks, it will be skipped and reported in the action's output messages.
  ai_short_description: >-
    Enriches Hostname and IP Address entities using node information retrieved from
    Nozomi Networks Guardian.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the target entities' additional properties with the enrichment data
      retrieved from Nozomi Networks.
    reasoning: >-
      The action fetches data from Nozomi Networks via a GET request (`manager.get_entity`).
      It does not mutate external data. It mutates internal data by updating entities
      with the fetched enrichment data using `siemplify.update_entities`. It does
      not create insights, modify alert data, or create case comments.
  entity_usage:
