Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities with contextual data retrieved from
    the Nozomi Networks device. This action queries the Nozomi Networks API to gather
    detailed node information, such as OS, roles, vendor, and firmware version, and
    updates the corresponding entities within the SOAR platform with this enriched
    data.


    ### Flow Description

    1. **Initialization**: The action initializes the `NozomiNetworksManager` using
    the provided API URL, credentials, and SSL configuration.

    2. **Entity Filtering**: It filters the `target_entities` to process only those
    of type `HOSTNAME` or `ADDRESS`.

    3. **Data Retrieval**: For each valid entity, the action calls the `get_entity`
    method on the Nozomi Networks API to retrieve node information.

    4. **Enrichment**: If node information is found, the action maps the retrieved
    data to enrichment fields (including any optional additional fields specified
    by the user) and updates the entity's `additional_properties`.

    5. **Internal Update**: The action marks the entities as enriched (`is_enriched
    = True`) and updates them in the SOAR platform using `siemplify.update_entities`.

    6. **Result Reporting**: The action adds the retrieved node data to the action
    results as a JSON object and provides a summary message.


    ### Additional Notes

    - The action supports an optional parameter, 'Additional fields to add to enrichment',
    which allows users to specify a comma-separated list of extra fields to retrieve
    from the Nozomi Networks node query.
  ai_short_description: >-
    Enriches Hostname and IP Address entities with contextual node information retrieved
    from Nozomi Networks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and enrichment status within the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (Nozomi Networks) to enrich entities.
      It does not mutate external data (only GET requests). It mutates internal data
      by updating entity properties and enrichment status within the SOAR platform
      using `siemplify.update_entities`.
