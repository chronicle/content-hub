Run a CLI Command:
  ai_description: >-
    ### General Description

    Executes a CLI command on a Nozomi Networks device. This action allows users to
    run arbitrary commands on the target device via the Nozomi Networks API. Note
    that the API does not validate the command, so the user must ensure the command
    is correct and safe to execute.


    ### Flow Description

    1. Extracts configuration parameters (API URL, credentials, SSL settings) and
    the `CLI Command` parameter.

    2. Initializes the `NozomiNetworksManager` with the provided credentials and connection
    settings.

    3. Sends a POST request to the Nozomi Networks API endpoint (`/api/open/cli`)
    with the specified CLI command in the payload.

    4. Validates the API response to ensure the command was executed successfully.


    ### Additional Notes

    The action does not validate the CLI command; the user must ensure the command
    is correct. This action does not interact with Siemplify entities.
