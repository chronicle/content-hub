[project]
name = "ThreatConnectV3"
version = "1.0"
description = "An integration utilizing the ThreatConnect v3 REST API to manage and enrich threat intelligence indicators."
requires-python = ">=3.11,<3.12"
dependencies = [
    "requests>=2.32.4",
    "tipcommon",
    "pyzipper>=0.3.6",
]

[dependency-groups]
dev = [
    "environmentcommon",
    "pytest>=8.3.5",
    "soar-sdk",
    "integration-testing",
    "pytest-json-report>=1.5.0",
]

[tool.pytest.ini_options]
pythonpath = "."

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk" }
tipcommon = { path = "../../../../packages/tipcommon/whls/TIPCommon-2.3.8-py3-none-any.whl" }
environmentcommon = { path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.2-py2.py3-none-any.whl" }
integration-testing = { path = "../../../../packages/integration_testing_whls/integration_testing-2.3.8-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[[tool.mypy.overrides]]
module = [
    "integration_testing.*",
    "TIPCommon.*",
    "SiemplifyAction.*",
    "SiemplifyLogger.*",
    "soar_sdk.*",
]
ignore_missing_imports = true
