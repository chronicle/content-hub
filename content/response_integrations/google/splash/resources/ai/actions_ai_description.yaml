Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches URL and IP Address entities using information from Splash. This action
    retrieves detailed web page data, including history, HAR (HTTP Archive) information,
    and PNG screenshots, to provide additional context for the indicators.


    ### Flow Description

    1. Filters the target entities to include only URL and IP Address types.

    2. Iterates over the filtered entities, formatting the identifier by adding an
    "https://" schema if a schema is not already present.

    3. Makes a GET request to the Splash API (`/render.json`) for each entity to fetch
    rendering data, history, HAR, and a screenshot.

    4. Updates the entity's additional properties with the retrieved enrichment data
    and marks the entity as enriched.

    5. Attaches the retrieved PNG screenshot to the entity and adds a data table with
    the results.

    6. Updates the entities within the Google SecOps platform.

    7. If configured, creates a case insight containing the retrieved information
    and screenshots for all successfully processed entities.


    ### Additional Notes

    - URLs need to have a schema. For IP addresses, the action will automatically
    add the "https://" schema.

    - The "Include PNG Screenshot" parameter requires the "Create Insight" parameter
    to be enabled to display the screenshot in the insight.
  ai_short_description: >-
    Enriches URL and IP Address entities by retrieving rendering details, history,
    HAR data, and screenshots from Splash.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by making a GET request to the Splash API (`/render.json`).
      It does not mutate any external data. It updates internal entities by calling
      `siemplify.update_entities` and creates insights by calling `siemplify.create_case_insight`.
      It does not modify alert data or create case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The code iterates over `siemplify.target_entities` and filters them using `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where `SUPPORTED_ENTITY_TYPES` is `[EntityTypes.URL,
      EntityTypes.ADDRESS]`. Therefore, it targets URL and ADDRESS entities, filtering
      strictly by the `entity_type` attribute.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
