Enrich Entities:
  ai_description: "### General Description\nEnriches URL and IP Address entities using\
    \ the Splash integration. This action retrieves web page metadata, including titles,\
    \ final URLs, and optional history, HAR logs, and screenshots, to provide context\
    \ for investigations.\n\n### Flow Description\n1. Extracts configuration parameters\
    \ (API Root, SSL verification) and action parameters (Insight creation, screenshot,\
    \ history, HAR inclusion).\n2. Filters target entities to include only URLs and\
    \ IP addresses.\n3. Iterates through each entity, formatting the identifier (adding\
    \ HTTPS schema if missing).\n4. Makes a GET request to the Splash API (`/_render.json`)\
    \ to retrieve entity data.\n5. Updates the entity's `additional_properties` with\
    \ the retrieved enrichment data.\n6. Adds the enrichment data as a table to the\
    \ action results and attaches the PNG screenshot if requested.\n7. Updates the\
    \ entities in the SOAR platform.\n8. Optionally creates a case insight containing\
    \ the retrieved information if configured.\n\n### Additional Notes\nURLs must\
    \ have a schema; for IP addresses, the action automatically adds the \u201CHTTPS\u201D\
    \ schema. The action requires the Splash integration to be configured with a valid\
    \ API Root."
  ai_short_description: >-
    Enriches URL and IP Address entities by retrieving web page metadata, history,
    HAR logs, and screenshots from the Splash integration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties and creates case insights within the SOAR
      platform.
    reasoning: >-
      The action fetches data from an external Splash API (fetches_data=true). It
      updates internal entities and creates insights (can_mutate_internal_data=true).
      It does not mutate external data.
