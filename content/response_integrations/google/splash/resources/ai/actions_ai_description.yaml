Enrich Entities:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual information, history, HAR data, and screenshots
      for URL and IP Address entities from Splash, which aligns with the 'Enrich IOC'
      expected outcome.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Enriches URL and IP Address entities using the Splash integration. This action
    retrieves detailed information about the provided entities, including history,
    HAR data, and PNG screenshots, by querying the Splash API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Create Insight | Boolean | No | If enabled, the action will create an insight
    containing all of the retrieved information about the entity. Default is true.
    |

    | Include PNG Screenshot | Boolean | No | If enabled, the action will return a
    PNG screenshot in an insight. Note: 'Create Insight' must be enabled for this
    parameter to work. Default is true. |

    | Include History | Boolean | No | If enabled, the action will return history
    information. Default is false. |

    | Include HAR | Boolean | No | If enabled, the action will return HAR information.
    Default is false. |


    ### Action Flow

    1. Extracts configuration and action parameters.

    2. Filters the target entities to include only supported types (URL and IP Address).

    3. Iterates through the suitable entities, formatting the identifier to ensure
    it has an HTTP/HTTPS schema.

    4. Queries the Splash API to retrieve entity data, optionally including history
    and HAR data.

    5. Updates the entity's additional properties with the retrieved enrichment data
    and marks it as enriched.

    6. Attaches a PNG screenshot to the entity and adds a data table with the results.

    7. If configured, creates a case insight summarizing the retrieved information.

    8. Returns a JSON result with the detailed entity data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, adds entity tables and attachments, and creates case
      insights with the retrieved data.
    reasoning: >-
      The action fetches data from the Splash API using a GET request. It does not
      mutate any external data. Internally, it updates entity properties, adds entity
      attachments and tables, and creates case insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Splash) to enrich entities.
      It does not mutate external data and only performs allowed internal mutations
      (updating entities and creating insights). Therefore, it is an enrichment action.
    remediation: false
  entity_usage:
    entity_types:
    - ADDRESS
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them using
      `entity.entity_type in SUPPORTED_ENTITY_TYPES`, where supported types are URL
      and ADDRESS.
Ping:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    block_ip: false
    block_malicious_domain: false
    block_malicious_url: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action is a simple connectivity test (Ping). It does not enrich IOCs or
      assets, update alerts, create tickets, modify blocklists/allowlists, manage
      identities, contain hosts, search events, or perform any other specific product
      outcome defined in the categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Tests connectivity to the Splash server using the provided integration configuration
    parameters.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the integration-level
    configuration parameters such as 'API Root' and 'Verify SSL'.


    ### Action Flow

    1. Extracts the integration configuration parameters ('API Root' and 'Verify SSL').

    2. Initializes the SplashManager with the provided credentials.

    3. Sends a ping request to the Splash server to test connectivity.

    4. Returns a success message if the connection is established, otherwise returns
    an error message and fails the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action is a Ping action designed to test connectivity to the Splash server.
      It makes a GET request to the ping endpoint but does not fetch contextual data
      for alerts or entities. It does not mutate any external data, nor does it update
      internal SecOps data such as entities, insights, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping', which explicitly excludes it from being categorized
      as an Enrichment action according to the rules. It also does not perform any
      remediation tasks such as blocking IPs, disabling identities, or containing
      hosts.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not interact with or process any entities. It simply tests connectivity
      to the external service.
