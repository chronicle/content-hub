Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Splash server to ensure the integration is correctly
    configured and reachable. This action verifies that the provided API Root and
    SSL verification settings allow for successful communication with the Splash service.


    ### Flow Description

    1. The action extracts the `API Root` and `Verify SSL` configuration parameters
    from the integration settings.

    2. It initializes the `SplashManager` using these parameters.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the `/_ping` endpoint of the Splash server.

    4. The response is validated; if the connection is successful, the action returns
    a success message. If the connection fails, it logs the error and returns a failure
    status.


    ### Additional Notes

    This action does not interact with any entities or modify any data. It is intended
    solely for verifying the health and connectivity of the integration.
  ai_short_description: >-
    Tests connectivity to the Splash server to verify integration configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a simple connectivity check (GET request) to verify the
      integration setup. It does not fetch contextual data, mutate external or internal
      data, or perform any entity/alert modifications.
