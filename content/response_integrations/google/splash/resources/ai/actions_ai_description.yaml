  parameters_description: "| Parameter | Type | Mandatory | Description |\n| --- |\
    \ --- | --- | --- |\n| Create Insight | Boolean | No | If enabled, action will\
    \ create an insight containing all of the retrieved information about the entity.\
    \ |\n| Include PNG Screenshot | Boolean | No | If enabled, action will return\
    \ a PNG screenshot in an insight. Note: \u201CCreate Insight\u201D should be enabled\
    \ for this parameter to work. |\n| Include History | Boolean | No | If enabled,\
    \ action will return history information. |\n| Include HAR | Boolean | No | If\
    \ enabled, action will return HAR information. |"
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Splash server using the provided integration configuration
    parameters. This action is primarily used to verify that the integration is configured
    correctly and can successfully communicate with the Splash API.


    ### Flow Description

    1. Extracts the `API Root` and `Verify SSL` configuration parameters from the
    integration settings.

    2. Initializes the Splash API manager with the provided credentials.

    3. Makes an HTTP GET request to the `/_ping` endpoint of the Splash API.

    4. Validates the HTTP response to ensure successful connectivity.

    5. Returns a success message if the connection is established, or a failure message
    if an error occurs.


    ### Additional Notes

    This action does not require any entities or action-specific parameters to run.
    It relies entirely on the integration-level configuration.
  ai_short_description: >-
    Tests connectivity to the Splash server to ensure the integration is configured
    correctly and can communicate with the API.
