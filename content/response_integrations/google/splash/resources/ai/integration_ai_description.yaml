product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The Splash integration provides a rendering service used to analyze web-based
    indicators (URLs and IP addresses). The 'Enrich Entities' action allows analysts
    to visualize the content of a URL, capture screenshots, and inspect redirection
    history, which is a critical step in determining the reputation and intent of
    an external indicator. This aligns directly with the Threat Intelligence category,
    which focuses on enriching external indicators to confirm if an alert is a True
    Positive. The integration does not perform SIEM log analysis, EDR host containment,
    network blocking, email management, or other functions defined in the remaining
    categories.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
