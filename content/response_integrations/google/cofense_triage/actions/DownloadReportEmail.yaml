name: Download Report Email
description: Download raw email related to the report from Cofense Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Report ID
    default_value: ''
    type: string
    description: Specify the ID of the report, which contains the raw email that needs
        to be downloaded.
    is_mandatory: true
-   name: Download Folder
    default_value: ''
    type: string
    description: 'Specify the absolute path to the download folder. Note: Name will
        be constructed in the following way {report id}.eml.'
    is_mandatory: true
-   name: Overwrite
    default_value: true
    type: boolean
    description: If enabled, action will overwrite the file with the same name and
        filepath.
    is_mandatory: false
-   name: Create Insight
    default_value: false
    type: boolean
    description: If enabled, action will create an insight that contains raw email
        of the report.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/download_report_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
