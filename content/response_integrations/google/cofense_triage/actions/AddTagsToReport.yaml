name: Add Tags To Report
description: Add tags to a report in Cofense Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Report ID
    default_value: ''
    type: string
    description: Specify the id of the report to which you want to add tags.
    is_mandatory: true
-   name: Tags
    default_value: ''
    type: string
    description: Specify a comma-separated list of tags that need to be applied to
        the report.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_tags_to_report_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
