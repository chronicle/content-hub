name: EnrichURL
description: Return information about the URL from Cofense Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Risk Score Threshold
    default_value: 50
    type: string
    description: Specify, what should be the risk score threshold for Siemplify to
        label that URL as suspicious. Maximum is 100.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/enrich_url_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
