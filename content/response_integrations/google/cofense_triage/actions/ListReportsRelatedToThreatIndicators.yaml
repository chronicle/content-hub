name: List Reports Related To Threat Indicators
description: List reports related to threat indicators in Cofense Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Create Case Wall Table
    default_value: false
    type: boolean
    description: If enabled, action will create a case wall table with information
        about reports,
    is_mandatory: false
-   name: Max Reports To Return
    default_value: '100'
    type: string
    description: Specify how many reports to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_reports_related_to_threat_indicators_JsonResult_example.json
    result_name: JsonResult
    show_result: true
