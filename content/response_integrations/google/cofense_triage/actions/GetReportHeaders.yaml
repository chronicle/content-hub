name: Get Report Headers
description: Return information about the header related to the report from Cofense
    Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Report ID
    default_value: ''
    type: string
    description: Specify the id of the report for which you want to retrieve headers.
    is_mandatory: true
-   name: Max Headers To Return
    default_value: 50
    type: string
    description: Specify how many headers to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_report_headers_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
