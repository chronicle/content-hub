name: Categorize Report
description: Categorize a report in Cofense Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Report ID
    default_value: ''
    type: string
    description: Specify the id of the report to which you want to add tags.
    is_mandatory: true
-   name: Category Name
    default_value: ''
    type: string
    description: Specify the name of the category that should be applied to the report.
        Available categories can be found in the “List Categories” action.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/categorize_report_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
