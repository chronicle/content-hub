EnrichURL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Cofense Triage. It retrieves threat intelligence data,
    such as risk scores and creation/update timestamps, for the specified URLs.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and the action parameter (Risk Score Threshold).

    2. Filters target entities to process only those of type `URL`.

    3. For each URL entity, calls the Cofense Triage API (`enrich_url`) to retrieve
    URL details.

    4. If the URL's risk score exceeds the configured threshold, marks the entity
    as suspicious.

    5. Updates the entity's additional properties with the retrieved enrichment data.

    6. Adds an entity table with the URL details to the action results.

    7. Updates the entities in the SOAR platform.

    8. Adds the full JSON result to the action output.


    ### Additional Notes

    The action requires valid Cofense Triage credentials. If no URL details are found,
    the entity is marked as failed.
