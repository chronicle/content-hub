    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates a case insight within the SecOps platform if the 'Create
      Insight' parameter is enabled.
    reasoning: >-
      The action fetches data (email content) from an external API (Cofense Triage).
      It does not mutate external data. It mutates internal data by creating a case
      insight (if enabled).
