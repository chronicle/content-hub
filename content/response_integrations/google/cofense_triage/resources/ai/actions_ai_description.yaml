Get Threat Indicator Details:
  ai_description: >-
    ### General Description

    Enriches entities with threat indicator details retrieved from Cofense Triage.
    This action queries the Cofense Triage API to obtain threat intelligence for various
    entity types, including hashes, domains, and email-related identifiers. It updates
    the entities within Google SecOps with enrichment data and marks them as suspicious
    if the threat level meets defined criteria.


    ### Flow Description

    1. **Initialization**: The action initializes the `CofenseTriageManager` using
    the provided API Root, Client ID, Client Secret, and SSL verification settings.

    2. **Entity Processing**: The action iterates through all provided `target_entities`.

    3. **Identifier Formatting**: For specific entity types, the identifier is formatted
    to match Cofense Triage requirements (e.g., `USER` entities with valid emails
    are formatted as `From:...,To:...`, and `EMAILMESSAGE` entities are prefixed with
    `Subject:`).

    4. **API Interaction**: The action makes a GET request to the Cofense Triage API
    (`/api/public/v2/threat_indicators?filter[threat_value]={entity_identifier}`)
    to fetch threat indicator details.

    5. **Data Enrichment**: If threat indicator data is found:
        - The entity's `is_suspicious` status is updated if the threat level is 'Malicious'
    or 'Suspicious'.
        - The entity's `is_enriched` status is set to true.
        - The entity's `additional_properties` are updated with the retrieved enrichment
    data.
        - The data is added to a summary table.
    6. **Finalization**: The action updates the entities in Google SecOps, adds the
    result JSON, and attaches the threat indicator table to the action results.


    ### Additional Notes

    - Only MD5 and SHA256 hashes are explicitly supported for threat indicator lookups.

    - The action processes all provided entities without filtering by type, though
    it applies specific formatting logic for certain types.
