Download Report Preview:
  ai_description: >-
    ### General Description

    Downloads an image preview of an email related to a specific report from Cofense
    Triage. The action retrieves the image in either PNG or JPG format, saves it to
    a specified local directory, and can optionally attach the image as an insight
    to the case.


    ### Flow Description

    1. Extracts the provided parameters, including the Report ID, Download Folder,
    Image Format, and Overwrite preference.

    2. Validates the local file path and checks if a file with the same name already
    exists (handling the overwrite logic accordingly).

    3. Makes an HTTP GET request to the Cofense Triage API to download the report
    preview image.

    4. Saves the downloaded image attachment to the specified local folder.

    5. If the `Create Insight` parameter is enabled, reads the saved image, encodes
    it in base64, and creates a case insight in Google SecOps displaying the image.

    6. Returns the absolute file path of the downloaded image in the JSON results.


    ### Additional Notes

    Ensure that the provided `Download Folder` is a valid, accessible absolute path
    on the environment where the action is executed. The resulting file name will
    be constructed using the Report ID and the selected Image Format (e.g., `{report_id}.png`).
