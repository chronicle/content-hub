Categorize Report:
  ai_description: >-
    ### General Description

    Categorizes a report in Cofense Triage by applying a specified category name.
    This action allows analysts to organize and classify phishing reports within the
    Cofense Triage platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and action parameters (Report ID, Category Name).

    2. Initializes the `CofenseTriageManager` to interact with the Cofense Triage
    API.

    3. Calls the `get_category_id` method (GET request) to retrieve the ID corresponding
    to the provided `Category Name`.

    4. If the category is found, calls the `categorize_report` method (POST request)
    to apply the category to the specified report.

    5. Retrieves the updated report details using `get_report` (GET request) and adds
    the result to the action output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires a valid Report ID and Category Name. It performs a state
    change in the external Cofense Triage system by updating the report's category.
