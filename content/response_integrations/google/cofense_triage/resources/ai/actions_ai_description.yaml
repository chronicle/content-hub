Execute Playbook:
  ai_description: >-
    ### General Description

    Initiates a playbook execution in Cofense Triage for a specific report. This action
    allows users to trigger automated workflows or playbooks defined within the Cofense
    Triage platform on a target report.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and action parameters (Report ID, Playbook Name).

    2. Initializes the `CofenseTriageManager` to handle API communication.

    3. Retrieves the playbook ID by searching for the provided `Playbook Name` using
    `manager.get_playbook_by_name`.

    4. Validates the existence of the report using `manager.get_report`.

    5. Executes the playbook on the specified report by making a POST request to the
    Cofense Triage API (`/api/public/v2/playbook_executions`).


    ### Additional Notes

    This action performs a state-changing operation in the external Cofense Triage
    system by triggering a playbook execution.
