    ### General Description

    Lists reports related to threat indicators from Cofense Triage. This action queries
    the Cofense Triage API to identify reports associated with the provided target
    entities, providing visibility into related threat intelligence and email reports.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Client ID, Client Secret,
    Verify SSL) and action parameters (Create Case Wall Table, Max Reports To Return).

    2. It retrieves the identifiers from the `target_entities` provided in the SOAR
    case.

    3. The action calls the Cofense Triage API to fetch threat indicator IDs associated
    with these entity identifiers.

    4. For each identified threat indicator, the action queries the API to retrieve
    related reports.

    5. The retrieved reports are returned as a JSON result.

    6. If the 'Create Case Wall Table' parameter is enabled, the action constructs
    a CSV table of the related reports and adds it to the case wall.


