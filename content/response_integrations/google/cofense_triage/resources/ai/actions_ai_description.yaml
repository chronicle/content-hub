Add Tags To Report:
  ai_description: >-
    ### General Description

    Adds tags to a specific report in Cofense Triage. This action allows analysts
    to append new tags to an existing report, facilitating better organization and
    categorization of phishing reports within the Cofense Triage platform.


    ### Flow Description

    1. Extract configuration parameters (API Root, Client ID, Client Secret, Verify
    SSL) and action parameters (Report ID, Tags).

    2. Initialize the `CofenseTriageManager` with the provided credentials.

    3. Retrieve the current tags for the specified report using the `get_report_tags`
    method.

    4. Combine the existing tags with the new tags provided in the input, ensuring
    uniqueness by using a set.

    5. Update the report with the merged list of tags using the `update_report` method
    (PUT request).

    6. Fetch the updated report details using the `get_report` method (GET request).

    7. Add the updated report JSON to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action performs a PUT request to the Cofense Triage API to update report
    metadata. It requires valid API credentials for the Cofense Triage integration.
  ai_short_description: Adds tags to a report in Cofense Triage.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the tags associated with a report in Cofense Triage.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches report data (GET) and updates report tags (PUT) in the external
      Cofense Triage system. It does not mutate internal SecOps data, update entities,
      or create insights.
