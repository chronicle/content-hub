Download Report Preview:
  ai_description: >-
    Downloads an image preview of an email report from Cofense Triage. This action
    retrieves a visual representation of the report (in PNG or JPG format) and saves
    it to a specified local directory. Optionally, it can generate a case insight
    containing the base64-encoded image for immediate analyst review within the platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Client ID, Client Secret,
    Verify SSL) and action parameters (Report ID, Download Folder, Image Format, Overwrite,
    Create Insight).

    2. It validates the target file path and checks if the file already exists; if
    it exists and 'Overwrite' is disabled, the action fails.

    3. The action initializes the `CofenseTriageManager` and calls the `download_report_preview`
    API endpoint to retrieve the image data.

    4. The retrieved image content is saved to the specified local path using `save_image_attachment`.

    5. If 'Create Insight' is enabled, the action encodes the image to base64 and
    creates a case insight with the image embedded.

    6. Finally, the action returns the absolute file path in the result JSON.


    ### Additional Notes

    - The action requires valid Cofense Triage API credentials.

    - The 'Download Folder' must be an absolute path.

    - The 'Overwrite' parameter prevents accidental file replacement if set to false.
