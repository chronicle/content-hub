Add Tags To Report:
  ai_description: >-
    ### General Description

    Adds specified tags to a report in Cofense Triage.


    ### Flow Description

    1. Retrieves the current tags associated with the specified Report ID from Cofense
    Triage via a GET request.

    2. Combines the existing tags with the new tags provided in the input, ensuring
    no duplicates.

    3. Sends a PUT request to Cofense Triage to update the report with the combined
    list of tags.

    4. Retrieves the updated report details via a GET request and returns them as
    a JSON result.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds specified tags to a report in Cofense Triage.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
