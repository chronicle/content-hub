    ### General Description

    Tests connectivity to the Cofense Triage instance using the provided connection
    parameters.


    ### Flow Description

    1. Extracts the integration configuration parameters (API Root, Client ID, Client
    Secret, Verify SSL).

    2. Initializes the Cofense Triage API manager.

    3. Makes a GET request to the `/api/public/v2/system/status` endpoint to verify
    connectivity.

    4. Returns a success message if the connection is established, or an error message
    if it fails.


