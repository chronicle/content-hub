      Updates a report in Cofense Triage by appending new tags to it.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the current tags and the updated report from Cofense Triage
      (fetches_data=true). It mutates external data by sending a PUT request to update
      the report's tags in Cofense Triage (can_mutate_external_data=true). It does
      not mutate internal SecOps data, update entities, create insights, or add case
      comments.
