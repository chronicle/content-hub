EnrichURL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Cofense Triage. This action retrieves threat intelligence
    and risk score information for the specified URLs. It evaluates the risk score
    against a user-defined threshold, updates the entity's suspicious status if the
    threshold is exceeded, and enriches the entity's additional properties with the
    retrieved data.


    ### Flow Description

    1. Extracts the `Risk Score Threshold` parameter.

    2. Filters the target entities to include only those of type `URL`.

    3. Iterates over the filtered URL entities.

    4. Makes a GET request to the Cofense Triage API (`/api/public/v2/urls?filter[url]={url}`)
    to fetch details for each URL.

    5. Checks if the retrieved risk score is greater than the specified threshold.
    If so, marks the entity as suspicious (`is_suspicious = True`).

    6. Updates the entity's additional properties with the enrichment data and marks
    it as enriched (`is_enriched = True`).

    7. Adds a CSV table containing the URL details to the action results.

    8. Updates the modified entities within the Google SecOps platform.

    9. Returns a JSON result containing the enriched data for all processed URLs.


    ### Additional Notes

    If the provided threshold is outside the allowed range (0-100), the action will
    default to a threshold of 50.
  ai_short_description: >-
    Enriches URL entities by retrieving risk scores and threat details from Cofense
    Triage, and updates the entity's suspicious status based on a defined threshold.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
