Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cofense Triage instance to ensure the integration is
    correctly configured and capable of communicating with the external service. This
    action validates the provided API credentials and connectivity settings.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Client
    ID`, `Client Secret`, and `Verify SSL`.

    2. It initializes the `CofenseTriageManager` using these parameters.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Cofense Triage system status endpoint (`/api/public/v2/system/status`).

    4. The response is validated to ensure a successful connection.

    5. The action returns a success message if the connection is established, or a
    failure message if an error occurs.


