List Playbooks:
  ai_description: >-
    ### General Description

    Lists available playbooks from Cofense Triage. This action retrieves a list of
    playbooks based on optional filtering criteria (Name or Description) and returns
    them in a structured data table and JSON format for further analysis or automation.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Client ID, Client
    Secret, Verify SSL) and action parameters (Filter Key, Filter Logic, Filter Value,
    Max Records To Return).

    2. Validates the `Max Records To Return` parameter to ensure it is a positive
    integer and within the allowed limit (maximum 200).

    3. Initializes the `CofenseTriageManager` using the provided credentials.

    4. Executes the `get_playbooks` method, which performs a GET request to the Cofense
    Triage API endpoint (`api/public/v2/playbooks`) with query parameters for filtering
    and pagination.

    5. If playbooks are found, the action constructs a CSV data table and a JSON result
    object, which are then added to the action output.

    6. If no playbooks match the criteria, the action reports that no playbooks were
    found.


    ### Additional Notes

    The filtering logic supports "Equal" (case-sensitive) and "Contains" (case-insensitive)
    strategies. If the "Filter Value" is empty, the filter is not applied. The action
    defaults to returning 50 records if no limit is specified.
