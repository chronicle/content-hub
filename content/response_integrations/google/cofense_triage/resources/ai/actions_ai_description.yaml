Download Report Email:
  ai_description: >-
    ### General Description

    Downloads a raw email report from the Cofense Triage platform. This action retrieves
    the email content associated with a specific report ID and saves it to a designated
    local file path. It provides options to overwrite existing files and optionally
    generate a case insight containing the email content for further analysis within
    the SecOps platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Client
    ID, Client Secret, Verify SSL) and action parameters (Report ID, Download Folder,
    Overwrite, Create Insight).

    2. It validates the existence of the target file path. If the file exists and
    the 'Overwrite' parameter is set to false, the action terminates with an error.

    3. The action initializes the `CofenseTriageManager` to establish a connection
    with the Cofense Triage API.

    4. It performs an API call to download the raw email content for the specified
    `Report ID`.

    5. The retrieved email content is saved to the specified `Download Folder` using
    the `save_attachment` utility.

    6. If the 'Create Insight' parameter is enabled, the action creates a case insight
    containing the transformed HTML content of the email.

    7. Finally, the action returns the absolute file path of the downloaded email
    in the result JSON.


    ### Additional Notes

    This action requires valid API credentials for Cofense Triage. The 'Download Folder'
    must be an absolute path accessible by the SOAR environment. The action does not
    operate on specific entities but rather on a report ID provided as a parameter.
  ai_short_description: >-
    Downloads a raw email report from Cofense Triage and saves it to a local file
    path, with an optional feature to create a case insight.
  capabilities:
    can_create_case_comments: false
