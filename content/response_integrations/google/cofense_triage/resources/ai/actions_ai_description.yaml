    2. Checks if a file with the same name already exists in the target folder and
    evaluates the `Overwrite` parameter.

    3. Makes an API call (GET) to Cofense Triage to download the raw email content
    for the specified report.

    4. Saves the downloaded content as an `.eml` file in the specified local folder.

    5. Optionally creates a case insight containing the raw email content if the `Create
    Insight` parameter is enabled.


