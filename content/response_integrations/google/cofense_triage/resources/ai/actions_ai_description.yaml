"List Reports Related To Threat Indicators":
  ai_description: >-
    ### General Description

    Lists reports related to threat indicators in Cofense Triage.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Iterates over all target entities and extracts their identifiers.

    3. Calls the Cofense Triage API (`GET /api/public/v2/threat_indicators`) to find
    threat indicators matching the entity identifiers.

    4. For each threat indicator found, calls the Cofense Triage API (`GET /api/public/v2/threat_indicators/{threat_id}/reports`)
    to retrieve related reports.

    5. Returns the related reports as JSON data attached to the action result.

    6. Optionally creates a case wall table with the related reports information.


    ### Additional Notes

    The action uses the entity identifiers as threat values to search for threat indicators
    and their related reports. It does not filter by entity type, so it will attempt
    to find reports for all provided entities.
