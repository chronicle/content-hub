Entity Email Search:
  ai_description: >-
    ### General Description

    Searches for emails related to specific entities in Trend Micro Cloud App Security.
    The action supports searching by URL, Hash, Email (User entity matching an email
    pattern), Email Subject, File Name, and IP address.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters entities based on their type (URL, User, FileHash, EmailMessage, FileName,
    Address) and specific conditions (e.g., User identifier must match an email regex,
    FileHash must be SHA-1 or SHA-256).

    3. For each valid entity, makes a GET request to the Trend Micro Cloud App Security
    API (`/v1/sweeping/mails`) to search for associated emails within the specified
    timeframe.

    4. Collects unique email results up to the configured maximum limit.

    5. Returns the aggregated email details as a JSON result.


    ### Additional Notes

    Only SHA-1 and SHA-256 hashes are supported for FileHash entities. The maximum
    allowed value for 'Max Days Backwards' is 90.
