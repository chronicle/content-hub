Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    Adds entities to a blocklist in Trend Micro Cloud App Security. Supported entities
    include URL, Hash, and Email (User entity that matches an email address pattern).


    ### Flow Description

    1. Initializes the Trend Micro Cloud App Security API client.

    2. Retrieves the current list of blocked entities from Trend Micro Cloud App Security
    via a GET request.

    3. Iterates through the target entities in the case.

    4. Validates the entity format (e.g., checks for valid URLs, valid email patterns
    for User entities, and SHA-1 length for FileHash entities).

    5. Checks if the entity's identifier is already present in the retrieved blocklist.

    6. If not already blocked, makes a POST request to the Trend Micro Cloud App Security
    API to add the entity to the blocklist.

    7. Returns a summary of successfully blocked entities, failed entities, and entities
    that were already blocked.


    ### Additional Notes

    Only SHA-1 hashes are supported for FileHash entities.
  ai_short_description: >-
    Adds URL, Hash, and Email entities to a blocklist in Trend Micro Cloud App Security.
