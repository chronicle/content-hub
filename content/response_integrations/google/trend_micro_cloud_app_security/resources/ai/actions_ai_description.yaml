Mitigate Accounts:
  ai_description: >-
    ### General Description

    Performs mitigation actions on user accounts via Trend Micro Cloud App Security.
    Supported actions include Disable Account, Enable MFA, Reset Password, and Revoke
    Sign In Sessions. Note that only Exchange accounts are supported.


    ### Flow Description

    1. Validates the provided email addresses using a regular expression.

    2. Initiates the mitigation process for valid email addresses by making a POST
    request to the Trend Micro Cloud App Security API (`/v1/mitigation/accounts`).

    3. Stores the `batch_id` and the lists of successful and failed emails for asynchronous
    tracking.

    4. In subsequent asynchronous runs, queries the mitigation status using the `batch_id`
    via a GET request (`/v1/mitigation/accounts?batch_id={}`).

    5. Evaluates the status of each account's mitigation (Success, Executing, Skipped,
    or Failed).

    6. Completes the action once all mitigations have finished, returning the final
    status and output message.


    ### Additional Notes

    Only Exchange accounts are supported by this action.
