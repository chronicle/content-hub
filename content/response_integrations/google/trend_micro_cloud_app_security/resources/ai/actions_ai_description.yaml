    Performs mitigation actions on user accounts via Trend Micro Cloud App Security.
    Supported actions include disabling accounts, enabling MFA, resetting passwords,
    and revoking sign-in sessions. Note that only Exchange accounts are supported.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Mitigation Action | Dropdown | Yes | Specify what mitigation action should be
    applied. Options are: Disable Account, Enable MFA, Reset Password, Revoke Sign
    In Sessions. |

    | Email Addresses | String | Yes | Specify a comma-separated list of email addresses
    that need to be mitigated. |


    ### Flow

    1. Validates the provided email addresses using a regular expression.

    2. Initiates the specified mitigation process for the valid email addresses on
    Trend Micro Cloud App Security.

    3. Periodically checks the status of the mitigation process (asynchronous execution).

    4. Completes the action when all mitigations have finished, reporting success,
    failure, or skipped status for each account.
