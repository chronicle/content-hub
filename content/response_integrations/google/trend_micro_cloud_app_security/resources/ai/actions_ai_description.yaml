Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches URL, FileHash, and User (email) entities by verifying their presence
    in the Trend Micro Cloud App Security blocklist. This action helps analysts identify
    if specific indicators are already flagged as malicious or blocked within the
    Trend Micro environment.


    ### Flow Description

    1. The action initializes the Trend Micro Cloud App Security manager using the
    provided API credentials.

    2. It performs a GET request to retrieve the current list of blocked entities
    (URLs, file hashes, and sender emails) from the Trend Micro Cloud App Security
    service.

    3. The action iterates through the provided target entities:
       - For **URL** entities, it parses the hostname and compares it against the
    retrieved blocked URLs.
       - For **User** entities, it validates the identifier against an email regex
    and compares it against the blocked senders list.
       - For **FileHash** entities, it validates the identifier as a SHA-1 hash and
    compares it against the blocked hashes list.
    4. If an entity is found in the blocklist, it is marked as suspicious (`is_suspicious
    = True`) and its `additional_properties` are updated with enrichment data.

    5. Finally, the action updates the entities in the SOAR platform and returns a
    JSON result containing the list of blocked entities found.


    ### Additional Notes

    - The action only supports SHA-1 hashes for file entities.

    - For URL entities, the action extracts and compares the hostname.

    - If no entities are found in the blocklist, the action completes without updating
    entity status.
