Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    Adds specified entities (URLs, User/Email addresses, and File Hashes) to the blocklist
    within Trend Micro Cloud App Security. This action helps prevent future interactions
    with malicious indicators by synchronizing them with the Trend Micro security
    controls.


    ### Flow Description

    1. The action initializes the `TrendMicroCloudAppSecurityManager` using the provided
    API credentials (`API Root`, `API Key`) and SSL verification settings.

    2. It performs a `GET` request to retrieve the current list of blocked entities
    from Trend Micro Cloud App Security.

    3. The action iterates through the `target_entities` provided in the SOAR case.

    4. For each entity, it validates the type and format:
       - **URL**: Validates the URL format and checks if it is already in the blocklist.
       - **User**: Validates the email format and checks if it is already in the blocklist.
       - **FileHash**: Validates that the hash is a SHA-1 hash and checks if it is
    already in the blocklist.
    5. If an entity is not already blocked, the action performs a `POST` request to
    add the entity to the Trend Micro Cloud App Security blocklist.

    6. The action logs the status of each entity and returns a summary message indicating
    which entities were successfully added or were already present.


    ### Additional Notes

    - Only SHA-1 hashes are supported for FileHash entities.

    - The action verifies the format of URLs and Email addresses before attempting
    to block them.

    - If no valid target entities are found or processed, the action will report that
    no entities were added.
  ai_short_description: >-
    Adds URL, User (Email), and FileHash entities to the Trend Micro Cloud App Security
    blocklist.
  capabilities:
    can_create_case_comments: false
