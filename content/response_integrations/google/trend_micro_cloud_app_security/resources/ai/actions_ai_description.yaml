Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches URL, File Hash, and User (Email) entities by checking their presence
    in the Trend Micro Cloud App Security blocklist. The action retrieves the current
    blocklist and updates the entities with their block status, marking them as suspicious
    if they are found in the blocklist.


    ### Flow Description

    1. Initializes the connection to Trend Micro Cloud App Security using the provided
    API credentials.

    2. Retrieves the current list of blocked entities (URLs, file hashes, and senders)
    from the external system via an API call.

    3. Iterates through the target entities provided in the case.

    4. For URL entities, extracts the hostname and checks if it matches any blocked
    URLs.

    5. For User entities (matching an email pattern), checks if the email address
    is in the blocked senders list.

    6. For File Hash entities (specifically SHA-1), checks if the hash is in the blocked
    file hashes list.

    7. If an entity is found in the blocklist, it is marked as suspicious and enriched
    with a `TMCAS_blocked: True` property.

    8. If an entity is not found in the blocklist, it is enriched with a `TMCAS_blocked:
    False` property.

    9. Updates the entities within Google SecOps and attaches a JSON result containing
    the blocked entities.


    ### Additional Notes

    - The action only supports SHA-1 hashes for File Hash entities.

    - For URL entities, the action extracts and uses the domain/hostname part of the
    URL for enrichment.

    - User entities must match a valid email address pattern to be processed.
  ai_short_description: >-
    Enriches URL, File Hash, and User (Email) entities by checking if they are present
    in the Trend Micro Cloud App Security blocklist.
