  ai_description: >-
    Adds URL, User (email), and FileHash (SHA-1) entities to a blocklist in Trend
    Micro Cloud App Security.


    ### Flow Description

    1. Retrieves the current blocklist from Trend Micro Cloud App Security.

    2. Iterates over the target entities and filters them by type (URL, USER, FILEHASH).

    3. Validates the format of the entities (valid URL, valid email pattern, valid
    SHA-1 hash length).

    4. Checks if the entities are already present in the blocklist.

    5. Adds the valid, non-blocked entities to the blocklist in Trend Micro Cloud
    App Security.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    - Only SHA-1 hashes are supported for FILEHASH entities.

    - USER entities must match an email address pattern to be processed.
