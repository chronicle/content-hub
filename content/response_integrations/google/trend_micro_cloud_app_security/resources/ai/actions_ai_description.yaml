  ai_description: >-
    ### General Description

    The **Mitigate Emails** action deletes or quarantines emails using Trend Micro
    Cloud App Security based on a provided list of message IDs. It initiates the mitigation
    process on the external service but does not verify the final execution status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Mitigation Action | Dropdown | Yes | Specify what mitigation action should be
    applied. Options are `Delete` or `Quarantine`. |

    | Service | Dropdown | Yes | Specify the service that is used for emails. Options
    are `Gmail` or `Exchange`. |

    | Message IDs | String | Yes | Specify a comma-separated list of message IDs that
    need to be mitigated. |


    ### Additional Notes

    * If the `Service` is set to `Gmail`, the `Mitigation Action` can only be `Delete`.
    Attempting to quarantine a Gmail email will result in an error.

    * This action only initiates the mitigation request and does not check the final
    status of the mitigation execution.


    ### Flow Description

    1. Extracts the provided configuration and action parameters.

    2. Validates the parameters to ensure `Quarantine` is not selected when the service
    is `Gmail`.

    3. Iterates through the provided list of Message IDs.

    4. For each Message ID, fetches the necessary email details (such as mailbox,
    unique ID, and delivery time) from Trend Micro Cloud App Security.

    5. Sends a request to mitigate (delete or quarantine) the email based on the retrieved
    details.

    6. Outputs a summary of successfully mitigated emails and any that failed to process.
