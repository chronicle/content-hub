  ai_description: >-
    ### General Description

    Enriches URL, FileHash, and User (email) entities by checking if they are present
    in the Trend Micro Cloud App Security blocklist. If an entity is found in the
    blocklist, it is marked as suspicious and enriched with a specific property indicating
    its blocked status.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. Retrieves the current list of blocked entities (URLs, senders, and file hashes)
    from Trend Micro Cloud App Security.

    2. Iterates over the target entities (URL, USER, FILEHASH).

    3. For each entity, checks if its identifier (or domain part for URLs) is present
    in the retrieved blocklist.

    4. If the entity is found in the blocklist, marks it as suspicious and adds `TMCAS_blocked:
    True` to its additional properties.

    5. If the entity is not found, adds `TMCAS_blocked: False` to its additional properties.

    6. Updates the entities in Google SecOps and returns a JSON result containing
    the blocked entities.
