Mitigate Emails:
  ai_description: >-
    ### General Description

    Mitigates emails by deleting or quarantining them using the Trend Micro Cloud
    App Security platform. This action allows analysts to remove malicious or unwanted
    emails from user mailboxes (Gmail or Exchange) to prevent further exposure.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Key) and action
    parameters (Message IDs, Mitigation Action, Service).

    2. It validates the requested mitigation action against the service type; specifically,
    it prevents the use of 'Quarantine' for Gmail, as only 'Delete' is supported.

    3. The action initializes the `TrendMicroCloudAppSecurityManager` to establish
    a connection with the Trend Micro API.

    4. It iterates through the provided list of Message IDs.

    5. For each ID, it calls the `get_email_details` API method to retrieve the necessary
    metadata (mailbox, unique ID, delivery time).

    6. It then calls the `mitigate_email` API method to execute the requested action
    (Delete or Quarantine) on the external service.

    7. Finally, it aggregates the results and returns a summary of successful and
    failed mitigations.


    ### Additional Notes

    Currently, this action initiates the mitigation process but does not verify the
    final execution status of the mitigation request. The action is not designed to
    run on entities; it operates on specific Message IDs provided as input parameters.
