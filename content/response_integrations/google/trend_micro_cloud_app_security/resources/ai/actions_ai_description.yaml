  ai_description: >-
    ### General Description

    The `Entity Email Search` action searches for emails in Trend Micro Cloud App
    Security that are associated with specific entities. It supports searching by
    URL, File Hash (SHA-1 and SHA-256), Email Address (User entity matching an email
    pattern), Email Subject, File Name, and IP Address. The action retrieves the matching
    emails and returns them as a JSON result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Max Days Backwards | Integer | No | Specify how many days backwards to look
    for emails. The maximum allowed value is 90. Default is 30. |

    | Max Emails To Return | Integer | No | Specify the maximum number of emails to
    return per entity. Default is 100. |


    ### Flow Description

    1.  **Initialization:** Extracts configuration and action parameters, validating
    the `Max Days Backwards` and `Max Emails To Return` values.

    2.  **Entity Iteration:** Iterates over the target entities provided in the case.

    3.  **Entity Filtering:** Checks if the entity type is supported (URL, USER, FILEHASH,
    EMAILMESSAGE, FILENAME, ADDRESS) and applies additional validation (e.g., email
    regex for USER entities, hash length for FILEHASH entities).

    4.  **Email Search:** For each valid entity, calls the Trend Micro Cloud App Security
    API to search for related emails within the specified timeframe.

    5.  **Result Aggregation:** Collects unique emails from the search results up
    to the specified limit.

    6.  **Output Generation:** Returns the collected email details as a JSON result
    attached to the action.
