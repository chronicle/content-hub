Mitigate Accounts:
  ai_description: >-
    General Description

    Performs mitigation actions on user accounts via the Trend Micro Cloud App Security
    platform. This action allows security analysts to take corrective measures on
    compromised or suspicious accounts, such as disabling the account, enabling MFA,
    resetting the password, or revoking active sign-in sessions. Note that this action
    is specifically designed for Exchange accounts.


    Flow Description

    1. The action extracts the required configuration parameters (API Root, API Key,
    Verify SSL) and action parameters (Mitigation Action, Email Addresses).

    2. It validates the provided email addresses against a standard email regex pattern.

    3. If the action is running for the first time, it calls the Trend Micro Cloud
    App Security API (POST /v1/mitigation/accounts) to initiate the requested mitigation
    process for the valid email addresses.

    4. The action returns a batch ID and enters an asynchronous state to wait for
    the mitigation to complete.

    5. In subsequent runs, the action uses the batch ID to poll the Trend Micro Cloud
    App Security API (GET /v1/mitigation/accounts?batch_id={batch_id}) to fetch the
    status of the mitigation process.

    6. Once all mitigation tasks are completed, the action returns the final status,
    including successful and failed accounts.


    Additional Notes

    This action supports asynchronous execution. Only Exchange accounts are supported
    by this integration.
