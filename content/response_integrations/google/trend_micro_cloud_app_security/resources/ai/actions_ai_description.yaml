Entity Email Search:
  ai_description: >-
    ### General Description

    Searches for emails within the Trend Micro Cloud App Security platform based on
    provided entities. This action allows analysts to identify emails associated with
    specific indicators such as URLs, User accounts, File Hashes (SHA-1/SHA-256),
    Email Subjects, File Names, and IP Addresses. It retrieves relevant email metadata
    to assist in investigations.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Root, API Key, and
    SSL verification settings from the integration configuration.

    2. **Parameter Validation**: It extracts and validates the `Max Emails To Return`
    and `Max Days Backwards` parameters. It enforces a maximum limit of 90 days for
    the search.

    3. **Entity Processing**: The action iterates through the provided `target_entities`:
        * For **URL** entities, it calls the Trend Micro API to search by URL.
        * For **User** entities (matching email patterns), it searches by mailbox.
        * For **FileHash** entities, it validates the hash length (SHA-1 or SHA-256)
    and searches by the respective hash type.
        * For **EmailMessage** entities, it searches by subject.
        * For **FileName** entities, it searches by file name.
        * For **Address** (IP) entities, it searches by source IP.
    4. **Result Aggregation**: The action collects unique email results found across
    all processed entities and returns them as a JSON result.


    ### Additional Notes

    - The action supports searching for emails up to 90 days in the past.

    - Only SHA-1 and SHA-256 hashes are supported for file hash searches.

    - If no emails are found for the provided entities, the action completes with
    a message indicating no results were found.
  ai_short_description: >-
    Searches for emails in Trend Micro Cloud App Security based on various entity
    types including URLs, Users, File Hashes, Email Subjects, File Names, and IP Addresses.
