Mitigate Emails:
  ai_description: >-
    ### General Description

    Deletes or quarantines specific emails using Trend Micro Cloud App Security based
    on provided message IDs. This action allows analysts to respond to malicious or
    unwanted emails by removing them from user mailboxes or moving them to quarantine.


    ### Flow Description

    1. Extracts the provided message IDs, mitigation action (Delete or Quarantine),
    and service type (Gmail or Exchange).

    2. Validates the input to ensure that the Quarantine action is not being attempted
    on a Gmail service, as it is unsupported.

    3. Iterates through each provided message ID and fetches the email's details (such
    as mailbox, unique ID, and delivery time) via a GET request to the Trend Micro
    Cloud App Security API.

    4. If the email details are successfully retrieved, initiates the specified mitigation
    action via a POST request to the API.

    5. Compiles a list of successfully processed and failed message IDs and returns
    a summary to the user.


    ### Additional Notes

    Currently, this action only initiates a mitigation request but does not verify
    the final execution status of the mitigation. For Gmail, only the 'Delete' action
    is supported.
