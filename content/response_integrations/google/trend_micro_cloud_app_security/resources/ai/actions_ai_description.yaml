Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Trend Micro Cloud App Security instance to ensure the
    integration is correctly configured and the API is reachable.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, and `Verify SSL`.

