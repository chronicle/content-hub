name: Entity Email Search
description: 'Search emails based on entities in Trend Micro Cloud App Security. Supported
    entities: URL, Hash, Email (User entity that matches email address pattern), Email
    Subject, File Name, IP. Note: only SHA-1 and SHA256 hashes are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-cloud-app-security#entity_email_search
integration_identifier: TrendMicroCloudAppSecurity
parameters:
-   name: Max Days Backwards
    default_value: '30'
    type: string
    description: 'Specify how many days backwards to look for emails. Maximum is 90.
        Default: 30.'
    is_mandatory: false
-   name: Max Emails To Return
    default_value: '100'
    type: string
    description: 'Specify how many emails to return. Default: 100.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/entity_email_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL","FILEHASH","FILENAME","USERUNIQNAME","ADDRESS","EMAILSUBJECT"]}'
