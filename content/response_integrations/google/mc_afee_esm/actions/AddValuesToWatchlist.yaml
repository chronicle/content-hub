name: Add Values To Watchlist
description: 'Add values to a watchlist in McAfee ESM. Note: McAfee ESM will allow
    values of the invalid type to be passed, for example, API will not raise error
    adding hash to the IP watchlist. Please pay attention to the input.'
integration_identifier: McAfeeESM
parameters:
-   name: Watchlist Name
    default_value: ''
    type: string
    description: Specify the name of the watchlist that needs to be updated.
    is_mandatory: true
-   name: Values to Add
    default_value: ''
    type: string
    description: Specify a comma-separated list of values that need to be added to
        a watchlist.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: is_succeed
