name: Send Advanced Query To ESM
description: 'Send an advanced query to ESM. Note: Action is running as async, please
    adjust script timeout value in Chronicle SOAR IDE for action as needed. Please
    refer to the documentation portal for more information.'
integration_identifier: McAfeeESM
parameters:
-   name: Query Payload
    default_value: ''
    type: string
    description: 'Specify the JSON object that would need to be executed. Note: action
        will at max return only 200 results.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_advanced_query_to_esm_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: is_succeed
