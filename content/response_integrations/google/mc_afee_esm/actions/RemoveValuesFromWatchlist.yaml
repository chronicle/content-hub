name: Remove Values From Watchlist
description: Remove values from a watchlist in McAfee ESM.
integration_identifier: McAfeeESM
parameters:
-   name: Watchlist Name
    default_value: ''
    type: string
    description: Specify the name of the watchlist that needs to be updated.
