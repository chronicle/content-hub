Send Query To ESM:
  ai_description: >-
    ### General Description

    Sends a query to McAfee ESM to retrieve events, flows, or assets based on specified
    filters and time ranges. This action runs asynchronously and returns the query
    results as a data table and JSON.


    ### Flow Description

    1. Extracts the provided time range, filters, fields to fetch, and sorting parameters.

    2. Constructs a query payload for McAfee ESM.

    3. Initiates the query execution on the McAfee ESM platform via an API call.

    4. Asynchronously polls the query status until completion or timeout.

    5. Retrieves the query results once the execution is complete.

    6. Outputs the retrieved data as a CSV-formatted data table and JSON result.


    ### Additional Notes

    - This action runs asynchronously. Ensure the script timeout value in the Chronicle
    SOAR IDE is adjusted as needed.

    - If "Custom" is selected for the Time Range, the "Start Time" parameter becomes
    mandatory.
  ai_short_description: >-
    Sends a query to McAfee ESM to retrieve events, flows, or assets based on specified
    filters and time ranges, returning the results as a data table and JSON.
