Add Values To Watchlist:
  ai_description: >-
    ### General Description

    Adds a list of values to a specified watchlist in McAfee ESM. This action allows
    users to dynamically update existing watchlists by providing a comma-separated
    list of values.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, etc.) and
    action parameters (Watchlist Name, Values to Add).

    2. Initializes the `McAfeeESMManager` to establish a session with the McAfee ESM
    API.

    3. Retrieves the watchlist ID by calling the `get_watchlist` method with the provided
    `Watchlist Name`.

    4. Adds the provided values to the identified watchlist using the `add_values_to_watchlist`
    method.

    5. Returns a success message if the operation completes, or an error message if
    it fails.


    ### Additional Notes

    The action expects a comma-separated list of values. McAfee ESM may allow invalid
    types to be added to watchlists, so ensure the input values match the watchlist
    type.
  ai_short_description: >-
    Adds a list of values to a specified watchlist in McAfee ESM.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds values to a watchlist in McAfee ESM.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to add values to a watchlist in McAfee ESM.
      This is an external mutation. It does not fetch data (other than the watchlist
      ID, which is internal to the ESM system). It does not update internal entities
      or create insights.
