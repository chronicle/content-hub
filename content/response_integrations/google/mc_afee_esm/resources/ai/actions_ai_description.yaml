Get Similar Events:
  ai_description: >-
    ### General Description

    Retrieves events related to specific entities (Hostname, IP Address, User) from
    McAfee ESM. This action initiates an asynchronous search query on the external
    system to find historical events associated with the target entities and returns
    the results as entity tables and JSON data.


    ### Flow Description

    1. Filters the target entities to include only supported types: IP Address, Hostname,
    and User.

    2. For each suitable entity, builds a specific event search query based on the
    entity type and the provided parameters (`Hours Back`, `IPS ID`, `Result Limit`).

    3. Initiates the event query asynchronously via the McAfee ESM API.

    4. Periodically checks the status of the query execution.

    5. Once the query is complete, fetches the event results and attaches them to
    the action's JSON results and entity-specific tables.


    ### Additional Notes

    This action runs asynchronously. It is recommended to adjust the script timeout
    value in the Chronicle SOAR IDE as needed to accommodate long-running queries.
