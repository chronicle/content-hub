Send Advanced Query To ESM:
  ai_description: >-
    ### General Description

    Sends an advanced query to the McAfee ESM (Enterprise Security Manager) platform.
    This action allows users to execute complex queries against the ESM system to
    retrieve security data, such as events or alerts, based on a provided JSON payload.


    ### Flow Description

    1. Extracts configuration parameters (API Root, credentials, etc.) and the `Query
    Payload` from the action input.

    2. Initializes the `McAfeeESMManager` to handle communication with the ESM API.

    3. If it is the first run, it parses the `Query Payload` and initiates the query
    creation via `create_advanced_query`.

    4. If the query is not immediately complete, the action returns an `IN_PROGRESS`
    state, storing the `query_id` in `additional_data` for subsequent runs.

    5. On subsequent runs, it checks the query status using `get_query_status`.

    6. Once the query status is "complete", it retrieves the results using `execute_advanced_query`.

    7. Finally, it formats the results into a data table and JSON output, and completes
    the action.


    ### Additional Notes

    This action is asynchronous. Ensure the action timeout in the Chronicle SOAR IDE
    is configured appropriately to allow for query execution time. The query payload
    must be a valid JSON object. The action will return a maximum of 200 results.
  ai_short_description: >-
    Sends an advanced query to the McAfee ESM platform to retrieve security data.
