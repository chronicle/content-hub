    (Hostname, IP Address, User).


    Flow Description:

    1. Extracts configuration and action parameters.

    2. Filters target entities by supported types (Hostname, IP Address, User).

    3. For each entity, builds a query based on the entity type and provided parameters
    (Hours Back, IPS ID).

    4. Initiates an asynchronous query in McAfee ESM and retrieves the result URL.

    5. Checks the status of the query; if complete, fetches the event results.

    6. Adds the retrieved event data as JSON results and entity tables to the SecOps
    platform.


    Additional Notes: This action is asynchronous and may require adjusting the script
    timeout in the Chronicle SOAR IDE.
