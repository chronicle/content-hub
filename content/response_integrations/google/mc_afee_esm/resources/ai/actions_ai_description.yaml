Send Query To ESM:
  ai_description: >-
    ### General Description

    This action executes a query against the McAfee ESM platform to retrieve specific
    event, flow, or asset data based on user-defined filters and time ranges. It allows
    analysts to search for historical data within the ESM environment by specifying
    filtering criteria, time frames, and sorting preferences.


    ### Flow Description

    1. Extracts configuration and action parameters, including time range, filter
    criteria, and sorting options.

    2. Constructs a query object using the provided filters, time range, and sorting
    criteria.

    3. Executes the query on the McAfee ESM platform via an API call (`/rs/esm/v2/qryExecuteDetail`).

    4. Polls the query status (`/rs/esm/v2/qryGetStatus`) until completion or timeout.

    5. Retrieves the query results (`/rs/esm/v2/qryGetResults`) upon successful completion.

    6. Adds the retrieved data to the action results as a data table and JSON object.


    ### Additional Notes

    This action is asynchronous and may require adjusting the script timeout in the
    Chronicle SOAR IDE to accommodate longer-running queries.
  ai_short_description: >-
    Executes a query against the McAfee ESM platform to retrieve event, flow, or asset
    data based on specified filters and time ranges.
