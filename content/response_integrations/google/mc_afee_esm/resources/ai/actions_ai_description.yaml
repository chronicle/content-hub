Add Values To Watchlist:
  ai_description: >-
    ### General Description

    Adds specified values to a watchlist in McAfee ESM.


    ### Flow Description

    1. Extracts the watchlist name and the comma-separated list of values to add.

    2. Initializes the McAfee ESM manager.

    3. Retrieves the watchlist details by name via the McAfee ESM API to obtain its
    ID.

    4. Makes a POST request to the McAfee ESM API to add the specified values to the
    watchlist.

    5. Returns a success message upon completion.


    ### Additional Notes

    McAfee ESM allows values of invalid types to be passed (e.g., the API will not
    raise an error when adding a hash to an IP watchlist). Please pay attention to
    the input.
  ai_short_description: >-
    Adds specified values to a watchlist in McAfee ESM.
