identifier: McAfeeESM
name: McAfeeESM
parameters:
-   name: API Root
    default_value: https://{ip}/rs/
    type: string
    description: API root for the instance.
    is_mandatory: true
    integration_identifier: McAfeeESM
-   name: Username
    default_value: ''
    type: string
    description: Username for the instance.
    is_mandatory: true
    integration_identifier: McAfeeESM
-   name: Password
    default_value: ''
    type: password
    description: Password for the instance.
    is_mandatory: true
    integration_identifier: McAfeeESM
-   name: Product Version
    default_value: ''
    type: string
    description: 'Product version. Possible values: 11.1-11.5'
    is_mandatory: true
    integration_identifier: McAfeeESM
-   name: Use AES Encryption
    default_value: false
    type: boolean
    description: 'If enabled, integration will authenticate using AES Encryption and
        will not do Base64 inside the code. Note: you need to provide Login and Password
        already as Base64 encoded strings.'
    is_mandatory: false
    integration_identifier: McAfeeESM
-   name: Verify SSL
    default_value: ''
    type: boolean
    description: If enabled, verifies that the SSL certificate for the connection
        to the McAfee ESM server is valid.
    is_mandatory: false
    integration_identifier: McAfeeESM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mcafee-esm
categories:
- SIEM
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
