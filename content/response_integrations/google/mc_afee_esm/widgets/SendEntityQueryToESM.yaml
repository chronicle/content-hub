title: McAfeeESM - Send Entity Query To ESM
type: html
scope: alert
action_identifier: Send Entity Query To ESM
description: This widget highlights the most important items in Send Entity Query
    To ESM
data_definition:
    html_height: 400
    safe_rendering: false
    widget_definition_scope: both
    type: html
condition_group:
    conditions:
    -   field_name: '[{stepInstanceName}.JsonResult | EntityResult]'
        value: '{'
        match_type: contains
        custom_operator_name: null
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: Entity
        match_type: contains
        custom_operator_name: null
    -   field_name: '[{stepInstanceName}.JsonResult]'
        value: EntityResult
        match_type: contains
        custom_operator_name: null
    logical_operator: and
default_size: half_width
