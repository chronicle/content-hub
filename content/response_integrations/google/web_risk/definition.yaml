identifier: WebRisk
name: Web Risk
parameters:
-   name: API Root
    default_value: https://webrisk.googleapis.com/v1
    type: string
    description: API Root of the Web Risk integration.
    is_mandatory: true
    integration_identifier: WebRisk
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: The client email address of your workload identity. You can configure
        either this parameter or the Service Account Json File Content parameter.
        To impersonate service accounts with the workload identity email address,
        grant the Service Account Token Creator role to your service account.
    is_mandatory: false
    integration_identifier: WebRisk
-   name: Service Account Json File Content
    default_value: ''
    type: password
    description: The content of the service account key JSON file. You can configure
        either this parameter or the Workload Identity Email parameter. To configure
        this parameter, provide the full content of the service account key JSON file
        that you downloaded when creating a service account.
    is_mandatory: false
    integration_identifier: WebRisk
-   name: Quota Project ID
    default_value: ''
    type: string
    description: 'The Google Cloud project ID which you use for Google Cloud APIs
        and billing. This parameter requires you to grant the Service Usage Consumer
        role to your service account.

        The integration attaches this parameter value to all API requests. If you
        don''t set a value for this parameter, the integration retrieves the quota
        project ID from your Google Cloud service account.'
    is_mandatory: false
    integration_identifier: WebRisk
-   name: Project ID
    default_value: ''
    type: string
    description: The project ID to use in the integration. If you don't set a value
        for this parameter, the integration retrieves the project ID from your Google
        Cloud service account.
    is_mandatory: false
    integration_identifier: WebRisk
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        connecting to Vertex AI is valid. Selected by default.
    is_mandatory: false
    integration_identifier: WebRisk
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/web-risk
categories:
- IT & Infrastructure
- Google
- Cloud
- Cloud Security
- Threat Intelligence
svg_logo_path: resources/logo.svg
image_path: resources/image.png
