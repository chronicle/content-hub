  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Abuse Type | Dropdown | No | The abuse type that is associated with the submission.
    For more information about abuse types, see AbuseType. |

    | Confidence Level | Dropdown | No | The confidence level for the submission.
    For more information about confidence levels, see Confidence and ConfidenceLevel.
    |

    | Justification | Dropdown | No | The justification for the submission. For more
    information about justification options, see JustificationLabel. |

    | Comment | String | No | A comment to explain the submission justification. |

    | Region Code | String | No | A comma-separated list of the Common Locale Data
    Repository (CLDR) codes for countries or regions that associate with the submission.
    |

    | Platform | Dropdown | No | A platform type on which the submission was detected.
    |

    | Skip Waiting | Boolean | No | If enabled, action will just initialize the submission
    and not wait for it to be finished. |
  ai_short_description: >-
    Submits URL entities to Google Cloud Web Risk for analysis and reporting.
