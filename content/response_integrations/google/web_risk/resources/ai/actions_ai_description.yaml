Enrich Entities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action leverages the Google Web Risk API to identify URL
    entities that are known to be malicious or associated with social engineering
    and unwanted software. It provides security analysts with immediate context regarding
    the safety of URL entities within a case by retrieving threat types and marking
    the entities accordingly.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Web Risk API service, configured
    at the integration level. |


    ### Flow Description

    1. **Entity Identification**: The action identifies all URL entities (DestinationURL)
    present in the current alert context.

    2. **API Query**: For each URL, the action sends a GET request to the Web Risk
    `uris:search` endpoint to check against known threat lists (e.g., Malware, Social
    Engineering, Unwanted Software).

    3. **Data Extraction**: If the URL is found in a threat list, the action extracts
    the specific threat types (e.g., MALWARE) and the expiration time of the threat
    data.

    4. **Internal Enrichment**: The action updates the entity's additional properties
    with the key `WebRisk_threatTypes` containing a comma-separated list of found
    threats. It also marks the entity as 'Enriched' within Google SecOps.

    5. **Result Reporting**: The action generates a JSON result for each processed
    entity containing the full API response and updates the action output message
    with the list of successfully enriched entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with threat types and marks the entity
      as enriched.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Google Cloud Web Risk API. It ensures that the integration
    configuration, including authentication credentials (Service Account) and network
    settings (API Root, SSL verification), is correctly established.


    ### Parameters

    This action does not require any input parameters.


    ### Flow Description

    1. **Authentication**: The action initializes the connection using the provided
    Service Account JSON or Workload Identity credentials.

    2. **Connectivity Test**: It performs a sample URI search request using a standard
    test URI (`http://testsafebrowsing.appspot.com/s/malware.html`) against the Web
    Risk `uris:search` endpoint.

    3. **Validation**: The action validates the API response. If the request is successful,
    it confirms connectivity; otherwise, it raises an error with details from the
    API response.


    ### Additional Notes

    * This action does not process any entities from the case.

    * It is strictly used for configuration validation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
