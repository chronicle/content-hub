Submit Entities:
  ai_description: >-
    Submits URL entities to Google Cloud Web Risk for analysis. This action allows
    security analysts to report suspicious or malicious URIs to Google's threat intelligence
    service. It is an asynchronous action that can either wait for the submission
    process to complete or return immediately after initialization.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves submission details including
    abuse type, confidence level, justification, and platform information.

    2. **Initial Submission:** For each URL entity, the action sends a POST request
    to the Web Risk API to create a submission operation.

    3. **Asynchronous Monitoring:** If 'Skip Waiting' is disabled, the action enters
    an asynchronous state, periodically polling the Web Risk API via GET requests
    to check the status of the submission operations.

    4. **Finalization:** Once the operations are finished (or if 'Skip Waiting' was
    enabled), the action compiles the results and provides a summary of successful
    and failed submissions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Abuse Type | Dropdown | No | The type of abuse associated with the URL (e.g.,
    Malware, Social Engineering). |

    | Confidence Level | Dropdown | No | The level of confidence in the report (Low,
    Medium, High). |

    | Justification | Dropdown | No | The reason for the submission (e.g., Manual
    Verification, User Report). |

    | Comment | String | No | Additional context or explanation for the submission.
    |

    | Region Code | String | No | Comma-separated CLDR codes for associated countries/regions.
    |

    | Platform | Dropdown | No | The platform where the threat was detected (e.g.,
    Android, Windows). |

    | Skip Waiting | Boolean | No | If true, the action finishes immediately after
    the submission is initialized without waiting for the analysis result. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new URI submission record in the Google Cloud Web Risk service via
      a POST request to the 'projects.uris:submit' endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
