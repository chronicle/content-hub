Submit Entities:
  ai_description: >-
    ### General Description

    Submits URL entities to Google Cloud Web Risk for analysis. This action allows
    security analysts to report suspicious or malicious URIs to Google's threat intelligence
    service. It is an asynchronous action that can either wait for the submission
    process to complete or return immediately after initialization.


    ### Flow Description

    1. Extracts parameters including abuse type, confidence level, justification,
    comment, region code, platform, and skip waiting.

    2. Iterates over the provided URL entities.

    3. For each URL, sends a POST request to the Web Risk API to create a submission
    operation.

    4. If 'Skip Waiting' is disabled, the action enters an asynchronous state, periodically
    polling the Web Risk API via GET requests to check the status of the submission
    operations.

    5. Once the operations are finished (or if 'Skip Waiting' was enabled), the action
    compiles the results and provides a summary of successful and failed submissions.


    ### Additional Notes

    This action is asynchronous. Adjust the script timeout value in the Google SecOps
    IDE for the action as needed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new URI submission record in the Google Cloud Web Risk service via
      a POST request to the 'projects.uris:submit' endpoint.
    fetches_data: true
    internal_data_mutation_explanation:
