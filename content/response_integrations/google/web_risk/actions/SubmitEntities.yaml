name: Submit Entities
description: Use the Submit Entities action to submit entities to Web Risk for analysis.
    This action runs on the Google SecOps URL entity. This action is asynchronous.
    Adjust the script timeout value in the Google SecOps IDE for the action as needed.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/web-risk#submit_entities
integration_identifier: WebRisk
parameters:
-   name: Abuse Type
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Malware
    - Social Engineering
    - Unwanted Software
    description: The abuse type that is associated with the submission. For more information
        about abuse types, see AbuseType (https://cloud.google.com/web-risk/docs/reference/rest/v1/projects.uris/submit#abusetype).
    is_mandatory: false
-   name: Confidence Level
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Low
    - Medium
    - High
    description: The confidence level for the submission. For more information about
        confidence levels, see Confidence (https://cloud.google.com/web-risk/docs/reference/rest/v1/projects.uris/submit#confidence)
        and ConfidenceLevel (https://cloud.google.com/web-risk/docs/reference/rest/v1/projects.uris/submit#confidencelevel).
    is_mandatory: false
-   name: Justification
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Manual Verification
    - User Report
    - Automated Report
    description: The justification for the submission. For more information about
        justification options, see JustificationLabel (https://cloud.google.com/web-risk/docs/reference/rest/v1/projects.uris/submit#justificationlabel).
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: A comment to explain the submission justification.
    is_mandatory: false
-   name: Region Code
    default_value: ''
    type: string
    description: A comma-separated list of the Common Locale Data Repository (CLDR)
        codes for countries or regions that associate with the submission. For more
        information about submissions, see Submission (https://cloud.google.com/web-risk/docs/reference/rest/v1/projects.uris/submit#submission).
    is_mandatory: false
-   name: Platform
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Android
    - iOS
    - MacOS
    - Windows
    description: A platform type on which the submission was detected.
    is_mandatory: false
-   name: Skip Waiting
    default_value: false
    type: boolean
    description: If enabled, action will just initialize the submission and not wait
        for it to be finished.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/submit_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities":["DestinationURL"]}'
