[project]
name = "Slack"
version = "31.0"
description = "Slack is where work flows. It's where the people you need, the information you share, and the tools you use come together to get things done."
requires-python = ">=3.11,<3.12"
dependencies = [ "python-dateutil==2.9.0.post0", "requests==2.32.4", "slackblocks==1.0.10", "slackclient==2.9.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.12-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
