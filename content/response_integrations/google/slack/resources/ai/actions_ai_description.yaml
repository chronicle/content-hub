Wait For Reply:
  ai_description: "### General Description\nThis action is an asynchronous utility\
    \ designed to pause playbook execution and wait for one or more replies to a specific\
    \ Slack message thread. It is typically used in conjunction with 'Send Message'\
    \ or 'Send Advanced Message' actions to capture user responses or automated feedback\
    \ within a thread. The action remains in an 'In Progress' state until a reply\
    \ is detected or the execution timeout is reached.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Message Timestamp | String | Yes | The unique timestamp (`ts`) of the parent\
    \ message to track. This value is typically retrieved from the JSON result of\
    \ a previous 'Send Message' action. |\n| Channel | String | No | The name of the\
    \ Slack channel where the message thread exists. |\n| Channel ID | String | No\
    \ | The unique ID of the Slack channel. If both 'Channel' and 'Channel ID' are\
    \ provided, 'Channel ID' takes precedence. |\n| Wait for Multiple Replies | Boolean\
    \ | No | If set to `true`, the action will continue to collect all replies in\
    \ the thread until the global timeout is reached. If `false` (default), the action\
    \ completes immediately after retrieving the first reply. |\n\n### Additional\
    \ Notes\n- **Async Execution:** This action is asynchronous. Users should adjust\
    \ the action timeout in the Google SecOps IDE to ensure it has enough time to\
    \ wait for the expected response.\n- **Precedence:** If both 'Channel' and 'Channel\
    \ ID' are specified, the action will only use the 'Channel ID'.\n- **Entity Support:**\
    \ This action does not run on Google SecOps entities.\n\n### Flow Description\n\
    1. **Initialization:** The action extracts the Slack API token from the configuration\
    \ and the message timestamp and channel identifiers from the parameters.\n2. **Channel\
    \ Resolution:** If a 'Channel ID' is not provided, the action uses the 'Channel'\
    \ name to look up the corresponding ID via the Slack API.\n3. **Reply Retrieval:**\
    \ The action queries the Slack API (`conversations.replies`) using the Channel\
    \ ID and the parent message timestamp to fetch any messages in the thread.\n4.\
    \ **State Evaluation:** \n    - If no replies are found and the timeout hasn't\
    \ been reached, the action sets its status to `IN_PROGRESS` to be retried.\n \
    \   - If 'Wait for Multiple Replies' is enabled, the action continues to fetch\
    \ replies and stays `IN_PROGRESS` until the timeout.\n    - If a reply is found\
    \ (and 'Wait for Multiple Replies' is disabled), the action captures the reply\
    \ data and moves to a `COMPLETED` state.\n5. **Output:** The retrieved reply data\
    \ is added to the action's result JSON, and a summary message is provided to the\
    \ playbook."
