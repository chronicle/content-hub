Create Channel:
  ai_description: >-
    Creates a new channel in Slack and optionally invites users to it. This action
    does not operate on Google SecOps entities but instead uses provided parameters
    to define the channel's properties and membership.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Channel Name** | String | Yes | The name of the channel to create. Must be
    lowercase, up to 80 characters, and can include numbers, hyphens, and underscores.
    |

    | **User IDs** | String | No | A comma-separated list of Slack User IDs to invite
    to the channel. If both User IDs and User Emails are provided, User IDs take precedence.
    |

    | **Is Private** | Boolean | No | If set to `True`, the action creates a private
    channel. Default is `False` (public). |

    | **User Emails** | String | No | A comma-separated list of user emails to invite.
    These are resolved to User IDs internally if the 'User IDs' parameter is empty.
    |


    ### Additional Notes

    - This action is independent of the entities present in the Google SecOps case.

    - If the 'User IDs' parameter is populated, the 'User Emails' parameter is ignored.


    ### Flow Description

    1. **Initialization**: The action extracts the Slack API token from the integration
    configuration and the channel details from the action parameters.

    2. **Channel Creation**: It calls the Slack API to create a channel with the specified
    name and privacy setting (public or private).

    3. **User Resolution**: If user emails are provided and user IDs are not, the
    action attempts to resolve each email to a Slack User ID.

    4. **Invitation**: If user identifiers (IDs or resolved emails) are available,
    the action invites those users to the newly created channel.

    5. **Result Reporting**: The action returns the raw JSON data of the created channel
    and provides a success message indicating the channel name and the number of users
    added.
