Upload File:
  ai_description: >-
    ### General Description\n\nThe **Upload File** action allows users to upload files
    directly from the Google SecOps server to a Slack workspace. This is useful for
    sharing reports, logs, or evidence with team members during an investigation.
    This action does not interact with Google SecOps entities.\n\n### Parameters\n\n|
    Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n|
    **File Name** | String | Yes | Specify the name (title) that should be used to
    show in Slack for the uploaded file. |\n| **File Path** | String | Yes | Specify
    the full file path on the Google SecOps server for the file to upload. |\n| **Channel**
    | String | Yes | Specify the name of the Slack channel or the email address of
    the user to whom to send the message. |\n\n### Flow Description\n\n1. **Parameter
    Initialization**: The action retrieves the Slack API token from the configuration
    and the file name, path, and destination channel from the action parameters.\n2.
    **File Validation**: The script verifies that the file exists at the provided
    path and that the system has sufficient permissions to read it.\n3. **File Upload**:
    The Slack manager uses the `files_upload` API method to transmit the file to the
    specified Slack channel or user.\n4. **Result Processing**: If successful, the
    action retrieves the private download URL for the file and adds it as a link in
    the action results for easy access within the SOAR platform.\n\n### Additional
    Notes\n\n- This action does not process or filter Google SecOps entities.\n- Ensure
    the Slack bot has the `files:write` permission and is invited to the target channel
    if it is private.
