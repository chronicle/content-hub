Send Interactive Message:
  ai_description: "### General Description\nSends an interactive message (using Slack's\
    \ Block Kit format) to a specified recipient and monitors a webhook for the user's\
    \ response. This action is asynchronous, meaning it will send the message and\
    \ then enter a polling state to check for incoming data at a provided Webhook\
    \ Token UUID. It is particularly useful for workflows requiring human-in-the-loop\
    \ interaction, such as approval processes or data confirmation.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Recipient | String | Yes | Specify the recipient to send the\
    \ message to. This can be a name, email, or ID depending on the 'Recipient Type'.\
    \ |\n| Recipient Type | String (Enum) | Yes | Defines how to interpret the 'Recipient'\
    \ parameter. Options are: `Name`, `Email`, or `Channel or User ID`. Default is\
    \ `Name`. |\n| Message | String | Yes | Specify the message content to send. This\
    \ must be in Slack's 'block' content format (JSON). |\n| Webhook Token UUID |\
    \ String | Yes | Specify the unique Webhook token UUID to monitor for the user\u2019\
    s response. |\n\n### Additional Notes\n- **Asynchronous Execution:** This action\
    \ is designed to run asynchronously. Ensure the action timeout in the IDE is adjusted\
    \ to allow sufficient time for a user to respond.\n- **Configuration Requirement:**\
    \ The `Webhook Base URL` must be correctly configured in the integration parameters\
    \ for the action to function.\n- **Slack App Setup:** The Slack application used\
    \ for this integration must be configured to allow interactive messages.\n- **Entity\
    \ Support:** This action does not operate on Google SecOps entities.\n\n### Flow\
    \ Description\n1. **Initialization:** Extracts integration configuration (API\
    \ Token, Webhook Base URL) and action parameters.\n2. **Message Dispatch (Initial\
    \ Run):** On the first execution, the action resolves the recipient's identity\
    \ (if provided as a Name or Email) and sends the interactive 'block' message to\
    \ Slack via the Slack API.\n3. **Response Monitoring (Polling):** The action enters\
    \ an asynchronous state, checking the Webhook service for any incoming requests\
    \ associated with the specified `Webhook Token UUID`.\n4. **Completion:** If a\
    \ response is detected at the webhook, the action retrieves the response content,\
    \ adds it to the result JSON, and completes successfully.\n5. **Timeout:** If\
    \ no response is found before the global timeout threshold is reached, the action\
    \ terminates."
