List Channels:
  ai_description: >-
    ### General Description

    Retrieves a list of Slack channels based on specified criteria. This action allows
    users to search for public channels, private channels, multi-person direct messages
    (mpim), or direct messages (im). It supports filtering results by specific attributes
    such as Name, ID, Topic, or Purpose using exact or partial matches. The action
    is designed for data retrieval and does not operate on Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Channels to Return | Integer | No | Specifies the maximum number of channels
    to return. Default is 20. |

    | Type Filter | String | No | Specifies the types of conversations to return.
    Possible values: `public_channel`, `private_channel`, `mpim`, `im`. Default is
    `public_channel`. |

    | Filter Key | Enum | No | The channel attribute used for filtering. Options:
    `Select One`, `Name`, `ID`, `Topic`, `Purpose`. |

    | Filter Value | String | No | The value to match against the selected Filter
    Key. If empty, filtering is not applied. |

    | Filter Logic | Enum | No | The logic to apply for filtering: `Not Specified`,
    `Equal` (exact match), or `Contains` (substring match). |


    ### Additional Notes

    - If 'Filter Logic' is set to 'Equal' or 'Contains', a 'Filter Key' other than
    'Select One' must be provided; otherwise, the action will fail.

    - If 'Filter Value' is empty or 'Filter Logic' is 'Not Specified', the filtering
    step is skipped, and the raw list of channels is returned up to the maximum limit.

    - This action does not interact with or process Google SecOps entities.


    ### Flow Description

    1. **Initialization**: Extracts the API token from the configuration and the filtering/limit
    parameters from the action input.

    2. **Validation**: Validates that 'Max Channels to Return' is a positive integer.

    3. **Data Retrieval**: Connects to the Slack API and fetches the list of channels
    based on the 'Type Filter'. It handles pagination automatically to ensure all
    relevant channels are considered.

    4. **Filtering**: Applies client-side filtering logic (Equal or Contains) based
    on the 'Filter Key' and 'Filter Value' provided by the user.

    5. **Output**: Returns the filtered list of channels as a JSON result and populates
    a data table named 'Channels' in the case wall for easy viewing.
