Ask Question:
  ai_description: >-
    ### General Description

    Sends an interactive question to a specified Slack channel. This action allows
    users to post a message containing a question along with 'Yes' and 'No' buttons
    to facilitate quick responses from Slack users. Note that this action is marked
    for deprecation in future versions of the integration in favor of more enhanced
    functionality.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Channel | String | Yes | The target Slack channel where the question will be
    posted. This can be a channel name or a channel ID. |

    | Question | String | Yes | The content of the question to be sent to the Slack
    channel. |


    ### Additional Notes

    - This action is deprecated and should be replaced with newer Slack actions when
    available.

    - The message sent includes predefined interactive attachments (buttons for 'Yes'
    and 'No').


    ### Flow Description

    1. **Initialization**: The action initializes the Slack manager using the provided
    API token from the integration configuration.

    2. **Parameter Extraction**: It retrieves the 'Channel' and 'Question' parameters
    provided by the user.

    3. **API Interaction**: The action calls the Slack API's `chat.postMessage` method,
    passing the channel, question text, and interactive button attachments.

    4. **Result Handling**: If the message is sent successfully, the action completes
    with a success status. If an error occurs (e.g., invalid channel or token), it
    catches the exception and reports a failure.
