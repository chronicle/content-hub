Send Advanced Message:
  ai_description: >-
    Sends an advanced message to a Slack channel or user. This action supports both
    simple text messages and rich Slack 'Block Kit' messages, which can include buttons,
    advanced formatting, and interactive elements. It is designed to facilitate communication
    and can be paired with response-tracking actions for interactive workflows.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves the Slack API token from the
    configuration and the message details (content, type, recipient, and recipient
    type) from the action parameters.

    2. **Recipient Resolution:** Depending on the 'Recipient Type' provided, the action
    resolves the target to a Slack ID:
        * If 'Name' is selected, it fetches the user list to find the matching username.
        * If 'Email' is selected, it performs a lookup by email address.
        * If 'Channel or User ID' is selected, it uses the provided value directly.
    3. **Message Dispatch:** The action calls the Slack API (`chat_postMessage`) to
    send the message content as either plain text or structured blocks.

    4. **Result Processing:** The action captures the API response, including message
    timestamps and channel info, and returns it as a JSON result.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Recipient | String | Yes | The identifier for the target recipient (e.g., a
    username, email, or Slack ID). |

    | Recipient Type | Dropdown | Yes | Specifies how to interpret the 'Recipient'
    parameter. Options: 'Name', 'Email', or 'Channel or User ID'. |

    | Message | String | Yes | The actual content of the message. Can be plain text
    or a JSON string representing Slack Blocks. |

    | Message Type | Dropdown | Yes | Defines the format of the message content. Options:
    'Text' or 'Blocks'. |


    ### Additional Notes:

    * This action does not operate on Google SecOps entities; it is a standalone communication
    task.

    * When using 'Blocks' as the Message Type, ensure the 'Message' parameter contains
    valid Slack Block Kit JSON.
