Send Message:
  ai_description: >-
    ### General Description

    Sends a message to a Slack channel or a specific user. This action facilitates
    communication with Slack workspaces directly from a playbook. It is designed as
    a utility action and does not operate on Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Channel | String | Yes | Specify the name of the Slack channel or the email
    address of the user to whom to send the message. This parameter accepts multiple
    values as a comma-separated string. |

    | Message | String | Yes | Specify the message content to send. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Slack API token from the integration
    configuration and the message content and target channels from the action parameters.

    2. **Target Processing**: The action splits the comma-separated 'Channel' input
    into individual targets.

    3. **User Resolution**: For each target, the action checks if it matches an email
    format. If it does, it attempts to fetch the corresponding Slack User ID using
    the Slack API.

    4. **Message Dispatch**: The action sends the message to the resolved User ID
    or the provided channel name using the `chat_postMessage` method.

    5. **Result Reporting**: The action aggregates the responses from Slack for each
    target into a JSON result and provides a summary message indicating success or
    failure.


    ### Additional Notes

    This action does not interact with or update any Google SecOps entities. If an
    email is provided but no matching Slack user is found, the action will attempt
    to treat the email string as a channel ID.
