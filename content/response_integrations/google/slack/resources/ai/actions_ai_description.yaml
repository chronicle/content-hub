    \ provided, the action prioritizes the ID. |\n| Channel ID | String | No | The\
    \ unique identifier of the Slack channel. This is the most reliable way to target\
    \ a channel. |\n| New Name | String | Yes | The desired new name for the channel.\
    \ Note: Slack channel names must be lowercase, can only contain numbers, hyphens,\
    \ and underscores, and must be 80 characters or less. |\n\n### Additional Notes\n\
    - Either 'Channel Name' or 'Channel ID' must be provided for the action to execute\
