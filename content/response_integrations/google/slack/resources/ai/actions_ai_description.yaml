Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Slack instance using the
    API token provided in the integration configuration. This action is primarily
    used to verify that the integration is correctly set up and that the network path
    to Slack's API is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any action-specific parameters.
    It utilizes the global `ApiToken` from the integration settings. |


    ### Additional Notes

    - This is a standard 'Ping' action used for health checks of the integration.

    - It does not interact with or require any entities from the case.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the `ApiToken` from the Slack
    integration's configuration parameters.

    2. **Manager Initialization**: Initializes the `SlackManager` using the retrieved
    token.

    3. **Connectivity Test**: Calls the `test_connectivity` method, which executes
    a request to the Slack `api_test` endpoint.

    4. **Result Handling**: If the API responds successfully, the action completes
    with a success status. If an authentication error or connection failure occurs,
    it catches the exception and returns a failure status with the error details.
