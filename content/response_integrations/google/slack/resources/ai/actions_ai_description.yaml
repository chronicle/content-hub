Get Channel Or User Conversation History:
  ai_description: >-
    ### General Description

    Retrieves the conversation history for a specific Slack channel or user within
    a defined time window. This action is designed to gather communication logs for
    auditing or investigation purposes. It does not interact with Google SecOps entities
    and instead relies on direct ID inputs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Channel or User ID** | String | Yes | The unique identifier for the Slack
    channel or user to fetch history for. |

    | **Time Frame** | Dropdown | No | Predefined time range for the results (e.g.,
    Last Hour, Last 24 Hours, Custom). Default is 'Last Hour'. |

    | **Start Time** | String | No | The start time in ISO 8601 format (e.g., 2021-08-05T05:18:42Z).
    This is mandatory if 'Time Frame' is set to 'Custom'. |

    | **End Time** | String | No | The end time in ISO 8601 format. If 'Custom' is
    selected and this is left blank, the current time is used. |

    | **Max Records to Return** | Integer | No | The maximum number of message records
    to retrieve. Default is 20. |


    ### Additional Notes

    * This action does not process or enrich Google SecOps entities.

    * If a User ID is provided, the action attempts to locate the direct message (IM)
    conversation associated with that user to retrieve history.

    * The action requires a valid Slack API token with permissions to read conversation
    history.


    ### Flow Description

    1. **Initialization:** The action extracts the API token and user-provided parameters
    including the target ID and time constraints.

    2. **Time Range Calculation:** It calculates the start and end Unix timestamps
    based on the selected 'Time Frame'. If 'Custom' is used, it parses the provided
    ISO 8601 strings.

    3. **Primary Fetch (Channel):** The action first attempts to retrieve history
    by treating the provided ID as a Slack Channel ID.

    4. **Fallback Fetch (User):** If the ID is not a channel, it attempts to find
    a direct message conversation for the ID (treating it as a User ID). If found,
    it then retrieves the history for that specific conversation.

    5. **Data Processing:** It iterates through the Slack API response, handling pagination
    if necessary, until the 'Max Records to Return' limit is reached.

    6. **Output:** The retrieved messages are returned as a raw JSON array for use
    in subsequent playbook steps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
