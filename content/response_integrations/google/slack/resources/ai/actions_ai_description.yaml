Build Block:
  ai_description: >-
    ### General Description

    The **Build Block** action is a utility designed to construct a Slack "Block Kit"
    JSON structure for interactive messages. It allows users to define a question
    and a set of response buttons. Each button is automatically configured with a
    webhook URL that includes the specific answer as a query parameter, enabling automated
    response tracking. Additionally, it includes a "View Case" button to provide a
    direct link back to the relevant Google SecOps case. This action does not send
    the message itself; it prepares the JSON payload to be used by a subsequent "Send
    Interactive Message" action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Question** | String | Yes | The text of the question to be displayed in the
    Slack message block. |

    | **Answers Buttons** | String | Yes | A comma-separated list of labels for the
    buttons (e.g., "Approve, Reject, Investigate"). |

    | **Siemplify Base URL** | String | Yes | The base URL of the Google SecOps instance,
    used to construct the case link. |

    | **Case ID** | String | Yes | The unique identifier of the case, used to construct
    the case link. |

    | **Webhook Token UUID** | String | Yes | The UUID for the webhook endpoint that
    will receive the user's button click. |


    ### Additional Notes

    - This action does not interact with Google SecOps entities.

    - The **Webhook Base URL** must be configured in the integration settings for
    this action to function correctly.

    - The output is a JSON string representing Slack blocks, which should be passed
    to a Slack messaging action.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the question, button labels,
    case details, and webhook configuration.

    2. **Button Construction**: It iterates through the provided answer labels, creating
    a Slack Button element for each. Each button's URL is built by appending the answer
    to the Webhook Base URL and Token UUID.

    3. **Case Link Generation**: It creates a specialized button that links directly
    to the specified Case ID within the Google SecOps platform.

    4. **Block Assembly**: It combines the question (as a Section block) and the buttons
    (as an Actions block) into a single list.

    5. **JSON Serialization**: The block structure is serialized into a JSON string
    and returned as the action's primary output.
