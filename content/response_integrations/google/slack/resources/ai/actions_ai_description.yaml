Wait For Reply With Webhook:
  ai_description: >-
    ### General Description

    This action is designed to wait for and retrieve a user's reply to a message sent
    via a webhook. It is typically used in an asynchronous workflow following the
    'Send Advanced Message' action. The action periodically polls a specified webhook
    endpoint to check if the user has provided a response. Because it is an asynchronous
    action, it will remain in an 'In Progress' state until either a response is detected
    or the defined timeout threshold is reached.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Webhook Token UUID | String | Yes | The unique identifier (UUID) of the webhook
    token to monitor for the user's response. |


    ### Additional Notes

    - **Asynchronous Execution:** This action is designed to run asynchronously. Ensure
    that the action timeout in the Google SecOps IDE is adjusted to allow sufficient
    time for a user to respond.

    - **Entity Support:** This action does **not** run on Google SecOps entities.

    - **Integration Dependencies:** Requires the 'Webhook Base URL' to be configured
    in the integration settings.


    ### Flow Description

    1. **Initialization:** The action retrieves integration configuration (API Token,
    Webhook Base URL, SSL verification) and the mandatory Webhook Token UUID.

    2. **Connectivity Check:** It validates connectivity to the Slack service.

    3. **Data Retrieval:** The action performs a GET request to the webhook service
    using the provided UUID to check for any submitted data/replies.

    4. **Status Evaluation:**
        - If a reply is found, the action completes successfully and returns the response
    content as JSON.
        - If no reply is found and the global timeout has not been reached, the action
    sets its state to 'In Progress' to be retried in the next cycle.
        - If the global timeout is reached without a response, the action completes
    with a message indicating the timeout occurred.
