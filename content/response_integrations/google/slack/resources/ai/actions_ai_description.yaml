List Users:
  ai_description: >-
    ### General Description

    The **List Users** action retrieves a list of user accounts from a Slack workspace
    based on specified filtering criteria. It is primarily used for administrative
    discovery or auditing purposes within a Slack environment. This action does not
    interact with or process Google SecOps entities; instead, it performs a global
    lookup against the Slack API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Max Records to Return** | Integer | No | Specifies the maximum number of user
    accounts to return. Default is 20. |

    | **Filter Key** | Enum | No | The user attribute to filter by. Options include:
    `Name`, `Real Name`, and `Email`. |

    | **Filter Value** | String | No | The specific string to search for in the selected
    `Filter Key`. If left empty, no filtering is applied. |

    | **Filter Logic** | Enum | No | Determines how the filter is applied. `Equal`
    performs an exact match, while `Contains` performs a substring search. |


    ### Additional Notes

    * **Entity Interaction:** This action **does not** run on Google SecOps entities.
    It ignores any entities present in the current scope.

    * **Filtering Logic:** If `Filter Logic` is set to "Not Specified" or the `Filter
    Value` is empty, the action will return all users up to the `Max Records to Return`
    limit without filtering.


    ### Flow Description

    1. **Initialization:** The action retrieves the Slack API token from the integration
    configuration and extracts the user-provided filtering parameters.

    2. **Data Retrieval:** It connects to the Slack API and fetches the list of workspace
    members, handling pagination automatically to ensure the requested number of records
    can be reached.

    3. **Filtering:** The retrieved list is processed locally. If a `Filter Key`,
    `Filter Value`, and `Filter Logic` are provided, the action filters the user list
    to match the criteria.

    4. **Output Generation:** The resulting list of users is formatted into a JSON
    object and a data table named "Users" for display in the Google SecOps case wall.
    The action completes with a success message indicating the number of users found.
