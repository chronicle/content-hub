name: Upload File
description: Add files to Slack and share them with your teammates to help you collaborate.
    Uploaded files are stored, searchable, and shareable across your workspace. Note
    that action is not working on Google Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#upload_file
integration_identifier: Slack
parameters:
-   name: File Name
    default_value: ''
    type: string
    description: Specify the name(title) that should be used to show in Slack for
        the uploaded file.
    is_mandatory: true
-   name: File Path
    default_value: ''
    type: string
    description: Specify the full file path on the Google Secops server for the file
        to upload.
    is_mandatory: true
-   name: Channel
    default_value: ''
    type: string
    description: Specify the name of the Slack channel or the email address of the
        user to whom to send the message.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: is_succeed
