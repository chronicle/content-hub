name: Wait For Reply
description: 'Wait for a thread reply to a message previously sent with a ''Send Message''
    or ''Send Advanced Message'' actions. Note: action is async, please adjust the
    timeout for action in Google Secops IDE. Action is not running on Google Secops
    entities.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#wait_for_reply
integration_identifier: Slack
parameters:
-   name: Channel
    default_value: ''
    type: string
    description: 'Specify the channel name in which to track reply for the message.
        Note: if both Channel and Channel ID are specified, action will only work
        with ID.'
    is_mandatory: false
-   name: Channel ID
    default_value: ''
    type: string
    description: 'Specify the id of the channel, in which to track reply for the message.
        Note: if both Channel and Channel ID are specified, action will only work
        with ID.'
    is_mandatory: false
-   name: Message Timestamp
    default_value: ''
    type: string
    description: Specify the timestamp of the message to track. Timestamp can be found
        in the Send Message action json result as ts key.
    is_mandatory: true
-   name: Wait for Multiple Replies
    default_value: false
    type: boolean
    description: If enabled, action should wait for multiple responses  until action
        timeout. Otherwise, action finishes running after getting first reply to the
        message.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/wait_for_reply_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: is_succeed
