name: Create Channel
description: Create a channel in Slack. Note that action is not working on Google
    Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#create_channel
integration_identifier: Slack
parameters:
-   name: Channel Name
    default_value: ''
    type: string
    description: 'Specify the name of the channel. Note: Channel names may only contain
        lowercase letters, numbers, hyphens, and underscores, and must be 80 characters
        or less.'
    is_mandatory: true
-   name: User IDs
    default_value: ''
    type: string
    description: 'Specify the ids of the users that should be invited to the newly
        created channel. Example: U014JDHLW87, U08544ABC85. Parameter accepts multiple
        values as a comma separated list. Note: if both “User IDs” and “User Emails”
        are specified, action will only work with IDs.'
    is_mandatory: false
-   name: Is Private
    default_value: 'False'
    type: boolean
    description: If enabled, action will create a private channel.
    is_mandatory: false
-   name: User Emails
    default_value: ''
    type: string
    description: 'Specify the emails of users that should be invited to the newly
        created channel. Parameter accepts multiple values as a comma separated list.
        Note: if both “User IDs” and “User Emails” are specified, action will only
        work with IDs.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_channel_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
