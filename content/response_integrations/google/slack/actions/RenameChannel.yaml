name: Rename Channel
description: Rename the specified Slack channel. Note that action is not working on
    Google Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#rename_channel
integration_identifier: Slack
parameters:
-   name: Channel Name
    default_value: ''
    type: string
    description: 'Specify the name of the channel, which you want to rename. Note:
        if both “Channel Name” and “Channel ID” are specified, action will only work
        with ID. '
    is_mandatory: false
-   name: Channel ID
    default_value: ''
    type: string
    description: 'Specify the id of the channel, which you want to rename. Note: if
        both “Channel Name” and “Channel ID” are specified, action will only work
        with ID. '
    is_mandatory: false
-   name: New Name
    default_value: ''
    type: string
    description: 'Specify what should be a new name for the channel. Note: Channel
        names may only contain lowercase letters, numbers, hyphens, and underscores,
        and must be 80 characters or less.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/rename_channel_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
