name: Send Message
description: Send a message to a Slack channel or user. Note that action is not working
    on Google Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#send_message
integration_identifier: Slack
parameters:
-   name: Channel
    default_value: ''
    type: string
    description: Specify the name of the Slack channel or the email address of the
        user to whom to send the message. Parameter accepts multiple values as a comma-separated
        string.
    is_mandatory: true
-   name: Message
    default_value: ''
    type: string
    description: Specify the message content to send.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_message_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
