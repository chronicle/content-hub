name: List Channels
description: Get a list of Slack channels based on the provided criteria. Note that
    action is not working on Google Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#list_channels
integration_identifier: Slack
parameters:
-   name: Max Channels to Return
    default_value: '20'
    type: string
    description: Specify how many channels to return.
    is_mandatory: false
-   name: Type Filter
    default_value: public_channel
    type: string
    description: 'Specify what type of conversations to return. Example: public_channel,private_channel.
        Possible Values: public_channel, private_channel, mpim, im.'
    is_mandatory: false
-   name: Filter Key
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Name
    - ID
    - Topic
    - Purpose
    description: Specify the key that needs to be used to filter channels.
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter. If “Equal“ is selected,
        action will try to find the exact match among results and if “Contains“ is
        selected, action will try to find results that contain that substring. If
        nothing is provided in this parameter, the filter will not be applied. Filtering
        logic is working based on the value  provided in the “Filter Key” parameter.
    is_mandatory: false
-   name: Filter Logic
    default_value: Not Specified
    type: ddl
    optional_values:
    - Not Specified
    - Equal
    - Contains
    description: Specify what filter logic should be applied. Filtering logic is working
        based on the value  provided in the “Filter Key” parameter.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_channels_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
