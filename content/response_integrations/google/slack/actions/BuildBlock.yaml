name: Build Block
description: Build a slack message block based on provided input criteria. Action
    creates a block with a webhook that can be later passed to the 'Send Interactive
    Message' to send a message with. Note that action is not working on Google Secops
    entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#build_block
integration_identifier: Slack
parameters:
-   name: Question
    default_value: ''
    type: string
    description: Specify the question text to add to the block.
    is_mandatory: true
-   name: Answers Buttons
    default_value: ''
    type: string
    description: Specify the answer buttons to add to the block.
    is_mandatory: true
-   name: Siemplify Base URL
    default_value: ''
    type: string
    description: Specify the Google Secops server base url to add to the block.
    is_mandatory: true
-   name: Case ID
    default_value: ''
    type: string
    description: Specify the Google Secops case id to add to the block.
    is_mandatory: true
-   name: Webhook Token UUID
    default_value: ''
    type: string
    description: Specify the Webhook token UUID to monitor for the user’s response.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/build_block_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
