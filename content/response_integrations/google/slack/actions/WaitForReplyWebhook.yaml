name: Wait For Reply With Webhook
description: 'Wait for a User reply to a message sent with a webhook - action periodically
    check the provided webhook to see if the User had provided any reply to it. Action
    can be used with the ''Send Advanced Message'' action, if the block message with
    webhook was sent, to check if the user''s response was provided to the webhook.
    Note: action is async, please adjust the timeout for action in Google Secops IDE.
    Action is not running on Google Secops entities.'
integration_identifier: Slack
parameters:
-   name: Webhook Token UUID
    default_value: ''
    type: string
    description: Specify the Webhook token UUID to monitor for the user’s response.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_reply_webhook_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: is_succeed
