name: Get User Details
description: 'Get Slack user details based on provided input criteria. Note: that
    action is not working on Google Secops entities.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#get_user_details
integration_identifier: Slack
parameters:
-   name: Search By
    default_value: Email
    type: ddl
    optional_values:
    - Email
    - Real Name
    - User ID
    description: Specify the parameter to search user details by.
    is_mandatory: true
-   name: User Value
    default_value: ''
    type: string
    description: Specify the user value to search by.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_user_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
