name: Send Advanced Message
description: Send an advanced message to a Slack channel or user. Action provides
    an ability to send 'simple' text messages and 'rich' Slack block messages with
    buttons, advanced formatting and more. Please see https://api.slack.com/block-kit
    for the block messages reference. Note that action is not working on Google Secops
    entities. This action can be used together with the 'Wait for Reply With Webhook'
    action to first send a 'block' message with a webhook to a user, and when later
    with 'Wait for Reply With Webhook' action check for a user's response.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#send_advanced_message
integration_identifier: Slack
parameters:
-   name: Recipient
    default_value: ''
    type: string
    description: Specify the recipient to send a message to.
    is_mandatory: true
-   name: Recipient Type
    default_value: Name
    type: ddl
    optional_values:
    - Name
    - Email
    - Channel or User ID
    description: Specify channel or user name (full name) to send message to. Optionally
        channel or user id can be specified, or email address of a user.
    is_mandatory: true
-   name: Message
    default_value: ''
    type: string
    description: Specify the message content to send.
    is_mandatory: true
-   name: Message Type
    default_value: Text
    type: ddl
    optional_values:
    - Text
    - Blocks
    description: Specify the message type to send.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_advanced_message_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
