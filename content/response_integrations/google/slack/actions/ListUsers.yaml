name: List Users
description: Get a list of Slack users based on the provided criteria. Note that action
    is not working on Google Secops entities.
integration_identifier: Slack
parameters:
-   name: Max Records to Return
    default_value: '20'
    type: string
    description: Specify how many user accounts to return.
    is_mandatory: false
-   name: Filter Key
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Name
    - Real Name
    - Email
    description: Specify the key that needs to be used to filter user accounts.
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter. If “Equal“ is selected,
        action will try to find the exact match among results and if “Contains“ is
        selected, action will try to find results that contain that substring. If
        nothing is provided in this parameter, the filter will not be applied. Filtering
        logic is working based on the value  provided in the “Filter Key” parameter.
    is_mandatory: false
-   name: Filter Logic
    default_value: Not Specified
    type: ddl
    optional_values:
    - Not Specified
    - Equal
    - Contains
    description: Specify what filter logic should be applied. Filtering logic is working
        based on the value  provided in the “Filter Key” parameter.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_users_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
