name: Get Channel Or User Conversation History
description: Get conversation history for a user or a channel based on provided input
    criteria. Action works with either channel or user id, which could be searched
    with either 'List Channels' or 'List User' actions. Note that action is not working
    on Google Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#get_channel_or_user_conversation_history
integration_identifier: Slack
parameters:
-   name: Channel or User ID
    default_value: ''
    type: string
    description: Specify the channel or user id to fetch the conversation history
        for.
    is_mandatory: true
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If Custom is selected, you
        also need to provide Start Time.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if Custom is selected for the Time Frame parameter. ''Format: ISO 8601. Example:
        2021-08-05T05:18:42Z'''
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. ''Format: ISO 8601. Example:
        2021-08-05T05:18:42Z''. If nothing is provided and Custom is selected for
        the Time Frame parameter then this parameter will use current time.'
    is_mandatory: false
-   name: Max Records to Return
    default_value: '20'
    type: string
    description: Specify how many records to return. If nothing is provided, action
        will return 20 records.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_channel_or_user_conversation_history_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
