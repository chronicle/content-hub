name: Get User Details By Id
description: Fetch Slack user account details. Note that action is not working on
    Google Secops entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#get_user_details_by_id
integration_identifier: Slack
parameters:
-   name: User Id
    default_value: ''
    type: string
    description: Specify user account id to fetch details for. User ID can be found
        by running “List Users“ action.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_user_details_by_id_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: is_succeed
