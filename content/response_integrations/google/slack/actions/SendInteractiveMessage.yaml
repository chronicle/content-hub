name: Send Interactive Message
description: Send an interactive message to a channel or a user and when based on
    the provided Webhook UUID check a user's response. Action is similar to the 'Send
    Advanced Message' action, but it allows to send only 'block' content (not plain
    text messages) and also requires a webhook UUID to check a user's response to
    a webhook. Action is async, please adjust action timeout in IDE accordingly. Action
    is not working on Google Secops entities. Please configure the Slack app used
    in integration to allow interactive messages as described here - https://api.slack.com/legacy/interactive-messages#readying_app.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/slack#send-interactive-message
integration_identifier: Slack
parameters:
-   name: Recipient
    default_value: ''
    type: string
    description: Specify the recipient to send a message to.
    is_mandatory: true
-   name: Recipient Type
    default_value: Name
    type: ddl
    optional_values:
    - Name
    - Email
    - Channel or User ID
    description: Specify channel or user name (full name) to send message to. Optionally
        channel or user id can be specified, or email address of a user.
    is_mandatory: true
-   name: Message
    default_value: ''
    type: string
    description: Specify the message content to send.
    is_mandatory: true
-   name: Webhook Token UUID
    default_value: ''
    type: string
    description: Specify the Webhook token UUID to monitor for the user’s response.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_interactive_message_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: is_succeed
