[project]
name = "my_sql"
version = "7.0"
description = "MySQL is the world's most popular open source database, enabling the cost-effective delivery of reliable, high-performance and scalable Web-based and embedded database applications."
requires-python = ">=3.11,<3.12"
dependencies = [ "mysql-connector-python==8.4.0",]

[dependency-groups]
dev = [
 "pytest-mock",
 "integration-testing",
 "anyio",
 "cachetools",
 "certifi",
 "environmentcommon",
 "google-api-core",
 "google-api-python-client",
 "google-auth",
 "google-auth-httplib2",
 "googleapis-common-protos",
 "h11",
 "httpcore",
 "httplib2",
 "httpx",
 "idna",
 "mysql-connector-python",
 "proto-plus",
 "pyasn1",
 "pyasn1-modules",
 "pyparsing",
 "pytest>=9.1.0",
 "pytest-json-report>=1.5.0",
 "requests",
 "rsa",
 "sniffio",
 "soar-sdk",
 "tipcommon",
 "typing-extensions",
 "uritemplate",
 "urllib3",
 "pyyaml",
]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl"

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-2.2.12-py2.py3-none-any.whl"

























[tool.uv.sources.integration-testing]
path = "../../../../packages/integration_testing_whls/integration_testing-2.2.0-py3-none-any.whl"
