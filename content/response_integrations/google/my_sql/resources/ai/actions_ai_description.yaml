Run SQL Query:
  ai_description: >-
    ### General Description

    This action executes a user-defined SQL query against a MySQL database. It supports
    both data retrieval (SELECT) and data modification (INSERT, UPDATE, DELETE, etc.)
    operations. Results from retrieval queries are formatted as both JSON and a CSV
    data table for display within the case wall.



    ### Additional Notes

    - The action automatically detects if a query is data-modifying (starting with
    keywords like INSERT, UPDATE, DELETE, DROP, ALTER, etc.) and performs a database
    commit if necessary.

    - If the query fails, a rollback is performed to maintain database integrity.


    ### Flow Description

    1. **Connection**: Establishes a connection to the MySQL server using the integration's
    configuration (Server Address, Username, Password, Port) and the provided Database
    Name.

    2. **Execution**: Executes the provided SQL query string.

    3. **Commit/Fetch**: 
        - If the query is a data-modifying statement, the action commits the transaction
    to the database.
        - If the query is a retrieval statement, it fetches all resulting rows and
    column headers.
    4. **Output Generation**: 
        - Converts retrieved data into a JSON format.
        - Constructs a CSV representation of the data and adds it as a 'MySQL Query
    Results' data table in the SOAR interface.
    5. **Cleanup**: Closes the database connection and returns the final execution
    status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action can execute SQL statements such as INSERT, UPDATE, DELETE, DROP,
      ALTER, and TRUNCATE, which directly modify the data or schema within the external
      MySQL database.
    fetches_data: true
    internal_data_mutation_explanation:
