    | Parameter Name | Description | Expected Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Server Address | The hostname or IP address of the MySQL server. | String |
    Yes (via Integration Config) |

    | Username | The database user account used for authentication. | String | Yes
    (via Integration Config) |

    | Password | The password associated with the database user. | String | Yes (via
    Integration Config) |

    | Port | The network port on which the MySQL service is listening (default is
    3306). | Integer | Yes (via Integration Config) |

    | Database Name For Testing | The specific database schema name to attempt a connection
