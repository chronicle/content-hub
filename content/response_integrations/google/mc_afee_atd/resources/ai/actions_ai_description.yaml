  ai_description: >-
    ### General Description

    Submits one or more files to McAfee Advanced Threat Defense (ATD) for sandbox
    analysis. This action allows users to provide local file paths which are then
    uploaded to the ATD server to initiate a malware analysis process using a specific
    analyzer profile.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Paths | String | Yes | A comma-separated list of local file paths to be
    submitted for analysis. Note that certain file types (e.g., CSV) may not be supported
    by ATD. |

    | Analyzer Profile ID | String | Yes | The unique identifier of the analyzer profile
    (VM Profile) to be used for the analysis. |


    ### Flow Description

    1. **Authentication**: The action establishes a session with the McAfee ATD server
    using the provided API credentials.

    2. **Path Parsing**: The comma-separated string of file paths is split into an
    iterable list.

    3. **File Submission**: For each file path provided, the action reads the file
    and performs a POST request to the ATD `fileupload.php` endpoint, passing the
    file content and the specified Analyzer Profile ID.

    4. **Task ID Retrieval**: The action captures the `taskId` returned by ATD for
    each successful submission. If a submission fails or returns a -1 ID, it is logged
    as an error.

    5. **Output Generation**: The action populates a data table named 'Result Task
    IDs' with the file paths and their corresponding Task IDs. It also returns a comma-separated
    string of all successful Task IDs as the action's result value.

    6. **Session Termination**: The action explicitly logs out of the McAfee ATD session
    before finishing.
