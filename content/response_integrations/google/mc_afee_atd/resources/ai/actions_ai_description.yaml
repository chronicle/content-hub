Submit URL:
  ai_description: >-
    ### General Description

    Submits a URL to McAfee Advanced Threat Defense (ATD) for sandbox analysis. This
    action allows security analysts to trigger automated malware analysis on suspicious
    URLs, retrieve detailed behavior reports, and enrich the URL entity within the
    SOAR platform based on the analysis results.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves necessary integration settings,
    including the API root, credentials, and SSL verification preferences.

    2. **Parameter Processing**: It extracts the `Analyzer Profile ID` (required)
    and the `Create Insight` flag (optional).

    3. **Entity Filtering**: The action iterates through the target entities, filtering
    specifically for those of type `URL`.

    4. **Submission**: Each valid URL is submitted to the McAfee ATD service using
    the provided Analyzer Profile ID. The service returns a task ID for each submission.

    5. **Asynchronous Monitoring & Retrieval**: The action monitors the status of
    the submitted tasks. Once the analysis is completed:
        - It retrieves the JSON, PDF, and TXT reports from McAfee ATD.
        - If `Create Insight` is enabled, it adds an entity insight containing the
    text report.
        - It updates the entity's `additional_properties` with the summary data from
    the JSON report.
        - It evaluates the severity against a threshold to set the entity's `is_suspicious`
    status.
        - It attaches the PDF report to the case.
    6. **Finalization**: The action updates the entities in the SOAR platform and
    returns the analysis results.


    ### Additional Notes

    This action is designed to be asynchronous, handling the submission and subsequent
    report retrieval. It requires a valid Analyzer Profile ID configured in McAfee
    ATD to function correctly.
  ai_short_description: >-
    Submits a URL to McAfee ATD for sandbox analysis, retrieves the behavior report,
    and enriches the URL entity with threat intelligence and suspicious status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
