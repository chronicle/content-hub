  ai_description: >-
    Submits URL entities to McAfee ATD for sandbox analysis.


    ### General Description

    This action asynchronously submits URL entities to McAfee ATD for analysis. It
    first creates an analysis task for each URL and then periodically checks the status
    of these tasks. Once the analysis is complete, the action retrieves the JSON,
    PDF, and TXT reports. It enriches the entities with the summary from the JSON
    report, optionally creates an insight with the TXT report, and attaches the PDF
    report to the action results. If the severity of the analysis exceeds a specified
    threshold, the entity is marked as suspicious.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Filters the target entities to process only URL entities.

    3. Submits each URL to McAfee ATD using the provided Analyzer Profile ID, creating
    an analysis task.

    4. Asynchronously polls McAfee ATD to check the status of the submitted tasks.

    5. Once a task is completed, fetches the JSON, PDF, and TXT reports.

    6. Enriches the URL entity with the summary data from the JSON report.

    7. If the severity score exceeds the threshold, marks the entity as suspicious.

    8. Optionally creates an insight for the entity using the TXT report.

    9. Attaches the PDF report to the action's results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Analyzer Profile ID | String | Yes | The ID of the analyzer profile to analyze
    the URLs with. |

    | Create Insight | Boolean | No | If enabled, the action will create an insight
    containing the retrieved information about the entity. Default is true. |

    | Threshold | Integer | No | The severity threshold above which the entity will
    be marked as suspicious. Default is 3. |
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Submits a URL to the McAfee ATD sandbox, creating an analysis task on the external
      system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches analysis reports from McAfee ATD (fetches_data=true). It
      submits a URL to the sandbox, creating a new analysis task on the external system
      (can_mutate_external_data=true). It updates the entities with the analysis results
      and potentially marks them as suspicious (can_update_entities=true). It also
      creates insights based on the TXT report (can_create_insight=true). It does
      not modify internal alert data or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action submits a URL to an external sandbox, which creates an analysis task
      (mutating external state). Therefore, it does not meet the strict read-only
      criteria for the Enrichment category. It does not perform any remediation actions.
    remediation: false
  entity_usage:
