  ai_description: "### General Description\nThis action checks if File Hash entities\
    \ (specifically MD5 hashes) are present on the McAfee Advanced Threat Defense\
    \ (ATD) blacklist. It is used to quickly identify known malicious files based\
    \ on their hash signature by querying the McAfee ATD server.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Api Root | String | Yes | The base URL of the McAfee ATD server\
    \ API. |\n| Username | String | Yes | The username used for authenticating with\
    \ the McAfee ATD server. |\n| Password | String | Yes | The password used for\
    \ authenticating with the McAfee ATD server. |\n| Verify SSL | Boolean | Yes |\
    \ If set to true, the action will verify the SSL certificate of the McAfee ATD\
    \ server. |\n\n### Additional Notes\n- The action specifically validates that\
    \ the file hash is of MD5 type (32 characters). If a hash of a different length\
    \ is provided, the action will log an error for that specific entity.\n- The action\
    \ performs a session-based authentication, logging in at the start and logging\
    \ out upon completion.\n\n### Flow Description\n1. **Initialization**: The action\
    \ retrieves the necessary configuration parameters (API Root, Credentials, and\
    \ SSL settings) from the integration settings.\n2. **Entity Filtering**: It identifies\
    \ all `FILEHASH` entities within the current scope to be processed.\n3. **Authentication**:\
    \ The action establishes a session with the McAfee ATD server using the provided\
    \ credentials and retrieves an API token.\n4. **Blacklist Lookup**: For each identified\
    \ MD5 hash, the action sends a request to the McAfee ATD server to determine if\
    \ the hash is blacklisted.\n5. **Internal Enrichment**: The action updates the\
    \ `additional_properties` of each entity with the key `ATD_is_blacklist` and the\
    \ corresponding boolean result.\n6. **Reporting**: \n    - A JSON result is created\
    \ mapping each hash to its blacklist status.\n    - A data table named \"Check\
    \ Results\" is added to the case wall, listing the hashes and their status.\n\
    7. **Cleanup**: The action terminates the session by logging out of the McAfee\
    \ ATD server."
