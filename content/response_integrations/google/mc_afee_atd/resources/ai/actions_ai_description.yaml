    reasoning: >-
      The action fetches data by querying McAfee ATD for hash blacklist status. It
      does not mutate external data as it only performs a lookup. It does not mutate
      internal data (no insights, case comments, or alert modifications are created).
      Although there is an attempt to update entity additional properties, the entities
      are never added to the update list, so no entities are actually updated.
  categories:
