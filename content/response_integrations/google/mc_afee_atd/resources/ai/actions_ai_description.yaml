  ai_description: >-
    ### General Description

    The **Get Analyzer Profiles** action retrieves a comprehensive list of analyzer
    profiles (VM profiles) configured on the McAfee Advanced Threat Defense (ATD)
    server. This action is primarily used to discover available analysis environments
    and their corresponding IDs, which are necessary for submitting files or URLs
    for analysis in subsequent workflow steps.


    ### Parameters Description

    This action does not require any action-specific input parameters. It utilizes
    the global integration configuration parameters:

    * **Api Root**: The endpoint URL for the McAfee ATD server.

    * **Username**: The account used for authentication.

    * **Password**: The password for the account.

    * **Verify SSL**: Boolean flag to determine if SSL certificates should be validated.


    ### Additional Notes

    * The action automatically maps the internal `vmProfileid` to a more user-friendly
    `Profile ID` field in the output.

    * Results are presented both as a raw JSON object and a formatted data table for
    easy viewing within the case wall.


    ### Flow Description

    1. **Authentication**: The action initializes a session with the McAfee ATD server
    using the provided credentials to obtain an API token.

    2. **Profile Retrieval**: It executes a GET request to the `vmprofiles.php` endpoint
    to fetch the list of all configured analyzer profiles.

    3. **Data Transformation**: The script processes the returned list, ensuring each
    profile entry includes a standardized `Profile ID` key.

    4. **Reporting**: The processed data is attached to the action results as a JSON
    blob and rendered as a data table named "Analyzer Profiles" on the case wall.

    5. **Session Termination**: The action explicitly logs out of the McAfee ATD server
    to close the active session.
