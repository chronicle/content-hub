Check Hash:
  ai_description: >-
    ### General Description

    Checks if a file hash is blacklisted using the McAfee Advanced Threat Defense
    (ATD) integration. This action queries the McAfee ATD API to determine the reputation
    of a given file hash, providing visibility into whether the file is known to be
    malicious.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Username`,
    `Password`, and `Verify SSL`.

    2. It filters the `target_entities` to identify those of type `FILEHASH`.

    3. For each identified file hash, the action calls the `is_hash_blacklist` method
    from the `McAfeeATDManager`, which performs a POST request to the McAfee ATD API
    (`atdHashLookup.php`) to check the blacklist status.

    4. The result (blacklisted or not) is stored in a dictionary and added to the
    action's result JSON.

    5. A data table containing the file hash and its blacklist status is constructed
    and added to the action results.

    6. The action logs out of the McAfee ATD session.


    ### Additional Notes

    While the code attempts to update the entity's `additional_properties` in memory,
    the `siemplify.update_entities` method is not functionally called because the
    `entities_to_update` list remains empty. Consequently, this action does not persist
    changes to the entity within the SOAR platform.
  ai_short_description: >-
    Checks if a file hash is blacklisted using McAfee Advanced Threat Defense.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the McAfee ATD API to check the blacklist
      status of a file hash (fetches_data=true). It does not mutate external data,
      nor does it update entities or create insights in the SOAR platform, as the
      update logic is not implemented.
