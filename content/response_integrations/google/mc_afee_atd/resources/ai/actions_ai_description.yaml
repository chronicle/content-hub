Submit File:
  ai_description: >-
    ### General Description

    Submits one or more files to the McAfee Advanced Threat Defense (ATD) system for
    malware analysis. This action allows security analysts to trigger automated sandboxing
    of suspicious files to determine their threat potential.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Username, Password,
    Verify SSL) to establish a connection with the McAfee ATD server.

    2. It extracts the action parameters: `File Paths` (a comma-separated list of
    file paths) and `Analyzer Profile ID`.

    3. The action initializes the `McAfeeATDManager` and authenticates with the server.

    4. It iterates through the provided list of file paths.

    5. For each file, it calls the `submit_file` API endpoint on the McAfee ATD server,
    passing the file and the specified analyzer profile.

    6. The action collects the resulting Task IDs for each successful submission.

    7. It adds the results to the action output as a JSON object and a data table
    named 'Result Task IDs'.

    8. Finally, it logs out from the McAfee ATD session.


    ### Additional Notes

    The action requires that the provided file paths are accessible by the integration.
    A Task ID of -1 indicates that the file submission was not successful or the file
    type is not supported by the ATD system.
