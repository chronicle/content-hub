    ### Flow Description

    1. Filters the target entities to include only URL entities.

    2. Submits each URL to McAfee ATD for analysis using the provided Analyzer Profile
    ID via an API call.

    3. Asynchronously polls the McAfee ATD API to check the status of the analysis
    tasks.

    4. Once the analysis is complete, retrieves the JSON, PDF, and TXT reports for
    each task via API calls.

    5. Enriches the URL entities with the analysis summary and updates their suspicious
    status if the severity exceeds the threshold.

    6. Optionally creates an insight for each entity using the TXT report.

    7. Attaches the PDF report to the action's results.


