Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee ATD server. This action verifies that the integration
    is configured correctly and can successfully authenticate and communicate with
    the external service.


    ### Flow Description

    1. Extracts integration configuration parameters (API Root, Username, Password,
    Verify SSL).

    2. Initializes the McAfee ATD manager, which automatically attempts to obtain
    an authentication token via a GET request to the login endpoint.

    3. Calls the logout API endpoint via a DELETE request to terminate the session,
    confirming successful communication.

    4. Returns a success message if the connection and logout are successful, otherwise
    returns an error.


    ### Additional Notes

    This action does not require any action-specific parameters or entities to run.
    It relies entirely on the integration-level configuration.
