  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the McAfee ATD (Advanced Threat Defense) server. It
    ensures that the provided credentials and API endpoint are valid and reachable
    by attempting a full authentication cycle (login followed by logout).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the McAfee ATD server API. |

    | Username | String | Yes | The username used to authenticate with the McAfee
    ATD server. |

    | Password | String | Yes | The password used to authenticate with the McAfee
    ATD server. |

    | Verify SSL | Boolean | Yes | Specifies whether to verify the SSL certificate
    of the McAfee ATD server. |


    ### Additional Notes

    - This action does not process any entities and is strictly used for configuration
    validation.

    - The action utilizes the `McAfeeATDManager` to handle the underlying HTTP requests
    and session management.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the connection parameters
    (`Api Root`, `Username`, `Password`, and `Verify SSL`) from the integration settings.

    2. **Manager Initialization**: It instantiates the `McAfeeATDManager`. During
    initialization, the manager automatically performs a login request to the McAfee
    ATD server to obtain a session token.

    3. **Connectivity Test**: Once the manager is initialized (confirming a successful
    login), the action calls the `logout` method to gracefully terminate the session.

    4. **Execution Outcome**: If the login and logout sequence completes without errors,
    the action reports a successful connection. If an exception occurs (e.g., network
    timeout, invalid credentials), it logs the error and reports a failure.
