Check Hash:
  ai_description: >-
    ### General Description

    This action checks if a file hash entity is blacklisted in McAfee ATD. It retrieves
    the blacklist status for the provided hashes to determine if they are known threats.


    ### Flow Description

    1. Iterates over all target entities that are of type FILEHASH.

    2. For each entity, makes an API call (POST request) to the McAfee ATD `atdHashLookup.php`
    endpoint to check if the MD5 hash is blacklisted.

    3. Collects the blacklist status and populates a data table and JSON result with
    the findings.


    ### Additional Notes

    - The action specifically requires MD5 hashes; other hash types will result in
    an error.
  ai_short_description: >-
    Checks if a file hash entity is blacklisted in McAfee ATD.
