Get Analyzer Profiles:
  ai_description: >-
    ### General Description

    Retrieves the list of available analyzer profiles from the McAfee Advanced Threat
    Defense (ATD) system. This action allows analysts to view configured virtual machine
    profiles used for file analysis, which can be useful for understanding the available
    environments for sandbox submissions.


    ### Flow Description

    1. Extracts the required integration configuration parameters (Api Root, Username,
    Password, and Verify SSL) to establish a connection.

    2. Initializes the McAfeeATDManager to handle API communication.

    3. Executes an API call to the McAfee ATD system to retrieve all available analyzer
    profiles.

    4. Processes the retrieved profile list to map the 'vmProfileid' to a 'Profile
    ID' field for clarity.

    5. Adds the retrieved profile data to the action results as a JSON object and
    a formatted data table.

    6. Performs a logout operation to close the session with the McAfee ATD system.


    ### Additional Notes

