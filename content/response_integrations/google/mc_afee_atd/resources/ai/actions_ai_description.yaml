Get Report:
  ai_description: >-
    ### General Description

    Retrieves analysis reports from McAfee ATD for specified task IDs. This action
    checks the status of the provided tasks and, once completed, fetches the corresponding
    JSON, PDF, and optionally TXT reports. It can attach the PDF report to the case
    and create an insight with the text summary.


    ### Flow Description

    1. Receives a comma-separated list of task IDs from the action parameters.

    2. Initiates an asynchronous loop to check the status of each task ID via the
    McAfee ATD API (`samplestatus.php`).

    3. If any task is not yet completed, the action yields and waits.

    4. Once all tasks are completed, the action fetches the JSON report (`showreport.php?iType=json`)
    and PDF report (`showreport.php?iType=pdf`) for each task.

    5. If the `Create Insight` parameter is enabled, it also fetches the TXT report
    (`showreport.php?iType=txt`) and creates a case insight with its content.

    6. Attaches the retrieved PDF report to the action results.

    7. Returns the JSON report data as the final action result.


    ### Additional Notes

    This action runs asynchronously, meaning it will periodically check the task status
    until the analysis is complete without blocking the execution thread.
  ai_short_description: >-
    Retrieves analysis reports (JSON, PDF, TXT) from McAfee ATD for specified task
    IDs, attaches the PDF to the case, and optionally creates case insights with the
    text summary.
