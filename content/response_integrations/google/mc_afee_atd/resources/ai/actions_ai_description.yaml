Get Report:
  ai_description: >-
    ### General Description

    Retrieves analysis reports (JSON, PDF, and optionally TXT) for specified task
    IDs from the McAfee Advanced Threat Defense (ATD) system. This action allows analysts
    to pull detailed forensic findings for completed sandbox analysis tasks directly
    into the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (API root, credentials, SSL verification)
    and action parameters (`Task IDs`, `Create Insight`).

    2. It iterates through the provided `Task IDs` and checks the status of each task
    using the `atd_manager.get_task_id_status` API call.

    3. If all tasks are in a 'Completed' status, the action proceeds to fetch the
    reports.

    4. For each task, it retrieves the JSON report and the PDF report via API calls
    (`atd_manager.get_json_report`, `atd_manager.get_pdf_report`).

    5. If the `Create Insight` parameter is enabled, it retrieves the TXT report (`atd_manager.get_txt_report`)
    and creates a case insight in the SOAR platform using `siemplify.create_case_insight`.

    6. The PDF report is added as an attachment to the action result, and the JSON
    report data is added to the action result.

    7. If tasks are still queued, the action reports the status and does not fetch
    reports.


    ### Additional Notes

    This action supports asynchronous execution. It does not operate on entities directly
    but relies on user-provided Task IDs. If the `Create Insight` option is enabled,
    it will generate a case insight containing the summary of the report.
  ai_short_description: >-
    Retrieves analysis reports (JSON, PDF, TXT) for specified task IDs from McAfee
    ATD.
  capabilities:
    can_create_case_comments: false
