  ai_description: >-
    Checks if file hash entities are blacklisted using McAfee ATD.


    ### General Description

    This action queries McAfee ATD to determine if the provided file hashes are present
    in its blacklist. It returns the blacklist status for each hash and attaches the
    results as a data table and JSON result.


    ### Parameters Description

    This action does not require any specific input parameters. It relies on the integration's
    configuration parameters (API Root, Username, Password, Verify SSL).


    ### Flow Description

    1. Establishes a session with the McAfee ATD API.

    2. Filters the target entities to include only `FILEHASH` entities.

    3. Iterates through the filtered entities and sends a lookup request to check
    if the hash is blacklisted.

    4. Records the result in a data table and JSON result.

    5. Terminates the session with McAfee ATD.
