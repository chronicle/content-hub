  ai_description: >-
    Submits one or more files to McAfee Advanced Threat Defense (ATD) for analysis.
    The action uploads the specified files and returns the corresponding task IDs
    for tracking the analysis progress.


    ### Parameters Description

    * **File Paths** (String, Mandatory): A comma-separated list of file paths to
    be submitted for analysis. Note that some file types (e.g., CSV) may not be supported
    by ATD.

    * **Analyzer Profile ID** (String, Mandatory): The ID of the analyzer profile
    (VM profile) to be used for the analysis.


    ### Flow Description

    1. Initializes the connection to the McAfee ATD server using the provided credentials.

    2. Parses the comma-separated list of file paths.

    3. Iterates through each file path and submits the file to McAfee ATD using the
    specified Analyzer Profile ID.

    4. Collects the resulting Task IDs for each successfully submitted file.

    5. Logs out of the McAfee ATD session.

    6. Outputs the Task IDs as a JSON result and a data table, and returns them as
    the action's result value.
