Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee ATD server by attempting to authenticate and
    then immediately terminating the session. This action verifies that the provided
    integration configuration parameters are valid and that the SOAR platform can
    successfully communicate with the McAfee ATD API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Api Root`, `Username`,
    `Password`, and `Verify SSL`.

    2. It initializes the `McAfeeATDManager`, which performs an authentication request
    (GET `session.php`) to the McAfee ATD server to obtain a session token.

    3. The action calls the `logout` method, which performs a DELETE request to the
    session endpoint to terminate the connection.

    4. If the operations complete without error, the action returns a success message.
    If an exception occurs during authentication or logout, the action returns a failure
    message.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment or security operations on entities or alerts.
