product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The McAfeeATD integration is primarily focused on threat intelligence and sandbox
    analysis. It provides actions to check file hash reputations against blacklists
    ('Check Hash') and to submit files and URLs for sandbox analysis ('Submit File',
    'Submit URL'), which return verdicts, severity scores, and detailed analysis reports.
    These capabilities align directly with the 'Threat Intelligence' category, which
    involves determining the reputation of external indicators. The integration does
    not perform SIEM log searching, EDR host containment, network gateway blocking,
    email inbox management, or other functions associated with the remaining categories.
  siem: false
  threat_intelligence: true
  vulnerability_management: false
