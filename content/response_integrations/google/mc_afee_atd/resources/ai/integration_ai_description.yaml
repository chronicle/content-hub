product_categories:
  asset_inventory: false
  cloud_security: false
  collaboration: false
  edr: false
  email_security: false
  iam_and_identity_management: false
  itsm: false
  network_security: false
  reasoning: >-
    The mc_afee_atd integration is primarily designed for malware analysis and threat
    intelligence enrichment. The 'Check Hash' action enriches FILEHASH entities by
    querying the McAfee ATD blacklist, and the 'Submit URL' action enriches DestinationURL
    entities by performing sandbox analysis and returning detailed reports. These
    capabilities directly align with the Threat Intelligence category, as they provide
    reputation data and analysis results to confirm if an alert is a True Positive.
    The integration does not perform log analysis (SIEM), host-level process inspection
    (EDR), firewall/WAF management (Network Security), email inbox management (Email
    Security), identity management (IAM), cloud resource management (Cloud Security),
    ticketing (ITSM), vulnerability scanning (Vulnerability Management), asset inventory
    management (Asset Inventory), or collaboration/messaging (Collaboration).
  siem: false
  threat_intelligence: true
  vulnerability_management: false
