    ### General Description

    Queries IBM XForce for malware associated with IP address entities. This action
    retrieves threat intelligence regarding malware families, counts, and related
    metadata for external IP addresses, enriching the case data with actionable insights.


    ### Flow Description

    1. Extracts integration configuration parameters (API Key, Password, Address,
    and SSL verification settings).

    2. Iterates through the target entities, filtering specifically for external IP
    addresses (`entity.entity_type == EntityTypes.ADDRESS` and `not entity.is_internal`).

    3. For each valid IP, performs an API GET request to the IBM XForce endpoint (`/ipr/malware/{ip_address}`)
    to retrieve associated malware reports.

    4. If malware data is returned, it constructs a CSV table of the findings and
    attaches it to the entity using `siemplify.result.add_entity_table`.

    5. Updates the entity's `additional_properties` with the malware count and marks
    the entity as enriched.

    6. If malware is detected (malware count > 0), it marks the entity as suspicious
    and generates an entity insight using `siemplify.add_entity_insight`.

    7. Updates the entities in the SOAR platform using `siemplify.update_entities`.


    ### Additional Notes

    This action requires valid IBM XForce credentials. It only processes external
    IP addresses and does not perform any blocking or external system modifications.
