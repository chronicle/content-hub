Get Hash Info:
  ai_description: >-
    ### General Description

    Queries IBM X-Force to retrieve threat intelligence information for file hash
    entities. It fetches malware reports, risk scores, and associated malware families
    to enrich the entities and evaluate their risk level.


    ### Flow Description

    1. Iterates through the target entities and filters for File Hash entities.

    2. Makes a GET request to the IBM X-Force API (`/malware/{file_hash}`) to fetch
    hash information.

    3. Extracts risk scores, creation dates, and malware families from the response.

    4. Enriches the entity's additional properties with the retrieved data and marks
    it as enriched.

    5. Compares the risk score against the configured threshold; if it exceeds the
    threshold, marks the entity as suspicious and creates an insight.

    6. Attaches the raw JSON results and a summary CSV table to the action results.

    7. Updates the entities in the platform.


    ### Additional Notes

    Handles 404 (Not Found) and 403 (Access Denied) errors gracefully by logging them
    and continuing execution for the remaining entities.
  ai_short_description: >-
    Queries IBM X-Force to retrieve threat intelligence and risk scores for file hash
    entities, enriching them and creating insights based on a specified risk threshold.
