Get IP Malware:
  ai_description: >-
    ### General Description

    Queries IBM XForce to retrieve malware associations for IP address entities. This
    action fetches threat intelligence data regarding malware linked to specific external
    IP addresses, enriches the entities with this information, and flags them as suspicious
    if malware is detected.


    ### Flow Description

    1. Iterates over the target entities provided in the case.

    2. Filters the entities to process only those of type `ADDRESS` that are not marked
    as internal (`is_internal` is false).

    3. For each suitable entity, makes a GET request to the IBM XForce API (`/ipr/malware/{ip_address}`)
    to fetch the associated malware report.

    4. If a report is found, extracts the malware details (such as MD5, domain, first
    seen, last seen, families) and constructs a CSV table to attach to the entity.

    5. Enriches the entity's additional properties with the total malware count.

    6. If the malware count is greater than zero, marks the entity as suspicious and
    creates an insight indicating the malware association.

    7. Updates the enriched entities within the Google SecOps platform and attaches
    the raw JSON results to the action's output.


    ### Additional Notes

    This action relies solely on integration-level configuration parameters for authentication
    and does not require any action-specific parameters.
