Get Hash Info:
  ai_description: >-
    ### General Description

    Queries IBM X-Force for threat intelligence regarding file hashes. This action
    retrieves reputation data, including risk scores and malware family information,
    to assist in the analysis of potentially malicious files.


    ### Flow Description

    1. The action iterates over the provided target entities, filtering specifically
    for FILEHASH types.

    2. For each valid entity, it performs a GET request to the IBM X-Force API (`/malware/{file_hash}`)
    to retrieve the malware report.

    3. The action parses the API response to extract the risk score and associated
    malware families.

    4. It updates the entity's `additional_properties` with the retrieved data and
    marks the entity as enriched.

    5. The action compares the retrieved risk score against a user-defined threshold
    (default: 'low').

    6. If the risk score exceeds the threshold, the entity is marked as suspicious,
    and an insight is created in the SOAR platform.

    7. Finally, the action updates the entities in the SOAR platform and adds a summary
    table and the raw JSON results to the action output.


    ### Additional Notes

    This action requires valid IBM X-Force API credentials (API Key and Password)
    configured in the integration settings. The 'Threshold' parameter allows users
    to control the sensitivity of the suspicious flagging logic.
  ai_short_description: >-
    Queries IBM X-Force for threat intelligence on file hashes, updates entity properties,
    and flags suspicious hashes based on a configurable risk threshold.
