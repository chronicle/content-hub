    ### General Description

    This action queries the IBM XForce platform to retrieve reputation and threat
    intelligence for IP address entities. It fetches detailed information including
    risk scores, threat categories, and geolocation data. Based on a configurable
    risk threshold, the action can automatically flag entities as suspicious and generate
    insights within the case.


    ### Flow Description

    1. The action initializes the `XForceManager` using the provided API credentials
    and configuration.

    2. It iterates through the `target_entities` provided in the case, filtering specifically
    for entities of type `ADDRESS` that are marked as external (`is_internal` is false).

    3. For each valid IP, the action performs an API call to `xf_manager.get_ip_info(entity.identifier)`
    to retrieve the reputation report.

    4. The retrieved data is processed to extract the risk score, categories, and
    country.

    5. The entity's `additional_properties` are updated with the IBM XForce data,
    and the entity is marked as enriched.

    6. If the retrieved risk score exceeds the user-defined `Threshold` parameter,
    the action sets the entity's `is_suspicious` flag to true and creates an entity
    insight with the details.

    7. Finally, the action updates the entities in the platform and outputs a summary
    table and the full JSON response.


    ### Additional Notes

    - This action requires valid IBM XForce API credentials configured in the integration
    settings.

    - The `Threshold` parameter is optional; if not provided, it defaults to 1.
