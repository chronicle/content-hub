Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the IBM X-Force Exchange
    service. This action verifies that the integration is correctly configured and
    that the SOAR platform can successfully communicate with the X-Force API.


    ### Flow Description

    1. The action retrieves the X-Force integration configuration (Address, API Key,
    API Password, and Verify SSL) from the SOAR environment.

    2. It initializes the `XForceManager` class using the retrieved credentials.

    3. The action calls the `test_connectivity` method, which performs a sample API
    request (specifically, a GET request to retrieve information for the IP '8.8.8.8')
    to validate the connection.

    4. The action returns the connectivity status to the SOAR platform.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is reachable. It does not perform any data enrichment or state-changing operations.
