Block IP:
  ai_description: >-
    ### General Description

    This action blocks IP addresses by adding them to a specified list within the
    McAfee Web Gateway. This allows security teams to dynamically update blocklists
    on the gateway directly from the SOAR platform.


    ### Flow Description

    1. Initialize the `McAfeeWebGatewayManager` using credentials retrieved from the
    integration configuration.

    2. Retrieve the `Group Name` and `Description` from the action parameters.

    3. Iterate through the provided `target_entities` and filter for those of type
    `ADDRESS`.

    4. For each valid IP entity, call the `insert_entry_to_list_by_name` method of
    the `McAfeeWebGatewayManager` to add the IP (formatted as a CIDR /32 block) to
    the specified group.

    5. Commit the changes to the McAfee Web Gateway to ensure the update is applied.

    6. Log the success or failure of each operation and return a summary message to
    the SOAR platform.


    ### Additional Notes

    The target group must be pre-configured in the McAfee Web Gateway to be used by
    a rule that blocks IP addresses.
  ai_short_description: >-
    Blocks IP addresses by adding them to a specified list in McAfee Web Gateway.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the IP address to the specified blocklist/group on the McAfee Web Gateway.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the McAfee Web Gateway to add an entry
      to a list, which mutates external data. It does not fetch data, update internal
      entities, or create insights.
