    Tests connectivity to the McAfee Web Gateway server by attempting to authenticate
    using the provided integration configuration.


    ### Flow Description

    1. Retrieves the integration configuration parameters (Server Address, Username,
    Password).

    2. Initializes the McAfee Web Gateway manager, which makes an API call to authenticate
    with the server.

    3. Makes an API call to log out of the server.

    4. If no exceptions are raised during the process, it outputs a success message
    indicating successful connectivity.


    ### Additional Notes

    This action is typically used to verify that the integration is configured correctly
