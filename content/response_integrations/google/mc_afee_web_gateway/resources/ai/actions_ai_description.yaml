Insert Item To Group:
  ai_description: >-
    ### General Description

    Inserts a specified network object (such as an IP address or URL) into a designated
    group or list within McAfee Web Gateway. This action allows analysts to dynamically
    update gateway lists for policy enforcement or categorization.


    ### Flow Description

    1. Retrieves the target group name, the item to insert, and an optional description
    from the action parameters.

    2. Authenticates with the McAfee Web Gateway API.

    3. Makes a GET request to retrieve available lists and resolves the provided group
    name to its corresponding list ID.

    4. Makes a POST request to insert the new item into the resolved list.

    5. Makes a POST request to commit the configuration changes to the gateway.

    6. Returns a success or failure message based on the API response.


    ### Additional Notes

    Each group in McAfee Web Gateway is type-strict. Ensure that the item being inserted
    matches the expected data type (e.g., IP, URL) of the target group, otherwise
    the insertion will fail.
  ai_short_description: >-
    Inserts a specified network object (such as an IP address or URL) into a designated
    group or list within McAfee Web Gateway.
