Ping:
  ai_description: >-
    General Description: Tests the connectivity to the McAfee Web Gateway by attempting
    to authenticate with the provided credentials and then terminating the session.
    This action verifies that the integration configuration is valid and that the
    SOAR platform can successfully communicate with the target McAfee Web Gateway
    instance.


    Flow Description:

    1. The action retrieves the integration configuration parameters, specifically
    the 'Server Address', 'Username', and 'Password', from the McAfeeWebGateway integration
    settings.

    2. It initializes the `McAfeeWebGatewayManager` using these credentials.

    3. The manager performs a POST request to the McAfee Web Gateway API '/login'
    endpoint to establish a session.

    4. Upon successful authentication, the manager immediately performs a POST request
    to the '/logout' endpoint to close the session.

    5. If no exceptions are raised during this process, the action returns a success
    message indicating that the connection was established successfully.


    Additional Notes: This action is intended for troubleshooting and verifying connectivity.
    It does not perform any data retrieval or modification operations on the McAfee
    Web Gateway beyond session management.
