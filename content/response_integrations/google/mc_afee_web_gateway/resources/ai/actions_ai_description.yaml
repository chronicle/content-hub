Block IP:
  ai_description: >-
    ### General Description

    Blocks specific IP address entities by adding them to an "IP range"-type group
    on McAfee Web Gateway. This action initiates a state change on the external device
    to prevent network traffic to or from the specified entity.


    ### Flow Description

    1. Initializes a connection to the McAfee Web Gateway using the provided credentials.

    2. Iterates through the target entities, filtering specifically for IP addresses
    (ADDRESS).

    3. For each valid IP address, makes an API call to insert the IP (formatted with
    a /32 subnet mask) into the specified group list.

    4. Collects successful and failed operations to construct the final output message
    and result value.


    ### Additional Notes

    The target group specified in the parameters must be configured as part of a rule
    used to block IP addresses within the McAfee Web Gateway for the block to be effective.
  ai_short_description: >-
    Blocks specific IP address entities by adding them to a designated group list
    on McAfee Web Gateway.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the IP address to a specified group list on the McAfee Web Gateway to block
      it.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action iterates over target entities and makes a POST request to McAfee
      Web Gateway to insert an IP address into a list, which mutates external data.
      It does not fetch data, update internal entities, create insights, or modify
      alert data.
