    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Inserts a new network object (like an IP or URL) into a specified group or list
      on the McAfee Web Gateway and commits the configuration change.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes POST requests to the McAfee Web Gateway API to insert a new
      entry into a list and commit the changes, which mutates external data. It does
      not fetch contextual enrichment data, nor does it mutate internal SecOps data
