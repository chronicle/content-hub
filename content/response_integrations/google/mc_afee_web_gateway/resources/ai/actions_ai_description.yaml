Insert Item To Group:
  ai_description: >-
    ### General Description

    Inserts a network object (such as an IP address or URL) into a specified group
    or list within the McAfee Web Gateway. This action allows for the dynamic management
    of security lists, enabling the addition of indicators to existing groups on the
    appliance.


    ### Flow Description

    1. The action retrieves the necessary configuration (Server Address, Username,
    Password) and input parameters (Group Name, Item To Insert, Description) from
    the action settings.

    2. The `McAfeeWebGatewayManager` is initialized to establish an authenticated
    session with the McAfee Web Gateway appliance.

    3. The action calls `get_list_id_by_name` to resolve the provided `Group Name`
    to a specific list ID on the appliance.

    4. A POST request is sent to the McAfee Web Gateway API endpoint (`/list/{list_id}/entry/0/insert`)
    with an XML payload containing the item and its description.

    5. The action calls the `commit` method to persist the changes on the appliance.

    6. The session is terminated via the `logout` method.

    7. The action concludes by returning a success or failure message based on the
    API response.


    ### Additional Notes

    - The `Group Name` must exist on the McAfee Web Gateway appliance.

    - The `Item To Insert` must conform to the type restrictions of the target group
    (e.g., IP format for IP lists).

    - This action performs a state-changing operation on the external McAfee Web Gateway
    system.
  ai_short_description: >-
    Inserts a network object (IP, URL, etc.) into a specified group or list on the
    McAfee Web Gateway.
