name: LogRhythm Cases Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: The field name used to determine the device product.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: The field name used to determine the event name (sub-type).
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '180'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Api Root
    default_value: https:/{{IP}}:8501
    type: string
    description: API root of the LogRhythm instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Api Token
    default_value: ''
    type: password
    description: LogRhythm API token
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        LogRhythm server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alerts Count Limit
    default_value: '10'
    type: integer
    description: How many cases to process per one connector iteration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '1'
    type: integer
    description: Number of days before the first connector iteration to retrieve cases
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Priority To Fetch
    default_value: ''
    type: integer
    description: 'The lowest priority that needs to be used to fetch cases. If nothing
        is provided, cases with all priorities will be ingested. Possible values:
        from 1 to 5.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull cases from LogRhythm.
integration: LogRhythm
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logrhythm#logrhythm-cases-connector
rules: []
is_connector_rules_supported: false
creator: admin
