name: List Case Evidence
description: List case evidence in LogRhythm.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logrhythm#list_case_evidence
integration_identifier: LogRhythm
parameters:
-   name: Case ID
    default_value: ''
    type: string
    description: Specify the ID of the case for which you want to return a list of
        evidence.
    is_mandatory: true
-   name: Status Filter
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of status filters for the evidence.
        Possible values: pending, completed, failed. If nothing is provided, action
        will return evidence from all statuses.'
    is_mandatory: false
-   name: Type Filter
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of type filters for the evidence.
        Possible values: alarm, userEvents, log, note, file. If nothing is provided,
        action will return evidence from all types.'
    is_mandatory: false
-   name: Max Evidences To Return
    default_value: '50'
    type: string
    description: 'Specify how much evidence to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_case_evidence_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
