name: Update Case
description: Update a case in LogRhythm.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logrhythm#update_case
integration_identifier: LogRhythm
parameters:
-   name: Case ID
    default_value: ''
    type: string
    description: Specify the id of the case that needs to be updated.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify a new name for the case.
    is_mandatory: false
-   name: Priority
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - '1'
    - '2'
    - '3'
    - '4'
    - '5'
    description: Specify a new priority for the case.
    is_mandatory: false
-   name: Due Date
    default_value: ''
    type: string
    description: 'Specify a new due date for the case. Format: ISO 8601. Example:
        2021-04-23T12:38Z'
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Specify a new description for the case.
    is_mandatory: false
-   name: Resolution
    default_value: ''
    type: string
    description: Specify how the case was resolved.
    is_mandatory: false
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Created
    - Completed
    - Incident
    - Mitigated
    - Resolved
    description: Specify the new status for the case.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_case_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
