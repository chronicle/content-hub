name: Create Case
description: Create a case in LogRhythm.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logrhythm#create_case
integration_identifier: LogRhythm
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name for the case.
    is_mandatory: true
-   name: Priority
    default_value: '1'
    type: ddl
    optional_values:
    - '1'
    - '2'
    - '3'
    - '4'
    - '5'
    description: Specify the priority for the case.
    is_mandatory: true
-   name: Due Date
    default_value: ''
    type: string
    description: 'Specify the due date for the case. Format: ISO 8601. Example: 2021-04-23T12:38Z'
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Specify a description for the case.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_case_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
