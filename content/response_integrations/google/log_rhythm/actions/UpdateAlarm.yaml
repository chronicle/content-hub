name: Update Alarm
description: Update Alarm in LogRhythm.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logrhythm#update_alarm
integration_identifier: LogRhythm
parameters:
-   name: Alarm ID
    default_value: ''
    type: string
    description: Specify the ID of the alarm that needs to be updated in LogRhythm.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - Open
    - Working
    - Escalated
    - Closed
    - False Alarm
    - Resolved
    - Unresolved
    - Reported
    - Monitor
    description: Specify the status for the alarm.
    is_mandatory: false
-   name: Risk Score
    default_value: ''
    type: string
    description: 'Specify a new risk score for the alarm. Maximum: 100.'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
