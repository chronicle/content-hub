name: List Entity Events
description: 'List events related to entities in LogRhythm. Supported entities: Hostname,
    IP Address, User, CVE, Hash, URL. Note: Action is running as async, please adjust
    script timeout value in Siemplify IDE for action as needed.'
integration_identifier: LogRhythm
parameters:
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If “Custom” is selected, you
        also need to provide “Start Time”.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if “Custom” is selected for the “Time Frame” parameter. Format: ISO 8601.
        Example: 2021-04-23T12:38Z'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and “Custom” is selected for the “Time Frame” parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Sort Order
    default_value: Datetime ASC
    type: ddl
    optional_values:
    - Datetime ASC
    - Datetime DESC
    - Risk ASC
    - Risk DESC
    description: Specify the sorting logic for the query.
    is_mandatory: false
-   name: Max Events To Return
    default_value: '50'
    type: string
    description: 'Specify how many events to return. Default: 50'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_entity_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "DestinationURL", "FILEHASH",
    "USERUNIQNAME", "CVE"]}'
