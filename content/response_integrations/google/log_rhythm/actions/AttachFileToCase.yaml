name: Attach File To Case
description: 'Attach file to case in LogRhythm. Note: Action is running as async,
    please adjust script timeout value in Siemplify IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logrhythm#attach_file_to_case
integration_identifier: LogRhythm
parameters:
-   name: Case ID
    default_value: ''
    type: string
    description: Specify the ID of the case to which you want to attach files.
    is_mandatory: true
-   name: File Paths
    default_value: ''
    type: string
    description: Specify a comma-separate list of absolute file paths.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: Specify a note that should be added to the case alongside the file.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/attach_file_to_case_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
