name: Sync Closed Alarms
parameters:
-   name: Api Root
    default_value: https:/{{IP}}:8501
    type: string
    description: ''
    is_mandatory: true
-   name: Api Token
    default_value: ''
    type: password
    description: ''
    is_mandatory: true
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: ''
    is_mandatory: true
-   name: Max Hours Backwards
    default_value: '24'
    type: string
    description: ''
    is_mandatory: false
description: 'This job will synchronize closed LogRhythm alarms and Siemplify alerts.
    Note: in LogRhythm statuses “Closed”, “Closed False Alarm”, “Closed Resolved”,
    “Closed Unresolved”, “Closed Reported”, “Closed Monitor” are treated as closed.'
integration: LogRhythm
creator: admin
