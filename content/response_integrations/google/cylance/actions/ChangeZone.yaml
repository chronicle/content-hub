name: Change Zone
description: Change zone for an endpoint (group of endpoints)
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cylance#change_zone
integration_identifier: Cylance
parameters:
-   name: Zones to Add
    default_value: ''
    type: string
    description: The new Zone to add. Comma separated.
    is_mandatory: false
-   name: Zones to Remove
    default_value: ''
    type: string
    description: The Zone to be removed. Comma separated.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
