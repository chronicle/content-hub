name: Get Threat Download Link
description: Action fetches The URL you can use to download the file. The action only
    provides the URL, it does not download the file for you.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cylance#get_threat_download_link
integration_identifier: Cylance
parameters:
-   name: Threat SHA256 Hash
    default_value: ''
    type: string
    description: Threat SHA256 hashes, in a comma separated list. Note - if parameter
        value will be left empty, action will use file hash entities as input.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_threat_download_link_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH"]}'
