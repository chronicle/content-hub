name: Get Global List
description: Retrieve a list of all hashes in the specified global list (GlobalSafe
    or GlobalQuarantine)
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cylance#get_global_list
integration_identifier: Cylance
parameters:
-   name: List Type
    default_value: ''
    type: string
    description: Name of the global list. e.g. GlobalSafe
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_global_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: System
