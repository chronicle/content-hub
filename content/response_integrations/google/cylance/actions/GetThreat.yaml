name: Get Threat
description: Enrich a hash with data from Cylance
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cylance#get_threat
integration_identifier: Cylance
parameters:
-   name: Threshold
    default_value: '0'
    type: string
    description: Mark entity as suspicious if the threat Cylance score pass the given
        threshold. e.g. 3
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_threat_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH"]}'
