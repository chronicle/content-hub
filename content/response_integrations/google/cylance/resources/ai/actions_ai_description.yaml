Change Zone:
  ai_description: >-
    ### General Description

    Changes the zone assignment for endpoint devices in Cylance. This action allows
    analysts to add or remove specific zones for endpoints identified by their IP
    address or hostname.


    ### Flow Description

    1. Initializes the Cylance integration and retrieves the action parameters (`Zones
    to Add`, `Zones to Remove`).

    2. Iterates through the target entities, specifically looking for `Address` and
    `Hostname` entity types.

    3. For each valid entity, it queries the Cylance API (via GET request to `/devices/v2`)
    to resolve the device ID using the entity's identifier (IP or hostname).

    4. Makes a PUT request to the Cylance API (`/devices/v2/{device_id}`) to update
    the device's zone assignments, adding or removing the specified zones.

    5. Returns a summary message listing the affected entities and the zones that
    were added or removed.


    ### Additional Notes

    The action requires at least one zone to be specified in either the 'Zones to
    Add' or 'Zones to Remove' parameters. If an entity cannot be found in Cylance,
    it will be skipped and an error will be logged.
