  ai_description: >-
    ### General Description

    Adds a file hash to a specified global list (GlobalSafe or GlobalQuarantine) in
    Cylance. This action allows analysts to manage threat indicators by explicitly
    allowing or quarantining specific file hashes across the Cylance environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | List Type | String | Yes | The list to add the hash to (e.g., GlobalSafe, GlobalQuarantine).
    |

    | Category | String | No | The category of the hash. |

    | Reason | String | No | The reason for adding the hash to the list. |


    ### Flow Description

    1. Retrieves the action configuration and initializes the Cylance API client.

    2. Iterates over the target entities, filtering for `FILEHASH` entities.

    3. For each valid entity, sends a request to Cylance to add the hash to the specified
    global list.

    4. Collects the results and outputs a summary message detailing which hashes were
    successfully added, which already existed in the list, and which failed.
