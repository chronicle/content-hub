Change Policy:
  ai_description: >-
    ### General Description

    Changes the assigned policy of an endpoint (device) in Cylance to a specified
    existing policy. This action initiates a state change on the external Cylance
    platform to update the security policy applied to the target host or IP address.


    ### Flow Description

    1. Iterates over the target entities provided in the SecOps case.

    2. Filters the entities to include only `Hostname` and `IP Address` types.

    3. For each valid entity, queries the Cylance API to retrieve the corresponding
    device ID.

    4. Sends a PUT request to Cylance to update the device's policy to the one specified
    in the action parameters.

    5. Returns a summary message listing the entities that had their policies successfully
    changed.


    ### Additional Notes

    The action requires the exact name of an existing policy in Cylance to be provided
    in the parameters. If an entity cannot be found in Cylance, it will be skipped.
