Add To Global List:
  ai_description: >-
    General Description: Adds a file hash to a specified global list (GlobalSafe or
    GlobalQuarantine) within the Cylance platform. This action allows security analysts
    to manage threat intelligence lists directly from the SOAR platform, facilitating
    the blocking or whitelisting of malicious or benign files.


    Flow Description:

    1. The action retrieves the required configuration parameters: 'List Type', 'Category',
    and 'Reason'.

    2. It iterates through the provided target entities, filtering specifically for
    entities of type 'FILEHASH'.

    3. For each valid file hash, the action calls the Cylance API (via the CylanceManager)
    to add the hash to the designated global list.

    4. The action handles the API response: if the hash is successfully added, it
    is marked as affected; if the hash already exists in the list (HTTP 409), it is
    tracked as an existing entry.

    5. Finally, the action generates an output message summarizing the status of each
    processed entity (added, already exists, or failed).


    Additional Notes: This action requires valid Cylance API credentials. The 'List
    Type' parameter determines whether the hash is added to the 'GlobalSafe' (allowlist)
    or 'GlobalQuarantine' (blocklist) list.
  ai_short_description: >-
    Adds a file hash to a specified global list (GlobalSafe or GlobalQuarantine) in
    the Cylance platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the file hash to the specified GlobalSafe or GlobalQuarantine list in the
      Cylance platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Cylance API to modify global lists
      (external data mutation). It does not fetch data, update internal entities,
      or modify alert data.
