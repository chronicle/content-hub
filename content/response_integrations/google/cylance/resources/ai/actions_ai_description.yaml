    GlobalQuarantine) within Cylance. This action allows analysts to dynamically manage
    allowlists and blocklists by removing previously added indicators.


    ### Flow Description

    1. Retrieves the target global list type from the action parameters.

    2. Iterates through the target entities, filtering specifically for `FILEHASH`
    entities.

    3. For each valid file hash, makes a DELETE API call to Cylance to remove the
    hash from the specified global list.

    4. Collects the successfully processed hashes and outputs a summary message detailing
    which hashes were removed.


    ### Additional Notes

    This action modifies the state of the Cylance global lists and can be used to
    remove items from either an allowlist (GlobalSafe) or a blocklist (GlobalQuarantine)
    depending on the list type provided in the parameters.
