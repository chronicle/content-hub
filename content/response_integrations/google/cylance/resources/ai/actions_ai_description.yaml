Add To Global List:
  ai_description: >-
    ### General Description

    Adds a file hash entity to a specified global list (GlobalSafe or GlobalQuarantine)
    in Cylance. This action allows analysts to explicitly allow or block the execution
    of specific files across the environment by updating the external security controls.


    ### Flow Description

    1. Iterates over all target entities provided in the case.

    2. Filters the entities to process only those of type `FILEHASH`.

    3. For each valid file hash, makes a POST request to the Cylance API to add the
    hash to the specified global list (e.g., GlobalSafe or GlobalQuarantine), including
    the provided category and reason.

    4. Collects the results and outputs a summary message indicating which hashes
    were successfully added, which already existed in the list, and which failed.


    ### Additional Notes

    The action requires the list type to be specified (default is GlobalSafe). If
    a hash already exists in the specified list, the action will note it in the output
    message without failing.
  ai_short_description: >-
    Adds a file hash entity to a specified global list (GlobalSafe or GlobalQuarantine)
    in Cylance to allow or block its execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a file hash to a global list (GlobalSafe or GlobalQuarantine) in Cylance.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Cylance API to add a file hash to a global
      list, which mutates external data. It does not fetch additional contextual data,
      update internal entities, or create insights.
