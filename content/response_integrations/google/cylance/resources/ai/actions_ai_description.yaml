Get Threat:
  ai_description: >-
    ### General Description

    Enriches file hash entities using threat intelligence data from Cylance. This
    action retrieves detailed threat information for a given file hash, evaluates
    its risk based on a configurable Cylance score threshold, and updates the entity
    within the SOAR platform with the retrieved metadata.


    ### Flow Description

    1. The action retrieves the Cylance integration configuration (Server Address,
    Application ID, Application Secret, Tenant Identifier).

    2. It iterates through the provided target entities, filtering specifically for
    entities of type `FILEHASH`.

    3. For each valid entity, the action calls the Cylance API (`cm.get_threat`) to
    retrieve threat intelligence associated with the file hash.

    4. If threat data is returned, the action compares the `cylance_score` against
    the user-provided `Threshold` parameter.

    5. If the score exceeds the threshold, the entity's `is_suspicious` flag is set
    to `True`.

    6. The action flattens the retrieved threat data, prefixes keys with "Cylance",
    and updates the entity's `additional_properties` with this information.

    7. The entity is marked as enriched (`is_enriched = True`) and added to a list
    of affected entities.

    8. Finally, the action calls `siemplify.update_entities` to persist the changes
    to the entities in the SOAR platform and returns a summary of found threats.


    ### Additional Notes

    This action requires valid Cylance API credentials configured in the integration
    settings. The `Threshold` parameter allows for automated risk assessment based
    on the Cylance score.
