Get Global List:
  ai_description: >-
    ### General Description

    Retrieves a list of hashes from a specified Cylance global list (e.g., GlobalSafe
    or GlobalQuarantine). This action allows analysts to audit or verify the contents
    of these lists directly from the Cylance platform.


    ### Flow Description

    1. The action initializes the `CylanceManager` using the configured integration
    credentials (Server Address, Application ID, Application Secret, and Tenant Identifier).

    2. It retrieves the `List Type` parameter provided by the user.

    3. The action calls the Cylance API (`/globallists/v2`) to fetch the requested
    global list.

    4. If data is returned, the action flattens the list of dictionaries and constructs
    a CSV representation.

    5. The action attaches the CSV data as a table to the action result and adds the
    raw JSON response to the result output.

    6. Finally, it terminates with a success message indicating the list has been
    retrieved.


    ### Additional Notes

    This action is primarily used for administrative and auditing purposes to view
    the current state of Cylance global lists. It does not perform any modifications
    to the lists or the entities within the SOAR platform.
