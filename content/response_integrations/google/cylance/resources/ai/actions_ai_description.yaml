Change Policy:
  ai_description: >-
    ### General Description

    Changes the security policy of an endpoint (device) within the Cylance platform.
    This action allows administrators to update the policy assigned to specific devices
    identified by hostname or IP address.


    ### Flow Description

    1. Initialize the CylanceManager with the provided integration configuration (Server
    Address, Application ID, Application Secret, Tenant Identifier).

    2. Retrieve the target policy ID from the Cylance platform based on the provided
    'Policy Name'.

    3. Iterate through the provided target entities.

    4. For each entity (if it is an ADDRESS or HOSTNAME), resolve the device ID in
    Cylance using the `get_device_by_name` method.

    5. Execute the `change_device_policy` method, which performs a PUT request to
    the Cylance API to update the device's policy.

    6. Return a summary message indicating which entities were successfully updated.


    ### Additional Notes

    This action requires valid Cylance API credentials. It supports both HOSTNAME
    and ADDRESS entity types.
