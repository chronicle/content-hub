Change Zone:
  ai_description: >-
    ### General Description

    Changes the zone assignment for specified endpoints (devices) within the Cylance
    platform. This action allows administrators to dynamically manage device grouping
    by adding or removing devices from specific zones.


    ### Flow Description

    1. The action retrieves the `Zones to Add` and `Zones to Remove` parameters provided
    by the user.

    2. It iterates through the provided `HOSTNAME` and `ADDRESS` entities.

    3. For each valid entity, the action calls the Cylance API (`get_device_by_name`)
    to resolve the entity identifier to a Cylance device ID.

    4. The action then performs a `PUT` request to the Cylance API (`change_device_zone`)
    to update the device's zone membership by applying the specified additions and
    removals.

    5. Finally, the action generates a summary message listing the affected entities
    and the changes performed.


    ### Additional Notes

    This action requires valid Cylance API credentials configured in the integration.
    It supports both hostname and IP address entities. If an error occurs during the
    processing of a specific entity, the action logs the error and continues to the
    next entity.
