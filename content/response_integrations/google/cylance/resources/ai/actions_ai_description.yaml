    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a file hash to the GlobalSafe or GlobalQuarantine list in Cylance.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action does not fetch data for enrichment. It makes a POST request to Cylance
      to add a file hash to a global list, which mutates external data. It does not
      update internal entities, create insights, or add case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding a hash to a global list, so it cannot
      be an enrichment action. Since it can add a hash to a quarantine list (blocklist),
      it is considered a remediation action.
    remediation: true
