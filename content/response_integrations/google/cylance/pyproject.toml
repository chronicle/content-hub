[project]
name = "Cylance"
version = "20.0"
description = "BlackBerry Cylance is an advanced threat protection platform that, unlike other traditional endpoint protection software, makes no use of malware signatures. Instead, it employs techniques such as machine learning and artificial intelligence, which allows the identification of malicious code based on its behavior. This ensures protection even against zero-day codes, malware that has never been seen before. Among its key features, Cylance includes: True zero-day prevention, AI-driven malware prevention, Script management, Device usage policy enforcement, Memory exploitation detection and prevention, Application control for fixed-function devices"
requires-python = ">=3.11,<3.12"
dependencies = [ "pyjwt==2.8.0", "pytz>=2026.1.post1", "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.11-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
