Add Pattern To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds specified string patterns to existing Regex Pattern Sets within AWS WAF.
    This action allows users to manage and update regex patterns in AWS WAF, ensuring
    that security rules are kept up-to-date with the latest threat intelligence or
    requirements.


    ### Flow Description

    1. Extracts AWS credentials and action parameters (Regex Pattern Set Names, Patterns,
    Scope) from the integration configuration and action settings.

    2. Initializes the `AWSWAFManager` and validates connectivity to the AWS WAF service.

    3. Lists existing Regex Pattern Sets in the specified scope (CloudFront, Regional,
    or both) using the `list_regex_pattern_sets` API call.

    4. Identifies the target Regex Pattern Sets based on the provided names.

    5. For each target set, retrieves the current list of regex patterns using the
    `get_regex_pattern_set` API call.

    6. Filters out patterns that already exist in the set to avoid duplicates.

    7. Checks if the set has available capacity (AWS WAF Regex Pattern Sets have a
    fixed limit of 10 patterns per set).

    8. Updates the Regex Pattern Set in AWS WAF with the new patterns using the `update_regex_pattern_set`
    API call if capacity allows.

    9. Returns a summary of successfully added patterns, duplicates, and any failures.


    ### Additional Notes

    Regex Pattern Sets in AWS WAF have a fixed limit of 10 patterns per set. The action
    will skip patterns that exceed this limit and report them as failed.
