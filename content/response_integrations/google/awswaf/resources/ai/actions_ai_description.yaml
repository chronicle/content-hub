Create IP Set:
  ai_description: >-
    ### General Description

    Creates an IP Set in AWS WAF using provided IP address entities. This action allows
    security teams to group IP addresses into a managed set within AWS WAF, which
    can then be used for security rules and policies.


    ### Flow Description

    1. Extracts AWS configuration (Access Key, Secret Key, Region) and action parameters
    (Name, Scope, Description, Tags).

    2. Initializes the AWS WAF client and validates connectivity.

    3. Iterates through target entities, filtering for IP addresses (ADDRESS type).

    4. Masks IP addresses (e.g., /32 for IPv4, /128 for IPv6) and groups them by IP
    version.

    5. Calls the AWS WAF API (`create_ip_set`) to create the IP Set in the specified
    scope (CloudFront, Regional, or Both).

    6. Handles duplicate IP Set errors and logs success or failure for each entity.

    7. Adds the result JSON to the action output and ends the action.


    ### Additional Notes

    The IP Set name is automatically formatted as `Siemplify_{Name}_{IP Type}`. The
    action supports creating IP Sets in Regional, CloudFront, or both scopes simultaneously.
  ai_short_description: >-
    Creates an IP Set in AWS WAF using provided IP address entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new IP Set resource in AWS WAF.
