Remove Entity From Regex Pattern Set:
  ai_description: >-
    ### General Description

    Removes string patterns derived from URL and IP Address entities from a specified
    Regex Pattern Set in AWS WAF. This action modifies the configuration of AWS WAF
    by deleting specific regex patterns that match the provided entities, effectively
    updating the match conditions for associated WAF rules.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the specified Regex Pattern Sets based on the provided names and
    scope (CloudFront, Regional, or Both).

    3. Iterates through the target entities, filtering specifically for URL and IP
    Address entity types.

    4. Formats the entity identifiers into regex patterns. If the `Domain Pattern`
    or `IP Pattern` parameters are enabled, it wraps the domain or IP in an HTTP/HTTPS
    protocol regex format; otherwise, it uses the raw identifier.

    5. Fetches the existing regex list for each matched Regex Pattern Set via the
    AWS WAF API (`get_regex_pattern_set`).

    6. Identifies the entity-based patterns that currently exist within the set and
    removes them from the list.

    7. Updates the Regex Pattern Set in AWS WAF with the modified pattern list via
    an API call (`update_regex_pattern_set`).


    ### Additional Notes

    - The action supports both CloudFront and Regional scopes. If "Both" is selected,
    it will attempt to remove the patterns from sets in both scopes.

    - Entities of unsupported types are skipped automatically.

    - If a generated regex pattern does not exist in the target Regex Pattern Set,
    the action will simply log it and continue without failing.
