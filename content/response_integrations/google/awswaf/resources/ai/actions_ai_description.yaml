Add IP To IP Set:
  ai_description: >-
    ### General Description

    Adds IP addresses to specified IP Sets in AWS WAF. This action allows security
    teams to dynamically update AWS WAF IP Sets with malicious IP addresses identified
    during an investigation, effectively blocking or allowing traffic based on the
    IP Set configuration.


    ### Flow Description

    1. The action extracts the required AWS credentials (Access Key, Secret Key, Region)
    and action parameters (IP Set Names, Scope) from the integration configuration.

    2. It initializes the `AWSWAFManager` and validates connectivity to the AWS WAF
    service.

    3. It retrieves existing IP Sets from the specified scope (CloudFront, Regional,
    or Both) using the `list_ip_sets` API call.

    4. It filters the retrieved IP Sets to identify those matching the provided `IP
    Set Names`.

    5. The action iterates through the `target_entities` provided in the case, filtering
    for entities of type `ADDRESS`.

    6. For each valid IP entity, it validates the IP version (IPv4 or IPv6) against
    the target IP Set's version.

    7. It masks the IP addresses (e.g., /32 for IPv4, /128 for IPv6) to comply with
    AWS WAF requirements.

    8. It updates the AWS WAF IP Set with the new IP addresses using the `update_ip_set`
    API call.

    9. Finally, it logs the success or failure of the operation for each IP Set and
    provides a summary output message.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to list
    and update WAF IP Sets. The action supports both CloudFront and Regional scopes.
    If an IP address version does not match the IP Set version, the action will fail
    to add that specific IP to that IP Set.
  ai_short_description: >-
    Adds IP addresses to specified IP Sets in AWS WAF to manage network traffic filtering.
