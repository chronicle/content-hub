Create Regex Pattern Set:
  ai_description: >-
    General Description

    Creates a Regex Pattern Set in AWS WAF based on the provided URL or IP address
    entities. This action allows users to define a set of regex patterns to be used
    for traffic inspection and control within AWS WAF.


    Flow Description

    1. Initialize the AWS WAF client using the provided credentials.

    2. Iterate through the target entities (URL and ADDRESS types).

    3. If the 'Domain Pattern' parameter is enabled, extract the domain from URL entities
    and wrap it in a regex pattern.

    4. If the 'IP Pattern' parameter is enabled, wrap IP address entities in a regex
    pattern.

    5. Aggregate the generated regex patterns into a `RegexSet`.

    6. Call the `create_regex_pattern_set` method in the AWS WAF service for the specified
    scope (CloudFront, Regional, or Both).

    7. Handle any errors, such as duplicate items or limit exceeded exceptions.

    8. Return the result JSON containing the names of the created Regex Pattern Sets.


    Additional Notes

    Regex Pattern Sets are limited to 10 patterns per set, and there is a maximum
    of 10 Regex Pattern Sets allowed in AWS WAF.
