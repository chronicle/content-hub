Add Entity To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds string patterns based on URL and IP Address entities to specified Regex Pattern
    Sets in AWS WAF. This action allows security teams to dynamically update AWS WAF
    configurations with regular expressions derived from case entities.


    ### Flow Description

    1. Establishes a connection to the AWS WAF service using the provided integration
    credentials.

    2. Retrieves existing Regex Pattern Sets from AWS WAF based on the provided `Regex
    Pattern Set Names` and `Scope` (CloudFront, Regional, or Both).

    3. Iterates through the target entities, filtering specifically for URL and IP
    Address entity types.

    4. Converts the entity identifiers into regular expressions. If `Domain Pattern`
    is enabled, it extracts the domain from URLs and wraps it in an HTTP/HTTPS regex
    pattern. If `IP Pattern` is enabled, it wraps the IP address in a similar regex
    pattern.

    5. Calls the AWS WAF API (`update_regex_pattern_set`) to append the newly generated
    regex patterns to the target Regex Pattern Sets.


    ### Additional Notes

    AWS WAF enforces a strict quota limit of 10 regular expressions per Regex Pattern
    Set. If adding the new patterns exceeds this limit, the action will add as many
    as possible up to the limit and report the remaining patterns as failed.
  ai_short_description: >-
    Adds regular expression patterns derived from URL and IP Address entities to specified
    Regex Pattern Sets in AWS WAF.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds regular expressions derived from URL and IP address entities to specified
      Regex Pattern Sets in AWS WAF.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action mutates external data by calling the AWS WAF API (`update_regex_pattern_set`)
      to add new regular expressions to existing Regex Pattern Sets. It does not fetch
      enrichment data, mutate internal SecOps data, update entities, or create insights.
