Create IP Set:
  ai_description: >-
    ### General Description

    Creates a new IP Set in AWS WAF based on the provided IP Address entities. The
    IP Set is created with a specific naming convention (`Siemplify_{Name}_{IP Type}`)
    and can be applied to CloudFront, Regional, or both scopes.


    ### Flow Description

    1. Establishes a connection to the AWS WAF service using the provided credentials.

    2. Iterates over the target IP Address entities.

    3. Masks the IP addresses (appending `/32` for IPv4 and `/128` for IPv6) if they
    are not already masked.

    4. Groups the IP addresses by their IP version (IPv4 or IPv6).

    5. Calls the AWS WAF API to create the IP Sets for the specified scopes (CloudFront,
    Regional, or Both) containing the grouped IP addresses.

    6. Returns the created IP Sets and their details as JSON results.


    ### Additional Notes

    The action automatically handles IP masking and separates IPv4 and IPv6 addresses
    into different IP Sets, as AWS WAF requires IP Sets to contain addresses of a
    single IP version.
