Add Entity To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds string patterns derived from entities (URLs or IP addresses) to specified
    Regex Pattern Sets in AWS WAF. This action helps in automating the update of security
    policies by converting threat indicators into regex patterns that can be used
    for traffic filtering.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided credentials.

    2. Retrieves existing Regex Pattern Sets in the specified scope (CloudFront, Regional,
    or Both).

    3. Iterates through the target entities (URL and ADDRESS types).

    4. Converts entities into regex patterns based on the `Domain Pattern` and `IP
    Pattern` configuration flags.

    5. Checks for existing regexes in the target sets to avoid duplicates.

    6. Validates capacity (max 10 patterns per set) and updates the Regex Pattern
    Sets in AWS WAF via the `update_regex_pattern_set` API call.


    ### Additional Notes

    Regex Pattern Sets in AWS WAF have a fixed limit of 10 patterns per set. If the
    number of patterns exceeds this limit, the action will fail to add the additional
    patterns.
  ai_short_description: >-
    Adds entity-based regex patterns to specified AWS WAF Regex Pattern Sets.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the Regex Pattern Set in AWS WAF by adding new regex patterns derived
      from entities.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to list regex sets and a POST/PUT request to
      update them in AWS WAF. This mutates external data (the regex pattern set configuration)
      but does not mutate internal data or update entities.
