Add IP To IP Set:
  ai_description: >-
    ### General Description

    Adds IP addresses to specified IP Sets in AWS WAF. This action initiates a state
    change on the external AWS WAF service to append the IP addresses of the target
    entities to the configured IP Sets, which are typically used in Web ACL rules
    to block or allow network traffic.


    ### Flow Description

    1. Extracts the AWS WAF configuration and action parameters, including the target
    IP Set names and the scope (CloudFront, Regional, or Both).

    2. Connects to the AWS WAF service and validates the provided credentials.

    3. Retrieves the existing IP Sets from AWS WAF based on the specified scope.

    4. Filters the target entities to include only those of type `ADDRESS`.

    5. Iterates over the existing IP Sets and the supported entities, validating the
    IP address version against the IP Set's version.

    6. Masks the IP addresses if necessary (e.g., appending `/32` for IPv4 or `/128`
    for IPv6).

    7. Makes an API call (`update_ip_set`) to AWS WAF to add the validated and masked
    IP addresses to the respective IP Sets.

    8. Returns a summary message indicating which IPs were successfully added and
    which failed.


    ### Additional Notes

    - The action automatically handles IP masking required by AWS WAF (e.g., `/32`
    for IPv4 and `/128` for IPv6).

    - If an entity's IP version does not match the IP Set's configured IP version,
    the entity will be skipped for that specific IP Set.
  ai_short_description: >-
    Adds IP addresses to specified IP Sets in AWS WAF.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
