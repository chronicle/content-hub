Add Pattern To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds string patterns to a specified Regex Pattern Set in AWS WAF.


    ### Flow Description

    1. Connects to the AWS WAF service using the provided integration credentials.

    2. Retrieves the list of existing Regex Pattern Sets based on the specified scope
    (CloudFront, Regional, or Both) via the `list_regex_pattern_sets` API call.

    3. Filters the retrieved sets to find the ones matching the provided `Regex Pattern
    Set Names`.

    4. For each matching set, retrieves the current list of regular expressions via
    the `get_regex_pattern_set` API call.

    5. Checks for duplicate patterns and verifies that the set has available capacity
    (maximum 10 patterns per set).

    6. Updates the Regex Pattern Set in AWS WAF with the new patterns via the `update_regex_pattern_set`
    API call.

    7. Returns a summary of successful additions, duplicates, and any failures.


    ### Additional Notes

    The AWS WAF Regex Pattern Set has a hard limit of 10 patterns per set. If the
    limit is exceeded, the action will only add patterns up to the limit and report
    the rest as failed.
