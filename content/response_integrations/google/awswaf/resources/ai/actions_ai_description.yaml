Remove Rule From Rule Group:
  ai_description: >-
    ### General Description

    Removes a specific rule from one or more AWS WAF Rule Groups. This action allows
    users to manage their WAF configurations by programmatically deleting rules that
    are no longer needed or are causing false positives.


    ### Flow Description

    1. The action connects to the AWS WAF service using the provided AWS credentials.

    2. It lists existing Rule Groups within the specified scope (CloudFront, Regional,
    or Both) by calling the `list_rule_groups` API.

    3. It filters the retrieved Rule Groups to match the provided `Rule Group Names`.

    4. For each matching Rule Group, it retrieves the current list of rules by calling
    the `get_rule_group` API.

    5. It identifies and removes the rule matching the specified `Rule Name` from
    the rule list.

    6. If the rule list has changed, it updates the Rule Group in AWS WAF with the
    modified rule list by calling the `update_rule_group` API.


    ### Additional Notes

    The action supports multiple Rule Groups and scopes. It uses optimistic locking
    (via `lock_token`) to ensure data consistency during updates. If the specified
    rule is not found in a Rule Group, the action will report it as not found.
