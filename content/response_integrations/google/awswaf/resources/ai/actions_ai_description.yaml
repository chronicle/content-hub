Add Rule To Rule Group:
  ai_description: >-
    ### General Description

    Adds a new rule to one or more specified Rule Groups in AWS WAF. This action allows
    users to dynamically update their AWS WAF configuration by injecting a custom
    rule defined as a JSON object into existing Rule Groups.


    ### Flow Description

    1. Extracts the provided Rule Group names, Scope, and Rule JSON Object parameters.

    2. Validates the Rule JSON Object and extracts the rule name to ensure it is properly
    formatted.

    3. Establishes a connection to the AWS WAF service.

    4. Retrieves the list of existing Rule Groups in the specified scope (Regional,
    CloudFront, or Both) via the AWS WAF API.

    5. Iterates through the matching Rule Groups and fetches their current rules.

    6. Checks if the rule already exists within each Rule Group to prevent duplicates.

    7. Updates the Rule Group via the AWS WAF API (`update_rule_group`) by appending
    the new rule to the existing rule list.

    8. Returns a summary of successful updates, duplicates found, and any failed updates.


    ### Additional Notes

    The Rule JSON Object must be a valid JSON string that strictly matches the AWS
    WAF rule structure documentation. If the rule already exists in a target Rule
    Group, the action will skip adding it to that specific group to prevent duplication
    errors.
