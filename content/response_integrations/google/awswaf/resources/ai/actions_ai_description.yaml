    1. Initializes the connection to the AWS WAF service using the provided AWS credentials
    and region.

    2. Retrieves the list of existing Rule Groups based on the specified scope (CloudFront,
    Regional, or Both) via the `list_rule_groups` API call.

    3. Filters the retrieved Rule Groups to find those matching the provided `Rule
    Group Names`.

    4. For each matching Rule Group, fetches its current configuration and rule list
    using the `get_rule_group` API call.

