Add Rule To Rule Group:
  ai_description: >-
    ### General Description

    Adds a new rule to specified AWS WAF Rule Groups. This action allows users to
    dynamically update AWS WAF configurations by injecting a new rule into existing
    rule groups.


    ### Flow Description

    1. Extracts AWS credentials, rule group names, scope, and the rule JSON object
    from the action parameters.

    2. Validates the provided rule JSON object to ensure it is correctly formatted
    and contains a name.

    3. Connects to the AWS WAF service using the provided credentials.

    4. Lists existing rule groups in the specified scope(s) (CloudFront, Regional,
    or both).

    5. For each target rule group, retrieves its current configuration and lock token.

    6. Checks if the rule already exists in the group to avoid duplicates.

    7. Updates the rule group by appending the new rule to the existing rule list
    using the `update_rule_group` API call.


