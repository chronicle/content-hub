Create Rule Group:
  ai_description: >-
    ### General Description

    Creates a new rule group in AWS WAF. A rule group defines a collection of rules
    to inspect and control web requests that can be used in a WebACL. This action
    provisions the rule group with a defined capacity, visibility configuration (CloudWatch
    metrics and sampled requests), and optional tags.


    ### Flow Description

    1. Extracts action parameters including the rule group name, scope, capacity,
    and visibility settings.

    2. Establishes a connection to the AWS WAF service using the provided AWS credentials.

    3. Iterates through the specified scopes (Regional, CloudFront, or Both).

    4. Calls the AWS WAF API to create the rule group in the target scope(s).

    5. Collects the results, handling any duplicate rule group exceptions gracefully.

    6. Returns a JSON result containing the names of the successfully created rule
    groups mapped by their scope.


    ### Additional Notes

    - Rule group capacity is immutable once created. The maximum capacity limit for
    web ACLs is 1,500.

    - If a rule group with the same name already exists in the target scope, the action
    will catch the duplicate exception and report it in the output message without
    failing the entire execution.
