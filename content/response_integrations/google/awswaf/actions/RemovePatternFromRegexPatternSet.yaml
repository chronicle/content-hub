name: Remove Pattern From Regex Pattern Set
description: Remove patterns from the Regex Pattern Set in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Regex Pattern Set Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Regex Pattern set names. Example:
        name_1,name_2'
    is_mandatory: true
-   name: Patterns
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of patterns that should be removed
        from the Regex Pattern set. Example: pattern_1,pattern_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope of the set. If "Both" is selected,
        action will remove patterns from Regex Pattern sets in Regional and CloudFront
        scopes.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
