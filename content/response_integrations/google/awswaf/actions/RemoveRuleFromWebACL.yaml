name: Remove Rule From Web ACL
description: Remove a rule from Web ACL in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Web ACL Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Web ACL names. Example: name_1,name_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the removal of the Web ACL.
        If “Both” is selected, action will remove a Web ACL in Regional and CloudFront
        scopes.
    is_mandatory: true
-   name: Rule Name
    default_value: ''
    type: string
    description: Specify the name of the rule that should be deleted.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
