name: Remove Entity From Regex Pattern Set
description: Remove string patterns based on entities from the Regex Pattern Set in
    AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Regex Pattern Set Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Regex Pattern set names. Example:
        name_1,name_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope of the set. If "Both" is selected,
        action will remove patterns based on entities from Regex Pattern sets in Regional
        and CloudFront scopes.
    is_mandatory: true
-   name: Domain Pattern
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will retrieve domain part out of urls and search
        for a regex pattern based on them in the Regex Pattern Set. Example: http://test.com/folder
        will be searched as pattern ^(http|https)(:\/\/)(\Qtest.com\E).*'
    is_mandatory: false
-   name: IP Pattern
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will search for a regex pattern out of IP address
        instead of raw value. Example: 10.0.0.1 will be searched as ^(http|https)(:\/\/)(\Q10.0.0.1\E).*'
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities": ["DestinationURL", "ADDRESS"]}'
