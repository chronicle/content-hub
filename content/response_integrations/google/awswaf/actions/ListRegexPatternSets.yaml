name: List Regex Pattern Sets
description: List available Regex Pattern Sets in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the listing of Regex Pattern
        Sets.
    is_mandatory: true
-   name: Max Regex Pattern Sets To Return
    default_value: '5'
    type: string
    description: Specify how many Regex Patttern Sets to return. Default is 5. Maximum
        is 10
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_regex_pattern_sets_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
