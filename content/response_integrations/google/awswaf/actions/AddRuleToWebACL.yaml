name: Add Rule To Web ACL
description: 'Add a rule based on IP Sets or Rule Groups to Web ACL in AWS WAF. Note:
    at maximum Web ACL can contain 1500 rules.'
integration_identifier: AWSWAF
parameters:
-   name: Web ACL Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Web ACL names. Example: name_1,name_2'
    is_mandatory: true
-   name: Rule Source Type
    default_value: IP Set
    type: ddl
    optional_values:
    - IP Set
    - Rule Group
    description: Specify what rule type should be used.
    is_mandatory: true
-   name: Rule Source Name
    default_value: ''
    type: string
    description: Specify the name of the source, which should be used for Web ACL.
        If “Rule Source Type” is “IP Set”, action will search for IP Sets with that
        name. If “Rule Source Type” is “Rule Group”, action will search for Rule Groups
        with that name.
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the new rules. If “Both” is
        selected, action will add a Rule to a Web ACL in Regional and CloudFront scopes.
    is_mandatory: true
-   name: Rule Priority
    default_value: ''
    type: string
    description: Specify what should be the priority of the rule. Priorities in Web
        ACL should be unique.
    is_mandatory: true
-   name: IP Set Action
    default_value: Block
    type: ddl
    optional_values:
    - Allow
    - Block
    - Count
    description: Specify what should be the action for rules that are based on the
        IP set.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
