name: List Web ACLs
description: List available web ACLs in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the listing of Web ACLs.
    is_mandatory: true
-   name: Max Web ACLs To Return
    default_value: 50
    type: string
    description: Specify how many Web ACLs to return. Default is 50. Maximum is 100.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_web_ac_ls_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
