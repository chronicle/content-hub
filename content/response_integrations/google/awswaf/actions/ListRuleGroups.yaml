name: List Rule Groups
description: List available rule groups in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the listing of Rule Groups.
    is_mandatory: true
-   name: Max Rule Groups To Return
    default_value: 50
    type: string
    description: Specify how many Rule Groups to return. Default is 50. Maximum is
        100.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_rule_groups_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
