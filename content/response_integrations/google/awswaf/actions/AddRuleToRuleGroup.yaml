name: Add Rule To Rule Group
description: Add a rule to the rule group in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Rule Group Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Rule Group  names. Example:
        name_1,name_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the new rules. If “Both” is
        selected, action will add Rule to a Rule Group in Regional and CloudFront
        scopes.
    is_mandatory: true
-   name: Rule JSON Object
    default_value: ''
    type: string
    description: Specify the JSON object of the rule. Please refer to the action documentation
        to get information about the structure of the rule.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
