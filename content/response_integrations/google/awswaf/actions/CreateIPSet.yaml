name: Create IP Set
description: 'Create an IP Set in AWS WAF, based on entities. Note: IP Set is created
    in the following format Siemplify_{Name}_{IP Type}.'
integration_identifier: AWSWAF
parameters:
-   name: Name
    default_value: ''
    type: string
    description: 'Specify the name of the IP set. Note: action will create an IP set
        in the following format: Siemplify_{Name}_{IP Type}. The name must have 1-128
        characters. Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore).'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the creation of IP sets. If
        “Both” is selected, action will create an IP set in Regional and CloudFront
        scopes.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description for the IP set.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: 'Specify additional tags that should be added to the IP set. Format:
        key_1:value_1,key_2:value_1'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_ip_set_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
