    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action attempts to connect to an external SQL server to verify connectivity.
      It does not fetch data, mutate external or internal data, update entities, create
      insights, or modify alert data.
