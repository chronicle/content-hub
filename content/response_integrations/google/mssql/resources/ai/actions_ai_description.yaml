Ping:
  ai_description: >-
    General Description

    Tests connectivity to a Microsoft SQL Server instance using the provided configuration
    parameters. This action verifies that the connection settings (server address,
    credentials, and authentication method) are valid and that the SQL server is reachable.


    Flow Description

    1. Extracts configuration parameters (Server Address, Credentials, Authentication
    settings, etc.) from the integration settings.

    2. Initializes the `MSSQLManager` with the provided connection details.

    3. Attempts to establish a connection to the specified SQL Server instance using
    `pyodbc`.

    4. If the connection is successful, the action completes with a success message.

    5. If the connection fails, the action catches the exception, logs the error,
    and completes with a failure status.


    Additional Notes

    This action does not perform any queries or data retrieval; it only verifies that
    the connection parameters are valid and the server is reachable.
  ai_short_description: >-
    Tests connectivity to a Microsoft SQL Server instance by attempting to establish
    a connection with the provided credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
