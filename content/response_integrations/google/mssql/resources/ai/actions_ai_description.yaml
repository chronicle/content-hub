Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a Microsoft SQL Server database. This action is primarily
    used for diagnostic purposes to ensure the integration can successfully communicate
    with the target database.


    ### Flow Description

    1. Retrieves connection parameters and credentials.

    2. Initializes the MSSQLManager with the provided details.

    3. Attempts to establish a connection to the specified SQL Server instance.

    4. Returns a success or failure status based on the connection attempt.


    ### Additional Notes

    This action does not execute any queries or modify any data; it solely verifies
    that a connection can be established.
  ai_short_description: >-
    Tests connectivity to a Microsoft SQL Server database.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action attempts to establish a connection to a Microsoft SQL Server database
      to verify connectivity. It does not fetch contextual data, mutate external or
      internal data, update entities, create insights, modify alerts, or create case
      comments.
