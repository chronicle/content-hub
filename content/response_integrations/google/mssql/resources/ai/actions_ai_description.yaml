    True. |
RunSQLQuery:
  ai_description: "### General Description\nExecutes a SQL query against a Microsoft\
    \ SQL Server (MSSQL) database. This action allows users to retrieve data or perform\
    \ database modifications by providing a custom SQL query string. It supports secure\
    \ connections, including Windows Authentication and Kerberos, and provides results\
    \ in both CSV and JSON formats.\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ The action extracts configuration parameters (Server Address, Credentials, Port,\
    \ Authentication methods) and action-specific parameters (Database Name, Query,\
    \ Commit flag).\n2. **Connection Initialization**: Initializes the `MSSQLManager`\
    \ with the provided connection details and establishes a connection to the specified\
    \ SQL Server instance.\n3. **Query Execution**: Executes the provided SQL query\
    \ against the target database using the `execute_query` method.\n4. **Transaction\
    \ Handling**: If the `Commit` parameter is set to `true`, the action commits the\
    \ transaction to the database.\n5. **Result Processing**: \n    - If results are\
    \ returned, the action constructs a CSV table and attaches it to the action results.\n\
    \    - The raw results are serialized to JSON and returned as the action output.\n\
    \n### Additional Notes\nThis action is versatile and can be used for both read-only\
    \ operations (e.g., SELECT) and write operations (e.g., UPDATE, INSERT, DELETE).\
    \ Users should exercise caution when setting the `Commit` parameter to `true`\
    \ to avoid unintended data modifications."
  ai_short_description: >-
    Executes a SQL query against a Microsoft SQL Server database, supporting both
    data retrieval and transaction commits.
  capabilities:
    can_create_case_comments: false
