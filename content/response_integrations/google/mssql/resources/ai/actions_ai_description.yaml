RunSQLQuery:
  ai_description: >-
    ### General Description

    Executes a custom SQL query on a specified Microsoft SQL Server database. This
    action allows users to interact directly with the database to retrieve information
    or modify records based on the provided query and commit settings.


    ### Flow Description

    1. Extracts the necessary configuration and action parameters, including the target
    database name, the SQL query, and the commit flag.

    2. Establishes a connection to the MS SQL Server using the configured credentials
    and authentication method.

    3. Executes the provided SQL query against the database.

    4. If the `Commit` parameter is set to true, commits any changes made by the query
    to the database.

    5. Retrieves the query results and attaches them to the case as a CSV data table
    and a JSON result.


    ### Additional Notes

    - The action can be used for both data retrieval (e.g., `SELECT` queries) and
    data modification (e.g., `INSERT`, `UPDATE`, `DELETE` queries).

    - Ensure that the provided credentials have the necessary permissions to execute
    the specified query on the target database.
  ai_short_description: >-
    Executes a custom SQL query on a specified Microsoft SQL Server database and optionally
    commits the changes, returning the results as a JSON object and a CSV data table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a SQL query on the MS SQL database and commits the changes if the Commit
      parameter is set to true.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action connects to an MS SQL database and executes a query, which fetches
      data. If the 'Commit' parameter is true, it can mutate external data by committing
      changes (e.g., INSERT/UPDATE/DELETE) to the database. It does not mutate internal
      SecOps data, update entities, or create insights.
  entity_usage:
