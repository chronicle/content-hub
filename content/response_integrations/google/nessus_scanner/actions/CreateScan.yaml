name: Create Scan
description: Create a new scan in Nessus with a template
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/nessusscanner#create_scan
integration_identifier: NessusScanner
parameters:
-   name: Scan Name
    default_value: ''
    type: string
    description: Scan display name.
    is_mandatory: true
-   name: Scan Template Title
    default_value: ''
    type: string
    description: Scan template title value.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Description content.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_scan_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
script_result_name: is_succeed
