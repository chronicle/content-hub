[project]
name = "NessusScanner"
version = "12.0"
description = "Nessus is deployed by millions of users worldwide to identify vulnerabilities, policy-violating configurations and malware that attackers use to penetrate your or your customer's network."
requires-python = ">=3.11,<3.12"
dependencies = [
    "pytest-mock>=3.15.1",
    "requests>=2.33.1",
]

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5.0",
    "soar-sdk",
]
