name: Download Custom Rules File
description: Download custom rules file from FireEye CM.
integration_identifier: FireEyeCM
parameters:
-   name: Sensor Name
    default_value: ''
    type: string
    description: Specify the name of the sensor, where you want to download the custom
        rules file from. If nothing is specified here, action will try to find the
        sensor automatically.
    is_mandatory: false
-   name: Download Folder Path
    default_value: ''
    type: string
    description: Specify the absolute path to the folder, where the file should be
        downloaded to.
    is_mandatory: true
-   name: Overwrite
    default_value: 'True'
    type: boolean
    description: If enabled, action will overwrite the existing file with the same
        path.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/download_custom_rules_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
