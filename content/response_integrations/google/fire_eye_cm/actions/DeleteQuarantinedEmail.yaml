name: Delete Quarantined Email
description: Delete quarantined email. Requires FireEye EX connected to FireEye CM.
integration_identifier: FireEyeCM
parameters:
-   name: Queue ID
    default_value: ''
    type: string
    description: Specify the queue id of the email that needs to be deleted.
    is_mandatory: true
-   name: Sensor Name
    default_value: ''
    type: string
    description: Specify the name of the sensor, where you want to delete a quarantined
        email. If nothing is specified here, action will try to find the sensor automatically.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
