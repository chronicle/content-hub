name: Release Quarantined Email
description: Releases quarantined email. Requires FireEye EX connected to FireEye
    CM.
integration_identifier: FireEyeCM
parameters:
-   name: Queue ID
    default_value: ''
    type: string
    description: Specify the queue id of the email that needs to be released.
    is_mandatory: true
-   name: Sensor Name
    default_value: ''
    type: string
    description: Specify the name of the sensor, where you want to release a quarantined
        email. If nothing is specified here, action will try to find the sensor automatically
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
