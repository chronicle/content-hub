name: Add Rule To Custom Rules File
description: 'Add new rule to custom rule file in FireEye CM. Note: The custom rules
    file should exist already.'
integration_identifier: FireEyeCM
parameters:
-   name: Rule
    default_value: ''
    type: string
    description: Specify the rule that needs to be added to the custom rules file.
    is_mandatory: true
-   name: Sensor Name
    default_value: ''
    type: string
    description: Specify the name of the sensor, where you want to add a new rule.
        If nothing is specified here, action will try to find the sensor automatically.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
