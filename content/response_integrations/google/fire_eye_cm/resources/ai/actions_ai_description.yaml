Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads alert artifacts from FireEye CM as a zip file and saves them to a specified
    local folder path. This action is useful for retrieving forensic evidence or malware
    samples associated with a specific alert for further local analysis.


    ### Flow Description

    1. Initializes the FireEye CM manager with the provided integration credentials.

    2. Validates the provided `Download Folder Path` to ensure it exists and is a
    directory.

    3. Makes an HTTP GET request to the FireEye CM API (`wsapis/v2.0.0/artifacts/{alert_uuid}`)
    to download the artifacts for the specified `Alert UUID`.

    4. Saves the downloaded zip file to the local folder, optionally overwriting an
    existing file based on the `Overwrite` parameter.

    5. Returns the absolute file path of the downloaded artifacts in the action's
    JSON result.


    ### Additional Notes

    If the `Overwrite` parameter is set to false and a file with the same name already
    exists in the target directory, the action will fail to prevent accidental data
    loss.
