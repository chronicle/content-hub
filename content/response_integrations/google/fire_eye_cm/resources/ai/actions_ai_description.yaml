Delete Quarantined Email:
  ai_description: >-
    ### General Description

    Deletes a quarantined email from a FireEye EX appliance managed by FireEye CM.
    This action allows security analysts to remove malicious or unwanted emails directly
    from the quarantine queue, helping to mitigate potential threats identified during
    investigation.


    ### Flow Description

    1. The action initializes the connection to the FireEye CM API using the provided
    credentials.

    2. It extracts the `Queue ID` and `Sensor Name` parameters.

    3. If a `Sensor Name` is not provided, the action automatically queries the FireEye
    CM for available appliances of type 'eMPS' (FireEye EX) and selects the first
    one found.

    4. If a `Sensor Name` is provided, the action verifies that the specified sensor
    exists within the FireEye CM environment.

    5. The action then sends a POST request to the FireEye CM API (`wsapis/v2.0.0/emailmgmt/quarantine/delete`)
    to delete the email associated with the specified `Queue ID` from the selected
    sensor.

    6. Finally, the action logs out of the FireEye CM session and returns the execution
    status.


    ### Additional Notes

    This action requires a valid FireEye CM integration configuration. If the `Sensor
    Name` is omitted, the action will attempt to auto-discover the appliance, which
    may fail if no suitable appliances are found. Ensure the `Queue ID` corresponds
    to an existing quarantined email.
