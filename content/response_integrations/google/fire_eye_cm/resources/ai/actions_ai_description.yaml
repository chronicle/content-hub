    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action adds an IOC feed to FireEye CM, which can be configured to block
      the IOC. This aligns with the 'Add IOC To Blocklist' expected outcome, as well
      as blocking IP, malicious domain, and malicious URL.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    Adds a new custom IOC feed to FireEye CM based on the provided entities (ADDRESS,
    URL, FILEHASH).


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Action | Dropdown | Yes | Specify what should be the action for the new feed
    (Alert, Block). |

    | Comment | String | No | Specify additional comments for the feed. |

    | Extract Domain | Boolean | Yes | If enabled, action will extract the domain
    part out of the URL and use it to create IOC feed. |


    ### Flow

    1. Iterates over the target entities and filters them by supported types (ADDRESS,
    URL, FILEHASH).

    2. Extracts the domain from URL entities if the 'Extract Domain' parameter is
    enabled.

    3. Creates a temporary file containing the entity identifier.

    4. Calls the FireEye CM API to add the new IOC feed with the specified action
    and comments.

    5. Returns a JSON result containing the names of the newly created IOC feeds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new custom IOC feed to FireEye CM.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to FireEye CM to add a new IOC feed, which mutates
      external data. It does not fetch data, update entities, create insights, modify
      alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by adding an IOC feed, which can be configured
      to block traffic. Therefore, it is not an enrichment action, but it is a remediation
      action.
    remediation: true
  entity_usage:
    entity_types:
    - ADDRESS
    - DestinationURL
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and filters them by `entity.entity_type
      in SUPPORTED_ENTITY_TYPES`, where supported types are ADDRESS, URL, and FILEHASH.
