  ai_description: >-
    Adds a new rule to a custom rules file in FireEye CM.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Rule | String | Yes | Specify the rule that needs to be added to the custom
    rules file. |

    | Sensor Name | String | No | Specify the name of the sensor where you want to
    add a new rule. If nothing is specified here, the action will try to find the
    sensor automatically. |


    ### Flow

    1. Connects to FireEye CM.

    2. If `Sensor Name` is not provided, auto-discovers a suitable appliance (FireEye
    NX).

    3. Downloads the existing custom Snort rules file from the sensor.

    4. Appends the new rule to the downloaded file.

    5. Uploads the updated custom rules file back to the sensor.

    6. Cleans up temporary files.
  capabilities:
