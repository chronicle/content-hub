Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads malware artifacts associated with a specific alert from FireEye CM.
    This action retrieves the artifact package (typically a zip file) for a given
    alert UUID and saves it to a specified local directory on the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Username, Password, Verify SSL)
    and action parameters (Alert UUID, Download Folder Path, Overwrite).

    2. Initializes the `FireEyeCMManager` to establish a session with the FireEye
    CM instance.

    3. Validates the provided download folder path and checks if the file already
    exists based on the `Overwrite` parameter.

    4. Executes an API call (`GET wsapis/v2.0.0/artifacts/{alert_uuid}`) to retrieve
    the artifact content.

    5. Saves the retrieved content to the specified local file path.

    6. Returns the file path in the action result JSON.

    7. Logs out of the FireEye CM session.


    ### Additional Notes

    This action requires network connectivity to the FireEye CM instance and valid
    credentials. The `Overwrite` parameter controls whether existing files with the
    same name are replaced.
