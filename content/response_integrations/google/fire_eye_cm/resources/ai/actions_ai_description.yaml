Release Quarantined Email:
  ai_description: >-
    ### General Description

    Releases a quarantined email from a FireEye CM appliance. This action interacts
    with the FireEye CM API to change the status of a specific quarantined email,
    effectively releasing it from quarantine. It supports automatic sensor discovery
    if a specific sensor name is not provided.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Root, Username,
    Password, and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: The action retrieves the `Queue ID` (mandatory) and
    `Sensor Name` (optional) from the action parameters.

    3. **Manager Initialization**: An instance of `FireEyeCMManager` is initialized
    with the provided credentials to handle API communication.

    4. **Sensor Discovery/Verification**:
       - If `Sensor Name` is not provided, the action calls `manager.get_sensor_names(product=EX_APPLIANCE_TYPE)`
    to automatically discover available appliances.
       - If `Sensor Name` is provided, the action verifies its existence by calling
    `manager.get_sensor_names` and checking the list.
    5. **Email Release**: The action calls `manager.release_quarantined_email(sensor_name=sensor_name,
    queue_id=queue_id)` to perform the release operation via a POST request.

    6. **Cleanup**: The action logs out of the FireEye CM session.


    ### Additional Notes

    - This action requires a valid `Queue ID` for the email to be released.

    - If the `Sensor Name` is not specified, the action will attempt to auto-discover
    the first available appliance of type `eMPS` (FireEye EX).
