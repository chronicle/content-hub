Add Rule To Custom Rules File:
  ai_description: >-
    ### General Description

    Adds a new rule to a custom rules file in FireEye CM. Note that the custom rules
    file must already exist on the appliance.


    ### Flow Description

    1. Initializes the connection to the FireEye CM API.

    2. If a sensor name is not provided, automatically searches for a suitable FireEye
    NX appliance.

    3. Creates a temporary local file and writes the new rule to it.

    4. Downloads the existing custom Snort rules file from the specified FireEye CM
    sensor.

    5. Appends the downloaded existing rules to the temporary file containing the
    new rule.

    6. Uploads the updated custom rules file back to the FireEye CM sensor.

    7. Cleans up temporary files and logs out of the API.


    ### Additional Notes

    The custom rules file should exist already on the target sensor.
