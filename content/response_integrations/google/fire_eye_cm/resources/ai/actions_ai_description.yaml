Delete IOC Feed:
  ai_description: >-
    ### General Description

    Deletes a specified IOC feed from the FireEye Central Management (CM) system.
    This action allows administrators to remove outdated or unnecessary IOC feeds
    directly from the FireEye CM platform.


    ### Flow Description

    1. **Initialization**: The action initializes the `FireEyeCMManager` using the
    provided API credentials and configuration.

    2. **List Feeds**: It calls the `list_ioc_feeds` API endpoint to retrieve a list
    of all currently available IOC feeds in the FireEye CM system.

    3. **Validation**: It checks if the provided `Feed Name` exists within the retrieved
    list of feeds. If the feed is not found, the action raises a `FireEyeCMNotFoundException`.

    4. **Deletion**: If the feed exists, it calls the `delete_ioc_feed` API endpoint
    to remove the specified feed.

    5. **Verification**: It lists the IOC feeds again to confirm that the feed has
    been successfully deleted.

    6. **Cleanup**: Finally, it logs out of the FireEye CM session.


    ### Additional Notes

    This action performs a destructive operation on the FireEye CM configuration.
    Ensure that the `Feed Name` provided is correct before execution, as this action
    cannot be undone.
  ai_short_description: >-
    Deletes a specified IOC feed from the FireEye Central Management system.
