    external_data_mutation_explanation: >-
      Uploads an updated custom Snort rules file to the FireEye CM sensor.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the existing custom rules file from FireEye CM (GET request),
      appends a new rule to it, and uploads the modified file back to FireEye CM (POST
      request). Therefore, it fetches data and mutates external data. It does not
      mutate internal SOAR data, update entities, create insights, modify alerts,
      or create case comments.
  categories:
