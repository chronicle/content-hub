Add IOC Feed:
  ai_description: >-
    ### General Description

    Adds a new custom IOC feed to FireEye CM based on the provided entities (IP Address,
    URL, and File Hash). This action allows analysts to quickly push indicators to
    FireEye CM to either generate alerts or block traffic associated with the indicators.


    ### Flow Description

    1. Filters the target entities to include only supported types (ADDRESS, URL,
    FILEHASH).

    2. Iterates over the suitable entities.

    3. If the entity is a URL and the `Extract Domain` parameter is enabled, extracts
    the domain portion from the URL.

    4. Creates a temporary file containing the entity identifier.

    5. Makes a POST request to the FireEye CM API to upload the file and add the IOC
    feed with the specified action (Alert or Block) and comment.

    6. Returns a JSON result containing the names of the newly created IOC feeds.


    ### Additional Notes

    Only MD5 and SHA256 hashes are supported for File Hash entities. If an unsupported
    hash type is provided, the action will fail for that specific entity.
  ai_short_description: >-
    Adds a new custom IOC feed to FireEye CM based on IP Address, URL, and File Hash
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new custom IOC feed to FireEye CM.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to FireEye CM to add a new custom IOC feed,
      which mutates external data. It does not fetch contextual data, update internal
      entities, create insights, or modify alert data.
