Add Rule To Custom Rules File:
  ai_description: >-
    ### General Description

    Adds a new Snort rule to the custom rules file on a FireEye CM appliance. This
    action allows users to extend the detection capabilities of the appliance by appending
    custom rules.


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the FireEye CM manager.

    3. Identifies the target sensor appliance (either via user input or auto-discovery).

    4. Creates a temporary file containing the new rule.

    5. Downloads the existing custom rules file from the appliance using the `download_custom_snort_rules_file`
    API call.

    6. Appends the existing rules to the temporary file.

    7. Uploads the updated rules file back to the appliance using the `upload_custom_snort_rules_file`
    API call.

    8. Cleans up temporary files and logs out.


    ### Additional Notes

    The custom rules file must already exist on the appliance.
