    force_identity_mfa: false
    get_alert_information: false
    reasoning: >-
      The action acknowledges an alert in the external FireEye CM system. It does
      not enrich IOCs or assets, update internal SecOps alerts, create tickets, block
      IOCs, or perform any other outcome defined in the available categories.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
    send_message: false
    submit_file: false
    uncontain_host: false
    update_alert: false
    update_email: false
    update_identity: false
    update_ticket: false
  ai_description: >-
    ### General Description

    Acknowledges an alert in FireEye CM. The action sends a request to the FireEye
    CM API to acknowledge a specific alert and append an annotation explaining the
    reason for acknowledgment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Alert UUID | String | Yes | Specify the alert uuid, which needs to be acknowledged.
    |

    | Annotation | String | Yes | Specify the annotation that explains the reason
    for acknowledgment. |


    ### Flow Description

    1. Extracts configuration and action parameters.

    2. Initializes the FireEye CM manager and authenticates.

    3. Calls the API to acknowledge the alert using the provided UUID and annotation.

    4. Returns a success or failure message based on the API response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Acknowledges an alert in FireEye CM by sending a POST request with an annotation.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the FireEye CM API to acknowledge an alert,
      which mutates external data. It does not fetch data, nor does it mutate internal
      SecOps data such as entities, insights, or case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action mutates external data by acknowledging an alert in FireEye CM, so
      it cannot be classified as an enrichment action. It does not perform any identity,
      host, network, or email-based remediation, so it is not a remediation action.
    remediation: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action does not process or iterate over any entities. It operates solely
      on the provided Alert UUID parameter.
Add IOC Feed:
  action_outcomes_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: true
    block_ip: true
    block_malicious_domain: true
    block_malicious_url: true
    contain_host: false
    create_ticket: false
    delete_email: false
