Add IOC Feed:
  ai_description: >-
    ### General Description

    Adds an IOC feed to the FireEye Central Management (CM) system based on the provided
    entities. This action allows security analysts to push indicators (IP addresses,
    URLs, or file hashes) to FireEye CM to either trigger alerts or block traffic,
    depending on the configured action type.


    ### Flow Description

    1. The action initializes the FireEye CM manager using the provided API credentials
    and configuration.

    2. It filters the `target_entities` to include only supported types: Address,
    URL, and FileHash.

    3. For each valid entity, the action performs the following:
        - If the entity is a URL and the `Extract Domain` parameter is enabled, it
    parses the domain from the URL.
        - Creates a temporary file containing the entity identifier.
        - Calls the FireEye CM API (`POST /wsapis/v2.0.0/customioc/feed/add`) to create
    the IOC feed, passing the entity file, action type (Alert/Block), and any provided
    comments.
    4. The action logs the success or failure of each feed creation and returns a
    summary message and result JSON containing the created feed names.


    ### Additional Notes

    - Supported entity types are Address, URL, and FileHash (MD5 and SHA256).

    - The `Action` parameter determines the behavior of the IOC feed in FireEye CM
    (Alert or Block).
  ai_short_description: >-
    Adds an IOC feed to FireEye Central Management for blocking or alerting purposes
    based on selected entities.
