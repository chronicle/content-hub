name: Microsoft Graph Mail Delegated Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The name of the field where the product name is stored. The default
        value is device_product. The product name primarily impacts mapping. To streamline
        and improve the mapping process for the connector, the default value device_product
        resolves to a fallback value that is referenced from the code. Any invalid
        input for this parameter resolves to a fallback value by default.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: event_name
    type: string
    description: The name of the field where the event name (subtype) is stored. The
        default value is event_name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: 'The name of the field where the environment name is stored. If the
        environment field isn''t found, the environment is the default environment.
        The default value is ""

        '
    is_mandatory: false
    is_advanced: true
    mode: regular
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regular expression pattern to run on the value found in the Environment
        Field Name field. This parameter lets you manipulate the environment field
        using the regular expression logic. Use the default value .* to retrieve the
        required raw Environment Field Name value. If the regular expression pattern
        is null or empty, or the environment value is null, the final environment
        result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Email Exclude Pattern
    default_value: ''
    type: string
    description: A regular expression to exclude specific emails from ingestion, such
        as spam or news. This parameter works with both the subject and body of the
        email.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: The timeout limit in seconds for the Python process that runs the
        current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Microsoft Entra ID Endpoint
    default_value: https://login.microsoftonline.com
    type: string
    description: The Microsoft Entra endpoint to connect to. The default value is
        https://login.microsoftonline.com.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Microsoft Graph Endpoint
    default_value: https://graph.microsoft.com
    type: string
    description: The Microsoft Graph endpoint to connect to. The default value is
        https://graph.microsoft.com.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Mail Address
    default_value: ''
    type: string
    description: An email address for the connector to use.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Refresh Token
    default_value: ''
    type: password
    description: The refresh token that you obtained after you generated a token.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: For Microsoft 365 OAuth 2.0 authentication, the application (client)
        ID of the Microsoft Entra application that is used in the integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret Value
    default_value: ''
    type: password
    description: For Microsoft 365 OAuth 2.0 authentication, the client secret value
        that is provided for the authentication flow.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Microsoft Entra ID Directory ID
    default_value: ''
    type: string
    description: For Microsoft 365 OAuth authentication, the tenant (directory) ID
        of the Microsoft Entra ID application that you used in the integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Folder To Check For Emails
    default_value: Inbox
    type: string
    description: An email folder to search for the emails. This parameter accepts
        a comma-separated list of folders to check the user response in multiple folders.
        To specify a subfolder, use the “/” forward slash, such as {Inbox/Subfolder}.
        This parameter is case-sensitive. The default value is Inbox.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Offset Time In Hours
    default_value: 24
    type: integer
    description: The number of hours before the first connector iteration to retrieve
        the incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time. The connector can use this
        parameter as a fallback value when the timestamp from the latest connector
        iteration expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Emails Per Cycle
    default_value: 10
    type: integer
    description: The maximum number of emails to fetch for every connector iteration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Unread Emails Only
    default_value: false
    type: boolean
    description: If selected, the connector creates cases only for unread emails.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Mark Emails as Read
    default_value: false
    type: boolean
    description: If selected, the connector marks ingested emails as read.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If selected, the connector ignores the Google SecOps overflow mechanism.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        connecting to the Microsoft Graph server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Base64 Encoded Private Key
    default_value: ''
    type: password
    description: Specify a base64 encoded private key that will be used to decrypt
        the email.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Base64 Encoded Certificate
    default_value: ''
    type: password
    description: Specify a base64 encoded certificate that will be used to decrypt
        the email.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Base64 Encoded CA certificate
    default_value: ''
    type: password
    description: Specify a base64 encoded trusted CA certificate for signature verification.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Mail Field Source
    default_value: true
    type: boolean
    description: If selected, the connector retrieves the mailbox address from the
        user details “mail” attribute. If not selected, the integration retrieves
        the mailbox address from the “userPrincipalName” field. Selected by default.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Original Received Mail Prefix
    default_value: orig
    type: string
    description: A prefix to add to the extracted event keys (for example, to, from,
        or subject) from the original email received in the monitored mailbox. The
        default value is orig.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Attached Mail File Prefix
    default_value: attach
    type: string
    description: A prefix to add to the extracted event keys (for example, to, from,
        or subject) from the attached email file received in the monitored mailbox.
        The default value is attach.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Create a Separate Google SecOps Alert Per Attached Mail File
    default_value: false
    type: boolean
    description: If selected, the connector creates multiple alerts, with one alert
        for every attached email file. This behavior is useful when you process emails
        with multiple email files attached and set the Google SecOps event mapping
        to create entities from attached email files.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Attach Original EML
    default_value: false
    type: boolean
    description: If selected, the connector attaches the original email to the case
        info as an EML file.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Headers to add to events
    default_value: ''
    type: string
    description: 'A comma-separated string of email headers to add to Google SecOps
        events, such as “DKIM-Siganture”, “Received”, “From”. You can provide an exact
        match for headers or set this parameter value as a regular expression. The
        connector filters the configured values from the “internetMessageHeaders”
        list and adds them to the Google SecOps event. By default, the connector adds
        all available headers. To prevent the connector from adding headers to the
        event, set the parameter value as follows: None.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Case Name Template
    default_value: ''
    type: string
    description: 'A custom case name. When you configure this parameter, the connector
        adds a new key called custom_case_name to the Google SecOps event. You can
        provide placeholders in the following format: [name of the field]. Example:
        Phishing - [event_mailbox]. For placeholders, the connector uses the first
        Google SecOps event. The connector only handles keys that contain the string
        value.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Name Template
    default_value: ''
    type: string
    description: 'A custom alert name. You can provide placeholders in the following
        format: [name of the field]. Example: Phishing - [event_mailbox]. For placeholders,
        the connector uses the first Google SecOps event. The connector only handles
        keys that contain the string value. If you configure an invalid template or
        don''t set a value, the connector uses the default alert name.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy server username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Connector can be used to fetch emails from the Microsoft Graph Mail service.
    Connector dynamic list can be used to filter specific values from the email body
    and subject parts using regexes. By default, regex is used to filter out the urls
    from the email. This connector uses Delegated Authentication in Microsoft 365
    and requires interactive login of the user on behalf of which integration should
    communicate with Microsoft 365. To configure the connector, make sure that the
    integration configuration is already finished, and the refresh token needed to
    communicate with Office 365 is generated.
integration: MicrosoftGraphMailDelegated
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#microsoft-graph-mail-delegated-connector
rules: []
is_connector_rules_supported: true
creator: admin
