name: Wait For Email From User
description: Use the Wait For Email From User action to wait for the user's response
    that is based on an email sent using the Send Email action. This action is asynchronous.
    Adjust the action timeout in the Google SecOps IDE accordingly. This action doesn't
    run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#wait_for_email_from_user
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Mail ID
    default_value: ''
    type: string
    description: The ID of the email. If you used the Send Mail action to send emails,
        set the parameter value to the {SendEmail.JSONResult|id} or {SendEmail.JSONResult|internetMessageId}
        placeholder.
    is_mandatory: true
-   name: Wait for All Recipients to Reply?
    default_value: 'False'
    type: boolean
    description: If selected, the action waits for responses from all recipients until
        reaching timeout or proceeding with the first reply.
    is_mandatory: false
-   name: Wait Stage Exclude pattern
    default_value: ''
    type: string
    description: A regular expression to exclude specific replies from the wait stage.
        This parameter works with the email body. For example, if you configure the
        “Out of Office.*” regular expression, the action doesn't consider automatic
        out-of-office messages as recipient replies and waits for an actual user reply.
    is_mandatory: false
-   name: Folder to Check for Reply
    default_value: Inbox
    type: string
    description: A mailbox email folder to search for the user reply in. The search
        is run in the mailbox which the email containing a question was sent from.
        This parameter accepts a comma-separated list of folders to check the user
        response in multiple folders. This parameter is case-sensitive. The default
        value is Inbox.
    is_mandatory: false
-   name: Fetch Response Attachments
    default_value: 'False'
    type: boolean
    description: If selected and the recipient reply contains attachments, the action
        fetches the reply and adds it as an attachment to the action result.
    is_mandatory: false
-   name: Limit the Amount of Information Returned in the JSON Result
    default_value: true
    type: boolean
    description: If enabled, the amount of information returned by the action will
        be limited only to the key email fields.
    is_mandatory: false
-   name: Disable the Action JSON Result
    default_value: false
    type: boolean
    description: If enabled, action will not return JSON result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/wait_for_email_from_user_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
