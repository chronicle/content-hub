name: Get Authorization
description: Use the Get Authorization action to obtain a link with the access code
    for the integration configuration with delegated authentication. Copy the whole
    link and use it in the Generate Token action to get the refresh token. This action
    doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#get-authorization
