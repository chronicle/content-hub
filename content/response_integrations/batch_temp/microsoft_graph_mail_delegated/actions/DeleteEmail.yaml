name: Delete Email
description: You can use the Delete Email action to delete one or more emails from
    a mailbox. This action deletes emails based on your search criteria. With the
    appropriate permissions, the Delete Email action can move emails into different
    mailboxes. This action is asynchronous. Adjust the action timeout in the Google
    SecOps IDE accordingly. This action doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#delete_email
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Delete In Mailbox
    default_value: Default Mailbox
    type: string
    description: The default mailbox to execute the delete operation in. If permissions
        allow it, the action executes search in other mailboxes. This parameter accepts
        multiple values as a comma-separated string.
    is_mandatory: true
-   name: Folder Name
    default_value: Inbox
    type: string
    description: A mailbox folder in which to search for an email. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: true
-   name: Mail IDs
    default_value: ''
    type: string
    description: A filter condition to search for emails with specific email IDs.
        This parameter accepts a comma-separated list of email IDs to search for.
        If this parameter is provided, the search ignores the Subject Filter and Sender
        Filter parameters.
    is_mandatory: false
-   name: Subject Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email subject to search for.
        This filter uses the contains logic.
    is_mandatory: false
-   name: Sender Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the sender of requested emails.
        This filter uses the equals logic.
    is_mandatory: false
-   name: Time Frame (minutes)
    default_value: ''
    type: string
    description: A filter condition that specifies the period in minutes to search
        for emails.
    is_mandatory: false
-   name: Only Unread
    default_value: ''
    type: boolean
    description: If selected, the action searches only for unread emails.
    is_mandatory: false
-   name: How many mailboxes to process in a single batch
    default_value: ''
    type: string
    description: The number of mailboxes to process in a single batch (a single connection
        to the Microsoft 365 server). The default value is 25.
    is_mandatory: false
-   name: Limit the Amount of Information Returned in the JSON Result
    default_value: false
    type: boolean
    description: If enabled, the amount of information returned by the action will
        be limited only to the key email fields.
    is_mandatory: false
-   name: Disable the Action JSON Result
    default_value: true
    type: boolean
    description: If enabled, action will not return JSON result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/delete_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
