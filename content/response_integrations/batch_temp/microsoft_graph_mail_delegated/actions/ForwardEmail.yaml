name: Forward Email
description: Use the Forward Email action to forward emails that include previous
    threads. With the appropriate permissions, this action can send emails from a
    mailbox different than the one specified in the integration configuration. This
    action doesn't run on Google SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#forward_email
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Send From
    default_value: Default Mailbox
    type: string
    description: An optional email address from which to send an email if permissions
        allow it. By default, the email is sent from the default mailbox that is specified
        in the integration configuration.
    is_mandatory: true
-   name: Mail ID
    default_value: ''
    type: string
    description: The email ID or the internetMessageId value of the email to forward.
    is_mandatory: true
-   name: Folder Name
    default_value: Inbox
    type: string
    description: A mailbox folder in which to search for an email. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: false
-   name: Subject
    default_value: ''
    type: string
    description: The email subject.
    is_mandatory: true
-   name: Send to
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email recipients,
        such as user1@example.com, user2@example.com.
    is_mandatory: true
-   name: CC
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email CC field,
        such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: BCC
    default_value: ''
    type: string
    description: A comma-separated list of email addresses for the email BCC field,
        such as user1@example.com, user2@example.com.
    is_mandatory: false
-   name: Attachments Paths
    default_value: ''
    type: string
    description: A comma-separated list of paths for file attachments stored on the
        server, for example, /{FILE_DIRECTORY}/file.pdf, /{FILE_DIRECTORY}/image.jpg.
    is_mandatory: false
-   name: Mail Content
    default_value: ''
    type: string
    description: The email body.
    is_mandatory: true
-   name: Attachment Location
    default_value: GCP Bucket
    type: ddl
    optional_values:
    - GCP Bucket
    - Local File System
    description: A location where the attachments are stored. By default, the action
        attempts to upload attachments from the Cloud Storage bucket. The possible
        values are GCP Bucket or Local File System. The default value is GCP Bucket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/forward_email_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
