name: Search Emails
description: Use the Search Emails action to execute email search in the default mailbox
    based on the provided search criteria. With appropriate permissions, this action
    can run a search in other mailboxes. This action is asynchronous. Adjust the action
    timeout in the Google SeOps IDE accordingly. This action doesn't run on Google
    SecOps entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#search-emails
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Search in Mailbox
    default_value: Default Mailbox
    type: string
    description: The default mailbox to execute the search operation in. If permissions
        allow it, the action can search in other mailboxes. This parameter accepts
        multiple values as a comma-separated string. For complex searches against
        a significant number of mailboxes, use the Exchange Extension Pack integration.
    is_mandatory: true
-   name: Folder Name
    default_value: Inbox
    type: string
    description: A mailbox folder to execute the search in. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: true
-   name: Subject Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the email subject to search for.
        This filter uses the contains logic.
    is_mandatory: false
-   name: Sender Filter
    default_value: ''
    type: string
    description: A filter condition that specifies the sender of requested emails.
        This filter uses the equals logic.
    is_mandatory: false
-   name: Time Frame (minutes)
    default_value: ''
    type: string
    description: A filter condition that specifies the period in minutes to search
        for emails.
    is_mandatory: false
-   name: Max Emails To Return
    default_value: ''
    type: string
    description: The number of emails for the action to return. If you don't set a
        value, the action uses the API default value. The default value is 10.
    is_mandatory: false
-   name: Only Unread
    default_value: false
    type: boolean
    description: If selected, the action searches only for unread emails.
    is_mandatory: false
-   name: Select All Fields For Return
    default_value: false
    type: boolean
    description: If selected, the action returns all available fields for the obtained
        email.
    is_mandatory: false
-   name: How many mailboxes to process in a single batch
    default_value: ''
    type: string
    description: The number of mailboxes to process in a single batch (a single connection
        to the Microsoft 365 server). The default value is 25.
    is_mandatory: false
-   name: Limit the Amount of Information Returned in the JSON Result
    default_value: false
    type: boolean
    description: If enabled, the amount of information returned by the action will
        be limited only to the key email fields.
    is_mandatory: false
-   name: Disable the Action JSON Result
    default_value: false
    type: boolean
    description: If enabled, action will not return JSON result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_emails_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
