name: Generate Token
description: Use the Generate Token action to obtain a refresh token for the integration
    configuration with delegated authentication. Use the authorization URL that you
    received in the Get Authorization action. This action doesn't run on Google SecOps
    entities. After you generate the refresh token for the first time, we recommend
    you to configure and activate the Refresh Token Renewal Job so the job automatically
    renews and keeps the refresh token valid.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated#generate-token
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Authorization URL
    default_value: ''
    type: string
    description: An authorization URL that you received in the Get Authorization action.
        The URL is required to request a refresh token.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: null
    result_name: JsonResult
    show_result: true
creator: admin
