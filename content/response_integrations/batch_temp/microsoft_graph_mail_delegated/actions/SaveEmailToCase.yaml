name: Save Email to the Case
description: Use the Save Email To The Case action to save emails or email attachments
    to the Google SecOps Case Wall. With the appropriate permissions, this action
    can save emails from mailboxes other than the one provided in the integration
    configuration. This action doesn't run on Google SecOps entities.
integration_identifier: MicrosoftGraphMailDelegated
parameters:
-   name: Search In Mailbox
    default_value: Default Mailbox
    type: string
    description: The default mailbox in which to execute the search operation. If
        permissions allow it, the action can search in other mailboxes.
    is_mandatory: true
-   name: Folder Name
    default_value: Inbox
    type: string
    description: A mailbox folder in which to search for an email. To specify a subfolder,
        use the “/” forward slash, such as {Inbox/Subfolder}.
    is_mandatory: false
-   name: Mail ID
    default_value: ''
    type: string
    description: The email ID or the internetMessageId value to search for. This parameter
        accepts a comma-separated list of email IDs to search for. If you used the
        Send Mail action to send emails, set the parameter value to the {SendEmail.JSONResult|id}
        or {SendEmail.JSONResult|internetMessageId}  placeholder.
    is_mandatory: true
-   name: Save Only Email Attachments
    default_value: 'False'
    type: boolean
    description: If selected, the action saves only attachments from the specified
        email.
    is_mandatory: false
-   name: Attachment To Save
    default_value: ''
    type: string
    description: If you select the Save Only Email Attachments parameter, the action
        only saves attachments specified by this parameter. This parameter accepts
        multiple values as a comma-separated string.
    is_mandatory: false
-   name: Base64 Encode
    default_value: false
    type: boolean
    description: If selected, the action encodes the email file into the base64 format.
    is_mandatory: false
-   name: Save Email to the Case Wall
    default_value: false
    type: boolean
    description: If selected, the action saves the specified email to the action Case
        Wall in Google Secops.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/save_email_to_case_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
