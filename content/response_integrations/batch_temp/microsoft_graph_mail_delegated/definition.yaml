identifier: MicrosoftGraphMailDelegated
name: Microsoft Graph Mail Delegated
parameters:
-   name: Microsoft Entra ID Endpoint
    default_value: https://login.microsoftonline.com
    type: string
    description: The Microsoft Entra ID endpoint to connect to (formerly known as
        Azure AD). The value can be different for different tenant types.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Microsoft Graph Endpoint
    default_value: https://graph.microsoft.com
    type: string
    description: The Microsoft Graph Endpoint to connect to. The value can be different
        for different tenant types.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Client ID
    default_value: ''
    type: string
    description: The client (application) ID of the Microsoft Entra application to
        use in the integration.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Client Secret Value
    default_value: ''
    type: password
    description: The client secret value of the Microsoft Entra app to use in the
        integration.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Microsoft Entra ID Directory ID
    default_value: ''
    type: string
    description: The Microsoft Entra ID (tenant ID) value.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: User Mailbox
    default_value: ''
    type: string
    description: The mailbox to use in the integration.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Refresh Token
    default_value: ''
    type: password
    description: The refresh token that is used to authenticate.
    is_mandatory: true
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration verifies that the SSL certificate for
        the connection to the Microsoft Graph server is valid. Selected by default.
    is_mandatory: false
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Mail Field Source
    default_value: true
    type: boolean
    description: If selected, the integration retrieves the mailbox address from the
        user details "mail" attribute. If not selected, the integration retrieves
        the mailbox address from the "userPrincipalName" field. Selected by default
    is_mandatory: false
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Base64 Encoded Private Key
    default_value: ''
    type: password
    description: Specify a base64 encoded private key that will be used to decrypt
        the email.
    is_mandatory: false
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Base64 Encoded Certificate
    default_value: ''
    type: password
    description: Specify a base64 encoded certificate that will be used to decrypt
        the email.
    is_mandatory: false
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Base64 Encoded CA certificate
    default_value: ''
    type: password
    description: Specify a base64 encoded trusted CA certificate for signature verification.
    is_mandatory: false
    integration_identifier: MicrosoftGraphMailDelegated
-   name: Redirect URL
    default_value: http://localhost
    type: string
    description: The Redirect URL that you configured when you created your Microsoft
        Entra ID application.
    is_mandatory: false
    integration_identifier: MicrosoftGraphMailDelegated
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/microsoft-graph-mail-delegated
categories:
- IT & Infrastructure
svg_logo_path: resources/logo.svg
image_path: resources/image.png
