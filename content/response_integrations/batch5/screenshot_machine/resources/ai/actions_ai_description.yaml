Take URL Screenshot:
  ai_description: >-
    ### General Description

    Takes a screenshot of a specified URL, IP Address, or Hostname entity using the
    ScreenshotMachine service. This action is designed to provide visual context for
    web-based entities during an investigation, allowing analysts to see the content
    of a site without visiting it directly. The resulting screenshot is attached to
    the entity within the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Image Format | String | No | Specifies the format of the image file (e.g., jpg,
    png, gif). The default value is 'jpg'. |

    | Delay | Integer | No | Defines the wait time in milliseconds before the screenshot
    is captured. This is useful for ensuring that dynamic content or animations on
    the page have finished loading. The default value is 2000ms. |


    ### Flow Description

    1. **Initialization**: The action retrieves the API Key and SSL settings from
    the integration configuration and the Image Format and Delay from the action parameters.

    2. **Entity Processing**: The action iterates through all entities in the current
    context, filtering for supported types: URL, ADDRESS, and HOSTNAME.

    3. **API Request**: For each supported entity, the action sends a GET request
    to the ScreenshotMachine API to capture the screenshot based on the entity's identifier.

    4. **Data Attachment**: Upon a successful API response, the raw image data is
    base64 encoded and attached to the entity using the `add_entity_attachment` method.

    5. **Result Compilation**: The action collects the base64 encoded strings for
    all successful captures into a JSON result and provides a summary message of successful
    and failed entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action attaches the captured screenshot image as an attachment to the specific
      entity within the case.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
