Ping:
  ai_description: >-
    ### General Description

    The Ping action is designed to verify the connectivity between Google SecOps and
    the ScreenshotMachine service. It ensures that the provided API Key is valid and
    that the network configuration allows for successful communication with the ScreenshotMachine
    API.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connection issues. It performs a test request to the ScreenshotMachine
    API using a default URL (google.com) to confirm the service is reachable and the
    credentials are functional.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Key and SSL verification
    settings from the integration configuration.

    2. **Manager Initialization**: It initializes the ScreenshotMachineManager with
    the retrieved credentials.

    3. **Connectivity Test**: The manager executes a GET request to the ScreenshotMachine
    API endpoint with a sample URL.

    4. **Response Validation**: The action checks the HTTP response and specific ScreenshotMachine
    headers for errors such as invalid keys or exhausted credits.

    5. **Completion**: If the request is successful, the action ends with a 'Connected
    successfully' message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
