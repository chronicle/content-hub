-   description: Fixed a bug that caused the connector to miss ES events that had
        the same timestamp. Updated the query to run based on the passed Timestamp
        Field instead of hardcoded @timestamp. This update might cause minor performance
        issues in the first running cycles of the connector, but its unlikely to occur
        in already existing connectors (only for newly setup instances). This issue
        is known and will be addressed in future release. Please consult with a Siemplify
        representative before upgrading.
