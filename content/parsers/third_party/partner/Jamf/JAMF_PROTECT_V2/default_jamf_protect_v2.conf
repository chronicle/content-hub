  } # End nullable check

  # "match.blocked" -> "udm.security_result.action"
  if [match][blocked] != "" {
    mutate { convert => { "match.blocked" => "string" } }
    mutate { replace => { "security_action" => "ALLOW" } }
    if [match][blocked] == "true" {
      mutate { replace => { "security_action" => "BLOCK" } }
    }
    mutate { merge => { "security_result.action" => "security_action" }}
    # This gets merged at the end to allow for other events to inject into it.
  } # End nullable check

  # "match.facts" -> "udm.metadata.product_event_type"
  if [match][facts] != "" {
    for index, item in match.facts {
      mutate { replace => { "event1.idm.read_only_udm.metadata.product_event_type" => "" } }
      mutate { replace => { "_summary" => "" } }
      mutate { replace => { "_rule" => "" } }
      mutate { replace => { "_desc" => "" } }
      mutate { replace => { "_version" => "" } }
      if [index] == 0 {
        mutate { convert => { "item.version" => "string" } }
        mutate { replace => { "security_result.rule_name" => "%{item.name}" } }
        mutate { replace => { "security_result.description" => "%{item.human}" } }
        mutate { replace => { "security_result.summary" => "%{item.match_reason}" } }
        mutate { replace => { "security_result.rule_version" => "%{item.version}" } }
      } else {
        mutate { replace => { "security_result.rule_name" => "%{security_result.rule_name} %{item.name}" } }
        mutate { replace => { "security_result.description" => "%{security_result.description} %{item.human}" } }
        mutate { replace => { "security_result.summary" => "%{security_result.summary} %{item.match_reason}" } }
