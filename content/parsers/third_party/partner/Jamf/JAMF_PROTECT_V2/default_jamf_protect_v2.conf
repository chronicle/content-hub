        if tag =~ "^TA\\\\d{4}$" {
          mutate { replace => { "_temp_tactic" => "" } }
          mutate { replace => { "_temp_tactic.id" => "%{tag}" } }
          mutate { merge => { "security_result.attack_details.tactics" => "_temp_tactic" } }
        }

        # Handle Subtechniques (T####.###) - check this FIRST
        if tag =~ "^T\\\\d{4}\\\\.\\\\d{3}$" {
          mutate { replace => { "_temp_technique" => "" } }
          mutate { replace => { "_temp_technique.subtechnique_id" => "%{tag}" } }
          mutate { merge => { "security_result.attack_details.techniques" => "_temp_technique" } }
        }

        # Handle Base Techniques (T#### only) - check AFTER subtechniques
        if tag =~ "^T\\\\d{4}$" and tag !~ "^T\\\\d{4}\\\\.\\\\d{3}$" {
          mutate { replace => { "_temp_technique" => "" } }
          mutate { replace => { "_temp_technique.id" => "%{tag}" } }
          mutate { merge => { "security_result.attack_details.techniques" => "_temp_technique" } }
        }
      }
    }
