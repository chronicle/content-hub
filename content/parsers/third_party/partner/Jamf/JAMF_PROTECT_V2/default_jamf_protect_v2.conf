  }

  # drop the message if it is not json
  if [_not_json] {
    drop {tag => "TAG_UNSUPPORTED"}
  }


  # Common Telemetry literals all telemetry events
  mutate { replace => { "event1.idm.read_only_udm.principal.platform" => "MAC" } }
  mutate { replace => { "event1.idm.read_only_udm.metadata.log_type" => "JAMF" } }
  # End common literals

  # Common mappings across all telemetry events
  # "thread.uuid" -> "udm.thread.uuid"
  if [thread][uuid] != "" {
    # Default to string value for additional fields
    mutate { replace => {
      "additional_field_thread_uuid.key" => "thread.uuid"
      "additional_field_thread_uuid.value.string_value" => "%{thread.uuid}"
    } }
