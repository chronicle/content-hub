      mutate {
        gsub => ["match.severity","0","INFORMATIONAL"]
      }
      mutate {
        gsub => ["match.severity","1","LOW"]
      }
      mutate {
        gsub => ["match.severity","2","MEDIUM"]
      }
      mutate {
        gsub => ["match.severity","3","HIGH"]
      }
