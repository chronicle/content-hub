    mutate { merge => { "event1.idm.read_only_udm.additional.fields" => "additional_field_count" } }

    mutate { replace => {
      "additional_field_start.key" => "event.write_summary.start"
      "additional_field_start.value.string_value" => "%{event.write_summary.start}"
    } }
    mutate { merge => { "event1.idm.read_only_udm.additional.fields" => "additional_field_start" } }

    mutate { replace => {
      "additional_field_end.key" => "event.write_summary.end"
      "additional_field_end.value.string_value" => "%{event.write_summary.end}"
    } }
    mutate { merge => { "event1.idm.read_only_udm.additional.fields" => "additional_field_end" } }
  } # End if statement for event write(10033)
  # End Summary events

  # We don't know what type of event this is
  else {
    drop {tag => "TAG_UNSUPPORTED"}
  }

  # Merge the security result
  if [security_result]!= "" and [event_type] != "112" {
    mutate { merge => { "event1.idm.read_only_udm.security_result" => "security_result" } }
  }

  mutate { merge => { "@output" => "event1" } }
}