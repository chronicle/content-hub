# Product:METABASE
# Category:Data Security
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-02-05
# Copyright 2025 Google SecOps

filter{
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "metadata" => ""
      "event_type" => ""
      "security_result" => ""
      "additional" => ""
      "email" => ""
      "first_name" => ""
      "locale" => ""
      "last_login" => ""
      "is_active" => ""
      "is_qbnewb" => ""
      "updated_at" => ""
      "group_ids" => ""
      "is_superuser" => ""
      "login_attributes" => ""
      "id" => ""
      "last_name" => ""
      "date_joined" => ""
      "sso_source" => ""
      "personal_collection_id" => ""
      "common_name" => ""
      "metabase_host" => ""
      "has_userid" => "false"
    }
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failure"
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "METABASE"
      "event.idm.read_only_udm.metadata.product_name" => "METABASE"
    }
  }
  if [email] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "email"
      }
      on_error => "email_empty_merge"
    }
    mutate {
      replace => {
        "principal.user.userid" => "%{email}"
      }
      on_error => "email_empty"
    }
    if ![email_empty] {
      mutate {
        replace => {
          "has_userid" => "true"
        }
      }
    }
  }
  if [first_name] != "" {
    mutate {
      replace => {
        "principal.user.first_name" => "%{first_name}"
      }
      on_error => "first_name_empty"
    }
  }
  if [locale] != "" {
    mutate {
      replace => {
        "locale_label.value.string_value" => "%{locale}"
      }
      on_error => "locale_empty"
    }
    if ![locale_empty] {
      mutate {
        replace => {
          "locale_label.key" => "locale"
        }
        on_error => "locale_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "locale_label"
        }
        on_error => "locale_label_merge_empty"
      }
    }
  }
  if [last_login] != "" {
    date {
      match => ["last_login", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ","ISO8601","RFC3339"]
      target => "principal.user.last_login_time"
      on_error => "invalid_last_login_time"
    }
  }
  mutate {
    convert => {
      "is_active" => "string"
    }
    on_error => "already_string"
  }
  if ![already_string] {
    mutate {
      replace => {
        "is_active_label.value.string_value" => "%{is_active}"
      }
      on_error => "is_active_empty"
    }
    if ![is_active_empty] {
      mutate {
        replace => {
          "is_active_label.key" => "is_active"
        }
        on_error => "is_active_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "is_active_label"
        }
        on_error => "is_active_label_merge_empty"
      }
    }
  }
  mutate {
    convert => {
      "is_qbnewb" => "string"
    }
    on_error => "already_string"
  }
  if ![already_string] {
    mutate {
      replace => {
        "is_qbnewb_label.value.string_value" => "%{is_qbnewb}"
      }
      on_error => "is_qbnewb_empty"
    }
    if ![is_qbnewb_empty] {
      mutate {
        replace => {
          "is_qbnewb_label.key" => "is_qbnewb"
        }
        on_error => "is_qbnewb_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "is_qbnewb_label"
        }
        on_error => "is_qbnewb_label_merge_empty"
      }
    }
  }
  if [updated_at] != "" {
    date {
      match => ["updated_at", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ","ISO8601","RFC3339"]
      target => "event.idm.read_only_udm.metadata.event_timestamp"
      on_error => "invalid_updated_at"
    }
  }
  if [group_ids] != "" {
    for i, group_id in group_ids {
      mutate {
        convert => {
          "i" => "string"
        }
        on_error => "group_id_empty"
      }
      mutate {
        convert => {
          "group_id" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "group_ids_label" => ""
        }
        on_error => "group_ids_label_empty"
      }
      mutate {
        replace => {
          "group_ids_label.key" => "group_ids_%{i}"
          "group_ids_label.value.string_value" => "%{group_id}"
        }
        on_error => "group_ids_empty"
      }
      if ![group_ids_empty] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "group_ids_label"
          }
          on_error => "group_ids_label_merge_empty"
        }
      }
    }
  }
  mutate {
    convert => {
      "is_superuser" => "string"
    }
    on_error => "already_string"
  }
  if ![already_string] {
    mutate {
      replace => {
        "is_superuser_label.value.string_value" => "%{is_superuser}"
      }
      on_error => "is_superuser_empty"
    }
    if ![is_superuser_empty] {
      mutate {
        replace => {
          "is_superuser_label.key" => "is_superuser"
        }
        on_error => "is_superuser_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "is_superuser_label"
        }
        on_error => "is_superuser_label_merge_empty"
      }
    }
  }
  if [login_attributes] != "" {
    mutate {
      replace => {
        "login_attributes_label.value.string_value" => "%{login_attributes}"
      }
      on_error => "login_attributes_empty"
    }
    if ![login_attributes_empty] {
      mutate {
        replace => {
          "login_attributes_label.key" => "login_attributes"
        }
        on_error => "login_attributes_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "login_attributes_label"
        }
        on_error => "login_attributes_label_merge_empty"
      }
    }
  }
  mutate {
    convert => {
      "id" => "string"
    }
    on_error => "already_string"
  }
  if [id] != "" {
    mutate {
      replace => {
        "id_label.value.string_value" => "%{id}"
      }
      on_error => "id_empty"
    }
    if ![id_empty] {
      mutate {
        replace => {
          "id_label.key" => "id"
        }
        on_error => "id_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "id_label"
        }
        on_error => "id_label_merge_empty"
      }
    }
  }
  if [last_name] != "" {
    mutate {
      replace => {
        "principal.user.last_name" => "%{last_name}"
      }
      on_error => "last_name_empty"
    }
  }
  if [date_joined] != "" {
    date {
      match => ["date_joined", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ","ISO8601","RFC3339"]
      target => "principal.user.attribute.creation_time"
      on_error => "invalid_date_joined"
    }
  }
  if [sso_source] != "" {
    mutate {
      replace => {
        "sso_source_label.value.string_value" => "%{sso_source}"
      }
      on_error => "sso_source_empty"
    }
    if ![sso_source_empty] {
      mutate {
        replace => {
          "sso_source_label.key" => "sso_source"
        }
        on_error => "sso_source_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "sso_source_label"
        }
        on_error => "sso_source_label_merge_empty"
      }
    }
  }
  mutate {
    convert => {
      "personal_collection_id" => "string"
    }
    on_error => "already_string"
  }
  if [personal_collection_id] != "" {
    mutate {
      replace => {
        "personal_collection_id_label.value.string_value" => "%{personal_collection_id}"
      }
      on_error => "personal_collection_id_empty"
    }
    if ![personal_collection_id_empty] {
      mutate {
        replace => {
          "personal_collection_id_label.key" => "personal_collection_id"
        }
        on_error => "personal_collection_id_label_empty"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "personal_collection_id_label"
        }
        on_error => "personal_collection_id_label_merge_empty"
      }
    }
  }
  if [common_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{common_name}"
      }
      on_error => "common_name_empty"
    }
  }
  if [metabase_host] != "" {
    mutate {
      replace => {
        "principal.url" => "%{metabase_host}"
      }
      on_error => "metabase_host_empty"
    }
  }
  if [has_userid] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
      on_error => "event_type_empty"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
