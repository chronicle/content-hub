# Product: SWIMLANE
# Category: SOAR Tools
# Supported Format: JSON
# Reference: NA
# Last Updated: 2025-02-19
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "type" => ""
      "isAdmin" => ""
      "sourceIp" => ""
      "eventTime" => ""
      "user" => ""
      "userId" => ""
      "category" => ""
      "description" => ""
      "actionType" => ""
      "tenantId" => ""
      "accountId" => ""
      "eventOutcome" => ""
      "userAgent" => ""
      "endpoint" => ""
      "authenticationType" => ""
      "principal" => ""
      "target" => ""
      "metadata" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => ""
      "network" => ""
      "has_target" => ""
      "logLevel" => ""
      "id" => ""
    }
  }
  mutate {
    gsub => ["message","\\$type","type"]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failed"
  }
  if [json_failed] {
    drop {
      "tag" => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "type_label.key" => "type"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "no_type"
    }
    if ![no_type] {
      mutate {
        merge => {
          "additional.fields" => "type_label"
        }
        on_error => "no_type_label"
      }
    }
  }
  mutate {
    convert => {
      "isAdmin" => "string"
    }
    on_error => "isAdmin_convert_error"
  }
  if [isAdmin] != "" {
    mutate {
      replace => {
        "isAdmin_label.key" => "isAdmin"
        "isAdmin_label.value.string_value" => "%{isAdmin}"
      }
      on_error => "no_isAdmin"
    }
    if ![no_isAdmin] {
      mutate {
        merge => {
          "additional.fields" => "isAdmin_label"
        }
        on_error => "no_isAdmin_label"
      }
    }
  }
  for ip in sourceIp {
    if [ip] != "" {
      mutate {
        merge => {
          "principal.ip" => "ip"
          "principal.asset.ip" => "ip"
        }
        on_error => "no_ip"
      }
      if ![no_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }
  if [eventTime] != "" {
    date {
      match => ["eventTime", "ISO8601"]
      on_error => "no_eventTime"
    }
  }
  if [user] =~ "^.+@.+$" {
    mutate {
      replace => {
        "principal.email" => "%{user}"
      }
      on_error => "no_user"
    }
  }
  if [userId] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{userId}"
      }
      on_error => "no_userId"
    }
    if ![no_userId] {
      mutate {
        replace => {
          "has_target_user" => "true"
        }
      }
    }
  }
  if [category] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "category"
      }
      on_error => "no_category"
    }
  }
  if [description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }
  if [actionType] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{actionType}"
      }
      on_error => "no_action_type"
    }
  }
  if [tenantId] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{tenantId}"
      }
      on_error => "no_tenantId"
    }
  }
  if [accountId] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{accountId}"
      }
      on_error => "no_accountId"
    }
    if ![no_accountId] {
      mutate {
        replace => {
          "has_principal_user" => "true"
        }
      }
    }
  }
  if [eventOutcome] != "" {
    mutate {
      replace => {
        "eventOutcome_label.key" => "eventOutcome"
        "eventOutcome_label.value.string_value" => "%{eventOutcome}"
      }
      on_error => "no_eventOutcome"
    }
    if ![no_eventOutcome] {
      mutate {
        merge => {
          "additional.fields" => "eventOutcome_label"
        }
        on_error => "no_eventOutcome_label"
      }
    }
  }
  if [userAgent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{userAgent}"
      }
      on_error => "no_userAgent"
    }
  }
  if [endpoint] != "" {
    mutate {
      replace => {
        "endpoint_label.key" => "endpoint"
        "endpoint_label.value" => "%{endpoint}"
      }
      on_error => "no_endpoint"
    }
    if ![no_endpoint] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "endpoint_label"
        }
        on_error => "no_endpoint_label"
      }
    }
  }
  if [authenticationType] != "" {
    mutate {
      replace => {
        "authenticationType_label.key" => "authenticationType"
        "authenticationType_label.value.string_value" => "%{authenticationType}"
      }
      on_error => "no_authenticationType"
    }
    if ![no_authenticationType] {
      mutate {
        merge => {
          "additional.fields" => "authenticationType_label"
        }
        on_error => "no_authenticationType_label"
      }
    }
  }
  if [logLevel] != "" {
    if [logLevel] =~ "(?i)Info" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [logLevel] =~ "(?i)Error" {
      mutate {
        replace => {
          "security_result.severity" => "ERROR"
        }
      }
    }
    else if [logLevel] =~ "(?i)Warn" {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    }
  }
  if [id] != "" {
    mutate {
      replace => {
        "id_label.key" => "id"
        "id_label.value.string_value" => "%{id}"
      }
      on_error => "no_id"
    }
    if ![no_id] {
      mutate {
        merge => {
          "additional.fields" => "id_label"
        }
        on_error => "no_id_label"
      }
    }
  }
  mutate {
    replace => {
      "metadata.product_name" => "SWIMLANE"
      "metadata.vendor_name" => "SWIMLANE"
    }
  }
  if [has_principal_user] == "true" and [has_target_user] == "true" and [actionType] =~ "(?i)Login" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
