  grok {
    match => {
      "message" => [
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:principal_hostname} log::%{INT}:%{DATA:application}:%{DATA}:%{GREEDYDATA:kv_data}",
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} %{GREEDYDATA:principal_hostname} log:%{DATA}?:%{INT}:%{DATA:application}:%{DATA}:%{GREEDYDATA:kv_data}",
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} %{GREEDYDATA:principal_hostname} log:%{DATA}?:%{INT}:%{DATA:application}:%{GREEDYDATA:description}"
      ]
    }
    overwrite => ["timestamp","principal_hostname","kv_data","description","application"]
    on_error => "pattern_not_matched"
  }

  if [pattern_not_matched] {
    drop {
      tag => "TAG_UNSUPPORTED"
    }
  }

  if [timestamp] != "" {
    date {
      match => ["timestamp","MMM  d HH:mm:ss"]
      rebase => true
      on_error => "date_pattern_not_matched"
    }
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data","([a-zA-Z0-9]+)=","#$1="]
    }
    kv {
      source => "kv_data"
      field_split => ",#"
      value_split => "="
      on_error => "not_kv"
    }
    if [not_kv] {
      drop {
        tag => "TAG_UNSUPPORTED"
      }
    }
  }

  if [description] != "" {
    mutate {
