# Product: Honeyd
# Category: Deception Software
# Supported Format: SYSLOG
# Reference: See below
# Last Updated: 2024-05-26
# Copyright 2024 Chronicle LLC

# Additional references:
# http://www.honeyd.org/faq.php#logformat
# http://books.gigatux.nl/mirror/honeypot/final/ch04lev1sec8.html
# https://github.com/jwxa2015/honeyd/blob/master/log.c

filter {

  # --- Input ---

  mutate {
    replace => {
      "src_port" => ""
      "dst_port" => ""
      "complements" => ""
      "info" => ""
      "comment" => ""
      "year" => ""
      "month" => ""
      "day" => ""
      "hour" => ""
      "minute" => ""
      "second" => ""
      "protocol" => ""
      "type" => ""
      "src_ip" => ""
      "dst_ip" => ""
      "sent_bytes" => ""
      "received_bytes" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "%{YEAR:year}-%{MONTHNUM:month}-%{MONTHDAY:day}-%{HOUR:hour}:%{MINUTE:minute}:%{SECOND:second}",
      ]
    }
    overwrite => ["year", "month", "day", "hour", "minute", "second"]
    on_error => "no_date"
  }

  grok {
    match => {
      "message" => [
        # icmp(1) SourceIP DestinationIP: Type(Code): Size
        "icmp\\((?P<protocol>1)\\) (?P<type>(-|\\w+)) %{IP:src_ip} %{IP:dst_ip}: %{NUMBER}\\(%{NUMBER}\\): %{NUMBER:sent_bytes}",

        "igmp\\((?P<protocol>%{INT})\\) (?P<type>(-|\\w+)) %{IP:src_ip} %{IP:dst_ip}: %{NUMBER:sent_bytes}"

        # Proto(Code) Type SourceIP SourcePort DestinationIP DestinationPort: Info [Comment]
        "%{WORD}\\(%{NUMBER:protocol}\\) (?P<type>(-|\\w+)) %{IP:src_ip} %{POSINT:src_port} %{IP:dst_ip} %{POSINT:dst_port}[:]?\\s*%{GREEDYDATA:complements}",
      ]
    }
    overwrite => ["src_port", "dst_port", "complements","protocol","type","src_ip", "dst_ip","sent_bytes"]
    on_error => "pattern_not_matched"
  }

  if [pattern_not_matched] {
    drop {
      tag => "TAG_UNSUPPORTED"
    }
  }

  if [complements] != "" {
    grok {
      match => {
        "complements" => [
          "^%{GREEDYDATA:info} \\[%{GREEDYDATA:comment}\\]$",
          "^\\[%{GREEDYDATA:comment}\\]$",
          "^%{GREEDYDATA:info}$",
        ]
      }
      overwrite => ["info", "comment"]
      on_error => "no_info_or_comment"
    }
  }

  # --- Date ---

  mutate {
    # extract only "ss.SSS"
    gsub => ["second", "^(\\d{2}\\.\\d{3})\\d*", "$1"]
  }
  mutate {
    replace => {
      "timestamp" => "%{year}-%{month}-%{day} %{hour}:%{minute}:%{second}"
    }
    on_error => "date_failed"
  }
  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    on_error => "no_date"
  }

  # --- Fill fields ---

  # Principal

  if [src_port] != "" {
    mutate {
      replace => {
        "principal.port" => "%{src_port}"
      }
      convert => {
        "principal.port" => "integer"
      }
      on_error => "port_failed"
    }
  }

  if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
        "principal.asset.ip" => "src_ip"
      }
      on_error => "no_ip"
    }
  }

  # Target

  if [comment] =~ "(?i)WINDOWS" {
    mutate {
      replace => {
        "target.platform" => "WINDOWS"
      }
    }
  }
  else if [comment] =~ "(?i)LINUX" {
    mutate {
      replace => {
        "target.platform" => "LINUX"
      }
    }
  }

  grok {
    match => {
      "comment" => "%{GREEDYDATA:platform} %{GREEDYDATA:platform_version} %{GREEDYDATA:platform_patch_level}"
    }
    on_error => "no_operation_system"
  }

  if ![no_operation_system] {
    mutate {
      replace => {
        "target.platform_version" => "%{platform_version}"
        "target.platform_patch_level" => "%{platform_patch_level}"
      }
    }
  }

  if [dst_port] != "" {
    mutate {
      replace => {
        "target.port" => "%{dst_port}"
      }
      convert => {
        "target.port" => "integer"
      }
      on_error => "port_failed"
    }
  }

  if [dst_ip] != "" {
    mutate {
      merge => {
        "target.ip" => "dst_ip"
        "target.asset.ip" => "dst_ip"
      }
      on_error => "no_ip"
    }
  }

  # Network
  mutate {
    replace => {
      "network.application_protocol" => "UNKNOWN_APPLICATION_PROTOCOL"
    }
  }

  if [dst_port] != "" {
    mutate {
      replace => {
        "app_protocol_src" => "%{dst_port}"
      }
      on_error => "invalid_dst_port"
    }
    # This file contains application protocol parsing logic

# Interface:
# app_protocol_src (required): string that contains application protocol or a
#                              port number
# app_protocol_output: string that is either empty or contains application
#                      protocol compatible to ApplicationProtocol enum in
#                      udm.proto

mutate {
  uppercase => [ "app_protocol_src" ]
}

if [app_protocol_src] in [ "22", "SSH", "SSHD" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SSH"
    }
  }
}
else if [app_protocol_src] in [ "25", "SMTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMTP"
    }
  }
}
else if [app_protocol_src] in [ "53", "DNS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DNS"
    }
  }
}
else if [app_protocol_src] in [ "80", "8080", "HTTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTP"
    }
  }
}
else if [app_protocol_src] in [ "443", "HTTPS", "TLS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTPS"
    }
  }
}
else if [app_protocol_src] in [ "7400", "7401", "7402", "DDS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DDS"
    }
  }
}
else if [app_protocol_src] in [ "SMB", "SMBV1" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMB"
    }
  }
}
else if [app_protocol_src] in [
  "UNKNOWN_APPLICATION_PROTOCOL", "AFP", "APPC", "AMQP", "ATOM", "BEEP",
  "BITCOIN", "BIT_TORRENT", "CFDP", "COAP", "DEVICE_NET", "DHCP", "E_DONKEY",
  "ENRP", "FAST_TRACK", "FINGER", "FREENET", "FTAM", "GOPHER", "HL7", "H323",
  "IRCP", "KADEMLIA", "LDAP", "LPD", "MIME", "MODBUS", "MQTT", "NETCONF",
  "NFS", "NIS", "NNTP", "NTCIP", "NTP", "OSCAR", "PNRP", "QUIC", "RDP", "RELP",
  "RIP", "RLOGIN", "RPC", "RTMP", "RTP", "RTPS", "RTSP", "SAP", "SDP", "SIP",
  "SLP", "SNTP", "SSMS", "STYX", "TCAP", "TDS", "TOR", "TSP", "VTP", "WHOIS",
  "WEB_DAV", "X400", "X500", "XMPP", "IEC104", "DCERPC"
] {
  mutate {
    replace => {
      "app_protocol_output" => "%{app_protocol_src}"
    }
  }

} else {
  mutate {
    replace => {
      "app_protocol_output" => ""
    }
  }
}


    if [app_protocol_output] != "" {
      mutate {
        replace => {
          "network.application_protocol" => "%{app_protocol_output}"
        }
        on_error => "invalid_app_protocol"
      }
    }
  }

  mutate {
    replace => {
      "protocol_number_src" => "%{protocol}"
    }
    convert => {
      "protocol_number_src" => "integer"
    }
    on_error => "invalid_protocol_number"
  }
  # This file contains the ip protocol convertor
# Document:
#   - https://www.iana.org/assignments/protocol-numbers/protocol-numbers.xhtml

# Interface:
# protocol_number_src (required): number with the value which represents the protocol
# ip_protocol_out: string that is either empty or contains ip protocol
#                  compatible to IpProtocol enum in udm.proto

mutate {
  replace => {
    "ip_protocol_out" => "UNKNOWN_IP_PROTOCOL"
  }
}


if [protocol_number_src] in [ 1, "ICMP", "ICMPV6", 58 ] {
  mutate {
    replace => {
      "ip_protocol_out" => "ICMP"
    }
  }
} else if [protocol_number_src] in [ 2, "IGMP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "IGMP"
    }
  }
} else if [protocol_number_src] in [ 6, "TCP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "TCP"
    }
  }
} else if [protocol_number_src] in [ 17, "UDP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "UDP"
    }
  }
} else if [protocol_number_src] in [ 41, "IP6IN4" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "IP6IN4"
    }
  }
} else if [protocol_number_src] in [ 47, "GRE" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "GRE"
    }
  }
} else if [protocol_number_src] in [ 50, "ESP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "ESP"
    }
  }
} else if [protocol_number_src] in [ 88, "EIGRP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "EIGRP"
    }
  }
}  else if [protocol_number_src] in [ 97, "ETHERIP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "ETHERIP"
    }
  }
} else if [protocol_number_src] in [ 103, "PIM" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "PIM"
    }
  }
} else if [protocol_number_src] in [ 112, "VRRP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "VRRP"
    }
  }
}



  mutate {
    replace => {
      "network.ip_protocol" => "%{ip_protocol_out}"
    }
    on_error => "invalid_ip_protocol"
  }

  if [type] == "E" { # ends
    grok {
      match => {
        "info" => "%{NUMBER:received_bytes} %{NUMBER:sent_bytes}"
      }
      overwrite => ["received_bytes", "sent_bytes"]
      on_error => "info_pattern_fail"
    }

    if [received_bytes] != "" {
      mutate {
        replace => {
          "network.received_bytes" => "%{received_bytes}"
        }
        on_error => "invalid_received_bytes"
      }
      mutate {
        convert => {
          "network.received_bytes" => "uinteger"
        }
        on_error => "invalid_received_bytes_convert_failed"
      }
    }

    if [sent_bytes] != "" {
      mutate {
        replace => {
          "network.sent_bytes" => "%{sent_bytes}"
        }
        on_error => "invalid_sent_bytes"
      }
      mutate {
        convert => {
          "network.sent_bytes" => "uinteger"
        }
        on_error => "invalid_sent_bytes_convert_failed"
      }
    }
  }

  if [protocol] == "1" { # icmp
    mutate {
      replace => {
        "network.sent_bytes" => "%{sent_bytes}"
      }
      convert => {
        "network.sent_bytes" => "uinteger"
      }
      on_error => "invalid_sent_bytes"
    }
  }

  # Metadata

  if [network][application_protocol] in ["HTTP", "HTTPS"] {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_HTTP"
      }
    }
  }
  else if [dst_port] == "21" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_FTP"
      }
    }
  }
  else if [dst_port] == "25" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_SMTP"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "Niels Provos"
      "metadata.product_name" => "Honeyd"
    }
  }

  # --- Convert to UDM fields ---

  mutate {
    rename => {
      "principal" => "event.idm.read_only_udm.principal"
      "target" => "event.idm.read_only_udm.target"
      "network" => "event.idm.read_only_udm.network"
      "metadata" => "event.idm.read_only_udm.metadata"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
