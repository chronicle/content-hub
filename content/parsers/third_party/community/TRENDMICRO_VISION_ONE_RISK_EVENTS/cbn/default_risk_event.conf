filter {
  # Initialize all fields to empty strings so conditionals work on null JSON values
  mutate {
    replace => {
      "event" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "security_result" => ""
      "additional" => ""

      "eventTimeDT" => ""
      "description" => ""
      "riskEventName" => ""
      "riskFactorName" => ""
      "riskScore" => ""
      "resolveFlag" => ""
      "metaInfo" => ""
      "productCode" => ""
      "customerId" => ""
      "hostName" => ""
      "assetName" => ""
      "hostIp" => ""
      "email" => ""
      "userPrincipalName" => ""
      "osName" => ""
      "cloudProvider" => ""
      "cloudAccountId" => ""
      "regionCode" => ""
      "cloudService" => ""
      "instanceId" => ""
      "containerImageId" => ""
      "cloudPostureRuleName" => ""
      "cloudPostureRuleInfo" => ""
      "cveScore" => ""
      "clusterId" => ""
      "exploitAttemptCount" => ""
      "preventionRuleCount" => ""
      "workbenchAlertScore" => ""
      "assetCriticality" => ""
      "createTimeDT" => ""
      "updateTimeDT" => ""
      "firstSeenDT" => ""
      "unexpectedPort" => ""
      "unexpectedService" => ""
      "security_result_action" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "_json_error"
  }
  if [_json_error] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  # ── Metadata ─────────────────────────────────────────────────────────────────
  mutate {
    replace => {
      "metadata.vendor_name"  => "Trend Micro"
      "metadata.product_name" => "Vision One"
      "metadata.event_type"   => "GENERIC_EVENT"
    }
  }

  if [eventTimeDT] != "" {
    date {
      match => ["eventTimeDT", "yyyy-MM-dd HH:mm:ss.SSSSSS", "yyyy-MM-dd HH:mm:ss"]
      target => "metadata.event_timestamp"
      on_error => "_date_error"
    }
  }

  if [description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "_no_description"
    }
  }

  if [riskEventName] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{riskEventName}"
      }
      on_error => "_no_riskEventName"
    }
  }

  # ── Security Result ──────────────────────────────────────────────────────────
  if [riskEventName] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{riskEventName}"
      }
      on_error => "_no_rule_name"
    }
  }

  if [riskFactorName] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "riskFactorName"
      }
      on_error => "_no_riskFactorName"
    }
  }

  if [description] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{description}"
      }
      on_error => "_no_summary"
    }
  }

  # Map resolveFlag to action
  if [resolveFlag] == "new" {
    mutate {
      replace => {
        "security_result_action" => "ALLOW"
      }
    }
  } else if [resolveFlag] == "accepted" {
    mutate {
      replace => {
        "security_result_action" => "ALLOW"
      }
    }
  } else if [resolveFlag] == "resolved" or [resolveFlag] == "close" or [resolveFlag] == "system_remediation" or [resolveFlag] == "system_remediated" {
    mutate {
      replace => {
        "security_result_action" => "BLOCK"
      }
    }
  }
  if [security_result_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "security_result_action"
      }
      on_error => "_no_action"
    }
  }

  # Map riskScore to severity
  if [riskScore] != "" {
    mutate {
      convert => {
        "riskScore" => "string"
      }
      on_error => "_no_riskScore_convert"
    }
    mutate {
      replace => {
        "riskScore_str" => "%{riskScore}"
        "security_result.severity_details" => "%{riskScore}"
      }
      on_error => "_no_riskScore_str"
    }
    mutate {
      convert => {
        "riskScore" => "integer"
      }
      on_error => "_no_riskScore_int"
    }
    if [riskScore] >= 80 {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
      }
    } else if [riskScore] >= 60 {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
      }
    } else if [riskScore] >= 40 {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    } else if [riskScore] >= 20 {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    } else {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
  }

  # ── Parse metaInfo JSON ──────────────────────────────────────────────────────
  if [metaInfo] != "" {
    json {
      source => "metaInfo"
      target => "meta"
      on_error => "_meta_json_error"
    }
  }

  # ── Principal (source endpoint) ──────────────────────────────────────────────
  if [hostName] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{hostName}"
      }
      on_error => "_no_hostName"
    }
  } else if [assetName] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{assetName}"
      }
      on_error => "_no_assetName"
    }
  }

  if [hostIp] != "" {
    mutate {
      merge => {
        "principal.ip" => "hostIp"
      }
      on_error => "_no_hostIp"
    }
  }

  if [userPrincipalName] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{userPrincipalName}"
      }
      on_error => "_no_userPrincipalName"
    }
  } else if [email] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "email"
      }
      on_error => "_no_email"
    }
  }

  if [osName] != "" {
    mutate {
      replace => {
        "principal.platform_version" => "%{osName}"
      }
      on_error => "_no_osName"
    }
  }

  # ── Target (cloud / app) ────────────────────────────────────────────────────
  mutate {
    replace => {
      "target.application" => "%{meta.appName}"
    }
    on_error => "_no_appName"
  }

  mutate {
    replace => {
      "target.url" => "%{meta.request}"
    }
    on_error => "_no_request"
  }

  if [cloudProvider] != "" {
    mutate {
      replace => {
        "target.cloud.environment" => "%{cloudProvider}"
      }
      on_error => "_no_cloudProvider"
    }
  }

  if [cloudAccountId] != "" {
    mutate {
      replace => {
        "target.cloud.project.id" => "%{cloudAccountId}"
      }
      on_error => "_no_cloudAccountId"
    }
  }

  if [regionCode] != "" {
    mutate {
      replace => {
        "target.cloud.availability_zone" => "%{regionCode}"
      }
      on_error => "_no_regionCode"
    }
  }

  if [cloudService] != "" {
    mutate {
      replace => {
        "target.cloud.project.name" => "%{cloudService}"
      }
      on_error => "_no_cloudService"
    }
  }

  if [instanceId] != "" {
    mutate {
      replace => {
        "target.cloud.project.resource_subtype" => "%{instanceId}"
      }
      on_error => "_no_instanceId"
    }
  }

  if [containerImageId] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{containerImageId}"
        "target.resource.resource_type" => "CONTAINER"
      }
      on_error => "_no_containerImageId"
    }
  }

  # ── Additional fields ────────────────────────────────────────────────────────
  mutate {
    rename => {
      "customerId" => "addition.customerId"
      "productCode" => "addition.productCode"
      "resolveFlag" => "addition.resolveFlag"
      "createTimeDT" => "addition.createTimeDT"
      "updateTimeDT" => "addition.updateTimeDT"
      "firstSeenDT" => "addition.firstSeenDT"
      "unexpectedPort" => "addition.unexpectedPort"
      "unexpectedService" => "addition.unexpectedService"
      "cloudPostureRuleName" => "addition.cloudPostureRuleName"
      "cloudPostureRuleInfo" => "addition.cloudPostureRuleInfo"
      "clusterId" => "addition.clusterId"
      "assetCriticality" => "addition.assetCriticality"
      "cveScore" => "addition.cveScore"
      "exploitAttemptCount" => "addition.exploitAttemptCount"
      "preventionRuleCount" => "addition.preventionRuleCount"
      "workbenchAlertScore" => "addition.workbenchAlertScore"
    }
  }

  for key, value in addition map {
    mutate {
      replace => {
        "check" => ""
        "field1" => ""
      }
    }
    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "_convert_value_fail"
    }
    mutate {
      replace => {
        "check" => "%{value}"
      }
      on_error => "_check_failed"
    }
    if ![_check_failed] and [check] != "" {
      mutate {
        replace => {
          "field1.key" => "%{key}"
          "field1.value.string_value" => "%{value}"
        }
        on_error => "_no_field1"
      }
      if ![_no_field1] {
        mutate {
          merge => {
            "additional.fields" => "field1"
          }
          on_error => "_no_additional_merge"
        }
      }
    }
  }

  # riskScore as additional field
  if [riskScore_str] != "" {
    mutate {
      replace => {
        "rs_label.key" => "risk_score"
        "rs_label.value.string_value" => "%{riskScore_str}"
      }
      on_error => "_no_rs_label"
    }
    if ![_no_rs_label] {
      mutate {
        merge => {
          "additional.fields" => "rs_label"
        }
        on_error => "_no_rs_merge"
      }
    }
  }

  # ── metaInfo sub-fields as additional fields (dynamic) ─────────────────────
  for meta_key, meta_value in meta map {
    mutate {
      replace => {
        "meta_check" => ""
        "meta_field" => ""
      }
    }
    mutate {
      convert => {
        "meta_value" => "string"
      }
      on_error => "_convert_meta_value_fail"
    }
    mutate {
      replace => {
        "meta_check" => "%{meta_value}"
      }
      on_error => "_meta_check_failed"
    }
    if ![_meta_check_failed] and [meta_check] != "" {
      mutate {
        replace => {
          "meta_field.key" => "meta_%{meta_key}"
          "meta_field.value.string_value" => "%{meta_value}"
        }
        on_error => "_no_meta_field"
      }
      if ![_no_meta_field] {
        mutate {
          merge => {
            "additional.fields" => "meta_field"
          }
          on_error => "_no_meta_field_merge"
        }
      }
    }
  }

  # ── Final assembly ──────────────────────────────────────────────────────────
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "_no_security_result"
    }
  }

  # Output UDM event
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
