# Product: CISCO_STADIUMVISION
# Category: Content and Delivery Management
# Supported Format: SYSLOG, SYSLOG+KV
# Reference: N/A
# Last Updated: 2023-05-12
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "date_time" => ""
      "intem_host" => ""
      "category" => ""
      "data" => ""
      "intermediary" => ""
      "exe" => ""
      "pid" => ""
      "auid" => ""
      "ses" => ""
      "event_category" => ""
      "msg_data" => ""
      "res" => ""
      "op" => ""
      "acct" => ""
      "grantors" => ""
      "severity" => ""
      "security_result" => ""
      "action_result" => ""
      "method_name" => ""
      "metadata.event_type" => "GENERIC_EVENT"
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}> %{TIMESTAMP_ISO8601:date_time} %{HOSTNAME:intem_host} %{DATA:event_category} %{WORD} - - - %{GREEDYDATA:data}"
      ]
    }
    overwrite => ["date_time", "intem_host", "category", "data", "event_category"]
  }

  if [date_time] != "" {
    date {
      match => ["date_time", "RFC3339"]
    }
  }
  if [event_category] == "Audit" {
    grok {
      match => {
        "data" => [
          "%{GREEDYDATA:kv_data} msg='%{GREEDYDATA:msg_data}\'",
          "%{GREEDYDATA:kv_data}"
        ]
      }
      overwrite => ["msg_data", "kv_data"]
    }
    kv {
      source => "kv_data"
      value_split => "="
      field_split => " "
    }
    if [msg_data] != "" {
      mutate {
        replace => {
          "security_result.description" => "%{msg_data}"
        }
      }
    }
    mutate {
      gsub => ["msg_data", "\\\"", ""]
    }
    if [msg_data] != "" {
      kv {
        source => "msg_data"
        value_split => "="
        field_split => " "
      }
    }
    if [exe] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.file.full_path" => "%{exe}"
        }
      }
    }
    if [pid] != "" {
      mutate {
        replace => {
          "principal.process.pid" => "%{pid}"
        }
      }
    }
    if [ses] != "" {
      mutate {
        replace => {
          "network.session_id" => "%{ses}"
        }
      }
    }
    if [op] != "" {
      mutate {
        replace => {
          "security_result.summary" => "%{op}"
        }
      }
    }
    if [res] != "" {
      if [res] =~ "success" {
        mutate {
          replace => {
            "security_result.action_details" => "%{res}"
          }
        }
        mutate {
          replace => {
            "action_result" => "ALLOW"
          }
        }
        if [action_result] != "" {
          mutate {
            merge => {
              "security_result.action" => "action_result"
            }
          }
        }
      }
    }
    if [grantors] != "" {
      mutate {
        replace => {
          "detection_fields_1.key" => "grantors"
          "detection_fields_1.value" => "%{grantors}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_1"
        }
      }
    }
    if [acct] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{acct}"
        }
      }
    }
    if [acct] != "" {
      mutate {
        replace => {
          "metadata.event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
  }

  else if [event_category] in ["Config","Mule"] {
    mutate {
      replace => {
        "act_detail" => ""
        "desc" => ""
      }
    }
    grok {
      match => {
        "data" => "%{GREEDYDATA} \\[%{DATA:server}\\]\\s+%{WORD:severity}\\s+%{GREEDYDATA:msg_data}"
      }
      on_error => "grok_fail"
      overwrite => ["severity", "msg_data","catalina_log_mule"]
    }
    if [grok_fail] {
      mutate {
        replace => {
          "metadata.description" => "%{data}"
        }
      }
    }
    else {
      grok {
        match => {
          "msg_data" => [
            "%{DATA:method_name}\\s+-%{DATA} Status Message : %{GREEDYDATA:act_detail} Status :%{WORD:severity}",
            "%{DATA:method_name}\\s+- %{GREEDYDATA:desc}"
          ]
        }
        overwrite => ["method_name", "act_detail", "severity", "desc"]
        on_error => "grok_fail"
      }
      if [desc] != "" {
        mutate {
          replace => {
            "security_result.description" => "%{desc}"
          }
        }
      }
      else {
        mutate {
          replace => {
            "security_result.description" => "%{msg_data}"
          }
        }
      }
      if [act_detail] != "" {
        mutate {
          replace => {
            "security_result.summary" => "%{act_detail}"
          }
        }
      }
    }
  }

  else if [event_category] == "Access_log" {
    mutate {
      replace => {
        "prin_ip" => ""
        "method" => ""
        "path" => ""
        "proto" => ""
        "response" => ""
        "user_agent" => ""
      }
    }
    grok {
      match => {
        "data" => "%{IP:prin_ip} - - \\[%{GREEDYDATA}\\] \\\"%{WORD:method} %{DATA:path} %{DATA:proto} %{INT:response} %{INT} %{DATA} \\\"%{GREEDYDATA:user_agent}"
      }
      overwrite => ["prin_ip", "method", "path", "proto", "response", "user_agent"]
      on_error => "grok_fail"
    }

    if [prin_ip] != "" {
      mutate {
        merge => {
          "principal.ip" => "prin_ip"
        }
      }
    }

    if [method] != "" {
      mutate {
        replace => {
          "network.http.method" => "%{method}"
        }
      }
    }

    if [path] != "" {
      mutate {
        replace => {
          "target.url" => "%{path}"
        }
      }
    }

    if [proto] =~ "HTTP" {
      mutate {
        replace => {
          "network.application_protocol" => "HTTP"
        }
      }
    }

    if [user_agent] != "" {
      mutate {
        replace => {
          "network.http.user_agent" => "%{user_agent}"
        }
      }
    }

    if [response] != "" {
      mutate {
        replace => {
          "network.http.response_code" => "%{response}"
        }
        convert => {
          "network.http.response_code" => "integer"
        }
      }
    }

    mutate {
      replace => {
        "metadata.event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }

  else if [event_category] == "Control" {
    mutate {
      replace => {
        "type" => ""
        "name" => ""
        "count" => ""
        "m1_rate" => ""
        "m5_rate" => ""
        "m15_rate" => ""
        "mean_rate" => ""
        "rate_unit" => ""
        "duration_unit" => ""
      }
    }
    grok {
      match => {
        "data" => "%{GREEDYDATA} \\[%{GREEDYDATA:process}\\]\\s+%{WORD:severity}\\s+%{DATA:method_name}\\s+- %{GREEDYDATA:msg_data}"
      }
      overwrite => ["severity","method_name","msg_data"]
      on_error => "grok_fail"
    }

    if [grok_fail] {
      mutate {
        replace => {
          "metadata.description" => "%{data}"
        }
      }
    }

    if [msg_data] != "" {
      mutate {
        replace => {
          "security_result.description" => "%{msg_data}"
        }
      }
    }

    if [msg_data] != "" {
      kv {
        source => "msg_data"
        value_split => "="
        field_split => ", "
      }
    }

    if [type] != "" {
      mutate {
        replace => {
          "detection_fields_3.key" => "type"
          "detection_fields_3.value" => "%{type}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_3"
        }
      }
    }

    if [name] != "" {
      mutate {
        replace => {
          "detection_fields_4.key" => "name"
          "detection_fields_4.value" => "%{name}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_4"
        }
      }
    }

    if [count] != "" {
      mutate {
        replace => {
          "detection_fields_5.key" => "count"
          "detection_fields_5.value" => "%{count}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_5"
        }
      }
    }

    if [m1_rate] != "" {
      mutate {
        replace => {
          "detection_fields_6.key" => "m1_rate"
          "detection_fields_6.value" => "%{m1_rate}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_6"
        }
      }
    }

    if [m5_rate] != "" {
      mutate {
        replace => {
          "detection_fields_7.key" => "m5_rate"
          "detection_fields_7.value" => "%{m5_rate}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_7"
        }
      }
    }

    if [m15_rate] != "" {
      mutate {
        replace => {
          "detection_fields_8.key" => "m15_rate"
          "detection_fields_8.value" => "%{m15_rate}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_8"
        }
      }
    }

    if [mean_rate] != "" {
      mutate {
        replace => {
          "detection_fields_9.key" => "mean_rate"
          "detection_fields_9.value" => "%{mean_rate}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_9"
        }
      }
    }

    if [rate_unit] != "" {
      mutate {
        replace => {
          "detection_fields_10.key" => "rate_unit"
          "detection_fields_10.value" => "%{rate_unit}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_10"
        }
      }
    }

    if [duration_unit] != "" {
      mutate {
        replace => {
          "detection_fields_11.key" => "duration_unit"
          "detection_fields_11.value" => "%{duration_unit}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_11"
        }
      }
    }
  }
  else if [event_category] == "Secure_log" {
    mutate {
      replace => {
        "application" => ""
        "ENV" => ""
        "COMMAND" => ""
        "USER" => ""
      }
    }
    grok {
      match => {
        "data" => [
          "%{SYSLOGTIMESTAMP} %{HOSTNAME} %{DATA:application}:\\s+%{DATA:desc}\\s+: %{GREEDYDATA:msg_data}",
          "%{SYSLOGTIMESTAMP} %{HOSTNAME} %{DATA:application}:\\s+%{DATA:desc}: %{GREEDYDATA:msg_data}"
        ]
      }
      overwrite => ["msg_data", "application"]
      on_error => "grok_fail"
    }
    if [msg_data] != "" {
      mutate {
        replace => {
          "security_result.description" => "%{msg_data}"
        }
      }
      grok {
        match => {
          "msg_data" => "for user %{WORD:USER}"
        }
        overwrite => ["USER"]
        on_error => "grok_fail"
      }
    }
    kv {
      source => "msg_data"
      value_split => "="
      field_split => ";"
    }

    if [application] != "" {
      mutate {
        replace => {
          "principal.application" => "%{application}"
        }
      }
    }
    if [ENV] != "" {
      mutate {
        gsub => ["ENV", "LD_LIBRARY_PATH=", ""]
      }
      mutate {
        replace => {
          "target.file.full_path" => "%{ENV}"
        }
      }
    }
    if [COMMAND] != "" {
      mutate {
        replace => {
          "target.process.command_line" => "%{COMMAND}"
        }
      }
    }
    if [USER] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{USER}"
        }
      }
    }
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [event_category] == "DMP_Syslog" {
    mutate {
      replace => {
        "desc" => ""
        "prin_ip" => ""
        "task" => ""
        "index" => ""
        "type" => ""
        "url" => ""
      }
    }
    grok {
      match => {
        "data" => [
          "%{TIMESTAMP_ISO8601},%{DATA} \\[%{DATA}\\]\\s+ %{DATA:severity}\\s+%{DATA:method_name}\\s+- %{DATA:desc}\\,%{DATA}%{IP:prin_ip},%{DATA} %{SYSLOGTIMESTAMP} %{IP}\\s+%{DATA:task} \\(index:%{INT:index}\\) %{DATA}:\\[MediaItem: type=%{DATA:type} url=%{DATA:url}\]",
          "%{TIMESTAMP_ISO8601},%{DATA} \\[%{DATA}\\]\\s+ %{DATA:severity}\\s+%{DATA:method_name}\\s+- %{DATA:desc}\\,%{DATA}%{IP:prin_ip}"
        ]
      }
      overwrite => ["desc", "severity", "method_name", "prin_ip", "task", "index", "type", "url"]
      on_error => "grok_fail"
    }
    if [desc] != "" {
      mutate {
        replace => {
          "metadata.description" => "%{desc}"
        }
      }
    }

    if [prin_ip] != "" {
      mutate {
        merge => {
          "principal.ip" => "prin_ip"
        }
      }
    }
    if [task] != "" {
      mutate {
        replace => {
          "security_result.action_details" => "%{task}"
        }
      }
    }

    if [type] != "" {
      mutate {
        replace => {
          "detection_fields_12.key" => "type"
          "detection_fields_12.value" => "%{type}"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_12"
        }
      }
    }

    if [url] != "" {
      mutate {
        replace => {
          "target.url" => "%{url}"
        }
      }
    }
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.description" => "%{data}"
      }
    }
  }

  # Common Mappings
  if [method_name] != "" {
    mutate {
      replace => {
        "detection_fields_2.key" => "Method"
        "detection_fields_2.value" => "%{method_name}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "detection_fields_2"
      }
    }
  }

  if [severity] != "" {
    mutate {
      uppercase => ["severity"]
    }
    if [severity] in ["ERROR", "CRITICAL"] {
      mutate {
        replace => {
          "security_result.severity" => "%{severity}"
        }
      }
    }
    else if [severity] in ["INFO", "DEBUG"] {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
  }

  if [intem_host] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{intem_host}"
      }
    }
  }

  if [event_category] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{event_category}"
      }
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }
  mutate {
    rename => {
      "metadata" => "event.idm.read_only_udm.metadata"
      "principal" => "event.idm.read_only_udm.principal"
      "target" => "event.idm.read_only_udm.target"
      "network" => "event.idm.read_only_udm.network"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
