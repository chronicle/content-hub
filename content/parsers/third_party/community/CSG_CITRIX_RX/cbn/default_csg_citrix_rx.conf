# Product: CSG CITRIX RX
# Category: Application Server Logs
# Supported Format: CSV
# Reference: NA
# Last Updated:2025-03-26
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "metadata" => ""
      "network" => ""
      "security_result" => ""
      "date"=>""
      "event_name"=>""
      "action_type"=>""
      "target_ids"=>""
      "has_user" => "false"
      "timestamp" => ""
      "has_principal" => "false"
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT:capturedNumber}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:resourceID}\\s+%{GREEDYDATA:csvData}" ]
    }
    overwrite => ["timestamp", "csvData", "capturedNumber", "resourceID"]
     on_error => "grok_failed"
  }

  csv {
    source => "csvData"
    separator => ","
    on_error => "no_csvData"
  }

  if [csvData] != "" {
    mutate {
      replace =>{
        "logId" => "%{column1}"
        "application" => "%{column2}"
        "resourcename" => "%{column3}"
        "srcip" => "%{column4}"
        "creationTime" => "%{column5}"
        "userId" => "%{column6}"
        "targetip" => "%{column7}"
      }
      on_error => "no_csvData"
    }
  }

  if [logId] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{logId}"
      }
      on_error => "no_logId"
    }
  }

  if [application] != "" {
    mutate {
      replace => {
        "target.application" => "%{application}"
      }
      on_error => "no_application"
    }
  }

  if [resourcename] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{resourcename}"
      }
      on_error => "no_resourcename"
    }
  }

  if [srcip] != "" {
    grok {
      match => {
        "srcip" => [
          "%{IP:srcip}" ]
      }
      overwrite => ["srcip"]
      on_error => "no_ip"
    }
    if ![no_ip] {
      mutate {
        merge => {
          "principal.ip" => "srcip"
          "principal.asset.ip" => "srcip"
        }
        on_error => "no_srcip"
      }
      if ![no_srcip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }
  if [creationTime] != "" {
    date {
      match => ["creationTime", "dd/M/yyyy HH:mm:ss", "dd/MM/yyyy HH:mm:ss" , "d/M/yyyy HH:mm:ss" , "d/MM/yyyy HH:mm:ss" ]
      target => "target.resource.attribute.creation_time"
      on_error => "no_creation_time"
    }
  }
  if [timestamp] != "" {
    date {
        match => ["timestamp", "MMM d HH:mm:ss", "MMM  dd HH:mm:ss" ]
        on_error => "diff_format_timestamp"
        rebase => true
        target => "metadata.event_timestamp"
      }
  }

  if [userId] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{userId}"
      }
      on_error => "no_userId"
    }
    if ![no_userId] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }

  if [targetip] != "" {
    mutate {
      merge => {
        "target.ip" => "targetip"
        "target.asset.ip" => "targetip"
      }
      on_error => "no_targetip"
    }
  }

  if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "CSG Citrix RX"
      "metadata.vendor_name" => "CSG Citrix RX"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
