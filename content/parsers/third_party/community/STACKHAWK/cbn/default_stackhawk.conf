    source => "message"
    array_function => "split_columns"
    on_error => "json_error"
  }
  if [json_error] {
    mutate {
      replace => {
          "message" => "{\"msg\":\"%{message}\"}"
      }
      on_error => "message_replace_error"
    }
    mutate {
      gsub => ["message","\"\"", "" ]
    }
    mutate {
      gsub => ["message", "\\\\", ""]
    }
    json {
      source => "message"
      array_function => "split_columns"
      on_error => "json_message_error"
    }
  }
  if [timestamp] != "" {
    mutate {
      convert => {
        "timestamp" => "string"
      }
      on_error => "timestamp_already_string"
    }
    date {
      match => ["timestamp", "UNIX_MS"]
      target => "metadata.collected_timestamp"
      on_error => "timestamp_not_valid"
    }
    if [timestamp_not_valid] == true {
      mutate {
        replace => {
          "ts_label.key" => "timestamp"
          "ts_label.value.string_value" => "%{timestamp}"
        }
        on_error => "ts_not_valid"
      }
      if ![ts_not_valid] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "ts_label"
          }
          on_error => "ts_label_merge_failed"
        }
      }
    }
  }
  if [userIPAddr] != "" {
    grok {
      match => {
        "userIPAddr" => "%{IPV4:user_ip}"
      }
      on_error => "not_an_ip"
    }
    if ![not_an_ip] {
      mutate {
        merge => {
          "principal.ip" => "user_ip"
        }
      }
    }
    else if [not_an_ip] == true {
      mutate {
        replace => {
          "userIPAddr_label.key" => "userIPAddr"
          "userIPAddr_label.value.string_value" => "%{userIPAddr}"
