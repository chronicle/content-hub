      "target" => ""
      "security_result" => ""
      "metadata" => ""
      "network" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "time" => ""
      "tenantId" => ""
      "operationName" => ""
      "category" => ""
      "ReportId" => ""
      "properties.ReportId" => ""
      "properties.NetworkMessageId" => ""
      "properties.InternetMessageId" => ""
      "properties.Timestamp" => ""
      "properties.EmailClusterId" => ""
      "properties.SenderIPv4" => ""
      "properties.SenderIPv6" => ""
      "properties.SenderMailFromAddress" => ""
      "properties.SenderFromAddress" => ""
      "properties.SenderMailFromDomain" => ""
      "properties.SenderFromDomain" => ""
      "properties.RecipientEmailAddress" => ""
      "properties.Subject" => ""
      "properties.EmailDirection" => ""
      "properties.DeliveryAction" => ""
      "properties.DeliveryLocation" => ""
      "properties.EmailAction" => ""
      "properties.EmailActionPolicy" => ""
      "properties.EmailActionPolicyGuid" => ""
      "properties.AttachmentCount" => ""
      "properties.UrlCount" => ""
      "properties.EmailLanguage" => ""
      "properties.RecipientObjectId" => ""
      "properties.SenderObjectId" => ""
      "properties.SenderDisplayName" => ""
      "properties.ThreatNames" => ""
      "properties.ThreatTypes" => ""
      "properties.Connectors" => ""
      "properties.OrgLevelAction" => ""
      "properties.OrgLevelPolicy" => ""
      "properties.UserLevelAction" => ""
      "properties.UserLevelPolicy" => ""
      "properties.ConfidenceLevel" => ""
      "Tenant" => ""
      "SPF" => ""
      "DKIM" => ""
      "DMARC" => ""
      "CompAuth" => ""
      "properties.BulkComplaintLevel" => ""
      "has_email" => "false"
      "_TimeReceivedBySvc" => ""
      "properties.DeviceId" => ""
      "properties.DeviceName" => ""
      "properties.InitiatingProcessId" => ""
      "properties.InitiatingProcessCreationTime" => ""
      "properties.InitiatingProcessCommandLine" => ""
      "properties.InitiatingProcessParentFileName" => ""
      "properties.InitiatingProcessParentId" => ""
      "properties.InitiatingProcessParentCreationTime" => ""
      "properties.InitiatingProcessSHA1" => ""
      "properties.InitiatingProcessMD5" => ""
      "properties.InitiatingProcessFileName" => ""
      "properties.InitiatingProcessFolderPath" => ""
      "properties.InitiatingProcessAccountName" => ""
      "properties.InitiatingProcessAccountDomain" => ""
      "properties.AdditionalFields" => ""
      "properties.InitiatingProcessAccountSid" => ""
      "properties.AppGuardContainerId" => ""
      "properties.InitiatingProcessSHA256" => ""
      "properties.RemoteUrl" => ""
      "properties.ProcessTokenElevation" => ""
      "properties.ActionType" => ""
      "properties.InitiatingProcessLogonId" => ""
      "properties.InitiatingProcessFileSize" => ""
      "properties.InitiatingProcessVersionInfoCompanyName" => ""
      "properties.InitiatingProcessVersionInfoProductName" => ""
      "properties.InitiatingProcessVersionInfoProductVersion" => ""
      "properties.InitiatingProcessVersionInfoInternalFileName" => ""
      "properties.InitiatingProcessVersionInfoOriginalFileName" => ""
      "properties.InitiatingProcessVersionInfoFileDescription" => ""
      "properties.InitiatingProcessSessionId" => ""
      "properties.IsInitiatingProcessRemoteSession" => ""
      "properties.IsProcessRemoteSession" => ""
      "properties.InitiatingProcessUniqueId" => ""
      "properties.MachineGroup" => ""
      "properties.InitiatingProcessAccountUpn" => ""
    }
  }
  json {
    "source" => "message"
    "array_function" => "split_columns"
    "on_error" => "json_failed"
  }

  json {
    "source" => "properties.AuthenticationDetails"
    "array_function" => "split_columns"
    "on_error" => "json_failed"
  }

  if [tenantId] != "" {
    mutate {
      replace => {
        "metadata.product_deployment_id" => "%{tenantId}"
      }
      on_error => "no_tenant_id"
    }
  }

  if [operationName] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{operationName}"
      }
      on_error => "no_operationName"
    }
  }

  if [category] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "category"
      }
      on_error => "no_category"
    }
  }

  if [properties][ReportId] != "" {
    mutate {
      convert => {
        "properties.ReportId" => "string"
      }
      on_error => "no_report_id"
    }
    mutate {
      replace => {
        "report_id_label.key" => "ReportId"
        "report_id_label.value" => "%{properties.ReportId}"
      }
      on_error => "no_report_id"
    }
    if ![no_report_id] {
      mutate {
        merge => {
          "security_result.detection_fields" => "report_id_label"
        }
        on_error => "no_report_id"
      }
    }
  }

  if [properties][NetworkMessageId] != "" {
    mutate {
      replace => {
        "network_MessageId_label.key" => "networkMessageId"
        "network_MessageId_label.value" => "%{properties.NetworkMessageId}"
      }
      on_error => "no_networkMessageId"
    }
    if ![no_networkMessageId] {
      mutate {
        merge => {
          "security_result.detection_fields" => "network_MessageId_label"
        }
        on_error => "no_networkMessageId"
      }
    }
  }
  if [_TimeReceivedBySvc] != "" {
    mutate {
      replace => {
        "time_received.key" => "TimeReceivedBySvc"
        "time_received.value.string_value" => "%{_TimeReceivedBySvc}"
      }
      on_error => "no_TimeReceivedBySvc"
    }
    if ![no_TimeReceivedBySvc] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "time_received"
        }
        on_error => "no_TimeReceivedBySvc"
      }
    }
  }
  if [properties][DeviceId] != "" {
    mutate {
      replace => {
        "principal.asset.asset_id" => "DeviceId:%{properties.DeviceId}"
        "has_principal" => "true"
      }
      on_error => "device_id_missing"
    }
  }
  if [properties][InitiatingProcessVersionInfoCompanyName] != "" {
    mutate {
      replace => {
        "principal.user.company_name" => "%{properties.InitiatingProcessVersionInfoCompanyName}"
      }
      on_error => "InitiatingProcessVersionInfoCompanyName_empty"
    }
  }

  if [properties][DeviceName] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{properties.DeviceName}"
        "principal.asset.hostname" => "%{properties.DeviceName}"
        "has_principal" => "true"
      }
      on_error => "device_name_missing"
    }
  }
  if [properties][InitiatingProcessId] != "" {
    mutate {
      convert => {
        "properties.InitiatingProcessId" => "string"
      }
      on_error => "process_id_missing"
    }
    mutate {
      replace => {
        "principal.process.pid" => "%{properties.InitiatingProcessId}"
      }
      on_error => "process_id_missing"
    }
  }
  if [properties][InitiatingProcessUniqueId] != "" {
    mutate {
      replace => {
        "process_unique_id_label.key" => "InitiatingProcessUniqueId"
        "process_unique_id_label.value.string_value" => "%{properties.InitiatingProcessUniqueId}"
      }
      on_error => "InitiatingProcessUniqueId_empty"
    }
    if ![InitiatingProcessUniqueId_empty] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "process_unique_id_label"
        }
        on_error => "InitiatingProcessUniqueId_merge_error"
      }
    }
  }
  if [properties][InitiatingProcessCreationTime] != "" {
    mutate {
      replace => {
        "proces_time_label.key" => "InitiatingProcessCreationTime"
        "proces_time_label.value" => "%{properties.InitiatingProcessCreationTime}"
      }
      on_error => "InitiatingProcessCreationTime_empty"
    }
    if ![InitiatingProcessCreationTime_empty] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "proces_time_label"
        }
        on_error => "labels_InitiatingProcessIntegrityLevel_empty"
      }
    }
  }
  if [properties][MachineGroup] != "" {
    mutate {
      replace => {
        "machinegroup_label.key" => "MachineGroup"
        "machinegroup_label.value.string_value" => "%{properties.MachineGroup}"
      }
      on_error => "_ex_MachineGroup"
    }
    if ![_ex_MachineGroup] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "machinegroup_label"
        }
        on_error => "catch_merge_error"
      }
    }
  }
  if [properties][Timestamp] != "" {
    date {
      match => ["properties.Timestamp","RFC3339","yyyy-MM-dTHH:mm:ss.SSSSSSSZ","ISO8601"]
      on_error => "timestamp_error"
    }
  }
  if [properties][ProcessTokenElevation] != "" {
    mutate {
      replace => {
        "ProcessTokenElevation_label.key" => "ProcessTokenElevation"
        "ProcessTokenElevation_label.value" => "%{properties.ProcessTokenElevation}"
      }
      on_error => "ProcessTokenElevation_label_error"
    }
    if ![ProcessTokenElevation_label_error] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "ProcessTokenElevation_label"
        }
        on_error => "ProcessTokenElevation_merge_error"
      }
    }
  }
  if [properties][IsProcessRemoteSession] != "" {
    mutate {
      convert => {
        "properties.IsProcessRemoteSession" => "string"
      }
      on_error => "IsProcessRemoteSession_convert_error"
    }
    mutate {
      replace => {
        "IsProcessRemoteSession_label.key" => "IsProcessRemoteSession"
        "IsProcessRemoteSession_label.value.string_value" => "%{properties.IsProcessRemoteSession}"
      }
      on_error => "IsProcessRemoteSession_label_error"
    }
    if ![IsProcessRemoteSession_label_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "IsProcessRemoteSession_label"
        }
        on_error => "IsProcessRemoteSession_merge_error"
      }
    }
  }
  if [properties][InitiatingProcessCommandLine] != "" {
    mutate {
      replace => {
        "principal.process.command_line" => "%{properties.InitiatingProcessCommandLine}"
      }
      on_error => "InitiatingProcessCommandLine_empty"
    }
  }
  if [properties][IsInitiatingProcessRemoteSession] != "" {
    mutate {
      convert => {
        "properties.IsInitiatingProcessRemoteSession" => "string"
      }
      on_error => "IsInitiatingProcessRemoteSession_convert_error"
    }
    mutate {
      replace => {
        "IsInitiatingProcessRemoteSession_label.key" => "IsInitiatingProcessRemoteSession"
        "IsInitiatingProcessRemoteSession_label.value.string_value" => "%{properties.IsInitiatingProcessRemoteSession}"
      }
      on_error => "IsInitiatingProcessRemoteSession_label_error"
    }
    if ![IsInitiatingProcessRemoteSession_label_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "IsInitiatingProcessRemoteSession_label"
        }
        on_error => "IsInitiatingProcessRemoteSession_merge_error"
      }
    }
  }
  if [properties][InitiatingProcessParentFileName] != "" {
    mutate {
      replace => {
        "principal.process.parent_process.file.full_path" => "%{properties.InitiatingProcessParentFileName}"
      }
      on_error => "Initiating_ProcessParentFileName_empty"
    }
  }
  if [properties][InitiatingProcessParentId] != ""  {
    mutate {
      convert => {
        "properties.InitiatingProcessParentId" => "string"
      }
      on_error => "InitiatingProcessParentId_empty"
    }
    if [properties][InitiatingProcessParentId] != "" {
      mutate {
        replace => {
          "principal.process.parent_process.pid" => "%{properties.InitiatingProcessParentId}"
        }
        on_error => "InitiatingProcessParentId_empty"
      }
    }
  }
  if [properties][InitiatingProcessSessionId] != "" {
    mutate {
      convert => {
        "properties.InitiatingProcessSessionId" => "string"
      }
      on_error => "properties.InitiatingProcessSessionId_convert_error"
    }
    mutate {
      replace => {
        "InitiatingProcessSessionId_label.key" => "InitiatingProcessSessionId"
        "InitiatingProcessSessionId_label.value.string_value" => "%{properties.InitiatingProcessSessionId}"
      }
      on_error => "InitiatingProcessSessionId_label_error"
    }
    if ![InitiatingProcessSessionId_label_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "InitiatingProcessSessionId_label"
        }
        on_error => "InitiatingProcessSessionId_merge_error"
      }
    }
  }
  if [properties][InitiatingProcessParentCreationTime] != "" {
    mutate {
      replace => {
        "parent_time_label.key" => "InitiatingProcessParentCreationTime"
        "parent_time_label.value" => "%{properties.InitiatingProcessParentCreationTime}"
      }
      on_error => "InitiatingProcessParentCreationTime_empty"
    }
    if ![InitiatingProcessParentCreationTime_empty] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "parent_time_label"
        }
        on_error => "labels_InitiatingProcessParentCreationTime_empty"
      }
    }
  }
  if [properties][InitiatingProcessSHA1] != "" {
    mutate {
      replace => {
        "principal.process.file.sha1" => "%{properties.InitiatingProcessSHA1}"
      }
      on_error => "InitiatingProcessSHA1_empty"
    }
  }
  if [properties][InitiatingProcessMD5] != "" {
    mutate {
      replace => {
        "principal.process.file.md5" => "%{properties.InitiatingProcessMD5}"
      }
      on_error => "InitiatingProcessMD5_empty"
    }
  }
  if [properties][InitiatingProcessFileName] != "" {
    mutate {
      merge => {
        "principal.process.file.names" => "properties.InitiatingProcessFileName"
      }
      on_error => "InitiatingProcessFileName_empty"
    }
  }
  if [properties][InitiatingProcessFolderPath] != "" {
    mutate {
      replace => {
        "principal.process.file.full_path" => "%{properties.InitiatingProcessFolderPath}"
      }
      on_error => "InitiatingProcessFolderPath_empty"
    }
  }
  if [properties][InitiatingProcessVersionInfoOriginalFileName] != "" {
    mutate {
      replace => {
        "original_file_name_label.key" => "InitiatingProcessVersionInfoOriginalFileName"
        "original_file_name_label.value" => "%{properties.InitiatingProcessVersionInfoOriginalFileName}"
      }
      on_error => "InitiatingProcessVersionInfoOriginalFileName_empty"
    }
    if ![InitiatingProcessVersionInfoOriginalFileName_empty] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "original_file_name_label"
        }
        on_error => "labels_InitiatingProcessVersionInfoOriginalFileName_empty"
      }
    }
  }
  if [properties][InitiatingProcessVersionInfoFileDescription] != "" {
    mutate {
      replace => {
        "file_description_label.key" => "InitiatingProcessVersionInfoFileDescription"
        "file_description_label.value" => "%{properties.InitiatingProcessVersionInfoFileDescription}"
      }
      on_error => "InitiatingProcessVersionInfoFileDescription_empty"
    }
    if ![InitiatingProcessVersionInfoFileDescription_empty] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "file_description_label"
        }
        on_error => "labels_InitiatingProcessVersionInfoFileDescription_empty"
      }
    }
  }
  if [properties][InitiatingProcessVersionInfoInternalFileName] != "" {
    mutate {
      replace => {
        "file_version_label.key" => "InitiatingProcessVersionInfoInternalFileName"
        "file_version_label.value" => "%{properties.InitiatingProcessVersionInfoInternalFileName}"
      }
      on_error => "InitiatingProcessVersionInfoInternalFileName_empty"
    }
    if ![InitiatingProcessVersionInfoInternalFileName_empty] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "file_version_label"
        }
        on_error => "labels_InitiatingProcessVersionInfoInternalFileName_empty"
      }
    }
  }
  if [properties][InitiatingProcessAccountName] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{properties.InitiatingProcessAccountName}"
      }
      on_error => "InitiatingProcessAccountName_empty"
    }
  }
  if [properties][InitiatingProcessAccountDomain]  != "" {
    mutate {
      replace => {
        "principal.administrative_domain" => "%{properties.InitiatingProcessAccountDomain}"
      }
      on_error => "InitiatingProcessAccountDomain_empty"
    }
  }
  if [properties][InitiatingProcessVersionInfoProductVersion] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{properties.InitiatingProcessVersionInfoProductVersion}"
      }
      on_error => "InitiatingProcessVersionInfoProductVersion_empty"
    }
  }
  if [properties][InitiatingProcessAccountUpn]  != "" and [properties][InitiatingProcessAccountUpn]  =~ "^.+@.+$" {
    mutate {
      merge =>   {
        "principal.user.email_addresses" => "properties.InitiatingProcessAccountUpn"
      }
      on_error => "InitiatingProcessAccountUpn_empty"
    }
  }
  if [properties][AdditionalFields] != "" {
    mutate {
      gsub => ["properties.AdditionalFields", '\\"{.*}\\"', "{$1}"]
    }
    mutate {
      replace => {
        "AdditionalFields" => "{\"AdditionalFields\":%{properties.AdditionalFields}}"
      }
    }
    json {
      source => "AdditionalFields"
      array_function => "split_columns"
      on_error => "AdditionalFields_split_columns_error"
    }
    for key,value in AdditionalFields map {
      mutate {
        replace => {
          "additional_fields" => ""
        }
      }
      if [value] != "" {
        mutate {
          convert => {
            "value" => "string"
          }
          on_error => "conversion_error"
        }
        mutate {
          replace => {
            "additional_fields.key" => "%{key}"
            "additional_fields.value.string_value" => "%{value}"
          }
          on_error => "additional_fields_not_present"
        }
        if ![additional_fields_not_present] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "additional_fields"
            }
            on_error => "additional_fields_not_present"
          }
        }
      }
    }
  }
  if [properties][InitiatingProcessVersionInfoProductName] != "" {
    mutate {
      replace => {
        "product_name_label.key" => "InitiatingProcessVersionInfoProductName"
        "product_name_label.value" => "%{properties.InitiatingProcessVersionInfoProductName}"
      }
      on_error => "InitiatingProcessVersionInfoProductName_empty"
    }
    if ![InitiatingProcessVersionInfoProductName_empty] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "product_name_label"
        }
        on_error => "labels_InitiatingProcessVersionInfoProductName_empty"
      }
    }
  }
  if [properties][InitiatingProcessAccountSid] != "" {
    grok {
      match => {
        "properties.InitiatingProcessAccountSid" => "(?P<UserId>S-\\d-(\\d+-){1,14}\\d+)"
      }
      on_error => "no_principal_user_windows_sid"
    }
    if ![no_principal_user_windows_sid] {
      mutate {
        replace => {
          "principal.user.windows_sid" => "%{properties.InitiatingProcessAccountSid}"
        }
        on_error => "InitiatingProcessAccountSid_empty"
      }
    }
  }
  if [properties][AppGuardContainerId] != "" {
    mutate {
      replace => {
        "appguard_container_id_label.key" => "AppGuard Container Id"
        "appguard_container_id_label.value" => "%{properties.AppGuardContainerId}"
      }
      on_error => "no_appguard_container_id"
    }
    if ![no_appguard_container_id] {
      mutate {
        merge => {
          "security_result.detection_fields" => "appguard_container_id_label"
        }
        on_error => "no_appguard_container_id"
      }
    }
  }
  if [properties][InitiatingProcessSHA256] =~ "^[0-9a-f]+$" {
    mutate {
      replace => {
        "principal.process.file.sha256" => "%{properties.InitiatingProcessSHA256}"
      }
      on_error => "InitiatingProcessSHA256_empty"
    }
  }
  if [properties][RemoteUrl] != "" {
    mutate {
      replace => {
        "target.url" => "%{properties.RemoteUrl}"
      }
      on_error => "no_remote_url"
    }
  }
  if [properties][ActionType] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{properties.ActionType}"
      }
      on_error => "no_action_type"
    }
  }
  if [properties][InitiatingProcessLogonId] != "" {
    mutate {
      convert => {
        "properties.InitiatingProcessLogonId" => "string"
      }
      on_error => "properties.InitiatingProcessLogonId_convert_error"
    }
    mutate {
      replace => {
        "InitiatingProcessLogonId_label.key" => "InitiatingProcessLogonId"
        "InitiatingProcessLogonId_label.value" => "%{properties.InitiatingProcessLogonId}"
      }
      on_error => "InitiatingProcessLogonId_label_error"
    }
    if ![InitiatingProcessLogonId_label_error] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "InitiatingProcessLogonId_label"
        }
        on_error => "not_valid"
      }
    }
  }
  if [properties][InitiatingProcessFileSize] != "" {
    mutate {
      convert => {
        "properties.InitiatingProcessFileSize" => "string"
      }
      on_error => "InitiatingProcessFileSize_convert_failed"
    }
    mutate {
      replace => {
        "target.process.file.size" => "%{properties.InitiatingProcessFileSize}"
      }
      on_error => "InitiatingProcessFileSize_replace_failed"
    }
    mutate {
      convert => {
        "target.process.file.size" => "uinteger"
      }
      on_error => "InitiatingProcessFileSize_convert_failed"
    }
  }
  if [properties][InternetMessageId] != "" {
    mutate {
      replace => {
        "network.email.mail_id" => "%{properties.InternetMessageId}"
        "has_email" => "true"
      }
      on_error => "no_InternetMessageId"
    }
  }

  if [properties][EmailClusterId] != "" {
    mutate {
      convert => {
        "properties.EmailClusterId" => "string"
      }
      on_error => "no_EmailClusterId"
    }
    mutate {
      replace => {
        "additional_email_cluster_id.key" => "EmailClusterId"
        "additional_email_cluster_id.value.string_value" => "%{properties.EmailClusterId}"
      }
      on_error => "no_EmailClusterId"
    }
    if ![no_EmailClusterId] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "additional_email_cluster_id"
        }
      }
    }
  }

  if [properties][SenderIPv4] != "" {
    mutate {
      merge => {
        "principal.ip" => "properties.SenderIPv4"
        "principal.asset.ip" => "properties.SenderIPv4"
      }
      on_error => "sender_ipv4_not_present"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }

  if [properties][SenderIPv6] not in [ "", "null" ] {
    mutate {
      merge => {
        "principal.ip" => "properties.SenderIPv6"
        "principal.asset.ip" => "properties.SenderIPv6"
      }
      on_error => "sender_ipv6_not_present"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }
  if [properties][SenderMailFromAddress] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "properties.SenderMailFromAddress"
      }
      on_error => "sender_email_from_address_not_present"
    }
  }

  if [properties][SenderFromAddress] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "properties.SenderFromAddress"
      }
      on_error => "sender_from_address_not_present"
    }
    mutate{
      replace => {
        "network.email.from" => "%{properties.SenderFromAddress}"
        "has_email" => "true"
      }
    }
  }

  if[properties][SenderMailFromDomain] != "" {
    mutate {
      replace => {
        "sender_emial_from_domain_lablel.key" => "properties.SenderMailFromDomain"
        "sender_emial_from_domain_lablel.value" => "%{properties.SenderMailFromDomain}"

      }
      on_error => "sender_mail_from_domain_not_present"
    }
    mutate {
      merge => {
