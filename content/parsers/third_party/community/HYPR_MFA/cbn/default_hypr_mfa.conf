      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_ORIGIN"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_RPAPPID.value.string_value" => "%{RPAPPID}"
    }
    on_error => "no_RPAPPID"
  }
  if ![no_RPAPPID] and [additional_RPAPPID][value][string_value] != "" {
    mutate {
      replace => {
        "additional_RPAPPID.key" => "RPAPPID"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_RPAPPID"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_SDKRELVERSION.value.string_value" => "%{SDKRELVERSION}"
    }
    on_error => "no_SDKRELVERSION"
  }
  if ![no_SDKRELVERSION] and [additional_SDKRELVERSION][value][string_value] != "" {
    mutate {
      replace => {
        "additional_SDKRELVERSION.key" => "SDKRELVERSION"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_SDKRELVERSION"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_SERVERRELVERSION.value.string_value" => "%{SERVERRELVERSION}"
    }
    on_error => "no_SERVERRELVERSION"
  }
  if ![no_SERVERRELVERSION] and [additional_SERVERRELVERSION][value][string_value] != "" {
    mutate {
      replace => {
        "additional_SERVERRELVERSION.key" => "SERVERRELVERSION"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_SERVERRELVERSION"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_SUBNAME.value.string_value" => "%{SUBNAME}"
    }
    on_error => "no_SUBNAME"
  }
  if ![no_SUBNAME] and [additional_SUBNAME][value][string_value] != "" {
    mutate {
      replace => {
        "additional_SUBNAME.key" => "SUBNAME"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_SUBNAME"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_TENANTID.value.string_value" => "%{TENANTID}"
    }
    on_error => "no_TENANTID"
  }
  if ![no_TENANTID] and [additional_TENANTID][value][string_value] != "" {
    mutate {
      replace => {
        "additional_TENANTID.key" => "TENANTID"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_TENANTID"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_TRACEID.value.string_value" => "%{TRACEID}"
    }
    on_error => "no_TRACEID"
  }
  if ![no_TRACEID] and [additional_TRACEID][value][string_value] != "" {
    mutate {
      replace => {
        "additional_TRACEID.key" => "TRACEID"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_TRACEID"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_TYPE.value.string_value" => "%{TYPE}"
    }
    on_error => "no_TYPE"
  }
  if ![no_TYPE] and [additional_TYPE][value][string_value] != "" {
    mutate {
      replace => {
        "additional_TYPE.key" => "TYPE"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_TYPE"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "additional_USAGETYPE.value.string_value" => "%{USAGETYPE}"
    }
    on_error => "no_USAGETYPE"
  }
  if ![no_USAGETYPE] and [additional_USAGETYPE][value][string_value] != "" {
    mutate {
      replace => {
        "additional_USAGETYPE.key" => "USAGETYPE"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_USAGETYPE"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "sc_action" => "%{ISSUCCESSFUL}"
    }
    on_error => "no_ISSUCCESSFUL"
  }

  if [sc_action] =~ "(?i)true" {
    mutate {
      replace => {
        "sc_action" => "ALLOW"
      }
    }
  }
  else {
    mutate {
      replace => {
        "sc_action" => "BLOCK"
      }
    }
  }

  mutate {
    merge => {
      "security_result.action" => "sc_action"
    }
    on_error => "no_sc_action"
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "merge_error"
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "HYPR_MFA"
      "metadata.vendor_name" => "HYPR_MFA"
      "metadata.event_type" => "USER_LOGIN"
      "event.idm.read_only_udm.extensions.auth.type" => "SSO"
    }
  }

  mutate {
    rename => {
      "metadata" => "event.idm.read_only_udm.metadata"
      "target" => "event.idm.read_only_udm.target"
      "principal" => "event.idm.read_only_udm.principal"
      "network" => "event.idm.read_only_udm.network"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
