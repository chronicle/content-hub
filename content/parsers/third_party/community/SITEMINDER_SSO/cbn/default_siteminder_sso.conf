        "%{TIMESTAMP_ISO8601:syslog_time} \\[%{DATA:severity}\\] %{DATA}-getTransactionID \\[%{DATA:transaction_id}\\] \\[ Client IP : %{DATA:ips}\\]%{GREEDYDATA}> %{DATA:description}\\s+-%{GREEDYDATA}",
