        }
      }
      if [invalid_kv] == "true" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.hostname" => "%{sm_hostname}"
            "event.idm.read_only_udm.principal.asset.hostname" => "%{sm_hostname}"
          }
          on_error => "sm_hostname_not_found"
        }
        if ![sm_hostname_not_found] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }

        if [sm_username] != "" {
          grok {
            match => {
              "sm_username" => ["CN=%{DATA:user_name}\\\\,%{GREEDYDATA}","CN=%{DATA:user_name},%{GREEDYDATA}"]
            }
            on_error => "user_not_found"
          }
          if ![user_not_found] and [user_name] != "" {
            mutate {
              replace => {
                "event.idm.read_only_udm.principal.user.user_display_name" => "%{user_name}"
                "has_principal_user" => "true"
              }
            }
          }
        }

        if [sm_impersonatorname] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.target.user.user_display_name" => "%{sm_impersonatorname}"
            }
          }
        }

        if [sm_realmname] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.observer.group.group_display_name" => "%{sm_realmname}"
            }
          }
        }

        if [sm_domainname] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.observer.domain.name" => "DOMAIN_NAME:%{sm_domainname}"
            }
          }
        }

        if [sm_realmoid] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.observer.asset.product_object_id" => "%{sm_realmoid}"
            }
          }
        }

        if [sm_domainoid] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.principal.asset.product_object_id" => "%{sm_domainoid}"
            }
          }
        }

        mutate {
          replace => {
            "client_ip" => "%{sm_clientip}"
          }
          on_error => "sm_clientip_not_found"
        }
        if ![sm_clientip_not_found] and [client_ip] != "" {
          mutate {
            merge =>  {
              "event.idm.read_only_udm.principal.ip" => "client_ip"
              "event.idm.read_only_udm.principal.asset.ip" => "client_ip"
            }
            on_error => "not_an_ip"
          }
          if ![not_an_ip] {
            mutate {
              replace => {
                "has_principal" => "true"
              }
            }
          }
        }

        mutate {
          replace => {
            "event.idm.read_only_udm.network.session_id" => "%{sm_sessionid}"
          }
          on_error => "sm_sessionid_not_found"
        }
        mutate {
          replace => {
            "event.idm.read_only_udm.network.http.user_agent" => "%{sm_agentname}"
            "has_network" => "true"
          }
          on_error => "sm_agentname_not_found"
        }

        if [sm_action] in ["GET","POST","PATCH","DELETE"] {
          mutate {
            replace => {
              "event.idm.read_only_udm.network.http.method" => "%{sm_action}"
              "has_network" => "true"
            }
          }
        }
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.product_log_id" => "%{sm_eventid}"
          }
          on_error => "sm_eventid_not_found"
        }

        if [sm_resource] != "" and [sm_resource] != "/" {
          mutate {
            replace =>  {
              "event.idm.read_only_udm.principal.resource.name" => "%{sm_resource}"
            }
          }
        }

        mutate {
          replace => {
            "sm_authdirserver.key" => "Auth DirServer"
            "sm_authdirserver.value.string_value" => "%{sm_authdirserver}"
          }
          on_error => "sm_authdirserver_not_found"
        }
        if ![sm_authdirserver_not_found] and [sm_authdirserver][value][string_value] != "" {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "sm_authdirserver"
            }
          }
        }

        mutate {
          replace => {
            "sm_impersonatordirname.key" => "Impersonator Dirname"
            "sm_impersonatordirname.value.string_value" => "%{sm_impersonatordirname}"
          }
          on_error => "sm_impersonatordirname_not_found"
        }
        if ![sm_impersonatordirname_not_found] and [sm_impersonatordirname][value][string_value] != "" {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "sm_impersonatordirname"
            }
          }
        }

        mutate {
          replace => {
            "sm_authdirname.key" => "Auth Dirname"
            "sm_authdirname.value.string_value" => "%{sm_authdirname}"
          }
          on_error => "sm_authdirname_not_found"
        }
        if ![sm_authdirname_not_found] and [sm_authdirname][value][string_value] != "" {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "sm_authdirname"
            }
          }
        }

        mutate {
          replace => {
            "sm_transactionid_field.key" => "Transaction Id"
            "sm_transactionid_field.value.string_value" => "%{sm_transactionid}"
          }
          on_error => "sm_transactionid_field_not_found"
        }
        if ![sm_transactionid_field_not_found] and [sm_transactionid_field][value][string_value] != "" {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "sm_transactionid_field"
            }
          }
        }
        if [has_principal] == "true" or [has_principal_user] == "true" {
          mutate {
            replace => {
              "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
            }
          }
        }
      }
    }
    else {
      if [severity] == "INFO" {
        mutate {
          replace => {
            "sec_result.severity" => "INFORMATIONAL"
          }
        }
      }

      grok {
        match => {
          "message" => "ClientIp:%{IP:client_ip}"
        }
        on_error => "no_client_ip"
      }

      kv {
        source => "rest"
        field_split => "|"
        value_split => "="
      }

      date {
        match => ["time", "RFC3339", "UNIX", "ISO8601"]
        on_error => "date_match_error"
      }

      if [no_client_ip] && [user] == "" && [client] == "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
          }
        }
      }

      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "remoteIP"
          "event.idm.read_only_udm.principal.asset.ip" => "remoteIP"
        }
        on_error => "invalid_remoteIP"
      }
      if ![invalid_remoteIP] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }

      mutate {
        merge => {
          "event.idm.read_only_udm.observer.ip" => "remoteIP"
        }
        on_error => "no_client_ip"
      }


      if [user] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.user.userid" => "%{user}"
            "has_principal_user" => "true"
          }
        }
      } else if [client] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.user.userid" => "%{client}"
            "has_principal_user" => "true"
          }
        }
      }
      if [sm_action] in ["GET","POST","PATCH","DELETE"] {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.http.method" => "%{sm_action}"
            "has_network" => "true"
          }
        }
      }
      if [target_ip] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.target.ip" => "target_ip"
            "event.idm.read_only_udm.target.asset.ip" => "target_ip"
          }
          on_error => "no_target_ip"
        }
        if ![no_target_ip] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }

      mutate {
        rename => {
          "service" => "event.idm.read_only_udm.principal.application"
          "requestMethod\\" => "requestMethod"
        }
      }
      if [requestUrl] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.url" => "%{requestUrl}"
          }
          on_error => "no_requestUrl"
        }
      }
      if [frontendStatus] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.http.response_code" => "%{frontendStatus}"
            "has_network" => "true"
          }
          on_error => "no_frontendStatus"
        }
        mutate {
          convert => {
            "event.idm.read_only_udm.network.http.response_code" => "integer"
          }
          on_error => "no_frontendStatus"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.method" => "%{requestMethod}"
          "has_network" => "true"
        }
        on_error => "no_requestMethod"
      }
      if [remoteHost] not in ["","-"] {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.hostname" => "%{remoteHost}"
            "event.idm.read_only_udm.target.asset.hostname" => "%{remoteHost}"
          }
          on_error => "invalid_remote_host"
        }
        if ![invalid_remote_host] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }
    }

    if [syslog_host] not in ["","-"] {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.hostname" => "%{syslog_host}"
          "event.idm.read_only_udm.principal.asset.hostname" => "%{syslog_host}"
          "has_principal" => "true"
        }
      }
    }
    if [principal_ip] != "" {
      grok {
        match => {
          "principal_ip" => "%{IP:principal_ip}"
        }
        on_error => "no_principal_ip"
        overwrite => ["principal_ip"]
      }
      if ![no_principal_ip] {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.ip" => "principal_ip"
            "event.idm.read_only_udm.principal.asset.ip" => "principal_ip"
          }
          on_error => "invalid_principal_ip"
        }
        if ![invalid_principal_ip] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
    }
    if [sm_agentname] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.user_agent" => "%{sm_agentname}"
          "has_network" => "true"
        }
        on_error => "sm_agentname_not_found"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.parsed_user_agent" => "%{sm_agentname}"
        }
        on_error => "sm_agentname_not_found"
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.network.http.parsed_user_agent" => "parseduseragent"
        }
        on_error => "sm_agentname_not_found"
      }
    }
    if [sec_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "sec_result"
        }
      }
    }

    if [event][idm][read_only_udm][metadata][event_type] == "GENERIC_EVENT" and [has_principal] == "true" and [has_network] == "true" and [has_target] == "true" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
        }
      }
    }
    else if [event][idm][read_only_udm][metadata][event_type] == "GENERIC_EVENT" and [has_principal] == "true" and [has_target] == "true" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else if [event][idm][read_only_udm][metadata][event_type] == "GENERIC_EVENT" and [has_principal_user] == "true" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
    else if [event][idm][read_only_udm][metadata][event_type] == "GENERIC_EVENT" and [has_principal] == "true" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
        }
      }
    }
    mutate {
      merge => {
        "@output" => "event"
      }
    }
  }
}
