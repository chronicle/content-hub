        "%{TIMESTAMP_ISO8601:syslog_time} \\[%{DATA:severity}\\] %{DATA} %{DATA},\\s+%{DATA},\\s+%{DATA:userid},\\s+%{DATA},\\s+%{DATA:user_display_name},\\s+%{DATA:product_event_type},\\s+%{DATA:description},\\s+Number %{DATA:phone_number},%{GREEDYDATA:ips}",
        "%{TIMESTAMP_ISO8601:syslog_time} \\[%{DATA:severity}\\] %{DATA} %{DATA},\\s+%{DATA},\\s+%{DATA:userid},\\s+%{DATA},\\s+%{DATA},\\s+%{DATA:user_display_name},\\s+%{DATA:product_event_type},\\s+%{DATA},\\s+%{DATA:description},\\s+%{GREEDYDATA:ips}",
        "%{IP:principal_ip} \\[%{DATA:syslog_time}\\] %{IP:target_ip} %{DATA:tls_version} %{DATA:cipher} \\\"%{WORD:sm_action} %{DATA} %{DATA:application_protocol}/%{DATA:protocol_version}\\\" %{INT:frontendStatus} %{DATA} \\\"%{DATA:requestUrl}\?%{DATA:kv_data1}\\\" \\\"%{GREEDYDATA:sm_agentname}\\\""
        "\\[%{DATA:syslog_time}\\] %{IP:principal_ip} %{DATA:tls_version} %{DATA:cipher} \\\"%{WORD:requestMethod} %{DATA:requestUrl} %{DATA:application_protocol}/%{DATA:protocol_version}\\\" %{INT:frontendStatus}"
        "%{DATA:syslog_time} \\[%{WORD:severity}\\] %{DATA:syslog_host} \\[%{INT:transaction_id}\\] \\[%{DATA}: %{IP:ip1}, %{IP:ip2}, %{IP:ip3}, %{IP:ip4}\\]  \\[%{DATA}: %{DATA:eid}\\] \\[%{DATA}: %{DATA:userid}\\] %{DATA}: %{GREEDYDATA:duo_code}"
