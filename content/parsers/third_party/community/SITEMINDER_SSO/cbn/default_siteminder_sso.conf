# Product: SITEMINDER_SSO
# Category: SSO
# Supported Format: KV+JSON, SYSLOG, JSON
# Reference: https://docs.oracle.com/cd/E57185_01/OPUSC/siteminder_sso.htm#OPUSC-hss_auth_setup_12
# Last Updated: 2025-02-12
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "sec_result" => ""
      "invalid_kv" => "false"
      "principal_ip" => ""
      "sm_action" => ""
      "sm_agentname" => ""
      "requestUrl" => ""
      "frontendStatus" => ""
      "target_ip" => ""
      "severity" => ""
      "rest" => ""
      "user" => ""
      "client" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_network" => "false"
      "kv_data1" => ""
      "apptype" => ""
      "CHALLENGE" => ""
      "SMAGENTNAME" => ""
      "TARGET" => ""
      "ssl_protocol" => ""
      "client_ip" => ""
      "ssl_cipher" => ""
      "application_protocol" => ""
      "protocol_version" => ""
      "actualrequest" => ""
      "sm_username" => ""
      "sm_impersonatorname" => ""
      "sm_realmname" => ""
      "sm_domainname" => ""
      "sm_realmoid" => ""
      "sm_domainoid" => ""
      "sm_resource" => ""
      "sm_sessionid" => ""
      "sm_eventid" => ""
      "sm_authdirserver" => ""
      "sm_impersonatordirname" => ""
      "sm_authdirname" => ""
      "sm_transactionid" => ""
      "is_json" => "false"
      "remoteHost" => ""
      "syslog_host" => ""
      "size_inbyetes" => ""
      "has_principal_user" => ""
      "username" => ""
      "hostname" => ""
      "auth_stage" => ""
      "server_section" => ""
      "server_section_ikey" => ""
      "factor" => ""
      "client_section" => ""
      "log_level.name" => ""
      "log_level.__class_uuid__" => ""
      "log_namespace" => ""
      "log_source" => ""
      "log_format" => ""
      "log_time" => ""
      "status" => ""
      "REALMOID" => ""
      "GUID" => ""
      "SMAUTHREASON" => ""
      "description" => ""
      "ips" => ""
      "transaction_id" => ""
      "userid" => ""
      "user_display_name" => ""
      "product_event_type" => ""
      "phone_number" => ""
      "cipher" => ""
      "tls_version" => ""
      "ip1" => ""
      "ip2" => ""
      "ip3" => ""
      "ip4" => ""
      "duo_code" => ""
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "Web Access Management"
      "event.idm.read_only_udm.metadata.vendor_name" => "Siteminder Layer 7"
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      "action" => "ALLOW"
    }
  }

  mutate {
    gsub => ["message", "\\}\\{", "},{" ]
  }
  mutate {
    gsub => ["message", "\\r\\n"," " ]
  }
  mutate {
    gsub => ["message","True-Client-IP","client_ip"]
  }
  mutate {
    gsub => ["message","remote_host","target_ip"]
  }
  mutate {
    gsub => ["message","SSLPROTOCOL","ssl_protocol"]
  }
  mutate {
    gsub => ["message","SSL_CIPHER","ssl_cipher"]
  }
  mutate {
    gsub => ["message","userAgent","sm_agentname"]
  }
  mutate {
    gsub => ["message","referer","requestUrl"]
  }
  mutate {
    replace => {
      "temp_message" => "{\"messages\": [%{message}]}"
    }
  }

  json {
    source => "temp_message"
    array_function => "split_columns"
    on_error => "no_json"
  }

  if ![no_json] {
    for msg in messages {
      mutate {
        replace => {
          "event1" => ""
          "sec_results" => ""
          "has_principal" => "false"
          "has_target" => "false"
          "has_network" => "false"
          "has_principal_user" => "false"
          "sec_result_action" => ""
          "auth_stage_label" => ""
          "server_section_label" => ""
          "server_section_ikey_label" => ""
          "factor_label" => ""
          "client_section_label" => ""
          "log_level_label" => ""
          "log_namespace_label" => ""
          "log_source_label" => ""
          "log_format_label" => ""
          "log_time_label" => ""
        }
      }
      mutate {
        replace => {
          "event1.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
      }
      mutate {
        replace => {
          "message" =>"%{msg.message}"
        }
        on_error => "message_not_found"
      }
      if ![message_not_found] and [message]!= "" {
        grok {
          match => {
            "message" => "<%{INT}>%{SYSLOGTIMESTAMP:syslog_time} %{SYSLOGHOST:syslog_host} SSG\\[%{NOTSPACE:category}\\]: %{WORD:severity} %{NOTSPACE:category}: %{GREEDYDATA:rest}"
          }
          overwrite => ["syslog_time","syslog_host","severity","rest"]
          on_error => "no_match"
        }
      }
      else {
        json {
          source => "message"
          array_function => "split_columns"
          on_error => "not_a_json"
        }
        if ![not_a_json] {
          mutate {
            replace => {
              "is_json" => "true"
            }
          }
        }
      }
      if [username] != "" {
        mutate {
          replace => {
            "user" => "%{username}"
          }
          on_error => "no_username"
        }
      }
      if [hostname] != "" {
        mutate {
          replace => {
            "syslog_host" => "%{hostname}"
          }
          on_error => "no_client"
        }
      }
      if [msg] != "" {
        mutate {
          replace => {
            "event1.idm.read_only_udm.metadata.description" => "%{msg}"
          }
          on_error => "no_msg"
        }
      }
      if [auth_stage] != "" {
        mutate {
          replace => {
            "auth_stage_label.key" => "auth_stage"
            "auth_stage_label.value.string_value" => "%{auth_stage}"
          }
          on_error => "no_auth_stage"
        }
        if ![no_auth_stage] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "auth_stage_label"
            }
            on_error => "no_auth_stage_label"
          }
        }
      }
      if [server_section] != "" {
        mutate {
          replace => {
            "server_section_label.key" => "server_section"
            "server_section_label.value.string_value" => "%{server_section}"
          }
          on_error => "no_server_section"
        }
        if ![no_server_section] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "server_section_label"
            }
            on_error => "no_server_section_label"
          }
        }
      }
      if [server_section_ikey] != "" {
        mutate {
          replace => {
            "server_section_ikey_label.key" => "server_section_ikey"
            "server_section_ikey_label.value.string_value" => "%{server_section_ikey}"
          }
          on_error => "no_server_section_ikey"
        }
        if ![no_server_section_ikey] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "server_section_ikey_label"
            }
            on_error => "no_server_section_ikey_label"
          }
        }
      }
      if [factor] != "" {
        mutate {
          replace => {
            "factor_label.key" => "factor"
            "factor_label.value.string_value" => "%{factor}"
          }
          on_error => "no_factor"
        }
        if ![no_factor] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "factor_label"
            }
            on_error => "no_factor_label"
          }
        }
      }
      if [client_section] != "" {
        mutate {
          replace => {
            "client_section_label.key" => "client_section"
            "client_section_label.value.string_value" => "%{client_section}"
          }
          on_error => "no_client_section"
        }
        if ![no_client_section] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "client_section_label"
            }
            on_error => "no_client_section_label"
          }
        }
      }
      if [log_level][name] != "" {
        mutate {
          replace => {
            "severity" => "%{log_level.name}"
          }
          on_error => "no_log_level"
        }
      }
      if [log_level][__class_uuid__] != "" {
        mutate {
          replace => {
            "log_level_label.key" => "log_level_class_uuid"
            "log_level_label.value.string_value" => "%{log_level.__class_uuid__}"
          }
          on_error => "no_log_level"
        }
        if ![no_log_level] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "log_level_label"
            }
            on_error => "no_log_level_label"
          }
        }
      }
      if [log_namespace] != "" {
        mutate {
          replace => {
            "log_namespace_label.key" => "log_namespace"
            "log_namespace_label.value.string_value" => "%{log_namespace}"
          }
          on_error => "no_log_namespace"
        }
        if ![no_log_namespace] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "log_namespace_label"
            }
            on_error => "no_log_namespace_label"
          }
        }
      }
      if [log_source] != "" {
        mutate {
          replace => {
            "log_source_label.key" => "log_source"
            "log_source_label.value.string_value" => "%{log_source}"
          }
          on_error => "no_log_source"
        }
        if ![no_log_source] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "log_source_label"
            }
            on_error => "no_log_source_label"
          }
        }
      }
      if [log_format] != "" {
        mutate {
          replace => {
            "log_format_label.key" => "log_format"
            "log_format_label.value.string_value" => "%{log_format}"
          }
          on_error => "no_log_format"
        }
        if ![no_log_format] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "log_format_label"
            }
            on_error => "no_log_format_label"
          }
        }
      }
      if [log_time] != "" {
        mutate {
          convert => {
            "log_time" => "string"
          }
          on_error => "no_log_time"
        }
        mutate {
          replace => {
            "log_time_label.key" => "log_time"
            "log_time_label.value.string_value" => "%{log_time}"
          }
          on_error => "no_log_time"
        }
        if ![no_log_time] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.additional.fields" => "log_time_label"
            }
            on_error => "no_log_time_label"
          }
        }
      }
      if [status] =~ "(?i)Allow" {
        mutate {
          replace => {
            "sec_result_action" => "ALLOW"
          }
        }
      }
      else if [status] =~ "(?i)Reject" {
        mutate {
          replace => {
            "sec_result_action" => "BLOCK"
          }
        }
      }
      else {
        mutate {
          replace => {
            "sec_results.action_details" => "%{status}"
          }
        }
      }
      if [sec_result_action] != "" {
        mutate {
          merge => {
            "sec_results.action" => "sec_result_action"
          }
          on_error => "no_sec_result_action"
        }
      }
        if [severity] =~ "(?i)INFO" {
          mutate {
            replace => {
              "sec_results.severity" => "INFORMATIONAL"
            }
          }
        }

        grok {
          match => {
            "message" => "ClientIp:%{IP:client_ip}"
          }
          on_error => "no_client_ip"
        }

        kv {
          source => "rest"
          field_split => "|"
          value_split => "="
        }

        date {
          match => ["time", "RFC3339", "UNIX", "ISO8601"]
          on_error => "no_time"
        }

        if [no_client_ip] && [user] == "" && [client] == "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
            }
          }
        }


        mutate {
          merge => {
            "event1.idm.read_only_udm.principal.ip" => "remoteIP"
            "event1.idm.read_only_udm.principal.asset.ip" => "remoteIP"
          }
          on_error => "not_valid_ip"
        }
        if ![not_valid_ip] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }

        mutate {
          merge => {
            "event1.idm.read_only_udm.observer.ip" => "remoteIP"
          }
          on_error => "no_client_ip"
        }

        if [user] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.principal.user.userid" => "%{user}"
              "has_principal_user" => "true"
            }
          }
        } else if [client] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.principal.user.userid" => "%{client}"
              "has_principal_user" => "true"
            }
          }
        }

        mutate {
          rename => {
            "service" => "event1.idm.read_only_udm.principal.application"
            "requestUrl" => "event1.idm.read_only_udm.target.url"
            "requestMethod\\" => "requestMethod"
          }
        }
        if [frontendStatus] not in ["","-","Allow"] {
          mutate {
            replace => {
              "event1.idm.read_only_udm.network.http.response_code" => "%{frontendStatus}"
              "has_network" => "true"
            }
            on_error => "no_frontendStatus"
          }
          mutate {
            convert => {
              "event1.idm.read_only_udm.network.http.response_code" => "integer"
            }
            on_error => "no_frontendStatus"
          }
        }
        mutate {
          replace => {
            "event1.idm.read_only_udm.network.http.method" => "%{requestMethod}"
            "has_network" => "true"
          }
          on_error => "no_requestMethod"
        }
        if [remoteHost] not in ["","-"] {
          mutate {
            replace => {
              "event1.idm.read_only_udm.target.hostname" => "%{remoteHost}"
              "event1.idm.read_only_udm.target.asset.hostname" => "%{remoteHost}"
            }
            on_error => "no_remoteHost"
          }
          if ![no_remoteHost] {
            mutate {
              replace => {
                "has_target" => "true"
              }
            }
          }
        }

        if [syslog_host] != "" {
          mutate {
            replace => {
             "event1.idm.read_only_udm.principal.hostname" => "%{syslog_host}"
             "event1.idm.read_only_udm.principal.asset.hostname" => "%{syslog_host}"
            }
            on_error => "no_syslog_host"
          }
          if ![no_syslog_host] {
            mutate {
              replace => {
                "has_principal" => "true"
              }
            }
          }
        }

      if [ssl_protocol] not in ["", "-"] {
        mutate {
          replace => {
            "event1.idm.read_only_udm.network.tls.version_protocol" => "%{ssl_protocol}"
          }
          on_error => "no_ssl_protocol"
        }
      }
      if [size_inbyetes] not in ["","-"] {
        mutate {
          replace => {
            "event1.idm.read_only_udm.network.received_bytes" => "%{size_inbyetes}"
          }
          on_error => "no_size_inbyetes"
        }
        mutate{
          convert => {
            "event1.idm.read_only_udm.network.received_bytes" => "uinteger"
          }
          on_error => "no_size_inbyetes"
        }
      }
      if [ssl_cipher] != "" {
        mutate {
          replace => {
            "event1.idm.read_only_udm.network.tls.cipher" => "%{ssl_cipher}"
          }
          on_error => "ssl_cipher_empty"
        }
      }
      if [actualrequest] != "" {
        grok {
          match => {
            "actualrequest" => "%{WORD:sm_action} %{DATA} %{DATA:application_protocol}/%{GREEDYDATA:protocol_version}"
          }
          on_error => "no_actualrequest"
          overwrite => ["sm_action","application_protocol","protocol_version"]
        }
        if [application_protocol] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.network.application_protocol" => "%{application_protocol}"
            }
            on_error => "no_application_protocol"
          }
        }
        if [protocol_version] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.network.application_protocol_version" => "%{protocol_version}"
            }
            on_error => "no_protocol_version"
          }
        }
      }

      if [client_ip] not in ["","-"] {
        mutate {
          merge =>  {
            "event1.idm.read_only_udm.principal.ip" => "client_ip"
            "event1.idm.read_only_udm.principal.asset.ip" => "client_ip"
          }
          on_error => "no_ip"
        }
        if ![no_ip] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      if [target_ip] != "" {
        mutate {
          merge => {
            "event1.idm.read_only_udm.target.ip" => "target_ip"
            "event1.idm.read_only_udm.target.asset.ip" => "target_ip"
          }
          on_error => "invalid_target_ip"
        }
        if ![invalid_target_ip] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }

      ####
      mutate {
        replace => {
          "sm_impersonatorname" => "%{msg.sm_impersonatorname}"
        }
        on_error => "impersonator_not_found"
      }
      if ![impersonator_not_found] or [is_json] == "true" {
        mutate {
          replace => {
            "sm_hostname" => "%{msg.sm_hostname}"
            "sm_username" => "%{msg.sm_username}"
            "sm_realmname" => "%{msg.sm_realmname}"
            "sm_domainname" => "%{msg.sm_domainname}"
            "sm_realmoid" => "%{msg.sm_realmoid}"
            "sm_domainoid" => "%{msg.sm_domainoid}"
            "sm_action" => "%{msg.sm_action}"
            "sm_resource" => "%{msg.sm_resource}"
            "sm_sessionid" => "%{msg.sm_sessionid}"
            "sm_agentname" => "%{msg.sm_agentname}"
            "user_name" => ""
          }
          on_error => "field_not_found"
      }

        mutate {
          replace => {
            "event1.idm.read_only_udm.principal.hostname" => "%{msg.sm_hostname}"
            "event1.idm.read_only_udm.principal.asset.hostname" => "%{msg.sm_hostname}"
          }
          on_error => "invalid_host"
        }
        if ![invalid_host] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }

        if [sm_username] != "" {
          grok {
            match => {
              "sm_username" => ["CN=%{DATA:user_name}\\\\,%{GREEDYDATA}","CN=%{DATA:user_name},%{GREEDYDATA}"]
            }
            overwrite => ["user_name"]
            on_error => "user_not_found"
          }
          if ![user_not_found] {
            mutate {
              replace => {
                "event1.idm.read_only_udm.principal.user.user_display_name" => "%{user_name}"
                "has_principal_user" => "true"
              }
            }
          }
        }

        if [sm_impersonatorname] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.target.user.user_display_name" => "%{sm_impersonatorname}"
            }
          }
        }

        if [sm_realmname] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.observer.group.group_display_name" => "%{msg.sm_realmname}"
            }
          }
        }

        if [sm_domainname] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.observer.domain.name" => "DOMAIN_NAME:%{msg.sm_domainname}"
            }
          }
        }

        if [sm_realmoid] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.observer.asset.product_object_id" => "%{msg.sm_realmoid}"
            }
          }
        }

        if [sm_domainoid] != "" {
          mutate {
            replace => {
              "event1.idm.read_only_udm.principal.asset.product_object_id" => "%{msg.sm_domainoid}"
            }
          }
        }

        mutate {
          replace => {
            "client_ip" => "%{msg.sm_clientip}"
          }
          on_error => "sm_clientip_not_found"
        }
        if ![sm_clientip_not_found] and [client_ip] != "" {
          mutate {
            merge =>  {
              "event1.idm.read_only_udm.principal.ip" => "client_ip"
              "event1.idm.read_only_udm.principal.asset.ip" => "client_ip"
            }
            on_error => "invalid_ip"
          }
          if ![invalid_ip] {
            mutate {
              replace => {
                "has_principal" => "true"
              }
            }
          }
        }

        mutate {
          replace => {
            "event1.idm.read_only_udm.network.session_id" => "%{msg.sm_sessionid}"
          }
          on_error => "sm_sessionid_not_found"
        }
        mutate {
          replace => {
            "event1.idm.read_only_udm.network.http.user_agent" => "%{msg.sm_agentname}"
            "has_network" => "true"
          }
          on_error => "sm_agentname_not_found"
        }

        if ![field_not_found] and [sm_action] in ["GET","POST","PATCH","DELETE"] {
          mutate {
            replace => {
              "event1.idm.read_only_udm.network.http.method" => "%{sm_action}"
              "has_network" => "true"
            }
          }
        }

        if [sm_action] in ["GET","POST","PATCH","DELETE"] {

          mutate {
            replace => {
              "event1.idm.read_only_udm.network.http.method" => "%{sm_action}"
              "has_network" => "true"
            }
          }
        }
        mutate {
          replace => {
            "event1.idm.read_only_udm.metadata.product_log_id" => "%{msg.sm_eventid}"
          }
          on_error => "sm_eventid_not_found"
        }

      if [sm_resource] != "" and [sm_resource] != "/" {
        mutate {
          replace =>  {
            "event1.idm.read_only_udm.principal.resource.name" => "%{msg.sm_resource}"
          }
        }
      }

        mutate {
          replace => {
            "sm_authdirserver.key" => "Auth DirServer"
            "sm_authdirserver.value.string_value" => "%{msg.sm_authdirserver}"
          }
          on_error => "sm_authdirserver_not_found"
        }
