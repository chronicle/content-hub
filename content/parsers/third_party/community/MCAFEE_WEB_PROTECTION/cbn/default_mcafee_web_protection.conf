# Product: McAfee Web Protection
# Category: SaaS Application
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-04-16
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "requestTimestampEpoch" => ""
      "request_timestamp_epoch" => ""
      "clientIP" => ""
      "intermediary" => ""
      "sourceIP" => ""
      "destinationIP" => ""
      "processName" => ""
      "process_name" => ""
      "uriScheme" => ""
      "blockReason" => ""
      "requested_host" => ""
      "destination_ip" => ""
      "result" => ""
      "category" => ""
      "http_action" => ""
      "media_type" => ""
      "mediaType" => ""
      "requestedPath" => ""
      "requested_path" => ""
      "username" => ""
      "client_ip" => ""
      "source_ip" => ""
      "reputation" => ""
      "user_agent_comment" => ""
      "uri_scheme" => ""
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      "requestTimestamp_Epoch" => ""
      "httpStatus_Code" => ""
      "country" => ""
      "intermediary_ip1" => ""
      "intermediary_ip2" => ""
      "intermediary_port" => ""
      "intermediaryip1" => ""
      "intermediaryip2" => ""
      "intport" => ""
      "userID" => ""
      "url" => ""
      "virus" => ""
      "Location" => ""
      "lastRule" => ""
      "applicationType" => ""
      "Requested_timestamp" => ""
      "Ssl_scanned" => ""
      "av_scanned_up" => ""
      "av_scanned_down" => ""
      "rbi" => ""
      "dlp" => ""
      "Filename" => ""
      "Mw_probablility" => ""
      "Discarded_host" => ""
      "Ssl_client_prot" => ""
      "Ssl_server_prot" => ""
      "domain_fronting_url" => ""
    }
  }

  mutate {
    gsub => ["message", "server_to_client_bytes", "serverToClientBytes"]
  }
  mutate {
    gsub => ["message", "client_to_server_bytes", "clientToServerBytes"]
  }
  mutate {
    gsub => ["message", "destination_port", "destinationPort"]
  }
  mutate {
    gsub => ["message", "http_status_code", "httpStatusCode"]
  }
  json {
      source => "message"
      on_error => "not_json"
  }
  mutate {
    gsub => ["message", '\\",\\"', '#']
  }
  mutate {
    gsub => ["message", '\\"', '']
  }
  mutate {
    gsub => ["message",'\\r\\n','']
  }
  if [not_json] {
    grok {
      match => {
        "message" => [
          "<%{INT}>%{SYSLOGTIMESTAMP} %{DATA} -: %{DATA:userID}#%{DATA:username}#%{IP:source_ip}#%{DATA:http_action}#%{INT:serverToClientBytes}#%{INT:clientToServerBytes}#%{DATA:requested_host}#%{DATA:requestedPath}#(?P<result>OBSERVED|PROXIED|DENIED)#%{DATA:virus}#%{DATA:requestTimestamp_Epoch}#%{DATA}#%{DATA:uriScheme}#%{DATA:category}#%{DATA:mediaType}#%{DATA:applicationType}#%{DATA:reputation}#%{DATA:lastrule}#%{INT:httpStatusCode}#%{IP:clientIP}#%{DATA:location}#%{DATA:blockReason}#%{DATA:userAgentProduct}#%{DATA:userAgentVersion}#%{DATA:user_agent_comment}#%{DATA:process_name}#%{IP:destination_ip}#%{INT:destinationPort}#%{DATA:country}#%{GREEDYDATA}#%{IP:intermediary_ip1}#%{IP:intermediary_ip2}#%{INT:intermediary_port}#%{GREEDYDATA}"
          "<%{INT}>%{SYSLOGTIMESTAMP} %{DATA} -: %{DATA:userID}#%{DATA:username}#%{IP:source_ip}#%{DATA:http_action}#%{INT:serverToClientBytes}#%{INT:clientToServerBytes}#%{DATA:requested_host}#%{DATA:requestedPath}#(?P<result>OBSERVED|PROXIED|DENIED)#%{DATA:virus}#%{DATA:requestTimestamp_Epoch}#%{DATA}#%{DATA:uriScheme}#%{DATA:category}#%{DATA:mediaType}#%{DATA:applicationType}#%{DATA}#%{DATA:reputation}#%{DATA:lastRule}#%{INT:httpStatusCode}#%{IP:clientIP}#%{DATA:location}#%{DATA:blockReason}#%{DATA:userAgentProduct}#%{DATA:userAgentVersion}#%{DATA:user_agent_comment}#%{DATA:process_name}#%{IP:destination_ip}#%{INT:destinationPort}#%{DATA:country}#%{GREEDYDATA}#%{IP:intermediary_ip1}#%{IP:intermediary_ip2}#%{INT:intermediary_port}#%{GREEDYDATA}"
          "<%{INT}>%{SYSLOGTIMESTAMP:Requested_timestamp} %{DATA} -:%{DATA:userID}#%{USERNAME:username}#%{IP:source_ip}#%{DATA:http_action}#%{INT:serverToClientBytes}#%{INT:clientToServerBytes}#%{DATA:requested_host}#%{DATA:requestedPath}#%{DATA:result}#%{DATA:virus}#%{DATA:requestTimestamp_Epoch}#%{DATA}#%{DATA:uriScheme}#%{DATA:category}#%{DATA:mediaType}#%{DATA:applicationType}#%{DATA:reputation}#%{DATA:lastRule}#%{INT:httpStatusCode}#%{IP:clientIP}#%{DATA:location}#%{DATA:blockReason}#%{DATA:userAgentProduct}#%{DATA:userAgentVersion}#%{DATA:user_agent_comment}#%{DATA:process_name}#%{IP:destination_ip}#%{INT:destinationPort}#%{DATA:country}#%{DATA:url}#%{DATA:Ssl_scanned}#%{DATA:av_scanned_up}#%{DATA:av_scanned_down}#%{DATA:rbi}#%{DATA:dlp}#%{DATA}#%{DATA:Filename}#%{IP:intermediary_ip1}#%{IP:intermediary_ip2}%{DATA}#%{INT:intermediary_port}#%{INT:Mw_probablility}#%{DATA:Discarded_host}#%{DATA:Ssl_client_prot}#%{DATA:Ssl_server_prot}#%{DATA:domain_fronting_url}"
        ]
      }
      overwrite => ["userID", "username","Requested_timestamp", "source_ip","http_action", "serverToClientBytes", "clientToServerBytes", "requested_host", "requestedPath", "result", "virus", "requestTimestamp_Epoch", "uriScheme", "category", "mediaType", "applicationType", "reputation", "lastRule", "httpStatusCode", "clientIP", "location", "blockReason", "userAgentProduct", "userAgentVersion", "user_agent_comment", "process_name", "destination_ip", "destinationPort","country", "url", "intermediary_ip1", "intermediary_ip2", "intermediary_port", "Ssl_scanned", "av_scanned_up", "Mw_probablility", "Discarded_host", "Ssl_client_prot", "Ssl_server_prot", "domain_fronting_url", "rbi", "dlp", "av_scanned_down", "Filename"]
      on_error => "not_grok"
    }
  }
  if [userID] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{userID}"
      }
      on_error => "userID_error"
    }
  }
  if [url] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.url" => "%{url}"
      }
      on_error => "url_error"
    }
  }
  if [virus] != "" {
    mutate {
      replace => {
        "virus_label.key" => "virus"
        "virus_label.value" => "%{virus}"
      }
      on_error => "virus_error"
    }
    if ![virus_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "virus_label"
        }
        on_error => "virus_error"
      }
    }
  }
  if [Location] != "" {
    mutate {
      replace => {
        "location_label.key" => "location"
        "location_label.value" => "%{Location}"
      }
      on_error => "location_error"
    }
    if ![location_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "location_label"
        }
        on_error => "location_error"
      }
    }
  }
  if [lastRule] != "" {
    mutate {
      replace => {
        "last_rule_label.key" => "lastRule"
        "last_rule_label.value" => "%{lastRule}"
      }
      on_error => "lastRule_error"
    }
    if ![lastRule_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "last_rule_label"
        }
        on_error => "lastRule_error"
      }
    }
  }
  if [applicationType] != "" {
    mutate {
      replace => {
        "application_type_label.key" => "applicationType"
        "application_type_label.value" => "%{applicationType}"
      }
      on_error => "applicationType_error"
    }
    if ![applicationType_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "application_type_label"
        }
        on_error => "applicationType_error"
      }
    }
  }
  if [Requested_timestamp] != "" {
    date {
      match => ["Requested_timestamp", "MMM dd HH:mm:ss"]
      rebase => true
      on_error => "Requested_timestamp_error"
    }
  }
  if [Ssl_scanned] != "" {
    mutate {
      replace => {
        "ssl_scanned_label.key" => "Ssl_scanned"
        "ssl_scanned_label.value.string_value" => "%{Ssl_scanned}"
      }
      on_error => "Ssl_scanned_error"
    }
    if ![Ssl_scanned_error]{
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ssl_scanned_label"
        }
        on_error => "Ssl_scanned_error"
      }
    }
  }
  if [av_scanned_up] != "" {
    mutate {
      replace => {
        "av_scanned_up_label.key" => "av_scanned_up"
        "av_scanned_up_label.value.string_value" => "%{av_scanned_up}"
      }
      on_error => "av_scanned_up_error"
    }
    if ![av_scanned_up_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "av_scanned_up_label"
        }
        on_error => "av_scanned_up_error"
      }
    }
  }
  if [av_scanned_down] != "" {
    mutate {
      replace => {
        "av_scanned_down_label.key" => "av_scanned_down"
        "av_scanned_down_label.value.string_value" => "%{av_scanned_down}"
      }
      on_error => "av_scanned_down_error"
    }
    if ![av_scanned_down_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "av_scanned_down_label"
        }
        on_error => "av_scanned_down_error"
      }
    }
  }
  if [rbi] != "" {
    mutate {
      replace => {
        "rbi_label.key" => "rbi"
        "rbi_label.value.string_value" => "%{rbi}"
      }
      on_error => "rbi_error"
    }
    if ![rbi_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "rbi_label"
        }
        on_error => "rbi_error"
      }
    }
  }
  if [dlp] != "" {
    mutate {
      replace => {
        "dlp_label.key" => "dlp"
        "dlp_label.value.string_value" => "%{dlp}"
      }
      on_error => "dlp_error"
    }
    if ![dlp_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "dlp_label"
        }
        on_error => "dlp_error"
      }
    }
  }
  if [Filename] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.file.full_path" => "%{Filename}"
      }
      on_error => "Filename_error"
    }
  }
  if [Mw_probablility] != "" {
    mutate {
      replace => {
        "Mw_probablility_label.key" => "Mw_probablility"
        "Mw_probablility_label.value" => "%{Mw_probablility}"
      }
      on_error => "Mw_probablility_error"
    }
    if ![Mw_probablility_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "Mw_probablility_label"
        }
        on_error => "Mw_ probablility_error"
      }
    }
  }
  if [Discarded_host] != "" {
    mutate {
      replace => {
        "discarded_host_label.key" => "Discarded_host"
        "discarded_host_label.value" => "%{Discarded_host}"
      }
      on_error => "Discarded_host_error"
    }
    if ![Discarded_host_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "discarded_host_label"
        }
        on_error => "Discarded_host_error"
      }
    }
  }
  if [Ssl_client_prot] != "" {
    mutate {
      replace => {
        "ssl_client_prot_label.key" => "Ssl_client_prot"
        "ssl_client_prot_label.value" => "%{Ssl_client_prot}"
      }
      on_error => "Ssl_client_prot_error"
    }
    if ![Ssl_client_prot_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.resource.attribute.labels" => "ssl_client_prot_label"
        }
        on_error => "Ssl_client_prot_error"
      }
    }
  }
  if [Ssl_server_prot] != "" {
    mutate {
      replace => {
        "ssl_server_prot_label.key" => "Ssl_server_prot"
        "ssl_server_prot_label.value" => "%{Ssl_server_prot}"
      }
      on_error => "Ssl_server_prot_error"
    }
    if ![Ssl_client_prot_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.resource.attribute.labels" => "ssl_server_prot_label"
        }
        on_error => "Ssl_server_prot_error"
      }
    }
  }
  if [domain_fronting_url] != "" {
    mutate {
      replace => {
        "domain_fronting_url_label.key" => "domain_fronting_url"
        "domain_fronting_url_label.value" => "%{domain_fronting_url}"
      }
      on_error => "domain_fronting_url_error"
    }
    if ![domain_fronting_url_error] {
      mutate {
        merge => {
          "security_result.detection_fields" => "domain_fronting_url_label"
        }
        on_error => "domain_fronting_url_error"
      }
    }
  }


  if [requestTimestamp_Epoch] != "" {
    date {
      match => ["requestTimestamp_Epoch", "UNIX"]
      on_error => "requestTimestamp_Epoch_error"
    }
    mutate {
      convert => {
        "requestTimestamp_Epoch" => "integer"
      }
      on_error => "requestTimestamp_Epoch_error"
    }
  }
  if [country] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.location.country_or_region" => "%{country}"
      }
      on_error => "country_error"
    }
  }
  if [intermediary_ip1] != "" {
    mutate {
      replace => {
        "intermediaryip1" => "%{intermediary_ip1}"
      }
      on_error => "intermediary_ip1_error"
    }
  }

  if [intermediaryip1] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "intermediaryip1"
      }
      on_error => "intermediary_ip1_mergeerror"
    }
  }
  if [intermediary_ip2] != "" {
    mutate {
      replace => {
        "intermediaryip2" => "%{intermediary_ip2}"
      }
      on_error => "intermediary_ip2_error"
    }
  }

  if [intermediaryip2] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "intermediaryip2"
      }
      on_error => "intermediary_ip2_mergeerror"
    }
  }
  mutate {
    replace => {
      "intport" => "%{intermediary_port}"
    }
    on_error => "int_port_not_found"
  }
  if [intermediary_port] != "" {
    mutate {
      replace => {
        "intermediary.port" => "%{intermediary_port}"
      }
      on_error => "int_port_invalid"
    }
    mutate {
      convert => {
        "intermediary.port" => "integer"
      }
      on_error => "relay_port_is_interger"
    }
  }
  if [requestTimestampEpoch] != "" {
    mutate {
      convert => {
        "requestTimestampEpoch" => "string"
      }
    }
    date {
      match => ["requestTimestampEpoch", "UNIX"]
    }
  }
  if [request_timestamp_epoch] != "" {
    date {
      match => ["request_timestamp_epoch", "UNIX"]
    }
  }

  mutate {
    convert => {
      "destinationPort" => "integer"
      "clientToServerBytes" => "uinteger"
      "serverToClientBytes" => "uinteger"
      "httpStatusCode" => "integer"
    }
    on_error => "convert_error"
  }

  mutate {
    replace => {
      "security_action" => "ALLOW"
    }
  }

  if [client_ip] != "" {
    mutate {
      replace => {
        "clientIP" => "%{client_ip}"
      }
    }
  }

  if [clientIP] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "clientIP"
      }
    }
  }

  if [source_ip] != "" {
    mutate {
      replace => {
        "sourceIP" => "%{source_ip}"
      }
    }
  }

  if [sourceIP] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "sourceIP"
      }
    }
  }

  if [destination_ip] != "" {
    mutate {
      replace => {
        "destinationIP" => "%{destination_ip}"
      }
    }
  }

  if [destinationIP] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "destinationIP"
      }
    }
  }

  if [requested_host] != "" {
    mutate {
      replace => {
        "requestedHost" => "%{requested_host}"
      }
    }
  }

  if [http_action] != "" {
    mutate {
      replace => {
        "httpAction" => "%{http_action}"
      }
    }
  }

  if [username] != "" {
    mutate {
      replace => {
        "userName" => "%{username}"
      }
    }
  }

  if [user_agent_comment] != "" {
    mutate {
      replace => {
        "userAgentComment" => "%{user_agent_comment}"
      }
    }
  }

  if [uri_scheme] != "" {
    mutate {
      replace => {
        "uriScheme" => "%{uri_scheme}"
      }
    }
  }
  mutate {
    rename => {
      "userName" => "event.idm.read_only_udm.principal.user.userid"
      "destinationPort" => "event.idm.read_only_udm.target.port"
      "requestedHost" => "event.idm.read_only_udm.target.hostname"
      "clientToServerBytes" => "event.idm.read_only_udm.network.sent_bytes"
      "serverToClientBytes" => "event.idm.read_only_udm.network.received_bytes"
      "httpStatusCode" => "event.idm.read_only_udm.network.http.response_code"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.network.http.method" => "%{httpAction}"
    }
    on_error => "http_action_empty"
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.network.http.user_agent" => "%{userAgentComment}"
    }
    on_error => "http_user_agent_empty"
  }
  mutate {
    convert => {
      "userAgentComment" => "parseduseragent"
    }
    on_error => "http_user_agent_conversion_failure"
  }
  if ![http_user_agent_conversion_failure] {
    mutate {
      rename => {
        "userAgentComment" => "event.idm.read_only_udm.network.http.parsed_user_agent"
      }
    }
  }

  if [uriScheme] in ["http", "https"] {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
      }
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }

  if [uriScheme] =~ "https" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.application_protocol" => "HTTPS"
      }
    }
  } else if [uriScheme] =~ "http" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.application_protocol" => "HTTP"
      }
    }
  }

  if [process_name] != "" {
    mutate {
      replace => {
        "processName" => "%{process_name}"
      }
    }
  }

  if [processName] != "" {
    mutate {
      rename => {
        "processName" => "event.idm.read_only_udm.principal.process.command_line"
      }
    }
  }

  if [result] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{result}"
      }
    }
  }

  if [category] != "" {
    mutate {
      replace => {
        "category_detail" => "%{category}"
      }
      merge => {
        "security_result.category_details" => "category_detail"
      }
    }
  }

  if [blockReason] != "" {
    mutate {
      rename => {
        "blockReason" => "security_result.summary"
      }
      replace => {
        "security_action" => "BLOCK"
      }
    }
  }

  mutate {
    merge => {
      "security_result.action" => "security_action"
    }
  }

  if [requested_path] != "" {
    mutate {
      replace => {
        "requestedPath" => "%{requested_path}"
      }
    }
  }

  if [requestedPath] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.file.full_path" => "%{requestedPath}"
      }
    }
  }

  if [mediaType] != "" {
    mutate {
      replace => {
        "media_type" => "%{mediaType}"
      }
    }
  }

  if [media_type] != "" {
    mutate {
      replace => {
        "additional_fields.key" => "Media Type"
        "additional_fields.value.string_value" => "%{media_type}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_fields"
      }
    }
  }

  if [reputation] != "" {
    mutate {
      replace => {
        "additional_fields1.key" => "Reputation"
        "additional_fields1.value.string_value" => "%{reputation}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_fields1"
      }
    }
  }

  mutate {
    merge => {
      "event.idm.read_only_udm.security_result" => "security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }

}
