  on_error => "_failed_to_set_containment_state_key"
}
mutate {
  replace => {
    "__attribute_labels_containment_state.value" => "%{__agent_containment_state}"
  }
  on_error => "_failed_to_set_containment_state_value"
}
mutate {
  merge => {
    "__agent_data.asset.attribute.labels" => "__attribute_labels_containment_state"
  }
  on_error => "_failed_to_set_containment_state_attribute"
}

# UDM > Principal or Target

if [__noun_agent] == "principal" {
  mutate {
    rename => {
      "__agent_data" => "event1.idm.read_only_udm.principal"
    }
    on_error => "_failed_to_map_noun_agent_to_principal"
  }
} else if [__noun_agent] == "target" {
  mutate {
    rename => {
      "__agent_data" => "event1.idm.read_only_udm.target"
    }
    on_error => "_failed_to_map_noun_agent_to_target"
  }
}


