filter {

  mutate {
    replace => {
      "__agent_id" => ""
      "__appliance_id" => ""
      "__url" = ""
    }
  }

  xml {
    source => "message"
    xpath => {
      "/itemList/@agentId" => "__agent_id"
      "/itemList/@urlBackToProduct" => "__url"
      "/itemList/@applianceId" => "__appliance_id"
    }
  }

  if [__agent_id] == "" or [__url] == "" {
    drop {
      TAG => "TAG_MALFORMED_MESSAGE"
    }
  }

  for ev, _ in xml(message, /itemList/eventItem) {
    mutate {
      replace => {
        "__product_log_id_event_item" => ""
      }
    }

    xml {
      source => "message"
      xpath => {
        "/itemList/eventItem[%{ev}]/@uid" => "__product_log_id_event_item"
      }
    }

    for i, _ in xml(message, /itemList/eventItem[%{ev}]/ipv4NetworkEvent) {

      mutate {
        replace => {
          "event1" => ""
          "event_values.__pid" => ""
          "event_values.__process" => ""
          "event_values.__processPath" => ""
          "event_values.__parentPid" => ""
          "event_values.__parentProcessPath" => ""
          "event_values.__username" => ""
          "__security_result" => ""
          "__noun_agent" => "principal"
          "__event_timestamp" => ""
        }
      }
      mutate {
        replace => {
          "event_type" => "ipv4NetworkEvent"
        }
      }
      mutate {
        replace => {
          "event_values.__protocol" => ""
          "event_values.__localIP" => ""
          "event_values.__remoteIP" => ""
          "event_values.__localPort" => ""
          "event_values.__remotePort" => ""
        }
      }

      xml {
        source => "message"
        xpath =>  {
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/protocol" =>
            "event_values.__protocol"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEventt[%{i}]/localIP" =>
            "event_values.__localIP"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/remoteIP" =>
            "event_values.__remoteIP"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/localPort" =>
            "event_values.__localPort"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/remotePort" =>
             "event_values.__remotePort"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/username" =>
             "event_values.__username"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/pid" =>
             "event_values.__pid"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/process" =>
             "event_values.__process"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/processPath" =>
             "event_values.__processPath"
          "/itemList/eventItem[%{ev}]/ipv4NetworkEvent[%{i}]/timestamp"
             => "__event_timestamp"
        }
      }

      # Trellix HX Audit Events
# Common logic used by the Audit Events parser

# trellix_hx_alerts_ioc_common.include below needs "event_type",
# trellix_hx_alerts_common needs "_event_type", make sure both are set

mutate {
  replace => {
    "__event_type" => "%{event_type}"
  }
}

# Trellix HX IOC Alerts
# Preprocessed and set variables for IOC alerts

# Parameters
# event_values.__pid
# event_values.__process
# event_values.__processPath
# event_values.__parentPid
# event_values.__parentProcessPath
# event_values.__username

# Fields set
# __pid => "%{event_values.__pid}"
# __process => "%{event_values.__process}"
# __process_path => "%{event_values.__processPath}"
# __process_full_path => "%{__process_path}\\%{__process}" or "%{__process_path}/%{__process}"
# __parent_pid => "%{event_values.__parentPid}"
# __parent_process_path => %{event_values.__parentProcessPath}"
# __user => Extracted from event_values.__username
# __domain => Extracted from event_values.__username (Windows)
# __domain_user => "%{event_values.__username}"

mutate {
  replace => {
    "__pid" => ""
    "__process" => ""
    "__process_path" => ""
    "__process_full_path" => ""
    "__parent_process" => ""
    "__parent_pid" => ""
    "__parent_process_path" => ""
    "__parent_unique_pid" => ""
    "__domain_user" => ""
    "__user" => ""
    "__domain" => ""
    "__platform_path" => ""
    "__path_result_win" => ""
  }
}

if [event_values][__pid] != "" {
  mutate {
    convert => {
      "event_values.__pid" => "string"
    }
    on_error => "already_string"
  }
  mutate {
    replace => {
      "__pid" => "%{event_values.__pid}"
    }
    on_error => "_failed_to_set_pid"
  }
}



if [event_values][__process] != "" {
  mutate {
    replace => {
      "__process" => "%{event_values.__process}"
    }
    on_error => "_failed_to_set_process"
  }
}

if [event_values][__processPath] != "" {
  mutate {
    replace => {
      "__process_path" => "%{event_values.__processPath}"
    }
    on_error => "_failed_to_set_process_path"
  }

  grok {
    match => {
      "event_values.__processPath" => "(%{WINPATH:__path_result_win})"
    }
    overwrite => ["__path_result_win"]
    on_error => "_failed_to_get_platform_path_win"
  }

  if [__path_result_win] != "" {
    mutate {
      replace => {
        "__platform_path" => "win"
      }
    }
  } else {
    mutate {
      replace => {
        "__platform_path" => "unix"
      }
    }
  }
}

if [__process_path] != "" and [__process] != "" {
  # process events have full path including process name
  if [event_type] == "processEvent" {
    mutate {
      replace => {
        "__process_full_path" => "%{__process_path}"
      }
      on_error => "_failed_to_set_process_full_path"
    }
  } else if [__platform_path] == "win" {
    mutate {
      replace => {
        "__process_full_path" => "%{__process_path}\\%{__process}"
      }
      on_error => "_failed_to_set_process_full_path"
    }
  } else if [__platform_path] == "unix" {
    mutate {
      replace => {
        "__process_full_path" => "%{__process_path}/%{__process}"
      }
      on_error => "_failed_to_set_process_full_path"
    }
  }
}

if [event_values][__parentPid] != "" {
  mutate {
    convert => {
      "event_values.__parentPid" => "string"
    }
    on_error => "already_string"
  }
  mutate {
    replace => {
      "__parent_pid" => "%{event_values.__parentPid}"
    }
    on_error => "_failed_to_set_parent_unique_pid"
  }
}

# Parent process path have full path including process name for event types processEvent and fileWriteEvent
if [event_values][__parentProcessPath] != "" {
  mutate {
    replace => {
      "__parent_process_path" => "%{event_values.__parentProcessPath}"
    }
    on_error => "_failed_to_set_parent_process_path"
  }
}

if [__parent_process_path] != "" {
  grok {
    match => {
      "__parent_process_path" => ["(?P<__parent_process>([^/\\\\]+$))"]
    }
    overwrite => ["__parent_process"]
    on_error => "_failed_to_get_parent_process"
  }
}

if [event_values][__username] != "" {
  grok {
    match => {
      "event_values.__username" => [
        "(?P<__domain>.*)\\\\(?P<__user>.*)"
        "(?P<__user>.*)"
      ]
    }
    overwrite => ["__domain", "__user"]
    on_error => "_failed_to_get_domain_user"
  }
  mutate {
    replace => {
      "__domain_user" => "%{event_values.__username}"
    }
    on_error => "_failed_to_set_user"
  }
}

# Trellix HX Alerts
# Mapping common metadata fields associated with Trellix HX Alerts

# Parameters
# __alert_id
# __matched_at
# __agent_id
# __appliance_id
# __url
# __event_type

# Fields mapped
# metadata.product_log_id => "%{__agent_id}|%{__matched_at}|%{__alert_id}"
# metadata.product_deployment_id => %{__appliance_id}"
# metadata.url_back_to_product => "%{__url}"
# metadata.product_event_type => "%{__event_type}"
# metadata.vendor_name => "Trellix"
# metadata.product_name => "HX"
# metadata.event_type => "GENERIC_EVENT"

mutate {
  replace => {
    "__product_log_id" => ""
  }
}

mutate {
  replace => {
    "__product_log_id" => "%{__agent_id}|%{__matched_at}|%{__alert_id}"
  }
  on_error => "_failed_to_map_product_log_id"
}

mutate {
  gsub => [
    "__product_log_id", "[\|]+", "\|"
  ]
}

mutate {
  gsub => [
    "__product_log_id", "^(\|)+", ""
  ]
}

mutate {
  gsub => [
    "__product_log_id", "(\|)+$", ""
  ]
}


# UDM > Metadata

if [__product_log_id] != "" {
  mutate {
    replace => {
      "event1.idm.read_only_udm.metadata.product_log_id" => "%{__product_log_id}"
    }
    on_error => "_failed_to_map_product_log_id"
  }
}

if [__appliance_id] != "" {
  mutate {
    replace => {
      "event1.idm.read_only_udm.metadata.product_deployment_id" => "%{__appliance_id}"
    }
    on_error => "_failed_to_map_product_deployment_id"
  }
}

if [__url] != "" {
  mutate {
    replace => {
      "event1.idm.read_only_udm.metadata.url_back_to_product" => "%{__url}"
    }
    on_error => "_failed_to_map_url_back_to_product"
  }
}

if [__event_type] != "" {
  mutate {
    replace => {
      "event1.idm.read_only_udm.metadata.product_event_type" => "%{__event_type}"
    }
    on_error => "_failed_to_map_product_event_type"
  }
}

mutate {
  replace => {
    "event1.idm.read_only_udm.metadata.vendor_name" => "Trellix"
    "event1.idm.read_only_udm.metadata.product_name" => "HX"
    "event1.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
  }
}


if [_failed_to_map_product_log_id] {
  if [__product_log_id_event_item] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.metadata.product_log_id" =>
          "%{__product_log_id_event_item}"
      }
    }
  }
}

# Trellix HX Agent General
