# noun.asset.attribute.labels.value => "%{__agent_containment_state}"

mutate {
  replace => {
    "__attribute_labels_containment_state" => ""
    "__agent_data" => ""
  }
}

# Agent specific
## validation for specific events (e.g. PROCESS_LAUNCH)
mutate {
  replace => {
    "__agent_data.asset_id" => "AGENT ID:%{__agent_id}"
  }
  on_error => "_failed_to_map_asset_id"
}
mutate {
  replace => {
    "__agent_data.asset.asset_id" => "AGENT ID:%{__agent_id}"
  }
  on_error => "_failed_to_map_asset_asset_id"
}
