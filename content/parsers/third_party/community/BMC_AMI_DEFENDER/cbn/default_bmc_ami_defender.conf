      }
    }
  }
  if [toksus] != "" {
    mutate {
      replace => {
        "toksus_label.key" => "toksus"
        "toksus_label.value" => "%{toksus}"
      }
      on_error => "toksus_fail"
    }
    if ![toksus_fail] {
      mutate {
        merge => {
          "security_result.detection_fields" => "toksus_label"
        }
        on_error => "merge_fail"
      }
    }
  }
  if [tokudus] != "" {
    mutate {
      replace => {
        "tokudus_label.key" => "tokudus"
        "tokudus_label.value" => "%{tokudus}"
      }
      on_error => "tokudus_fail"
    }
    if ![tokudus_fail] {
      mutate {
        merge => {
          "security_result.detection_fields" => "tokudus_label"
        }
        on_error => "merge_fail"
      }
    }
  }

  if [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "BMC AMI"
      "metadata.product_name" => "BMC AMI DEFENDER"
    }
  }
  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "sec_result_error"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
