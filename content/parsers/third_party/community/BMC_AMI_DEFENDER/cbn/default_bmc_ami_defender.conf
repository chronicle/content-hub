# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "security_result" => ""
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "additional" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "target" => ""
      "network" => ""
      "extensions" => ""
      "kv_data" => ""
      "hostname" => ""
      "event" => ""
      "eventdesc" => ""
      "rtype" => ""
      "sid" => ""
      "severity" => ""
      "saf" => ""
      "safd" => ""
      "auth_audit" => ""
      "auth_bypass" => ""
      "auth_exit" => ""
      "auth_normal" => ""
      "auth_oper" => ""
      "auth_soft" => ""
      "auth_special" => ""
      "auth_trusted" => ""
      "auth" => ""
      "violation" => ""
      "user_warning" => ""
      "group" => ""
      "jobnm" => ""
      "reas_always" => ""
      "reas_audit" => ""
      "reas_cmdviol" => ""
      "reas_globalaudit" => ""
      "reas_setropts" => ""
      "reas_special" => ""
      "reas_user" => ""
      "reas_verify" => ""
      "aceeadsp" => ""
      "aceeaudt" => ""
      "aceeflg1" => ""
      "aceelogu" => ""
      "aceeoper" => ""
      "aceepriv" => ""
      "aceeracf" => ""
      "aceeroa" => ""
      "aceespec" => ""
      "privstatd" => ""
      "jobid" => ""
      "jsauth"  => ""
      "pgm" => ""
      "tokflg1" => ""
      "tokflg3" => ""
      "tokpriv" => ""
      "toksus" => ""
      "tokudus" => ""
      "name" => ""
      "userid" => ""
      "authinfo" => ""
      "worktyped" => ""
    }
  }

  grok {
    match => {
      "message" => ["%{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:hostname} %{DATA} %{GREEDYDATA:kv_data}"]
    }
    overwrite => ["timestamp","hostname","kv_data"]
    on_error => "grok_fail"
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", "([0-9a-zA-Z_.-]+?)=", "|$1="]
    }
    mutate {
      gsub => ["kv_data", '\\"', ""]
    }
    kv {
      source => "kv_data"
      field_split => "|"
      value_split => "="
      on_error => "kv_fail"
    }
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp","ISO8601","RFC3339","UNIX","SYSLOGTIMESTAMP"]
      target => "metadata.event_timestamp"
      on_error => "invalid_timestamp"
    }
  }
  if [hostname] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{hostname}"
        "principal.asset.hostname" => "%{hostname}"
        "has_principal" => "true"
      }
      on_error => "hostname_fail"
    }
  }

  if [event] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{event}"
      }
      on_error => "event_fail"
    }
  }

  if [eventdesc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{eventdesc}"
      }
      on_error => "eventdesc_fail"
    }
  }

  if [rtype] != "" {
    mutate {
      replace => {
        "rtype_label.key" => "rtype"
        "rtype_label.value.string_value" => "%{rtype}"
      }
      on_error => "rtype_fail"
    }
    if ![rtype_fail] {
      mutate {
        merge => {
          "additional.fields" => "rtype_label"
        }
        on_error => "merge_fail"
      }
    }
  }
  if [sid] != "" {
    mutate {
      replace => {
        "sid_label.key" => "sid"
        "sid_label.value.string_value" => "%{sid}"
      }
      on_error => "sid_fail"
    }
    if ![sid_fail] {
      mutate {
        merge => {
          "additional.fields" => "sid_label"
        }
        on_error => "merge_fail"
      }
    }
  }
  if [severity] != "" {
    mutate {
      uppercase => ["severity"]
    }
    if [severity] =~ "(?i)info" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [severity] in ["ERROR","CRITICAL","ALERT","WARNING","HIGH","MEDIUM", "LOW"] {
      mutate {
        replace => {
          "security_result.severity" => "%{severity}"
        }
      }
    }
    mutate {
      replace => {
        "security_result.severity_details" => "%{severity}"
      }
    }
  }
  if [name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{name}"
      }
      on_error => "name_fail"
    }
  }
  if [userid] != "" {
